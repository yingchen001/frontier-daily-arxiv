", "Zifeng Wang", "Zhiquan Zhang", "Minggui Teng", "Han Jiang", "Boxin Shi"], "brief": "\u63d0\u51faV-LITE\u6846\u67b6\uff0c\u5c06\u5149\u7167\u4f30\u8ba1\u91cd\u65b0\u5b9a\u4e49\u4e3a\u5f15\u5bfc\u5f0f\u89c6\u9891\u4fee\u590d\u4efb\u52a1\uff0c\u901a\u8fc7\u5728\u573a\u666f\u4e2d\u63d2\u5165\u5408\u6210\u94ec\u7403\u8feb\u4f7f\u89c6\u9891\u751f\u6210\u6a21\u578b\u4ea7\u751f\u7269\u7406\u5408\u7406\u7684\u53cd\u5c04\u6548\u679c\u3002\u8bbe\u8ba1\u4e86HDR\u611f\u77e5VAE\u5e76\u7ed3\u5408LoRA\u5fae\u8c03\u7b56\u7565\uff0c\u5b9e\u73b0\u4ece\u5355\u4e2a\u91ce\u5916\u89c6\u9891\u6062\u590d\u52a8\u6001HDR\u73af\u5883\u8d34\u56fe\uff0c\u8bc1\u660e\u73b0\u4ee3\u89c6\u9891\u6269\u6563\u6a21\u578b\u672c\u8d28\u4e0a\u5177\u5907\u7269\u7406\u5149\u7167\u4f30\u8ba1\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04674", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u5149\u7167\u4f30\u8ba1", "\u6269\u6563\u6a21\u578b", "HDR"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04674v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Video Generation Models Are Inherent Lighting Estimators", "tldr": "\u63d0\u51faV-LITE\u6846\u67b6\uff0c\u5c06\u5149\u7167\u4f30\u8ba1\u91cd\u65b0\u5b9a\u4e49\u4e3a\u5f15\u5bfc\u5f0f\u89c6\u9891\u4fee\u590d\u4efb\u52a1\uff0c\u901a\u8fc7\u5728\u573a\u666f\u4e2d\u63d2\u5165\u5408\u6210\u94ec\u7403\u8feb\u4f7f\u89c6\u9891\u751f\u6210\u6a21\u578b\u4ea7\u751f\u7269\u7406\u5408\u7406\u7684\u53cd\u5c04\u6548\u679c\u3002\u8bbe\u8ba1\u4e86HDR\u611f\u77e5VAE\u5e76\u7ed3\u5408LoRA\u5fae\u8c03\u7b56\u7565\uff0c\u5b9e\u73b0\u4ece\u5355\u4e2a\u91ce\u5916\u89c6\u9891\u6062\u590d\u52a8\u6001HDR\u73af\u5883\u8d34\u56fe\uff0c\u8bc1\u660e\u73b0\u4ee3\u89c6\u9891\u6269\u6563\u6a21\u578b\u672c\u8d28\u4e0a\u5177\u5907\u7269\u7406\u5149\u7167\u4f30\u8ba1\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-Language-Action Models (VLAs), which leverage the advanced reasoning capabilities of Vision-Language Models (VLMs), show promising generalization in complex autonomous driving scenarios. Existing VLAs typically predict and optimize 3D trajectories from 2D images. While intuitive, this 2D-to-3D prediction is inherently entangled with camera parameters, leading to limited data scalability across heterogeneous driving datasets. Moreover, directly optimizing in 3D space induces severe convergence to trivial solutions, where VLAs rely on ego-status rather than visual scene understanding. To address these issues, we propose PixelPilot, a novel VLA featuring a decoupled planning and lifting paradigm. In the planning phase, PixelPilot reformulates scene understanding and trajectory prediction as sensor-agnostic 2D-to-2D tasks in the image plane, thereby facilitating scalable training across diverse datasets. The planned 2D trajectories are then deterministically lifted to 3D only during inference, ensuring the full exploitation of visual cues and generalization across different vehicles. To realize this paradigm, we propose a knowledge-instilled policy learning strategy that applies dense, intermediate rewards via Group Relative Policy Optimization (GRPO) to enforce a rigorous causal chain from visual perception to spatial planning. Extensive experiments demonstrate that PixelPilot achieves state-of-the-art performance in both open-loop and closed-loop settings, validating its superior scalability and visual reasoning capabilities.", "arxiv_id": "2607.04637", "arxiv_url": "https://arxiv.org/abs/2607.04637", "authors": ["Pin Tang", "Guoqing Wang", "Xiangxuan Ren", "Zhongdao Wang", "Guodongfang Zhao", "Bailan", "Chao Ma"], "brief": "\u63d0\u51faPixelPilot\uff0c\u4e00\u79cd\u65b0\u578b\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\uff0c\u5c06\u81ea\u52a8\u9a7e\u9a76\u8f68\u8ff9\u89c4\u5212\u89e3\u8026\u4e3a\u4f20\u611f\u5668\u65e0\u5173\u76842D\u56fe\u50cf\u5e73\u9762\u9884\u6d4b\uff0c\u63a8\u7406\u65f6\u518d\u786e\u5b9a\u6027\u5730\u63d0\u5347\u81f33D\u7a7a\u95f4\uff0c\u907f\u514d\u4e86\u76f8\u673a\u53c2\u6570\u8026\u5408\u95ee\u9898\u3002\u901a\u8fc7\u57fa\u4e8eGRPO\u7684\u77e5\u8bc6\u6ce8\u5165\u7b56\u7565\u65bd\u52a0\u5bc6\u96c6\u4e2d\u95f4\u5956\u52b1\uff0c\u5f3a\u5316\u4ece\u89c6\u89c9\u611f\u77e5\u5230\u7a7a\u95f4\u89c4\u5212\u7684\u56e0\u679c\u94fe\uff0c\u5728\u5f00\u73af\u548c\u95ed\u73af\u6d4b\u8bd5\u4e2d\u5747\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04637", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u8f68\u8ff9\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04637v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PixelPilot: Scalable Vision-Language-Action Models for End-to-End Autonomous Driving", "tldr": "\u63d0\u51faPixelPilot\uff0c\u4e00\u79cd\u65b0\u578b\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\uff0c\u5c06\u81ea\u52a8\u9a7e\u9a76\u8f68\u8ff9\u89c4\u5212\u89e3\u8026\u4e3a\u4f20\u611f\u5668\u65e0\u5173\u76842D\u56fe\u50cf\u5e73\u9762\u9884\u6d4b\uff0c\u63a8\u7406\u65f6\u518d\u786e\u5b9a\u6027\u5730\u63d0\u5347\u81f33D\u7a7a\u95f4\uff0c\u907f\u514d\u4e86\u76f8\u673a\u53c2\u6570\u8026\u5408\u95ee\u9898\u3002\u901a\u8fc7\u57fa\u4e8eGRPO\u7684\u77e5\u8bc6\u6ce8\u5165\u7b56\u7565\u65bd\u52a0\u5bc6\u96c6\u4e2d\u95f4\u5956\u52b1\uff0c\u5f3a\u5316\u4ece\u89c6\u89c9\u611f\u77e5\u5230\u7a7a\u95f4\u89c4\u5212\u7684\u56e0\u679c\u94fe\uff0c\u5728\u5f00\u73af\u548c\u95ed\u73af\u6d4b\u8bd5\u4e2d\u5747\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Real-world robot deployment rarely maintains the training-stage camera setup, where cameras often experience repositioning or remounting depending on actual scenarios. Existing view-robust Vision-Language-Action (VLA) policies tolerate such camera variations only when the camera extrinsics are explicitly provided, making them fragile and hard to use especially when view robustness is critical. We argue that the policy should not be told where the camera is, but rather figure it out by itself. To this end, we introduce Camera-Centric VLA (CamVLA), a new VLA model that decouples manipulation controls from camera geometry by predicting (i) a camera-centric end-effector action expressed in the local camera frame, and (ii) a 6-DoF hand-eye matrix relating cameras to the robot base. A deterministic geometric transformation composes the two predictions into a robot base-frame action. This disentangles how I should move in pose-independent camera-centric action generation from where I am looking from in camera-perspective geometric grounding. The resulting policy is calibration-free, depth-free, and single-view, requiring only a single monocular RGB image as the visual observation and task instruction at deployment. Evaluations in both simulation and real-world robot data show that CamVLA consistently improves success rates across diverse unseen viewpoints. Project page: https://alibaba-damo-academy.github.io/CamVLA/.", "arxiv_id": "2607.05396", "arxiv_url": "https://arxiv.org/abs/2607.05396", "authors": ["Wenhao Li", "Xueying Jiang", "Quanhao Qian", "Deli Zhao", "Shijian Lu", "Gongjie Zhang", "Ran Xu"], "brief": "\u63d0\u51faCamVLA\u6a21\u578b\uff0c\u5c06\u673a\u5668\u4eba\u64cd\u63a7\u52a8\u4f5c\u4e0e\u76f8\u673a\u51e0\u4f55\u89e3\u8026\uff0c\u901a\u8fc7\u9884\u6d4b\u76f8\u673a\u5750\u6807\u7cfb\u4e0b\u7684\u672b\u7aef\u6267\u884c\u5668\u52a8\u4f5c\u548c\u624b\u773c\u77e9\u9635\uff0c\u5b9e\u73b0\u65e0\u9700\u76f8\u673a\u6807\u5b9a\u3001\u65e0\u9700\u6df1\u5ea6\u4fe1\u606f\u7684\u89c6\u89d2\u9c81\u68d2\u673a\u5668\u4eba\u63a7\u5236\u3002\u5728\u4eff\u771f\u548c\u771f\u5b9e\u73af\u5883\u4e2d\u5747\u663e\u8457\u63d0\u5347\u4e86\u5bf9\u672a\u89c1\u89c6\u89d2\u7684\u6cdb\u5316\u6210\u529f\u7387\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05396", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b", "\u673a\u5668\u4eba\u64cd\u63a7", "\u89c6\u89d2\u9c81\u68d2\u6027", "\u76f8\u673a\u6807\u5b9a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05396v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "From Fixed to Free Cameras: Calibration-Free View-Robust Vision-Language-Action Model", "tldr": "\u63d0\u51faCamVLA\u6a21\u578b\uff0c\u5c06\u673a\u5668\u4eba\u64cd\u63a7\u52a8\u4f5c\u4e0e\u76f8\u673a\u51e0\u4f55\u89e3\u8026\uff0c\u901a\u8fc7\u9884\u6d4b\u76f8\u673a\u5750\u6807\u7cfb\u4e0b\u7684\u672b\u7aef\u6267\u884c\u5668\u52a8\u4f5c\u548c\u624b\u773c\u77e9\u9635\uff0c\u5b9e\u73b0\u65e0\u9700\u76f8\u673a\u6807\u5b9a\u3001\u65e0\u9700\u6df1\u5ea6\u4fe1\u606f\u7684\u89c6\u89d2\u9c81\u68d2\u673a\u5668\u4eba\u63a7\u5236\u3002\u5728\u4eff\u771f\u548c\u771f\u5b9e\u73af\u5883\u4e2d\u5747\u663e\u8457\u63d0\u5347\u4e86\u5bf9\u672a\u89c1\u89c6\u89d2\u7684\u6cdb\u5316\u6210\u529f\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) is a powerful recipe for improving language-model reasoning, but it is expensive to repeat on every new strong model because the target model must generate many rollouts during training. As models scale, post-training itself becomes a bottleneck. We study a weak-to-strong alternative: run RL on a smaller model where rollouts are cheaper, then reuse what that RL run learned to improve a stronger target model. Directly distilling the post-RL weak teacher is not enough, because the teacher\u0027s final policy mixes useful RL gains with the limitations of the smaller model. We propose Direct On-Policy Distillation (Direct-OPD), which transfers the teacher\u0027s RL-induced policy shift instead. Direct-OPD compares the post-RL teacher with its own pre-RL reference and treats their log-ratio as a dense implicit reward for the student. In plain terms, the checkpoint pair tells us which actions RL made the weak model more or less likely to take, and Direct-OPD applies that signal on the stronger student\u0027s own on-policy states. This directly reuses the weak model\u0027s RL supervision signal without training an explicit reward model or running sparse-reward RL on the target model. Empirically, Direct-OPD consistently leverages weaker teachers to improve stronger target models; notably, it boosts Qwen3-1.7B from 48.3% to 62.4% on AIME 2024 in just 4 hours on 8 A100 GPUs. It outperforms step-matched direct RL and enables the sequential composition of multiple policy shifts. Our results show that RL outcomes can be reused across model scales as implicit reward signals, not merely as final models to imitate.", "arxiv_id": "2607.05394", "arxiv_url": "https://arxiv.org/abs/2607.05394", "authors": ["Shiyuan Feng", "Huan-ang Gao", "Haohan Chi", "Hanlin Wu", "Zhilong Zhang", "Zheng Jiang", "Bingxiang He", "Wei-Ying Ma", "Ya-Qin Zhang", "Hao Zhou"], "brief": "\u63d0\u51faDirect-OPD\u65b9\u6cd5\uff0c\u901a\u8fc7\u8fc1\u79fb\u5c0f\u6a21\u578bRL\u8bad\u7ec3\u524d\u540e\u7684\u7b56\u7565\u504f\u79fb\uff08\u4ee5\u5bf9\u6570\u6bd4\u7387\u4f5c\u4e3a\u9690\u5f0f\u5956\u52b1\uff09\u6765\u63d0\u5347\u66f4\u5f3a\u5927\u6a21\u578b\u7684\u63a8\u7406\u80fd\u529b\uff0c\u65e0\u9700\u5bf9\u76ee\u6807\u6a21\u578b\u91cd\u65b0\u8fd0\u884c\u6602\u8d35\u7684RL\u8bad\u7ec3\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u57288\u5f20A100\u4e0a\u4ec5\u97004\u5c0f\u65f6\u5373\u53ef\u5c06Qwen3-1.7B\u5728AIME 2024\u4e0a\u7684\u51c6\u786e\u7387\u4ece48.3%\u63d0\u5347\u81f362.4%\uff0c\u4e14\u4f18\u4e8e\u7b49\u6b65\u6570\u7684\u76f4\u63a5RL\u8bad\u7ec3\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05394", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f", "\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "\u5f31\u5230\u5f3a\u6cdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05394v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Weak-to-Strong Generalization via Direct On-Policy Distillation", "tldr": "\u63d0\u51faDirect-OPD\u65b9\u6cd5\uff0c\u901a\u8fc7\u8fc1\u79fb\u5c0f\u6a21\u578bRL\u8bad\u7ec3\u524d\u540e\u7684\u7b56\u7565\u504f\u79fb\uff08\u4ee5\u5bf9\u6570\u6bd4\u7387\u4f5c\u4e3a\u9690\u5f0f\u5956\u52b1\uff09\u6765\u63d0\u5347\u66f4\u5f3a\u5927\u6a21\u578b\u7684\u63a8\u7406\u80fd\u529b\uff0c\u65e0\u9700\u5bf9\u76ee\u6807\u6a21\u578b\u91cd\u65b0\u8fd0\u884c\u6602\u8d35\u7684RL\u8bad\u7ec3\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u57288\u5f20A100\u4e0a\u4ec5\u97004\u5c0f\u65f6\u5373\u53ef\u5c06Qwen3-1.7B\u5728AIME 2024\u4e0a\u7684\u51c6\u786e\u7387\u4ece48.3%\u63d0\u5347\u81f362.4%\uff0c\u4e14\u4f18\u4e8e\u7b49\u6b65\u6570\u7684\u76f4\u63a5RL\u8bad\u7ec3\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Time-domain surveys generate many transient candidates, making Real-Bogus classification a critical step in automated discovery pipelines. Reliable labels are costly, while community labels can be noisy and survey-dependent. We aim to develop a Real-Bogus classification framework that can be trained without human-labeled data using injected transients and bogus-dominated survey data, remains robust under strong class contamination, and provides calibrated uncertainty quantification. We combine simulated transient injections with a contaminated survey class and train a dual-network model using asymmetric co-teaching for classes with different label-noise levels. We evaluate performance on a benchmark subset and analyze the learned representation with latent-space visualization tools. For uncertainty quantification (UQ), we compare MC dropout and deep ensembles and propose a low-cost hybrid strategy that exploits the dual-network setting to improve calibration. We extend the evaluation to the light-curve domain to assess recovery of light-curve classes. The method achieves strong Real-Bogus performance on the labeled subset and remains stable under severe class contamination. It recovers transient light-curve classes with high fidelity, while single-source identification is limited by ambiguity in light-curve-derived labels. Our hybrid UQ approach achieves competitive calibration relative to more expensive ensemble baselines. Latent-space analyses indicate that uncertainty aligns with the decision boundary and reveal subclasses within the bogus population. Our results show that injection-driven, weakly supervised training can enable scalable and consistent Real-Bogus classification without human-labeled training data while providing calibrated uncertainties. The method is suited for transfer to forthcoming surveys by re-running the injection-based training pipeline.", "arxiv_id": "2607.05393", "arxiv_url": "https://arxiv.org/abs/2607.05393", "authors": ["Rapha\u00ebl Bonnet-Guerrini", "Bruno Sanchez", "Dominique Fouchez", "Benjamin Racine", "Maya Guy", "Mariam Sabalbal", "Manal Yassine", "Vincenzo Piuri"], "brief": "\u9488\u5bf9\u65f6\u57df\u5de1\u5929\u4e2d\u7684\u771f\u5b9e/\u4f2a\u5019\u9009\u4f53\u5206\u7c7b\u95ee\u9898\uff0c\u63d0\u51fa\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u7684\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff1a\u5229\u7528\u6ce8\u5165\u77ac\u53d8\u4f53\u4e0e\u566a\u58f0\u4e3b\u5bfc\u7684\u5de1\u5929\u6570\u636e\uff0c\u7ed3\u5408\u975e\u5bf9\u79f0\u534f\u540c\u8bad\u7ec3\u53cc\u7f51\u7edc\uff0c\u5e76\u8bbe\u8ba1\u4f4e\u6210\u672c\u6df7\u5408\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u7b56\u7565\u3002\u65b9\u6cd5\u5728\u5f3a\u7c7b\u522b\u6c61\u67d3\u4e0b\u4fdd\u6301\u7a33\u5b9a\uff0c\u6821\u51c6\u4e0d\u786e\u5b9a\u6027\u4e0e\u51b3\u7b56\u8fb9\u754c\u5bf9\u9f50\uff0c\u53ef\u6269\u5c55\u81f3\u672a\u6765\u5de1\u5929\u4efb\u52a1\u3002", "categories": ["astro-ph.IM", "astro-ph.GA", "astro-ph.HE", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05393", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5929\u6587\u77ac\u53d8\u4f53\u5206\u7c7b", "\u5f31\u76d1\u7763\u5b66\u4e60", "\u4e0d\u786e\u5b9a\u6027\u91cf\u5316", "\u6df1\u5ea6\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05393v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Interpretable Human-Label-Free Deep Learning for Real-Bogus Classification with Uncertainty Quantification", "tldr": "\u9488\u5bf9\u65f6\u57df\u5de1\u5929\u4e2d\u7684\u771f\u5b9e/\u4f2a\u5019\u9009\u4f53\u5206\u7c7b\u95ee\u9898\uff0c\u63d0\u51fa\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u7684\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff1a\u5229\u7528\u6ce8\u5165\u77ac\u53d8\u4f53\u4e0e\u566a\u58f0\u4e3b\u5bfc\u7684\u5de1\u5929\u6570\u636e\uff0c\u7ed3\u5408\u975e\u5bf9\u79f0\u534f\u540c\u8bad\u7ec3\u53cc\u7f51\u7edc\uff0c\u5e76\u8bbe\u8ba1\u4f4e\u6210\u672c\u6df7\u5408\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u7b56\u7565\u3002\u65b9\u6cd5\u5728\u5f3a\u7c7b\u522b\u6c61\u67d3\u4e0b\u4fdd\u6301\u7a33\u5b9a\uff0c\u6821\u51c6\u4e0d\u786e\u5b9a\u6027\u4e0e\u51b3\u7b56\u8fb9\u754c\u5bf9\u9f50\uff0c\u53ef\u6269\u5c55\u81f3\u672a\u6765\u5de1\u5929\u4efb\u52a1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "What does a discrete diffusion model learn: a denoiser, a score ratio, or a bridge plug-in predictor? At the level of jump rates, these are one object in different coordinates, and reading a neural network in the wrong coordinate changes the process being trained and sampled. Starting with a rigorous derivation of the continuous-time Markov chain (CTMC) ELBO for any noising process, boundary terms included, we prove the \\emph{Oracle Distance} theorem: the negative ELBO is exactly equal to the data entropy plus the path KL from the oracle reverse process to the learned one, not merely a bound. Its unique optimizer is therefore the conditional expectation of the true reverse jump rate given the current noisy state, and its irreducible cost is the rate at which the forward process $Z_t$ destroys information about the clean data $Z_0$, $-\\tfrac{d}{dt}I(Z_0; Z_t)$, so every noising process shares the same best achievable negative ELBO: the data entropy. For sequences with token-factorizing noise, the oracle projection yields three exact coordinates for the optimizer: denoiser, cavity (bridge plug-in), and score, with closed-form conversions among them. This framework identifies which law each loss in the literature actually optimizes, recovering MDM, UDM, SEDD, and GIDD as special cases; explains why denoiser and cavity coincide for masked diffusion but not for uniform diffusion; proves that a denoiser parameterization makes the uniform ELBO diverge at initialization while the bridge plug-in stays finite; and calibrates ELBO implementations exactly at initialization. Every identity is verified numerically, without approximation, on an exactly solvable model.", "arxiv_id": "2607.05381", "arxiv_url": "https://arxiv.org/abs/2607.05381", "authors": ["Rodrigo Casado Noguerales", "Bernhard Sch\u00f6lkopf", "Thomas Hofmann", "Aran Raoufi"], "brief": "\u672c\u6587\u5bf9\u79bb\u6563\u6269\u6563\u6a21\u578b\u7684\u5b66\u4e60\u76ee\u6807\u8fdb\u884c\u4e86\u4e25\u683c\u7684\u7406\u8bba\u5206\u6790\uff0c\u8bc1\u660e\u4e86\"Oracle Distance\"\u5b9a\u7406\uff1a\u8d1fELBO\u6070\u597d\u7b49\u4e8e\u6570\u636e\u71b5\u52a0\u4e0a\u771f\u5b9e\u9006\u8fc7\u7a0b\u4e0e\u5b66\u4e60\u9006\u8fc7\u7a0b\u4e4b\u95f4\u7684\u8def\u5f84KL\u6563\u5ea6\uff0c\u800c\u975e\u4ec5\u662f\u4e0a\u754c\u3002\u8be5\u6846\u67b6\u7edf\u4e00\u4e86\u53bb\u566a\u5668\u3001\u7a7a\u8154\u9884\u6d4b\u5668\u548c\u5f97\u5206\u51fd\u6570\u4e09\u79cd\u53c2\u6570\u5316\u5750\u6807\uff0c\u89e3\u91ca\u4e86\u4e3a\u4f55\u4e0d\u540c\u53c2\u6570\u5316\u5728\u5747\u5300\u6269\u6563\u4e2d\u884c\u4e3a\u4e0d\u540c\uff0c\u5e76\u5c06MDM\u3001SEDD\u7b49\u73b0\u6709\u65b9\u6cd5\u7eb3\u5165\u540c\u4e00\u6846\u67b6\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.IT", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05381", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u79bb\u6563\u751f\u6210\u6a21\u578b", "\u53d8\u5206\u63a8\u65ad", "\u4fe1\u606f\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05381v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "What Does a Discrete Diffusion Model Learn?", "tldr": "\u672c\u6587\u5bf9\u79bb\u6563\u6269\u6563\u6a21\u578b\u7684\u5b66\u4e60\u76ee\u6807\u8fdb\u884c\u4e86\u4e25\u683c\u7684\u7406\u8bba\u5206\u6790\uff0c\u8bc1\u660e\u4e86\"Oracle Distance\"\u5b9a\u7406\uff1a\u8d1fELBO\u6070\u597d\u7b49\u4e8e\u6570\u636e\u71b5\u52a0\u4e0a\u771f\u5b9e\u9006\u8fc7\u7a0b\u4e0e\u5b66\u4e60\u9006\u8fc7\u7a0b\u4e4b\u95f4\u7684\u8def\u5f84KL\u6563\u5ea6\uff0c\u800c\u975e\u4ec5\u662f\u4e0a\u754c\u3002\u8be5\u6846\u67b6\u7edf\u4e00\u4e86\u53bb\u566a\u5668\u3001\u7a7a\u8154\u9884\u6d4b\u5668\u548c\u5f97\u5206\u51fd\u6570\u4e09\u79cd\u53c2\u6570\u5316\u5750\u6807\uff0c\u89e3\u91ca\u4e86\u4e3a\u4f55\u4e0d\u540c\u53c2\u6570\u5316\u5728\u5747\u5300\u6269\u6563\u4e2d\u884c\u4e3a\u4e0d\u540c\uff0c\u5e76\u5c06MDM\u3001SEDD\u7b49\u73b0\u6709\u65b9\u6cd5\u7eb3\u5165\u540c\u4e00\u6846\u67b6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Streaming speech-to-speech language models aim to answer spoken queries directly with synthetic speech. However, standard speech and text benchmarks do not capture whether these systems behave naturally in conversations, where timing, turn-taking, prosody, interpersonal stance, language and dialect consistency, and relationship-aware appropriateness jointly shape perceived quality. We introduce SPEARBench, a benchmark for evaluating naturalness in speech-to-speech language models from question-answer interactions. SPEARBench constructs controlled dialogue prompts from the Seamless Interaction corpus, runs inference across multiple models, and evaluates generated answers using a multidimensional protocol that covers response latency, interruptions, speech quality, ASR robustness, language and dialect consistency, emotional naturalness, interpersonal stance, and explainable distributional baselines. The benchmark includes original human answers as a reference condition and reports results for several contemporary models. Results show that current models can achieve high signal-level quality and low ASR error while still differing from human conversational behavior in latency, overlap, dialect preservation, emotional adaptation, and interpersonal stance dynamics.", "arxiv_id": "2607.05365", "arxiv_url": "https://arxiv.org/abs/2607.05365", "authors": ["Thomas Thebaud", "Yuzhe Wang", "Hao Zhang", "Sathvik Manikantan Napa Ugandhar", "Ashish Hallur", "Georgi Tinchev", "Venkatesh Ravichandran", "Laureano Moro-Velazquez"], "brief": "\u63d0\u51faSPEARBench\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u6d41\u5f0f\u8bed\u97f3\u5230\u8bed\u97f3\u8bed\u8a00\u6a21\u578b\u5728\u5bf9\u8bdd\u4e2d\u7684\u81ea\u7136\u5ea6\uff0c\u6db5\u76d6\u54cd\u5e94\u5ef6\u8fdf\u3001\u6253\u65ad\u3001\u60c5\u611f\u3001\u65b9\u8a00\u4e00\u81f4\u6027\u7b49\u591a\u7ef4\u5ea6\u6307\u6807\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5f53\u524d\u6a21\u578b\u5728\u4fe1\u53f7\u8d28\u91cf\u4e0a\u8868\u73b0\u826f\u597d\uff0c\u4f46\u5728\u5ef6\u8fdf\u3001\u65b9\u8a00\u4fdd\u7559\u3001\u60c5\u611f\u9002\u5e94\u548c\u4eba\u9645\u7acb\u573a\u7b49\u65b9\u9762\u4ecd\u4e0e\u4eba\u7c7b\u5bf9\u8bdd\u884c\u4e3a\u5b58\u5728\u5dee\u8ddd\u3002", "categories": ["cs.CL", "cs.AI", "eess.AS"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05365", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u97f3\u8bed\u8a00\u6a21\u578b", "\u5bf9\u8bdd\u81ea\u7136\u5ea6", "\u57fa\u51c6\u8bc4\u6d4b", "\u6d41\u5f0f\u8bed\u97f3\u5408\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05365v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SPEARBench: A Benchmark for Naturalness Evaluation in Streaming Speech-to-Speech Language Models", "tldr": "\u63d0\u51faSPEARBench\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u6d41\u5f0f\u8bed\u97f3\u5230\u8bed\u97f3\u8bed\u8a00\u6a21\u578b\u5728\u5bf9\u8bdd\u4e2d\u7684\u81ea\u7136\u5ea6\uff0c\u6db5\u76d6\u54cd\u5e94\u5ef6\u8fdf\u3001\u6253\u65ad\u3001\u60c5\u611f\u3001\u65b9\u8a00\u4e00\u81f4\u6027\u7b49\u591a\u7ef4\u5ea6\u6307\u6807\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5f53\u524d\u6a21\u578b\u5728\u4fe1\u53f7\u8d28\u91cf\u4e0a\u8868\u73b0\u826f\u597d\uff0c\u4f46\u5728\u5ef6\u8fdf\u3001\u65b9\u8a00\u4fdd\u7559\u3001\u60c5\u611f\u9002\u5e94\u548c\u4eba\u9645\u7acb\u573a\u7b49\u65b9\u9762\u4ecd\u4e0e\u4eba\u7c7b\u5bf9\u8bdd\u884c\u4e3a\u5b58\u5728\u5dee\u8ddd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern autoregressive ASR systems can emit timestamps as decoded tokens, enabling timestamped transcription without frame-level aligners or inference-time post-processing. We show that these generated timestamps can drift across long non-speech spans: the transcript may remain plausible, but the decoded time axis drifts away from the audio. We study this non-speech-induced timestamp drift with self-built gap and long-gap benchmarks across 15 evaluated timestamp-producing ASR and audio-language systems. Naive timestamp-corrected fine-tuning improves alignment but can severely degrade non-target ASR behavior, exposing a forgetting problem. We propose REDDIT(REplay-based Distribution eDITing), a lightweight two-stage post-training framework that corrects timestamps while avoiding this catastrophic forgetting: it first edits timestamp targets under the model\u0027s own replayed decoder context while matching the frozen base distribution on non-timestamp tokens, then applies a short edited-prefix refinement stage. In this framework, we construct correction supervision without human transcripts or human timestamp annotations by combining VAD-trimmed speech spans with inserted non-speech gaps and known concatenation offsets. On Whisper-tiny, 34.9 hours of targeted correction audio used and only 1.6% of model parameters updated, raising long-gap mIoU from 38.7% to 95.0% and reducing mixed-gap out-of-domain AAS from 2752 ms to 223 ms while preserving CV-en MER at 41.3% (versus 524.2% for ordinary SFT decoder tuning).", "arxiv_id": "2607.05364", "arxiv_url": "https://arxiv.org/abs/2607.05364", "authors": ["Cheng-Kang Chou", "Ming-To Chuang", "Ke-Han Lu", "Chan-Jan Hsu", "Hung-yi Lee"], "brief": "\u81ea\u56de\u5f52ASR\u7cfb\u7edf\u5728\u957f\u6bb5\u65e0\u8bed\u97f3\u533a\u95f4\u4f1a\u4ea7\u751f\u65f6\u95f4\u6233\u6f02\u79fb\u95ee\u9898\uff0c\u672c\u6587\u63d0\u51faREDDIT\u6846\u67b6\uff0c\u901a\u8fc7\u57fa\u4e8e\u56de\u653e\u7684\u5206\u5e03\u7f16\u8f91\u4e24\u9636\u6bb5\u540e\u8bad\u7ec3\u65b9\u6cd5\uff0c\u5728\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u7684\u60c5\u51b5\u4e0b\u7ea0\u6b63\u65f6\u95f4\u6233\u6f02\u79fb\uff0c\u540c\u65f6\u907f\u514d\u707e\u96be\u6027\u9057\u5fd8\u3002\u5728Whisper-tiny\u4e0a\uff0c\u957f\u95f4\u9694mIoU\u4ece38.7%\u63d0\u5347\u81f395.0%\uff0c\u65f6\u95f4\u8bef\u5dee\u4ece2752ms\u964d\u81f3223ms\uff0c\u540c\u65f6\u4fdd\u6301\u539f\u6709\u8f6c\u5f55\u6027\u80fd\u3002", "categories": ["cs.CL", "cs.AI", "cs.SD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05364", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u8bed\u97f3\u8bc6\u522b", "\u65f6\u95f4\u6233\u6821\u6b63", "\u707e\u96be\u6027\u9057\u5fd8", "\u6301\u7eed\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05364v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "REDDIT: Correcting Model-Generated Timestamp Drift in ASR without Forgetting via Replay-Based Distribution Editing", "tldr": "\u81ea\u56de\u5f52ASR\u7cfb\u7edf\u5728\u957f\u6bb5\u65e0\u8bed\u97f3\u533a\u95f4\u4f1a\u4ea7\u751f\u65f6\u95f4\u6233\u6f02\u79fb\u95ee\u9898\uff0c\u672c\u6587\u63d0\u51faREDDIT\u6846\u67b6\uff0c\u901a\u8fc7\u57fa\u4e8e\u56de\u653e\u7684\u5206\u5e03\u7f16\u8f91\u4e24\u9636\u6bb5\u540e\u8bad\u7ec3\u65b9\u6cd5\uff0c\u5728\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u7684\u60c5\u51b5\u4e0b\u7ea0\u6b63\u65f6\u95f4\u6233\u6f02\u79fb\uff0c\u540c\u65f6\u907f\u514d\u707e\u96be\u6027\u9057\u5fd8\u3002\u5728Whisper-tiny\u4e0a\uff0c\u957f\u95f4\u9694mIoU\u4ece38.7%\u63d0\u5347\u81f395.0%\uff0c\u65f6\u95f4\u8bef\u5dee\u4ece2752ms\u964d\u81f3223ms\uff0c\u540c\u65f6\u4fdd\u6301\u539f\u6709\u8f6c\u5f55\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Planning under uncertainty in continuous domains is essential for autonomous systems, yet computationally demanding. Tree-based search methods such as Monte Carlo Tree Search (MCTS) remain popular, but their branching structure can require sampling budgets that grow exponentially with lookahead depth in the worst case. From a tree perspective, continuous state or action spaces become especially challenging, since the planner must decide where to search in an infinite branching hierarchy. We propose Graph Sparse Sampling (GSS), an online planning algorithm that shares sampled futures across many candidate decisions, rather than sampling separate successors for each candidate action. This branch-free graph exposes large GPU-friendly batches, while using heuristics to focus computation. We prove finite-sample performance guarantees for GSS covering full-rank or low-rank generative simulators via smoothed backups, and discrete or sampled continuous action spaces. Under suitable overlap, regularity, and action-coverage conditions, these bounds have polynomial dependence on the planning horizon, formalizing when shared futures can avoid the exponential horizon dependence of tree-shaped sparse sampling. We demonstrate continuous-control simulations where GSS substantially outperforms tree-based planners on long horizons or achieves near-optimal performance, supporting no-branching graph planning as a complementary design principle for online control.", "arxiv_id": "2607.05359", "arxiv_url": "https://arxiv.org/abs/2607.05359", "authors": ["Idan Lev-Yehudi", "Vadim Indelman"], "brief": "\u63d0\u51fa\u56fe\u7a00\u758f\u91c7\u6837\uff08GSS\uff09\u7b97\u6cd5\uff0c\u901a\u8fc7\u5728\u591a\u4e2a\u5019\u9009\u51b3\u7b56\u95f4\u5171\u4eab\u91c7\u6837\u7684\u672a\u6765\u72b6\u6001\uff0c\u5c06\u6811\u5f62\u641c\u7d22\u7ed3\u6784\u6539\u4e3a\u65e0\u5206\u652f\u56fe\u7ed3\u6784\uff0c\u4ece\u800c\u6253\u7834\u8fde\u7eedMDP\u89c4\u5212\u4e2d\u89c4\u5212\u6df1\u5ea6\u6307\u6570\u7ea7\u589e\u957f\u7684\u8bc5\u5492\u3002\u7406\u8bba\u4e0a\u8bc1\u660e\u4e86\u591a\u9879\u5f0f\u7ea7\u522b\u7684\u89c4\u5212\u65f6\u57df\u4f9d\u8d56\u6027\u4fdd\u8bc1\uff0c\u5b9e\u9a8c\u4e2d\u5728\u957f\u65f6\u57df\u8fde\u7eed\u63a7\u5236\u4efb\u52a1\u4e0a\u663e\u8457\u4f18\u4e8e\u6811\u5f62\u89c4\u5212\u5668\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05359", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22", "\u5728\u7ebf\u89c4\u5212", "\u8fde\u7eed\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05359v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Graph Sparse Sampling: Breaking the Curse of the Horizon in Continuous MDP Planning", "tldr": "\u63d0\u51fa\u56fe\u7a00\u758f\u91c7\u6837\uff08GSS\uff09\u7b97\u6cd5\uff0c\u901a\u8fc7\u5728\u591a\u4e2a\u5019\u9009\u51b3\u7b56\u95f4\u5171\u4eab\u91c7\u6837\u7684\u672a\u6765\u72b6\u6001\uff0c\u5c06\u6811\u5f62\u641c\u7d22\u7ed3\u6784\u6539\u4e3a\u65e0\u5206\u652f\u56fe\u7ed3\u6784\uff0c\u4ece\u800c\u6253\u7834\u8fde\u7eedMDP\u89c4\u5212\u4e2d\u89c4\u5212\u6df1\u5ea6\u6307\u6570\u7ea7\u589e\u957f\u7684\u8bc5\u5492\u3002\u7406\u8bba\u4e0a\u8bc1\u660e\u4e86\u591a\u9879\u5f0f\u7ea7\u522b\u7684\u89c4\u5212\u65f6\u57df\u4f9d\u8d56\u6027\u4fdd\u8bc1\uff0c\u5b9e\u9a8c\u4e2d\u5728\u957f\u65f6\u57df\u8fde\u7eed\u63a7\u5236\u4efb\u52a1\u4e0a\u663e\u8457\u4f18\u4e8e\u6811\u5f62\u89c4\u5212\u5668\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Watermarking methods embed imperceptible and verifiable signals into text generated by large language models (LLMs). Existing approaches include zero-bit schemes for distinguishing synthetic text from human writing and multi-bit schemes for embedding metadata. However, current multi-bit watermarking methods do not allow selective disclosure: verifying any part of the watermark requires revealing the entire embedded message. This lack of control leads to unnecessary information exposure and raises privacy concerns. We propose Hierarchical Vocabulary Routing (HeRo), a watermarking framework that enables selective disclosure of embedded metadata. The method recursively partitions the vocabulary and distributes watermark information across hierarchical layers, so that different verifiers can decode only the portions of the payload corresponding to their access level. We show that the proposed scheme preserves the unbiasedness of the underlying sampling process and thus maintains text quality. Experiments demonstrate that our framework supports fine-grained access control while achieving high detection accuracy and low latency. Code is available at https://github.com/xuyangc03/hero-watermark.", "arxiv_id": "2607.05353", "arxiv_url": "https://arxiv.org/abs/2607.05353", "authors": ["Xuyang Chen", "Xiang Li", "Yangxinyu Xie", "Qi Long"], "brief": "\u63d0\u51faHHeRo\u6846\u67b6\uff0c\u901a\u8fc7\u9012\u5f52\u8bcd\u6c47\u8868\u5206\u533a\u5b9e\u73b0\u5927\u8bed\u8a00\u6a21\u578b\u6c34\u5370\u7684\u5206\u5c42\u9009\u62e9\u6027\u62ab\u9732\uff0c\u4e0d\u540c\u9a8c\u8bc1\u8005\u53ea\u80fd\u89e3\u7801\u5176\u6743\u9650\u5bf9\u5e94\u7684\u6c34\u5370\u4fe1\u606f\u3002\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u6587\u672c\u8d28\u91cf\u7684\u540c\u65f6\uff0c\u652f\u6301\u7ec6\u7c92\u5ea6\u8bbf\u95ee\u63a7\u5236\uff0c\u5e76\u5b9e\u73b0\u9ad8\u68c0\u6d4b\u7cbe\u5ea6\u548c\u4f4e\u5ef6\u8fdf\u3002", "categories": ["cs.CR", "cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05353", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6c34\u5370", "\u9690\u79c1\u4fdd\u62a4", "\u8bbf\u95ee\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05353v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Selective Disclosure Watermarking for Large Language Models", "tldr": "\u63d0\u51faHHeRo\u6846\u67b6\uff0c\u901a\u8fc7\u9012\u5f52\u8bcd\u6c47\u8868\u5206\u533a\u5b9e\u73b0\u5927\u8bed\u8a00\u6a21\u578b\u6c34\u5370\u7684\u5206\u5c42\u9009\u62e9\u6027\u62ab\u9732\uff0c\u4e0d\u540c\u9a8c\u8bc1\u8005\u53ea\u80fd\u89e3\u7801\u5176\u6743\u9650\u5bf9\u5e94\u7684\u6c34\u5370\u4fe1\u606f\u3002\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u6587\u672c\u8d28\u91cf\u7684\u540c\u65f6\uff0c\u652f\u6301\u7ec6\u7c92\u5ea6\u8bbf\u95ee\u63a7\u5236\uff0c\u5e76\u5b9e\u73b0\u9ad8\u68c0\u6d4b\u7cbe\u5ea6\u548c\u4f4e\u5ef6\u8fdf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We introduce the first multiplayer world model for highly dynamic environments governed by complex physical interactions. Whereas single-player world models treat the other agents as part of the environment, ours conditions on the action streams of multiple agents, learning to attribute changes in the scene to the correct player and to stay coherent under arbitrary combinations of their actions. We study this problem in the game of Rocket League, where players compete and cooperate under fast, tightly coupled dynamics. Trained on 10,000 hours of gameplay collected with publicly available bots, our 5-billion-parameter latent diffusion model generates four-player matches in real time, producing 20 frames per second on a single Nvidia B200 GPU. Although trained only on short clips, its rollouts stay stable far beyond the training horizon: distributional quality holds steady out to five minutes, the longest horizon we measure, and in practice we observe rollouts continuing for hours with no sign of collapse. We systematically investigate the central design choices: the video codec, the generative objective, and the multiplayer conditioning scheme. In addition, we characterize how behavior changes with model and data scale, including the capabilities that emerge and the failure modes that persist. We further develop targeted evaluations that probe the model\u0027s physical understanding rather than visual appearance alone. To support continued research on multiplayer world models, we release our dataset, our full training and inference codebase, and a live demo.", "arxiv_id": "2607.05352", "arxiv_url": "https://arxiv.org/abs/2607.05352", "authors": ["Anthony Hu", "V\u00e1clav Volhejn", "Adrien Ramanana Rahary", "Chris Mulder", "Aditya Makkar", "Am\u00e9lie Royer", "Manu Orsini", "Alyx Liao", "Adam Jelley", "Eloi Alonso", "Florian Laurent", "Fredrik Nor\u00e9n", "James Swingos", "Jan H\u00fcnermann", "Kent Rollins", "Lucas Hosseini", "Matthieu Le Cauchois", "Maxim Peter", "Pim de Witte", "Tim Brown", "Vincent Micheli", "Moritz B\u00f6hle", "Gabriel de Marmiesse", "Viktoriia Sharmanska", "Lucia Specia", "Michael Black", "Patrick P\u00e9rez"], "brief": "\u63d0\u51fa\u9996\u4e2a\u591a\u4eba\u6e38\u620f\u4e16\u754c\u6a21\u578b\uff0c\u4ee5\u300a\u706b\u7bad\u8054\u76df\u300b\u4e3a\u7814\u7a76\u573a\u666f\uff0c\u901a\u8fc750\u4ebf\u53c2\u6570\u7684\u6f5c\u5728\u6269\u6563\u6a21\u578b\u540c\u65f6\u5efa\u6a21\u591a\u4e2a\u73a9\u5bb6\u7684\u52a8\u4f5c\u6d41\uff0c\u5b9e\u73b0\u5b9e\u65f6\u56db\u4eba\u5bf9\u6218\u751f\u6210\uff0820fps\uff09\u3002\u6a21\u578b\u4ec5\u5728\u77ed\u7247\u6bb5\u4e0a\u8bad\u7ec3\uff0c\u4f46\u63a8\u7406\u65f6\u53ef\u7a33\u5b9a\u8fd0\u884c\u6570\u5c0f\u65f6\u800c\u4e0d\u5d29\u6e83\uff0c\u5e76\u5c55\u73b0\u51fa\u5bf9\u7269\u7406\u4ea4\u4e92\u7684\u7406\u89e3\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05352", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u6269\u6563\u6a21\u578b", "\u591a\u667a\u80fd\u4f53", "\u89c6\u9891\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05352v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Multiplayer Interactive World Models with Representation Autoencoders", "tldr": "\u63d0\u51fa\u9996\u4e2a\u591a\u4eba\u6e38\u620f\u4e16\u754c\u6a21\u578b\uff0c\u4ee5\u300a\u706b\u7bad\u8054\u76df\u300b\u4e3a\u7814\u7a76\u573a\u666f\uff0c\u901a\u8fc750\u4ebf\u53c2\u6570\u7684\u6f5c\u5728\u6269\u6563\u6a21\u578b\u540c\u65f6\u5efa\u6a21\u591a\u4e2a\u73a9\u5bb6\u7684\u52a8\u4f5c\u6d41\uff0c\u5b9e\u73b0\u5b9e\u65f6\u56db\u4eba\u5bf9\u6218\u751f\u6210\uff0820fps\uff09\u3002\u6a21\u578b\u4ec5\u5728\u77ed\u7247\u6bb5\u4e0a\u8bad\u7ec3\uff0c\u4f46\u63a8\u7406\u65f6\u53ef\u7a33\u5b9a\u8fd0\u884c\u6570\u5c0f\u65f6\u800c\u4e0d\u5d29\u6e83\uff0c\u5e76\u5c55\u73b0\u51fa\u5bf9\u7269\u7406\u4ea4\u4e92\u7684\u7406\u89e3\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We study why diffusion autoencoders can achieve similar image quality while learning substantially different latent structures. We trace this behaviour to optimisation dynamics; we analyse curves of image reconstruction against latent representation quality, revealing trajectories that organise around two distinct regimes early in training. Models in the reconstruction regime prioritise image fidelity early, whereas those in the disentanglement regime improve reconstruction and disentanglement more gradually. We hypothesise that this behaviour can be influenced by targeting shortcut pathways in the diffusion U-Net and controlling early noise-level exposure, thereby shaping the reconstruction-disentanglement trade-off during training. To steer optimisation toward stronger representations, we introduce SteeringDRL, combining gated residual U-Nets with a simple noise-level exposure curriculum for training. Across disentanglement benchmarks, SteeringDRL improves representation quality and reduces seed sensitivity. Our method further extends to spatial disentanglement in object-centric learning, improving segmentation quality on synthetic and real-world datasets.", "arxiv_id": "2607.05319", "arxiv_url": "https://arxiv.org/abs/2607.05319", "authors": ["Rajat Rasal", "Avinash Kori", "Tian Xia", "Ben Glocker"], "brief": "\u7814\u7a76\u6269\u6563\u81ea\u7f16\u7801\u5668\u5728\u5b66\u4e60\u4e0d\u540c\u6f5c\u5728\u7ed3\u6784\u65f6\u7684\u4f18\u5316\u52a8\u6001\uff0c\u53d1\u73b0\u8bad\u7ec3\u65e9\u671f\u5b58\u5728\"\u91cd\u5efa\u4f18\u5148\"\u548c\"\u89e3\u8026\u4f18\u5148\"\u4e24\u79cd\u8f68\u8ff9\u3002\u63d0\u51faSteeringDRL\u65b9\u6cd5\uff0c\u7ed3\u5408\u95e8\u63a7\u6b8b\u5deeU-Net\u4e0e\u566a\u58f0\u7ea7\u522b\u8bfe\u7a0b\u8bad\u7ec3\uff0c\u5728\u89e3\u8026\u57fa\u51c6\u548c\u4ee5\u5bf9\u8c61\u4e3a\u4e2d\u5fc3\u7684\u7a7a\u95f4\u5206\u5272\u4efb\u52a1\u4e0a\u5747\u53d6\u5f97\u66f4\u597d\u6548\u679c\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05319", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u8868\u793a\u5b66\u4e60", "\u89e3\u8026\u8868\u793a", "\u5bf9\u8c61\u4e2d\u5fc3\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05319v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Steering Optimisation Trajectories in Diffusion Representation Learning", "tldr": "\u7814\u7a76\u6269\u6563\u81ea\u7f16\u7801\u5668\u5728\u5b66\u4e60\u4e0d\u540c\u6f5c\u5728\u7ed3\u6784\u65f6\u7684\u4f18\u5316\u52a8\u6001\uff0c\u53d1\u73b0\u8bad\u7ec3\u65e9\u671f\u5b58\u5728\"\u91cd\u5efa\u4f18\u5148\"\u548c\"\u89e3\u8026\u4f18\u5148\"\u4e24\u79cd\u8f68\u8ff9\u3002\u63d0\u51faSteeringDRL\u65b9\u6cd5\uff0c\u7ed3\u5408\u95e8\u63a7\u6b8b\u5deeU-Net\u4e0e\u566a\u58f0\u7ea7\u522b\u8bfe\u7a0b\u8bad\u7ec3\uff0c\u5728\u89e3\u8026\u57fa\u51c6\u548c\u4ee5\u5bf9\u8c61\u4e3a\u4e2d\u5fc3\u7684\u7a7a\u95f4\u5206\u5272\u4efb\u52a1\u4e0a\u5747\u53d6\u5f97\u66f4\u597d\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Automated detection of intracranial aneurysms (IAs) from CT angiography (CTA) is severely hindered by high false-positive rates. Convolutional neural networks (CNNs) rely on local pixel intensities, causing systematic confusion between saccular aneurysms and vascular bifurcations -- a problem especially acute for small lesions (\u003c3 mm), where detection sensitivity falls below 60%. We propose a plug-and-play, topology-aware false-positive reduction framework evaluating the Smooth Euler Characteristic Transform (SECT) -- a directional representation encoding global 3D vascular geometry independently of intensity -- against persistence-based summaries (Persistence Images and Landscapes), tested on a stratified subset of the RSNA 2025 dataset. SECT achieves an AUC of 0.943, substantially outperforming direction-agnostic methods (AUC ~0.68), and exhibits a clinical performance inversion: it excels on the sub-3 mm cohort, maintaining 0.943 AUC and 78.5% sensitivity at 95% specificity. The representation is also scanner-agnostic, achieving 0.927 mean AUC under leave-one-scanner-out (LOGO) validation across four manufacturers. By capturing asymmetric geometric invariants rather than intensity profiles, SECT reliably resolves the primary structural confounder in IA detection, positioning it as a robust downstream filter for hybrid deep-learning diagnostic pipelines.", "arxiv_id": "2607.05317", "arxiv_url": "https://arxiv.org/abs/2607.05317", "authors": ["Akshay Gokhale", "Mansi Dhamne"], "brief": "\u9488\u5bf9\u9885\u5185\u52a8\u8109\u7624CT\u8840\u7ba1\u9020\u5f71\u68c0\u6d4b\u4e2d\u9ad8\u5047\u9633\u6027\u95ee\u9898\uff0c\u63d0\u51fa\u57fa\u4e8e\u5e73\u6ed1\u6b27\u62c9\u7279\u5f81\u53d8\u6362\uff08SECT\uff09\u7684\u62d3\u6251\u611f\u77e5\u5047\u9633\u6027\u51cf\u5c11\u6846\u67b6\uff0c\u901a\u8fc7\u7f16\u7801\u5168\u5c40\u4e09\u7ef4\u8840\u7ba1\u51e0\u4f55\u5f62\u72b6\u533a\u5206\u52a8\u8109\u7624\u4e0e\u8840\u7ba1\u5206\u53c9\u3002\u5728\u5c0f\u75c5\u7076\uff08\u003c3mm\uff09\u4e0aAUC\u8fbe0.943\u3001\u654f\u611f\u602778.5%\uff0c\u4e14\u5177\u5907\u8de8\u626b\u63cf\u4eea\u6cdb\u5316\u80fd\u529b\uff08LOGO\u9a8c\u8bc1AUC 0.927\uff09\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05317", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5206\u6790", "\u62d3\u6251\u6570\u636e\u5206\u6790", "\u52a8\u8109\u7624\u68c0\u6d4b", "\u5047\u9633\u6027\u6291\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05317v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Topological Shape Representation for Aneurysm -- Bifurcation Detection", "tldr": "\u9488\u5bf9\u9885\u5185\u52a8\u8109\u7624CT\u8840\u7ba1\u9020\u5f71\u68c0\u6d4b\u4e2d\u9ad8\u5047\u9633\u6027\u95ee\u9898\uff0c\u63d0\u51fa\u57fa\u4e8e\u5e73\u6ed1\u6b27\u62c9\u7279\u5f81\u53d8\u6362\uff08SECT\uff09\u7684\u62d3\u6251\u611f\u77e5\u5047\u9633\u6027\u51cf\u5c11\u6846\u67b6\uff0c\u901a\u8fc7\u7f16\u7801\u5168\u5c40\u4e09\u7ef4\u8840\u7ba1\u51e0\u4f55\u5f62\u72b6\u533a\u5206\u52a8\u8109\u7624\u4e0e\u8840\u7ba1\u5206\u53c9\u3002\u5728\u5c0f\u75c5\u7076\uff08\u003c3mm\uff09\u4e0aAUC\u8fbe0.943\u3001\u654f\u611f\u602778.5%\uff0c\u4e14\u5177\u5907\u8de8\u626b\u63cf\u4eea\u6cdb\u5316\u80fd\u529b\uff08LOGO\u9a8c\u8bc1AUC 0.927\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Model editing promises a fast, targeted way to correct post-deployment mistakes in medical vision-language models (VLMs) without costly retraining. However, existing multimodal model editing benchmarks focus on general-purpose tasks and do not reflect realistic clinical domain requirements and variability. To address this, we introduce M3Bench, a clinically grounded benchmark for multimodal model editing that evaluates whether an edit remains reliable, precise, and generalizable under the challenges of image and text variation, modality and protocol shifts, clinical knowledge composition, and temporal progression. M3Bench contains 16,276 questions spanning diverse anatomy, modalities, and specialties, and supports both single and sequential edits. By evaluating 4 representative editors across 6 medical and general VLMs, we find that no method excels across all criteria. Gradient-based editors achieve strong transfer but suffer from catastrophic locality violations, whereas memory-based methods preserve locality but lack compositional generality and exhibit high backbone-dependent hyperparameter sensitivity. We further attribute these failures to the latent space geometry of VLMs and how different editing methods shift its landscape. Overall, M3Bench establishes a rigorous clinical stress test for multimodal model editing and offers actionable guidance for safer post-deployment adaptation. The benchmark is publicly available at https://github.com/BioMed-AI-Lab-U-Michgan/M3Bench .", "arxiv_id": "2607.05310", "arxiv_url": "https://arxiv.org/abs/2607.05310", "authors": ["Guli Zhu", "Chenwei Wu", "Liyue Shen"], "brief": "\u63d0\u51faM3Bench\u2014\u2014\u9996\u4e2a\u9762\u5411\u533b\u7597\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u4e34\u5e8a\u591a\u6a21\u6001\u6a21\u578b\u7f16\u8f91\u57fa\u51c6\uff0c\u5305\u542b16,276\u9053\u6db5\u76d6\u591a\u89e3\u5256\u90e8\u4f4d\u3001\u6a21\u6001\u548c\u4e13\u79d1\u7684\u95ee\u9898\u3002\u8bc4\u4f304\u79cd\u7f16\u8f91\u65b9\u6cd5\u57286\u4e2a\u6a21\u578b\u4e0a\u7684\u8868\u73b0\uff0c\u53d1\u73b0\u68af\u5ea6\u7c7b\u65b9\u6cd5\u8fc1\u79fb\u6027\u5f3a\u4f46\u7834\u574f\u5c40\u90e8\u6027\uff0c\u8bb0\u5fc6\u7c7b\u65b9\u6cd5\u4fdd\u5c40\u90e8\u6027\u4f46\u7f3a\u4e4f\u7ec4\u5408\u6cdb\u5316\u80fd\u529b\uff0c\u5e76\u4ece\u6f5c\u5728\u7a7a\u95f4\u51e0\u4f55\u89d2\u5ea6\u89e3\u91ca\u4e86\u8fd9\u4e9b\u5931\u8d25\u539f\u56e0\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05310", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u7597\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u7f16\u8f91", "\u591a\u6a21\u6001", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05310v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Evaluating and Understanding Model Editing for Medical Vision Language Models", "tldr": "\u63d0\u51faM3Bench\u2014\u2014\u9996\u4e2a\u9762\u5411\u533b\u7597\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u4e34\u5e8a\u591a\u6a21\u6001\u6a21\u578b\u7f16\u8f91\u57fa\u51c6\uff0c\u5305\u542b16,276\u9053\u6db5\u76d6\u591a\u89e3\u5256\u90e8\u4f4d\u3001\u6a21\u6001\u548c\u4e13\u79d1\u7684\u95ee\u9898\u3002\u8bc4\u4f304\u79cd\u7f16\u8f91\u65b9\u6cd5\u57286\u4e2a\u6a21\u578b\u4e0a\u7684\u8868\u73b0\uff0c\u53d1\u73b0\u68af\u5ea6\u7c7b\u65b9\u6cd5\u8fc1\u79fb\u6027\u5f3a\u4f46\u7834\u574f\u5c40\u90e8\u6027\uff0c\u8bb0\u5fc6\u7c7b\u65b9\u6cd5\u4fdd\u5c40\u90e8\u6027\u4f46\u7f3a\u4e4f\u7ec4\u5408\u6cdb\u5316\u80fd\u529b\uff0c\u5e76\u4ece\u6f5c\u5728\u7a7a\u95f4\u51e0\u4f55\u89d2\u5ea6\u89e3\u91ca\u4e86\u8fd9\u4e9b\u5931\u8d25\u539f\u56e0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Super-resolving coarse atmospheric fields to local PM$_{2.5}$ variations is uniquely challenged by a mismatch in spatial support: while pixels represent regional averages, ground-truth observations are discrete, unaligned samples of a continuous spatial signal. To bridge this gap, we present a station-guided framework for high-resolution PM$_{2.5}$ downscaling over Europe. Taking coarse CAMS atmospheric composition fields alongside heterogeneous side information (i.e., human activity, land cover, elevation, satellite aerosol observations, and wind fields) our framework jointly super-resolves ($\\times 40$, $\\approx$ 1 km) and bias-corrects CAMS rasters, without relying on temporal sequence modelling. To address the challenge of densely supervising our multi-scale transformer network with sparse in-situ data, we introduce a time-agnostic propagation strategy that utilises spatial Gaussian blending of interpolated OpenAQ observations. Extensive qualitative and station-level evaluations across Europe demonstrate that our model recovers fine-grained spatial structures and effectively mitigates localised CAMS biases.", "arxiv_id": "2607.05292", "arxiv_url": "https://arxiv.org/abs/2607.05292", "authors": ["Guorun Wang", "Simone Foti", "Andreas D. Demou", "Leonidas Kotoulas", "Theodoros Christoudias", "Alexandros Koliousis", "Mihalis Nicolaou", "Stefanos Zafeiriou"], "brief": "\u9488\u5bf9\u7c97\u5206\u8fa8\u7387\u5927\u6c14\u6210\u5206\u573a\u4e0e\u7a00\u758f\u5730\u9762\u7ad9\u70b9\u89c2\u6d4b\u4e4b\u95f4\u7684\u7a7a\u95f4\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u7ad9\u70b9\u5f15\u5bfc\u7684PM2.5\u964d\u5c3a\u5ea6\u6846\u67b6\uff0c\u901a\u8fc7\u9ad8\u65af\u7a7a\u95f4\u63d2\u503c\u4f20\u64ad\u7b56\u7565\u751f\u6210\u4f2a\u76d1\u7763\u4fe1\u53f7\uff0c\u7ed3\u5408\u591a\u5c3a\u5ea6Transformer\u7f51\u7edc\u5b9e\u73b040\u500d\u8d85\u5206\u8fa8\u7387\uff08\u7ea61km\uff09\u5e76\u540c\u6b65\u6821\u6b63CAMS\u504f\u5dee\u3002\u5728\u6b27\u6d32\u8303\u56f4\u5185\u7684\u8bc4\u4f30\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u80fd\u6709\u6548\u6062\u590d\u7ec6\u7c92\u5ea6\u7a7a\u95f4\u7ed3\u6784\u5e76\u7f13\u89e3\u5c40\u90e8\u504f\u5dee\u3002", "categories": ["cs.LG", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05292", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7a7a\u6c14\u8d28\u91cf", "\u8d85\u5206\u8fa8\u7387", "\u591a\u5c3a\u5ea6Transformer", "\u9065\u611f"], "num_comments": 0, "o mpact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8111\u7535\u4fe1\u53f7", "\u751f\u7269\u6807\u5fd7\u7269", "\u53ef\u89e3\u91caAI", "\u5c0f\u6ce2\u53d8\u6362"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05282v1", "published_at": "2026-07-06", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Wavelet Scattering Transform for Interpretable Schizophrenia Biomarker Discovery and Classification from Resting-State EEG", "tldr": "\u63d0\u51fa\u57fa\u4e8e\u5c0f\u6ce2\u6563\u5c04\u53d8\u6362\uff08WST\uff09\u7684\u7cbe\u795e\u5206\u88c2\u75c7EEG\u8bca\u65ad\u6846\u67b6\uff0c\u7ed3\u5408\u4e25\u683c\u7684\u7559\u4e00\u88ab\u8bd5\u4ea4\u53c9\u9a8c\u8bc1\u548cSHAP\u53ef\u89e3\u91ca\u6027\u5206\u6790\uff0c\u5b9e\u73b090.48%\u5206\u7c7b\u51c6\u786e\u7387\uff08AUC=0.9339\uff09\u3002\u7814\u7a76\u53d1\u73b0\u4e8c\u9636\u6563\u5c04\u7cfb\u6570\uff08\u7f16\u7801\u8de8\u9891\u8026\u5408\uff09\u548c\u4f3d\u9a6c\u9891\u6bb5\u7279\u5f81\u662f\u6700\u5177\u5224\u522b\u529b\u7684\u751f\u7269\u6807\u5fd7\u7269\uff0cP3\u7535\u6781\u4e3a\u6700\u5173\u952e\u4f4d\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
