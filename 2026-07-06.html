52f\u4e00\u6062\u590d\u7684\u6f5c\u5728\u539f\u59cb\u53d8\u91cf\uff08\u5982\u7bb1\u7ebf\u56fe\u539f\u59cb\u6837\u672c\u3001\u997c\u56fe\u539f\u59cb\u6570\u503c\uff09\u66ff\u6362\u4e3a\u53ef\u4ece\u89c6\u89c9\u89c2\u6d4b\u76f4\u63a5\u7ea6\u675f\u7684\u91cf\uff08\u5982\u7edf\u8ba1\u6458\u8981\u3001\u767e\u5206\u6bd4\u3001\u9891\u6b21\u6743\u91cd\uff09\uff0c\u4ece\u6839\u672c\u4e0a\u6d88\u9664\u76d1\u7763\u4fe1\u53f7\u4e2d\u7684\u4e0d\u53ef\u8bc6\u522b\u76ee\u6807\u3002", "why_notable": "\u63ed\u793a\u4e86\u56fe\u8868\u4ee3\u7801\u751f\u6210\u9886\u57df\u4e00\u4e2a\u88ab\u5ffd\u89c6\u7684\u6839\u672c\u6027\u95ee\u9898\u2014\u2014\u76d1\u7763\u76ee\u6807\u7684\u53ef\u8bc6\u522b\u6027\uff0c\u6307\u51fa\u63d0\u5347\u6a21\u578b\u6027\u80fd\u4e0d\u4ec5\u9700\u8981\u66f4\u591a\u6570\u636e\u6216\u66f4\u597d\u7b97\u6cd5\uff0c\u66f4\u9700\u8981\u4e0e\u89c6\u89c9\u89c2\u6d4b\u4e00\u81f4\u7684\u76d1\u7763\u4fe1\u53f7\uff0c\u5bf9\u6570\u636e\u6784\u5efa\u8303\u5f0f\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Retrieval-Augmented Generation (RAG) improves factuality by grounding LLMs in external evidence, but real-world retrieval is often polluted: semantically relevant passages may contain subtle misinformation, misleading framings, or fabrications. We introduce MIRAGE, a training-free, model-agnostic defense for long-form RAG. MIRAGE builds an NLI-based cross-document claim graph and applies a Defended-Claims Gate to either condition generation on a consistent, multi-source supported subset or to block retrieval and answer parametrically. We also release a minimal-edit pollution protocol spanning four perturbation families (Unambiguous, Conflicting, Misleading, Fabricated) to construct matched clean, mixed, and fully polluted evaluation regimes. Across four long-form QA benchmarks and multiple commercial and open-weight LLMs, pollution severely degrades vanilla RAG, while MIRAGE consistently restores factuality under mixed and fully polluted evidence and outperforms prior robust-RAG methods. Our implementation and datasets are available at https://github.com/SaadElDine/MIRAGE.", "arxiv_id": "2607.05069", "arxiv_url": "https://arxiv.org/abs/2607.05069", "authors": ["Saadeldine Eletter", "Ruihong Zeng", "Yuxia Wang", "Maxim Panov", "Aleksandr Rubashevskii", "Preslav Nakov"], "brief": "\u63d0\u51faMIRAGE\uff0c\u4e00\u79cd\u514d\u8bad\u7ec3\u3001\u6a21\u578b\u65e0\u5173\u7684\u957f\u6587\u672cRAG\u9632\u5fa1\u7cfb\u7edf\uff0c\u901a\u8fc7\u6784\u5efa\u57fa\u4e8eNLI\u7684\u8de8\u6587\u6863\u58f0\u660e\u56fe\u548c\"\u5df2\u9a8c\u8bc1\u58f0\u660e\u95e8\u63a7\"\u673a\u5236\uff0c\u8fc7\u6ee4\u6c61\u67d3\u8bc1\u636e\u5e76\u6062\u590d\u751f\u6210\u4e8b\u5b9e\u6027\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05069", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efaNLI\u8de8\u6587\u6863\u58f0\u660e\u56fe\uff0c\u8bc6\u522b\u591a\u6e90\u4e00\u81f4\u652f\u6301\u7684\u58f0\u660e\u5b50\u96c6\uff0c\u5c4f\u853d\u77db\u76fe\u6216\u634f\u9020\u5185\u5bb9", "\u8bbe\u8ba1\u56db\u7c7b\u6700\u5c0f\u7f16\u8f91\u6c61\u67d3\u534f\u8bae\uff08\u65e0\u6b67\u4e49\u3001\u51b2\u7a81\u3001\u8bef\u5bfc\u3001\u634f\u9020\uff09\uff0c\u8986\u76d6\u5e72\u51c0/\u6df7\u5408/\u5168\u6c61\u67d3\u4e09\u79cd\u8bc4\u4f30\u573a\u666f", "\u5728\u56db\u4e2a\u957f\u6587\u672cQA\u57fa\u51c6\u548c\u591a\u4e2a\u5546\u4e1a/\u5f00\u6e90LLM\u4e0a\uff0cMIRAGE\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u9c81\u68d2RAG\u65b9\u6cd5"], "keywords": ["RAG", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4e8b\u5b9e\u6027", "\u9c81\u68d2\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05069v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MIRAGE: Defending Long-Form RAG Against Misinformation Pollution", "tldr": "MIRAGE\uff1a\u65e0\u9700\u8bad\u7ec3\u7684RAG\u9632\u5fa1\u6846\u67b6\uff0c\u62b5\u5fa1\u68c0\u7d22\u6587\u6863\u4e2d\u7684\u865a\u5047\u4fe1\u606f\u6c61\u67d3", "upvotes": 0, "what_it_is": "\u63d0\u51faMIRAGE\uff0c\u4e00\u79cd\u514d\u8bad\u7ec3\u3001\u6a21\u578b\u65e0\u5173\u7684\u957f\u6587\u672cRAG\u9632\u5fa1\u7cfb\u7edf\uff0c\u901a\u8fc7\u6784\u5efa\u57fa\u4e8eNLI\u7684\u8de8\u6587\u6863\u58f0\u660e\u56fe\u548c\"\u5df2\u9a8c\u8bc1\u58f0\u660e\u95e8\u63a7\"\u673a\u5236\uff0c\u8fc7\u6ee4\u6c61\u67d3\u8bc1\u636e\u5e76\u6062\u590d\u751f\u6210\u4e8b\u5b9e\u6027\u3002", "why_notable": "\u73b0\u5b9eRAG\u573a\u666f\u4e2d\u68c0\u7d22\u6c61\u67d3\u95ee\u9898\u4e25\u5cfb\u4f46\u7814\u7a76\u4e0d\u8db3\uff0cMIRAGE\u65e0\u9700\u5fae\u8c03\u5373\u53ef\u90e8\u7f72\uff0c\u517c\u5bb9\u4efb\u610fLLM\uff0c\u540c\u65f6\u63d0\u4f9b\u7cfb\u7edf\u6027\u6c61\u67d3\u8bc4\u4f30\u534f\u8bae\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Vision-language models (VLMs) perform well on visual question answering with high-quality images but struggle when questions require knowledge beyond what is clearly and directly visible. In such settings, uncertainty quantification should not only indicate whether the model is likely to fail but also diagnose why it is uncertain, across dimensions such as perception, entity recognition, and knowledge retrieval. While prior work has focused on individual failure modes in isolation or treated incorrect answers as monolithic failures, we propose a unified framework for disentangling these failure modes and investigate whether pre-generation signals can predict these failure sources. Across a range of datasets and model families, we find a consistent pattern in VLM errors: some failures arise from visual or recognition bottlenecks, while others persist after the relevant entity is identified. Our main finding is that these failure sources can be predicted before decoding: recognition-related failures are best captured by visual-token representations, while failures that remain after recognition are better captured by prompt-conditioned hidden states. This pre-generation signal enables efficient failure-source prediction before the model produces an answer, allowing uncertain cases to be routed to targeted interventions such as image repair, entity recognition support, or external retrieval.", "arxiv_id": "2607.04683", "arxiv_url": "https://arxiv.org/abs/2607.04683", "authors": ["Khang Nhat Hoang Vo", "Artem Vazhentsev", "Artem Shelmanov", "Timothy Baldwin", "Yova Kementchedjhieva"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u7edf\u4e00\u6846\u67b6\uff0c\u5c06VLM\u7684\u9519\u8bef\u5206\u89e3\u4e3a\u611f\u77e5/\u5b9e\u4f53\u8bc6\u522b\u74f6\u9888\u4e0e\u77e5\u8bc6\u68c0\u7d22\u5931\u8d25\u4e24\u7c7b\uff0c\u5e76\u53d1\u73b0\u53ef\u5728\u6a21\u578b\u751f\u6210\u7b54\u6848\u524d\u901a\u8fc7\u5185\u90e8\u8868\u5f81\u4fe1\u53f7\u9884\u6d4b\u5931\u8d25\u6765\u6e90\u3002", "categories": ["cs.CV", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04683", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bc6\u522b\u76f8\u5173\u5931\u8d25\uff08\u611f\u77e5/\u5b9e\u4f53\u8bc6\u522b\uff09\u53ef\u7531\u89c6\u89c9token\u8868\u5f81\u6355\u83b7\uff0c\u77e5\u8bc6\u68c0\u7d22\u5931\u8d25\u5219\u7531prompt\u6761\u4ef6\u5316\u9690\u85cf\u72b6\u6001\u66f4\u597d\u9884\u6d4b", "\u9884\u751f\u6210\u4fe1\u53f7\uff08pre-generation signal\uff09\u53ef\u5728\u89e3\u7801\u524d\u9ad8\u6548\u9884\u6d4b\u5931\u8d25\u7c7b\u578b\uff0c\u65e0\u9700\u7b49\u5f85\u6a21\u578b\u8f93\u51fa", "\u6839\u636e\u9884\u6d4b\u7684\u5931\u8d25\u6765\u6e90\uff0c\u53ef\u5c06\u4e0d\u786e\u5b9a\u6837\u672c\u8def\u7531\u81f3\u9488\u5bf9\u6027\u5e72\u9884\uff1a\u56fe\u50cf\u4fee\u590d\u3001\u5b9e\u4f53\u8bc6\u522b\u652f\u6301\u6216\u5916\u90e8\u68c0\u7d22"], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u4e0d\u786e\u5b9a\u6027\u91cf\u5316", "\u9519\u8bef\u5f52\u56e0", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04683v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Does It Fail to See or Fail to Know? Attributing Errors in Vision-Language Models", "tldr": "\u63d0\u51fa\u7edf\u4e00\u6846\u67b6\u533a\u5206\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u611f\u77e5\u5931\u8d25\u4e0e\u77e5\u8bc6\u5931\u8d25\uff0c\u5e76\u5728\u751f\u6210\u524d\u9884\u6d4b\u5931\u8d25\u6765\u6e90", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u4e2a\u7edf\u4e00\u6846\u67b6\uff0c\u5c06VLM\u7684\u9519\u8bef\u5206\u89e3\u4e3a\u611f\u77e5/\u5b9e\u4f53\u8bc6\u522b\u74f6\u9888\u4e0e\u77e5\u8bc6\u68c0\u7d22\u5931\u8d25\u4e24\u7c7b\uff0c\u5e76\u53d1\u73b0\u53ef\u5728\u6a21\u578b\u751f\u6210\u7b54\u6848\u524d\u901a\u8fc7\u5185\u90e8\u8868\u5f81\u4fe1\u53f7\u9884\u6d4b\u5931\u8d25\u6765\u6e90\u3002", "why_notable": "\u9996\u6b21\u5c06VLM\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u4e0e\u5931\u8d25\u5f52\u56e0\u7edf\u4e00\uff0c\u5b9e\u73b0\u7ec6\u7c92\u5ea6\u8bca\u65ad\u5e76\u652f\u6301\u6709\u9488\u5bf9\u6027\u7684\u4fee\u590d\u7b56\u7565\uff0c\u5bf9VLM\u53ef\u9760\u6027\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Training-free concept erasure is an attractive mechanism for controlling text-to-image diffusion models, but precise erasure often comes at the cost of damaging semantically related non-target concepts. Existing value-space methods remove the component of each cross-attention value along the target concept direction, implicitly treating target identity and shared visual structure as the same signal. We argue that this is the source of much of the collateral damage in prior preservation. We introduce CARE, a closed-form concept erasure operator that replaces the raw target direction with a kept-subspace-aware direction computed from a small bank of retained concept anchors. The resulting edit is applied directly in cross-attention value space, requires no model fine-tuning, and adds only a negligible offline computation. A single shrinkage parameter controls the erase-preserve trade-off. We further show that the operator admits a minimum-disturbance interpretation and, in its projection form, leaves the kept subspace invariant. Experiments under the standard concept-erasure protocol show that our method preserves non-target concepts more faithfully while maintaining competitive erasure across instance, style, and celebrity concepts. Code: https://github.com/parthupman/care", "arxiv_id": "2607.05274", "arxiv_url": "https://arxiv.org/abs/2607.05274", "authors": ["Parth Upman", "Nishita Jain", "Shreyank N Gowda"], "brief": "\u63d0\u51faCARE\uff08\u95ed\u5408\u5f62\u5f0f\u6982\u5ff5\u64e6\u9664\u7b97\u5b50\uff09\uff0c\u901a\u8fc7\u5728\u4ea4\u53c9\u6ce8\u610f\u529b\u503c\u7a7a\u95f4\u4e2d\u5f15\u5165\u4fdd\u7559\u5b50\u7a7a\u95f4\u611f\u77e5\u65b9\u5411\uff0c\u5b9e\u73b0\u5bf9\u6587\u672c\u5230\u56fe\u50cf\u6269\u6563\u6a21\u578b\u4e2d\u76ee\u6807\u6982\u5ff5\u7684\u7cbe\u51c6\u64e6\u9664\uff0c\u540c\u65f6\u4fdd\u62a4\u8bed\u4e49\u76f8\u5173\u7684\u975e\u76ee\u6807\u6982\u5ff5\u4e0d\u53d7\u635f\u4f24\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05274", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u7528\u5c11\u91cf\u4fdd\u7559\u6982\u5ff5\u951a\u70b9\u8ba1\u7b97\u0027\u4fdd\u7559\u5b50\u7a7a\u95f4\u611f\u77e5\u65b9\u5411\u0027\u66ff\u4ee3\u539f\u59cb\u76ee\u6807\u65b9\u5411\uff0c\u4ece\u6839\u672c\u4e0a\u89e3\u51b3\u9644\u5e26\u635f\u4f24\u95ee\u9898", "\u65e0\u9700\u6a21\u578b\u5fae\u8c03\uff0c\u76f4\u63a5\u5728\u4ea4\u53c9\u6ce8\u610f\u529b\u503c\u7a7a\u95f4\u95ed\u5408\u5f62\u5f0f\u6c42\u89e3\uff0c\u4ec5\u9700\u53ef\u5ffd\u7565\u7684\u79bb\u7ebf\u8ba1\u7b97\u5f00\u9500", "\u5355\u4e00\u6536\u7f29\u53c2\u6570\u63a7\u5236\u64e6\u9664-\u4fdd\u7559\u6743\u8861\uff0c\u6295\u5f71\u5f62\u5f0f\u4e0b\u53ef\u8bc1\u660e\u4fdd\u7559\u5b50\u7a7a\u95f4\u4e0d\u53d8\u6027"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u6982\u5ff5\u64e6\u9664", "\u5185\u5bb9\u5b89\u5168", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05274v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Erasing Without Collateral Damage: Precise Concept Removal in Diffusion Models", "tldr": "CARE\uff1a\u65e0\u9700\u5fae\u8c03\u7684\u6269\u6563\u6a21\u578b\u6982\u5ff5\u7cbe\u51c6\u64e6\u9664\uff0c\u907f\u514d\u5bf9\u76f8\u5173\u6982\u5ff5\u7684\u9644\u5e26\u635f\u4f24", "upvotes": 0, "what_it_is": "\u63d0\u51faCARE\uff08\u95ed\u5408\u5f62\u5f0f\u6982\u5ff5\u64e6\u9664\u7b97\u5b50\uff09\uff0c\u901a\u8fc7\u5728\u4ea4\u53c9\u6ce8\u610f\u529b\u503c\u7a7a\u95f4\u4e2d\u5f15\u5165\u4fdd\u7559\u5b50\u7a7a\u95f4\u611f\u77e5\u65b9\u5411\uff0c\u5b9e\u73b0\u5bf9\u6587\u672c\u5230\u56fe\u50cf\u6269\u6563\u6a21\u578b\u4e2d\u76ee\u6807\u6982\u5ff5\u7684\u7cbe\u51c6\u64e6\u9664\uff0c\u540c\u65f6\u4fdd\u62a4\u8bed\u4e49\u76f8\u5173\u7684\u975e\u76ee\u6807\u6982\u5ff5\u4e0d\u53d7\u635f\u4f24\u3002", "why_notable": "\u73b0\u6709\u65e0\u8bad\u7ec3\u6982\u5ff5\u64e6\u9664\u65b9\u6cd5\u666e\u904d\u5b58\u5728\u0027\u8bef\u4f24\u0027\u76f8\u5173\u6982\u5ff5\u7684\u95ee\u9898\uff0cCARE\u4ece\u7406\u8bba\u4e0a\u6307\u51fa\u6839\u672c\u539f\u56e0\u5e76\u7ed9\u51fa\u4f18\u96c5\u7684\u95ed\u5408\u5f62\u5f0f\u89e3\uff0c\u5728\u5b9e\u4f8b\u3001\u98ce\u683c\u3001\u540d\u4eba\u6982\u5ff5\u64e6\u9664\u57fa\u51c6\u4e0a\u5747\u8868\u73b0\u51fa\u66f4\u597d\u7684\u4fdd\u7559-\u64e6\u9664\u5e73\u8861\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Dense spatial perception is essential for physical intelligence, where visual systems are expected to recover structured, metric, and actionable representations from pixel observations. Modern visual foundation models tend to prioritize semantic invariance, often at the expense of detailed spatial understanding. In this work, we study vision pretraining through a boundary-centric lens, motivated by the premise that boundaries and shape discontinuities offer essential cues for perceiving geometric properties. Concretely, we propose masked boundary modeling, a self-supervised paradigm that dynamically learns sub-pixel boundary representations and subsequently leverages the discovered boundary-bearing tokens as masked targets to facilitate dense visual token learning. By scaling this framework, we develop LingBot-Vision and demonstrate its efficacy across a diverse set of downstream vision tasks with DINOv3 as a strong baseline. Remarkably, LingBot-Vision drives the progression from LingBot-Depth 1.0 to LingBot-Depth 2.0 for depth completion, and thereby yields enhanced depth estimation, a key pillar for embodied artificial intelligence. Our findings reveal that boundary modeling goes beyond simple line segments and instead serves as a scalable pretraining principle for learning spatially structured visual representations.", "arxiv_id": "2607.05247", "arxiv_url": "https://arxiv.org/abs/2607.05247", "authors": ["Zelin Fu", "Bin Tan", "Changjiang Sun", "Shaohui Liu", "Kecheng Zheng", "Yinghao Xu", "Xing Zhu", "Yujun Shen", "Nan Xue"], "brief": "\u63d0\u51fa\u63a9\u7801\u8fb9\u754c\u5efa\u6a21\uff08Masked Boundary Modeling\uff09\u81ea\u76d1\u7763\u9884\u8bad\u7ec3\u8303\u5f0f\uff0c\u52a8\u6001\u5b66\u4e60\u4e9a\u50cf\u7d20\u8fb9\u754c\u8868\u793a\uff0c\u5e76\u4ee5\u8fb9\u754c\u76f8\u5173token\u4e3a\u63a9\u7801\u76ee\u6807\u9a71\u52a8\u5bc6\u96c6\u89c6\u89c9token\u5b66\u4e60\uff0c\u6784\u5efa\u4e86LingBot-Vision\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05247", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4ee5\u8fb9\u754c\u4e0e\u5f62\u72b6\u4e0d\u8fde\u7eed\u6027\u4e3a\u6838\u5fc3\u7ebf\u7d22\uff0c\u8bbe\u8ba1\u8fb9\u754c\u4e2d\u5fc3\u7684\u81ea\u76d1\u7763\u9884\u8bad\u7ec3\u6846\u67b6", "\u52a8\u6001\u53d1\u73b0\u4e9a\u50cf\u7d20\u8fb9\u754ctoken\u5e76\u5c06\u5176\u4f5c\u4e3a\u63a9\u7801\u9884\u6d4b\u76ee\u6807\uff0c\u4fc3\u8fdb\u7a7a\u95f4\u7ed3\u6784\u5316\u8868\u793a\u5b66\u4e60", "\u4ee5DINOv3\u4e3a\u5f3a\u57fa\u7ebf\uff0cLingBot-Vision\u63a8\u52a8\u6df1\u5ea6\u8865\u5168\u4ece1.0\u5347\u7ea7\u81f32.0\uff0c\u663e\u8457\u63d0\u5347\u6df1\u5ea6\u4f30\u8ba1\u6027\u80fd"], "keywords": ["\u89c6\u89c9\u9884\u8bad\u7ec3", "\u7a7a\u95f4\u611f\u77e5", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u5177\u8eab\u667a\u80fd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05247v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Vision Pretraining for Dense Spatial Perception", "tldr": "\u4ee5\u8fb9\u754c\u5efa\u6a21\u4e3a\u6838\u5fc3\u7684\u81ea\u76d1\u7763\u89c6\u89c9\u9884\u8bad\u7ec3\uff0c\u63d0\u5347\u5bc6\u96c6\u7a7a\u95f4\u611f\u77e5\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u63a9\u7801\u8fb9\u754c\u5efa\u6a21\uff08Masked Boundary Modeling\uff09\u81ea\u76d1\u7763\u9884\u8bad\u7ec3\u8303\u5f0f\uff0c\u52a8\u6001\u5b66\u4e60\u4e9a\u50cf\u7d20\u8fb9\u754c\u8868\u793a\uff0c\u5e76\u4ee5\u8fb9\u754c\u76f8\u5173token\u4e3a\u63a9\u7801\u76ee\u6807\u9a71\u52a8\u5bc6\u96c6\u89c6\u89c9token\u5b66\u4e60\uff0c\u6784\u5efa\u4e86LingBot-Vision\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u3002", "why_notable": "\u7a81\u7834\u8bed\u4e49\u4e0d\u53d8\u6027\u4f18\u5148\u7684\u89c6\u89c9\u9884\u8bad\u7ec3\u8303\u5f0f\uff0c\u5c06\u8fb9\u754c\u5efa\u6a21\u63d0\u5347\u4e3a\u53ef\u6269\u5c55\u7684\u7a7a\u95f4\u611f\u77e5\u9884\u8bad\u7ec3\u539f\u5219\uff0c\u5bf9\u5177\u8eab\u667a\u80fd\u6240\u9700\u7684\u5ea6\u91cf\u5316\u3001\u53ef\u64cd\u4f5c\u89c6\u89c9\u8868\u793a\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "In this paper, we introduce Claim-Level Rubric Rewards (CuRe), a structured reward framework designed to address the reward-design bottleneck in reinforcement learning for dense video captioning. Existing reward designs generally fall into two categories: holistic response-level judgment across heterogeneous criteria, or alignment-based evaluation against reference captions. However, both paradigms suffer from fundamental limitations. Holistic rewards struggle to ensure factual accuracy and are prone to stylistic reward hacking, while reference-based rewards overly rely on rigid textual alignment, failing to preserve the completeness and diversity inherent to open-ended generation tasks. To address these challenges, CuRe reformulates reward modeling as fine-grained claim-level verification. Specifically, CuRe decomposes captions into category-aware atomic claims through a structured rubric, converting holistic evaluation into simpler and more reliable claim-level verification.", "arxiv_id": "2607.05150", "arxiv_url": "https://arxiv.org/abs/2607.05150", "authors": ["Mingqi Gao", "Hongyuan Dong", "Yifei Chen", "Zhisheng Zhong", "Zheng Ruan", "Wenjin Hou", "Yu Chen", "Han Hu", "Yansong Tang"], "brief": "\u63d0\u51faClaim-Level Rubric Rewards\uff08CuRe\uff09\uff0c\u4e00\u79cd\u7ed3\u6784\u5316\u5956\u52b1\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u5bc6\u96c6\u63cf\u8ff0\u7684\u6574\u4f53\u8bc4\u4f30\u5206\u89e3\u4e3a\u7c7b\u522b\u611f\u77e5\u7684\u539f\u5b50\u58f0\u660e\u7ea7\u9a8c\u8bc1\uff0c\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u4e2d\u5956\u52b1\u8bbe\u8ba1\u74f6\u9888\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05150", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u5b57\u5e55\u5206\u89e3\u4e3a\u7c7b\u522b\u611f\u77e5\u7684\u539f\u5b50\u58f0\u660e\uff08atomic claims\uff09\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u8bc4\u5206\u6807\u51c6\u8fdb\u884c\u7ec6\u7c92\u5ea6\u9a8c\u8bc1", "\u89e3\u51b3\u6574\u4f53\u5956\u52b1\u6613\u53d7\u98ce\u683c\u6027\u5956\u52b1\u6b3a\u9a97\uff08reward hacking\uff09\u548c\u53c2\u8003\u5956\u52b1\u8fc7\u5ea6\u4f9d\u8d56\u6587\u672c\u5bf9\u9f50\u7684\u53cc\u91cd\u7f3a\u9677", "\u5c06\u590d\u6742\u7684\u6574\u4f53\u8bc4\u4f30\u8f6c\u5316\u4e3a\u66f4\u7b80\u5355\u3001\u66f4\u53ef\u9760\u7684\u58f0\u660e\u7ea7\u4e8c\u5143\u9a8c\u8bc1\u4efb\u52a1"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u5956\u52b1\u5efa\u6a21"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05150v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Claim-Level Rubric Rewards for Video Caption Reinforcement Learning", "tldr": "\u63d0\u51faCuRe\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u63cf\u8ff0\u5f3a\u5316\u5b66\u4e60\u5956\u52b1\u62c6\u89e3\u4e3a\u7ec6\u7c92\u5ea6\u539f\u5b50\u58f0\u660e\u7ea7\u9a8c\u8bc1", "upvotes": 0, "what_it_is": "\u63d0\u51faClaim-Level Rubric Rewards\uff08CuRe\uff09\uff0c\u4e00\u79cd\u7ed3\u6784\u5316\u5956\u52b1\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u5bc6\u96c6\u63cf\u8ff0\u7684\u6574\u4f53\u8bc4\u4f30\u5206\u89e3\u4e3a\u7c7b\u522b\u611f\u77e5\u7684\u539f\u5b50\u58f0\u660e\u7ea7\u9a8c\u8bc1\uff0c\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u4e2d\u5956\u52b1\u8bbe\u8ba1\u74f6\u9888\u3002", "why_notable": "\u9488\u5bf9\u89c6\u9891\u63cf\u8ff0RL\u8bad\u7ec3\u4e2d\u5956\u52b1\u8bbe\u8ba1\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u63d0\u51fa\u7ed3\u6784\u5316\u5206\u89e3\u65b9\u6848\uff0c\u517c\u987e\u4e8b\u5b9e\u51c6\u786e\u6027\u4e0e\u751f\u6210\u591a\u6837\u6027\uff0c\u5bf9\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684RLVR\u8bad\u7ec3\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Video reasoning requires models to identify and verify temporally localized evidence within long video sequences. Recent Video Large Language Models (Video-LLMs) have shown promising reasoning abilities when aligned with reinforcement learning, yet existing approaches typically rely on outcome-based rewards that supervise only the final prediction. Such supervision provides limited guidance on how models should discover the relevant temporal evidence during intermediate reasoning. In this work, we propose TimeThink, a reinforcement learning framework that explicitly guides temporal evidence discovery in Video-LLMs. Our key idea is to treat temporal clue steps as the fundamental optimization primitive of video reasoning, where each reasoning step references a candidate time interval in the video. We introduce a step-wise temporal process reward that provides localized credit assignment for these clues and a joint process--outcome optimization objective that balances reasoning fidelity with task correctness. To enable scalable training, we construct TimeThink-RFT-20K, a dataset with automatically derived temporal evidence segments. Extensive experiments across video reasoning, temporal grounding, and general video understanding benchmarks show that TimeThink consistently improves both temporal localization and reasoning performance, achieving state-of-the-art results among open-source video RL models.", "arxiv_id": "2607.05089", "arxiv_url": "https://arxiv.org/abs/2607.05089", "authors": ["Handong Li", "Longteng Guo", "Zikang Liu", "Dongze Hao", "Yepeng Tang", "Zijia Zhao", "Jie Jiang", "Zhiwei Jin", "Chen Chen", "Haonan Lu", "Jing Liu"], "brief": "\u63d0\u51faTimeThink\u6846\u67b6\uff0c\u901a\u8fc7\u6b65\u9aa4\u7ea7\u65f6\u5e8f\u8fc7\u7a0b\u5956\u52b1\uff0c\u8ba9\u89c6\u9891\u5927\u8bed\u8a00\u6a21\u578b\u5728\u63a8\u7406\u4e2d\u95f4\u6b65\u9aa4\u4e2d\u4e3b\u52a8\u5b9a\u4f4d\u89c6\u9891\u65f6\u95f4\u533a\u95f4\uff0c\u800c\u975e\u4ec5\u4f9d\u8d56\u6700\u7ec8\u7b54\u6848\u7684\u7ed3\u679c\u5956\u52b1\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05089", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u6bcf\u4e2a\u63a8\u7406\u6b65\u9aa4\u4e0e\u5019\u9009\u65f6\u95f4\u533a\u95f4\u7ed1\u5b9a\uff0c\u4f5c\u4e3a\u4f18\u5316\u57fa\u672c\u5355\u5143\uff0c\u5f15\u5165\u6b65\u9aa4\u7ea7\u65f6\u5e8f\u8fc7\u7a0b\u5956\u52b1\uff08step-wise temporal process reward\uff09", "\u8054\u5408\u8fc7\u7a0b-\u7ed3\u679c\u4f18\u5316\u76ee\u6807\uff0c\u540c\u65f6\u517c\u987e\u63a8\u7406\u5fe0\u5b9e\u6027\u4e0e\u4efb\u52a1\u6b63\u786e\u6027", "\u6784\u5efaTimeThink-RFT-20K\u6570\u636e\u96c6\uff08\u81ea\u52a8\u6807\u6ce8\u65f6\u5e8f\u8bc1\u636e\u7247\u6bb5\uff09\uff0c\u5728\u89c6\u9891\u63a8\u7406\u3001\u65f6\u5e8f\u5b9a\u4f4d\u3001\u901a\u7528\u89c6\u9891\u7406\u89e3\u57fa\u51c6\u4e0a\u8fbe\u5230\u5f00\u6e90\u89c6\u9891RL\u6a21\u578bSOTA"], "keywords": ["\u89c6\u9891\u7406\u89e3", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u65f6\u5e8f\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05089v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "TimeThink: Reasoning with Time for Video LLMs", "tldr": "TimeThink\uff1a\u7528\u5f3a\u5316\u5b66\u4e60\u5f15\u5bfc\u89c6\u9891LLM\u5728\u63a8\u7406\u8fc7\u7a0b\u4e2d\u663e\u5f0f\u53d1\u73b0\u65f6\u5e8f\u8bc1\u636e", "upvotes": 0, "what_it_is": "\u63d0\u51faTimeThink\u6846\u67b6\uff0c\u901a\u8fc7\u6b65\u9aa4\u7ea7\u65f6\u5e8f\u8fc7\u7a0b\u5956\u52b1\uff0c\u8ba9\u89c6\u9891\u5927\u8bed\u8a00\u6a21\u578b\u5728\u63a8\u7406\u4e2d\u95f4\u6b65\u9aa4\u4e2d\u4e3b\u52a8\u5b9a\u4f4d\u89c6\u9891\u65f6\u95f4\u533a\u95f4\uff0c\u800c\u975e\u4ec5\u4f9d\u8d56\u6700\u7ec8\u7b54\u6848\u7684\u7ed3\u679c\u5956\u52b1\u3002", "why_notable": "\u73b0\u6709\u89c6\u9891LLM\u5f3a\u5316\u5b66\u4e60\u65b9\u6cd5\u4ec5\u76d1\u7763\u6700\u7ec8\u9884\u6d4b\uff0cTimeThink\u9996\u6b21\u5c06\u65f6\u5e8f\u8bc1\u636e\u53d1\u73b0\u7eb3\u5165\u4e2d\u95f4\u63a8\u7406\u6b65\u9aa4\u7684\u5956\u52b1\u8bbe\u8ba1\uff0c\u663e\u8457\u63d0\u5347\u65f6\u5e8f\u5b9a\u4f4d\u4e0e\u63a8\u7406\u80fd\u529b\uff0c\u5bf9\u957f\u89c6\u9891\u7406\u89e3\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Personalizing text-to-image diffusion models to render several specific subjects in a coherent image remains challenging: the model must preserve each subject\u0027s identity while keeping the scene spatially and visually coherent. Methods that fuse independently trained concept adapters in a shared weight space (via federated averaging, gradient fusion, or orthogonality constraints) suffer from identity confusion and style bleeding and require joint retraining. In this work, we show that composing concepts as separate image layers, instead of merging their adapters in a shared weight space, avoids parameter-level interference. We introduce LILAC, a framework that composes independently trained low-rank adapters at inference time: each subject is conditioned on the frozen composite of previously placed subjects, with exactly one adapter active at a time, therefore identities never interfere at the parameter level. LILAC composes the adapters without any joint training, scales linearly with the number of concepts, and is backbone-agnostic. Under the Orthogonal Adaptation protocol, LILAC applied on Qwen-Image-Edit reaches an ArcFace detection rate of 0.861, while Orthogonal Adaptation reports 0.745 in its original setting. Adaptation reports 0.745 in its original setting. Code is available at https://github.com/marianlupascu/LILAC.", "arxiv_id": "2607.04801", "arxiv_url": "https://arxiv.org/abs/2607.04801", "authors": ["Marian Lupascu", "Sebastian Ripa", "Mihai Trascau", "Mariana-Iuliana Georgescu", "Ionut Mironica"], "brief": "\u63d0\u51faLILAC\u6846\u67b6\uff0c\u5728\u63a8\u7406\u65f6\u5c06\u72ec\u7acb\u8bad\u7ec3\u7684\u4f4e\u79e9\u9002\u914d\u5668\uff08LoRA\uff09\u6309\u5c42\u7ec4\u5408\uff0c\u6bcf\u6b21\u4ec5\u6fc0\u6d3b\u4e00\u4e2a\u9002\u914d\u5668\u5e76\u4ee5\u5df2\u751f\u6210\u5185\u5bb9\u4e3a\u6761\u4ef6\uff0c\u4ece\u6839\u672c\u4e0a\u907f\u514d\u591a\u6982\u5ff5\u878d\u5408\u65f6\u7684\u53c2\u6570\u7ea7\u5e72\u6270\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04801", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6bcf\u4e2a\u6982\u5ff5\u5bf9\u5e94\u72ec\u7acbLoRA\uff0c\u63a8\u7406\u65f6\u7ea7\u8054\u6fc0\u6d3b\u800c\u975e\u6743\u91cd\u7a7a\u95f4\u5408\u5e76\uff0c\u5f7b\u5e95\u6d88\u9664\u8eab\u4efd\u6df7\u6dc6\u4e0e\u98ce\u683c\u6c61\u67d3", "\u65e0\u9700\u4efb\u4f55\u8054\u5408\u91cd\u8bad\u7ec3\uff0c\u6982\u5ff5\u6570\u91cf\u589e\u52a0\u65f6\u8ba1\u7b97\u590d\u6742\u5ea6\u7ebf\u6027\u6269\u5c55\uff0c\u4e14\u4e0e\u9aa8\u5e72\u7f51\u7edc\u65e0\u5173", "\u5728Orthogonal Adaptation\u534f\u8bae\u4e0b\uff0c\u57fa\u4e8eQwen-Image-Edit\u7684ArcFace\u68c0\u6d4b\u7387\u8fbe0.861\uff0c\u663e\u8457\u4f18\u4e8e\u5bf9\u6bd4\u65b9\u6cd5\u76840.745"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u591a\u6982\u5ff5\u5b9a\u5236", "LoRA", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04801v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "LILAC: Layer-Wise Independent LoRAs and Cascaded Conditioning for Multi-Concept Customization of Diffusion Models", "tldr": "LILAC\u901a\u8fc7\u9010\u5c42\u72ec\u7acbLoRA\u4e0e\u7ea7\u8054\u6761\u4ef6\u5b9e\u73b0\u591a\u6982\u5ff5\u6269\u6563\u6a21\u578b\u5b9a\u5236\uff0c\u65e0\u9700\u8054\u5408\u8bad\u7ec3", "upvotes": 0, "what_it_is": "\u63d0\u51faLILAC\u6846\u67b6\uff0c\u5728\u63a8\u7406\u65f6\u5c06\u72ec\u7acb\u8bad\u7ec3\u7684\u4f4e\u79e9\u9002\u914d\u5668\uff08LoRA\uff09\u6309\u5c42\u7ec4\u5408\uff0c\u6bcf\u6b21\u4ec5\u6fc0\u6d3b\u4e00\u4e2a\u9002\u914d\u5668\u5e76\u4ee5\u5df2\u751f\u6210\u5185\u5bb9\u4e3a\u6761\u4ef6\uff0c\u4ece\u6839\u672c\u4e0a\u907f\u514d\u591a\u6982\u5ff5\u878d\u5408\u65f6\u7684\u53c2\u6570\u7ea7\u5e72\u6270\u3002", "why_notable": "\u89e3\u51b3\u4e86\u591a\u6982\u5ff5\u4e2a\u6027\u5316\u751f\u6210\u4e2d\u957f\u671f\u5b58\u5728\u7684\u53c2\u6570\u5e72\u6270\u95ee\u9898\uff0c\u65e0\u9700\u8054\u5408\u8bad\u7ec3\u5373\u53ef\u5373\u63d2\u5373\u7528\u7ec4\u5408\u4efb\u610f\u6570\u91cf\u6982\u5ff5\uff0c\u5b9e\u7528\u4ef7\u503c\u9ad8\u4e14\u6027\u80fd\u63d0\u5347\u663e\u8457\u3002"}, {"abstract": "Compositional generalization, the ability to understand and produce novel combinations of known components, remains a fundamental challenge for modern artificial intelligence. While few benchmarks exist, many focus on linguistic tasks and lack complex, explicit compositional structures. We introduce ClassicLogic, a new benchmark suite designed to evaluate an agent\u0027s ability to learn and compose problem-solving strategies. The benchmark consists of four classic logic puzzles: Sudoku, KenKen, Kakuro, and Futoshiki. Its core innovation is a hierarchical, explicit knowledge base for each game, where complex solving strategies are formally defined as compositions of simpler, foundational strategies. This structure allows for fine-grained evaluation of an agent\u0027s reasoning capabilities, from learning basic rules to applying multi-step compositional strategies to solve puzzles of increasing, mathematically validated difficulty. The open-source benchmark provides a challenging new testbed for advancing neuro-symbolic and other advanced AI reasoning systems.", "arxiv_id": "2607.05185", "arxiv_url": "https://arxiv.org/abs/2607.05185", "authors": ["Mahnoor Shahid", "Hannes Rothe"], "brief": "\u63d0\u51faClassicLogic\u57fa\u51c6\u5957\u4ef6\uff0c\u5305\u542b\u6570\u72ec\u3001KenKen\u3001Kakuro\u548cFutoshiki\u56db\u7c7b\u7ecf\u5178\u903b\u8f91\u8c1c\u9898\uff0c\u901a\u8fc7\u5c42\u6b21\u5316\u663e\u5f0f\u77e5\u8bc6\u5e93\u5c06\u590d\u6742\u6c42\u89e3\u7b56\u7565\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e3a\u7b80\u5355\u57fa\u7840\u7b56\u7565\u7684\u7ec4\u5408\uff0c\u7528\u4e8e\u8bc4\u4f30AI\u7684\u7ec4\u5408\u6cdb\u5316\u63a8\u7406\u80fd\u529b\u3002", "categories": ["cs.AI", "cs.SC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05185", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u6db5\u76d6\u56db\u79cd\u7ecf\u5178\u903b\u8f91\u8c1c\u9898\uff0c\u6bcf\u79cd\u6e38\u620f\u914d\u5907\u5c42\u6b21\u5316\u663e\u5f0f\u77e5\u8bc6\u5e93\uff0c\u590d\u6742\u7b56\u7565\u7531\u57fa\u7840\u7b56\u7565\u7ec4\u5408\u5b9a\u4e49", "\u652f\u6301\u7ec6\u7c92\u5ea6\u63a8\u7406\u80fd\u529b\u8bc4\u4f30\uff1a\u4ece\u5b66\u4e60\u57fa\u672c\u89c4\u5219\u5230\u5e94\u7528\u591a\u6b65\u7ec4\u5408\u7b56\u7565\uff0c\u96be\u5ea6\u7ecf\u6570\u5b66\u9a8c\u8bc1\u9012\u589e", "\u5f00\u6e90\u57fa\u51c6\uff0c\u4e13\u4e3a\u63a8\u8fdb\u795e\u7ecf\u7b26\u53f7AI\u53ca\u9ad8\u7ea7\u63a8\u7406\u7cfb\u7edf\u8bbe\u8ba1\uff0c\u5f25\u8865\u73b0\u6709\u57fa\u51c6\u7f3a\u4e4f\u590d\u6742\u663e\u5f0f\u7ec4\u5408\u7ed3\u6784\u7684\u4e0d\u8db3"], "keywords": ["\u7ec4\u5408\u6cdb\u5316", "\u903b\u8f91\u63a8\u7406", "\u795e\u7ecf\u7b26\u53f7AI", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05185v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "ClassicLogic: A Knowledge-Driven Benchmark of Classic Puzzle Games for Evaluating Compositional Generalization", "tldr": "ClassicLogic\uff1a\u57fa\u4e8e\u7ecf\u5178\u903b\u8f91\u8c1c\u9898\u8bc4\u4f30AI\u7ec4\u5408\u6cdb\u5316\u80fd\u529b\u7684\u77e5\u8bc6\u9a71\u52a8\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faClassicLogic\u57fa\u51c6\u5957\u4ef6\uff0c\u5305\u542b\u6570\u72ec\u3001KenKen\u3001Kakuro\u548cFutoshiki\u56db\u7c7b\u7ecf\u5178\u903b\u8f91\u8c1c\u9898\uff0c\u901a\u8fc7\u5c42\u6b21\u5316\u663e\u5f0f\u77e5\u8bc6\u5e93\u5c06\u590d\u6742\u6c42\u89e3\u7b56\u7565\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e3a\u7b80\u5355\u57fa\u7840\u7b56\u7565\u7684\u7ec4\u5408\uff0c\u7528\u4e8e\u8bc4\u4f30AI\u7684\u7ec4\u5408\u6cdb\u5316\u63a8\u7406\u80fd\u529b\u3002", "why_notable": "\u73b0\u6709\u7ec4\u5408\u6cdb\u5316\u57fa\u51c6\u591a\u805a\u7126\u8bed\u8a00\u4efb\u52a1\u4e14\u7f3a\u4e4f\u663e\u5f0f\u7ec4\u5408\u7ed3\u6784\uff0cClassicLogic\u4ee5\u903b\u8f91\u8c1c\u9898\u4e3a\u8f7d\u4f53\u63d0\u4f9b\u7ed3\u6784\u6e05\u6670\u3001\u96be\u5ea6\u53ef\u63a7\u7684\u6d4b\u8bd5\u5e73\u53f0\uff0c\u5bf9\u795e\u7ecf\u7b26\u53f7\u63a8\u7406\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Healthcare appointment scheduling remains a persistent operational bottleneck, driven by manual coordination, fragmented legacy systems, and high administrative overhead. These inefficiencies constrain provider availability and degrade patient access to care. This paper presents CareConnect, a safety-first conversational agent for healthcare logistics automation that leverages large language model (LLM) function calling, retrieval-augmented generation (RAG), and layered deterministic safety guardrails. The system orchestrates eight domain-specific tools to support appointment booking, modification, cancellation, and facility information retrieval, while enforcing strict scope constraints that prohibit medical advice or diagnosis. Safety-critical situations are handled through deterministic short-circuit mechanisms for emergency detection and medical intent refusal. We evaluate CareConnect on a comprehensive benchmark of 680 task-oriented scenarios spanning end-to-end workflows, multi-turn interactions, and edge cases. Experimental results demonstrate a 91.8% task completion rate with a median per-request latency of 2.2 seconds, 96.0% safety compliance on the dedicated safety-critical evaluation subset, and an average operational cost of $0.0324 per appointment, yielding a significant cost reduction compared to manual human scheduling. These findings show that carefully scoped and rigorously safeguarded LLM-based agents can reliably automate complex healthcare operational workflows while maintaining safety guarantees and achieving substantial cost efficiency. The source code and system implementation are publicly available at https://github.com/Hadi-Hsn/CareConnect.", "arxiv_id": "2607.05055", "arxiv_url": "https://arxiv.org/abs/2607.05055", "authors": ["Hadi Hasan", "Safaa Salman", "Adam Tai Abou Dargham", "Ammar Mohanna", "Ali Chehab"], "brief": "\u63d0\u51faCareConnect\u7cfb\u7edf\uff0c\u4e00\u4e2a\u7ed3\u5408LLM\u51fd\u6570\u8c03\u7528\u3001RAG\u548c\u786e\u5b9a\u6027\u5b89\u5168\u62a4\u680f\u7684\u533b\u7597\u540e\u52e4\u81ea\u52a8\u5316\u5bf9\u8bdd\u667a\u80fd\u4f53\uff0c\u4e13\u6ce8\u4e8e\u9884\u7ea6\u6302\u53f7\u3001\u4fee\u6539\u3001\u53d6\u6d88\u7b49\u8c03\u5ea6\u4efb\u52a1\uff0c\u4e25\u683c\u7981\u6b62\u63d0\u4f9b\u533b\u7597\u5efa\u8bae\u6216\u8bca\u65ad\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05055", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": ["\u5728680\u4e2a\u4efb\u52a1\u573a\u666f\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c\u4efb\u52a1\u5b8c\u6210\u738791.8%\uff0c\u4e2d\u4f4d\u8bf7\u6c42\u5ef6\u8fdf2.2\u79d2", "\u5b89\u5168\u5173\u952e\u8bc4\u4f30\u5b50\u96c6\u5408\u89c4\u738796.0%\uff0c\u901a\u8fc7\u786e\u5b9a\u6027\u77ed\u8def\u673a\u5236\u5904\u7406\u7d27\u6025\u60c5\u51b5\u548c\u533b\u7597\u610f\u56fe\u62d2\u7edd", "\u6bcf\u6b21\u9884\u7ea6\u5e73\u5747\u8fd0\u8425\u6210\u672c\u4ec5$0.0324\uff0c\u76f8\u6bd4\u4eba\u5de5\u8c03\u5ea6\u663e\u8457\u964d\u4f4e\u6210\u672c"], "keywords": ["\u667a\u80fd\u4f53", "\u533b\u7597AI", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05055v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Toward Trustworthy Large Language Model Agents in Healthcare", "tldr": "CareConnect\uff1a\u9762\u5411\u533b\u7597\u9884\u7ea6\u8c03\u5ea6\u7684\u5b89\u5168\u4f18\u5148LLM\u5bf9\u8bdd\u667a\u80fd\u4f53\uff0c\u4efb\u52a1\u5b8c\u6210\u738791.8%", "upvotes": 0, "what_it_is": "\u63d0\u51faCareConnect\u7cfb\u7edf\uff0c\u4e00\u4e2a\u7ed3\u5408LLM\u51fd\u6570\u8c03\u7528\u3001RAG\u548c\u786e\u5b9a\u6027\u5b89\u5168\u62a4\u680f\u7684\u533b\u7597\u540e\u52e4\u81ea\u52a8\u5316\u5bf9\u8bdd\u667a\u80fd\u4f53\uff0c\u4e13\u6ce8\u4e8e\u9884\u7ea6\u6302\u53f7\u3001\u4fee\u6539\u3001\u53d6\u6d88\u7b49\u8c03\u5ea6\u4efb\u52a1\uff0c\u4e25\u683c\u7981\u6b62\u63d0\u4f9b\u533b\u7597\u5efa\u8bae\u6216\u8bca\u65ad\u3002", "why_notable": "\u5728\u533b\u7597AI\u5b89\u5168\u6027\u5907\u53d7\u5173\u6ce8\u7684\u80cc\u666f\u4e0b\uff0c\u8be5\u5de5\u4f5c\u63d0\u4f9b\u4e86\u4e00\u5957\u53ef\u843d\u5730\u7684\u5206\u5c42\u5b89\u5168\u62a4\u680f\u65b9\u6848\uff0c\u5e76\u4ee5\u91cf\u5316\u6307\u6807\u9a8c\u8bc1\u4e86LLM\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u533b\u7597\u8fd0\u8425\u573a\u666f\u4e2d\u7684\u53ef\u9760\u6027\u4e0e\u6210\u672c\u6548\u76ca\uff0c\u4ee3\u7801\u5f00\u6e90\u5177\u6709\u5b9e\u7528\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Scaling pre-training, post-training, and test-time compute have become the central paradigms for improving the capabilities of LLMs. In this work, we identify verification, the ability to determine the correctness of a solution, as a new scaling axis. To unlock this and demonstrate its effectiveness, we introduce LLM-as-a-Verifier, a general-purpose verification framework that provides fine-grained feedback for agentic tasks without requiring additional training. Unlike standard LM judges that prompt LLMs to produce discrete scores for candidate solutions, LLM-as-a-Verifier computes the expectation over the distribution of scoring token logits to generate continuous scores. This probabilistic formulation enables verification to scale along multiple dimensions: (1) score granularity, (2) repeated evaluation, and (3) criteria decomposition. In particular, we show that scaling the scoring granularity leads to better separation between positive and negative solutions, resulting in more calibrated comparisons. Moreover, scaling repeated evaluation and criteria decomposition consistently lead to additional gains in verification accuracy through variance and complexity reduction. We further introduce a cost-efficient ranking algorithm for selecting the best solution among candidates using the verifier\u0027s continuous scores. LLM-as-a-Verifier achieves state-of-the-art performance on Terminal-Bench V2 (86.5%), SWE-Bench Verified (78.2%), RoboRewardBench (87.4%), and MedAgentBench (73.3%). Beyond verification, the fine-grained signals from LLM-as-a-Verifier can also serve as a proxy for estimating task progress. We build an extension for Claude Code, enabling developers to monitor and improve their own agentic systems. Finally, we show that LLM-as-a-Verifier can provide dense feedback for RL, improving the sample efficiency of SAC and GRPO on robotics and mathematical reasoning benchmarks.", "arxiv_id": "2607.05391", "arxiv_url": "https://arxiv.org/abs/2607.05391", "authors": ["Jacky Kwok", "Shulu Li", "Pranav Atreya", "Yuejiang Liu", "Yixing Jiang", "Chelsea Finn", "Marco Pavone", "Ion Stoica", "Azalia Mirhoseini"], "brief": "\u63d0\u51faLLM-as-a-Verifier\u6846\u67b6\uff0c\u5c06\u9a8c\u8bc1\u80fd\u529b\u4f5c\u4e3aLLM\u7684\u65b0\u6269\u5c55\u7ef4\u5ea6\uff0c\u901a\u8fc7\u8ba1\u7b97\u8bc4\u5206token logits\u7684\u671f\u671b\u751f\u6210\u8fde\u7eed\u5206\u6570\uff0c\u652f\u6301\u8bc4\u5206\u7c92\u5ea6\u3001\u91cd\u590d\u8bc4\u4f30\u548c\u6807\u51c6\u5206\u89e3\u4e09\u4e2a\u7ef4\u5ea6\u7684\u6269\u5c55\u3002\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u5728\u4ee3\u7801\u3001\u8f6f\u4ef6\u5de5\u7a0b\u3001\u673a\u5668\u4eba\u548c\u533b\u7597\u7b49\u591a\u4e2a\u667a\u80fd\u4f53\u4efb\u52a1\u57fa\u51c6\u4e0a\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff0c\u5e76\u53ef\u4e3a\u5f3a\u5316\u5b66\u4e60\u63d0\u4f9b\u5bc6\u96c6\u53cd\u9988\u4fe1\u53f7\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG", "cs.MA", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05391", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u9a8c\u8bc1\u6846\u67b6", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05391v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "LLM-as-a-Verifier: A General-Purpose Verification Framework", "tldr": "\u63d0\u51faLLM-as-a-Verifier\u6846\u67b6\uff0c\u5c06\u9a8c\u8bc1\u80fd\u529b\u4f5c\u4e3aLLM\u7684\u65b0\u6269\u5c55\u7ef4\u5ea6\uff0c\u901a\u8fc7\u8ba1\u7b97\u8bc4\u5206token logits\u7684\u671f\u671b\u751f\u6210\u8fde\u7eed\u5206\u6570\uff0c\u652f\u6301\u8bc4\u5206\u7c92\u5ea6\u3001\u91cd\u590d\u8bc4\u4f30\u548c\u6807\u51c6\u5206\u89e3\u4e09\u4e2a\u7ef4\u5ea6\u7684\u6269\u5c55\u3002\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u5728\u4ee3\u7801\u3001\u8f6f\u4ef6\u5de5\u7a0b\u3001\u673a\u5668\u4eba\u548c\u533b\u7597\u7b49\u591a\u4e2a\u667a\u80fd\u4f53\u4efb\u52a1\u57fa\u51c6\u4e0a\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff0c\u5e76\u53ef\u4e3a\u5f3a\u5316\u5b66\u4e60\u63d0\u4f9b\u5bc6\u96c6\u53cd\u9988\u4fe1\u53f7\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Visual generators excel at rendering, but they confidently fabricate what they do not know. User requests are unbounded, evolving, and deeply long-tailed: new characters, trending entities, post-cutoff events, and more. This world-knowledge bottleneck is structural: generators are trained on fixed corpora, but the visual world is open-ended. We construct SearchGen-20K and SearchGen-Bench, with 20,839 prompts spanning twelve failure categories and twenty-two domains, paired with a pre-executed multimodal SearchGen-Corpus-1M to support offline, reproducible research. On SearchGen-Bench, frontier open generators score only 21 to 28 out of 100, a 40-point collapse invisible to existing benchmarks. The natural remedy is to employ search tools, enabling agentic visual generation. However, we find that naive search fails: it retrieves indiscriminately, injecting noise into prompts the generator already handles. We trace the root cause to a generator-specific, evolving knowledge boundary: the divide between what a generator can internalize through training and what must remain in external context. Although this boundary is hard to specify in advance, we show that it is discoverable through a teach-then-search co-training framework. Even a minimal version of this co-training recipe produces monotonic improvement, laying the foundation for recursive self-improvement in visual generation that can meet world-knowledge-grounded requests. We release the full dataset, co-training corpus, and search corpus as a replayable harness for tool-augmented, world-knowledge-grounded visual generation.", "arxiv_id": "2607.05382", "arxiv_url": "https://arxiv.org/abs/2607.05382", "authors": ["Haozhe Wang", "Weijia Feng", "Jinpeng Yu", "Che Liu", "Ping Nie", "Fangzhen Lin", "Jiaming Liu", "Ruihua Huang", "Jimmy Lin", "Wenhu Chen", "Cong Wei"], "brief": "\u89c6\u89c9\u751f\u6210\u6a21\u578b\u5728\u5904\u7406\u65b0\u89d2\u8272\u3001\u70ed\u70b9\u4e8b\u4ef6\u7b49\u957f\u5c3e\u77e5\u8bc6\u65f6\u5b58\u5728\u4e25\u91cd\u5e7b\u89c9\u95ee\u9898\uff0c\u4f5c\u8005\u6784\u5efa\u4e86\u5305\u542b2\u4e07\u6761\u63d0\u793a\u7684SearchGen-20K\u57fa\u51c6\uff0c\u53d1\u73b0\u524d\u6cbf\u6a21\u578b\u5f97\u5206\u4ec521-28/100\u3002\u63d0\u51fa\"\u5148\u6559\u540e\u641c\"\u534f\u540c\u8bad\u7ec3\u6846\u67b6\uff0c\u901a\u8fc7\u53d1\u73b0\u6a21\u578b\u7684\u77e5\u8bc6\u8fb9\u754c\u6765\u51b3\u5b9a\u4f55\u65f6\u8c03\u7528\u641c\u7d22\u5de5\u5177\uff0c\u5b9e\u73b0\u4e86\u5355\u8c03\u6027\u80fd\u63d0\u5347\u5e76\u4e3a\u89c6\u89c9\u751f\u6210\u7684\u9012\u5f52\u81ea\u6211\u6539\u8fdb\u5960\u5b9a\u57fa\u7840\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05382", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u89c6\u89c9\u751f\u6210", "\u77e5\u8bc6\u8fb9\u754c", "\u5de5\u5177\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05382v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Search Beyond What Can Be Taught: Evolving the Knowledge Boundary in Agentic Visual Generation", "tldr": "\u89c6\u89c9\u751f\u6210\u6a21\u578b\u5728\u5904\u7406\u65b0\u89d2\u8272\u3001\u70ed\u70b9\u4e8b\u4ef6\u7b49\u957f\u5c3e\u77e5\u8bc6\u65f6\u5b58\u5728\u4e25\u91cd\u5e7b\u89c9\u95ee\u9898\uff0c\u4f5c\u8005\u6784\u5efa\u4e86\u5305\u542b2\u4e07\u6761\u63d0\u793a\u7684SearchGen-20K\u57fa\u51c6\uff0c\u53d1\u73b0\u524d\u6cbf\u6a21\u578b\u5f97\u5206\u4ec521-28/100\u3002\u63d0\u51fa\"\u5148\u6559\u540e\u641c\"\u534f\u540c\u8bad\u7ec3\u6846\u67b6\uff0c\u901a\u8fc7\u53d1\u73b0\u6a21\u578b\u7684\u77e5\u8bc6\u8fb9\u754c\u6765\u51b3\u5b9a\u4f55\u65f6\u8c03\u7528\u641c\u7d22\u5de5\u5177\uff0c\u5b9e\u73b0\u4e86\u5355\u8c03\u6027\u80fd\u63d0\u5347\u5e76\u4e3a\u89c6\u89c9\u751f\u6210\u7684\u9012\u5f52\u81ea\u6211\u6539\u8fdb\u5960\u5b9a\u57fa\u7840\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "For robots to work reliably in commercial and industrial applications, can recent advances in agentic coding systems combine interpretable robot programming with the open-world adaptability of model-free policies? We focus on \"Variational Automation\" (VA), a class of tasks that have larger variations in object geometry and pose than fixed automation. Model-free policies often struggle to close the reliability gap for VA tasks, which must be executed persistently and reliably in commercial and industrial applications. Motivated by prior work on Task and Motion Planning (TAMP) and the Robot Operating System (ROS), we introduce Graph-as-Policy (GaP), a multi-agent coding harness that generates directed computation graphs with perception, planning, and control nodes from a Modular Open Robot Skill Library (MORSL). GaP then generates an internal simulation environment to rehearse task instances with different graphs in parallel to iteratively refine the graph structure and parameters to improve success rates and throughput. Evaluation with 8 new open VA task benchmarks, 4 in-simulation and 4 in real-world, suggests that GaP can achieve success rates that significantly outperform baselines. Details, code, and data can be found online: https://graph-robots.github.io/gap", "arxiv_id": "2607.05369", "arxiv_url": "https://arxiv.org/abs/2607.05369", "authors": ["Kaiyuan Chen", "Shuangyu Xie", "Letian Fu", "Justin Yu", "William Pacini", "Sandeep Bajamahal", "Hudson Kim", "Jaimyn Drake", "Daehwa Kim", "Haoru Xue", "Jonathan Francis", "Christian Juette", "Peter Schaldenbrand", "Muhammet Yunus Seker", "Ruwan Wickramarachchi", "Uksang Yoo", "Guanzhi Wang", "Adithyavairavan Murali", "Balakumar Sundaralingam", "S. Shankar Sastry", "Spencer Huang", "Yuke Zhu", "Linxi \"Jim\" Fan", "Ken Goldberg"], "brief": "\u63d0\u51faGaP\u6846\u67b6\uff0c\u5c06\u673a\u5668\u4eba\u4efb\u52a1\u8868\u793a\u4e3a\u6709\u5411\u8ba1\u7b97\u56fe\u7b56\u7565\uff0c\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u7f16\u7801\u7cfb\u7edf\u81ea\u52a8\u751f\u6210\u611f\u77e5\u3001\u89c4\u5212\u4e0e\u63a7\u5236\u8282\u70b9\uff0c\u5e76\u5728\u4eff\u771f\u4e2d\u5e76\u884c\u8fed\u4ee3\u4f18\u5316\u56fe\u7ed3\u6784\u4e0e\u53c2\u6570\u3002\u57288\u4e2a\u53d8\u5206\u81ea\u52a8\u5316\u4efb\u52a1\u57fa\u51c6\uff08\u542b4\u4e2a\u771f\u5b9e\u573a\u666f\uff09\u4e0a\u663e\u8457\u8d85\u8d8a\u57fa\u7ebf\u65b9\u6cd5\uff0c\u6709\u6548\u63d0\u5347\u5de5\u4e1a\u673a\u5668\u4eba\u5728\u51e0\u4f55\u4e0e\u59ff\u6001\u53d8\u5316\u8f83\u5927\u573a\u666f\u4e0b\u7684\u53ef\u9760\u6027\u3002", "categories": ["cs.RO", "cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05369", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u673a\u5668\u4eba", "\u4efb\u52a1\u4e0e\u8fd0\u52a8\u89c4\u5212", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05369v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "GaP: A Graph-as-Policy Multi-Agent Self-Learning Harness For Variational Automation Tasks", "tldr": "\u63d0\u51faGaP\u6846\u67b6\uff0c\u5c06\u673a\u5668\u4eba\u4efb\u52a1\u8868\u793a\u4e3a\u6709\u5411\u8ba1\u7b97\u56fe\u7b56\u7565\uff0c\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u7f16\u7801\u7cfb\u7edf\u81ea\u52a8\u751f\u6210\u611f\u77e5\u3001\u89c4\u5212\u4e0e\u63a7\u5236\u8282\u70b9\uff0c\u5e76\u5728\u4eff\u771f\u4e2d\u5e76\u884c\u8fed\u4ee3\u4f18\u5316\u56fe\u7ed3\u6784\u4e0e\u53c2\u6570\u3002\u57288\u4e2a\u53d8\u5206\u81ea\u52a8\u5316\u4efb\u52a1\u57fa\u51c6\uff08\u542b4\u4e2a\u771f\u5b9e\u573a\u666f\uff09\u4e0a\u663e\u8457\u8d85\u8d8a\u57fa\u7ebf\u65b9\u6cd5\uff0c\u6709\u6548\u63d0\u5347\u5de5\u4e1a\u673a\u5668\u4eba\u5728\u51e0\u4f55\u4e0e\u59ff\u6001\u53d8\u5316\u8f83\u5927\u573a\u666f\u4e0b\u7684\u53ef\u9760\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Group Relative Policy Optimization (GRPO) is effective when the current policy already samples useful reasoning trajectories, but it stalls on hard prompts whose correct solution modes lie outside the student\u0027s on-policy support. We propose TREK (Teacher-Routed Exploration via Forward KL), a simple staged procedure that uses distillation not for imitation but for exploration support expansion. A key advantage of TREK is its generality: because it only consumes verified output trajectories, it can use an external black-box teacher, a white-box teacher, or the same model given additional inference-time context, and it can efficiently identify which hard-prompt samples are most worth consolidating even when teacher internals are unavailable. TREK first identifies prompts where the unaided student has very low pass rate, queries a proposal source to produce verified candidate solutions, keeps the top-$r$ proposals ranked by current student likelihood, applies a short forward-KL phase to pull those verified modes into the student\u0027s support, and then returns to standard on-policy GRPO refinement. On mathematical reasoning, TREK with DeepSeek-V4 proposals improves Qwen3 models across all tested scales on AIME 2024 and AIME 2025; for Qwen3-8B, it improves AIME 2025 from 36.9 to 40.3 and AIME 2024 from 47.9 to 51.1 (avg@16), while the self-context variant reaches 38.5 and 49.6 without an external teacher. On agentic tasks, TREK raises ALFWorld success rate from 75.8 to 82.8 and ScienceWorld success rate from 12.5 to 26.7; notably, on the hardest task types, TREK achieves high success rates early in training while unaided GRPO requires substantially more optimization steps to reach comparable levels.", "arxiv_id": "2607.05339", "arxiv_url": "https://arxiv.org/abs/2607.05339", "authors": ["Yuanda Xu", "Zhengze Zhou", "Kayhan Behdin", "Jelena Markovic-Voronov", "Hejian Sang", "Xiaomin Li", "Wenhui Zhu", "Xinchen Du", "Aida Rahmattalabi", "Ran He", "Sen Na", "Zhipeng Wang", "Alborz Geramifard"], "brief": "TREK\u63d0\u51fa\u4e00\u79cd\u4e24\u9636\u6bb5\u8bad\u7ec3\u6846\u67b6\uff1a\u5148\u7528\u6559\u5e08\u6a21\u578b\uff08\u9ed1\u76d2/\u767d\u76d2\u5747\u53ef\uff09\u5bf9\u5b66\u751f\u6a21\u578b\u96be\u4ee5\u8986\u76d6\u7684\u56f0\u96be\u6837\u672c\u8fdb\u884c\u524d\u5411KL\u84b8\u998f\u4ee5\u6269\u5c55\u63a2\u7d22\u652f\u6491\uff0c\u518d\u5207\u56de\u6807\u51c6GRPO\u5f3a\u5316\u5b66\u4e60\u7cbe\u70bc\u3002\u5728\u6570\u5b66\u63a8\u7406\u548c\u667a\u80fd\u4f53\u4efb\u52a1\u4e0a\u5747\u663e\u8457\u4f18\u4e8e\u5355\u7eafGRPO\uff0c\u5982Qwen3-8B\u5728AIME 2025\u4e0a\u4ece36.9\u63d0\u5347\u81f340.3\u3002", "categories": ["cs.LG", "cs.AI", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05339", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f", "\u63a8\u7406", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05339v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "TREK: Distill to Explore, Reinforce to Refine", "tldr": "TREK\u63d0\u51fa\u4e00\u79cd\u4e24\u9636\u6bb5\u8bad\u7ec3\u6846\u67b6\uff1a\u5148\u7528\u6559\u5e08\u6a21\u578b\uff08\u9ed1\u76d2/\u767d\u76d2\u5747\u53ef\uff09\u5bf9\u5b66\u751f\u6a21\u578b\u96be\u4ee5\u8986\u76d6\u7684\u56f0\u96be\u6837\u672c\u8fdb\u884c\u524d\u5411KL\u84b8\u998f\u4ee5\u6269\u5c55\u63a2\u7d22\u652f\u6491\uff0c\u518d\u5207\u56de\u6807\u51c6GRPO\u5f3a\u5316\u5b66\u4e60\u7cbe\u70bc\u3002\u5728\u6570\u5b66\u63a8\u7406\u548c\u667a\u80fd\u4f53\u4efb\u52a1\u4e0a\u5747\u663e\u8457\u4f18\u4e8e\u5355\u7eafGRPO\uff0c\u5982Qwen3-8B\u5728AIME 2025\u4e0a\u4ece36.9\u63d0\u5347\u81f340.3\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Audio intelligence involves understanding, reasoning about, and generating both audio and speech. In this work, we introduce Nemotron-Labs-Audex-30B-A3B (Audex), a unified audio-text LLM built on Nemotron-Cascade-2-30B-A3B, a strong text-only MoE LLM. Audex adopts a simple unified design with a single Transformer decoder: audio inputs are encoded and projected into the text embedding space, while text tokens and quantized audio output tokens are treated uniformly during generation. This architecture enables strong audio-text fusion, seamless multimodal generation, and compatibility with standard LLM training and inference infrastructure. For training, we meticulously curate audio-text datasets comprising 157.4B audio tokens and 320.5B text tokens. We apply multi-stage supervised training on these datasets, followed by text-only Cascade RL and multi-domain on-policy distillation. Audex delivers state-of-the-art audio understanding, speech recognition and translation, text-to-speech, audio generation, and speech-to-speech generation, while preserving very compelling reasoning, alignment, knowledge, long-context, and agentic capabilities of its text-only LLM backbone with marginal or no regression. We release the model checkpoints to facilitate open research.", "arxiv_id": "2607.05196", "arxiv_url": "https://arxiv.org/abs/2607.05196", "authors": ["Zhifeng Kong", "Sang-gil Lee", "Jaehyeon Kim", "Boxin Wang", "Zihan Liu", "Sungwon Kim", "Yang Chen", "Arushi Goel", "Rajarshi Roy", "Wenliang Dai", "Zhuolin Yang", "Yangyi Chen", "Dongfu Jiang", "Sreyan Ghosh", "Tuomas Rintamaki", "Andrew Tao", "Jonathan Raiman", "Mohammad Shoeybi", "Bryan Catanzaro", "Wei Ping"], "brief": "\u63d0\u51faAudex\uff0c\u4e00\u4e2a\u57fa\u4e8e\u5f3a\u6587\u672cMoE\u5927\u6a21\u578b\u6784\u5efa\u7684\u7edf\u4e00\u97f3\u9891-\u6587\u672cLLM\uff0c\u901a\u8fc7\u5355\u4e00Transformer\u89e3\u7801\u5668\u67b6\u6784\u5b9e\u73b0\u97f3\u9891\u7406\u89e3\u3001\u8bed\u97f3\u8bc6\u522b\u7ffb\u8bd1\u3001\u6587\u672c\u8f6c\u8bed\u97f3\u7b49\u591a\u9879\u4efb\u52a1\u7684\u6700\u4f18\u6027\u80fd\uff0c\u540c\u65f6\u51e0\u4e4e\u4e0d\u635f\u5931\u539f\u6709\u6587\u672c\u63a8\u7406\u80fd\u529b\u3002\u8bad\u7ec3\u4f7f\u7528157.4B\u97f3\u9891token\u548c320.5B\u6587\u672ctoken\uff0c\u5e76\u7ed3\u5408\u591a\u9636\u6bb5\u76d1\u7763\u8bad\u7ec3\u3001\u5f3a\u5316\u5b66\u4e60\u548c\u591a\u57df\u84b8\u998f\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG", "cs.SD", "eess.AS"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05196", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u5927\u8bed\u8a00\u6a21\u578b", "\u97f3\u9891\u7406\u89e3", "\u6df7\u5408\u4e13\u5bb6\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05196v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Unified Audio Intelligence Without Regressing on Text Intelligence", "tldr": "\u63d0\u51faAudex\uff0c\u4e00\u4e2a\u57fa\u4e8e\u5f3a\u6587\u672cMoE\u5927\u6a21\u578b\u6784\u5efa\u7684\u7edf\u4e00\u97f3\u9891-\u6587\u672cLLM\uff0c\u901a\u8fc7\u5355\u4e00Transformer\u89e3\u7801\u5668\u67b6\u6784\u5b9e\u73b0\u97f3\u9891\u7406\u89e3\u3001\u8bed\u97f3\u8bc6\u522b\u7ffb\u8bd1\u3001\u6587\u672c\u8f6c\u8bed\u97f3\u7b49\u591a\u9879\u4efb\u52a1\u7684\u6700\u4f18\u6027\u80fd\uff0c\u540c\u65f6\u51e0\u4e4e\u4e0d\u635f\u5931\u539f\u6709\u6587\u672c\u63a8\u7406\u80fd\u529b\u3002\u8bad\u7ec3\u4f7f\u7528157.4B\u97f3\u9891token\u548c320.5B\u6587\u672ctoken\uff0c\u5e76\u7ed3\u5408\u591a\u9636\u6bb5\u76d1\u7763\u8bad\u7ec3\u3001\u5f3a\u5316\u5b66\u4e60\u548c\u591a\u57df\u84b8\u998f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Test maintenance is a critical, yet costly, activity - particularly as codebases rapidly evolve. To assist, we present MAST, a multi-agent framework that predicts which test cases require maintenance following changes to the production code. This identification task is necessary as a precondition to any subsequent maintenance activities, but remains challenging due to the complex relationships between production and test code. MAST advances the state-of-the-art by integrating multiple analyses -- including static, lexical, and semantic analyses - through an intelligent fusion and post-check procedure and by focusing on a realistic use and evaluation setting - i.e., standardized input formats, repository-level analyses, and the ability to infer relations between test and production artifacts rather than assuming a pre-existing mapping. We evaluated MAST on 21 industrial Java repositories from Ericsson AB, considering situations where test maintenance both was and was not required in the ground truth. MAST yielded superior precision to a state-of-the-art baseline - resulting in a higher accuracy, F1, and F2 score - with only some loss in recall. Our ablation study demonstrates the value of each analysis in producing the final recommendations. MAST illustrates the potential of multi-agent systems that can fuse multiple information sources when performing software testing tasks.", "arxiv_id": "2607.04786", "arxiv_url": "https://arxiv.org/abs/2607.04786", "authors": ["Jingxiong Liu", "Nasser Mohammadiha", "Gregory Gay"], "brief": "\u63d0\u51faMAST\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u878d\u5408\u9759\u6001\u3001\u8bcd\u6cd5\u548c\u8bed\u4e49\u5206\u6790\u6765\u9884\u6d4b\u751f\u4ea7\u4ee3\u7801\u53d8\u66f4\u540e\u54ea\u4e9b\u6d4b\u8bd5\u7528\u4f8b\u9700\u8981\u7ef4\u62a4\u3002\u5728\u7231\u7acb\u4fe121\u4e2a\u5de5\u4e1aJava\u4ed3\u5e93\u4e0a\u8bc4\u4f30\uff0c\u76f8\u6bd4\u57fa\u7ebf\u65b9\u6cd5\u5728\u7cbe\u786e\u7387\u3001F1\u548cF2\u5206\u6570\u4e0a\u5747\u6709\u63d0\u5347\uff0c\u4ec5\u53ec\u56de\u7387\u7565\u6709\u635f\u5931\u3002", "categories": ["cs.SE", "cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04786", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8f6f\u4ef6\u6d4b\u8bd5", "\u591a\u667a\u80fd\u4f53", "\u4fe1\u606f\u878d\u5408"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04786v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "An Exploration of Agentic Information Fusion for Test Maintenance Prediction", "tldr": "\u63d0\u51faMAST\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u878d\u5408\u9759\u6001\u3001\u8bcd\u6cd5\u548c\u8bed\u4e49\u5206\u6790\u6765\u9884\u6d4b\u751f\u4ea7\u4ee3\u7801\u53d8\u66f4\u540e\u54ea\u4e9b\u6d4b\u8bd5\u7528\u4f8b\u9700\u8981\u7ef4\u62a4\u3002\u5728\u7231\u7acb\u4fe121\u4e2a\u5de5\u4e1aJava\u4ed3\u5e93\u4e0a\u8bc4\u4f30\uff0c\u76f8\u6bd4\u57fa\u7ebf\u65b9\u6cd5\u5728\u7cbe\u786e\u7387\u3001F1\u548cF2\u5206\u6570\u4e0a\u5747\u6709\u63d0\u5347\uff0c\u4ec5\u53ec\u56de\u7387\u7565\u6709\u635f\u5931\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Physical design quality-of-results~(QoR) optimization is hard and expensive. Choices made at one stage can help or hurt later stages. Each evaluation requires a costly EDA run through the full flow. While existing methods still treat optimization as flat parameter tuning or a LLM-based script generation task, we present AgenticPD, a stage-aware agentic framework for physical design QoR optimization. Instead of re-running the full flow after every trial, AgenticPD is organized around the stage boundaries of the physical design flow, where a Judge Agent navigates the search and stage-specialized agents make local decisions within their own stage using stage-local tools. Additionally, the agent harness in AgenticPD provides structured observations, execution history, and agent context management. As a result, the system can branch from prior intermediate states and reuse checkpoints to continue the optimization procedure, and every candidate is evaluated at the post-route signoff. Across these baselines, AgenticPD achieves strong post-route timing while remaining competitive in power and area.", "arxiv_id": "2607.04758", "arxiv_url": "https://arxiv.org/abs/2607.04758", "authors": ["Shuo Ren", "Zijin Cheng", "Yaohui Han", "Libo Shen", "Leilei Jin", "Wanting Tian", "Rongliang Fu", "Chao Wang", "Bei Yu", "Tsung-Yi Ho"], "brief": "AgenticPD\u662f\u4e00\u4e2a\u9762\u5411\u82af\u7247\u7269\u7406\u8bbe\u8ba1QoR\u4f18\u5316\u7684\u9636\u6bb5\u611f\u77e5\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7Judge Agent\u534f\u8c03\u5404\u9636\u6bb5\u4e13\u7528\u5b50\u667a\u80fd\u4f53\u8fdb\u884c\u5c40\u90e8\u51b3\u7b56\uff0c\u5e76\u5229\u7528\u68c0\u67e5\u70b9\u590d\u7528\u907f\u514d\u6bcf\u6b21\u90fd\u91cd\u8dd1\u5b8c\u6574EDA\u6d41\u7a0b\uff0c\u6700\u7ec8\u5728\u540e\u5e03\u7ebf\u65f6\u5e8f\u3001\u529f\u8017\u548c\u9762\u79ef\u6307\u6807\u4e0a\u53d6\u5f97\u4e86\u5f3a\u7ade\u4e89\u529b\u7684\u4f18\u5316\u7ed3\u679c\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04758", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u7269\u7406\u8bbe\u8ba1", "EDA\u4f18\u5316", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04758v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AgenticPD: A Stage-Aware Agentic Framework for Physical Design QoR Optimization", "tldr": "AgenticPD\u662f\u4e00\u4e2a\u9762\u5411\u82af\u7247\u7269\u7406\u8bbe\u8ba1QoR\u4f18\u5316\u7684\u9636\u6bb5\u611f\u77e5\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7Judge Agent\u534f\u8c03\u5404\u9636\u6bb5\u4e13\u7528\u5b50\u667a\u80fd\u4f53\u8fdb\u884c\u5c40\u90e8\u51b3\u7b56\uff0c\u5e76\u5229\u7528\u68c0\u67e5\u70b9\u590d\u7528\u907f\u514d\u6bcf\u6b21\u90fd\u91cd\u8dd1\u5b8c\u6574EDA\u6d41\u7a0b\uff0c\u6700\u7ec8\u5728\u540e\u5e03\u7ebf\u65f6\u5e8f\u3001\u529f\u8017\u548c\u9762\u79ef\u6307\u6807\u4e0a\u53d6\u5f97\u4e86\u5f3a\u7ade\u4e89\u529b\u7684\u4f18\u5316\u7ed3\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Agentic AI is shifting online shopping from search toward delegated purchasing, where autonomous buying agents monitor markets and decide when to buy on a consumer\u0027s behalf. We study the design of such strategic buying agents, which must decide when to purchase within a finite shopping window, translating price observations, the remaining time horizon, and beliefs about future price changes into a purchase policy. We formulate this problem across three information regimes: stationary, Bayesian, and robust, and treat the resulting optimal policies as a policy menu for implementation. In the stationary regime, price adjustments follow a Poisson arrival process with a known post-adjustment price distribution; the optimal policy is a dynamic purchase-threshold rule, with the threshold governed by an ordinary differential equation. In the Bayesian regime, the adjustment intensity is known, but the price-adjustment distribution is uncertain; the optimal rule remains threshold-based, now depending on posterior beliefs, and we bound the value of knowing the true distribution. In the robust regime, the agent has only price bounds and seeks worst-case protection; randomized threshold policies achieve optimal competitive-ratio and minimax-regret guarantees. We evaluate the proposed policies on Amazon price histories from Keepa (367 items, 48,933 timestamped observations) and examine their integration into language-model buying agents. The stationary and Bayesian policies perform competitively on mean normalized consumer surplus despite their stylized assumptions, while the robust policy performs best at the distribution\u0027s 10th percentile. Results suggest language models are better suited to selecting among regimes and calibration samples than to making buy-or-wait decisions directly.", "arxiv_id": "2607.04708", "arxiv_url": "https://arxiv.org/abs/2607.04708", "authors": ["Mingyang Fu", "Ming Hu"], "brief": "\u7814\u7a76\u81ea\u4e3b\u8d2d\u4e70\u667a\u80fd\u4f53\u7684\u6700\u4f18\u51b3\u7b56\u7b56\u7565\uff0c\u5728\u5e73\u7a33\u3001\u8d1d\u53f6\u65af\u548c\u9c81\u68d2\u4e09\u79cd\u4fe1\u606f\u73af\u5883\u4e0b\u5206\u522b\u63a8\u5bfc\u51fa\u57fa\u4e8e\u52a8\u6001\u9608\u503c\u7684\u8d2d\u4e70\u7b56\u7565\u3002\u5728\u4e9a\u9a6c\u900a\u771f\u5b9e\u4ef7\u683c\u6570\u636e\u4e0a\u9a8c\u8bc1\uff0c\u53d1\u73b0\u8bed\u8a00\u6a21\u578b\u66f4\u9002\u5408\u9009\u62e9\u51b3\u7b56\u6846\u67b6\u800c\u975e\u76f4\u63a5\u505a\u51fa\u4e70/\u7b49\u51b3\u7b56\u3002", "categories": ["econ.TH", "cs.AI", "cs.CY", "cs.GT", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04708", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5728\u7ebf\u51b3\u7b56", "\u535a\u5f08\u8bba", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04708v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Strategic Buying Agents", "tldr": "\u7814\u7a76\u81ea\u4e3b\u8d2d\u4e70\u667a\u80fd\u4f53\u7684\u6700\u4f18\u51b3\u7b56\u7b56\u7565\uff0c\u5728\u5e73\u7a33\u3001\u8d1d\u53f6\u65af\u548c\u9c81\u68d2\u4e09\u79cd\u4fe1\u606f\u73af\u5883\u4e0b\u5206\u522b\u63a8\u5bfc\u51fa\u57fa\u4e8e\u52a8\u6001\u9608\u503c\u7684\u8d2d\u4e70\u7b56\u7565\u3002\u5728\u4e9a\u9a6c\u900a\u771f\u5b9e\u4ef7\u683c\u6570\u636e\u4e0a\u9a8c\u8bc1\uff0c\u53d1\u73b0\u8bed\u8a00\u6a21\u578b\u66f4\u9002\u5408\u9009\u62e9\u51b3\u7b56\u6846\u67b6\u800c\u975e\u76f4\u63a5\u505a\u51fa\u4e70/\u7b49\u51b3\u7b56\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Background: Disease severity is a multidimensional construct difficult to capture with rule-based approaches in Electronic Healthcare Records (EHR). Agentic large language model (LLM) systems could synthesise clinical evidence and reason over EHRs, but remain unevaluated for this task. Methods: MOSAIC is a two-phase agentic LLM framework for severity phenotyping, using type 2 diabetes (T2D) as a proof-of-concept. MOSAIC was evaluated on a synthetic cohort (SyntheticMass; open-weight N = 4,886; closed-weight N = 200) against three algorithmic ground truths (DCSI, DiSSCo, Cooper) and against all-cause mortality and incident complications. Open-weight (locally deployable) and proprietary pipelines were also compared. Results: The generated framework spanned domains absent from the comparators, including biomarker-based glycaemic staging, beta-cell function, and social determinants of health. Open-weight MOSAIC matched the proprietary pipeline (closed- vs open-weight weighted kappa = 0.773) and reached moderate agreement with Cooper (kappa = 0.597) and DCSI (kappa = 0.534) and fair agreement with DiSSCo (kappa = 0.320). Agent-based (Type 1) tiers showed significant separation of all-cause mortality (log-rank p \u003c 0.001; crude hazard ratios 1.6-2.4 for non-Baseline tiers), with non-monotonic separation at the upper tiers, and an inverse gradient for incident complications (log-rank p \u003c 0.001) consistent with depletion of susceptibles. Agentic classification also diverged from deterministic execution of the same rubric (MOSAIC Frozen; kappa = 0.428), indicating reasoning beyond fixed rules. Conclusion: MOSAIC shows agentic LLM systems can generate and apply clinically meaningful severity phenotypes from structured EHR data in T2D. Extending it to other diseases with similarly multidimensional severity warrants further research.", "arxiv_id": "2607.05032", "arxiv_url": "https://arxiv.org/abs/2607.05032", "authors": ["Manuela Del Castillo Suero", "Arnault-Quentin Vermillet", "Nicole Sonne Heckmann", "Darmendra Ramcharran", "Maurizio Sessa"], "brief": "MOSAIC\u662f\u4e00\u4e2a\u57fa\u4e8e\u591a\u5927\u8bed\u8a00\u6a21\u578b\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u7528\u4e8e\u4ece\u7535\u5b50\u5065\u5eb7\u8bb0\u5f55\u4e2d\u81ea\u52a8\u8bc4\u4f30\u75be\u75c5\u4e25\u91cd\u7a0b\u5ea6\uff0c\u4ee52\u578b\u7cd6\u5c3f\u75c5\u4e3a\u6982\u5ff5\u9a8c\u8bc1\u3002\u8be5\u6846\u67b6\u6574\u5408\u4e86\u751f\u7269\u6807\u5fd7\u7269\u5206\u671f\u3001\u03b2\u7ec6\u80de\u529f\u80fd\u548c\u793e\u4f1a\u5065\u5eb7\u51b3\u5b9a\u56e0\u7d20\u7b49\u4f20\u7edf\u7b97\u6cd5\u672a\u6db5\u76d6\u7684\u7ef4\u5ea6\uff0c\u5f00\u6e90\u6a21\u578b\u4e0e\u5546\u4e1a\u6a21\u578b\u8868\u73b0\u76f8\u5f53\uff08\u52a0\u6743kappa=0.773\uff09\uff0c\u4e14\u4e25\u91cd\u7a0b\u5ea6\u5206\u5c42\u5bf9\u5168\u56e0\u6b7b\u4ea1\u7387\u5177\u6709\u663e\u8457\u9884\u6d4b\u80fd\u529b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05032", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7535\u5b50\u5065\u5eb7\u8bb0\u5f55", "\u4e34\u5e8a\u8868\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05032v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Multi-Large Language Model Orchestrated Severity Assessment of Clinical Records (MOSAIC)", "tldr": "MOSAIC\u662f\u4e00\u4e2a\u57fa\u4e8e\u591a\u5927\u8bed\u8a00\u6a21\u578b\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u7528\u4e8e\u4ece\u7535\u5b50\u5065\u5eb7\u8bb0\u5f55\u4e2d\u81ea\u52a8\u8bc4\u4f30\u75be\u75c5\u4e25\u91cd\u7a0b\u5ea6\uff0c\u4ee52\u578b\u7cd6\u5c3f\u75c5\u4e3a\u6982\u5ff5\u9a8c\u8bc1\u3002\u8be5\u6846\u67b6\u6574\u5408\u4e86\u751f\u7269\u6807\u5fd7\u7269\u5206\u671f\u3001\u03b2\u7ec6\u80de\u529f\u80fd\u548c\u793e\u4f1a\u5065\u5eb7\u51b3\u5b9a\u56e0\u7d20\u7b49\u4f20\u7edf\u7b97\u6cd5\u672a\u6db5\u76d6\u7684\u7ef4\u5ea6\uff0c\u5f00\u6e90\u6a21\u578b\u4e0e\u5546\u4e1a\u6a21\u578b\u8868\u73b0\u76f8\u5f53\uff08\u52a0\u6743kappa=0.773\uff09\uff0c\u4e14\u4e25\u91cd\u7a0b\u5ea6\u5206\u5c42\u5bf9\u5168\u56e0\u6b7b\u4ea1\u7387\u5177\u6709\u663e\u8457\u9884\u6d4b\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present HunyuanOCR-1.5, a lightweight end-to-end OCR-specialized vision-language model. HunyuanOCR unifies document parsing, text spotting, information extraction, text-image translation, and multi-image document understanding within a single end-to-end VLM. Building upon the lightweight architecture of HunyuanOCR-1.0, HunyuanOCR-1.5 does not redesign the backbone, but systematically improves both efficiency and capability. For efficiency, we adapt DFlash to OCR decoding, significantly reducing the latency of long structured outputs such as dense documents, tables, and formulas while preserving output distribution. Powered by DFlash, HunyuanOCR-1.5 achieves a 6.37x Transformer inference speedup and a 2.14x speedup under vLLM, delivering the fastest inference among lightweight OCR VLMs. For capability, we propose Agentic Data Flow, an agent-driven data construction system that transforms model weaknesses into executable data requirements and autonomously performs material search, quality verification, and pipeline development. It substantially improves long-tail capabilities in ancient-script OCR, fine-grained chart and table parsing, multi-image text-centric QA, low-resource multilingual parsing, and document hallucination evaluation. HunyuanOCR-1.5 ranks among the top-tier end-to-end OCR solutions on OmniDocBench v1.6 while achieving new performance milestones across these long-tail tasks. Combined with an upgraded pretraining and post-training recipe, HunyuanOCR-1.5 further extends its capability in high-resolution, long-context, and multi-task scenarios. Experiments demonstrate faster inference, broader OCR capability coverage, and the deployment advantages of a lightweight end-to-end model. We will release the model weights and training code to support future research and real-world OCR applications.", "arxiv_id": "2607.04884", "arxiv_url": "https://arxiv.org/abs/2607.04884", "authors": ["Gengluo Li", "Xingyu Wan", "Shangpin Peng", "Weinong Wang", "Hao Feng", "Yongkun Du", "Binghong Wu", "Zheng Ruan", "Zhiqiong Lu", "Liang Wu", "Pengyuan Lyu", "Huawen Shen", "Zibin Lin", "Shijing Hu", "Jieneng Yang", "Hongbing Wen", "Guanghua Yu", "Hong Liu", "Bochao Wang", "Can Ma", "Han Hu", "Chengquan Zhang", "Yu Zhou"], "brief": "HunyuanOCR-1.5\u662f\u4e00\u4e2a\u8f7b\u91cf\u7ea7\u7aef\u5230\u7aefOCR\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u9002\u914dDFlash\u6ce8\u610f\u529b\u673a\u5236\u5b9e\u73b06.37\u500dTransformer\u63a8\u7406\u52a0\u901f\uff0c\u5e76\u63d0\u51faAgentic Data Flow\u667a\u80fd\u4f53\u6570\u636e\u6784\u5efa\u7cfb\u7edf\u81ea\u52a8\u8865\u5f3a\u957f\u5c3e\u80fd\u529b\uff08\u53e4\u6587\u5b57\u3001\u591a\u8bed\u8a00\u3001\u56fe\u8868\u89e3\u6790\u7b49\uff09\u3002\u5728OmniDocBench v1.6\u4e0a\u8dfb\u8eab\u9876\u7ea7OCR\u65b9\u6848\uff0c\u540c\u65f6\u4fdd\u6301\u8f7b\u91cf\u90e8\u7f72\u4f18\u52bf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04884", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["OCR", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53", "\u63a8\u7406\u52a0\u901f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04884v1", "published_at": "2026-07-06", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "HunyuanOCR-1.5: Making Lightweight OCR VLMs Faster and Better", "tldr": "HunyuanOCR-1.5\u662f\u4e00\u4e2a\u8f7b\u91cf\u7ea7\u7aef\u5230\u7aefOCR\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u9002\u914dDFlash\u6ce8\u610f\u529b\u673a\u5236\u5b9e\u73b06.37\u500dTransformer\u63a8\u7406\u52a0\u901f\uff0c\u5e76\u63d0\u51faAgentic Data Flow\u667a\u80fd\u4f53\u6570\u636e\u6784\u5efa\u7cfb\u7edf\u81ea\u52a8\u8865\u5f3a\u957f\u5c3e\u80fd\u529b\uff08\u53e4\u6587\u5b57\u3001\u591a\u8bed\u8a00\u3001\u56fe\u8868\u89e3\u6790\u7b49\uff09\u3002\u5728OmniDocBench v1.6\u4e0a\u8dfb\u8eab\u9876\u7ea7OCR\u65b9\u6848\uff0c\u540c\u65f6\u4fdd\u6301\u8f7b\u91cf\u90e8\u7f72\u4f18\u52bf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recovering dynamic environment maps from a single in-the-wild video is crucial for photorealistic rendering, yet remains a challenge. Recent video generation models can produce photorealistic scenes with complex lighting, possessing an inherent understanding of lighting. In this paper, we introduce V-LITE (Video generation models are inherent lighting estimators), a framework that unlocks this internal knowledge by reframing lighting estimation as a guided video inpainting task. Inspired by VFX industry practices, we insert a synthetic chrome ball into the scene to compel the model to generate physically plausible reflections from the surrounding spatio-temporal context. To bridge the gap from LDR-native models to the HDR domain, we design an HDR-aware VAE and employ an efficient LoRA-based fine-tuning strategy. We then construct a mixed dataset comprising high-fidelity HDR images to provide realistic HDR priors, and in-the-wild HDR videos to provide dynamic spatio-temporal context. Extensive experiments demonstrate that V-LITE produces temporally coherent HDR environment maps, revealing that modern video diffusion models are not merely synthesizers but also powerful, inherently capable estimators of physical scene lighting.", "arxiv_id": "2607.04674", "arxiv_url": "https://arxiv.org/abs/2607.04674", "authors": ["Ziqi Cai", "Shuchen Weng", "Kaiqi Liu
