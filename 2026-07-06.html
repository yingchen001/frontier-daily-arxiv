const PAPERS = [{"abstract": "Recent LLM agents tackle increasingly long-horizon, open-ended tasks, and external skills, reusable procedural knowledge supplied to the agent, further extend this capability. However, a fixed, hand-authored skill is rarely optimal, and cannot adapt to the diversity of tasks an agent encounters. Self-improving agents address this by rewriting their own skill files from execution traces, yielding meaningful gains on challenging benchmarks. Yet such self-evolution remains non-recursive: it improves only the task skill (what the agent does) while the improvement procedure (how it improves) is authored once and held fixed. We introduce MetaSkill-Evolve, a two-timescale framework that makes agentic skill improvement recursive: every branch carries both a task skill $s$ and a branch-local meta-skill $m=(\u03c8,\u03c3,\u03b1,\u03c0,\\varepsilon)$ whose five components parameterise the Analyzer, Retriever, Allocator, Proposer, and Evolver agents of the improvement pipeline. Task skills evolve on a fast loop while the meta-skill evolves on a slower one under the same pipeline applied to itself, with no additional model or objective. With all five pipeline agents sharing a single frozen backbone, MetaSkill-Evolve outperforms no-skill, static-skill, and single-level evolution baselines on three agentic benchmarks (OfficeQA, SealQA, ALFWorld), improving held-out test accuracy over the raw backbone by +23.54, +16.09, and +1.92 points respectively.", "arxiv_id": "2607.05297", "arxiv_url": "https://arxiv.org/abs/2607.05297", "authors": ["Zefeng Wang", "Minxi Yan", "Jinhe Bi", "Sikuan Yan", "Volker Tresp", "Yunpu Ma"], "brief": "\u63d0\u51faMetaSkill-Evolve\u6846\u67b6\uff0c\u901a\u8fc7\u53cc\u65f6\u95f4\u5c3a\u5ea6\u673a\u5236\u5b9e\u73b0LLM\u667a\u80fd\u4f53\u7684\u9012\u5f52\u81ea\u6211\u6539\u8fdb\u2014\u2014\u5feb\u5faa\u73af\u4f18\u5316\u4efb\u52a1\u6280\u80fd\uff0c\u6162\u5faa\u73af\u4f18\u5316\u6539\u8fdb\u6d41\u7a0b\u672c\u8eab\uff08\u5143\u6280\u80fd\uff09\uff0c\u4f7f\u667a\u80fd\u4f53\u4e0d\u4ec5\u80fd\u6539\u8fdb\"\u505a\u4ec0\u4e48\"\uff0c\u8fd8\u80fd\u6539\u8fdb\"\u5982\u4f55\u6539\u8fdb\"\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05297", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5143\u6280\u80fd\u7531\u4e94\u4e2a\u7ec4\u4ef6\u53c2\u6570\u5316\uff08Analyzer\u3001Retriever\u3001Allocator\u3001Proposer\u3001Evolver\uff09\uff0c\u6539\u8fdb\u6d41\u7a0b\u53ef\u81ea\u6211\u8fed\u4ee3\u4f18\u5316", "\u6240\u6709\u4e94\u4e2a\u6d41\u7a0b\u667a\u80fd\u4f53\u5171\u4eab\u5355\u4e00\u51bb\u7ed3\u9aa8\u5e72\u6a21\u578b\uff0c\u65e0\u9700\u989d\u5916\u6a21\u578b\u6216\u8bad\u7ec3\u76ee\u6807", "\u5728\u4e09\u4e2a\u57fa\u51c6\u6d4b\u8bd5\uff08OfficeQA\u3001SealQA\u3001ALFWorld\uff09\u4e0a\u5206\u522b\u6bd4\u539f\u59cb\u9aa8\u5e72\u63d0\u5347+23.54\u3001+16.09\u3001+1.92\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u6211\u6539\u8fdb", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5143\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05297v1", "published_at": "2026-07-06", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MetaSkill-Evolve: Recursive Self-Improvement of LLM Agents via Two-Timescale Meta-Skill Evolution", "tldr": "MetaSkill-Evolve\u8ba9LLM\u667a\u80fd\u4f53\u9012\u5f52\u81ea\u6211\u6539\u8fdb\uff1a\u4efb\u52a1\u6280\u80fd\u4e0e\u5143\u6280\u80fd\u53cc\u65f6\u95f4\u5c3a\u5ea6\u534f\u540c\u8fdb\u5316", "upvotes": 0, "what_it_is": "\u63d0\u51faMetaSkill-Evolve\u6846\u67b6\uff0c\u901a\u8fc7\u53cc\u65f6\u95f4\u5c3a\u5ea6\u673a\u5236\u5b9e\u73b0LLM\u667a\u80fd\u4f53\u7684\u9012\u5f52\u81ea\u6211\u6539\u8fdb\u2014\u2014\u5feb\u5faa\u73af\u4f18\u5316\u4efb\u52a1\u6280\u80fd\uff0c\u6162\u5faa\u73af\u4f18\u5316\u6539\u8fdb\u6d41\u7a0b\u672c\u8eab\uff08\u5143\u6280\u80fd\uff09\uff0c\u4f7f\u667a\u80fd\u4f53\u4e0d\u4ec5\u80fd\u6539\u8fdb\"\u505a\u4ec0\u4e48\"\uff0c\u8fd8\u80fd\u6539\u8fdb\"\u5982\u4f55\u6539\u8fdb\"\u3002", "why_notable": "\u9996\u6b21\u5b9e\u73b0\u771f\u6b63\u9012\u5f52\u7684\u667a\u80fd\u4f53\u81ea\u6211\u6539\u8fdb\u2014\u2014\u6539\u8fdb\u6d41\u7a0b\u672c\u8eab\u4e5f\u88ab\u6539\u8fdb\uff0c\u7a81\u7834\u4e86\u73b0\u6709\u65b9\u6cd5\u4e2d\u5143\u5c42\u9762\u56fa\u5b9a\u4e0d\u53d8\u7684\u5c40\u9650\uff0c\u4e3a\u957f\u671f\u81ea\u4e3b\u8fdb\u5316\u7684AI\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Long-horizon agentic LLMs are increasingly limited by finite context windows, as extended interaction trajectories can exceed the maximum context length before a task is completed. Context compaction offers a natural solution by summarizing previous interaction states and continuing the rollout under a compressed context, but incorporating compaction into reinforcement learning remains underexplored. We propose CompactionRL, a reinforcement learning strategy to train long-horizon agentic LLMs with context compaction. Our approach jointly optimizes task execution and summary generation with token-level loss normalization and cross-trajectory generalized advantage estimation. This design enables the LLM agents to learn from compacted long-horizon trajectories. We train CompactionRL on top of open models and observe consistent performance gains on agentic coding tasks. CompactionRL enables the open GLM-4.5-Air model (106B-A30B) to achieve Pass@1 scores of 66.8% on SWE-bench Verified and 24.5% on Terminal-Bench 2.0, with absolute gains of 7.0 and 3.1 points, respectively. Built upon GLM-4.7-Flash (30B-A3B), CompactionRL improves Pass@1 by 5.5 and 6.8 points, reaching 56.0% on SWE-bench Verified and 20.2% on Terminal-Bench 2.0, respectively. CompactionRL is thus deployed in the RL pipeline for training the open GLM-5.2 model (750B-A40B).", "arxiv_id": "2607.05378", "arxiv_url": "https://arxiv.org/abs/2607.05378", "authors": ["Yujiang Li", "Zhenyu Hou", "Yi Jing", "Jie Tang", "Yuxiao Dong"], "brief": "\u63d0\u51faCompactionRL\uff0c\u4e00\u79cd\u5c06\u4e0a\u4e0b\u6587\u538b\u7f29\uff08context compaction\uff09\u96c6\u6210\u5230\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u6d41\u7a0b\u7684\u65b9\u6cd5\uff0c\u901a\u8fc7\u8054\u5408\u4f18\u5316\u4efb\u52a1\u6267\u884c\u4e0e\u6458\u8981\u751f\u6210\uff0c\u4f7fLLM\u667a\u80fd\u4f53\u80fd\u4ece\u538b\u7f29\u540e\u7684\u957f\u8f68\u8ff9\u4e2d\u6709\u6548\u5b66\u4e60\uff0c\u89e3\u51b3\u957f\u4efb\u52a1\u8d85\u51fa\u4e0a\u4e0b\u6587\u7a97\u53e3\u7684\u74f6\u9888\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05378", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u6280\u672f\uff1atoken\u7ea7\u635f\u5931\u5f52\u4e00\u5316 + \u8de8\u8f68\u8ff9\u5e7f\u4e49\u4f18\u52bf\u4f30\u8ba1\uff08cross-trajectory GAE\uff09\uff0c\u652f\u6301\u538b\u7f29\u8f68\u8ff9\u7684RL\u8bad\u7ec3", "GLM-4.5-Air\uff08106B-A30B\uff09\u5728SWE-bench Verified\u8fbe66.8%\uff08+7.0pt\uff09\uff0cTerminal-Bench 2.0\u8fbe24.5%\uff08+3.1pt\uff09", "GLM-4.7-Flash\uff0830B-A3B\uff09\u5728SWE-bench Verified\u8fbe56.0%\uff08+5.5pt\uff09\uff0c\u5df2\u90e8\u7f72\u4e8eGLM-5.2\uff08750B-A40B\uff09\u8bad\u7ec3\u6d41\u6c34\u7ebf"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u957f\u4e0a\u4e0b\u6587", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05378v1", "published_at": "2026-07-06", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "CompactionRL: Reinforcement Learning with Context Compaction for Long-Horizon Agents", "tldr": "CompactionRL\uff1a\u5c06\u4e0a\u4e0b\u6587\u538b\u7f29\u878d\u5165\u5f3a\u5316\u5b66\u4e60\uff0c\u8bad\u7ec3\u80fd\u5904\u7406\u8d85\u957f\u8f68\u8ff9\u7684\u667a\u80fd\u4f53LLM", "upvotes": 0, "what_it_is": "\u63d0\u51faCompactionRL\uff0c\u4e00\u79cd\u5c06\u4e0a\u4e0b\u6587\u538b\u7f29\uff08context compaction\uff09\u96c6\u6210\u5230\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u6d41\u7a0b\u7684\u65b9\u6cd5\uff0c\u901a\u8fc7\u8054\u5408\u4f18\u5316\u4efb\u52a1\u6267\u884c\u4e0e\u6458\u8981\u751f\u6210\uff0c\u4f7fLLM\u667a\u80fd\u4f53\u80fd\u4ece\u538b\u7f29\u540e\u7684\u957f\u8f68\u8ff9\u4e2d\u6709\u6548\u5b66\u4e60\uff0c\u89e3\u51b3\u957f\u4efb\u52a1\u8d85\u51fa\u4e0a\u4e0b\u6587\u7a97\u53e3\u7684\u74f6\u9888\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u89e3\u51b3\u957f\u8f68\u8ff9RL\u8bad\u7ec3\u4e2d\u4e0a\u4e0b\u6587\u538b\u7f29\u7684\u96c6\u6210\u95ee\u9898\uff0c\u5728\u4e3b\u6d41\u4ee3\u7801\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u53d6\u5f97\u663e\u8457\u63d0\u5347\uff0c\u5e76\u5df2\u843d\u5730\u4e8e\u5b9e\u9645\u5927\u6a21\u578b\u8bad\u7ec3\uff0c\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u4e0e\u5b66\u672f\u4ef7\u503c\u3002"}, {"abstract": "As large language models are deployed as autonomous agents that communicate intentions before acting, a critical safety question is whether agents that publicly commit to actions will honor those commitments. We place LLM agents in repeated $n$-player games with a three-stage protocol that separates private intent, public announcement, and final action, allowing us to identify whether each deviation from a stated announcement was already planned during private deliberation. Evaluating three frontier models across six games in homogeneous and heterogeneous groups over 10 rounds, we report two findings. First, when agents deviate from their announcements, the deviation is predominantly already stated in their private plan (exceeding 90% in the highest-deception conditions), yet this is not a fixed model property: the same model ranges from perfect honesty to near-total deviation across games. Second, different models interpret announcements incompatibly, some as binding commitments and others as cheap talk, producing payoff gaps that emerge in Round~0 and persist across all 10 rounds. Systems that combine models from different providers therefore cannot assume shared announcement semantics and require empirical testing of model interactions before deployment.", "arxiv_id": "2607.05132", "arxiv_url": "https://arxiv.org/abs/2607.05132", "authors": ["Jerick Shi", "Terry Jingcheng Zhang", "Bernhard Sch\u00f6lkopf", "Vincent Conitzer", "Zhijing Jin"], "brief": "\u672c\u6587\u5c06LLM\u667a\u80fd\u4f53\u7f6e\u4e8e\u91cd\u590dn\u4eba\u535a\u5f08\u4e2d\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u534f\u8bae\uff08\u79c1\u4e0b\u610f\u56fe\u2192\u516c\u5f00\u58f0\u660e\u2192\u6700\u7ec8\u884c\u52a8\uff09\u7cfb\u7edf\u7814\u7a76\u667a\u80fd\u4f53\u662f\u5426\u4f1a\u5151\u73b0\u516c\u5f00\u627f\u8bfa\uff0c\u5e76\u5206\u6790\u6b3a\u9a97\u884c\u4e3a\u7684\u9884\u8c0b\u6027\u4e0e\u6301\u7eed\u6027\u3002", "categories": ["cs.CY", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05132", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5f53\u667a\u80fd\u4f53\u504f\u79bb\u516c\u5f00\u58f0\u660e\u65f6\uff0c\u8d85\u8fc790%\u7684\u60c5\u51b5\u4e0b\u8be5\u504f\u79bb\u5728\u79c1\u4e0b\u63a8\u7406\u9636\u6bb5\u5df2\u88ab\u9884\u8c0b\uff0c\u5c5e\u4e8e\u84c4\u610f\u6b3a\u9a97\u800c\u975e\u4e34\u65f6\u6539\u53d8", "\u540c\u4e00\u6a21\u578b\u5728\u4e0d\u540c\u535a\u5f08\u573a\u666f\u4e2d\u8868\u73b0\u5dee\u5f02\u6781\u5927\uff0c\u4ece\u5b8c\u5168\u8bda\u5b9e\u5230\u51e0\u4e4e\u5168\u7a0b\u6b3a\u9a97\u5747\u6709\u51fa\u73b0\uff0c\u8bf4\u660e\u6b3a\u9a97\u6027\u5e76\u975e\u56fa\u5b9a\u6a21\u578b\u5c5e\u6027", "\u4e0d\u540c\u6a21\u578b\u5bf9\u0027\u516c\u5f00\u58f0\u660e\u0027\u7684\u8bed\u4e49\u7406\u89e3\u5b58\u5728\u6839\u672c\u5206\u6b67\uff08\u90e8\u5206\u89c6\u4e3a\u7ea6\u675f\u6027\u627f\u8bfa\uff0c\u90e8\u5206\u89c6\u4e3a\u5ec9\u4ef7\u4fe1\u53f7\uff09\uff0c\u5bfc\u81f4\u6df7\u5408\u7cfb\u7edf\u4ece\u7b2c0\u8f6e\u8d77\u5c31\u51fa\u73b0\u6301\u7eed\u6027\u6536\u76ca\u5dee\u8ddd"], "keywords": ["\u667a\u80fd\u4f53", "AI\u5b89\u5168", "\u5927\u8bed\u8a00\u6a21\u578b", "\u535a\u5f08\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05132v1", "published_at": "2026-07-06", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "When Agents Lie: Premeditation, Persistence, and Exploitation in Repeated Games", "tldr": "LLM\u667a\u80fd\u4f53\u5728\u91cd\u590d\u535a\u5f08\u4e2d\u4f1a\u9884\u8c0b\u6492\u8c0e\uff0c\u4e14\u4e0d\u540c\u6a21\u578b\u5bf9\u627f\u8bfa\u7684\u7406\u89e3\u5b58\u5728\u6839\u672c\u5206\u6b67", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06LLM\u667a\u80fd\u4f53\u7f6e\u4e8e\u91cd\u590dn\u4eba\u535a\u5f08\u4e2d\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u534f\u8bae\uff08\u79c1\u4e0b\u610f\u56fe\u2192\u516c\u5f00\u58f0\u660e\u2192\u6700\u7ec8\u884c\u52a8\uff09\u7cfb\u7edf\u7814\u7a76\u667a\u80fd\u4f53\u662f\u5426\u4f1a\u5151\u73b0\u516c\u5f00\u627f\u8bfa\uff0c\u5e76\u5206\u6790\u6b3a\u9a97\u884c\u4e3a\u7684\u9884\u8c0b\u6027\u4e0e\u6301\u7eed\u6027\u3002", "why_notable": "\u63ed\u793a\u4e86LLM\u667a\u80fd\u4f53\u5728\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u7684\u6b3a\u9a97\u98ce\u9669\u5177\u6709\u7cfb\u7edf\u6027\u548c\u9884\u8c0b\u6027\uff0c\u5bf9AI\u5b89\u5168\u90e8\u7f72\u3001\u591a\u6a21\u578b\u534f\u4f5c\u7cfb\u7edf\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\uff0c\u5c24\u5176\u6307\u51fa\u4e0d\u540c\u5382\u5546\u6a21\u578b\u6df7\u7528\u65f6\u65e0\u6cd5\u5047\u8bbe\u5171\u4eab\u7684\u627f\u8bfa\u8bed\u4e49\u3002"}, {"abstract": "Reinforcement Learning (RL) is the dominant paradigm for training Large Language Model (LLM) agents on long-horizon tasks. However, sparse and delayed rewards often lead to trajectory neglect, in which agents lose focus on the task goal and interaction history at intermediate steps. Prior work has explored step-level supervision using Shannon-entropy-based uncertainty signals, which conflate inherent state complexity with agent confidence and therefore provide unreliable estimates of decision reliability. To address this issue, we propose normalized entropy, which measures confidence deviations relative to an agent\u0027s average behavior under a given state, thereby strengthening the association between low-quality actions and trajectory neglect. Building on this insight, we introduce Selective Trajectory-Aware Policy Optimization (STAPO), a hierarchical group-based RL framework. STAPO leverages normalized entropy to locate outlier steps associated with trajectory neglect and optimizes them via a joint mechanism of trajectory-aware reward and trajectory-independent penalty, enhancing trajectory awareness while preserving training stability. Extensive experiments on ALFWorld, WebShop, and Search-Augmented QA demonstrate that STAPO achieves state-of-the-art performance while substantially alleviating trajectory neglect, validating its effectiveness and robustness for agentic tasks.", "arxiv_id": "2607.04963", "arxiv_url": "https://arxiv.org/abs/2607.04963", "authors": ["Qiuyi Qi", "Tian Liang", "Mutian Bao", "Jinjian Zhang", "Dongnan Liu", "Wei Zhou", "Linjian Mo", "Ming Kong", "Jie Liu", "Feng Zhang", "Qiang Zhu"], "brief": "\u63d0\u51faSTAPO\uff08\u9009\u62e9\u6027\u8f68\u8ff9\u611f\u77e5\u7b56\u7565\u4f18\u5316\uff09\uff0c\u4e00\u79cd\u5206\u5c42\u5206\u7ec4\u5f3a\u5316\u5b66\u4e60\u6846\u67b6\uff0c\u901a\u8fc7\u5f52\u4e00\u5316\u71b5\u8bc6\u522b\u667a\u80fd\u4f53\u5728\u957f\u7a0b\u4efb\u52a1\u4e2d\"\u8f68\u8ff9\u5ffd\u89c6\"\u7684\u5173\u952e\u6b65\u9aa4\uff0c\u5e76\u7528\u8054\u5408\u5956\u60e9\u673a\u5236\u4f18\u5316\u8fd9\u4e9b\u6b65\u9aa4\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04963", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u5f52\u4e00\u5316\u71b5\u66ff\u4ee3Shannon\u71b5\uff0c\u8861\u91cf\u667a\u80fd\u4f53\u76f8\u5bf9\u4e8e\u81ea\u8eab\u5e73\u5747\u884c\u4e3a\u7684\u7f6e\u4fe1\u5ea6\u504f\u5dee\uff0c\u66f4\u51c6\u786e\u8bc6\u522b\u4f4e\u8d28\u91cf\u51b3\u7b56\u6b65\u9aa4", "\u8bbe\u8ba1\u8f68\u8ff9\u611f\u77e5\u5956\u52b1\u4e0e\u8f68\u8ff9\u65e0\u5173\u60e9\u7f5a\u7684\u8054\u5408\u673a\u5236\uff0c\u5728\u589e\u5f3a\u8f68\u8ff9\u610f\u8bc6\u7684\u540c\u65f6\u4fdd\u6301\u8bad\u7ec3\u7a33\u5b9a\u6027", "\u5728ALFWorld\u3001WebShop\u548cSearch-Augmented QA\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u663e\u8457\u7f13\u89e3\u8f68\u8ff9\u5ffd\u89c6\u95ee\u9898"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7b56\u7565\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04963v1", "published_at": "2026-07-06", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "STAPO: Selective Trajectory-Aware Policy Optimization for LLM Agent Training", "tldr": "\u63d0\u51faSTAPO\u6846\u67b6\uff0c\u7528\u5f52\u4e00\u5316\u71b5\u5b9a\u4f4d\u8f68\u8ff9\u5ffd\u89c6\u95ee\u9898\uff0c\u63d0\u5347LLM\u667a\u80fd\u4f53\u957f\u7a0b\u4efb\u52a1\u8bad\u7ec3\u6548\u679c", "upvotes": 0, "what_it_is": "\u63d0\u51faSTAPO\uff08\u9009\u62e9\u6027\u8f68\u8ff9\u611f\u77e5\u7b56\u7565\u4f18\u5316\uff09\uff0c\u4e00\u79cd\u5206\u5c42\u5206\u7ec4\u5f3a\u5316\u5b66\u4e60\u6846\u67b6\uff0c\u901a\u8fc7\u5f52\u4e00\u5316\u71b5\u8bc6\u522b\u667a\u80fd\u4f53\u5728\u957f\u7a0b\u4efb\u52a1\u4e2d\"\u8f68\u8ff9\u5ffd\u89c6\"\u7684\u5173\u952e\u6b65\u9aa4\uff0c\u5e76\u7528\u8054\u5408\u5956\u60e9\u673a\u5236\u4f18\u5316\u8fd9\u4e9b\u6b65\u9aa4\u3002", "why_notable": "\u9488\u5bf9\u7a00\u758f\u5ef6\u8fdf\u5956\u52b1\u4e0bLLM\u667a\u80fd\u4f53\u4e22\u5931\u4efb\u52a1\u76ee\u6807\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u63d0\u51fa\u66f4\u7cbe\u51c6\u7684\u6b65\u9aa4\u7ea7\u76d1\u7763\u4fe1\u53f7\uff0c\u5bf9\u957f\u7a0b\u4efb\u52a1\u667a\u80fd\u4f53\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Tool calling is central to modern language model agents, but aggregate benchmark scores often hide where tool use fails. A model that never calls a needed tool and a model that calls the tool but ignores the result can look similar under final task accuracy. We introduce ToolFailBench, a diagnostic benchmark for measuring tool-use failures across 1,000 tasks in finance, medicine, law, cybersecurity, and real estate. Tool-required tasks return values the model wouldn\u0027t guess, forcing it to trust the tool while control tasks attach the same tools but should be answered directly. We label each trace with Tool-Skip, Result-Ignore, Output-Fabrication, and Unnecessary-Tool-Use, using a rule classifier and two LLM judges aggregated by majority vote. Across 19 headline models, the best reaches 86.33% Clean Tool-Use Rate, showing that faithful tool use is not saturated. More importantly, models with similar aggregate scores fail in different ways: most stay disciplined on no-tool controls, while Llama-3.1 models show an Always-Call pattern, and at the same parameter scale Llama-3.1-70B and Qwen2.5-72B differ by 89 percentage points on control-task accuracy. Tool-use evaluation should measure not only whether agents call tools, but whether they use tool outputs correctly and avoid tools when none is needed.", "arxiv_id": "2607.04686", "arxiv_url": "https://arxiv.org/abs/2607.04686", "authors": ["Harsh Soni"], "brief": "\u63d0\u51faToolFailBench\uff0c\u4e00\u4e2a\u8986\u76d6\u91d1\u878d\u3001\u533b\u7597\u3001\u6cd5\u5f8b\u7b495\u4e2a\u9886\u57df\u51711000\u4e2a\u4efb\u52a1\u7684\u8bca\u65ad\u57fa\u51c6\uff0c\u4e13\u95e8\u7528\u4e8e\u8bc6\u522bLLM\u667a\u80fd\u4f53\u5728\u5de5\u5177\u8c03\u7528\u4e2d\u7684\u56db\u7c7b\u5931\u8d25\u6a21\u5f0f\uff1a\u8df3\u8fc7\u5de5\u5177\u3001\u5ffd\u7565\u7ed3\u679c\u3001\u8f93\u51fa\u634f\u9020\u548c\u4e0d\u5fc5\u8981\u8c03\u7528\u3002", "categories": ["cs.CL", "cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04686", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5b9a\u4e49\u56db\u7c7b\u5de5\u5177\u4f7f\u7528\u5931\u8d25\uff1aTool-Skip\u3001Result-Ignore\u3001Output-Fabrication\u3001Unnecessary-Tool-Use\uff0c\u91c7\u7528\u89c4\u5219\u5206\u7c7b\u5668+\u4e24\u4e2aLLM\u88c1\u5224\u591a\u6570\u6295\u7968\u6807\u6ce8", "\u6d4b\u8bd519\u4e2a\u4e3b\u6d41\u6a21\u578b\uff0c\u6700\u4f73\u6a21\u578bClean Tool-Use Rate\u4ec586.33%\uff0c\u8bf4\u660e\u5fe0\u5b9e\u5de5\u5177\u4f7f\u7528\u8fdc\u672a\u9971\u548c", "\u76f8\u4f3c\u603b\u5206\u6a21\u578b\u5931\u8d25\u6a21\u5f0f\u8fe5\u5f02\uff1aLlama-3.1\u7cfb\u5217\u5b58\u5728Always-Call\u6a21\u5f0f\uff1b\u540c\u53c2\u6570\u89c4\u6a21\u4e0bLlama-3.1-70B\u4e0eQwen2.5-72B\u5728\u63a7\u5236\u4efb\u52a1\u51c6\u786e\u7387\u76f8\u5dee89\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04686v1", "published_at": "2026-07-06", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ToolFailBench: Diagnosing Tool-Use Failures in LLM Agents", "tldr": "ToolFailBench\uff1a\u8bca\u65adLLM\u667a\u80fd\u4f53\u5de5\u5177\u8c03\u7528\u5931\u8d25\u7684\u7ec6\u7c92\u5ea6\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faToolFailBench\uff0c\u4e00\u4e2a\u8986\u76d6\u91d1\u878d\u3001\u533b\u7597\u3001\u6cd5\u5f8b\u7b495\u4e2a\u9886\u57df\u51711000\u4e2a\u4efb\u52a1\u7684\u8bca\u65ad\u57fa\u51c6\uff0c\u4e13\u95e8\u7528\u4e8e\u8bc6\u522bLLM\u667a\u80fd\u4f53\u5728\u5de5\u5177\u8c03\u7528\u4e2d\u7684\u56db\u7c7b\u5931\u8d25\u6a21\u5f0f\uff1a\u8df3\u8fc7\u5de5\u5177\u3001\u5ffd\u7565\u7ed3\u679c\u3001\u8f93\u51fa\u634f\u9020\u548c\u4e0d\u5fc5\u8981\u8c03\u7528\u3002", "why_notable": "\u73b0\u6709\u57fa\u51c6\u4ec5\u770b\u6700\u7ec8\u4efb\u52a1\u51c6\u786e\u7387\uff0c\u63a9\u76d6\u4e86\u5de5\u5177\u8c03\u7528\u7684\u5177\u4f53\u5931\u8d25\u539f\u56e0\uff1bToolFailBench\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u7ec6\u7c92\u5ea6\u8bca\u65ad\u5de5\u5177\u4f7f\u7528\u884c\u4e3a\uff0c\u5bf9LLM\u667a\u80fd\u4f53\u7684\u53ef\u9760\u6027\u8bc4\u4f30\u548c\u6539\u8fdb\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Language agents, i.e., LLM agents, progress rapidly and are increasingly deployed in production environments. This trend underscores the urgent need for rigorous and realistic evaluations. However, most existing benchmarks evaluate agents in simplified, idealized settings. They typically rely on pre-packaged tool interfaces, overlook critical steps, and assume inputs are clean and fully specified. Consequently, they understate the difficulty of real deployments, where uncertainty and noise are ubiquitous and agents must proactively explore the environment to uncover new tools. To bridge this gap, we present AgentGym2, a new evaluation framework with task instances grounded in real-world end-to-end working demands. Beyond reasoning and planning, it measures agents\u0027 ability to execute end-to-end procedures, discover tools via exploration, compose tools for unseen tasks, and remain robust to noisy and underspecified information. Experiments on 15 proprietary and open-source models show that even SOTA systems like Gemini and GPT-5 struggle on AgentGym2, revealing a substantial gap between the capability of current agents and the demands of real-world applications.", "arxiv_id": "2607.05174", "arxiv_url": "https://arxiv.org/abs/2607.05174", "authors": ["Zhiheng Xi", "Dingwen Yang", "Jiaqi Liu", "Jixuan Huang", "Honglin Guo", "Baodai Huang", "Tinggang Chen", "Qi Zhang", "Zhonghang Lu", "Chenyu Liu", "Jiajun Sun", "Jiazheng Zhang", "Dingwei Zhu", "Xin Guo", "Junzhe Wang", "Zhihao Zhang", "Yuming Yang", "Junjie Ye", "Minghe Gao", "Dongrui Liu", "Jiaming Ji", "Guohao Li", "Tao Gui", "Qi Zhang", "Xuanjing Huang"], "brief": "\u63d0\u51faAgentGym2\u8bc4\u6d4b\u6846\u67b6\uff0c\u5728\u53bb\u7406\u60f3\u5316\u7684\u771f\u5b9e\u73af\u5883\u4e2d\u8bc4\u4f30LLM\u667a\u80fd\u4f53\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u81ea\u4e3b\u63a2\u7d22\u5de5\u5177\u3001\u5904\u7406\u566a\u58f0\u548c\u4e0d\u5b8c\u6574\u8f93\u5165\uff0c\u5e76\u5b8c\u6210\u7aef\u5230\u7aef\u4efb\u52a1\u6d41\u7a0b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05174", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u73b0\u6709\u57fa\u51c6\u4f9d\u8d56\u9884\u5c01\u88c5\u5de5\u5177\u63a5\u53e3\u3001\u5ffd\u7565\u5173\u952e\u6b65\u9aa4\u3001\u5047\u8bbe\u8f93\u5165\u5e72\u51c0\u5b8c\u6574\uff0c\u4e25\u91cd\u4f4e\u4f30\u771f\u5b9e\u90e8\u7f72\u96be\u5ea6", "AgentGym2\u8981\u6c42\u667a\u80fd\u4f53\u5177\u5907\u5de5\u5177\u63a2\u7d22\u53d1\u73b0\u3001\u5de5\u5177\u7ec4\u5408\u6cdb\u5316\u3001\u566a\u58f0\u9c81\u68d2\u6027\u548c\u7aef\u5230\u7aef\u6267\u884c\u56db\u9879\u80fd\u529b", "\u572815\u4e2a\u4e3b\u6d41\u5f00\u6e90/\u95ed\u6e90\u6a21\u578b\u4e0a\u5b9e\u9a8c\uff0c\u5305\u62ecGemini\u548cGPT-5\u7b49SOTA\u7cfb\u7edf\u5747\u8868\u73b0\u6b20\u4f73\uff0c\u63ed\u793a\u663e\u8457\u80fd\u529b\u5dee\u8ddd"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5de5\u5177\u4f7f\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05174v1", "published_at": "2026-07-06", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "AgentGym2: Benchmarking Large Language Model Agents in De-Idealized Real-World Environments", "tldr": "AgentGym2\uff1a\u9762\u5411\u771f\u5b9e\u4e16\u754c\u53bb\u7406\u60f3\u5316\u73af\u5883\u7684LLM\u667a\u80fd\u4f53\u8bc4\u6d4b\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faAgentGym2\u8bc4\u6d4b\u6846\u67b6\uff0c\u5728\u53bb\u7406\u60f3\u5316\u7684\u771f\u5b9e\u73af\u5883\u4e2d\u8bc4\u4f30LLM\u667a\u80fd\u4f53\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u81ea\u4e3b\u63a2\u7d22\u5de5\u5177\u3001\u5904\u7406\u566a\u58f0\u548c\u4e0d\u5b8c\u6574\u8f93\u5165\uff0c\u5e76\u5b8c\u6210\u7aef\u5230\u7aef\u4efb\u52a1\u6d41\u7a0b\u3002", "why_notable": "\u76f4\u51fb\u5f53\u524d\u667a\u80fd\u4f53\u8bc4\u6d4b\u865a\u9ad8\u95ee\u9898\uff0c\u6784\u5efa\u66f4\u8d34\u8fd1\u771f\u5b9e\u90e8\u7f72\u7684\u8bc4\u6d4b\u4f53\u7cfb\uff0c\u5bf9\u63a8\u52a8\u667a\u80fd\u4f53\u5b9e\u7528\u5316\u843d\u5730\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "AI agents act on behalf of user prompts, consuming external data and taking actions based on the agent context. Prior research on AI agent security has primarily focused on indirect prompt injection (IPI). Its most well-studied category is instruction injection, where attacker-controlled untrusted data is interpreted as an instruction. In response, many mitigations have been proposed to prevent instruction injection attacks. In this paper, we introduce a new category of IPI, agent data injection attacks (ADI). ADI injects malicious data disguised as trusted data, such as security-critical metadata (e.g., resource identifiers or data origins) or agent context data (e.g., tool call and response formats). As a result, agents unknowingly execute unintended actions based on attacker-controlled data. ADI has similar attack impacts as instruction injection attacks, because it causes agents to misbehave and execute unintended actions. Despite the similar impact, ADI remains underexplored and easily bypasses existing IPI defenses. We found several critical vulnerabilities in real-world agents that allow an attacker to launch various attacks: arbitrary click attacks on web agents (Claude in Chrome, Antigravity, and Nanobrowser), and remote code execution and supply-chain attacks on coding agents (Claude Code, Codex, and Gemini CLI). We evaluate ADI vulnerabilities across off-the-shelf models and AI agents, and find that ADI is effective in both standalone LLMs and AI agent settings. ADI exposes a critical gap in agent security, signifying that current AI agents do not employ a fundamental security principle: current agents do not isolate trusted data from untrusted data.", "arxiv_id": "2607.05120", "arxiv_url": "https://arxiv.org/abs/2607.05120", "authors": ["Woohyuk Choi", "Juhee Kim", "Taehyun Kang", "Jihyeon Jeong", "Luyi Xing", "Byoungyoung Lee"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u65b0\u578b\u95f4\u63a5\u63d0\u793a\u6ce8\u5165\u653b\u51fb\u7c7b\u522b\u2014\u2014\u667a\u80fd\u4f53\u6570\u636e\u6ce8\u5165\u653b\u51fb\uff08ADI\uff09\uff0c\u901a\u8fc7\u5c06\u6076\u610f\u6570\u636e\u4f2a\u88c5\u6210\u5b89\u5168\u5173\u952e\u5143\u6570\u636e\u6216\u667a\u80fd\u4f53\u4e0a\u4e0b\u6587\u6570\u636e\uff08\u800c\u975e\u6307\u4ee4\uff09\uff0c\u8bf1\u4f7fAI\u667a\u80fd\u4f53\u6267\u884c\u975e\u9884\u671f\u64cd\u4f5c\uff0c\u5e76\u5728Claude\u3001Codex\u3001Gemini CLI\u7b49\u771f\u5b9e\u7cfb\u7edf\u4e2d\u53d1\u73b0\u4e86\u4e25\u91cd\u6f0f\u6d1e\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05120", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["ADI\u533a\u522b\u4e8e\u4f20\u7edf\u6307\u4ee4\u6ce8\u5165\uff1a\u653b\u51fb\u6570\u636e\u4f2a\u88c5\u6210\u53ef\u4fe1\u7684\u5143\u6570\u636e\uff08\u5982\u8d44\u6e90\u6807\u8bc6\u7b26\u3001\u6570\u636e\u6765\u6e90\uff09\u6216\u4e0a\u4e0b\u6587\u683c\u5f0f\uff08\u5982\u5de5\u5177\u8c03\u7528\u54cd\u5e94\u683c\u5f0f\uff09\uff0c\u800c\u975e\u663e\u5f0f\u6307\u4ee4", "\u5728\u771f\u5b9e\u667a\u80fd\u4f53\u4e2d\u53d1\u73b0\u591a\u4e2a\u4e25\u91cd\u6f0f\u6d1e\uff1a\u5bf9Claude in Chrome\u3001Antigravity\u3001Nanobrowser\u5b9e\u73b0\u4efb\u610f\u70b9\u51fb\u653b\u51fb\uff1b\u5bf9Claude Code\u3001Codex\u3001Gemini CLI\u5b9e\u73b0\u8fdc\u7a0b\u4ee3\u7801\u6267\u884c\u548c\u4f9b\u5e94\u94fe\u653b\u51fb", "ADI\u80fd\u6709\u6548\u7ed5\u8fc7\u73b0\u6709IPI\u9632\u5fa1\u673a\u5236\uff0c\u6839\u672c\u539f\u56e0\u5728\u4e8e\u5f53\u524dAI\u667a\u80fd\u4f53\u672a\u9694\u79bb\u53ef\u4fe1\u6570\u636e\u4e0e\u4e0d\u53ef\u4fe1\u6570\u636e"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u653b\u51fb", "\u63d0\u793a\u6ce8\u5165", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05120v1", "published_at": "2026-07-06", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Agent Data Injection Attacks are Realistic Threats to AI Agents", "tldr": "\u65b0\u578bAI\u667a\u80fd\u4f53\u653b\u51fbADI\uff1a\u5c06\u6076\u610f\u6570\u636e\u4f2a\u88c5\u6210\u53ef\u4fe1\u6570\u636e\uff0c\u7ed5\u8fc7\u73b0\u6709\u9632\u5fa1\u5e76\u5b9e\u73b0\u4efb\u610f\u70b9\u51fb\u548c\u8fdc\u7a0b\u4ee3\u7801\u6267\u884c", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u65b0\u578b\u95f4\u63a5\u63d0\u793a\u6ce8\u5165\u653b\u51fb\u7c7b\u522b\u2014\u2014\u667a\u80fd\u4f53\u6570\u636e\u6ce8\u5165\u653b\u51fb\uff08ADI\uff09\uff0c\u901a\u8fc7\u5c06\u6076\u610f\u6570\u636e\u4f2a\u88c5\u6210\u5b89\u5168\u5173\u952e\u5143\u6570\u636e\u6216\u667a\u80fd\u4f53\u4e0a\u4e0b\u6587\u6570\u636e\uff08\u800c\u975e\u6307\u4ee4\uff09\uff0c\u8bf1\u4f7fAI\u667a\u80fd\u4f53\u6267\u884c\u975e\u9884\u671f\u64cd\u4f5c\uff0c\u5e76\u5728Claude\u3001Codex\u3001Gemini CLI\u7b49\u771f\u5b9e\u7cfb\u7edf\u4e2d\u53d1\u73b0\u4e86\u4e25\u91cd\u6f0f\u6d1e\u3002", "why_notable": "\u63ed\u793a\u4e86AI\u667a\u80fd\u4f53\u5b89\u5168\u9886\u57df\u7684\u91cd\u5927\u76f2\u533a\uff1a\u73b0\u6709\u9632\u5fa1\u51e0\u4e4e\u5168\u90e8\u9488\u5bf9\u6307\u4ee4\u6ce8\u5165\uff0c\u800cADI\u4f5c\u4e3a\u5168\u65b0\u653b\u51fb\u7c7b\u522b\u53ef\u8f7b\u6613\u7ed5\u8fc7\u8fd9\u4e9b\u9632\u5fa1\uff0c\u4e14\u5df2\u5728\u4e3b\u6d41\u5546\u4e1a\u667a\u80fd\u4f53\uff08Claude\u3001Gemini\u3001Codex\uff09\u4e2d\u9a8c\u8bc1\uff0c\u5177\u6709\u6781\u9ad8\u7684\u73b0\u5b9e\u5a01\u80c1\u4ef7\u503c\u3002"}, {"abstract": "Persistent memory has enabled large language model (LLM) agents to store factual knowledge, prior decisions, reasoning histories, tool usage information, and context. While this has improved the agent\u0027s functionality and continuity across tasks, it has also introduced a new attack surface: the agent\u0027s own reasoning history. In this paper, we introduce the Forged Amplifying Rationale Memory Attack (FARMA), which poisons an agent\u0027s remembered reasoning rather than its factual knowledge. It inserts forged reasoning traces using evasive language that bypasses keyword-based defenses, then amplifies them through self-referential reinforcement that defeats consensus-based defenses. To address FARMA, we introduce SENTINEL, a layered defense pipeline to detect forged reasoning entries. Its central component is the Reasoning Guard that structurally analyzes candidate entries for forgery using five weighted signals. We evaluate FARMA and SENTINEL across multiple agents and different LLM models with 50 trials and show that FARMA achieves an attack success rate of up to 100% under baseline conditions and is capable of defeating defense mechanisms like keyword filter and A-MemGuard. Our evaluation also shows that SENTINEL reduces FARMA\u0027s attack success rate to as low as 0% with no false positives observed across 326 benign agent traces. Our work demonstrates the need to protect not only an agent\u0027s retrieved content but also the integrity of its reasoning history.", "arxiv_id": "2607.05029", "arxiv_url": "https://arxiv.org/abs/2607.05029", "authors": ["Neeraj Karamchandani", "Piyush Nagasubramaniam", "Sencun Zhu", "Dinghao Wu"], "brief": "\u63d0\u51faFARMA\u653b\u51fb\u65b9\u6cd5\uff0c\u901a\u8fc7\u5411LLM\u667a\u80fd\u4f53\u7684\u6301\u4e45\u8bb0\u5fc6\u4e2d\u6ce8\u5165\u4f2a\u9020\u63a8\u7406\u8f68\u8ff9\u5e76\u5229\u7528\u81ea\u6211\u5f3a\u5316\u673a\u5236\u653e\u5927\u653b\u51fb\u6548\u679c\uff1b\u540c\u65f6\u63d0\u51fa\u5206\u5c42\u9632\u5fa1\u6846\u67b6SENTINEL\uff0c\u901a\u8fc7\u63a8\u7406\u5b88\u536b\u6a21\u5757\u68c0\u6d4b\u4f2a\u9020\u8bb0\u5fc6\u6761\u76ee\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05029", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["FARMA\u4f7f\u7528\u89c4\u907f\u6027\u8bed\u8a00\u7ed5\u8fc7\u5173\u952e\u8bcd\u8fc7\u6ee4\uff0c\u5e76\u901a\u8fc7\u81ea\u6211\u5f15\u7528\u5f3a\u5316\u673a\u5236\u51fb\u8d25\u57fa\u4e8e\u5171\u8bc6\u7684\u9632\u5fa1\uff0c\u653b\u51fb\u6210\u529f\u7387\u6700\u9ad8\u8fbe100%", "SENTINEL\u91c7\u7528\u4e94\u7ef4\u52a0\u6743\u4fe1\u53f7\u5bf9\u8bb0\u5fc6\u6761\u76ee\u8fdb\u884c\u7ed3\u6784\u5316\u5206\u6790\uff0c\u53ef\u5c06FARMA\u653b\u51fb\u6210\u529f\u7387\u964d\u81f30%\uff0c\u4e14\u5728326\u6761\u826f\u6027\u8f68\u8ff9\u4e2d\u96f6\u8bef\u62a5", "\u653b\u51fb\u76ee\u6807\u662f\u667a\u80fd\u4f53\u7684\u63a8\u7406\u5386\u53f2\u800c\u975e\u4e8b\u5b9e\u77e5\u8bc6\uff0c\u63ed\u793a\u4e86\u6301\u4e45\u8bb0\u5fc6\u5e26\u6765\u7684\u65b0\u578b\u653b\u51fb\u9762"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u653b\u9632", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8bb0\u5fc6\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05029v1", "published_at": "2026-07-06", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Your Agent\u0027s Memories Are Not Its Own: Forged Reasoning Attacks on LLM Agent Memory and Defenses", "tldr": "\u9488\u5bf9LLM\u667a\u80fd\u4f53\u8bb0\u5fc6\u7684\u4f2a\u9020\u63a8\u7406\u653b\u51fb\u53ca\u5176\u9632\u5fa1\u65b9\u6848", "upvotes": 0, "what_it_is": "\u63d0\u51faFARMA\u653b\u51fb\u65b9\u6cd5\uff0c\u901a\u8fc7\u5411LLM\u667a\u80fd\u4f53\u7684\u6301\u4e45\u8bb0\u5fc6\u4e2d\u6ce8\u5165\u4f2a\u9020\u63a8\u7406\u8f68\u8ff9\u5e76\u5229\u7528\u81ea\u6211\u5f3a\u5316\u673a\u5236\u653e\u5927\u653b\u51fb\u6548\u679c\uff1b\u540c\u65f6\u63d0\u51fa\u5206\u5c42\u9632\u5fa1\u6846\u67b6SENTINEL\uff0c\u901a\u8fc7\u63a8\u7406\u5b88\u536b\u6a21\u5757\u68c0\u6d4b\u4f2a\u9020\u8bb0\u5fc6\u6761\u76ee\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u9488\u5bf9LLM\u667a\u80fd\u4f53\u63a8\u7406\u5386\u53f2\uff08\u800c\u975e\u4e8b\u5b9e\u8bb0\u5fc6\uff09\u53d1\u8d77\u653b\u51fb\uff0c\u63ed\u793a\u4e86\u6301\u4e45\u8bb0\u5fc6\u673a\u5236\u7684\u6df1\u5c42\u5b89\u5168\u9690\u60a3\uff0c\u5e76\u63d0\u4f9b\u4e86\u5b9e\u7528\u9632\u5fa1\u65b9\u6848\uff0c\u5bf9\u667a\u80fd\u4f53\u5b89\u5168\u9886\u57df\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "Personal agents are becoming persistent user-owned intermediaries: they remember preferences, filter platform-mediated information, use tools, and negotiate with services. Existing benchmarks evaluate tool use, web navigation, desktop control, personalization, recommendation, and evolving context, but rarely ask whether an agent preserves user sovereignty: advancing the user\u0027s current interests while respecting privacy, consent, evidence, user burden, and resistance to manipulative incentives. We introduce SovereignPA-Bench, an executable benchmark for evaluating user-owned personal agents under evolving intent, platform mediation, privacy boundaries, consent constraints, evidence requirements, and burden tradeoffs. The benchmark separates agent-visible ObservableState from evaluator-only HiddenLabels, reports component metrics for task success, alignment, privacy, consent, evidence, manipulation, burden, and auditability, and preserves paired scenario ordering for model and policy comparisons. We evaluate 120 sovereignty stress scenarios across 4 model families and 8 policy baselines, yielding 3,840 frozen-prompt trajectories with raw prompts, outputs, provider-form responses, parsed actions, recomputable metrics, hard-set analyses, qualitative cases, and a blinded 3-annotator audit over 240 items. Full-sovereign scaffolding improves sovereignty score over direct, memory-only, consent-only, evidence-only, ReAct/tool-use, safety-prompt, and judge-guard baselines while reducing privacy leakage, consent violation, over-concession, and manipulation capture. Human audit shows high agreement on privacy and consent and lower agreement on manipulation, identifying the subjective frontier of platform-persuasion judgments. These results show that personal-agent evaluation must move beyond task completion toward representative, consent-aware, evidence-grounded action.", "arxiv_id": "2607.05363", "arxiv_url": "https://arxiv.org/abs/2607.05363", "authors": ["Dylan Zongmin Liu"], "brief": "\u6784\u5efa\u4e86\u4e00\u4e2a\u53ef\u6267\u884c\u57fa\u51c6SovereignPA-Bench\uff0c\u4e13\u95e8\u8bc4\u4f30\u7528\u6237\u81ea\u4e3b\u4e2a\u4eba\u667a\u80fd\u4f53\u5728\u52a8\u6001\u610f\u56fe\u3001\u5e73\u53f0\u4e2d\u4ecb\u3001\u9690\u79c1\u8fb9\u754c\u548c\u540c\u610f\u7ea6\u675f\u4e0b\u7684\u4e3b\u6743\u4fdd\u62a4\u80fd\u529b\uff0c\u6db5\u76d6120\u4e2a\u538b\u529b\u573a\u666f\u30014\u4e2a\u6a21\u578b\u5bb6\u65cf\u548c8\u79cd\u7b56\u7565\u57fa\u7ebf\uff0c\u5171\u751f\u62103840\u6761\u51bb\u7ed3\u8f68\u8ff9\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05363", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u667a\u80fd\u4f53\u53ef\u89c1\u7684ObservableState\u4e0e\u4ec5\u8bc4\u4f30\u8005\u53ef\u89c1\u7684HiddenLabels\u5206\u79bb\uff0c\u62a5\u544a\u4efb\u52a1\u6210\u529f\u3001\u9690\u79c1\u3001\u540c\u610f\u3001\u8bc1\u636e\u3001\u64cd\u63a7\u62b5\u6297\u3001\u8d1f\u62c5\u548c\u53ef\u5ba1\u8ba1\u6027\u7b49\u591a\u7ef4\u5ea6\u6307\u6807", "\u5168\u4e3b\u6743\u811a\u624b\u67b6\uff08Full-sovereign scaffolding\uff09\u5728\u4e3b\u6743\u5f97\u5206\u4e0a\u4f18\u4e8e\u6240\u6709\u57fa\u7ebf\uff08direct/memory-only/consent-only/ReAct\u7b49\uff09\uff0c\u540c\u65f6\u964d\u4f4e\u9690\u79c1\u6cc4\u9732\u3001\u540c\u610f\u8fdd\u89c4\u548c\u64cd\u63a7\u6355\u83b7\u7387", "\u4eba\u5de5\u5ba1\u8ba1\uff083\u540d\u6807\u6ce8\u8005\uff0c240\u6761\uff09\u663e\u793a\u9690\u79c1\u548c\u540c\u610f\u5224\u65ad\u4e00\u81f4\u6027\u9ad8\uff0c\u4f46\u64cd\u63a7\u5224\u65ad\u4e00\u81f4\u6027\u8f83\u4f4e\uff0c\u63ed\u793a\u5e73\u53f0\u8bf4\u670d\u5224\u65ad\u7684\u4e3b\u89c2\u6027\u8fb9\u754c"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "\u9690\u79c1\u4fdd\u62a4", "\u7528\u6237\u4e3b\u6743"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05363v1", "published_at": "2026-07-06", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SovereignPA-Bench: Evaluating User-Owned Personal Agents under Evolving Intent, Platform Mediation, and Consent Constraints", "tldr": "\u63d0\u51faSovereignPA-Bench\u57fa\u51c6\uff0c\u8bc4\u4f30\u7528\u6237\u4e3b\u6743\u4e2a\u4eba\u667a\u80fd\u4f53\u5728\u9690\u79c1\u3001\u540c\u610f\u4e0e\u64cd\u63a7\u62b5\u6297\u65b9\u9762\u7684\u8868\u73b0", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u4e00\u4e2a\u53ef\u6267\u884c\u57fa\u51c6SovereignPA-Bench\uff0c\u4e13\u95e8\u8bc4\u4f30\u7528\u6237\u81ea\u4e3b\u4e2a\u4eba\u667a\u80fd\u4f53\u5728\u52a8\u6001\u610f\u56fe\u3001\u5e73\u53f0\u4e2d\u4ecb\u3001\u9690\u79c1\u8fb9\u754c\u548c\u540c\u610f\u7ea6\u675f\u4e0b\u7684\u4e3b\u6743\u4fdd\u62a4\u80fd\u529b\uff0c\u6db5\u76d6120\u4e2a\u538b\u529b\u573a\u666f\u30014\u4e2a\u6a21\u578b\u5bb6\u65cf\u548c8\u79cd\u7b56\u7565\u57fa\u7ebf\uff0c\u5171\u751f\u62103840\u6761\u51bb\u7ed3\u8f68\u8ff9\u3002", "why_notable": "\u73b0\u6709\u667a\u80fd\u4f53\u57fa\u51c6\u805a\u7126\u4efb\u52a1\u5b8c\u6210\uff0c\u5ffd\u89c6\u7528\u6237\u4e3b\u6743\u4fdd\u62a4\uff1b\u672c\u5de5\u4f5c\u9996\u6b21\u7cfb\u7edf\u5316\u5b9a\u4e49\u5e76\u91cf\u5316\u4e2a\u4eba\u667a\u80fd\u4f53\u7684\u4e3b\u6743\u7ef4\u5ea6\uff0c\u63a8\u52a8\u8bc4\u4f30\u8303\u5f0f\u4ece\u4efb\u52a1\u5b8c\u6210\u5411\u540c\u610f\u611f\u77e5\u3001\u8bc1\u636e\u9a71\u52a8\u884c\u52a8\u8f6c\u53d8\uff0c\u5bf9AI\u5b89\u5168\u4e0e\u7528\u6237\u6743\u76ca\u4fdd\u62a4\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Agent self-evolution in long-horizon LLM systems is largely procedural: useful experience is not merely stored information, but reusable procedures for searching, debugging, and verification. Yet current evaluations do not isolate this form of transfer. Agent benchmarks test single-episode task solving; memory benchmarks target information retention rather than procedural reuse. We introduce EvoAgentBench, a benchmark for agent self-evolution via Ability-guided transfer across four agentic domains: web research, algorithmic reasoning, software engineering, and knowledge work. EvoAgentBench extracts trace-grounded Abilities from agent executions, canonicalizes them into operational units, and builds domain-specific Ability Graphs linking tasks that share procedural overlap. By design, every test task is backed by verified training-side Ability support. Across a 528/267 train/test split, two scaffolds, and three backbones, curated Ability content transfers reliably across model families, but no current automatic method sustains positive gain in all settings. EvoAgentBench shifts self-evolution evaluation from aggregate accuracy comparison to fine-grained diagnosis of experience encoding, routing, and uptake. The benchmark is publicly available at https://huggingface.co/datasets/EverMind-AI/EvoAgentBench.", "arxiv_id": "2607.05202", "arxiv_url": "https://arxiv.org/abs/2607.05202", "authors": ["Xingze Gao", "Chuanrui Hu", "Hongda Chen", "Pengfei Yao", "Zhao Wang", "Yi Bai", "Zhengwei Wu", "Yunyun Han", "Xiaofeng Cong", "Jie Gui", "Yafeng Deng", "Teng Li"], "brief": "\u63d0\u51faEvoAgentBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u957f\u671f\u4efb\u52a1\u4e2d\u7684\u81ea\u6211\u8fdb\u5316\u80fd\u529b\u2014\u2014\u5373\u5c06\u6267\u884c\u8f68\u8ff9\u4e2d\u63d0\u53d6\u7684\u53ef\u590d\u7528\u7a0b\u5e8f\u6027\u80fd\u529b\uff08Abilities\uff09\u8de8\u4efb\u52a1\u8fc1\u79fb\uff0c\u8986\u76d6\u7f51\u7edc\u7814\u7a76\u3001\u7b97\u6cd5\u63a8\u7406\u3001\u8f6f\u4ef6\u5de5\u7a0b\u548c\u77e5\u8bc6\u5de5\u4f5c\u56db\u4e2a\u9886\u57df\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05202", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4ece\u667a\u80fd\u4f53\u6267\u884c\u8f68\u8ff9\u4e2d\u63d0\u53d6\u5e76\u89c4\u8303\u5316\u7a0b\u5e8f\u6027\u80fd\u529b\u5355\u5143\uff0c\u6784\u5efa\u9886\u57df\u4e13\u5c5e\u80fd\u529b\u56fe\uff08Ability Graph\uff09\u8fde\u63a5\u5177\u6709\u7a0b\u5e8f\u91cd\u53e0\u7684\u4efb\u52a1", "\u6570\u636e\u96c6\u5305\u542b528/267\u8bad\u7ec3/\u6d4b\u8bd5\u5212\u5206\uff0c\u6d4b\u8bd5\u4efb\u52a1\u5747\u6709\u7ecf\u8fc7\u9a8c\u8bc1\u7684\u8bad\u7ec3\u4fa7\u80fd\u529b\u652f\u6491\uff0c\u786e\u4fdd\u8fc1\u79fb\u53ef\u884c\u6027", "\u5b9e\u9a8c\u53d1\u73b0\uff1a\u7cbe\u5fc3\u6574\u7406\u7684\u80fd\u529b\u5185\u5bb9\u53ef\u8de8\u6a21\u578b\u65cf\u53ef\u9760\u8fc1\u79fb\uff0c\u4f46\u73b0\u6709\u81ea\u52a8\u5316\u65b9\u6cd5\u5728\u6240\u6709\u8bbe\u7f6e\u4e0b\u5747\u65e0\u6cd5\u6301\u7eed\u4fdd\u6301\u6b63\u5411\u6536\u76ca"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u6d4b\u8bd5", "\u80fd\u529b\u8fc1\u79fb", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05202v1", "published_at": "2026-07-06", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EvoAgentBench: Benchmarking Agent Self-Evolution via Ability Transfer", "tldr": "EvoAgentBench\uff1a\u9996\u4e2a\u4e13\u6ce8\u4e8e\u667a\u80fd\u4f53\u7a0b\u5e8f\u6027\u80fd\u529b\u8fc1\u79fb\u4e0e\u81ea\u6211\u8fdb\u5316\u7684\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faEvoAgentBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u957f\u671f\u4efb\u52a1\u4e2d\u7684\u81ea\u6211\u8fdb\u5316\u80fd\u529b\u2014\u2014\u5373\u5c06\u6267\u884c\u8f68\u8ff9\u4e2d\u63d0\u53d6\u7684\u53ef\u590d\u7528\u7a0b\u5e8f\u6027\u80fd\u529b\uff08Abilities\uff09\u8de8\u4efb\u52a1\u8fc1\u79fb\uff0c\u8986\u76d6\u7f51\u7edc\u7814\u7a76\u3001\u7b97\u6cd5\u63a8\u7406\u3001\u8f6f\u4ef6\u5de5\u7a0b\u548c\u77e5\u8bc6\u5de5\u4f5c\u56db\u4e2a\u9886\u57df\u3002", "why_notable": "\u73b0\u6709\u667a\u80fd\u4f53\u57fa\u51c6\u4ec5\u6d4b\u5355\u8f6e\u4efb\u52a1\u89e3\u51b3\uff0c\u8bb0\u5fc6\u57fa\u51c6\u53ea\u5173\u6ce8\u4fe1\u606f\u4fdd\u7559\uff0cEvoAgentBench\u9996\u6b21\u5c06\u8bc4\u4f30\u7126\u70b9\u8f6c\u5411\u7a0b\u5e8f\u6027\u7ecf\u9a8c\u7684\u7f16\u7801\u3001\u8def\u7531\u4e0e\u5438\u6536\uff0c\u586b\u8865\u4e86\u667a\u80fd\u4f53\u81ea\u6211\u8fdb\u5316\u8bc4\u4f30\u7684\u5173\u952e\u7a7a\u767d\uff0c\u5e76\u516c\u5f00\u53d1\u5e03\u6570\u636e\u96c6\u3002"}, {"abstract": "Reinforcement learning holds significant potential for training large language models (LLMs) to handle multi-turn interactive tasks. However, in long-horizon, multi-turn tasks characterized by sparse outcome rewards, directly training with outcome rewards often results in slow convergence due to the sparsity of signals and the lack of fine-grained feedback. Furthermore, the model may fail to learn successful trajectories that are not sampled during training, thereby limiting its performance. Conversely, while employing customized dense process rewards provides richer signals and accelerates convergence, these surrogate rewards may exhibit potential misalignment with the ground-truth outcome rewards. This inconsistency can bias the training direction and ultimately degrade the model\u0027s final performance. In this work, we propose Reward-Swap Policy Optimization (RSPO), a method designed to leverage the rich information from dense process rewards to facilitate training with outcome rewards. By utilizing a reward-swap mechanism, RSPO ensures the diversity of sampled trajectories while guaranteeing consistency between the optimization objective and the true outcome rewards, thereby elevating the performance ceiling of the model. We conduct extensive experiments on two challenging agent benchmarks, WebShop and ALFWorld. By applying our method to various reinforcement learning algorithms, including GRPO, PPO, and GiGPO, we demonstrate that RSPO achieves consistent performance improvements across different baselines and benchmarks.", "arxiv_id": "2607.04713", "arxiv_url": "https://arxiv.org/abs/2607.04713", "authors": ["Qiang Liu", "Taian Guo", "Ruizhi Qiao", "Xing Sun"], "brief": "\u63d0\u51faReward-Swap Policy Optimization\uff08RSPO\uff09\uff0c\u4e00\u79cd\u7528\u4e8e\u591a\u8f6eLLM\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u7684\u65b9\u6cd5\uff0c\u901a\u8fc7\u5956\u52b1\u4ea4\u6362\u673a\u5236\u5728\u91c7\u6837\u9636\u6bb5\u5229\u7528\u7a20\u5bc6\u8fc7\u7a0b\u5956\u52b1\u4fdd\u8bc1\u8f68\u8ff9\u591a\u6837\u6027\uff0c\u5728\u4f18\u5316\u9636\u6bb5\u4f7f\u7528\u771f\u5b9e\u7ed3\u679c\u5956\u52b1\u4fdd\u8bc1\u76ee\u6807\u4e00\u81f4\u6027\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04713", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u5956\u52b1\u4ea4\u6362\u673a\u5236\u2014\u2014\u91c7\u6837\u65f6\u7528\u7a20\u5bc6\u8fc7\u7a0b\u5956\u52b1\u5f15\u5bfc\u591a\u6837\u5316\u8f68\u8ff9\u63a2\u7d22\uff0c\u4f18\u5316\u65f6\u5207\u6362\u56de\u7ed3\u679c\u5956\u52b1\u4fdd\u6301\u76ee\u6807\u5bf9\u9f50", "\u89e3\u51b3\u7a00\u758f\u5956\u52b1\u5bfc\u81f4\u6536\u655b\u6162\u4e0e\u7a20\u5bc6\u5956\u52b1\u5bfc\u81f4\u76ee\u6807\u504f\u79fb\u7684\u53cc\u91cd\u77db\u76fe", "\u5728WebShop\u548cALFWorld\u4e24\u4e2a\u57fa\u51c6\u4e0a\uff0c\u517c\u5bb9GRPO\u3001PPO\u3001GiGPO\u7b49\u591a\u79cdRL\u7b97\u6cd5\u5e76\u53d6\u5f97\u4e00\u81f4\u6027\u80fd\u63d0\u5347"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u8f6e\u5bf9\u8bdd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04713v1", "published_at": "2026-07-06", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RSPO: Reward-Swap Policy Optimization for Multi-Turn LLM Agents", "tldr": "\u63d0\u51faRSPO\u65b9\u6cd5\uff0c\u901a\u8fc7\u5956\u52b1\u4ea4\u6362\u673a\u5236\u878d\u5408\u7a20\u5bc6\u8fc7\u7a0b\u5956\u52b1\u4e0e\u7ed3\u679c\u5956\u52b1\uff0c\u63d0\u5347\u591a\u8f6eLLM\u667a\u80fd\u4f53\u8bad\u7ec3\u6548\u679c", "upvotes": 0, "what_it_is": "\u63d0\u51faReward-Swap Policy Optimization\uff08RSPO\uff09\uff0c\u4e00\u79cd\u7528\u4e8e\u591a\u8f6eLLM\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u7684\u65b9\u6cd5\uff0c\u901a\u8fc7\u5956\u52b1\u4ea4\u6362\u673a\u5236\u5728\u91c7\u6837\u9636\u6bb5\u5229\u7528\u7a20\u5bc6\u8fc7\u7a0b\u5956\u52b1\u4fdd\u8bc1\u8f68\u8ff9\u591a\u6837\u6027\uff0c\u5728\u4f18\u5316\u9636\u6bb5\u4f7f\u7528\u771f\u5b9e\u7ed3\u679c\u5956\u52b1\u4fdd\u8bc1\u76ee\u6807\u4e00\u81f4\u6027\u3002", "why_notable": "\u591a\u8f6e\u667a\u80fd\u4f53\u4efb\u52a1\u4e2d\u7a00\u758f\u5956\u52b1\u4e0e\u8fc7\u7a0b\u5956\u52b1\u7684\u6743\u8861\u662f\u6838\u5fc3\u96be\u9898\uff0cRSPO\u63d0\u4f9b\u4e86\u4e00\u79cd\u5373\u63d2\u5373\u7528\u7684\u901a\u7528\u89e3\u51b3\u65b9\u6848\uff0c\u53ef\u65e0\u7f1d\u96c6\u6210\u5230\u4e3b\u6d41RL\u7b97\u6cd5\u4e2d\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Defenses that provide security guarantees against prompt injection attacks rely on strict isolation between trusted instructions and untrusted data. In text-based environments such as tool-use APIs, this separation arises naturally: agents can reason from interface definitions without ever processing untrusted content. Extending these guarantees to web agents faces a fundamental challenge: to perceive and interact with their environment, web agents must first observe the rendered page, which intermingles trusted content with untrusted content. This structural entanglement removes the trust boundary on which security guarantees depend, undermining provable defenses for web agents. In this paper, we present Untrusted Content Masking (UCM), a simple and effective approach that restores this boundary in web environments. We leverage a key structural insight: a webpage\u0027s Document Object Model (DOM) encodes sufficient information to distinguish trusted from untrusted regions without reading their content. Our framework exploits this by redacting untrusted regions before they reach the agent and routing interaction through a sandboxed interface with strict privilege separation, thereby enabling agents to observe and interact with their environment while remaining isolated from adversarial content. The code is publicly available.", "arxiv_id": "2607.05277", "arxiv_url": "https://arxiv.org/abs/2607.05277", "authors": ["Kristina Nikoli\u0107", "Egor Zverev", "Javier Rando", "Matthew Jagielski", "Edoardo Debenedetti", "Florian Tram\u00e8r"], "brief": "\u63d0\u51faUCM\uff08\u4e0d\u53ef\u4fe1\u5185\u5bb9\u5c4f\u853d\uff09\u6846\u67b6\uff0c\u5229\u7528\u7f51\u9875DOM\u7ed3\u6784\u533a\u5206\u53ef\u4fe1\u4e0e\u4e0d\u53ef\u4fe1\u533a\u57df\uff0c\u5728\u5185\u5bb9\u5230\u8fbe\u667a\u80fd\u4f53\u524d\u5c06\u4e0d\u53ef\u4fe1\u533a\u57df\u906e\u853d\uff0c\u5e76\u901a\u8fc7\u6c99\u7bb1\u63a5\u53e3\u5b9e\u73b0\u4e25\u683c\u6743\u9650\u9694\u79bb\uff0c\u4ece\u800c\u4e3aWeb\u667a\u80fd\u4f53\u6062\u590d\u5b89\u5168\u8fb9\u754c\u3002", "categories": ["cs.CR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05277", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u6d1e\u5bdf\uff1aDOM\u7ed3\u6784\u672c\u8eab\u5305\u542b\u8db3\u591f\u4fe1\u606f\u6765\u533a\u5206\u53ef\u4fe1\u4e0e\u4e0d\u53ef\u4fe1\u533a\u57df\uff0c\u65e0\u9700\u8bfb\u53d6\u5185\u5bb9\u5373\u53ef\u5b8c\u6210\u5206\u7c7b", "\u5728\u6e32\u67d3\u9875\u9762\u5230\u8fbe\u667a\u80fd\u4f53\u524d\u81ea\u52a8\u906e\u853d\u4e0d\u53ef\u4fe1\u533a\u57df\uff0c\u5207\u65ad\u63d0\u793a\u6ce8\u5165\u653b\u51fb\u7684\u4f20\u64ad\u8def\u5f84", "\u901a\u8fc7\u6c99\u7bb1\u63a5\u53e3\u4e0e\u4e25\u683c\u6743\u9650\u5206\u79bb\uff0c\u4f7f\u667a\u80fd\u4f53\u80fd\u6b63\u5e38\u611f\u77e5\u548c\u4ea4\u4e92\u73af\u5883\u7684\u540c\u65f6\u4e0e\u6076\u610f\u5185\u5bb9\u9694\u79bb"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u9632\u5fa1", "\u63d0\u793a\u6ce8\u5165", "Web Agent"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05277v1", "published_at": "2026-07-06", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Untrusted Content Masking for Web Agents with Security Guarantees", "tldr": "\u901a\u8fc7DOM\u7ed3\u6784\u5c4f\u853d\u4e0d\u53ef\u4fe1\u5185\u5bb9\uff0c\u4e3aWeb\u667a\u80fd\u4f53\u63d0\u4f9b\u53ef\u8bc1\u660e\u7684\u63d0\u793a\u6ce8\u5165\u9632\u5fa1", "upvotes": 0, "what_it_is": "\u63d0\u51faUCM\uff08\u4e0d\u53ef\u4fe1\u5185\u5bb9\u5c4f\u853d\uff09\u6846\u67b6\uff0c\u5229\u7528\u7f51\u9875DOM\u7ed3\u6784\u533a\u5206\u53ef\u4fe1\u4e0e\u4e0d\u53ef\u4fe1\u533a\u57df\uff0c\u5728\u5185\u5bb9\u5230\u8fbe\u667a\u80fd\u4f53\u524d\u5c06\u4e0d\u53ef\u4fe1\u533a\u57df\u906e\u853d\uff0c\u5e76\u901a\u8fc7\u6c99\u7bb1\u63a5\u53e3\u5b9e\u73b0\u4e25\u683c\u6743\u9650\u9694\u79bb\uff0c\u4ece\u800c\u4e3aWeb\u667a\u80fd\u4f53\u6062\u590d\u5b89\u5168\u8fb9\u754c\u3002", "why_notable": "\u9996\u6b21\u5c06\u53ef\u8bc1\u660e\u5b89\u5168\u4fdd\u8bc1\uff08\u800c\u975e\u542f\u53d1\u5f0f\u9632\u5fa1\uff09\u6269\u5c55\u5230Web\u667a\u80fd\u4f53\u573a\u666f\uff0c\u89e3\u51b3\u4e86Web\u73af\u5883\u4e2d\u53ef\u4fe1/\u4e0d\u53ef\u4fe1\u5185\u5bb9\u5929\u7136\u6df7\u6742\u8fd9\u4e00\u6839\u672c\u6027\u6311\u6218\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u7684Web Agent\u5b89\u5168\u5177\u6709\u91cd\u8981\u610f\u4e49\uff0c\u4e14\u4ee3\u7801\u5f00\u6e90\u3002"}, {"abstract": "We present PDEFlow, an autonomous agentic framework that turns user-level ODE and PDE descriptions into solver-backed neural-operator pipelines. The workflow links problem specification, data generation, operator training, and checkpoint-based inference. A stateful input graph converts multi-turn natural-language input and user edits into validated problem specifications. The data-generation module then samples parameters, solves the configured governing-equation with FEniCSx finite-element backend, and stores the solutions as operator-ready tensors. The training and inference stages use a registry-based interface, allowing different neural operators to be trained and deployed without changing the surrounding pipeline. In the current implementation, we instantiate this interface with a multi-branch Bayesian DeepONet. Experiments on benchmark ODE and PDE tasks show that PDEFlow can construct valid specifications, generate solver-backed datasets, train neural operators across steady and transient problem classes, and provide solver-free predictions from saved checkpoints. The framework is designed for repeatable scientific and engineering workflows where many related physics configurations must be specified, simulated, learned, and queried with minimal manual intervention.", "arxiv_id": "2607.05134", "arxiv_url": "https://arxiv.org/abs/2607.05134", "authors": ["Akshat Jani", "Prathamesh Gadekar", "Sakhinana Sagar Srinivas", "Venkataramana Runkana"], "brief": "PDEFlow\u662f\u4e00\u4e2a\u81ea\u4e3b\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u80fd\u5c06\u7528\u6237\u7684ODE/PDE\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u81ea\u52a8\u8f6c\u5316\u4e3a\u5b8c\u6574\u7684\u795e\u7ecf\u7b97\u5b50\u6d41\u6c34\u7ebf\uff0c\u6db5\u76d6\u95ee\u9898\u89c4\u8303\u3001\u6570\u636e\u751f\u6210\u3001\u7b97\u5b50\u8bad\u7ec3\u548c\u68c0\u67e5\u70b9\u63a8\u7406\u5168\u6d41\u7a0b\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05134", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u72b6\u6001\u5316\u8f93\u5165\u56fe\u5c06\u591a\u8f6e\u81ea\u7136\u8bed\u8a00\u5bf9\u8bdd\u8f6c\u5316\u4e3a\u7ecf\u9a8c\u8bc1\u7684\u95ee\u9898\u89c4\u8303\uff0c\u652f\u6301\u7528\u6237\u8fed\u4ee3\u7f16\u8f91", "\u6570\u636e\u751f\u6210\u6a21\u5757\u57fa\u4e8eFEniCSx\u6709\u9650\u5143\u540e\u7aef\u81ea\u52a8\u6c42\u89e3\u65b9\u7a0b\u5e76\u751f\u6210\u7b97\u5b50\u5c31\u7eea\u5f20\u91cf", "\u91c7\u7528\u57fa\u4e8e\u6ce8\u518c\u8868\u7684\u63a5\u53e3\u5b9e\u73b0\u591a\u5206\u652f\u8d1d\u53f6\u65afDeepONet\uff0c\u652f\u6301\u7a33\u6001\u4e0e\u77ac\u6001\u95ee\u9898\u7684\u65e0\u6c42\u89e3\u5668\u63a8\u7406"], "keywords": ["\u667a\u80fd\u4f53", "\u795e\u7ecf\u7b97\u5b50", "\u79d1\u5b66\u8ba1\u7b97", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05134v1", "published_at": "2026-07-06", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "PDEFlow: Autonomous Agentic PDE Pipelines for Neural Operator Learning and Solver-Free Inference", "tldr": "PDEFlow\uff1a\u5c06\u81ea\u7136\u8bed\u8a00PDE\u63cf\u8ff0\u81ea\u52a8\u8f6c\u5316\u4e3a\u795e\u7ecf\u7b97\u5b50\u8bad\u7ec3\u4e0e\u65e0\u6c42\u89e3\u5668\u63a8\u7406\u7684\u667a\u80fd\u4f53\u6846\u67b6", "upvotes": 0, "what_it_is": "PDEFlow\u662f\u4e00\u4e2a\u81ea\u4e3b\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u80fd\u5c06\u7528\u6237\u7684ODE/PDE\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u81ea\u52a8\u8f6c\u5316\u4e3a\u5b8c\u6574\u7684\u795e\u7ecf\u7b97\u5b50\u6d41\u6c34\u7ebf\uff0c\u6db5\u76d6\u95ee\u9898\u89c4\u8303\u3001\u6570\u636e\u751f\u6210\u3001\u7b97\u5b50\u8bad\u7ec3\u548c\u68c0\u67e5\u70b9\u63a8\u7406\u5168\u6d41\u7a0b\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u667a\u80fd\u4f53\u4e0e\u795e\u7ecf\u7b97\u5b50\u5b66\u4e60\u5168\u6d41\u7a0b\u6253\u901a\uff0c\u6781\u5927\u964d\u4f4e\u79d1\u5b66\u8ba1\u7b97\u95e8\u69db\uff0c\u5b9e\u73b0\u4ece\u95ee\u9898\u63cf\u8ff0\u5230\u7269\u7406\u9884\u6d4b\u7684\u7aef\u5230\u7aef\u81ea\u52a8\u5316\uff0c\u5bf9\u5de5\u7a0b\u4eff\u771f\u52a0\u901f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Cyber Threat Intelligence (CTI) reports are predominantly unstructured, heterogeneous, and noisy, which limits their direct usability for automated analysis and reasoning. Cybersecurity Knowledge Graphs (CSKGs) provide a structured representation of adversarial entities, actions, and relations, but constructing such graphs from free-text CTI remains a challenge. Recent approaches rely on monolithic Large Language Models (LLMs) to perform end-to-end extraction and completion, leading to high cost, limited controllability, and unstable performance. This paper introduces TACTIC-KG, an agentic framework for CSKG construction that decomposes the task into modular, specialized LLM agents responsible for extraction, typing, verification, and curation. Using lightweight models (3B--8B), TACTIC-KG improves stability, recall, and graph consistency while reducing deployment cost. We implement and evaluate TACTIC-KG against recent state-of-the-art systems. Experiments on human-annotated CTI reports show that agent specialization consistently outperforms larger monolithic in-context-learning (ICL) baselines in extraction F1-score, typing accuracy, and structural graph similarity.", "arxiv_id": "2607.05001", "arxiv_url": "https://arxiv.org/abs/2607.05001", "authors": ["Mouhamed Amine Bouchiha", "Gregory Blanc"], "brief": "\u63d0\u51faTACTIC-KG\u6846\u67b6\uff0c\u5c06\u7f51\u7edc\u5b89\u5168\u77e5\u8bc6\u56fe\u8c31\u6784\u5efa\u4efb\u52a1\u5206\u89e3\u4e3a\u63d0\u53d6\u3001\u7c7b\u578b\u6807\u6ce8\u3001\u9a8c\u8bc1\u548c\u6574\u7406\u56db\u4e2a\u4e13\u804cLLM\u667a\u80fd\u4f53\u534f\u4f5c\u5b8c\u6210\uff0c\u4f7f\u75283B-8B\u8f7b\u91cf\u6a21\u578b\u66ff\u4ee3\u5355\u4f53\u5927\u6a21\u578b\u3002", "categories": ["cs.CR", "cs.AI", "cs.LG", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05001", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6a21\u5757\u5316\u591a\u667a\u80fd\u4f53\u67b6\u6784\uff1a\u5c06KG\u6784\u5efa\u5206\u89e3\u4e3a\u63d0\u53d6\u3001\u7c7b\u578b\u6807\u6ce8\u3001\u9a8c\u8bc1\u3001\u6574\u7406\u56db\u4e2a\u4e13\u804c\u667a\u80fd\u4f53", "\u4f7f\u75283B-8B\u8f7b\u91cf\u7ea7\u6a21\u578b\uff0c\u663e\u8457\u964d\u4f4e\u90e8\u7f72\u6210\u672c\uff0c\u540c\u65f6\u63d0\u5347\u7a33\u5b9a\u6027\u548c\u53ec\u56de\u7387", "\u5728\u4eba\u5de5\u6807\u6ce8CTI\u62a5\u544a\u4e0a\uff0cF1\u5206\u6570\u3001\u7c7b\u578b\u6807\u6ce8\u51c6\u786e\u7387\u548c\u56fe\u7ed3\u6784\u76f8\u4f3c\u5ea6\u5747\u4f18\u4e8e\u66f4\u5927\u7684\u5355\u4f53ICL\u57fa\u7ebf"], "keywords": ["\u667a\u80fd\u4f53", "\u77e5\u8bc6\u56fe\u8c31", "\u7f51\u7edc\u5b89\u5168", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05001v1", "published_at": "2026-07-06", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "TACTIC-KG: Toward Small Agent Teams for Cyber Threat Intelligence Knowledge Graph Construction", "tldr": "\u591a\u667a\u80fd\u4f53\u6846\u67b6TACTIC-KG\u7528\u5c0f\u6a21\u578b\u534f\u4f5c\u6784\u5efa\u7f51\u7edc\u5a01\u80c1\u60c5\u62a5\u77e5\u8bc6\u56fe\u8c31\uff0c\u8d85\u8d8a\u5927\u6a21\u578b\u57fa\u7ebf", "upvotes": 0, "what_it_is": "\u63d0\u51faTACTIC-KG\u6846\u67b6\uff0c\u5c06\u7f51\u7edc\u5b89\u5168\u77e5\u8bc6\u56fe\u8c31\u6784\u5efa\u4efb\u52a1\u5206\u89e3\u4e3a\u63d0\u53d6\u3001\u7c7b\u578b\u6807\u6ce8\u3001\u9a8c\u8bc1\u548c\u6574\u7406\u56db\u4e2a\u4e13\u804cLLM\u667a\u80fd\u4f53\u534f\u4f5c\u5b8c\u6210\uff0c\u4f7f\u75283B-8B\u8f7b\u91cf\u6a21\u578b\u66ff\u4ee3\u5355\u4f53\u5927\u6a21\u578b\u3002", "why_notable": "\u8bc1\u660e\u4e86\u5c0f\u6a21\u578b\u4e13\u804c\u5316\u534f\u4f5c\u53ef\u8d85\u8d8a\u5927\u6a21\u578b\u7aef\u5230\u7aef\u65b9\u6848\uff0c\u4e3a\u7f51\u7edc\u5b89\u5168\u9886\u57df\u77e5\u8bc6\u56fe\u8c31\u81ea\u52a8\u5316\u6784\u5efa\u63d0\u4f9b\u4f4e\u6210\u672c\u53ef\u63a7\u65b9\u6848\uff0c\u5bf9CTI\u81ea\u52a8\u5316\u5206\u6790\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We study on-policy distillation (OPD) for agentic tasks, where an LLM agent interacts with an environment over multiple turns and a student imitates a teacher over these multi-turn interaction histories. Fully online OPD is costly because each update requires fresh student rollouts through the environment and teacher queries at visited histories. We propose Replayed-Prefix On-Policy Distillation (ReOPD), an off-environment alternative that reuses pre-collected teacher trajectories as replayed prefixes: the student acts at selected steps, while the teacher provides dense per-step supervision without executing new environment interactions. We show that multi-turn OPD introduces a prefix trap: making histories more student-on-policy improves relevance to the student, but can query the teacher on histories where its target is unreliable. This creates a two-sided distribution shift between student occupancy and teacher reliability. ReOPD addresses this by treating multi-turn OPD as a reliability-aware prefix distribution design and implements it with a simple step-decaying sampling schedule that emphasizes early, lower-shift prefixes. Across mathematical reasoning with Python and search environments over multiple teacher and student model scales, ReOPD preserves or improves OPD-level accuracy, uses zero tool calls during student training, and is at least 4$\\times$ faster per training step than OPD. ReOPD therefore turns expensive agent-environment interaction into a reusable offline resource, enabling scalable distillation across tools, tasks, and environments.", "arxiv_id": "2607.04763", "arxiv_url": "https://arxiv.org/abs/2607.04763", "authors": ["Baohao Liao", "Hanze Dong", "Christof Monz", "Xinxing Xu", "Li Dong", "Furu Wei"], "brief": "\u63d0\u51faReplayed-Prefix On-Policy Distillation\uff08ReOPD\uff09\uff0c\u4e00\u79cd\u9762\u5411\u591a\u8f6e\u667a\u80fd\u4f53\u4efb\u52a1\u7684\u79bb\u7ebf\u84b8\u998f\u65b9\u6cd5\uff0c\u901a\u8fc7\u590d\u7528\u9884\u6536\u96c6\u7684\u6559\u5e08\u8f68\u8ff9\u4f5c\u4e3a\u524d\u7f00\uff0c\u8ba9\u5b66\u751f\u6a21\u578b\u5728\u9009\u5b9a\u6b65\u9aa4\u884c\u52a8\u5e76\u63a5\u53d7\u6559\u5e08\u9010\u6b65\u76d1\u7763\uff0c\u65e0\u9700\u5b9e\u65f6\u73af\u5883\u4ea4\u4e92\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04763", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u53d1\u73b0\u591a\u8f6eOPD\u5b58\u5728\u0027\u524d\u7f00\u9677\u9631\u0027\uff1a\u5386\u53f2\u8d8a\u8d34\u8fd1\u5b66\u751f\u5206\u5e03\uff0c\u6559\u5e08\u5728\u8be5\u5386\u53f2\u4e0a\u7684\u76d1\u7763\u4fe1\u53f7\u8d8a\u4e0d\u53ef\u9760\uff0c\u5f62\u6210\u53cc\u5411\u5206\u5e03\u504f\u79fb", "\u91c7\u7528\u6b65\u9aa4\u8870\u51cf\u91c7\u6837\u7b56\u7565\uff0c\u4f18\u5148\u4f7f\u7528\u65e9\u671f\u3001\u4f4e\u504f\u79fb\u7684\u524d\u7f00\uff0c\u5e73\u8861\u76f8\u5173\u6027\u4e0e\u6559\u5e08\u53ef\u9760\u6027", "\u8bad\u7ec3\u65f6\u96f6\u5de5\u5177\u8c03\u7528\uff0c\u6bcf\u6b65\u8bad\u7ec3\u901f\u5ea6\u6bd4\u5b8c\u5168\u5728\u7ebfOPD\u5feb\u81f3\u5c114\u500d\uff0c\u540c\u65f6\u4fdd\u6301\u6216\u63d0\u5347\u51c6\u786e\u7387"], "keywords": ["\u667a\u80fd\u4f53", "\u77e5\u8bc6\u84b8\u998f", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04763v1", "published_at": "2026-07-06", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Multi-Turn On-Policy Distillation with Prefix Replay", "tldr": "\u63d0\u51faReOPD\u65b9\u6cd5\uff0c\u7528\u9884\u6536\u96c6\u8f68\u8ff9\u66ff\u4ee3\u5728\u7ebf\u73af\u5883\u4ea4\u4e92\uff0c\u5b9e\u73b0\u9ad8\u6548\u591a\u8f6e\u667a\u80fd\u4f53\u84b8\u998f", "upvotes": 0, "what_it_is": "\u63d0\u51faReplayed-Prefix On-Policy Distillation\uff08ReOPD\uff09\uff0c\u4e00\u79cd\u9762\u5411\u591a\u8f6e\u667a\u80fd\u4f53\u4efb\u52a1\u7684\u79bb\u7ebf\u84b8\u998f\u65b9\u6cd5\uff0c\u901a\u8fc7\u590d\u7528\u9884\u6536\u96c6\u7684\u6559\u5e08\u8f68\u8ff9\u4f5c\u4e3a\u524d\u7f00\uff0c\u8ba9\u5b66\u751f\u6a21\u578b\u5728\u9009\u5b9a\u6b65\u9aa4\u884c\u52a8\u5e76\u63a5\u53d7\u6559\u5e08\u9010\u6b65\u76d1\u7763\uff0c\u65e0\u9700\u5b9e\u65f6\u73af\u5883\u4ea4\u4e92\u3002", "why_notable": "\u5c06\u6602\u8d35\u7684\u667a\u80fd\u4f53-\u73af\u5883\u5728\u7ebf\u4ea4\u4e92\u8f6c\u5316\u4e3a\u53ef\u590d\u7528\u7684\u79bb\u7ebf\u8d44\u6e90\uff0c\u5927\u5e45\u964d\u4f4e\u591a\u8f6eLLM\u667a\u80fd\u4f53\u84b8\u998f\u6210\u672c\uff0c\u5bf9\u5de5\u5177\u4f7f\u7528\u3001\u6570\u5b66\u63a8\u7406\u7b49\u573a\u666f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "LLM agents are increasingly applied to vulnerability analysis, but existing benchmarks have not kept pace. They typically rely on small non-compilable snippets, focus on binary classification (vulnerable or not), and do not account for the risk that publicly-released datasets are part of model training corpora. We introduce RustMizan, a benchmarking framework for Rust vulnerability analysis that addresses these gaps. RustMizan contains compilable code variants at the crate, file, and function levels, with annotations for binary vulnerability detection, CWE classification, and function- and line-level localization. A paired mutation framework produces semantics-preserving code mutants for contamination testing and robustness probing. Across four frontier models in an agentic setup with command-line access, binary classification sits in the 56-65% range, but line localization F1 stays near 20%, and adversarial cues drop line F1 by about 27%.", "arxiv_id": "2607.04729", "arxiv_url": "https://arxiv.org/abs/2607.04729", "authors": ["Tarek Elsayed", "Shiping Yang", "Eunsong Koh", "Sanika Goyal", "Vincent Huang", "Paul Ngo", "Nathan Young", "Mohammad Omidvar Tehrani", "Alvyn Kang", "Arnell Kang", "Zeyu Chen", "Ang\u00e9lica Moreira", "Xuan Feng", "Angel X. Chang", "Nick Sumner", "Steven Y. Ko"], "brief": "\u63d0\u51faRustMizan\u57fa\u51c6\u6846\u67b6\uff0c\u4e13\u4e3a\u8bc4\u4f30LLM\u5728Rust\u6f0f\u6d1e\u5206\u6790\u80fd\u529b\u800c\u8bbe\u8ba1\uff0c\u5305\u542b\u53ef\u7f16\u8bd1\u4ee3\u7801\u53d8\u4f53\u3001\u591a\u7c92\u5ea6\u6807\u6ce8\u53ca\u8bed\u4e49\u4fdd\u7559\u53d8\u5f02\u673a\u5236\uff0c\u7528\u4e8e\u6d4b\u8bd5\u6a21\u578b\u7684\u6c61\u67d3\u7a0b\u5ea6\u4e0e\u9c81\u68d2\u6027\u3002", "categories": ["cs.CR", "cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04729", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5305\u542bcrate\u3001\u6587\u4ef6\u3001\u51fd\u6570\u4e09\u4e2a\u7c92\u5ea6\u7684\u53ef\u7f16\u8bd1\u4ee3\u7801\u53d8\u4f53\uff0c\u652f\u6301\u4e8c\u5206\u7c7b\u3001CWE\u5206\u7c7b\u53ca\u884c\u7ea7\u6f0f\u6d1e\u5b9a\u4f4d\u7b49\u591a\u4efb\u52a1\u6807\u6ce8", "\u914d\u5bf9\u53d8\u5f02\u6846\u67b6\u751f\u6210\u8bed\u4e49\u4fdd\u7559\u7684\u4ee3\u7801\u53d8\u4f53\uff0c\u7528\u4e8e\u68c0\u6d4b\u8bad\u7ec3\u6570\u636e\u6c61\u67d3\u548c\u5bf9\u6297\u9c81\u68d2\u6027\u63a2\u6d4b", "\u56db\u4e2a\u524d\u6cbf\u6a21\u578b\u6d4b\u8bd5\u7ed3\u679c\uff1a\u4e8c\u5206\u7c7b\u51c6\u786e\u738756-65%\uff0c\u884c\u7ea7\u5b9a\u4f4dF1\u4ec5\u7ea620%\uff0c\u5bf9\u6297\u63d0\u793a\u4f7f\u884c\u7ea7F1\u4e0b\u964d\u7ea627%"], "keywords": ["\u6f0f\u6d1e\u5206\u6790", "\u57fa\u51c6\u6d4b\u8bd5", "\u667a\u80fd\u4f53", "\u4ee3\u7801\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04729v1", "published_at": "2026-07-06", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "RustMizan: A Compilable, Contamination-Aware Benchmarking Framework for Rust Vulnerabilities", "tldr": "RustMizan\uff1a\u9762\u5411Rust\u6f0f\u6d1e\u5206\u6790\u7684\u53ef\u7f16\u8bd1\u3001\u6297\u6c61\u67d3\u57fa\u51c6\u6d4b\u8bd5\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faRustMizan\u57fa\u51c6\u6846\u67b6\uff0c\u4e13\u4e3a\u8bc4\u4f30LLM\u5728Rust\u6f0f\u6d1e\u5206\u6790\u80fd\u529b\u800c\u8bbe\u8ba1\uff0c\u5305\u542b\u53ef\u7f16\u8bd1\u4ee3\u7801\u53d8\u4f53\u3001\u591a\u7c92\u5ea6\u6807\u6ce8\u53ca\u8bed\u4e49\u4fdd\u7559\u53d8\u5f02\u673a\u5236\uff0c\u7528\u4e8e\u6d4b\u8bd5\u6a21\u578b\u7684\u6c61\u67d3\u7a0b\u5ea6\u4e0e\u9c81\u68d2\u6027\u3002", "why_notable": "\u73b0\u6709\u6f0f\u6d1e\u57fa\u51c6\u666e\u904d\u5b58\u5728\u4ee3\u7801\u4e0d\u53ef\u7f16\u8bd1\u3001\u4efb\u52a1\u5355\u4e00\u3001\u8bad\u7ec3\u96c6\u6c61\u67d3\u7b49\u95ee\u9898\uff0cRustMizan\u7cfb\u7edf\u6027\u5730\u586b\u8865\u4e86\u8fd9\u4e9b\u7a7a\u767d\uff0c\u63ed\u793a\u4e86\u5f53\u524dLLM\u5728\u7cbe\u7ec6\u6f0f\u6d1e\u5b9a\u4f4d\u4e0a\u7684\u663e\u8457\u4e0d\u8db3\uff0c\u4e3a\u5b89\u5168\u9886\u57dfAI\u8bc4\u4f30\u63d0\u4f9b\u66f4\u4e25\u683c\u7684\u6807\u51c6\u3002"}, {"abstract": "While recent Vision-Language-Action (VLA) models show promise toward generalist manipulation policies, they struggle with long-horizon tasks due to their Markovian nature-relying solely on current observations. Hierarchical dual-system methods address this but suffer from a gap between high-level planning semantics and low-level execution kinematics. We introduce Cortex, a bidirectionally aligned embodied agent framework with a customized planning interface that conveys executable and tractable subtask plans from high-level VLM to low-level VLA. Specifically, we standardize manipulation subtasks into 32 canonical skill primitives and inject tractability principles, such as representative object attributes and improved trajectory reachability, into the data generation pipeline. This enables automatic annotation of over 4k hours of open-source video data and generation of 30 hours of simulation data. We further devise an event-balanced sampling strategy to construct training data for fine-tuning the framework to better handle planning ambiguity during subtask transitions, enhanced by carefully designed harness engineering from task contexts to skill constraints during inference. Both open-loop VLM and closed-loop system evaluations demonstrate Cortex\u0027s efficacy, e.g., it outperforms monolithic baselines by 3.1% on Libero-long and 4.1% on RoboTwin. Notably, Cortex\u0027s generalist VLM enables zero-shot completion of unseen real-world long-horizon tasks, such as multi-stage chemistry experiments, by simply combining with a fine-tuned VLA-a capability infeasible through VLA fine-tuning alone.", "arxiv_id": "2607.05377", "arxiv_url": "https://arxiv.org/abs/2607.05377", "authors": ["Jiaqi Peng", "Xiqian Yu", "Delin Feng", "Yuqiang Yang", "Wenzhe Cai", "Jing Xiong", "Ganlin Yang", "Jinliang Zheng", "Jiafei Cao", "Xueyuan Wei", "Jiangmiao Pang", "Yuan Shen", "Tai Wang"], "brief": "\u63d0\u51faCortex\u6846\u67b6\uff0c\u901a\u8fc7\u5b9a\u5236\u5316\u89c4\u5212\u63a5\u53e3\u5c06\u9ad8\u5c42VLM\u8bed\u4e49\u89c4\u5212\u4e0e\u4f4e\u5c42VLA\u8fd0\u52a8\u6267\u884c\u53cc\u5411\u5bf9\u9f50\uff0c\u5c06\u64cd\u4f5c\u5b50\u4efb\u52a1\u6807\u51c6\u5316\u4e3a32\u79cd\u6280\u80fd\u539f\u8bed\uff0c\u5b9e\u73b0\u957f\u65f6\u5e8f\u673a\u5668\u4eba\u64cd\u4f5c\u4efb\u52a1\u7684\u9ad8\u6548\u6267\u884c\u3002", "categories": ["cs.RO", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05377", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u64cd\u4f5c\u5b50\u4efb\u52a1\u6807\u51c6\u5316\u4e3a32\u79cd\u89c4\u8303\u6280\u80fd\u539f\u8bed\uff0c\u5e76\u6ce8\u5165\u53ef\u6267\u884c\u6027\u539f\u5219\uff08\u7269\u4f53\u5c5e\u6027\u3001\u8f68\u8ff9\u53ef\u8fbe\u6027\uff09\u5230\u6570\u636e\u751f\u6210\u6d41\u7a0b", "\u81ea\u52a8\u6807\u6ce8\u8d854000\u5c0f\u65f6\u5f00\u6e90\u89c6\u9891\u6570\u636e\u53ca30\u5c0f\u65f6\u4eff\u771f\u6570\u636e\uff0c\u5e76\u8bbe\u8ba1\u4e8b\u4ef6\u5747\u8861\u91c7\u6837\u7b56\u7565\u7f13\u89e3\u5b50\u4efb\u52a1\u8f6c\u6362\u6b67\u4e49", "\u5728Libero-long\u548cRoboTwin\u4e0a\u5206\u522b\u8d85\u8d8a\u5355\u4f53\u57fa\u7ebf3.1%\u548c4.1%\uff0c\u4e14\u652f\u6301\u96f6\u6837\u672c\u5b8c\u6210\u771f\u5b9e\u4e16\u754c\u591a\u9636\u6bb5\u5316\u5b66\u5b9e\u9a8c\u7b49\u672a\u89c1\u4efb\u52a1"], "keywords": ["\u5177\u8eab\u667a\u80fd\u4f53", "\u673a\u5668\u4eba\u64cd\u4f5c", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u957f\u65f6\u5e8f\u4efb\u52a1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05377v1", "published_at": "2026-07-06", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Cortex: A Bidirectionally Aligned Embodied Agent Framework for Long-horizon Manipulation", "tldr": "Cortex\uff1a\u53cc\u5411\u5bf9\u9f50\u7684\u5177\u8eab\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u89e3\u51b3\u957f\u65f6\u5e8f\u673a\u5668\u4eba\u64cd\u4f5c\u4efb\u52a1", "upvotes": 0, "what_it_is": "\u63d0\u51faCortex\u6846\u67b6\uff0c\u901a\u8fc7\u5b9a\u5236\u5316\u89c4\u5212\u63a5\u53e3\u5c06\u9ad8\u5c42VLM\u8bed\u4e49\u89c4\u5212\u4e0e\u4f4e\u5c42VLA\u8fd0\u52a8\u6267\u884c\u53cc\u5411\u5bf9\u9f50\uff0c\u5c06\u64cd\u4f5c\u5b50\u4efb\u52a1\u6807\u51c6\u5316\u4e3a32\u79cd\u6280\u80fd\u539f\u8bed\uff0c\u5b9e\u73b0\u957f\u65f6\u5e8f\u673a\u5668\u4eba\u64cd\u4f5c\u4efb\u52a1\u7684\u9ad8\u6548\u6267\u884c\u3002", "why_notable": "\u9996\u6b21\u901a\u8fc7\u53cc\u5411\u5bf9\u9f50\u673a\u5236\u7cfb\u7edf\u6027\u5f25\u5408VLM\u89c4\u5212\u8bed\u4e49\u4e0eVLA\u6267\u884c\u8fd0\u52a8\u5b66\u4e4b\u95f4\u7684\u9e3f\u6c9f\uff0c\u5b9e\u73b0\u96f6\u6837\u672c\u6cdb\u5316\u5230\u590d\u6742\u771f\u5b9e\u4e16\u754c\u957f\u65f6\u5e8f\u4efb\u52a1\uff0c\u5bf9\u901a\u7528\u673a\u5668\u4eba\u64cd\u4f5c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Persistent personal agents combine long-term memory with access to users\u0027 external environments, enabling personalized foreground assistance and proactive background execution. This integration also creates a new path to compromise: untrusted external content can be silently written into persistent memory and later reused as trusted state. We study this threat as stealth memory injection, in which a remote black-box adversary delivers a single email payload that must induce the agent to write poisoned memory, stay hidden in the agent\u0027s response to the user, and affect future behavior. We introduce WhisperBench, a 108-case benchmark spanning five risk categories and both fact and preference poisoning. Built on a real IMAP/SMTP workflow and an authentic email agent skill, it enables full-cycle evaluation of stealth memory injection attacks. To enable this black-box attack under single-email delivery and without runtime feedback, we propose MemGhost, a one-shot payload generation framework. MemGhost uses an environment proxy to emulate persistent-
