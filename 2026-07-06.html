agent execution and an objective proxy to convert memory adoption and conversational stealth into dense rubric-based rewards, then trains the attacker policy with supervised fine-tuning and reinforcement learning. Across 56 held-out test cases, MemGhost achieves 87.5% end-to-end success on OpenClaw with GPT-5.4 and 71.4% on Claude Code SDK with Sonnet 4.6. It also transfers across personal-agent architectures (NanoClaw and Hermes Agent) and memory backends (filesystem and vector-based Mem0), and remains effective against input-level, model-level, and system-level defenses. These results suggest that persistent memory can turn ordinary external processing into a practical pathway for long-term agent compromise.", "arxiv_id": "2607.05189", "arxiv_url": "https://arxiv.org/abs/2607.05189", "authors": ["Yechao Zhang", "Shiqian Zhao", "Jiawen Zhang", "Jie Zhang", "Gelei Deng", "Xiaogeng Liu", "Chaowei Xiao", "Tianwei Zhang"], "brief": "\u63d0\u51fa\"\u9690\u853d\u8bb0\u5fc6\u6ce8\u5165\"\u5a01\u80c1\u6a21\u578b\uff1a\u653b\u51fb\u8005\u901a\u8fc7\u5355\u5c01\u6076\u610f\u90ae\u4ef6\uff0c\u8bf1\u4f7f\u6301\u4e45\u5316\u4e2a\u4eba\u667a\u80fd\u4f53\u5c06\u6bd2\u5316\u5185\u5bb9\u5199\u5165\u957f\u671f\u8bb0\u5fc6\uff0c\u4ece\u800c\u5728\u4e0d\u88ab\u7528\u6237\u5bdf\u89c9\u7684\u60c5\u51b5\u4e0b\u6301\u7eed\u5f71\u54cd\u672a\u6765\u884c\u4e3a\u3002\u540c\u65f6\u6784\u5efa\u4e86\u8bc4\u6d4b\u57fa\u51c6WhisperBench\u548c\u4e00\u6b21\u6027\u653b\u51fb\u8f7d\u8377\u751f\u6210\u6846\u67b6MemGhost\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05189", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["WhisperBench\uff1a108\u4e2a\u6d4b\u8bd5\u7528\u4f8b\uff0c\u8986\u76d65\u7c7b\u98ce\u9669\u573a\u666f\uff08\u4e8b\u5b9e/\u504f\u597d\u6295\u6bd2\uff09\uff0c\u57fa\u4e8e\u771f\u5b9eIMAP/SMTP\u90ae\u4ef6\u5de5\u4f5c\u6d41\u6784\u5efa", "MemGhost\u6846\u67b6\uff1a\u5229\u7528\u73af\u5883\u4ee3\u7406\u6a21\u62df\u667a\u80fd\u4f53\u6267\u884c\uff0c\u7ed3\u5408SFT+\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u653b\u51fb\u7b56\u7565\uff0c\u65e0\u9700\u8fd0\u884c\u65f6\u53cd\u9988\u5373\u53ef\u4e00\u6b21\u6027\u751f\u6210\u6709\u6548\u8f7d\u8377", "\u653b\u51fb\u6210\u529f\u7387\uff1a\u5728GPT-5.4\u9a71\u52a8\u7684OpenClaw\u4e0a\u8fbe87.5%\uff0c\u5728Claude Sonnet 4.6\u4e0a\u8fbe71.4%\uff0c\u5e76\u53ef\u8fc1\u79fb\u81f3\u591a\u79cd\u667a\u80fd\u4f53\u67b6\u6784\u548c\u8bb0\u5fc6\u540e\u7aef\uff0c\u4e14\u80fd\u7ed5\u8fc7\u591a\u5c42\u9632\u5fa1"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u653b\u51fb", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8bb0\u5fc6\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05189v1", "published_at": "2026-07-06", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "When Claws Remember but Do Not Tell: Stealthy Memory Injection in Persistent Personal Agents", "tldr": "\u9488\u5bf9\u6301\u4e45\u5316\u4e2a\u4eba\u667a\u80fd\u4f53\u7684\u9690\u853d\u8bb0\u5fc6\u6ce8\u5165\u653b\u51fb\uff0c\u5355\u5c01\u90ae\u4ef6\u5373\u53ef\u957f\u671f\u64cd\u63a7\u667a\u80fd\u4f53\u884c\u4e3a", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u9690\u853d\u8bb0\u5fc6\u6ce8\u5165\"\u5a01\u80c1\u6a21\u578b\uff1a\u653b\u51fb\u8005\u901a\u8fc7\u5355\u5c01\u6076\u610f\u90ae\u4ef6\uff0c\u8bf1\u4f7f\u6301\u4e45\u5316\u4e2a\u4eba\u667a\u80fd\u4f53\u5c06\u6bd2\u5316\u5185\u5bb9\u5199\u5165\u957f\u671f\u8bb0\u5fc6\uff0c\u4ece\u800c\u5728\u4e0d\u88ab\u7528\u6237\u5bdf\u89c9\u7684\u60c5\u51b5\u4e0b\u6301\u7eed\u5f71\u54cd\u672a\u6765\u884c\u4e3a\u3002\u540c\u65f6\u6784\u5efa\u4e86\u8bc4\u6d4b\u57fa\u51c6WhisperBench\u548c\u4e00\u6b21\u6027\u653b\u51fb\u8f7d\u8377\u751f\u6210\u6846\u67b6MemGhost\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u5316\u7814\u7a76\u6301\u4e45\u5316\u8bb0\u5fc6\u4f5c\u4e3a\u653b\u51fb\u9762\u7684\u5b89\u5168\u5a01\u80c1\uff0c\u63ed\u793a\u4e86LLM\u4e2a\u4eba\u667a\u80fd\u4f53\u5728\u957f\u671f\u8bb0\u5fc6\u673a\u5236\u4e0b\u9762\u4e34\u7684\u5b9e\u9645\u98ce\u9669\uff0c\u5bf9\u667a\u80fd\u4f53\u5b89\u5168\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49"}, {"abstract": "Deep research agents decompose open-ended queries into subtasks, retrieve web evidence over multiple rounds, and synthesize long-form reports. This workflow creates a planning-layer poisoning surface: adversarial documents that enter the retrieval pool can steer follow-up questions and turn a local injection into report-level contamination. We present FORGE (Fabricated Orchestrated Reasoning chain for aGent Exploitation), a two-level attack that combines intra-document reasoning fabrication with inter-document chain coordination to hijack subtask planning. We further introduce the PRISM metric, which weights infected report claims by cognitive type, and Root Query Anchoring, a lightweight defense that ties recursive follow-up generation to the root query. Across 25 queries, Network FORGE reaches 26.4% PRISM with five injected documents and exhibits depth migration, in which recursive synthesis shifts poisoned content from overt framing into factual premises. On the 10-query defense subset, RQA (Root Query Anchoring) reduces PRISM from 38.5% to 18.3%.", "arxiv_id": "2607.04718", "arxiv_url": "https://arxiv.org/abs/2607.04718", "authors": ["Yue Pan", "Ziheng Zhang", "Junxiang Lei", "Changhao Jia", "Qingyi Si", "Hongcheng Guo"], "brief": "\u63d0\u51faFORGE\u653b\u51fb\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u68c0\u7d22\u6587\u6863\u4e2d\u6ce8\u5165\u5bf9\u6297\u6027\u5185\u5bb9\uff0c\u52ab\u6301\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53\u7684\u5b50\u4efb\u52a1\u89c4\u5212\uff0c\u5c06\u5c40\u90e8\u6c61\u67d3\u6269\u6563\u4e3a\u62a5\u544a\u7ea7\u522b\u7684\u5185\u5bb9\u6c61\u67d3\uff1b\u540c\u65f6\u63d0\u51faPRISM\u8bc4\u4f30\u6307\u6807\u548cRoot Query Anchoring\u8f7b\u91cf\u7ea7\u9632\u5fa1\u673a\u5236\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04718", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["FORGE\u91c7\u7528\u4e24\u7ea7\u653b\u51fb\uff1a\u6587\u6863\u5185\u63a8\u7406\u4f2a\u9020 + \u8de8\u6587\u6863\u94fe\u5f0f\u534f\u8c03\uff0c\u5b9e\u73b0\u5bf9\u667a\u80fd\u4f53\u89c4\u5212\u5c42\u7684\u7cfb\u7edf\u6027\u52ab\u6301", "\u4ec5\u6ce8\u51655\u4e2a\u6076\u610f\u6587\u6863\uff0cNetwork FORGE\u572825\u4e2a\u67e5\u8be2\u4e0a\u8fbe\u523026.4% PRISM\u5206\u6570\uff0c\u4e14\u5b58\u5728\u0027\u6df1\u5ea6\u8fc1\u79fb\u0027\u73b0\u8c61\uff08\u6bd2\u5316\u5185\u5bb9\u4ece\u663e\u5f0f\u6846\u67b6\u6e17\u900f\u8fdb\u4e8b\u5b9e\u524d\u63d0\uff09", "\u9632\u5fa1\u65b9\u6848RQA\uff08\u6839\u67e5\u8be2\u951a\u5b9a\uff09\u5c06\u9012\u5f52\u5b50\u95ee\u9898\u751f\u6210\u7ed1\u5b9a\u5230\u539f\u59cb\u67e5\u8be2\uff0c\u5c06PRISM\u4ece38.5%\u964d\u81f318.3%"], "keywords": ["\u667a\u80fd\u4f53", "\u5bf9\u6297\u653b\u51fb", "RAG", "\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04718v1", "published_at": "2026-07-06", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "FORGE: Research-Trajectory Hijacking Attacks on Deep Research Agents", "tldr": "\u9488\u5bf9\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53\u7684\u7814\u7a76\u8f68\u8ff9\u52ab\u6301\u653b\u51fbFORGE\u53ca\u9632\u5fa1\u65b9\u6848RQA", "upvotes": 0, "what_it_is": "\u63d0\u51faFORGE\u653b\u51fb\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u68c0\u7d22\u6587\u6863\u4e2d\u6ce8\u5165\u5bf9\u6297\u6027\u5185\u5bb9\uff0c\u52ab\u6301\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53\u7684\u5b50\u4efb\u52a1\u89c4\u5212\uff0c\u5c06\u5c40\u90e8\u6c61\u67d3\u6269\u6563\u4e3a\u62a5\u544a\u7ea7\u522b\u7684\u5185\u5bb9\u6c61\u67d3\uff1b\u540c\u65f6\u63d0\u51faPRISM\u8bc4\u4f30\u6307\u6807\u548cRoot Query Anchoring\u8f7b\u91cf\u7ea7\u9632\u5fa1\u673a\u5236\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53\u5728\u89c4\u5212\u5c42\u9762\u7684\u68c0\u7d22\u6295\u6bd2\u6f0f\u6d1e\uff0c\u653b\u51fb\u53ef\u968f\u9012\u5f52\u6df1\u5ea6\u6269\u6563\u4e14\u96be\u4ee5\u5bdf\u89c9\uff0c\u5bf9RAG\u7c7b\u7814\u7a76Agent\u7684\u5b89\u5168\u90e8\u7f72\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49"}, {"abstract": "The cost of producing code is rapidly diminishing with increasingly capable AI agents, while quality assurance of generated programs has not kept pace. Formal verification provides the strongest possible guarantees, but the ability of AI models to work with verification-aware languages is hindered by the scarcity of human-written examples of programs in those languages. To tackle this prevalent data scarcity issue, we propose Formal Disco: a distributed system for coordination of LLM-based workers that can be easily applied to open-ended synthetic data generation at scale. We use Formal Disco to share tasks and programs between three classes of workers: \"initiators\", which read random READMEs from open-source repositories and documentation snippets to sketch a related verified program, \"fixers\" which take compiler and verifier feedback and attempt to resolve issues, and \"extenders\" that take working programs and propose patches to expand them. Formal Disco records all agent-generated traces and uses them both for initial distillation from a stronger model as well as self-improvement. We also propose a principle of maximum entropy for synthetic program generation, and use entropy maximization via iterative supervised fine-tuning to learn to generate increasingly diverse programs over time. We release large datasets of synthetic verified programs in three languages - Dafny, Verus, and Frama-C -, and fine-tune open models for verification-relevant tasks, often matching or exceeding the performance of Claude Opus 4.5. Overall, our work offers a path to create synthetic data at scale for formal reasoning domains and overcome the long-standing data barrier.", "arxiv_id": "2607.04631", "arxiv_url": "https://arxiv.org/abs/2607.04631", "authors": ["Gabriel Poesia", "Simon Henniger", "Tzu-Han Hsu", "Yilun Du", "Nada Amin"], "brief": "Formal Disco\u662f\u4e00\u4e2a\u57fa\u4e8eLLM\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7684\u5206\u5e03\u5f0f\u7cfb\u7edf\uff0c\u901a\u8fc7\"\u53d1\u8d77\u8005\"\u3001\"\u4fee\u590d\u8005\"\u3001\"\u6269\u5c55\u8005\"\u4e09\u7c7b\u5de5\u4f5c\u8282\u70b9\u534f\u540c\uff0c\u5927\u89c4\u6a21\u751f\u6210\u7ecf\u5f62\u5f0f\u5316\u9a8c\u8bc1\u7684\u5408\u6210\u7a0b\u5e8f\u6570\u636e\uff0c\u5e76\u5229\u7528\u6700\u5927\u71b5\u539f\u5219\u63d0\u5347\u6570\u636e\u591a\u6837\u6027\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04631", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u7c7bLLM\u5de5\u4f5c\u8282\u70b9\u5206\u5de5\u534f\u4f5c\uff1a\u53d1\u8d77\u8005\u4ece\u5f00\u6e90README\u8349\u62df\u9a8c\u8bc1\u7a0b\u5e8f\uff0c\u4fee\u590d\u8005\u6839\u636e\u7f16\u8bd1\u5668\u53cd\u9988\u4fee\u6b63\u9519\u8bef\uff0c\u6269\u5c55\u8005\u5bf9\u5df2\u9a8c\u8bc1\u7a0b\u5e8f\u8fdb\u884c\u529f\u80fd\u6269\u5c55", "\u63d0\u51fa\u5408\u6210\u7a0b\u5e8f\u751f\u6210\u7684\u6700\u5927\u71b5\u539f\u5219\uff0c\u901a\u8fc7\u8fed\u4ee3\u76d1\u7763\u5fae\u8c03\u4f7f\u6a21\u578b\u6301\u7eed\u751f\u6210\u66f4\u591a\u6837\u5316\u7684\u7a0b\u5e8f", "\u53d1\u5e03Dafny\u3001Verus\u3001Frama-C\u4e09\u79cd\u9a8c\u8bc1\u8bed\u8a00\u7684\u5927\u89c4\u6a21\u5408\u6210\u6570\u636e\u96c6\uff0c\u5fae\u8c03\u540e\u7684\u5f00\u6e90\u6a21\u578b\u6027\u80fd\u5e38\u4e0eClaude Opus 4.5\u6301\u5e73\u751a\u81f3\u8d85\u8d8a"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "\u667a\u80fd\u4f53", "\u5408\u6210\u6570\u636e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04631v1", "published_at": "2026-07-06", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Formal Disco: Scalable Open-Ended Generation of Formally Verified Programs", "tldr": "\u63d0\u51faFormal Disco\u7cfb\u7edf\uff0c\u5927\u89c4\u6a21\u751f\u6210\u5f62\u5f0f\u5316\u9a8c\u8bc1\u7a0b\u5e8f\u5408\u6210\u6570\u636e\uff0c\u7a81\u7834\u9a8c\u8bc1\u8bed\u8a00\u6570\u636e\u7a00\u7f3a\u74f6\u9888", "upvotes": 0, "what_it_is": "Formal Disco\u662f\u4e00\u4e2a\u57fa\u4e8eLLM\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7684\u5206\u5e03\u5f0f\u7cfb\u7edf\uff0c\u901a\u8fc7\"\u53d1\u8d77\u8005\"\u3001\"\u4fee\u590d\u8005\"\u3001\"\u6269\u5c55\u8005\"\u4e09\u7c7b\u5de5\u4f5c\u8282\u70b9\u534f\u540c\uff0c\u5927\u89c4\u6a21\u751f\u6210\u7ecf\u5f62\u5f0f\u5316\u9a8c\u8bc1\u7684\u5408\u6210\u7a0b\u5e8f\u6570\u636e\uff0c\u5e76\u5229\u7528\u6700\u5927\u71b5\u539f\u5219\u63d0\u5347\u6570\u636e\u591a\u6837\u6027\u3002", "why_notable": "\u5f62\u5f0f\u5316\u9a8c\u8bc1\u662f\u8f6f\u4ef6\u8d28\u91cf\u4fdd\u969c\u7684\u6700\u9ad8\u6807\u51c6\uff0c\u4f46\u957f\u671f\u53d7\u9650\u4e8e\u8bad\u7ec3\u6570\u636e\u7a00\u7f3a\uff1b\u8be5\u5de5\u4f5c\u63d0\u4f9b\u4e86\u4e00\u6761\u53ef\u6269\u5c55\u7684\u5408\u6210\u6570\u636e\u751f\u6210\u8def\u5f84\uff0c\u6709\u671b\u6253\u7834\u5f62\u5f0f\u5316\u63a8\u7406\u9886\u57df\u7684\u6570\u636e\u58c1\u5792\uff0c\u63a8\u52a8AI\u8f85\u52a9\u7a0b\u5e8f\u9a8c\u8bc1\u7684\u5b9e\u7528\u5316\u3002"}, {"abstract": "Untargeted tandem mass spectrometry (MS/MS) detects thousands of small molecules per biological sample, yet most go unidentified because they are absent from spectral libraries. These uncharacterized metabolites and natural products are precisely the compounds that matter for drug discovery, biomarker research, and exposomics. Computational de novo structure elucidation could close this gap, but almost all state-of-the-art methods assume the ground-truth molecular formula is known, an oracle that does not exist for genuinely novel compounds and is itself predicted with substantial error. We present MARLIN, a de novo method that elucidates structures directly from a spectrum with no molecular formula at any stage. A self-supervised encoder predicts a molecular fingerprint from the raw peaks, and a block-diffusion language model generates candidate structures conditioned only on the fingerprint and the instrument-measured precursor mass. A provably safe mass-shell constraint keeps every candidate consistent with the measured mass without fixing the atom inventory, and candidates are accepted by exact parts-per-million mass agreement. A symmetric noise objective absorbs encoder error, and a candidate-diversity mechanism keeps the candidates from collapsing to a single structure. On the NPLIB1 benchmark, MARLIN is the strongest method evaluated without a ground-truth formula across exact-match accuracy, structural distance, and fingerprint similarity, and it recovers the correct molecular formula as a byproduct about as often as a dedicated predictor without ever using one. MARLIN enables reliable de novo structure elucidation in the realistic discovery regime where the molecular formula is unavailable.", "arxiv_id": "2607.04774", "arxiv_url": "https://arxiv.org/abs/2607.04774", "authors": ["Xujun Che", "Xiuxia Du", "Depeng Xu"], "brief": "\u63d0\u51faMARLIN\u65b9\u6cd5\uff0c\u5229\u7528\u81ea\u76d1\u7763\u7f16\u7801\u5668\u4ece\u8d28\u8c31\u5cf0\u9884\u6d4b\u5206\u5b50\u6307\u7eb9\uff0c\u518d\u901a\u8fc7\u5757\u6269\u6563\u8bed\u8a00\u6a21\u578b\u751f\u6210\u5019\u9009\u7ed3\u6784\uff0c\u5168\u7a0b\u65e0\u9700\u5df2\u77e5\u5206\u5b50\u5f0f\u5373\u53ef\u5b8c\u6210\u4ece\u5934\u5206\u5b50\u7ed3\u6784\u89e3\u6790\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04774", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u81ea\u76d1\u7763\u7f16\u7801\u5668\u5c06\u539f\u59cb\u8d28\u8c31\u5cf0\u6620\u5c04\u4e3a\u5206\u5b50\u6307\u7eb9\uff0c\u5757\u6269\u6563\u8bed\u8a00\u6a21\u578b\u57fa\u4e8e\u6307\u7eb9\u548c\u524d\u4f53\u8d28\u91cf\u751f\u6210\u5019\u9009\u7ed3\u6784", "\u5f15\u5165\u53ef\u8bc1\u660e\u5b89\u5168\u7684\u8d28\u91cf\u58f3\u7ea6\u675f\uff08mass-shell constraint\uff09\uff0c\u786e\u4fdd\u5019\u9009\u7ed3\u6784\u4e0e\u5b9e\u6d4b\u8d28\u91cf\u4e00\u81f4\u800c\u4e0d\u56fa\u5b9a\u539f\u5b50\u7ec4\u6210", "\u5728NPLIB1\u57fa\u51c6\u4e0a\uff0cMARLIN\u5728\u65e0\u771f\u5b9e\u5206\u5b50\u5f0f\u6761\u4ef6\u4e0b\u7684\u7cbe\u786e\u5339\u914d\u51c6\u786e\u7387\u3001\u7ed3\u6784\u8ddd\u79bb\u548c\u6307\u7eb9\u76f8\u4f3c\u5ea6\u5747\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\uff0c\u5e76\u80fd\u526f\u4ea7\u54c1\u5f0f\u5730\u6062\u590d\u6b63\u786e\u5206\u5b50\u5f0f"], "keywords": ["\u5206\u5b50\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u8d28\u8c31\u5206\u6790", "\u836f\u7269\u53d1\u73b0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04774v1", "published_at": "2026-07-06", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MARLIN: De Novo Molecular Structure Elucidation from Tandem Mass Spectra without a Ground-Truth Formula", "tldr": "MARLIN\u65e0\u9700\u5206\u5b50\u5f0f\uff0c\u76f4\u63a5\u4ece\u4e32\u8054\u8d28\u8c31\u6570\u636e\u4ece\u5934\u89e3\u6790\u5c0f\u5206\u5b50\u4e09\u7ef4\u7ed3\u6784", "upvotes": 0, "what_it_is": "\u63d0\u51faMARLIN\u65b9\u6cd5\uff0c\u5229\u7528\u81ea\u76d1\u7763\u7f16\u7801\u5668\u4ece\u8d28\u8c31\u5cf0\u9884\u6d4b\u5206\u5b50\u6307\u7eb9\uff0c\u518d\u901a\u8fc7\u5757\u6269\u6563\u8bed\u8a00\u6a21\u578b\u751f\u6210\u5019\u9009\u7ed3\u6784\uff0c\u5168\u7a0b\u65e0\u9700\u5df2\u77e5\u5206\u5b50\u5f0f\u5373\u53ef\u5b8c\u6210\u4ece\u5934\u5206\u5b50\u7ed3\u6784\u89e3\u6790\u3002", "why_notable": "\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\u51e0\u4e4e\u90fd\u4f9d\u8d56\u5df2\u77e5\u5206\u5b50\u5f0f\u8fd9\u4e00\u5728\u771f\u5b9e\u53d1\u73b0\u573a\u666f\u4e2d\u4e0d\u5b58\u5728\u7684\u5148\u9a8c\u6761\u4ef6\uff0cMARLIN\u9996\u6b21\u5728\u65e0\u5206\u5b50\u5f0f\u7ea6\u675f\u4e0b\u5b9e\u73b0\u53ef\u9760\u7684\u4ece\u5934\u7ed3\u6784\u89e3\u6790\uff0c\u5bf9\u836f\u7269\u53d1\u73b0\u3001\u751f\u7269\u6807\u5fd7\u7269\u7814\u7a76\u548c\u66b4\u9732\u7ec4\u5b66\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We present SynCity 3000, a framework for generating 3D scenes that are globally coherent while enabling fine-grained layout control. Building on the ability of current image-to-3D generators to produce complex 3D assets from a single image, we extend this capability to the scale of entire scenes by adapting the generator to be applicable as a convolutional operator. We achieve this by fine-tuning the model on scene-like data generated by a new synthetic data engine, which we propose to address the scarcity of 3D scene data for training. The convolutional generator is then applied to a dimetric image of the entire scene, generated from the user prompt, resulting in 3D scenes of arbitrary size and complexity. Across diverse prompts and layouts, SynCity 3000 produces large, coherent, and detailed scenes, addressing the shortcomings of prior approaches to 3D scene generation.", "arxiv_id": "2607.05392", "arxiv_url": "https://arxiv.org/abs/2607.05392", "authors": ["Paul Engstler", "Iro Laina", "Christian Rupprecht", "Andrea Vedaldi"], "brief": "\u63d0\u51faSynCity 3000\u6846\u67b6\uff0c\u5c06\u56fe\u50cf\u52303D\u751f\u6210\u5668\u6269\u5c55\u4e3a\u5377\u79ef\u7b97\u5b50\uff0c\u80fd\u591f\u4ece\u7528\u6237\u63d0\u793a\u751f\u6210\u4efb\u610f\u5927\u5c0f\u3001\u5168\u5c40\u8fde\u8d2f\u76843D\u573a\u666f\uff0c\u5e76\u914d\u5957\u8bbe\u8ba1\u4e86\u5408\u6210\u6570\u636e\u5f15\u64ce\u89e3\u51b33D\u573a\u666f\u8bad\u7ec3\u6570\u636e\u7a00\u7f3a\u95ee\u9898\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05392", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u73b0\u6709\u56fe\u50cf\u52303D\u751f\u6210\u5668\u9002\u914d\u4e3a\u5377\u79ef\u7b97\u5b50\uff0c\u652f\u6301\u5bf9\u6574\u4e2a\u573a\u666f\u7684\u7b49\u8f74\u6d4b\u56fe\u50cf\u8fdb\u884c\u6ed1\u7a97\u5f0f3D\u751f\u6210", "\u63d0\u51fa\u65b0\u578b\u5408\u6210\u6570\u636e\u5f15\u64ce\uff0c\u81ea\u52a8\u751f\u6210\u573a\u666f\u7ea73D\u8bad\u7ec3\u6570\u636e\uff0c\u89e3\u51b3\u5927\u89c4\u6a213D\u573a\u666f\u6570\u636e\u7a00\u7f3a\u74f6\u9888", "\u652f\u6301\u4efb\u610f\u5c3a\u5bf8\u4e0e\u590d\u6742\u5ea6\u7684\u573a\u666f\u751f\u6210\uff0c\u540c\u65f6\u4fdd\u6301\u5168\u5c40\u4e00\u81f4\u6027\u4e0e\u7ec6\u7c92\u5ea6\u5e03\u5c40\u63a7\u5236"], "keywords": ["3D\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u573a\u666f\u91cd\u5efa", "\u5408\u6210\u6570\u636e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05392v1", "published_at": "2026-07-06", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SynCity 3000: Bootstrapping Scene-Scale 3D Diffusion", "tldr": "SynCity 3000\uff1a\u901a\u8fc7\u5377\u79ef\u5f0f\u6269\u6563\u6a21\u578b\u751f\u6210\u5168\u5c40\u4e00\u81f4\u3001\u53ef\u63a7\u5e03\u5c40\u7684\u5927\u89c4\u6a213D\u573a\u666f", "upvotes": 0, "what_it_is": "\u63d0\u51faSynCity 3000\u6846\u67b6\uff0c\u5c06\u56fe\u50cf\u52303D\u751f\u6210\u5668\u6269\u5c55\u4e3a\u5377\u79ef\u7b97\u5b50\uff0c\u80fd\u591f\u4ece\u7528\u6237\u63d0\u793a\u751f\u6210\u4efb\u610f\u5927\u5c0f\u3001\u5168\u5c40\u8fde\u8d2f\u76843D\u573a\u666f\uff0c\u5e76\u914d\u5957\u8bbe\u8ba1\u4e86\u5408\u6210\u6570\u636e\u5f15\u64ce\u89e3\u51b33D\u573a\u666f\u8bad\u7ec3\u6570\u636e\u7a00\u7f3a\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c06\u5355\u7269\u4f53\u56fe\u50cf\u52303D\u751f\u6210\u80fd\u529b\u7cfb\u7edf\u6027\u6269\u5c55\u81f3\u57ce\u5e02/\u573a\u666f\u5c3a\u5ea6\uff0c\u5377\u79ef\u5316\u9002\u914d\u601d\u8def\u65b0\u9896\uff0c\u5408\u6210\u6570\u636e\u5f15\u64ce\u53ef\u590d\u7528\uff0c\u5bf9\u6e38\u620f\u3001\u4eff\u771f\u3001\u5177\u8eab\u667a\u80fd\u7b49\u9886\u57df\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Recent advances in video diffusion models have enabled either long single-view generation through temporal autoregression, or short multi-view synthesis through bidirectional attention. However, generating long, multi-view consistent videos of dynamic scenes remains unsolved. In this work, we present MV-Forcing, a framework that composes temporal and view-wise autoregression within a single diffusion model by introducing a 4D geometric bridge between sequentially generated views. Our key insight is that an autoregressive 3D reconstruction model naturally interfaces between autoregressively generated views. Given a completed source view, we reconstruct its 3D structure and render a geometric prior of the next target viewpoint, which the diffusion model refines into a high-quality video. To extend generation beyond the teacher\u0027s fixed temporal window, we introduce a joint denoising regime where both view slots are initialized from noise during training, enabling temporally unbounded generation. We distill the model via Distribution Matching Distillation with Spatio-Temporal Self-Forcing, closing the train-inference exposure bias gap for both temporal and view-sequential autoregression. Extensive experiments on both synthetic and real-world data demonstrate that MV-Forcing produces geometrically consistent multi-view videos of dynamic scenes at arbitrary lengths and viewpoint counts using a single few-step student model.", "arxiv_id": "2607.05376", "arxiv_url": "https://arxiv.org/abs/2607.05376", "authors": ["Gal Fiebelman", "Hadar Averbuch-Elor", "Sagie Benaim"], "brief": "\u63d0\u51faMV-Forcing\u6846\u67b6\uff0c\u5728\u5355\u4e00\u6269\u6563\u6a21\u578b\u4e2d\u878d\u5408\u65f6\u5e8f\u4e0e\u89c6\u89d2\u53cc\u5411\u81ea\u56de\u5f52\uff0c\u5229\u75284D\u51e0\u4f55\u5148\u9a8c\u6865\u63a5\u591a\u89c6\u89d2\u89c6\u9891\u751f\u6210\uff0c\u5b9e\u73b0\u4efb\u610f\u957f\u5ea6\u3001\u4efb\u610f\u89c6\u89d2\u6570\u91cf\u7684\u52a8\u6001\u573a\u666f\u591a\u89c6\u89d2\u4e00\u81f4\u89c6\u9891\u5408\u6210\u3002", "categories": ["cs.CV", "cs.GR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05376", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u81ea\u56de\u5f523D\u91cd\u5efa\u6a21\u578b\u4f5c\u4e3a\u89c6\u89d2\u95f4\u63a5\u53e3\uff0c\u4ece\u5df2\u751f\u6210\u6e90\u89c6\u89d2\u91cd\u5efa3D\u7ed3\u6784\u5e76\u6e32\u67d3\u76ee\u6807\u89c6\u89d2\u51e0\u4f55\u5148\u9a8c\uff0c\u518d\u7531\u6269\u6563\u6a21\u578b\u7cbe\u5316\u4e3a\u9ad8\u8d28\u91cf\u89c6\u9891", "\u8bbe\u8ba1\u8054\u5408\u53bb\u566a\u8bad\u7ec3\u673a\u5236\uff08\u4e24\u4e2a\u89c6\u89d2\u69fd\u5747\u4ece\u566a\u58f0\u521d\u59cb\u5316\uff09\uff0c\u7a81\u7834\u6559\u5e08\u6a21\u578b\u56fa\u5b9a\u65f6\u95f4\u7a97\u53e3\u9650\u5236\uff0c\u5b9e\u73b0\u65f6\u5e8f\u65e0\u754c\u751f\u6210", "\u91c7\u7528\u5206\u5e03\u5339\u914d\u84b8\u998f\uff08DMD\uff09\u7ed3\u5408\u65f6\u7a7a\u81ea\u5f3a\u8feb\uff08Spatio-Temporal Self-Forcing\uff09\uff0c\u6d88\u9664\u65f6\u5e8f\u4e0e\u89c6\u89d2\u5e8f\u5217\u81ea\u56de\u5f52\u7684\u8bad\u7ec3-\u63a8\u7406\u66dd\u5149\u504f\u5dee\uff0c\u5b9e\u73b0\u5c11\u6b65\u63a8\u7406"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u591a\u89c6\u89d2\u5408\u6210", "\u6269\u6563\u6a21\u578b", "\u4e09\u7ef4\u91cd\u5efa"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05376v1", "published_at": "2026-07-06", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MV-Forcing: Long Multi-View Video Generation via 4D-Grounded Spatio-Temporal Self-Forcing", "tldr": "MV-Forcing\uff1a\u901a\u8fc74D\u51e0\u4f55\u6865\u63a5\u5b9e\u73b0\u4efb\u610f\u957f\u5ea6\u591a\u89c6\u89d2\u4e00\u81f4\u52a8\u6001\u573a\u666f\u89c6\u9891\u751f\u6210", "upvotes": 0, "what_it_is": "\u63d0\u51faMV-Forcing\u6846\u67b6\uff0c\u5728\u5355\u4e00\u6269\u6563\u6a21\u578b\u4e2d\u878d\u5408\u65f6\u5e8f\u4e0e\u89c6\u89d2\u53cc\u5411\u81ea\u56de\u5f52\uff0c\u5229\u75284D\u51e0\u4f55\u5148\u9a8c\u6865\u63a5\u591a\u89c6\u89d2\u89c6\u9891\u751f\u6210\uff0c\u5b9e\u73b0\u4efb\u610f\u957f\u5ea6\u3001\u4efb\u610f\u89c6\u89d2\u6570\u91cf\u7684\u52a8\u6001\u573a\u666f\u591a\u89c6\u89d2\u4e00\u81f4\u89c6\u9891\u5408\u6210\u3002", "why_notable": "\u9996\u6b21\u5c06\u65f6\u5e8f\u81ea\u56de\u5f52\u4e0e\u89c6\u89d2\u81ea\u56de\u5f52\u7edf\u4e00\u5728\u5355\u4e00\u6269\u6563\u6a21\u578b\u4e2d\uff0c\u5e76\u901a\u8fc74D\u51e0\u4f55\u7ea6\u675f\u4fdd\u8bc1\u591a\u89c6\u89d2\u4e00\u81f4\u6027\uff0c\u652f\u6301\u4efb\u610f\u957f\u5ea6\u4e0e\u89c6\u89d2\u6570\u91cf\uff0c\u5728\u5408\u6210\u4e0e\u771f\u5b9e\u6570\u636e\u4e0a\u5747\u9a8c\u8bc1\u6709\u6548\uff0c\u5bf9\u52a8\u6001\u573a\u666f3D\u89c6\u9891\u751f\u6210\u5177\u6709\u91cd\u8981\u63a8\u8fdb\u610f\u4e49\u3002"}, {"abstract": "World Action Models (WAMs) have shown strong potential for improving action generalization in autonomous driving by using future video prediction as dense supervision for scene dynamics and temporal causality. However, it remains unclear which architecture better transfers video-modeling benefits to trajectory generation. Existing cascaded or dual-DiT designs separate video imagination from action prediction, weakening the transfer of video-learned world dynamics to the trajectory branch: the action model may still overfit dataset-specific driving priors, while the video model only indirectly regularizes planning. We propose UNIVERSE, a unified video-action model built upon a single mask-modulated Diffusion Transformer. By co-training future video latents and ego-trajectory tokens within shared generative parameters, UNIVERSE allows dense video supervision to directly shape trajectory denoising, leading to stronger cross-domain action generalization. To ensure causal validity and efficient deployment, we introduce a Modality-Decoupling Visibility Mask, which shares historical context across modalities while blocking mutual attention between future video and trajectory tokens. This prevents future-target leakage and enables trajectory-only inference by removing future-video denoising at test time, achieving a $4.3\\times$ speedup over joint video-action rollout while maintaining comparable planning accuracy. The same model also supports video-only and joint video-action rollouts. Experiments show that UNIVERSE achieves 91.0 PDMS on NAVSIM (vs. 89.6 for the Two-DiT variant), and demonstrates strong zero-shot transfer to nuScenes and Bench2Drive without fine-tuning, while ablations confirm the importance of single-DiT unification, video co-training, and mask-based modality decoupling.", "arxiv_id": "2607.05133", "arxiv_url": "https://arxiv.org/abs/2607.05133", "authors": ["Mengmeng Liu", "Diankun Zhang", "Jiuming Liu", "Jianfeng Cui", "Hongwei Xie", "Guang Chen", "Hangjun Ye", "Francesco Nex", "Hao Cheng", "Michael Ying Yang"], "brief": "\u63d0\u51faUNIVERSE\uff0c\u4e00\u4e2a\u57fa\u4e8e\u5355\u4e00\u63a9\u7801\u8c03\u5236\u6269\u6563Transformer\u7684\u7edf\u4e00\u89c6\u9891-\u52a8\u4f5c\u6a21\u578b\uff0c\u901a\u8fc7\u5728\u5171\u4eab\u53c2\u6570\u4e2d\u8054\u5408\u8bad\u7ec3\u672a\u6765\u89c6\u9891\u6f5c\u53d8\u91cf\u4e0e\u81ea\u8f66\u8f68\u8ff9token\uff0c\u4f7f\u89c6\u9891\u76d1\u7763\u76f4\u63a5\u4f5c\u7528\u4e8e\u8f68\u8ff9\u53bb\u566a\u8fc7\u7a0b\uff0c\u589e\u5f3a\u81ea\u52a8\u9a7e\u9a76\u7684\u8de8\u57df\u52a8\u4f5c\u6cdb\u5316\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05133", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u6a21\u6001\u89e3\u8026\u53ef\u89c1\u6027\u63a9\u7801\uff08Modality-Decoupling Visibility Mask\uff09\uff0c\u963b\u65ad\u672a\u6765\u89c6\u9891\u4e0e\u8f68\u8ff9token\u95f4\u7684\u4e92\u6ce8\u610f\u529b\uff0c\u9632\u6b62\u672a\u6765\u76ee\u6807\u6cc4\u9732\uff0c\u5e76\u652f\u6301\u63a8\u7406\u65f6\u4ec5\u751f\u6210\u8f68\u8ff9", "\u63a8\u7406\u65f6\u53bb\u9664\u672a\u6765\u89c6\u9891\u53bb\u566a\u5206\u652f\uff0c\u5b9e\u73b0\u76f8\u6bd4\u8054\u5408\u89c6\u9891-\u52a8\u4f5c\u63a8\u74064.3\u500d\u52a0\u901f\uff0c\u540c\u65f6\u4fdd\u6301\u76f8\u5f53\u7684\u89c4\u5212\u7cbe\u5ea6", "\u5728NAVSIM\u4e0a\u8fbe\u523091.0 PDMS\uff08\u53ccDiT\u53d8\u4f53\u4e3a89.6\uff09\uff0c\u5e76\u5728nuScenes\u548cBench2Drive\u4e0a\u5b9e\u73b0\u96f6\u6837\u672c\u8fc1\u79fb\uff0c\u65e0\u9700\u5fae\u8c03"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u4e16\u754c\u6a21\u578b", "\u6269\u6563\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05133v1", "published_at": "2026-07-06", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "UNIVERSE: Unified Video Action Models for Autonomous Driving with Flexible Mask-Modulated Modality Generation", "tldr": "UNIVERSE\uff1a\u5355\u4e00\u6269\u6563Transformer\u7edf\u4e00\u89c6\u9891\u4e0e\u8f68\u8ff9\u751f\u6210\uff0c\u63d0\u5347\u81ea\u52a8\u9a7e\u9a76\u8de8\u57df\u6cdb\u5316\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faUNIVERSE\uff0c\u4e00\u4e2a\u57fa\u4e8e\u5355\u4e00\u63a9\u7801\u8c03\u5236\u6269\u6563Transformer\u7684\u7edf\u4e00\u89c6\u9891-\u52a8\u4f5c\u6a21\u578b\uff0c\u901a\u8fc7\u5728\u5171\u4eab\u53c2\u6570\u4e2d\u8054\u5408\u8bad\u7ec3\u672a\u6765\u89c6\u9891\u6f5c\u53d8\u91cf\u4e0e\u81ea\u8f66\u8f68\u8ff9token\uff0c\u4f7f\u89c6\u9891\u76d1\u7763\u76f4\u63a5\u4f5c\u7528\u4e8e\u8f68\u8ff9\u53bb\u566a\u8fc7\u7a0b\uff0c\u589e\u5f3a\u81ea\u52a8\u9a7e\u9a76\u7684\u8de8\u57df\u52a8\u4f5c\u6cdb\u5316\u3002", "why_notable": "\u9996\u6b21\u901a\u8fc7\u5355\u4e00DiT\u67b6\u6784\u771f\u6b63\u7edf\u4e00\u89c6\u9891\u9884\u6d4b\u4e0e\u8f68\u8ff9\u89c4\u5212\uff0c\u89e3\u51b3\u4e86\u7ea7\u8054/\u53ccDiT\u8bbe\u8ba1\u4e2d\u89c6\u9891\u4e16\u754c\u52a8\u6001\u96be\u4ee5\u6709\u6548\u8fc1\u79fb\u81f3\u52a8\u4f5c\u5206\u652f\u7684\u6838\u5fc3\u95ee\u9898\uff0c\u540c\u65f6\u517c\u987e\u63a8\u7406\u6548\u7387\u4e0e\u8de8\u57df\u6cdb\u5316\uff0c\u5bf9\u81ea\u52a8\u9a7e\u9a76\u4e16\u754c\u6a21\u578b\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "We propose OptiAgent, a multi-agent framework that, given a natural language description of an Operations Research problem, is able to output a solver-ready mathematical formulation as well as executable code. Our architecture prioritizes the mathematical modeling step, where dedicated agents extract structures, such as decision variables and constraints, enabling iterative self-correction. We introduce a novel multi-loop validation architecture with four specialized feedback mechanisms, each targeting a distinct failure mode such as misinterpretation, structural defects, mathematical inconsistencies, validation failures, and code errors. Alongside accuracy, our modular design improves the process of solving optimization problems by improving transparency, as each agent exposes its reasoning and feedback, making the full modeling process auditable. Our framework achieves state-of-the-art performance on 3 out of 4 benchmarks across LP, MILP, and Nonlinear Programming tasks, while remaining highly competitive on the remaining dataset.", "arxiv_id": "2607.05346", "arxiv_url": "https://arxiv.org/abs/2607.05346", "authors": ["Adriana Laurindo Monteiro", "Nayse Fagundes", "Gabriel Mattos Langeloh", "Gustavo de Oliveira Kanno", "Priscila Louise Aguirre", "Thiago Costa Rizuti da Rocha", "Victor Leme Beltran"], "brief": "\u63d0\u51faOptiAgent\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u8f93\u5165\u8fd0\u7b79\u5b66\u95ee\u9898\u7684\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\uff0c\u901a\u8fc7\u4e13\u7528\u667a\u80fd\u4f53\u63d0\u53d6\u51b3\u7b56\u53d8\u91cf\u4e0e\u7ea6\u675f\u7b49\u7ed3\u6784\uff0c\u8f93\u51fa\u6570\u5b66\u5efa\u6a21\u516c\u5f0f\u53ca\u53ef\u6267\u884c\u4ee3\u7801\uff0c\u5e76\u5f15\u5165\u56db\u73af\u9a8c\u8bc1\u67b6\u6784\u5b9e\u73b0\u8fed\u4ee3\u81ea\u6821\u6b63\u3002", "categories": ["cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05346", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u591a\u5faa\u73af\u9a8c\u8bc1\u67b6\u6784\u542b\u56db\u79cd\u4e13\u9879\u53cd\u9988\u673a\u5236\uff0c\u5206\u522b\u9488\u5bf9\u8bef\u89e3\u3001\u7ed3\u6784\u7f3a\u9677\u3001\u6570\u5b66\u4e0d\u4e00\u81f4\u3001\u9a8c\u8bc1\u5931\u8d25\u548c\u4ee3\u7801\u9519\u8bef\u7b49\u4e0d\u540c\u5931\u8d25\u6a21\u5f0f", "\u5728LP\u3001MILP\u548c\u975e\u7ebf\u6027\u89c4\u5212\u4efb\u52a1\u76844\u4e2a\u57fa\u51c6\u4e2d\uff0c3\u4e2a\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff08SOTA\uff09", "\u6a21\u5757\u5316\u8bbe\u8ba1\u4f7f\u6bcf\u4e2a\u667a\u80fd\u4f53\u66b4\u9732\u63a8\u7406\u4e0e\u53cd\u9988\uff0c\u5168\u5efa\u6a21\u8fc7\u7a0b\u53ef\u5ba1\u8ba1\uff0c\u63d0\u5347\u900f\u660e\u5ea6"], "keywords": ["\u667a\u80fd\u4f53", "\u8fd0\u7b79\u4f18\u5316", "\u591a\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05346v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "OptiAgent: End-to-End Optimization Modeling via Multi-Agent Iterative Refinement", "tldr": "OptiAgent\uff1a\u591a\u667a\u80fd\u4f53\u6846\u67b6\u5c06\u81ea\u7136\u8bed\u8a00\u8fd0\u7b79\u5b66\u95ee\u9898\u81ea\u52a8\u8f6c\u5316\u4e3a\u6c42\u89e3\u5668\u5c31\u7eea\u7684\u6570\u5b66\u6a21\u578b\u4e0e\u53ef\u6267\u884c\u4ee3\u7801", "upvotes": 0, "what_it_is": "\u63d0\u51faOptiAgent\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u8f93\u5165\u8fd0\u7b79\u5b66\u95ee\u9898\u7684\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\uff0c\u901a\u8fc7\u4e13\u7528\u667a\u80fd\u4f53\u63d0\u53d6\u51b3\u7b56\u53d8\u91cf\u4e0e\u7ea6\u675f\u7b49\u7ed3\u6784\uff0c\u8f93\u51fa\u6570\u5b66\u5efa\u6a21\u516c\u5f0f\u53ca\u53ef\u6267\u884c\u4ee3\u7801\uff0c\u5e76\u5f15\u5165\u56db\u73af\u9a8c\u8bc1\u67b6\u6784\u5b9e\u73b0\u8fed\u4ee3\u81ea\u6821\u6b63\u3002", "why_notable": "\u9996\u6b21\u5c06\u591a\u667a\u80fd\u4f53\u8fed\u4ee3\u7cbe\u70bc\u5f15\u5165\u7aef\u5230\u7aef\u4f18\u5316\u5efa\u6a21\uff0c\u517c\u987e\u51c6\u786e\u6027\u4e0e\u53ef\u89e3\u91ca\u6027\uff0c\u5728\u591a\u7c7b\u4f18\u5316\u95ee\u9898\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u5bf9\u81ea\u52a8\u5316\u8fd0\u7b79\u5b66\u6c42\u89e3\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Despite their strong reasoning capabilities and extensive world knowledge, Large Language Models (LLMs) frequently generate plans that violate task constraints, undermining their reliability in real-world applications. This deficiency arises from a lack of systematic mechanisms to incorporate constraint information during the generation process. While existing approaches attempt to mitigate this by relying on external tools or task decomposition, they fail to enhance the model\u0027s intrinsic constraint awareness. To address this, we propose Constraint-Aware Reinforcement Learning (CARL), a novel RL framework designed to strengthen LLMs\u0027 intrinsic focus on constraints. CARL introduces a constraint-aware reward by comparing the model\u0027s output distributions under constrained and unconstrained inputs, encouraging constraint focus and penalizing neglect. Compatible with various RL frameworks and requiring no external solvers or top models, CARL enables scalable, end-to-end constraint-aware planning. Extensive experiments on BlocksWorld, TravelPlanner, and T-Eval demonstrate that CARL significantly outperforms standard Reinforcement Fine-Tuning (RFT) baselines and state-of-the-art reasoning models, exhibiting a markedly increased focus on constraints.", "arxiv_id": "2607.04854", "arxiv_url": "https://arxiv.org/abs/2607.04854", "authors": ["Qiuyi Qi", "Jinjian Zhang", "Mutian Bao", "Tian Liang", "Guocong Li", "Dongnan Liu", "Wei Zhou", "Jie Liu", "Ming Kong", "Linjian Mo", "Feng Zhang", "Qiang Zhu"], "brief": "\u63d0\u51fa\u7ea6\u675f\u611f\u77e5\u5f3a\u5316\u5b66\u4e60\u6846\u67b6CARL\uff0c\u901a\u8fc7\u6bd4\u8f83\u6a21\u578b\u5728\u6709\u7ea6\u675f\u4e0e\u65e0\u7ea6\u675f\u8f93\u5165\u4e0b\u7684\u8f93\u51fa\u5206\u5e03\u5dee\u5f02\u6784\u5efa\u5956\u52b1\u4fe1\u53f7\uff0c\u4ece\u5185\u90e8\u5f3a\u5316LLM\u5bf9\u89c4\u5212\u4efb\u52a1\u4e2d\u7ea6\u675f\u6761\u4ef6\u7684\u5173\u6ce8\u5ea6\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04854", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u8bbe\u8ba1\u7ea6\u675f\u611f\u77e5\u5956\u52b1\u51fd\u6570\uff0c\u5bf9\u6bd4\u6709/\u65e0\u7ea6\u675f\u8f93\u5165\u7684\u8f93\u51fa\u5206\u5e03\uff0c\u9f13\u52b1\u6a21\u578b\u805a\u7126\u7ea6\u675f\u3001\u60e9\u7f5a\u5ffd\u89c6\u7ea6\u675f\u7684\u884c\u4e3a", "\u65e0\u9700\u5916\u90e8\u6c42\u89e3\u5668\u6216\u66f4\u5f3a\u6a21\u578b\u8f85\u52a9\uff0c\u4e0e\u591a\u79cdRL\u6846\u67b6\u517c\u5bb9\uff0c\u652f\u6301\u7aef\u5230\u7aef\u8bad\u7ec3", "\u5728BlocksWorld\u3001TravelPlanner\u3001T-Eval\u4e09\u4e2a\u57fa\u51c6\u4e0a\u663e\u8457\u8d85\u8d8a\u6807\u51c6RFT\u57fa\u7ebf\u53caSOTA\u63a8\u7406\u6a21\u578b"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u89c4\u5212", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7ea6\u675f\u6ee1\u8db3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04854v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CARL: Constraint-Aware Reinforcement Learning for Planning with LLMs", "tldr": "\u63d0\u51faCARL\u6846\u67b6\uff0c\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u589e\u5f3aLLM\u5bf9\u4efb\u52a1\u7ea6\u675f\u7684\u5185\u5728\u611f\u77e5\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u7ea6\u675f\u611f\u77e5\u5f3a\u5316\u5b66\u4e60\u6846\u67b6CARL\uff0c\u901a\u8fc7\u6bd4\u8f83\u6a21\u578b\u5728\u6709\u7ea6\u675f\u4e0e\u65e0\u7ea6\u675f\u8f93\u5165\u4e0b\u7684\u8f93\u51fa\u5206\u5e03\u5dee\u5f02\u6784\u5efa\u5956\u52b1\u4fe1\u53f7\uff0c\u4ece\u5185\u90e8\u5f3a\u5316LLM\u5bf9\u89c4\u5212\u4efb\u52a1\u4e2d\u7ea6\u675f\u6761\u4ef6\u7684\u5173\u6ce8\u5ea6\u3002", "why_notable": "\u73b0\u6709LLM\u89c4\u5212\u65b9\u6cd5\u4f9d\u8d56\u5916\u90e8\u5de5\u5177\u6216\u4efb\u52a1\u5206\u89e3\u6765\u5904\u7406\u7ea6\u675f\uff0c\u672a\u80fd\u63d0\u5347\u6a21\u578b\u672c\u8eab\u7684\u7ea6\u675f\u610f\u8bc6\uff1bCARL\u4ece\u5185\u5728\u673a\u5236\u51fa\u53d1\u89e3\u51b3\u8fd9\u4e00\u6839\u672c\u7f3a\u9677\uff0c\u65b9\u6cd5\u8f7b\u91cf\u4e14\u901a\u7528\uff0c\u5bf9\u63d0\u5347LLM\u5728\u771f\u5b9e\u4e16\u754c\u89c4\u5212\u4efb\u52a1\u4e2d\u7684\u53ef\u9760\u6027\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning (RL) post-training for large language models (LLMs) follows a efficient paradigm of \"rollout then update\", which inevitably results in off-policy training data. To resolve this, Importance sampling (IS) is proposed, while the token-level ratios compound over long sequences, causing severe variance exploded. A natural idea is \"transferring\" these off-policy token into on-policy token, so that the importance scores for correction are unnecessary. Following this idea, we propose Selective Importance Sampling (SIS), which is inspired by rejection sampling. Concretely, SIS implements by viewing off-policy model as proposal distribution, and implement a token-level rejection test: accepted tokens are viewed as on-policy, so that receive unit importance score, while rejected tokens retain the standard IS correction. Our proposed SIS is theoretically proved reducing the gap between token-level and sequence-level off-policy gradient estimators. The SIS acts as a plug-in that only modifies the importance ratio in the policy loss, adding negligible wall-clock overhead, and can be combine with a vast vary of RL post-training algorithms. Experiments on dense and MoE LLMs across math and agent benchmarks show that SIS consistently improves all objectives, while providing substantially stronger robustness under off-policy data.", "arxiv_id": "2607.04728", "arxiv_url": "https://arxiv.org/abs/2607.04728", "authors": ["Yu Li", "Xiuyu Li", "Mingyang Yi", "Jiaxing Wang", "zhangliangxu", "Zhaolong Xing", "Zhen Chen"], "brief": "\u63d0\u51fa\u9009\u62e9\u6027\u91cd\u8981\u6027\u91c7\u6837\uff08SIS\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7token\u7ea7\u522b\u7684\u62d2\u7edd\u6d4b\u8bd5\u5c06\u79bb\u7b56\u7565token\"\u8f6c\u5316\"\u4e3a\u5728\u7b56\u7565token\uff0c\u4ece\u800c\u89e3\u51b3LLM\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u4e2d\u79bb\u7b56\u7565\u6570\u636e\u5bfc\u81f4\u7684\u65b9\u5dee\u7206\u70b8\u95ee\u9898\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04728", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d7\u62d2\u7edd\u91c7\u6837\u542f\u53d1\uff0c\u5c06\u79bb\u7b56\u7565\u6a21\u578b\u89c6\u4e3a\u63d0\u8bae\u5206\u5e03\uff0c\u5bf9\u6bcf\u4e2atoken\u6267\u884c\u62d2\u7edd\u6d4b\u8bd5\uff1a\u63a5\u53d7\u7684token\u89c6\u4e3a\u5728\u7b56\u7565\uff08\u91cd\u8981\u6027\u6743\u91cd\u4e3a1\uff09\uff0c\u62d2\u7edd\u7684token\u4fdd\u7559\u6807\u51c6IS\u4fee\u6b63", "\u7406\u8bba\u4e0a\u8bc1\u660eSIS\u80fd\u7f29\u5c0ftoken\u7ea7\u4e0e\u5e8f\u5217\u7ea7\u79bb\u7b56\u7565\u68af\u5ea6\u4f30\u8ba1\u5668\u4e4b\u95f4\u7684\u5dee\u8ddd\uff0c\u964d\u4f4e\u65b9\u5dee", "\u4f5c\u4e3a\u5373\u63d2\u5373\u7528\u6a21\u5757\uff0c\u4ec5\u4fee\u6539\u7b56\u7565\u635f\u5931\u4e2d\u7684\u91cd\u8981\u6027\u6bd4\u7387\uff0c\u51e0\u4e4e\u4e0d\u589e\u52a0\u989d\u5916\u8ba1\u7b97\u5f00\u9500\uff0c\u53ef\u4e0e\u591a\u79cdRL\u540e\u8bad\u7ec3\u7b97\u6cd5\u7ed3\u5408"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "LLM\u5bf9\u9f50", "\u91cd\u8981\u6027\u91c7\u6837", "\u540e\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04728v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Turning Off-Policy Tokens On-Policy: A Plug-in Approach for Improving LLM Alignment", "tldr": "\u63d0\u51faSIS\u65b9\u6cd5\u5c06\u79bb\u7b56\u7565token\u8f6c\u5316\u4e3a\u5728\u7b56\u7565token\uff0c\u6539\u5584LLM\u5f3a\u5316\u5b66\u4e60\u5bf9\u9f50\u8bad\u7ec3", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u9009\u62e9\u6027\u91cd\u8981\u6027\u91c7\u6837\uff08SIS\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7token\u7ea7\u522b\u7684\u62d2\u7edd\u6d4b\u8bd5\u5c06\u79bb\u7b56\u7565token\"\u8f6c\u5316\"\u4e3a\u5728\u7b56\u7565token\uff0c\u4ece\u800c\u89e3\u51b3LLM\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u4e2d\u79bb\u7b56\u7565\u6570\u636e\u5bfc\u81f4\u7684\u65b9\u5dee\u7206\u70b8\u95ee\u9898\u3002", "why_notable": "\u5728\u7a20\u5bc6\u6a21\u578b\u548cMoE\u6a21\u578b\u4e0a\u7684\u6570\u5b66\u4e0e\u667a\u80fd\u4f53\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u5747\u4e00\u81f4\u63d0\u5347\u6027\u80fd\uff0c\u4e14\u5728\u79bb\u7b56\u7565\u6570\u636e\u4e0b\u8868\u73b0\u51fa\u66f4\u5f3a\u7684\u9c81\u68d2\u6027\uff0c\u5177\u6709\u9ad8\u5ea6\u5b9e\u7528\u4ef7\u503c\u548c\u5e7f\u6cdb\u9002\u7528\u6027\u3002"}, {"abstract": "Automatic data visualization generation has advanced rapidly with multi-modal large language models, yet existing efforts largely focus on static charts and overlook the interactive dashboards commonly used for real-world data exploration. We introduce Dashboard2Code, a novel task that requires a model to proactively explore an interactive dashboard, acquire and integrate feedback from its own interactions (e.g., clicking and filtering), and generate code that reproduces the target dashboard. To support comprehensive evaluation, we present DashboardMimic, the first Plotly+Dash benchmark for Dashboard2Code, comprising 180 carefully designed and manually verified dashboard-code pairs spanning three difficulty levels and covering eight common real-world interaction patterns. We further propose an automated evaluation framework tailored to dashboards that combines code semantic analysis with dynamic interaction-based testing to assess visual and interaction consistency, showing strong agreement with human judgments. Experiments across a range of open- and closed-source multi-modal models reveal that even the strongest systems struggle on high-complexity dashboards and that a substantial performance gap remains between open-source and closed-source models on the Dashboard2Code task.", "arxiv_id": "2607.04727", "arxiv_url": "https://arxiv.org/abs/2607.04727", "authors": ["Tianhao Niu", "Ziyu Han", "Qiguang Chen", "Shiqi Zhou", "Baocai Shan", "Hengjie Fang", "Qingfu Zhu", "Wanxiang Che"], "brief": "\u63d0\u51faDashboard2Code\u65b0\u4efb\u52a1\uff0c\u8981\u6c42\u6a21\u578b\u4e3b\u52a8\u63a2\u7d22\u4ea4\u4e92\u5f0f\u4eea\u8868\u76d8\uff08\u70b9\u51fb\u3001\u8fc7\u6ee4\u7b49\u64cd\u4f5c\uff09\uff0c\u5e76\u751f\u6210\u80fd\u590d\u73b0\u8be5\u4eea\u8868\u76d8\u7684\u4ee3\u7801\uff1b\u540c\u65f6\u6784\u5efa\u9996\u4e2aPlotly+Dash\u57fa\u51c6DashboardMimic\uff0c\u5305\u542b180\u4e2a\u4eea\u8868\u76d8-\u4ee3\u7801\u5bf9\u53ca\u81ea\u52a8\u5316\u8bc4\u4f30\u6846\u67b6\u3002", "categories": ["cs.SE", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04727", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["DashboardMimic\u57fa\u51c6\u542b180\u4e2a\u4eba\u5de5\u9a8c\u8bc1\u7684\u4eea\u8868\u76d8-\u4ee3\u7801\u5bf9\uff0c\u8986\u76d63\u4e2a\u96be\u5ea6\u7ea7\u522b\u548c8\u79cd\u5e38\u89c1\u4ea4\u4e92\u6a21\u5f0f", "\u8bc4\u4f30\u6846\u67b6\u7ed3\u5408\u4ee3\u7801\u8bed\u4e49\u5206\u67 "Embodied Chain-of-Thought has emerged as a promising mechanism to enhance robot decision-making and interpretability in black-box Vision-Language Action (VLA) models. However, whether this verbalized Chain-of-Thought truthfully reflects the policy\u0027s underlying decision process remains poorly understood. We distinguish between functional reasoning, in which reasoning improves task performance, and faithful reasoning, in which reasoning truly reflects the policy\u0027s internal decision process. We argue that SoTA alignment strategies offer a necessary but insufficient notion of faithfulness, admitting reasoning whose intermediate steps can mask the causal links in action prediction through confounding factors (e.g., reasoning that is ungrounded in the environment and internally disconnected or inconsistent), restricting policy generalization. We study this gap through a human evaluation of a SoTA reasoning model for autonomous driving, revealing an inconsistent coupling between reasoning quality and downstream trajectory improvement. We then operationalize a behavioral surrogate for embodied faithfulness through a learned critic, Pinocchio, scoring observation grounding and stepwise coherence, and use this critic as a dense reward signal in post-training an embodied policy with reinforcement learning. Across withheld driving benchmarks, our post-trained planner improves faithfulness by 4% and 18% over SoTA alignment and trajectory error post-training baselines, respectively, while maintaining competitive downstream task performance. Finally, on a synthetic out-of-distribution test set, post-training for faithfulness improves policy responsiveness to rare counterfactual scenarios by 1.6x that of a SoTA policy, suggesting that faithful reasoning traces contribute to more robust, generalizable, and interpretable embodied intelligence. Project page: https://mjf-su.github.io/pinocchio/", "arxiv_id": "2607.04681", "arxiv_url": "https://arxiv.org/abs/2607.04681", "authors": ["Matthew Foutter", "Matteo Cercola", "Lena Wild", "Yunshan Wang", "Michelle Li", "Daniele Gammelli", "Marco Pavone"], "brief": "\u672c\u6587\u7814\u7a76VLA\u6a21\u578b\u4e2d\u5177\u8eab\u601d\u7ef4\u94fe\u63a8\u7406\u7684\"\u5fe0\u5b9e\u6027\"\u95ee\u9898\uff0c\u533a\u5206\u529f\u80fd\u6027\u63a8\u7406\u4e0e\u5fe0\u5b9e\u63a8\u7406\uff0c\u5e76\u63d0\u51fa\u5b66\u4e60\u578b\u8bc4\u5224\u5668Pinocchio\uff0c\u901a\u8fc7\u8bc4\u4f30\u89c2\u6d4b\u63a5\u5730\u6027\u548c\u9010\u6b65\u8fde\u8d2f\u6027\u4f5c\u4e3a\u5bc6\u96c6\u5956\u52b1\u4fe1\u53f7\uff0c\u5bf9\u5177\u8eab\u7b56\u7565\u8fdb\u884c\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04681", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u533a\u5206\u529f\u80fd\u6027\u63a8\u7406\uff08\u63d0\u5347\u4efb\u52a1\u6027\u80fd\uff09\u4e0e\u5fe0\u5b9e\u63a8\u7406\uff08\u771f\u5b9e\u53cd\u6620\u5185\u90e8\u51b3\u7b56\u8fc7\u7a0b\uff09\uff0c\u6307\u51fa\u73b0\u6709\u5bf9\u9f50\u7b56\u7565\u5b58\u5728\u56e0\u679c\u94fe\u63a9\u76d6\u95ee\u9898", "\u63d0\u51faPinocchio\u8bc4\u5224\u5668\uff0c\u91cf\u5316\u63a8\u7406\u7684\u89c2\u6d4b\u63a5\u5730\u6027\u4e0e\u6b65\u9aa4\u8fde\u8d2f\u6027\uff0c\u5e76\u4f5c\u4e3aRL\u540e\u8bad\u7ec3\u7684\u5bc6\u96c6\u5956\u52b1", "\u5728\u81ea\u52a8\u9a7e\u9a76\u57fa\u51c6\u4e0a\uff0c\u5fe0\u5b9e\u6027\u5206\u522b\u6bd4SoTA\u5bf9\u9f50\u57fa\u7ebf\u548c\u8f68\u8ff9\u8bef\u5dee\u57fa\u7ebf\u63d0\u53474%\u548c18%\uff1b\u5728\u5206\u5e03\u5916\u53cd\u4e8b\u5b9e\u573a\u666f\u4e2d\u7b56\u7565\u54cd\u5e94\u80fd\u529b\u63d0\u53471.6\u500d"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u601d\u7ef4\u94fe\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04681v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Do Vision-Language-Action Models Mean What They Say? On the Role of Faithfulness in Embodied Reasoning", "tldr": "\u63d0\u51faPinocchio\u8bc4\u5224\u5668\uff0c\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u5177\u8eab\u7b56\u7565\u751f\u6210\u5fe0\u5b9e\u7684\u601d\u7ef4\u94fe\u63a8\u7406", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76VLA\u6a21\u578b\u4e2d\u5177\u8eab\u601d\u7ef4\u94fe\u63a8\u7406\u7684\"\u5fe0\u5b9e\u6027\"\u95ee\u9898\uff0c\u533a\u5206\u529f\u80fd\u6027\u63a8\u7406\u4e0e\u5fe0\u5b9e\u63a8\u7406\uff0c\u5e76\u63d0\u51fa\u5b66\u4e60\u578b\u8bc4\u5224\u5668Pinocchio\uff0c\u901a\u8fc7\u8bc4\u4f30\u89c2\u6d4b\u63a5\u5730\u6027\u548c\u9010\u6b65\u8fde\u8d2f\u6027\u4f5c\u4e3a\u5bc6\u96c6\u5956\u52b1\u4fe1\u53f7\uff0c\u5bf9\u5177\u8eab\u7b56\u7565\u8fdb\u884c\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u5177\u8eab\u63a8\u7406\u7684\"\u5fe0\u5b9e\u6027\"\u53ef\u64cd\u4f5c\u5316\uff0c\u5e76\u901a\u8fc7RL\u540e\u8bad\u7ec3\u9a8c\u8bc1\u5fe0\u5b9e\u63a8\u7406\u80fd\u63d0\u5347\u7b56\u7565\u6cdb\u5316\u6027\u4e0e\u53ef\u89e3\u91ca\u6027\uff0c\u5bf9VLA\u6a21\u578b\u7684\u53ef\u4fe1\u90e8\u7f72\u5177\u6709\u91cd\u8981\u610f\u4e49"}, {"abstract": "Retrieval-Augmented Generation (RAG) streamlines long-document understanding by leveraging retrieval mechanisms to restrict input images to a highly curated subset. However, existing multimodal RAG pipelines primarily face two critical challenges: first, standard semantic similarity retrievers frequently fetch topically overlapping yet answer-void distractor pages that mislead downstream generation; second, rigid single-pass pipelines heavily depend on initial retrieval success, where any omission of core evidence inevitably causes cascading errors. To address these challenges, we introduce HIEVI-RAG, a hierarchical, evidence-driven multimodal RAG framework for closed-domain document understanding. HIEVI-RAG systematically factorizes complex queries into a cooperative four-stage pipeline: (1) hierarchical question decomposition to break multi-hop root queries into atomic child questions; (2) coarse visual page retrieval leveraging a multimodal retriever to fetch candidate pages based on semantic similarity; (3) fine-grained page verification via EVIAGENT, a specialized multi-page verifier trained with GRPO to execute cross-page reasoning over multi-image blocks; and (4) memory-guided iterative generation that leverages accumulated sub-question context to execute multi-round, dynamic reasoning over the prioritized sequence. Extensive evaluations across four benchmarks demonstrate the robust efficacy and synergy of our framework, which significantly outperforms existing open-source baselines and exceeds the strongest reported baseline by an average of 8.05% in accuracy.", "arxiv_id": "2607.04625", "arxiv_url": "https://arxiv.org/abs/2607.04625", "authors": ["Junyu Xiong", "Yonghui Wang", "Rongjian Gu", "Chenyu Liu", "Bing Yin", "Wengang Zhou", "Houqiang Li"], "brief": "\u63d0\u51faHIEVI-RAG\uff0c\u4e00\u4e2a\u9762\u5411\u95ed\u57df\u957f\u6587\u6863\u7406\u89e3\u7684\u5c42\u6b21\u5316\u8bc1\u636e\u9a71\u52a8\u591a\u6a21\u6001RAG\u6846\u67b6\uff0c\u901a\u8fc7\u56db\u9636\u6bb5\u6d41\u6c34\u7ebf\uff08\u95ee\u9898\u5206\u89e3\u2192\u7c97\u7c92\u5ea6\u68c0\u7d22\u2192\u7ec6\u7c92\u5ea6\u9a8c\u8bc1\u2192\u8bb0\u5fc6\u5f15\u5bfc\u751f\u6210\uff09\u89e3\u51b3\u73b0\u6709RAG\u7cfb\u7edf\u4e2d\u5e72\u6270\u9875\u8bef\u5bfc\u548c\u5355\u6b21\u68c0\u7d22\u5931\u8d25\u5bfc\u81f4\u7ea7\u8054\u9519\u8bef\u7684\u95ee\u9898\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04625", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5c06\u590d\u6742\u67e5\u8be2\u5206\u89e3\u4e3a\u539f\u5b50\u5b50\u95ee\u9898\uff0c\u91c7\u7528\u5c42\u6b21\u5316\u95ee\u9898\u5206\u89e3\u7b56\u7565\u5904\u7406\u591a\u8df3\u63a8\u7406", "\u5f15\u5165EVIAGENT\u2014\u2014\u57fa\u4e8eGRPO\u8bad\u7ec3\u7684\u4e13\u7528\u591a\u9875\u9a8c\u8bc1\u5668\uff0c\u6267\u884c\u8de8\u9875\u4ea4\u53c9\u63a8\u7406\u4ee5\u8fc7\u6ee4\u65e0\u7b54\u6848\u5e72\u6270\u9875", "\u5728\u56db\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u5e73\u5747\u8d85\u8d8a\u6700\u5f3a\u57fa\u7ebf8.05%\uff0c\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u5f00\u6e90\u65b9\u6848"], "keywords": ["\u591a\u6a21\u6001RAG", "\u957f\u6587\u6863\u7406\u89e3", "\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04625v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Hierarchical Evidence-Driven Reasoning for Long Document Understanding", "tldr": "\u63d0\u51faHIEVI-RAG\u6846\u67b6\uff0c\u901a\u8fc7\u5c42\u6b21\u5316\u8bc1\u636e\u9a71\u52a8\u63a8\u7406\u63d0\u5347\u957f\u6587\u6863\u591a\u6a21\u6001\u7406\u89e3\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faHIEVI-RAG\uff0c\u4e00\u4e2a\u9762\u5411\u95ed\u57df\u957f\u6587\u6863\u7406\u89e3\u7684\u5c42\u6b21\u5316\u8bc1\u636e\u9a71\u52a8\u591a\u6a21\u6001RAG\u6846\u67b6\uff0c\u901a\u8fc7\u56db\u9636\u6bb5\u6d41\u6c34\u7ebf\uff08\u95ee\u9898\u5206\u89e3\u2192\u7c97\u7c92\u5ea6\u68c0\u7d22\u2192\u7ec6\u7c92\u5ea6\u9a8c\u8bc1\u2192\u8bb0\u5fc6\u5f15\u5bfc\u751f\u6210\uff09\u89e3\u51b3\u73b0\u6709RAG\u7cfb\u7edf\u4e2d\u5e72\u6270\u9875\u8bef\u5bfc\u548c\u5355\u6b21\u68c0\u7d22\u5931\u8d25\u5bfc\u81f4\u7ea7\u8054\u9519\u8bef\u7684\u95ee\u9898\u3002", "why_notable": "\u9488\u5bf9\u591a\u6a21\u6001RAG\u4e24\u5927\u6838\u5fc3\u75db\u70b9\uff08\u5e72\u6270\u9875\u8bef\u5bfc\u3001\u5355\u6b21\u68c0\u7d22\u7ea7\u8054\u9519\u8bef\uff09\u63d0\u51fa\u7cfb\u7edf\u6027\u89e3\u51b3\u65b9\u6848\uff0c\u7ed3\u5408GRPO\u5f3a\u5316\u8bad\u7ec3\u7684\u9a8c\u8bc1\u5668\u4e0e\u8fed\u4ee3\u751f\u6210\u673a\u5236\uff0c\u5728\u957f\u6587\u6863\u7406\u89e3\u4efb\u52a1\u4e0a\u53d6\u5f97\u663e\u8457\u6027\u80fd\u63d0\u5347\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language models generate one token at a time, yet their responses show remarkably consistent length structure: step-by-step solutions converge in predictable token counts, retrievals stop after a few sentences, retractions extend responses by measurable amounts. We ask whether the model carries an internal estimate of how much response remains. Training minimal-capacity linear probes on frozen hidden states of three open-weight 7-8B models across seven completion-style datasets, we find three converging pieces of evidence. First, total response length is linearly decodable from the prompt\u0027s last hidden state alone, before any output is emitted. Second, probe directions trained on natural-language datasets transfer broadly, including to controlled synthetic completions never seen in training, outperforming a statistical baseline; the converse direction generally fails, and this asymmetry is itself informative. Third, on curated high-loss completions, the probe\u0027s per-position estimate shifts upward at the moment the model retracts and restarts a partial solution, a directional behavior no position-only predictor can reproduce (qualitative, not aggregate). We frame this as approximate estimation of remaining generation length, distinct from exact-counting impossibility results for transformers, and interpret it as evidence that LLMs maintain a plan-like internal representation of output length (decodable, not necessarily used causally).", "arxiv_id": "2607.05316", "arxiv_url": "https://arxiv.org/abs/2607.05316", "authors": ["Mohamed Amine Merzouk", "Dmitri Carpov", "Mirko Bronzi", "Damiano Fornasiere", "Adam Oberman"], "brief": "\u672c\u6587\u7814\u7a76\u5927\u8bed\u8a00\u6a21\u578b\u662f\u5426\u5728\u5185\u90e8\u7ef4\u62a4\u5bf9\u5269\u4f59\u8f93\u51fa\u957f\u5ea6\u7684\u4f30\u8ba1\uff0c\u901a\u8fc7\u5728\u4e09\u4e2a7-8B\u5f00\u6e90\u6a21\u578b\u7684\u51bb\u7ed3\u9690\u85cf\u72b6\u6001\u4e0a\u8bad\u7ec3\u7ebf\u6027\u63a2\u9488\uff0c\u53d1\u73b0LLM\u4ee5\u7ebf\u6027\u53ef\u89e3\u7801\u7684\u65b9\u5f0f\u7f16\u7801\u4e86\u7c7b\u4f3c\"\u751f\u6210\u8ba1\u5212\"\u7684\u957f\u5ea6\u8868\u793a\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05316", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4ec5\u51ed\u63d0\u793a\u8bcd\u6700\u540e\u4e00\u5c42\u9690\u85cf\u72b6\u6001\uff0c\u7ebf\u6027\u63a2\u9488\u5373\u53ef\u5728\u751f\u6210\u4efb\u4f55\u8f93\u51fa\u524d\u9884\u6d4b\u603b\u54cd\u5e94\u957f\u5ea6", "\u5728\u81ea\u7136\u8bed\u8a00\u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\u7684\u63a2\u9488\u65b9\u5411\u53ef\u8fc1\u79fb\u81f3\u4ece\u672a\u89c1\u8fc7\u7684\u5408\u6210\u8865\u5168\u4efb\u52a1\uff0c\u4e14\u8fc1\u79fb\u5177\u6709\u4e0d\u5bf9\u79f0\u6027\uff08\u81ea\u7136\u2192\u5408\u6210\u6210\u529f\uff0c\u53cd\u5411\u5931\u8d25\uff09", "\u5728\u9ad8\u635f\u5931\u6837\u672c\u4e2d\uff0c\u6a21\u578b\u64a4\u56de\u5e76\u91cd\u542f\u90e8\u5206\u89e3\u7b54\u65f6\uff0c\u63a2\u9488\u7684\u9010\u4f4d\u7f6e\u4f30\u8ba1\u4f1a\u5411\u4e0a\u8df3\u53d8\uff0c\u63ed\u793a\u5185\u90e8\u72b6\u6001\u7684\u52a8\u6001\u53d8\u5316"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027", "\u5185\u90e8\u8868\u793a", "\u957f\u5ea6\u9884\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05316v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "How Much is Left? LLMs Linearly Encode Their Remaining Output Length", "tldr": "LLM\u5185\u90e8\u7ebf\u6027\u7f16\u7801\u5269\u4f59\u8f93\u51fa\u957f\u5ea6\uff0c\u53ef\u4ece\u9690\u85cf\u72b6\u6001\u4e2d\u89e3\u7801\u751f\u6210\u8ba1\u5212", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u5927\u8bed\u8a00\u6a21\u578b\u662f\u5426\u5728\u5185\u90e8\u7ef4\u62a4\u5bf9\u5269\u4f59\u8f93\u51fa\u957f\u5ea6\u7684\u4f30\u8ba1\uff0c\u901a\u8fc7\u5728\u4e09\u4e2a7-8B\u5f00\u6e90\u6a21\u578b\u7684\u51bb\u7ed3\u9690\u85cf\u72b6\u6001\u4e0a\u8bad\u7ec3\u7ebf\u6027\u63a2\u9488\uff0c\u53d1\u73b0LLM\u4ee5\u7ebf\u6027\u53ef\u89e3\u7801\u7684\u65b9\u5f0f\u7f16\u7801\u4e86\u7c7b\u4f3c\"\u751f\u6210\u8ba1\u5212\"\u7684\u957f\u5ea6\u8868\u793a\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u8bc1\u660eLLM\u5185\u90e8\u5b58\u5728\u53ef\u7ebf\u6027\u89e3\u7801\u7684\u8f93\u51fa\u957f\u5ea6\u8868\u793a\uff0c\u4e3a\u7406\u89e3LLM\u89c4\u5212\u80fd\u529b\u4e0e\u5185\u90e8\u72b6\u6001\u63d0\u4f9b\u65b0\u89c6\u89d2\uff0c\u5bf9\u957f\u5ea6\u63a7\u5236\u3001\u63a8\u7406\u76d1\u63a7\u7b49\u5e94\u7528\u5177\u6709\u5b9e\u8df5\u610f\u4e49"}, {"abstract": "A coding agent solving a software-engineering task spends dozens of steps reasoning, editing code, and running tests, yet little is known about what the underlying language model internally represents about the program it is working on. We show that the residual streams of language models under coding agents linearly encode properties of the evolving program: a logistic-regression probe on hidden states is able to decode whether the current code parses, passes its test suite, reduces the number of failing tests, and introduces regressions, reaching AUC up to 0.83 for correctness across two models and two benchmarks. Our second finding is more surprising: these representations run ahead of the agent\u0027s own edits. Probes trained to predict the outcome of future edits (before they are materialized and written on disk) achieve performance above chance up to roughly 25 steps in advance. We call this the agent\u0027s latent programming horizon. As a proof of external validity, we show that the probes transfer across benchmarks without retraining. Our positive results open calls for more research in mechanistic interpretability of coding agents.", "arxiv_id": "2607.05188", "arxiv_url": "https://arxiv.org/abs/2607.05188", "authors": ["Andr\u00e9 Silva", "Han Tu", "Martin Monperrus"], "brief": "\u672c\u6587\u7814\u7a76\u7f16\u7a0b\u667a\u80fd\u4f53\u5728\u89e3\u51b3\u8f6f\u4ef6\u5de5\u7a0b\u4efb\u52a1\u65f6\uff0c\u5e95\u5c42\u8bed\u8a00\u6a21\u578b\u5185\u90e8\u5bf9\u7a0b\u5e8f\u72b6\u6001\u7684\u8868\u5f81\u3002\u53d1\u73b0\u6b8b\u5dee\u6d41\u7ebf\u6027\u7f16\u7801\u4e86\u4ee3\u7801\u7684\u89e3\u6790\u6027\u3001\u6d4b\u8bd5\u901a\u8fc7\u7387\u7b49\u5c5e\u6027\uff0c\u4e14\u8fd9\u4e9b\u8868\u5f81\u80fd\u63d0\u524d\u7ea625\u6b65\u9884\u6d4b\u672a\u6765\u7f16\u8f91\u7ed3\u679c\uff0c\u79f0\u4e4b\u4e3a\"\u6f5c\u5728\u7f16\u7a0b\u89c6\u91ce\"\u3002", "categories": ["cs.LG", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05188", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u903b\u8f91\u56de\u5f52\u63a2\u9488\u5728\u9690\u5c42\u72b6\u6001\u4e0a\u53ef\u89e3\u7801\u4ee3\u7801\u662f\u5426\u901a\u8fc7\u6d4b\u8bd5\uff0cAUC\u6700\u9ad8\u8fbe0.83", "\u6a21\u578b\u5185\u90e8\u8868\u5f81\u8d85\u524d\u4e8e\u5b9e\u9645\u7f16\u8f91\u884c\u4e3a\uff0c\u53ef\u63d0\u524d\u7ea625\u6b65\u9884\u6d4b\u7f16\u8f91\u7ed3\u679c\uff08\u6f5c\u5728\u7f16\u7a0b\u89c6\u91ce\uff09", "\u63a2\u9488\u65e0\u9700\u91cd\u8bad\u7ec3\u5373\u53ef\u8de8\u57fa\u51c6\u8fc1\u79fb\uff0c\u5177\u5907\u826f\u597d\u7684\u5916\u90e8\u6709\u6548\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u673a\u5236\u53ef\u89e3\u91ca\u6027", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05188v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Latent Programming Horizons in Coding Agents", "tldr": "\u7f16\u7a0b\u667a\u80fd\u4f53\u7684\u8bed\u8a00\u6a21\u578b\u9690\u5c42\u72b6\u6001\u53ef\u63d0\u524d25\u6b65\u9884\u6d4b\u4ee3\u7801\u7f16\u8f91\u7ed3\u679c", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u7f16\u7a0b\u667a\u80fd\u4f53\u5728\u89e3\u51b3\u8f6f\u4ef6\u5de5\u7a0b\u4efb\u52a1\u65f6\uff0c\u5e95\u5c42\u8bed\u8a00\u6a21\u578b\u5185\u90e8\u5bf9\u7a0b\u5e8f\u72b6\u6001\u7684\u8868\u5f81\u3002\u53d1\u73b0\u6b8b\u5dee\u6d41\u7ebf\u6027\u7f16\u7801\u4e86\u4ee3\u7801\u7684\u89e3\u6790\u6027\u3001\u6d4b\u8bd5\u901a\u8fc7\u7387\u7b49\u5c5e\u6027\uff0c\u4e14\u8fd9\u4e9b\u8868\u5f81\u80fd\u63d0\u524d\u7ea625\u6b65\u9884\u6d4b\u672a\u6765\u7f16\u8f91\u7ed3\u679c\uff0c\u79f0\u4e4b\u4e3a\"\u6f5c\u5728\u7f16\u7a0b\u89c6\u91ce\"\u3002", "why_notable": "\u9996\u6b21\u63ed\u793a\u7f16\u7a0b\u667a\u80fd\u4f53LLM\u5185\u90e8\u5b58\u5728\"\u524d\u77bb\u6027\"\u7a0b\u5e8f\u72b6\u6001\u8868\u5f81\uff0c\u4e3a\u7f16\u7a0b\u667a\u80fd\u4f53\u7684\u673a\u5236\u53ef\u89e3\u91ca\u6027\u7814\u7a76\u5f00\u8f9f\u65b0\u65b9\u5411\uff0c\u4e5f\u4e3a\u65e9\u671f\u5e72\u9884\u548c\u8c03\u8bd5\u667a\u80fd\u4f53\u884c\u4e3a\u63d0\u4f9b\u7406\u8bba\u57fa\u7840"}, {"abstract": "Key-value (KV) cache growth is a major bottleneck in autoregressive decoding, as memory and bandwidth scale linearly with context length. Existing KV eviction methods often rely on static heuristics or proxy scores, which poorly track future token utility and cause brittle eviction as relevance shifts. To address this, we introduce KVpop, which learns a fixed-budget KV eviction policy by directly supervising the keep-or-drop decision. The scorer is trained against a novel future-attention target, computed efficiently without materializing dense attention maps. We further introduce a delayed memory-based scorer that, uniquely among learned eviction methods, defers scoring for a fixed number of steps to exploit near-future context. On AIME and HMMT mathematical reasoning, KVpop retains 98% of full-attention performance on Qwen3-4B at 75% KV cache compression and 97% at 88% compression, consistently outperforming established eviction baselines. Qwen3-8B shows even stronger results, reaching near-full teacher performance. These results show that supervising eviction with future-attention signals cuts memory costs while maintaining quality.", "arxiv_id": "2607.05061", "arxiv_url": "https://arxiv.org/abs/2607.05061", "authors": ["Lukas Hauzenberger", "Niklas Schmidinger", "Anamaria-Roberta Hartl", "David Stap", "Thomas Schmied", "Sebastian B\u00f6ck", "G\u00fcnter Klambauer", "Sepp Hochreiter"], "brief": "\u63d0\u51faKVpop\u65b9\u6cd5\uff0c\u901a\u8fc7\u76f4\u63a5\u76d1\u7763\u4fdd\u7559/\u4e22\u5f03\u51b3\u7b56\u5e76\u5f15\u5165\u672a\u6765\u6ce8\u610f\u529b\u76ee\u6807\u4fe1\u53f7\uff0c\u5b66\u4e60\u56fa\u5b9a\u9884\u7b97\u7684KV\u7f13\u5b58\u6dd8\u6c70\u7b56\u7565\uff0c\u540c\u65f6\u8bbe\u8ba1\u5ef6\u8fdf\u8bc4\u5206\u673a\u5236\u5229\u7528\u8fd1\u672a\u6765\u4e0a\u4e0b\u6587\u4fe1\u606f\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05061", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u672a\u6765\u6ce8\u610f\u529b\u76ee\u6807\u4fe1\u53f7\u8bad\u7ec3\u6dd8\u6c70\u8bc4\u5206\u5668\uff0c\u65e0\u9700\u5b9e\u4f8b\u5316\u5b8c\u6574\u6ce8\u610f\u529b\u77e9\u9635\u5373\u53ef\u9ad8\u6548\u8ba1\u7b97", "\u5ef6\u8fdf\u8bb0\u5fc6\u8bc4\u5206\u5668\u5728\u56fa\u5b9a\u6b65\u6570\u540e\u518d\u8bc4\u5206\uff0c\u662f\u5b66\u4e60\u578b\u6dd8\u6c70\u65b9\u6cd5\u4e2d\u9996\u4e2a\u5229\u7528\u8fd1\u672a\u6765\u4e0a\u4e0b\u6587\u7684\u8bbe\u8ba1", "\u5728Qwen3-4B\u4e0a75%\u538b\u7f29\u7387\u4fdd\u755998%\u5168\u6ce8\u610f\u529b\u6027\u80fd\uff0c88%\u538b\u7f29\u7387\u4ecd\u4fdd\u755997%\uff0cQwen3-8B\u6548\u679c\u66f4\u4f18"], "keywords": ["KV\u7f13\u5b58\u538b\u7f29", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u52a0\u901f", "\u6ce8\u610f\u529b\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05061v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "KVpop -- Key-Value Cache Compression with Predictive Online Pruning", "tldr": "KVpop\u901a\u8fc7\u76d1\u7763\u5b66\u4e60\u672a\u6765\u6ce8\u610f\u529b\u4fe1\u53f7\uff0c\u5b9e\u73b0\u9ad8\u6548KV\u7f13\u5b58\u538b\u7f29\uff0c75%\u538b\u7f29\u7387\u4e0b\u4fdd\u755998%\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faKVpop\u65b9\u6cd5\uff0c\u901a\u8fc7\u76f4\u63a5\u76d1\u7763\u4fdd\u7559/\u4e22\u5f03\u51b3\u7b56\u5e76\u5f15\u5165\u672a\u6765\u6ce8\u610f\u529b\u76ee\u6807\u4fe1\u53f7\uff0c\u5b66\u4e60\u56fa\u5b9a\u9884\u7b97\u7684KV\u7f13\u5b58\u6dd8\u6c70\u7b56\u7565\uff0c\u540c\u65f6\u8bbe\u8ba1\u5ef6\u8fdf\u8bc4\u5206\u673a\u5236\u5229\u7528\u8fd1\u672a\u6765\u4e0a\u4e0b\u6587\u4fe1\u606f\u3002", "why_notable": "\u7a81\u7834\u73b0\u6709KV\u7f13\u5b58\u6dd8\u6c70\u4f9d\u8d56\u9759\u6001\u542f\u53d1\u5f0f\u89c4\u5219\u7684\u5c40\u9650\uff0c\u901a\u8fc7\u76d1\u7763\u5b66\u4e60\u76f4\u63a5\u4f18\u5316\u6dd8\u6c70\u51b3\u7b56\uff0c\u5728\u6570\u5b66\u63a8\u7406\u4efb\u52a1\u4e0a\u4ee5\u6781\u9ad8\u538b\u7f29\u7387\u7ef4\u6301\u63a5\u8fd1\u5168\u7cbe\u5ea6\u6027\u80fd\uff0c\u5bf9\u957f\u4e0a\u4e0b\u6587LLM\u63a8\u7406\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The training paradigm of large language models has shifted from traditional one-pass training to multi-epoch training, as reasonable reuse of limited high-quality data can improve both model performance and sample efficiency. Meanwhile, excessive repetition introduces the risk of overfitting and diminishing returns. Determining when and how to reuse data effectively thus emerges as a natural but under-explored question. Through a novel observation of model\u0027s \"Memorization Window\" signals derived from loss retention dynamics and downstream evaluation scores, we propose \"Memorization-guided Data Reuse\", a training paradigm that adaptively determines when and how data should be reused, enabling principled decisions on the number of training epochs and the scheduling of data replays. Our preliminary experiments reveal a consistent memorization-driven regime: performance continues to improve with repetition far beyond current practice (e.g., the commonly cited four-epoch limit). While a full scheduler remains future work, these insights provide a foundation for memorization-aware training schedules, helping to determine reuse budgets and move toward training LLMs smarter rather than longer with limited high-quality data.", "arxiv_id": "2607.04969", "arxiv_url": "https://arxiv.org/abs/2607.04969", "authors": ["Jingwei Zuo", "Cong Zeng", "Ilyas Chahed", "Maksim Velikanov", "Dhia Eddine Rhaiem", "Pasquale Balsebre", "Abhay Kumar", "Younes Belkada", "Hakim Hacid"], "brief": "\u63d0\u51fa\"\u8bb0\u5fc6\u5f15\u5bfc\u6570\u636e\u590d\u7528\"\u8bad\u7ec3\u8303\u5f0f\uff0c\u901a\u8fc7\u89c2\u5bdf\u6a21\u578b\u635f\u5931\u4fdd\u7559\u52a8\u6001\u548c\u4e0b\u6e38\u8bc4\u4f30\u5206\u6570\u4e2d\u7684\"\u8bb0\u5fc6\u7a97\u53e3\"\u4fe1\u53f7\uff0c\u81ea\u9002\u5e94\u51b3\u5b9a\u4f55\u65f6\u53ca\u5982\u4f55\u590d\u7528\u8bad\u7ec3\u6570\u636e\uff0c\u4ee5\u63d0\u5347\u6709\u9650\u9ad8\u8d28\u91cf\u6570\u636e\u4e0b\u7684LLM\u8bad\u7ec3\u6548\u7387\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04969", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\"\u8bb0\u5fc6\u7a97\u53e3\"\u73b0\u8c61\uff1a\u57fa\u4e8e\u635f\u5931\u4fdd\u7559\u52a8\u6001\u63a8\u5bfc\u51fa\u6a21\u578b\u8bb0\u5fc6\u72b6\u6001\u4fe1\u53f7\uff0c\u7528\u4e8e\u6307\u5bfc\u6570\u636e\u590d\u7528\u65f6\u673a", "\u5b9e\u9a8c\u8868\u660e\u6027\u80fd\u63d0\u5347\u53ef\u5ef6\u7eed\u5230\u8fdc\u8d85\u5f53\u524d\u60ef\u4f8b\u7684\u8bad\u7ec3\u8f6e\u6b21\uff08\u7a81\u7834\u5e38\u88ab\u5f15\u7528\u76844\u8f6e\u4e0a\u9650\uff09", "\u63d0\u51fa\u81ea\u9002\u5e94\u6570\u636e\u590d\u7528\u8c03\u5ea6\u6846\u67b6\uff0c\u53ef\u539f\u5219\u6027\u5730\u786e\u5b9a\u8bad\u7ec3\u8f6e\u6570\u548c\u6570\u636e\u56de\u653e\u7b56\u7565"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8bad\u7ec3\u6548\u7387", "\u6570\u636e\u590d\u7528", "\u8bb0\u5fc6\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04969v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Train Smarter, Not Longer: Memorization-Guided Data Reuse for Efficient LLM Training", "tldr": "\u901a\u8fc7\"\u8bb0\u5fc6\u7a97\u53e3\"\u4fe1\u53f7\u6307\u5bfcLLM\u591a\u8f6e\u8bad\u7ec3\u4e2d\u7684\u6570\u636e\u590d\u7528\u7b56\u7565\uff0c\u7a81\u7834\u4f20\u7edf4\u8f6e\u8bad\u7ec3\u9650\u5236", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u8bb0\u5fc6\u5f15\u5bfc\u6570\u636e\u590d\u7528\"\u8bad\u7ec3\u8303\u5f0f\uff0c\u901a\u8fc7\u89c2\u5bdf\u6a21\u578b\u635f\u5931\u4fdd\u7559\u52a8\u6001\u548c\u4e0b\u6e38\u8bc4\u4f30\u5206\u6570\u4e2d\u7684\"\u8bb0\u5fc6\u7a97\u53e3\"\u4fe1\u53f7\uff0c\u81ea\u9002\u5e94\u51b3\u5b9a\u4f55\u65f6\u53ca\u5982\u4f55\u590d\u7528\u8bad\u7ec3\u6570\u636e\uff0c\u4ee5\u63d0\u5347\u6709\u9650\u9ad8\u8d28\u91cf\u6570\u636e\u4e0b\u7684LLM\u8bad\u7ec3\u6548\u7387\u3002", "why_notable": "\u591a\u8f6e\u8bad\u7ec3\u662f\u5f53\u524dLLM\u8bad\u7ec3\u7684\u4e3b\u6d41\u8d8b\u52bf\uff0c\u4f46\u4f55\u65f6\u590d\u7528\u6570\u636e\u7f3a\u4e4f\u7406\u8bba\u4f9d\u636e\uff1b\u672c\u6587\u9996\u6b21\u4ece\u8bb0\u5fc6\u5316\u89c6\u89d2\u63d0\u4f9b\u53ef\u91cf\u5316\u7684\u590d\u7528\u51b3\u7b56\u4fe1\u53f7\uff0c\u5bf9\u63d0\u5347\u6570\u636e\u6548\u7387\u3001\u964d\u4f4e\u8bad\u7ec3\u6210\u672c\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Chart-to-code generation is commonly trained with supervised fine-tuning on reference plotting scripts, implicitly treating the gold code as a fully observable target. We argue that this assumption is often invalid: many chart programs contain latent raw variables that cannot be uniquely recovered from the rendered image. For example, a boxplot exposes summary statistics rather than original samples, a pie chart reveals proportions rather than arbitrary raw values, and a histogram shows bin-level mass rather than individual observations. Supervising models to reproduce such non-identifiable quantities encourages hallucination and over-specified code generation. We introduce Observation-Aligned supervision, a rewriting framework that replaces latent raw-data targets with quantities constrained by the visual observation: box statistics for boxplots, wedge percentages for pie charts, and bin weights for histograms. Applying this framework to chart-to-code training data from two sources, we obtain the Observation-Aligned supervision target data. Experiments across multiple VLMs on ChartMimic and ChartX demonstrate consistent improvements in observable value recovery, including under both-executable evaluation. Our results suggest that improving chart-to-code models requires not only more data or advanced learning objectives or algorithms, but also supervision targets that respect what is identifiable from the chart image.", "arxiv_id": "2607.04726", "arxiv_url": "https://arxiv.org/abs/2607.04726", "authors": ["Tianhao Niu", "Qingfu Zhu", "Wanxiang Che"], "brief": "\u63d0\u51faObservation-Aligned Supervision\u6846\u67b6\uff0c\u5c06\u56fe\u8868\u8f6c\u4ee3\u7801\u8bad\u7ec3\u4e2d\u65e0\u6cd5\u4ece\u56fe\u50cf\u552f\u4e00\u6062\u590d\u7684\u6f5c\u5728\u539f\u59cb\u53d8\u91cf\uff08\u5982\u7bb1\u7ebf\u56fe\u539f\u59cb\u6837\u672c\u3001\u997c\u56fe\u539f\u59cb\u6570\u503c\uff09\u66ff\u6362\u4e3a\u53ef\u4ece\u89c6\u89c9\u89c2\u6d4b\u76f4\u63a5\u7ea6\u675f\u7684\u91cf\uff08\u5982\u7edf\u8ba1\u6458\u8981\u3001\u767e\u5206\u6bd4\u3001\u9891\u6b21\u6743\u91cd\uff09\uff0c\u4ece\u6839\u672c\u4e0a\u6d88\u9664\u76d1\u7763\u4fe1\u53f7\u4e2d\u7684\u4e0d\u53ef\u8bc6\u522b\u76ee\u6807\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04726", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\u4f20\u7edfSFT\u8bad\u7ec3\u5c06\u91d1\u6807\u4ee3\u7801\u89c6\u4e3a\u5b8c\u5168\u53ef\u89c2\u6d4b\u76ee\u6807\uff0c\u4f46\u7bb1\u7ebf\u56fe\u3001\u997c\u56fe\u3001\u76f4\u65b9\u56fe\u7b49\u56fe\u8868\u7c7b\u578b\u5b58\u5728\u5927\u91cf\u65e0\u6cd5\u4ece\u6e32\u67d3\u56fe\u50cf\u552f\u4e00\u6062\u590d\u7684\u6f5c\u5728\u53d8\u91cf", "\u6784\u5efa\u91cd\u5199\u6846\u67b6\uff1a\u7bb1\u7ebf\u56fe\u7528\u4e94\u6570\u6458\u8981\u66ff\u6362\u539f\u59cb\u6837\u672c\uff0c\u997c\u56fe\u7528\u6954\u5f62\u767e\u5206\u6bd4\u66ff\u6362\u539f\u59cb\u6570\u503c\uff0c\u76f4\u65b9\u56fe\u7528bin\u6743\u91cd\u66ff\u6362\u4e2a\u4f53\u89c2\u6d4b", "\u5728ChartMimic\u548cChartX\u57fa\u51c6\u4e0a\u8de8\u591a\u4e2aVLM\u9a8c\u8bc1\uff0c\u53ef\u89c2\u6d4b\u503c\u6062\u590d\u6307\u6807\u6301\u7eed\u63d0\u5347\uff0c\u4e14\u5728\u53ef\u6267\u884c\u6027\u8bc4\u4f30\u4e0b\u540c\u6837\u6709\u6548"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u591a\u6a21\u6001", "\u6570\u636e\u6784\u5efa", "\u5e7b\u89c9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04726v1", "published_at": "2026-07-06", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "What You See Is What You Get: Observation-Aligned Supervision for Chart-to-Code Generation", "tldr": "\u63d0\u51fa\u89c2\u6d4b\u5bf9\u9f50\u76d1\u7763\u6846\u67b6\uff0c\u89e3\u51b3\u56fe\u8868\u8f6c\u4ee3\u7801\u8bad\u7ec3\u4e2d\u6f5c\u53d8\u91cf\u5bfc\u81f4\u7684\u5e7b\u89c9\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faObservation-Aligned Supervision\u6846\u67b6\uff0c\u5c06\u56fe\u8868\u8f6c\u4ee3\u7801\u8bad\u7ec3\u4e2d\u65e0\u6cd5\u4ece\u56fe\u50cf\u5
