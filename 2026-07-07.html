b\u7edf\u6027\u504f\u5dee\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Interactive 3D segmentation aims to extract object masks in point clouds with minimal user clicks. Despite recent progress, most existing approaches still struggle with (i) coarse voxel resolution that blurs fine boundaries under limited clicks and (ii) hard false positives caused by confusing background structures. These issues are exacerbated by density and scale shifts across datasets (e.g., dense RGB-D reconstructions vs. sparse LiDAR scans), where fixed refinement heuristics and purely click-driven decoding generalize poorly. To address them, we propose NegROI -- a novel transformer-based interactive framework that couples click-centric multi-resolution refinement with scene-conditioned negative prompts. Given a coarse voxel prediction, it refines only a local Region Of Interest (ROI) around the current click on a finer grid and fuses refined logits back to the coarse mask. To improve robustness and efficiency, we introduce uncertainty-driven selective refinement that prioritizes ambiguous regions. Meanwhile, we model hard background patterns via a set of scene-conditioned negative prompts obtained by cross-attention over scene tokens. We further stabilize these prompts with a diversity regularizer. Finally, we propose boundary-aware hard negative mining to supervise negative-prompt attention toward boundary-proximal, high-confidence false positives. Our experiments on common benchmark datasets (i.e., ScanNet, S3DIS, and KITTI) demonstrate improved click efficiency and reduced false positives, with stronger cross-dataset robustness than the state-of-the-art baselines.", "arxiv_id": "2607.05955", "arxiv_url": "https://arxiv.org/abs/2607.05955", "authors": ["Shuheng Zhang", "Feng Wu"], "brief": "\u63d0\u51faNegROI\u6846\u67b6\uff0c\u7528\u4e8e\u4ea4\u4e92\u5f0f3D\u70b9\u4e91\u5206\u5272\uff0c\u901a\u8fc7\u4ee5\u70b9\u51fb\u4e3a\u4e2d\u5fc3\u7684\u591a\u5206\u8fa8\u7387\u5c40\u90e8ROI\u7ec6\u5316\u548c\u573a\u666f\u6761\u4ef6\u8d1f\u63d0\u793a\uff0c\u89e3\u51b3\u7c97\u4f53\u7d20\u8fb9\u754c\u6a21\u7cca\u548c\u80cc\u666f\u8bef\u68c0\u95ee\u9898\u3002\u5728ScanNet\u3001S3DIS\u548cKITTI\u4e0a\u9a8c\u8bc1\uff0c\u663e\u8457\u63d0\u5347\u70b9\u51fb\u6548\u7387\u548c\u8de8\u6570\u636e\u96c6\u9c81\u68d2\u6027\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05955", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u5206\u5272", "\u4ea4\u4e92\u5f0f\u5206\u5272", "\u70b9\u4e91", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05955v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "NegROI: Click-Centric Uncertainty-Guided Refinement with Scene-Conditioned Negative Prompts for Robust Interactive 3D Segmentation", "tldr": "\u63d0\u51faNegROI\u6846\u67b6\uff0c\u7528\u4e8e\u4ea4\u4e92\u5f0f3D\u70b9\u4e91\u5206\u5272\uff0c\u901a\u8fc7\u4ee5\u70b9\u51fb\u4e3a\u4e2d\u5fc3\u7684\u591a\u5206\u8fa8\u7387\u5c40\u90e8ROI\u7ec6\u5316\u548c\u573a\u666f\u6761\u4ef6\u8d1f\u63d0\u793a\uff0c\u89e3\u51b3\u7c97\u4f53\u7d20\u8fb9\u754c\u6a21\u7cca\u548c\u80cc\u666f\u8bef\u68c0\u95ee\u9898\u3002\u5728ScanNet\u3001S3DIS\u548cKITTI\u4e0a\u9a8c\u8bc1\uff0c\u663e\u8457\u63d0\u5347\u70b9\u51fb\u6548\u7387\u548c\u8de8\u6570\u636e\u96c6\u9c81\u68d2\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Compositional Zero-Shot Learning (CZSL) aims to combine known attributes and objects as primitives for recognizing previously unseen attribute-object pairs. Prior works either predict attributes and objects independently, missing their strong contextual dependency, or use unidirectional conditional modeling (e.g., object-guided attribute prediction), which is prone to error propagation. We propose PRPC, a Progressive Reasoning framework with Primitive Correction, which explicitly models the bidirectional dependency between attributes and objects via step-wise inference. PRPC performs mutual correction of primitives to suppress prediction errors in earlier steps. Specifically, we formulate CZSL as structured, Q\u0026A-style Chain-of-Thought reasoning process and constrain the MLLM to follow predefined semantic steps to generate intermediate decisions. To further enhance the reliability and logical consistency of intermediate reasoning, we introduce reinforcement learning post-training with a GRPO-based objective, providing step-level rewards aligned with the progressive inference procedure. Extensive experiments on three CZSL benchmarks demonstrate that PRPC achieves state-of-the-art performance, validating the effectiveness of progressive reasoning and bidirectional correction for robust compositional generalization.", "arxiv_id": "2607.05911", "arxiv_url": "https://arxiv.org/abs/2607.05911", "authors": ["Ziyi Chen", "Haoyan Shi", "Sunhan Xu", "Congyan Lang"], "brief": "\u63d0\u51faPRPC\u6846\u67b6\uff0c\u5c06\u7ec4\u5408\u96f6\u6837\u672c\u5b66\u4e60\u5efa\u6a21\u4e3a\u94fe\u5f0f\u601d\u7ef4\u63a8\u7406\u8fc7\u7a0b\uff0c\u901a\u8fc7\u53cc\u5411\u4f9d\u8d56\u5efa\u6a21\u548c\u9010\u6b65\u4e92\u6821\u6b63\u6765\u6291\u5236\u5c5e\u6027-\u5bf9\u8c61\u9884\u6d4b\u4e2d\u7684\u8bef\u5dee\u4f20\u64ad\u3002\u7ed3\u5408GRPO\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u63d0\u4f9b\u6b65\u9aa4\u7ea7\u5956\u52b1\uff0c\u5728\u4e09\u4e2aCZSL\u57fa\u51c6\u4e0a\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05911", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7ec4\u5408\u96f6\u6837\u672c\u5b66\u4e60", "\u94fe\u5f0f\u601d\u7ef4\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001\u5927\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05911v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Progressive Reasoning with Primitive Correction for Compositional Zero-Shot Learning", "tldr": "\u63d0\u51faPRPC\u6846\u67b6\uff0c\u5c06\u7ec4\u5408\u96f6\u6837\u672c\u5b66\u4e60\u5efa\u6a21\u4e3a\u94fe\u5f0f\u601d\u7ef4\u63a8\u7406\u8fc7\u7a0b\uff0c\u901a\u8fc7\u53cc\u5411\u4f9d\u8d56\u5efa\u6a21\u548c\u9010\u6b65\u4e92\u6821\u6b63\u6765\u6291\u5236\u5c5e\u6027-\u5bf9\u8c61\u9884\u6d4b\u4e2d\u7684\u8bef\u5dee\u4f20\u64ad\u3002\u7ed3\u5408GRPO\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u63d0\u4f9b\u6b65\u9aa4\u7ea7\u5956\u52b1\uff0c\u5728\u4e09\u4e2aCZSL\u57fa\u51c6\u4e0a\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Image guardrails are typically trained and evaluated under a fixed safety policy, implicitly treating safety as an intrinsic property of an image. Real deployments are different: the same image may be allowed in one product, restricted in another, and newly disallowed when a policy boundary changes. We study policy-adaptive image guardrailing, where a model must decide whether an image violates the currently supplied policy and generalize to held-out policy definitions. We introduce PolicyShiftBench, a comprehensive benchmark with 2,000 policy-discriminative instances over 265 images, where each image is paired with 7.55 policy-conditioned prompts on average to test whether models adapt to the active policy rather than relying on image-level safety priors. We then propose PolicyShiftGuard, a compact policy-conditioned guardrail trained with a two-stage training recipe that combines Randomized Policy SFT (RP-SFT) with Boundary-Pair Policy Adaptation (BP-Adapt). BP-Adapt trains matched prompts for the same image and risk category using standard label supervision and a pairwise comparison loss that separates blocking policies from passing policies. Experiments show that existing VLMs and specialized guardrails remain brittle under policy shifts, while PolicyShiftGuard substantially improves policy-sensitive performance. The 7B model achieves SOTA performance of 76.9 Avg. F1 and 72.1 Avg. PSS on PolicyShiftBench, transfers well to UnSafeBench and SafeEditBench, and improves the latency-performance trade-off with a concise output format. Ablations confirm that matched pass/block boundary pairs are essential for stable policy adaptation.", "arxiv_id": "2607.05910", "arxiv_url": "https://arxiv.org/abs/2607.05910", "authors": ["Mingyang Song", "Luxin Xu", "Haoyu Sun", "Minzhou Pan", "Yu Cheng", "Bo Li"], "brief": "\u73b0\u6709\u56fe\u50cf\u5b89\u5168\u62a4\u680f\u5728\u56fa\u5b9a\u7b56\u7565\u4e0b\u8bad\u7ec3\uff0c\u65e0\u6cd5\u9002\u5e94\u4e0d\u540c\u4ea7\u54c1\u573a\u666f\u4e2d\u7b56\u7565\u53d8\u5316\u7684\u9700\u6c42\u3002\u672c\u6587\u63d0\u51faPolicyShiftBench\u57fa\u51c6\uff08265\u5f20\u56fe\u50cf\u30012000\u4e2a\u7b56\u7565\u5224\u522b\u5b9e\u4f8b\uff09\u548cPolicyShiftGuard\u6a21\u578b\uff0c\u901a\u8fc7\u968f\u673a\u7b56\u7565SFT\u4e0e\u8fb9\u754c\u5bf9\u6bd4\u9002\u5e94\u8bad\u7ec3\uff0c\u4f7f7B\u6a21\u578b\u5728\u7b56\u7565\u81ea\u9002\u5e94\u573a\u666f\u4e0b\u8fbe\u523076.9 F1\u7684SOTA\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05910", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u50cf\u5b89\u5168\u62a4\u680f", "\u591a\u6a21\u6001", "\u7b56\u7565\u81ea\u9002\u5e94", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05910v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PolicyShiftGuard: Benchmarking and Improving Policy-Adaptive Image Guardrails", "tldr": "\u73b0\u6709\u56fe\u50cf\u5b89\u5168\u62a4\u680f\u5728\u56fa\u5b9a\u7b56\u7565\u4e0b\u8bad\u7ec3\uff0c\u65e0\u6cd5\u9002\u5e94\u4e0d\u540c\u4ea7\u54c1\u573a\u666f\u4e2d\u7b56\u7565\u53d8\u5316\u7684\u9700\u6c42\u3002\u672c\u6587\u63d0\u51faPolicyShiftBench\u57fa\u51c6\uff08265\u5f20\u56fe\u50cf\u30012000\u4e2a\u7b56\u7565\u5224\u522b\u5b9e\u4f8b\uff09\u548cPolicyShiftGuard\u6a21\u578b\uff0c\u901a\u8fc7\u968f\u673a\u7b56\u7565SFT\u4e0e\u8fb9\u754c\u5bf9\u6bd4\u9002\u5e94\u8bad\u7ec3\uff0c\u4f7f7B\u6a21\u578b\u5728\u7b56\u7565\u81ea\u9002\u5e94\u573a\u666f\u4e0b\u8fbe\u523076.9 F1\u7684SOTA\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "3D Gaussian Splatting provides an explicit representation that jointly models geometry and appearance, serving as a scalable foundation for 3D representation learning. Existing pre-training methods for Gaussian representations, such as masked Gaussian reconstruction, primarily capture local structures but offer limited semantic supervision. In this paper, we propose GaussFusion, a multimodal pre-training framework for 3D Gaussian representations. GaussFusion integrates image and text supervision into masked Gaussian modeling through cross-modal semantic alignment, enabling the Gaussian encoder to learn both visual and language-level semantic information during pre-training. To better adapt masked modeling to the non-uniform distribution of Gaussian primitives, we further propose Gaussian Salience-guided Multi-scale Hole Masking (GSHM). GSHM constructs spatially continuous masked regions based on Gaussian salience. By applying hole masks at multiple scales, GSHM encourages the encoder to capture both fine-grained local patterns and broader structural dependencies. Extensive experiments on downstream tasks demonstrate that GaussFusion improves the transferability of Gaussian representations. Notably, GaussFusion outperforms Gaussian-MAE on ModelNet40 and ScanObjectNN (PB-T50-RS) by 0.61\\% and 3.85\\%, respectively.", "arxiv_id": "2607.05906", "arxiv_url": "https://arxiv.org/abs/2607.05906", "authors": ["Zhixuan You", "Jihua Zhu", "Yiding Sun", "Zihao Guo", "Haozhe Cheng", "Dongxu Zhang", "Lin Chen", "Hainan Luo"], "brief": "\u63d0\u51faGaussFusion\u591a\u6a21\u6001\u9884\u8bad\u7ec3\u6846\u67b6\uff0c\u5c06\u56fe\u50cf\u548c\u6587\u672c\u76d1\u7763\u878d\u51653D\u9ad8\u65af\u906e\u853d\u5efa\u6a21\uff0c\u901a\u8fc7\u8de8\u6a21\u6001\u8bed\u4e49\u5bf9\u9f50\u4f7f\u9ad8\u65af\u7f16\u7801\u5668\u540c\u65f6\u5b66\u4e60\u89c6\u89c9\u548c\u8bed\u8a00\u7ea7\u8bed\u4e49\u4fe1\u606f\u3002\u8fd8\u8bbe\u8ba1\u4e86\u57fa\u4e8e\u9ad8\u65af\u663e\u8457\u6027\u7684\u591a\u5c3a\u5ea6\u5b54\u6d1e\u906e\u853d\u7b56\u7565\uff08GSHM\uff09\uff0c\u5728ModelNet40\u548cScanObjectNN\u4e0a\u5206\u522b\u8d85\u8d8aGaussian-MAE 0.61%\u548c3.85%\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05906", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u9ad8\u65af\u6cfc\u6e85", "\u591a\u6a21\u6001\u9884\u8bad\u7ec3", "\u906e\u853d\u5efa\u6a21", "3D\u8868\u793a\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05906v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GaussFusion: Towards Multimodal 3D Gaussian Pretraining", "tldr": "\u63d0\u51faGaussFusion\u591a\u6a21\u6001\u9884\u8bad\u7ec3\u6846\u67b6\uff0c\u5c06\u56fe\u50cf\u548c\u6587\u672c\u76d1\u7763\u878d\u51653D\u9ad8\u65af\u906e\u853d\u5efa\u6a21\uff0c\u901a\u8fc7\u8de8\u6a21\u6001\u8bed\u4e49\u5bf9\u9f50\u4f7f\u9ad8\u65af\u7f16\u7801\u5668\u540c\u65f6\u5b66\u4e60\u89c6\u89c9\u548c\u8bed\u8a00\u7ea7\u8bed\u4e49\u4fe1\u606f\u3002\u8fd8\u8bbe\u8ba1\u4e86\u57fa\u4e8e\u9ad8\u65af\u663e\u8457\u6027\u7684\u591a\u5c3a\u5ea6\u5b54\u6d1e\u906e\u853d\u7b56\u7565\uff08GSHM\uff09\uff0c\u5728ModelNet40\u548cScanObjectNN\u4e0a\u5206\u522b\u8d85\u8d8aGaussian-MAE 0.61%\u548c3.85%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Coreset selection aims to identify a small and highly representative subset of a massive dataset for efficient model training. The problem remains challenging even in the few-shot knowledge distillation (KD) setup, where a full-scale pre-trained teacher informs the student network. Typical sample selection strategies often struggle to surpass the random selection baseline. In this paper, we showcase few-medoids, an embarrassingly simple coreset selection strategy that chooses the samples closest to the centroid (average image) of each class. We present extensive KD experiments on four datasets, covering a wide range of image classification problems, and three teacher-student model pairs, comprising both convolutional and transformer networks. Although the proposed method is embarrassingly simple, our empirical results indicate that few-medoids is able to consistently surpass the random selection baseline, as well as the other coreset selection strategies. We therefore consider that few-medoids can be used as a drop-in replacement for commonly-used baselines (e.g. herding or k-center Greedy), in future research on coreset selection. To reproduce the reported results, we publicly release our code at https://github.com/CemilAndreiDilmac/Few-Shot-KD-Coreset.", "arxiv_id": "2607.05891", "arxiv_url": "https://arxiv.org/abs/2607.05891", "authors": ["Cemil-Andrei Dilmac", "Florinel-Alin Croitoru", "Radu Tudor Ionescu"], "brief": "\u63d0\u51faFew-Medoids\u65b9\u6cd5\uff0c\u901a\u8fc7\u9009\u53d6\u6bcf\u7c7b\u6700\u63a5\u8fd1\u7c7b\u4e2d\u5fc3\u7684\u6837\u672c\u6784\u5efa\u6838\u5fc3\u96c6\uff0c\u7528\u4e8e\u5c11\u6837\u672c\u77e5\u8bc6\u84b8\u998f\u3002\u5728\u56db\u4e2a\u6570\u636e\u96c6\u548c\u591a\u79cd\u5e08\u751f\u6a21\u578b\u5bf9\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u7b80\u5355\u5374\u80fd\u6301\u7eed\u8d85\u8d8a\u968f\u673a\u9009\u62e9\u53ca\u5176\u4ed6\u6838\u5fc3\u96c6\u9009\u62e9\u7b56\u7565\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05891", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u77e5\u8bc6\u84b8\u998f", "\u6838\u5fc3\u96c6\u9009\u62e9", "\u5c11\u6837\u672c\u5b66\u4e60", "\u56fe\u50cf\u5206\u7c7b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05891v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Few-Medoids: An Embarrassingly Simple Coreset Selection Method for Few-Shot Knowledge Distillation", "tldr": "\u63d0\u51faFew-Medoids\u65b9\u6cd5\uff0c\u901a\u8fc7\u9009\u53d6\u6bcf\u7c7b\u6700\u63a5\u8fd1\u7c7b\u4e2d\u5fc3\u7684\u6837\u672c\u6784\u5efa\u6838\u5fc3\u96c6\uff0c\u7528\u4e8e\u5c11\u6837\u672c\u77e5\u8bc6\u84b8\u998f\u3002\u5728\u56db\u4e2a\u6570\u636e\u96c6\u548c\u591a\u79cd\u5e08\u751f\u6a21\u578b\u5bf9\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u7b80\u5355\u5374\u80fd\u6301\u7eed\u8d85\u8d8a\u968f\u673a\u9009\u62e9\u53ca\u5176\u4ed6\u6838\u5fc3\u96c6\u9009\u62e9\u7b56\u7565\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Robust robotic grasping of novel objects requires datasets that simultaneously provide photorealistic RGB-D observations, physically validated grasp quality annotations, and a principled bridge between simulation and the real world, which existing datasets lack to provide jointly. \\textbf{GraspIT} addresses this gap: tabletop scenes in NVIDIA Isaac Sim are annotated via a four-stage physical slip-test on parallel Franka Panda instances, producing trajectory-reachability checks and continuous quality scores beyond force-closure.Of ${\\sim}$2.3M candidates, 83% pass as \\emph{good} ($s{\\geq}0.50$); the 17% that passed force-closure but failed the slip-test provide graded hard negatives. A Real$\\leftrightarrow$Sim loop back-projects these labels onto 100 real-world scenes. The release provides ${\\sim}$316k annotated RGBD frame sets across 1035 sim and 100 real scenes, with instance masks, 6-DoF poses, physical object properties, and scored 6-DoF grasps. All tools are open-source and Docker-containerized. The trajectory planning within Isaac Sim further allows streaming of high resolution demonstrations for tabletop manipulation policy learning and behavior cloning.", "arxiv_id": "2607.05869", "arxiv_url": "https://arxiv.org/abs/2607.05869", "authors": ["Paul Koch. Adem Karakurt", "Andr\u00e9 Sers"], "brief": "GraspIT\u662f\u4e00\u4e2a\u673a\u5668\u4eba\u6293\u53d6\u6570\u636e\u96c6\uff0c\u901a\u8fc7NVIDIA Isaac Sim\u4e2d\u7684\u56db\u9636\u6bb5\u7269\u7406\u6ed1\u52a8\u6d4b\u8bd5\u5bf9\u7ea6230\u4e07\u4e2a\u6293\u53d6\u5019\u9009\u8fdb\u884c\u8d28\u91cf\u6807\u6ce8\uff0c\u5e76\u6784\u5efa\u4e86\u4eff\u771f\u4e0e\u771f\u5b9e\u4e16\u754c\u7684\u53cc\u5411\u6620\u5c04\u5faa\u73af\u3002\u6570\u636e\u96c6\u5305\u542b\u7ea631.6\u4e07\u5e27\u6807\u6ce8RGBD\u6570\u636e\uff0c\u8986\u76d61035\u4e2a\u4eff\u771f\u573a\u666f\u548c100\u4e2a\u771f\u5b9e\u573a\u666f\uff0c\u63d0\u4f9b6\u81ea\u7531\u5ea6\u6293\u53d6\u59ff\u6001\u53ca\u8fde\u7eed\u8d28\u91cf\u8bc4\u5206\uff0c\u6709\u6548\u5f25\u5408\u4e86\u4eff\u771f\u5230\u771f\u5b9e\u7684\u8fc1\u79fb\u9e3f\u6c9f\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05869", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u673a\u5668\u4eba\u6293\u53d6", "\u4eff\u771f\u5230\u771f\u5b9e\u8fc1\u79fb", "\u6570\u636e\u96c6", "6\u81ea\u7531\u5ea6\u59ff\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05869v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GraspIT: A Dataset Bridging the Sim-to-Real gap and back for Validated Grasping SE(3) Pose Generation", "tldr": "GraspIT\u662f\u4e00\u4e2a\u673a\u5668\u4eba\u6293\u53d6\u6570\u636e\u96c6\uff0c\u901a\u8fc7NVIDIA Isaac Sim\u4e2d\u7684\u56db\u9636\u6bb5\u7269\u7406\u6ed1\u52a8\u6d4b\u8bd5\u5bf9\u7ea6230\u4e07\u4e2a\u6293\u53d6\u5019\u9009\u8fdb\u884c\u8d28\u91cf\u6807\u6ce8\uff0c\u5e76\u6784\u5efa\u4e86\u4eff\u771f\u4e0e\u771f\u5b9e\u4e16\u754c\u7684\u53cc\u5411\u6620\u5c04\u5faa\u73af\u3002\u6570\u636e\u96c6\u5305\u542b\u7ea631.6\u4e07\u5e27\u6807\u6ce8RGBD\u6570\u636e\uff0c\u8986\u76d61035\u4e2a\u4eff\u771f\u573a\u666f\u548c100\u4e2a\u771f\u5b9e\u573a\u666f\uff0c\u63d0\u4f9b6\u81ea\u7531\u5ea6\u6293\u53d6\u59ff\u6001\u53ca\u8fde\u7eed\u8d28\u91cf\u8bc4\u5206\uff0c\u6709\u6548\u5f25\u5408\u4e86\u4eff\u771f\u5230\u771f\u5b9e\u7684\u8fc1\u79fb\u9e3f\u6c9f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-Language Models (VLMs) are promising for construction-site monitoring, and recent construction-tailored VLMs have primarily adapted pretrained VLMs through direct QA-style fine-tuning from a single global image. We argue that this direct paradigm remains limited for in-the-wild deployment in terms of operational range, reliability under reduced-resolution inputs, and inference efficiency. To address these challenges, we propose AVA-VLM, an Adaptive Visual Attention-Vision Language Model that follows a human-inspired coarse-to-fine reasoning strategy. AVA-VLM first reasons over a low-resolution global image and selectively requests a high-resolution local crop only when detailed inspection is needed, similar to how a human inspector zooms in on hard-to-see yet important areas. We further introduce a region-aware Chain-of-Thought dataset that teaches the model when to inspect, where to crop, and how to use local evidence. Experiments show that AVA-VLM improves reliability under long-distance and reduced-resolution conditions while substantially reducing visual-token usage.", "arxiv_id": "2607.05859", "arxiv_url": "https://arxiv.org/abs/2607.05859", "authors": ["Younggun Kim", "Taeheon Kim", "Youngseo Kim", "Seunghee Park"], "brief": "\u63d0\u51faAVA-VLM\uff0c\u4e00\u79cd\u7528\u4e8e\u5efa\u7b51\u5de5\u5730\u76d1\u63a7\u7684\u81ea\u9002\u5e94\u89c6\u89c9\u6ce8\u610f\u529b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff0c\u6a21\u4eff\u4eba\u7c7b\u68c0\u67e5\u5458\"\u7531\u7c97\u5230\u7ec6\"\u7684\u63a8\u7406\u7b56\u7565\uff1a\u5148\u5206\u6790\u4f4e\u5206\u8fa8\u7387\u5168\u5c40\u56fe\u50cf\uff0c\u4ec5\u5728\u9700\u8981\u65f6\u624d\u8bf7\u6c42\u9ad8\u5206\u8fa8\u7387\u5c40\u90e8\u88c1\u526a\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728\u8fdc\u8ddd\u79bb\u548c\u4f4e\u5206\u8fa8\u7387\u6761\u4ef6\u4e0b\u63d0\u5347\u4e86\u53ef\u9760\u6027\uff0c\u540c\u65f6\u663e\u8457\u964d\u4f4e\u4e86\u89c6\u89c9token\u7684\u4f7f\u7528\u91cf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05859", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5de5\u5730\u76d1\u63a7", "\u601d\u7ef4\u94fe"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05859v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AVA-VLM: Adaptive Visual Attention-Vision Language Model for In-the-Wild Construction Site Monitoring", "tldr": "\u63d0\u51faAVA-VLM\uff0c\u4e00\u79cd\u7528\u4e8e\u5efa\u7b51\u5de5\u5730\u76d1\u63a7\u7684\u81ea\u9002\u5e94\u89c6\u89c9\u6ce8\u610f\u529b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff0c\u6a21\u4eff\u4eba\u7c7b\u68c0\u67e5\u5458\"\u7531\u7c97\u5230\u7ec6\"\u7684\u63a8\u7406\u7b56\u7565\uff1a\u5148\u5206\u6790\u4f4e\u5206\u8fa8\u7387\u5168\u5c40\u56fe\u50cf\uff0c\u4ec5\u5728\u9700\u8981\u65f6\u624d\u8bf7\u6c42\u9ad8\u5206\u8fa8\u7387\u5c40\u90e8\u88c1\u526a\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728\u8fdc\u8ddd\u79bb\u548c\u4f4e\u5206\u8fa8\u7387\u6761\u4ef6\u4e0b\u63d0\u5347\u4e86\u53ef\u9760\u6027\uff0c\u540c\u65f6\u663e\u8457\u964d\u4f4e\u4e86\u89c6\u89c9token\u7684\u4f7f\u7528\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Deep neural networks trained with Empirical Risk Minimization (ERM) often fail under distribution shifts because they exploit spurious correlations between object labels and background context. Recent generative approaches address this issue by creating counterfactual images with altered contexts, but typically use these samples as standard data augmentation, leaving the model free to retain background-sensitive representations. We propose a two-stage framework that uses generative intervention to explicitly learn background-invariant visual representations. First, we isolate the foreground object using zero-shot segmentation and generate context-shifted variants with a structure-preserving diffusion model, preserving object identity while varying the surrounding environment. We then introduce Cross-Variant Self-Supervised Learning, where variants of the same object under different backgrounds form positive pairs in a contrastive objective. This encourages the encoder to align object-centric representations while suppressing background-specific cues. Then, we fine-tune the pretrained encoder using an ERM warm-up followed by GroupDRO with layer-wise learning rates. Experiments on distribution-shift benchmarks demonstrate best worst-group performance, achieving 92.5% on Waterbirds, 81.7% on MetaShift, and 87.4% on NICO++. Code: https://github.com/surajyadav-research/GRSSL", "arxiv_id": "2607.05850", "arxiv_url": "https://arxiv.org/abs/2607.05850", "authors": ["Suraj Yadav", "Anjaneya Sharma", "Siddharth Yadav"], "brief": "\u63d0\u51fa\u4e24\u9636\u6bb5\u6846\u67b6\u6253\u7834\u6df1\u5ea6\u795e\u7ecf\u7f51\u7edc\u5bf9\u80cc\u666f\u7684\u865a\u5047\u76f8\u5173\u6027\uff1a\u5148\u7528\u96f6\u6837\u672c\u5206\u5272+\u6269\u6563\u6a21\u578b\u751f\u6210\u80cc\u666f\u53d8\u6362\u7684\u53cd\u4e8b\u5b9e\u56fe\u50cf\uff0c\u518d\u901a\u8fc7\u8de8\u53d8\u4f53\u81ea\u76d1\u7763\u5bf9\u6bd4\u5b66\u4e60\u8feb\u4f7f\u7f16\u7801\u5668\u5b66\u4e60\u4e0e\u80cc\u666f\u65e0\u5173\u7684\u524d\u666f\u8868\u793a\uff0c\u6700\u540e\u7ed3\u5408ERM\u9884\u70ed\u548cGroupDRO\u5fae\u8c03\u3002\u5728Waterbirds\u3001MetaShift\u3001NICO++\u7b49\u5206\u5e03\u504f\u79fb\u57fa\u51c6\u4e0a\u53d6\u5f97\u6700\u4f18\u6700\u5dee\u7ec4\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05850", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5206\u5e03\u504f\u79fb", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u6269\u6563\u6a21\u578b", "\u865a\u5047\u76f8\u5173\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05850v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Breaking Spurious Correlations via Generative Randomization and Cross-Variant Self-Supervised Learning", "tldr": "\u63d0\u51fa\u4e24\u9636\u6bb5\u6846\u67b6\u6253\u7834\u6df1\u5ea6\u795e\u7ecf\u7f51\u7edc\u5bf9\u80cc\u666f\u7684\u865a\u5047\u76f8\u5173\u6027\uff1a\u5148\u7528\u96f6\u6837\u672c\u5206\u5272+\u6269\u6563\u6a21\u578b\u751f\u6210\u80cc\u666f\u53d8\u6362\u7684\u53cd\u4e8b\u5b9e\u56fe\u50cf\uff0c\u518d\u901a\u8fc7\u8de8\u53d8\u4f53\u81ea\u76d1\u7763\u5bf9\u6bd4\u5b66\u4e60\u8feb\u4f7f\u7f16\u7801\u5668\u5b66\u4e60\u4e0e\u80cc\u666f\u65e0\u5173\u7684\u524d\u666f\u8868\u793a\uff0c\u6700\u540e\u7ed3\u5408ERM\u9884\u70ed\u548cGroupDRO\u5fae\u8c03\u3002\u5728Waterbirds\u3001MetaShift\u3001NICO++\u7b49\u5206\u5e03\u504f\u79fb\u57fa\u51c6\u4e0a\u53d6\u5f97\u6700\u4f18\u6700\u5dee\u7ec4\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Defocus blur degrades fine image structures and limits visual perception, which can adversely affect downstream vision tasks. Although recent deep learning deblurring methods have achieved strong performance, their effectiveness depends on training data and often degrades across cameras and lenses due to limited optical diversity and realism in existing datasets. In this paper, we propose a pipeline for synthesizing realistic defocus deblurring datasets for diverse compound lenses. It integrates efficient wave-optics PSF computation via Debye CZT propagation, depth-aware defocus rendering with occlusion handling, and blur synthesis in the radiometrically linear space with camera ISP simulation. This unified pipeline enables the scalable generation of photorealistic defocus datasets with diverse lens characteristics. Using our pipeline, we generate CLDefocus, a large-scale synthetic dataset containing lens-diverse defocus image pairs. We further analyze the limitations of real-captured defocus datasets and show that such imperfections can bias full-reference evaluation. Extensive experiments demonstrate that models trained on CLDefocus achieve improved cross-device generalization compared to models trained on existing real and synthetic datasets.", "arxiv_id": "2607.05837", "arxiv_url": "https://arxiv.org/abs/2607.05837", "authors": ["Yunkyu Lee", "Woohyeok Kim", "Sunghyun Cho"], "brief": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u6ce2\u5149\u5b66PSF\u8ba1\u7b97\u3001\u6df1\u5ea6\u611f\u77e5\u6e32\u67d3\u548c\u76f8\u673aISP\u4eff\u771f\u7684\u590d\u5408\u955c\u5934\u6563\u7126\u6a21\u7cca\u5408\u6210\u6d41\u7a0b\uff0c\u751f\u6210\u4e86\u5927\u89c4\u6a21\u591a\u6837\u5316\u5408\u6210\u6570\u636e\u96c6CLDefocus\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u8be5\u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\u7684\u53bb\u6a21\u7cca\u6a21\u578b\u76f8\u6bd4\u73b0\u6709\u6570\u636e\u96c6\u5177\u6709\u66f4\u597d\u7684\u8de8\u8bbe\u5907\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05837", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u50cf\u53bb\u6a21\u7cca", "\u6563\u7126\u6a21\u7cca", "\u6570\u636e\u5408\u6210", "\u8ba1\u7b97\u6444\u5f71"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05837v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Realistic Compound-Lens Defocus Blur Synthesis", "tldr": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u6ce2\u5149\u5b66PSF\u8ba1\u7b97\u3001\u6df1\u5ea6\u611f\u77e5\u6e32\u67d3\u548c\u76f8\u673aISP\u4eff\u771f\u7684\u590d\u5408\u955c\u5934\u6563\u7126\u6a21\u7cca\u5408\u6210\u6d41\u7a0b\uff0c\u751f\u6210\u4e86\u5927\u89c4\u6a21\u591a\u6837\u5316\u5408\u6210\u6570\u636e\u96c6CLDefocus\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u8be5\u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\u7684\u53bb\u6a21\u7cca\u6a21\u578b\u76f8\u6bd4\u73b0\u6709\u6570\u636e\u96c6\u5177\u6709\u66f4\u597d\u7684\u8de8\u8bbe\u5907\u6cdb\u5316\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Background. Retinopathy of prematurity (ROP) is a preventable cause of childhood blindness, with rising burden in low- and middle-income countries where ROP-trained ophthalmologists are scarce. Plus disease, marked by retinal vessel dilation and tortuosity, triggers treatment but is subjective and variable. Automated screening could extend specialist reach, but African evidence remains limited. Methods. We analysed 121 Kenyan preterm infants, covering 237 eyes and 1,635 fundus images graded as No Plus, Pre-Plus or Plus. Vessel annotations from two graders supported segmentation training. Eleven configurations were evaluated for eye-level Plus detection using patient-grouped nested cross-validation, including image classifiers, multiple-instance learning, multi-task segmentation-classification, and segment-then-classify pipelines. Results. Vessel segmentation was feasible, achieving pooled Dice 0.533, IoU 0.368, sensitivity 0.623 and specificity 0.979 on held-out images. RGB classifiers were highly sensitive but over-referred, while segmentation-coupled models were more specific. Combining approaches improved performance: an OR-based screen achieved the highest sensitivity, an AND-based confirmation achieved the highest specificity, and a probability ensemble gave the best balanced performance, with sensitivity 0.692, specificity 0.914 and balanced accuracy 0.803, outperforming the vision classifier alone. Conclusions. Classification and vessel segmentation are complementary for ROP Plus detection in Kenyan data. Classifiers support sensitive case-finding, while segmentation improves specificity and reduces over-referral. African ROP AI systems should use combined workflows and undergo prospective multi-site validation.", "arxiv_id": "2607.05825", "arxiv_url": "https://arxiv.org/abs/2607.05825", "authors": ["Fred Mutisya", "Oscar Onyango", "Sarah Sitati", "Syokau Ilovi", "Aeesha NJ Malik", "Brenda W\u0027mosi", "Brian Makini", "Jalemba Aluuvala", "Josiah Onyango", "Rachael Kanguha Mmene", "Steven Wanyee"], "brief": "\u9488\u5bf9\u80af\u5c3c\u4e9a\u65e9\u4ea7\u513f\u961f\u5217\uff0c\u7814\u7a76\u4e86\u56fe\u50cf\u5206\u7c7b\u4e0e\u89c6\u7f51\u819c\u8840\u7ba1\u5206\u5272\u5728\u65e9\u4ea7\u513f\u89c6\u7f51\u819c\u75c5\u53d8\uff08ROP\uff09Plus\u75c5\u7b5b\u67e5\u4e2d\u7684\u4e92\u8865\u4f5c\u7528\u3002\u5206\u7c7b\u6a21\u578b\u654f\u611f\u6027\u9ad8\u4f46\u8fc7\u5ea6\u8f6c\u8bca\uff0c\u5206\u5272\u6a21\u578b\u7279\u5f02\u6027\u66f4\u5f3a\uff0c\u4e24\u8005\u96c6\u6210\u540e\u8fbe\u5230\u6700\u4f73\u5e73\u8861\u6027\u80fd\uff08\u654f\u611f\u60270.692\uff0c\u7279\u5f02\u60270.914\uff09\uff0c\u4f18\u4e8e\u5355\u4e00\u65b9\u6cd5\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05825", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5206\u6790", "\u89c6\u7f51\u819c\u5206\u5272", "\u75be\u75c5\u7b5b\u67e5", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05825v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Complementary Roles of Image Classification and Vessel Segmentation in AI-Based Screening for Retinopathy of Prematurity Plus Disease in a Kenyan Preterm Cohort", "tldr": "\u9488\u5bf9\u80af\u5c3c\u4e9a\u65e9\u4ea7\u513f\u961f\u5217\uff0c\u7814\u7a76\u4e86\u56fe\u50cf\u5206\u7c7b\u4e0e\u89c6\u7f51\u819c\u8840\u7ba1\u5206\u5272\u5728\u65e9\u4ea7\u513f\u89c6\u7f51\u819c\u75c5\u53d8\uff08ROP\uff09Plus\u75c5\u7b5b\u67e5\u4e2d\u7684\u4e92\u8865\u4f5c\u7528\u3002\u5206\u7c7b\u6a21\u578b\u654f\u611f\u6027\u9ad8\u4f46\u8fc7\u5ea6\u8f6c\u8bca\uff0c\u5206\u5272\u6a21\u578b\u7279\u5f02\u6027\u66f4\u5f3a\uff0c\u4e24\u8005\u96c6\u6210\u540e\u8fbe\u5230\u6700\u4f73\u5e73\u8861\u6027\u80fd\uff08\u654f\u611f\u60270.692\uff0c\u7279\u5f02\u60270.914\uff09\uff0c\u4f18\u4e8e\u5355\u4e00\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-centric autonomous driving requires accurate metric geometry and ego-motion estimation from synchronized multi-camera observations. Recent visual geometry models show strong performance in pose estimation, depth prediction, and 3D reconstruction, but are not tailored to rigid multi-camera driving systems. They often encode camera poses as entangled representations, in which time-varying ego-motion and static camera-rig geometry are jointly modeled, limiting the utilization of vehicle-side geometric priors. We propose Trajectory-Rig Decoupled Metric Geometry Learning (TRIG), a geometry perception framework for autonomous driving. TRIG factorizes camera poses into ego-trajectory and camera-rig components, enabling separate modeling of ego-motion and static multi-camera topology. We introduce decoupled pose encoding and supervision, which separately constrain trajectory evolution and rig geometry for metric-consistent learning. Moreover, sparse Temporal--Spatial attention separates cross-camera interaction from temporal aggregation, reducing global attention cost while preserving geometric reasoning. Experiments on five autonomous driving benchmarks show that TRIG achieves state-of-the-art performance in pose estimation, metric depth prediction, and 3D reconstruction.", "arxiv_id": "2607.05801", "arxiv_url": "https://arxiv.org/abs/2607.05801", "authors": ["Lizhou Liao", "Wentao Xu", "Handong Wang", "Lirong Yang", "Shuai Yang", "Weiwei Liu", "Chang Huang"], "brief": "\u63d0\u51faTRIG\u6846\u67b6\uff0c\u5c06\u81ea\u52a8\u9a7e\u9a76\u591a\u76f8\u673a\u7cfb\u7edf\u7684\u4f4d\u59ff\u5206\u89e3\u4e3a\u81ea\u8f66\u8f68\u8ff9\u548c\u76f8\u673a\u88c5\u7f6e\u4e24\u4e2a\u72ec\u7acb\u5206\u91cf\uff0c\u5206\u522b\u5efa\u6a21\u65f6\u53d8\u81ea\u8fd0\u52a8\u4e0e\u9759\u6001\u591a\u76f8\u673a\u62d3\u6251\u7ed3\u6784\u3002\u901a\u8fc7\u89e3\u8026\u4f4d\u59ff\u7f16\u7801\u4e0e\u76d1\u7763\u4ee5\u53ca\u7a00\u758f\u65f6\u7a7a\u6ce8\u610f\u529b\u673a\u5236\uff0c\u5728\u4e94\u4e2a\u81ea\u52a8\u9a7e\u9a76\u57fa\u51c6\u4e0a\u5b9e\u73b0\u4e86\u4f4d\u59ff\u4f30\u8ba1\u3001\u5ea6\u91cf\u6df1\u5ea6\u9884\u6d4b\u548c\u4e09\u7ef4\u91cd\u5efa\u7684\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05801", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u4e09\u7ef4\u91cd\u5efa", "\u6df1\u5ea6\u4f30\u8ba1", "\u591a\u76f8\u673a\u611f\u77e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05801v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "TRIG: Trajectory-Rig Decoupled Metric Geometry Learning", "tldr": "\u63d0\u51faTRIG\u6846\u67b6\uff0c\u5c06\u81ea\u52a8\u9a7e\u9a76\u591a\u76f8\u673a\u7cfb\u7edf\u7684\u4f4d\u59ff\u5206\u89e3\u4e3a\u81ea\u8f66\u8f68\u8ff9\u548c\u76f8\u673a\u88c5\u7f6e\u4e24\u4e2a\u72ec\u7acb\u5206\u91cf\uff0c\u5206\u522b\u5efa\u6a21\u65f6\u53d8\u81ea\u8fd0\u52a8\u4e0e\u9759\u6001\u591a\u76f8\u673a\u62d3\u6251\u7ed3\u6784\u3002\u901a\u8fc7\u89e3\u8026\u4f4d\u59ff\u7f16\u7801\u4e0e\u76d1\u7763\u4ee5\u53ca\u7a00\u758f\u65f6\u7a7a\u6ce8\u610f\u529b\u673a\u5236\uff0c\u5728\u4e94\u4e2a\u81ea\u52a8\u9a7e\u9a76\u57fa\u51c6\u4e0a\u5b9e\u73b0\u4e86\u4f4d\u59ff\u4f30\u8ba1\u3001\u5ea6\u91cf\u6df1\u5ea6\u9884\u6d4b\u548c\u4e09\u7ef4\u91cd\u5efa\u7684\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Synthesizing physically plausible human-scene interactions (HSI) remains a critical challenge in computer vision and the development of human avatars. Although recent generative models enable diverse motion synthesis, they suffer from an inductive bias referred to as semantic-geometric entanglement. Because spatial constraints often strongly correlate with specific actions in training data, monolithic models will learn the shortcut bias, aggressively overriding the semantic intent when faced with strict geometric cues. Furthermore, this entanglement exacerbates physical hallucinations, such as body-scene penetrations. To address these limitations, we propose DeSeG, a hierarchical framework that explicitly decouples semantic intent from geometric constraints. First, we introduce a Residual Semantic Planner that encodes textual instructions and canonicalized goal voxels into a compact latent space, enabling fine-grained semantic control independent of spatial trajectories. Second, we propose a physics regularized diffusion executor that incorporates differentiable repulsive potential fields directly into the diffusion objective, enforcing collision-aware motion generation. Extensive experiments on the Lingo dataset demonstrate that DeSeG achieves state-of-the-art performance, reducing mean scene penetration by 47% and improving semantic alignment by 29% over the SOTA baselines.", "arxiv_id": "2607.05787", "arxiv_url": "https://arxiv.org/abs/2607.05787", "authors": ["Jiakun Li", "Zhe Li", "Wenqiang Wu", "Zheng Chang", "Mingqi Gao", "Jinyu Yang", "Feng Zheng"], "brief": "\u63d0\u51faDeSeG\u6846\u67b6\uff0c\u5c06\u4eba-\u573a\u666f\u4ea4\u4e92\u751f\u6210\u4e2d\u7684\u8bed\u4e49\u610f\u56fe\u4e0e\u51e0\u4f55\u7ea6\u675f\u663e\u5f0f\u89e3\u8026\uff0c\u901a\u8fc7\u6b8b\u5dee\u8bed\u4e49\u89c4\u5212\u5668\u548c\u7269\u7406\u6b63\u5219\u5316\u6269\u6563\u6267\u884c\u5668\uff0c\u89e3\u51b3\u73b0\u6709\u6a21\u578b\u4e2d\u8bed\u4e49-\u51e0\u4f55\u7ea0\u7f20\u5bfc\u81f4\u7684\u7269\u7406\u5e7b\u89c9\u95ee\u9898\u3002\u5728Lingo\u6570\u636e\u96c6\u4e0a\uff0c\u573a\u666f\u7a7f\u900f\u51cf\u5c1147%\uff0c\u8bed\u4e49\u5bf9\u9f50\u63d0\u534729%\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05787", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4eba-\u573a\u666f\u4ea4\u4e92", "\u6269\u6563\u6a21\u578b", "\u8fd0\u52a8\u751f\u6210", "\u7269\u7406\u7ea6\u675f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05787v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DeSeG: Decoupling Semantic Intent and Geometric Constraints for Physically Plausible Human-Scene Interaction", "tldr": "\u63d0\u51faDeSeG\u6846\u67b6\uff0c\u5c06\u4eba-\u573a\u666f\u4ea4\u4e92\u751f\u6210\u4e2d\u7684\u8bed\u4e49\u610f\u56fe\u4e0e\u51e0\u4f55\u7ea6\u675f\u663e\u5f0f\u89e3\u8026\uff0c\u901a\u8fc7\u6b8b\u5dee\u8bed\u4e49\u89c4\u5212\u5668\u548c\u7269\u7406\u6b63\u5219\u5316\u6269\u6563\u6267\u884c\u5668\uff0c\u89e3\u51b3\u73b0\u6709\u6a21\u578b\u4e2d\u8bed\u4e49-\u51e0\u4f55\u7ea0\u7f20\ let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
