7\u968f\u673aL\u7cfb\u7edf\u751f\u6210\u6811\u6728\u5e76\u5efa\u6a21\u4e3a\u5168\u5173\u8282\u4f53\uff0c\u652f\u6301\u673a\u5668\u4eba\u91c7\u6458\u4efb\u52a1\u7684\u5927\u89c4\u6a21\u5e76\u884c\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06337", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u6811\u679d\u91c7\u7528\u6b27\u62c9-\u4f2f\u52aa\u5229\u6881\u7406\u8bba\u5efa\u6a21\u4e3a\u67d4\u6027\u626d\u8f6c\u5f39\u7c27\u963b\u5c3c\u5668\uff0c\u53ef\u5728\u6728\u6750\u65ad\u88c2\u6a21\u91cf\u5904\u6298\u65ad\uff0c\u82f9\u679c\u901a\u8fc7\u6587\u732e\u6807\u5b9a\u7684\u62c9\u529b\u4ece\u830e\u4e0a\u8131\u843d", "\u6bcf\u4e2a\u5e76\u884c\u73af\u5883\u901a\u8fc7\u57df\u968f\u673a\u5316\u751f\u6210\u72ec\u7279\u6811\u6728\uff0c\u652f\u6301\u7b14\u8bb0\u672cGPU\u4e0a\u4ee5\u4ea4\u4e92\u5e27\u7387\u8fd0\u884c\u591a\u4e2a\u5e76\u884c\u73af\u5883", "\u5b9a\u4e49\u4e86\u6db5\u76d6\u91c7\u6458\u5b8c\u6574\u6027\u3001\u541e\u5410\u91cf\u548c\u690d\u7269\u635f\u4f24\u7684\u8bc4\u4f30\u6307\u6807\u4f53\u7cfb\uff1b\u57fa\u7ebf\u65b9\u6cd5\u4ec5\u80fd\u68c0\u6d4b\u5230\u7ea640%\u679c\u5b9e\u5e76\u6210\u529f\u91c7\u6458\uff0c\u53ef\u8fbe\u679c\u5b9e\u91c7\u6458\u7387\u4ec5\u7ea61/8"], "keywords": ["\u519c\u4e1a\u673a\u5668\u4eba", "\u4eff\u771f\u57fa\u51c6", "\u5f3a\u5316\u5b66\u4e60", "\u673a\u5668\u4eba\u64cd\u63a7"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06337v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "OrchardBench: A Physically-Grounded, GPU-Parallel Apple-Orchard Simulation Benchmark for Agricultural Robotics", "tldr": "OrchardBench\uff1a\u9996\u4e2a\u7269\u7406\u771f\u5b9e\u3001GPU\u5e76\u884c\u7684\u82f9\u679c\u56ed\u673a\u5668\u4eba\u91c7\u6458\u4eff\u771f\u57fa\u51c6\u5e73\u53f0", "upvotes": 0, "what_it_is": "\u63d0\u51faOrchardBench\uff0c\u4e00\u4e2a\u57fa\u4e8eNewton\u5f15\u64ce\u7684\u7269\u7406\u771f\u5b9e\u82f9\u679c\u56edGPU\u5e76\u884c\u4eff\u771f\u57fa\u51c6\uff0c\u901a\u8fc7\u968f\u673aL\u7cfb\u7edf\u751f\u6210\u6811\u6728\u5e76\u5efa\u6a21\u4e3a\u5168\u5173\u8282\u4f53\uff0c\u652f\u6301\u673a\u5668\u4eba\u91c7\u6458\u4efb\u52a1\u7684\u5927\u89c4\u6a21\u5e76\u884c\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u3002", "why_notable": "\u586b\u8865\u4e86\u519c\u4e1a\u673a\u5668\u4eba\u9886\u57df\u7f3a\u4e4f\u7269\u7406\u771f\u5b9e\u3001\u53ef\u5927\u89c4\u6a21\u5e76\u884c\u4eff\u771f\u5e73\u53f0\u7684\u7a7a\u767d\uff0c\u6240\u6709\u7269\u7406\u53c2\u6570\u5747\u6709\u6587\u732e\u4f9d\u636e\uff0c\u4e3a\u673a\u5668\u4eba\u5b66\u4e60\u63d0\u4f9b\u53ef\u590d\u73b0\u3001\u4f4e\u6210\u672c\u7684\u82f9\u679c\u91c7\u6458\u7814\u7a76\u73af\u5883\u3002"}, {"abstract": "Diffusion models generate high-quality images, but their inference cost comes from two sources: large denoising networks and repeated denoising steps. Existing compression pipelines usually attack these costs separately. Pruning reduces the network, but most pruning methods still rely on a long post-pruning retraining stage to recover a many-step sampler. Step distillation reduces the number of denoising steps, but it usually assumes a student that can already follow the teacher well enough to receive useful distillation gradients. This paper asks whether post-pruning retraining can be replaced by step distillation. We find that the direct replacement fails: after pruning an EDM2-XS teacher, starting SiDA from the pruned checkpoint produces unusable samples. We introduce a short teacher-alignment repair stage as a bridge between pruning and step distillation. The bridge matches the pruned generator to the teacher on noisy real-image latents, then hands the repaired checkpoint to one-step distillation. On ImageNet-512, the original EDM2-XS baseline uses 124.713M parameters and 63 network evaluations, reaching an FID of 3.53. With a suitable distillation objective, our 20% pruned one-step generator uses 98.826M parameters and one network evaluation, reaching an FID of 3.12. With 30% pruning, the model uses 88.029M parameters and one network evaluation, with an FID of 4.26.", "arxiv_id": "2607.06335", "arxiv_url": "https://arxiv.org/abs/2607.06335", "authors": ["Jincheng Ying", "Li Wenlin", "Minghui Xu", "Yinhao Xiao"], "brief": "\u63d0\u51fa\u4e00\u79cd\u5c06\u6269\u6563\u6a21\u578b\u7f51\u7edc\u526a\u679d\u4e0e\u6b65\u9aa4\u84b8\u998f\u7edf\u4e00\u7684\u538b\u7f29\u6d41\u7a0b\uff0c\u5f15\u5165\u77ed\u6682\u7684\"\u6559\u5e08\u5bf9\u9f50\u4fee\u590d\"\u9636\u6bb5\u4f5c\u4e3a\u6865\u6881\uff0c\u4f7f\u526a\u679d\u540e\u7684\u6a21\u578b\u80fd\u6709\u6548\u63a5\u53d7\u4e00\u6b65\u84b8\u998f\u8bad\u7ec3\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06335", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u76f4\u63a5\u5bf9\u526a\u679d\u540e\u7684EDM2-XS\u6a21\u578b\u8fdb\u884cSiDA\u84b8\u998f\u4f1a\u5931\u8d25\uff0c\u9700\u8981\u5148\u8fdb\u884c\u6559\u5e08\u5bf9\u9f50\u4fee\u590d", "\u4fee\u590d\u9636\u6bb5\u5728\u5e26\u566a\u771f\u5b9e\u56fe\u50cf\u6f5c\u53d8\u91cf\u4e0a\u5bf9\u9f50\u526a\u679d\u751f\u6210\u5668\u4e0e\u6559\u5e08\u6a21\u578b\uff0c\u518d\u79fb\u4ea4\u7ed9\u4e00\u6b65\u84b8\u998f", "20%\u526a\u679d\u540e\u5355\u6b65\u751f\u6210\u5668\uff0898.8M\u53c2\u6570\uff09\u5728ImageNet-512\u4e0aFID\u8fbe3.12\uff0c\u4f18\u4e8e\u539f\u59cb63\u6b65\u57fa\u7ebf\uff083.53\uff09\uff1b30%\u526a\u679dFID\u4e3a4.26"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u6a21\u578b\u538b\u7f29", "\u77e5\u8bc6\u84b8\u998f", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06335v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Bridging Diffusion Pruning and Step Distillation with Teacher-Aligned Repair", "tldr": "\u901a\u8fc7\u6559\u5e08\u5bf9\u9f50\u4fee\u590d\u6865\u63a5\u6269\u6563\u6a21\u578b\u526a\u679d\u4e0e\u6b65\u9aa4\u84b8\u998f\uff0c\u5b9e\u73b0\u53c2\u6570\u538b\u7f29\u4e0e\u5355\u6b65\u63a8\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u5c06\u6269\u6563\u6a21\u578b\u7f51\u7edc\u526a\u679d\u4e0e\u6b65\u9aa4\u84b8\u998f\u7edf\u4e00\u7684\u538b\u7f29\u6d41\u7a0b\uff0c\u5f15\u5165\u77ed\u6682\u7684\"\u6559\u5e08\u5bf9\u9f50\u4fee\u590d\"\u9636\u6bb5\u4f5c\u4e3a\u6865\u6881\uff0c\u4f7f\u526a\u679d\u540e\u7684\u6a21\u578b\u80fd\u6709\u6548\u63a5\u53d7\u4e00\u6b65\u84b8\u998f\u8bad\u7ec3\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u526a\u679d\u4e0e\u6b65\u9aa4\u84b8\u998f\u7684\u534f\u540c\u538b\u7f29\uff0c20%\u526a\u679d\u540e\u5355\u6b65\u63a8\u7406FID\u53cd\u8d8563\u6b65\u539f\u6a21\u578b\uff0c\u63a8\u7406\u6548\u7387\u63d0\u534763\u500d\u4ee5\u4e0a\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The increasing adoption of end-to-end learning for autonomous driving introduces increased model complexity and opacity, raising the risk of learning undesired or erroneous behavior. In this work, we integrate unsupervised dictionary learning as a post hoc interpretability module within state-of-the-art driving models to decompose driving behavior into semantically meaningful concepts while demonstrating their causal influence on the model\u0027s driving decisions. We propose a stepwise framework for extracting and interpreting meaningful concepts from the end-to-end model and connecting them to the multifaceted model outputs, thereby revealing the underlying decision-making logic for the prediction of future trajectories. Furthermore, targeted interventions at the concept level allow us to manipulate and correct driving decisions, resulting in measurable improvements in overall driving performance. We thus demonstrate how interpretability can effectively be used to reduce model opacity, uncover erroneous behavior, and enable targeted mitigation, ultimately boosting model performance.", "arxiv_id": "2607.06328", "arxiv_url": "https://arxiv.org/abs/2607.06328", "authors": ["Franz Motzkus", "Sebastian Bernhard"], "brief": "\u63d0\u51fa\u4e00\u79cd\u540e\u9a8c\u53ef\u89e3\u91ca\u6027\u6846\u67b6\uff0c\u5c06\u65e0\u76d1\u7763\u5b57\u5178\u5b66\u4e60\u96c6\u6210\u5230\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\u6a21\u578b\u4e2d\uff0c\u5c06\u9a7e\u9a76\u884c\u4e3a\u5206\u89e3\u4e3a\u8bed\u4e49\u6982\u5ff5\uff0c\u5e76\u901a\u8fc7\u6982\u5ff5\u7ea7\u5e72\u9884\u7ea0\u6b63\u6a21\u578b\u51b3\u7b56\u3001\u63d0\u5347\u9a7e\u9a76\u6027\u80fd\u3002", "categories": ["cs.AI", "cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06328", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u91c7\u7528\u65e0\u76d1\u7763\u5b57\u5178\u5b66\u4e60\u4f5c\u4e3a\u540e\u9a8c\u6a21\u5757\uff0c\u5c06\u9a7e\u9a76\u884c\u4e3a\u5206\u89e3\u4e3a\u8bed\u4e49\u53ef\u7406\u89e3\u7684\u6982\u5ff5", "\u5efa\u7acb\u6982\u5ff5\u4e0e\u6a21\u578b\u591a\u7ef4\u8f93\u51fa\uff08\u672a\u6765\u8f68\u8ff9\u9884\u6d4b\uff09\u4e4b\u95f4\u7684\u56e0\u679c\u5173\u8054\uff0c\u63ed\u793a\u51b3\u7b56\u903b\u8f91", "\u901a\u8fc7\u6982\u5ff5\u7ea7\u5b9a\u5411\u5e72\u9884\u53ef\u64cd\u63a7\u5e76\u7ea0\u6b63\u9519\u8bef\u9a7e\u9a76\u51b3\u7b56\uff0c\u5b9e\u73b0\u53ef\u91cf\u5316\u7684\u6027\u80fd\u63d0\u5347"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u53ef\u89e3\u91ca\u6027", "\u7aef\u5230\u7aef\u5b66\u4e60", "\u6982\u5ff5\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06328v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Driving the Wrong Way: Leveraging Interpretability in End2End Autonomous Driving Models", "tldr": "\u5c06\u65e0\u76d1\u7763\u5b57\u5178\u5b66\u4e60\u5d4c\u5165\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\u6a21\u578b\uff0c\u5b9e\u73b0\u53ef\u89e3\u91ca\u6027\u5e76\u7ea0\u6b63\u9519\u8bef\u9a7e\u9a76\u884c\u4e3a", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u540e\u9a8c\u53ef\u89e3\u91ca\u6027\u6846\u67b6\uff0c\u5c06\u65e0\u76d1\u7763\u5b57\u5178\u5b66\u4e60\u96c6\u6210\u5230\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\u6a21\u578b\u4e2d\uff0c\u5c06\u9a7e\u9a76\u884c\u4e3a\u5206\u89e3\u4e3a\u8bed\u4e49\u6982\u5ff5\uff0c\u5e76\u901a\u8fc7\u6982\u5ff5\u7ea7\u5e72\u9884\u7ea0\u6b63\u6a21\u578b\u51b3\u7b56\u3001\u63d0\u5347\u9a7e\u9a76\u6027\u80fd\u3002", "why_notable": "\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\u6a21\u578b\u7684\u9ed1\u76d2\u6027\u662f\u5b89\u5168\u9690\u60a3\uff0c\u8be5\u5de5\u4f5c\u5c06\u53ef\u89e3\u91ca\u6027\u4ece\u5206\u6790\u5de5\u5177\u5347\u7ea7\u4e3a\u4e3b\u52a8\u7ea0\u9519\u624b\u6bb5\uff0c\u4e3a\u63d0\u5347\u81ea\u52a8\u9a7e\u9a76\u53ef\u4fe1\u5ea6\u63d0\u4f9b\u4e86\u5b9e\u7528\u8def\u5f84\u3002"}, {"abstract": "Motion understanding is critical for ensuring safety and robustness in autonomous driving systems, driving increasing interest in motion prediction. A key challenge in this domain is the high cost associated with acquiring real-world motion labels. It is therefore ideal if we could transfer motion knowledge from synthetic data to real data. In this context, we explore the potential of synthetic-to-real translation for motion prediction (SRMP). However, the most used naive motion regression methods are notably sensitive to the synthetic-to-real domain shift, resulting in unreliable knowledge translation. To address this, we propose a novel approach integrating a motion knowledge translation framework with two key components: (1) objectness-aware motion prediction, which explicitly models the joint distribution of motion patterns and objectness priors to improve domain-invariant feature learning, and (2) objectness-aided motion enhancement, a motion label refinement mechanism that leverages learned objectness priors to filter motion noise. Furthermore, we present a physically-based pipeline for generating Motion4D, the first synthetic 4D LiDAR dataset tailored for SRMP research, addressing the lack of synthetic motion datasets. Experimental results demonstrate that our approach effectively bridges the domain gaps and yields superior performance on real scenes.", "arxiv_id": "2607.06319", "arxiv_url": "https://arxiv.org/abs/2607.06319", "authors": ["Yizheng Wu", "Hongwei Fan", "Kewei Wang", "Ruibo Li", "Xingyi Li", "Xiao Song", "Zhe Wang", "Chenjing Ding", "Dongliang Wang", "Zhiguo Cao", "Guosheng Lin"], "brief": "\u63d0\u51faSRMP\u6846\u67b6\uff0c\u901a\u8fc7\u76ee\u6807\u611f\u77e5\u8fd0\u52a8\u9884\u6d4b\u4e0e\u8fd0\u52a8\u6807\u7b7e\u7cbe\u70bc\u673a\u5236\uff0c\u5c06\u5408\u6210\u6570\u636e\u7684\u8fd0\u52a8\u77e5\u8bc6\u8fc1\u79fb\u81f3\u771f\u5b9e\u573a\u666f\uff1b\u540c\u65f6\u6784\u5efa\u9996\u4e2a\u9762\u5411SRMP\u7814\u7a76\u7684\u5408\u62104D LiDAR\u6570\u636e\u96c6Motion4D\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06319", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u76ee\u6807\u611f\u77e5\u8fd0\u52a8\u9884\u6d4b\uff08objectness-aware motion prediction\uff09\uff1a\u8054\u5408\u5efa\u6a21\u8fd0\u52a8\u6a21\u5f0f\u4e0e\u76ee\u6807\u5148\u9a8c\uff0c\u5b66\u4e60\u57df\u4e0d\u53d8\u7279\u5f81", "\u76ee\u6807\u8f85\u52a9\u8fd0\u52a8\u589e\u5f3a\uff08objectness-aided motion enhancement\uff09\uff1a\u5229\u7528\u76ee\u6807\u5148\u9a8c\u8fc7\u6ee4\u8fd0\u52a8\u566a\u58f0\uff0c\u7cbe\u70bc\u8fd0\u52a8\u6807\u7b7e", "\u6784\u5efaMotion4D\u2014\u2014\u9996\u4e2a\u57fa\u4e8e\u7269\u7406\u6e32\u67d3\u7684\u5408\u62104D LiDAR\u8fd0\u52a8\u6570\u636e\u96c6\uff0c\u4e13\u4e3a\u5408\u6210\u5230\u771f\u5b9e\u8fc1\u79fb\u7814\u7a76\u8bbe\u8ba1"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u57df\u9002\u5e94", "\u8fd0\u52a8\u9884\u6d4b", "\u70b9\u4e91"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06319v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Synthetic-to-Real Translation for Class-Agnostic Motion Prediction", "tldr": "\u63d0\u51fa\u5408\u6210\u5230\u771f\u5b9e\u57df\u8fc1\u79fb\u6846\u67b6\uff0c\u89e3\u51b3\u81ea\u52a8\u9a7e\u9a76\u8fd0\u52a8\u9884\u6d4b\u4e2d\u771f\u5b9e\u6807\u6ce8\u6210\u672c\u9ad8\u7684\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faSRMP\u6846\u67b6\uff0c\u901a\u8fc7\u76ee\u6807\u611f\u77e5\u8fd0\u52a8\u9884\u6d4b\u4e0e\u8fd0\u52a8\u6807\u7b7e\u7cbe\u70bc\u673a\u5236\uff0c\u5c06\u5408\u6210\u6570\u636e\u7684\u8fd0\u52a8\u77e5\u8bc6\u8fc1\u79fb\u81f3\u771f\u5b9e\u573a\u666f\uff1b\u540c\u65f6\u6784\u5efa\u9996\u4e2a\u9762\u5411SRMP\u7814\u7a76\u7684\u5408\u62104D LiDAR\u6570\u636e\u96c6Motion4D\u3002", "why_notable": "\u771f\u5b9e\u8fd0\u52a8\u6807\u6ce8\u6210\u672c\u6781\u9ad8\uff0c\u5408\u6210\u6570\u636e\u8fc1\u79fb\u662f\u4f4e\u6210\u672c\u89e3\u51b3\u65b9\u6848\uff1b\u8be5\u5de5\u4f5c\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u8fd0\u52a8\u9884\u6d4b\u7684\u5408\u6210\u5230\u771f\u5b9e\u8fc1\u79fb\uff0c\u5e76\u586b\u8865\u4e86\u5408\u62104D LiDAR\u8fd0\u52a8\u6570\u636e\u96c6\u7684\u7a7a\u767d\uff0c\u5bf9\u81ea\u52a8\u9a7e\u9a76\u611f\u77e5\u7814\u7a76\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Incomplete Multi-View Clustering addresses the problem of clustering multi-modal data when certain views are missing. Recent end-to-end generative approaches leverage diffusion models to recover missing views via stochastic noise-to-data trajectories. While expressive, such mechanisms are not explicitly designed for clustering, as they initialize from cluster-agnostic noise and rely on stochastic denoising dynamics. In this work, we revisit probability path design in end-to-end generative IMVC. We introduce a flow-matching framework with a linear interpolation path between paired view representations, that replaces diffusion with probability flows between observed and missing views. We provide a formal analysis showing that deterministic ODE flows are inherently better aligned with clustering objectives than diffusion-based stochastic trajectories, especially in terms of transport mechanisms that respect class-conditional data distributions and maintain cluster consistency in finite-step regimes. Building upon this insight, we develop an end-to-end IMVC architecture that integrates straight-path flow-matching view completion with cluster-level and entropy-based alignment to enforce cross-view clustering consistency. Extensive experiments on standard IMVC benchmarks demonstrate that the proposed framework establishes new state-of-the-art performance.", "arxiv_id": "2607.06281", "arxiv_url": "https://arxiv.org/abs/2607.06281", "authors": ["Yiteng Yuan", "Junyan Wang", "Zheyuan Liu", "Hong Jia", "Lei Fan", "Zhulin Tao", "Lianbo Guo"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u57fa\u4e8e\u76f4\u7ebf\u8def\u5f84\u6d41\u5339\u914d\uff08Straight-Path Flow Matching\uff09\u7684\u4e0d\u5b8c\u6574\u591a\u89c6\u56fe\u805a\u7c7b\u6846\u67b6\uff0c\u7528\u786e\u5b9a\u6027ODE\u6d41\u66ff\u4ee3\u6269\u6563\u6a21\u578b\u7684\u968f\u673a\u53bb\u566a\u8fc7\u7a0b\uff0c\u5728\u89c2\u6d4b\u89c6\u56fe\u4e0e\u7f3a\u5931\u89c6\u56fe\u8868\u793a\u4e4b\u95f4\u5efa\u7acb\u7ebf\u6027\u63d2\u503c\u8def\u5f84\uff0c\u5e76\u7ed3\u5408\u805a\u7c7b\u7ea7\u548c\u71b5\u5bf9\u9f50\u635f\u5931\u5b9e\u73b0\u8de8\u89c6\u56fe\u4e00\u81f4\u6027\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06281", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u7406\u8bba\u5206\u6790\u8bc1\u660e\u786e\u5b9a\u6027ODE\u6d41\u6bd4\u6269\u6563\u968f\u673a\u8f68\u8ff9\u66f4\u7b26\u5408\u805a\u7c7b\u76ee\u6807\uff0c\u80fd\u66f4\u597d\u5730\u4fdd\u6301\u7c7b\u6761\u4ef6\u6570\u636e\u5206\u5e03\u548c\u6709\u9650\u6b65\u9aa4\u4e0b\u7684\u805a\u7c7b\u4e00\u81f4\u6027", "\u4ee5\u89c2\u6d4b\u89c6\u56fe\u8868\u793a\u4e3a\u8d77\u70b9\u3001\u7f3a\u5931\u89c6\u56fe\u8868\u793a\u4e3a\u7ec8\u70b9\u6784\u5efa\u7ebf\u6027\u63d2\u503c\u6982\u7387\u8def\u5f84\uff0c\u907f\u514d\u4e86\u6269\u6563\u6a21\u578b\u4ece\u4e0e\u805a\u7c7b\u65e0\u5173\u7684\u566a\u58f0\u521d\u59cb\u5316\u7684\u7f3a\u9677", "\u5728\u6807\u51c6IMVC\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u8fbe\u5230\u65b0\u7684\u6700\u4f18\u6027\u80fd\uff08SOTA\uff09\uff0c\u9a8c\u8bc1\u4e86\u6d41\u5339\u914d\u6846\u67b6\u5728\u591a\u89c6\u56fe\u805a\u7c7b\u4efb\u52a1\u4e2d\u7684\u6709\u6548\u6027"], "keywords": ["\u591a\u89c6\u56fe\u805a\u7c7b", "\u6d41\u5339\u914d", "\u6269\u6563\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06281v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Straight-Path Flow Matching for Incomplete Multi-View Clustering", "tldr": "\u7528\u76f4\u7ebf\u8def\u5f84\u6d41\u5339\u914d\u66ff\u4ee3\u6269\u6563\u6a21\u578b\uff0c\u5b9e\u73b0\u4e0d\u5b8c\u6574\u591a\u89c6\u56fe\u805a\u7c7b\u7684\u7f3a\u5931\u89c6\u56fe\u8865\u5168", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u57fa\u4e8e\u76f4\u7ebf\u8def\u5f84\u6d41\u5339\u914d\uff08Straight-Path Flow Matching\uff09\u7684\u4e0d\u5b8c\u6574\u591a\u89c6\u56fe\u805a\u7c7b\u6846\u67b6\uff0c\u7528\u786e\u5b9a\u6027ODE\u6d41\u66ff\u4ee3\u6269\u6563\u6a21\u578b\u7684\u968f\u673a\u53bb\u566a\u8fc7\u7a0b\uff0c\u5728\u89c2\u6d4b\u89c6\u56fe\u4e0e\u7f3a\u5931\u89c6\u56fe\u8868\u793a\u4e4b\u95f4\u5efa\u7acb\u7ebf\u6027\u63d2\u503c\u8def\u5f84\uff0c\u5e76\u7ed3\u5408\u805a\u7c7b\u7ea7\u548c\u71b5\u5bf9\u9f50\u635f\u5931\u5b9e\u73b0\u8de8\u89c6\u56fe\u4e00\u81f4\u6027\u3002", "why_notable": "\u9996\u6b21\u4ece\u6982\u7387\u8def\u5f84\u8bbe\u8ba1\u89d2\u5ea6\u7cfb\u7edf\u5206\u6790\u751f\u6210\u5f0f\u4e0d\u5b8c\u6574\u591a\u89c6\u56fe\u805a\u7c7b\uff0c\u63ed\u793a\u4e86\u6269\u6563\u6a21\u578b\u4e0e\u805a\u7c7b\u76ee\u6807\u7684\u5185\u5728\u4e0d\u5339\u914d\u6027\uff0c\u5e76\u63d0\u51fa\u66f4\u7b80\u6d01\u9ad8\u6548\u7684\u6d41\u5339\u914d\u66ff\u4ee3\u65b9\u6848\uff0c\u5bf9\u591a\u6a21\u6001\u7f3a\u5931\u6570\u636e\u5904\u7406\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Multi-view reasoning in coronary X-ray angiography is inherently a cross-projection geometric problem, yet automated report generation in this setting remains largely unexplored. The 3D vascular topology leads to projection-dependent branch overlap and foreshortening, rendering single-view modeling fundamentally incomplete and unstable for lesion localization and stenosis grading. Although multi-view fusion appears promising, learning anatomically consistent fusion from real angiograms is impeded by a critical limitation: cross-view alignment is unobservable and cannot be explicitly supervised. Consequently, conventional fusion relies on implicit correlations rather than verified anatomical correspondence. We address this by reformulating multi-view stenosis reporting as an alignment-constrained aggregation problem. A controllable synthetic angiography generation strategy is introduced to expose geometry-derived patch-level correspondence supervision unavailable in real data. An anatomy-correspondence module learns cross-view correspondence matrices that explicitly align auxiliary features within the main-view coordinate space prior to fusion, thereby constraining evidence aggregation to anatomically consistent regions. Experiments on synthetic data and zero-shot transfer to real angiograms show that this alignment-constrained design improves correspondence consistency and structured stenosis reporting compared to single-view modeling and conventional multi-view fusion methods. The code will be publicly available upon publication.", "arxiv_id": "2607.06268", "arxiv_url": "https://arxiv.org/abs/2607.06268", "authors": ["Chen Jia", "Baochang Zhang", "Fatia Kusuma Dewi", "Amir Yousefi", "Heribert Schunkert", "Reza Ghotbi", "Nassir Navab"], "brief": "\u63d0\u51faMAC-XA\u65b9\u6cd5\uff0c\u5c06\u591a\u89c6\u89d2\u51a0\u72b6\u52a8\u8109\u9020\u5f71\u72ed\u7a84\u62a5\u544a\u91cd\u6784\u4e3a\u5bf9\u9f50\u7ea6\u675f\u7684\u805a\u5408\u95ee\u9898\uff0c\u901a\u8fc7\u53ef\u63a7\u5408\u6210\u9020\u5f71\u56fe\u751f\u6210\u8de8\u89c6\u89d2\u89e3\u5256\u5bf9\u5e94\u76d1\u7763\u4fe1\u53f7\uff0c\u5e76\u8bbe\u8ba1\u89e3\u5256\u5bf9\u5e94\u6a21\u5757\u5728\u878d\u5408\u524d\u5c06\u8f85\u52a9\u89c6\u89d2\u7279\u5f81\u5bf9\u9f50\u81f3\u4e3b\u89c6\u89d2\u5750\u6807\u7a7a\u95f4\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06268", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u53ef\u63a7\u5408\u6210\u9020\u5f71\u56fe\u751f\u6210\u7b56\u7565\uff0c\u63d0\u4f9b\u771f\u5b9e\u6570\u636e\u4e2d\u4e0d\u53ef\u89c2\u6d4b\u7684\u51e0\u4f55\u6d3e\u751fpatch\u7ea7\u8de8\u89c6\u89d2\u5bf9\u5e94\u76d1\u7763", "\u8bbe\u8ba1\u89e3\u5256\u5bf9\u5e94\u6a21\u5757\uff0c\u663e\u5f0f\u5b66\u4e60\u8de8\u89c6\u89d2\u5bf9\u5e94\u77e9\u9635\uff0c\u5c06\u7279\u5f81\u805a\u5408\u7ea6\u675f\u5728\u89e3\u5256\u4e00\u81f4\u533a\u57df", "\u5728\u5408\u6210\u6570\u636e\u4e0a\u8bad\u7ec3\u540e\u96f6\u6837\u672c\u8fc1\u79fb\u81f3\u771f\u5b9e\u9020\u5f71\u56fe\uff0c\u4f18\u4e8e\u5355\u89c6\u89d2\u53ca\u4f20\u7edf\u591a\u89c6\u89d2\u878d\u5408\u65b9\u6cd5"], "keywords": ["\u533b\u5b66\u5f71\u50cf", "\u591a\u6a21\u6001", "\u62a5\u544a\u751f\u6210", "\u591a\u89c6\u89d2\u878d\u5408"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06268v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MAC-XA: Multi-view Anatomy-Correspondence Fusion for Coronary Stenosis Reporting from X-ray Angiography", "tldr": "\u63d0\u51faMAC-XA\u6846\u67b6\uff0c\u901a\u8fc7\u89e3\u5256\u5bf9\u5e94\u7ea6\u675f\u7684\u591a\u89c6\u89d2\u878d\u5408\u5b9e\u73b0\u51a0\u72b6\u52a8\u8109X\u5149\u9020\u5f71\u72ed\u7a84\u81ea\u52a8\u62a5\u544a", "upvotes": 0, "what_it_is": "\u63d0\u51faMAC-XA\u65b9\u6cd5\uff0c\u5c06\u591a\u89c6\u89d2\u51a0\u72b6\u52a8\u8109\u9020\u5f71\u72ed\u7a84\u62a5\u544a\u91cd\u6784\u4e3a\u5bf9\u9f50\u7ea6\u675f\u7684\u805a\u5408\u95ee\u9898\uff0c\u901a\u8fc7\u53ef\u63a7\u5408\u6210\u9020\u5f71\u56fe\u751f\u6210\u8de8\u89c6\u89d2\u89e3\u5256\u5bf9\u5e94\u76d1\u7763\u4fe1\u53f7\uff0c\u5e76\u8bbe\u8ba1\u89e3\u5256\u5bf9\u5e94\u6a21\u5757\u5728\u878d\u5408\u524d\u5c06\u8f85\u52a9\u89c6\u89d2\u7279\u5f81\u5bf9\u9f50\u81f3\u4e3b\u89c6\u89d2\u5750\u6807\u7a7a\u95f4\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u89e3\u51b3\u51a0\u72b6\u52a8\u8109\u9020\u5f71\u591a\u89c6\u89d2\u62a5\u544a\u751f\u6210\u4e2d\u8de8\u89c6\u89d2\u5bf9\u9f50\u4e0d\u53ef\u76d1\u7763\u7684\u6838\u5fc3\u96be\u9898\uff0c\u5408\u6210\u6570\u636e\u6865\u63a5\u771f\u5b9e\u573a\u666f\u7684\u96f6\u6837\u672c\u8fc1\u79fb\u7b56\u7565\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Deepfake image detection is currently served by three fundamentally different paradigms: commercial APIs, zero-shot vision-language models (LLMs), and open-source detectors. Despite their widespread use, these paradigms are rarely evaluated under a common protocol, making direct comparison difficult. We introduce VendorBench-100, a cross-paradigm benchmark that evaluates 36 representative models using a single adversarial 100-image corpus, a unified output schema, and a common evaluation framework. To ensure reliable assessment under the corpus\u0027s intentional class imbalance, models are ranked primarily by the Matthews correlation coefficient (MCC), with ROC-AUC reported as a threshold-independent measure of ranking ability. Rather than maximizing dataset size, VendorBench-100 emphasizes challenging real-world scenarios through a curated taxonomy of eight edge-case families, including face swaps, text-to-video stills, AI photo edits, avatar compositing, opaque-provenance images, and compressed research frames. Our evaluation shows that commercial APIs achieve the strongest median performance, followed by vision LLMs and open-source detectors. However, individual open-source models remain competitive with the best vision LLMs. More importantly, we identify a consistent divergence between ranking ability (ROC-AUC) and operating-point quality (MCC), demonstrating that strong score discrimination does not necessarily produce reliable default-threshold decisions. This metric disagreement, rather than any single leaderboard ranking, is the central finding of the benchmark. We release the complete evaluation framework and benchmark results to support reproducible future research. The source code and data are available at: https://github.com/sharayu-20/vendorbench-100", "arxiv_id": "2607.06254", "arxiv_url": "https://arxiv.org/abs/2607.06254", "authors": ["Sharayu N. Deshmukh", "Md Rashidunnabi", "Nelton Tiago Gemo", "Kurundkar G. D.", "Mahamune M. R.", "Nilesh K. Deshmukh"], "brief": "\u63d0\u51faVendorBench-100\u57fa\u51c6\uff0c\u4f7f\u7528100\u5f20\u5bf9\u6297\u6027\u56fe\u50cf\u8bed\u6599\u5e93\uff0c\u5728\u7edf\u4e00\u534f\u8bae\u4e0b\u8de8\u8303\u5f0f\u8bc4\u4f30\u5546\u4e1aAPI\u3001\u96f6\u6837\u672c\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u548c\u5f00\u6e90\u68c0\u6d4b\u5668\u517136\u4e2a\u6df1\u5ea6\u4f2a\u9020\u56fe\u50cf\u68c0\u6d4b\u6a21\u578b\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06254", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efa\u542b8\u7c7b\u8fb9\u7f18\u6848\u4f8b\uff08\u6362\u8138\u3001\u6587\u751f\u89c6\u9891\u622a\u5e27\u3001AI\u56fe\u50cf\u7f16\u8f91\u3001\u865a\u62df\u5f62\u8c61\u5408\u6210\u7b49\uff09\u7684\u7cbe\u9009\u5206\u7c7b\u4f53\u7cfb\uff0c\u5f3a\u8c03\u771f\u5b9e\u4e16\u754c\u6311\u6218\u573a\u666f", "\u4ee5Matthews\u76f8\u5173\u7cfb\u6570\uff08MCC\uff09\u4e3a\u4e3b\u8981\u6392\u540d\u6307\u6807\uff0cROC-AUC\u4e3a\u8f85\u52a9\u6307\u6807\uff0c\u63ed\u793a\u6392\u5e8f\u80fd\u529b\u4e0e\u64cd\u4f5c\u70b9\u8d28\u91cf\u4e4b\u95f4\u5b58\u5728\u7cfb\u7edf\u6027\u5206\u6b67", "\u8bc4\u4f30\u7ed3\u679c\uff1a\u5546\u4e1aAPI\u6574\u4f53\u8868\u73b0\u6700\u5f3a\uff0c\u5176\u6b21\u662f\u89c6\u89c9LLM\uff0c\u4f46\u90e8\u5206\u5f00\u6e90\u6a21\u578b\u53ef\u4e0e\u6700\u4f73\u89c6\u89c9LLM\u5ab2\u7f8e"], "keywords": ["\u6df1\u5ea6\u4f2a\u9020\u68c0\u6d4b", "\u591a\u6a21\u6001", "\u57fa\u51c6\u8bc4\u6d4b", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06254v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "VendorBench-100: A Unified Cross-Paradigm Benchmark for Deepfake Image Detection", "tldr": "VendorBench-100\uff1a\u9996\u4e2a\u8de8\u8303\u5f0f\u6df1\u5ea6\u4f2a\u9020\u56fe\u50cf\u68c0\u6d4b\u7edf\u4e00\u57fa\u51c6\uff0c\u8bc4\u4f3036\u4e2a\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faVendorBench-100\u57fa\u51c6\uff0c\u4f7f\u7528100\u5f20\u5bf9\u6297\u6027\u56fe\u50cf\u8bed\u6599\u5e93\uff0c\u5728\u7edf\u4e00\u534f\u8bae\u4e0b\u8de8\u8303\u5f0f\u8bc4\u4f30\u5546\u4e1aAPI\u3001\u96f6\u6837\u672c\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u548c\u5f00\u6e90\u68c0\u6d4b\u5668\u517136\u4e2a\u6df1\u5ea6\u4f2a\u9020\u56fe\u50cf\u68c0\u6d4b\u6a21\u578b\u3002", "why_notable": "\u9996\u6b21\u5728\u7edf\u4e00\u6846\u67b6\u4e0b\u5bf9\u6bd4\u4e09\u5927\u6df1\u5ea6\u4f2a\u9020\u68c0\u6d4b\u8303\u5f0f\uff0c\u53d1\u73b0ROC-AUC\u9ad8\u4e0d\u4ee3\u8868\u9ed8\u8ba4\u9608\u503c\u51b3\u7b56\u53ef\u9760\u8fd9\u4e00\u5173\u952e\u7ed3\u8bba\uff0c\u4e3a\u5b9e\u9645\u90e8\u7f72\u63d0\u4f9b\u91cd\u8981\u6307\u5bfc\uff0c\u5e76\u5f00\u6e90\u5168\u90e8\u4ee3\u7801\u4e0e\u6570\u636e\u652f\u6301\u53ef\u590d\u73b0\u7814\u7a76\u3002"}, {"abstract": "Magnetic resonance imaging (MRI) super-resolution is vital for improving diagnostic accessibility, yet most methods treat it as a deterministic mapping from a fixed low-resolution input to a high-resolution target. This overlooks a key property of MRI acquisition physics: spatial resolution and signal-to-noise ratio (SNR) are inherently coupled, making any given low-resolution scan merely one of many possible realizations under varying acquisition trade-offs. We rethink MRI super-resolution as a physics-aware reconstruction problem, in which the goal is to identify the optimal resolution-SNR configuration and then super-resolve it to obtain high-quality MRI results. A key implication of this formulation is that MRI resolution becomes dynamic rather than fixed. To handle such resolution-heterogeneous inputs, we adapt 2D Gaussian Splatting (2D GS) to MRI by formulating reconstruction as a coordinate-based, resolution-agnostic rendering problem. To further enhance fidelity, we introduce three innovations: (1) a prior-aware Gaussian representation that combines an Anatomical Structure Prior for tissue-specific kernel initialization with an Imaging System Prior that captures hardware characteristics via a covariance dictionary; (2) a physics-constrained signal modeling scheme that predicts intrinsic tissue parameters (proton density rho and effective relaxation rate R2) and synthesizes intensities through governing physical equations, ensuring biophysically plausible contrast; and (3) a meta-learning framework that alleviates paired-data scarcity by pretraining on simulated data and adapting to real-world conditions. Extensive experiments on dynamic-resolution datasets and standard benchmarks demonstrate that our method achieves state-of-the-art performance, highlighting its strong potential for clinical deployment.", "arxiv_id": "2607.06238", "arxiv_url": "https://arxiv.org/abs/2607.06238", "authors": ["Lihua Wei", "Huatong Gao", "Jia Gong", "Zhiyu Tan", "Hao Li", "Jun Liu", "Zhihua Ren"], "brief": "PhyMRI-SR\u5c06MRI\u8d85\u5206\u8fa8\u7387\u91cd\u65b0\u5b9a\u4e49\u4e3a\u7269\u7406\u611f\u77e5\u91cd\u5efa\u95ee\u9898\uff0c\u5229\u75282D\u9ad8\u65af\u6cfc\u6e85\u5904\u7406\u52a8\u6001\u5206\u8fa8\u7387\u8f93\u5165\uff0c\u5e76\u901a\u8fc7\u7ec4\u7ec7\u53c2\u6570\u9884\u6d4b\u548c\u7269\u7406\u65b9\u7a0b\u5408\u6210\u56fe\u50cf\u5f3a\u5ea6\uff0c\u5b9e\u73b0\u751f\u7269\u7269\u7406\u4e0a\u53ef\u4fe1\u7684\u9ad8\u8d28\u91cfMRI\u91cd\u5efa\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06238", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06MRI\u8d85\u5206\u8fa8\u7387\u5efa\u6a21\u4e3a\u5206\u8fa8\u7387-SNR\u52a8\u6001\u6743\u8861\u95ee\u9898\uff0c\u800c\u975e\u56fa\u5b9a\u4f4e\u5206\u8fa8\u7387\u5230\u9ad8\u5206\u8fa8\u7387\u7684\u786e\u5b9a\u6027\u6620\u5c04", "\u5f15\u5165\u5148\u9a8c\u611f\u77e5\u9ad8\u65af\u8868\u793a\uff08\u89e3\u5256\u7ed3\u6784\u5148\u9a8c+\u6210\u50cf\u7cfb\u7edf\u5148\u9a8c\uff09\u548c\u7269\u7406\u7ea6\u675f\u4fe1\u53f7\u5efa\u6a21\uff08\u9884\u6d4b\u8d28\u5b50\u5bc6\u5ea6\u03c1\u548c\u6709\u6548\u5f1b\u8c6b\u7387R2\uff09", "\u91c7\u7528\u5143\u5b66\u4e60\u6846\u67b6\u7f13\u89e3\u914d\u5bf9\u6570\u636e\u7a00\u7f3a\u95ee\u9898\uff0c\u5728\u6a21\u62df\u6570\u636e\u4e0a\u9884\u8bad\u7ec3\u540e\u9002\u914d\u771f\u5b9e\u573a\u666f\uff0c\u5728\u52a8\u6001\u5206\u8fa8\u7387\u6570\u636e\u96c6\u548c\u6807\u51c6\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA"], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5904\u7406", "\u8d85\u5206\u8fa8\u7387", "\u7269\u7406\u611f\u77e5", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06238v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "PhyMRI-SR: Toward Physics-Aware MRI Image Super-Resolution", "tldr": "\u63d0\u51fa\u7269\u7406\u611f\u77e5MRI\u8d85\u5206\u8fa8\u7387\u6846\u67b6\uff0c\u5c06\u5206\u8fa8\u7387-SNR\u8026\u5408\u7279\u6027\u7eb3\u5165\u91cd\u5efa\u8fc7\u7a0b", "upvotes": 0, "what_it_is": "PhyMRI-SR\u5c06MRI\u8d85\u5206\u8fa8\u7387\u91cd\u65b0\u5b9a\u4e49\u4e3a\u7269\u7406\u611f\u77e5\u91cd\u5efa\u95ee\u9898\uff0c\u5229\u75282D\u9ad8\u65af\u6cfc\u6e85\u5904\u7406\u52a8\u6001\u5206\u8fa8\u7387\u8f93\u5165\uff0c\u5e76\u901a\u8fc7\u7ec4\u7ec7\u53c2\u6570\u9884\u6d4b\u548c\u7269\u7406\u65b9\u7a0b\u5408\u6210\u56fe\u50cf\u5f3a\u5ea6\uff0c\u5b9e\u73b0\u751f\u7269\u7269\u7406\u4e0a\u53ef\u4fe1\u7684\u9ad8\u8d28\u91cfMRI\u91cd\u5efa\u3002", "why_notable": "\u9996\u6b21\u5c06MRI\u91c7\u96c6\u7269\u7406\u7279\u6027\uff08\u5206\u8fa8\u7387-SNR\u8026\u5408\uff09\u7cfb\u7edf\u6027\u5730\u878d\u5165\u8d85\u5206\u8fa8\u7387\u6846\u67b6\uff0c\u517c\u987e\u4e34\u5e8a\u53ef\u89e3\u91ca\u6027\u4e0e\u5b9e\u7528\u6027\uff0c\u5bf9\u63d0\u5347\u4f4e\u8d44\u6e90\u533b\u7597\u73af\u5883\u7684\u8bca\u65ad\u8d28\u91cf\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Generating CT volumes from MRI and CBCT can improve treatment planning in adaptive radiotherapy while avoiding additional radiation exposure. However, direct regression of CT intensities is challenged by the inherently high dynamic range and long-tailed distributions, thereby averaging out sparse yet clinically important structures. To alleviate this issue, we reformulate the regression target into multiple windowed representations, leveraging the inductive prior that CT intensities are structure-deterministic and window-separable. These windowed views exhibit smoother distributions and admit structured fusion back to the full-range CT. Building on this reformulation, we introduce WING, a WINdow-prior-based Generative network comprising: 1) a new Gated Inception Generator to produce multi-window predictions, enabling multi-shape kernel interactions to capture cross-modality correspondence; 2) a Fuse-and-Refine Transformer to aggregate the windowed outputs and learn residuals for detail refinement; and 3) a joint adversarial training objective to enhance window-conditioned realism. Extensive experiments demonstrate that our compact WING achieves state-of-the-art performance on the MRI-to-CT and CBCT-to-CT benchmarks, while supporting multi-anatomy synthesis with a single model.", "arxiv_id": "2607.06234", "arxiv_url": "https://arxiv.org/abs/2607.06234", "authors": ["Siyuan Mei", "Yan Xia", "Yipeng Sun", "Siming Bayer", "Zirong Li", "Chengze Ye", "Daiqi Liu", "Fuxin Fan", "Yixing Huang", "Andreas Maier"], "brief": "\u63d0\u51faWING\u7f51\u7edc\uff0c\u5c06CT\u5f3a\u5ea6\u56de\u5f52\u76ee\u6807\u5206\u89e3\u4e3a\u591a\u7a97\u53e3\u8868\u793a\uff0c\u5229\u7528\u95e8\u63a7Inception\u751f\u6210\u5668\u548c\u878d\u5408-\u7cbe\u70bcTransformer\u5b9e\u73b0\u9ad8\u8d28\u91cf\u8de8\u6a21\u6001CT\u5408\u6210\uff0c\u907f\u514d\u989d\u5916\u8f90\u5c04\u66b4\u9732\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06234", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06CT\u5f3a\u5ea6\u56de\u5f52\u91cd\u6784\u4e3a\u591a\u7a97\u53e3\u8868\u793a\uff0c\u5229\u7528CT\u5f3a\u5ea6\u7ed3\u6784\u786e\u5b9a\u6027\u548c\u7a97\u53e3\u53ef\u5206\u79bb\u6027\u5148\u9a8c\uff0c\u7f13\u89e3\u9ad8\u52a8\u6001\u8303\u56f4\u548c\u957f\u5c3e\u5206\u5e03\u95ee\u9898", "\u95e8\u63a7Inception\u751f\u6210\u5668\u652f\u6301\u591a\u5c3a\u5ea6\u5377\u79ef\u6838\u4ea4\u4e92\uff0c\u6355\u6349\u8de8\u6a21\u6001\u5bf9\u5e94\u5173\u7cfb\uff1bFuse-and-Refine Transformer\u805a\u5408\u7a97\u53e3\u8f93\u51fa\u5e76\u5b66\u4e60\u6b8b\u5dee\u7ec6\u8282", "\u5728MRI-to-CT\u548cCBCT-to-CT\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u5355\u4e00\u6a21\u578b\u652f\u6301\u591a\u89e3\u5256\u90e8\u4f4d\u5408\u6210"], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5408\u6210", "\u8de8\u6a21\u6001", "\u751f\u6210\u7f51\u7edc", "\u653e\u7597"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06234v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "WING: A Window-Prior-Based Generative Network with Gated Inception for Cross-Modality CT Synthesis", "tldr": "WING\uff1a\u57fa\u4e8e\u7a97\u53e3\u5148\u9a8c\u7684\u751f\u6210\u7f51\u7edc\uff0c\u5b9e\u73b0MRI/CBCT\u5230CT\u7684\u8de8\u6a21\u6001\u5408\u6210", "upvotes": 0, "what_it_is": "\u63d0\u51faWING\u7f51\u7edc\uff0c\u5c06CT\u5f3a\u5ea6\u56de\u5f52\u76ee\u6807\u5206\u89e3\u4e3a\u591a\u7a97\u53e3\u8868\u793a\uff0c\u5229\u7528\u95e8\u63a7Inception\u751f\u6210\u5668\u548c\u878d\u5408-\u7cbe\u70bcTransformer\u5b9e\u73b0\u9ad8\u8d28\u91cf\u8de8\u6a21\u6001CT\u5408\u6210\uff0c\u907f\u514d\u989d\u5916\u8f90\u5c04\u66b4\u9732\u3002", "why_notable": "\u521b\u65b0\u6027\u5730\u5f15\u5165\u7a97\u53e3\u5148\u9a8c\u89e3\u51b3CT\u5408\u6210\u4e2d\u7684\u957f\u5c3e\u5206\u5e03\u96be\u9898\uff0c\u6a21\u578b\u7d27\u51d1\u4e14\u6cdb\u5316\u80fd\u529b\u5f3a\uff0c\u5bf9\u81ea\u9002\u5e94\u653e\u7597\u4e34\u5e8a\u6d41\u7a0b\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Enhancing videos under extreme low-light conditions remains challenging due to the difficulty of balancing restoration quality and computational efficiency in resource-constrained settings. This paper introduces EeveeDark, a low-light video enhancement framework that combines the spatial richness of sensor-level RAW data with the temporal precision of event streams. Central to our model is a Binary Neural Network (BNN) architecture that reduces computational overhead by quantizing weights and activations while preserving detail. EeveeDark incorporates (i) modality-specific binary encoders for processing RAW frames and event data, (ii) a lightweight fusion block for integrating spatial and temporal cues, and (iii) an event-guided skip gating mechanism for dynamic spatiotemporal refinement. Experiments on synthetic and real-world datasets show that EeveeDark outperforms prior BNN-based methods and offers a favorable performance-efficiency trade-off compared to full-precision models. The project page is available at https://cyberiada.github.io/EeveeDark.", "arxiv_id": "2607.06217", "arxiv_url": "https://arxiv.org/abs/2607.06217", "authors": ["Onur Eker", "Erkut Erdem", "Aykut Erdem"], "brief": "\u63d0\u51faEeveeDark\u6846\u67b6\uff0c\u5c06\u4f20\u611f\u5668\u7ea7RAW\u5e27\u7684\u7a7a\u95f4\u4fe1\u606f\u4e0e\u4e8b\u4ef6\u76f8\u673a\u7684\u65f6\u5e8f\u7cbe\u5ea6\u878d\u5408\uff0c\u91c7\u7528\u4e8c\u503c\u795e\u7ecf\u7f51\u7edc\uff08BNN\uff09\u67b6\u6784\u5b9e\u73b0\u6781\u4f4e\u5149\u7167\u89c6\u9891\u589e\u5f3a\uff0c\u5728\u8d44\u6e90\u53d7\u9650\u573a\u666f\u4e0b\u517c\u987e\u753b\u8d28\u4e0e\u8ba1\u7b97\u6548\u7387\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06217", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528BNN\u5bf9\u6743\u91cd\u548c\u6fc0\u6d3b\u503c\u8fdb\u884c\u91cf\u5316\uff0c\u5927\u5e45\u964d\u4f4e\u8ba1\u7b97\u5f00\u9500\uff0c\u540c\u65f6\u4fdd\u7559\u56fe\u50cf\u7ec6\u8282", "\u8bbe\u8ba1\u6a21\u6001\u4e13\u7528\u4e8c\u503c\u7f16\u7801\u5668\u5206\u522b\u5904\u7406RAW\u5e27\u548c\u4e8b\u4ef6\u6d41\uff0c\u5e76\u914d\u5907\u8f7b\u91cf\u7ea7\u878d\u5408\u5757\u6574\u5408\u65f6\u7a7a\u7ebf\u7d22", "\u5f15\u5165\u4e8b\u4ef6\u5f15\u5bfc\u7684\u8df3\u8dc3\u95e8\u63a7\u673a\u5236\uff08event-guided skip gating\uff09\u5b9e\u73b0\u52a8\u6001\u65f6\u7a7a\u7cbe\u7ec6\u5316", "\u5728\u5408\u6210\u4e0e\u771f\u5b9e\u6570\u636e\u96c6\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709BNN\u65b9\u6cd5\uff0c\u76f8\u6bd4\u5168\u7cbe\u5ea6\u6a21\u578b\u5177\u6709\u66f4\u4f18\u7684\u6027\u80fd-\u6548\u7387\u6743\u8861"], "keywords": ["\u4f4e\u5149\u589e\u5f3a", "\u4e8c\u503c\u795e\u7ecf\u7f51\u7edc", "\u4e8b\u4ef6\u76f8\u673a", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06217v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EeveeDark: A Binary Neural Framework for Low-Light Video Enhancement via Event-Guided Sensor-Level Fusion", "tldr": "EeveeDark\uff1a\u7ed3\u5408RAW\u6570\u636e\u4e0e\u4e8b\u4ef6\u6d41\u7684\u4e8c\u503c\u795e\u7ecf\u7f51\u7edc\u6781\u6697\u89c6\u9891\u589e\u5f3a\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faEeveeDark\u6846\u67b6\uff0c\u5c06\u4f20\u611f\u5668\u7ea7RAW\u5e27\u7684\u7a7a\u95f4\u4fe1\u606f\u4e0e\u4e8b\u4ef6\u76f8\u673a\u7684\u65f6\u5e8f\u7cbe\u5ea6\u878d\u5408\uff0c\u91c7\u7528\u4e8c\u503c\u795e\u7ecf\u7f51\u7edc\uff08BNN\uff09\u67b6\u6784\u5b9e\u73b0\u6781\u4f4e\u5149\u7167\u89c6\u9891\u589e\u5f3a\uff0c\u5728\u8d44\u6e90\u53d7\u9650\u573a\u666f\u4e0b\u517c\u987e\u753b\u8d28\u4e0e\u8ba1\u7b97\u6548\u7387\u3002", "why_notable": "\u9996\u6b21\u5c06\u4e8c\u503c\u795e\u7ecf\u7f51\u7edc\u4e0e\u4e8b\u4ef6\u76f8\u673a\u6570\u636e\u878d\u5408\u7528\u4e8e\u4f4e\u5149\u89c6\u9891\u589e\u5f3a\uff0c\u5728\u4fdd\u6301\u7ade\u4e89\u6027\u753b\u8d28\u7684\u540c\u65f6\u663e\u8457\u964d\u4f4e\u8ba1\u7b97\u6210\u672c\uff0c\u5bf9\u8fb9\u7f18\u8bbe\u5907\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Image outpainting extends an image beyond its original borders, requiring seamless style integration and globally coherent scene completion. Building on the success of diffusion models, recent methods have achieved substantial improvements in visual quality. In practice, however, high-resolution outpainting is commonly performed via progressive expansion around a fixed source image, particularly in artwork scenarios. Despite this progress, existing approaches still suffer from three key limitations: (i) the absence of a reliable global planning mechanism, which leads to structural instability and error accumulation at high resolutions; (ii) limited spatial controllability beyond text prompts, making it difficult to place objects at user-specified locations; and (iii) high inference latency caused by inherently sequential patch generation. To address these issues, we propose a global blueprint-guided two-stage diffusion framework for layout-controllable high-resolution outpainting with efficient parallel synthesis. In Stage 1, we generate a low-resolution global blueprint using a layout adapter that injects bounding-box conditions into a Stable Diffusion inpainting backbone, producing a globally consistent structural plan while extracting global guidance features. In Stage 2, we synthesize high-resolution local patches in parallel by injecting the blueprint-derived global guidance and initializing each patch from the blueprint using the low-frequency preservation property of forward diffusion. This design eliminates sequential dependency while maintaining global coherence. Extensive experiments on large-scale artwork datasets demonstrate improved visual fidelity, stronger semantic consistency, and substantially reduced inference time compared to prior baselines, while uniquely supporting explicit layout control for artwork outpainting.", "arxiv_id": "2607.06162", "arxiv_url": "https://arxiv.org/abs/2607.06162", "authors": ["Junha Kim", "Hyunjoon Park", "Donghyeon Cho"], "brief": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u5168\u5c40\u84dd\u56fe\u5f15\u5bfc\u7684\u4e24\u9636\u6bb5\u6269\u6563\u6846\u67b6\uff0c\u7528\u4e8e\u9ad8\u5206\u8fa8\u7387\u827a\u672f\u54c1\u56fe\u50cf\u5916\u7ed8\uff08outpainting\uff09\uff0c\u7b2c\u4e00\u9636\u6bb5\u751f\u6210\u4f4e\u5206\u8fa8\u7387\u5168\u5c40\u7ed3\u6784\u84dd\u56fe\uff0c\u7b2c\u4e8c\u9636\u6bb5\u5e76\u884c\u5408\u6210\u9ad8\u5206\u8fa8\u7387\u5c40\u90e8\u56fe\u5757\uff0c\u540c\u65f6\u652f\u6301\u7528\u6237\u901a\u8fc7\u8fb9\u754c\u6846\u6307\u5b9a\u5bf9\u8c61\u4f4d\u7f6e\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06162", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["Stage 1\uff1a\u901a\u8fc7\u5e03\u5c40\u9002\u914d\u5668\u5c06\u8fb9\u754c\u6846\u6761\u4ef6\u6ce8\u5165Stable Diffusion inpainting\u4e3b\u5e72\uff0c\u751f\u6210\u5168\u5c40\u4e00\u81f4\u7684\u4f4e\u5206\u8fa8\u7387\u84dd\u56fe\u5e76\u63d0\u53d6\u5168\u5c40\u5f15\u5bfc\u7279\u5f81", "Stage 2\uff1a\u5229\u7528\u524d\u5411\u6269\u6563\u7684\u4f4e\u9891\u4fdd\u7559\u7279\u6027\u4ece\u84dd\u56fe\u521d\u59cb\u5316\u5404\u56fe\u5757\uff0c\u5b9e\u73b0\u9ad8\u5206\u8fa8\u7387\u5c40\u90e8\u56fe\u5757\u7684\u5e76\u884c\u5408\u6210\uff0c\u6d88\u9664\u987a\u5e8f\u4f9d\u8d56", "\u5728\u5927\u89c4\u6a21\u827a\u672f\u54c1\u6570\u636e\u96c6\u4e0a\uff0c\u76f8\u6bd4\u57fa\u7ebf\u65b9\u6cd5\u663e\u8457\u63d0\u5347\u89c6\u89c9\u4fdd\u771f\u5ea6\u3001\u8bed\u4e49\u4e00\u81f4\u6027\uff0c\u5e76\u5927\u5e45\u964d\u4f4e\u63a8\u7406\u5ef6\u8fdf"], "keywords": ["\u56fe\u50cf\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u56fe\u50cf\u7f16\u8f91", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06162v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "High-Resolution Artwork Outpainting with Global Blueprint Guidance and Layout Control", "tldr": "\u63d0\u51fa\u4e24\u9636\u6bb5\u6269\u6563\u6846\u67b6\uff0c\u7528\u5168\u5c40\u84dd\u56fe\u5f15\u5bfc\u9ad8\u5206\u8fa8\u7387\u827a\u672f\u54c1\u5916\u7ed8\uff0c\u652f\u6301\u5e03\u5c40\u63a7\u5236\u4e0e\u5e76\u884c\u63a8\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u5168\u5c40\u84dd\u56fe\u5f15\u5bfc\u7684\u4e24\u9636\u6bb5\u6269\u6563\u6846\u67b6\uff0c\u7528\u4e8e\u9ad8\u5206\u8fa8\u7387\u827a\u672f\u54c1\u56fe\u50cf\u5916\u7ed8\uff08outpainting\uff09\uff0c\u7b2c\u4e00\u9636\u6bb5\u751f\u6210\u4f4e\u5206\u8fa8\u7387\u5168\u5c40\u7ed3\u6784\u84dd\u56fe\uff0c\u7b2c\u4e8c\u9636\u6bb5\u5e76\u884c\u5408\u6210\u9ad8\u5206\u8fa8\u7387\u5c40\u90e8\u56fe\u5757\uff0c\u540c\u65f6\u652f\u6301\u7528\u6237\u901a\u8fc7\u8fb9\u754c\u6846\u6307\u5b9a\u5bf9\u8c61\u4f4d\u7f6e\u3002", "why_notable": "\u9996\u6b21\u5c06\u5168\u5c40\u89c4\u5212\u673a\u5236\u3001\u663e\u5f0f\u5e03\u5c40\u63a7\u5236\u4e0e\u5e76\u884c\u63a8\u7406\u4e09\u8005\u7ed3\u5408\u7528\u4e8e\u9ad8\u5206\u8fa8\u7387\u827a\u672f\u54c1\u5916\u7ed8\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u65b9\u6cd5\u7ed3\u6784\u4e0d\u7a33\u5b9a\u3001\u53ef\u63a7\u6027\u5dee\u3001\u63a8\u7406\u6162\u4e09\u5927\u75db\u70b9\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Audio Descriptions (ADs) narrate visual content for Blind and Low Vision (BLV) audiences during gaps in audiovisual media. There is growing momentum around ADs in movies and TV shows, and with mandates from India\u0027s Central Board of Film Certification (CBFC), there is a need to expand ADs beyond English. Yet, there is no work that generates ADs for any Indian language. To address this gap, we present the first systematic study of ADs in Hindi, contributing to aspects such as data, generation, and evaluation. We introduce Andha-Dhun, the first dataset of human-authored Hindi ADs collected from 8 full-length movies. We explore two approaches for generating ADs in Hindi: (i) directly from English dense video descriptions, and (ii) translating English ADs into Hindi. We evaluate these approaches using perplexity and LLM-as-a-judge metrics to assess fluency and quality respectively. We also analyze movies that have both English and Hindi human-authored ADs and find that naive translation introduces artifacts and narrows diversity compared to original Hindi ADs. Direct machine translation fails to adapt cultural references, while human-translated ADs do better but still fall short. Our findings emphasize that the purpose of Hindi ADs is accessibility for Indian BLV audiences, and that this requires adapting content for the audience more than strict fidelity to the source.", "arxiv_id": "2607.06457", "arxiv_url": "https://arxiv.org/abs/2607.06457", "authors": ["Ritabrata Chakraborty", "Divy Kala", "Nisheeth Bhooshan Gupta", "Ganji Sreeram", "Pailla Balakrishna Reddy", "Makarand Tapaswi"], "brief": "\u63d0\u51faAndha-Dhun\u2014\u2014\u9996\u4e2a\u5370\u5730\u8bed\u97f3\u9891\u63cf\u8ff0\uff08AD\uff09\u6570\u636e\u96c6\uff0c\u6536\u96c6\u81ea8\u90e8\u5b8c\u6574\u7535\u5f71\u7684\u4eba\u5de5\u6807\u6ce8\u6570\u636e\uff0c\u5e76\u7cfb\u7edf\u7814\u7a76\u4e86\u5370\u5730\u8bedAD\u7684\u751f\u6210\u4e0e\u8bc4\u4f30\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06457", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u6570\u636e\u96c6\u6765\u81ea8\u90e8\u5b8c\u6574\u7535\u5f71\u7684\u4eba\u5de5\u64b0\u5199\u5370\u5730\u8bedAD\uff0c\u586b\u8865\u5370\u5ea6\u8bed\u8a00AD\u7814\u7a76\u7a7a\u767d", "\u63a2\u7d22\u4e24\u79cd\u751f\u6210\u8def\u5f84\uff1a\u4ece\u82f1\u8bed\u89c6\u9891\u63cf\u8ff0\u76f4\u63a5\u751f\u6210 vs. \u5c06\u82f1\u8bedAD\u7ffb\u8bd1\u4e3a\u5370\u5730\u8bed", "\u53d1\u73b0\u673a\u5668\u7ffb\u8bd1\u65e0\u6cd5\u9002\u914d\u6587\u5316\u8bed\u5883\uff0c\u4eba\u5de5\u7ffb\u8bd1\u66f4\u4f18\u4f46\u4ecd\u4e0d\u53ca\u539f\u751f\u5370\u5730\u8bedAD\uff1b\u76f4\u63a5\u7ffb\u8bd1\u4f1a\u5f15\u5165\u4f2a\u5f71\u5e76\u964d\u4f4e\u591a\u6837\u6027"], "keywords": ["\u591a\u6a21\u6001", "\u65e0\u969c\u788d\u6280\u672f", "\u89c6\u9891\u63cf\u8ff0\u751f\u6210", "\u591a\u8bed\u8a00"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06457v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Andha-Dhun: A First Look at Audio Descriptions in Hindi", "tldr": "\u9996\u4e2a\u5370\u5730\u8bed\u7535\u5f71\u97f3\u9891\u63cf\u8ff0\u6570\u636e\u96c6\u4e0e\u751f\u6210\u8bc4\u4f30\u7814\u7a76", "upvotes": 0, "what_it_is": "\u63d0\u51faAndha-Dhun\u2014\u2014\u9996\u4e2a\u5370\u5730\u8bed\u97f3\u9891\u63cf\u8ff0\uff08AD\uff09\u6570\u636e\u96c6\uff0c\u6536\u96c6\u81ea8\u90e8\u5b8c\u6574\u7535\u5f71\u7684\u4eba\u5de5\u6807\u6ce8\u6570\u636e\uff0c\u5e76\u7cfb\u7edf\u7814\u7a76\u4e86\u5370\u5730\u8bedAD\u7684\u751f\u6210\u4e0e\u8bc4\u4f30\u65b9\u6cd5\u3002", "why_notable": "\u54cd\u5e94\u5370\u5ea6CBFC\u65e0\u969c\u788d\u8bbf\u95ee\u6cd5\u89c4\u9700\u6c42\uff0c\u9996\u6b21\u7cfb\u7edf\u6027\u7814\u7a76\u975e\u82f1\u8bed\uff08\u5370\u5730\u8bed\uff09\u97f3\u9891\u63cf\u8ff0\u751f\u6210\uff0c\u63ed\u793a\u6587\u5316\u9002\u914d\u6bd4\u5fe0\u5b9e\u7ffb\u8bd1\u66f4\u91cd\u8981\u7684\u5173\u952e\u53d1\u73b0\uff0c\u5bf9\u591a\u8bed\u8a00\u65e0\u969c\u788dAI\u7814\u7a76\u5177\u6709\u793a\u8303\u610f\u4e49\u3002"}, {"abstract": "Recent text-to-image models such as DALLE-3 excel at following diverse prompts yet remain blind to individual aesthetic preferences. We study personalized image generation, where models must align outputs with a user\u0027s implicit visual preferences based on a few historically preferred images and a short prompt. To this end, we introduce PIPBench, the first profile-inclusive benchmark for evaluating personalized image generation. We further propose a novel data construction pipeline that leverages psychological and demographic profiling dimensions for both real-user data collection and scalable agent-based data generation. Using PIPBench, we conduct a thorough evaluation of representative line of methods. Our experiments reveal key limitations in existing methods, suggesting new challenges and opportunities for personalized text-to-image synthesis. Project page: https://wuyuhang05.github.io/PIPBench/", "arxiv_id": "2607.06440", "arxiv_url": "https://arxiv.org/abs/2607.06440", "authors": ["Yuhang Wu", "Shuxiang Zhang", "Wee Hian Ching", "Chi Zhang", "Miao Liu"], "brief": "\u63d0\u51faPIPBench\u2014\u2014\u9996\u4e2a\u5305\u542b\u7528\u6237\u753b\u50cf\u7684\u4e2a\u6027\u5316\u56fe\u50cf\u751f\u6210\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7\u5fc3\u7406\u4e0e\u4eba\u53e3\u7edf\u8ba1\u7ef4\u5ea6\u6784\u5efa\u6570\u636e\u7ba1\u7ebf\uff0c\u8bc4\u4f30\u6587\u751f\u56fe\u6a21\u578b\u6839\u636e\u7528\u6237\u5386\u53f2\u504f\u597d\u56fe\u50cf\u548c\u77ed\u63d0\u793a\u8bcd\u751f\u6210\u7b26\u5408\u4e2a\u4eba\u5ba1\u7f8e\u56fe\u50cf\u7684\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06440", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u5fc3\u7406\u5b66\u4e0e\u4eba\u53e3\u7edf\u8ba1\u5b66\u7ef4\u5ea6\u8fdb\u884c\u7528\u6237\u753b\u50cf\uff0c\u652f\u6301\u771f\u5b9e\u7528\u6237\u6570\u636e\u91c7\u96c6\u4e0e\u53ef\u6269\u5c55\u7684\u667a\u80fd\u4f53\u6570\u636e\u751f\u6210", "\u57fa\u51c6\u8986\u76d6\u4e2a\u6027\u5316\u6587\u751f\u56fe\u7684\u5b8c\u6574\u8bc4\u6d4b\u6d41\u7a0b\uff0c\u63ed\u793a\u73b0\u6709\u65b9\u6cd5\u5728\u9690\u5f0f\u504f\u597d\u5bf9\u9f50\u4e0a\u7684\u5173\u952e\u5c40\u9650", "\u5bf9\u591a\u7c7b\u4ee3\u8868\u6027\u65b9\u6cd5\u8fdb\u884c\u7cfb\u7edf\u8bc4\u6d4b\uff0c\u6307\u51fa\u4e2a\u6027\u5316\u56fe\u50cf\u751f\u6210\u7684\u65b0\u6311\u6218\u4e0e\u673a\u9047"], "keywords": ["\u4e2a\u6027\u5316\u751f\u6210", "\u6587\u751f\u56fe", "\u57fa\u51c6\u8bc4\u6d4b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06440v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "PIPBench: A Profile-Inclusive Framework for Personalized Image Generation Evaluation", "tldr": "\u9996\u4e2a\u9762\u5411\u4e2a\u6027\u5316\u56fe\u50cf\u751f\u6210\u7684\u7528\u6237\u753b\u50cf\u57fa\u51c6PIPBench\uff0c\u8bc4\u4f30\u6a21\u578b\u5bf9\u7528\u6237\u9690\u5f0f\u5ba1\u7f8e\u504f\u597d\u7684\u5bf9\u9f50\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faPIPBench\u2014\u2014\u9996\u4e2a\u5305\u542b\u7528\u6237\u753b\u50cf\u7684\u4e2a\u6027\u5316\u56fe\u50cf\u751f\u6210\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7\u5fc3\u7406\u4e0e\u4eba\u53e3\u7edf\u8ba1\u7ef4\u5ea6\u6784\u5efa\u6570\u636e\u7ba1\u7ebf\uff0c\u8bc4\u4f30\u6587\u751f\u56fe\u6a21\u578b\u6839\u636e\u7528\u6237\u5386\u53f2\u504f\u597d\u56fe\u50cf\u548c\u77ed\u63d0\u793a\u8bcd\u751f\u6210\u7b26\u5408\u4e2a\u4eba\u5ba1\u7f8e\u56fe\u50cf\u7684\u80fd\u529b\u3002", "why_notable": "\u586b\u8865\u4e86\u4e2a\u6027\u5316\u56fe\u50cf\u751f\u6210\u9886\u57df\u7f3a\u4e4f\u7cfb\u7edf\u6027\u8bc4\u6d4b\u57fa\u51c6\u7684\u7a7a\u767d\uff0c\u7ed3\u5408\u5fc3\u7406\u4e0e\u4eba\u53e3\u7edf\u8ba1\u753b\u50cf\u7684\u6570\u636e\u6784\u5efa\u65b9\u5f0f\u5177\u6709\u521b\u65b0\u6027\uff0c\u4e3a\u540e\u7eed\u7814\u7a76\u63d0\u4f9b\u6807\u51c6\u5316\u8bc4\u6d4b\u5e73\u53f0\u3002"}, {"abstract": "X-ray fluorescence (XRF) spectroscopy is a key modality for material analysis in cultural heritage. However, automated learning from XRF spectra remains challenging: XRF spectra are complex one-dimensional signals composed of sharp elemental peaks, broader structures, and background variations that are not taken into account by existing learning-based models. This paper introduces XRFormer, a transformer architecture tailored to XRF spectra through a multiscale convolutional tokenizer that injects locality and multi-resolution inductive biases before global self-attention. The tokenizer progressively reduces spectral resolution while increasing embedding dimensionality, and the resulting token sequence is processed by a standard transformer encoder. We further investigate self-supervised pretraining for XRF representation learning using Masked Spectral modeling (MSM) and a physics-informed Peak Presence Prediction (PPP) objective. Experiments on the Pigments Checker STANDARD v.5 dataset for pigment identification and unmixing show that XRFormer consistently outperforms ViT, SpectralFormer (with and without CAF), and a 1D-CNN baseline for pigment identification. For pigment unmixing, XRFormer achieves robust abundance estimation while maintaining significantly higher parameter efficiency than SpectralFormer, operating at a lower token resolution (128 vs. 512 tokens) and with less than half the number of parameters (1.5M vs. 3.37M). MSM yields consistent gains across both tasks, while PPP further enhances performance for both identification and unmixing when tuned with an appropriate peak prominence. These results highlight multiscale, modality-aware tokenization as an effective and parameter efficient foundation for transformer-based XRF modeling under data-limited conditions. A GitHub repository is provided at https://github.com/sofiane1010/XRFormer.", "arxiv_id": "2607.06424", "arxiv_url": "https://arxiv.org/abs/2607.06424", "authors": ["Sofiane Daimellah", "Sylvie Le H\u00e9garat-Mascle", "Clotilde Boust"], "brief": "\u63d0\u51faXRFormer\uff0c\u4e00\u79cd\u9488\u5bf9XRF\u5149\u8c31\u7684Transformer\u67b6\u6784\uff0c\u901a\u8fc7\u591a\u5c3a\u5ea6\u5377\u79ef\u5206\u8bcd\u5668\u6ce8\u5165\u5c40\u90e8\u6027\u548c\u591a\u5206\u8fa8\u7387\u5f52\u7eb3\u504f\u7f6e\uff0c\u5e76\u7ed3\u5408\u63a9\u7801\u5149\u8c31\u5efa\u6a21\uff08MSM\uff09\u548c\u7269\u7406\u9a71\u52a8\u7684\u5cf0\u5b58\u5728\u9884\u6d4b\uff08PPP\uff09\u8fdb\u884c\u81ea\u76d1\u7763\u9884\u8bad\u7ec3\uff0c\u7528\u4e8e\u989c\u6599\u8bc6\u522b\u4e0e\u89e3\u6df7\u4efb\u52a1\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06424", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u591a\u5c3a\u5ea6\u5377\u79ef\u5206\u8bcd\u5668\u9010\u6b65\u964d\u4f4e\u5149\u8c31\u5206\u8fa8\u7387\u5e76\u589e\u52a0\u5d4c\u5165\u7ef4\u5ea6\uff0c\u4ec5\u7528128\u4e2atoken\uff08\u5bf9\u6bd4SpectralFormer\u7684512\u4e2a\uff09", "\u53c2\u6570\u91cf\u4ec51.5M\uff0c\u4e0d\u8db3SpectralFormer\uff083.37M\uff09\u7684\u4e00\u534a\uff0c\u4f46\u5728\u989c\u6599\u8bc6\u522b\u548c\u89e3\u6df7\u4efb\u52a1\u4e0a\u5747\u4f18\u4e8eViT\u3001SpectralFormer\u53ca1D-CNN\u57fa\u7ebf", "\u81ea\u76d1\u7763\u9884\u8bad\u7ec3\u7b56\u7565MSM\u5e26\u6765\u7a33\u5b9a\u6027\u80fd\u63d0\u5347\uff0c\u7269\u7406\u9a71\u52a8\u7684PPP\u76ee\u6807\u5728\u9002\u5f53\u5cf0\u663e\u8457\u6027\u8c03\u53c2\u540e\u8fdb\u4e00\u6b65\u589e\u5f3a\u8bc6\u522b\u4e0e\u89e3\u6df7\u6548\u679c"], "keywords": ["\u591a\u6a21\u6001", "Transformer", "\u5149\u8c31\u5206\u6790", "\u81ea\u76d1\u7763\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06424v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "XRFormer: Multiscale Tokenization for XRF Representation Learning", "tldr": "XRFormer\uff1a\u4e13\u4e3aX\u5c04\u7ebf\u8367\u5149\u5149\u8c31\u8bbe\u8ba1\u7684\u591a\u5c3a\u5ea6Transformer\uff0c\u7528\u4e8e\u6587\u5316\u9057\u4ea7\u6750\u6599\u5206\u6790", "upvotes": 0, "what_it_is": "\u63d0\u51faXRFormer\uff0c\u4e00\u79cd\u9488\u5bf9XRF\u5149\u8c31\u7684Transformer\u67b6\u6784\uff0c\u901a\u8fc7\u591a\u5c3a\u5ea6\u5377\u79ef\u5206\u8bcd\u5668\u6ce8\u5165\u5c40\u90e8\u6027\u548c\u591a\u5206\u8fa8\u7387\u5f52\u7eb3\u504f\u7f6e\uff0c\u5e76\u7ed3\u5408\u63a9\u7801\u5149\u8c31\u5efa\u6a21\uff08MSM\uff09\u548c\u7269\u7406\u9a71\u52a8\u7684\u5cf0\u5b58\u5728\u9884\u6d4b\uff08PPP\uff09\u8fdb\u884c\u81ea\u76d1\u7763\u9884\u8bad\u7ec3\uff0c\u7528\u4e8e\u989c\u6599\u8bc6\u522b\u4e0e\u89e3\u6df7\u4efb\u52a1\u3002", "why_notable": "\u9996\u6b21\u5c06\u591a\u5c3a\u5ea6\u6a21\u6001\u611f\u77e5\u5206\u8bcd\u4e0e\u7269\u7406\u5148\u9a8c\u81ea\u76d1\u7763\u9884\u8bad\u7ec3\u7ed3\u5408\u7528\u4e8eXRF\u5149\u8c31\u5b66\u4e60\uff0c\u5728\u6570\u636e\u7a00\u7f3a\u6761\u4ef6\u4e0b\u5b9e\u73b0\u9ad8\u53c2\u6570\u6548\u7387\uff0c\u5bf9\u6587\u5316\u9057\u4ea7\u65e0\u635f\u5206\u6790\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Robust remote verification of identity documents relies on analyzing faint, transparent security features like Optically Variable Devices (OVDs), or \"holograms\", within user-captured videos under uncontrolled conditions. Current systems, however, face critical limitations: existing methods often treat video frames in isolation, neglecting the intrinsic dynamic nature of OVDs and leaving systems vulnerable to swapping attacks, or focus on general holographic presence and lack the ability to verify specific OVD types. Moreover, the economic infeasibility of frame-by-frame video annotation makes supervised training impractical. In this work, we introduce two novel approaches for verifying the dynamic behavior of transparent OVDs protecting the holder\u0027s portrait, specifically designed for open-set scenarios where attack types are unknown during training. We demonstrate that these approaches can be trained without any attack samples in a self-supervised setting, surpassing previous state-of-the-art methods on public datasets while adhering strictly to industrial constraints. Our results confirm that modeling temporal dynamics is essential for defeating sophisticated attacks under realistic conditions, and underscores the promise of sequence modeling and anomaly detection for OVD verification. Code is available at https://github.com/EPITAResearchLab/pouliquen.26.icdar.", "arxiv_id": "2607.06408", "arxiv_url": "https://arxiv.org/abs/2607.06408", "authors": ["Glen Pouliquen", "Joseph Chazalon", "Guillaume Chiron", "Oriol Ramos Terrades", "Thierry G\u00e9raud", "Ahmad Montaser Awal"], "brief": "\u9488\u5bf9\u8eab\u4efd\u8bc1\u4ef6\u4e2d\u5149\u5b66\u53ef\u53d8\u5668\u4ef6\uff08OVD/\u5168\u606f\u56fe\uff09\u7684\u8fdc\u7a0b\u9a8c\u8bc1\u95ee\u9898\uff0c\u63d0\u51fa\u4e24\u79cd\u65e0\u9700\u653b\u51fb\u6837\u672c\u7684\u81ea\u76d1\u7763\u65f6\u5e8f\u5efa\u6a21\u65b9\u6cd5\uff0c\u901a\u8fc7\u5206\u6790\u89c6\u9891\u4e2dOVD\u7684\u52a8\u6001\u884c\u4e3a\u6765\u68c0\u6d4b\u4f2a\u9020\u653b\u51fb\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06408", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u73b0\u6709\u65b9\u6cd5\u9010\u5e27\u5904\u7406\u89c6\u9891\uff0c\u5ffd\u7565OVD\u56fa\u6709\u7684\u52a8\u6001\u7279\u6027\uff0c\u6613\u53d7\u6362\u5e27\u653b\u51fb\uff1b\u672c\u6587\u663e\u5f0f\u5efa\u6a21\u65f6\u5e8f\u52a8\u6001", "\u91c7\u7528\u81ea\u76d1\u7763\u8bad\u7ec3\u8303\u5f0f\uff0c\u65e0\u9700\u4efb\u4f55\u653b\u51fb\u6837\u672c\u6807\u6ce8\uff0c\u89e3\u51b3\u4e86\u9010\u5e27\u89c6\u9891\u6807\u6ce8\u7ecf\u6d4e\u4e0d\u53ef\u884c\u7684\u95ee\u9898", "\u5728\u5f00\u653e\u96c6\u573a\u666f\u4e0b\uff08\u8bad\u7ec3\u65f6\u653b\u51fb\u7c7b\u578b\u672a\u77e5\uff09\u8d85\u8d8a\u73b0\u6709SOTA\u65b9\u6cd5\uff0c\u7ed3\u5408\u5e8f\u5217\u5efa\u6a21\u4e0e\u5f02\u5e38\u68c0\u6d4b"], "keywords": ["\u5f02\u5e38\u68c0\u6d4b", "\u89c6\u9891\u7406\u89e3", "\u6587\u6863\u5b89\u5168", "\u81ea\u76d1\u7763\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06408v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Temporal Modeling of Optically Variable Devices in Identity Documents", "tldr": "\u63d0\u51fa\u4e24\u79cd\u81ea\u76d1\u7763\u65f6\u5e8f\u5efa\u6a21\u65b9\u6cd5\uff0c\u7528\u4e8e\u89c6\u9891\u4e2d\u8eab\u4efd\u8bc1\u4ef6\u5168\u606f\u9632\u4f2a\u6807\u8bc6\u7684\u771f\u5b9e\u6027\u9a8c\u8bc1", "upvotes": 0, "what_it_is": "\u9488\u5bf9\u8eab\u4efd\u8bc1\u4ef6\u4e2d\u5149\u5b66\u53ef\u53d8\u5668\u4ef6\uff08OVD/\u5168\u606f\u56fe\uff09\u7684\u8fdc\u7a0b\u9a8c\u8bc1\u95ee\u9898\uff0c\u63d0\u51fa\u4e24\u79cd\u65e0\u9700\u653b\u51fb\u6837\u672c\u7684\u81ea\u76d1\u7763\u65f6\u5e8f\u5efa\u6a21\u65b9\u6cd5\uff0c\u901a\u8fc7\u5206\u6790\u89c6\u9891\u4e2dOVD\u7684\u52a8\u6001\u884c\u4e3a\u6765\u68c0\u6d4b\u4f2a\u9020\u653b\u51fb\u3002", "why_notable": "\u5c06\u65f6\u5e8f\u5efa\u6a21\u5f15\u5165\u8bc1\u4ef6\u9632\u4f2a\u9a8c\u8bc1\u9886\u57df\uff0c\u5728\u65e0\u76d1\u7763/\u81ea\u76d1\u7763\u6761\u4ef6\u4e0b\u5b9e\u73b0\u5f00\u653e\u96c6\u653b\u51fb\u68c0\u6d4b\uff0c\u5177\u6709\u5f3a\u5b9e\u7528\u4ef7\u503c\uff1b\u4ee3\u7801\u5f00\u6e90\u4e14\u4e25\u683c\u9075\u5faa\u5de5\u4e1a\u7ea6\u675f\uff0c\u53ef\u76f4\u63a5\u843d\u5730\u90e8\u7f72\u3002"}, {"abstract": "Robotic throwing enables fast and efficient object placement beyond the robot\u0027s immediate workspace, but reliable throwing in cluttered environments remains underexplored. Existing approaches, such as TossingBot, learn throwing strategies from visual input but assume obstacle-free settings. In this paper, we address the problem of throwing objects into a target basket while avoiding obstacles placed randomly in the scene. We introduce a potential field state representation that compactly encodes both basket attraction and obstacle repulsion on a fixed-size grid, enabling reinforcement learning (RL) policies to generalize across arbitrary numbers and configurations of obstacles. The policy is initialized from kinesthetic demonstrations and optimized in simulation using three state-of-the-art RL algorithms (SAC, DDPG, TD3). Among these, SAC achieves the most consistent performance across scenarios. We compare the potential field representation against explicit state encodings and demonstrate that it achieves higher success rates and better scalability to unseen obstacle configurations. Real-robot experiments with unseen throwable objects confirm robust sim-to-real transfer, achieving up to $90\\%$ success in cluttered scenes. These results demonstrate that PFR provides a practical and robust representation for safe and efficient robotic throwing in unstructured environments. A video showcasing our experiments is available at: https://youtu.be/ZZnJf8ua2dE", "arxiv_id": "2607.06388", "arxiv_url": "https://arxiv.org/abs/2607.06388", "authors": ["Mohammadreza Kasaei", "Klemen Voncina", "Hamidreza Kasaei"], "brief": "\u63d0\u51fa\u57fa\u4e8e\u52bf\u573a\u72b6\u6001\u8868\u793a\uff08PFR\uff09\u7684\u673a\u5668\u4eba\u6295\u63b7\u6846\u67b6\uff0c\u5c06\u76ee\u6807\u7bee\u7b50\u5438\u5f15\u529b\u4e0e\u969c\u788d\u7269\u6392\u65a5\u529b\u7f16\u7801\u4e3a\u56fa\u5b9a\u5c3a\u5bf8\u7f51\u683c\uff0c\u7ed3\u5408\u5f3a\u5316\u5b66\u4e60\u5b9e\u73b0\u5728\u6742\u4e71\u73af\u5883\u4e2d\u5b89\u5168\u3001\u7cbe\u51c6\u5730\u5c06\u7269\u4f53\u6295\u5165\u76ee\u6807\u7bee\u7b50\u3002", "categories": ["cs.RO", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06388", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u8bbe\u8ba1\u52bf\u573a\u72b6\u6001\u8868\u793a\uff08PFR\uff09\uff0c\u5c06\u7bee\u7b50\u5438\u5f15\u529b\u4e0e\u969c\u788d\u7269\u6392\u65a5\u529b\u7d27\u51d1\u7f16\u7801\uff0c\u652f\u6301\u4efb\u610f\u6570\u91cf\u548c\u914d\u7f6e\u7684\u969c\u788d\u7269\u6cdb\u5316", "\u7b56\u7565\u7531\u8fd0\u52a8\u793a\u6559\u521d\u59cb\u5316\uff0c\u5728\u4eff\u771f\u4e2d\u7528SAC/DDPG/TD3\u4e09\u79cdRL\u7b97\u6cd5\u4f18\u5316\uff0cSAC\u8868\u73b0\u6700\u7a33\u5b9a", "\u771f\u5b9e\u673a\u5668\u4eba\u5b9e\u9a8c\u4e2d\u5bf9\u672a\u89c1\u8fc7\u7684\u53ef\u6295\u63b7\u7269\u4f53\u5b9e\u73b0\u6700\u9ad890%\u7684\u6210\u529f\u7387\uff0csim-to-real\u8fc1\u79fb\u6548\u679c\u826f\u597d"], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u5f3a\u5316\u5b66\u4e60", "sim-to-real\u8fc1\u79fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06388v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Learning to Throw Objects Safely in Multi-Obstacle Environments", "tldr": "\u673a\u5668\u4eba\u5728\u591a\u969c\u788d\u7269\u73af\u5883\u4e2d\u5b89\u5168\u6295\u63b7\u7269\u4f53\uff0c\u6210\u529f\u7387\u9ad8\u8fbe90%", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u57fa\u4e8e\u52bf\u573a\u72b6\u6001\u8868\u793a\uff08PFR\uff09\u7684\u673a\u5668\u4eba\u6295\u63b7\u6846\u67b6\uff0c\u5c06\u76ee\u6807\u7bee\u7b50\u5438\u5f15\u529b\u4e0e\u969c\u788d\u7269\u6392\u65a5\u529b\u7f16\u7801\u4e3a\u56fa\u5b9a\u5c3a\u5bf8\u7f51\u683c\uff0c\u7ed3\u5408\u5f3a\u5316\u5b66\u4e60\u5b9e\u73b0\u5728\u6742\u4e71\u73af\u5883\u4e2d\u5b89\u5168\u3001\u7cbe\u51c6\u5730\u5c06\u7269\u4f53\u6295\u5165\u76ee\u6807\u7bee\u7b50\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u89e3\u51b3\u6742\u4e71\u969c\u788d\u7269\u573a\u666f\u4e0b\u7684\u673a\u5668\u4eba\u6295\u63b7\u95ee\u9898\uff0c\u52bf\u573a\u8868\u793a\u517c\u5177\u7d27\u51d1\u6027\u4e0e\u6cdb\u5316\u6027\uff0c\u5b9e\u673a\u9a8c\u8bc1\u6210\u529f\u7387\u9ad8\uff0c\u5bf9\u4ed3\u50a8\u7269\u6d41\u7b49\u5b9e\u9645\u5e94\u7528\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Vision-language models (VLMs) have made interactive digital museums increasingly feasible by connecting 3D digitization with natural-language artifact exploration. However, in cultural heritage domains such as ancient Greek pottery, reliable VLM assistance is limited by two challenges. First, open-ended interpretation requires grounding fine-grained 2D/3D visual evidence in specialized curatorial knowledge, yet the retrieval process may introduce weak sources and unverifiable references. Second, when the available evidence is incomplete, noisy, or ambiguous, VLMs often produce confident but unsupported answers instead of calibrated uncertainty. To address these challenges, we propose VaseMuseum, a lightweight and modular multimodal agent framework for intelligent digital museums of ancient Greek pottery. VaseMuseum combines an interactive virtual museum with VaseAgent, which supports both 2D images and 3D artifacts through multimodal perception, 3D-aware reasoning, external knowledge retrieval, and inference-time reliability control. Specifically, VaseAgent retrieves evidence from authoritative web and museum knowledge sources, and source-level control selects diverse and verifiable evidence before generation. Meanwhile, response-level control checks generated claims against the evidence pool and encourages neutral, evidence-bounded answers when support is insufficient or conflicting. Moreover, a training-free GRPO-style selection mechanism favors responses with valid references and calibrated confidence without updating the VLM backbone. Experiments in a realistic digital museum simulation show that VaseMuseum improves citation validity, reduces hallucinations on knowledge-intensive queries, and produces more neutral answers under ambiguity compared with search-enabled VLM baselines.", "arxiv_id": "2607.06374", "arxiv_url": "https://arxiv.org/abs/2607.06374", "authors": ["Jiazi Wang", "Nonghai Zhang", "Qiushi Xie", "Zeyu Zhang", "Yufeng Chen", "Yang Zhao", "Ling Shao", "Hao Tang"], "brief": "\u63d0\u51faVaseMuseum\u6846\u67b6\uff0c\u7ed3\u5408\u4ea4\u4e92\u5f0f\u865a\u62df\u535a\u7269\u9986\u4e0eVaseAgent\uff0c\u652f\u63012D\u56fe\u50cf\u548c3D\u6587\u7269\u7684\u591a\u6a21\u6001\u611f\u77e5\u3001\u5916\u90e8\u77e5\u8bc6\u68c0\u7d22\u4e0e\u63a8\u7406\u65f6\u53ef\u9760\u6027\u63a7\u5236\uff0c\u4e13\u4e3a\u53e4\u5e0c\u814a\u9676\u5668\u6587\u5316\u9057\u4ea7\u9886\u57df\u8bbe\u8ba1\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06374", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": ["\u6765\u6e90\u7ea7\u63a7\u5236\uff1a\u4ece\u6743\u5a01\u7f51\u7edc\u548c\u535a\u7269\u9986\u77e5\u8bc6\u5e93\u68c0\u7d22\u591a\u6837\u4e14\u53ef\u9a8c\u8bc1\u7684\u8bc1\u636e\uff0c\u518d\u8fdb\u884c\u751f\u6210", "\u54cd\u5e94\u7ea7\u63a7\u5236\uff1a\u5bf9\u751f\u6210\u5185\u5bb9\u4e0e\u8bc1\u636e\u6c60\u8fdb\u884c\u6838\u67e5\uff0c\u5728\u8bc1\u636e\u4e0d\u8db3\u6216\u51b2\u7a81\u65f6\u8f93\u51fa\u4e2d\u7acb\u3001\u6709\u636e\u53ef\u67e5\u7684\u7b54\u6848", "\u65e0\u9700\u8bad\u7ec3\u7684GRPO\u98ce\u683c\u9009\u62e9\u673a\u5236\uff1a\u504f\u597d\u5177\u6709\u6709\u6548\u5f15\u7528\u548c\u6821\u51c6\u7f6e\u4fe1\u5ea6\u7684\u54cd\u5e94\uff0c\u65e0\u9700\u66f4\u65b0VLM\u4e3b\u5e72"], "keywords": ["\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u6587\u5316\u9057\u4ea7", "\u5e7b\u89c9\u7f13\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06374v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "VaseMuseum: Digital Intelligent Museum for Ancient Greek Pottery", "tldr": "VaseMuseum\uff1a\u9762\u5411\u53e4\u5e0c\u814a\u9676\u5668\u7684\u591a\u6a21\u6001\u667a\u80fd\u6570\u5b57\u535a\u7269\u9986\u6846\u67b6\uff0c\u51cf\u5c11\u5e7b\u89c9\u5e76\u63d0\u5347\u5f15\u7528\u53ef\u9760\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51faVaseMuseum\u6846\u67b6\uff0c\u7ed3\u5408\u4ea4\u4e92\u5f0f\u865a\u62df\u535a\u7269\u9986\u4e0eVaseAgent\uff0c\u652f\u63012D\u56fe\u50cf\u548c3D\u6587\u7269\u7684\u591a\u6a21\u6001\u611f\u77e5\u3001\u5916\u90e8\u77e5\u8bc6\u68c0\u7d22\u4e0e\u63a8\u7406\u65f6\u53ef\u9760\u6027\u63a7\u5236\uff0c\u4e13\u4e3a\u53e4\u5e0c\u814a\u9676\u5668\u6587\u5316\u9057\u4ea7\u9886\u57df\u8bbe\u8ba1\u3002", "why_notable": "\u9488\u5bf9\u6587\u5316\u9057\u4ea7\u9886\u57dfVLM\u5e7b\u89c9\u548c\u5f15\u7528\u4e0d\u53ef\u9760\u7684\u75db\u70b9\uff0c\u63d0\u51fa\u8f7b\u91cf\u6a21\u5757\u5316\u89e3\u51b3\u65b9\u6848\uff0c\u5728\u77e5\u8bc6\u5bc6\u96c6\u578b\u67e5\u8be2\u4e2d\u663e\u8457\u63d0\u5347\u5f15\u7528\u6709\u6548\u6027\u5e76\u964d\u4f4e\u5e7b\u89c9\uff0c\u5bf9\u6570\u5b57\u535a\u7269\u9986\u548c\u6587\u5316\u9057\u4ea7AI\u5e94\u7528\u5177\u6709\u5b9e\u9645\u4ef7\u503c\u3002"}, {"abstract": "Accurate quantification of lung disease severity from chest imaging is critical for clinical decision-making and resource allocation. We propose a tri-modal deep learning framework, TMF-RSE (Tri-Modal Fusion with Regional Semantics and Evidential Uncertainty), that combines appearance features from two-dimensional chest inputs, structural features from lung segmentation masks, and semantic features from vision-language models (VLMs) for severity quantification. Our approach employs complementary fusion mechanisms that integrate semantic guidance, structural priors, and hierarchical interactions across modalities. The model employs evidential regression to provide both severity predictions and uncertainty estimates. Experiments on the Per-COVID-19 CT and RALO datasets show that TMF-RSE outperforms recent transformer-based baselines, achieving MAE of 4.02 and Pearson correlation of 0.9629 on Per-COVID-19 validation, and 0.339 MAE / 0.973 PC on RALO geographic extent.", "arxiv_id": "2607.06356", "arxiv_url": "https://arxiv.org/abs/2607.06356", "authors": ["Fadi Abdeladhim Zidi", "Salah Eddine Bekhouche", "Abdellah Zakaria Sellam", "Gaby Maroun", "Fadi Dornaika", "Cosimo Distante"], "brief": "\u63d0\u51faTMF-RSE\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u878d\u54082D\u80f8\u90e8\u56fe\u50cf\u5916\u89c2\u7279\u5f81\u3001\u80ba\u90e8\u5206\u5272\u63a9\u7801\u7ed3\u6784\u7279\u5f81\u53ca\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u8bed\u4e49\u7279\u5f81\uff0c\u901a\u8fc7\u8bc1\u636e\u56de\u5f52\u540c\u65f6\u8f93\u51fa\u4e25\u91cd\u7a0b\u5ea6\u9884\u6d4b\u4e0e\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06356", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u4e09\u6a21\u6001\u4e92\u8865\u878d\u5408\uff1a\u8bed\u4e49\u5f15\u5bfc\u3001\u7ed3\u6784\u5148\u9a8c\u4e0e\u8de8\u6a21\u6001\u5c42\u6b21\u4ea4\u4e92\u534f\u540c\u5de5\u4f5c", "\u5f15\u5165\u8bc1\u636e\u56de\u5f52\uff08Evidential Regression\uff09\u63d0\u4f9b\u9884\u6d4b\u7ed3\u679c\u7684\u4e0d\u786e\u5b9a\u6027\u91cf\u5316", "\u5728Per-COVID-19\u6570\u636e\u96c6\u4e0aMAE=4.02\u3001Pearson\u76f8\u5173=0.9629\uff0c\u5728RALO\u6570\u636e\u96c6\u4e0aMAE=0.339\u3001PC=0.973\uff0c\u8d85\u8d8aTransformer\u57fa\u7ebf"], "keywords": ["\u533b\u5b66\u5f71\u50cf", "\u591a\u6a21\u6001", "\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06356v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "TMF-RSE: Tri-Modal Fusion with Regional Semantics and Evidential Uncertainty for Lung Severity Scoring", "tldr": "\u4e09\u6a21\u6001\u878d\u5408\u6846\u67b6TMF-RSE\u7ed3\u5408\u5916\u89c2\u3001\u7ed3\u6784\u4e0e\u8bed\u4e49\u7279\u5f81\uff0c\u7cbe\u51c6\u91cf\u5316\u80ba\u90e8\u75be\u75c5\u4e25\u91cd\u7a0b\u5ea6", "upvotes": 0, "what_it_is": "\u63d0\u51faTMF-RSE\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u878d\u54082D\u80f8\u90e8\u56fe\u50cf\u5916\u89c2\u7279\u5f81\u3001\u80ba\u90e8\u5206\u5272\u63a9\u7801\u7ed3\u6784\u7279\u5f81\u53ca\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u8bed\u4e49\u7279\u5f81\uff0c\u901a\u8fc7\u8bc1\u636e\u56de\u5f52\u540c\u65f6\u8f93\u51fa\u4e25\u91cd\u7a0b\u5ea6\u9884\u6d4b\u4e0e\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1\u3002", "why_notable": "\u5c06\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u8bed\u4e49\u7279\u5f81\u5f15\u5165\u533b\u5b66\u5f71\u50cf\u4e25\u91cd\u7a0b\u5ea6\u8bc4\u5206\uff0c\u5e76\u7ed3\u5408\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1\u63d0\u5347\u4e34\u5e8a\u53ef\u4fe1\u5ea6\uff0c\u5bf9COVID-19\u7b49\u80ba\u90e8\u75be\u75c5\u7684\u81ea\u52a8\u5316\u5206\u7ea7\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Accurate breast cancer classification from mammography requires effective integration of complementary information from craniocaudal (CC) and mediolateral oblique (MLO) views, which provide a more complete characterization of breast abnor
