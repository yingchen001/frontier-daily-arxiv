malities. However, existing multi-view learning approaches typically rely on feature-level aggregation or single-stage cross-attention, which can entangle view-specific and shared representations and restrict interaction to limited network depths. To address these limitations, we propose a token-centric dual-view learning framework that unifies prompt-based adaptation and cross-view fusion within a frozen vision transformer backbone. The framework reformulates inter-view interaction as structured token-level communication, where dedicated fusion tokens explicitly encode bidirectional information exchange between CC and MLO views via cross-attention, serving as intermediate carriers of cross-view dependencies rather than relying on direct feature fusion. Unlike conventional methods that apply fusion at a single layer, fusion modules are inserted at multiple transformer depths, enabling progressive and repeated interaction across the encoder hierarchy. Fusion tokens are reintegrated into the token sequence and refined by subsequent transformer layers, facilitating hierarchical propagation of complementary information while preserving view-specific structure. Experiments on VinDr-Mammo and CMMD datasets demonstrate consistent improvements over linear probing, prompt-only adaptation, and conventional fusion baselines. On the VinDr-Mammo BI-RADS classification task, the framework achieves 50.40% F1-score and 0.8090 AUC, including a 0.10 AUC improvement over a dual-view fusion baseline in the binary setting. Ablation studies further validate the effectiveness of token-based fusion and multi-depth interaction design.", "arxiv_id": "2607.06309", "arxiv_url": "https://arxiv.org/abs/2607.06309", "authors": ["Aysan Ghayouri Pirsoltan", "Shima Babakordi", "Mohammad Reza Mohammadi"], "brief": "\u63d0\u51fa\u4e00\u79cd\u4ee5Token\u4e3a\u4e2d\u5fc3\u7684\u53cc\u89c6\u56fe\u5b66\u4e60\u6846\u67b6\uff0c\u5728\u51bb\u7ed3\u7684\u89c6\u89c9Transformer\u4e3b\u5e72\u4e0a\u7edf\u4e00\u63d0\u793a\u9002\u914d\u4e0e\u8de8\u89c6\u56fe\u878d\u5408\uff0c\u901a\u8fc7\u4e13\u7528\u878d\u5408Token\u5728CC\u548cMLO\u4e24\u4e2a\u4e73\u817a\u6444\u5f71\u89c6\u89d2\u95f4\u5b9e\u73b0\u53cc\u5411\u4fe1\u606f\u4ea4\u6362\uff0c\u7528\u4e8e\u4e73\u817a\u764c\u5206\u7c7b\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06309", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u4e13\u7528\u878d\u5408Token\u4f5c\u4e3a\u8de8\u89c6\u56fe\u4f9d\u8d56\u7684\u4e2d\u95f4\u8f7d\u4f53\uff0c\u901a\u8fc7\u4ea4\u53c9\u6ce8\u610f\u529b\u5b9e\u73b0CC\u4e0eMLO\u89c6\u56fe\u7684\u53cc\u5411\u4fe1\u606f\u4ea4\u6362\uff0c\u907f\u514d\u76f4\u63a5\u7279\u5f81\u878d\u5408\u5bfc\u81f4\u7684\u8868\u793a\u7ea0\u7f20", "\u5728Transformer\u7f16\u7801\u5668\u7684\u591a\u4e2a\u6df1\u5ea6\u5c42\u63d2\u5165\u878d\u5408\u6a21\u5757\uff0c\u5b9e\u73b0\u6e10\u8fdb\u5f0f\u3001\u591a\u6b21\u8de8\u89c6\u56fe\u4ea4\u4e92\uff0c\u800c\u975e\u5355\u5c42\u878d\u5408", "\u5728VinDr-Mammo\u6570\u636e\u96c6BI-RADS\u5206\u7c7b\u4efb\u52a1\u4e0a\u8fbe\u523050.40% F1\u548c0.8090 AUC\uff0c\u4e8c\u5206\u7c7b\u8bbe\u7f6e\u4e0bAUC\u8f83\u53cc\u89c6\u56fe\u878d\u5408\u57fa\u7ebf\u63d0\u53470.10"], "keywords": ["\u533b\u5b66\u56fe\u50cf", "\u591a\u6a21\u6001", "\u89c6\u89c9Transformer", "\u4e73\u817a\u764c\u5206\u7c7b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06309v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Token-Based Dual-view Fusion and Adaptation of Large Vision Models for Breast Cancer Classification", "tldr": "\u57fa\u4e8eToken\u7684\u53cc\u89c6\u56fe\u878d\u5408\u6846\u67b6\uff0c\u63d0\u5347\u4e73\u817a\u764c\u94bc\u9776X\u5149\u5206\u7c7b\u51c6\u786e\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u4ee5Token\u4e3a\u4e2d\u5fc3\u7684\u53cc\u89c6\u56fe\u5b66\u4e60\u6846\u67b6\uff0c\u5728\u51bb\u7ed3\u7684\u89c6\u89c9Transformer\u4e3b\u5e72\u4e0a\u7edf\u4e00\u63d0\u793a\u9002\u914d\u4e0e\u8de8\u89c6\u56fe\u878d\u5408\uff0c\u901a\u8fc7\u4e13\u7528\u878d\u5408Token\u5728CC\u548cMLO\u4e24\u4e2a\u4e73\u817a\u6444\u5f71\u89c6\u89d2\u95f4\u5b9e\u73b0\u53cc\u5411\u4fe1\u606f\u4ea4\u6362\uff0c\u7528\u4e8e\u4e73\u817a\u764c\u5206\u7c7b\u3002", "why_notable": "\u9488\u5bf9\u4e73\u817a\u764c\u94bc\u9776\u591a\u89c6\u56fe\u5b66\u4e60\u7684\u75db\u70b9\uff0c\u521b\u65b0\u6027\u5730\u5c06\u8de8\u89c6\u56fe\u878d\u5408\u91cd\u6784\u4e3a\u7ed3\u6784\u5316Token\u7ea7\u901a\u4fe1\uff0c\u5e76\u5728\u51bb\u7ed3\u5927\u6a21\u578b\u4e0a\u5b9e\u73b0\u9ad8\u6548\u9002\u914d\uff0c\u5728\u4e24\u4e2a\u516c\u5f00\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\u4e86\u65b9\u6cd5\u7684\u6709\u6548\u6027\uff0c\u5bf9\u533b\u5b66\u56fe\u50cf\u591a\u89c6\u56fe\u5206\u6790\u5177\u6709\u5b9e\u7528\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Fine-grained image recognition poses a significant challenge due to the substantial expertise and effort required for manual annotation. Vision-language models (VLMs) like CLIP provide a compelling zero-shot alternative, reducing reliance on extensive labeled data. However, their ability to capture subtle distinctions remains limited, leading to subpar recognition performance. While prompt tuning has proven effective for adapting VLMs, most existing methods treat class labels as isolated, discrete entities, overlooking the rich semantic relationships between them. This oversimplified assumption limits the model\u0027s ability to capture hierarchical dependencies and inter-class correlations -- both critical for distinguishing visually similar categories. The problem is especially acute in fine-grained classification, where accurate recognition depends on understanding complex label semantics. To address this, we propose Structured-Condensed Prompt Tuning (SCPT), which enhances semantic structure modeling in prompt learning. Specifically, we introduce Semantic Relation Encoding (SRE) to explicitly model inter-class semantic topology and encode structured label relationships. In parallel, we design a Semantic Condensation loss (ScLoss) to suppress redundant supervision and extract discriminative components from the global semantic space. Together, these components significantly improve semantic alignment and fine-grained discrimination. Extensive experiments on 14 fine-grained benchmarks show that SCPT effectively mitigates semantic ambiguity and achieves state-of-the-art performance in both few-shot and base-to-novel generalization settings.", "arxiv_id": "2607.06185", "arxiv_url": "https://arxiv.org/abs/2607.06185", "authors": ["Xinda Liu", "Qinyu Zhang", "Weiqing Min", "Guohua Geng", "Shuqiang Jiang"], "brief": "\u63d0\u51fa\u7ed3\u6784\u5316\u538b\u7f29\u63d0\u793a\u8c03\u4f18\uff08SCPT\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u8bed\u4e49\u5173\u7cfb\u7f16\u7801\uff08SRE\uff09\u663e\u5f0f\u5efa\u6a21\u7c7b\u95f4\u8bed\u4e49\u62d3\u6251\uff0c\u5e76\u8bbe\u8ba1\u8bed\u4e49\u538b\u7f29\u635f\u5931\uff08ScLoss\uff09\u6291\u5236\u5197\u4f59\u76d1\u7763\uff0c\u589e\u5f3aCLIP\u7b49VLM\u5728\u7ec6\u7c92\u5ea6\u56fe\u50cf\u8bc6\u522b\u4e2d\u7684\u5224\u522b\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06185", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u8bed\u4e49\u5173\u7cfb\u7f16\u7801\uff08SRE\uff09\u6a21\u5757\uff1a\u663e\u5f0f\u6355\u83b7\u7c7b\u6807\u7b7e\u95f4\u7684\u5c42\u6b21\u4f9d\u8d56\u4e0e\u76f8\u5173\u6027\uff0c\u514b\u670d\u4f20\u7edf\u65b9\u6cd5\u5c06\u7c7b\u6807\u7b7e\u89c6\u4e3a\u5b64\u7acb\u5b9e\u4f53\u7684\u5c40\u9650", "\u8bed\u4e49\u538b\u7f29\u635f\u5931\uff08ScLoss\uff09\uff1a\u4ece\u5168\u5c40\u8bed\u4e49\u7a7a\u95f4\u4e2d\u63d0\u53d6\u5224\u522b\u6027\u6210\u5206\uff0c\u6291\u5236\u5197\u4f59\u76d1\u7763\u4fe1\u53f7", "\u572814\u4e2a\u7ec6\u7c92\u5ea6\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u5728\u5c11\u6837\u672c\u5b66\u4e60\u548cbase-to-novel\u6cdb\u5316\u4e24\u79cd\u8bbe\u7f6e\u4e0b\u5747\u8fbe\u5230SOTA\u6027\u80fd"], "keywords": ["\u591a\u6a21\u6001", "\u63d0\u793a\u8c03\u4f18", "\u7ec6\u7c92\u5ea6\u8bc6\u522b", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06185v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Structured-Condensed Prompt Tuning in Vision-Language Models for Fine-grained Image Recognition", "tldr": "\u63d0\u51faSCPT\u65b9\u6cd5\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u8bed\u4e49\u5173\u7cfb\u5efa\u6a21\u63d0\u5347\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u7ec6\u7c92\u5ea6\u56fe\u50cf\u8bc6\u522b\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u7ed3\u6784\u5316\u538b\u7f29\u63d0\u793a\u8c03\u4f18\uff08SCPT\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u8bed\u4e49\u5173\u7cfb\u7f16\u7801\uff08SRE\uff09\u663e\u5f0f\u5efa\u6a21\u7c7b\u95f4\u8bed\u4e49\u62d3\u6251\uff0c\u5e76\u8bbe\u8ba1\u8bed\u4e49\u538b\u7f29\u635f\u5931\uff08ScLoss\uff09\u6291\u5236\u5197\u4f59\u76d1\u7763\uff0c\u589e\u5f3aCLIP\u7b49VLM\u5728\u7ec6\u7c92\u5ea6\u56fe\u50cf\u8bc6\u522b\u4e2d\u7684\u5224\u522b\u80fd\u529b\u3002", "why_notable": "\u7ec6\u7c92\u5ea6\u8bc6\u522b\u662fVLM\u63d0\u793a\u8c03\u4f18\u7684\u96be\u70b9\uff0c\u73b0\u6709\u65b9\u6cd5\u5ffd\u89c6\u7c7b\u95f4\u8bed\u4e49\u7ed3\u6784\u662f\u6838\u5fc3\u74f6\u9888\uff1bSCPT\u4ece\u8bed\u4e49\u62d3\u6251\u5efa\u6a21\u89d2\u5ea6\u5207\u5165\uff0c\u65b9\u6cd5\u65b0\u9896\u4e14\u5728\u5927\u89c4\u6a21\u57fa\u51c6\u4e0a\u6548\u679c\u663e\u8457\uff0c\u5bf9\u5b9e\u9645\u6807\u6ce8\u6210\u672c\u9ad8\u7684\u7ec6\u7c92\u5ea6\u4efb\u52a1\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Scene graph generation (SGG) approaches can be broadly classified into detector-based and query-based methods according to their underlying reasoning mechanisms. However, the discrepancy in their predictive behaviors, induced by these distinct mechanisms, has not been systematically analyzed. In this work, we design a controlled experimental setup to examine prediction discrepancies from the perspective of detector-conditioned reachability. The results suggest clear complementary clues. Motivated by this observation, we introduce a Dual-SGG method that consolidates both reasoning mechanisms via a dual-query design, thereby leveraging the complementary predictive behaviors of both detector-based and query-based methods. Extensive experiments on the Visual Genome, Open Images v6, and GQA-200 datasets demonstrate the effectiveness of the proposed method.", "arxiv_id": "2607.06176", "arxiv_url": "https://arxiv.org/abs/2607.06176", "authors": ["Runfeng Qu", "Pia K Bideau", "Ole Hall", "Julie Ouerfelli-Ethier", "Klaus Obermayer", "Olaf Hellwich"], "brief": "\u672c\u6587\u7cfb\u7edf\u5206\u6790\u4e86\u57fa\u4e8e\u68c0\u6d4b\u5668\u548c\u57fa\u4e8e\u67e5\u8be2\u7684\u573a\u666f\u56fe\u751f\u6210\u65b9\u6cd5\u5728\u9884\u6d4b\u884c\u4e3a\u4e0a\u7684\u5dee\u5f02\uff0c\u53d1\u73b0\u4e24\u8005\u5b58\u5728\u4e92\u8865\u6027\uff0c\u5e76\u63d0\u51faDual-SGG\u65b9\u6cd5\u901a\u8fc7\u53cc\u67e5\u8be2\u8bbe\u8ba1\u878d\u5408\u4e24\u79cd\u63a8\u7406\u673a\u5236\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06176", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u8bbe\u8ba1\u53d7\u63a7\u5b9e\u9a8c\u6846\u67b6\uff0c\u4ece\"\u68c0\u6d4b\u5668\u6761\u4ef6\u53ef\u8fbe\u6027\"\u89c6\u89d2\u91cf\u5316\u4e24\u7c7bSGG\u65b9\u6cd5\u7684\u9884\u6d4b\u5dee\u5f02", "\u53d1\u73b0\u68c0\u6d4b\u5668\u9a71\u52a8\u65b9\u6cd5\u4e0e\u67e5\u8be2\u9a71\u52a8\u65b9\u6cd5\u5728\u9884\u6d4b\u884c\u4e3a\u4e0a\u5b58\u5728\u660e\u663e\u4e92\u8865\u6027", "\u63d0\u51faDual-SGG\u53cc\u67e5\u8be2\u67b6\u6784\uff0c\u5728Visual Genome\u3001Open Images v6\u548cGQA-200\u4e09\u4e2a\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\u6709\u6548\u6027"], "keywords": ["\u573a\u666f\u56fe\u751f\u6210", "\u76ee\u6807\u68c0\u6d4b", "\u89c6\u89c9\u5173\u7cfb\u7406\u89e3", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06176v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Revisiting Scene Graph Generation from the Perspective of Detector-Conditioned Reachability", "tldr": "\u4ece\u68c0\u6d4b\u5668\u6761\u4ef6\u53ef\u8fbe\u6027\u89c6\u89d2\u5206\u6790\u573a\u666f\u56fe\u751f\u6210\u65b9\u6cd5\u5dee\u5f02\uff0c\u63d0\u51fa\u878d\u5408\u53cc\u673a\u5236\u7684Dual-SGG\u65b9\u6cd5", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u5206\u6790\u4e86\u57fa\u4e8e\u68c0\u6d4b\u5668\u548c\u57fa\u4e8e\u67e5\u8be2\u7684\u573a\u666f\u56fe\u751f\u6210\u65b9\u6cd5\u5728\u9884\u6d4b\u884c\u4e3a\u4e0a\u7684\u5dee\u5f02\uff0c\u53d1\u73b0\u4e24\u8005\u5b58\u5728\u4e92\u8865\u6027\uff0c\u5e76\u63d0\u51faDual-SGG\u65b9\u6cd5\u901a\u8fc7\u53cc\u67e5\u8be2\u8bbe\u8ba1\u878d\u5408\u4e24\u79cd\u63a8\u7406\u673a\u5236\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u63ed\u793a\u4e86\u4e24\u5927\u7c7b\u573a\u666f\u56fe\u751f\u6210\u8303\u5f0f\u7684\u4e92\u8865\u673a\u5236\uff0c\u5e76\u5c06\u5206\u6790\u7ed3\u8bba\u76f4\u63a5\u8f6c\u5316\u4e3a\u6a21\u578b\u8bbe\u8ba1\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u65b9\u6cd5\u8bba\u4ef7\u503c\u548c\u5b9e\u7528\u610f\u4e49\u3002"}, {"abstract": "Reliable seam segmentation is essential for autonomous robotic welding in construction, where harsh illumination, specular reflections, and thin weld geometries often degrade segmentation performance. This study proposes a reflection-robust seam segmentation framework that enhances a BiSeNetV2 backbone through transfer learning and a hybrid Cross-Entropy--Lov\u00e1sz loss. Rather than increasing architectural complexity, the proposed framework improves reflection robustness through learning-stability-oriented optimization. Experimental results show that the proposed method achieves 81.76\\% Joint IoU and 90.73\\% mIoU, improving Joint IoU by +22.36 percentage points over the OHEM-based baseline while maintaining identical FLOPs, parameter count, and inference speed. The proposed approach also recovers 96.33\\% of severe zero-IoU failure cases under reflective conditions. Comparative experiments across BiSeNetV2, DeepLabV3+, UNet, and SegFormer further demonstrate that the proposed optimization strategy is particularly effective for lightweight real-time segmentation architectures. Qualitative analyses additionally show improved seam continuity and reflection robustness in challenging welding environments. These findings suggest that the proposed framework provides a practical and lightweight perception solution for robotic welding applications involving reflective metallic surfaces.", "arxiv_id": "2607.06150", "arxiv_url": "https://arxiv.org/abs/2607.06150", "authors": ["Keonvin Park", "Yong Ann Voeurn", "Hyeokjun Kweon", "Doyun Lee"], "brief": "\u63d0\u51fa\u4e00\u79cd\u53cd\u5149\u9c81\u68d2\u7684\u710a\u7f1d\u5206\u5272\u6846\u67b6\uff0c\u901a\u8fc7\u8fc1\u79fb\u5b66\u4e60\u548c\u6df7\u5408Cross-Entropy\u2013Lov\u00e1sz\u635f\u5931\u51fd\u6570\u589e\u5f3aBiSeNetV2\u4e3b\u5e72\u7f51\u7edc\uff0c\u65e0\u9700\u589e\u52a0\u6a21\u578b\u590d\u6742\u5ea6\u5373\u53ef\u663e\u8457\u63d0\u5347\u5efa\u7b51\u710a\u63a5\u673a\u5668\u4eba\u5728\u5f3a\u53cd\u5149\u6761\u4ef6\u4e0b\u7684\u5206\u5272\u7cbe\u5ea6\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06150", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["Joint IoU\u8fbe81.76%\uff0cmIoU\u8fbe90.73%\uff0c\u76f8\u6bd4OHEM\u57fa\u7ebfJoint IoU\u63d0\u5347+22.36\u4e2a\u767e\u5206\u70b9", "\u5728\u53cd\u5149\u6761\u4ef6\u4e0b\u6062\u590d96.33%\u7684\u4e25\u91cd\u96f6IoU\u5931\u8d25\u6848\u4f8b\uff0c\u540c\u65f6\u4fdd\u6301\u76f8\u540cFLOPs\u3001\u53c2\u6570\u91cf\u548c\u63a8\u7406\u901f\u5ea6", "\u6df7\u5408\u635f\u5931\u51fd\u6570\uff08Cross-Entropy + Lov\u00e1sz\uff09\u7ed3\u5408\u8fc1\u79fb\u5b66\u4e60\uff0c\u5bf9BiSeNetV2\u7b49\u8f7b\u91cf\u5b9e\u65f6\u5206\u5272\u67b6\u6784\u6548\u679c\u5c24\u4e3a\u7a81\u51fa"], "keywords": ["\u8bed\u4e49\u5206\u5272", "\u8fc1\u79fb\u5b66\u4e60", "\u5de5\u4e1a\u89c6\u89c9", "\u8f7b\u91cf\u5316\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06150v1", "published_at": "2026-07-07", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Enhanced Seam Segmentation for Automated Welding Robot in Construction Through Transfer Learning: Addressing Limitations of Bilateral Segmentation Network", "tldr": "\u8fc1\u79fb\u5b66\u4e60\u589e\u5f3aBiSeNetV2\uff0c\u63d0\u5347\u710a\u63a5\u673a\u5668\u4eba\u5728\u53cd\u5149\u73af\u5883\u4e0b\u7684\u710a\u7f1d\u5206\u5272\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u53cd\u5149\u9c81\u68d2\u7684\u710a\u7f1d\u5206\u5272\u6846\u67b6\uff0c\u901a\u8fc7\u8fc1\u79fb\u5b66\u4e60\u548c\u6df7\u5408Cross-Entropy\u2013Lov\u00e1sz\u635f\u5931\u51fd\u6570\u589e\u5f3aBiSeNetV2\u4e3b\u5e72\u7f51\u7edc\uff0c\u65e0\u9700\u589e\u52a0\u6a21\u578b\u590d\u6742\u5ea6\u5373\u53ef\u663e\u8457\u63d0\u5347\u5efa\u7b51\u710a\u63a5\u673a\u5668\u4eba\u5728\u5f3a\u53cd\u5149\u6761\u4ef6\u4e0b\u7684\u5206\u5272\u7cbe\u5ea6\u3002", "why_notable": "\u5728\u4e0d\u589e\u52a0\u8ba1\u7b97\u5f00\u9500\u7684\u524d\u63d0\u4e0b\u5927\u5e45\u63d0\u5347\u710a\u7f1d\u5206\u5272\u9c81\u68d2\u6027\uff0c\u4e3a\u5de5\u4e1a\u673a\u5668\u4eba\u5728\u6076\u52a3\u53cd\u5149\u73af\u5883\u4e2d\u7684\u5b9e\u65f6\u611f\u77e5\u63d0\u4f9b\u4e86\u8f7b\u91cf\u7ea7\u5b9e\u7528\u65b9\u6848\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5de5\u7a0b\u843d\u5730\u4ef7\u503c\u3002"}, {"abstract": "Deep learning models have emerged in machine learning and related fields, demonstrating astonishing performance in various visual tasks. Despite their great success, however, these models are unable to fully encode intrinsic visual structures, and often ignore the spatial, topological, and semantic information contained within an image. Graph neural networks offer a good framework to face this aspect, but their effective use for visual tasks has been only partly explored and mainly starting from a limited perspective. This work aims to address this gap by conducting a systematic comparison of current graph construction techniques within the context of a fixed three-layer GCN architecture. Through an empirical study, it demonstrates in particular how the network structure affects performance and provides an important methodological contribution regarding the computational stages preceding graph utilization, which will be strongly influenced by the structure itself.", "arxiv_id": "2607.06295", "arxiv_url": "https://arxiv.org/abs/2607.06295", "authors": ["Alessandra Ibba"], "brief": "\u672c\u6587\u5728\u56fa\u5b9a\u4e09\u5c42GCN\u67b6\u6784\u4e0b\uff0c\u7cfb\u7edf\u6bd4\u8f83\u4e86\u591a\u79cd\u89c6\u89c9\u56fe\u6784\u5efa\u6280\u672f\uff0c\u7814\u7a76\u56fe\u7ed3\u6784\u5bf9\u56fe\u50cf\u5206\u7c7b\u4efb\u52a1\u6027\u80fd\u7684\u5f71\u54cd\uff0c\u5e76\u63ed\u793a\u4e86\u56fe\u5229\u7528\u524d\u8ba1\u7b97\u9636\u6bb5\u7684\u65b9\u6cd5\u8bba\u8d21\u732e\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06295", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": ["\u5728\u7edf\u4e00\u7684\u4e09\u5c42GCN\u67b6\u6784\u4e0b\u5bf9\u6bd4\u591a\u79cd\u56fe\u6784\u5efa\u65b9\u6cd5\uff0c\u6392\u9664\u7f51\u7edc\u6df1\u5ea6\u7b49\u53d8\u91cf\u5e72\u6270", "\u5b9e\u8bc1\u7814\u7a76\u8868\u660e\u56fe\u7684\u62d3\u6251\u7ed3\u6784\u663e\u8457\u5f71\u54cd\u5206\u7c7b\u6027\u80fd\uff0c\u7a7a\u95f4\u3001\u62d3\u6251\u548c\u8bed\u4e49\u4fe1\u606f\u7684\u7f16\u7801\u65b9\u5f0f\u81f3\u5173\u91cd\u8981", "\u63d0\u51fa\u56fe\u5229\u7528\u524d\u9884\u5904\u7406\u8ba1\u7b97\u9636\u6bb5\u7684\u65b9\u6cd5\u8bba\u6307\u5bfc\uff0c\u8be5\u9636\u6bb5\u53d7\u56fe\u7ed3\u6784\u672c\u8eab\u5f3a\u70c8\u5f71\u54cd"], "keywords": ["\u56fe\u795e\u7ecf\u7f51\u7edc", "\u56fe\u50cf\u5206\u7c7b", "\u56fe\u6784\u5efa", "\u8ba1\u7b97\u673a\u89c6\u89c9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06295v1", "published_at": "2026-07-07", "score": 0.125, "selected_reasons": [], "thumbnail": null, "title": "Visual graphs for image classification: does the structure affect performance?", "tldr": "\u7cfb\u7edf\u6bd4\u8f83\u56fe\u6784\u5efa\u6280\u672f\u5bf9GCN\u56fe\u50cf\u5206\u7c7b\u6027\u80fd\u7684\u5f71\u54cd", "upvotes": 0, "what_it_is": "\u672c\u6587\u5728\u56fa\u5b9a\u4e09\u5c42GCN\u67b6\u6784\u4e0b\uff0c\u7cfb\u7edf\u6bd4\u8f83\u4e86\u591a\u79cd\u89c6\u89c9\u56fe\u6784\u5efa\u6280\u672f\uff0c\u7814\u7a76\u56fe\u7ed3\u6784\u5bf9\u56fe\u50cf\u5206\u7c7b\u4efb\u52a1\u6027\u80fd\u7684\u5f71\u54cd\uff0c\u5e76\u63ed\u793a\u4e86\u56fe\u5229\u7528\u524d\u8ba1\u7b97\u9636\u6bb5\u7684\u65b9\u6cd5\u8bba\u8d21\u732e\u3002", "why_notable": "\u586b\u8865\u4e86\u89c6\u89c9\u56fe\u795e\u7ecf\u7f51\u7edc\u7cfb\u7edf\u6027\u5bf9\u6bd4\u7814\u7a76\u7684\u7a7a\u767d\uff0c\u4e3a\u5982\u4f55\u5c06GNN\u6709\u6548\u5e94\u7528\u4e8e\u56fe\u50cf\u5206\u7c7b\u63d0\u4f9b\u4e86\u5b9e\u8bc1\u57fa\u7840\u548c\u65b9\u6cd5\u8bba\u53c2\u8003\uff0c\u6709\u52a9\u4e8e\u6307\u5bfc\u540e\u7eed\u89c6\u89c9GNN\u7684\u8bbe\u8ba1\u9009\u62e9\u3002"}, {"abstract": "Fine-grained food image retrieval is a key task in computational gastronomy, with applications in food traceability, dietary monitoring, and smart catering systems. Although hashing-based retrieval is attractive for large-scale search due to its storage efficiency and fast Hamming-distance computation, existing methods often perform poorly in fine-grained food scenarios, where subtle local semantics and frequency-sensitive visual cues are essential. To address this challenge, we propose RFHNet, a cascaded hierarchical hashing network that captures both global structure and fine-grained local details through multi-level representations. RFHNet includes three components: (1) Fine-grained Relation Modeling (FRM) to capture subtle visual differences among similar food components; (2) Multi-Frequency Modulated Fusion (MFMF) to extract informative multi-frequency features; and (3) Hierarchical Semantic Synergy (HSS) to adaptively integrate multi-level representations and generate discriminative hash codes. Experiments on six food-specific benchmarks show that RFHNet consistently outperforms state-of-the-art hashing methods, with mAP gains of 4.44\\% to 17.20\\% at 12 bits. These results validate the effectiveness of RFHNet for large-scale visual food retrieval and smart catering applications. The source code will be released upon publication.", "arxiv_id": "2607.06148", "arxiv_url": "https://arxiv.org/abs/2607.06148", "authors": ["Junsong Wang", "Weiqing Min", "Guorui Sheng", "Tao Yao", "Lili Wang", "Shuqiang Jiang"], "brief": "\u63d0\u51faRFHNet\uff0c\u4e00\u79cd\u7528\u4e8e\u5927\u89c4\u6a21\u7ec6\u7c92\u5ea6\u98df\u7269\u56fe\u50cf\u68c0\u7d22\u7684\u5c42\u7ea7\u54c8\u5e0c\u7f51\u7edc\uff0c\u901a\u8fc7\u7ec6\u7c92\u5ea6\u5173\u7cfb\u5efa\u6a21\u3001\u591a\u9891\u7387\u878d\u5408\u548c\u5c42\u7ea7\u8bed\u4e49\u534f\u540c\u4e09\u4e2a\u6a21\u5757\u6355\u83b7\u5168\u5c40\u7ed3\u6784\u4e0e\u5c40\u90e8\u7ec6\u8282\u3002\u5728\u516d\u4e2a\u98df\u7269\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\uff0c12\u4f4d\u54c8\u5e0c\u7801\u7684mAP\u63d0\u5347\u8fbe4.44%\u81f317.20%\uff0c\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u54c8\u5e0c\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06148", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u50cf\u68c0\u7d22", "\u54c8\u5e0c\u5b66\u4e60", "\u7ec6\u7c92\u5ea6\u8bc6\u522b", "\u591a\u9891\u7387\u7279\u5f81"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06148v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "RFHNet: Relational and Frequency-Aware Hashing Network for Large-Scale Fine-Grained Food Image Retrieval", "tldr": "\u63d0\u51faRFHNet\uff0c\u4e00\u79cd\u7528\u4e8e\u5927\u89c4\u6a21\u7ec6\u7c92\u5ea6\u98df\u7269\u56fe\u50cf\u68c0\u7d22\u7684\u5c42\u7ea7\u54c8\u5e0c\u7f51\u7edc\uff0c\u901a\u8fc7\u7ec6\u7c92\u5ea6\u5173\u7cfb\u5efa\u6a21\u3001\u591a\u9891\u7387\u878d\u5408\u548c\u5c42\u7ea7\u8bed\u4e49\u534f\u540c\u4e09\u4e2a\u6a21\u5757\u6355\u83b7\u5168\u5c40\u7ed3\u6784\u4e0e\u5c40\u90e8\u7ec6\u8282\u3002\u5728\u516d\u4e2a\u98df\u7269\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\uff0c12\u4f4d\u54c8\u5e0c\u7801\u7684mAP\u63d0\u5347\u8fbe4.44%\u81f317.20%\uff0c\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u54c8\u5e0c\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent diffusion-based generative models have shown impressive performance in image generation and editing. However, due to memory limitations and the high cost of collecting high-resolution training images, existing methods are typically restricted to inputs with linear resolutions below 1K. In contrast, photos captured by modern mobile devices often reach linear resolutions up to 8K, revealing a significant gap between current capabilities and real-world demands. Simply upscaling low-resolution edited results often results in visually enlarged but blurry images that lack fine details. This paper introduces UltraDiffEdit, a novel, tuning-free image editing framework that extends off-the-shelf latent diffusion models (LDMs) to ultrahigh resolutions. UltraDiffEdit employs a multi-scale progressive editing strategy, iteratively blending high-resolution edited content with unedited areas in a coarse-to-fine manner. We employ multi-patch encoding to preserve both edited and unedited visual details within the latent space. To mitigate editing artifacts, our global-local consistency denoising technique consistently integrates edited and unedited latent features, ensuring smooth transition at editing boundaries from the latent representation to the final image. We also introduce a patch-based hybrid sampling approach that captures local, intermediate, and global features, ensuring semantic coherence and enhancing fine detail during denoising. We conduct extensive experiments demonstrating UltraDiffEdit\u0027s superior editing quality and flexibility: it can handle image resolutions up to 8K using only a single NVIDIA GeForce RTX 3090 GPU. The source code is publicly available at https://github.com/LonglongaaaGo/UltraDiffEdit.", "arxiv_id": "2607.06136", "arxiv_url": "https://arxiv.org/abs/2607.06136", "authors": ["Wanglong Lu", "Lingming Su", "Kaijie Shi", "Minglun Gong", "Xiaogang Jin", "Hanli Zhao", "Xianta Jiang"], "brief": "\u63d0\u51faUltraDiffEdit\uff0c\u4e00\u79cd\u65e0\u9700\u5fae\u8c03\u7684\u6f5c\u5728\u6269\u6563\u6a21\u578b\u56fe\u50cf\u7f16\u8f91\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u5c3a\u5ea6\u6e10\u8fdb\u7f16\u8f91\u3001\u591a\u8865\u4e01\u7f16\u7801\u548c\u5168\u5c40-\u5c40\u90e8\u4e00\u81f4\u6027\u53bb\u566a\u7b49\u6280\u672f\uff0c\u5c06\u73b0\u6709\u6269\u6563\u6a21\u578b\u6269\u5c55\u81f3\u8d85\u9ad8\u5206\u8fa8\u7387\uff08\u6700\u9ad88K\uff09\u56fe\u50cf\u7f16\u8f91\uff0c\u4ec5\u9700\u5355\u5f20RTX 3090 GPU\u5373\u53ef\u8fd0\u884c\u3002", "categories": ["cs.CV", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06136", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u56fe\u50cf\u7f16\u8f91", "\u8d85\u9ad8\u5206\u8fa8\u7387", "\u65e0\u8c03\u4f18"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06136v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Tuning-Free Latent Diffusion Models for Ultrahigh-Resolution Image Editing", "tldr": "\u63d0\u51faUltraDiffEdit\uff0c\u4e00\u79cd\u65e0\u9700\u5fae\u8c03\u7684\u6f5c\u5728\u6269\u6563\u6a21\u578b\u56fe\u50cf\u7f16\u8f91\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u5c3a\u5ea6\u6e10\u8fdb\u7f16\u8f91\u3001\u591a\u8865\u4e01\u7f16\u7801\u548c\u5168\u5c40-\u5c40\u90e8\u4e00\u81f4\u6027\u53bb\u566a\u7b49\u6280\u672f\uff0c\u5c06\u73b0\u6709\u6269\u6563\u6a21\u578b\u6269\u5c55\u81f3\u8d85\u9ad8\u5206\u8fa8\u7387\uff08\u6700\u9ad88K\uff09\u56fe\u50cf\u7f16\u8f91\uff0c\u4ec5\u9700\u5355\u5f20RTX 3090 GPU\u5373\u53ef\u8fd0\u884c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Text-to-image diffusion models have achieved high visual fidelity and broad adoption, but remain vulnerable to safety violations when adversaries exploit them to synthesize illicit content. Existing alignment paradigms, from input sanitization to structural feature pruning, are largely organized around unsafe concepts explicitly exposed during filtering, editing, or localization. This leaves a blind spot for visual synonym attacks (VSA), a jailbreak where benign-looking prompts elicit prohibited imagery through implicit visual associations. As a result, current defenses face a safety-utility dilemma: they may either under-mitigate VSA threats or over-suppress visually similar benign concepts. The core challenge is that VSA hides the unsafe target at the textual surface while revealing it through generation-time visual-semantic convergence. In this work, we therefore shift from static suppression of pre-specified unsafe concepts to dynamic tracing of how unsafe semantics emerge during generation. Our mechanistic analysis shows that VSA and explicit unsafe prompts converge through sparse semantic-injecting attention heads, which serve as inference-time bottlenecks for prohibited visual semantics. Based on this insight, we propose AEGIS (Adaptive Evasion Guard via Identification and Steering), an inference-time defense that applies similarity-aware repulsion only at the identified vulnerable heads. Evaluated against 16 baselines, AEGIS improves both safety and utility. On SD 1.4, it reduces ASR to $\\mathbf{0.00}/\\mathbf{0.03}$ for in-domain violence/nudity VSA and achieves ASRs $\\le \\mathbf{0.09}$ on out-of-domain explicit and adversarial attacks. It preserves benign fidelity, avoids suppressing hard-negative concepts, and transfers to SD 2.1 and FLUX.1 after re-identifying the critical heads for each backbone.", "arxiv_id": "2607.06120", "arxiv_url": "https://arxiv.org/abs/2607.06120", "authors": ["Yuanmin Huang", "Zhenfei Zhang", "Mi Zhang", "Geng Hong", "Qinqin He", "Jialing Tao", "Hui Xue", "Min Yang"], "brief": "\u9488\u5bf9\u6587\u672c\u751f\u6210\u56fe\u50cf\u6a21\u578b\u4e2d\u7684\"\u89c6\u89c9\u540c\u4e49\u8bcd\u8d8a\u72f1\"\u653b\u51fb\uff08\u7528\u65e0\u5bb3\u63d0\u793a\u8bcd\u901a\u8fc7\u9690\u5f0f\u89c6\u89c9\u5173\u8054\u751f\u6210\u8fdd\u7981\u5185\u5bb9\uff09\uff0c\u672c\u6587\u63d0\u51faAEGIS\u9632\u5fa1\u673a\u5236\u3002\u901a\u8fc7\u673a\u5236\u5206\u6790\u53d1\u73b0\u653b\u51fb\u6536\u655b\u4e8e\u5c11\u91cf\u8bed\u4e49\u6ce8\u5165\u6ce8\u610f\u529b\u5934\uff0cAEGIS\u5728\u63a8\u7406\u65f6\u4ec5\u5bf9\u8fd9\u4e9b\u5173\u952e\u5934\u65bd\u52a0\u76f8\u4f3c\u5ea6\u6392\u65a5\uff0c\u5728\u5927\u5e45\u964d\u4f4e\u653b\u51fb\u6210\u529f\u7387\u7684\u540c\u65f6\u4fdd\u7559\u6b63\u5e38\u751f\u6210\u8d28\u91cf\uff0c\u5e76\u53ef\u8fc1\u79fb\u81f3\u591a\u79cd\u6a21\u578b\u9aa8\u5e72\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06120", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u751f\u6210\u56fe\u50cf", "\u5b89\u5168\u9632\u5fa1", "\u6269\u6563\u6a21\u578b", "\u8d8a\u72f1\u653b\u51fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06120v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AEGIS: A Mechanism-Guided Defense against Visual Synonym Jailbreaks in Text-to-Image Models", "tldr": "\u9488\u5bf9\u6587\u672c\u751f\u6210\u56fe\u50cf\u6a21\u578b\u4e2d\u7684\"\u89c6\u89c9\u540c\u4e49\u8bcd\u8d8a\u72f1\"\u653b\u51fb\uff08\u7528\u65e0\u5bb3\u63d0\u793a\u8bcd\u901a\u8fc7\u9690\u5f0f\u89c6\u89c9\u5173\u8054\u751f\u6210\u8fdd\u7981\u5185\u5bb9\uff09\uff0c\u672c\u6587\u63d0\u51faAEGIS\u9632\u5fa1\u673a\u5236\u3002\u901a\u8fc7\u673a\u5236\u5206\u6790\u53d1\u73b0\u653b\u51fb\u6536\u655b\u4e8e\u5c11\u91cf\u8bed\u4e49\u6ce8\u5165\u6ce8\u610f\u529b\u5934\uff0cAEGIS\u5728\u63a8\u7406\u65f6\u4ec5\u5bf9\u8fd9\u4e9b\u5173\u952e\u5934\u65bd\u52a0\u76f8\u4f3c\u5ea6\u6392\u65a5\uff0c\u5728\u5927\u5e45\u964d\u4f4e\u653b\u51fb\u6210\u529f\u7387\u7684\u540c\u65f6\u4fdd\u7559\u6b63\u5e38\u751f\u6210\u8d28\u91cf\uff0c\u5e76\u53ef\u8fc1\u79fb\u81f3\u591a\u79cd\u6a21\u578b\u9aa8\u5e72\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multi-perturbation adversarial training (MAT) aims to achieve robustness against multiple $\\ell_p$ perturbations but suffers from robustness trade-offs between different threats. To address this, we employ a mixture of experts (MoE) to route different threats through distinct model pathways. However, naive application of MoE encounters two critical challenges: experts tend to overlook threat-specific features and redundantly capture features shared across threats, and gating networks suffer from threat-agnostic routing where they learn nearly identical routing patterns across threats, thus preventing the construction of threat-specific model pathways. To this end, we propose Robust Mixture of Low-Rank Experts (RoME), where each expert is a low-rank additive update to the shared backbone, allowing it to capture threat-common features while experts focus on threat-specific information. To address threat-agnostic routing, RoME introduces (i) dual-scale gating that exploits threat-discriminative signals from local and global level features, and (ii) threat-guided gating diversification that enforces diverse expert utilization across threats. Extensive experiments demonstrate that RoME outperforms existing state-of-the-art MAT in union robustness and natural accuracy and improves robustness against unseen threats. Codes are available at https://github.com/wkim97/RoME.", "arxiv_id": "2607.06109", "arxiv_url": "https://arxiv.org/abs/2607.06109", "authors": ["Woo Jae Kim", "Kyle Min", "Suhyeon Ha", "Joonsung Jeon", "Sung-eui Yoon"], "brief": "\u63d0\u51faRoME\u6846\u67b6\uff0c\u5c06\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09\u4e0e\u4f4e\u79e9\u66f4\u65b0\u7ed3\u5408\u7528\u4e8e\u591a\u6270\u52a8\u5bf9\u6297\u8bad\u7ec3\uff0c\u901a\u8fc7\u53cc\u5c3a\u5ea6\u95e8\u63a7\u548c\u5a01\u80c1\u5f15\u5bfc\u591a\u6837\u5316\u8def\u7531\u89e3\u51b3\u4e13\u5bb6\u5197\u4f59\u548c\u8def\u7531\u65e0\u5dee\u5f02\u95ee\u9898\uff0c\u5728\u591a\u79cd\u5bf9\u6297\u5a01\u80c1\u4e0b\u7684\u8054\u5408\u9c81\u68d2\u6027\u548c\u81ea\u7136\u7cbe\u5ea6\u4e0a\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06109", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5bf9\u6297\u8bad\u7ec3", "\u6df7\u5408\u4e13\u5bb6", "\u9c81\u68d2\u6027", "\u4f4e\u79e9\u9002\u914d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06109v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "RoME: Robust Mixture of Low-Rank Experts against Multiple Adversarial Perturbations", "tldr": "\u63d0\u51faRoME\u6846\u67b6\uff0c\u5c06\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09\u4e0e\u4f4e\u79e9\u66f4\u65b0\u7ed3\u5408\u7528\u4e8e\u591a\u6270\u52a8\u5bf9\u6297\u8bad\u7ec3\uff0c\u901a\u8fc7\u53cc\u5c3a\u5ea6\u95e8\u63a7\u548c\u5a01\u80c1\u5f15\u5bfc\u591a\u6837\u5316\u8def\u7531\u89e3\u51b3\u4e13\u5bb6\u5197\u4f59\u548c\u8def\u7531\u65e0\u5dee\u5f02\u95ee\u9898\uff0c\u5728\u591a\u79cd\u5bf9\u6297\u5a01\u80c1\u4e0b\u7684\u8054\u5408\u9c81\u68d2\u6027\u548c\u81ea\u7136\u7cbe\u5ea6\u4e0a\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "High-resolution RGB imagery acquired from low-altitude UAV surveys was processed through a modular pipeline incorporating transformer-based semantic segmentation, connected-component vegetation extraction, fine-grained species classification using a ConvNeXt architecture, and grid-based dominance scoring at 2x2m resolution. The framework targeted two ecologically significant halophytic grasses, Spartina maritima and Puccinellia maritima, and was trained using a curated and manually annotated UAV imagery, along with biodiversity imagery sourced from publicly accessible datasets. In order to identify these plants from the imagery, our segmentation yielded reliable species masks (mean IoU = 0.56; pixel-level accuracy = 0.96), while object-level classification achieved very good discrimination (F1 = 0.99). Dominance estimates closely matched quadrat-based field surveys, with mean absolute differences below 8%, preserving fine-scale spatial structure under realistic survey conditions. The developed system, named EcoVision, establishes a practical foundation for scalable, high-resolution salt marsh monitoring, demonstrating how AI-driven workflows can translate pixel-level predictions into ecologically interpretable metrics.", "arxiv_id": "2607.06105", "arxiv_url": "https://arxiv.org/abs/2607.06105", "authors": ["Innocent Onyenonachi", "Peter J. Lawerance", "Nadia Kanwal"], "brief": "\u63d0\u51faEcoVision\u7cfb\u7edf\uff0c\u5229\u7528\u65e0\u4eba\u673a\u4f4e\u7a7aRGB\u56fe\u50cf\u7ed3\u5408Transformer\u8bed\u4e49\u5206\u5272\u548cConvNeXt\u5206\u7c7b\u7f51\u7edc\uff0c\u5bf9\u76d0\u6cbc\u690d\u88ab\u8fdb\u884c\u9ad8\u5206\u8fa8\u7387\u76d1\u6d4b\u4e0e\u4f18\u52bf\u5ea6\u5236\u56fe\u3002\u7cfb\u7edf\u5728\u7269\u79cd\u5206\u5272\uff08mIoU=0.56\uff0c\u50cf\u7d20\u7cbe\u5ea60.96\uff09\u548c\u76ee\u6807\u7ea7\u5206\u7c7b\uff08F1=0.99\uff09\u4e0a\u8868\u73b0\u4f18\u5f02\uff0c\u4f18\u52bf\u5ea6\u4f30\u8ba1\u4e0e\u5b9e\u5730\u8c03\u67e5\u8bef\u5dee\u4f4e\u4e8e8%\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06105", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9065\u611f\u56fe\u50cf", "\u8bed\u4e49\u5206\u5272", "\u65e0\u4eba\u673a", "\u751f\u6001\u76d1\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06105v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "EcoVision: AI-Powered Drone Imaging for Salt Marsh Vegetation Monitoring and Dominance Mapping", "tldr": "\u63d0\u51faEcoVision\u7cfb\u7edf\uff0c\u5229\u7528\u65e0\u4eba\u673a\u4f4e\u7a7aRGB\u56fe\u50cf\u7ed3\u5408Transformer\u8bed\u4e49\u5206\u5272\u548cConvNeXt\u5206\u7c7b\u7f51\u7edc\uff0c\u5bf9\u76d0\u6cbc\u690d\u88ab\u8fdb\u884c\u9ad8\u5206\u8fa8\u7387\u76d1\u6d4b\u4e0e\u4f18\u52bf\u5ea6\u5236\u56fe\u3002\u7cfb\u7edf\u5728\u7269\u79cd\u5206\u5272\uff08mIoU=0.56\uff0c\u50cf\u7d20\u7cbe\u5ea60.96\uff09\u548c\u76ee\u6807\u7ea7\u5206\u7c7b\uff08F1=0.99\uff09\u4e0a\u8868\u73b0\u4f18\u5f02\uff0c\u4f18\u52bf\u5ea6\u4f30\u8ba1\u4e0e\u5b9e\u5730\u8c03\u67e5\u8bef\u5dee\u4f4e\u4e8e8%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "3D dense captioning, an emerging vision-language task, aims to generate descriptive sentences for each object in the 3D scene. Despite the impressive results achieved by previous methods, they suffer from two limitations. First, current research often employs global rigid transformations, such as rotation, to augment scenes without changing their spatial layouts. However, diverse spatial layouts are crucial for training a 3D dense captioning model to describe spatial relations between objects. Second, previous works mainly focus on the design of the caption generation pipeline while utilizing a simple network architecture for other components, i.e., backbone and detection head, which is crucial for extracting rich semantic information for captioning. In this paper, we propose PVCap to alleviate the aforementioned problems. Our PVCap consists of PseudoCap and VoxelCapNet. Specifically, PseudoCap employs a random mixing technique on instances within the dataset, generating numerous pseudo frames with diverse spatial layouts at the instance level. By utilizing a teacher-student framework, PseudoCap obtains pseudo caption labels for these pseudo frames. This data augmentation approach significantly increases the number of training samples and enhances the model\u0027s ability to describe the environment effectively. Regarding VoxelCapNet, we introduce a robust caption network that utilizes voxel features and adapts the caption head to the voxel-based network architecture. Our VoxelCapNet can serve as a competitive baseline for future research on 3D dense captioning. Extensive experiments are conducted on two prevalent benchmarks, i.e., ScanRefer and Nr3D. Notably, our method surpasses current state-of-the-art by 11.41% and 13.99% in CIDEr@0.5IoU, respectively. Codes will be made publicly available.", "arxiv_id": "2607.06097", "arxiv_url": "https://arxiv.org/abs/2607.06097", "authors": ["Xiaopei Wu", "Chenshu Hou", "Liang Peng", "Dan Xu", "Binbin Lin", "Xiaoshui Huang", "Yuenan Hou", "Yu Li", "Wenxiao Wang", "Haifeng Liu", "Deng Cai", "Wanli Ouyang"], "brief": "\u63d0\u51faPVCap\u6846\u67b6\u89e3\u51b33D\u5bc6\u96c6\u5b57\u5e55\u751f\u6210\u4e2d\u7a7a\u95f4\u5e03\u5c40\u591a\u6837\u6027\u4e0d\u8db3\u548c\u7f51\u7edc\u67b6\u6784\u7b80\u5355\u7684\u95ee\u9898\u3002\u901a\u8fc7PseudoCap\u5229\u7528\u5b9e\u4f8b\u968f\u673a\u6df7\u5408\u751f\u6210\u591a\u6837\u7a7a\u95f4\u5e03\u5c40\u7684\u4f2a\u5e27\u5e76\u7528\u5e08\u751f\u6846\u67b6\u83b7\u53d6\u4f2a\u6807\u7b7e\uff0c\u540c\u65f6\u8bbe\u8ba1\u57fa\u4e8e\u4f53\u7d20\u7279\u5f81\u7684VoxelCapNet\u3002\u5728ScanRefer\u548cNr3D\u57fa\u51c6\u4e0a\u5206\u522b\u8d85\u8d8a\u5f53\u524d\u6700\u4f18\u65b9\u6cd511.41%\u548c13.99%\uff08CIDEr@0.5IoU\uff09\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06097", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u573a\u666f\u7406\u89e3", "\u5bc6\u96c6\u5b57\u5e55\u751f\u6210", "\u6570\u636e\u589e\u5f3a", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06097v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PVCap: Towards Accurate 3D Dense Captioning via PseudoCap and VoxelCapNet", "tldr": "\u63d0\u51faPVCap\u6846\u67b6\u89e3\u51b33D\u5bc6\u96c6\u5b57\u5e55\u751f\u6210\u4e2d\u7a7a\u95f4\u5e03\u5c40\u591a\u6837\u6027\u4e0d\u8db3\u548c\u7f51\u7edc\u67b6\u6784\u7b80\u5355\u7684\u95ee\u9898\u3002\u901a\u8fc7PseudoCap\u5229\u7528\u5b9e\u4f8b\u968f\u673a\u6df7\u5408\u751f\u6210\u591a\u6837\u7a7a\u95f4\u5e03\u5c40\u7684\u4f2a\u5e27\u5e76\u7528\u5e08\u751f\u6846\u67b6\u83b7\u53d6\u4f2a\u6807\u7b7e\uff0c\u540c\u65f6\u8bbe\u8ba1\u57fa\u4e8e\u4f53\u7d20\u7279\u5f81\u7684VoxelCapNet\u3002\u5728ScanRefer\u548cNr3D\u57fa\u51c6\u4e0a\u5206\u522b\u8d85\u8d8a\u5f53\u524d\u6700\u4f18\u65b9\u6cd511.41%\u548c13.99%\uff08CIDEr@0.5IoU\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Existing deep learning methods perform well in medical image classification but struggle with multi-scale morphology and limited annotations due to fixed sampling and data-hungry training. Existing approaches address these challenges in isolation: DCN-based models provide adaptive sampling but lack explicit multi-scale attention fusion and label-efficient regularisation; multi-scale architectures typically rely on static fusion; and semi-supervised methods target label scarcity without jointly modelling adaptive cross-scale representations. We propose MSA-DCNN, a scale-consistent deformable attention learning framework that introduces adaptive multi-scale sampling, within-scale saliency refinement, learned cross-scale fusion, and auxiliary self-distillation within a unified optimisation scheme, with potential to generalise to structurally heterogeneous anatomy. We evaluate on three public benchmarks and an external hold-out set for leukaemia. MSA-DCNN demonstrates competitive and often better performance against ViT baselines, CNN baselines, and a MICCAI semi-supervised baseline under distribution shift and label scarcity in accuracy, F1, and AUC (binary), while using fewer parameters. Ablations confirm complementary component contributions, supporting MSA-DCNN as a practical foundation for data-efficient medical image classification.", "arxiv_id": "2607.06083", "arxiv_url": "https://arxiv.org/abs/2607.06083", "authors": ["Hamza Hussaini", "Shahana Bano", "Eyad Elyan", "Carlos Francisco Moreno-Garc\u00eda"], "brief": "\u63d0\u51faMSA-DCNN\u6846\u67b6\uff0c\u7ed3\u5408\u81ea\u9002\u5e94\u591a\u5c3a\u5ea6\u53ef\u53d8\u5f62\u91c7\u6837\u3001\u8de8\u5c3a\u5ea6\u6ce8\u610f\u529b\u878d\u5408\u4e0e\u81ea\u84b8\u998f\u6b63\u5219\u5316\uff0c\u7edf\u4e00\u89e3\u51b3\u533b\u5b66\u56fe\u50cf\u5206\u7c7b\u4e2d\u7684\u591a\u5c3a\u5ea6\u5f62\u6001\u5efa\u6a21\u4e0e\u6807\u6ce8\u7a00\u7f3a\u95ee\u9898\u3002\u5728\u4e09\u4e2a\u516c\u5f00\u57fa\u51c6\u53ca\u767d\u8840\u75c5\u5916\u90e8\u6d4b\u8bd5\u96c6\u4e0a\uff0c\u4ee5\u66f4\u5c11\u53c2\u6570\u5b9e\u73b0\u4f18\u4e8eViT\u548cCNN\u57fa\u7ebf\u7684\u51c6\u786e\u7387\u3001F1\u548cAUC\u8868\u73b0\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06083", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5206\u7c7b", "\u53ef\u53d8\u5f62\u5377\u79ef", "\u591a\u5c3a\u5ea6\u5b66\u4e60", "\u534a\u76d1\u7763\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06083v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MSA-DCNN: A Data-Efficient Multi-Scale Deformable CNN for Medical Image Classification", "tldr": "\u63d0\u51faMSA-DCNN\u6846\u67b6\uff0c\u7ed3\u5408\u81ea\u9002\u5e94\u591a\u5c3a\u5ea6\u53ef\u53d8\u5f62\u91c7\u6837\u3001\u8de8\u5c3a\u5ea6\u6ce8\u610f\u529b\u878d\u5408\u4e0e\u81ea\u84b8\u998f\u6b63\u5219\u5316\uff0c\u7edf\u4e00\u89e3\u51b3\u533b\u5b66\u56fe\u50cf\u5206\u7c7b\u4e2d\u7684\u591a\u5c3a\u5ea6\u5f62\u6001\u5efa\u6a21\u4e0e\u6807\u6ce8\u7a00\u7f3a\u95ee\u9898\u3002\u5728\u4e09\u4e2a\u516c\u5f00\u57fa\u51c6\u53ca\u767d\u8840\u75c5\u5916\u90e8\u6d4b\u8bd5\u96c6\u4e0a\uff0c\u4ee5\u66f4\u5c11\u53c2\u6570\u5b9e\u73b0\u4f18\u4e8eViT\u548cCNN\u57fa\u7ebf\u7684\u51c6\u786e\u7387\u3001F1\u548cAUC\u8868\u73b0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Visual SLAM is a well-established technology utilized in a wide range of real-world applications. However, its performance still degrades under challenging visual conditions, such as low texture, severe motion blur, and poor illumination. Systems based on deep learning outperform classical geometry-based ones and achieve state-of-the-art results by combining learned 2D data association and uncertainty with differentiable geometric optimization in recurrent architectures. Still, it remains unclear exactly which components are fundamentally responsible for this success. In this paper, we ask: Is the superior performance of deep learning-based systems driven primarily by learned 2D data association, the combination of learned 2D data association and uncertainty, or the recurrent architecture itself? We investigate this question empirically by conducting a controlled study. Our findings reveal that the success of DL-based V-SLAM systems hinges on learned 2D data association and uncertainty rather than their recurrent architecture, underscoring the necessity of learning-based paradigms for the design of these components. Upon acceptance, the code will be released as open source.", "arxiv_id": "2607.06023", "arxiv_url": "https://arxiv.org/abs/2607.06023", "authors": ["Giovanni Cioffi", "Davide Scaramuzza"], "brief": "\u672c\u6587\u901a\u8fc7\u53d7\u63a7\u5b9e\u9a8c\u7814\u7a76\u6df1\u5ea6\u5b66\u4e60\u4e3a\u4f55\u80fd\u63d0\u5347\u89c6\u89c9SLAM\u6027\u80fd\uff0c\u53d1\u73b0\u5173\u952e\u5728\u4e8e\u5b66\u4e60\u5230\u76842D\u6570\u636e\u5173\u8054\u4e0e\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1\uff0c\u800c\u975e\u5faa\u73af\u7f51\u7edc\u67b6\u6784\u672c\u8eab\u3002\u8fd9\u4e00\u53d1\u73b0\u4e3a\u672a\u6765\u89c6\u89c9SLAM\u7cfb\u7edf\u7684\u8bbe\u8ba1\u63d0\u4f9b\u4e86\u660e\u786e\u7684\u65b9\u5411\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06023", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9SLAM", "\u6df1\u5ea6\u5b66\u4e60", "\u6570\u636e\u5173\u8054", "\u51e0\u4f55\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06023v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Why does Deep Learning Improve Visual SLAM?", "tldr": "\u672c\u6587\u901a\u8fc7\u53d7\u63a7\u5b9e\u9a8c\u7814\u7a76\u6df1\u5ea6\u5b66\u4e60\u4e3a\u4f55\u80fd\u63d0\u5347\u89c6\u89c9SLAM\u6027\u80fd\uff0c\u53d1\u73b0\u5173\u952e\u5728\u4e8e\u5b66\u4e60\u5230\u76842D\u6570\u636e\u5173\u8054\u4e0e\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1\uff0c\u800c\u975e\u5faa\u73af\u7f51\u7edc\u67b6\u6784\u672c\u8eab\u3002\u8fd9\u4e00\u53d1\u73b0\u4e3a\u672a\u6765\u89c6\u89c9SLAM\u7cfb\u7edf\u7684\u8bbe\u8ba1\u63d0\u4f9b\u4e86\u660e\u786e\u7684\u65b9\u5411\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Non-invasive prediction of Gleason Grade Group (GGG) in prostate cancer using multiparametric MRI (mpMRI) is clinically vital for reducing unnecessary biopsies. Existing GGG prediction methods face two major limitations. First, they often overlook non-image information critical for GGG prediction, including age, prostate-specific antigen (PSA), and expert priors embedded in radiology reports. Second, they tend to oversimplify GGG as flat categorical labels, failing to account for its intrinsic hierarchy of primary and secondary Gleason patterns. To this end, we propose a novel Knowledge-Driven Ordinal-Aware Learning (KOAL) framework with three synergistic modules. Specifically, the Clinical-Context Modulation (CCM) module uses clinical variables (e.g., age and PSA) to dynamically modulate discriminative image representations. The Knowledge-Guided Prototype Alignment (KGPA) module leverages an LLM to extract group-specific expert knowledge from training radiology reports and clinical guidelines, producing offline semantic anchors describing grade-specific radiological findings without requiring patient-specific reports at inference. Through prototype contrastive alignment, patient-specific mpMRI representations are matched with these anchors to promote pathology-aligned representation learning. The Hierarchical Ordinal-aware Constraints (HOC) module decouples primary and secondary Gleason pattern prediction and maps their probabilistic outputs to GGG via a Differentiable Bio-logic Mapping Layer (DBML), ensuring pathological grading consistency. Experiments on public PI-CAI and in-house datasets demonstrate that KOAL outperforms state-of-the-art methods. Code is available at: https://github.com/Gother-GZ/KOAL.", "arxiv_id": "2607.06019", "arxiv_url": "https://arxiv.org/abs/2607.06019", "authors": ["Zheng Guo", "Jiaqi Cui", "Haocheng Xiong", "Jize Han", "Bo Liu", "Qianwen Zhang", "Rui Chen", "Yan Wang"], "brief": "\u63d0\u51faKOAL\u6846\u67b6\uff0c\u5229\u7528\u4e34\u5e8a\u53d8\u91cf\u3001\u653e\u5c04\u62a5\u544a\u77e5\u8bc6\u548c\u683c\u91cc\u68ee\u5206\u7ea7\u5c42\u6b21\u7ed3\u6784\u6765\u9884\u6d4b\u524d\u5217\u817a\u764c\u683c\u91cc\u68ee\u5206\u7ea7\u7ec4\u3002\u901a\u8fc7\u4e34\u5e8a\u4e0a\u4e0b\u6587\u8c03\u5236\u3001\u77e5\u8bc6\u5f15\u5bfc\u539f\u578b\u5bf9\u9f50\u548c\u5c42\u6b21\u5e8f\u6570\u611f\u77e5\u7ea6\u675f\u4e09\u4e2a\u6a21\u5757\u534f\u540c\u5de5\u4f5c\uff0c\u5728\u516c\u5f00\u548c\u79c1\u6709\u6570\u636e\u96c6\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06019", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5206\u6790", "\u591a\u6a21\u6001", "\u524d\u5217\u817a\u764c\u5206\u7ea7", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06019v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "KOAL: Knowledge-Driven Prostate Cancer Grading with Ordinal-Aware Learning", "tldr": "\u63d0\u51faKOAL\u6846\u67b6\uff0c\u5229\u7528\u4e34\u5e8a\u53d8\u91cf\u3001\u653e\u5c04\u62a5\u544a\u77e5\u8bc6\u548c\u683c\u91cc\u68ee\u5206\u7ea7\u5c42\u6b21\u7ed3\u6784\u6765\u9884\u6d4b\u524d\u5217\u817a\u764c\u683c\u91cc\u68ee\u5206\u7ea7\u7ec4\u3002\u901a\u8fc7\u4e34\u5e8a\u4e0a\u4e0b\u6587\u8c03\u5236\u3001\u77e5\u8bc6\u5f15\u5bfc\u539f\u578b\u5bf9\u9f50\u548c\u5c42\u6b21\u5e8f\u6570\u611f\u77e5\u7ea6\u675f\u4e09\u4e2a\u6a21\u5757\u534f\u540c\u5de5\u4f5c\uff0c\u5728\u516c\u5f00\u548c\u79c1\u6709\u6570\u636e\u96c6\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Real estate property listings expose structured metadata through the API. Still, the richest property-level information (i.e., legal status, structural condition, utility supplies, heating systems) sits in attached questionnaire documents that no automated system currently processes at scale. These documents are heterogeneous. Some are digitally generated with selectable text, others are scanned physical forms. There are even more complex layouts that contain checkbox annotations that defeat conventional text extraction. In this paper, we present an end-to-end pipeline for acquiring, classifying, and extracting structured data from selectable text documents. The pipeline was applied to 3965 questionnaire documents collected from a live property platform via reverse-engineered REST APIs. First, we classified each document into one of three structural categories (text_only, scanned, and special_char), then extracted 35 predefined property attributes from eligible documents using DeepSeek R1 as the Large Language Model, prompted to return a structured JSON object. All 2781 submitted documents were processed successfully, producing a final dataset of 2766 unique property records. Downstream validation confirmed the data quality. Cosine similarity matching achieves a Jaccard consistency score of 0.82, and K-Means clustering produces interpretable market segments with a silhouette score of 0.2088. Results show that the proposed extraction from each property document is both feasible and reliable at this scale.", "arxiv_id": "2607.06012", "arxiv_url": "https://arxiv.org/abs/2607.06012", "authors": ["Muhammad Assad Shehbaz", "Carlos Francisco Moreno-Garc\u00eda"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u7aef\u5230\u7aef\u6d41\u6c34\u7ebf\uff0c\u5bf9\u623f\u5730\u4ea7\u95ee\u5377\u6587\u6863\u8fdb\u884c\u5206\u7c7b\uff08\u7eaf\u6587\u672c/\u626b\u63cf/\u7279\u6b8a\u5b57\u7b26\uff09\u5e76\u5229\u7528DeepSeek R1\u5927\u8bed\u8a00\u6a21\u578b\u63d0\u53d635\u4e2a\u7ed3\u6784\u5316\u5c5e\u6027\uff0c\u6210\u529f\u5904\u74062781\u4efd\u6587\u6863\uff0c\u751f\u6210\u9ad8\u8d28\u91cf\u623f\u4ea7\u6570\u636e\u96c6\uff0c\u4f59\u5f26\u76f8\u4f3c\u5ea6Jaccard\u4e00\u81f4\u6027\u8fbe0.82\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06012", "impact_score": 4, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u7ed3\u6784\u5316\u4fe1\u606f\u62bd\u53d6", "\u6587\u6863\u5206\u7c7b", "\u805a\u7c7b\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06012v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Structured Data Extraction from Real Estate Documents using Clustering, Classification, and Large Language Models", "tldr": "\u63d0\u51fa\u4e00\u4e2a\u7aef\u5230\u7aef\u6d41\u6c34\u7ebf\uff0c\u5bf9\u623f\u5730\u4ea7\u95ee\u5377\u6587\u6863\u8fdb\u884c\u5206\u7c7b\uff08\u7eaf\u6587\u672c/\u626b\u63cf/\u7279\u6b8a\u5b57\u7b26\uff09\u5e76\u5229\u7528DeepSeek R1\u5927\u8bed\u8a00\u6a21\u578b\u63d0\u53d635\u4e2a\u7ed3\u6784\u5316\u5c5e\u6027\uff0c\u6210\u529f\u5904\u74062781\u4efd\u6587\u6863\uff0c\u751f\u6210\u9ad8\u8d28\u91cf\u623f\u4ea7\u6570\u636e\u96c6\uff0c\u4f59\u5f26\u76f8\u4f3c\u5ea6Jaccard\u4e00\u81f4\u6027\u8fbe0.82\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Pixel-level annotation remains a major bottleneck in medical image segmentation, making weak supervision an attractive yet under-constrained alternative. We propose OBBSeg, an intermediate supervision paradigm guided by Oriented Bounding Boxes (OBBs) that bridges the gap between full and weak supervision. By jointly encoding spatial extent and orientation, OBBs provide compact geometric supervision that better aligns with elongated or anisotropic lesions, reducing the ambiguity of coarse box annotations. To mitigate the inherent rectangular bias of OBBs, we introduce a Mask-to-OBB loss, a differentiable formulation that enforces geometric consistency between predicted masks and OBB regions. Furthermore, we incorporate prompt-driven semantic guidance through two complementary modules-PAFE and DBFE-which enhance foreground representation and suppress background interference. Extensive experiments on 13 datasets across 5 imaging modalities show that OBBSeg not only outperforms existing weakly supervised methods but also achieves performance comparable to fully supervised approaches, demonstrating its potential for efficient and scalable medical image segmentation. The code is available at https://github.com/StarLxc3/OBBSeg.", "arxiv_id": "2607.06007", "arxiv_url": "https://arxiv.org/abs/2607.06007", "authors": ["Jun Wei", "Xinchang Liu", "Yu Liu", "Chuhua Yang", "Shuhui Wang", "Hui Huang"], "brief": "\u63d0\u51faOBBSeg\u6846\u67b6\uff0c\u5229\u7528\u6709\u5411\u8fb9\u754c\u6846\uff08OBB\uff09\u4f5c\u4e3a\u5f31\u76d1\u7763\u6807\u6ce8\u6765\u6307\u5bfc\u533b\u5b66\u56fe\u50cf\u4e2d\u4e0d\u89c4\u5219\u75c5\u7076\u7684\u5206\u5272\u3002\u901a\u8fc7Mask-to-OBB\u53ef\u5fae\u635f\u5931\u51fd\u6570\u548c\u63d0\u793a\u9a71\u52a8\u7684\u8bed\u4e49\u5f15\u5bfc\u6a21\u5757\uff0c\u572813\u4e2a\u6570\u636e\u96c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u5f31\u76d1\u7763\u65b9\u6cd5\uff0c\u6027\u80fd\u63a5\u8fd1\u5168\u76d1\u7763\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06007", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5206\u5272", "\u5f31\u76d1\u7763\u5b66\u4e60", "\u6709\u5411\u8fb9\u754c\u6846", "\u75c5\u7076\u68c0\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06007v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "OBBSeg: Irregular Lesion Segmentation under Oriented Bounding Box Annotations", "tldr": "\u63d0\u51faOBBSeg\u6846\u67b6\uff0c\u5229\u7528\u6709\u5411\u8fb9\u754c\u6846\uff08OBB\uff09\u4f5c\u4e3a\u5f31\u76d1\u7763\u6807\u6ce8\u6765\u6307\u5bfc\u533b\u5b66\u56fe\u50cf\u4e2d\u4e0d\u89c4\u5219\u75c5\u7076\u7684\u5206\u5272\u3002\u901a\u8fc7Mask-to-OBB\u53ef\u5fae\u635f\u5931\u51fd\u6570\u548c\u63d0\u793a\u9a71\u52a8\u7684\u8bed\u4e49\u5f15\u5bfc\u6a21\u5757\uff0c\u572813\u4e2a\u6570\u636e\u96c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u5f31\u76d1\u7763\u65b9\u6cd5\uff0c\u6027\u80fd\u63a5\u8fd1\u5168\u76d1\u7763\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Unlearnable examples keep publicly shared photos from being learned by unauthorized face-recognition models. An imperceptible perturbation, added before sharing, makes any model trained on the protected photos fail on clean faces. The perturbation is crafted on the shared image, however the attacker trains on the face it extracts, cropped and resized to the recognizer input, and under this extraction the protection collapses. We propose LPID, which builds the extraction into the unlearnable-example objective. LPID confines the perturbation to the extracted face region and optimizes it through a differentiable model of the extraction, concentrating its energy in the frequency band the extraction preserves. Because this robustness is a property of the transform rather than of any identity, LPID is re-optimized per album and protects even users it has never seen. LPID attains the lowest attacker accuracy of all methods in every setting we evaluate, holding the attacker below $10\\%$ under crop+resize extraction on identities unseen at protection time, while remaining imperceptible at $32.7$\\,dB PSNR and $0.161$ LPIPS.", "arxiv_id": "2607.05996", "arxiv_url": "https://arxiv.org/abs/2607.05996", "authors": ["Byunghoon Oh", "Sunghwan Park", "Jaewoo Lee"], "brief": "\u9488\u5bf9\u4eba\u8138\u8bc6\u522b\u6a21\u578b\u7684\u4e0d\u53ef\u5b66\u4e60\u6837\u672c\u65b9\u6cd5\u5728\u5b9e\u9645\u653b\u51fb\u4e2d\u56e0\u4eba\u8138\u88c1\u526a+\u7f29\u653e\u9884\u5904\u7406\u800c\u5931\u6548\uff0c\u672c\u6587\u63d0\u51faLPID\u65b9\u6cd5\uff0c\u5c06\u63d0\u53d6\u6d41\u7a0b\u5185\u5d4c\u5165\u4e0d\u53ef\u5b66\u4e60\u6837\u672c\u4f18\u5316\u76ee\u6807\uff0c\u5e76\u5728\u9891\u57df\u4e2d\u96c6\u4e2d\u6270\u52a8\u80fd\u91cf\uff0c\u4f7f\u4fdd\u62a4\u5728\u63d0\u53d6\u540e\u4f9d\u7136\u6709\u6548\u3002\u5728\u672a\u89c1\u8eab\u4efd\u4e0a\u5c06\u653b\u51fb\u8005\u51c6\u786e\u7387\u538b\u5236\u523010%\u4ee5\u4e0b\uff0c\u540c\u65f6\u4fdd\u6301\u89c6\u89c9\u4e0d\u53ef\u611f\u77e5\u6027\uff08PSNR 32.7dB\uff09\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05996", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9690\u79c1\u4fdd\u62a4", "\u4eba\u8138\u8bc6\u522b", "\u4e0d\u53ef\u5b66\u4e60\u6837\u672c", "\u5bf9\u6297\u6270\u52a8"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05996v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Unlearnable Faces: Privacy Protection Surviving Extraction Pipeline", "tldr": "\u9488\u5bf9\u4eba\u8138\u8bc6\u522b\u6a21\u578b\u7684\u4e0d\u53ef\u5b66\u4e60\u6837\u672c\u65b9\u6cd5\u5728\u5b9e\u9645\u653b\u51fb\u4e2d\u56e0\u4eba\u8138\u88c1\u526a+\u7f29\u653e\u9884\u5904\u7406\u800c\u5931\u6548\uff0c\u672c\u6587\u63d0\u51faLPID\u65b9\u6cd5\uff0c\u5c06\u63d0\u53d6\u6d41\u7a0b\u5185\u5d4c\u5165\u4e0d\u53ef\u5b66\u4e60\u6837\u672c\u4f18\u5316\u76ee\u6807\uff0c\u5e76\u5728\u9891\u57df\u4e2d\u96c6\u4e2d\u6270\u52a8\u80fd\u91cf\uff0c\u4f7f\u4fdd\u62a4\u5728\u63d0\u53d6\u540e\u4f9d\u7136\u6709\u6548\u3002\u5728\u672a\u89c1\u8eab\u4efd\u4e0a\u5c06\u653b\u51fb\u8005\u51c6\u786e\u7387\u538b\u5236\u523010%\u4ee5\u4e0b\uff0c\u540c\u65f6\u4fdd\u6301\u89c6\u89c9\u4e0d\u53ef\u611f\u77e5\u6027\uff08PSNR 32.7dB\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Human-Object Interaction (HOI) video generation aims to synthesize realistic videos of humans manipulating diverse objects, serving as a promising avenue for AI-driven live streaming e-commerce. A primary obstacle in this domain lies in the complexity of modeling fine-grained physical dynamics and the intricate spatial-temporal coordination between human hands and objects. Existing approaches to this problem typically rely on dense temporal guidance, e.g., frame-wise hand-object pose sequences, to strictly control the interaction process. However, such dense guidance incurs high annotation costs and affects motion synthesis diversity. To overcome these limitations, we introduce SparseCtrl-HOI, a novel sparse temporal control framework for HOI video generation. It requires only a few keyframes that capture interaction states at designated timestamps. Specifically, we employ a Time-Controlled Rotary Positional Embedding (TiRoPE) mechanism to temporally anchor these keyframes while preserving their spatial integrity. Subsequently, to govern the dynamics across intermediate frames, we propose a Motion Prior Injection Module that leverages Multimodal Large Language Models (MLLMs) to extract high-level motion priors. This empowers the model to hallucinate logically and physically plausible transitions. Furthermore, we build SparseHOI-5K, a high-quality and richly annotated dataset for HOI video generation with sparse temporal control. Comprehensive evaluations confirm that our method substantially reduces annotation overhead while synthesizing superior live-streaming e-commerce videos. Both our code and dataset are publicly available at https://mpi-lab.github.io/SparseCtrl-HOI.", "arxiv_id": "2607.05994", "arxiv_url": "https://arxiv.org/abs/2607.05994", "authors": ["Shenbo Xie", "Mingrui Cai", "Xu Yang", "Yifei Liu", "Changxing Ding"], "brief": "\u63d0\u51faSparseCtrl-HOI\u6846\u67b6\uff0c\u4ec5\u7528\u5c11\u91cf\u5173\u952e\u5e27\uff08\u7a00\u758f\u65f6\u5e8f\u63a7\u5236\uff09\u5373\u53ef\u751f\u6210\u9ad8\u8d28\u91cf\u4eba\u624b\u4e0e\u7269\u4f53\u4ea4\u4e92\u89c6\u9891\uff0c\u65e0\u9700\u9010\u5e27\u5bc6\u96c6\u6807\u6ce8\u3002\u901a\u8fc7\u65f6\u95f4\u63a7\u5236\u65cb\u8f6c\u4f4d\u7f6e\u7f16\u7801\uff08TiRoPE\uff09\u951a\u5b9a\u5173\u952e\u5e27\uff0c\u5e76\u5229\u7528\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u6ce8\u5165\u8fd0\u52a8\u5148\u9a8c\uff0c\u5728\u964d\u4f4e\u6807\u6ce8\u6210\u672c\u7684\u540c\u65f6\u63d0\u5347\u4e86\u76f4\u64ad\u7535\u5546\u89c6\u9891\u5408\u6210\u8d28\u91cf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05994", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u4eba\u7269\u4ea4\u4e92", "\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u7a00\u758f\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05994v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SparseCtrl-HOI: Sparse Temporal Control for Human-Object Interaction Video Generation", "tldr": "\u63d0\u51faSparseCtrl-HOI\u6846\u67b6\uff0c\u4ec5\u7528\u5c11\u91cf\u5173\u952e\u5e27\uff08\u7a00\u758f\u65f6\u5e8f\u63a7\u5236\uff09\u5373\u53ef\u751f\u6210\u9ad8\u8d28\u91cf\u4eba\u624b\u4e0e\u7269\u4f53\u4ea4\u4e92\u89c6\u9891\uff0c\u65e0\u9700\u9010\u5e27\u5bc6\u96c6\u6807\u6ce8\u3002\u901a\u8fc7\u65f6\u95f4\u63a7\u5236\u65cb\u8f6c\u4f4d\u7f6e\u7f16\u7801\uff08TiRoPE\uff09\u951a\u5b9a\u5173\u952e\u5e27\uff0c\u5e76\u5229\u7528\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u6ce8\u5165\u8fd0\u52a8\u5148\u9a8c\uff0c\u5728\u964d\u4f4e\u6807\u6ce8\u6210\u672c\u7684\u540c\u65f6\u63d0\u5347\u4e86\u76f4\u64ad\u7535\u5546\u89c6\u9891\u5408\u6210\u8d28\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multispectral image(MSI) and hyperspectral image(HSI) object tracking object tracking exploits recorded band-wise observations to improve target--background discrimination under similar RGB appearance, mixed pixels, illumination variation, occlusion, and clutter. However, existing trackers commonly process all search regions through a fixed capacity spectral--spatial path, ignoring that tracking difficulty varies substantially across frames and target states. Clear regions may require only lightweight local discrimination, whereas ambiguous boundaries and spectrally similar distractors often demand stronger contextual reasoning. To address this limitation, we propose SpecTrack, a spectral--spatial complexity-aware tracker that formulates MSI tracking as search-region-level adaptive capacity allocation. Its core component, the Spectral Adaptive Mixture-of-Experts (SAMoE) module, provides a capacity-ordered expert pool with progressively increasing latent rank, receptive field, and depth. Expert selection is guided by a Spectral Prompt Router, which fuses semantic context, spatial boundary cues, and a latent channel-variation cue computed after multispectral patch embedding to activate a sparse subset of SAMoE experts for each search region. In parallel, a Shared Global Expert supplies common latent spectral--spatial context to reduce fragmented sparse-routing decisions. Experiments on MUST, MSITrack, and HOTC20 demonstrate a favorable accuracy--efficiency trade-off. The accuracy-oriented SpecTrack-L384 achieves state-of-the-art or highly competitive AUCs of 65.2\\%, 51.9\\%, and 72.6\\% on the three benchmarks, while the balanced SpecTrack-B224 reaches 62.4\\% AUC at 43.7 FPS on MUST. An additional GOT-10k evaluation indicates RGB-domain architectural generalization, with SpecTrack-L384 achieving 79.3\\% AO.", "arxiv_id": "2607.05988", "arxiv_url": "https://arxiv.org/abs/2607.05988", "authors": ["Xingyu Tan", "Yunrong Qin", "Mengjie Hu"], "brief": "\u63d0\u51faSpecTrack\uff0c\u4e00\u79cd\u9762\u5411\u591a\u5149\u8c31/\u9ad8\u5149\u8c31\u76ee\u6807\u8ddf\u8e2a\u7684\u81ea\u9002\u5e94\u4e13\u5bb6\u6df7\u5408\u6846\u67b6\uff0c\u901a\u8fc7\u5149\u8c31\u63d0\u793a\u8def\u7531\u5668\u52a8\u6001\u5206\u914d\u8ba1\u7b97\u5bb9\u91cf\uff0c\u9488\u5bf9\u4e0d\u540c\u96be\u5ea6\u7684\u641c\u7d22\u533a\u57df\u6fc0\u6d3b\u4e0d\u540c\u4e13\u5bb6\u5b50\u96c6\u3002\u5728MUST\u3001MSITrack\u548cHOTC20\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230\u6700\u5148\u8fdb\u6216\u9ad8\u5ea6\u7ade\u4e89\u529b\u7684AUC\uff0c\u540c\u65f6\u4fdd\u6301\u826f\u597d\u7684\u7cbe\u5ea6-\u6548\u7387\u5e73\u8861\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05988", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u5149\u8c31\u76ee\u6807\u8ddf\u8e2a", "\u6df7\u5408\u4e13\u5bb6\u6a21\u578b", "\u89c6\u89c9\u63d0\u793a", "\u81ea\u9002\u5e94\u8ba1\u7b97"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05988v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SpecTrack: Spectral Prompt Guided Adaptive Experts for Multispectral Object Tracking", "tldr": "\u63d0\u51faSpecTrack\uff0c\u4e00\u79cd\u9762\u5411\u591a\u5149\u8c31/\u9ad8\u5149\u8c31\u76ee\u6807\u8ddf\u8e2a\u7684\u81ea\u9002\u5e94\u4e13\u5bb6\u6df7\u5408\u6846\u67b6\uff0c\u901a\u8fc7\u5149\u8c31\u63d0\u793a\u8def\u7531\u5668\u52a8\u6001\u5206\u914d\u8ba1\u7b97\u5bb9\u91cf\uff0c\u9488\u5bf9\u4e0d\u540c\u96be\u5ea6\u7684\u641c\u7d22\u533a\u57df\u6fc0\u6d3b\u4e0d\u540c\u4e13\u5bb6\u5b50\u96c6\u3002\u5728MUST\u3001MSITrack\u548cHOTC20\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230\u6700\u5148\u8fdb\u6216\u9ad8\u5ea6\u7ade\u4e89\u529b\u7684AUC\uff0c\u540c\u65f6\u4fdd\u6301\u826f\u597d\u7684\u7cbe\u5ea6-\u6548\u7387\u5e73\u8861\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multimodal large language models can emit localized predictions, bounding boxes for objects and temporal windows for video and audio events, but they hallucinate these regions prolifically. The model\u0027s own token log-probabilities are nearly uninformative: they conflate grounding quality with input ambiguity, and coordinate tokens become near-deterministic once the model commits. We propose Multi-Token Localized Attention (MTLA): a training-free, post-hoc score that measures how strongly a prediction\u0027s tokens attend to the region they claim. Prior attention-based detectors, which sum attention over the entire input modality and read a single response token, are weaker special cases; we show that summing only within the claimed region and aggregating across all prediction tokens recovers a stronger grounding signal. The same recipe applies almost trivially to other modalities and tasks: object detection in images and temporal localization in video and audio. Across multiple MLLM families and three modalities, MTLA improves hallucination AUROC by +7 to +38 over the best prior training-free baseline. Used as a confidence score for re-ranking, it nearly doubles the zero-shot COCO detection AP of an open-source 8B generalist (from 20.4 to 37.0), narrowing the gap to supervised detectors without any task-specific training.", "arxiv_id": "2607.05978", "arxiv_url": "https://arxiv.org/abs/2607.05978", "authors": ["Daniel Shalam", "Emanuel Ben Baruch", "Avi Ben Cohen", "Tal Remez"], "brief": "\u63d0\u51faMTLA\uff08\u591a\u4ee4\u724c\u5c40\u90e8\u6ce8\u610f\u529b\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u540e\u5904\u7406\u7f6e\u4fe1\u5ea6\u8bc4\u5206\u65b9\u6cd5\uff0c\u901a\u8fc7\u8861\u91cf\u9884\u6d4b\u4ee4\u724c\u5bf9\u5176\u58f0\u79f0\u533a\u57df\u7684\u6ce8\u610f\u529b\u5f3a\u5ea6\u6765\u68c0\u6d4b\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u5e7b\u89c9\u5b9a\u4f4d\u3002\u5728\u56fe\u50cf\u3001\u89c6\u9891\u3001\u97f3\u9891\u4e09\u79cd\u6a21\u6001\u4e0a\uff0c\u5e7b\u89c9\u68c0\u6d4bAUROC\u63d0\u53477-38\u4e2a\u767e\u5206\u70b9\uff0c\u5e76\u5c06\u96f6\u6837\u672cCOCO\u68c0\u6d4bAP\u4ece20.4\u63d0\u5347\u81f337.0\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05978", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u76ee\u6807\u68c0\u6d4b", "\u5e7b\u89c9\u68c0\u6d4b", "\u6ce8\u610f\u529b\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05978v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Propose and Attend: Training-free MLLM Grounding Confidence via Multi-Token Localized Attention", "tldr": "\u63d0\u51faMTLA\uff08\u591a\u4ee4\u724c\u5c40\u90e8\u6ce8\u610f\u529b\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u540e\u5904\u7406\u7f6e\u4fe1\u5ea6\u8bc4\u5206\u65b9\u6cd5\uff0c\u901a\u8fc7\u8861\u91cf\u9884\u6d4b\u4ee4\u724c\u5bf9\u5176\u58f0\u79f0\u533a\u57df\u7684\u6ce8\u610f\u529b\u5f3a\u5ea6\u6765\u68c0\u6d4b\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u5e7b\u89c9\u5b9a\u4f4d\u3002\u5728\u56fe\u50cf\u3001\u89c6\u9891\u3001\u97f3\u9891\u4e09\u79cd\u6a21\u6001\u4e0a\uff0c\u5e7b\u89c9\u68c0\u6d4bAUROC\u63d0\u53477-38\u4e2a\u767e\u5206\u70b9\uff0c\u5e76\u5c06\u96f6\u6837\u672cCOCO\u68c0\u6d4bAP\u4ece20.4\u63d0\u5347\u81f337.0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vascular computed tomography datasets are commonly annotated only once per scan, yielding the pervasive yet under addressed problem of single mask annotation noise. Existing solutions either require costly multirater fusion or are coupled with network training, preventing explicit auditing of where and why labels fail. We introduce a decoupled framework for single-mask annotation noise detection that leverages cross-sectional patch self-consistency to produce interpretable and auditable noise evidence. Tubular anatomy exhibits strong cross-sectional recurrence: patches extracted orthogonally along vessel centrelines recur in appearance across locations and subjects. Thus, anatomically similar patches should have consistent masks, and disagreement signals unreliable annotation. Our method samples cross-sectional patches, retrieves intensity-equivalent neighbours via scalable vector search, and computes a patch-level noise score from statistical mask disagreement, yielding explicit image-mask evidence for every flagged region. Aggregating scores produces scan-level quality maps for dataset quality assessment or quality-weighted training. Experiments on the coronary CT dataset validate the detected noise for improving training robustness and reveal systematic annotation biases. Specifically, transverse and oblique vessels exhibit 5.1 times higher error rates than axis-aligned structures, with additional correlations to cross-sectional area and intensity. Code is available here.", "arxiv_id": "2607.05965", "arxiv_url": "https://arxiv.org/abs/2607.05965", "authors": ["Yinheng Zhu", "Xiaowei Xu"], "brief": "\u9488\u5bf9\u8840\u7ba1CT\u6570\u636e\u96c6\u4e2d\u666e\u904d\u5b58\u5728\u7684\u5355\u63a9\u7801\u6807\u6ce8\u566a\u58f0\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u79cd\u89e3\u8026\u6846\u67b6\uff0c\u5229\u7528\u6a2a\u622a\u9762\u56fe\u50cf\u5757\u7684\u81ea\u4e00\u81f4\u6027\u68c0\u6d4b\u6807\u6ce8\u9519\u8bef\u3002\u65b9\u6cd5\u901a\u8fc7\u6cbf\u8840\u7ba1\u4e2d\u5fc3\u7ebf\u63d0\u53d6\u6b63\u4ea4\u56fe\u50cf\u5757\u3001\u68c0\u7d22\u76f8\u4f3c\u90bb\u57df\u5e76\u8ba1\u7b97\u63a9\u7801\u4e0d\u4e00\u81f4\u6027\u5f97\u5206\uff0c\u65e0\u9700\u591a\u6807\u6ce8\u8005\u878d\u5408\u6216\u4e0e\u7f51\u7edc\u8bad\u7ec3\u8026\u5408\uff0c\u53ef\u751f\u6210\u53ef\u89e3\u91ca\u7684\u566a\u58f0\u8bc1\u636e\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u80fd\u6709\u6548\u63d0\u5347\u8bad\u7ec3\u9c81\u68d2\u6027\uff0c\u5e76\u63ed\u793a\u6a2a\u5411/\u659c\u5411\u8840\u7ba1\u6807\u6ce8\u9519\u8bef\u7387\u662f\u8f74\u5bf9\u9f50\u7ed3\u6784\u76845.1\u500d\u7b49\u7cfb\u7edf\u6027\u504f\u5dee\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05965", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5206\u5272", "\u6807\u6ce8\u566a\u58f0\u68c0\u6d4b", "\u8840\u7ba1CT", "\u6570\u636e\u8d28\u91cf\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05965v1", "published_at": "2026-07-07", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Decoupled Single-Mask Annotation Noise Detection via Cross-Sectional Patch Self-Consistency", "tldr": "\u9488\u5bf9\u8840\u7ba1CT\u6570\u636e\u96c6\u4e2d\u666e\u904d\u5b58\u5728\u7684\u5355\u63a9\u7801\u6807\u6ce8\u566a\u58f0\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u79cd\u89e3\u8026\u6846\u67b6\uff0c\u5229\u7528\u6a2a\u622a\u9762\u56fe\u50cf\u5757\u7684\u81ea\u4e00\u81f4\u6027\u68c0\u6d4b\u6807\u6ce8\u9519\u8bef\u3002\u65b9\u6cd5\u901a\u8fc7\u6cbf\u8840\u7ba1\u4e2d\u5fc3\u7ebf\u63d0\u53d6\u6b63\u4ea4\u56fe\u50cf\u5757\u3001\u68c0\u7d22\u76f8\u4f3c\u90bb\u57df\u5e76\u8ba1\u7b97\u63a9\u7801\u4e0d\u4e00\u81f4\u6027\u5f97\u5206\uff0c\u65e0\u9700\u591a\u6807\u6ce8\u8005\u878d\u5408\u6216\u4e0e\u7f51\u7edc\u8bad\u7ec3\u8026\u5408\uff0c\u53ef\u751f\u6210\u53ef\u89e3\u91ca\u7684\u566a\u58f0\u8bc1\u636e\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u80fd\u6709\u6548\u63d0\u5347\u8bad\u7ec3\u9c81\u68d2\u6027\uff0c\u5e76\u63ed\u793a\u6a2a\u5411/\u659c\u5411\u8840\u7ba1\u6807\u6ce8\u9519\u8bef\u7387\u662f\u8f74\u5bf9\u9f50\u7ed3\u6784\u76845.1\u500d\u7b49\u7cf
