const PAPERS = [{"abstract": "As web agents increasingly demonstrate capabilities in automated task execution, the development of robust evaluation frameworks for assessing their navigation and task completion performance has emerged as a critical research priority. However, existing benchmarks exhibit fundamental limitations. First, they suffer from insufficient scale and limited domain diversity, constraining comprehensive evaluation of cross-domain generalization. Second, prevailing LLM-as-Judge evaluation methodologies inadequately capture fine-grained interaction semantics, particularly regarding precise query formulation and filtering operations. Third, current benchmarks predominantly emphasize navigation success metrics while neglecting critical requirements for real-world deployment scenarios. To address these limitations, we introduce WebRetriever, a large-scale benchmark encompassing 800 websites and 1,550 tasks across diverse domains, including consumer, professional, and enterprise sectors, with comprehensive coverage of user intent patterns. We propose NavEval (Navigation Evaluation), a novel LLM-as-Judge framework that leverages rich interaction context beyond visual screenshots, achieving state-of-the-art alignment with human judgment across multiple evaluation datasets. Furthermore, we establish three complementary evaluation protocols that collectively provide holistic assessment of web agent capabilities: navigation proficiency, knowledge-assisted interaction, and end-to-end task completion with information extraction. Extensive experimental analysis reveals substantial performance disparities across evaluation protocols, demonstrating that navigation success alone is an insufficient predictor of real-world application effectiveness. WebRetriever delivers fine-grained diagnostic insights into agent capabilities and establishes a rigorous foundation for advancing web agent research and development.", "arxiv_id": "2607.06118", "arxiv_url": "https://arxiv.org/abs/2607.06118", "authors": ["Wei Dong", "Tianyu Fu", "Zhe Yu", "Hanning Wang", "Anyang Su", "Zhizhou Fang", "Yuyang Chen", "Shuo Wang", "Minghui Wu", "Ping Jiang", "Zhen Lei", "Chenxu Zhao"], "brief": "\u63d0\u51faWebRetriever\u8bc4\u6d4b\u57fa\u51c6\uff0c\u6db5\u76d6800\u4e2a\u7f51\u7ad9\u548c1550\u4e2a\u8de8\u9886\u57df\u4efb\u52a1\uff0c\u5e76\u8bbe\u8ba1NavEval\u8bc4\u4f30\u6846\u67b6\u4e0e\u4e09\u79cd\u4e92\u8865\u8bc4\u6d4b\u534f\u8bae\uff0c\u5168\u9762\u8861\u91cfWeb\u667a\u80fd\u4f53\u7684\u5bfc\u822a\u3001\u77e5\u8bc6\u8f85\u52a9\u4ea4\u4e92\u548c\u7aef\u5230\u7aef\u4efb\u52a1\u5b8c\u6210\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06118", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u89c4\u6a21\u8986\u76d6\uff1a800\u4e2a\u7f51\u7ad9\u30011550\u4e2a\u4efb\u52a1\uff0c\u6a2a\u8de8\u6d88\u8d39\u3001\u4e13\u4e1a\u3001\u4f01\u4e1a\u7b49\u591a\u9886\u57df\uff0c\u8986\u76d6\u591a\u6837\u7528\u6237\u610f\u56fe\u6a21\u5f0f", "NavEval\u6846\u67b6\uff1a\u8d85\u8d8a\u622a\u56fe\u89c6\u89c9\u4fe1\u606f\uff0c\u5229\u7528\u4e30\u5bcc\u4ea4\u4e92\u4e0a\u4e0b\u6587\u7684LLM-as-Judge\u65b9\u6cd5\uff0c\u4e0e\u4eba\u7c7b\u5224\u65ad\u5bf9\u9f50\u8fbe\u5230SOTA", "\u4e09\u79cd\u8bc4\u6d4b\u534f\u8bae\uff1a\u5bfc\u822a\u719f\u7ec3\u5ea6\u3001\u77e5\u8bc6\u8f85\u52a9\u4ea4\u4e92\u3001\u7aef\u5230\u7aef\u4efb\u52a1\u5b8c\u6210+\u4fe1\u606f\u62bd\u53d6\uff0c\u5b9e\u9a8c\u63ed\u793a\u4ec5\u9760\u5bfc\u822a\u6210\u529f\u7387\u4e0d\u8db3\u4ee5\u9884\u6d4b\u5b9e\u9645\u6548\u679c"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "\u591a\u6a21\u6001", "LLM\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06118v1", "published_at": "2026-07-07", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, memory attention computation. Combined with causal linear attention, the model operates as an RNN at inference time while preserving temporal coherence across chunks. We further propose a learnable attention head pruning method based on binary per-head gates optimized end-to-end using a noise-biased sparsity objective and distillation-based finetuning. Together with sampling-step distillation and memory-optimized VAE decoding, MobileWan becomes the first 5B-scale video diffusion model deployable on a commercial mobile device. Our system generates 5-second 480x832 videos at 16 FPS in 20 seconds end-to-end latency, achieving a VBench score of 83.79 and establishing a new state of the art in mobile video generation. Project page: https://qualcomm-ai-research.github.io/mobilewan", "arxiv_id": "2607.06173", "arxiv_url": "https://arxiv.org/abs/2607.06173", "authors": ["Mohsen Ghafoorian", "Denis Korzhenkov", "Adil Karjauv", "Ioannis Lelekas", "Noor Fathima", "Spyridon Stasis", "Hanno Ackermann", "Boris van Breugel", "Markus Nagel", "Fatih Porikli", "Animesh Karnewar", "Amirhossein Habibian"], "brief": "MobileWan\u5c06\u670d\u52a1\u5668\u7ea75B\u53c2\u6570\u89c6\u9891\u6269\u6563Transformer\uff08Wan2.2-5B\uff09\u901a\u8fc7\u5faa\u73af\u91cd\u6784\u4e0e\u7ed3\u6784\u5316\u538b\u7f29\uff0c\u6210\u529f\u90e8\u7f72\u5230\u5185\u5b58\u53d7\u9650\u7684\u79fb\u52a8\u8bbe\u5907\u4e0a\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u624b\u673a\u7aef\u89c6\u9891\u751f\u6210\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06173", "impact_score": 9, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51fa\u5faa\u73af\u84b8\u998f\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u751f\u6210\u8f6c\u4e3a\u5206\u5757\u81ea\u56de\u5f52\u8fc7\u7a0b\uff0c\u7ed3\u5408\u56e0\u679c\u7ebf\u6027\u6ce8\u610f\u529b\u4f7f\u6a21\u578b\u63a8\u7406\u65f6\u4ee5RNN\u5f62\u5f0f\u8fd0\u884c\uff0c\u5b9e\u73b0\u5e38\u6570\u5185\u5b58\u6ce8\u610f\u529b\u8ba1\u7b97", "\u8bbe\u8ba1\u57fa\u4e8e\u4e8c\u503c\u95e8\u63a7\u7684\u53ef\u5b66\u4e60\u6ce8\u610f\u529b\u5934\u526a\u679d\u65b9\u6cd5\uff0c\u7ed3\u5408\u566a\u58f0\u504f\u7f6e\u7a00\u758f\u76ee\u6807\u548c\u84b8\u998f\u5fae\u8c03\u8fdb\u884c\u7aef\u5230\u7aef\u4f18\u5316", "\u5728\u5546\u7528\u624b\u673a\u4e0a\u751f\u6210480\u00d7832\u5206\u8fa8\u7387\u300116FPS\u76845\u79d2\u89c6\u9891\uff0c\u7aef\u5230\u7aef\u5ef6\u8fdf\u4ec520\u79d2\uff0cVBench\u5f97\u520683.79\uff0c\u8d85\u8d8a\u73b0\u6709\u79fb\u52a8\u7aef\u65b9\u6848"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u6a21\u578b\u538b\u7f29", "\u79fb\u52a8\u7aef\u90e8\u7f72"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06173v1", "published_at": "2026-07-07", "score": 0.225, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "MobileWan: Closing the Quality Gap for Mobile Video Diffusion", "tldr": "\u9996\u4e2a\u5728\u624b\u673a\u7aef\u90e8\u7f72\u76845B\u53c2\u6570\u89c6\u9891\u6269\u6563\u6a21\u578b\uff0c20\u79d2\u751f\u62105\u79d2\u9ad8\u6e05\u89c6\u9891", "upvotes": 0, "what_it_is": "MobileWan\u5c06\u670d\u52a1\u5668\u7ea75B\u53c2\u6570\u89c6\u9891\u6269\u6563Transformer\uff08Wan2.2-5B\uff09\u901a\u8fc7\u5faa\u73af\u91cd\u6784\u4e0e\u7ed3\u6784\u5316\u538b\u7f29\uff0c\u6210\u529f\u90e8\u7f72\u5230\u5185\u5b58\u53d7\u9650\u7684\u79fb\u52a8\u8bbe\u5907\u4e0a\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u624b\u673a\u7aef\u89c6\u9891\u751f\u6210\u3002", "why_notable": "\u9996\u6b21\u8bc1\u660e\u65e0\u9700\u7f29\u51cf\u6a21\u578b\u89c4\u6a21\u5373\u53ef\u5728\u79fb\u52a8\u7aef\u90e8\u7f725B\u7ea7\u89c6\u9891\u6269\u6563\u6a21\u578b\uff0c\u6253\u7834\u4e86\u79fb\u52a8\u89c6\u9891\u751f\u6210\u4f9d\u8d56\u5c0f\u6a21\u578b\uff08\u003c2B\uff09\u7684\u56fa\u6709\u8ba4\u77e5\uff0c\u4e3a\u7aef\u4fa7AI\u89c6\u9891\u751f\u6210\u6811\u7acb\u65b0\u6807\u6746\u3002"}, {"abstract": "Vision-Language-Action (VLA) models have emerged as a promising approach for generalizable robotic manipulations. In particular, flow matching-based VLA models have shown remarkable success due to their capability to generate precise and smooth action sequences and capture multimodal distributions. However, the iterative denoising process in the action head acts as a major computational bottleneck, posing a critical challenge for real-time deployment. To address this challenge, we propose ActionCache, a plug-and-play external cache that opportunistically reuses past intermediate actions to warm-start generations from the vicinity of target actions, thereby drastically reducing the inference latency. Specifically, ActionCache stores the intermediate actions with compact multimodal keys, which enables retrieval from similar past contexts across different episodes or even different tasks. Experimental results in simulation and real-world environments demonstrate that ActionCache maintains high task success rates in a low-latency regime, achieving inference acceleration of up to $11.75\\times$ and $34.43\\times$ for representative flow-based VLA models, $\u03c0_{0.5}$ and GR00T-N1.6, respectively.", "arxiv_id": "2607.06370", "arxiv_url": "https://arxiv.org/abs/2607.06370", "authors": ["Ryuji Oi", "Hikari Otsuka", "Kosuke Matsushima", "Yuki Ichikawa", "Masato Motomura", "Tatsuya Kaneko", "Daichi Fujiki"], "brief": "\u63d0\u51faActionCache\uff0c\u4e00\u79cd\u5373\u63d2\u5373\u7528\u7684\u5916\u90e8\u7f13\u5b58\u673a\u5236\uff0c\u901a\u8fc7\u590d\u7528\u5386\u53f2\u4e2d\u95f4\u52a8\u4f5c\u6765\u70ed\u542f\u52a8\u65b0\u7684\u52a8\u4f5c\u751f\u6210\uff0c\u5927\u5e45\u964d\u4f4e\u57fa\u4e8e\u6d41\u5339\u914d\u7684VLA\u6a21\u578b\u63a8\u7406\u5ef6\u8fdf\u3002", "categories": ["cs.RO", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06370", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4f7f\u7528\u7d27\u51d1\u591a\u6a21\u6001\u952e\u5b58\u50a8\u4e2d\u95f4\u52a8\u4f5c\uff0c\u652f\u6301\u8de8episode\u751a\u81f3\u8de8\u4efb\u52a1\u7684\u76f8\u4f3c\u4e0a\u4e0b\u6587\u68c0\u7d22", "\u5bf9\u03c0\u2080.\u2085\u548cGR00T-N1.6\u5206\u522b\u5b9e\u73b011.75\u00d7\u548c34.43\u00d7\u7684\u63a8\u7406\u52a0\u901f", "\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\uff0c\u5728\u4eff\u771f\u548c\u771f\u5b9e\u73af\u5883\u4e2d\u5747\u4fdd\u6301\u9ad8\u4efb\u52a1\u6210\u529f\u7387"], "keywords": ["\u667a\u80fd\u4f53", "\u673a\u5668\u4eba\u64cd\u63a7", "\u63a8\u7406\u52a0\u901f", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06370v1", "published_at": "2026-07-07", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Training-Free Acceleration for Vision-Language-Action Models with Action Caching and Refinement", "tldr": "ActionCache\u901a\u8fc7\u7f13\u5b58\u590d\u7528\u4e2d\u95f4\u52a8\u4f5c\uff0c\u5b9e\u73b0VLA\u6a21\u578b\u65e0\u9700\u8bad\u7ec3\u7684\u63a8\u7406\u52a0\u901f", "upvotes": 0, "what_it_is": "\u63d0\u51faActionCache\uff0c\u4e00\u79cd\u5373\u63d2\u5373\u7528\u7684\u5916\u90e8\u7f13\u5b58\u673a\u5236\uff0c\u901a\u8fc7\u590d\u7528\u5386\u53f2\u4e2d\u95f4\u52a8\u4f5c\u6765\u70ed\u542f\u52a8\u65b0\u7684\u52a8\u4f5c\u751f\u6210\uff0c\u5927\u5e45\u964d\u4f4e\u57fa\u4e8e\u6d41\u5339\u914d\u7684VLA\u6a21\u578b\u63a8\u7406\u5ef6\u8fdf\u3002", "why_notable": "\u89e3\u51b3\u4e86\u6d41\u5339\u914dVLA\u6a21\u578b\u5b9e\u65f6\u90e8\u7f72\u7684\u6838\u5fc3\u74f6\u9888\uff0c\u65e0\u8bad\u7ec3\u5f00\u9500\u5373\u53ef\u5b9e\u73b0\u6570\u5341\u500d\u52a0\u901f\uff0c\u5bf9\u673a\u5668\u4eba\u64cd\u63a7\u7684\u5b9e\u9645\u843d\u5730\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u4ef7\u503c\u3002"}, {"abstract": "Game worlds have traditionally been built through labor-intensive production pipelines, making them costly to develop, difficult to customization, and expensive to modify after deployment. Recent advances in video world models offer a fundamentally different paradigm. Rather than explicitly authoring every component of a virtual environment, these models autoregressively synthesize future observations conditioned on the current world state and user interactions, enabling playable worlds to be generated online. Trained on both gameplay recordings and real-world videos, they can capture diverse visual appearances and physical dynamics, opening new opportunities for interactive applications beyond gaming, including embodied intelligence. In this paper, we present \\textbf{AlayaWorld}, a full-stack open-source framework for building interactive generative worlds. AlayaWorld enables open-ended real-time interaction, allowing users to freely navigate and perform diverse actions such as combat, spell casting, and monster summoning. The framework unifies the complete development-from data preparation model architecture, model training, inference acceleration, and deployment-within a modular and extensible architecture. Alongside the framework, we release reproducible pipelines, reference implementations, evaluation tools, and comprehensive documentation, establishing a practical foundation for future research and real-time applications of generative world models.", "arxiv_id": "2607.06291", "arxiv_url": "https://arxiv.org/abs/2607.06291", "authors": ["AlayaWorld Team", "Kaipeng Zhang", "Chuanhao Li", "Yifan Zhan", "Yongtao Ge", "Yuanyang Yin", "Jiaming Tan", "Kang He", "Liaoyuan Fan", "Ruicong Liu", "Xiaojie Xu", "Xuangeng Chu", "Zhen Li", "Zhengyuan Lin", "Zhixiang Wang", "Zian Meng", "Zihui Gao"], "brief": "\u63d0\u51faAlayaWorld\uff0c\u4e00\u4e2a\u5f00\u6e90\u5168\u6808\u6846\u67b6\uff0c\u5229\u7528\u89c6\u9891\u4e16\u754c\u6a21\u578b\u81ea\u56de\u5f52\u751f\u6210\u53ef\u5b9e\u65f6\u4ea4\u4e92\u7684\u6e38\u620f\u4e16\u754c\uff0c\u652f\u6301\u81ea\u7531\u5bfc\u822a\u3001\u6218\u6597\u3001\u65bd\u6cd5\u3001\u53ec\u5524\u602a\u7269\u7b49\u591a\u6837\u52a8\u4f5c\uff0c\u65e0\u9700\u4f20\u7edf\u624b\u5de5\u5236\u4f5c\u6d41\u7a0b\u3002", "categories": ["cs.CV", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06291", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u540c\u65f6\u5728\u6e38\u620f\u5f55\u50cf\u548c\u771f\u5b9e\u4e16\u754c\u89c6\u9891\u4e0a\u8bad\u7ec3\uff0c\u6355\u6349\u591a\u6837\u89c6\u89c9\u5916\u89c2\u4e0e\u7269\u7406\u52a8\u6001", "\u6846\u67b6\u8986\u76d6\u5b8c\u6574\u5f00\u53d1\u94fe\u8def\uff1a\u6570\u636e\u51c6\u5907\u3001\u6a21\u578b\u67b6\u6784\u3001\u8bad\u7ec3\u3001\u63a8\u7406\u52a0\u901f\u5230\u90e8\u7f72\uff0c\u6a21\u5757\u5316\u53ef\u6269\u5c55", "\u5f00\u653e\u590d\u73b0\u6d41\u7a0b\u3001\u53c2\u8003\u5b9e\u73b0\u3001\u8bc4\u4f30\u5de5\u5177\u548c\u5b8c\u6574\u6587\u6863\uff0c\u652f\u6301\u5177\u8eab\u667a\u80fd\u7b49\u6e38\u620f\u4e4b\u5916\u7684\u5e94\u7528\u573a\u666f"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u4ea4\u4e92\u5f0fAI", "\u5177\u8eab\u667a\u80fd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06291v1", "published_at": "2026-07-07", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "AlayaWorld: Long-Horizon and Playable Video World Generation", "tldr": "AlayaWorld\uff1a\u5f00\u6e90\u5168\u6808\u6846\u67b6\uff0c\u7528\u89c6\u9891\u4e16\u754c\u6a21\u578b\u5b9e\u65f6\u751f\u6210\u53ef\u4ea4\u4e92\u6e38\u620f\u4e16\u754c", "upvotes": 0, "what_it_is": "\u63d0\u51faAlayaWorld\uff0c\u4e00\u4e2a\u5f00\u6e90\u5168\u6808\u6846\u67b6\uff0c\u5229\u7528\u89c6\u9891\u4e16\u754c\u6a21\u578b\u81ea\u56de\u5f52\u751f\u6210\u53ef\u5b9e\u65f6\u4ea4\u4e92\u7684\u6e38\u620f\u4e16\u754c\uff0c\u652f\u6301\u81ea\u7531\u5bfc\u822a\u3001\u6218\u6597\u3001\u65bd\u6cd5\u3001\u53ec\u5524\u602a\u7269\u7b49\u591a\u6837\u52a8\u4f5c\uff0c\u65e0\u9700\u4f20\u7edf\u624b\u5de5\u5236\u4f5c\u6d41\u7a0b\u3002", "why_notable": "\u9996\u4e2a\u9762\u5411\u53ef\u73a9\u751f\u6210\u4e16\u754c\u7684\u5f00\u6e90\u5168\u6808\u6846\u67b6\uff0c\u5927\u5e45\u964d\u4f4e\u4ea4\u4e92\u5f0f\u751f\u6210\u4e16\u754c\u7684\u7814\u7a76\u95e8\u69db\uff0c\u5bf9\u6e38\u620f\u5f00\u53d1\u548c\u5177\u8eab\u667a\u80fd\u7814\u7a76\u5747\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Imaging demand is growing faster than the radiology workforce can expand, and reporting backlogs cannot be resolved through training and recruitment alone. The most direct opportunity is reducing the time and effort radiologists spend producing reports, a task that requires interpreting images, integrating clinical history and prior studies, and drafting structured findings. We present Harrison.Rad 1.5 (HR1.5), a radiology-specific multimodal large language model that accepts interleaved text and visual inputs and generates structured and unstructured text across plain-film radiology, spanning computed radiography, chest, musculoskeletal, abdominal, spine, and pelvic x-rays, and mammography. HR1.5 is trained through a three-stage pipeline: domain adaptation of a base language model on radiology reports, contrastive vision-encoder training with curriculum-based hard negatives on ~6 million image-report instances, and visual-question-answering fine-tuning on multi-turn conversations. We evaluate it with a Findings-Diagnosis scoring framework that extends RadGraph-XL entity extraction with ontology-based synonym matching and polarity-contradiction detection, benchmarked on RadBench, a simulated FRCR 2B Short Case examination scored against Angoff-method thresholds, ReXGradient, and internal multi-modality datasets. HR1.5 is the only system evaluated to meet the simulated FRCR passing standard and achieves the highest accuracy on closed-format clinical questions, across anatomical regions, on internal multi-body-part and mammography reporting, and on the primary clinically-aligned score for public chest reporting. We further examine explainability and model behaviour, including question-sensitive Grad-CAM heatmaps, attention analysis, and confidence estimation, to support responsible future evaluation toward clinical use, and a framework for clinically grounded assessment of report quality.", "arxiv_id": "2607.05880", "arxiv_url": "https://arxiv.org/abs/2607.05880", "authors": ["Suneeta Mall", "Vladimir Nekrasov", "Ashnil Kumar", "Sajith Karunasena", "Aiden Nibali", "Alix Bird", "Mateo Diaz Shine", "Jarrel Seah"], "brief": "\u63d0\u51faHR1.5\uff0c\u4e00\u4e2a\u653e\u5c04\u79d1\u4e13\u7528\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u80fd\u63a5\u53d7\u4ea4\u9519\u7684\u6587\u672c\u4e0e\u56fe\u50cf\u8f93\u5165\uff0c\u8986\u76d6\u5e73\u7247\u653e\u5c04\u5b66\uff08\u80f8\u7247\u3001\u9aa8\u9abc\u3001\u8179\u90e8\u3001\u810a\u67f1\u3001\u76c6\u8154X\u5149\u53ca\u4e73\u817a\u6444\u5f71\uff09\uff0c\u81ea\u52a8\u751f\u6210\u7ed3\u6784\u5316\u4e0e\u975e\u7ed3\u6784\u5316\u653e\u5c04\u79d1\u62a5\u544a\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05880", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4e09\u9636\u6bb5\u8bad\u7ec3\u6d41\u7a0b\uff1a\u653e\u5c04\u62a5\u544a\u9886\u57df\u9002\u5e94\u9884\u8bad\u7ec3 \u2192 \u57fa\u4e8e\u8bfe\u7a0b\u96be\u8d1f\u6837\u672c\u7684\u5bf9\u6bd4\u89c6\u89c9\u7f16\u7801\u5668\u8bad\u7ec3\uff08~600\u4e07\u56fe\u50cf-\u62a5\u544a\u5bf9\uff09 \u2192 \u591a\u8f6e\u5bf9\u8bdd\u89c6\u89c9\u95ee\u7b54\u5fae\u8c03", "\u63d0\u51faFindings-Diagnosis\u8bc4\u5206\u6846\u67b6\uff0c\u6269\u5c55RadGraph-XL\u5b9e\u4f53\u62bd\u53d6\uff0c\u52a0\u5165\u672c\u4f53\u540c\u4e49\u8bcd\u5339\u914d\u4e0e\u6781\u6027\u77db\u76fe\u68c0\u6d4b\uff0c\u5728RadBench\u3001ReXGradient\u7b49\u591a\u4e2a\u57fa\u51c6\u4e0a\u8bc4\u6d4b", "HR1.5\u662f\u552f\u4e00\u8fbe\u5230\u6a21\u62dfFRCR 2B\u901a\u8fc7\u6807\u51c6\u7684\u7cfb\u7edf\uff0c\u5e76\u5728\u95ed\u5408\u5f0f\u4e34\u5e8a\u95ee\u9898\u3001\u591a\u4f53\u90e8\u4f4d\u62a5\u544a\u53ca\u4e73\u817a\u6444\u5f71\u62a5\u544a\u4e0a\u53d6\u5f97\u6700\u9ad8\u51c6\u786e\u7387"], "keywords": ["\u591a\u6a21\u6001", "\u533b\u5b66\u5f71\u50cf", "\u5927\u8bed\u8a00\u6a21\u578b", "\u653e\u5c04\u79d1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05880v1", "published_at": "2026-07-07", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Harrison.Rad 1.5 Technical Report: A radiology foundation model that can draft reports from images, priors and clinical context", "tldr": "Harrison.Rad 1.5\uff1a\u53ef\u6574\u5408\u56fe\u50cf\u3001\u75c5\u53f2\u4e0e\u5148\u9a8c\u7814\u7a76\u81ea\u52a8\u751f\u6210\u653e\u5c04\u79d1\u62a5\u544a\u7684\u591a\u6a21\u6001\u5927\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faHR1.5\uff0c\u4e00\u4e2a\u653e\u5c04\u79d1\u4e13\u7528\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u80fd\u63a5\u53d7\u4ea4\u9519\u7684\u6587\u672c\u4e0e\u56fe\u50cf\u8f93\u5165\uff0c\u8986\u76d6\u5e73\u7247\u653e\u5c04\u5b66\uff08\u80f8\u7247\u3001\u9aa8\u9abc\u3001\u8179\u90e8\u3001\u810a\u67f1\u3001\u76c6\u8154X\u5149\u53ca\u4e73\u817a\u6444\u5f71\uff09\uff0c\u81ea\u52a8\u751f\u6210\u7ed3\u6784\u5316\u4e0e\u975e\u7ed3\u6784\u5316\u653e\u5c04\u79d1\u62a5\u544a\u3002", "why_notable": "\u76f4\u63a5\u9488\u5bf9\u653e\u5c04\u79d1\u62a5\u544a\u79ef\u538b\u8fd9\u4e00\u4e34\u5e8a\u75db\u70b9\uff0c\u8986\u76d6\u591a\u79cd\u5f71\u50cf\u6a21\u6001\uff0c\u662f\u9996\u4e2a\u901a\u8fc7\u6a21\u62dfFRCR\u4e13\u79d1\u8003\u8bd5\u6807\u51c6\u7684AI\u7cfb\u7edf\uff0c\u5e76\u63d0\u4f9bGrad-CAM\u53ef\u89e3\u91ca\u6027\u4e0e\u7f6e\u4fe1\u5ea6\u4f30\u8ba1\uff0c\u4e3a\u4e34\u5e8a\u843d\u5730\u63d0\u4f9b\u8d1f\u8d23\u4efb\u7684\u8bc4\u4f30\u6846\u67b6\u3002"}, {"abstract": "Embodied navigation aims to build agents that interpret multimodal goals, reason in 3D space, and reach target destinations reliably in the real world. However, progress remains constrained by the lack of scalable, high-fidelity, and physically grounded interactive environments. Although real-world scanned datasets offer visual realism, they are limited by scale. In contrast, synthetic simulators scale more easily but often exhibit large sim-to-real gaps. We introduce Image2Sim, a real-time neural simulation framework that constructs high-quality interactive environments from posed RGB-D image sequences. The central idea is to decouple 3D spatial anchoring from photorealistic observation synthesis. For scene construction, Image2Sim uses a feed-forward feature Gaussian model that lifts posed RGB-D observations into a 3D feature-Gaussian representation in a single pass. For rendering, we propose a Geometry-Aware One-Step Pixel Flow model that transforms sparse and noisy Gaussian projections into high-quality panoramic RGB-D observations. Image2Sim also serves as a fully automated embodied data engine that generates high-fidelity observations, executable actions, and diverse navigation instructions at scale. It converts large collections of videos and images into nearly 20K interactive scenes and synthesizes more than 10 million navigation training samples. Navigation models trained entirely in these neural environments achieve strong improvements on major benchmarks and transfer effectively to real-world zero-shot settings. These results suggest that scalable neural simulation can serve as a practical training substrate for embodied navigation at scale.", "arxiv_id": "2607.05765", "arxiv_url": "https://arxiv.org/abs/2607.05765", "authors": ["Zihan Wang", "Seungjun Lee", "Yinghao Xu", "Gim Hee Lee"], "brief": "\u63d0\u51faImage2Sim\u6846\u67b6\uff0c\u5c06\u771f\u5b9e\u573a\u666f\u7684RGB-D\u56fe\u50cf\u5e8f\u5217\u81ea\u52a8\u6784\u5efa\u4e3a\u9ad8\u8d28\u91cf\u53ef\u4ea4\u4e92\u795e\u7ecf\u4eff\u771f\u73af\u5883\uff0c\u5e76\u4f5c\u4e3a\u6570\u636e\u5f15\u64ce\u751f\u6210\u5927\u89c4\u6a21\u5177\u8eab\u5bfc\u822a\u8bad\u7ec3\u6837\u672c\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05765", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5c063D\u7a7a\u95f4\u951a\u5b9a\u4e0e\u5149\u771f\u5b9e\u611f\u6e32\u67d3\u89e3\u8026\uff1a\u524d\u9988\u7279\u5f81\u9ad8\u65af\u6a21\u578b\u5355\u6b21\u63a8\u7406\u6784\u5efa3D\u573a\u666f\uff0c\u51e0\u4f55\u611f\u77e5\u5355\u6b65\u50cf\u7d20\u6d41\u6a21\u578b\u751f\u6210\u9ad8\u8d28\u91cf\u5168\u666fRGB-D\u89c2\u6d4b", "\u81ea\u52a8\u5316\u6570\u636e\u5f15\u64ce\uff1a\u4ece\u89c6\u9891/\u56fe\u50cf\u6784\u5efa\u8fd12\u4e07\u4e2a\u53ef\u4ea4\u4e92\u573a\u666f\uff0c\u5408\u6210\u8d851000\u4e07\u6761\u5bfc\u822a\u8bad\u7ec3\u6837\u672c", "\u5728\u4e3b\u6d41\u5bfc\u822a\u57fa\u51c6\u4e0a\u53d6\u5f97\u663e\u8457\u63d0\u5347\uff0c\u5e76\u6210\u529f\u96f6\u6837\u672c\u8fc1\u79fb\u81f3\u771f\u5b9e\u4e16\u754c"], "keywords": ["\u5177\u8eab\u5bfc\u822a", "\u795e\u7ecf\u4eff\u771f", "3D\u573a\u666f\u91cd\u5efa", "\u6570\u636e\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05765v1", "published_at": "2026-07-07", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Image2Sim: Scaling Embodied Navigation via Generative Neural Simulator", "tldr": "Image2Sim\u5c06RGB-D\u56fe\u50cf\u5e8f\u5217\u8f6c\u5316\u4e3a\u795e\u7ecf\u4eff\u771f\u73af\u5883\uff0c\u751f\u6210\u5343\u4e07\u7ea7\u5bfc\u822a\u8bad\u7ec3\u6570\u636e", "upvotes": 0, "what_it_is": "\u63d0\u51faImage2Sim\u6846\u67b6\uff0c\u5c06\u771f\u5b9e\u573a\u666f\u7684RGB-D\u56fe\u50cf\u5e8f\u5217\u81ea\u52a8\u6784\u5efa\u4e3a\u9ad8\u8d28\u91cf\u53ef\u4ea4\u4e92\u795e\u7ecf\u4eff\u771f\u73af\u5883\uff0c\u5e76\u4f5c\u4e3a\u6570\u636e\u5f15\u64ce\u751f\u6210\u5927\u89c4\u6a21\u5177\u8eab\u5bfc\u822a\u8bad\u7ec3\u6837\u672c\u3002", "why_notable": "\u7a81\u7834\u5177\u8eab\u5bfc\u822a\u9886\u57df\u6570\u636e\u74f6\u9888\uff0c\u4ee5\u795e\u7ecf\u4eff\u771f\u66ff\u4ee3\u4f20\u7edf\u5408\u6210\u6a21\u62df\u5668\uff0c\u5927\u5e45\u7f29\u5c0fsim-to-real\u5dee\u8ddd\uff0c\u4e3a\u5927\u89c4\u6a21\u5177\u8eab\u667a\u80fd\u8bad\u7ec3\u63d0\u4f9b\u53ef\u6269\u5c55\u57fa\u7840\u8bbe\u65bd"}, {"abstract": "Retargeting human object interaction demonstrations to physics based simulation requires reproducing not only body motion but also the object motion and contacts that make manipulation succeed. However, position only hand trajectories do not specify the contact forces needed to manipulate objects, and directly tracking them can overconstrain contact rich finger behavior. We introduce WristMimic, a wrist guided whole body control framework that explicitly separates contact free body motion from contact rich hand manipulation. The contact free body and wrist are guided by kinematic pose targets, whereas the fingers are not directly supervised by human hand pose. Instead, they learn grasping and manipulation behaviors from object tracking and contact outcomes. Our key insight is that the wrist is the natural gate between these two regimes. It is largely free from contact and can be tracked kinematically, yet it determines the global hand configuration and places the fingers within reachable grasp affordances. To ensure reliable wrist placement during interaction, we introduce wrist specific reset constraints and reward prioritization. Experiments show that WristMimic matches or surpasses methods using full finger pose supervision while enabling finger agnostic retargeting across diverse hand embodiments.", "arxiv_id": "2607.06438", "arxiv_url": "https://arxiv.org/abs/2607.06438", "authors": ["Wongyun Yu", "Youngwoon Kim", "Minsu Cho"], "brief": "\u63d0\u51faWristMimic\u6846\u67b6\uff0c\u5c06\u5168\u8eab\u4eba\u5f62\u673a\u5668\u4eba\u63a7\u5236\u5206\u4e3a\u65e0\u63a5\u89e6\u8eab\u4f53\u8fd0\u52a8\uff08\u8fd0\u52a8\u5b66\u8ddf\u8e2a\uff09\u548c\u63a5\u89e6\u4e30\u5bcc\u7684\u624b\u90e8\u64cd\u4f5c\uff08\u5bf9\u8c61\u8ddf\u8e2a+\u63a5\u89e6\u7ed3\u679c\u5b66\u4e60\uff09\u4e24\u4e2a\u9636\u6bb5\uff0c\u4ee5\u8155\u90e8\u4f5c\u4e3a\u4e24\u8005\u7684\u81ea\u7136\u5206\u754c\u70b9\uff0c\u5b9e\u73b0\u4ece\u4eba\u7c7b\u793a\u8303\u5230\u7269\u7406\u4eff\u771f\u7684\u9ad8\u6548\u52a8\u4f5c\u8fc1\u79fb\u3002", "categories": ["cs.RO", "cs.CV", "cs.GR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06438", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6838\u5fc3\u6d1e\u5bdf\uff1a\u8155\u90e8\u662f\u65e0\u63a5\u89e6\u8fd0\u52a8\u4e0e\u63a5\u89e6\u64cd\u4f5c\u7684\u5929\u7136\u5206\u754c\uff0c\u53ef\u8fd0\u52a8\u5b66\u8ddf\u8e2a\u8155\u90e8\u540c\u65f6\u8ba9\u624b\u6307\u81ea\u4e3b\u5b66\u4e60\u6293\u53d6\u884c\u4e3a", "\u624b\u6307\u4e0d\u4f9d\u8d56\u4eba\u7c7b\u624b\u90e8\u59ff\u6001\u76f4\u63a5\u76d1\u7763\uff0c\u800c\u662f\u901a\u8fc7\u7269\u4f53\u8ddf\u8e2a\u548c\u63a5\u89e6\u7ed3\u679c\u5b66\u4e60\u7075\u5de7\u64cd\u4f5c", "\u5f15\u5165\u8155\u90e8\u4e13\u5c5e\u91cd\u7f6e\u7ea6\u675f\u4e0e\u5956\u52b1\u4f18\u5148\u7ea7\u673a\u5236\uff0c\u786e\u4fdd\u4ea4\u4e92\u65f6\u8155\u90e8\u5b9a\u4f4d\u53ef\u9760\uff0c\u5e76\u652f\u6301\u8de8\u4e0d\u540c\u624b\u90e8\u5f62\u6001\u7684\u65e0\u5173\u624b\u6307\u8fc1\u79fb"], "keywords": ["\u673a\u5668\u4eba\u64cd\u63a7", "\u5168\u8eab\u63a7\u5236", "\u5f3a\u5316\u5b66\u4e60", "\u52a8\u4f5c\u8fc1\u79fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06438v1", "published_at": "2026-07-07", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "WristMimic: Full-Body Humanoid Control with Wrist-Guided Manipulation", "tldr": "\u4ee5\u8155\u90e8\u4e3a\u67a2\u7ebd\u7684\u5168\u8eab\u4eba\u5f62\u673a\u5668\u4eba\u64cd\u63a7\u6846\u67b6\uff0c\u5b9e\u73b0\u65e0\u9700\u624b\u6307\u59ff\u6001\u76d1\u7763\u7684\u7075\u5de7\u64cd\u4f5c\u8fc1\u79fb", "upvotes": 0, "what_it_is": "\u63d0\u51faWristMimic\u6846\u67b6\uff0c\u5c06\u5168\u8eab\u4eba\u5f62\u673a\u5668\u4eba\u63a7\u5236\u5206\u4e3a\u65e0\u63a5\u89e6\u8eab\u4f53\u8fd0\u52a8\uff08\u8fd0\u52a8\u5b66\u8ddf\u8e2a\uff09\u548c\u63a5\u89e6\u4e30\u5bcc\u7684\u624b\u90e8\u64cd\u4f5c\uff08\u5bf9\u8c61\u8ddf\u8e2a+\u63a5\u89e6\u7ed3\u679c\u5b66\u4e60\uff09\u4e24\u4e2a\u9636\u6bb5\uff0c\u4ee5\u8155\u90e8\u4f5c\u4e3a\u4e24\u8005\u7684\u81ea\u7136\u5206\u754c\u70b9\uff0c\u5b9e\u73b0\u4ece\u4eba\u7c7b\u793a\u8303\u5230\u7269\u7406\u4eff\u771f\u7684\u9ad8\u6548\u52a8\u4f5c\u8fc1\u79fb\u3002", "why_notable": "\u89e3\u51b3\u4e86\u4eba\u673a\u52a8\u4f5c\u8fc1\u79fb\u4e2d\u624b\u6307\u8fc7\u7ea6\u675f\u95ee\u9898\uff0c\u65e0\u9700\u5168\u624b\u6307\u59ff\u6001\u6807\u6ce8\u5373\u53ef\u5339\u654c\u751a\u81f3\u8d85\u8d8a\u6709\u76d1\u7763\u65b9\u6cd5\uff0c\u5bf9\u673a\u5668\u4eba\u7075\u5de7\u64cd\u4f5c\u548c\u8de8\u5f62\u6001\u8fc1\u79fb\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "The future of World Models depends not only on scaling model capability, but also on scaling practicality and inference efficiency. High-frame-rate inference enables responsive perception, planning, and control in real-world autonomous systems. To this end, we present MoWorld, a cost-effective yet high-performance Flash World Model with an end-to-end framework spanning data generation, pre-training, distillation, and efficient inference, enabling up to 50 FPS real-time interaction with cinematic visual quality without the need of high-end GPUs. To enable large-scale real-world deployment, MoWorld jointly optimizes model capability and cost throughout the entire development pipeline. Specifically, unlike existing approaches that primarily rely on large-scale video corpora, MoWorld is built upon a scalable 3D-native data engine accumulated from our large-scale 3D vision and generative modeling pipeline, enabling the efficient construction of geometrically consistent training data across diverse real-world and synthetic environments. Based on this foundation, a curriculum cross-frame pre-training strategy for stable and scalable World Model learning, an efficient denoising-step distillation algorithm to reduce diffusion training cost, and a mixed-precision parallel inference framework for low-cost real-time deployment. MoWorld is the first real-time interactive World Model built on the Neural Processing Unit (NPU) and can achieves up to 50 FPS in such the devices, enabling practical and efficient deployment at scale. Comprehensive evaluations demonstrate that MoWorld achieves leading performance; notably, its average inference cost is only 30\\%-50\\% of that of existing World Models, providing a practical foundation for large-scale real-world applications of World Models. We also demonstrate diverse applications of MoWorld.", "arxiv_id": "2607.06216", "arxiv_url": "https://arxiv.org/abs/2607.06216", "authors": ["Team Moxin", "Deyi Ji", "Tianrun Chen", "Xin Zhang", "Jiale Yang", "Qi Zhu", "An Zhao", "Zihao Xie", "Han Wang", "Xuanyi Liu", "Yixiang Zhou", "Pei Liu", "Yi Tan", "Cheng Chen", "Dayi Zhu", "Mingyu Wei", "Hanjie Xu", "Jun Liao", "Siqi Li", "Lingyu Lu", "Hongye Fang", "Hongming Tan", "Youjiang Zhu", "Taiyu Zhang", "Zejian Li", "Chaotao Ding", "Lanyun Zhu", "Yunhe Pan", "Lingyun Sun"], "brief": "MoWorld\u662f\u4e00\u4e2a\u9ad8\u6548\u7684\"\u95ea\u7535\u4e16\u754c\u6a21\u578b\"\uff0c\u901a\u8fc73D\u539f\u751f\u6570\u636e\u5f15\u64ce\u3001\u8bfe\u7a0b\u5f0f\u8de8\u5e27\u9884\u8bad\u7ec3\u3001\u53bb\u566a\u6b65\u9aa4\u84b8\u998f\u548c\u6df7\u5408\u7cbe\u5ea6\u5e76\u884c\u63a8\u7406\uff0c\u5b9e\u73b0\u4e86\u5728NPU\u8bbe\u5907\u4e0a50FPS\u5b9e\u65f6\u4ea4\u4e92\uff0c\u540c\u65f6\u4fdd\u6301\u7535\u5f71\u7ea7\u89c6\u89c9\u8d28\u91cf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06216", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u9996\u4e2a\u90e8\u7f72\u5728NPU\u4e0a\u7684\u5b9e\u65f6\u4ea4\u4e92\u4e16\u754c\u6a21\u578b\uff0c\u63a8\u7406\u901f\u5ea6\u8fbe50FPS\uff0c\u65e0\u9700\u9ad8\u7aefGPU", "\u57fa\u4e8e\u5927\u89c4\u6a213D\u89c6\u89c9\u751f\u6210\u6d41\u6c34\u7ebf\u6784\u5efa3D\u539f\u751f\u6570\u636e\u5f15\u64ce\uff0c\u751f\u6210\u51e0\u4f55\u4e00\u81f4\u7684\u591a\u6837\u5316\u8bad\u7ec3\u6570\u636e", "\u5e73\u5747\u63a8\u7406\u6210\u672c\u4ec5\u4e3a\u73b0\u6709\u4e16\u754c\u6a21\u578b\u768430%-50%\uff0c\u901a\u8fc7\u53bb\u566a\u6b65\u9aa4\u84b8\u998f\u7b97\u6cd5\u5927\u5e45\u964d\u4f4e\u6269\u6563\u6a21\u578b\u8bad\u7ec3\u5f00\u9500"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u6269\u6563\u6a21\u578b", "\u9ad8\u6548\u63a8\u7406", "\u81ea\u52a8\u9a7e\u9a76"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06216v1", "published_at": "2026-07-07", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MoWorld: A Flash World Model", "tldr": "MoWorld\uff1a\u9996\u4e2a\u57fa\u4e8eNPU\u7684\u5b9e\u65f6\u4ea4\u4e92\u4e16\u754c\u6a21\u578b\uff0c50FPS\u9ad8\u5e27\u7387\u63a8\u7406\uff0c\u6210\u672c\u4ec5\u4e3a\u73b0\u6709\u65b9\u6848\u768430-50%", "upvotes": 0, "what_it_is": "MoWorld\u662f\u4e00\u4e2a\u9ad8\u6548\u7684\"\u95ea\u7535\u4e16\u754c\u6a21\u578b\"\uff0c\u901a\u8fc73D\u539f\u751f\u6570\u636e\u5f15\u64ce\u3001\u8bfe\u7a0b\u5f0f\u8de8\u5e27\u9884\u8bad\u7ec3\u3001\u53bb\u566a\u6b65\u9aa4\u84b8\u998f\u548c\u6df7\u5408\u7cbe\u5ea6\u5e76\u884c\u63a8\u7406\uff0c\u5b9e\u73b0\u4e86\u5728NPU\u8bbe\u5907\u4e0a50FPS\u5b9e\u65f6\u4ea4\u4e92\uff0c\u540c\u65f6\u4fdd\u6301\u7535\u5f71\u7ea7\u89c6\u89c9\u8d28\u91cf\u3002", "why_notable": "\u4e16\u754c\u6a21\u578b\u5b9e\u7528\u5316\u90e8\u7f72\u7684\u91cd\u8981\u7a81\u7834\uff1a\u9996\u6b21\u5c06\u4e16\u754c\u6a21\u578b\u63a8\u5411NPU\u7aef\u4fa7\u5b9e\u65f6\u8fd0\u884c\uff0c\u5927\u5e45\u964d\u4f4e\u63a8\u7406\u6210\u672c\uff0c\u4e3a\u81ea\u52a8\u9a7e\u9a76\u3001\u673a\u5668\u4eba\u7b49\u771f\u5b9e\u573a\u666f\u7684\u5927\u89c4\u6a21\u843d\u5730\u63d0\u4f9b\u53ef\u884c\u8def\u5f84\u3002"}, {"abstract": "Large language models (LLMs) have demonstrated growing competence in web page generation. However, existing text-driven approaches rely on complex prompts that impose substantial demands on users and offer limited expressivity for page layout and cross-page visual coherence. Image-driven paradigms, which take UI screenshots as input, align more closely with real development workflows. However, current benchmarks focus primarily on visual fidelity and lack a systematic evaluation of the interaction capabilities in generated artifacts. To address this gap, we introduce UI2App, the first benchmark targeting interaction inference, the ability to recover application behavior from screenshots alone, without any textual or behavioral guidance. UI2App comprises 327 screenshots grouped into 45 state-coherent screenshot sets for runnable multi-route web applications. We design an end-to-end pipeline that evaluates each artifact along four dimensions: executability, navigation reachability, visual fidelity, and interaction inference. The interaction metric (IIS) assesses inferred interactions by functional correctness and state-management complexity, crediting any valid implementation rather than matching a single reference. Experiments on six frontier vision-language models reveal a marked capability mismatch between visual reconstruction and interaction realization: the visual-fidelity leader scores only 7.5 on IIS, ranking fourth and trailing the IIS leader by 5.2x. High-complexity interactions such as cross-page state remain a pervasive bottleneck, with half of the evaluated models scoring exactly zero on this dimension. Overall, the results indicate that inferring complete interaction behavior from static screenshots remains a key challenge for models.", "arxiv_id": "2607.06306", "arxiv_url": "https://arxiv.org/abs/2607.06306", "authors": ["Grace Man Chen", "Litao Guo", "Yifan Wu", "Yiyu Chen", "Yenchi Tseng", "Sicheng Liu", "Yuyu Luo", "Ying-Cong Chen"], "brief": "\u63d0\u51faUI2App\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u6d4b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4ec5\u51edUI\u622a\u56fe\u751f\u6210\u53ef\u6267\u884c\u591a\u8def\u7531Web\u5e94\u7528\u7684\u4ea4\u4e92\u63a8\u65ad\u80fd\u529b\uff0c\u5305\u542b327\u5f20\u622a\u56fe\u300145\u7ec4\u72b6\u6001\u4e00\u81f4\u622a\u56fe\u96c6\uff0c\u4ece\u53ef\u6267\u884c\u6027\u3001\u5bfc\u822a\u53ef\u8fbe\u6027\u3001\u89c6\u89c9\u4fdd\u771f\u5ea6\u548c\u4ea4\u4e92\u63a8\u65ad\u56db\u7ef4\u5ea6\u8bc4\u4f30\u3002", "categories": ["cs.SE", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06306", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u8bbe\u8ba1\u4ea4\u4e92\u63a8\u65ad\u8bc4\u5206\uff08IIS\uff09\uff0c\u4ee5\u529f\u80fd\u6b63\u786e\u6027\u548c\u72b6\u6001\u7ba1\u7406\u590d\u6742\u5ea6\u8861\u91cf\uff0c\u5141\u8bb8\u4efb\u610f\u6709\u6548\u5b9e\u73b0\u800c\u975e\u5f3a\u5236\u5339\u914d\u53c2\u8003\u7b54\u6848", "\u5b9e\u9a8c\u53d1\u73b0\u89c6\u89c9\u4fdd\u771f\u5ea6\u4e0e\u4ea4\u4e92\u5b9e\u73b0\u80fd\u529b\u4e25\u91cd\u4e0d\u5339\u914d\uff1a\u89c6\u89c9\u4fdd\u771f\u5ea6\u6700\u4f18\u6a21\u578bIIS\u4ec57.5\u5206\uff0c\u6392\u540d\u7b2c\u56db\uff0c\u843d\u540eIIS\u6700\u4f18\u6a21\u578b5.2\u500d", "\u8de8\u9875\u9762\u72b6\u6001\u7b49\u9ad8\u590d\u6742\u5ea6\u4ea4\u4e92\u662f\u666e\u904d\u74f6\u9888\uff0c\u534a\u6570\u6a21\u578b\u5728\u8be5\u7ef4\u5ea6\u5f97\u5206\u4e3a\u96f6"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06306v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "UI2App: Benchmarking Visual Interaction Inference in Executable Web Application Generation", "tldr": "UI2App\uff1a\u9996\u4e2a\u8bc4\u6d4b\u4ece\u622a\u56fe\u63a8\u65adWeb\u5e94\u7528\u4ea4\u4e92\u884c\u4e3a\u80fd\u529b\u7684\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faUI2App\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u6d4b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4ec5\u51edUI\u622a\u56fe\u751f\u6210\u53ef\u6267\u884c\u591a\u8def\u7531Web\u5e94\u7528\u7684\u4ea4\u4e92\u63a8\u65ad\u80fd\u529b\uff0c\u5305\u542b327\u5f20\u622a\u56fe\u300145\u7ec4\u72b6\u6001\u4e00\u81f4\u622a\u56fe\u96c6\uff0c\u4ece\u53ef\u6267\u884c\u6027\u3001\u5bfc\u822a\u53ef\u8fbe\u6027\u3001\u89c6\u89c9\u4fdd\u771f\u5ea6\u548c\u4ea4\u4e92\u63a8\u65ad\u56db\u7ef4\u5ea6\u8bc4\u4f30\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u5f53\u524d\u524d\u6cbf\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728UI\u622a\u56fe\u9a71\u52a8\u7684Web\u5e94\u7528\u751f\u6210\u4e2d\uff0c\u89c6\u89c9\u91cd\u5efa\u4e0e\u4ea4\u4e92\u884c\u4e3a\u63a8\u65ad\u4e4b\u95f4\u5b58\u5728\u663e\u8457\u80fd\u529b\u9e3f\u6c9f\uff0c\u4e3aUI\u81ea\u52a8\u5316\u4ee3\u7801\u751f\u6210\u7814\u7a76\u6307\u660e\u5173\u952e\u77ed\u677f\u3002"}, {"abstract": "Multimodal document retrieval aims to retrieve relevant pages while preserving both textual and visual content from the original document. However, existing benchmarks primarily evaluate simple lexical or semantic matching, and most methods encode pages independently. Consequently, they overlook the contextual information in the document required to resolve queries that aggregate information across multiple pages. In this paper, we introduce CMDR and CMDR-Bench, a new multimodal document retrieval task and benchmark that require modeling document context. To address this challenge, we propose CMDR-Embed, a contextual multimodal embedding framework that explicitly incorporates document context by jointly encoding multiple pages and deriving page-level embeddings from a shared contextual representation. Furthermore, we introduce CMCL, a contextual multimodal contrastive learning objective that effectively trains CMDR-Embed by balancing contextual modeling with page-level discriminability. Experiments demonstrate that CMDR-Embed significantly outperforms non-contextual embeddings, highlighting the importance of context-aware multimodal embeddings for advancing document retrieval.", "arxiv_id": "2607.05927", "arxiv_url": "https://arxiv.org/abs/2607.05927", "authors": ["Ryota Tanaka", "Taku Hasegawa", "Kyosuke Nishida"], "brief": "\u63d0\u51faCMDR\u4efb\u52a1\u4e0eCMDR-Bench\u57fa\u51c6\uff0c\u4ee5\u53caCMDR-Embed\u4e0a\u4e0b\u6587\u591a\u6a21\u6001\u5d4c\u5165\u6846\u67b6\uff0c\u901a\u8fc7\u8054\u5408\u7f16\u7801\u591a\u4e2a\u9875\u9762\u5e76\u4ece\u5171\u4eab\u4e0a\u4e0b\u6587\u8868\u793a\u4e2d\u63d0\u53d6\u9875\u9762\u7ea7\u5d4c\u5165\uff0c\u89e3\u51b3\u8de8\u9875\u4fe1\u606f\u805a\u5408\u7684\u6587\u6863\u68c0\u7d22\u95ee\u9898\u3002", "categories": ["cs.IR", "cs.AI", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05927", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u73b0\u6709\u65b9\u6cd5\u72ec\u7acb\u7f16\u7801\u6bcf\u9875\uff0c\u5ffd\u7565\u8de8\u9875\u4e0a\u4e0b\u6587\uff0c\u65e0\u6cd5\u5904\u7406\u9700\u805a\u5408\u591a\u9875\u4fe1\u606f\u7684\u67e5\u8be2", "CMDR-Embed\u8054\u5408\u7f16\u7801\u591a\u9875\u9762\uff0c\u4ece\u5171\u4eab\u4e0a\u4e0b\u6587\u8868\u793a\u4e2d\u6d3e\u751f\u9875\u9762\u7ea7\u5d4c\u5165", "\u63d0\u51faCMCL\uff08\u4e0a\u4e0b\u6587\u591a\u6a21\u6001\u5bf9\u6bd4\u5b66\u4e60\u76ee\u6807\uff09\uff0c\u5e73\u8861\u4e0a\u4e0b\u6587\u5efa\u6a21\u4e0e\u9875\u9762\u7ea7\u53ef\u533a\u5206\u6027"], "keywords": ["\u591a\u6a21\u6001\u68c0\u7d22", "\u6587\u6863\u7406\u89e3", "\u5bf9\u6bd4\u5b66\u4e60", "\u5d4c\u5165\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05927v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CMDR: Contextual Multimodal Document Retrieval", "tldr": "\u63d0\u51fa\u4e0a\u4e0b\u6587\u591a\u6a21\u6001\u6587\u6863\u68c0\u7d22\u4efb\u52a1\u4e0e\u6846\u67b6\uff0c\u8054\u5408\u7f16\u7801\u591a\u9875\u9762\u4ee5\u6355\u83b7\u8de8\u9875\u4e0a\u4e0b\u6587\u4fe1\u606f", "upvotes": 0, "what_it_is": "\u63d0\u51faCMDR\u4efb\u52a1\u4e0eCMDR-Bench\u57fa\u51c6\uff0c\u4ee5\u53caCMDR-Embed\u4e0a\u4e0b\u6587\u591a\u6a21\u6001\u5d4c\u5165\u6846\u67b6\uff0c\u901a\u8fc7\u8054\u5408\u7f16\u7801\u591a\u4e2a\u9875\u9762\u5e76\u4ece\u5171\u4eab\u4e0a\u4e0b\u6587\u8868\u793a\u4e2d\u63d0\u53d6\u9875\u9762\u7ea7\u5d4c\u5165\uff0c\u89e3\u51b3\u8de8\u9875\u4fe1\u606f\u805a\u5408\u7684\u6587\u6863\u68c0\u7d22\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u6587\u6863\u4e0a\u4e0b\u6587\u5efa\u6a21\u5f15\u5165\u591a\u6a21\u6001\u6587\u6863\u68c0\u7d22\uff0c\u586b\u8865\u4e86\u73b0\u6709\u57fa\u51c6\u548c\u65b9\u6cd5\u5728\u8de8\u9875\u8bed\u4e49\u7406\u89e3\u4e0a\u7684\u7a7a\u767d\uff0c\u5bf9\u5b9e\u9645\u957f\u6587\u6863\u68c0\u7d22\u573a\u666f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Recent advancements in Multimodal Large Language Models (MLLMs) have evolved from static perception to interleaved visual-language reasoning, often referred to as ``thinking with images\u0027\u0027. A basic operation in this reasoning process is to zoom in on regions of interest (often represented with bounding boxes) to acquire finer visual details. In this paper, we propose \\textbf{Seg}mentation before \\textbf{Answer}ing (SegAnswer), which shifts the unit of zoom-in from the popular bounding box to pixel-level segmentation mask. By employing fine-grained masks to isolate the target area from cluttered environments, segmented visual input yields a more precise region of interest, effectively filtering out redundant background and interfering objects. Furthermore, the discrete patches of segmented visual input align more seamlessly with how MLLMs structure visual tokens via positional embeddings. In experiments, we evaluate SegAnswer across diverse benchmarks, including high-resolution perception, general perception, and hallucination. It achieves consistent improvements and also exhibits considerable performance on segmentation tasks, validating its capability for reliable pixel grounding.", "arxiv_id": "2607.05798", "arxiv_url": "https://arxiv.org/abs/2607.05798", "authors": ["Yake Wei", "Yuan Wang", "Fengyun Rao", "Jing Lyu", "Di Hu"], "brief": "\u63d0\u51faSegAnswer\uff08\u5148\u5206\u5272\u540e\u56de\u7b54\uff09\u65b9\u6cd5\uff0c\u5c06\u591a\u6a21\u6001\u5927\u6a21\u578b\u89c6\u89c9\u63a8\u7406\u4e2d\u7684\u611f\u5174\u8da3\u533a\u57df\u8868\u793a\u4ece\u8fb9\u754c\u6846\u5347\u7ea7\u4e3a\u50cf\u7d20\u7ea7\u5206\u5272\u63a9\u7801\uff0c\u901a\u8fc7\u7cbe\u7ec6\u63a9\u7801\u9694\u79bb\u76ee\u6807\u533a\u57df\u3001\u8fc7\u6ee4\u80cc\u666f\u5e72\u6270\uff0c\u63d0\u5347\u89c6\u89c9\u63a8\u7406\u7cbe\u5ea6\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.05798", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u7528\u50cf\u7d20\u7ea7\u5206\u5272\u63a9\u7801\u66ff\u4ee3\u8fb9\u754c\u6846\u4f5c\u4e3a\u89c6\u89c9\u63a8\u7406\u7684\u7f29\u653e\u5355\u5143\uff0c\u66f4\u7cbe\u51c6\u5730\u9694\u79bb\u76ee\u6807\u533a\u57df", "\u5206\u5272\u540e\u7684\u79bb\u6563\u89c6\u89c9\u5757\u4e0eMLLM\u4f4d\u7f6e\u7f16\u7801\u7684\u89c6\u89c9token\u7ed3\u6784\u66f4\u81ea\u7136\u5bf9\u9f50", "\u5728\u9ad8\u5206\u8fa8\u7387\u611f\u77e5\u3001\u901a\u7528\u611f\u77e5\u548c\u5e7b\u89c9\u7b49\u591a\u4e2a\u57fa\u51c6\u4e0a\u5747\u53d6\u5f97\u4e00\u81f4\u6027\u63d0\u5347\uff0c\u540c\u65f6\u5728\u5206\u5272\u4efb\u52a1\u4e0a\u8868\u73b0\u826f\u597d"], "keywords": ["\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u89c6\u89c9\u63a8\u7406", "\u56fe\u50cf\u5206\u5272", "\u611f\u77e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.05798v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Segmentation before Answering: Pixel Grounding for MLLM Visual Reasoning", "tldr": "\u63d0\u51faSegAnswer\u6846\u67b6\uff0c\u7528\u50cf\u7d20\u7ea7\u5206\u5272\u63a9\u7801\u66ff\u4ee3\u8fb9\u754c\u6846\u4f5c\u4e3a\u591a\u6a21\u6001\u5927\u6a21\u578b\u89c6\u89c9\u63a8\u7406\u7684\u7f29\u653e\u5355\u5143", "upvotes": 0, "what_it_is": "\u63d0\u51faSegAnswer\uff08\u5148\u5206\u5272\u540e\u56de\u7b54\uff09\u65b9\u6cd5\uff0c\u5c06\u591a\u6a21\u6001\u5927\u6a21\u578b\u89c6\u89c9\u63a8\u7406\u4e2d\u7684\u611f\u5174\u8da3\u533a\u57df\u8868\u793a\u4ece\u8fb9\u754c\u6846\u5347\u7ea7\u4e3a\u50cf\u7d20\u7ea7\u5206\u5272\u63a9\u7801\uff0c\u901a\u8fc7\u7cbe\u7ec6\u63a9\u7801\u9694\u79bb\u76ee\u6807\u533a\u57df\u3001\u8fc7\u6ee4\u80cc\u666f\u5e72\u6270\uff0c\u63d0\u5347\u89c6\u89c9\u63a8\u7406\u7cbe\u5ea6\u3002", "why_notable": "\u5c06\u50cf\u7d20\u7ea7\u5206\u5272\u5f15\u5165MLLM\u89c6\u89c9\u63a8\u7406\u94fe\u8def\uff0c\u662f\u5bf9\"thinking with images\"\u8303\u5f0f\u7684\u7cbe\u7ec6\u5316\u5347\u7ea7\uff0c\u6709\u6548\u89e3\u51b3\u80cc\u666f\u5e72\u6270\u548c\u5197\u4f59\u4fe1\u606f\u95ee\u9898\uff0c\u5bf9\u63d0\u5347\u591a\u6a21\u6001\u6a21\u578b\u611f\u77e5\u7cbe\u5ea6\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Vision-Language Models (VLMs) are increasingly utilized as the conditioning backbone for diffusion-based image editing due to their remarkable multimodal reasoning capabilities. While standalone VLMs demonstrate strong localization capabilities, editing pipelines frequently struggle to maintain this accuracy, particularly in complex, multi-entity scenes. In this work, we investigate this performance gap, hypothesizing that it stems from treating the VLM as a condition encoder. In this role, the model is restricted to a single forward pass, preventing the autoregressive generation process for which it was optimized, thereby failing to fully expose its capabilities. To investigate whether this spatial understanding persists when the VLM is used as a condition encoder, we introduce Analysis-by-Proxy. In this framework, we train a lightweight, interpretable proxy model on the VLM\u0027s intermediate representations using an auxiliary localization task. By analyzing the VLM through this proxy, we uncover the specific VLM representations that encode localization information. Our findings expose a fundamental mismatch between how spatial knowledge is represented within a VLM condition encoder and how it is extracted by current editing pipelines. We reveal that under single-pass constraints, the localization signal does not reliably propagate to the predefined layer configurations commonly used for conditioning. Instead, this crucial signal remains hidden within intermediate representations, at locations that vary depending on the input prompt. Using our introduced Analysis-by-Proxy framework, we reveal the fundamental failures of existing condition extraction strategies in editing pipelines, opening the door to more principled design of conditioning architectures.", "arxiv_id": "2607.06445", "arxiv_url": "https://arxiv.org/abs/2607.06445", "authors": ["Yoav Baron", "Sara Dorfman", "Roni Paiss", "Daniel Cohen-Or", "Or Patashnik"], "brief": "\u63d0\u51faAnalysis-by-Proxy\u6846\u67b6\uff0c\u901a\u8fc7\u5728VLM\u4e2d\u95f4\u8868\u793a\u4e0a\u8bad\u7ec3\u8f7b\u91cf\u7ea7\u4ee3\u7406\u6a21\u578b\u6765\u5206\u6790\u5b9a\u4f4d\u4fe1\u53f7\u7684\u5206\u5e03\uff0c\u63ed\u793a\u6269\u6563\u6a21\u578b\u56fe\u50cf\u7f16\u8f91\u6d41\u6c34\u7ebf\u4e2dVLM\u6761\u4ef6\u7f16\u7801\u5668\u65e0\u6cd5\u6709\u6548\u4f20\u9012\u7a7a\u95f4\u5b9a\u4f4d\u4fe1\u606f\u7684\u6839\u672c\u539f\u56e0\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06445", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["VLM\u5728\u5355\u6b21\u524d\u5411\u4f20\u64ad\uff08\u6761\u4ef6\u7f16\u7801\u5668\u6a21\u5f0f\uff09\u4e0b\uff0c\u5b9a\u4f4d\u4fe1\u53f7\u65e0\u6cd5\u53ef\u9760\u4f20\u64ad\u5230\u5e38\u7528\u7684\u9884\u5b9a\u4e49\u5c42\u914d\u7f6e", "\u5b9a\u4f4d\u4fe1\u53f7\u9690\u85cf\u5728\u4e2d\u95f4\u8868\u793a\u4e2d\uff0c\u4e14\u5176\u4f4d\u7f6e\u968f\u8f93\u5165\u63d0\u793a\u8bcd\u52a8\u6001\u53d8\u5316\uff0c\u800c\u975e\u56fa\u5b9a\u5c42", "\u901a\u8fc7\u53ef\u89e3\u91ca\u4ee3\u7406\u6a21\u578b\u7684\u8f85\u52a9\u5b9a\u4f4d\u4efb\u52a1\uff0c\u7cbe\u786e\u5b9a\u4f4dVLM\u5185\u90e8\u7f16\u7801\u7a7a\u95f4\u4fe1\u606f\u7684\u5177\u4f53\u8868\u793a\u5c42"], "keywords": ["\u591a\u6a21\u6001", "\u6269\u6563\u6a21\u578b", "\u56fe\u50cf\u7f16\u8f91", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06445v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Analysis-by-Proxy: Localization Signals in VLMs Operating as Condition Encoders", "tldr": "\u63ed\u793aVLM\u4f5c\u4e3a\u6761\u4ef6\u7f16\u7801\u5668\u65f6\u7a7a\u95f4\u5b9a\u4f4d\u4fe1\u53f7\u88ab\u9690\u85cf\u5728\u4e2d\u95f4\u5c42\u7684\u6839\u672c\u7f3a\u9677", "upvotes": 0, "what_it_is": "\u63d0\u51faAnalysis-by-Proxy\u6846\u67b6\uff0c\u901a\u8fc7\u5728VLM\u4e2d\u95f4\u8868\u793a\u4e0a\u8bad\u7ec3\u8f7b\u91cf\u7ea7\u4ee3\u7406\u6a21\u578b\u6765\u5206\u6790\u5b9a\u4f4d\u4fe1\u53f7\u7684\u5206\u5e03\uff0c\u63ed\u793a\u6269\u6563\u6a21\u578b\u56fe\u50cf\u7f16\u8f91\u6d41\u6c34\u7ebf\u4e2dVLM\u6761\u4ef6\u7f16\u7801\u5668\u65e0\u6cd5\u6709\u6548\u4f20\u9012\u7a7a\u95f4\u5b9a\u4f4d\u4fe1\u606f\u7684\u6839\u672c\u539f\u56e0\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u8bca\u65ad\u4e86VLM\u6761\u4ef6\u7f16\u7801\u5668\u4e0e\u6269\u6563\u7f16\u8f91\u6d41\u6c34\u7ebf\u4e4b\u95f4\u7684\u7a7a\u95f4\u77e5\u8bc6\u63d0\u53d6\u5931\u914d\u95ee\u9898\uff0c\u4e3a\u66f4\u5408\u7406\u7684\u6761\u4ef6\u67b6\u6784\u8bbe\u8ba1\u63d0\u4f9b\u4e86\u7406\u8bba\u4f9d\u636e\uff0c\u5bf9\u56fe\u50cf\u7f16\u8f91\u9886\u57df\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Concept unlearning in text-to-image diffusion models is critical for safe and practical deployment: with rising privacy concerns, copyright disputes, trademark constraints, and safety regulations, deployed systems must be able to suppress unwanted concepts after training. Existing methods often remove the target concept effectively, but practical unlearning also requires an equally fundamental property: the unlearned model should retain quality, diversity, and semantic coverage on benign generation. The gold standard is a retain-only model trained from scratch without the unwanted data. However, common erasure objectives do not specify which post-unlearning distribution should approximate this reference, leaving retention as an implicit consequence of the update rule. We propose TILDE, TILt-based Distributional Erasure, which formulates concept unlearning as a distributional alignment problem: the desired target is the minimum-deviation conditional distribution from the pretrained model under a forgetting constraint. This energy-tilted, anchor-free target suppresses concept-expressing images while preserving benign relative mass for each prompt. We instantiate this principle with residual $\\nabla$-GFlowNet training, which learns the score correction induced by the forget energy relative to the pretrained diffusion model. Across objects, artistic styles, and characters, TILDE achieves strong forgetting while improving retention and distributional fidelity over prior baselines.", "arxiv_id": "2607.06432", "arxiv_url": "https://arxiv.org/abs/2607.06432", "authors": ["Naveen George", "Naoki Murata", "Yuhta Takida", "Konda Reddy Mopuri", "Yuki Mitsufuji"], "brief": "TILDE\u5c06\u6587\u672c\u5230\u56fe\u50cf\u6269\u6563\u6a21\u578b\u7684\u6982\u5ff5\u9057\u5fd8\u91cd\u65b0\u5b9a\u4e49\u4e3a\u5206\u5e03\u5bf9\u9f50\u95ee\u9898\uff1a\u5728\u9057\u5fd8\u7ea6\u675f\u4e0b\u5bfb\u627e\u4e0e\u9884\u8bad\u7ec3\u6a21\u578b\u6700\u5c0f\u504f\u5dee\u7684\u6761\u4ef6\u5206\u5e03\uff0c\u5e76\u901a\u8fc7\u6b8b\u5dee\u2207-GFlowNet\u8bad\u7ec3\u5b9e\u73b0\u5206\u6570\u4fee\u6b63\u3002", "categories": ["cs.LG", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06432", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5c06\u76ee\u6807\u540e\u9a8c\u5b9a\u4e49\u4e3a\u80fd\u91cf\u503e\u659c\uff08energy-tilted\uff09\u5206\u5e03\uff0c\u5728\u6291\u5236\u76ee\u6807\u6982\u5ff5\u56fe\u50cf\u7684\u540c\u65f6\u4fdd\u7559\u826f\u6027\u5185\u5bb9\u7684\u76f8\u5bf9\u6982\u7387\u8d28\u91cf", "\u91c7\u7528\u65e0\u951a\u70b9\uff08anchor-free\uff09\u8bbe\u8ba1\uff0c\u907f\u514d\u73b0\u6709\u65b9\u6cd5\u56e0\u672a\u660e\u786e\u6307\u5b9a\u9057\u5fd8\u540e\u5206\u5e03\u800c\u5bfc\u81f4\u7684\u4fdd\u7559\u6027\u80fd\u4e0b\u964d\u95ee\u9898", "\u5728\u7269\u4f53\u3001\u827a\u672f\u98ce\u683c\u3001\u89d2\u8272\u7b49\u591a\u7c7b\u6982\u5ff5\u4e0a\u9a8c\u8bc1\uff0c\u9057\u5fd8\u6548\u679c\u5f3a\u4e14\u5206\u5e03\u4fdd\u771f\u5ea6\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u65b9\u6cd5"], "keywords": ["\u6982\u5ff5\u9057\u5fd8", "\u6269\u6563\u6a21\u578b", "\u5206\u5e03\u5bf9\u9f50", "\u5b89\u5168AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06432v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "TILDE: TILt-based Distributional Erasure for Concept Unlearning", "tldr": "\u63d0\u51faTILDE\u6846\u67b6\uff0c\u5c06\u6982\u5ff5\u9057\u5fd8\u5efa\u6a21\u4e3a\u5206\u5e03\u5bf9\u9f50\u95ee\u9898\uff0c\u5728\u6d88\u9664\u76ee\u6807\u6982\u5ff5\u540c\u65f6\u4fdd\u7559\u826f\u6027\u751f\u6210\u8d28\u91cf", "upvotes": 0, "what_it_is": "TILDE\u5c06\u6587\u672c\u5230\u56fe\u50cf\u6269\u6563\u6a21\u578b\u7684\u6982\u5ff5\u9057\u5fd8\u91cd\u65b0\u5b9a\u4e49\u4e3a\u5206\u5e03\u5bf9\u9f50\u95ee\u9898\uff1a\u5728\u9057\u5fd8\u7ea6\u675f\u4e0b\u5bfb\u627e\u4e0e\u9884\u8bad\u7ec3\u6a21\u578b\u6700\u5c0f\u504f\u5dee\u7684\u6761\u4ef6\u5206\u5e03\uff0c\u5e76\u901a\u8fc7\u6b8b\u5dee\u2207-GFlowNet\u8bad\u7ec3\u5b9e\u73b0\u5206\u6570\u4fee\u6b63\u3002", "why_notable": "\u73b0\u6709\u9057\u5fd8\u65b9\u6cd5\u666e\u904d\u5ffd\u89c6\u9057\u5fd8\u540e\u826f\u6027\u751f\u6210\u7684\u5206\u5e03\u8d28\u91cf\uff0cTILDE\u9996\u6b21\u4ece\u5206\u5e03\u5bf9\u9f50\u89c6\u89d2\u7cfb\u7edf\u89e3\u51b3\u8fd9\u4e00\u95ee\u9898\uff0c\u4e3a\u6269\u6563\u6a21\u578b\u5b89\u5168\u90e8\u7f72\u63d0\u4f9b\u4e86\u7406\u8bba\u66f4\u4e25\u8c28\u7684\u89e3\u51b3\u65b9\u6848"}, {"abstract": "Visual counting is a fundamental pillar of multimodal intelligence, requiring a seamless integration of fine-grained grounding and spatial reasoning. While Multimodal Large Language Models (MLLMs) have achieved remarkable success in qualitative scene understanding, their quantitative precision remains a significant bottleneck, often characterized by persistent numerical hallucinations. Existing counting benchmarks primarily focus on basic perception in simplified contexts, failing to capture the complex failure modes that emerge under logical constraints or adversarial conditions. To address these limitations, we introduce HoloCount, a holistic and diagnostically rich benchmark structured around a three-level hierarchical taxonomy. HoloCount evaluates MLLMs across: (1) Semantic Counting, focusing on atomic and property-based enumeration; (2) Analytical Counting, assessing logical composition through spatial and set-based reasoning; and (3) Robustness Testing, probing model integrity against adverse scenarios and grounded counter-priors, such as high-density scenes and linguistic biases. Through an exhaustive evaluation of over 20 state-of-the-art MLLMs, we reveal a critical performance gap: even top-tier models degrade significantly as tasks transition from perception to complex analytical reasoning and adverse scenarios. Our findings provide a systematic landscape of current MLLM counting capabilities and offer a roadmap for developing more grounded and reliable multimodal systems. The dataset is available at https://mm-mvr.github.io/HoloCount/.", "arxiv_id": "2607.06420", "arxiv_url": "https://arxiv.org/abs/2607.06420", "authors": ["Jinhong Deng", "Limeng Qiao", "Guanglu Wan"], "brief": "\u63d0\u51faHoloCount\u57fa\u51c6\uff0c\u901a\u8fc7\u4e09\u7ea7\u5c42\u6b21\u5206\u7c7b\u4f53\u7cfb\uff08\u8bed\u4e49\u8ba1\u6570\u3001\u5206\u6790\u8ba1\u6570\u3001\u9c81\u68d2\u6027\u6d4b\u8bd5\uff09\u7cfb\u7edf\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u89c6\u89c9\u8ba1\u6570\u80fd\u529b\uff0c\u5e76\u5bf920\u4f59\u4e2aSOTA\u6a21\u578b\u8fdb\u884c\u5168\u9762\u6d4b\u8bc4\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06420", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u4e09\u7ea7\u5206\u7c7b\u4f53\u7cfb\uff1a\u8bed\u4e49\u8ba1\u6570\uff08\u539f\u5b50/\u5c5e\u6027\u679a\u4e3e\uff09\u2192\u5206\u6790\u8ba1\u6570\uff08\u7a7a\u95f4\u4e0e\u96c6\u5408\u63a8\u7406\uff09\u2192\u9c81\u68d2\u6027\u6d4b\u8bd5\uff08\u9ad8\u5bc6\u5ea6\u573a\u666f\u3001\u8bed\u8a00\u504f\u89c1\u7b49\u5bf9\u6297\u6761\u4ef6\uff09", "\u8bc4\u6d4b20+\u4e3b\u6d41MLLM\uff0c\u53d1\u73b0\u4ece\u611f\u77e5\u5230\u590d\u6742\u5206\u6790\u63a8\u7406\u4efb\u52a1\u6027\u80fd\u663e\u8457\u4e0b\u964d\uff0c\u6570\u503c\u5e7b\u89c9\u95ee\u9898\u7a81\u51fa", "\u4e13\u95e8\u8bbe\u8ba1\u53cd\u5e38\u8bc6\u8ba1\u6570\u5148\u9a8c\uff08counter-priors\uff09\u6d4b\u8bd5\uff0c\u63ed\u793a\u6a21\u578b\u5728\u903b\u8f91\u7ea6\u675f\u548c\u5bf9\u6297\u573a\u666f\u4e0b\u7684\u7cfb\u7edf\u6027\u5931\u6548\u6a21\u5f0f"], "keywords": ["\u591a\u6a21\u6001", "\u57fa\u51c6\u8bc4\u6d4b", "\u89c6\u89c9\u7406\u89e3", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06420v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "HoloCount: A Holistic Visual Counting Benchmark for MLLMs", "tldr": "HoloCount\uff1a\u9762\u5411\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u5168\u9762\u89c6\u89c9\u8ba1\u6570\u8bc4\u6d4b\u57fa\u51c6\uff0c\u63ed\u793a\u6570\u503c\u5e7b\u89c9\u74f6\u9888", "upvotes": 0, "what_it_is": "\u63d0\u51faHoloCount\u57fa\u51c6\uff0c\u901a\u8fc7\u4e09\u7ea7\u5c42\u6b21\u5206\u7c7b\u4f53\u7cfb\uff08\u8bed\u4e49\u8ba1\u6570\u3001\u5206\u6790\u8ba1\u6570\u3001\u9c81\u68d2\u6027\u6d4b\u8bd5\uff09\u7cfb\u7edf\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u89c6\u89c9\u8ba1\u6570\u80fd\u529b\uff0c\u5e76\u5bf920\u4f59\u4e2aSOTA\u6a21\u578b\u8fdb\u884c\u5168\u9762\u6d4b\u8bc4\u3002", "why_notable": "\u73b0\u6709\u8ba1\u6570\u57fa\u51c6\u4ec5\u8986\u76d6\u7b80\u5355\u611f\u77e5\u573a\u666f\uff0cHoloCount\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u903b\u8f91\u63a8\u7406\u4e0e\u9c81\u68d2\u6027\u7eb3\u5165\u8bc4\u6d4b\u6846\u67b6\uff0c\u4e3a\u591a\u6a21\u6001\u6a21\u578b\u5b9a\u91cf\u80fd\u529b\u7684\u8bca\u65ad\u4e0e\u6539\u8fdb\u63d0\u4f9b\u4e86\u6e05\u6670\u8def\u7ebf\u56fe\u3002"}, {"abstract": "Images tell us what a scene looks like, but rarely what it would feel like to be there. While recent datasets pair visual scenes with electronic-nose measurements, aligning smell signals with images remains challenging because many olfactory cues arise from contextual environmental factors that are not directly visible in pixels. We introduce SCENT, a multimodal framework that uses language guidance as a semantic bridge between vision and olfaction. Our approach leverages Vision-Language Models (VLMs) to generate scene descriptors capturing objects, environmental context, and plausible ambient smell cues suggested by the visual scene. These descriptors provide semantic guidance for learning olfactory representations. We train a smell encoder that maps electronic-nose signals into a shared embedding space aligned with both visual and textual representations, and introduce a languageguided latent decomposition that separates object-specific odors from contextual environmental contributions. Experiments on the New York Smells dataset demonstrate that SCENT significantly improves crossmodal retrieval compared to vision-only baselines, achieving state-of-theart performance on smell-to-image and smell-to-text retrieval tasks. In addition, our framework produces interpretable olfactory representations that enable the disentanglement of complex smell mixtures. Our results reveal the importance of contextual semantic information for grounding olfactory perception in multimodal learning and pave the way for future research in this area.", "arxiv_id": "2607.06402", "arxiv_url": "https://arxiv.org/abs/2607.06402", "authors": ["Eleftherios Tsonis", "Xi Wang", "Vicky Kalogeiton"], "brief": "\u63d0\u51faSCENT\u6846\u67b6\uff0c\u5229\u7528\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u751f\u6210\u573a\u666f\u63cf\u8ff0\u7b26\uff0c\u5c06\u7535\u5b50\u9f3b\u4fe1\u53f7\u6620\u5c04\u5230\u4e0e\u89c6\u89c9\u548c\u6587\u672c\u5bf9\u9f50\u7684\u5171\u4eab\u5d4c\u5165\u7a7a\u95f4\uff0c\u5e76\u901a\u8fc7\u8bed\u8a00\u5f15\u5bfc\u7684\u6f5c\u7a7a\u95f4\u5206\u89e3\u5c06\u7269\u4f53\u6c14\u5473\u4e0e\u73af\u5883\u80cc\u666f\u6c14\u5473\u89e3\u8026\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06402", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u4f7f\u7528VLM\u751f\u6210\u5305\u542b\u7269\u4f53\u3001\u73af\u5883\u4e0a\u4e0b\u6587\u548c\u6f5c\u5728\u6c14\u5473\u7ebf\u7d22\u7684\u573a\u666f\u63cf\u8ff0\u7b26\uff0c\u4f5c\u4e3a\u89c6\u89c9\u4e0e\u55c5\u89c9\u4e4b\u95f4\u7684\u8bed\u4e49\u6865\u6881", "\u5f15\u5165\u8bed\u8a00\u5f15\u5bfc\u7684\u6f5c\u7a7a\u95f4\u5206\u89e3\u673a\u5236\uff0c\u5c06\u590d\u6742\u6c14\u5473\u6df7\u5408\u7269\u4e2d\u7684\u7269\u4f53\u7279\u5b9a\u6c14\u5473\u4e0e\u73af\u5883\u80cc\u666f\u6c14\u5473\u5206\u79bb", "\u5728New York Smells\u6570\u636e\u96c6\u4e0a\uff0csmell-to-image\u548csmell-to-text\u8de8\u6a21\u6001\u68c0\u7d22\u4efb\u52a1\u5747\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff0c\u663e\u8457\u4f18\u4e8e\u7eaf\u89c6\u89c9\u57fa\u7ebf"], "keywords": ["\u591a\u6a21\u6001", "\u55c5\u89c9\u611f\u77e5", "\u8de8\u6a21\u6001\u68c0\u7d22", "\u8868\u793a\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06402v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "What Images Cannot Say: Language-Guided Olfactory Representation Learning", "tldr": "\u7528\u8bed\u8a00\u4f5c\u8bed\u4e49\u6865\u6881\uff0c\u5c06\u7535\u5b50\u9f3b\u4fe1\u53f7\u4e0e\u89c6\u89c9/\u6587\u672c\u5bf9\u9f50\u7684\u591a\u6a21\u6001\u55c5\u89c9\u8868\u793a\u5b66\u4e60\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faSCENT\u6846\u67b6\uff0c\u5229\u7528\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u751f\u6210\u573a\u666f\u63cf\u8ff0\u7b26\uff0c\u5c06\u7535\u5b50\u9f3b\u4fe1\u53f7\u6620\u5c04\u5230\u4e0e\u89c6\u89c9\u548c\u6587\u672c\u5bf9\u9f50\u7684\u5171\u4eab\u5d4c\u5165\u7a7a\u95f4\uff0c\u5e76\u901a\u8fc7\u8bed\u8a00\u5f15\u5bfc\u7684\u6f5c\u7a7a\u95f4\u5206\u89e3\u5c06\u7269\u4f53\u6c14\u5473\u4e0e\u73af\u5883\u80cc\u666f\u6c14\u5473\u89e3\u8026\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u8bed\u8a00\u8bed\u4e49\u5f15\u5165\u55c5\u89c9-\u89c6\u89c9\u8de8\u6a21\u6001\u5b66\u4e60\uff0c\u89e3\u51b3\u4e86\u50cf\u7d20\u4fe1\u606f\u65e0\u6cd5\u6355\u6349\u73af\u5883\u6c14\u5473\u7ebf\u7d22\u7684\u6838\u5fc3\u96be\u9898\uff0c\u4e3a\u591a\u6a21\u6001\u611f\u77e5\u6269\u5c55\u5230\u975e\u89c6\u89c9\u611f\u5b98\u5f00\u8f9f\u4e86\u65b0\u65b9\u5411\u3002"}, {"abstract": "Video face restoration (VFR) aims to recover high-quality and temporally consistent facial details from severely degraded video sequences; however, existing methods still struggle to balance spatial fidelity and temporal coherence under complex degradations. To address this, we propose FADRA, a frequency-aware diffusion framework with iterative residual adaptation specifically tailored for robust VFR. We first leverage the strong temporal consistency of a pre-trained text-to-video diffusion model and introduce lightweight LoRA adapters together with a Low-Quality (LQ) Pixel-Alignment Feature Fusion module to efficiently adapt the frozen generative prior to the VFR task. To further adapt the frozen diffusion backbone to the downstream VFR task beyond LoRA-based adaptation, we introduce a Repeated Residual Adaptation Head (RRAH) for step-wise residual refinement after the diffusion backbone. To make this refinement explicitly guided by the degraded observation, RRAH further takes the LQ latent together with the current velocity prediction as input, allowing the model to repeatedly revisit LQ cues and predict residual updates at each flow-matching step. This LQ-guided repeated residual adaptation helps recover fine facial details while preserving the inherent temporal priors of the pre-trained model. Furthermore, to ensure the structural integrity of perceptually important details, we introduce a Frequency-Aware Loss that provides explicit supervision across multiple spectral bands, emphasizing visually sensitive frequency components that are crucial for perceptual quality and prone to temporal jittering. Extensive experiments demonstrate that FADRA recovers better facial structures and produces more temporally consistent videos than state-of-the-art methods, leading to clear gains in both quantitative metrics and visual perception.", "arxiv_id": "2607.06389", "arxiv_url": "https://arxiv.org/abs/2607.06389", "authors": ["Jin Jiang", "Jia Wang", "Panwen Hu", "Weiran Zhao", "Shengcai Liao"], "brief": "\u63d0\u51faFADRA\u6846\u67b6\uff0c\u5229\u7528\u9884\u8bad\u7ec3\u6587\u672c\u8f6c\u89c6\u9891\u6269\u6563\u6a21\u578b\u7684\u65f6\u5e8f\u5148\u9a8c\uff0c\u7ed3\u5408LoRA\u9002\u914d\u5668\u3001\u91cd\u590d\u6b8b\u5dee\u9002\u5e94\u5934\uff08RRAH\uff09\u548c\u9891\u7387\u611f\u77e5\u635f\u5931\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u4e14\u65f6\u5e8f\u4e00\u81f4\u7684\u89c6\u9891\u4eba\u8138\u4fee\u590d\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06389", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5f15\u5165LQ\u50cf\u7d20\u5bf9\u9f50\u7279\u5f81\u878d\u5408\u6a21\u5757\u4e0e\u8f7b\u91cfLoRA\u9002\u914d\u5668\uff0c\u9ad8\u6548\u8fc1\u79fb\u51bb\u7ed3\u7684\u751f\u6210\u5148\u9a8c\u81f3VFR\u4efb\u52a1", "\u8bbe\u8ba1\u91cd\u590d\u6b8b\u5dee\u9002\u5e94\u5934\uff08RRAH\uff09\uff0c\u5728\u6bcf\u4e2a\u6d41\u5339\u914d\u6b65\u9aa4\u4e2d\u4ee5\u4f4e\u8d28\u91cf\u6f5c\u7801\u4e3a\u5f15\u5bfc\u8fdb\u884c\u9010\u6b65\u6b8b\u5dee\u7ec6\u5316\uff0c\u6062\u590d\u7cbe\u7ec6\u9762\u90e8\u7ec6\u8282", "\u63d0\u51fa\u9891\u7387\u611f\u77e5\u635f\u5931\uff08Frequency-Aware Loss\uff09\uff0c\u5bf9\u591a\u4e2a\u9891\u8c31\u5e26\u65bd\u52a0\u663e\u5f0f\u76d1\u7763\uff0c\u91cd\u70b9\u7ea6\u675f\u6613\u4ea7\u751f\u65f6\u5e8f\u6296\u52a8\u7684\u89c6\u89c9\u654f\u611f\u9891\u7387\u5206\u91cf"], "keywords": ["\u89c6\u9891\u4fee\u590d", "\u6269\u6563\u6a21\u578b", "\u4eba\u8138\u751f\u6210", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06389v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "FADRA: Frequency-Aware Diffusion with Residual Adaptation for Video Face Restoration", "tldr": "FADRA\uff1a\u57fa\u4e8e\u9891\u7387\u611f\u77e5\u6269\u6563\u4e0e\u6b8b\u5dee\u81ea\u9002\u5e94\u7684\u89c6\u9891\u4eba\u8138\u4fee\u590d\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faFADRA\u6846\u67b6\uff0c\u5229\u7528\u9884\u8bad\u7ec3\u6587\u672c\u8f6c\u89c6\u9891\u6269\u6563\u6a21\u578b\u7684\u65f6\u5e8f\u5148\u9a8c\uff0c\u7ed3\u5408LoRA\u9002\u914d\u5668\u3001\u91cd\u590d\u6b8b\u5dee\u9002\u5e94\u5934\uff08RRAH\uff09\u548c\u9891\u7387\u611f\u77e5\u635f\u5931\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u4e14\u65f6\u5e8f\u4e00\u81f4\u7684\u89c6\u9891\u4eba\u8138\u4fee\u590d\u3002", "why_notable": "\u9996\u6b21\u5c06\u6587\u672c\u8f6c\u89c6\u9891\u6269\u6563\u6a21\u578b\u7684\u65f6\u5e8f\u5148\u9a8c\u4e0e\u9891\u7387\u57df\u76d1\u7763\u7ed3\u5408\u7528\u4e8e\u89c6\u9891\u4eba\u8138\u4fee\u590d\uff0c\u5728\u7a7a\u95f4\u4fdd\u771f\u5ea6\u4e0e\u65f6\u5e8f\u4e00\u81f4\u6027\u4e4b\u95f4\u53d6\u5f97\u66f4\u4f18\u5e73\u8861\uff0c\u5b9a\u91cf\u6307\u6807\u4e0e\u89c6\u89c9\u611f\u77e5\u5747\u4f18\u4e8e\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\u3002"}, {"abstract": "The rapid advancement of large-scale generative models has accelerated the spread of highly deceptive AI-generated images, making generalized synthetic image detection a critical imperative. Existing forensic networks often struggle with cross-model generalization and realworld degradations due to their reliance on single-domain representations and conventional binary classification optimization. To overcome these limitations, we propose RNSIDNet, a novel forensic framework that achieves robust detection through enhanced RGB-Noise representation learning. Specifically, our method employs a dual-branch architecture where global RGB semantics, extracted by an attention-refined CLIP backbone, dynamically modulate highfrequency noise artifacts captured by Bayar convolutions via a Feature-wise Linear Modulation (FiLM) module. To further enhance the learned representations, we design a Hard Sample-aware Contrastive Learning (HSCL) strategy. By explicitly penalizing challenging training samples, HSCL reshapes the latent feature space to maximize the discriminative margin between pristine and synthetic domains. Extensive experiments across eight public benchmark datasets verify that our model achieves state-of-the-art performance, delivering superior generalization ability, robustness, and computational efficiency. Code and dataset will be publicly available on https://github.com/multimediaFor/RNSIDNet.", "arxiv_id": "2607.06354", "arxiv_url": "https://arxiv.org/abs/2607.06354", "authors": ["Zhen Li", "Gang Cao", "Tian Zhang", "Lifang Yu", "Shaowei Weng"], "brief": "\u63d0\u51faRNSIDNet\uff0c\u4e00\u79cd\u57fa\u4e8e\u589e\u5f3aRGB-\u566a\u58f0\u53cc\u5206\u652f\u8868\u793a\u5b66\u4e60\u7684\u5408\u6210\u56fe\u50cf\u68c0\u6d4b\u6846\u67b6\uff0c\u901a\u8fc7CLIP\u9aa8\u5e72\u63d0\u53d6\u5168\u5c40\u8bed\u4e49\u5e76\u52a8\u6001\u8c03\u5236\u9ad8\u9891\u566a\u58f0\u7279\u5f81\uff0c\u7ed3\u5408\u96be\u6837\u672c\u611f\u77e5\u5bf9\u6bd4\u5b66\u4e60\u63d0\u5347\u8de8\u6a21\u578b\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06354", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u53cc\u5206\u652f\u67b6\u6784\uff1a\u6ce8\u610f\u529b\u589e\u5f3aCLIP\u63d0\u53d6RGB\u5168\u5c40\u8bed\u4e49\uff0cBayar\u5377\u79ef\u6355\u83b7\u9ad8\u9891\u566a\u58f0\u4f2a\u5f71\uff0c\u901a\u8fc7FiLM\u6a21\u5757\u52a8\u6001\u878d\u5408\u4e24\u8def\u7279\u5f81", "\u8bbe\u8ba1Hard Sample-aware Contrastive Learning\uff08HSCL\uff09\u7b56\u7565\uff0c\u5bf9\u96be\u8bad\u7ec3\u6837\u672c\u65bd\u52a0\u989d\u5916\u60e9\u7f5a\uff0c\u91cd\u5851\u6f5c\u5728\u7279\u5f81\u7a7a\u95f4\u4ee5\u6269\u5927\u771f\u5b9e\u4e0e\u5408\u6210\u57df\u7684\u5224\u522b\u8fb9\u754c", "\u57288\u4e2a\u516c\u5f00\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\u8fbe\u5230SOTA\uff0c\u517c\u987e\u8de8\u6a21\u578b\u6cdb\u5316\u6027\u3001\u5bf9\u771f\u5b9e\u4e16\u754c\u964d\u8d28\u7684\u9c81\u68d2\u6027\u4e0e\u8ba1\u7b97\u6548\u7387"], "keywords": ["AI\u751f\u6210\u56fe\u50cf\u68c0\u6d4b", "\u591a\u6a21\u6001", "\u5bf9\u6bd4\u5b66\u4e60", "\u56fe\u50cf\u53d6\u8bc1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06354v1", "published_at": "2026-07-07", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Generalized Synthetic Image Detection with Enhanced RGB-Noise Representation Learning", "tldr": "\u63d0\u51faRNSIDNet\u6846\u67b6\uff0c\u878d\u5408RGB\u8bed\u4e49\u4e0e\u566a\u58f0\u7279\u5f81\u5b9e\u73b0\u6cdb\u5316AI\u751f\u6210\u56fe\u50cf\u68c0\u6d4b", "upvotes": 0, "what_it_is": "\u63d0\u51faRNSIDNet\uff0c\u4e00\u79cd\u57fa\u4e8e\u589e\u5f3aRGB-\u566a\u58f0\u53cc\u5206\u652f\u8868\u793a\u5b66\u4e60\u7684\u5408\u6210\u56fe\u50cf\u68c0\u6d4b\u6846\u67b6\uff0c\u901a\u8fc7CLIP\u9aa8\u5e72\u63d0\u53d6\u5168\u5c40\u8bed\u4e49\u5e76\u52a8\u6001\u8c03\u5236\u9ad8\u9891\u566a\u58f0\u7279\u5f81\uff0c\u7ed3\u5408\u96be\u6837\u672c\u611f\u77e5\u5bf9\u6bd4\u5b66\u4e60\u63d0\u5347\u8de8\u6a21\u578b\u6cdb\u5316\u80fd\u529b\u3002", "why_notable": "AI\u751f\u6210\u56fe\u50cf\u68c0\u6d4b\u9762\u4e34\u8de8\u6a21\u578b\u6cdb\u5316\u96be\u9898\uff0c\u8be5\u5de5\u4f5c\u5c06\u8bed\u4e49\u7ea7\u4e0e\u9891\u7387\u7ea7\u7ebf\u7d22\u6709\u673a\u7ed3\u5408\uff0c\u5e76\u5f15\u5165\u5bf9\u6bd4\u5b66\u4e60\u4f18\u5316\u7279\u5f81\u7a7a\u95f4\uff0c\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u4e86\u4f18\u8d8a\u6027\uff0c\u4ee3\u7801\u4e0e\u6570\u636e\u96c6\u5f00\u6e90\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Robotic tree-fruit harvesting is a flagship problem for agricultural automation, but progress is bottlenecked by the cost and irreproducibility of field experiments: an orchard is available only weeks a year, every tree is different, and a control error can permanently damage the crop or the plant. The tree models used in graphics and agronomy are geometrically detailed but physically inert, while the GPU-parallel simulators used in robot learning contain no plausible trees. We present OrchardBench, a physically-grounded, GPU-parallel simulation of apple-orchard trees on the Newton engine. Each tree is grown by a stochastic L-system and instantiated as a fully articulated body: branches are compliant torsional spring-dampers whose stiffness follows Euler-Bernoulli beam theory, they break at a wood modulus of rupture and fall as free hinges, and apples are independent bodies on stem tethers that detach at literature-grounded pull forces and load the branch when pulled. A moving, density-controllable foliage layer occludes the canopy as real leaves do. Every physical parameter is tied to a published source. Per-environment domain randomization makes each batched world a distinct tree, and a mobile manipulator with a wrist depth camera closes the loop with geometric fruit perception and an autonomous harvesting baseline. Careful engineering of the solver and the model lets OrchardBench run many parallel environments at interactive rates on a laptop GPU. We define the tasks and a metric suite spanning harvest completeness, throughput, and plant damage (with a per-canopy-zone breakdown), and report baseline results across foliage, fruit load, terrain, canopy zone, and parallelism. The analytic baseline succeeds on about 40% of the fruit it detects and harvests only about an eighth of the reachable fruit on a tree, leaving clear headroom for novel autonomy approaches.", "arxiv_id": "2607.06337", "arxiv_url": "https://arxiv.org/abs/2607.06337", "authors": ["Humphrey Munn"], "brief": "\u63d0\u51faOrchardBench\uff0c\u4e00\u4e2a\u57fa\u4e8eNewton\u5f15\u64ce\u7684\u7269\u7406\u771f\u5b9e\u82f9\u679c\u56edGPU\u5e76\u884c\u4eff\u771f\u57fa\u51c6\uff0c\u901a\u8fc
