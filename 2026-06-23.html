\" search from serial, attention-demanding search. I ask whether vision-language models (VLMs) exhibit the same behavioral signatures. I adapt four classic paradigms: feature versus conjunction search, spatial-configuration (T-vs-L) search, enumeration, and the tilted/vertical search asymmetry; and present them to current frontier and mid-tier models. Because a single model call has no reaction time, I use the number of reasoning (\"thinking\") tokens a model spends per trial as a within-model analog of search effort, and I compare against a large public human benchmark (Wolfe et al., 2010). The models reproduce several human signatures: feature search costs flat effort while conjunction effort climbs with set size; frontier models hold accuracy where mid-tier models collapse to chance; and a resolution control shows the conjunction cost is genuine search rather than difficulty resolving small shapes. They also diverge from humans in informative ways. The target-present effort slope exceeds the target-absent slope, reversing the human ordering; enumeration remains accurate where humans would lose count; and a reasoning model with adaptive deliberation declines to deliberate on detection tasks altogether, so that a single search expresses itself as an effort gradient in one model and as an accuracy cliff in another. I argue that psychophysical paradigms, applied behaviorally, are a sharp and inexpensive probe of machine visual cognition, and that the points of divergence are as informative as the points of agreement.", "arxiv_id": "2606.25066", "arxiv_url": "https://arxiv.org/abs/2606.25066", "authors": ["Farahnaz Wick"], "brief": "\u672c\u6587\u5c06\u56db\u79cd\u7ecf\u5178\u89c6\u89c9\u641c\u7d22\u8303\u5f0f\uff08\u7279\u5f81\u641c\u7d22\u3001\u8054\u5408\u641c\u7d22\u3001\u8ba1\u6570\u3001\u503e\u659c/\u5782\u76f4\u4e0d\u5bf9\u79f0\uff09\u5e94\u7528\u4e8e\u524d\u6cbfVLM\uff0c\u4ee5\u6a21\u578b\u6bcf\u6b21\u63a8\u7406\u6d88\u8017\u7684thinking token\u6570\u91cf\u4f5c\u4e3a\"\u641c\u7d22\u52aa\u529b\"\u7684\u4ee3\u7406\u6307\u6807\uff0c\u4e0e\u4eba\u7c7b\u53cd\u5e94\u65f6\u6570\u636e\u8fdb\u884c\u5bf9\u6bd4\u5206\u6790\u3002", "categories": ["cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25066", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["VLM\u590d\u73b0\u4e86\u90e8\u5206\u4eba\u7c7b\u7279\u5f81\uff1a\u7279\u5f81\u641c\u7d22token\u6d88\u8017\u5e73\u7a33\uff0c\u8054\u5408\u641c\u7d22\u968f\u76ee\u6807\u6570\u91cf\u589e\u52a0\u800c\u4e0a\u5347\uff0c\u524d\u6cbf\u6a21\u578b\u51c6\u786e\u7387\u4f18\u4e8e\u4e2d\u7b49\u6a21\u578b", "VLM\u4e0e\u4eba\u7c7b\u5b58\u5728\u7cfb\u7edf\u6027\u504f\u5dee\uff1a\u76ee\u6807\u5b58\u5728\u65f6\u7684\u52aa\u529b\u659c\u7387\u5927\u4e8e\u76ee\u6807\u7f3a\u5931\u65f6\uff08\u4e0e\u4eba\u7c7b\u76f8\u53cd\uff09\uff0c\u8ba1\u6570\u4efb\u52a1\u4e2dVLM\u4e0d\u4f1a\u50cf\u4eba\u7c7b\u90a3\u6837\"\u6570\u9519\"", "\u5177\u5907\u81ea\u9002\u5e94\u63a8\u7406\u7684\u6a21\u578b\u5728\u68c0\u6d4b\u4efb\u52a1\u4e0a\u62d2\u7edd\u6df1\u5ea6\u63a8\u7406\uff0c\u5bfc\u81f4\u540c\u4e00\u641c\u7d22\u4efb\u52a1\u5728\u4e0d\u540c\u6a21\u578b\u4e2d\u5206\u522b\u8868\u73b0\u4e3a\u52aa\u529b\u68af\u5ea6\u6216\u51c6\u786e\u7387\u65ad\u5d16"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u89c6\u89c9\u6ce8\u610f\u529b", "\u8ba4\u77e5\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25066v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Do vision-language models search like humans? Reasoning tokens as a reaction-time analog in classic visual-search paradigms", "tldr": "\u7528\u63a8\u7406token\u6570\u7c7b\u6bd4\u4eba\u7c7b\u53cd\u5e94\u65f6\uff0c\u68c0\u9a8c\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u662f\u5426\u590d\u73b0\u7ecf\u5178\u89c6\u89c9\u641c\u7d22\u884c\u4e3a\u89c4\u5f8b", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06\u56db\u79cd\u7ecf\u5178\u89c6\u89c9\u641c\u7d22\u8303\u5f0f\uff08\u7279\u5f81\u641c\u7d22\u3001\u8054\u5408\u641c\u7d22\u3001\u8ba1\u6570\u3001\u503e\u659c/\u5782\u76f4\u4e0d\u5bf9\u79f0\uff09\u5e94\u7528\u4e8e\u524d\u6cbfVLM\uff0c\u4ee5\u6a21\u578b\u6bcf\u6b21\u63a8\u7406\u6d88\u8017\u7684thinking token\u6570\u91cf\u4f5c\u4e3a\"\u641c\u7d22\u52aa\u529b\"\u7684\u4ee3\u7406\u6307\u6807\uff0c\u4e0e\u4eba\u7c7b\u53cd\u5e94\u65f6\u6570\u636e\u8fdb\u884c\u5bf9\u6bd4\u5206\u6790\u3002", "why_notable": "\u9996\u6b21\u5c06\u5fc3\u7406\u7269\u7406\u5b66\u89c6\u89c9\u641c\u7d22\u8303\u5f0f\u7cfb\u7edf\u6027\u5730\u7528\u4e8e\u8bc4\u4f30VLM\u89c6\u89c9\u8ba4\u77e5\u673a\u5236\uff0c\u63d0\u51fa\u4ee5reasoning token\u6570\u91cf\u4f5c\u4e3a\u53cd\u5e94\u65f6\u7c7b\u6bd4\u7684\u65b0\u65b9\u6cd5\uff0c\u4e3a\u7406\u89e3\u673a\u5668\u89c6\u89c9\u6ce8\u610f\u529b\u63d0\u4f9b\u4f4e\u6210\u672c\u3001\u9ad8\u533a\u5206\u5ea6\u7684\u884c\u4e3a\u63a2\u9488"}, {"abstract": "Unified multi-modal large language models (MLLMs) have achieved strong text-to-image generation quality, but still struggle with structure-aware prompt following, where object counts, spatial relations, attribute bindings, and coarse layouts must be preserved. We attribute this limitation in part to the entanglement of structural planning and appearance rendering within a single conditioning stream. To address this issue, we propose Implicit Visual Chain-of-Thought (IV-CoT), a latent visual reasoning framework for query-conditioned image generation. IV-CoT decomposes the visual conditioning queries into a structural-to-semantic cascade, where structural queries first form a latent visual plan and semantic queries then render appearance conditioned on this plan. To guide the structural queries, we introduce training-only sketch supervision, which encourages them to capture structure from sketches without requiring sketch extraction or intermediate decoding at inference time. IV-CoT performs implicit CoT reasoning in a single forward pass and achieves superior results on GenEval and T2I-CompBench. Visualizations and analyses demonstrate that the learned structural and semantic queries play complementary roles in structure-aware generation.", "arxiv_id": "2606.24849", "arxiv_url": "https://arxiv.org/abs/2606.24849", "authors": ["Zixuan Li", "Haokun Lin", "Yicheng Xiao", "Zhiwei Li", "Xinyang Song", "Zelong Zheng", "Yong He", "Heng Yao", "Ke Ding", "Chao Yu", "Chuan Yuan", "Qi Li", "Zhenan Sun"], "brief": "\u63d0\u51faIV-CoT\uff08\u9690\u5f0f\u89c6\u89c9\u601d\u7ef4\u94fe\uff09\uff0c\u4e00\u79cd\u9762\u5411\u6587\u751f\u56fe\u7684\u6f5c\u5728\u89c6\u89c9\u63a8\u7406\u6846\u67b6\uff0c\u5c06\u89c6\u89c9\u6761\u4ef6\u67e5\u8be2\u5206\u89e3\u4e3a\u7ed3\u6784\u67e5\u8be2\uff08\u751f\u6210\u6f5c\u5728\u89c6\u89c9\u89c4\u5212\uff09\u548c\u8bed\u4e49\u67e5\u8be2\uff08\u57fa\u4e8e\u89c4\u5212\u6e32\u67d3\u5916\u89c2\uff09\u7684\u7ea7\u8054\u7ed3\u6784\uff0c\u4ec5\u9700\u5355\u6b21\u524d\u5411\u4f20\u64ad\u5373\u53ef\u5b8c\u6210\u9690\u5f0fCoT\u63a8\u7406\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24849", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u89c6\u89c9\u6761\u4ef6\u67e5\u8be2\u89e3\u8026\u4e3a\u7ed3\u6784-\u8bed\u4e49\u4e24\u7ea7\u7ea7\u8054\uff1a\u7ed3\u6784\u67e5\u8be2\u8d1f\u8d23\u7a7a\u95f4\u5e03\u5c40\u89c4\u5212\uff0c\u8bed\u4e49\u67e5\u8be2\u8d1f\u8d23\u5916\u89c2\u6e32\u67d3", "\u5f15\u5165\u4ec5\u8bad\u7ec3\u9636\u6bb5\u7684\u8349\u56fe\u76d1\u7763\uff08training-only sketch supervision\uff09\uff0c\u5f15\u5bfc\u7ed3\u6784\u67e5\u8be2\u6355\u6349\u7ed3\u6784\u4fe1\u606f\uff0c\u63a8\u7406\u65f6\u65e0\u9700\u8349\u56fe\u63d0\u53d6\u6216\u4e2d\u95f4\u89e3\u7801", "\u5728GenEval\u548cT2I-CompBench\u57fa\u51c6\u4e0a\u53d6\u5f97\u4f18\u8d8a\u7ed3\u679c\uff0c\u53ef\u66f4\u597d\u4fdd\u7559\u7269\u4f53\u6570\u91cf\u3001\u7a7a\u95f4\u5173\u7cfb\u3001\u5c5e\u6027\u7ed1\u5b9a\u7b49\u7ed3\u6784\u7ea6\u675f"], "keywords": ["\u6587\u751f\u56fe", "\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u601d\u7ef4\u94fe", "\u7ed3\u6784\u611f\u77e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24849v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "IV-CoT: Implicit Visual Chain-of-Thought for Structure-Aware Text-to-Image Generation", "tldr": "\u63d0\u51fa\u9690\u5f0f\u89c6\u89c9\u601d\u7ef4\u94fe\u6846\u67b6IV-CoT\uff0c\u901a\u8fc7\u7ed3\u6784-\u8bed\u4e49\u7ea7\u8054\u67e5\u8be2\u63d0\u5347\u6587\u751f\u56fe\u7684\u7ed3\u6784\u611f\u77e5\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faIV-CoT\uff08\u9690\u5f0f\u89c6\u89c9\u601d\u7ef4\u94fe\uff09\uff0c\u4e00\u79cd\u9762\u5411\u6587\u751f\u56fe\u7684\u6f5c\u5728\u89c6\u89c9\u63a8\u7406\u6846\u67b6\uff0c\u5c06\u89c6\u89c9\u6761\u4ef6\u67e5\u8be2\u5206\u89e3\u4e3a\u7ed3\u6784\u67e5\u8be2\uff08\u751f\u6210\u6f5c\u5728\u89c6\u89c9\u89c4\u5212\uff09\u548c\u8bed\u4e49\u67e5\u8be2\uff08\u57fa\u4e8e\u89c4\u5212\u6e32\u67d3\u5916\u89c2\uff09\u7684\u7ea7\u8054\u7ed3\u6784\uff0c\u4ec5\u9700\u5355\u6b21\u524d\u5411\u4f20\u64ad\u5373\u53ef\u5b8c\u6210\u9690\u5f0fCoT\u63a8\u7406\u3002", "why_notable": "\u9488\u5bf9\u591a\u6a21\u6001\u5927\u6a21\u578b\u6587\u751f\u56fe\u4e2d\u7ed3\u6784\u611f\u77e5\u4e0d\u8db3\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u4ee5\u8f7b\u91cf\u7ea7\u7684\u9690\u5f0f\u63a8\u7406\u65b9\u5f0f\uff08\u5355\u6b21\u524d\u5411\u4f20\u64ad\uff09\u5b9e\u73b0\u7c7bCoT\u7684\u7ed3\u6784\u89c4\u5212\uff0c\u65e0\u9700\u63a8\u7406\u65f6\u989d\u5916\u5f00\u9500\uff0c\u517c\u5177\u5b9e\u7528\u6027\u4e0e\u521b\u65b0\u6027\u3002"}, {"abstract": "In the big-world regime, agents cannot be universally capable and their ability is inevitably specialized across a world model in pieces. Consequently, standard uniform guarantees fail to distinguish between the understanding of critical bottlenecks and irrelevant failures. We first formalize this limitation by proving that general agents are not universal, rendering standard worst-case analysis uninformative. To overcome this, we introduce structural certification, a transition-local framework that maps bounded goal-conditioned performance to entry-wise guarantees on the agent\u0027s internal world model. Our main contribution is constructive. We provide algorithms that filter specific transitions using deep compositional goals and prove that a general agent on these goals has a structural world model with a $\\mathcal{O}(1/n) + \\mathcal{O}(\u03b4)$ error bound. Conversely, this bound is tight in the small-$\u03b4$ regime, whose existence is explicitly guaranteed by our certification. These results enable the certifiable deployment of general agents by localizing the specific transitions where long-horizon planning is reliable.", "arxiv_id": "2606.24842", "arxiv_url": "https://arxiv.org/abs/2606.24842", "authors": ["Yikai Lu", "Yifei Wu", "Xinyu Lu", "Tongxin Li"], "brief": "\u672c\u6587\u63d0\u51fa\"\u7ed3\u6784\u6027\u8ba4\u8bc1\"\uff08structural certification\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u76ee\u6807\u6761\u4ef6\u6027\u80fd\u4e0e\u4e16\u754c\u6a21\u578b\u5185\u90e8\u8f6c\u79fb\u7684\u5c40\u90e8\u6620\u5c04\uff0c\u89e3\u51b3\u901a\u7528\u667a\u80fd\u4f53\u65e0\u6cd5\u7ed9\u51fa\u7edf\u4e00\u6700\u574f\u60c5\u51b5\u4fdd\u8bc1\u7684\u6839\u672c\u5c40\u9650\uff0c\u5e76\u7ed9\u51fa\u5177\u6709 O(1/n)+O(\u03b4) \u8bef\u5dee\u754c\u7684\u53ef\u6784\u9020\u7b97\u6cd5\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24842", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u7406\u8bba\u8bc1\u660e\u901a\u7528\u667a\u80fd\u4f53\u4e0d\u5177\u5907\u666e\u9002\u80fd\u529b\uff0c\u6807\u51c6\u6700\u574f\u60c5\u51b5\u5206\u6790\u5bf9\u5173\u952e\u74f6\u9888\u65e0\u533a\u5206\u529b", "\u63d0\u51fa\u8f6c\u79fb\u5c40\u90e8\u6846\u67b6\uff0c\u5229\u7528\u6df1\u5ea6\u7ec4\u5408\u76ee\u6807\u8fc7\u6ee4\u7279\u5b9a\u8f6c\u79fb\uff0c\u5c06\u5168\u5c40\u6027\u80fd\u4fdd\u8bc1\u5206\u89e3\u4e3a\u4e16\u754c\u6a21\u578b\u7684\u9010\u6761\u76ee\u4fdd\u8bc1", "\u7b97\u6cd5\u8bef\u5dee\u754c\u4e3a O(1/n)+O(\u03b4)\uff0c\u4e14\u5728\u5c0f-\u03b4 \u533a\u95f4\u7d27\u81f4\uff0c\u8ba4\u8bc1\u6846\u67b6\u663e\u5f0f\u4fdd\u8bc1\u8be5\u533a\u95f4\u5b58\u5728"], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24842v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "World Models in Pieces: Structural Certification for General Agents", "tldr": "\u63d0\u51fa\u7ed3\u6784\u6027\u8ba4\u8bc1\u6846\u67b6\uff0c\u5c06\u901a\u7528\u667a\u80fd\u4f53\u7684\u4e16\u754c\u6a21\u578b\u80fd\u529b\u6620\u5c04\u4e3a\u9010\u8f6c\u79fb\u5c40\u90e8\u4fdd\u8bc1", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u7ed3\u6784\u6027\u8ba4\u8bc1\"\uff08structural certification\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u76ee\u6807\u6761\u4ef6\u6027\u80fd\u4e0e\u4e16\u754c\u6a21\u578b\u5185\u90e8\u8f6c\u79fb\u7684\u5c40\u90e8\u6620\u5c04\uff0c\u89e3\u51b3\u901a\u7528\u667a\u80fd\u4f53\u65e0\u6cd5\u7ed9\u51fa\u7edf\u4e00\u6700\u574f\u60c5\u51b5\u4fdd\u8bc1\u7684\u6839\u672c\u5c40\u9650\uff0c\u5e76\u7ed9\u51fa\u5177\u6709 O(1/n)+O(\u03b4) \u8bef\u5dee\u754c\u7684\u53ef\u6784\u9020\u7b97\u6cd5\u3002", "why_notable": "\u9996\u6b21\u4ece\u7406\u8bba\u4e0a\u4e25\u683c\u523b\u753b\u901a\u7528\u667a\u80fd\u4f53\u80fd\u529b\u8fb9\u754c\uff0c\u5e76\u63d0\u4f9b\u53ef\u843d\u5730\u7684\u5c40\u90e8\u8ba4\u8bc1\u65b9\u6cd5\uff0c\u4e3a\u957f\u65f6\u57df\u89c4\u5212\u7684\u53ef\u9760\u90e8\u7f72\u63d0\u4f9b\u7406\u8bba\u57fa\u7840\uff0c\u5bf9 AI \u5b89\u5168\u4e0e\u53ef\u4fe1\u667a\u80fd\u4f53\u7814\u7a76\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Recent advances in Video Large Language Models (Video-LLMs) have yielded promising performance on video question answering (VideoQA). Nevertheless, existing benchmarks are predominantly evaluated through answer correctness, while the grounding of predictions in relevant video evidence remains largely unexamined. This disconnect between answer generation and evidence understanding motivates the construction of the Evidence-Grounded Video Question Answering Benchmark (EG-VQA), an open-ended evaluation protocol in which each QA pair is explicitly annotated with supporting temporal evidence, thereby requiring joint reasoning and precise evidence localization. EG-VQA is comprised of 2,067 videos and 11,838 QA pairs with fine-grained evidence annotations. To evaluate predicted evidence, Evidence-Grounded F1 (EG-F1) is introduced as a unified metric in which temporal alignment and semantic consistency against ground-truth evidence are jointly measured. Experimental evaluation reveals that even strong proprietary models struggle to accurately ground their predictions, exposing a fundamental discrepancy between answer correctness and faithful evidence localization. To bridge this gap, EG-Reasoner, an evidence-grounded reasoning model trained with explicit supervision, is proposed. State-of-the-art performance is achieved among open-source models, with results competitive against proprietary systems, particularly pronounced gains are observed on reasoning-intensive tasks such as counterfactual questions. These findings demonstrate that scaling alone is insufficient for robust video understanding and that structured evidence supervision is essential for the development of more reliable and interpretable VideoQA systems.", "arxiv_id": "2606.24797", "arxiv_url": "https://arxiv.org/abs/2606.24797", "authors": ["Linpeng Huang", "Weixing Chen", "Zexin Chen", "Yang Liu", "Liang Lin"], "brief": "\u6784\u5efa\u4e86\u9996\u4e2a\u4ee5\u65f6\u5e8f\u8bc1\u636e\u4e3a\u6838\u5fc3\u7684\u89c6\u9891\u95ee\u7b54\u8bc4\u6d4b\u57fa\u51c6EG-VQA\uff0c\u5305\u542b2067\u4e2a\u89c6\u9891\u548c11838\u4e2aQA\u5bf9\uff0c\u6bcf\u5bf9\u5747\u6807\u6ce8\u652f\u6491\u7b54\u6848\u7684\u65f6\u5e8f\u8bc1\u636e\u7247\u6bb5\uff0c\u5e76\u63d0\u51faEG-F1\u7edf\u4e00\u8bc4\u4f30\u6307\u6807\uff0c\u540c\u65f6\u8bad\u7ec3\u4e86\u8bc1\u636e\u5f15\u5bfc\u63a8\u7406\u6a21\u578bEG-Reasoner\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24797", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6570\u636e\u96c6\u89c4\u6a21\uff1a2067\u4e2a\u89c6\u9891\u300111838\u4e2aQA\u5bf9\uff0c\u914d\u6709\u7ec6\u7c92\u5ea6\u65f6\u5e8f\u8bc1\u636e\u6807\u6ce8", "\u63d0\u51faEG-F1\u6307\u6807\uff0c\u8054\u5408\u8861\u91cf\u65f6\u5e8f\u5bf9\u9f50\u4e0e\u8bed\u4e49\u4e00\u81f4\u6027\uff0c\u8bc4\u4f30\u9884\u6d4b\u8bc1\u636e\u8d28\u91cf", "\u5b9e\u9a8c\u53d1\u73b0\u5f3a\u5546\u4e1a\u6a21\u578b\u5728\u8bc1\u636e\u5b9a\u4f4d\u4e0a\u8868\u73b0\u6b20\u4f73\uff0c\u7b54\u6848\u6b63\u786e\u6027\u4e0e\u8bc1\u636e\u5fe0\u5b9e\u6027\u5b58\u5728\u6839\u672c\u6027\u5dee\u8ddd\uff1bEG-Reasoner\u5728\u53cd\u4e8b\u5b9e\u7b49\u63a8\u7406\u5bc6\u96c6\u4efb\u52a1\u4e0a\u53d6\u5f97\u663e\u8457\u63d0\u5347"], "keywords": ["\u89c6\u9891\u95ee\u7b54", "\u591a\u6a21\u6001", "\u57fa\u51c6\u8bc4\u6d4b", "\u53ef\u89e3\u91caAI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24797v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EG-VQA: Benchmarking Verifiable Video Question Answering with Grounded Temporal Evidence", "tldr": "\u63d0\u51faEG-VQA\u57fa\u51c6\uff0c\u8981\u6c42\u89c6\u9891\u95ee\u7b54\u6a21\u578b\u540c\u65f6\u7ed9\u51fa\u7b54\u6848\u4e0e\u65f6\u5e8f\u8bc1\u636e\u5b9a\u4f4d\uff0c\u63ed\u793a\u73b0\u6709\u6a21\u578b\u7684\u8bc1\u636e\u7406\u89e3\u7f3a\u9677", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u9996\u4e2a\u4ee5\u65f6\u5e8f\u8bc1\u636e\u4e3a\u6838\u5fc3\u7684\u89c6\u9891\u95ee\u7b54\u8bc4\u6d4b\u57fa\u51c6EG-VQA\uff0c\u5305\u542b2067\u4e2a\u89c6\u9891\u548c11838\u4e2aQA\u5bf9\uff0c\u6bcf\u5bf9\u5747\u6807\u6ce8\u652f\u6491\u7b54\u6848\u7684\u65f6\u5e8f\u8bc1\u636e\u7247\u6bb5\uff0c\u5e76\u63d0\u51faEG-F1\u7edf\u4e00\u8bc4\u4f30\u6307\u6807\uff0c\u540c\u65f6\u8bad\u7ec3\u4e86\u8bc1\u636e\u5f15\u5bfc\u63a8\u7406\u6a21\u578bEG-Reasoner\u3002", "why_notable": "\u73b0\u6709VideoQA\u57fa\u51c6\u4ec5\u8bc4\u4f30\u7b54\u6848\u6b63\u786e\u6027\uff0c\u5ffd\u89c6\u6a21\u578b\u662f\u5426\u771f\u6b63\u7406\u89e3\u89c6\u9891\u8bc1\u636e\uff1bEG-VQA\u586b\u8865\u4e86\u8fd9\u4e00\u7a7a\u767d\uff0c\u63a8\u52a8\u89c6\u9891\u7406\u89e3\u5411\u53ef\u89e3\u91ca\u3001\u53ef\u9a8c\u8bc1\u65b9\u5411\u53d1\u5c55\uff0c\u5bf9\u8bc4\u4f30\u548c\u8bad\u7ec3\u66f4\u53ef\u9760\u7684Video-LLM\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "The loss of plasticity - the ability of a network to learn new information after having already learned older information - is a fundamental challenge in creating artificial neural networks capable of continual learning. Although this phenomenon has been known for decades, it has mostly been studied in older, relatively small architectures and rarely in natural-language domains. To determine whether loss of plasticity remains a problem in the modern transformer-based LLM paradigm, we study plasticity loss in GPT-style Transformer models trained on a multilingual continual learning problem. Consistent with prior work, we find evidence of plasticity loss across models ranging from 5M to 314M non-embedding parameters, as measured by deterioration on a held-out Vietnamese probing task. We further find that the onset of plasticity loss follows a predictable scaling law, growing sublinearly with model size. These results suggest that larger models may delay the measurable effects of plasticity loss, but that increasing parameter count alone is likely to be insufficient to completely prevent it. We also find evidence of plasticity loss under stationary multilingual training, challenging the view that the phenomenon is exclusive to continual learning with abrupt task changes. Overall, our results suggest that even large Transformer language models trained on natural-language will eventually lose the ability to efficiently adapt to new data after sufficiently long training, in both continual and stationary settings.", "arxiv_id": "2606.24752", "arxiv_url": "https://arxiv.org/abs/2606.24752", "authors": ["J. Fernando Hernandez-Garcia", "Tom\u00e1s Figliolia", "Beren Millidge"], "brief": "\u672c\u6587\u7814\u7a76\u4e86GPT\u98ce\u683cTransformer\u6a21\u578b\u5728\u591a\u8bed\u8a00\u6301\u7eed\u5b66\u4e60\u573a\u666f\u4e0b\u7684\u53ef\u5851\u6027\u4e27\u5931\u73b0\u8c61\uff0c\u53d1\u73b0\u5373\u4f7f\u662f\u5927\u89c4\u6a21LLM\u4e5f\u65e0\u6cd5\u514d\u75ab\u8fd9\u4e00\u95ee\u9898\uff0c\u4e14\u53ef\u5851\u6027\u4e27\u5931\u7684\u53d1\u751f\u9075\u5faa\u53ef\u9884\u6d4b\u7684\u5e42\u5f8b\u7f29\u653e\u89c4\u5f8b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24752", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u57285M\u5230314M\u975e\u5d4c\u5165\u53c2\u6570\u7684\u6a21\u578b\u4e2d\u5747\u89c2\u6d4b\u5230\u53ef\u5851\u6027\u4e27\u5931\uff0c\u4ee5\u8d8a\u5357\u8bed\u63a2\u6d4b\u4efb\u52a1\u6027\u80fd\u4e0b\u964d\u4e3a\u8861\u91cf\u6307\u6807", "\u53ef\u5851\u6027\u4e27\u5931\u7684\u53d1\u751f\u65f6\u95f4\u4e0e\u6a21\u578b\u89c4\u6a21\u5448\u6b21\u7ebf\u6027\u589e\u957f\u5173\u7cfb\uff0c\u66f4\u5927\u6a21\u578b\u53ea\u80fd\u5ef6\u8fdf\u800c\u975e\u6d88\u9664\u8be5\u95ee\u9898", "\u5728\u9759\u6001\u591a\u8bed\u8a00\u8bad\u7ec3\uff08\u975e\u4efb\u52a1\u5207\u6362\u573a\u666f\uff09\u4e2d\u540c\u6837\u53d1\u73b0\u53ef\u5851\u6027\u4e27\u5931\uff0c\u6311\u6218\u4e86\u8be5\u73b0\u8c61\u4ec5\u5b58\u5728\u4e8e\u6301\u7eed\u5b66\u4e60\u7684\u4f20\u7edf\u8ba4\u77e5"], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u5851\u6027", "\u7f29\u653e\u5b9a\u5f8b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24752v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Can Scale Save Us From Plasticity Loss in Large Language Models?", "tldr": "\u5927\u578b\u8bed\u8a00\u6a21\u578b\u540c\u6837\u5b58\u5728\u53ef\u5851\u6027\u4e27\u5931\u95ee\u9898\uff0c\u6269\u5927\u89c4\u6a21\u53ea\u80fd\u5ef6\u8fdf\u800c\u65e0\u6cd5\u6839\u672c\u89e3\u51b3", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u4e86GPT\u98ce\u683cTransformer\u6a21\u578b\u5728\u591a\u8bed\u8a00\u6301\u7eed\u5b66\u4e60\u573a\u666f\u4e0b\u7684\u53ef\u5851\u6027\u4e27\u5931\u73b0\u8c61\uff0c\u53d1\u73b0\u5373\u4f7f\u662f\u5927\u89c4\u6a21LLM\u4e5f\u65e0\u6cd5\u514d\u75ab\u8fd9\u4e00\u95ee\u9898\uff0c\u4e14\u53ef\u5851\u6027\u4e27\u5931\u7684\u53d1\u751f\u9075\u5faa\u53ef\u9884\u6d4b\u7684\u5e42\u5f8b\u7f29\u653e\u89c4\u5f8b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u53ef\u5851\u6027\u4e27\u5931\u7814\u7a76\u6269\u5c55\u5230\u73b0\u4ee3\u5927\u89c4\u6a21Transformer\u8bed\u8a00\u6a21\u578b\uff0c\u63ed\u793a\u4e86\u0027\u9760\u5806\u53c2\u6570\u89e3\u51b3\u6301\u7eed\u5b66\u4e60\u95ee\u9898\u0027\u8fd9\u4e00\u76f4\u89c9\u7684\u5c40\u9650\u6027\uff0c\u5bf9LLM\u957f\u671f\u8bad\u7ec3\u4e0e\u6301\u7eed\u5b66\u4e60\u7814\u7a76\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "Reinforcement Learning with Verifiable Rewards (RLVR) for language-model reasoning can fail at both extremes of task difficulty: easy prompts often produce all-correct, low-diversity rollout groups with little gradient signal, while hard prompts can produce all-incorrect groups with no positive reward. We introduce ExTra (Exploratory Trajectory Optimization), a GRPO-compatible framework that extracts exploration signals from the model\u0027s own rollouts. ExTra combines two mechanisms: (i) a novelty reward that adds embedding-based diversity bonuses after GRPO normalization, rewarding diverse correct solutions; and (ii) entropy-guided prefix regeneration, which scores partial trajectories using entropy signals and continues exploration from promising intermediate steps. Across six mathematical reasoning benchmarks, ExTra improves Qwen3-1.7B over GRPO by about +5 points on pass@1 and +7 points on pass@16, showing that trajectory-level exploration signals can improve both single-sample accuracy and inference-time coverage.", "arxiv_id": "2606.24994", "arxiv_url": "https://arxiv.org/abs/2606.24994", "authors": ["Wenyang Hu", "Junxiang Jia", "Zhen Shu", "Daniel Dahlmeier", "See-Kiong Ng", "Bryan Kian Hsiang Low"], "brief": "\u63d0\u51faExTra\uff08\u63a2\u7d22\u6027\u8f68\u8ff9\u4f18\u5316\uff09\u6846\u67b6\uff0c\u517c\u5bb9GRPO\uff0c\u901a\u8fc7\u4ece\u6a21\u578b\u81ea\u8eabrollout\u4e2d\u63d0\u53d6\u63a2\u7d22\u4fe1\u53f7\uff0c\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u7b80\u5355\u9898\u5168\u5bf9/\u96be\u9898\u5168\u9519\u5bfc\u81f4\u68af\u5ea6\u4fe1\u53f7\u6d88\u5931\u7684\u95ee\u9898\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24994", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u65b0\u9896\u6027\u5956\u52b1\uff1a\u5728GRPO\u5f52\u4e00\u5316\u540e\u6dfb\u52a0\u57fa\u4e8e\u5d4c\u5165\u7684\u591a\u6837\u6027\u5956\u52b1\uff0c\u6fc0\u52b1\u6a21\u578b\u751f\u6210\u591a\u6837\u5316\u7684\u6b63\u786e\u89e3\u6cd5", "\u71b5\u5f15\u5bfc\u524d\u7f00\u518d\u751f\uff1a\u5229\u7528\u71b5\u4fe1\u53f7\u8bc4\u5206\u90e8\u5206\u8f68\u8ff9\uff0c\u4ece\u6709\u6f5c\u529b\u7684\u4e2d\u95f4\u6b65\u9aa4\u7ee7\u7eed\u63a2\u7d22\uff0c\u907f\u514d\u9677\u5165\u5c40\u90e8\u6700\u4f18", "\u5728\u516d\u4e2a\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\uff0cQwen3-1.7B\u76f8\u6bd4GRPO\u63d0\u5347\u7ea6pass@1 +5\u5206\u3001pass@16 +7\u5206"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b", "\u6570\u5b66\u63a8\u7406", "\u63a2\u7d22\u7b56\u7565"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24994v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ExTra: Exploratory Trajectory Optimization for Language Model Reinforcement Learning", "tldr": "ExTra\u6846\u67b6\u901a\u8fc7\u65b0\u9896\u6027\u5956\u52b1\u548c\u71b5\u5f15\u5bfc\u524d\u7f00\u518d\u751f\uff0c\u89e3\u51b3RLVR\u5728\u96be\u6613\u9898\u4e0a\u7684\u68af\u5ea6\u4fe1\u53f7\u7f3a\u5931\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faExTra\uff08\u63a2\u7d22\u6027\u8f68\u8ff9\u4f18\u5316\uff09\u6846\u67b6\uff0c\u517c\u5bb9GRPO\uff0c\u901a\u8fc7\u4ece\u6a21\u578b\u81ea\u8eabrollout\u4e2d\u63d0\u53d6\u63a2\u7d22\u4fe1\u53f7\uff0c\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u7b80\u5355\u9898\u5168\u5bf9/\u96be\u9898\u5168\u9519\u5bfc\u81f4\u68af\u5ea6\u4fe1\u53f7\u6d88\u5931\u7684\u95ee\u9898\u3002", "why_notable": "\u7cbe\u51c6\u5b9a\u4f4dRLVR\u8bad\u7ec3\u7684\u4e24\u5927\u5931\u6548\u573a\u666f\uff08\u5168\u5bf9/\u5168\u9519\uff09\uff0c\u4ee5\u8f7b\u91cf\u7ea7\u63a2\u7d22\u673a\u5236\u540c\u65f6\u63d0\u5347\u5355\u6b21\u91c7\u6837\u51c6\u786e\u7387\u548c\u63a8\u7406\u65f6\u8986\u76d6\u7387\uff0c\u5bf9\u5c0f\u6a21\u578b\u6570\u5b66\u63a8\u7406\u8bad\u7ec3\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Standard benchmarks for multimodal large language models (MLLMs) score each item on one canonical ordering and miss whether order-irrelevant shuffling changes the answer, a baseline reliability property called for by emerging AI evaluation guidelines. We introduce Facet-Probe, a five-facet audit (option, evidence-chunk, document-rank, image-set, and mixed-modality ordering) of 18 frontier and open-weight MLLMs. A Bayesian item-response model separates ordering noise from per-facet bias, and a same-ordering control estimates the decoder-stochastic floor for observed flips. We find that none of the 18 MLLMs we audit are order-invariant: screened per-facet panel-mean flip rates span 24-50%. A Gemini same-ordering control at temperature 0 estimates a substantial ordering excess over a same-input decoder-noise floor in verified cells. Capability predicts but does not eliminate flips; the best model still flips on 13.4% of trials. In our Gemini mitigation tests, training-free prompt changes are modality-conditional and do not transfer from text to visual reasoning. These results suggest that prompt-level mitigation alone is unlikely to provide general order robustness, motivating future work on training-time and architectural approaches. We propose cross-ordering flip rate as a standard reporting axis for MLLMs.", "arxiv_id": "2606.26079", "arxiv_url": "https://arxiv.org/abs/2606.26079", "authors": ["Akshay Paruchuri", "Sanmi Koyejo", "Ehsan Adeli"], "brief": "\u63d0\u51faFacet-Probe\u5ba1\u8ba1\u6846\u67b6\uff0c\u4ece5\u4e2a\u7ef4\u5ea6\uff08\u9009\u9879\u3001\u8bc1\u636e\u5757\u3001\u6587\u6863\u6392\u5e8f\u3001\u56fe\u50cf\u96c6\u3001\u6df7\u5408\u6a21\u6001\uff09\u7cfb\u7edf\u8bc4\u4f3018\u4e2a\u591a\u6a21\u6001\u5927\u6a21\u578b\u5bf9\u987a\u5e8f\u6270\u52a8\u7684\u654f\u611f\u6027\uff0c\u63ed\u793a\u6240\u6709\u88ab\u6d4b\u6a21\u578b\u5747\u5b58\u5728\u663e\u8457\u7684\u987a\u5e8f\u4e0d\u4e00\u81f4\u95ee\u9898\u3002", "categories": ["cs.CL", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26079", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["18\u4e2a\u524d\u6cbf\u4e0e\u5f00\u6e90\u591a\u6a21\u6001\u5927\u6a21\u578b\u5747\u975e\u987a\u5e8f\u4e0d\u53d8\uff1a\u5404\u7ef4\u5ea6\u9762\u677f\u5e73\u5747\u7ffb\u8f6c\u7387\u4e3a24%-50%", "\u4f7f\u7528\u8d1d\u53f6\u65af\u9879\u76ee\u53cd\u5e94\u6a21\u578b\u5206\u79bb\u987a\u5e8f\u566a\u58f0\u4e0e\u504f\u5dee\uff0c\u5e76\u901a\u8fc7\u540c\u987a\u5e8f\u5bf9\u7167\u7ec4\u4f30\u8ba1\u89e3\u7801\u5668\u968f\u673a\u57fa\u7ebf", "\u6700\u4f18\u6a21\u578b\u4ecd\u670913.4%\u7684\u8bd5\u9a8c\u53d1\u751f\u7ffb\u8f6c\uff1b\u65e0\u8bad\u7ec3\u63d0\u793a\u8bcd\u7f13\u89e3\u7b56\u7565\u5177\u6709\u6a21\u6001\u6761\u4ef6\u6027\uff0c\u65e0\u6cd5\u4ece\u6587\u672c\u8fc1\u79fb\u81f3\u89c6\u89c9\u63a8\u7406"], "keywords": ["\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u53ef\u9760\u6027\u8bc4\u4f30", "\u57fa\u51c6\u6d4b\u8bd5", "\u9c81\u68d2\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26079v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Same Evidence, Different Answer: Auditing Order Sensitivity in Multimodal Large Language Models", "tldr": "\u591a\u6a21\u6001\u5927\u6a21\u578b\u5bf9\u8f93\u5165\u987a\u5e8f\u654f\u611f\uff0c18\u4e2a\u524d\u6cbf\u6a21\u578b\u7ffb\u8f6c\u7387\u9ad8\u8fbe24-50%\uff0c\u53ef\u9760\u6027\u5b58\u5728\u7cfb\u7edf\u6027\u7f3a\u9677", "upvotes": 0, "what_it_is": "\u63d0\u51faFacet-Probe\u5ba1\u8ba1\u6846\u67b6\uff0c\u4ece5\u4e2a\u7ef4\u5ea6\uff08\u9009\u9879\u3001\u8bc1\u636e\u5757\u3001\u6587\u6863\u6392\u5e8f\u3001\u56fe\u50cf\u96c6\u3001\u6df7\u5408\u6a21\u6001\uff09\u7cfb\u7edf\u8bc4\u4f3018\u4e2a\u591a\u6a21\u6001\u5927\u6a21\u578b\u5bf9\u987a\u5e8f\u6270\u52a8\u7684\u654f\u611f\u6027\uff0c\u63ed\u793a\u6240\u6709\u88ab\u6d4b\u6a21\u578b\u5747\u5b58\u5728\u663e\u8457\u7684\u987a\u5e8f\u4e0d\u4e00\u81f4\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u987a\u5e8f\u654f\u611f\u6027\u8fd9\u4e00\u57fa\u7840\u53ef\u9760\u6027\u7f3a\u9677\uff0c\u63d0\u51fa\u8de8\u987a\u5e8f\u7ffb\u8f6c\u7387\u4f5c\u4e3a\u6807\u51c6\u8bc4\u4f30\u6307\u6807\uff0c\u5bf9AI\u8bc4\u4f30\u89c4\u8303\u5236\u5b9a\u548c\u6a21\u578b\u8bad\u7ec3\u6539\u8fdb\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Effective online adaptation of vision-language-action (VLA) models remains challenging, as sparse rewards provide weak supervision for high-dimensional autoregressive action policies. Although self-distillation can in principle provide denser training signals, we find that text-based privileged teachers conditioned on demonstrations, retrieved experiences, or high-level plans are ineffective for VLA adaptation, exposing a modality gap between symbolic guidance and low-level robot actions. We propose ROAD-VLA, an advantage-guided self-distillation framework that constructs a proximal teacher directly in action space by perturbing action-token logits with calibrated advantage estimates. This converts sparse rewards into dense token-level supervision while keeping the teacher close to the current policy. We further derive a policy-improvement lower bound under calibrated advantages and accurate teacher matching. Across seven robotic manipulation environments with in-distribution and out-of-distribution shifts, ROADVLA outperforms PPO in nearly all settings, demonstrating robust online VLA adaptation.", "arxiv_id": "2606.25800", "arxiv_url": "https://arxiv.org/abs/2606.25800", "authors": ["Kejing Wang", "Toan Nguyen", "Minh Hoang Nguyen", "Simon Khan", "Flora D. Salim"], "brief": "\u63d0\u51faROAD-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u52a8\u4f5ctoken logits\u4e0a\u65bd\u52a0\u6821\u51c6\u4f18\u52bf\u4f30\u8ba1\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\uff0c\u5c06\u7a00\u758f\u5956\u52b1\u8f6c\u5316\u4e3a\u5bc6\u96c6token\u7ea7\u76d1\u7763\u4fe1\u53f7\uff0c\u89e3\u51b3VLA\u6a21\u578b\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u9002\u5e94\u96be\u9898\u3002", "categories": ["cs.LG", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25800", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\u57fa\u4e8e\u6587\u672c\u7684\u7279\u6743\u6559\u5e08\uff08\u6f14\u793a/\u68c0\u7d22\u7ecf\u9a8c/\u9ad8\u5c42\u8ba1\u5212\uff09\u5b58\u5728\u6a21\u6001\u9e3f\u6c9f\uff0c\u5bf9VLA\u5728\u7ebf\u9002\u5e94\u65e0\u6548", "\u76f4\u63a5\u5728\u52a8\u4f5c\u7a7a\u95f4\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\uff0c\u7528\u6821\u51c6\u4f18\u52bf\u4f30\u8ba1\u6270\u52a8\u52a8\u4f5ctoken logits\uff0c\u907f\u514d\u7b26\u53f7\u6307\u5bfc\u4e0e\u4f4e\u5c42\u52a8\u4f5c\u7684\u8bed\u4e49\u65ad\u5c42", "\u57287\u4e2a\u673a\u5668\u4eba\u64cd\u4f5c\u73af\u5883\uff08\u542b\u5206\u5e03\u5185\u4e0e\u5206\u5e03\u5916\u504f\u79fb\uff09\u4e2d\u5168\u9762\u8d85\u8d8aPPO\u57fa\u7ebf\uff0c\u5e76\u63d0\u4f9b\u7b56\u7565\u6539\u8fdb\u4e0b\u754c\u7406\u8bba\u4fdd\u8bc1"], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u673a\u5668\u4eba\u64cd\u4f5c", "\u81ea\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25800v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ROAD-VLA: Robust Online Adaptation via Self-Distillation for Vision-Language-Action Models", "tldr": "ROAD-VLA\u901a\u8fc7\u52a8\u4f5c\u7a7a\u95f4\u81ea\u84b8\u998f\u5c06\u7a00\u758f\u5956\u52b1\u8f6c\u5316\u4e3a\u5bc6\u96c6\u76d1\u7763\uff0c\u5b9e\u73b0VLA\u6a21\u578b\u7684\u9c81\u68d2\u5728\u7ebf\u9002\u5e94", "upvotes": 0, "what_it_is": "\u63d0\u51faROAD-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u52a8\u4f5ctoken logits\u4e0a\u65bd\u52a0\u6821\u51c6\u4f18\u52bf\u4f30\u8ba1\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\uff0c\u5c06\u7a00\u758f\u5956\u52b1\u8f6c\u5316\u4e3a\u5bc6\u96c6token\u7ea7\u76d1\u7763\u4fe1\u53f7\uff0c\u89e3\u51b3VLA\u6a21\u578b\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u9002\u5e94\u96be\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u6587\u672c\u7279\u6743\u6559\u5e08\u5bf9VLA\u5728\u7ebf\u9002\u5e94\u7684\u5931\u6548\u539f\u56e0\uff0c\u5e76\u63d0\u51fa\u52a8\u4f5c\u7a7a\u95f4\u81ea\u84b8\u998f\u8fd9\u4e00\u65b0\u8303\u5f0f\uff0c\u4e3aVLA\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u63d0\u4f9b\u7406\u8bba\u4e0e\u5b9e\u8df5\u53cc\u91cd\u8d21\u732e\u3002"}, {"abstract": "A central goal of safety research is determining whether a model is misaligned. Prior work has largely focused on detecting concerning behavior. But behavior alone does not establish misalignment: a concerning action can arise from benign causes such as confusion. This motivates model forensics: investigating whether the action was driven by malign intent. In this paper, we propose a baseline protocol for model forensics consisting of two steps, iterated as needed. First, we read the chain of thought (CoT) to generate hypotheses about what drives model behavior. Second, we make edits to the prompt or environment to test these hypotheses. While the CoT is not always faithful, it is a rich source of unsupervised insight that can guide the collection of more rigorous evidence. To evaluate our protocol, we create a suite of six agentic environments where models exhibit concerning behavior, and apply it to each. We establish that Kimi K2 Thinking takes shortcuts due to a genuine disposition towards low-effort actions, by showing this hypothesis successfully predicts its behavior. Through counterfactual experiments, we show DeepSeek R1 deceives out of a desire to be consistent with a previous instance of itself. Our methods nonetheless leave significant room for refinement. For example, when we test whether Kimi K2 Thinking believes it is violating user intent, we find no evidence of such a belief, but without positive controls we cannot confirm our tests would detect it. Overall, we find our simple protocol provides a strong baseline that we hope future work will improve upon. More broadly, our work is a concrete step in developing the growing field of model forensics.", "arxiv_id": "2606.26071", "arxiv_url": "https://arxiv.org/abs/2606.26071", "authors": ["Aditya Singh", "Gerson Kroiz", "Senthooran Rajamanoharan", "Neel Nanda"], "brief": "\u63d0\u51fa\"\u6a21\u578b\u53d6\u8bc1\"\u6846\u67b6\uff0c\u901a\u8fc7\u8bfb\u53d6\u601d\u7ef4\u94fe\u751f\u6210\u5047\u8bbe\u3001\u518d\u901a\u8fc7\u63d0\u793a\u8bcd\u7f16\u8f91\u9a8c\u8bc1\u5047\u8bbe\uff0c\u533a\u5206\u6a21\u578b\u7684\u95ee\u9898\u884c\u4e3a\u662f\u6e90\u4e8e\u6076\u610f\u610f\u56fe\u8fd8\u662f\u826f\u6027\u6df7\u6dc6\u3002\u5b9e\u9a8c\u5728\u516d\u4e2a\u667a\u80fd\u4f53\u73af\u5883\u4e2d\u9a8c\u8bc1\u8be5\u65b9\u6cd5\uff0c\u53d1\u73b0Kimi K2 Thinking\u5b58\u5728\u771f\u5b9e\u7684\u4f4e\u52aa\u529b\u503e\u5411\uff0cDeepSeek R1\u5219\u51fa\u4e8e\u81ea\u6211\u4e00\u81f4\u6027\u6b32\u671b\u800c\u8fdb\u884c\u6b3a\u9a97\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26071", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u6a21\u578b\u5bf9\u9f50", "\u667a\u80fd\u4f53", "\u601d\u7ef4\u94fe", "AI\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26071v1", "published_at": "2026-06-24", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Model Forensics: Investigating Whether Concerning Behavior Reflects Misalignment", "tldr": "\u63d0\u51fa\"\u6a21\u578b\u53d6\u8bc1\"\u6846\u67b6\uff0c\u901a\u8fc7\u8bfb\u53d6\u601d\u7ef4\u94fe\u751f\u6210\u5047\u8bbe\u3001\u518d\u901a\u8fc7\u63d0\u793a\u8bcd\u7f16\u8f91\u9a8c\u8bc1\u5047\u8bbe\uff0c\u533a\u5206\u6a21\u578b\u7684\u95ee\u9898\u884c\u4e3a\u662f\u6e90\u4e8e\u6076\u610f\u610f\u56fe\u8fd8\u662f\u826f\u6027\u6df7\u6dc6\u3002\u5b9e\u9a8c\u5728\u516d\u4e2a\u667a\u80fd\u4f53\u73af\u5883\u4e2d\u9a8c\u8bc1\u8be5\u65b9\u6cd5\uff0c\u53d1\u73b0Kimi K2 Thinking\u5b58\u5728\u771f\u5b9e\u7684\u4f4e\u52aa\u529b\u503e\u5411\uff0cDeepSeek R1\u5219\u51fa\u4e8e\u81ea\u6211\u4e00\u81f4\u6027\u6b32\u671b\u800c\u8fdb\u884c\u6b3a\u9a97\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We introduce Autodata, a general method that enables AI agents to act as data scientists who build high quality training and evaluation data. We show how to train (meta-optimize) such a data scientist agent, so that it learns to create even stronger data. We describe the overall formulation, and a specific practical implementation, Agentic Self-Instruct. We conduct experiments on computer science research tasks, legal reasoning tasks and reasoning with mathematical objects, where we obtain improved results compared to classical synthetic dataset creation methods. Further, meta-optimizing the data scientist agent itself delivers an even larger performance uplift. Agentic data creation provides a way to convert increased inference compute into higher quality model training. Overall, we believe this direction has the potential to change the way we build AI data.", "arxiv_id": "2606.25996", "arxiv_url": "https://arxiv.org/abs/2606.25996", "authors": ["Ilia Kulikov", "Chenxi Whitehouse", "Tianhao Wu", "Yixin Nie", "Swarnadeep Saha", "Eryk Helenowski", "Weizhe Yuan", "Olga Golovneva", "Jack Lanchantin", "Yoram Bachrach", "Jakob Foerster", "Xian Li", "Han Fang", "Sainbayar Sukhbaatar", "Jason Weston"], "brief": "\u63d0\u51faAutodata\u6846\u67b6\uff0c\u8ba9AI\u667a\u80fd\u4f53\u626e\u6f14\u6570\u636e\u79d1\u5b66\u5bb6\u89d2\u8272\uff0c\u81ea\u52a8\u751f\u6210\u9ad8\u8d28\u91cf\u5408\u6210\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u6570\u636e\u3002\u901a\u8fc7\u5143\u4f18\u5316\uff08meta-optimize\uff09\u6570\u636e\u79d1\u5b66\u5bb6\u667a\u80fd\u4f53\u672c\u8eab\uff0c\u5728\u8ba1\u7b97\u673a\u79d1\u5b66\u7814\u7a76\u3001\u6cd5\u5f8b\u63a8\u7406\u548c\u6570\u5b66\u63a8\u7406\u4efb\u52a1\u4e0a\u5747\u4f18\u4e8e\u4f20\u7edf\u5408\u6210\u6570\u636e\u65b9\u6cd5\uff0c\u4e14\u5143\u4f18\u5316\u540e\u6548\u679c\u63d0\u5347\u66f4\u663e\u8457\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25996", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5408\u6210\u6570\u636e", "\u5143\u4f18\u5316", "\u6570\u636e\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25996v1", "published_at": "2026-06-24", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Autodata: An agentic data scientist to create high quality synthetic data", "tldr": "\u63d0\u51faAutodata\u6846\u67b6\uff0c\u8ba9AI\u667a\u80fd\u4f53\u626e\u6f14\u6570\u636e\u79d1\u5b66\u5bb6\u89d2\u8272\uff0c\u81ea\u52a8\u751f\u6210\u9ad8\u8d28\u91cf\u5408\u6210\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u6570\u636e\u3002\u901a\u8fc7\u5143\u4f18\u5316\uff08meta-optimize\uff09\u6570\u636e\u79d1\u5b66\u5bb6\u667a\u80fd\u4f53\u672c\u8eab\uff0c\u5728\u8ba1\u7b97\u673a\u79d1\u5b66\u7814\u7a76\u3001\u6cd5\u5f8b\u63a8\u7406\u548c\u6570\u5b66\u63a8\u7406\u4efb\u52a1\u4e0a\u5747\u4f18\u4e8e\u4f20\u7edf\u5408\u6210\u6570\u636e\u65b9\u6cd5\uff0c\u4e14\u5143\u4f18\u5316\u540e\u6548\u679c\u63d0\u5347\u66f4\u663e\u8457\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are turning from isolated predictors into agentic systems: they call tools, retrieve evidence, obey environment constraints, use verifiers, and complete tasks through search and multi-turn interaction. We adopts an analytical viewpoint based on \"compression is intelligence\": under a fixed task distribution, interface, and compute budget, a stronger agentic system lets a target object be reconstructed with fewer bits. We operationalize the measure with arithmetic coding, seed coding, and a fallback, and evaluate it in five settings: reversed text, chess moves, protein sequences, retrieval-augmented question answering, and semantic story compression; in all of them agentic components reduce codelength. These small, controlled experiments cover component types typical of real agentic systems, show that codelength can analyze how components, observers, and budgets change residual uncertainty, and offer guidance for evaluating real agent systems.", "arxiv_id": "2606.25960", "arxiv_url": "https://arxiv.org/abs/2606.25960", "authors": ["Zihan Qin", "Hongrui Zhang"], "brief": "\u63d0\u51fa\u4ee5\"\u538b\u7f29\u5373\u667a\u80fd\"\u4e3a\u6838\u5fc3\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u8bc4\u4f30\u6846\u67b6\uff1a\u5728\u56fa\u5b9a\u4efb\u52a1\u5206\u5e03\u548c\u8ba1\u7b97\u9884\u7b97\u4e0b\uff0c\u66f4\u5f3a\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u80fd\u7528\u66f4\u5c11\u6bd4\u7279\u91cd\u5efa\u76ee\u6807\u5bf9\u8c61\u3002\u901a\u8fc7\u7b97\u672f\u7f16\u7801\u7b49\u65b9\u6cd5\u5728\u4e94\u7c7b\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0c\u667a\u80fd\u4f53\u7ec4\u4ef6\uff08\u5de5\u5177\u8c03\u7528\u3001\u68c0\u7d22\u3001\u9a8c\u8bc1\u5668\u7b49\uff09\u5747\u80fd\u6709\u6548\u964d\u4f4e\u7f16\u7801\u957f\u5ea6\uff0c\u4e3a\u667a\u80fd\u4f53\u7cfb\u7edf\u8bc4\u4f30\u63d0\u4f9b\u4e86\u53ef\u91cf\u5316\u7684\u4fe1\u606f\u8bba\u89c6\u89d2\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25960", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4fe1\u606f\u8bba", "\u538b\u7f29", "\u7cfb\u7edf\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25960v1", "published_at": "2026-06-24", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agentic System as Compressor: Quantifying System Intelligence in Bits", "tldr": "\u63d0\u51fa\u4ee5\"\u538b\u7f29\u5373\u667a\u80fd\"\u4e3a\u6838\u5fc3\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u8bc4\u4f30\u6846\u67b6\uff1a\u5728\u56fa\u5b9a\u4efb\u52a1\u5206\u5e03\u548c\u8ba1\u7b97\u9884\u7b97\u4e0b\uff0c\u66f4\u5f3a\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u80fd\u7528\u66f4\u5c11\u6bd4\u7279\u91cd\u5efa\u76ee\u6807\u5bf9\u8c61\u3002\u901a\u8fc7\u7b97\u672f\u7f16\u7801\u7b49\u65b9\u6cd5\u5728\u4e94\u7c7b\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0c\u667a\u80fd\u4f53\u7ec4\u4ef6\uff08\u5de5\u5177\u8c03\u7528\u3001\u68c0\u7d22\u3001\u9a8c\u8bc1\u5668\u7b49\uff09\u5747\u80fd\u6709\u6548\u964d\u4f4e\u7f16\u7801\u957f\u5ea6\uff0c\u4e3a\u667a\u80fd\u4f53\u7cfb\u7edf\u8bc4\u4f30\u63d0\u4f9b\u4e86\u53ef\u91cf\u5316\u7684\u4fe1\u606f\u8bba\u89c6\u89d2\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Image generative models are trained on massive, largely uncurated internet-scale datasets that contain undesirable visual concepts. Efficiently removing such concepts from the model generations without degrading the quality of output images remains challenging. We introduce a novel concept removal method for frontier diffusion and image autoregressive models, such as SD3.5, Flux, and Infinity. Our intervention replaces the internal bottleneck layer present in all these modern models with a transcoder that is trained to replicate the original layer while structuring it into distinct activation features. This in-place substitution creates an integrated filter through which concept-specific signals can be selectively disabled while preserving the rest of the model\u0027s behavior. Since the intervention modifies the model backbone rather than attaching an external component, it remains persistent under white-box access. Empirically, the approach achieves state-of-the-art concept removal performance across modern diffusion and autoregressive models, maintains visual generation quality, provides robustness against adversarial prompts, and supports sequential removal of diverse concepts. This positions our method as a practical approach for concept removal in frontier image generative models.", "arxiv_id": "2606.25548", "arxiv_url": "https://arxiv.org/abs/2606.25548", "authors": ["Aditya Kumar", "Pierre Joly", "Adam Dziedzic", "Franziska Boenisch"], "brief": "\u63d0\u51fa\u4e00\u79cd\u9488\u5bf9\u524d\u6cbf\u56fe\u50cf\u751f\u6210\u6a21\u578b\uff08SD3.5\u3001Flux\u3001Infinity\u7b49\uff09\u7684\u6982\u5ff5\u79fb\u9664\u65b9\u6cd5\uff0c\u901a\u8fc7\u5c06\u6a21\u578b\u5185\u90e8\u74f6\u9888\u5c42\u66ff\u6362\u4e3a\u7ecf\u8fc7\u8bad\u7ec3\u7684\u8f6c\u7801\u5668\uff08transcoder\uff09\uff0c\u5c06\u6fc0\u6d3b\u7279\u5f81\u7ed3\u6784\u5316\u5206\u79bb\uff0c\u4ece\u800c\u9009\u62e9\u6027\u7981\u7528\u7279\u5b9a\u6982\u5ff5\u4fe1\u53f7\u3002\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u751f\u6210\u8d28\u91cf\u7684\u540c\u65f6\uff0c\u5b9e\u73b0\u4e86\u6700\u5148\u8fdb\u7684\u6982\u5ff5\u79fb\u9664\u6548\u679c\uff0c\u5e76\u5bf9\u5bf9\u6297\u6027\u63d0\u793a\u5177\u6709\u9c81\u68d2\u6027\uff0c\u652f\u6301\u591a\u6982\u5ff5\u987a\u5e8f\u79fb\u9664\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25548", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u6982\u5ff5\u79fb\u9664", "\u56fe\u50cf\u751f\u6210", "\u6a21\u578b\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25548v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Concept Removal for Frontier Image Generative Models", "tldr": "\u63d0\u51fa\u4e00\u79cd\u9488\u5bf9\u524d\u6cbf\u56fe\u50cf\u751f\u6210\u6a21\u578b\uff08SD3.5\u3001Flux\u3001Infinity\u7b49\uff09\u7684\u6982\u5ff5\u79fb\u9664\u65b9\u6cd5\uff0c\u901a\u8fc7\u5c06\u6a21\u578b\u5185\u90e8\u74f6\u9888\u5c42\u66ff\u6362\u4e3a\u7ecf\u8fc7\u8bad\u7ec3\u7684\u8f6c\u7801\u5668\uff08transcoder\uff09\uff0c\u5c06\u6fc0\u6d3b\u7279\u5f81\u7ed3\u6784\u5316\u5206\u79bb\uff0c\u4ece\u800c\u9009\u62e9\u6027\u7981\u7528\u7279\u5b9a\u6982\u5ff5\u4fe1\u53f7\u3002\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u751f\u6210\u8d28\u91cf\u7684\u540c\u65f6\uff0c\u5b9e\u73b0\u4e86\u6700\u5148\u8fdb\u7684\u6982\u5ff5\u79fb\u9664\u6548\u679c\uff0c\u5e76\u5bf9\u5bf9\u6297\u6027\u63d0\u793a\u5177\u6709\u9c81\u68d2\u6027\uff0c\u652f\u6301\u591a\u6982\u5ff5\u987a\u5e8f\u79fb\u9664\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Autoregressive video diffusion with causal diffusion transformers has emerged as a major paradigm for real-time streaming video generation and action-conditioned interactive world models. In this work, we extend rCM, an advanced diffusion distillation framework, to autoregressive video diffusion. The core philosophy of rCM lies in the complementarity between forward and reverse divergences, represented by consistency models (CMs) and distribution matching distillation (DMD), respectively, in diffusion distillation. This philosophy naturally carries over to the autoregressive setting, where teacher-forcing (TF) provides an offline, forward-divergence causal training paradigm, while self-forcing (SF) corresponds to an on-policy, reverse-divergence refinement. Our contributions are: (1) through extensive experiments, we show that teacher-forcing CM is currently the best complement to self-forcing DMD as an initialization strategy (2) we present the first implementation of teacher-forcing-based continuous-time CMs (e.g., sCM/MeanFlow) for autoregressive video diffusion, enabled by our custom-mask FlashAttention-2 JVP kernel, achieving 10$\\times$ faster convergence compared to discrete-time CMs (dCMs) (3) we introduce Causal-rCM, a leading, unified, and scalable algorithm-infrastructure open recipe for diffusion distillation and causal training (4) we achieve state-of-the-art streaming video generation performance in both frame-wise and chunk-wise settings, using only synthetic data for training. Notably, our distilled 2-step causal Wan2.1-1.3B model achieves a VBench-T2V score of 84.63 with only 1 or 2 sampling steps. We further apply Causal-rCM to Cosmos 3, an advanced omnimodal world foundation model for physical AI with action-conditioned generation capability, enabling an interactive world model.", "arxiv_id": "2606.25473", "arxiv_url": "https://arxiv.org/abs/2606.25473", "authors": ["Kaiwen Zheng", "Guande He", "Min Zhao", "Jintao Zhang", "Huayu Chen", "Jianfei Chen", "Chen-Hsuan Lin", "Ming-Yu Liu", "Jun Zhu", "Qianli Ma"], "brief": "\u63d0\u51faCausal-rCM\u6846\u67b6\uff0c\u5c06\u6269\u6563\u84b8\u998f\u65b9\u6cd5rCM\u6269\u5c55\u81f3\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\uff0c\u7edf\u4e00\u4e86\u6559\u5e08\u5f3a\u5236\uff08\u524d\u5411\u6563\u5ea6\uff09\u4e0e\u81ea\u5f3a\u5236\uff08\u53cd\u5411\u6563\u5ea6\uff09\u4e24\u79cd\u8bad\u7ec3\u8303\u5f0f\u3002\u901a\u8fc7\u81ea\u5b9a\u4e49FlashAttention-2 JVP\u6838\u5b9e\u73b0\u8fde\u7eed\u65f6\u95f4\u4e00\u81f4\u6027\u6a21\u578b\uff0c\u6536\u655b\u901f\u5ea6\u63d0\u534710\u500d\uff0c\u4ec5\u7528\u5408\u6210\u6570\u636e\u8bad\u7ec3\u76842\u6b65\u84b8\u998f\u6a21\u578b\u5728VBench-T2V\u4e0a\u8fbe\u523084.63\u5206\uff0c\u5e76\u6210\u529f\u5e94\u7528\u4e8e\u4ea4\u4e92\u5f0f\u4e16\u754c\u6a21\u578bCosmos 3\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25473", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u84b8\u998f", "\u4e16\u754c\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25473v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Causal-rCM: A Unified Teacher-Forcing and Self-Forcing Open Recipe for Autoregressive Diffusion Distillation in Streaming Video Generation and Interactive World Models", "tldr": "\u63d0\u51faCausal-rCM\u6846\u67b6\uff0c\u5c06\u6269\u6563\u84b8\u998f\u65b9\u6cd5rCM\u6269\u5c55\u81f3\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\uff0c\u7edf\u4e00\u4e86\u6559\u5e08\u5f3a\u5236\uff08\u524d\u5411\u6563\u5ea6\uff09\u4e0e\u81ea\u5f3a\u5236\uff08\u53cd\u5411\u6563\u5ea6\uff09\u4e24\u79cd\u8bad\u7ec3\u8303\u5f0f\u3002\u901a\u8fc7\u81ea\u5b9a\u4e49FlashAttention-2 JVP\u6838\u5b9e\u73b0\u8fde\u7eed\u65f6\u95f4\u4e00\u81f4\u6027\u6a21\u578b\uff0c\u6536\u655b\u901f\u5ea6\u63d0\u534710\u500d\uff0c\u4ec5\u7528\u5408\u6210\u6570\u636e\u8bad\u7ec3\u76842\u6b65\u84b8\u998f\u6a21\u578b\u5728VBench-T2V\u4e0a\u8fbe\u523084.63\u5206\uff0c\u5e76\u6210\u529f\u5e94\u7528\u4e8e\u4ea4\u4e92\u5f0f\u4e16\u754c\u6a21\u578bCosmos 3\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Lifelong continual learning remains an obstacle on the path to human-like intelligence. Modern transformers show sparks of intelligence with in-context learning. The quadratic nature of attention, however, prohibits transformers from performing this process on arbitrarily long sequences. In this work, we argue that extending in-context learning to lifelong settings is a practical solution for continual learning in AI agents. In particular, we argue that \\emph{parametric forms of attention} are needed to understand a lifetime of context with transformers on a fixed hardware budget. These attention mechanisms learn the relationship between keys and their associated values at test-time with parametric regression. Our generalization of parametric approaches (linear attention, state-space models, fast weight programmers, and test-time training layers) contrasts with nonparametric counterparts like softmax attention. They replace the ever-growing key-value cache with an online-trainable neural network, maintaining a constant memory footprint. We highlight how parametric attention currently fall short of lifelong learning due to limited memory capacity or costly online updates. To address these issues, we pose a set of open questions with novel insights to guide the field toward long-horizon agents.", "arxiv_id": "2606.25342", "arxiv_url": "https://arxiv.org/abs/2606.25342", "authors": ["Luke McDermott", "Robert W. Heath", "Rahul Parhi"], "brief": "\u672c\u6587\u63a2\u8ba8\u5c06\u4e0a\u4e0b\u6587\u5b66\u4e60\u6269\u5c55\u5230\u7ec8\u8eab\u5b66\u4e60\u573a\u666f\u7684\u53ef\u884c\u6027\uff0c\u6307\u51fa\u6807\u51c6Transformer\u7684\u4e8c\u6b21\u6ce8\u610f\u529b\u673a\u5236\u56e0\u5185\u5b58\u9650\u5236\u65e0\u6cd5\u5904\u7406\u8d85\u957f\u5e8f\u5217\uff0c\u63d0\u51fa\u53c2\u6570\u5316\u6ce8\u610f\u529b\u673a\u5236\uff08\u7ebf\u6027\u6ce8\u610f\u529b\u3001\u72b6\u6001\u7a7a\u95f4\u6a21\u578b\u7b49\uff09\u662f\u5b9e\u73b0\u7ec8\u8eab\u4e0a\u4e0b\u6587\u5b66\u4e60\u7684\u5173\u952e\u65b9\u5411\uff0c\u5e76\u5206\u6790\u4e86\u5f53\u524d\u65b9\u6cd5\u5728\u8bb0\u5fc6\u5bb9\u91cf\u548c\u5728\u7ebf\u66f4\u65b0\u6548\u7387\u4e0a\u7684\u4e0d\u8db3\uff0c\u63d0\u51fa\u4e86\u82e5\u5e72\u5f00\u653e\u6027\u95ee\u9898\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25342", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u7ec8\u8eab\u5b66\u4e60", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u53c2\u6570\u5316\u6ce8\u610f\u529b", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25342v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Lifelong In-Context Learning with Transformers Requires Parametric Forms of Attention", "tldr": "\u672c\u6587\u63a2\u8ba8\u5c06\u4e0a\u4e0b\u6587\u5b66\u4e60\u6269\u5c55\u5230\u7ec8\u8eab\u5b66\u4e60\u573a\u666f\u7684\u53ef\u884c\u6027\uff0c\u6307\u51fa\u6807\u51c6Transformer\u7684\u4e8c\u6b21\u6ce8\u610f\u529b\u673a\u5236\u56e0\u5185\u5b58\u9650\u5236\u65e0\u6cd5\u5904\u7406\u8d85\u957f\u5e8f\u5217\uff0c\u63d0\u51fa\u53c2\u6570\u5316\u6ce8\u610f\u529b\u673a\u5236\uff08\u7ebf\u6027\u6ce8\u610f\u529b\u3001\u72b6\u6001\u7a7a\u95f4\u6a21\u578b\u7b49\uff09\u662f\u5b9e\u73b0\u7ec8\u8eab\u4e0a\u4e0b\u6587\u5b66\u4e60\u7684\u5173\u952e\u65b9\u5411\uff0c\u5e76\u5206\u6790\u4e86\u5f53\u524d\u65b9\u6cd5\u5728\u8bb0\u5fc6\u5bb9\u91cf\u548c\u5728\u7ebf\u66f4\u65b0\u6548\u7387\u4e0a\u7684\u4e0d\u8db3\uff0c\u63d0\u51fa\u4e86\u82e5\u5e72\u5f00\u653e\u6027\u95ee\u9898\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Sparse Mixture-of-Experts (MoE) models route each token to a few of many experts, inviting the hypothesis that experts form functional modules tied to capabilities or languages. We test this causally on Command A+, a frontier open-weights MoE (218B total / 25B active; 128 experts, 8 active, +1 shared). We build a routing-mass atlas, pre-register six family-to-axis hypotheses before any intervention, and ablate each family at inference time against a size-matched random-expert null, measuring whether it selectively breaks its own axis (worst off-target effect at most one third of on-target). Crucially, we test the same families under four metrics and a held-out, independent-corpus run with bootstrap confidence intervals. Our finding is cautionary: robust functional modularity is rare and measurement-dependent. Of six pre-registered families, only one, the Arabic-language family, is a clean selective module that survives an independent corpus and a conservative statistical bar (1/6; a more permissive pre-registered point rule admits 3/6, but that count is threshold-sensitive). Every other family has a real causal effect yet fails selectivity, and its apparent modularity flips with the measurement: with the corpus, the metric, and the statistical bar. A positive control on Qwen3-30B-A3B recovers its published disjoint structure, confirming the method detects modularity when present. The verdict reproduces on the un-quantized BF16 model, ruling out a 4-bit quantization artifact. We conclude that ablation-based modularity verdicts are not safe unless the corpus, metric, and statistical bar are controlled. We release the atlas and ablation data.", "arxiv_id": "2606.25092", "arxiv_url": "https://arxiv.org/abs/2606.25092", "authors": ["Tony Salomone", "Deep Gandhi", "Ali Asaria"], "brief": "\u5bf9\u524d\u6cbfMoE\u6a21\u578bCommand A+\uff08218B\u53c2\u6570\uff09\u8fdb\u884c\u9884\u6ce8\u518c\u56e0\u679c\u5b9e\u9a8c\uff0c\u6d4b\u8bd5\u5176128\u4e2a\u4e13\u5bb6\u662f\u5426\u5f62\u6210\u529f\u80fd\u6027\u6a21\u5757\u3002\u7ed3\u679c\u53d1\u73b0\u771f\u6b63\u5177\u6709\u9009\u62e9\u6027\u6a21\u5757\u5316\u7684\u4e13\u5bb6\u6781\u5c11\uff086\u4e2a\u9884\u6ce8\u518c\u5bb6\u65cf\u4e2d\u4ec51\u4e2a\u963f\u62c9\u4f2f\u8bed\u5bb6\u65cf\u901a\u8fc7\u4e25\u683c\u68c0\u9a8c\uff09\uff0c\u5927\u591a\u6570\u8868\u9762\u4e0a\u7684\u6a21\u5757\u5316\u4f1a\u968f\u8bed\u6599\u5e93\u3001\u6307\u6807\u548c\u7edf\u8ba1\u6807\u51c6\u7684\u53d8\u5316\u800c\u6d88\u5931\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25092", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6df7\u5408\u4e13\u5bb6\u6a21\u578b", "\u6a21\u5757\u5316", "\u56e0\u679c\u63a8\u65ad", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25092v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "How Modular Is a Frontier Mixture-of-Experts? A Pre-registered Causal Test in Which Apparent Expert Modularity Mostly Dissolves", "tldr": "\u5bf9\u524d\u6cbfMoE\u6a21\u578bCommand A+\uff08218B\u53c2\u6570\uff09\u8fdb\u884c\u9884\u6ce8\u518c\u56e0\u679c\u5b9e\u9a8c\uff0c\u6d4b\u8bd5\u5176128\u4e2a\u4e13\u5bb6\u662f\u5426\u5f62\u6210\u529f\u80fd\u6027\u6a21\u5757\u3002\u7ed3\u679c\u53d1\u73b0\u771f\u6b63\u5177\u6709\u9009\u62e9\u6027\u6a21\u5757\u5316\u7684\u4e13\u5bb6\u6781\u5c11\uff086\u4e2a\u9884\u6ce8\u518c\u5bb6\u65cf\u4e2d\u4ec51\u4e2a\u963f\u62c9\u4f2f\u8bed\u5bb6\u65cf\u901a\u8fc7\u4e25\u683c\u68c0\u9a8c\uff09\uff0c\u5927\u591a\u6570\u8868\u9762\u4e0a\u7684\u6a21\u5757\u5316\u4f1a\u968f\u8bed\u6599\u5e93\u3001\u6307\u6807\u548c\u7edf\u8ba1\u6807\u51c6\u7684\u53d8\u5316\u800c\u6d88\u5931\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Neural scaling laws for transformer language models predict smooth improvements in pretraining loss with increasing parameters, but downstream capabilities such as in-context learning are known to emerge abruptly past a certain model scale. In this paper, we show that emergent capabilities arise stochastically throughout training, with larger models acquiring them earlier on average. We demonstrate that the emergence of capabilities such as pattern completion and indirect object identification corresponds to the abrupt learning of task-relevant attention patterns. To isolate this phenomenon, we train transformer models on synthetic linear map and cellular automata datasets, and we show that the difficulty of learning attention patterns depends on context length and pattern sparsity. Moreover, scaling the number of attention heads improves learning efficiency on our synthetic tasks, while increasing the head dimension yields diminishing returns past a minimum capacity. We additionally investigate architectures with alternative attention mechanisms, showing that MLP-Mixer outperforms a transformer on linear map tasks with complex attention patterns. Our findings provide a mechanistic insight into emergence, showing that downstream capabilities arise abruptly due to the intrinsic difficulty of learning sparse attention patterns in transformer models.", "arxiv_id": "2606.25010", "arxiv_url": "https://arxiv.org/abs/2606.25010", "authors": ["Vatsal Baherwani", "Zixi Chen", "Shikai Qiu", "Andrew Gordon Wilson", "Pavel Izmailov"], "brief": "\u7814\u7a76\u53d1\u73b0Transformer\u7684\u6d8c\u73b0\u80fd\u529b\u6e90\u4e8e\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u968f\u673a\u4e60\u5f97\u7a00\u758f\u6ce8\u610f\u529b\u6a21\u5f0f\uff0c\u8f83\u5927\u6a21\u578b\u5e73\u5747\u66f4\u65e9\u83b7\u5f97\u8fd9\u4e9b\u80fd\u529b\u3002\u901a\u8fc7\u5408\u6210\u6570\u636e\u96c6\u5b9e\u9a8c\u63ed\u793a\uff0c\u6ce8\u610f\u529b\u6a21\u5f0f\u7684\u5b66\u4e60\u96be\u5ea6\u53d6\u51b3\u4e8e\u4e0a\u4e0b\u6587\u957f\u5ea6\u548c\u6a21\u5f0f\u7a00\u758f\u6027\uff0c\u589e\u52a0\u6ce8\u610f\u529b\u5934\u6570\u6bd4\u589e\u5927\u5934\u7ef4\u5ea6\u66f4\u6709\u6548\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25010", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6d8c\u73b0\u80fd\u529b", "\u6ce8\u610f\u529b\u673a\u5236", "Transformer", "\u795e\u7ecf\u7f29\u653e\u5f8b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25010v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Emergent Capabilities Arise Randomly from Learning Sparse Attention Patterns", "tldr": "\u7814\u7a76\u53d1\u73b0Transformer\u7684\u6d8c\u73b0\u80fd\u529b\u6e90\u4e8e\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u968f\u673a\u4e60\u5f97\u7a00\u758f\u6ce8\u610f\u529b\u6a21\u5f0f\uff0c\u8f83\u5927\u6a21\u578b\u5e73\u5747\u66f4\u65e9\u83b7\u5f97\u8fd9\u4e9b\u80fd\u529b\u3002\u901a\u8fc7\u5408\u6210\u6570\u636e\u96c6\u5b9e\u9a8c\u63ed\u793a\uff0c\u6ce8\u610f\u529b\u6a21\u5f0f\u7684\u5b66\u4e60\u96be\u5ea6\u53d6\u51b3\u4e8e\u4e0a\u4e0b\u6587\u957f\u5ea6\u548c\u6a21\u5f0f\u7a00\u758f\u6027\uff0c\u589e\u52a0\u6ce8\u610f\u529b\u5934\u6570\u6bd4\u589e\u5927\u5934\u7ef4\u5ea6\u66f4\u6709\u6548\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Neural scaling laws describe how pre-training loss decays as power laws with training time, model size, and compute. This position paper argues that the exponents of these power laws are fixed by generic mechanisms: a one-third time scaling due to the strong nonlinearity of Softmax, an inverse width scaling due to representational superposition, and an inverse depth scaling due to ensemble averaging of Transformer layers. These mechanisms are robust to a wide range of data structures and architectural details, placing current large language models in a universality class with fixed exponents. The coefficients, however, are expected to be sensitive to data and architecture details, and directly determine practical quantities such as the optimal model shape and the compute-optimal frontier. We therefore argue that understanding the coefficients is the key to near-term performance improvements, and that a closer examination of the current universality class may reveal pathways to better universality classes.", "arxiv_id": "2606.25008", "arxiv_url": "https://arxiv.org/abs/2606.25008", "authors": ["Yizhou Liu", "Jeff Gore"], "brief": "\u672c\u6587\u8bba\u8bc1\u795e\u7ecf\u7f51\u7edc\u7f29\u653e\u5f8b\u7684\u5e42\u5f8b\u6307\u6570\u7531\u901a\u7528\u673a\u5236\u51b3\u5b9a\uff08Softmax\u975e\u7ebf\u6027\u3001\u8868\u793a\u53e0\u52a0\u3001Transformer\u5c42\u96c6\u6210\uff09\uff0c\u5177\u6709\u666e\u9002\u6027\uff1b\u800c\u7cfb\u6570\u5219\u5bf9\u6570\u636e\u548c\u67b6\u6784\u654f\u611f\uff0c\u76f4\u63a5\u51b3\u5b9a\u6700\u4f18\u6a21\u578b\u5f62\u72b6\u548c\u8ba1\u7b97\u6548\u7387\uff0c\u56e0\u6b64\u7406\u89e3\u7cfb\u6570\u662f\u8fd1\u671f\u6027\u80fd\u63d0\u5347\u7684\u5173\u952e\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25008", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7f29\u653e\u5f8b", "\u5927\u8bed\u8a00\u6a21\u578b", "Transformer", "\u666e\u9002\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25008v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Neural Scaling Universality: If Exponents Are Fixed, Time to Understand Coefficients", "tldr": "\u672c\u6587\u8bba\u8bc1\u795e\u7ecf\u7f51\u7edc\u7f29\u653e\u5f8b\u7684\u5e42\u5f8b\u6307\u6570\u7531\u901a\u7528\u673a\u5236\u51b3\u5b9a\uff08Softmax\u975e\u7ebf\u6027\u3001\u8868\u793a\u53e0\u52a0\u3001Transformer\u5c42\u96c6\u6210\uff09\uff0c\u5177\u6709\u666e\u9002\u6027\uff1b\u800c\u7cfb\u6570\u5219\u5bf9\u6570\u636e\u548c\u67b6\u6784\u654f\u611f\uff0c\u76f4\u63a5\u51b3\u5b9a\u6700\u4f18\u6a21\u578b\u5f62\u72b6\u548c\u8ba1\u7b97\u6548\u7387\uff0c\u56e0\u6b64\u7406\u89e3\u7cfb\u6570\u662f\u8fd1\u671f\u6027\u80fd\u63d0\u5347\u7684\u5173\u952e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are increasingly deployed as agents that solve tasks by interacting with external tool environments. Although recent tool-use benchmarks increasingly cover complex task settings, they still largely assume clean, stable, and trustworthy tool environments, leaving tool-environment unreliability insufficiently examined. We introduce ToolBench-X, a benchmark for evaluating agents under recoverable reliability hazards. ToolBench-X contains executable multi-step tasks across diverse domains and sequential, parallel, and mixed workflows, each paired with deterministic tools and a canonical final answer for automatic evaluation. Starting from clean tool environments, ToolBench-X injects five structured hazard types: Specification Drift, Invocation Error, Execution Failure, Output Drift, and Cross-source Conflict. Crucially, each injected instance remains solvable through at least one valid recovery path, such as retrying, fallback, verification, or cross-checking. Experiments reveal a substantial reliability gap: agents that perform well with reliable tools often fail under recoverable hazards. Further analysis shows that failures are driven less by tool-use volume or inference budget than by limited hazard diagnosis and ineffective recovery. Targeted recovery hints recover many failed tasks, while test-time scaling yields more limited gains. These results suggest that tool-use evaluation should move beyond function-call accuracy toward task completion under unreliable tool environments. The code and data is available at https://github.com/Foreverskyou/ToolBench-X.", "arxiv_id": "2606.25819", "arxiv_url": "https://arxiv.org/abs/2606.25819", "authors": ["Yang Tian", "Zhengpeng Shi", "Bo Zhao"], "brief": "\u63d0\u51faToolBench-X\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u5de5\u5177\u73af\u5883\u4e0d\u53ef\u9760\u6761\u4ef6\u4e0b\u7684\u8868\u73b0\uff0c\u6db5\u76d6\u89c4\u8303\u6f02\u79fb\u3001\u8c03\u7528\u9519\u8bef\u3001\u6267\u884c\u5931\u8d25\u7b49\u4e94\u7c7b\u6545\u969c\u6ce8\u5165\u3002\u5b9e\u9a8c\u53d1\u73b0\u73b0\u6709\u667a\u80fd\u4f53\u5728\u53ef\u6062\u590d\u6545\u969c\u4e0b\u8868\u73b0\u5927\u5e45\u4e0b\u964d\uff0c\u6839\u672c\u539f\u56e0\u5728\u4e8e\u6545\u969c\u8bca\u65ad\u80fd\u529b\u4e0d\u8db3\u800c\u975e\u63a8\u7406\u9884\u7b97\u9650\u5236\uff0c\u547c\u5401\u5de5\u5177\u4f7f\u7528\u8bc4\u4f30\u8d85\u8d8a\u51fd\u6570\u8c03\u7528\u51c6\u786e\u7387\u3002", "categories": ["cs.CL", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25819", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u57fa\u51c6\u8bc4\u6d4b", "\u53ef\u9760\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25819v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Function Calling: Benchmarking Tool-Using Agents under Tool-Environment Unreliability", "tldr": "\u63d0\u51faToolBench-X\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u5de5\u5177\u73af\u5883\u4e0d\u53ef\u9760\u6761\u4ef6\u4e0b\u7684\u8868\u73b0\uff0c\u6db5\u76d6\u89c4\u8303\u6f02\u79fb\u3001\u8c03\u7528\u9519\u8bef\u3001\u6267\u884c\u5931\u8d25\u7b49\u4e94\u7c7b\u6545\u969c\u6ce8\u5165\u3002\u5b9e\u9a8c\u53d1\u73b0\u73b0\u6709\u667a\u80fd\u4f53\u5728\u53ef\u6062\u590d\u6545\u969c\u4e0b\u8868\u73b0\u5927\u5e45\u4e0b\u964d\uff0c\u6839\u672c\u539f\u56e0\u5728\u4e8e\u6545\u969c\u8bca\u65ad\u80fd\u529b\u4e0d\u8db3\u800c\u975e\u63a8\u7406\u9884\u7b97\u9650\u5236\uff0c\u547c\u5401\u5de5\u5177\u4f7f\u7528\u8bc4\u4f30\u8d85\u8d8a\u51fd\u6570\u8c03\u7528\u51c6\u786e\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement Learning (RL) has enabled LLMs to excel in objective reasoning tasks such as mathematics and code generation. However, applying RL to open-ended tasks, such as creative writing, remains challenging because LLM-as-a-judge reward models often exhibit stylistic biases and positional inconsistencies, leading to unstable supervision. To address this, we propose OPERA (Objective Perplexity-based Reflective Alignment), which replaces unreliable external judges with intrinsic rewards derived from perplexity dynamics. Specifically, we derive an intrinsic reward signal from perplexity dynamics, quantifying uncertainty reduction at critical reflective states. During the cold-start phase, we introduce a data synthesis method that leverages carefully designed guiding words to generate diverse reasoning traces, along with perplexity-prioritized rollouts that utilize internal log-probabilities to identify logically consistent reasoning branches. This pipeline yields a large-scale dataset comprising 20,000 high-quality reasoning trajectories. Empirical evaluations consistently demonstrate the scalability and efficacy of our approach in alignment for open-ended tasks. Implementing OPERA on Qwen3-8B establishes a new state-of-the-art among open-source models, achieving parity with or surpassing proprietary models like Gemini2.5 and MiniMax-M2.5 in some open-ended tasks. The code is available at https://github.com/pangpang-xuan/OPERA.", "arxiv_id": "2606.25757", "arxiv_url": "https://arxiv.org/abs/2606.25757", "authors": ["Wenxuan Jiang", "Zining Fan", "Zijian Zhang", "Xuecheng Wu", "Hongming Tan", "Haoyang Dai", "Xiaoyu Li", "Xuezhi Cao", "Ninghao Liu"], "brief": "\u9488\u5bf9\u5f00\u653e\u5f0f\u4efb\u52a1\uff08\u5982\u521b\u610f\u5199\u4f5c\uff09\u4e2dRL\u5bf9\u9f50\u56f0\u96be\u7684\u95ee\u9898\uff0c\u63d0\u51faOPERA\u65b9\u6cd5\uff0c\u7528\u57fa\u4e8e\u56f0\u60d1\u5ea6\u52a8\u6001\u7684\u5185\u5728\u5956\u52b1\u66ff\u4ee3\u4e0d\u7a33\u5b9a\u7684LLM-as-a-judge\u5916\u90e8\u5956\u52b1\u3002\u5728Qwen3-8B\u4e0a\u5b9e\u73b0\u5f00\u6e90\u6a21\u578b\u6700\u4f18\uff0c\u90e8\u5206\u4efb\u52a1\u5ab2\u7f8eGemini2.5\u7b49\u95ed\u6e90\u6a21\u578b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25757", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b\u5bf9\u9f50", "\u5f00\u653e\u5f0f\u63a8\u7406", "\u56f0\u60d1\u5ea6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25757v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "OPERA: Aligning Open-Ended Reasoning via Objective Perplexity-based Reinforcement Learning", "tldr": "\u9488\u5bf9\u5f00\u653e\u5f0f\u4efb\u52a1\uff08\u5982\u521b\u610f\u5199\u4f5c\uff09\u4e2dRL\u5bf9\u9f50\u56f0\u96be\u7684\u95ee\u9898\uff0c\u63d0\u51faOPERA\u65b9\u6cd5\uff0c\u7528\u57fa\u4e8e\u56f0\u60d1\u5ea6\u52a8\u6001\u7684\u5185\u5728\u5956\u52b1\u66ff\u4ee3\u4e0d\u7a33\u5b9a\u7684LLM-as-a-judge\u5916\u90e8\u5956\u52b1\u3002\u5728Qwen3-8B\u4e0a\u5b9e\u73b0\u5f00\u6e90\u6a21\u578b\u6700\u4f18\uff0c\u90e8\u5206\u4efb\u52a1\u5ab2\u7f8eGemini2.5\u7b49\u95ed\u6e90\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLM-based text embedders have substantially improved retrieval and semantic representation quality, but their deployment remains costly: large backbone models slow down embedding inference, while high-dimensional full-precision embeddings impose substantial storage and bandwidth overhead on large-scale indexes. In this paper, we present BITEMBED, an extreme low-bit framework for LLM-based text embedding that jointly targets encoding efficiency and vector storage. BITEMBED converts pretrained LLM backbones into BitNet-style embedding encoders with ternary weights, quantized activations, and lightweight normalization refinement. The converted model is adapted to representation learning through continual contrastive pre-training, followed by supervised contrastive fine-tuning with both similarity-distribution distillation and attention-relation distillation from a full-precision teacher. Beyond quantizing the backbone, BITEMBED further trains output embeddings to support multiple storage precisions meeting different storage needs in various scenarios. Experiments on MMTEB (eng, v2) with Qwen3-0.6B and Gemma3-270M show that BITEMBED is largely comparable to full precision teacher embedders. Moreover, BITEMBED flexibly obtains text embeddings of various precisions, achieving a trade-off between performance and storage cost.", "arxiv_id": "2606.25674", "arxiv_url": "https://arxiv.org/abs/2606.25674", "authors": ["Zhen Li", "Xin Huang", "Liang Wang", "Nan Yang", "Ting Song", "Yan Xia", "Xun Wu", "Shaohan Huang", "Huishuai Zhang", "Furu Wei", "Dongyan Zhao"], "brief": "\u63d0\u51faBITEMBED\u6846\u67b6\uff0c\u5c06\u57fa\u4e8eLLM\u7684\u6587\u672c\u5d4c\u5165\u6a21\u578b\u8f6c\u6362\u4e3aBitNet\u98ce\u683c\u7684\u4e09\u503c\u6743\u91cd\u7f16\u7801\u5668\uff0c\u901a\u8fc7\u6301\u7eed\u5bf9\u6bd4\u9884\u8bad\u7ec3\u548c\u77e5\u8bc6\u84b8\u998f\u5fae\u8c03\uff0c\u5728\u5927\u5e45\u964d\u4f4e\u5b58\u50a8\u4e0e\u63a8\u7406\u5f00\u9500\u7684\u540c\u65f6\uff0c\u6027\u80fd\u63a5\u8fd1\u5168\u7cbe\u5ea6\u6559\u5e08\u6a21\u578b\u3002\u5b9e\u9a8c\u5728MMTEB\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u4e86\u8be5\u65b9\u6cd5\u5728\u591a\u79cd\u7cbe\u5ea6\u914d\u7f6e\u4e0b\u7684\u6709\u6548\u6027\u3002", "categories": ["cs.CL", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25674", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u5d4c\u5165", "\u6a21\u578b\u91cf\u5316", "\u77e5\u8bc6\u84b8\u998f", "\u4fe1\u606f\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25674v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "BitNet Text Embeddings", "tldr": "\u63d0\u51faBITEMBED\u6846\u67b6\uff0c\u5c06\u57fa\u4e8eLLM\u7684\u6587\u672c\u5d4c\u5165\u6a21\u578b\u8f6c\u6362\u4e3aBitNet\u98ce\u683c\u7684\u4e09\u503c\u6743\u91cd\u7f16\u7801\u5668\uff0c\u901a\u8fc7\u6301\u7eed\u5bf9\u6bd4\u9884\u8bad\u7ec3\u548c\u77e5\u8bc6\u84b8\u998f\u5fae\u8c03\uff0c\u5728\u5927\u5e45\u964d\u4f4e\u5b58\u50a8\u4e0e\u63a8\u7406\u5f00\u9500\u7684\u540c\u65f6\uff0c\u6027\u80fd\u63a5\u8fd1\u5168\u7cbe\u5ea6\u6559\u5e08\u6a21\u578b\u3002\u5b9e\u9a8c\u5728MMTEB\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u4e86\u8be5\u65b9\u6cd5\u5728\u591a\u79cd\u7cbe\u5ea6\u914d\u7f6e\u4e0b\u7684\u6709\u6548\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent studies on world modeling for Large Language Model (LLM) agents typically formulate the learning objective as next-observation prediction. However, this objective ties supervision to what a transition happens to reveal, which may omit the dynamics most relevant to the agent\u0027s current decision. To bridge this gap, we propose Agent-Authored World Modeling (AAWM), a training procedure that
