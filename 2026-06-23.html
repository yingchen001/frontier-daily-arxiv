 constructs supervision from the policy\u0027s own decision needs. Specifically, at each state, the agent identifies what it needs to understand about the environment before acting. These needs drive the retrieval of relevant transition evidence across trajectories, which is then synthesized into training targets that capture decision-oriented dynamics instead of reconstructing the next observation. This aligns the training objective with the dynamics the policy needs before acting, not with the contents of the next observation. Experimental results validate the effectiveness of AAWM across multiple environments and training settings. These results show that decision-aware world-model targets provide a more effective learning signal than next-observation prediction.", "arxiv_id": "2606.25421", "arxiv_url": "https://arxiv.org/abs/2606.25421", "authors": ["Guangfeng Cai", "Kaibing Yang", "Shuo He", "Yu Li", "Shengtian Yang", "Jiaqi Lv", "Lei Feng"], "brief": "\u63d0\u51fa\u667a\u80fd\u4f53\u81ea\u4e3b\u6784\u5efa\u4e16\u754c\u6a21\u578b\u7684\u8bad\u7ec3\u65b9\u6cd5AAWM\uff0c\u5c06\u76d1\u7763\u4fe1\u53f7\u4ece\"\u9884\u6d4b\u4e0b\u4e00\u89c2\u6d4b\"\u8f6c\u53d8\u4e3a\"\u51b3\u7b56\u5bfc\u5411\u7684\u52a8\u6001\u5efa\u6a21\"\u3002\u667a\u80fd\u4f53\u5728\u6bcf\u4e2a\u72b6\u6001\u8bc6\u522b\u81ea\u8eab\u51b3\u7b56\u9700\u6c42\uff0c\u68c0\u7d22\u76f8\u5173\u8f68\u8ff9\u8bc1\u636e\u5e76\u5408\u6210\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u591a\u4e2a\u73af\u5883\u4e2d\u4f18\u4e8e\u4f20\u7edf\u4e0b\u4e00\u89c2\u6d4b\u9884\u6d4b\u65b9\u5f0f\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25421", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5e8f\u5217\u51b3\u7b56"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25421v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Next-Observation Prediction: Agent-Authored World Modeling for Sequential Decision Making", "tldr": "\u63d0\u51fa\u667a\u80fd\u4f53\u81ea\u4e3b\u6784\u5efa\u4e16\u754c\u6a21\u578b\u7684\u8bad\u7ec3\u65b9\u6cd5AAWM\uff0c\u5c06\u76d1\u7763\u4fe1\u53f7\u4ece\"\u9884\u6d4b\u4e0b\u4e00\u89c2\u6d4b\"\u8f6c\u53d8\u4e3a\"\u51b3\u7b56\u5bfc\u5411\u7684\u52a8\u6001\u5efa\u6a21\"\u3002\u667a\u80fd\u4f53\u5728\u6bcf\u4e2a\u72b6\u6001\u8bc6\u522b\u81ea\u8eab\u51b3\u7b56\u9700\u6c42\uff0c\u68c0\u7d22\u76f8\u5173\u8f68\u8ff9\u8bc1\u636e\u5e76\u5408\u6210\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u591a\u4e2a\u73af\u5883\u4e2d\u4f18\u4e8e\u4f20\u7edf\u4e0b\u4e00\u89c2\u6d4b\u9884\u6d4b\u65b9\u5f0f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Test-time scaling improves language-model reasoning, but existing approaches often face a difficult trade-off: long chain-of-thought sampling remains single-threaded, while sentence- or solution-level search can be computationally expensive and hard to train end-to-end. We introduce Local Branch Routing (LBR), a token-level test-time scaling framework that expands a small local lookahead tree, forwards all sampled branches through the language model, and uses a lightweight router to select the depth-1 subtree to commit. By routing over the hidden states of candidate local futures, LBR allows each token decision to use evidence beyond the root next-token distribution while avoiding full solution-level search. The resulting prune-shift-grow decoding process preserves discrete branch identities and defines a tractable tree-trajectory likelihood: newly grown nodes are counted when first sampled, and router decisions are assigned explicit probabilities. This enables end-to-end reinforcement learning with verifiable rewards, jointly optimizing the base model and router under the same likelihood-ratio principle as discrete-token RLVR. On synthetic hierarchical-planning tasks, LBR shows that post-candidate hidden states provide useful routing evidence. On mathematical reasoning benchmarks, LBR improves both Pass@1 and Pass@32 over discrete chain-of-thought, vanilla discrete-token RLVR, and RL-compatible soft-token branching baselines. These results suggest that lightweight local branching offers an efficient, trainable, and discrete form of language-model test-time scaling.", "arxiv_id": "2606.25354", "arxiv_url": "https://arxiv.org/abs/2606.25354", "authors": ["Yutong Yin", "Mingyu Jin", "Jin Pan", "Changyi Yang", "Zijie Xia", "Dhruv Pai", "Shuming Hu", "Zhen Zhang", "Chenyang Zhao", "Jinman Zhao", "Wujiang Xu", "Raymond Li", "Xin Eric Wang", "Julian McAuley", "Zhaoran Wang"], "brief": "\u63d0\u51fa\u5c40\u90e8\u5206\u652f\u8def\u7531\uff08LBR\uff09\u6846\u67b6\uff0c\u5728\u63a8\u7406\u65f6\u6784\u5efa\u5c0f\u578b\u5c40\u90e8\u524d\u77bb\u6811\uff0c\u901a\u8fc7\u8f7b\u91cf\u8def\u7531\u5668\u57fa\u4e8e\u5019\u9009\u5206\u652f\u7684\u9690\u85cf\u72b6\u6001\u9009\u62e9\u6700\u4f18\u5b50\u6811\uff0c\u907f\u514d\u4e86\u5168\u89e3\u641c\u7d22\u7684\u9ad8\u4ee3\u4ef7\u3002\u8be5\u65b9\u6cd5\u652f\u6301\u7aef\u5230\u7aef\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u5728\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\u540c\u65f6\u63d0\u5347Pass@1\u548cPass@32\uff0c\u4f18\u4e8e\u6807\u51c6\u601d\u7ef4\u94fe\u548c\u79bb\u6563token RLVR\u57fa\u7ebf\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25354", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6d4b\u8bd5\u65f6\u6269\u5c55", "\u5f3a\u5316\u5b66\u4e60", "\u63a8\u7406", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25354v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Efficient and Trainable Language Model Test-Time Scaling via Local Branch Routing", "tldr": "\u63d0\u51fa\u5c40\u90e8\u5206\u652f\u8def\u7531\uff08LBR\uff09\u6846\u67b6\uff0c\u5728\u63a8\u7406\u65f6\u6784\u5efa\u5c0f\u578b\u5c40\u90e8\u524d\u77bb\u6811\uff0c\u901a\u8fc7\u8f7b\u91cf\u8def\u7531\u5668\u57fa\u4e8e\u5019\u9009\u5206\u652f\u7684\u9690\u85cf\u72b6\u6001\u9009\u62e9\u6700\u4f18\u5b50\u6811\uff0c\u907f\u514d\u4e86\u5168\u89e3\u641c\u7d22\u7684\u9ad8\u4ee3\u4ef7\u3002\u8be5\u65b9\u6cd5\u652f\u6301\u7aef\u5230\u7aef\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u5728\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\u540c\u65f6\u63d0\u5347Pass@1\u548cPass@32\uff0c\u4f18\u4e8e\u6807\u51c6\u601d\u7ef4\u94fe\u548c\u79bb\u6563token RLVR\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Memory for large language model (LLM) agents has rapidly evolved from simple retrieval-augmented mechanisms into a data management system that supports persistent information storage, retrieval, update, consolidation, and dynamic lifecycle governance throughout agent execution. Despite this evolution, existing evaluations still benchmark agent memory mainly through end-to-end task success metrics (e.g., F1, BLEU), while treating the underlying system as a monolithic black box. As a result, critical system-level concerns, including operational costs, architectural trade-offs across memory modules, and robustness under dynamic knowledge updates, remain insufficiently explored. In this paper, we present a systematic experimental study of agent memory from a data management perspective. We propose an analytical framework that decomposes agent memory into four core modules: memory representation and storage, extraction, retrieval and routing, and maintenance. Under this framework, we evaluate 12 representative memory systems and two reference baselines across five benchmark workloads spanning 11 datasets. Our extensive end-to-end evaluation shows that no single architecture dominates across all scenarios; instead, effectiveness depends heavily on how well the memory structure aligns with the workload bottleneck. Furthermore, through fine-grained ablation studies, we quantify their individual effects on representation fidelity, retrieval precision, update correctness, and long-horizon stability. Finally, we reveal cost-performance trade-offs under realistic workloads, showing localized maintenance is more cost-efficient than global reorganization. Based on these findings, we identify promising directions towards building truly agent-native memory systems. The code is publicly available at https://github.com/OpenDataBox/MemoryData.", "arxiv_id": "2606.24775", "arxiv_url": "https://arxiv.org/abs/2606.24775", "authors": ["Wei Zhou", "Xuanhe Zhou", "Shaokun Han", "Hongming Xu", "Guoliang Li", "Zhiyu Li", "Feiyu Xiong", "Fan Wu"], "brief": "\u672c\u6587\u4ece\u6570\u636e\u7ba1\u7406\u89c6\u89d2\u5bf9LLM\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\u8fdb\u884c\u7cfb\u7edf\u6027\u5b9e\u9a8c\u7814\u7a76\uff0c\u63d0\u51fa\u5c06\u667a\u80fd\u4f53\u8bb0\u5fc6\u5206\u89e3\u4e3a\u8868\u793a\u5b58\u50a8\u3001\u63d0\u53d6\u3001\u68c0\u7d22\u8def\u7531\u548c\u7ef4\u62a4\u56db\u4e2a\u6838\u5fc3\u6a21\u5757\u7684\u5206\u6790\u6846\u67b6\uff0c\u5bf912\u4e2a\u4ee3\u8868\u6027\u8bb0\u5fc6\u7cfb\u7edf\u572811\u4e2a\u6570\u636e\u96c6\u4e0a\u8fdb\u884c\u8bc4\u6d4b\uff0c\u53d1\u73b0\u6ca1\u6709\u5355\u4e00\u67b6\u6784\u80fd\u5728\u6240\u6709\u573a\u666f\u4e2d\u5360\u4f18\uff0c\u5e76\u63ed\u793a\u4e86\u5c40\u90e8\u7ef4\u62a4\u6bd4\u5168\u5c40\u91cd\u7ec4\u66f4\u5177\u6210\u672c\u6548\u76ca\u7b49\u5173\u952e\u89c4\u5f8b\u3002", "categories": ["cs.CL", "cs.DB", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24775", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u7cfb\u7edf", "\u5927\u8bed\u8a00\u6a21\u578b", "\u68c0\u7d22\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24775v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Are We Ready For An Agent-Native Memory System?", "tldr": "\u672c\u6587\u4ece\u6570\u636e\u7ba1\u7406\u89c6\u89d2\u5bf9LLM\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\u8fdb\u884c\u7cfb\u7edf\u6027\u5b9e\u9a8c\u7814\u7a76\uff0c\u63d0\u51fa\u5c06\u667a\u80fd\u4f53\u8bb0\u5fc6\u5206\u89e3\u4e3a\u8868\u793a\u5b58\u50a8\u3001\u63d0\u53d6\u3001\u68c0\u7d22\u8def\u7531\u548c\u7ef4\u62a4\u56db\u4e2a\u6838\u5fc3\u6a21\u5757\u7684\u5206\u6790\u6846\u67b6\uff0c\u5bf912\u4e2a\u4ee3\u8868\u6027\u8bb0\u5fc6\u7cfb\u7edf\u572811\u4e2a\u6570\u636e\u96c6\u4e0a\u8fdb\u884c\u8bc4\u6d4b\uff0c\u53d1\u73b0\u6ca1\u6709\u5355\u4e00\u67b6\u6784\u80fd\u5728\u6240\u6709\u573a\u666f\u4e2d\u5360\u4f18\uff0c\u5e76\u63ed\u793a\u4e86\u5c40\u90e8\u7ef4\u62a4\u6bd4\u5168\u5c40\u91cd\u7ec4\u66f4\u5177\u6210\u672c\u6548\u76ca\u7b49\u5173\u952e\u89c4\u5f8b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Non-autoregressive generation offers a powerful paradigm for iterative refinement, allowing models to recursively critique, erase and regenerate arbitrary subsets of tokens. However, existing non-autoregressive models fail to realize this potential. Masked Diffusion Models (MDMs) suffer from factorization error, causing sample quality to collapse when generating multiple tokens simultaneously. Flow Map Language Models (FMLMs) circumvent this bottleneck via joint sequence transport for excellent few-step generation, but sacrifice the inference-time flexibility of MDMs. We introduce FMLM+, a framework that bridges this gap by equipping FMLM with masking-style noise schedules. While generating the full sequence in a single step, FMLM+ simultaneously scores the global consistency of each token a posteriori. We leverage this to introduce Posterior Refinement, a novel inference-time refinement strategy that enables the model to adaptively self-correct its outputs, matching the performance of discrete baselines with 32x fewer NFEs. Across diverse benchmarks, we demonstrate that FMLM+ with Posterior Refinement improves the speed--quality tradeoff over both MDM and FMLM families, providing a scalable foundation for high-fidelity language modeling.", "arxiv_id": "2606.24773", "arxiv_url": "https://arxiv.org/abs/2606.24773", "authors": ["Manan Agarwal", "Sheel Shah", "Chanhyuk Lee", "Jaehoon Yoo", "Jerry Huang", "Seunghoon Hong", "Aditi Raghunathan", "Jinwoo Kim", "Nicholas M. Boffi"], "brief": "\u63d0\u51faFMLM+\u6846\u67b6\uff0c\u7ed3\u5408\u63a9\u7801\u6269\u6563\u6a21\u578b\u7684\u7075\u6d3b\u6027\u4e0e\u6d41\u6620\u5c04\u8bed\u8a00\u6a21\u578b\u7684\u9ad8\u8d28\u91cf\u751f\u6210\u80fd\u529b\uff0c\u901a\u8fc7\u540e\u9a8c\u7cbe\u5316\u7b56\u7565\u8ba9\u6a21\u578b\u81ea\u9002\u5e94\u5730\u81ea\u6211\u7ea0\u9519\uff0c\u5728\u51cf\u5c1132\u500d\u51fd\u6570\u8bc4\u4f30\u6b21\u6570\u7684\u540c\u65f6\u8fbe\u5230\u79bb\u6563\u57fa\u7ebf\u7684\u6027\u80fd\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24773", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u975e\u81ea\u56de\u5f52\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u52a0\u901f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24773v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Posterior Refinement: Fast Language Generation via Any-Order Flow Maps", "tldr": "\u63d0\u51faFMLM+\u6846\u67b6\uff0c\u7ed3\u5408\u63a9\u7801\u6269\u6563\u6a21\u578b\u7684\u7075\u6d3b\u6027\u4e0e\u6d41\u6620\u5c04\u8bed\u8a00\u6a21\u578b\u7684\u9ad8\u8d28\u91cf\u751f\u6210\u80fd\u529b\uff0c\u901a\u8fc7\u540e\u9a8c\u7cbe\u5316\u7b56\u7565\u8ba9\u6a21\u578b\u81ea\u9002\u5e94\u5730\u81ea\u6211\u7ea0\u9519\uff0c\u5728\u51cf\u5c1132\u500d\u51fd\u6570\u8bc4\u4f30\u6b21\u6570\u7684\u540c\u65f6\u8fbe\u5230\u79bb\u6563\u57fa\u7ebf\u7684\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Dense retrieval embedding models are a fundamental component of modern retrieval-based AI systems. Most dense retrievers are trained with contrastive objectives, which require labeled positive and negative document pairs that are often costly and difficult to obtain. In this work, we investigate whether the autoregressive next-token prediction objective of a large language model (LLM) can provide supervision for dense retrieval. The intuition is simple: if a document contains information relevant to a query, conditioning on that document should make the target output easier for the LLM to predict. A key challenge is that the next-token prediction loss is computed inside the LLM, while the retriever is a separate embedding model. To address this challenge, we propose DREAM (Dense Retrieval Embeddings via Autoregressive Modeling), which injects retriever-generated query-document similarity scores into selected attention heads of a frozen LLM. During training, these scores determine how much attention each candidate document receives while the LLM predicts the target output. The resulting prediction loss provides gradients for retriever training through the attention mechanism. We evaluate DREAM on retrieval benchmarks BEIR and RTEB using embedding backbones ranging from 0.5B to 3B parameters. DREAM consistently outperforms existing baselines across different model scales. These results demonstrate that DREAM provides a promising approach for training dense retrievers through autoregressive modeling.", "arxiv_id": "2606.24667", "arxiv_url": "https://arxiv.org/abs/2606.24667", "authors": ["Yixuan Tang", "Yi Yang"], "brief": "\u63d0\u51faDREAM\u65b9\u6cd5\uff0c\u5c06\u81ea\u56de\u5f52\u8bed\u8a00\u6a21\u578b\u7684\u4e0b\u4e00\u8bcd\u9884\u6d4b\u76ee\u6807\u7528\u4e8e\u8bad\u7ec3\u7a20\u5bc6\u68c0\u7d22\u5d4c\u5165\u6a21\u578b\uff0c\u901a\u8fc7\u5c06\u68c0\u7d22\u5668\u751f\u6210\u7684\u67e5\u8be2-\u6587\u6863\u76f8\u4f3c\u5ea6\u5206\u6570\u6ce8\u5165\u51bb\u7ed3LLM\u7684\u6ce8\u610f\u529b\u5934\uff0c\u5229\u7528\u9884\u6d4b\u635f\u5931\u53cd\u5411\u4f20\u64ad\u8bad\u7ec3\u68c0\u7d22\u5668\u3002\u5728BEIR\u548cRTEB\u57fa\u51c6\u4e0a\uff0cDREAM\u57280.5B\u52303B\u53c2\u6570\u89c4\u6a21\u4e0b\u6301\u7eed\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u65b9\u6cd5\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24667", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7a20\u5bc6\u68c0\u7d22", "\u81ea\u56de\u5f52\u5efa\u6a21", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5d4c\u5165\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24667v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DREAM: Dense Retrieval Embeddings via Autoregressive Modeling", "tldr": "\u63d0\u51faDREAM\u65b9\u6cd5\uff0c\u5c06\u81ea\u56de\u5f52\u8bed\u8a00\u6a21\u578b\u7684\u4e0b\u4e00\u8bcd\u9884\u6d4b\u76ee\u6807\u7528\u4e8e\u8bad\u7ec3\u7a20\u5bc6\u68c0\u7d22\u5d4c\u5165\u6a21\u578b\uff0c\u901a\u8fc7\u5c06\u68c0\u7d22\u5668\u751f\u6210\u7684\u67e5\u8be2-\u6587\u6863\u76f8\u4f3c\u5ea6\u5206\u6570\u6ce8\u5165\u51bb\u7ed3LLM\u7684\u6ce8\u610f\u529b\u5934\uff0c\u5229\u7528\u9884\u6d4b\u635f\u5931\u53cd\u5411\u4f20\u64ad\u8bad\u7ec3\u68c0\u7d22\u5668\u3002\u5728BEIR\u548cRTEB\u57fa\u51c6\u4e0a\uff0cDREAM\u57280.5B\u52303B\u53c2\u6570\u89c4\u6a21\u4e0b\u6301\u7eed\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern Vision-Language-Action (VLA) models often fail to generalize to novel setups, such as altered camera viewpoints or robot morphologies, because they are typically conditioned only on current observations and language instructions. By ignoring the underlying system configuration as a variable, these models implicitly assume a fixed execution context encountered during training, necessitating data-intensive fine-tuning for any new environment. In this work, we introduce In-Context World Modeling (ICWM), a framework that treats system identification as an in-context adaptation problem. ICWM enables robot policies to autonomously infer essential system variables from a short history of self-generated, task-agnostic interactions. Unlike traditional In-Context Learning that uses demonstrations to specify what task to perform, ICWM leverages the context window to understand how the system operates. By processing these interactions before task execution, the model implicitly captures the world dynamics of the current system, enabling adaptation to novel configurations without parameter updates. Extensive experiments in simulation and on real-world robot platforms demonstrate that ICWM significantly outperforms standard VLA baselines on novel camera viewpoints.", "arxiv_id": "2606.26025", "arxiv_url": "https://arxiv.org/abs/2606.26025", "authors": ["Siyin Wang", "Junhao Shi", "Senyu Fei", "Zhaoyang Fu", "Li Ji", "Jingjing Gong", "Xipeng Qiu"], "brief": "\u63d0\u51faIn-Context World Modeling\uff08ICWM\uff09\u6846\u67b6\uff0c\u8ba9\u673a\u5668\u4eba\u7b56\u7565\u901a\u8fc7\u5c11\u91cf\u81ea\u751f\u6210\u7684\u4efb\u52a1\u65e0\u5173\u4ea4\u4e92\u5386\u53f2\u6765\u63a8\u65ad\u5f53\u524d\u7cfb\u7edf\u914d\u7f6e\uff08\u5982\u6444\u50cf\u5934\u89c6\u89d2\u3001\u673a\u5668\u4eba\u5f62\u6001\uff09\uff0c\u4ece\u800c\u65e0\u9700\u5fae\u8c03\u5373\u53ef\u9002\u5e94\u65b0\u73af\u5883\u3002\u5b9e\u9a8c\u8868\u660eICWM\u5728\u65b0\u9896\u6444\u50cf\u5934\u89c6\u89d2\u4e0b\u663e\u8457\u4f18\u4e8e\u6807\u51c6VLA\u57fa\u7ebf\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26025", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u673a\u5668\u4eba\u63a7\u5236", "\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u7cfb\u7edf\u6cdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26025v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "In-Context World Modeling for Robotic Control", "tldr": "\u63d0\u51faIn-Context World Modeling\uff08ICWM\uff09\u6846\u67b6\uff0c\u8ba9\u673a\u5668\u4eba\u7b56\u7565\u901a\u8fc7\u5c11\u91cf\u81ea\u751f\u6210\u7684\u4efb\u52a1\u65e0\u5173\u4ea4\u4e92\u5386\u53f2\u6765\u63a8\u65ad\u5f53\u524d\u7cfb\u7edf\u914d\u7f6e\uff08\u5982\u6444\u50cf\u5934\u89c6\u89d2\u3001\u673a\u5668\u4eba\u5f62\u6001\uff09\uff0c\u4ece\u800c\u65e0\u9700\u5fae\u8c03\u5373\u53ef\u9002\u5e94\u65b0\u73af\u5883\u3002\u5b9e\u9a8c\u8868\u660eICWM\u5728\u65b0\u9896\u6444\u50cf\u5934\u89c6\u89d2\u4e0b\u663e\u8457\u4f18\u4e8e\u6807\u51c6VLA\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reconstructing 3D scenes from a single image is a fundamental challenge in computer vision, with broad applications in virtual reality, robotics, and content creation. Recent methods achieve outstanding performance by leveraging camera-controlled video diffusion models, but rely on iterative diffusion sampling, which greatly limits their practical deployment. We observe that geometric forward warping alone can cover the majority of a target view directly from the input image, with only a compact residual left for the encoder to correct. Motivated by this observation, we propose PRISM, a feed-forward framework that decomposes multi-view latent prediction into a parameter-free geometric prior and a learned residual correction, with no diffusion sampling required at inference. To enable generalization from purely synthetic training data, we devise a two-stage training strategy combining latents supervised distillation for geometric generalization and perceptual fine-tuning for appearance quality optimization. Extensive experiments on three benchmarks demonstrate that PRISM achieves competitive reconstruction quality compared with diffusion-based methods, while reducing inference time dramatically to only 36 seconds per scene.", "arxiv_id": "2606.25430", "arxiv_url": "https://arxiv.org/abs/2606.25430", "authors": ["Zhijie Zheng", "Xinhao Xiang", "Jiawei Zhang"], "brief": "PRISM\u63d0\u51fa\u4e00\u79cd\u524d\u9988\u5f0f\u5355\u56fe3D\u91cd\u5efa\u6846\u67b6\uff0c\u5c06\u591a\u89c6\u89d2\u9884\u6d4b\u5206\u89e3\u4e3a\u65e0\u53c2\u6570\u51e0\u4f55\u5148\u9a8c\uff08\u51e0\u4f55\u524d\u5411\u53d8\u5f62\uff09\u548c\u53ef\u5b66\u4e60\u6b8b\u5dee\u4fee\u6b63\uff0c\u65e0\u9700\u6269\u6563\u91c7\u6837\u3002\u901a\u8fc7\u4e24\u9636\u6bb5\u8bad\u7ec3\u7b56\u7565\uff08\u6f5c\u53d8\u91cf\u84b8\u998f+\u611f\u77e5\u5fae\u8c03\uff09\uff0c\u5728\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230\u4e0e\u6269\u6563\u65b9\u6cd5\u76f8\u5f53\u7684\u91cd\u5efa\u8d28\u91cf\uff0c\u63a8\u7406\u65f6\u95f4\u4ec5\u970036\u79d2\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25430", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u91cd\u5efa", "\u6269\u6563\u6a21\u578b", "\u591a\u89c6\u89d2\u5408\u6210", "\u524d\u9988\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25430v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PRISM: Feed-Forward Single-Image 3D Reconstruction via Geometric Warp-Residual Modeling", "tldr": "PRISM\u63d0\u51fa\u4e00\u79cd\u524d\u9988\u5f0f\u5355\u56fe3D\u91cd\u5efa\u6846\u67b6\uff0c\u5c06\u591a\u89c6\u89d2\u9884\u6d4b\u5206\u89e3\u4e3a\u65e0\u53c2\u6570\u51e0\u4f55\u5148\u9a8c\uff08\u51e0\u4f55\u524d\u5411\u53d8\u5f62\uff09\u548c\u53ef\u5b66\u4e60\u6b8b\u5dee\u4fee\u6b63\uff0c\u65e0\u9700\u6269\u6563\u91c7\u6837\u3002\u901a\u8fc7\u4e24\u9636\u6bb5\u8bad\u7ec3\u7b56\u7565\uff08\u6f5c\u53d8\u91cf\u84b8\u998f+\u611f\u77e5\u5fae\u8c03\uff09\uff0c\u5728\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230\u4e0e\u6269\u6563\u65b9\u6cd5\u76f8\u5f53\u7684\u91cd\u5efa\u8d28\u91cf\uff0c\u63a8\u7406\u65f6\u95f4\u4ec5\u970036\u79d2\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Chest X-ray visual question answering (CXR VQA) requires models not only to predict correct answers, but also to produce reliable medical reasoning. However, existing reinforcement-learning-based training typically relies on answer-level rewards, which are often too coarse to improve chain-of-thought (CoT) quality and can become ineffective when group-level advantages collapse to zero. We propose \\textbf{Teach-to-Reason (T2R)}, a framework that introduces comparison-based supervision into CoT optimization through a self-improving \\emph{Teacher} and a competition-guided \\emph{Reasoner}. As the Teacher is iteratively strengthened via self-competition, the Reasoner is optimized against progressively stronger Teacher-generated references. We further introduce a case-wise reward design that preserves the original reward-induced positive/negative partition when it is informative, and restores supervision from competition scores when the original reward signal degenerates. Experiments on multiple CXR open-ended VQA benchmarks show that T2R consistently outperforms strong baselines, indicating that comparison-based supervision, when integrated in a controlled and principled manner, provides a more effective training signal for reasoning optimization.", "arxiv_id": "2606.25407", "arxiv_url": "https://arxiv.org/abs/2606.25407", "authors": ["Xiao Han", "Hao Liu", "Zhimin Bao", "Jile Jiao", "Yue Wang", "Hui Guo", "Xiaofeng Mou", "Yi Xu"], "brief": "\u9488\u5bf9\u80f8\u90e8X\u5149\u89c6\u89c9\u95ee\u7b54\u4efb\u52a1\uff0c\u63d0\u51faTeach-to-Reason\uff08T2R\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u6211\u6539\u8fdb\u7684Teacher\u4e0e\u7ade\u4e89\u5f15\u5bfc\u7684Reasoner\u76f8\u4e92\u535a\u5f08\uff0c\u5c06\u57fa\u4e8e\u6bd4\u8f83\u7684\u76d1\u7763\u4fe1\u53f7\u5f15\u5165\u601d\u7ef4\u94fe\u4f18\u5316\u3002\u8be5\u65b9\u6cd5\u89e3\u51b3\u4e86\u5f3a\u5316\u5b66\u4e60\u4e2d\u7ec4\u7ea7\u4f18\u52bf\u584c\u9677\u5bfc\u81f4\u5956\u52b1\u4fe1\u53f7\u9000\u5316\u7684\u95ee\u9898\uff0c\u5728\u591a\u4e2a\u5f00\u653e\u5f0fCXR VQA\u57fa\u51c6\u4e0a\u6301\u7eed\u8d85\u8d8a\u5f3a\u57fa\u7ebf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25407", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u95ee\u7b54", "\u533b\u5b66\u5f71\u50cf", "\u5f3a\u5316\u5b66\u4e60", "\u601d\u7ef4\u94fe\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25407v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Teach-to-Reason: Competition-Guided Reasoning with a Self-Improving Teacher", "tldr": "\u9488\u5bf9\u80f8\u90e8X\u5149\u89c6\u89c9\u95ee\u7b54\u4efb\u52a1\uff0c\u63d0\u51faTeach-to-Reason\uff08T2R\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u6211\u6539\u8fdb\u7684Teacher\u4e0e\u7ade\u4e89\u5f15\u5bfc\u7684Reasoner\u76f8\u4e92\u535a\u5f08\uff0c\u5c06\u57fa\u4e8e\u6bd4\u8f83\u7684\u76d1\u7763\u4fe1\u53f7\u5f15\u5165\u601d\u7ef4\u94fe\u4f18\u5316\u3002\u8be5\u65b9\u6cd5\u89e3\u51b3\u4e86\u5f3a\u5316\u5b66\u4e60\u4e2d\u7ec4\u7ea7\u4f18\u52bf\u584c\u9677\u5bfc\u81f4\u5956\u52b1\u4fe1\u53f7\u9000\u5316\u7684\u95ee\u9898\uff0c\u5728\u591a\u4e2a\u5f00\u653e\u5f0fCXR VQA\u57fa\u51c6\u4e0a\u6301\u7eed\u8d85\u8d8a\u5f3a\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision Language Models have achieved near-human performance on single-document Visual Question Answering, yet their effectiveness degrades significantly when retrieving information from large collections of visually homogeneous documents. Existing multi-document benchmarks aggregate diverse document types, creating artificial separation in embedding space that does not reflect enterprise document repositories where thousands of records share identical visual templates. We identify this as embedding collapse and introduce Invoice Haystack, a benchmark with 1,500 anonymized invoice images paired with 200 discriminative question-answer pairs, specifically designed to stress-test retrieval under strong visual homogeneity. Invoice Haystack exhibits a mean pairwise cosine similarity of 0.73, compared to 0.38 (DocHaystack) and 0.31 (InfoHaystack) in existing benchmarks, posing a fundamentally more challenging retrieval problem. Addressing the identified challenge, we propose VL-RAG, a hybrid retrieval-augmented generation framework that jointly leverages text and visual embeddings to harness the complementary strengths of both modalities, followed by a VLM-based verification filter for precise document identification. VL-RAG achieves 60.0\\% Recall@1 on Invoice Haystack-500, outperforming existing state-of-the-art method by up to an absolute 13.5 percentage points. It further improves retrieval considerably on DocHaystack-1000 (77.1\\% vs.\\ 75.2\\%) and InfoHaystack-1000 (84.5\\% vs.\\ 80.0\\%), establishing the proposed dual-stream fusion as a consistently superior retrieval strategy across both homogeneous and heterogeneous document collections.", "arxiv_id": "2606.25343", "arxiv_url": "https://arxiv.org/abs/2606.25343", "authors": ["Heethanjan Kanagalingam", "Thenukan Pathmanathan", "Mokeeshan Vathanakumar", "Basim Azam", "Sarah Monazam Erfani"], "brief": "\u9488\u5bf9\u89c6\u89c9\u9ad8\u5ea6\u540c\u8d28\u5316\u6587\u6863\uff08\u5982\u5927\u91cf\u76f8\u540c\u6a21\u677f\u53d1\u7968\uff09\u7684\u68c0\u7d22\u96be\u9898\uff0c\u63d0\u51faInvoice Haystack\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u63ed\u793a\u73b0\u6709\u591a\u6587\u6863\u57fa\u51c6\u56e0\u6587\u6863\u591a\u6837\u6027\u5bfc\u81f4\u7684\"\u5d4c\u5165\u574d\u584c\"\u95ee\u9898\u3002\u540c\u65f6\u63d0\u51faVL-RAG\u6df7\u5408\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u6846\u67b6\uff0c\u878d\u5408\u6587\u672c\u4e0e\u89c6\u89c9\u53cc\u6d41\u5d4c\u5165\u5e76\u52a0\u5165VLM\u9a8c\u8bc1\u8fc7\u6ee4\uff0c\u5728Invoice Haystack-500\u4e0aRecall@1\u8fbe60%\uff0c\u8f83\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\u63d0\u534713.5\u4e2a\u767e\u5206\u70b9\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25343", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u6587\u6863\u68c0\u7d22", "\u89c6\u89c9\u95ee\u7b54", "RAG"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25343v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Invoice Haystack: Benchmarking Document Retrieval and Visual Question Answering Under Strong Visual Homogeneity", "tldr": "\u9488\u5bf9\u89c6\u89c9\u9ad8\u5ea6\u540c\u8d28\u5316\u6587\u6863\uff08\u5982\u5927\u91cf\u76f8\u540c\u6a21\u677f\u53d1\u7968\uff09\u7684\u68c0\u7d22\u96be\u9898\uff0c\u63d0\u51faInvoice Haystack\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u63ed\u793a\u73b0\u6709\u591a\u6587\u6863\u57fa\u51c6\u56e0\u6587\u6863\u591a\u6837\u6027\u5bfc\u81f4\u7684\"\u5d4c\u5165\u574d\u584c\"\u95ee\u9898\u3002\u540c\u65f6\u63d0\u51faVL-RAG\u6df7\u5408\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u6846\u67b6\uff0c\u878d\u5408\u6587\u672c\u4e0e\u89c6\u89c9\u53cc\u6d41\u5d4c\u5165\u5e76\u52a0\u5165VLM\u9a8c\u8bc1\u8fc7\u6ee4\uff0c\u5728Invoice Haystack-500\u4e0aRecall@1\u8fbe60%\uff0c\u8f83\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\u63d0\u534713.5\u4e2a\u767e\u5206\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Remote sensing object detection has advanced rapidly with the development of large-scale benchmarks and modern detection architectures. However, existing datasets and detectors remain fragmented. Most benchmarks focus on limited categories, fixed spatial resolutions, or a single sensor, while detectors still struggle to work across different sensors and categorical systems. In this paper, we introduce LEVIRDet-159, the largest and most comprehensive remote sensing object detection dataset to date, with 159 categories, 2.56 million bounding boxes, and 700k fine-grained annotations under a multi-level taxonomy. In each key scale dimension, LEVIRDet-159 exceeds the corresponding largest existing remote sensing object detection dataset, containing approximately (7x) more images, (6x) more object instances, and (4x) more categories. Based on this dataset, we design LEVIRDetNet, a scale-hierarchy-aware detection foundation model for universal remote sensing object detection. LEVIRDetNet couples online visual Ground Sampling Distance (GSD) prediction, GSD-conditioned query modulation and allocation, and a hierarchy-aware detection head for mixed-granularity remote sensing supervision. Under stringent evaluation settings, LEVIRDetNet demonstrates strong cross-domain generalization. Even without target-domain training or fine-tuning, it achieves state-of-the-art detection performance on 9 external benchmarks, improving the strongest fully supervised competing methods by 5.02 mAP on average under each benchmark\u0027s primary metric. We hope this study will facilitate the development of strongly generalizable remote sensing object detection across diverse category systems, spatial resolutions, and sensor platforms. The dataset and trained models will be released at https://qinzheyang.github.io/LEVIRDet/, accompanying the final paper.", "arxiv_id": "2606.25312", "arxiv_url": "https://arxiv.org/abs/2606.25312", "authors": ["Qinzhe Yang", "Dongyu Wang", "Haohan Niu", "Jia Xu", "Zhenwei Shi", "Zhengxia Zou"], "brief": "\u63d0\u51faLEVIRDet-159\uff0c\u8fc4\u4eca\u6700\u5927\u9065\u611f\u76ee\u6807\u68c0\u6d4b\u6570\u636e\u96c6\uff0c\u542b159\u7c7b\u3001256\u4e07\u8fb9\u754c\u6846\u548c70\u4e07\u7ec6\u7c92\u5ea6\u6807\u6ce8\uff0c\u89c4\u6a21\u8fdc\u8d85\u73b0\u6709\u6570\u636e\u96c6\u3002\u57fa\u4e8e\u6b64\u8bbe\u8ba1\u4e86LEVIRDetNet\u57fa\u7840\u6a21\u578b\uff0c\u878d\u5408GSD\u9884\u6d4b\u4e0e\u5c42\u7ea7\u611f\u77e5\u68c0\u6d4b\u5934\uff0c\u65e0\u9700\u76ee\u6807\u57df\u5fae\u8c03\u5373\u57289\u4e2a\u5916\u90e8\u57fa\u51c6\u4e0a\u8d85\u8d8a\u5168\u76d1\u7763\u65b9\u6cd5\u5e73\u57475.02 mAP\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25312", "impact_score": 9, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9065\u611f\u76ee\u6807\u68c0\u6d4b", "\u57fa\u7840\u6a21\u578b", "\u5927\u89c4\u6a21\u6570\u636e\u96c6", "\u8de8\u57df\u6cdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25312v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "LEVIRDet: A Million-Scale 159-Category Dataset and Foundation Model for Universal Remote Sensing Object Detection", "tldr": "\u63d0\u51faLEVIRDet-159\uff0c\u8fc4\u4eca\u6700\u5927\u9065\u611f\u76ee\u6807\u68c0\u6d4b\u6570\u636e\u96c6\uff0c\u542b159\u7c7b\u3001256\u4e07\u8fb9\u754c\u6846\u548c70\u4e07\u7ec6\u7c92\u5ea6\u6807\u6ce8\uff0c\u89c4\u6a21\u8fdc\u8d85\u73b0\u6709\u6570\u636e\u96c6\u3002\u57fa\u4e8e\u6b64\u8bbe\u8ba1\u4e86LEVIRDetNet\u57fa\u7840\u6a21\u578b\uff0c\u878d\u5408GSD\u9884\u6d4b\u4e0e\u5c42\u7ea7\u611f\u77e5\u68c0\u6d4b\u5934\uff0c\u65e0\u9700\u76ee\u6807\u57df\u5fae\u8c03\u5373\u57289\u4e2a\u5916\u90e8\u57fa\u51c6\u4e0a\u8d85\u8d8a\u5168\u76d1\u7763\u65b9\u6cd5\u5e73\u57475.02 mAP\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Most vision-language-action (VLA) models are reactive: they predict the next action from the current instruction and observation, implicitly assuming that the current observation fully specifies the action-relevant state. In embodied control, however, embodiment-specific factors such as camera-to-robot geometry, robot calibration, or systematic actuation bias are often hard to identify from a single observation. As a result, reactive policies cannot reliably disambiguate these factors in general, overfitting to training environments and generalizing poorly at deployment. We propose Reflective VLA, which conditions each decision on a context of observation-action-consequence triplets. Each triplet records not only what the robot observed and executed, but also how the scene changed afterward, exposing the deployment-specific mapping from actions to observed effects. Architecturally, Reflective VLA routes all observation modalities through the VLM under shared attention, so the action expert reasons directly over past triplets and the current observation. A block-causal mask enables parallel multi-frame training without leakage and supports KV-cached real-time inference. On standard LIBERO and SimplerEnv-Bridge, Reflective VLA preserves strong in-distribution performance. Under distribution shift on LIBERO-Plus and the harder LIBERO-Plus-Hard, it improves average success rate by 5.4 and 4.2 percentage points over a matched reactive baseline. Ablations with a matched history-only baseline further show that action consequences -- rather than additional context length alone -- are the key to cross-environment generalization. Project page: https://lianqing11.github.io/reflective-vla-page/", "arxiv_id": "2606.25215", "arxiv_url": "https://arxiv.org/abs/2606.25215", "authors": ["Qing Lian", "Kent Yu", "Lei Zhang"], "brief": "\u63d0\u51faReflective VLA\uff0c\u8ba9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u5728\u51b3\u7b56\u65f6\u53c2\u8003\u5386\u53f2\u300c\u89c2\u5bdf-\u52a8\u4f5c-\u7ed3\u679c\u300d\u4e09\u5143\u7ec4\uff0c\u4f7f\u673a\u5668\u4eba\u80fd\u611f\u77e5\u90e8\u7f72\u73af\u5883\u7279\u6709\u7684\u52a8\u4f5c\u6548\u679c\u6620\u5c04\u3002\u5728\u5206\u5e03\u504f\u79fb\u573a\u666f\u4e0b\u76f8\u6bd4\u53cd\u5e94\u5f0f\u57fa\u7ebf\u6210\u529f\u7387\u63d0\u53474-5\u4e2a\u767e\u5206\u70b9\uff0c\u6d88\u878d\u5b9e\u9a8c\u8bc1\u660e\u5173\u952e\u5728\u4e8e\u52a8\u4f5c\u540e\u679c\u4fe1\u606f\u800c\u975e\u5355\u7eaf\u589e\u52a0\u5386\u53f2\u957f\u5ea6\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25215", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u5177\u8eab\u667a\u80fd", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u6cdb\u5316\u80fd\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25215v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Reflective VLA: In-Context Action Consequences Make VLAs Generalize", "tldr": "\u63d0\u51faReflective VLA\uff0c\u8ba9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u5728\u51b3\u7b56\u65f6\u53c2\u8003\u5386\u53f2\u300c\u89c2\u5bdf-\u52a8\u4f5c-\u7ed3\u679c\u300d\u4e09\u5143\u7ec4\uff0c\u4f7f\u673a\u5668\u4eba\u80fd\u611f\u77e5\u90e8\u7f72\u73af\u5883\u7279\u6709\u7684\u52a8\u4f5c\u6548\u679c\u6620\u5c04\u3002\u5728\u5206\u5e03\u504f\u79fb\u573a\u666f\u4e0b\u76f8\u6bd4\u53cd\u5e94\u5f0f\u57fa\u7ebf\u6210\u529f\u7387\u63d0\u53474-5\u4e2a\u767e\u5206\u70b9\uff0c\u6d88\u878d\u5b9e\u9a8c\u8bc1\u660e\u5173\u952e\u5728\u4e8e\u52a8\u4f5c\u540e\u679c\u4fe1\u606f\u800c\u975e\u5355\u7eaf\u589e\u52a0\u5386\u53f2\u957f\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Generating explorable 3D scenes from a single image requires strong generative priors and accurate geometric representations suitable for downstream use. Current video diffusion models offer high-quality generation and implicitly encode multi-view geometric structure in latent space. However, existing feedforward latent scene decoders typically output volumetric 3D Gaussians that lack a well-defined surface, limiting their use in simulation or standard graphics pipelines. This motivates decoding surface-aligned primitives that are not only renderable but also closer to explicit geometric assets. We ask whether compressed video diffusion latents can be mapped directly to explicit surface primitives in a single pass. To this end, we introduce FLAT and, for the first time, show that triangle splats can be decoded directly from video diffusion latents. Compared with decoding 3D Gaussians, predicting flat primitives is notoriously more challenging due to high sensitivity to primitive orientations, oftentimes leading to poor gradient flow. FLAT solves with two key ingredients: a ray-centered rotation parameterization for triangle regression and a novel product window function that improves gradient flow during differentiable triangle rendering. On standard benchmarks, FLAT achieves significantly better geometric accuracy while maintaining competitive visual quality compared to state-of-the-art feedforward baselines. We further show that a lightweight test-time refinement step converts the predicted triangle soup into a fully opaque, game-engine-ready representation that supports real-time rendering. By evaluating 3DGS, 2DGS, and triangle splatting variants under an identical training setup, we provide the first systematic analysis of representation tradeoffs in feedforward scene generation. The project page is available at https://flat-splat.github.io", "arxiv_id": "2606.24876", "arxiv_url": "https://arxiv.org/abs/2606.24876", "authors": ["Orest Kupyn", "Goutam Bhat", "Philipp Henzler", "Fabian Manhardt", "Christian Rupprecht", "Federico Tombari"], "brief": "\u63d0\u51faFLAT\u65b9\u6cd5\uff0c\u9996\u6b21\u5b9e\u73b0\u4ece\u89c6\u9891\u6269\u6563\u6a21\u578b\u7684\u6f5c\u5728\u7a7a\u95f4\u76f4\u63a5\u89e3\u7801\u4e09\u89d2\u5f62\u9762\u5143\uff08triangle splats\uff09\uff0c\u7528\u4e8e\u5355\u56fe\u50cf3D\u573a\u666f\u751f\u6210\u3002\u901a\u8fc7\u5c04\u7ebf\u4e2d\u5fc3\u65cb\u8f6c\u53c2\u6570\u5316\u548c\u65b0\u578b\u4e58\u79ef\u7a97\u53e3\u51fd\u6570\u89e3\u51b3\u4e09\u89d2\u5f62\u6e32\u67d3\u4e2d\u7684\u68af\u5ea6\u6d41\u95ee\u9898\uff0c\u5728\u51e0\u4f55\u7cbe\u5ea6\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u524d\u9988\u57fa\u7ebf\uff0c\u5e76\u652f\u6301\u5b9e\u65f6\u6e32\u67d3\u7684\u6e38\u620f\u5f15\u64ce\u683c\u5f0f\u8f93\u51fa\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24876", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u573a\u666f\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u4e09\u89d2\u5f62\u9762\u5143", "\u51e0\u4f55\u91cd\u5efa"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24876v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "FLAT: Feedforward Latent Triangle Splatting for Geometrically Accurate Scene Generation", "tldr": "\u63d0\u51faFLAT\u65b9\u6cd5\uff0c\u9996\u6b21\u5b9e\u73b0\u4ece\u89c6\u9891\u6269\u6563\u6a21\u578b\u7684\u6f5c\u5728\u7a7a\u95f4\u76f4\u63a5\u89e3\u7801\u4e09\u89d2\u5f62\u9762\u5143\uff08triangle splats\uff09\uff0c\u7528\u4e8e\u5355\u56fe\u50cf3D\u573a\u666f\u751f\u6210\u3002\u901a\u8fc7\u5c04\u7ebf\u4e2d\u5fc3\u65cb\u8f6c\u53c2\u6570\u5316\u548c\u65b0\u578b\u4e58\u79ef\u7a97\u53e3\u51fd\u6570\u89e3\u51b3\u4e09\u89d2\u5f62\u6e32\u67d3\u4e2d\u7684\u68af\u5ea6\u6d41\u95ee\u9898\uff0c\u5728\u51e0\u4f55\u7cbe\u5ea6\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u524d\u9988\u57fa\u7ebf\uff0c\u5e76\u652f\u6301\u5b9e\u65f6\u6e32\u67d3\u7684\u6e38\u620f\u5f15\u64ce\u683c\u5f0f\u8f93\u51fa\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Camera-prompted text-to-video (T2V) models are increasingly used to synthesize virtual camera captures, such as orbiting objects or moving through static scenes. For these outputs, visual plausibility is insufficient: the generated frames should also provide coherent multi-view evidence for a single static 3D scene. We introduce GeoT2V-Bench, a reconstruction-based diagnostic benchmark for evaluating whether camera-prompted T2V clips can support explicit rigid 3D reconstruction. Our pipeline estimates per-frame camera intrinsics and poses with VGGT-style geometry estimation, fits DeformableGS, derives a static MedianGS proxy by temporal-median aggregation, and renders this proxy along the estimated camera path. Instead of producing a pass/fail label or a single scalar score, GeoT2V-Bench reports a continuous reconstruction profile covering apparent image motion, estimated trajectory behavior, MedianGS static rendering error, static-render flow agreement, and the gap between flexible and static fits. On a fair-format four-seed evaluation with 3,840 completed reconstructions from 12 open-weight model configurations and 80 GeCo-Eval static-scene prompts, we find that visible motion, static rendering error, flow agreement, and flexible-vs-static behavior often disagree. GeoT2V-Bench therefore captures complementary failure modes that emerge when generated videos are tested as global static-scene acquisitions.", "arxiv_id": "2606.24829", "arxiv_url": "https://arxiv.org/abs/2606.24829", "authors": ["Chenrui Fan", "Paolo Favaro"], "brief": "\u63d0\u51faGeoT2V-Bench\u57fa\u51c6\uff0c\u901a\u8fc7\u4e09\u7ef4\u91cd\u5efa\u65b9\u6cd5\u8bc4\u4f30\u6587\u672c\u751f\u6210\u89c6\u9891\u6a21\u578b\u7684\u4e09\u7ef4\u4e00\u81f4\u6027\u3002\u8be5\u57fa\u51c6\u5229\u7528\u76f8\u673a\u59ff\u6001\u4f30\u8ba1\u3001\u53ef\u53d8\u5f62\u9ad8\u65af\u6e85\u5c04\u7b49\u6280\u672f\uff0c\u751f\u6210\u8fde\u7eed\u91cd\u5efa\u8d28\u91cf\u5256\u9762\u800c\u975e\u5355\u4e00\u5206\u6570\uff0c\u572812\u4e2a\u5f00\u6e90\u6a21\u578b\u914d\u7f6e\u4e0a\u5b8c\u62103840\u6b21\u91cd\u5efa\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u73b0\u6709T2V\u6a21\u578b\u5728\u9759\u6001\u573a\u666f\u4e09\u7ef4\u4e00\u81f4\u6027\u4e0a\u7684\u591a\u79cd\u4e92\u8865\u5931\u6548\u6a21\u5f0f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24829", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u751f\u6210\u89c6\u9891", "\u4e09\u7ef4\u91cd\u5efa", "\u89c6\u9891\u751f\u6210\u8bc4\u6d4b", "\u591a\u89c6\u56fe\u4e00\u81f4\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24829v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GeoT2V-Bench: Benchmarking 3D Consistency in Text-to-Video Models via 3D Reconstruction", "tldr": "\u63d0\u51faGeoT2V-Bench\u57fa\u51c6\uff0c\u901a\u8fc7\u4e09\u7ef4\u91cd\u5efa\u65b9\u6cd5\u8bc4\u4f30\u6587\u672c\u751f\u6210\u89c6\u9891\u6a21\u578b\u7684\u4e09\u7ef4\u4e00\u81f4\u6027\u3002\u8be5\u57fa\u51c6\u5229\u7528\u76f8\u673a\u59ff\u6001\u4f30\u8ba1\u3001\u53ef\u53d8\u5f62\u9ad8\u65af\u6e85\u5c04\u7b49\u6280\u672f\uff0c\u751f\u6210\u8fde\u7eed\u91cd\u5efa\u8d28\u91cf\u5256\u9762\u800c\u975e\u5355\u4e00\u5206\u6570\uff0c\u572812\u4e2a\u5f00\u6e90\u6a21\u578b\u914d\u7f6e\u4e0a\u5b8c\u62103840\u6b21\u91cd\u5efa\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u73b0\u6709T2V\u6a21\u578b\u5728\u9759\u6001\u573a\u666f\u4e09\u7ef4\u4e00\u81f4\u6027\u4e0a\u7684\u591a\u79cd\u4e92\u8865\u5931\u6548\u6a21\u5f0f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-Language Large Models (VLLMs) trained on massive crawled corpora raise pressing copyright and data-provenance concerns. These concerns are particularly acute in healthcare, where patient medical images paired with clinical reports demand rigorous privacy safeguards. However, existing training data detection methods either fail in cross-modal scenarios or rely on superficial output signals with insufficient discriminative power. We introduce GradAudit, a gradient-based auditing framework that examines internal optimization dynamics rather than treating VLLMs as black boxes. Our approach builds on a key observation: model parameters converge to regions where gradients on training samples become stable and well-aligned, whereas gradients on non-training samples remain noisy and inconsistent. By analyzing these gradient signatures, GradAudit achieves strong separability and detects genuine image-text associations learned during training, not merely individual modality membership. Empirically, across both medical and general-domain datasets, GradAudit substantially outperforms state-of-the-art baselines in both pretraining and fine-tuning VLLMs. In a case study employing copyrighted content, we show that existing training data detection methods not only underestimate the extent of unauthorized data usage, but that this underestimation becomes more pronounced as models become more recent and more advanced.", "arxiv_id": "2606.24774", "arxiv_url": "https://arxiv.org/abs/2606.24774", "authors": ["Zhihao Zhu", "Hongyi Tang", "Yi Yang", "Ahmed Abbasi"], "brief": "\u63d0\u51faGradAudit\u6846\u67b6\uff0c\u901a\u8fc7\u5206\u6790\u89c6\u89c9\u8bed\u8a00\u5927\u6a21\u578b\u7684\u53c2\u6570\u68af\u5ea6\u6765\u68c0\u6d4b\u8bad\u7ec3\u6570\u636e\u662f\u5426\u88ab\u4f7f\u7528\u3002\u6838\u5fc3\u89c2\u5bdf\u662f\u8bad\u7ec3\u6837\u672c\u7684\u68af\u5ea6\u7a33\u5b9a\u4e14\u5bf9\u9f50\uff0c\u800c\u975e\u8bad\u7ec3\u6837\u672c\u7684\u68af\u5ea6\u5219\u566a\u58f0\u5927\u4e14\u4e0d\u4e00\u81f4\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u533b\u7597\u548c\u901a\u7528\u9886\u57df\u5747\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\uff0c\u5e76\u63ed\u793a\u73b0\u6709\u65b9\u grounding as a constrained verification task. Instead of computing pixel-level overlap, SER uses a referee VLM as a local checker to evaluate model-generated evidence claims across two dimensions: relevance and localization quality, combined with a temporal penalty. This design reduces the reliance on dense box annotations and enables training directly on standard video QA data. On the V-STAR benchmark, SER achieves 49.6% mLGM, improving by 3.0 points over the strong evidence-grounded baseline Open-o3-Video, demonstrating its potential in enhancing both answer accuracy and evidence grounding.", "arxiv_id": "2606.24726", "arxiv_url": "https://arxiv.org/abs/2606.24726", "authors": ["Sheng Xia", "Zhengqin Lai", "Tianxiang Jiang", "Kanghui Tian", "Shoujun Zhou", "Bin Li", "Yi Wang"], "brief": "\u9488\u5bf9\u89c6\u9891\u591a\u6a21\u6001\u5927\u6a21\u578b\u65f6\u7a7a\u63a8\u7406\u4e0d\u51c6\u786e\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u8bed\u4e49\u8bc1\u636e\u5956\u52b1\uff08SER\uff09\u65b9\u6cd5\uff0c\u7528\u88c1\u5224VLM\u4ece\u76f8\u5173\u6027\u548c\u5b9a\u4f4d\u8d28\u91cf\u4e24\u4e2a\u7ef4\u5ea6\u8bc4\u4f30\u6a21\u578b\u751f\u6210\u7684\u65f6\u7a7a\u8bc1\u636e\uff0c\u66ff\u4ee3\u4f20\u7edfIoU\u51e0\u4f55\u5956\u52b1\u3002\u5728V-STAR\u57fa\u51c6\u4e0a\uff0cSER\u8fbe\u523049.6% mLGM\uff0c\u6bd4\u5f3a\u57fa\u7ebf\u63d0\u53473.0\u4e2a\u767e\u5206\u70b9\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24726", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u5f3a\u5316\u5b66\u4e60", "\u65f6\u7a7a\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24726v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SER: Learning to Ground Video Reasoning with Semantic Evidence Rewards", "tldr": "\u9488\u5bf9\u89c6\u9891\u591a\u6a21\u6001\u5927\u6a21\u578b\u65f6\u7a7a\u63a8\u7406\u4e0d\u51c6\u786e\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u8bed\u4e49\u8bc1\u636e\u5956\u52b1\uff08SER\uff09\u65b9\u6cd5\uff0c\u7528\u88c1\u5224VLM\u4ece\u76f8\u5173\u6027\u548c\u5b9a\u4f4d\u8d28\u91cf\u4e24\u4e2a\u7ef4\u5ea6\u8bc4\u4f30\u6a21\u578b\u751f\u6210\u7684\u65f6\u7a7a\u8bc1\u636e\uff0c\u66ff\u4ee3\u4f20\u7edfIoU\u51e0\u4f55\u5956\u52b1\u3002\u5728V-STAR\u57fa\u51c6\u4e0a\uff0cSER\u8fbe\u523049.6% mLGM\uff0c\u6bd4\u5f3a\u57fa\u7ebf\u63d0\u53473.0\u4e2a\u767e\u5206\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
