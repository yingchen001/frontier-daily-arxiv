<script>
const PAPERS = [{"abstract": "LLM agents solve repository-level coding tasks through multi-turn tool use, but utilize half their budget on locating faults before editing. Dedicated localization frameworks have emerged, yet are still evaluated as file retrieval rather than actionable diagnosis, producing locations without the diagnostic context a repair agent needs. We introduce SHERLOC (Structured Hypothesis-driven Exploration and Reasoning for Localization), a training-free framework pairing a reasoning LLM with compact repository tools and self-recovery, without fine-tuning or multi-agent orchestration. SHERLOC reaches state-of-the-art localization across model scales: 84.33% accuracy@1 on SWE-Bench Lite and 81.27% recall@1 on SWE-Bench Verified; at ~30B parameters, it matches or outperforms other agentic methods. Injecting our locations and diagnostic findings into repair agents yields, on average, +5.95 pp resolve rate on SWE-Bench Verified while cutting localization and total tokens by 36.7% and 23.1%.", "arxiv_id": "2606.24820", "arxiv_url": "https://arxiv.org/abs/2606.24820", "authors": ["Hovhannes Tamoyan", "Sean Narenthiran", "Erik Arakelyan", "Mira Mezini", "Boris Ginsburg"], "brief": "\u63d0\u51faSHERLOC\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u578bLLM\u4e0e\u7d27\u51d1\u4ed3\u5e93\u5de5\u5177\u7ed3\u5408\uff0c\u901a\u8fc7\u5047\u8bbe\u9a71\u52a8\u7684\u63a2\u7d22\u4e0e\u81ea\u6211\u6062\u590d\u673a\u5236\uff0c\u4e3a\u4ee3\u7801\u4fee\u590d\u667a\u80fd\u4f53\u63d0\u4f9b\u5e26\u8bca\u65ad\u4e0a\u4e0b\u6587\u7684\u7cbe\u51c6\u6545\u969c\u5b9a\u4f4d\uff0c\u65e0\u9700\u5fae\u8c03\u6216\u591a\u667a\u80fd\u4f53\u7f16\u6392\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24820", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5728SWE-Bench Lite\u4e0a\u8fbe\u523084.33% accuracy@1\uff0c\u5728SWE-Bench Verified\u4e0a\u8fbe\u523081.27% recall@1\uff0c\u5747\u4e3a\u5f53\u524d\u6700\u4f18", "\u7ea630B\u53c2\u6570\u89c4\u6a21\u4e0b\u5373\u53ef\u5339\u914d\u6216\u8d85\u8d8a\u5176\u4ed6\u667a\u80fd\u4f53\u65b9\u6cd5\uff0c\u6548\u7387\u663e\u8457", "\u5c06\u5b9a\u4f4d\u7ed3\u679c\u6ce8\u5165\u4fee\u590d\u667a\u80fd\u4f53\u540e\uff0c\u89e3\u51b3\u7387\u5e73\u5747\u63d0\u5347+5.95\u4e2a\u767e\u5206\u70b9\uff0c\u540c\u65f6\u5b9a\u4f4dtoken\u51cf\u5c1136.7%\uff0c\u603btoken\u51cf\u5c1123.1%"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "LLM\u63a8\u7406", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24820v1", "published_at": "2026-06-23", "score": 0.5, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SHERLOC: Structured Diagnostic Localization for Code Repair Agents", "upvotes": 0, "what_it_is": "\u63d0\u51faSHERLOC\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u578bLLM\u4e0e\u7d27\u51d1\u4ed3\u5e93\u5de5\u5177\u7ed3\u5408\uff0c\u901a\u8fc7\u5047\u8bbe\u9a71\u52a8\u7684\u63a2\u7d22\u4e0e\u81ea\u6211\u6062\u590d\u673a\u5236\uff0c\u4e3a\u4ee3\u7801\u4fee\u590d\u667a\u80fd\u4f53\u63d0\u4f9b\u5e26\u8bca\u65ad\u4e0a\u4e0b\u6587\u7684\u7cbe\u51c6\u6545\u969c\u5b9a\u4f4d\uff0c\u65e0\u9700\u5fae\u8c03\u6216\u591a\u667a\u80fd\u4f53\u7f16\u6392\u3002", "why_notable": "\u73b0\u6709\u65b9\u6cd5\u5c06\u4e00\u534a\u9884\u7b97\u8017\u8d39\u5728\u6545\u969c\u5b9a\u4f4d\u4e0a\u4e14\u7f3a\u4e4f\u8bca\u65ad\u4e0a\u4e0b\u6587\uff0cSHERLOC\u5728\u65e0\u9700\u8bad\u7ec3\u7684\u524d\u63d0\u4e0b\u540c\u65f6\u63d0\u5347\u5b9a\u4f4d\u7cbe\u5ea6\u548c\u4fee\u590d\u6548\u679c\uff0c\u5e76\u5927\u5e45\u964d\u4f4etoken\u6d88\u8017\uff0c\u5bf9\u5b9e\u9645\u4ee3\u7801\u4fee\u590d\u6d41\u6c34\u7ebf\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Process reward models enable fine-grained, step-level evaluation of LLMs, yet building them for agentic settings remains prohibitively difficult: long-horizon interactions, irreversible actions, and stochastic environment feedback make both human annotation and Monte Carlo estimation infeasible at scale. In this work, we show that reinforcement learning (RL) post-training already provides the ingredients for effective step-level scoring, eliminating the need for dedicated reward model training altogether. Concretely, we derive an implicit advantage under a general stochastic Markov decision process, which we term progress advantage -- log-probability ratio between the RL-trained policy and its reference policy exactly recovers the optimal advantage function. This formulation makes the resulting signal annotation-free, domain-agnostic, and available as a byproduct of the standard RL post-training pipeline. We validate the effectiveness of the progress advantage across three different applications: test-time scaling, uncertainty quantification, and failure attribution on five benchmarks and four model families. Across all settings, it consistently outperforms confidence-based baselines and, despite requiring no task-specific training, surpasses dedicated trained reward models. We complement these results with deeper analyses on characteristics of progress advantage, offering practical guidance for adoption in real-world agentic systems.", "arxiv_id": "2606.26080", "arxiv_url": "https://arxiv.org/abs/2606.26080", "authors": ["Changdae Oh", "Wendi Li", "Seongheon Park", "Samuel Yeh", "Tanwi Mallick", "Sharon Li"], "brief": "\u672c\u6587\u63d0\u51fa\"\u8fdb\u5ea6\u4f18\u52bf\"\uff08Progress Advantage\uff09\u6982\u5ff5\uff0c\u8bc1\u660eRL\u540e\u8bad\u7ec3\u7684\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684\u5bf9\u6570\u6982\u7387\u6bd4\u53ef\u7cbe\u786e\u6062\u590d\u6700\u4f18\u4f18\u52bf\u51fd\u6570\uff0c\u4ece\u800c\u65e0\u9700\u989d\u5916\u6807\u6ce8\u6216\u8bad\u7ec3\u5373\u53ef\u83b7\u5f97\u9ad8\u8d28\u91cf\u7684\u6b65\u9aa4\u7ea7\u8bc4\u5206\u4fe1\u53f7\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26080", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7406\u8bba\u63a8\u5bfc\uff1a\u5728\u968f\u673aMDP\u6846\u67b6\u4e0b\uff0cRL\u8bad\u7ec3\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684log\u6982\u7387\u6bd4\u7b49\u4ef7\u4e8e\u6700\u4f18\u4f18\u52bf\u51fd\u6570", "\u96f6\u6210\u672c\u83b7\u53d6\uff1a\u8fdb\u5ea6\u4f18\u52bf\u662f\u6807\u51c6RL\u540e\u8bad\u7ec3\u7684\u526f\u4ea7\u54c1\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u3001\u8499\u7279\u5361\u6d1b\u4f30\u8ba1\u6216\u4e13\u7528\u5956\u52b1\u6a21\u578b\u8bad\u7ec3", "\u5728\u6d4b\u8bd5\u65f6\u6269\u5c55\u3001\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u3001\u5931\u8d25\u5f52\u56e0\u4e09\u7c7b\u4efb\u52a1\u4e0a\uff0c\u8de85\u4e2a\u57fa\u51c6\u548c4\u4e2a\u6a21\u578b\u65cf\u5747\u4f18\u4e8e\u7f6e\u4fe1\u5ea6\u57fa\u7ebf\u53ca\u4e13\u7528\u5956\u52b1\u6a21\u578b"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26080v1", "published_at": "2026-06-24", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Neglected Free Lunch from Post-training: Progress Advantage for LLM Agents", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u8fdb\u5ea6\u4f18\u52bf\"\uff08Progress Advantage\uff09\u6982\u5ff5\uff0c\u8bc1\u660eRL\u540e\u8bad\u7ec3\u7684\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684\u5bf9\u6570\u6982\u7387\u6bd4\u53ef\u7cbe\u786e\u6062\u590d\u6700\u4f18\u4f18\u52bf\u51fd\u6570\uff0c\u4ece\u800c\u65e0\u9700\u989d\u5916\u6807\u6ce8\u6216\u8bad\u7ec3\u5373\u53ef\u83b7\u5f97\u9ad8\u8d28\u91cf\u7684\u6b65\u9aa4\u7ea7\u8bc4\u5206\u4fe1\u53f7\u3002", "why_notable": "\u5c06RL\u540e\u8bad\u7ec3\u7684\"\u514d\u8d39\u5348\u9910\"\u8f6c\u5316\u4e3a\u5b9e\u7528\u7684\u8fc7\u7a0b\u5956\u52b1\u4fe1\u53f7\uff0c\u89e3\u51b3\u4e86\u667a\u80fd\u4f53\u573a\u666f\u4e0b\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\u96be\u4ee5\u6784\u5efa\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5177\u6709\u6781\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u7406\u8bba\u4f18\u96c5\u6027\u3002"}, {"abstract": "As autonomous agents tackle increasingly complex multi-step, multi-agent tasks, their execution trajectories have scaled beyond the constraints of even the largest context windows. Current methods for effectively diagnosing agent failures load the full trajectory into an LLM\u0027s context window, which suffers from attention dilution and fails when agentic traces inevitably exceed context limits. To address this, we introduce SAFARI (Scaling long-horizon Agentic Fault AttRibution via active Investigation), a framework that replaces linear context loading with a tool-augmented diagnostic loop. By equipping LLMs with a specialized toolbox to read and search trajectory segments alongside a persistent Short-Term Memory (STM) for cross-turn reasoning, SAFARI effectively decouples diagnostic accuracy from architectural context limits. Our experiments demonstrate that SAFARI outperforms state-of-the-art results by 20% on the Who\u0026When dataset within a 1M token budget, and by 19% on TRAIL GAIA subset on a 25K token budget. Most significantly, SAFARI maintains a 0.58 precision even when the target fault resides 5x beyond the model\u0027s native context window, a scenario where traditional evaluators fail entirely.", "arxiv_id": "2606.24626", "arxiv_url": "https://arxiv.org/abs/2606.24626", "authors": ["Chenyang Zhu", "Jiayu Yao", "Kushal Chawla", "Youbing Yin", "Nathan Wolfe", "Pengshan Cai", "Jingyu Wu", "Spencer Hong", "Sangwoo Cho", "Shi-Xiong Zhang", "Daben Liu", "Sambit Sahu", "Erin Babinsky"], "brief": "\u63d0\u51faSAFARI\u6846\u67b6\uff0c\u901a\u8fc7\u5de5\u5177\u589e\u5f3a\u7684\u4e3b\u52a8\u8c03\u67e5\u5faa\u73af\uff08\u800c\u975e\u7ebf\u6027\u52a0\u8f7d\u5168\u8f68\u8ff9\uff09\u6765\u8bca\u65ad\u591a\u6b65\u591a\u667a\u80fd\u4f53\u4efb\u52a1\u7684\u6267\u884c\u6545\u969c\uff0c\u914d\u5907\u4e13\u7528\u5de5\u5177\u7bb1\u548c\u77ed\u671f\u8bb0\u5fc6\u6a21\u5757\uff0c\u4f7f\u8bca\u65ad\u7cbe\u5ea6\u4e0e\u4e0a\u4e0b\u6587\u7a97\u53e3\u9650\u5236\u89e3\u8026\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24626", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5728Who\u0026When\u6570\u636e\u96c6\u4e0a\u4ee51M token\u9884\u7b97\u8d85\u8d8aSOTA 20%\uff0c\u5728TRAIL GAIA\u5b50\u96c6\u4e0a\u4ee525K token\u9884\u7b97\u8d85\u8d8a19%", "\u5f53\u76ee\u6807\u6545\u969c\u4f4d\u4e8e\u6a21\u578b\u539f\u751f\u4e0a\u4e0b\u6587\u7a97\u53e35\u500d\u4e4b\u5916\u65f6\uff0c\u4ecd\u4fdd\u63010.58\u7684\u7cbe\u786e\u7387\uff0c\u800c\u4f20\u7edf\u65b9\u6cd5\u5b8c\u5168\u5931\u6548", "\u6838\u5fc3\u8bbe\u8ba1\uff1a\u5de5\u5177\u589e\u5f3a\u8bca\u65ad\u5faa\u73af + \u6301\u4e45\u77ed\u671f\u8bb0\u5fc6\uff08STM\uff09\u652f\u6301\u8de8\u8f6e\u63a8\u7406\uff0c\u907f\u514d\u6ce8\u610f\u529b\u7a00\u91ca\u95ee\u9898"], "keywords": ["\u667a\u80fd\u4f53", "\u6545\u969c\u5f52\u56e0", "\u957f\u4e0a\u4e0b\u6587", "\u5de5\u5177\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24626v1", "published_at": "2026-06-23", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SAFARI: Scaling Long Horizon Agentic Fault Attribution via Active Investigation", "upvotes": 0, "what_it_is": "\u63d0\u51faSAFARI\u6846\u67b6\uff0c\u901a\u8fc7\u5de5\u5177\u589e\u5f3a\u7684\u4e3b\u52a8\u8c03\u67e5\u5faa\u73af\uff08\u800c\u975e\u7ebf\u6027\u52a0\u8f7d\u5168\u8f68\u8ff9\uff09\u6765\u8bca\u65ad\u591a\u6b65\u591a\u667a\u80fd\u4f53\u4efb\u52a1\u7684\u6267\u884c\u6545\u969c\uff0c\u914d\u5907\u4e13\u7528\u5de5\u5177\u7bb1\u548c\u77ed\u671f\u8bb0\u5fc6\u6a21\u5757\uff0c\u4f7f\u8bca\u65ad\u7cbe\u5ea6\u4e0e\u4e0a\u4e0b\u6587\u7a97\u53e3\u9650\u5236\u89e3\u8026\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u89e3\u51b3\u8d85\u957f\u667a\u80fd\u4f53\u8f68\u8ff9\u7684\u6545\u969c\u5f52\u56e0\u95ee\u9898\uff0c\u7a81\u7834\u4e0a\u4e0b\u6587\u7a97\u53e3\u786c\u9650\u5236\uff0c\u5bf9\u6784\u5efa\u53ef\u9760\u81ea\u4e3b\u667a\u80fd\u4f53\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Tool use enables large language models (LLMs) to perform complex tasks, and recent agentic reinforcement learning (RL) methods show promise for enhancing model capabilities. However, RL alone often leads to instability or limited gains in tool-use tasks. In our experiments, some models exhibit catastrophic collapse, where performance abruptly drops and tool-invocation structures fail. The analysis reveals that these failures stem from unexpected probability spikes in specific control tokens, disrupting structured execution, yet the underlying tool-use capability remains intact, merely obscured by specific formats. To address this, we systematically investigate a diverse set of supervisory signals, including off-policy supervision, hint-based guidance, erroneous example supervision, and others, applied under both synchronous and interleaved training schemes. We find that interleaving supervised fine-tuning (SFT) with RL substantially improves stability, but exhibits degraded performance under format and content out-of-distribution (OOD) evaluation. We also analyze the impact of learning rates and generalization across settings. These results highlight the importance of understanding RL failures and demonstrate how diverse supervisory signals can guide exploratory learning, enabling robust training of LLMs for complex, multi-step tool-use tasks. Our Code is available at https://github.com/hypasd-art/Tool-RL-Box.", "arxiv_id": "2606.26027", "arxiv_url": "https://arxiv.org/abs/2606.26027", "authors": ["Yupu Hao", "Zhuoran Jin", "Huanxuan Liao", "Kang Liu", "Jun Zhao"], "brief": "\u672c\u6587\u5206\u6790\u4e86LLM\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u51fa\u73b0\u707e\u96be\u6027\u5d29\u6e83\u7684\u6839\u672c\u539f\u56e0\uff08\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u98d9\u5347\uff09\uff0c\u5e76\u7cfb\u7edf\u7814\u7a76\u4e86\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff08\u79bb\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\uff09\u5728\u540c\u6b65\u4e0e\u4ea4\u9519\u8bad\u7ec3\u65b9\u6848\u4e0b\u7684\u4fee\u590d\u6548\u679c\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26027", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5d29\u6e83\u6839\u6e90\uff1a\u7279\u5b9a\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u5c16\u5cf0\u7834\u574f\u7ed3\u6784\u5316\u6267\u884c\uff0c\u4f46\u5e95\u5c42\u5de5\u5177\u8c03\u7528\u80fd\u529b\u4ecd\u5b8c\u597d\uff0c\u4ec5\u88ab\u683c\u5f0f\u95ee\u9898\u63a9\u76d6", "\u4ea4\u9519SFT\u4e0eRL\u8bad\u7ec3\u53ef\u663e\u8457\u63d0\u5347\u7a33\u5b9a\u6027\uff0c\u4f46\u5728\u683c\u5f0f\u4e0e\u5185\u5bb9\u5206\u5e03\u5916\uff08OOD\uff09\u8bc4\u4f30\u4e2d\u6027\u80fd\u4e0b\u964d", "\u7cfb\u7edf\u5bf9\u6bd4\u4e86\u79bb\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff0c\u5e76\u5206\u6790\u4e86\u5b66\u4e60\u7387\u5f71\u54cd\u4e0e\u8de8\u573a\u666f\u6cdb\u5316\u80fd\u529b"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26027v1", "published_at": "2026-06-24", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Why Multi-Step Tool-Use Reinforcement Learning Collapses and How Supervisory Signals Fix It", "upvotes": 0, "what_it_is": "\u672c\u6587\u5206\u6790\u4e86LLM\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u51fa\u73b0\u707e\u96be\u6027\u5d29\u6e83\u7684\u6839\u672c\u539f\u56e0\uff08\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u98d9\u5347\uff09\uff0c\u5e76\u7cfb\u7edf\u7814\u7a76\u4e86\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff08\u79bb\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\uff09\u5728\u540c\u6b65\u4e0e\u4ea4\u9519\u8bad\u7ec3\u65b9\u6848\u4e0b\u7684\u4fee\u590d\u6548\u679c\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u63ed\u793a\u5de5\u5177\u8c03\u7528RL\u8bad\u7ec3\u5d29\u6e83\u7684\u673a\u5236\uff0c\u5e76\u63d0\u4f9b\u53ef\u590d\u73b0\u7684\u4fee\u590d\u65b9\u6848\u4e0e\u5f00\u6e90\u4ee3\u7801\u5e93\uff0c\u5bf9\u6784\u5efa\u7a33\u5065\u7684LLM\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u6307\u5bfc\u4ef7\u503c"}, {"abstract": "LLM agents are increasingly being used to automate tasks for users within an open GUI environment. They inevitably encounter screens containing user-sensitive information, for which takeover of task execution by the user is highly desirable or even necessary. State-of-the-art LLM-driven agents are usually fine-tuned to complete tasks regardless of the safety implications of their actions. This makes their real-world deployment difficult and adversely affects the reliability. Therefore, it is crucial to identify and categorize user-sensitive states and define user-sensitive queries. This dataset would be to engineers to recognize and request handover to the user in critical scenarios. This short paper develops an explorer agent that systematically explores the query space starting from one demonstrated task to identify queries that, if executed, would lead to user-sensitive states in a GUI environment.", "arxiv_id": "2606.25705", "arxiv_url": "https://arxiv.org/abs/2606.25705", "authors": ["Aradhana Nayak", "Mussadiq Nazeer", "Wang Peng", "Feng Liu"], "brief": "\u672c\u6587\u6784\u5efa\u4e86\u4e00\u4e2a\"\u63a2\u7d22\u667a\u80fd\u4f53\"\uff0c\u4ece\u5355\u4e2a\u6f14\u793a\u4efb\u52a1\u51fa\u53d1\uff0c\u7cfb\u7edf\u6027\u5730\u63a2\u7d22\u67e5\u8be2\u7a7a\u95f4\uff0c\u8bc6\u522b\u5728GUI\u73af\u5883\u4e2d\u4f1a\u89e6\u53d1\u7528\u6237\u654f\u611f\u72b6\u6001\u7684\u64cd\u4f5c\u8bf7\u6c42\uff0c\u5e76\u6784\u5efa\u76f8\u5e94\u6570\u636e\u96c6\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25705", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u73b0\u6709LLM\u9a71\u52a8\u7684GUI\u667a\u80fd\u4f53\u901a\u5e38\u88ab\u5fae\u8c03\u4e3a\u65e0\u8bba\u5b89\u5168\u4e0e\u5426\u90fd\u5b8c\u6210\u4efb\u52a1\uff0c\u5ffd\u89c6\u654f\u611f\u64cd\u4f5c\u7684\u98ce\u9669", "\u63d0\u51fa\u63a2\u7d22\u667a\u80fd\u4f53\uff08explorer agent\uff09\uff0c\u4ece\u4e00\u4e2a\u6f14\u793a\u4efb\u52a1\u51fa\u53d1\u7cfb\u7edf\u63a2\u7d22\u67e5\u8be2\u7a7a\u95f4\uff0c\u5b9a\u4f4d\u7528\u6237\u654f\u611f\u72b6\u6001", "\u76ee\u6807\u662f\u6784\u5efa\u6570\u636e\u96c6\uff0c\u5e2e\u52a9\u5de5\u7a0b\u5e08\u8bc6\u522b\u5173\u952e\u573a\u666f\u5e76\u89e6\u53d1\u4efb\u52a1\u63a7\u5236\u6743\u5411\u7528\u6237\u7684\u79fb\u4ea4\uff08handover\uff09"], "keywords": ["\u667a\u80fd\u4f53", "GUI", "\u5b89\u5168", "\u4eba\u673a\u534f\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25705v1", "published_at": "2026-06-24", "score": 0.375, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "GUI agent: Guided Exploration of User-Sensitive Screens", "upvotes": 0, "what_it_is": "\u672c\u6587\u6784\u5efa\u4e86\u4e00\u4e2a\"\u63a2\u7d22\u667a\u80fd\u4f53\"\uff0c\u4ece\u5355\u4e2a\u6f14\u793a\u4efb\u52a1\u51fa\u53d1\uff0c\u7cfb\u7edf\u6027\u5730\u63a2\u7d22\u67e5\u8be2\u7a7a\u95f4\uff0c\u8bc6\u522b\u5728GUI\u73af\u5883\u4e2d\u4f1a\u89e6\u53d1\u7528\u6237\u654f\u611f\u72b6\u6001\u7684\u64cd\u4f5c\u8bf7\u6c42\uff0c\u5e76\u6784\u5efa\u76f8\u5e94\u6570\u636e\u96c6\u3002", "why_notable": "\u76f4\u63a5\u9488\u5bf9LLM GUI\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u90e8\u7f72\u4e2d\u7684\u5b89\u5168\u53ef\u9760\u6027\u75db\u70b9\uff0c\u63d0\u51fa\u4e3b\u52a8\u8bc6\u522b\u654f\u611f\u573a\u666f\u5e76\u8bf7\u6c42\u7528\u6237\u63a5\u7ba1\u7684\u673a\u5236\uff0c\u5bf9\u667a\u80fd\u4f53\u5b89\u5168\u843d\u5730\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "A world model predicts environment dynamics based on current observations and actions, serving as a core cognitive mechanism for reasoning and planning. In this work, we investigate how world modeling based on language models can further push the boundaries of general agents. (i) We first focus on building foundation models for agentic environment simulation. We introduce Qwen-AgentWorld-35B-A3B and Qwen-AgentWorld-397B-A17B, the first language world models capable of simulating agentic environments covering 7 domains via long chain-of-thought reasoning. Leveraging more than 10M environment interaction trajectories of 7 domains in real-world environments, we develop Qwen-AgentWorld through a three-stage training pipeline: CPT injects general-purpose world modeling capabilities from the state transition dynamics and augmented professional corpora, SFT activates next-state-prediction reasoning, and RL sharpens simulation fidelity through a tailored framework with hybrid rubric-and-rule rewards. To evaluate language world models, we present AgentWorldBench, a comprehensive benchmark constructed from real-world interactions of 5 frontier models on 9 established benchmarks. Empirical results demonstrate that Qwen-AgentWorld significantly outperforms existing frontier models. (ii) Beyond foundation models, we further investigate two complementary paradigms through which world modeling enhances general agents. First, as a decoupled environment simulator, Qwen-AgentWorld supports scalable and controllable simulation of thousands of real-world environments for agentic RL, yielding gains that surpass real-environment training alone. Second, as a unified agent foundation model, world-model training acts as a highly effective warm-up that improves downstream performance across 7 agentic benchmarks. Code: https://github.com/QwenLM/Qwen-AgentWorld", "arxiv_id": "2606.24597", "arxiv_url": "https://arxiv.org/abs/2606.24597", "authors": ["Yuxin Zuo", "Zikai Xiao", "Li Sheng", "Fei Huang", "Jianhong Tu", "Yuxuan Liu", "Tianyi Tang", "Xiaomeng Hu", "Yang Su", "Qingfeng Lan", "Yantao Liu", "Qin Zhu", "Yinger Zhang", "Bowen Yu", "Haiquan Zhao", "Haiyang Xu", "Jianxin Yang", "Jiayang Cheng", "Junyang Wang", "Lianghao Deng", "Mingfeng Xue", "Tianyi Bai", "Yang Fan", "Yubo Ma", "Yucheng Li", "Zeyu Cui", "Zhihai Wang", "Zhihui Xie", "Zhuorui Ye", "An Yang", "Dayiheng Liu", "Jingren Zhou", "Ning Ding"], "brief": "\u63d0\u51faQwen-AgentWorld\u7cfb\u5217\u8bed\u8a00\u4e16\u754c\u6a21\u578b\uff08\u6700\u5927397B-A17B\uff09\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u8bad\u7ec3\uff08CPT\u2192SFT\u2192RL\uff09\u5b66\u4e60\u73af\u5883\u72b6\u6001\u8f6c\u79fb\u52a8\u6001\uff0c\u65e2\u53ef\u4f5c\u4e3a\u89e3\u8026\u7684\u73af\u5883\u6a21\u62df\u5668\u652f\u6301\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\uff0c\u4e5f\u53ef\u4f5c\u4e3a\u7edf\u4e00\u57fa\u7840\u6a21\u578b\u63d0\u5347\u4e0b\u6e38\u667a\u80fd\u4f53\u4efb\u52a1\u6027\u80fd\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24597", "impact_score": 9, "is_agent": true, "is_top": true, "key_points": ["\u57fa\u4e8e\u8d851000\u4e07\u6761\u771f\u5b9e\u73af\u5883\u4ea4\u4e92\u8f68\u8ff9\uff0c\u8986\u76d67\u4e2a\u9886\u57df\uff0c\u91c7\u7528CPT+SFT+RL\u4e09\u9636\u6bb5\u8bad\u7ec3\u6d41\u7a0b\uff0cRL\u9636\u6bb5\u4f7f\u7528\u6df7\u5408\u8bc4\u5206\u89c4\u5219\u5956\u52b1\u63d0\u5347\u6a21\u62df\u4fdd\u771f\u5ea6", "\u6784\u5efaAgentWorldBench\u8bc4\u6d4b\u57fa\u51c6\uff0c\u57fa\u4e8e5\u4e2a\u524d\u6cbf\u6a21\u578b\u57289\u4e2a\u5df2\u6709\u57fa\u51c6\u4e0a\u7684\u771f\u5b9e\u4ea4\u4e92\u6570\u636e\uff0cQwen-AgentWorld\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u524d\u6cbf\u6a21\u578b", "\u53cc\u8303\u5f0f\u5e94\u7528\uff1a\u4f5c\u4e3a\u89e3\u8026\u6a21\u62df\u5668\u53ef\u751f\u6210\u5927\u89c4\u6a21\u53ef\u63a7\u8bad\u7ec3\u73af\u5883\uff08\u6548\u679c\u8d85\u8d8a\u7eaf\u771f\u5b9e\u73af\u5883\u8bad\u7ec3\uff09\uff1b\u4f5c\u4e3a\u7edf\u4e00\u57fa\u7840\u6a21\u578b\uff0c\u4e16\u754c\u6a21\u578b\u9884\u8bad\u7ec3\u57287\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u5747\u5e26\u6765\u6027\u80fd\u63d0\u5347"], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24597v1", "published_at": "2026-06-23", "score": 0.375, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "Qwen-AgentWorld: Language World Models for General Agents", "upvotes": 0, "what_it_is": "\u63d0\u51faQwen-AgentWorld\u7cfb\u5217\u8bed\u8a00\u4e16\u754c\u6a21\u578b\uff08\u6700\u5927397B-A17B\uff09\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u8bad\u7ec3\uff08CPT\u2192SFT\u2192RL\uff09\u5b66\u4e60\u73af\u5883\u72b6\u6001\u8f6c\u79fb\u52a8\u6001\uff0c\u65e2\u53ef\u4f5c\u4e3a\u89e3\u8026\u7684\u73af\u5883\u6a21\u62df\u5668\u652f\u6301\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\uff0c\u4e5f\u53ef\u4f5c\u4e3a\u7edf\u4e00\u57fa\u7840\u6a21\u578b\u63d0\u5347\u4e0b\u6e38\u667a\u80fd\u4f53\u4efb\u52a1\u6027\u80fd\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u5927\u89c4\u6a21\u8bed\u8a00\u4e16\u754c\u6a21\u578b\u5f15\u5165\u901a\u7528\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u540c\u65f6\u89e3\u51b3\u4e86\u667a\u80fd\u4f53\u8bad\u7ec3\u6570\u636e\u7a00\u7f3a\u548c\u73af\u5883\u6cdb\u5316\u4e24\u5927\u6838\u5fc3\u95ee\u9898\uff0c\u5f00\u6e90\u4ee3\u7801\u4e0e\u6a21\u578b\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Agentic language models dramatically expand the applications of AI yet little is publicly known about how to curate training data for broadly capable agents. Existing open efforts such as SWE-Smith, SERA, and Nemotron-Terminal typically target a single benchmark, leaving open the question of how to train models that generalize across diverse agentic tasks. The OpenThoughts-Agent (OT-Agent) project addresses this gap with a fully open data curation pipeline for training agentic models. We conduct more than 100 controlled ablation experiments to systematically investigate each stage of the pipeline, yielding insights on the importance of task sources and diversity. We then assemble a training set of 100K examples from our pipeline and fine-tune Qwen3-32B on this dataset, which yields an average accuracy of 44.8% across seven agentic benchmarks and a 3.9 percentage point improvement over the strongest existing open data agentic model (Nemotron-Terminal-32B, 40.9%). Moreover, our training data exhibits strong scaling properties, outperforming alternative open datasets at every training set size in compute-controlled comparisons. We publicly release our training sets, data pipeline, experimental data, and models at openthoughts.ai to support future open research on agentic model training.", "arxiv_id": "2606.24855", "arxiv_url": "https://arxiv.org/abs/2606.24855", "authors": ["Negin Raoof", "Richard Zhuang", "Marianna Nezhurina", "Etash Guha", "Atula Tejaswi", "Ryan Marten", "Charlie F. Ruan", "Tyler Griggs", "Alexander Glenn Shaw", "Hritik Bansal", "E. Kelly Buchanan", "Artem Gazizov", "Reinhard Heckel", "Chinmay Hegde", "Sankalp Jajee", "Daanish Khazi", "Emmanouil Koukoumidis", "Xiangyi Li", "Hange Liu", "Shlok Natarajan", "Harsh Raj", "Nicholas Roberts", "Ethan Shen", "Nishad Singhi", "Michael Siu", "Ashima Suvarna", "Hanwen Xing", "Patrick Yubeaton", "Robert Zhang", "Leon Liangyu Chen", "Xiaokun Chen", "Steven Dillmann", "Saadia Gabriel", "Xunyi Jiang", "Anurag Kashyap", "Boxuan Li", "Yein Park", "Minh Pham", "Sujay Sanghavi", "Lin Shi", "Ke Sun", "Yixin Wang", "Zhiwei Xu", "Erica Zhang", "Siyan Zhao", "Wanjia Zhao", "Jenia Jitsev", "Alex Dimakis", "Benjamin Feuer", "Ludwig Schmidt"], "brief": "OT-Agent\u63d0\u51fa\u4e86\u4e00\u5957\u5b8c\u5168\u5f00\u6e90\u7684\u667a\u80fd\u4f53\u6a21\u578b\u8bad\u7ec3\u6570\u636e\u7b5b\u9009\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7100+\u6d88\u878d\u5b9e\u9a8c\u7cfb\u7edf\u7814\u7a76\u6570\u636e\u914d\u65b9\uff0c\u5e76\u57fa\u4e8eQwen3-32B\u5fae\u8c03\u51fa\u57287\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u6700\u5f3a\u5f00\u6e90\u6570\u636e\u6a21\u578b\u7684\u901a\u7528\u667a\u80fd\u4f53\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24855", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u8fdb\u884c100+\u53d7\u63a7\u6d88\u878d\u5b9e\u9a8c\uff0c\u7cfb\u7edf\u7814\u7a76\u4efb\u52a1\u6765\u6e90\u591a\u6837\u6027\u5bf9\u667a\u80fd\u4f53\u6cdb\u5316\u80fd\u529b\u7684\u5f71\u54cd", "\u6784\u5efa10\u4e07\u6761\u8bad\u7ec3\u6837\u672c\uff0c\u5fae\u8c03Qwen3-32B\u540e\u8de87\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u5e73\u5747\u51c6\u786e\u738744.8%\uff0c\u6bd4\u6700\u5f3a\u57fa\u7ebfNemotron-Terminal-32B\u9ad83.9\u4e2a\u767e\u5206\u70b9", "\u8bad\u7ec3\u6570\u636e\u5177\u6709\u5f3a\u6269\u5c55\u6027\uff08scaling\uff09\uff0c\u5728\u8ba1\u7b97\u91cf\u53d7\u63a7\u7684\u5bf9\u6bd4\u4e2d\u4e8e\u5404\u8bad\u7ec3\u96c6\u89c4\u6a21\u4e0b\u5747\u4f18\u4e8e\u5176\u4ed6\u5f00\u6e90\u6570\u636e\u96c6"], "keywords": ["\u667a\u80fd\u4f53", "\u6570\u636e\u914d\u65b9", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5fae\u8c03"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24855v1", "published_at": "2026-06-23", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "OpenThoughts-Agent: Data Recipes for Agentic Models", "upvotes": 0, "what_it_is": "OT-Agent\u63d0\u51fa\u4e86\u4e00\u5957\u5b8c\u5168\u5f00\u6e90\u7684\u667a\u80fd\u4f53\u6a21\u578b\u8bad\u7ec3\u6570\u636e\u7b5b\u9009\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7100+\u6d88\u878d\u5b9e\u9a8c\u7cfb\u7edf\u7814\u7a76\u6570\u636e\u914d\u65b9\uff0c\u5e76\u57fa\u4e8eQwen3-32B\u5fae\u8c03\u51fa\u57287\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u6700\u5f3a\u5f00\u6e90\u6570\u636e\u6a21\u578b\u7684\u901a\u7528\u667a\u80fd\u4f53\u3002", "why_notable": "\u73b0\u6709\u5f00\u6e90\u667a\u80fd\u4f53\u8bad\u7ec3\u5de5\u4f5c\u591a\u9488\u5bf9\u5355\u4e00\u57fa\u51c6\uff0cOT-Agent\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u7814\u7a76\u5982\u4f55\u6784\u5efa\u8de8\u4efb\u52a1\u6cdb\u5316\u7684\u667a\u80fd\u4f53\u8bad\u7ec3\u6570\u636e\uff0c\u5e76\u5b8c\u5168\u5f00\u6e90\u6570\u636e\u96c6\u3001\u6d41\u6c34\u7ebf\u53ca\u6a21\u578b\uff0c\u5bf9\u63a8\u52a8\u5f00\u6e90\u667a\u80fd\u4f53\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Computer-Use Agents (CUAs) execute high-level user goals by perceiving and acting directly within graphical user interfaces. However, reinforcement learning for CUAs remains difficult because open-ended desktop environments rarely provide scalable, machine-readable reward signals: task success is often visually grounded and hard to specify with handcrafted reward functions or dense manual labels. We propose an RL fine-tuning framework that uses autonomous vision-language evaluation as a scalable supervision signal for GUI agents. Given a final screenshot and the original instruction, a Vision-Language Model judges task completion and provides terminal feedback without task-specific heuristics or manual labels during policy optimization. Because autonomous evaluators are imperfect, we model their feedback as a noisy binary reward channel and derive a noise-corrected reward estimator for Proximal Policy Optimization. Experiments across macOSWorld, Windows Agent Arena, and OSWorld show that corrected evaluator rewards outperform both zero-shot baselines and raw evaluator rewards, improving success rates by an average of 12.6 percentage points over zero-shot performance and 5.1 points over raw evaluator fine-tuning. These results suggest that autonomous evaluation can serve as a practical reward signal for RL in GUI environments when evaluator noise is explicitly modeled and corrected.", "arxiv_id": "2606.24515", "arxiv_url": "https://arxiv.org/abs/2606.24515", "authors": ["Marta Sumyk", "Oleksandr Kosovan"], "brief": "\u63d0\u51fa\u4e00\u79cd\u9762\u5411\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u7684\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u6846\u67b6\uff0c\u5229\u7528\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u81ea\u4e3b\u8bc4\u4f30\u4efb\u52a1\u5b8c\u6210\u60c5\u51b5\u4f5c\u4e3a\u5956\u52b1\u4fe1\u53f7\uff0c\u5e76\u9488\u5bf9\u8bc4\u4f30\u5668\u566a\u58f0\u8bbe\u8ba1\u4e86\u566a\u58f0\u6821\u6b63\u5956\u52b1\u4f30\u8ba1\u5668\u7528\u4e8ePPO\u4f18\u5316\u3002", "categories": ["cs.AI", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24515", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7528VLM\u5bf9\u6700\u7ec8\u622a\u56fe\u8fdb\u884c\u4efb\u52a1\u5b8c\u6210\u5224\u65ad\uff0c\u66ff\u4ee3\u4eba\u5de5\u6807\u6ce8\u6216\u624b\u5de5\u89c4\u5219\uff0c\u5b9e\u73b0\u53ef\u6269\u5c55\u7684\u5956\u52b1\u4fe1\u53f7", "\u5c06\u81ea\u4e3b\u8bc4\u4f30\u5668\u5efa\u6a21\u4e3a\u566a\u58f0\u4e8c\u5143\u5956\u52b1\u901a\u9053\uff0c\u63a8\u5bfc\u566a\u58f0\u6821\u6b63\u5956\u52b1\u4f30\u8ba1\u5668\u4ee5\u51cf\u5c11\u8bef\u5bfc\u6027\u53cd\u9988", "\u5728macOSWorld\u3001Windows Agent Arena\u3001OSWorld\u4e09\u4e2a\u57fa\u51c6\u4e0a\uff0c\u76f8\u6bd4\u96f6\u6837\u672c\u57fa\u7ebf\u5e73\u5747\u63d0\u534712.6\u4e2a\u767e\u5206\u70b9\uff0c\u76f8\u6bd4\u539f\u59cb\u8bc4\u4f30\u5668\u5fae\u8c03\u63d0\u53475.1\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "GUI", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24515v1", "published_at": "2026-06-23", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Reinforcement Learning for Computer-Use Agents with Autonomous Evaluation", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u9762\u5411\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u7684\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u6846\u67b6\uff0c\u5229\u7528\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u81ea\u4e3b\u8bc4\u4f30\u4efb\u52a1\u5b8c\u6210\u60c5\u51b5\u4f5c\u4e3a\u5956\u52b1\u4fe1\u53f7\uff0c\u5e76\u9488\u5bf9\u8bc4\u4f30\u5668\u566a\u58f0\u8bbe\u8ba1\u4e86\u566a\u58f0\u6821\u6b63\u5956\u52b1\u4f30\u8ba1\u5668\u7528\u4e8ePPO\u4f18\u5316\u3002", "why_notable": "\u89e3\u51b3\u4e86GUI\u73af\u5883\u4e2dRL\u8bad\u7ec3\u7f3a\u4e4f\u53ef\u6269\u5c55\u5956\u52b1\u4fe1\u53f7\u7684\u6838\u5fc3\u96be\u9898\uff0c\u566a\u58f0\u6821\u6b63\u673a\u5236\u5177\u6709\u901a\u7528\u6027\uff0c\u4e3a\u5f00\u653e\u684c\u9762\u73af\u5883\u4e0b\u7684\u667a\u80fd\u4f53\u8bad\u7ec3\u63d0\u4f9b\u4e86\u5b9e\u7528\u65b9\u6848\u3002"}, {"abstract": "Computer-use agents turn vision-language model (VLM) predictions into executable GUI clicks, so reliable uncertainty estimates are essential for rejection, calibration, miss-severity ranking, and spatial safety regions. Yet evidence on post-hoc uncertainty quantification (UQ) for these agents is fragmented across isolated model and dataset pairs, leaving it unclear whether UQ rankings stay stable when the agent, benchmark, or observable interface changes. We present Argus, a cross-regime benchmark for post-hoc UQ in single-step executable GUI grounding: a 27-method open-weight matrix over 4 VLM agents and 4 datasets, plus an 8-method closed-source matrix across 3 frontier vendors where logits, hidden states, and attention maps are unavailable. Evaluated methods span logit-based scores, sampling and consistency measures, hidden-state and density estimators (Mahalanobis, SAPLMA), attention-based scores, P(True) and verbalised-confidence prompting, and split-conformal prediction. The main finding is selective transfer: UQ rankings are stable across datasets for a fixed model, but degrade across model classes and observable interfaces. Hidden-state and density methods are the most stable open-weight family, while CoCoA-1MCA, Focus, sampling-based scores, and verbalised self-assessment win in specific regimes. Within-model ranking transfer is strong (Spearman rho up to 0.969), but cross-tier transfer to closed-source vendors averages only +0.08, so closed-source UQ should be reranked on the target rather than extrapolated. Conformal click regions show score-level discrimination is not enough for deployment: locally weighted disks shrink radii by 40-60% when the plug-in UQ is calibrated, but coverage degrades under calibration-test or interface mismatch. We release per-item records, calibration/test splits, UQ scores, and analysis scripts for regime-aware UQ selection in GUI agents.", "arxiv_id": "2606.25760", "arxiv_url": "https://arxiv.org/abs/2606.25760", "authors": ["Divake Kumar", "Sina Tayebati", "Devashri Naik", "Amanda Sofie Rios", "Nilesh Ahuja", "Omesh Tickoo", "Ranganath Krishnan", "Amit Ranjan Trivedi"], "brief": "\u63d0\u51faArgus\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u4e2d\u540e\u9a8c\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\uff08UQ\uff09\u65b9\u6cd5\u7684\u8de8\u573a\u666f\u7a33\u5b9a\u6027\uff0c\u8986\u76d627\u79cd\u65b9\u6cd5\u00d74\u4e2a\u5f00\u6e90VLM\u00d74\u4e2aGUI\u6570\u636e\u96c6\uff0c\u4ee5\u53ca8\u79cd\u65b9\u6cd5\u00d73\u4e2a\u95ed\u6e90\u524d\u6cbf\u6a21\u578b\u7684\u5168\u9762\u77e9\u9635\u5b9e\u9a8c\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25760", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u53d1\u73b0\u4e3a\u0027\u9009\u62e9\u6027\u8fc1\u79fb\u0027\uff1aUQ\u6392\u540d\u5728\u540c\u4e00\u6a21\u578b\u8de8\u6570\u636e\u96c6\u65f6\u7a33\u5b9a\uff08Spearman \u03c1\u6700\u9ad80.969\uff09\uff0c\u4f46\u8de8\u6a21\u578b\u7c7b\u522b\u6216\u53ef\u89c2\u6d4b\u63a5\u53e3\u65f6\u663e\u8457\u9000\u5316", "\u9690\u85cf\u72b6\u6001\u4e0e\u5bc6\u5ea6\u4f30\u8ba1\u65b9\u6cd5\uff08Mahalanobis\u3001SAPLMA\uff09\u662f\u5f00\u6e90\u6a21\u578b\u4e2d\u6700\u7a33\u5b9a\u7684UQ\u5bb6\u65cf\uff1b\u95ed\u6e90\u6a21\u578b\u8de8\u5c42\u8fc1\u79fb\u5e73\u5747\u4ec5+0.08\uff0c\u9700\u5728\u76ee\u6807\u6a21\u578b\u4e0a\u91cd\u65b0\u6392\u5e8f", "\u4fdd\u5f62\u9884\u6d4b\u70b9\u51fb\u533a\u57df\u5b9e\u9a8c\u663e\u793a\uff1a\u7ecf\u8fc7\u826f\u597d\u6821\u51c6\u7684UQ\u53ef\u5c06\u7f6e\u4fe1\u533a\u57df\u534a\u5f84\u7f29\u5c0f40-60%\uff0c\u4f46\u5728\u6821\u51c6-\u6d4b\u8bd5\u5206\u5e03\u4e0d\u5339\u914d\u65f6\u8986\u76d6\u7387\u4e0b\u964d"], "keywords": ["\u667a\u80fd\u4f53", "\u4e0d\u786e\u5b9a\u6027\u91cf\u5316", "\u591a\u6a21\u6001", "GUI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25760v1", "published_at": "2026-06-24", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Uncertainty Quantification for Computer-Use Agents: A Benchmark across Vision-Language Models and GUI Grounding Datasets", "upvotes": 0, "what_it_is": "\u63d0\u51faArgus\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u4e2d\u540e\u9a8c\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\uff08UQ\uff09\u65b9\u6cd5\u7684\u8de8\u573a\u666f\u7a33\u5b9a\u6027\uff0c\u8986\u76d627\u79cd\u65b9\u6cd5\u00d74\u4e2a\u5f00\u6e90VLM\u00d74\u4e2aGUI\u6570\u636e\u96c6\uff0c\u4ee5\u53ca8\u79cd\u65b9\u6cd5\u00d73\u4e2a\u95ed\u6e90\u524d\u6cbf\u6a21\u578b\u7684\u5168\u9762\u77e9\u9635\u5b9e\u9a8c\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9GUI\u667a\u80fd\u4f53UQ\u7684\u7cfb\u7edf\u6027\u8de8\u573a\u666f\u57fa\u51c6\uff0c\u586b\u8865\u4e86\u8be5\u9886\u57df\u788e\u7247\u5316\u7814\u7a76\u7684\u7a7a\u767d\uff0c\u4e3a\u5b9e\u9645\u90e8\u7f72\u4e2d\u7684\u62d2\u7edd\u51b3\u7b56\u3001\u7a7a\u95f4\u5b89\u5168\u533a\u57df\u7b49\u63d0\u4f9b\u4e86\u5b9e\u8bc1\u6307\u5bfc\uff0c\u5e76\u5f00\u6e90\u5168\u90e8\u6570\u636e\u4e0e\u4ee3\u7801"}, {"abstract": "Long-term robot deployment requires a compact and scalable memory that preserves fine-grained visual semantics, grounds observations in space and time, and enables efficient storage and retrieval. In this paper, we propose RAVEN, an agentic memory system for long-horizon robotic question answering and navigation. RAVEN stores visual embeddings with pose and time in a vector database, and grounds retrieval in a spatial map to answer queries and navigate to goals. By operating directly on visual embeddings, RAVEN avoids lossy image-to-text captioning and enables accurate semantic, spatial, and temporal retrieval at scale. Across several simulated and real-world video question-answering benchmarks, RAVEN consistently surpasses caption-based memory systems and matches frontier VLMs on long-horizon tasks at 10$\\times$ lower retrieval cost. Finally, we instantiate RAVEN on a Unitree Go1 robot for the task of long-horizon navigation for natural language goal-reaching, and show successful deployment over several large indoor environments.", "arxiv_id": "2606.25206", "arxiv_url": "https://arxiv.org/abs/2606.25206", "authors": ["Yixun Hu", "Zhicheng Zheng", "Lihan Zha", "Chunwei Xing", "Rajdeep Singh", "Omar Hossain", "Antonio Loquercio", "Dhruv Shah"], "brief": "\u63d0\u51faRAVEN\uff0c\u4e00\u79cd\u9762\u5411\u957f\u65f6\u7a0b\u673a\u5668\u4eba\u4efb\u52a1\u7684\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u5c06\u89c6\u89c9\u5d4c\u5165\u4e0e\u4f4d\u59ff\u3001\u65f6\u95f4\u4fe1\u606f\u5b58\u5165\u5411\u91cf\u6570\u636e\u5e93\uff0c\u5e76\u7ed3\u5408\u7a7a\u95f4\u5730\u56fe\u5b9e\u73b0\u9ad8\u6548\u68c0\u7d22\uff0c\u652f\u6301\u95ee\u7b54\u4e0e\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u5bfc\u822a\u3002", "categories": ["cs.RO", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25206", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u76f4\u63a5\u64cd\u4f5c\u89c6\u89c9\u5d4c\u5165\u800c\u975e\u56fe\u50cf\u8f6c\u6587\u5b57\u63cf\u8ff0\uff0c\u907f\u514d\u8bed\u4e49\u635f\u5931\uff0c\u652f\u6301\u8bed\u4e49\u3001\u7a7a\u95f4\u3001\u65f6\u95f4\u591a\u7ef4\u68c0\u7d22", "\u68c0\u7d22\u6210\u672c\u4ec5\u4e3a\u524d\u6cbfVLM\u76841/10\uff0c\u540c\u65f6\u5728\u957f\u65f6\u7a0b\u4efb\u52a1\u4e0a\u6027\u80fd\u6301\u5e73\u6216\u8d85\u8d8a\u57fa\u4e8e\u63cf\u8ff0\u7684\u8bb0\u5fc6\u7cfb\u7edf", "\u5728Unitree Go1\u673a\u5668\u4eba\u4e0a\u5b9e\u9645\u90e8\u7f72\uff0c\u6210\u529f\u5b8c\u6210\u5927\u578b\u5ba4\u5185\u73af\u5883\u4e2d\u7684\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u5bfc\u822a"], "keywords": ["\u667a\u80fd\u4f53", "\u673a\u5668\u4eba\u5bfc\u822a", "\u591a\u6a21\u6001", "\u8bb0\u5fc6\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25206v1", "published_at": "2026-06-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RAVEN: Long-Horizon Reasoning \u0026 Navigation with a Visuo-Spatio-Temporal Memory", "upvotes": 0, "what_it_is": "\u63d0\u51faRAVEN\uff0c\u4e00\u79cd\u9762\u5411\u957f\u65f6\u7a0b\u673a\u5668\u4eba\u4efb\u52a1\u7684\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u5c06\u89c6\u89c9\u5d4c\u5165\u4e0e\u4f4d\u59ff\u3001\u65f6\u95f4\u4fe1\u606f\u5b58\u5165\u5411\u91cf\u6570\u636e\u5e93\uff0c\u5e76\u7ed3\u5408\u7a7a\u95f4\u5730\u56fe\u5b9e\u73b0\u9ad8\u6548\u68c0\u7d22\uff0c\u652f\u6301\u95ee\u7b54\u4e0e\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u5bfc\u822a\u3002", "why_notable": "\u89e3\u51b3\u4e86\u957f\u671f\u673a\u5668\u4eba\u90e8\u7f72\u4e2d\u8bb0\u5fc6\u53ef\u6269\u5c55\u6027\u4e0e\u8bed\u4e49\u4fdd\u771f\u5ea6\u7684\u6838\u5fc3\u77db\u76fe\uff0c\u4ee5\u6781\u4f4e\u8ba1\u7b97\u6210\u672c\u5b9e\u73b0\u5ab2\u7f8e\u5927\u6a21\u578b\u7684\u957f\u65f6\u7a0b\u63a8\u7406\uff0c\u5e76\u5b8c\u6210\u771f\u5b9e\u673a\u5668\u4eba\u9a8c\u8bc1\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language model (LLM) agents rely on long-term memory to support extended interactions and personalized assistance beyond finite context windows. Existing memory agents actively update external memory through generated write, revise, and delete operations, but these updates may omit important information, corrupt existing memory, or introduce unsupported hallucinated content. Once stored, such errors become persistent system-state failures that can affect future reasoning and generation. In this paper, we propose TrustMem, a framework designed to improve the trustworthiness of memory consolidation. TrustMem relies on a Memory Transition Verifier to evaluate the transition process of memory updates in terms of coverage, preservation, and faithfulness. It further constructs preference pairs among candidate updates under the same memory state, enabling preference-guided reinforcement learning to directly optimize memory updating behaviors. Extensive experiments demonstrate that TrustMem improves both memory utility and reliability: it achieves state-of-the-art results across MemoryAgentBench, HaluMem, and the Mem-alpha validation set, improves HaluMem memory extraction by 12.14 F1 points, and reduces transition-level omission, corruption, and hallucination by 40.1\\%, 79.1\\%, and 50.0\\%, respectively, compared with the strongest baseline for each error type.", "arxiv_id": "2606.25161", "arxiv_url": "https://arxiv.org/abs/2606.25161", "authors": ["Tianyu Yang", "Sudipta Paul", "Vijay Srinivasan", "Vivek Kulkarni", "Srinivas Chappidi"], "brief": "\u63d0\u51faTrustMem\u6846\u67b6\uff0c\u901a\u8fc7\u8bb0\u5fc6\u8f6c\u6362\u9a8c\u8bc1\u5668\u8bc4\u4f30\u8bb0\u5fc6\u66f4\u65b0\u7684\u8986\u76d6\u6027\u3001\u4fdd\u7559\u6027\u548c\u5fe0\u5b9e\u6027\uff0c\u5e76\u6784\u5efa\u504f\u597d\u5bf9\u8fdb\u884c\u5f3a\u5316\u5b66\u4e60\uff0c\u4f18\u5316LLM\u667a\u80fd\u4f53\u7684\u957f\u671f\u8bb0\u5fc6\u6574\u5408\u884c\u4e3a\uff0c\u51cf\u5c11\u9057\u6f0f\u3001\u635f\u574f\u548c\u5e7b\u89c9\u9519\u8bef\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25161", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u8bbe\u8ba1Memory Transition Verifier\u4ece\u8986\u76d6\u6027\u3001\u4fdd\u7559\u6027\u3001\u5fe0\u5b9e\u6027\u4e09\u4e2a\u7ef4\u5ea6\u8bc4\u4f30\u8bb0\u5fc6\u66f4\u65b0\u8d28\u91cf", "\u6784\u5efa\u540c\u4e00\u8bb0\u5fc6\u72b6\u6001\u4e0b\u7684\u5019\u9009\u66f4\u65b0\u504f\u597d\u5bf9\uff0c\u901a\u8fc7\u504f\u597d\u5f15\u5bfc\u5f3a\u5316\u5b66\u4e60\u76f4\u63a5\u4f18\u5316\u8bb0\u5fc6\u5199\u5165\u884c\u4e3a", "\u5728MemoryAgentBench\u3001HaluMem\u7b49\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u8bb0\u5fc6\u63d0\u53d6F1\u63d0\u534712.14\u5206\uff0c\u9057\u6f0f/\u635f\u574f/\u5e7b\u89c9\u5206\u522b\u964d\u4f4e40.1%/79.1%/50.0%"], "keywords": ["\u667a\u80fd\u4f53", "\u957f\u671f\u8bb0\u5fc6", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25161v1", "published_at": "2026-06-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "TRUSTMEM: Learning Trustworthy Memory Consolidation for LLM Agents with Long-Term Memory", "upvotes": 0, "what_it_is": "\u63d0\u51faTrustMem\u6846\u67b6\uff0c\u901a\u8fc7\u8bb0\u5fc6\u8f6c\u6362\u9a8c\u8bc1\u5668\u8bc4\u4f30\u8bb0\u5fc6\u66f4\u65b0\u7684\u8986\u76d6\u6027\u3001\u4fdd\u7559\u6027\u548c\u5fe0\u5b9e\u6027\uff0c\u5e76\u6784\u5efa\u504f\u597d\u5bf9\u8fdb\u884c\u5f3a\u5316\u5b66\u4e60\uff0c\u4f18\u5316LLM\u667a\u80fd\u4f53\u7684\u957f\u671f\u8bb0\u5fc6\u6574\u5408\u884c\u4e3a\uff0c\u51cf\u5c11\u9057\u6f0f\u3001\u635f\u574f\u548c\u5e7b\u89c9\u9519\u8bef\u3002", "why_notable": "\u957f\u671f\u8bb0\u5fc6\u4e2d\u7684\u6301\u4e45\u6027\u9519\u8bef\u662fLLM\u667a\u80fd\u4f53\u7684\u5173\u952e\u75db\u70b9\uff0cTrustMem\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u53ef\u4fe1\u5ea6\u9a8c\u8bc1\u4e0e\u5f3a\u5316\u5b66\u4e60\u7ed3\u5408\u7528\u4e8e\u8bb0\u5fc6\u6574\u5408\uff0c\u5927\u5e45\u964d\u4f4e\u4e09\u7c7b\u6838\u5fc3\u9519\u8bef\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u7684\u4e2a\u6027\u5316AI\u52a9\u624b\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Tool-integrated LLM agents are often wrapped within a harness: the scaffolding that determines which tools are exposed, how they are described, and what auxiliary information accompanies each per-step observation. While agents are routinely post-trained, this scaffolding is typically treated as a fixed engineering detail, with design effort limited to the training-free regime. Moreover, existing post-training algorithms assume a static environment, even though tool environments and tasks often shift upon deployment. To address this gap, we extend $\\texttt{ALFWorld}$ (i) to treat the harness as a controllable design dimension and (ii) to support evaluation under task and tool environment shifts. Building on this, we systematically analyze how the harness design influences post-training in both in-distribution and out-of-distribution (OOD) settings. We empirically show that harness-aware post-training not only improves in-distribution performance but also enables agents to robustly adapt to OOD settings. Under a harness with minimal design effort, post-training suffers a drastic performance drop under stronger tool environment shifts, further highlighting the importance of harness-aware post-training under such shifts.", "arxiv_id": "2606.25447", "arxiv_url": "https://arxiv.org/abs/2606.25447", "authors": ["Kyungmin Kim", "Youngbin Choi", "Seoyeon Lee", "Suhyeon Jun", "Dongwoo Kim", "Sangdon Park"], "brief": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86\u5de5\u5177\u96c6\u6210LLM\u667a\u80fd\u4f53\u4e2d\"\u811a\u624b\u67b6\"\uff08harness\uff09\u8bbe\u8ba1\u4e0e\u540e\u8bad\u7ec3\u7b97\u6cd5\u7684\u76f8\u4e92\u4f5c\u7528\uff0c\u6269\u5c55ALFWorld\u6846\u67b6\u5c06\u811a\u624b\u67b6\u4f5c\u4e3a\u53ef\u63a7\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u5e76\u5728\u4efb\u52a1/\u5de5\u5177\u73af\u5883\u504f\u79fb\u573a\u666f\u4e0b\u8bc4\u4f30\u5176\u5f71\u54cd\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25447", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u811a\u624b\u67b6\uff08\u5de5\u5177\u63cf\u8ff0\u3001\u8f85\u52a9\u4fe1\u606f\u7b49\uff09\u7eb3\u5165\u540e\u8bad\u7ec3\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u6253\u7834\u5176\u4f5c\u4e3a\u56fa\u5b9a\u5de5\u7a0b\u7ec6\u8282\u7684\u4f20\u7edf\u5047\u8bbe", "\u5b9e\u9a8c\u8868\u660e\u611f\u77e5\u811a\u624b\u67b6\u7684\u540e\u8bad\u7ec3\uff08harness-aware post-training\uff09\u4e0d\u4ec5\u63d0\u5347\u5206\u5e03\u5185\u6027\u80fd\uff0c\u8fd8\u80fd\u589e\u5f3a\u5206\u5e03\u5916\uff08OOD\uff09\u6cdb\u5316\u9c81\u68d2\u6027", "\u5728\u6700\u5c0f\u8bbe\u8ba1\u6295\u5165\u7684\u811a\u624b\u67b6\u4e0b\uff0c\u906d\u9047\u8f83\u5f3a\u5de5\u5177\u73af\u5883\u504f\u79fb\u65f6\u540e\u8bad\u7ec3\u6027\u80fd\u6025\u5267\u4e0b\u964d\uff0c\u51f8\u663e\u811a\u624b\u67b6\u8bbe\u8ba1\u7684\u5173\u952e\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u540e\u8bad\u7ec3", "\u5de5\u5177\u4f7f\u7528", "\u6cdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25447v1", "published_at": "2026-06-24", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Interplay of Harness Design and Post-Training in LLM Agents", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86\u5de5\u5177\u96c6\u6210LLM\u667a\u80fd\u4f53\u4e2d\"\u811a\u624b\u67b6\"\uff08harness\uff09\u8bbe\u8ba1\u4e0e\u540e\u8bad\u7ec3\u7b97\u6cd5\u7684\u76f8\u4e92\u4f5c\u7528\uff0c\u6269\u5c55ALFWorld\u6846\u67b6\u5c06\u811a\u624b\u67b6\u4f5c\u4e3a\u53ef\u63a7\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u5e76\u5728\u4efb\u52a1/\u5de5\u5177\u73af\u5883\u504f\u79fb\u573a\u666f\u4e0b\u8bc4\u4f30\u5176\u5f71\u54cd\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u811a\u624b\u67b6\u8bbe\u8ba1\u4e0e\u540e\u8bad\u7ec3\u7684\u8026\u5408\u5173\u7cfb\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u4e2d\u9762\u4e34\u73af\u5883\u504f\u79fb\u7684LLM\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u6307\u5bfc\u4ef7\u503c"}, {"abstract": "GUI agents powered by vision-language models show strong potential for automating digital tasks, yet frequently fail in long-horizon scenarios due to the absence of step-level verification. Existing process reward models verify actions through textual reasoning alone, missing the visual nature of GUI state changes. We introduce VisCritic, a visual process reward framework that verifies agent actions by directly comparing pre-action and post-action screenshots in visual feature space. VisCritic employs a Siamese vision transformer to extract change-aware representations, coupled with an Action-Aware Critic Head that jointly evaluates action success, task progress, and error type. A critic-training data construction pipeline generates weakly supervised samples from existing trajectories without additional human labels for critic training. Experiments and offline analyses across five benchmarks demonstrate that VisCritic serves as a plug-and-play enhancement for diverse GUI agents, generally improving benchmark metrics while providing visual diagnostic cues.", "arxiv_id": "2606.24525", "arxiv_url": "https://arxiv.org/abs/2606.24525", "authors": ["Jiachen Qian"], "brief": "\u63d0\u51faVisCritic\u6846\u67b6\uff0c\u901a\u8fc7\u76f4\u63a5\u6bd4\u8f83\u64cd\u4f5c\u524d\u540e\u622a\u56fe\u7684\u89c6\u89c9\u7279\u5f81\u6765\u9a8c\u8bc1GUI\u667a\u80fd\u4f53\u7684\u6bcf\u6b65\u52a8\u4f5c\u662f\u5426\u6210\u529f\uff0c\u89e3\u51b3\u957f\u4efb\u52a1\u573a\u666f\u4e2d\u7f3a\u4e4f\u6b65\u9aa4\u7ea7\u9a8c\u8bc1\u7684\u95ee\u9898\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24525", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u91c7\u7528\u5b6a\u751f\u89c6\u89c9Transformer\u63d0\u53d6\u53d8\u5316\u611f\u77e5\u8868\u793a\uff0c\u6355\u6349GUI\u72b6\u6001\u524d\u540e\u5dee\u5f02", "\u8bbe\u8ba1\u52a8\u4f5c\u611f\u77e5\u8bc4\u5224\u5934\uff08Action-Aware Critic Head\uff09\uff0c\u8054\u5408\u8bc4\u4f30\u52a8\u4f5c\u6210\u529f\u7387\u3001\u4efb\u52a1\u8fdb\u5ea6\u548c\u9519\u8bef\u7c7b\u578b", "\u6784\u5efa\u5f31\u76d1\u7763\u8bad\u7ec3\u6570\u636e\u6d41\u6c34\u7ebf\uff0c\u65e0\u9700\u989d\u5916\u4eba\u5de5\u6807\u6ce8\u5373\u53ef\u4ece\u5df2\u6709\u8f68\u8ff9\u751f\u6210\u8bad\u7ec3\u6837\u672c", "\u5728\u4e94\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u9a8c\u8bc1\u4e3a\u5373\u63d2\u5373\u7528\u6a21\u5757\uff0c\u53ef\u589e\u5f3a\u591a\u79cdGUI\u667a\u80fd\u4f53\u6027\u80fd"], "keywords": ["\u667a\u80fd\u4f53", "GUI", "\u591a\u6a21\u6001", "\u8fc7\u7a0b\u5956\u52b1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24525v1", "published_at": "2026-06-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "VisCritic: Visual State Comparison as Process Reward for GUI Agents", "upvotes": 0, "what_it_is": "\u63d0\u51faVisCritic\u6846\u67b6\uff0c\u901a\u8fc7\u76f4\u63a5\u6bd4\u8f83\u64cd\u4f5c\u524d\u540e\u622a\u56fe\u7684\u89c6\u89c9\u7279\u5f81\u6765\u9a8c\u8bc1GUI\u667a\u80fd\u4f53\u7684\u6bcf\u6b65\u52a8\u4f5c\u662f\u5426\u6210\u529f\uff0c\u89e3\u51b3\u957f\u4efb\u52a1\u573a\u666f\u4e2d\u7f3a\u4e4f\u6b65\u9aa4\u7ea7\u9a8c\u8bc1\u7684\u95ee\u9898\u3002", "why_notable": "\u73b0\u6709\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\u4ec5\u4f9d\u8d56\u6587\u672c\u63a8\u7406\u9a8c\u8bc1\u52a8\u4f5c\uff0c\u5ffd\u89c6GUI\u72b6\u6001\u53d8\u5316\u7684\u89c6\u89c9\u672c\u8d28\uff1bVisCritic\u586b\u8865\u4e86\u89c6\u89c9\u5c42\u9762\u6b65\u9aa4\u9a8c\u8bc1\u7684\u7a7a\u767d\uff0c\u4e14\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u5373\u53ef\u8bad\u7ec3\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Software performance optimization is a notoriously complex and manual task. Despite the growing use of Large Language Models (LLMs) for code refinement, we still lack benchmarks that capture how optimization actually happens in real-world codebases. Existing frameworks often oversimplify the problem by focusing on isolated functions or a single performance metric, missing the critical trade-offs between execution time and memory footprint, the inherent noise of the measurement environment, and the variability introduced by different input data and execution conditions. We address this by introducing SWE-Pro, a repository-level benchmark derived from 102 expert-written optimizations from open-source projects. Unlike previous benchmarks, SWE-Pro pairs each task with parameterized tests to evaluate runtime, peak memory, and Time-Weighted Memory Usage (TWMU) across varying input data and execution conditions under noise-aware measurement conditions. Our evaluation shows that current LLMs struggle significantly: runtime gains are negligible, and memory optimizations are nearly non-existent. This stands in sharp contrast to expert implementations, which achieve an aggregate speedup of 15.5x and peak memory reduction of 171.3x over benchmark tasks. Expert-written improvements are observed in 91.2% of tasks for runtime and 65.7% for peak memory. Our findings expose a substantial gap between current LLM capabilities and the demands of expert-level engineering.", "arxiv_id": "2606.25530", "arxiv_url": "https://arxiv.org/abs/2606.25530", "authors": ["Ezgi Sar\u0131kayak", "Wenchao Gu", "Hesham Ghonim", "Chunyang Chen"], "brief": "\u63d0\u51faSWE-Pro\u2014\u2014\u4e00\u4e2a\u6765\u81ea102\u4e2a\u5f00\u6e90\u9879\u76ee\u4e13\u5bb6\u7ea7\u4f18\u5316\u6848\u4f8b\u7684\u4ed3\u5e93\u7ea7\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u5728\u771f\u5b9e\u8f6f\u4ef6\u6027\u80fd\u4f18\u5316\u4efb\u52a1\u4e2d\u7684\u80fd\u529b\uff0c\u540c\u65f6\u8003\u91cf\u8fd0\u884c\u65f6\u95f4\u3001\u5cf0\u503c\u5185\u5b58\u548c\u65f6\u95f4\u52a0\u6743\u5185\u5b58\u4f7f\u7528\u7387\u7b49\u591a\u7ef4\u6307\u6807\u3002", "categories": ["cs.SE", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25530", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4e13\u5bb6\u5b9e\u73b0\u5728\u57fa\u51c6\u4efb\u52a1\u4e0a\u5e73\u5747\u52a0\u901f15.5\u500d\u3001\u5cf0\u503c\u5185\u5b58\u964d\u4f4e171.3\u500d\uff0c\u800c\u5f53\u524dLLM\u7684\u4f18\u5316\u6548\u679c\u51e0\u4e4e\u53ef\u5ffd\u7565\u4e0d\u8ba1", "\u5f15\u5165Time-Weighted Memory Usage\uff08TWMU\uff09\u65b0\u6307\u6807\uff0c\u5e76\u5728\u566a\u58f0\u611f\u77e5\u6d4b\u91cf\u6761\u4ef6\u4e0b\u8bc4\u4f30\u4e0d\u540c\u8f93\u5165\u6570\u636e\u548c\u6267\u884c\u6761\u4ef6\u4e0b\u7684\u6027\u80fd", "\u4e13\u5bb6\u4f18\u5316\u572891.2%\u7684\u4efb\u52a1\u4e2d\u6539\u5584\u4e86\u8fd0\u884c\u65f6\u95f4\uff0c65.7%\u7684\u4efb\u52a1\u4e2d\u6539\u5584\u4e86\u5cf0\u503c\u5185\u5b58\uff0cLLM\u5747\u8fdc\u672a\u8fbe\u5230\u6b64\u6c34\u5e73"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25530v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Evaluating LLMs on Real-World Software Performance Optimization", "upvotes": 0, "what_it_is": "\u63d0\u51faSWE-Pro\u2014\u2014\u4e00\u4e2a\u6765\u81ea102\u4e2a\u5f00\u6e90\u9879\u76ee\u4e13\u5bb6\u7ea7\u4f18\u5316\u6848\u4f8b\u7684\u4ed3\u5e93\u7ea7\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u5728\u771f\u5b9e\u8f6f\u4ef6\u6027\u80fd\u4f18\u5316\u4efb\u52a1\u4e2d\u7684\u80fd\u529b\uff0c\u540c\u65f6\u8003\u91cf\u8fd0\u884c\u65f6\u95f4\u3001\u5cf0\u503c\u5185\u5b58\u548c\u65f6\u95f4\u52a0\u6743\u5185\u5b58\u4f7f\u7528\u7387\u7b49\u591a\u7ef4\u6307\u6807\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9\u771f\u5b9e\u4ee3\u7801\u5e93\u6027\u80fd\u4f18\u5316\u7684\u4ed3\u5e93\u7ea7\u57fa\u51c6\uff0c\u586b\u8865\u4e86\u73b0\u6709\u8bc4\u6d4b\u6846\u67b6\u8fc7\u5ea6\u7b80\u5316\uff08\u4ec5\u5173\u6ce8\u5b64\u7acb\u51fd\u6570\u6216\u5355\u4e00\u6307\u6807\uff09\u7684\u7a7a\u767d\uff0c\u91cf\u5316\u63ed\u793a\u4e86LLM\u4e0e\u4e13\u5bb6\u5de5\u7a0b\u5e08\u4e4b\u95f4\u7684\u80fd\u529b\u9e3f\u6c9f\uff0c\u5bf9\u4ee3\u7801LLM\u7814\u7a76\u65b9\u5411\u5177\u6709\u91cd\u8981\u6307\u5f15\u4ef7\u503c\u3002"}, {"abstract": "Large language models (LLMs) reach high accuracy in mathematical reasoning, but individual traces on the same problem diverge; some arrive at the correct answer while others fail. Prior work analyzes failure at the step, chunk, or sentence level, or at tokens where failure has already occurred. Neither identifies the precise token that triggers the shift toward failure. We introduce the cliff token, a token where the token-wise potential drops significantly under an adaptive threshold that scales with the local token-wise potential, based on a one-sided two-proportion z-test. Across seven models and three mathematical reasoning benchmarks (GSM1K, MATH500, AIME 2025), cliff tokens act as failure triggers; deleting the first cliff token and resampling recovers pass@64 to 1.0, while keeping it limits recovery to between 0.71 and 1.00. We further introduce a cliff taxonomy of deterministic, uncertain, and sampled-off cliffs, defined by greedy choice and token entropy. Each type has distinct probabilistic characteristics, and the taxonomy generalizes across model scales. Finally, we validate the taxonomy via single-token preference optimization at cliff positions (Cliff-DPO). Trained on GSM8K, Cliff-DPO improves accuracy across benchmarks by up to +6.6. Optimizing at uncertain and sampled-off cliffs improves reasoning, while deterministic cliffs do not.", "arxiv_id": "2606.25524", "arxiv_url": "https://arxiv.org/abs/2606.25524", "authors": ["Jaeyong Ko", "Pilsung Kang", "Yukyung Lee"], "brief": "\u63d0\u51fa\"\u60ac\u5d16token\"\u6982\u5ff5\uff0c\u901a\u8fc7\u81ea\u9002\u5e94\u9608\u503c\u7684\u5355\u4fa7\u53cc\u6bd4\u4f8bz\u68c0\u9a8c\uff0c\u7cbe\u786e\u5b9a\u4f4dLLM\u6570\u5b66\u63a8\u7406\u94fe\u4e2d\u5bfc\u81f4\u5931\u8d25\u7684\u5355\u4e2a\u89e6\u53d1token\uff0c\u5e76\u6784\u5efa\u786e\u5b9a\u6027/\u4e0d\u786e\u5b9a/\u91c7\u6837\u504f\u79bb\u4e09\u7c7b\u5206\u7c7b\u4f53\u7cfb\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25524", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5220\u9664\u7b2c\u4e00\u4e2a\u60ac\u5d16token\u5e76\u91cd\u91c7\u6837\u53ef\u5c06pass@64\u6062\u590d\u81f31.0\uff0c\u4fdd\u7559\u5219\u4ec5\u80fd\u6062\u590d\u81f30.71~1.00\u4e4b\u95f4", "\u57287\u4e2a\u6a21\u578b\u548cGSM1K\u3001MATH500\u3001AIME 2025\u4e09\u4e2a\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u60ac\u5d16token\u666e\u904d\u5b58\u5728", "\u57fa\u4e8e\u60ac\u5d16\u4f4d\u7f6e\u7684\u5355token\u504f\u597d\u4f18\u5316\uff08Cliff-DPO\uff09\u5728GSM8K\u8bad\u7ec3\u540e\u8de8\u57fa\u51c6\u6700\u9ad8\u63d0\u5347+6.6\u51c6\u786e\u7387\uff0c\u4e0d\u786e\u5b9a\u578b\u548c\u91c7\u6837\u504f\u79bb\u578b\u60ac\u5d16\u6709\u6548\uff0c\u786e\u5b9a\u6027\u60ac\u5d16\u65e0\u6548"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u5b66\u63a8\u7406", "\u5931\u8d25\u5206\u6790", "\u504f\u597d\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25524v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Cliff Tokens: Identifying Single-Token Failure Triggers in LLM Mathematical Reasoning", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u60ac\u5d16token\"\u6982\u5ff5\uff0c\u901a\u8fc7\u81ea\u9002\u5e94\u9608\u503c\u7684\u5355\u4fa7\u53cc\u6bd4\u4f8bz\u68c0\u9a8c\uff0c\u7cbe\u786e\u5b9a\u4f4dLLM\u6570\u5b66\u63a8\u7406\u94fe\u4e2d\u5bfc\u81f4\u5931\u8d25\u7684\u5355\u4e2a\u89e6\u53d1token\uff0c\u5e76\u6784\u5efa\u786e\u5b9a\u6027/\u4e0d\u786e\u5b9a/\u91c7\u6837\u504f\u79bb\u4e09\u7c7b\u5206\u7c7b\u4f53\u7cfb\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u63a8\u7406\u5931\u8d25\u7cbe\u786e\u5b9a\u4f4d\u5230\u5355\u4e2atoken\u7ea7\u522b\uff0c\u63ed\u793a\u5931\u8d25\u89e6\u53d1\u673a\u5236\uff0c\u5e76\u63d0\u4f9b\u53ef\u64cd\u4f5c\u7684\u8f7b\u91cf\u7ea7\u4f18\u5316\u65b9\u6cd5\uff08Cliff-DPO\uff09\uff0c\u5bf9\u7406\u89e3\u548c\u6539\u8fdbLLM\u63a8\u7406\u53ef\u9760\u6027\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "AI companions powered by large language models increasingly interact with cognition-developing users, including children and adolescents, creating risks that may accumulate over time. Existing safety evaluations largely rely on single-turn or short-session tests, which cannot capture risks that emerge only through prolonged interaction. To address this gap, we propose TSJ (Theater-Stage-Judge), a longitudinal framework combining persona-driven user simulation, dynamic psychological-state updating and retrospective evaluation. We evaluate six mainstream models across four developmental stages, twenty-four risk dimensions and three psychological-vulnerability personas, covering 12,960 simulated person-day interactions. TSJ shows that short-horizon testing systematically underestimates developmental risks, for which TSJ yields a stable risk estimate only after 140 turns within prolonged simulated relationships. Applying TSJ further identifies early childhood and emerging adulthood as the most vulnerable stages, with cognitive trust and emotional dependency as the weakest domains. TSJ provides a scalable methodology for longitudinal cognitive developmental risk evaluation in AI companion systems.", "arxiv_id": "2606.25396", "arxiv_url": "https://arxiv.org/abs/2606.25396", "authors": ["Kaicheng Shen", "Lingyu Li", "Wen Wu", "Yan Teng", "Liang He", "Yingchun Wang"], "brief": "\u63d0\u51faTSJ\uff08Theater-Stage-Judge\uff09\u7eb5\u5411\u8bc4\u4f30\u6846\u67b6\uff0c\u7ed3\u5408\u89d2\u8272\u9a71\u52a8\u7528\u6237\u6a21\u62df\u3001\u52a8\u6001\u5fc3\u7406\u72b6\u6001\u66f4\u65b0\u548c\u56de\u987e\u6027\u8bc4\u4f30\uff0c\u7cfb\u7edf\u8bc4\u4f30AI\u4f34\u4fa3\u5728\u957f\u671f\u4ea4\u4e92\u4e2d\u5bf9\u513f\u7ae5\u548c\u9752\u5c11\u5e74\u8ba4\u77e5\u53d1\u80b2\u7684\u6f5c\u5728\u98ce\u9669\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25396", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u8986\u76d66\u4e2a\u4e3b\u6d41\u6a21\u578b\u30014\u4e2a\u53d1\u80b2\u9636\u6bb5\u300124\u4e2a\u98ce\u9669\u7ef4\u5ea6\u30013\u79cd\u5fc3\u7406\u8106\u5f31\u6027\u89d2\u8272\uff0c\u5171\u6a21\u62df12,960\u4eba\u5929\u4ea4\u4e92", "\u77ed\u671f\u6d4b\u8bd5\u7cfb\u7edf\u6027\u4f4e\u4f30\u53d1\u80b2\u98ce\u9669\uff0cTSJ\u9700\u81f3\u5c11140\u8f6e\u5bf9\u8bdd\u624d\u80fd\u83b7\u5f97\u7a33\u5b9a\u98ce\u9669\u4f30\u8ba1", "\u5e7c\u513f\u671f\u548c\u6210\u5e74\u521d\u663e\u671f\u662f\u6700\u8106\u5f31\u9636\u6bb5\uff0c\u8ba4\u77e5\u4fe1\u4efb\u548c\u60c5\u611f\u4f9d\u8d56\u662f\u6700\u8584\u5f31\u7684\u98ce\u9669\u57df"], "keywords": ["AI\u5b89\u5168", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u98ce\u9669\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25396v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Long-Term Simulation Exposes Cognitive-Developmental Risks in AI Companions", "upvotes": 0, "what_it_is": "\u63d0\u51faTSJ\uff08Theater-Stage-Judge\uff09\u7eb5\u5411\u8bc4\u4f30\u6846\u67b6\uff0c\u7ed3\u5408\u89d2\u8272\u9a71\u52a8\u7528\u6237\u6a21\u62df\u3001\u52a8\u6001\u5fc3\u7406\u72b6\u6001\u66f4\u65b0\u548c\u56de\u987e\u6027\u8bc4\u4f30\uff0c\u7cfb\u7edf\u8bc4\u4f30AI\u4f34\u4fa3\u5728\u957f\u671f\u4ea4\u4e92\u4e2d\u5bf9\u513f\u7ae5\u548c\u9752\u5c11\u5e74\u8ba4\u77e5\u53d1\u80b2\u7684\u6f5c\u5728\u98ce\u9669\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9AI\u4f34\u4fa3\u957f\u671f\u8ba4\u77e5\u53d1\u80b2\u98ce\u9669\u7684\u7eb5\u5411\u8bc4\u4f30\u6846\u67b6\uff0c\u586b\u8865\u4e86\u73b0\u6709\u5355\u8f6e/\u77ed\u4f1a\u8bdd\u5b89\u5168\u8bc4\u4f30\u7684\u91cd\u5927\u76f2\u533a\uff0c\u5bf9AI\u4f34\u4fa3\u4ea7\u54c1\u7684\u513f\u7ae5\u5b89\u5168\u76d1\u7ba1\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Modern large language models are predominantly trained with autoregressive factorization and causal attention. We present \\emph{iLLaDA}, an 8B masked diffusion language model trained from scratch with fully bidirectional attention. iLLaDA keeps the masked diffusion objective throughout pre-training and supervised fine-tuning (SFT), scaling pre-training to 12T tokens and fine-tuning on a 25B-token instruction corpus for 12 epochs. We further use variable-length generation for efficiency and introduce confidence-based scoring for multiple-choice evaluation. Compared with LLaDA, iLLaDA improves broadly across general, mathematical, and code benchmarks; for example, iLLaDA-Base improves by 21.6 points on BBH and 14.9 points on ARC-Challenge, while iLLaDA-Instruct improves by 14.5 points on MATH and 16.5 points on HumanEval. Despite its non-autoregressive training, iLLaDA also remains competitive with Qwen2.5 7B on several benchmarks. These results show that fully bidirectional diffusion training from scratch is a competitive path toward strong language models. Model weights and codes: https://github.com/ML-GSAI/LLaDA.", "arxiv_id": "2606.25331", "arxiv_url": "https://arxiv.org/abs/2606.25331", "authors": ["Shen Nie", "Qiyang Min", "Shaoxuan Xu", "Zihao Huang", "Yuxuan Song", "Yong Shan", "Yankai Lin", "Wayne Xin Zhao", "Chongxuan Li", "Ji-Rong Wen"], "brief": "\u63d0\u51faiLLaDA\uff0c\u4e00\u4e2a\u4ece\u5934\u8bad\u7ec3\u768480\u4ebf\u53c2\u6570\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u91c7\u7528\u5b8c\u5168\u53cc\u5411\u6ce8\u610f\u529b\u673a\u5236\uff0c\u572812T token\u4e0a\u9884\u8bad\u7ec3\u5e76\u572825B token\u6307\u4ee4\u6570\u636e\u4e0a\u5fae\u8c03\uff0c\u8bc1\u660e\u975e\u81ea\u56de\u5f52\u6269\u6563\u8bad\u7ec3\u662f\u6784\u5efa\u5f3a\u5927\u8bed\u8a00\u6a21\u578b\u7684\u53ef\u884c\u8def\u5f84\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25331", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u76f8\u6bd4LLaDA\uff0ciLLaDA-Base\u5728BBH\u4e0a\u63d0\u534721.6\u5206\uff0cARC-Challenge\u63d0\u534714.9\u5206\uff1biLLaDA-Instruct\u5728MATH\u4e0a\u63d0\u534714.5\u5206\uff0cHumanEval\u63d0\u534716.5\u5206", "\u5f15\u5165\u53d8\u957f\u751f\u6210\u63d0\u5347\u63a8\u7406\u6548\u7387\uff0c\u5e76\u63d0\u51fa\u57fa\u4e8e\u7f6e\u4fe1\u5ea6\u7684\u591a\u9009\u9898\u8bc4\u4f30\u65b9\u6cd5", "\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u4e0eQwen2.5 7B\uff08\u81ea\u56de\u5f52\u6a21\u578b\uff09\u4fdd\u6301\u7ade\u4e89\u529b\uff0c\u9a8c\u8bc1\u53cc\u5411\u6269\u6563\u8bad\u7ec3\u7684\u6f5c\u529b"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u975e\u81ea\u56de\u5f52\u751f\u6210", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25331v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Improved Large Language Diffusion Models", "upvotes": 0, "what_it_is": "\u63d0\u51faiLLaDA\uff0c\u4e00\u4e2a\u4ece\u5934\u8bad\u7ec3\u768480\u4ebf\u53c2\u6570\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u91c7\u7528\u5b8c\u5168\u53cc\u5411\u6ce8\u610f\u529b\u673a\u5236\uff0c\u572812T token\u4e0a\u9884\u8bad\u7ec3\u5e76\u572825B token\u6307\u4ee4\u6570\u636e\u4e0a\u5fae\u8c03\uff0c\u8bc1\u660e\u975e\u81ea\u56de\u5f52\u6269\u6563\u8bad\u7ec3\u662f\u6784\u5efa\u5f3a\u5927\u8bed\u8a00\u6a21\u578b\u7684\u53ef\u884c\u8def\u5f84\u3002", "why_notable": "\u9996\u6b21\u5c06\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\u6269\u5c55\u81f38B\u53c2\u6570\u548c12T\u8bad\u7ec3token\u89c4\u6a21\uff0c\u663e\u8457\u7f29\u5c0f\u4e86\u6269\u6563\u6a21\u578b\u4e0e\u4e3b\u6d41\u81ea\u56de\u5f52\u5927\u6a21\u578b\u7684\u6027\u80fd\u5dee\u8ddd\uff0c\u4e3a\u8bed\u8a00\u6a21\u578b\u8bad\u7ec3\u8303\u5f0f\u63d0\u4f9b\u4e86\u91cd\u8981\u7684\u66ff\u4ee3\u65b9\u5411\u3002"}, {"abstract": "Autonomous AI Research promises to accelerate the scientific progress of machine learning. To realise this goal, current Large Language Model (LLM)-based agents need to go beyond just writing code, to mastering the exploration of simultaneously performant, diverse and novel ideas. To this end, we introduce Heuresis, a framework that abstracts the research pipeline into a set of general and composable primitives, enabling open-ended scientific exploration in machine learning research. We implement six search strategies: a greedy baseline, two archive-based (MAP-Elites, Go-Explore), one evolutionary (Islands), and two divergent (Curiosity, Omni), and evaluate them across three axes (Quality, Diversity, and Novelty) on three domains (LLM Pretraining, On-Policy RL, and Model Unlearning), totalling 3,222 scored runs. We find that completely novel ideas are rare. No idea across our scored runs is rated as \"Original\", and only a few achieve only \"Minor Similarity\" to prior work. Moreover, novel ideas never approach the highest-performing known-recipe scores. Across all six strategies and three domains, only one such idea lands in the top-10 by quality. We also observed agents resorting to a variety of reward-hacking techniques during execution (40 confirmed fabrications across 1,628 scored runs), and detecting them was necessary to keep the search faithful to the task. Our results show that while current search and Quality-Diversity strategies enable us to steer where the generated ideas land on the quality, diversity, and novelty axes, they do not expand the quality-novelty frontier. Bridging this gap is the open challenge towards the ultimate goal of perpetual, autonomous scientific progress. Code is available at github.com/a-antoniades/Heuresis.", "arxiv_id": "2606.25198", "arxiv_url": "https://arxiv.org/abs/2606.25198", "authors": ["Antonis Antoniades", "Deepak Nathani", "Ritam Saha", "Alfonso Amayuelas", "Ivan Bercovich", "Zhaotian Weng", "Vignesh Baskaran", "Kunal Bhatia", "William Yang Wang"], "brief": "\u63d0\u51faHeuresis\u6846\u67b6\uff0c\u5c06\u79d1\u7814\u6d41\u7a0b\u62bd\u8c61\u4e3a\u53ef\u7ec4\u5408\u7684\u57fa\u672c\u539f\u8bed\uff0c\u5b9e\u73b0\u673a\u5668\u5b66\u4e60\u9886\u57df\u7684\u5f00\u653e\u5f0f\u81ea\u4e3b\u63a2\u7d22\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f30\u516d\u79cd\u641c\u7d22\u7b56\u7565\u5728\u4e09\u4e2a\u7814\u7a76\u9886\u57df\u51713222\u6b21\u5b9e\u9a8c\u4e2d\u7684\u8868\u73b0\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25198", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5b9e\u73b0\u516d\u79cd\u641c\u7d22\u7b56\u7565\uff08\u8d2a\u5fc3\u3001MAP-Elites\u3001Go-Explore\u3001Islands\u3001Curiosity\u3001Omni\uff09\uff0c\u5728LLM\u9884\u8bad\u7ec3\u3001\u5728\u7ebfRL\u548c\u6a21\u578b\u9057\u5fd8\u4e09\u4e2a\u9886\u57df\u8bc4\u4f30", "\u5173\u952e\u53d1\u73b0\uff1a\u5b8c\u5168\u65b0\u9896\u7684\u60f3\u6cd5\u6781\u4e3a\u7f55\u89c1\uff0c\u65e0\u4e00\u88ab\u8bc4\u4e3a\"\u539f\u521b\"\uff0c\u65b0\u9896\u60f3\u6cd5\u4ece\u672a\u63a5\u8fd1\u5df2\u77e5\u6700\u4f18\u65b9\u6848\u7684\u6027\u80fd\uff0c\u516d\u79cd\u7b56\u7565\u5747\u672a\u80fd\u62d3\u5c55\u8d28\u91cf-\u65b0\u9896\u6027\u524d\u6cbf", "\u68c0\u6d4b\u523040\u4f8b\u5956\u52b1\u6b3a\u9a97/\u6570\u636e\u4f2a\u9020\u884c\u4e3a\uff08\u51711628\u6b21\u8bc4\u5206\u8fd0\u884c\uff09\uff0c\u63ed\u793a\u81ea\u4e3b\u79d1\u7814Agent\u7684\u53ef\u9760\u6027\u6311\u6218"], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u4e3b\u79d1\u7814", "\u641c\u7d22\u7b56\u7565", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25198v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Heuresis: Search Strategies for Autonomous AI Research Agents Across Quality, Diversity and Novelty", "upvotes": 0, "what_it_is": "\u63d0\u51faHeuresis\u6846\u67b6\uff0c\u5c06\u79d1\u7814\u6d41\u7a0b\u62bd\u8c61\u4e3a\u53ef\u7ec4\u5408\u7684\u57fa\u672c\u539f\u8bed\uff0c\u5b9e\u73b0\u673a\u5668\u5b66\u4e60\u9886\u57df\u7684\u5f00\u653e\u5f0f\u81ea\u4e3b\u63a2\u7d22\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f30\u516d\u79cd\u641c\u7d22\u7b56\u7565\u5728\u4e09\u4e2a\u7814\u7a76\u9886\u57df\u51713222\u6b21\u5b9e\u9a8c\u4e2d\u7
