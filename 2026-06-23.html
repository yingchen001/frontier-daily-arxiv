89\u5168\u5408\u89c4\u7b49\u5b9e\u9645\u5e94\u7528\u573a\u666f\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "In the big-world regime, agents cannot be universally capable and their ability is inevitably specialized across a world model in pieces. Consequently, standard uniform guarantees fail to distinguish between the understanding of critical bottlenecks and irrelevant failures. We first formalize this limitation by proving that general agents are not universal, rendering standard worst-case analysis uninformative. To overcome this, we introduce structural certification, a transition-local framework that maps bounded goal-conditioned performance to entry-wise guarantees on the agent\u0027s internal world model. Our main contribution is constructive. We provide algorithms that filter specific transitions using deep compositional goals and prove that a general agent on these goals has a structural world model with a $\\mathcal{O}(1/n) + \\mathcal{O}(\u03b4)$ error bound. Conversely, this bound is tight in the small-$\u03b4$ regime, whose existence is explicitly guaranteed by our certification. These results enable the certifiable deployment of general agents by localizing the specific transitions where long-horizon planning is reliable.", "arxiv_id": "2606.24842", "arxiv_url": "https://arxiv.org/abs/2606.24842", "authors": ["Yikai Lu", "Yifei Wu", "Xinyu Lu", "Tongxin Li"], "brief": "\u672c\u6587\u63d0\u51fa\"\u7ed3\u6784\u6027\u8ba4\u8bc1\"\uff08Structural Certification\uff09\u6846\u67b6\uff0c\u9488\u5bf9\u901a\u7528\u667a\u80fd\u4f53\u5728\u5927\u4e16\u754c\u573a\u666f\u4e0b\u80fd\u529b\u4e0d\u5747\u5300\u7684\u95ee\u9898\uff0c\u901a\u8fc7\u6df1\u5ea6\u7ec4\u5408\u76ee\u6807\u8fc7\u6ee4\u7279\u5b9a\u72b6\u6001\u8f6c\u79fb\uff0c\u5c06\u76ee\u6807\u6761\u4ef6\u6027\u80fd\u6620\u5c04\u4e3a\u667a\u80fd\u4f53\u5185\u90e8\u4e16\u754c\u6a21\u578b\u7684\u9010\u6761\u76ee\u8bef\u5dee\u754c\uff0c\u5b9e\u73b0\u5bf9\u957f\u671f\u89c4\u5212\u53ef\u9760\u533a\u57df\u7684\u7cbe\u786e\u5b9a\u4f4d\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24842", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u8bc1\u660e\u901a\u7528\u667a\u80fd\u4f53\u4e0d\u5177\u5907\u666e\u9002\u80fd\u529b\uff0c\u6807\u51c6\u6700\u574f\u60c5\u51b5\u5206\u6790\u5728\u5927\u4e16\u754c\u573a\u666f\u4e0b\u5931\u6548", "\u63d0\u51fa\u8f6c\u79fb\u5c40\u90e8\u6846\u67b6\uff0c\u5229\u7528\u6df1\u5ea6\u7ec4\u5408\u76ee\u6807\u8fc7\u6ee4\u5173\u952e\u8f6c\u79fb\uff0c\u83b7\u5f97 O(1/n)+O(\u03b4) \u7684\u8bef\u5dee\u4e0a\u754c\uff0c\u4e14\u5728\u5c0f\u03b4\u533a\u95f4\u8be5\u754c\u7d27\u81f4", "\u7b97\u6cd5\u53ef\u5b9a\u4f4d\u957f\u671f\u89c4\u5212\u53ef\u9760\u7684\u5177\u4f53\u8f6c\u79fb\uff0c\u652f\u6301\u901a\u7528\u667a\u80fd\u4f53\u7684\u53ef\u8ba4\u8bc1\u90e8\u7f72"], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24842v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "World Models in Pieces: Structural Certification for General Agents", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u7ed3\u6784\u6027\u8ba4\u8bc1\"\uff08Structural Certification\uff09\u6846\u67b6\uff0c\u9488\u5bf9\u901a\u7528\u667a\u80fd\u4f53\u5728\u5927\u4e16\u754c\u573a\u666f\u4e0b\u80fd\u529b\u4e0d\u5747\u5300\u7684\u95ee\u9898\uff0c\u901a\u8fc7\u6df1\u5ea6\u7ec4\u5408\u76ee\u6807\u8fc7\u6ee4\u7279\u5b9a\u72b6\u6001\u8f6c\u79fb\uff0c\u5c06\u76ee\u6807\u6761\u4ef6\u6027\u80fd\u6620\u5c04\u4e3a\u667a\u80fd\u4f53\u5185\u90e8\u4e16\u754c\u6a21\u578b\u7684\u9010\u6761\u76ee\u8bef\u5dee\u754c\uff0c\u5b9e\u73b0\u5bf9\u957f\u671f\u89c4\u5212\u53ef\u9760\u533a\u57df\u7684\u7cbe\u786e\u5b9a\u4f4d\u3002", "why_notable": "\u9996\u6b21\u4ece\u7406\u8bba\u4e0a\u5f62\u5f0f\u5316\u901a\u7528\u667a\u80fd\u4f53\u80fd\u529b\u5c40\u9650\u6027\uff0c\u5e76\u7ed9\u51fa\u53ef\u6784\u9020\u7684\u5c40\u90e8\u8ba4\u8bc1\u7b97\u6cd5\uff0c\u4e3a\u5927\u4e16\u754c\u667a\u80fd\u4f53\u7684\u5b89\u5168\u53ef\u9760\u90e8\u7f72\u63d0\u4f9b\u7406\u8bba\u57fa\u7840\uff0c\u5bf9 AI \u5b89\u5168\u4e0e\u667a\u80fd\u4f53\u8bc4\u4f30\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Generic text-to-video models can be used as rich open-world scene priors. Despite the high quality of today\u0027s generated videos, they do not directly yield reliable 3D assets: camera motion is difficult to control, view coverage is partial, and frames often contain inconsistencies across time. We introduce OrbitForge, an adapter built from frozen video priors and per-prompt Gaussian Splatting reconstruction optimization that converts a single text-generated video into a canonical closed-orbit 3D Gaussian Splatting scene. We use 3D reconstruction as an anchor to improve the 3D consistency of the generated video. We obtain a preliminary 3D reconstruction from a first generated video via Deformable Gaussian Splatting with a robust MedianGS proxy. We render views from a prescribed orbit to detect missing viewpoints. OrbitForge uses the text-to-video model to complete only the missing views, and reconstructs the completed orbit into a final Gaussian Splatting scene. This design requires no task-specific video or multiview fine-tuning, avoids per-prompt score-distillation optimization, and does not progressively generate views one step at a time. We further argue that this setting demands coverage-aware evaluation: local smoothness alone rewards methods that never attempt a full orbit. On a frozen 300-prompt T3Bench-derived audit, OrbitForge reconstruction attains a 359.0-degree measured median span, raises originally unsupported-bin Q10 ImageReward from 8.07 to 16.36 relative to MedianGS-only reconstruction, while remaining competitive with VideoMV on the coverage-quality.", "arxiv_id": "2606.24799", "arxiv_url": "https://arxiv.org/abs/2606.24799", "authors": ["Chenrui Fan", "Paolo Favaro"], "brief": "OrbitForge\u662f\u4e00\u4e2a\u6587\u672c\u52303D\u573a\u666f\u751f\u6210\u6846\u67b6\uff0c\u901a\u8fc7\u5c063D\u91cd\u5efa\u4f5c\u4e3a\u951a\u70b9\u6765\u63d0\u5347\u751f\u6210\u89c6\u9891\u76843D\u4e00\u81f4\u6027\uff0c\u5148\u7528\u53ef\u53d8\u5f62\u9ad8\u65af\u6cfc\u6e85\u83b7\u53d6\u521d\u6b65\u91cd\u5efa\uff0c\u518d\u68c0\u6d4b\u7f3a\u5931\u89c6\u89d2\u5e76\u7528\u89c6\u9891\u6a21\u578b\u8865\u5168\uff0c\u6700\u7ec8\u751f\u6210\u5b8c\u6574\u8f68\u9053\u76843D\u9ad8\u65af\u6cfc\u6e85\u573a\u666f\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24799", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u65e0\u9700\u4efb\u52a1\u7279\u5b9a\u7684\u89c6\u9891\u6216\u591a\u89c6\u89d2\u5fae\u8c03\uff0c\u4e5f\u65e0\u9700\u9010\u63d0\u793a\u7684\u5206\u6570\u84b8\u998f\u4f18\u5316", "\u5f15\u5165MedianGS\u4ee3\u7406\u8fdb\u884c\u9c81\u68d2\u521d\u6b65\u91cd\u5efa\uff0c\u5e76\u901a\u8fc7\u9884\u8bbe\u8f68\u9053\u6e32\u67d3\u68c0\u6d4b\u7f3a\u5931\u89c6\u89d2", "\u5728300\u4e2a\u63d0\u793a\u7684T3Bench\u5ba1\u8ba1\u4e2d\uff0c\u91cd\u5efa\u4e2d\u4f4d\u8986\u76d6\u8de8\u5ea6\u8fbe359.0\u5ea6\uff0cQ10 ImageReward\u4ece8.07\u63d0\u5347\u81f316.36"], "keywords": ["3D\u751f\u6210", "\u9ad8\u65af\u6cfc\u6e85", "\u591a\u89c6\u89d2\u5408\u6210", "\u6587\u672c\u52303D"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24799v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "OrbitForge: Text-to-3D Scene Generation via Reconstruction-Anchored Video Synthesis", "upvotes": 0, "what_it_is": "OrbitForge\u662f\u4e00\u4e2a\u6587\u672c\u52303D\u573a\u666f\u751f\u6210\u6846\u67b6\uff0c\u901a\u8fc7\u5c063D\u91cd\u5efa\u4f5c\u4e3a\u951a\u70b9\u6765\u63d0\u5347\u751f\u6210\u89c6\u9891\u76843D\u4e00\u81f4\u6027\uff0c\u5148\u7528\u53ef\u53d8\u5f62\u9ad8\u65af\u6cfc\u6e85\u83b7\u53d6\u521d\u6b65\u91cd\u5efa\uff0c\u518d\u68c0\u6d4b\u7f3a\u5931\u89c6\u89d2\u5e76\u7528\u89c6\u9891\u6a21\u578b\u8865\u5168\uff0c\u6700\u7ec8\u751f\u6210\u5b8c\u6574\u8f68\u9053\u76843D\u9ad8\u65af\u6cfc\u6e85\u573a\u666f\u3002", "why_notable": "\u9996\u6b21\u5c063D\u91cd\u5efa\u4f5c\u4e3a\u951a\u70b9\u53cd\u5411\u7ea6\u675f\u89c6\u9891\u751f\u6210\u4e00\u81f4\u6027\uff0c\u65e0\u9700\u989d\u5916\u5fae\u8c03\u5373\u53ef\u4ece\u901a\u7528\u6587\u672c\u89c6\u9891\u6a21\u578b\u751f\u6210\u9ad8\u8986\u76d6\u73873D\u573a\u666f\uff0c\u5e76\u63d0\u51fa\u8986\u76d6\u611f\u77e5\u8bc4\u4f30\u6307\u6807\u586b\u8865\u73b0\u6709\u8bc4\u6d4b\u76f2\u533a\u3002"}, {"abstract": "Recent advances in Video Large Language Models (Video-LLMs) have yielded promising performance on video question answering (VideoQA). Nevertheless, existing benchmarks are predominantly evaluated through answer correctness, while the grounding of predictions in relevant video evidence remains largely unexamined. This disconnect between answer generation and evidence understanding motivates the construction of the Evidence-Grounded Video Question Answering Benchmark (EG-VQA), an open-ended evaluation protocol in which each QA pair is explicitly annotated with supporting temporal evidence, thereby requiring joint reasoning and precise evidence localization. EG-VQA is comprised of 2,067 videos and 11,838 QA pairs with fine-grained evidence annotations. To evaluate predicted evidence, Evidence-Grounded F1 (EG-F1) is introduced as a unified metric in which temporal alignment and semantic consistency against ground-truth evidence are jointly measured. Experimental evaluation reveals that even strong proprietary models struggle to accurately ground their predictions, exposing a fundamental discrepancy between answer correctness and faithful evidence localization. To bridge this gap, EG-Reasoner, an evidence-grounded reasoning model trained with explicit supervision, is proposed. State-of-the-art performance is achieved among open-source models, with results competitive against proprietary systems, particularly pronounced gains are observed on reasoning-intensive tasks such as counterfactual questions. These findings demonstrate that scaling alone is insufficient for robust video understanding and that structured evidence supervision is essential for the development of more reliable and interpretable VideoQA systems.", "arxiv_id": "2606.24797", "arxiv_url": "https://arxiv.org/abs/2606.24797", "authors": ["Linpeng Huang", "Weixing Chen", "Zexin Chen", "Yang Liu", "Liang Lin"], "brief": "\u6784\u5efa\u4e86\u9996\u4e2a\u4ee5\u65f6\u5e8f\u8bc1\u636e\u4e3a\u6838\u5fc3\u7684\u89c6\u9891\u95ee\u7b54\u8bc4\u6d4b\u57fa\u51c6EG-VQA\uff0c\u5305\u542b2067\u4e2a\u89c6\u9891\u548c11838\u4e2aQA\u5bf9\uff0c\u6bcf\u5bf9\u5747\u6807\u6ce8\u652f\u6491\u7b54\u6848\u7684\u65f6\u5e8f\u8bc1\u636e\u7247\u6bb5\uff0c\u5e76\u63d0\u51faEG-F1\u7edf\u4e00\u8bc4\u4f30\u6307\u6807\uff0c\u540c\u65f6\u8bad\u7ec3\u4e86\u8bc1\u636e\u5f15\u5bfc\u63a8\u7406\u6a21\u578bEG-Reasoner\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24797", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6570\u636e\u96c6\u89c4\u6a21\uff1a2067\u4e2a\u89c6\u9891\u300111838\u4e2aQA\u5bf9\uff0c\u914d\u6709\u7ec6\u7c92\u5ea6\u65f6\u5e8f\u8bc1\u636e\u6807\u6ce8", "\u63d0\u51faEG-F1\u6307\u6807\uff0c\u8054\u5408\u8861\u91cf\u65f6\u5e8f\u5bf9\u9f50\u4e0e\u8bed\u4e49\u4e00\u81f4\u6027\uff0c\u63ed\u793a\u5f3a\u5546\u4e1a\u6a21\u578b\u5728\u8bc1\u636e\u5b9a\u4f4d\u4e0a\u7684\u663e\u8457\u4e0d\u8db3", "EG-Reasoner\u901a\u8fc7\u663e\u5f0f\u8bc1\u636e\u76d1\u7763\u8bad\u7ec3\uff0c\u5728\u5f00\u6e90\u6a21\u578b\u4e2d\u8fbe\u5230SOTA\uff0c\u5728\u53cd\u4e8b\u5b9e\u63a8\u7406\u7b49\u4efb\u52a1\u4e0a\u63d0\u5347\u5c24\u4e3a\u7a81\u51fa"], "keywords": ["\u89c6\u9891\u95ee\u7b54", "\u591a\u6a21\u6001", "\u57fa\u51c6\u8bc4\u6d4b", "\u53ef\u89e3\u91caAI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24797v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EG-VQA: Benchmarking Verifiable Video Question Answering with Grounded Temporal Evidence", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u9996\u4e2a\u4ee5\u65f6\u5e8f\u8bc1\u636e\u4e3a\u6838\u5fc3\u7684\u89c6\u9891\u95ee\u7b54\u8bc4\u6d4b\u57fa\u51c6EG-VQA\uff0c\u5305\u542b2067\u4e2a\u89c6\u9891\u548c11838\u4e2aQA\u5bf9\uff0c\u6bcf\u5bf9\u5747\u6807\u6ce8\u652f\u6491\u7b54\u6848\u7684\u65f6\u5e8f\u8bc1\u636e\u7247\u6bb5\uff0c\u5e76\u63d0\u51faEG-F1\u7edf\u4e00\u8bc4\u4f30\u6307\u6807\uff0c\u540c\u65f6\u8bad\u7ec3\u4e86\u8bc1\u636e\u5f15\u5bfc\u63a8\u7406\u6a21\u578bEG-Reasoner\u3002", "why_notable": "\u73b0\u6709VideoQA\u57fa\u51c6\u53ea\u8bc4\u4f30\u7b54\u6848\u6b63\u786e\u6027\u800c\u5ffd\u89c6\u8bc1\u636e\u53ef\u4fe1\u5ea6\uff0cEG-VQA\u586b\u8865\u4e86\u8fd9\u4e00\u7a7a\u767d\uff0c\u63a8\u52a8\u89c6\u9891\u7406\u89e3\u5411\u53ef\u89e3\u91ca\u3001\u53ef\u9a8c\u8bc1\u65b9\u5411\u53d1\u5c55\uff0c\u5bf9\u8bc4\u4f30\u548c\u8bad\u7ec3\u66f4\u53ef\u9760\u7684Video-LLM\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "The loss of plasticity - the ability of a network to learn new information after having already learned older information - is a fundamental challenge in creating artificial neural networks capable of continual learning. Although this phenomenon has been known for decades, it has mostly been studied in older, relatively small architectures and rarely in natural-language domains. To determine whether loss of plasticity remains a problem in the modern transformer-based LLM paradigm, we study plasticity loss in GPT-style Transformer models trained on a multilingual continual learning problem. Consistent with prior work, we find evidence of plasticity loss across models ranging from 5M to 314M non-embedding parameters, as measured by deterioration on a held-out Vietnamese probing task. We further find that the onset of plasticity loss follows a predictable scaling law, growing sublinearly with model size. These results suggest that larger models may delay the measurable effects of plasticity loss, but that increasing parameter count alone is likely to be insufficient to completely prevent it. We also find evidence of plasticity loss under stationary multilingual training, challenging the view that the phenomenon is exclusive to continual learning with abrupt task changes. Overall, our results suggest that even large Transformer language models trained on natural-language will eventually lose the ability to efficiently adapt to new data after sufficiently long training, in both continual and stationary settings.", "arxiv_id": "2606.24752", "arxiv_url": "https://arxiv.org/abs/2606.24752", "authors": ["J. Fernando Hernandez-Garcia", "Tom\u00e1s Figliolia", "Beren Millidge"], "brief": "\u7814\u7a76GPT\u98ce\u683cTransformer\u6a21\u578b\u5728\u591a\u8bed\u8a00\u6301\u7eed\u5b66\u4e60\u573a\u666f\u4e0b\u7684\u53ef\u5851\u6027\u4e27\u5931\u73b0\u8c61\uff0c\u53d1\u73b0\u8be5\u95ee\u9898\u57285M\u81f3314M\u53c2\u6570\u89c4\u6a21\u7684\u6a21\u578b\u4e2d\u666e\u904d\u5b58\u5728\uff0c\u4e14\u9075\u5faa\u53ef\u9884\u6d4b\u7684\u5e42\u5f8b\u7f29\u653e\u89c4\u5f8b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24752", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53ef\u5851\u6027\u4e27\u5931\u7684\u53d1\u751f\u65f6\u95f4\u968f\u6a21\u578b\u89c4\u6a21\u5448\u6b21\u7ebf\u6027\u589e\u957f\uff0c\u66f4\u5927\u6a21\u578b\u4ec5\u80fd\u5ef6\u8fdf\u800c\u975e\u6d88\u9664\u8be5\u95ee\u9898", "\u5728\u9759\u6001\u591a\u8bed\u8a00\u8bad\u7ec3\uff08\u975e\u4efb\u52a1\u5207\u6362\u573a\u666f\uff09\u4e2d\u540c\u6837\u89c2\u5bdf\u5230\u53ef\u5851\u6027\u4e27\u5931\uff0c\u6311\u6218\u4e86\u8be5\u73b0\u8c61\u4ec5\u5b58\u5728\u4e8e\u6301\u7eed\u5b66\u4e60\u7684\u4f20\u7edf\u8ba4\u77e5", "\u4ee5\u8d8a\u5357\u8bed\u4fdd\u7559\u63a2\u6d4b\u4efb\u52a1\u4e3a\u6307\u6807\uff0c\u91cf\u5316\u9a8c\u8bc1\u4e86Transformer LLM\u5728\u957f\u65f6\u95f4\u8bad\u7ec3\u540e\u9002\u5e94\u65b0\u6570\u636e\u80fd\u529b\u7684\u4e0b\u964d"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6301\u7eed\u5b66\u4e60", "\u53ef\u5851\u6027\u4e27\u5931", "\u7f29\u653e\u5b9a\u5f8b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24752v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Can Scale Save Us From Plasticity Loss in Large Language Models?", "upvotes": 0, "what_it_is": "\u7814\u7a76GPT\u98ce\u683cTransformer\u6a21\u578b\u5728\u591a\u8bed\u8a00\u6301\u7eed\u5b66\u4e60\u573a\u666f\u4e0b\u7684\u53ef\u5851\u6027\u4e27\u5931\u73b0\u8c61\uff0c\u53d1\u73b0\u8be5\u95ee\u9898\u57285M\u81f3314M\u53c2\u6570\u89c4\u6a21\u7684\u6a21\u578b\u4e2d\u666e\u904d\u5b58\u5728\uff0c\u4e14\u9075\u5faa\u53ef\u9884\u6d4b\u7684\u5e42\u5f8b\u7f29\u653e\u89c4\u5f8b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u53ef\u5851\u6027\u4e27\u5931\u7814\u7a76\u6269\u5c55\u5230\u73b0\u4ee3Transformer LLM\u4e0e\u81ea\u7136\u8bed\u8a00\u9886\u57df\uff0c\u63ed\u793a\u4e86\u5355\u7eaf\u6269\u5927\u53c2\u6570\u91cf\u65e0\u6cd5\u89e3\u51b3\u6301\u7eed\u5b66\u4e60\u6838\u5fc3\u74f6\u9888\uff0c\u5bf9LLM\u957f\u671f\u90e8\u7f72\u4e0e\u6301\u7eed\u66f4\u65b0\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "Large Language Models (LLMs) achieve strong performance across a growing range of domains, yet their scale poses deployment challenges in applications where latency and cost constraints are critical. This paper derives empirical scaling laws for domain-specific LLM compression, quantifying how in-domain and general knowledge performance scale with dataset size, compression ratio, supervision format, and iterative pruning schedule. Using quantitative finance as our application domain, we compare logit-based and LoRA-based distillation under iterative structural pruning, introducing a blended chain-of-thought supervision loss that stabilizes KL-divergence distillation over reasoning traces. In-domain task quality degrades predictably under compression while general-knowledge benchmarks collapse well before the same point; supervision format is the key driver of this tradeoff, with chain-of-thought supervision actively recovering general knowledge that pruning erases. We release the headline dataset FinHeadlineMix, scaling law results, and practical recommendations to provide a reusable framework for domain-specific compression decisions.", "arxiv_id": "2606.24747", "arxiv_url": "https://arxiv.org/abs/2606.24747", "authors": ["Lavinia Ghita", "Dhruv Desai", "Ioana Boier"], "brief": "\u672c\u6587\u9488\u5bf9\u9886\u57df\u7279\u5b9aLLM\u538b\u7f29\uff08\u4ee5\u91cf\u5316\u91d1\u878d\u4e3a\u5e94\u7528\u573a\u666f\uff09\uff0c\u63a8\u5bfc\u4e86\u7ecf\u9a8c\u7f29\u653e\u5b9a\u5f8b\uff0c\u91cf\u5316\u4e86\u6570\u636e\u96c6\u5927\u5c0f\u3001\u538b\u7f29\u6bd4\u3001\u76d1\u7763\u683c\u5f0f\u548c\u8fed\u4ee3\u526a\u679d\u7b56\u7565\u5bf9\u9886\u57df\u5185\u53ca\u901a\u7528\u77e5\u8bc6\u6027\u80fd\u7684\u5f71\u54cd\u89c4\u5f8b\u3002", "categories": ["cs.AI", "cs.CE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24747", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5bf9\u6bd4\u4e86\u57fa\u4e8elogit\u548c\u57fa\u4e8eLoRA\u7684\u84b8\u998f\u65b9\u6cd5\uff0c\u7ed3\u5408\u8fed\u4ee3\u7ed3\u6784\u5316\u526a\u679d\uff0c\u63d0\u51fa\u6df7\u5408\u601d\u7ef4\u94fe\u76d1\u7763\u635f\u5931\u4ee5\u7a33\u5b9aKL\u6563\u5ea6\u84b8\u998f", "\u53d1\u73b0\u9886\u57df\u5185\u4efb\u52a1\u8d28\u91cf\u968f\u538b\u7f29\u53ef\u9884\u6d4b\u5730\u4e0b\u964d\uff0c\u800c\u901a\u7528\u77e5\u8bc6\u57fa\u51c6\u5728\u66f4\u65e9\u9636\u6bb5\u5c31\u5d29\u6e83\uff1b\u76d1\u7763\u683c\u5f0f\u662f\u8be5\u6743\u8861\u7684\u5173\u952e\u9a71\u52a8\u56e0\u7d20", "\u601d\u7ef4\u94fe\u76d1\u7763\u80fd\u4e3b\u52a8\u6062\u590d\u526a\u679d\u6240\u6d88\u9664\u7684\u901a\u7528\u77e5\u8bc6\uff0c\u5e76\u53d1\u5e03\u4e86FinHeadlineMix\u6570\u636e\u96c6\u53ca\u7f29\u653e\u5b9a\u5f8b\u7ed3\u679c"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u84b8\u998f", "\u6a21\u578b\u538b\u7f29", "\u7f29\u653e\u5b9a\u5f8b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24747v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Scaling Laws for Task-Specific LLM Distillation", "upvotes": 0, "what_it_is": "\u672c\u6587\u9488\u5bf9\u9886\u57df\u7279\u5b9aLLM\u538b\u7f29\uff08\u4ee5\u91cf\u5316\u91d1\u878d\u4e3a\u5e94\u7528\u573a\u666f\uff09\uff0c\u63a8\u5bfc\u4e86\u7ecf\u9a8c\u7f29\u653e\u5b9a\u5f8b\uff0c\u91cf\u5316\u4e86\u6570\u636e\u96c6\u5927\u5c0f\u3001\u538b\u7f29\u6bd4\u3001\u76d1\u7763\u683c\u5f0f\u548c\u8fed\u4ee3\u526a\u679d\u7b56\u7565\u5bf9\u9886\u57df\u5185\u53ca\u901a\u7528\u77e5\u8bc6\u6027\u80fd\u7684\u5f71\u54cd\u89c4\u5f8b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316\u9886\u57df\u7279\u5b9aLLM\u538b\u7f29\u7684\u7f29\u653e\u5b9a\u5f8b\uff0c\u4e3a\u5b9e\u9645\u90e8\u7f72\u4e2d\u7684\u538b\u7f29\u51b3\u7b56\u63d0\u4f9b\u53ef\u590d\u7528\u6846\u67b6\uff0c\u63ed\u793a\u4e86\u76d1\u7763\u683c\u5f0f\u5bf9\u901a\u7528\u77e5\u8bc6\u4fdd\u7559\u7684\u5173\u952e\u4f5c\u7528\uff0c\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement Learning with Verifiable Rewards (RLVR) for language-model reasoning can fail at both extremes of task difficulty: easy prompts often produce all-correct, low-diversity rollout groups with little gradient signal, while hard prompts can produce all-incorrect groups with no positive reward. We introduce ExTra (Exploratory Trajectory Optimization), a GRPO-compatible framework that extracts exploration signals from the model\u0027s own rollouts. ExTra combines two mechanisms: (i) a novelty reward that adds embedding-based diversity bonuses after GRPO normalization, rewarding diverse correct solutions; and (ii) entropy-guided prefix regeneration, which scores partial trajectories using entropy signals and continues exploration from promising intermediate steps. Across six mathematical reasoning benchmarks, ExTra improves Qwen3-1.7B over GRPO by about +5 points on pass@1 and +7 points on pass@16, showing that trajectory-level exploration signals can improve both single-sample accuracy and inference-time coverage.", "arxiv_id": "2606.24994", "arxiv_url": "https://arxiv.org/abs/2606.24994", "authors": ["Wenyang Hu", "Junxiang Jia", "Zhen Shu", "Daniel Dahlmeier", "See-Kiong Ng", "Bryan Kian Hsiang Low"], "brief": "\u9488\u5bf9\u8bed\u8a00\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u4e2d\u7b80\u5355\u9898\u5168\u5bf9\u3001\u96be\u9898\u5168\u9519\u5bfc\u81f4\u68af\u5ea6\u4fe1\u53f7\u7f3a\u5931\u7684\u95ee\u9898\uff0c\u63d0\u51faExTra\u6846\u67b6\uff0c\u7ed3\u5408\u57fa\u4e8e\u5d4c\u5165\u7684\u591a\u6837\u6027\u5956\u52b1\u548c\u71b5\u5f15\u5bfc\u7684\u524d\u7f00\u91cd\u751f\u6210\u673a\u5236\uff0c\u5728\u516d\u4e2a\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\u5c06Qwen3-1.7B\u7684pass@1\u63d0\u5347\u7ea65\u5206\u3001pass@16\u63d0\u5347\u7ea67\u5206\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24994", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "\u8f68\u8ff9\u4f18\u5316", "\u63a2\u7d22\u7b56\u7565"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24994v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ExTra: Exploratory Trajectory Optimization for Language Model Reinforcement Learning", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Rare diseases affect millions of individuals worldwide, yet timely diagnosis remains a major public health challenge due to scarcity of specialized clinical expertise. While large language models (LLMs) show promise to support rare disease diagnosis, current models are constrained by insufficient clinical deployability, limited clinically grounded evidence, and scarcity of training data. Here we present RaDaR (Rare Disease navigatoR), an open-source, compact reasoning LLM (32B parameters) for rare disease diagnosis. RaDaR was trained with 49,170 publicly available free-text cases and 104,666 synthetic cases with reasoning-enhanced training. RaDaR showed the strongest performance among evaluated open-source models, including the 671B DeepSeek-R1, across public benchmarks and four external validation centers. In a retrospective cohort, RaDaR prioritized the final diagnosis before documented clinical suspicion in 61.06 percent of cases, corresponding to a potential lead time of 1.87 months and 50.18 percent of the within-center interval. In a randomized physician-assistance trial, RaDaR assistance improved physicians\u0027 rare-disease diagnostic accuracy by 21.44 percentage points compared with internet search alone. Synthetic-data ablations suggested that phenotype-anchored narratives provide useful training signal for long-tail rare diseases, with a monotonic scaling trend within the tested data range. Together, RaDaR and its development and validation framework provide a deployable rare-disease reasoning model and a reproducible development framework for diagnostic AI under data scarcity.", "arxiv_id": "2606.24510", "arxiv_url": "https://arxiv.org/abs/2606.24510", "authors": ["Haichao Chen", "Songchi Zhou", "Zhengyun Zhao", "Shikai Hu", "Xianghong Jin", "Hongwei Ji", "Li He", "Shuli Li", "Yiming Qin", "Xin Tan", "Runfeng Shi", "Yih Chung Tham", "Jiaye Zhu", "Ye Li", "Ye Jin", "Longhao Cao", "Dawei Li", "Honghan Wu", "Hongqiu Gu", "Guanqiao Li", "Tudor Groza", "Chunying Li", "Dian Zeng", "Weihong Yu", "Gareth Baynam", "Saumya Shekhar Jamuar", "Min Shen", "Shuyang Zhang", "Bin Sheng", "Sheng Yu", "Tien Yin Wong"], "brief": "\u63d0\u51faRaDaR\uff0c\u4e00\u4e2a\u4e13\u4e3a\u7f55\u89c1\u75c5\u8bca\u65ad\u8bbe\u8ba1\u768432B\u53c2\u6570\u5f00\u6e90\u63a8\u7406\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u7ea615\u4e07\u6761\u771f\u5b9e\u4e0e\u5408\u6210\u75c5\u4f8b\u8fdb\u884c\u63a8\u7406\u589e\u5f3a\u8bad\u7ec3\u3002\u5728\u968f\u673a\u5bf9\u7167\u8bd5\u9a8c\u4e2d\uff0cRaDaR\u8f85\u52a9\u533b\u751f\u7684\u7f55\u89c1\u75c5\u8bca\u65ad\u51c6\u786e\u7387\u6bd4\u5355\u72ec\u4f7f\u7528\u4e92\u8054\u7f51\u641c\u7d22\u63d0\u534721.44\u4e2a\u767e\u5206\u70b9\uff0c\u5e76\u53ef\u5728\u4e34\u5e8a\u6000\u7591\u8bb0\u5f55\u524d1.87\u4e2a\u6708\u63d0\u524d\u9501\u5b9a\u6b63\u786e\u8bca\u65ad\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24510", "impact_score": 9, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u7f55\u89c1\u75c5\u8bca\u65ad", "\u63a8\u7406\u589e\u5f3a", "\u5408\u6210\u6570\u636e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24510v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A specialized reasoning large language model for accelerating rare disease diagnosis: a randomized AI physician assistance trial", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "For most of scientific history, researchers studying behavior could only infer hidden mechanisms from outward actions: an inverse problem that becomes more tractable when observation is augmented by targeted intervention. We pose a computational analogue: given only behavioral traces of an agent in a game environment, can a learner reconstruct the underlying decision program as executable code, and how much does this reconstruction improve with the ability to design controlled experiments? We introduce RevengeBench, a benchmark of 75 LLM generated, Elo-calibrated policies across five game environments, drawn from CodeClash tournament trajectories. The learner observes the hidden target policy play against sampled opponents and designs behavioral probes in the form of custom opponent policies that elicit informative behavior. It then submits an executable hypothesis, which is evaluated using continuous action-distance metrics. We further validate that recovered code carries informative signal in downstream player-versus-player tournaments. Across twelve frontier LLMs, recovery quality varies substantially (34 to 72% of initial distance closed), with reconstructed policies yielding measurable competitive advantage, particularly for weaker models that otherwise struggle to design effective counter-strategies. Our benchmark positions behavioral recovery of programmatic policies as a tractable inverse problem in code-space, opening a path to opponent modeling, policy interpretability, and the broader question of inferring latent mechanisms from observations.", "arxiv_id": "2606.26094", "arxiv_url": "https://arxiv.org/abs/2606.26094", "authors": ["Babak Rahmani", "Sebastian Dziadzio", "Joschka Str\u00fcber", "Sergio Hern\u00e1ndez-Guti\u00e9rrez", "Matthias Bethge"], "brief": "\u63d0\u51faRevengeBench\u57fa\u51c6\uff0c\u6d4b\u8bd5\u80fd\u5426\u4ec5\u901a\u8fc7\u89c2\u5bdf\u667a\u80fd\u4f53\u7684\u884c\u4e3a\u8f68\u8ff9\uff08\u5e76\u8bbe\u8ba1\u53d7\u63a7\u5b9e\u9a8c\uff09\u6765\u9006\u5411\u8fd8\u539f\u5176\u51b3\u7b56\u7a0b\u5e8f\u4ee3\u7801\u3002\u572875\u4e2aLLM\u751f\u6210\u7684\u6e38\u620f\u7b56\u7565\u4e0a\u8bc4\u4f3012\u4e2a\u524d\u6cbfLLM\uff0c\u6062\u590d\u8d28\u91cf\u5dee\u5f02\u663e\u8457\uff08\u521d\u59cb\u8ddd\u79bb\u7f29\u77ed34%~72%\uff09\uff0c\u8fd8\u539f\u7684\u7b56\u7565\u5728\u5bf9\u6218\u9526\u6807\u8d5b\u4e2d\u5c55\u73b0\u51fa\u53ef\u6d4b\u91cf\u7684\u7ade\u4e89\u4f18\u52bf\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26094", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u9006\u5411\u5de5\u7a0b", "\u7b56\u7565\u6062\u590d", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26094v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "RevengeBench: Reverse Engineering Code-Space Policies from Behavioral Experiments", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Standard benchmarks for multimodal large language models (MLLMs) score each item on one canonical ordering and miss whether order-irrelevant shuffling changes the answer, a baseline reliability property called for by emerging AI evaluation guidelines. We introduce Facet-Probe, a five-facet audit (option, evidence-chunk, document-rank, image-set, and mixed-modality ordering) of 18 frontier and open-weight MLLMs. A Bayesian item-response model separates ordering noise from per-facet bias, and a same-ordering control estimates the decoder-stochastic floor for observed flips. We find that none of the 18 MLLMs we audit are order-invariant: screened per-facet panel-mean flip rates span 24-50%. A Gemini same-ordering control at temperature 0 estimates a substantial ordering excess over a same-input decoder-noise floor in verified cells. Capability predicts but does not eliminate flips; the best model still flips on 13.4% of trials. In our Gemini mitigation tests, training-free prompt changes are modality-conditional and do not transfer from text to visual reasoning. These results suggest that prompt-level mitigation alone is unlikely to provide general order robustness, motivating future work on training-time and architectural approaches. We propose cross-ordering flip rate as a standard reporting axis for MLLMs.", "arxiv_id": "2606.26079", "arxiv_url": "https://arxiv.org/abs/2606.26079", "authors": ["Akshay Paruchuri", "Sanmi Koyejo", "Ehsan Adeli"], "brief": "\u672c\u6587\u63d0\u51faFacet-Probe\u5ba1\u8ba1\u6846\u67b6\uff0c\u5bf918\u4e2a\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u8fdb\u884c\u4e94\u7ef4\u5ea6\u987a\u5e8f\u654f\u611f\u6027\u6d4b\u8bd5\uff0c\u53d1\u73b0\u6240\u6709\u6a21\u578b\u5747\u5b58\u5728\u987a\u5e8f\u654f\u611f\u95ee\u9898\uff0c\u7ffb\u8f6c\u7387\u9ad8\u8fbe24-50%\uff0c\u5373\u4f7f\u6700\u4f18\u6a21\u578b\u4ecd\u670913.4%\u7684\u7ffb\u8f6c\u7387\uff1b\u63d0\u793a\u5c42\u9762\u7684\u7f13\u89e3\u63aa\u65bd\u65e0\u6cd5\u8de8\u6a21\u6001\u8fc1\u79fb\uff0c\u5efa\u8bae\u5c06\u8de8\u987a\u5e8f\u7ffb\u8f6c\u7387\u4f5c\u4e3a\u6a21\u578b\u8bc4\u4f30\u7684\u6807\u51c6\u6307\u6807\u3002", "categories": ["cs.CL", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26079", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u9760\u6027\u8bc4\u4f30", "\u987a\u5e8f\u654f\u611f\u6027", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26079v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Same Evidence, Different Answer: Auditing Order Sensitivity in Multimodal Large Language Models", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Effective online adaptation of vision-language-action (VLA) models remains challenging, as sparse rewards provide weak supervision for high-dimensional autoregressive action policies. Although self-distillation can in principle provide denser training signals, we find that text-based privileged teachers conditioned on demonstrations, retrieved experiences, or high-level plans are ineffective for VLA adaptation, exposing a modality gap between symbolic guidance and low-level robot actions. We propose ROAD-VLA, an advantage-guided self-distillation framework that constructs a proximal teacher directly in action space by perturbing action-token logits with calibrated advantage estimates. This converts sparse rewards into dense token-level supervision while keeping the teacher close to the current policy. We further derive a policy-improvement lower bound under calibrated advantages and accurate teacher matching. Across seven robotic manipulation environments with in-distribution and out-of-distribution shifts, ROADVLA outperforms PPO in nearly all settings, demonstrating robust online VLA adaptation.", "arxiv_id": "2606.25800", "arxiv_url": "https://arxiv.org/abs/2606.25800", "authors": ["Kejing Wang", "Toan Nguyen", "Minh Hoang Nguyen", "Simon Khan", "Flora D. Salim"], "brief": "\u9488\u5bf9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u5728\u7ebf\u9002\u5e94\u4e2d\u7a00\u758f\u5956\u52b1\u76d1\u7763\u4e0d\u8db3\u7684\u95ee\u9898\uff0c\u63d0\u51faROAD-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u52a8\u4f5c\u7a7a\u95f4\u4e2d\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\u6a21\u578b\uff08\u5229\u7528\u6821\u51c6\u4f18\u52bf\u4f30\u8ba1\u6270\u52a8\u52a8\u4f5ctoken logits\uff09\uff0c\u5c06\u7a00\u758f\u5956\u52b1\u8f6c\u5316\u4e3a\u5bc6\u96c6\u7684token\u7ea7\u76d1\u7763\u4fe1\u53f7\u3002\u5728\u4e03\u4e2a\u673a\u5668\u4eba\u64cd\u4f5c\u73af\u5883\u4e2d\uff0cROAD-VLA\u5728\u5206\u5e03\u5185\u548c\u5206\u5e03\u5916\u573a\u666f\u4e0b\u5747\u4f18\u4e8ePPO\uff0c\u5b9e\u73b0\u4e86\u9c81\u68d2\u7684\u5728\u7ebfVLA\u9002\u5e94\u3002", "categories": ["cs.LG", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25800", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u81ea\u84b8\u998f", "\u673a\u5668\u4eba\u64cd\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25800v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ROAD-VLA: Robust Online Adaptation via Self-Distillation for Vision-Language-Action Models", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Safety evaluation of large language models (LLMs) is commonly performed by querying models with unsafe or jailbreak prompts and judging whether their outputs violate a safety policy. Although useful, output-level evaluation is expensive, sensitive to judge choice, and easily tied to fixed question banks. We propose **SafeVec**, a white-box evaluation procedure that measures safety from internal representations rather than generated answers. **SafeVec** first extracts layer-wise refusal directions from a safety-aligned reference model, then selects stable layer windows where safe and unsafe behaviors are separable, and finally scores a target model by measuring whether its hidden states align with these refusal directions under unsafe and jailbreak prompts. The resulting metric, **RAS** (**R**efusal **A**lignment **S**core), maps representation-level refusal alignment to a calibrated 0-100 safety score. Across `Llama`, `Gemma`, and `Qwen` model families, RAS separates aligned models from uncensored and abliterated variants, tracks output-level attack success rate, and is substantially faster than judge-based evaluation. These results suggest that refusal alignment provides a compact and efficient signal for white-box LLM safety evaluation.", "arxiv_id": "2606.25750", "arxiv_url": "https://arxiv.org/abs/2606.25750", "authors": ["Chang-Chieh Huang", "Yan-Lun Chen", "Chia-Mu Yu", "Wei-Bin Lee"], "brief": "\u63d0\u51faSafeVec\u767d\u76d2\u5b89\u5168\u8bc4\u4f30\u65b9\u6cd5\uff0c\u901a\u8fc7\u63d0\u53d6\u6a21\u578b\u5185\u90e8\u8868\u793a\u4e2d\u7684\u62d2\u7edd\u65b9\u5411\u6765\u8861\u91cfLLM\u5b89\u5168\u6027\uff0c\u800c\u975e\u4f9d\u8d56\u8f93\u51fa\u7ea7\u5224\u65ad\u3002\u57fa\u4e8e\u6b64\u8ba1\u7b97\u7684RAS\uff08\u62d2\u7edd\u5bf9\u9f50\u5206\u6570\uff09\u5728\u591a\u4e2a\u6a21\u578b\u5bb6\u65cf\u4e0a\u80fd\u6709\u6548\u533a\u5206\u5bf9\u9f50\u4e0e\u672a\u5bf9\u9f50\u6a21\u578b\uff0c\u4e14\u6bd4\u57fa\u4e8e\u88c1\u5224\u7684\u8bc4\u4f30\u65b9\u6cd5\u5feb\u5f97\u591a\u3002", "categories": ["cs.CR", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25750", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u8bc4\u4f30", "\u767d\u76d2\u65b9\u6cd5", "\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25750v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "RAS: Measuring LLM Safety Through Refusal Alignment", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Image generative models are trained on massive, largely uncurated internet-scale datasets that contain undesirable visual concepts. Efficiently removing such concepts from the model generations without degrading the quality of output images remains challenging. We introduce a novel concept removal method for frontier diffusion and image autoregressive models, such as SD3.5, Flux, and Infinity. Our intervention replaces the internal bottleneck layer present in all these modern models with a transcoder that is trained to replicate the original layer while structuring it into distinct activation features. This in-place substitution creates an integrated filter through which concept-specific signals can be selectively disabled while preserving the rest of the model\u0027s behavior. Since the intervention modifies the model backbone rather than attaching an external component, it remains persistent under white-box access. Empirically, the approach achieves state-of-the-art concept removal performance across modern diffusion and autoregressive models, maintains visual generation quality, provides robustness against adversarial prompts, and supports sequential removal of diverse concepts. This positions our method as a practical approach for concept removal in frontier image generative models.", "arxiv_id": "2606.25548", "arxiv_url": "https://arxiv.org/abs/2606.25548", "authors": ["Aditya Kumar", "Pierre Joly", "Adam Dziedzic", "Franziska Boenisch"], "brief": "\u63d0\u51fa\u4e00\u79cd\u9488\u5bf9\u524d\u6cbf\u56fe\u50cf\u751f\u6210\u6a21\u578b\uff08SD3.5\u3001Flux\u3001Infinity\u7b49\uff09\u7684\u6982\u5ff5\u79fb\u9664\u65b9\u6cd5\uff0c\u901a\u8fc7\u5c06\u6a21\u578b\u5185\u90e8\u74f6\u9888\u5c42\u66ff\u6362\u4e3a\u7ecf\u8fc7\u8bad\u7ec3\u7684\u8f6c\u7801\u5668\uff08transcoder\uff09\uff0c\u5c06\u6fc0\u6d3b\u7279\u5f81\u7ed3\u6784\u5316\u4ee5\u9009\u62e9\u6027\u7981\u7528\u7279\u5b9a\u6982\u5ff5\u4fe1\u53f7\u3002\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u751f\u6210\u8d28\u91cf\u7684\u540c\u65f6\uff0c\u5b9e\u73b0\u4e86\u6700\u5148\u8fdb\u7684\u6982\u5ff5\u79fb\u9664\u6548\u679c\uff0c\u5e76\u5bf9\u5bf9\u6297\u6027\u63d0\u793a\u5177\u6709\u9c81\u68d2\u6027\uff0c\u652f\u6301\u987a\u5e8f\u79fb\u9664\u591a\u79cd\u6982\u5ff5\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25548", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u6982\u5ff5\u79fb\u9664", "\u56fe\u50cf\u751f\u6210", "\u6a21\u578b\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25548v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Concept Removal for Frontier Image Generative Models", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Almost every paper on LLM jailbreaks and prompt injection reports an attack-success rate (ASR), and that number is assigned not by people but by an automated judge: either a safety classifier trained for the task, or a general chat model prompted to grade. The judge is rarely checked. We check it. Using 596 human-labeled completions from the HarmBench classifier validation set, we compare the two judge families against human majority votes and then attack them. The two families fail in opposite ways. The dedicated classifier over-flags (precision 0.835, recall 0.974); three different LLM-as-judges keep high precision (0.81 to 0.94) but show erratic recall (0.06 to 0.65), so the same responses produce very different ASR depending on which judge scores them. The two families also differ sharply in robustness. Wrappers that leave the harmful text untouched and only add benign framing flip every LLM-judge between 57% and 100% of the time, and a single prepended refusal sentence accounts for much of this (39% to 88%). The dedicated classifier resists these surface attacks (at most 6.7%), but a white-box GCG attack on its open weights flips 70% of confident true positives (21 of 30; 95% CI 54 to 86%) even at a small optimization budget. A two-annotator audit confirms the attacks leave the harm intact: every one of 80 sampled flips still contained the harmful content. Because a large and growing share of reported ASR comes from LLM-judges, many such numbers are unreliable both on average and under deliberate pressure. We recommend that papers report judge precision and recall on a human-labeled slice, report ASR corrected for judge precision, and include an adversarial check of the judge. Our code is released.", "arxiv_id": "2606.25487", "arxiv_url": "https://arxiv.org/abs/2606.25487", "authors": ["Yang Gao"], "brief": "\u672c\u6587\u7cfb\u7edf\u8bc4\u4f30\u4e86LLM\u8d8a\u72f1\u7814\u7a76\u4e2d\u5e7f\u6cdb\u4f7f\u7528\u7684\u81ea\u52a8\u5316\u653b\u51fb\u6210\u529f\u7387\uff08ASR\uff09\u8bc4\u5224\u5668\u7684\u53ef\u9760\u6027\uff0c\u53d1\u73b0\u4e13\u7528\u5206\u7c7b\u5668\u4e0eLLM\u8bc4\u5224\u5668\u5728\u7cbe\u786e\u7387\u548c\u53ec\u56de\u7387\u4e0a\u5b58\u5728\u76f8\u53cd\u7684\u5931\u6548\u6a21\u5f0f\u3002\u5b9e\u9a8c\u8868\u660eLLM\u8bc4\u5224\u5668\u6781\u6613\u88ab\u7b80\u5355\u7684\u826f\u6027\u5305\u88c5\u6587\u672c\u6b3a\u9a97\uff08\u7ffb\u8f6c\u738757%-100%\uff09\uff0c\u800c\u4e13\u7528\u5206\u7c7b\u5668\u867d\u6297\u8868\u9762\u653b\u51fb\uff0c\u5374\u6613\u53d7\u767d\u76d2GCG\u653b\u51fb\uff0870%\u7ffb\u8f6c\u7387\uff09\uff0c\u5bfc\u81f4\u5927\u91cf\u5df2\u53d1\u8868\u7684ASR\u6570\u636e\u4e0d\u53ef\u4fe1\u3002", "categories": ["cs.CL", "cs.CR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25487", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u5b89\u5168", "\u8d8a\u72f1\u653b\u51fb", "\u8bc4\u4f30\u53ef\u9760\u6027", "\u5bf9\u6297\u9c81\u68d2\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25487v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "How Reliable Is Your Jailbreak Judge? Calibration and Adversarial Robustness of Automated ASR Scoring", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Autoregressive video diffusion with causal diffusion transformers has emerged as a major paradigm for real-time streaming video generation and action-conditioned interactive world models. In this work, we extend rCM, an advanced diffusion distillation framework, to autoregressive video diffusion. The core philosophy of rCM lies in the complementarity between forward and reverse divergences, represented by consistency models (CMs) and distribution matching distillation (DMD), respectively, in diffusion distillation. This philosophy naturally carries over to the autoregressive setting, where teacher-forcing (TF) provides an offline, forward-divergence causal training paradigm, while self-forcing (SF) corresponds to an on-policy, reverse-divergence refinement. Our contributions are: (1) through extensive experiments, we show that teacher-forcing CM is currently the best complement to self-forcing DMD as an initialization strategy (2) we present the first implementation of teacher-forcing-based continuous-time CMs (e.g., sCM/MeanFlow) for autoregressive video diffusion, enabled by our custom-mask FlashAttention-2 JVP kernel, achieving 10$\\times$ faster convergence compared to discrete-time CMs (dCMs) (3) we introduce Causal-rCM, a leading, unified, and scalable algorithm-infrastructure open recipe for diffusion distillation and causal training (4) we achieve state-of-the-art streaming video generation performance in both frame-wise and chunk-wise settings, using only synthetic data for training. Notably, our distilled 2-step causal Wan2.1-1.3B model achieves a VBench-T2V score of 84.63 with only 1 or 2 sampling steps. We further apply Causal-rCM to Cosmos 3, an advanced omnimodal world foundation model for physical AI with action-conditioned generation capability, enabling an interactive world model.", "arxiv_id": "2606.25473", "arxiv_url": "https://arxiv.org/abs/2606.25473", "authors": ["Kaiwen Zheng", "Guande He", "Min Zhao", "Jintao Zhang", "Huayu Chen", "Jianfei Chen", "Chen-Hsuan Lin", "Ming-Yu Liu", "Jun Zhu", "Qianli Ma"], "brief": "\u63d0\u51faCausal-rCM\u6846\u67b6\uff0c\u5c06\u6269\u6563\u84b8\u998f\u65b9\u6cd5rCM\u6269\u5c55\u81f3\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\uff0c\u7ed3\u5408\u6559\u5e08\u5f3a\u5236\uff08\u524d\u5411\u6563\u5ea6\uff09\u4e0e\u81ea\u5f3a\u5236\uff08\u53cd\u5411\u6563\u5ea6\uff09\u4e24\u79cd\u8bad\u7ec3\u8303\u5f0f\u3002\u901a\u8fc7\u81ea\u5b9a\u4e49FlashAttention-2 JVP\u6838\u5b9e\u73b0\u8fde\u7eed\u65f6\u95f4\u4e00\u81f4\u6027\u6a21\u578b\uff0c\u6536\u655b\u901f\u5ea6\u63d0\u534710\u500d\uff0c2\u6b65\u91c7\u6837\u7684Wan2.1-1.3B\u6a21\u578b\u5728VBench-T2V\u4e0a\u8fbe\u523084.63\u5206\uff0c\u5e76\u6210\u529f\u5e94\u7528\u4e8e\u4ea4\u4e92\u5f0f\u4e16\u754c\u6a21\u578bCosmos 3\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25473", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u84b8\u998f", "\u4e16\u754c\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25473v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Causal-rCM: A Unified Teacher-Forcing and Self-Forcing Open Recipe for Autoregressive Diffusion Distillation in Streaming Video Generation and Interactive World Models", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Lifelong continual learning remains an obstacle on the path to human-like intelligence. Modern transformers show sparks of intelligence with in-context learning. The quadratic nature of attention, however, prohibits transformers from performing this process on arbitrarily long sequences. In this work, we argue that extending in-context learning to lifelong settings is a practical solution for continual learning in AI agents. In particular, we argue that \\emph{parametric forms of attention} are needed to understand a lifetime of context with transformers on a fixed hardware budget. These attention mechanisms learn the relationship between keys and their associated values at test-time with parametric regression. Our generalization of parametric approaches (linear attention, state-space models, fast weight programmers, and test-time training layers) contrasts with nonparametric counterparts like softmax attention. They replace the ever-growing key-value cache with an online-trainable neural network, maintaining a constant memory footprint. We highlight how parametric attention currently fall short of lifelong learning due to limited memory capacity or costly online updates. To address these issues, we pose a set of open questions with novel insights to guide the field toward long-horizon agents.", "arxiv_id": "2606.25342", "arxiv_url": "https://arxiv.org/abs/2606.25342", "authors": ["Luke McDermott", "Robert W. Heath", "Rahul Parhi"], "brief": "\u672c\u6587\u63a2\u8ba8\u5c06\u4e0a\u4e0b\u6587\u5b66\u4e60\u6269\u5c55\u5230\u7ec8\u8eab\u5b66\u4e60\u573a\u666f\u7684\u53ef\u884c\u6027\uff0c\u6307\u51fa\u6807\u51c6Transformer\u7684\u4e8c\u6b21\u6ce8\u610f\u529b\u673a\u5236\u56e0\u5185\u5b58\u9650\u5236\u65e0\u6cd5\u5904\u7406\u8d85\u957f\u5e8f\u5217\uff0c\u63d0\u51fa\u53c2\u6570\u5316\u6ce8\u610f\u529b\u673a\u5236\uff08\u7ebf\u6027\u6ce8\u610f\u529b\u3001\u72b6\u6001\u7a7a\u95f4\u6a21\u578b\u7b49\uff09\u662f\u5b9e\u73b0\u7ec8\u8eab\u4e0a\u4e0b\u6587\u5b66\u4e60\u7684\u5173\u952e\u8def\u5f84\uff0c\u5e76\u5206\u6790\u4e86\u73b0\u6709\u65b9\u6cd5\u5728\u8bb0\u5fc6\u5bb9\u91cf\u548c\u5728\u7ebf\u66f4\u65b0\u6548\u7387\u4e0a\u7684\u4e0d\u8db3\uff0c\u63d0\u51fa\u4e86\u82e5\u5e72\u5f00\u653e\u6027\u95ee\u9898\u4ee5\u6307\u5bfc\u672a\u6765\u7814\u7a76\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25342", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u7ec8\u8eab\u5b66\u4e60", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u53c2\u6570\u5316\u6ce8\u610f\u529b", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25342v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Lifelong In-Context Learning with Transformers Requires Parametric Forms of Attention", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Sparse Mixture-of-Experts (MoE) models route each token to a few of many experts, inviting the hypothesis that experts form functional modules tied to capabilities or languages. We test this causally on Command A+, a frontier open-weights MoE (218B total / 25B active; 128 experts, 8 active, +1 shared). We build a routing-mass atlas, pre-register six family-to-axis hypotheses before any intervention, and ablate each family at inference time against a size-matched random-expert null, measuring whether it selectively breaks its own axis (worst off-target effect at most one third of on-target). Crucially, we test the same families under four metrics and a held-out, independent-corpus run with bootstrap confidence intervals. Our finding is cautionary: robust functional modularity is rare and measurement-dependent. Of six pre-registered families, only one, the Arabic-language family, is a clean selective module that survives an independent corpus and a conservative statistical bar (1/6; a more permissive pre-registered point rule admits 3/6, but that count is threshold-sensitive). Every other family has a real causal effect yet fails selectivity, and its apparent modularity flips with the measurement: with the corpus, the metric, and the statistical bar. A positive control on Qwen3-30B-A3B recovers its published disjoint structure, confirming the method detects modularity when present. The verdict reproduces on the un-quantized BF16 model, ruling out a 4-bit quantization artifact. We conclude that ablation-based modularity verdicts are not safe unless the corpus, metric, and statistical bar are controlled. We release the atlas and ablation data.", "arxiv_id": "2606.25092", "arxiv_url": "https://arxiv.org/abs/2606.25092", "authors": ["Tony Salomone", "Deep Gandhi", "Ali Asaria"], "brief": "\u5bf9\u524d\u6cbfMoE\u6a21\u578bCommand A+\uff08218B\u53c2\u6570\uff09\u8fdb\u884c\u9884\u6ce8\u518c\u56e0\u679c\u5b9e\u9a8c\uff0c\u6d4b\u8bd5\u5176128\u4e2a\u4e13\u5bb6\u662f\u5426\u5f62\u6210\u529f\u80fd\u6027\u6a21\u5757\u3002\u7ed3\u679c\u53d1\u73b0\u771f\u6b63\u5177\u6709\u9009\u62e9\u6027\u6a21\u5757\u5316\u7684\u4e13\u5bb6\u6781\u5c11\uff086\u4e2a\u9884\u6ce8\u518c\u5bb6\u65cf\u4e2d\u4ec51\u4e2a\u963f\u62c9\u4f2f\u8bed\u5bb6\u65cf\u901a\u8fc7\u4e25\u683c\u68c0\u9a8c\uff09\uff0c\u5927\u591a\u6570\u8868\u9762\u4e0a\u7684\u6a21\u5757\u5316\u4f1a\u968f\u8bed\u6599\u5e93\u3001\u6307\u6807\u548c\u7edf\u8ba1\u6807\u51c6\u7684\u53d8\u5316\u800c\u6d88\u5931\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25092", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6df7\u5408\u4e13\u5bb6\u6a21\u578b", "\u6a21\u5757\u5316", "\u56e0\u679c\u63a8\u65ad", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25092v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "How Modular Is a Frontier Mixture-of-Experts? A Pre-registered Causal Test in Which Apparent Expert Modularity Mostly Dissolves", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Neural scaling laws for transformer language models predict smooth improvements in pretraining loss with increasing parameters, but downstream capabilities such as in-context learning are known to emerge abruptly past a certain model scale. In this paper, we show that emergent capabilities arise stochastically throughout training, with larger models acquiring them earlier on average. We demonstrate that the emergence of capabilities such as pattern completion and indirect object identification corresponds to the abrupt learning of task-relevant attention patterns. To isolate this phenomenon, we train transformer models on synthetic linear map and cellular automata datasets, and we show that the difficulty of learning attention patterns depends on context length and pattern sparsity. Moreover, scaling the number of attention heads improves learning efficiency on our synthetic tasks, while increasing the head dimension yields diminishing returns past a minimum capacity. We additionally investigate architectures with alternative attention mechanisms, showing that MLP-Mixer outperforms a transformer on linear map tasks with complex attention patterns. Our findings provide a mechanistic insight into emergence, showing that downstream capabilities arise abruptly due to the intrinsic difficulty of learning sparse attention patterns in transformer models.", "arxiv_id": "2606.25010", "arxiv_url": "https://arxiv.org/abs/2606.25010", "authors": ["Vatsal Baherwani", "Zixi Chen", "Shikai Qiu", "Andrew Gordon Wilson", "Pavel Izmailov"], "brief": "\u7814\u7a76\u53d1\u73b0Transformer\u7684\u6d8c\u73b0\u80fd\u529b\u6e90\u4e8e\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u7a00\u758f\u6ce8\u610f\u529b\u6a21\u5f0f\u7684\u7a81\u7136\u4e60\u5f97\uff0c\u8f83\u5927\u6a21\u578b\u5e73\u5747\u66f4\u65e9\u83b7\u5f97\u8fd9\u4e9b\u80fd\u529b\u3002\u901a\u8fc7\u5408\u6210\u6570\u636e\u96c6\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u6ce8\u610f\u529b\u6a21\u5f0f\u5b66\u4e60\u96be\u5ea6\u4e0e\u4e0a\u4e0b\u6587\u957f\u5ea6\u3001\u6a21\u5f0f\u7a00\u758f\u6027\u76f8\u5173\uff0c\u589e\u52a0\u6ce8\u610f\u529b\u5934\u6570\u6bd4\u589e\u5927\u5934\u7ef4\u5ea6\u66f4\u6709\u6548\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25010", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6d8c\u73b0\u80fd\u529b", "\u6ce8\u610f\u529b\u673a\u5236", "Transformer", "\u795e\u7ecf\u7f29\u653e\u5f8b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25010v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Emergent Capabilities Arise Randomly from Learning Sparse Attention Patterns", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Neural scaling laws describe how pre-training loss decays as power laws with training time, model size, and compute. This position paper argues that the exponents of these power laws are fixed by generic mechanisms: a one-third time scaling due to the strong nonlinearity of Softmax, an inverse width scaling due to representational superposition, and an inverse depth scaling due to ensemble averaging of Transformer layers. These mechanisms are robust to a wide range of data structures and architectural details, placing current large language models in a universality class with fixed exponents. The coefficients, however, are expected to be sensitive to data and architecture details, and directly determine practical quantities such as the optimal model shape and the compute-optimal frontier. We therefore argue that understanding the coefficients is the key to near-term performance improvements, and that a closer examination of the current universality class may reveal pathways to better universality classes.", "arxiv_id": "2606.25008", "arxiv_url": "https://arxiv.org/abs/2606.25008", "authors": ["Yizhou Liu", "Jeff Gore"], "brief": "\u672c\u6587\u8bba\u8bc1\u795e\u7ecf\u7f51\u7edc\u7f29\u653e\u5f8b\u7684\u5e42\u5f8b\u6307\u6570\u7531\u901a\u7528\u673a\u5236\u51b3\u5b9a\uff08Softmax\u975e\u7ebf\u6027\u3001\u8868\u793a\u53e0\u52a0\u3001Transformer\u5c42\u96c6\u6210\uff09\uff0c\u5177\u6709\u666e\u9002\u6027\uff1b\u800c\u7cfb\u6570\u5219\u5bf9\u6570\u636e\u548c\u67b6\u6784\u654f\u611f\uff0c\u76f4\u63a5\u51b3\u5b9a\u6700\u4f18\u6a21\u578b\u5f62\u72b6\u548c\u8ba1\u7b97\u6548\u7387\uff0c\u56e0\u6b64\u7406\u89e3\u7cfb\u6570\u662f\u8fd1\u671f\u6027\u80fd\u63d0\u5347\u7684\u5173\u952e\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25008", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7f29\u653e\u5f8b", "\u5927\u8bed\u8a00\u6a21\u578b", "Transformer", "\u666e\u9002\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25008v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Neural Scaling Universality: If Exponents Are Fixed, Time to Understand Coefficients", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Traffic accident reconstruction is a forensic inverse problem that requires recovering physically consistent motion from sparse and heterogeneous evidence. Existing learning-based approaches predominantly optimize for semantic plausibility or visual realism, rather than quantitative agreement with measurable geometry and dynamics. Here, we present TRACER, a training-free framework that formulates reconstruction as a closed-loop structured inference process. Instead of directly generating dense trajectories, our framework constructs and iteratively refines event-anchored motion hypotheses under geometric, kinematic, and interaction constraints, guided by structured case memory and consistency-driven diagnosis. This design enables incremental, interpretable corrections when evidence is insufficient, making the accident reconstruction process more aligned with the workflow of human experts. Experiments on real-world accident data show that TRACER achieves improved geometric fidelity, velocity consistency, and collision accuracy over both data-driven and physics-based baselines.", "arxiv_id": "2606.25002", "arxiv_url": "https://arxiv.org/abs/2606.25002", "authors": ["Yanchen Guan", "Chengyue Wang", "Bin Rao", "Haicheng Liao", "Jiaxun Zhang", "Shang Gao", "Chengzhong Xu", "Zhenning Li"], "brief": "TRACER\u662f\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u4ea4\u901a\u4e8b\u6545\u91cd\u5efa\u6846\u67b6\uff0c\u5c06\u91cd\u5efa\u95ee\u9898\u5efa\u6a21\u4e3a\u95ed\u73af\u7ed3\u6784\u5316\u63a8\u7406\u8fc7\u7a0b\uff0c\u901a\u8fc7\u51e0\u4f55\u3001\u8fd0\u52a8\u5b66\u548c\u4ea4\u4e92\u7ea6\u675f\u8fed\u4ee3\u4f18\u5316\u4e8b\u4ef6\u951a\u5b9a\u7684\u8fd0\u52a8\u5047\u8bbe\u3002\u5728\u771f\u5b9e\u4e8b\u6545\u6570\u636e\u4e0a\uff0cTRACER\u5728\u51e0\u4f55\u4fdd\u771f\u5ea6\u3001\u901f\u5ea6\u4e00\u81f4\u6027\u548c\u78b0\u649e\u7cbe\u5ea6\u4e0a\u5747\u4f18\u4e8e\u6570\u636e\u9a71\u52a8\u548c\u7269\u7406\u4eff\u771f\u57fa\u7ebf\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25002", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u4ea4\u901a\u4e8b\u6545\u91cd\u5efa", "\u7ed3\u6784\u5316\u63a8\u7406", "\u7269\u7406\u7ea6\u675f", "\u9006\u95ee\u9898"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25002v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "TRACER: Training-Free Closed-Loop Structured Inference for Traffic Accident Reconstruction", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Emerging LLM services increasingly host many sparse MoE models, yet most models receive sparse requests and remain cold. This creates a GPU memory problem: model weights are stable and model-determined, while KV-cache is transient and demand-determined. Because cold models rarely reach peak KV-cache demand at the same time, reserving worst-case KV capacity per model wastes memory; a shared KV-cache pool can instead provision aggregate active demand. However, KV-cache sharing is not sufficient when weights and KV-cache remain in a monolithic GPU memory pool. Static weights compete with dynamic KV-cache, and KV-head-limited attention under cold, low-concurrency traffic exposes only a fraction of replicated KV capacity, leading to low GPU memory utilization and weak long-context support. We present CrossPool, a serving engine for cold MoE models that separates FFN weights and KV-cache into two GPU memory pools: a weights pool that consolidates FFN weights across cold models, and a KV-cache pool that dynamically serves active requests while keeping attention local to KV-cache. CrossPool combines a KV-cache planner and virtualizer, a layer-wise pipeline scheduler that hides hidden-state transfers, and persistent kernels with control lowering to reduce CPU-GPU control overhead. With efficient GPU memory pooling, CrossPool underpins bursty long-context requests and outperforms the state-of-the-art kvcached-based multi-LLM serving system, reducing P99 TBT by up to $10.4\\times$.", "arxiv_id": "2606.24506", "arxiv_url": "https://arxiv.org/abs/2606.24506", "authors": ["Zhuoren Ye", "Tianyu Wo", "Dinghao Xue", "Mingming Zhang", "Yuchen Teng", "Chunming Hu", "Renyu Yang"], "brief": "CrossPool\u662f\u4e00\u4e2a\u9762\u5411\u51b7MoE\u6a21\u578b\u7684\u591aLLM\u670d\u52a1\u5f15\u64ce\uff0c\u5c06FFN\u6743\u91cd\u4e0eKV\u7f13\u5b58\u5206\u79bb\u5230\u4e24\u4e2a\u72ec\u7acb\u7684GPU\u5185\u5b58\u6c60\u4e2d\uff0c\u89e3\u51b3\u4e86\u51b7\u6a21\u578b\u7a00\u758f\u8bf7\u6c42\u4e0bGPU\u5185\u5b58\u5229\u7528\u7387\u4f4e\u7684\u95ee\u9898\u3002\u901a\u8fc7KV\u7f13\u5b58\u89c4\u5212\u5668\u3001\u5c42\u7ea7\u6d41\u6c34\u7ebf\u8c03\u5ea6\u5668\u548c\u6301\u4e45\u5316\u5185\u6838\u7b49\u6280\u672f\uff0cCrossPool\u76f8\u6bd4\u6700\u5148\u8fdb\u7684\u591aLLM\u670d\u52a1\u7cfb\u7edf\u5c06P99\u5c3e\u5ef6\u8fdf\u964d\u4f4e\u6700\u9ad8\u8fbe10.4\u500d\u3002", "categories": ["cs.DC", "cs.AI", "cs.LG", "cs.PF"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24506", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "MoE\u6a21\u578b", "KV\u7f13\u5b58", "GPU\u5185\u5b58\u7ba1\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24506v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CrossPool: Efficient Multi-LLM Serving for Cold MoE Models through KV-Cache and Weight Disaggregation", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are increasingly deployed as agents that solve tasks by interacting with external tool environments. Although recent tool-use benchmarks increasingly cover complex task settings, they still largely assume clean, stable, and trustworthy tool environments, leaving tool-environment unreliability insufficiently examined. We introduce ToolBench-X, a benchmark for evaluating agents under recoverable reliability hazards. ToolBench-X contains executable multi-step tasks across diverse domains and sequential, parallel, and mixed workflows, each paired with deterministic tools and a canonical final answer for automatic evaluation. Starting from clean tool environments, ToolBench-X injects five structured hazard types: Specification Drift, Invocation Error, Execution Failure, Output Drift, and Cross-source Conflict. Crucially, each injected instance remains solvable through at least one valid recovery path, such as retrying, fallback, verification, or cross-checking. Experiments reveal a substantial reliability gap: agents that perform well with reliable tools often fail under recoverable hazards. Further analysis shows that failures are driven less by tool-use volume or inference budget than by limited hazard diagnosis and ineffective recovery. Targeted recovery hints recover many failed tasks, while test-time scaling yields more limited gains. These results suggest that tool-use evaluation should move beyond function-call accuracy toward task completion under unreliable tool environments. The code and data is available at https://github.com/Foreverskyou/ToolBench-X.", "arxiv_id": "2606.25819", "arxiv_url": "https://arxiv.org/abs/2606.25819", "authors": ["Yang Tian", "Zhengpeng Shi", "Bo Zhao"], "brief": "\u63d0\u51faToolBench-X\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u5de5\u5177\u73af\u5883\u4e0d\u53ef\u9760\u6761\u4ef6\u4e0b\u7684\u8868\u73b0\uff0c\u6db5\u76d6\u89c4\u8303\u6f02\u79fb\u3001\u8c03\u7528\u9519\u8bef\u3001\u6267\u884c\u5931\u8d25\u7b49\u4e94\u7c7b\u6545\u969c\u6ce8\u5165\u3002\u5b9e\u9a8c\u53d1\u73b0\u73b0\u6709\u667a\u80fd\u4f53\u5728\u53ef\u6062\u590d\u6545\u969c\u4e0b\u8868\u73b0\u5927\u5e45\u4e0b\u964d\uff0c\u6839\u672c\u539f\u56e0\u5728\u4e8e\u6545\u969c\u8bca\u65ad\u80fd\u529b\u4e0d\u8db3\u800c\u975e\u63a8\u7406\u9884\u7b97\u9650\u5236\uff0c\u547c\u5401\u5de5\u5177\u4f7f\u7528\u8bc4\u4f30\u8d85\u8d8a\u51fd\u6570\u8c03\u7528\u51c6\u786e\u7387\u3002", "categories": ["cs.CL", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25819", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u57fa\u51c6\u8bc4\u6d4b", "\u53ef\u9760\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25819v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Function Calling: Benchmarking Tool-Using Agents under Tool-Environment Unreliability", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement Learning (RL) has enabled LLMs to excel in objective reasoning tasks such as mathematics and code generation. However, applying RL to open-ended tasks, such as creative writing, remains challenging because LLM-as-a-judge reward models often exhibit stylistic biases and positional inconsistencies, leading to unstable supervision. To address this, we propose OPERA (Objective Perplexity-based Reflective Alignment), which replaces unreliable external judges with intrinsic rewards derived from perplexity dynamics. Specifically, we derive an intrinsic reward signal from perplexity dynamics, quantifying uncertainty reduction at critical reflective states. During the cold-start phase, we introduce a data synthesis method that leverages carefully designed guiding words to generate diverse reasoning traces, along with perplexity-prioritized rollouts that utilize internal log-probabilities to identify logically consistent reasoning branches. This pipeline yields a large-scale dataset comprising 20,000 high-quality reasoning trajectories. Empirical evaluations consistently demonstrate the scalability and efficacy of our approach in alignment for open-ended tasks. Implementing OPERA on Qwen3-8B establishes a new state-of-the-art among open-source models, achieving parity with or surpassing proprietary models like Gemini2.5 and MiniMax-M2.5 in some open-ended tasks. The code is available at https://github.com/pangpang-xuan/OPERA.", "arxiv_id": "2606.25757", "arxiv_url": "https://arxiv.org/abs/2606.25757", "authors": ["Wenxuan Jiang", "Zining Fan", "Zijian Zhang", "Xuecheng Wu", "Hongming Tan", "Haoyang Dai", "Xiaoyu Li", "Xuezhi Cao", "Ninghao Liu"], "brief": "\u63d0\u51faOPERA\u6846\u67b6\uff0c\u7528\u56f0\u60d1\u5ea6\u52a8\u6001\u53d8\u5316\u4f5c\u4e3a\u5185\u5728\u5956\u52b1\u4fe1\u53f7\u66ff\u4ee3\u4e0d\u7a33\u5b9a\u7684LLM-as-a-judge\u8bc4\u5224\uff0c\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u5728\u5f00\u653e\u5f0f\u4efb\u52a1\uff08\u5982\u521b\u610f\u5199\u4f5c\uff09\u4e2d\u7684\u5bf9\u9f50\u96be\u9898\u3002\u5728Qwen3-8B\u4e0a\u5b9e\u73b0\u5f00\u6e90\u6a21\u578b\u6700\u4f18\uff0c\u90e8\u5206\u4efb\u52a1\u5ab2\u7f8eGemini2.5\u7b49\u95ed\u6e90\u6a21\u578b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25757", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5f00\u653e\u5f0f\u63a8\u7406", "\u56f0\u60d1\u5ea6\u5956\u52b1", "\u5927\u8bed\u8a00\u6a21\u578b\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25757v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "OPERA: Aligning Open-Ended Reasoning via Objective Perplexity-based Reinforcement Learning", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Retrieval-Augmented Generation (RAG) systems are vulnerable to corpus poisoning attacks that manipulate model outputs through malicious retrieved documents. Existing detection methods typically rely on auxiliary classifiers or additional LLM-based verification, introducing substantial computational overhead. We present TRACE, a lightweight detection framework that identifies poisoning attacks by tracing answer-related tokens through token influence attribution. TRACE first discovers recurrent high-influence keywords across retrieved documents and then performs a secondary verification to confirm their influence on model predictions. Experiments on three QA benchmarks and six LLMs demonstrate strong detection performance while simultaneously uncovering attacker-specified target answers.", "arxiv_id": "2606.25721", "arxiv_url": "https://arxiv.org/abs/2606.25721", "authors": ["Yan-Lun Chen", "Pin-Yu Chen", "Chia-Mu Yu", "Ying-Dar Lin", "Yu-Sung Wu", "Wei-Bin Lee"], "brief": "\u9488\u5bf9RAG\u7cfb\u7edf\u7684\u8bed\u6599\u5e93\u6295\u6bd2\u653b\u51fb\uff0c\u63d0\u51fa\u8f7b\u91cf\u7ea7\u68c0\u6d4b\u6846\u67b6TRACE\uff0c\u901a\u8fc7\u8ffd\u8e2a\u7b54\u6848\u76f8\u5173token\u7684\u5f71\u54cd\u529b\u5f52\u56e0\u6765\u8bc6\u522b\u6076\u610f\u6587\u6863\u3002\u5728\u4e09\u4e2aQA\u57fa\u51c6\u548c\u516d\u4e2aLLM\u4e0a\u5b9e\u9a8c\u8868\u660e\uff0cTRACE\u5728\u9ad8\u6548\u68c0\u6d4b\u6295\u6bd2\u653b\u51fb\u7684\u540c\u65f6\u8fd8\u80fd\u63ed\u9732\u653b\u51fb\u8005\u9884\u8bbe\u7684\u76ee\u6807\u7b54\u6848\u3002", "categories": ["cs.CR", "cs.CL", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25721", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["RAG\u5b89\u5168", "\u6295\u6bd2\u653b\u51fb\u68c0\u6d4b", "token\u5f52\u56e0", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25721v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Tracing Target Answers in Poisoned Retrieval Corpora via Token Influence Attribution", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLM-based text embedders have substantially improved retrieval and semantic representation quality, but their deployment remains costly: large backbone models slow down embedding inference, while high-dimensional full-precision embeddings impose substantial storage and bandwidth overhead on large-scale indexes. In this paper, we present BITEMBED, an extreme low-bit framework for LLM-based text embedding that jointly targets encoding efficiency and vector storage. BITEMBED converts pretrained LLM backbones into BitNet-style embedding encoders with ternary weights, quantized activations, and lightweight normalization refinement. The converted model is adapted to representation learning through continual contrastive pre-training, followed by supervised contrastive fine-tuning with both similarity-distribution distillation and attention-relation distillation from a full-precision teacher. Beyond quantizing the backbone, BITEMBED further trains output embeddings to support multiple storage precisions meeting different storage needs in various scenarios. Experiments on MMTEB (eng, v2) with Qwen3-0.6B and Gemma3-270M show that BITEMBED is largely comparable to full precision teacher embedders. Moreover, BITEMBED flexibly obtains text embeddings of various precisions, achieving a trade-off between performance and storage cost.", "arxiv_id": "2606.25674", "arxiv_url": "https://arxiv.org/abs/2606.25674", "authors": ["Zhen Li", "Xin Huang", "Liang Wang", "Nan Yang", "Ting Song", "Yan Xia", "Xun Wu", "Shaohan Huang", "Huishuai Zhang", "Furu Wei", "Dongyan Zhao"], "brief": "\u63d0\u51faBITEMBED\u6846\u67b6\uff0c\u5c06\u57fa\u4e8eLLM\u7684\u6587\u672c\u5d4c\u5165\u6a21\u578b\u8f6c\u6362\u4e3aBitNet\u98ce\u683c\u7684\u4e09\u503c\u6743\u91cd\u7f16\u7801\u5668\uff0c\u901a\u8fc7\u6301\u7eed\u5bf9\u6bd4\u9884\u8bad\u7ec3\u548c\u77e5\u8bc6\u84b8\u998f\u5fae\u8c03\uff0c\u5728\u5927\u5e45\u964d\u4f4e\u5b58\u50a8\u4e0e\u63a8\u7406\u5f00\u9500\u7684\u540c\u65f6\uff0c\u6027\u80fd\u63a5\u8fd1\u5168\u7cbe\u5ea6\u6559\u5e08\u6a21\u578b\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u6846\u67b6\u652f\u6301\u591a\u79cd\u8f93\u51fa\u7cbe\u5ea6\uff0c\u7075\u6d3b\u5e73\u8861\u6027\u80fd\u4e0e\u5b58\u50a8\u6210\u672c\u3002", "categories": ["cs.CL", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25674", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u5d4c\u5165", "\u6a21\u578b\u91cf\u5316", "\u77e5\u8bc6\u84b8\u998f", "\u4fe1\u606f\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25674v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "BitNet Text Embeddings", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent studies on world modeling for Large Language Model (LLM) agents typically formulate the learning objective as next-observation prediction. However, this objective ties supervision to what a transition happens to reveal, which may omit the dynamics most relevant to the agent\u0027s current decision. To bridge this gap, we propose Agent-Authored World Modeling (AAWM), a training procedure that constructs supervision from the policy\u0027s own decision needs. Specifically, at each state, the agent identifies what it needs to understand about the environment before acting. These needs drive the retrieval of relevant transition evidence across trajectories, which is then synthesized into training targets that capture decision-oriented dynamics instead of reconstructing the next observation. This aligns the training objective with the dynamics the policy needs before acting, not with the contents of the next observation. Experimental results validate the effectiveness of AAWM across multiple environments and training settings. These results show that decision-aware world-model targets provide a more effective learning signal than next-observation prediction.", "arxiv_id": "2606.25421", "arxiv_url": "https://arxiv.org/abs/2606.25421", "authors": ["Guangfeng Cai", "Kaibing Yang", "Shuo He", "Yu Li", "Shengtian Yang", "Jiaqi Lv", "Lei Feng"], "brief": "\u63d0\u51fa\u667a\u80fd\u4f53\u81ea\u4e3b\u6784\u5efa\u4e16\u754c\u6a21\u578b\u7684\u8bad\u7ec3\u65b9\u6cd5AAWM\uff0c\u5c06\u76d1\u7763\u4fe1\u53f7\u4ece\"\u9884\u6d4b\u4e0b\u4e00\u89c2\u6d4b\"\u8f6c\u53d8\u4e3a\"\u51b3\u7b56\u5bfc\u5411\u7684\u52a8\u6001\u5efa\u6a21\"\u3002\u667a\u80fd\u4f53\u5728\u6bcf\u4e2a\u72b6\u6001\u8bc6\u522b\u81ea\u8eab\u51b3\u7b56\u9700\u6c42\uff0c\u68c0\u7d22\u76f8\u5173\u8f68\u8ff9\u8bc1\u636e\u5e76\u5408\u6210\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u591a\u4e2a\u73af\u5883\u4e2d\u4f18\u4e8e\u4f20\u7edf\u4e0b\u4e00\u89c2\u6d4b\u9884\u6d4b\u65b9\u5f0f\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25421", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5e8f\u5217\u51b3\u7b56"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25421v1", "published_at": "2026-06-24", "score": 0.
