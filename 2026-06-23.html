ub_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26050", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26050v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Natural Ungrokking: Asymmetric Control of Which Rules Survive Pretraining", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multimodal Large Language Models (MLLMs) demonstrate strong performance on standard visual question answering benchmarks, yet their scalability under controlled structural complexity remains poorly understood. We introduce TriViewBench, a controlled three-view visual reasoning benchmark constructed from synthetic 3D scenes with explicitly parameterized object count and occlusion. The benchmark contains 1,923 scenes and over 14K Question-Answer (QA) pairs organized into four complexity levels and three reasoning categories: Local Decision, Object Counting, and Global Recovery. We evaluate 18 open- and closed-source MLLMs under a unified prompting protocol. All 18 models exhibit an identical capability hierarchy without exception (Local Decision \u003e Object Counting \u003e Global Recovery), and performance degrades monotonically with complexity: Local Decision tasks decline modestly (12.11% relative drop), while Object Counting degrades substantially (59.14%) and Global Recovery collapses severely (80.02%). Error analysis on Object Counting reveals two mechanistically independent failure modes: single-view tasks are dominated by undercounting due to occlusion blindness, whereas the multi-view task reverses to overcounting due to cross-view identity confusion. Chain-of-Thought (CoT) prompting yields near-zero overall benefit ($\u0394= -0.16\\%$) and its effect on Global Recovery is strongly capability-gated, suggesting that the bottleneck lies in cross-view spatial representation rather than reasoning strategy. These findings reveal fundamental scalability limitations in current MLLMs and position TriViewBench as a controlled diagnostic framework for analyzing structural reasoning failures.", "arxiv_id": "2606.26029", "arxiv_url": "https://arxiv.org/abs/2606.26029", "authors": ["Yu-Yang Chen", "Lan-Zhe Guo"], "brief": "Multimodal Large Language Models (MLLMs) demonstrate strong performance on standard visual question answering benchmarks, yet their scalability under controlled structural complexity remains poorly un\u2026", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26029", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26029v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "TriViewBench: Controlled Complexity Scaling for Multi-View Structural Reasoning in MLLMs", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "As autonomous AI agents increasingly transact across organizational boundaries, a fundamental trust challenge emerges: how can an agent assess whether an unknown counterpart is trustworthy? The ERC-8004 protocol addresses this challenge with the first permissionless trust layer for AI agent economies, built around three on-chain registries for Identity, Reputation, and Validation. Despite its rapid adoption, the protocol has not been studied empirically, leaving it unclear whether the information it records provides a trustworthy basis for decision-making. To address this gap, we present the first empirical study of ERC-8004 across three chains: Ethereum, BNB Smart Chain (BSC), and Base, covering the period from protocol deployment through May 13, 2026. We crawl on-chain Identity and Reputation events, off-chain files, and x402 payment transactions. On the identity side, we find that most registrations are placeholders rather than active agents, with only a small fraction (3%, 4%, and 15% across Ethereum, BSC, and Base) exposing a valid ERC-8004 registration file with at least one live service endpoint. On the reputation side, we show that the Registry, as currently deployed, cannot function as a trust signal: values are not commensurable, feedback records are rarely grounded in verifiable interactions, and reputation can be manipulated at minimal cost. Consistent with these design weaknesses, we find that a substantial fraction of reviewers (73.6%, 59.2%, and 90.6% across Ethereum, BSC, and Base) exhibit coordinated Sybil behavior. After removing Sybil-flagged feedback, 15.5%, 72.3%, and 89.4% of rated agents, respectively, are left with no valid feedback. We then turn these findings into concrete recommendations for future revisions of ERC-8004. Our study yields actionable protocol-design implications and establishes an empirical baseline for research on AI agent markets.", "arxiv_id": "2606.26028", "arxiv_url": "https://arxiv.org/abs/2606.26028", "authors": ["Xihan Xiong", "Zelin Li", "Wei Wei", "Qin Wang", "William Knottenbelt", "Zhipeng Wang"], "brief": "As autonomous AI agents increasingly transact across organizational boundaries, a fundamental trust challenge emerges: how can an agent assess whether an unknown counterpart is trustworthy? The ERC-80\u2026", "categories": ["cs.CR", "cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26028", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26028v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Can Trustless Agents Be Trusted? An Empirical Study of the ERC-8004 Decentralized AI Agent Ecosystem", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Tabular foundation models are commonly assumed to present limited privacy concerns as they are often pre-trained on large collections of synthetic data. However, these models leverage in-context learning, where sensitive records may be provided directly at inference time as labelled context examples. In this paper, we demonstrate that predictions generated via the attention mechanism leak sufficient information to enable effective Membership Inference Attacks (MIAs). To highlight this vulnerability, we propose AMIA (Attention-based Membership Inference Attack), a shadow-model-free attack that exploits the concentration of transformer attention patterns. Our results show that attention mechanisms reveal strong membership signals, which exceed classical confidence-based attacks, achieving an average gain of 7.7\\%, specially in low false-positive regimes. To mitigate this risk, we introduce an inference-time defence inspired by $k$-anonymity principles. This approach reduces the uniqueness of context-key representations without introducing random noise or retraining the model. By targeting only high-risk queries identified through AMIA scores, the defence substantially reduces membership leakage of this attack by an average of 50\\% and 25\\% against confidence-based attacks, while preserving predictive utility with only 3.9\\% performance degradation. Beyond showing that context examples are vulnerable, we further demonstrate that fine-tuning introduces an additional source of privacy risk. In particular, samples whose prediction confidence increases after fine-tuning become more susceptible to MIAs, indicating that fine-tuning can amplify memorisation and expose sensitive training information through confidence shifts.", "arxiv_id": "2606.26021", "arxiv_url": "https://arxiv.org/abs/2606.26021", "authors": ["T\u00e2nia Carvalho", "Maxime Cordy"], "brief": "Tabular foundation models are commonly assumed to present limited privacy concerns as they are often pre-trained on large collections of synthetic data. However, these models leverage in-context learn\u2026", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26021", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26021v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Privacy Vulnerabilities of Attention Layers in Tabular Foundation Models and Protection of High-Risk Queries", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-Language-Action (VLA) models are often constrained by the imitation ceiling imposed by sub-optimal data. While Reinforcement Learning (RL) fine-tuning can surpass this limit, it is notoriously sample inefficient. This challenge arises from two core issues: (1) catastrophic initial unlearning due to an unstable Q-function and (2) inefficient policy updates caused by low-quality exploration data, often forcing a reliance on costly human interventions. We introduce FORCE, a 3-stage framework that stabilizes fine-tuning by tackling both issues. FORCE first incorporates a Value-Calibrated Warm-Up phase, utilizing on-policy rollouts to mitigate the distributional shift of the Q-function. Subsequently, during the online stage, this calibrated Q-function acts as a filter for both the policy\u0027s own action proposals and expert data, ensuring only high-value actions are used for the policy update. We evaluate FORCE on various simulation and real-world tasks, and the result shows that FORCE achieves a 79% absolute improvement in success rates and outperform prior RL methods by 10%, while accelerating training by 32.5%. Critically, it mitigates the common success rate drop and achieves this robust performance without human intervention, marking a significant step towards deploying capable and autonomous robotic agents.", "arxiv_id": "2606.26006", "arxiv_url": "https://arxiv.org/abs/2606.26006", "authors": ["Shuyi Zhang", "Yunfan Lou", "Hongyang Cheng", "Yichen Guo", "Chuyao Fu", "Yaoxu Lyu", "Xiaojie Zhang", "Haoran Li", "Pengwei Wang", "Zhongyuan Wang", "Shanghang Zhang"], "brief": "Vision-Language-Action (VLA) models are often constrained by the imitation ceiling imposed by sub-optimal data. While Reinforcement Learning (RL) fine-tuning can surpass this limit, it is notoriously \u2026", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26006", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26006v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "FORCE: Efficient VLA Reinforcement Fine-Tuning via Value-Calibrated Warm-up and Self-Distillation", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present HiReLC, a hierarchical ensemble-reinforcement learning framework for automated joint quantization and structured pruning of deep neural networks. The framework decomposes the compression search across two levels of abstraction: low-level agents (LLAs) operate independently per block, selecting per-kernel configurations over a multi-discrete action space spanning bitwidth, pruning keep-ratio, quantization type, and granularity, while high-level agents (HLAs) coordinate global budget allocation via ensemble voting guided by Fisher Information-based sensitivity estimates. To mitigate the computational cost of policy evaluation, an iterative active learning loop interleaves surrogate-guided RL optimization with post-compression fine-tuning, using a lightweight MLP surrogate to amortize expensive evaluations and a logit-MSE proxy during cold-start. The surrogate is used for reward shaping rather than as a replacement for final post-compression evaluation. The controller is architecture-agnostic by design, with a modular layer abstraction decoupling the RL environment from the underlying network topology. Experiments across Vision Transformer and CNN benchmarks demonstrate effective parameter-storage compression ratios of 5.99 - 6.72$\\times$ with a 3.83 % gain in one setting and 0.55 - 5.62 % accuracy drops elsewhere, supporting hierarchical policy decomposition and sensitivity-aware guidance as practical design choices for joint neural network compression.", "arxiv_id": "2606.26002", "arxiv_url": "https://arxiv.org/abs/2606.26002", "authors": ["Kamar Hibatallah Baghdadi", "Kawther Guoual Belhamidi", "Sara Belhadj", "Aissa Boulmerka", "Nadir Farhi"], "brief": "We present HiReLC, a hierarchical ensemble-reinforcement learning framework for automated joint quantization and structured pruning of deep neural networks. The framework decomposes the compression se\u2026", "categories": ["cs.LG", "cs.AI", "math.OC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26002", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26002v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Hierarchical Reinforcement Learning for Neural Network Compression (HiReLC): Pruning and Quantization", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "There has been significant recent progress in algorithms for approximation of Nash equilibrium in large two-player zero-sum imperfect-information games and exact computation of Nash equilibrium in multiplayer strategic-form games. While counterfactual regret minimization and fictitious play are scalable to large games and have convergence guarantees in two-player zero-sum games, they do not guarantee convergence to Nash equilibrium in multiplayer games. Recently, an approach has been presented for exact computation of Nash equilibrium in multiplayer imperfect-information games that solves a quadratically constrained program based on a nonlinear complementarity problem formulation derived from the sequence-form game representation. This formulation was solved using Gurobi\u0027s nonconvex quadratic solver, which employs spatial branch-and-bound to iteratively refine variable bounds by solving convex relaxations of bilinear terms via McCormick envelopes. During presolve, Gurobi introduces auxiliary variables and, in some cases, binary variables, leading to an internal MIQCP reformulation. This approach was demonstrated to outperform prior algorithms from the Gambit software suite and quickly solve three-player Kuhn poker after removal of dominated actions; however, the algorithm was not able to solve the full version of the game within 24 hours. In this paper, we derive finite bounds on slack and multiplier variables in the nonlinear complementarity formulation. These bounds strengthen the convex relaxations used within spatial branch-and-bound and lead to substantial computational improvements. We demonstrate the impact of the proposed bounds on exact Nash equilibrium computation in three-player Kuhn poker.", "arxiv_id": "2606.25997", "arxiv_url": "https://arxiv.org/abs/2606.25997", "authors": ["Sam Ganzfried"], "brief": "There has been significant recent progress in algorithms for approximation of Nash equilibrium in large two-player zero-sum imperfect-information games and exact computation of Nash equilibrium in mul\u2026", "categories": ["cs.GT", "cs.AI", "cs.MA", "econ.TH", "math.OC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25997", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25997v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Variable Bound Tightening for Nash Equilibrium Computation in Multiplayer Imperfect-Information Games", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "As multimodal conversational systems increasingly engage in spoken interaction, their ability to navigate paralinguistic social cues has become a critical bottleneck for natural human-AI communication. However, existing evaluations of machine emotional intelligence assess reasoning exclusively through isolated text or passive acoustic perception, overlooking the complex cross-modal reasoning required for active, multi-turn dialogue. We introduce \\textsc{SpeechEQ}, a comprehensive framework designed to evaluate the sociolinguistic reasoning of Speech-Language Models (SLMs). The framework includes a validated dataset of 2,265 dialogues across 15 Emotional Quotient (EQ) subscales grounded in EQ-i 2.0 theory, along with a multi-turn evaluation protocol measured by our proposed Spoken EQ (SEQ) score inspired by human EQ assessments. Experiments show limitations in how both existing Speech Emotion Recognition and end-to-end Speech-Language Models understand and apply paralinguistic cues through speech. While end-to-end architectures outperform cascaded systems, \\textsc{SpeechEQ} reveals that current multimodal models remain bottlenecked by a text-reliant ``modality shortcut,\u0027\u0027 an alignment-induced ``safety trap,\u0027\u0027 and ``contextual amnesia,\u0027\u0027 highlighting the barriers to truly emotionally aware AI. Our benchmark can be accessed at https://huggingface.co/datasets/SpeechEQ/SpeechEQ and demo page at https://binomial14.github.io/speecheq-demo/", "arxiv_id": "2606.25990", "arxiv_url": "https://arxiv.org/abs/2606.25990", "authors": ["Liang-Yuan Wu", "Zih-Ching Chen", "Tongshuang Wu", "Chao-Han Huck Yang", "Hua Shen"], "brief": "As multimodal conversational systems increasingly engage in spoken interaction, their ability to navigate paralinguistic social cues has become a critical bottleneck for natural human-AI communication\u2026", "categories": ["cs.CL", "cs.AI", "cs.SD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25990", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25990v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SpeechEQ: Benchmarking Emotional Intelligence Quotient in Socially Aware Voice Conversational Models", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) attain remarkable surface fluency on code, yet they neither formally guarantee the syntactic validity of their output nor leverage the hierarchical structure defining the target language. While existing constrained-decoding frameworks address the former, they operate under rigid assumptions that preclude critical lexical mechanisms -- including context-sensitive lexing, maximal-munch tokenization, and keyword extraction -- and only approximate vocabulary masking, sacrificing completeness. For the latter, code LLMs typically inject grammatical structure via predetermined policies rather than learning which structural information to expose. In this work, we introduce Weave of Formal Thought (WoFT), a paradigm uniting rigorous syntactic validation with learned structural representations. First, we present a formal engine and constrained decoder that is sound and complete with respect to the full Tree-sitter specification. By augmenting generalized LR (GLR) parsing with a speculative-lexing construction that maintains concurrent lexer-state hypotheses synchronized with a GLR graph-structured stack, our decoder admits every subword token extending to a valid program prefix and rejects all others. Second, we present a latent-variable fine-tuning method training the language model to interleave non-terminal grammar symbols directly into generation. Utilizing the reweighted wake-sleep (RWS) algorithm to optimize the importance-weighted evidence lower bound (IW-ELBO) of the surface text, the model learns to selectively retain formal derivations as an adaptive structural scratchpad. For Python, fine-tuning StarCoder2-3B with our RWS objective reduces per-token cross-entropy by 14.3% relative to a text-only SFT baseline, demonstrating that discretionary latent syntax recovers critical structural information that flat autoregressive training discards.", "arxiv_id": "2606.25987", "arxiv_url": "https://arxiv.org/abs/2606.25987", "authors": ["Alexandre Bouayad"], "brief": "Large language models (LLMs) attain remarkable surface fluency on code, yet they neither formally guarantee the syntactic validity of their output nor leverage the hierarchical structure defining the \u2026", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25987", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25987v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Weave of Formal Thought", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are increasingly deployed as investment research assistants, yet no benchmark tests whether they can accurately reconstruct and apply the specific procedural decision frameworks of expert investors. We introduce InvestPhilBench, a multi-layer dynamic benchmark spanning eight cognitive tiers, from principle identification (L1) to novel framework extrapolation (L8). The v0.6 release comprises 118 primary-source-verified investment principle cards, 25 decision framework cards with explicit topology metadata, and 243 QA questions (197 dev / 46 held-out test). For reproducible scoring at scale we introduce the Benchmark Automated Scoring Pipeline (BASP) -- five algorithmic metrics (OGRS, KCCS, SAP@k, IVP, CKCA) -- the Failure Mode Detection Protocol (FMDP) with computable rules for six failure modes, and Gate Reconstruction Accuracy (GRA), a per-gate metric for questions with gold reasoning programs. In this release, InvestPhilBench is primarily a benchmark-and-methodology contribution. A four-model sanity wave on the 188-question development split shows a sharp provider-tier split (BASP 0.906 vs. 0.438); these mixed-judge numbers are confounded upper bounds. The central finding: the BASP composite saturates at the frontier (Claude L4 = 0.932) while GRA still exposes a procedural deficit (frontier L4 GRA approx. 0.77, L7 GRA 0.57-0.62) -- composite scoring rewards fluent prose and hides the procedural gap. v0.6 implements a unified judge and true model-in-the-loop retrieval/oracle conditions; the de-confounded multi-model leaderboard and full three-condition run are v1.0 deliverables. On a 100-item expert-annotated gold set the automated BASP composite tracks the human reference at Pearson r = 0.72 (MAE = 0.10), with attribution (SAP@3) the weakest sub-metric and the failure-mode detector running sensitive-but-over-flagging.", "arxiv_id": "2606.25984", "arxiv_url": "https://arxiv.org/abs/2606.25984", "authors": ["Mingguang Chen", "Bo Qu"], "brief": "Large language models are increasingly deployed as investment research assistants, yet no benchmark tests whether they can accurately reconstruct and apply the specific procedural decision frameworks \u2026", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25984", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25984v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "InvestPhilBench: A Multi-Layer Dynamic Benchmark for Evaluating Large Language Model Procedural Reasoning in Expert Investment Philosophy", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multi-agent goal recognition asks an observer to jointly infer which agents act together and what each team is trying to achieve, so the hypothesis space grows combinatorially with the number of team partitions and goals per team. Real applications such as drone surveillance and collaborative robotics expose only the agents\u0027 trajectory, which forces the observer to rank team-goal hypotheses from behavior alone. Multi-Agent Goal Recognition with Branch-and-Bound (MAGR-BB) addresses this setting with a shared team- and goal-conditioned policy used as the scoring model inside a factorized branch-and-bound search. On a controlled multi-agent Blocksworld benchmark, MAGR-BB returns the same top-ranked hypothesis as exhaustive search throughout the trajectory while cutting hypothesis materialization by orders of magnitude and reducing cumulative recognition runtime substantially.", "arxiv_id": "2606.25978", "arxiv_url": "https://arxiv.org/abs/2606.25978", "authors": ["Thiago Thomas", "Gabriel de Oliveira Ramos", "Felipe Meneguzzi"], "brief": "Multi-agent goal recognition asks an observer to jointly infer which agents act together and what each team is trying to achieve, so the hypothesis space grows combinatorially with the number of team \u2026", "categories": ["cs.MA", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25978", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25978v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Multi-Agent Goal Recognition with Team- and Goal-Conditioned Reinforcement Learning and Factorized Branch-and-Bound", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Software vulnerability remediation is a cognitively demanding task that requires specialized security expertise often lacking in general developers. In the meantime, Large Language Models (LLMs) assisted tools show potential in vulnerability detection, location, and repair tasks. [Hypothesis:] While LLM-assistance is hypothesized to accelerate patching, it also risks introducing hallucinations or insecure code, leading to a higher likelihood of generating superficial repairs that bypass the standard functionality checks but fail the security validation. [Objective:] We aim to present an empirical experiment, unveiling the capability of LLM-assisted vulnerability patching compared to manual debugging on human participants in real-world scenarios. [Method:] We plan to conduct a controlled experiment using a Balanced Crossover design. For that, we have developed a WebApp for code execution and integrated hidden Ghost Tests to verify patch integrity beyond visible functional requirements. The experiment involves training and evaluation scenarios. The remediation speed, remediation efficacy for both standard functionality tests and security tests, and participant perception will be evaluated. [Pilot Study:] A pilot experiment with a small sample of participants has been conducted, providing insights for the following study.", "arxiv_id": "2606.25973", "arxiv_url": "https://arxiv.org/abs/2606.25973", "authors": ["Giulian Biolo", "Michael Tezza", "Yuanjun Gong", "Fabio Massacci"], "brief": "Software vulnerability remediation is a cognitively demanding task that requires specialized security expertise often lacking in general developers. In the meantime, Large Language Models (LLMs) assis\u2026", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25973", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25973v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Helpful or Harmful? Evaluating LLM-Assisted Vulnerability Patching via a Human Study", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Small ($\\sim$2B) GUI-grounding agents are attractive for on-device deployment, accessibility tooling, and low-cost iteration, but at this scale they face two open recipe questions: how to obtain bounding-box training data without expensive human annotation, and how to combine supervised fine-tuning with reinforcement learning. We address both, with the explicit goal of pushing small-model performance rather than scaling up. WinDOM is a $54{,}425$-record grounding corpus harvested by driving an open-source Windows 11 web reimplementation under headless Playwright, with bounding boxes read directly off the DOM and no OCR or human annotation. Self-Family Distillation (SFD) is a single rejection-sampling cold-start parameterised only by the teacher choice: either an EMA of the student (no external model) or a frozen larger same-family teacher. We then treat the saturation depth of the SFD cold-start as an explicit GRPO hyperparameter. On a Qwen3.5-2B student, the under-saturated cold-start is a better GRPO initialiser than the converged one: SFD-4B with Early-init RL gains $+5.4$ OOD-mean ($+3.5$ ScreenSpot-Pro, $+7.0$ OSWorld-G, $+5.8$ ScreenSpot-V2) over the base. The same-size EMA mode lands within roughly one OOD-mean point of the cross-size $4$B variant ($65.2$ vs $66.3$) without an external teacher.", "arxiv_id": "2606.25964", "arxiv_url": "https://arxiv.org/abs/2606.25964", "authors": ["Chengheng Li-Chen", "Zhiqian Zhou", "Hao Chen", "Nicolas Chauvin"], "brief": "Small ($\\sim$2B) GUI-grounding agents are attractive for on-device deployment, accessibility tooling, and low-cost iteration, but at this scale they face two open recipe questions: how to obtain bound\u2026", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25964", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25964v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "WinDOM: Self-Family Distillation for Small-Model GUI Grounding", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Conventional audio pipelines typically treat speech enhancement (SE) and automatic gain control (AGC) as discrete modules, which often limits overall performance. For instance, applying AGC before SE may inadvertently amplify background noise, while prioritizing SE tends to over-suppress low-volume speech. To address these limitations, we propose SE-AGCNet, an end-to-end framework that jointly optimizes SE and AGC. Tailored for meeting scenarios with significant volume variations, SE-AGCNet leverages the synergy between the two tasks: SE preserves quiet speech, thereby facilitating effective volume adjustment by the AGC component. Furthermore, we propose a specialized data simulation pipeline, SE-AGC-DataGen, and incorporate standardized loudness evaluation metrics: integrated loudness (LUFS), short-term loudness (St LUFS), and LRA. Experiments show that SE-AGCNet consistently achieves target loudness while improving speech quality and ASR accuracy over competitive baselines.", "arxiv_id": "2606.25959", "arxiv_url": "https://arxiv.org/abs/2606.25959", "authors": ["Jinming Zhang", "Wei Rao", "Xionghu Zhong", "Eng Siong Chng"], "brief": "Conventional audio pipelines typically treat speech enhancement (SE) and automatic gain control (AGC) as discrete modules, which often limits overall performance. For instance, applying AGC before SE \u2026", "categories": ["eess.AS", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25959", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25959v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SE-AGCNet: An End-to-End Framework for Joint Speech Enhancement and Loudness Control in Meeting Scenarios", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Risk stratification for pulmonary embolism (PE) is critical for clinical decision-making. Stratification guidelines are based on patient medical records, parameters measured from computed tomography pulmonary angiography (CTPA), and blood tests. However, blood tests are often missing in routine practice. This work studies whether state-of-the-art models can accurately classify risk stratification from only medical records and biomarkers extracted from CTPA images. We benchmark different approaches to combine medical records and cardiac biomarkers with rich pulmonary vascular information; we add vascular biomarkers to tabular models and apply graph neural networks (GNNs) on the vascular tree\u0027s intrinsic graph representation. We use a private dataset (n=353) with uniquely complete data for PE risk stratification. Our results show that, among global features, medical records and cardiac biomarkers are the most significant predictors, while vascular biomarkers do not further improve stratification. Even more surprising, even GNNs on vascular graphs fail to outperform strong tabular baseline on global features. We consider hypotheses, on both models and data, that could explain this suboptimal performance. Our investigation suggests that, counter-intuitively, vascular graphs might hold no discriminative information for PE risk stratification. Code is available from https://github.com/creatis-myriad/GENESIS.", "arxiv_id": "2606.25956", "arxiv_url": "https://arxiv.org/abs/2606.25956", "authors": ["Nathan Painchaud", "Tristan Hab\u00e9mont", "Morgane des Ligneris", "Allan Serva", "Pierre Croisille", "Laurent Bertoletti", "Thomas Lampert", "Johannes F. Lutzeyer", "Odyss\u00e9e Merveille"], "brief": "Risk stratification for pulmonary embolism (PE) is critical for clinical decision-making. Stratification guidelines are based on patient medical records, parameters measured from computed tomography p\u2026", "categories": ["cs.CV", "cs.AI", "cs.LG", "eess.IV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25956", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25956v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Pulmonary Embolism Risk Stratification from CTPA and Medical Records: Vascular Graphs Are Not All You Need", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This theoretical note studies the finite axiomatizability of strict majority reasoning in finite social decision frames. Moss and Pedersen (2026) \u003cdoi: 10.48550/arXiv.2606.23853\u003e introduce a coherence criterion that characterizes exactly when qualitative majority judgments are representable by a finitely additive measure. The question addressed here is whether that coherence criterion can be replaced, in the finite setting, by any bounded finite fragment. We prove that it cannot. For every $k\\ge 1$, we construct a maximal standard frame whose shortest coherence violation has length exactly $2k+2$. Hence there is no uniform finite bound on the incoherence index of social decision frames, resolving Conjecture 5.7 stated by Moss and Pedersen (2026). The construction is geometric, in the sense that it proceeds via orthogonality and dimension in rational vector spaces, and self-contained: it isolates a symmetric family of half-sized voting blocs and extends it to a maximal frame in which every shorter balanced obstruction is excluded. Along the explicit infinite sequence of universe sizes obtained in the construction, this also establishes the middle-layer family predicted by Conjecture B.25 by Moss and Pedersen (2026). Together with the soundness and completeness theorem for the Moss-Pedersen minimal logic for strict majorities, this establishes that measurable social decision frames are not finitely axiomatizable in that language.", "arxiv_id": "2606.25954", "arxiv_url": "https://arxiv.org/abs/2606.25954", "authors": ["Lawrence S. Moss", "Arthur Paul Pedersen"], "brief": "This theoretical note studies the finite axiomatizability of strict majority reasoning in finite social decision frames. Moss and Pedersen (2026) \u003cdoi: 10.48550/arXiv.2606.23853\u003e introduce a coherence\u2026", "categories": ["econ.TH", "cs.AI", "cs.LO", "math.CO", "math.LO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25954", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25954v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Measurable Majorities Are Not Finitely Axiomatizable", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Was this person ever at that place, and if so, when? Answering such questions from noisy, multilingual historical documents is the central challenge of HIPE-2026, the third edition of the HIPE evaluation series. Moving from named entity recognition and linking (HIPE-2020, HIPE-2022) to reasoning about relationships between entities, HIPE-2026 targets two temporally grounded relation types: $at$, indicating that a person was present at a location at some point prior to a document\u0027s publication date, and $isAt$, indicating presence contemporaneous with that date. This paper presents the results of the evaluation campaign, which confronted 17 participating teams with the challenges of historical language variation, OCR noise, and indirect contextual cues across three languages: French, German, and English. The datasets include historical newspaper text from the nineteenth and twentieth centuries, as well as a surprise-domain generalization set drawn from early modern French literary texts. A distinctive feature of HIPE-2026 is its three-fold evaluation framework, which assesses predictive accuracy, computational efficiency, and cross-domain generalization, reflecting the practical demands of large-scale historical document processing in the cultural heritage domain. Across more than 40 submitted runs, results reveal a wide range of strategies, from state-of-the-art large language models to lightweight task-specific classifiers, and highlight the trade-offs between accuracy, efficiency, and robustness inherent to historical relation extraction at corpus scale. System descriptions, datasets, and findings are presented and discussed, offering a detailed picture of the current state of temporally grounded relation extraction for historical documents.", "arxiv_id": "2606.25935", "arxiv_url": "https://arxiv.org/abs/2606.25935", "authors": ["Juri Opitz", "Maud Ehrmann", "Corina Racl\u00e9", "Andrianos Michail", "Matteo Romanello", "Simon Clematide"], "brief": "Was this person ever at that place, and if so, when? Answering such questions from noisy, multilingual historical documents is the central challenge of HIPE-2026, the third edition of the HIPE evaluat\u2026", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25935", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25935v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Overview of HIPE-2026: Person-Place Relation Extraction from Multilingual Historical Texts", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Medical vision-language models typically generate diagnoses through single-pass inference without indicating which image regions support their conclusions. This lack of spatial grounding limits clinical utility: outputs cannot be audited, and models may hallucinate findings on normal scans. We present BrReMark (Brain Rethink via ROI Marking), a framework that introduces explicit region marking into brain MRI diagnosis. The model first generates hypotheses about potential abnormalities and grounds them through explicit bounding box marking, then verifies conclusions by re-examining the marked evidence. Training combines supervised fine-tuning on structured reasoning trajectories with reinforcement learning using a composite reward over localization accuracy and diagnostic reasoning. Furthermore, we integrate a domain randomization-based pathology synthesis augmentation strategy to improve the model\u0027s generalizability to out-of-distribution (OOD) data. On internal benchmark, BrReMark improves mAP50 from 0.74% to 37.54% compared to the base model, while achieving 21.57% Clinical F1 and 45.26% diagnostic accuracy. On NOVA OOD benchmark, it also achieves competitive overall performance with a 45.7% reduction in false positives compared to the state-of-the-art, indicating reduced hallucination on rare pathologies. These findings suggest that explicit hypothesis-verification grounding is a practical path toward trustworthy open-ended brain MRI diagnosis across both in-distribution and OOD settings.", "arxiv_id": "2606.25894", "arxiv_url": "https://arxiv.org/abs/2606.25894", "authors": ["Shangkun Li", "Jie Xu", "Yi Guo", "Zeju Li", "Yuanyuan Wang"], "brief": "Medical vision-language models typically generate diagnoses through single-pass inference without indicating which image regions support their conclusions. This lack of spatial grounding limits clinic\u2026", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25894", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25894v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Enhancing Brain MRI Anomaly Detection and Reasoning with ROI Rethink and Synthetic Data", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Computational reproducibility remains difficult despite being central to scientific research. In this paper, we show how the international FABRIC testbed, combined with large language model (LLM) coding assistants through LoomAI, can simplify reproducing published experiments across multiple domains. We reproduced three case studies on FABRIC, covering BBR-family congestion-control evaluations, LAMMPS molecular dynamics scaling benchmarks on a CPU-only MPI cluster, and stress protein homeostasis genomics pipelines. Rather than focusing only on matching numerical outputs, we evaluate whether the reproduced experiments support the same scientific conclusions as the original studies. The AI assistant was effective in setting up the environment, adapting code, and debugging, but struggled with the analysis stages that lacked clearly defined workflows, which required human guidance to establish execution order and data dependencies. Across the case studies, the AI-assisted workflow reduced reproduction effort by roughly 4--6 times. We conclude with practical recommendations for improving AI-assisted reproducibility on research testbeds.", "arxiv_id": "2606.25879", "arxiv_url": "https://arxiv.org/abs/2606.25879", "authors": ["Komal Thareja", "Paul Ruth", "Berent Aldikacti", "Michael Zink"], "brief": "Computational reproducibility remains difficult despite being central to scientific research. In this paper, we show how the international FABRIC testbed, combined with large language model (LLM) codi\u2026", "categories": ["cs.DC", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25879", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25879v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AI-Assisted Computational Reproducibility on the FABRIC Testbed", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "How can we generate high-quality relevance annotations at scale without the cost and delays of human labeling? Relevance annotations are the backbone of search ranking systems which is needed for training data preparation, NDCG evaluation, and root cause analysis. However, human annotation is slow and off-the-shelf LLMs suffer from accuracy on domain-specific tasks. We propose a calibrated model cascade, a systematic approach for cost-efficient offline relevance annotation by routing queries through progressively larger fine-tuned classifiers. Our central insight is that accuracy and cost are orthogonal optimizations: domain-specific fine-tuning drives accuracy, cascading drives cost, and per-class isotonic calibration adds a small but reliable gain on top. Our contribution is threefold: (a) we decompose the gains and show that fine-tuning contributes 20 accuracy points while cascading is approximately accuracy-neutral but halves compute cost, (b) we introduce per-class isotonic calibration as one component of the cascade, contributing a small but statistically significant gain (+0.6 points over the strongest calibration baseline), and (c) we validate the system in production across six offline use cases, processing 150M+ annotations and enabling faster experimentation cycles. Our work is a building block for scalable, high-quality offline annotation pipelines in search and advertising systems.", "arxiv_id": "2606.25871", "arxiv_url": "https://arxiv.org/abs/2606.25871", "authors": ["Md Omar Faruk Rokon", "Shasvat Desai", "Hong Yao", "Kuang-chih Lee"], "brief": "How can we generate high-quality relevance annotations at scale without the cost and delays of human labeling? Relevance annotations are the backbone of search ranking systems which is needed for trai\u2026", "categories": ["cs.IR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25871", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25871v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AutoRelAnnotator: Calibrated Model Cascades for Cost-Efficient Relevance Evaluation in Sponsored Search", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Federated learning is vulnerable to backdoor attacks in which malicious clients inject poisoned updates while preserving benign-task performance. In this paper, we study a semantics-driven backdoor mechanism in which attackers use natural visual accessories as triggers and manipulate only the trigger color while keeping the attack pipeline fixed. Our framework considers semantic trigger objects such as masks and sunglasses, instantiated in black and white variants, and evaluates their effect in a controlled federated learning setting. Malicious clients construct poisoned samples by applying a trigger to source-class images and relabeling them to an attacker-chosen target class, while benign clients train only on clean data. We analyze this mechanism under both a standard poisoning objective and a stronger SABLE-based objective that combines clean classification loss, triggered target loss, feature-separation loss in the penultimate representation space, and regularization to keep malicious updates close to the global model. This design enables the attack to remain effective while reducing excessive update drift. Experiments on a four-class CelebA hair-color task show that trigger color significantly changes attack success rate even when trigger semantics, placement, and poisoning budget are unchanged. White triggers are more effective for attacks targeting the blond class, whereas black triggers perform better for attacks targeting the black class. The same trend persists under robust aggregation, showing that trigger color is a meaningful factor in the operation, persistence, and evaluation of semantic backdoor mechanisms in federated learning.", "arxiv_id": "2606.25858", "arxiv_url": "https://arxiv.org/abs/2606.25858", "authors": ["Kavindu Herath", "Joshua C. Zhao", "Saurabh Bagchi"], "brief": "Federated learning is vulnerable to backdoor attacks in which malicious clients inject poisoned updates while preserving benign-task performance. In this paper, we study a semantics-driven backdoor me\u2026", "categories": ["cs.CR", "cs.AI", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25858", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25858v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Color Matters: Trigger Color Affects Success in Federated Backdoor Attacks", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Production vision pipelines silently degrade on blurry input, wasting compute on downstream OCR, retrieval, and vision-language model (VLM) calls that cannot recover a usable output. We present MagikaDocumentFromPixel, a lightweight, CPU-friendly image quality gate that classifies a single image as sharp, blurred, or uncertain in roughly 7 ms on a single CPU core. The contributions are (i) a recipe selected from a 46-configuration, 8-sweep empirical search that isolates input resolution as the dominant lever and shows architecture capacity only pays off at \u003e= 384 px; (ii) a confidence-aware routing formalism grounded in classical selective prediction; (iii) the Edge Prior Module (EPM), a Laplacian-magnitude auxiliary input channel that gives the network direct access to the spectral evidence that classical blur heuristics rely on and that lifts test F1 by +1.3 points in a matched-env comparison; and (iv) an observation that the gate is one instance of a recurring design pattern that appears independently in Magika content-type detection, risk-controlled OCR with VLMs, and DocVLM. The final recipe MobileNetV3-Large with the EPM trained at 384x384 on paired GoPro Large frames, evaluated with 5-scale test-time augmentation reaches F1 = 0.9803 (AUC 0.9989) with a 17 MB ONNX artifact, improving over our fixed-scale baseline on the same hardware (F1 = 0.9672) by +1.31 points. We are explicit about limitations: results are on a single motion-blur distribution, numbers are from a single seed, and calibration is qualitative rather than measured.", "arxiv_id": "2606.25838", "arxiv_url": "https://arxiv.org/abs/2606.25838", "authors": ["Duy Tran Thanh"], "brief": "Production vision pipelines silently degrade on blurry input, wasting compute on downstream OCR, retrieval, and vision-language model (VLM) calls that cannot recover a usable output. We present Magika\u2026", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25838", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25838v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Edges Before Embeddings: A Confidence-Aware Blur Gate for Vision-Language Pipelines", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Achieving strong optimization generalization across diverse optimization problems while requiring limited training resources remains a challenging problem for optimization-oriented large language models (LLMs). Existing approaches typically rely on large-scale supervised datasets, costly reasoning annotations, and expensive intermediate step verification, resulting in substantial training overhead. To address these challenges, we propose MiniOpt, a reinforcement learning framework that learns to solve optimization problems through an \"reasoning-to-model-and-solve\" paradigm. MiniOpt decomposes optimization reasoning into structured optimization modeling and executable solver generation. Building upon this paradigm, we introduce OptReward, a reward function with hierarchical score structure that jointly evaluates formulation and solution, enabling effective policy learning without expert demonstrations. We further develop an optimization-oriented policy optimization strategy that improves exploration efficiency and stabilizes reinforcement learning for compact models. Extensive experiments show that MiniOpt-3B exhibits strong optimization generalization across various optimization types, problem scenarios, and task domains. For models with fewer than 10B parameters, MiniOpt series achieves the highest average solving accuracy (SA). For models with more than 10B parameters, MiniOpt still shows competitive performance. These results suggest that optimization-oriented reward design and reinforcement learning provide an effective pathway for developing compact optimization-specialized language models with strong optimization generalization capabilities. The code is available at https://github.com/Hsiang-1/MiniOpt.", "arxiv_id": "2606.25832", "arxiv_url": "https://arxiv.org/abs/2606.25832", "authors": ["Ke Zhao", "Zixiang Di", "Hong Qian", "Xiang Shu", "Yaolin Wen", "Qitao Shi", "Bingdong Li", "Xingyu Lu", "Xiangfeng Wang", "Jun Zhou", "Ke Tang", "Yang Yu"], "brief": "Achieving strong optimization generalization across diverse optimization problems while requiring limited training resources remains a challenging problem for optimization-oriented large language mode\u2026", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25832", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25832v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MiniOpt: Reasoning to Model and Solve General Optimization Problems with Limited Resources", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Sparse Mixture-of-Experts (MoE) architectures have emerged as an increasingly influential paradigm as they offer a strategic balance between parameter scalability and computational efficiency. However, low-resource languages, which suffer from a scarcity of high-quality training data, often have their tokens routed to different experts than those predominantly activated by high-resource inputs, which limits cross-lingual expert sharing. This cross-lingual routing divergence consequently hinders their efficacy in multilingual contexts. To address this issue, we propose SARA (Semantically Anchored Routing Alignment), a framework designed to transfer specialized capabilities from high-resource languages as anchors to low-resource languages. SARA explicitly aligns the routing distribution of multilingual inputs with high-resource semantic anchors using a symmetric Jensen-Shannon (JS) divergence constraint. Unlike traditional distillation methods that operate on output logits, SARA directly aligns the internal routing distributions of MoE layers, encouraging mechanistic consistency in expert selection across languages. We conduct experiments on 2 LLMs across 5 low-resource languages and 3 benchmarks. Experiment results demonstrate that SARA outperforms standard instruction tuning, e.g., +0.8% on Qwen3-30B-A3B and +1.2% on Phi-3.5-MoE-instruct on Global-MMLU. Further analyses show that SARA effectively addresses performance bottlenecks in low-resource languages, providing a scalable pathway to enhance multilingual capabilities in sparse architectures.", "arxiv_id": "2606.25821", "arxiv_url": "https://arxiv.org/abs/2606.25821", "authors": ["Tianyu Dong", "Yangyang Liu", "Jiang Zhou", "Xinwei Wu", "Xiaohu Zhao", "Hao Wang", "Heng Liu", "Linlong Xu", "Longyue Wang", "Weihua Luo", "Shaolin Zhu", "Deyi Xiong"], "brief": "Sparse Mixture-of-Experts (MoE) architectures have emerged as an increasingly influential paradigm as they offer a strategic balance between parameter scalability and computational efficiency. However\u2026", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25821", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25821v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SARA: Unlocking Multilingual Knowledge in Mixture-of-Experts via Semantically Anchored Routing Alignment", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Markov decision processes (MDPs) are a classic model of decision making under uncertainty, exhibiting both non-deterministic choice as well as probabilistic uncertainty. Traditionally, exact knowledge of the underlying probabilities is assumed. However, this often is unrealistic, e.g.\\ when modelling cyber-physical systems or biological processes. Here, statistical methods provide a way towards obtaining meaningful guarantees. The classical approach is to gather samples in the MDP, use these to draw statistical conclusions about the transition probabilities, and from there obtain bounds on the true value; then, if these bounds are too broad, repeat. However, existing implementations of this approach are either subtly incorrect or sub-optimal, and quite often both. We present several \\emph{confidence sequences}, which are specifically designed for such \\enquote{online} settings, implement all of them in an efficient tool, and show their practical applicability. In particular, we show that they outperform classical \\enquote{union-bound} style approaches, and overall our implementation requires 50x less samples on average than previous state of the art.", "arxiv_id": "2606.25797", "arxiv_url": "https://arxiv.org/abs/2606.25797", "authors": ["Konstantin Kueffner", "Tobias Meggendorfer", "Maximilian Weininger", "Patrick Wienh\u00f6ft"], "brief": "Markov decision processes (MDPs) are a classic model of decision making under uncertainty, exhibiting both non-deterministic choice as well as probabilistic uncertainty. Traditionally, exact knowledge\u2026", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25797", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25797v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Confidence Sequences for Online Statistical Model Checking of Markov Decision Processes", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "With the widespread adoption of large language models (LLMs) in chatbots and everyday applications, companies increasingly need guardrails that are effective while remaining low-cost and low-latency. Safety evaluation of LLM outputs has generally relied on LLM-based judges, which can be effective but are often slow and expensive to deploy at scale. In this paper, we evaluate whether fine-tuned modern encoder classifiers from the ModernBERT family, including ModernBERT and Ettin, can reliably identify harmful LLM outputs in user-model conversations without substantial performance loss relative to LLM-based judges. We benchmark these encoder classifiers against rule-based prefix matching, fine-tuned LLM classifiers, and LLM judges using a range of judge-prompting strategies across open-source adversarial datasets. The LLM judges include evaluation methodologies from StrongReject, ShieldGemma, JailbreakBench, AILuminate, SorryBench, and a Claude-as-a-judge setup, as well as fine-tuned safety classifiers such as LlamaGuard 3 and LlamaGuard 4. The encoder classifiers are fine-tuned on judge-labeled data using a majority-voting label strategy and are then evaluated on a gold-standard holdout dataset to assess their performance relative to LLM judges. We report absolute performance using F1 score, false negative rate, and precision-recall metrics. We also break down results by attack technique, including single-turn prompting, decomposition, escalation, and context manipulation, to identify where encoder classifiers align with or diverge from LLM-based judges. Our findings provide guidance on when encoder classifiers can serve as cost- and latency-efficient alternatives to LLM-based safety evaluation.", "arxiv_id": "2606.25782", "arxiv_url": "https://arxiv.org/abs/2606.25782", "authors": ["Han Jeon", "Shiv Medler", "Joseph Voyles", "Matt Wood"], "brief": "With the widespread adoption of large language models (LLMs) in chatbots and everyday applications, companies increasingly need guardrails that are effective while remaining low-cost and low-latency. \u2026", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25782", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25782v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Do Encoders Suffice? A Systematic Comparison of Encoder and Decoder Safety Judges for LLM Adversarial Evaluation", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper presents a versatile framework for evaluating fuzzy quantification queries over both standard and fuzzy ontologies as well as knowledge graphs. The primary objective is the retrieval of individuals that satisfy queries articulated via Type I or Type II fuzzy quantified expressions. A key advantage of the proposed approach is its inherent adaptability: it remains entirely agnostic to the quantifier type, the underlying evaluation method, and the specific data source of the ontology (i.e., OWL ontologies or RDFS knowledge graphs). Furthermore, we present Q2S2, a publicly accessible implementation of this system developed to support future research.", "arxiv_id": "2606.25778", "arxiv_url": "https://arxiv.org/abs/2606.25778", "authors": ["Enrique Palac\u00edn", "Fernando Bobillo", "Ignacio Huitzil", "Francesca A. Lisi", "Umberto Straccia"], "brief": "This paper presents a versatile framework for evaluating fuzzy quantification queries over both standard and fuzzy ontologies as well as knowledge graphs. The primary objective is the retrieval of ind\u2026", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25778", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25778v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Fuzzy Quantification over OWL Ontologies and Knowledge Graphs", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We initiate a resource-aware theory of \\textit{language generation in the limit} under the minimal constraint of space efficiency. In our framework, a learner observes an adversarial positive stream from a target language $K$ and must eventually output a hallucination-free hypothesis language $L \\subseteq K$ while omitting at most $\u0394$ strings of $K$. We focus on $\\mathcal{C}_{s,k}$, the collection of languages recognized by DFAs with at most $s$ states over an alphabet of size $k$, as the natural hypothesis class for memory-bounded learners. In the exponential-space regime, we prove that a learner can exactly identify the target $K$. Under a stricter memory budget, we characterize the strongest possible generation guarantees. In particular, we present a streaming algorithm using $\\mathrm{poly}(s,k)$ space that converges to a hypothesis with generation gap $\u0394= O(k^{2s-2})$. Moreover, the learned hypothesis captures every string in $K$ of length at least $2s-1$. We complement this result with a near-matching lower bound through a reduction from a standard communication complexity problem. Specifically, achieving generation gap $\u0394\\le k^{(1-\\varepsilon)s}$ requires $k^{\u03a9(\\varepsilon s)}$ memory. Together, these results reveal a sharp transition between polynomial-space generation and exponential-space exact identification.", "arxiv_id": "2606.25777", "arxiv_url": "https://arxiv.org/abs/2606.25777", "authors": ["Nicolas Flammarion", "Chirag Pabbaraju", "Hristo Papazov", "Miltiadis Stouras", "Ola Svensson"], "brief": "We initiate a resource-aware theory of \\textit{language generation in the limit} under the minimal constraint of space efficiency. In our framework, a learner observes an adversarial positive stream f\u2026", "categories": ["cs.DS", "cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25777", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25777v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Space-Efficient Language Generation in the Limit", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In oncology, access to patient-level data is often restricted. Synthetic data provides an alternative for analyzing treatment effectiveness, but existing methods for synthetic data generation fail to preserve the causal relationships between covariates, treatments, and outcomes, thereby leading to biased estimates of treatment effects. Here, we introduce OncoSynth, a generative, causally-aware machine learning framework designed to produce synthetic cohorts that enable accurate estimation of population- and patient-level treatment effects. OncoSynth uses a diffusion-based sequential approach to model how covariates influence treatment assignment and how treatment affects survival. We evaluate OncoSynth using large lung (N = 37,128) and breast cancer (N = 17,046) cohorts. Our results show that OncoSynth generates high-fidelity synthetic patient cohorts that preserve real-world patient, treatment, and outcome distributions. Notably, OncoSynth improves treatment effect estimation over existing approaches, by reducing population-level treatment effect error by up to 66%, and patient-level treatment effect error by up to 58%. Thereby, OncoSynth supports reliable evidence generation for precision oncology in settings where data sharing is restricted.", "arxiv_id": "2606.25762", "arxiv_url": "https://arxiv.org/abs/2606.25762", "authors": ["Octavia-Andreea Ciora", "Julian Welzel", "Dennis Frauen", "Maresa Schr\u00f6der", "Marie Brockschmidt", "Harry Amad", "Thomas Callender", "Mihaela van der Schaar", "Stefan Feuerriegel"], "brief": "In oncology, access to patient-level data is often restricted. Synthetic data provides an alternative for analyzing treatment effectiveness, but existing methods for synthetic data generation fail to \u2026", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25762", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25762v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "OncoSynth: Synthetic data generation for treatment effect estimation in oncology", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Gradient-based inverse lithography technology~(ILT) for extreme ultraviolet~(EUV) masks is presented. A novel framework treats the differentiable waveguide method and the recently proposed waveguide neural operator~(WGNO) as end-to-end physics engines, recovering the permittivity of the absorber of the mask through automatic differentiation of the full forward diffraction model. Numerical experiments on realistic 2D and 3D absorbers of the mask (TaBN, La, U) at $\u03bb{=}11.2$~nm show that the considered ILT methods make it possible to obtain a mask structure that achieves the desired field on the wafer.", "arxiv_id": "2606.25753", "arxiv_url": "https://arxiv.org/abs/2606.25753", "authors": ["Vasiliy A. Es\u0027kin", "Egor V. Ivanov"], "brief": "Gradient-based inverse lithography technology~(ILT) for extreme ultraviolet~(EUV) masks is presented. A novel framework treats the differentiable waveguide method and the recently proposed waveguide n\u2026", "categories": ["cs.LG", "cs.AI", "math.OC", "physics.comp-ph", "physics.optics"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25753", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25753v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Gradient-based inverse lithography for EUV masks via the waveguide method and a physics-informed neural operator", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "3D anomaly detection in point clouds is critical for high-precision industrial manufacturing. Reconstruction-based methods have laid a strong foundation by detecting 3D anomalies through comparisons between defective inputs and their reconstructed normal counterparts. However, existing methods still suffer from two challenges: 1) the foreground weak defective regions such as scratches are hard to reconstruct and detect, where the anomaly deviations in normalized point clouds can be as small as $10^{-3}$; 2) the background non-defective regions are prone to get positional bias in reconstruction, which leads to false positives. To address these challenges, we propose \\textbf{PCDiff}, a point cloud diffusion framework for instance-level 3D anomaly generation and detection. In the generation phase, an instance-level multi-modal attention is embedded into the generation framework, where anomalies are conditioned with texture gradient, image patch, text and mask. The instance-level condition enables the high-quality generation of weak-defective anomalies. In the detection phase, a joint local-global reconstruction algorithm is introduced to ensure local anomaly restoration and global geometric consistency, which preserves background normal structure while restoring the foreground defect. Extensive experiments demonstrate that the proposed PCDiff significantly outperforms state-of-the-art methods in both 3D anomaly generation fidelity and reconstruction quality, leading to substantial improvements in anomaly detection accuracy.", "arxiv_id": "2606.25740", "arxiv_url": "https://arxiv.org/abs/2606.25740", "authors": ["Linchun Wu", "Qin Zou", "Jiwen Lu", "Qingquan Li"], "brief": "3D anomaly detection in point clouds is critical for high-precision industrial manufacturing. Reconstruction-based methods have laid a strong foundation by detecting 3D anomalies through comparisons b\u2026", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25740", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25740v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Point Cloud Diffusion with Global and Local Reconstruction for Instance-Level 3D Anomaly Detection", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In this paper, we introduce position graphs, a graph-based reasoning framework based on the formalization of position spaces. This framework utilizes two strict partial orders, representing horizontal and vertical alignment and precedence, to model the relative positions of discrete tokens. Unlike general qualitative spatial calculi, position graphs are constrained by a chain condition and compatibility requirements that focus on rows and columns. We provide a comprehensive theoretical analysis of this representation, beginning with a characterization of graph consistency. Conditions to ensure the consistency of position graphs are established. Furthermore, we investigate the computational complexity of structural pattern discovery, modeled as the induced subgraph isomorphism problem. We demonstrate that this problem remains NP-complete even within the restricted class of position graphs. While initially motivated by document processing, this work focuses on the underlying mathematical properties and algebraic consistency of position-based constraints, providing a formal logical layer that is independent of specific data extraction techniques.", "arxiv_id": "2606.25719", "arxiv_url": "https://arxiv.org/abs/2606.25719", "authors": ["Rita-Nathalia Assaf", "Tom Davot", "Fr\u00e9d\u00e9ric Lardeux", "Fr\u00e9d\u00e9ric Saubion"], "brief": "In this paper, we introduce position graphs, a graph-based reasoning framework based on the formalization of position spaces. This framework utilizes two strict partial orders, representing horizontal\u2026", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25719", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25719v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Position Spaces and Graphs", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Underwater vehicles operate from a fixed onboard energy budget that propulsion rapidly depletes, so a controller that completes its task while drawing less thruster power directly extends mission range and endurance. Reinforcement learning yields capable model-free controllers for station-keeping and trajectory tracking, but optimizing task accuracy alone drives the policy toward oscillatory, energy-wasting actuation. The established remedy subtracts an energy penalty from the reward, yet this sets the task-power trade-off through a single weight with no physical units: a target power level cannot be specified, the weight must be re-tuned for every vehicle and task, and a mismatched weight can even raise power. This paper instead formulates energy-efficient underwater control as a constrained Markov decision process in which average thruster power is subject to an explicit budget, solved with a PPO-Lagrangian algorithm. The power level is set by declaring a budget in physical units, and a single dual variable is updated online to meet it for each vehicle and task, without manual weight search. Across three vehicles and four tasks in the MarineGym simulator, the energy-constrained policy draws the least power in all twelve settings, reducing it by 14--65\\% (up to 64.9\\%) over a task-only baseline and below an energy-reward baseline everywhere, while remaining the smoothest in ten settings and preserving task accuracy except in one deliberately power-limited regime. Imposing energy as an explicit constraint thus offers a tuning-free route to energy-efficient underwater control that needs no per-vehicle, per-task weight search.", "arxiv_id": "2606.25680", "arxiv_url": "https://arxiv.org/abs/2606.25680", "authors": ["Yinuo Wang", "Gavin Tao", "Yuze Liu"], "brief": "Underwater vehicles operate from a fixed onboard energy budget that propulsion rapidly depletes, so a controller that completes its task while drawing less thruster power directly extends mission rang\u2026", "categories": ["cs.RO", "cs.AI", "cs.ET", "eess.SP", "eess.SY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25680", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25680v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Power-Budgeted Underwater Vehicle Control via Constrained Reinforcement Learning", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Sparse Autoencoders (SAEs) have shown promise for analyzing language models, but applying them to vision-language models (VLMs) often yields representations that are difficult to use as controllable cross-modal steering directions. We introduce the Joint Sparse Autoencoder (JSAE), which uses an explicit alignment constraint to jointly factorize sequence-pooled vision and language activations into shared, interpretable image/caption-level features. Applied to LLaVA, JSAE recovers cross-modal features for recognizable concepts (e.g., food and animals). Through bidirectional interventions (additive steering and suppression), we observe a layer-dependent asymmetry under our protocol: additive steering peaks at mid-to-late (pre-output) layers and weakens at both ends, whereas suppression scores remain within a comparable range across all probed layers within statistical noise. Experiments on three VLMs, namely LLaVA-v1.6-Mistral-7B, Llama3-LLaVA-8B, and the MoE-based Qwen3-VL-30B, show related layer-localized effects across architectures. Together, these results suggest that explicitly aligned sparse representations support more controllable intervention-based analysis of multimodal features, within an identifiable layer range, than the unconstrained alternatives tested here.", "arxiv_id": "2606.25657", "arxiv_url": "https://arxiv.org/abs/2606.25657", "authors": ["Huizhen Shu", "Xuying Li", "Hongxu Lin", "Wenjie Sun", "Hui Li"], "brief": "Sparse Autoencoders (SAEs) have shown promise for analyzing language models, but applying them to vision-language models (VLMs) often yields representations that are difficult to use as controllable c\u2026", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25657", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "
