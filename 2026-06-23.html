684\u8868\u73b0\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316\u81ea\u4e3bAI\u79d1\u7814Agent\u5728\u8d28\u91cf\u3001\u591a\u6837\u6027\u3001\u65b0\u9896\u6027\u4e09\u7ef4\u5ea6\u7684\u80fd\u529b\u8fb9\u754c\uff0c\u63ed\u793a\u5f53\u524dLLM Agent\u65e0\u6cd5\u7a81\u7834\u8d28\u91cf-\u65b0\u9896\u6027\u524d\u6cbf\u8fd9\u4e00\u6838\u5fc3\u74f6\u9888\uff0c\u4e3a\u672a\u6765\u7814\u7a76\u6307\u660e\u65b9\u5411\u3002"}, {"abstract": "We present Wan-Streamer, a native-streaming, end-to-end interactive foundation model designed from the ground up for real-time, low-latency, full-duplex audio-visual interaction. Wan-Streamer seamlessly models language, audio, and video as both input and output within a single Transformer, where the sequence is represented as interleaved visual, audio, and text input tokens together with visual, audio, and text output tokens, coordinated by block-causal attention for incremental streaming. Unlike cascaded interactive systems that rely on separate VAD, ASR, language, TTS, audio-driven animation, or video-generation modules, Wan-Streamer does not rely on external language, speech, avatar, or video-generation modules: perception, reasoning, generation, response timing, turn management, and cross-modal synchronization are learned jointly within one unified model, reducing pipeline latency and error accumulation. To support natural audio-visual responsiveness, we redesign the entire stack around streamability, including causal encoders, causal decoders, block-causal attention, and low-latency multimodal token scheduling, enabling streaming units as short as 160 ms at 25 fps. Wan-Streamer achieves approximately 200 ms model-side response latency and approximately 550 ms total interaction latency when combined with 350 ms bidirectional network latency, supporting sub-second duplex audio-visual communication. These results position Wan-Streamer as a unified, end-to-end, multimodal interactive foundation model for low-latency streaming interaction.", "arxiv_id": "2606.25041", "arxiv_url": "https://arxiv.org/abs/2606.25041", "authors": ["Lianghua Huang", "Zhifan Wu", "Wei Wang", "Yupeng Shi", "Mengyang Feng", "Junjie He", "Chenwei Xie", "Yu Liu", "Jingren Zhou", "Ang Wang", "Bang Zhang", "Baole Ai", "Chen Liang", "Cheng Yu", "Chongyang Zhong", "Jinwei Qi", "Kai Zhu", "Pandeng Li", "Peng Zhang", "Wenyuan Zhang", "Xinhua Cheng", "Yitong Huang", "Yun Zheng", "Zoubin Bi"], "brief": "\u63d0\u51faWan-Streamer\uff0c\u4e00\u4e2a\u539f\u751f\u6d41\u5f0f\u7aef\u5230\u7aef\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\uff0c\u5728\u5355\u4e00Transformer\u4e2d\u7edf\u4e00\u5904\u7406\u8bed\u8a00\u3001\u97f3\u9891\u3001\u89c6\u9891\u7684\u8f93\u5165\u4e0e\u8f93\u51fa\uff0c\u65e0\u9700\u7ea7\u8054\u5916\u90e8\u6a21\u5757\u5373\u53ef\u5b9e\u73b0\u5b9e\u65f6\u4f4e\u5ef6\u8fdf\u5168\u53cc\u5de5\u97f3\u89c6\u9891\u4ea4\u4e92\u3002", "categories": ["cs.CV", "cs.AI", "cs.GR", "cs.SD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25041", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u91c7\u7528\u5757\u56e0\u679c\u6ce8\u610f\u529b\uff08block-causal attention\uff09\u5b9e\u73b0\u589e\u91cf\u6d41\u5f0f\u5904\u7406\uff0c\u6d41\u5f0f\u5355\u5143\u6700\u77ed160ms\uff0c\u5e27\u738725fps", "\u6a21\u578b\u4fa7\u54cd\u5e94\u5ef6\u8fdf\u7ea6200ms\uff0c\u52a0\u4e0a350ms\u53cc\u5411\u7f51\u7edc\u5ef6\u8fdf\u540e\u603b\u4ea4\u4e92\u5ef6\u8fdf\u7ea6550ms\uff0c\u8fbe\u5230\u4e9a\u79d2\u7ea7\u5168\u53cc\u5de5\u901a\u4fe1", "\u611f\u77e5\u3001\u63a8\u7406\u3001\u751f\u6210\u3001\u54cd\u5e94\u65f6\u673a\u3001\u8f6e\u6b21\u7ba1\u7406\u4e0e\u8de8\u6a21\u6001\u540c\u6b65\u5168\u90e8\u5728\u5355\u4e00\u6a21\u578b\u5185\u8054\u5408\u5b66\u4e60\uff0c\u6d88\u9664\u7ea7\u8054\u7cfb\u7edf\u7684\u6d41\u6c34\u7ebf\u5ef6\u8fdf\u4e0e\u8bef\u5dee\u7d2f\u79ef"], "keywords": ["\u591a\u6a21\u6001", "\u5b9e\u65f6\u4ea4\u4e92", "\u6d41\u5f0f\u751f\u6210", "\u57fa\u7840\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25041v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Wan-Streamer v0.1: End-to-end Real-time Interactive Foundation Models", "upvotes": 0, "what_it_is": "\u63d0\u51faWan-Streamer\uff0c\u4e00\u4e2a\u539f\u751f\u6d41\u5f0f\u7aef\u5230\u7aef\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\uff0c\u5728\u5355\u4e00Transformer\u4e2d\u7edf\u4e00\u5904\u7406\u8bed\u8a00\u3001\u97f3\u9891\u3001\u89c6\u9891\u7684\u8f93\u5165\u4e0e\u8f93\u51fa\uff0c\u65e0\u9700\u7ea7\u8054\u5916\u90e8\u6a21\u5757\u5373\u53ef\u5b9e\u73b0\u5b9e\u65f6\u4f4e\u5ef6\u8fdf\u5168\u53cc\u5de5\u97f3\u89c6\u9891\u4ea4\u4e92\u3002", "why_notable": "\u9996\u4e2a\u5c06VAD\u3001ASR\u3001LLM\u3001TTS\u3001\u97f3\u9891\u9a71\u52a8\u52a8\u753b\u7b49\u5168\u90e8\u6a21\u5757\u7edf\u4e00\u4e3a\u5355\u4e00Transformer\u7684\u7aef\u5230\u7aef\u5b9e\u65f6\u4ea4\u4e92\u7cfb\u7edf\uff0c\u5927\u5e45\u964d\u4f4e\u5de5\u7a0b\u590d\u6742\u5ea6\u4e0e\u4ea4\u4e92\u5ef6\u8fdf\uff0c\u5bf9\u5b9e\u65f6\u6570\u5b57\u4eba\u3001\u8bed\u97f3\u52a9\u624b\u7b49\u5e94\u7528\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Today\u0027s reasoning models use thinking tokens to attain stronger performance on benchmarks than their instruction-tuned counterparts. It is also generally believed that this more \"deliberative\" mode should improve alignment and safety, by providing the model a safe space to consider whether its planned answer to a request violates its safety principles. We present evidence that this intuition is not always correct. Across frontier open-weight reasoning models spanning GPT-OSS, Qwen, Olmo, and Phi families, we find that the eventual refusal/compliance outcome is already strongly predictable via a trained head on the first token\u0027s hidden representation ($0.84$-$0.95$ AUROC and $\\sim88\\%$ balanced accuracy for predicting refusal/compliance) before any visible thinking. The thinking process turns out to be more akin to prefix completion than to deliberative revision, with the final outcome rarely changing after the first $\\sim20\\%$ of thinking, despite giving the appearance of deliberation at the text level ($\\sim74\\%$ of text-level deliberations occur when the response distribution is already locked to one refusal/compliance side). We also find that existing inference-time and training-based safety interventions, despite being motivated by the goal of inducing deliberation, largely shift model behavior toward over-refusal while suppressing already-scarce deliberation signals. Our results suggest that safety behavior in current reasoning models is much less deliberative than commonly assumed, and highlight the need for methods that induce real safety deliberation.", "arxiv_id": "2606.25013", "arxiv_url": "https://arxiv.org/abs/2606.25013", "authors": ["Narutatsu Ri", "Abhishek Panigrahi", "Sanjeev Arora"], "brief": "\u672c\u6587\u901a\u8fc7\u5b9e\u9a8c\u63ed\u793a\uff1a\u5f53\u524d\u63a8\u7406\u6a21\u578b\uff08GPT-OSS\u3001Qwen\u3001Olmo\u3001Phi\u7b49\uff09\u7684\u601d\u8003\u8fc7\u7a0b\u5e76\u975e\u771f\u6b63\u7684\"\u6df1\u601d\u719f\u8651\"\u5f0f\u5b89\u5168\u5ba1\u67e5\uff0c\u800c\u66f4\u50cf\u662f\u524d\u7f00\u8865\u5168\u2014\u2014\u62d2\u7edd/\u9075\u4ece\u7684\u7ed3\u679c\u5728\u7b2c\u4e00\u4e2atoken\u7684\u9690\u5c42\u8868\u793a\u4e0a\u5c31\u5df2\u9ad8\u5ea6\u53ef\u9884\u6d4b\uff08AUROC 0.84-0.95\uff09\uff0c\u4e14\u7ea680%\u7684\u601d\u8003\u5b8c\u6210\u540e\u7ed3\u679c\u51e0\u4e4e\u4e0d\u518d\u6539\u53d8\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25013", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4ec5\u51ed\u7b2c\u4e00\u4e2atoken\u7684\u9690\u5c42\u8868\u793a\uff0c\u5373\u53ef\u4ee50.84-0.95 AUROC\u3001~88%\u5e73\u8861\u51c6\u786e\u7387\u9884\u6d4b\u6700\u7ec8\u62d2\u7edd/\u9075\u4ece\u7ed3\u679c", "\u7ea674%\u7684\u6587\u672c\u5c42\u9762\"\u5ba1\u614e\u8ba8\u8bba\"\u53d1\u751f\u65f6\uff0c\u6a21\u578b\u7684\u54cd\u5e94\u5206\u5e03\u5df2\u9501\u5b9a\u5728\u67d0\u4e00\u4fa7\uff0c\u601d\u8003\u8fc7\u7a0b\u5f62\u540c\u8868\u6f14", "\u73b0\u6709\u63a8\u7406\u65f6\u548c\u8bad\u7ec3\u65f6\u7684\u5b89\u5168\u5e72\u9884\u624b\u6bb5\u4e3b\u8981\u5bfc\u81f4\u8fc7\u5ea6\u62d2\u7edd\uff0c\u53cd\u800c\u6291\u5236\u4e86\u672c\u5df2\u7a00\u5c11\u7684\u771f\u5b9e\u5ba1\u614e\u4fe1\u53f7"], "keywords": ["\u5b89\u5168\u5bf9\u9f50", "\u63a8\u7406\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25013v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Do Thinking Tokens Help with Safety?", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7\u5b9e\u9a8c\u63ed\u793a\uff1a\u5f53\u524d\u63a8\u7406\u6a21\u578b\uff08GPT-OSS\u3001Qwen\u3001Olmo\u3001Phi\u7b49\uff09\u7684\u601d\u8003\u8fc7\u7a0b\u5e76\u975e\u771f\u6b63\u7684\"\u6df1\u601d\u719f\u8651\"\u5f0f\u5b89\u5168\u5ba1\u67e5\uff0c\u800c\u66f4\u50cf\u662f\u524d\u7f00\u8865\u5168\u2014\u2014\u62d2\u7edd/\u9075\u4ece\u7684\u7ed3\u679c\u5728\u7b2c\u4e00\u4e2atoken\u7684\u9690\u5c42\u8868\u793a\u4e0a\u5c31\u5df2\u9ad8\u5ea6\u53ef\u9884\u6d4b\uff08AUROC 0.84-0.95\uff09\uff0c\u4e14\u7ea680%\u7684\u601d\u8003\u5b8c\u6210\u540e\u7ed3\u679c\u51e0\u4e4e\u4e0d\u518d\u6539\u53d8\u3002", "why_notable": "\u98a0\u8986\u4e86\"\u601d\u8003token\u8ba9\u6a21\u578b\u66f4\u5b89\u5168\"\u7684\u4e3b\u6d41\u8ba4\u77e5\uff0c\u63ed\u793a\u5f53\u524d\u63a8\u7406\u6a21\u578b\u5b89\u5168\u673a\u5236\u7684\u6839\u672c\u6027\u7f3a\u9677\uff0c\u5bf9AI\u5b89\u5168\u5bf9\u9f50\u7814\u7a76\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\uff0c\u547c\u5401\u5f00\u53d1\u80fd\u8bf1\u5bfc\u771f\u5b9e\u5b89\u5168\u5ba1\u614e\u7684\u65b0\u65b9\u6cd5"}, {"abstract": "Vision-language-action (VLA) models can learn manipulation skills from demonstrations, but their capabilities are bounded by the skills in the training data. We present InSight, a framework that unlocks autonomous skill acquisition by rendering VLAs steerable at the primitive-action level (e.g., \"move gripper to the bowl\", \"lift upward\", \"pour the bottle\"). InSight consists of two primary stages: (1) an automated segmentation pipeline that partitions demonstrations into labeled primitives via VLM plan decomposition and end-effector poses to enable VLA primitive steerability, and (2) a VLM-guided data flywheel that identifies missing primitives required to accomplish a novel task, autonomously attempts demonstrations of the missing primitives with VLM-proposed low-level control, and automatically labels, stores, and integrates successful demonstrations into the VLA training set. We evaluate InSight across simulation and real-world manipulation tasks, including block flipping, drawer closing, sweeping, twisting, and pouring, without any human demonstrations of these target skills. Once learned, these primitives can be composed to execute novel, long-horizon tasks without additional human demonstrations. Our findings demonstrate that primitive steerability provides a practical foundation for continual skill acquisition in VLA policies. Project website: https://insight-vla.github.io.", "arxiv_id": "2606.24884", "arxiv_url": "https://arxiv.org/abs/2606.24884", "authors": ["Maggie Wang", "Lars Osterberg", "Stephen Tian", "Ola Shorinwa", "Jiajun Wu", "Mac Schwager"], "brief": "\u63d0\u51faInSight\u6846\u67b6\uff0c\u901a\u8fc7\u5c06VLA\u6a21\u578b\u5728\u539f\u8bed\u52a8\u4f5c\u7ea7\u522b\uff08\u5982\"\u79fb\u52a8\u5939\u722a\u5230\u7897\"\u3001\"\u5411\u4e0a\u62ac\u8d77\"\uff09\u53d8\u4e3a\u53ef\u5f15\u5bfc\u7684\uff0c\u5b9e\u73b0\u673a\u5668\u4eba\u81ea\u4e3b\u6280\u80fd\u4e60\u5f97\u3002\u6846\u67b6\u5305\u542b\u81ea\u52a8\u5206\u5272\u6f14\u793a\u4e3a\u6807\u6ce8\u539f\u8bed\u7684\u6d41\u6c34\u7ebf\uff0c\u4ee5\u53caVLM\u5f15\u5bfc\u7684\u6570\u636e\u98de\u8f6e\uff0c\u53ef\u81ea\u4e3b\u5c1d\u8bd5\u3001\u6807\u6ce8\u5e76\u6574\u5408\u65b0\u6280\u80fd\u793a\u8303\u3002", "categories": ["cs.RO", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24884", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": ["\u4e24\u9636\u6bb5\u6846\u67b6\uff1a\u2460VLM\u8ba1\u5212\u5206\u89e3+\u672b\u7aef\u6267\u884c\u5668\u59ff\u6001\u81ea\u52a8\u5c06\u6f14\u793a\u5206\u5272\u4e3a\u5e26\u6807\u6ce8\u7684\u539f\u8bed\u52a8\u4f5c\uff1b\u2461VLM\u5f15\u5bfc\u6570\u636e\u98de\u8f6e\u81ea\u52a8\u8bc6\u522b\u7f3a\u5931\u539f\u8bed\u5e76\u751f\u6210\u4f4e\u7ea7\u63a7\u5236\u5c1d\u8bd5", "\u65e0\u9700\u4efb\u4f55\u4eba\u5de5\u793a\u8303\u5373\u53ef\u5b8c\u6210\u79ef\u6728\u7ffb\u8f6c\u3001\u62bd\u5c49\u5173\u95ed\u3001\u626b\u5730\u3001\u62e7\u8f6c\u3001\u5012\u6c34\u7b49\u4efb\u52a1\u7684\u6280\u80fd\u4e60\u5f97", "\u4e60\u5f97\u7684\u539f\u8bed\u53ef\u7ec4\u5408\u6267\u884c\u65b0\u9896\u7684\u957f\u65f6\u57df\u4efb\u52a1\uff0c\u5728\u4eff\u771f\u548c\u771f\u5b9e\u4e16\u754c\u5747\u9a8c\u8bc1\u6709\u6548"], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u6280\u80fd\u4e60\u5f97", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24884v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "InSight: Self-Guided Skill Acquisition via Steerable VLAs", "upvotes": 0, "what_it_is": "\u63d0\u51faInSight\u6846\u67b6\uff0c\u901a\u8fc7\u5c06VLA\u6a21\u578b\u5728\u539f\u8bed\u52a8\u4f5c\u7ea7\u522b\uff08\u5982\"\u79fb\u52a8\u5939\u722a\u5230\u7897\"\u3001\"\u5411\u4e0a\u62ac\u8d77\"\uff09\u53d8\u4e3a\u53ef\u5f15\u5bfc\u7684\uff0c\u5b9e\u73b0\u673a\u5668\u4eba\u81ea\u4e3b\u6280\u80fd\u4e60\u5f97\u3002\u6846\u67b6\u5305\u542b\u81ea\u52a8\u5206\u5272\u6f14\u793a\u4e3a\u6807\u6ce8\u539f\u8bed\u7684\u6d41\u6c34\u7ebf\uff0c\u4ee5\u53caVLM\u5f15\u5bfc\u7684\u6570\u636e\u98de\u8f6e\uff0c\u53ef\u81ea\u4e3b\u5c1d\u8bd5\u3001\u6807\u6ce8\u5e76\u6574\u5408\u65b0\u6280\u80fd\u793a\u8303\u3002", "why_notable": "\u89e3\u51b3\u4e86VLA\u6a21\u578b\u80fd\u529b\u53d7\u9650\u4e8e\u8bad\u7ec3\u6570\u636e\u7684\u6838\u5fc3\u74f6\u9888\uff0c\u5b9e\u73b0\u4e86\u65e0\u4eba\u5de5\u5e72\u9884\u7684\u6301\u7eed\u6280\u80fd\u81ea\u4e3b\u4e60\u5f97\uff0c\u4e3a\u673a\u5668\u4eba\u7ec8\u8eab\u5b66\u4e60\u63d0\u4f9b\u4e86\u5b9e\u7528\u57fa\u7840\uff0c\u5177\u6709\u91cd\u8981\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u6269\u5c55\u6f5c\u529b"}, {"abstract": "Sparse voxel representation has emerged as a scalable foundation for image-to-3D Gaussian Splatting (3DGS) generation, yet current methods struggle to preserve high-frequency visual details of input images due to two structural bottlenecks. First, they adopt discriminative 2D features optimized for semantic abstraction to construct sparse voxel latents, which suppress reconstructive cues and induce a representation bottleneck. Second, in the generation stage, standard diffusion transformers lack effective mechanisms to align dense 2D image tokens with sparse 3D voxel latents, resulting in a cross-modal correspondence bottleneck. To address these issues, we propose FLUX3D, a scalable image-to-3DGS framework that boosts both representation learning and cross-modal alignment during generation. We first revisit 2D feature selection for sparse-voxel-based 3D representation learning, propose Diffusion-Aligned Structured Latents (DA-SLAT) and couple it with a decoder-only architecture to improve 3DGS reconstruction fidelity. We also design a sparse-structure-aware diffusion framework, which integrates the Sparse-structure Multimodal Diffusion Transformer (SMDiT) and Modal-Aware Rotary Positional Embedding (MARoPE) to achieve geometry-agnostic 2D-3D alignment. Extensive benchmark experiments demonstrate that FLUX3D yields substantial improvements in appearance fidelity and significantly outperforms all state-of-the-art (SOTA) methods in generating high-quality 3DGS assets.", "arxiv_id": "2606.24874", "arxiv_url": "https://arxiv.org/abs/2606.24874", "authors": ["Haorui Ji", "Weizhe Liu", "Hongdong Li", "Hengkai Guo"], "brief": "\u63d0\u51faFLUX3D\u6846\u67b6\uff0c\u901a\u8fc7\u6269\u6563\u5bf9\u9f50\u7ed3\u6784\u5316\u6f5c\u53d8\u91cf\uff08DA-SLAT\uff09\u548c\u7a00\u758f\u611f\u77e5\u591a\u6a21\u6001\u6269\u6563Transformer\uff08SMDiT\uff09\uff0c\u89e3\u51b3\u56fe\u50cf\u52303D\u9ad8\u65af\u6cfc\u6e85\u751f\u6210\u4e2d\u7684\u8868\u793a\u74f6\u9888\u4e0e\u8de8\u6a21\u6001\u5bf9\u9f50\u74f6\u9888\u95ee\u9898\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24874", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51faDA-SLAT\uff1a\u7528\u6269\u6563\u6a21\u578b\u7279\u5f81\u66ff\u4ee3\u5224\u522b\u5f0f2D\u7279\u5f81\u6784\u5efa\u7a00\u758f\u4f53\u7d20\u6f5c\u53d8\u91cf\uff0c\u914d\u5408\u4ec5\u89e3\u7801\u5668\u67b6\u6784\u63d0\u53473DGS\u91cd\u5efa\u4fdd\u771f\u5ea6", "\u8bbe\u8ba1SMDiT\u4e0eMARoPE\uff1a\u7a00\u758f\u7ed3\u6784\u611f\u77e5\u6269\u6563Transformer\u7ed3\u5408\u6a21\u6001\u611f\u77e5\u65cb\u8f6c\u4f4d\u7f6e\u7f16\u7801\uff0c\u5b9e\u73b0\u51e0\u4f55\u65e0\u5173\u76842D-3D\u8de8\u6a21\u6001\u5bf9\u9f50", "\u5728\u591a\u9879\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u663e\u8457\u8d85\u8d8a\u6240\u6709SOTA\u65b9\u6cd5\uff0c\u5728\u5916\u89c2\u4fdd\u771f\u5ea6\u6307\u6807\u4e0a\u53d6\u5f97\u5927\u5e45\u63d0\u5347"], "keywords": ["3D\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u9ad8\u65af\u6cfc\u6e85", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24874v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "FLUX3D: High-Fidelity 3D Gaussian Generation with Diffusion-Aligned Sparse Representation", "upvotes": 0, "what_it_is": "\u63d0\u51faFLUX3D\u6846\u67b6\uff0c\u901a\u8fc7\u6269\u6563\u5bf9\u9f50\u7ed3\u6784\u5316\u6f5c\u53d8\u91cf\uff08DA-SLAT\uff09\u548c\u7a00\u758f\u611f\u77e5\u591a\u6a21\u6001\u6269\u6563Transformer\uff08SMDiT\uff09\uff0c\u89e3\u51b3\u56fe\u50cf\u52303D\u9ad8\u65af\u6cfc\u6e85\u751f\u6210\u4e2d\u7684\u8868\u793a\u74f6\u9888\u4e0e\u8de8\u6a21\u6001\u5bf9\u9f50\u74f6\u9888\u95ee\u9898\u3002", "why_notable": "\u7cfb\u7edf\u6027\u5730\u5b9a\u4f4d\u5e76\u89e3\u51b3\u4e86\u7a00\u758f\u4f53\u7d203D\u751f\u6210\u7684\u4e24\u5927\u6838\u5fc3\u74f6\u9888\uff0c\u5c06\u6269\u6563\u6a21\u578b\u7279\u5f81\u5f15\u51653D\u8868\u793a\u5b66\u4e60\u662f\u65b0\u9896\u601d\u8def\uff0c\u5bf9\u9ad8\u8d28\u91cf3D\u8d44\u4ea7\u81ea\u52a8\u751f\u6210\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Quantum computers could outperform classical machines on important problems, but only if the errors that pervade quantum hardware can be corrected at scale. Quantum low-density parity-check (qLDPC) codes offer a promising route to this goal by combining sparse parity checks with finite encoding rate and growing distance, but their construction remains a challenging discrete design problem. Here we introduce structured concept evolution (SCE), a search framework that pairs a large language model with a structured algebraic mutation grammar to discover lifted-product code families, a class of CSS qLDPC codes. Instead of asking the LLM to design codes from first principles, SCE evolves structured concepts consisting of algebraic specifications paired with executable programs that realize them, using hierarchical mutations that modify the group algebra, protograph geometry, or base space. Running SCE, we discover a diverse set of competitive code families, ranging from abelian constructions to families over non-abelian groups beyond those underlying standard designs such as bivariate-bicycle codes, and characterize them under code-capacity depolarizing noise with BP+OSD decoding. These results are obtained with lightweight models (GPT-5.4-mini and GPT-5.4-nano).", "arxiv_id": "2606.24808", "arxiv_url": "https://arxiv.org/abs/2606.24808", "authors": ["Zidu Liu", "Florian Marquardt"], "brief": "\u63d0\u51fa\u7ed3\u6784\u5316\u6982\u5ff5\u8fdb\u5316\uff08SCE\uff09\u6846\u67b6\uff0c\u5c06LLM\u4e0e\u4ee3\u6570\u53d8\u5f02\u8bed\u6cd5\u7ed3\u5408\uff0c\u81ea\u52a8\u641c\u7d22\u5e76\u53d1\u73b0lifted-product\u91cf\u5b50LDPC\u7801\u65cf\uff0c\u65e0\u9700\u4ece\u5934\u8bbe\u8ba1\u5373\u53ef\u63a2\u7d22\u5305\u62ec\u975e\u963f\u8d1d\u5c14\u7fa4\u5728\u5185\u7684\u591a\u6837\u5316\u7f16\u7801\u7ed3\u6784\u3002", "categories": ["quant-ph", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24808", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["SCE\u6846\u67b6\u5c06\u4ee3\u6570\u89c4\u8303\u4e0e\u53ef\u6267\u884c\u7a0b\u5e8f\u914d\u5bf9\u4e3a\"\u7ed3\u6784\u5316\u6982\u5ff5\"\uff0c\u901a\u8fc7\u5c42\u6b21\u5316\u53d8\u5f02\uff08\u4fee\u6539\u7fa4\u4ee3\u6570\u3001\u539f\u56fe\u51e0\u4f55\u6216\u57fa\u7a7a\u95f4\uff09\u9a71\u52a8\u641c\u7d22", "\u53d1\u73b0\u4e86\u4ece\u963f\u8d1d\u5c14\u6784\u9020\u5230\u975e\u963f\u8d1d\u5c14\u7fa4\u7684\u591a\u6837\u5316\u7ade\u4e89\u6027\u7801\u65cf\uff0c\u8d85\u8d8a\u4e86\u6807\u51c6\u53cc\u53d8\u91cf\u81ea\u884c\u8f66\u7801\u7684\u8bbe\u8ba1\u8303\u56f4", "\u4ec5\u4f7f\u7528\u8f7b\u91cf\u7ea7\u6a21\u578b\uff08GPT-4.1-mini\u548cGPT-4.1-nano\uff09\u5373\u53ef\u5b8c\u6210\uff0c\u5728BP+OSD\u89e3\u7801\u4e0b\u9a8c\u8bc1\u4e86\u7801\u5bb9\u91cf\u53bb\u6781\u5316\u566a\u58f0\u6027\u80fd"], "keywords": ["\u91cf\u5b50\u7ea0\u9519", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4ee3\u7801\u751f\u6210", "\u81ea\u52a8\u5316\u8bbe\u8ba1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24808v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Large-Language-Model Discovery of Quantum LDPC Codes through Structured Concept Evolution", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u7ed3\u6784\u5316\u6982\u5ff5\u8fdb\u5316\uff08SCE\uff09\u6846\u67b6\uff0c\u5c06LLM\u4e0e\u4ee3\u6570\u53d8\u5f02\u8bed\u6cd5\u7ed3\u5408\uff0c\u81ea\u52a8\u641c\u7d22\u5e76\u53d1\u73b0lifted-product\u91cf\u5b50LDPC\u7801\u65cf\uff0c\u65e0\u9700\u4ece\u5934\u8bbe\u8ba1\u5373\u53ef\u63a2\u7d22\u5305\u62ec\u975e\u963f\u8d1d\u5c14\u7fa4\u5728\u5185\u7684\u591a\u6837\u5316\u7f16\u7801\u7ed3\u6784\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u5f15\u5165\u91cf\u5b50\u7ea0\u9519\u7801\u7684\u81ea\u52a8\u5316\u8bbe\u8ba1\uff0c\u7a81\u7834\u4e86qLDPC\u7801\u6784\u9020\u4f9d\u8d56\u4eba\u5de5\u4ee3\u6570\u76f4\u89c9\u7684\u74f6\u9888\uff0c\u4e3a\u91cf\u5b50\u5bb9\u9519\u8ba1\u7b97\u63d0\u4f9b\u4e86\u53ef\u6269\u5c55\u7684\u81ea\u52a8\u5316\u8bbe\u8ba1\u5de5\u5177\u3002"}, {"abstract": "Machine unlearning (MU) is commonly judged by output forgetting, such as low forget-set accuracy or reduced logit-level membership inference. But if output-level success can coexist with retraining-inconsistent residuals in representation space, what kind of forgetting are current evaluations actually certifying? We study this question through retraining-consistent representation forgetting, using the retrained model (i.e., trained from scratch without the forget data) as an operational reference for correct forgetting. Across multiple unlearning methods, datasets, and models, our theoretical analysis and empirical results show that standard output-level evaluation can systematically overestimate the success of unlearning. Under this stronger lens, current methods often appear forgotten at the output layer while exhibiting a structured mismatch relative to retraining. They partially align with retraining on forget samples, remain more inconsistent on retain samples, and leave residual discrepancy concentrated along retraining-related directions rather than diffuse in representation space. This structured mismatch is characterized by forget/retain asymmetry, directional mismatch, and concentrated residuals along retraining-related directions. These results suggest that current MU is often evaluated for apparent forgetting rather than retraining-consistent forgetting. More broadly, retraining reveals what output forgetting hides.", "arxiv_id": "2606.25001", "arxiv_url": "https://arxiv.org/abs/2606.25001", "authors": ["Teresa Pui Yee Yong", "Win Kent Ong", "Chee Seng Chan"], "brief": "\u672c\u6587\u7814\u7a76\u673a\u5668\u9057\u5fd8\uff08Machine Unlearning\uff09\u7684\u8bc4\u4f30\u95ee\u9898\uff0c\u6307\u51fa\u4ee5\u8f93\u51fa\u5c42\u6307\u6807\uff08\u5982\u51c6\u786e\u7387\u3001\u6210\u5458\u63a8\u65ad\uff09\u8861\u91cf\u9057\u5fd8\u6210\u529f\u5b58\u5728\u6839\u672c\u7f3a\u9677\uff0c\u63d0\u51fa\u4ee5\"\u4ece\u5934\u91cd\u8bad\u6a21\u578b\"\u4e3a\u53c2\u8003\u57fa\u51c6\u7684\u8868\u5f81\u5c42\u4e00\u81f4\u6027\u9057\u5fd8\u8bc4\u4f30\u6846\u67b6\uff0c\u63ed\u793a\u5f53\u524d\u65b9\u6cd5\u5728\u8868\u5f81\u7a7a\u95f4\u4e2d\u5b58\u5728\u7ed3\u6784\u6027\u6b8b\u5dee\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25001", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u8f93\u51fa\u5c42\u9057\u5fd8\uff08\u4f4e\u51c6\u786e\u7387/\u4f4e\u6210\u5458\u63a8\u65ad\u5206\u6570\uff09\u4e0e\u8868\u5f81\u7a7a\u95f4\u7684\u91cd\u8bad\u4e0d\u4e00\u81f4\u6027\u53ef\u4ee5\u540c\u65f6\u5b58\u5728\uff0c\u5bfc\u81f4\u8bc4\u4f30\u7cfb\u7edf\u6027\u9ad8\u4f30\u9057\u5fd8\u6548\u679c", "\u53d1\u73b0\u4e09\u7c7b\u7ed3\u6784\u6027\u4e0d\u5339\u914d\uff1a\u9057\u5fd8\u96c6/\u4fdd\u7559\u96c6\u4e0d\u5bf9\u79f0\u3001\u65b9\u5411\u6027\u504f\u5dee\u3001\u6b8b\u5dee\u96c6\u4e2d\u4e8e\u91cd\u8bad\u76f8\u5173\u65b9\u5411\u800c\u975e\u5f25\u6563\u5206\u5e03", "\u5f53\u524d\u65b9\u6cd5\u5728\u9057\u5fd8\u6837\u672c\u4e0a\u90e8\u5206\u5bf9\u9f50\u91cd\u8bad\u6a21\u578b\uff0c\u4f46\u5728\u4fdd\u7559\u6837\u672c\u4e0a\u4e0d\u4e00\u81f4\u6027\u66f4\u5f3a\uff0c\u8bf4\u660e\u9057\u5fd8\u662f\"\u8868\u9762\u7684\"\u800c\u975e\u771f\u5b9e\u7684"], "keywords": ["\u673a\u5668\u9057\u5fd8", "\u8868\u5f81\u5b66\u4e60", "\u6a21\u578b\u8bc4\u4f30", "\u9690\u79c1\u4fdd\u62a4"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25001v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Erased, but Not Gone: Output Forgetting Is Not True Forgetting", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u673a\u5668\u9057\u5fd8\uff08Machine Unlearning\uff09\u7684\u8bc4\u4f30\u95ee\u9898\uff0c\u6307\u51fa\u4ee5\u8f93\u51fa\u5c42\u6307\u6807\uff08\u5982\u51c6\u786e\u7387\u3001\u6210\u5458\u63a8\u65ad\uff09\u8861\u91cf\u9057\u5fd8\u6210\u529f\u5b58\u5728\u6839\u672c\u7f3a\u9677\uff0c\u63d0\u51fa\u4ee5\"\u4ece\u5934\u91cd\u8bad\u6a21\u578b\"\u4e3a\u53c2\u8003\u57fa\u51c6\u7684\u8868\u5f81\u5c42\u4e00\u81f4\u6027\u9057\u5fd8\u8bc4\u4f30\u6846\u67b6\uff0c\u63ed\u793a\u5f53\u524d\u65b9\u6cd5\u5728\u8868\u5f81\u7a7a\u95f4\u4e2d\u5b58\u5728\u7ed3\u6784\u6027\u6b8b\u5dee\u3002", "why_notable": "\u76f4\u63a5\u6311\u6218\u673a\u5668\u9057\u5fd8\u9886\u57df\u7684\u4e3b\u6d41\u8bc4\u4f30\u8303\u5f0f\uff0c\u63ed\u793a\u73b0\u6709\u65b9\u6cd5\u7684\u7cfb\u7edf\u6027\u76f2\u70b9\uff1b\u5bf9\u9690\u79c1\u4fdd\u62a4\u3001\u6570\u636e\u6743\u5229\uff08\u88ab\u9057\u5fd8\u6743\uff09\u7b49\u5b9e\u9645\u5e94\u7528\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\uff0c\u63a8\u52a8\u66f4\u4e25\u683c\u7684\u9057\u5fd8\u9a8c\u8bc1\u6807\u51c6\u3002"}, {"abstract": "Language models are running out of high-quality training data, and even aggressively deduplicated corpora retain some amount of repetition. Earlier controlled studies predated Chinchilla-style scaling laws and could only measure the cost of repetition indirectly. We revisit repetition in the Chinchilla era, using a fitted no-repetition scaling law to report Compute-Equivalent Gain and Compute-Equivalent Loss. We show that under this modernized paradigm, repetition damage is systematic in three ways. First, holding compute allocated to repeated data constant, eval loss peaks at an intermediate repeat count $\\Rep$; repeating a moderately sized subset a moderate number of times damages performance more than repeating a large subset a few times or a small subset many times. Second, the location of this peak is well-fit by a power law in model size; this scaling law reveals that the most damaging number of repeated data grows more quickly than compute. Finally, when repeated documents consume 10\\% of the FLOPs budget in a controlled exact-document repetition setting, the compute-equivalent loss can be large: on FineWeb-Edu-Dedup, the most damaging repeat count for a Qwen3-style 344M-parameter model at $\\OT=1$ matches the loss of a no-repetition run using 67% of the FLOPs. We demonstrate that these phenomena are not language-model-specific, and can be analytically understood in a simple statistical model: a misspecified linear regression with verbatim duplicates reproduces the same qualitative loss peak, quantifying how such peaks can arise from a statistical tradeoff between memorization and generalization. Our findings add precision to the study of duplication in language models, allowing practitioners to quantify the wasted compute incurred by the presence and repeat structure of duplicates in pretraining corpora.", "arxiv_id": "2606.24998", "arxiv_url": "https://arxiv.org/abs/2606.24998", "authors": ["Jessica Chudnovsky", "Joshua Kazdan", "Noam Levi", "Rylan Schaeffer", "Yegor Denisov-Blanch", "Bo He", "Mehmet Donmez", "Sanmi Koyejo", "David Donoho"], "brief": "\u672c\u6587\u5728Chinchilla\u7f29\u653e\u5b9a\u5f8b\u6846\u67b6\u4e0b\u91cd\u65b0\u7814\u7a76\u8bad\u7ec3\u6570\u636e\u91cd\u590d\u5bf9\u8bed\u8a00\u6a21\u578b\u7684\u5f71\u54cd\uff0c\u63d0\u51fa\"\u8ba1\u7b97\u7b49\u6548\u589e\u76ca/\u635f\u5931\"\u6307\u6807\uff0c\u91cf\u5316\u4e0d\u540c\u91cd\u590d\u6a21\u5f0f\u5bf9\u6a21\u578b\u6027\u80fd\u7684\u7834\u574f\u7a0b\u5ea6\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24998", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u91cd\u590d\u635f\u5bb3\u5b58\u5728\"\u5cf0\u503c\u6548\u5e94\"\uff1a\u4e2d\u7b49\u89c4\u6a21\u5b50\u96c6\u91cd\u590d\u4e2d\u7b49\u6b21\u6570\u6bd4\u6781\u7aef\u60c5\u51b5\uff08\u5927\u96c6\u5408\u5c11\u6b21\u6216\u5c0f\u96c6\u5408\u591a\u6b21\uff09\u5371\u5bb3\u66f4\u5927", "\u6700\u5371\u9669\u91cd\u590d\u6b21\u6570\u968f\u6a21\u578b\u89c4\u6a21\u5448\u5e42\u5f8b\u589e\u957f\uff0c\u4e14\u589e\u901f\u5feb\u4e8e\u8ba1\u7b97\u91cf\u589e\u957f", "\u5f53\u91cd\u590d\u6570\u636e\u536010% FLOPs\u9884\u7b97\u65f6\uff0c\u5bf9344M\u53c2\u6570\u6a21\u578b\u6700\u574f\u60c5\u51b5\u7b49\u6548\u4e8e\u6d6a\u8d3933%\u7684\u8ba1\u7b97\u8d44\u6e90\uff08\u4ec5\u752867% FLOPs\u7684\u65e0\u91cd\u590d\u8bad\u7ec3\u6548\u679c\u76f8\u5f53\uff09", "\u8be5\u73b0\u8c61\u53ef\u7528\u542b\u91cd\u590d\u6837\u672c\u7684\u7ebf\u6027\u56de\u5f52\u7edf\u8ba1\u6a21\u578b\u89e3\u6790\u7406\u89e3\uff0c\u672c\u8d28\u662f\u8bb0\u5fc6\u5316\u4e0e\u6cdb\u5316\u4e4b\u95f4\u7684\u7edf\u8ba1\u6743\u8861"], "keywords": ["\u8bed\u8a00\u6a21\u578b", "\u6570\u636e\u53bb\u91cd", "\u7f29\u653e\u5b9a\u5f8b", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24998v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Internal Data Repetition Destroys Language Models", "upvotes": 0, "what_it_is": "\u672c\u6587\u5728Chinchilla\u7f29\u653e\u5b9a\u5f8b\u6846\u67b6\u4e0b\u91cd\u65b0\u7814\u7a76\u8bad\u7ec3\u6570\u636e\u91cd\u590d\u5bf9\u8bed\u8a00\u6a21\u578b\u7684\u5f71\u54cd\uff0c\u63d0\u51fa\"\u8ba1\u7b97\u7b49\u6548\u589e\u76ca/\u635f\u5931\"\u6307\u6807\uff0c\u91cf\u5316\u4e0d\u540c\u91cd\u590d\u6a21\u5f0f\u5bf9\u6a21\u578b\u6027\u80fd\u7684\u7834\u574f\u7a0b\u5ea6\u3002", "why_notable": "\u9996\u6b21\u5728\u73b0\u4ee3Chinchilla\u8303\u5f0f\u4e0b\u7cbe\u786e\u91cf\u5316\u6570\u636e\u91cd\u590d\u7684\u8ba1\u7b97\u4ee3\u4ef7\uff0c\u4e3a\u9884\u8bad\u7ec3\u8bed\u6599\u53bb\u91cd\u7b56\u7565\u63d0\u4f9b\u53ef\u64cd\u4f5c\u7684\u7406\u8bba\u4f9d\u636e\uff0c\u5bf9\u5927\u6a21\u578b\u8bad\u7ec3\u5b9e\u8df5\u5177\u6709\u76f4\u63a5\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Small ($\\sim$2B) GUI-grounding agents are attractive for on-device deployment, accessibility tooling, and low-cost iteration, but at this scale they face two open recipe questions: how to obtain bounding-box training data without expensive human annotation, and how to combine supervised fine-tuning with reinforcement learning. We address both, with the explicit goal of pushing small-model performance rather than scaling up. WinDOM is a $54{,}425$-record grounding corpus harvested by driving an open-source Windows 11 web reimplementation under headless Playwright, with bounding boxes read directly off the DOM and no OCR or human annotation. Self-Family Distillation (SFD) is a single rejection-sampling cold-start parameterised only by the teacher choice: either an EMA of the student (no external model) or a frozen larger same-family teacher. We then treat the saturation depth of the SFD cold-start as an explicit GRPO hyperparameter. On a Qwen3.5-2B student, the under-saturated cold-start is a better GRPO initialiser than the converged one: SFD-4B with Early-init RL gains $+5.4$ OOD-mean ($+3.5$ ScreenSpot-Pro, $+7.0$ OSWorld-G, $+5.8$ ScreenSpot-V2) over the base. The same-size EMA mode lands within roughly one OOD-mean point of the cross-size $4$B variant ($65.2$ vs $66.3$) without an external teacher.", "arxiv_id": "2606.25964", "arxiv_url": "https://arxiv.org/abs/2606.25964", "authors": ["Chengheng Li-Chen", "Zhiqian Zhou", "Hao Chen", "Nicolas Chauvin"], "brief": "\u63d0\u51faWinDOM\u6570\u636e\u96c6\uff0854,425\u6761\u8bb0\u5f55\uff09\u548c\u81ea\u5bb6\u65cf\u84b8\u998f\uff08SFD\uff09\u8bad\u7ec3\u65b9\u6cd5\uff0c\u4e13\u4e3a\u5c0f\u578b\uff08~2B\uff09GUI\u5b9a\u4f4d\u667a\u80fd\u4f53\u8bbe\u8ba1\uff0c\u901a\u8fc7DOM\u76f4\u63a5\u8bfb\u53d6\u8fb9\u754c\u6846\u907f\u514d\u4eba\u5de5\u6807\u6ce8\uff0c\u5e76\u7ed3\u5408GRPO\u5f3a\u5316\u5b66\u4e60\u63d0\u5347\u6027\u80fd\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25964", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["WinDOM\u8bed\u6599\u5e93\uff1a\u9a71\u52a8Windows 11 Web\u91cd\u5b9e\u73b0\u5728\u65e0\u5934Playwright\u4e0b\u81ea\u52a8\u91c7\u96c654,425\u6761GUI\u5b9a\u4f4d\u6570\u636e\uff0c\u76f4\u63a5\u4eceDOM\u8bfb\u53d6\u8fb9\u754c\u6846\uff0c\u96f6\u4eba\u5de5\u6807\u6ce8", "\u81ea\u5bb6\u65cf\u84b8\u998f\uff08SFD\uff09\uff1a\u652f\u6301\u4e24\u79cd\u6a21\u5f0f\u2014\u2014\u5b66\u751f\u6a21\u578b\u7684EMA\u81ea\u84b8\u998f\uff08\u65e0\u9700\u5916\u90e8\u6a21\u578b\uff09\u6216\u540c\u5bb6\u65cf\u66f4\u5927\u51bb\u7ed3\u6559\u5e08\u84b8\u998f\uff0c\u4f5c\u4e3aGRPO\u7684\u51b7\u542f\u52a8\u521d\u59cb\u5316", "\u6b20\u9971\u548c\u51b7\u542f\u52a8\u7b56\u7565\uff1a\u5728Qwen3.5-2B\u4e0a\uff0c\u672a\u5b8c\u5168\u6536\u655b\u7684SFD\u51b7\u542f\u52a8\u6bd4\u6536\u655b\u7248\u672c\u66f4\u9002\u5408GRPO\u521d\u59cb\u5316\uff0cOOD\u5747\u503c\u63d0\u5347+5.4\uff0cEMA\u540c\u5c3a\u5bf8\u6a21\u5f0f\u6027\u80fd\u63a5\u8fd14B\u6559\u5e08\u7248\u672c\uff0865.2 vs 66.3\uff09"], "keywords": ["\u667a\u80fd\u4f53", "GUI\u5b9a\u4f4d", "\u77e5\u8bc6\u84b8\u998f", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25964v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "WinDOM: Self-Family Distillation for Small-Model GUI Grounding", "upvotes": 0, "what_it_is": "\u63d0\u51faWinDOM\u6570\u636e\u96c6\uff0854,425\u6761\u8bb0\u5f55\uff09\u548c\u81ea\u5bb6\u65cf\u84b8\u998f\uff08SFD\uff09\u8bad\u7ec3\u65b9\u6cd5\uff0c\u4e13\u4e3a\u5c0f\u578b\uff08~2B\uff09GUI\u5b9a\u4f4d\u667a\u80fd\u4f53\u8bbe\u8ba1\uff0c\u901a\u8fc7DOM\u76f4\u63a5\u8bfb\u53d6\u8fb9\u754c\u6846\u907f\u514d\u4eba\u5de5\u6807\u6ce8\uff0c\u5e76\u7ed3\u5408GRPO\u5f3a\u5316\u5b66\u4e60\u63d0\u5347\u6027\u80fd\u3002", "why_notable": "\u5728\u4e0d\u6269\u5927\u6a21\u578b\u89c4\u6a21\u7684\u524d\u63d0\u4e0b\uff0c\u7cfb\u7edf\u89e3\u51b3\u4e86\u5c0f\u6a21\u578bGUI\u5b9a\u4f4d\u7684\u6570\u636e\u6807\u6ce8\u548cSFT+RL\u7ed3\u5408\u4e24\u5927\u96be\u9898\uff0cEMA\u81ea\u84b8\u998f\u6a21\u5f0f\u751a\u81f3\u65e0\u9700\u5916\u90e8\u6559\u5e08\u6a21\u578b\u5373\u53ef\u63a5\u8fd1\u8de8\u5c3a\u5bf8\u84b8\u998f\u6548\u679c\uff0c\u5bf9\u7aef\u4fa7\u90e8\u7f72\u548c\u4f4e\u6210\u672c\u8fed\u4ee3\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Estimating token-level advantages in reinforcement learning (RL) for language models remains challenging because scaling up episodic experience collection is expensive. The difficulty intensifies for baseline advantage estimation methods, where repeated sampling causes trajectories to diverge into substantially different reasoning prefixes. In this context, RL algorithms such as GRPO prove limited: an outcome reward is too sparse to be attributed to specific actions like intermediate steps, and comparisons across sampled traces are non-trivial because they are heterogeneous. To mitigate both the computational cost of repeated sampling and the difficulty of credit assignment, we study single-rollout proximal policy optimization (SR-PPO) featuring token-level credit assignment in RL for language models. Instead of estimating advantages by normalizing episodic returns within the candidate group, we train a calibrated token-level credit critic using Monte Carlo outcomes from one rollout per prompt. Specifically, we use the critic to predict the Pass@k success probability at the prompt prefix, which is derived from a Pass@1 attempt. This choice yields a more selective learning signal than Pass@1: it discounts easily solved prefixes while prioritizing hard ones whose success probability remains marginal. We show that as $k$ increases, Pass@k converges to a reachability indicator, reflecting whether a prefix can lead to at least one successful continuation. In an explicit state graph, the limit ($k \\rightarrow \\infty$) can be computed in $O(|V|+|E|)$ time, offering a promising surrogate for direct credit assignment without the need to sample contrastive traces. As an initial validation, SR-PPO exhibits stable learning dynamics, along with consistent gains in Pass@128 success rates on mathematical reasoning benchmarks such as HMMT26 and AIME24.", "arxiv_id": "2606.25451", "arxiv_url": "https://arxiv.org/abs/2606.25451", "authors": ["Fengdi Che", "Yang Liu", "Lei Yu", "Meng Cao", "Tong Che", "Rupam Mahmood", "Dale Schuurmans"], "brief": "\u63d0\u51faSR-PPO\uff08\u5355\u6b21rollout\u8fd1\u7aef\u7b56\u7565\u4f18\u5316\uff09\uff0c\u901a\u8fc7\u8bad\u7ec3\u4e00\u4e2a\u57fa\u4e8ePass@k\u6210\u529f\u6982\u7387\u7684token\u7ea7critic\uff0c\u5728\u6bcf\u4e2aprompt\u4ec5\u91c7\u6837\u4e00\u6761\u8f68\u8ff9\u7684\u60c5\u51b5\u4e0b\u5b9e\u73b0\u6709\u6548\u7684\u4fe1\u7528\u5206\u914d\uff0c\u89e3\u51b3GRPO\u7b49\u65b9\u6cd5\u9700\u8981\u5927\u91cf\u91cd\u590d\u91c7\u6837\u7684\u95ee\u9898\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25451", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u7528Pass@k\u6210\u529f\u6982\u7387\u4f5c\u4e3atoken\u7ea7critic\u7684\u8bad\u7ec3\u76ee\u6807\uff0c\u7531\u5355\u6b21Pass@1\u5c1d\u8bd5\u63a8\u5bfc\uff0ck\u589e\u5927\u65f6\u6536\u655b\u4e3a\u53ef\u8fbe\u6027\u6307\u6807", "Pass@k\u4fe1\u53f7\u6bd4Pass@1\u66f4\u5177\u9009\u62e9\u6027\uff1a\u5bf9\u6613\u89e3\u524d\u7f00\u964d\u6743\uff0c\u4f18\u5148\u5173\u6ce8\u6210\u529f\u6982\u7387\u8fb9\u9645\u7684\u56f0\u96be\u524d\u7f00", "\u5728\u72b6\u6001\u56fe\u4e2dk\u2192\u221e\u7684\u6781\u9650\u53ef\u5728O(|V|+|E|)\u65f6\u95f4\u5185\u8ba1\u7b97\uff0c\u65e0\u9700\u5bf9\u6bd4\u8f68\u8ff9\u91c7\u6837", "\u5728HMMT26\u548cAIME24\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0aPass@128\u6307\u6807\u6301\u7eed\u63d0\u5347\uff0c\u8bad\u7ec3\u52a8\u6001\u7a33\u5b9a"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b", "\u4fe1\u7528\u5206\u914d", "\u6570\u5b66\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25451v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Learning with a Single Rollout via Monte Carlo Pass@k Critic", "upvotes": 0, "what_it_is": "\u63d0\u51faSR-PPO\uff08\u5355\u6b21rollout\u8fd1\u7aef\u7b56\u7565\u4f18\u5316\uff09\uff0c\u901a\u8fc7\u8bad\u7ec3\u4e00\u4e2a\u57fa\u4e8ePass@k\u6210\u529f\u6982\u7387\u7684token\u7ea7critic\uff0c\u5728\u6bcf\u4e2aprompt\u4ec5\u91c7\u6837\u4e00\u6761\u8f68\u8ff9\u7684\u60c5\u51b5\u4e0b\u5b9e\u73b0\u6709\u6548\u7684\u4fe1\u7528\u5206\u914d\uff0c\u89e3\u51b3GRPO\u7b49\u65b9\u6cd5\u9700\u8981\u5927\u91cf\u91cd\u590d\u91c7\u6837\u7684\u95ee\u9898\u3002", "why_notable": "\u5927\u5e45\u964d\u4f4eLLM\u5f3a\u5316\u5b66\u4e60\u4e2d\u7ecf\u9a8c\u6536\u96c6\u7684\u8ba1\u7b97\u6210\u672c\uff08\u5355\u6b21rollout\u66ff\u4ee3\u591a\u6b21\u91c7\u6837\uff09\uff0c\u540c\u65f6\u63d0\u4f9b\u6bd4\u7a00\u758f\u7ed3\u679c\u5956\u52b1\u66f4\u7cbe\u7ec6\u7684token\u7ea7\u4fe1\u7528\u5206\u914d\uff0c\u5bf9\u8d44\u6e90\u53d7\u9650\u573a\u666f\u4e0b\u8bad\u7ec3\u63a8\u7406\u6a21\u578b\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Inference efficiency is typically pursued by shrinking the model: distillation, pruning, quantization, and sparse routing each lower per-token cost while treating token count as fixed. But output length has been inflating, and it is precisely the component the standard toolkit leaves untouched. Here, we argue that brevity is the missing inference-efficiency lever, and that pretraining data curation is a practical way to pull it: a model trained on concise, correct data learns to answer in fewer tokens; i.e. it has a lower Cost-of-Pass. We apply our VLM curation pipeline to the MAmmoTH-VL single-image subset, and compare models trained on our curated data, the standard MAmmoTH-VL data, and external open-weight frontier VLMs. On a controlled 20-evaluation set and 14 VLMs at 1B-4B activated parameters, we hold output length fixed with a per-model regression, separating brevity from quality, and price models in FLOPs per correct answer. Curation buys a 35x Cost-of-Pass advantage over the most verbose 4B comparator (Qwen3.5-4B) within $\\sim$1 pp of accuracy (0.41 vs 14.58 TFLOPs per correct answer; 0.691 vs 0.704 mean accuracy). Curation also buys a +17.55-percentage-point matched-length accuracy gain over the uncurated baseline that grows with model scale (from +16.7 pp at 1B to +21.2 pp at 4B). This brevity improvement concedes no quality: generic verbosity buys no accuracy at any capability or scale, and the window where reasoning-structured verbosity still earns its tokens shrinks from 4 of 8 capability groups at 2B to 1 of 8 at 4B. Per example, the concise model even reaches correct answers the verbose reasoning model misses, marking reasoning as a distinct curation target rather than something brevity gives up. Inference efficiency in this regime is a tokens-per-correct problem, and brevity is the lever that targets it directly.", "arxiv_id": "2606.25432", "arxiv_url": "https://arxiv.org/abs/2606.25432", "authors": ["DatologyAI", ":", "Matthew L. Leavitt", "Siddharth Joshi", "Haoli Yin", "Rishabh Adiga", "Haakon Mongstad", "Alvin Deng", "David Schwab", "Bogdan Gaza", "Ari Morcos"], "brief": "\u672c\u6587\u63d0\u51fa\u901a\u8fc7\u9884\u8bad\u7ec3\u6570\u636e\u7cbe\u9009\uff08\u800c\u975e\u6a21\u578b\u538b\u7f29\uff09\u6765\u964d\u4f4eVLM\u63a8\u7406\u6210\u672c\uff1a\u5728\u7b80\u6d01\u6b63\u786e\u7684\u6570\u636e\u4e0a\u8bad\u7ec3\u7684\u6a21\u578b\u80fd\u7528\u66f4\u5c11token\u7ed9\u51fa\u6b63\u786e\u7b54\u6848\uff0c\u4ece\u800c\u5927\u5e45\u964d\u4f4e\u6bcf\u4e2a\u6b63\u786e\u7b54\u6848\u7684FLOPs\u5f00\u9500\u3002", "categories": ["cs.LG", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25432", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51fa\"Cost-of-Pass\"\u6307\u6807\uff08\u6bcf\u4e2a\u6b63\u786e\u7b54\u6848\u7684FLOPs\uff09\uff0c\u5c06\u8f93\u51fa\u957f\u5ea6\u7eb3\u5165\u63a8\u7406\u6548\u7387\u8bc4\u4f30\u4f53\u7cfb", "\u4e0e\u6700\u5197\u957f\u76844B\u5bf9\u6bd4\u6a21\u578b\uff08Qwen3.5-4B\uff09\u76f8\u6bd4\uff0c\u7cbe\u9009\u6570\u636e\u6a21\u578b\u5b9e\u73b035\u500dCost-of-Pass\u4f18\u52bf\uff080.41 vs 14.58 TFLOPs/\u6b63\u786e\u7b54\u6848\uff09\uff0c\u7cbe\u5ea6\u4ec5\u5dee\u7ea61pp", "\u76f8\u6bd4\u672a\u7cbe\u9009\u57fa\u7ebf\uff0c\u7cbe\u9009\u6a21\u578b\u5728\u7b49\u957f\u6761\u4ef6\u4e0b\u51c6\u786e\u7387\u63d0\u5347+17.55pp\uff0c\u4e14\u968f\u6a21\u578b\u89c4\u6a21\u589e\u5927\u6548\u679c\u66f4\u663e\u8457\uff081B\u65f6+16.7pp\uff0c4B\u65f6+21.2pp\uff09\uff1b\u901a\u7528\u5197\u957f\u5728\u4efb\u4f55\u80fd\u529b\u7ec4\u5747\u4e0d\u5e26\u6765\u7cbe\u5ea6\u6536\u76ca"], "keywords": ["\u591a\u6a21\u6001", "\u63a8\u7406\u6548\u7387", "\u6570\u636e\u7cbe\u9009", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25432v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Brevity is the Soul of Inference Efficiency: Inducing Concision in VLMs via Data Curation", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u901a\u8fc7\u9884\u8bad\u7ec3\u6570\u636e\u7cbe\u9009\uff08\u800c\u975e\u6a21\u578b\u538b\u7f29\uff09\u6765\u964d\u4f4eVLM\u63a8\u7406\u6210\u672c\uff1a\u5728\u7b80\u6d01\u6b63\u786e\u7684\u6570\u636e\u4e0a\u8bad\u7ec3\u7684\u6a21\u578b\u80fd\u7528\u66f4\u5c11token\u7ed9\u51fa\u6b63\u786e\u7b54\u6848\uff0c\u4ece\u800c\u5927\u5e45\u964d\u4f4e\u6bcf\u4e2a\u6b63\u786e\u7b54\u6848\u7684FLOPs\u5f00\u9500\u3002", "why_notable": "\u63ed\u793a\u4e86\u63a8\u7406\u6548\u7387\u4f18\u5316\u4e2d\u88ab\u5ffd\u89c6\u7684\u8f93\u51fa\u957f\u5ea6\u7ef4\u5ea6\uff0c\u8bc1\u660e\u6570\u636e\u7cbe\u9009\u662f\u6bd4\u6a21\u578b\u538b\u7f29\u66f4\u76f4\u63a5\u7684\u6548\u7387\u6760\u6746\uff0c\u4e14\u7b80\u6d01\u6027\u4e0e\u51c6\u786e\u6027\u4e0d\u5b58\u5728trade-off\uff0c\u5bf9VLM\u8bad\u7ec3\u8303\u5f0f\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Large software projects often depend on older versions of libraries, even as APIs continue to evolve across releases. This creates a challenge for LLMs: they must maintain knowledge of multiple API versions, not merely the latest or most common one. However, current LLMs are trained on temporally mixed corpora and lack explicit mechanisms for such version-specific reasoning, leading to anachronistic errors - calling APIs as they exist in a different library version. To systematically evaluate this phenomenon, we introduce LibEvoBench, a multi-task benchmark spanning multiple versions of widely used Python libraries, along with a new metric, the Software Evolution Understanding Score (SEUS), to measure models\u0027 consistency when working with evolving APIs. Our results show that state-of-the-art models are largely version-oblivious: performance degrades for evolving APIs, while for stable APIs it remains the same across versions. Moreover, simply specifying the target version provides no benefit, while relevant documentation significantly boosts models\u0027 accuracy. These findings highlight a systematic limitation of current training paradigms and motivate new approaches for temporally grounded knowledge in code generation.", "arxiv_id": "2606.25402", "arxiv_url": "https://arxiv.org/abs/2606.25402", "authors": ["Daniele Cipollone", "Sergey Titov", "Maliheh Izadi", "Egor Bogomolov", "Arie van Deursen"], "brief": "\u63d0\u51faLibEvoBench\u57fa\u51c6\u6d4b\u8bd5\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u5728\u591a\u7248\u672cPython\u5e93API\u4ee3\u7801\u751f\u6210\u4e2d\u7684\u65f6\u5e8f\u77e5\u8bc6\u5206\u5c42\u80fd\u529b\uff0c\u5e76\u5f15\u5165\u65b0\u6307\u6807SEUS\u8861\u91cf\u6a21\u578b\u8de8\u7248\u672c\u4e00\u81f4\u6027\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25402", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f53\u524dSOTA\u6a21\u578b\u666e\u904d\u5b58\u5728\"\u7248\u672c\u76f2\u533a\"\uff1a\u5bf9\u6f14\u5316\u4e2d\u7684API\u6027\u80fd\u968f\u7248\u672c\u4e0b\u964d\uff0c\u800c\u7a33\u5b9aAPI\u5219\u4fdd\u6301\u4e00\u81f4", "\u4ec5\u5728\u63d0\u793a\u4e2d\u6307\u5b9a\u76ee\u6807\u7248\u672c\u53f7\u5bf9\u6a21\u578b\u51c6\u786e\u7387\u65e0\u660e\u663e\u63d0\u5347\uff0c\u4f46\u63d0\u4f9b\u76f8\u5173\u6587\u6863\u53ef\u663e\u8457\u6539\u5584\u8868\u73b0", "\u6a21\u578b\u5728\u8bad\u7ec3\u65f6\u4f7f\u7528\u65f6\u5e8f\u6df7\u5408\u8bed\u6599\uff0c\u7f3a\u4e4f\u7248\u672c\u611f\u77e5\u673a\u5236\uff0c\u5bfc\u81f4\u4ea7\u751f\"\u65f6\u4ee3\u9519\u8bef\"\uff08\u8c03\u7528\u9519\u8bef\u7248\u672c\u7684API\uff09"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25402v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "LibEvoBench: Probing Temporal Knowledge Stratification in Code Generation Models", "upvotes": 0, "what_it_is": "\u63d0\u51faLibEvoBench\u57fa\u51c6\u6d4b\u8bd5\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u5728\u591a\u7248\u672cPython\u5e93API\u4ee3\u7801\u751f\u6210\u4e2d\u7684\u65f6\u5e8f\u77e5\u8bc6\u5206\u5c42\u80fd\u529b\uff0c\u5e76\u5f15\u5165\u65b0\u6307\u6807SEUS\u8861\u91cf\u6a21\u578b\u8de8\u7248\u672c\u4e00\u81f4\u6027\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u63ed\u793aLLM\u4ee3\u7801\u751f\u6210\u4e2d\u7684\u7248\u672c\u65f6\u5e8f\u77e5\u8bc6\u7f3a\u9677\uff0c\u63d0\u51fa\u53ef\u91cf\u5316\u6307\u6807SEUS\uff0c\u4e3a\u6539\u8fdb\u8bad\u7ec3\u8303\u5f0f\u548cRAG\u589e\u5f3a\u65b9\u5411\u63d0\u4f9b\u5b9e\u8bc1\u4f9d\u636e"}, {"abstract": "Mathematical knowledge is organized around statements and their dependencies, but this structure is exposed unevenly: informal papers cite mostly at the document level, while formal libraries record fine-grained dependencies over a much smaller body of mathematics. We introduce TheoremGraph, a unified statement-level dependency graph spanning both informal and formal mathematics. On the informal side, we parse 11.7M theorem-like environments from mathematics arXiv and recover 18.3M candidate directed dependencies, each labeled by the extractor that proposed it so downstream users can trade coverage for precision. On the formal side, we release LeanGraph, a Lean 4 elaborator-level extractor producing 388,105 declaration nodes and 11.3M typed edges across 25 Lean projects. We bridge the two graphs by embedding generated natural-language slogans into a shared semantic space, linking related statements across papers and across the informal/formal divide; an LLM judge affirms 47,952 such matches above a 0.8 cosine floor, with the judge-acceptance rate rising from 48% across the floor to 87% in the \u003e=0.9 tier. On formal concept retrieval, our name-and-signature representation with graph expansion comes within 0.5pp of LeanSearch v2\u0027s reranked Recall@10 (0.775 vs. 0.780) without an LM reranker. We release the dataset, extractors, HTTP API, and MCP interface as infrastructure for mathematical search, attribution, and retrieval-augmented reasoning, available at theoremsearch.com and huggingface.co/datasets/uw-math-ai/theorem-matching.", "arxiv_id": "2606.25363", "arxiv_url": "https://arxiv.org/abs/2606.25363", "authors": ["Simon Kurgan", "Evan Wang", "Eric Leonen", "Sophie Szeto", "Luke Alexander", "Artemii Remizov", "Jarod Alper", "Giovanni Inchiostro", "Vasily Ilin"], "brief": "\u63d0\u51faTheoremGraph\uff0c\u4e00\u4e2a\u7edf\u4e00\u7684\u5b9a\u7406\u7ea7\u4f9d\u8d56\u56fe\u8c31\uff0c\u4ece1170\u4e07arXiv\u6570\u5b66\u73af\u5883\u4e2d\u63d0\u53d61830\u4e07\u5019\u9009\u4f9d\u8d56\u5173\u7cfb\uff0c\u5e76\u6784\u5efa\u542b38.8\u4e07\u8282\u70b9\u548c1130\u4e07\u8fb9\u7684Lean4\u5f62\u5f0f\u56feLeanGraph\uff0c\u901a\u8fc7\u8bed\u4e49\u5d4c\u5165\u5c06\u975e\u6b63\u5f0f\u4e0e\u6b63\u5f0f\u6570\u5b66\u5b9a\u7406\u8de8\u5e93\u5339\u914d\u3002", "categories": ["cs.IR", "cs.AI", "math.HO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25363", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4ecearXiv\u89e3\u679011.7M\u5b9a\u7406\u7c7b\u73af\u5883\uff0c\u6062\u590d18.3M\u6709\u5411\u4f9d\u8d56\u5173\u7cfb\uff0c\u652f\u6301\u8986\u76d6\u7387\u4e0e\u7cbe\u5ea6\u7684\u6743\u8861", "LeanGraph\u8986\u76d625\u4e2aLean4\u9879\u76ee\uff0c\u4ea7\u751f388,105\u4e2a\u58f0\u660e\u8282\u70b9\u548c11.3M\u7c7b\u578b\u5316\u8fb9", "LLM\u88c1\u5224\u57280.9\u4f59\u5f26\u76f8\u4f3c\u5ea6\u9608\u503c\u4ee5\u4e0a\u5bf9\u8de8\u5e93\u5339\u914d\u7684\u63a5\u53d7\u7387\u8fbe87%\uff0c\u5171\u786e\u8ba447,952\u5bf9\u5339\u914d", "\u540d\u79f0+\u7b7e\u540d\u8868\u793a\u7ed3\u5408\u56fe\u6269\u5c55\u5728\u5f62\u5f0f\u6982\u5ff5\u68c0\u7d22Recall@10\u4e0a\u8fbe0.775\uff0c\u63a5\u8fd1LeanSearch v2\u76840.780"], "keywords": ["\u6570\u5b66\u63a8\u7406", "\u77e5\u8bc6\u56fe\u8c31", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "\u4fe1\u606f\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25363v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "TheoremGraph: Bridging Formal and Informal Mathematics", "upvotes": 0, "what_it_is": "\u63d0\u51faTheoremGraph\uff0c\u4e00\u4e2a\u7edf\u4e00\u7684\u5b9a\u7406\u7ea7\u4f9d\u8d56\u56fe\u8c31\uff0c\u4ece1170\u4e07arXiv\u6570\u5b66\u73af\u5883\u4e2d\u63d0\u53d61830\u4e07\u5019\u9009\u4f9d\u8d56\u5173\u7cfb\uff0c\u5e76\u6784\u5efa\u542b38.8\u4e07\u8282\u70b9\u548c1130\u4e07\u8fb9\u7684Lean4\u5f62\u5f0f\u56feLeanGraph\uff0c\u901a\u8fc7\u8bed\u4e49\u5d4c\u5165\u5c06\u975e\u6b63\u5f0f\u4e0e\u6b63\u5f0f\u6570\u5b66\u5b9a\u7406\u8de8\u5e93\u5339\u914d\u3002", "why_notable": "\u9996\u6b21\u5c06\u975e\u6b63\u5f0f\u6570\u5b66\u6587\u732e\u4e0e\u5f62\u5f0f\u5316\u8bc1\u660e\u5e93\u5728\u5b9a\u7406\u7ea7\u522b\u7edf\u4e00\u8fde\u63a5\uff0c\u4e3a\u6570\u5b66\u641c\u7d22\u3001\u5f52\u56e0\u8ffd\u8e2a\u548c\u68c0\u7d22\u589e\u5f3a\u63a8\u7406\u63d0\u4f9b\u57fa\u7840\u8bbe\u65bd\uff0c\u5e76\u5f00\u653e\u6570\u636e\u96c6\u3001API\u548cMCP\u63a5\u53e3"}, {"abstract": "Large Language Models (LLMs) have shown promise for automated penetration testing, yet existing end-to-end black-box evaluations are highly susceptible to error cascading: failures in early reconnaissance can mask an agent\u0027s actual ability to exploit vulnerabilities. To more accurately characterize these capabilities, we propose a two-stage decoupled evaluation framework that separates exploit execution from reconnaissance. Using ground-truth injection and knowledge-driven ablation across 70 high-fidelity web vulnerability testbeds, our framework isolates exploitation performance from reconnaissance noise. We empirically evaluate five open-source penetration-testing agents, covering multiagent, monolithic, and graph-driven architectures, on a strictly aligned subset of 50 representative vulnerabilities. The results reveal a substantial capability gap. With accurate vulnerability context, agents achieve a functional success rate of up to 90.0%, whereas autonomous reconnaissance, measured by targeted vulnerability recall, plateaus at approximately 50.0%, primarily due to failures in parsing unstructured telemetry. Cross-architectural analysis further reveals distinct capability niches: multi-agent isolation is more effective for long-sequence interactions such as de-serialization, while monolithic and graph-driven designs perform better on short-chain injections and cross-session access-control vulnerabilities, respectively. This decoupled evaluation work provides a fine-grained benchmarking protocol and an empirical basis for designing next-generation automated offensive security agents.", "arxiv_id": "2606.25332", "arxiv_url": "https://arxiv.org/abs/2606.25332", "authors": ["Liwei Yu", "Shuo Li", "Ming Zhou", "Ge Chu", "Yan Guo"], "brief": "\u9488\u5bf9LLM\u81ea\u52a8\u5316\u6e17\u900f\u6d4b\u8bd5\u4e2d\"\u9519\u8bef\u7ea7\u8054\"\u95ee\u9898\uff0c\u63d0\u51fa\u5c06\u4fa6\u5bdf\u4e0e\u6f0f\u6d1e\u5229\u7528\u89e3\u8026\u7684\u4e24\u9636\u6bb5\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc7\u771f\u5b9e\u6f0f\u6d1e\u4e0a\u4e0b\u6587\u6ce8\u5165\u4e0e\u77e5\u8bc6\u6d88\u878d\uff0c\u572870\u4e2a\u9ad8\u4fdd\u771fWeb\u6f0f\u6d1e\u6d4b\u8bd5\u5e8a\u4e0a\u72ec\u7acb\u8bc4\u4f30\u5404\u9636\u6bb5\u80fd\u529b\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25332", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u7ed9\u5b9a\u51c6\u786e\u6f0f\u6d1e\u4e0a\u4e0b\u6587\u65f6\uff0c\u667a\u80fd\u4f53\u6f0f\u6d1e\u5229\u7528\u6210\u529f\u7387\u9ad8\u8fbe90%\uff1b\u4f46\u81ea\u4e3b\u4fa6\u5bdf\u9636\u6bb5\u7684\u76ee\u6807\u6f0f\u6d1e\u53ec\u56de\u7387\u4ec5\u7ea650%\uff0c\u4e3b\u8981\u74f6\u9888\u5728\u4e8e\u975e\u7ed3\u6784\u5316\u9065\u6d4b\u6570\u636e\u89e3\u6790\u5931\u8d25", "\u8bc4\u4f30\u4e865\u79cd\u5f00\u6e90\u6e17\u900f\u6d4b\u8bd5\u667a\u80fd\u4f53\uff08\u591a\u667a\u80fd\u4f53\u3001\u5355\u4f53\u3001\u56fe\u9a71\u52a8\u67b6\u6784\uff09\uff0c\u8986\u76d650\u4e2a\u4ee3\u8868\u6027\u6f0f\u6d1e\uff0c\u63ed\u793a\u5404\u67b6\u6784\u7684\u80fd\u529b\u5dee\u5f02\uff1a\u591a\u667a\u80fd\u4f53\u9002\u5408\u53cd\u5e8f\u5217\u5316\u7b49\u957f\u5e8f\u5217\u4ea4\u4e92\uff0c\u56fe\u9a71\u52a8\u9002\u5408\u8de8\u4f1a\u8bdd\u8bbf\u95ee\u63a7\u5236\u6f0f\u6d1e", "\u63d0\u51fa\u7ec6\u7c92\u5ea6\u57fa\u51c6\u6d4b\u8bd5\u534f\u8bae\uff0c\u4e3a\u4e0b\u4e00\u4ee3\u81ea\u52a8\u5316\u653b\u51fb\u6027\u5b89\u5168\u667a\u80fd\u4f53\u8bbe\u8ba1\u63d0\u4f9b\u5b9e\u8bc1\u4f9d\u636e"], "keywords": ["\u667a\u80fd\u4f53", "\u7f51\u7edc\u5b89\u5168", "\u5927\u8bed\u8a00\u6a21\u578b", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25332v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Decoupling Reconnaissance and Exploitation: Measuring the Capability Boundaries of LLM-Based Web Penetration Testing", "upvotes": 0, "what_it_is": "\u9488\u5bf9LLM\u81ea\u52a8\u5316\u6e17\u900f\u6d4b\u8bd5\u4e2d\"\u9519\u8bef\u7ea7\u8054\"\u95ee\u9898\uff0c\u63d0\u51fa\u5c06\u4fa6\u5bdf\u4e0e\u6f0f\u6d1e\u5229\u7528\u89e3\u8026\u7684\u4e24\u9636\u6bb5\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc7\u771f\u5b9e\u6f0f\u6d1e\u4e0a\u4e0b\u6587\u6ce8\u5165\u4e0e\u77e5\u8bc6\u6d88\u878d\uff0c\u572870\u4e2a\u9ad8\u4fdd\u771fWeb\u6f0f\u6d1e\u6d4b\u8bd5\u5e8a\u4e0a\u72ec\u7acb\u8bc4\u4f30\u5404\u9636\u6bb5\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u6e17\u900f\u6d4b\u8bd5\u4e2d\u4fa6\u5bdf\u4e0e\u5229\u7528\u4e24\u9636\u6bb5\u89e3\u8026\u8bc4\u4f30\uff0c\u63ed\u793a\u73b0\u6709LLM\u667a\u80fd\u4f53\u7684\u771f\u5b9e\u80fd\u529b\u4e0a\u9650\u4e0e\u74f6\u9888\u6240\u5728\uff0c\u5bf9\u5b89\u5168AI\u7814\u7a76\u548c\u5b9e\u9645\u7ea2\u961f\u5de5\u5177\u5f00\u53d1\u5177\u6709\u91cd\u8981\u6307\u5bfc\u4ef7\u503c"}, {"abstract": "Jailbreak attacks reveal a persistent weakness in aligned Large Language Models: carefully crafted prompts can elicit policy-violating responses despite safety training. While most defenses operate at the prompt or output level, it remains unclear how harmful intent is encoded within the model\u0027s internal representations. We investigate this question by analyzing token-level predictive entropy trajectories across layers of a frozen LLM using the logit lens. We find that static aggregate statistics of prompt-level entropy (e.g., mean, variance) carry little discriminative signal, whereas features capturing how entropy evolves across token positions, such as monotonic rank-based trend scores, are substantially more informative. Importantly, this signal is not uniform across model depth: it is concentrated in intermediate layers and degrades at the final layer, indicating that jailbreak-relevant structure is most pronounced in mid-network representations rather than at the output head. Across multiple models (Llama, Qwen, Gemma) and adversarial benchmarks, these entropy dynamics provide architecture-consistent separation without additional training. Together, our findings show that jailbreak behavior is reflected in structured intermediate uncertainty dynamics, clarifying both which entropy-derived features encode harmful intent and where in the network that signal is most pronounced.", "arxiv_id": "2606.25182", "arxiv_url": "https://arxiv.org/abs/2606.25182", "authors": ["Sofiia Nikolenko", "Michele Papucci", "Mina Rezaei", "Shireen Kudukkil Manchingal"], "brief": "\u672c\u6587\u5229\u7528logit lens\u5206\u6790\u51bb\u7ed3LLM\u5404\u5c42\u7684token\u7ea7\u9884\u6d4b\u71b5\u8f68\u8ff9\uff0c\u53d1\u73b0\u8d8a\u72f1\u653b\u51fb\u7684\u6709\u5bb3\u610f\u56fe\u4e3b\u8981\u7f16\u7801\u5728\u6a21\u578b\u4e2d\u95f4\u5c42\u7684\u7ed3\u6784\u5316\u71b5\u52a8\u6001\u4e2d\uff0c\u800c\u975e\u6700\u7ec8\u8f93\u51fa\u5c42\uff0c\u5e76\u57fa\u4e8e\u6b64\u6784\u5efa\u4e86\u65e0\u9700\u8bad\u7ec3\u7684\u8d8a\u72f1\u68c0\u6d4b\u65b9\u6cd5\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25182", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9759\u6001\u805a\u5408\u71b5\u7edf\u8ba1\uff08\u5747\u503c\u3001\u65b9\u5dee\uff09\u5224\u522b\u4fe1\u53f7\u5f31\uff0c\u800c\u8de8token\u4f4d\u7f6e\u7684\u71b5\u6f14\u5316\u8d8b\u52bf\uff08\u5982\u5355\u8c03\u79e9\u8d8b\u52bf\u5206\u6570\uff09\u4fe1\u53f7\u663e\u8457\u66f4\u5f3a", "\u8d8a\u72f1\u76f8\u5173\u4fe1\u53f7\u96c6\u4e2d\u4e8e\u6a21\u578b\u4e2d\u95f4\u5c42\uff0c\u5728\u6700\u7ec8\u5c42\u53cd\u800c\u9000\u5316\uff0c\u63ed\u793a\u4e86\u6709\u5bb3\u610f\u56fe\u5728\u7f51\u7edc\u6df1\u5ea6\u4e0a\u7684\u5206\u5e03\u89c4\u5f8b", "\u5728Llama\u3001Qwen\u3001Gemma\u591a\u4e2a\u6a21\u578b\u53ca\u591a\u4e2a\u5bf9\u6297\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u5b9e\u73b0\u8de8\u67b6\u6784\u4e00\u81f4\u7684\u8d8a\u72f1\u68c0\u6d4b"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u5bf9\u9f50", "\u8d8a\u72f1\u68c0\u6d4b", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25182v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "What Intermediate Layers Know: Detecting Jailbreaks from Entropy Dynamics", "upvotes": 0, "what_it_is": "\u672c\u6587\u5229\u7528logit lens\u5206\u6790\u51bb\u7ed3LLM\u5404\u5c42\u7684token\u7ea7\u9884\u6d4b\u71b5\u8f68\u8ff9\uff0c\u53d1\u73b0\u8d8a\u72f1\u653b\u51fb\u7684\u6709\u5bb3\u610f\u56fe\u4e3b\u8981\u7f16\u7801\u5728\u6a21\u578b\u4e2d\u95f4\u5c42\u7684\u7ed3\u6784\u5316\u71b5\u52a8\u6001\u4e2d\uff0c\u800c\u975e\u6700\u7ec8\u8f93\u51fa\u5c42\uff0c\u5e76\u57fa\u4e8e\u6b64\u6784\u5efa\u4e86\u65e0\u9700\u8bad\u7ec3\u7684\u8d8a\u72f1\u68c0\u6d4b\u65b9\u6cd5\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u8d8a\u72f1\u653b\u51fb\u5728LLM\u5185\u90e8\u8868\u793a\u4e2d\u7684\u7f16\u7801\u4f4d\u7f6e\u4e0e\u7279\u5f81\u5f62\u5f0f\uff0c\u4e3a\u65e0\u8bad\u7ec3\u3001\u8f7b\u91cf\u7ea7\u7684\u8d8a\u72f1\u68c0\u6d4b\u63d0\u4f9b\u4e86\u65b0\u7684\u7406\u8bba\u4f9d\u636e\u548c\u5b9e\u7528\u65b9\u6cd5\uff0c\u5bf9LLM\u5b89\u5168\u9632\u5fa1\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) has been extended from single-domain training to multi-domain reasoning suites spanning mathematics, programming, and science. However, the training curriculum (how often each domain is sampled) is typically fixed or hand-tuned, even though reasoning skills transfer unevenly across domains. Existing learnability-based curricula adapt to where the policy is currently improving, but are blind to whether a gradient step on the selected domain benefits the remaining domains. In this paper, we propose Transfer-Aware Curriculum (TAC), a bandit-style online curriculum that prioritizes domains whose updates broadly benefit the rest of the training suite. TAC repurposes signals already produced by RL training: per-domain advantages capture local learnability, and projected gradients, taken from the GRPO step being computed, estimate cross-domain transferability via gradient-geometry alignment, at negligible cost (\u003c1% wall-clock overhead). Across a six-domain reasoning suite, TAC achieves the best macro-averaged accuracy on both Qwen3-1.7B and Llama3.2-3B, outperforming proportional random sampling, a hand-designed schedule, and a learnability-only bandit, and improving over the last of these by up to 2.8 points (10% relative). Ablations show performance degrades sharply when the transferability term is removed, and TAC remains robust on imbalanced training mixtures where learnability-only curricula over-commit to dominant domains. Our findings establish cross-domain transferability as a key signal for curriculum design in multi-domain RLVR.", "arxiv_id": "2606.25178", "arxiv_url": "https://arxiv.org/abs/2606.25178", "authors": ["Yongjin Yang", "Jiarui Liu", "Yinghui He", "Lezhen Zhang", "Bernhard Sch\u00f6lkopf", "Zhijing Jin"], "brief": "\u63d0\u51faTransfer-Aware Curriculum\uff08TAC\uff09\uff0c\u4e00\u79cd\u57fa\u4e8e\u591a\u81c2\u8001\u864e\u673a\u7684\u5728\u7ebf\u8bfe\u7a0b\u5b66\u4e60\u65b9\u6cd5\uff0c\u5728\u591a\u57dfRLVR\u8bad\u7ec3\u4e2d\u540c\u65f6\u8003\u8651\u5c40\u90e8\u53ef\u5b66\u4e60\u6027\u548c\u8de8\u57df\u8fc1\u79fb\u6027\uff0c\u52a8\u6001\u8c03\u6574\u5404\u9886\u57df\u7684\u91c7\u6837\u9891\u7387\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25178", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5229\u7528GRPO\u8bad\u7ec3\u4e2d\u5df2\u6709\u7684per-domain\u4f18\u52bf\u4fe1\u53f7\u548c\u6295\u5f71\u68af\u5ea6\uff0c\u901a\u8fc7\u68af\u5ea6\u51e0\u4f55\u5bf9\u9f50\u4f30\u8ba1\u8de8\u57df\u8fc1\u79fb\u6027\uff0c\u989d\u5916\u5f00\u9500\u4e0d\u8db31%", "\u5728\u6570\u5b66\u3001\u7f16\u7a0b\u3001\u79d1\u5b66\u7b49\u516d\u57df\u63a8\u7406\u5957\u4ef6\u4e0a\uff0cTAC\u5728Qwen3-1.7B\u548cLlama3.2-3B\u4e0a\u5747\u53d6\u5f97\u6700\u4f73\u5b8f\u5e73\u5747\u51c6\u786e\u7387\uff0c\u76f8\u6bd4\u4ec5\u53ef\u5b66\u4e60\u6027\u65b9\u6cd5\u63d0\u5347\u6700\u9ad82.8\u70b9\uff08\u76f8\u5bf910%\uff09", "\u6d88\u878d\u5b9e\u9a8c\u8868\u660e\u53bb\u9664\u8fc1\u79fb\u6027\u9879\u540e\u6027\u80fd\u5927\u5e45\u4e0b\u964d\uff0c\u4e14TAC\u5728\u4e0d\u5e73\u8861\u8bad\u7ec3\u6df7\u5408\u4e2d\u5bf9\u4e3b\u5bfc\u57df\u8fc7\u62df\u5408\u95ee\u9898\u5177\u6709\u9c81\u68d2\u6027"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8bfe\u7a0b\u5b66\u4e60", "\u591a\u57df\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25178v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Transferability for General Reasoning: An Automated Curriculum for Multi-Domain RLVR", "upvotes": 0, "what_it_is": "\u63d0\u51faTransfer-Aware Curriculum\uff08TAC\uff09\uff0c\u4e00\u79cd\u57fa\u4e8e\u591a\u81c2\u8001\u864e\u673a\u7684\u5728\u7ebf\u8bfe\u7a0b\u5b66\u4e60\u65b9\u6cd5\uff0c\u5728\u591a\u57dfRLVR\u8bad\u7ec3\u4e2d\u540c\u65f6\u8003\u8651\u5c40\u90e8\u53ef\u5b66\u4e60\u6027\u548c\u8de8\u57df\u8fc1\u79fb\u6027\uff0c\u52a8\u6001\u8c03\u6574\u5404\u9886\u57df\u7684\u91c7\u6837\u9891\u7387\u3002", "why_notable": "\u9996\u6b21\u5c06\u8de8\u57df\u68af\u5ea6\u8fc1\u79fb\u6027\u5f15\u5165RLVR\u8bfe\u7a0b\u8bbe\u8ba1\uff0c\u586b\u8865\u4e86\u73b0\u6709\u53ef\u5b66\u4e60\u6027\u8bfe\u7a0b\u5ffd\u89c6\u57df\u95f4\u77e5\u8bc6\u8fc1\u79fb\u7684\u7a7a\u767d\uff0c\u4e3a\u591a\u57dfLLM\u63a8\u7406\u8bad\u7ec3\u63d0\u4f9b\u4e86\u4f4e\u6210\u672c\u3001\u9ad8\u6548\u7684\u81ea\u52a8\u5316\u8bfe\u7a0b\u65b9\u6848\u3002"}, {"abstract": "Visual search has been one of the most productive paradigms in the study of visual attention: the way reaction time scales with the number of items distinguishes parallel, \"pop-out\" search from serial, attention-demanding search. I ask whether vision-language models (VLMs) exhibit the same behavioral signatures. I adapt four classic paradigms: feature versus conjunction search, spatial-configuration (T-vs-L) search, enumeration, and the tilted/vertical search asymmetry; and present them to current frontier and mid-tier models. Because a single model call has no reaction time, I use the number of reasoning (\"thinking\") tokens a model spends per trial as a within-model analog of search effort, and I compare against a large public human benchmark (Wolfe et al., 2010). The models reproduce several human signatures: feature search costs flat effort while conjunction effort climbs with set size; frontier models hold accuracy where mid-tier models collapse to chance; and a resolution control shows the conjunction cost is genuine search rather than difficulty resolving small shapes. They also diverge from humans in informative ways. The target-present effort slope exceeds the target-absent slope, reversing the human ordering; enumeration remains accurate where humans would lose count; and a reasoning model with adaptive deliberation declines to deliberate on detection tasks altogether, so that a single search expresses itself as an effort gradient in one model and as an accuracy cliff in another. I argue that psychophysical paradigms, applied behaviorally, are a sharp and inexpensive probe of machine visual cognition, and that the points of divergence are as informative as the points of agreement.", "arxiv_id": "2606.25066", "arxiv_url": "https://arxiv.org/abs/2606.25066", "authors": ["Farahnaz Wick"], "brief": "\u672c\u6587\u5c06\u56db\u79cd\u7ecf\u5178\u89c6\u89c9\u641c\u7d22\u8303\u5f0f\uff08\u7279\u5f81\u641c\u7d22\u3001\u8054\u5408\u641c\u7d22\u3001\u8ba1\u6570\u3001\u503e\u659c/\u5782\u76f4\u4e0d\u5bf9\u79f0\uff09\u5e94\u7528\u4e8e\u524d\u6cbf\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff0c\u4ee5\u6a21\u578b\u6bcf\u6b21\u63a8\u7406\u6d88\u8017\u7684thinking token\u6570\u91cf\u4f5c\u4e3a\u641c\u7d22\u52aa\u529b\u7a0b\u5ea6\u7684\u66ff\u4ee3\u6307\u6807\uff0c\u4e0e\u4eba\u7c7b\u53cd\u5e94\u65f6\u6570\u636e\u8fdb\u884c\u5bf9\u6bd4\u5206\u6790\u3002", "categories": ["cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25066", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6a21\u578b\u590d\u73b0\u4e86\u90e8\u5206\u4eba\u7c7b\u7279\u5f81\uff1a\u7279\u5f81\u641c\u7d22token\u6d88\u8017\u5e73\u7a33\uff0c\u8054\u5408\u641c\u7d22\u968f\u76ee\u6807\u6570\u91cf\u589e\u52a0\u800c\u4e0a\u5347\uff0c\u4e0e\u4eba\u7c7b\u5e76\u884c/\u4e32\u884c\u641c\u7d22\u533a\u5206\u4e00\u81f4", "\u6a21\u578b\u4e0e\u4eba\u7c7b\u5b58\u5728\u7cfb\u7edf\u6027\u504f\u5dee\uff1a\u76ee\u6807\u5b58\u5728\u65f6\u7684\u52aa\u529b\u659c\u7387\u5927\u4e8e\u76ee\u6807\u7f3a\u5931\u65f6\uff0c\u4e0e\u4eba\u7c7b\u89c4\u5f8b\u76f8\u53cd\uff1b\u8ba1\u6570\u4efb\u52a1\u4e2d\u6a21\u578b\u4e0d\u4f1a\u50cf\u4eba\u7c7b\u4e00\u6837\u5931\u53bb\u8ba1\u6570\u80fd\u529b", "\u4e0d\u540c\u80fd\u529b\u5c42\u7ea7\u6a21\u578b\u8868\u73b0\u5206\u5316\uff1a\u524d\u6cbf\u6a21\u578b\u5728\u51c6\u786e\u7387\u4e0a\u4fdd\u6301\u7a33\u5b9a\uff0c\u4e2d\u7b49\u6a21\u578b\u5219\u5728\u56f0\u96be\u6761\u4ef6\u4e0b\u51c6\u786e\u7387\u5d29\u6e83\u81f3\u968f\u673a\u6c34\u5e73"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u89c6\u89c9\u8ba4\u77e5", "\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25066v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Do vision-language models search like humans? Reasoning tokens as a reaction-time analog in classic visual-search paradigms", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06\u56db\u79cd\u7ecf\u5178\u89c6\u89c9\u641c\u7d22\u8303\u5f0f\uff08\u7279\u5f81\u641c\u7d22\u3001\u8054\u5408\u641c\u7d22\u3001\u8ba1\u6570\u3001\u503e\u659c/\u5782\u76f4\u4e0d\u5bf9\u79f0\uff09\u5e94\u7528\u4e8e\u524d\u6cbf\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff0c\u4ee5\u6a21\u578b\u6bcf\u6b21\u63a8\u7406\u6d88\u8017\u7684thinking token\u6570\u91cf\u4f5c\u4e3a\u641c\u7d22\u52aa\u529b\u7a0b\u5ea6\u7684\u66ff\u4ee3\u6307\u6807\uff0c\u4e0e\u4eba\u7c7b\u53cd\u5e94\u65f6\u6570\u636e\u8fdb\u884c\u5bf9\u6bd4\u5206\u6790\u3002", "why_notable": "\u9996\u6b21\u5c06\u5fc3\u7406\u7269\u7406\u5b66\u89c6\u89c9\u641c\u7d22\u8303\u5f0f\u7cfb\u7edf\u6027\u5730\u5e94\u7528\u4e8eVLM\u884c\u4e3a\u8bc4\u4f30\uff0c\u63d0\u51fa\u7528\u63a8\u7406token\u4f5c\u4e3a\u53cd\u5e94\u65f6\u7c7b\u6bd4\u7684\u65b0\u65b9\u6cd5\uff0c\u4e3a\u673a\u5668\u89c6\u89c9\u8ba4\u77e5\u7814\u7a76\u63d0\u4f9b\u4f4e\u6210\u672c\u3001\u9ad8\u533a\u5206\u5ea6\u7684\u63a2\u9488\u5de5\u5177\u3002"}, {"abstract": "General-purpose models often struggle to reliably identify and understand real-world multimodal risks, largely due to the inherent multimodal adversarial nature of content and AI safety. We present Yuvion VL, a family of multimodal large language models purpose-built for content and AI safety, with both instruction-tuned and reasoning-oriented variants. Yuvion VL addresses this gap by treating safety as an inherently adversarial and multimodal problem and designing the entire pipeline around adversarial robustness. For data construction, we develop an automated pipeline integrating adversarial-aware data synthesis with multi-stage quality control, producing large-scale, high-quality multimodal samples augmented with domain knowledge and reasoning annotations. For training, we adopt a three-stage pipeline that includes continued pretraining for risk-concept cross-modal alignment, instruct post-training for production-grade safety tasks, and reasoning post-training for enhanced interpretability and performance in complex tasks. We further introduce Confuse-then-Contrast Fine-Tuning, a contrastive framework that mines model-specific confusions and constructs multi-image contrastive groups to enforce explicit discrimination of fine-grained visual-semantic elements, enabling the model to distinguish between visually similar cases with different safety implications in adversarial safety tasks. To support rigorous evaluation, we further introduce Yuvion VL RiskEval (YVRE), a collection of benchmarks covering diverse open and internal evaluations, with a focus on content and AI safety, adversarial robustness, and real-world capability requirements. Experiments show that Yuvion VL-32B achieves industry-leading safety performance, surpassing comparably sized open-source models and best closed-source commercial models, while maintaining comparable general capabilities.", "arxiv_id": "2606.25034", "arxiv_url": "https://arxiv.org/abs/2606.25034", "authors": ["Shikai Qiu", "Xiaowen Xu", "Benlei Cui", "Ting Ma", "Xiufeng Huang", "Wenjing Jiang", "Shaoxuan He", "Haolei Xu", "Chunyang Chai", "Yujian Li", "Yiliang Zhang", "Guanghui Wang", "Ziheng Wang", "Ziwen Xu", "Zhaoyu Fan", "Jinhao Chen", "Ruijie Jian", "Hongxing Li", "Chuxi Xiao", "Xinyue Chen", "Wenxuan Liu", "Libin Dong", "Yupeng Cao", "Xiaoqian Xia", "Jing Wang", "Zhe Jiang", "Zhenan Ye", "Guang Yang", "Bin Liu", "Wei Peng", "Ziqiang Zhu", "Meihui Lian", "Kaiwen Lv Kacuila", "Haidong Ding", "Dongjie Zhang", "Yangfan Zhou", "Bingyu Zhu", "Yan Wang", "Hai Zhao", "Xuan Jin", "Wei Zhao", "Pengfei Sun", "Huiming Zhang", "Wei Wang", "Xipeng Cao", "Bin Li", "Chengwen Yao", "Meng Huang", "Xianfeng Li", "Bin Tang", "Chao Liu", "Hui Xue", "Longtao Huang", "Haiwen Hong"], "brief": "\u63d0\u51faYuvion VL\uff0c\u4e00\u7cfb\u5217\u4e13\u4e3a\u5185\u5bb9\u5b89\u5168\u4e0eAI\u5b89\u5168\u8bbe\u8ba1\u7684\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u5c06\u5b89\u5168\u95ee\u9898\u89c6\u4e3a\u5929\u7136\u7684\u5bf9\u6297\u6027\u591a\u6a21\u6001\u95ee\u9898\uff0c\u5e76\u56f4\u7ed5\u5bf9\u6297\u9c81\u68d2\u6027\u8bbe\u8ba1\u5b8c\u6574\u8bad\u7ec3\u6d41\u7a0b\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25034", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4e09\u9636\u6bb5\u8bad\u7ec3\u6d41\u7a0b\uff1a\u6301\u7eed\u9884\u8bad\u7ec3\uff08\u98ce\u9669\u6982\u5ff5\u8de8\u6a21\u6001\u5bf9\u9f50\uff09\u2192\u6307\u4ee4\u540e\u8bad\u7ec3\uff08\u751f\u4ea7\u7ea7\u5b89\u5168\u4efb\u52a1\uff09\u2192\u63a8\u7406\u540e\u8bad\u7ec3\uff08\u590d\u6742\u4efb\u52a1\u53ef\u89e3\u91ca\u6027\uff09", "\u63d0\u51faConfuse-then-Contrast Fine-Tuning\uff08\u6df7\u6dc6\u5bf9\u6bd4\u5fae\u8c03\uff09\uff0c\u6316\u6398\u6a21\u578b\u7279\u5b9a\u6df7\u6dc6\u70b9\u5e76\u6784\u5efa\u591a\u56fe\u5bf9\u6bd4\u7ec4\uff0c\u5f3a\u5316\u7ec6\u7c92\u5ea6\u89c6\u89c9\u8bed\u4e49\u5224\u522b\u80fd\u529b", "Yuvion VL-32B\u5728\u5b89\u5168\u6027\u80fd\u4e0a\u8d85\u8d8a\u540c\u7b49\u89c4\u6a21\u5f00\u6e90\u6a21\u578b\u53ca\u6700\u4f18\u95ed\u6e90\u5546\u4e1a\u6a21\u578b\uff0c\u540c\u65f6\u4fdd\u6301\u76f8\u5f53\u7684\u901a\u7528\u80fd\u529b"], "keywords": ["\u591a\u6a21\u6001", "AI\u5b89\u5168", "\u5bf9\u6297\u9c81\u68d2\u6027", "\u5185\u5bb9\u5ba1\u6838"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25034v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Yuvion VL: A Multimodal Foundation Model for Adversarial Content and AI Safety", "upvotes": 0, "what_it_is": "\u63d0\u51faYuvion VL\uff0c\u4e00\u7cfb\u5217\u4e13\u4e3a\u5185\u5bb9\u5b89\u5168\u4e0eAI\u5b89\u5168\u8bbe\u8ba1\u7684\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u5c06\u5b89\u5168\u95ee\u9898\u89c6\u4e3a\u5929\u7136\u7684\u5bf9\u6297\u6027\u591a\u6a21\u6001\u95ee\u9898\uff0c\u5e76\u56f4\u7ed5\u5bf9\u6297\u9c81\u68d2\u6027\u8bbe\u8ba1\u5b8c\u6574\u8bad\u7ec3\u6d41\u7a0b\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u5c06\u5bf9\u6297\u9c81\u68d2\u6027\u878d\u5165\u591a\u6a21\u6001\u5b89\u5168\u6a21\u578b\u5168\u6d41\u7a0b\u7684\u5de5\u4f5c\uff0c\u914d\u5957\u63a8\u51faYVRE\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5bf9\u5185\u5bb9\u5ba1\u6838\u3001AI\u5b
