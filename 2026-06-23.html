0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Next-Observation Prediction: Agent-Authored World Modeling for Sequential Decision Making", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Test-time scaling improves language-model reasoning, but existing approaches often face a difficult trade-off: long chain-of-thought sampling remains single-threaded, while sentence- or solution-level search can be computationally expensive and hard to train end-to-end. We introduce Local Branch Routing (LBR), a token-level test-time scaling framework that expands a small local lookahead tree, forwards all sampled branches through the language model, and uses a lightweight router to select the depth-1 subtree to commit. By routing over the hidden states of candidate local futures, LBR allows each token decision to use evidence beyond the root next-token distribution while avoiding full solution-level search. The resulting prune-shift-grow decoding process preserves discrete branch identities and defines a tractable tree-trajectory likelihood: newly grown nodes are counted when first sampled, and router decisions are assigned explicit probabilities. This enables end-to-end reinforcement learning with verifiable rewards, jointly optimizing the base model and router under the same likelihood-ratio principle as discrete-token RLVR. On synthetic hierarchical-planning tasks, LBR shows that post-candidate hidden states provide useful routing evidence. On mathematical reasoning benchmarks, LBR improves both Pass@1 and Pass@32 over discrete chain-of-thought, vanilla discrete-token RLVR, and RL-compatible soft-token branching baselines. These results suggest that lightweight local branching offers an efficient, trainable, and discrete form of language-model test-time scaling.", "arxiv_id": "2606.25354", "arxiv_url": "https://arxiv.org/abs/2606.25354", "authors": ["Yutong Yin", "Mingyu Jin", "Jin Pan", "Changyi Yang", "Zijie Xia", "Dhruv Pai", "Shuming Hu", "Zhen Zhang", "Chenyang Zhao", "Jinman Zhao", "Wujiang Xu", "Raymond Li", "Xin Eric Wang", "Julian McAuley", "Zhaoran Wang"], "brief": "\u63d0\u51fa\u5c40\u90e8\u5206\u652f\u8def\u7531\uff08LBR\uff09\u6846\u67b6\uff0c\u5728\u63a8\u7406\u65f6\u6784\u5efa\u5c0f\u578b\u5c40\u90e8\u524d\u77bb\u6811\uff0c\u901a\u8fc7\u8f7b\u91cf\u8def\u7531\u5668\u57fa\u4e8e\u5019\u9009\u5206\u652f\u7684\u9690\u85cf\u72b6\u6001\u9009\u62e9\u6700\u4f18\u5b50\u6811\uff0c\u907f\u514d\u4e86\u5168\u89e3\u641c\u7d22\u7684\u9ad8\u4ee3\u4ef7\u3002\u8be5\u65b9\u6cd5\u652f\u6301\u7aef\u5230\u7aef\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u5728\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\u76f8\u6bd4\u94fe\u5f0f\u601d\u7ef4\u548c\u79bb\u6563token RLVR\u5747\u6709\u63d0\u5347\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25354", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6d4b\u8bd5\u65f6\u6269\u5c55", "\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "\u6811\u641c\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25354v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Efficient and Trainable Language Model Test-Time Scaling via Local Branch Routing", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Memory for large language model (LLM) agents has rapidly evolved from simple retrieval-augmented mechanisms into a data management system that supports persistent information storage, retrieval, update, consolidation, and dynamic lifecycle governance throughout agent execution. Despite this evolution, existing evaluations still benchmark agent memory mainly through end-to-end task success metrics (e.g., F1, BLEU), while treating the underlying system as a monolithic black box. As a result, critical system-level concerns, including operational costs, architectural trade-offs across memory modules, and robustness under dynamic knowledge updates, remain insufficiently explored. In this paper, we present a systematic experimental study of agent memory from a data management perspective. We propose an analytical framework that decomposes agent memory into four core modules: memory representation and storage, extraction, retrieval and routing, and maintenance. Under this framework, we evaluate 12 representative memory systems and two reference baselines across five benchmark workloads spanning 11 datasets. Our extensive end-to-end evaluation shows that no single architecture dominates across all scenarios; instead, effectiveness depends heavily on how well the memory structure aligns with the workload bottleneck. Furthermore, through fine-grained ablation studies, we quantify their individual effects on representation fidelity, retrieval precision, update correctness, and long-horizon stability. Finally, we reveal cost-performance trade-offs under realistic workloads, showing localized maintenance is more cost-efficient than global reorganization. Based on these findings, we identify promising directions towards building truly agent-native memory systems. The code is publicly available at https://github.com/OpenDataBox/MemoryData.", "arxiv_id": "2606.24775", "arxiv_url": "https://arxiv.org/abs/2606.24775", "authors": ["Wei Zhou", "Xuanhe Zhou", "Shaokun Han", "Hongming Xu", "Guoliang Li", "Zhiyu Li", "Feiyu Xiong", "Fan Wu"], "brief": "\u672c\u6587\u4ece\u6570\u636e\u7ba1\u7406\u89c6\u89d2\u5bf9LLM\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\u8fdb\u884c\u7cfb\u7edf\u6027\u5b9e\u9a8c\u7814\u7a76\uff0c\u63d0\u51fa\u5c06\u667a\u80fd\u4f53\u8bb0\u5fc6\u5206\u89e3\u4e3a\u8868\u793a\u5b58\u50a8\u3001\u63d0\u53d6\u3001\u68c0\u7d22\u8def\u7531\u548c\u7ef4\u62a4\u56db\u4e2a\u6838\u5fc3\u6a21\u5757\u7684\u5206\u6790\u6846\u67b6\uff0c\u5bf912\u4e2a\u4ee3\u8868\u6027\u8bb0\u5fc6\u7cfb\u7edf\u572811\u4e2a\u6570\u636e\u96c6\u4e0a\u8fdb\u884c\u8bc4\u4f30\uff0c\u53d1\u73b0\u6ca1\u6709\u5355\u4e00\u67b6\u6784\u80fd\u5728\u6240\u6709\u573a\u666f\u4e2d\u5360\u4f18\uff0c\u5e76\u63ed\u793a\u4e86\u5c40\u90e8\u7ef4\u62a4\u6bd4\u5168\u5c40\u91cd\u7ec4\u66f4\u5177\u6210\u672c\u6548\u76ca\u7b49\u5173\u952e\u89c4\u5f8b\u3002", "categories": ["cs.CL", "cs.DB", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24775", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u7cfb\u7edf", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u636e\u7ba1\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24775v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Are We Ready For An Agent-Native Memory System?", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Dense retrieval embedding models are a fundamental component of modern retrieval-based AI systems. Most dense retrievers are trained with contrastive objectives, which require labeled positive and negative document pairs that are often costly and difficult to obtain. In this work, we investigate whether the autoregressive next-token prediction objective of a large language model (LLM) can provide supervision for dense retrieval. The intuition is simple: if a document contains information relevant to a query, conditioning on that document should make the target output easier for the LLM to predict. A key challenge is that the next-token prediction loss is computed inside the LLM, while the retriever is a separate embedding model. To address this challenge, we propose DREAM (Dense Retrieval Embeddings via Autoregressive Modeling), which injects retriever-generated query-document similarity scores into selected attention heads of a frozen LLM. During training, these scores determine how much attention each candidate document receives while the LLM predicts the target output. The resulting prediction loss provides gradients for retriever training through the attention mechanism. We evaluate DREAM on retrieval benchmarks BEIR and RTEB using embedding backbones ranging from 0.5B to 3B parameters. DREAM consistently outperforms existing baselines across different model scales. These results demonstrate that DREAM provides a promising approach for training dense retrievers through autoregressive modeling.", "arxiv_id": "2606.24667", "arxiv_url": "https://arxiv.org/abs/2606.24667", "authors": ["Yixuan Tang", "Yi Yang"], "brief": "\u63d0\u51faDREAM\u6846\u67b6\uff0c\u5229\u7528\u5927\u8bed\u8a00\u6a21\u578b\u7684\u81ea\u56de\u5f52\u4e0b\u4e00\u8bcd\u9884\u6d4b\u76ee\u6807\u4e3a\u7a20\u5bc6\u68c0\u7d22\u5668\u63d0\u4f9b\u8bad\u7ec3\u76d1\u7763\uff0c\u65e0\u9700\u6807\u6ce8\u6b63\u8d1f\u6837\u672c\u5bf9\u3002\u901a\u8fc7\u5c06\u68c0\u7d22\u5668\u751f\u6210\u7684\u67e5\u8be2-\u6587\u6863\u76f8\u4f3c\u5ea6\u5206\u6570\u6ce8\u5165\u51bb\u7ed3LLM\u7684\u6ce8\u610f\u529b\u5934\uff0c\u4f7f\u9884\u6d4b\u635f\u5931\u7684\u68af\u5ea6\u53cd\u5411\u4f20\u64ad\u81f3\u68c0\u7d22\u5668\u3002\u5728BEIR\u548cRTEB\u57fa\u51c6\u4e0a\uff0cDREAM\u57280.5B\u52303B\u53c2\u6570\u89c4\u6a21\u4e0b\u6301\u7eed\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24667", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7a20\u5bc6\u68c0\u7d22", "\u5927\u8bed\u8a00\u6a21\u578b", "\u81ea\u56de\u5f52\u5efa\u6a21", "\u5d4c\u5165\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24667v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DREAM: Dense Retrieval Embeddings via Autoregressive Modeling", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We introduce NatureBench, a cross-discipline benchmark of 90 tasks distilled from peer-reviewed Nature-family publications, designed to evaluate whether AI coding agents can move beyond reproduction toward discovery on real scientific problems. NatureBench is built on NatureGym, an automated pipeline that constructs a standardized, per-task containerized environment from a source paper, addressing the environment-fragmentation problem that has limited the credibility of prior agent-on-research benchmarks. Evaluating ten frontier agent configurations under a strict web-search-disabled protocol, we find that the strongest model surpasses SOTA on only 17.8% of tasks under the g\u003e0.1 criterion. Analysis of method pathways reveals that agents succeed primarily through methodological translation, converting scientific tasks into familiar supervised prediction problems, rather than through genuine scientific invention. Failures are dominated by wrong method choice and insufficient compute budget, not by task misunderstanding. We release the benchmark, the NatureGym pipeline, and a public leaderboard with maintainer-side reproduction. Code: https://github.com/FrontisAI/NatureBench", "arxiv_id": "2606.24530", "arxiv_url": "https://arxiv.org/abs/2606.24530", "authors": ["Yuru Wang", "Lejun Cheng", "Yuxin Zuo", "Sihang Zeng", "Bingxiang He", "Che Jiang", "Junlin Yang", "Yuchong Wang", "Kaikai Zhao", "Weifeng Huang", "Kai Tian", "Zhenzhao Yuan", "Jincheng Zhong", "Weizhi Wang", "Ning Ding", "Bowen Zhou", "Kaiyan Zhang"], "brief": "\u63d0\u51faNatureBench\u57fa\u51c6\uff0c\u5305\u542b90\u4e2a\u6765\u81eaNature\u7cfb\u5217\u671f\u520a\u7684\u8de8\u5b66\u79d1\u4efb\u52a1\uff0c\u7528\u4e8e\u8bc4\u4f30AI\u7f16\u7a0b\u667a\u80fd\u4f53\u80fd\u5426\u5728\u771f\u5b9e\u79d1\u5b66\u95ee\u9898\u4e0a\u8d85\u8d8a\u5df2\u53d1\u8868\u7684\u6700\u4f18\u7ed3\u679c\u3002\u6d4b\u8bd5\u53d1\u73b0\u6700\u5f3a\u6a21\u578b\u4ec5\u572817.8%\u7684\u4efb\u52a1\u4e0a\u8d85\u8d8aSOTA\uff0c\u4e14\u4e3b\u8981\u4f9d\u8d56\u65b9\u6cd5\u8fc1\u79fb\u800c\u975e\u771f\u6b63\u7684\u79d1\u5b66\u521b\u65b0\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24530", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u53d1\u73b0", "\u57fa\u51c6\u6d4b\u8bd5", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24530v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "NatureBench: Can Coding Agents Match the Published SOTA of Nature-Family Papers?", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We introduce SurgAtlas, the largest surgical video-language dataset to date, comprising 15,291 videos (2,391 hours) spanning 18 surgical specialties and over 5,000 procedure types, sourced entirely from publicly available YouTube content. SurgAtlas is also the first surgical video-language dataset to include open surgery at scale, with 6,182 open procedure videos alongside over 9,000 minimally invasive recordings, and the first to establish standardized benchmarks for open-surgery video understanding. We additionally provide an expert-validated subset with verified visual question-answer pairs across diverse open and minimally invasive procedures, serving as a clinically grounded benchmark for surgical reasoning. Compared with existing surgical video-language datasets, SurgAtlas provides one of the most diverse annotation schemas, combining segment-level captions, step- and phase-level descriptions, video-level surgical descriptions, and reasoning-oriented question-answer pairs organized within a hierarchical taxonomy. These annotations are constructed through an automated multi-tier pipeline with LLM-based enrichment and a staged VQA generation framework with explicit groundedness verification. The scale and diversity of SurgAtlas enable training surgical foundation models with broad procedural coverage: we finetune Qwen3-VL-8B through a two-stage captioning-then-instruction pipeline and achieve competitive or state-of-the-art results on multiple established surgical benchmarks, including phase recognition, triplet detection, and reasoning question answering. More broadly, SurgAtlas provides a large native public video corpus that can support future large-scale pretraining of multimodal surgical AI systems and contribute to the development of next-generation foundation models for surgery.", "arxiv_id": "2606.25905", "arxiv_url": "https://arxiv.org/abs/2606.25905", "authors": ["Filippos Bellos", "Andre S. Gala-Garza", "Miaowei Wang", "Alyssa M. Hardin", "Ahmad M. Hider", "Yayuan Li", "Jing Bi", "Susan Liang", "Chenliang Xu", "Donald S. Likosky", "Jason J. Corso"], "brief": "\u63d0\u51faSurgAtlas\uff0c\u8fc4\u4eca\u6700\u5927\u624b\u672f\u89c6\u9891\u8bed\u8a00\u6570\u636e\u96c6\uff0c\u5305\u542b15,291\u4e2a\u89c6\u9891\uff082,391\u5c0f\u65f6\uff09\uff0c\u8986\u76d618\u4e2a\u5916\u79d1\u4e13\u79d1\u548c5,000\u4f59\u79cd\u624b\u672f\u7c7b\u578b\uff0c\u9996\u6b21\u5927\u89c4\u6a21\u7eb3\u5165\u5f00\u653e\u624b\u672f\u3002\u901a\u8fc7\u591a\u5c42\u81ea\u52a8\u6807\u6ce8\u6d41\u6c34\u7ebf\u6784\u5efa\u5c42\u6b21\u5316\u6ce8\u91ca\uff0c\u5fae\u8c03Qwen3-VL-8B\u540e\u5728\u624b\u672f\u9636\u6bb5\u8bc6\u522b\u3001\u4e09\u5143\u7ec4\u68c0\u6d4b\u548c\u63a8\u7406\u95ee\u7b54\u7b49\u591a\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230\u7ade\u4e89\u6027\u6216\u6700\u4f18\u7ed3\u679c\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25905", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u533b\u7597AI", "\u89c6\u9891\u8bed\u8a00\u6570\u636e\u96c6", "\u57fa\u7840\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25905v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SurgAtlas: A Large-Scale Surgical Video-Language Dataset with 2,391 Hours of Open and Minimally Invasive Surgery", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reconstructing 3D scenes from a single image is a fundamental challenge in computer vision, with broad applications in virtual reality, robotics, and content creation. Recent methods achieve outstanding performance by leveraging camera-controlled video diffusion models, but rely on iterative diffusion sampling, which greatly limits their practical deployment. We observe that geometric forward warping alone can cover the majority of a target view directly from the input image, with only a compact residual left for the encoder to correct. Motivated by this observation, we propose PRISM, a feed-forward framework that decomposes multi-view latent prediction into a parameter-free geometric prior and a learned residual correction, with no diffusion sampling required at inference. To enable generalization from purely synthetic training data, we devise a two-stage training strategy combining latents supervised distillation for geometric generalization and perceptual fine-tuning for appearance quality optimization. Extensive experiments on three benchmarks demonstrate that PRISM achieves competitive reconstruction quality compared with diffusion-based methods, while reducing inference time dramatically to only 36 seconds per scene.", "arxiv_id": "2606.25430", "arxiv_url": "https://arxiv.org/abs/2606.25430", "authors": ["Zhijie Zheng", "Xinhao Xiang", "Jiawei Zhang"], "brief": "PRISM\u63d0\u51fa\u4e00\u79cd\u524d\u9988\u5f0f\u5355\u56fe3D\u91cd\u5efa\u6846\u67b6\uff0c\u5c06\u591a\u89c6\u89d2\u6f5c\u53d8\u91cf\u9884\u6d4b\u5206\u89e3\u4e3a\u65e0\u53c2\u6570\u51e0\u4f55\u5148\u9a8c\uff08\u51e0\u4f55\u524d\u5411\u53d8\u5f62\uff09\u548c\u53ef\u5b66\u4e60\u6b8b\u5dee\u4fee\u6b63\uff0c\u65e0\u9700\u6269\u6563\u91c7\u6837\u3002\u5728\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230\u4e0e\u6269\u6563\u65b9\u6cd5\u76f8\u5f53\u7684\u91cd\u5efa\u8d28\u91cf\uff0c\u63a8\u7406\u65f6\u95f4\u4ec5\u970036\u79d2\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25430", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u91cd\u5efa", "\u6269\u6563\u6a21\u578b", "\u591a\u89c6\u89d2\u5408\u6210", "\u524d\u9988\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25430v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PRISM: Feed-Forward Single-Image 3D Reconstruction via Geometric Warp-Residual Modeling", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Chest X-ray visual question answering (CXR VQA) requires models not only to predict correct answers, but also to produce reliable medical reasoning. However, existing reinforcement-learning-based training typically relies on answer-level rewards, which are often too coarse to improve chain-of-thought (CoT) quality and can become ineffective when group-level advantages collapse to zero. We propose \\textbf{Teach-to-Reason (T2R)}, a framework that introduces comparison-based supervision into CoT optimization through a self-improving \\emph{Teacher} and a competition-guided \\emph{Reasoner}. As the Teacher is iteratively strengthened via self-competition, the Reasoner is optimized against progressively stronger Teacher-generated references. We further introduce a case-wise reward design that preserves the original reward-induced positive/negative partition when it is informative, and restores supervision from competition scores when the original reward signal degenerates. Experiments on multiple CXR open-ended VQA benchmarks show that T2R consistently outperforms strong baselines, indicating that comparison-based supervision, when integrated in a controlled and principled manner, provides a more effective training signal for reasoning optimization.", "arxiv_id": "2606.25407", "arxiv_url": "https://arxiv.org/abs/2606.25407", "authors": ["Xiao Han", "Hao Liu", "Zhimin Bao", "Jile Jiao", "Yue Wang", "Hui Guo", "Xiaofeng Mou", "Yi Xu"], "brief": "\u9488\u5bf9\u80f8\u90e8X\u5149\u89c6\u89c9\u95ee\u7b54\u4efb\u52a1\uff0c\u63d0\u51faTeach-to-Reason\uff08T2R\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u6211\u6539\u8fdb\u7684Teacher\u4e0e\u7ade\u4e89\u5f15\u5bfc\u7684Reasoner\u76f8\u4e92\u535a\u5f08\uff0c\u5c06\u57fa\u4e8e\u6bd4\u8f83\u7684\u76d1\u7763\u4fe1\u53f7\u5f15\u5165\u601d\u7ef4\u94fe\u4f18\u5316\u3002\u8be5\u65b9\u6cd5\u89e3\u51b3\u4e86\u5f3a\u5316\u5b66\u4e60\u4e2d\u7ec4\u7ea7\u4f18\u52bf\u584c\u9677\u5bfc\u81f4\u5956\u52b1\u4fe1\u53f7\u9000\u5316\u7684\u95ee\u9898\uff0c\u5728\u591a\u4e2a\u5f00\u653e\u5f0fCXR VQA\u57fa\u51c6\u4e0a\u6301\u7eed\u8d85\u8d8a\u5f3a\u57fa\u7ebf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25407", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u95ee\u7b54", "\u533b\u5b66\u5f71\u50cf", "\u5f3a\u5316\u5b66\u4e60", "\u601d\u7ef4\u94fe\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25407v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Teach-to-Reason: Competition-Guided Reasoning with a Self-Improving Teacher", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Most vision-language-action (VLA) models are reactive: they predict the next action from the current instruction and observation, implicitly assuming that the current observation fully specifies the action-relevant state. In embodied control, however, embodiment-specific factors such as camera-to-robot geometry, robot calibration, or systematic actuation bias are often hard to identify from a single observation. As a result, reactive policies cannot reliably disambiguate these factors in general, overfitting to training environments and generalizing poorly at deployment. We propose Reflective VLA, which conditions each decision on a context of observation-action-consequence triplets. Each triplet records not only what the robot observed and executed, but also how the scene changed afterward, exposing the deployment-specific mapping from actions to observed effects. Architecturally, Reflective VLA routes all observation modalities through the VLM under shared attention, so the action expert reasons directly over past triplets and the current observation. A block-causal mask enables parallel multi-frame training without leakage and supports KV-cached real-time inference. On standard LIBERO and SimplerEnv-Bridge, Reflective VLA preserves strong in-distribution performance. Under distribution shift on LIBERO-Plus and the harder LIBERO-Plus-Hard, it improves average success rate by 5.4 and 4.2 percentage points over a matched reactive baseline. Ablations with a matched history-only baseline further show that action consequences -- rather than additional context length alone -- are the key to cross-environment generalization. Project page: https://lianqing11.github.io/reflective-vla-page/", "arxiv_id": "2606.25215", "arxiv_url": "https://arxiv.org/abs/2606.25215", "authors": ["Qing Lian", "Kent Yu", "Lei Zhang"], "brief": "\u63d0\u51faReflective VLA\uff0c\u8ba9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u5728\u51b3\u7b56\u65f6\u53c2\u8003\u5386\u53f2\u300c\u89c2\u5bdf-\u52a8\u4f5c-\u7ed3\u679c\u300d\u4e09\u5143\u7ec4\uff0c\u4f7f\u673a\u5668\u4eba\u80fd\u611f\u77e5\u90e8\u7f72\u73af\u5883\u7279\u6709\u7684\u52a8\u4f5c\u6548\u679c\u6620\u5c04\u3002\u5728\u5206\u5e03\u504f\u79fb\u573a\u666f\u4e0b\u76f8\u6bd4\u53cd\u5e94\u5f0f\u57fa\u7ebf\u6210\u529f\u7387\u63d0\u53474-5\u4e2a\u767e\u5206\u70b9\uff0c\u6d88\u878d\u5b9e\u9a8c\u8bc1\u660e\u5173\u952e\u5728\u4e8e\u52a8\u4f5c\u540e\u679c\u4fe1\u606f\u800c\u975e\u5355\u7eaf\u589e\u52a0\u5386\u53f2\u957f\u5ea6\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25215", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u5177\u8eab\u667a\u80fd", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u6cdb\u5316\u80fd\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25215v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Reflective VLA: In-Context Action Consequences Make VLAs Generalize", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Diffusion transformer (DiT) research on image generation has converged to a single evaluation setup: class-conditional generation on ImageNet. While methods improve the FID and related metrics, it is increasingly unclear whether they reflect real progress in generative modeling. The natural alternative, i.e., text-to-image (T2I) generation, is perceived as too costly or inconvenient to train and evaluate and is often skipped. We argue that this perception no longer holds. We introduce NanoGen, a unified DiT training and evaluation framework. NanoGen matches state-of-the-art DiT baselines on ImageNet and, with 12 lines of configuration change, also trains competitive text-to-image models. It currently supports RAE, VAE, pixel-space, and MeanFlow diffusion methods under both ImageNet and T2I setups. Under NanoGen, training T2I requires comparable compute to ImageNet. After training 21 latent diffusion models with NanoGen, we observe that method ranking shows no strong correlation between ImageNet and T2I generation: Pearson correlation is between -0.377 and -0.580 across three metrics. This suggests that a method which improves class-conditional ImageNet FID may show no corresponding improvement on T2I, clearly indicating the necessity of evaluating DiTs on both tasks. To this end, we summarize ImageNet and text-to-image results, which yields DiffusionBench, a holistic benchmark for DiT research. We recommend reporting DiffusionBench in place of ImageNet alone: methods that improve DiffusionBench are more likely to reflect broader progress.", "arxiv_id": "2606.24888", "arxiv_url": "https://arxiv.org/abs/2606.24888", "authors": ["Xingjian Leng", "Jaskirat Singh", "Zhanhao Liang", "Ethan Smith", "Martin Bell", "Aninda Saha", "Yuhui Yuan", "Liang Zheng"], "brief": "\u73b0\u6709\u6269\u6563Transformer\u7814\u7a76\u51e0\u4e4e\u53ea\u5728ImageNet\u7c7b\u6761\u4ef6\u751f\u6210\u4e0a\u8bc4\u4f30\uff0c\u4f46\u8be5\u6307\u6807\u4e0e\u6587\u672c\u751f\u6210\u56fe\u50cf\u4efb\u52a1\u7684\u6392\u540d\u76f8\u5173\u6027\u6781\u4f4e\uff08Pearson\u76f8\u5173-0.38\u5230-0.58\uff09\u3002\u4f5c\u8005\u63d0\u51faNanoGen\u7edf\u4e00\u8bad\u7ec3\u6846\u67b6\uff0c\u4ee5\u76f8\u8fd1\u7b97\u529b\u540c\u65f6\u652f\u6301\u4e24\u7c7b\u4efb\u52a1\uff0c\u5e76\u6784\u5efaDiffusionBench\u7efc\u5408\u57fa\u51c6\uff0c\u5efa\u8bae\u4ee5\u6b64\u66ff\u4ee3\u5355\u4e00ImageNet\u8bc4\u4f30\u4ee5\u53cd\u6620\u771f\u5b9e\u8fdb\u5c55\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24888", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u56fe\u50cf\u751f\u6210", "\u57fa\u51c6\u8bc4\u6d4b", "\u6587\u672c\u751f\u6210\u56fe\u50cf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24888v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DiffusionBench: On Holistic Evaluation of Diffusion Transformers", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Generating explorable 3D scenes from a single image requires strong generative priors and accurate geometric representations suitable for downstream use. Current video diffusion models offer high-quality generation and implicitly encode multi-view geometric structure in latent space. However, existing feedforward latent scene decoders typically output volumetric 3D Gaussians that lack a well-defined surface, limiting their use in simulation or standard graphics pipelines. This motivates decoding surface-aligned primitives that are not only renderable but also closer to explicit geometric assets. We ask whether compressed video diffusion latents can be mapped directly to explicit surface primitives in a single pass. To this end, we introduce FLAT and, for the first time, show that triangle splats can be decoded directly from video diffusion latents. Compared with decoding 3D Gaussians, predicting flat primitives is notoriously more challenging due to high sensitivity to primitive orientations, oftentimes leading to poor gradient flow. FLAT solves with two key ingredients: a ray-centered rotation parameterization for triangle regression and a novel product window function that improves gradient flow during differentiable triangle rendering. On standard benchmarks, FLAT achieves significantly better geometric accuracy while maintaining competitive visual quality compared to state-of-the-art feedforward baselines. We further show that a lightweight test-time refinement step converts the predicted triangle soup into a fully opaque, game-engine-ready representation that supports real-time rendering. By evaluating 3DGS, 2DGS, and triangle splatting variants under an identical training setup, we provide the first systematic analysis of representation tradeoffs in feedforward scene generation. The project page is available at https://flat-splat.github.io", "arxiv_id": "2606.24876", "arxiv_url": "https://arxiv.org/abs/2606.24876", "authors": ["Orest Kupyn", "Goutam Bhat", "Philipp Henzler", "Fabian Manhardt", "Christian Rupprecht", "Federico Tombari"], "brief": "\u63d0\u51faFLAT\u65b9\u6cd5\uff0c\u9996\u6b21\u5b9e\u73b0\u4ece\u89c6\u9891\u6269\u6563\u6a21\u578b\u7684\u6f5c\u5728\u7a7a\u95f4\u76f4\u63a5\u89e3\u7801\u4e09\u89d2\u5f62\u9762\u5143\uff08triangle splats\uff09\uff0c\u7528\u4e8e\u5355\u56fe\u50cf3D\u573a\u666f\u751f\u6210\u3002\u901a\u8fc7\u5c04\u7ebf\u4e2d\u5fc3\u65cb\u8f6c\u53c2\u6570\u5316\u548c\u4e58\u79ef\u7a97\u53e3\u51fd\u6570\u89e3\u51b3\u4e09\u89d2\u5f62\u6e32\u67d3\u4e2d\u7684\u68af\u5ea6\u6d41\u95ee\u9898\uff0c\u5728\u51e0\u4f55\u7cbe\u5ea6\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u524d\u9988\u57fa\u7ebf\uff0c\u5e76\u652f\u6301\u5b9e\u65f6\u6e32\u67d3\u7684\u6e38\u620f\u5f15\u64ce\u683c\u5f0f\u8f93\u51fa\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24876", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u573a\u666f\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u4e09\u89d2\u5f62\u9762\u5143", "\u51e0\u4f55\u91cd\u5efa"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24876v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "FLAT: Feedforward Latent Triangle Splatting for Geometrically Accurate Scene Generation", "upvotes": 0, "what_it_is": null, "why_notable": null}];

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
