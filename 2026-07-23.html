const PAPERS = [{"abstract": "Deep research requires agents to find answers that jointly satisfy multiple constraints. Discovering such answers is costly, whereas verifying a candidate can often be decomposed into tractable constraint-wise checks. This discovery--verification asymmetry suggests that a research agent should do more than simply search longer: it should recursively improve its current answer by verifying intermediate results and using the partially verified state to guide subsequent refinement. We introduce AREX, a family of Recursively Self-Improving (RSI) deep research agents. AREX alternates between an inner research loop that gathers evidence and constructs a provisional answer, and an outer self-improvement loop that audits the answer constraint-wise, identifies unresolved claims, and launches targeted follow-up research. To sustain RSI over long horizons, AREX learns an autonomous context-update tool that compresses growing interaction history into a compact improvement state preserving verified evidence and unresolved constraints, without relying on an external model. We train AREX on verified synthetic tasks and high-quality trajectories through agentic mid-training and long-horizon reinforcement learning. To mitigate sparse final rewards during long horizon learning, we emphasize key steps where decisive evidence is acquired or erroneous research directions are corrected. We instantiate a dense 4B model and a 122B-A10B Mixture-of-Experts model. Across BrowseComp, WideSearch, DeepSearchQA, Humanity\u0027s Last Exam (HLE), and other reasoning and tool-use benchmarks, AREX substantially outperforms comparable-scale baselines and remains competitive with models using substantially more activated parameters.", "arxiv_id": "2607.21461", "arxiv_url": "https://arxiv.org/abs/2607.21461", "authors": ["Shuqi Lu", "Chaofan Li", "Kun Luo", "Zhang Zhang", "Hui Wang", "Hongwang Xiao", "Zheng Liu", "Lei Xiong", "Jiahao Wang", "Sen Wang", "Xiyan Jiang", "Wanli Li", "Yuyang Hu", "Hongjin Qian", "Bingyu Yan", "Ziyi Xia", "Yingxia Shao", "Kang Liu", "Zhicheng Dou", "Di He", "Chaozhuo Li", "Qiwei Ye", "Zhongyuan Wang", "Zheng Liu"], "brief": "\u8bba\u6587\u63d0\u51fa AREX\uff0c\u4e00\u7c7b\u9012\u5f52\u81ea\u6211\u6539\u8fdb\u7684\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53\u3002\u5b83\u5728\u7814\u7a76\u751f\u6210\u7b54\u6848\u540e\uff0c\u6309\u7ea6\u675f\u9010\u9879\u5ba1\u8ba1\u3001\u5b9a\u4f4d\u672a\u89e3\u51b3\u4e3b\u5f20\uff0c\u5e76\u53d1\u8d77\u6709\u9488\u5bf9\u6027\u7684\u540e\u7eed\u68c0\u7d22\u4e0e\u4fee\u6b63\u3002", "categories": ["cs.AI"], "github_repo": "https://github.com/VectorSpaceLab/arex-model", "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21461", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5229\u7528\u201c\u53d1\u73b0\u96be\u3001\u9a8c\u8bc1\u76f8\u5bf9\u6613\u201d\u7684\u4e0d\u5bf9\u79f0\u6027\uff0c\u5c06\u6df1\u5ea6\u7814\u7a76\u62c6\u6210\u5185\u5c42\u8bc1\u636e\u6536\u96c6\u4e0e\u5916\u5c42\u81ea\u6211\u6539\u8fdb\u5faa\u73af", "\u5b66\u4e60\u81ea\u4e3b\u4e0a\u4e0b\u6587\u66f4\u65b0\u5de5\u5177\uff0c\u5c06\u957f\u4ea4\u4e92\u5386\u53f2\u538b\u7f29\u4e3a\u4fdd\u7559\u5df2\u9a8c\u8bc1\u8bc1\u636e\u4e0e\u672a\u89e3\u7ea6\u675f\u7684\u6539\u8fdb\u72b6\u6001", "\u901a\u8fc7\u667a\u80fd\u4f53\u4e2d\u671f\u8bad\u7ec3\u4e0e\u957f\u7a0b\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u5728\u5173\u952e\u8bc1\u636e\u83b7\u53d6\u548c\u7ea0\u9519\u6b65\u9aa4\u4e0a\u7f13\u89e3\u7a00\u758f\u5956\u52b1\u95ee\u9898"], "keywords": ["\u667a\u80fd\u4f53", "\u6df1\u5ea6\u7814\u7a76", "\u5f3a\u5316\u5b66\u4e60", "\u5de5\u5177\u4f7f\u7528"], "num_comments": 1, "on_hf": true, "organization": "Beijing Academy of Artificial Intelligence", "pdf_url": "https://arxiv.org/pdf/2607.21461v1", "published_at": "2026-07-23", "score": 0.627, "selected_reasons": ["\u77e5\u540d\u673a\u6784: BAAI", "\u4e0e computer use / agent \u76f8\u5173", "HF trending (15\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.21461.png", "title": "AREX: Towards a Recursively Self-Improving Agent for Deep Research", "tldr": "AREX\u901a\u8fc7\u9012\u5f52\u81ea\u68c0\u63d0\u5347\u6df1\u5ea6\u7814\u7a76\u80fd\u529b", "upvotes": 15, "what_it_is": "\u8bba\u6587\u63d0\u51fa AREX\uff0c\u4e00\u7c7b\u9012\u5f52\u81ea\u6211\u6539\u8fdb\u7684\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53\u3002\u5b83\u5728\u7814\u7a76\u751f\u6210\u7b54\u6848\u540e\uff0c\u6309\u7ea6\u675f\u9010\u9879\u5ba1\u8ba1\u3001\u5b9a\u4f4d\u672a\u89e3\u51b3\u4e3b\u5f20\uff0c\u5e76\u53d1\u8d77\u6709\u9488\u5bf9\u6027\u7684\u540e\u7eed\u68c0\u7d22\u4e0e\u4fee\u6b63\u3002", "why_notable": "AREX\u628a\u6df1\u5ea6\u7814\u7a76\u4ece\u5355\u7eaf\u5ef6\u957f\u641c\u7d22\u63a8\u8fdb\u5230\u53ef\u6301\u7eed\u7684\u9012\u5f52\u9a8c\u8bc1\u4e0e\u5b9a\u5411\u6539\u8fdb\uff0c\u5728\u591a\u9879\u6d4f\u89c8\u3001\u6df1\u5ea6\u95ee\u7b54\u3001\u63a8\u7406\u548c\u5de5\u5177\u4f7f\u7528\u57fa\u51c6\u4e0a\u663e\u8457\u4f18\u4e8e\u540c\u89c4\u6a21\u57fa\u7ebf\uff0c\u5e76\u63a5\u8fd1\u66f4\u5927\u6fc0\u6d3b\u53c2\u6570\u6a21\u578b\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u6f5c\u529b\u3002"}, {"abstract": "Traditional agent development is split across prompt templates, tool schemas, callback code, and workflow graphs. We present NVIDIA Object-Oriented Agents (NOOA), a model-agnostic Python framework for building reliable AI agents. NOOA takes a simpler approach: an agent is a Python object. Its methods are the actions the model can take, fields are its state, docstrings are its prompts, and its type annotations are contracts. A method whose code body consists of \"...\" is completed at runtime by an LLM-driven agent loop, while methods with normal bodies remain standard deterministic Python. This gives developers and agents the same interface, so agent behavior can be tested, traced, refactored, and improved just like other software. This paper makes three contributions. (1) We present the agent-as-a-Python-object programming model and the design principles behind it. Where Python has existing abstractions, we adopt them directly. Agent-specific capabilities--context, events, state rendering, long-term memory, and validated LLM loops--are exposed through simple Pythonic APIs, so both developers and agents share one familiar programming model. (2) We identify six model-facing ideas that NOOA is, to our knowledge, the first to combine on a single surface: typed input/output, pass-by-reference over live objects, code as action, programmable loop engineering, explicit object state, and model-callable harness APIs for context and events. We find the community already converging on several of these ideas--often as experimental or partial features--and present the comparison to encourage further adoption. (3) We demonstrate that current models use this interface effectively, both in targeted capability tests and on agentic and reasoning benchmarks such as SWE-bench Verified and Terminal-Bench 2.0 and ARC-AGI-3.", "arxiv_id": "2607.20709", "arxiv_url": "https://arxiv.org/abs/2607.20709", "authors": ["Paul Furgale", "Severin Klingler", "James Nolan", "Matt Staats", "Gaia Di Lorenzo", "Elisa Martinez Abad", "Christian Sch\u00fcller", "Razvan Dinu", "Alessio Devoto", "Pascal Berard", "Gal Kaplun", "Elad Sarafian", "Riccardo Roveri", "Leon Derczynski", "Ricardo Silveira Cabral"], "brief": "\u8bba\u6587\u63d0\u51fa NVIDIA Object-Oriented Agents\uff08NOOA\uff09\uff0c\u4e00\u4e2a\u6a21\u578b\u65e0\u5173\u7684 Python \u667a\u80fd\u4f53\u6846\u67b6\uff1a\u667a\u80fd\u4f53\u5c31\u662f Python \u5bf9\u8c61\uff0c\u65b9\u6cd5\u662f\u53ef\u8c03\u7528\u52a8\u4f5c\uff0c\u5b57\u6bb5\u662f\u72b6\u6001\uff0cdocstring \u662f\u63d0\u793a\uff0c\u7c7b\u578b\u6807\u6ce8\u662f\u5951\u7ea6\u3002LLM \u53ef\u5728\u8fd0\u884c\u65f6\u8865\u5168\u4ee5\u201c...\u201d\u4e3a\u4e3b\u4f53\u7684\u65b9\u6cd5\uff0c\u800c\u666e\u901a\u65b9\u6cd5\u4ecd\u4fdd\u6301\u786e\u5b9a u4f53\u6846\u67b6\uff1a\u667a\u80fd\u4f53\u5c31\u662f Python \u5bf9\u8c61\uff0c\u65b9\u6cd5\u662f\u53ef\u8c03\u7528\u52a8\u4f5c\uff0c\u5b57\u6bb5\u662f\u72b6\u6001\uff0cdocstring \u662f\u63d0\u793a\uff0c\u7c7b\u578b\u6807\u6ce8\u662f\u5951\u7ea6\u3002LLM \u53ef\u5728\u8fd0\u884c\u65f6\u8865\u5168\u4ee5\u201c...\u201d\u4e3a\u4e3b\u4f53\u7684\u65b9\u6cd5\uff0c\u800c\u666e\u901a\u65b9\u6cd5\u4ecd\u4fdd\u6301\u786e\u5b9a\u6027 Python \u903b\u8f91\u3002", "why_notable": "\u5b83\u5c06\u63d0\u793a\u3001\u5de5\u5177 schema\u3001\u56de\u8c03\u548c\u5de5\u4f5c\u6d41\u56fe\u7b49\u5206\u6563\u7684\u667a\u80fd\u4f53\u5f00\u53d1\u5143\u7d20\u6536\u655b\u5230\u539f\u751f Python \u9762\u5411\u5bf9\u8c61\u8303\u5f0f\u4e2d\uff0c\u964d\u4f4e\u5de5\u7a0b\u590d\u6742\u5ea6\uff0c\u5e76\u6709\u671b\u63d0\u5347\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u53ef\u9760\u6027\u3001\u53ef\u7ef4\u62a4\u6027\u548c\u53ef\u6d4b\u8bd5\u6027\u3002"}, {"abstract": "We introduce Tencent WorkBuddy Bench, a multi-domain evaluation suite for coding agents; this report documents its construction methodology, scoring protocol, and a cross-model leaderboard. At its core is a unified evaluation framework for constructing and running distribution-informed coding-agent tasks across four work domains - Code, Web, Office, and Security. Rather than adapting public issue text, every task is reverse-engineered from a real commit, pull request, or business scenario and rewritten as a short, colloquial, role-played request, so that a task\u0027s prompt is not recoverable by web-searching the underlying issue, pull request, or commit thread. Because the dataset is released openly - task directories, environment images, evaluation harness, tests, and reference solutions - contamination resistance rests on this construction together with dataset versioning rather than on secrecy. The four subsets - repository-level engineering, front-end development, office and business workflows, and red-/blue-team security - probe complementary facets of real work, each with its own verification style. All are packaged in a uniform task-directory format and run, under a uniform and reproducible protocol, on two agent harnesses (CodeBuddy Code and Claude Code); the full open release makes the benchmark reproducible end to end and directly auditable, since any third party can re-run each task and inspect its content. Because each subset uses a different scoring instrument, scores are not comparable across subsets and the suite reports no suite-wide average. We report a cross-model leaderboard across several model families.", "arxiv_id": "2607.20911", "arxiv_url": "https://arxiv.org/abs/2607.20911", "authors": ["Tencent WorkBuddy Bench Team", "Siqi Cai", "Shaopeng Chen", "Xiang Fei", "Yong Mao", "Zihan Xu", "Zhiheng Lyu", "Zhijian Shao", "Yuchen Shi", "Shuwen Zhang", "Chaofan Qiu", "Linjie Che", "Xiaoxi Zhao", "Feng Wu", "Kai Zhang", "Chaofan Zhu", "Yubin Qi", "Xiaoyun Liang", "Peijie Dong", "Yunhao Zhang", "Yuanjie Zhu", "Ling Jiang", "Xianjun Zhang", "Zhehang Chu", "Anyuan Sang", "Zhen Feng", "Sen Nie", "Shi Wu", "Yuanzhen Xu", "Xin Li", "Ning Yang", "Zhiqiang Dong", "Hande Dong", "Qiang Lin", "Yi Liu", "Yunsheng Wu", "Ke Li", "Xing Sun"], "brief": "\u672c\u6587\u4ecb\u7ecd Tencent WorkBuddy Bench\uff0c\u4e00\u4e2a\u9762\u5411\u4ee3\u7801\u667a\u80fd\u4f53\u7684\u591a\u9886\u57df\u8bc4\u6d4b\u5957\u4ef6\uff0c\u8986\u76d6\u4ee3\u7801\u3001Web\u3001\u529e\u516c\u4e0e\u5b89\u5168\u56db\u7c7b\u771f\u5b9e\u5de5\u4f5c\u573a\u666f\u3002\u4efb\u52a1\u4ece\u771f\u5b9e\u63d0\u4ea4\u3001PR \u6216\u4e1a\u52a1\u573a\u666f\u53cd\u5411\u6784\u5efa\uff0c\u5e76\u6539\u5199\u4e3a\u53e3\u8bed\u5316\u89d2\u8272\u8bf7\u6c42\uff0c\u4ee5\u964d\u4f4e\u516c\u5f00\u6570\u636e\u5e26\u6765\u7684\u6c61\u67d3\u98ce\u9669\u3002", "categories": ["cs.CL", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20911", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u91c7\u7528 u6570\u636e\u5e26\u6765\u7684\u6c61\u67d3\u98ce\u9669\u3002", "why_notable": "\u8be5\u57fa\u51c6\u9762\u5411\u771f\u5b9e\u5de5\u4f5c\u6d41\u4e2d\u7684\u4ee3\u7801\u667a\u80fd\u4f53\u80fd\u529b\uff0c\u5f3a\u8c03\u5f00\u653e\u53ef\u590d\u73b0\u4e0e\u6297\u6570\u636e\u6c61\u67d3\u6784\u9020\uff0c\u5bf9\u8bc4\u4f30\u6a21\u578b\u5728\u5de5\u7a0b\u3001\u529e\u516c\u548c\u5b89\u5168\u573a\u666f\u4e2d\u7684\u5b9e\u9645\u53ef\u7528\u6027\u5177\u6709\u8f83\u9ad8\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "The development of generalizable robotic manipulation policies is inherently bounded by the availability of large-scale, high-fidelity scene data. While recent automated synthesis methods attempt to bridge this gap via text-to-layout hallucination or simplified procedural generation, they frequently suffer from physical implausibility and fail to capture the complex, dense clutter of actual human environments. In this paper, we introduce TableVerse, a fully automated Real2Sim pipeline that shifts the paradigm from imaginative layout generation to deterministic reconstruction from unstructured, in-the-wild image data. Our framework seamlessly processes unscripted internet media into high-fidelity, simulation-ready tabletop environments with accurate metric scales, authentic topologies, and verified mechanical stability. Furthermore, an automated task-conditioned trajectory generation framework is integrated to synthesize high-quality, collision-free pick-and-place demonstrations. Leveraging this complete pipeline, we construct the TableVerse-100K Dataset, a large-scale corpus comprising 100,000 unique, physically consistent environments paired with interactive manipulation trajectories. By capturing diverse asset compositions, realistic spatial distributions, and high-quality demonstrations, TableVerse-100K establishes a highly scalable and high-fidelity data foundation, providing significant value to facilitate future research in generalizable robotic manipulation tasks.", "arxiv_id": "2607.21017", "arxiv_url": "https://arxiv.org/abs/2607.21017", "authors": ["Boyuan Wang", "Yue Zhang", "Xutao Xue", "Xueyu Song", "Yu Sun"], "brief": "\u8bba\u6587\u63d0\u51fa TableVerse\uff0c\u4e00\u4e2a\u5168\u81ea\u52a8 Real2Sim \u6d41\u6c34\u7ebf\uff0c\u53ef\u4ece\u4e92\u8054\u7f51\u975e\u7ed3\u6784\u5316\u56fe\u50cf\u4e2d\u91cd\u5efa\u9ad8\u4fdd\u771f\u3001\u7269\u7406\u4e00\u81f4\u7684\u684c\u9762\u4eff\u771f\u73af\u5883\u3002\u57fa\u4e8e\u8be5\u6d41\u7a0b\u6784\u5efa\u4e86 TableVerse-100K\uff0c\u5305\u542b10\u4e07\u4e2a\u771f\u5b9e\u5e03\u5c40\u573a\u666f\u53ca\u5bf9\u5e94\u7684\u65e0\u78b0\u649e\u6293\u53d6-\u653e\u7f6e\u8f68\u8ff9\u3002", "categories": ["cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21017", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4ece\u771f\u5b9e\u91ce\u5916\u56fe\u50cf\u8fdb\u884c\u786e\u5b9a\u6027\u91cd\u5efa\uff0c\u800c\u975e\u4f9d\u8d56\u6587\u672c\u751f\u6210\u6216\u7b80\u5316\u7a0b\u5e8f\u5316\u5408\u6210\uff0c\u63d0\u5347\u5e03\u5c40\u771f\u5b9e\u6027", "\u751f\u6210\u5177\u5907\u51c6\u786e\u5c3a\u5ea6\u3001\u771f\u5b9e\u62d3\u6251\u5173\u7cfb\u548c\u673a\u68b0\u7a33\u5b9a\u6027\u9a8c\u8bc1\u7684\u4eff\u771f\u684c\u9762\u73af\u5883", "\u96c6\u6210\u4efb\u52a1\u6761\u4ef6\u8f68\u8ff9\u751f\u6210\u6846\u67b6\uff0c\u81ea\u52a8\u5408\u6210\u9ad8\u8d28\u91cf\u4ea4\u4e92\u5f0f pick-and-place \u793a\u8303"], "keywords": ["\u673a\u5668\u4eba\u64cd\u63a7", "\u6570\u636e\u96c6", "\u4eff\u771f", "Real2Sim"], "num_comments": 0, "on_hf": true, "organization": "ByteDance", "pdf_url": "https://arxiv.org/pdf/2607.21017v1", "published_at": "2026-07-23", "score": 0.438, "selected_reasons": ["\u77e5\u540d\u673a\u6784: ByteDance", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.21017.png", "title": "TableVerse: A Large-scale Tabletop Dataset with Real-world Grounded Layouts for Generalizable Manipulation", "tldr": "\u4ece\u771f\u5b9e\u56fe\u50cf\u81ea\u52a8\u91cd\u5efa10\u4e07\u684c\u9762\u64cd\u63a7\u573a\u666f", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa TableVerse\uff0c\u4e00\u4e2a\u5168\u81ea\u52a8 Real2Sim \u6d41\u6c34\u7ebf\uff0c\u53ef\u4ece\u4e92\u8054\u7f51\u975e\u7ed3\u6784\u5316\u56fe\u50cf\u4e2d\u91cd\u5efa\u9ad8\u4fdd\u771f\u3001\u7269\u7406\u4e00\u81f4\u7684\u684c\u9762\u4eff\u771f\u73af\u5883\u3002\u57fa\u4e8e\u8be5\u6d41\u7a0b\u6784\u5efa\u4e86 TableVerse-100K\uff0c\u5305\u542b10\u4e07\u4e2a\u771f\u5b9e\u5e03\u5c40\u573a\u666f\u53ca\u5bf9\u5e94\u7684\u65e0\u78b0\u649e\u6293\u53d6-\u653e\u7f6e\u8f68\u8ff9\u3002", "why_notable": "\u8be5\u6570\u636e\u96c6\u9488\u5bf9\u901a\u7528\u673a\u5668\u4eba\u64cd\u63a7\u4e2d\u9ad8\u8d28\u91cf\u771f\u5b9e\u573a\u666f\u6570\u636e\u4e0d\u8db3\u7684\u95ee\u9898\uff0c\u63d0\u4f9b\u4e86\u5927\u89c4\u6a21\u3001\u53ef\u6269\u5c55\u4e14\u7269\u7406\u4e00\u81f4\u7684\u6570\u636e\u57fa\u7840\uff0c\u6709\u671b\u63d0\u5347\u64cd\u63a7\u7b56\u7565\u5728\u590d\u6742\u6742\u4e71\u771f\u5b9e\u73af\u5883\u4e2d\u7684\u6cdb\u5316\u80fd\u529b\u3002"}, {"abstract": "Modern AI agents rely on elaborate inference harnesses such as Claude Code, Codex, and OpenClaw to drive multi-turn reasoning, tool use, and access to external systems. While powerful, these complex harnesses also make agents hard to train end-to-end with open infrastructure, whose SFT/RL stacks cannot natively express stateful, multi-process harness inference. To address this, we present OpenForgeRL, an open-source framework for training harness-based agents end-to-end in diverse environments. OpenForgeRL achieves this with a lightweight proxy that serves the harness\u0027s model calls while recording them as training data for a standard RL codebase (e.g., veRL), and a Kubernetes orchestrator that runs each rollout in its own remote container, together enabling training on any harness in any environment at scale. By decoupling training and inference, OpenForgeRL allows researchers to easily train, study, and improve agents directly in the real harnesses and environments they are deployed with. We validate our framework across diverse, complex harnesses and environments, spanning tool/claw-based agents and multimodal GUI browser- and computer-use agents. Using only hundreds to a few thousand tasks, OpenForgeClaw reaches 31.7 pass^3 and 55.9 pass@3 on ClawEval and 33.7 on QwenClawBench. OpenForgeGUI reaches 37.7 on OSWorld-Verified, 63.0 on Online-Mind2Web, and 72.3 on WebVoyager. Both outperform open baselines of similar size on nearly all benchmarks, and in the GUI setting match or surpass models several times larger. Beyond benchmarks, we analyze how harness choice (e.g., ZeroClaw, OpenClaw, Codex) and RL shape agent behavior. We find that some harnesses are substantially harder to learn than others, and that RL improves agentic reliability, such as self-verification, tool coverage, and completing multi-step plans, though critical abilities such as error recovery remain weak.", "arxiv_id": "2607.21557", "arxiv_url": "https://arxiv.org/abs/2607.21557", "authors": ["Xiao Yu", "Baolin Peng", "Ruize Xu", "Hao Zou", "Qianhui Wu", "Hao Cheng", "Wenlin Yao", "Nikhil Singh", "Zhou Yu", "Jianfeng Gao"], "brief": "OpenForgeRL \u662f\u4e00\u4e2a\u9762\u5411 Claude Code\u3001Codex\u3001OpenClaw \u7b49\u590d\u6742\u63a8\u7406 harness \u7684\u5f00\u6e90\u7aef\u5230\u7aef\u8bad\u7ec3\u6846\u67b6\u3002\u5b83\u901a\u8fc7\u4ee3\u7406\u8bb0\u5f55\u6a21\u578b\u8c03\u7528\u5e76\u63a5\u5165\u6807\u51c6 RL \u4ee3\u7801\u5e93\uff0c\u540c\u65f6\u7528 Kubernetes \u4e3a\u6bcf\u6b21 rollout \u542f\u52a8\u9694\u79bb\u8fdc\u7a0b\u5bb9\u5668\uff0c\u4f7f\u667a\u80fd\u4f53\u80fd\u5728\u771f\u5b9e\u90e8\u7f72\u73af\u5883\u4e2d\u8bad\u7ec3\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21557", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u91c7\u7528\u8f7b\u91cf\u7ea7 proxy \u89e3\u8026\u8bad\u7ec3\u4e0e\u63a8\u7406\uff0c\u5c06\u6709\u72b6\u6001\u3001\u591a\u8fdb\u7a0b harness \u63a8\u7406\u8f6c\u5316\u4e3a\u53ef\u7528\u4e8e veRL \u7b49 RL \u6846\u67b6\u7684\u8bad\u7ec3\u6570\u636e", "\u652f\u6301\u5de5\u5177/Claw \u667a\u80fd\u4f53\u3001\u591a\u6a21\u6001 GUI \u6d4f\u89c8\u5668\u4e0e computer-use \u667a\u80fd\u4f53\u7b49\u591a\u7c7b\u590d\u6742\u73af\u5883\uff0c\u5e76\u53ef\u89c4\u6a21\u5316 rollout", "\u5728 ClawEval\u3001QwenClawBench\u3001OSWorld-Verified\u3001Online-Mind2Web\u3001WebVoyager \u7b49\u57fa\u51c6\u4e0a\u8d85\u8fc7\u540c\u89c4\u6a21\u5f00\u6e90\u57fa\u7ebf\uff0cGUI \u573a\u666f\u53ef\u5339\u914d\u6216\u8d85\u8fc7\u66f4\u5927\u6a21\u578b"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u5de5\u5177\u4f7f\u7528", "GUI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21557v1", "published_at": "2026-07-23", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "OpenForgeRL: Train Harness-native Agents in Any Environment", "tldr": "\u5f00\u6e90\u6846\u67b6\u8ba9\u771f\u5b9e\u63a8\u7406\u6846\u67b6\u4e2d\u7684\u667a\u80fd\u4f53\u53ef\u7aef\u5230\u7aef\u8bad\u7ec3", "upvotes": 0, "what_it_is": "OpenForgeRL \u662f\u4e00\u4e2a\u9762\u5411 Claude Code\u3001Codex\u3001OpenClaw \u7b49\u590d\u6742\u63a8\u7406 harness \u7684\u5f00\u6e90\u7aef\u5230\u7aef\u8bad\u7ec3\u6846\u67b6\u3002\u5b83\u901a\u8fc7\u4ee3\u7406\u8bb0\u5f55\u6a21\u578b\u8c03\u7528\u5e76\u63a5\u5165\u6807\u51c6 RL \u4ee3\u7801\u5e93\uff0c\u540c\u65f6\u7528 Kubernetes \u4e3a\u6bcf\u6b21 rollout \u542f\u52a8\u9694\u79bb\u8fdc\u7a0b\u5bb9\u5668\uff0c\u4f7f\u667a\u80fd\u4f53\u80fd\u5728\u771f\u5b9e\u90e8\u7f72\u73af\u5883\u4e2d\u8bad\u7ec3\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u89e3\u51b3\u4e86\u771f\u5b9e\u667a\u80fd\u4f53 harness \u96be\u4ee5\u7528\u5f00\u653e SFT/RL \u57fa\u7840\u8bbe\u65bd\u7aef\u5230\u7aef\u8bad\u7ec3\u7684\u5173\u952e\u74f6\u9888\uff0c\u4e3a\u7814\u7a76\u8005\u8bad\u7ec3\u548c\u5206\u6790\u53ef\u90e8\u7f72\u5f62\u6001\u7684\u5de5\u5177\u4f7f\u7528\u3001GUI \u4e0e computer-use \u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u901a\u7528\u5f00\u6e90\u8def\u5f84\u3002"}, {"abstract": "The recent emergence of vibe-coding workflows is changing what coding agents are expected to do. Instead of merely completing code under fully specified instructions, agents are increasingly expected to transform incomplete product intent into working software by combining various abilities including planning, requirement clarification, tool use, debugging, and repository-level construction. Yet existing benchmarks have not fully caught up with this shift, evaluating agents on static, fully specified tasks. In this paper, we introduce ICAE-Bench, a benchmark for evaluating coding agents under interactive project-building settings. The basic idea is to start from a fuzzy product requirement, simulating the dynamic paradigm with an automated User Agent. To make this setting both realistic and evaluable, ICAE-Bench introduces three key designs. First, to avoid the ambiguity of unconstrained fuzzy requirements, each task derives ambiguity from a precise real open-source repository with executable behavior. Second, to ensure high-quality and reproducible user simulation, ICAE-Bench grounds interaction through User Agent Data, allowing the User Agent to reveal hidden constraints without inventing new requirements or leaking implementation artifacts. Third, to evaluate open-ended repositories fairly, ICAE-Bench uses standardized black-box tests together with multi-dimensional diagnostics, including functional correctness, semantic and API similarity, structural fidelity, design quality, and interaction quality.", "arxiv_id": "2607.21217", "arxiv_url": "https://arxiv.org/abs/2607.21217", "authors": ["Zhongyuan Peng", "Dan Huang", "Chuyu Zhang", "Caijun Xu", "Changyi Xiao", "Shibo Hong", "David Lo", "Lin Qiu", "Xuezhi Cao", "Jiyuan He", "Yixin Cao"], "brief": "\u8bba\u6587\u63d0\u51fa ICAE-Bench\uff0c\u7528\u4e8e\u8bc4\u4f30\u7f16\u7801\u667a\u80fd\u4f53\u4ece\u6a21\u7cca\u4ea7\u54c1\u9700\u6c42\u51fa\u53d1\uff0c\u901a\u8fc7\u4ea4\u4e92\u6f84\u6e05\u3001\u89c4\u5212\u3001\u5de5\u5177\u4f7f\u7528\u3001\u8c03\u8bd5\u548c\u4ed3\u5e93\u7ea7\u6784\u5efa\u6765\u5b8c\u6210\u771f\u5b9e\u8f6f\u4ef6\u9879\u76ee\u7684\u80fd\u529b\u3002\u8be5\u57fa\u51c6\u901a\u8fc7\u81ea\u52a8\u5316 User Agent \u6a21\u62df\u52a8\u6001\u9700\u6c42\u6c9f\u901a\u8fc7\u7a0b\uff0c\u5e76\u4ee5\u771f\u5b9e\u5f00\u6e90\u4ed3\u5e93\u4f5c\u4e3a\u4efb\u52a1\u4f9d\u636e\u3002", "categories": ["cs.AI"], "github_repo": "https://github.com/ALEX-nlp/ICAE-EVAL", "github_stars": 3, "hf_url": "https://huggingface.co/papers/2607.21217", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4efb\u52a1\u4ece\u771f\u5b9e\u5f00\u6e90\u4ed3\u5e93\u7684\u53ef\u6267\u884c\u884c\u4e3a\u4e2d\u62bd\u53d6\u6a21\u7cca\u9700\u6c42\uff0c\u65e2\u4fdd\u7559\u73b0\u5b9e\u4e2d\u7684\u4e0d\u5b8c\u6574\u610f\u56fe\uff0c\u53c8\u907f\u514d\u65e0\u7ea6\u675f\u6b67\u4e49\u3002", "\u5f15\u5165 User Agent Data \u7ea6\u675f\u7528\u6237\u6a21\u62df\uff0c\u4f7f\u5176\u53ea\u80fd\u63ed\u793a\u9690\u85cf\u7ea6\u675f\uff0c\u907f\u514d\u7f16\u9020\u65b0\u9700\u6c42\u6216\u6cc4\u9732\u5b9e\u73b0\u7ec6\u8282\u3002", "\u91c7\u7528\u9ed1\u76d2\u6d4b\u8bd5\u4e0e\u591a\u7ef4\u8bca\u65ad\u8bc4\u4f30\uff0c\u5305\u62ec\u529f\u80fd\u6b63\u786e\u6027\u3001\u8bed\u4e49\u4e0e API \u76f8\u4f3c\u5ea6\u3001\u7ed3\u6784\u4e00\u81f4\u6027\u3001\u8bbe\u8ba1\u8d28\u91cf\u548c\u4ea4\u4e92\u8d28\u91cf\u3002"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u8bc4\u6d4b", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21217v1", "published_at": "2026-07-23", "score": 0.408, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.21217.png", "title": "ICAE-Bench: Evaluating Coding Agents as Interactive Project Builders", "tldr": "\u9762\u5411\u4ea4\u4e92\u5f0f\u9879\u76ee\u6784\u5efa\u7684\u7f16\u7801\u667a\u80fd\u4f53\u8bc4\u6d4b\u57fa\u51c6\u3002", "upvotes": 4, "what_it_is": "\u8bba\u6587\u63d0\u51fa ICAE-Bench\uff0c\u7528\u4e8e\u8bc4\u4f30\u7f16\u7801\u667a\u80fd\u4f53\u4ece\u6a21\u7cca\u4ea7\u54c1\u9700\u6c42\u51fa\u53d1\uff0c\u901a\u8fc7\u4ea4\u4e92\u6f84\u6e05\u3001\u89c4\u5212\u3001\u5de5\u5177\u4f7f\u7528\u3001\u8c03\u8bd5\u548c\u4ed3\u5e93\u7ea7\u6784\u5efa\u6765\u5b8c\u6210\u771f\u5b9e\u8f6f\u4ef6\u9879\u76ee\u7684\u80fd\u529b\u3002\u8be5\u57fa\u51c6\u901a\u8fc7\u81ea\u52a8\u5316 User Agent \u6a21\u62df\u52a8\u6001\u9700\u6c42\u6c9f\u901a\u8fc7\u7a0b\uff0c\u5e76\u4ee5\u771f\u5b9e\u5f00\u6e90\u4ed3\u5e93\u4f5c\u4e3a\u4efb\u52a1\u4f9d\u636e\u3002", "why_notable": "\u73b0\u6709\u4ee3\u7801\u8bc4\u6d4b\u591a\u805a\u7126\u9759\u6001\u3001\u660e\u786e\u4efb\u52a1\uff0c\u800c ICAE-Bench \u5bf9\u9f50\u4e86\u201cvibe-coding\u201d\u4e2d\u4ece\u6a21\u7cca\u60f3\u6cd5\u5230\u53ef\u8fd0\u884c\u9879\u76ee\u7684\u771f\u5b9e\u5de5\u4f5c\u6d41\uff0c\u53ef\u66f4\u5168\u9762\u8861\u91cf\u7f16\u7801\u667a\u80fd\u4f53\u7684\u4ea7\u54c1\u6784\u5efa\u80fd\u529b\u3002"}, {"abstract": "Traditional approaches to wearable health signal analysis, such as smartwatches, are constrained by rigid analytical frameworks and limited personalisation. The emergence of LLM agents creates a new opportunity for Personal Health Agentic Analysis, where health insights can be generated adaptively and in context. However, currently there is no open-source locally deployable platform capable of processing personal health data in real time while preserving privacy. We present HiMe, a locally deployable, privacy-first agent platform that is fully compatible with real-time health data ecosystems across a wide range of wearable devices. HiMe is guided by three design principles. The database is treated as a first-class component. Effectiveness and efficiency are jointly optimised to achieve a low-cost Pareto-optimal balance. Data are processed in real time while the user is modelled over the long term. Together, these principles make it practical for individuals to harness Personal Health Agents for continuous, personalised health monitoring for better wellbeing.", "arxiv_id": "2607.21019", "arxiv_url": "https://arxiv.org/abs/2607.21019", "authors": ["Wei Liu", "Siya Qi", "Linhai Zhang", "Lorainne Tudor Car", "Yulan He"], "brief": "HiMe \u662f\u4e00\u4e2a\u53ef\u672c\u5730\u90e8\u7f72\u3001\u9690\u79c1\u4f18\u5148\u7684\u4e2a\u4eba\u5065\u5eb7\u667a\u80fd\u4f53\u5e73\u53f0\uff0c\u53ef\u63a5\u5165\u591a\u79cd\u53ef\u7a7f\u6234\u8bbe\u5907\u5e76\u5b9e\u65f6\u5904\u7406\u5065\u5eb7\u6570\u636e\u3002\u5b83\u901a\u8fc7\u957f\u671f\u7528\u6237\u5efa\u6a21\u4e0e\u5b9e\u65f6\u5206\u6790\uff0c\u4e3a\u4e2a\u4eba\u63d0\u4f9b\u8fde\u7eed\u3001\u4e0a\u4e0b\u6587\u611f\u77e5\u7684\u5065\u5eb7\u6d1e\u5bdf\u3002", "categories": ["cs.AI", "cs.CL", "cs.HC", "cs.MA", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21019", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u6570\u636e\u5e93\u4f5c\u4e3a\u6838\u5fc3\u7ec4\u4ef6\uff0c\u652f\u6301\u4e2a\u4eba\u5065\u5eb7\u6570\u636e\u7684\u957f\u671f\u79ef\u7d2f\u3001\u68c0\u7d22\u4e0e\u5efa\u6a21", "\u517c\u987e\u5206\u6790\u6548\u679c\u4e0e\u8fd0\u884c\u6548\u7387\uff0c\u8ffd\u6c42\u4f4e\u6210\u672c\u7684\u5e15\u7d2f\u6258\u6700\u4f18\u90e8\u7f72\u65b9\u6848", "\u652f\u6301\u5b9e\u65f6\u6570\u636e\u6d41\u5904\u7406\uff0c\u5e76\u9762\u5411\u591a\u79cd\u53ef\u7a7f\u6234\u8bbe\u5907\u751f\u6001\u4fdd\u6301\u517c\u5bb9"], "keywords": ["\u667a\u80fd\u4f53", "\u53ef\u7a7f\u6234\u8bbe\u5907", "\u5065\u5eb7\u8ba1\u7b97", "\u9690\u79c1\u4fdd\u62a4"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21019v1", "published_at": "2026-07-23", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "HiMe: Real-Time Self-Hosted Personal Agent Platform for Health Insights with Wearable Devices", "tldr": "\u672c\u5730\u5b9e\u65f6\u5065\u5eb7\u667a\u80fd\u4f53\u5e73\u53f0\uff0c\u517c\u987e\u9690\u79c1\u4e0e\u4e2a\u6027\u5316\u3002", "upvotes": 0, "what_it_is": "HiMe \u662f\u4e00\u4e2a\u53ef\u672c\u5730\u90e8\u7f72\u3001\u9690\u79c1\u4f18\u5148\u7684\u4e2a\u4eba\u5065\u5eb7\u667a\u80fd\u4f53\u5e73\u53f0\uff0c\u53ef\u63a5\u5165\u591a\u79cd\u53ef\u7a7f\u6234\u8bbe\u5907\u5e76\u5b9e\u65f6\u5904\u7406\u5065\u5eb7\u6570\u636e\u3002\u5b83\u901a\u8fc7\u957f\u671f\u7528\u6237\u5efa\u6a21\u4e0e\u5b9e\u65f6\u5206\u6790\uff0c\u4e3a\u4e2a\u4eba\u63d0\u4f9b\u8fde\u7eed\u3001\u4e0a\u4e0b\u6587\u611f\u77e5\u7684\u5065\u5eb7\u6d1e\u5bdf\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u586b\u8865\u4e86\u5f00\u6e90\u3001\u672c\u5730\u53ef\u90e8\u7f72\u4e2a\u4eba\u5065\u5eb7\u667a\u80fd\u4f53\u5e73\u53f0\u7684\u7a7a\u767d\uff0c\u6709\u52a9\u4e8e\u5728\u4fdd\u62a4\u9690\u79c1\u7684\u524d\u63d0\u4e0b\u5b9e\u73b0\u4e2a\u6027\u5316\u3001\u6301\u7eed\u6027\u7684\u5065\u5eb7\u76d1\u6d4b\u4e0e\u5efa\u8bae\u3002"}, {"abstract": "Creating dynamic and physically realistic 4D worlds from natural language descriptions is both fascinating and challenging. Traditional computer graphics methods rely on manual creation, requiring extensive human effort to fine-tune materials, motions, and visual fidelity. Recent advances in generative foundation models have sparked interest in learning to generate such 4D worlds from large-scale data; however, existing methods still struggle to ensure physical plausibility and controllability. In this work, we take a different path by leveraging foundation models to construct an agentic system that emulates how humans traditionally create 4D worlds, yet automates the entire process. We present GS-Agent, an end-to-end multi-agent framework that integrates physics engines in the loop to generate realistic, dynamic, and controllable 4D physical worlds from natural language. Inspired by how humans build 4D worlds, GS-Agent decomposes the task into entity management, covering 3D asset curation, material tuning, placement, and motion control, and rendering configuration, including camera and lighting manipulation. Multiple agents with distinct expertise interact with the physics engine via code, seek multimodal feedback, and collaborate to iteratively construct 4D worlds that align with the given descriptions. Experimental results show that GS-Agent effectively converts natural language into diverse and physically plausible 4D worlds exhibiting rich interactions among liquids, deformable objects, and rigid bodies, while achieving cinematic camera and lighting control. We envision GS-Agent as a foundation for a new paradigm in 4D world generation, empowering creative content creation and physical AI. Project page at https://umass-embodied-agi.github.io/gs-agent/", "arxiv_id": "2607.21522", "arxiv_url": "https://arxiv.org/abs/2607.21522", "authors": ["Hongxin Zhang", "Chunru Lin", "Junyan Li", "Zhou Xian", "Tsun-Hsuan Wang", "Chuang Gan"], "brief": "\u8bba\u6587\u63d0\u51fa GS-Agent\uff0c\u4e00\u4e2a\u7aef\u5230\u7aef\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u53ef\u4ece\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u81ea\u52a8\u6784\u5efa\u52a8\u6001\u3001\u7269\u7406\u771f\u5b9e\u3001\u53ef\u63a7\u76844D\u7269\u7406\u4e16\u754c\u3002\u7cfb\u7edf\u6a21\u62df\u4eba\u7c7b\u5236\u4f5c\u6d41\u7a0b\uff0c\u8054\u54083D\u8d44\u4ea7\u3001\u6750\u8d28\u3001\u5e03\u5c40\u3001\u8fd0\u52a8\u3001\u76f8\u673a\u4e0e\u706f\u5149\u914d\u7f6e\uff0c\u5e76\u5c06\u7269\u7406\u5f15\u64ce\u7eb3\u5165\u8fed\u4ee3\u751f\u6210\u95ed\u73af\u3002", "categories": ["cs.RO", "cs.AI", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21522", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5c064D\u4e16\u754c\u751f\u6210\u5206\u89e3\u4e3a\u5b9e\u4f53\u7ba1\u7406\u4e0e\u6e32\u67d3\u914d\u7f6e\uff0c\u5305\u62ec\u8d44\u4ea7\u7b5b\u9009\u3001\u6750\u8d28\u8c03\u53c2\u3001\u7269\u4f53\u653e\u7f6e\u3001\u8fd0\u52a8\u63a7\u5236\u3001\u76f8\u673a\u548c\u706f\u5149\u63a7\u5236\u3002", "\u591a\u4e2a\u5177\u5907\u4e0d\u540c\u4e13\u957f\u7684\u667a\u80fd\u4f53\u901a\u8fc7\u4ee3\u7801\u4e0e\u7269\u7406\u5f15\u64ce\u4ea4\u4e92\uff0c\u5e76\u5229\u7528\u591a\u6a21\u6001\u53cd\u9988\u8fed\u4ee3\u4fee\u6b63\u573a\u666f\u3002", "\u5b9e\u9a8c\u5c55\u793a\u5176\u53ef\u751f\u6210\u5305\u542b\u6db2\u4f53\u3001\u53ef\u53d8\u5f62\u7269\u4f53\u548c\u521a\u4f53\u4e30\u5bcc\u4ea4\u4e92\u7684\u591a\u6837\u5316\u7269\u7406\u4e16\u754c\uff0c\u5e76\u5177\u5907\u7535\u5f71\u5316\u955c\u5934\u4e0e\u5149\u7167\u63a7\u5236\u80fd\u529b\u3002"], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u7269\u7406\u4eff\u771f", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21522v1", "published_at": "2026-07-23", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "GS-Agent: Creating 4D Physical Worlds With Generative Simulation", "tldr": "\u591a\u667a\u80fd\u4f53\u7528\u7269\u7406\u5f15\u64ce\u751f\u6210\u53ef\u63a74D\u4e16\u754c", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa GS-Agent\uff0c\u4e00\u4e2a\u7aef\u5230\u7aef\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u53ef\u4ece\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u81ea\u52a8\u6784\u5efa\u52a8\u6001\u3001\u7269\u7406\u771f\u5b9e\u3001\u53ef\u63a7\u76844D\u7269\u7406\u4e16\u754c\u3002\u7cfb\u7edf\u6a21\u62df\u4eba\u7c7b\u5236\u4f5c\u6d41\u7a0b\uff0c\u8054\u54083D\u8d44\u4ea7\u3001\u6750\u8d28\u3001\u5e03\u5c40\u3001\u8fd0\u52a8\u3001\u76f8\u673a\u4e0e\u706f\u5149\u914d\u7f6e\uff0c\u5e76\u5c06\u7269\u7406\u5f15\u64ce\u7eb3\u5165\u8fed\u4ee3\u751f\u6210\u95ed\u73af\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u751f\u6210\u5f0f\u57fa\u7840\u6a21\u578b\u3001\u667a\u80fd\u4f53\u534f\u4f5c\u4e0e\u7269\u7406\u4eff\u771f\u95ed\u73af\u7ed3\u5408\uff0c\u7ed5\u5f00\u7eaf\u6570\u636e\u9a71\u52a84D\u751f\u6210\u4e2d\u7269\u7406\u4e00\u81f4\u6027\u548c\u53ef\u63a7\u6027\u4e0d\u8db3\u7684\u95ee\u9898\uff0c\u4e3a\u521b\u610f\u5185\u5bb9\u751f\u4ea7\u3001\u4eff\u771f\u73af\u5883\u6784\u5efa\u548c\u7269\u7406AI\u63d0\u4f9b\u4e86\u65b0\u7684\u81ea\u52a8\u5316\u8303\u5f0f\u3002"}, {"abstract": "Large language models (LLMs) and agents are now widely used tools in code development, with data typically sent to third-party cloud-based models. Their adoption in research using personal data is constrained by governance requirements that typically prohibit data transmission to external services. Locally deployable open-weight models offer an alternative since sensitive data never leave the local environment. We introduce an open-source framework for evaluating the efficacy of AI agents powered by open-weight LLMs on one of the most persistent bottlenecks in research on longitudinal population studies: data preparation. The framework comprises: a curated ground-truth dataset (cleaning scripts preparing six sweeps of data from a British cohort study), task definitions encompassing tasks such as category harmonization and multi-wave merging, and automated routines for evaluating the LLM-produced R code and outputted data. We benchmark LLMs across the (consumer grade) deployment spectrum to assess their efficacy in 20 data preparation tasks (creation of 102 variables). Current state-of-the-art, 31-35B parameter models almost saturated our benchmark (\"average task completion\" up to 87.9%). The performance of open-weight LLMs running on consumer-grade hardware shows promise of a viable path toward AI-assisted data preparation in governance-restricted research settings. Our framework is publicly available at: https://github.com/UCL-ARC/RRBench.", "arxiv_id": "2607.21482", "arxiv_url": "https://arxiv.org/abs/2607.21482", "authors": ["Mack Nixon", "Liam Wright", "Yevgeniya Kovalchuk", "Alison Fang-Wei Wu", "Martin Danka", "Andy Boyd", "David Bann"], "brief": "\u8bba\u6587\u63d0\u51fa\u5f00\u6e90\u8bc4\u6d4b\u6846\u67b6 RRBench\uff0c\u7528\u4e8e\u8bc4\u4f30\u672c\u5730\u90e8\u7f72\u7684\u5f00\u6e90\u6743\u91cd LLM \u667a\u80fd\u4f53\u5728\u7eb5\u5411\u4eba\u53e3\u7814\u7a76\u6570\u636e\u51c6\u5907\u4e2d\u7684\u7f16\u7801\u80fd\u529b\u3002\u6846\u67b6\u5305\u542b\u771f\u5b9e\u6e05\u6d17\u811a\u672c\u6570\u636e\u96c6\u300120\u4e2a\u6570\u636e\u51c6\u5907\u4efb\u52a1\u5b9a\u4e49\uff0c\u4ee5\u53ca\u5bf9\u751f\u6210 R \u4ee3\u7801\u548c\u8f93\u51fa\u6570\u636e\u7684\u81ea\u52a8\u8bc4\u6d4b\u6d41\u7a0b\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21482", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4efb\u52a1\u8986\u76d6\u7c7b\u522b harmonization\u3001\u591a\u6ce2\u6b21\u6570\u636e\u5408\u5e76\u7b49\u7eb5\u5411\u7814\u7a76\u5e38\u89c1\u74f6\u9888\uff0c\u5171\u521b\u5efa102\u4e2a\u53d8\u91cf", "\u5728\u6d88\u8d39\u7ea7\u786c\u4ef6\u53ef\u90e8\u7f72\u768431-35B\u5f00\u6e90\u6a21\u578b\u4e0a\uff0c\u5e73\u5747\u4efb\u52a1\u5b8c\u6210\u7387\u6700\u9ad8\u8fbe87.9%", "\u654f\u611f\u4e2a\u4eba\u6570\u636e\u65e0\u9700\u53d1\u9001\u5230\u7b2c\u4e09\u65b9\u4e91\u670d\u52a1\uff0c\u9002\u5408\u53d7\u6570\u636e\u6cbb\u7406\u9650\u5236\u7684\u7814\u7a76\u73af\u5883"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u5f00\u6e90\u6a21\u578b", "\u6570\u636e\u5904\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21482v1", "published_at": "2026-07-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Agentic coding without the cloud: evaluating open-weight large language models on longitudinal data preparation tasks", "tldr": "\u672c\u5730\u5f00\u6e90\u6a21\u578b\u53ef\u80dc\u4efb\u654f\u611f\u6570\u636e\u6574\u7406", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u5f00\u6e90\u8bc4\u6d4b\u6846\u67b6 RRBench\uff0c\u7528\u4e8e\u8bc4\u4f30\u672c\u5730\u90e8\u7f72\u7684\u5f00\u6e90\u6743\u91cd LLM \u667a\u80fd\u4f53\u5728\u7eb5\u5411\u4eba\u53e3\u7814\u7a76\u6570\u636e\u51c6\u5907\u4e2d\u7684\u7f16\u7801\u80fd\u529b\u3002\u6846\u67b6\u5305\u542b\u771f\u5b9e\u6e05\u6d17\u811a\u672c\u6570\u636e\u96c6\u300120\u4e2a\u6570\u636e\u51c6\u5907\u4efb\u52a1\u5b9a\u4e49\uff0c\u4ee5\u53ca\u5bf9\u751f\u6210 R \u4ee3\u7801\u548c\u8f93\u51fa\u6570\u636e\u7684\u81ea\u52a8\u8bc4\u6d4b\u6d41\u7a0b\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c06 LLM \u4ee3\u7801\u667a\u80fd\u4f53\u8bc4\u6d4b\u843d\u5230\u771f\u5b9e\u3001\u53d7\u6cbb\u7406\u7ea6\u675f\u7684\u79d1\u7814\u6570\u636e\u51c6\u5907\u573a\u666f\uff0c\u8bc1\u660e\u672c\u5730\u5f00\u6e90\u6a21\u578b\u5df2\u63a5\u8fd1\u53ef\u7528\u6c34\u5e73\uff0c\u4e3a\u9690\u79c1\u654f\u611f\u7814\u7a76\u4e2d\u7684 AI \u8f85\u52a9\u6570\u636e\u5904\u7406\u63d0\u4f9b\u4e86\u53ef\u590d\u73b0\u57fa\u51c6\u548c\u5b9e\u8df5\u8def\u5f84\u3002"}, {"abstract": "Large Language Models (LLMs) excel at natural language understanding and generation but remain unreliable for multi-step logical reasoning, especially in safety-critical or compliance-sensitive domains. Recent neuro-symbolic approaches address this gap by coupling neural models with external symbolic engines, yet most integrations are bespoke and lack a standardized interface for tool-augmented agents. This paper presents Euclid-MCP, an open-source MCP server that provides deterministic logical reasoning via SWI-Prolog. Euclid-MCP introduces Euclid-IR, an engine-agnostic intermediate representation for Horn-clause logic that is human-readable, easy for LLMs to generate, and straightforward to compile into Prolog or alternative backends. The server exposes a compact tool interface that supports a translate-run-inspect-repair loop, enabling LLM clients to delegate inference while retaining full access to proof traces and derivation logs. We evaluate Euclid-MCP on a realistic IT security and compliance use case. Results show that while LLMs alone are sufficient on small knowledge bases, they hallucinate systematically on larger problems, whereas Euclid-MCP delivers exact answers with lower latency and more compact outputs. We argue that semantic RAG is fundamentally unsuited for rule enforcement, and that Euclid-MCP can serve as a stable, shared reasoning substrate for both RAG-based assistants and agentic systems.", "arxiv_id": "2607.21412", "arxiv_url": "https://arxiv.org/abs/2607.21412", "authors": ["Bartolomeo Bogliolo"], "brief": "\u8bba\u6587\u63d0\u51fa Euclid-MCP\uff0c\u4e00\u4e2a\u57fa\u4e8e SWI-Prolog \u7684\u5f00\u6e90 MCP \u670d\u52a1\u5668\uff0c\u4e3a LLM \u63d0\u4f9b\u6807\u51c6\u5316\u3001\u53ef\u9a8c\u8bc1\u7684\u7b26\u53f7\u903b\u8f91\u63a8\u7406\u80fd\u529b\u3002\u5b83\u8bbe\u8ba1\u4e86 Euclid-IR \u4e2d\u95f4\u8868\u793a\uff0c\u4f7f\u6a21\u578b\u80fd\u751f\u6210\u3001\u6267\u884c\u5e76\u4fee\u590d Horn \u5b50\u53e5\u903b\u8f91\u89c4\u5219\u3002", "categories": ["cs.AI", "cs.CL", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21412", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u4f9b translate-run-inspect-repair \u5de5\u5177\u95ed\u73af\uff0c\u8ba9 LLM \u53ef\u59d4\u6258 Prolog \u63a8\u7406\u5e76\u67e5\u770b\u8bc1\u660e\u8f68\u8ff9\u4e0e\u6d3e\u751f\u65e5\u5fd7", "Euclid-IR \u662f\u5f15\u64ce\u65e0\u5173\u3001\u53ef\u8bfb\u6027\u5f3a\u7684 Horn-clause \u903b\u8f91\u8868\u793a\uff0c\u53ef\u7f16\u8bd1\u5230 Prolog \u6216\u5176\u4ed6\u540e\u7aef", "\u5728 IT \u5b89\u5168\u4e0e\u5408\u89c4\u573a\u666f\u4e2d\uff0c\u76f8\u6bd4\u7eaf LLM \u5728\u5927\u77e5\u8bc6\u5e93\u4e0a\u51cf\u5c11\u5e7b\u89c9\uff0c\u7ed9\u51fa\u7cbe\u786e\u7b54\u6848\u4e14\u5ef6\u8fdf\u66f4\u4f4e\u3001\u8f93\u51fa\u66f4\u7d27\u51d1"], "keywords": ["\u667a\u80fd\u4f53", "\u795e\u7ecf\u7b26\u53f7", "\u903b\u8f91\u63a8\u7406", "\u5de5\u5177\u8c03\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21412v1", "published_at": "2026-07-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Euclid-MCP: A Model Context Protocol Server for Deterministic Logical Reasoning via Prolog", "tldr": "\u7528MCP\u63a5\u5165Prolog\u5b9e\u73b0\u786e\u5b9a\u6027\u903b\u8f91\u63a8\u7406", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa Euclid-MCP\uff0c\u4e00\u4e2a\u57fa\u4e8e SWI-Prolog \u7684\u5f00\u6e90 MCP \u670d\u52a1\u5668\uff0c\u4e3a LLM \u63d0\u4f9b\u6807\u51c6\u5316\u3001\u53ef\u9a8c\u8bc1\u7684\u7b26\u53f7\u903b\u8f91\u63a8\u7406\u80fd\u529b\u3002\u5b83\u8bbe\u8ba1\u4e86 Euclid-IR \u4e2d\u95f4\u8868\u793a\uff0c\u4f7f\u6a21\u578b\u80fd\u751f\u6210\u3001\u6267\u884c\u5e76\u4fee\u590d Horn \u5b50\u53e5\u903b\u8f91\u89c4\u5219\u3002", "why_notable": "\u5b83\u628a\u7b26\u53f7\u63a8\u7406\u4ee5 MCP \u6807\u51c6\u63a5\u53e3\u63a5\u5165 LLM \u667a\u80fd\u4f53\uff0c\u4e3a\u5408\u89c4\u3001\u89c4\u5219\u6267\u884c\u7b49\u9700\u8981\u786e\u5b9a\u6027\u548c\u53ef\u5ba1\u8ba1\u6027\u7684\u573a\u666f\u63d0\u4f9b\u4e86\u5b9e\u7528\u57fa\u7840\u8bbe\u65bd\uff0c\u4e5f\u6307\u51fa\u8bed\u4e49 RAG \u4e0d\u9002\u5408\u4e25\u683c\u89c4\u5219\u63a8\u65ad\u3002"}, {"abstract": "Retrieval-Augmented Generation (RAG) systems increasingly employ multiple LLM agents. Yet, most prior work optimizes components in isolation rather than coordinating improvements across the pipeline. We introduce GRADRAG, a framework for cross-component prompt adaptation that models the RAG pipeline as a computational graph and propagates structured evaluation feedback to update upstream agents. An Evaluator critiques downstream answers and supporting evidence, producing actionable feedback that a Prompt Optimizer uses to iteratively update adaptive agents, such as retrievers, graph constructors, and answerers. The Evaluator also triggers early stopping when the output is deemed satisfactory. We evaluate GRADRAG on the SQUALITY and QMSUM benchmarks under two retrieval paradigms: flat chunk-based retrieval using IRCoT-style query refinement (Trivedi et al., 2023), and graph-based retrieval that constructs and iteratively enriches an entity-relation graph from the document. Across both settings, GRADRAG consistently outperforms one-step refinement baselines that update only the final generator, achieving a 12-15 percentage point net preference margin in LLM-judged pairwise comparisons, with most gains realized within two refinement iterations.", "arxiv_id": "2607.21324", "arxiv_url": "https://arxiv.org/abs/2607.21324", "authors": ["Paolo Pedinotti", "Enrico Santus"], "brief": "\u672c\u6587\u63d0\u51fa GRADRAG\uff0c\u5c06\u591a\u7ec4\u4ef6 RAG \u6d41\u6c34\u7ebf\u5efa\u6a21\u4e3a\u8ba1\u7b97\u56fe\uff0c\u901a\u8fc7\u4e0b\u6e38\u7b54\u6848\u4e0e\u8bc1\u636e\u7684\u7ed3\u6784\u5316\u8bc4\u4f30\u53cd\u9988\uff0c\u53cd\u5411\u66f4\u65b0\u68c0\u7d22\u5668\u3001\u56fe\u6784\u5efa\u5668\u548c\u56de\u7b54\u5668\u7b49\u4e0a\u6e38\u667a\u80fd\u4f53\u7684\u63d0\u793a\u8bcd\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21324", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["Evaluator \u540c\u65f6\u8bc4\u5224\u7b54\u6848\u8d28\u91cf\u4e0e\u652f\u6491\u8bc1\u636e\uff0c\u5e76\u751f\u6210\u53ef\u6267\u884c\u53cd\u9988\u4f9b Prompt Optimizer \u8fed\u4ee3\u6539\u5199\u5404\u7ec4\u4ef6\u63d0\u793a\u8bcd\u3002", "\u652f\u6301\u4e24\u7c7b\u68c0\u7d22\u8303\u5f0f\uff1a\u57fa\u4e8e\u6587\u672c\u5757\u7684 IRCoT \u5f0f\u67e5\u8be2\u7cbe\u70bc\uff0c\u4ee5\u53ca\u57fa\u4e8e\u5b9e\u4f53\u5173\u7cfb\u56fe\u7684\u56fe\u68c0\u7d22\u4e0e\u8fed\u4ee3\u6269\u5c55\u3002", "\u5728 SQUALITY \u548c QMSUM \u4e0a\uff0c\u76f8\u6bd4\u53ea\u4f18\u5316\u6700\u7ec8\u751f\u6210\u5668\u7684\u4e00\u6b65\u7cbe\u70bc\u57fa\u7ebf\uff0cLLM \u6210\u5bf9\u8bc4\u6d4b\u51c0\u504f\u597d\u63d0\u5347 12-15 \u4e2a\u767e\u5206\u70b9\uff0c\u4e14\u591a\u6570\u6536\u76ca\u5728\u4e24\u8f6e\u5185\u5b9e\u73b0\u3002"], "keywords": ["\u667a\u80fd\u4f53", "RAG", "\u63d0\u793a\u8bcd\u4f18\u5316", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21324v1", "published_at": "2026-07-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "GRADRAG: Cross-Component Prompt Adaptation for Coordinated Multi-Agent RAG", "tldr": "\u7528\u53cd\u9988\u8054\u52a8\u4f18\u5316\u591a\u667a\u80fd\u4f53RAG\u63d0\u793a\u8bcd\u3002", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa GRADRAG\uff0c\u5c06\u591a\u7ec4\u4ef6 RAG \u6d41\u6c34\u7ebf\u5efa\u6a21\u4e3a\u8ba1\u7b97\u56fe\uff0c\u901a\u8fc7\u4e0b\u6e38\u7b54\u6848\u4e0e\u8bc1\u636e\u7684\u7ed3\u6784\u5316\u8bc4\u4f30\u53cd\u9988\uff0c\u53cd\u5411\u66f4\u65b0\u68c0\u7d22\u5668\u3001\u56fe\u6784\u5efa\u5668\u548c\u56de\u7b54\u5668\u7b49\u4e0a\u6e38\u667a\u80fd\u4f53\u7684\u63d0\u793a\u8bcd\u3002", "why_notable": "\u5b83\u628a RAG \u4f18\u5316\u4ece\u5355\u70b9\u63d0\u793a\u8bcd\u8c03\u53c2\u63a8\u8fdb\u5230\u8de8\u7ec4\u4ef6\u534f\u540c\u81ea\u9002\u5e94\uff0c\u4e3a\u591a\u667a\u80fd\u4f53 RAG \u7684\u7aef\u5230\u7aef\u53cd\u9988\u4f18\u5316\u63d0\u4f9b\u4e86\u5b9e\u7528\u6846\u67b6\uff0c\u5c24\u5176\u9002\u5408\u957f\u6587\u6863\u95ee\u7b54\u4e0e\u6458\u8981\u573a\u666f\u3002"}, {"abstract": "Long-form legal research reports increasingly rely on LLMs and agentic research systems, but their reliability depends not only on answering the task, but also on whether cited legal authorities are trustworthy. A citation can be risky even when it points to a real source: the report may omit limiting conditions, misdescribe the authority, or use it to support a stronger claim than the source allows. We introduce LegalCiteTrust, a benchmark for evaluating citation trustworthiness in Chinese long-form legal research reports. It contains 72 densely annotated report-level tasks and evaluates reports along three dimensions: Coverage, Support, and Citation Trustworthiness. Citation Trustworthiness is operationalized through citation-level Existence, Fidelity, and Applicability (E/F/A). Experiments on general-purpose LLMs, deep-research systems, and legal-specific systems show that task completion, evidence richness, citation density, and citation reliability expose different system behaviors. Retrieval tools can improve evidence support without reliably improving the Trust score, while E/F/A-based revision improves Trust and Final score more clearly than existence-only filtering. These results suggest that trustworthy legal research generation requires citation-aware evidence governance after retrieval: systems must not only retrieve legal authorities, but also select, describe, and apply them reliably.", "arxiv_id": "2607.20872", "arxiv_url": "https://arxiv.org/abs/2607.20872", "authors": ["Yunhan Li", "Mingjie Xie", "Zeyang Shi", "Gengshen Wu", "Min Yang"], "brief": "\u672c\u6587\u63d0\u51fa LegalCiteTrust\uff0c\u4e00\u4e2a\u9762\u5411\u4e2d\u6587\u957f\u7bc7\u6cd5\u5f8b\u7814\u7a76\u62a5\u544a\u7684\u5f15\u7528\u53ef\u4fe1\u5ea6\u57fa\u51c6\u3002\u5b83\u4e0d\u4ec5\u8bc4\u4f30\u62a5\u544a\u662f\u5426\u5b8c\u6210\u4efb\u52a1\uff0c\u8fd8\u4ece\u8986\u76d6\u5ea6\u3001\u8bc1\u636e\u652f\u6301\u548c\u5f15\u7528\u53ef\u4fe1\u5ea6\u4e09\u65b9\u9762\u8861\u91cf\u6cd5\u5f8b\u4f9d\u636e\u662f\u5426\u88ab\u53ef\u9760\u4f7f\u7528\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20872", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5305\u542b72\u4e2a\u9ad8\u5bc6\u5ea6\u6807\u6ce8\u7684\u62a5\u544a\u7ea7\u4efb\u52a1\uff0c\u9762\u5411\u4e2d\u6587\u6cd5\u5f8b\u7814\u7a76\u573a\u666f\u3002", "\u5c06\u5f15\u7528\u53ef\u4fe1\u5ea6\u62c6\u89e3\u4e3a\u5b58\u5728\u6027\u3001\u5fe0\u5b9e\u6027\u548c\u9002\u7528\u6027\uff08E/F/A\uff09\uff0c\u8bc6\u522b\u771f\u5b9e\u4f46\u88ab\u8bef\u8ff0\u3001\u8fc7\u5ea6\u652f\u6301\u6216\u9057\u6f0f\u9650\u5236\u6761\u4ef6\u7684\u5f15\u7528\u98ce\u9669\u3002", "\u5b9e\u9a8c\u663e\u793a\u68c0\u7d22\u5de5\u5177\u53ef\u63d0\u5347\u8bc1\u636e\u652f\u6301\uff0c\u4f46\u4e0d\u4e00\u5b9a\u63d0\u5347\u5f15\u7528\u53ef\u4fe1\u5ea6\uff1b\u57fa\u4e8eE/F/A\u7684\u4fee\u8ba2\u6bd4\u4ec5\u8fc7\u6ee4\u4e0d\u5b58\u5728\u5f15\u7528\u66f4\u6709\u6548\u3002"], "keywords": ["\u6cd5\u5f8b\u667a\u80fd", "\u53ef\u4fe1\u8bc4\u6d4b", "\u957f\u6587\u672c\u751f\u6210", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20872v1", "published_at": "2026-07-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "LegalCiteTrust: Benchmarking Citation Trustworthiness in Chinese Long-Form Legal Research Reports", "tldr": "\u8bc4\u6d4b\u4e2d\u6587\u6cd5\u5f8b\u62a5\u544a\u5f15\u7528\u53ef\u4fe1\u5ea6", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa LegalCiteTrust\uff0c\u4e00\u4e2a\u9762\u5411\u4e2d\u6587\u957f\u7bc7\u6cd5\u5f8b\u7814\u7a76\u62a5\u544a\u7684\u5f15\u7528\u53ef\u4fe1\u5ea6\u57fa\u51c6\u3002\u5b83\u4e0d\u4ec5\u8bc4\u4f30\u62a5\u544a\u662f\u5426\u5b8c\u6210\u4efb\u52a1\uff0c\u8fd8\u4ece\u8986\u76d6\u5ea6\u3001\u8bc1\u636e\u652f\u6301\u548c\u5f15\u7528\u53ef\u4fe1\u5ea6\u4e09\u65b9\u9762\u8861\u91cf\u6cd5\u5f8b\u4f9d\u636e\u662f\u5426\u88ab\u53ef\u9760\u4f7f\u7528\u3002", "why_notable": "\u8be5\u57fa\u51c6\u628a\u6cd5\u5f8bLLM\u8bc4\u6d4b\u4ece\u201c\u80fd\u5426\u56de\u7b54\u201d\u63a8\u8fdb\u5230\u201c\u5f15\u7528\u662f\u5426\u53ef\u4fe1\u201d\uff0c\u5bf9\u6cd5\u5f8b\u7814\u7a76\u667a\u80fd\u4f53\u3001\u6df1\u5ea6\u7814\u7a76\u7cfb\u7edf\u548c\u9ad8\u98ce\u9669\u9886\u57df\u751f\u6210\u5f0fAI\u7684\u53ef\u9760\u6027\u8bc4\u4f30\u5177\u6709\u5b9e\u9645\u4ef7\u503c\u3002"}, {"abstract": "Spatial intelligence is essential for agents to move from static semantic understanding toward interacting with the physical world. Many spatial tasks are grounded in continuous visual scenes, where locations, regions, and paths are more naturally expressed by pointing, marking, or drawing than by reporting precise coordinates or discrete textual symbols. Yet existing spatial reasoning benchmarks usually require coordinates, options, or text, creating an answer-interface mismatch for image-generation models. This makes it difficult to evaluate image-generation models under the same task semantics as text-output VLMs, despite their ability to externalize spatial judgments directly in pixel space. We propose ProVisE (Protocolized Visual Evaluation), a benchmark-agnostic framework that elicits protocol-constrained visual answers from image-generation models and parses them into structured predictions compatible with original metrics. ProVisE also includes an Agentic builder that constructs and validates task-specific protocols for new benchmarks. We further introduce SpatialGen-Bench, a curated diagnostic benchmark of 470 samples across 14 spatial subtasks, four capability levels, and diverse answer forms. We evaluate representative text-output VLMs and image-generation models in a unified setting and validate Agentic protocol construction on six external spatial benchmarks. Results show that image-generation models are competitive when spatial answers can be externalized directly in pixel space, while text-output VLMs retain a clear advantage in compositional spatial reasoning. These findings reveal complementary strengths of pixel-space expression and text-based reasoning and establish a metric-compatible testbed for studying spatial cognition in image-generation models.", "arxiv_id": "2607.21072", "arxiv_url": "https://arxiv.org/abs/2607.21072", "authors": ["Xu Wang", "Kaixiang Yao", "Miao Pan", "Xiaohe Zhou", "Xuanyu Liu", "Wenqi Zhang", "Xuhong Zhang"], "brief": "\u8bba\u6587\u63d0\u51fa ProVisE\uff0c\u4e00\u4e2a\u8ba9\u56fe\u50cf\u751f\u6210\u6a21\u578b\u4ee5\u53d7\u7ea6\u675f\u7684\u53ef\u89c6\u5316\u6807\u6ce8\u4f5c\u7b54\u3001\u518d\u89e3\u6790\u4e3a\u7ed3\u6784\u5316\u9884\u6d4b\u7684\u8bc4\u6d4b\u6846\u67b6\u3002\u4f5c\u8005\u8fd8\u6784\u5efa SpatialGen-Bench\uff0c\u8986\u76d6\u591a\u7c7b\u7a7a\u95f4\u5b50\u4efb\u52a1\uff0c\u7528\u4e8e\u7edf\u4e00\u6bd4\u8f83\u6587\u672c\u8f93\u51fa VLM \u4e0e\u56fe\u50cf\u751f\u6210\u6a21\u578b\u7684\u7a7a\u95f4\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21072", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["ProVisE \u89e3\u51b3\u7a7a\u95f4\u4efb\u52a1\u4e2d\u201c\u7b54\u6848\u63a5\u53e3\u4e0d\u5339\u914d\u201d\u95ee\u9898\uff1a\u5141\u8bb8\u6a21\u578b\u901a\u8fc7\u6307\u70b9\u3001\u6807\u8bb0\u3001\u7ed8\u5236\u7b49\u50cf\u7d20\u5f62\u5f0f\u8868\u8fbe\u7a7a\u95f4\u5224\u65ad\uff0c\u5e76\u517c\u5bb9\u539f\u6709\u6307\u6807\u3002", "SpatialGen-Bench \u5305\u542b 470 \u4e2a\u6837\u672c\u300114 \u4e2a\u7a7a\u95f4\u5b50\u4efb\u52a1\u30014 \u4e2a\u80fd\u529b\u5c42\u7ea7\u548c\u591a\u79cd\u7b54\u6848\u5f62\u5f0f\uff0c\u5f3a\u8c03\u8fde\u7eed\u89c6\u89c9\u573a\u666f\u4e2d\u7684\u7a7a\u95f4\u8ba4\u77e5\u3002", "\u5b9e\u9a8c\u663e\u793a\u56fe\u50cf\u751f\u6210\u6a21\u578b\u5728\u53ef\u76f4\u63a5\u7528\u50cf\u7d20\u8868\u8fbe\u7684\u7a7a\u95f4\u4efb\u52a1\u4e0a\u5177\u5907\u7ade\u4e89\u529b\uff0c\u4f46\u6587\u672c\u8f93\u51fa VLM \u5728\u7ec4\u5408\u5f0f\u7a7a\u95f4\u63a8\u7406\u4e0a\u4ecd\u66f4\u5f3a\u3002"], "keywords": ["\u7a7a\u95f4\u63a8\u7406", "\u591a\u6a21\u6001", "\u56fe\u50cf\u751f\u6210", "\u8bc4\u6d4b\u57fa\u51c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21072v1", "published_at": "2026-07-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Show, Don\u0027t Tell: Evaluating Spatial Cognition in Generative Pixels Rather Than LLM Text", "tldr": "\u7528\u50cf\u7d20\u4f5c\u7b54\u8bc4\u6d4b\u751f\u6210\u6a21\u578b\u7a7a\u95f4\u8ba4\u77e5", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa ProVisE\uff0c\u4e00\u4e2a\u8ba9\u56fe\u50cf\u751f\u6210\u6a21\u578b\u4ee5\u53d7\u7ea6\u675f\u7684\u53ef\u89c6\u5316\u6807\u6ce8\u4f5c\u7b54\u3001\u518d\u89e3\u6790\u4e3a\u7ed3\u6784\u5316\u9884\u6d4b\u7684\u8bc4\u6d4b\u6846\u67b6\u3002\u4f5c\u8005\u8fd8\u6784\u5efa SpatialGen-Bench\uff0c\u8986\u76d6\u591a\u7c7b\u7a7a\u95f4\u5b50\u4efb\u52a1\uff0c\u7528\u4e8e\u7edf\u4e00\u6bd4\u8f83\u6587\u672c\u8f93\u51fa VLM \u4e0e\u56fe\u50cf\u751f\u6210\u6a21\u578b\u7684\u7a7a\u95f4\u80fd\u529b\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u4e3a\u56fe\u50cf\u751f\u6210\u6a21\u578b\u7684\u7a7a\u95f4\u8ba4\u77e5\u8bc4\u6d4b\u63d0\u4f9b\u4e86\u66f4\u81ea\u7136\u3001\u66f4\u516c\u5e73\u7684\u63a5\u53e3\uff0c\u63ed\u793a\u4e86\u50cf\u7d20\u8868\u8fbe\u4e0e\u6587\u672c\u63a8\u7406\u7684\u4e92\u8865\u4f18\u52bf\uff0c\u5bf9\u5177\u8eab\u667a\u80fd\u548c\u89c6\u89c9\u7a7a\u95f4\u8bc4\u6d4b\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Finetuning a pretrained vision-language model (VLM) on robot demonstrations via behavior cloning (BC) has become the standard recipe for vision-language-action (VLA) policies. However, BC finetuning progressively overwrites the pretrained representations that support visual and semantic generalization. Co-training on web image-text data, a common remedy, does not prevent this; it applies language and action losses to separate observations, leaving VLAs with language-action misalignment that standard manipulation benchmarks do not expose. We propose Anchor-Align, which augments BC with two objectives: Vision-Language Anchoring distills layer-wise representations from a frozen VLM copy to prevent this drift, while Language-Action Alignment converts each action target into a discrete motion-direction label and jointly trains language and action prediction on the same robot observation. On a physical xArm7 robot, across two widely used VLA architectures, Anchor-Align improves real-robot success on both (28% to 54% and 37% to 60%). At scale in simulation, we demonstrate consistent improvements on OOD perturbations, perceptual robustness, and long-horizon control across LIBERO-PRO, LIBERO-Plus, and CALVIN, respectively, suggesting that preserving pretrained representations and effective action learning are not fundamentally at odds. Project page: anchoralignvla.github.io", "arxiv_id": "2607.13429", "arxiv_url": "https://arxiv.org/abs/2607.13429", "authors": ["Dwip Dalal", "Shivansh Patel", "Chahit Jain", "Jeonghwan Kim", "Utkarsh Mishra", "Alex Baratian", "Hyeonjeong Ha", "Heng Ji", "Svetlana Lazebnik", "Unnat Jain"], "brief": "\u8bba\u6587\u63d0\u51fa Anchor-Align\uff0c\u7528\u4e8e\u6539\u8fdb\u9884\u8bad\u7ec3\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u673a\u5668\u4eba\u793a\u6559\u4e0a\u7684\u884c\u4e3a\u514b\u9686\u5fae\u8c03\u3002\u5b83\u901a\u8fc7\u4fdd\u6301\u9884\u8bad\u7ec3\u89c6\u89c9\u8bed\u8a00\u8868\u5f81\u5e76\u5728\u540c\u4e00\u673a\u5668\u4eba\u89c2\u6d4b\u4e0a\u8054\u5408\u5b66\u4e60\u8bed\u8a00\u4e0e\u52a8\u4f5c\uff0c\u7f13\u89e3\u5fae\u8c03\u5bfc\u81f4\u7684\u6cdb\u5316\u80fd\u529b\u9000\u5316\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": "https://github.com/dwipddalal/Anchor-Align", "github_stars": 14, "hf_url": "https://huggingface.co/papers/2607.13429", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["Vision-Language Anchoring \u4ece\u51bb\u7ed3\u7684 VLM \u526f\u672c\u9010\u5c42\u84b8\u998f\u8868\u5f81\uff0c\u9632\u6b62\u5fae\u8c03\u8986\u76d6\u539f\u6709\u89c6\u89c9\u4e0e\u8bed\u4e49\u6cdb\u5316\u80fd\u529b", "Language-Action Alignment \u5c06\u52a8\u4f5c\u76ee\u6807\u79bb\u6563\u5316\u4e3a\u8fd0\u52a8\u65b9\u5411\u6807\u7b7e\uff0c\u4f7f\u8bed\u8a00\u9884\u6d4b\u4e0e\u52a8\u4f5c\u9884\u6d4b\u5171\u4eab\u540c\u4e00\u673a\u5668\u4eba\u89c2\u6d4b", "\u5728\u771f\u5b9e xArm7 \u673a\u5668\u4eba\u4e0a\uff0c\u4e24\u7c7b VLA \u67b6\u6784\u6210\u529f\u7387\u5206\u522b\u4ece 28% \u63d0\u5347\u5230 54%\u300137% \u63d0\u5347\u5230 60%\uff0c\u5e76\u5728 LIBERO \u4e0e CALVIN \u4eff\u771f\u4e2d\u63d0\u5347 OOD\u3001\u611f\u77e5\u9c81\u68d2\u6027\u548c\u957f\u7a0b\u63a7\u5236"], "keywords": ["\u673a\u5668\u4eba\u5b66\u4e60", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u6a21\u4eff\u5b66\u4e60", "\u8868\u5f81\u5b66\u4e60"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13429v1", "published_at": "2026-07-15", "score": 0.29, "selected_reasons": ["HF trending (10\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.13429.png", "title": "Generalizable VLA Finetuning via Representation Anchoring and Language-Action Alignment", "tldr": "\u7528\u8868\u5f81\u951a\u5b9a\u4e0e\u8bed\u52a8\u5bf9\u9f50\u63d0\u5347VLA\u6cdb\u5316", "upvotes": 10, "what_it_is": "\u8bba\u6587\u63d0\u51fa Anchor-Align\uff0c\u7528\u4e8e\u6539\u8fdb\u9884\u8bad\u7ec3\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u673a\u5668\u4eba\u793a\u6559\u4e0a\u7684\u884c\u4e3a\u514b\u9686\u5fae\u8c03\u3002\u5b83\u901a\u8fc7\u4fdd\u6301\u9884\u8bad\u7ec3\u89c6\u89c9\u8bed\u8a00\u8868\u5f81\u5e76\u5728\u540c\u4e00\u673a\u5668\u4eba\u89c2\u6d4b\u4e0a\u8054\u5408\u5b66\u4e60\u8bed\u8a00\u4e0e\u52a8\u4f5c\uff0c\u7f13\u89e3\u5fae\u8c03\u5bfc\u81f4\u7684\u6cdb\u5316\u80fd\u529b\u9000\u5316\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u6307\u51fa\u5e38\u89c1\u7684\u7f51\u9875\u56fe\u6587\u5171\u8bad\u7ec3\u5e76\u4e0d\u80fd\u89e3\u51b3\u8bed\u8a00-\u52a8\u4f5c\u9519\u4f4d\u95ee\u9898\uff0c\u5e76\u7ed9\u51fa\u7b80\u5355\u53ef\u6269\u5c55\u7684\u5fae\u8c03\u76ee\u6807\uff0c\u5728\u771f\u5b9e\u673a\u5668\u4eba\u548c\u591a\u5957\u4eff\u771f\u57fa\u51c6\u4e0a\u5747\u663e\u8457\u63d0\u5347 VLA \u6cdb\u5316\u4e0e\u9c81\u68d2\u6027\u3002"}, {"abstract": "Injecting factual knowledge into large language models (LLMs) reliably and at scale remains an open challenge. Hypernetworks provide a promising solution to large-scale knowledge injection. Although hypernetworks are typically applied for test-time adaptation, we explore their use in train-time knowledge injection, where, given a large corpus of facts, we train a hypernetwork to generate a fixed LoRA adapter that, when inserted into the target model, enable the model to answer questions about those facts. In this work, we investigate whether hypernetworks can be used to perform train-time knowledge injection and how this ability varies with scale. The scaling behavior of hypernetworks remains largely unstudied. Our design decouples the hypernetwork\u0027s injection capacity from the target model\u0027s general capability, enabling, for the first time, a rigorous study of scaling laws for hypernetwork architectures. We characterize how loss, reasoning accuracy, and out-of-distribution (OOD) generalization vary with hypernetwork depth, width, and target network size. We construct a large-scale dataset, called MegaWikiQA, containing tens of millions of multi-hop question-answer examples across 39 domains constructed from examples in Wikidata5M. Our results reveal: (i) hypernetwork-based injection exhibits broadly predictive power law scaling along all architecture axes; and (ii) hypernetworks are capable of reliable OOD generalization at increasing scales, suggesting that hypernetwork provides a promising alternative to other train-time adaptation methods such as LoRA finetuning and full fine-tuning, exhibiting steeper scaling exponents in all OOD evaluations. Together, these results establish hypernetworks as a principled and scalable substrate for train-time adaptation, and provide the first empirically grounded scaling laws to guide hypernetworks for factual reasoning in large language models.", "arxiv_id": "2607.19604", "arxiv_url": "https://arxiv.org/abs/2607.19604", "authors": ["Nischay Dhankhar", "Dos Baha", "Abulhair Saparov"], "brief": "\u672c\u6587\u7814\u7a76\u7528\u8d85\u7f51\u7edc\u5728\u8bad\u7ec3\u9636\u6bb5\u4e3a\u5927\u8bed\u8a00\u6a21\u578b\u751f\u6210\u56fa\u5b9a LoRA \u9002\u914d\u5668\uff0c\u4ee5\u6279\u91cf\u6ce8\u5165\u4e8b\u5b9e\u77e5\u8bc6\u3002\u4f5c\u8005\u6784\u5efa MegaWikiQA \u5927\u89c4\u6a21\u591a\u8df3\u95ee\u7b54\u6570\u636e\u96c6\uff0c\u5e76\u7cfb\u7edf\u523b\u753b\u8d85\u7f51\u7edc\u6df1\u5ea6\u3001\u5bbd\u5ea6\u4e0e\u76ee\u6807\u6a21\u578b\u89c4\u6a21\u5bf9\u635f\u5931\u3001\u63a8\u7406\u51c6\u786e\u7387\u548c OOD \u6cdb\u5316\u7684\u5f71\u54cd\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": "https://github.com/hdnndh/Latent-Geometry-Beyond-Search-Amortizing-Planning-in-World-Models", "github_stars": 13, "hf_url": "https://huggingface.co/papers/2607.19604", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51fa\u5c06\u8d85\u7f51\u7edc\u7528\u4e8e\u8bad\u7ec3\u65f6\u77e5\u8bc6\u6ce8\u5165\uff0c\u89e3\u8026\u6ce8\u5165\u80fd\u529b\u4e0e\u76ee\u6807\u6a21\u578b\u901a\u7528\u80fd\u529b\uff0c\u4fbf\u4e8e\u7814\u7a76\u8d85\u7f51\u7edc\u7f29\u653e\u89c4\u5f8b", "\u6784\u5efa MegaWikiQA\uff0c\u5305\u542b\u6765\u81ea Wikidata5M \u7684\u6570\u5343\u4e07\u591a\u8df3\u95ee\u7b54\u6837\u672c\uff0c\u8986\u76d6 39 \u4e2a\u9886\u57df", "\u5b9e\u9a8c\u53d1\u73b0\u8d85\u7f51\u7edc\u5728\u591a\u4e2a\u67b6\u6784\u7ef4\u5ea6\u4e0a\u7b26\u5408\u5e42\u5f8b\u7f29\u653e\uff0c\u5e76\u5728 OOD \u6cdb\u5316\u4e0a\u4f18\u4e8e LoRA \u5fae\u8c03\u548c\u5168\u91cf\u5fae\u8c03\u7684\u7f29\u653e\u8d8b\u52bf"], "keywords": ["\u77e5\u8bc6\u6ce8\u5165", "\u8d85\u7f51\u7edc", "\u7f29\u653e\u5f8b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19604v1", "published_at": "2026-07-21", "score": 0.288, "selected_reasons": ["HF trending (11\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.19604.png", "title": "Scaling Laws for Hypernetwork-Based Knowledge Injection in Large Language Models", "tldr": "\u8d85\u7f51\u7edc\u77e5\u8bc6\u6ce8\u5165\u5448\u73b0\u53ef\u9884\u6d4b\u7f29\u653e\u5f8b", "upvotes": 11, "what_it_is": "\u672c\u6587\u7814\u7a76\u7528\u8d85\u7f51\u7edc\u5728\u8bad\u7ec3\u9636\u6bb5\u4e3a\u5927\u8bed\u8a00\u6a21\u578b\u751f\u6210\u56fa\u5b9a LoRA \u9002\u914d\u5668\uff0c\u4ee5\u6279\u91cf\u6ce8\u5165\u4e8b\u5b9e\u77e5\u8bc6\u3002\u4f5c\u8005\u6784\u5efa MegaWikiQA \u5927\u89c4\u6a21\u591a\u8df3\u95ee\u7b54\u6570\u636e\u96c6\uff0c\u5e76\u7cfb\u7edf\u523b\u753b\u8d85\u7f51\u7edc\u6df1\u5ea6\u3001\u5bbd\u5ea6\u4e0e\u76ee\u6807\u6a21\u578b\u89c4\u6a21\u5bf9\u635f\u5931\u3001\u63a8\u7406\u51c6\u786e\u7387\u548c OOD \u6cdb\u5316\u7684\u5f71\u54cd\u3002", "why_notable": "\u8fd9\u662f\u5bf9\u8d85\u7f51\u7edc\u77e5\u8bc6\u6ce8\u5165\u7f29\u653e\u5f8b\u7684\u7cfb\u7edf\u5b9e\u8bc1\u7814\u7a76\uff0c\u4e3a\u5927\u89c4\u6a21\u4e8b\u5b9e\u77e5\u8bc6\u66f4\u65b0\u63d0\u4f9b\u4e86\u6bd4\u4f20\u7edf\u5fae\u8c03\u66f4\u53ef\u6269\u5c55\u3001\u6cdb\u5316\u66f4\u5f3a\u7684\u6f5c\u5728\u8def\u5f84\u3002"}, {"abstract": "Reinforcement learning (RL) has become a dominant paradigm for enhancing LLMs\u0027 reasoning capabilities. However, RL algorithms with PPO-Clip are inherently limited by exploration collapse. Subsequent works remain primarily heuristic and fail to identify the essential cause of PPO-Clip\u0027s failure. This work reveals the fundamental flaw of PPO-Clip: it implicitly measures policy discrepancy using Euclidean metric, which is theoretically inconsistent with the intrinsic geometry on the policy Riemannian manifold. This geometric mismatch results in overly conservative updates in low-probability regions while aggressive in high-probability regions, ultimately collapsing exploration. To correct this geometric flaw, we propose Riemannian Isometric Policy Optimization (RIPO), which guarantees isometric policy updates on the Riemannian manifold, effectively balancing exploration and exploitation. We further show that RIPO achieves a favorable bias-variance trade-off, which stabilizes optimization. Extensive experiments demonstrate that RIPO significantly surpasses existing LLM RL algorithms across seven competition-level benchmarks (up to 60% improvement over GRPO on AIME24).", "arxiv_id": "2607.10169", "arxiv_url": "https://arxiv.org/abs/2607.10169", "authors": ["Zhicheng Cai", "Xinyuan Guo", "Hanlin Wu", "Mingxuan Wang", "Wei-Ying Ma", "Ya-Qin Zhang", "Hao Zhou"], "brief": "\u8bba\u6587\u6307\u51fa PPO-Clip \u5728 LLM \u5f3a\u5316\u5b66\u4e60\u4e2d\u4f7f\u7528\u6b27\u6c0f\u5ea6\u91cf\u8861\u91cf\u7b56\u7565\u5dee\u5f02\uff0c\u4e0e\u7b56\u7565\u9ece\u66fc\u6d41\u5f62\u7684\u5185\u5728\u51e0\u4f55\u4e0d\u4e00\u81f4\uff0c\u5bfc\u81f4\u63a2\u7d22\u574d\u584c\u3002\u4f5c\u8005\u63d0\u51fa Riemannian Isometric Policy Optimization\uff08RIPO\uff09\uff0c\u901a\u8fc7\u9ece\u66fc\u7b49\u8ddd\u7b56\u7565\u66f4\u65b0\u5e73\u8861\u63a2\u7d22\u4e0e\u5229\u7528\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": "https://github.com/Aiolus-X/RIPO", "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10169", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4ece\u51e0\u4f55\u89d2\u5ea6\u89e3\u91ca PPO-Clip \u5931\u6548\u6839\u56e0\uff1a\u4f4e\u6982\u7387\u533a\u57df\u66f4\u65b0\u8fc7\u5ea6\u4fdd\u5b88\uff0c\u9ad8\u6982\u7387\u533a\u57df\u66f4\u65b0\u8fc7\u4e8e\u6fc0\u8fdb", "RIPO \u4fdd\u8bc1\u7b56\u7565\u5728\u9ece\u66fc\u6d41\u5f62\u4e0a\u7684\u7b49\u8ddd\u66f4\u65b0\uff0c\u5e76\u6539\u5584\u504f\u5dee-\u65b9\u5dee\u6743\u8861\u4ee5\u7a33\u5b9a\u4f18\u5316", "\u5728 7 \u4e2a\u7ade\u8d5b\u7ea7\u63a8\u7406\u57fa\u51c6\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709 LLM RL \u65b9\u6cd5\uff0cAIME24 \u4e0a\u8f83 GRPO \u6700\u9ad8\u63d0\u5347 60%"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7b56\u7565\u4f18\u5316", "\u63a8\u7406"], "num_comments": 1, "on_hf": true, "organization": "GenSI: Generative Symbolic Intelligence", "pdf_url": "https://arxiv.org/pdf/2607.10169v1", "published_at": "2026-07-11", "score": 0.264, "selected_reasons": ["HF trending (9\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.10169.png", "title": "Beyond Euclidean Clipping: Overcoming Exploration Collapse in LLM RL via Riemannian Isometric Policy Optimization", "tldr": "\u7528\u9ece\u66fc\u51e0\u4f55\u4fee\u6b63PPO\u63a2\u7d22\u574d\u584c", "upvotes": 9, "what_it_is": "\u8bba\u6587\u6307\u51fa PPO-Clip \u5728 LLM \u5f3a\u5316\u5b66\u4e60\u4e2d\u4f7f\u7528\u6b27\u6c0f\u5ea6\u91cf\u8861\u91cf\u7b56\u7565\u5dee\u5f02\uff0c\u4e0e\u7b56\u7565\u9ece\u66fc\u6d41\u5f62\u7684\u5185\u5728\u51e0\u4f55\u4e0d\u4e00\u81f4\uff0c\u5bfc\u81f4\u63a2\u7d22\u574d\u584c\u3002\u4f5c\u8005\u63d0\u51fa Riemannian Isometric Policy Optimization\uff08RIPO\uff09\uff0c\u901a\u8fc7\u9ece\u66fc\u7b49\u8ddd\u7b56\u7565\u66f4\u65b0\u5e73\u8861\u63a2\u7d22\u4e0e\u5229\u7528\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u4e0d\u4ec5\u63d0\u51fa\u65b0\u7684 LLM \u5f3a\u5316\u5b66\u4e60\u7b97\u6cd5\uff0c\u8fd8\u7ed9\u51fa PPO-Clip \u63a2\u7d22\u574d\u584c\u7684\u7406\u8bba\u89e3\u91ca\uff0c\u53ef\u80fd\u5f71\u54cd\u540e\u7eed\u5927\u6a21\u578b\u63a8\u7406\u80fd\u529b\u8bad\u7ec3\u8303\u5f0f\u3002"}, {"abstract": "3D Gaussian Splatting (3DGS) achieves high-quality novel-view synthesis by optimizing freely placed primitives in 3D and adaptively densifying them in under-reconstructed regions. However, this scene-adaptive capacity allocation is largely lost in existing feed-forward 3DGS methods, which commonly regress Gaussians at input pixels and lift them along camera rays. Such pixel-aligned formulations make the number and placement of primitives depend on image resolution and input viewpoints rather than scene complexity, resulting in dense and often redundant Gaussian sets. We present ATSplat, a feed-forward 3DGS framework that restores the adaptive allocation capability of 3DGS optimization through Adaptive 3D Tokens. ATSplat first lifts coarse patch-level depth and camera cues into sparse 3D anchor tokens, forming a compact scaffold of the scene. Each token is then regressed into local Gaussians with learnable 3D offsets, decoupling primitive placement from input image grids. An Adaptive Token Expansion module predicts a token-level uncertainty score, supervised by rendering error maps, and selectively expands high-uncertainty tokens through learnable expansion layers. This sparse-to-adaptive formulation enables ATSplat to concentrate primitives in challenging regions while maintaining a compact representation. Experiments on two representative datasets, RealEstate10K and DL3DV, show that ATSplat achieves state-of-the-art rendering quality while reducing the number of Gaussians by more than $5.7\\times$ compared with dense feed-forward 3DGS methods. From 12 input images at $512 \\times 960$ resolution, ATSplat completes reconstruction in less than a second using a single commercial GPU, and renders high-quality novel views at 1136 FPS ($512 \\times 960$) with only 311K Gaussians.", "arxiv_id": "2607.20417", "arxiv_url": "https://arxiv.org/abs/2607.20417", "authors": ["Cho In", "Jeonghwan Cho", "Mijin Yoo", "Gim Hee Lee", "Seon Joo Kim"], "brief": "\u8bba\u6587\u63d0\u51fa ATSplat\uff0c\u4e00\u79cd\u524d\u9988\u5f0f 3D Gaussian Splatting \u6846\u67b6\uff0c\u7528\u81ea\u9002\u5e94 3D token \u66ff\u4ee3\u5bc6\u96c6\u50cf\u7d20\u5bf9\u9f50\u9ad8\u65af\u56de\u5f52\u3002\u5b83\u5148\u6784\u5efa\u7a00\u758f\u573a\u666f\u951a\u70b9\uff0c\u518d\u6309\u4e0d\u786e\u5b9a\u6027\u9009\u62e9\u6027\u6269\u5c55 token\uff0c\u4ece\u800c\u5728\u590d\u6742\u533a\u57df\u5206\u914d\u66f4\u591a\u9ad8\u65af\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20417", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51fa Adaptive 3D Tokens\uff1a\u4ece\u7c97\u7c92\u5ea6 patch \u6df1\u5ea6\u4e0e\u76f8\u673a\u4fe1\u606f\u63d0\u5347\u4e3a\u7a00\u758f 3D anchor token\uff0c\u6446\u8131\u9ad8\u65af\u6570\u91cf\u4e0e\u8f93\u5165\u5206\u8fa8\u7387\u7684\u5f3a\u7ed1\u5b9a\u3002", "Adaptive Token Expansion \u901a\u8fc7\u6e32\u67d3\u8bef\u5dee\u76d1\u7763\u9884\u6d4b token \u7ea7\u4e0d\u786e\u5b9a\u6027\uff0c\u53ea\u6269\u5c55\u9ad8\u4e0d\u786e\u5b9a\u533a\u57df\uff0c\u5b9e\u73b0\u81ea\u9002\u5e94\u5bb9\u91cf\u5206\u914d\u3002", "\u5728 RealEstate10K \u548c DL3DV \u4e0a\u8fbe\u5230\u524d\u9988 3DGS SOTA \u753b\u8d28\uff0c\u540c\u65f6\u9ad8\u65af\u6570\u91cf\u76f8\u6bd4\u5bc6\u96c6\u65b9\u6cd5\u51cf\u5c11\u8d85\u8fc7 5.7 \u500d\uff1b12 \u5f20 512\u00d7960 \u8f93\u5165\u4e0b\u5355\u5361\u91cd\u5efa\u4f4e\u4e8e 1 \u79d2\uff0c\u6e32\u67d3\u8fbe 1136 FPS\u3002"], "keywords": ["3D\u91cd\u5efa", "3DGS", "\u65b0\u89c6\u89d2\u5408\u6210", "\u524d\u9988\u6a21\u578b"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20417v1", "published_at": "2026-07-22", "score": 0.242, "selected_reasons": ["HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.20417.png", "title": "ATSplat: Compact Feed-forward 3D Gaussian Splatting with Adaptive Token Expansion", "tldr": "\u81ea\u9002\u5e94token\u8ba9\u524d\u99883DGS\u66f4\u7d27\u51d1\u9ad8\u6548", "upvotes": 4, "what_it_is": "\u8bba\u6587\u63d0\u51fa ATSplat\uff0c\u4e00\u79cd\u524d\u9988\u5f0f 3D Gaussian Splatting \u6846\u67b6\uff0c\u7528\u81ea\u9002\u5e94 3D token \u66ff\u4ee3\u5bc6\u96c6\u50cf\u7d20\u5bf9\u9f50\u9ad8\u65af\u56de\u5f52\u3002\u5b83\u5148\u6784\u5efa\u7a00\u758f\u573a\u666f\u951a\u70b9\uff0c\u518d\u6309\u4e0d\u786e\u5b9a\u6027\u9009\u62e9\u6027\u6269\u5c55 token\uff0c\u4ece\u800c\u5728\u590d\u6742\u533a\u57df\u5206\u914d\u66f4\u591a\u9ad8\u65af\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u628a\u4f18\u5316\u5f0f 3DGS \u7684\u201c\u6309\u573a\u666f\u590d\u6742\u5ea6\u81ea\u9002\u5e94\u52a0\u5bc6\u201d\u80fd\u529b\u5e26\u56de\u524d\u9988\u91cd\u5efa\uff0c\u5728\u4fdd\u6301\u9ad8\u8d28\u91cf\u65b0\u89c6\u89d2\u5408\u6210\u7684\u540c\u65f6\u663e\u8457\u51cf\u5c11\u5197\u4f59\u9ad8\u65af\uff0c\u5177\u5907\u5b9e\u65f6\u91cd\u5efa\u4e0e\u9ad8\u5e27\u7387\u6e32\u67d3\u7684\u5b9e\u7528\u6f5c\u529b\u3002"}, {"abstract": "Practical robotic grasping in complex scenes requires both 3D spatial reasoning and alignment with task-specific requirements. Vision-language models (VLMs) offer a natural way to specify these requirements using language, but existing approaches either use a VLM to predict the grasp directly with limited spatial awareness, or train the VLM together with the grasping model, which requires significantly more data and compute. These limitations impede performance and have prevented scaling to multiple embodiments in complex scenes. We address this by proposing SeededGrasp, a novel data-efficient framework that enables a VLM to predict a seed point to be used as conditioning for a subsequent lightweight grasp-generation model. Our architecture decouples high-level semantic reasoning from low-level geometric execution, enabling multi-embodiment support while bypassing the need for expensive end-to-end training. To enable training such
