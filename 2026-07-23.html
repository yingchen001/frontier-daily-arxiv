nge of topics, from canonical facts to everyday culture. In this paper, we examine whether large language models (LLMs) can perform competitively in such settings, using quiz-style questions to test them on both common and niche topics. We introduce TriviaRoomQA, a multilingual benchmark designed to evaluate everyday, culturally grounded, and long-tail knowledge across 288 topics. The benchmark contains 3,300 parallel multiple-choice questions in six European languages and additional 5,340 French-only questions for a more fine-grained case study. We evaluate 30 open-weight LLMs from European, Asian, and North American providers, covering models from 7 to 70B parameters. We find that models are strong on knowledge-intensive topics such as history, geography, and mathematics, but substantially weaker on everyday popular-culture topics such as celebrities, music, movies, and news. Moreover, model performance varies across languages even for the same underlying questions, suggesting that access to factual knowledge is not always language-independent. In sum, our dataset and experiments demonstrate an important knowledge gap which is not captured by existing academic-based saturated benchmarks.", "arxiv_id": "2607.21445", "arxiv_url": "https://arxiv.org/abs/2607.21445", "authors": ["Anna Mosolova", "Djam\u00e9 Seddah"], "brief": "\u8bba\u6587\u63d0\u51fa TriviaRoomQA\uff0c\u4e00\u4e2a\u8986\u76d66\u79cd\u6b27\u6d32\u8bed\u8a00\u3001288\u4e2a\u4e3b\u9898\u7684\u591a\u8bed\u79cd\u95ee\u7b54\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u7684\u65e5\u5e38\u3001\u6587\u5316\u76f8\u5173\u4e0e\u957f\u5c3e\u77e5\u8bc6\u3002\u4f5c\u8005\u6d4b\u8bd5\u4e8630\u4e2a7B\u523070B\u5f00\u6e90\u6743\u91cd\u6a21\u578b\uff0c\u53d1\u73b0\u6a21\u578b\u867d\u64c5\u957f\u5386\u53f2\u3001\u5730\u7406\u3001\u6570\u5b66\u7b49\u77e5\u8bc6\u5bc6\u96c6\u4e3b\u9898\uff0c\u4f46\u5728\u660e\u661f\u3001\u97f3\u4e50\u3001\u7535\u5f71\u3001\u65b0\u95fb\u7b49\u5927\u4f17\u6587\u5316\u95ee\u9898\u4e0a\u8868\u73b0\u8f83\u5f31\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21445", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["TriviaRoomQA\u5305\u542b3300\u9053\u516d\u8bed\u5e73\u884c\u9009\u62e9\u9898\uff0c\u5e76\u989d\u5916\u63d0\u4f9b5340\u9053\u6cd5\u8bed\u9898\u7528\u4e8e\u7ec6\u7c92\u5ea6\u5206\u6790", "\u8bc4\u6d4b\u8986\u76d6\u6765\u81ea\u6b27\u6d32\u3001\u4e9a\u6d32\u3001\u5317\u7f8e\u63d0\u4f9b\u65b9\u768430\u4e2a\u5f00\u6e90\u6743\u91cdLLM\uff0c\u53c2\u6570\u89c4\u6a21\u4ece7B\u523070B", "\u540c\u4e00\u95ee\u9898\u5728\u4e0d\u540c\u8bed\u8a00\u4e2d\u7684\u8868\u73b0\u5dee\u5f02\u660e\u663e\uff0c\u8bf4\u660e\u4e8b\u5b9e\u77e5\u8bc6\u8bbf\u95ee\u5e76\u975e\u5b8c\u5168\u8bed\u8a00\u65e0\u5173"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u8bed\u79cd", "\u77e5\u8bc6\u8bc4\u6d4b", "\u57fa\u51c6\u6570\u636e\u96c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21445v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "When Trivia Is Not Trivial: Everyday Knowledge Failures in Multilingual LLMs", "tldr": "\u591a\u8bed\u79cdLLM\u5728\u65e5\u5e38\u6587\u5316\u51b7\u77e5\u8bc6\u4e0a\u660e\u663e\u6389\u961f", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa TriviaRoomQA\uff0c\u4e00\u4e2a\u8986\u76d66\u79cd\u6b27\u6d32\u8bed\u8a00\u3001288\u4e2a\u4e3b\u9898\u7684\u591a\u8bed\u79cd\u95ee\u7b54\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u7684\u65e5\u5e38\u3001\u6587\u5316\u76f8\u5173\u4e0e\u957f\u5c3e\u77e5\u8bc6\u3002\u4f5c\u8005\u6d4b\u8bd5\u4e8630\u4e2a7B\u523070B\u5f00\u6e90\u6743\u91cd\u6a21\u578b\uff0c\u53d1\u73b0\u6a21\u578b\u867d\u64c5\u957f\u5386\u53f2\u3001\u5730\u7406\u3001\u6570\u5b66\u7b49\u77e5\u8bc6\u5bc6\u96c6\u4e3b\u9898\uff0c\u4f46\u5728\u660e\u661f\u3001\u97f3\u4e50\u3001\u7535\u5f71\u3001\u65b0\u95fb\u7b49\u5927\u4f17\u6587\u5316\u95ee\u9898\u4e0a\u8868\u73b0\u8f83\u5f31\u3002", "why_notable": "\u8be5\u7814\u7a76\u6307\u51fa\u73b0\u6709\u5b66\u672f\u578b\u57fa\u51c6\u5df2\u8d8b\u4e8e\u9971\u548c\uff0c\u96be\u4ee5\u66b4\u9732LLM\u5728\u65e5\u5e38\u6587\u5316\u548c\u957f\u5c3e\u77e5\u8bc6\u4e0a\u7684\u7f3a\u53e3\uff1b\u65b0\u57fa\u51c6\u6709\u52a9\u4e8e\u66f4\u771f\u5b9e\u5730\u8bc4\u4f30\u591a\u8bed\u79cd\u6a21\u578b\u5728\u666e\u901a\u7528\u6237\u573a\u666f\u4e2d\u7684\u77e5\u8bc6\u80fd\u529b\u3002"}, {"abstract": "M\u00f6bius RoPE is a rotary positional encoding built on the anti-periodic frequency ladder $\u03b8_i=\u03c0(2i+1)/N$: every rotation plane advances by an odd multiple of $\u03c0$ across the training context, so the positional holonomy is $-1$ and the two ends of the sequence are deterministically coupled through a closed-form Dirichlet \"dipole\"; to our knowledge this is the first anti-periodic boundary condition in positional encoding. We verify the theory numerically to $\\sim 10^{-6}$ and pretrain 48 models spanning six 160M-class and three 410M-class arms (2B FineWeb-Edu tokens each; the hybrid arm puts M\u00f6bius frequencies on 25% of heads). Hybrid perplexity is unchanged (29.66 vs. 29.72), but needle-in-a-haystack retrieval becomes reliable: $90.3\\pm5.7\\%$ versus $63.3\\pm31.4\\%$ at context 512 ($n=6$ seeds), observed worst seed 86% versus 14%, robust variance tests $p=0.013$-$0.029$ (unadjusted), recurring at 410M (Levene $p=0.040$). Matched controls isolate the mechanism: an aperiodic ladder in the same frequency band reproduces none of the effect, and a periodic (holonomy $+1$) ladder only a fraction. Swapping trained models\u0027 frequency table back to standard RoPE (weights frozen) collapses retrieval, with damage concentrated on far needles: trained models depend on this long-range geometry. A NoPE arm is even more reliable at short context but pays a 13% perplexity tax and extrapolates worst; only the anti-periodic hybrid pairs baseline perplexity with a high reliability floor. The effect is scoped to single-needle retrieval within the training window; a one-line frequency swap thus provides zero-cost insurance against the retrieval seed lottery.", "arxiv_id": "2607.21405", "arxiv_url": "https://arxiv.org/abs/2607.21405", "authors": ["Ji Ho Bae"], "brief": "\u8bba\u6587\u63d0\u51fa M\u00f6bius RoPE\uff0c\u4e00\u79cd\u57fa\u4e8e\u53cd\u5468\u671f\u9891\u7387\u9636\u68af\u7684\u65cb\u8f6c\u4f4d\u7f6e\u7f16\u7801\uff0c\u4f7f\u5e8f\u5217\u4e24\u7aef\u5f62\u6210\u786e\u5b9a\u6027\u8026\u5408\u3002\u4f5c\u8005\u901a\u8fc7\u591a\u7ec4160M\u4e0e410M\u6a21\u578b\u9884\u8bad\u7ec3\u9a8c\u8bc1\uff0c\u5b83\u5728\u4e0d\u635f\u5bb3\u56f0\u60d1\u5ea6\u7684\u60c5\u51b5\u4e0b\u663e\u8457\u63d0\u5347\u8bad\u7ec3\u7a97\u53e3\u5185\u7684\u5355\u9488\u68c0\u7d22\u53ef\u9760\u6027\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21405", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528\u53cd\u5468\u671f\u9891\u7387 \u03b8_i=\u03c0(2i+1)/N\uff0c\u4f7f\u4f4d\u7f6e\u7f16\u7801\u5177\u6709 holonomy=-1 \u7684 M\u00f6bius \u8fb9\u754c\u6761\u4ef6\u3002", "\u6df7\u5408\u65b9\u6848\u4ec5\u572825%\u6ce8\u610f\u529b\u5934\u4f7f\u7528 M\u00f6bius \u9891\u7387\uff0c\u56f0\u60d1\u5ea6\u57fa\u672c\u4e0d\u53d8\uff1a29.66 vs. \u6807\u51c6 RoPE 29.72\u3002", "needle-in-a-haystack \u68c0\u7d22\u5728512\u4e0a\u4e0b\u6587\u4e2d\u4ece63.3%\u00b131.4%\u63d0\u5347\u523090.3%\u00b15.7%\uff0c\u4e14\u6700\u5dee\u968f\u673a\u79cd\u5b50\u8868\u73b0\u663e\u8457\u6539\u5584\u3002", "\u5bf9\u7167\u5b9e\u9a8c\u663e\u793a\u975e\u5468\u671f\u9891\u7387\u548c\u5468\u671f\u9891\u7387\u65e0\u6cd5\u590d\u73b0\u540c\u7b49\u6548\u679c\uff1b\u5c06\u8bad\u7ec3\u540e\u6a21\u578b\u9891\u7387\u8868\u6362\u56de\u6807\u51c6 RoPE \u4f1a\u5bfc\u81f4\u8fdc\u8ddd\u79bb\u68c0\u7d22\u5d29\u6e83\u3002"], "keywords": ["\u4f4d\u7f6e\u7f16\u7801", "\u957f\u4e0a\u4e0b\u6587", "\u68c0\u7d22", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21405v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Anti-Periodic Positional Encoding: M\u00f6bius Boundary Conditions Make In-Context Retrieval Reliable", "tldr": "\u53cd\u5468\u671fRoPE\u8ba9\u4e0a\u4e0b\u6587\u68c0\u7d22\u66f4\u7a33\u5b9a", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa M\u00f6bius RoPE\uff0c\u4e00\u79cd\u57fa\u4e8e\u53cd\u5468\u671f\u9891\u7387\u9636\u68af\u7684\u65cb\u8f6c\u4f4d\u7f6e\u7f16\u7801\uff0c\u4f7f\u5e8f\u5217\u4e24\u7aef\u5f62\u6210\u786e\u5b9a\u6027\u8026\u5408\u3002\u4f5c\u8005\u901a\u8fc7\u591a\u7ec4160M\u4e0e410M\u6a21\u578b\u9884\u8bad\u7ec3\u9a8c\u8bc1\uff0c\u5b83\u5728\u4e0d\u635f\u5bb3\u56f0\u60d1\u5ea6\u7684\u60c5\u51b5\u4e0b\u663e\u8457\u63d0\u5347\u8bad\u7ec3\u7a97\u53e3\u5185\u7684\u5355\u9488\u68c0\u7d22\u53ef\u9760\u6027\u3002", "why_notable": "\u8fd9\u662f\u4e00\u79cd\u51e0\u4e4e\u96f6\u6210\u672c\u7684\u4f4d\u7f6e\u7f16\u7801\u9891\u7387\u66ff\u6362\u65b9\u6848\uff0c\u53ef\u5728\u4fdd\u6301\u8bed\u8a00\u5efa\u6a21\u6027\u80fd\u7684\u540c\u65f6\u964d\u4f4e\u957f\u4e0a\u4e0b\u6587\u68c0\u7d22\u7684\u968f\u673a\u79cd\u5b50\u4e0d\u7a33\u5b9a\u6027\uff0c\u4e3a\u63d0\u5347\u5c0f\u5230\u4e2d\u7b49\u89c4\u6a21Transformer\u7684\u4e0a\u4e0b\u6587\u53ef\u9760\u6027\u63d0\u4f9b\u4e86\u7b80\u5355\u5b9e\u7528\u7684\u673a\u5236\u3002"}, {"abstract": "Chain-of-thought reasoning models such as DeepSeek-R1-Distill-Qwen-7B exhibit a bimodal convergence pattern: generations either terminate within a token budget (converged) or exhaust it without reaching a conclusion (non-converged). We characterize this phenomenon empirically, showing that converged generations achieve 90.3% accuracy on AIME 1983-2024 while non-converged ones achieve only 6.6%, with an overall convergence rate of 62.0%. We then ask whether this outcome is detectable early in the thinking chain using internal model representations. Training linear probes on hidden-state activations at token positions 50-300, we find that layer-20 activations at token 150 achieve AUC 0.608 (+-0.080, 5-fold CV), reliably above chance even at token 50. Activation probes consistently outperform behavioral baselines derived from token entropy and repetition statistics. A sweep-level permutation test yields p=0.063 (100,000 permutations), consistent with a modest signal that our sample size cannot confirm at conventional thresholds. These findings suggest that convergence fate is partially encoded in intermediate representations well before the generation ends, opening a path toward early-exit inference and adaptive compute allocation.", "arxiv_id": "2607.21433", "arxiv_url": "https://arxiv.org/abs/2607.21433", "authors": ["Renuka Oladri", "Niveda Jawahar", "Abdirisak Mohamed"], "brief": "\u8bba\u6587\u7814\u7a76\u94fe\u5f0f\u601d\u7ef4\u6a21\u578b\u5728\u6570\u5b66\u63a8\u7406\u4e2d\u201c\u6536\u655b/\u4e0d\u6536\u655b\u201d\u7684\u53cc\u5cf0\u73b0\u8c61\uff0c\u5e76\u5c1d\u8bd5\u7528\u65e9\u671f\u9690\u85cf\u72b6\u6001\u9884\u6d4b\u6700\u7ec8\u662f\u5426\u4f1a\u8017\u5c3d token \u9884\u7b97\u3002\u4f5c\u8005\u5728 DeepSeek-R1-Distill-Qwen-7B \u4e0a\u53d1\u73b0\uff0c\u4e2d\u95f4\u5c42\u6fc0\u6d3b\u5df2\u5305\u542b\u4e00\u5b9a\u7684\u6536\u655b\u547d\u8fd0\u4fe1\u53f7\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21433", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5728 AIME 1983-2024 \u4e0a\uff0c\u6536\u655b\u6837\u672c\u51c6\u786e\u7387\u8fbe 90.3%\uff0c\u4e0d\u6536\u655b\u6837\u672c\u4ec5 6.6%\uff0c\u603b\u4f53\u6536\u655b\u7387\u4e3a 62.0%", "\u4f7f\u7528 token 50-300 \u4f4d\u7f6e\u7684\u9690\u85cf\u72b6\u6001\u8bad\u7ec3\u7ebf\u6027\u63a2\u9488\uff0clayer 20\u3001token 150 \u7684 AUC \u4e3a 0.608\uff0c\u65e9\u81f3 token 50 \u4e5f\u9ad8\u4e8e\u968f\u673a", "\u6fc0\u6d3b\u63a2\u9488\u4f18\u4e8e\u57fa\u4e8e token \u71b5\u548c\u91cd\u590d\u7edf\u8ba1\u7684\u884c\u4e3a\u57fa\u7ebf\uff0c\u4f46\u7f6e\u6362\u68c0\u9a8c p=0.063\uff0c\u4fe1\u53f7\u4ecd\u504f\u5f31\u3001\u9700\u66f4\u5927\u6837\u672c\u9a8c\u8bc1"], "keywords": ["\u63a8\u7406\u6a21\u578b", "\u94fe\u5f0f\u601d\u7ef4", "\u53ef\u89e3\u91ca\u6027", "\u81ea\u9002\u5e94\u8ba1\u7b97"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21433v1", "published_at": "2026-07-23", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Token Budget Saturation and Mechanistic Early Detection of Reasoning Non-Convergence in Chain-of-Thought Models", "tldr": "\u53ef\u65e9\u671f\u9884\u6d4b\u63a8\u7406\u94fe\u662f\u5426\u4f1a\u8017\u5c3d\u9884\u7b97", "upvotes": 0, "what_it_is": "\u8bba\u6587\u7814\u7a76\u94fe\u5f0f\u601d\u7ef4\u6a21\u578b\u5728\u6570\u5b66\u63a8\u7406\u4e2d\u201c\u6536\u655b/\u4e0d\u6536\u655b\u201d\u7684\u53cc\u5cf0\u73b0\u8c61\uff0c\u5e76\u5c1d\u8bd5\u7528\u65e9\u671f\u9690\u85cf\u72b6\u6001\u9884\u6d4b\u6700\u7ec8\u662f\u5426\u4f1a\u8017\u5c3d token \u9884\u7b97\u3002\u4f5c\u8005\u5728 DeepSeek-R1-Distill-Qwen-7B \u4e0a\u53d1\u73b0\uff0c\u4e2d\u95f4\u5c42\u6fc0\u6d3b\u5df2\u5305\u542b\u4e00\u5b9a\u7684\u6536\u655b\u547d\u8fd0\u4fe1\u53f7\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u4ece\u673a\u5236\u5c42\u9762\u63ed\u793a\u63a8\u7406\u6a21\u578b\u5728\u751f\u6210\u65e9\u671f\u5df2\u90e8\u5206\u7f16\u7801\u6700\u7ec8\u662f\u5426\u4f1a\u201c\u5361\u4f4f\u201d\uff0c\u4e3a\u65e9\u505c\u63a8\u7406\u3001\u81ea\u9002\u5e94\u7b97\u529b\u5206\u914d\u548c\u964d\u4f4e\u957f CoT \u6d6a\u8d39\u63d0\u4f9b\u4e86\u5b9e\u8bc1\u4f9d\u636e\u3002"}, {"abstract": "Recent advancements in automated audio captioning (AAC) have shifted from monolithic sentence generation toward structured formats that explicitly disentangle distinct acoustic and semantic properties. However, evaluating this heterogeneous data remains a significant challenge. Existing caption metrics focus on flat textual outputs and fail to reliably assess multimodal attributes. To bridge this gap, we propose a multi-axis evaluation framework tailored for structured audio descriptions. Building on the AudioCards dataset, we evaluate outputs across five orthogonal axes: tag-sets, descriptions, logical reasoning, numeric measurements, and spectral profiles. Our approach combines Large Language Model (LLM) judges to capture semantic nuance with deterministic computational metrics to precisely measure acoustic deviations. To rigorously validate the reliability of this framework, we introduce a controlled perturbation testing protocol that injects typed, graded errors into groundtruth annotations. Our results demonstrate that this framework successfully distinguishes meaning-preserving paraphrases from genuine semantic and acoustic corruptions.", "arxiv_id": "2607.21424", "arxiv_url": "https://arxiv.org/abs/2607.21424", "authors": ["Liang-Yuan Wu", "Sripathi Sridhar", "Mark Cartwright", "Magdalena Fuentes"], "brief": "\u8bba\u6587\u9762\u5411\u7ed3\u6784\u5316\u81ea\u52a8\u97f3\u9891\u63cf\u8ff0\uff0c\u63d0\u51fa\u4e00\u4e2a\u591a\u8f74\u8bc4\u4f30\u6846\u67b6\uff0c\u7528\u4e8e\u5206\u522b\u8861\u91cf\u6807\u7b7e\u3001\u6587\u672c\u63cf\u8ff0\u3001\u903b\u8f91\u63a8\u7406\u3001\u6570\u503c\u6d4b\u91cf\u548c\u9891\u8c31\u7279\u5f81\u3002\u8be5\u6846\u67b6\u7ed3\u5408 LLM \u88c1\u5224\u4e0e\u786e\u5b9a\u6027\u58f0\u5b66\u6307\u6807\uff0c\u5e76\u7528\u53ef\u63a7\u6270\u52a8\u534f\u8bae\u9a8c\u8bc1\u5176\u53ef\u9760\u6027\u3002", "categories": ["cs.CL", "cs.SD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21424", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u57fa\u4e8e AudioCards \u6570\u636e\u96c6\uff0c\u5c06\u7ed3\u6784\u5316\u97f3\u9891\u63cf\u8ff0\u62c6\u89e3\u4e3a\u4e94\u4e2a\u6b63\u4ea4\u8bc4\u4f30\u8f74\uff1atag-set\u3001description\u3001logical reasoning\u3001numeric measurement \u548c spectral profile", "\u8bed\u4e49\u7c7b\u5185\u5bb9\u4f7f\u7528 LLM judges \u6355\u6349\u540c\u4e49\u6539\u5199\u4e0e\u8bed\u4e49\u7ec6\u5fae\u5dee\u5f02\uff0c\u58f0\u5b66\u6570\u503c\u548c\u9891\u8c31\u7c7b\u5185\u5bb9\u4f7f\u7528\u786e\u5b9a\u6027\u8ba1\u7b97\u6307\u6807\u8bc4\u4f30\u504f\u5dee", "\u63d0\u51fa\u53d7\u63a7\u6270\u52a8\u6d4b\u8bd5\u534f\u8bae\uff0c\u5411\u771f\u503c\u6807\u6ce8\u4e2d\u6ce8\u5165\u4e0d\u540c\u7c7b\u578b\u548c\u5f3a\u5ea6\u7684\u9519\u8bef\uff0c\u4ee5\u9a8c\u8bc1\u6307\u6807\u80fd\u533a\u5206\u4fdd\u4e49\u6539\u5199\u4e0e\u771f\u5b9e\u8bed\u4e49/\u58f0\u5b66\u9519\u8bef"], "keywords": ["\u97f3\u9891\u7406\u89e3", "\u8bc4\u6d4b\u57fa\u51c6", "\u591a\u6a21\u6001", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21424v1", "published_at": "2026-07-23", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "An Evaluation Framework for Structured Audio Captions Validated by Controlled Perturbations", "tldr": "\u63d0\u51fa\u7ed3\u6784\u5316\u97f3\u9891\u63cf\u8ff0\u7684\u591a\u7ef4\u8bc4\u6d4b\u6846\u67b6", "upvotes": 0, "what_it_is": "\u8bba\u6587\u9762\u5411\u7ed3\u6784\u5316\u81ea\u52a8\u97f3\u9891\u63cf\u8ff0\uff0c\u63d0\u51fa\u4e00\u4e2a\u591a\u8f74\u8bc4\u4f30\u6846\u67b6\uff0c\u7528\u4e8e\u5206\u522b\u8861\u91cf\u6807\u7b7e\u3001\u6587\u672c\u63cf\u8ff0\u3001\u903b\u8f91\u63a8\u7406\u3001\u6570\u503c\u6d4b\u91cf\u548c\u9891\u8c31\u7279\u5f81\u3002\u8be5\u6846\u67b6\u7ed3\u5408 LLM \u88c1\u5224\u4e0e\u786e\u5b9a\u6027\u58f0\u5b66\u6307\u6807\uff0c\u5e76\u7528\u53ef\u63a7\u6270\u52a8\u534f\u8bae\u9a8c\u8bc1\u5176\u53ef\u9760\u6027\u3002", "why_notable": "\u968f\u7740\u97f3\u9891\u63cf\u8ff0\u4ece\u5355\u53e5\u751f\u6210\u8f6c\u5411\u7ed3\u6784\u5316\u3001\u591a\u5c5e\u6027\u8f93\u51fa\uff0c\u4f20\u7edf\u6587\u672c\u76f8\u4f3c\u5ea6\u6307\u6807\u5df2\u96be\u4ee5\u9002\u7528\u3002\u8be5\u5de5\u4f5c\u4e3a\u7ed3\u6784\u5316\u97f3\u9891\u7406\u89e3\u4e0e\u751f\u6210\u63d0\u4f9b\u4e86\u66f4\u7ec6\u7c92\u5ea6\u3001\u53ef\u9a8c\u8bc1\u7684\u8bc4\u6d4b\u65b9\u6cd5\uff0c\u6709\u52a9\u4e8e\u63a8\u52a8 AAC \u7cfb\u7edf\u4ece\u201c\u4f1a\u8bf4\u201d\u8d70\u5411\u201c\u8bf4\u5f97\u51c6\u201d\u3002"}, {"abstract": "A rhetorical figure that Cicero and Quintilian catalogued two thousand years ago reappears, systematically, in the text of large language models: epanorthosis, the self-correction of the specimen \u00abThis is not a course. It is a journey of transformation\u00bb. This essay argues that the overuse is a trained disposition, driven mainly by a training distribution rich in promotional prose and by preference tuning (RLHF) that rewards confident, emphatic phrasing; the left-to-right nature of generation is an amplifier rather than the root cause. Building on evidence that models diverge from human rhetorical style, and on Fontanier\u0027s classification of epanorthosis as a figure of thought, it sets out a programme that scores the figure against genre-specific human baselines through an Epanorthosis Index (density relative to the human rate). A first measurement, on three sizes of one instruction-tuned model family, finds mis-calibration by register in both directions: the models overshoot in oratory (about twofold, near threefold in Italian, concentrated in the larger tiers) and undershoot in informal question-and-answer writing, while matching humans in argument, journalism, and encyclopedic prose. Three constructive contributions follow: a survey of mitigation techniques centred on lightweight LoRA adapters; a demonstration, in Italian, that a one-line instruction cuts the figure by half to nearly three-quarters and that a supervised-fine-tuning adapter removes it almost entirely, with a scaling coefficient that dials the reduction back onto the human rate; and the argument that the target is calibration to the human rate for each genre, not elimination. It closes on the stakes: the real risk is that we begin to write like the machines.", "arxiv_id": "2607.21498", "arxiv_url": "https://arxiv.org/abs/2607.21498", "authors": ["Federico Boggia"], "brief": "\u672c\u6587\u7814\u7a76\u5927\u578b\u8bed\u8a00\u6a21\u578b\u4e3a\u4f55\u7cfb\u7edf\u6027\u8fc7\u7528\u201cepanorthosis\u201d\uff08\u81ea\u6211\u4fee\u6b63\u5f0f\u4fee\u8f9e\uff0c\u5982\u201c\u8fd9\u4e0d\u662f\u8bfe\u7a0b\uff0c\u800c\u662f\u65c5\u7a0b\u201d\uff09\uff0c\u8ba4\u4e3a\u5176\u4e3b\u8981\u6e90\u4e8e\u8bad\u7ec3\u8bed\u6599\u4e2d\u7684\u5ba3\u4f20\u6587\u4f53\u548cRLHF\u504f\u597d\u7684\u5f3a\u8c03\u6027\u8868\u8fbe\u3002\u8bba\u6587\u63d0\u51faEpanorthosis Index\uff0c\u7528\u4eba\u7c7b\u5206\u4f53\u88c1\u57fa\u7ebf\u8861\u91cf\u6a21\u578b\u4fee\u8f9e\u5bc6\u5ea6\uff0c\u5e76\u63a2\u7d22\u6307\u4ee4\u4e0eLoRA/SFT\u9002\u914d\u5668\u7f13\u89e3\u65b9\u6cd5\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21498", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": ["\u5728\u4e00\u4e2a\u6307\u4ee4\u5fae\u8c03\u6a21\u578b\u5bb6\u65cf\u7684\u4e09\u4e2a\u89c4\u6a21\u4e0a\uff0c\u6a21\u578b\u5728\u6f14\u8bb2\u4f53\u4e2d\u8fc7\u5ea6\u4f7f\u7528\u8be5\u4fee\u8f9e\u7ea62\u500d\uff0c\u610f\u5927\u5229\u8bed\u4e2d\u63a5\u8fd13\u500d\uff0c\u4f46\u5728\u975e\u6b63\u5f0f\u95ee\u7b54\u4e2d\u53cd\u800c\u4f4e\u4e8e\u4eba\u7c7b\u6c34\u5e73\u3002", "\u8bba\u6587\u4e3b\u5f20\u5de6\u5230\u53f3\u751f\u6210\u53ea\u662f\u653e\u5927\u56e0\u7d20\uff0c\u6839\u56e0\u66f4\u53ef\u80fd\u662f\u8bad\u7ec3\u5206\u5e03\u548c\u504f\u597d\u4f18\u5316\u5956\u52b1\u4e86\u81ea\u4fe1\u3001\u5f3a\u8c03\u3001\u5ba3\u4f20\u5f0f\u8868\u8fbe\u3002", "\u610f\u5927\u5229\u8bed\u5b9e\u9a8c\u663e\u793a\uff0c\u4e00\u884c\u6307\u4ee4\u53ef\u5c06\u8be5\u4fee\u8f9e\u51cf\u5c11\u7ea6\u4e00\u534a\u5230\u56db\u5206\u4e4b\u4e09\uff1b\u76d1\u7763\u5fae\u8c03\u9002\u914d\u5668\u51e0\u4e4e\u53ef\u79fb\u9664\uff0c\u5e76\u53ef\u901a\u8fc7\u7f29\u653e\u7cfb\u6570\u6821\u51c6\u5230\u4eba\u7c7b\u4f53\u88c1\u57fa\u7ebf\u3002"], "keywords": ["\u8bed\u8a00\u6a21\u578b", "\u6587\u672c\u98ce\u683c", "\u5bf9\u9f50", "\u5fae\u8c03"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21498v1", "published_at": "2026-07-23", "score": 0.125, "selected_reasons": [], "thumbnail": null, "title": "Artificial Epanorthosis: Why large language models overuse a classical rhetorical figure, and how to mitigate it", "tldr": "LLM\u8fc7\u5ea6\u81ea\u6211\u4fee\u6b63\u4fee\u8f9e\u5e76\u53ef\u6821\u51c6\u7f13\u89e3", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u5927\u578b\u8bed\u8a00\u6a21\u578b\u4e3a\u4f55\u7cfb\u7edf\u6027\u8fc7\u7528\u201cepanorthosis\u201d\uff08\u81ea\u6211\u4fee\u6b63\u5f0f\u4fee\u8f9e\uff0c\u5982\u201c\u8fd9\u4e0d\u662f\u8bfe\u7a0b\uff0c\u800c\u662f\u65c5\u7a0b\u201d\uff09\uff0c\u8ba4\u4e3a\u5176\u4e3b\u8981\u6e90\u4e8e\u8bad\u7ec3\u8bed\u6599\u4e2d\u7684\u5ba3\u4f20\u6587\u4f53\u548cRLHF\u504f\u597d\u7684\u5f3a\u8c03\u6027\u8868\u8fbe\u3002\u8bba\u6587\u63d0\u51faEpanorthosis Index\uff0c\u7528\u4eba\u7c7b\u5206\u4f53\u88c1\u57fa\u7ebf\u8861\u91cf\u6a21\u578b\u4fee\u8f9e\u5bc6\u5ea6\uff0c\u5e76\u63a2\u7d22\u6307\u4ee4\u4e0eLoRA/SFT\u9002\u914d\u5668\u7f13\u89e3\u65b9\u6cd5\u3002", "why_notable": "\u8be5\u7814\u7a76\u628a\u53e4\u5178\u4fee\u8f9e\u5b66\u5f15\u5165LLM\u98ce\u683c\u504f\u5dee\u5206\u6790\uff0c\u5f3a\u8c03\u76ee\u6807\u4e0d\u662f\u6d88\u9664\u67d0\u79cd\u4fee\u8f9e\uff0c\u800c\u662f\u6309\u4f53\u88c1\u6821\u51c6\u5230\u4eba\u7c7b\u4f7f\u7528\u7387\uff1b\u5bf9\u964d\u4f4eAI\u8154\u3001\u6539\u5584\u6587\u672c\u81ea\u7136\u5ea6\u4e0e\u98ce\u683c\u63a7\u5236\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "While memory systems are essential for agent architectures, pervasive architectural fragmentation restricts systematic research. Existing implementations typically couple different stages of the memory lifecycle, entangle evaluation logic with specific datasets, and provide limited support for the management of heterogeneous memory types. We introduce MemTools, an interoperability research framework that decouples memory system components from their underlying deployment environments. MemTools standardizes the memory lifecycle through declarative data contracts, enabling the interchangeable assembly of components across different systems. It orthogonally separates benchmark datasets from execution protocols to facilitate controlled assessments. Furthermore, MemTools provides a unified computational interface for coordinating symbolic, neural, and multimodal memory representations within a shared runtime. Empirical evaluations on cross-system component integration, evaluation protocol reconfiguration, and heterogeneous memory coordination demonstrate that MemTools enables systematic isolation and analysis of memory design variables. These findings suggest that MemTools provides a practical and extensible infrastructure for advancing principled research on agent memory.", "arxiv_id": "2607.21404", "arxiv_url": "https://arxiv.org/abs/2607.21404", "authors": ["Chengfeng Zhao", "Jinhui Chen", "Sirui Liang", "Shizhu He", "Yequan Wang", "Jun Zhao", "Kang Liu"], "brief": "\u8bba\u6587\u63d0\u51fa MemTools\uff0c\u4e00\u4e2a\u9762\u5411\u667a\u80fd\u4f53\u8bb0\u5fc6\u7684\u7edf\u4e00\u4e92\u64cd\u4f5c\u7814\u7a76\u6846\u67b6\uff0c\u901a\u8fc7\u58f0\u660e\u5f0f\u6570\u636e\u5951\u7ea6\u89e3\u8026\u8bb0\u5fc6\u751f\u547d\u5468\u671f\u7ec4\u4ef6\u4e0e\u90e8\u7f72\u73af\u5883\u3002\u5b83\u652f\u6301\u8de8\u7cfb\u7edf\u7ec4\u4ef6\u7ec4\u5408\u3001\u8bc4\u6d4b\u534f\u8bae\u91cd\u914d\u7f6e\uff0c\u4ee5\u53ca\u7b26\u53f7\u3001\u795e\u7ecf\u548c\u591a\u6a21\u6001\u8bb0\u5fc6\u7684\u7edf\u4e00\u534f\u8c03\uff0c\u6709\u52a9\u4e8e\u66f4\u7cfb\u7edf\u5730\u5206\u6790\u8bb0\u5fc6\u8bbe\u8ba1\u53d8\u91cf\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21404", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u7cfb\u7edf", "\u8bc4\u6d4b\u6846\u67b6", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21404v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MemTools: A Unified Research Framework for Interoperable Agent Memory", "tldr": "\u8bba\u6587\u63d0\u51fa MemTools\uff0c\u4e00\u4e2a\u9762\u5411\u667a\u80fd\u4f53\u8bb0\u5fc6\u7684\u7edf\u4e00\u4e92\u64cd\u4f5c\u7814\u7a76\u6846\u67b6\uff0c\u901a\u8fc7\u58f0\u660e\u5f0f\u6570\u636e\u5951\u7ea6\u89e3\u8026\u8bb0\u5fc6\u751f\u547d\u5468\u671f\u7ec4\u4ef6\u4e0e\u90e8\u7f72\u73af\u5883\u3002\u5b83\u652f\u6301\u8de8\u7cfb\u7edf\u7ec4\u4ef6\u7ec4\u5408\u3001\u8bc4\u6d4b\u534f\u8bae\u91cd\u914d\u7f6e\uff0c\u4ee5\u53ca\u7b26\u53f7\u3001\u795e\u7ecf\u548c\u591a\u6a21\u6001\u8bb0\u5fc6\u7684\u7edf\u4e00\u534f\u8c03\uff0c\u6709\u52a9\u4e8e\u66f4\u7cfb\u7edf\u5730\u5206\u6790\u8bb0\u5fc6\u8bbe\u8ba1\u53d8\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This study investigates vowel-inherent spectral change (VISC) in spontaneous conversational Mandarin. Using the generalized additive model and word embeddings from distributional semantics, we show that, when controlling for variables such as vowel duration, gender, speaker identity, co-articulation, vowel identity, and utterance position, vowel formant trajectory dynamics have word-specific components that are tied to their meaning in context: The F1 and F2 trajectories of words can be predicted from their contextualized embeddings with an accuracy that substantially exceeds a permutation baseline. Challenging modular cognitive models of speech production, these results indicate that, words\u0027 semantics co-determine the fine details of their articulation.", "arxiv_id": "2607.21391", "arxiv_url": "https://arxiv.org/abs/2607.21391", "authors": ["Xiaoyun Jin", "Mirjam Ernestus", "R. Harald Baayen"], "brief": "\u672c\u6587\u57fa\u4e8e\u666e\u901a\u8bdd\u81ea\u53d1\u4f1a\u8bdd\u8bed\u6599\uff0c\u7814\u7a76\u5143\u97f3\u5185\u5728\u9891\u8c31\u53d8\u5316\u4e0e\u8bcd\u4e49\u4e4b\u95f4\u7684\u5173\u7cfb\u3002\u7ed3\u679c\u663e\u793a\uff0c\u5728\u63a7\u5236\u65f6\u957f\u3001\u6027\u522b\u3001\u8bf4\u8bdd\u4eba\u3001\u534f\u540c\u53d1\u97f3\u3001\u5143\u97f3\u7c7b\u522b\u548c\u8bdd\u8bed\u4f4d\u7f6e\u7b49\u56e0\u7d20\u540e\uff0c\u8bcd\u7684\u4e0a\u4e0b\u6587\u5316\u8bed\u4e49\u5d4c\u5165\u4ecd\u80fd\u663e\u8457\u9884\u6d4b F1/F2 \u8f68\u8ff9\uff0c\u8bf4\u660e\u8bcd\u4e49\u4f1a\u5171\u540c\u5f71\u54cd\u53d1\u97f3\u7ec6\u8282\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21391", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u97f3\u5b66", "\u8bed\u4e49\u8868\u793a", "\u666e\u901a\u8bdd", "\u8bed\u6599\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21391v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Word meaning co-determines vowel-inherent spectral change. A corpus-based investigation of conversational Mandarin", "tldr": "\u672c\u6587\u57fa\u4e8e\u666e\u901a\u8bdd\u81ea\u53d1\u4f1a\u8bdd\u8bed\u6599\uff0c\u7814\u7a76\u5143\u97f3\u5185\u5728\u9891\u8c31\u53d8\u5316\u4e0e\u8bcd\u4e49\u4e4b\u95f4\u7684\u5173\u7cfb\u3002\u7ed3\u679c\u663e\u793a\uff0c\u5728\u63a7\u5236\u65f6\u957f\u3001\u6027\u522b\u3001\u8bf4\u8bdd\u4eba\u3001\u534f\u540c\u53d1\u97f3\u3001\u5143\u97f3\u7c7b\u522b\u548c\u8bdd\u8bed\u4f4d\u7f6e\u7b49\u56e0\u7d20\u540e\uff0c\u8bcd\u7684\u4e0a\u4e0b\u6587\u5316\u8bed\u4e49\u5d4c\u5165\u4ecd\u80fd\u663e\u8457\u9884\u6d4b F1/F2 \u8f68\u8ff9\uff0c\u8bf4\u660e\u8bcd\u4e49\u4f1a\u5171\u540c\u5f71\u54cd\u53d1\u97f3\u7ec6\u8282\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In capital-markets workflows the question is rarely whether a large language model can produce a fluent draft, but whether the draft is bankable: defensible in front of a counter-party or a regulator, with the documents in hand. Existing methods address parts of that gap: open-domain QA benchmarks reward surface accuracy, and finance benchmarks (FinanceBench, FinQA, ConvFinQA) advance document-grounded and numerical QA but evaluate at the question-answer layer rather than the workflow outputs practitioners defend. We introduce CM-LRS, a Capital Markets LLM Reliability Score, evaluating outputs at the workflow-output layer across seven dimensions: factual accuracy, evidence traceability, numerical consistency, workflow completeness, source discipline, decision usefulness, and reviewability/auditability. Each is scored 0-5 against a rubric anchored on signals reviewers in regulated settings use; the aggregate is tunable to the workflow. We demonstrate CM-LRS on five workflows (DCM transaction-terms extraction, precedent retrieval, issuer profile synthesis, M\u0026A transaction-comparable reasoning, ECM transaction-terms extraction) over public SEC EDGAR filings, a public UK takeover release, and fictional synthetic supplements, scoring four models against four independent LLM judges spanning three model families. Three findings. First, the frontier closed-source models cluster within 0.22 points on four-judge averaged CM-LRS (Sonnet 4.6 = 4.31, Opus 4.7 = 4.30, GPT-5.5 = 4.09); all four judges place the open-weights baseline (Llama 3.3 70B = 3.15) last. Second, that gap concentrates on retrieval (2.23) and synthesis (2.15), not extraction (0.84). Third, Decision Usefulness shows the widest cross-model dispersion of any dimension (4.0 points on issuer profiling) and top-tier inter-judge agreement (mean r = 0.52). Plausibility is cheap. Bankability is the bar.", "arxiv_id": "2607.21340", "arxiv_url": "https://arxiv.org/abs/2607.21340", "authors": ["Prerit Ahuja"], "brief": "\u8bba\u6587\u63d0\u51fa CM-LRS\uff0c\u7528\u4e8e\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u5728\u8d44\u672c\u5e02\u573a\u5b9e\u9645\u5de5\u4f5c\u6d41\u8f93\u51fa\u4e2d\u7684\u53ef\u9760\u6027\uff0c\u800c\u4e0d\u53ea\u662f\u95ee\u7b54\u51c6\u786e\u7387\u3002\u8be5\u8bc4\u5206\u8986\u76d6\u4e8b\u5b9e\u51c6\u786e\u3001\u8bc1\u636e\u53ef\u8ffd\u6eaf\u3001\u6570\u503c\u4e00\u81f4\u3001\u6d41\u7a0b\u5b8c\u6574\u3001\u53ef\u5ba1\u8ba1\u7b49\u4e03\u4e2a\u7ef4\u5ea6\uff0c\u5e76\u5728\u591a\u7c7b SEC/\u5e76\u8d2d/\u80a1\u6743\u503a\u52a1\u53d1\u884c\u573a\u666f\u4e2d\u9a8c\u8bc1\uff0c\u663e\u793a\u95ed\u6e90\u524d\u6cbf\u6a21\u578b\u6574\u4f53\u9886\u5148\uff0c\u5dee\u8ddd\u4e3b\u8981\u4f53\u73b0\u5728\u68c0\u7d22\u4e0e\u7efc\u5408\u80fd\u529b\u4e0a\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21340", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u91d1\u878d\u79d1\u6280", "\u8bc4\u6d4b\u57fa\u51c6", "\u53ef\u9760\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21340v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Capital Markets LLM Reliability Score (CM-LRS): From Plausible to Bankable", "tldr": "\u8bba\u6587\u63d0\u51fa CM-LRS\uff0c\u7528\u4e8e\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u5728\u8d44\u672c\u5e02\u573a\u5b9e\u9645\u5de5\u4f5c\u6d41\u8f93\u51fa\u4e2d\u7684\u53ef\u9760\u6027\uff0c\u800c\u4e0d\u53ea\u662f\u95ee\u7b54\u51c6\u786e\u7387\u3002\u8be5\u8bc4\u5206\u8986\u76d6\u4e8b\u5b9e\u51c6\u786e\u3001\u8bc1\u636e\u53ef\u8ffd\u6eaf\u3001\u6570\u503c\u4e00\u81f4\u3001\u6d41\u7a0b\u5b8c\u6574\u3001\u53ef\u5ba1\u8ba1\u7b49\u4e03\u4e2a\u7ef4\u5ea6\uff0c\u5e76\u5728\u591a\u7c7b SEC/\u5e76\u8d2d/\u80a1\u6743\u503a\u52a1\u53d1\u884c\u573a\u666f\u4e2d\u9a8c\u8bc1\uff0c\u663e\u793a\u95ed\u6e90\u524d\u6cbf\u6a21\u578b\u6574\u4f53\u9886\u5148\uff0c\u5dee\u8ddd\u4e3b\u8981\u4f53\u73b0\u5728\u68c0\u7d22\u4e0e\u7efc\u5408\u80fd\u529b\u4e0a\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Phonetic forced alignment is a key technique in phonetic research, yet existing alignment systems lack specialized models for low-resource language varieties. We address this by training text-dependent and text-independent aligners for Chengdu Mandarin using a 17-hour corpus and a custom G2P dictionary. We trained a text-dependent GMM-HMM model (Chengdu-MFA) and fine-tuned a pretrained audio encoder on frame classification with Chengdu-MFA\u0027s pseudo label for text-independent alignment (Chengdu-FC). Evaluation on an expert-annotated test set show that both methods significantly outperform Standard Mandarin baselines. Chengdu-MFA reduced average phone boundary differences by 31.8%, while Chengdu-FC achieved a 61.2% reduction. This work establishes a practical bootstrapping pipeline for developing accurate aligners for under-resourced varieties without labor- and time-intensive manual annotation.", "arxiv_id": "2607.21332", "arxiv_url": "https://arxiv.org/abs/2607.21332", "authors": ["Zhiheng Qian", "Aini Li", "Hai Hu", "Liang Zhao"], "brief": "\u672c\u6587\u9488\u5bf9\u4f4e\u8d44\u6e90\u65b9\u8a00/\u8bed\u8a00\u53d8\u4f53\u7684\u97f3\u7d20\u5f3a\u5236\u5bf9\u9f50\u95ee\u9898\uff0c\u4ee5\u6210\u90fd\u8bdd\u4e3a\u4f8b\u6784\u5efa\u4e8617\u5c0f\u65f6\u8bed\u6599\u548c\u81ea\u5b9a\u4e49G2P\u8bcd\u5178\uff0c\u8bad\u7ec3\u6587\u672c\u4f9d\u8d56\u7684GMM-HMM\u5bf9\u9f50\u5668\u5e76\u5fae\u8c03\u97f3\u9891\u7f16\u7801\u5668\u5b9e\u73b0\u6587\u672c\u65e0\u5173\u5bf9\u9f50\u3002\u5b9e\u9a8c\u663e\u793a\u4e24\u79cd\u65b9\u6cd5\u90fd\u663e\u8457\u4f18\u4e8e\u666e\u901a\u8bdd\u57fa\u7ebf\uff0c\u97f3\u7d20\u8fb9\u754c\u8bef\u5dee\u5206\u522b\u964d\u4f4e31.8%\u548c61.2%\uff0c\u63d0\u4f9b\u4e86\u4f4e\u6807\u6ce8\u6210\u672c\u7684\u5bf9\u9f50\u5668\u6784\u5efa\u6d41\u7a0b\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21332", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u97f3\u5904\u7406", "\u4f4e\u8d44\u6e90\u8bed\u8a00", "\u5f3a\u5236\u5bf9\u9f50", "\u65b9\u8a00"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21332v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Phonetic forced alignment for low-resource language varieties: Model training and evaluation on Chengdu Mandarin", "tldr": "\u672c\u6587\u9488\u5bf9\u4f4e\u8d44\u6e90\u65b9\u8a00/\u8bed\u8a00\u53d8\u4f53\u7684\u97f3\u7d20\u5f3a\u5236\u5bf9\u9f50\u95ee\u9898\uff0c\u4ee5\u6210\u90fd\u8bdd\u4e3a\u4f8b\u6784\u5efa\u4e8617\u5c0f\u65f6\u8bed\u6599\u548c\u81ea\u5b9a\u4e49G2P\u8bcd\u5178\uff0c\u8bad\u7ec3\u6587\u672c\u4f9d\u8d56\u7684GMM-HMM\u5bf9\u9f50\u5668\u5e76\u5fae\u8c03\u97f3\u9891\u7f16\u7801\u5668\u5b9e\u73b0\u6587\u672c\u65e0\u5173\u5bf9\u9f50\u3002\u5b9e\u9a8c\u663e\u793a\u4e24\u79cd\u65b9\u6cd5\u90fd\u663e\u8457\u4f18\u4e8e\u666e\u901a\u8bdd\u57fa\u7ebf\uff0c\u97f3\u7d20\u8fb9\u754c\u8bef\u5dee\u5206\u522b\u964d\u4f4e31.8%\u548c61.2%\uff0c\u63d0\u4f9b\u4e86\u4f4e\u6807\u6ce8\u6210\u672c\u7684\u5bf9\u9f50\u5668\u6784\u5efa\u6d41\u7a0b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) are increasingly used as tutors and thought partners, helping users reason through problems. While guidance from AI assistants can scaffold thinking and foster learning, such benefits depend on how they help--for instance, intervening too early or too frequently may hinder true learning and cognitive engagement. Yet how AI systems navigate intervention decisions during problem-solving remains poorly understood. Here, we introduce Int-Bench, a simulation-based benchmark for evaluating LLM interventions during learning. Int-Bench simulates a \"student\" solving a problem while a \"teacher\" monitors the student\u0027s reasoning and decides whether, when, and how to intervene. Across three domains--code debugging, mathematics, and brain teasers--we evaluate LLM teachers on the frequency and timing of interventions, as well as their impact on both immediate task success and generalization to new problems. We also compare LLMs to humans, finding that LLMs intervene more frequently and earlier than humans. Moreover, in contrast to humans, they tend to provide complete solutions rather than targeted hints. These findings suggest that current LLM assistants often optimize for short-term success rather than supporting the reasoning processes needed for deeper learning and long-term success.", "arxiv_id": "2607.21306", "arxiv_url": "https://arxiv.org/abs/2607.21306", "authors": ["Verona Teo", "Raghav Jain", "Tobias Gerstenberg", "Max Kleiman-Weiner"], "brief": "\u8bba\u6587\u63d0\u51fa Int-Bench\uff0c\u7528\u6a21\u62df\u5b66\u751f\u89e3\u9898\u6765\u8bc4\u4f30\u5927\u6a21\u578b\u52a9\u6559\u5728\u4ee3\u7801\u8c03\u8bd5\u3001\u6570\u5b66\u548c\u8111\u7b4b\u6025\u8f6c\u5f2f\u4e2d\u7684\u5e72\u9884\u9891\u7387\u3001\u65f6\u673a\u4e0e\u65b9\u5f0f\u3002\u7ed3\u679c\u53d1\u73b0\uff0c\u76f8\u6bd4\u4eba\u7c7b\u6559\u5e08\uff0cLLM \u66f4\u65e9\u3001\u66f4\u9891\u7e41\u5730\u4ecb\u5165\uff0c\u4e14\u66f4\u503e\u5411\u76f4\u63a5\u7ed9\u5b8c\u6574\u7b54\u6848\uff0c\u63d0\u5347\u77ed\u671f\u6210\u529f\u4f46\u53ef\u80fd\u524a\u5f31\u6df1\u5ea6\u5b66\u4e60\u4e0e\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CY", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21306", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u8f85\u5bfc", "\u4eba\u673a\u4ea4\u4e92", "\u5b66\u4e60\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21306v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AI Assistants Overassist", "tldr": "\u8bba\u6587\u63d0\u51fa Int-Bench\uff0c\u7528\u6a21\u62df\u5b66\u751f\u89e3\u9898\u6765\u8bc4\u4f30\u5927\u6a21\u578b\u52a9\u6559\u5728\u4ee3\u7801\u8c03\u8bd5\u3001\u6570\u5b66\u548c\u8111\u7b4b\u6025\u8f6c\u5f2f\u4e2d\u7684\u5e72\u9884\u9891\u7387\u3001\u65f6\u673a\u4e0e\u65b9\u5f0f\u3002\u7ed3\u679c\u53d1\u73b0\uff0c\u76f8\u6bd4\u4eba\u7c7b\u6559\u5e08\uff0cLLM \u66f4\u65e9\u3001\u66f4\u9891\u7e41\u5730\u4ecb\u5165\uff0c\u4e14\u66f4\u503e\u5411\u76f4\u63a5\u7ed9\u5b8c\u6574\u7b54\u6848\uff0c\u63d0\u5347\u77ed\u671f\u6210\u529f\u4f46\u53ef\u80fd\u524a\u5f31\u6df1\u5ea6\u5b66\u4e60\u4e0e\u6cdb\u5316\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) achieve strong generation and reasoning performance, but the Transformer architecture incurs high inference cost. Existing acceleration methods often rely on task-specific fine-tuning or training from scratch, increasing adaptation cost and limiting cross-task usability. We present an Adaptive Depth Sparse Framework (AdaDSF) that converts off-the-shelf pre-trained LLMs into depth-sparse models without full retraining. Our key insight is that layers contribute unequally to representation transformation, characterized by the cosine similarity between layer input and output hidden states. Based on this, AdaDSF assigns layer-wise token retention ratios from similarity statistics, uses a lightweight router to select informative tokens at each layer, and introduces a feature-preserving alignment objective to match intermediate and final representations between sparse and dense models. On GPT-NeoX and Qwen2.5 over language modeling and commonsense reasoning, AdaDSF substantially reduces inference FLOPs while preserving performance close to dense counterparts. Under comparable sparsity, AdaDSF consistently yields smaller accuracy degradation than strong baselines including MoD, D-LLM, and DLO.", "arxiv_id": "2607.21291", "arxiv_url": "https://arxiv.org/abs/2607.21291", "authors": ["Yidu Wu", "Xiang Wang", "Kejie Zhao", "Zhangchi Wang", "Qinghai Guo", "Xiaoying Tang"], "brief": "\u8bba\u6587\u63d0\u51fa AdaDSF\uff0c\u5c06\u73b0\u6210\u9884\u8bad\u7ec3\u5927\u8bed\u8a00\u6a21\u578b\u8f6c\u6362\u4e3a\u6df1\u5ea6\u7a00\u758f\u6a21\u578b\uff0c\u65e0\u9700\u5b8c\u6574\u91cd\u8bad\u7ec3\u3002\u65b9\u6cd5\u5229\u7528\u5c42\u8f93\u5165/\u8f93\u51fa\u9690\u85cf\u72b6\u6001\u7684\u4f59\u5f26\u76f8\u4f3c\u5ea6\u5206\u914d\u5404\u5c42 token \u4fdd\u7559\u6bd4\u4f8b\uff0c\u5e76\u7528\u8f7b\u91cf\u8def\u7531\u5668\u9009\u62e9\u91cd\u8981 token\uff0c\u540c\u65f6\u901a\u8fc7\u7279\u5f81\u5bf9\u9f50\u4fdd\u6301\u7a20\u5bc6\u6a21\u578b\u8868\u793a\u3002\u5b9e\u9a8c\u5728 GPT-NeoX \u548c Qwen2.5 \u4e0a\u663e\u8457\u964d\u4f4e\u63a8\u7406 FLOPs\uff0c\u4e14\u76f8\u6bd4 MoD\u3001D-LLM\u3001DLO \u7b49\u57fa\u7ebf\u7cbe\u5ea6\u4e0b\u964d\u66f4\u5c0f\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21291", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u52a0\u901f", "\u7a00\u758f\u5316", "\u63a8\u7406\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21291v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Adaptive Depth Sparse Framework: Similarity-Driven Resource Allocation for Pre-Trained LLMs", "tldr": "\u8bba\u6587\u63d0\u51fa AdaDSF\uff0c\u5c06\u73b0\u6210\u9884\u8bad\u7ec3\u5927\u8bed\u8a00\u6a21\u578b\u8f6c\u6362\u4e3a\u6df1\u5ea6\u7a00\u758f\u6a21\u578b\uff0c\u65e0\u9700\u5b8c\u6574\u91cd\u8bad\u7ec3\u3002\u65b9\u6cd5\u5229\u7528\u5c42\u8f93\u5165/\u8f93\u51fa\u9690\u85cf\u72b6\u6001\u7684\u4f59\u5f26\u76f8\u4f3c\u5ea6\u5206\u914d\u5404\u5c42 token \u4fdd\u7559\u6bd4\u4f8b\uff0c\u5e76\u7528\u8f7b\u91cf\u8def\u7531\u5668\u9009\u62e9\u91cd\u8981 token\uff0c\u540c\u65f6\u901a\u8fc7\u7279\u5f81\u5bf9\u9f50\u4fdd\u6301\u7a20\u5bc6\u6a21\u578b\u8868\u793a\u3002\u5b9e\u9a8c\u5728 GPT-NeoX \u548c Qwen2.5 \u4e0a\u663e\u8457\u964d\u4f4e\u63a8\u7406 FLOPs\uff0c\u4e14\u76f8\u6bd4 MoD\u3001D-LLM\u3001DLO \u7b49\u57fa\u7ebf\u7cbe\u5ea6\u4e0b\u964d\u66f4\u5c0f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Extracting structured content from news pages remains challenging due to heterogeneous HTML layouts, inconsistent markup, and substantial boilerplate such as navigation elements and advertisements. Rule-based news crawlers can achieve high extraction accuracy by encoding site-specific structure, but require manual configuration in order to generalize to new publishers. Large language models provide a more flexible alternative by reducing the need for handcrafted rules, but their high computational cost limits practical deployment. In this paper, we introduce news-crawler-LM, a small long-context language model fine-tuned on high-quality, human-validated extractions from the Fundus news-crawling library. Our model converts raw HTML into plaintext and structured JSON, including fields such as headline, author, publication date, and article body. In our experiments, news-crawler-LM outperforms strong baselines in HTML-to-Markdown and HTML-to-JSON extraction, improving performance by +4.8 BLEU and +6.1 METEOR in the HTML-to-Markdown task, and by +2.2 BLEU and +4.1 METEOR in the HTML-to-JSON task. However, we also observe that our model only slightly better compared to other rule-based parsing libraries on the HTML-to-plaintext task in evaluations on previously unseen publishers. We release all models and artifacts to the research community.", "arxiv_id": "2607.21284", "arxiv_url": "https://arxiv.org/abs/2607.21284", "authors": ["Pascal Stolzenburg", "Jonas Golde", "Max Dallabetta", "Alan Akbik"], "brief": "\u672c\u6587\u63d0\u51fa news-crawler-LM\uff0c\u4e00\u4e2a\u5c0f\u578b\u957f\u4e0a\u4e0b\u6587\u8bed\u8a00\u6a21\u578b\uff0c\u7528\u4e8e\u4ece\u65b0\u95fb\u7f51\u9875\u539f\u59cb HTML \u4e2d\u62bd\u53d6\u6b63\u6587\u53ca\u6807\u9898\u3001\u4f5c\u8005\u3001\u65e5\u671f\u7b49\u7ed3\u6784\u5316 JSON \u4fe1\u606f\u3002\u76f8\u6bd4\u5f3a\u57fa\u7ebf\uff0c\u5b83\u5728 HTML-to-Markdown \u548c HTML-to-JSON \u4efb\u52a1\u4e0a\u53d6\u5f97\u660e\u663e\u63d0\u5347\uff0c\u4f46\u5728\u672a\u89c1\u8fc7\u53d1\u5e03\u65b9\u7684\u7eaf\u6587\u672c\u62bd\u53d6\u4e0a\u4ec5\u7565\u4f18\u4e8e\u89c4\u5219\u89e3\u6790\u5e93\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21284", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4fe1\u606f\u62bd\u53d6", "\u957f\u4e0a\u4e0b\u6587\u6a21\u578b", "\u65b0\u95fb\u722c\u866b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21284v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "news-crawler-LM: A Small Long-Context Model For High-Quality News Crawling", "tldr": "\u672c\u6587\u63d0\u51fa news-crawler-LM\uff0c\u4e00\u4e2a\u5c0f\u578b\u957f\u4e0a\u4e0b\u6587\u8bed\u8a00\u6a21\u578b\uff0c\u7528\u4e8e\u4ece\u65b0\u95fb\u7f51\u9875\u539f\u59cb HTML \u4e2d\u62bd\u53d6\u6b63\u6587\u53ca\u6807\u9898\u3001\u4f5c\u8005\u3001\u65e5\u671f\u7b49\u7ed3\u6784\u5316 JSON \u4fe1\u606f\u3002\u76f8\u6bd4\u5f3a\u57fa\u7ebf\uff0c\u5b83\u5728 HTML-to-Markdown \u548c HTML-to-JSON \u4efb\u52a1\u4e0a\u53d6\u5f97\u660e\u663e\u63d0\u5347\uff0c\u4f46\u5728\u672a\u89c1\u8fc7\u53d1\u5e03\u65b9\u7684\u7eaf\u6587\u672c\u62bd\u53d6\u4e0a\u4ec5\u7565\u4f18\u4e8e\u89c4\u5219\u89e3\u6790\u5e93\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) have developed rapidly and become valuable tools in everyday life. However, how to align LLMs to a particular set of human values is still an open problem. Recent studies show that instruction tuning has strong potential for zero-shot tasks and may serve as an effective approach to addressing value alignment. Nevertheless, although many datasets for instruction tuning already exist, they are not specifically designed around moral scenarios and behaviors. We construct a unified moral-value dataset that can be directly used for instruction tuning. This dataset is built upon existing moral-value datasets by merging them into a unified corpus and converting them into an instruction-response format. We show that training on a mixed dataset combining general task datasets with our dataset preserves general-task performance, and we report preliminary observations on how the mixing ratio affects value-oriented task performance. Our work provides a moral-value dataset for instruction tuning and offers a useful resource for further alignment research. The dataset is available at https://huggingface.co/datasets/teohzzh/value-for-instruction-tuning.", "arxiv_id": "2607.21279", "arxiv_url": "https://arxiv.org/abs/2607.21279", "authors": ["Zhaohui Zeng", "Florian Mai"], "brief": "\u672c\u6587\u6784\u5efa\u4e86\u4e00\u4e2a\u7edf\u4e00\u7684\u9053\u5fb7\u4ef7\u503c\u6570\u636e\u96c6\uff0c\u5c06\u5df2\u6709\u9053\u5fb7\u4ef7\u503c\u76f8\u5173\u6570\u636e\u96c6\u5408\u5e76\u5e76\u8f6c\u5316\u4e3a\u6307\u4ee4-\u56de\u7b54\u683c\u5f0f\uff0c\u53ef\u76f4\u63a5\u7528\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u6307\u4ee4\u5fae\u8c03\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5c06\u8be5\u6570\u636e\u4e0e\u901a\u7528\u4efb\u52a1\u6570\u636e\u6df7\u5408\u8bad\u7ec3\u80fd\u57fa\u672c\u4fdd\u6301\u901a\u7528\u80fd\u529b\uff0c\u5e76\u521d\u6b65\u5206\u6790\u4e86\u6df7\u5408\u6bd4\u4f8b\u5bf9\u4ef7\u503c\u5bfc\u5411\u4efb\u52a1\u8868\u73b0\u7684\u5f71\u54cd\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21279", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u4ef7\u503c\u5bf9\u9f50", "\u6307\u4ee4\u5fae\u8c03", "\u6570\u636e\u96c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21279v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A Unified Moral-Value Dataset for Instruction Tuning", "tldr": "\u672c\u6587\u6784\u5efa\u4e86\u4e00\u4e2a\u7edf\u4e00\u7684\u9053\u5fb7\u4ef7\u503c\u6570\u636e\u96c6\uff0c\u5c06\u5df2\u6709\u9053\u5fb7\u4ef7\u503c\u76f8\u5173\u6570\u636e\u96c6\u5408\u5e76\u5e76\u8f6c\u5316\u4e3a\u6307\u4ee4-\u56de\u7b54\u683c\u5f0f\uff0c\u53ef\u76f4\u63a5\u7528\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u6307\u4ee4\u5fae\u8c03\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5c06\u8be5\u6570\u636e\u4e0e\u901a\u7528\u4efb\u52a1\u6570\u636e\u6df7\u5408\u8bad\u7ec3\u80fd\u57fa\u672c\u4fdd\u6301\u901a\u7528\u80fd\u529b\uff0c\u5e76\u521d\u6b65\u5206\u6790\u4e86\u6df7\u5408\u6bd4\u4f8b\u5bf9\u4ef7\u503c\u5bfc\u5411\u4efb\u52a1\u8868\u73b0\u7684\u5f71\u54cd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present CUP, a Greek book retrieval benchmark consisting of 868 catalog records and 104 expert-annotated queries with graded relevance judgments. We evaluate sparse (BM25), dense (sentence-transformers), hybrid, and LLM-assisted retrieval methods in this book-search setting. Multilingual embeddings outperform Greek-specific models, while hybrid retrieval performs best overall. A query-level analysis shows that BM25 excels at named-entity queries, while dense and hybrid methods improve natural-language, noisy, cross-lingual, and concept queries. Field-aware prompting has model-specific effects, while LLM TOC summarization improves TOC-only retrieval and LLM post-filtering improves early-stage retrieval at a high cost. Overall, CUP enables real-world evaluation of Greek retrieval across lexical, semantic, noisy, and cross-lingual queries.", "arxiv_id": "2607.21274", "arxiv_url": "https://arxiv.org/abs/2607.21274", "authors": ["Katerina Papantoniou", "Panagiotis Papadakos", "Theodore Patkos", "Dimitris Garefalakis", "Nikos Vardakis", "Dimitris Plexousakis"], "brief": "\u8bba\u6587\u63d0\u51fa CUP\uff0c\u4e00\u4e2a\u9762\u5411\u5e0c\u814a\u8bed\u56fe\u4e66\u68c0\u7d22\u7684\u771f\u5b9e\u57fa\u51c6\uff0c\u5305\u542b868\u6761\u76ee\u5f55\u8bb0\u5f55\u548c104\u4e2a\u4e13\u5bb6\u6807\u6ce8\u67e5\u8be2\u3002\u5b9e\u9a8c\u6bd4\u8f83 BM25\u3001\u7a20\u5bc6\u5d4c\u5165\u3001\u6df7\u5408\u68c0\u7d22\u548c LLM \u8f85\u52a9\u65b9\u6cd5\uff0c\u53d1\u73b0\u591a\u8bed\u5d4c\u5165\u4f18\u4e8e\u5e0c\u814a\u8bed\u4e13\u7528\u6a21\u578b\uff0c\u6df7\u5408\u68c0\u7d22\u603b\u4f53\u6700\u4f73\uff1bLLM \u6458\u8981\u548c\u540e\u8fc7\u6ee4\u5728\u7279\u5b9a\u9636\u6bb5\u6709\u6548\u4f46\u6210\u672c\u8f83\u9ad8\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21274", "impact_score": 4, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4fe1\u606f\u68c0\u7d22", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6587\u672c\u5d4c\u5165", "\u6570\u636e\u96c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21274v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A Comparative Evaluation of Embeddings and LLMs in a Greek Book Publisher Setting - The CUP Dataset", "tldr": "\u8bba\u6587\u63d0\u51fa CUP\uff0c\u4e00\u4e2a\u9762\u5411\u5e0c\u814a\u8bed\u56fe\u4e66\u68c0\u7d22\u7684\u771f\u5b9e\u57fa\u51c6\uff0c\u5305\u542b868\u6761\u76ee\u5f55\u8bb0\u5f55\u548c104\u4e2a\u4e13\u5bb6\u6807\u6ce8\u67e5\u8be2\u3002\u5b9e\u9a8c\u6bd4\u8f83 BM25\u3001\u7a20\u5bc6\u5d4c\u5165\u3001\u6df7\u5408\u68c0\u7d22\u548c LLM \u8f85\u52a9\u65b9\u6cd5\uff0c\u53d1\u73b0\u591a\u8bed\u5d4c\u5165\u4f18\u4e8e\u5e0c\u814a\u8bed\u4e13\u7528\u6a21\u578b\uff0c\u6df7\u5408\u68c0\u7d22\u603b\u4f53\u6700\u4f73\uff1bLLM \u6458\u8981\u548c\u540e\u8fc7\u6ee4\u5728\u7279\u5b9a\u9636\u6bb5\u6709\u6548\u4f46\u6210\u672c\u8f83\u9ad8\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Slang is a central component of everyday language, reflecting linguistic creativity, social identity, and cultural change, yet its dy- namic and non-standard nature makes it difficult to model computationally. We present the first large-scale computational study of slang.gr, a crowdsourced lexicon of Greek non-standard language, combining lexical content, user-generated tags, and interaction data. To enable the systematic analysis, we map noisy folksonomic tags to a structured multi-layer taxonomy capturing both semantic categories and sociolinguistic metadata. Using this representation, we analyze the linguistic structure of Greek slang and the behavior of its contributor community. We find that slang is strongly centered on person-related and evaluative language, exhibits high morphological creativity, and is shaped by highly skewed participation with short user lifespans and overlapping communities. Building on these signals, we introduce a community-based confidence score for definitions that integrates user roles, interaction patterns, and moderation signals. Our results show that taxonomy-based representations improve interpretability while retaining meaningful aspects of behavioral structure, enabling a more structured and interpretable analysis of confidence signals. Overall, this work establishes slang.gr as a computational resource for non-standard Greek and provides a foundation for sociolinguistic NLP, bias analysis, and the study of informal language in LLMs.", "arxiv_id": "2607.21255", "arxiv_url": "https://arxiv.org/abs/2607.21255", "authors": ["Panagiotis Papadakos", "Katerina Papantoniou", "Dimitris Plexousakis"], "brief": "\u672c\u6587\u5bf9\u5e0c\u814a\u8bed\u975e\u6807\u51c6\u8bed\u8a00\u4f17\u5305\u8bcd\u5178 slang.gr \u8fdb\u884c\u4e86\u9996\u4e2a\u5927\u89c4\u6a21\u8ba1\u7b97\u7814\u7a76\uff0c\u6574\u5408\u8bcd\u6761\u3001\u7528\u6237\u6807\u7b7e\u4e0e\u4ea4\u4e92\u6570\u636e\uff0c\u5e76\u5c06\u566a\u58f0\u6807\u7b7e\u6620\u5c04\u5230\u591a\u5c42\u7ed3\u6784\u5316\u5206\u7c7b\u4f53\u7cfb\u3002\u7814\u7a76\u63ed\u793a\u5e0c\u814a\u4fda\u8bed\u5728\u4eba\u7269\u76f8\u5173\u548c\u8bc4\u4ef7\u6027\u8868\u8fbe\u4e0a\u9ad8\u5ea6\u96c6\u4e2d\u3001\u5f62\u6001\u521b\u9020\u6027\u5f3a\uff0c\u5e76\u63d0\u51fa\u57fa\u4e8e\u793e\u533a\u884c\u4e3a\u7684\u91ca\u4e49\u7f6e\u4fe1\u5ea6\u8bc4\u5206\uff0c\u63d0\u9ad8\u4e86\u53ef\u89e3\u91ca\u6027\u5206\u6790\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21255", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u7136\u8bed\u8a00\u5904\u7406", "\u793e\u4f1a\u8bed\u8a00\u5b66", "\u975e\u6807\u51c6\u8bed\u8a00", "\u4f17\u5305\u8d44\u6e90"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21255v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "slang.gr as a Large-Scale Crowdsourced Resource for Non-Standard Greek", "tldr": "\u672c\u6587\u5bf9\u5e0c\u814a\u8bed\u975e\u6807\u51c6\u8bed\u8a00\u4f17\u5305\u8bcd\u5178 slang.gr \u8fdb\u884c\u4e86\u9996\u4e2a\u5927\u89c4\u6a21\u8ba1\u7b97\u7814\u7a76\uff0c\u6574\u5408\u8bcd\u6761\u3001\u7528\u6237\u6807\u7b7e\u4e0e\u4ea4\u4e92\u6570\u636e\uff0c\u5e76\u5c06\u566a\u58f0\u6807\u7b7e\u6620\u5c04\u5230\u591a\u5c42\u7ed3\u6784\u5316\u5206\u7c7b\u4f53\u7cfb\u3002\u7814\u7a76\u63ed\u793a\u5e0c\u814a\u4fda\u8bed\u5728\u4eba\u7269\u76f8\u5173\u548c\u8bc4\u4ef7\u6027\u8868\u8fbe\u4e0a\u9ad8\u5ea6\u96c6\u4e2d\u3001\u5f62\u6001\u521b\u9020\u6027\u5f3a\uff0c\u5e76\u63d0\u51fa\u57fa\u4e8e\u793e\u533a\u884c\u4e3a\u7684\u91ca\u4e49\u7f6e\u4fe1\u5ea6\u8bc4\u5206\uff0c\u63d0\u9ad8\u4e86\u53ef\u89e3\u91ca\u6027\u5206\u6790\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Token cramming compresses sequences into learned embeddings with near-perfect reconstruction, but fixed token budgets and 99\\% accuracy thresholds leave it unclear whether residual errors reflect optimization failures or fundamental limits. We introduce progressive cramming, which grows the target prefix token-by-token, stopping only when reconstruction is no longer achievable within a fixed optimization budget. Progressive trajectories occupy low-dimensional structure in embedding space. Prepending a crammed embedding causes a moderate but consistent accuracy drop on multiple-choice benchmarks even with the original prefix in context, and collapses capability almost entirely under generative evaluation. Causal attention-knockout interventions trace this degradation to the embedding\u0027s interactions in the model\u0027s early layers. These results position progressive cramming as a tool for studying compression limits and show that perfect reconstruction - achievable through brittle steering rather than transferable semantics - is insufficient for meaningful compression.", "arxiv_id": "2607.21231", "arxiv_url": "https://arxiv.org/abs/2607.21231", "authors": ["Dmitrii Tarasov", "Timofei Lashukov", "Elizaveta Goncharova", "Andrey Kuznetsov"], "brief": "\u672c\u6587\u63d0\u51fa\u6e10\u8fdb\u5f0f token cramming\uff1a\u9010\u4e2a\u589e\u52a0\u76ee\u6807\u524d\u7f00\u957f\u5ea6\uff0c\u5728\u56fa\u5b9a\u4f18\u5316\u9884\u7b97\u5185\u6d4b\u8bd5\u53ef\u91cd\u6784\u6027\uff0c\u7528\u4e8e\u533a\u5206\u4f18\u5316\u5931\u8d25\u4e0e\u538b\u7f29\u6781\u9650\u3002\u5b9e\u9a8c\u53d1\u73b0\u5373\u4f7f\u80fd\u8fd1\u4e4e\u5b8c\u7f8e\u91cd\u6784\u6587\u672c\uff0c\u538b\u7f29\u5d4c\u5165\u4e5f\u4f1a\u5728\u9009\u62e9\u9898\u548c\u751f\u6210\u8bc4\u6d4b\u4e2d\u663e\u8457\u635f\u5bb3\u6a21\u578b\u80fd\u529b\uff0c\u95ee\u9898\u4e3b\u8981\u6765\u81ea\u65e9\u671f\u5c42\u6ce8\u610f\u529b\u4ea4\u4e92\uff0c\u8bf4\u660e\u5b8c\u7f8e\u91cd\u6784\u4e0d\u7b49\u4e8e\u5177\u5907\u53ef\u8fc1\u79fb\u8bed\u4e49\u538b\u7f29\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21231", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u8a00\u6a21\u578b", "\u8868\u793a\u5b66\u4e60", "\u6a21\u578b\u538b\u7f29", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21231v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Progressive Cramming: Reliable Token Compression and What It Reveals", "tldr": "\u672c\u6587\u63d0\u51fa\u6e10\u8fdb\u5f0f token cramming\uff1a\u9010\u4e2a\u589e\u52a0\u76ee\u6807\u524d\u7f00\u957f\u5ea6\uff0c\u5728\u56fa\u5b9a\u4f18\u5316\u9884\u7b97\u5185\u6d4b\u8bd5\u53ef\u91cd\u6784\u6027\uff0c\u7528\u4e8e\u533a\u5206\u4f18\u5316\u5931\u8d25\u4e0e\u538b\u7f29\u6781\u9650\u3002\u5b9e\u9a8c\u53d1\u73b0\u5373\u4f7f\u80fd\u8fd1\u4e4e\u5b8c\u7f8e\u91cd\u6784\u6587\u672c\uff0c\u538b\u7f29\u5d4c\u5165\u4e5f\u4f1a\u5728\u9009\u62e9\u9898\u548c\u751f\u6210\u8bc4\u6d4b\u4e2d\u663e\u8457\u635f\u5bb3\u6a21\u578b\u80fd\u529b\uff0c\u95ee\u9898\u4e3b\u8981\u6765\u81ea\u65e9\u671f\u5c42\u6ce8\u610f\u529b\u4ea4\u4e92\uff0c\u8bf4\u660e\u5b8c\u7f8e\u91cd\u6784\u4e0d\u7b49\u4e8e\u5177\u5907\u53ef\u8fc1\u79fb\u8bed\u4e49\u538b\u7f29\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Ambiguous user requests make clarification a sequential decision problem for conversational LLM assistants: they must decide whether to ask, what to ask, when to stop, and when to answer. We introduce RegretBench, a multi-turn benchmark that evaluates clarification as policy behavior rather than isolated question quality. RegretBench provides a hidden-intent formulation of ambiguity, supports free-form interaction grounded in semantic-state tracking, and introduces a regret-based objective that measures how much value a model loses relative to a reference clarification policy. Experiments on open-domain QA and product recommendation scenarios show that final success alone is insufficient, as models with similar accuracy can differ substantially in efficiency, robustness to user behaviors, and stopping decisions. By jointly measuring intent resolution, interaction cost, ineffective clarification, and regret, RegretBench reveals whether models clarify usefully and efficiently. Our results show that effective clarification requires more than plausible questions: models must ask the right question at the right time and stop once the user\u0027s intended meaning is clear.", "arxiv_id": "2607.21143", "arxiv_url": "https://arxiv.org/abs/2607.21143", "authors": ["Minh Ngoc Ta", "My Anh Tran Nguyen", "Duong D. Nguyen", "Yuxia Wang", "Preslav Nakov"], "brief": "\u8bba\u6587\u63d0\u51fa RegretBench\uff0c\u7528\u591a\u8f6e\u9690\u85cf\u610f\u56fe\u8bbe\u5b9a\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u7684\u6f84\u6e05\u7b56\u7565\uff0c\u800c\u4e0d\u53ea\u770b\u5355\u4e2a\u95ee\u9898\u8d28\u91cf\u3002\u8be5\u57fa\u51c6\u7528\u57fa\u4e8e\u540e\u6094\u503c\u7684\u76ee\u6807\u8861\u91cf\u6a21\u578b\u76f8\u5bf9\u53c2\u8003\u7b56\u7565\u7684\u4ef7\u503c\u635f\u5931\uff0c\u53d1\u73b0\u76f8\u540c\u6700\u7ec8\u51c6\u786e\u7387\u7684\u6a21\u578b\u5728\u6548\u7387\u3001\u9c81\u68d2\u6027\u548c\u505c\u6b62\u51b3\u7b56\u4e0a\u5dee\u5f02\u660e\u663e\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21143", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u8f6e\u5bf9\u8bdd", "\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21143v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "One More Turn, Less Regret: A Regret-Based Multi-Turn Benchmark for LLMs\u0027 Clarification Policies", "tldr": "\u8bba\u6587\u63d0\u51fa RegretBench\uff0c\u7528\u591a\u8f6e\u9690\u85cf\u610f\u56fe\u8bbe\u5b9a\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u7684\u6f84\u6e05\u7b56\u7565\uff0c\u800c\u4e0d\u53ea\u770b\u5355\u4e2a\u95ee\u9898\u8d28\u91cf\u3002\u8be5\u57fa\u51c6\u7528\u57fa\u4e8e\u540e\u6094\u503c\u7684\u76ee\u6807\u8861\u91cf\u6a21\u578b\u76f8\u5bf9\u53c2\u8003\u7b56\u7565\u7684\u4ef7\u503c\u635f\u5931\uff0c\u53d1\u73b0\u76f8\u540c\u6700\u7ec8\u51c6\u786e\u7387\u7684\u6a21\u578b\u5728\u6548\u7387\u3001\u9c81\u68d2\u6027\u548c\u505c\u6b62\u51b3\u7b56\u4e0a\u5dee\u5f02\u660e\u663e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We propose a Reinforcement Learning (RL) method to directly optimize the faithfulness of self-explanations - the extent to which a model\u0027s generated reasoning accurately reflects its internal decision-making process. While existing work focuses on evaluating faithfulness or using inference-time prompting frameworks to improve an LLM\u0027s self-explanation\u0027s tractability, these approaches do not provide a mechanism to directly optimize a model\u0027s parameters to generate faithful self-explanations. We bridge this gap by modifying existing faithfulness metrics into an RL training objective. We investigate (1) if models can be trained to accurately detect factors that affect their decisions, and (2) whether RL can directly optimize for the disclosure of these factors thereby improving LLM self-explanations\u0027 faithfulness. We experiment with two intervention types: random-word insertions and user-bias insertions, using a per-sample reward derived from the Phi-CCT correlation metric. RL fine-tuned Llama3.1-8B and Qwen3-8B show substantial improvements on the Phi-CCT faithfulness metric, with in-distribution scores rising from near-zero to as high as 0.664, and out-of-distribution scores reaching up to 0.691 on held-out tasks such as StrategyQA. Cross-intervention generalization is weaker but more interesting: a priori we would not expect a model trained only on random word insertions to generalize to user-bias phrases, yet Llama3.1-8B shows non-zero transfer in this direction. The reverse direction and Qwen3-8B do not replicate this, indicating model-dependent and setup-dependent effects we cannot yet explain. Lastly we analyze model behavior to rule out reward gaming behaviors that often plague RL training. Ultimately, we show that models can be trained to implicitly identify influential factors and disclose them, offering a scalable path toward reducing unfaithful reasoning in LLMs.", "arxiv_id": "2607.21090", "arxiv_url": "https://arxiv.org/abs/2607.21090", "authors": ["Yeoktatt Cheah", "Mar\u00eda P\u00e9rez-Ortiz", "Noah Y. Siegel", "Oana-Maria Camburu"], "brief": "\u672c\u6587\u63d0\u51fa\u7528\u5f3a\u5316\u5b66\u4e60\u76f4\u63a5\u4f18\u5316\u5927\u8bed\u8a00\u6a21\u578b\u81ea\u6211\u89e3\u91ca\u7684\u5fe0\u5b9e\u6027\uff0c\u8ba9\u751f\u6210\u7684\u63a8\u7406\u66f4\u51c6\u786e\u53cd\u6620\u6a21\u578b\u5185\u90e8\u51b3\u7b56\u56e0\u7d20\u3002\u901a\u8fc7\u5c06 Phi-CCT \u7b49\u5fe0\u5b9e\u6027\u6307\u6807\u6539\u9020\u6210\u9010\u6837\u672c\u5956\u52b1\uff0c\u5bf9 Llama3.1-8B \u548c Qwen3-8B \u5fae\u8c03\u540e\uff0c\u5206\u5e03\u5185\u5916\u4efb\u52a1\u7684\u5fe0\u5b9e\u6027\u5206\u6570\u663e\u8457\u63d0\u5347\uff0c\u5e76\u521d\u6b65\u6392\u9664\u4e86\u5956\u52b1\u6295\u673a\u73b0\u8c61\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21090", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u53ef\u89e3\u91ca\u6027", "\u6a21\u578b\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21090v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Training Large Language Models for Self-Explanation Faithfulness", "tldr": "\u672c\u6587\u63d0\u51fa\u7528\u5f3a\u5316\u5b66\u4e60\u76f4\u63a5\u4f18\u5316\u5927\u8bed\u8a00\u6a21\u578b\u81ea\u6211\u89e3\u91ca\u7684\u5fe0\u5b9e\u6027\uff0c\u8ba9\u751f\u6210\u7684\u63a8\u7406\u66f4\u51c6\u786e\u53cd\u6620\u6a21\u578b\u5185\u90e8\u51b3\u7b56\u56e0\u7d20\u3002\u901a\u8fc7\u5c06 Phi-CCT \u7b49\u5fe0\u5b9e\u6027\u6307\u6807\u6539\u9020\u6210\u9010\u6837\u672c\u5956\u52b1\uff0c\u5bf9 Llama3.1-8B \u548c Qwen3-8B \u5fae\u8c03\u540e\uff0c\u5206\u5e03\u5185\u5916\u4efb\u52a1\u7684\u5fe0\u5b9e\u6027\u5206\u6570\u663e\u8457\u63d0\u5347\uff0c\u5e76\u521d\u6b65\u6392\u9664\u4e86\u5956\u52b1\u6295\u673a\u73b0\u8c61\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present VibeVoice-ASR-BitNet, a compressed variant of VibeVoice-ASR optimized for real-time inference on edge CPUs. We apply heterogeneous quantization tailored to the computational characteristics of each stage: the VAE acoustic tokenizer uses full-pipeline INT8 quantization (I8_S) with kernel fusion and SIMD optimization, while the autoregressive language model adopts BitNet-style ternary weights (I2_S). To preserve accuracy under aggressive compression, we employ a progressive quantization-aware training strategy. For inference, we implement custom SIMD kernels and fused operators within the ggml framework targeting both ARM and x86 platforms, achieving real-time recognition with RTF \u003c 1 using as few as 3 CPU threads. VibeVoice-ASR-BitNet is 1.6-2.3x faster than Whisper.cpp at comparable model sizes (~1.6 GB), with only modest accuracy degradation compared to the FP16 baseline.", "arxiv_id": "2607.21075", "arxiv_url": "https://arxiv.org/abs/2607.21075", "authors": ["Songchen Xu", "Ting Song", "Shaohan Huang", "Zhiliang Peng", "Yan Xia", "Yujie Tu", "Xin Huang", "Jianwei Yu", "Li Dong", "Furu Wei"], "brief": "\u672c\u6587\u63d0\u51fa VibeVoice-ASR-BitNet\uff0c\u5c06\u8bed\u97f3\u8bc6\u522b\u6a21\u578b\u901a\u8fc7\u5206\u9636\u6bb5\u5f02\u6784\u91cf\u5316\u538b\u7f29\u5230\u9002\u5408\u8fb9\u7f18 CPU \u5b9e\u65f6\u63a8\u7406\u3002\u5176\u5728 VAE \u58f0\u5b66 tokenizer \u4e0a\u4f7f\u7528 INT8\uff0c\u5728\u81ea\u56de\u5f52\u8bed\u8a00\u6a21\u578b\u4e0a\u4f7f\u7528 BitNet \u4e09\u503c\u6743\u91cd\uff0c\u5e76\u7ed3\u5408\u91cf\u5316\u611f\u77e5\u8bad\u7ec3\u3001SIMD \u4e0e\u7b97\u5b50\u878d\u5408\uff0c\u5b9e\u73b0 3 \u4e2a CPU \u7ebf\u7a0b\u4e0b RTF\u003c1\uff0c\u901f\u5ea6\u6bd4 Whisper.cpp \u5feb 1.6-2.3 \u500d\u4e14\u7cbe\u5ea6\u4ec5\u5c0f\u5e45\u4e0b\u964d\u3002", "categories": ["cs.SD", "cs.CL", "eess.AS"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21075", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u97f3\u8bc6\u522b", "\u6a21\u578b\u91cf\u5316", "\u8fb9\u7f18\u8ba1\u7b97", "\u5b9e\u65f6\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21075v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "VibeVoice-ASR-BitNet Technical Report", "tldr": "\u672c\u6587\u63d0\u51fa VibeVoice-ASR-BitNet\uff0c\u5c06\u8bed\u97f3\u8bc6\u522b\u6a21\u578b\u901a\u8fc7\u5206\u9636\u6bb5\u5f02\u6784\u91cf\u5316\u538b\u7f29\u5230\u9002\u5408\u8fb9\u7f18 CPU \u5b9e\u65f6\u63a8\u7406\u3002\u5176\u5728 VAE \u58f0\u5b66 tokenizer \u4e0a\u4f7f\u7528 INT8\uff0c\u5728\u81ea\u56de\u5f52\u8bed\u8a00\u6a21\u578b\u4e0a\u4f7f\u7528 BitNet \u4e09\u503c\u6743\u91cd\uff0c\u5e76\u7ed3\u5408\u91cf\u5316\u611f\u77e5\u8bad\u7ec3\u3001SIMD \u4e0e\u7b97\u5b50\u878d\u5408\uff0c\u5b9e\u73b0 3 \u4e2a CPU \u7ebf\u7a0b\u4e0b RTF\u003c1\uff0c\u901f\u5ea6\u6bd4 Whisper.cpp \u5feb 1.6-2.3 \u500d\u4e14\u7cbe\u5ea6\u4ec5\u5c0f\u5e45\u4e0b\u964d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large Language Models (LLMs) have demonstrated remarkable ability in generating personalized content by leveraging user histories and contextual cues. However, most existing personalization approaches rely on implicit representations within model parameters, making it difficult to interpret user-specific preferences or effectively handle long-context dependencies. To address these challenges, we propose PrefReward, a novel preference-aware generative framework that explicitly models user styles through a structured preference matrix and integrates it into the decoding process as a reward signal. PrefReward consists of two stages: (1) extracting a user-specific preference matrix that summarizes individual stylistic tendencies, and (2) using the matrix to guide generation via a KL-divergence-based reward function. Experiments on the LongLaMP dataset show that PrefReward outperforms non-personalized and retrieval-based baselines in both generation quality and personalization interpretability.", "arxiv_id": "2607.21067", "arxiv_url": "https://arxiv.org/abs/2607.21067", "authors": ["Yue Wu", "Chengbing Wang", "Yimeng Bai", "Xiaoyan Zhao", "Yang Zhang", "Fuli Feng"], "brief": "\u672c\u6587\u63d0\u51fa PrefReward\uff0c\u901a\u8fc7\u663e\u5f0f\u5b66\u4e60\u7528\u6237\u504f\u597d\u77e9\u9635\u6765\u523b\u753b\u4e2a\u4eba\u5199\u4f5c\u98ce\u683c\uff0c\u5e76\u5728\u89e3\u7801\u9636\u6bb5\u5c06\u5176\u4f5c\u4e3a\u57fa\u4e8e KL \u6563\u5ea6\u7684\u5956\u52b1\u4fe1\u53f7\u5f15\u5bfc\u751f\u6210\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728 LongLaMP \u6570\u636e\u96c6\u4e0a\u4f18\u4e8e\u975e\u4e2a\u6027\u5316\u548c\u68c0\u7d22\u5f0f\u57fa\u7ebf\uff0c\u540c\u65f6\u63d0\u5347\u751f\u6210\u8d28\u91cf\u4e0e\u504f\u597d\u53ef\u89e3\u91ca\u6027\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21067", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e2a\u6027\u5316\u751f\u6210", "\u5927\u8bed\u8a00\u6a21\u578b", "\u504f\u597d\u5b66\u4e60", "\u6587\u672c\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21067v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PrefReward: Learning User Preference Matrix for Personalized Text Generation", "tldr": "\u672c\u6587\u63d0\u51fa PrefReward\uff0c\u901a\u8fc7\u663e\u5f0f\u5b66\u4e60\u7528\u6237\u504f\u597d\u77e9\u9635\u6765\u523b\u753b\u4e2a\u4eba\u5199\u4f5c\u98ce\u683c\uff0c\u5e76\u5728\u89e3\u7801\u9636\u6bb5\u5c06\u5176\u4f5c\u4e3a\u57fa\u4e8e KL \u6563\u5ea6\u7684\u5956\u52b1\u4fe1\u53f7\u5f15\u5bfc\u751f\u6210\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728 LongLaMP \u6570\u636e\u96c6\u4e0a\u4f18\u4e8e\u975e\u4e2a\u6027\u5316\u548c\u68c0\u7d22\u5f0f\u57fa\u7ebf\uff0c\u540c\u65f6\u63d0\u5347\u751f\u6210\u8d28\u91cf\u4e0e\u504f\u597d\u53ef\u89e3\u91ca\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Almost every large language model that reaches a broad audience is quantized: trained in full precision, then compressed for efficiency. This step is assumed harmless and its safety is rarely re-checked. We find its principal side effect is increased bias that standard safety evaluation misses. Holding the model, its training, and the prompts fixed, a quantized model still refuses harmful requests, still avoids over-refusing benign prompts, and still selects the unbiased multiple-choice answer. Yet asked an open-ended question, the same model volunteers stereotypes in all eight languages we probe, in roughly one in four open-ended answers under an independent judge (~24% to ~27% across the compression ladder): it passes every standard check and still reaches users measurably more biased. The selective gap is a robust finding; whether open-ended bias further increases with compression is less certain, sensitive to the judge that scores it. We address both with \\textbf{QuantiBias}, a benchmark that pairs a generative, multilingual stereotype probe with the refusal and multiple-choice controls that isolate open-ended generation, contrasts each build with and without reasoning, and rates the content severity of what it generates. Across two backbone models (Qwen and Gemma), a five-family screen, and eight benchmarks, quantizers allocate their extra precision by capability data that carries no bias-prevention signal, and reasoning before answering roughly halves the effect on some families while doing nothing on others. A quantized build must be re-evaluated for open-ended bias, not only on the short-form safeguards it already passes.", "arxiv_id": "2607.21063", "arxiv_url": "https://arxiv.org/abs/2607.21063", "authors": ["Emilio Ferrara"], "brief": "\u8bba\u6587\u63d0\u51fa QuantiBias \u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u91cf\u5316\u540e\u5728\u5f00\u653e\u5f0f\u751f\u6210\u4e2d\u7684\u504f\u89c1\u53d8\u5316\uff0c\u5e76\u914d\u5957\u62d2\u7b54\u3001\u591a\u9009\u7b49\u63a7\u5236\u9879\u3002\u7814\u7a76\u53d1\u73b0\u91cf\u5316\u6a21\u578b\u4ecd\u80fd\u901a\u8fc7\u5e38\u89c4\u5b89\u5168\u68c0\u67e5\uff0c\u4f46\u5728\u591a\u8bed\u8a00\u5f00\u653e\u5f0f\u56de\u7b54\u4e2d\u66f4\u5bb9\u6613\u4e3b\u52a8\u751f\u6210\u523b\u677f\u5370\u8c61\uff1b\u63a8\u7406\u6b65\u9aa4\u53ef\u5728\u90e8\u5206\u6a21\u578b\u65cf\u4e2d\u7f13\u89e3\u8be5\u95ee\u9898\u4f46\u5e76\u4e0d\u7a33\u5b9a\u3002", "categories": ["cs.CL", "cs.CY", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21063", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u91cf\u5316", "\u504f\u89c1\u8bc4\u6d4b", "\u5b89\u5168\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21063v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "QuantiBias: Benchmarking Quantization-Induced Bias in LLMs", "tldr": "\u8bba\u6587\u63d0\u51fa QuantiBias \u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u91cf\u5316\u540e\u5728\u5f00\u653e\u5f0f\u751f\u6210\u4e2d\u7684\u504f\u89c1\u53d8\u5316\uff0c\u5e76\u914d\u5957\u62d2\u7b54\u3001\u591a\u9009\u7b49\u63a7\u5236\u9879\u3002\u7814\u7a76\u53d1\u73b0\u91cf\u5316\u6a21\u578b\u4ecd\u80fd\u901a\u8fc7\u5e38\u89c4\u5b89\u5168\u68c0\u67e5\uff0c\u4f46\u5728\u591a\u8bed\u8a00\u5f00\u653e\u5f0f\u56de\u7b54\u4e2d\u66f4\u5bb9\u6613\u4e3b\u52a8\u751f\u6210\u523b\u677f\u5370\u8c61\uff1b\u63a8\u7406\u6b65\u9aa4\u53ef\u5728\u90e8\u5206\u6a21\u578b\u65cf\u4e2d\u7f13\u89e3\u8be5\u95ee\u9898\u4f46\u5e76\u4e0d\u7a33\u5b9a\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Real-world agent learning is often constrained by costly environment interactions, such as running time-consuming experiments or obtaining human feedback. In-context learning offers a highly sample-efficient way for agents to learn from their own interaction histories, but its gains disappear once that experience is removed from the context. Separately, context distillation provides a mechanism for internalizing contextual information into model weights. However, applying it to agents\u0027 interaction histories without sacrificing environment sample efficiency remains underexplored. We term this problem Experience Distillation and develop an implementation that requires no further environment interaction beyond the collected experience. Experiments on 749 curated software-engineering tasks and six text-a
