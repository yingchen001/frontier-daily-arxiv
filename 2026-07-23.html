dventure games show that it retains at least 64.8\\% of the gains from in-context learning across both domains, whereas direct supervised fine-tuning on the collected experience recovers only 3.8\\%. Compared with classical reinforcement-learning baselines, in-context learning from trial-and-error experience followed by Experience Distillation matches their performance with at least \\(9.6\\times\\) fewer environment samples.", "arxiv_id": "2607.21051", "arxiv_url": "https://arxiv.org/abs/2607.21051", "authors": ["Chenhui Gou", "Haoqin Tu", "Yunhao Fang", "Jianfei Cai", "Hamid Rezatofighi"], "brief": "\u8bba\u6587\u63d0\u51fa\u201c\u7ecf\u9a8c\u84b8\u998f\u201d\uff0c\u5c06\u667a\u80fd\u4f53\u5728\u4e0a\u4e0b\u6587\u4e2d\u4ece\u4ea4\u4e92\u5386\u53f2\u5b66\u5230\u7684\u7ecf\u9a8c\u5185\u5316\u5230\u6a21\u578b\u6743\u91cd\u4e2d\uff0c\u4e14\u4e0d\u9700\u8981\u989d\u5916\u73af\u5883\u4ea4\u4e92\u3002\u5728\u8f6f\u4ef6\u5de5\u7a0b\u4efb\u52a1\u548c\u6587\u5b57\u5192\u9669\u6e38\u620f\u4e2d\uff0c\u8be5\u65b9\u6cd5\u4fdd\u7559\u4e86\u81f3\u5c1164.8%\u7684\u4e0a\u4e0b\u6587\u5b66\u4e60\u6536\u76ca\uff0c\u663e\u8457\u4f18\u4e8e\u76f4\u63a5\u76d1\u7763\u5fae\u8c03\uff0c\u5e76\u4ee5\u81f3\u5c119.6\u500d\u66f4\u5c11\u7684\u73af\u5883\u6837\u672c\u5339\u914d\u7ecf\u5178\u5f3a\u5316\u5b66\u4e60\u57fa\u7ebf\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21051", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21051v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Sample-Efficient Learning from Agent Experience", "tldr": "\u8bba\u6587\u63d0\u51fa\u201c\u7ecf\u9a8c\u84b8\u998f\u201d\uff0c\u5c06\u667a\u80fd\u4f53\u5728\u4e0a\u4e0b\u6587\u4e2d\u4ece\u4ea4\u4e92\u5386\u53f2\u5b66\u5230\u7684\u7ecf\u9a8c\u5185\u5316\u5230\u6a21\u578b\u6743\u91cd\u4e2d\uff0c\u4e14\u4e0d\u9700\u8981\u989d\u5916\u73af\u5883\u4ea4\u4e92\u3002\u5728\u8f6f\u4ef6\u5de5\u7a0b\u4efb\u52a1\u548c\u6587\u5b57\u5192\u9669\u6e38\u620f\u4e2d\uff0c\u8be5\u65b9\u6cd5\u4fdd\u7559\u4e86\u81f3\u5c1164.8%\u7684\u4e0a\u4e0b\u6587\u5b66\u4e60\u6536\u76ca\uff0c\u663e\u8457\u4f18\u4e8e\u76f4\u63a5\u76d1\u7763\u5fae\u8c03\uff0c\u5e76\u4ee5\u81f3\u5c119.6\u500d\u66f4\u5c11\u7684\u73af\u5883\u6837\u672c\u5339\u914d\u7ecf\u5178\u5f3a\u5316\u5b66\u4e60\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Culture is lived through conversation, yet existing Indonesian cultural commonsense benchmarks evaluate LLMs on short and isolated prompts, stripping away the dialogic context in which cultural nuances actually surface. We introduce CultureTalk-ID, the first dialogue-based benchmark for cultural commonsense in Indonesian and its local languages, comprising 4,496 culturally grounded dialogues across 11 languages and 13 culturally salient topics, curated through a multi-stage human pipeline with native speakers to ensure authenticity. CultureTalk-ID introduces three complementary tasks, namely dialogue-based multiple-choice cultural commonsense reasoning, culturally faithful machine translation, and language steering, which jointly probe whether LLMs can understand, transfer, and generate culturally grounded language.", "arxiv_id": "2607.21016", "arxiv_url": "https://arxiv.org/abs/2607.21016", "authors": ["Muhammad Dehan Al Kautsar", "Salsabila Pranida", "Bilal Elbouardi", "Fajri Koto"], "brief": "\u8bba\u6587\u63d0\u51fa CultureTalk-ID\uff0c\u9996\u4e2a\u9762\u5411\u5370\u5c3c\u8bed\u53ca\u5370\u5c3c\u5730\u65b9\u8bed\u8a00\u7684\u5bf9\u8bdd\u5f0f\u6587\u5316\u5e38\u8bc6\u57fa\u51c6\uff0c\u5305\u542b 11 \u79cd\u8bed\u8a00\u300113 \u7c7b\u6587\u5316\u4e3b\u9898\u4e0b\u7684 4496 \u6bb5\u4eba\u5de5\u6784\u5efa\u5bf9\u8bdd\u3002\u8be5\u57fa\u51c6\u901a\u8fc7\u591a\u9009\u6587\u5316\u63a8\u7406\u3001\u6587\u5316\u5fe0\u5b9e\u673a\u5668\u7ffb\u8bd1\u548c\u8bed\u8a00\u5f15\u5bfc\u4e09\u9879\u4efb\u52a1\uff0c\u8bc4\u4f30\u5927\u6a21\u578b\u5728\u5bf9\u8bdd\u8bed\u5883\u4e2d\u7406\u89e3\u3001\u8fc1\u79fb\u548c\u751f\u6210\u6587\u5316\u76f8\u5173\u8bed\u8a00\u7684\u80fd\u529b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21016", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u5316\u5e38\u8bc6", "\u5bf9\u8bdd\u57fa\u51c6", "\u591a\u8bed\u8a00", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21016v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CultureTalk-ID: A Multi-Task Dialogue Benchmark for Cultural Commonsense in Indonesian Local Languages", "tldr": "\u8bba\u6587\u63d0\u51fa CultureTalk-ID\uff0c\u9996\u4e2a\u9762\u5411\u5370\u5c3c\u8bed\u53ca\u5370\u5c3c\u5730\u65b9\u8bed\u8a00\u7684\u5bf9\u8bdd\u5f0f\u6587\u5316\u5e38\u8bc6\u57fa\u51c6\uff0c\u5305\u542b 11 \u79cd\u8bed\u8a00\u300113 \u7c7b\u6587\u5316\u4e3b\u9898\u4e0b\u7684 4496 \u6bb5\u4eba\u5de5\u6784\u5efa\u5bf9\u8bdd\u3002\u8be5\u57fa\u51c6\u901a\u8fc7\u591a\u9009\u6587\u5316\u63a8\u7406\u3001\u6587\u5316\u5fe0\u5b9e\u673a\u5668\u7ffb\u8bd1\u548c\u8bed\u8a00\u5f15\u5bfc\u4e09\u9879\u4efb\u52a1\uff0c\u8bc4\u4f30\u5927\u6a21\u578b\u5728\u5bf9\u8bdd\u8bed\u5883\u4e2d\u7406\u89e3\u3001\u8fc1\u79fb\u548c\u751f\u6210\u6587\u5316\u76f8\u5173\u8bed\u8a00\u7684\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Distinguishing animate from inanimate concepts in written language requires more than shallow text processing, as it involves recognizing complex selectional constraints and contextual cues, such as verb-argument interactions. Yet, current large language models (LLMs) appear to be capable of doing it. We investigate whether this animacy-sensitive behavior of LLMs can be traced to a localized set of causally relevant components and connections. To do so, we construct a controlled dataset of minimal pairs and perform circuit discovery on four open-weight models. Through in-depth experiments and ablations, we show that a causal mechanism responsible for handling animacy in these models does exist, thus discovering an animacy circuit. At the same time, this circuit appears to be less localized compared to other known ones and generalizes only partially across models and animacy tasks, confirming the distributed, context-dependent, and somewhat graded nature of the animacy concept.", "arxiv_id": "2607.20995", "arxiv_url": "https://arxiv.org/abs/2607.20995", "authors": ["Samuele Punzo", "Giovanni Cin\u00e0", "Sandro Pezzelle"], "brief": "\u672c\u6587\u7814\u7a76\u5927\u8bed\u8a00\u6a21\u578b\u5982\u4f55\u8868\u5f81\u201c\u6709\u751f/\u65e0\u751f\u201d\u6982\u5ff5\uff0c\u6784\u9020\u6700\u5c0f\u5bf9\u6570\u636e\u96c6\u5e76\u5728\u56db\u4e2a\u5f00\u6e90\u6a21\u578b\u4e0a\u8fdb\u884c\u56e0\u679c\u7535\u8def\u53d1\u73b0\u3002\u7ed3\u679c\u8868\u660e\u6a21\u578b\u4e2d\u786e\u5b9e\u5b58\u5728\u5904\u7406\u751f\u547d\u6027\u5224\u65ad\u7684\u56e0\u679c\u673a\u5236\uff0c\u4f46\u8be5\u7535\u8def\u5206\u5e03\u8f83\u5e7f\u3001\u8de8\u6a21\u578b\u548c\u8de8\u4efb\u52a1\u6cdb\u5316\u6709\u9650\uff0c\u8bf4\u660e\u751f\u547d\u6027\u6982\u5ff5\u5177\u6709\u4e0a\u4e0b\u6587\u4f9d\u8d56\u548c\u6e10\u53d8\u7279\u5f81\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20995", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027", "\u56e0\u679c\u7535\u8def", "\u8bed\u8a00\u7406\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20995v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Where Animacy Lives in Large Language Models: Tracing the Circuits of the Animacy Concept", "tldr": "\u672c\u6587\u7814\u7a76\u5927\u8bed\u8a00\u6a21\u578b\u5982\u4f55\u8868\u5f81\u201c\u6709\u751f/\u65e0\u751f\u201d\u6982\u5ff5\uff0c\u6784\u9020\u6700\u5c0f\u5bf9\u6570\u636e\u96c6\u5e76\u5728\u56db\u4e2a\u5f00\u6e90\u6a21\u578b\u4e0a\u8fdb\u884c\u56e0\u679c\u7535\u8def\u53d1\u73b0\u3002\u7ed3\u679c\u8868\u660e\u6a21\u578b\u4e2d\u786e\u5b9e\u5b58\u5728\u5904\u7406\u751f\u547d\u6027\u5224\u65ad\u7684\u56e0\u679c\u673a\u5236\uff0c\u4f46\u8be5\u7535\u8def\u5206\u5e03\u8f83\u5e7f\u3001\u8de8\u6a21\u578b\u548c\u8de8\u4efb\u52a1\u6cdb\u5316\u6709\u9650\uff0c\u8bf4\u660e\u751f\u547d\u6027\u6982\u5ff5\u5177\u6709\u4e0a\u4e0b\u6587\u4f9d\u8d56\u548c\u6e10\u53d8\u7279\u5f81\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Latent, or silent, reasoning lets language models carry out intermediate computation in continuous vector space instead of words, and is widely assumed to function as an internal scratchpad the model actively consults during inference. Whether that assumption survives reinforcement learning has not been tested directly: existing causal analyses of latent reasoning are confined to math and logic tasks, and compare a model\u0027s reliance on its thoughts within a single checkpoint, never before and after an RL stage. We train a chess-playing model through a staged latent-reasoning curriculum followed by reinforcement learning, and find legality climbs monotonically to 61% (from a 48% pre-RL baseline) while checkmate confabulation is eliminated entirely. To locate this gain, we run a six-condition causal intervention suite on the same model before and after RL: substituting or adding matched noise to the latent thought vectors leaves performance unchanged, ablating them causes only mild degradation, and only exact-zero vectors cause collapse. This robustness gap is itself the finding: under exact-zero corruption, legality collapses to 1% pre-RL versus 9% post-RL, a gap that survives correction for testing across the full battery; milder conditions trend similarly without independently reaching significance. RL appears to add robustness to disruption, not reliance on thought content. These results push back against the field\u0027s default assumption that latent thoughts function as an actively consulted inference-time scratchpad, and instead indicate latent reasoning\u0027s principal effect here is shaping the model\u0027s parameters during training. We also demonstrate a working RL gain in chess, a domain outside the math and logic settings where multiple groups report the same latent-reasoning-plus-RL recipe failing to improve accuracy over SFT.", "arxiv_id": "2607.20952", "arxiv_url": "https://arxiv.org/abs/2607.20952", "authors": ["Ishan S. Kshirsagar"], "brief": "\u672c\u6587\u5728\u56fd\u9645\u8c61\u68cb\u4efb\u52a1\u4e2d\u8bad\u7ec3\u5e26\u6f5c\u5728\u63a8\u7406\u7684\u8bed\u8a00\u6a21\u578b\uff0c\u5e76\u5728\u5f3a\u5316\u5b66\u4e60\u540e\u5c06\u8d70\u6cd5\u5408\u6cd5\u7387\u4ece48%\u63d0\u5347\u523061%\uff0c\u540c\u65f6\u6d88\u9664\u4e86\u5c06\u519b/\u5c06\u6b7b\u76f8\u5173\u7684\u865a\u6784\u9519\u8bef\u3002\u56e0\u679c\u5e72\u9884\u663e\u793a\uff0c\u66ff\u6362\u3001\u52a0\u566a\u6216\u6d88\u878d\u6f5c\u5728\u601d\u8003\u5411\u91cf\u5f71\u54cd\u5f88\u5c0f\uff0c\u5f3a\u5316\u5b66\u4e60\u4e3b\u8981\u63d0\u5347\u4e86\u6a21\u578b\u5bf9\u6270\u52a8\u7684\u9c81\u68d2\u6027\uff0c\u800c\u975e\u8ba9\u6a21\u578b\u5728\u63a8\u7406\u65f6\u4f9d\u8d56\u8fd9\u4e9b\u201c\u9759\u9ed8\u8349\u7a3f\u201d\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20952", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6f5c\u5728\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60", "\u56e0\u679c\u5206\u6790", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20952v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Weight of Silence: A Causal Case for Weights Over the Scratchpad in Latent Chess Reasoning", "tldr": "\u672c\u6587\u5728\u56fd\u9645\u8c61\u68cb\u4efb\u52a1\u4e2d\u8bad\u7ec3\u5e26\u6f5c\u5728\u63a8\u7406\u7684\u8bed\u8a00\u6a21\u578b\uff0c\u5e76\u5728\u5f3a\u5316\u5b66\u4e60\u540e\u5c06\u8d70\u6cd5\u5408\u6cd5\u7387\u4ece48%\u63d0\u5347\u523061%\uff0c\u540c\u65f6\u6d88\u9664\u4e86\u5c06\u519b/\u5c06\u6b7b\u76f8\u5173\u7684\u865a\u6784\u9519\u8bef\u3002\u56e0\u679c\u5e72\u9884\u663e\u793a\uff0c\u66ff\u6362\u3001\u52a0\u566a\u6216\u6d88\u878d\u6f5c\u5728\u601d\u8003\u5411\u91cf\u5f71\u54cd\u5f88\u5c0f\uff0c\u5f3a\u5316\u5b66\u4e60\u4e3b\u8981\u63d0\u5347\u4e86\u6a21\u578b\u5bf9\u6270\u52a8\u7684\u9c81\u68d2\u6027\uff0c\u800c\u975e\u8ba9\u6a21\u578b\u5728\u63a8\u7406\u65f6\u4f9d\u8d56\u8fd9\u4e9b\u201c\u9759\u9ed8\u8349\u7a3f\u201d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Grievance is one of the warning signs analysts look for when assessing threats of violence. It is increasingly measured at scale from online text, most often with word-level lexicons like the Grievance Dictionary that score by matching weighted terms. Such matching is a fast and transparent proxy, but it cannot resolve whether a term is asserted, quoted, negated, or condemned. These lexicons are also often evaluated on pools enriched with the very examples they retrieve, so a high score partly reflects agreement with the lexicon\u0027s own selection rule. Examining a five-language, 2{,}000-item evaluation pool, we find its halves separated almost perfectly by the lexicon itself: every item labeled ``random\u0027\u0027 is in fact lexicon-negative, so the lexicon\u0027s apparent macro-AUROC of 0.686 collapses to a 0.500 floor fixed by construction. We keep the dictionary\u0027s 22-construct ontology but replace term matching with context-reading models, evaluated on a non-circular benchmark that separates unconditional-random, lexicon-positive, and lexicon-negative strata across five languages. Reading the full post rather than the target sentence alone helps most where the lexicon is silent, raising average precision on lexicon-negative text from 0.14 to 0.20, with the largest gains on quoted, implicit, and cross-sentence grievance. Together, these results show that grievance is measured more faithfully by reading the surrounding context, and more honestly when tested on text the lexicon did not select. We release our code and benchmark at https://github.com/behavioral-ds/multilingual_grievance.", "arxiv_id": "2607.20946", "arxiv_url": "https://arxiv.org/abs/2607.20946", "authors": ["Lin Tian", "Marian-Andrei Rizoiu"], "brief": "\u672c\u6587\u6307\u51fa\u4f20\u7edf\u7533\u8bc9\u8bcd\u5178\u5728\u591a\u8bed\u8a00\u66b4\u529b\u5a01\u80c1\u9884\u8b66\u6587\u672c\u5206\u6790\u4e2d\u5b58\u5728\u5faa\u73af\u8bc4\u6d4b\u548c\u8bed\u5883\u7f3a\u5931\u95ee\u9898\uff0c\u8868\u9762\u6027\u80fd\u4f1a\u88ab\u8bcd\u5178\u81ea\u8eab\u7b5b\u9009\u89c4\u5219\u9ad8\u4f30\u3002\u4f5c\u8005\u4fdd\u755922\u7c7b\u7533\u8bc9\u672c\u4f53\uff0c\u6539\u7528\u4e0a\u4e0b\u6587\u6a21\u578b\u8bfb\u53d6\u5b8c\u6574\u5e16\u5b50\uff0c\u5e76\u6784\u5efa\u975e\u5faa\u73af\u4e94\u8bed\u8a00\u57fa\u51c6\uff1b\u5728\u8bcd\u5178\u672a\u547d\u4e2d\u6587\u672c\u4e0a\u5e73\u5747\u7cbe\u5ea6\u4ece0.14\u63d0\u5347\u52300.20\uff0c\u5c24\u5176\u6539\u5584\u5f15\u7528\u3001\u9690\u542b\u548c\u8de8\u53e5\u7533\u8bc9\u8bc6\u522b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20946", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u7136\u8bed\u8a00\u5904\u7406", "\u591a\u8bed\u8a00", "\u6587\u672c\u5206\u7c7b", "\u4e0a\u4e0b\u6587\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20946v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "From a Word-Level Dictionary to Sentence-Level Semantics: Multilingual Grievance Labelling with Contextual Models", "tldr": "\u672c\u6587\u6307\u51fa\u4f20\u7edf\u7533\u8bc9\u8bcd\u5178\u5728\u591a\u8bed\u8a00\u66b4\u529b\u5a01\u80c1\u9884\u8b66\u6587\u672c\u5206\u6790\u4e2d\u5b58\u5728\u5faa\u73af\u8bc4\u6d4b\u548c\u8bed\u5883\u7f3a\u5931\u95ee\u9898\uff0c\u8868\u9762\u6027\u80fd\u4f1a\u88ab\u8bcd\u5178\u81ea\u8eab\u7b5b\u9009\u89c4\u5219\u9ad8\u4f30\u3002\u4f5c\u8005\u4fdd\u755922\u7c7b\u7533\u8bc9\u672c\u4f53\uff0c\u6539\u7528\u4e0a\u4e0b\u6587\u6a21\u578b\u8bfb\u53d6\u5b8c\u6574\u5e16\u5b50\uff0c\u5e76\u6784\u5efa\u975e\u5faa\u73af\u4e94\u8bed\u8a00\u57fa\u51c6\uff1b\u5728\u8bcd\u5178\u672a\u547d\u4e2d\u6587\u672c\u4e0a\u5e73\u5747\u7cbe\u5ea6\u4ece0.14\u63d0\u5347\u52300.20\uff0c\u5c24\u5176\u6539\u5584\u5f15\u7528\u3001\u9690\u542b\u548c\u8de8\u53e5\u7533\u8bc9\u8bc6\u522b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Chemical reasoning language models are expected to derive molecular answers through faithful chain-of-thought (CoT). However, across four reasoning model families and twelve chemistry tasks, hallucination is widespread and largely decoupled from answer correctness: correct answers often coexist with fabricated structural claims absent from the relevant molecules. Yet this does not make the reasoning trace computationally irrelevant. Attribution analyses suggest a shared scratchpad function expressed in model-specific forms: Chem-R and ether-0 rely on fragmented SMILES drafts, whereas ChemDFM-R emphasizes scaffold, positional, and naming cues. Notably, perturbing Chem-R\u0027s SMILES sketches degrades generation, showing that structural drafts can be causally load-bearing even when verbal structural claims are largely inert. Together, these results show that chemical CoT is neither a faithful explanation nor merely a post-hoc rationalization, but a hallucination-prone molecular scratchpad. This finding cautions against treating CoT as direct evidence of faithful reasoning and motivates process-level supervision beyond answer-only evaluation.", "arxiv_id": "2607.20935", "arxiv_url": "https://arxiv.org/abs/2607.20935", "authors": ["Jiatong Li", "Yuxuan Ren", "Weida Wang", "Xiaoyong Wei", "Yatao Bian"], "brief": "\u8bba\u6587\u7cfb\u7edf\u8bc4\u4f30\u4e86\u56db\u7c7b\u5316\u5b66\u63a8\u7406\u8bed\u8a00\u6a21\u578b\u5728\u5341\u4e8c\u4e2a\u5316\u5b66\u4efb\u52a1\u4e2d\u7684\u94fe\u5f0f\u601d\u7ef4\uff0c\u53d1\u73b0\u5e7b\u89c9\u666e\u904d\u5b58\u5728\uff0c\u4e14\u4e0e\u7b54\u6848\u6b63\u786e\u6027\u9ad8\u5ea6\u89e3\u8026\uff1a\u6a21\u578b\u5373\u4f7f\u7b54\u5bf9\uff0c\u4e5f\u5e38\u7f16\u9020\u5206\u5b50\u4e2d\u4e0d\u5b58\u5728\u7684\u7ed3\u6784\u58f0\u660e\u3002\u5f52\u56e0\u4e0e\u6270\u52a8\u5b9e\u9a8c\u8868\u660e\uff0c\u8fd9\u4e9b CoT \u5e76\u975e\u5fe0\u5b9e\u89e3\u91ca\uff0c\u4f46\u4e5f\u4e0d\u662f\u7eaf\u4e8b\u540e\u5408\u7406\u5316\uff0c\u800c\u662f\u4f1a\u4ee5 SMILES \u8349\u7a3f\u3001\u9aa8\u67b6\u4e0e\u547d\u540d\u7ebf\u7d22\u7b49\u5f62\u5f0f\u627f\u62c5\u201c\u5206\u5b50\u8349\u7a3f\u7eb8\u201d\u529f\u80fd\u3002", "categories": ["cs.CE", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20935", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u94fe\u5f0f\u601d\u7ef4", "\u5316\u5b66\u63a8\u7406", "\u5e7b\u89c9", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20935v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Chemical Chain-of-Thought Functions as a Hallucination-Prone Molecular Scratchpad", "tldr": "\u8bba\u6587\u7cfb\u7edf\u8bc4\u4f30\u4e86\u56db\u7c7b\u5316\u5b66\u63a8\u7406\u8bed\u8a00\u6a21\u578b\u5728\u5341\u4e8c\u4e2a\u5316\u5b66\u4efb\u52a1\u4e2d\u7684\u94fe\u5f0f\u601d\u7ef4\uff0c\u53d1\u73b0\u5e7b\u89c9\u666e\u904d\u5b58\u5728\uff0c\u4e14\u4e0e\u7b54\u6848\u6b63\u786e\u6027\u9ad8\u5ea6\u89e3\u8026\uff1a\u6a21\u578b\u5373\u4f7f\u7b54\u5bf9\uff0c\u4e5f\u5e38\u7f16\u9020\u5206\u5b50\u4e2d\u4e0d\u5b58\u5728\u7684\u7ed3\u6784\u58f0\u660e\u3002\u5f52\u56e0\u4e0e\u6270\u52a8\u5b9e\u9a8c\u8868\u660e\uff0c\u8fd9\u4e9b CoT \u5e76\u975e\u5fe0\u5b9e\u89e3\u91ca\uff0c\u4f46\u4e5f\u4e0d\u662f\u7eaf\u4e8b\u540e\u5408\u7406\u5316\uff0c\u800c\u662f\u4f1a\u4ee5 SMILES \u8349\u7a3f\u3001\u9aa8\u67b6\u4e0e\u547d\u540d\u7ebf\u7d22\u7b49\u5f62\u5f0f\u627f\u62c5\u201c\u5206\u5b50\u8349\u7a3f\u7eb8\u201d\u529f\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Neural Source Code Summarisation (NSCS) aims to generate natural language summaries of source code to improve developers\u0027 and maintainers\u0027 understanding of code. Source code summaries are vital during the maintenance phase of the Secure Software Development Lifecycle (SSDLC), as they improve maintainers\u0027 understanding of code and help reduce the number of bugs and vulnerabilities in a software system. However, summaries are often missing, incomplete, or outdated in many software systems. Solutions to this problem use small, task-specific Transformer models or code-aware Large Language Models (LLMs). Task-specific Transformer-generated summaries often score well across many natural language generation (NLG) metrics, but these metrics reward lexical overlap rather than summary quality. Conversely, the ability of LLMs to capture semantics and produce high-quality summaries presents an exciting solution to this problem. This is especially relevant given the increased availability of LLMs and improvements in workstation hardware in recent years, which mean that some LLMs can now be run on developers\u0027 workstations. However, because of their abstractive nature, LLM-generated code summaries often differ greatly from developer-written summaries in the words and phrases they use, resulting in low scores across NLG metrics. We show how combining these two methods, by using Transformer-generated summaries in prompt engineering, may enable LLMs to create better source code summaries and help software practitioners maintain secure systems. We prompt four LLMs using four different prompts, with a task-specific Transformer used to assist the LLMs within the prompts. We present \"Transformer-Assisted LLM-Based Source Code Summarisation\", a method through which we observe an improvement of 7.8% in BLEU-4 and 5%.", "arxiv_id": "2607.20933", "arxiv_url": "https://arxiv.org/abs/2607.20933", "authors": ["Jesse Phillips", "Tracy Hall", "Paul Rayson", "Mo El-Haj"], "brief": "\u8bba\u6587\u63d0\u51fa\u201cTransformer \u8f85\u52a9\u7684 LLM \u6e90\u4ee3\u7801\u6458\u8981\u201d\u65b9\u6cd5\uff0c\u5c06\u4efb\u52a1\u4e13\u7528 Transformer \u751f\u6210\u7684\u6458\u8981\u4f5c\u4e3a\u63d0\u793a\u7684\u4e00\u90e8\u5206\uff0c\u5f15\u5bfc\u5927\u8bed\u8a00\u6a21\u578b\u751f\u6210\u66f4\u597d\u7684\u4ee3\u7801\u81ea\u7136\u8bed\u8a00\u603b\u7ed3\u3002\u5b9e\u9a8c\u57284\u4e2a LLM \u548c4\u79cd\u63d0\u793a\u4e0a\u9a8c\u8bc1\uff0c\u8be5\u65b9\u6cd5\u53ef\u63d0\u5347\u81ea\u52a8\u6307\u6807\u8868\u73b0\uff0c\u5982 BLEU-4 \u63d0\u9ad8\u7ea67.8%\uff0c\u6709\u52a9\u4e8e\u8f6f\u4ef6\u7ef4\u62a4\u4e0e\u5b89\u5168\u5f00\u53d1\u3002", "categories": ["cs.SE", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20933", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4ee3\u7801\u6458\u8981", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63d0\u793a\u5de5\u7a0b", "\u8f6f\u4ef6\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20933v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Transformer-Assisted LLM-Based Source Code Summarisation: to Enable More Secure Software Development", "tldr": "\u8bba\u6587\u63d0\u51fa\u201cTransformer \u8f85\u52a9\u7684 LLM \u6e90\u4ee3\u7801\u6458\u8981\u201d\u65b9\u6cd5\uff0c\u5c06\u4efb\u52a1\u4e13\u7528 Transformer \u751f\u6210\u7684\u6458\u8981\u4f5c\u4e3a\u63d0\u793a\u7684\u4e00\u90e8\u5206\uff0c\u5f15\u5bfc\u5927\u8bed\u8a00\u6a21\u578b\u751f\u6210\u66f4\u597d\u7684\u4ee3\u7801\u81ea\u7136\u8bed\u8a00\u603b\u7ed3\u3002\u5b9e\u9a8c\u57284\u4e2a LLM \u548c4\u79cd\u63d0\u793a\u4e0a\u9a8c\u8bc1\uff0c\u8be5\u65b9\u6cd5\u53ef\u63d0\u5347\u81ea\u52a8\u6307\u6807\u8868\u73b0\uff0c\u5982 BLEU-4 \u63d0\u9ad8\u7ea67.8%\uff0c\u6709\u52a9\u4e8e\u8f6f\u4ef6\u7ef4\u62a4\u4e0e\u5b89\u5168\u5f00\u53d1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Position bias in multiple-choice LLM evaluation is widely cited as a confound in capability comparisons, but published measurements rely on single answer-order shuffles whose results confound the bias signal with content-level noise and sampling stochasticity. I introduce inspect_permute, an open-source extension to the inspect_ai evaluation framework that runs exhaustive answer-order permutations per question and reports the chi-squared / Cramer V signature of position bias with bootstrap confidence intervals. I apply the tool across four vendors (gpt-4o-mini, claude-haiku-4-5, gemini-2.5-flash, grok-3) on five MMLU subjects, 24,000 API calls under temperature-0 generation, with falsifier predictions pre-registered via a public SHA-256 hash before half the data was observed. Position bias turns out to be statistically detectable only within a roughly 60-95% base-accuracy Goldilocks zone. Below it, processing-load dominance swamps subject-specific signal; above it, ceiling effects compress the variance below the chi-squared test resolution. Detectable cells separate into two mechanism types: monotone A-to-D decrease (processing_load, in low-tier models) and non-monotone D-drop (content_ambiguity, in a narrow capability band). Standard MMLU places every frontier-tier model above the detection band, so absence of signal there should be read as not measurable, not unbiased. Together with the ceiling-effect characterisation in arXiv:2606.26185, this work brackets the detectable region of position-bias measurement and makes the field central question askable in a verifiable form. Package, data, preregistration under MIT.", "arxiv_id": "2607.20864", "arxiv_url": "https://arxiv.org/abs/2607.20864", "authors": ["Hiroki Tamba"], "brief": "\u8bba\u6587\u63d0\u51fa inspect_permute \u5de5\u5177\uff0c\u5bf9\u591a\u9009\u9898\u7b54\u6848\u987a\u5e8f\u505a\u7a77\u4e3e\u6392\u5217\uff0c\u5e76\u7528\u5361\u65b9\u68c0\u9a8c\u3001Cramer V \u548c\u81ea\u52a9\u7f6e\u4fe1\u533a\u95f4\u8bca\u65ad LLM \u8bc4\u6d4b\u4e2d\u7684\u4f4d\u7f6e\u504f\u5dee\u3002\u5b9e\u9a8c\u53d1\u73b0\u4f4d\u7f6e\u504f\u5dee\u53ea\u5728\u7ea6 60%-95% \u57fa\u7840\u51c6\u786e\u7387\u533a\u95f4\u5185\u53ef\u68c0\u6d4b\uff1a\u4f4e\u4e8e\u8be5\u533a\u95f4\u4f1a\u88ab\u5904\u7406\u8d1f\u8f7d\u6df9\u6ca1\uff0c\u9ad8\u4e8e\u8be5\u533a\u95f4\u5219\u53d7\u5929\u82b1\u677f\u6548\u5e94\u538b\u7f29\u800c\u96be\u4ee5\u6d4b\u51fa\u3002\u7ed3\u679c\u63d0\u793a\u524d\u6cbf\u6a21\u578b\u5728\u6807\u51c6 MMLU \u4e0a\u201c\u6d4b\u4e0d\u5230\u504f\u5dee\u201d\u4e0d\u7b49\u4e8e\u201c\u6ca1\u6709\u504f\u5dee\u201d\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20864", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8bc4\u6d4b\u57fa\u51c6", "\u4f4d\u7f6e\u504f\u5dee", "\u7edf\u8ba1\u68c0\u9a8c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20864v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Position Bias is Hidden Behind Ceiling Effects: A Permutation Diagnostic for LLM Benchmarks", "tldr": "\u8bba\u6587\u63d0\u51fa inspect_permute \u5de5\u5177\uff0c\u5bf9\u591a\u9009\u9898\u7b54\u6848\u987a\u5e8f\u505a\u7a77\u4e3e\u6392\u5217\uff0c\u5e76\u7528\u5361\u65b9\u68c0\u9a8c\u3001Cramer V \u548c\u81ea\u52a9\u7f6e\u4fe1\u533a\u95f4\u8bca\u65ad LLM \u8bc4\u6d4b\u4e2d\u7684\u4f4d\u7f6e\u504f\u5dee\u3002\u5b9e\u9a8c\u53d1\u73b0\u4f4d\u7f6e\u504f\u5dee\u53ea\u5728\u7ea6 60%-95% \u57fa\u7840\u51c6\u786e\u7387\u533a\u95f4\u5185\u53ef\u68c0\u6d4b\uff1a\u4f4e\u4e8e\u8be5\u533a\u95f4\u4f1a\u88ab\u5904\u7406\u8d1f\u8f7d\u6df9\u6ca1\uff0c\u9ad8\u4e8e\u8be5\u533a\u95f4\u5219\u53d7\u5929\u82b1\u677f\u6548\u5e94\u538b\u7f29\u800c\u96be\u4ee5\u6d4b\u51fa\u3002\u7ed3\u679c\u63d0\u793a\u524d\u6cbf\u6a21\u578b\u5728\u6807\u51c6 MMLU \u4e0a\u201c\u6d4b\u4e0d\u5230\u504f\u5dee\u201d\u4e0d\u7b49\u4e8e\u201c\u6ca1\u6709\u504f\u5dee\u201d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "At present, reliable evaluation of non-verifiable tasks remains challenging. Existing approaches often fail to adequately capture the diverse evaluative criteria underlying human preferences in such tasks. To this end, we propose Constrained Shared-Private Fusion (CSPF), a fusion method that treats heterogeneous frozen reward models as complementary evaluators and learns to integrate their hidden-state representations under pairwise human-preference supervision. CSPF decomposes each expert signal into shared and expert-private representations, encouraging cross-expert alignment while preserving complementary viewpoints. Across experiments on LM-Arena target-domain adaptation and PPE out-of-distribution preference evaluation, CSPF achieves the best performance on the primary metrics among the evaluated single-expert reward-model, scalar-score multi-expert, and rubric-judge baselines. Overall, CSPF suggests that fusing hidden-state representations provides a more expressive basis for preference assessment, offering a practical route toward integrated evaluative signals for non-verifiable preference tasks.", "arxiv_id": "2607.20862", "arxiv_url": "https://arxiv.org/abs/2607.20862", "authors": ["Hehao Zhang", "Danli Wang", "Xinyuan Wang", "Xuange Gao"], "brief": "\u672c\u6587\u63d0\u51fa CSPF\uff0c\u7528\u4e8e\u975e\u53ef\u9a8c\u8bc1\u4efb\u52a1\u4e2d\u7684\u504f\u597d\u8bc4\u4f30\uff0c\u5c06\u591a\u4e2a\u51bb\u7ed3\u5956\u52b1\u6a21\u578b\u89c6\u4e3a\u4e92\u8865\u8bc4\u4f30\u5668\uff0c\u5e76\u5728\u6210\u5bf9\u4eba\u7c7b\u504f\u597d\u76d1\u7763\u4e0b\u878d\u5408\u5176\u9690\u85cf\u72b6\u6001\u8868\u793a\u3002\u8be5\u65b9\u6cd5\u901a\u8fc7\u5171\u4eab/\u79c1\u6709\u8868\u793a\u5206\u89e3\u6765\u517c\u987e\u8de8\u6a21\u578b\u5bf9\u9f50\u4e0e\u5dee\u5f02\u4fe1\u606f\uff0c\u5728 LM-Arena \u9886\u57df\u9002\u914d\u548c PPE \u5206\u5e03\u5916\u504f\u597d\u8bc4\u4f30\u4e2d\u4f18\u4e8e\u5355\u6a21\u578b\u3001\u591a\u5206\u6570\u878d\u5408\u548c rubric judge \u7b49\u57fa\u7ebf\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20862", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u504f\u597d\u8bc4\u4f30", "\u5956\u52b1\u6a21\u578b", "\u8868\u793a\u878d\u5408", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20862v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CSPF: A Constrained Shared-Private Fusion Method for Non-Verifiable Preference Evaluation", "tldr": "\u672c\u6587\u63d0\u51fa CSPF\uff0c\u7528\u4e8e\u975e\u53ef\u9a8c\u8bc1\u4efb\u52a1\u4e2d\u7684\u504f\u597d\u8bc4\u4f30\uff0c\u5c06\u591a\u4e2a\u51bb\u7ed3\u5956\u52b1\u6a21\u578b\u89c6\u4e3a\u4e92\u8865\u8bc4\u4f30\u5668\uff0c\u5e76\u5728\u6210\u5bf9\u4eba\u7c7b\u504f\u597d\u76d1\u7763\u4e0b\u878d\u5408\u5176\u9690\u85cf\u72b6\u6001\u8868\u793a\u3002\u8be5\u65b9\u6cd5\u901a\u8fc7\u5171\u4eab/\u79c1\u6709\u8868\u793a\u5206\u89e3\u6765\u517c\u987e\u8de8\u6a21\u578b\u5bf9\u9f50\u4e0e\u5dee\u5f02\u4fe1\u606f\uff0c\u5728 LM-Arena \u9886\u57df\u9002\u914d\u548c PPE \u5206\u5e03\u5916\u504f\u597d\u8bc4\u4f30\u4e2d\u4f18\u4e8e\u5355\u6a21\u578b\u3001\u591a\u5206\u6570\u878d\u5408\u548c rubric judge \u7b49\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Test-Time Tuning (TTT) on pretrained diffusion models has emerged as a powerful paradigm for video editing. However, there exists a foundational mismatch between the distribution-mapping nature of generative models and the single-point optimization of standard TTT. In this paper, we demonstrate that this mismatch triggers \\textit{Prior Collapse}, a degenerate state where the model discards the text conditions and spatial latents, collapsing generations to the source video, or entangling the features of distinct regions. To resolve this, we propose \\textbf{ElasticTTT}, a novel framework that preserves the prior generative distribution and rescues generative elasticity. Specifically, we propose \\textit{Target Distribution Regularization} to prevent sharp memorization minima, \\textit{Contrastive CFG} to guide inference away from source biases, and \\textit{Asynchronous Noise Schedule} to preserve unedited regions. Extensive evaluations, supported by theoretical analysis, demonstrate that ElasticTTT successfully preserves the generative prior of the base model, achieving state-of-the-art performance on one-shot video editing.", "arxiv_id": "2607.21529", "arxiv_url": "https://arxiv.org/abs/2607.21529", "authors": ["Yueyi Liu", "Chi Zhang", "Sen Cui", "Miao Liu"], "brief": "\u672c\u6587\u6307\u51fa\u6269\u6563\u6a21\u578b\u89c6\u9891\u7f16\u8f91\u4e2d\u7684\u6d4b\u8bd5\u65f6\u8c03\u4f18\u4f1a\u56e0\u5355\u70b9\u4f18\u5316\u5bfc\u81f4\u201c\u5148\u9a8c\u574d\u584c\u201d\uff0c\u4f7f\u6a21\u578b\u5ffd\u7565\u6587\u672c\u6761\u4ef6\u6216\u533a\u57df\u7279\u5f81\u7ea0\u7f20\u3002\u4f5c\u8005\u63d0\u51fa ElasticTTT\uff0c\u901a\u8fc7\u76ee\u6807\u5206\u5e03\u6b63\u5219\u3001\u5bf9\u6bd4\u5f0f CFG \u548c\u5f02\u6b65\u566a\u58f0\u8c03\u5ea6\u4fdd\u7559\u751f\u6210\u5148\u9a8c\uff0c\u5728\u5355\u6837\u672c\u89c6\u9891\u7f16\u8f91\u4e0a\u8fbe\u5230\u9886\u5148\u6548\u679c\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21529", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u7f16\u8f91", "\u6269\u6563\u6a21\u578b", "\u6d4b\u8bd5\u65f6\u8c03\u4f18", "\u751f\u6210\u5148\u9a8c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21529v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ElasticTTT: Prior-Preserving Test-Time Tuning for Video Editing", "tldr": "\u672c\u6587\u6307\u51fa\u6269\u6563\u6a21\u578b\u89c6\u9891\u7f16\u8f91\u4e2d\u7684\u6d4b\u8bd5\u65f6\u8c03\u4f18\u4f1a\u56e0\u5355\u70b9\u4f18\u5316\u5bfc\u81f4\u201c\u5148\u9a8c\u574d\u584c\u201d\uff0c\u4f7f\u6a21\u578b\u5ffd\u7565\u6587\u672c\u6761\u4ef6\u6216\u533a\u57df\u7279\u5f81\u7ea0\u7f20\u3002\u4f5c\u8005\u63d0\u51fa ElasticTTT\uff0c\u901a\u8fc7\u76ee\u6807\u5206\u5e03\u6b63\u5219\u3001\u5bf9\u6bd4\u5f0f CFG \u548c\u5f02\u6b65\u566a\u58f0\u8c03\u5ea6\u4fdd\u7559\u751f\u6210\u5148\u9a8c\uff0c\u5728\u5355\u6837\u672c\u89c6\u9891\u7f16\u8f91\u4e0a\u8fbe\u5230\u9886\u5148\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Self-supervised depth estimation is challenging for safe autonomous driving under various adverse weather conditions due to sensor perception degradation. These challenges arise from two main aspects. Firstly, adverse conditions can distort pixel correspondences and violate the assumptions embedded in the self-supervised loss function, leading to erroneous depth predictions. Secondly, while radar is a widely adopted sensor in adverse weather conditions, the sparse distribution of radar points in the Point of View (POV) poses challenges for self-supervised fusion. To address these issues, we introduce a novel self-training pipeline using unpaired real all-weather data through multi-teacher distillation and robust radar fusion. We propose the Uncertainty-Aware Multi-Teacher Distillation method to generate diverse teacher models with different adverse condition inputs, and then employ uncertainty modeling to weigh the knowledge distillation loss. Additionally, we design the POV-BEV Radar Fusion approach, which leverages camera-pixel ray constraints to establish connections between the camera\u0027s Point of View (POV) and the radar\u0027s Bird\u0027s-Eye View (BEV). This approach enables the utilization of denser radar points, effectively capturing the complementary perspectives of both POV and BEV. Extensive quantitative and qualitative experiments demonstrate the robustness of our proposed method on all-weather datasets, achieving state-of-the-art performance. Our code and models are available at https://github.com/MICLAB-BUPT/RobustDepth.", "arxiv_id": "2607.21526", "arxiv_url": "https://arxiv.org/abs/2607.21526", "authors": ["Mengshi Qi", "Xiaoyang Bi", "Xianlin Zhang", "Huadong Ma"], "brief": "\u672c\u6587\u9762\u5411\u81ea\u52a8\u9a7e\u9a76\u6076\u52a3\u5929\u6c14\u4e0b\u7684\u81ea\u76d1\u7763\u6df1\u5ea6\u4f30\u8ba1\uff0c\u63d0\u51fa\u4f7f\u7528\u975e\u914d\u5bf9\u771f\u5b9e\u5168\u5929\u5019\u6570\u636e\u7684\u81ea\u8bad\u7ec3\u6846\u67b6\uff0c\u901a\u8fc7\u4e0d\u786e\u5b9a\u6027\u611f\u77e5\u591a\u6559\u5e08\u84b8\u998f\u7f13\u89e3\u5929\u6c14\u5bfc\u81f4\u7684\u50cf\u7d20\u5bf9\u5e94\u5931\u771f\u95ee\u9898\u3002\u65b9\u6cd5\u8fd8\u8bbe\u8ba1\u4e86 POV-BEV \u96f7\u8fbe\u878d\u5408\uff0c\u5229\u7528\u76f8\u673a\u5c04\u7ebf\u7ea6\u675f\u8fde\u63a5\u56fe\u50cf\u89c6\u89d2\u4e0e\u9e1f\u77b0\u89c6\u89d2\uff0c\u4ee5\u66f4\u5145\u5206\u5229\u7528\u7a20\u5bc6\u96f7\u8fbe\u4fe1\u606f\uff0c\u5e76\u5728\u5168\u5929\u5019\u6570\u636e\u96c6\u4e0a\u8fbe\u5230\u6700\u5148\u8fdb\u9c81\u68d2\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21526", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u76d1\u7763\u5b66\u4e60", "\u6df1\u5ea6\u4f30\u8ba1", "\u81ea\u52a8\u9a7e\u9a76", "\u591a\u6a21\u6001\u878d\u5408"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21526v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Boosting Robustness for All-Weather Self-Supervised Depth Estimation in Autonomous Driving", "tldr": "\u672c\u6587\u9762\u5411\u81ea\u52a8\u9a7e\u9a76\u6076\u52a3\u5929\u6c14\u4e0b\u7684\u81ea\u76d1\u7763\u6df1\u5ea6\u4f30\u8ba1\uff0c\u63d0\u51fa\u4f7f\u7528\u975e\u914d\u5bf9\u771f\u5b9e\u5168\u5929\u5019\u6570\u636e\u7684\u81ea\u8bad\u7ec3\u6846\u67b6\uff0c\u901a\u8fc7\u4e0d\u786e\u5b9a\u6027\u611f\u77e5\u591a\u6559\u5e08\u84b8\u998f\u7f13\u89e3\u5929\u6c14\u5bfc\u81f4\u7684\u50cf\u7d20\u5bf9\u5e94\u5931\u771f\u95ee\u9898\u3002\u65b9\u6cd5\u8fd8\u8bbe\u8ba1\u4e86 POV-BEV \u96f7\u8fbe\u878d\u5408\uff0c\u5229\u7528\u76f8\u673a\u5c04\u7ebf\u7ea6\u675f\u8fde\u63a5\u56fe\u50cf\u89c6\u89d2\u4e0e\u9e1f\u77b0\u89c6\u89d2\uff0c\u4ee5\u66f4\u5145\u5206\u5229\u7528\u7a20\u5bc6\u96f7\u8fbe\u4fe1\u606f\uff0c\u5e76\u5728\u5168\u5929\u5019\u6570\u636e\u96c6\u4e0a\u8fbe\u5230\u6700\u5148\u8fdb\u9c81\u68d2\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Numerous 3D assets are discarded due to low texture resolution, while current super-resolution models ignore texture maps and focus on natural images. An efficient and generalizable texture super-resolution model can revitalize a large corpus of aging yet valuable assets across industries such as film and video games. We present Texture++, a novel framework for texture super-resolution, which enhances the low-resolution textures of assets to produce high-resolution, high-quality results. Specifically, we reformulate the task of super-resolution in UV space into performing it across multiple rendered views and merging the outputs. Firstly, to achieve more complete and continuous textures in the view space, we propose an adaptive view selection strategy to integrate textures dispersed across UV texture patches. Furthermore, we introduce a quadtree-based texture region organization method for combining super-resolved textures from different viewpoints, providing masks to distinguish regions that require improvement. Finally, we design a diffusion-based super-resolution model that enhances the texture resolution for specified masked regions, seamlessly integrating with surrounding regions. Through comprehensive evaluations, we demonstrate that our approach yields textures with substantially improved detail and coherence over existing methods.", "arxiv_id": "2607.21504", "arxiv_url": "https://arxiv.org/abs/2607.21504", "authors": ["Shuaiwei Wang", "Shi Li", "Jieting Xu", "Yuchi Huo", "Qi Wang", "Wenting Zheng", "Rengan Xie"], "brief": "Texture++ \u5c063D\u8d44\u4ea7\u7eb9\u7406\u8d85\u5206\u4eceUV\u7a7a\u95f4\u91cd\u6784\u4e3a\u591a\u89c6\u89d2\u6e32\u67d3\u3001\u589e\u5f3a\u518d\u878d\u5408\u7684\u6d41\u7a0b\uff0c\u7528\u81ea\u9002\u5e94\u89c6\u89d2\u9009\u62e9\u548c\u56db\u53c9\u6811\u533a\u57df\u7ec4\u7ec7\u63d0\u5347\u7eb9\u7406\u8986\u76d6\u4e0e\u8fde\u7eed\u6027\u3002\u5176\u533a\u57df\u611f\u77e5\u6269\u6563\u8d85\u5206\u6a21\u578b\u53ef\u53ea\u589e\u5f3a\u9700\u8981\u6539\u8fdb\u7684\u63a9\u7801\u533a\u57df\uff0c\u5e76\u4e0e\u5468\u56f4\u7eb9\u7406\u65e0\u7f1d\u878d\u5408\uff0c\u5728\u7ec6\u8282\u548c\u4e00\u81f4\u6027\u4e0a\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21504", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e09\u7ef4\u8d44\u4ea7", "\u7eb9\u7406\u8d85\u5206", "\u6269\u6563\u6a21\u578b", "\u8ba1\u7b97\u673a\u89c6\u89c9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21504v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Texture++: Elevating 3D Asset Texture Resolution with a Region-Aware Diffusion Model", "tldr": "Texture++ \u5c063D\u8d44\u4ea7\u7eb9\u7406\u8d85\u5206\u4eceUV\u7a7a\u95f4\u91cd\u6784\u4e3a\u591a\u89c6\u89d2\u6e32\u67d3\u3001\u589e\u5f3a\u518d\u878d\u5408\u7684\u6d41\u7a0b\uff0c\u7528\u81ea\u9002\u5e94\u89c6\u89d2\u9009\u62e9\u548c\u56db\u53c9\u6811\u533a\u57df\u7ec4\u7ec7\u63d0\u5347\u7eb9\u7406\u8986\u76d6\u4e0e\u8fde\u7eed\u6027\u3002\u5176\u533a\u57df\u611f\u77e5\u6269\u6563\u8d85\u5206\u6a21\u578b\u53ef\u53ea\u589e\u5f3a\u9700\u8981\u6539\u8fdb\u7684\u63a9\u7801\u533a\u57df\uff0c\u5e76\u4e0e\u5468\u56f4\u7eb9\u7406\u65e0\u7f1d\u878d\u5408\uff0c\u5728\u7ec6\u8282\u548c\u4e00\u81f4\u6027\u4e0a\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We study sinusoidal recurrence as an iterative mechanism for harmonic spectral enrichment in implicit neural representations (INRs). Our analysis reveals that sinusoidal activations induce a harmonic line spectrum, providing a spectral account of how recurrent unrolling enriches the effective spectral support. We realize this principle with a shared sinusoidal block that iteratively refines the latent representation. We empirically validate the resulting spectral behavior against feed-forward INRs, non-sinusoidal recurrent variants, and equilibrium-style sinusoidal models. Complementing this analysis, we evaluate the proposed architecture across image and 3D representation tasks. On RGB image benchmarks, our method achieves higher fidelity than feed-forward baselines with fewer parameters and fewer optimization steps, and it further transfers favorably to super-resolution, NeRF, and SDF tasks.", "arxiv_id": "2607.21485", "arxiv_url": "https://arxiv.org/abs/2607.21485", "authors": ["Hyunmin Cho", "Jaejun Yoo", "Kyong Hwan Jin"], "brief": "\u8bba\u6587\u7814\u7a76\u5728\u9690\u5f0f\u795e\u7ecf\u8868\u793a\u4e2d\u5f15\u5165\u6b63\u5f26\u9012\u5f52\u673a\u5236\uff0c\u901a\u8fc7\u8fed\u4ee3\u5c55\u5f00\u5b9e\u73b0\u8c10\u6ce2\u9891\u8c31\u589e\u5f3a\uff0c\u5e76\u4ece\u9891\u8c31\u89d2\u5ea6\u89e3\u91ca\u5176\u6709\u6548\u6027\u3002\u63d0\u51fa\u7684\u5171\u4eab\u6b63\u5f26\u5757\u5728\u56fe\u50cf\u3001\u8d85\u5206\u8fa8\u7387\u3001NeRF \u548c SDF \u7b49\u4efb\u52a1\u4e0a\u4ee5\u66f4\u5c11\u53c2\u6570\u548c\u4f18\u5316\u6b65\u6570\u53d6\u5f97\u66f4\u9ad8\u4fdd\u771f\u8868\u793a\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21485", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9690\u5f0f\u795e\u7ecf\u8868\u793a", "\u9891\u8c31\u5efa\u6a21", "\u4e09\u7ef4\u91cd\u5efa", "\u8d85\u5206\u8fa8\u7387"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21485v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Recurrent Sinusoidal INRs for Efficient High-Fidelity Representation", "tldr": "\u8bba\u6587\u7814\u7a76\u5728\u9690\u5f0f\u795e\u7ecf\u8868\u793a\u4e2d\u5f15\u5165\u6b63\u5f26\u9012\u5f52\u673a\u5236\uff0c\u901a\u8fc7\u8fed\u4ee3\u5c55\u5f00\u5b9e\u73b0\u8c10\u6ce2\u9891\u8c31\u589e\u5f3a\uff0c\u5e76\u4ece\u9891\u8c31\u89d2\u5ea6\u89e3\u91ca\u5176\u6709\u6548\u6027\u3002\u63d0\u51fa\u7684\u5171\u4eab\u6b63\u5f26\u5757\u5728\u56fe\u50cf\u3001\u8d85\u5206\u8fa8\u7387\u3001NeRF \u548c SDF \u7b49\u4efb\u52a1\u4e0a\u4ee5\u66f4\u5c11\u53c2\u6570\u548c\u4f18\u5316\u6b65\u6570\u53d6\u5f97\u66f4\u9ad8\u4fdd\u771f\u8868\u793a\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Dynamic-scene reconstruction is almost always evaluated inside the observed time window, yet deployment settings such as AR overlays, robot interaction, and anticipatory planning need the future surface: the geometry at times beyond those captured. No standard benchmark measures this. We introduce FutureSurf, a controlled diagnostic benchmark and dataset for future-time surface reconstruction that trades scene diversity for exact future ground truth and falsification controls. A method trains on the observed first 75% of a sequence; we score its extracted per-frame surface on the held-out future by Chamfer distance, reporting absolute future CD as the primary score and the future/observed gap as a diagnostic. The dataset contains eight analytically defined controlled motions, including three falsification controls, with exact per-frame ground-truth meshes. We also provide a ground-truth-side recoverability oracle. The release includes split files, scoring code, a benchmark card, and Croissant metadata. On the controlled motions, the DG-Mesh backbone leaves a 2.7-4.1$\\times$ gap even for futures predictable in principle (four of five recoverable from observed motion by a fixed rule), while the falsification controls behave as designed (the surface-invariant motion shows no gap). Beyond the contributed dataset, the gap persists across six animated DG-Mesh asset scenes and a second backbone, Deformable-3DGS (2.0-6.6$\\times$; both share a deformation-MLP temporal model). The benchmark also shows that future rendering quality and future-surface accuracy are statistically decoupled, so the novel-view-synthesis metrics the field reports do not track future geometry. The future error is structured, concentrating where the surface moves. The dataset, evaluation toolkit, and scoring code are available on Hugging Face and GitHub (https://github.com/Ricky-S/futuresurf).", "arxiv_id": "2607.21471", "arxiv_url": "https://arxiv.org/abs/2607.21471", "authors": ["Yukun Shi", "Minglun Gong"], "brief": "\u8bba\u6587\u63d0\u51fa FutureSurf\uff0c\u7528\u4e8e\u8bc4\u4f30\u52a8\u6001\u8868\u9762\u91cd\u5efa\u5728\u89c2\u6d4b\u65f6\u95f4\u7a97\u4e4b\u5916\u7684\u672a\u6765\u51e0\u4f55\u9884\u6d4b\u80fd\u529b\uff0c\u5305\u542b\u53ef\u63a7\u89e3\u6790\u8fd0\u52a8\u3001\u7cbe\u786e\u672a\u6765\u7f51\u683c\u771f\u503c\u548c\u5b8c\u6574\u8bc4\u5206\u5de5\u5177\u3002\u5b9e\u9a8c\u663e\u793a DG-Mesh \u548c Deformable-3DGS \u5728\u53ef\u9884\u6d4b\u672a\u6765\u4e0a\u4ecd\u6709\u663e\u8457\u8bef\u5dee\u5dee\u8ddd\uff0c\u4e14\u672a\u6765\u6e32\u67d3\u8d28\u91cf\u4e0e\u672a\u6765\u8868\u9762\u7cbe\u5ea6\u7edf\u8ba1\u4e0a\u8131\u94a9\uff0c\u8bf4\u660e\u73b0\u6709\u65b0\u89c6\u89d2\u5408\u6210\u6307\u6807\u4e0d\u8db3\u4ee5\u8861\u91cf\u672a\u6765\u51e0\u4f55\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21471", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u52a8\u6001\u91cd\u5efa", "\u4e09\u7ef4\u89c6\u89c9", "\u57fa\u51c6\u6570\u636e\u96c6", "\u795e\u7ecf\u6e32\u67d3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21471v1", "published_at": "2026-07-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Future Rendering $\\neq$ Future Surface: A Benchmark and Dataset for Dynamic Surface Reconstruction Beyond the Observed Window", "tldr": "\u8bba\u6587\u63d0\u51fa FutureSurf\uff0c\u7528\u4e8e\u8bc4\u4f30\u52a8\u6001\u8868\u9762\u91cd\u5efa\u5728\u89c2\u6d4b\u65f6\u95f4\u7a97\u4e4b\u5916\u7684\u672a\u6765\u51e0\u4f55\u9884\u6d4b\u80fd\u529b\uff0c\u5305\u542b\u53ef\u63a7\u89e3\u6790\u8fd0\u52a8\u3001\u7cbe\u786e\u672a\u6765\u7f51\u683c\u771f\u503c\u548c\u5b8c\u6574\u8bc4\u5206\u5de5\u5177\u3002\u5b9e\u9a8c\u663e\u793a DG-Mesh \u548c Deformable-3DGS \u5728\u53ef\u9884\u6d4b\u672a\u6765\u4e0a\u4ecd\u6709\u663e\u8457\u8bef\u5dee\u5dee\u8ddd\uff0c\u4e14\u672a\u6765\u6e32\u67d3\u8d28\u91cf\u4e0e\u672a\u6765\u8868\u9762\u7cbe\u5ea6\u7edf\u8ba1\u4e0a\u8131\u94a9\uff0c\u8bf4\u660e\u73b0\u6709\u65b0\u89c6\u89d2\u5408\u6210\u6307\u6807\u4e0d\u8db3\u4ee5\u8861\u91cf\u672a\u6765\u51e0\u4f55\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];

  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
