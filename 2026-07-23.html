 models, we release the first multi-embodiment tabletop grasping dataset comprising over 2.5M grasps in cluttered scenes. Experimental results demonstrate that our approach outperforms existing baselines, achieving 72% success in simulation and 78% in real-world grasping experiments. See our project site for data and code: https://uoft-isl.github.io/seeded-grasp/", "arxiv_id": "2607.20207", "arxiv_url": "https://arxiv.org/abs/2607.20207", "authors": ["Yang Xu", "Gurpreet Singh Mukker", "Raymond Wang", "Jasper Gerigk", "Maria Attarian", "Igor Gilitschenski"], "brief": "SeededGrasp \u5c06\u8bed\u8a00\u8bed\u4e49\u7406\u89e3\u4e0e\u51e0\u4f55\u6293\u53d6\u751f\u6210\u89e3\u8026\uff1a\u5148\u7531 VLM \u6839\u636e\u4efb\u52a1\u8bed\u8a00\u9884\u6d4b\u6293\u53d6\u79cd\u5b50\u70b9\uff0c\u518d\u7531\u8f7b\u91cf\u6293\u53d6\u6a21\u578b\u751f\u6210\u53ef\u6267\u884c\u6293\u53d6\u3002\u8bba\u6587\u8fd8\u53d1\u5e03\u4e86\u9996\u4e2a\u591a\u673a\u5668\u4eba\u5f62\u6001\u684c\u9762\u6742\u4e71\u573a\u666f\u6293\u53d6\u6570\u636e\u96c6\uff0c\u5305\u542b\u8d85\u8fc7250\u4e07\u6b21\u6293\u53d6\u3002", "categories": ["cs.RO"], "github_repo": "https://github.com/uoft-isl/SeededGrasp", "github_stars": 2, "hf_url": "https://huggingface.co/papers/2607.20207", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u901a\u8fc7\u201c\u79cd\u5b50\u70b9\u201d\u6761\u4ef6\u5316\u6293\u53d6\u751f\u6210\uff0c\u907f\u514d\u7aef\u5230\u7aef\u8bad\u7ec3 VLM \u4e0e\u6293\u53d6\u6a21\u578b\uff0c\u964d\u4f4e\u6570\u636e\u4e0e\u7b97\u529b\u9700\u6c42\u3002", "\u652f\u6301\u591a\u79cd\u673a\u5668\u4eba\u672b\u7aef\u6267\u884c\u5668/embodiment\uff0c\u5728\u590d\u6742\u6742\u4e71\u573a\u666f\u4e2d\u8fdb\u884c\u8bed\u8a00\u6307\u5bfc\u6293\u53d6\u3002", "\u5b9e\u9a8c\u8fbe\u5230\u4eff\u771f72%\u6210\u529f\u7387\u3001\u771f\u5b9e\u673a\u5668\u4eba78%\u6210\u529f\u7387\uff0c\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002"], "keywords": ["\u673a\u5668\u4eba\u6293\u53d6", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001", "\u673a\u5668\u4eba\u6570\u636e\u96c6"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20207v1", "published_at": "2026-07-22", "score": 0.228, "selected_reasons": ["HF trending (1\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.20207.png", "title": "SeededGrasp: Language-Guided Grasping in Complex Scenes with Multiple Embodiments", "tldr": "\u7528VLM\u79cd\u5b50\u70b9\u9ad8\u6548\u5f15\u5bfc\u591a\u673a\u5668\u4eba\u6293\u53d6\u3002", "upvotes": 1, "what_it_is": "SeededGrasp \u5c06\u8bed\u8a00\u8bed\u4e49\u7406\u89e3\u4e0e\u51e0\u4f55\u6293\u53d6\u751f\u6210\u89e3\u8026\uff1a\u5148\u7531 VLM \u6839\u636e\u4efb\u52a1\u8bed\u8a00\u9884\u6d4b\u6293\u53d6\u79cd\u5b50\u70b9\uff0c\u518d\u7531\u8f7b\u91cf\u6293\u53d6\u6a21\u578b\u751f\u6210\u53ef\u6267\u884c\u6293\u53d6\u3002\u8bba\u6587\u8fd8\u53d1\u5e03\u4e86\u9996\u4e2a\u591a\u673a\u5668\u4eba\u5f62\u6001\u684c\u9762\u6742\u4e71\u573a\u666f\u6293\u53d6\u6570\u636e\u96c6\uff0c\u5305\u542b\u8d85\u8fc7250\u4e07\u6b21\u6293\u53d6\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u628a\u9ad8\u5c42\u4efb\u52a1\u8bed\u4e49\u548c\u4f4e\u5c42\u7a7a\u95f4\u51e0\u4f55\u6267\u884c\u6709\u6548\u5206\u79bb\uff0c\u63d0\u5347\u4e86\u8bed\u8a00\u6307\u5bfc\u6293\u53d6\u7684\u53ef\u6269\u5c55\u6027\u4e0e\u6570\u636e\u6548\u7387\uff1b\u540c\u65f6\u5927\u89c4\u6a21\u591a\u5f62\u6001\u6293\u53d6\u6570\u636e\u96c6\u5bf9\u673a\u5668\u4eba\u64cd\u4f5c\u7814\u7a76\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Video Diffusion Transformers process long spatio-temporal sequences, making self-attention the main bottleneck in high-resolution video generation. Training-free sparse attention reduces this cost, but adaptive Top-$p$ routing creates uneven per-head workloads under multi-GPU sequence parallelism. The resulting workload heterogeneity turns sparse attention into a rank-level straggler problem. We present \\method{}, a training-free sparse-attention system that improves the distributed execution efficiency of adaptive sparse attention under multi-GPU sequence parallelism. \\method{} uses Top-$p$ routing, a Top-$k$ safety floor, and video-aware block organization as the sparse-routing frontend, then repairs the materialized mask at runtime. Runtime Load Balancing migrates a small number of heavy heads via P2P communication to shorten the current critical path. Slack-Aware Sparse Augmentation fills residual non-critical-rank slack with additional high-value blocks, while overlap hides scheduling and migration overhead behind existing computation. On step-distilled Wan2.2 I2V, \\method{} reduces average load imbalance from 1.34 to 1.08 and delivers a $4.41\\times$ attention speedup over FlashAttention, while achieving a $2.02$--$2.11\\times$ DiT inference speedup with competitive video quality.", "arxiv_id": "2607.16190", "arxiv_url": "https://arxiv.org/abs/2607.16190", "authors": ["Hao Liu", "Chenghuan Huang", "Ye Huang", "Zhiying Wen", "Hao Liu", "Mohan Zhang", "Chen Li", "Ziyang Ma", "Jing Lyu", "Jiangsu Du"], "brief": "\u8bba\u6587\u63d0\u51fa FVAttn\uff0c\u4e00\u4e2a\u514d\u8bad\u7ec3\u7684\u7a00\u758f\u6ce8\u610f\u529b\u7cfb\u7edf\uff0c\u7528\u4e8e\u63d0\u5347\u89c6\u9891\u6269\u6563 Transformer \u5728\u591a GPU \u5e8f\u5217\u5e76\u884c\u4e0b\u7684\u6267\u884c\u6548\u7387\u3002\u5b83\u9488\u5bf9\u81ea\u9002\u5e94 Top-p \u7a00\u758f\u8def\u7531\u9020\u6210\u7684\u5404\u6ce8\u610f\u529b\u5934\u8d1f\u8f7d\u4e0d\u5747\u95ee\u9898\uff0c\u5728\u8fd0\u884c\u65f6\u4fee\u590d\u63a9\u7801\u5e76\u52a8\u6001\u8fc1\u79fb\u91cd\u8d1f\u8f7d head\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16190", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u91c7\u7528 Top-p \u8def\u7531\u3001Top-k \u5b89\u5168\u4e0b\u9650\u548c\u89c6\u9891\u611f\u77e5\u5757\u7ec4\u7ec7\u6784\u5efa\u7a00\u758f\u6ce8\u610f\u529b\u524d\u7aef", "\u901a\u8fc7 Runtime Load Balancing \u4f7f\u7528 P2P \u901a\u4fe1\u8fc1\u79fb\u5c11\u91cf\u91cd\u8d1f\u8f7d\u6ce8\u610f\u529b\u5934\uff0c\u7f13\u89e3 rank \u7ea7\u62d6\u5c3e", "\u5728 Wan2.2 I2V \u4e0a\u5c06\u5e73\u5747\u8d1f\u8f7d\u4e0d\u5747\u8861\u4ece 1.34 \u964d\u81f3 1.08\uff0c\u6ce8\u610f\u529b\u8f83 FlashAttention \u52a0\u901f 4.41 \u500d\uff0cDiT \u63a8\u7406\u52a0\u901f 2.02\u20132.11 \u500d"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u7a00\u758f\u6ce8\u610f\u529b", "\u5206\u5e03\u5f0f\u63a8\u7406", "\u6269\u6563\u6a21\u578b"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16190v1", "published_at": "2026-07-17", "score": 0.221, "selected_reasons": ["HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16190.png", "title": "FVAttn: Adaptive Sparse Attention with Runtime Load Balancing for Video Generation", "tldr": "\u9762\u5411\u89c6\u9891\u751f\u6210\u7684\u81ea\u9002\u5e94\u7a00\u758f\u6ce8\u610f\u529b\u8d1f\u8f7d\u5747\u8861\u7cfb\u7edf", "upvotes": 4, "what_it_is": "\u8bba\u6587\u63d0\u51fa FVAttn\uff0c\u4e00\u4e2a\u514d\u8bad\u7ec3\u7684\u7a00\u758f\u6ce8\u610f\u529b\u7cfb\u7edf\uff0c\u7528\u4e8e\u63d0\u5347\u89c6\u9891\u6269\u6563 Transformer \u5728\u591a GPU \u5e8f\u5217\u5e76\u884c\u4e0b\u7684\u6267\u884c\u6548\u7387\u3002\u5b83\u9488\u5bf9\u81ea\u9002\u5e94 Top-p \u7a00\u758f\u8def\u7531\u9020\u6210\u7684\u5404\u6ce8\u610f\u529b\u5934\u8d1f\u8f7d\u4e0d\u5747\u95ee\u9898\uff0c\u5728\u8fd0\u884c\u65f6\u4fee\u590d\u63a9\u7801\u5e76\u52a8\u6001\u8fc1\u79fb\u91cd\u8d1f\u8f7d head\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u7a00\u758f\u6ce8\u610f\u529b\u7684\u74f6\u9888\u4ece\u7b97\u6cd5\u7a00\u758f\u6027\u8fdb\u4e00\u6b65\u63a8\u8fdb\u5230\u5206\u5e03\u5f0f\u8fd0\u884c\u65f6\u8c03\u5ea6\u5c42\u9762\uff0c\u89e3\u51b3\u4e86\u81ea\u9002\u5e94\u7a00\u758f\u5728\u591a GPU \u89c6\u9891\u751f\u6210\u4e2d\u5bb9\u6613\u4ea7\u751f\u7684\u8d1f\u8f7d\u4e0d\u5747\u95ee\u9898\uff0c\u5177\u6709\u76f4\u63a5\u7684\u9ad8\u5206\u8fa8\u7387\u89c6\u9891\u751f\u6210\u63a8\u7406\u52a0\u901f\u4ef7\u503c\u3002"}, {"abstract": "Controllable video generation remains challenging due to the difficulty of specifying precise multi-object interactions using text prompts or motion-control inputs that primarily constrain pixel movement. In practice, trajectory-based control often requires users to draw accurate tracks for multiple objects, which scales poorly with scene complexity and becomes ambiguous under occlusion or overlap. To enable flexible yet precise multi-subject control, we introduce $\\textbf{GraphVid}$, a graph-conditioned image-to-video generation model that enables interactive control through structured interaction graphs. We further curate $\\textbf{GraphVid-Bench}$, a large-scale interaction-centric video dataset with structured relational annotations to enable training of interaction-aware video generation models. Despite using substantially less training data and fewer trainable parameters than prior motion-control methods, GraphVid delivers strong controllability and video quality. Compared with Motion-I2V, GraphVid reduces FID by up to 39.9% and FVD by 37.6%, while improving PSNR (9.87=\u003e15.98) and SSIM (0.38=\u003e0.61). Our results highlight the potential of structured semantic interfaces as a powerful paradigm for controllable video generation.", "arxiv_id": "2607.21580", "arxiv_url": "https://arxiv.org/abs/2607.21580", "authors": ["Vedant Shah", "Onkar Susladkar", "Tushar Prakash", "Kiet Nguyen", "Tianjio Yu", "Adheesh Juvekar", "Muntasir Waheed", "Ismini Lourentzou"], "brief": "GraphVid \u662f\u4e00\u79cd\u56fe\u6761\u4ef6\u56fe\u50cf\u5230\u89c6\u9891\u751f\u6210\u6a21\u578b\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u4ea4\u4e92\u56fe\u6765\u6307\u5b9a\u591a\u4e3b\u4f53\u5173\u7cfb\u4e0e\u52a8\u6001\u4ea4\u4e92\u3002\u8bba\u6587\u8fd8\u6784\u5efa\u4e86\u5e26\u7ed3\u6784\u5316\u5173\u7cfb\u6807\u6ce8\u7684 GraphVid-Bench\uff0c\u7528\u4e8e\u8bad\u7ec3\u548c\u8bc4\u6d4b\u4ea4\u4e92\u611f\u77e5\u7684\u89c6\u9891\u751f\u6210\u6a21\u578b\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21580", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4ee5\u4ea4\u4e92\u56fe\u66ff\u4ee3\u6587\u672c\u63d0\u793a\u6216\u9010\u5bf9\u8c61\u8f68\u8ff9\uff0c\u964d\u4f4e\u591a\u5bf9\u8c61\u63a7\u5236\u5728\u906e\u6321\u3001\u91cd\u53e0\u548c\u590d\u6742\u573a\u666f\u4e0b\u7684\u6b67\u4e49\u3002", "GraphVid-Bench \u63d0\u4f9b\u5927\u89c4\u6a21\u4ee5\u4ea4\u4e92\u4e3a\u4e2d\u5fc3\u7684\u89c6\u9891\u6570\u636e\u53ca\u5173\u7cfb\u6807\u6ce8\uff0c\u652f\u6301\u5173\u7cfb\u7ea7\u53ef\u63a7\u751f\u6210\u8bad\u7ec3\u3002", "\u76f8\u6bd4 Motion-I2V\uff0cFID \u6700\u9ad8\u964d\u4f4e 39.9%\u3001FVD \u964d\u4f4e 37.6%\uff0cPSNR \u4ece 9.87 \u63d0\u5347\u5230 15.98\uff0cSSIM \u4ece 0.38 \u63d0\u5347\u5230 0.61\u3002"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u53ef\u63a7\u751f\u6210", "\u56fe\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 1, "on_hf": true, "organization": "PLAN Lab @University of Illinois Urbana-Champaign", "pdf_url": "https://arxiv.org/pdf/2607.21580v1", "published_at": "2026-07-23", "score": 0.205, "selected_reasons": ["HF trending (0\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.21580.png", "title": "GraphVid: Interactive Graph-Controllable Video Generation", "tldr": "\u7528\u4ea4\u4e92\u56fe\u7cbe\u786e\u63a7\u5236\u591a\u5bf9\u8c61\u89c6\u9891\u751f\u6210\u3002", "upvotes": 0, "what_it_is": "GraphVid \u662f\u4e00\u79cd\u56fe\u6761\u4ef6\u56fe\u50cf\u5230\u89c6\u9891\u751f\u6210\u6a21\u578b\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u4ea4\u4e92\u56fe\u6765\u6307\u5b9a\u591a\u4e3b\u4f53\u5173\u7cfb\u4e0e\u52a8\u6001\u4ea4\u4e92\u3002\u8bba\u6587\u8fd8\u6784\u5efa\u4e86\u5e26\u7ed3\u6784\u5316\u5173\u7cfb\u6807\u6ce8\u7684 GraphVid-Bench\uff0c\u7528\u4e8e\u8bad\u7ec3\u548c\u8bc4\u6d4b\u4ea4\u4e92\u611f\u77e5\u7684\u89c6\u9891\u751f\u6210\u6a21\u578b\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u53ef\u63a7\u89c6\u9891\u751f\u6210\u7684\u63a5\u53e3\u4ece\u4f4e\u5c42\u8f68\u8ff9\u63a7\u5236\u63a8\u8fdb\u5230\u7ed3\u6784\u5316\u8bed\u4e49\u5173\u7cfb\u63a7\u5236\uff0c\u66f4\u9002\u5408\u590d\u6742\u591a\u4e3b\u4f53\u4ea4\u4e92\u573a\u666f\uff0c\u517c\u5177\u66f4\u9ad8\u53ef\u63a7\u6027\u548c\u89c6\u9891\u8d28\u91cf\u3002"}, {"abstract": "Structured understanding of satellite video is essential for advancing dynamic geospatial scene analysis from low-level perception to high-level cognition. To move beyond object-centric perception, this paper introduces spatio-temporal panoptic scene graph generation (TPSG) in satellite video as a new benchmark task. TPSG aims to generate a structured graph composed of a set of triplets \u003csubject, relationship, object\u003e with explicit temporal spans, thereby describing dynamic geospatial scenes by jointly modeling identity-consistent instance masks and spatio-temporal relationships among panoptic scene elements. However, there is still no dedicated dataset for TPSG in satellite video. Moreover, TPSG in satellite video is intrinsically challenging, as objects are often small and weakly textured, cross-frame association is easily disrupted by occlusion and background clutter, and relationship semantics are highly coupled with spatial structure and temporal evolution. Consequently, TPSG models developed for natural videos are not directly applicable to satellite video. This paper presents T-STAR, a large-scale benchmark dataset for TPSG in satellite video, comprising over 1.1 million instance masks and over 3.8 million spatio-temporal triplets across 39 fine-grained object categories and 70 fine-grained relationship categories. To enable TPSG in satellite video, we propose a unified framework to enhance cross-frame instance consistency and spatio-temporal relationship prediction. Extensive experiments demonstrate the significance of T-STAR and the effectiveness of the proposed framework, establishing a strong benchmark for future research on structured satellite video understanding. The dataset and code are available at https://github.com/linlin-dev/T-STAR.", "arxiv_id": "2607.21228", "arxiv_url": "https://arxiv.org/abs/2607.21228", "authors": ["Linlin Wang", "Xue Yang", "Zhihuang Zhou", "Zhenyu Zhong", "Ruiyuan Zhang", "Yansheng Li"], "brief": "\u8bba\u6587\u63d0\u51fa\u536b\u661f\u89c6\u9891\u4e2d\u7684\u65f6\u7a7a\u5168\u666f\u573a\u666f\u56fe\u751f\u6210\uff08TPSG\uff09\u4efb\u52a1\uff0c\u5e76\u53d1\u5e03 T-STAR \u5927\u89c4\u6a21\u57fa\u51c6\u6570\u636e\u96c6\u3002\u8be5\u4efb\u52a1\u8981\u6c42\u540c\u65f6\u5efa\u6a21\u8de8\u5e27\u4e00\u81f4\u7684\u5b9e\u4f8b\u63a9\u7801\u4e0e\u5e26\u65f6\u95f4\u8de8\u5ea6\u7684\u4e3b\u8c13\u5bbe\u5173\u7cfb\u4e09\u5143\u7ec4\uff0c\u4ee5\u7ed3\u6784\u5316\u63cf\u8ff0\u52a8\u6001\u5730\u7406\u573a\u666f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21228", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["T-STAR \u5305\u542b\u8d85\u8fc7 110 \u4e07\u4e2a\u5b9e\u4f8b\u63a9\u7801\u3001380 \u4e07\u4e2a\u65f6\u7a7a\u5173\u7cfb\u4e09\u5143\u7ec4\uff0c\u8986\u76d6 39 \u7c7b\u7ec6\u7c92\u5ea6\u76ee\u6807\u548c 70 \u7c7b\u5173\u7cfb\u3002", "\u9488\u5bf9\u536b\u661f\u89c6\u9891\u4e2d\u76ee\u6807\u5c0f\u3001\u7eb9\u7406\u5f31\u3001\u906e\u6321\u548c\u80cc\u666f\u6742\u6ce2\u5bfc\u81f4\u8de8\u5e27\u5173\u8054\u56f0\u96be\u7b49\u95ee\u9898\uff0c\u63d0\u51fa\u7edf\u4e00\u6846\u67b6\u589e\u5f3a\u5b9e\u4f8b\u4e00\u81f4\u6027\u4e0e\u65f6\u7a7a\u5173\u7cfb\u9884\u6d4b\u3002", "\u5b9e\u9a8c\u8868\u660e\u81ea\u7136\u89c6\u9891\u573a\u666f\u56fe\u65b9\u6cd5\u96be\u4ee5\u76f4\u63a5\u8fc1\u79fb\u5230\u536b\u661f\u89c6\u9891\uff0cT-STAR \u53ef\u4f5c\u4e3a\u7ed3\u6784\u5316\u9065\u611f\u89c6\u9891\u7406\u89e3\u7684\u65b0\u57fa\u51c6\u3002"], "keywords": ["\u9065\u611f\u89c6\u9891", "\u573a\u666f\u56fe", "\u5168\u666f\u5206\u5272", "\u65f6\u7a7a\u5efa\u6a21"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21228v1", "published_at": "2026-07-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "T-STAR: A Large-Scale Benchmark for Spatio-Temporal Panoptic Scene Graph Generation in Satellite Video", "tldr": "\u9996\u4e2a\u5927\u89c4\u6a21\u536b\u661f\u89c6\u9891\u65f6\u7a7a\u5168\u666f\u573a\u666f\u56fe\u57fa\u51c6\u3002", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u536b\u661f\u89c6\u9891\u4e2d\u7684\u65f6\u7a7a\u5168\u666f\u573a\u666f\u56fe\u751f\u6210\uff08TPSG\uff09\u4efb\u52a1\uff0c\u5e76\u53d1\u5e03 T-STAR \u5927\u89c4\u6a21\u57fa\u51c6\u6570\u636e\u96c6\u3002\u8be5\u4efb\u52a1\u8981\u6c42\u540c\u65f6\u5efa\u6a21\u8de8\u5e27\u4e00\u81f4\u7684\u5b9e\u4f8b\u63a9\u7801\u4e0e\u5e26\u65f6\u95f4\u8de8\u5ea6\u7684\u4e3b\u8c13\u5bbe\u5173\u7cfb\u4e09\u5143\u7ec4\uff0c\u4ee5\u7ed3\u6784\u5316\u63cf\u8ff0\u52a8\u6001\u5730\u7406\u573a\u666f\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c06\u9065\u611f\u89c6\u9891\u7406\u89e3\u4ece\u76ee\u6807\u68c0\u6d4b/\u5206\u5272\u63a8\u8fdb\u5230\u9ad8\u5c42\u7ed3\u6784\u5316\u8ba4\u77e5\uff0c\u4e3a\u52a8\u6001\u5730\u7406\u573a\u666f\u5206\u6790\u63d0\u4f9b\u4e86\u4efb\u52a1\u5b9a\u4e49\u3001\u6570\u636e\u96c6\u548c\u57fa\u7ebf\u6846\u67b6\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u57fa\u51c6\u4ef7\u503c\u548c\u5e94\u7528\u6f5c\u529b\u3002"}, {"abstract": "Knowledge-Intensive Visual Question Answering (KI-VQA) benchmarks evaluate Vision-Language Models (VLMs) as multimodal knowledge assistants by requiring external information beyond a provided image to answer questions. KI-VQA involves multiple sub-problems -referring expression understanding, visual grounding, object recognition, knowledge retrieval, and reasoning-yet existing benchmarks typically report only end-task accuracy, obscuring where failures arise. To analyze the full KI-VQA pipeline, we introduce CRAG-MM-Diagnostics, a diagnostic benchmark with stage-wise data annotations that isolate 1) language-based visual grounding, 2) object identification, and 3) knowledge retrieval and reasoning. We evaluate fully parametric and retrieval-augmented VLMs, providing fine-grained analyses using newly collected metadata, such as target ROIs, entity names, and visual complexity scores. Our results point to knowledge retrieval and reasoning as the primary bottleneck, but also highlight issues in the other parts of the KI-VQA pipeline, such as the fact that VLMs struggle with target object identification or that image retrievers struggle to integrate textual cues. These findings expose fundamental limitations in current KI-VQA systems and motivate stage-aware evaluation. We, lastly, leverage these findings to propose a grounded bimodal RAG pipeline that integrates a visual grounding module to crop targets before image retrieval, boosting GPT-5 and Qwen\u0027s respective accuracies by 13.3 and 8.5 percentage points.", "arxiv_id": "2607.21155", "arxiv_url": "https://arxiv.org/abs/2607.21155", "authors": ["Hanseok Oh", "Parishad BehnamGhader", "Benno Krojer", "Hyunji Lee", "Paul Liang", "Siva Reddy", "Verna Dankers"], "brief": "\u8bba\u6587\u63d0\u51fa CRAG-MM-Diagnostics\uff0c\u4e00\u4e2a\u5e26\u9636\u6bb5\u7ea7\u6807\u6ce8\u7684\u77e5\u8bc6\u5bc6\u96c6\u578b VQA \u8bca\u65ad\u57fa\u51c6\uff0c\u7528\u4e8e\u62c6\u89e3\u8bed\u8a00\u89c6\u89c9\u5b9a\u4f4d\u3001\u76ee\u6807\u8bc6\u522b\u3001\u77e5\u8bc6\u68c0\u7d22\u4e0e\u63a8\u7406\u7b49\u73af\u8282\u3002\u4f5c\u8005\u8bc4\u6d4b\u53c2\u6570\u5316\u4e0e\u68c0\u7d22\u589e\u5f3a VLM\uff0c\u5e76\u636e\u6b64\u63d0\u51fa\u5e26\u89c6\u89c9\u5b9a\u4f4d\u88c1\u526a\u7684\u53cc\u6a21\u6001 RAG \u6d41\u6c34\u7ebf\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21155", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u65b0\u589e\u76ee\u6807 ROI\u3001\u5b9e\u4f53\u540d\u79f0\u3001\u89c6\u89c9\u590d\u6742\u5ea6\u7b49\u5143\u6570\u636e\uff0c\u53ef\u5b9a\u4f4d KI-VQA \u5168\u6d41\u7a0b\u4e2d\u7684\u5177\u4f53\u5931\u8d25\u9636\u6bb5", "\u5b9e\u9a8c\u53d1\u73b0\u77e5\u8bc6\u68c0\u7d22\u4e0e\u63a8\u7406\u662f\u4e3b\u8981\u74f6\u9888\uff0c\u540c\u65f6 VLM \u5728\u76ee\u6807\u5bf9\u8c61\u8bc6\u522b\u3001\u56fe\u50cf\u68c0\u7d22\u5668\u878d\u5408\u6587\u672c\u7ebf\u7d22\u65b9\u9762\u4e5f\u5b58\u5728\u660e\u663e\u95ee\u9898", "\u57fa\u4e8e\u8bca\u65ad\u7ed3\u679c\u6784\u5efa grounded bimodal RAG\uff1a\u5148\u89c6\u89c9\u5b9a\u4f4d\u5e76\u88c1\u526a\u76ee\u6807\u518d\u68c0\u7d22\uff0c\u4f7f GPT-5 \u4e0e Qwen \u51c6\u786e\u7387\u5206\u522b\u63d0\u5347 13.3 \u548c 8.5 \u4e2a\u767e\u5206\u70b9"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u95ee\u7b54", "\u68c0\u7d22\u589e\u5f3a", "\u8bc4\u6d4b\u57fa\u51c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21155v1", "published_at": "2026-07-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "CRAG-MM-Diagnostics: Enabling Stage-Wise Analysis of Knowledge-Intensive VQA", "tldr": "\u5206\u9636\u6bb5\u8bca\u65ad\u77e5\u8bc6\u5bc6\u96c6\u578b\u89c6\u89c9\u95ee\u7b54\u74f6\u9888", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa CRAG-MM-Diagnostics\uff0c\u4e00\u4e2a\u5e26\u9636\u6bb5\u7ea7\u6807\u6ce8\u7684\u77e5\u8bc6\u5bc6\u96c6\u578b VQA \u8bca\u65ad\u57fa\u51c6\uff0c\u7528\u4e8e\u62c6\u89e3\u8bed\u8a00\u89c6\u89c9\u5b9a\u4f4d\u3001\u76ee\u6807\u8bc6\u522b\u3001\u77e5\u8bc6\u68c0\u7d22\u4e0e\u63a8\u7406\u7b49\u73af\u8282\u3002\u4f5c\u8005\u8bc4\u6d4b\u53c2\u6570\u5316\u4e0e\u68c0\u7d22\u589e\u5f3a VLM\uff0c\u5e76\u636e\u6b64\u63d0\u51fa\u5e26\u89c6\u89c9\u5b9a\u4f4d\u88c1\u526a\u7684\u53cc\u6a21\u6001 RAG \u6d41\u6c34\u7ebf\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u4ece\u5355\u4e00\u7ec8\u5c40\u51c6\u786e\u7387\u8f6c\u5411\u9636\u6bb5\u611f\u77e5\u8bc4\u6d4b\uff0c\u80fd\u66f4\u6e05\u695a\u63ed\u793a\u77e5\u8bc6\u5bc6\u96c6\u578b\u591a\u6a21\u6001\u7cfb\u7edf\u7684\u5931\u8d25\u539f\u56e0\uff0c\u5e76\u76f4\u63a5\u6307\u5bfc\u66f4\u6709\u6548\u7684 RAG \u67b6\u6784\u8bbe\u8ba1\u3002"}, {"abstract": "Although Multimodal Large Language Models have achieved strong performance across a wide range of vision-language tasks, they still suffer from hallucinations, where model outputs become inconsistent with the visual content, textual context, or commonsense knowledge. Existing studies primarily address this problem through coarse-grained detection. However, these approaches often provide insufficient diagnostic information for understanding hallucination types and supporting downstream hallucination mitigation. To bridge this gap, we propose fine-grained hallucination diagnosis for MLLMs, a new unified task that jointly performs hallucination detection, classification, and interpretable explanation generation. We develop an automated data generation pipeline and construct HalluScope-30K, a large-scale diagnostic dataset covering eight sources and five task categories. Based on this dataset, we design a multi-granular joint reward function and train two diagnosis models, HalluScope-4B and HalluScope-8B, which achieve state-of-the-art performance on both the MHALO benchmark and our fine-grained hallucination classification benchmark. Notably, detection and classification are mutually beneficial under joint optimization. Furthermore, diagnosis-driven feedback experiments show that the fine-grained diagnostic explanations produced by our model effectively guide target models to correct their hallucinations, with full diagnosis substantially outperforming all baselines on both Qwen3-VL-8B-Instruct and LLaVA-1.5-7B.", "arxiv_id": "2607.21105", "arxiv_url": "https://arxiv.org/abs/2607.21105", "authors": ["Weilin Jin", "Mingyu Wang", "Wenbo Li", "Haoyang Huang", "Yifan Wu", "Ying Li", "Gang Huang", "Zhonghai Wu"], "brief": "\u8bba\u6587\u63d0\u51fa\u591a\u6a21\u6001\u5927\u6a21\u578b\u5e7b\u89c9\u7684\u7ec6\u7c92\u5ea6\u8bca\u65ad\u4efb\u52a1\uff0c\u7edf\u4e00\u8fdb\u884c\u5e7b\u89c9\u68c0\u6d4b\u3001\u7c7b\u578b\u5206\u7c7b\u4e0e\u53ef\u89e3\u91ca\u539f\u56e0\u751f\u6210\u3002\u4f5c\u8005\u6784\u5efa HalluScope-30K \u6570\u636e\u96c6\uff0c\u5e76\u8bad\u7ec3 HalluScope-4B/8B \u8bca\u65ad\u6a21\u578b\uff0c\u5728\u76f8\u5173\u57fa\u51c6\u4e0a\u53d6\u5f97\u9886\u5148\u8868\u73b0\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21105", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efa\u81ea\u52a8\u5316\u6570\u636e\u751f\u6210\u6d41\u7a0b\uff0c\u5f62\u6210\u8986\u76d6\u516b\u7c7b\u5e7b\u89c9\u6765\u6e90\u3001\u4e94\u7c7b\u4efb\u52a1\u7684 HalluScope-30K \u8bca\u65ad\u6570\u636e\u96c6", "\u8bbe\u8ba1\u591a\u7c92\u5ea6\u8054\u5408\u5956\u52b1\u51fd\u6570\uff0c\u4f7f\u68c0\u6d4b\u3001\u5206\u7c7b\u548c\u89e3\u91ca\u751f\u6210\u534f\u540c\u4f18\u5316\uff0c\u4e14\u68c0\u6d4b\u4e0e\u5206\u7c7b\u76f8\u4e92\u4fc3\u8fdb", "\u8bca\u65ad\u751f\u6210\u7684\u7ec6\u7c92\u5ea6\u89e3\u91ca\u53ef\u53cd\u9988\u7ed9 Qwen3-VL-8B-Instruct\u3001LLaVA-1.5-7B \u7b49\u6a21\u578b\uff0c\u663e\u8457\u63d0\u5347\u5e7b\u89c9\u7ea0\u6b63\u6548\u679c"], "keywords": ["\u591a\u6a21\u6001", "\u5e7b\u89c9\u68c0\u6d4b", "\u53ef\u89e3\u91ca\u6027", "\u5927\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21105v1", "published_at": "2026-07-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "HalluScope: Fine-grained Hallucination Diagnosis for Multimodal Large Language Models", "tldr": "\u7ec6\u7c92\u5ea6\u8bca\u65ad\u591a\u6a21\u6001\u5927\u6a21\u578b\u5e7b\u89c9", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u591a\u6a21\u6001\u5927\u6a21\u578b\u5e7b\u89c9\u7684\u7ec6\u7c92\u5ea6\u8bca\u65ad\u4efb\u52a1\uff0c\u7edf\u4e00\u8fdb\u884c\u5e7b\u89c9\u68c0\u6d4b\u3001\u7c7b\u578b\u5206\u7c7b\u4e0e\u53ef\u89e3\u91ca\u539f\u56e0\u751f\u6210\u3002\u4f5c\u8005\u6784\u5efa HalluScope-30K \u6570\u636e\u96c6\uff0c\u5e76\u8bad\u7ec3 HalluScope-4B/8B \u8bca\u65ad\u6a21\u578b\uff0c\u5728\u76f8\u5173\u57fa\u51c6\u4e0a\u53d6\u5f97\u9886\u5148\u8868\u73b0\u3002", "why_notable": "\u76f8\u6bd4\u53ea\u505a\u7c97\u7c92\u5ea6\u5e7b\u89c9\u68c0\u6d4b\uff0c\u8be5\u5de5\u4f5c\u63d0\u4f9b\u4e86\u53ef\u89e3\u91ca\u3001\u53ef\u5206\u7c7b\u3001\u53ef\u7528\u4e8e\u4fee\u6b63\u7684\u8bca\u65ad\u80fd\u529b\uff0c\u6709\u52a9\u4e8e\u63d0\u5347\u591a\u6a21\u6001\u5927\u6a21\u578b\u5728\u89c6\u89c9\u95ee\u7b54\u3001\u56fe\u6587\u7406\u89e3\u7b49\u573a\u666f\u4e2d\u7684\u53ef\u9760\u6027\u4e0e\u53ef\u63a7\u6027\u3002"}, {"abstract": "Despite remarkable progress in visual understanding, Multimodal Large Language Models (MLLMs) remain prone to hallucinations when reasoning about spatial relationships, often producing judgments that contradict the true 3D structure of the scene. Though several existing works have proposed to mitigate hallucinations, our analysis indicates that they show limited effectiveness in spatial reasoning, as they fail to bridge the fundamental gap between 2D visual representations and 3D spatial reality. Based on this finding, we define hallucinations arising from insufficient spatial structure modeling as spatial reasoning hallucination, a subcategory of relation hallucination that existing mitigation methods fail to address. We further identify three typical scenarios where such hallucinations frequently occur: perspective effects, object orientation, and viewpoint changes. To this end, we propose Geo3R, a training-free, plug-and-play framework that incorporates geometric evidence and structured 3D reasoning to mitigate spatial reasoning hallucination. Experiments on three benchmarks, covering 18 tasks across all three scenarios, show that Geo3R substantially reduces spatial reasoning hallucination across diverse MLLMs without additional training, outperforming existing models and methods.", "arxiv_id": "2607.21085", "arxiv_url": "https://arxiv.org/abs/2607.21085", "authors": ["Mingyu Wang", "Weilin Jin", "Wenbo Li", "Haoyang Huang", "Tong Jia", "Ying Li"], "brief": "\u672c\u6587\u5b9a\u4e49\u4e86\u591a\u6a21\u6001\u5927\u6a21\u578b\u4e2d\u7684\u201c\u7a7a\u95f4\u63a8\u7406\u5e7b\u89c9\u201d\uff0c\u5373\u56e0\u7f3a\u4e4f3D\u7a7a\u95f4\u7ed3\u6784\u5efa\u6a21\u800c\u4ea7\u751f\u7684\u5173\u7cfb\u5224\u65ad\u9519\u8bef\u3002\u4f5c\u8005\u63d0\u51faGeo3R\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u3001\u5373\u63d2\u5373\u7528\u7684\u6846\u67b6\uff0c\u901a\u8fc7\u51e0\u4f55\u8bc1\u636e\u548c\u7ed3\u6784\u53163D\u63a8\u7406\u6765\u964d\u4f4e\u8fd9\u7c7b\u5e7b\u89c9\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21085", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6307\u51fa\u73b0\u6709\u5e7b\u89c9\u7f13\u89e3\u65b9\u6cd5\u96be\u4ee5\u5f25\u54082D\u89c6\u89c9\u8868\u793a\u4e0e\u771f\u5b9e3D\u7a7a\u95f4\u7ed3\u6784\u4e4b\u95f4\u7684\u5dee\u8ddd", "\u5f52\u7eb3\u7a7a\u95f4\u63a8\u7406\u5e7b\u89c9\u7684\u4e09\u7c7b\u9ad8\u53d1\u573a\u666f\uff1a\u900f\u89c6\u6548\u5e94\u3001\u7269\u4f53\u671d\u5411\u3001\u89c6\u89d2\u53d8\u5316", "\u57283\u4e2a\u57fa\u51c6\u300118\u4e2a\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0cGeo3R\u53ef\u8de8\u591a\u79cdMLLM\u663e\u8457\u51cf\u5c11\u7a7a\u95f4\u63a8\u7406\u5e7b\u89c9\u4e14\u65e0\u9700\u989d\u5916\u8bad\u7ec3"], "keywords": ["\u591a\u6a21\u6001", "\u7a7a\u95f4\u63a8\u7406", "\u5e7b\u89c9\u7f13\u89e3", "3D\u7406\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21085v1", "published_at": "2026-07-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Geo3R: Mitigating Spatial Reasoning Hallucination in Multimodal Large Language Models", "tldr": "\u7528\u51e0\u4f55\u8bc1\u636e\u7f13\u89e3MLLM\u7a7a\u95f4\u5e7b\u89c9", "upvotes": 0, "what_it_is": "\u672c\u6587\u5b9a\u4e49\u4e86\u591a\u6a21\u6001\u5927\u6a21\u578b\u4e2d\u7684\u201c\u7a7a\u95f4\u63a8\u7406\u5e7b\u89c9\u201d\uff0c\u5373\u56e0\u7f3a\u4e4f3D\u7a7a\u95f4\u7ed3\u6784\u5efa\u6a21\u800c\u4ea7\u751f\u7684\u5173\u7cfb\u5224\u65ad\u9519\u8bef\u3002\u4f5c\u8005\u63d0\u51faGeo3R\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u3001\u5373\u63d2\u5373\u7528\u7684\u6846\u67b6\uff0c\u901a\u8fc7\u51e0\u4f55\u8bc1\u636e\u548c\u7ed3\u6784\u53163D\u63a8\u7406\u6765\u964d\u4f4e\u8fd9\u7c7b\u5e7b\u89c9\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c06\u591a\u6a21\u6001\u5e7b\u89c9\u95ee\u9898\u7ec6\u5316\u52303D\u7a7a\u95f4\u63a8\u7406\u5c42\u9762\uff0c\u5e76\u63d0\u4f9b\u8bad\u7ec3\u514d\u8d39\u3001\u53ef\u63d2\u62d4\u7684\u51e0\u4f55\u589e\u5f3a\u65b9\u6848\uff0c\u5bf9\u63d0\u5347MLLM\u5728\u673a\u5668\u4eba\u3001\u5bfc\u822a\u3001\u573a\u666f\u7406\u89e3\u7b49\u771f\u5b9e\u7a7a\u95f4\u4efb\u52a1\u4e2d\u7684\u53ef\u9760\u6027\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We present DONDO, a family of open, permissively licensed automatic speech recognition (ASR) base models for African languages, built on the w2v-BERT 2.0 self-supervised speech encoder. DONDO comprises twenty-one monolingual models and five multilingual models spanning twenty-seven language varieties across Ghana, Sierra Leone, Nigeria, Senegal, Kenya and Zimbabwe. Models are fine-tuned primarily on read speech drawn from religious texts, which offer broad, license-clear and orthographically consistent coverage for languages that otherwise lack transcribed audio. We describe a two-step (and, for one family, three-step) learning-rate-annealed fine-tuning procedure that first adapts a shared multilingual model at a high learning rate and then anneals it to recover, and in several cases surpass, strong monolingual baselines. We further describe a lightweight language-conditioning mechanism that injects a one-hot language identity as a sequence of prefix frames prepended to the acoustic features, allowing a single multilingual checkpoint to be steered to a target language at inference. Across the five multilingual families the annealed models reach average word error rates (WER) of 10-13%, closing most of the gap to monolingual models while covering many languages in a single checkpoint. All models are released on the Hugging Face KhayaAI organisation under the Apache-2.0 license (attribution only) so that others may fine-tune them freely, including for commercial use. We provide a conservative estimate that the languages covered are spoken by on the order of one hundred million first-language speakers, and by substantially more when second-language use is included.", "arxiv_id": "2607.21540", "arxiv_url": "https://arxiv.org/abs/2607.21540", "authors": ["Paul Azunre"], "brief": "\u8bba\u6587\u53d1\u5e03 DONDO\uff0c\u4e00\u7ec4\u57fa\u4e8e w2v-BERT 2.0 \u7684\u5f00\u653e\u8bb8\u53ef\u81ea\u52a8\u8bed\u97f3\u8bc6\u522b\u57fa\u5ea7\u6a21\u578b\uff0c\u8986\u76d6\u975e\u6d32 27 \u79cd\u8bed\u8a00\u53d8\u4f53\u3002\u6a21\u578b\u5305\u542b 21 \u4e2a\u5355\u8bed\u6a21\u578b\u548c 5 \u4e2a\u591a\u8bed\u6a21\u578b\uff0c\u5e76\u5728 Hugging Face \u4ee5 Apache-2.0 \u8bb8\u53ef\u53d1\u5e03\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21540", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u4e3b\u8981\u5229\u7528\u5b97\u6559\u6587\u672c\u6717\u8bfb\u8bed\u97f3\u8fdb\u884c\u5fae\u8c03\uff0c\u4ee5\u83b7\u5f97\u8bb8\u53ef\u6e05\u6670\u3001\u6b63\u5b57\u6cd5\u4e00\u81f4\u7684\u4f4e\u8d44\u6e90\u8bed\u8a00\u8f6c\u5199\u6570\u636e", "\u63d0\u51fa\u5b66\u4e60\u7387\u9000\u706b\u7684\u4e24\u6b65/\u4e09\u6b65\u5fae\u8c03\u6d41\u7a0b\uff0c\u4f7f\u591a\u8bed\u6a21\u578b\u63a5\u8fd1\u751a\u81f3\u90e8\u5206\u8d85\u8fc7\u5355\u8bed\u57fa\u7ebf", "\u8bbe\u8ba1\u8f7b\u91cf\u8bed\u8a00\u6761\u4ef6\u673a\u5236\uff0c\u5c06 one-hot \u8bed\u8a00\u8eab\u4efd\u4f5c\u4e3a\u524d\u7f00\u5e27\u6ce8\u5165\u58f0\u5b66\u7279\u5f81\uff0c\u652f\u6301\u5355\u4e00\u591a\u8bed\u6a21\u578b\u6309\u76ee\u6807\u8bed\u8a00\u63a8\u7406"], "keywords": ["\u8bed\u97f3\u8bc6\u522b", "\u4f4e\u8d44\u6e90\u8bed\u8a00", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u591a\u8bed\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21540v1", "published_at": "2026-07-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "DONDO: Open w2v-BERT Speech-Recognition Base Models for African Languages", "tldr": "\u9762\u5411\u975e\u6d32\u8bed\u8a00\u7684\u5f00\u653eASR\u57fa\u5ea7\u6a21\u578b", "upvotes": 0, "what_it_is": "\u8bba\u6587\u53d1\u5e03 DONDO\uff0c\u4e00\u7ec4\u57fa\u4e8e w2v-BERT 2.0 \u7684\u5f00\u653e\u8bb8\u53ef\u81ea\u52a8\u8bed\u97f3\u8bc6\u522b\u57fa\u5ea7\u6a21\u578b\uff0c\u8986\u76d6\u975e\u6d32 27 \u79cd\u8bed\u8a00\u53d8\u4f53\u3002\u6a21\u578b\u5305\u542b 21 \u4e2a\u5355\u8bed\u6a21\u578b\u548c 5 \u4e2a\u591a\u8bed\u6a21\u578b\uff0c\u5e76\u5728 Hugging Face \u4ee5 Apache-2.0 \u8bb8\u53ef\u53d1\u5e03\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u4e3a\u975e\u6d32\u4f4e\u8d44\u6e90\u8bed\u8a00\u63d0\u4f9b\u4e86\u53ef\u5546\u7528\u3001\u53ef\u518d\u8bad\u7ec3\u7684\u8bed\u97f3\u8bc6\u522b\u57fa\u5ea7\u6a21\u578b\uff0c\u663e\u8457\u964d\u4f4e\u672c\u5730\u8bed\u8a00\u8bed\u97f3\u6280\u672f\u5f00\u53d1\u95e8\u69db\uff0c\u5e76\u8986\u76d6\u7ea6\u4e00\u4ebf\u6bcd\u8bed\u4f7f\u7528\u8005\u3002"}, {"abstract": "Speculative decoding accelerates autoregressive generation by having a cheap draft propose tokens that a target verifies in parallel. Frontier models increasingly ship a built-in Multi-Token-Prediction (MTP/NEXTN) draft head under the assumption that the draft is negligibly cheap. At million-token context this breaks: an MTP draft head typically runs full attention over the entire KV cache at every draft step, so its read grows linearly with context and comes to dominate the draft cost -- precisely where speculation is most valuable. The effect compounds with draft length (a deep native draft can turn net-negative, slower than no speculation) and sharpens under hybrid/linear-attention targets, where cheaper verification leaves the draft\u0027s full-attention read exposed. We apply a StreamingLLM-style sliding window plus attention sink to the draft\u0027s attention only (Windowed-MTP), leaving full-attention verification intact. It is training-free, drop-in, and lossless by construction: the full-attention target still decides every accepted token, so windowing changes only which tokens are proposed, never which are accepted. It bounds the draft\u0027s KV working set to a constant, dropping ~99% of KV entries at 1M. Across three architecture families (Qwen GDN-MoE 35B/122B and a Mamba2-hybrid NoPE 120B) at 1M context on a single GPU in SGLang, windowing cuts the per-decode-step cost over the shipping native MTP draft by +28% to +44%, an input-invariant margin that widens with context. Since per-token latency is this cost divided by acceptance length, at matched acceptance end-to-end decode latency improves by the same amount, and more where windowing also lifts acceptance, while preserving the target\u0027s verified output distribution. Finally, the unread draft KV -- 7.7-11% of total KV at 1M -- is reclaimed via a compact ring buffer at no acceptance or quality cost.", "arxiv_id": "2607.21535", "arxiv_url": "https://arxiv.org/abs/2607.21535", "authors": ["Alagappan Valliappan"], "brief": "\u8bba\u6587\u63d0\u51fa Windowed-MTP\uff1a\u4ec5\u5bf9 MTP \u8349\u7a3f\u5934\u4f7f\u7528\u6ed1\u52a8\u7a97\u53e3\u548c attention sink\uff0c\u907f\u514d\u8349\u7a3f\u9636\u6bb5\u5728\u767e\u4e07 token \u4e0a\u4e0b\u6587\u4e2d\u53cd\u590d\u8bfb\u53d6\u5b8c\u6574 KV \u7f13\u5b58\u3002\u76ee\u6807\u6a21\u578b\u9a8c\u8bc1\u4ecd\u4fdd\u6301\u5168\u6ce8\u610f\u529b\uff0c\u56e0\u6b64\u4e0d\u6539\u53d8\u6700\u7ec8\u88ab\u63a5\u53d7 token \u7684\u5206\u5e03\u3002", "categories": ["cs.LG", "cs.CL", "cs.PF"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21535", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u8bad\u7ec3\u65e0\u5173\u3001\u53ef\u5373\u63d2\u5373\u7528\uff1a\u53ea\u6539\u8349\u7a3f\u5934\u6ce8\u610f\u529b\u8303\u56f4\uff0c\u4e0d\u6539\u76ee\u6807\u6a21\u578b\u9a8c\u8bc1\u903b\u8f91", "\u5728 1M \u4e0a\u4e0b\u6587\u4e0b\u53ef\u4e22\u5f03\u7ea6 99% \u7684\u8349\u7a3f KV \u6761\u76ee\uff0c\u5c06\u8349\u7a3f KV \u5de5\u4f5c\u96c6\u53d8\u4e3a\u5e38\u6570\u89c4\u6a21", "\u5728 Qwen GDN-MoE 35B/122B \u4e0e Mamba2-hybrid NoPE 120B \u4e0a\uff0c\u5355\u5361 SGLang \u89e3\u7801\u6b65\u6210\u672c\u964d\u4f4e 28% \u5230 44%"], "keywords": ["\u63a8\u6d4b\u89e3\u7801", "\u957f\u4e0a\u4e0b\u6587", "\u63a8\u7406\u52a0\u901f", "KV\u7f13\u5b58"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21535v1", "published_at": "2026-07-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Windowed-MTP: Removing the Full-Context Draft-KV Tax at Million-Token Context", "tldr": "Windowed-MTP\u964d\u4f4e\u767e\u4e07\u4e0a\u4e0b\u6587\u63a8\u7406\u5f00\u9500", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa Windowed-MTP\uff1a\u4ec5\u5bf9 MTP \u8349\u7a3f\u5934\u4f7f\u7528\u6ed1\u52a8\u7a97\u53e3\u548c attention sink\uff0c\u907f\u514d\u8349\u7a3f\u9636\u6bb5\u5728\u767e\u4e07 token \u4e0a\u4e0b\u6587\u4e2d\u53cd\u590d\u8bfb\u53d6\u5b8c\u6574 KV \u7f13\u5b58\u3002\u76ee\u6807\u6a21\u578b\u9a8c\u8bc1\u4ecd\u4fdd\u6301\u5168\u6ce8\u610f\u529b\uff0c\u56e0\u6b64\u4e0d\u6539\u53d8\u6700\u7ec8\u88ab\u63a5\u53d7 token \u7684\u5206\u5e03\u3002", "why_notable": "\u5b83\u6307\u51fa\u5185\u7f6e MTP \u8349\u7a3f\u5934\u5728\u8d85\u957f\u4e0a\u4e0b\u6587\u4e0b\u5e76\u975e\u201c\u8fd1\u4f3c\u514d\u8d39\u201d\uff0c\u53cd\u800c\u53ef\u80fd\u6210\u4e3a\u63a8\u6d4b\u89e3\u7801\u74f6\u9888\uff1bWindowed-MTP \u4ee5\u7b80\u5355\u65e0\u8bad\u7ec3\u65b9\u5f0f\u663e\u8457\u964d\u4f4e\u767e\u4e07\u4e0a\u4e0b\u6587\u63a8\u7406\u5ef6\u8fdf\uff0c\u540c\u65f6\u4fdd\u6301\u76ee\u6807\u6a21\u578b\u8f93\u51fa\u5206\u5e03\u4e0d\u53d8\uff0c\u5177\u6709\u76f4\u63a5\u5de5\u7a0b\u843d\u5730\u4ef7\u503c\u3002"}, {"abstract": "Real-time EEG classification on edge devices is bottlenecked by the floating-point arithmetic of conventional neural networks. We investigated Differentiable Logic Gate Networks (Diff-Logic) as a hardware-native alternative that compiles models into pure Boolean circuits executable via bitwise CPU operations. Through rigorous iso-parameter experiments across four EEG datasets spanning two classification tasks, binary dementia detection and 3-class emotion recognition, we compared Diff-Logic against matched-capacity Multi-Layer Perceptron (MLP) and Binarized Neural Network (BNN) baselines at four complexity tiers (50k-500k parameters). On dementia screening, Diff-Logic achieved 80.2% Macro F1, outperforming the MLP baseline by 6.8%. On emotion recognition, the MLP retained a moderate performance advantage but incurred a 2.3$\\times$ higher latency and 14$\\times$ larger model size when deployed on a power-constrained (7W) Nvidia Jetson Orin Nano CPU (Single-core). Critically, Diff-Logic inference time remained nearly constant across a 10$\\times$ increase in model scale, achieving a peak speedup of 2.9$\\times$ over MLPs at the largest complexity tier. Our results establish logic-based neural architectures as a practical paradigm for resource-constrained brain-computer interfaces, achieving competitive or superior performance while natively satisfying the latency and memory constraints of portable edge deployment. Code is available on GitHub: https://github.com/Shyamal-Dharia/eeg-difflogic", "arxiv_id": "2607.18149", "arxiv_url": "https://arxiv.org/abs/2607.18149", "authors": ["Shyamal Y. Dharia", "Stephen D. Smith", "Camilo E. Valderrama"], "brief": "\u672c\u6587\u8bc4\u4f30\u53ef\u5fae\u903b\u8f91\u95e8\u7f51\u7edc\uff08Diff-Logic\uff09\u7528\u4e8e\u4f4e\u5ef6\u8fdfEEG\u5206\u7c7b\uff0c\u5c06\u6a21\u578b\u7f16\u8bd1\u4e3a\u7eaf\u5e03\u5c14\u7535\u8def\u5e76\u901a\u8fc7CPU\u4f4d\u8fd0\u7b97\u6267\u884c\u3002\u4f5c\u8005\u57284\u4e2aEEG\u6570\u636e\u96c6\u3001\u4e24\u7c7b\u4efb\u52a1\u4e0a\u4e0e\u540c\u53c2\u6570\u91cfMLP\u548cBNN\u8fdb\u884c\u7cfb\u7edf\u5bf9\u6bd4\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": "https://github.com/Shyamal-Dharia/eeg-difflogic", "github_stars": 2, "hf_url": "https://huggingface.co/papers/2607.18149", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["Diff-Logic\u907f\u514d\u4f20\u7edf\u795e\u7ecf\u7f51\u7edc\u6d6e\u70b9\u8fd0\u7b97\uff0c\u63a8\u7406\u53ef\u7531\u786c\u4ef6\u539f\u751f\u5e03\u5c14\u903b\u8f91\u548c\u4f4d\u8fd0\u7b97\u5b8c\u6210", "\u5728\u75f4\u5446\u4e8c\u5206\u7c7b\u7b5b\u67e5\u4e2d\u8fbe\u523080.2% Macro F1\uff0c\u6bd4\u540c\u89c4\u6a21MLP\u9ad86.8%", "\u5728Jetson Orin Nano\u5355\u6838CPU\u4e0a\uff0cDiff-Logic\u5728\u6700\u5927\u89c4\u6a21\u4e0b\u8f83MLP\u6700\u9ad8\u52a0\u901f2.9\u500d\uff0c\u4e14\u6a21\u578b\u6269\u592710\u500d\u65f6\u5ef6\u51e0\u4e4e\u4e0d\u53d8"], "keywords": ["\u8fb9\u7f18\u8ba1\u7b97", "\u8111\u673a\u63a5\u53e3", "\u795e\u7ecf\u7f51\u7edc\u538b\u7f29", "\u53ef\u5fae\u903b\u8f91"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18149v1", "published_at": "2026-07-20", "score": 0.182, "selected_reasons": ["HF trending (1\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18149.png", "title": "Differentiable Logic Gate Networks for Low-Latency EEG Classification on Edge Devices", "tldr": "\u903b\u8f91\u95e8\u7f51\u7edc\u52a0\u901f\u8fb9\u7f18\u7aefEEG\u5206\u7c7b", "upvotes": 1, "what_it_is": "\u672c\u6587\u8bc4\u4f30\u53ef\u5fae\u903b\u8f91\u95e8\u7f51\u7edc\uff08Diff-Logic\uff09\u7528\u4e8e\u4f4e\u5ef6\u8fdfEEG\u5206\u7c7b\uff0c\u5c06\u6a21\u578b\u7f16\u8bd1\u4e3a\u7eaf\u5e03\u5c14\u7535\u8def\u5e76\u901a\u8fc7CPU\u4f4d\u8fd0\u7b97\u6267\u884c\u3002\u4f5c\u8005\u57284\u4e2aEEG\u6570\u636e\u96c6\u3001\u4e24\u7c7b\u4efb\u52a1\u4e0a\u4e0e\u540c\u53c2\u6570\u91cfMLP\u548cBNN\u8fdb\u884c\u7cfb\u7edf\u5bf9\u6bd4\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c55\u793a\u4e86\u903b\u8f91\u578b\u795e\u7ecf\u67b6\u6784\u5728\u4fbf\u643a\u5f0f\u8111\u673a\u63a5\u53e3\u4e2d\u7684\u5b9e\u7528\u6f5c\u529b\uff1a\u5728\u4fdd\u6301\u7ade\u4e89\u6027\u7cbe\u5ea6\u7684\u540c\u65f6\u663e\u8457\u964d\u4f4e\u5ef6\u8fdf\u548c\u6a21\u578b\u5927\u5c0f\uff0c\u9002\u5408\u529f\u8017\u4e0e\u5185\u5b58\u53d7\u9650\u7684\u8fb9\u7f18\u8bbe\u5907\u3002"}, {"abstract": "The goal of this paper is to reduce the input token cost of Omni-modal large language models (Omni-LLMs) at inference time. Omni-LLMs reason jointly over audio, video and text, but the cost of the three streams is highly unbalanced: visual tokens account for the vast majority of the input, and are highly redundant. In this paper, we propose ReMo, a training-free framework that compresses visual tokens by redistributing their information across modalities: a visual token is kept only if its information appears nowhere else. ReMo achieves this in two ways: (i) it aligns audio and video in a common embedding space, and removes visual tokens already explained by the audio or by other visual tokens; and (ii) it replaces object-level visual tokens with compact text proxies, short descriptions of each object and its location, conveying the same content in far fewer tokens. On Qwen2.5-Omni at two model scales, ReMo removes 54% of the input tokens with no loss in accuracy. Indeed, it slightly exceeds the full-token model, reaching 101.2% and 101.3% of its average accuracy over five audio-visual benchmarks.", "arxiv_id": "2607.21179", "arxiv_url": "https://arxiv.org/abs/2607.21179", "authors": ["Suho Yoo", "Youngjoon Jang", "Hyebin Cho", "Joon Son Chung"], "brief": "\u8bba\u6587\u63d0\u51faReMo\uff0c\u4e00\u4e2a\u9762\u5411\u5168\u6a21\u6001\u5927\u6a21\u578b\u63a8\u7406\u9636\u6bb5\u7684\u514d\u8bad\u7ec3\u89c6\u89c9token\u538b\u7f29\u6846\u67b6\u3002\u5b83\u901a\u8fc7\u8de8\u97f3\u9891\u3001\u89c6\u9891\u3001\u6587\u672c\u91cd\u5206\u914d\u4fe1\u606f\uff0c\u4ec5\u4fdd\u7559\u65e0\u6cd5\u7531\u5176\u4ed6\u6a21\u6001\u6216\u5176\u4ed6\u89c6\u89c9token\u89e3\u91ca\u7684\u89c6\u89c9\u4fe1\u606f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21179", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u97f3\u9891\u4e0e\u89c6\u9891\u5bf9\u9f50\u5230\u5171\u540c\u5d4c\u5165\u7a7a\u95f4\uff0c\u5220\u9664\u5df2\u88ab\u97f3\u9891\u6216\u5176\u4ed6\u89c6\u89c9token\u89e3\u91ca\u7684\u5197\u4f59\u89c6\u89c9token", "\u7528\u7b80\u77ed\u7684\u5bf9\u8c61\u63cf\u8ff0\u53ca\u4f4d\u7f6e\u6587\u672c\u4ee3\u7406\u66ff\u4ee3\u5bf9\u8c61\u7ea7\u89c6\u89c9token\uff0c\u4ee5\u66f4\u5c11token\u8868\u8fbe\u540c\u7b49\u8bed\u4e49", "\u5728Qwen2.5-Omni\u4e24\u4e2a\u89c4\u6a21\u6a21\u578b\u4e0a\u51cf\u5c1154%\u8f93\u5165token\uff0c\u4e94\u4e2a\u97f3\u89c6\u9891\u57fa\u51c6\u5e73\u5747\u51c6\u786e\u7387\u53cd\u800c\u8fbe\u5230\u5168token\u6a21\u578b\u7684101.2%\u548c101.3%"], "keywords": ["\u591a\u6a21\u6001", "Token\u538b\u7f29", "\u63a8\u7406\u52a0\u901f", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21179v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Out of Sight, Still in Mind: Token Compression for Omni-LLMs", "tldr": "ReMo\u65e0\u8bad\u7ec3\u538b\u7f29Omni-LLM\u89c6\u89c9token", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51faReMo\uff0c\u4e00\u4e2a\u9762\u5411\u5168\u6a21\u6001\u5927\u6a21\u578b\u63a8\u7406\u9636\u6bb5\u7684\u514d\u8bad\u7ec3\u89c6\u89c9token\u538b\u7f29\u6846\u67b6\u3002\u5b83\u901a\u8fc7\u8de8\u97f3\u9891\u3001\u89c6\u9891\u3001\u6587\u672c\u91cd\u5206\u914d\u4fe1\u606f\uff0c\u4ec5\u4fdd\u7559\u65e0\u6cd5\u7531\u5176\u4ed6\u6a21\u6001\u6216\u5176\u4ed6\u89c6\u89c9token\u89e3\u91ca\u7684\u89c6\u89c9\u4fe1\u606f\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u663e\u8457\u964d\u4f4eOmni-LLM\u63a8\u7406\u6210\u672c\uff0c\u5e76\u5728\u591a\u9879\u97f3\u89c6\u9891\u4efb\u52a1\u4e0a\u4fdd\u6301\u751a\u81f3\u7565\u8d85\u539f\u6a21\u578b\u6027\u80fd\uff0c\u5c55\u793a\u4e86\u8de8\u6a21\u6001\u5197\u4f59\u6d88\u9664\u5728\u591a\u6a21\u6001\u5927\u6a21\u578b\u90e8\u7f72\u4e2d\u7684\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multi-agent interactive world models should not only generate consistent observations, but also maintain world states that persist across agents and evolve across views. Existing autoregressive video diffusion pipelines carry forward observation history as conditioning context, which makes shared state difficult to maintain in multi-agent and multi-view settings. We present WorldWeaver (W^2), a streaming multi-agent video diffusion model that augments rollout with cross-agent world state registers: learnable tokens that store shared world information, track individual agent status, and are dynamically updated after each generated chunk. We ground these registers with supervision signals spanning individual agent status, global state views including bird\u0027s-eye views, and scene text. We further improve the architecture with a Mixture-of-Transformers design that uses separate weights for world state modeling and visual frame modeling. Extensive experiments in two-agent Minecraft video generation show that explicit world-state modeling improves logical consistency and generation quality.", "arxiv_id": "2607.21594", "arxiv_url": "https://arxiv.org/abs/2607.21594", "authors": ["Sicheng Mo", "Yuheng Li", "Ziyang Leng", "Krishna Kumar Singh", "Bolei Zhou"], "brief": "\u8bba\u6587\u63d0\u51fa WorldWeaver\uff08W\u00b2\uff09\uff0c\u4e00\u79cd\u6d41\u5f0f\u591a\u667a\u80fd\u4f53\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u6a21\u578b\u3002\u5b83\u901a\u8fc7\u8de8\u667a\u80fd\u4f53\u4e16\u754c\u72b6\u6001\u5bc4\u5b58\u5668\u7ef4\u62a4\u5171\u4eab\u73af\u5883\u4fe1\u606f\u4e0e\u4e2a\u4f53\u72b6\u6001\uff0c\u5e76\u968f\u751f\u6210\u8fc7\u7a0b\u52a8\u6001\u66f4\u65b0\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21594", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u53ef\u5b66\u4e60\u7684 world state registers\uff0c\u7528\u4e8e\u5b58\u50a8\u5171\u4eab\u4e16\u754c\u4fe1\u606f\u3001\u8ddf\u8e2a\u5355\u4e2a\u667a\u80fd\u4f53\u72b6\u6001\u5e76\u8de8\u89c6\u89d2\u6301\u7eed\u6f14\u5316", "\u4f7f\u7528\u4e2a\u4f53\u72b6\u6001\u3001\u5168\u5c40\u89c6\u89d2/\u9e1f\u77b0\u56fe\u548c\u573a\u666f\u6587\u672c\u7b49\u76d1\u7763\u4fe1\u53f7\u5bf9\u5bc4\u5b58\u5668\u8fdb\u884c grounding", "\u91c7\u7528 Mixture-of-Transformers\uff0c\u5c06\u4e16\u754c\u72b6\u6001\u5efa\u6a21\u4e0e\u89c6\u89c9\u5e27\u5efa\u6a21\u4f7f\u7528\u4e0d\u540c\u53c2\u6570\u5206\u652f"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u591a\u667a\u80fd\u4f53", "\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21594v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.21594.png", "title": "Streaming Multi-Agent Autoregressive Diffusion Model with World State Registers", "tldr": "\u7528\u4e16\u754c\u72b6\u6001\u5bc4\u5b58\u5668\u63d0\u5347\u591a\u667a\u80fd\u4f53\u89c6\u9891\u751f\u6210\u4e00\u81f4\u6027", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa WorldWeaver\uff08W\u00b2\uff09\uff0c\u4e00\u79cd\u6d41\u5f0f\u591a\u667a\u80fd\u4f53\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u6a21\u578b\u3002\u5b83\u901a\u8fc7\u8de8\u667a\u80fd\u4f53\u4e16\u754c\u72b6\u6001\u5bc4\u5b58\u5668\u7ef4\u62a4\u5171\u4eab\u73af\u5883\u4fe1\u606f\u4e0e\u4e2a\u4f53\u72b6\u6001\uff0c\u5e76\u968f\u751f\u6210\u8fc7\u7a0b\u52a8\u6001\u66f4\u65b0\u3002", "why_notable": "\u76f8\u6bd4\u4ec5\u4f9d\u8d56\u5386\u53f2\u89c2\u6d4b\u4f5c\u4e3a\u6761\u4ef6\u7684\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u65b9\u6cd5\uff0c\u8be5\u65b9\u6cd5\u663e\u5f0f\u7ef4\u62a4\u8de8\u667a\u80fd\u4f53\u3001\u8de8\u89c6\u89d2\u7684\u4e16\u754c\u72b6\u6001\uff0c\u5728\u53cc\u667a\u80fd\u4f53 Minecraft \u89c6\u9891\u751f\u6210\u4e2d\u63d0\u5347\u4e86\u903b\u8f91\u4e00\u81f4\u6027\u4e0e\u751f\u6210\u8d28\u91cf\u3002"}, {"abstract": "Surprisal theory holds that the human processing difficulty of a linguistic unit in context is an affine function of its surprisal under some language model. I argue this claim is a tautology without further constraint: for any non-negative difficulty measure over units in context, there exists a language model whose surprisal is an affine function of it under mild technical conditions. Therefore, because any pattern of difficulty is consistent with some language model, without an additional constraint on the language model, surprisal theory makes no falsifiable predictions. The tautology was long obscured by an assumption implicit in two decades of psycholinguistic work---that the relevant language model is the distribution that generated the training corpus, so that improving corpus fit improves predictions of human behavior. Recent empirical work has undermined this assumption, demonstrating that better corpus models can be worse predictors of processing difficulty. I conclude that breaking the tautology requires a rationalist intervention, i.e., the relevant language model must be derived from a non-empirically motivated model of the comprehender, which could be based on, for instance, memory constraints or processing goals, and that, thus, does not depend on the behavioral data surprisal theory is meant to explain.", "arxiv_id": "2607.21574", "arxiv_url": "https://arxiv.org/abs/2607.21574", "authors": ["Ryan Cotterell"], "brief": "\u8bba\u6587\u8bba\u8bc1\uff1a\u82e5\u4e0d\u989d\u5916\u7ea6\u675f\u8bed\u8a00\u6a21\u578b\uff0c\u4efb\u4f55\u975e\u8d1f\u52a0\u5de5\u96be\u5ea6\u6a21\u5f0f\u90fd\u53ef\u88ab\u67d0\u4e2a\u8bed\u8a00\u6a21\u578b\u7684\u60ca\u8bb6\u5ea6\u4eff\u5c04\u8868\u793a\uff0c\u56e0\u6b64\u60ca\u8bb6\u5ea6\u7406\u8bba\u5728\u5f62\u5f0f\u4e0a\u8fd1\u4e4e\u91cd\u8a00\u5f0f\u3002\u4f5c\u8005\u8fdb\u4e00\u6b65\u6307\u51fa\uff0c\u5e94\u4ece\u7406\u89e3\u8005\u7684\u7406\u6027\u6a21\u578b\u51fa\u53d1\u4e3a\u8bed\u8a00\u6a21\u578b\u63d0\u4f9b\u72ec\u7acb\u57fa\u7840\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21574", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bc1\u660e\u5728\u6e29\u548c\u6280\u672f\u6761\u4ef6\u4e0b\uff0c\u4efb\u610f\u8bed\u5883\u4e2d\u8bed\u8a00\u5355\u4f4d\u7684\u52a0\u5de5\u96be\u5ea6\u90fd\u53ef\u5bf9\u5e94\u5230\u67d0\u4e2a\u8bed\u8a00\u6a21\u578b\u7684 surprisal", "\u6307\u51fa\u957f\u671f\u5fc3\u7406\u8bed\u8a00\u5b66\u7814\u7a76\u9690\u542b\u5047\u8bbe\uff1a\u66f4\u62df\u5408\u8bed\u6599\u5206\u5e03\u7684\u8bed\u8a00\u6a21\u578b\u5e94\u66f4\u80fd\u9884\u6d4b\u4eba\u7c7b\u52a0\u5de5\u96be\u5ea6\uff0c\u4f46\u8fd1\u671f\u5b9e\u8bc1\u7ed3\u679c\u5df2\u524a\u5f31\u8be5\u5047\u8bbe", "\u4e3b\u5f20\u9700\u8981\u5f15\u5165\u72ec\u7acb\u4e8e\u884c\u4e3a\u6570\u636e\u7684\u7406\u6027\u7ea6\u675f\uff0c\u4f8b\u5982\u8bb0\u5fc6\u9650\u5236\u3001\u52a0\u5de5\u76ee\u6807\u6216\u7406\u89e3\u8005\u6a21\u578b"], "keywords": ["\u5fc3\u7406\u8bed\u8a00\u5b66", "\u8bed\u8a00\u6a21\u578b", "\u8ba4\u77e5\u5efa\u6a21", "\u53ef\u8bc1\u4f2a\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21574v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Surprisal Theory is Tautological (without Rational Grounding)", "tldr": "\u6279\u5224\u60ca\u8bb6\u5ea6\u7406\u8bba\u7f3a\u4e4f\u53ef\u8bc1\u4f2a\u6027", "upvotes": 0, "what_it_is": "\u8bba\u6587\u8bba\u8bc1\uff1a\u82e5\u4e0d\u989d\u5916\u7ea6\u675f\u8bed\u8a00\u6a21\u578b\uff0c\u4efb\u4f55\u975e\u8d1f\u52a0\u5de5\u96be\u5ea6\u6a21\u5f0f\u90fd\u53ef\u88ab\u67d0\u4e2a\u8bed\u8a00\u6a21\u578b\u7684\u60ca\u8bb6\u5ea6\u4eff\u5c04\u8868\u793a\uff0c\u56e0\u6b64\u60ca\u8bb6\u5ea6\u7406\u8bba\u5728\u5f62\u5f0f\u4e0a\u8fd1\u4e4e\u91cd\u8a00\u5f0f\u3002\u4f5c\u8005\u8fdb\u4e00\u6b65\u6307\u51fa\uff0c\u5e94\u4ece\u7406\u89e3\u8005\u7684\u7406\u6027\u6a21\u578b\u51fa\u53d1\u4e3a\u8bed\u8a00\u6a21\u578b\u63d0\u4f9b\u72ec\u7acb\u57fa\u7840\u3002", "why_notable": "\u8be5\u6587\u4ece\u7406\u8bba\u57fa\u7840\u4e0a\u6311\u6218\u4e86\u8ba1\u7b97\u5fc3\u7406\u8bed\u8a00\u5b66\u4e2d\u5e7f\u6cdb\u4f7f\u7528\u7684\u60ca\u8bb6\u5ea6\u89e3\u91ca\u6846\u67b6\uff0c\u5f3a\u8c03\u4ec5\u9760\u8bed\u6599\u62df\u5408\u65e0\u6cd5\u4fdd\u8bc1\u5bf9\u4eba\u7c7b\u52a0\u5de5\u7684\u89e3\u91ca\u529b\uff0c\u53ef\u80fd\u63a8\u52a8\u66f4\u5177\u53ef\u8bc1\u4f2a\u6027\u7684\u8ba4\u77e5\u5efa\u6a21\u65b9\u6cd5\u3002"}, {"abstract": "Large Language Models (LLMs) show promise for medical education, but most existing systems focus on localized interactions such as question answering or single-turn feedback, rather than organizing an entire clinical case into a decision-centered learning trajectory. We introduce \\textit{MedGame}, a framework that transforms static clinical cases into structured, executable storytelling games. MedGame uses a dual-engine design: a Medical Narrative Designer synthesizes case-grounded clinical storylines with states and decision nodes, while a Story Director converts them into dependency-aware multimodal orchestration plans rendered by our released interactive platform. We construct MedGame Bench, a 5,000-case benchmark and evaluation protocol for Medical Narrative Generation and Story Direction. Experiments show that task-specific fine-tuning substantially improves open-source LLMs on MedGame Bench and narrows the gap with commercial models. A pilot student study further shows that learners perceive MedGame as more engaging and useful than text-only alternatives.", "arxiv_id": "2607.21570", "arxiv_url": "https://arxiv.org/abs/2607.21570", "authors": ["Qian Wu", "Xinrong Zhou", "Zizhan Ma", "Kai Chen", "Zheyao Gao", "Xun Lin", "Hongqiu Wu", "Longfei Gou", "Yixiao Liu", "Ann Sin Nga Lau", "Qi Dou"], "brief": "\u672c\u6587\u63d0\u51fa MedGame\uff0c\u5c06\u9759\u6001\u4e34\u5e8a\u75c5\u4f8b\u81ea\u52a8\u8f6c\u5316\u4e3a\u56f4\u7ed5\u51b3\u7b56\u5c55\u5f00\u7684\u7ed3\u6784\u5316\u3001\u53ef\u6267\u884c\u53d9\u4e8b\u6e38\u620f\u3002\u7cfb\u7edf\u5305\u542b\u533b\u5b66\u53d9\u4e8b\u8bbe\u8ba1\u5668\u4e0e\u6545\u4e8b\u5bfc\u6f14\u53cc\u5f15\u64ce\uff0c\u5e76\u53d1\u5e03\u4ea4\u4e92\u5e73\u53f0\u4e0e 5000 \u4f8b MedGame Bench \u8bc4\u6d4b\u57fa\u51c6\u3002", "categories": ["cs.CL", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21570", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u533b\u5b66\u53d9\u4e8b\u8bbe\u8ba1\u5668\u751f\u6210\u57fa\u4e8e\u75c5\u4f8b\u7684\u4e34\u5e8a\u6545\u4e8b\u7ebf\u3001\u72b6\u6001\u4e0e\u51b3\u7b56\u8282\u70b9", "\u6545\u4e8b\u5bfc\u6f14\u5c06\u6545\u4e8b\u7ebf\u8f6c\u5316\u4e3a\u4f9d\u8d56\u611f\u77e5\u7684\u591a\u6a21\u6001\u7f16\u6392\u8ba1\u5212\u5e76\u5728\u5e73\u53f0\u4e2d\u5448\u73b0", "\u5b9e\u9a8c\u663e\u793a\u4efb\u52a1\u5fae\u8c03\u663e\u8457\u63d0\u5347\u5f00\u6e90 LLM \u8868\u73b0\uff0c\u5b66\u751f\u8bd5\u70b9\u7814\u7a76\u8868\u660e\u5176\u6bd4\u7eaf\u6587\u672c\u5b66\u4e60\u66f4\u5177\u5438\u5f15\u529b\u548c\u5b9e\u7528\u6027"], "keywords": ["\u533b\u5b66\u6559\u80b2", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6e38\u620f\u5316\u5b66\u4e60", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21570v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MedGame: Storytelling Gamification Empowered by Large Language Models for Medical Education", "tldr": "\u5c06\u4e34\u5e8a\u75c5\u4f8b\u8f6c\u5316\u4e3a\u53ef\u4ea4\u4e92\u533b\u5b66\u6545\u4e8b\u6e38\u620f", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa MedGame\uff0c\u5c06\u9759\u6001\u4e34\u5e8a\u75c5\u4f8b\u81ea\u52a8\u8f6c\u5316\u4e3a\u56f4\u7ed5\u51b3\u7b56\u5c55\u5f00\u7684\u7ed3\u6784\u5316\u3001\u53ef\u6267\u884c\u53d9\u4e8b\u6e38\u620f\u3002\u7cfb\u7edf\u5305\u542b\u533b\u5b66\u53d9\u4e8b\u8bbe\u8ba1\u5668\u4e0e\u6545\u4e8b\u5bfc\u6f14\u53cc\u5f15\u64ce\uff0c\u5e76\u53d1\u5e03\u4ea4\u4e92\u5e73\u53f0\u4e0e 5000 \u4f8b MedGame Bench \u8bc4\u6d4b\u57fa\u51c6\u3002", "why_notable": "\u5b83\u628a\u533b\u5b66\u6559\u80b2\u4e2d\u7684\u75c5\u4f8b\u5b66\u4e60\u4ece\u95ee\u7b54\u5f0f\u4ea4\u4e92\u63a8\u8fdb\u5230\u5b8c\u6574\u51b3\u7b56\u8def\u5f84\u5f0f\u4f53\u9a8c\uff0c\u4e3a LLM \u9a71\u52a8\u7684\u4e34\u5e8a\u6559\u5b66\u3001\u60c5\u5883\u5316\u8bad\u7ec3\u548c\u6559\u80b2\u6e38\u620f\u5316\u63d0\u4f9b\u4e86\u53ef\u590d\u7528\u6846\u67b6\u4e0e\u8bc4\u6d4b\u57fa\u51c6\u3002"}, {"abstract": "The rapid progress of AI has intensified the long-standing pursuit of automation: replacing human participation with algorithms wherever possible. Implicit in this pursuit is the assumption that humans remain in the loop only because current AI systems are not yet sufficiently capable. This paper challenges that assumption. Rather than asking how far automation can extend, we ask where its conceptual limits lie and argue that human participation may persist even with highly capable AI systems for three distinct reasons. Technical or complementarity grounds arise when humans contribute capabilities or perspectives unavailable to AI. Normative or developmental grounds arise when participation itself is valuable for human agency or learning. Most importantly, emergence grounds arise from target emergence: in some activities, the target is not fully specified in advance but instead emerges through the interaction itself. In these cases, human participation is not merely a means of improving execution but is constitutive of the target being produced. Human--AI co-construction, understood as the joint production of outcomes by humans and AI systems, is therefore not simply a temporary response to imperfect AI, but a persistent feature of activities whose objectives emerge through participation. This perspective has important implications for the limits of automation and for the design, evaluation, and ethics of future AI systems.", "arxiv_id": "2607.21547", "arxiv_url": "https://arxiv.org/abs/2607.21547", "authors": ["Fares Fourati", "Hinrich Sch\u00fctze", "Eyke H\u00fcllermeier", "Iryna Gurevych"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u5957\u5173\u4e8e\u81ea\u52a8\u5316\u8fb9\u754c\u7684\u7406\u8bba\uff0c\u53cd\u9a73\u201c\u4eba\u7c7b\u5728\u73af\u53ea\u662f\u56e0\u4e3aAI\u8fd8\u4e0d\u591f\u5f3a\u201d\u7684\u9ed8\u8ba4\u5047\u8bbe\u3002\u4f5c\u8005\u6307\u51fa\uff0c\u5373\u4fbfAI\u9ad8\u5ea6\u80fd\u529b\u5316\uff0c\u4eba\u7c7b\u53c2\u4e0e\u4ecd\u4f1a\u56e0\u6280\u672f\u4e92\u8865\u3001\u89c4\u8303\u53d1\u5c55\u4ef7\u503c\uff0c\u4ee5\u53ca\u76ee\u6807\u5728\u4e92\u52a8\u4e2d\u6d8c\u73b0\u800c\u6301\u7eed\u5b58\u5728\u3002", "categories": ["cs.AI", "cs.CL", "cs.ET", "cs.LG", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21547", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u4eba\u7c7b\u6301\u7eed\u53c2\u4e0e\u7684\u539f\u56e0\u5206\u4e3a\u4e09\u7c7b\uff1a\u6280\u672f/\u4e92\u8865\u6027\u3001\u89c4\u8303/\u53d1\u5c55\u6027\u3001\u6d8c\u73b0\u6027\u3002", "\u5f3a\u8c03\u201c\u76ee\u6807\u6d8c\u73b0\u201d\uff1a\u67d0\u4e9b\u4efb\u52a1\u7684\u76ee\u6807\u5e76\u975e\u9884\u5148\u7ed9\u5b9a\uff0c\u800c\u662f\u5728\u4eba\u4e0eAI\u4e92\u52a8\u8fc7\u7a0b\u4e2d\u88ab\u5171\u540c\u751f\u6210\u3002", "\u5c06\u4eba\u673a\u5171\u6784\u89c6\u4e3a\u90e8\u5206\u6d3b\u52a8\u7684\u5185\u5728\u7279\u5f81\uff0c\u800c\u975e\u5bf9\u5f53\u524dAI\u80fd\u529b\u4e0d\u8db3\u7684\u4e34\u65f6\u8865\u4e01\u3002"], "keywords": ["\u4eba\u673a\u534f\u4f5c", "AI\u4f26\u7406", "\u81ea\u52a8\u5316", "\u4eba\u7c7b\u5728\u73af"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21547v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Boundaries of Automation: A Theory of Persistent Human Participation", "tldr": "\u63d0\u51fa\u4eba\u7c7b\u53c2\u4e0e\u4e0d\u4f1a\u56e0AI\u5f3a\u5927\u800c\u6d88\u5931", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u5957\u5173\u4e8e\u81ea\u52a8\u5316\u8fb9\u754c\u7684\u7406\u8bba\uff0c\u53cd\u9a73\u201c\u4eba\u7c7b\u5728\u73af\u53ea\u662f\u56e0\u4e3aAI\u8fd8\u4e0d\u591f\u5f3a\u201d\u7684\u9ed8\u8ba4\u5047\u8bbe\u3002\u4f5c\u8005\u6307\u51fa\uff0c\u5373\u4fbfAI\u9ad8\u5ea6\u80fd\u529b\u5316\uff0c\u4eba\u7c7b\u53c2\u4e0e\u4ecd\u4f1a\u56e0\u6280\u672f\u4e92\u8865\u3001\u89c4\u8303\u53d1\u5c55\u4ef7\u503c\uff0c\u4ee5\u53ca\u76ee\u6807\u5728\u4e92\u52a8\u4e2d\u6d8c\u73b0\u800c\u6301\u7eed\u5b58\u5728\u3002", "why_notable": "\u8fd9\u7bc7\u8bba\u6587\u4ece\u6982\u5ff5\u548c\u4f26\u7406\u5c42\u9762\u91cd\u65b0\u754c\u5b9a\u81ea\u52a8\u5316\u7684\u6781\u9650\uff0c\u5bf9\u672a\u6765AI\u7cfb\u7edf\u7684\u8bbe\u8ba1\u3001\u8bc4\u4f30\u548c\u6cbb\u7406\u63d0\u51fa\u91cd\u8981\u542f\u53d1\uff1a\u5e76\u975e\u6240\u6709\u4eba\u7c7b\u53c2\u4e0e\u90fd\u5e94\u88ab\u4f18\u5316\u6389\uff0c\u6709\u4e9b\u53c2\u4e0e\u672c\u8eab\u6784\u6210\u4e86\u4efb\u52a1\u76ee\u6807\u3002"}, {"abstract": "Do independently trained language models come to represent the same thing in the same way? We answer for code, extending a recently introduced concept-circuit extraction method to a 2x2 design -- Python and Rust crossed with Qwen2.5-Coder-7B and DeepSeek-Coder-V1-6.7B -- and measuring a complete inventory of grammatical concepts (58 Python, 57 Rust) identically in all four cells: the smallest design that separates what depends on the task, the language, and the model. The answer splits into three parts. What earns dedicated circuitry is set by the task: the models agree on which concepts receive circuits (Spearman $\u03c1$ = 0.638 for Python, 0.673 for Rust, both p \u003c $10^{-7}$). Where those circuits sit is set by the model: Qwen processes concepts in a late band (~L17-19), DeepSeek at L6-7, for both languages. How circuits grow across layers is also set by the model: Qwen gives its atomic concepts an early spike that DeepSeek does not. \"Are circuits universal?\" thus has no single answer: yes for What, no for Where and How -- universality is a property of representational content, not of computational organisation. None of this structure was fixed in advance. The agreement could have landed anywhere between independence and identity; it lands at $\u03c1\\approx 0.65$. Rust constructs receive 2-3x more concept-specific circuitry than their Python equivalents, in both models. Both models share neurons between the languages (6/7 and 7/7 paired constructs), DeepSeek 1.94x more than Qwen -- a direction no prior result predicts. And Qwen binds nine keywords of Rust\u0027s type-and-trait machinery into one tight neuron cluster (Jaccard 0.535 vs null 0.112, p \u003c 0.001), a semantic dimension invisible in surface syntax. Ablation and linear probes confirm the circuits are functional. All claims are scoped to this 2x2; whether the per-model profile predicts a third model is the designed next test.", "arxiv_id": "2607.21491", "arxiv_url": "https://arxiv.org/abs/2607.21491", "authors": ["Piotr Wilam"], "brief": "\u8bba\u6587\u5c06\u6982\u5ff5\u7535\u8def\u63d0\u53d6\u65b9\u6cd5\u6269\u5c55\u5230 Python/Rust \u00d7 Qwen2.5-Coder/DeepSeek-Coder \u7684 2\u00d72 \u8bbe\u8ba1\uff0c\u7cfb\u7edf\u6d4b\u91cf\u8bed\u6cd5\u6982\u5ff5\u5728\u4ee3\u7801\u6a21\u578b\u4e2d\u7684\u8868\u5f81\u3002\u7814\u7a76\u53d1\u73b0\uff1a\u54ea\u4e9b\u6982\u5ff5\u83b7\u5f97\u4e13\u7528\u7535\u8def\u4e3b\u8981\u7531\u4efb\u52a1\u51b3\u5b9a\uff0c\u800c\u7535\u8def\u4f4d\u4e8e\u54ea\u4e9b\u5c42\u3001\u5982\u4f55\u8de8\u5c42\u5f62\u6210\u4e3b\u8981\u7531\u6a21\u578b\u51b3\u5b9a\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21491", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4e24\u79cd\u6a21\u578b\u5728\u201c\u54ea\u4e9b\u8bed\u6cd5\u6982\u5ff5\u6709\u7535\u8def\u201d\u4e0a\u9ad8\u5ea6\u4e00\u81f4\uff1aPython \u548c Rust \u7684 Spearman \u76f8\u5173\u5206\u522b\u7ea6\u4e3a 0.638\u30010.673\u3002", "\u7535\u8def\u6240\u5728\u5c42\u660e\u663e\u4f9d\u8d56\u6a21\u578b\uff1aQwen \u4e3b\u8981\u5728\u8f83\u665a\u5c42 L17-19\uff0cDeepSeek \u4e3b\u8981\u5728 L6-7\uff0c\u4e14\u8de8\u8bed\u8a00\u4e00\u81f4\u3002", "Rust \u6784\u9020\u83b7\u5f97\u7684\u6982\u5ff5\u4e13\u7528\u7535\u8def\u7ea6\u4e3a Python \u7684 2-3 \u500d\uff1b\u4e24\u6a21\u578b\u8fd8\u5b58\u5728\u8de8\u8bed\u8a00\u5171\u4eab\u795e\u7ecf\u5143\uff0cDeepSeek \u5171\u4eab\u7a0b\u5ea6\u7ea6\u4e3a Qwen \u7684 1.94 \u500d\u3002"], "keywords": ["\u6a21\u578b\u53ef\u89e3\u91ca\u6027", "\u4ee3\u7801\u6a21\u578b", "\u795e\u7ecf\u7535\u8def", "\u8868\u5f81\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21491v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "What, Where, and How: Disentangling the Roles of Task, Language, and Model in Code Model Representations", "tldr": "\u4ee3\u7801\u6a21\u578b\u8868\u5f81\u5185\u5bb9\u8d8b\u540c\uff0c\u4f46\u7535\u8def\u4f4d\u7f6e\u4e0e\u5f62\u6210\u65b9\u5f0f\u5404\u5f02", "upvotes": 0, "what_it_is": "\u8bba\u6587\u5c06\u6982\u5ff5\u7535\u8def\u63d0\u53d6\u65b9\u6cd5\u6269\u5c55\u5230 Python/Rust \u00d7 Qwen2.5-Coder/DeepSeek-Coder \u7684 2\u00d72 \u8bbe\u8ba1\uff0c\u7cfb\u7edf\u6d4b\u91cf\u8bed\u6cd5\u6982\u5ff5\u5728\u4ee3\u7801\u6a21\u578b\u4e2d\u7684\u8868\u5f81\u3002\u7814\u7a76\u53d1\u73b0\uff1a\u54ea\u4e9b\u6982\u5ff5\u83b7\u5f97\u4e13\u7528\u7535\u8def\u4e3b\u8981\u7531\u4efb\u52a1\u51b3\u5b9a\uff0c\u800c\u7535\u8def\u4f4d\u4e8e\u54ea\u4e9b\u5c42\u3001\u5982\u4f55\u8de8\u5c42\u5f62\u6210\u4e3b\u8981\u7531\u6a21\u578b\u51b3\u5b9a\u3002", "why_notable": "\u5b83\u628a\u201c\u4ee3\u7801\u6a21\u578b\u7535\u8def\u662f\u5426\u5177\u6709\u666e\u904d\u6027\u201d\u62c6\u89e3\u4e3a\u5185\u5bb9\u3001\u4f4d\u7f6e\u548c\u5f62\u6210\u8fc7\u7a0b\u4e09\u90e8\u5206\uff0c\u8868\u660e\u8868\u5f81\u5185\u5bb9\u53ef\u8de8\u6a21\u578b\u8d8b\u540c\uff0c\u4f46\u8ba1\u7b97\u7ec4\u7ec7\u5e76\u4e0d\u901a\u7528\uff0c\u4e3a\u7406\u89e3\u4ee3\u7801\u5927\u6a21\u578b\u5185\u90e8\u673a\u5236\u548c\u53ef\u89e3\u91ca\u6027\u5206\u6790\u63d0\u4f9b\u4e86\u66f4\u7ec6\u7c92\u5ea6\u8bc1\u636e\u3002"}, {"abstract": "Deterministic KV-cache eviction keeps the top-$k$ tokens under an importance score and deletes the rest. We prove that this design cannot know what it destroyed: evicted values can be altered so that everything the serving system retains is unchanged while the true attention-output error grows arbitrarily, so no serving-time estimator of that error is consistent. Randomized eviction restores identifiability. With a Poisson-sampled tail at known inclusion probabilities, one logit offset performs the H\u00e1jek correction inside the softmax, and a survey-sampling variance estimator over the retained set becomes a per-step error certificate with 0.97 empirical coverage at no accuracy cost. On real workloads we pre-registered seven claims and lost three: question-aware eviction at 25--50\\% budgets is nearly free; output log-probability predicts failure better than the certificate; certificate-gated budget escalation adds nothing. What survives is attribution: the certificate separates cache-induced from inherent failures (AUC 0.73--0.75, against 0.47--0.54 for output confidence) and schedules recomputation better than random or confidence gating. Randomization buys attribution, not prediction.", "arxiv_id": "2607.21475", "arxiv_url": "https://arxiv.org/abs/2607.21475", "authors": ["Peng Xie"], "brief": "\u8bba\u6587\u8bc1\u660e\u786e\u5b9a\u6027KV-cache\u6dd8\u6c70\u65e0\u6cd5\u4e00\u81f4\u4f30\u8ba1\u771f\u5b9e\u6ce8\u610f\u529b\u8f93\u51fa\u8bef\u5dee\uff0c\u56e0\u4e3a\u88ab\u5220\u503c\u53ef\u4efb\u610f\u6539\u53d8\u800c\u4fdd\u7559\u72b6\u6001\u4e0d\u53d8\u3002\u4f5c\u8005\u63d0\u51fa\u5e26\u5df2\u77e5\u5305\u542b\u6982\u7387\u7684Poisson\u5c3e\u90e8\u968f\u673a\u91c7\u6837\uff0c\u5e76\u5728softmax\u4e2d\u7528H\u00e1jek\u6821\u6b63\u751f\u6210\u9010\u6b65\u8bef\u5dee\u8bc1\u4e66\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21475", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u7406\u8bba\u4e0a\u8bc1\u660etop-k\u786e\u5b9a\u6027\u6dd8\u6c70\u5b58\u5728\u4e0d\u53ef\u8fa8\u8bc6\u6027\uff1a\u670d\u52a1\u7aef\u4fdd\u7559\u4fe1\u606f\u4e0d\u53d8\u65f6\uff0c\u771f\u5b9e\u8bef\u5dee\u53ef\u4efb\u610f\u589e\u5927", "\u968f\u673a\u5316\u4fdd\u7559\u5c3e\u90e8token\u5e76\u4f7f\u7528\u4e00\u4e2alogit\u504f\u79fb\u5b8c\u6210H\u00e1jek\u6821\u6b63\uff0c\u7ed3\u5408\u62bd\u6837\u65b9\u5dee\u4f30\u8ba1\u5f97\u5230\u8bef\u5dee\u8bc1\u4e66", "\u5b9e\u6d4b\u8bc1\u4e66\u8986\u76d6\u7387\u7ea60.97\u4e14\u65e0\u7cbe\u5ea6\u635f\u5931\uff1b\u5b83\u66f4\u64c5\u957f\u533a\u5206\u7f13\u5b58\u5bfc\u81f4\u7684\u5931\u8d25\u4e0e\u6a21\u578b\u56fa\u6709\u5931\u8d25\uff0c\u800c\u975e\u9884\u6d4b\u6700\u7ec8\u5931\u8d25"], "keywords": ["KV\u7f13\u5b58", "\u6a21\u578b\u538b\u7f29", "\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21475v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Error Certificates for KV-Cache Eviction via Randomized Design", "tldr": "\u968f\u673a\u5316KV\u6dd8\u6c70\u53ef\u7ed9\u51fa\u8bef\u5dee\u5f52\u56e0\u8bc1\u4e66", "upvotes": 0, "what_it_is": "\u8bba\u6587\u8bc1\u660e\u786e\u5b9a\u6027KV-cache\u6dd8\u6c70\u65e0\u6cd5\u4e00\u81f4\u4f30\u8ba1\u771f\u5b9e\u6ce8\u610f\u529b\u8f93\u51fa\u8bef\u5dee\uff0c\u56e0\u4e3a\u88ab\u5220\u503c\u53ef\u4efb\u610f\u6539\u53d8\u800c\u4fdd\u7559\u72b6\u6001\u4e0d\u53d8\u3002\u4f5c\u8005\u63d0\u51fa\u5e26\u5df2\u77e5\u5305\u542b\u6982\u7387\u7684Poisson\u5c3e\u90e8\u968f\u673a\u91c7\u6837\uff0c\u5e76\u5728softmax\u4e2d\u7528H\u00e1jek\u6821\u6b63\u751f\u6210\u9010\u6b65\u8bef\u5dee\u8bc1\u4e66\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u62bd\u6837\u8bbe\u8ba1\u5f15\u5165LLM\u63a8\u7406\u7f13\u5b58\u538b\u7f29\uff0c\u6307\u51fa\u5e38\u89c1\u786e\u5b9a\u6027\u6dd8\u6c70\u7684\u6839\u672c\u53ef\u89c2\u6d4b\u6027\u7f3a\u9677\uff0c\u5e76\u63d0\u4f9b\u53ef\u7528\u4e8e\u8bef\u5dee\u5f52\u56e0\u548c\u91cd\u8ba1\u7b97\u8c03\u5ea6\u7684\u8f7b\u91cf\u8bc1\u4e66\uff0c\u5bf9\u957f\u4e0a\u4e0b\u6587\u63a8\u7406\u670d\u52a1\u7684\u53ef\u9760\u6027\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The ability to handle long-term memory in LLMs is becoming increasingly critical, yet existing benchmarks remain English-centric and rely on aggregate retrieval metrics, failing to capture interactions between long-range context, temporal information, and reasoning. To address this, we introduce RUMBA (Russian User Memory BenchmArk) - a new benchmark for long-term conversational memory that provides a fine-grained taxonomy of memory-centric question types and a unified methodology accounting for semantic type, session scope, temporal reasoning, and the explicitness of temporal expressions. RUMBA consists of timestamped user-assistant dialogues with QA pairs requiring retrieval, combination, and reasoning across sessions. While designed for Russian, we also provide an aligned English subset under the same methodology. We evaluate contemporary memory systems and long-context models, and show how RUMBA serves as a diagnostic tool to analyze model behavior across benchmark slices and identify strengths and failure modes of different memory mechanisms.", "arxiv_id": "2607.21447", "arxiv_url": "https://arxiv.org/abs/2607.21447", "authors": ["Elizaveta Shevtsova", "Inna Glebkina", "Mark Baushenko", "Pavel Gulyaev", "Alena Fenogenova"], "brief": "\u8bba\u6587\u63d0\u51fa RUMBA\uff0c\u4e00\u4e2a\u9762\u5411\u4fc4\u8bed\u957f\u671f\u4f1a\u8bdd\u8bb0\u5fc6\u7684\u57fa\u51c6\uff0c\u5305\u542b\u5e26\u65f6\u95f4\u6233\u7684\u7528\u6237-\u52a9\u624b\u5bf9\u8bdd\u4e0e\u8de8\u4f1a\u8bdd\u95ee\u7b54\u3002\u5b83\u7528\u7edf\u4e00\u5206\u7c7b\u65b9\u6cd5\u8bc4\u4f30\u68c0\u7d22\u3001\u7ec4\u5408\u4e0e\u65f6\u95f4\u63a8\u7406\u7b49\u8bb0\u5fc6\u80fd\u529b\uff0c\u5e76\u63d0\u4f9b\u5bf9\u9f50\u82f1\u6587\u5b50\u96c6\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.21447", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u7ec6\u5206\u8bb0\u5fc6\u95ee\u9898\u7c7b\u578b\uff0c\u8986\u76d6\u8bed\u4e49\u7c7b\u578b\u3001\u4f1a\u8bdd\u8303\u56f4\u3001\u65f6\u95f4\u63a8\u7406\u548c\u65f6\u95f4\u8868\u8fbe\u663e\u5f0f\u6027", "QA \u4efb\u52a1\u8981\u6c42\u6a21\u578b\u8de8\u591a\u8f6e\u3001\u591a\u4f1a\u8bdd\u68c0\u7d22\u4fe1\u606f\u3001\u7ec4\u5408\u7ebf\u7d22\u5e76\u8fdb\u884c\u63a8\u7406", "\u8bc4\u6d4b\u4e86\u73b0\u6709\u8bb0\u5fc6\u7cfb\u7edf\u4e0e\u957f\u4e0a\u4e0b\u6587\u6a21\u578b\uff0c\u53ef\u8bca\u65ad\u4e0d\u540c\u8bb0\u5fc6\u673a\u5236\u7684\u4f18\u52bf\u548c\u5931\u8d25\u6a21\u5f0f"], "keywords": ["\u957f\u671f\u8bb0\u5fc6", "\u5bf9\u8bdd\u7cfb\u7edf", "\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.21447v1", "published_at": "2026-07-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RUMBA: Russian User Memory Benchmark", "tldr": "\u4fc4\u8bed\u957f\u671f\u5bf9\u8bdd\u8bb0\u5fc6\u57fa\u51c6RUMBA", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa RUMBA\uff0c\u4e00\u4e2a\u9762\u5411\u4fc4\u8bed\u957f\u671f\u4f1a\u8bdd\u8bb0\u5fc6\u7684\u57fa\u51c6\uff0c\u5305\u542b\u5e26\u65f6\u95f4\u6233\u7684\u7528\u6237-\u52a9\u624b\u5bf9\u8bdd\u4e0e\u8de8\u4f1a\u8bdd\u95ee\u7b54\u3002\u5b83\u7528\u7edf\u4e00\u5206\u7c7b\u65b9\u6cd5\u8bc4\u4f30\u68c0\u7d22\u3001\u7ec4\u5408\u4e0e\u65f6\u95f4\u63a8\u7406\u7b49\u8bb0\u5fc6\u80fd\u529b\uff0c\u5e76\u63d0\u4f9b\u5bf9\u9f50\u82f1\u6587\u5b50\u96c6\u3002", "why_notable": "\u73b0\u6709\u957f\u671f\u8bb0\u5fc6\u57fa\u51c6\u591a\u504f\u82f1\u8bed\u4e14\u4f9d\u8d56\u7c97\u7c92\u5ea6\u68c0\u7d22\u6307\u6807\uff1bRUMBA\u8865\u8db3\u4e86\u4fc4\u8bed\u573a\u666f\uff0c\u5e76\u63d0\u4f9b\u66f4\u7ec6\u7c92\u5ea6\u7684\u8bca\u65ad\u6846\u67b6\uff0c\u5bf9\u6784\u5efa\u5177\u5907\u7528\u6237\u957f\u671f\u8bb0\u5fc6\u7684\u52a9\u624b\u548c\u667a\u80fd\u4f53\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Quiz rooms, trivia nights, and quiz shows challenge human knowledge across a wide ra
