const PAPERS = [{"abstract": "We present Qwen-Image-2.0-RL, a post-training pipeline that applies reinforcement learning from human feedback (RLHF) and on-policy distillation (OPD) to improve both the visual quality and instruction-following capability of the Qwen-Image-2.0 diffusion model. To provide reliable reward signals, we construct task-specific composite reward models by fine-tuning vision-language models with a pointwise scoring paradigm and chain-of-thought reasoning. For text-to-image generation, the reward models cover alignment, aesthetics, and portrait fidelity dimensions. For image editing tasks, the reward system addresses instruction-following accuracy and face identity preservation. Building on this reward system, we develop a scalable GRPO-based RL training framework, incorporating a hybrid classifier-free guidance (CFG) strategy to preserve pre-trained knowledge, prompt curation via intra-group reward range filtering, and per-category reward weight calibration. To merge the task-specialized RL policies for T2I and editing, we propose on-policy distillation as the final training stage, which consolidates multiple teachers into a single student model through trajectory-level velocity matching. Extensive evaluation shows that Qwen-Image-2.0-RL achieves 57.84 overall score on Qwen-Image-Bench (+2.61 over the base model), Elo ratings of 1193 in text-to-image arena (+78) and 1349 in image edit arena (+93), demonstrating consistent gains in aesthetic quality, prompt adherence, and editing accuracy.", "arxiv_id": "2606.27608", "arxiv_url": "https://arxiv.org/abs/2606.27608", "authors": ["Yixian Xu", "Kaiyuan Gao", "Yuxiang Chen", "Yilei Chen", "Zecheng Tang", "Zihao Liu", "Zikai Zhou", "Deqing Li", "Hao Meng", "Kuan Cao", "Jiahao Li", "Jie Zhang", "Liang Peng", "Lihan Jiang", "Ningyuan Tang", "Shengming Yin", "Tianhe Wu", "Xiaoyue Chen", "Yan Shu", "Yanran Zhang", "Yi Wang", "Yu Wu", "Yujia Wu", "Zekai Zhang", "Zhendong Wang", "Xiao Xu", "Kun Yan", "Chenfei Wu"], "brief": "\u63d0\u51faQwen-Image-2.0-RL\u540e\u8bad\u7ec3\u6d41\u7a0b\uff0c\u5c06\u5f3a\u5316\u5b66\u4e60\uff08GRPO\u6846\u67b6\uff09\u4e0e\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u5e94\u7528\u4e8e\u6587\u751f\u56fe\u548c\u56fe\u50cf\u7f16\u8f91\u6269\u6563\u6a21\u578b\uff0c\u901a\u8fc7\u4efb\u52a1\u4e13\u5c5e\u590d\u5408\u5956\u52b1\u6a21\u578b\u548c\u591a\u9636\u6bb5\u8bad\u7ec3\u663e\u8457\u63d0\u5347\u751f\u6210\u8d28\u91cf\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27608", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6784\u5efa\u57fa\u4e8eVLM\u5fae\u8c03\u7684\u9010\u70b9\u8bc4\u5206+\u601d\u7ef4\u94fe\u63a8\u7406\u590d\u5408\u5956\u52b1\u6a21\u578b\uff0c\u8986\u76d6\u5bf9\u9f50\u5ea6\u3001\u7f8e\u5b66\u3001\u4eba\u50cf\u4fdd\u771f\u5ea6\u7b49\u591a\u7ef4\u5ea6", "GRPO\u8bad\u7ec3\u6846\u67b6\u5f15\u5165\u6df7\u5408CFG\u7b56\u7565\u3001\u7ec4\u5185\u5956\u52b1\u8303\u56f4\u8fc7\u6ee4\u548c\u5206\u7c7b\u522b\u5956\u52b1\u6743\u91cd\u6821\u51c6\uff0c\u4fdd\u7559\u9884\u8bad\u7ec3\u77e5\u8bc6", "\u5728\u7ebf\u7b56\u7565\u84b8\u998f\uff08OPD\uff09\u901a\u8fc7\u8f68\u8ff9\u7ea7\u901f\u5ea6\u5339\u914d\u5c06T2I\u4e0e\u7f16\u8f91\u4e24\u4e2a\u4e13\u9879RL\u7b56\u7565\u5408\u5e76\u4e3a\u5355\u4e00\u6a21\u578b\uff0cElo\u5206\u522b\u63d0\u5347+78\u548c+93"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": true, "organization": "Qwen", "pdf_url": "https://arxiv.org/pdf/2606.27608v1", "published_at": "2026-06-25", "score": 0.456, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Qwen/Alibaba", "HF trending (1\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.27608.png", "title": "Qwen-Image-2.0-RL Technical Report", "tldr": "\u901a\u8fc7RLHF\u4e0e\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u63d0\u5347Qwen-Image-2.0\u6269\u6563\u6a21\u578b\u7684\u89c6\u89c9\u8d28\u91cf\u4e0e\u6307\u4ee4\u9075\u5faa\u80fd\u529b", "upvotes": 1, "what_it_is": "\u63d0\u51faQwen-Image-2.0-RL\u540e\u8bad\u7ec3\u6d41\u7a0b\uff0c\u5c06\u5f3a\u5316\u5b66\u4e60\uff08GRPO\u6846\u67b6\uff09\u4e0e\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u5e94\u7528\u4e8e\u6587\u751f\u56fe\u548c\u56fe\u50cf\u7f16\u8f91\u6269\u6563\u6a21\u578b\uff0c\u901a\u8fc7\u4efb\u52a1\u4e13\u5c5e\u590d\u5408\u5956\u52b1\u6a21\u578b\u548c\u591a\u9636\u6bb5\u8bad\u7ec3\u663e\u8457\u63d0\u5347\u751f\u6210\u8d28\u91cf\u3002", "why_notable": "\u7cfb\u7edf\u6027\u5730\u5c06RLHF\u5f15\u5165\u6269\u6563\u6a21\u578b\u540e\u8bad\u7ec3\uff0c\u5e76\u521b\u65b0\u6027\u5730\u7528\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u89e3\u51b3\u591a\u4efb\u52a1\u7b56\u7565\u5408\u5e76\u95ee\u9898\uff0c\u5728\u516c\u5f00\u699c\u5355\u4e0a\u53d6\u5f97\u663e\u8457\u63d0\u5347\uff0c\u5bf9\u5de5\u4e1a\u7ea7\u56fe\u50cf\u751f\u6210\u6a21\u578b\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Large language model (LLM) agents have demonstrated strong capability in sequential decision-making, yet they remains fundamentally reactive in long-horizon tasks. Unlike humans who employ \"what-if\" reasoning to evaluate potential plans before commitment, standard agents lack an internal world model to simulate future outcomes. Therefore, we propose to internalize future-aware planning by training a single autoregressive model to verbalize both a prospective state rollout and a plan-conditioned success estimate-a textual analogue of the Q-value. Crucially, we identify a format-capability gap: simply fine-tuning agents on look-ahead traces during post-training leads to superficial mimicry of foresight without genuine predictive grounding. To bridge this gap, we introduce a three-stage training paradigm: (i) World Model Agentic Mid-Training (WM-AMT) to inject latent predictive capabilities into the policy; (ii) Format-Eliciting SFT (FE-SFT) to structure this injected capability; and (iii) Foresight-Conditioned Reinforcement Learning (FC-RL) to refine the calibration and utility of the generated simulations. Evaluated on search and mathematical reasoning tasks, our approach consistently outperforms other training baselines. Our results demonstrate that effective internal world modeling in LLM agents requires a capability-first training pipeline to achieve grounded and calibrated foresight.", "arxiv_id": "2606.27483", "arxiv_url": "https://arxiv.org/abs/2606.27483", "authors": ["Xuan Zhang", "Zhijian Zhou", "Lingfeng Qiao", "Yulei Qin", "Ke Li", "Xing Sun", "Xiaoyu Tan", "Chao Qu", "Yuan Qi"], "brief": "\u63d0\u51fa\u4e00\u79cd\u7edf\u4e00\u7684\u667a\u80fd\u4f53\u8bad\u7ec3\u8303\u5f0f\uff0c\u8bad\u7ec3\u5355\u4e00\u81ea\u56de\u5f52\u6a21\u578b\u540c\u65f6\u751f\u6210\u672a\u6765\u72b6\u6001\u9884\u6f14\u548c\u8ba1\u5212\u6210\u529f\u4f30\u8ba1\uff08\u7c7bQ\u503c\uff09\uff0c\u4f7fLLM\u667a\u80fd\u4f53\u5177\u5907\u771f\u6b63\u7684\u5185\u90e8\u4e16\u754c\u6a21\u578b\u63a8\u7406\u80fd\u529b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27483", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u53d1\u73b0\u0027\u683c\u5f0f-\u80fd\u529b\u9e3f\u6c9f\u0027\uff1a\u76f4\u63a5\u5728\u524d\u77bb\u8f68\u8ff9\u4e0a\u5fae\u8c03\u53ea\u4f1a\u4ea7\u751f\u8868\u9762\u6a21\u4eff\uff0c\u7f3a\u4e4f\u771f\u5b9e\u9884\u6d4b\u57fa\u7840", "\u4e09\u9636\u6bb5\u8bad\u7ec3\u6d41\u7a0b\uff1aWM-AMT\u6ce8\u5165\u6f5c\u5728\u9884\u6d4b\u80fd\u529b \u2192 FE-SFT\u7ed3\u6784\u5316\u8be5\u80fd\u529b \u2192 FC-RL\u5f3a\u5316\u6821\u51c6\u4e0e\u6548\u7528", "\u5728\u641c\u7d22\u548c\u6570\u5b66\u63a8\u7406\u4efb\u52a1\u4e0a\u6301\u7eed\u4f18\u4e8e\u5176\u4ed6\u8bad\u7ec3\u57fa\u7ebf\uff0c\u9a8c\u8bc1\u4e86\u0027\u80fd\u529b\u4f18\u5148\u0027\u8bad\u7ec3\u7ba1\u7ebf\u7684\u5fc5\u8981\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27483v1", "published_at": "2026-06-25", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Internalizing the Future: A Unified Agentic Training Paradigm for World Model Planning", "tldr": "\u63d0\u51fa\u4e09\u9636\u6bb5\u8bad\u7ec3\u8303\u5f0f\uff0c\u8ba9LLM\u667a\u80fd\u4f53\u5185\u5316\u4e16\u754c\u6a21\u578b\u4ee5\u5b9e\u73b0\u524d\u77bb\u6027\u89c4\u5212", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u7edf\u4e00\u7684\u667a\u80fd\u4f53\u8bad\u7ec3\u8303\u5f0f\uff0c\u8bad\u7ec3\u5355\u4e00\u81ea\u56de\u5f52\u6a21\u578b\u540c\u65f6\u751f\u6210\u672a\u6765\u72b6\u6001\u9884\u6f14\u548c\u8ba1\u5212\u6210\u529f\u4f30\u8ba1\uff08\u7c7bQ\u503c\uff09\uff0c\u4f7fLLM\u667a\u80fd\u4f53\u5177\u5907\u771f\u6b63\u7684\u5185\u90e8\u4e16\u754c\u6a21\u578b\u63a8\u7406\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u4e16\u754c\u6a21\u578b\u89c4\u5212\u5185\u5316\u5230LLM\u667a\u80fd\u4f53\u8bad\u7ec3\u4e2d\uff0c\u63ed\u793a\u4e86\u683c\u5f0f\u4e0e\u80fd\u529b\u89e3\u8026\u7684\u5173\u952e\u95ee\u9898\uff0c\u4e3a\u957f\u65f6\u5e8f\u51b3\u7b56\u4efb\u52a1\u63d0\u4f9b\u4e86\u53ef\u843d\u5730\u7684\u8bad\u7ec3\u6846\u67b6\u3002"}, {"abstract": "Artificial intelligence is driving a revolution in scientific discovery, accelerating everything from hypothesis generation to mathematical theorem proving. However, this rapid acceleration is creating a systemic challenge: traditional human peer review cannot scale to match the influx of AI-assisted science. Ultimately, to resolve this tension, we must also deploy AI to accelerate the verification and review process itself. To frame the discussion around this transition, we propose a taxonomy consisting of four progressive levels of AI-human collaboration in scientific evaluation, and discuss various trade-offs involved with each. As a step toward this future, we introduce the Paper Assistant Tool (PAT), an agentic AI framework built for deep scientific review and verification. PAT ingests full scientific manuscripts and produces a comprehensive evaluation, checking theoretical results, validating experiments, suggesting improvements, and identifying potential flaws. By utilizing inference scaling techniques, PAT is able to identify deeper issues than a single model call alone, achieving a 34% improvement over zero-shot recall on mathematical errors in the SPOT benchmark. Pilot deployments of PAT as a pre-submission tool for authors at two major Computer Science conferences -- STOC and ICML -- demonstrate its ability to identify critical errors and suggest substantive improvements to research papers. By catching errors early, PAT eases the cognitive burden placed on referees, while preserving their control over the outcomes of the review process.", "arxiv_id": "2606.28277", "arxiv_url": "https://arxiv.org/abs/2606.28277", "authors": ["Rajesh Jayaram", "Drew Tyler", "David Woodruff", "Corinna Cortes", "Yossi Matias", "Vahab Mirrokni", "Vincent Cohen-Addad"], "brief": "\u8bba\u6587\u63d0\u51faPaper Assistant Tool\uff08PAT\uff09\uff0c\u4e00\u4e2a\u9762\u5411\u6df1\u5ea6\u79d1\u5b66\u5ba1\u7a3f\u7684\u667a\u80fd\u4f53AI\u6846\u67b6\uff0c\u80fd\u591f\u6444\u5165\u5b8c\u6574\u8bba\u6587\u5e76\u751f\u6210\u7efc\u5408\u8bc4\u4f30\u62a5\u544a\uff0c\u5305\u62ec\u9a8c\u8bc1\u7406\u8bba\u7ed3\u679c\u3001\u68c0\u9a8c\u5b9e\u9a8c\u3001\u53d1\u73b0\u6f5c\u5728\u7f3a\u9677\u5e76\u63d0\u51fa\u6539\u8fdb\u5efa\u8bae\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28277", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u56db\u7ea7AI-\u4eba\u7c7b\u534f\u4f5c\u79d1\u5b66\u8bc4\u5ba1\u5206\u7c7b\u4f53\u7cfb\uff0c\u7cfb\u7edf\u68b3\u7406\u5404\u5c42\u7ea7\u7684\u6743\u8861\u53d6\u820d", "\u5229\u7528\u63a8\u7406\u6269\u5c55\uff08inference scaling\uff09\u6280\u672f\uff0c\u5728SPOT\u57fa\u51c6\u4e0a\u6570\u5b66\u9519\u8bef\u53ec\u56de\u7387\u6bd4\u96f6\u6837\u672c\u63d0\u534734%", "\u5df2\u5728STOC\u548cICML\u4e24\u5927\u9876\u7ea7CS\u4f1a\u8bae\u4f5c\u4e3a\u9884\u63d0\u4ea4\u5de5\u5177\u8bd5\u70b9\u90e8\u7f72\uff0c\u9a8c\u8bc1\u4e86\u5b9e\u9645\u6548\u679c"], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u8bc4\u5ba1", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u6269\u5c55"], "num_comments": 0, "on_hf": true, "organization": "Google", "pdf_url": "https://arxiv.org/pdf/2606.28277v1", "published_at": "2026-06-26", "score": 0.4, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Google", "\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.28277.png", "title": "Towards Automating Scientific Review with Google\u0027s Paper Assistant Tool", "tldr": "\u8c37\u6b4c\u63d0\u51faPAT\u5de5\u5177\uff0c\u7528\u667a\u80fd\u4f53AI\u6846\u67b6\u81ea\u52a8\u5316\u79d1\u5b66\u8bba\u6587\u5ba1\u7a3f\uff0c\u5728\u6570\u5b66\u9519\u8bef\u68c0\u6d4b\u4e0a\u63d0\u534734%", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51faPaper Assistant Tool\uff08PAT\uff09\uff0c\u4e00\u4e2a\u9762\u5411\u6df1\u5ea6\u79d1\u5b66\u5ba1\u7a3f\u7684\u667a\u80fd\u4f53AI\u6846\u67b6\uff0c\u80fd\u591f\u6444\u5165\u5b8c\u6574\u8bba\u6587\u5e76\u751f\u6210\u7efc\u5408\u8bc4\u4f30\u62a5\u544a\uff0c\u5305\u62ec\u9a8c\u8bc1\u7406\u8bba\u7ed3\u679c\u3001\u68c0\u9a8c\u5b9e\u9a8c\u3001\u53d1\u73b0\u6f5c\u5728\u7f3a\u9677\u5e76\u63d0\u51fa\u6539\u8fdb\u5efa\u8bae\u3002", "why_notable": "\u9762\u5bf9AI\u52a0\u901f\u79d1\u7814\u5e26\u6765\u7684\u540c\u884c\u8bc4\u5ba1\u538b\u529b\uff0cPAT\u63d0\u4f9b\u4e86\u53ef\u843d\u5730\u7684\u81ea\u52a8\u5316\u5ba1\u7a3f\u89e3\u51b3\u65b9\u6848\uff0c\u5e76\u5df2\u5728\u9876\u4f1a\u5b9e\u9645\u90e8\u7f72\uff0c\u517c\u987e\u9519\u8bef\u53d1\u73b0\u80fd\u529b\u4e0e\u4eba\u7c7b\u5bf9\u8bc4\u5ba1\u7ed3\u679c\u7684\u6700\u7ec8\u63a7\u5236\u6743\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Web-agent benchmarks overwhelmingly measure depth -- pinning one obscure answer behind a chain of constraints -- while breadth, exhaustively enumerating a closed set and filling each item\u0027s attributes, is barely evaluated, especially outside English. Breadth is also hard to build: certifying that a gold set is complete and every cell correct is far costlier than checking a single answer. I introduce \\textsc{Ko-WideSearch}, a Korean breadth-search benchmark built by an automated synthesize-and-verify pipeline. Each task names a set-parent entity -- a TV season, a dynasty, a league, an administrative region, an election -- and asks for its full membership plus a per-item attribute table, graded by Item-, Column-, and Row-F1. It spans 228 tables over 190 entities and sixteen categories across three difficulty tiers, set by two structural knobs I dial independently -- table width and a 2-D composite key -- so cross-product membership climbs from 0\\% to 100\\% across the tiers. A single normalization-aware comparator is shared between gold construction and grading, so stable date and count columns are not over-dropped on formatting alone. Across twenty web agents, the failure is consistent: agents recover the set but not the rows (e.g.\\ Item-F1 92.8 against Row-F1 53.7), accuracy falls steadily as the knobs harden, and neither more search nor more spend closes the gap. Broken down by cell, the hard part is finding the right value, not formatting it: open-ended free-text cells fail most, while cells with a standard answer such as a date or a name usually come out right.", "arxiv_id": "2606.27595", "arxiv_url": "https://arxiv.org/abs/2606.27595", "authors": ["Minbyul Jeong"], "brief": "\u63d0\u51faKo-WideSearch\uff0c\u4e00\u4e2a\u97e9\u8bed\u7f51\u9875\u667a\u80fd\u4f53\u57fa\u51c6\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u7a77\u4e3e\u679a\u4e3e\u5c01\u95ed\u96c6\u5408\uff08\u5982\u67d0\u7535\u89c6\u5267\u5b63\u7684\u5168\u90e8\u6f14\u5458+\u5c5e\u6027\u8868\uff09\uff0c\u901a\u8fc7\u81ea\u52a8\u5316\u5408\u6210\u9a8c\u8bc1\u6d41\u6c34\u7ebf\u6784\u5efa\uff0c\u8986\u76d6228\u5f20\u8868\u3001190\u4e2a\u5b9e\u4f53\u300116\u4e2a\u7c7b\u522b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27595", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u91c7\u7528Item-F1\u3001Column-F1\u3001Row-F1\u4e09\u7ef4\u8bc4\u5206\u4f53\u7cfb\uff0c\u901a\u8fc7\u8868\u683c\u5bbd\u5ea6\u548c\u4e8c\u7ef4\u590d\u5408\u952e\u4e24\u4e2a\u7ed3\u6784\u65cb\u94ae\u63a7\u5236\u96be\u5ea6", "\u6d4b\u8bd520\u4e2aWeb\u667a\u80fd\u4f53\u53d1\u73b0\u7cfb\u7edf\u6027\u7f3a\u9677\uff1a\u96c6\u5408\u6210\u5458\u53ec\u56de\u7387\u9ad8\uff08Item-F1 92.8\uff09\u4f46\u884c\u7ea7\u51c6\u786e\u7387\u4f4e\uff08Row-F1 53.7\uff09", "\u81ea\u7531\u6587\u672c\u5355\u5143\u683c\u5931\u8d25\u7387\u6700\u9ad8\uff0c\u800c\u65e5\u671f/\u59d3\u540d\u7b49\u6807\u51c6\u7b54\u6848\u5355\u5143\u683c\u8868\u73b0\u8f83\u597d\uff0c\u589e\u52a0\u641c\u7d22\u6b21\u6570\u6216\u9884\u7b97\u5747\u65e0\u6cd5\u5f25\u8865\u5dee\u8ddd"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "\u591a\u8bed\u8a00", "\u4fe1\u606f\u62bd\u53d6"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27595v1", "published_at": "2026-06-25", "score": 0.333, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (2\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.27595.png", "title": "Ko-WideSearch: A Korean Breadth-Search Benchmark for Exhaustive Set Enumeration by Web Agents", "tldr": "\u9996\u4e2a\u97e9\u8bed\u5e7f\u5ea6\u641c\u7d22\u57fa\u51c6\uff0c\u8bc4\u4f30Web\u667a\u80fd\u4f53\u5bf9\u5c01\u95ed\u96c6\u5408\u7684\u7a77\u4e3e\u679a\u4e3e\u80fd\u529b", "upvotes": 2, "what_it_is": "\u63d0\u51faKo-WideSearch\uff0c\u4e00\u4e2a\u97e9\u8bed\u7f51\u9875\u667a\u80fd\u4f53\u57fa\u51c6\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u7a77\u4e3e\u679a\u4e3e\u5c01\u95ed\u96c6\u5408\uff08\u5982\u67d0\u7535\u89c6\u5267\u5b63\u7684\u5168\u90e8\u6f14\u5458+\u5c5e\u6027\u8868\uff09\uff0c\u901a\u8fc7\u81ea\u52a8\u5316\u5408\u6210\u9a8c\u8bc1\u6d41\u6c34\u7ebf\u6784\u5efa\uff0c\u8986\u76d6228\u5f20\u8868\u3001190\u4e2a\u5b9e\u4f53\u300116\u4e2a\u7c7b\u522b\u3002", "why_notable": "\u586b\u8865\u4e86Web\u667a\u80fd\u4f53\u8bc4\u6d4b\u4e2d\"\u5e7f\u5ea6\u641c\u7d22\"\u7ef4\u5ea6\u7684\u7a7a\u767d\uff0c\u5c24\u5176\u662f\u975e\u82f1\u8bed\u573a\u666f\uff1b\u63ed\u793a\u4e86\u5f53\u524d\u667a\u80fd\u4f53\u5728\u5c5e\u6027\u586b\u5145\u800c\u975e\u96c6\u5408\u679a\u4e3e\u4e0a\u7684\u6838\u5fc3\u74f6\u9888\uff0c\u5bf9\u667a\u80fd\u4f53\u80fd\u529b\u8bc4\u4f30\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "We present HORIZON, a self-evolving agent framework that treats hardware design as repository-level code evolution. A Markdown harness is compiled into a project pack containing domain knowledge, an executable evaluator, an acceptance predicate, and a git/runtime policy; a hands-free agent loop then evolves an isolated git worktree, using repository operations for state management, tracing, and replay. This extends prior works of repository-scale self-evolution from EDA software systems, to hardware-design artifacts themselves. We evaluate our approach on ChipBench, RTLLM, Verilog-Eval, and nine CVDP categories, achieving 100\\% benchmark completion across all suites with a fully hands-free agentic loop. However, we do not claim that agentic AI for hardware design is solved: these benchmarks are controlled proxies for a much broader engineering problem in chip design. Section~\\ref{sec:discuss} examines the limitations of the current study and highlights open research challenges.", "arxiv_id": "2606.28279", "arxiv_url": "https://arxiv.org/abs/2606.28279", "authors": ["Cunxi Yu", "Chenhui Deng", "Nathaniel Pinckney", "Brucek Khailany"], "brief": "\u63d0\u51faHORIZON\u81ea\u6f14\u5316\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u786c\u4ef6\u8bbe\u8ba1\u4efb\u52a1\u8f6c\u5316\u4e3agit\u4ed3\u5e93\u7ea7\u4ee3\u7801\u6f14\u5316\u95ee\u9898\uff0c\u901a\u8fc7Markdown\u63cf\u8ff0\u7f16\u8bd1\u4e3a\u9879\u76ee\u5305\uff0c\u9a71\u52a8\u65e0\u4eba\u503c\u5b88\u7684\u667a\u80fd\u4f53\u5faa\u73af\u81ea\u52a8\u5b8c\u6210RTL/Verilog\u786c\u4ef6\u8bbe\u8ba1\u3002", "categories": ["cs.AR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28279", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u786c\u4ef6\u8bbe\u8ba1\u62bd\u8c61\u4e3a\u4ed3\u5e93\u7ea7\u4ee3\u7801\u6f14\u5316\uff1a\u5305\u542b\u9886\u57df\u77e5\u8bc6\u3001\u53ef\u6267\u884c\u8bc4\u4f30\u5668\u3001\u9a8c\u6536\u8c13\u8bcd\u548cgit\u8fd0\u884c\u7b56\u7565", "\u5728ChipBench\u3001RTLLM\u3001Verilog-Eval\u53ca9\u4e2aCVDP\u7c7b\u522b\u4e0a\u5b9e\u73b0100%\u57fa\u51c6\u5b8c\u6210\u7387", "\u4f5c\u8005\u660e\u786e\u6307\u51fa\u5f53\u524d\u57fa\u51c6\u4ec5\u662f\u53d7\u63a7\u4ee3\u7406\uff0c\u771f\u5b9e\u82af\u7247\u8bbe\u8ba1\u6311\u6218\u8fdc\u672a\u89e3\u51b3\uff0c\u5e76\u5217\u51fa\u5f00\u653e\u7814\u7a76\u95ee\u9898"], "keywords": ["\u667a\u80fd\u4f53", "\u786c\u4ef6\u8bbe\u8ba1", "\u4ee3\u7801\u751f\u6210", "\u81ea\u52a8\u5316EDA"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28279v1", "published_at": "2026-06-26", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Agentic Hardware Design as Repository-Level Code Evolution", "tldr": "HORIZON\u6846\u67b6\u5c06\u786c\u4ef6\u8bbe\u8ba1\u89c6\u4e3a\u4ed3\u5e93\u7ea7\u4ee3\u7801\u6f14\u5316\uff0c\u5b9e\u73b0\u5168\u81ea\u52a8\u82af\u7247\u8bbe\u8ba1\u667a\u80fd\u4f53", "upvotes": 0, "what_it_is": "\u63d0\u51faHORIZON\u81ea\u6f14\u5316\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u786c\u4ef6\u8bbe\u8ba1\u4efb\u52a1\u8f6c\u5316\u4e3agit\u4ed3\u5e93\u7ea7\u4ee3\u7801\u6f14\u5316\u95ee\u9898\uff0c\u901a\u8fc7Markdown\u63cf\u8ff0\u7f16\u8bd1\u4e3a\u9879\u76ee\u5305\uff0c\u9a71\u52a8\u65e0\u4eba\u503c\u5b88\u7684\u667a\u80fd\u4f53\u5faa\u73af\u81ea\u52a8\u5b8c\u6210RTL/Verilog\u786c\u4ef6\u8bbe\u8ba1\u3002", "why_notable": "\u9996\u6b21\u5c06\u4ed3\u5e93\u7ea7\u81ea\u6f14\u5316\u8303\u5f0f\u4eceEDA\u8f6f\u4ef6\u7cfb\u7edf\u6269\u5c55\u5230\u786c\u4ef6\u8bbe\u8ba1\u5236\u54c1\u672c\u8eab\uff0c\u5168\u81ea\u52a8\u5b8c\u6210\u591a\u4e2a\u4e3b\u6d41\u786c\u4ef6\u8bbe\u8ba1\u57fa\u51c6\uff0c\u540c\u65f6\u4fdd\u6301\u5bf9\u5c40\u9650\u6027\u7684\u6e05\u9192\u8ba4\u8bc6\uff0c\u5177\u6709\u8f83\u5f3a\u5de5\u7a0b\u5b9e\u7528\u4ef7\u503c\u4e0e\u7814\u7a76\u53c2\u8003\u610f\u4e49\u3002"}, {"abstract": "Large language model (LLM) agents operate over long, multi-session interactions in which facts change: a user moves, a price updates, a plan is revised. Acting correctly requires using the current value of a fact and discarding values that have been superseded. We isolate this ability on real conversational data and show that it is a distinct, unsolved failure. On the knowledge-update subset of LongMemEval, replacing an agent\u0027s full context with a bounded, self-maintained memory drops accuracy from 92% to 77% even on a frontier model (gpt-5.4), a gap that is statistically significant (paired McNemar p\u003c0.005) and persists across model scale while full-context accuracy saturates near 92%. The bottleneck is therefore memory maintenance, not comprehension, and is not closed by a stronger model. We then ask whether this is merely an undersized memory, and find it is not: as the conversation grows 24x, accuracy falls further (from 68% to 28%), and granting the agent proportionally more memory yields no detectable recovery (28% to 28%, n=25). The failure scales with the length of the conversation, not the compression ratio. We release Supersede, an open reinforcement-learning environment (on the verifiers / prime-rl stack) that turns this measurement into a training signal: agents are rewarded for answering from the current value and penalized for stale ones. Finally, we close the loop and show the gap is trainable: GRPO fine-tuning a small open model (Qwen2.5-3B) on this environment nearly doubles its held-out supersession accuracy on real, unseen conversations (9.0% to 16.7%, a single run), along a monotonic checkpoint curve indicating the learned policy, not the harness, carries the gain. To our knowledge this is the first trainable environment whose reward targets temporal fact-currency, and the first evidence the supersession gap can be trained down, not only measured.", "arxiv_id": "2606.27472", "arxiv_url": "https://arxiv.org/abs/2606.27472", "authors": ["Vedant Patel"], "brief": "\u8bba\u6587\u63d0\u51faSupersede\u6846\u67b6\uff0c\u7cfb\u7edf\u8bca\u65adLLM\u667a\u80fd\u4f53\u5728\u591a\u8f6e\u5bf9\u8bdd\u4e2d\u65e0\u6cd5\u6b63\u786e\u4e22\u5f03\u8fc7\u65f6\u4e8b\u5b9e\u3001\u4f7f\u7528\u6700\u65b0\u503c\u7684\u8bb0\u5fc6\u7ef4\u62a4\u7f3a\u9677\uff0c\u5e76\u6784\u5efa\u9996\u4e2a\u4ee5\u300c\u65f6\u6548\u6027\u4e8b\u5b9e\u51c6\u786e\u6027\u300d\u4e3a\u5956\u52b1\u4fe1\u53f7\u7684\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u73af\u5883\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27472", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5728LongMemEval\u57fa\u51c6\u4e0a\uff0c\u7528\u6709\u754c\u81ea\u7ef4\u62a4\u8bb0\u5fc6\u66ff\u6362\u5b8c\u6574\u4e0a\u4e0b\u6587\u540e\uff0c\u5373\u4f7f\u662f\u524d\u6cbf\u6a21\u578b(gpt-5.4)\u51c6\u786e\u7387\u4ece92%\u9aa4\u964d\u81f377%\uff0c\u4e14\u8be5\u5dee\u8ddd\u4e0d\u968f\u6a21\u578b\u89c4\u6a21\u6269\u5927\u800c\u6d88\u5931", "\u5bf9\u8bdd\u957f\u5ea6\u589e\u957f24\u500d\u65f6\u51c6\u786e\u7387\u4ece68%\u964d\u81f328%\uff0c\u589e\u52a0\u8bb0\u5fc6\u5bb9\u91cf\u65e0\u6cd5\u6062\u590d\uff0828%\u219228%\uff09\uff0c\u74f6\u9888\u5728\u8bb0\u5fc6\u7ef4\u62a4\u800c\u975e\u7406\u89e3\u80fd\u529b", "\u4f7f\u7528GRPO\u5bf9Qwen2.5-3B\u8fdb\u884c\u5fae\u8c03\u540e\uff0c\u5728\u771f\u5b9e\u672a\u89c1\u5bf9\u8bdd\u4e0a\u7684\u4e8b\u5b9e\u66f4\u65b0\u51c6\u786e\u7387\u4ece9.0%\u63d0\u5347\u81f316.7%\uff0c\u9a8c\u8bc1\u8be5\u7f3a\u9677\u53ef\u901a\u8fc7\u8bad\u7ec3\u6539\u5584"], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u7ba1\u7406", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27472v1", "published_at": "2026-06-25", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Supersede: Diagnosing and Training the Memory-Update Gap in LLM Agents", "tldr": "\u9996\u4e2a\u9488\u5bf9LLM\u667a\u80fd\u4f53\u300c\u8fc7\u65f6\u4e8b\u5b9e\u300d\u8bb0\u5fc6\u66f4\u65b0\u7f3a\u9677\u7684\u53ef\u8bad\u7ec3\u5f3a\u5316\u5b66\u4e60\u73af\u5883", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51faSupersede\u6846\u67b6\uff0c\u7cfb\u7edf\u8bca\u65adLLM\u667a\u80fd\u4f53\u5728\u591a\u8f6e\u5bf9\u8bdd\u4e2d\u65e0\u6cd5\u6b63\u786e\u4e22\u5f03\u8fc7\u65f6\u4e8b\u5b9e\u3001\u4f7f\u7528\u6700\u65b0\u503c\u7684\u8bb0\u5fc6\u7ef4\u62a4\u7f3a\u9677\uff0c\u5e76\u6784\u5efa\u9996\u4e2a\u4ee5\u300c\u65f6\u6548\u6027\u4e8b\u5b9e\u51c6\u786e\u6027\u300d\u4e3a\u5956\u52b1\u4fe1\u53f7\u7684\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u73af\u5883\u3002", "why_notable": "\u9996\u6b21\u5c06\u300c\u65f6\u6548\u6027\u4e8b\u5b9e\u8d27\u5e01\u6027\u300d\u4f5c\u4e3a\u53ef\u8bad\u7ec3\u5956\u52b1\u4fe1\u53f7\uff0c\u63ed\u793a\u4e86\u4e00\u4e2a\u88ab\u5ffd\u89c6\u4f46\u666e\u904d\u5b58\u5728\u7684LLM\u667a\u80fd\u4f53\u5931\u6548\u6a21\u5f0f\uff0c\u5e76\u63d0\u4f9b\u5f00\u6e90RL\u8bad\u7ec3\u73af\u5883\uff0c\u5bf9\u957f\u671f\u5bf9\u8bdd\u667a\u80fd\u4f53\u7684\u5b9e\u7528\u90e8\u7f72\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Video generation models have emerged as a promising paradigm for embodied world simulation. However, both general-domain video generators and robot-specific data fine-tuned models can still produce physically implausible manipulations, including discontinuous motion trajectories and inconsistent robot-object interactions, which limits their reliability as world simulators. Through extensive experiments, we find that such physical instability mainly arises from two factors: deformation of moving objects and implausible spatio-temporal correlations among interacting entities, particularly during contact. Building on this observation, we propose PhysisForcing, a scalable training framework that strengthens physical consistency by focusing supervision on physics-informative regions through joint optimization of pixel-level and semantic-level features. The framework consists of a pixel-level trajectory alignment loss, which supervises DiT features using reference point trajectories, and a semantic-level relational alignment loss, which aligns DiT features with inter-region relations extracted from a frozen video understanding encoder. Extensive experiments on R-Bench, PAI-Bench, and EZS-Bench show that PhysisForcing consistently improves embodied video generation over strong baselines, improving the Wan2.2-I2V-A14B and Cosmos3-Nano base models on R-Bench by 22.3\\% and 9.2\\% (7.1\\% and 3.7\\% over vanilla finetuning), with the Cosmos3-Nano variant attaining the best overall score. Beyond generation, as a world model under the WorldArena action-planner protocol it raises the closed-loop success rate from 16.0\\% to 24.0\\% and further improves downstream policy success, indicating that physically aligned video models yield stronger representations for robotic manipulation.", "arxiv_id": "2606.28128", "arxiv_url": "https://arxiv.org/abs/2606.28128", "authors": ["Peiwen Zhang", "Yufan Deng", "Shangkun Sun", "Juncheng Ma", "Duomin Wang", "Jonas Du", "Zilin Pan", "Ye Huang", "Hao Liang", "Songyan Huang", "Ruihua Zhang", "Enze Xie", "Ming-Yu Liu", "Daquan Zhou"], "brief": "\u63d0\u51faPhysisForcing\u8bad\u7ec3\u6846\u67b6\uff0c\u901a\u8fc7\u50cf\u7d20\u7ea7\u8f68\u8ff9\u5bf9\u9f50\u635f\u5931\u548c\u8bed\u4e49\u7ea7\u5173\u7cfb\u5bf9\u9f50\u635f\u5931\uff0c\u5f3a\u5316\u89c6\u9891\u751f\u6210\u6a21\u578b\u5728\u673a\u5668\u4eba\u64cd\u4f5c\u573a\u666f\u4e2d\u7684\u7269\u7406\u4e00\u81f4\u6027\uff0c\u89e3\u51b3\u8fd0\u52a8\u4e0d\u8fde\u7eed\u548c\u4ea4\u4e92\u4e0d\u5408\u7406\u95ee\u9898\u3002", "categories": ["cs.CV", "cs.AI", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28128", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u53cc\u5c42\u76d1\u7763\u673a\u5236\uff1a\u50cf\u7d20\u7ea7\u8f68\u8ff9\u5bf9\u9f50\uff08\u76d1\u7763DiT\u7279\u5f81\u4e0e\u53c2\u8003\u70b9\u8f68\u8ff9\uff09+ \u8bed\u4e49\u7ea7\u5173\u7cfb\u5bf9\u9f50\uff08\u5229\u7528\u51bb\u7ed3\u89c6\u9891\u7406\u89e3\u7f16\u7801\u5668\u63d0\u53d6\u533a\u57df\u95f4\u5173\u7cfb\uff09", "\u5728R-Bench\u4e0a\u5206\u522b\u63d0\u5347Wan2.2-I2V-A14B\u548cCosmos3-Nano\u57fa\u7840\u6a21\u578b22.3%\u548c9.2%\uff0c\u76f8\u6bd4\u666e\u901a\u5fae\u8c03\u63d0\u53477.1%\u548c3.7%", "\u4f5c\u4e3a\u4e16\u754c\u6a21\u578b\u5728WorldArena\u534f\u8bae\u4e0b\uff0c\u95ed\u73af\u6210\u529f\u7387\u4ece16.0%\u63d0\u5347\u81f324.0%\uff0c\u5e76\u6539\u5584\u4e0b\u6e38\u7b56\u7565\u6267\u884c\u6548\u679c"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u673a\u5668\u4eba\u64cd\u4f5c", "\u7269\u7406\u4e00\u81f4\u6027"], "num_comments": 0, "on_hf": true, "organization": "NVIDIA", "pdf_url": "https://arxiv.org/pdf/2606.28128v1", "published_at": "2026-06-26", "score": 0.261, "selected_reasons": ["\u77e5\u540d\u673a\u6784: NVIDIA", "HF trending (3\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.28128.png", "title": "PhysisForcing: Physics Reinforced World Simulator for Robotic Manipulation", "tldr": "PhysisForcing\u901a\u8fc7\u7269\u7406\u4e00\u81f4\u6027\u76d1\u7763\u63d0\u5347\u673a\u5668\u4eba\u64cd\u4f5c\u89c6\u9891\u751f\u6210\u7684\u771f\u5b9e\u6027", "upvotes": 3, "what_it_is": "\u63d0\u51faPhysisForcing\u8bad\u7ec3\u6846\u67b6\uff0c\u901a\u8fc7\u50cf\u7d20\u7ea7\u8f68\u8ff9\u5bf9\u9f50\u635f\u5931\u548c\u8bed\u4e49\u7ea7\u5173\u7cfb\u5bf9\u9f50\u635f\u5931\uff0c\u5f3a\u5316\u89c6\u9891\u751f\u6210\u6a21\u578b\u5728\u673a\u5668\u4eba\u64cd\u4f5c\u573a\u666f\u4e2d\u7684\u7269\u7406\u4e00\u81f4\u6027\uff0c\u89e3\u51b3\u8fd0\u52a8\u4e0d\u8fde\u7eed\u548c\u4ea4\u4e92\u4e0d\u5408\u7406\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u5206\u6790\u89c6\u9891\u751f\u6210\u7269\u7406\u4e0d\u7a33\u5b9a\u7684\u6839\u672c\u539f\u56e0\uff0c\u5e76\u63d0\u51fa\u53ef\u6269\u5c55\u7684\u7269\u7406\u589e\u5f3a\u6846\u67b6\uff0c\u4e0d\u4ec5\u63d0\u5347\u751f\u6210\u8d28\u91cf\uff0c\u8fd8\u76f4\u63a5\u6539\u5584\u673a\u5668\u4eba\u64cd\u4f5c\u7684\u4e0b\u6e38\u4efb\u52a1\u6210\u529f\u7387\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Prompt injection is the top security risk for LLM-integrated applications, yet every defense proposed so far has been broken. We prove this is not a coincidence: in shared-embedding architectures that lack enforced control-data separation, perfect prompt-injection prevention is mathematically impossible. We formalize prompted systems as Prompted Action Models whose outputs include control-authoritative actions: refusal decisions, tool authorization, policy routing, and memory writes. We define Semantic-Faithful Control (SFC), the property that such behavior depends only on the meaning of untrusted input, not on how it is encoded. We then prove SFC is unachievable within the shared pipeline, via three results: a provenance-recovery impossibility (shared representations make trusted and untrusted content statistically inseparable, bounded by total variation distance); control-path exposure (untrusted tokens enter control-relevant computation through the same attention value-aggregation that determines outputs); and a finite-coverage invariance gap (finite training cannot certify invariance over infinite semantic-equivalence classes). We ground each quantity in measurements on production tokenizers and models. The result is structural, not a gap in current defenses. It mirrors the code-data confusion in Von Neumann machines that gives rise to buffer overflows, a vulnerability class that took decades of layered defenses (DEP, Write-XOR-Execute, ASLR, stack canaries, and ultimately memory-safe languages) to contain, because no single mechanism sufficed. The implication is the same: prompt injection cannot be eliminated by better in-pipeline classification or alignment alone. It requires architectural separation of instruction and data channels. We identify the root cause and the class of solution it demands.", "arxiv_id": "2606.27567", "arxiv_url": "https://arxiv.org/abs/2606.27567", "authors": ["Dewank Pant", "Shruti Lohani", "Avijit Kumar"], "brief": "\u672c\u6587\u4ece\u7406\u8bba\u5c42\u9762\u8bc1\u660e\uff1a\u5728\u5171\u4eab\u5d4c\u5165\u7684LLM\u67b6\u6784\u4e2d\uff0c\u63d0\u793a\u6ce8\u5165\uff08Prompt Injection\uff09\u653b\u51fb\u65e0\u6cd5\u88ab\u5b8c\u5168\u6d88\u9664\uff0c\u8fd9\u662f\u7ed3\u6784\u6027\u7f3a\u9677\u800c\u975e\u9632\u5fa1\u4e0d\u8db3\u3002\u4f5c\u8005\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e86\"\u8bed\u4e49\u5fe0\u5b9e\u63a7\u5236\"\u5c5e\u6027\uff0c\u5e76\u901a\u8fc7\u4e09\u4e2a\u6570\u5b66\u5b9a\u7406\u8bc1\u660e\u5176\u5728\u5171\u4eab\u7ba1\u9053\u4e2d\u4e0d\u53ef\u5b9e\u73b0\u3002", "categories": ["cs.CR", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27567", "impact_score": 9, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u4e09\u4e2a\u4e0d\u53ef\u80fd\u6027\u5b9a\u7406\uff1a\u6eaf\u6e90\u6062\u590d\u4e0d\u53ef\u80fd\uff08\u53ef\u4fe1\u4e0e\u4e0d\u53ef\u4fe1\u5185\u5bb9\u5728\u5171\u4eab\u8868\u793a\u4e2d\u7edf\u8ba1\u4e0a\u4e0d\u53ef\u5206\uff0c\u4ee5\u5168\u53d8\u5dee\u8ddd\u79bb\u4e3a\u754c\uff09\u3001\u63a7\u5236\u8def\u5f84\u66b4\u9732\uff08\u4e0d\u53ef\u4fe1token\u901a\u8fc7\u6ce8\u610f\u529b\u503c\u805a\u5408\u8fdb\u5165\u63a7\u5236\u76f8\u5173\u8ba1\u7b97\uff09\u3001\u6709\u9650\u8986\u76d6\u4e0d\u53d8\u6027\u7f3a\u53e3\uff08\u6709\u9650\u8bad\u7ec3\u65e0\u6cd5\u8ba4\u8bc1\u65e0\u9650\u8bed\u4e49\u7b49\u4ef7\u7c7b\u4e0a\u7684\u4e0d\u53d8\u6027\uff09", "\u5c06\u63d0\u793a\u6ce8\u5165\u7c7b\u6bd4\u4e3a\u51af\u00b7\u8bfa\u4f9d\u66fc\u673a\u5668\u4e2d\u7684\u4ee3\u7801-\u6570\u636e\u6df7\u6dc6\u95ee\u9898\uff08\u7c7b\u4f3c\u7f13\u51b2\u533a\u6ea2\u51fa\uff09\uff0c\u6307\u51fa\u8be5\u6f0f\u6d1e\u7c7b\u9700\u8981\u6570\u5341\u5e74\u5206\u5c42\u9632\u5fa1\u624d\u80fd\u904f\u5236\uff0c\u5355\u4e00\u673a\u5236\u4e0d\u591f", "\u7ed3\u8bba\u6307\u5411\u67b6\u6784\u7ea7\u89e3\u51b3\u65b9\u6848\uff1a\u5fc5\u987b\u5728\u6307\u4ee4\u901a\u9053\u4e0e\u6570\u636e\u901a\u9053\u4e4b\u95f4\u5b9e\u73b0\u786c\u6027\u5206\u79bb\uff0c\u4ec5\u9760\u66f4\u597d\u7684\u5206\u7c7b\u5668\u6216\u5bf9\u9f50\u8bad\u7ec3\u65e0\u6cd5\u6839\u6cbb"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168", "\u63d0\u793a\u6ce8\u5165", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27567v1", "published_at": "2026-06-25", "score": 0.225, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "On the Inseparability of Instructions and Data in Shared-Embedding Sequence Models", "tldr": "\u4ece\u6570\u5b66\u4e0a\u8bc1\u660e\u5171\u4eab\u5d4c\u5165\u67b6\u6784\u4e2d\u5b8c\u7f8e\u9632\u5fa1\u63d0\u793a\u6ce8\u5165\u653b\u51fb\u5728\u7406\u8bba\u4e0a\u4e0d\u53ef\u80fd\u5b9e\u73b0", "upvotes": 0, "what_it_is": "\u672c\u6587\u4ece\u7406\u8bba\u5c42\u9762\u8bc1\u660e\uff1a\u5728\u5171\u4eab\u5d4c\u5165\u7684LLM\u67b6\u6784\u4e2d\uff0c\u63d0\u793a\u6ce8\u5165\uff08Prompt Injection\uff09\u653b\u51fb\u65e0\u6cd5\u88ab\u5b8c\u5168\u6d88\u9664\uff0c\u8fd9\u662f\u7ed3\u6784\u6027\u7f3a\u9677\u800c\u975e\u9632\u5fa1\u4e0d\u8db3\u3002\u4f5c\u8005\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e86\"\u8bed\u4e49\u5fe0\u5b9e\u63a7\u5236\"\u5c5e\u6027\uff0c\u5e76\u901a\u8fc7\u4e09\u4e2a\u6570\u5b66\u5b9a\u7406\u8bc1\u660e\u5176\u5728\u5171\u4eab\u7ba1\u9053\u4e2d\u4e0d\u53ef\u5b9e\u73b0\u3002", "why_notable": "\u9996\u6b21\u4ece\u6570\u5b66\u4e0a\u8bc1\u660e\u63d0\u793a\u6ce8\u5165\u9632\u5fa1\u7684\u6839\u672c\u5c40\u9650\u6027\uff0c\u5c06\u5b89\u5168\u95ee\u9898\u4e0a\u5347\u5230\u7406\u8bba\u5c42\u9762\uff0c\u5bf9LLM\u5b89\u5168\u67b6\u6784\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\uff0c\u53ef\u80fd\u63a8\u52a8\u7c7b\u4f3c\u5185\u5b58\u5b89\u5168\u8bed\u8a00\u90a3\u6837\u7684\u67b6\u6784\u8303\u5f0f\u8f6c\u53d8"}, {"abstract": "Large language models (LLMs) have increasingly moved from standalone text generation systems to agents that invoke external tools, access environments, and execute multi-step tasks. However, conventional function-calling benchmarks mainly evaluate task completion and API correctness, while privacy evaluation benchmarks typically focus on final responses or privacy judgments. Neither perspective captures purpose-bound information flow across an executed multi-tool trajectory. Motivated by this limitation in current agent evaluation, ToolPrivacyBench audits whether task-private atoms are routed only to authorized tools and downstream sinks, thereby evaluating both task completion and privacy over-disclosure during tool use. The benchmark contains 2,150 cases, including 1,150 fully synthetic privacy-sensitive business workflows and 1,000 cases adapted from existing multi-tool and function-calling benchmarks. Each case is represented by a policy knowledge base. After an agent executes against mock business backends, the evaluator compares recorded tool arguments and backend audit logs with this policy knowledge base. The evaluation covers nine widely used agents to characterize purpose-bound privacy over-disclosure. The results show that successful tool execution does not imply appropriate privacy disclosure: an agent may complete a task while transmitting unnecessary private information through intermediate tool calls. ToolPrivacyBench therefore formalizes a need-to-know disclosure boundary, under which each tool should receive only the information necessary for its stated purpose, and uses trajectory-level auditing to identify privacy over-disclosure in multi-tool workflows.", "arxiv_id": "2606.28061", "arxiv_url": "https://arxiv.org/abs/2606.28061", "authors": ["Shijing Hu", "Liang Liu", "Zhu Meng", "Zhicheng Zhao"], "brief": "\u63d0\u51faToolPrivacyBench\u57fa\u51c6\uff0c\u4e13\u95e8\u5ba1\u8ba1LLM\u667a\u80fd\u4f53\u5728\u591a\u5de5\u5177\u8c03\u7528\u8f68\u8ff9\u4e2d\u662f\u5426\u5c06\u79c1\u5bc6\u4fe1\u606f\u4ec5\u8def\u7531\u81f3\u6388\u6743\u5de5\u5177\uff0c\u5305\u542b2150\u4e2a\u6d4b\u8bd5\u6848\u4f8b\uff0c\u8986\u76d6\u5408\u6210\u4e1a\u52a1\u5de5\u4f5c\u6d41\u4e0e\u73b0\u6709\u57fa\u51c6\u6539\u7f16\u6848\u4f8b\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28061", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u57fa\u51c6\u542b2150\u4e2a\u6848\u4f8b\uff081150\u4e2a\u5408\u6210\u9690\u79c1\u654f\u611f\u4e1a\u52a1\u5de5\u4f5c\u6d41 + 1000\u4e2a\u6539\u7f16\u81ea\u73b0\u6709\u591a\u5de5\u5177\u57fa\u51c6\uff09\uff0c\u6bcf\u4e2a\u6848\u4f8b\u914d\u6709\u7b56\u7565\u77e5\u8bc6\u5e93", "\u901a\u8fc7\u8f68\u8ff9\u7ea7\u5ba1\u8ba1\uff08\u8bb0\u5f55\u5de5\u5177\u53c2\u6570\u4e0e\u540e\u7aef\u65e5\u5fd7\uff09\u5bf9\u6bd4\u7b56\u7565\u77e5\u8bc6\u5e93\uff0c\u8bc4\u4f309\u79cd\u4e3b\u6d41\u667a\u80fd\u4f53\u7684\u9690\u79c1\u8fc7\u5ea6\u62ab\u9732\u884c\u4e3a", "\u6838\u5fc3\u53d1\u73b0\uff1a\u4efb\u52a1\u5b8c\u6210\u6210\u529f\u4e0d\u7b49\u4e8e\u9690\u79c1\u5408\u89c4\u2014\u2014\u667a\u80fd\u4f53\u53ef\u80fd\u5728\u5b8c\u6210\u4efb\u52a1\u7684\u540c\u65f6\u901a\u8fc7\u4e2d\u95f4\u5de5\u5177\u8c03\u7528\u4f20\u9012\u4e0d\u5fc5\u8981\u7684\u79c1\u5bc6\u4fe1\u606f"], "keywords": ["\u667a\u80fd\u4f53", "\u9690\u79c1\u5b89\u5168", "\u57fa\u51c6\u6d4b\u8bd5", "\u5de5\u5177\u8c03\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28061v1", "published_at": "2026-06-26", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "ToolPrivacyBench: Benchmarking Purpose-Bound Privacy in Tool-Using LLM Agents", "tldr": "ToolPrivacyBench\uff1a\u9996\u4e2a\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5de5\u5177\u8c03\u7528\u4e2d\u9690\u79c1\u8fc7\u5ea6\u62ab\u9732\u7684\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faToolPrivacyBench\u57fa\u51c6\uff0c\u4e13\u95e8\u5ba1\u8ba1LLM\u667a\u80fd\u4f53\u5728\u591a\u5de5\u5177\u8c03\u7528\u8f68\u8ff9\u4e2d\u662f\u5426\u5c06\u79c1\u5bc6\u4fe1\u606f\u4ec5\u8def\u7531\u81f3\u6388\u6743\u5de5\u5177\uff0c\u5305\u542b2150\u4e2a\u6d4b\u8bd5\u6848\u4f8b\uff0c\u8986\u76d6\u5408\u6210\u4e1a\u52a1\u5de5\u4f5c\u6d41\u4e0e\u73b0\u6709\u57fa\u51c6\u6539\u7f16\u6848\u4f8b\u3002", "why_notable": "\u586b\u8865\u4e86\u73b0\u6709\u8bc4\u4f30\u4f53\u7cfb\u7684\u7a7a\u767d\uff1a\u4f20\u7edf\u51fd\u6570\u8c03\u7528\u57fa\u51c6\u53ea\u5173\u6ce8\u4efb\u52a1\u5b8c\u6210\uff0c\u9690\u79c1\u57fa\u51c6\u53ea\u770b\u6700\u7ec8\u54cd\u5e94\uff0c\u5747\u65e0\u6cd5\u6355\u6349\u591a\u5de5\u5177\u6267\u884c\u8f68\u8ff9\u4e2d\u7684\u76ee\u7684\u7ed1\u5b9a\u4fe1\u606f\u6d41\u95ee\u9898\uff0c\u8be5\u5de5\u4f5c\u9996\u6b21\u5f62\u5f0f\u5316\"\u6700\u5c0f\u5fc5\u8981\u77e5\u60c5\"\u62ab\u9732\u8fb9\u754c\u3002"}, {"abstract": "We propose an agentic Large Language Model (LLM) framework for active Fault-Tolerant Control (FTC) that transforms fault detection outputs into constraint-aware recovery actions grounded in plant-specific knowledge. The approach couples (i) a multi-agent workflow that decomposes operator duties into monitoring, planning, action synthesis, simulation, validation, and reprompting; (ii) a Digital Process Plant Twin (DPPT) that exposes plant data, models, and a simulation service for pre-execution testing; and (iii) a Graph Retrieval-Augmented Generation (Graph RAG) layer built on the CPSMod ontology, which organizes plant knowledge (structure, function, hybrid dynamics, control context, and fault semantics) into a graph that supports relation-aware, multi-hop retrieval for the agents. Corrective actions are generated as minimal-risk state-machine recovery paths and corresponding discrete commands or continuous setpoint adaptations, then validated deterministically against interlocks, envelopes, and dynamic feasibility before any actuation. If no acceptable plan is found within a bounded time window, control is handed to a safety fallback. The framework is evaluated in simulation on two representative benchmarks: a discrete batch Mixing Module and a Continuous Stirred-Tank Reactor (CSTR) under closed-loop PID regulation. Results with lightweight LLMs (GPT-4o-mini and GPT-4.1-mini) show that semantically grounded agents can derive valid recovery decisions within latency budgets compatible with the respective process dynamics, demonstrating a practical pathway from detection to validated corrective action across both discrete and continuous FTC tasks.", "arxiv_id": "2606.28011", "arxiv_url": "https://arxiv.org/abs/2606.28011", "authors": ["Javal Vyas", "Milapji Singh Gill", "Artan Markaj", "Felix Gehlhoff", "Mehmet Mercang\u00f6z"], "brief": "\u6784\u5efa\u4e86\u4e00\u4e2aLLM\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u6545\u969c\u68c0\u6d4b\u7ed3\u679c\u8f6c\u5316\u4e3a\u7ea6\u675f\u611f\u77e5\u7684\u6062\u590d\u63a7\u5236\u52a8\u4f5c\uff0c\u7ed3\u5408\u6570\u5b57\u5b6a\u751f\u548c\u56fe\u8c31\u589e\u5f3a\u68c0\u7d22\uff08Graph RAG\uff09\uff0c\u5728\u79bb\u6563\u6279\u5904\u7406\u548c\u8fde\u7eed\u6405\u62cc\u53cd\u5e94\u5668\u4e24\u7c7b\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u4e86\u6709\u6548\u6027\u3002", "categories": ["eess.SY", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28011", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u591a\u667a\u80fd\u4f53\u5de5\u4f5c\u6d41\u5c06\u64cd\u4f5c\u5458\u804c\u8d23\u5206\u89e3\u4e3a\u76d1\u63a7\u3001\u89c4\u5212\u3001\u52a8\u4f5c\u5408\u6210\u3001\u4eff\u771f\u3001\u9a8c\u8bc1\u548c\u91cd\u63d0\u793a\u516d\u4e2a\u6a21\u5757", "\u5f15\u5165\u57fa\u4e8eCPSMod\u672c\u4f53\u7684Graph RAG\u5c42\uff0c\u652f\u6301\u5173\u7cfb\u611f\u77e5\u7684\u591a\u8df3\u68c0\u7d22\uff0c\u63d0\u4f9b\u5de5\u5382\u7ed3\u6784\u3001\u529f\u80fd\u3001\u6df7\u5408\u52a8\u529b\u5b66\u7b49\u77e5\u8bc6", "\u6062\u590d\u52a8\u4f5c\u4ee5\u6700\u5c0f\u98ce\u9669\u72b6\u6001\u673a\u8def\u5f84\u751f\u6210\uff0c\u5e76\u5728\u6267\u884c\u524d\u901a\u8fc7\u8054\u9501\u3001\u5305\u7edc\u548c\u52a8\u6001\u53ef\u884c\u6027\u786e\u5b9a\u6027\u9a8c\u8bc1\uff1b\u65e0\u53ef\u884c\u65b9\u6848\u65f6\u81ea\u52a8\u5207\u6362\u5b89\u5168\u56de\u9000"], "keywords": ["\u667a\u80fd\u4f53", "\u5bb9\u9519\u63a7\u5236", "\u77e5\u8bc6\u56fe\u8c31", "\u6570\u5b57\u5b6a\u751f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28011v1", "published_at": "2026-06-26", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "From Detection to Action: Using LLM Agents for Fault-Tolerant Control", "tldr": "\u63d0\u51fa\u57fa\u4e8eLLM\u591a\u667a\u80fd\u4f53\u6846\u67b6\u7684\u4e3b\u52a8\u5bb9\u9519\u63a7\u5236\u7cfb\u7edf\uff0c\u5c06\u6545\u969c\u68c0\u6d4b\u8f93\u51fa\u8f6c\u5316\u4e3a\u5b89\u5168\u53ef\u9a8c\u8bc1\u7684\u6062\u590d\u52a8\u4f5c", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u4e00\u4e2aLLM\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u6545\u969c\u68c0\u6d4b\u7ed3\u679c\u8f6c\u5316\u4e3a\u7ea6\u675f\u611f\u77e5\u7684\u6062\u590d\u63a7\u5236\u52a8\u4f5c\uff0c\u7ed3\u5408\u6570\u5b57\u5b6a\u751f\u548c\u56fe\u8c31\u589e\u5f3a\u68c0\u7d22\uff08Graph RAG\uff09\uff0c\u5728\u79bb\u6563\u6279\u5904\u7406\u548c\u8fde\u7eed\u6405\u62cc\u53cd\u5e94\u5668\u4e24\u7c7b\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u4e86\u6709\u6548\u6027\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u591a\u667a\u80fd\u4f53\u4e0e\u6570\u5b57\u8fc7\u7a0b\u5b6a\u751f\u3001\u56fe\u8c31RAG\u7ed3\u5408\u7528\u4e8e\u5de5\u4e1a\u5bb9\u9519\u63a7\u5236\uff0c\u5b9e\u73b0\u4ece\u6545\u969c\u68c0\u6d4b\u5230\u9a8c\u8bc1\u6062\u590d\u52a8\u4f5c\u7684\u5b8c\u6574\u95ed\u73af\uff0c\u4e14\u4f7f\u7528\u8f7b\u91cf\u7ea7\u6a21\u578b\uff08GPT-4o-mini\uff09\u5373\u53ef\u6ee1\u8db3\u5b9e\u65f6\u5ef6\u8fdf\u8981\u6c42\uff0c\u5177\u6709\u8f83\u5f3a\u5de5\u7a0b\u843d\u5730\u4ef7\u503c\u3002"}, {"abstract": "As large language models are increasingly deployed in real-world systems, safety failures can still lead to harmful outputs and dangerous misuse. We argue that the essence of safety is adversarial: many failures arise not from natural inputs alone, but from strategic attempts to evade model policies and safeguards. However, existing general-purpose model development largely overlook this adversarial nature, and often remain insufficient for realistic safety scenarios involving planning, tool use, and multi-step reasoning, causing measured safety performance to overestimate real deployment robustness. To address this gap, we present Yuvion LLM, a large language model built for adversarially robust content safety and broader AI safety. Yuvion LLM treats adversarial robustness and agentic capability as first-class objectives. Its pipeline combines adversarially aware data construction, knowledge-enhanced continued pretraining, and policy-grounded multi-task safety post-training, including risk-aware supervised fine-tuning and reinforcement learning-based policy optimization, together with safety-aware agentic reinforcement learning for tool use and multi-step reasoning in complex safety scenarios. We further introduce the Yuvion LLM RiskEval (YLRE), a collection of 93 benchmarks across four evaluation categories, covering diverse open and internal evaluations with a focus on safety, adversarial robustness, and real-world capability requirements. Across these evaluations, Yuvion LLM demonstrates clear advantages on safety-focused benchmarks and particularly strong robustness under adversarial conditions, while maintaining solid overall capability. Notably, Yuvion-8B outperforms most state-of-the-art baselines, including substantially larger models such as GPT-5.4 and Qwen3-MAX, on several safety tasks.", "arxiv_id": "2606.27632", "arxiv_url": "https://arxiv.org/abs/2606.27632", "authors": ["Ting Ma", "Xiufeng Huang", "Benlei Cui", "Xiaowen Xu", "Shikai Qiu", "Ruijie Jian", "Hongxing Li", "Guanghui Wang", "Longtao Huang", "Haiwen Hong", "Haolei Xu", "Wenjing Jiang", "Ziwen Xu", "Zhaoyu Fan", "Shaoxuan He", "Chuxi Xiao", "Yujian Li", "Xinyue Chen", "Chunyang Chai", "Wenxuan Liu", "Ziheng Wang", "Dongjie Zhang", "Yangfan Zhou", "Libin Dong", "Yupeng Cao", "Xiaoqian Xia", "Jing Wang", "Zhe Jiang", "Zhenan Ye", "Guang Yang", "Bin Liu", "Wei Peng", "Ziqiang Zhu", "Meihui Lian", "Kaiwen Lv Kacuila", "Haidong Ding", "Bingyu Zhu", "Yan Wang", "Hai Zhao", "Xuan Jin", "Wei Zhao", "Pengfei Sun", "Wei Wang", "Huiming Zhang", "Bin Li", "Hui Xue"], "brief": "\u63d0\u51faYuvion LLM\uff0c\u4e00\u4e2a\u5c06\u5bf9\u6297\u9c81\u68d2\u6027\u548c\u667a\u80fd\u4f53\u80fd\u529b\u4f5c\u4e3a\u6838\u5fc3\u76ee\u6807\u7684\u5b89\u5168\u5bfc\u5411\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u5bf9\u6297\u611f\u77e5\u6570\u636e\u6784\u5efa\u3001\u77e5\u8bc6\u589e\u5f3a\u9884\u8bad\u7ec3\u3001\u591a\u4efb\u52a1\u5b89\u5168\u540e\u8bad\u7ec3\u53ca\u5b89\u5168\u611f\u77e5\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u6784\u5efa\u5b8c\u6574\u8bad\u7ec3\u6d41\u6c34\u7ebf\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27632", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u5b89\u5168\u95ee\u9898\u672c\u8d28\u5b9a\u4e49\u4e3a\u5bf9\u6297\u6027\u95ee\u9898\uff0c\u9488\u5bf9\u7b56\u7565\u6027\u89c4\u907f\u653b\u51fb\u8fdb\u884c\u4e13\u9879\u4f18\u5316", "\u8bad\u7ec3\u6d41\u6c34\u7ebf\u878d\u5408\u98ce\u9669\u611f\u77e5\u76d1\u7763\u5fae\u8c03\u3001\u57fa\u4e8e\u5f3a\u5316\u5b66\u4e60\u7684\u7b56\u7565\u4f18\u5316\u53ca\u5b89\u5168\u611f\u77e5\u667a\u80fd\u4f53RL\uff08\u652f\u6301\u5de5\u5177\u4f7f\u7528\u4e0e\u591a\u6b65\u63a8\u7406\uff09", "\u6784\u5efaYLRE\u8bc4\u6d4b\u96c6\uff0893\u4e2a\u57fa\u51c6\uff0c4\u7c7b\u8bc4\u4f30\u7ef4\u5ea6\uff09\uff0cYuvion-8B\u5728\u591a\u9879\u5b89\u5168\u4efb\u52a1\u4e0a\u8d85\u8d8aGPT-5.4\u548cQwen3-MAX\u7b49\u66f4\u5927\u89c4\u6a21\u6a21\u578b"], "keywords": ["AI\u5b89\u5168", "\u5bf9\u6297\u9c81\u68d2\u6027", "\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27632v1", "published_at": "2026-06-26", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Yuvion LLM: An Adversarially-Aware Large Language Model for Content And AI Safety", "tldr": "Yuvion LLM\uff1a\u4e13\u4e3a\u5bf9\u6297\u9c81\u68d2\u6027\u5185\u5bb9\u5b89\u5168\u4e0eAI\u5b89\u5168\u8bbe\u8ba1\u7684\u5927\u8bed\u8a00\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faYuvion LLM\uff0c\u4e00\u4e2a\u5c06\u5bf9\u6297\u9c81\u68d2\u6027\u548c\u667a\u80fd\u4f53\u80fd\u529b\u4f5c\u4e3a\u6838\u5fc3\u76ee\u6807\u7684\u5b89\u5168\u5bfc\u5411\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u5bf9\u6297\u611f\u77e5\u6570\u636e\u6784\u5efa\u3001\u77e5\u8bc6\u589e\u5f3a\u9884\u8bad\u7ec3\u3001\u591a\u4efb\u52a1\u5b89\u5168\u540e\u8bad\u7ec3\u53ca\u5b89\u5168\u611f\u77e5\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u6784\u5efa\u5b8c\u6574\u8bad\u7ec3\u6d41\u6c34\u7ebf\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u5c06\u5bf9\u6297\u9c81\u68d2\u6027\u4e0e\u667a\u80fd\u4f53\u5b89\u5168\u80fd\u529b\u7ed3\u5408\u7684LLM\uff0c8B\u5c0f\u6a21\u578b\u5728\u5b89\u5168\u4efb\u52a1\u4e0a\u51fb\u8d25\u9876\u7ea7\u5927\u6a21\u578b\uff0c\u5bf9AI\u5b89\u5168\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning (RL) post-training improves the reward alignment of flow-based generators, but often degrades perceptual quality in ways that are not captured by the reward proxy. We identify a simple structural signature of this drift: across three post-training methods (NFT, AWM, DPO), RL fine-tuning inflates the per-step velocity norm $\\|v_\u03b8\\|$ by $5\\%$ to $15\\%$ relative to the reference. A form of norm inflation has been studied in classifier-free guidance (CFG), where rescaling the velocity back to a reference norm at inference time can mitigate the resulting artifacts. However, this inference-time correction does not transfer cleanly to RL: rescaling $v_\u03b8$ to match $\\|v_{\\text{ref}}\\|$ at inference time neither improves reward nor fixes the quality degradation, because the inflation is co-adapted into the model weights. Furthermore, an adjoint sensitivity analysis shows that velocity magnitude rescaling carries no coherent first-order reward signal at the batch level, indicating that suppressing norm inflation is unlikely to remove a consistently reward-carrying component. Since inference-time renormalization fails while norm suppression carries no reward cost, training-time intervention is the appropriate strategy. Together, these findings motivate \\methodname, a hinge penalty that activates only when $\\|v_\u03b8\\|$ exceeds $\\|v_{\\text{ref}}\\|$ and composes additively with any velocity-local base loss. Across two base models, three post-training methods, and two reward proxies, \\methodname consistently improves MLLM-judged image quality and forensic realism while preserving reward, with gains that amplify under few-step inference and are not explained by early stopping.", "arxiv_id": "2606.27771", "arxiv_url": "https://arxiv.org/abs/2606.27771", "authors": ["Tianlin Pan", "Lianyu Pang", "Cheng Da", "Huan Yang", "Changqian Yu", "Kun Gai", "Wenhan Luo"], "brief": "\u63d0\u51faNormGuard\u65b9\u6cd5\uff0c\u9488\u5bf9\u6d41\u5339\u914d\u751f\u6210\u6a21\u578bRL\u540e\u8bad\u7ec3\u4e2d\u51fa\u73b0\u7684\u901f\u5ea6\u8303\u6570\u81a8\u80c0\u95ee\u9898\uff0c\u8bbe\u8ba1\u4e00\u79cd\u4ec5\u5728\u8303\u6570\u8d85\u8fc7\u53c2\u8003\u503c\u65f6\u6fc0\u6d3b\u7684\u94f0\u94fe\u60e9\u7f5a\u9879\uff0c\u5728\u4e0d\u635f\u5931\u5956\u52b1\u7684\u524d\u63d0\u4e0b\u6539\u5584\u611f\u77e5\u8d28\u91cf\u3002", "categories": ["cs.LG", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27771", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u53d1\u73b0RL\u5fae\u8c03\u4f1a\u5bfc\u81f4\u6bcf\u6b65\u901f\u5ea6\u8303\u6570\u76f8\u5bf9\u53c2\u8003\u6a21\u578b\u81a8\u80c05%~15%\uff0c\u662f\u611f\u77e5\u8d28\u91cf\u4e0b\u964d\u7684\u7ed3\u6784\u6027\u4fe1\u53f7", "\u901a\u8fc7\u4f34\u968f\u7075\u654f\u5ea6\u5206\u6790\u8bc1\u660e\u63a8\u7406\u65f6\u901f\u5ea6\u91cd\u7f29\u653e\u4e0d\u643a\u5e26\u4e00\u81f4\u7684\u4e00\u9636\u5956\u52b1\u4fe1\u53f7\uff0c\u56e0\u6b64\u8bad\u7ec3\u65f6\u5e72\u9884\u624d\u662f\u6b63\u786e\u7b56\u7565", "NormGuard\u4f5c\u4e3a\u53ef\u52a0\u6027\u94f0\u94fe\u60e9\u7f5a\u4e0e\u4efb\u610f\u901f\u5ea6\u5c40\u90e8\u57fa\u7840\u635f\u5931\u7ec4\u5408\uff0c\u57282\u4e2a\u57fa\u7840\u6a21\u578b\u30013\u79cd\u540e\u8bad\u7ec3\u65b9\u6cd5\u30012\u79cd\u5956\u52b1\u4ee3\u7406\u4e0a\u5747\u63d0\u5347MLLM\u8bc4\u5224\u7684\u56fe\u50cf\u8d28\u91cf\u4e0e\u771f\u5b9e\u611f"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u6269\u6563\u6a21\u578b", "\u751f\u6210\u6a21\u578b", "\u5956\u52b1\u5bf9\u9f50"], "num_comments": 1, "on_hf": true, "organization": "HKUST", "pdf_url": "https://arxiv.org/pdf/2606.27771v1", "published_at": "2026-06-26", "score": 0.205, "selected_reasons": ["\u77e5\u540d\u673a\u6784: HKU/HKUST", "HF trending (0\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.27771.png", "title": "NormGuard: Reward-Preserving Norm Constraints in Flow-Matching Reinforcement Learning", "tldr": "NormGuard\u901a\u8fc7\u8bad\u7ec3\u65f6\u94f0\u94fe\u60e9\u7f5a\u7ea6\u675f\u901f\u5ea6\u8303\u6570\uff0c\u5728\u4fdd\u6301\u5956\u52b1\u7684\u540c\u65f6\u63d0\u5347\u6d41\u5339\u914dRL\u540e\u8bad\u7ec3\u7684\u56fe\u50cf\u8d28\u91cf", "upvotes": 0, "what_it_is": "\u63d0\u51faNormGuard\u65b9\u6cd5\uff0c\u9488\u5bf9\u6d41\u5339\u914d\u751f\u6210\u6a21\u578bRL\u540e\u8bad\u7ec3\u4e2d\u51fa\u73b0\u7684\u901f\u5ea6\u8303\u6570\u81a8\u80c0\u95ee\u9898\uff0c\u8bbe\u8ba1\u4e00\u79cd\u4ec5\u5728\u8303\u6570\u8d85\u8fc7\u53c2\u8003\u503c\u65f6\u6fc0\u6d3b\u7684\u94f0\u94fe\u60e9\u7f5a\u9879\uff0c\u5728\u4e0d\u635f\u5931\u5956\u52b1\u7684\u524d\u63d0\u4e0b\u6539\u5584\u611f\u77e5\u8d28\u91cf\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u5206\u6790\u6d41\u5339\u914dRL\u540e\u8bad\u7ec3\u4e2d\u8303\u6570\u81a8\u80c0\u73b0\u8c61\uff0c\u63d0\u51fa\u8f7b\u91cf\u7ea7\u5373\u63d2\u5373\u7528\u7684\u8bad\u7ec3\u65f6\u7ea6\u675f\u65b9\u6848\uff0c\u5728\u5c11\u6b65\u63a8\u7406\u573a\u666f\u4e0b\u589e\u76ca\u66f4\u663e\u8457\uff0c\u5bf9\u751f\u6210\u6a21\u578b\u5bf9\u9f50\u9886\u57df\u5177\u6709\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Current multimodal reflection mechanisms for long video understanding predominantly rely on closed-loop self-reflection within internal parameters. Lacking objective external evidence, models are frequently trapped in blind confidence and often fail to correct errors. Furthermore, applying reinforcement learning to multi-stage reflection pipelines introduces severe policy coupling, which is exacerbated by a critical scarcity of dedicated training data. To address these limitations, this work proposes Reflect-R1, the first Evidence-Driven self-correction framework for long video understanding. The framework constructs a three-stage pipeline consisting of intuition, verification, and arbitration. By dynamically retrieving objective visual evidence to verify initial intuitions and autonomously executing multiple temporal searches to resolve conflicts, it completely breaks the hallucination loop. To overcome policy coupling, we design a stage-decoupled reinforcement learning algorithm named SD-GRPO that independently computes advantage functions across different reasoning stages. Concurrently, we construct a dataset of 120K samples to bridge the training data gap. Extensive experiments on benchmarks such as VideoMME and LongVideoBench demonstrate that Reflect-R1 achieves state-of-the-art performance. Our method significantly improves the genuine rectification rate and enables authentic self-correction strictly grounded in objective evidence.", "arxiv_id": "2606.27922", "arxiv_url": "https://arxiv.org/abs/2606.27922", "authors": ["Shuimu Chen", "Yuteng Chen", "Yuanshen Guan", "Zebang Cheng", "Zeyu Zhang", "Shengqian Qin", "Bin Xia", "Jiaran Li", "Wenming Yang", "Fei Ma"], "brief": "Reflect-R1\u662f\u9996\u4e2a\u9762\u5411\u957f\u89c6\u9891\u7406\u89e3\u7684\u8bc1\u636e\u9a71\u52a8\u81ea\u6821\u6b63\u6846\u67b6\uff0c\u901a\u8fc7\u76f4\u89c9\u2192\u9a8c\u8bc1\u2192\u4ef2\u88c1\u4e09\u9636\u6bb5\u6d41\u7a0b\uff0c\u52a8\u6001\u68c0\u7d22\u5ba2\u89c2\u89c6\u89c9\u8bc1\u636e\u6765\u7ea0\u6b63\u6a21\u578b\u521d\u59cb\u5224\u65ad\uff0c\u907f\u514d\u95ed\u73af\u81ea\u53cd\u601d\u5bfc\u81f4\u7684\u76f2\u76ee\u81ea\u4fe1\u95ee\u9898\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27922", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4e09\u9636\u6bb5\u6d41\u6c34\u7ebf\uff1a\u76f4\u89c9\u751f\u6210\u3001\u89c6\u89c9\u8bc1\u636e\u52a8\u6001\u68c0\u7d22\u9a8c\u8bc1\u3001\u591a\u6b21\u65f6\u5e8f\u641c\u7d22\u51b2\u7a81\u4ef2\u88c1\uff0c\u5f7b\u5e95\u6253\u7834\u5e7b\u89c9\u5faa\u73af", "\u8bbe\u8ba1\u9636\u6bb5\u89e3\u8026\u5f3a\u5316\u5b66\u4e60\u7b97\u6cd5SD-GRPO\uff0c\u5bf9\u4e0d\u540c\u63a8\u7406\u9636\u6bb5\u72ec\u7acb\u8ba1\u7b97\u4f18\u52bf\u51fd\u6570\uff0c\u89e3\u51b3\u591a\u9636\u6bb5\u7b56\u7565\u8026\u5408\u95ee\u9898", "\u6784\u5efa12\u4e07\u6837\u672c\u4e13\u7528\u8bad\u7ec3\u6570\u636e\u96c6\uff0c\u5728VideoMME\u548cLongVideoBench\u4e0a\u8fbe\u5230SOTA\uff0c\u663e\u8457\u63d0\u5347\u771f\u5b9e\u7ea0\u9519\u7387"], "keywords": ["\u591a\u6a21\u6001", "\u957f\u89c6\u9891\u7406\u89e3", "\u5f3a\u5316\u5b66\u4e60", "\u81ea\u6821\u6b63"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27922v1", "published_at": "2026-06-26", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Reflect-R1: Evidence-Driven Reflection for Self-Correction in Long Video Understanding", "tldr": "\u63d0\u51fa\u8bc1\u636e\u9a71\u52a8\u7684\u957f\u89c6\u9891\u7406\u89e3\u81ea\u6821\u6b63\u6846\u67b6Reflect-R1\uff0c\u6253\u7834\u5e7b\u89c9\u5faa\u73af", "upvotes": 0, "what_it_is": "Reflect-R1\u662f\u9996\u4e2a\u9762\u5411\u957f\u89c6\u9891\u7406\u89e3\u7684\u8bc1\u636e\u9a71\u52a8\u81ea\u6821\u6b63\u6846\u67b6\uff0c\u901a\u8fc7\u76f4\u89c9\u2192\u9a8c\u8bc1\u2192\u4ef2\u88c1\u4e09\u9636\u6bb5\u6d41\u7a0b\uff0c\u52a8\u6001\u68c0\u7d22\u5ba2\u89c2\u89c6\u89c9\u8bc1\u636e\u6765\u7ea0\u6b63\u6a21\u578b\u521d\u59cb\u5224\u65ad\uff0c\u907f\u514d\u95ed\u73af\u81ea\u53cd\u601d\u5bfc\u81f4\u7684\u76f2\u76ee\u81ea\u4fe1\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c06\u5916\u90e8\u5ba2\u89c2\u89c6\u89c9\u8bc1\u636e\u5f15\u5165\u591a\u6a21\u6001\u81ea\u6821\u6b63\u673a\u5236\uff0c\u5e76\u9488\u5bf9\u591a\u9636\u6bb5RL\u8bad\u7ec3\u7684\u7b56\u7565\u8026\u5408\u95ee\u9898\u63d0\u51fa\u89e3\u8026\u65b9\u6848\uff0c\u5bf9\u957f\u89c6\u9891\u7406\u89e3\u4e2d\u7684\u5e7b\u89c9\u95ee\u9898\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Large Language Models (LLMs) inference is typically deployed under a static resource assumption, where models execute a fixed computational graph regardless of the runtime environment. However, real-world cloud infrastructure is inherently dynamic, characterized by fluctuating availability (e.g., spot instance preemption) and tiered Quality-of-Service requirements. In such volatile settings, static models are inflexible: they either crash under resource constraints or waste compute on redundant operations. To bridge this gap, we propose Learning to Allocate (L2A), an end-to-end framework for resource-adaptive inference. Unlike prior methods that condition only on input difficulty, we formulate inference as a constrained allocation problem conditioned on both the input and the runtime resource budget itself. We introduce lightweight, budget-conditioned and input-aware gating networks integrated into the LLM. These gates are trained via a unified objective that jointly optimizes task performance, logical consistency, and resource costs along three axes matching how real-world dynamics manifest: layer skipping for memory and depth pressure, head pruning for throughput contention, and reasoning-token reduction for latency tightening. This lets the model learn a budget-aware policy beyond input difficulty alone: it adaptively configures its computational footprint with respect to real-time resource dynamics, maximizing reasoning depth when resources permit while enforcing strict frugality when budgets tighten. A single L2A model traces the entire compute-accuracy Pareto frontier on Llama-3-8B and Qwen-3-4B: at up to 34% realized layer sparsity, it stays within 0.6% of the dense baseline on GSM8K, with the same gap holding zero-shot on out-of-distribution tasks, while every static or heuristic baseline requires a separately tuned model and still drops by 5-10% at comparable inference time.", "arxiv_id": "2606.27743", "arxiv_url": "https://arxiv.org/abs/2606.27743", "authors": ["Yuhang Chen", "Jinhao Duan", "Ruichen Zhang", "Mingfu Liang", "Xiaohan Wei", "Yunchen Pu", "Fei Tian", "Chonglin Sun", "Parish Aggarwal", "Frank Shyu", "Luke Simon", "Sandeep Pandey", "Tianlong Chen", "Xi Liu"], "brief": "\u63d0\u51faLearning to Allocate\uff08L2A\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7\u9884\u7b97\u611f\u77e5\u95e8\u63a7\u7f51\u7edc\uff0c\u4f7fLLM\u80fd\u540c\u65f6\u6839\u636e\u8f93\u5165\u96be\u5ea6\u548c\u8fd0\u884c\u65f6\u8d44\u6e90\u9884\u7b97\u52a8\u6001\u914d\u7f6e\u8ba1\u7b97\u56fe\uff0c\u5b9e\u73b0\u7aef\u5230\u7aef\u7684\u81ea\u9002\u5e94\u7a00\u758f\u63a8\u7406\u3002", "categories": ["cs.IR", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27743", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4e09\u8f74\u52a8\u6001\u7a00\u758f\uff1a\u5c42\u8df3\u8fc7\uff08\u5e94\u5bf9\u5185\u5b58\u538b\u529b\uff09\u3001\u6ce8\u610f\u529b\u5934\u526a\u679d\uff08\u5e94\u5bf9\u541e\u5410\u74f6\u9888\uff09\u3001\u63a8\u7406token\u7f29\u51cf\uff08\u5e94\u5bf9\u5ef6\u8fdf\u7ea6\u675f\uff09\uff0c\u7edf\u4e00\u76ee\u6807\u51fd\u6570\u8054\u5408\u4f18\u5316", "\u5355\u4e00\u6a21\u578b\u8986\u76d6\u5b8c\u6574\u8ba1\u7b97-\u7cbe\u5ea6Pareto\u524d\u6cbf\uff1a\u5728Llama-3-8B\u4e0a34%\u5c42\u7a00\u758f\u5ea6\u4e0b\uff0cGSM8K\u7cbe\u5ea6\u4ec5\u4e0b\u964d0.6%\uff0c\u4e14\u96f6\u6837\u672c\u6cdb\u5316\u5230\u5206\u5e03\u5916\u4efb\u52a1\u540c\u6837\u4fdd\u6301\u8be5\u5dee\u8ddd", "\u5bf9\u6bd4\u57fa\u7ebf\u4f18\u52bf\u663e\u8457\uff1a\u6240\u6709\u9759\u6001\u6216\u542f\u53d1\u5f0f\u57fa\u7ebf\u9700\u4e3a\u6bcf\u4e2a\u8d44\u6e90\u573a\u666f\u5355\u72ec\u8c03\u4f18\u6a21\u578b\uff0c\u4e14\u5728\u76f8\u8fd1\u63a8\u7406\u65f6\u95f4\u4e0b\u7cbe\u5ea6\u4e0b\u964d5-10%"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u52a8\u6001\u7a00\u758f", "\u63a8\u7406\u52a0\u901f", "\u8d44\u6e90\u81ea\u9002\u5e94"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27743v1", "published_at": "2026-06-26", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "End-to-End Dynamic Sparsity for Resource-Adaptive LLM Inference", "tldr": "L2A\u6846\u67b6\u8ba9\u5355\u4e2aLLM\u6a21\u578b\u6839\u636e\u8fd0\u884c\u65f6\u8d44\u6e90\u9884\u7b97\u52a8\u6001\u8c03\u6574\u8ba1\u7b97\u91cf\uff0c\u65e0\u9700\u4e3a\u4e0d\u540c\u8d44\u6e90\u573a\u666f\u8bad\u7ec3\u591a\u4e2a\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faLearning to Allocate\uff08L2A\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7\u9884\u7b97\u611f\u77e5\u95e8\u63a7\u7f51\u7edc\uff0c\u4f7fLLM\u80fd\u540c\u65f6\u6839\u636e\u8f93\u5165\u96be\u5ea6\u548c\u8fd0\u884c\u65f6\u8d44\u6e90\u9884\u7b97\u52a8\u6001\u914d\u7f6e\u8ba1\u7b97\u56fe\uff0c\u5b9e\u73b0\u7aef\u5230\u7aef\u7684\u81ea\u9002\u5e94\u7a00\u758f\u63a8\u7406\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u63a8\u7406\u5efa\u6a21\u4e3a\u540c\u65f6\u6761\u4ef6\u4e8e\u8f93\u5165\u548c\u8fd0\u884c\u65f6\u8d44\u6e90\u9884\u7b97\u7684\u7ea6\u675f\u5206\u914d\u95ee\u9898\uff0c\u4e00\u4e2a\u6a21\u578b\u5373\u53ef\u9002\u914d\u4e91\u7aef\u52a8\u6001\u8d44\u6e90\u73af\u5883\uff08\u5982Spot\u5b9e\u4f8b\u62a2\u5360\uff09\uff0c\u5177\u6709\u91cd\u8981\u7684\u5de5\u7a0b\u5b9e\u7528\u4ef7\u503c\u548c\u90e8\u7f72\u7ecf\u6d4e\u6027\u3002"}, {"abstract": "Discrete diffusion language models (dLLMs) recover masked tokens in parallel, offering significant speedups over autoregressive (AR) generation. However, such promising frameworks face a fundamental architectural design dilemma: \\ding{182} Adopting bidirectional attention achieves strong generation quality by allowing each position to access the full context, but is inherently incompatible with KV caching, limiting inference throughput in batch-serving scenarios; \\ding{183} Conversely, causal attention enables efficient cached inference but loses all right-side context, substantially degrading generation quality. This paper introduces Bifocal dLLMs, a new paradigm that resolves this dilemma through \\emph{asymmetric bidirectional context}. Analogous to bifocal lenses, we instantiate the paradigm as \\textbf{R2LM} (Right-to-Left Mamba), which combines two complementary mechanisms: $a$) standard causal attention providing precise left-context with full KV cache compatibility, while $b$) a lightweight reverse Mamba SSM sidecar supplying compressed right-side context without breaking cacheability. Comprehensive experiments on continued pretraining of Qwen3-1.7B with 60B tokens demonstrate that R2LM achieves $2.4\\times$ to $12.9\\times$ higher throughput than bidirectional dLLMs and $1.9\\times$ to $2.9\\times$ speedup over AR baselines in batch serving through parallel decoding with KV caching, while exceeding the causal baseline on most benchmarks and surpassing the bidirectional dLLM on average.", "arxiv_id": "2606.27732", "arxiv_url": "https://arxiv.org/abs/2606.27732", "authors": ["Yuhang Chen", "Xianfeng Wu", "Jinhao Duan", "Mingfu Liang", "Xiaohan Wei", "Yunchen Pu", "Fei Tian", "Chonglin Sun", "Parish Aggarwal", "Frank Shyu", "Luke Simon", "Sandeep Pandey", "Xi Liu", "Tianlong Chen"], "brief": "\u63d0\u51faBifocal dLLMs\u8303\u5f0f\u53ca\u5176\u5b9e\u4f8bR2LM\uff0c\u7ed3\u5408\u56e0\u679c\u6ce8\u610f\u529b\uff08\u652f\u6301KV\u7f13\u5b58\uff09\u4e0e\u8f7b\u91cf\u7ea7\u53cd\u5411Mamba SSM\uff08\u63d0\u4f9b\u53f3\u4fa7\u4e0a\u4e0b\u6587\u538b\u7f29\uff09\uff0c\u89e3\u51b3\u79bb\u6563\u6269\u6563\u8bed\u8a00\u6a21\u578b\u5728\u53cc\u5411\u6ce8\u610f\u529b\u4e0e\u56e0\u679c\u6ce8\u610f\u529b\u4e4b\u95f4\u7684\u67b6\u6784\u4e24\u96be\u56f0\u5883\u3002", "categories": ["cs.IR", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27732", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["R2LM\u5728\u6279\u91cf\u670d\u52a1\u573a\u666f\u4e0b\u541e\u5410\u91cf\u6bd4\u53cc\u5411dLLM\u9ad82.4\u00d7\u81f312.9\u00d7\uff0c\u6bd4\u81ea\u56de\u5f52\u57fa\u7ebf\u5feb1.9\u00d7\u81f32.9\u00d7", "\u57fa\u4e8eQwen3-1.7B\u5728600\u4ebftoken\u4e0a\u6301\u7eed\u9884\u8bad\u7ec3\u9a8c\u8bc1\uff0c\u5e73\u5747\u6027\u80fd\u8d85\u8d8a\u53cc\u5411dLLM\u57fa\u7ebf", "\u6838\u5fc3\u521b\u65b0\uff1a\u56e0\u679c\u6ce8\u610f\u529b\u8d1f\u8d23\u7cbe\u786e\u5de6\u4fa7\u4e0a\u4e0b\u6587\uff08\u517c\u5bb9KV\u7f13\u5b58\uff09\uff0c\u53cd\u5411Mamba SSM\u4f5c\u4e3a\u8f7b\u91cf\u65c1\u8def\u63d0\u4f9b\u538b\u7f29\u53f3\u4fa7\u4e0a\u4e0b\u6587"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u52a0\u901f", "\u72b6\u6001\u7a7a\u95f4\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27732v1", "published_at": "2026-06-26", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Bifocal Diffusion Language Models: Asymmetric Bidirectional Context for Parallel Generation", "tldr": "\u53cc\u7126\u6269\u6563\u8bed\u8a00\u6a21\u578bR2LM\uff0c\u901a\u8fc7\u975e\u5bf9\u79f0\u53cc\u5411\u4e0a\u4e0b\u6587\u517c\u987e\u751f\u6210\u8d28\u91cf\u4e0e\u63a8\u7406\u541e\u5410\u91cf", "upvotes": 0, "what_it_is": "\u63d0\u51faBifocal dLLMs\u8303\u5f0f\u53ca\u5176\u5b9e\u4f8bR2LM\uff0c\u7ed3\u5408\u56e0\u679c\u6ce8\u610f\u529b\uff08\u652f\u6301KV\u7f13\u5b58\uff09\u4e0e\u8f7b\u91cf\u7ea7\u53cd\u5411Mamba SSM\uff08\u63d0\u4f9b\u53f3\u4fa7\u4e0a\u4e0b\u6587\u538b\u7f29\uff09\uff0c\u89e3\u51b3\u79bb\u6563\u6269\u6563\u8bed\u8a00\u6a21\u578b\u5728\u53cc\u5411\u6ce8\u610f\u529b\u4e0e\u56e0\u679c\u6ce8\u610f\u529b\u4e4b\u95f4\u7684\u67b6\u6784\u4e24\u96be\u56f0\u5883\u3002", "why_notable": "\u9996\u6b21\u901a\u8fc7\u975e\u5bf9\u79f0\u53cc\u5411\u67b6\u6784\u540c\u65f6\u89e3\u51b3\u79bb\u6563\u6269\u6563LM\u7684\u751f\u6210\u8d28\u91cf\u4e0e\u63a8\u7406\u6548\u7387\u77db\u76fe\uff0c\u5728\u5b9e\u9645\u6279\u91cf\u670d\u52a1\u573a\u666f\u4e2d\u5b9e\u73b0\u663e\u8457\u52a0\u901f\uff0c\u5bf9\u5927\u89c4\u6a21\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Edge devices increasingly invoke large language models (LLMs) through API services for context aware edge intelligence, while edge generated data may be collected to improve LLMs and may introduce sensitive, copyrighted, harmful, or outdated information into model behavior. Machine unlearning offers a practical way to remove the influence of undesired data without retraining LLMs. However, existing methods still face two gaps. The first is API only black box access, where target model parameters and internal logits are unavailable. The second is how to preserve retained utility when unlearning target data and retained data share highly similar prompt structures or semantic patterns. To address these challenges, we propose Controlled Behavioral Divergence (CBD), an API only black box unlearning framework. CBD uses two auxiliary models to create controlled behavioral divergence between retained inputs and unlearning target inputs, converts this divergence into an unlearning relevance score, and routes unlearning related prompts away from the target LLM. To improve discrimination accuracy under high similarity between target and retained data, CBD constructs a gradient statistics based discriminative basis by estimating empirical Fisher matrices and solving a regularized generalized eigenvalue problem, guiding the unlearning signal toward target specific information rather than shared prompt structures. Compared with eleven white box and gray box unlearning baselines, CBD achieves a better unlearning utility trade off and its performance varies little across settings. On ToFU forget10, CBD approaches the retrained reference on the forget set while raising model utility to 74.90, about 15% above the second best baseline. On WMDP, it lowers hazardous knowledge accuracy to 25.68, near random guessing, while preserving MMLU accuracy of 52.67. Code is at https://github.com/DGL-codes/CBD.", "arxiv_id": "2606.27683", "arxiv_url": "https://arxiv.org/abs/2606.27683", "authors": ["Zhiqiang Xie", "Yijing Lin", "Zhipeng Gao", "Dong In Kim"], "brief": "\u63d0\u51faCBD\uff08\u53d7\u63a7\u884c\u4e3a\u6563\u5ea6\uff09\u6846\u67b6\uff0c\u5728\u4ec5\u6709API\u8bbf\u95ee\u6743\u9650\u7684\u9ed1\u76d2\u6761\u4ef6\u4e0b\u5b9e\u73b0LLM\u673a\u5668\u9057\u5fd8\uff0c\u5229\u7528\u4e24\u4e2a\u8f85\u52a9\u6a21\u578b\u6784\u5efa\u884c\u4e3a\u6563\u5ea6\u5e76\u901a\u8fc7\u68af\u5ea6\u7edf\u8ba1\u5224\u522b\u57fa\u7840\u533a\u5206\u76ee\u6807\u6570\u636e\u4e0e\u4fdd\u7559\u6570\u636e\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27683", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u7eafAPI\u9ed1\u76d2\u8bbf\u95ee\uff1a\u65e0\u9700\u76ee\u6807\u6a21\u578b\u53c2\u6570\u6216\u5185\u90e8logits\uff0c\u901a\u8fc7\u8def\u7531\u673a\u5236\u5c06\u9057\u5fd8\u76f8\u5173\u63d0\u793a\u7ed5\u5f00\u76ee\u6807LLM", "\u57fa\u4e8e\u7ecf\u9a8cFisher\u77e9\u9635\u548c\u6b63\u5219\u5316\u5e7f\u4e49\u7279\u5f81\u503c\u95ee\u9898\u6784\u5efa\u5224\u522b\u57fa\u7840\uff0c\u89e3\u51b3\u76ee\u6807\u6570\u636e\u4e0e\u4fdd\u7559\u6570\u636e\u9ad8\u5ea6\u76f8\u4f3c\u65f6\u7684\u533a\u5206\u96be\u9898", "\u5728ToFU forget10\u4e0a\u6a21\u578b\u6548\u7528\u8fbe74.90\uff08\u6bd4\u6b21\u4f18\u57fa\u7ebf\u9ad8\u7ea615%\uff09\uff0c\u5728WMDP\u4e0a\u5c06\u6709\u5bb3\u77e5\u8bc6\u51c6\u786e\u7387\u964d\u81f325.68\uff08\u63a5\u8fd1\u968f\u673a\u731c\u6d4b\uff09\uff0c\u540c\u65f6\u4fdd\u6301MMLU\u51c6\u786e\u738752.67"], "keywords": ["\u673a\u5668\u9057\u5fd8", "\u5927\u8bed\u8a00\u6a21\u578b", "\u9ed1\u76d2\u8bbf\u95ee", "\u9690\u79c1\u4fdd\u62a4"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27683v1", "published_at": "2026-06-26", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "CBD: API-Only LLM Black-Box Unlearning through Controlled Behavioral Divergence", "tldr": "\u4ec5\u901a\u8fc7API\u9ed1\u76d2\u8bbf\u95ee\u5b9e\u73b0LLM\u673a\u5668\u9057\u5fd8\u7684\u65b0\u6846\u67b6CBD\uff0c\u65e0\u9700\u6a21\u578b\u53c2\u6570\u5373\u53ef\u7cbe\u51c6\u5220\u9664\u76ee\u6807\u6570\u636e\u5f71\u54cd", "upvotes": 0, "what_it_is": "\u63d0\u51faCBD\uff08\u53d7\u63a7\u884c\u4e3a\u6563\u5ea6\uff09\u6846\u67b6\uff0c\u5728\u4ec5\u6709API\u8bbf\u95ee\u6743\u9650\u7684\u9ed1\u76d2\u6761\u4ef6\u4e0b\u5b9e\u73b0LLM\u673a\u5668\u9057\u5fd8\uff0c\u5229\u7528\u4e24\u4e2a\u8f85\u52a9\u6a21\u578b\u6784\u5efa\u884c\u4e3a\u6563\u5ea6\u5e76\u901a\u8fc7\u68af\u5ea6\u7edf\u8ba1\u5224\u522b\u57fa\u7840\u533a\u5206\u76ee\u6807\u6570\u636e\u4e0e\u4fdd\u7559\u6570\u636e\u3002", "why_notable": "\u9996\u4e2a\u7eafAPI\u9ed1\u76d2\u673a\u5668\u9057\u5fd8\u6846\u67b6\uff0c\u7a81\u7834\u73b0\u6709\u65b9\u6cd5\u4f9d\u8d56\u767d\u76d2/\u7070\u76d2\u8bbf\u95ee\u7684\u9650\u5236\uff0c\u5728\u5b9e\u9645\u8fb9\u7f18\u8ba1\u7b97\u573a\u666f\u4e2d\u5177\u6709\u91cd\u8981\u5e94\u7528\u4ef7\u503c\uff0c\u4e14\u572811\u4e2a\u57fa\u7ebf\u5bf9\u6bd4\u4e2d\u8868\u73b0\u6700\u4f18\u3002"}, {"abstract": "Large Vision-Language Models (LVLMs) exhibit sophisticated reasoning but remain susceptible to object hallucination. Deviating from the prevailing attention intensity assumption, we reveal a deeper dynamic structural misalignment: hallucination is triggered at decision-critical steps where specific attention heads, acting as risky mediators, decouple from visual evidence to
