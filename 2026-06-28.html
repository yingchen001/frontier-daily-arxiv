784\u5f3a\u5316\u5b66\u4e60\u65b9\u6cd5fGRPO\uff0c\u901a\u8fc7\u4e25\u683c\u6f5c\u5728\u72b6\u6001\u4e2d\u4ecb\u539f\u5219\u786e\u4fdd\u9884\u6d4b\u4ec5\u4f9d\u8d56\u6f5c\u5728\u72b6\u6001\u548c\u52a8\u4f5c\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27681", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5f62\u5f0f\u5316\u8bc1\u660e\u4e25\u683c\u4e2d\u4ecb\uff08strict mediation\uff09\u662f\u4f7f\u8868\u793a\u8d28\u91cf\u53ef\u5b9e\u8bc1\u68c0\u9a8c\u7684\u5fc5\u8981\u6761\u4ef6\uff0c\u800c\u5386\u53f2\u6cc4\u6f0f\u67b6\u6784\u4f1a\u7834\u574f\u8fd9\u4e00\u8fde\u63a5", "\u63d0\u51fa\u79bb\u6563\u3001\u53ef\u89e3\u91ca\u3001\u53d8\u957f\u7684\u6587\u672c\u6f5c\u5728\u72b6\u6001\uff0c\u7ed5\u8fc7\u4f20\u7edf\u53d8\u5206\u8bad\u7ec3\u5bf9\u8fde\u7eed\u53ef\u5fae\u6027\u7684\u4f9d\u8d56", "\u5728TextWorld\u548cScienceWorld\u4e0a\u5b9e\u9a8c\u663e\u793a\u8868\u793a\u8d28\u91cf\u63d0\u5347\u6700\u9ad857%\uff0crollout\u6027\u80fd\u63d0\u5347\u6700\u9ad898%\uff0c\u4e14\u968f\u4efb\u52a1\u590d\u6742\u5ea6\u548c\u65f6\u95f4\u8de8\u5ea6\u589e\u52a0\u6548\u679c\u66f4\u663e\u8457"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u8868\u793a\u5b66\u4e60", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27681v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Textual Belief States for World Models: Identifiable Representation Learning Under Strict Mediation", "tldr": "\u63d0\u51fa\u6587\u672c\u6f5c\u5728\u72b6\u6001\u4e0efGRPO\u65b9\u6cd5\uff0c\u89e3\u51b3LLM\u4e16\u754c\u6a21\u578b\u4e2d\u6f5c\u5728\u8868\u793a\u4e0d\u53ef\u8bc6\u522b\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u9488\u5bf9\u57fa\u4e8eLLM\u7684\u4e16\u754c\u6a21\u578b\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u73af\u5883\u4e2d\u6f5c\u5728\u72b6\u6001\u4e0d\u53ef\u8bc6\u522b\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u79bb\u6563\u53ef\u89e3\u91ca\u7684\u6587\u672c\u6f5c\u5728\u72b6\u6001\u8868\u793a\uff0c\u4ee5\u53ca\u6811\u7ed3\u6784\u5f3a\u5316\u5b66\u4e60\u65b9\u6cd5fGRPO\uff0c\u901a\u8fc7\u4e25\u683c\u6f5c\u5728\u72b6\u6001\u4e2d\u4ecb\u539f\u5219\u786e\u4fdd\u9884\u6d4b\u4ec5\u4f9d\u8d56\u6f5c\u5728\u72b6\u6001\u548c\u52a8\u4f5c\u3002", "why_notable": "\u9996\u6b21\u5c06\u4e25\u683c\u6f5c\u5728\u72b6\u6001\u4e2d\u4ecb\u539f\u5219\u5f15\u5165\u6587\u672c/LLM\u4e16\u754c\u6a21\u578b\u9886\u57df\uff0c\u89e3\u51b3\u4e86\u79bb\u6563\u6587\u672c\u7a7a\u95f4\u4e2d\u4e0d\u53ef\u5fae\u5206\u5bfc\u81f4\u65e0\u6cd5\u53d8\u5206\u8bad\u7ec3\u7684\u6838\u5fc3\u96be\u9898\uff0c\u4e3aLLM-based\u667a\u80fd\u4f53\u7684\u53ef\u9760\u4e16\u754c\u6a21\u578b\u6784\u5efa\u63d0\u4f9b\u4e86\u7406\u8bba\u4e0e\u65b9\u6cd5\u57fa\u7840\u3002"}, {"abstract": "Multi-token prediction has been shown to increase data density during training, improve downstream text-generation quality, and serves as the defacto approach for self-speculative decoding. Existing foundation and open source models that use MTP heads commit to a static tree-based attention topology throughout the entire generation sequence, meaning the speculation depth, and thus the compute required during verification, stays constant regardless of the context. This is fundamentally misaligned with the entropy patterns of natural language where low-entropy regions often support reliable multi-step drafting, while high-entropy regions require more conservative speculation. To address this, we propose Entropy-guided Multi-Token Prediction (EntMTP), a training-free scheduler that toggles between tree-based attention topologies from a set of task-specific pareto-optimal trees conditioned on a running estimate of local generation entropy. By matching speculation depth to context predictability, EntMTP maximizes expected accepted-token throughput across the full distribution of generated text without sacrificing generation quality. When evaluated across Humaneval, ShareGPT, GSM8k, and Litbench benchmarks, EntMTP consistently achieves a 1.15x speedup against Hydra and peak speedup of 1.36x against Medusa baselines respectively.", "arxiv_id": "2606.27550", "arxiv_url": "https://arxiv.org/abs/2606.27550", "authors": ["Carrie Chen"], "brief": "\u63d0\u51faEntMTP\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u8c03\u5ea6\u5668\uff0c\u6839\u636e\u5f53\u524d\u751f\u6210\u4e0a\u4e0b\u6587\u7684\u5c40\u90e8\u71b5\u52a8\u6001\u5207\u6362\u6811\u5f62\u6ce8\u610f\u529b\u62d3\u6251\u7ed3\u6784\uff0c\u4f7f\u63a8\u6d4b\u89e3\u7801\u6df1\u5ea6\u4e0e\u6587\u672c\u53ef\u9884\u6d4b\u6027\u76f8\u5339\u914d\uff0c\u4ece\u800c\u63d0\u5347LLM\u63a8\u7406\u541e\u5410\u91cf\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27550", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u6d1e\u5bdf\uff1a\u81ea\u7136\u8bed\u8a00\u4f4e\u71b5\u533a\u57df\u652f\u6301\u6df1\u5ea6\u591a\u6b65\u63a8\u6d4b\uff0c\u9ad8\u71b5\u533a\u57df\u9700\u4fdd\u5b88\u63a8\u6d4b\uff0c\u9759\u6001\u6811\u62d3\u6251\u4e0e\u6b64\u4e0d\u5339\u914d", "\u65b9\u6cd5\uff1a\u7ef4\u62a4\u5c40\u90e8\u751f\u6210\u71b5\u7684\u6ed1\u52a8\u4f30\u8ba1\uff0c\u4ece\u4efb\u52a1\u7279\u5b9a\u7684\u5e15\u7d2f\u6258\u6700\u4f18\u6811\u96c6\u5408\u4e2d\u52a8\u6001\u9009\u62e9\u6ce8\u610f\u529b\u62d3\u6251", "\u5b9e\u9a8c\u7ed3\u679c\uff1a\u5728HumanEval\u3001ShareGPT\u3001GSM8k\u3001Litbench\u4e0a\uff0c\u76f8\u6bd4Hydra\u57fa\u7ebf\u52a0\u901f1.15x\uff0c\u76f8\u6bd4Medusa\u57fa\u7ebf\u5cf0\u503c\u52a0\u901f1.36x"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "\u63a8\u6d4b\u89e3\u7801", "\u591a\u4ee4\u724c\u9884\u6d4b", "\u81ea\u9002\u5e94\u8c03\u5ea6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27550v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EntMTP: Accelerating LLM Inference with Entropy Guided Multi Token Prediction", "tldr": "\u57fa\u4e8e\u71b5\u5f15\u5bfc\u7684\u591a\u4ee4\u724c\u9884\u6d4b\u8c03\u5ea6\u5668\uff0c\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u52a0\u901fLLM\u63a8\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51faEntMTP\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u8c03\u5ea6\u5668\uff0c\u6839\u636e\u5f53\u524d\u751f\u6210\u4e0a\u4e0b\u6587\u7684\u5c40\u90e8\u71b5\u52a8\u6001\u5207\u6362\u6811\u5f62\u6ce8\u610f\u529b\u62d3\u6251\u7ed3\u6784\uff0c\u4f7f\u63a8\u6d4b\u89e3\u7801\u6df1\u5ea6\u4e0e\u6587\u672c\u53ef\u9884\u6d4b\u6027\u76f8\u5339\u914d\uff0c\u4ece\u800c\u63d0\u5347LLM\u63a8\u7406\u541e\u5410\u91cf\u3002", "why_notable": "\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u5373\u53ef\u63d0\u5347\u73b0\u6709MTP\u6a21\u578b\uff08\u5982Medusa/Hydra\uff09\u7684\u63a8\u7406\u901f\u5ea6\uff0c\u5de5\u7a0b\u5b9e\u7528\u4ef7\u503c\u9ad8\uff1b\u9996\u6b21\u5c06\u71b5\u611f\u77e5\u52a8\u6001\u8c03\u5ea6\u5f15\u5165\u63a8\u6d4b\u89e3\u7801\uff0c\u4e3a\u81ea\u9002\u5e94\u63a8\u7406\u63d0\u4f9b\u65b0\u601d\u8def\u3002"}, {"abstract": "Multi-head attention conventionally partitions the hidden dimension equally across all heads at every layer, enforcing an identical representational subspace dimension (dh = dmodel/h) throughout the models depth. In this work, we identify this uniform allocation as a fundamental structural bottleneck: due to their restricted dimensional space, early-layer heads are unable to faithfully capture complex, high-dimensional contextual patterns. To resolve this, we introduce the Prism Transformer, a novel architectural paradigm that replaces the static, uniform head configuration with a progressive head schedule. By monotonically increasing the head count across layers, the Prism Transformer naturally establishes a local-to-global representational hierarchy: early layers leverage fewer, exceptionally wide heads to capture complex, local compositional patterns, while deep layers deploy many, narrow heads to decompose these patterns into specialized linguistic features. Crucially, this structural shift is parameter-neutral, compute-neutral, and introduces zero training or inference overhead, preserving identical weight matrices and FLOP budgets as the standard Transformer. Across three model scales (124M, 354M, and 757M), the Prism Transformer consistently outperforms uniform baselines, achieving consistent reductions in validation loss alongside consistent gains on downstream zero-shot benchmarks (including PIQA, HellaSwag, ARC-Easy, and WinoGrande). Our findings demonstrate that non-uniform subspace allocation unlocks latent capacity within the standard Transformer budget, enabling more effective use of model capacity.", "arxiv_id": "2606.27449", "arxiv_url": "https://arxiv.org/abs/2606.27449", "authors": ["Shubham Aggarwal"], "brief": "\u63d0\u51faPrism Transformer\uff0c\u901a\u8fc7\u8de8\u5c42\u5355\u8c03\u9012\u589e\u6ce8\u610f\u529b\u5934\u6570\u91cf\uff0c\u6784\u5efa\u4ece\u5c40\u90e8\u5230\u5168\u5c40\u7684\u5c42\u6b21\u5316\u8868\u793a\u7ed3\u6784\uff0c\u65e9\u671f\u5c42\u4f7f\u7528\u5c11\u91cf\u5bbd\u5934\u6355\u6349\u590d\u6742\u5c40\u90e8\u6a21\u5f0f\uff0c\u6df1\u5c42\u4f7f\u7528\u591a\u4e2a\u7a84\u5934\u5206\u89e3\u4e3a\u4e13\u5316\u8bed\u8a00\u7279\u5f81\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27449", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6e10\u8fdb\u5f0f\u5934\u8c03\u5ea6\uff1a\u5934\u6570\u968f\u5c42\u6df1\u5355\u8c03\u9012\u589e\uff0c\u65e9\u5c42\u5bbd\u5934\uff08\u4f4e\u5934\u6570\uff09\u2192\u6df1\u5c42\u7a84\u5934\uff08\u9ad8\u5934\u6570\uff09\uff0c\u5f62\u6210\u5c40\u90e8\u5230\u5168\u5c40\u7684\u8868\u793a\u5c42\u6b21", "\u53c2\u6570\u4e2d\u6027\u3001\u8ba1\u7b97\u4e2d\u6027\uff1a\u6743\u91cd\u77e9\u9635\u603b\u91cf\u4e0eFLOP\u9884\u7b97\u4e0e\u6807\u51c6Transformer\u5b8c\u5168\u76f8\u540c\uff0c\u96f6\u8bad\u7ec3/\u63a8\u7406\u989d\u5916\u5f00\u9500", "\u5728124M\u3001354M\u3001757M\u4e09\u4e2a\u89c4\u6a21\u4e0a\u5747\u964d\u4f4e\u9a8c\u8bc1\u635f\u5931\uff0c\u5e76\u5728PIQA\u3001HellaSwag\u3001ARC-Easy\u3001WinoGrande\u7b49\u96f6\u6837\u672c\u57fa\u51c6\u4e0a\u6301\u7eed\u63d0\u5347"], "keywords": ["Transformer\u67b6\u6784", "\u6ce8\u610f\u529b\u673a\u5236", "\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u6548\u7387"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27449v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Prism Transformer: Progressive Head Schedules for Hierarchical Attention Processing", "tldr": "Prism Transformer\u7528\u6e10\u8fdb\u5f0f\u591a\u5934\u8c03\u5ea6\u66ff\u4ee3\u5747\u5300\u5206\u914d\uff0c\u96f6\u989d\u5916\u5f00\u9500\u63d0\u5347Transformer\u8868\u8fbe\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faPrism Transformer\uff0c\u901a\u8fc7\u8de8\u5c42\u5355\u8c03\u9012\u589e\u6ce8\u610f\u529b\u5934\u6570\u91cf\uff0c\u6784\u5efa\u4ece\u5c40\u90e8\u5230\u5168\u5c40\u7684\u5c42\u6b21\u5316\u8868\u793a\u7ed3\u6784\uff0c\u65e9\u671f\u5c42\u4f7f\u7528\u5c11\u91cf\u5bbd\u5934\u6355\u6349\u590d\u6742\u5c40\u90e8\u6a21\u5f0f\uff0c\u6df1\u5c42\u4f7f\u7528\u591a\u4e2a\u7a84\u5934\u5206\u89e3\u4e3a\u4e13\u5316\u8bed\u8a00\u7279\u5f81\u3002", "why_notable": "\u5728\u4e0d\u589e\u52a0\u4efb\u4f55\u53c2\u6570\u548c\u8ba1\u7b97\u91cf\u7684\u524d\u63d0\u4e0b\uff0c\u4ec5\u901a\u8fc7\u91cd\u65b0\u5206\u914d\u6ce8\u610f\u529b\u5934\u7684\u7ed3\u6784\u914d\u7f6e\u5373\u53ef\u63d0\u5347\u6a21\u578b\u6027\u80fd\uff0c\u63ed\u793a\u4e86\u6807\u51c6Transformer\u4e2d\u5747\u5300\u5934\u5206\u914d\u662f\u4e00\u4e2a\u88ab\u5ffd\u89c6\u7684\u7ed3\u6784\u74f6\u9888\uff0c\u5177\u6709\u5373\u63d2\u5373\u7528\u7684\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multi-agent large language model (LLM) systems often rely on verifier and critic agents to suppress hallucinations, but verification is delayed. During this delay, false claims can propagate through the agent network. We model this process as delayed consensus on a graph with grounded corrector nodes. Spectral decomposition by the grounded Laplacian yields a closed-form stability threshold for the verification dose: correction that is too strong or too delayed can turn consensus into oscillation. The most unstable regime occurs when the communication and verification delays coincide; for delay two, the threshold is the inverse golden ratio. The same framework gives a supermodular placement objective and a greedy (1-1/e)-approximation rule for assigning a limited corrector budget to influential nodes. Experiments across five open models confirm the predicted dose-delay oscillations. By contrast, grounded factual answering makes truth an absorbing boundary and eliminates the effect, suggesting that the instability is specific to signed-belief tasks while grounded verification remains stabilizing", "arxiv_id": "2606.27409", "arxiv_url": "https://arxiv.org/abs/2606.27409", "authors": ["Igor Itkin"], "brief": "\u672c\u6587\u5c06\u591a\u667a\u80fd\u4f53LLM\u7cfb\u7edf\u4e2d\u7684\u5ef6\u8fdf\u9a8c\u8bc1\u95ee\u9898\u5efa\u6a21\u4e3a\u5e26\u63a5\u5730\u6821\u6b63\u8282\u70b9\u7684\u56fe\u4e0a\u5ef6\u8fdf\u5171\u8bc6\u8fc7\u7a0b\uff0c\u901a\u8fc7\u63a5\u5730\u62c9\u666e\u62c9\u65af\u8c31\u5206\u89e3\u63a8\u5bfc\u51fa\u9a8c\u8bc1\u5242\u91cf\u7684\u95ed\u5408\u5f62\u5f0f\u7a33\u5b9a\u6027\u9608\u503c\uff0c\u5e76\u63d0\u51fa\u6821\u6b63\u8282\u70b9\u7684\u8d2a\u5fc3\u6700\u4f18\u653e\u7f6e\u7b97\u6cd5\u3002", "categories": ["cs.MA", "cs.CL", "cs.LG", "eess.SY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27409", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u901a\u4fe1\u5ef6\u8fdf\u4e0e\u9a8c\u8bc1\u5ef6\u8fdf\u91cd\u5408\u65f6\u7cfb\u7edf\u6700\u4e0d\u7a33\u5b9a\uff1b\u5ef6\u8fdf\u4e3a2\u65f6\u7a33\u5b9a\u6027\u9608\u503c\u6070\u597d\u7b49\u4e8e\u9ec4\u91d1\u6bd4\u4f8b\u7684\u5012\u6570\uff08\u22480.618\uff09", "\u6821\u6b63\u8282\u70b9\u653e\u7f6e\u76ee\u6807\u51fd\u6570\u5177\u6709\u8d85\u6a21\u6027\uff0c\u8d2a\u5fc3\u7b97\u6cd5\u53ef\u8fbe(1-1/e)\u8fd1\u4f3c\u6bd4", "\u5728\u4e94\u4e2a\u5f00\u6e90\u6a21\u578b\u4e0a\u7684\u5b9e\u9a8c\u9a8c\u8bc1\u4e86\u9884\u6d4b\u7684\u5242\u91cf-\u5ef6\u8fdf\u632f\u8361\u73b0\u8c61\uff1b\u63a5\u5730\u4e8b\u5b9e\u95ee\u7b54\u4f7f\u771f\u503c\u6210\u4e3a\u5438\u6536\u8fb9\u754c\uff0c\u53ef\u6d88\u9664\u8be5\u4e0d\u7a33\u5b9a\u6027"], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5e7b\u89c9\u6291\u5236", "\u56fe\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27409v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Delayed Verification Destabilizes Multi-Agent LLM Belief: Instability Thresholds and Optimal Corrector Placement", "tldr": "\u591a\u667a\u80fd\u4f53LLM\u7cfb\u7edf\u4e2d\u5ef6\u8fdf\u9a8c\u8bc1\u4f1a\u5bfc\u81f4\u4fe1\u5ff5\u632f\u8361\uff0c\u8bba\u6587\u7ed9\u51fa\u7a33\u5b9a\u6027\u9608\u503c\u4e0e\u6700\u4f18\u6821\u6b63\u8282\u70b9\u653e\u7f6e\u7b56\u7565", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06\u591a\u667a\u80fd\u4f53LLM\u7cfb\u7edf\u4e2d\u7684\u5ef6\u8fdf\u9a8c\u8bc1\u95ee\u9898\u5efa\u6a21\u4e3a\u5e26\u63a5\u5730\u6821\u6b63\u8282\u70b9\u7684\u56fe\u4e0a\u5ef6\u8fdf\u5171\u8bc6\u8fc7\u7a0b\uff0c\u901a\u8fc7\u63a5\u5730\u62c9\u666e\u62c9\u65af\u8c31\u5206\u89e3\u63a8\u5bfc\u51fa\u9a8c\u8bc1\u5242\u91cf\u7684\u95ed\u5408\u5f62\u5f0f\u7a33\u5b9a\u6027\u9608\u503c\uff0c\u5e76\u63d0\u51fa\u6821\u6b63\u8282\u70b9\u7684\u8d2a\u5fc3\u6700\u4f18\u653e\u7f6e\u7b97\u6cd5\u3002", "why_notable": "\u9996\u6b21\u4ece\u63a7\u5236\u7406\u8bba\u89d2\u5ea6\u4e3a\u591a\u667a\u80fd\u4f53LLM\u7684\u5e7b\u89c9\u4f20\u64ad\u95ee\u9898\u5efa\u7acb\u4e25\u683c\u6570\u5b66\u6846\u67b6\uff0c\u7ed9\u51fa\u53ef\u64cd\u4f5c\u7684\u7a33\u5b9a\u6027\u5224\u636e\u548c\u8d44\u6e90\u53d7\u9650\u4e0b\u7684\u6700\u4f18\u90e8\u7f72\u7b56\u7565\uff0c\u5bf9\u5b9e\u9645\u7cfb\u7edf\u8bbe\u8ba1\u5177\u6709\u76f4\u63a5\u6307\u5bfc\u610f\u4e49"}, {"abstract": "Frontier large language model training consumes massive accelerator fleets and long wall-clock computation, making stability failures costly when they occur. After a numerical or a hyperparameter fault has already destabilized the training dynamics, it may continue for thousands of steps while loss and gradient norms still appear normal. We study mechanism-driven detection of training instability by deriving internal monitors from the functional role of each critical module and from the earliest computational sites where failures are expected to produce measurable signatures. For low-precision flash attention, we monitor the spectral entropy of a QK bilinear decomposition, whose first-order term becomes abnormal before the loss fully collapses. For MoE routers, we derive indicators from their role in expert selection. Our fault-injection experiments on low-precision attention, large learning-rate, and combined faults show that these signals provide distinct signatures for different failures, triggering thousands of steps before loss divergence.", "arxiv_id": "2606.28116", "arxiv_url": "https://arxiv.org/abs/2606.28116", "authors": ["Ruixuan Huang", "Yipei Wang", "Wenyi Fang", "Hantao Huang", "Yifan Huang", "Ansheng You", "Zhenxing Zhang", "Shuai Wang", "Fan Wu", "Yang Zheng"], "brief": "\u63d0\u51fa\u4e00\u79cd\u673a\u5236\u9a71\u52a8\u7684LLM\u8bad\u7ec3\u4e0d\u7a33\u5b9a\u6027\u9884\u8b66\u65b9\u6cd5\uff0c\u901a\u8fc7\u5206\u6790\u5173\u952e\u6a21\u5757\uff08\u4f4e\u7cbe\u5ea6Flash Attention\u7684QK\u53cc\u7ebf\u6027\u5206\u89e3\u8c31\u71b5\u3001MoE\u8def\u7531\u5668\u4e13\u5bb6\u9009\u62e9\u6307\u6807\uff09\u7684\u5185\u90e8\u4fe1\u53f7\uff0c\u5728\u8bad\u7ec3\u5d29\u6e83\u524d\u6570\u5343\u6b65\u53d1\u51fa\u9884\u8b66\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28116", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9488\u5bf9\u4f4e\u7cbe\u5ea6Flash Attention\uff0c\u76d1\u63a7QK\u53cc\u7ebf\u6027\u5206\u89e3\u7684\u8c31\u71b5\uff0c\u5176\u4e00\u9636\u9879\u5728\u635f\u5931\u5b8c\u5168\u5d29\u6e83\u524d\u5373\u51fa\u73b0\u5f02\u5e38", "\u9488\u5bf9MoE\u8def\u7531\u5668\uff0c\u4ece\u4e13\u5bb6\u9009\u62e9\u7684\u529f\u80fd\u89d2\u8272\u63a8\u5bfc\u51fa\u4e13\u5c5e\u76d1\u63a7\u6307\u6807", "\u6545\u969c\u6ce8\u5165\u5b9e\u9a8c\uff08\u4f4e\u7cbe\u5ea6\u6ce8\u610f\u529b\u3001\u5927\u5b66\u4e60\u7387\u3001\u7ec4\u5408\u6545\u969c\uff09\u9a8c\u8bc1\u4e86\u8fd9\u4e9b\u4fe1\u53f7\u80fd\u5728\u635f\u5931\u53d1\u6563\u524d\u6570\u5343\u6b65\u89e6\u53d1\u9884\u8b66"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8bad\u7ec3\u7a33\u5b9a\u6027", "\u6545\u969c\u68c0\u6d4b", "MoE"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28116v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Mechanism-Driven Monitors for Preemptive Detection of LLM Training Instability", "tldr": "\u901a\u8fc7\u76d1\u63a7LLM\u5185\u90e8\u673a\u5236\u4fe1\u53f7\uff0c\u5728\u635f\u5931\u53d1\u6563\u524d\u6570\u5343\u6b65\u63d0\u524d\u68c0\u6d4b\u8bad\u7ec3\u4e0d\u7a33\u5b9a\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u673a\u5236\u9a71\u52a8\u7684LLM\u8bad\u7ec3\u4e0d\u7a33\u5b9a\u6027\u9884\u8b66\u65b9\u6cd5\uff0c\u901a\u8fc7\u5206\u6790\u5173\u952e\u6a21\u5757\uff08\u4f4e\u7cbe\u5ea6Flash Attention\u7684QK\u53cc\u7ebf\u6027\u5206\u89e3\u8c31\u71b5\u3001MoE\u8def\u7531\u5668\u4e13\u5bb6\u9009\u62e9\u6307\u6807\uff09\u7684\u5185\u90e8\u4fe1\u53f7\uff0c\u5728\u8bad\u7ec3\u5d29\u6e83\u524d\u6570\u5343\u6b65\u53d1\u51fa\u9884\u8b66\u3002", "why_notable": "\u5927\u89c4\u6a21LLM\u8bad\u7ec3\u6210\u672c\u6781\u9ad8\uff0c\u4f20\u7edf\u76d1\u63a7\uff08\u635f\u5931/\u68af\u5ea6\u8303\u6570\uff09\u6ede\u540e\u4e25\u91cd\uff1b\u672c\u6587\u9996\u6b21\u4ece\u6a21\u5757\u529f\u80fd\u673a\u5236\u51fa\u53d1\u8bbe\u8ba1\u5185\u90e8\u76d1\u63a7\u5668\uff0c\u53ef\u5927\u5e45\u7f29\u77ed\u6545\u969c\u54cd\u5e94\u65f6\u95f4\uff0c\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Search agents powered by large language models (LLMs) are increasingly used to solve complex information-seeking tasks, requiring multi-step retrieval and reasoning to fulfill user goals. However, existing benchmarks often assume that user queries are complete and explicit, overlooking the fact that real-world search requests are frequently vague, underspecified, or even factually incorrect. In deep search scenarios, such ambiguity can propagate along multi-step reasoning chains and lead agents toward incorrect search trajectories. To address this gap, we introduce DiscoBench, a benchmark for clarification-aware deep search, designed to evaluate whether search agents can proactively identify ambiguity, ask effective clarification questions, and recover correct reasoning paths through user interaction. DiscoBench contains 211 samples and 463 ambiguity instances across 11 real-world domains, covering four ambiguity types. We further design a user simulator for multi-turn interaction and evaluate model performance from four perspectives: task utility, ambiguity detection, interaction strategy, and cost efficiency. Experiments on representative LLMs show that ambiguity detection and effective clarification are distinct capabilities, and that repeatedly searching instead of asking for clarification often performs worse than direct guessing, highlighting a critical gap between retrieval ability and interactive problem-solving in current search agents.", "arxiv_id": "2606.27669", "arxiv_url": "https://arxiv.org/abs/2606.27669", "authors": ["Yiling Tao", "Shihan Deng", "Meiling Tao", "Pengzhi Wei", "Zhichao Hu", "Zhihao Zhu"], "brief": "\u63d0\u51faDiscoBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30LLM\u9a71\u52a8\u7684\u641c\u7d22\u667a\u80fd\u4f53\u5728\u9762\u5bf9\u6a21\u7cca\u3001\u4e0d\u5b8c\u6574\u6216\u9519\u8bef\u67e5\u8be2\u65f6\uff0c\u80fd\u5426\u4e3b\u52a8\u8bc6\u522b\u6b67\u4e49\u3001\u63d0\u51fa\u6709\u6548\u6f84\u6e05\u95ee\u9898\u5e76\u901a\u8fc7\u591a\u8f6e\u4ea4\u4e92\u6062\u590d\u6b63\u786e\u63a8\u7406\u8def\u5f84\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27669", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5305\u542b211\u4e2a\u6837\u672c\u3001463\u4e2a\u6b67\u4e49\u5b9e\u4f8b\uff0c\u8986\u76d611\u4e2a\u771f\u5b9e\u9886\u57df\u548c4\u79cd\u6b67\u4e49\u7c7b\u578b", "\u8bbe\u8ba1\u7528\u6237\u6a21\u62df\u5668\u652f\u6301\u591a\u8f6e\u4ea4\u4e92\uff0c\u4ece\u4efb\u52a1\u6548\u7528\u3001\u6b67\u4e49\u68c0\u6d4b\u3001\u4ea4\u4e92\u7b56\u7565\u3001\u6210\u672c\u6548\u7387\u56db\u7ef4\u5ea6\u8bc4\u4f30", "\u5b9e\u9a8c\u53d1\u73b0\uff1a\u6b67\u4e49\u68c0\u6d4b\u4e0e\u6709\u6548\u6f84\u6e05\u662f\u4e24\u79cd\u72ec\u7acb\u80fd\u529b\uff1b\u53cd\u590d\u641c\u7d22\u800c\u4e0d\u4e3b\u52a8\u63d0\u95ee\u5f80\u5f80\u6bd4\u76f4\u63a5\u731c\u6d4b\u6548\u679c\u66f4\u5dee"], "keywords": ["\u667a\u80fd\u4f53", "\u4fe1\u606f\u68c0\u7d22", "\u57fa\u51c6\u8bc4\u6d4b", "\u591a\u8f6e\u5bf9\u8bdd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27669v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "When Search Agents Should Ask: DiscoBench for Clarification-Aware Deep Search", "tldr": "DiscoBench\uff1a\u8bc4\u4f30\u641c\u7d22\u667a\u80fd\u4f53\u80fd\u5426\u4e3b\u52a8\u8bc6\u522b\u6a21\u7cca\u67e5\u8be2\u5e76\u63d0\u95ee\u6f84\u6e05\u7684\u65b0\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faDiscoBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30LLM\u9a71\u52a8\u7684\u641c\u7d22\u667a\u80fd\u4f53\u5728\u9762\u5bf9\u6a21\u7cca\u3001\u4e0d\u5b8c\u6574\u6216\u9519\u8bef\u67e5\u8be2\u65f6\uff0c\u80fd\u5426\u4e3b\u52a8\u8bc6\u522b\u6b67\u4e49\u3001\u63d0\u51fa\u6709\u6548\u6f84\u6e05\u95ee\u9898\u5e76\u901a\u8fc7\u591a\u8f6e\u4ea4\u4e92\u6062\u590d\u6b63\u786e\u63a8\u7406\u8def\u5f84\u3002", "why_notable": "\u586b\u8865\u4e86\u73b0\u6709\u641c\u7d22\u57fa\u51c6\u5ffd\u89c6\u771f\u5b9e\u4e16\u754c\u67e5\u8be2\u6a21\u7cca\u6027\u7684\u7a7a\u767d\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u641c\u7d22\u667a\u80fd\u4f53\u5728\u68c0\u7d22\u80fd\u529b\u4e0e\u4ea4\u4e92\u5f0f\u95ee\u9898\u89e3\u51b3\u4e4b\u95f4\u7684\u5173\u952e\u5dee\u8ddd\uff0c\u5bf9\u6784\u5efa\u66f4\u5b9e\u7528\u7684\u5bf9\u8bdd\u5f0f\u641c\u7d22\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "We introduce PerceptionRubrics, a rubric-based evaluation framework that addresses the gap between saturated benchmark scores and real-world brittleness. Shifting evaluation from holistic semantic matching to rigorous atomic auditing, PerceptionRubrics pairs 1,038 information-dense images with over 12,000 instance-specific rubrics. These criteria are derived from golden captions constructed via a novel Circular Peer-Review consensus pipeline and then distilled into a dual-stream system of Must-Right (essential facts) and Easy-Wrong (fine-grained details) rubrics. Crucially, PerceptionRubrics implements a Gated Scoring mechanism: unlike linear averages, failure on mandatory visual facts triggers sharp binary penalties. Extensive evaluation yields critical insights: (1) The Reliability Gap: models often verify fragmented elements correctly yet fail strict conjunctive constraints, exposing brittleness in dense domains; (2) Open-Closed Stratification: contrary to reasoning trends, we reveal a persistent 8% perception deficit between open-source and proprietary frontiers; and (3) Human-Aligned Rigor: our gated metrics substantially out-align conventional benchmarks, validating that strict perceptual fidelity is the prerequisite for reliable generation.", "arxiv_id": "2606.28322", "arxiv_url": "https://arxiv.org/abs/2606.28322", "authors": ["Yana Wei", "Hongbo Peng", "Yanlin Lai", "Liang Zhao", "Kangheng Lin", "En Yu", "Keyu Lv", "Han Zhou", "Yin Tang", "Haodong Li", "Mitt Huang", "Hangyu Guo", "Jianjian Sun", "Zheng Ge", "Xiangyu Zhang", "Daxin Jiang", "Vishal M. Patel"], "brief": "\u63d0\u51faPerceptionRubrics\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc71038\u5f20\u4fe1\u606f\u5bc6\u96c6\u56fe\u50cf\u914d\u540812000+\u5b9e\u4f8b\u7ea7\u8bc4\u5206\u6807\u51c6\uff0c\u5c06\u591a\u6a21\u6001\u8bc4\u4f30\u4ece\u6574\u4f53\u8bed\u4e49\u5339\u914d\u8f6c\u5411\u7ec6\u7c92\u5ea6\u539f\u5b50\u5ba1\u8ba1\uff0c\u5e76\u5f15\u5165\u95e8\u63a7\u8bc4\u5206\u673a\u5236\u5bf9\u5173\u952e\u89c6\u89c9\u4e8b\u5b9e\u5931\u8d25\u65bd\u52a0\u4e8c\u5143\u60e9\u7f5a\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28322", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528\u5faa\u73af\u540c\u884c\u8bc4\u5ba1\u5171\u8bc6\u6d41\u6c34\u7ebf\u6784\u5efa\u9ec4\u91d1\u6807\u6ce8\uff0c\u5e76\u63d0\u70bc\u4e3aMust-Right\uff08\u5fc5\u987b\u6b63\u786e\uff09\u548cEasy-Wrong\uff08\u6613\u9519\u7ec6\u8282\uff09\u53cc\u6d41\u8bc4\u5206\u6807\u51c6", "\u95e8\u63a7\u8bc4\u5206\u673a\u5236\uff1a\u5f3a\u5236\u89c6\u89c9\u4e8b\u5b9e\u5931\u8d25\u89e6\u53d1\u4e25\u683c\u4e8c\u5143\u60e9\u7f5a\uff0c\u800c\u975e\u7ebf\u6027\u5e73\u5747\uff0c\u66f4\u8d34\u8fd1\u4eba\u7c7b\u611f\u77e5\u903b\u8f91", "\u63ed\u793a\u4e09\u5927\u5173\u952e\u53d1\u73b0\uff1a\u6a21\u578b\u5b58\u5728\u53ef\u9760\u6027\u7f3a\u53e3\uff08\u8054\u5408\u7ea6\u675f\u5931\u8d25\uff09\u3001\u5f00\u6e90\u4e0e\u95ed\u6e90\u6a21\u578b\u95f4\u6301\u7eed\u5b58\u57288%\u611f\u77e5\u5dee\u8ddd\u3001\u95e8\u63a7\u6307\u6807\u663e\u8457\u4f18\u4e8e\u4f20\u7edf\u57fa\u51c6\u7684\u4eba\u7c7b\u5bf9\u9f50\u5ea6"], "keywords": ["\u591a\u6a21\u6001", "\u8bc4\u4f30\u57fa\u51c6", "\u89c6\u89c9\u611f\u77e5", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28322v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "PerceptionRubrics: Calibrating Multimodal Evaluation to Human Perception", "tldr": "PerceptionRubrics\uff1a\u7528\u539f\u5b50\u7ea7\u8bc4\u5206\u6807\u51c6\u6821\u51c6\u591a\u6a21\u6001\u6a21\u578b\u8bc4\u4f30\u4e0e\u4eba\u7c7b\u611f\u77e5\u7684\u5bf9\u9f50", "upvotes": 0, "what_it_is": "\u63d0\u51faPerceptionRubrics\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc71038\u5f20\u4fe1\u606f\u5bc6\u96c6\u56fe\u50cf\u914d\u540812000+\u5b9e\u4f8b\u7ea7\u8bc4\u5206\u6807\u51c6\uff0c\u5c06\u591a\u6a21\u6001\u8bc4\u4f30\u4ece\u6574\u4f53\u8bed\u4e49\u5339\u914d\u8f6c\u5411\u7ec6\u7c92\u5ea6\u539f\u5b50\u5ba1\u8ba1\uff0c\u5e76\u5f15\u5165\u95e8\u63a7\u8bc4\u5206\u673a\u5236\u5bf9\u5173\u952e\u89c6\u89c9\u4e8b\u5b9e\u5931\u8d25\u65bd\u52a0\u4e8c\u5143\u60e9\u7f5a\u3002", "why_notable": "\u73b0\u6709\u591a\u6a21\u6001\u57fa\u51c6\u5206\u6570\u8d8b\u4e8e\u9971\u548c\u4f46\u6a21\u578b\u5b9e\u9645\u8868\u73b0\u8106\u5f31\uff0c\u8be5\u6846\u67b6\u63d0\u4f9b\u4e86\u66f4\u4e25\u683c\u3001\u66f4\u8d34\u8fd1\u4eba\u7c7b\u611f\u77e5\u7684\u8bc4\u4f30\u4f53\u7cfb\uff0c\u5bf9\u63a8\u52a8\u591a\u6a21\u6001\u6a21\u578b\u771f\u5b9e\u80fd\u529b\u8bc4\u4f30\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "In recent years, multimodal large language models (MLLMs) have shown strong potential for embodied intelligence, yet their ability to maintain geometrically consistent spatial understanding across heterogeneous views remains under-evaluated. Existing benchmarks largely focus on single-agent, single-view perception, leaving a gap in the systematic assessment of collaborative air-ground settings, where multi-scale observations are complementary but introduce scale mismatch, asymmetric occlusion, and reference-frame inconsistencies. We present AirGroundBench, a diagnostic benchmark for evaluating multi-view spatial intelligence in heterogeneous UAV-UGV collaboration. AirGroundBench is built from 11 high-fidelity simulated environments with 1,021 synchronized air-ground observation pairs, yielding approximately 62,000 dual-view, four-option single-choice visual question answering instances and 115 closed-loop vision-language navigation episodes. It covers 10 task types organized into four progressively demanding capability dimensions: spatial perception, cross-view alignment, spatial transformation and reasoning, and embodied decision-making. To support geometry-grounded evaluation and analysis, we provide structured spatial annotations, including cross-view object identities and metric 2D and 3D bounding boxes. Evaluations of 13 representative MLLMs under UAV-only, UGV-only, and dual-view input settings reveal consistent bottlenecks: models perform relatively well on spatial perception but struggle with cross-view alignment and transformation-intensive reasoning, and these deficits propagate to sequential decision-making in vision-language navigation. Although dual-view inputs provide measurable gains over single-view variants, a persistent gap from human performance remains, highlighting geometric consistency as a key limitation of current embodied MLLMs.", "arxiv_id": "2606.28049", "arxiv_url": "https://arxiv.org/abs/2606.28049", "authors": ["Haotian Li", "Yida Wang", "Leyuan Wang", "Jinshan Lai", "Keyang Wang", "Zonghao Guo", "Qiang Ma", "Liuyu Xiang", "Jianwei Hu", "Zhaofeng He"], "brief": "\u63d0\u51faAirGroundBench\uff0c\u4e00\u4e2a\u4e13\u95e8\u8bc4\u4f30\u5f02\u6784\u65e0\u4eba\u673a-\u5730\u9762\u8f66\uff08UAV-UGV\uff09\u534f\u4f5c\u573a\u666f\u4e0b\u591a\u89c6\u89d2\u7a7a\u95f4\u667a\u80fd\u7684\u8bca\u65ad\u57fa\u51c6\uff0c\u5305\u542b11\u4e2a\u9ad8\u4fdd\u771f\u4eff\u771f\u73af\u5883\u3001\u7ea66.2\u4e07\u9053\u53cc\u89c6\u89d2\u89c6\u89c9\u95ee\u7b54\u9898\u53ca115\u4e2a\u95ed\u73af\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u4efb\u52a1\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28049", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u8986\u76d610\u79cd\u4efb\u52a1\u7c7b\u578b\u30014\u4e2a\u80fd\u529b\u7ef4\u5ea6\uff1a\u7a7a\u95f4\u611f\u77e5\u3001\u8de8\u89c6\u89d2\u5bf9\u9f50\u3001\u7a7a\u95f4\u53d8\u6362\u63a8\u7406\u3001\u5177\u8eab\u51b3\u7b56\uff0c\u96be\u5ea6\u9012\u8fdb", "\u8bc4\u4f3013\u4e2a\u4e3b\u6d41MLLM\uff0c\u53d1\u73b0\u6a21\u578b\u5728\u7a7a\u95f4\u611f\u77e5\u8868\u73b0\u5c1a\u53ef\uff0c\u4f46\u5728\u8de8\u89c6\u89d2\u5bf9\u9f50\u548c\u53d8\u6362\u63a8\u7406\u4e0a\u5b58\u5728\u663e\u8457\u74f6\u9888\uff0c\u4e14\u7f3a\u9677\u4f20\u5bfc\u81f3\u5bfc\u822a\u51b3\u7b56", "\u53cc\u89c6\u89d2\u8f93\u5165\u76f8\u6bd4\u5355\u89c6\u89d2\u6709\u53ef\u6d4b\u91cf\u63d0\u5347\uff0c\u4f46\u4e0e\u4eba\u7c7b\u8868\u73b0\u4ecd\u5b58\u5728\u660e\u663e\u5dee\u8ddd\uff0c\u51e0\u4f55\u4e00\u81f4\u6027\u662f\u5f53\u524d\u5177\u8eabMLLM\u7684\u6838\u5fc3\u5c40\u9650"], "keywords": ["\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u5177\u8eab\u667a\u80fd", "\u7a7a\u95f4\u63a8\u7406", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28049v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "AirGroundBench: Probing Spatial Intelligence in Multimodal Large Models under Heterogeneous Multi-View Embodied Collaboration", "tldr": "AirGroundBench\uff1a\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u6a21\u578b\u5728\u65e0\u4eba\u673a-\u5730\u9762\u8f66\u534f\u4f5c\u4e2d\u7a7a\u95f4\u667a\u80fd\u7684\u8bca\u65ad\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faAirGroundBench\uff0c\u4e00\u4e2a\u4e13\u95e8\u8bc4\u4f30\u5f02\u6784\u65e0\u4eba\u673a-\u5730\u9762\u8f66\uff08UAV-UGV\uff09\u534f\u4f5c\u573a\u666f\u4e0b\u591a\u89c6\u89d2\u7a7a\u95f4\u667a\u80fd\u7684\u8bca\u65ad\u57fa\u51c6\uff0c\u5305\u542b11\u4e2a\u9ad8\u4fdd\u771f\u4eff\u771f\u73af\u5883\u3001\u7ea66.2\u4e07\u9053\u53cc\u89c6\u89d2\u89c6\u89c9\u95ee\u7b54\u9898\u53ca115\u4e2a\u95ed\u73af\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u4efb\u52a1\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u8bc4\u4f30\u5f02\u6784\u591a\u667a\u80fd\u4f53\uff08\u7a7a\u5730\u534f\u4f5c\uff09\u573a\u666f\u4e0bMLLM\u7a7a\u95f4\u667a\u80fd\u7684\u57fa\u51c6\uff0c\u586b\u8865\u4e86\u73b0\u6709\u8bc4\u6d4b\u805a\u7126\u5355\u667a\u80fd\u4f53\u5355\u89c6\u89d2\u7684\u7a7a\u767d\uff0c\u4e3a\u5177\u8eabAI\u7684\u51e0\u4f55\u63a8\u7406\u80fd\u529b\u7814\u7a76\u63d0\u4f9b\u91cd\u8981\u5de5\u5177\u3002"}, {"abstract": "Recent interest in multimodal large language models (MLLMs) raises a central question: can they reason over dynamic visual evidence rather than merely recognize objects or events in individual frames? This ability, which we refer to as video temporal-logical reasoning, requires models to maintain, update, and compose evidence as visual states evolve across frames. Existing video benchmarks often conflate this capability with scene complexity, static recognition, or uncontrolled temporal variation. To isolate this capability, we introduce Video-MME-Logical, a controlled benchmark organized around five temporal-logical operations: state tracking, sequential counting, temporal ordering, dynamic spatiality, and structural composition. The benchmark contains 25 fine-grained task categories generated with controlled object states, transitions, temporal dependencies, and logical compositions. It enables difficulty-controlled final-answer evaluation by varying temporal horizon and reasoning complexity, and supports intermediate-state diagnostics by verifying whether models recover the required logical reasoning trace before producing the final answer. Experiments with state-of-the-art MLLMs reveal a substantial human-model gap, especially as temporal-logical complexity increases. Supervised fine-tuning on up to 500K generated samples improves performance but remains insufficient to close the reasoning gap, positioning Video-MME-Logical as a scalable testbed for analyzing and improving temporal-logical reasoning in MLLMs.", "arxiv_id": "2606.27828", "arxiv_url": "https://arxiv.org/abs/2606.27828", "authors": ["Hohin Kwan", "Hongyu Li", "Ray Zhang", "Manyuan Zhang", "Xianghao Kong", "Anyi Rao", "Jiahao Xie", "Si Liu"], "brief": "\u6784\u5efa\u4e86\u4e00\u4e2a\u53d7\u63a7\u8bca\u65ad\u57fa\u51c6Video-MME-Logical\uff0c\u56f4\u7ed5\u4e94\u79cd\u65f6\u5e8f\u903b\u8f91\u64cd\u4f5c\uff08\u72b6\u6001\u8ffd\u8e2a\u3001\u987a\u5e8f\u8ba1\u6570\u3001\u65f6\u5e8f\u6392\u5e8f\u3001\u52a8\u6001\u7a7a\u95f4\u6027\u3001\u7ed3\u6784\u7ec4\u5408\uff09\u8bc4\u6d4bMLLMs\u5728\u89c6\u9891\u4e2d\u8de8\u5e27\u7ef4\u62a4\u548c\u63a8\u7406\u52a8\u6001\u89c6\u89c9\u8bc1\u636e\u7684\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27828", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5305\u542b25\u4e2a\u7ec6\u7c92\u5ea6\u4efb\u52a1\u7c7b\u522b\uff0c\u901a\u8fc7\u63a7\u5236\u5bf9\u8c61\u72b6\u6001\u3001\u8f6c\u6362\u3001\u65f6\u5e8f\u4f9d\u8d56\u548c\u903b\u8f91\u7ec4\u5408\u6765\u9694\u79bb\u65f6\u5e8f\u903b\u8f91\u63a8\u7406\u80fd\u529b", "\u652f\u6301\u96be\u5ea6\u53ef\u63a7\u7684\u6700\u7ec8\u7b54\u6848\u8bc4\u4f30\u548c\u4e2d\u95f4\u72b6\u6001\u8bca\u65ad\uff0c\u53ef\u9a8c\u8bc1\u6a21\u578b\u662f\u5426\u6062\u590d\u4e86\u5b8c\u6574\u63a8\u7406\u94fe", "\u5b9e\u9a8c\u663e\u793a\u4eba\u7c7b\u4e0e\u6a21\u578b\u5b58\u5728\u663e\u8457\u5dee\u8ddd\uff0c50\u4e07\u6837\u672c\u7684\u76d1\u7763\u5fae\u8c03\u4ecd\u4e0d\u8db3\u4ee5\u5f25\u5408\u63a8\u7406\u9e3f\u6c9f"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u57fa\u51c6\u8bc4\u6d4b", "\u65f6\u5e8f\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27828v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Video-MME-Logical: A Controlled Diagnostic Benchmark for Video Temporal-Logical Reasoning", "tldr": "\u63d0\u51faVideo-MME-Logical\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u6d4b\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u89c6\u9891\u65f6\u5e8f\u903b\u8f91\u63a8\u7406\u80fd\u529b", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u4e00\u4e2a\u53d7\u63a7\u8bca\u65ad\u57fa\u51c6Video-MME-Logical\uff0c\u56f4\u7ed5\u4e94\u79cd\u65f6\u5e8f\u903b\u8f91\u64cd\u4f5c\uff08\u72b6\u6001\u8ffd\u8e2a\u3001\u987a\u5e8f\u8ba1\u6570\u3001\u65f6\u5e8f\u6392\u5e8f\u3001\u52a8\u6001\u7a7a\u95f4\u6027\u3001\u7ed3\u6784\u7ec4\u5408\uff09\u8bc4\u6d4bMLLMs\u5728\u89c6\u9891\u4e2d\u8de8\u5e27\u7ef4\u62a4\u548c\u63a8\u7406\u52a8\u6001\u89c6\u89c9\u8bc1\u636e\u7684\u80fd\u529b\u3002", "why_notable": "\u73b0\u6709\u89c6\u9891\u57fa\u51c6\u5e38\u5c06\u65f6\u5e8f\u903b\u8f91\u63a8\u7406\u4e0e\u573a\u666f\u590d\u6742\u5ea6\u6216\u9759\u6001\u8bc6\u522b\u6df7\u6dc6\uff0c\u8be5\u57fa\u51c6\u901a\u8fc7\u53d7\u63a7\u8bbe\u8ba1\u7cbe\u51c6\u9694\u79bb\u8be5\u80fd\u529b\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u6700\u5148\u8fdbMLLMs\u7684\u6838\u5fc3\u77ed\u677f\uff0c\u4e3a\u6539\u8fdb\u89c6\u9891\u63a8\u7406\u63d0\u4f9b\u4e86\u53ef\u6269\u5c55\u7684\u6d4b\u8bd5\u5e73\u53f0\u3002"}, {"abstract": "Recent advances in video diffusion models have greatly improved visual fidelity, yet their generated motions often violate physical plausibility. We observe a common kinematic failure, \"motion entanglement\", the unintended coupling of independent motion sources, such as camera movement and object motion. We identify that this issue stems from data bias and the reconstruction-based training design of diffusion models. Training on noisy videos that still retain coarse motion cues inadvertently encourages the model to replicate existing motion without an incentive to learn how to model kinematically-grounded motions. To address this, we propose a Self-Imagination Fine-Tuning (SIFT) paradigm, which enables the model to learn from its own generated videos rather than directly reconstructing real ones, breaking the reconstruction shortcut. We further employ motion-aware discriminative supervision and a progressive hard-case replay strategy to stabilize and accelerate learning. By leveraging freely-generated text prompts, our method can densely cover a broad motion space, including rare or finely-disentangled scenarios that would be costly to collect as video data. Extensive experiments demonstrate that our approach substantially improves the physical realism, motion disentanglement, and controllability of generated videos.", "arxiv_id": "2606.27741", "arxiv_url": "https://arxiv.org/abs/2606.27741", "authors": ["Ruoyu Wang", "Jialun Liu", "Huayang Huang", "Haibin Huang", "Jiepeng Wang", "Chi Zhang", "Xuelong Li", "Yu Wu"], "brief": "\u63d0\u51fa\u81ea\u60f3\u8c61\u5fae\u8c03\uff08SIFT\uff09\u65b9\u6cd5\uff0c\u8ba9\u89c6\u9891\u6269\u6563\u6a21\u578b\u4ee5\u81ea\u8eab\u751f\u6210\u7684\u89c6\u9891\u66ff\u4ee3\u771f\u5b9e\u89c6\u9891\u8fdb\u884c\u8bad\u7ec3\uff0c\u6253\u7834\u91cd\u5efa\u6377\u5f84\uff0c\u4ece\u800c\u5b66\u4e60\u7269\u7406\u4e0a\u5408\u7406\u7684\u8fd0\u52a8\uff08\u5982\u76f8\u673a\u8fd0\u52a8\u4e0e\u7269\u4f53\u8fd0\u52a8\u7684\u89e3\u8026\uff09\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27741", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\u0027\u8fd0\u52a8\u7ea0\u7f20\u0027\u5931\u6548\u6a21\u5f0f\uff1a\u76f8\u673a\u8fd0\u52a8\u4e0e\u7269\u4f53\u8fd0\u52a8\u88ab\u9519\u8bef\u8026\u5408\uff0c\u6839\u6e90\u5728\u4e8e\u6570\u636e\u504f\u5dee\u548c\u57fa\u4e8e\u91cd\u5efa\u7684\u8bad\u7ec3\u8bbe\u8ba1", "\u6838\u5fc3\u521b\u65b0\uff1a\u6a21\u578b\u4ece\u81ea\u8eab\u751f\u6210\u89c6\u9891\u5b66\u4e60\u800c\u975e\u91cd\u5efa\u771f\u5b9e\u89c6\u9891\uff0c\u914d\u5408\u8fd0\u52a8\u611f\u77e5\u5224\u522b\u76d1\u7763\u548c\u6e10\u8fdb\u5f0f\u96be\u4f8b\u56de\u653e\u7b56\u7565", "\u5229\u7528\u81ea\u7531\u751f\u6210\u7684\u6587\u672c\u63d0\u793a\u5bc6\u96c6\u8986\u76d6\u5e7f\u6cdb\u8fd0\u52a8\u7a7a\u95f4\uff0c\u5305\u62ec\u7a00\u6709\u6216\u7cbe\u7ec6\u89e3\u8026\u573a\u666f\uff0c\u65e0\u9700\u6602\u8d35\u7684\u771f\u5b9e\u89c6\u9891\u91c7\u96c6"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u8fd0\u52a8\u63a7\u5236", "\u7269\u7406\u5408\u7406\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27741v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SIFT: Self-Imagination Fine-Tuning for Physically Plausible Motion in Video Diffusion Models", "tldr": "\u63d0\u51faSIFT\u8303\u5f0f\uff0c\u8ba9\u89c6\u9891\u6269\u6563\u6a21\u578b\u4ece\u81ea\u8eab\u751f\u6210\u89c6\u9891\u4e2d\u5b66\u4e60\uff0c\u89e3\u51b3\u8fd0\u52a8\u7ea0\u7f20\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u81ea\u60f3\u8c61\u5fae\u8c03\uff08SIFT\uff09\u65b9\u6cd5\uff0c\u8ba9\u89c6\u9891\u6269\u6563\u6a21\u578b\u4ee5\u81ea\u8eab\u751f\u6210\u7684\u89c6\u9891\u66ff\u4ee3\u771f\u5b9e\u89c6\u9891\u8fdb\u884c\u8bad\u7ec3\uff0c\u6253\u7834\u91cd\u5efa\u6377\u5f84\uff0c\u4ece\u800c\u5b66\u4e60\u7269\u7406\u4e0a\u5408\u7406\u7684\u8fd0\u52a8\uff08\u5982\u76f8\u673a\u8fd0\u52a8\u4e0e\u7269\u4f53\u8fd0\u52a8\u7684\u89e3\u8026\uff09\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u6307\u51fa\u89c6\u9891\u6269\u6563\u6a21\u578b\u4e2d\u8fd0\u52a8\u7ea0\u7f20\u7684\u6210\u56e0\uff0c\u5e76\u63d0\u51fa\u65e0\u9700\u989d\u5916\u6570\u636e\u6807\u6ce8\u7684\u81ea\u4e3e\u5f0f\u5fae\u8c03\u65b9\u6848\uff0c\u5bf9\u63d0\u5347\u751f\u6210\u89c6\u9891\u7684\u7269\u7406\u771f\u5b9e\u6027\u548c\u53ef\u63a7\u6027\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Benchmarks of machine learning models often include many datasets, making evaluation expensive. For efficiency, it is preferable to perform evaluations on small, representative datasets instead. The selection of such subsets typically relies on heuristics and is rarely analyzed for the robustness of the resulting model rankings. We introduce a framework to perform the task of selecting datasets subsets with an evaluation of how different selection strategies preserve the global model rankings. Our framework includes bootstrap aggregation, which provides valid confidence intervals, allowing a principled comparison of selection strategies. We consider clustering, design criteria (A/D-optimality), random baselines, and greedy farthest-first (FAFI). For the latter, we derive upper bounds on selection quality in terms of ranking errors as a function of the number of selected datasets. Empirically, in time series classification (TSC, 112 datasets) and in a supplementary natural language processing benchmark derived from MTEB (57 tasks), several selection strategies improve rank preservation compared with random subsets, including simple FAFI. In contrast, in recommender systems (30 datasets), the improvement of strategies over random selection is small and typically statistically insignificant. For TSC, our best-performing strategy achieves a Spearman correlation of 0.95 with the full benchmark model rankings using only five selected datasets. Additional experiments indicate that the effectiveness of selection approaches depends on both the quality of dataset representations and the scale of the benchmarking regime.", "arxiv_id": "2606.27997", "arxiv_url": "https://arxiv.org/abs/2606.27997", "authors": ["Rostislav Gusev", "Alexey Zaytsev"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u6570\u636e\u96c6\u5b50\u96c6\u9009\u62e9\u6846\u67b6\uff0c\u901a\u8fc7\u8bc4\u4f30\u4e0d\u540c\u9009\u62e9\u7b56\u7565\u5bf9\u5168\u5c40\u6a21\u578b\u6392\u540d\u7684\u4fdd\u7559\u7a0b\u5ea6\uff0c\u5b9e\u73b0\u9ad8\u6548\u4e14\u53ef\u9760\u7684\u6a21\u578b\u8bc4\u4f30\u3002\u6846\u67b6\u5f15\u5165\u81ea\u52a9\u805a\u5408\u6cd5\u63d0\u4f9b\u7f6e\u4fe1\u533a\u95f4\uff0c\u652f\u6301\u5bf9\u805a\u7c7b\u3001\u8bbe\u8ba1\u51c6\u5219\u3001\u8d2a\u5fc3\u6700\u8fdc\u4f18\u5148\u7b49\u7b56\u7565\u7684\u539f\u5219\u6027\u6bd4\u8f83\u3002", "categories": ["cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27997", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51faFAFI\uff08\u8d2a\u5fc3\u6700\u8fdc\u4f18\u5148\uff09\u7b56\u7565\uff0c\u5e76\u63a8\u5bfc\u5176\u5728\u6392\u540d\u8bef\u5dee\u65b9\u9762\u7684\u7406\u8bba\u4e0a\u754c", "\u5728\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b\uff08112\u4e2a\u6570\u636e\u96c6\uff09\u4e2d\uff0c\u4ec5\u75285\u4e2a\u6570\u636e\u96c6\u5373\u53ef\u8fbe\u5230\u4e0e\u5b8c\u6574\u57fa\u51c60.95\u7684Spearman\u76f8\u5173\u6027", "\u4e0d\u540c\u9886\u57df\u6548\u679c\u5dee\u5f02\u663e\u8457\uff1aTSC\u548cNLP\u4e2d\u7b56\u7565\u660e\u663e\u4f18\u4e8e\u968f\u673a\u9009\u62e9\uff0c\u63a8\u8350\u7cfb\u7edf\u4e2d\u63d0\u5347\u6709\u9650\u4e14\u7edf\u8ba1\u4e0d\u663e\u8457"], "keywords": ["\u57fa\u51c6\u6d4b\u8bd5", "\u6a21\u578b\u8bc4\u4f30", "\u6570\u636e\u96c6\u9009\u62e9", "\u6392\u540d\u4fdd\u7559"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27997v1", "published_at": "2026-06-26", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Benchmarking on Tasks That Matter: Dataset Selection for Preserving Model Rankings", "tldr": "\u63d0\u51fa\u6570\u636e\u96c6\u5b50\u96c6\u9009\u62e9\u6846\u67b6\uff0c\u7528\u5c11\u91cf\u6570\u636e\u96c6\u4fdd\u7559\u5b8c\u6574\u57fa\u51c6\u6d4b\u8bd5\u7684\u6a21\u578b\u6392\u540d", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u6570\u636e\u96c6\u5b50\u96c6\u9009\u62e9\u6846\u67b6\uff0c\u901a\u8fc7\u8bc4\u4f30\u4e0d\u540c\u9009\u62e9\u7b56\u7565\u5bf9\u5168\u5c40\u6a21\u578b\u6392\u540d\u7684\u4fdd\u7559\u7a0b\u5ea6\uff0c\u5b9e\u73b0\u9ad8\u6548\u4e14\u53ef\u9760\u7684\u6a21\u578b\u8bc4\u4f30\u3002\u6846\u67b6\u5f15\u5165\u81ea\u52a9\u805a\u5408\u6cd5\u63d0\u4f9b\u7f6e\u4fe1\u533a\u95f4\uff0c\u652f\u6301\u5bf9\u805a\u7c7b\u3001\u8bbe\u8ba1\u51c6\u5219\u3001\u8d2a\u5fc3\u6700\u8fdc\u4f18\u5148\u7b49\u7b56\u7565\u7684\u539f\u5219\u6027\u6bd4\u8f83\u3002", "why_notable": "\u89e3\u51b3\u4e86\u5927\u89c4\u6a21\u57fa\u51c6\u6d4b\u8bd5\u8bc4\u4f30\u6210\u672c\u9ad8\u6602\u7684\u5b9e\u9645\u95ee\u9898\uff0c\u63d0\u4f9b\u4e86\u6709\u7406\u8bba\u4fdd\u8bc1\u7684\u6570\u636e\u96c6\u9009\u62e9\u65b9\u6cd5\uff0c\u5e76\u901a\u8fc7\u4e25\u683c\u7edf\u8ba1\u5206\u6790\u63ed\u793a\u4e86\u4e0d\u540c\u9886\u57df\u7684\u9002\u7528\u8fb9\u754c\uff0c\u5bf9ML\u8bc4\u4f30\u4f53\u7cfb\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Analyzing fine-grained skill activities (e.g., sports, surgery) requires not only recognizing visual patterns but also performing step-by-step visual reasoning that leads to the final judgment. While recent advances in action quality assessment have achieved remarkable progress in evaluating performance, existing models remain black boxes, where they lack the ability to explicitly reveal the reasoning processes underlying their judgments. To address this limitation, we propose Latent Visual Diffusion Reasoning (LVDR), a novel framework that integrates keypoint-guided Monte Carlo Tree Search (MCTS) to model and visualize the latent visual reasoning process. LVDR not only produces more accurate skill assessments but also uncovers the critical visual reasoning sequences that contribute to the final evaluation. Extensive experiments across four datasets spanning diverse sports and surgical domains demonstrate that LVDR achieves competitive quantitative performance while providing interpretable visual reasoning trajectories leading to the final predictions. Source codes and models can be found through the following link: https://github.com/XiruiTeng/LVDR_Official.git.", "arxiv_id": "2606.27988", "arxiv_url": "https://arxiv.org/abs/2606.27988", "authors": ["Xirui Teng", "Nan Xi", "Junsong Yuan"], "brief": "\u63d0\u51fa\u6f5c\u5728\u89c6\u89c9\u6269\u6563\u63a8\u7406\uff08LVDR\uff09\u6846\u67b6\uff0c\u5c06\u5173\u952e\u70b9\u5f15\u5bfc\u7684\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22\uff08MCTS\uff09\u4e0e\u6269\u6563\u6a21\u578b\u7ed3\u5408\uff0c\u7528\u4e8e\u4f53\u80b2/\u624b\u672f\u7b49\u7ec6\u7c92\u5ea6\u6280\u80fd\u52a8\u4f5c\u7684\u8d28\u91cf\u8bc4\u4f30\uff0c\u540c\u65f6\u53ef\u89c6\u5316\u63a8\u7406\u8fc7\u7a0b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27988", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u5173\u952e\u70b9\u5f15\u5bfc\u7684MCTS\u5bf9\u6f5c\u5728\u89c6\u89c9\u63a8\u7406\u8def\u5f84\u8fdb\u884c\u5efa\u6a21\u4e0e\u641c\u7d22\uff0c\u6253\u7834\u8bc4\u4f30\u9ed1\u7bb1", "\u57284\u4e2a\u8de8\u4f53\u80b2\u4e0e\u624b\u672f\u9886\u57df\u7684\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\uff0c\u5b9a\u91cf\u6027\u80fd\u5177\u6709\u7ade\u4e89\u529b", "\u80fd\u591f\u8f93\u51fa\u53ef\u89e3\u91ca\u7684\u89c6\u89c9\u63a8\u7406\u8f68\u8ff9\uff0c\u63ed\u793a\u6700\u7ec8\u8bc4\u5206\u80cc\u540e\u7684\u5173\u952e\u89c6\u89c9\u4f9d\u636e"], "keywords": ["\u52a8\u4f5c\u8d28\u91cf\u8bc4\u4f30", "\u6269\u6563\u6a21\u578b", "\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22", "\u53ef\u89e3\u91caAI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27988v1", "published_at": "2026-06-26", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Latent Visual Diffusion Reasoning with Monte Carlo Tree Search", "tldr": "\u63d0\u51faLVDR\u6846\u67b6\uff0c\u7ed3\u5408\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22\u5b9e\u73b0\u53ef\u89e3\u91ca\u7684\u7ec6\u7c92\u5ea6\u52a8\u4f5c\u8d28\u91cf\u8bc4\u4f30", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u6f5c\u5728\u89c6\u89c9\u6269\u6563\u63a8\u7406\uff08LVDR\uff09\u6846\u67b6\uff0c\u5c06\u5173\u952e\u70b9\u5f15\u5bfc\u7684\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22\uff08MCTS\uff09\u4e0e\u6269\u6563\u6a21\u578b\u7ed3\u5408\uff0c\u7528\u4e8e\u4f53\u80b2/\u624b\u672f\u7b49\u7ec6\u7c92\u5ea6\u6280\u80fd\u52a8\u4f5c\u7684\u8d28\u91cf\u8bc4\u4f30\uff0c\u540c\u65f6\u53ef\u89c6\u5316\u63a8\u7406\u8fc7\u7a0b\u3002", "why_notable": "\u9996\u6b21\u5c06MCTS\u5f15\u5165\u52a8\u4f5c\u8d28\u91cf\u8bc4\u4f30\u7684\u53ef\u89e3\u91ca\u63a8\u7406\uff0c\u517c\u987e\u51c6\u786e\u6027\u4e0e\u53ef\u89e3\u91ca\u6027\uff0c\u5bf9\u4f53\u80b2\u8bad\u7ec3\u548c\u624b\u672f\u8bc4\u4f30\u7b49\u9ad8\u4ef7\u503c\u573a\u666f\u5177\u6709\u5b9e\u9645\u5e94\u7528\u6f5c\u529b\u3002"}, {"abstract": "Speculative decoding (SD) has emerged as a key solution to accelerate the inference of autoregressive models. However, in the field of image generation, it faces the challenge of low acceptance rates, and directly relaxing its criteria leads to degradation in image quality. In this paper, we propose a novel content-aware speculative decoding algorithm, termed CSD, which integrates an entropy-based probability relaxation mechanism with an optimal resampling strategy to enhance the inference efficiency for autoregressive image generation. By leveraging the informational uncertainty inherent in different regions of an image, CSD dynamically adjusts the acceptance probability of candidate tokens, increasing the acceptance rate in low-detail areas to accelerate generation. Moreover, a distribution alignment filter is introduced to ensure the output distribution to be aligned with the target model, which significantly improves the generative quality. Experiments conducted on Lumina-mGPT and Janus-Pro demonstrate that the superiority of the proposed CSD. Our source code is available at https://github.com/aderfebr/CSD.", "arxiv_id": "2606.27829", "arxiv_url": "https://arxiv.org/abs/2606.27829", "authors": ["Mingcheng Wang", "Junbo Qiao", "Yunchen Li", "Lingfu Jiang", "Wei Li", "Jie Hu", "Jiao Xie", "Zhou Yu", "Xinghao Chen", "Guixu Zhang", "Shaohui Lin"], "brief": "\u63d0\u51faCSD\u7b97\u6cd5\uff0c\u5c06\u57fa\u4e8e\u71b5\u7684\u6982\u7387\u677e\u5f1b\u673a\u5236\u4e0e\u6700\u4f18\u91cd\u91c7\u6837\u7b56\u7565\u7ed3\u5408\uff0c\u9488\u5bf9\u56fe\u50cf\u4e0d\u540c\u533a\u57df\u7684\u4fe1\u606f\u4e0d\u786e\u5b9a\u6027\u52a8\u6001\u8c03\u6574\u5019\u9009token\u63a5\u53d7\u6982\u7387\uff0c\u5728\u52a0\u901f\u81ea\u56de\u5f52\u56fe\u50cf\u751f\u6210\u7684\u540c\u65f6\u4fdd\u6301\u751f\u6210\u8d28\u91cf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27829", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5229\u7528\u56fe\u50cf\u533a\u57df\u71b5\u503c\u8861\u91cf\u4fe1\u606f\u4e0d\u786e\u5b9a\u6027\uff0c\u5728\u4f4e\u7ec6\u8282\u533a\u57df\u63d0\u9ad8token\u63a5\u53d7\u7387\u4ee5\u52a0\u901f\u751f\u6210", "\u5f15\u5165\u5206\u5e03\u5bf9\u9f50\u6ee4\u6ce2\u5668\uff0c\u786e\u4fdd\u8f93\u51fa\u5206\u5e03\u4e0e\u76ee\u6807\u6a21\u578b\u5bf9\u9f50\uff0c\u907f\u514d\u56fe\u50cf\u8d28\u91cf\u4e0b\u964d", "\u5728Lumina-mGPT\u548cJanus-Pro\u4e0a\u9a8c\u8bc1\uff0c\u4f18\u4e8e\u73b0\u6709\u63a8\u6d4b\u89e3\u7801\u65b9\u6cd5"], "keywords": ["\u56fe\u50cf\u751f\u6210", "\u63a8\u6d4b\u89e3\u7801", "\u81ea\u56de\u5f52\u6a21\u578b", "\u63a8\u7406\u52a0\u901f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27829v1", "published_at": "2026-06-26", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "CSD: Content-aware Speculative Decoding for Efficient Image Generation", "tldr": "\u63d0\u51fa\u5185\u5bb9\u611f\u77e5\u63a8\u6d4b\u89e3\u7801\u7b97\u6cd5CSD\uff0c\u901a\u8fc7\u71b5\u81ea\u9002\u5e94\u63a5\u53d7\u6982\u7387\u52a0\u901f\u81ea\u56de\u5f52\u56fe\u50cf\u751f\u6210", "upvotes": 0, "what_it_is": "\u63d0\u51faCSD\u7b97\u6cd5\uff0c\u5c06\u57fa\u4e8e\u71b5\u7684\u6982\u7387\u677e\u5f1b\u673a\u5236\u4e0e\u6700\u4f18\u91cd\u91c7\u6837\u7b56\u7565\u7ed3\u5408\uff0c\u9488\u5bf9\u56fe\u50cf\u4e0d\u540c\u533a\u57df\u7684\u4fe1\u606f\u4e0d\u786e\u5b9a\u6027\u52a8\u6001\u8c03\u6574\u5019\u9009token\u63a5\u53d7\u6982\u7387\uff0c\u5728\u52a0\u901f\u81ea\u56de\u5f52\u56fe\u50cf\u751f\u6210\u7684\u540c\u65f6\u4fdd\u6301\u751f\u6210\u8d28\u91cf\u3002", "why_notable": "\u89e3\u51b3\u4e86\u63a8\u6d4b\u89e3\u7801\u5728\u56fe\u50cf\u751f\u6210\u9886\u57df\u63a5\u53d7\u7387\u4f4e\u4e14\u76f4\u63a5\u653e\u5bbd\u6807\u51c6\u5bfc\u81f4\u8d28\u91cf\u4e0b\u964d\u7684\u6838\u5fc3\u77db\u76fe\uff0c\u517c\u987e\u6548\u7387\u4e0e\u8d28\u91cf\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The transition from static chat bots to autonomous agents--equipped with persistent memory, tool-use protocols, and multi-agent collaboration--has fundamentally expanded the AI threat landscape. Current defense mechanisms, such as perimeter security and training-time alignment, remain external to the agent\u0027s active reasoning loop. Consequently, they fall short: a fully aligned agent remains highly vulnerable to runtime hijacking via memory poisoning, tool-chain manipulation, or multi-agent protocol attacks. To address this critical gap, we introduce the Agent-Native Immune System (ANIS), the first biologically inspired, endogenous defense architecture embedded directly within the agent\u0027s cognitive loop. Our framework presents four primary contributions. First, we design a six-layer Immune Tower (L0-L5), distinctly incorporating Barrier Immunity (L1) as a non-cognitive, physical-and-logical isolation layer. Second, we establish a unified taxonomy of Agent Viruses and Agent Vaccines, formalizing the critical distinction between superficial non-parametric defenses and robust parametric vaccines. Third, we conceptualize the Harness Triad--Meta, Self, and Auto--a self-monitoring, meta-cognitive automation backbone that drives Continual Immune Learning (CIL), enabling vaccines to dynamically adapt to novel threats. Finally, we establish a rigorous theoretical demarcation between model alignment and agent immunity: while alignment provides a static \"constitutional\" value foundation during training, ANIS serves as the dynamic \"law enforcement\" mechanism during runtime. We conclude by framing open challenges for the field, including immune protocol standardization, novel evaluation metrics such as the Autoimmunity Rate (false-positive intervention rate), and the co-evolutionary dynamics between pathogens and vaccines within collective intelligence ecosystems.", "arxiv_id": "2606.28270", "arxiv_url": "https://arxiv.org/abs/2606.28270", "authors": ["Bo Shen", "Lifeng Chang", "Tianyuan Wei", "Yunpeng Li", "Feng Shi", "Yichen Han", "Peijie Gao", "Shiyi Kuang", "Xin Chang", "Dehui Li"], "brief": "\u63d0\u51fa\u300c\u667a\u80fd\u4f53\u539f\u751f\u514d\u75ab\u7cfb\u7edf\u300d\uff08ANIS\uff09\uff0c\u5c06\u9632\u5fa1\u673a\u5236\u76f4\u63a5\u5d4c\u5165\u667a\u80fd\u4f53\u7684\u8ba4\u77e5\u63a8\u7406\u5faa\u73af\u4e2d\uff0c\u800c\u975e\u4f9d\u8d56\u5916\u90e8\u8fb9\u754c\u5b89\u5168\u6216\u8bad\u7ec3\u65f6\u5bf9\u9f50\u3002\u8be5\u67b6\u6784\u5305\u542b\u516d\u5c42\u514d\u75ab\u5854\u3001\u667a\u80fd\u4f53\u75c5\u6bd2/\u75ab\u82d7\u5206\u7c7b\u4f53\u7cfb\u53ca\u6301\u7eed\u514d\u75ab\u5b66\u4e60\u673a\u5236\uff0c\u5f25\u8865\u4e86\u8fd0\u884c\u65f6\u8bb0\u5fc6\u6295\u6bd2\u3001\u5de5\u5177\u94fe\u64cd\u63a7\u7b49\u653b\u51fb\u7684\u9632\u5fa1\u7a7a\u767d\u3002", "categories": ["cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28270", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "AI\u5b89\u5168", "\u591a\u667a\u80fd\u4f53", "\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28270v1", "published_at": "2026-06-26", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agent-Native Immune System: Architecture, Taxonomy, and Engineering", "tldr": "\u63d0\u51fa\u300c\u667a\u80fd\u4f53\u539f\u751f\u514d\u75ab\u7cfb\u7edf\u300d\uff08ANIS\uff09\uff0c\u5c06\u9632\u5fa1\u673a\u5236\u76f4\u63a5\u5d4c\u5165\u667a\u80fd\u4f53\u7684\u8ba4\u77e5\u63a8\u7406\u5faa\u73af\u4e2d\uff0c\u800c\u975e\u4f9d\u8d56\u5916\u90e8\u8fb9\u754c\u5b89\u5168\u6216\u8bad\u7ec3\u65f6\u5bf9\u9f50\u3002\u8be5\u67b6\u6784\u5305\u542b\u516d\u5c42\u514d\u75ab\u5854\u3001\u667a\u80fd\u4f53\u75c5\u6bd2/\u75ab\u82d7\u5206\u7c7b\u4f53\u7cfb\u53ca\u6301\u7eed\u514d\u75ab\u5b66\u4e60\u673a\u5236\uff0c\u5f25\u8865\u4e86\u8fd0\u884c\u65f6\u8bb0\u5fc6\u6295\u6bd2\u3001\u5de5\u5177\u94fe\u64cd\u63a7\u7b49\u653b\u51fb\u7684\u9632\u5fa1\u7a7a\u767d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Extracting dynamic 4D object interactions from massive, in-the-wild monocular videos offers a highly efficient data collection pathway for scaling Embodied AI and training VLAs. However, existing monocular 4D reconstruction methods primarily focus on isolated objects, often failing under the severe occlusions and complex dynamics inherent in multi-object interactions. To bridge this gap, we propose HAT-4D, the first agentic framework designed to reconstruct the 3D geometry, temporal dynamics, and physical interactions of multiple objects from a single video. By integrating VLMs with a multi-level human-in-the-loop feedback mechanism, HAT-4D efficiently resolves depth ambiguities and interaction-induced occlusions during 3D generation and 4D propagation, yielding physically plausible assets without relying on expensive multicamera rigs. As a scalable data engine, HAT-4D facilitates the creation of MVOIK-4D, an open-world benchmark for monocular 4D interaction reconstruction, accompanied by a novel multi-dimensional evaluation protocol focused on physical plausibility and temporal consistency. Extensive experiments demonstrate that HAT-4D achieves SOTA performance on most evaluation metrics, while maintaining competitive semantic alignment. Ablation studies show that introducing a small amount of human feedback improves interaction reconstruction. Moreover, the data produced by HAT-4D effectively improves baseline performance when used for fine-tuning. Our data and code are available at https://lijiaxin0111.github.io/HAT4D/", "arxiv_id": "2606.28215", "arxiv_url": "https://arxiv.org/abs/2606.28215", "authors": ["Jiaxin Li", "Yuxiang Wu", "Zhenkai Zhang", "Xinrui Shi", "Haoyuan Wang", "Yichen Zhao", "Su Linxiang", "Chenyang Yu", "Mingyu Zhang", "Yifan Ding", "Boran Wen", "Li Zhang", "Ruiyang Liu", "Yong-Lu Li"], "brief": "\u63d0\u51faHAT-4D\u6846\u67b6\uff0c\u9996\u4e2a\u4ece\u5355\u76ee\u89c6\u9891\u91cd\u5efa\u591a\u7269\u4f534D\u4ea4\u4e92\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u901a\u8fc7\u5c06\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0e\u591a\u5c42\u6b21\u4eba\u673a\u534f\u4f5c\u53cd\u9988\u673a\u5236\u7ed3\u5408\uff0c\u89e3\u51b3\u906e\u6321\u548c\u6df1\u5ea6\u6b67\u4e49\u95ee\u9898\u3002\u6784\u5efa\u4e86\u5f00\u653e\u4e16\u754c\u57fa\u51c6MVOIK-4D\uff0c\u5b9e\u9a8c\u8868\u660e\u5728\u5927\u591a\u6570\u8bc4\u4f30\u6307\u6807\u4e0a\u8fbe\u5230SOTA\u6027\u80fd\uff0c\u5c11\u91cf\u4eba\u5de5\u53cd\u9988\u5373\u53ef\u663e\u8457\u63d0\u5347\u4ea4\u4e92\u91cd\u5efa\u8d28\u91cf\u3002", "categories": ["cs.CV", "cs.AI", "cs.GR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28215", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["4D\u91cd\u5efa", "\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u5177\u8eabAI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28215v1", "published_at": "2026-06-26", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "HAT-4D: Lifting Monocular Video for 4D Multi-Object Interactions via Human-Agent Collaboration", "tldr": "\u63d0\u51faHAT-4D\u6846\u67b6\uff0c\u9996\u4e2a\u4ece\u5355\u76ee\u89c6\u9891\u91cd\u5efa\u591a\u7269\u4f534D\u4ea4\u4e92\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u901a\u8fc7\u5c06\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0e\u591a\u5c42\u6b21\u4eba\u673a\u534f\u4f5c\u53cd\u9988\u673a\u5236\u7ed3\u5408\uff0c\u89e3\u51b3\u906e\u6321\u548c\u6df1\u5ea6\u6b67\u4e49\u95ee\u9898\u3002\u6784\u5efa\u4e86\u5f00\u653e\u4e16\u754c\u57fa\u51c6MVOIK-4D\uff0c\u5b9e\u9a8c\u8868\u660e\u5728\u5927\u591a\u6570\u8bc4\u4f30\u6307\u6807\u4e0a\u8fbe\u5230SOTA\u6027\u80fd\uff0c\u5c11\u91cf\u4eba\u5de5\u53cd\u9988\u5373\u53ef\u663e\u8457\u63d0\u5347\u4ea4\u4e92\u91cd\u5efa\u8d28\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Identifying robust associations between cardiac imaging phenotypes and clinical diseases is fundamental to population-scale cardiovascular research and reliable risk stratification. However, current phenome-wide association studies rely on pre-defined, single-variable phenotypes or expert-crafted features, which limits their ability to capture clinically meaningful non-linear effects and cross-phenotype interactions. To address this, we propose CPAgents, an iterative phenotype-Composition framework for cardiovascular Phenome-wide association study (PheWAS) that automatically constructs and validates interpretable composite phenotypes (e.g., polynomial, ratio, and interaction forms) from base imaging features. Specifically, our system coordinates three agents: (i) an Analyst that identifies statistical pathologies and nominates candidate transformations; (ii) a Proposer that generates constrained, medically and statistically motivated expressions under numerical safety rules; and (iii) a Verifier that evaluates candidates using multi-stage criteria and produces transparent evidence trails for accepted phenotypes. Evaluated on a population-scale cardiac imaging cohort, the discovered composite phenotypes markedly improve disease discrimination: across 72 classifier-disease-metric combinations, our variants achieve the top rank in 56 cases versus 18 for baselines, with gains observed across all nine clinical disease categories. Our framework yields compact, clinically interpretable phenotype formulas with transparent evidence trails, enabling scalable discovery of stronger phenotype-disease associations beyond expert-driven feature selection.", "arxiv_id": "2606.28179", "arxiv_url": "https://arxiv.org/abs/2606.28179", "authors": ["Zuoou Li", "Wenlong Zhao", "Kelly Yu", "Weitong Zhang", "Paul M. Matthews", "Wenjia Bai", "Bernhard Kainz", "Mengyun Qiao"], "brief": "\u63d0\u51faCPAgents\u6846\u67b6\uff0c\u901a\u8fc7\u4e09\u4e2a\u534f\u4f5c\u667a\u80fd\u4f53\uff08\u5206\u6790\u5e08\u3001\u63d0\u8bae\u8005\u3001\u9a8c\u8bc1\u8005\uff09\u81ea\u52a8\u6784\u5efa\u53ef\u89e3\u91ca\u7684\u590d\u5408\u5fc3\u810f\u5f71\u50cf\u8868\u578b\uff08\u591a\u9879\u5f0f\u3001\u6bd4\u503c\u3001\u4ea4\u4e92\u5f62\u5f0f\uff09\uff0c\u7528\u4e8e\u5fc3\u810f\u75c5\u5168\u8868\u578b\u7ec4\u5173\u8054\u7814\u7a76\u3002\u572872\u4e2a\u5206\u7c7b\u5668-\u75be\u75c5-\u6307\u6807\u7ec4\u5408\u4e2d\uff0c\u8be5\u65b9\u6cd5\u572856\u4e2a\u573a\u666f\u4e0b\u6392\u540d\u7b2c\u4e00\uff0c\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\u768418\u4e2a\uff0c\u8986\u76d6\u5168\u90e89\u7c7b\u4e34\u5e8a\u75be\u75c5\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28179", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u533b\u5b66\u5f71\u50cf", "\u8868\u578b\u53d1\u73b0", "\u5fc3\u810f\u75c5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28179v1", "published_at": "2026-06-26", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "CPAgents: Agentic Composite Phenotype Generation for Cardiac Disease Association", "tldr": "\u63d0\u51faCPAgents\u6846\u67b6\uff0c\u901a\u8fc7\u4e09\u4e2a\u534f\u4f5c\u667a\u80fd\u4f53\uff08\u5206\u6790\u5e08\u3001\u63d0\u8bae\u8005\u3001\u9a8c\u8bc1\u8005\uff09\u81ea\u52a8\u6784\u5efa\u53ef\u89e3\u91ca\u7684\u590d\u5408\u5fc3\u810f\u5f71\u50cf\u8868\u578b\uff08\u591a\u9879\u5f0f\u3001\u6bd4\u503c\u3001\u4ea4\u4e92\u5f62\u5f0f\uff09\uff0c\u7528\u4e8e\u5fc3\u810f\u75c5\u5168\u8868\u578b\u7ec4\u5173\u8054\u7814\u7a76\u3002\u572872\u4e2a\u5206\u7c7b\u5668-\u75be\u75c5-\u6307\u6807\u7ec4\u5408\u4e2d\uff0c\u8be5\u65b9\u6cd5\u572856\u4e2a\u573a\u666f\u4e0b\u6392\u540d\u7b2c\u4e00\uff0c\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\u768418\u4e2a\uff0c\u8986\u76d6\u5168\u90e89\u7c7b\u4e34\u5e8a\u75be\u75c5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The widespread collection of fine-grained location data by commercial data brokers creates a re-identification risk that is not widely recognised by the public. While prior research has established that mobility traces are highly unique and that individuals can, in principle, be identified from a handful of spatio-temporal points, such attacks have historically required significant manual effort from skilled analysts, limiting their practical scale. In this feasibility study, we demonstrate in a real world setting that agentic AI fundamentally changes this threat model. We present an end-to-end pipeline in which large language model agents autonomously search the open web, cross-reference public records and social media, and resolve raw coordinate sequences to candidate identities - without human intervention. We evaluate the pipeline on a spatio-temporal dataset containing simulated location points anchored at and around true home and work addresses, focusing on a high-risk disclosure scenario. Our results demonstrate that, from spatio-temporal data and public sources alone, our agentic AI successfully re-identified 18 of the 25 re-identifiable individuals (72%) and 18 of 43 cases overall (41.9%). We discuss implications for Statistical Disclosure Control (SDC) practice and outline the near-future escalation that data custodians and regulators must anticipate. De facto anonymity - an implicit foundation of SDC practice - is shifting. Agentic AI strengthens the case that re-identification is reasonably likely by any means under the GDPR Recital-26 standard, at costs of minutes-and-dollars per target.", "arxiv_id": "2606.27936", "arxiv_url": "https://arxiv.org/abs/2606.27936", "authors": ["Oscar Thees", "Roman M\u00fcller", "Matthias Templ"], "brief": "\u672c\u7814\u7a76\u5c55\u793a\u4e86\u667a\u80fd\u4f53AI\u5982\u4f55\u81ea\u52a8\u5316\u5730\u5bf9\u79fb\u52a8\u8f68\u8ff9\u5fae\u6570\u636e\u8fdb\u884c\u91cd\u8bc6\u522b\u653b\u51fb\uff1aLLM\u667a\u80fd\u4f53\u81ea\u4e3b\u641c\u7d22\u516c\u5f00\u7f51\u7edc\u3001\u4ea4\u53c9\u6bd4\u5bf9\u793e\u4ea4\u5a92\u4f53\u548c\u516c\u5171\u8bb0\u5f55\uff0c\u65e0\u9700\u4eba\u5de5\u5e72\u9884\u5373\u53ef\u5c06\u5750\u6807\u5e8f\u5217\u5173\u8054\u5230\u771f\u5b9e\u8eab\u4efd\u3002\u572825\u540d\u53ef\u91cd\u8bc6\u522b\u4e2a\u4f53\u4e2d\u6210\u529f\u8bc6\u522b18\u4eba\uff0872%\uff09\uff0c\u8868\u660eAI\u5927\u5e45\u964d\u4f4e\u4e86\u91cd\u8bc6\u522b\u653b\u51fb\u7684\u95e8\u69db\uff0c\u5bf9\u73b0\u6709\u9690\u79c1\u4fdd\u62a4\u6846\u67b6\uff08\u5982GDPR\uff09\u6784\u6210\u4e25\u5cfb\u6311\u6218\u3002", "categories": ["cs.CR", "cs.AI", "stat.AP"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27936", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u9690\u79c1\u4fdd\u62a4", "\u4f4d\u7f6e\u6570\u636e", "\u91cd\u8bc6\u522b\u653b\u51fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27936v1", "published_at": "2026-06-26", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agentic AI-Powered Re-Identification: An Emerging, Scalable Threat to Mobility Microdata Privacy", "tldr": "\u672c\u7814\u7a76\u5c55\u793a\u4e86\u667a\u80fd\u4f53AI\u5982\u4f55\u81ea\u52a8\u5316\u5730\u5bf9\u79fb\u52a8\u8f68\u8ff9\u5fae\u6570\u636e\u8fdb\u884c\u91cd\u8bc6\u522b\u653b\u51fb\uff1aLLM\u667a\u80fd\u4f53\u81ea\u4e3b\u641c\u7d22\u516c\u5f00\u7f51\u7edc\u3001\u4ea4\u53c9\u6bd4\u5bf9\u793e\u4ea4\u5a92\u4f53\u548c\u516c\u5171\u8bb0\u5f55\uff0c\u65e0\u9700\u4eba\u5de5\u5e72\u9884\u5373\u53ef\u5c06\u5750\u6807\u5e8f\u5217\u5173\u8054\u5230\u771f\u5b9e\u8eab\u4efd\u3002\u572825\u540d\u53ef\u91cd\u8bc6\u522b\u4e2a\u4f53\u4e2d\u6210\u529f\u8bc6\u522b18\u4eba\uff0872%\uff09\uff0c\u8868\u660eAI\u5927\u5e45\u964d\u4f4e\u4e86\u91cd\u8bc6\u522b\u653b\u51fb\u7684\u95e8\u69db\uff0c\u5bf9\u73b0\u6709\u9690\u79c1\u4fdd\u62a4\u6846\u67b6\uff08\u5982GDPR\uff09\u6784\u6210\u4e25\u5cfb\u6311\u6218\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Training small language-model agents for long-horizon interactive tasks requires both fast imitation and reward-driven improvement. On-policy distillation (OPD) provides dense teacher guidance and typically improves rapidly in the early stage, but its gains saturate once the student approaches the teacher, limiting the final performance ceiling. Reinforcement learning (RL) directly optimizes environment rewards and encourages exploratory improvement toward a higher reward-defined ceiling, but sparse and delayed feedback makes early-stage learning much less efficient than OPD. In this paper, we propose ATOD (Annealed Turn-aware On-policy Distillation), a hybrid online distillation algorithm that explicitly exploits this complementarity. (1) ATOD uses an annealed OPD-RL schedule: OPD dominates early training to approach teacher-level behavior, while RL is gradually strengthened to drive reward-based exploration. (2) ATOD introduces Turn-level Disagreement-Uncertainty Reweighting (T-DUR), which softly amplifies high-utility turns and improves dense supervision in long trajectories. Experiments on ALFWorld, WebShop, and Search-QA show that ATOD consistently outperforms competing post-training baselines: across the three student sizes, ATOD improves average success rate by 3.03 points over OPD and 23.62 points over GRPO, while surpassing the corresponding teacher models by 2.16 points.", "arxiv_id": "2606.27814", "arxiv_url": "https://arxiv.org/abs/2606.27814", "authors": ["Qitai Tan", "Zefang Zong", "Yang Li", "Peng Chen"], "brief": "\u63d0\u51faATOD\u7b97\u6cd5\uff0c\u7ed3\u5408\u9000\u706b\u5f0f\u5728\u7ebf\u84b8\u998f\u4e0e\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u5c0f\u578b\u8bed\u8a00\u6a21\u578b\u667a\u80fd\u4f53\uff1a\u65e9\u671f\u7528\u6559\u5e08\u84b8\u998f\u5feb\u901f\u6536\u655b\uff0c\u540e\u671f\u9010\u6b65\u589e\u5f3aRL\u63a2\u7d22\u7a81\u7834\u6027\u80fd\u4e0a\u9650\uff1b\u540c\u65f6\u5f15\u5165\u8f6e\u7ea7\u4e0d\u786e\u5b9a\u6027\u91cd\u52a0\u6743\u673a\u5236\u4f18\u5316\u957f\u8f68\u8ff9\u76d1\u7763\u3002\u5728ALFWorld\u3001WebShop\u7b49\u4efb\u52a1\u4e0a\u5e73\u5747\u6210\u529f\u7387\u6bd4GRPO\u9ad823.62\u5206\uff0c\u751a\u81f3\u8d85\u8d8a\u6559\u5e08\u6a21\u578b2.16\u5206\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27814", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27814v1", "published_at": "2026-06-26", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "ATOD: Annealed Turn-aware On-policy Distillation for Multi-turn Autonomous Agents", "tldr": "\u63d0\u51faATOD\u7b97\u6cd5\uff0c\u7ed3\u5408\u9000\u706b\u5f0f\u5728\u7ebf\u84b8\u998f\u4e0e\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u5c0f\u578b\u8bed\u8a00\u6a21\u578b\u667a\u80fd\u4f53\uff1a\u65e9\u671f\u7528\u6559\u5e08\u84b8\u998f\u5feb\u901f\u6536\u655b\uff0c\u540e\u671f\u9010\u6b65\u589e\u5f3aRL\u63a2\u7d22\u7a81\u7834\u6027\u80fd\u4e0a\u9650\uff1b\u540c\u65f6\u5f15\u5165\u8f6e\u7ea7\u4e0d\u786e\u5b9a\u6027\u91cd\u52a0\u6743\u673a\u5236\u4f18\u5316\u957f\u8f68\u8ff9\u76d1\u7763\u3002\u5728ALFWorld\u3001WebShop\u7b49\u4efb\u52a1\u4e0a\u5e73\u5747\u6210\u529f\u7387\u6bd4GRPO\u9ad823.62\u5206\uff0c\u751a\u81f3\u8d85\u8d8a\u6559\u5e08\u6a21\u578b2.16\u5206\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "World models for language agents come in two useful forms. An agent-based world model calls an LLM API and reasons flexibly in language, but its errors appear as hallucinated state changes that are hard to score with ordinary regression losses. A parameterized world model is a trained transition predictor; its errors are easier to measure with quantities such as NodeMSE, delta accuracy, and validity accuracy, but it is usually weaker as a standalone planner. We compare these two families on four graph-structured planning benchmarks and introduce operational hallucination metrics for the agent-based case. The comparison motivates \\textbf{Grounded Iterative Language Planning} (GILP), which trains only a small parameterized backbone and combines it with API-based agent reasoning. The backbone supplies valid actions, predicted state deltas, risk, and value; the LLM drafts an action and imagined delta; and a consistency gate asks for revision when the two disagree. On real GPT-4o-mini calls, GILP reduces hallucinated-state rate from 0.176 to 0.035. In calibrated simulator ablations, it raises success from 0.668 to 0.838 while adding only ~22% extra LLM calls.", "arxiv_id": "2606.27806", "arxiv_url": "https://arxiv.org/abs/2606.27806", "authors": ["Xinyuan Song", "Zekun Cai"], "brief": "\u63d0\u51faGILP\u6846\u67b6\uff0c\u7ed3\u5408\u5c0f\u578b\u53c2\u6570\u5316\u4e16\u754c\u6a21\u578b\u4e0eLLM\u63a8\u7406\uff1a\u53c2\u6570\u5316\u9aa8\u5e72\u7f51\u7edc\u63d0\u4f9b\u5408\u6cd5\u52a8\u4f5c\u548c\u72b6\u6001\u9884\u6d4b\uff0cLLM\u751f\u6210\u52a8\u4f5c\u8349\u6848\uff0c\u4e00\u81f4\u6027\u95e8\u63a7\u673a\u5236\u5728\u4e24\u8005\u4e0d\u4e00\u81f4\u65f6\u8981\u6c42\u4fee\u6b63\u3002\u5728GPT-4o-mini\u4e0a\u5c06\u5e7b\u89c9\u72b6\u6001\u7387\u4ece0.176\u964d\u81f30.035\uff0c\u4efb\u52a1\u6210\u529f\u7387\u4ece0.668\u63d0\u5347\u81f30.838\uff0c\u4ec5\u589e\u52a0\u7ea622%\u7684LLM\u8c03\u7528\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27806", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5e7b\u89c9\u6291\u5236", "\u4e16\u754c\u6a21\u578b", "\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27806v1", "published_at": "2026-06-26", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Grounded Iterative Language Planning: How Parameterized World Models Reduce Hallucination Propagation in LLM Agents", "tldr": "\u63d0\u51faGILP\u6846\u67b6\uff0c\u7ed3\u5408\u5c0f\u578b\u53c2\u6570\u5316\u4e16\u754c\u6a21\u578b\u4e0eLLM\u63a8\u7406\uff1a\u53c2\u6570\u5316\u9aa8\u5e72\u7f51\u7edc\u63d0\u4f9b\u540
