8\u6cd5\u52a8\u4f5c\u548c\u72b6\u6001\u9884\u6d4b\uff0cLLM\u751f\u6210\u52a8\u4f5c\u8349\u6848\uff0c\u4e00\u81f4\u6027\u95e8\u63a7\u673a\u5236\u5728\u4e24\u8005\u4e0d\u4e00\u81f4\u65f6\u8981\u6c42\u4fee\u6b63\u3002\u5728GPT-4o-mini\u4e0a\u5c06\u5e7b\u89c9\u72b6\u6001\u7387\u4ece0.176\u964d\u81f30.035\uff0c\u4efb\u52a1\u6210\u529f\u7387\u4ece0.668\u63d0\u5347\u81f30.838\uff0c\u4ec5\u589e\u52a0\u7ea622%\u7684LLM\u8c03\u7528\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Social media popularity prediction aims to forecast the future reach or influence of online content from early-stage observations. Accurate prediction enables key downstream applications, such as advertising optimization and strategic content planning by users, creators, and platforms. Despite substantial progress, existing popularity prediction works often fail to jointly consider multimodal content and temporal social interaction signals. Moreover, the literature remains highly fragmented across datasets, modalities, observation windows, prediction targets, and evaluation protocols. This fragmentation prevents fair comparison and obscures a systematic understanding of how textual, visual, temporal, and interaction-based signals jointly shape popularity dynamics. To address these challenges, we introduce MMG-Pop, a Multi-modal Graph-based Popularity Prediction benchmark, which unifies datasets, modalities, temporal interaction signals, and representative baselines under a standardized evaluation protocol. Furthermore, we propose MMG-PopNet, a unified multi-modal graph-based network that jointly models the aforementioned multi-modal signals and graph-structured social interactions. Extensive experiments on MMG-Pop, comprising four datasets across Bluesky and Reddit platforms, demonstrate the superior performance of MMG-PopNet and yield new insights into cross-platform training generalization, multi-task prediction benefits, multi-modality contributions, and LLM prediction limitation. These findings establish a unified foundation for future research on social dynamics modeling and intervention under heterogeneous modalities and socially-aware agentic ecosystem paradigms.", "arxiv_id": "2606.27539", "arxiv_url": "https://arxiv.org/abs/2606.27539", "authors": ["Utkarsh Sahu", "Zhisheng Qi", "Li Zhu", "Yizhao Yang", "Jun Li", "Ryan Rossi", "Yu Wang"], "brief": "\u63d0\u51faMMG-Pop\u57fa\u51c6\u6d4b\u8bd5\u6846\u67b6\uff0c\u7edf\u4e00\u4e86\u793e\u4ea4\u5a92\u4f53\u6d41\u884c\u5ea6\u9884\u6d4b\u7684\u6570\u636e\u96c6\u3001\u6a21\u6001\u548c\u8bc4\u4f30\u534f\u8bae\uff1b\u540c\u65f6\u63d0\u51faMMG-PopNet\uff0c\u8054\u5408\u5efa\u6a21\u591a\u6a21\u6001\u5185\u5bb9\u4e0e\u56fe\u7ed3\u6784\u793e\u4ea4\u4ea4\u4e92\u4fe1\u53f7\uff0c\u5728Bluesky\u548cReddit\u56db\u4e2a\u6570\u636e\u96c6\u4e0a\u53d6\u5f97\u4f18\u8d8a\u6027\u80fd\uff0c\u5e76\u63ed\u793a\u4e86\u8de8\u5e73\u53f0\u6cdb\u5316\u3001\u591a\u4efb\u52a1\u5b66\u4e60\u53caLLM\u9884\u6d4b\u5c40\u9650\u6027\u7b49\u65b0\u89c1\u89e3\u3002", "categories": ["cs.SI", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27539", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u56fe\u795e\u7ecf\u7f51\u7edc", "\u793e\u4ea4\u5a92\u4f53", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27539v1", "published_at": "2026-06-25", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Benchmarking Multi-Modal Graph-based Social Media Popularity Prediction", "tldr": "\u63d0\u51faMMG-Pop\u57fa\u51c6\u6d4b\u8bd5\u6846\u67b6\uff0c\u7edf\u4e00\u4e86\u793e\u4ea4\u5a92\u4f53\u6d41\u884c\u5ea6\u9884\u6d4b\u7684\u6570\u636e\u96c6\u3001\u6a21\u6001\u548c\u8bc4\u4f30\u534f\u8bae\uff1b\u540c\u65f6\u63d0\u51faMMG-PopNet\uff0c\u8054\u5408\u5efa\u6a21\u591a\u6a21\u6001\u5185\u5bb9\u4e0e\u56fe\u7ed3\u6784\u793e\u4ea4\u4ea4\u4e92\u4fe1\u53f7\uff0c\u5728Bluesky\u548cReddit\u56db\u4e2a\u6570\u636e\u96c6\u4e0a\u53d6\u5f97\u4f18\u8d8a\u6027\u80fd\uff0c\u5e76\u63ed\u793a\u4e86\u8de8\u5e73\u53f0\u6cdb\u5316\u3001\u591a\u4efb\u52a1\u5b66\u4e60\u53caLLM\u9884\u6d4b\u5c40\u9650\u6027\u7b49\u65b0\u89c1\u89e3\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Operations Research (OR) provides a rigorous framework for high-stakes decision-making, but effective OR modeling requires substantial domain knowledge, mathematical abstraction, and solver expertise. Recent LLM-based systems automate parts of this pipeline, yet remain limited by low accuracy on complex problems, opaque outputs, and narrow solver support. We propose COOPA (COoperative OPerations Agent), a modular LLM-agent architecture for interpretable and scalable OR decision support. It combines three components: iterative confidence-based modeling, which generates multiple candidate formulations, self-evaluates them across modeling dimensions, and selects one using a max-min confidence criterion; element-level provenance and confidence explanations, which link variables, parameters, constraints, and objectives to quoted source text and provide an audit trail for human verification; and multi-solver routing to specialized optimizer agents for different OR problem classes. Across three OR benchmarks, eight LLM backbones, and four baselines under identical conditions, COOPA achieves the best macro-average accuracy on six of eight backbones and improves over the strongest baseline by up to 6.7 percentage points. A within-system ablation isolates the contribution of iterative confidence-based modeling, while additional analyses and case studies illustrate the value of source traceability and multi-solver dispatch.", "arxiv_id": "2606.27611", "arxiv_url": "https://arxiv.org/abs/2606.27611", "authors": ["Chuanhao Li", "Xiaoan Xu", "Dirk Bergemann", "Ethan X. Fang", "Yehua Wei", "Zhuoran Yang"], "brief": "\u63d0\u51faCOOPA\u6a21\u5757\u5316LLM\u667a\u80fd\u4f53\u67b6\u6784\uff0c\u7528\u4e8e\u8fd0\u7b79\u5b66\u95ee\u9898\u7684\u81ea\u52a8\u5efa\u6a21\u4e0e\u6c42\u89e3\u3002\u901a\u8fc7\u8fed\u4ee3\u7f6e\u4fe1\u5ea6\u5efa\u6a21\u3001\u5143\u7d20\u7ea7\u6eaf\u6e90\u89e3\u91ca\u548c\u591a\u6c42\u89e3\u5668\u8def\u7531\u4e09\u4e2a\u6a21\u5757\uff0c\u5728\u4e09\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u76f8\u6bd4\u6700\u5f3a\u57fa\u7ebf\u63d0\u5347\u6700\u9ad86.7\u4e2a\u767e\u5206\u70b9\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27611", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8fd0\u7b79\u5b66", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27611v1", "published_at": "2026-06-25", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "COOPA: A Modular LLM Agent Architecture for Operations Research Problems", "tldr": "\u63d0\u51faCOOPA\u6a21\u5757\u5316LLM\u667a\u80fd\u4f53\u67b6\u6784\uff0c\u7528\u4e8e\u8fd0\u7b79\u5b66\u95ee\u9898\u7684\u81ea\u52a8\u5efa\u6a21\u4e0e\u6c42\u89e3\u3002\u901a\u8fc7\u8fed\u4ee3\u7f6e\u4fe1\u5ea6\u5efa\u6a21\u3001\u5143\u7d20\u7ea7\u6eaf\u6e90\u89e3\u91ca\u548c\u591a\u6c42\u89e3\u5668\u8def\u7531\u4e09\u4e2a\u6a21\u5757\uff0c\u5728\u4e09\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u76f8\u6bd4\u6700\u5f3a\u57fa\u7ebf\u63d0\u5347\u6700\u9ad86.7\u4e2a\u767e\u5206\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Physical or operational constraints often impose communications limitations on autonomous agents. Such limitations complicate monitoring or multiagent coordination. Even when strong communications are absent, some information may still be available. The remainder of the relevant agent state may be reconstructed via estimation. The actions taken by an agent are a potential source of information -- as the agent interacts with the environment, these actions may be observed even in the absence of explicit communication. We investigate using actions to estimate the state of an agent, using reinforcement learning to develop policies which make the estimation problem more tractable. Policy observability is encouraged through the training reward and is analyzed using simulation of the trained agent. In an aircraft tracking problem a policy with enhanced observability is found that has minimal impact on nominal task performance.", "arxiv_id": "2606.27609", "arxiv_url": "https://arxiv.org/abs/2606.27609", "authors": ["Andres Enriquez Fernandez", "John J. Bird"], "brief": "\u7814\u7a76\u5728\u901a\u4fe1\u53d7\u9650\u6761\u4ef6\u4e0b\uff0c\u901a\u8fc7\u89c2\u5bdf\u667a\u80fd\u4f53\u7684\u52a8\u4f5c\u6765\u4f30\u8ba1\u5176\u5185\u90e8\u72b6\u6001\u7684\u65b9\u6cd5\u3002\u5229\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u7b56\u7565\uff0c\u4f7f\u667a\u80fd\u4f53\u7684\u52a8\u4f5c\u66f4\u5177\u53ef\u89c2\u6d4b\u6027\uff0c\u4ece\u800c\u4fbf\u4e8e\u72b6\u6001\u4f30\u8ba1\uff0c\u5e76\u5728\u98de\u673a\u8ffd\u8e2a\u4efb\u52a1\u4e2d\u9a8c\u8bc1\u4e86\u8be5\u65b9\u6cd5\u5bf9\u4e3b\u4efb\u52a1\u6027\u80fd\u5f71\u54cd\u6781\u5c0f\u3002", "categories": ["cs.LG", "eess.SY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27609", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u72b6\u6001\u4f30\u8ba1", "\u53ef\u89c2\u6d4b\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27609v1", "published_at": "2026-06-25", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Training Observable Control Policies to Expose Agent State Through Actions", "tldr": "\u7814\u7a76\u5728\u901a\u4fe1\u53d7\u9650\u6761\u4ef6\u4e0b\uff0c\u901a\u8fc7\u89c2\u5bdf\u667a\u80fd\u4f53\u7684\u52a8\u4f5c\u6765\u4f30\u8ba1\u5176\u5185\u90e8\u72b6\u6001\u7684\u65b9\u6cd5\u3002\u5229\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u7b56\u7565\uff0c\u4f7f\u667a\u80fd\u4f53\u7684\u52a8\u4f5c\u66f4\u5177\u53ef\u89c2\u6d4b\u6027\uff0c\u4ece\u800c\u4fbf\u4e8e\u72b6\u6001\u4f30\u8ba1\uff0c\u5e76\u5728\u98de\u673a\u8ffd\u8e2a\u4efb\u52a1\u4e2d\u9a8c\u8bc1\u4e86\u8be5\u65b9\u6cd5\u5bf9\u4e3b\u4efb\u52a1\u6027\u80fd\u5f71\u54cd\u6781\u5c0f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reconstructing humans in dynamic scenes from moving monocular cameras remains challenging due to scale ambiguity, human-scene misalignment, and occlusion interference. Rather than treating human mesh recovery and scene reconstruction as separate tasks, we believe that accurate human-scene reconstruction requires the two tasks to mutually inform each other: parametric human models offer semantic structure and metric-scale priors, while scene geometry provides spatial context for human localization and alignment. Built on this insight, we introduce SHOW, a mask-promptable human mesh recovery framework that couples feed-forward 3D scene reconstruction with Human Mesh Recovery in a unified metric space. SHOW injects human semantics and scale priors from parametric human models into normalized point-map prediction, enabling metric-scale scene reconstruction from inherently scale-ambiguous monocular input. In turn, the recovered scene geometry constrains human mesh estimation, encouraging spatially consistent human placement and improved human-scene alignment. To handle complex multi-person and cluttered scenes, SHOW further incorporates a promptable masking mechanism that enables flexible target-human selection while suppressing background distractions and occlusion interference. Through joint training, the model learns both human-aware geometric features and geometry-constrained human features, producing aligned metric-scale reconstructions from monocular human-centric videos. Extensive experiments demonstrate that SHOW improves metric-scale consistency, human-scene alignment, and reconstruction accuracy under challenging camera motion, occlusion, and cluttered backgrounds.", "arxiv_id": "2606.27720", "arxiv_url": "https://arxiv.org/abs/2606.27720", "authors": ["Boao Shi", "Qiao Feng", "Yiming Huang", "Lingjie Liu"], "brief": "\u63d0\u51faSHOW\u6846\u67b6\uff0c\u5c06\u4eba\u4f53\u7f51\u683c\u6062\u590d\u4e0e\u573a\u666f\u4e09\u7ef4\u91cd\u5efa\u7edf\u4e00\u5728\u540c\u4e00\u5ea6\u91cf\u7a7a\u95f4\u4e2d\u8054\u5408\u5efa\u6a21\uff0c\u5229\u7528\u53c2\u6570\u5316\u4eba\u4f53\u6a21\u578b\u63d0\u4f9b\u8bed\u4e49\u548c\u5c3a\u5ea6\u5148\u9a8c\uff0c\u540c\u65f6\u4ee5\u573a\u666f\u51e0\u4f55\u7ea6\u675f\u4eba\u4f53\u4f4d\u7f6e\u4f30\u8ba1\u3002\u5b9e\u9a8c\u8868\u660e\uff0cSHOW\u5728\u5355\u76ee\u89c6\u9891\u4e2d\u663e\u8457\u63d0\u5347\u4e86\u5ea6\u91cf\u5c3a\u5ea6\u4e00\u81f4\u6027\u3001\u4eba\u573a\u5bf9\u9f50\u7cbe\u5ea6\u548c\u906e\u6321\u9c81\u68d2\u6027\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27720", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e09\u7ef4\u91cd\u5efa", "\u4eba\u4f53\u59ff\u6001\u4f30\u8ba1", "\u5355\u76ee\u89c6\u89c9", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27720v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Scene and Human in One World: Reconstruction in a Feedforward Pass", "tldr": "\u63d0\u51faSHOW\u6846\u67b6\uff0c\u5c06\u4eba\u4f53\u7f51\u683c\u6062\u590d\u4e0e\u573a\u666f\u4e09\u7ef4\u91cd\u5efa\u7edf\u4e00\u5728\u540c\u4e00\u5ea6\u91cf\u7a7a\u95f4\u4e2d\u8054\u5408\u5efa\u6a21\uff0c\u5229\u7528\u53c2\u6570\u5316\u4eba\u4f53\u6a21\u578b\u63d0\u4f9b\u8bed\u4e49\u548c\u5c3a\u5ea6\u5148\u9a8c\uff0c\u540c\u65f6\u4ee5\u573a\u666f\u51e0\u4f55\u7ea6\u675f\u4eba\u4f53\u4f4d\u7f6e\u4f30\u8ba1\u3002\u5b9e\u9a8c\u8868\u660e\uff0cSHOW\u5728\u5355\u76ee\u89c6\u9891\u4e2d\u663e\u8457\u63d0\u5347\u4e86\u5ea6\u91cf\u5c3a\u5ea6\u4e00\u81f4\u6027\u3001\u4eba\u573a\u5bf9\u9f50\u7cbe\u5ea6\u548c\u906e\u6321\u9c81\u68d2\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "World-action models have shown promising robot-manipulation performance by jointly predicting future visual states and actions. However, existing methods mainly rely on short-term history and short-horizon future prediction, which is insufficient for long-horizon tasks whose correct execution depends on earlier observations and task progress. Such temporally dependent tasks require effective use of complementary temporal information, including recent local context, cross-stage historical events, immediate future dynamics, and global task progress. To address long-term forgetting and poor awareness of the global task state, we introduce DiM-WAM, a memory-augmented world-action model that integrates multi-scale historical context, local future dynamics, and global task progress. The memory extracts compact visual event information from real observations, updates multiple memory banks through independent similarity-based merging, and then reads the bank-identity- and time-embedded long-term context to condition video and action denoising. A progress-supervision objective further encourages memory tokens to encode not only completed historical events but also the current task stage and its implications for the remaining task. On RMBench, DiM-WAM raises average success from 28.4% with LingBot-VA to 69.8%, exceeding the explicit-memory Mem-0 baseline at 42.0%. On four real-world Franka tasks, it improves average stage success from 70.7% to 91.5% and full-task success from 52.5% to 80.0%. Project page: https://wangkai-casia.github.io/dim-wam/{\\texttt{https://wangkai-casia.github.io/dim-wam/}}.", "arxiv_id": "2606.27677", "arxiv_url": "https://arxiv.org/abs/2606.27677", "authors": ["Kai Wang", "Zhaopeng Gu", "Yixiang Chen", "Yuan Xu", "Qisen Ma", "Peng Su", "Zhaowen Li", "Yan Huang", "Liang Wang"], "brief": "\u63d0\u51faDiM-WAM\uff0c\u4e00\u79cd\u589e\u5f3a\u8bb0\u5fc6\u7684\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\uff0c\u901a\u8fc7\u591a\u5c3a\u5ea6\u5386\u53f2\u4e8b\u4ef6\u8bb0\u5fc6\u5e93\u3001\u5c40\u90e8\u672a\u6765\u52a8\u6001\u548c\u5168\u5c40\u4efb\u52a1\u8fdb\u5ea6\u76d1\u7763\uff0c\u89e3\u51b3\u673a\u5668\u4eba\u957f\u65f6\u57df\u64cd\u4f5c\u4efb\u52a1\u4e2d\u7684\u9057\u5fd8\u95ee\u9898\u3002\u5728RMBench\u4e0a\u5c06\u5e73\u5747\u6210\u529f\u7387\u4ece28.4%\u63d0\u5347\u81f369.8%\uff0c\u771f\u5b9eFranka\u673a\u5668\u4eba\u4efb\u52a1\u5168\u6d41\u7a0b\u6210\u529f\u7387\u4ece52.5%\u63d0\u5347\u81f380.0%\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27677", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u4e16\u754c\u6a21\u578b", "\u8bb0\u5fc6\u589e\u5f3a", "\u957f\u65f6\u57df\u4efb\u52a1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27677v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DIM-WAM: World-Action Modeling with Diverse Historical Event Memory", "tldr": "\u63d0\u51faDiM-WAM\uff0c\u4e00\u79cd\u589e\u5f3a\u8bb0\u5fc6\u7684\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\uff0c\u901a\u8fc7\u591a\u5c3a\u5ea6\u5386\u53f2\u4e8b\u4ef6\u8bb0\u5fc6\u5e93\u3001\u5c40\u90e8\u672a\u6765\u52a8\u6001\u548c\u5168\u5c40\u4efb\u52a1\u8fdb\u5ea6\u76d1\u7763\uff0c\u89e3\u51b3\u673a\u5668\u4eba\u957f\u65f6\u57df\u64cd\u4f5c\u4efb\u52a1\u4e2d\u7684\u9057\u5fd8\u95ee\u9898\u3002\u5728RMBench\u4e0a\u5c06\u5e73\u5747\u6210\u529f\u7387\u4ece28.4%\u63d0\u5347\u81f369.8%\uff0c\u771f\u5b9eFranka\u673a\u5668\u4eba\u4efb\u52a1\u5168\u6d41\u7a0b\u6210\u529f\u7387\u4ece52.5%\u63d0\u5347\u81f380.0%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Human motion generation models are fundamentally constrained by the limited diversity of motion capture datasets, which predominantly contain common, repetitive actions and fail to cover the long tail of complex human movements, resulting in a restricted motion vocabulary in learned latent representations and poor generalization to rare, compositional, and highly dynamic motions. In this work, we propose a framework for expanding the motion representation space by leveraging large-scale synthetic human motion, introducing a data generation pipeline that produces diverse, physically plausible motion sequences beyond the distribution of existing datasets and integrating it with a redesigned VQ-VAE tokenizer that adapts to this expanded motion space. Unlike conventional tokenizers trained on narrow data distributions, our approach jointly scales both the training distribution and the discrete codebook, enabling the model to capture a significantly richer set of motion primitives. We demonstrate that training with synthetic motion substantially improves the coverage and compositionality of the learned motion vocabulary, leading to consistent gains across motion generation tasks such as text-to-motion and motion continuation, while remaining fully compatible with existing frameworks including MotionGPT. Our results suggest that the primary bottleneck lies in the limited support of the learned motion representation, rather than model architecture alone. Scaling synthetic motion in tandem with representation learning offers a principled path toward more expressive, controllable, and generalizable human motion synthesis.", "arxiv_id": "2606.27547", "arxiv_url": "https://arxiv.org/abs/2606.27547", "authors": ["Yiwen Yan", "Wanning He", "Yu-Wing Tai"], "brief": "\u9488\u5bf9\u52a8\u4f5c\u6355\u6349\u6570\u636e\u96c6\u591a\u6837\u6027\u4e0d\u8db3\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u5229\u7528\u5927\u89c4\u6a21\u5408\u6210\u4eba\u4f53\u8fd0\u52a8\u6570\u636e\u6269\u5c55\u8fd0\u52a8\u8868\u793a\u7a7a\u95f4\u7684\u6846\u67b6\uff0c\u7ed3\u5408\u91cd\u65b0\u8bbe\u8ba1\u7684VQ-VAE\u5206\u8bcd\u5668\u8054\u5408\u6269\u5c55\u8bad\u7ec3\u5206\u5e03\u4e0e\u79bb\u6563\u7801\u672c\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5408\u6210\u8fd0\u52a8\u8bad\u7ec3\u663e\u8457\u63d0\u5347\u4e86\u8fd0\u52a8\u8bcd\u6c47\u7684\u8986\u76d6\u5ea6\u4e0e\u7ec4\u5408\u6027\uff0c\u5728\u6587\u672c\u5230\u52a8\u4f5c\u3001\u52a8\u4f5c\u7eed\u5199\u7b49\u4efb\u52a1\u4e0a\u53d6\u5f97\u4e00\u81f4\u6027\u63d0\u5347\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27547", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4eba\u4f53\u52a8\u4f5c\u751f\u6210", "\u5408\u6210\u6570\u636e", "\u8fd0\u52a8\u5206\u8bcd\u5668", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27547v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond MoCap: Scaling Motion Tokenizers with Synthetic Human Motion for Generative Modeling", "tldr": "\u9488\u5bf9\u52a8\u4f5c\u6355\u6349\u6570\u636e\u96c6\u591a\u6837\u6027\u4e0d\u8db3\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u5229\u7528\u5927\u89c4\u6a21\u5408\u6210\u4eba\u4f53\u8fd0\u52a8\u6570\u636e\u6269\u5c55\u8fd0\u52a8\u8868\u793a\u7a7a\u95f4\u7684\u6846\u67b6\uff0c\u7ed3\u5408\u91cd\u65b0\u8bbe\u8ba1\u7684VQ-VAE\u5206\u8bcd\u5668\u8054\u5408\u6269\u5c55\u8bad\u7ec3\u5206\u5e03\u4e0e\u79bb\u6563\u7801\u672c\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5408\u6210\u8fd0\u52a8\u8bad\u7ec3\u663e\u8457\u63d0\u5347\u4e86\u8fd0\u52a8\u8bcd\u6c47\u7684\u8986\u76d6\u5ea6\u4e0e\u7ec4\u5408\u6027\uff0c\u5728\u6587\u672c\u5230\u52a8\u4f5c\u3001\u52a8\u4f5c\u7eed\u5199\u7b49\u4efb\u52a1\u4e0a\u53d6\u5f97\u4e00\u81f4\u6027\u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Video generation models aspire to simulate dynamic environments, and several benchmarks now evaluate memory consistency across frames. However, most assess consistency only while the target remains in view, and the few that force objects out of view evaluate static scenes where nothing changes during occlusion. To bridge this gap, we introduce MemoBench, a diagnostic benchmark built around the disappear-and-reappear paradigm in dynamically changing environments: a target object undergoes a physical process, disappears from view, and must be correctly recovered in its updated state upon reappearance. We curate 360 ground-truth clips spanning synthetic and real-world scenes, and design an evaluation suite combining automated metrics with VQA-based assessment across four diagnostic pillars. Evaluation of eight state-of-the-art models reveals key insights and open challenges regarding memory consistency under the disappear-and-reappear paradigm.", "arxiv_id": "2606.27537", "arxiv_url": "https://arxiv.org/abs/2606.27537", "authors": ["Haoyu Chen", "Kaichen Zhou", "Hang Hua", "Kaile Zhang", "Jingwen Qian", "Wufei Ma", "Haonan Chen", "Chunjiang Liu", "Yizhou Zhao", "Xiaoyuan Wang", "Weiyue Li", "Alan Yuille", "Paul Pu Liang", "Yilun Du"], "brief": "\u63d0\u51faMemoBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u89c6\u9891\u751f\u6210\u6a21\u578b\u5728\u52a8\u6001\u53d8\u5316\u73af\u5883\u4e2d\u7684\u4e16\u754c\u5efa\u6a21\u80fd\u529b\uff1a\u76ee\u6807\u7269\u4f53\u6d88\u5931\u540e\u518d\u51fa\u73b0\u65f6\uff0c\u6a21\u578b\u80fd\u5426\u6b63\u786e\u8fd8\u539f\u5176\u66f4\u65b0\u72b6\u6001\u3002\u5bf98\u4e2a\u4e3b\u6d41\u6a21\u578b\u7684\u8bc4\u6d4b\u63ed\u793a\u4e86\u5f53\u524d\u6a21\u578b\u5728\u52a8\u6001\u906e\u6321\u573a\u666f\u4e0b\u8bb0\u5fc6\u4e00\u81f4\u6027\u65b9\u9762\u7684\u5173\u952e\u6311\u6218\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27537", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u4e16\u754c\u6a21\u578b", "\u57fa\u51c6\u8bc4\u6d4b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27537v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MemoBench: Benchmarking World Modeling in Dynamically Changing Environments", "tldr": "\u63d0\u51faMemoBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u89c6\u9891\u751f\u6210\u6a21\u578b\u5728\u52a8\u6001\u53d8\u5316\u73af\u5883\u4e2d\u7684\u4e16\u754c\u5efa\u6a21\u80fd\u529b\uff1a\u76ee\u6807\u7269\u4f53\u6d88\u5931\u540e\u518d\u51fa\u73b0\u65f6\uff0c\u6a21\u578b\u80fd\u5426\u6b63\u786e\u8fd8\u539f\u5176\u66f4\u65b0\u72b6\u6001\u3002\u5bf98\u4e2a\u4e3b\u6d41\u6a21\u578b\u7684\u8bc4\u6d4b\u63ed\u793a\u4e86\u5f53\u524d\u6a21\u578b\u5728\u52a8\u6001\u906e\u6321\u573a\u666f\u4e0b\u8bb0\u5fc6\u4e00\u81f4\u6027\u65b9\u9762\u7684\u5173\u952e\u6311\u6218\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "World Action Models (WAMs) model future environment evolution under action conditioning, offering a scalable paradigm for autonomous driving. However, existing approaches focus largely on model architecture design, and how a WAM can efficiently learn better world representations for planning remains underexplored. To address this gap, we propose ReWorld, the first representation learning framework specifically designed for autonomous-driving world action models. In WAMs, standard training supervises only the output ends of the generation and planning modules, leaving the intermediate representations that carry world knowledge to be shaped only indirectly, as byproducts of fitting these outputs. The core idea of ReWorld is to treat intermediate representations as direct targets of optimization, shaping them along three complementary dimensions. On the Video DiT responsible for generation, we impose future-predictive supervision on its intermediate representations. On the Action DiT responsible for planning, we first align its intermediate representations cross-modally with the video world representation, then further shape them to be discriminative around safety-critical boundaries via hard-negative supervision. In addition, we systematically analyze the effectiveness of existing representation learning methods in video generation world models, and discuss why their performance is limited on this task. Experiments on nuScenes and NAVSIM show that ReWorld improves fine-tuned video generation by 23.9% in FVD (81.3 to 61.9), raises closed-loop PDMS from 89.1 to 90.4 without any post-training such as RL or post-processing, and accelerates from-scratch convergence by approximately 2x.", "arxiv_id": "2606.27504", "arxiv_url": "https://arxiv.org/abs/2606.27504", "authors": ["Tianze Xia", "Lijun Zhou", "Kaixin Xiong", "Jingfeng Yao", "Yu Zhu", "Zhenxin Zhu", "Bing Wang", "Guang Chen", "Hangjun Ye", "Wenyu Liu", "Haiyang Sun", "Xinggang Wang"], "brief": "\u63d0\u51faReWorld\uff0c\u9996\u4e2a\u4e13\u4e3a\u81ea\u52a8\u9a7e\u9a76\u4e16\u754c\u52a8\u4f5c\u6a21\u578b\u8bbe\u8ba1\u7684\u8868\u793a\u5b66\u4e60\u6846\u67b6\uff0c\u901a\u8fc7\u5bf9\u4e2d\u95f4\u8868\u793a\u65bd\u52a0\u672a\u6765\u9884\u6d4b\u76d1\u7763\u3001\u8de8\u6a21\u6001\u5bf9\u9f50\u53ca\u5b89\u5168\u8fb9\u754c\u786c\u8d1f\u6837\u672c\u76d1\u7763\uff0c\u663e\u8457\u63d0\u5347\u751f\u6210\u8d28\u91cf\uff08FVD\u964d\u4f4e23.9%\uff09\u548c\u89c4\u5212\u6027\u80fd\uff08PDMS\u4ece89.1\u5347\u81f390.4\uff09\uff0c\u5e76\u5c06\u6536\u655b\u901f\u5ea6\u63d0\u5347\u7ea62\u500d\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27504", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u4e16\u754c\u6a21\u578b", "\u8868\u793a\u5b66\u4e60", "\u6269\u6563\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27504v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ReWorld: Learning Better Representations for World Action Models", "tldr": "\u63d0\u51faReWorld\uff0c\u9996\u4e2a\u4e13\u4e3a\u81ea\u52a8\u9a7e\u9a76\u4e16\u754c\u52a8\u4f5c\u6a21\u578b\u8bbe\u8ba1\u7684\u8868\u793a\u5b66\u4e60\u6846\u67b6\uff0c\u901a\u8fc7\u5bf9\u4e2d\u95f4\u8868\u793a\u65bd\u52a0\u672a\u6765\u9884\u6d4b\u76d1\u7763\u3001\u8de8\u6a21\u6001\u5bf9\u9f50\u53ca\u5b89\u5168\u8fb9\u754c\u786c\u8d1f\u6837\u672c\u76d1\u7763\uff0c\u663e\u8457\u63d0\u5347\u751f\u6210\u8d28\u91cf\uff08FVD\u964d\u4f4e23.9%\uff09\u548c\u89c4\u5212\u6027\u80fd\uff08PDMS\u4ece89.1\u5347\u81f390.4\uff09\uff0c\u5e76\u5c06\u6536\u655b\u901f\u5ea6\u63d0\u5347\u7ea62\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Dexterous manipulation policies can solve individual skills, but composing them to perform multiple tasks with a single hand remains challenging. Adding a new task on top of an existing manipulation skill often imposes conflicting demands on overlapping fingers and contact modes, causing destructive interference between preserving an existing manipulation outcome and executing a new one. We propose DexCompose, a role-aware residual composition framework that reuses pretrained dexterous policies for multi-task manipulation through explicit finger-level action ownership. Given two pretrained full-hand policies, DexCompose first collects successful post-task states from the first skill and performs release tests over candidate finger masks to identify which fingers are necessary for maintaining the established skill state. It then trains two asymmetric residual modules: a bounded residual stabilizer for task preservation, and a context-aware residual that adapts the frozen downstream policy only within the action subspace assigned to the new task. We evaluate the framework on 16 composite dexterous manipulation tasks spanning four object-retention skills and four downstream interactions. DexCompose achieves a 77.4% average composite success rate, demonstrating that structural action ownership with dual residuals offers a promising direction for composing dexterous skills beyond conventional policy chaining.", "arxiv_id": "2606.28323", "arxiv_url": "https://arxiv.org/abs/2606.28323", "authors": ["Dihong Huang", "Zhenyu Wei", "Zhuxiu Xu", "Yunchao Yao", "Sikai Li", "Mingyu Ding"], "brief": "\u63d0\u51faDexCompose\u6846\u67b6\uff0c\u901a\u8fc7\u663e\u5f0f\u624b\u6307\u7ea7\u52a8\u4f5c\u5f52\u5c5e\u548c\u53cc\u6b8b\u5dee\u6a21\u5757\uff0c\u5c06\u9884\u8bad\u7ec3\u7684\u7075\u5de7\u64cd\u4f5c\u7b56\u7565\u7ec4\u5408\u7528\u4e8e\u5355\u624b\u591a\u4efb\u52a1\u64cd\u4f5c\u3002\u572816\u4e2a\u590d\u5408\u7075\u5de7\u64cd\u4f5c\u4efb\u52a1\u4e0a\u5b9e\u73b077.4%\u7684\u5e73\u5747\u6210\u529f\u7387\uff0c\u6709\u6548\u89e3\u51b3\u4e86\u591a\u4efb\u52a1\u64cd\u4f5c\u4e2d\u624b\u6307\u51b2\u7a81\u5e72\u6270\u95ee\u9898\u3002", "categories": ["cs.RO", "cs.AI", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28323", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7075\u5de7\u64cd\u4f5c", "\u7b56\u7565\u590d\u7528", "\u673a\u5668\u4eba\u5b66\u4e60", "\u591a\u4efb\u52a1\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28323v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DexCompose: Reusing Dexterous Policies for Multi-Task Manipulation with a Single Hand", "tldr": "\u63d0\u51faDexCompose\u6846\u67b6\uff0c\u901a\u8fc7\u663e\u5f0f\u624b\u6307\u7ea7\u52a8\u4f5c\u5f52\u5c5e\u548c\u53cc\u6b8b\u5dee\u6a21\u5757\uff0c\u5c06\u9884\u8bad\u7ec3\u7684\u7075\u5de7\u64cd\u4f5c\u7b56\u7565\u7ec4\u5408\u7528\u4e8e\u5355\u624b\u591a\u4efb\u52a1\u64cd\u4f5c\u3002\u572816\u4e2a\u590d\u5408\u7075\u5de7\u64cd\u4f5c\u4efb\u52a1\u4e0a\u5b9e\u73b077.4%\u7684\u5e73\u5747\u6210\u529f\u7387\uff0c\u6709\u6548\u89e3\u51b3\u4e86\u591a\u4efb\u52a1\u64cd\u4f5c\u4e2d\u624b\u6307\u51b2\u7a81\u5e72\u6270\u95ee\u9898\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Many two-player zero-sum games admit not a unique Nash equilibrium but a convex set of them: a polytope of profiles that all share the minimax value V* yet prescribe different behaviour. Standard solvers each converge to some equilibrium and are treated as interchangeable. We ask whether they instead select different members of the Nash set, systematically as a function of the algorithm rather than the seed. Using a tabular, exactly solvable testbed of six games with analytically known Nash sets -- including a two-dimensional Nash polytope and Kuhn poker -- we find that (i) selection is determined by the algorithm, not the seed, but families differ only on asymmetric Nash sets; (ii) regularized last-iterate methods (R-NaD, magnetic mirror descent) select the maximum-entropy member, the information projection of their uniform reference onto the Nash set -- exactly on the 2-D polytope and at 99.7% of maximum entropy in Kuhn -- while regret-averaging methods (CFR, CFR+, fictitious play) drift to a lower-entropy face; we confirm this on a randomized 180-game ensemble, where R-NaD attains the maximum-entropy member in 100% of converged games while CFR+ sits strictly below it in 94% (paired Wilcoxon p \u003c 10^-27); (iii) the selected member has downstream consequences against sub-optimal opponents that scale with sequential/hidden-information structure but stay bounded -- in Kuhn the max-entropy member is a strictly better hedge, whereas on the matrix games the members differ without either dominating. We also report two negative results correcting common intuitions: removing CFR\u0027s positive-orthant (max(R,0)) projection does not eliminate boundary drift; and R-NaD\u0027s selection is anchor-following, not initialization-independent. We state the maximum-entropy / I-projection characterization as a strongly data-supported conjecture, checked throughout against analytic ground truth.", "arxiv_id": "2606.28308", "arxiv_url": "https://arxiv.org/abs/2606.28308", "authors": ["Luis Leal"], "brief": "\u5728\u4e8c\u4eba\u96f6\u548c\u535a\u5f08\u4e2d\uff0c\u7eb3\u4ec0\u5747\u8861\u5f80\u5f80\u4e0d\u552f\u4e00\u800c\u662f\u6784\u6210\u4e00\u4e2a\u591a\u9762\u4f53\uff0c\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e0d\u540c\u6c42\u89e3\u7b97\u6cd5\u5728\u8be5\u591a\u9762\u4f53\u4e0a\u7684\u9009\u62e9\u89c4\u5f8b\u3002\u5b9e\u9a8c\u53d1\u73b0\uff1a\u6b63\u5219\u5316\u672b\u8fed\u4ee3\u65b9\u6cd5\uff08\u5982R-NaD\u3001\u78c1\u955c\u4e0b\u964d\uff09\u6536\u655b\u81f3\u6700\u5927\u71b5\u7eb3\u4ec0\u5747\u8861\uff08Nash\u96c6\u5408\u7684\u4fe1\u606f\u6295\u5f71\uff09\uff0c\u800c\u9057\u61be\u5e73\u5747\u65b9\u6cd5\uff08CFR\u7cfb\u5217\u3001\u865a\u62df\u535a\u5f08\uff09\u5219\u6f02\u79fb\u81f3\u4f4e\u71b5\u8fb9\u754c\uff1b\u6240\u9009\u5747\u8861\u5bf9\u6b21\u4f18\u5bf9\u624b\u7684\u8868\u73b0\u6709\u5b9e\u8d28\u5f71\u54cd\uff0c\u6700\u5927\u71b5\u6210\u5458\u5728\u5e8f\u8d2f/\u9690\u4fe1\u606f\u535a\u5f08\u4e2d\u662f\u66f4\u4f18\u7684\u5bf9\u51b2\u7b56\u7565\u3002", "categories": ["cs.GT", "cs.AI", "cs.LG", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28308", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u535a\u5f08\u8bba", "\u7eb3\u4ec0\u5747\u8861", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28308v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Which Nash Equilibrium? Solver-Dependent Selection on Zero-Sum Nash Polytopes", "tldr": "\u5728\u4e8c\u4eba\u96f6\u548c\u535a\u5f08\u4e2d\uff0c\u7eb3\u4ec0\u5747\u8861\u5f80\u5f80\u4e0d\u552f\u4e00\u800c\u662f\u6784\u6210\u4e00\u4e2a\u591a\u9762\u4f53\uff0c\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e0d\u540c\u6c42\u89e3\u7b97\u6cd5\u5728\u8be5\u591a\u9762\u4f53\u4e0a\u7684\u9009\u62e9\u89c4\u5f8b\u3002\u5b9e\u9a8c\u53d1\u73b0\uff1a\u6b63\u5219\u5316\u672b\u8fed\u4ee3\u65b9\u6cd5\uff08\u5982R-NaD\u3001\u78c1\u955c\u4e0b\u964d\uff09\u6536\u655b\u81f3\u6700\u5927\u71b5\u7eb3\u4ec0\u5747\u8861\uff08Nash\u96c6\u5408\u7684\u4fe1\u606f\u6295\u5f71\uff09\uff0c\u800c\u9057\u61be\u5e73\u5747\u65b9\u6cd5\uff08CFR\u7cfb\u5217\u3001\u865a\u62df\u535a\u5f08\uff09\u5219\u6f02\u79fb\u81f3\u4f4e\u71b5\u8fb9\u754c\uff1b\u6240\u9009\u5747\u8861\u5bf9\u6b21\u4f18\u5bf9\u624b\u7684\u8868\u73b0\u6709\u5b9e\u8d28\u5f71\u54cd\uff0c\u6700\u5927\u71b5\u6210\u5458\u5728\u5e8f\u8d2f/\u9690\u4fe1\u606f\u535a\u5f08\u4e2d\u662f\u66f4\u4f18\u7684\u5bf9\u51b2\u7b56\u7565\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Accurate network traffic prediction is a critical element for efficient resource allocation in dynamic urban cellular networks. However, prediction remains challenging because network demand is influenced by complex mobility patterns, congestion dynamics, and heterogeneous user behavior. This paper introduces the Parameter-Efficient Hybrid Transformer (PEHT), a network traffic prediction framework that integrates urban mobility and congestion information into a Transformer-based architecture. PEHT separates primary network communication features from secondary urban mobility features and incorporates Low-Rank Adaptation (LoRA) into the Transformer encoder to reduce the number of trainable parameters while maintaining high predictive accuracy. A multimodal fusion strategy then injects external mobility and congestion features into the decoder to improve traffic forecasting. Experiments on the Telecom Italia Milan dataset and multiple synthetic congestion scenarios show that PEHT outperforms state-of-the-art baselines in terms of RMSE, MAE, and $R^2$. The implementation is available in the GitHub repository.", "arxiv_id": "2606.28274", "arxiv_url": "https://arxiv.org/abs/2606.28274", "authors": ["Abdolazim Rezaei", "Mehdi Sookhak", "Mahboobeh Haghparast"], "brief": "\u63d0\u51fa\u53c2\u6570\u9ad8\u6548\u6df7\u5408Transformer\uff08PEHT\uff09\u6846\u67b6\uff0c\u5c06\u57ce\u5e02\u79fb\u52a8\u6027\u4e0e\u62e5\u5835\u4fe1\u606f\u878d\u5408\u5230Transformer\u67b6\u6784\u4e2d\uff0c\u7528\u4e8e\u8702\u7a9d\u7f51\u7edc\u6d41\u91cf\u9884\u6d4b\u3002\u901a\u8fc7LoRA\u964d\u4f4e\u53ef\u8bad\u7ec3\u53c2\u6570\u91cf\uff0c\u5e76\u4ee5\u591a\u6a21\u6001\u878d\u5408\u7b56\u7565\u6ce8\u5165\u5916\u90e8\u7279\u5f81\uff0c\u5728\u7c73\u5170\u7535\u4fe1\u6570\u636e\u96c6\u4e0aRMSE\u3001MAE\u548cR\u00b2\u5747\u4f18\u4e8e\u57fa\u7ebf\u6a21\u578b\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28274", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7f51\u7edc\u6d41\u91cf\u9884\u6d4b", "Transformer", "\u591a\u6a21\u6001\u878d\u5408", "\u53c2\u6570\u9ad8\u6548\u5fae\u8c03"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28274v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Parameter Efficient Hybrid Transformer (PEHT) for Network Traffic Prediction via Dynamic Urban Congestion Integration", "tldr": "\u63d0\u51fa\u53c2\u6570\u9ad8\u6548\u6df7\u5408Transformer\uff08PEHT\uff09\u6846\u67b6\uff0c\u5c06\u57ce\u5e02\u79fb\u52a8\u6027\u4e0e\u62e5\u5835\u4fe1\u606f\u878d\u5408\u5230Transformer\u67b6\u6784\u4e2d\uff0c\u7528\u4e8e\u8702\u7a9d\u7f51\u7edc\u6d41\u91cf\u9884\u6d4b\u3002\u901a\u8fc7LoRA\u964d\u4f4e\u53ef\u8bad\u7ec3\u53c2\u6570\u91cf\uff0c\u5e76\u4ee5\u591a\u6a21\u6001\u878d\u5408\u7b56\u7565\u6ce8\u5165\u5916\u90e8\u7279\u5f81\uff0c\u5728\u7c73\u5170\u7535\u4fe1\u6570\u636e\u96c6\u4e0aRMSE\u3001MAE\u548cR\u00b2\u5747\u4f18\u4e8e\u57fa\u7ebf\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Test-time adaptation (TTA) has emerged as a promising paradigm for mitigating distribution shifts in deep models. However, existing TTA approaches for anomaly segmentation remain limited by their reliance on pixel-level heuristics, such as confidence thresholding or entropy minimisation, which fail to preserve structural consistency under noise and texture variation. Moreover, they typically treat anomaly maps as flat intensity fields, ignoring the higher-order spatial relationships that characterise complex defect geometries. We introduce TopoTTA (Topological Test-Time Adaptation), a novel framework that integrates persistent homology, a tool from topological data analysis, into the TTA pipeline to enforce geometric and structural coherence during adaptation. By applying multi-level cubical complex filtration to anomaly score maps, TopoTTA derives robust topological pseudo-labels that guide a lightweight test-time classifier, enhancing segmentation quality without retraining the backbone model. The approach avoids reliance on method-specific raw-score thresholding for mask binarisation, preserves connectivity, and generalises across both 2D and 3D modalities. Extensive experiments across six standard benchmarks (MVTec AD, VisA, Real-IAD, MVTec 3D-AD, AnomalyShapeNet, and MVTec LOCO) demonstrate an average 15% F1 improvement over state-of-the-art unsupervised anomaly detection and segmentation methods, with the largest gains on anomalies exhibiting complex geometric or structural variations. These findings suggest that integrating topological reasoning into test-time adaptation provides a principled route to structure-aware generalisation, bridging the gap between geometric learning and robust adaptation.", "arxiv_id": "2606.28268", "arxiv_url": "https://arxiv.org/abs/2606.28268", "authors": ["Ali Zia", "Usman Ali", "Abdul Rehman", "Umer Ramzan", "Kang Han", "Muhammad Faheem", "Shahnawaz Qureshi", "Wei Xiang"], "brief": "\u63d0\u51faTopoTTA\u6846\u67b6\uff0c\u5c06\u6301\u4e45\u540c\u8c03\uff08\u62d3\u6251\u6570\u636e\u5206\u6790\u5de5\u5177\uff09\u5f15\u5165\u6d4b\u8bd5\u65f6\u81ea\u9002\u5e94\u6d41\u7a0b\uff0c\u901a\u8fc7\u591a\u5c42\u7acb\u65b9\u590d\u5f62\u8fc7\u6ee4\u751f\u6210\u62d3\u6251\u4f2a\u6807\u7b7e\u6307\u5bfc\u8f7b\u91cf\u5206\u7c7b\u5668\uff0c\u65e0\u9700\u91cd\u8bad\u9aa8\u5e72\u7f51\u7edc\u5373\u53ef\u589e\u5f3a\u5f02\u5e38\u5206\u5272\u7684\u7ed3\u6784\u4e00\u81f4\u6027\u3002\u5728\u516d\u4e2a\u6807\u51c6\u57fa\u51c6\u4e0a\u5e73\u5747F1\u63d0\u534715%\uff0c\u5bf9\u5177\u6709\u590d\u6742\u51e0\u4f55\u7ed3\u6784\u7684\u5f02\u5e38\u6548\u679c\u5c24\u4e3a\u663e\u8457\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28268", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f02\u5e38\u5206\u5272", "\u6d4b\u8bd5\u65f6\u81ea\u9002\u5e94", "\u62d3\u6251\u6570\u636e\u5206\u6790", "\u5de5\u4e1a\u7f3a\u9677\u68c0\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28268v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Learning Topology-Aware Representations via Test-Time Adaptation for Anomaly Segmentation", "tldr": "\u63d0\u51faTopoTTA\u6846\u67b6\uff0c\u5c06\u6301\u4e45\u540c\u8c03\uff08\u62d3\u6251\u6570\u636e\u5206\u6790\u5de5\u5177\uff09\u5f15\u5165\u6d4b\u8bd5\u65f6\u81ea\u9002\u5e94\u6d41\u7a0b\uff0c\u901a\u8fc7\u591a\u5c42\u7acb\u65b9\u590d\u5f62\u8fc7\u6ee4\u751f\u6210\u62d3\u6251\u4f2a\u6807\u7b7e\u6307\u5bfc\u8f7b\u91cf\u5206\u7c7b\u5668\uff0c\u65e0\u9700\u91cd\u8bad\u9aa8\u5e72\u7f51\u7edc\u5373\u53ef\u589e\u5f3a\u5f02\u5e38\u5206\u5272\u7684\u7ed3\u6784\u4e00\u81f4\u6027\u3002\u5728\u516d\u4e2a\u6807\u51c6\u57fa\u51c6\u4e0a\u5e73\u5747F1\u63d0\u534715%\uff0c\u5bf9\u5177\u6709\u590d\u6742\u51e0\u4f55\u7ed3\u6784\u7684\u5f02\u5e38\u6548\u679c\u5c24\u4e3a\u663e\u8457\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Understanding how performance scales jointly with model size and data is a central problem in modern machine learning. Existing theoretical works on scaling laws typically describe generalization as a function of data or compute, often in fixed-feature or infinite-width regimes and for online SGD. Here, we instead study how generalization scales with the number of trainable parameters and the number of samples in a feature-learning model. We analyze $\\ell_2$-regularized empirical test error minimization in a quadratic two-layer network in a finite-sample setting with structured data. This setting allows for an explicit characterization of the generalization error as a function of the number of samples, model width, and regularization. Our results reveal a phase diagram with distinct scaling regimes as the number of parameters varies. In particular, the generalization error follows data-dependent power laws controlled by the spectral structure of the target. We further characterize the transitions between regimes, including the onset of interpolation, and their impact on generalization.", "arxiv_id": "2606.28242", "arxiv_url": "https://arxiv.org/abs/2606.28242", "authors": ["Julius Girardin", "Emanuele Troiani", "Yizhou Xu", "Vittorio Erba", "Florent Krzakala", "Lenka Zdeborov\u00e1"], "brief": "\u7814\u7a76\u4e8c\u6b21\u4e24\u5c42\u795e\u7ecf\u7f51\u7edc\u4e2d\u6cdb\u5316\u8bef\u5dee\u5982\u4f55\u968f\u6a21\u578b\u5bbd\u5ea6\u548c\u6837\u672c\u91cf\u8054\u5408\u7f29\u653e\uff0c\u5728\u6709\u9650\u6837\u672c\u7ed3\u6784\u5316\u6570\u636e\u8bbe\u7f6e\u4e0b\u7ed9\u51fa\u6cdb\u5316\u8bef\u5dee\u7684\u663e\u5f0f\u523b\u753b\u3002\u7ed3\u679c\u63ed\u793a\u4e86\u968f\u53c2\u6570\u91cf\u53d8\u5316\u7684\u76f8\u56fe\u4e0e\u4e0d\u540c\u7f29\u653e\u533a\u95f4\uff0c\u6cdb\u5316\u8bef\u5dee\u9075\u5faa\u7531\u76ee\u6807\u51fd\u6570\u8c31\u7ed3\u6784\u63a7\u5236\u7684\u6570\u636e\u4f9d\u8d56\u5e42\u5f8b\u3002", "categories": ["cs.LG", "cond-mat.dis-nn", "cs.AI", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28242", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7f29\u653e\u5b9a\u5f8b", "\u6cdb\u5316\u8bef\u5dee", "\u795e\u7ecf\u7f51\u7edc\u7406\u8bba", "\u7279\u5f81\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28242v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "How Width and Data Shape Generalization Scaling Laws in Quadratic Neural Networks", "tldr": "\u7814\u7a76\u4e8c\u6b21\u4e24\u5c42\u795e\u7ecf\u7f51\u7edc\u4e2d\u6cdb\u5316\u8bef\u5dee\u5982\u4f55\u968f\u6a21\u578b\u5bbd\u5ea6\u548c\u6837\u672c\u91cf\u8054\u5408\u7f29\u653e\uff0c\u5728\u6709\u9650\u6837\u672c\u7ed3\u6784\u5316\u6570\u636e\u8bbe\u7f6e\u4e0b\u7ed9\u51fa\u6cdb\u5316\u8bef\u5dee\u7684\u663e\u5f0f\u523b\u753b\u3002\u7ed3\u679c\u63ed\u793a\u4e86\u968f\u53c2\u6570\u91cf\u53d8\u5316\u7684\u76f8\u56fe\u4e0e\u4e0d\u540c\u7f29\u653e\u533a\u95f4\uff0c\u6cdb\u5316\u8bef\u5dee\u9075\u5faa\u7531\u76ee\u6807\u51fd\u6570\u8c31\u7ed3\u6784\u63a7\u5236\u7684\u6570\u636e\u4f9d\u8d56\u5e42\u5f8b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Autonomous coding agents now open and merge pull requests in shared repositories at scale, and the field evaluates them the way it has always evaluated components, one agent at a time, on isolated benchmark tasks. Yet agents that each pass their own tests still leave repositories that accumulate problems no single contribution accounts for. We ask whether this problem belongs to the individual agent or to the repository where it accumulates. We study integration friction, the cost of integrating a contribution into a codebase that other contributors are concurrently changing. Across more than 930,000 agent-authored pull requests, we measure how much of the variation in friction stays with the repository after the contribution, its author, its size, and its agent are accounted for. About half does, and it survives full controls. In the same repositories, agent-authored contributions concentrate this repository-level friction roughly twice as much as human ones (intraclass correlation 0.30 versus 0.16), a gap that holds after controlling for codebase size, age, task shape, process maturity, and merge path. The risk is a property of the ecosystem, not the agent. AI-native software is therefore better measured and governed at the ecosystem level than one agent at a time.", "arxiv_id": "2606.28235", "arxiv_url": "https://arxiv.org/abs/2606.28235", "authors": ["Daniel Russo"], "brief": "\u7814\u7a76\u53d1\u73b0\uff0cAI\u7f16\u7801\u667a\u80fd\u4f53\u5728\u5171\u4eab\u4ee3\u7801\u5e93\u4e2d\u6279\u91cf\u63d0\u4ea4PR\u6240\u5e26\u6765\u7684\"\u96c6\u6210\u6469\u64e6\"\u98ce\u9669\uff0c\u7ea6\u6709\u4e00\u534a\u5f52\u56e0\u4e8e\u4ee3\u7801\u5e93\u672c\u8eab\u800c\u975e\u5355\u4e2a\u667a\u80fd\u4f53\uff0c\u4e14AI\u8d21\u732e\u9020\u6210\u7684\u4ed3\u5e93\u7ea7\u6469\u64e6\u96c6\u4e2d\u5ea6\u7ea6\u4e3a\u4eba\u7c7b\u8d21\u732e\u7684\u4e24\u500d\u3002\u56e0\u6b64\uff0cAI\u539f\u751f\u8f6f\u4ef6\u7684\u98ce\u9669\u8bc4\u4f30\u4e0e\u6cbb\u7406\u5e94\u805a\u7126\u4e8e\u751f\u6001\u7cfb\u7edf\u5c42\u9762\uff0c\u800c\u975e\u9010\u4e2a\u667a\u80fd\u4f53\u8bc4\u4f30\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28235", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8f6f\u4ef6\u5de5\u7a0b", "\u4ee3\u7801\u5e93\u6cbb\u7406", "\u98ce\u9669\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28235v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Govern the Repository, Not the Agent: Measuring Ecosystem-Level Risk in AI-Native Software", "tldr": "\u7814\u7a76\u53d1\u73b0\uff0cAI\u7f16\u7801\u667a\u80fd\u4f53\u5728\u5171\u4eab\u4ee3\u7801\u5e93\u4e2d\u6279\u91cf\u63d0\u4ea4PR\u6240\u5e26\u6765\u7684\"\u96c6\u6210\u6469\u64e6\"\u98ce\u9669\uff0c\u7ea6\u6709\u4e00\u534a\u5f52\u56e0\u4e8e\u4ee3\u7801\u5e93\u672c\u8eab\u800c\u975e\u5355\u4e2a\u667a\u80fd\u4f53\uff0c\u4e14AI\u8d21\u732e\u9020\u6210\u7684\u4ed3\u5e93\u7ea7\u6469\u64e6\u96c6\u4e2d\u5ea6\u7ea6\u4e3a\u4eba\u7c7b\u8d21\u732e\u7684\u4e24\u500d\u3002\u56e0\u6b64\uff0cAI\u539f\u751f\u8f6f\u4ef6\u7684\u98ce\u9669\u8bc4\u4f30\u4e0e\u6cbb\u7406\u5e94\u805a\u7126\u4e8e\u751f\u6001\u7cfb\u7edf\u5c42\u9762\uff0c\u800c\u975e\u9010\u4e2a\u667a\u80fd\u4f53\u8bc4\u4f30\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Flow Matching (FM) has achieved remarkable generative performance, yet it suffers from exposure bias due to discrepancies between training and inference. Existing mitigation strategies typically rely on static constraints or external heuristics. In this work, we propose that exposure bias itself inherently contains dynamic signals that can guide its own rectification. To leverage this, we introduce DEFAR (DirEctional-Frequency Adaptive Rectification). This framework simulates the single-step inference process during training to identify exposure bias. It utilizes directional and frequency-adaptive feedback signals from the bias itself to enhance the model\u0027s bias tolerance. It consists of two key components: (1) Anti-Drift Rectification (ADR). ADR treats inference-time drift as a signal to learn the direction to steer deviated states back toward the target. ADR endows the model with intrinsic active self-rectification capabilities; (2) Frequency Compensation (FC). Empirically, we observe that accumulated bias often stems from a lack of low-frequency components in high-noise stages, and exposure bias carries the missing frequency. FC leverages the bias itself as a self-feedback weighting factor to reinforce the missing frequency components. Experiments on CIFAR-10, CelebA-64, and ImageNet-256/512 show that DEFAR outperforms prior baselines and further demonstrates favorable scalability, compatibility, and inference robustness.", "arxiv_id": "2606.28226", "arxiv_url": "https://arxiv.org/abs/2606.28226", "authors": ["Guanbo Huang", "Jingjia Mao", "Fanding Huang", "Fengkai Liu", "Xiangyang Luo", "Yaoyuan Liang", "Jiasheng Lu", "Xiaoe Wang", "Pei Liu", "Ruiliu Fu", "Ruqi Huang", "Shao-Lun Huang"], "brief": "\u9488\u5bf9Flow Matching\u8bad\u7ec3\u4e0e\u63a8\u7406\u4e0d\u4e00\u81f4\u5bfc\u81f4\u7684\u66dd\u5149\u504f\u5dee\u95ee\u9898\uff0c\u63d0\u51faDEFAR\u6846\u67b6\uff0c\u5229\u7528\u504f\u5dee\u672c\u8eab\u5305\u542b\u7684\u65b9\u5411\u6027\u548c\u9891\u7387\u4fe1\u606f\u6765\u81ea\u6211\u7ea0\u6b63\u3002\u6846\u67b6\u5305\u542b\u53cd\u6f02\u79fb\u7ea0\u6b63\uff08ADR\uff09\u548c\u9891\u7387\u8865\u507f\uff08FC\uff09\u4e24\u4e2a\u6a21\u5757\uff0c\u5728CIFAR-10\u3001CelebA-64\u548cImageNet-256/512\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28226", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "Flow Matching", "\u66dd\u5149\u504f\u5dee", "\u751f\u6210\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28226v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Exposure Bias Can Alleviate Itself via Directional and Frequency Rectification in Flow Matching", "tldr": "\u9488\u5bf9Flow Matching\u8bad\u7ec3\u4e0e\u63a8\u7406\u4e0d\u4e00\u81f4\u5bfc\u81f4\u7684\u66dd\u5149\u504f\u5dee\u95ee\u9898\uff0c\u63d0\u51faDEFAR\u6846\u67b6\uff0c\u5229\u7528\u504f\u5dee\u672c\u8eab\u5305\u542b\u7684\u65b9\u5411\u6027\u548c\u9891\u7387\u4fe1\u606f\u6765\u81ea\u6211\u7ea0\u6b63\u3002\u6846\u67b6\u5305\u542b\u53cd\u6f02\u79fb\u7ea0\u6b63\uff08ADR\uff09\u548c\u9891\u7387\u8865\u507f\uff08FC\uff09\u4e24\u4e2a\u6a21\u5757\uff0c\u5728CIFAR-10\u3001CelebA-64\u548cImageNet-256/512\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We propose a framework for reward allocation in fully delegated AI cooperatives where humans are represented by agents that contribute data and participate in model updates under heterogeneous value constraints. The key idea is to credit only those updates that remain admissible after screening them against each principal\u0027s value profile. We formulate value-conditioned gradient filtering, online marginal contribution signals, and cumulative revenue settlement within a traversal learning (TL) substrate. TL is especially attractive here because it performs decentralized backpropagation without the quality loss associated with aggregation-centric distributed learning and, we argue, offers a finer attribution substrate than FedAvg-style federated learning by preserving explicit traversal and gradient paths. The framework is positioned against data valuation, federated contribution estimation, personalized federated learning, and pluralistic alignment.", "arxiv_id": "2606.28217", "arxiv_url": "https://arxiv.org/abs/2606.28217", "authors": ["Young Yoon", "Jimin Kim", "Soyeon Park"], "brief": "\u63d0\u51fa\u4e00\u79cd\u9762\u5411\u5b8c\u5168\u59d4\u6258AI\u534f\u4f5c\u4f53\u7684\u5956\u52b1\u5206\u914d\u6846\u67b6\uff0c\u901a\u8fc7\u4ef7\u503c\u nflows are primarily driven by external macroeconomic variables, specifically exchange rate dynamics and global oil prices, rather than domestic indicators. Impulse response analysis confirms the asymmetric impact of currency depreciation and oil price shocks. Predictively, multivariate machine learning models outperform traditional univariate approaches; Ridge Regression achieves a 73.8% accuracy improvement over SARIMA (Annualized RMSE: USD 494.8 Mn). The optimized framework projects 2026 remittances at USD 9,001 million under stable conditions. These findings highlight the structural dependence of remittances on global economies, emphasizing the need for robust exchange rate policies, skilled migration, and formal financial channels to enhance long-term economic resilience.", "arxiv_id": "2606.28190", "arxiv_url": "https://arxiv.org/abs/2606.28190", "authors": ["Dhinanjaya Fernando", "Dinura Ginige", "Kalana Lakshan", "Chanupa Gurusinghe", "Lasana Pahanga", "Subavarshana Arumugam", "Sandeepa Weerasekara", "Sandareka Wickramanayake", "Nisansa de Silva"], "brief": "\u672c\u7814\u7a76\u5bf9\u65af\u91cc\u5170\u536132\u5e74\uff081994-2025\uff09\u7684\u79fb\u6c11\u6c47\u6b3e\u6570\u636e\u8fdb\u884c\u5206\u6790\uff0c\u7efc\u5408\u8fd0\u7528\u65f6\u95f4\u5e8f\u5217\u6a21\u578b\uff08VAR/VECM\uff09\u4e0e\u76d1\u7763\u5b66\u4e60\u65b9\u6cd5\uff0c\u53d1\u73b0\u6c47\u6b3e\u6d41\u5165\u4e3b\u8981\u7531\u6c47\u7387\u52a8\u6001\u548c\u5168\u7403\u6cb9\u4ef7\u7b49\u5916\u90e8\u5b8f\u89c2\u53d8\u91cf\u9a71\u52a8\u3002\u591a\u53d8\u91cf\u673a\u5668\u5b66\u4e60\u6a21\u578b\uff08Ridge\u56de\u5f52\uff09\u76f8\u6bd4\u4f20\u7edfSARIMA\u65b9\u6cd5\u7cbe\u5ea6\u63d0\u534773.8%\uff0c\u9884\u6d4b2026\u5e74\u6c47\u6b3e\u989d\u5c06\u8fbe90.01\u4ebf\u7f8e\u5143\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28190", "impact_score": 4, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u65f6\u95f4\u5e8f\u5217\u9884\u6d4b", "\u673a\u5668\u5b66\u4e60", "\u5b8f\u89c2\u7ecf\u6d4e\u5206\u6790", "\u6c47\u6b3e\u9884\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28190v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Remittance Blueprint: Data-driven Intelligence for Sri Lanka", "tldr": "\u672c\u7814\u7a76\u5bf9\u65af\u91cc\u5170\u536132\u5e74\uff081994-2025\uff09\u7684\u79fb\u6c11\u6c47\u6b3e\u6570\u636e\u8fdb\u884c\u5206\u6790\uff0c\u7efc\u5408\u8fd0\u7528\u65f6\u95f4\u5e8f\u5217\u6a21\u578b\uff08VAR/VECM\uff09\u4e0e\u76d1\u7763\u5b66\u4e60\u65b9\u6cd5\uff0c\u53d1\u73b0\u6c47\u6b3e\u6d41\u5165\u4e3b\u8981\u7531\u6c47\u7387\u52a8\u6001\u548c\u5168\u7403\u6cb9\u4ef7\u7b49\u5916\u90e8\u5b8f\u89c2\u53d8\u91cf\u9a71\u52a8\u3002\u591a\u53d8\u91cf\u673a\u5668\u5b66\u4e60\u6a21\u578b\uff08Ridge\u56de\u5f52\uff09\u76f8\u6bd4\u4f20\u7edfSARIMA\u65b9\u6cd5\u7cbe\u5ea6\u63d0\u534773.8%\uff0c\u9884\u6d4b2026\u5e74\u6c47\u6b3e\u989d\u5c06\u8fbe90.01\u4ebf\u7f8e\u5143\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Predicting human item difficulty is central to educational assessment, where reliable estimates support fairness and effective test construction. Existing methods often depend on costly human calibration or item-level textual representations, providing limited evidence about the cognitive processes that make items difficult. We argue that difficulty should be viewed not only as a property of item text, but also as an observable consequence of the problem-solving burden an item induces. Large Reasoning Models (LRMs) offer scalable process evidence through reasoning traces, but such evidence must be structured to support interpretable modeling. To this end, we introduce Epi2Diff (Episode to Difficulty), a framework that maps LRM reasoning traces into cognitively grounded episode sequences. These episodes group trace segments into functional problem-solving states, enabling difficulty to be modeled through reasoning scale, effort allocation, and state transitions. Epi2Diff extracts compact episode-dynamic features and combines them with semantic item representations for human difficulty prediction. Experiments on four real-world human difficulty datasets show that Epi2Diff consistently outperforms strong baselines, including fine-tuned small language models, LLM in-context learning, and supervised LLM adaptation. On SAT-derived classification benchmarks, Epi2Diff achieves an 8.1% average relative gain over supervised LLM fine-tuning baselines. Further analyses show that harder items induce more effortful, iterative, and implementation-centered episode dynamics, rather than merely longer responses. These results demonstrate that cognitive episodes in LRM reasoning traces provide a predictive and interpretable process representation for human item difficulty, offering a new lens for educational measurement with reasoning models.", "arxiv_id": "2606.28186", "arxiv_url": "https://arxiv.org/abs/2606.28186", "authors": ["Chenguang Wang", "Ming Li", "Xinyue Zeng", "Zhuochun Li", "Hong Jiao", "Tianyi Zhou", "Dawei Zhou"], "brief": "\u63d0\u51faEpi2Diff\u6846\u67b6\uff0c\u5c06\u5927\u578b\u63a8\u7406\u6a21\u578b\u7684\u63a8\u7406\u8f68\u8ff9\u6620\u5c04\u4e3a\u8ba4\u77e5\u60c5\u8282\u5e8f\u5217\uff0c\u901a\u8fc7\u5206\u6790\u63a8\u7406\u89c4\u6a21\u3001\u52aa\u529b\u5206\u914d\u548c\u72b6\u6001\u8f6c\u6362\u6765\u9884\u6d4b\u4eba\u7c7b\u9898\u76ee\u96be\u5ea6\u3002\u5728\u56db\u4e2a\u771f\u5b9e\u96be\u5ea6\u6570\u636e\u96c6\u4e0a\u6301\u7eed\u4f18\u4e8e\u5f3a\u57fa\u7ebf\uff0c\u5728SAT\u5206\u7c7b\u57fa\u51c6\u4e0a\u6bd4\u76d1\u7763\u5fae\u8c03\u57fa\u7ebf\u5e73\u5747\u63d0\u53478.1%\uff0c\u5e76\u63ed\u793a\u4e86\u66f4\u96be\u9898\u76ee\u4f1a\u8bf1\u53d1\u66f4\u8d39\u529b\u3001\u8fed\u4ee3\u6027\u66f4\u5f3a\u7684\u8ba4\u77e5\u52a8\u6001\u3002", "categories": ["cs.CL", "cs.AI", "cs.CY", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28186", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6559\u80b2\u6d4b\u91cf", "\u53ef\u89e3\u91ca\u6027", "\u63a8\u7406\u8f68\u8ff9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28186v1", "published_at": "2026-06-26", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Cognitive Episodes in LLM Reasoning Traces Enable Interpretable Human Item Difficulty Prediction", "tldr": "\u63d0\u51faEpi2Diff\u6846\u67b6\uff0c\u5c06\u5927\u578b\u63a8\u7406\u6a21\u578b\u7684\u63a8\u7406\u8f68\u8ff9\u6620\u5c04\u4e3a\u8ba4\u77e5\u60c5\u8282\u5e8f\u5217\uff0c\u901a\u8fc7\u5206\u6790\u63a8\u7406\u89c4\u6a21\u3001\u52aa\u529b\u5206\u914d\u548c\u72b6\u6001\u8f6c\u6362\u6765\u9884\u6d4b\u4eba\u7c7b\u9898\u76ee\u96be\u5ea6\u3002\u5728\u56db\u4e2a\u771f\u5b9e\u96be\u5ea6\u6570\u636e\u96c6\u4e0a\u6301\u7eed\u4f18\u4e8e\u5f3a\u57fa\u7ebf\uff0c\u5728SAT\u5206\u7c7b\u57fa\u51c6\u4e0a\u6bd4\u76d1\u7763\u5fae\u8c03\u57fa\u7ebf\u5e73\u5747\u63d0\u53478.1%\uff0c\u5e76\u63ed\u793a\u4e86\u66f4\u96be\u9898\u76ee\u4f1a\u8bf1\u53d1\u66f4\u8d39\u529b\u3001\u8fed\u4ee3\u6027\u66f4\u5f3a\u7684\u8ba4\u77e5\u52a8\u6001\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
