 lock onto language priors. This establishes a pathological shortcut that bypasses visual grounding. To dismantle this, we propose Fox (Faithfulness and Observational-flow via eXpression-rectification), a training-free inference-time framework. Fox diagnoses structural misalignment using a visual attention entropy probe to localize risky mediators unsupervisedly. We then execute a targeted causal intervention via numerical logit saturation to physically sever the shortcut path. Finally, a conflict-gated cooperative decoding strategy reconciles interventional faithfulness with observational fluency. Extensive experiments demonstrate that Fox achieves SOTA performance, outperforming SID by 29.1% while preserving linguistic richness. Code is available at https://github.com/Cc2021start/Fox.", "arxiv_id": "2606.27596", "arxiv_url": "https://arxiv.org/abs/2606.27596", "authors": ["Liu Yu", "Can Chen", "Ping Kuang", "Zhikun Feng", "Fan Zhou", "Gillian Dobbie"], "brief": "\u63d0\u51faFox\uff08Faithfulness and Observational-flow via eXpression-rectification\uff09\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u63a8\u7406\u65f6\u6846\u67b6\uff0c\u901a\u8fc7\u89c6\u89c9\u6ce8\u610f\u529b\u71b5\u63a2\u9488\u5b9a\u4f4d\"\u98ce\u9669\u4e2d\u4ecb\"\u6ce8\u610f\u529b\u5934\uff0c\u5e76\u5229\u7528\u6570\u503clogit\u9971\u548c\u8fdb\u884c\u56e0\u679c\u5e72\u9884\uff0c\u5207\u65ad\u7ed5\u8fc7\u89c6\u89c9\u57fa\u7840\u7684\u8bed\u8a00\u5148\u9a8c\u6377\u5f84\uff0c\u4ece\u800c\u7f13\u89e3\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u5bf9\u8c61\u5e7b\u89c9\u95ee\u9898\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27596", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u63ed\u793a\u5e7b\u89c9\u7684\u6df1\u5c42\u673a\u5236\uff1a\u7279\u5b9a\u6ce8\u610f\u529b\u5934\u5728\u51b3\u7b56\u5173\u952e\u6b65\u9aa4\u8131\u79bb\u89c6\u89c9\u8bc1\u636e\u3001\u9501\u5b9a\u8bed\u8a00\u5148\u9a8c\uff0c\u5f62\u6210\u7ed3\u6784\u6027\u9519\u4f4d", "\u89c6\u89c9\u6ce8\u610f\u529b\u71b5\u63a2\u9488\u65e0\u76d1\u7763\u5b9a\u4f4d\u98ce\u9669\u4e2d\u4ecb\u6ce8\u610f\u529b\u5934\uff0c\u6570\u503clogit\u9971\u548c\u6267\u884c\u9776\u5411\u56e0\u679c\u5e72\u9884\u5207\u65ad\u6377\u5f84\u8def\u5f84", "\u51b2\u7a81\u95e8\u63a7\u534f\u4f5c\u89e3\u7801\u7b56\u7565\u5e73\u8861\u5e72\u9884\u5fe0\u5b9e\u6027\u4e0e\u89c2\u6d4b\u6d41\u7545\u6027\uff0c\u76f8\u6bd4SID\u63d0\u534729.1%"], "keywords": ["\u591a\u6a21\u6001", "\u5e7b\u89c9\u7f13\u89e3", "\u56e0\u679c\u63a8\u65ad", "\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27596v1", "published_at": "2026-06-25", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Dismantling Pathological Shortcuts: A Causal Framework for Faithful LVLM Decoding", "tldr": "\u63d0\u51faFox\u6846\u67b6\uff0c\u901a\u8fc7\u56e0\u679c\u5e72\u9884\u6d88\u9664\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e2d\u7684\u5e7b\u89c9\u75c5\u7406\u6377\u5f84", "upvotes": 0, "what_it_is": "\u63d0\u51faFox\uff08Faithfulness and Observational-flow via eXpression-rectification\uff09\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u63a8\u7406\u65f6\u6846\u67b6\uff0c\u901a\u8fc7\u89c6\u89c9\u6ce8\u610f\u529b\u71b5\u63a2\u9488\u5b9a\u4f4d\"\u98ce\u9669\u4e2d\u4ecb\"\u6ce8\u610f\u529b\u5934\uff0c\u5e76\u5229\u7528\u6570\u503clogit\u9971\u548c\u8fdb\u884c\u56e0\u679c\u5e72\u9884\uff0c\u5207\u65ad\u7ed5\u8fc7\u89c6\u89c9\u57fa\u7840\u7684\u8bed\u8a00\u5148\u9a8c\u6377\u5f84\uff0c\u4ece\u800c\u7f13\u89e3\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u5bf9\u8c61\u5e7b\u89c9\u95ee\u9898\u3002", "why_notable": "\u4ece\u56e0\u679c\u7ed3\u6784\u89c6\u89d2\u91cd\u65b0\u89e3\u91caLVLM\u5e7b\u89c9\u673a\u5236\uff0c\u7a81\u7834\u4e3b\u6d41\u6ce8\u610f\u529b\u5f3a\u5ea6\u5047\u8bbe\uff1b\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u90e8\u7f72\uff0c\u5b9e\u7528\u4ef7\u503c\u9ad8\uff1b\u6027\u80fd\u63d0\u5347\u663e\u8457\u4e14\u4fdd\u7559\u8bed\u8a00\u4e30\u5bcc\u6027\u3002"}, {"abstract": "Mixture-of-Experts (MoE) language models scale model ability with sparsely activated experts, making this architecture a standard recipe for modern large models. However, sparse activation does not remove the deployment burden of storing and serving all experts, and the available deployment budget can vary substantially across devices, users, and workloads. Existing MoE compression methods are still largely fixed-budget, typically optimizing one compressed endpoint at each chosen target budget. We study a different setting: converting a large pretrained MoE LLM into a nested family of deployable subnetworks across budgets. Our method first ranks expert FFN channels by their importance, then lets each expert learn a discrete action to prune its channels. By gradually increasing cost pressure, a single action-training run exports a series of action masks from high to low budgets, each of which identifies a reliable smaller subnetwork nested in the ranked base model. Moreover, we use a single recovery fine-tune at a mid pruning budget (40%) to recover degraded model quality and transfer the recovered model to other unseen budgets. Overall, our framework surpasses recent MoE compression baselines. Specifically, on Qwen2-57B-A14B, our method retains ~99.8% of base performance while pruning 50% of routed expert parameters even without fine-tuning. For deployment, our pruned subnetworks deliver real memory reduction and throughput gains, and further support realtime online budget switching with kernel-level co-design.", "arxiv_id": "2606.27866", "arxiv_url": "https://arxiv.org/abs/2606.27866", "authors": ["Fan Mo", "Yuxuan Han", "Geng Zhang", "Wangbo Zhao", "Yang You"], "brief": "\u63d0\u51faFlexMoE\u6846\u67b6\uff0c\u901a\u8fc7\u5bf9\u4e13\u5bb6FFN\u901a\u9053\u91cd\u8981\u6027\u6392\u5e8f\u5e76\u5b66\u4e60\u79bb\u6563\u526a\u679d\u52a8\u4f5c\uff0c\u5c06\u9884\u8bad\u7ec3MoE\u8bed\u8a00\u6a21\u578b\u8f6c\u5316\u4e3a\u4e00\u7cfb\u5217\u5d4c\u5957\u5b50\u7f51\u7edc\uff0c\u5355\u6b21\u8bad\u7ec3\u5373\u53ef\u8986\u76d6\u4ece\u9ad8\u5230\u4f4e\u7684\u591a\u79cd\u90e8\u7f72\u9884\u7b97\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27866", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6309\u91cd\u8981\u6027\u5bf9\u4e13\u5bb6FFN\u901a\u9053\u6392\u5e8f\uff0c\u8ba9\u6bcf\u4e2a\u4e13\u5bb6\u5b66\u4e60\u79bb\u6563\u52a8\u4f5c\u63a9\u7801\uff0c\u9010\u6b65\u589e\u52a0\u4ee3\u4ef7\u538b\u529b\u4ee5\u5bfc\u51fa\u591a\u7ea7\u5d4c\u5957\u5b50\u7f51\u7edc", "\u4ec5\u572840%\u526a\u679d\u9884\u7b97\u5904\u505a\u4e00\u6b21\u6062\u590d\u5fae\u8c03\uff0c\u5373\u53ef\u5c06\u8d28\u91cf\u6062\u590d\u8fc1\u79fb\u81f3\u5176\u4ed6\u672a\u89c1\u9884\u7b97", "\u5728Qwen2-57B-A14B\u4e0a\u526a\u679d50%\u8def\u7531\u4e13\u5bb6\u53c2\u6570\u540e\u4ecd\u4fdd\u7559\u7ea699.8%\u57fa\u7840\u6027\u80fd\uff0c\u5e76\u652f\u6301\u5185\u6838\u7ea7\u5b9e\u65f6\u5728\u7ebf\u9884\u7b97\u5207\u6362"], "keywords": ["\u6a21\u578b\u538b\u7f29", "MoE", "\u5927\u8bed\u8a00\u6a21\u578b", "\u526a\u679d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27866v1", "published_at": "2026-06-26", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "FlexMoE: One-for-All Nested Intra-Expert Pruning for MoE Language Models", "tldr": "FlexMoE\u5c06MoE\u5927\u6a21\u578b\u8f6c\u5316\u4e3a\u53ef\u5d4c\u5957\u7684\u591a\u9884\u7b97\u5b50\u7f51\u7edc\u65cf\uff0c\u4e00\u6b21\u8bad\u7ec3\u652f\u6301\u591a\u79cd\u90e8\u7f72\u89c4\u6a21\u3002", "upvotes": 0, "what_it_is": "\u63d0\u51faFlexMoE\u6846\u67b6\uff0c\u901a\u8fc7\u5bf9\u4e13\u5bb6FFN\u901a\u9053\u91cd\u8981\u6027\u6392\u5e8f\u5e76\u5b66\u4e60\u79bb\u6563\u526a\u679d\u52a8\u4f5c\uff0c\u5c06\u9884\u8bad\u7ec3MoE\u8bed\u8a00\u6a21\u578b\u8f6c\u5316\u4e3a\u4e00\u7cfb\u5217\u5d4c\u5957\u5b50\u7f51\u7edc\uff0c\u5355\u6b21\u8bad\u7ec3\u5373\u53ef\u8986\u76d6\u4ece\u9ad8\u5230\u4f4e\u7684\u591a\u79cd\u90e8\u7f72\u9884\u7b97\u3002", "why_notable": "\u9996\u6b21\u5b9e\u73b0MoE\u6a21\u578b\u7684\"\u4e00\u6a21\u578b\u591a\u9884\u7b97\"\u5d4c\u5957\u90e8\u7f72\uff0c\u65e0\u9700\u4e3a\u6bcf\u4e2a\u76ee\u6807\u9884\u7b97\u5355\u72ec\u538b\u7f29\uff0c\u663e\u8457\u964d\u4f4e\u5de5\u4e1a\u90e8\u7f72\u6210\u672c\uff0c\u4e14\u652f\u6301\u5b9e\u65f6\u52a8\u6001\u5207\u6362\uff0c\u5177\u6709\u5f88\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Activation patching is the primary tool in mechanistic interpretability. It attributes causal responsibility for a model behavior to each of its individual components by estimating its natural indirect effect (NIE). Re-deriving the activation patching estimand from causal mediation analysis, we find that the NIE does not solely capture the causal effect through the specific component. It also contains interaction effects (INT) that measure how much the component\u0027s causal effect itself depends on the state of other components in the model. A natural response may be to try to eliminate INT by adjusting the estimator or unit of analysis, but each of these potential remedies has predictable failure modes. We demonstrate these failure modes in the GPT-2 IOI circuit; components whose causal importance is conditional on the state of other components are either invisible or artificially inflated, and INT variance explains the previously documented instability of faithfulness scores. We prove that INT scales with the distance between clean and patched component activations, is negligible when the model is locally affine, and decomposes combinatorially into pairwise and higher-order group interactions. Despite its inevitability, INT is not a nuisance to be eliminated, but rather a diagnostic for interpretability studies. Its individual and group-level magnitude and sign signal when causal conclusions are prompt-dependent, and when greedy NIE-based component ranking will miss mechanisms only discoverable through combinatorial search.", "arxiv_id": "2606.27510", "arxiv_url": "https://arxiv.org/abs/2606.27510", "authors": ["Sankaran Vaidyanathan", "David Arbour", "Aaron Mueller", "Scott Niekum", "David Jensen"], "brief": "\u672c\u6587\u4ece\u56e0\u679c\u4e2d\u4ecb\u5206\u6790\u91cd\u65b0\u63a8\u5bfc\u6fc0\u6d3b\u4fee\u8865\u7684\u4f30\u8ba1\u91cf\uff0c\u53d1\u73b0\u81ea\u7136\u95f4\u63a5\u6548\u5e94\uff08NIE\uff09\u9664\u6355\u83b7\u76ee\u6807\u7ec4\u4ef6\u7684\u56e0\u679c\u6548\u5e94\u5916\uff0c\u8fd8\u5305\u542b\u8861\u91cf\u8be5\u7ec4\u4ef6\u6548\u5e94\u4f9d\u8d56\u5176\u4ed6\u7ec4\u4ef6\u72b6\u6001\u7684\u4ea4\u4e92\u6548\u5e94\uff08INT\uff09\uff0c\u5e76\u7cfb\u7edf\u5206\u6790\u4e86\u5176\u5728GPT-2 IOI\u7535\u8def\u4e2d\u7684\u5177\u4f53\u5f71\u54cd\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27510", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["NIE = \u76ee\u6807\u7ec4\u4ef6\u56e0\u679c\u6548\u5e94 + \u4ea4\u4e92\u6548\u5e94\uff08INT\uff09\uff0cINT\u65e0\u6cd5\u901a\u8fc7\u8c03\u6574\u4f30\u8ba1\u5668\u6216\u5206\u6790\u5355\u5143\u7b80\u5355\u6d88\u9664", "\u5728GPT-2 IOI\u7535\u8def\u5b9e\u9a8c\u4e2d\uff0c\u6761\u4ef6\u6027\u91cd\u8981\u7ec4\u4ef6\u8981\u4e48\u4e0d\u53ef\u89c1\u8981\u4e48\u88ab\u4eba\u4e3a\u653e\u5927\uff0cINT\u65b9\u5dee\u89e3\u91ca\u4e86\u5fe0\u5b9e\u5ea6\u5206\u6570\u7684\u5df2\u77e5\u4e0d\u7a33\u5b9a\u6027", "\u7406\u8bba\u8bc1\u660eINT\u4e0e\u5e72\u51c0/\u4fee\u8865\u6fc0\u6d3b\u8ddd\u79bb\u6210\u6bd4\u4f8b\uff0c\u5728\u6a21\u578b\u5c40\u90e8\u4eff\u5c04\u65f6\u53ef\u5ffd\u7565\uff0c\u5e76\u53ef\u5206\u89e3\u4e3a\u6210\u5bf9\u53ca\u9ad8\u9636\u7ec4\u5408\u4ea4\u4e92"], "keywords": ["\u673a\u5236\u53ef\u89e3\u91ca\u6027", "\u56e0\u679c\u63a8\u65ad", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7535\u8def\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27510v1", "published_at": "2026-06-25", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "The Curse of Multiple Mediators: Hidden Interaction Effects in Activation Patching", "tldr": "\u6fc0\u6d3b\u4fee\u8865\u4e2d\u7684\u81ea\u7136\u95f4\u63a5\u6548\u5e94\u5305\u542b\u9690\u85cf\u4ea4\u4e92\u9879\uff0c\u63ed\u793a\u673a\u5236\u53ef\u89e3\u91ca\u6027\u7684\u7cfb\u7edf\u6027\u504f\u5dee", "upvotes": 0, "what_it_is": "\u672c\u6587\u4ece\u56e0\u679c\u4e2d\u4ecb\u5206\u6790\u91cd\u65b0\u63a8\u5bfc\u6fc0\u6d3b\u4fee\u8865\u7684\u4f30\u8ba1\u91cf\uff0c\u53d1\u73b0\u81ea\u7136\u95f4\u63a5\u6548\u5e94\uff08NIE\uff09\u9664\u6355\u83b7\u76ee\u6807\u7ec4\u4ef6\u7684\u56e0\u679c\u6548\u5e94\u5916\uff0c\u8fd8\u5305\u542b\u8861\u91cf\u8be5\u7ec4\u4ef6\u6548\u5e94\u4f9d\u8d56\u5176\u4ed6\u7ec4\u4ef6\u72b6\u6001\u7684\u4ea4\u4e92\u6548\u5e94\uff08INT\uff09\uff0c\u5e76\u7cfb\u7edf\u5206\u6790\u4e86\u5176\u5728GPT-2 IOI\u7535\u8def\u4e2d\u7684\u5177\u4f53\u5f71\u54cd\u3002", "why_notable": "\u6fc0\u6d3b\u4fee\u8865\u662f\u673a\u5236\u53ef\u89e3\u91ca\u6027\u9886\u57df\u6700\u6838\u5fc3\u7684\u5de5\u5177\uff0c\u672c\u6587\u4ece\u7406\u8bba\u4e0a\u63ed\u793a\u5176\u7cfb\u7edf\u6027\u76f2\u70b9\uff0c\u5e76\u5c06INT\u91cd\u65b0\u5b9a\u4f4d\u4e3a\u8bca\u65ad\u5de5\u5177\u800c\u975e\u566a\u58f0\uff0c\u5bf9\u7535\u8def\u53d1\u73b0\u548c\u7ec4\u4ef6\u5f52\u56e0\u7814\u7a76\u5177\u6709\u91cd\u8981\u65b9\u6cd5\u8bba\u610f\u4e49\u3002"}, {"abstract": "Robots trained on real world data tend to be imprecise, slow, and brittle to perturbations. Improving these policies with reinforcement learning (RL) is an appealing alternative, but this process often requires expensive training in the real world. Performing policy improvement in simulation instead provides a far cheaper alternative, but unconstrained RL in simulation can exploit contact and dynamics mismatches, resulting in unsafe behaviors that do not transfer to hardware. Common forms of regularization can furthermore limit improvement by overconstraining to an imperfect behavior prior. In this work, we propose Support-Constrained Off-Domain REinforcement (SCORE), a real-to-sim-to-real framework that constrains RL in simulation to the support of a generative policy pretrained on real data. We instantiate this constraint through flow steering, restricting SCORE to actions the base policy can already produce, which ensures transferable behaviors while maximizing policy improvement. Improving a policy with SCORE requires minimal effort: it learns from sparse rewards, avoids distillation, and leaves the base policy untouched. Across eight real-world dexterous multi-fingered robotic manipulation tasks, SCORE improves average success rate from 37.8% to 89.9%, compared to 59.5% for the best baseline, and reaches success in 36.8% fewer steps than the base policy. Ultimately, through extensive experiments and ablations, we show that simulation can substantially improve real-world manipulation policies when policy optimization is appropriately constrained, introducing a new paradigm for real-to-sim-to-real policy improvement. Videos and code are available at https://weirdlabuw.github.io/score/.", "arxiv_id": "2606.27475", "arxiv_url": "https://arxiv.org/abs/2606.27475", "authors": ["Raymond Yu", "William Huey", "Mustafa Mukadam", "Anusha Nagabandi", "Abhishek Gupta"], "brief": "\u63d0\u51faSCORE\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u4eff\u771f\u4e2d\u7684\u5f3a\u5316\u5b66\u4e60\u7ea6\u675f\u5728\u771f\u5b9e\u6570\u636e\u9884\u8bad\u7ec3\u751f\u6210\u7b56\u7565\u7684\u652f\u6491\u96c6\u5185\uff08flow steering\u6280\u672f\uff09\uff0c\u5b9e\u73b0real-to-sim-to-real\u7b56\u7565\u63d0\u5347\uff0c\u65e0\u9700\u771f\u5b9e\u4e16\u754cRL\u8bad\u7ec3\u3002", "categories": ["cs.RO", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27475", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6838\u5fc3\u7ea6\u675f\u673a\u5236\uff1aflow steering\u5c06RL\u52a8\u4f5c\u9650\u5236\u5728\u57fa\u7840\u7b56\u7565\u5df2\u80fd\u751f\u6210\u7684\u52a8\u4f5c\u8303\u56f4\u5185\uff0c\u907f\u514d\u5229\u7528\u4eff\u771f\u4e0e\u73b0\u5b9e\u7684\u52a8\u529b\u5b66\u5dee\u5f02\u4ea7\u751f\u4e0d\u53ef\u8fc1\u79fb\u884c\u4e3a", "\u5b9e\u9a8c\u6548\u679c\u663e\u8457\uff1a8\u4e2a\u771f\u5b9e\u7075\u5de7\u591a\u6307\u673a\u5668\u4eba\u64cd\u4f5c\u4efb\u52a1\u4e2d\uff0c\u5e73\u5747\u6210\u529f\u7387\u4ece37.8%\u63d0\u5347\u81f389.9%\uff0c\u6700\u4f73\u57fa\u7ebf\u4ec559.5%\uff0c\u4e14\u5b8c\u6210\u6b65\u6570\u51cf\u5c1136.8%", "\u5de5\u7a0b\u53cb\u597d\uff1a\u4ec5\u9700\u7a00\u758f\u5956\u52b1\uff0c\u65e0\u9700\u84b8\u998f\uff0c\u57fa\u7840\u7b56\u7565\u4fdd\u6301\u4e0d\u53d8\uff0c\u90e8\u7f72\u6210\u672c\u6781\u4f4e"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u673a\u5668\u4eba\u64cd\u4f5c", "\u4eff\u771f\u8fc1\u79fb", "\u7b56\u7565\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27475v1", "published_at": "2026-06-25", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Support-Constrained RL Enables Real-World Policy Improvement without Real-World Experience", "tldr": "\u5728\u4eff\u771f\u4e2d\u7ea6\u675fRL\u5230\u771f\u5b9e\u7b56\u7565\u652f\u6491\u96c6\uff0c\u65e0\u9700\u771f\u5b9e\u73af\u5883\u4ea4\u4e92\u5373\u53ef\u5927\u5e45\u63d0\u5347\u673a\u5668\u4eba\u64cd\u4f5c\u6210\u529f\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faSCORE\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u4eff\u771f\u4e2d\u7684\u5f3a\u5316\u5b66\u4e60\u7ea6\u675f\u5728\u771f\u5b9e\u6570\u636e\u9884\u8bad\u7ec3\u751f\u6210\u7b56\u7565\u7684\u652f\u6491\u96c6\u5185\uff08flow steering\u6280\u672f\uff09\uff0c\u5b9e\u73b0real-to-sim-to-real\u7b56\u7565\u63d0\u5347\uff0c\u65e0\u9700\u771f\u5b9e\u4e16\u754cRL\u8bad\u7ec3\u3002", "why_notable": "\u89e3\u51b3\u4e86sim-to-real\u8fc1\u79fb\u4e2dRL\u8fc7\u5ea6\u5229\u7528\u4eff\u771f\u6f0f\u6d1e\u7684\u6838\u5fc3\u96be\u9898\uff0c\u540c\u65f6\u907f\u514d\u4e86\u8fc7\u5ea6\u7ea6\u675f\u9650\u5236\u63d0\u5347\u7684\u95ee\u9898\uff0c\u5728\u7075\u5de7\u64cd\u4f5c\u4efb\u52a1\u4e0a\u53d6\u5f97\u8fdc\u8d85\u57fa\u7ebf\u7684\u6210\u679c\uff0c\u4e3areal-to-sim-to-real\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Vision-language models must reconcile visual evidence with memorized world knowledge when the two conflict. How they resolve this conflict shapes the reliability of multimodal systems, yet prior work characterizes it behaviorally without a component-level causal account. We combine activation patching across three granularities (residual stream, attention heads, and MLP sublayers) with model-component ablation studies and mechanistic analysis. Across three VLM families, we find that visual grounding emerges by default, whereas prior grounding depends on a small set of causally necessary attention heads (2.5-4.8%) concentrated in the second half of the network. These heads enable answers from stored world knowledge (e.g., \"red\" for a strawberry) despite conflicting visual input. Ablating them flips predictions from knowledge-grounded to visually grounded answers in 68-96% of cases under prior-knowledge prompts, but changes only 0.8-7.5% of visually grounded predictions, establishing an asymmetric causal structure. The identified heads decompose into routing heads, which modulate information flow, and writing heads, which directly project answer tokens into the residual stream. This structure is consistent across model families and scales, revealing a sparse causal circuit underlying perception-knowledge conflict in VLMs.", "arxiv_id": "2606.28273", "arxiv_url": "https://arxiv.org/abs/2606.28273", "authors": ["Niclas Lietzow", "Danielle Bitterman", "Carsten Eickhoff", "William Rudman", "Michal Golovanevsky"], "brief": "\u672c\u6587\u901a\u8fc7\u6fc0\u6d3b\u4fee\u8865\u3001\u7ec4\u4ef6\u6d88\u878d\u548c\u673a\u5236\u5206\u6790\uff0c\u63ed\u793a\u4e86\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u89c6\u89c9\u8bc1\u636e\u4e0e\u8bb0\u5fc6\u77e5\u8bc6\u51b2\u7a81\u65f6\u7684\u5185\u90e8\u56e0\u679c\u673a\u5236\uff0c\u53d1\u73b0\u89c6\u89c9\u63a5\u5730\u662f\u9ed8\u8ba4\u884c\u4e3a\uff0c\u800c\u5148\u9a8c\u77e5\u8bc6\u8c03\u7528\u4f9d\u8d56\u7f51\u7edc\u540e\u534a\u6bb5\u6781\u5c11\u6570\uff082.5-4.8%\uff09\u6ce8\u610f\u529b\u5934\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28273", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6d88\u878d\u5173\u952e\u6ce8\u610f\u529b\u5934\u540e\uff0c68-96%\u7684\u5148\u9a8c\u77e5\u8bc6\u9a71\u52a8\u9884\u6d4b\u7ffb\u8f6c\u4e3a\u89c6\u89c9\u63a5\u5730\u7b54\u6848\uff0c\u800c\u89c6\u89c9\u63a5\u5730\u9884\u6d4b\u4ec50.8-7.5%\u53d7\u5f71\u54cd\uff0c\u5448\u73b0\u663e\u8457\u4e0d\u5bf9\u79f0\u56e0\u679c\u7ed3\u6784", "\u5173\u952e\u6ce8\u610f\u529b\u5934\u5206\u4e3a\u4e24\u7c7b\uff1a\u8def\u7531\u5934\uff08\u8c03\u8282\u4fe1\u606f\u6d41\uff09\u548c\u5199\u5165\u5934\uff08\u76f4\u63a5\u5c06\u7b54\u6848token\u6295\u5f71\u5230\u6b8b\u5dee\u6d41\uff09", "\u8be5\u7a00\u758f\u56e0\u679c\u56de\u8def\u5728\u4e09\u4e2aVLM\u5bb6\u65cf\u548c\u4e0d\u540c\u89c4\u6a21\u6a21\u578b\u4e2d\u4fdd\u6301\u4e00\u81f4\uff0c\u5177\u6709\u8de8\u6a21\u578b\u666e\u9002\u6027"], "keywords": ["\u591a\u6a21\u6001", "\u53ef\u89e3\u91ca\u6027", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u673a\u5236\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28273v1", "published_at": "2026-06-26", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Vision-Default, Prior-Override: Causal Mechanisms of Perception-Knowledge Conflict in Vision-Language Models", "tldr": "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e2d\u89c6\u89c9\u611f\u77e5\u4e0e\u5148\u9a8c\u77e5\u8bc6\u51b2\u7a81\u7684\u56e0\u679c\u673a\u5236\uff1a\u5c11\u91cf\u6ce8\u610f\u529b\u5934\u51b3\u5b9a\u77e5\u8bc6\u8c03\u7528", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7\u6fc0\u6d3b\u4fee\u8865\u3001\u7ec4\u4ef6\u6d88\u878d\u548c\u673a\u5236\u5206\u6790\uff0c\u63ed\u793a\u4e86\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u89c6\u89c9\u8bc1\u636e\u4e0e\u8bb0\u5fc6\u77e5\u8bc6\u51b2\u7a81\u65f6\u7684\u5185\u90e8\u56e0\u679c\u673a\u5236\uff0c\u53d1\u73b0\u89c6\u89c9\u63a5\u5730\u662f\u9ed8\u8ba4\u884c\u4e3a\uff0c\u800c\u5148\u9a8c\u77e5\u8bc6\u8c03\u7528\u4f9d\u8d56\u7f51\u7edc\u540e\u534a\u6bb5\u6781\u5c11\u6570\uff082.5-4.8%\uff09\u6ce8\u610f\u529b\u5934\u3002", "why_notable": "\u9996\u6b21\u4ece\u7ec4\u4ef6\u7ea7\u56e0\u679c\u89c6\u89d2\uff08\u800c\u975e\u884c\u4e3a\u5c42\u9762\uff09\u89e3\u91caVLM\u611f\u77e5-\u77e5\u8bc6\u51b2\u7a81\u673a\u5236\uff0c\u53d1\u73b0\u6781\u5c11\u6570\u6ce8\u610f\u529b\u5934\u63a7\u5236\u77e5\u8bc6\u8c03\u7528\u7684\u7a00\u758f\u7535\u8def\uff0c\u5bf9\u63d0\u5347\u591a\u6a21\u6001\u7cfb\u7edf\u53ef\u9760\u6027\u548c\u53ef\u89e3\u91ca\u6027\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Large Vision-Language Models (LVLMs) specialized in healthcare are emerging as a promising research direction due to their potential impact in clinical and biomedical applications. However, progress is constrained by the scarcity of high-quality medical multimodal data, concerns about robustness in safety-critical settings, and the narrow and potentially contaminated evaluation benchmarks that limit reliable assessment. To address these issues, the field requires state-of-the-art solutions to be fully open and reproducible systems in which all components can be inspected, evaluated, and improved. This work introduces Aloe-Vision-Data, a large-scale, quality-filtered mixture which integrates both medical and general domains across multimodal and text-only sources, designed for direct use in model fine-tuning. Building on this dataset, we train the Aloe-Vision family of medical LVLMs, openly released with full weights, training recipes and data, in two scales (7B and 72B). Through comprehensive benchmarking, we demonstrate that high quality training mixtures produce balanced LVLMs which yield significant gains over the baseline models without compromising general capabilities, achieving competitive performance with respect to state-of-the-art alternatives. To support reliable evaluation, we introduce CareQA-Vision, a carefully curated vision benchmark derived from MIR and EIR exams, the residency entrance exams for medical and nursing specialists in Spain, offering novel vision questions with low likelihood of contamination. Finally, we show that current LVLMs remain vulnerable to adversarial and misleading inputs, underscoring reliability challenges in clinical contexts.", "arxiv_id": "2606.27500", "arxiv_url": "https://arxiv.org/abs/2606.27500", "authors": ["Jaume Guasch-Mart\u00ed", "Enrique Lopez-Cuena", "Mart\u00edn Su\u00e1rez-Fern\u00e1ndez", "Jordi Bayarri-Planas", "Anna Arias-Duart", "Dario Garcia-Gasulla"], "brief": "\u672c\u6587\u63d0\u51faAloe-Vision\u7cfb\u5217\u533b\u7597\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff087B\u548c72B\uff09\uff0c\u914d\u5957\u53d1\u5e03\u9ad8\u8d28\u91cf\u8bad\u7ec3\u6570\u636e\u96c6Aloe-Vision-Data\u548c\u4f4e\u6c61\u67d3\u8bc4\u6d4b\u57fa\u51c6CareQA-Vision\uff0c\u5168\u90e8\u5f00\u6e90\u53ef\u590d\u73b0\u3002", "categories": ["cs.CV", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27500", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efa\u5927\u89c4\u6a21\u8d28\u91cf\u8fc7\u6ee4\u7684\u591a\u6a21\u6001\u533b\u7597\u8bad\u7ec3\u6570\u636e\u96c6\uff0c\u878d\u5408\u533b\u7597\u4e0e\u901a\u7528\u9886\u57df\u7684\u591a\u6a21\u6001\u53ca\u7eaf\u6587\u672c\u6570\u636e", "\u63a8\u51fa7B\u548c72B\u4e24\u79cd\u89c4\u6a21\u7684\u533b\u7597LVLM\uff0c\u5b8c\u6574\u5f00\u653e\u6743\u91cd\u3001\u8bad\u7ec3\u914d\u65b9\u548c\u6570\u636e\uff0c\u5728\u591a\u9879\u57fa\u51c6\u4e0a\u8fbe\u5230\u7ade\u4e89\u6027\u6027\u80fd", "\u5f15\u5165CareQA-Vision\u8bc4\u6d4b\u57fa\u51c6\uff08\u6e90\u81ea\u897f\u73ed\u7259\u4f4f\u9662\u533b\u5e08\u8d44\u683c\u8003\u8bd5\uff09\uff0c\u6c61\u67d3\u98ce\u9669\u4f4e\uff1b\u540c\u65f6\u63ed\u793a\u73b0\u6709\u6a21\u578b\u5bf9\u5bf9\u6297\u6027\u548c\u8bef\u5bfc\u6027\u8f93\u5165\u4ecd\u5b58\u5728\u8106\u5f31\u6027"], "keywords": ["\u591a\u6a21\u6001", "\u533b\u7597AI", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u8bc4\u6d4b\u57fa\u51c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27500v1", "published_at": "2026-06-25", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Aloe-Vision: Robust Vision-Language Models for Healthcare", "tldr": "\u5f00\u6e90\u533b\u7597\u89c6\u89c9\u8bed\u8a00\u6a21\u578bAloe-Vision\uff0c\u542b\u6570\u636e\u3001\u8bad\u7ec3\u65b9\u6848\u53ca\u65b0\u8bc4\u6d4b\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51faAloe-Vision\u7cfb\u5217\u533b\u7597\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff087B\u548c72B\uff09\uff0c\u914d\u5957\u53d1\u5e03\u9ad8\u8d28\u91cf\u8bad\u7ec3\u6570\u636e\u96c6Aloe-Vision-Data\u548c\u4f4e\u6c61\u67d3\u8bc4\u6d4b\u57fa\u51c6CareQA-Vision\uff0c\u5168\u90e8\u5f00\u6e90\u53ef\u590d\u73b0\u3002", "why_notable": "\u9996\u4e2a\u5728\u533b\u7597LVLM\u9886\u57df\u5b9e\u73b0\u6570\u636e\u3001\u6a21\u578b\u3001\u8bad\u7ec3\u6d41\u7a0b\u5168\u94fe\u8def\u5f00\u6e90\u7684\u5de5\u4f5c\uff0c\u540c\u65f6\u63d0\u4f9b\u4f4e\u6c61\u67d3\u8bc4\u6d4b\u57fa\u51c6\u5e76\u6307\u51fa\u4e34\u5e8a\u53ef\u9760\u6027\u6311\u6218\uff0c\u5bf9\u63a8\u52a8\u53ef\u590d\u73b0\u533b\u7597AI\u7814\u7a76\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "We present StructSplat, a feed-forward and generalizable 3D Gaussian reconstruction framework that operates directly on uncalibrated images without requiring camera parameters. Existing methods either rely on per-scene optimization or assume known camera poses, and often entangle geometry and appearance within a unified backbone, limiting reconstruction fidelity and generalization. Our key idea is to adopt a structured representation that organizes geometry, semantic, and texture cues with explicit roles in the reconstruction process. Specifically, we introduce a pixel-aligned feature injection mechanism to enable accurate texture modeling from 2D observations, incorporate semantic-aware priors to improve global consistency, and design a camera alignment strategy to prevent information leakage and improve generalization. Experiments show that our method significantly outperforms prior approaches on challenging benchmarks. On DL3DV, our method achieves 28.045 PSNR, surpassing AnySplat (22.377) by +5.67 dB. In cross-dataset evaluation, our method achieves +1.94 dB over AnySplat on ACID and +1.72 dB on RealEstate10K. Project page: https://structsplat.github.io Code: https://github.com/J-C-Zhao/StructSplat", "arxiv_id": "2606.28321", "arxiv_url": "https://arxiv.org/abs/2606.28321", "authors": ["Jia-Chen Zhao", "Beiqi Chen", "Xinyang Chen", "Guangcong Wang", "Liqiang Nie"], "brief": "\u63d0\u51faStructSplat\u6846\u67b6\uff0c\u65e0\u9700\u76f8\u673a\u6807\u5b9a\u53c2\u6570\u5373\u53ef\u4ece\u7a00\u758f\u89c6\u56fe\u524d\u9988\u5f0f\u91cd\u5efa3D\u9ad8\u65af\u573a\u666f\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u8868\u793a\u5c06\u51e0\u4f55\u3001\u8bed\u4e49\u548c\u7eb9\u7406\u7ebf\u7d22\u89e3\u8026\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u6cdb\u5316\u91cd\u5efa\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28321", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u50cf\u7d20\u5bf9\u9f50\u7279\u5f81\u6ce8\u5165\u673a\u5236\uff1a\u4ece2D\u89c2\u6d4b\u4e2d\u7cbe\u786e\u5efa\u6a21\u7eb9\u7406\uff0c\u907f\u514d\u51e0\u4f55\u4e0e\u5916\u89c2\u7279\u5f81\u7684\u8026\u5408\u5e72\u6270", "\u5f15\u5165\u8bed\u4e49\u611f\u77e5\u5148\u9a8c\u63d0\u5347\u5168\u5c40\u4e00\u81f4\u6027\uff0c\u5e76\u8bbe\u8ba1\u76f8\u673a\u5bf9\u9f50\u7b56\u7565\u9632\u6b62\u4fe1\u606f\u6cc4\u6f0f", "DL3DV\u4e0aPSNR\u8fbe28.045 dB\uff0c\u8d85\u8d8aAnySplat\uff0822.377\uff09\u8fbe+5.67 dB\uff1b\u8de8\u6570\u636e\u96c6\u8bc4\u4f30\u540c\u6837\u9886\u5148+1.72~1.94 dB"], "keywords": ["3D\u91cd\u5efa", "\u9ad8\u65af\u6cfc\u6e85", "\u591a\u89c6\u56fe", "\u6cdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28321v1", "published_at": "2026-06-26", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "StructSplat: Generalizable 3D Gaussian Splatting from Uncalibrated Sparse Views", "tldr": "StructSplat\uff1a\u65e0\u9700\u76f8\u673a\u53c2\u6570\uff0c\u4ece\u7a00\u758f\u672a\u6807\u5b9a\u56fe\u50cf\u6cdb\u5316\u91cd\u5efa3D\u9ad8\u65af\u573a\u666f", "upvotes": 0, "what_it_is": "\u63d0\u51faStructSplat\u6846\u67b6\uff0c\u65e0\u9700\u76f8\u673a\u6807\u5b9a\u53c2\u6570\u5373\u53ef\u4ece\u7a00\u758f\u89c6\u56fe\u524d\u9988\u5f0f\u91cd\u5efa3D\u9ad8\u65af\u573a\u666f\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u8868\u793a\u5c06\u51e0\u4f55\u3001\u8bed\u4e49\u548c\u7eb9\u7406\u7ebf\u7d22\u89e3\u8026\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u6cdb\u5316\u91cd\u5efa\u3002", "why_notable": "\u9996\u4e2a\u65e0\u9700\u76f8\u673a\u53c2\u6570\u7684\u6cdb\u53163D\u9ad8\u65af\u91cd\u5efa\u65b9\u6848\uff0c\u6027\u80fd\u5927\u5e45\u9886\u5148\u73b0\u6709\u65b9\u6cd5\uff0c\u5bf9\u771f\u5b9e\u573a\u666f\u4e0b\u7684\u5feb\u901f\u4e09\u7ef4\u91cd\u5efa\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u4ee3\u7801\u5df2\u5f00\u6e90\u3002"}, {"abstract": "Building interactive world models requires generating realistic videos while maintaining controllable dynamics over long horizons. Autoregressive video generation offers a scalable foundation, but suffers from error accumulation and temporal degradation during extended rollouts. This issue is further amplified under heterogeneous controls such as human motion and camera trajectories, which may interfere and destabilize a pretrained video prior, while existing methods often trade off controllability and visual quality. We propose \"Directing the World\", a fast autoregressive framework for controllable world-model video generation with compositional human-motion and camera-trajectory control. Our key idea is to decouple control learning while preserving a unified autoregressive video prior. We introduce a Fast-Slow Memory training strategy to stabilize long-horizon rollout learning and improve convergence. For human motion control, we design a t-guided Dynamic Projection mechanism and a refined Motion-CFG strategy, enabling temporally smooth and accurate motion alignment without degrading visual fidelity, and supporting multi-person control.After learning a robust motion prior, we introduce a second-stage camera-trajectory control module to compose human dynamics with viewpoint changes for coherent world exploration. We further construct a large-scale dataset with synchronized video, text, human-motion, and camera-trajectory annotations, organized into motion-centric and camera-centric subsets for decoupled training. Extensive experiments show stable long-horizon generation with precise controllability and high visual quality. See more at https://whydahuzi.github.io/Directing-the-World.github.io/.", "arxiv_id": "2606.27964", "arxiv_url": "https://arxiv.org/abs/2606.27964", "authors": ["Haoyuan Wang", "Yabo Chen", "Haibin Huang", "Chi Zhang", "Xuelong Li"], "brief": "\u63d0\u51fa\u4e00\u79cd\u5feb\u901f\u81ea\u56de\u5f52\u89c6\u9891\u751f\u6210\u6846\u67b6\uff0c\u901a\u8fc7\u89e3\u8026\u4eba\u4f53\u8fd0\u52a8\u63a7\u5236\u4e0e\u76f8\u673a\u8f68\u8ff9\u63a7\u5236\uff0c\u5b9e\u73b0\u957f\u65f6\u57df\u7a33\u5b9a\u3001\u9ad8\u8d28\u91cf\u7684\u53ef\u63a7\u4e16\u754c\u6a21\u578b\u89c6\u9891\u751f\u6210\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27964", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["Fast-Slow Memory\u8bad\u7ec3\u7b56\u7565\uff1a\u7a33\u5b9a\u957f\u65f6\u57df\u81ea\u56de\u5f52\u5c55\u5f00\uff0c\u7f13\u89e3\u8bef\u5dee\u7d2f\u79ef\u4e0e\u65f6\u5e8f\u9000\u5316\u95ee\u9898", "t-guided\u52a8\u6001\u6295\u5f71\u673a\u5236 + Motion-CFG\u7b56\u7565\uff1a\u5b9e\u73b0\u65f6\u5e8f\u5e73\u6ed1\u7684\u591a\u4eba\u8fd0\u52a8\u7cbe\u51c6\u5bf9\u9f50\uff0c\u4e0d\u635f\u5931\u89c6\u89c9\u4fdd\u771f\u5ea6", "\u4e24\u9636\u6bb5\u8bad\u7ec3\uff1a\u5148\u5b66\u4e60\u9c81\u68d2\u8fd0\u52a8\u5148\u9a8c\uff0c\u518d\u5f15\u5165\u76f8\u673a\u8f68\u8ff9\u63a7\u5236\u6a21\u5757\uff0c\u652f\u6301\u4eba\u4f53\u52a8\u6001\u4e0e\u89c6\u89d2\u53d8\u5316\u7684\u7ec4\u5408\u751f\u6210\uff1b\u5e76\u6784\u5efa\u4e86\u542b\u89c6\u9891\u3001\u6587\u672c\u3001\u4eba\u4f53\u8fd0\u52a8\u3001\u76f8\u673a\u8f68\u8ff9\u540c\u6b65\u6807\u6ce8\u7684\u5927\u89c4\u6a21\u6570\u636e\u96c6"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u4e16\u754c\u6a21\u578b", "\u53ef\u63a7\u751f\u6210", "\u81ea\u56de\u5f52\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27964v1", "published_at": "2026-06-26", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Directing the World: Fast Autoregressive Video Generation with Compositional Human-Camera Control", "tldr": "\u63d0\u51fa\"Directing the World\"\u6846\u67b6\uff0c\u5b9e\u73b0\u4eba\u4f53\u8fd0\u52a8\u4e0e\u76f8\u673a\u8f68\u8ff9\u53ef\u7ec4\u5408\u63a7\u5236\u7684\u5feb\u901f\u81ea\u56de\u5f52\u89c6\u9891\u751f\u6210", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u5feb\u901f\u81ea\u56de\u5f52\u89c6\u9891\u751f\u6210\u6846\u67b6\uff0c\u901a\u8fc7\u89e3\u8026\u4eba\u4f53\u8fd0\u52a8\u63a7\u5236\u4e0e\u76f8\u673a\u8f68\u8ff9\u63a7\u5236\uff0c\u5b9e\u73b0\u957f\u65f6\u57df\u7a33\u5b9a\u3001\u9ad8\u8d28\u91cf\u7684\u53ef\u63a7\u4e16\u754c\u6a21\u578b\u89c6\u9891\u751f\u6210\u3002", "why_notable": "\u9996\u6b21\u5728\u81ea\u56de\u5f52\u89c6\u9891\u751f\u6210\u6846\u67b6\u4e0b\u5b9e\u73b0\u4eba\u4f53\u8fd0\u52a8\u4e0e\u76f8\u673a\u8f68\u8ff9\u7684\u53ef\u7ec4\u5408\u63a7\u5236\uff0c\u89e3\u51b3\u4e86\u957f\u65f6\u57df\u751f\u6210\u4e2d\u7684\u7a33\u5b9a\u6027\u96be\u9898\uff0c\u5bf9\u4ea4\u4e92\u5f0f\u4e16\u754c\u6a21\u578b\u548c\u5177\u8eab\u667a\u80fd\u573a\u666f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The AI community has framed the relationship between large language models (LLMs) and world models as a dichotomy: LLMs predict tokens; world models simulate reality. Yann LeCun argues in 2022 that reaching general intelligence requires abandoning autoregressive token prediction in favour of latent-space architectures. This framing is unnecessarily binary. Two claims will be defended. First, LLMs are a degenerate special case of world models: the state space is the set of all token sequences, the only action is appending one token, and world models are therefore a strict generalisation of LLMs, not a replacement. Second, there is a natural continuous spectrum from NTP to JEPA, with multi-token prediction, future-summary prediction, and next-latent prediction as intermediate stations already populated by current research. Moving along this spectrum relaxes the LLM constraints one by one. It also progressively surrenders the two practical advantages that make LLMs trainable at scale: internet-scale self-supervised data, and a transformer architecture co-designed for discrete token prediction. Both are examined as open research questions: the data question (the cliff from self-supervised text to instrumented action-labelled environments) and the architecture question (whether the transformer generalises to continuous-state prediction, or whether a new primitive is needed).", "arxiv_id": "2606.28127", "arxiv_url": "https://arxiv.org/abs/2606.28127", "authors": ["Paul Dubois"], "brief": "\u672c\u6587\u8bba\u8bc1LLM\u5e76\u975e\u4e0e\u4e16\u754c\u6a21\u578b\u5bf9\u7acb\uff0c\u800c\u662f\u5176\u9000\u5316\u7279\u4f8b\uff08\u72b6\u6001\u7a7a\u95f4\u4e3atoken\u5e8f\u5217\uff0c\u52a8\u4f5c\u4ec5\u4e3a\u8ffd\u52a0token\uff09\uff1b\u5e76\u63d0\u51fa\u4ece\u4e0b\u4e00token\u9884\u6d4b\u5230JEPA\uff08\u8054\u5408\u5d4c\u5165\u9884\u6d4b\u67b6\u6784\uff09\u5b58\u5728\u8fde\u7eed\u8c31\u7cfb\uff0c\u591atoken\u9884\u6d4b\u3001\u672a\u6765\u6458\u8981\u9884\u6d4b\u3001\u4e0b\u4e00\u6f5c\u53d8\u91cf\u9884\u6d4b\u5747\u4e3a\u4e2d\u95f4\u7ad9\u70b9\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.28127", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["LLM\u662f\u4e16\u754c\u6a21\u578b\u7684\u7279\u6b8a\u60c5\u5f62\uff1a\u72b6\u6001\u7a7a\u95f4=\u6240\u6709token\u5e8f\u5217\uff0c\u552f\u4e00\u52a8\u4f5c=\u8ffd\u52a0\u4e00\u4e2atoken\uff0c\u4e16\u754c\u6a21\u578b\u662fLLM\u7684\u4e25\u683c\u6cdb\u5316\u800c\u975e\u66ff\u4ee3", "\u4eceNTP\u5230JEPA\u5b58\u5728\u8fde\u7eed\u6f14\u5316\u8def\u5f84\uff0c\u6cbf\u8def\u5f84\u9010\u6b65\u653e\u677eLLM\u7ea6\u675f\uff0c\u4e2d\u95f4\u5f62\u6001\u5df2\u6709\u73b0\u5b9e\u7814\u7a76\u652f\u6491", "\u5411\u8fde\u7eed\u72b6\u6001\u9884\u6d4b\u8fc1\u79fb\u9762\u4e34\u4e24\u5927\u5f00\u653e\u6311\u6218\uff1a\u81ea\u76d1\u7763\u6570\u636e\u60ac\u5d16\uff08\u4ece\u6587\u672c\u5230\u5e26\u52a8\u4f5c\u6807\u6ce8\u7684\u73af\u5883\uff09\u548cTransformer\u67b6\u6784\u662f\u5426\u9002\u7528\u4e8e\u8fde\u7eed\u72b6\u6001\u9884\u6d4b"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.28127v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "From Tokens to States: LLMs as a Special Case of World Models and the Continuous Path Beyond", "tldr": "LLM\u662f\u4e16\u754c\u6a21\u578b\u7684\u9000\u5316\u7279\u4f8b\uff0c\u4ecetoken\u9884\u6d4b\u5230JEPA\u5b58\u5728\u8fde\u7eed\u6f14\u5316\u8def\u5f84", "upvotes": 0, "what_it_is": "\u672c\u6587\u8bba\u8bc1LLM\u5e76\u975e\u4e0e\u4e16\u754c\u6a21\u578b\u5bf9\u7acb\uff0c\u800c\u662f\u5176\u9000\u5316\u7279\u4f8b\uff08\u72b6\u6001\u7a7a\u95f4\u4e3atoken\u5e8f\u5217\uff0c\u52a8\u4f5c\u4ec5\u4e3a\u8ffd\u52a0token\uff09\uff1b\u5e76\u63d0\u51fa\u4ece\u4e0b\u4e00token\u9884\u6d4b\u5230JEPA\uff08\u8054\u5408\u5d4c\u5165\u9884\u6d4b\u67b6\u6784\uff09\u5b58\u5728\u8fde\u7eed\u8c31\u7cfb\uff0c\u591atoken\u9884\u6d4b\u3001\u672a\u6765\u6458\u8981\u9884\u6d4b\u3001\u4e0b\u4e00\u6f5c\u53d8\u91cf\u9884\u6d4b\u5747\u4e3a\u4e2d\u95f4\u7ad9\u70b9\u3002", "why_notable": "\u6253\u7834LeCun\u7b49\u4eba\u5173\u4e8eLLM\u4e0e\u4e16\u754c\u6a21\u578b\u975e\u6b64\u5373\u5f7c\u7684\u4e8c\u5143\u8bba\uff0c\u63d0\u4f9b\u7edf\u4e00\u7406\u8bba\u6846\u67b6\uff0c\u4e3a\u901a\u5411\u901a\u7528\u667a\u80fd\u7684\u67b6\u6784\u6f14\u5316\u8def\u7ebf\u56fe\u63d0\u4f9b\u6e05\u6670\u5206\u6790\uff0c\u5bf9\u9886\u57df\u65b9\u5411\u8ba8\u8bba\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "Vision-Language-Action (VLA) models have demonstrated strong capabilities in robotic manipulation, but their performance degrades significantly in long-horizon tasks due to cumulative error propagation. This limitation largely arises from static feature fusion mechanisms that rely on fixed weights to combine visual, language, and action representations, preventing the model from adapting to different phases of task execution. To address this limitation, we propose S$^2$-VLA, a framework that introduces a State-Space Guided Adaptive Attention (SSGAA) mechanism. SSGAA maintains a belief state that tracks task progression and generates dynamic gating weights to adaptively fuse information from three complementary sources visual features for spatial perception, task intents for high-level task planning, and temporal action sequences for execution consistency. This adaptive fusion allows the model to shift its focus throughout task execution, aligning with the evolving requirements of different task stages. Despite its compact 2B parameter size, S$^2$-VLA consistently outperforms larger 7B-scale models and achieves state-of-the-art performance on long-horizon manipulation benchmarks, including LIBERO and SimplerEnv. highlighting the importance of adaptive feature fusion for long-horizon robotic manipulation.", "arxiv_id": "2606.27872", "arxiv_url": "https://arxiv.org/abs/2606.27872", "authors": ["Zhipeng Xie", "Zongyi Han", "Xiangyi Wei", "Shiliang Sun", "Yang Li", "Jing Zhao"], "brief": "\u63d0\u51faS\u00b2-VLA\u6846\u67b6\uff0c\u5f15\u5165\u72b6\u6001\u7a7a\u95f4\u5f15\u5bfc\u81ea\u9002\u5e94\u6ce8\u610f\u529b\uff08SSGAA\uff09\u673a\u5236\uff0c\u901a\u8fc7\u7ef4\u62a4\u4fe1\u5ff5\u72b6\u6001\u8ffd\u8e2a\u4efb\u52a1\u8fdb\u5ea6\u5e76\u52a8\u6001\u878d\u5408\u89c6\u89c9\u3001\u8bed\u8a00\u548c\u52a8\u4f5c\u7279\u5f81\uff0c\u89e3\u51b3\u957f\u65f6\u5e8f\u673a\u5668\u4eba\u64cd\u63a7\u4e2d\u7684\u7d2f\u79ef\u8bef\u5dee\u95ee\u9898\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27872", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["SSGAA\u7ef4\u62a4\u4fe1\u5ff5\u72b6\u6001\u8ffd\u8e2a\u4efb\u52a1\u6267\u884c\u9636\u6bb5\uff0c\u751f\u6210\u52a8\u6001\u95e8\u63a7\u6743\u91cd\u81ea\u9002\u5e94\u878d\u5408\u89c6\u89c9\u611f\u77e5\u3001\u4efb\u52a1\u610f\u56fe\u548c\u65f6\u5e8f\u52a8\u4f5c\u4e09\u7c7b\u4fe1\u606f", "\u4ec52B\u53c2\u6570\u89c4\u6a21\uff0c\u5728LIBERO\u548cSimplerEnv\u957f\u65f6\u5e8f\u64cd\u63a7\u57fa\u51c6\u4e0a\u6301\u7eed\u8d85\u8d8a7B\u89c4\u6a21\u7684\u5927\u6a21\u578b", "\u89e3\u51b3\u4e86\u4f20\u7edfVLA\u6a21\u578b\u9759\u6001\u7279\u5f81\u878d\u5408\u6743\u91cd\u56fa\u5b9a\u3001\u65e0\u6cd5\u9002\u5e94\u4efb\u52a1\u4e0d\u540c\u9636\u6bb5\u9700\u6c42\u7684\u6838\u5fc3\u7f3a\u9677"], "keywords": ["\u673a\u5668\u4eba\u64cd\u63a7", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u957f\u65f6\u5e8f\u4efb\u52a1", "\u81ea\u9002\u5e94\u6ce8\u610f\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27872v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "S$^2$-VLA: State-Space Guided Vision-Language-Action Models for Long-Horizon Manipulation", "tldr": "\u72b6\u6001\u7a7a\u95f4\u5f15\u5bfc\u7684\u81ea\u9002\u5e94\u6ce8\u610f\u529b\u673a\u5236\uff0c\u8ba92B\u53c2\u6570VLA\u6a21\u578b\u8d85\u8d8a7B\u6a21\u578b\u7684\u957f\u65f6\u5e8f\u64cd\u63a7\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faS\u00b2-VLA\u6846\u67b6\uff0c\u5f15\u5165\u72b6\u6001\u7a7a\u95f4\u5f15\u5bfc\u81ea\u9002\u5e94\u6ce8\u610f\u529b\uff08SSGAA\uff09\u673a\u5236\uff0c\u901a\u8fc7\u7ef4\u62a4\u4fe1\u5ff5\u72b6\u6001\u8ffd\u8e2a\u4efb\u52a1\u8fdb\u5ea6\u5e76\u52a8\u6001\u878d\u5408\u89c6\u89c9\u3001\u8bed\u8a00\u548c\u52a8\u4f5c\u7279\u5f81\uff0c\u89e3\u51b3\u957f\u65f6\u5e8f\u673a\u5668\u4eba\u64cd\u63a7\u4e2d\u7684\u7d2f\u79ef\u8bef\u5dee\u95ee\u9898\u3002", "why_notable": "\u4ee5\u66f4\u5c0f\u53c2\u6570\u91cf\uff082B vs 7B\uff09\u5b9e\u73b0\u66f4\u4f18\u6027\u80fd\uff0c\u8bc1\u660e\u81ea\u9002\u5e94\u7279\u5f81\u878d\u5408\u5bf9\u957f\u65f6\u5e8f\u673a\u5668\u4eba\u64cd\u63a7\u7684\u5173\u952e\u4f5c\u7528\uff0c\u4e3a\u9ad8\u6548VLA\u6a21\u578b\u8bbe\u8ba1\u63d0\u4f9b\u65b0\u601d\u8def\u3002"}, {"abstract": "Multimodal large language models (MLLMs) are increasingly deployed as embodied planners in egocentric environments, where task success requires not only achieving instructed goals but also acting in socially appropriate ways. While explicit goals may render certain actions optimal, implicit social norms often impose hidden constraints. Existing evaluations typically focus on explicit goal achievement or direct norm knowledge, seldom assessing whether planners can infer and apply these hidden constraints within action sequences. We introduce NormAct, a benchmark for embodied social-norm interactions that evaluates plans on Goal Achievement, Norm Compliance, and overall Task Success. NormAct uniquely embeds hidden norms within ordinary tasks, testing whether models can realize them without explicit instruction. Experiments with state-of-the-art MLLMs (GPT-5.4, Claude Opus 4.7, Gemini 3 Pro) reveal a significant gap: models achieve explicit goals in 67.3\\% of cases, but comply with hidden norms in only 26.4\\%. Cue-condition experiments indicate that this gap stems not from a lack of general social knowledge, but from challenges in activating and grounding relevant norms in context. To address this, we propose NormPerceptor, a context-conditioned cue generator that infers scene-relevant norms prior to planning, increasing Task Success from 24.2\\% to 46.7\\%. Our results underscore the importance of enabling embodied agents to proactively detect hidden norms, ground them in visual evidence, and integrate them as action-planning constraints. Our benchmark is publicly available at https://huggingface.co/datasets/Caleb196x/NormAct.", "arxiv_id": "2606.27826", "arxiv_url": "https://arxiv.org/abs/2606.27826", "authors": ["Shiyun Zhao", "Xinwei Song", "Tianyu Guo", "Xiaomeng Gao", "Mingyuan Liu", "Xu Han", "Yuanyuan Zhang", "Zhenliang Zhang", "Xue Feng", "Bo Dai"], "brief": "NormAct\u662f\u4e00\u4e2a\u5177\u8eab\u793e\u4f1a\u89c4\u8303\u4ea4\u4e92\u57fa\u51c6\uff0c\u5c06\u9690\u6027\u793e\u4f1a\u89c4\u8303\u5d4c\u5165\u666e\u901a\u4efb\u52a1\u4e2d\uff0c\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u65e0\u663e\u5f0f\u6307\u4ee4\u60c5\u51b5\u4e0b\u80fd\u5426\u63a8\u65ad\u5e76\u9075\u5b88\u8fd9\u4e9b\u89c4\u8303\uff1b\u540c\u65f6\u63d0\u51faNormPerceptor\u65b9\u6cd5\uff0c\u5728\u89c4\u5212\u524d\u751f\u6210\u573a\u666f\u76f8\u5173\u89c4\u8303\u7ebf\u7d22\u4ee5\u63d0\u5347\u4efb\u52a1\u6210\u529f\u7387\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27826", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u9876\u5c16MLLM\uff08GPT-4.5\u3001Claude Opus 4.7\u3001Gemini 3 Pro\uff09\u663e\u5f0f\u76ee\u6807\u8fbe\u6210\u738767.3%\uff0c\u4f46\u9690\u6027\u89c4\u8303\u9075\u4ece\u7387\u4ec526.4%\uff0c\u5dee\u8ddd\u663e\u8457", "\u7ebf\u7d22\u6761\u4ef6\u5b9e\u9a8c\u8868\u660e\uff0c\u6a21\u578b\u7f3a\u9677\u4e0d\u5728\u4e8e\u7f3a\u4e4f\u793e\u4f1a\u77e5\u8bc6\uff0c\u800c\u5728\u4e8e\u96be\u4ee5\u5728\u5177\u4f53\u60c5\u5883\u4e2d\u6fc0\u6d3b\u5e76\u843d\u5730\u76f8\u5173\u89c4\u8303", "NormPerceptor\u901a\u8fc7\u4e0a\u4e0b\u6587\u6761\u4ef6\u5316\u7ebf\u7d22\u751f\u6210\uff0c\u5c06\u4efb\u52a1\u6574\u4f53\u6210\u529f\u7387\u4ece24.2%\u63d0\u5347\u81f346.7%"], "keywords": ["\u5177\u8eab\u667a\u80fd\u4f53", "\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u793e\u4f1a\u89c4\u8303", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27826v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "NormAct: A Benchmark for Hidden Social Norm Compliance in Embodied Planning", "tldr": "\u63d0\u51faNormAct\u57fa\u51c6\uff0c\u8bc4\u4f30\u5177\u8eab\u89c4\u5212\u4e2d\u9690\u6027\u793e\u4f1a\u89c4\u8303\u9075\u4ece\uff0c\u63ed\u793aMLLM\u663e\u5f0f\u76ee\u6807\u4e0e\u9690\u6027\u89c4\u8303\u95f4\u7684\u5de8\u5927\u5dee\u8ddd", "upvotes": 0, "what_it_is": "NormAct\u662f\u4e00\u4e2a\u5177\u8eab\u793e\u4f1a\u89c4\u8303\u4ea4\u4e92\u57fa\u51c6\uff0c\u5c06\u9690\u6027\u793e\u4f1a\u89c4\u8303\u5d4c\u5165\u666e\u901a\u4efb\u52a1\u4e2d\uff0c\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u65e0\u663e\u5f0f\u6307\u4ee4\u60c5\u51b5\u4e0b\u80fd\u5426\u63a8\u65ad\u5e76\u9075\u5b88\u8fd9\u4e9b\u89c4\u8303\uff1b\u540c\u65f6\u63d0\u51faNormPerceptor\u65b9\u6cd5\uff0c\u5728\u89c4\u5212\u524d\u751f\u6210\u573a\u666f\u76f8\u5173\u89c4\u8303\u7ebf\u7d22\u4ee5\u63d0\u5347\u4efb\u52a1\u6210\u529f\u7387\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316\u5177\u8eab\u89c4\u5212\u4e2d\u9690\u6027\u793e\u4f1a\u89c4\u8303\u9075\u4ece\u95ee\u9898\uff0c\u63ed\u793a\u5f53\u524dMLLM\u7684\u5173\u952e\u77ed\u677f\uff0c\u5e76\u63d0\u4f9b\u516c\u5f00\u57fa\u51c6\u4e0e\u6539\u8fdb\u65b9\u6848\uff0c\u5bf9\u5b89\u5168\u53ef\u4fe1\u7684\u5177\u8eabAI\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u610f\u4e49"}, {"abstract": "Vision-Language-Action (VLA) models enable instruction-driven robotic manipulation, but they inherit oversized language backbones from pretrained VLMs whose capacity far exceeds what is needed for short robotic instructions. This raises a basic question: how much of a VLA model is actually necessary for closed-loop control? In this work, we study architectural redundancy in VLA models by using transformer block removal as a controlled intervention. We introduce \\textbf{Drop-Then-Recovery (DTR)}, an analysis protocol that removes selected blocks from a pretrained VLA model and then fine-tunes the resulting model to measure whether the removed capacity was necessary for downstream control. To make this intervention reliable, we propose \\textbf{GateProbe}, a one-shot virtual-gate sensitivity metric that ranks blocks by their contribution to the downstream action loss. Across multiple VLA architectures, manipulation benchmarks and even real-robot industrial scenarios, we find a strong asymmetry in post-removal recoverability: \\ul{\\textit{language backbones are highly redundant for standard robotic manipulation tasks, whereas vision and action pathways are substantially less tolerant to removal}}. On LIBERO, removing half of the LLM blocks even improves OpenVLA-OFT from 95.0% to 98.3% under the same downstream fine-tuning budget, and retaining only two language blocks still recovers baseline-level performance. These results suggest that current VLA benchmarks may exert limited pressure on deep language grounding and compositional instruction understanding, and that future VLA architectures should allocate capacity more deliberately across language, vision, and action components. The code is available at https://github.com/s1ghhh/VLADrop.", "arxiv_id": "2606.27755", "arxiv_url": "https://arxiv.org/abs/2606.27755", "authors": ["Guoheng Sun", "Kaixi Feng", "Shwai He", "Xiaochuan Gong", "Yexiao He", "Ziyao Wang", "Zheyu Shen", "Wanghao Ye", "Ramana Rao Kompella", "Gaowen Liu", "Ang Li"], "brief": "\u63d0\u51faDrop-Then-Recovery\uff08DTR\uff09\u5206\u6790\u6846\u67b6\uff0c\u901a\u8fc7\u79fb\u9664Transformer\u5757\u5e76\u5fae\u8c03\u6062\u590d\uff0c\u7cfb\u7edf\u7814\u7a76\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u7684\u67b6\u6784\u5197\u4f59\u6027\uff1b\u540c\u65f6\u63d0\u51faGateProbe\u4e00\u6b21\u6027\u654f\u611f\u5ea6\u6307\u6807\u5bf9\u6a21\u5757\u91cd\u8981\u6027\u6392\u5e8f\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27755", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bed\u8a00\u4e3b\u5e72\u9ad8\u5ea6\u5197\u4f59\uff1a\u79fb\u9664OpenVLA-OFT\u4e00\u534aLLM\u5757\u540e\u6027\u80fd\u53cd\u800c\u4ece95.0%\u63d0\u5347\u81f398.3%\uff0c\u4ec5\u4fdd\u7559\u4e24\u4e2a\u8bed\u8a00\u5757\u4ecd\u53ef\u6062\u590d\u57fa\u7ebf\u6027\u80fd", "\u89c6\u89c9\u4e0e\u52a8\u4f5c\u8def\u5f84\u5bf9\u5757\u79fb\u9664\u5bb9\u5fcd\u5ea6\u663e\u8457\u4f4e\u4e8e\u8bed\u8a00\u8def\u5f84\uff0c\u5b58\u5728\u5f3a\u70c8\u4e0d\u5bf9\u79f0\u6027", "GateProbe\u901a\u8fc7\u865a\u62df\u95e8\u63a7\u4e00\u6b21\u6027\u8bc4\u4f30\u5404\u5757\u5bf9\u4e0b\u6e38\u52a8\u4f5c\u635f\u5931\u7684\u8d21\u732e\uff0c\u65e0\u9700\u9010\u5757\u91cd\u8bad"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u591a\u6a21\u6001", "\u6a21\u578b\u538b\u7f29", "\u673a\u5668\u4eba\u64cd\u63a7"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27755v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Drop-Then-Recovery: How Redundant Are Vision-Language-Action Models?", "tldr": "\u7814\u7a76VLA\u6a21\u578b\u5197\u4f59\u6027\uff0c\u53d1\u73b0\u8bed\u8a00\u4e3b\u5e72\u9ad8\u5ea6\u5197\u4f59\uff0c\u89c6\u89c9\u4e0e\u52a8\u4f5c\u8def\u5f84\u4e0d\u53ef\u6216\u7f3a", "upvotes": 0, "what_it_is": "\u63d0\u51faDrop-Then-Recovery\uff08DTR\uff09\u5206\u6790\u6846\u67b6\uff0c\u901a\u8fc7\u79fb\u9664Transformer\u5757\u5e76\u5fae\u8c03\u6062\u590d\uff0c\u7cfb\u7edf\u7814\u7a76\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u7684\u67b6\u6784\u5197\u4f59\u6027\uff1b\u540c\u65f6\u63d0\u51faGateProbe\u4e00\u6b21\u6027\u654f\u611f\u5ea6\u6307\u6807\u5bf9\u6a21\u5757\u91cd\u8981\u6027\u6392\u5e8f\u3002", "why_notable": "\u63ed\u793a\u5f53\u524dVLA\u57fa\u51c6\u5bf9\u6df1\u5c42\u8bed\u8a00\u7406\u89e3\u538b\u529b\u4e0d\u8db3\u7684\u7cfb\u7edf\u6027\u95ee\u9898\uff0c\u4e3a\u672a\u6765VLA\u67b6\u6784\u8bbe\u8ba1\u63d0\u4f9b\u5bb9\u91cf\u5206\u914d\u6307\u5bfc\uff0c\u5e76\u53ef\u76f4\u63a5\u7528\u4e8e\u6a21\u578b\u538b\u7f29\u52a0\u901f\u90e8\u7f72"}, {"abstract": "Reinforcement learning from human feedback (RLHF) in production does not always have a synchronous reward signal. Code-execution verifiers, slow judge ensembles, and queued human review can return several gradient steps after the rollout that produced them, breaking the synchronous-reward assumption underlying standard PPO. We address this gap with Retroactive Advantage Correction (RAC): each pending slow completion is queued, aged through a non-negative kernel, and reinjected as a clipped residual into the next optimiser step\u0027s advantage. We prove that under an unbiased clipped importance ratio, the cumulative RAC correction is exactly unbiased when the effective delay kernel reinjects all of its mass, and carries a bias linear in the unreinjected fraction otherwise; at the no-delay identity kernel it reduces to V-trace. On a tabular Markov decision process (MDP) proof-of-concept, RAC reduces the closed-form policy bias by up to 47.9x at the two-slow-channel configuration, beating wait-for-slow at lower wall-clock cost. RAC integrates with PPO and GRPO through a two-line reward-manager patch.", "arxiv_id": "2606.27580", "arxiv_url": "https://arxiv.org/abs/2606.27580", "authors": ["Arnav Raj"], "brief": "\u63d0\u51faRetroactive Advantage Correction\uff08RAC\uff09\u7b97\u6cd5\uff0c\u9488\u5bf9\u751f\u4ea7\u73af\u5883\u4e2dRLHF\u5956\u52b1\u4fe1\u53f7\u5f02\u6b65\u5ef6\u8fdf\u95ee\u9898\uff0c\u901a\u8fc7\u5c06\u5ef6\u8fdf\u5956\u52b1\u6392\u961f\u8001\u5316\u540e\u4ee5\u622a\u65ad\u6b8b\u5dee\u5f62\u5f0f\u91cd\u6ce8\u5165\u4f18\u52bf\u4f30\u8ba1\uff0c\u5b9e\u73b0\u95ed\u5408\u5f62\u5f0f\u7684V-trace\u504f\u5dee\u4fee\u6b63\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27580", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u5f85\u5904\u7406\u7684\u6162\u901f\u5956\u52b1\u4fe1\u53f7\u901a\u8fc7\u975e\u8d1f\u6838\u51fd\u6570\u8001\u5316\u540e\u91cd\u6ce8\u5165\u4e0b\u4e00\u4f18\u5316\u6b65\u9aa4\u7684\u4f18\u52bf\u51fd\u6570\uff0c\u65e0\u9700\u7b49\u5f85\u5956\u52b1\u540c\u6b65", "\u7406\u8bba\u8bc1\u660e\uff1a\u5f53\u5ef6\u8fdf\u6838\u5b8c\u5168\u91cd\u6ce8\u5165\u65f6RAC\u4fee\u6b63\u65e0\u504f\uff0c\u5426\u5219\u504f\u5dee\u4e0e\u672a\u91cd\u6ce8\u5165\u6bd4\u4f8b\u7ebf\u6027\u76f8\u5173\uff1b\u96f6\u5ef6\u8fdf\u65f6\u9000\u5316\u4e3aV-trace", "\u5728\u8868\u683cMDP\u5b9e\u9a8c\u4e2d\uff0c\u53cc\u6162\u901a\u9053\u914d\u7f6e\u4e0b\u7b56\u7565\u504f\u5dee\u964d\u4f4e\u6700\u9ad847.9\u500d\uff0c\u4e14\u5899\u949f\u65f6\u95f4\u4f4e\u4e8ewait-for-slow\u57fa\u7ebf\uff1b\u4ec5\u9700\u4e24\u884c\u4ee3\u7801\u5373\u53ef\u96c6\u6210PPO\u548cGRPO"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "RLHF", "\u7b56\u7565\u4f18\u5316", "\u504f\u5dee\u4fee\u6b63"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27580v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Retroactive Advantage Correction: Closed-Form V-Trace Bias Correction for Delay-Aware RLHF", "tldr": "RAC\u65b9\u6cd5\u901a\u8fc7\u95ed\u5408\u5f62\u5f0f\u7684\u504f\u5dee\u4fee\u6b63\u89e3\u51b3RLHF\u4e2d\u5f02\u6b65\u5956\u52b1\u5ef6\u8fdf\u95ee\u9898\uff0c\u504f\u5dee\u6700\u9ad8\u964d\u4f4e47.9\u500d", "upvotes": 0, "what_it_is": "\u63d0\u51faRetroactive Advantage Correction\uff08RAC\uff09\u7b97\u6cd5\uff0c\u9488\u5bf9\u751f\u4ea7\u73af\u5883\u4e2dRLHF\u5956\u52b1\u4fe1\u53f7\u5f02\u6b65\u5ef6\u8fdf\u95ee\u9898\uff0c\u901a\u8fc7\u5c06\u5ef6\u8fdf\u5956\u52b1\u6392\u961f\u8001\u5316\u540e\u4ee5\u622a\u65ad\u6b8b\u5dee\u5f62\u5f0f\u91cd\u6ce8\u5165\u4f18\u52bf\u4f30\u8ba1\uff0c\u5b9e\u73b0\u95ed\u5408\u5f62\u5f0f\u7684V-trace\u504f\u5dee\u4fee\u6b63\u3002", "why_notable": "\u586b\u8865\u4e86\u751f\u4ea7\u7ea7RLHF\u4e2d\u5f02\u6b65\u5956\u52b1\u573a\u666f\u7684\u7406\u8bba\u7a7a\u767d\uff0c\u63d0\u4f9b\u4e86\u6709\u4e25\u683c\u504f\u5dee\u754c\u7684\u5b9e\u7528\u89e3\u51b3\u65b9\u6848\uff0c\u4e14\u5de5\u7a0b\u96c6\u6210\u6210\u672c\u6781\u4f4e\uff0c\u5bf9\u4ee3\u7801\u6267\u884c\u9a8c\u8bc1\u3001\u6162\u901f\u8bc4\u5224\u7b49\u5b9e\u9645\u573a\u666f\u5177\u6709\u76f4\u63a5\u5e94\u7528\u4ef7\u503c\u3002"}, {"abstract": "Research on agent memory has matured rapidly, but almost entirely on the text side: few existing benchmarks ask, in an interactive environment, when an agent genuinely needs to remember what it saw rather than what it could write down. We introduce DMV-Bench (Code: https://github.com/yyyujintang/DMV-Bench), the first interactive benchmark for multimodal-agent visual memory. DMV-Bench is built on a controlled home-furnishing e-commerce catalogue of 1,000 product variants in which a text-leakage contract keeps the discriminative signal of each task in the pixels alone. Across a chain of autonomous shopping sessions, every visited product image carries a unique, pre-rendered incidental cue, and the agent is later asked to recall a particular cued product and navigate to its URL. Inspired by dual-coding theory, we propose DualMem, a memory architecture that maintains a visual and a verbal code in parallel. On DMV-Bench, DualMem outperforms a caption baseline and three recent multimodal agent-memory systems at every chain length J in {5, 10, 15, 50} on both Gemini 2.5 Flash and Qwen2.5-VL-7B, with the lead surviving controls for memory-bank size and encoding-position bias, and an asymmetric dual-coding regime in which vision carries the cue end-to-end while the verbal channel plays a smaller query-grounding role.", "arxiv_id": "2606.27499", "arxiv_url": "https://arxiv.org/abs/2606.27499", "authors": ["Yujin Tang", "Chenming Shang", "Ruize Xu", "Nikhil Singh"], "brief": "\u63d0\u51faDMV-Bench\uff0c\u4e00\u4e2a\u4e13\u95e8\u6d4b\u8bd5\u591a\u6a21\u6001\u667a\u80fd\u4f53\u89c6\u89c9\u8bb0\u5fc6\u80fd\u529b\u7684\u4ea4\u4e92\u5f0f\u57fa\u51c6\uff0c\u901a\u8fc7\u5bb6\u5c45\u7535\u5546\u573a\u666f\u4e2d\u7684\u5076\u53d1\u89c6\u89c9\u7ebf\u7d22\u6ce8\u5165\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u5728\u957f\u94fe\u8d2d\u7269\u4f1a\u8bdd\u540e\u56de\u5fc6\u7279\u5b9a\u4ea7\u54c1\uff1b\u540c\u65f6\u63d0\u51fa\u53d7\u53cc\u7f16\u7801\u7406\u8bba\u542f\u53d1\u7684DualMem\u8bb0\u5fc6\u67b6\u6784\uff0c\u5e76\u884c\u7ef4\u62a4\u89c6\u89c9\u4e0e\u8bed\u8a00\u4e24\u6761\u7f16\u7801\u901a\u9053\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27499", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["DMV-Bench\u5305\u542b1000\u4e2a\u4ea7\u54c1\u53d8\u4f53\uff0c\u901a\u8fc7\u6587\u672c\u6cc4\u6f0f\u5408\u7ea6\u786e\u4fdd\u5224\u522b\u4fe1\u53f7\u4ec5\u5b58\u5728\u4e8e\u50cf\u7d20\u4e2d\uff0c\u907f\u514d\u6587\u672c\u6377\u5f84", "\u6d4b\u8bd5\u94fe\u957f\u5ea6J\u2208{5,10,15,50}\uff0c\u8986\u76d6\u4e0d\u540c\u957f\u5ea6\u7684\u957f\u65f6\u7a0b\u8bb0\u5fc6\u573a\u666f", "DualMem\u5728Gemini 2.5 Flash\u548cQwen2.5-VL-7B\u4e0a\u5747\u4f18\u4e8e\u5b57\u5e55\u57fa\u7ebf\u53ca\u4e09\u4e2a\u8fd1\u671f\u591a\u6a21\u6001\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u89c6\u89c9\u901a\u9053\u7aef\u5230\u7aef\u627f\u8f7d\u7ebf\u7d22\uff0c\u8bed\u8a00\u901a\u9053\u8f85\u52a9\u67e5\u8be2\u5b9a\u4f4d"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u89c6\u89c9\u8bb0\u5fc6", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27499v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DMV-Bench: Diagnosing Long-Horizon Multimodal Agents\u0027 Visual Memory with Incidental Cue Injection", "tldr": "\u9996\u4e2a\u591a\u6a21\u6001\u667a\u80fd\u4f53\u89c6\u89c9\u8bb0\u5fc6\u4ea4\u4e92\u57fa\u51c6DMV-Bench\uff0c\u5e76\u63d0\u51fa\u53cc\u7f16\u7801\u8bb0\u5fc6\u67b6\u6784DualMem", "upvotes": 0, "what_it_is": "\u63d0\u51faDMV-Bench\uff0c\u4e00\u4e2a\u4e13\u95e8\u6d4b\u8bd5\u591a\u6a21\u6001\u667a\u80fd\u4f53\u89c6\u89c9\u8bb0\u5fc6\u80fd\u529b\u7684\u4ea4\u4e92\u5f0f\u57fa\u51c6\uff0c\u901a\u8fc7\u5bb6\u5c45\u7535\u5546\u573a\u666f\u4e2d\u7684\u5076\u53d1\u89c6\u89c9\u7ebf\u7d22\u6ce8\u5165\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u5728\u957f\u94fe\u8d2d\u7269\u4f1a\u8bdd\u540e\u56de\u5fc6\u7279\u5b9a\u4ea7\u54c1\uff1b\u540c\u65f6\u63d0\u51fa\u53d7\u53cc\u7f16\u7801\u7406\u8bba\u542f\u53d1\u7684DualMem\u8bb0\u5fc6\u67b6\u6784\uff0c\u5e76\u884c\u7ef4\u62a4\u89c6\u89c9\u4e0e\u8bed\u8a00\u4e24\u6761\u7f16\u7801\u901a\u9053\u3002", "why_notable": "\u586b\u8865\u4e86\u591a\u6a21\u6001\u667a\u80fd\u4f53\u89c6\u89c9\u8bb0\u5fc6\u8bc4\u6d4b\u7684\u7a7a\u767d\uff0c\u73b0\u6709\u57fa\u51c6\u51e0\u4e4e\u5168\u90e8\u805a\u7126\u6587\u672c\u8bb0\u5fc6\uff1b\u53cc\u7f16\u7801\u67b6\u6784\u4e3a\u957f\u65f6\u7a0b\u89c6\u89c9\u8bb0\u5fc6\u63d0\u4f9b\u4e86\u53ef\u843d\u5730\u7684\u89e3\u51b3\u65b9\u6848\uff0c\u5bf9\u8d2d\u7269\u3001\u5bfc\u822a\u7b49\u5b9e\u9645\u5e94\u7528\u573a\u666f\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "How should we evaluate generation systems that combine autoregressive (AR) and diffusion decoding? We study this question through Speculative Refinement (SpecRef), a training-free hybrid method that warm-starts a masked diffusion language model from an AR draft using entropy-guided selective masking. Evaluating SpecRef across six benchmarks (HumanEval, MBPP, GSM8K, BBH, ARC-Challenge, HellaSwag) with three distinct evaluation protocols (execution-based pass@1, exact-match, log-likelihood scoring), we surface several findings relevant beyond our specific system: (1) code benchmarks conflate structural discovery with logical correctness: providing a syntactic scaffold lifts accuracy from near zero to over 20% without changing the model, indicating that much of the baseline failure is structural; (2) a refinement tension phenomenon where multi-stage correction degrades already-correct tokens, exposing benchmark saturation ceilings invisible to single-model evaluation; (3) log-likelihood and generative evaluation produce different model rankings for the same model pair, suggesting they measure different capabilities; (4) standard Python post-processing silently breaks code evaluation for non-AR generators. These observations apply to any multi-stage or non-autoregressive generation pipeline and point toward more diagnostic evaluation practices.", "arxiv_id": "2606.27474", "arxiv_url": "https://arxiv.org/abs/2606.27474", "authors": ["Aditi Gupta", "Neel Mishra", "Kushagra Trivedi", "Pawan Kumar"], "brief": "\u63d0\u51faSpecRef\uff08\u63a8\u6d4b\u6027\u7cbe\u70bc\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u6df7\u5408\u89e3\u7801\u65b9\u6cd5\uff0c\u7528AR\u8349\u7a3f\u901a\u8fc7\u71b5\u5f15\u5bfc\u9009\u62e9\u6027\u63a9\u7801\u70ed\u542f\u52a8\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u5e76\u5728\u516d\u4e2a\u57fa\u51c6\u4e0a\u7cfb\u7edf\u7814\u7a76\u6df7\u5408\u751f\u6210\u7cfb\u7edf\u7684\u8bc4\u4f30\u95ee\u9898\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27474", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\u4ee3\u7801\u57fa\u51c6\u5c06\u7ed3\u6784\u53d1\u73b0\u4e0e\u903b\u8f91\u6b63\u786e\u6027\u6df7\u6dc6\uff1a\u63d0\u4f9b\u8bed\u6cd5\u811a\u624b\u67b6\u53ef\u5c06\u51c6\u786e\u7387\u4ece\u63a5\u8fd10\u63d0\u5347\u81f320%\u4ee5\u4e0a\uff0c\u800c\u65e0\u9700\u6539\u53d8\u6a21\u578b", "\u63ed\u793a\u0027\u7cbe\u70bc\u5f20\u529b\u0027\u73b0\u8c61\uff1a\u591a\u9636\u6bb5\u7ea0\u9519\u4f1a\u964d\u4f4e\u5df2\u6b63\u786etoken\u7684\u8d28\u91cf\uff0c\u66b4\u9732\u5355\u6a21\u578b\u8bc4\u4f30\u65e0\u6cd5\u53d1\u73b0\u7684\u57fa\u51c6\u9971\u548c\u4e0a\u9650", "log-likelihood\u8bc4\u4f30\u4e0e\u751f\u6210\u5f0f\u8bc4\u4f30\u5bf9\u540c\u4e00\u6a21\u578b\u5bf9\u4ea7\u751f\u4e0d\u540c\u6392\u540d\uff0c\u8bf4\u660e\u4e24\u8005\u8861\u91cf\u7684\u662f\u4e0d\u540c\u80fd\u529b", "\u6807\u51c6Python\u540e\u5904\u7406\u4f1a\u6084\u7136\u7834\u574f\u975eAR\u751f\u6210\u5668\u7684\u4ee3\u7801\u8bc4\u4f30\u7ed3\u679c"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u4ee3\u7801\u751f\u6210", "\u8bc4\u4f30\u65b9\u6cd5", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27474v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Speculative Refinement: A Hybrid Autoregressive Diffusion Decoding Strategy and Its Behavior Across Benchmarks", "tldr": "\u63d0\u51faSpecRef\u6df7\u5408\u89e3\u7801\u7b56\u7565\uff0c\u63ed\u793aAR\u4e0e\u6269\u6563\u6a21\u578b\u7ec4\u5408\u8bc4\u4f30\u4e2d\u7684\u591a\u9879\u7cfb\u7edf\u6027\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faSpecRef\uff08\u63a8\u6d4b\u6027\u7cbe\u70bc\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u6df7\u5408\u89e3\u7801\u65b9\u6cd5\uff0c\u7528AR\u8349\u7a3f\u901a\u8fc7\u71b5\u5f15\u5bfc\u9009\u62e9\u6027\u63a9\u7801\u70ed\u542f\u52a8\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u5e76\u5728\u516d\u4e2a\u57fa\u51c6\u4e0a\u7cfb\u7edf\u7814\u7a76\u6df7\u5408\u751f\u6210\u7cfb\u7edf\u7684\u8bc4\u4f30\u95ee\u9898\u3002", "why_notable": "\u4e0d\u4ec5\u63d0\u51fa\u65b0\u65b9\u6cd5\uff0c\u66f4\u7cfb\u7edf\u6027\u5730\u63ed\u793a\u4e86\u591a\u9636\u6bb5/\u975e\u81ea\u56de\u5f52\u751f\u6210\u7ba1\u9053\u8bc4\u4f30\u4e2d\u7684\u6df1\u5c42\u7f3a\u9677\uff0c\u5bf9\u6574\u4e2a\u9886\u57df\u7684\u8bc4\u4f30\u5b9e\u8df5\u5177\u6709\u91cd\u8981\u8bca\u65ad\u4ef7\u503c\u3002"}, {"abstract": "Process reward models (PRMs) enhance the reasoning capabilities of large language models (LLMs) by providing fine-grained feedback, yet training PRMs typically requires expensive stepwise annotations. Outcome-supervised PRMs offer a scalable alternative by learning from final-answer correctness alone, but this introduces a fundamental *credit assignment* challenge, i.e., attributing outcomes to responsible reasoning steps. Existing approaches rely on either uniform or causal assignment, both of which fail to anchor credit in step correctness and thus hinder process error identification. In this work, we propose Outcome-Supervised Process Reward Modeling via **L**earnable **C**redit **A**ssignment (**LCA**), an outcome-supervised PRM framework that jointly learns credit assignment and reward modeling under the principle of *Weakest Link Assignment: a reasoning chain is as strong as its weakest link*. To address mutual dependence between credit assignment and reward modeling, we formalize outcome-supervised PRM as a Multiple Instance Learning (MIL) problem and introduce Softmax-Weighted-Sum (SWS) pooling, an MIL pooling technique tailored for strong dependence and redundancy among reasoning states. We prove Bayes consistency of our algorithm under mild assumptions. Extensive experiments demonstrate that **LCA** consistently outperforms state-of-the-art outcome-supervised PRMs across multiple tasks and backbones. Code is available at https://anonymous.4open.science/r/LCA.", "arxiv_id": "2606.27739", "arxiv_url": "https://arxiv.org/abs/2606.27739", "authors": ["Tianyu Jia", "Yue Fang", "Hongxin Ding", "Rihong Qiu", "Zhibang Yang", "Zhijing Wu", "Xu Chu", "Junfeng Zhao", "Yasha Wang"], "brief": "\u63d0\u51faLCA\uff08\u53ef\u5b66\u4e60\u4fe1\u7528\u5206\u914d\u7684\u7ed3\u679c\u76d1\u7763\u8fc7\u7a0b\u5956\u52b1\u5efa\u6a21\uff09\u6846\u67b6\uff0c\u4ec5\u5229\u7528\u6700\u7ec8\u7b54\u6848\u6b63\u786e\u6027\u8bad\u7ec3\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\uff0c\u901a\u8fc7\"\u6700\u5f31\u94fe\u63a5\"\u539f\u5219\u8054\u5408\u5b66\u4e60\u4fe1\u7528\u5206\u914d\u4e0e\u5956\u52b1\u5efa\u6a21\uff0c\u907f\u514d\u6602\u8d35\u7684\u9010\u6b65\u4eba\u5de5\u6807\u6ce8\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27739", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u7ed3\u679c\u76d1\u7763PRM\u5f62\u5f0f\u5316\u4e3a\u591a\u5b9e\u4f8b\u5b66\u4e60\uff08MIL\uff09\u95ee\u9898\uff0c\u63d0\u51faSoftmax\u52a0\u6743\u6c42\u548c\uff08SWS\uff09\u6c60\u5316\u6280\u672f\u5904\u7406\u63a8\u7406\u6b65\u9aa4\u95f4\u7684\u5f3a\u4f9d\u8d56\u4e0e\u5197\u4f59", "\u6838\u5fc3\u539f\u5219\uff1a\u63a8\u7406\u94fe\u7684\u5f3a\u5ea6\u53d6\u51b3\u4e8e\u5176\u6700\u5f31\u73af\u8282\uff0c\u4fe1\u7528\u5206\u914d\u805a\u7126\u4e8e\u8bc6\u522b\u9519\u8bef\u6b65\u9aa4", "\u5728\u591a\u4efb\u52a1\u548c\u591a\u9aa8\u5e72\u7f51\u7edc\u4e0a\u6301\u7eed\u4f18\u4e8e\u73b0\u6709\u6700\u4f18\u7ed3\u679c\u76d1\u7763PRM\uff0c\u5e76\u63d0\u4f9bBayes\u4e00\u81f4\u6027\u7406\u8bba\u8bc1\u660e"], "keywords": ["\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27739v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Weakest Link Tells It All: Outcome-Supervised Process Reward Modeling via Learnable Credit Assignment", "tldr": "\u63d0\u51faLCA\u6846\u67b6\uff0c\u901a\u8fc7\u53ef\u5b66\u4e60\u4fe1\u7528\u5206\u914d\u8bad\u7ec3\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\uff0c\u65e0\u9700\u6602\u8d35\u7684\u9010\u6b65\u6807\u6ce8", "upvotes": 0, "what_it_is": "\u63d0\u51faLCA\uff08\u53ef\u5b66\u4e60\u4fe1\u7528\u5206\u914d\u7684\u7ed3\u679c\u76d1\u7763\u8fc7\u7a0b\u5956\u52b1\u5efa\u6a21\uff09\u6846\u67b6\uff0c\u4ec5\u5229\u7528\u6700\u7ec8\u7b54\u6848\u6b63\u786e\u6027\u8bad\u7ec3\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\uff0c\u901a\u8fc7\"\u6700\u5f31\u94fe\u63a5\"\u539f\u5219\u8054\u5408\u5b66\u4e60\u4fe1\u7528\u5206\u914d\u4e0e\u5956\u52b1\u5efa\u6a21\uff0c\u907f\u514d\u6602\u8d35\u7684\u9010\u6b65\u4eba\u5de5\u6807\u6ce8\u3002", "why_notable": "\u89e3\u51b3\u4e86\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\u8bad\u7ec3\u4e2d\u4fe1\u7528\u5206\u914d\u7684\u6838\u5fc3\u96be\u9898\uff0c\u65e0\u9700\u6602\u8d35\u9010\u6b65\u6807\u6ce8\u5373\u53ef\u5b9e\u73b0\u7cbe\u7ec6\u5316\u63a8\u7406\u53cd\u9988\uff0c\u5bf9LLM\u63a8\u7406\u80fd\u529b\u63d0\u5347\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u6709\u7406\u8bba\u4fdd\u8bc1\u3002"}, {"abstract": "We show that for tall matrix parameters, like projection matrices in the MLP layers, the Muon update can have row norms that are arbitrarily non-uniform. This can lead to a self-reinforcing feedback loop whereby neurons receive persistently small updates and eventually do not contribute meaningfully to network outputs. This problem is effectively mitigated by an additional row normalization step, but current methods do this in a way that moves the Muon update geometry away from the polar factor of the momentum matrix, which we find is undesirable. We propose Aurora, an optimizer that enforces row-uniformity of matrix parameter updates while respecting Muon\u0027s polar factor geometry. Aurora outperforms Muon in our pre-training experiments and, when combined with existing methods, achieves state-of-the-art performance among spectral optimizers on the optimizer track of the modded-nanoGPT speedrun. Additionally, we find that Aurora\u0027s empirical gains over Muon scale with the MLP expansion factor, suggesting that Aurora may allow for effective training of very wide MLP layers.", "arxiv_id": "2606.27715", "arxiv_url": "https://arxiv.org/abs/2606.27715", "authors": ["Alec Dewulf", "Dhruv Pai", "Li Yang", "Ashley Zhang", "Ben Keigwin"], "brief": "\u63d0\u51faAurora\u4f18\u5316\u5668\uff0c\u5728\u4fdd\u6301Muon\u6781\u56e0\u5b50\u51e0\u4f55\u7ed3\u6784\u7684\u524d\u63d0\u4e0b\uff0c\u5f3a\u5236\u77e9\u9635\u53c2\u6570\u66f4\u65b0\u7684\u884c\u8303\u6570\u5747\u5300\u6027\uff0c\u89e3\u51b3Muon\u5728\u9ad8\u77e9\u9635\u53c2\u6570\u4e0a\u884c\u8303\u6570\u6781\u5ea6\u4e0d\u5747\u5300\u5bfc\u81f4\u90e8\u5206\u795e\u7ecf\u5143\u5931\u6548\u7684\u95ee\u9898\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27715", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0Muon\u66f4\u65b0\u5728MLP\u6295\u5f71\u77e9\u9635\u4e0a\u5b58\u5728\u884c\u8303\u6570\u4efb\u610f\u4e0d\u5747\u5300\u95ee\u9898\uff0c\u5f62\u6210\u81ea\u6211\u5f3a\u5316\u7684\u53cd\u9988\u5faa\u73af\u4f7f\u90e8\u5206\u795e\u7ecf\u5143\u9010\u6e10\u5931\u6548", "Aurora\u5728\u884c\u5747\u5300\u5316\u7684\u540c\u65f6\u4fdd\u7559Muon\u7684\u6781\u56e0\u5b50\u51e0\u4f55\u7ed3\u6784\uff0c\u907f\u514d\u73b0\u6709\u884c\u5f52\u4e00\u5316\u65b9\u6cd5\u7834\u574f\u66f4\u65b0\u51e0\u4f55\u7684\u7f3a\u9677", "\u5728modded-nanoGPT speedrun\u4f18\u5316\u5668\u8d5b\u9053\u8fbe\u5230\u8c31\u4f18\u5316\u5668SOTA\uff0c\u4e14\u6027\u80fd\u63d0\u5347\u968fMLP\u6269\u5c55\u56e0\u5b50\u589e\u5927\u800c\u589e\u5f3a"], "keywords": ["\u4f18\u5316\u5668", "\u8c31\u4f18\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27715v1", "published_at": "2026-06-26", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Aurora: A Leverage-Aware Spectral Optimizer", "tldr": "Aurora\u4f18\u5316\u5668\u901a\u8fc7\u884c\u5747\u5300\u5316\u7ea6\u675f\u6539\u8fdbMuon\uff0c\u89e3\u51b3\u795e\u7ecf\u5143\u66f4\u65b0\u4e0d\u5747\u5300\u95ee\u9898\u5e76\u8fbe\u5230\u8c31\u4f18\u5316\u5668SOTA", "upvotes": 0, "what_it_is": "\u63d0\u51faAurora\u4f18\u5316\u5668\uff0c\u5728\u4fdd\u6301Muon\u6781\u56e0\u5b50\u51e0\u4f55\u7ed3\u6784\u7684\u524d\u63d0\u4e0b\uff0c\u5f3a\u5236\u77e9\u9635\u53c2\u6570\u66f4\u65b0\u7684\u884c\u8303\u6570\u5747\u5300\u6027\uff0c\u89e3\u51b3Muon\u5728\u9ad8\u77e9\u9635\u53c2\u6570\u4e0a\u884c\u8303\u6570\u6781\u5ea6\u4e0d\u5747\u5300\u5bfc\u81f4\u90e8\u5206\u795e\u7ecf\u5143\u5931\u6548\u7684\u95ee\u9898\u3002", "why_notable": "\u9488\u5bf9\u5f53\u524d\u70ed\u95e8\u7684Muon\u4f18\u5316\u5668\u6307\u51fa\u5173\u952e\u7f3a\u9677\u5e76\u63d0\u51fa\u6709\u6548\u4fee\u590d\u65b9\u6848\uff0c\u5bf9\u8bad\u7ec3\u5bbdMLP\u5c42\u5177\u6709\u5b9e\u9645\u4ef7\u503c\uff0c\u5728\u4e3b\u6d41LLM\u9884\u8bad\u7ec3\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u4e86\u6548\u679c\u3002"}, {"abstract": "World models in partially observed environments rely on latent representations that summarize interaction history, but in many modern LLM-based architectures predictive performance fails to reflect representation quality due to history bypass, rendering the latent state unidentifiable. Strict latent state mediation, requiring predictions to depend only on the latent state and action, is a classical principle that resolves this, but enforcing it in text-based settings is an open challenge: textual latent states are discrete and non-differentiable, precluding variational training, and expressive LLM decoders readily ignore the bottleneck. We show how to make strict mediation work in the text domain. We formalize why it is necessary, showing that strict mediation makes representation quality empirically testable while history-leaky architectures break this connection. We then introduce textual latent states, which are discrete, interpretable, and variable-length, and factorized GRPO (fGRPO), a tree-structured reinforcement learning method that enforces strict mediation during training. Experiments on TextWorld and ScienceWorld show preserved one-step prediction accuracy alongside up to 57\\% gains in representation quality and 98\\% improvements in rollout performance, increasing with task complexity and horizon.", "arxiv_id": "2606.27681", "arxiv_url": "https://arxiv.org/abs/2606.27681", "authors": ["Xiang Gao", "Kaiwen Dong", "Yuguang Yao", "Padmaja Jonnalagedda", "Kamalika Das"], "brief": "\u672c\u6587\u9488\u5bf9\u57fa\u4e8eLLM\u7684\u4e16\u754c\u6a21\u578b\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u73af\u5883\u4e2d\u6f5c\u5728\u72b6\u6001\u4e0d\u53ef\u8bc6\u522b\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u79bb\u6563\u53ef\u89e3\u91ca\u7684\u6587\u672c\u6f5c\u5728\u72b6\u6001\u8868\u793a\uff0c\u4ee5\u53ca\u6811\u7ed3\u6
