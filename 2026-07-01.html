teleoperation system for single-operator bimanual control to collect high-quality real-world demonstrations. To address extreme long-horizon assembly with up to 7 subtasks and 1550 control steps, we propose a progress-enhanced VLA, finetuned on semantically grounded subtasks, that jointly predicts actions and a continuous progress signal, enabling automatic subtask transitions and reducing compounding errors during inference. We further study perception and control design factors that critically affect precision in real-scale assembly. FurnitureVLA improves average simulation success from 48% to 80% compared to baselines across three furniture types, with an additional 21% gain from our design factor study. We validate on a real Kinova Gen3 platform with only 16% drop on the hardest task.", "arxiv_id": "2607.01212", "arxiv_url": "https://arxiv.org/abs/2607.01212", "authors": ["Chenyang Ma", "Yue Yang", "Radu Corcodel", "Siddarth Jain", "Andrew Wu", "Chiori Hori", "Diego Romeres"], "brief": "\u63d0\u51faFurnitureVLA\uff0c\u9996\u4e2a\u57fa\u4e8e\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u7684\u771f\u5b9e\u5c3a\u5ea6\u53cc\u81c2\u5bb6\u5177\u7ec4\u88c5\u7cfb\u7edf\u3002\u901a\u8fc7\u8fdb\u5ea6\u589e\u5f3a\u7684VLA\u8054\u5408\u9884\u6d4b\u52a8\u4f5c\u4e0e\u8fde\u7eed\u8fdb\u5ea6\u4fe1\u53f7\uff0c\u5b9e\u73b0\u81ea\u52a8\u5b50\u4efb\u52a1\u5207\u6362\u5e76\u51cf\u5c11\u8bef\u5dee\u7d2f\u79ef\uff0c\u4eff\u771f\u5e73\u5747\u6210\u529f\u7387\u4ece48%\u63d0\u5347\u81f380%\uff0c\u5e76\u5728\u771f\u5b9e\u673a\u5668\u4eba\u5e73\u53f0\u4e0a\u9a8c\u8bc1\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01212", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u53cc\u81c2\u534f\u4f5c", "\u957f\u65f6\u5e8f\u4efb\u52a1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01212v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "FurnitureVLA: Learning Long-Horizon Bimanual Furniture Assembly with Vision-Language-Action Model", "tldr": "\u63d0\u51faFurnitureVLA\uff0c\u9996\u4e2a\u57fa\u4e8e\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u7684\u771f\u5b9e\u5c3a\u5ea6\u53cc\u81c2\u5bb6\u5177\u7ec4\u88c5\u7cfb\u7edf\u3002\u901a\u8fc7\u8fdb\u5ea6\u589e\u5f3a\u7684VLA\u8054\u5408\u9884\u6d4b\u52a8\u4f5c\u4e0e\u8fde\u7eed\u8fdb\u5ea6\u4fe1\u53f7\uff0c\u5b9e\u73b0\u81ea\u52a8\u5b50\u4efb\u52a1\u5207\u6362\u5e76\u51cf\u5c11\u8bef\u5dee\u7d2f\u79ef\uff0c\u4eff\u771f\u5e73\u5747\u6210\u529f\u7387\u4ece48%\u63d0\u5347\u81f380%\uff0c\u5e76\u5728\u771f\u5b9e\u673a\u5668\u4eba\u5e73\u53f0\u4e0a\u9a8c\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Language models deployed in high-stakes roles can potentially favor certain entities, brands, or viewpoints, steering user decisions at scale. Such preferential biases can be introduced by any actor in the model\u0027s supply chain and are most dangerous when the model reveals its preference only on the relevant topic while behaving identically to its unmodified base on all other inputs. Recent work has shown that these biases can transfer through context distillation on semantically unrelated data, with the signal residing entirely in the soft logit distribution and remaining invisible to text-based inspection. However, the defender faces a fundamental asymmetry: without knowing the bias topic, no detection method can reliably surface a stealth preferential bias, regardless of whether it examines generated text, internal representations, or model weights. Here we introduce Distill to Detect (D2D), a method that surfaces hidden biases by distilling the distributional shift between a suspected model and its base into a cartridge (a KV-cache prefix adapter), concentrating the dominant divergence and amplifying the bias signal into generated text. We show that D2D successfully amplifies the hidden biases of stealth models to the extent that they can be reliably detected across multiple bias types. We also propose a theoretical framework that explains the efficacy of D2D through the lens of Fisher-weighted projection of the logit distribution shift, supported by empirical observations. By turning the capacity bottleneck of prefix-tuning adapters into a detection tool, D2D provides a practical building block for auditing hidden behaviors in deployed language models.", "arxiv_id": "2607.01208", "arxiv_url": "https://arxiv.org/abs/2607.01208", "authors": ["Shayan Talaei", "Abhinav Chinta", "Devvrit Khatri", "Amin Karbasi", "Azalia Mirhoseini", "Amin Saberi"], "brief": "\u63d0\u51faD2D\u65b9\u6cd5\uff0c\u901a\u8fc7\u5c06\u53ef\u7591\u6a21\u578b\u4e0e\u57fa\u7840\u6a21\u578b\u4e4b\u95f4\u7684\u5206\u5e03\u504f\u79fb\u84b8\u998f\u5230KV\u7f13\u5b58\u524d\u7f00\u9002\u914d\u5668\uff08cartridge\uff09\u4e2d\uff0c\u653e\u5927\u9690\u85cf\u504f\u89c1\u4fe1\u53f7\u4f7f\u5176\u5728\u751f\u6210\u6587\u672c\u4e2d\u53ef\u88ab\u68c0\u6d4b\u3002\u8be5\u65b9\u6cd5\u65e0\u9700\u9884\u77e5\u504f\u89c1\u4e3b\u9898\uff0c\u6210\u529f\u63ed\u9732\u4e86\u591a\u79cd\u7c7b\u578b\u7684\u9690\u853d\u504f\u597d\u504f\u89c1\uff0c\u5e76\u63d0\u4f9b\u4e86\u57fa\u4e8eFisher\u52a0\u6743\u6295\u5f71\u7684\u7406\u8bba\u89e3\u91ca\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01208", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u504f\u89c1\u68c0\u6d4b", "\u77e5\u8bc6\u84b8\u998f", "\u6a21\u578b\u5ba1\u8ba1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01208v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Distill to Detect: Exposing Stealth Biases in LLMs through Cartridge Distillation", "tldr": "\u63d0\u51faD2D\u65b9\u6cd5\uff0c\u901a\u8fc7\u5c06\u53ef\u7591\u6a21\u578b\u4e0e\u57fa\u7840\u6a21\u578b\u4e4b\u95f4\u7684\u5206\u5e03\u504f\u79fb\u84b8\u998f\u5230KV\u7f13\u5b58\u524d\u7f00\u9002\u914d\u5668\uff08cartridge\uff09\u4e2d\uff0c\u653e\u5927\u9690\u85cf\u504f\u89c1\u4fe1\u53f7\u4f7f\u5176\u5728\u751f\u6210\u6587\u672c\u4e2d\u53ef\u88ab\u68c0\u6d4b\u3002\u8be5\u65b9\u6cd5\u65e0\u9700\u9884\u77e5\u504f\u89c1\u4e3b\u9898\uff0c\u6210\u529f\u63ed\u9732\u4e86\u591a\u79cd\u7c7b\u578b\u7684\u9690\u853d\u504f\u597d\u504f\u89c1\uff0c\u5e76\u63d0\u4f9b\u4e86\u57fa\u4e8eFisher\u52a0\u6743\u6295\u5f71\u7684\u7406\u8bba\u89e3\u91ca\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper studies real-time robust optimal control for uncertain nonlinear systems, where linear time-varying (LTV) approximations make planning tractable but require sound linearization error bounds (LEBs) to guarantee robust constraint satisfaction. We develop tight, differentiable, GPU-parallel LEBs for LTV approximations of nonlinear and neural network (NN) dynamics. For analytic dynamics, we introduce path-based Hessian bounds that are tighter than standard interval methods. For NN dynamics, we derive certified LEBs using NN verifier-generated affine relaxations and local Jacobian corrections. We adapt a GPU-parallel system-level synthesis LTV-based robust control solver to be compatible with these LEBs by extending it to handle right-invertible disturbance matrices and non-zero-centered disturbance sets for tight zonotopic uncertainty propagation. Our method, GPUSLS-LEO, enables online optimization of robust feedback policies that account for linearization error, producing tight, formally verified reachable tubes. On complex nonlinear and NN dynamics up to 168 state dimensions, our method can compute robust control policies on the GPU at rates up to 67 Hz, reducing solve times and conservativeness relative to baselines while preserving formal guarantees and real-time performance.", "arxiv_id": "2607.01203", "arxiv_url": "https://arxiv.org/abs/2607.01203", "authors": ["Jeffrey Fang", "Keyi Shen", "Anutam Srinivasan", "Glen Chou"], "brief": "\u672c\u6587\u9488\u5bf9\u975e\u7ebf\u6027\u548c\u795e\u7ecf\u7f51\u7edc\u52a8\u529b\u5b66\u7cfb\u7edf\uff0c\u63d0\u51fa\u4e86GPU\u5e76\u884c\u7684\u7ebf\u6027\u5316\u8bef\u5dee\u754c\uff08LEB\uff09\u8ba1\u7b97\u65b9\u6cd5\uff0c\u7ed3\u5408\u7cfb\u7edf\u7ea7\u7efc\u5408\u9c81\u68d2\u63a7\u5236\u6c42\u89e3\u5668\uff0c\u5b9e\u73b0\u5b9e\u65f6\u9c81\u68d2\u6700\u4f18\u63a7\u5236\u3002\u5728\u6700\u9ad8168\u7ef4\u72b6\u6001\u7a7a\u95f4\u7684\u590d\u6742\u7cfb\u7edf\u4e0a\uff0c\u65b9\u6cd5\u53ef\u8fbe67Hz\u7684\u63a7\u5236\u9891\u7387\uff0c\u76f8\u6bd4\u57fa\u7ebf\u65b9\u6cd5\u5728\u4fdd\u6301\u5f62\u5f0f\u5316\u4fdd\u8bc1\u7684\u540c\u65f6\u663e\u8457\u964d\u4f4e\u4e86\u4fdd\u5b88\u6027\u548c\u6c42\u89e3\u65f6\u95f4\u3002", "categories": ["eess.SY", "cs.AI", "cs.LG", "cs.RO", "math.OC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01203", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9c81\u68d2\u63a7\u5236", "\u795e\u7ecf\u7f51\u7edc\u52a8\u529b\u5b66", "GPU\u5e76\u884c\u8ba1\u7b97", "\u6700\u4f18\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01203v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GPU-Parallel Linearization Error Bounds for Real-Time Robust Optimal Control of Nonlinear and Neural Network Dynamics", "tldr": "\u672c\u6587\u9488\u5bf9\u975e\u7ebf\u6027\u548c\u795e\u7ecf\u7f51\u7edc\u52a8\u529b\u5b66\u7cfb\u7edf\uff0c\u63d0\u51fa\u4e86GPU\u5e76\u884c\u7684\u7ebf\u6027\u5316\u8bef\u5dee\u754c\uff08LEB\uff09\u8ba1\u7b97\u65b9\u6cd5\uff0c\u7ed3\u5408\u7cfb\u7edf\u7ea7\u7efc\u5408\u9c81\u68d2\u63a7\u5236\u6c42\u89e3\u5668\uff0c\u5b9e\u73b0\u5b9e\u65f6\u9c81\u68d2\u6700\u4f18\u63a7\u5236\u3002\u5728\u6700\u9ad8168\u7ef4\u72b6\u6001\u7a7a\u95f4\u7684\u590d\u6742\u7cfb\u7edf\u4e0a\uff0c\u65b9\u6cd5\u53ef\u8fbe67Hz\u7684\u63a7\u5236\u9891\u7387\uff0c\u76f8\u6bd4\u57fa\u7ebf\u65b9\u6cd5\u5728\u4fdd\u6301\u5f62\u5f0f\u5316\u4fdd\u8bc1\u7684\u540c\u65f6\u663e\u8457\u964d\u4f4e\u4e86\u4fdd\u5b88\u6027\u548c\u6c42\u89e3\u65f6\u95f4\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present World from Motion, a method for generating freely renderable dynamic 3D Gaussian representations from monocular videos. Our approach conditions a video model on dense, pixel-aligned renderings that encode appearance, geometry, and 3D scene motion along both input and target camera trajectories to correct rendering artifacts and fill in missing regions from an initial reconstruction. To train this model, we construct a dataset of aligned multiview video pairs and dynamic 3DGS representations, with simulated artifacts characteristic of monocular reconstruction. At test time, we distill the model\u0027s generations, including newly observed regions and motions, back into a single consistent, high-quality dynamic 3DGS, improving both novel-view synthesis and the underlying 3D motion. Our method sets a new state of the art in 4D reconstruction and seamlessly generalizes to in-the-wild videos with large viewpoint changes and dynamic motions.", "arxiv_id": "2607.01202", "arxiv_url": "https://arxiv.org/abs/2607.01202", "authors": ["Liyuan Zhu", "Shengyu Huang", "Amrita Mazumdar", "Tianye Li", "Zan Gojcic", "Gordon Wetzstein", "Iro Armeni", "Shalini De Mello", "Alex Trevithick"], "brief": "\u63d0\u51faWorld from Motion\u65b9\u6cd5\uff0c\u5229\u7528\u89c6\u9891\u751f\u6210\u6a21\u578b\u4ece\u5355\u76ee\u89c6\u9891\u91cd\u5efa\u53ef\u81ea\u7531\u6e32\u67d3\u7684\u52a8\u60013D\u9ad8\u65af\u8868\u793a\u3002\u901a\u8fc7\u6761\u4ef6\u5316\u89c6\u9891\u6a21\u578b\u5bf9\u5916\u89c2\u3001\u51e0\u4f55\u548c3D\u573a\u666f\u8fd0\u52a8\u7684\u5bc6\u96c6\u50cf\u7d20\u5bf9\u9f50\u6e32\u67d3\uff0c\u4fee\u6b63\u91cd\u5efa\u4f2a\u5f71\u5e76\u586b\u8865\u7f3a\u5931\u533a\u57df\uff0c\u6700\u7ec8\u84b8\u998f\u4e3a\u4e00\u81f4\u7684\u9ad8\u8d28\u91cf\u52a8\u60013DGS\uff0c\u57284D\u91cd\u5efa\u4e0a\u8fbe\u5230\u65b0\u7684\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.AI", "cs.GR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01202", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u52a8\u6001\u4e09\u7ef4\u91cd\u5efa", "3D\u9ad8\u65af\u6cfc\u6e85", "\u89c6\u9891\u751f\u6210\u6a21\u578b", "\u65b0\u89c6\u89d2\u5408\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01202v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "World from Motion: Generative Dynamic Gaussian Reconstruction from Monocular Video", "tldr": "\u63d0\u51faWorld from Motion\u65b9\u6cd5\uff0c\u5229\u7528\u89c6\u9891\u751f\u6210\u6a21\u578b\u4ece\u5355\u76ee\u89c6\u9891\u91cd\u5efa\u53ef\u81ea\u7531\u6e32\u67d3\u7684\u52a8\u60013D\u9ad8\u65af\u8868\u793a\u3002\u901a\u8fc7\u6761\u4ef6\u5316\u89c6\u9891\u6a21\u578b\u5bf9\u5916\u89c2\u3001\u51e0\u4f55\u548c3D\u573a\u666f\u8fd0\u52a8\u7684\u5bc6\u96c6\u50cf\u7d20\u5bf9\u9f50\u6e32\u67d3\uff0c\u4fee\u6b63\u91cd\u5efa\u4f2a\u5f71\u5e76\u586b\u8865\u7f3a\u5931\u533a\u57df\uff0c\u6700\u7ec8\u84b8\u998f\u4e3a\u4e00\u81f4\u7684\u9ad8\u8d28\u91cf\u52a8\u60013DGS\uff0c\u57284D\u91cd\u5efa\u4e0a\u8fbe\u5230\u65b0\u7684\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In autonomous laboratories, AI agents suggest the next batch of experiments to do. However, planning and executing those tasks taking full advantage of the available resources is a completely different question. This can be challenging when dealing with real-world hardware constraints, especially so when there are multiple instruments with different capacities and throughputs. Here we demonstrate a 2-step method to address resource utilization for our autonomous platform for metal-organic framework synthesis. First, we use constraint programming to find optimal schedules. This finds schedules that minimizes the total time while still satisfying the limitations and capacities of the hardware. Secondly, we use a system of status dependencies for each task, which allows for the robust execution of the optimal schedules.", "arxiv_id": "2607.01188", "arxiv_url": "https://arxiv.org/abs/2607.01188", "authors": ["Austin McDannald", "Julia Tisaranni", "Howie Joress"], "brief": "\u9488\u5bf9\u81ea\u4e3b\u5b9e\u9a8c\u5ba4\u4e2d\u591a\u4eea\u5668\u8d44\u6e90\u8c03\u5ea6\u95ee\u9898\uff0c\u63d0\u51fa\u4e24\u6b65\u6cd5\uff1a\u5148\u7528\u7ea6\u675f\u89c4\u5212\u6c42\u6700\u4f18\u8c03\u5ea6\u65b9\u6848\uff08\u6700\u5c0f\u5316\u603b\u65f6\u95f4\uff09\uff0c\u518d\u901a\u8fc7\u4efb\u52a1\u72b6\u6001\u4f9d\u8d56\u673a\u5236\u4fdd\u969c\u9c81\u68d2\u6267\u884c\uff0c\u5e76\u5728\u91d1\u5c5e\u6709\u673a\u6846\u67b6\u5408\u6210\u5e73\u53f0\u4e0a\u9a8c\u8bc1\u3002", "categories": ["cs.AI", "cond-mat.mtrl-sci"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01188", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u4e3b\u5b9e\u9a8c\u5ba4", "\u7ea6\u675f\u89c4\u5212", "\u79d1\u5b66\u81ea\u52a8\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01188v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Optimal Resource Utilization for Autonomous Laboratory Orchestrators", "tldr": "\u9488\u5bf9\u81ea\u4e3b\u5b9e\u9a8c\u5ba4\u4e2d\u591a\u4eea\u5668\u8d44\u6e90\u8c03\u5ea6\u95ee\u9898\uff0c\u63d0\u51fa\u4e24\u6b65\u6cd5\uff1a\u5148\u7528\u7ea6\u675f\u89c4\u5212\u6c42\u6700\u4f18\u8c03\u5ea6\u65b9\u6848\uff08\u6700\u5c0f\u5316\u603b\u65f6\u95f4\uff09\uff0c\u518d\u901a\u8fc7\u4efb\u52a1\u72b6\u6001\u4f9d\u8d56\u673a\u5236\u4fdd\u969c\u9c81\u68d2\u6267\u884c\uff0c\u5e76\u5728\u91d1\u5c5e\u6709\u673a\u6846\u67b6\u5408\u6210\u5e73\u53f0\u4e0a\u9a8c\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "RL with verifiable rewards (RLVR) has emerged as a powerful paradigm for training LMs on tasks with well-defined success metrics, such as code generation and mathematical reasoning. However, current RLVR methods optimize only what can be objectively scored, often neglecting subjective, non-verifiable aspects of human-like outputs, such as style and structure. This limitation leads to well-documented failure modes such as diversity collapse, unnatural-sounding responses, and reward hacking. We propose an adversarial generator-discriminator framework that augments verifiable rewards with a learned signal from human demonstrations. A generator model is trained using RL to maximize both task accuracy and an adversarial reward derived from a discriminator. The discriminator, trained alongside the generator policy, learns to distinguish human-written outputs from model-generated ones. The discriminator serves as a learned proxy for the human output distribution, providing feedback on aspects of generation that are difficult to formalize as scalar rewards. Across diverse domains, including bug fixing and open-ended generation, our approach consistently improves non-verifiable properties while preserving the accuracy gains of RLVR. In bug fixing, our method produces solutions with significantly lower edit distance compared to RLVR baselines while matching end performance. In story generation, our method significantly improves win rate while producing stories that are diverse and more human-like. And in a simple reward hacking benchmark, our method nearly eliminates model misbehavior while maintaining high benchmark scores. Together, these results show that our approach bridges RL and SFT, offering a scalable path toward jointly optimizing the verifiable and non-verifiable properties of a task.", "arxiv_id": "2607.01181", "arxiv_url": "https://arxiv.org/abs/2607.01181", "authors": ["Mehul Damani", "Isha Puri", "Idan Shenfeld", "Jacob Andreas"], "brief": "\u63d0\u51fa\u5bf9\u6297\u751f\u6210-\u5224\u522b\u6846\u67b6\uff0c\u5c06\u53ef\u9a8c\u8bc1\u5956\u52b1\uff08RLVR\uff09\u4e0e\u4eba\u7c7b\u793a\u8303\u5b66\u4e60\u4fe1\u53f7\u7ed3\u5408\uff0c\u5224\u522b\u5668\u533a\u5206\u4eba\u7c7b\u8f93\u51fa\u4e0e\u6a21\u578b\u8f93\u51fa\u4ee5\u63d0\u4f9b\u975e\u53ef\u9a8c\u8bc1\u5c5e\u6027\u7684\u53cd\u9988\u3002\u5728\u4ee3\u7801\u4fee\u590d\u3001\u6545\u4e8b\u751f\u6210\u7b49\u4efb\u52a1\u4e0a\uff0c\u65e2\u4fdd\u6301\u51c6\u786e\u7387\u53c8\u663e\u8457\u6539\u5584\u8f93\u51fa\u98ce\u683c\u3001\u591a\u6837\u6027\uff0c\u5e76\u6709\u6548\u6291\u5236\u5956\u52b1\u9ed1\u5ba2\u884c\u4e3a\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01181", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b", "\u5bf9\u6297\u8bad\u7ec3", "\u5956\u52b1\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01181v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Right in the Right Way: LM Training with Verifiable Rewards and Human Demonstrations", "tldr": "\u63d0\u51fa\u5bf9\u6297\u751f\u6210-\u5224\u522b\u6846\u67b6\uff0c\u5c06\u53ef\u9a8c\u8bc1\u5956\u52b1\uff08RLVR\uff09\u4e0e\u4eba\u7c7b\u793a\u8303\u5b66\u4e60\u4fe1\u53f7\u7ed3\u5408\uff0c\u5224\u522b\u5668\u533a\u5206\u4eba\u7c7b\u8f93\u51fa\u4e0e\u6a21\u578b\u8f93\u51fa\u4ee5\u63d0\u4f9b\u975e\u53ef\u9a8c\u8bc1\u5c5e\u6027\u7684\u53cd\u9988\u3002\u5728\u4ee3\u7801\u4fee\u590d\u3001\u6545\u4e8b\u751f\u6210\u7b49\u4efb\u52a1\u4e0a\uff0c\u65e2\u4fdd\u6301\u51c6\u786e\u7387\u53c8\u663e\u8457\u6539\u5584\u8f93\u51fa\u98ce\u683c\u3001\u591a\u6837\u6027\uff0c\u5e76\u6709\u6548\u6291\u5236\u5956\u52b1\u9ed1\u5ba2\u884c\u4e3a\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Generative reasoning re-rankers achieve strong recommendation accuracy by emitting a chain-of-thought before re-ordering a candidate list, but they are slow at inference: an autoregressive (AR) decoder spends one sequential forward pass per reasoning token, and the reasoning trace far exceeds the ranking it produces. To reduce this cost, block-diffusion language models decode many positions in parallel over a few denoising steps and are substantially faster, yet naively converting an AR re-ranker into one opens two accuracy gaps: (1) a structural gap: answer positions are denoised in parallel and scored independently, so the decoder emits invalid rankings (duplicated, dropped, or out-of-set identifiers) that AR avoids through left-to-right masking; and (2) a distributional gap: fine-tuning the converted model on fixed teacher trajectories is off-policy relative to its own decoding at inference, leaving a residual accuracy gap. To close both gaps while keeping the speedup, we propose \\textbf{Diffusion-GR2}, a recipe that converts our AR reasoning re-ranker (GR2) into a block-diffusion re-ranker. First, conversion fine-tuning (CFT) adapts the AR-initialized diffusion model to denoise the answer into a valid permutation on its own, without an external constrained decoder. Next, on-policy distillation (OPD) then supervises the model on its own decoded trajectories with dense per-token targets from the AR teacher. Finally, we apply a reinforcement-learning (RL) stage against a re-ranking reward on top of OPD\u0027s on-policy policy. Experiments on Amazon Beauty demonstrate that Diffusion-GR2 recovers to near-parity with the AR re-ranker, while block-parallel decoding raises decode throughput by $2.4$--$3.5\\times$ at the model\u0027s reasoning output length. Ablations show that CFT recovers most of the conversion gap, and that on-policy distillation further closes it to the AR reference.", "arxiv_id": "2607.01170", "arxiv_url": "https://arxiv.org/abs/2607.01170", "authors": ["Zhuoxuan Zhang", "Kangqi Ni", "Yuhang Chen", "Mingfu Liang", "Xiaohan Wei", "Yunchen Pu", "Fei Tian", "Chonglin Sun", "Frank Shyu", "Adam", "Song", "Sandeep Pandey", "Luke Simon", "Tianlong Chen", "Xi Liu"], "brief": "\u63d0\u51faDiffusion-GR2\uff0c\u5c06\u81ea\u56de\u5f52\u63a8\u7406\u91cd\u6392\u5e8f\u5668\u8f6c\u6362\u4e3a\u5757\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u8f6c\u6362\u5fae\u8c03\u3001\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u548c\u5f3a\u5316\u5b66\u4e60\u4e09\u9636\u6bb5\u65b9\u6cd5\u89e3\u51b3\u7ed3\u6784\u5dee\u8ddd\u548c\u5206\u5e03\u5dee\u8ddd\u95ee\u9898\u3002\u5728Amazon Beauty\u6570\u636e\u96c6\u4e0a\u5b9e\u73b0\u4e0e\u81ea\u56de\u5f52\u6a21\u578b\u8fd1\u4f3c\u7cbe\u5ea6\u7684\u540c\u65f6\uff0c\u63a8\u7406\u541e\u5410\u91cf\u63d0\u53472.4-3.5\u500d\u3002", "categories": ["cs.IR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01170", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u63a8\u8350\u7cfb\u7edf", "\u6269\u6563\u6a21\u578b", "\u91cd\u6392\u5e8f", "\u77e5\u8bc6\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01170v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Diffusion-GR2: Diffusion Generative Reasoning Re-ranker", "tldr": "\u63d0\u51faDiffusion-GR2\uff0c\u5c06\u81ea\u56de\u5f52\u63a8\u7406\u91cd\u6392\u5e8f\u5668\u8f6c\u6362\u4e3a\u5757\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u8f6c\u6362\u5fae\u8c03\u3001\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u548c\u5f3a\u5316\u5b66\u4e60\u4e09\u9636\u6bb5\u65b9\u6cd5\u89e3\u51b3\u7ed3\u6784\u5dee\u8ddd\u548c\u5206\u5e03\u5dee\u8ddd\u95ee\u9898\u3002\u5728Amazon Beauty\u6570\u636e\u96c6\u4e0a\u5b9e\u73b0\u4e0e\u81ea\u56de\u5f52\u6a21\u578b\u8fd1\u4f3c\u7cbe\u5ea6\u7684\u540c\u65f6\uff0c\u63a8\u7406\u541e\u5410\u91cf\u63d0\u53472.4-3.5\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "While generative models have enabled training-free reward alignment, current methods typically excel in local exploration within narrow regions of the underlying distribution. These approaches struggle when preferences are unknown a priori and only revealed through sequential feedback-a scenario demanding broad exploration to uncover high-utility regions. To address this, we propose Sequentially-Controlled Interactive Multi-Particle Flow-Maps (IMPFM), a framework for sample-efficient online feedback-driven search. IMPFM progressively transports a group of interactive particles toward the target distribution, maintaining the broad coverage essential for heterogeneous preference alignment. IMPFM introduces a principled and efficient posterior sample sharing mechanism across particles powered by flow maps. By correcting individual particle drift with the collective posterior samples of the entire ensemble at each resampling step, the framework maximizes sample utility to enable global exploration while actively mitigating reward over-optimization, typical of standard control frameworks. Paired with a principled exploration-exploitation reweighting mechanism involving multi-particle interaction, this sequentially corrected multi-particle dynamics explicitly preserves structural diversity and overcomes the weight degeneracy inherent to standard SMC samplers. Crucially, we prove that the resulting sampling framework yields a multi-particle interaction-aware Feynman-Kac corrector that progressively steers the multi-particle system toward a KL-tilted target distribution, facilitating global exploration and preventing mode collapse. Extensive empirical evaluations and rigorous ablations across diverse search and alignment tasks confirm the efficacy of IMPFM over existing baselines.", "arxiv_id": "2607.01144", "arxiv_url": "https://arxiv.org/abs/2607.01144", "authors": ["Binglin Ji", "Anindya Sarkar", "Hengchang Lu", "Jens Sj\u00f6lund", "Yevgeniy Vorobeychik"], "brief": "\u63d0\u51faIMPFM\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u7c92\u5b50\u6d41\u6620\u5c04\u5728\u987a\u5e8f\u53cd\u9988\u9a71\u52a8\u7684\u641c\u7d22\u4e2d\u5b9e\u73b0\u9ad8\u6548\u5168\u5c40\u63a2\u7d22\u3002\u8be5\u65b9\u6cd5\u5229\u7528\u7c92\u5b50\u95f4\u540e\u9a8c\u6837\u672c\u5171\u4eab\u673a\u5236\u7ea0\u6b63\u4e2a\u4f53\u6f02\u79fb\uff0c\u5e76\u901a\u8fc7Feynman-Kac\u6821\u6b63\u5668\u9632\u6b62\u6a21\u5f0f\u574d\u584c\uff0c\u5728\u591a\u79cd\u641c\u7d22\u4e0e\u5bf9\u9f50\u4efb\u52a1\u4e0a\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002", "categories": ["cs.LG", "cs.AI", "cs.CE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01144", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u751f\u6210\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u5e8f\u5217\u8499\u7279\u5361\u6d1b", "\u5956\u52b1\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01144v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Sequentially-Controlled Interactive Multi-Particle Flow-Maps for Online Feedback-Driven Search", "tldr": "\u63d0\u51faIMPFM\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u7c92\u5b50\u6d41\u6620\u5c04\u5728\u987a\u5e8f\u53cd\u9988\u9a71\u52a8\u7684\u641c\u7d22\u4e2d\u5b9e\u73b0\u9ad8\u6548\u5168\u5c40\u63a2\u7d22\u3002\u8be5\u65b9\u6cd5\u5229\u7528\u7c92\u5b50\u95f4\u540e\u9a8c\u6837\u672c\u5171\u4eab\u673a\u5236\u7ea0\u6b63\u4e2a\u4f53\u6f02\u79fb\uff0c\u5e76\u901a\u8fc7Feynman-Kac\u6821\u6b63\u5668\u9632\u6b62\u6a21\u5f0f\u574d\u584c\uff0c\u5728\u591a\u79cd\u641c\u7d22\u4e0e\u5bf9\u9f50\u4efb\u52a1\u4e0a\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Muon has recently emerged as one of the most effective optimizers for training large neural networks, yet its empirical success has been explained from several different perspectives. In this paper, we propose a simple mechanistic interpretation: Muon can be understood as an implicit residual connection during training. Specifically, orthogonalizing the update can sacrifice some immediate gradient fidelity while improving representation preservation for downstream layers. We study this trade-off in controlled linear optimization settings, where Muon can learn representations that are slower to fit a local target but easier for downstream layers to exploit. Our results suggest a conceptual explanation for Muon and a design perspective for optimizers that balance local descent with downstream usability.", "arxiv_id": "2607.01124", "arxiv_url": "https://arxiv.org/abs/2607.01124", "authors": ["Hao Huang"], "brief": "\u672c\u6587\u63d0\u51fa\u5bf9Muon\u4f18\u5316\u5668\u7684\u673a\u5236\u6027\u89e3\u91ca\uff1aMuon\u7684\u6b63\u4ea4\u5316\u66f4\u65b0\u53ef\u7406\u89e3\u4e3a\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u7684\u9690\u5f0f\u6b8b\u5dee\u8fde\u63a5\uff0c\u5728\u727a\u7272\u5c40\u90e8\u68af\u5ea6\u4fdd\u771f\u5ea6\u7684\u540c\u65f6\u6539\u5584\u4e86\u4e0b\u6e38\u5c42\u7684\u8868\u793a\u4fdd\u7559\u80fd\u529b\u3002\u901a\u8fc7\u7ebf\u6027\u4f18\u5316\u5b9e\u9a8c\u9a8c\u8bc1\uff0cMuon\u5b66\u5230\u7684\u8868\u793a\u867d\u62df\u5408\u5c40\u90e8\u76ee\u6807\u8f83\u6162\uff0c\u4f46\u66f4\u6613\u88ab\u4e0b\u6e38\u5c42\u5229\u7528\uff0c\u4e3a\u4f18\u5316\u5668\u8bbe\u8ba1\u63d0\u4f9b\u4e86\u65b0\u89c6\u89d2\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01124", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4f18\u5316\u5668", "\u795e\u7ecf\u7f51\u7edc\u8bad\u7ec3", "\u6b8b\u5dee\u8fde\u63a5", "\u8868\u793a\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01124v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Muon as a Residual Connection", "tldr": "\u672c\u6587\u63d0\u51fa\u5bf9Muon\u4f18\u5316\u5668\u7684\u673a\u5236\u6027\u89e3\u91ca\uff1aMuon\u7684\u6b63\u4ea4\u5316\u66f4\u65b0\u53ef\u7406\u89e3\u4e3a\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u7684\u9690\u5f0f\u6b8b\u5dee\u8fde\u63a5\uff0c\u5728\u727a\u7272\u5c40\u90e8\u68af\u5ea6\u4fdd\u771f\u5ea6\u7684\u540c\u65f6\u6539\u5584\u4e86\u4e0b\u6e38\u5c42\u7684\u8868\u793a\u4fdd\u7559\u80fd\u529b\u3002\u901a\u8fc7\u7ebf\u6027\u4f18\u5316\u5b9e\u9a8c\u9a8c\u8bc1\uff0cMuon\u5b66\u5230\u7684\u8868\u793a\u867d\u62df\u5408\u5c40\u90e8\u76ee\u6807\u8f83\u6162\uff0c\u4f46\u66f4\u6613\u88ab\u4e0b\u6e38\u5c42\u5229\u7528\uff0c\u4e3a\u4f18\u5316\u5668\u8bbe\u8ba1\u63d0\u4f9b\u4e86\u65b0\u89c6\u89d2\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "University stakeholders often face difficulties in accessing timely and reliable information, especially in developing countries, where there are very few intelligent support systems. Existing rule-based chatbots are unable to handle complex, domain-specific queries and are not well-equipped to adapt to evolving institutional policies. As a fill-in-the-gap solution, we present the multimodal university chatbot with retrieval-augmented generation. The system combines the large language model with semantic retrieval to produce context-based responses from institution-centric resources, such as the university handbook. The system accepts text and image queries through the vision-language model and applies quantized inference for rapid deployment on constrained hardware. A scalable backend built with FastAPI, adjoined with a responsive frontend developed with Next.js, ensures real-time usability. Our multimodal evaluation demonstrates that the system maintains strong satisfaction scores across both text and image queries, despite increased response time for visual inputs. Furthermore, quantitative evaluation shows that hallucination is reduced from 31.7% to 6.6% in our proposed RAG-based system, confirming the effectiveness of retrieval grounding.", "arxiv_id": "2607.01115", "arxiv_url": "https://arxiv.org/abs/2607.01115", "authors": ["Md Abu Hanif Shaikh", "Abdullah Al Shafi"], "brief": "\u9488\u5bf9\u5927\u5b66\u5229\u76ca\u76f8\u5173\u8005\u4fe1\u606f\u83b7\u53d6\u56f0\u96be\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u57fa\u4e8e\u68c0\u7d22\u589e\u5f3a\u751f\u6210\uff08RAG\uff09\u7684\u591a\u6a21\u6001\u5927\u5b66\u804a\u5929\u52a9\u624b\uff0c\u652f\u6301\u6587\u672c\u548c\u56fe\u50cf\u67e5\u8be2\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u7cfb\u7edf\u5c06\u5e7b\u89c9\u7387\u4ece31.7%\u964d\u4f4e\u81f36.6%\uff0c\u663e\u8457\u63d0\u5347\u4e86\u56de\u7b54\u7684\u51c6\u786e\u6027\u548c\u53ef\u9760\u6027\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01115", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "RAG", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01115v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Towards Developing a Multimodal Chat Assistant for University Stakeholders: RAG-based Approach", "tldr": "\u9488\u5bf9\u5927\u5b66\u5229\u76ca\u76f8\u5173\u8005\u4fe1\u606f\u83b7\u53d6\u56f0\u96be\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u57fa\u4e8e\u68c0\u7d22\u589e\u5f3a\u751f\u6210\uff08RAG\uff09\u7684\u591a\u6a21\u6001\u5927\u5b66\u804a\u5929\u52a9\u624b\uff0c\u652f\u6301\u6587\u672c\u548c\u56fe\u50cf\u67e5\u8be2\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u7cfb\u7edf\u5c06\u5e7b\u89c9\u7387\u4ece31.7%\u964d\u4f4e\u81f36.6%\uff0c\u663e\u8457\u63d0\u5347\u4e86\u56de\u7b54\u7684\u51c6\u786e\u6027\u548c\u53ef\u9760\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In Large Language Model (LLM) training, data mixing plays a pivotal role in determining model performance. Recent methods optimize mixture weights via proxy models, but they rely on the assumption of static data distributions. As a result, when the underlying data pool shifts, these methods require costly retraining from scratch. This limitation restricts their ability to scale seamlessly from small settings to larger data pools and model sizes. In this paper, we propose CausalMix to address this limitation by casting data mixture optimization as a causal inference problem. We formulate the statistical features of the data pool as covariates and the domain mixture as the treatment. After fitting a causal model on 512 runs of Qwen2.5-0.5B to estimate the Conditional Average Treatment Effect (CATE), we extrapolate the optimal mixture for an 800K data pool and apply it to train a 7B model. Furthermore, we successfully generalize the framework to long chain-of-thought data on Qwen3-4B-Base. By leveraging causal modeling to isolate confounding biases, CausalMix dynamically infers state-dependent optimal data mixtures. Extensive experiments show that the mixture guided by CausalMix consistently improves performance across multiple downstream tasks, outperforming RegMix and other baselines. In addition, we use the CATE Interpreter to provide visual analysis of the learned mixing strategy. Overall, CausalMix offers a causal and interpretable framework for optimizing LLM data mixtures.", "arxiv_id": "2607.01104", "arxiv_url": "https://arxiv.org/abs/2607.01104", "authors": ["Zinan Tang", "Yukun Zhang", "Shaomian Zheng", "Zhuoshi Pan", "Qizhi Pei", "Dingnan Jin", "Jun Zhou", "Yujun Wang", "Biqing Huang"], "brief": "\u63d0\u51faCausalMix\u6846\u67b6\uff0c\u5c06\u5927\u8bed\u8a00\u6a21\u578b\u8bad\u7ec3\u4e2d\u7684\u6570\u636e\u6df7\u5408\u4f18\u5316\u95ee\u9898\u8f6c\u5316\u4e3a\u56e0\u679c\u63a8\u65ad\u95ee\u9898\uff0c\u901a\u8fc7\u4f30\u8ba1\u6761\u4ef6\u5e73\u5747\u5904\u7406\u6548\u5e94\uff08CATE\uff09\u6765\u52a8\u6001\u63a8\u65ad\u6700\u4f18\u6570\u636e\u6df7\u5408\u6bd4\u4f8b\u3002\u5728512\u6b21Qwen2.5-0.5B\u5b9e\u9a8c\u4e0a\u62df\u5408\u56e0\u679c\u6a21\u578b\u540e\uff0c\u6210\u529f\u5916\u63a8\u81f3800K\u6570\u636e\u6c60\u5e76\u5e94\u7528\u4e8e7B\u6a21\u578b\u8bad\u7ec3\uff0c\u5728\u591a\u4e2a\u4e0b\u6e38\u4efb\u52a1\u4e0a\u8d85\u8d8aRegMix\u7b49\u57fa\u7ebf\u65b9\u6cd5\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01104", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u636e\u6df7\u5408", "\u56e0\u679c\u63a8\u65ad", "\u8bad\u7ec3\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01104v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CausalMix: Data Mixture as Causal Inference for Language Model Training", "tldr": "\u63d0\u51faCausalMix\u6846\u67b6\uff0c\u5c06\u5927\u8bed\u8a00\u6a21\u578b\u8bad\u7ec3\u4e2d\u7684\u6570\u636e\u6df7\u5408\u4f18\u5316\u95ee\u9898\u8f6c\u5316\u4e3a\u56e0\u679c\u63a8\u65ad\u95ee\u9898\uff0c\u901a\u8fc7\u4f30\u8ba1\u6761\u4ef6\u5e73\u5747\u5904\u7406\u6548\u5e94\uff08CATE\uff09\u6765\u52a8\u6001\u63a8\u65ad\u6700\u4f18\u6570\u636e\u6df7\u5408\u6bd4\u4f8b\u3002\u5728512\u6b21Qwen2.5-0.5B\u5b9e\u9a8c\u4e0a\u62df\u5408\u56e0\u679c\u6a21\u578b\u540e\uff0c\u6210\u529f\u5916\u63a8\u81f3800K\u6570\u636e\u6c60\u5e76\u5e94\u7528\u4e8e7B\u6a21\u578b\u8bad\u7ec3\uff0c\u5728\u591a\u4e2a\u4e0b\u6e38\u4efb\u52a1\u4e0a\u8d85\u8d8aRegMix\u7b49\u57fa\u7ebf\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The evaluation of long-term video quality understanding remains an open challenge for large vision-language models (LVLMs). Existing video quality benchmarks predominantly focus on short clips and isolated distortions, overlooking the temporal continuity, cumulative degradation, and reasoning complexity inherent in long-duration content. To address these limitations, we present LongVQUBench, a comprehensive benchmark for long-term video quality understanding. LongVQUBench contains over 1200 diverse videos spanning movies, documentaries, surveillance footage, egocentric recordings, and animated content, accompanied by 1500 multiple-choice and open-ended questions for validation and testing. To assess perceptual reasoning across different temporal scopes, we introduce three progressively complex evaluation levels: (i) local event quality understanding (LQU) for analyzing localized distortions; (ii) cross-event quality reasoning (CQR) for integrating multiple degraded events; and (iii) global quality understanding (GQU) for holistic perceptual evaluation over extended durations. Furthermore, a needle distortion question-answering (NDQA) paradigm is embedded across all three levels, where spatial or temporal artifacts are sparsely inserted to probe fine-grained detection and reasoning capabilities. Extensive experiments on 14 state-of-the-art LVLMs reveal significant performance degradation with increasing video length and reasoning depth, highlighting their limited capacity for long-range temporal integration and perceptual attribution. We envision LongVQUBench as a foundational step toward the systematic, hierarchical, and explainable evaluation of LVLMs\u0027 long-term video quality understanding.", "arxiv_id": "2607.01086", "arxiv_url": "https://arxiv.org/abs/2607.01086", "authors": ["Arpita Nema", "Hanwei Zhu", "Xi Zhang", "Weisi Lin"], "brief": "\u63d0\u51faLongVQUBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u5927\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5bf9\u957f\u89c6\u9891\u8d28\u91cf\u7684\u7406\u89e3\u80fd\u529b\uff0c\u5305\u542b1200+\u89c6\u9891\u548c1500\u9053\u9898\u76ee\uff0c\u8bbe\u8ba1\u4e09\u7ea7\u9012\u8fdb\u8bc4\u4f30\u4f53\u7cfb\uff08\u5c40\u90e8\u3001\u8de8\u4e8b\u4ef6\u3001\u5168\u5c40\u8d28\u91cf\u7406\u89e3\uff09\u3002\u5b9e\u9a8c\u8868\u660e14\u4e2a\u4e3b\u6d41\u6a21\u578b\u5728\u89c6\u9891\u957f\u5ea6\u548c\u63a8\u7406\u6df1\u5ea6\u589e\u52a0\u65f6\u6027\u80fd\u663e\u8457\u4e0b\u964d\uff0c\u63ed\u793a\u4e86\u73b0\u6709\u6a21\u578b\u5728\u957f\u7a0b\u65f6\u5e8f\u6574\u5408\u65b9\u9762\u7684\u5c40\u9650\u6027\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01086", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u8d28\u91cf\u8bc4\u4f30", "\u591a\u6a21\u6001", "\u57fa\u51c6\u6d4b\u8bd5", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01086v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "LongVQUBench: Benchmarking Long-Term Video Quality Understanding of Vision-Language Models", "tldr": "\u63d0\u51faLongVQUBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u5927\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5bf9\u957f\u89c6\u9891\u8d28\u91cf\u7684\u7406\u89e3\u80fd\u529b\uff0c\u5305\u542b1200+\u89c6\u9891\u548c1500\u9053\u9898\u76ee\uff0c\u8bbe\u8ba1\u4e09\u7ea7\u9012\u8fdb\u8bc4\u4f30\u4f53\u7cfb\uff08\u5c40\u90e8\u3001\u8de8\u4e8b\u4ef6\u3001\u5168\u5c40\u8d28\u91cf\u7406\u89e3\uff09\u3002\u5b9e\u9a8c\u8868\u660e14\u4e2a\u4e3b\u6d41\u6a21\u578b\u5728\u89c6\u9891\u957f\u5ea6\u548c\u63a8\u7406\u6df1\u5ea6\u589e\u52a0\u65f6\u6027\u80fd\u663e\u8457\u4e0b\u964d\uff0c\u63ed\u793a\u4e86\u73b0\u6709\u6a21\u578b\u5728\u957f\u7a0b\u65f6\u5e8f\u6574\u5408\u65b9\u9762\u7684\u5c40\u9650\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "High-throughput RLHF systems often decouple rollout generation from policy optimization, leading to the use of stale rollouts during learner updates. In this work, we study the effect of such staleness in asynchronous GRPO. We make the behavior policy explicit in the GRPO surrogate objective and distinguish between the surrogate-gradient mapping used by the learner and the true total derivative of a distribution-dependent population objective. Under assumptions of local boundedness, distributional smoothness, and behavior-policy smoothness, we show that stale rollouts introduce a per-step surrogate-gradient bias of order O(S * eta), where S denotes the maximum rollout lag and eta denotes the learning rate. We further derive a conditional collapse-time scaling law: when within-cycle drift remains below a batch-level clipping radius, collapse is governed primarily by cumulative learner drift T * eta; when the stale-rollout constraint is active, stability instead depends explicitly on S * eta. This yields a two-constraint stability condition eta \u003c\u003c min{R_batch / (S * G_upd), R_crit / (T * G_upd)}, explaining why the maximum stable learning rate may appear weakly dependent on staleness in the horizon-limited regime.", "arxiv_id": "2607.01083", "arxiv_url": "https://arxiv.org/abs/2607.01083", "authors": ["Jingwei Song", "Haofeng Xu", "Jie Xiao", "Chengke Bao", "Jingwei Shi", "Pengbin Feng", "Weixun Wang", "Yuhang Han", "Chuan Wu", "Linfeng Zhang", "Bill Shi"], "brief": "\u672c\u6587\u7814\u7a76\u5f02\u6b65RLHF\u7cfb\u7edf\u4e2d\u8fc7\u65f6rollout\u5bf9\u7b56\u7565\u4f18\u5316\u7684\u5f71\u54cd\uff0c\u5728GRPO\u76ee\u6807\u4e2d\u663e\u5f0f\u5efa\u6a21\u884c\u4e3a\u7b56\u7565\uff0c\u63a8\u5bfc\u51fa\u6bcf\u6b65\u68af\u5ea6\u504f\u5dee\u4e3aO(S*\u03b7)\u7684\u7406\u8bba\u754c\uff0c\u5e76\u7ed9\u51fa\u53cc\u7ea6\u675f\u7a33\u5b9a\u6027\u6761\u4ef6\uff0c\u89e3\u91ca\u4e86\u4e3a\u4f55\u5728\u67d0\u4e9b\u60c5\u51b5\u4e0b\u6700\u5927\u7a33\u5b9a\u5b66\u4e60\u7387\u5bf9staleness\u4f9d\u8d56\u8f83\u5f31\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01083", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "RLHF", "\u5f02\u6b65\u8bad\u7ec3", "\u7406\u8bba\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01083v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Staleness-Learning Rate Scaling Laws for Asynchronous RLHF", "tldr": "\u672c\u6587\u7814\u7a76\u5f02\u6b65RLHF\u7cfb\u7edf\u4e2d\u8fc7\u65f6rollout\u5bf9\u7b56\u7565\u4f18\u5316\u7684\u5f71\u54cd\uff0c\u5728GRPO\u76ee\u6807\u4e2d\u663e\u5f0f\u5efa\u6a21\u884c\u4e3a\u7b56\u7565\uff0c\u63a8\u5bfc\u51fa\u6bcf\u6b65\u68af\u5ea6\u504f\u5dee\u4e3aO(S*\u03b7)\u7684\u7406\u8bba\u754c\uff0c\u5e76\u7ed9\u51fa\u53cc\u7ea6\u675f\u7a33\u5b9a\u6027\u6761\u4ef6\uff0c\u89e3\u91ca\u4e86\u4e3a\u4f55\u5728\u67d0\u4e9b\u60c5\u51b5\u4e0b\u6700\u5927\u7a33\u5b9a\u5b66\u4e60\u7387\u5bf9staleness\u4f9d\u8d56\u8f83\u5f31\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Memory-based discrete vision-language navigation (VLN) agents must act under partial observability, yet even strong frozen backbones remain vulnerable at test time. Two common failure modes are stale historical evidence at memory readout and inefficient local backtracking during action selection. We present DART-VLN, a training-free test-time control framework for discrete VLN. DART-VLN combines Test-Time Memory Decay, a read-side memory reweighting rule that suppresses stale and redundant evidence without rewriting stored content, with Anti-Loop Regularization, a lightweight next-hop penalty that discourages immediate reversals during action selection. The framework introduces no new learnable parameters and leaves the learned backbone unchanged. Experiments on R2R and REVERIE show a consistent pattern: decay-only provides stable read-side gains, while decay+anti-loop achieves the best overall quality-efficiency trade-off, yielding shorter trajectories, lower runtime, and improved navigation performance in key settings. Behavioral analysis further confirms that anti-loop regularization reduces local backtracking and improves path efficiency under frozen backbones. Overall, the results show that modest test-time control can make memory-based discrete VLN more reliable and efficient without retraining.", "arxiv_id": "2607.01043", "arxiv_url": "https://arxiv.org/abs/2607.01043", "authors": ["Shaoheng Zhang", "Zhichen Li", "Jie Mei"], "brief": "\u63d0\u51faDART-VLN\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u6d4b\u8bd5\u65f6\u63a7\u5236\u6846\u67b6\uff0c\u901a\u8fc7\u8bb0\u5fc6\u8870\u51cf\u673a\u5236\u6291\u5236\u8fc7\u65f6\u5386\u53f2\u8bc1\u636e\u3001\u901a\u8fc7\u53cd\u5faa\u73af\u6b63\u5219\u5316\u60e9\u7f5a\u5c40\u90e8\u56de\u6eaf\u884c\u4e3a\uff0c\u5728R2R\u548cREVERIE\u57fa\u51c6\u4e0a\u63d0\u5347\u4e86\u79bb\u6563\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u7684\u6548\u7387\u4e0e\u6027\u80fd\uff0c\u4e14\u65e0\u9700\u4fee\u6539\u5df2\u8bad\u7ec3\u7684\u9aa8\u5e72\u7f51\u7edc\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01043", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a", "\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u673a\u5236", "\u6d4b\u8bd5\u65f6\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01043v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DART-VLN: Test-Time Memory Decay and Anti-Loop Regularization for Discrete Vision-Language Navigation", "tldr": "\u63d0\u51faDART-VLN\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u6d4b\u8bd5\u65f6\u63a7\u5236\u6846\u67b6\uff0c\u901a\u8fc7\u8bb0\u5fc6\u8870\u51cf\u673a\u5236\u6291\u5236\u8fc7\u65f6\u5386\u53f2\u8bc1\u636e\u3001\u901a\u8fc7\u53cd\u5faa\u73af\u6b63\u5219\u5316\u60e9\u7f5a\u5c40\u90e8\u56de\u6eaf\u884c\u4e3a\uff0c\u5728R2R\u548cREVERIE\u57fa\u51c6\u4e0a\u63d0\u5347\u4e86\u79bb\u6563\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u7684\u6548\u7387\u4e0e\u6027\u80fd\uff0c\u4e14\u65e0\u9700\u4fee\u6539\u5df2\u8bad\u7ec3\u7684\u9aa8\u5e72\u7f51\u7edc\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Therapy-induced cardiotoxicity is the leading non-oncological cause of treatment interruption in breast cancer patients, yet early, automated risk stratification from routine cardiac imaging remains an unsolved problem. We present EchoRisk, the first curated, multicentre, longitudinal echocardiography dataset with explicit cardiotoxicity labels, released as the primary technical reference for the EchoRisk-MICCAI 2026 challenge. The dataset comprises 422 patients enrolled in the EU-funded CARDIOCARE prospective study across five European sites, yielding 2,159 echocardiography videos across 1,123 clinical exams acquired at up to five longitudinal timepoints, alongside a dedicated cohort of 280 patients with baseline imaging for early cardiotoxicity prediction. Three clinically grounded tasks are defined: automated estimation of left ventricular ejection fraction from cine video (Task 1), classification of LV dysfunction from longitudinal imaging (Task 2), and early prediction of therapy-induced cardiotoxicity from pre-therapy baseline echocardiography alone (Task 3). For each task we specify the evaluation protocol, primary and secondary metrics, and ranking procedure. We establish baseline performance using an R(2+1)D video backbone with LSTM aggregation trained from Kinetics-400 pretrained weights, demonstrating strong discriminative performance for cardiac functional assessment and LV dysfunction classification, while early cardiotoxicity prediction from a single pre-therapy video remains a significant open problem for the community. The dataset, evaluation code, and baseline implementations are publicly available to serve as a benchmark for further collaboration, comparison, and the creation of task-specific architectures in cardio-oncology.", "arxiv_id": "2607.01039", "arxiv_url": "https://arxiv.org/abs/2607.01039", "authors": ["Grigorios Kalliatakis", "Georgia Karanasiou", "Georgios Manikis", "Manolis Tsiknakis", "Dimitrios Fotiadis", "Dorothea Tsekoura", "Kalliopi Keramida", "Vasileios Bouratzis", "Lampros Lakkas", "Katerina Naka", "Andri Papakonstantinou", "Anastasia Constantinidou", "Kostas Marias"], "brief": "\u63d0\u51faEchoRisk\u2014\u2014\u9996\u4e2a\u591a\u4e2d\u5fc3\u7eb5\u5411\u8d85\u58f0\u5fc3\u52a8\u56fe\u6570\u636e\u96c6\uff0c\u4e13\u4e3a\u4e73\u817a\u764c\u6cbb\u7597\u8bf1\u53d1\u5fc3\u810f\u6bd2\u6027\u98ce\u9669\u5206\u5c42\u8bbe\u8ba1\uff0c\u6db5\u76d6422\u540d\u60a3\u8005\u76842159\u6bb5\u89c6\u9891\u3002\u5b9a\u4e49\u4e09\u9879\u4e34\u5e8a\u4efb\u52a1\uff08\u5de6\u5ba4\u5c04\u8840\u5206\u6570\u4f30\u8ba1\u3001LV\u529f\u80fd\u969c\u788d\u5206\u7c7b\u3001\u65e9\u671f\u5fc3\u810f\u6bd2\u6027\u9884\u6d4b\uff09\uff0c\u5e76\u4ee5R(2+1)D+LSTM\u57fa\u7ebf\u9a8c\u8bc1\uff0c\u5176\u4e2d\u6cbb\u7597\u524d\u5355\u89c6\u9891\u65e9\u671f\u9884\u6d4b\u4ecd\u662f\u5f00\u653e\u96be\u9898\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01039", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u533b\u5b66\u5f71\u50cf", "\u5fc3\u810f\u8d85\u58f0", "\u57fa\u51c6\u6570\u636e\u96c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01039v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "EchoRisk: A Multicentre Echocardiography Dataset and Benchmark for Cardio-Oncology", "tldr": "\u63d0\u51faEchoRisk\u2014\u2014\u9996\u4e2a\u591a\u4e2d\u5fc3\u7eb5\u5411\u8d85\u58f0\u5fc3\u52a8\u56fe\u6570\u636e\u96c6\uff0c\u4e13\u4e3a\u4e73\u817a\u764c\u6cbb\u7597\u8bf1\u53d1\u5fc3\u810f\u6bd2\u6027\u98ce\u9669\u5206\u5c42\u8bbe\u8ba1\uff0c\u6db5\u76d6422\u540d\u60a3\u8005\u76842159\u6bb5\u89c6\u9891\u3002\u5b9a\u4e49\u4e09\u9879\u4e34\u5e8a\u4efb\u52a1\uff08\u5de6\u5ba4\u5c04\u8840\u5206\u6570\u4f30\u8ba1\u3001LV\u529f\u80fd\u969c\u788d\u5206\u7c7b\u3001\u65e9\u671f\u5fc3\u810f\u6bd2\u6027\u9884\u6d4b\uff09\uff0c\u5e76\u4ee5R(2+1)D+LSTM\u57fa\u7ebf\u9a8c\u8bc1\uff0c\u5176\u4e2d\u6cbb\u7597\u524d\u5355\u89c6\u9891\u65e9\u671f\u9884\u6d4b\u4ecd\u662f\u5f00\u653e\u96be\u9898\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
