alse, "is_top": true, "key_points": ["\u5728Llama-3.1-8B\u3001Qwen3-8B\u3001Gemma-2-9B\u4e09\u4e2a\u6a21\u578b\u4e0a\u5747\u53d1\u73b0\uff1a\u6a21\u578b\u5bf9\u6743\u5a01\u4eba\u7269\u7684\u9519\u8bef\u63d0\u793a\u54cd\u5e94\u7a0b\u5ea6\u4e0e\u611f\u77e5\u6743\u5a01\u7b49\u7ea7\u6210\u6b63\u6bd4", "Logit lens\u5206\u6790\u4e0e\u7ebf\u6027/\u975e\u7ebf\u6027\u63a2\u9488\u5c06\u8be5\u6548\u5e94\u5b9a\u4f4d\u4e8e\u7279\u5b9a\u665a\u671f\u5c42\uff0c\u6b63\u786e\u7b54\u6848\u8868\u5f81\u5728\u8be5\u5c42\u88ab\u4e3b\u52a8\u64e6\u9664\uff0c\u4e14\u64e6\u9664\u7a0b\u5ea6\u968f\u6743\u5a01\u7b49\u7ea7\u5347\u9ad8\u800c\u589e\u5f3a", "\u8be5\u77e5\u8bc6\u64e6\u9664\u62b5\u6297\u5747\u503c\u5411\u91cf\u5e72\u9884\uff0c\u94fe\u5f0f\u601d\u7ef4\u63a8\u7406\u4ec5\u80fd\u90e8\u5206\u9006\u8f6c\uff0c\u8868\u660e\u8fd9\u662f\u7cbe\u786e\u7684\u5c42\u7ea7\u5b9a\u4f4d\u5f0f\u5185\u90e8\u8868\u5f81\u8986\u5199"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027", "\u5b89\u5168\u5bf9\u9f50", "\u673a\u5236\u6027\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00415v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "A Mechanistic View of Authority Hierarchy in LLM Sycophancy", "tldr": "LLM\u7684\u6743\u5a01\u504f\u89c1\u662f\u6df1\u5c42\u673a\u5236\u6027\u77e5\u8bc6\u64e6\u9664\uff0c\u800c\u975e\u8868\u9762\u8f93\u51fa\u504f\u5dee", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7\u53d7\u63a7\u533b\u7597QA\u5b9e\u9a8c\uff0c\u673a\u5236\u6027\u5730\u7814\u7a76\u4e86LLM\u4e2d\u7684\u6743\u5a01\u5c42\u7ea7\u8c04\u5a9a\u73b0\u8c61\uff0c\u63ed\u793a\u6a21\u578b\u4f1a\u6309\u611f\u77e5\u6743\u5a01\u7b49\u7ea7\u5206\u7ea7\u54cd\u5e94\u9519\u8bef\u63d0\u793a\uff0c\u4e14\u8fd9\u4e00\u6548\u5e94\u6e90\u4e8e\u8bad\u7ec3\u4e2d\u6d8c\u73b0\u7684\u9690\u5f0f\u6743\u5a01\u5c42\u7ea7\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u8c04\u5a9a\u884c\u4e3a\u4ece\u8f93\u51fa\u504f\u5dee\u5c42\u9762\u6df1\u5165\u5230\u5185\u90e8\u673a\u5236\u5c42\u9762\uff0c\u8bc1\u660e\u6743\u5a01\u8bf1\u5bfc\u7684\u8c04\u5a9a\u662f\u53ef\u5b9a\u4f4d\u7684\u77e5\u8bc6\u64e6\u9664\u8fc7\u7a0b\uff0c\u5bf9AI\u5b89\u5168\u5bf9\u9f50\u4e0e\u53ef\u89e3\u91ca\u6027\u7814\u7a76\u5177\u6709\u91cd\u8981\u610f\u4e49"}, {"abstract": "Open web-scale pre-training corpora remain concentrated in English, limiting multilingual LLM development. We introduce MultiSynt/MT, an open synthetic parallel corpus with approximately 4.8 trillion target-language tokens across 36 European languages, produced by translating 100 billion high-quality Nemotron-CC tokens with Tower+ and OPUS-MT/HPLT-MT systems. For many medium- and lower-resource European languages, this is the largest openly available pre-training resource. On a broad multilingual benchmark suite, reference LLMs trained on MultiSynt/MT reach the final score of HPLT 2.0, a native-data baseline, using roughly 72% fewer pre-training tokens, and outperform it by approximately 15% relative at a matched 100B-token training budget. Our analyses also identify evaluation blind spots: standard multiple-choice benchmarks miss translation-quality differences that a fluency-sensitive LLM-as-judge evaluation cleanly recovers on the trained LLMs (with no fluency deficit in MultiSynt itself), and Norwegian idiomatic and culturally grounded tasks remain better served by native data. We release the corpus, including row-aligned translations from multiple systems, to support controlled research on multilingual pre-training data and evaluation.", "arxiv_id": "2607.00890", "arxiv_url": "https://arxiv.org/abs/2607.00890", "authors": ["Maximilian Idahl", "J\u00f6rg Tiedemann", "Sampo Pyysalo", "David Salinas", "Tomasz Galica", "Shenbin Qian", "Tudor Nicolae Mateiu", "Zihao Li", "Anna Lokrantz", "Fedor Vitiugin", "Andr\u00e9 F. T. Martins", "Jenna Kanerva", "Filip Ginter", "Matthias Lindemann", "Tim Isbister", "Birger Moell", "Jonas Lindh", "Jan Haji\u010d", "Jenia Jitsev", "Andrey Kutuzov", "Stephan Oepen", "Gema Ram\u00edrez-S\u00e1nchez"], "brief": "\u63d0\u51faMultiSynt/MT\uff0c\u4e00\u4e2a\u901a\u8fc7\u673a\u5668\u7ffb\u8bd1\u5c061000\u4ebf\u9ad8\u8d28\u91cf\u82f1\u6587token\u6269\u5c55\u81f336\u79cd\u6b27\u6d32\u8bed\u8a00\u7684\u5f00\u653e\u5408\u6210\u5e73\u884c\u8bed\u6599\u5e93\uff0c\u603b\u8ba1\u7ea64.8\u4e07\u4ebf\u76ee\u6807\u8bed\u8a00token\uff0c\u662f\u4f17\u591a\u4e2d\u4f4e\u8d44\u6e90\u6b27\u6d32\u8bed\u8a00\u8fc4\u4eca\u6700\u5927\u7684\u5f00\u653e\u9884\u8bad\u7ec3\u8d44\u6e90\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00890", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4f7f\u7528Tower+\u548cOPUS-MT/HPLT-MT\u7cfb\u7edf\u7ffb\u8bd1Nemotron-CC\u9ad8\u8d28\u91cf\u82f1\u6587\u6570\u636e\uff0c\u8986\u76d636\u79cd\u6b27\u6d32\u8bed\u8a00", "\u5728\u76f8\u540c100B token\u8bad\u7ec3\u9884\u7b97\u4e0b\uff0cMultiSynt/MT\u8bad\u7ec3\u7684\u6a21\u578b\u6bd4\u539f\u751f\u6570\u636e\u57fa\u7ebfHPLT 2.0\u9ad8\u51fa\u7ea615%\uff1b\u8fbe\u5230\u540c\u7b49\u6027\u80fd\u4ec5\u9700\u7ea672%\u66f4\u5c11\u7684\u9884\u8bad\u7ec3token", "\u53d1\u73b0\u8bc4\u4f30\u76f2\u70b9\uff1a\u6807\u51c6\u591a\u9009\u9898\u57fa\u51c6\u65e0\u6cd5\u6355\u6349\u7ffb\u8bd1\u8d28\u91cf\u5dee\u5f02\uff0c\u9700\u8981\u6d41\u7545\u5ea6\u654f\u611f\u7684LLM-as-judge\u8bc4\u4f30\uff1b\u632a\u5a01\u8bed\u4e60\u8bed\u548c\u6587\u5316\u4efb\u52a1\u4ecd\u9700\u539f\u751f\u6570\u636e"], "keywords": ["\u591a\u8bed\u8a00", "\u9884\u8bad\u7ec3\u6570\u636e", "\u673a\u5668\u7ffb\u8bd1", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00890v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MultiSynt/MT: Trillion-Token Multi-Parallel Pre-Training Data Translated Across 36 Languages", "tldr": "\u53d1\u5e034.8\u4e07\u4ebftoken\u768436\u8bed\u8a00\u5408\u6210\u5e73\u884c\u8bed\u6599\u5e93\uff0c\u5927\u5e45\u63d0\u5347\u591a\u8bed\u8a00LLM\u9884\u8bad\u7ec3\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faMultiSynt/MT\uff0c\u4e00\u4e2a\u901a\u8fc7\u673a\u5668\u7ffb\u8bd1\u5c061000\u4ebf\u9ad8\u8d28\u91cf\u82f1\u6587token\u6269\u5c55\u81f336\u79cd\u6b27\u6d32\u8bed\u8a00\u7684\u5f00\u653e\u5408\u6210\u5e73\u884c\u8bed\u6599\u5e93\uff0c\u603b\u8ba1\u7ea64.8\u4e07\u4ebf\u76ee\u6807\u8bed\u8a00token\uff0c\u662f\u4f17\u591a\u4e2d\u4f4e\u8d44\u6e90\u6b27\u6d32\u8bed\u8a00\u8fc4\u4eca\u6700\u5927\u7684\u5f00\u653e\u9884\u8bad\u7ec3\u8d44\u6e90\u3002", "why_notable": "\u4e3a\u591a\u8bed\u8a00LLM\u7814\u7a76\u63d0\u4f9b\u4e86\u8fc4\u4eca\u6700\u5927\u89c4\u6a21\u7684\u5f00\u653e\u5408\u6210\u5e73\u884c\u8bed\u6599\u5e93\uff0c\u663e\u8457\u964d\u4f4e\u4e2d\u4f4e\u8d44\u6e90\u8bed\u8a00\u9884\u8bad\u7ec3\u6210\u672c\uff0c\u540c\u65f6\u63ed\u793a\u4e86\u73b0\u6709\u591a\u8bed\u8a00\u8bc4\u4f30\u4f53\u7cfb\u7684\u7cfb\u7edf\u6027\u76f2\u70b9\uff0c\u5bf9\u591a\u8bed\u8a00NLP\u7814\u7a76\u5177\u6709\u91cd\u8981\u57fa\u7840\u8bbe\u65bd\u4ef7\u503c\u3002"}, {"abstract": "Multilingual fluency often invites a stronger assumption: a model that can speak a user\u0027s language must also understand the culture encoded by that language. We call this the Illusion of Cultural Alignment. To test this assumption directly, we introduce MSQA, a benchmark of 1,064 natively sourced questions across 11 language groups, five cultural dimensions, and three difficulty tiers. Unlike translated benchmarks, MSQA targets locally grounded knowledge and reduces shortcuts from English-centric cross-lingual transfer. Evaluating 18 LLMs, we find substantial cultural degradation and a pronounced Locality Effect: cultural competence tracks pre-training exposure more closely than general reasoning ability. We further show that common inference-time remedies do not dissolve the illusion. Models remain overconfident on unfamiliar cultural questions, repeated sampling yields unstable rather than reliable correctness, and retrieval augmentation helps unevenly on long-tail facts. These findings indicate that cultural alignment cannot be inferred from multilingual ability alone and requires deeper intervention than calibration, sampling, or retrieval at inference time", "arxiv_id": "2607.00724", "arxiv_url": "https://arxiv.org/abs/2607.00724", "authors": ["Xianru Chen", "Yukai Huang", "Mingxiang Chen", "Xinping Lei", "Fangbing Deng", "Jin Chen", "Ge Zhang", "Wenhao Huang", "Jiaheng Liu"], "brief": "\u63d0\u51faMSQA\u57fa\u51c6\uff0c\u5305\u542b11\u4e2a\u8bed\u8a00\u7ec4\u30015\u4e2a\u6587\u5316\u7ef4\u5ea6\u30013\u4e2a\u96be\u5ea6\u5c42\u7ea7\u76841064\u9053\u672c\u571f\u5316\u95ee\u9898\uff0c\u4e13\u95e8\u6d4b\u8bd5LLM\u662f\u5426\u771f\u6b63\u7406\u89e3\u8bed\u8a00\u80cc\u540e\u7684\u6587\u5316\u77e5\u8bc6\uff0c\u800c\u975e\u4f9d\u8d56\u82f1\u8bed\u4e2d\u5fc3\u7684\u8de8\u8bed\u8a00\u8fc1\u79fb\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00724", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u53d1\u73b0\"\u6587\u5316\u5bf9\u9f50\u5e7b\u89c9\"\uff1a\u6a21\u578b\u80fd\u8bf4\u67d0\u79cd\u8bed\u8a00\u5e76\u4e0d\u610f\u5473\u7740\u7406\u89e3\u8be5\u8bed\u8a00\u7f16\u7801\u7684\u6587\u5316\uff0c18\u4e2aLLM\u5747\u5b58\u5728\u663e\u8457\u6587\u5316\u80fd\u529b\u9000\u5316", "\u5c40\u90e8\u6027\u6548\u5e94", "\u6a21\u578b\u7684\u6587\u5316\u80fd\u529b\u4e0e\u9884\u8bad\u7ec3\u6570\u636e\u66dd\u5149\u91cf\u9ad8\u5ea6\u76f8\u5173\uff0c\u800c\u975e\u53d6\u51b3\u4e8e\u901a\u7528\u63a8\u7406\u80fd\u529b", "\u63a8\u7406\u65f6\u8865\u6551\u63aa\u65bd\u6548\u679c\u6709\u9650\uff1a\u6a21\u578b\u5bf9\u964c\u751f\u6587\u5316\u95ee\u9898\u8fc7\u5ea6\u81ea\u4fe1\uff0c\u91cd\u590d\u91c7\u6837\u7ed3\u679c\u4e0d\u7a33\u5b9a\uff0c\u68c0\u7d22\u589e\u5f3a\u5bf9\u957f\u5c3e\u6587\u5316\u4e8b\u5b9e\u5e2e\u52a9\u4e0d\u5747"], "keywords": ["\u591a\u8bed\u8a00", "\u6587\u5316\u5bf9\u9f50", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00724v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MSQA: A Natively Sourced Multilingual and Multicultural SimpleQA Benchmark", "tldr": "\u591a\u8bed\u8a00\u80fd\u529b\u2260\u6587\u5316\u5bf9\u9f50\uff0cMSQA\u57fa\u51c6\u63ed\u793aLLM\u7684\"\u6587\u5316\u5bf9\u9f50\u5e7b\u89c9\"", "upvotes": 0, "what_it_is": "\u63d0\u51faMSQA\u57fa\u51c6\uff0c\u5305\u542b11\u4e2a\u8bed\u8a00\u7ec4\u30015\u4e2a\u6587\u5316\u7ef4\u5ea6\u30013\u4e2a\u96be\u5ea6\u5c42\u7ea7\u76841064\u9053\u672c\u571f\u5316\u95ee\u9898\uff0c\u4e13\u95e8\u6d4b\u8bd5LLM\u662f\u5426\u771f\u6b63\u7406\u89e3\u8bed\u8a00\u80cc\u540e\u7684\u6587\u5316\u77e5\u8bc6\uff0c\u800c\u975e\u4f9d\u8d56\u82f1\u8bed\u4e2d\u5fc3\u7684\u8de8\u8bed\u8a00\u8fc1\u79fb\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u63ed\u793a\u591a\u8bed\u8a00LLM\"\u6587\u5316\u5bf9\u9f50\u5e7b\u89c9\"\u7684\u672c\u571f\u5316\u57fa\u51c6\uff0c\u6307\u51fa\u6587\u5316\u5bf9\u9f50\u9700\u8981\u6bd4\u63a8\u7406\u65f6\u6821\u51c6/\u91c7\u6837/\u68c0\u7d22\u66f4\u6df1\u5c42\u7684\u5e72\u9884\uff0c\u5bf9\u591a\u8bed\u8a00AI\u5b89\u5168\u4e0e\u516c\u5e73\u6027\u7814\u7a76\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "LLMs are increasingly used to brainstorm research ideas, but existing evaluations mostly judge individual ideas by novelty, feasibility, or expert preference. We instead ask: how far are current LLM-generated ideas from human researchers? To characterize this gap, we build a large-scale evaluation framework for ideation from high-quality human research papers. For each paper, we reverse-engineer a small set of closely related prior works that likely inspired its core idea. LLMs are then prompted to generate a new idea from the set of paper titles and summaries. We introduce a two-axis research-taste taxonomy to profile each idea by its opportunity pattern and research paradigm, and use it to quantify the divergence between human and LLM ideas. Across idea sets generated by different LLMs, we observe a consistent distributional gap: LLM ideas are disproportionately concentrated around bridge-like opportunities and synthesis methods, whereas the human paper reference distribution spreads more broadly across ways of framing gaps and constructing contributions. This result suggests that strong LLMs can produce a range of reasonable ideas, but that range remains narrower than, and systematically shifted relative to, human research taste.", "arxiv_id": "2607.01233", "arxiv_url": "https://arxiv.org/abs/2607.01233", "authors": ["Ziyu Chen", "Yilun Zhao", "Arman Cohan"], "brief": "\u6784\u5efa\u4e86\u4e00\u4e2a\u5927\u89c4\u6a21\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc7\u9006\u5411\u5de5\u7a0b\u9ad8\u8d28\u91cf\u8bba\u6587\u7684\u7075\u611f\u6765\u6e90\uff0c\u7cfb\u7edf\u91cf\u5316LLM\u751f\u6210\u7814\u7a76\u60f3\u6cd5\u4e0e\u4eba\u7c7b\u7814\u7a76\u8005\u4e4b\u95f4\u7684\u5dee\u8ddd\uff0c\u5e76\u5f15\u5165\u4e8c\u7ef4\"\u7814\u7a76\u54c1\u5473\"\u5206\u7c7b\u4f53\u7cfb\u8fdb\u884c\u5206\u5e03\u5bf9\u6bd4\u5206\u6790\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01233", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51fa\u4e8c\u7ef4\u7814\u7a76\u54c1\u5473\u5206\u7c7b\u6cd5\uff08\u673a\u4f1a\u6a21\u5f0f \u00d7 \u7814\u7a76\u8303\u5f0f\uff09\uff0c\u5bf9\u6bcf\u4e2a\u60f3\u6cd5\u8fdb\u884c\u753b\u50cf\u5e76\u91cf\u5316\u4eba\u673a\u5206\u5e03\u5dee\u5f02", "LLM\u60f3\u6cd5\u8fc7\u5ea6\u96c6\u4e2d\u4e8e\"\u6865\u63a5\u5f0f\"\u673a\u4f1a\u548c\u7efc\u5408\u65b9\u6cd5\uff0c\u800c\u4eba\u7c7b\u7814\u7a76\u5206\u5e03\u66f4\u5e7f\u6cdb\u5730\u8986\u76d6\u591a\u79cd\u95ee\u9898\u6846\u67b6\u548c\u8d21\u732e\u6784\u5efa\u65b9\u5f0f", "\u8be5\u504f\u5dee\u5728\u4e0d\u540cLLM\u6a21\u578b\u95f4\u5177\u6709\u4e00\u81f4\u6027\uff0c\u8bf4\u660e\u8fd9\u662f\u5f53\u524dLLM\u7684\u7cfb\u7edf\u6027\u5c40\u9650\u800c\u975e\u4e2a\u522b\u6a21\u578b\u95ee\u9898"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u79d1\u7814\u521b\u610f", "\u8bc4\u4f30\u6846\u67b6", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01233v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Measuring the Gap Between Human and LLM Research Ideas", "tldr": "LLM\u751f\u6210\u7684\u7814\u7a76\u60f3\u6cd5\u96c6\u4e2d\u4e8e\"\u6865\u63a5\u5f0f\"\u673a\u4f1a\u548c\u7efc\u5408\u65b9\u6cd5\uff0c\u4e0e\u4eba\u7c7b\u7814\u7a76\u8005\u7684\u5206\u5e03\u5b58\u5728\u7cfb\u7edf\u6027\u504f\u5dee", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u4e00\u4e2a\u5927\u89c4\u6a21\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc7\u9006\u5411\u5de5\u7a0b\u9ad8\u8d28\u91cf\u8bba\u6587\u7684\u7075\u611f\u6765\u6e90\uff0c\u7cfb\u7edf\u91cf\u5316LLM\u751f\u6210\u7814\u7a76\u60f3\u6cd5\u4e0e\u4eba\u7c7b\u7814\u7a76\u8005\u4e4b\u95f4\u7684\u5dee\u8ddd\uff0c\u5e76\u5f15\u5165\u4e8c\u7ef4\"\u7814\u7a76\u54c1\u5473\"\u5206\u7c7b\u4f53\u7cfb\u8fdb\u884c\u5206\u5e03\u5bf9\u6bd4\u5206\u6790\u3002", "why_notable": "\u9996\u6b21\u4ece\u5206\u5e03\u5c42\u9762\u800c\u975e\u5355\u70b9\u8d28\u91cf\u8bc4\u4f30LLM\u4e0e\u4eba\u7c7b\u7814\u7a76\u60f3\u6cd5\u7684\u5dee\u8ddd\uff0c\u63ed\u793a\u4e86LLM\u5728\u79d1\u7814\u521b\u610f\u4e0a\u7684\u7cfb\u7edf\u6027\u504f\u5411\uff0c\u5bf9AI\u8f85\u52a9\u79d1\u7814\u7684\u8fb9\u754c\u8ba4\u77e5\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Repository-level performance-optimization benchmarks such as GSO, SWE-Perf and SWE-fficiency evaluate coding agents by applying patches to real repositories and comparing runtime against unoptimized baselines and official reference patches. Their leaderboard scores are increasingly used as evidence of coding-agent progress, but those scores can conflate runtime instability, benchmark-specific scoring rules, and how many tasks are already solved by at least one public submission. We audit these issues across the three benchmarks. First, we replay the official reference patches for 740 code optimization tasks across four common types of Google Cloud machines. Most benchmark tasks can be replayed, but their reference patches satisfy the original benchmark validity rules in every cross-machine replay for only 39/102 GSO tasks, 11/140 SWE-Perf tasks, and 411/498 SWE-fficiency tasks; SWE-Perf is especially fragile because many reference patches produce close-to-zero runtime changes. Second, we show that public submission rankings depend strongly on the benchmark scoring rule. Among eight public submissions shared by GSO and SWE-fficiency, the official rankings disagree on 9 of 28 pairwise submission comparisons, and SWE-fficiency\u0027s leaderboard scoring rule assigns the worst ten tasks overly high score weights of 58.5%-82.8%. Third, looking across 10 public submissions for each task, we find that at least one submission matches or beats the reference patch on 85.3% (384/450) of replay-valid GSO and SWE-fficiency tasks, and beats the unoptimized base code on 99.8% (449/450). Our study complements leaderboard scores by identifying tasks with more reliable performance signals, quantifying per-task score contributions, and exposing the remaining performance gaps that are hidden by aggregate rankings.", "arxiv_id": "2607.01211", "arxiv_url": "https://arxiv.org/abs/2607.01211", "authors": ["Zhi Chen", "Zhensu Sun", "Yuling Shi", "David Lo", "Lingxiao Jiang"], "brief": "\u5bf9GSO\u3001SWE-Perf\u548cSWE-fficiency\u4e09\u4e2a\u4ee3\u7801\u6027\u80fd\u4f18\u5316\u57fa\u51c6\u8fdb\u884c\u7cfb\u7edf\u5ba1\u8ba1\uff0c\u63ed\u793a\u8fd0\u884c\u65f6\u4e0d\u7a33\u5b9a\u6027\u3001\u8bc4\u5206\u89c4\u5219\u5dee\u5f02\u548c\u4efb\u52a1\u9971\u548c\u5ea6\u7b49\u95ee\u9898\u5bfc\u81f4\u6392\u884c\u699c\u5206\u6570\u65e0\u6cd5\u53ef\u9760\u8861\u91cf\u7f16\u7801\u667a\u80fd\u4f53\u7684\u771f\u5b9e\u80fd\u529b\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01211", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u8de8\u673a\u5668\u91cd\u653e\u53c2\u8003\u8865\u4e01\u65f6\uff0c\u4ec539/102\u4e2aGSO\u4efb\u52a1\u300111/140\u4e2aSWE-Perf\u4efb\u52a1\u6ee1\u8db3\u539f\u59cb\u6709\u6548\u6027\u89c4\u5219\uff0cSWE-Perf\u5c24\u4e3a\u8106\u5f31", "\u4e0d\u540c\u8bc4\u5206\u89c4\u5219\u5bfc\u81f48\u4e2a\u516c\u5f00\u63d0\u4ea4\u4e2d28\u5bf9\u6bd4\u8f83\u67099\u5bf9\u6392\u540d\u4e0d\u4e00\u81f4\uff0cSWE-fficiency\u6700\u5dee10\u4e2a\u4efb\u52a1\u88ab\u8d4b\u4e8858.5%-82.8%\u7684\u8fc7\u9ad8\u6743\u91cd", "\u5728\u91cd\u653e\u6709\u6548\u4efb\u52a1\u4e2d\uff0c85.3%\uff08384/450\uff09\u5df2\u6709\u81f3\u5c11\u4e00\u4e2a\u516c\u5f00\u63d0\u4ea4\u5339\u914d\u6216\u8d85\u8d8a\u53c2\u8003\u8865\u4e01\uff0c\u4efb\u52a1\u9971\u548c\u5ea6\u6781\u9ad8"], "keywords": ["\u57fa\u51c6\u8bc4\u6d4b", "\u4ee3\u7801\u751f\u6210", "\u667a\u80fd\u4f53", "\u53ef\u9760\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01211v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Are Performance-Optimization Benchmarks Reliably Measuring Coding Agents?", "tldr": "\u5ba1\u8ba1\u4e09\u5927\u4ee3\u7801\u4f18\u5316\u57fa\u51c6\u6d4b\u8bd5\uff0c\u53d1\u73b0\u5176\u8bc4\u4f30\u7f16\u7801\u667a\u80fd\u4f53\u7684\u53ef\u9760\u6027\u5b58\u5728\u4e25\u91cd\u95ee\u9898", "upvotes": 0, "what_it_is": "\u5bf9GSO\u3001SWE-Perf\u548cSWE-fficiency\u4e09\u4e2a\u4ee3\u7801\u6027\u80fd\u4f18\u5316\u57fa\u51c6\u8fdb\u884c\u7cfb\u7edf\u5ba1\u8ba1\uff0c\u63ed\u793a\u8fd0\u884c\u65f6\u4e0d\u7a33\u5b9a\u6027\u3001\u8bc4\u5206\u89c4\u5219\u5dee\u5f02\u548c\u4efb\u52a1\u9971\u548c\u5ea6\u7b49\u95ee\u9898\u5bfc\u81f4\u6392\u884c\u699c\u5206\u6570\u65e0\u6cd5\u53ef\u9760\u8861\u91cf\u7f16\u7801\u667a\u80fd\u4f53\u7684\u771f\u5b9e\u80fd\u529b\u3002", "why_notable": "\u968f\u7740\u7f16\u7801\u667a\u80fd\u4f53\u6392\u884c\u699c\u88ab\u5e7f\u6cdb\u5f15\u7528\u4e3a\u8fdb\u5c55\u8bc1\u636e\uff0c\u672c\u6587\u63ed\u793a\u8fd9\u4e9b\u57fa\u51c6\u5b58\u5728\u7cfb\u7edf\u6027\u53ef\u9760\u6027\u7f3a\u9677\uff0c\u5bf9AI\u7f16\u7801\u80fd\u529b\u8bc4\u4f30\u7684\u53ef\u4fe1\u5ea6\u63d0\u51fa\u91cd\u8981\u8b66\u793a\uff0c\u6709\u52a9\u4e8e\u63a8\u52a8\u66f4\u4e25\u8c28\u7684\u57fa\u51c6\u8bbe\u8ba1\u3002"}, {"abstract": "Agent skills package reusable operational knowledge for Large Language Model (LLM) agents, yet as they grow in scope, they become dependency-bearing artifacts whose identities, versions, and provenance remain implicit. This opacity already causes duplicated dependencies and inconsistent installations, exposing a gap that dependency management has yet to close. We introduce Agent Skill Supply Chains (ASSCs) to characterize mixed skill-package-service dependency graphs and help close this gap. Borrowing from Software Bill of Materials (SBOMs), we design SkillDepAnalyzer to capture natural-language dependency evidence and model skills as dependency-bearing artifacts. On the SKILL-DEP benchmark, SkillDepAnalyzer recovers skill metadata and dependency graphs accurately and comprehensively, substantially outperforming an LLM-based baseline and package-centric SBOM tools. Applying SkillDepAnalyzer to over 1.43 million skills, we obtain ASSCs and explore their structural diversity and security signals. We find four structural patterns: skill metadata is activation-ready but governance-poor; dependency graphs span skill, package, and service dependencies with concentrated reuse; recursive skill reuse expands dependency graphs and creates hidden package inventory; and skill dependency clusters form around related workflows. We also find that inspecting a skill alone misses security-relevant signals hiding in its dependencies. By analyzing ASSCs, we identify and report known malicious skills persisting in ASSCs to their developers. Based on these findings, we recommend typed dependency manifests, first-class dependency-cluster management, risk-warning audit commands for skill infrastructure maintainers, and lockfile-like records for skill developers.", "arxiv_id": "2607.01136", "arxiv_url": "https://arxiv.org/abs/2607.01136", "authors": ["Changguo Jia", "Tianqi Zhao", "Runzhi He", "Minghui Zhou"], "brief": "\u672c\u6587\u63d0\u51faAgent\u6280\u80fd\u4f9b\u5e94\u94fe(ASSCs)\u6982\u5ff5\uff0c\u8bbe\u8ba1SkillDepAnalyzer\u5de5\u5177\uff0c\u5bf9143\u4e07+\u4e2aLLM\u667a\u80fd\u4f53\u6280\u80fd\u8fdb\u884c\u4f9d\u8d56\u56fe\u5206\u6790\uff0c\u63ed\u793a\u5176\u4e2d\u9690\u85cf\u7684\u5b89\u5168\u98ce\u9669\u4e0e\u7ed3\u6784\u89c4\u5f8b\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01136", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["SkillDepAnalyzer\u5728SKILL-DEP\u57fa\u51c6\u4e0a\u663e\u8457\u4f18\u4e8e\u57fa\u4e8eLLM\u7684\u57fa\u7ebf\u548c\u4ee5\u5305\u4e3a\u4e2d\u5fc3\u7684SBOM\u5de5\u5177\uff0c\u80fd\u51c6\u786e\u6062\u590d\u6280\u80fd\u5143\u6570\u636e\u548c\u4f9d\u8d56\u56fe", "\u5206\u6790143\u4e07+\u6280\u80fd\u540e\u53d1\u73b0\u56db\u7c7b\u7ed3\u6784\u6a21\u5f0f\uff1a\u5143\u6570\u636e\u6cbb\u7406\u8584\u5f31\u3001\u4f9d\u8d56\u96c6\u4e2d\u590d\u7528\u3001\u9012\u5f52\u6280\u80fd\u590d\u7528\u9690\u85cf\u5305\u6e05\u5355\u3001\u4f9d\u8d56\u96c6\u7fa4\u56f4\u7ed5\u76f8\u5173\u5de5\u4f5c\u6d41\u5f62\u6210", "\u5355\u72ec\u68c0\u67e5\u6280\u80fd\u4f1a\u9057\u6f0f\u9690\u85cf\u5728\u4f9d\u8d56\u94fe\u4e2d\u7684\u5b89\u5168\u4fe1\u53f7\uff0c\u7814\u7a76\u53d1\u73b0\u5e76\u4e0a\u62a5\u4e86\u6301\u7eed\u5b58\u5728\u4e8eASSC\u4e2d\u7684\u5df2\u77e5\u6076\u610f\u6280\u80fd"], "keywords": ["\u667a\u80fd\u4f53", "\u4f9b\u5e94\u94fe\u5b89\u5168", "\u4f9d\u8d56\u5206\u6790", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01136v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Skills Are Not Islands: Measuring Dependency and Risk in Agent Skill Supply Chains", "tldr": "\u63d0\u51faAgent\u6280\u80fd\u4f9b\u5e94\u94fe(ASSC)\u6846\u67b6\uff0c\u5206\u6790LLM\u667a\u80fd\u4f53\u6280\u80fd\u7684\u4f9d\u8d56\u5173\u7cfb\u4e0e\u5b89\u5168\u98ce\u9669", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51faAgent\u6280\u80fd\u4f9b\u5e94\u94fe(ASSCs)\u6982\u5ff5\uff0c\u8bbe\u8ba1SkillDepAnalyzer\u5de5\u5177\uff0c\u5bf9143\u4e07+\u4e2aLLM\u667a\u80fd\u4f53\u6280\u80fd\u8fdb\u884c\u4f9d\u8d56\u56fe\u5206\u6790\uff0c\u63ed\u793a\u5176\u4e2d\u9690\u85cf\u7684\u5b89\u5168\u98ce\u9669\u4e0e\u7ed3\u6784\u89c4\u5f8b\u3002", "why_notable": "\u9996\u6b21\u5c06\u8f6f\u4ef6\u4f9b\u5e94\u94fe\u5b89\u5168\u7406\u5ff5\u7cfb\u7edf\u6027\u5f15\u5165LLM\u667a\u80fd\u4f53\u6280\u80fd\u751f\u6001\uff0c\u586b\u8865\u4e86\u6280\u80fd\u4f9d\u8d56\u7ba1\u7406\u7684\u7a7a\u767d\uff0c\u5bf9\u667a\u80fd\u4f53\u5b89\u5168\u6cbb\u7406\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c"}, {"abstract": "Robot policies inevitably encounter failures when deployed in real environments. Naive retries often repeat the same mistakes, while many existing recovery methods rely on human intervention. In this paper, we propose Failure-Aware Retry (FAR), a framework that enables robots to learn from previous failures at test time, adapt their behavior accordingly, and eventually complete the task autonomously. FAR combines Failure-Contrastive Preference Adaptation, which constructs preference learning data from failures to steer the policy away from previously unsuccessful behaviors, with lightweight action perturbations during retries to encourage local exploration. We further incorporate successful recovery trajectories into a training loop for continual policy improvement. Experiments in both simulation and real-world manipulation tasks show that FAR substantially improves success rates and robustness, with average gains of 17.6% over the standard diffusion policy in simulation and 11.7% in the real world. In addition, FAR significantly improves data efficiency under both reset and timestep budgets during continual policy improvement by exploiting informative failure cases.", "arxiv_id": "2607.01111", "arxiv_url": "https://arxiv.org/abs/2607.01111", "authors": ["Haoran Hao", "Shahram Najam Syed", "Jeffrey Ichnowski", "Jeff Schneider"], "brief": "\u63d0\u51faFailure-Aware Retry\uff08FAR\uff09\u6846\u67b6\uff0c\u4f7f\u673a\u5668\u4eba\u5728\u90e8\u7f72\u65f6\u80fd\u4ece\u5386\u53f2\u5931\u8d25\u4e2d\u5b66\u4e60\uff0c\u901a\u8fc7\u5931\u8d25\u5bf9\u6bd4\u504f\u597d\u9002\u5e94\u548c\u8f7b\u91cf\u52a8\u4f5c\u6270\u52a8\u5f15\u5bfc\u7b56\u7565\u8fdc\u79bb\u5931\u8d25\u884c\u4e3a\uff0c\u5e76\u5c06\u6210\u529f\u6062\u590d\u8f68\u8ff9\u7eb3\u5165\u6301\u7eed\u8bad\u7ec3\u5faa\u73af\u3002", "categories": ["cs.RO", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01111", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5931\u8d25\u5bf9\u6bd4\u504f\u597d\u9002\u5e94\uff08Failure-Contrastive Preference Adaptation\uff09\uff1a\u5c06\u5931\u8d25\u7ecf\u9a8c\u6784\u5efa\u4e3a\u504f\u597d\u5b66\u4e60\u6570\u636e\uff0c\u5f15\u5bfc\u7b56\u7565\u89c4\u907f\u5df2\u77e5\u5931\u8d25\u884c\u4e3a", "\u7ed3\u5408\u8f7b\u91cf\u52a8\u4f5c\u6270\u52a8\u9f13\u52b1\u5c40\u90e8\u63a2\u7d22\uff0c\u907f\u514d\u91cd\u8bd5\u65f6\u91cd\u590d\u76f8\u540c\u9519\u8bef", "\u4eff\u771f\u4e2d\u5e73\u5747\u63d0\u534717.6%\u6210\u529f\u7387\uff0c\u771f\u5b9e\u4e16\u754c\u63d0\u534711.7%\uff0c\u540c\u65f6\u663e\u8457\u63d0\u9ad8\u6301\u7eed\u6539\u8fdb\u9636\u6bb5\u7684\u6570\u636e\u6548\u7387"], "keywords": ["\u673a\u5668\u4eba\u5b66\u4e60", "\u5f3a\u5316\u5b66\u4e60", "\u7b56\u7565\u6539\u8fdb", "\u5931\u8d25\u6062\u590d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01111v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "FAR: Failure-Aware Retry for Test-Time Recovery and Continual Policy Improvement", "tldr": "FAR\u6846\u67b6\u8ba9\u673a\u5668\u4eba\u4ece\u5931\u8d25\u4e2d\u5b66\u4e60\uff0c\u6d4b\u8bd5\u65f6\u81ea\u9002\u5e94\u91cd\u8bd5\u5e76\u6301\u7eed\u6539\u8fdb\u7b56\u7565", "upvotes": 0, "what_it_is": "\u63d0\u51faFailure-Aware Retry\uff08FAR\uff09\u6846\u67b6\uff0c\u4f7f\u673a\u5668\u4eba\u5728\u90e8\u7f72\u65f6\u80fd\u4ece\u5386\u53f2\u5931\u8d25\u4e2d\u5b66\u4e60\uff0c\u901a\u8fc7\u5931\u8d25\u5bf9\u6bd4\u504f\u597d\u9002\u5e94\u548c\u8f7b\u91cf\u52a8\u4f5c\u6270\u52a8\u5f15\u5bfc\u7b56\u7565\u8fdc\u79bb\u5931\u8d25\u884c\u4e3a\uff0c\u5e76\u5c06\u6210\u529f\u6062\u590d\u8f68\u8ff9\u7eb3\u5165\u6301\u7eed\u8bad\u7ec3\u5faa\u73af\u3002", "why_notable": "\u65e0\u9700\u4eba\u5de5\u5e72\u9884\u5373\u53ef\u5b9e\u73b0\u6d4b\u8bd5\u65f6\u81ea\u4e3b\u6062\u590d\uff0c\u540c\u65f6\u5c06\u5931\u8d25\u6570\u636e\u8f6c\u5316\u4e3a\u6301\u7eed\u6539\u8fdb\u8d44\u6e90\uff0c\u517c\u987e\u5b9e\u7528\u6027\u4e0e\u6570\u636e\u6548\u7387\uff0c\u5bf9\u673a\u5668\u4eba\u90e8\u7f72\u9c81\u68d2\u6027\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Memory has emerged as a cornerstone of modern LLM-based agents, supporting their evolution from single-turn assistants to long-term collaborators. However, memory is not always beneficial: retrieved memories often induce a critical issue of sycophancy, causing agents to over-align with the user at the cost of factual accuracy or objective reasoning. Despite this emerging risk, existing memory benchmarks primarily evaluate whether memories are correctly stored, retrieved, or updated, while overlooking how retrieved memories influence downstream reasoning and decision-making. To bridge this gap, we propose MemSyco-Bench, a comprehensive benchmark for evaluating memory-induced sycophancy in agent systems. MemSyco-Bench measures when memory should influence a decision and how valid memory should be used. Specifically, it covers five tasks that assess whether agents can reject memory as factual evidence, respect its applicable scope, resolve conflicts between memory and objective evidence, track memory updates, and use valid memory for personalization. All related resources are collected for the community at https://github.com/XMUDeepLIT/MemSyco-Bench.", "arxiv_id": "2607.01071", "arxiv_url": "https://arxiv.org/abs/2607.01071", "authors": ["Zhishang Xiang", "Zerui Chen", "Yunbo Tang", "Zhimin Wei", "Ruqin Ning", "Yujie Lin", "Qinggang Zhang", "Jinsong Su"], "brief": "MemSyco-Bench\u662f\u9996\u4e2a\u4e13\u6ce8\u4e8e\u8bc4\u4f30\u667a\u80fd\u4f53\u8bb0\u5fc6\u8bf1\u5bfc\u8c04\u5a9a\uff08sycophancy\uff09\u73b0\u8c61\u7684\u7efc\u5408\u57fa\u51c6\uff0c\u6db5\u76d6\u4e94\u7c7b\u4efb\u52a1\uff0c\u6d4b\u91cf\u667a\u80fd\u4f53\u4f55\u65f6\u5e94\u53d7\u8bb0\u5fc6\u5f71\u54cd\u4ee5\u53ca\u5982\u4f55\u6b63\u786e\u4f7f\u7528\u6709\u6548\u8bb0\u5fc6\u3002", "categories": ["cs.IR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01071", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u8986\u76d6\u4e94\u7c7b\u8bc4\u4f30\u4efb\u52a1\uff1a\u62d2\u7edd\u9519\u8bef\u8bb0\u5fc6\u4f5c\u4e3a\u4e8b\u5b9e\u4f9d\u636e\u3001\u5c0a\u91cd\u8bb0\u5fc6\u9002\u7528\u8303\u56f4\u3001\u89e3\u51b3\u8bb0\u5fc6\u4e0e\u5ba2\u89c2\u8bc1\u636e\u51b2\u7a81\u3001\u8ffd\u8e2a\u8bb0\u5fc6\u66f4\u65b0\u3001\u5229\u7528\u6709\u6548\u8bb0\u5fc6\u5b9e\u73b0\u4e2a\u6027\u5316", "\u805a\u7126\u73b0\u6709\u8bb0\u5fc6\u57fa\u51c6\u7684\u76f2\u533a\u2014\u2014\u68c0\u7d22\u5230\u7684\u8bb0\u5fc6\u5982\u4f55\u5f71\u54cd\u4e0b\u6e38\u63a8\u7406\u4e0e\u51b3\u7b56\uff0c\u800c\u975e\u4ec5\u8bc4\u4f30\u5b58\u50a8/\u68c0\u7d22/\u66f4\u65b0\u7684\u6b63\u786e\u6027", "\u63ed\u793a\u8bb0\u5fc6\u673a\u5236\u7684\u53cc\u5203\u5251\u6548\u5e94\uff1a\u8bb0\u5fc6\u53ef\u80fd\u5bfc\u81f4\u667a\u80fd\u4f53\u8fc7\u5ea6\u8fce\u5408\u7528\u6237\uff0c\u727a\u7272\u4e8b\u5b9e\u51c6\u786e\u6027\u4e0e\u5ba2\u89c2\u63a8\u7406"], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01071v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MemSyco-Bench: Benchmarking Sycophancy in Agent Memory", "tldr": "\u63d0\u51faMemSyco-Bench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u8bb0\u5fc6\u5f15\u53d1\u7684\u8c04\u5a9a\u884c\u4e3a\u95ee\u9898", "upvotes": 0, "what_it_is": "MemSyco-Bench\u662f\u9996\u4e2a\u4e13\u6ce8\u4e8e\u8bc4\u4f30\u667a\u80fd\u4f53\u8bb0\u5fc6\u8bf1\u5bfc\u8c04\u5a9a\uff08sycophancy\uff09\u73b0\u8c61\u7684\u7efc\u5408\u57fa\u51c6\uff0c\u6db5\u76d6\u4e94\u7c7b\u4efb\u52a1\uff0c\u6d4b\u91cf\u667a\u80fd\u4f53\u4f55\u65f6\u5e94\u53d7\u8bb0\u5fc6\u5f71\u54cd\u4ee5\u53ca\u5982\u4f55\u6b63\u786e\u4f7f\u7528\u6709\u6548\u8bb0\u5fc6\u3002", "why_notable": "\u968f\u7740LLM\u667a\u80fd\u4f53\u5411\u957f\u671f\u534f\u4f5c\u52a9\u624b\u6f14\u8fdb\uff0c\u8bb0\u5fc6\u6a21\u5757\u7684\u8c04\u5a9a\u98ce\u9669\u88ab\u4e25\u91cd\u5ffd\u89c6\uff1b\u8be5\u57fa\u51c6\u586b\u8865\u4e86\u8bc4\u4f30\u7a7a\u767d\uff0c\u4e3a\u6784\u5efa\u66f4\u53ef\u9760\u3001\u66f4\u5ba2\u89c2\u7684\u8bb0\u5fc6\u589e\u5f3a\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u91cd\u8981\u5de5\u5177\u3002"}, {"abstract": "Self-evolving agents violate the assumption behind most learning-theoretic guarantees: the data, evaluator, components, and hypothesis space are produced by the policy being updated. We present \\textbf{SEA}, an architecture that confines self-modification to a small steering adapter and a versioned harness around a \\emph{frozen} base model and admits each modification only through an anytime-valid gate that emits an auditable certificate against a fixed error budget. Five loop controllers compose published guarantees; because such gates can only \\emph{select} among behaviors the frozen base already produces, five verifier-in-the-loop mechanisms -- best-of-$N$, micro-step search, self-authored reproduction oracles, search-layer control, and self-repair -- supply the dense, grader-free signal the gates require, computed from the issue text alone. On a $52$-instance SWE-bench Verified subset across four base models, base capability is the dominant, confound-free effect, and on two strong base models a deliberate no-op-composite control isolates the suite\u0027s contribution at $+4$ and $+5$ (\\textsc{Glm}~5.2 $24\\to28$; \\textsc{Gpt} $29\\to34$, the $65\\%$ best), with event logs confirming that its mechanisms fire and prevent regressions. Results are single-run on expensive evaluations; confirming run-to-run variance and adapting the per-task algorithm mix are future work.", "arxiv_id": "2607.00871", "arxiv_url": "https://arxiv.org/abs/2607.00871", "authors": ["Biswa Sengupta"], "brief": "\u63d0\u51faSEA\uff08Self-Evolving Agents\uff09\u67b6\u6784\uff0c\u5c06\u81ea\u6211\u4fee\u6539\u9650\u5236\u5728\u5c0f\u578b\u8f6c\u5411\u9002\u914d\u5668\u548c\u7248\u672c\u5316\u6846\u67b6\u4e2d\uff0c\u56f4\u7ed5\u51bb\u7ed3\u7684\u57fa\u7840\u6a21\u578b\u8fd0\u884c\uff0c\u5e76\u901a\u8fc7\"\u968f\u65f6\u6709\u6548\u95e8\"\uff08anytime-valid gate\uff09\u5bf9\u6bcf\u6b21\u4fee\u6539\u8fdb\u884c\u5ba1\u8ba1\u8ba4\u8bc1\uff0c\u786e\u4fdd\u5728\u56fa\u5b9a\u9519\u8bef\u9884\u7b97\u5185\u5b89\u5168\u6f14\u5316\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00871", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u81ea\u6211\u4fee\u6539\u4ec5\u9650\u4e8esteering adapter\uff0c\u57fa\u7840\u6a21\u578b\u5b8c\u5168\u51bb\u7ed3\uff0c\u95e8\u63a7\u673a\u5236\u53ea\u80fd\u4ece\u57fa\u7840\u6a21\u578b\u5df2\u6709\u884c\u4e3a\u4e2d\u9009\u62e9\uff0c\u4ece\u6839\u672c\u4e0a\u9650\u5236\u4e86\u98ce\u9669\u8303\u56f4", "\u4e94\u79cd\u9a8c\u8bc1\u5668\u673a\u5236\uff08best-of-N\u3001\u5fae\u6b65\u641c\u7d22\u3001\u81ea\u7f16\u5199\u590d\u73b0\u9884\u8a00\u673a\u3001\u641c\u7d22\u5c42\u63a7\u5236\u3001\u81ea\u4fee\u590d\uff09\u63d0\u4f9b\u65e0\u9700\u8bc4\u5206\u5668\u7684\u5bc6\u96c6\u4fe1\u53f7", "\u5728SWE-bench Verified\u5b50\u96c6\uff0852\u5b9e\u4f8b\uff0c4\u4e2a\u57fa\u7840\u6a21\u578b\uff09\u4e0a\uff0cGLM 5.2\u4ece24\u219228\uff0cGPT\u4ece29\u219234\uff08+5\uff0c\u8fbe65%\u6700\u4f18\uff09\uff0c\u4e8b\u4ef6\u65e5\u5fd7\u786e\u8ba4\u673a\u5236\u6709\u6548\u9632\u6b62\u56de\u5f52"], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u8fdb\u5316", "\u5b89\u5168\u5bf9\u9f50", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00871v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Self-Evolving Agents with Anytime-Valid Certificates", "tldr": "SEA\u67b6\u6784\u901a\u8fc7\u968f\u65f6\u6709\u6548\u7684\u8bc1\u4e66\u95e8\u63a7\u81ea\u8fdb\u5316\u667a\u80fd\u4f53\uff0c\u5728\u51bb\u7ed3\u57fa\u7840\u6a21\u578b\u4e0a\u5b89\u5168\u5b9e\u73b0\u81ea\u6211\u4fee\u6539", "upvotes": 0, "what_it_is": "\u63d0\u51faSEA\uff08Self-Evolving Agents\uff09\u67b6\u6784\uff0c\u5c06\u81ea\u6211\u4fee\u6539\u9650\u5236\u5728\u5c0f\u578b\u8f6c\u5411\u9002\u914d\u5668\u548c\u7248\u672c\u5316\u6846\u67b6\u4e2d\uff0c\u56f4\u7ed5\u51bb\u7ed3\u7684\u57fa\u7840\u6a21\u578b\u8fd0\u884c\uff0c\u5e76\u901a\u8fc7\"\u968f\u65f6\u6709\u6548\u95e8\"\uff08anytime-valid gate\uff09\u5bf9\u6bcf\u6b21\u4fee\u6539\u8fdb\u884c\u5ba1\u8ba1\u8ba4\u8bc1\uff0c\u786e\u4fdd\u5728\u56fa\u5b9a\u9519\u8bef\u9884\u7b97\u5185\u5b89\u5168\u6f14\u5316\u3002", "why_notable": "\u9996\u6b21\u5c06\u5b66\u4e60\u7406\u8bba\u4e2d\u7684\u968f\u65f6\u6709\u6548\u7edf\u8ba1\u4fdd\u8bc1\u5f15\u5165\u81ea\u8fdb\u5316\u667a\u80fd\u4f53\uff0c\u89e3\u51b3\u4e86\u81ea\u6211\u4fee\u6539\u7cfb\u7edf\u7f3a\u4e4f\u53ef\u5ba1\u8ba1\u5b89\u5168\u4fdd\u969c\u7684\u6838\u5fc3\u96be\u9898\uff0c\u5bf9\u6784\u5efa\u53ef\u4fe1\u8d56\u7684\u81ea\u4e3bAI\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u7406\u8bba\u4e0e\u5b9e\u8df5\u4ef7\u503c"}, {"abstract": "Large Reasoning Models (LRMs) have achieved remarkable success on complex tasks by leveraging long chain-of-thought (CoT) trajectories, yet they frequently exhibit overthinking on simple queries, resulting in significant token overhead and reduced inference efficiency. However, existing compression methods predominantly apply uniform length reduction or rely on coarse-grained difficulty estimation, often leading to performance degradation on difficult problems. To address this limitation, we propose Confidence-Adaptive Thinking (CAT), a framework that incorporates the model\u0027s intrinsic self-certainty signals as confidence into the preference optimization process, which autonomously modulates reasoning lengths based on problem difficulty. Experimental results show that CAT consistently outperforms state-of-the-art baselines on reasoning accuracy across multiple benchmarks on different base models. Our work enables LRMs to effectively compress confident responses while deliberating on uncertain ones, offering a potentially robust solution for balancing accuracy and latency in practical industrial scenarios.", "arxiv_id": "2607.00862", "arxiv_url": "https://arxiv.org/abs/2607.00862", "authors": ["Qizhi Jiang", "Shuo Wang", "Pei Ke", "Yuhang Song", "Ke Qin"], "brief": "\u63d0\u51fa\u7f6e\u4fe1\u5ea6\u81ea\u9002\u5e94\u601d\u8003\uff08CAT\uff09\u6846\u67b6\uff0c\u5c06\u6a21\u578b\u5185\u5728\u81ea\u786e\u4fe1\u4fe1\u53f7\u878d\u5165\u504f\u597d\u4f18\u5316\u8fc7\u7a0b\uff0c\u6839\u636e\u95ee\u9898\u96be\u5ea6\u81ea\u52a8\u8c03\u8282\u63a8\u7406\u94fe\u957f\u5ea6\uff0c\u5728\u7b80\u5355\u95ee\u9898\u4e0a\u538b\u7f29token\u5f00\u9500\uff0c\u5728\u96be\u9898\u4e0a\u4fdd\u6301\u5145\u5206\u63a8\u7406\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00862", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5229\u7528\u6a21\u578b\u81ea\u8eab\u7684\u7f6e\u4fe1\u5ea6\u4fe1\u53f7\u4f5c\u4e3a\u96be\u5ea6\u4f30\u8ba1\u4f9d\u636e\uff0c\u907f\u514d\u7c97\u7c92\u5ea6\u96be\u5ea6\u5212\u5206\u5bfc\u81f4\u7684\u6027\u80fd\u635f\u5931", "\u5c06\u7f6e\u4fe1\u5ea6\u81ea\u9002\u5e94\u673a\u5236\u5d4c\u5165\u504f\u597d\u4f18\u5316\u8bad\u7ec3\u6d41\u7a0b\uff0c\u65e0\u9700\u989d\u5916\u96be\u5ea6\u6807\u6ce8", "\u5728\u591a\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u548c\u4e0d\u540c\u57fa\u7840\u6a21\u578b\u4e0a\uff0c\u63a8\u7406\u51c6\u786e\u7387\u6301\u7eed\u4f18\u4e8e\u73b0\u6709SOTA\u538b\u7f29\u65b9\u6cd5"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u6548\u7387", "\u601d\u7ef4\u94fe", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00862v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CAT: Confidence-Adaptive Thinking for Efficient Reasoning of Large Reasoning Models", "tldr": "CAT\u6846\u67b6\u5229\u7528\u6a21\u578b\u81ea\u4fe1\u5ea6\u4fe1\u53f7\u81ea\u9002\u5e94\u8c03\u8282\u63a8\u7406\u957f\u5ea6\uff0c\u89e3\u51b3\u5927\u63a8\u7406\u6a21\u578b\u8fc7\u5ea6\u601d\u8003\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u7f6e\u4fe1\u5ea6\u81ea\u9002\u5e94\u601d\u8003\uff08CAT\uff09\u6846\u67b6\uff0c\u5c06\u6a21\u578b\u5185\u5728\u81ea\u786e\u4fe1\u4fe1\u53f7\u878d\u5165\u504f\u597d\u4f18\u5316\u8fc7\u7a0b\uff0c\u6839\u636e\u95ee\u9898\u96be\u5ea6\u81ea\u52a8\u8c03\u8282\u63a8\u7406\u94fe\u957f\u5ea6\uff0c\u5728\u7b80\u5355\u95ee\u9898\u4e0a\u538b\u7f29token\u5f00\u9500\uff0c\u5728\u96be\u9898\u4e0a\u4fdd\u6301\u5145\u5206\u63a8\u7406\u3002", "why_notable": "\u73b0\u6709CoT\u538b\u7f29\u65b9\u6cd5\u5bf9\u96be\u9898\u5b58\u5728\u6027\u80fd\u635f\u8017\uff0cCAT\u901a\u8fc7\u7ec6\u7c92\u5ea6\u7f6e\u4fe1\u5ea6\u4fe1\u53f7\u5b9e\u73b0\"\u96be\u9898\u6df1\u601d\u3001\u6613\u9898\u901f\u7b54\"\uff0c\u5728\u5de5\u4e1a\u573a\u666f\u4e2d\u517c\u987e\u51c6\u786e\u7387\u4e0e\u63a8\u7406\u5ef6\u8fdf\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "LLVM is a widely used compiler infrastructure whose scale and complexity make issue resolution labor-intensive and challenging. Although large language models (LLMs) have recently achieved remarkable success in issue resolution, their effectiveness on complex system-level LLVM compiler remains largely unexplored. To address this gap, we introduce LLVM-Bench, the first large-scale benchmark for LLVM issue resolution, containing 423 real-world, validated tasks collected from the LLVM project. We further develop LLVM-Gym, a scalable evaluation platform that automates issue reproduction, patch application, compiler building, and test execution. Using LLVM-Bench and LLVM-Gym, we conduct a comprehensive study of four representative LLMs, six retrieval configurations, and three agents. Our results show that current LLM-based issue resolution techniques remain limited on LLVM-Bench, with patch invalidity and build failures as the dominant failure modes. We further reveal a strong complementarity among different LLMs and agents, motivating LLVM-Ens, a lightweight ensemble approach that expands the patch space through integrating the patches generated by diverse techniques, filters incorrect and redundant candidates, and identifies the most promising solution. Our results show that LLVM-Ens achieves a resolution rate of up to 21.99%, further improving LLVM issue resolution.", "arxiv_id": "2607.00700", "arxiv_url": "https://arxiv.org/abs/2607.00700", "authors": ["Zhao Tian", "Yingquan Zhao", "Chenyao Suo", "Meng Wang", "Junjie Chen"], "brief": "\u63d0\u51faLLVM-Bench\u57fa\u51c6\uff08423\u4e2a\u771f\u5b9eLLVM\u95ee\u9898\u4fee\u590d\u4efb\u52a1\uff09\u548c\u81ea\u52a8\u5316\u8bc4\u4f30\u5e73\u53f0LLVM-Gym\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u5728\u590d\u6742\u7cfb\u7edf\u7ea7\u7f16\u8bd1\u5668\u95ee\u9898\u4fee\u590d\u4e2d\u7684\u80fd\u529b\uff0c\u5e76\u8bbe\u8ba1\u8f7b\u91cf\u7ea7\u96c6\u6210\u65b9\u6cd5LLVM-Ens\u63d0\u5347\u4fee\u590d\u6548\u679c\u3002", "categories": ["cs.SE", "cs.AI", "cs.PL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00700", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u6784\u5efa\u9996\u4e2a\u5927\u89c4\u6a21LLVM\u95ee\u9898\u4fee\u590d\u57fa\u51c6\uff0c\u542b423\u4e2a\u7ecf\u9a8c\u8bc1\u7684\u771f\u5b9e\u4efb\u52a1\uff0c\u8986\u76d6\u95ee\u9898\u590d\u73b0\u3001\u8865\u4e01\u5e94\u7528\u3001\u7f16\u8bd1\u5668\u6784\u5efa\u548c\u6d4b\u8bd5\u6267\u884c\u5168\u6d41\u7a0b", "\u7cfb\u7edf\u8bc4\u4f304\u79cdLLM\u30016\u79cd\u68c0\u7d22\u914d\u7f6e\u548c3\u79cdAgent\uff0c\u53d1\u73b0\u8865\u4e01\u65e0\u6548\u548c\u6784\u5efa\u5931\u8d25\u662f\u4e3b\u8981\u5931\u8d25\u6a21\u5f0f\uff0c\u73b0\u6709\u6280\u672f\u5728LLVM-Bench\u4e0a\u8868\u73b0\u6709\u9650", "LLVM-Ens\u901a\u8fc7\u6574\u5408\u591a\u79cd\u6280\u672f\u751f\u6210\u7684\u8865\u4e01\u3001\u8fc7\u6ee4\u9519\u8bef\u5197\u4f59\u5019\u9009\u5e76\u7b5b\u9009\u6700\u4f18\u89e3\uff0c\u5c06\u95ee\u9898\u4fee\u590d\u7387\u63d0\u5347\u81f321.99%"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u667a\u80fd\u4f53", "\u8f6f\u4ef6\u5de5\u7a0b", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00700v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "LLVM-Bench: Benchmarking and Advancing Large Language Models for LLVM Compiler Issue Resolution", "tldr": "\u9996\u4e2aLLVM\u7f16\u8bd1\u5668\u95ee\u9898\u4fee\u590d\u57fa\u51c6LLVM-Bench\uff0c\u96c6\u6210423\u4e2a\u771f\u5b9e\u4efb\u52a1\u5e76\u63d0\u51fa\u96c6\u6210\u65b9\u6cd5\u63d0\u5347\u4fee\u590d\u7387\u81f322%", "upvotes": 0, "what_it_is": "\u63d0\u51faLLVM-Bench\u57fa\u51c6\uff08423\u4e2a\u771f\u5b9eLLVM\u95ee\u9898\u4fee\u590d\u4efb\u52a1\uff09\u548c\u81ea\u52a8\u5316\u8bc4\u4f30\u5e73\u53f0LLVM-Gym\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u5728\u590d\u6742\u7cfb\u7edf\u7ea7\u7f16\u8bd1\u5668\u95ee\u9898\u4fee\u590d\u4e2d\u7684\u80fd\u529b\uff0c\u5e76\u8bbe\u8ba1\u8f7b\u91cf\u7ea7\u96c6\u6210\u65b9\u6cd5LLVM-Ens\u63d0\u5347\u4fee\u590d\u6548\u679c\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06LLM\u5e94\u7528\u4e8e\u5de5\u4e1a\u7ea7\u7f16\u8bd1\u5668\u57fa\u7840\u8bbe\u65bd\u7684\u95ee\u9898\u4fee\u590d\uff0c\u586b\u8865\u4e86LLM\u5728\u590d\u6742\u7cfb\u7edf\u8f6f\u4ef6\u9886\u57df\u8bc4\u4f30\u7684\u7a7a\u767d\uff0c\u4e3a\u7f16\u8bd1\u5668\u81ea\u52a8\u5316\u7ef4\u62a4\u63d0\u4f9b\u4e86\u91cd\u8981\u57fa\u51c6\u548c\u65b9\u6cd5\u53c2\u8003\u3002"}, {"abstract": "Existing egocentric benchmarks have primarily constructed the egocentric setting from first-person-view data, which makes it difficult to evaluate egocentric perspective itself in isolation. However, understanding first-person-view input and taking an egocentric perspective are separable abilities, especially when first-person body cues are absent or when other agents are present. To isolate egocentric perspective understanding, we introduce EgoGapBench, a diagnostic benchmark for measuring action selection in multi-agent egocentric scenes. We define the ability measured by this benchmark as Egocentric Action Selection (EAS): selecting an appropriate action from the agent\u0027s perspective in the presence of other agents. On EgoGapBench, humans answer reliably, whereas both open-source and proprietary MLLMs perform substantially worse and systematically select actions performed by other visible agents. Fine-tuning on existing egocentric data fails to close this gap and can even be detrimental. In contrast, fine-tuning on EgoGapBench training data improves accuracy but does not reach human performance. These results show that EAS is difficult to acquire from first-person-view data alone, and that MLLMs should be evaluated and trained not only for scene understanding but also for egocentric action selection.", "arxiv_id": "2607.00547", "arxiv_url": "https://arxiv.org/abs/2607.00547", "authors": ["Jihyeok Jung", "Jeewu Lee", "Sanghyeop Kim", "Chanhee Han", "Seong Joon Oh"], "brief": "\u6784\u5efa\u4e86EgoGapBench\u8bca\u65ad\u57fa\u51c6\uff0c\u7528\u4e8e\u6d4b\u91cf\u591a\u667a\u80fd\u4f53\u573a\u666f\u4e2d\u7684\u81ea\u6211\u4e2d\u5fc3\u52a8\u4f5c\u9009\u62e9\uff08EAS\uff09\u80fd\u529b\u2014\u2014\u5373\u5728\u5b58\u5728\u5176\u4ed6\u667a\u80fd\u4f53\u65f6\uff0c\u4ece\u81ea\u8eab\u89c6\u89d2\u9009\u62e9\u5408\u9002\u52a8\u4f5c\u7684\u80fd\u529b\uff0c\u4ee5\u6b64\u9694\u79bb\u8bc4\u4f30\u7b2c\u4e00\u4eba\u79f0\u89c6\u89d2\u7406\u89e3\u80fd\u529b\u672c\u8eab\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00547", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u4eba\u7c7b\u5728EgoGapBench\u4e0a\u8868\u73b0\u53ef\u9760\uff0c\u800c\u5f00\u6e90\u548c\u5546\u4e1aMLLM\u8868\u73b0\u663e\u8457\u66f4\u5dee\uff0c\u4e14\u7cfb\u7edf\u6027\u5730\u503e\u5411\u4e8e\u9009\u62e9\u5176\u4ed6\u53ef\u89c1\u667a\u80fd\u4f53\u7684\u52a8\u4f5c", "\u5728\u73b0\u6709\u81ea\u6211\u4e2d\u5fc3\u6570\u636e\u4e0a\u5fae\u8c03\u4e0d\u80fd\u5f25\u8865\u8fd9\u4e00\u5dee\u8ddd\uff0c\u751a\u81f3\u53ef\u80fd\u4ea7\u751f\u8d1f\u9762\u6548\u679c", "\u5728EgoGapBench\u8bad\u7ec3\u6570\u636e\u4e0a\u5fae\u8c03\u53ef\u63d0\u5347\u51c6\u786e\u7387\uff0c\u4f46\u4ecd\u672a\u8fbe\u5230\u4eba\u7c7b\u6c34\u5e73"], "keywords": ["\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u5177\u8eab\u667a\u80fd", "\u57fa\u51c6\u8bc4\u6d4b", "\u81ea\u6211\u4e2d\u5fc3\u89c6\u89d2"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00547v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EgoGapBench: Benchmarking Egocentric Action Selection in Multi-Agent Scenes", "tldr": "\u63d0\u51faEgoGapBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u591a\u667a\u80fd\u4f53\u573a\u666f\u4e2d\u7684\u81ea\u6211\u4e2d\u5fc3\u52a8\u4f5c\u9009\u62e9\u80fd\u529b", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86EgoGapBench\u8bca\u65ad\u57fa\u51c6\uff0c\u7528\u4e8e\u6d4b\u91cf\u591a\u667a\u80fd\u4f53\u573a\u666f\u4e2d\u7684\u81ea\u6211\u4e2d\u5fc3\u52a8\u4f5c\u9009\u62e9\uff08EAS\uff09\u80fd\u529b\u2014\u2014\u5373\u5728\u5b58\u5728\u5176\u4ed6\u667a\u80fd\u4f53\u65f6\uff0c\u4ece\u81ea\u8eab\u89c6\u89d2\u9009\u62e9\u5408\u9002\u52a8\u4f5c\u7684\u80fd\u529b\uff0c\u4ee5\u6b64\u9694\u79bb\u8bc4\u4f30\u7b2c\u4e00\u4eba\u79f0\u89c6\u89d2\u7406\u89e3\u80fd\u529b\u672c\u8eab\u3002", "why_notable": "\u63ed\u793a\u4e86\u5f53\u524dMLLM\u5728\u81ea\u6211\u4e2d\u5fc3\u89c6\u89d2\u7406\u89e3\u4e0a\u7684\u7cfb\u7edf\u6027\u7f3a\u9677\uff0c\u8bc1\u660eEAS\u80fd\u529b\u96be\u4ee5\u4ec5\u4ece\u7b2c\u4e00\u4eba\u79f0\u89c6\u89d2\u6570\u636e\u4e2d\u4e60\u5f97\uff0c\u4e3a\u591a\u667a\u80fd\u4f53\u573a\u666f\u4e0b\u7684\u5177\u8eabAI\u8bc4\u4f30\u63d0\u4f9b\u4e86\u65b0\u7ef4\u5ea6"}, {"abstract": "We present BaseRT, a native Metal inference runtime for large language models (LLMs) on Apple Silicon, and report the highest inference throughput on this hardware to date. Existing runtimes, including llama.cpp and MLX-based frameworks, incur overhead from abstractions not designed for Metal\u0027s execution model or Apple Silicon\u0027s unified memory topology. By building natively on Metal with chip-specific kernel fusion, unified memory-aware optimisation, and custom dispatch logic, BaseRT recovers performance that framework-based approaches leave on the table. BaseRT supports a wide range of model families across eight quantisation formats (Q2 to FP16) on all Apple M-series devices. In this paper, we evaluate the Qwen3, Llama 3.2, and Gemma 4 families at Q4 and Q8 quantisation on M3 and M4 Pro devices. BaseRT achieves up to 1.56x higher decode throughput than llama.cpp and up to 1.35x higher than MLX, with substantially larger margins on prefill for mixture-of-experts models, delivering consistent best-in-class throughput from sub-1B to 30B parameter models. These results establish Apple Silicon as a more capable inference platform than previously reported, with direct implications for the emerging edge inference paradigm: as privacy requirements, latency constraints, and cloud cost pressures drive inference toward on-device deployment, performance-optimised local runtimes are a critical enabling layer for this transition. BaseRT is publicly available at https://github.com/basecompute/baseRT", "arxiv_id": "2607.00501", "arxiv_url": "https://arxiv.org/abs/2607.00501", "authors": ["Prabod Rathnayaka", "Fabian Waschkowski", "Lukas Wesemann"], "brief": "BaseRT\u662f\u4e13\u4e3aApple Silicon\u6784\u5efa\u7684\u539f\u751fMetal LLM\u63a8\u7406\u8fd0\u884c\u65f6\uff0c\u901a\u8fc7\u82af\u7247\u7ea7\u5185\u6838\u878d\u5408\u3001\u7edf\u4e00\u5185\u5b58\u611f\u77e5\u4f18\u5316\u548c\u81ea\u5b9a\u4e49\u8c03\u5ea6\u903b\u8f91\uff0c\u5728Apple M\u7cfb\u5217\u8bbe\u5907\u4e0a\u5b9e\u73b0\u8fc4\u4eca\u6700\u9ad8\u7684LLM\u63a8\u7406\u541e\u5410\u91cf\u3002", "categories": ["cs.CL", "cs.AI", "cs.PF"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00501", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u89e3\u7801\u541e\u5410\u91cf\u6700\u9ad8\u6bd4llama.cpp\u63d0\u53471.56\u500d\uff0c\u6bd4MLX\u63d0\u53471.35\u500d\uff0cMoE\u6a21\u578b\u9884\u586b\u5145\u9636\u6bb5\u63d0\u5347\u5e45\u5ea6\u66f4\u5927", "\u652f\u6301Qwen3\u3001Llama 3.2\u3001Gemma 4\u7b49\u591a\u4e2a\u6a21\u578b\u5bb6\u65cf\uff0c\u8986\u76d6Q2\u5230FP16\u51718\u79cd\u91cf\u5316\u683c\u5f0f\uff0c\u9002\u914d\u6240\u6709M\u7cfb\u5217\u82af\u7247", "\u9488\u5bf9Metal\u6267\u884c\u6a21\u578b\u548cApple Silicon\u7edf\u4e00\u5185\u5b58\u62d3\u6251\u539f\u751f\u8bbe\u8ba1\uff0c\u907f\u514d\u4e86\u73b0\u6709\u6846\u67b6\u62bd\u8c61\u5c42\u5e26\u6765\u7684\u6027\u80fd\u635f\u8017"], "keywords": ["LLM\u63a8\u7406", "\u8fb9\u7f18\u90e8\u7f72", "\u6a21\u578b\u91cf\u5316", "\u786c\u4ef6\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00501v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "BaseRT: Best-in-Class LLM Inference on Apple Silicon via Native Metal", "tldr": "BaseRT\uff1a\u57fa\u4e8e\u539f\u751fMetal\u7684Apple Silicon LLM\u63a8\u7406\u8fd0\u884c\u65f6\uff0c\u5b9e\u73b0\u540c\u7c7b\u6700\u9ad8\u541e\u5410\u91cf", "upvotes": 0, "what_it_is": "BaseRT\u662f\u4e13\u4e3aApple Silicon\u6784\u5efa\u7684\u539f\u751fMetal LLM\u63a8\u7406\u8fd0\u884c\u65f6\uff0c\u901a\u8fc7\u82af\u7247\u7ea7\u5185\u6838\u878d\u5408\u3001\u7edf\u4e00\u5185\u5b58\u611f\u77e5\u4f18\u5316\u548c\u81ea\u5b9a\u4e49\u8c03\u5ea6\u903b\u8f91\uff0c\u5728Apple M\u7cfb\u5217\u8bbe\u5907\u4e0a\u5b9e\u73b0\u8fc4\u4eca\u6700\u9ad8\u7684LLM\u63a8\u7406\u541e\u5410\u91cf\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u6316\u6398Apple Silicon\u5728LLM\u63a8\u7406\u4e0a\u7684\u786c\u4ef6\u6f5c\u529b\uff0c\u5bf9\u8fb9\u7f18\u63a8\u7406/\u672c\u5730\u90e8\u7f72\u8303\u5f0f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u5df2\u5f00\u6e90\uff0c\u53ef\u76f4\u63a5\u63a8\u52a8\u9690\u79c1\u654f\u611f\u573a\u666f\u4e0b\u7684\u7aef\u4fa7AI\u843d\u5730\u3002"}, {"abstract": "Benchmarks for vision-language models (VLMs) mostly test observational spatial reasoning: models describe relations already visible in the input. Existing what-if tasks typically vary the observer while keeping the scene fixed. Can VLMs instead predict the consequences of hypothetically moving or rotating an object? We introduce MindEdit-Bench, a benchmark of six spatial reasoning tasks built from three-photo smartphone triplets of newly captured indoor scenes via an automatic in-the-wild 3D scene-graph extraction pipeline. Four tasks probe perception and perspective transformation over observed structure; two new tasks, L4 (spatial editing) and L5 (cross-view visibility editing), probe object-level counterfactual reasoning, where correct answers are absent from all input images. Each question provides 8-24 structured answer choices, enabling answer-letter-level diagnosis of spatial and fallback errors. The benchmark covers 120 private indoor scenes not drawn from public datasets, reducing public-data pretraining-overlap risk. Across 15 VLMs on 1,003 human-verified questions, task-wise mean VLM accuracy is only 8%-31%, versus 81%-97% human majority-vote accuracy. The pooled human--best-VLM gap is 53 pp, with at least 39 pp on every task. The structured answer space further reveals non-uniform failures, including weaker camera-depth-axis inference and fallback behavior on difficult visibility-editing cases.", "arxiv_id": "2607.00491", "arxiv_url": "https://arxiv.org/abs/2607.00491", "authors": ["Leyuan Yu", "Xiao Tang", "Minghao Liu", "Xinyuan Li", "Xiaokai Bai", "Sheng Zhou", "Qunshu Lin", "Weihao Xuan", "Naoto Yokoya"], "brief": "\u63d0\u51faMindEdit-Bench\u57fa\u51c6\uff0c\u901a\u8fc7\u5ba4\u5185\u573a\u666f\u4e09\u5f20\u7167\u7247\u4e09\u5143\u7ec4\uff0c\u6784\u5efa\u516d\u7c7b\u7a7a\u95f4\u63a8\u7406\u4efb\u52a1\uff0c\u91cd\u70b9\u6d4b\u8bd5VLM\u5728\u5047\u8bbe\u6027\u79fb\u52a8/\u65cb\u8f6c\u7269\u4f53\u540e\u9884\u6d4b\u7a7a\u95f4\u540e\u679c\u7684\u53cd\u4e8b\u5b9e\u63a8\u7406\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00491", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5305\u542b6\u7c7b\u4efb\u52a1\uff1a4\u7c7b\u611f\u77e5\u4e0e\u89c6\u89d2\u53d8\u6362\u4efb\u52a1 + 2\u7c7b\u5168\u65b0\u53cd\u4e8b\u5b9e\u63a8\u7406\u4efb\u52a1\uff08L4\u7a7a\u95f4\u7f16\u8f91\u3001L5\u8de8\u89c6\u89d2\u53ef\u89c1\u6027\u7f16\u8f91\uff09\uff0c\u6b63\u786e\u7b54\u6848\u4e0d\u51fa\u73b0\u5728\u4efb\u4f55\u8f93\u5165\u56fe\u50cf\u4e2d", "\u8986\u76d6120\u4e2a\u79c1\u6709\u5ba4\u5185\u573a\u666f\u30011003\u9053\u4eba\u5de5\u9a8c\u8bc1\u9898\u76ee\uff0c15\u4e2aVLM\u7684\u4efb\u52a1\u5e73\u5747\u51c6\u786e\u7387\u4ec58%-31%\uff0c\u800c\u4eba\u7c7b\u591a\u6570\u6295\u7968\u51c6\u786e\u7387\u8fbe81%-97%", "\u4eba\u673a\u6700\u4f18\u5dee\u8ddd\u8fbe53\u4e2a\u767e\u5206\u70b9\uff0c\u6bcf\u9879\u4efb\u52a1\u81f3\u5c1139pp\uff1b\u7ed3\u6784\u5316\u7b54\u6848\u7a7a\u95f4\u63ed\u793a\u4e86\u76f8\u673a\u6df1\u5ea6\u8f74\u63a8\u7406\u5f31\u548c\u56f0\u96be\u53ef\u89c1\u6027\u7f16\u8f91\u4e2d\u7684\u9000\u5316\u884c\u4e3a\u7b49\u975e\u5747\u5300\u5931\u8d25\u6a21\u5f0f"], "keywords": ["\u591a\u6a21\u6001", "\u7a7a\u95f4\u63a8\u7406", "\u57fa\u51c6\u8bc4\u6d4b", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00491v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MindEdit-Bench: Benchmarking Object-Level Counterfactual Spatial Reasoning in VLMs from In-the-Wild Photos", "tldr": "MindEdit-Bench\uff1a\u6d4b\u8bd5VLM\u5bf9\u8c61\u7ea7\u53cd\u4e8b\u5b9e\u7a7a\u95f4\u63a8\u7406\u7684\u65b0\u57fa\u51c6\uff0c\u4eba\u673a\u5dee\u8ddd\u9ad8\u8fbe53\u4e2a\u767e\u5206\u70b9", "upvotes": 0, "what_it_is": "\u63d0\u51faMindEdit-Bench\u57fa\u51c6\uff0c\u901a\u8fc7\u5ba4\u5185\u573a\u666f\u4e09\u5f20\u7167\u7247\u4e09\u5143\u7ec4\uff0c\u6784\u5efa\u516d\u7c7b\u7a7a\u95f4\u63a8\u7406\u4efb\u52a1\uff0c\u91cd\u70b9\u6d4b\u8bd5VLM\u5728\u5047\u8bbe\u6027\u79fb\u52a8/\u65cb\u8f6c\u7269\u4f53\u540e\u9884\u6d4b\u7a7a\u95f4\u540e\u679c\u7684\u53cd\u4e8b\u5b9e\u63a8\u7406\u80fd\u529b\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u8bc4\u4f30VLM\u5bf9\u8c61\u7ea7\u53cd\u4e8b\u5b9e\u7a7a\u95f4\u63a8\u7406\u7684\u57fa\u51c6\uff0c\u63ed\u793a\u5f53\u524d\u6700\u5f3aVLM\u5728\u6b64\u80fd\u529b\u4e0a\u4e0e\u4eba\u7c7b\u5b58\u5728\u5de8\u5927\u5dee\u8ddd\uff0c\u4e3a\u7a7a\u95f4\u667a\u80fd\u7814\u7a76\u6307\u660e\u5173\u952e\u77ed\u677f\u3002"}, {"abstract": "The deployment of Large Language Models (LLMs) with extended context windows is increasingly constrained by the linear growth of Key-Value (KV) cache memory. Vector Quantization (VQ), particularly Residual Quantization (RQ), is a promising approach for pushing KV cache storage toward the sub-1-bit regime by progressively encoding residuals with small codebooks. However, most VQ methods still rely on standard $\\ell_2$ $K$-means as the core codebook-learning primitive. We identify a subtle high-dimensional issue of this primitive: Euclidean centroid averaging can induce centroid shrinkage, which weakens the angular alignment term in the $\\ell_2$ distortion and makes directional preservation harder. To address this issue, we propose Gain-Shape $K$-means (GSKM), a drop-in replacement for $K$-means that improves directional fidelity while matching, and in some regimes improving, $\\ell_2$ distortion. We then build Gain-Shape Residual Quantization (GSRQ) by incorporating a weighted extension of GSKM into an RQ pipeline. On LLaMA-3-8B, GSRQ substantially improves over strong KV cache quantization baselines across bit rates. At 1-bit, it improves the average accuracy across LongBench tasks from 11.34 to 33.54, a gain of 22.20 percentage points over VQLLM.", "arxiv_id": "2607.01065", "arxiv_url": "https://arxiv.org/abs/2607.01065", "authors": ["Soosung Kim", "Minjae Park", "Eui-Young Chung", "Jaeyong Chung"], "brief": "\u63d0\u51faGain-Shape\u6b8b\u5dee\u91cf\u5316\uff08GSRQ\uff09\u65b9\u6cd5\uff0c\u9488\u5bf9\u9ad8\u7ef4\u5411\u91cf\u91cf\u5316\u4e2d\u6b27\u6c0f\u8d28\u5fc3\u5e73\u5747\u5bfc\u81f4\u7684\u8d28\u5fc3\u6536\u7f29\u95ee\u9898\uff0c\u8bbe\u8ba1\u4e86Gain-Shape K\u5747\u503c\uff08GSKM\uff09\u4f5c\u4e3a\u6807\u51c6K\u5747\u503c\u7684\u66ff\u4ee3\uff0c\u5e76\u5c06\u5176\u96c6\u6210\u5230\u6b8b\u5dee\u91cf\u5316\u6d41\u6c34\u7ebf\u4e2d\uff0c\u5b9e\u73b0LLM KV\u7f13\u5b58\u7684\u4e9a1\u6bd4\u7279\u9ad8\u6548\u538b\u7f29\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01065", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\u6807\u51c6\u21132 K\u5747\u503c\u5728\u9ad8\u7ef4\u573a\u666f\u4e0b\u5b58\u5728\u8d28\u5fc3\u6536\u7f29\u95ee\u9898\uff0c\u524a\u5f31\u4e86\u89d2\u5ea6\u5bf9\u9f50\u9879\uff0c\u5bfc\u81f4\u65b9\u5411\u4fdd\u771f\u5ea6\u4e0b\u964d", "\u63d0\u51faGSKM\uff08\u589e\u76ca-\u5f62\u72b6K\u5747\u503c\uff09\uff0c\u5c06\u5411\u91cf\u5206\u89e3\u4e3a\u589e\u76ca\uff08\u5e45\u5ea6\uff09\u548c\u5f62\u72b6\uff08\u65b9\u5411\uff09\u5206\u522b\u5904\u7406\uff0c\u63d0\u5347\u65b9\u5411\u4fdd\u771f\u5ea6", "\u5728LLaMA-3-8B\u4e0a\uff0c1\u6bd4\u7279\u8bbe\u7f6e\u4e0bLongBench\u5e73\u5747\u51c6\u786e\u7387\u4ece11.34\u63d0\u5347\u81f333.54\uff0c\u6bd4VQLLM\u9ad8\u51fa22.20\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u538b\u7f29", "\u5411\u91cf\u91cf\u5316", "KV\u7f13\u5b58"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01065v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "GSRQ: Gain-Shape Residual Quantization for Sub-1-bit KV Cache", "tldr": "\u63d0\u51faGSRQ\u65b9\u6cd5\uff0c\u901a\u8fc7\u589e\u76ca-\u5f62\u72b6K\u5747\u503c\u6539\u5584KV\u7f13\u5b58\u5411\u91cf\u91cf\u5316\u7684\u65b9\u5411\u4fdd\u771f\u5ea6\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u4e9a1\u6bd4\u7279\u538b\u7f29", "upvotes": 0, "what_it_is": "\u63d0\u51faGain-Shape\u6b8b\u5dee\u91cf\u5316\uff08GSRQ\uff09\u65b9\u6cd5\uff0c\u9488\u5bf9\u9ad8\u7ef4\u5411\u91cf\u91cf\u5316\u4e2d\u6b27\u6c0f\u8d28\u5fc3\u5e73\u5747\u5bfc\u81f4\u7684\u8d28\u5fc3\u6536\u7f29\u95ee\u9898\uff0c\u8bbe\u8ba1\u4e86Gain-Shape K\u5747\u503c\uff08GSKM\uff09\u4f5c\u4e3a\u6807\u51c6K\u5747\u503c\u7684\u66ff\u4ee3\uff0c\u5e76\u5c06\u5176\u96c6\u6210\u5230\u6b8b\u5dee\u91cf\u5316\u6d41\u6c34\u7ebf\u4e2d\uff0c\u5b9e\u73b0LLM KV\u7f13\u5b58\u7684\u4e9a1\u6bd4\u7279\u9ad8\u6548\u538b\u7f29\u3002", "why_notable": "\u5728\u4e9a1\u6bd4\u7279KV\u7f13\u5b58\u91cf\u5316\u8fd9\u4e00\u6781\u7aef\u538b\u7f29\u573a\u666f\u4e0b\u53d6\u5f97\u663e\u8457\u6027\u80fd\u7a81\u7834\uff0c\u4e14GSKM\u53ef\u4f5c\u4e3a\u5373\u63d2\u5373\u7528\u6a21\u5757\u66ff\u6362\u73b0\u6709\u65b9\u6cd5\u4e2d\u7684K\u5747\u503c\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u901a\u7528\u6027\u548c\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Mixed-precision quantization (MPQ) has become a key technique for deploying large language models under stringent memory and compute constraints. We first identify a phenomenon that we term the Perplexity Illusion: layers ranked as important by perplexity-based sensitivity show little rank correlation with those that are most influential for complex reasoning performance, with Kendall $\u03c4\\approx 0$ in our analysis. We further reveal an Alignment-Diversity Tradeoff: using only target-task calibration data can degrade post-quantization performance, whereas incorporating general-domain data stabilizes sensitivity estimation and improves robustness across tasks. Based on these observations, we propose TASA (Task-Aware Sensitivity Analysis), a two-level framework that jointly optimizes calibration-data composition and mixed-precision bit allocation. Specifically, TASA searches for a calibration-data mixture using a training-free gradient-trace alignment criterion, and then aggregates perplexity and reasoning-oriented sensitivity signals to guide both inter-layer and intra-layer bit allocation. Experiments on LLaMA-3-8B and Qwen2.5-7B reveal a precision inversion: appropriately allocated 3.5-bit models can match or surpass less task-aware 4-bit baselines. At an average precision of 3.5 bits, TASA matches or outperforms several competitive 4-bit uniform baselines in aggregate accuracy, and improves over the strongest W3 baseline on GSM8K by more than 20 absolute points on LLaMA-3-8B. These results show that calibration-data composition substantially affects task-sensitive quantization, a factor underexplored in prior work.", "arxiv_id": "2607.00908", "arxiv_url": "https://arxiv.org/abs/2607.00908", "authors": ["Fei Wang", "Chao Xue", "Taoran Liu", "Li Shen", "Ye Liu", "ChangXing Ding"], "brief": "\u8bba\u6587\u53d1\u73b0\u4e86LLM\u91cf\u5316\u4e2d\u7684\"\u56f0\u60d1\u5ea6\u5e7b\u89c9\"\uff08perplexity\u654f\u611f\u5ea6\u4e0e\u63a8\u7406\u4efb\u52a1\u91cd\u8981\u6027\u51e0\u4e4e\u65e0\u76f8\u5173\u6027\uff09\u548c\"\u5bf9\u9f50-\u591a\u6837\u6027\u6743\u8861\"\u73b0\u8c61\uff0c\u5e76\u63d0\u51faTASA\u6846\u67b6\uff0c\u8054\u5408\u4f18\u5316\u6821\u51c6\u6570\u636e\u7ec4\u5408\u4e0e\u6df7\u5408\u7cbe\u5ea6\u6bd4\u7279\u5206\u914d\uff0c\u4f7f3.5-bit\u6a21\u578b\u53ef\u5ab2\u7f8e\u751a\u81f3\u8d85\u8d8a4-bit\u57fa\u7ebf\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00908", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\u56f0\u60d1\u5ea6\u5e7b\u89c9\uff1a\u57fa\u4e8eperplexity\u7684\u5c42\u91cd\u8981\u6027\u6392\u540d\u4e0e\u590d\u6742\u63a8\u7406\u4efb\u52a1\u7684\u5c42\u91cd\u8981\u6027\u6392\u540d\u51e0\u4e4e\u65e0\u76f8\u5173\uff08Kendall \u03c4\u22480\uff09", "\u63ed\u793a\u5bf9\u9f50-\u591a\u6837\u6027\u6743\u8861\uff1a\u4ec5\u7528\u76ee\u6807\u4efb\u52a1\u6821\u51c6\u6570\u636e\u4f1a\u964d\u4f4e\u91cf\u5316\u540e\u6027\u80fd\uff0c\u6df7\u5165\u901a\u7528\u9886\u57df\u6570\u636e\u53ef\u7a33\u5b9a\u654f\u611f\u5ea6\u4f30\u8ba1", "TASA\u5728LLaMA-3-8B\u4e0a3.5-bit\u7cbe\u5ea6\u4e0bGSM8K\u6bd4\u6700\u5f3aW3\u57fa\u7ebf\u63d0\u5347\u8d8520\u4e2a\u7edd\u5bf9\u767e\u5206\u70b9"], "keywords": ["\u6a21\u578b\u91cf\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6df7\u5408\u7cbe\u5ea6", "\u6821\u51c6\u6570\u636e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00908v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Beyond Activation Alignment:The Alignment-Diversity Tradeoff in Task-Aware LLM Quantization", "tldr": "\u63d0\u51faTASA\u6846\u67b6\uff0c\u901a\u8fc7\u6821\u51c6\u6570\u636e\u6df7\u5408\u4e0e\u6df7\u5408\u7cbe\u5ea6\u5206\u914d\u89e3\u51b3LLM\u91cf\u5316\u4e2d\u7684\u5bf9\u9f50-\u591a\u6837\u6027\u6743\u8861\u95ee\u9898", "upvotes": 0, "what_it_is": "\u8bba\u6587\u53d1\u73b0\u4e86LLM\u91cf\u5316\u4e2d\u7684\"\u56f0\u60d1\u5ea6\u5e7b\u89c9\"\uff08perplexity\u654f\u611f\u5ea6\u4e0e\u63a8\u7406\u4efb\u52a1\u91cd\u8981\u6027\u51e0\u4e4e\u65e0\u76f8\u5173\u6027\uff09\u548c\"\u5bf9\u9f50-\u591a\u6837\u6027\u6743\u8861\"\u73b0\u8c61\uff0c\u5e76\u63d0\u51faTASA\u6846\u67b6\uff0c\u8054\u5408\u4f18\u5316\u6821\u51c6\u6570\u636e\u7ec4\u5408\u4e0e\u6df7\u5408\u7cbe\u5ea6\u6bd4\u7279\u5206\u914d\uff0c\u4f7f3.5-bit\u6a21\u578b\u53ef\u5ab2\u7f8e\u751a\u81f3\u8d85\u8d8a4-bit\u57fa\u7ebf\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u6821\u51c6\u6570\u636e\u7ec4\u6210\u5bf9\u4efb\u52a1\u654f\u611f\u91cf\u5316\u7684\u5173\u952e\u5f71\u54cd\uff0c\u6253\u7834\u4e86perplexity\u4f5c\u4e3a\u91cf\u5316\u654f\u611f\u5ea6\u4ee3\u7406\u6307\u6807\u7684\u60ef\u7528\u5047\u8bbe\uff0c\u4e3a\u4f4e\u6bd4\u7279LLM\u90e8\u7f72\u63d0\u4f9b\u4e86\u65b0\u7684\u5b9e\u7528\u6846\u67b6"}, {"abstract": "Vision-Language-Action (VLA) models often fail to perform the same learned tasks under environmental shifts, such as changes in camera pose and shifts to a different but similar robot (e.g., from Panda to UR5e). Adapting these models to the shifted environment (i.e., target domain) often requires training on multiple demonstrations for each task, which are costly to collect. To reduce the burden of data curation and training, we propose an analogy-based method that adapts VLA models under environmental shifts through weight vector arithmetic with domain-specific information addition, named Domain ARiThmetic (DART). Unlike prior approaches, DART requires collecting only a single demonstration, enabling efficient adaptation. To accurately isolate domain-specific information for addition, DART performs subspace alignment between singular components in weight vectors to filter out noisy components. In both simulated and real-world experiments, DART outperforms existing VLA adaptation methods in one-shot scenarios across diverse visual and embodiment shifts. Code is available at https://github.com/snumprlab/dart.", "arxiv_id": "2607.00666", "arxiv_url": "https://arxiv.org/abs/2607.00666", "authors": ["Taewook Kang", "Taeheon Kim", "Donghyun Shin", "Jonghyun Choi"], "brief": "\u63d0\u51faDART\u65b9\u6cd5\uff0c\u901a\u8fc7\u57df\u7279\u5b9a\u4fe1\u606f\u7684\u6743\u91cd\u5411\u91cf\u52a0\u6cd5\u8fd0\u7b97\uff0c\u4f7fVLA\u6a21\u578b\u4ec5\u9700\u5355\u4e2a\u6f14\u793a\u6837\u672c\u5373\u53ef\u9002\u5e94\u6444\u50cf\u5934\u89c6\u89d2\u53d8\u5316\u6216\u673a\u5668\u4eba\u672c\u4f53\u5207\u6362\u7b49\u73af\u5883\u504f\u79fb\u573a\u666f\u3002", "categories": ["cs.RO", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00666", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4ec5\u9700\u6536\u96c61\u4e2a\u6f14\u793a\u6837\u672c\uff08one-shot\uff09\u5373\u53ef\u5b8c\u6210\u57df\u9002\u5e94\uff0c\u5927\u5e45\u964d\u4f4e\u6570\u636e\u91c7\u96c6\u6210\u672c", "\u901a\u8fc7\u5947\u5f02\u503c\u5206\u89e3\u5bf9\u6743\u91cd\u5411\u91cf\u8fdb\u884c\u5b50\u7a7a\u95f4\u5bf9\u9f50\uff0c\u8fc7\u6ee4\u566a\u58f0\u5206\u91cf\u4ee5\u7cbe\u51c6\u63d0\u53d6\u57df\u7279\u5b9a\u4fe1\u606f", "\u5728\u4eff\u771f\u548c\u771f\u5b9e\u73af\u5883\u4e2d\u5747\u4f18\u4e8e\u73b0\u6709VLA\u9002\u5e94\u65b9\u6cd5\uff0c\u652f\u6301\u89c6\u89c9\u53d8\u5316\u548c\u673a\u5668\u4eba\u672c\u4f53\u5207\u6362\u7b49\u591a\u79cd\u504f\u79fb\u7c7b\u578b"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u57df\u9002\u5e94", "\u673a\u5668\u4eba\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00666v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Domain Arithmetic: One-Shot VLA Adaptation under Environmental Shifts", "tldr": "DART\u7528\u6743\u91cd\u5411\u91cf\u7b97\u672f\u5b9e\u73b0VLA\u6a21\u578b\u5728\u73af\u5883\u53d8\u5316\u4e0b\u7684\u5355\u6837\u672c\u9002\u5e94", "upvotes": 0, "what_it_is": "\u63d0\u51faDART\u65b9\u6cd5\uff0c\u901a\u8fc7\u57df\u7279\u5b9a\u4fe1\u606f\u7684\u6743\u91cd\u5411\u91cf\u52a0\u6cd5\u8fd0\u7b97\uff0c\u4f7fVLA\u6a21\u578b\u4ec5\u9700\u5355\u4e2a\u6f14\u793a\u6837\u672c\u5373\u53ef\u9002\u5e94\u6444\u50cf\u5934\u89c6\u89d2\u53d8\u5316\u6216\u673a\u5668\u4eba\u672c\u4f53\u5207\u6362\u7b49\u73af\u5883\u504f\u79fb\u573a\u666f\u3002", "why_notable": "\u89e3\u51b3\u4e86VLA\u6a21\u578b\u5b9e\u9645\u90e8\u7f72\u4e2d\u7684\u5173\u952e\u75db\u70b9\u2014\u2014\u73af\u5883\u53d8\u5316\u5bfc\u81f4\u7684\u6027\u80fd\u4e0b\u964d\uff0c\u4e14\u5c06\u6240\u9700\u6f14\u793a\u6570\u91cf\u538b\u7f29\u81f31\u4e2a\uff0c\u6781\u5927\u964d\u4f4e\u4e86\u673a\u5668\u4eba\u6280\u80fd\u8fc1\u79fb\u7684\u95e8\u69db\uff0c\u5177\u6709\u5f88\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Transformer-based large models have demonstrated remarkable generalization abilities across different tasks by leveraging a context-aware attention module for in-context learning. With richer context, transformers adapt more effectively to the current use case without any parameter updates. However, the quadratic computational and memory complexity with respect to context length significantly slows data processing in softmax transformers. Linear transformers were proposed to address this issue by reducing the complexity to linear dependence on context length, but the design and understanding of the feature mapping in linear attention, from a theoretical viewpoint, remain unclear. In this paper, we investigate the approximation and generalization abilities of linear transformers under a two-staged sampling process from domain generalization. We show that linear transformers perform in-context learning as learning a mapping from context distributions to response functions. A dimension-independent convergence rate is obtained for our generalization analysis, which also exhibits the tradeoff between the regularities of data distributions and latent features. Guided by our theoretical framework, we propose a new perspective on activation and loss design for linearizing pretrained softmax large language models.", "arxiv_id": "2607.00479", "arxiv_url": "https://arxiv.org/abs/2607.00479", "authors": ["Peilin Liu", "Ding-Xuan Zhou"], "brief": "\u672c\u6587\u4ece\u9886\u57df\u6cdb\u5316\u7684\u4e24\u9636\u6bb5\u91c7\u6837\u8fc7\u7a0b\u51fa\u53d1\uff0c\u7406\u8bba\u5206\u6790\u7ebf\u6027Transformer\u7684\u8fd1\u4f3c\u4e0e\u6cdb\u5316\u80fd\u529b\uff0c\u8bc1\u660e\u5176\u4e0a\u4e0b\u6587\u5b66\u4e60\u672c\u8d28\u662f\u4ece\u4e0a\u4e0b\u6587\u5206\u5e03\u5230\u54cd\u5e94\u51fd\u6570\u7684\u6620\u5c04\u5b66\u4e60\uff0c\u5e76\u57fa\u4e8e\u7406\u8bba\u6846\u67b6\u63d0\u51fa\u7ebf\u6027\u5316\u9884\u8bad\u7ec3\u5927\u8bed\u8a00\u6a21\u578b\u7684\u65b0\u65b9\u6cd5\u3002", "categories": ["cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00479", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bc1\u660e\u7ebf\u6027Transformer\u6267\u884c\u4e0a\u4e0b\u6587\u5b66\u4e60\u7b49\u4ef7\u4e8e\u5b66\u4e60\u4ece\u4e0a\u4e0b\u6587\u5206\u5e03\u5230\u54cd\u5e94\u51fd\u6570\u7684\u6620\u5c04", "\u83b7\u5f97\u4e0e\u7ef4\u5ea6\u65e0\u5173\u7684\u6cdb\u5316\u6536\u655b\u7387\uff0c\u63ed\u793a\u6570\u636e\u5206\u5e03\u89c4\u5f8b\u6027\u4e0e\u6f5c\u5728\u7279\u5f81\u4e4b\u95f4\u7684\u6743\u8861\u5173\u7cfb", "\u57fa\u4e8e\u7406\u8bba\u6846\u67b6\u63d0\u51fa\u7ebf\u6027\u5316\u9884\u8bad\u7ec3softmax\u5927\u8bed\u8a00\u6a21\u578b\u7684\u6fc0\u6d3b\u51fd\u6570\u4e0e\u635f\u5931\u51fd\u6570\u8bbe\u8ba1\u65b0\u89c6\u89d2"], "keywords": ["\u7ebf\u6027Transformer", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u6cdb\u5316\u7406\u8bba", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00479v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Ghost in the Kernel: In-Context Learning with Efficient Transformers via Domain Generalization", "tldr": "\u4ece\u9886\u57df\u6cdb\u5316\u89c6\u89d2\u7406\u8bba\u5206\u6790\u7ebf\u6027Transformer\u7684\u4e0a\u4e0b\u6587\u5b66\u4e60\u80fd\u529b\uff0c\u5e76\u6307\u5bfc\u6fc0\u6d3b\u51fd\u6570\u4e0e\u635f\u5931\u8bbe\u8ba1", "upvotes": 0, "what_it_is": "\u672c\u6587\u4ece\u9886\u57df\u6cdb\u5316\u7684\u4e24\u9636\u6bb5\u91c7\u6837\u8fc7\u7a0b\u51fa\u53d1\uff0c\u7406\u8bba\u5206\u6790\u7ebf\u6027Transformer\u7684\u8fd1\u4f3c\u4e0e\u6cdb\u5316\u80fd\u529b\uff0c\u8bc1\u660e\u5176\u4e0a\u4e0b\u6587\u5b66\u4e60\u672c\u8d28\u662f\u4ece\u4e0a\u4e0b\u6587\u5206\u5e03\u5230\u54cd\u5e94\u51fd\u6570\u7684\u6620\u5c04\u5b66\u4e60\uff0c\u5e76\u57fa\u4e8e\u7406\u8bba\u6846\u67b6\u63d0\u51fa\u7ebf\u6027\u5316\u9884\u8bad\u7ec3\u5927\u8bed\u8a00\u6a21\u578b\u7684\u65b0\u65b9\u6cd5\u3002", "why_notable": "\u7ebf\u6027Transformer\u5c06\u6ce8\u610f\u529b\u590d\u6742\u5ea6\u4ece\u4e8c\u6b21\u964d\u81f3\u7ebf\u6027\uff0c\u4f46\u5176\u7406\u8bba\u7406\u89e3\u957f\u671f\u4e0d\u8db3\uff1b\u672c\u6587\u9996\u6b21\u4ece\u9886\u57df\u6cdb\u5316\u89d2\u5ea6\u7ed9\u51fa\u7ef4\u5ea6\u65e0\u5173\u7684\u6cdb\u5316\u754c\uff0c\u5e76\u5c06\u7406\u8bba\u76f4\u63a5\u8f6c\u5316\u4e3a\u5b9e\u8df5\u6307\u5bfc\uff0c\u5bf9\u9ad8\u6548LLM\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Safety alignment of text-to-image (T2I) diffusion models aims to suppress harmful generations while preserving utility on benign prompts. Recent methods often appear to deliver high safety with high utility, but this conclusion rests largely on coarse global utility metrics (e.g., FID, CLIPScore) that are insensitive to fine-grained semantic correctness, creating an illusion of high utility. We show that when utility is measured with structured evaluation, this illusion breaks: on TIFA (Text-to-Image Faithfulness evaluation with Question Answering), safety-aligned models suffer substantial drops in semantic fidelity, including failures in object counts, attributes, and relationships. To diagnose the source of this gap, we analyze the text-encoder prompt embedding space and uncover semantic collapse, a contraction of embedding spread coupled with distortion of inter-prompt similarity structure, which strongly correlates with structured utility loss. Guided by this insight, we propo
