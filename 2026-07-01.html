se StructureAware Geometric Regularization (SAGE), a safety alignment objective that explicitly preserves embedding spread and inter-prompt relational structure during adaptation. Our method restores structured utility (TIFA +5.0% over prior state-of-the-art) while maintaining strong safety performance and competitive coarse-grained utility scores. Our source code and trained models are available at https://adeelyousaf.github.io/SAGE_ECCV26_Project_Page/.", "arxiv_id": "2607.00402", "arxiv_url": "https://arxiv.org/abs/2607.00402", "authors": ["Adeel Yousaf", "Soumik Ghosh", "James Beetham", "Amrit Singh Bedi", "Mubarak Shah"], "brief": "\u672c\u6587\u53d1\u73b0\u73b0\u6709\u6587\u672c\u751f\u6210\u56fe\u50cf\u6a21\u578b\u7684\u5b89\u5168\u5bf9\u9f50\u65b9\u6cd5\u5728\u7c97\u7c92\u5ea6\u6307\u6807\u4e0a\u8868\u73b0\u826f\u597d\uff0c\u4f46\u5728\u7ec6\u7c92\u5ea6\u8bed\u4e49\u8bc4\u4f30\uff08TIFA\uff09\u4e0b\u5b58\u5728\u4e25\u91cd\u6548\u7528\u635f\u5931\uff1b\u901a\u8fc7\u5206\u6790\u6587\u672c\u7f16\u7801\u5668\u5d4c\u5165\u7a7a\u95f4\uff0c\u63ed\u793a\u4e86\"\u8bed\u4e49\u5d29\u584c\"\u73b0\u8c61\uff0c\u5e76\u63d0\u51faSAGE\u6b63\u5219\u5316\u65b9\u6cd5\u52a0\u4ee5\u4fee\u590d\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00402", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u73b0\u6709\u5b89\u5168\u5bf9\u9f50\u65b9\u6cd5\u5728FID\u3001CLIPScore\u7b49\u7c97\u7c92\u5ea6\u6307\u6807\u4e0a\u8868\u73b0\u826f\u597d\uff0c\u4f46\u5728TIFA\u7ec6\u7c92\u5ea6\u8bc4\u4f30\uff08\u7269\u4f53\u6570\u91cf\u3001\u5c5e\u6027\u3001\u5173\u7cfb\uff09\u4e0a\u51fa\u73b0\u663e\u8457\u8bed\u4e49\u4fdd\u771f\u5ea6\u4e0b\u964d", "\u53d1\u73b0\u6587\u672c\u7f16\u7801\u5668\u5d4c\u5165\u7a7a\u95f4\u5b58\u5728\"\u8bed\u4e49\u5d29\u584c\"\uff1a\u5d4c\u5165\u5206\u5e03\u6536\u7f29\u4e14\u63d0\u793a\u95f4\u76f8\u4f3c\u5ea6\u7ed3\u6784\u5931\u771f\uff0c\u4e0e\u7ed3\u6784\u5316\u6548\u7528\u635f\u5931\u5f3a\u76f8\u5173", "\u63d0\u51faSAGE\uff08\u7ed3\u6784\u611f\u77e5\u51e0\u4f55\u6b63\u5219\u5316\uff09\u65b9\u6cd5\uff0c\u663e\u5f0f\u4fdd\u7559\u5d4c\u5165\u5206\u5e03\u6269\u5c55\u6027\u548c\u63d0\u793a\u95f4\u5173\u7cfb\u7ed3\u6784\uff0cTIFA\u6307\u6807\u8f83SOTA\u63d0\u5347+5.0%"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5b89\u5168\u5bf9\u9f50", "\u6587\u672c\u751f\u6210\u56fe\u50cf", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00402v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Illusion of High Utility in Safety Alignment of Text-to-Image Diffusion Models", "tldr": "\u63ed\u793aT2I\u6269\u6563\u6a21\u578b\u5b89\u5168\u5bf9\u9f50\u4e2d\u7684\"\u9ad8\u6548\u7528\u5e7b\u89c9\"\uff0c\u5e76\u63d0\u51faSAGE\u65b9\u6cd5\u4fee\u590d\u8bed\u4e49\u5d29\u584c\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u53d1\u73b0\u73b0\u6709\u6587\u672c\u751f\u6210\u56fe\u50cf\u6a21\u578b\u7684\u5b89\u5168\u5bf9\u9f50\u65b9\u6cd5\u5728\u7c97\u7c92\u5ea6\u6307\u6807\u4e0a\u8868\u73b0\u826f\u597d\uff0c\u4f46\u5728\u7ec6\u7c92\u5ea6\u8bed\u4e49\u8bc4\u4f30\uff08TIFA\uff09\u4e0b\u5b58\u5728\u4e25\u91cd\u6548\u7528\u635f\u5931\uff1b\u901a\u8fc7\u5206\u6790\u6587\u672c\u7f16\u7801\u5668\u5d4c\u5165\u7a7a\u95f4\uff0c\u63ed\u793a\u4e86\"\u8bed\u4e49\u5d29\u584c\"\u73b0\u8c61\uff0c\u5e76\u63d0\u51faSAGE\u6b63\u5219\u5316\u65b9\u6cd5\u52a0\u4ee5\u4fee\u590d\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u5b89\u5168\u5bf9\u9f50\u8bc4\u4f30\u4e2d\u7684\"\u9ad8\u6548\u7528\u5e7b\u89c9\"\u95ee\u9898\uff0c\u4e3a\u9886\u57df\u63d0\u4f9b\u66f4\u4e25\u683c\u7684\u8bc4\u4f30\u89c6\u89d2\uff0c\u5e76\u7ed9\u51fa\u53ef\u843d\u5730\u7684\u4fee\u590d\u65b9\u6848\uff0c\u5bf9T2I\u6a21\u578b\u5b89\u5168\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u610f\u4e49"}, {"abstract": "Open-response evaluation provides stronger clinical validity than multiple-choice benchmarks but creates a scoring bottleneck that motivates automated LLM-asa-Judge approaches. Whether such evaluators replicate clinical calibration and caution, however, remains untested. We introduce MedQADE, the first standardised open-response clinical benchmark for German, a major clinical language lacking native evaluation infrastructure, comprising 3,800 items annotated by ten practising physicians and nine Large Language Model (LLM) evaluators. The top-performing evaluator model, Gemini 3 Flash, reached alignment consistent with the physician ceiling (\\k{appa} = 0.694 vs. \\k{appa} = 0.709), though wide confidence intervals limit interpretation. Despite this statistical alignment, automated evaluators exhibited near-absent clinical metacognition: physicians scaled abstention with item difficulty, while frontier models assigned definitive scores in every case. We additionally quantified systematic lineage-dependent biases, where models preferentially scored architectural siblings, an effect independent of language. These results show that statistical alignment does not ensure clinical caution, and that evaluator independence requires explicit verification.", "arxiv_id": "2607.01103", "arxiv_url": "https://arxiv.org/abs/2607.01103", "authors": ["William Philipp", "Finn Fassbender", "Thorsten Langer", "Martje Pauly", "Rebecca Herzog", "Alexander Baumann", "Markus Hobert", "Theresa Paulus", "Ip Chi Wang", "Lukas Goede", "Johanna Reimer", "Sebastian L\u00f6ns", "Ronald B\u00f6ck", "Sebastian Fudickar"], "brief": "\u672c\u6587\u6784\u5efa\u4e86\u9996\u4e2a\u5fb7\u8bed\u6807\u51c6\u5316\u5f00\u653e\u5f0f\u4e34\u5e8a\u57fa\u51c6MedQADE\uff083800\u9053\u9898\uff09\uff0c\u753110\u540d\u6267\u4e1a\u533b\u5e08\u548c9\u4e2aLLM\u8bc4\u4f30\u8005\u6807\u6ce8\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM-as-a-Judge\u65b9\u6cd5\u5728\u533b\u7597AI\u8bc4\u6d4b\u4e2d\u7684\u53ef\u9760\u6027\u4e0e\u5c40\u9650\u6027\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01103", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6700\u4f18LLM\u8bc4\u4f30\u5668Gemini 3 Flash\u7684\u8bc4\u5206\u4e00\u81f4\u6027\uff08\u03ba=0.694\uff09\u63a5\u8fd1\u533b\u5e08\u95f4\u4e0a\u9650\uff08\u03ba=0.709\uff09\uff0c\u4f46\u7f6e\u4fe1\u533a\u95f4\u8f83\u5bbd", "\u533b\u5e08\u4f1a\u6839\u636e\u9898\u76ee\u96be\u5ea6\u8c03\u6574\u5f03\u6743\u7387\uff0c\u800c\u524d\u6cbfLLM\u5728\u6240\u6709\u60c5\u51b5\u4e0b\u5747\u7ed9\u51fa\u786e\u5b9a\u6027\u8bc4\u5206\uff0c\u51e0\u4e4e\u4e0d\u5b58\u5728\u4e34\u5e8a\u5143\u8ba4\u77e5", "\u53d1\u73b0\u7cfb\u7edf\u6027\u0027\u8840\u7f18\u504f\u5dee\u0027\uff1a\u6a21\u578b\u503e\u5411\u4e8e\u7ed9\u67b6\u6784\u76f8\u8fd1\u7684\u540c\u65cf\u6a21\u578b\u6253\u66f4\u9ad8\u5206\uff0c\u4e14\u8be5\u504f\u5dee\u4e0e\u8bed\u8a00\u65e0\u5173"], "keywords": ["\u533b\u7597AI", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8bc4\u4f30\u57fa\u51c6", "\u591a\u8bed\u8a00"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01103v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Clinician-Level Agreement Without Clinical Caution: LLM Evaluator Limits in Medical AI Benchmarking", "tldr": "LLM\u8bc4\u4f30\u8005\u53ef\u8fbe\u4e34\u5e8a\u533b\u751f\u7ea7\u522b\u4e00\u81f4\u6027\uff0c\u4f46\u7f3a\u4e4f\u4e34\u5e8a\u8c28\u614e\u6027\u4e0e\u5143\u8ba4\u77e5\u80fd\u529b", "upvotes": 0, "what_it_is": "\u672c\u6587\u6784\u5efa\u4e86\u9996\u4e2a\u5fb7\u8bed\u6807\u51c6\u5316\u5f00\u653e\u5f0f\u4e34\u5e8a\u57fa\u51c6MedQADE\uff083800\u9053\u9898\uff09\uff0c\u753110\u540d\u6267\u4e1a\u533b\u5e08\u548c9\u4e2aLLM\u8bc4\u4f30\u8005\u6807\u6ce8\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM-as-a-Judge\u65b9\u6cd5\u5728\u533b\u7597AI\u8bc4\u6d4b\u4e2d\u7684\u53ef\u9760\u6027\u4e0e\u5c40\u9650\u6027\u3002", "why_notable": "\u63ed\u793a\u4e86\u7edf\u8ba1\u5bf9\u9f50\u4e0d\u7b49\u4e8e\u4e34\u5e8a\u8c28\u614e\u6027\u8fd9\u4e00\u5173\u952e\u76f2\u70b9\uff0c\u5bf9\u533b\u7597AI\u8bc4\u6d4b\u7684\u53ef\u4fe1\u5ea6\u63d0\u51fa\u8b66\u793a\uff0c\u5f3a\u8c03\u8bc4\u4f30\u8005\u72ec\u7acb\u6027\u9700\u663e\u5f0f\u9a8c\u8bc1"}, {"abstract": "Hallucination detection for retrieval-augmented generation (RAG) is usually evaluated on natural-language document evidence. However, grounded generation systems increasingly rely on structured inputs: source code, developer-tool output, markdown documents, tables, and repository metadata. We introduce a unified benchmark for span-level hallucination detection over code, tool output, structured documents, and existing natural-language RAG datasets. The benchmark is built by starting from grounded correct answers, injecting localized hallucinations with exact character labels, and validating the code test split with evidence-based review. Our fine-tuned Qwen3.5-2B detector reaches 0.689 span-F1 on the unified test set and 0.60 on the code-agent source, where it substantially outperforms LettuceDetect-large (0.17) and the strongest zero-shot LLM judges we evaluated (at most 0.22). The same model remains competitive on established natural-language benchmarks, with 81.8 RAGTruth example-F1 and 0.724 English PsiloQA IoU.", "arxiv_id": "2607.00895", "arxiv_url": "https://arxiv.org/abs/2607.00895", "authors": ["\u00c1d\u00e1m Kov\u00e1cs", "Bowei He", "Xue Liu", "Istv\u00e1n Boros", "Szilveszter T\u00f3th", "G\u00e1bor Recski"], "brief": "\u6784\u5efa\u4e86\u4e00\u4e2a\u7edf\u4e00\u7684span\u7ea7\u5e7b\u89c9\u68c0\u6d4b\u57fa\u51c6\uff0c\u8986\u76d6\u6e90\u4ee3\u7801\u3001\u5f00\u53d1\u5de5\u5177\u8f93\u51fa\u3001\u7ed3\u6784\u5316\u6587\u6863\u53ca\u81ea\u7136\u8bed\u8a00RAG\u6570\u636e\u96c6\uff0c\u5e76\u901a\u8fc7\u6ce8\u5165\u5c40\u90e8\u5e7b\u89c9+\u5b57\u7b26\u7ea7\u6807\u6ce8\u7684\u65b9\u5f0f\u8bad\u7ec3\u5fae\u8c03\u68c0\u6d4b\u5668\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00895", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u57fa\u51c6\u6db5\u76d6\u4ee3\u7801\u3001\u5de5\u5177\u8f93\u51fa\u3001Markdown\u6587\u6863\u3001\u8868\u683c\u3001\u4ed3\u5e93\u5143\u6570\u636e\u7b49\u7ed3\u6784\u5316\u8f93\u5165\uff0c\u586b\u8865\u73b0\u6709RAG\u5e7b\u89c9\u68c0\u6d4b\u4ec5\u9488\u5bf9\u81ea\u7136\u8bed\u8a00\u7684\u7a7a\u767d", "\u5fae\u8c03Qwen3.5-2B\u68c0\u6d4b\u5668\u5728\u7edf\u4e00\u6d4b\u8bd5\u96c6\u8fbe\u52300.689 span-F1\uff0c\u5728\u4ee3\u7801\u667a\u80fd\u4f53\u6765\u6e90\u4e0a\u8fbe0.60\uff0c\u8fdc\u8d85LettuceDetect-large\uff080.17\uff09\u548c\u6700\u5f3a\u96f6\u6837\u672cLLM\u8bc4\u5224\uff08\u6700\u9ad80.22\uff09", "\u540c\u4e00\u6a21\u578b\u5728\u5df2\u6709\u81ea\u7136\u8bed\u8a00\u57fa\u51c6\u4e0a\u4fdd\u6301\u7ade\u4e89\u529b\uff1aRAGTruth example-F1\u4e3a81.8\uff0c\u82f1\u6587PsiloQA IoU\u4e3a0.724"], "keywords": ["\u5e7b\u89c9\u68c0\u6d4b", "RAG", "\u4ee3\u7801\u751f\u6210", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00895v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Beyond Document Grounding: Span-Level Hallucination Detection over Code, Tool Output, and Documents", "tldr": "\u63d0\u51fa\u8de8\u4ee3\u7801\u3001\u5de5\u5177\u8f93\u51fa\u548c\u6587\u6863\u7684\u5e7b\u89c9\u68c0\u6d4b\u7edf\u4e00\u57fa\u51c6\uff0c\u5fae\u8c032B\u6a21\u578b\u5927\u5e45\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u4e00\u4e2a\u7edf\u4e00\u7684span\u7ea7\u5e7b\u89c9\u68c0\u6d4b\u57fa\u51c6\uff0c\u8986\u76d6\u6e90\u4ee3\u7801\u3001\u5f00\u53d1\u5de5\u5177\u8f93\u51fa\u3001\u7ed3\u6784\u5316\u6587\u6863\u53ca\u81ea\u7136\u8bed\u8a00RAG\u6570\u636e\u96c6\uff0c\u5e76\u901a\u8fc7\u6ce8\u5165\u5c40\u90e8\u5e7b\u89c9+\u5b57\u7b26\u7ea7\u6807\u6ce8\u7684\u65b9\u5f0f\u8bad\u7ec3\u5fae\u8c03\u68c0\u6d4b\u5668\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u5e7b\u89c9\u68c0\u6d4b\u6269\u5c55\u5230\u4ee3\u7801\u548c\u7ed3\u6784\u5316\u5de5\u5177\u8f93\u51fa\u573a\u666f\uff0c\u5bf9\u4ee3\u7801\u667a\u80fd\u4f53\u7b49\u5b9e\u9645\u5e94\u7528\u5177\u6709\u91cd\u8981\u4ef7\u503c\uff0c\u4e14\u5c0f\u6a21\u578b\uff082B\uff09\u663e\u8457\u4f18\u4e8e\u5927\u578b\u96f6\u6837\u672cLLM\uff0c\u517c\u987e\u5b9e\u7528\u6027\u4e0e\u6027\u80fd\u3002"}, {"abstract": "Continuous diffusion language models such as ELF report record-low generative perplexity (Gen-PPL). We find a catch: these models repeat far more than human text, and Gen-PPL rewards rather than penalizes that repetition, so its low scores overstate quality. Strip the repetition and ELF-B\u0027s Gen-PPL rises from $19.5$ to $27.7$; the smallest model even posts the best Gen-PPL because it repeats most. We trace the repetition to its source: a contractive attractor along a \\emph{single direction} in the self-conditioning feedback loop, the loop that feeds each step\u0027s clean estimate into the next. Because the failure is one-dimensional, a one-dimensional fix suffices, and we propose one. \\textbf{ACE} (Attractor-Contrast-Escape) subtracts that single, label-free direction from the feedback at each step. Estimated once on the $105$M model, the direction cuts repetition to near the human level while keeping quality competitive, and transfers near-unchanged to the $342$M and $652$M models and across samplers; the same recipe recovers useful directions on other architectures. Since Gen-PPL itself rewards repetition, we instead measure the compute each fix needs to produce human-clean text, where ACE is $1.5$--$5\\times$ cheaper.", "arxiv_id": "2607.00588", "arxiv_url": "https://arxiv.org/abs/2607.00588", "authors": ["Shuai Zhang", "Zijie Chen", "Hongliang He", "Lun Du", "Zhenzhong Lan"], "brief": "\u672c\u6587\u63ed\u793a\u8fde\u7eed\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff08\u5982ELF\uff09\u7684\u4f4e\u751f\u6210\u56f0\u60d1\u5ea6\uff08Gen-PPL\uff09\u662f\u7531\u8fc7\u5ea6\u91cd\u590d\u6587\u672c\u5bfc\u81f4\u7684\u5047\u8c61\uff0c\u5e76\u63d0\u51faACE\uff08Attractor-Contrast-Escape\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u5728\u81ea\u6761\u4ef6\u53cd\u9988\u5faa\u73af\u4e2d\u51cf\u53bb\u5355\u4e00\u5438\u5f15\u5b50\u65b9\u5411\u6765\u6d88\u9664\u91cd\u590d\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00588", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["ELF-B\u53bb\u9664\u91cd\u590d\u540eGen-PPL\u4ece19.5\u5347\u81f327.7\uff0c\u6700\u5c0f\u6a21\u578b\u56e0\u91cd\u590d\u6700\u591a\u53cd\u800c\u5f97\u5206\u6700\u597d\uff0c\u63ed\u793aGen-PPL\u6307\u6807\u7684\u7f3a\u9677", "\u91cd\u590d\u6839\u6e90\u662f\u81ea\u6761\u4ef6\u53cd\u9988\u5faa\u73af\u4e2d\u4e00\u7ef4\u6536\u7f29\u5438\u5f15\u5b50\uff0cACE\u4ec5\u9700\u51cf\u53bb\u8be5\u5355\u4e00\u65e0\u6807\u7b7e\u65b9\u5411\u5373\u53ef\u4fee\u590d", "ACE\u5728105M\u6a21\u578b\u4e0a\u4f30\u8ba1\u7684\u65b9\u5411\u53ef\u8fc1\u79fb\u81f3342M\u548c652M\u6a21\u578b\u53ca\u4e0d\u540c\u91c7\u6837\u5668\uff0c\u751f\u6210\u4eba\u7c7b\u6c34\u5e73\u6587\u672c\u7684\u8ba1\u7b97\u6210\u672c\u964d\u4f4e1.5\u20135\u500d"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u8bed\u8a00\u6a21\u578b", "\u6587\u672c\u751f\u6210", "\u8bc4\u4f30\u6307\u6807"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00588v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Low Perplexity is Repetition: A One-Dimensional Self-Conditioning Attractor in Continuous Diffusion LMs", "tldr": "\u53d1\u73b0\u8fde\u7eed\u6269\u6563\u8bed\u8a00\u6a21\u578b\u4f4e\u56f0\u60d1\u5ea6\u6e90\u4e8e\u91cd\u590d\u751f\u6210\uff0c\u63d0\u51faACE\u65b9\u6cd5\u4e00\u7ef4\u4fee\u590d\u8be5\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u63ed\u793a\u8fde\u7eed\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff08\u5982ELF\uff09\u7684\u4f4e\u751f\u6210\u56f0\u60d1\u5ea6\uff08Gen-PPL\uff09\u662f\u7531\u8fc7\u5ea6\u91cd\u590d\u6587\u672c\u5bfc\u81f4\u7684\u5047\u8c61\uff0c\u5e76\u63d0\u51faACE\uff08Attractor-Contrast-Escape\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u5728\u81ea\u6761\u4ef6\u53cd\u9988\u5faa\u73af\u4e2d\u51cf\u53bb\u5355\u4e00\u5438\u5f15\u5b50\u65b9\u5411\u6765\u6d88\u9664\u91cd\u590d\u3002", "why_notable": "\u6307\u51fa\u4e86\u8fde\u7eed\u6269\u6563\u8bed\u8a00\u6a21\u578b\u9886\u57df\u5e7f\u6cdb\u4f7f\u7528\u7684\u8bc4\u4f30\u6307\u6807Gen-PPL\u5b58\u5728\u7cfb\u7edf\u6027\u7f3a\u9677\uff0c\u5e76\u63d0\u4f9b\u4e86\u8f7b\u91cf\u7ea7\u3001\u53ef\u8fc1\u79fb\u7684\u4fee\u590d\u65b9\u6848\uff0c\u5bf9\u8be5\u9886\u57df\u7684\u8bc4\u4f30\u6807\u51c6\u548c\u6a21\u578b\u8bbe\u8ba1\u5747\u6709\u91cd\u8981\u5f71\u54cd\u3002"}, {"abstract": "Multi-image content has become an increasingly prevalent form of visual communication in social media, giving rise to a new safety issue, multi-image implicit toxicity (MIIT), where each image appears benign in isolation, but harmful semantics emerge when the images are interpreted jointly. MIIT is particularly challenging for existing commercial moderation APIs and models due to the lack of explicit risky cues in each image. This paper aims to study how to identify MIIT. We first provide a formal definition of MIIT and analyze three key challenges for its detection. To alleviate the scarcity of data in this area, we construct MIIT-dataset, an image-only multi-image safety dataset covering seven representative risk categories through an automatic generation pipeline. Finally, we train MiShield with progressively distilled reasoning supervision, enabling it to produce safety judgments accompanied by explicit analyses of the correlated entities that result in the hazards. Experiments show that MiShield-8B models outperform representative moderation services and even larger-scale models, revealing its effectiveness and practical value for this widely used visual format. Warning: This paper contains potentially sensitive content.", "arxiv_id": "2607.00576", "arxiv_url": "https://arxiv.org/abs/2607.00576", "authors": ["Jiaxian Lv", "Shiyao Cui", "Yingkang Wang", "Guoxin Wu", "Qingling Zhang", "Minlie Huang"], "brief": "\u672c\u6587\u63d0\u51fa\u591a\u56fe\u9690\u6027\u6bd2\u6027\uff08MIIT\uff09\u6982\u5ff5\uff0c\u6784\u5efa\u4e86\u8986\u76d67\u7c7b\u98ce\u9669\u7684MIIT\u6570\u636e\u96c6\uff0c\u5e76\u8bad\u7ec3\u4e86MiShield\u6a21\u578b\uff0c\u901a\u8fc7\u6e10\u8fdb\u5f0f\u84b8\u998f\u63a8\u7406\u76d1\u7763\u5b9e\u73b0\u5bf9\u591a\u56fe\u7ec4\u5408\u6709\u5bb3\u5185\u5bb9\u7684\u68c0\u6d4b\u4e0e\u5206\u6790\u3002", "categories": ["cs.CL", "cs.CR", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00576", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5b9a\u4e49MIIT\u65b0\u5b89\u5168\u95ee\u9898\uff1a\u6bcf\u5f20\u56fe\u7247\u5355\u72ec\u770b\u65e0\u5bb3\uff0c\u4f46\u8054\u5408\u89e3\u8bfb\u65f6\u4ea7\u751f\u6709\u5bb3\u8bed\u4e49", "\u6784\u5efaMIIT-dataset\uff1a\u81ea\u52a8\u5316\u751f\u6210\u6d41\u7a0b\u8986\u76d67\u4e2a\u4ee3\u8868\u6027\u98ce\u9669\u7c7b\u522b\u7684\u7eaf\u56fe\u50cf\u591a\u56fe\u5b89\u5168\u6570\u636e\u96c6", "MiShield-8B\u8d85\u8d8a\u4e3b\u6d41\u5546\u4e1a\u5ba1\u6838API\u53ca\u66f4\u5927\u89c4\u6a21\u6a21\u578b\uff0c\u5e76\u80fd\u8f93\u51fa\u5173\u8054\u5b9e\u4f53\u7684\u663e\u5f0f\u5371\u5bb3\u5206\u6790"], "keywords": ["\u5185\u5bb9\u5b89\u5168", "\u591a\u6a21\u6001", "\u6bd2\u6027\u68c0\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00576v1", "published_at": "2026-07-01", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Safe Alone, Unsafe Together: Safeguarding Against Implicit Toxicity When Benign Images Combine", "tldr": "\u591a\u56fe\u7ec4\u5408\u9690\u6027\u6bd2\u6027\u68c0\u6d4b\uff1a\u5355\u56fe\u65e0\u5bb3\u4f46\u8054\u5408\u89e3\u8bfb\u6709\u5bb3\u7684\u65b0\u5b89\u5168\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u591a\u56fe\u9690\u6027\u6bd2\u6027\uff08MIIT\uff09\u6982\u5ff5\uff0c\u6784\u5efa\u4e86\u8986\u76d67\u7c7b\u98ce\u9669\u7684MIIT\u6570\u636e\u96c6\uff0c\u5e76\u8bad\u7ec3\u4e86MiShield\u6a21\u578b\uff0c\u901a\u8fc7\u6e10\u8fdb\u5f0f\u84b8\u998f\u63a8\u7406\u76d1\u7763\u5b9e\u73b0\u5bf9\u591a\u56fe\u7ec4\u5408\u6709\u5bb3\u5185\u5bb9\u7684\u68c0\u6d4b\u4e0e\u5206\u6790\u3002", "why_notable": "\u586b\u8865\u4e86\u591a\u56fe\u7ec4\u5408\u9690\u6027\u6bd2\u6027\u68c0\u6d4b\u7684\u7814\u7a76\u7a7a\u767d\uff0c\u9488\u5bf9\u793e\u4ea4\u5a92\u4f53\u4e2d\u65e5\u76ca\u666e\u904d\u7684\u591a\u56fe\u4f20\u64ad\u5f62\u5f0f\u63d0\u4f9b\u5b9e\u7528\u9632\u62a4\u65b9\u6848\uff0c\u5bf9\u5185\u5bb9\u5b89\u5168\u5ba1\u6838\u5177\u6709\u91cd\u8981\u73b0\u5b9e\u4ef7\u503c\u3002"}, {"abstract": "Quantization has become an invaluable tool to reduce memory requirements and inference speed of modern language models, in particular to make them available for consumer setups and edge devices. While previous work has primarily focused on uniform quantization codebooks, such approaches are prone to suboptimal representations due to low-frequency high-magnitude weights. We introduce Log$_\\text{b}$Quant, a novel logarithmic quantization approach with adjustable bases, to adapt to common parameter distributions. We show that our method exhibits superior performance at 4-bit precision on several performance benchmarks compared to asymmetric linear quantization at tensor-wise granularity, while achieving moderate speedup and high memory savings, making it suitable for private use on consumer-grade GPUs.", "arxiv_id": "2607.01127", "arxiv_url": "https://arxiv.org/abs/2607.01127", "authors": ["Jeremias Bohn", "Tizian Dippold", "Mahdi Koubaa", "Elias R. Wahl", "Georg Groh"], "brief": "\u63d0\u51faLogbQuant\uff0c\u4e00\u79cd\u57fa\u4e8e\u53ef\u8c03\u5e95\u6570\u7684\u5bf9\u6570\u7a7a\u95f4\u91cf\u5316\u65b9\u6cd5\uff0c\u901a\u8fc7\u9002\u914d\u8bed\u8a00\u6a21\u578b\u53c2\u6570\u7684\u5b9e\u9645\u5206\u5e03\uff08\u4f4e\u9891\u9ad8\u5e45\u6743\u91cd\uff09\uff0c\u57284-bit\u7cbe\u5ea6\u4e0b\u5b9e\u73b0\u66f4\u4f18\u7684\u6a21\u578b\u538b\u7f29\u8868\u793a\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01127", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528\u53ef\u8c03\u5e95\u6570\u7684\u5bf9\u6570\u91cf\u5316\u7801\u672c\uff0c\u76f8\u6bd4\u5747\u5300\u91cf\u5316\u66f4\u597d\u5730\u9002\u5e94\u6743\u91cd\u5206\u5e03\u4e2d\u7684\u4f4e\u9891\u9ad8\u5e45\u503c\u95ee\u9898", "\u57284-bit\u7cbe\u5ea6\u4e0b\uff0c\u591a\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u6027\u80fd\u4f18\u4e8e\u5f20\u91cf\u7ea7\u975e\u5bf9\u79f0\u7ebf\u6027\u91cf\u5316", "\u5b9e\u73b0\u9002\u5ea6\u63a8\u7406\u52a0\u901f\u4e0e\u9ad8\u5185\u5b58\u8282\u7701\uff0c\u9002\u5408\u6d88\u8d39\u7ea7GPU\u4e0a\u7684\u79c1\u6709\u90e8\u7f72"], "keywords": ["\u6a21\u578b\u91cf\u5316", "\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u538b\u7f29", "\u8fb9\u7f18\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01127v1", "published_at": "2026-07-01", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "$\\text{Log}_\\text{b}$Quant: Quantizing Language Models in Logarithmic Space", "tldr": "\u63d0\u51fa\u53ef\u8c03\u5e95\u6570\u7684\u5bf9\u6570\u91cf\u5316\u65b9\u6cd5LogbQuant\uff0c\u57284-bit\u7cbe\u5ea6\u4e0b\u4f18\u4e8e\u975e\u5bf9\u79f0\u7ebf\u6027\u91cf\u5316", "upvotes": 0, "what_it_is": "\u63d0\u51faLogbQuant\uff0c\u4e00\u79cd\u57fa\u4e8e\u53ef\u8c03\u5e95\u6570\u7684\u5bf9\u6570\u7a7a\u95f4\u91cf\u5316\u65b9\u6cd5\uff0c\u901a\u8fc7\u9002\u914d\u8bed\u8a00\u6a21\u578b\u53c2\u6570\u7684\u5b9e\u9645\u5206\u5e03\uff08\u4f4e\u9891\u9ad8\u5e45\u6743\u91cd\uff09\uff0c\u57284-bit\u7cbe\u5ea6\u4e0b\u5b9e\u73b0\u66f4\u4f18\u7684\u6a21\u578b\u538b\u7f29\u8868\u793a\u3002", "why_notable": "\u9488\u5bf9\u5927\u6a21\u578b\u91cf\u5316\u4e2d\u5747\u5300\u91cf\u5316\u7684\u56fa\u6709\u7f3a\u9677\u63d0\u51fa\u5bf9\u6570\u7a7a\u95f4\u89e3\u51b3\u65b9\u6848\uff0c\u517c\u987e\u6027\u80fd\u4e0e\u5b9e\u7528\u6027\uff0c\u6709\u52a9\u4e8e\u63a8\u52a8\u5927\u6a21\u578b\u5728\u8fb9\u7f18\u8bbe\u5907\u548c\u6d88\u8d39\u7ea7\u786c\u4ef6\u4e0a\u7684\u666e\u53ca\u3002"}, {"abstract": "Autonomous scientific discovery systems offer the potential to accelerate research by automating the process of hypothesis generation and validation. However, current systems operate within constrained search spaces or require predefined research questions, limiting their capacity for true open-ended inquiry. Furthermore, while they generate hypotheses iteratively, they largely lack the ability to explicitly synthesize their own accumulated findings to uncover complex, interconnected phenomena. We introduce DiscoPER, an autonomous large language model-powered framework that conducts open-ended research by dynamically generating and executing code to explore datasets without pre-specified research objectives. To ensure rigorous scientific validity, every proposed discovery must pass statistical testing. To overcome the limitations of isolated search, our framework introduces a second-order reasoning mechanism that periodically analyzes its own accumulated discoveries. By treating prior discoveries as empirical data, DiscoPER identifies structural patterns, confounds, and epistemic gaps, actively redirecting hypothesis exploration toward uncharted regions of the search space. The search space is further expanded by incorporating tool use, enabling the system to explore hypotheses beyond structured metadata by seamlessly processing and extracting useful information from multimodal sources like images. Evaluated on iNatDisco, a new multimodal ecological knowledge benchmark with pattern-level ground truth obtained from peer-reviewed literature, DiscoPER recovers 8 of 9 known patterns with a 72.7% hypothesis support rate, outperforming both classical causal discovery and LLM-guided baselines. Ablations show that DiscoPER scales with more data, and confirms the benefits of second-order meta-reflection.", "arxiv_id": "2607.01131", "arxiv_url": "https://arxiv.org/abs/2607.01131", "authors": ["Bingchen Zhao", "Sara Beery", "Oisin Mac Aodha"], "brief": "\u63d0\u51faDiscoPER\u6846\u67b6\uff0c\u5229\u7528\u5927\u8bed\u8a00\u6a21\u578b\u81ea\u4e3b\u751f\u6210\u5e76\u6267\u884c\u4ee3\u7801\u63a2\u7d22\u6570\u636e\u96c6\uff0c\u65e0\u9700\u9884\u8bbe\u7814\u7a76\u95ee\u9898\u3002\u901a\u8fc7\u4e8c\u9636\u5143\u53cd\u601d\u673a\u5236\u5468\u671f\u6027\u5206\u6790\u5df2\u6709\u53d1\u73b0\uff0c\u8bc6\u522b\u7ed3\u6784\u6a21\u5f0f\u548c\u8ba4\u77e5\u76f2\u533a\uff0c\u5f15\u5bfc\u5047\u8bbe\u63a2\u7d22\u5411\u672a\u77e5\u533a\u57df\u6269\u5c55\u3002\u5728\u751f\u6001\u77e5\u8bc6\u57fa\u51c6iNatDisco\u4e0a\u6062\u590d\u4e869\u4e2a\u5df2\u77e5\u6a21\u5f0f\u4e2d\u76848\u4e2a\uff0c\u5047\u8bbe\u652f\u6301\u7387\u8fbe72.7%\uff0c\u4f18\u4e8e\u56e0\u679c\u53d1\u73b0\u548cLLM\u57fa\u7ebf\u65b9\u6cd5\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01131", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u81ea\u4e3b\u79d1\u5b66\u53d1\u73b0", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01131v1", "published_at": "2026-07-01", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Autonomous Scientific Discovery via Iterative Meta-Reflection", "tldr": "\u63d0\u51faDiscoPER\u6846\u67b6\uff0c\u5229\u7528\u5927\u8bed\u8a00\u6a21\u578b\u81ea\u4e3b\u751f\u6210\u5e76\u6267\u884c\u4ee3\u7801\u63a2\u7d22\u6570\u636e\u96c6\uff0c\u65e0\u9700\u9884\u8bbe\u7814\u7a76\u95ee\u9898\u3002\u901a\u8fc7\u4e8c\u9636\u5143\u53cd\u601d\u673a\u5236\u5468\u671f\u6027\u5206\u6790\u5df2\u6709\u53d1\u73b0\uff0c\u8bc6\u522b\u7ed3\u6784\u6a21\u5f0f\u548c\u8ba4\u77e5\u76f2\u533a\uff0c\u5f15\u5bfc\u5047\u8bbe\u63a2\u7d22\u5411\u672a\u77e5\u533a\u57df\u6269\u5c55\u3002\u5728\u751f\u6001\u77e5\u8bc6\u57fa\u51c6iNatDisco\u4e0a\u6062\u590d\u4e869\u4e2a\u5df2\u77e5\u6a21\u5f0f\u4e2d\u76848\u4e2a\uff0c\u5047\u8bbe\u652f\u6301\u7387\u8fbe72.7%\uff0c\u4f18\u4e8e\u56e0\u679c\u53d1\u73b0\u548cLLM\u57fa\u7ebf\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Computer-assisted synthesis planning breaks target molecules into accessible precursors using large libraries of reaction rules that assign each transformation a deterministic, interpretable label. But chemistry is long-tailed, making manual encoding intractable, and existing tools rely on fixed rulesets that cannot adapt to new chemistries. Here we present a fully automated pipeline in which a multi-agent framework of large language models (LLMs) classifies reactions and writes the rules themselves across 665,901 US patent reactions, generating each rule under a verification loop that tests it against the corpus. It expands a standard taxonomy from 68 to 14,073 classes without human curation. With a lightweight fingerprint classifier, it classifies 97.7\\% of unseen reactions, matching a leading proprietary classifier while resolving chemistry more finely and extending on demand to chemistry outside its training distribution. The result is a living reactivity database and a general route to turning generative models into reliable, self-expanding symbolic systems.", "arxiv_id": "2607.01061", "arxiv_url": "https://arxiv.org/abs/2607.01061", "authors": ["Daniel Armstrong", "Maarten Dobbelaere", "Valentas Olikauskas", "Helena Avila", "Octavian Susanu", "J\u00e9r\u00f4me Waser", "Philippe Schwaller"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u591a\u667a\u80fd\u4f53LLM\u6d41\u6c34\u7ebf\uff0c\u81ea\u52a8\u5bf966\u4e07\u4f59\u6761\u4e13\u5229\u53cd\u5e94\u8fdb\u884c\u5206\u7c7b\u5e76\u751f\u6210\u53ef\u9a8c\u8bc1\u7684\u53cd\u5e94\u89c4\u5219\uff0c\u5c06\u6807\u51c6\u5206\u7c7b\u4f53\u7cfb\u4ece68\u7c7b\u6269\u5c55\u81f314073\u7c7b\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u3002\u8f7b\u91cf\u7ea7\u5206\u7c7b\u5668\u5728\u672a\u89c1\u53cd\u5e94\u4e0a\u8fbe\u523097.7%\u51c6\u786e\u7387\uff0c\u5ab2\u7f8e\u5546\u4e1a\u5de5\u5177\uff0c\u5e76\u53ef\u6309\u9700\u6269\u5c55\u81f3\u8bad\u7ec3\u5206\u5e03\u4e4b\u5916\u7684\u65b0\u5316\u5b66\u53cd\u5e94\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01061", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5316\u5b66\u53cd\u5e94\u5206\u7c7b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7b26\u53f7\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01061v1", "published_at": "2026-07-01", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agentic generation of verifiable rules for deterministic, self-expanding reaction classification", "tldr": "\u63d0\u51fa\u4e00\u4e2a\u591a\u667a\u80fd\u4f53LLM\u6d41\u6c34\u7ebf\uff0c\u81ea\u52a8\u5bf966\u4e07\u4f59\u6761\u4e13\u5229\u53cd\u5e94\u8fdb\u884c\u5206\u7c7b\u5e76\u751f\u6210\u53ef\u9a8c\u8bc1\u7684\u53cd\u5e94\u89c4\u5219\uff0c\u5c06\u6807\u51c6\u5206\u7c7b\u4f53\u7cfb\u4ece68\u7c7b\u6269\u5c55\u81f314073\u7c7b\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u3002\u8f7b\u91cf\u7ea7\u5206\u7c7b\u5668\u5728\u672a\u89c1\u53cd\u5e94\u4e0a\u8fbe\u523097.7%\u51c6\u786e\u7387\uff0c\u5ab2\u7f8e\u5546\u4e1a\u5de5\u5177\uff0c\u5e76\u53ef\u6309\u9700\u6269\u5c55\u81f3\u8bad\u7ec3\u5206\u5e03\u4e4b\u5916\u7684\u65b0\u5316\u5b66\u53cd\u5e94\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Trustworthy deployment of Agentic Retrieval-Augmented Generation (RAG) systems requires mechanisms for estimating when multi-stage reasoning pipelines may fail. This paper presents an uncertainty-aware Agentic Retrieval-Augmented Generation (RAG) framework in which planner, evaluator and generator stages produce uncertainty signals derived from semantic divergence and generator self-evaluation. These signals are propagated through a Bayesian Network (BN) to estimate system-level uncertainty and provide node-level indicators of potential failure points across the workflow. The approach is evaluated on StrategyQA and HotpotQA using GPT-3.5-Turbo and GPT-4.1-Nano, with Area Under the Receiver Operating Characteristic Curve (AUROC), Area Under the Accuracy-Rejection Curve (AUARC), Expected Calibration Error (ECE), and Brier Score used to assess discrimination, selective prediction and calibration. Results show that Bayesian propagation is more effective on HotpotQA, where uncertainty accumulates across multi-hop reasoning stages, while StrategyQA exposes limitations caused by miscalibration and unreliable upstream signals. The study positions Bayesian uncertainty propagation as a promising but preliminary mechanism for monitoring Agentic RAG systems, with future validation required in industrial domains such as Offshore Wind (OSW) maintenance decision support.", "arxiv_id": "2607.00972", "arxiv_url": "https://arxiv.org/abs/2607.00972", "authors": ["Louis Donaldson", "Connor Walker", "Koorosh Aslansefat", "Yiannis Papadopoulos"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u4e0d\u786e\u5b9a\u6027\u611f\u77e5\u7684\u667a\u80fd\u4f53RAG\u6846\u67b6\uff0c\u901a\u8fc7\u8d1d\u53f6\u65af\u7f51\u7edc\u4f20\u64ad\u5404\u9636\u6bb5\uff08\u89c4\u5212\u3001\u8bc4\u4f30\u3001\u751f\u6210\uff09\u7684\u4e0d\u786e\u5b9a\u6027\u4fe1\u53f7\uff0c\u4ee5\u4f30\u8ba1\u7cfb\u7edf\u7ea7\u5931\u8d25\u98ce\u9669\u3002\u5728\u591a\u8df3\u95ee\u7b54\u6570\u636e\u96c6\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8d1d\u53f6\u65af\u4e0d\u786e\u5b9a\u6027\u4f20\u64ad\u5728HotpotQA\u4e0a\u6548\u679c\u8f83\u597d\uff0c\u4f46\u5728StrategyQA\u4e0a\u53d7\u4e0a\u6e38\u4fe1\u53f7\u6821\u51c6\u4e0d\u51c6\u7684\u5f71\u54cd\u800c\u8868\u73b0\u53d7\u9650\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00972", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u8d1d\u53f6\u65af\u7f51\u7edc", "\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00972v1", "published_at": "2026-07-01", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Bayesian Uncertainty Propagation for Agentic RAG Pipelines: A Proof-of-Concept Study on Multi-Hop Question Answering", "tldr": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u4e0d\u786e\u5b9a\u6027\u611f\u77e5\u7684\u667a\u80fd\u4f53RAG\u6846\u67b6\uff0c\u901a\u8fc7\u8d1d\u53f6\u65af\u7f51\u7edc\u4f20\u64ad\u5404\u9636\u6bb5\uff08\u89c4\u5212\u3001\u8bc4\u4f30\u3001\u751f\u6210\uff09\u7684\u4e0d\u786e\u5b9a\u6027\u4fe1\u53f7\uff0c\u4ee5\u4f30\u8ba1\u7cfb\u7edf\u7ea7\u5931\u8d25\u98ce\u9669\u3002\u5728\u591a\u8df3\u95ee\u7b54\u6570\u636e\u96c6\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8d1d\u53f6\u65af\u4e0d\u786e\u5b9a\u6027\u4f20\u64ad\u5728HotpotQA\u4e0a\u6548\u679c\u8f83\u597d\uff0c\u4f46\u5728StrategyQA\u4e0a\u53d7\u4e0a\u6e38\u4fe1\u53f7\u6821\u51c6\u4e0d\u51c6\u7684\u5f71\u54cd\u800c\u8868\u73b0\u53d7\u9650\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) are increasingly used to generate queries, invoke tools, and construct analytical workflows. Although recent advances have substantially improved workflow generation and execution, the semantic information required to operationalize analytical concepts often lies beyond what is explicitly represented in database schemas and data values. We present a cross-domain formative study of operationalization failures in agent-generated analytical workflows. Across 236 analytical intents spanning finance, human resources, and public safety domains, we identify 153 recurring failures despite successful workflow generation and execution. Our analysis reveals five recurring classes of failures: comparative grounding, process reasoning, quantitative reasoning, role confusion, and policy grounding. These findings suggest a semantic gap between user-level analytical concepts and the information available to workflow-generation systems. More broadly, they raise questions about the admissibility of analytical operations and suggest that future agentic data systems may require richer semantic representations to bridge the gap between analytical intent and executable computation.", "arxiv_id": "2607.00828", "arxiv_url": "https://arxiv.org/abs/2607.00828", "authors": ["Jalal Mahmud", "Eser Kandogan"], "brief": "\u7814\u7a76\u8005\u5bf9LLM\u751f\u6210\u7684\u5206\u6790\u5de5\u4f5c\u6d41\u4e2d\u7684\u8bed\u4e49\u5931\u8d25\u8fdb\u884c\u4e86\u8de8\u9886\u57df\u5f62\u6210\u6027\u7814\u7a76\uff0c\u5728236\u4e2a\u5206\u6790\u610f\u56fe\u4e2d\u8bc6\u522b\u51fa153\u4e2a\u53cd\u590d\u51fa\u73b0\u7684\u5931\u8d25\u6848\u4f8b\u3002\u7814\u7a76\u63ed\u793a\u4e86\u4e94\u7c7b\u8bed\u4e49\u5931\u8d25\u6a21\u5f0f\uff08\u6bd4\u8f83\u57fa\u51c6\u3001\u6d41\u7a0b\u63a8\u7406\u3001\u5b9a\u91cf\u63a8\u7406\u3001\u89d2\u8272\u6df7\u6dc6\u3001\u7b56\u7565\u57fa\u51c6\uff09\uff0c\u6307\u51fa\u7528\u6237\u5206\u6790\u6982\u5ff5\u4e0e\u6570\u636e\u5e93\u6a21\u5f0f\u4e4b\u95f4\u5b58\u5728\u663e\u8457\u8bed\u4e49\u9e3f\u6c9f\uff0c\u672a\u6765\u667a\u80fd\u4f53\u6570\u636e\u7cfb\u7edf\u9700\u8981\u66f4\u4e30\u5bcc\u7684\u8bed\u4e49\u8868\u793a\u6765\u5f25\u5408\u8fd9\u4e00\u5dee\u8ddd\u3002", "categories": ["cs.DB", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00828", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8bed\u4e49\u9e3f\u6c9f", "\u5206\u6790\u5de5\u4f5c\u6d41", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00828v1", "published_at": "2026-07-01", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Exploring the Semantic Gap in Agentic Data Systems: A Formative Study of Operationalization Failures in Analytical Workflows", "tldr": "\u7814\u7a76\u8005\u5bf9LLM\u751f\u6210\u7684\u5206\u6790\u5de5\u4f5c\u6d41\u4e2d\u7684\u8bed\u4e49\u5931\u8d25\u8fdb\u884c\u4e86\u8de8\u9886\u57df\u5f62\u6210\u6027\u7814\u7a76\uff0c\u5728236\u4e2a\u5206\u6790\u610f\u56fe\u4e2d\u8bc6\u522b\u51fa153\u4e2a\u53cd\u590d\u51fa\u73b0\u7684\u5931\u8d25\u6848\u4f8b\u3002\u7814\u7a76\u63ed\u793a\u4e86\u4e94\u7c7b\u8bed\u4e49\u5931\u8d25\u6a21\u5f0f\uff08\u6bd4\u8f83\u57fa\u51c6\u3001\u6d41\u7a0b\u63a8\u7406\u3001\u5b9a\u91cf\u63a8\u7406\u3001\u89d2\u8272\u6df7\u6dc6\u3001\u7b56\u7565\u57fa\u51c6\uff09\uff0c\u6307\u51fa\u7528\u6237\u5206\u6790\u6982\u5ff5\u4e0e\u6570\u636e\u5e93\u6a21\u5f0f\u4e4b\u95f4\u5b58\u5728\u663e\u8457\u8bed\u4e49\u9e3f\u6c9f\uff0c\u672a\u6765\u667a\u80fd\u4f53\u6570\u636e\u7cfb\u7edf\u9700\u8981\u66f4\u4e30\u5bcc\u7684\u8bed\u4e49\u8868\u793a\u6765\u5f25\u5408\u8fd9\u4e00\u5dee\u8ddd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Creativity research has debated whether creativity is domain-specific (e.g., visual, writing, science), and if it is psychometrically separable from general intelligence. Both questions now apply to LLMs, but a unified benchmark of AI creativity remains elusive. We introduce AGC-Bench, an artificial general creativity benchmark built from a systematic review of the AI creativity literature (3,101 papers screened, 497 benchmarks identified), paired with an agentic harness that converts idiosyncratic codebases into HELM-standardized benchmarks. The first release covers 78 datasets spanning brainstorming, problem solving, STEM, narrative, figurative language, and humor. To address bias in LLM-as-judge, we apply Judge Response Theory -- a psychometric calibration of judge leniency/severity; we then fine-tune Qwen3-30B on the bias-corrected ratings of three frontier LLMs to produce AGC-Judge, an open-weight model that robustly scores new creativity benchmarks it was not trained on. Results reveal frontier models at the top of the AGC-Bench leaderboard, with open models close behind. LLMs show different creative strengths, ranking higher on some domains (e.g., writing) than others (e.g., scientific ideation). Extensive experiments yield three main findings. First, applying factor analysis across 83 LLMs, we recover a single creativity factor \u0027c\u0027, analogous to the \u0027g\u0027 factor of general intelligence, that explains 81.5% of variance, related to but separable from general knowledge/reasoning. Second, we show that prompting models to \"be creative\" boosts their performance far more than enabling reasoning, evidence that the benchmark tracks creativity over general ability. Third, on a human-matched subset, we find the top human still leads the top LLM on creativity. We release AGC-Bench with a public leaderboard, AGC-Judge, and human data as open infrastructure for measuring AI creativity at scale.", "arxiv_id": "2607.01152", "arxiv_url": "https://arxiv.org/abs/2607.01152", "authors": ["Roger Beaty", "Vijeta Deshpande", "Clin K. Y. Lai", "Anna Attuch", "Namrata Shivagunde", "Swastik Roy", "Rajkumar Pujari", "Paul V. DiStefano", "Sherin Muckatira", "Claire E. Stevenson", "Mikhail Gronas", "Anna Rumshisky"], "brief": "\u63d0\u51faAGC-Bench\uff0c\u4e00\u4e2a\u8986\u76d678\u4e2a\u6570\u636e\u96c6\u7684AI\u901a\u7528\u521b\u9020\u529b\u7efc\u5408\u57fa\u51c6\uff0c\u901a\u8fc7\u5fc3\u7406\u6d4b\u91cf\u6821\u51c6\u89e3\u51b3LLM\u8bc4\u5224\u504f\u5dee\uff0c\u5e76\u8bad\u7ec3\u5f00\u6e90\u8bc4\u5224\u6a21\u578bAGC-Judge\u3002\u7814\u7a76\u53d1\u73b0LLM\u5b58\u5728\u7c7b\u4f3c\u4eba\u7c7b\u667a\u529b\u0027g\u56e0\u5b50\u0027\u7684\u5355\u4e00\u521b\u9020\u529b\u56e0\u5b50\u0027c\u0027\uff0c\u53ef\u89e3\u91ca81.5%\u7684\u65b9\u5dee\uff0c\u4f46\u9876\u5c16\u4eba\u7c7b\u5728\u521b\u9020\u529b\u4e0a\u4ecd\u9886\u5148\u9876\u5c16LLM\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01152", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u521b\u9020\u529b\u8bc4\u6d4b", "\u57fa\u51c6\u6d4b\u8bd5", "\u5fc3\u7406\u6d4b\u91cf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01152v1", "published_at": "2026-07-01", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AGC-Bench: Measuring Artificial General Creativity", "tldr": "\u63d0\u51faAGC-Bench\uff0c\u4e00\u4e2a\u8986\u76d678\u4e2a\u6570\u636e\u96c6\u7684AI\u901a\u7528\u521b\u9020\u529b\u7efc\u5408\u57fa\u51c6\uff0c\u901a\u8fc7\u5fc3\u7406\u6d4b\u91cf\u6821\u51c6\u89e3\u51b3LLM\u8bc4\u5224\u504f\u5dee\uff0c\u5e76\u8bad\u7ec3\u5f00\u6e90\u8bc4\u5224\u6a21\u578bAGC-Judge\u3002\u7814\u7a76\u53d1\u73b0LLM\u5b58\u5728\u7c7b\u4f3c\u4eba\u7c7b\u667a\u529b\u0027g\u56e0\u5b50\u0027\u7684\u5355\u4e00\u521b\u9020\u529b\u56e0\u5b50\u0027c\u0027\uff0c\u53ef\u89e3\u91ca81.5%\u7684\u65b9\u5dee\uff0c\u4f46\u9876\u5c16\u4eba\u7c7b\u5728\u521b\u9020\u529b\u4e0a\u4ecd\u9886\u5148\u9876\u5c16LLM\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Complexity and interpretability rarely coincide: systems rich enough for complex behaviours to emerge are usually too opaque to question, while transparent ones are too simple for anything complex to emerge. A single large language model (LLM) is a static artefact, hardly exhibiting any of the emergent properties we associate with life. This changes through interaction: populations of LLMs display emergent dynamics absent from isolated models. Furthermore, LLMs can be endowed with persistent memory, tools and shared skills, and the capacity to initiate actions unprompted, i.e., turning LLMs agentic. In this paper, we argue that such collectives of agents can serve as a computational substrate for Artificial Life (ALife) research. Critically, since the agents communicate in natural language, their collective behaviour can be directly interrogated by examining textual traces and asking the agents themselves. We outline the notion of interpretability in language-model research and extend it for collectives of agents. Lastly, we survey recent examples of agentic LLM collectives that already instantiate the idea of agentic substrates, from controlled experiments to deployments in the wild.", "arxiv_id": "2607.01047", "arxiv_url": "https://arxiv.org/abs/2607.01047", "authors": ["Elias Najarro", "Ane Espeseth", "Eleni Nisioti", "Sebastian Risi", "Stefano Nichele"], "brief": "\u672c\u6587\u63d0\u51fa\u5c06\u591a\u667a\u80fd\u4f53LLM\u96c6\u7fa4\u4f5c\u4e3a\u4eba\u5de5\u751f\u547d\u7814\u7a76\u7684\u8ba1\u7b97\u57fa\u5e95\uff0c\u5229\u7528\u81ea\u7136\u8bed\u8a00\u901a\u4fe1\u4f7f\u96c6\u7fa4\u884c\u4e3a\u53ef\u76f4\u63a5\u89e3\u91ca\u3002\u4f5c\u8005\u8bba\u8bc1\u4e86LLM\u96c6\u7fa4\u80fd\u6d8c\u73b0\u51fa\u5355\u4e00\u6a21\u578b\u6240\u4e0d\u5177\u5907\u7684\u590d\u6742\u52a8\u6001\uff0c\u540c\u65f6\u56e0\u6587\u672c\u53ef\u67e5\u9605\u6027\u4fdd\u6301\u9ad8\u5ea6\u53ef\u89e3\u91ca\u6027\uff0c\u5e76\u7efc\u8ff0\u4e86\u76f8\u5173\u5b9e\u4f8b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01047", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027", "\u6d8c\u73b0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01047v1", "published_at": "2026-07-01", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Conversable Complexity: Agentic LLM Collectives as Interpretable Substrates", "tldr": "\u672c\u6587\u63d0\u51fa\u5c06\u591a\u667a\u80fd\u4f53LLM\u96c6\u7fa4\u4f5c\u4e3a\u4eba\u5de5\u751f\u547d\u7814\u7a76\u7684\u8ba1\u7b97\u57fa\u5e95\uff0c\u5229\u7528\u81ea\u7136\u8bed\u8a00\u901a\u4fe1\u4f7f\u96c6\u7fa4\u884c\u4e3a\u53ef\u76f4\u63a5\u89e3\u91ca\u3002\u4f5c\u8005\u8bba\u8bc1\u4e86LLM\u96c6\u7fa4\u80fd\u6d8c\u73b0\u51fa\u5355\u4e00\u6a21\u578b\u6240\u4e0d\u5177\u5907\u7684\u590d\u6742\u52a8\u6001\uff0c\u540c\u65f6\u56e0\u6587\u672c\u53ef\u67e5\u9605\u6027\u4fdd\u6301\u9ad8\u5ea6\u53ef\u89e3\u91ca\u6027\uff0c\u5e76\u7efc\u8ff0\u4e86\u76f8\u5173\u5b9e\u4f8b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Scientific literature search often requires more than retrieving papers from a single query: users\u0027 intents are underspecified, preference-dependent, and evolve through interaction. Existing search agents typically rely on fixed pipelines or implicit language-only reasoning, making their search strategies difficult to control, inspect, and refine. We introduce PaperPilot, a multi-turn literature search agent that frames scientific search as workflow induction. Given an anchor paper and a user query, PaperPilot constructs an executable DAG of paper-search operators, including keyword search, citation expansion, filtering, scoring, reranking, and evidence extraction. User feedback is then used to refine both the query and the workflow itself. We train PaperPilot with supervised workflow imitation and preference optimization over controlled workflow corruptions. Experiments show that PaperPilot-9B improves over the base Qwen3.5-9B toolset agent under multi-turn interaction, increasing Hit@5 from 58.0 to 77.0, MRR from 47.5 to 59.4, and nDCG@10 from 26.8 to 32.5, while reducing workflow execution errors from 9.5% to 0%. These results show that explicit, editable search workflows provide an effective and controllable interface for aligning literature search agents with complex scientific intent.", "arxiv_id": "2607.00597", "arxiv_url": "https://arxiv.org/abs/2607.00597", "authors": ["Jisen Li", "Bingxuan Li", "Nanyi Jiang", "Xuying Ning", "Xiyao Wang", "Yifan Shen", "Heng Wang", "Yuqing Jian", "Xiaoxia Wu", "Ben Athiwaratkun", "Pan Lu", "Jiaxuan You", "Bingxin Zhao"], "brief": "\u63d0\u51faPaperPilot\uff0c\u4e00\u4e2a\u5c06\u79d1\u5b66\u6587\u732e\u68c0\u7d22\u5efa\u6a21\u4e3a\u5de5\u4f5c\u6d41\u5f52\u7eb3\u7684\u591a\u8f6e\u667a\u80fd\u4f53\u7cfb\u7edf\u3002\u5b83\u6839\u636e\u951a\u6587\u732e\u548c\u7528\u6237\u67e5\u8be2\u6784\u5efa\u53ef\u6267\u884c\u7684DAG\u5de5\u4f5c\u6d41\uff0c\u5e76\u901a\u8fc7\u7528\u6237\u53cd\u9988\u8fed\u4ee3\u4f18\u5316\u3002\u5b9e\u9a8c\u8868\u660ePaperPilot-9B\u5728\u591a\u8f6e\u4ea4\u4e92\u4e2d\u663e\u8457\u63d0\u5347\u68c0\u7d22\u6307\u6807\uff08Hit@5\u4ece58.0\u5347\u81f377.0\uff09\uff0c\u540c\u65f6\u5c06\u5de5\u4f5c\u6d41\u6267\u884c\u9519\u8bef\u7387\u964d\u81f30%\u3002", "categories": ["cs.CL", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00597", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u6587\u732e\u68c0\u7d22", "\u5de5\u4f5c\u6d41\u5f52\u7eb3", "\u591a\u8f6e\u5bf9\u8bdd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00597v1", "published_at": "2026-07-01", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Multi-Turn Agentic Scientific Literature Search via Workflow Induction", "tldr": "\u63d0\u51faPaperPilot\uff0c\u4e00\u4e2a\u5c06\u79d1\u5b66\u6587\u732e\u68c0\u7d22\u5efa\u6a21\u4e3a\u5de5\u4f5c\u6d41\u5f52\u7eb3\u7684\u591a\u8f6e\u667a\u80fd\u4f53\u7cfb\u7edf\u3002\u5b83\u6839\u636e\u951a\u6587\u732e\u548c\u7528\u6237\u67e5\u8be2\u6784\u5efa\u53ef\u6267\u884c\u7684DAG\u5de5\u4f5c\u6d41\uff0c\u5e76\u901a\u8fc7\u7528\u6237\u53cd\u9988\u8fed\u4ee3\u4f18\u5316\u3002\u5b9e\u9a8c\u8868\u660ePaperPilot-9B\u5728\u591a\u8f6e\u4ea4\u4e92\u4e2d\u663e\u8457\u63d0\u5347\u68c0\u7d22\u6307\u6807\uff08Hit@5\u4ece58.0\u5347\u81f377.0\uff09\uff0c\u540c\u65f6\u5c06\u5de5\u4f5c\u6d41\u6267\u884c\u9519\u8bef\u7387\u964d\u81f30%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLM agents increasingly rely on retrieval buffers to store and reuse past experience, yet the cache management policies governing these buffers remain largely ad-hoc. We formalize this as an online semantic cache replacement problem with switching costs, where items are matched by embedding similarity and hit quality is continuous rather than binary. Through experiments on two datasets from MemoryBench-Full (LoCoMo, DialSim) with 8 replacement policies, we reveal a surprising finding: classic heuristics (LRU, LFU) \\emph{consistently underperform} the naive FIFO baseline on semantic workloads, due to the absence of temporal locality and frequency concentration. We propose SOLAR, a learning-augmented framework that derives modification timing from regret accumulation (achieving $\\sim$17\\% modification rate) and content selection from Bayesian online learning over implicit retrieval feedback. We prove SOLAR achieves a constant competitive ratio $\\leq 3$, independent of cache size and horizon (vs.\\ $\u03a9(K)$ for FIFO), and eviction regret $O(\\sqrt{KT\\log T})$, matching the $\u03a9(\\sqrt{KT})$ lower bound up to logarithmic factors. Experiments demonstrate 5--75\\% relative improvement over FIFO at tight cache sizes, with a clearly characterized phase transition at the working set boundary. Synthetic experiments with 5000-item pools further reveal an inverted-U relationship between pool size and retrieval quality, justifying capacity constraints as a retrieval noise phenomenon rather than a storage limitation.", "arxiv_id": "2607.00394", "arxiv_url": "https://arxiv.org/abs/2607.00394", "authors": ["Yushi Sun", "Bowen Cao", "Wai Lam"], "brief": "\u9488\u5bf9LLM\u667a\u80fd\u4f53\u7684\u8bed\u4e49\u68c0\u7d22\u7f13\u5b58\u7ba1\u7406\u95ee\u9898\uff0c\u53d1\u73b0\u7ecf\u5178LRU/LFU\u7b56\u7565\u56e0\u7f3a\u4e4f\u65f6\u95f4\u5c40\u90e8\u6027\u800c\u52a3\u4e8eFIFO\u57fa\u7ebf\u3002\u63d0\u51faSOLAR\u6846\u67b6\uff0c\u7ed3\u5408\u9057\u61be\u7d2f\u79ef\u9a71\u52a8\u7684\u4fee\u6539\u65f6\u673a\u4e0e\u8d1d\u53f6\u65af\u5728\u7ebf\u5b66\u4e60\u7684\u5185\u5bb9\u9009\u62e9\uff0c\u7406\u8bba\u4e0a\u5b9e\u73b0\u5e38\u6570\u7ade\u4e89\u6bd4\u22643\uff0c\u5b9e\u9a8c\u4e0a\u76f8\u6bd4FIFO\u63d0\u53475-75%\u3002", "categories": ["cs.DB", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00394", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u7f13\u5b58\u66ff\u6362", "\u68c0\u7d22\u589e\u5f3a", "\u5728\u7ebf\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00394v1", "published_at": "2026-07-01", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "When Classic Cache Policies Fail: Learning-Augmented Replacement for Semantic Retrieval Buffers", "tldr": "\u9488\u5bf9LLM\u667a\u80fd\u4f53\u7684\u8bed\u4e49\u68c0\u7d22\u7f13\u5b58\u7ba1\u7406\u95ee\u9898\uff0c\u53d1\u73b0\u7ecf\u5178LRU/LFU\u7b56\u7565\u56e0\u7f3a\u4e4f\u65f6\u95f4\u5c40\u90e8\u6027\u800c\u52a3\u4e8eFIFO\u57fa\u7ebf\u3002\u63d0\u51faSOLAR\u6846\u67b6\uff0c\u7ed3\u5408\u9057\u61be\u7d2f\u79ef\u9a71\u52a8\u7684\u4fee\u6539\u65f6\u673a\u4e0e\u8d1d\u53f6\u65af\u5728\u7ebf\u5b66\u4e60\u7684\u5185\u5bb9\u9009\u62e9\uff0c\u7406\u8bba\u4e0a\u5b9e\u73b0\u5e38\u6570\u7ade\u4e89\u6bd4\u22643\uff0c\u5b9e\u9a8c\u4e0a\u76f8\u6bd4FIFO\u63d0\u53475-75%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reasoning language models frequently overthink: generating extended chains of behaviors such as hedging, approach abandonment, and self contradiction that consume tokens without improving answers. We show that these behaviors are not merely a consequence of length; even when controlling for response length, incorrect traces exhibit higher rates of unproductive self-reflection than correct ones. Addressing this requires identifying where self-reflection helps vs hurts, but obtaining these step-level annotations is costly. We observe that intermediate answer commitments within reasoning traces can provide a cheap proxy: by comparing each final answer candidate in the trace to the ground truth, we can determine whether subsequent reflection is productive without any additional supervision. Building on this insight, we propose DASH (Drift Aware advantage SHaping), which assigns segment-level credit based on whether each reasoning segment leads toward or away from correctness. On competition-level math benchmarks, DASH achieves the highest accuracy where overthinking is prevalent (AIME25: 50.8% vs. 45.4% GRPO) while reducing overthinking behaviors and achieving more productive self-correction than baselines.", "arxiv_id": "2607.00482", "arxiv_url": "https://arxiv.org/abs/2607.00482", "authors": ["Chia-Hsuan Lee", "Sihui Dai", "Mingyang Zhou", "Isha Slavin", "Shi-Xiong Zhang", "Sambit Sahu", "William Campbell"], "brief": "\u63a8\u7406\u8bed\u8a00\u6a21\u578b\u5e38\u51fa\u73b0\"\u8fc7\u5ea6\u601d\u8003\"\u95ee\u9898\uff0c\u751f\u6210\u5927\u91cf\u65e0\u6548\u7684\u81ea\u6211\u53cd\u601d\u3001\u65b9\u5411\u653e\u5f03\u7b49\u884c\u4e3a\u3002\u672c\u6587\u63d0\u51faDASH\u65b9\u6cd5\uff0c\u5229\u7528\u63a8\u7406\u94fe\u4e2d\u95f4\u7b54\u6848\u4f5c\u4e3a\u5ec9\u4ef7\u4ee3\u7406\u4fe1\u53f7\uff0c\u5728\u7247\u6bb5\u7ea7\u522b\u5206\u914d\u5956\u52b1\uff0c\u5224\u65ad\u6bcf\u6bb5\u63a8\u7406\u662f\u5426\u6709\u52a9\u4e8e\u5f97\u51fa\u6b63\u786e\u7b54\u6848\u3002\u5728\u7ade\u8d5b\u7ea7\u6570\u5b66\u57fa\u51c6\u4e0a\uff0cDASH\u5c06AIME25\u51c6\u786e\u7387\u4ece45.4%\u63d0\u5347\u81f350.8%\uff0c\u540c\u65f6\u663e\u8457\u51cf\u5c11\u65e0\u6548\u63a8\u7406\u884c\u4e3a\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00482", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u63a8\u7406\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u8fc7\u5ea6\u601d\u8003", "\u4fe1\u7528\u5206\u914d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00482v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Know When to Stop: Segment-Level Credit Assignment for Reducing Overthinking", "tldr": "\u63a8\u7406\u8bed\u8a00\u6a21\u578b\u5e38\u51fa\u73b0\"\u8fc7\u5ea6\u601d\u8003\"\u95ee\u9898\uff0c\u751f\u6210\u5927\u91cf\u65e0\u6548\u7684\u81ea\u6211\u53cd\u601d\u3001\u65b9\u5411\u653e\u5f03\u7b49\u884c\u4e3a\u3002\u672c\u6587\u63d0\u51faDASH\u65b9\u6cd5\uff0c\u5229\u7528\u63a8\u7406\u94fe\u4e2d\u95f4\u7b54\u6848\u4f5c\u4e3a\u5ec9\u4ef7\u4ee3\u7406\u4fe1\u53f7\uff0c\u5728\u7247\u6bb5\u7ea7\u522b\u5206\u914d\u5956\u52b1\uff0c\u5224\u65ad\u6bcf\u6bb5\u63a8\u7406\u662f\u5426\u6709\u52a9\u4e8e\u5f97\u51fa\u6b63\u786e\u7b54\u6848\u3002\u5728\u7ade\u8d5b\u7ea7\u6570\u5b66\u57fa\u51c6\u4e0a\uff0cDASH\u5c06AIME25\u51c6\u786e\u7387\u4ece45.4%\u63d0\u5347\u81f350.8%\uff0c\u540c\u65f6\u663e\u8457\u51cf\u5c11\u65e0\u6548\u63a8\u7406\u884c\u4e3a\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models often produce hallucinated answers that violate prompt-level constraints. A key diagnostic question is whether these failures reflect missing knowledge, or whether the model has the relevant information but follows the wrong inference path. We study this phenomenon as inference misalignment: a mismatch between the answer supported by the prompt and the answer favored by statistically salient latent associations. We formalize this view with a latent key-task model, in which pretraining-frequency imbalance can cause a shortcut path to dominate the constraint-sensitive path and induce positive inference loss. The framework predicts two failure modes: task-retrieval bias in entity disambiguation and key-selection bias in action choice. We introduce TrapQA, a controlled diagnostic testbed with two components. ScientistQA tests disambiguation among similar scientists with supplementary factual probes, while Real-Life Constrained QA tests everyday constraint following under salient shortcuts. Our results show that hallucination can arise from biased latent inference rather than absent knowledge alone.", "arxiv_id": "2607.00447", "arxiv_url": "https://arxiv.org/abs/2607.00447", "authors": ["Yangfan Hu", "Xuhan Tong", "Haoyue Bai", "Xi Ding", "Shashank Muralidhar Bharadwaj", "Siyang Cao", "Robert Nowak", "Jiawei Zhang"], "brief": "\u7814\u7a76\u5927\u8bed\u8a00\u6a21\u578b\u5e7b\u89c9\u73b0\u8c61\u7684\u6839\u672c\u539f\u56e0\uff0c\u63d0\u51fa\"\u63a8\u7406\u9519\u4f4d\"\u6982\u5ff5\uff1a\u6a21\u578b\u5e76\u975e\u7f3a\u4e4f\u77e5\u8bc6\uff0c\u800c\u662f\u5728\u63a8\u7406\u65f6\u88ab\u9884\u8bad\u7ec3\u4e2d\u7edf\u8ba1\u663e\u8457\u7684\u6f5c\u5728\u5173\u8054\u6240\u4e3b\u5bfc\uff0c\u8d70\u4e86\u6377\u5f84\u8def\u5f84\u3002\u901a\u8fc7\u6784\u5efaTrapQA\u6d4b\u8bd5\u96c6\u9a8c\u8bc1\u4e86\u4e24\u79cd\u5931\u8d25\u6a21\u5f0f\uff08\u5b9e\u4f53\u6d88\u6b67\u504f\u5dee\u548c\u52a8\u4f5c\u9009\u62e9\u504f\u5dee\uff09\uff0c\u8bc1\u660e\u5e7b\u89c9\u4e3b\u8981\u6e90\u4e8e\u6709\u504f\u7684\u6f5c\u5728\u63a8\u7406\u800c\u975e\u77e5\u8bc6\u7f3a\u5931\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00447", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5e7b\u89c9", "\u63a8\u7406\u504f\u5dee", "\u77e5\u8bc6\u8868\u793a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00447v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Understanding Why Language Models Hallucinate: Testing Reasoning Against Priors", "tldr": "\u7814\u7a76\u5927\u8bed\u8a00\u6a21\u578b\u5e7b\u89c9\u73b0\u8c61\u7684\u6839\u672c\u539f\u56e0\uff0c\u63d0\u51fa\"\u63a8\u7406\u9519\u4f4d\"\u6982\u5ff5\uff1a\u6a21\u578b\u5e76\u975e\u7f3a\u4e4f\u77e5\u8bc6\uff0c\u800c\u662f\u5728\u63a8\u7406\u65f6\u88ab\u9884\u8bad\u7ec3\u4e2d\u7edf\u8ba1\u663e\u8457\u7684\u6f5c\u5728\u5173\u8054\u6240\u4e3b\u5bfc\uff0c\u8d70\u4e86\u6377\u5f84\u8def\u5f84\u3002\u901a\u8fc7\u6784\u5efaTrapQA\u6d4b\u8bd5\u96c6\u9a8c\u8bc1\u4e86\u4e24\u79cd\u5931\u8d25\u6a21\u5f0f\uff08\u5b9e\u4f53\u6d88\u6b67\u504f\u5dee\u548c\u52a8\u4f5c\u9009\u62e9\u504f\u5dee\uff09\uff0c\u8bc1\u660e\u5e7b\u89c9\u4e3b\u8981\u6e90\u4e8e\u6709\u504f\u7684\u6f5c\u5728\u63a8\u7406\u800c\u975e\u77e5\u8bc6\u7f3a\u5931\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models achieve strong performance on many reasoning tasks when allowed to externalize intermediate steps as Chain-of-Thought (CoT). However, many questions require the model to internalize the multi-step reasoning within a single forward pass before generating the answer. We study this challenge through two-hop reasoning, a representative task where the model must compose multiple pieces of parametric knowledge within a single forward pass. Standard non-recurrent Transformers suffer from a depth-local storage problem: facts learned in earlier layers are unavailable where second-hop retrieval happens. We found that Looped Transformers mitigate this issue by reusing the same memory, but still generalize imperfectly. We show that the remaining bottleneck is representational. In the two-hop reasoning task, the first loop often makes the correct bridge entity nearly perfectly decodable, yet the corresponding hidden state remains poorly aligned with the bridge token embedding. Surprisingly, an easy training-free realignment intervention nearly closes the generalization gap. Building upon this insight, we propose DiscoLoop, a looping architecture whose recurrence carries both a discrete embedding channel and a continuous hidden-state channel. DiscoLoop achieves near-perfect accuracy with substantially fewer training steps across symbolic and synthetic-language multi-hop reasoning tasks. When applied to real-world pretraining, DiscoLoop attains lower training loss and stronger benchmark performance than looped-transformer baselines, suggesting that the mixed-channel design transfers to practical language modeling.", "arxiv_id": "2607.00341", "arxiv_url": "https://arxiv.org/abs/2607.00341", "authors": ["Hengyu Fu", "Tianyu Guo", "Zixuan Wang", "Hanlin Zhu", "Jason D. Lee", "Jiantao Jiao", "Stuart Russell", "Song Mei"], "brief": "\u9488\u5bf9\u591a\u8df3\u63a8\u7406\u4e2d\u5355\u6b21\u524d\u5411\u4f20\u64ad\u9700\u5185\u5316\u591a\u6b65\u77e5\u8bc6\u7684\u96be\u9898\uff0c\u672c\u6587\u53d1\u73b0\u5faa\u73afTransformer\u7684\u74f6\u9888\u5728\u4e8e\u9690\u72b6\u6001\u4e0e\u79bb\u6563token\u5d4c\u5165\u7684\u5bf9\u9f50\u4e0d\u8db3\u3002\u63d0\u51faDiscoLoop\u67b6\u6784\uff0c\u5728\u5faa\u73af\u4e2d\u540c\u65f6\u4f20\u9012\u79bb\u6563\u5d4c\u5165\u901a\u9053\u548c\u8fde\u7eed\u9690\u72b6\u6001\u901a\u9053\uff0c\u5728\u7b26\u53f7\u63a8\u7406\u548c\u771f\u5b9e\u8bed\u8a00\u9884\u8bad\u7ec3\u4efb\u52a1\u4e0a\u5747\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00341", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u8df3\u63a8\u7406", "\u5faa\u73afTransformer", "\u8bed\u8a00\u6a21\u578b", "\u94fe\u5f0f\u601d\u7ef4"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00341v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DiscoLoop: Looping Discrete Embeddings and Continuous Hidden States for Multi-hop Reasoning", "tldr": "\u9488\u5bf9\u591a\u8df3\u63a8\u7406\u4e2d\u5355\u6b21\u524d\u5411\u4f20\u64ad\u9700\u5185\u5316\u591a\u6b65\u77e5\u8bc6\u7684\u96be\u9898\uff0c\u672c\u6587\u53d1\u73b0\u5faa\u73afTransformer\u7684\u74f6\u9888\u5728\u4e8e\u9690\u72b6\u6001\u4e0e\u79bb\u6563token\u5d4c\u5165\u7684\u5bf9\u9f50\u4e0d\u8db3\u3002\u63d0\u51faDiscoLoop\u67b6\u6784\uff0c\u5728\u5faa\u73af\u4e2d\u540c\u65f6\u4f20\u9012\u79bb\u6563\u5d4c\u5165\u901a\u9053\u548c\u8fde\u7eed\u9690\u72b6\u6001\u901a\u9053\uff0c\u5728\u7b26\u53f7\u63a8\u7406\u548c\u771f\u5b9e\u8bed\u8a00\u9884\u8bad\u7ec3\u4efb\u52a1\u4e0a\u5747\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Prior work on imitation learning from suboptimal demonstrations typically relies on compressed supervision signals such as confidence estimates, discriminator scores, or importance weights. These scalar signals are inherently limited, as they cannot explicitly express intermediate reasoning about task progress, failure modes, or corrective actions. We propose a language-critique framework for imitation learning from suboptimal demonstrations that instead leverages natural language as a structured supervision signal, avoiding the collapse of expressive feedback into scalars. Our method first constructs language labels from demonstrations that explicitly describe current progress, identify suboptimal behaviors, and provide fine-grained corrective guidance. We then introduce a language-critique loss that directly trains policies using these structured signals without reducing them to scalars, and instantiate it for both behavior cloning and diffusion policies, yielding LC-BC and LC-DP. We further provide a theoretical result showing that the proposed objective upper-bounds the expert performance gap under standard assumptions. Empirically, we evaluate on diverse continuous control tasks spanning navigation, manipulation, and gameplay, where our methods consistently outperform strong imitation learning and offline reinforcement learning baselines. These results demonstrate that language can serve as a powerful and structured form of supervision for learning robust policies from suboptimal data.", "arxiv_id": "2607.01225", "arxiv_url": "https://arxiv.org/abs/2607.01225", "authors": ["Chih-Han Yang", "Dai-Jie Wu", "Yun-Ping Huang", "Ping-Chun Hsieh", "Kenneth Marino", "Shao-Hua Sun"], "brief": "\u63d0\u51fa\u8bed\u8a00\u6279\u8bc4\u6a21\u4eff\u5b66\u4e60\u6846\u67b6\uff0c\u7528\u81ea\u7136\u8bed\u8a00\u66ff\u4ee3\u6807\u91cf\u4fe1\u53f7\u4f5c\u4e3a\u7ed3\u6784\u5316\u76d1\u7763\uff0c\u663e\u5f0f\u63cf\u8ff0\u4efb\u52a1\u8fdb\u5ea6\u3001\u8bc6\u522b\u6b21\u4f18\u884c\u4e3a\u5e76\u63d0\u4f9b\u7ea0\u6b63\u6307\u5bfc\u3002\u5728\u5bfc\u822a\u3001\u64cd\u63a7\u548c\u6e38\u620f\u7b49\u8fde\u7eed\u63a7\u5236\u4efb\u52a1\u4e0a\u6301\u7eed\u4f18\u4e8e\u5f3a\u57fa\u7ebf\uff0c\u5e76\u63d0\u4f9b\u4e86\u4e13\u5bb6\u6027\u80fd\u5dee\u8ddd\u4e0a\u754c\u7684\u7406\u8bba\u4fdd\u8bc1\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01225", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6a21\u4eff\u5b66\u4e60", "\u8bed\u8a00\u76d1\u7763", "\u6269\u6563\u6a21\u578b", "\u79bb\u7ebf\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01225v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Language-Critique Imitation Learning from Suboptimal Demonstrations", "tldr": "\u63d0\u51fa\u8bed\u8a00\u6279\u8bc4\u6a21\u4eff\u5b66\u4e60\u6846\u67b6\uff0c\u7528\u81ea\u7136\u8bed\u8a00\u66ff\u4ee3\u6807\u91cf\u4fe1\u53f7\u4f5c\u4e3a\u7ed3\u6784\u5316\u76d1\u7763\uff0c\u663e\u5f0f\u63cf\u8ff0\u4efb\u52a1\u8fdb\u5ea6\u3001\u8bc6\u522b\u6b21\u4f18\u884c\u4e3a\u5e76\u63d0\u4f9b\u7ea0\u6b63\u6307\u5bfc\u3002\u5728\u5bfc\u822a\u3001\u64cd\u63a7\u548c\u6e38\u620f\u7b49\u8fde\u7eed\u63a7\u5236\u4efb\u52a1\u4e0a\u6301\u7eed\u4f18\u4e8e\u5f3a\u57fa\u7ebf\uff0c\u5e76\u63d0\u4f9b\u4e86\u4e13\u5bb6\u6027\u80fd\u5dee\u8ddd\u4e0a\u754c\u7684\u7406\u8bba\u4fdd\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Memory expertise is a learned skill: knowing what to encode, when to retrieve, and how to organize knowledge--a capacity known in cognitive science as metamemory. We bring this perspective to LLMs by treating memory management as a trainable skill. We promote file-system operations to first-class memory actions alongside task actions, letting the model itself decide how to manage its memory. This memory skill improves along two axes: the structure that supports it (prompts, file schemas, action vocabulary), and the proficiency of the model exercising it. Both axes resist manual optimization: episodes in long-horizon tasks run for thousands of steps, and a single memory mistake can hide long before it surfaces, making human review of full trajectories impractical. We introduce AutoMem, a framework that automates both axes. In the first loop, a strong LLM reviews complete agent trajectories and iteratively revises the memory structure that shapes how the agent interacts with its memory files. In the second loop, the agent\u0027s own good memory decisions are identified from many episodes and used as training signal to sharpen the model\u0027s memory proficiency directly. Across three procedurally generated long-horizon games (Crafter, MiniHack, and NetHack), optimizing memory alone--without modifying the model\u0027s task-action behavior--improved the base agent\u0027s performance ~2x-4x, bringing a 32B open-weight model competitive with frontier systems such as Claude Opus 4.5 and Gemini 3.1 Pro Thinking. Our results show that memory management is an independently learnable skill, and a high-leverage objective yielding large gains on long-horizon tasks.", "arxiv_id": "2607.01224", "arxiv_url": "https://arxiv.org/abs/2607.01224", "authors": ["Shengguang Wu", "Hao Zhu", "Yuhui Zhang", "Xiaohan Wang", "Serena Yeung-Levy"], "brief": "AutoMem\u5c06\u8bb0\u5fc6\u7ba1\u7406\u89c6\u4e3a\u53ef\u8bad\u7ec3\u7684\u8ba4\u77e5\u6280\u80fd\uff0c\u901a\u8fc7\u4e24\u4e2a\u81ea\u52a8\u5316\u5faa\u73af\u5206\u522b\u4f18\u5316\u8bb0\u5fc6\u7ed3\u6784\u548c\u6a21\u578b\u8bb0\u5fc6\u80fd\u529b\u3002\u5728Crafter\u3001MiniHack\u548cNetHack\u4e09\u4e2a\u957f\u65f6\u57df\u6e38\u620f\u4e0a\uff0c\u4ec5\u4f18\u5316\u8bb0\u5fc6\u7ba1\u7406\u5373\u53ef\u5c06\u57fa\u7840\u667a\u80fd\u4f53\u6027\u80fd\u63d0\u53472-4\u500d\uff0c\u4f7f32B\u5f00\u6e90\u6a21\u578b\u5ab2\u7f8eClaude Opus 4.5\u7b49\u524d\u6cbf\u7cfb\u7edf\u3002", "categories": ["cs.AI", "cs.CL", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01224", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u7ba1\u7406", "\u957f\u65f6\u57df\u4efb\u52a1", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01224v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AutoMem: Automated Learning of Memory as a Cognitive Skill", "tldr": "AutoMem\u5c06\u8bb0\u5fc6\u7ba1\u7406\u89c6\u4e3a\u53ef\u8bad\u7ec3\u7684\u8ba4\u77e5\u6280\u80fd\uff0c\u901a\u8fc7\u4e24\u4e2a\u81ea\u52a8\u5316\u5faa\u73af\u5206\u522b\u4f18\u5316\u8bb0\u5fc6\u7ed3\u6784\u548c\u6a21\u578b\u8bb0\u5fc6\u80fd\u529b\u3002\u5728Crafter\u3001MiniHack\u548cNetHack\u4e09\u4e2a\u957f\u65f6\u57df\u6e38\u620f\u4e0a\uff0c\u4ec5\u4f18\u5316\u8bb0\u5fc6\u7ba1\u7406\u5373\u53ef\u5c06\u57fa\u7840\u667a\u80fd\u4f53\u6027\u80fd\u63d0\u53472-4\u500d\uff0c\u4f7f32B\u5f00\u6e90\u6a21\u578b\u5ab2\u7f8eClaude Opus 4.5\u7b49\u524d\u6cbf\u7cfb\u7edf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "When should an AI system\u0027s answer be trusted? Formal proof assistants offer certainty but cannot reach most of the problem distribution; scalar LLM judges offer coverage but produce opaque scores that cannot be audited after the fact and are subject to the same coherence issues as any LLM. We present Theoria, a verification architecture that closes this gap. A candidate solution is rewritten into a sequence of typed state transitions, each licensed by an explicit justification, whether that be a citation, computation, or problem-given fact, and every transition is independently auditable. The foundational invariant is completeness of change: every difference between consecutive proof states must be accounted for, so hidden premises surface as unlicensed mutations rather than passing silently. On HLE-Verified Gold (185 text-only expert problems), Theoria certifies 105 at 91.4% strict precision (Wilson 95% CI [84.5%, 95.4%]). Every certification produces a human readable proof trace in which each step can be independently challenged. Holistic LLM judges achieve comparable precision at matched coverage but fail on different problems (Jaccard 0.14-0.36), making the approaches complementary. On 95 adversarial poisoned proofs across 15 domains, structured judges catch 94.7% versus 83.2% for holistic judging (p= 0.0017). The overall 11.5 pp gap concentrates in hidden premises (90.6% vs. 62.5%, a 28 pp difference) and fabricated citations (100% vs. 90%), the error classes where the formal analysis predicts an advantage; performance is identical on arithmetic and theorem-misapplication errors, where no advantage is predicted. On GPQA Diamond (n= 65), certified precision is 97.1% (Wilson CI [85.1%, 99.5%]).", "arxiv_id": "2607.01223", "arxiv_url": "https://arxiv.org/abs/2607.01223", "authors": ["Ben Slivinski", "Michael Saldivar"], "brief": "Theoria\u662f\u4e00\u79cd\u9a8c\u8bc1\u67b6\u6784\uff0c\u5c06AI\u7b54\u6848\u91cd\u5199\u4e3a\u5e26\u6709\u663e\u5f0f\u4f9d\u636e\u7684\u7c7b\u578b\u5316\u72b6\u6001\u8f6c\u6362\u5e8f\u5217\uff0c\u4f7f\u6bcf\u4e00\u6b65\u63a8\u7406\u5747\u53ef\u72ec\u7acb\u5ba1\u8ba1\u3002\u5728185\u9053\u4e13\u5bb6\u7ea7\u9898\u76ee\u4e0a\u8fbe\u523091.4%\u7684\u4e25\u683c\u7cbe\u786e\u7387\uff0c\u5728\u5bf9\u6297\u6027\u6bd2\u5316\u8bc1\u660e\u68c0\u6d4b\u4e2d\u6bd4\u6574\u4f53\u5f0fLLM\u8bc4\u5224\u9ad8\u51fa11.5\u4e2a\u767e\u5206\u70b9\uff0c\u5c24\u5176\u5728\u9690\u85cf\u524d\u63d0\u548c\u4f2a\u9020\u5f15\u7528\u7c7b\u9519\u8bef\u4e0a\u4f18\u52bf\u663e\u8457\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG", "cs.LO", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01223", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u63a8\u7406\u9a8c\u8bc1", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f62\u5f0f\u5316\u65b9\u6cd5", "\u53ef\u89e3\u91caAI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01223v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Theoria: Rewrite-Acceptability Verification over Informal Reasoning States", "tldr": "Theoria\u662f\u4e00\u79cd\u9a8c\u8bc1\u67b6\u6784\uff0c\u5c06AI\u7b54\u6848\u91cd\u5199\u4e3a\u5e26\u6709\u663e\u5f0f\u4f9d\u636e\u7684\u7c7b\u578b\u5316\u72b6\u6001\u8f6c\u6362\u5e8f\u5217\uff0c\u4f7f\u6bcf\u4e00\u6b65\u63a8\u7406\u5747\u53ef\u72ec\u7acb\u5ba1\u8ba1\u3002\u5728185\u9053\u4e13\u5bb6\u7ea7\u9898\u76ee\u4e0a\u8fbe\u523091.4%\u7684\u4e25\u683c\u7cbe\u786e\u7387\uff0c\u5728\u5bf9\u6297\u6027\u6bd2\u5316\u8bc1\u660e\u68c0\u6d4b\u4e2d\u6bd4\u6574\u4f53\u5f0fLLM\u8bc4\u5224\u9ad8\u51fa11.5\u4e2a\u767e\u5206\u70b9\uff0c\u5c24\u5176\u5728\u9690\u85cf\u524d\u63d0\u548c\u4f2a\u9020\u5f15\u7528\u7c7b\u9519\u8bef\u4e0a\u4f18\u52bf\u663e\u8457\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Transformers use the same forward computation stream to both predict the next token and store useful state for future token predictions. We formulate the \\emph{state-prediction separation hypothesis}: disentangling the two roles yields better language modeling performance. We design a Transformer variant that uses two computation streams to separate the two functions, and conduct pretraining experiments across various scales. Our experiments show that state-prediction separation consistently offers better data and compute efficiencies, improving validation loss and outperforming standard Transformers by 2--3 percentage points on average on downstream tasks. We also conduct extensive empirical analysis that rules out potential confounders and demonstrates the fundamental difference in the gradients our design entails.", "arxiv_id": "2607.01218", "arxiv_url": "https://arxiv.org/abs/2607.01218", "authors": ["Giovanni Monea", "Nathan Godey", "Kiant\u00e9 Brantley", "Yoav Artzi"], "brief": "\u63d0\u51fa\"\u72b6\u6001-\u9884\u6d4b\u5206\u79bb\u5047\u8bf4\"\uff1aTransformer\u540c\u4e00\u8ba1\u7b97\u6d41\u65e2\u9884\u6d4b\u4e0b\u4e00\u4e2atoken\u53c8\u5b58\u50a8\u672a\u6765\u9884\u6d4b\u6240\u9700\u72b6\u6001\uff0c\u5c06\u4e24\u8005\u89e3\u8026\u53ef\u63d0\u5347\u8bed\u8a00\u5efa\u6a21\u6027\u80fd\u3002\u8bbe\u8ba1\u4e86\u53cc\u8ba1\u7b97\u6d41Transformer\u53d8\u4f53\uff0c\u9884\u8bad\u7ec3\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u6570\u636e\u548c\u8ba1\u7b97\u6548\u7387\u4e0a\u6301\u7eed\u4f18\u4e8e\u6807\u51c6Transformer\uff0c\u4e0b\u6e38\u4efb\u52a1\u5e73\u5747\u63d0\u53472-3\u4e2a\u767e\u5206\u70b9\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01218", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["Transformer", "\u8bed\u8a00\u6a21\u578b", "\u67b6\u6784\u8bbe\u8ba1", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01218v1", "published_at": "2026-07-01", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The State-Prediction Separation Hypothesis", "tldr": "\u63d0\u51fa\"\u72b6\u6001-\u9884\u6d4b\u5206\u79bb\u5047\u8bf4\"\uff1aTransformer\u540c\u4e00\u8ba1\u7b97\u6d41\u65e2\u9884\u6d4b\u4e0b\u4e00\u4e2atoken\u53c8\u5b58\u50a8\u672a\u6765\u9884\u6d4b\u6240\u9700\u72b6\u6001\uff0c\u5c06\u4e24\u8005\u89e3\u8026\u53ef\u63d0\u5347\u8bed\u8a00\u5efa\u6a21\u6027\u80fd\u3002\u8bbe\u8ba1\u4e86\u53cc\u8ba1\u7b97\u6d41Transformer\u53d8\u4f53\uff0c\u9884\u8bad\u7ec3\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u6570\u636e\u548c\u8ba1\u7b97\u6548\u7387\u4e0a\u6301\u7eed\u4f18\u4e8e\u6807\u51c6Transformer\uff0c\u4e0b\u6e38\u4efb\u52a1\u5e73\u5747\u63d0\u53472-3\u4e2a\u767e\u5206\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Current work on robot furniture assembly mostly focuses on toy-scale settings or single-arm manipulation. We introduce FurnitureVLA, the first systematic study of real-scale bimanual furniture assembly using Vision-Language-Action models (VLAs). We formalize the task, develop a scalable simulation pipeline for expert data generation and evaluation, and build a VR
