<script>
const PAPERS = [{"abstract": "As video corpora continue to expand in both scale and task complexity, there is increasing demand for approaches that retrieve relevant videos from large-scale corpora (inter-video reasoning) and subsequently perform fine-grained, query-conditioned tasks (intra-video reasoning) within the retrieved content, such as temporal grounding. However, existing approaches typically treat retrieval as a preprocessing step, and consequently, when the initial retrieval fails, there is no mechanism to refine the search, leading to the failure of subsequent fine-grained intra-video reasoning. Moreover, while recent agentic frameworks have advanced video understanding, they typically assume that the query-relevant video is already given, focusing exclusively on intra-video reasoning tasks. To address these limitations, we propose VideoSearch-R1, an agentic framework for iterative video retrieval and reasoning through multi-turn interaction with a video search engine. Specifically, we introduce Soft Query Refinement (SQR) to refine search query tokens in a continuous latent space rather than rewriting queries in the discrete text space, enabling more efficient and fine-grained adjustments. SQR and its reasoning process are trained using Group Relative Policy Optimization (GRPO), guided by task-level reward signals derived from retrieval and downstream tasks. Building upon this, VideoSearch-R1 achieves state-of-the-art performance across three datasets on Video Corpus Moment Retrieval (VCMR), iteratively retrieving videos from large-scale corpora, refining search queries, and performing precise query-conditioned temporal grounding within the retrieved content. Our analyses show that SQR effectively refines the original query, requiring significantly fewer generated tokens than explicit text-level query refinement. Code and model checkpoints are publicly available at mlvlab.github.io/VideoSearch-R1.", "arxiv_id": "2607.00446", "arxiv_url": "https://arxiv.org/abs/2607.00446", "authors": ["Seohyun Lee", "Seoung Choi", "Dohwan Ko", "Jongha Kim", "Hyunwoo J. Kim"], "brief": "VideoSearch-R1\u662f\u4e00\u4e2a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u8f6e\u4e0e\u89c6\u9891\u641c\u7d22\u5f15\u64ce\u7684\u4ea4\u4e92\uff0c\u5b9e\u73b0\u5927\u89c4\u6a21\u89c6\u9891\u8bed\u6599\u5e93\u7684\u8fed\u4ee3\u68c0\u7d22\u4e0e\u7ec6\u7c92\u5ea6\u65f6\u5e8f\u5b9a\u4f4d\uff0c\u6838\u5fc3\u521b\u65b0\u662f\u5728\u8fde\u7eed\u6f5c\u7a7a\u95f4\u800c\u975e\u79bb\u6563\u6587\u672c\u7a7a\u95f4\u4e2d\u7cbe\u70bc\u67e5\u8be2\uff08Soft Query Refinement\uff09\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": "https://github.com/mlvlab/VideoSearch-R1", "github_stars": 20, "hf_url": "https://huggingface.co/papers/2607.00446", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u8f6f\u67e5\u8be2\u7cbe\u70bc\uff08SQR\uff09\uff1a\u5728\u8fde\u7eed\u6f5c\u7a7a\u95f4\u8c03\u6574\u67e5\u8be2token\uff0c\u6bd4\u6587\u672c\u7ea7\u67e5\u8be2\u91cd\u5199\u751f\u6210\u66f4\u5c11token\u4e14\u66f4\u9ad8\u6548", "\u4f7f\u7528GRPO\uff08\u7ec4\u76f8\u5bf9\u7b56\u7565\u4f18\u5316\uff09\u8bad\u7ec3SQR\uff0c\u5956\u52b1\u4fe1\u53f7\u6765\u81ea\u68c0\u7d22\u548c\u4e0b\u6e38\u4efb\u52a1\u7684\u4efb\u52a1\u7ea7\u53cd\u9988", "\u5728Video Corpus Moment Retrieval\uff08VCMR\uff09\u4e09\u4e2a\u6570\u636e\u96c6\u4e0a\u8fbe\u5230SOTA\uff0c\u652f\u6301\u4ece\u5927\u89c4\u6a21\u8bed\u6599\u5e93\u8fed\u4ee3\u68c0\u7d22\u5e76\u7cbe\u786e\u65f6\u5e8f\u5b9a\u4f4d"], "keywords": ["\u89c6\u9891\u68c0\u7d22", "\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00446v1", "published_at": "2026-07-01", "score": 0.41, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (7\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.00446.png", "title": "VideoSearch-R1: Iterative Video Retrieval and Reasoning via Soft Query Refinement", "tldr": "\u63d0\u51faVideoSearch-R1\u6846\u67b6\uff0c\u901a\u8fc7\u8f6f\u67e5\u8be2\u7cbe\u70bc\u5728\u8fde\u7eed\u6f5c\u7a7a\u95f4\u8fed\u4ee3\u4f18\u5316\u89c6\u9891\u68c0\u7d22\u4e0e\u63a8\u7406", "upvotes": 7, "what_it_is": "VideoSearch-R1\u662f\u4e00\u4e2a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u8f6e\u4e0e\u89c6\u9891\u641c\u7d22\u5f15\u64ce\u7684\u4ea4\u4e92\uff0c\u5b9e\u73b0\u5927\u89c4\u6a21\u89c6\u9891\u8bed\u6599\u5e93\u7684\u8fed\u4ee3\u68c0\u7d22\u4e0e\u7ec6\u7c92\u5ea6\u65f6\u5e8f\u5b9a\u4f4d\uff0c\u6838\u5fc3\u521b\u65b0\u662f\u5728\u8fde\u7eed\u6f5c\u7a7a\u95f4\u800c\u975e\u79bb\u6563\u6587\u672c\u7a7a\u95f4\u4e2d\u7cbe\u70bc\u67e5\u8be2\uff08Soft Query Refinement\uff09\u3002", "why_notable": "\u9996\u6b21\u5c06\u68c0\u7d22\u5931\u8d25\u540e\u7684\u67e5\u8be2\u7cbe\u70bc\u673a\u5236\u5f15\u5165\u89c6\u9891\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u6253\u901a\u4e86\u8de8\u89c6\u9891\u68c0\u7d22\u4e0e\u89c6\u9891\u5185\u63a8\u7406\u7684\u5b8c\u6574\u94fe\u8def\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u65b9\u6cd5\u5c06\u68c0\u7d22\u89c6\u4e3a\u56fa\u5b9a\u9884\u5904\u7406\u6b65\u9aa4\u7684\u6839\u672c\u7f3a\u9677\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language models (LLMs) are powerful pattern-completion systems, but their default operating mode - predicting the next token from a static context - does not reliably produce persistent, manipulable representations of an external world. Many tasks that look like \"reasoning\" in text become substantially harder once the environment is partially observable, stateful, and requires memory and structured hypotheses about hidden state. AGI Maze is a lightweight framework for building such environments without requiring high-dimensional sensory inputs. It provides a family of grid-based maze tasks with a clean API and multiple difficulty regimes. The goal is to create benchmarks where agents must learn and use world state representations, not just infer a local rule over readily provided observations. We provide an initial evaluation of several vanilla LLMs on simple mazes showing that they fail to represent mazes internally at LLM inference time. We also introduce a baseline agent, which is allowed to use its message history as a working memory to construct descriptions of observations at agentic runtime. Although this can improve performance, it is still insufficient for an LLM agent to reliably solve even small mazes within a step budget that is more than enough for humans.", "arxiv_id": "2607.00627", "arxiv_url": "https://arxiv.org/abs/2607.00627", "authors": ["Alexey Potapov"], "brief": "\u63d0\u51faAGI Maze\u8f7b\u91cf\u7ea7\u57fa\u51c6\u6846\u67b6\uff0c\u901a\u8fc7\u7f51\u683c\u8ff7\u5bab\u4efb\u52a1\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u3001\u6709\u72b6\u6001\u73af\u5883\u4e2d\u6784\u5efa\u548c\u7ef4\u62a4\u4e16\u754c\u6a21\u578b\u7684\u80fd\u529b\uff0c\u63ed\u793a\u5f53\u524dLLM\u5728\u5185\u90e8\u4e16\u754c\u8868\u5f81\u4e0a\u7684\u6839\u672c\u7f3a\u9677\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00627", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u6846\u67b6\u63d0\u4f9b\u591a\u96be\u5ea6\u7f51\u683c\u8ff7\u5bab\u4efb\u52a1\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u73af\u5883\u4e2d\u7ef4\u62a4\u9690\u85cf\u72b6\u6001\u7684\u7ed3\u6784\u5316\u5047\u8bbe\uff0c\u800c\u975e\u4ec5\u4f9d\u8d56\u5c40\u90e8\u89c2\u6d4b\u63a8\u65ad", "\u5b9e\u9a8c\u8868\u660e\u539f\u751fLLM\u5728\u63a8\u7406\u65f6\u65e0\u6cd5\u5728\u5185\u90e8\u8868\u5f81\u8ff7\u5bab\u7ed3\u6784\uff0c\u5373\u4f7f\u662f\u7b80\u5355\u8ff7\u5bab\u4e5f\u9891\u7e41\u5931\u8d25", "\u5f15\u5165\u57fa\u7ebf\u667a\u80fd\u4f53\u5141\u8bb8\u5229\u7528\u6d88\u606f\u5386\u53f2\u4f5c\u4e3a\u5de5\u4f5c\u8bb0\u5fc6\u6784\u5efa\u89c2\u6d4b\u63cf\u8ff0\uff0c\u867d\u6709\u6539\u5584\u4f46\u4ecd\u65e0\u6cd5\u5728\u4eba\u7c7b\u8f7b\u677e\u5b8c\u6210\u7684\u6b65\u6570\u9884\u7b97\u5185\u53ef\u9760\u6c42\u89e3\u5c0f\u578b\u8ff7\u5bab"], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00627v1", "published_at": "2026-07-01", "score": 0.375, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AGI Maze as a Benchmark Framework for World-Modeling Agents", "tldr": "AGI Maze\uff1a\u4e13\u4e3a\u6d4b\u8bd5LLM\u4e16\u754c\u5efa\u6a21\u80fd\u529b\u8bbe\u8ba1\u7684\u8ff7\u5bab\u57fa\u51c6\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faAGI Maze\u8f7b\u91cf\u7ea7\u57fa\u51c6\u6846\u67b6\uff0c\u901a\u8fc7\u7f51\u683c\u8ff7\u5bab\u4efb\u52a1\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u3001\u6709\u72b6\u6001\u73af\u5883\u4e2d\u6784\u5efa\u548c\u7ef4\u62a4\u4e16\u754c\u6a21\u578b\u7684\u80fd\u529b\uff0c\u63ed\u793a\u5f53\u524dLLM\u5728\u5185\u90e8\u4e16\u754c\u8868\u5f81\u4e0a\u7684\u6839\u672c\u7f3a\u9677\u3002", "why_notable": "\u76f4\u63a5\u6311\u6218LLM\"\u4f1a\u63a8\u7406\"\u7684\u8868\u8c61\uff0c\u63d0\u4f9b\u53ef\u91cf\u5316\u7684\u4e16\u754c\u5efa\u6a21\u80fd\u529b\u8bc4\u4f30\u5de5\u5177\uff0c\u5bf9\u63a8\u52a8\u771f\u6b63\u5177\u5907\u6301\u4e45\u72b6\u6001\u8868\u5f81\u7684\u667a\u80fd\u4f53\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning (RL) has become a central component of post-training large language models (LLMs), yet little is understood about how RL adaptation is distributed across transformer layers. Existing approaches typically update all model parameters uniformly, implicitly assuming that every layer contributes similarly to the gains obtained during RL post-training. In this work, we challenge this assumption through a systematic layer-wise study of RL training. Surprisingly, we find that training a single transformer layer can recover most of the gains achieved by full-parameter RL training, and in some cases even surpass it. To quantify this phenomenon, we introduce the quantity layer contribution, which measures the fraction of full RL improvement recovered by training a layer in isolation. Across seven models spanning two model families (Qwen3, Qwen2.5), three RL algorithms (GRPO, GiGPO, Dr. GRPO), and multiple task domains including mathematical reasoning, code generation, and agentic decision-making, we observe a remarkably stable pattern: RL gains are highly concentrated in a small subset of, and in many cases even a single, transformer layers. More strikingly, the same structural pattern consistently emerges: high-contribution layers concentrate in the middle of the transformer stack, while layers near the input and output ends contribute substantially less. The resulting layer rankings remain strongly correlated across datasets, tasks, model families, and RL algorithms.", "arxiv_id": "2607.01232", "arxiv_url": "https://arxiv.org/abs/2607.01232", "authors": ["Zijian Zhang", "Rizhen Hu", "Athanasios Glentis", "Dawei Li", "Chung-Yiu Yau", "Hongzhou Lin", "Mingyi Hong"], "brief": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u4e2d\u5404Transformer\u5c42\u7684\u8d21\u732e\u5206\u5e03\uff0c\u53d1\u73b0RL\u589e\u76ca\u9ad8\u5ea6\u96c6\u4e2d\u4e8e\u5c11\u6570\u5c42\uff08\u751a\u81f3\u5355\u5c42\uff09\uff0c\u5e76\u63d0\u51fa\"\u5c42\u8d21\u732e\u5ea6\"\u6307\u6807\u91cf\u5316\u8fd9\u4e00\u73b0\u8c61\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01232", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51fa\"\u5c42\u8d21\u732e\u5ea6\"\u6307\u6807\uff0c\u8861\u91cf\u5355\u5c42\u8bad\u7ec3\u6062\u590d\u5168\u53c2\u6570RL\u589e\u76ca\u7684\u6bd4\u4f8b", "\u8de87\u4e2a\u6a21\u578b\u30012\u4e2a\u6a21\u578b\u5bb6\u65cf\uff08Qwen3/Qwen2.5\uff09\u30013\u79cdRL\u7b97\u6cd5\uff08GRPO/GiGPO/Dr.GRPO\uff09\u9a8c\u8bc1\uff1a\u9ad8\u8d21\u732e\u5c42\u7a33\u5b9a\u96c6\u4e2d\u4e8eTransformer\u5806\u6808\u4e2d\u95f4\u4f4d\u7f6e\uff0c\u9996\u5c3e\u5c42\u8d21\u732e\u6781\u5c0f", "\u5c42\u6392\u540d\u5728\u4e0d\u540c\u6570\u636e\u96c6\u3001\u4efb\u52a1\u3001\u6a21\u578b\u5bb6\u65cf\u548cRL\u7b97\u6cd5\u95f4\u9ad8\u5ea6\u76f8\u5173\uff0c\u5177\u6709\u5f3a\u6cdb\u5316\u6027"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53c2\u6570\u9ad8\u6548\u5fae\u8c03", "\u540e\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01232v1", "published_at": "2026-07-01", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Is One Layer Enough? Training A Single Transformer Layer Can Match Full-Parameter RL Training", "tldr": "\u4ec5\u8bad\u7ec3\u5355\u4e2aTransformer\u5c42\u5373\u53ef\u5ab2\u7f8e\u751a\u81f3\u8d85\u8d8a\u5168\u53c2\u6570RL\u5fae\u8c03\u6548\u679c", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u4e2d\u5404Transformer\u5c42\u7684\u8d21\u732e\u5206\u5e03\uff0c\u53d1\u73b0RL\u589e\u76ca\u9ad8\u5ea6\u96c6\u4e2d\u4e8e\u5c11\u6570\u5c42\uff08\u751a\u81f3\u5355\u5c42\uff09\uff0c\u5e76\u63d0\u51fa\"\u5c42\u8d21\u732e\u5ea6\"\u6307\u6807\u91cf\u5316\u8fd9\u4e00\u73b0\u8c61\u3002", "why_notable": "\u98a0\u8986\u4e86RL\u540e\u8bad\u7ec3\u9700\u5747\u5300\u66f4\u65b0\u6240\u6709\u53c2\u6570\u7684\u9ed8\u8ba4\u5047\u8bbe\uff0c\u4e3a\u9ad8\u6548\u53c2\u6570\u5fae\u8c03\u63d0\u4f9b\u7406\u8bba\u4f9d\u636e\uff0c\u6709\u671b\u5927\u5e45\u964d\u4f4eLLM\u5f3a\u5316\u5b66\u4e60\u7684\u8ba1\u7b97\u6210\u672c"}, {"abstract": "Safety evaluations for language models increasingly depend on judgments about ambiguous natural-language behaviour: whether a model has followed an instruction, refused appropriately, complied with a policy, resisted an embedded command, or misreported progress in an agentic task. Existing benchmarks often compress these distinctions into pass/fail labels, obscuring whether failures arise from capability limits, policy ambiguity, instruction conflict, scaffold failure, or unstable evaluator judgments. This paper introduces adversarial pragmatics as a benchmark and annotation protocol for evaluating model behaviour under instruction conflict, embedded commands, quotation, scope ambiguity, deixis, indirect speech acts, and multi-turn agent transcripts. The contribution is empirical and methodological: a linguistically controlled taxonomy, an 18-item seed benchmark with validator-enforced metadata, a 54-row local seed pilot, an expert-evaluation protocol distinguishing task success, policy compliance, safety risk, refusal outcome, and evaluator confidence, and metrics for judge validity, diagnostic ambiguity, and taxonomy drift. The framework turns linguistic judgment methodology into a practical tool for validating safety evals, LLM judges, gold-set construction, prompt-injection tests, and safety documentation.", "arxiv_id": "2607.01153", "arxiv_url": "https://arxiv.org/abs/2607.01153", "authors": ["Brett Reynolds"], "brief": "\u672c\u6587\u63d0\u51fa\"\u5bf9\u6297\u6027\u8bed\u7528\u5b66\"\u57fa\u51c6\u4e0e\u6807\u6ce8\u534f\u8bae\uff0c\u4e13\u95e8\u8bc4\u4f30LLM\u5728\u6307\u4ee4\u51b2\u7a81\u3001\u5d4c\u5165\u547d\u4ee4\u3001\u5f15\u7528\u6b67\u4e49\u3001\u95f4\u63a5\u8a00\u8bed\u884c\u4e3a\u7b49\u590d\u6742\u8bed\u8a00\u573a\u666f\u4e0b\u7684\u5b89\u5168\u5408\u89c4\u884c\u4e3a\uff0c\u586b\u8865\u73b0\u6709\u57fa\u51c6\u5c06\u590d\u6742\u5931\u8d25\u539f\u56e0\u7b80\u5316\u4e3a\u901a\u8fc7/\u5931\u8d25\u6807\u7b7e\u7684\u4e0d\u8db3\u3002", "categories": ["cs.CL", "cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01153", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6784\u5efa\u8bed\u8a00\u5b66\u63a7\u5236\u5206\u7c7b\u4f53\u7cfb\uff0c\u6db5\u76d6\u6307\u4ee4\u51b2\u7a81\u3001\u8303\u56f4\u6b67\u4e49\u3001\u6307\u793a\u8bed\u3001\u95f4\u63a5\u8a00\u8bed\u884c\u4e3a\u7b49\u591a\u4e2a\u7ef4\u5ea6", "\u63d0\u4f9b18\u9879\u79cd\u5b50\u57fa\u51c6\uff08\u542b\u9a8c\u8bc1\u5668\u5f3a\u5236\u5143\u6570\u636e\uff09\u548c54\u884c\u672c\u5730\u79cd\u5b50\u8bd5\u70b9\uff0c\u914d\u5957\u4e13\u5bb6\u8bc4\u4f30\u534f\u8bae\uff0c\u533a\u5206\u4efb\u52a1\u6210\u529f\u3001\u653f\u7b56\u5408\u89c4\u3001\u5b89\u5168\u98ce\u9669\u3001\u62d2\u7edd\u7ed3\u679c\u548c\u8bc4\u4f30\u8005\u7f6e\u4fe1\u5ea6", "\u5f15\u5165\u8bc4\u5224\u8005\u6709\u6548\u6027\u3001\u8bca\u65ad\u6b67\u4e49\u548c\u5206\u7c7b\u6f02\u79fb\u7b49\u65b0\u6307\u6807\uff0c\u53ef\u7528\u4e8e\u9a8c\u8bc1\u5b89\u5168\u8bc4\u4f30\u3001LLM\u88c1\u5224\u3001\u63d0\u793a\u6ce8\u5165\u6d4b\u8bd5\u548c\u5b89\u5168\u6587\u6863"], "keywords": ["AI\u5b89\u5168", "\u5927\u8bed\u8a00\u6a21\u578b", "\u57fa\u51c6\u8bc4\u6d4b", "\u63d0\u793a\u6ce8\u5165"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01153v1", "published_at": "2026-07-01", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Adversarial Pragmatics for AI Safety Evaluation: A Benchmark for Instruction Conflict, Embedded Commands, and Policy Ambiguity", "tldr": "\u63d0\u51fa\u5bf9\u6297\u6027\u8bed\u7528\u5b66\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u8bed\u8a00\u6a21\u578b\u5728\u6307\u4ee4\u51b2\u7a81\u3001\u5d4c\u5165\u547d\u4ee4\u7b49\u590d\u6742\u8bed\u8a00\u573a\u666f\u4e0b\u7684\u5b89\u5168\u884c\u4e3a", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u5bf9\u6297\u6027\u8bed\u7528\u5b66\"\u57fa\u51c6\u4e0e\u6807\u6ce8\u534f\u8bae\uff0c\u4e13\u95e8\u8bc4\u4f30LLM\u5728\u6307\u4ee4\u51b2\u7a81\u3001\u5d4c\u5165\u547d\u4ee4\u3001\u5f15\u7528\u6b67\u4e49\u3001\u95f4\u63a5\u8a00\u8bed\u884c\u4e3a\u7b49\u590d\u6742\u8bed\u8a00\u573a\u666f\u4e0b\u7684\u5b89\u5168\u5408\u89c4\u884c\u4e3a\uff0c\u586b\u8865\u73b0\u6709\u57fa\u51c6\u5c06\u590d\u6742\u5931\u8d25\u539f\u56e0\u7b80\u5316\u4e3a\u901a\u8fc7/\u5931\u8d25\u6807\u7b7e\u7684\u4e0d\u8db3\u3002", "why_notable": "\u73b0\u6709\u5b89\u5168\u57fa\u51c6\u96be\u4ee5\u533a\u5206\u6a21\u578b\u5931\u8d25\u7684\u6839\u672c\u539f\u56e0\uff08\u80fd\u529b\u9650\u5236 vs \u653f\u7b56\u6b67\u4e49 vs \u6307\u4ee4\u51b2\u7a81\uff09\uff0c\u672c\u6587\u5c06\u8bed\u8a00\u5b66\u5224\u65ad\u65b9\u6cd5\u8bba\u8f6c\u5316\u4e3a\u5b9e\u7528\u5b89\u5168\u8bc4\u4f30\u5de5\u5177\uff0c\u5bf9\u63d0\u793a\u6ce8\u5165\u9632\u5fa1\u548cLLM\u5b89\u5168\u5ba1\u8ba1\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Generative AI is shifting software engineering from a practice organized around scarce implementation effort toward one organized around abundant, low-cost code production. This shift changes the central engineering problem: not whether AI can generate useful code, but how engineers organize architectures, tools, evidence, and feedback loops so that AI-mediated development remains inspectable, correctable, and maintainable. We study this problem through a first-person case study: a 12-week development effort in which a single expert software engineer used frontier AI coding agents to build a document accessibility remediation system. The empirical record comprises 88 contemporaneous field notes, 420 KLOC of production code, and 1.16 MLOC of tests, lints, supporting documentation, and agent tooling. From this record, we develop a candidate middle-range theory of governance conversion, expressed as a process model explaining how high-velocity agentic implementation becomes governable. The model explains how agentic implementation velocity surfaces recurring structural failure classes, and how engineering judgment sustains velocity by converting those failures into durable governance mechanisms. In contrast to existing governance models that derive controls from known obligations, governance conversion explains how controls are discovered from failures that become visible only during agentic work. We use our model to make testable predictions and to describe implications for software engineering research and practice.", "arxiv_id": "2607.01087", "arxiv_url": "https://arxiv.org/abs/2607.01087", "authors": ["James C. Davis", "Paschal C. Amusuo", "Tanmay Singla", "Berk \u00c7akar", "Kirsten A. Davis"], "brief": "\u901a\u8fc7\u7b2c\u4e00\u4eba\u79f0\u6848\u4f8b\u7814\u7a76\uff0c\u8bb0\u5f55\u4e00\u540d\u8d44\u6df1\u5de5\u7a0b\u5e0812\u5468\u5185\u501f\u52a9\u524d\u6cbfAI\u7f16\u7a0b\u667a\u80fd\u4f53\u6784\u5efa\u6587\u6863\u65e0\u969c\u788d\u4fee\u590d\u7cfb\u7edf\u7684\u5168\u8fc7\u7a0b\uff0c\u5e76\u4ece\u4e2d\u63d0\u70bc\u51fa\"\u6cbb\u7406\u8f6c\u5316\"\u4e2d\u5c42\u7406\u8bba\uff0c\u89e3\u91ca\u5982\u4f55\u5c06AI\u9ad8\u901f\u751f\u6210\u4ee3\u7801\u8fc7\u7a0b\u4e2d\u66b4\u9732\u7684\u7ed3\u6784\u6027\u5931\u8d25\u8f6c\u5316\u4e3a\u6301\u4e45\u7684\u6cbb\u7406\u673a\u5236\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01087", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5b9e\u8bc1\u6570\u636e\u89c4\u6a21\u5e9e\u5927\uff1a88\u4efd\u73b0\u573a\u7b14\u8bb0\u300142\u4e07\u884c\u751f\u4ea7\u4ee3\u7801\u3001116\u4e07\u884c\u6d4b\u8bd5/\u6587\u6863/\u5de5\u5177\u4ee3\u7801", "\u6838\u5fc3\u53d1\u73b0\uff1aAI\u7f16\u7a0b\u7684\u6838\u5fc3\u95ee\u9898\u5df2\u4ece\"\u80fd\u5426\u751f\u6210\u6709\u7528\u4ee3\u7801\"\u8f6c\u53d8\u4e3a\"\u5982\u4f55\u4fdd\u6301\u4ee3\u7801\u53ef\u68c0\u67e5\u3001\u53ef\u7ea0\u6b63\u3001\u53ef\u7ef4\u62a4\"", "\u63d0\u51fa\"\u6cbb\u7406\u8f6c\u5316\"\u8fc7\u7a0b\u6a21\u578b\uff1a\u6cbb\u7406\u63a7\u5236\u4e0d\u662f\u4ece\u5df2\u77e5\u4e49\u52a1\u63a8\u5bfc\uff0c\u800c\u662f\u4ece\u667a\u80fd\u4f53\u5de5\u4f5c\u4e2d\u66b4\u9732\u7684\u5931\u8d25\u4e2d\u53d1\u73b0\u5e76\u56fa\u5316"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u8f6f\u4ef6\u5de5\u7a0b", "AI\u6cbb\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01087v1", "published_at": "2026-07-01", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Cheap Code, Costly Judgment: A Case Study on Governable Agentic Software Engineering", "tldr": "\u5355\u4eba\u5de5\u7a0b\u5e0812\u5468\u7528AI\u7f16\u7a0b\u667a\u80fd\u4f53\u6784\u5efa\u7cfb\u7edf\uff0c\u63d0\u51fa\"\u6cbb\u7406\u8f6c\u5316\"\u7406\u8bba\u89e3\u91ca\u5982\u4f55\u7ba1\u63a7\u9ad8\u901fAI\u4ee3\u7801\u751f\u6210", "upvotes": 0, "what_it_is": "\u901a\u8fc7\u7b2c\u4e00\u4eba\u79f0\u6848\u4f8b\u7814\u7a76\uff0c\u8bb0\u5f55\u4e00\u540d\u8d44\u6df1\u5de5\u7a0b\u5e0812\u5468\u5185\u501f\u52a9\u524d\u6cbfAI\u7f16\u7a0b\u667a\u80fd\u4f53\u6784\u5efa\u6587\u6863\u65e0\u969c\u788d\u4fee\u590d\u7cfb\u7edf\u7684\u5168\u8fc7\u7a0b\uff0c\u5e76\u4ece\u4e2d\u63d0\u70bc\u51fa\"\u6cbb\u7406\u8f6c\u5316\"\u4e2d\u5c42\u7406\u8bba\uff0c\u89e3\u91ca\u5982\u4f55\u5c06AI\u9ad8\u901f\u751f\u6210\u4ee3\u7801\u8fc7\u7a0b\u4e2d\u66b4\u9732\u7684\u7ed3\u6784\u6027\u5931\u8d25\u8f6c\u5316\u4e3a\u6301\u4e45\u7684\u6cbb\u7406\u673a\u5236\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u8bb0\u5f55LLM\u7f16\u7a0b\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u5de5\u7a0b\u9879\u76ee\u4e2d\u6cbb\u7406\u95ee\u9898\u7684\u7eb5\u5411\u6848\u4f8b\u7814\u7a76\uff0c\u63d0\u51fa\u53ef\u6d4b\u8bd5\u9884\u6d4b\u7684\u4e2d\u5c42\u7406\u8bba\uff0c\u5bf9AI\u8f85\u52a9\u8f6f\u4ef6\u5de5\u7a0b\u7684\u5b9e\u8df5\u4e0e\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "While Large Language Model (LLM) agents demonstrate proficiency in static benchmarks, their deployment in real-world scenarios is hindered by the dynamic nature of user queries, tool sets, and interaction dynamics. To address this generalization gap, we formalize OpenAgent (Tool-Use Agent in Open-World), a problem setting characterized by distributional shifts across query, action, observation, and domain dimensions. To systematically diagnose its impact, we construct a controlled sandbox environment where we define fine-grained environmental shifts across a four-tier hierarchy, Perception, Interaction, Reasoning, and Internalization, and conduct a comprehensive series of experiments. Our analysis yields a series of key insights, demonstrating that agents trained via both Supervised Fine-Tuning(SFT) and Reinforcement Learning suffer from varying degrees of performance degradation when confronting open environmental shifts. Building on these insights, we propose Perturbation-Augmented Fine-Tuning, a disturbance-based intervention strategy for SFT that lays the foundation for enhancing agent robustness and utility in realistic environments. Our code will be released at: https://github. com/LAMDA-NeSy/OpenAgent.", "arxiv_id": "2607.01084", "arxiv_url": "https://arxiv.org/abs/2607.01084", "authors": ["Song-Lin Lv", "Weiming Wu", "Rui Zhu", "Zi-Jian Cheng", "Lan-Zhe Guo"], "brief": "\u672c\u6587\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e86\u5f00\u653e\u4e16\u754c\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u95ee\u9898\uff08OpenAgent\uff09\uff0c\u6784\u5efa\u53d7\u63a7\u6c99\u76d2\u73af\u5883\u7cfb\u7edf\u8bc4\u4f30\u5206\u5e03\u504f\u79fb\u5bf9\u667a\u80fd\u4f53\u6027\u80fd\u7684\u5f71\u54cd\uff0c\u5e76\u63d0\u51fa\u6270\u52a8\u589e\u5f3a\u5fae\u8c03\uff08Perturbation-Augmented Fine-Tuning\uff09\u7b56\u7565\u4ee5\u63d0\u5347\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u73af\u5883\u4e2d\u7684\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01084", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5b9a\u4e49\u56db\u7ef4\u5206\u5e03\u504f\u79fb\uff1a\u67e5\u8be2\u3001\u52a8\u4f5c\u3001\u89c2\u5bdf\u548c\u9886\u57df\uff0c\u6784\u5efa\u56db\u5c42\u7ea7\uff08\u611f\u77e5\u3001\u4ea4\u4e92\u3001\u63a8\u7406\u3001\u5185\u5316\uff09\u7ec6\u7c92\u5ea6\u73af\u5883\u504f\u79fb\u8bc4\u4f30\u4f53\u7cfb", "\u5b9e\u9a8c\u8868\u660eSFT\u548c\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u7684\u667a\u80fd\u4f53\u5728\u5f00\u653e\u73af\u5883\u504f\u79fb\u4e0b\u5747\u51fa\u73b0\u4e0d\u540c\u7a0b\u5ea6\u7684\u6027\u80fd\u4e0b\u964d\uff0c\u63ed\u793a\u9759\u6001\u8bad\u7ec3\u7684\u6839\u672c\u5c40\u9650", "\u63d0\u51fa\u6270\u52a8\u589e\u5f3a\u5fae\u8c03\uff08PAFT\uff09\u5e72\u9884\u7b56\u7565\uff0c\u901a\u8fc7\u5728\u8bad\u7ec3\u4e2d\u5f15\u5165\u73af\u5883\u6270\u52a8\u663e\u8457\u63d0\u5347\u667a\u80fd\u4f53\u9c81\u68d2\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u6cdb\u5316\u80fd\u529b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01084v1", "published_at": "2026-07-01", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Can Agents Generalize to the Open World? Unveiling the Fragility of Static Training in Tool Use", "tldr": "\u63ed\u793aLLM\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u5728\u5f00\u653e\u4e16\u754c\u4e2d\u7684\u8106\u5f31\u6027\uff0c\u5e76\u63d0\u51fa\u6270\u52a8\u589e\u5f3a\u5fae\u8c03\u65b9\u6cd5\u63d0\u5347\u9c81\u68d2\u6027", "upvotes": 0, "what_it_is": "\u672c\u6587\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e86\u5f00\u653e\u4e16\u754c\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u95ee\u9898\uff08OpenAgent\uff09\uff0c\u6784\u5efa\u53d7\u63a7\u6c99\u76d2\u73af\u5883\u7cfb\u7edf\u8bc4\u4f30\u5206\u5e03\u504f\u79fb\u5bf9\u667a\u80fd\u4f53\u6027\u80fd\u7684\u5f71\u54cd\uff0c\u5e76\u63d0\u51fa\u6270\u52a8\u589e\u5f3a\u5fae\u8c03\uff08Perturbation-Augmented Fine-Tuning\uff09\u7b56\u7565\u4ee5\u63d0\u5347\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u73af\u5883\u4e2d\u7684\u6cdb\u5316\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5f62\u5f0f\u5316\u5e76\u91cf\u5316\u4e86LLM\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u5728\u5f00\u653e\u4e16\u754c\u4e2d\u7684\u6cdb\u5316\u5931\u6548\u95ee\u9898\uff0c\u4e3a\u6784\u5efa\u66f4\u9c81\u68d2\u7684\u771f\u5b9e\u573a\u666f\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u7406\u8bba\u6846\u67b6\u548c\u5b9e\u8df5\u65b9\u6cd5\u3002"}, {"abstract": "Long-horizon LLM agents accumulate tool results, files, plans, and user constraints that are too structured to be treated as a disposable text suffix. Current systems mostly rely on in-run heuristics such as chronological pruning and tool-output masking, or on final self-summary near a context limit. Heuristics are cheap but blind to future dependencies; summaries preserve narrative state but often hide exact evidence, locators, and editable artifacts. We present Self-GC, where GC denotes self-governing context while deliberately echoing garbage collection: the system does not merely reclaim unused tokens, but governs the lifecycle of agent context objects. Self-GC turns user turns, tool spans, and skill state into indexed objects; asks a side-channel planner to propose fold, mask, and prune actions; and lets the harness enforce recoverable sidecars, safe commit boundaries, and cache-aware commit. On a 33-session Hard Set, Self-GC prunes 43.95% of prefix tokens while leaving 84.85% of future continuations unaffected, compared with no-impact rates of 54.55% to 69.70% for heuristic baselines. On a 332-session production-derived suite, three planner backbones reach no-impact rates of 91.27% to 94.58%, while baselines remain at 77.71% to 87.46%. In production, an online account-level split reduces daytime average input tokens by 10% to 15%, with peak reductions near 20%. These results point to context management as runtime lifecycle control over indexed, recoverable objects rather than post hoc text cleanup.", "arxiv_id": "2607.00692", "arxiv_url": "https://arxiv.org/abs/2607.00692", "authors": ["Xubin Hao", "Hongjin Meng", "Xin Yin", "Jiawei Zhu", "Chenpeng Cao"], "brief": "\u63d0\u51faSelf-GC\u6846\u67b6\uff0c\u5c06\u957f\u65f6\u7a0bLLM\u667a\u80fd\u4f53\u7684\u4e0a\u4e0b\u6587\uff08\u7528\u6237\u8f93\u5165\u3001\u5de5\u5177\u8c03\u7528\u7ed3\u679c\u3001\u6280\u80fd\u72b6\u6001\uff09\u8f6c\u5316\u4e3a\u53ef\u7d22\u5f15\u5bf9\u8c61\uff0c\u901a\u8fc7\u65c1\u8def\u89c4\u5212\u5668\u52a8\u6001\u6267\u884c\u6298\u53e0\u3001\u906e\u853d\u3001\u526a\u679d\u64cd\u4f5c\uff0c\u5b9e\u73b0\u7c7b\u5783\u573e\u56de\u6536\u673a\u5236\u7684\u4e0a\u4e0b\u6587\u751f\u547d\u5468\u671f\u7ba1\u7406\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00692", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u572833\u4e2aHard Set\u4f1a\u8bdd\u4e2d\uff0c\u526a\u679d43.95%\u524d\u7f00token\uff0c84.85%\u7684\u672a\u6765\u7eed\u5199\u4e0d\u53d7\u5f71\u54cd\uff0c\u663e\u8457\u4f18\u4e8e\u542f\u53d1\u5f0f\u57fa\u7ebf\uff0854.55%~69.70%\uff09", "\u5728332\u4e2a\u751f\u4ea7\u7ea7\u4f1a\u8bdd\u4e2d\uff0c\u4e09\u79cd\u89c4\u5212\u5668\u9aa8\u5e72\u7684\u65e0\u5f71\u54cd\u7387\u8fbe91.27%~94.58%\uff0c\u800c\u57fa\u7ebf\u4ec577.71%~87.46%", "\u7ebf\u4e0aA/B\u6d4b\u8bd5\u663e\u793a\u767d\u5929\u5e73\u5747\u8f93\u5165token\u51cf\u5c1110%~15%\uff0c\u5cf0\u503c\u524a\u51cf\u63a5\u8fd120%"], "keywords": ["\u667a\u80fd\u4f53", "\u4e0a\u4e0b\u6587\u7ba1\u7406", "\u957f\u65f6\u7a0b\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00692v1", "published_at": "2026-07-01", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Self-GC: Self-Governing Context for Long-Horizon LLM Agents", "tldr": "Self-GC\u5c06LLM\u667a\u80fd\u4f53\u4e0a\u4e0b\u6587\u89c6\u4e3a\u53ef\u7d22\u5f15\u5bf9\u8c61\u8fdb\u884c\u751f\u547d\u5468\u671f\u7ba1\u7406\uff0c\u5927\u5e45\u51cf\u5c11token\u6d88\u8017\u540c\u65f6\u4fdd\u7559\u5173\u952e\u4fe1\u606f", "upvotes": 0, "what_it_is": "\u63d0\u51faSelf-GC\u6846\u67b6\uff0c\u5c06\u957f\u65f6\u7a0bLLM\u667a\u80fd\u4f53\u7684\u4e0a\u4e0b\u6587\uff08\u7528\u6237\u8f93\u5165\u3001\u5de5\u5177\u8c03\u7528\u7ed3\u679c\u3001\u6280\u80fd\u72b6\u6001\uff09\u8f6c\u5316\u4e3a\u53ef\u7d22\u5f15\u5bf9\u8c61\uff0c\u901a\u8fc7\u65c1\u8def\u89c4\u5212\u5668\u52a8\u6001\u6267\u884c\u6298\u53e0\u3001\u906e\u853d\u3001\u526a\u679d\u64cd\u4f5c\uff0c\u5b9e\u73b0\u7c7b\u5783\u573e\u56de\u6536\u673a\u5236\u7684\u4e0a\u4e0b\u6587\u751f\u547d\u5468\u671f\u7ba1\u7406\u3002", "why_notable": "\u5c06\u4e0a\u4e0b\u6587\u7ba1\u7406\u4ece\u7b80\u5355\u7684\u6587\u672c\u622a\u65ad/\u6458\u8981\u63d0\u5347\u4e3a\u7ed3\u6784\u5316\u5bf9\u8c61\u7684\u751f\u547d\u5468\u671f\u63a7\u5236\uff0c\u5728\u751f\u4ea7\u73af\u5883\u9a8c\u8bc1\u4e86\u663e\u8457\u7684token\u8282\u7701\u6548\u679c\uff0c\u5bf9\u957f\u65f6\u7a0b\u667a\u80fd\u4f53\u7684\u5b9e\u7528\u90e8\u7f72\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "While long-horizon mobile GUI agents typically rely on thought-action-observation loops, they struggle to separate persistent task states from transient screen observations. As execution histories grow, this entanglement imposes a severe context burden, causing agents to forget initial requirements, hallucinate progress, or repeatedly interact with stale interfaces. To address this, we introduce Task-State Representation (TSR), a training-free framework that explicitly decouples task state from sensory input. Acting as a lightweight external wrapper, TSR maintains three structured components: a global instruction summary, a dynamic progress tracker for subgoals, and a transition-aware action verifier. By continuously updating through pre- and post-action visual comparisons, TSR effectively guides the agent\u0027s reasoning without requiring architectural modifications. Experiments across four mobile GUI benchmarks validate TSR\u0027s effectiveness, yielding up to a 12 absolute point increase in success rate on complex cross-application and memory-intensive tasks.", "arxiv_id": "2607.00502", "arxiv_url": "https://arxiv.org/abs/2607.00502", "authors": ["Yujie Zheng", "Zikang Liu", "Xin Zhao", "Ji-Rong Wen"], "brief": "\u63d0\u51fa\u4efb\u52a1\u72b6\u6001\u8868\u793a\uff08TSR\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u7ef4\u62a4\u5168\u5c40\u6307\u4ee4\u6458\u8981\u3001\u52a8\u6001\u5b50\u76ee\u6807\u8ffd\u8e2a\u5668\u548c\u52a8\u4f5c\u9a8c\u8bc1\u5668\uff0c\u5c06\u6301\u4e45\u4efb\u52a1\u72b6\u6001\u4ece\u77ac\u65f6\u5c4f\u5e55\u89c2\u5bdf\u4e2d\u663e\u5f0f\u5206\u79bb\uff0c\u65e0\u9700\u4fee\u6539\u6a21\u578b\u67b6\u6784\u5373\u53ef\u589e\u5f3a\u79fb\u52a8\u7aefGUI\u667a\u80fd\u4f53\u7684\u957f\u7a0b\u4efb\u52a1\u6267\u884c\u80fd\u529b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00502", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u514d\u8bad\u7ec3\u7684\u8f7b\u91cf\u7ea7\u5916\u90e8\u5305\u88c5\u5668\uff0c\u5305\u542b\u4e09\u4e2a\u7ed3\u6784\u5316\u7ec4\u4ef6\uff1a\u5168\u5c40\u6307\u4ee4\u6458\u8981\u3001\u52a8\u6001\u8fdb\u5ea6\u8ffd\u8e2a\u5668\u3001\u8f6c\u6362\u611f\u77e5\u52a8\u4f5c\u9a8c\u8bc1\u5668", "\u901a\u8fc7\u52a8\u4f5c\u524d\u540e\u89c6\u89c9\u5bf9\u6bd4\u6301\u7eed\u66f4\u65b0\u4efb\u52a1\u72b6\u6001\uff0c\u6709\u6548\u7f13\u89e3\u957f\u6267\u884c\u5386\u53f2\u5e26\u6765\u7684\u4e0a\u4e0b\u6587\u8d1f\u62c5", "\u5728\u56db\u4e2a\u79fb\u52a8\u7aefGUI\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u9a8c\u8bc1\u6709\u6548\u6027\uff0c\u590d\u6742\u8de8\u5e94\u7528\u548c\u8bb0\u5fc6\u5bc6\u96c6\u578b\u4efb\u52a1\u6210\u529f\u7387\u6700\u9ad8\u63d0\u534712\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u667a\u80fd\u4f53", "GUI", "\u79fb\u52a8\u7aef", "\u957f\u7a0b\u4efb\u52a1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00502v1", "published_at": "2026-07-01", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "A Task-State Representation for Long-Horizon Mobile GUI Agents", "tldr": "TSR\u6846\u67b6\u5c06\u4efb\u52a1\u72b6\u6001\u4e0e\u5c4f\u5e55\u89c2\u5bdf\u89e3\u8026\uff0c\u663e\u8457\u63d0\u5347\u79fb\u52a8\u7aefGUI\u667a\u80fd\u4f53\u957f\u7a0b\u4efb\u52a1\u6210\u529f\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4efb\u52a1\u72b6\u6001\u8868\u793a\uff08TSR\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u7ef4\u62a4\u5168\u5c40\u6307\u4ee4\u6458\u8981\u3001\u52a8\u6001\u5b50\u76ee\u6807\u8ffd\u8e2a\u5668\u548c\u52a8\u4f5c\u9a8c\u8bc1\u5668\uff0c\u5c06\u6301\u4e45\u4efb\u52a1\u72b6\u6001\u4ece\u77ac\u65f6\u5c4f\u5e55\u89c2\u5bdf\u4e2d\u663e\u5f0f\u5206\u79bb\uff0c\u65e0\u9700\u4fee\u6539\u6a21\u578b\u67b6\u6784\u5373\u53ef\u589e\u5f3a\u79fb\u52a8\u7aefGUI\u667a\u80fd\u4f53\u7684\u957f\u7a0b\u4efb\u52a1\u6267\u884c\u80fd\u529b\u3002", "why_notable": "\u9488\u5bf9\u957f\u7a0bGUI\u667a\u80fd\u4f53\u7684\u6838\u5fc3\u75db\u70b9\uff08\u9057\u5fd8\u521d\u59cb\u9700\u6c42\u3001\u5e7b\u89c9\u8fdb\u5ea6\u3001\u91cd\u590d\u64cd\u4f5c\u8fc7\u65f6\u754c\u9762\uff09\uff0c\u63d0\u51fa\u65e0\u9700\u8bad\u7ec3\u7684\u5373\u63d2\u5373\u7528\u89e3\u51b3\u65b9\u6848\uff0c\u5de5\u7a0b\u5b9e\u7528\u4ef7\u503c\u9ad8\uff0c\u4e14\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u53d6\u5f97\u663e\u8457\u6027\u80fd\u63d0\u5347\u3002"}, {"abstract": "Large language model (LLM)-based software engineering agents are increasingly developed to resolve software issues by generating patches from issue reports and code repositories. Bug reproduction tests (BRTs) are an important building block for such agents and have been shown useful for patch validation. However, it remains unclear whether BRTs can also help the more central stage of patch generation. We first conduct a preliminary study and find that directly using advanced BRT generators to guide patch generation is not beneficial: fail-to-fail BRTs can mislead agents, while even fail-to-pass BRTs bring limited or negative gains. Our analysis reveals two reasons: fail-to-pass BRTs may cover only one manifestation of the reported issue, leading to partial patches, whereas fail-to-fail BRTs are unreliable as direct patch-generation targets. Motivated by these insights, we propose SWE-Doctor, a software issue resolution agent that guides patch generation with runtime diagnoses derived from multi-faceted BRT executions. SWE-Doctor first generates multi-faceted BRTs for different behavioral requirements stated in the issue, then executes and debugs these BRTs to construct runtime-grounded diagnosis records, and finally uses the diagnoses together with localization information inferred during BRT generation to guide patch generation and reduce partial patches. We evaluate SWE-Doctor on Python bug-fixing issues from the widely adopted SWE-bench Verified and SWE-bench Pro across five LLM backends. SWE-Doctor consistently outperforms existing agents across all 10 LLM-benchmark combinations, achieving average resolution rates of 75.7% on SWE-bench Verified and 59.4% on SWE-bench Pro. In particular, on the more challenging SWE-bench Pro, SWE-Doctor improves the average resolution rate by 8.0-8.9 percentage points over the baseline agents.", "arxiv_id": "2607.00990", "arxiv_url": "https://arxiv.org/abs/2607.00990", "authors": ["Yaoqi Guo", "Yang Liu", "Jie M. Zhang", "Yun Ma", "Yiling Lou", "Zhenpeng Chen"], "brief": "\u63d0\u51faSWE-Doctor\u8f6f\u4ef6\u95ee\u9898\u4fee\u590d\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u751f\u6210\u591a\u7ef4\u5ea6Bug\u590d\u73b0\u6d4b\u8bd5\uff08BRT\uff09\u5e76\u6267\u884c\u8c03\u8bd5\uff0c\u6784\u5efa\u8fd0\u884c\u65f6\u8bca\u65ad\u8bb0\u5f55\uff0c\u4ece\u800c\u66f4\u7cbe\u51c6\u5730\u6307\u5bfc\u8865\u4e01\u751f\u6210\uff0c\u907f\u514d\u90e8\u5206\u4fee\u590d\u95ee\u9898\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00990", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u53d1\u73b0\u76f4\u63a5\u7528BRT\u6307\u5bfc\u8865\u4e01\u751f\u6210\u6548\u679c\u4e0d\u4f73\uff1afail-to-fail BRT\u4f1a\u8bef\u5bfc\u667a\u80fd\u4f53\uff0cfail-to-pass BRT\u4e5f\u53ef\u80fd\u5bfc\u81f4\u90e8\u5206\u4fee\u590d", "SWE-Doctor\u751f\u6210\u8986\u76d6issue\u591a\u79cd\u884c\u4e3a\u9700\u6c42\u7684\u591a\u7ef4\u5ea6BRT\uff0c\u7ed3\u5408\u8fd0\u884c\u65f6\u8bca\u65ad\u4e0e\u5b9a\u4f4d\u4fe1\u606f\u8054\u5408\u6307\u5bfc\u8865\u4e01\u751f\u6210", "\u5728SWE-bench Verified\u4e0a\u5e73\u5747\u89e3\u51b3\u738775.7%\uff0c\u5728\u66f4\u96be\u7684SWE-bench Pro\u4e0a\u8fbe59.4%\uff0c\u8f83\u57fa\u7ebf\u63d0\u53478.0-8.9\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u8f6f\u4ef6\u5de5\u7a0b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00990v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SWE-Doctor: Guiding Software Engineering Agents with Runtime Diagnosis from Multi-Faceted Bug Reproduction Tests", "tldr": "SWE-Doctor\u5229\u7528\u591a\u7ef4\u5ea6Bug\u590d\u73b0\u6d4b\u8bd5\u7684\u8fd0\u884c\u65f6\u8bca\u65ad\u6307\u5bfcLLM\u81ea\u52a8\u4fee\u590d\u8f6f\u4ef6\u7f3a\u9677", "upvotes": 0, "what_it_is": "\u63d0\u51faSWE-Doctor\u8f6f\u4ef6\u95ee\u9898\u4fee\u590d\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u751f\u6210\u591a\u7ef4\u5ea6Bug\u590d\u73b0\u6d4b\u8bd5\uff08BRT\uff09\u5e76\u6267\u884c\u8c03\u8bd5\uff0c\u6784\u5efa\u8fd0\u884c\u65f6\u8bca\u65ad\u8bb0\u5f55\uff0c\u4ece\u800c\u66f4\u7cbe\u51c6\u5730\u6307\u5bfc\u8865\u4e01\u751f\u6210\uff0c\u907f\u514d\u90e8\u5206\u4fee\u590d\u95ee\u9898\u3002", "why_notable": "\u5728\u4e3b\u6d41\u8f6f\u4ef6\u5de5\u7a0b\u57fa\u51c6\u4e0a\u5168\u9762\u8d85\u8d8a\u73b0\u6709\u667a\u80fd\u4f53\uff0c\u7cfb\u7edf\u6027\u63ed\u793a\u4e86BRT\u5728\u8865\u4e01\u751f\u6210\u9636\u6bb5\u7684\u5c40\u9650\u5e76\u63d0\u51fa\u6709\u6548\u89e3\u51b3\u65b9\u6848\uff0c\u5bf9LLM\u81ea\u52a8\u5316\u8f6f\u4ef6\u4fee\u590d\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Accelerating materials discovery requires AI systems that can generate scientifically valid hypotheses through multi-step, domain-grounded reasoning. Standard large language models often produce fluent but weakly traceable responses to open-ended materials design problems, making it difficult to determine whether final answers are supported by coherent intermediate reasoning. We develop Graph-PRefLexOR, a family of graph-native reasoning models fine-tuned with Group Relative Policy Optimization (GRPO) to organize reasoning into explicit phases for mechanism exploration, graph construction, pattern extraction, and hypothesis synthesis. This design links neural language generation with symbolic relational structure, enabling causal connections to be constructed, inspected, and reused. On 100 open-ended questions from materials science and mechanics literature, Graph-PRefLexOR achieves 40-65% improvements over corresponding base models, with the largest gains in reasoning traceability. Embedding analyses show broader semantic exploration and approximately 2-3 times greater semantic diversity than baselines. Semantic backtracking and layer-wise hidden-state analyses further show stronger alignment between structured reasoning and final answers. Finally, test-time graph expansion reveals that additional compute primarily increases long-range conceptual recombination within a bounded semantic space, rather than simply expanding semantic coverage. These results establish graph-native reinforcement learning as a pathway toward interpretable AI systems for scientific hypothesis generation in materials design and other scientific applications.", "arxiv_id": "2607.00924", "arxiv_url": "https://arxiv.org/abs/2607.00924", "authors": ["Subhadeep Pal", "Shashwat Sourav", "Tirthankar Ghosal", "Markus J. Buehler"], "brief": "\u63d0\u51faGraph-PRefLexOR\uff0c\u4e00\u79cd\u7ed3\u5408\u56fe\u7ed3\u6784\u4e0eGRPO\u5f3a\u5316\u5b66\u4e60\u7684\u63a8\u7406\u6a21\u578b\uff0c\u5c06\u79d1\u5b66\u5047\u8bbe\u751f\u6210\u8fc7\u7a0b\u5206\u89e3\u4e3a\u673a\u5236\u63a2\u7d22\u3001\u56fe\u6784\u5efa\u3001\u6a21\u5f0f\u63d0\u53d6\u548c\u5047\u8bbe\u7efc\u5408\u7b49\u663e\u5f0f\u9636\u6bb5\uff0c\u4f7f\u63a8\u7406\u8fc7\u7a0b\u53ef\u8ffd\u6eaf\u3001\u53ef\u68c0\u9a8c\u3002", "categories": ["cs.AI", "cond-mat.mtrl-sci", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00924", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5728100\u9053\u6750\u6599\u79d1\u5b66\u4e0e\u529b\u5b66\u5f00\u653e\u6027\u95ee\u9898\u4e0a\uff0c\u76f8\u6bd4\u57fa\u7840\u6a21\u578b\u63d0\u534740-65%\uff0c\u63a8\u7406\u53ef\u8ffd\u6eaf\u6027\u63d0\u5347\u6700\u4e3a\u663e\u8457", "\u5d4c\u5165\u5206\u6790\u663e\u793a\u8bed\u4e49\u63a2\u7d22\u66f4\u5e7f\u6cdb\uff0c\u8bed\u4e49\u591a\u6837\u6027\u7ea6\u4e3a\u57fa\u7ebf\u76842-3\u500d", "\u6d4b\u8bd5\u65f6\u56fe\u6269\u5c55\u4e3b\u8981\u589e\u5f3a\u6709\u754c\u8bed\u4e49\u7a7a\u95f4\u5185\u7684\u957f\u7a0b\u6982\u5ff5\u91cd\u7ec4\uff0c\u800c\u975e\u7b80\u5355\u6269\u5927\u8bed\u4e49\u8986\u76d6\u8303\u56f4"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u79d1\u5b66\u63a8\u7406", "\u77e5\u8bc6\u56fe\u8c31", "\u6750\u6599\u79d1\u5b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00924v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Graph-Native Reinforcement Learning Enables Traceable Scientific Hypothesis Generation through Conceptual Recombination", "tldr": "\u56fe\u539f\u751f\u5f3a\u5316\u5b66\u4e60\u6a21\u578bGraph-PRefLexOR\uff0c\u901a\u8fc7\u6982\u5ff5\u91cd\u7ec4\u751f\u6210\u53ef\u8ffd\u6eaf\u7684\u6750\u6599\u79d1\u5b66\u5047\u8bbe", "upvotes": 0, "what_it_is": "\u63d0\u51faGraph-PRefLexOR\uff0c\u4e00\u79cd\u7ed3\u5408\u56fe\u7ed3\u6784\u4e0eGRPO\u5f3a\u5316\u5b66\u4e60\u7684\u63a8\u7406\u6a21\u578b\uff0c\u5c06\u79d1\u5b66\u5047\u8bbe\u751f\u6210\u8fc7\u7a0b\u5206\u89e3\u4e3a\u673a\u5236\u63a2\u7d22\u3001\u56fe\u6784\u5efa\u3001\u6a21\u5f0f\u63d0\u53d6\u548c\u5047\u8bbe\u7efc\u5408\u7b49\u663e\u5f0f\u9636\u6bb5\uff0c\u4f7f\u63a8\u7406\u8fc7\u7a0b\u53ef\u8ffd\u6eaf\u3001\u53ef\u68c0\u9a8c\u3002", "why_notable": "\u9996\u6b21\u5c06\u56fe\u539f\u751f\u7ed3\u6784\u4e0e\u5f3a\u5316\u5b66\u4e60\u7ed3\u5408\u7528\u4e8e\u79d1\u5b66\u5047\u8bbe\u751f\u6210\uff0c\u89e3\u51b3\u4e86LLM\u63a8\u7406\u8fc7\u7a0b\u4e0d\u900f\u660e\u3001\u4e2d\u95f4\u6b65\u9aa4\u4e0e\u6700\u7ec8\u7b54\u6848\u8131\u8282\u7684\u6838\u5fc3\u95ee\u9898\uff0c\u4e3a\u53ef\u89e3\u91caAI\u8f85\u52a9\u79d1\u5b66\u53d1\u73b0\u63d0\u4f9b\u65b0\u8303\u5f0f"}, {"abstract": "Large language models can generate polished scientific text that includes unsupported claims, allowing hallucinations to enter the archival record. Assessing this risk via technical statements is difficult and often requires expert judgment, but citations provide a more auditable surface: a reference either resolves to a real scholarly work with compatible authorship, or it does not. We measure citation hallucination in peer-reviewed proceedings using a conservative definition limited to identity-level failures: non-existent works and substantial author-list mismatches. We explicitly exclude ordinary bibliographic drift (e.g., venue/year differences, publication-status updates, minor name variants). To audit citations at scale, we build RefChecker, a verification pipeline that resolves bibliography entries against multiple bibliographic sources and escalates unresolved cases to web-search re-verification. We apply RefChecker to accepted camera-ready papers from ICLR, ICML, NeurIPS, and USENIX Security. Hallucinated citations have entered the archival record. While reference-level rates are usually below 1%, proceedings are large enough that paper-level failures are visible: in 2025, roughly one in twenty NeurIPS and USENIX Security papers contains at least two likely hallucinated academic-paper-like references under our strict definition. We also observe post-ChatGPT increases in several venues, including a tail of papers with 5+ failures in a single bibliography, and likely hallucinated citations even among award-winning papers. These results suggest peer review alone does not reliably enforce citation integrity, yet auditing is tractable (about 0.04$ per paper in one venue-scale scan). We open-source RefChecker for routine, reproducible citation verification before publication (https://github.com/markrussinovich/refchecker).", "arxiv_id": "2607.00738", "arxiv_url": "https://arxiv.org/abs/2607.00738", "authors": ["Mark Russinovich", "Ram Shankar Siva Kumar", "Ahmed Salem"], "brief": "\u672c\u6587\u6784\u5efa\u4e86RefChecker\u9a8c\u8bc1\u6d41\u6c34\u7ebf\uff0c\u7cfb\u7edf\u5ba1\u8ba1ICLR\u3001ICML\u3001NeurIPS\u3001USENIX Security\u7b49\u9876\u4f1a\u5df2\u53d1\u8868\u8bba\u6587\u4e2d\u7684\u5e7b\u89c9\u5f15\u7528\uff08\u4e0d\u5b58\u5728\u7684\u6587\u732e\u6216\u4f5c\u8005\u5217\u8868\u4e25\u91cd\u4e0d\u7b26\uff09\uff0c\u53d1\u73b0LLM\u751f\u6210\u7684\u865a\u5047\u5f15\u7528\u5df2\u8fdb\u5165\u6b63\u5f0f\u5b66\u672f\u6863\u6848\u3002", "categories": ["cs.DL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00738", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5f15\u7528\u7ea7\u522b\u5e7b\u89c9\u7387\u901a\u5e38\u4f4e\u4e8e1%\uff0c\u4f462025\u5e74\u7ea61/20\u7684NeurIPS\u548cUSENIX Security\u8bba\u6587\u542b\u81f3\u5c112\u6761\u5e7b\u89c9\u5f15\u7528", "ChatGPT\u53d1\u5e03\u540e\u591a\u4e2a\u9876\u4f1a\u5e7b\u89c9\u5f15\u7528\u6570\u91cf\u660e\u663e\u4e0a\u5347\uff0c\u90e8\u5206\u8bba\u6587\u5355\u7bc7\u53c2\u8003\u6587\u732e\u4e2d\u51fa\u73b05\u6761\u4ee5\u4e0a\u5e7b\u89c9\u5f15\u7528\uff0c\u751a\u81f3\u83b7\u5956\u8bba\u6587\u4e5f\u672a\u80fd\u5e78\u514d", "RefChecker\u6bcf\u7bc7\u8bba\u6587\u5ba1\u8ba1\u6210\u672c\u7ea60.04\u7f8e\u5143\uff0c\u5df2\u5f00\u6e90\uff0c\u53ef\u5728\u53d1\u8868\u524d\u8fdb\u884c\u5e38\u89c4\u53ef\u590d\u73b0\u7684\u5f15\u7528\u5b8c\u6574\u6027\u9a8c\u8bc1"], "keywords": ["\u5b66\u672f\u8bda\u4fe1", "\u5e7b\u89c9\u68c0\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f15\u7528\u9a8c\u8bc1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00738v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Phantom References: Hallucinated Citations That Survive Peer Review at Top-Tier Conferences", "tldr": "\u9876\u4f1a\u8bba\u6587\u4e2d\u5b58\u5728\u5e7b\u89c9\u5f15\u7528\uff0c\u7ea61/20\u7684NeurIPS\u548cUSENIX\u8bba\u6587\u542b\u81f3\u5c11\u4e24\u6761\u865a\u5047\u5f15\u7528", "upvotes": 0, "what_it_is": "\u672c\u6587\u6784\u5efa\u4e86RefChecker\u9a8c\u8bc1\u6d41\u6c34\u7ebf\uff0c\u7cfb\u7edf\u5ba1\u8ba1ICLR\u3001ICML\u3001NeurIPS\u3001USENIX Security\u7b49\u9876\u4f1a\u5df2\u53d1\u8868\u8bba\u6587\u4e2d\u7684\u5e7b\u89c9\u5f15\u7528\uff08\u4e0d\u5b58\u5728\u7684\u6587\u732e\u6216\u4f5c\u8005\u5217\u8868\u4e25\u91cd\u4e0d\u7b26\uff09\uff0c\u53d1\u73b0LLM\u751f\u6210\u7684\u865a\u5047\u5f15\u7528\u5df2\u8fdb\u5165\u6b63\u5f0f\u5b66\u672f\u6863\u6848\u3002", "why_notable": "\u9996\u6b21\u4ee5\u5927\u89c4\u6a21\u5b9e\u8bc1\u65b9\u5f0f\u8bc1\u660eLLM\u5e7b\u89c9\u5f15\u7528\u5df2\u7a81\u7834\u540c\u884c\u8bc4\u5ba1\u8fdb\u5165\u9876\u4f1a\u5b58\u6863\u8bb0\u5f55\uff0c\u63ed\u793a\u5b66\u672f\u8bda\u4fe1\u7684\u7cfb\u7edf\u6027\u98ce\u9669\uff0c\u5e76\u63d0\u4f9b\u4f4e\u6210\u672c\u53ef\u6269\u5c55\u7684\u81ea\u52a8\u5316\u89e3\u51b3\u65b9\u6848"}, {"abstract": "Understanding how aligned LLMs internally represent safety is critical for diagnosing alignment vulnerabilities, as it explains why jailbreaks succeed and informs the design of robust alignment strategies. Prior work shows that aligned LLMs encode harmfulness and refusal as separable directions in the residual stream at prompt-side token positions. We show that jailbreaks succeed at prompt encoding by suppressing either the refusal or harmfulness direction before any token is generated, with distinct attack classes occupying separable regions of the harmfulness-refusal plane. Extending the analysis to response-token positions, we find that the model recognizes harmful content while it is generating that content, even when it failed to recognize the input as harmful at the prompt side. Motivated by our findings, we introduce HARC (Harmfulness-And-Refusal Coupling), a fine-tuning method that pairs the two directions across both prompt and response positions. Since the intervention is confined to the harmfulness-refusal subspace, it leaves the rest of the residual stream intact and does not degrade general capability or inflate over-refusal. Across extensive experiments, HARC achieves the strongest robustness-capability-usability trade-off among six baselines spanning the major training-time and inference-time safety methods. The harmfulness and refusal directions at prompt and response positions transfer across the five model families and two scales we tested without architecture-specific tuning.", "arxiv_id": "2607.00572", "arxiv_url": "https://arxiv.org/abs/2607.00572", "authors": ["Shei Pern Chua", "Fangzhao Wu"], "brief": "\u672c\u6587\u63d0\u51faHARC\uff08\u6709\u5bb3\u6027-\u62d2\u7edd\u8026\u5408\uff09\u5fae\u8c03\u65b9\u6cd5\uff0c\u901a\u8fc7\u5206\u6790\u5bf9\u9f50LLM\u5728\u6b8b\u5dee\u6d41\u4e2d\u5982\u4f55\u7f16\u7801\u6709\u5bb3\u6027\u4e0e\u62d2\u7edd\u65b9\u5411\uff0c\u5c06\u4e24\u8005\u5728\u63d0\u793a\u7aef\u548c\u54cd\u5e94\u7aef\u4f4d\u7f6e\u8fdb\u884c\u8026\u5408\uff0c\u4ece\u800c\u62b5\u5fa1\u8d8a\u72f1\u653b\u51fb\u5e76\u4fdd\u6301\u6a21\u578b\u901a\u7528\u80fd\u529b\u3002", "categories": ["cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00572", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u8d8a\u72f1\u653b\u51fb\u901a\u8fc7\u5728\u751f\u6210\u524d\u6291\u5236\u62d2\u7edd\u65b9\u5411\u6216\u6709\u5bb3\u6027\u65b9\u5411\u6765\u7ed5\u8fc7\u5b89\u5168\u673a\u5236\uff0c\u4e0d\u540c\u653b\u51fb\u7c7b\u578b\u5728\u6709\u5bb3\u6027-\u62d2\u7edd\u5e73\u9762\u4e0a\u5360\u636e\u53ef\u5206\u79bb\u533a\u57df", "\u6a21\u578b\u5728\u751f\u6210\u6709\u5bb3\u5185\u5bb9\u65f6\u80fd\u8bc6\u522b\u5176\u6709\u5bb3\u6027\uff0c\u5373\u4f7f\u5728\u63d0\u793a\u7aef\u672a\u80fd\u8bc6\u522b\u8f93\u5165\u4e3a\u6709\u5bb3\uff0c\u54cd\u5e94\u7aef\u4ecd\u5b58\u5728\u6709\u5bb3\u6027\u4fe1\u53f7", "HARC\u4ec5\u5e72\u9884\u6709\u5bb3\u6027-\u62d2\u7edd\u5b50\u7a7a\u95f4\uff0c\u4e0d\u5f71\u54cd\u6b8b\u5dee\u6d41\u5176\u4f59\u90e8\u5206\uff0c\u5728\u516d\u4e2a\u57fa\u7ebf\u65b9\u6cd5\u4e2d\u5b9e\u73b0\u6700\u4f18\u9c81\u68d2\u6027-\u80fd\u529b-\u53ef\u7528\u6027\u6743\u8861\uff0c\u4e14\u8de85\u4e2a\u6a21\u578b\u5bb6\u65cf\u548c2\u79cd\u89c4\u6a21\u53ef\u8fc1\u79fb"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u5bf9\u9f50", "\u8d8a\u72f1\u653b\u51fb", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00572v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "HARC: Coupling Harmfulness and Refusal Directions for Robust Safety Alignment", "tldr": "\u63d0\u51faHARC\u65b9\u6cd5\uff0c\u901a\u8fc7\u8026\u5408\u6709\u5bb3\u6027\u4e0e\u62d2\u7edd\u65b9\u5411\u5b9e\u73b0\u66f4\u9c81\u68d2\u7684LLM\u5b89\u5168\u5bf9\u9f50", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51faHARC\uff08\u6709\u5bb3\u6027-\u62d2\u7edd\u8026\u5408\uff09\u5fae\u8c03\u65b9\u6cd5\uff0c\u901a\u8fc7\u5206\u6790\u5bf9\u9f50LLM\u5728\u6b8b\u5dee\u6d41\u4e2d\u5982\u4f55\u7f16\u7801\u6709\u5bb3\u6027\u4e0e\u62d2\u7edd\u65b9\u5411\uff0c\u5c06\u4e24\u8005\u5728\u63d0\u793a\u7aef\u548c\u54cd\u5e94\u7aef\u4f4d\u7f6e\u8fdb\u884c\u8026\u5408\uff0c\u4ece\u800c\u62b5\u5fa1\u8d8a\u72f1\u653b\u51fb\u5e76\u4fdd\u6301\u6a21\u578b\u901a\u7528\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u8d8a\u72f1\u653b\u51fb\u5728\u8868\u793a\u7a7a\u95f4\u7684\u4f5c\u7528\u673a\u5236\uff0c\u5e76\u636e\u6b64\u8bbe\u8ba1\u51fa\u7cbe\u51c6\u3001\u4f4e\u526f\u4f5c\u7528\u7684\u5b89\u5168\u5fae\u8c03\u65b9\u6cd5\uff0c\u5bf9\u7406\u89e3\u548c\u4fee\u590dLLM\u5bf9\u9f50\u6f0f\u6d1e\u5177\u6709\u91cd\u8981\u7406\u8bba\u4e0e\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Jailbreak attacks remain a critical threat to the safe deployment of large language models (LLMs). While prior work has primarily studied attacks and defenses at the prompt level, we show that this prompt-centric paradigm overlooks a structural vulnerability in stateful, function-calling environments. In such applications, developer-defined schemas, structured arguments, and untrusted tool outputs are interleaved into a single shared model context. This architecture expands the attack surface by blurring the boundary between trusted control logic and untrusted data, allowing adversarial intent to be distributed across a multi-turn execution path. We exploit this architectural flaw through SMT, a black-box attack framework based on Simulated Moderation Traces. Departing from purely prompt-based interactions, SMT constructs a multi-turn trajectory that simulates a legitimate moderation-auditing workflow. Within this trajectory, a fabricated moderation frame leverages red-team testing as a pretext to elicit harmful generations. The subsequent validation feedback treats safety refusals as execution failures, prompting refinements that gradually weaken the model\u0027s safety constraints and ultimately trigger harmful outputs. Extensive empirical evaluations on prominent commercial LLMs from five different providers across two standardized safety benchmarks show that SMT consistently achieves the highest average attack success rate and HarmScore while requiring a near-minimal number of queries, substantially outperforming existing baselines. These findings demonstrate that prompt-level sanitization alone is fundamentally insufficient for defending tool-enabled LLM systems and highlight the urgent need for context-aware validation across schemas, arguments, tool outputs, and accumulated conversation state. The code is available at https://github.com/liujlong27/SMT.", "arxiv_id": "2607.00481", "arxiv_url": "https://arxiv.org/abs/2607.00481", "authors": ["Junlong Liu", "Haobo Wang", "Weiqi Luo", "Xiaojun Jia"], "brief": "\u63d0\u51faSMT\uff08\u6a21\u62df\u5ba1\u6838\u8ffd\u8e2a\uff09\u9ed1\u76d2\u653b\u51fb\u6846\u67b6\uff0c\u5229\u7528\u51fd\u6570\u8c03\u7528LLM\u7684\u6709\u72b6\u6001\u591a\u8f6e\u6267\u884c\u67b6\u6784\u6f0f\u6d1e\uff0c\u901a\u8fc7\u4f2a\u9020\u5ba1\u6838\u5de5\u4f5c\u6d41\u8f68\u8ff9\u9010\u6b65\u524a\u5f31\u6a21\u578b\u5b89\u5168\u7ea6\u675f\uff0c\u5b9e\u73b0\u8d8a\u72f1\u653b\u51fb\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00481", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u53d1\u73b0\u51fd\u6570\u8c03\u7528LLM\u7684\u7ed3\u6784\u6027\u6f0f\u6d1e\uff1a\u5f00\u53d1\u8005\u5b9a\u4e49\u7684schema\u3001\u7ed3\u6784\u5316\u53c2\u6570\u4e0e\u4e0d\u53ef\u4fe1\u5de5\u5177\u8f93\u51fa\u5171\u4eab\u540c\u4e00\u4e0a\u4e0b\u6587\uff0c\u6a21\u7cca\u4e86\u53ef\u4fe1\u63a7\u5236\u903b\u8f91\u4e0e\u4e0d\u53ef\u4fe1\u6570\u636e\u7684\u8fb9\u754c", "SMT\u6784\u9020\u591a\u8f6e\u8f68\u8ff9\u6a21\u62df\u5408\u6cd5\u5ba1\u6838\u6d41\u7a0b\uff0c\u4ee5\u7ea2\u961f\u6d4b\u8bd5\u4e3a\u501f\u53e3\u8bf1\u5bfc\u6709\u5bb3\u8f93\u51fa\uff0c\u5e76\u5c06\u5b89\u5168\u62d2\u7edd\u89c6\u4e3a\u6267\u884c\u5931\u8d25\u4ee5\u8fed\u4ee3\u4f18\u5316\u653b\u51fb", "\u57285\u5bb6\u5546\u4e1aLLM\u63d0\u4f9b\u5546\u30012\u4e2a\u6807\u51c6\u5b89\u5168\u57fa\u51c6\u4e0a\u8bc4\u6d4b\uff0cSMT\u4ee5\u8fd1\u6700\u5c11\u67e5\u8be2\u6b21\u6570\u5b9e\u73b0\u6700\u9ad8\u5e73\u5747\u653b\u51fb\u6210\u529f\u7387\u548cHarmScore\uff0c\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u5b89\u5168", "\u8d8a\u72f1\u653b\u51fb", "\u667a\u80fd\u4f53", "\u51fd\u6570\u8c03\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00481v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Beyond the Prompt: Jailbreaking Function-Calling LLMs via Simulated Moderation Traces", "tldr": "\u9488\u5bf9\u51fd\u6570\u8c03\u7528LLM\u7684\u591a\u8f6e\u8d8a\u72f1\u653b\u51fb\u6846\u67b6SMT\uff0c\u901a\u8fc7\u6a21\u62df\u5ba1\u6838\u6d41\u7a0b\u7ed5\u8fc7\u5b89\u5168\u9632\u62a4", "upvotes": 0, "what_it_is": "\u63d0\u51faSMT\uff08\u6a21\u62df\u5ba1\u6838\u8ffd\u8e2a\uff09\u9ed1\u76d2\u653b\u51fb\u6846\u67b6\uff0c\u5229\u7528\u51fd\u6570\u8c03\u7528LLM\u7684\u6709\u72b6\u6001\u591a\u8f6e\u6267\u884c\u67b6\u6784\u6f0f\u6d1e\uff0c\u901a\u8fc7\u4f2a\u9020\u5ba1\u6838\u5de5\u4f5c\u6d41\u8f68\u8ff9\u9010\u6b65\u524a\u5f31\u6a21\u578b\u5b89\u5168\u7ea6\u675f\uff0c\u5b9e\u73b0\u8d8a\u72f1\u653b\u51fb\u3002", "why_notable": "\u63ed\u793a\u4e86\u5f53\u524d\u4ee5\u63d0\u793a\u5c42\u51c0\u5316\u4e3a\u4e3b\u7684\u9632\u5fa1\u8303\u5f0f\u5bf9\u5de5\u5177\u589e\u5f3a\u578bLLM\u7cfb\u7edf\u7684\u6839\u672c\u6027\u4e0d\u8db3\uff0c\u63a8\u52a8\u5b89\u5168\u7814\u7a76\u4ece\u5355\u8f6e\u63d0\u793a\u9632\u5fa1\u6269\u5c55\u81f3\u591a\u8f6e\u4e0a\u4e0b\u6587\u611f\u77e5\u9a8c\u8bc1\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u7684AI Agent\u5b89\u5168\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "While inference-time scaling has improved the reasoning abilities of large language models (LLMs), the need to generate long chains-of-thought (CoTs) is a computational bottleneck. Thus, in contrast to sequential scaling methods like CoT, recent parallel scaling techniques instead use fork and join (FJ) primitives to divide work across multiple LLM threads. However, in the fork-join paradigm, threads are typically transient and do not communicate pointwise with one another which limits scalability. To tackle this, we introduce Message Passing Language Models (MPLMs), a framework for LLM reasoning in which threads communicate directly via lightweight send and receive primitives. MPLMs enable efficient scaling through two key mechanisms: (1) reduced communication costs, achieved by avoiding redundant context sharing, and (2) preemption, which allows threads to terminate early based on partial information from their peers. We demonstrate the promise of MPLMs on 3 classes of tasks. First, on Sudoku puzzles, we show that MPLMs require an asymptotically smaller context than both serial CoT and parallel FJ. We then fine-tune a single model to solve 25 x 25 puzzles that remain challenging for standard CoT and FJ approaches, as well as frontier reasoning models without tools. Second, on 3-SAT puzzles, the capability of preemption allows termination of unpromising branches, which results in improved efficiency. Finally, we show that appropriately prompted large pre-trained models follow the MPLM protocol, achieving competitive results on long-context question answering relative to popular fork-join approaches.", "arxiv_id": "2607.01077", "arxiv_url": "https://arxiv.org/abs/2607.01077", "authors": ["Xuecheng Liu", "Daman Arora", "Gokul Swamy", "Andrea Zanette"], "brief": "\u63d0\u51fa\u6d88\u606f\u4f20\u9012\u8bed\u8a00\u6a21\u578b\uff08MPLM\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7send/receive\u539f\u8bed\u5b9e\u73b0\u591aLLM\u63a8\u7406\u7ebf\u7a0b\u95f4\u7684\u76f4\u63a5\u70b9\u5bf9\u70b9\u901a\u4fe1\uff0c\u7a81\u7834\u4f20\u7edffork-join\u5e76\u884c\u8303\u5f0f\u4e2d\u7ebf\u7a0b\u65e0\u6cd5\u4e92\u901a\u7684\u74f6\u9888\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01077", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5f15\u5165send/receive\u539f\u8bed\u66ff\u4ee3fork-join\uff0c\u907f\u514d\u5197\u4f59\u4e0a\u4e0b\u6587\u5171\u4eab\uff0c\u964d\u4f4e\u901a\u4fe1\u5f00\u9500", "\u652f\u6301\u62a2\u5360\u673a\u5236\uff08preemption\uff09\uff0c\u7ebf\u7a0b\u53ef\u6839\u636e\u5176\u4ed6\u7ebf\u7a0b\u7684\u90e8\u5206\u4fe1\u606f\u63d0\u524d\u7ec8\u6b62\uff0c\u51cf\u5c11\u65e0\u6548\u8ba1\u7b97", "\u572825\u00d725\u6570\u72ec\u30013-SAT\u7b49\u4efb\u52a1\u4e0a\uff0cMPLM\u6240\u9700\u4e0a\u4e0b\u6587\u957f\u5ea6\u6e10\u8fd1\u5c0f\u4e8e\u4e32\u884cCoT\u548c\u5e76\u884cFJ\u65b9\u6cd5"], "keywords": ["\u63a8\u7406\u6548\u7387", "\u5e76\u884c\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6d88\u606f\u4f20\u9012"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01077v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Message Passing Enables Efficient Reasoning", "tldr": "\u63d0\u51fa\u6d88\u606f\u4f20\u9012\u8bed\u8a00\u6a21\u578b\u6846\u67b6\uff0c\u8ba9\u591aLLM\u7ebf\u7a0b\u76f4\u63a5\u901a\u4fe1\uff0c\u5927\u5e45\u63d0\u5347\u63a8\u7406\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u6d88\u606f\u4f20\u9012\u8bed\u8a00\u6a21\u578b\uff08MPLM\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7send/receive\u539f\u8bed\u5b9e\u73b0\u591aLLM\u63a8\u7406\u7ebf\u7a0b\u95f4\u7684\u76f4\u63a5\u70b9\u5bf9\u70b9\u901a\u4fe1\uff0c\u7a81\u7834\u4f20\u7edffork-join\u5e76\u884c\u8303\u5f0f\u4e2d\u7ebf\u7a0b\u65e0\u6cd5\u4e92\u901a\u7684\u74f6\u9888\u3002", "why_notable": "\u63a8\u7406\u65f6\u8ba1\u7b97\u6269\u5c55\u662f\u5f53\u524dLLM\u6838\u5fc3\u74f6\u9888\uff0cMPLM\u63d0\u4f9b\u4e86\u4e00\u79cd\u5168\u65b0\u7684\u5e76\u884c\u63a8\u7406\u901a\u4fe1\u8303\u5f0f\uff0c\u5728\u590d\u6742\u7ea6\u675f\u6c42\u89e3\u4efb\u52a1\u4e0a\u8d85\u8d8a\u524d\u6cbf\u63a8\u7406\u6a21\u578b\uff0c\u4e14\u65e0\u9700\u5de5\u5177\u8c03\u7528\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u4e0e\u7406\u8bba\u610f\u4e49\u3002"}, {"abstract": "Long-context LLM services now sustain prompts with hundreds of thousands to millions of tokens, making the key-value (KV) cache a first-order serving cost. Because the cache grows linearly with context length, it can exhaust GPU memory, force smaller batches, and reduce serving throughput. Prior KV cache compression techniques typically target only the sequence dimension or only the channel dimension, which leaves limited headroom as context windows scale. Compressing both dimensions promises higher memory reduction, but applying the two forms of compression directly leads to significant accuracy loss. This paper introduces MosaicKV, a dynamic two-D (dimensional) KV cache compression system for extremely long-context serving. MosaicKV uses dynamic two-D compression to address the accuracy challenge, exploiting the non-uniform importance distribution of elements within the KV cache. Instead of applying one compression pattern globally, MosaicKV identifies important elements for each KV vector and selects compression strategies at the granularity of KV cache segments. To address the performance challenge, where fine-grained sparsity and compression management overhead can offset the gains from compression, MosaicKV introduces compressed KV cache management. This mechanism uses underutilized GPU and CPU resources to maintain compressed KV caches and accelerate attention computation. Evaluation on an H800 GPU with multiple LLMs shows that MosaicKV delivers up to 16x attention speedup, 4.8x lower decode latency, and 7.3x higher throughput than the uncompressed baseline. At the same time, it reduces memory usage by 3x and incurs only 1.76% average accuracy loss on LongBench and RULER.", "arxiv_id": "2607.00760", "arxiv_url": "https://arxiv.org/abs/2607.00760", "authors": ["Sheng Qiang", "Ruiwei Chen", "Yinpeng Wu", "Jinyu Gu", "Zhichao Hua", "Yubin Xia", "Binyu Zang", "Haibo Chen"], "brief": "\u63d0\u51faMosaicKV\uff0c\u4e00\u79cd\u9762\u5411\u8d85\u957f\u4e0a\u4e0b\u6587LLM\u670d\u52a1\u7684\u52a8\u6001\u4e8c\u7ef4KV\u7f13\u5b58\u538b\u7f29\u7cfb\u7edf\uff0c\u540c\u65f6\u5728\u5e8f\u5217\u7ef4\u5ea6\u548c\u901a\u9053\u7ef4\u5ea6\u8fdb\u884c\u81ea\u9002\u5e94\u538b\u7f29\uff0c\u901a\u8fc7\u8bc6\u522bKV\u7f13\u5b58\u4e2d\u5143\u7d20\u7684\u975e\u5747\u5300\u91cd\u8981\u6027\u5206\u5e03\uff0c\u6309\u6bb5\u7c92\u5ea6\u9009\u62e9\u538b\u7f29\u7b56\u7565\u3002", "categories": ["cs.LG", "cs.DC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00760", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u52a8\u6001\u4e8c\u7ef4\u538b\u7f29\uff1a\u9488\u5bf9\u6bcf\u4e2aKV\u5411\u91cf\u8bc6\u522b\u91cd\u8981\u5143\u7d20\uff0c\u6309\u7f13\u5b58\u6bb5\u7c92\u5ea6\u81ea\u9002\u5e94\u9009\u62e9\u538b\u7f29\u7b56\u7565\uff0c\u907f\u514d\u5168\u5c40\u5355\u4e00\u538b\u7f29\u5bfc\u81f4\u7684\u7cbe\u5ea6\u635f\u5931", "\u538b\u7f29KV\u7f13\u5b58\u7ba1\u7406\u673a\u5236\uff1a\u5229\u7528\u95f2\u7f6eGPU/CPU\u8d44\u6e90\u7ef4\u62a4\u538b\u7f29\u7f13\u5b58\u5e76\u52a0\u901f\u6ce8\u610f\u529b\u8ba1\u7b97\uff0c\u62b5\u6d88\u7ec6\u7c92\u5ea6\u7a00\u758f\u7ba1\u7406\u5f00\u9500", "\u5728H800 GPU\u4e0a\u5b9e\u6d4b\uff1a\u6ce8\u610f\u529b\u8ba1\u7b97\u52a0\u901f16x\uff0c\u89e3\u7801\u5ef6\u8fdf\u964d\u4f4e4.8x\uff0c\u541e\u5410\u91cf\u63d0\u53477.3x\uff0c\u5185\u5b58\u51cf\u5c113x\uff0cLongBench/RULER\u5e73\u5747\u7cbe\u5ea6\u635f\u5931\u4ec51.76%"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "KV\u7f13\u5b58", "\u957f\u4e0a\u4e0b\u6587\u63a8\u7406", "\u7cfb\u7edf\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00760v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MosaicKV: Serving Long-Context LLM with Dynamic Two-D KV Cache Compression", "tldr": "MosaicKV\uff1a\u52a8\u6001\u4e8c\u7ef4KV\u7f13\u5b58\u538b\u7f29\u7cfb\u7edf\uff0c\u5927\u5e45\u63d0\u5347\u957f\u4e0a\u4e0b\u6587LLM\u63a8\u7406\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faMosaicKV\uff0c\u4e00\u79cd\u9762\u5411\u8d85\u957f\u4e0a\u4e0b\u6587LLM\u670d\u52a1\u7684\u52a8\u6001\u4e8c\u7ef4KV\u7f13\u5b58\u538b\u7f29\u7cfb\u7edf\uff0c\u540c\u65f6\u5728\u5e8f\u5217\u7ef4\u5ea6\u548c\u901a\u9053\u7ef4\u5ea6\u8fdb\u884c\u81ea\u9002\u5e94\u538b\u7f29\uff0c\u901a\u8fc7\u8bc6\u522bKV\u7f13\u5b58\u4e2d\u5143\u7d20\u7684\u975e\u5747\u5300\u91cd\u8981\u6027\u5206\u5e03\uff0c\u6309\u6bb5\u7c92\u5ea6\u9009\u62e9\u538b\u7f29\u7b56\u7565\u3002", "why_notable": "\u9996\u4e2a\u540c\u65f6\u538b\u7f29\u5e8f\u5217\u4e0e\u901a\u9053\u4e24\u4e2a\u7ef4\u5ea6\u7684KV\u7f13\u5b58\u7cfb\u7edf\uff0c\u5728\u4fdd\u6301\u7cbe\u5ea6\u7684\u524d\u63d0\u4e0b\u5b9e\u73b0\u6781\u9ad8\u538b\u7f29\u6bd4\uff0c\u5bf9\u767e\u4e07token\u7ea7\u957f\u4e0a\u4e0b\u6587LLM\u670d\u52a1\u7684\u5b9e\u9645\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u4ef7\u503c\u3002"}, {"abstract": "Knowing which training examples drive outputs is fundamental to auditing, correcting, and understanding language models, yet for modern LLMs this remains expensive, approximate, and largely post-hoc. Standard language models generate tokens through a dense network pathway, causing training data\u0027s influence to be distributed across parameters rather than organized along explicit, traceable components. We introduce a prototype language model architecture, Prototypes for Interpretable Sequence Modeling (PRISM), that forms each prediction via a sparse, non-negative mixture of learned prototypes, trained with clustering objectives that anchor each prototype to coherent neighborhoods of training examples. Across architectures from 130M to 1.6B parameters trained on up to 50B tokens, prototype language models either surpass or remain within 2.5 percentage points on average downstream accuracy of matched dense baselines. We show that sparse prototype structure localizes curvature in the loss landscape, yielding a more tractable Hessian and enabling training data attribution that is ~500x faster than post hoc baselines when consuming equivalent memory. Calibrating linear prototype controllers can improve downstream accuracy by roughly 3 points while tracing those corrections back to training neighborhoods, and targeted prototype suppression can remove model behaviors without finetuning or measurable loss in generation quality.", "arxiv_id": "2607.00510", "arxiv_url": "https://arxiv.org/abs/2607.00510", "authors": ["Dan Ley", "Giang Nguyen", "Himabindu Lakkaraju", "Julius Adebayo"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u540d\u4e3aPRISM\u7684\u539f\u578b\u8bed\u8a00\u6a21\u578b\u67b6\u6784\uff0c\u6bcf\u6b21\u9884\u6d4b\u901a\u8fc7\u7a00\u758f\u975e\u8d1f\u7684\u5b66\u4e60\u539f\u578b\u6df7\u5408\u751f\u6210\uff0c\u4f7f\u8bad\u7ec3\u6570\u636e\u5f71\u54cd\u53ef\u8ffd\u6eaf\uff0c\u540c\u65f6\u4fdd\u6301\u4e0e\u6807\u51c6\u5bc6\u96c6\u6a21\u578b\u76f8\u5f53\u7684\u6027\u80fd\u3002", "categories": ["cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00510", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u7a00\u758f\u539f\u578b\u7ed3\u6784\u4f7f\u8bad\u7ec3\u6570\u636e\u5f52\u56e0\u901f\u5ea6\u6bd4\u4e8b\u540e\u57fa\u7ebf\u5feb\u7ea6500\u500d\uff0c\u4e14\u5185\u5b58\u6d88\u8017\u76f8\u5f53", "\u5728130M\u52301.6B\u53c2\u6570\u89c4\u6a21\u4e0a\uff0c\u4e0b\u6e38\u51c6\u786e\u7387\u4e0e\u5bc6\u96c6\u57fa\u7ebf\u76f8\u5dee\u4e0d\u8d85\u8fc72.5\u4e2a\u767e\u5206\u70b9", "\u7ebf\u6027\u539f\u578b\u63a7\u5236\u5668\u53ef\u5c06\u4e0b\u6e38\u51c6\u786e\u7387\u63d0\u5347\u7ea63\u4e2a\u70b9\uff0c\u5e76\u53ef\u5728\u4e0d\u5fae\u8c03\u7684\u60c5\u51b5\u4e0b\u5b9a\u5411\u6291\u5236\u7279\u5b9a\u6a21\u578b\u884c\u4e3a"], "keywords": ["\u53ef\u89e3\u91ca\u6027", "\u8bed\u8a00\u6a21\u578b", "\u8bad\u7ec3\u6570\u636e\u5f52\u56e0", "\u7a00\u758f\u8868\u793a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.00510v1", "published_at": "2026-07-01", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Prototype Language Models", "tldr": "\u63d0\u51faPRISM\u539f\u578b\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u7a00\u758f\u539f\u578b\u6df7\u5408\u5b9e\u73b0\u8bad\u7ec3\u6570\u636e\u6eaf\u6e90\uff0c\u901f\u5ea6\u63d0\u5347500\u500d", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u540d\u4e3aPRISM\u7684\u539f\u578b\u8bed\u8a00\u6a21\u578b\u67b6\u6784\uff0c\u6bcf\u6b21\u9884\u6d4b\u901a\u8fc7\u7a00\u758f\u975e\u8d1f\u7684\u5b66\u4e60\u539f\u578b\u6df7\u5408\u751f\u6210\uff0c\u4f7f\u8bad\u7ec3\u6570\u636e\u5f71\u54cd\u53ef\u8ffd\u6eaf\uff0c\u540c\u65f6\u4fdd\u6301\u4e0e\u6807\u51c6\u5bc6\u96c6\u6a21\u578b\u76f8\u5f53\u7684\u6027\u80fd\u3002", "why_notable": "\u9996\u6b21\u5c06\u539f\u578b\u7f51\u7edc\u601d\u60f3\u7cfb\u7edf\u5f15\u5165\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u5728\u51e0\u4e4e\u4e0d\u635f\u5931\u6027\u80fd\u7684\u524d\u63d0\u4e0b\u5b9e\u73b0\u4e86\u9ad8\u6548\u3001\u53ef\u89e3\u91ca\u7684\u8bad\u7ec3\u6570\u636e\u5f52\u56e0\uff0c\u5bf9\u6a21\u578b\u5ba1\u8ba1\u3001\u7ea0\u9519\u548c\u884c\u4e3a\u63a7\u5236\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Authority bias poses a critical safety concern in language models: models systematically prioritize social cues from authority figures over factual consistency, swaying their answers based on source credibility rather than evidence. We mechanistically investigate this phenomenon using a controlled medical QA setting, where hints suggesting incorrect answers are attributed to personas of varying expertise. Across Llama-3.1-8B, Qwen3-8B, and Gemma-2-9B, we find that models respond in a graded manner proportional to perceived authority, a hierarchy that is never explicitly prompted but emerges from training. Logit lens analysis and linear/non-linear probing localize this effect to a critical late layer where correct answer representations are actively erased, an erasure that scales with authority level, resists mean vector intervention, and is only partially reversible through chain-of-thought reasoning. Our findings suggest that authority-induced sycophancy is not a surface-level output bias but mechanistic knowledge erasure, a precise, layer-localized overwriting of correct internal representations by high-status authority signals.", "arxiv_id": "2607.00415", "arxiv_url": "https://arxiv.org/abs/2607.00415", "authors": ["Emil Joswin", "Srujananjali Medicherla", "Priyanka Mary Mammen"], "brief": "\u672c\u6587\u901a\u8fc7\u53d7\u63a7\u533b\u7597QA\u5b9e\u9a8c\uff0c\u673a\u5236\u6027\u5730\u7814\u7a76\u4e86LLM\u4e2d\u7684\u6743\u5a01\u5c42\u7ea7\u8c04\u5a9a\u73b0\u8c61\uff0c\u63ed\u793a\u6a21\u578b\u4f1a\u6309\u611f\u77e5\u6743\u5a01\u7b49\u7ea7\u5206\u7ea7\u54cd\u5e94\u9519\u8bef\u63d0\u793a\uff0c\u4e14\u8fd9\u4e00\u6548\u5e94\u6e90\u4e8e\u8bad\u7ec3\u4e2d\u6d8c\u73b0\u7684\u9690\u5f0f\u6743\u5a01\u5c42\u7ea7\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.00415", "impact_score": 8, "is_agent": f
