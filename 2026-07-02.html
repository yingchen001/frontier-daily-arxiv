: "WorldDirector\uff1a\u89e3\u8026\u8bed\u4e49\u8fd0\u52a8\u4e0e\u89c6\u89c9\u751f\u6210\u7684\u53ef\u63a7\u89c6\u9891\u4e16\u754c\u6a21\u578b\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faWorldDirector\u6846\u67b6\uff0c\u901a\u8fc7LLM\u534f\u8c033D\u8f68\u8ff9\u4e0e\u76f8\u673a\u8fd0\u52a8\uff0c\u5c06\u8bed\u4e49\u8fd0\u52a8\u7f16\u6392\u4e0e\u89c6\u89c9\u751f\u6210\u89e3\u8026\uff0c\u5b9e\u73b0\u5177\u6709\u6301\u4e45\u52a8\u6001\u5bf9\u8c61\u8bb0\u5fc6\u548c\u65e0\u9650\u89c6\u89d2\u63a2\u7d22\u7684\u53ef\u63a7\u89c6\u9891\u4e16\u754c\u6a21\u578b\u3002", "why_notable": "\u73b0\u6709\u4e16\u754c\u6a21\u578b\u4f9d\u8d56\u8fde\u7eed\u89c6\u89c9\u89c2\u6d4b\u7ef4\u6301\u8fd0\u52a8\uff0c\u96be\u4ee5\u5904\u7406\u7269\u4f53\u6d88\u5931\u540e\u7684\u91cd\u73b0\u95ee\u9898\uff1bWorldDirector\u901a\u8fc7\u663e\u5f0f\u89e3\u8026\u8fd0\u52a8\u4e0e\u6e32\u67d3\uff0c\u4ece\u6839\u672c\u4e0a\u89e3\u51b3\u4e86\u52a8\u6001\u5bf9\u8c61\u6301\u4e45\u8bb0\u5fc6\u96be\u9898\uff0c\u5bf9\u81ea\u52a8\u9a7e\u9a76\u3001\u6e38\u620f\u3001\u5177\u8eab\u667a\u80fd\u7b49\u573a\u666f\u5177\u6709\u91cd\u8981\u5e94\u7528\u4ef7\u503c\u3002"}, {"abstract": "Scientific machine learning papers typically make computational claims, e.g., that the relative mean square error is less than 5% or that the 95% predictive credible interval covers the test data. A coding agent can be prompted to replicate those claims from paper materials alone, but the prompt does not by itself reliably preserve progress or check whether generated evidence supports the paper\u0027s claims. We introduce Paper-replication, a workflow that makes each selected paper claim a target with recorded evidence, and implement it as a coding-agent skill. The workflow makes the agent record those targets, reconstruct the paper\u0027s method, run computational experiments, link generated outputs to provenance and comparisons with the paper\u0027s claims, record where matched evidence appears in the replication report, and pass validation checks before completion. We evaluate Paper-replication on twelve independent runs across four scientific machine learning papers. All twelve workspaces pass the completion gate, and all 158 recorded targets are matched with report coverage. Even in this completed workspace state, repeated runs differ in how papers are divided into targets, in numerical fidelity to the source papers, in elapsed replication time, in the number of intermediate executions replaced before final evidence is accepted, and in the rules used to accept evidence. Paper-replication makes completion depend on workspace evidence and validation checks rather than on the agent\u0027s final message.", "arxiv_id": "2607.02134", "arxiv_url": "https://arxiv.org/abs/2607.02134", "authors": ["Atharva Hans", "Ilias Bilionis"], "brief": "\u63d0\u51faPaper-replication\u5de5\u4f5c\u6d41\uff0c\u8ba9\u7f16\u7801\u667a\u80fd\u4f53\u4ece\u8bba\u6587\u6750\u6599\u51fa\u53d1\uff0c\u81ea\u52a8\u91cd\u5efa\u65b9\u6cd5\u3001\u8fd0\u884c\u5b9e\u9a8c\u3001\u8bb0\u5f55\u8bc1\u636e\u5e76\u9a8c\u8bc1\u662f\u5426\u4e0e\u8bba\u6587\u58f0\u660e\u4e00\u81f4\uff0c\u5b9e\u73b0\u79d1\u5b66\u673a\u5668\u5b66\u4e60\u8bba\u6587\u7684\u81ea\u52a8\u590d\u73b0\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02134", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u57284\u7bc7\u79d1\u5b66\u673a\u5668\u5b66\u4e60\u8bba\u6587\u4e0a\u8fdb\u884c12\u6b21\u72ec\u7acb\u8fd0\u884c\uff0c\u6240\u6709\u5de5\u4f5c\u7a7a\u95f4\u5747\u901a\u8fc7\u5b8c\u6210\u95e8\u63a7\uff0c158\u4e2a\u8bb0\u5f55\u76ee\u6807\u5168\u90e8\u5339\u914d\u62a5\u544a\u8986\u76d6", "\u5de5\u4f5c\u6d41\u5f3a\u5236\u667a\u80fd\u4f53\u8bb0\u5f55\u76ee\u6807\u3001\u94fe\u63a5\u8f93\u51fa\u6eaf\u6e90\u3001\u4e0e\u8bba\u6587\u58f0\u660e\u5bf9\u6bd4\uff0c\u5e76\u901a\u8fc7\u9a8c\u8bc1\u68c0\u67e5\u624d\u7b97\u5b8c\u6210\uff0c\u800c\u975e\u4f9d\u8d56\u667a\u80fd\u4f53\u6700\u7ec8\u6d88\u606f", "\u591a\u6b21\u8fd0\u884c\u4e4b\u95f4\u5b58\u5728\u5dee\u5f02\uff1a\u8bba\u6587\u76ee\u6807\u5212\u5206\u65b9\u5f0f\u3001\u6570\u503c\u4fdd\u771f\u5ea6\u3001\u590d\u73b0\u8017\u65f6\u53ca\u8bc1\u636e\u63a5\u53d7\u89c4\u5219\u5404\u6709\u4e0d\u540c"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u79d1\u5b66\u673a\u5668\u5b66\u4e60", "\u8bba\u6587\u590d\u73b0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02134v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Coding-agents can replicate scientific machine learning papers", "tldr": "\u7f16\u7801\u667a\u80fd\u4f53\u53ef\u81ea\u52a8\u590d\u73b0\u79d1\u5b66\u673a\u5668\u5b66\u4e60\u8bba\u6587\u7684\u8ba1\u7b97\u58f0\u660e\uff0c\u6210\u529f\u7387\u8fbe100%", "upvotes": 0, "what_it_is": "\u63d0\u51faPaper-replication\u5de5\u4f5c\u6d41\uff0c\u8ba9\u7f16\u7801\u667a\u80fd\u4f53\u4ece\u8bba\u6587\u6750\u6599\u51fa\u53d1\uff0c\u81ea\u52a8\u91cd\u5efa\u65b9\u6cd5\u3001\u8fd0\u884c\u5b9e\u9a8c\u3001\u8bb0\u5f55\u8bc1\u636e\u5e76\u9a8c\u8bc1\u662f\u5426\u4e0e\u8bba\u6587\u58f0\u660e\u4e00\u81f4\uff0c\u5b9e\u73b0\u79d1\u5b66\u673a\u5668\u5b66\u4e60\u8bba\u6587\u7684\u81ea\u52a8\u590d\u73b0\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u7f16\u7801\u667a\u80fd\u4f53\u7528\u4e8e\u79d1\u5b66\u8bba\u6587\u590d\u73b0\uff0c\u5e76\u8bbe\u8ba1\u4e86\u53ef\u9760\u7684\u5b8c\u6210\u9a8c\u8bc1\u673a\u5236\uff0c\u5bf9\u63d0\u5347\u79d1\u5b66\u7814\u7a76\u53ef\u91cd\u590d\u6027\u548c\u81ea\u52a8\u5316\u8bc4\u4f30\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Long-context reasoning requires models to locate, revise, and synthesize evidence distributed across lengthy inputs. Existing long-context RL methods usually reward final answers or static evidence extraction, offering little feedback on how intermediate actions change the model\u0027s evidence state. We propose Maven, a reinforcement learning framework with an editable evidence memory. Maven defines an answer-conditioned evidence-state value and rewards action-level state transitions: add actions are credited by marginal gain and hindsight contribution, link actions by evidence synergy, and drop actions by improved answer support after removing misleading evidence. These rewards are assigned to the corresponding action spans in GRPO. Across Llama and Qwen models on LongBench v2, LongReason, and RULER, Maven outperforms outcome-only RL and evidence-identification baselines, producing more sufficient evidence sets and lower distractor retention. Our results show that long-context RL benefits from optimizing stateful evidence navigation rather than one-shot evidence extraction.", "arxiv_id": "2607.02073", "arxiv_url": "https://arxiv.org/abs/2607.02073", "authors": ["Ya Gao", "Pekka Marttinen"], "brief": "\u63d0\u51faMaven\u5f3a\u5316\u5b66\u4e60\u6846\u67b6\uff0c\u901a\u8fc7\u53ef\u7f16\u8f91\u8bc1\u636e\u8bb0\u5fc6\u5b9a\u4e49\u7b54\u6848\u6761\u4ef6\u4e0b\u7684\u8bc1\u636e\u72b6\u6001\u4ef7\u503c\uff0c\u5bf9\u6dfb\u52a0\u3001\u94fe\u63a5\u3001\u5220\u9664\u4e09\u7c7b\u52a8\u4f5c\u5206\u522b\u8bbe\u8ba1\u5956\u52b1\uff0c\u4f18\u5316\u957f\u6587\u672c\u63a8\u7406\u4e2d\u7684\u8bc1\u636e\u5bfc\u822a\u8fc7\u7a0b\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02073", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5b9a\u4e49\u4e09\u7c7b\u52a8\u4f5c\u5956\u52b1\uff1aadd\u52a8\u4f5c\u6309\u8fb9\u9645\u589e\u76ca\u548c\u540e\u89c1\u8d21\u732e\u8ba1\u5206\uff0clink\u52a8\u4f5c\u6309\u8bc1\u636e\u534f\u540c\u6548\u5e94\u8ba1\u5206\uff0cdrop\u52a8\u4f5c\u6309\u79fb\u9664\u8bef\u5bfc\u8bc1\u636e\u540e\u7684\u7b54\u6848\u652f\u6301\u5ea6\u63d0\u5347\u8ba1\u5206", "\u5c06\u52a8\u4f5c\u7ea7\u5956\u52b1\u6574\u5408\u8fdbGRPO\u8bad\u7ec3\uff0c\u5bf9\u5e94\u52a8\u4f5cspan\u5206\u522b\u8d4b\u4e88\u5956\u52b1\u4fe1\u53f7", "\u5728LongBench v2\u3001LongReason\u3001RULER\u4e09\u4e2a\u57fa\u51c6\u4e0a\uff0cMaven\u8d85\u8d8a\u4ec5\u7528\u6700\u7ec8\u7b54\u6848\u5956\u52b1\u548c\u8bc1\u636e\u8bc6\u522b\u57fa\u7ebf\uff0c\u4ea7\u751f\u66f4\u5145\u5206\u7684\u8bc1\u636e\u96c6\u4e14\u5e72\u6270\u9879\u4fdd\u7559\u7387\u66f4\u4f4e"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u957f\u6587\u672c\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8bc1\u636e\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02073v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Evidence-State Rewards for Long-Context Reasoning", "tldr": "Maven\u6846\u67b6\u7528\u53ef\u7f16\u8f91\u8bc1\u636e\u8bb0\u5fc6\u4e3a\u957f\u6587\u672c\u63a8\u7406\u63d0\u4f9b\u7ec6\u7c92\u5ea6\u52a8\u4f5c\u7ea7\u5956\u52b1\u4fe1\u53f7", "upvotes": 0, "what_it_is": "\u63d0\u51faMaven\u5f3a\u5316\u5b66\u4e60\u6846\u67b6\uff0c\u901a\u8fc7\u53ef\u7f16\u8f91\u8bc1\u636e\u8bb0\u5fc6\u5b9a\u4e49\u7b54\u6848\u6761\u4ef6\u4e0b\u7684\u8bc1\u636e\u72b6\u6001\u4ef7\u503c\uff0c\u5bf9\u6dfb\u52a0\u3001\u94fe\u63a5\u3001\u5220\u9664\u4e09\u7c7b\u52a8\u4f5c\u5206\u522b\u8bbe\u8ba1\u5956\u52b1\uff0c\u4f18\u5316\u957f\u6587\u672c\u63a8\u7406\u4e2d\u7684\u8bc1\u636e\u5bfc\u822a\u8fc7\u7a0b\u3002", "why_notable": "\u9996\u6b21\u5c06\u957f\u6587\u672cRL\u7684\u5956\u52b1\u7c92\u5ea6\u4ece\u6700\u7ec8\u7b54\u6848\u7ec6\u5316\u5230\u4e2d\u95f4\u8bc1\u636e\u72b6\u6001\u8f6c\u79fb\uff0c\u89e3\u51b3\u4e86\u7a00\u758f\u5956\u52b1\u95ee\u9898\uff0c\u5bf9\u63d0\u5347LLM\u957f\u6587\u672c\u63a8\u7406\u80fd\u529b\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Disaggregated LLM serving runs prefill and decode on separate GPU pools to keep the two phases from interfering. In practice, this creates a new asymmetry: under bursty, heavy-tailed workloads prefill nodes saturate while decode nodes have compute underutilized, and on a production-style A100 cluster with 2 prefill and 2 decode nodes (2P2D), we find that prefill execution accounts for only 2-23% of P95 Time-to-First-Token (TTFT). Queuing and inter-node GPU-GPU KV-cache transfer account for the rest. We present a proactive prefill-deflecting scheduler that lets decode nodes serve prefill phase of requests as chunked-prefill steps interleaved with their in-flight decode batches. For each queued request, we estimate the TTFT it would see on the prefill node, and on every decode node, search for the largest chunk schedule that keeps in-flight decodes within their Time-Between-Tokens (TBT) SLO and deflect when the decode path helps tail latency. Because the prefill phase of deflected requests runs in place on the decode node, the inter-node KV transfer is eliminated. Implemented on vLLM and evaluated on production-style traces with DeepSeek-V2-Lite, our approach reduces P95 TTFT by upto 81% and raises SLO attainment by upto 79% over state-of-the-art disaggregated schedulers, at sub-millisecond per-request routing cost.", "arxiv_id": "2607.02043", "arxiv_url": "https://arxiv.org/abs/2607.02043", "authors": ["Shrikara Arun", "Anjaly Parayil", "Srikant Bharadwaj", "Renee St. Amant", "Victor R\u00fchle"], "brief": "\u9488\u5bf9\u5206\u79bb\u5f0fLLM\u63a8\u7406\u4e2d\u9884\u586b\u5145\u8282\u70b9\u9971\u548c\u3001\u89e3\u7801\u8282\u70b9\u7b97\u529b\u95f2\u7f6e\u7684\u4e0d\u5bf9\u79f0\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u79cd\u8d1f\u8f7d\u611f\u77e5\u7684\u9884\u586b\u5145\u504f\u8f6c\u8c03\u5ea6\u5668\uff0c\u5141\u8bb8\u89e3\u7801\u8282\u70b9\u4ee5\u5206\u5757\u65b9\u5f0f\u627f\u62c5\u9884\u586b\u5145\u4efb\u52a1\uff0c\u540c\u65f6\u6d88\u9664\u8de8\u8282\u70b9KV\u7f13\u5b58\u4f20\u8f93\u5f00\u9500\u3002", "categories": ["cs.DC", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02043", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u57282P2D A100\u96c6\u7fa4\u4e0a\u53d1\u73b0\u9884\u586b\u5145\u6267\u884c\u4ec5\u5360P95 TTFT\u76842-23%\uff0c\u6392\u961f\u548cKV\u4f20\u8f93\u624d\u662f\u4e3b\u8981\u74f6\u9888", "\u8c03\u5ea6\u5668\u4e3a\u6bcf\u4e2a\u8bf7\u6c42\u4f30\u7b97TTFT\uff0c\u641c\u7d22\u6700\u5927\u5206\u5757\u65b9\u6848\u4f7f\u89e3\u7801\u6279\u6b21\u6ee1\u8db3TBT SLO\uff0c\u504f\u8f6c\u540eKV\u4f20\u8f93\u5b8c\u5168\u6d88\u9664", "\u57fa\u4e8evLLM\u5b9e\u73b0\uff0c\u5728DeepSeek-V2-Lite\u4e0aP95 TTFT\u964d\u4f4e\u6700\u9ad881%\uff0cSLO\u8fbe\u6210\u7387\u63d0\u5347\u6700\u9ad879%\uff0c\u5355\u8bf7\u6c42\u8def\u7531\u5f00\u9500\u4f4e\u4e8e1\u6beb\u79d2"], "keywords": ["LLM\u63a8\u7406", "\u5206\u5e03\u5f0f\u7cfb\u7edf", "\u8c03\u5ea6\u4f18\u5316", "\u670d\u52a1\u8d28\u91cf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02043v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Towards Load-Aware Prefill Deflection for Disaggregated LLM Serving", "tldr": "\u63d0\u51fa\u4e3b\u52a8\u9884\u586b\u5145\u504f\u8f6c\u8c03\u5ea6\u5668\uff0c\u5c06\u9971\u548c\u9884\u586b\u5145\u8282\u70b9\u7684\u8bf7\u6c42\u8f6c\u79fb\u81f3\u89e3\u7801\u8282\u70b9\u5904\u7406\uff0c\u5927\u5e45\u964d\u4f4e\u5c3e\u5ef6\u8fdf", "upvotes": 0, "what_it_is": "\u9488\u5bf9\u5206\u79bb\u5f0fLLM\u63a8\u7406\u4e2d\u9884\u586b\u5145\u8282\u70b9\u9971\u548c\u3001\u89e3\u7801\u8282\u70b9\u7b97\u529b\u95f2\u7f6e\u7684\u4e0d\u5bf9\u79f0\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u79cd\u8d1f\u8f7d\u611f\u77e5\u7684\u9884\u586b\u5145\u504f\u8f6c\u8c03\u5ea6\u5668\uff0c\u5141\u8bb8\u89e3\u7801\u8282\u70b9\u4ee5\u5206\u5757\u65b9\u5f0f\u627f\u62c5\u9884\u586b\u5145\u4efb\u52a1\uff0c\u540c\u65f6\u6d88\u9664\u8de8\u8282\u70b9KV\u7f13\u5b58\u4f20\u8f93\u5f00\u9500\u3002", "why_notable": "\u7cbe\u51c6\u5b9a\u4f4d\u5206\u79bb\u5f0f\u63a8\u7406\u7684\u771f\u5b9e\u74f6\u9888\u5e76\u7ed9\u51fa\u7cfb\u7edf\u7ea7\u89e3\u51b3\u65b9\u6848\uff0c\u5728\u751f\u4ea7\u7ea7\u8d1f\u8f7d\u4e0b\u53d6\u5f97\u663e\u8457\u6027\u80fd\u63d0\u5347\uff0c\u5bf9\u5de5\u4e1a\u754cLLM\u63a8\u7406\u96c6\u7fa4\u4f18\u5316\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multimodal large language models must continually adapt to evolving tasks and domains, yet standard continual learning metrics mainly measure whether old answers remain correct, leaving the stability of multimodal grounding largely unexamined. We study this overlooked failure mode and ask whether a continually adapted MLLM can preserve not only what it answers, but also how it uses visual, textual, OCR, chart, and document evidence. We identify \\emph{hidden evidence-use forgetting}, where answer accuracy is retained while the model silently shifts toward different or less grounded evidence channels, and propose \\textsc{RCL}, a replay-free reliance-constrained continual learning framework. \\textsc{RCL} freezes the previous checkpoint as a behavioral reference, estimates teacher and student evidence-reliance profiles through counterfactual channel interventions, and jointly optimizes task learning, prediction preservation, and reliance preservation without adding inference-time cost. Across CoIN, COAST, MCITlib, and an evidence-sensitive multimodal stream, \\textsc{RCL} consistently improves final performance and reduces forgetting over replay-free, PEFT, routing, and memory-assisted baselines, while substantially lowering modality reliance drift, dominant evidence flips, and hidden forgetting rates. These results suggest that robust continual multimodal learning requires preserving the evidence path behind correct answers, not merely the answers themselves.", "arxiv_id": "2607.02020", "arxiv_url": "https://arxiv.org/abs/2607.02020", "authors": ["Qianyu Chen", "Canran Xiao", "Runxuan Tang"], "brief": "\u672c\u6587\u53d1\u73b0\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u6301\u7eed\u5b66\u4e60\u4e2d\u5b58\u5728\"\u9690\u6027\u8bc1\u636e\u9057\u5fd8\"\u73b0\u8c61\u2014\u2014\u7b54\u6848\u51c6\u786e\u7387\u4fdd\u6301\u4e0d\u53d8\uff0c\u4f46\u6a21\u578b\u5185\u90e8\u4f7f\u7528\u7684\u89c6\u89c9/\u6587\u672c/OCR\u7b49\u8bc1\u636e\u901a\u9053\u5df2\u6084\u7136\u6539\u53d8\u3002\u4e3a\u6b64\u63d0\u51faRCL\u6846\u67b6\uff0c\u901a\u8fc7\u53cd\u4e8b\u5b9e\u901a\u9053\u5e72\u9884\u7ea6\u675f\u8bc1\u636e\u4f9d\u8d56\u884c\u4e3a\uff0c\u5728\u65e0\u9700\u56de\u653e\u6570\u636e\u7684\u60c5\u51b5\u4e0b\u540c\u65f6\u4fdd\u6301\u4efb\u52a1\u6027\u80fd\u4e0e\u8bc1\u636e\u4f7f\u7528\u7a33\u5b9a\u6027\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02020", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5b9a\u4e49\"\u9690\u6027\u8bc1\u636e\u9057\u5fd8\"\uff1a\u7b54\u6848\u6b63\u786e\u7387\u4e0d\u964d\u4f46\u6a21\u578b\u4f9d\u8d56\u7684\u8bc1\u636e\u901a\u9053\u53d1\u751f\u6f02\u79fb\uff0c\u4f20\u7edf\u6307\u6807\u65e0\u6cd5\u68c0\u6d4b", "RCL\u6846\u67b6\uff1a\u51bb\u7ed3\u524d\u4e00\u68c0\u67e5\u70b9\u4f5c\u4e3a\u884c\u4e3a\u53c2\u8003\uff0c\u901a\u8fc7\u53cd\u4e8b\u5b9e\u901a\u9053\u5e72\u9884\u4f30\u8ba1\u5e08\u751f\u8bc1\u636e\u4f9d\u8d56\u5206\u5e03\uff0c\u8054\u5408\u4f18\u5316\u4efb\u52a1\u5b66\u4e60\u3001\u9884\u6d4b\u4fdd\u6301\u4e0e\u4f9d\u8d56\u4fdd\u6301\uff0c\u65e0\u63a8\u7406\u989d\u5916\u5f00\u9500", "\u5728CoIN\u3001COAST\u3001MCITlib\u7b49\u591a\u4e2a\u57fa\u51c6\u4e0a\u4f18\u4e8e\u56de\u653e\u3001PEFT\u3001\u8def\u7531\u53ca\u8bb0\u5fc6\u8f85\u52a9\u57fa\u7ebf\uff0c\u663e\u8457\u964d\u4f4e\u6a21\u6001\u4f9d\u8d56\u6f02\u79fb\u548c\u4e3b\u5bfc\u8bc1\u636e\u7ffb\u8f6c\u7387"], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u591a\u6a21\u6001", "\u5927\u8bed\u8a00\u6a21\u578b", "\u707e\u96be\u6027\u9057\u5fd8"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02020v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Hidden Forgetting in Continual Multimodal Learning: When Accuracy Survives but Grounding Fails", "tldr": "\u6301\u7eed\u591a\u6a21\u6001\u5b66\u4e60\u4e2d\u7b54\u6848\u6b63\u786e\u4f46\u8bc1\u636e\u4f9d\u8d56\u6084\u7136\u6f02\u79fb\u7684\u9690\u6027\u9057\u5fd8\u95ee\u9898\u53ca\u65e0\u56de\u653e\u89e3\u51b3\u6846\u67b6", "upvotes": 0, "what_it_is": "\u672c\u6587\u53d1\u73b0\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u6301\u7eed\u5b66\u4e60\u4e2d\u5b58\u5728\"\u9690\u6027\u8bc1\u636e\u9057\u5fd8\"\u73b0\u8c61\u2014\u2014\u7b54\u6848\u51c6\u786e\u7387\u4fdd\u6301\u4e0d\u53d8\uff0c\u4f46\u6a21\u578b\u5185\u90e8\u4f7f\u7528\u7684\u89c6\u89c9/\u6587\u672c/OCR\u7b49\u8bc1\u636e\u901a\u9053\u5df2\u6084\u7136\u6539\u53d8\u3002\u4e3a\u6b64\u63d0\u51faRCL\u6846\u67b6\uff0c\u901a\u8fc7\u53cd\u4e8b\u5b9e\u901a\u9053\u5e72\u9884\u7ea6\u675f\u8bc1\u636e\u4f9d\u8d56\u884c\u4e3a\uff0c\u5728\u65e0\u9700\u56de\u653e\u6570\u636e\u7684\u60c5\u51b5\u4e0b\u540c\u65f6\u4fdd\u6301\u4efb\u52a1\u6027\u80fd\u4e0e\u8bc1\u636e\u4f7f\u7528\u7a33\u5b9a\u6027\u3002", "why_notable": "\u63ed\u793a\u4e86\u6301\u7eed\u5b66\u4e60\u8bc4\u4f30\u4f53\u7cfb\u7684\u91cd\u5927\u76f2\u70b9\u2014\u2014\u4ec5\u770b\u7b54\u6848\u51c6\u786e\u7387\u4e0d\u8db3\u4ee5\u4fdd\u8bc1\u6a21\u578b\u884c\u4e3a\u7a33\u5b9a\uff0c\u63d0\u51fa\u7684\u8bc1\u636e\u4f9d\u8d56\u4fdd\u6301\u8303\u5f0f\u4e3a\u591a\u6a21\u6001\u6301\u7eed\u5b66\u4e60\u63d0\u4f9b\u4e86\u65b0\u7684\u8bc4\u4f30\u7ef4\u5ea6\u548c\u65b9\u6cd5\u8bba\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u4e2d\u6a21\u578b\u53ef\u9760\u6027\u5177\u6709\u91cd\u8981\u610f\u4e49"}, {"abstract": "Multimodal large language models must adapt to evolving tasks and domains, yet continual improvement under bounded deployment footprint remains difficult because repeated parameter updates or growing replay stores can accumulate adaptation state over time. We study fixed-footprint continual adaptation: the deployed adaptation state is kept under a fixed memory budget, while the backbone model is left unchanged and task-specific updates are externalized. We propose InduceKV, a retrieval-based method that stores each selected training prefix as an attention-ready memory entry, consisting of a frozen retrieval key and compact layerwise key--value (KV) payloads that can be appended to the model\u0027s self-attention cache. Under a strict memory budget, InduceKV constructs a compact inducing set through bilevel selection: a lightweight calibration is fit for retrieval, while the selected memory balances current-task likelihood, anchor-based retention, and coverage in the frozen retrieval space. Across task-incremental instruction tuning, continual VQA, domain-incremental adaptation, and lifelong multimodal instruction tuning, InduceKV consistently improves over PEFT, MoE, replay, and prompt-retrieval baselines under matched memory budgets. We further report backbone-matched, stage-1 CoIN, compute-matched, and scalability diagnostics, showing that the gains are not due to a stronger backbone, replay alone, or an unbounded candidate pool.", "arxiv_id": "2607.02010", "arxiv_url": "https://arxiv.org/abs/2607.02010", "authors": ["Qianyu Chen", "Ziteng Feng", "Canran Xiao", "Runxuan Tang"], "brief": "\u63d0\u51faInduceKV\uff0c\u4e00\u79cd\u57fa\u4e8e\u68c0\u7d22\u7684\u6301\u7eed\u5b66\u4e60\u65b9\u6cd5\uff0c\u5c06\u8bad\u7ec3\u6837\u672c\u524d\u7f00\u5b58\u50a8\u4e3a\u6ce8\u610f\u529b\u5c31\u7eea\u7684KV\u8bb0\u5fc6\u6761\u76ee\uff0c\u901a\u8fc7\u53cc\u5c42\u9009\u62e9\u6784\u5efa\u7d27\u51d1\u8bf1\u5bfc\u96c6\uff0c\u5728\u56fa\u5b9a\u5185\u5b58\u9884\u7b97\u4e0b\u5b9e\u73b0\u591a\u6a21\u6001LLM\u7684\u6301\u7eed\u9002\u5e94\uff0c\u65e0\u9700\u4fee\u6539\u9aa8\u5e72\u6a21\u578b\u53c2\u6570\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02010", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u56fa\u5b9a\u5185\u5b58\u9884\u7b97\u7ea6\u675f\uff1a\u9002\u5e94\u72b6\u6001\uff08KV\u8bb0\u5fc6\uff09\u4fdd\u6301\u5728\u4e25\u683c\u5185\u5b58\u9650\u5236\u5185\uff0c\u9aa8\u5e72\u6a21\u578b\u53c2\u6570\u4e0d\u53d8", "\u53cc\u5c42\u9009\u62e9\u7b56\u7565\uff1a\u8f7b\u91cf\u7ea7\u6821\u51c6\u7528\u4e8e\u68c0\u7d22\uff0c\u540c\u65f6\u5e73\u8861\u5f53\u524d\u4efb\u52a1\u4f3c\u7136\u3001\u951a\u70b9\u4fdd\u7559\u548c\u51bb\u7ed3\u68c0\u7d22\u7a7a\u95f4\u8986\u76d6\u7387", "\u5728\u4efb\u52a1\u589e\u91cf\u6307\u4ee4\u5fae\u8c03\u3001\u6301\u7eedVQA\u3001\u9886\u57df\u589e\u91cf\u9002\u5e94\u7b49\u591a\u4e2a\u57fa\u51c6\u4e0a\uff0c\u4f18\u4e8ePEFT\u3001MoE\u3001\u56de\u653e\u548c\u63d0\u793a\u68c0\u7d22\u7b49\u57fa\u7ebf\u65b9\u6cd5"], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02010v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "InduceKV: Fixed-Footprint Continual Adaptation of Multimodal LLMs via Inducing KV Memories", "tldr": "\u56fa\u5b9a\u5185\u5b58\u9884\u7b97\u4e0b\u591a\u6a21\u6001LLM\u6301\u7eed\u9002\u5e94\u7684\u68c0\u7d22\u5f0fKV\u8bb0\u5fc6\u65b9\u6cd5", "upvotes": 0, "what_it_is": "\u63d0\u51faInduceKV\uff0c\u4e00\u79cd\u57fa\u4e8e\u68c0\u7d22\u7684\u6301\u7eed\u5b66\u4e60\u65b9\u6cd5\uff0c\u5c06\u8bad\u7ec3\u6837\u672c\u524d\u7f00\u5b58\u50a8\u4e3a\u6ce8\u610f\u529b\u5c31\u7eea\u7684KV\u8bb0\u5fc6\u6761\u76ee\uff0c\u901a\u8fc7\u53cc\u5c42\u9009\u62e9\u6784\u5efa\u7d27\u51d1\u8bf1\u5bfc\u96c6\uff0c\u5728\u56fa\u5b9a\u5185\u5b58\u9884\u7b97\u4e0b\u5b9e\u73b0\u591a\u6a21\u6001LLM\u7684\u6301\u7eed\u9002\u5e94\uff0c\u65e0\u9700\u4fee\u6539\u9aa8\u5e72\u6a21\u578b\u53c2\u6570\u3002", "why_notable": "\u89e3\u51b3\u4e86\u591a\u6a21\u6001LLM\u6301\u7eed\u5b66\u4e60\u4e2d\u5185\u5b58\u65e0\u9650\u589e\u957f\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5728\u4e25\u683c\u56fa\u5b9a\u5185\u5b58\u9884\u7b97\u4e0b\u5b9e\u73b0\u6709\u6548\u9002\u5e94\uff0c\u4e14\u901a\u8fc7\u591a\u9879\u6d88\u878d\u5b9e\u9a8c\u6392\u9664\u4e86\u9aa8\u5e72\u66f4\u5f3a\u3001\u65e0\u9650\u56de\u653e\u7b49\u6df7\u6dc6\u56e0\u7d20\uff0c\u65b9\u6cd5\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Evaluation benchmarks are essential for assessing vision-language models (VLMs), but most multimodal benchmarks are static, making them vulnerable to temporal staleness, data contamination, and costly maintenance. We present MMBench-Live, a continuously evolving multimodal benchmark built by a multi-agent-driven automated pipeline. Our framework treats benchmark evolution as task-guided dataset construction, integrating structured benchmark specification, feedback-controlled real-time data acquisition, and verifiable QA generation with executable reasoning. To maintain cross-version comparability, we introduce a distribution-consistent update strategy that extracts task-related visual patterns from the original benchmark to guide data collection and filtering. Instantiated from MMBench, MMBench-Live contains 5.9K newly generated evaluation instances with a high answer correctness rate, while each update costs about USD 30 and takes 1-2 hours. Extensive evaluations show that MMBench-Live preserves stable model rankings, maintains semantic alignment with the original benchmark, and exhibits weaker contamination-related memorization signals, suggesting a practical and scalable paradigm for sustainable multimodal benchmark evolution. The project is available at https://github.com/PRIS-CV/MMBench-Live.", "arxiv_id": "2607.01813", "arxiv_url": "https://arxiv.org/abs/2607.01813", "authors": ["Yuanzhi Liu", "Shousheng Zhao", "Bo Zhou", "Kongming Liang", "Zhanyu Ma"], "brief": "\u63d0\u51faMMBench-Live\uff0c\u4e00\u4e2a\u7531\u591a\u667a\u80fd\u4f53\u81ea\u52a8\u5316\u6d41\u6c34\u7ebf\u9a71\u52a8\u7684\u6301\u7eed\u6f14\u5316\u591a\u6a21\u6001\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7\u5206\u5e03\u4e00\u81f4\u6027\u66f4\u65b0\u7b56\u7565\u89e3\u51b3\u9759\u6001\u57fa\u51c6\u7684\u6570\u636e\u6c61\u67d3\u4e0e\u65f6\u6548\u6027\u95ee\u9898\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01813", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5305\u542b5900\u4e2a\u65b0\u751f\u6210\u8bc4\u6d4b\u5b9e\u4f8b\uff0c\u6bcf\u6b21\u66f4\u65b0\u4ec5\u9700\u7ea630\u7f8e\u5143\u548c1-2\u5c0f\u65f6", "\u5f15\u5165\u5206\u5e03\u4e00\u81f4\u6027\u66f4\u65b0\u7b56\u7565\uff0c\u4ece\u539f\u59cb\u57fa\u51c6\u63d0\u53d6\u89c6\u89c9\u6a21\u5f0f\u6307\u5bfc\u6570\u636e\u91c7\u96c6\uff0c\u4fdd\u8bc1\u8de8\u7248\u672c\u53ef\u6bd4\u6027", "\u5b9e\u9a8c\u9a8c\u8bc1\u6a21\u578b\u6392\u540d\u7a33\u5b9a\u3001\u8bed\u4e49\u5bf9\u9f50\u826f\u597d\uff0c\u4e14\u6570\u636e\u6c61\u67d3\u76f8\u5173\u8bb0\u5fc6\u4fe1\u53f7\u66f4\u5f31"], "keywords": ["\u591a\u6a21\u6001", "\u8bc4\u6d4b\u57fa\u51c6", "\u667a\u80fd\u4f53", "\u6570\u636e\u6c61\u67d3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01813v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MMBench-Live: A Continuously Evolving Benchmark for Multimodal Models", "tldr": "\u591a\u667a\u80fd\u4f53\u9a71\u52a8\u7684\u6301\u7eed\u6f14\u5316\u591a\u6a21\u6001\u8bc4\u6d4b\u57fa\u51c6\uff0c\u4f4e\u6210\u672c\u6297\u6c61\u67d3", "upvotes": 0, "what_it_is": "\u63d0\u51faMMBench-Live\uff0c\u4e00\u4e2a\u7531\u591a\u667a\u80fd\u4f53\u81ea\u52a8\u5316\u6d41\u6c34\u7ebf\u9a71\u52a8\u7684\u6301\u7eed\u6f14\u5316\u591a\u6a21\u6001\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7\u5206\u5e03\u4e00\u81f4\u6027\u66f4\u65b0\u7b56\u7565\u89e3\u51b3\u9759\u6001\u57fa\u51c6\u7684\u6570\u636e\u6c61\u67d3\u4e0e\u65f6\u6548\u6027\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c06\u591a\u6a21\u6001\u57fa\u51c6\u6f14\u5316\u7cfb\u7edf\u5316\u4e3a\u53ef\u81ea\u52a8\u6267\u884c\u7684\u6d41\u6c34\u7ebf\uff0c\u6781\u4f4e\u6210\u672c\u5b9e\u73b0\u6301\u7eed\u66f4\u65b0\uff0c\u6709\u6548\u7f13\u89e3\u6570\u636e\u6c61\u67d3\u95ee\u9898\uff0c\u4e3a\u53ef\u6301\u7eed\u591a\u6a21\u6001\u8bc4\u6d4b\u63d0\u4f9b\u5b9e\u7528\u8303\u5f0f\u3002"}, {"abstract": "Sparse autoencoders (SAEs) decompose internal activations of neural networks into sparse linear combinations of learned features by fitting an overcomplete dictionary $\\mathbf{W}\\in\\mathbb{R}^{m\\times n}$ with $m\u003cn$, and inferring a sparse code $\\mathbf{x}\\in\\mathbb{R}^n$ from $\\mathbf{h}\\approx\\mathbf{W}\\mathbf{x}$. This inference problem closely resembles the canonical setup of compressed sensing, but dense decoders requires $O(mn)$ learned values, which becomes costly at large feature counts. We introduce Expander SAEs: TopK SAEs whose decoder and tied encoder are supported on a left-$d$-regular expander mask with $d\\ll m$, learning only $dn$ decoder values while keeping the sparse-coding problem $(m,n,k)$ fixed. The same structure reduces storage and turns the matching-pursuit correlation step $\\mathbf{W}^\\top \\mathbf{r}$ in OMP into an $O(dn)$ gather-and-reduce operation. Our experiments show that across Pythia-70M/160M, Qwen2.5-3B, and Llama-3.2-1B residual-stream activations, varying $d$ traces a consistent storage--fidelity frontier, and that at the most compressed modern-LM setting, Qwen2.5-3B with $d=7$ uses $293\\times$ fewer learned decoder values than the full dense decoder while retaining $84$% of dense CE-loss recovered. Control experiments show that the improved storage--fidelity tradeoff is driven by sparse, diverse decoder support structure rather than by fewer learned decoder values, and that when sparse and dense decoders are compared at matched parameter count, part of the remaining gap comes from encoder amortisation. On the theoretical side, we show that expansion and column flatness are sufficient for identifiability of noiseless $k$-sparse codes, and we derive complementary sufficient conditions under which OMP recovers the support exactly.", "arxiv_id": "2607.01799", "arxiv_url": "https://arxiv.org/abs/2607.01799", "authors": ["Rodrigo Mendoza-Smith"], "brief": "\u63d0\u51faExpander SAEs\uff0c\u5c06\u7a00\u758f\u81ea\u7f16\u7801\u5668\u7684\u89e3\u7801\u5668\u77e9\u9635\u9650\u5236\u5728\u5de6d-\u6b63\u5219\u6269\u5c55\u56fe\u63a9\u7801\u4e0a\uff0c\u4ec5\u5b66\u4e60dn\u4e2a\u89e3\u7801\u5668\u53c2\u6570\uff08\u800c\u975emn\u4e2a\uff09\uff0c\u5728\u4fdd\u6301\u7a00\u758f\u7f16\u7801\u95ee\u9898\u89c4\u6a21\u4e0d\u53d8\u7684\u540c\u65f6\u5927\u5e45\u964d\u4f4e\u5b58\u50a8\u5f00\u9500\u3002", "categories": ["cs.LG", "cs.AI", "cs.IT"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01799", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5728Qwen2.5-3B\u4e0ad=7\u65f6\uff0c\u89e3\u7801\u5668\u53c2\u6570\u91cf\u51cf\u5c11293\u500d\uff0c\u4ecd\u4fdd\u755984%\u7684\u5bc6\u96c6CE\u635f\u5931\u6062\u590d\u7387", "\u7406\u8bba\u8bc1\u660e\u6269\u5c55\u6027\u4e0e\u5217\u5e73\u5766\u6027\u662f\u65e0\u566a\u58f0k\u7a00\u758f\u7801\u53ef\u8bc6\u522b\u6027\u7684\u5145\u5206\u6761\u4ef6\uff0c\u5e76\u7ed9\u51faOMP\u7cbe\u786e\u652f\u6301\u6062\u590d\u7684\u5145\u5206\u6761\u4ef6", "\u63a7\u5236\u5b9e\u9a8c\u8868\u660e\u6027\u80fd\u63d0\u5347\u6765\u81ea\u7a00\u758f\u591a\u6837\u7684\u89e3\u7801\u5668\u652f\u6301\u7ed3\u6784\uff0c\u800c\u975e\u5355\u7eaf\u51cf\u5c11\u53c2\u6570\u6570\u91cf"], "keywords": ["\u7a00\u758f\u81ea\u7f16\u7801\u5668", "\u673a\u68b0\u53ef\u89e3\u91ca\u6027", "\u538b\u7f29\u611f\u77e5", "\u53c2\u6570\u9ad8\u6548"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01799v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Expander Sparse Autoencoders: Parameter-Efficient Dictionaries for Mechanistic Interpretability", "tldr": "\u7528\u6269\u5c55\u56fe\u7a00\u758f\u63a9\u7801\u66ff\u4ee3\u5168\u8fde\u63a5\u89e3\u7801\u5668\uff0c\u5b9e\u73b0\u53c2\u6570\u9ad8\u6548\u7684\u7a00\u758f\u81ea\u7f16\u7801\u5668", "upvotes": 0, "what_it_is": "\u63d0\u51faExpander SAEs\uff0c\u5c06\u7a00\u758f\u81ea\u7f16\u7801\u5668\u7684\u89e3\u7801\u5668\u77e9\u9635\u9650\u5236\u5728\u5de6d-\u6b63\u5219\u6269\u5c55\u56fe\u63a9\u7801\u4e0a\uff0c\u4ec5\u5b66\u4e60dn\u4e2a\u89e3\u7801\u5668\u53c2\u6570\uff08\u800c\u975emn\u4e2a\uff09\uff0c\u5728\u4fdd\u6301\u7a00\u758f\u7f16\u7801\u95ee\u9898\u89c4\u6a21\u4e0d\u53d8\u7684\u540c\u65f6\u5927\u5e45\u964d\u4f4e\u5b58\u50a8\u5f00\u9500\u3002", "why_notable": "\u5728\u673a\u68b0\u53ef\u89e3\u91ca\u6027\u9886\u57df\uff0cSAE\u89c4\u6a21\u5316\u9762\u4e34\u5de8\u5927\u5b58\u50a8\u74f6\u9888\uff1b\u672c\u6587\u5c06\u538b\u7f29\u611f\u77e5\u4e0e\u6269\u5c55\u56fe\u7406\u8bba\u7ed3\u5408\uff0c\u63d0\u4f9b\u4e86\u6709\u7406\u8bba\u4fdd\u8bc1\u7684\u53c2\u6570\u9ad8\u6548\u65b9\u6848\uff0c\u5bf9\u5927\u89c4\u6a21LLM\u5185\u90e8\u7279\u5f81\u5206\u6790\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "On-policy exploration is a crucial component for training robust Vision-Language Navigation agents, as it exposes the policy to a broader state distribution. However, such exploration inevitably leads to trajectories that deviate from expert demonstrations, resulting in a semantic mismatch between the executed visual stream and the original language instruction. In this work, we address this challenge by introducing Phi-Nav, a unified on-policy framework that leverages hindsight reasoning to align instructions with the agent\u0027s actual exploratory journey. Specifically, Phi-Nav operates through a three-stage dual-supervision cycle: 1) the agent performs oracle-guided on-policy exploration, sampling a trajectory while learning from expert action feedback, 2) a hindsight speaker synthesizes a path-level hindsight instruction grounded in the collected visual observations, and 3) the agent conducts a second imitation pass, treating the synthesized trajectory-instruction pair as an additional expert demonstration. Through this process, Phi-Nav bridges the critical semantic supervision gap inherent in on-policy methods, transforming semantically unlabeled movement into dense training signals. Evaluations on the R2R-CE and RxR-CE benchmarks show that Phi-Nav yields competitive performance while requiring only a fraction of the expert demonstrations used by current baselines. These results underscore the necessity of semantic exploration in VLN, positioning Phi-Nav as an effective solution for training embodied agents with limited data.", "arxiv_id": "2607.01754", "arxiv_url": "https://arxiv.org/abs/2607.01754", "authors": ["Sung June Kim", "Sangpil Kim", "Honglak Lee"], "brief": "\u63d0\u51faPhi-Nav\u6846\u67b6\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u53cc\u76d1\u7763\u5faa\u73af\uff08\u5728\u7ebf\u63a2\u7d22\u2192\u4e8b\u540e\u8bed\u8a00\u751f\u6210\u2192\u6a21\u4eff\u5b66\u4e60\uff09\uff0c\u5c06\u65e0\u6807\u6ce8\u7684\u63a2\u7d22\u8f68\u8ff9\u8f6c\u5316\u4e3a\u6709\u8bed\u4e49\u6807\u7b7e\u7684\u8bad\u7ec3\u6837\u672c\uff0c\u89e3\u51b3VLN\u5728\u7ebf\u7b56\u7565\u8bad\u7ec3\u4e2d\u63a2\u7d22\u8f68\u8ff9\u4e0e\u539f\u59cb\u6307\u4ee4\u8bed\u4e49\u4e0d\u5339\u914d\u7684\u95ee\u9898\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01754", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u4e09\u9636\u6bb5\u53cc\u76d1\u7763\u5faa\u73af\uff1aoracle\u5f15\u5bfc\u63a2\u7d22 \u2192 \u4e8b\u540e\u8bf4\u8bdd\u8005\u5408\u6210\u8def\u5f84\u7ea7\u6307\u4ee4 \u2192 \u7b2c\u4e8c\u6b21\u6a21\u4eff\u5b66\u4e60", "\u5728R2R-CE\u548cRxR-CE\u57fa\u51c6\u4e0a\u53d6\u5f97\u7ade\u4e89\u6027\u6027\u80fd\uff0c\u4e14\u4ec5\u9700\u5f53\u524d\u57fa\u7ebf\u6240\u7528\u4e13\u5bb6\u6f14\u793a\u6570\u636e\u7684\u4e00\u5c0f\u90e8\u5206", "\u5c06\u8bed\u4e49\u672a\u6807\u6ce8\u7684\u63a2\u7d22\u79fb\u52a8\u8f6c\u5316\u4e3a\u5bc6\u96c6\u8bad\u7ec3\u4fe1\u53f7\uff0c\u6709\u6548\u7f13\u89e3\u5728\u7ebf\u7b56\u7565\u65b9\u6cd5\u56fa\u6709\u7684\u8bed\u4e49\u76d1\u7763\u7f3a\u53e3"], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a", "\u5177\u8eab\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01754v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Path-level Hindsight Instructions for Semantic Exploration in Vision-Language Navigation", "tldr": "Phi-Nav\u901a\u8fc7\u4e8b\u540e\u63a8\u7406\u4e3a\u63a2\u7d22\u8f68\u8ff9\u751f\u6210\u8def\u5f84\u7ea7\u8bed\u8a00\u6307\u4ee4\uff0c\u89e3\u51b3\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u4e2d\u7684\u8bed\u4e49\u76d1\u7763\u7f3a\u53e3", "upvotes": 0, "what_it_is": "\u63d0\u51faPhi-Nav\u6846\u67b6\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u53cc\u76d1\u7763\u5faa\u73af\uff08\u5728\u7ebf\u63a2\u7d22\u2192\u4e8b\u540e\u8bed\u8a00\u751f\u6210\u2192\u6a21\u4eff\u5b66\u4e60\uff09\uff0c\u5c06\u65e0\u6807\u6ce8\u7684\u63a2\u7d22\u8f68\u8ff9\u8f6c\u5316\u4e3a\u6709\u8bed\u4e49\u6807\u7b7e\u7684\u8bad\u7ec3\u6837\u672c\uff0c\u89e3\u51b3VLN\u5728\u7ebf\u7b56\u7565\u8bad\u7ec3\u4e2d\u63a2\u7d22\u8f68\u8ff9\u4e0e\u539f\u59cb\u6307\u4ee4\u8bed\u4e49\u4e0d\u5339\u914d\u7684\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u4e8b\u540e\u63a8\u7406\uff08hindsight reasoning\uff09\u5f15\u5165VLN\u5728\u7ebf\u63a2\u7d22\u8bad\u7ec3\uff0c\u5728\u5927\u5e45\u51cf\u5c11\u4e13\u5bb6\u6f14\u793a\u9700\u6c42\u7684\u540c\u65f6\u4fdd\u6301\u7ade\u4e89\u6027\u80fd\uff0c\u5bf9\u6570\u636e\u9ad8\u6548\u7684\u5177\u8eab\u667a\u80fd\u4f53\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Existing medical video benchmarks primarily evaluate whether a model produces the correct answer, but rarely assess whether it answers at the right time. In real clinical settings, AI systems must decide not only what to predict, but also when to answer, defer judgment, or proactively raise alerts. This creates a critical gap between benchmark evaluation and deployment requirements. We present MedStreamBench, a benchmark for time-aware medical video understanding. MedStreamBench integrates 22 medical datasets and 5,419 QA instances across four temporal settings: retrospective, present, future, and proactive. Unlike conventional benchmarks that assume full-video access, MedStreamBench restricts models to temporally bounded evidence windows and supports both single-turn and streaming evaluation. We further introduce a proactive monitoring setting that requires models to determine whether and when clinically relevant alerts should be triggered. Beyond answer correctness, MedStreamBench evaluates temporal behavior through responsiveness and post-evidence stability. Experiments on leading general-purpose and medical vision-language models reveal a substantial gap between offline recognition and temporally grounded decision-making, with performance dropping markedly in streaming and proactive settings. Our benchmark is available at https://huggingface.co/datasets/Venn2024/MedStreamBench.", "arxiv_id": "2607.01751", "arxiv_url": "https://arxiv.org/abs/2607.01751", "authors": ["Yuan Wang", "Shujian Gao", "Songtao Jiang", "Zhengyu Hu", "Zuozhu Liu"], "brief": "\u63d0\u51faMedStreamBench\uff0c\u4e00\u4e2a\u9762\u5411\u533b\u7597\u89c6\u9891\u6d41\u5f0f\u7406\u89e3\u7684\u65f6\u95f4\u611f\u77e5\u57fa\u51c6\uff0c\u6574\u540822\u4e2a\u533b\u7597\u6570\u636e\u96c6\u30015419\u4e2aQA\u5b9e\u4f8b\uff0c\u8986\u76d6\u56de\u987e\u3001\u5f53\u524d\u3001\u672a\u6765\u548c\u4e3b\u52a8\u9884\u8b66\u56db\u79cd\u65f6\u5e8f\u573a\u666f\uff0c\u8bc4\u4f30\u6a21\u578b\u4e0d\u4ec5\u8981\u7b54\u5bf9\uff0c\u8fd8\u8981\u5728\u6b63\u786e\u65f6\u673a\u4f5c\u7b54\u6216\u89e6\u53d1\u8b66\u62a5\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01751", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6574\u540822\u4e2a\u533b\u7597\u6570\u636e\u96c6\u30015419\u4e2aQA\u5b9e\u4f8b\uff0c\u652f\u6301\u5355\u8f6e\u4e0e\u6d41\u5f0f\u4e24\u79cd\u8bc4\u4f30\u6a21\u5f0f", "\u5f15\u5165\u4e3b\u52a8\u76d1\u6d4b\u8bbe\u7f6e\uff0c\u8981\u6c42\u6a21\u578b\u5224\u65ad\u662f\u5426\u53ca\u4f55\u65f6\u89e6\u53d1\u4e34\u5e8a\u76f8\u5173\u8b66\u62a5", "\u65b0\u589e\u54cd\u5e94\u53ca\u65f6\u6027\u4e0e\u8bc1\u636e\u540e\u7a33\u5b9a\u6027\u4e24\u9879\u65f6\u5e8f\u884c\u4e3a\u6307\u6807\uff0c\u8d85\u8d8a\u4f20\u7edf\u7b54\u6848\u6b63\u786e\u6027\u8bc4\u4f30", "\u5b9e\u9a8c\u8868\u660e\u73b0\u6709\u9876\u7ea7\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u6d41\u5f0f\u4e0e\u4e3b\u52a8\u9884\u8b66\u573a\u666f\u4e0b\u6027\u80fd\u663e\u8457\u4e0b\u964d"], "keywords": ["\u533b\u7597AI", "\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01751v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MedStreamBench: A Time-Aware Benchmark for Streaming and Proactive Medical Video Understanding", "tldr": "MedStreamBench\uff1a\u9996\u4e2a\u65f6\u95f4\u611f\u77e5\u533b\u7597\u89c6\u9891\u6d41\u7406\u89e3\u57fa\u51c6\uff0c\u8bc4\u4f30\u6a21\u578b\"\u4f55\u65f6\"\u56de\u7b54\u7684\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faMedStreamBench\uff0c\u4e00\u4e2a\u9762\u5411\u533b\u7597\u89c6\u9891\u6d41\u5f0f\u7406\u89e3\u7684\u65f6\u95f4\u611f\u77e5\u57fa\u51c6\uff0c\u6574\u540822\u4e2a\u533b\u7597\u6570\u636e\u96c6\u30015419\u4e2aQA\u5b9e\u4f8b\uff0c\u8986\u76d6\u56de\u987e\u3001\u5f53\u524d\u3001\u672a\u6765\u548c\u4e3b\u52a8\u9884\u8b66\u56db\u79cd\u65f6\u5e8f\u573a\u666f\uff0c\u8bc4\u4f30\u6a21\u578b\u4e0d\u4ec5\u8981\u7b54\u5bf9\uff0c\u8fd8\u8981\u5728\u6b63\u786e\u65f6\u673a\u4f5c\u7b54\u6216\u89e6\u53d1\u8b66\u62a5\u3002", "why_notable": "\u586b\u8865\u4e86\u533b\u7597AI\u57fa\u51c6\u8bc4\u4f30\u4e0e\u771f\u5b9e\u4e34\u5e8a\u90e8\u7f72\u9700\u6c42\u4e4b\u95f4\u7684\u5173\u952e\u7a7a\u767d\u2014\u2014\u73b0\u6709\u57fa\u51c6\u5ffd\u89c6\"\u4f55\u65f6\u56de\u7b54\"\u8fd9\u4e00\u4e34\u5e8a\u51b3\u7b56\u6838\u5fc3\u8981\u7d20\uff0c\u8be5\u5de5\u4f5c\u4e3a\u533b\u7597\u89c6\u9891AI\u7684\u65f6\u5e8f\u63a8\u7406\u80fd\u529b\u63d0\u4f9b\u4e86\u7cfb\u7edf\u6027\u8bc4\u6d4b\u6846\u67b6\u3002"}, {"abstract": "Model merging aims to combine existing single-task solutions into a multi-task solution without additional data-driven fine-tuning.~Most existing approaches achieve this using geometric properties of local solution spaces. However, such geometric views provide limited guidance for scoring how statistically useful each task-specific update direction is across tasks during merging. To address this, we formulate model merging from a new perspective of probabilistic inference under a product-of-experts (PoE) scenario where each single-task solution defines an energy-based expert model (EBM) over the merged parameters. We show that several existing model merging methods arise as special cases of our framework under energy designs that impose implicit Gaussian assumptions on directional residuals between merged and task-specific models. Empirically, we find that these residuals are often heavy-tailed which exposes a mismatch with the imposed light-tailed Gaussian structures. We address this with a heavy-tailed PoE design based on Cauchy experts, which better captures the observed residual behavior while admitting a provably convergent inference procedure. Experiments across multiple tasks and architectures show significant improvements over state-of-the-arts baselines. Our code is available at https://github.com/MinhLong210/PoE-EBM-Merging.git.", "arxiv_id": "2607.01689", "arxiv_url": "https://arxiv.org/abs/2607.01689", "authors": ["Long Minh Bui", "Tuan Anh Le Van", "Tung Phi Duc", "Phi Le Nguyen", "Jana Doppa", "Trong Nghia Hoang"], "brief": "\u63d0\u51fa\u5c06\u591a\u4efb\u52a1\u6a21\u578b\u5408\u5e76\u95ee\u9898\u5efa\u6a21\u4e3a\u57fa\u4e8e\u80fd\u91cf\u6a21\u578b\u7684\u4e13\u5bb6\u4e58\u79ef\uff08PoE\uff09\u6982\u7387\u63a8\u65ad\u6846\u67b6\uff0c\u53d1\u73b0\u73b0\u6709\u65b9\u6cd5\u5747\u4e3a\u8be5\u6846\u67b6\u5728\u9ad8\u65af\u5047\u8bbe\u4e0b\u7684\u7279\u4f8b\uff0c\u5e76\u9488\u5bf9\u5b9e\u9645\u89c2\u6d4b\u5230\u7684\u91cd\u5c3e\u6b8b\u5dee\u5206\u5e03\u63d0\u51fa\u57fa\u4e8e\u67ef\u897f\u5206\u5e03\u7684\u6539\u8fdb\u65b9\u6848\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01689", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u6a21\u578b\u5408\u5e76\u7edf\u4e00\u4e3aPoE\u6982\u7387\u63a8\u65ad\u6846\u67b6\uff0c\u63ed\u793aTask Arithmetic\u7b49\u73b0\u6709\u65b9\u6cd5\u5747\u4e3a\u9ad8\u65af\u5047\u8bbe\u4e0b\u7684\u7279\u4f8b", "\u5b9e\u8bc1\u53d1\u73b0\u5408\u5e76\u53c2\u6570\u4e0e\u4efb\u52a1\u7279\u5b9a\u6a21\u578b\u4e4b\u95f4\u7684\u65b9\u5411\u6b8b\u5dee\u5448\u91cd\u5c3e\u5206\u5e03\uff0c\u4e0e\u9ad8\u65af\u5047\u8bbe\u5b58\u5728\u663e\u8457\u4e0d\u5339\u914d", "\u63d0\u51fa\u57fa\u4e8e\u67ef\u897f\u4e13\u5bb6\u7684\u91cd\u5c3ePoE\u8bbe\u8ba1\uff0c\u5177\u6709\u53ef\u8bc1\u660e\u6536\u655b\u7684\u63a8\u65ad\u8fc7\u7a0b\uff0c\u5728\u591a\u4efb\u52a1\u591a\u67b6\u6784\u5b9e\u9a8c\u4e2d\u663e\u8457\u4f18\u4e8eSOTA\u57fa\u7ebf"], "keywords": ["\u6a21\u578b\u5408\u5e76", "\u6982\u7387\u63a8\u65ad", "\u591a\u4efb\u52a1\u5b66\u4e60", "\u80fd\u91cf\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01689v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Model Merging as Probabilistic Inference in Fine-Tuning Parameter Space", "tldr": "\u5c06\u6a21\u578b\u5408\u5e76\u91cd\u65b0\u8868\u8ff0\u4e3a\u4e13\u5bb6\u4e58\u79ef\u6982\u7387\u63a8\u65ad\uff0c\u7528\u67ef\u897f\u5206\u5e03\u6355\u6349\u91cd\u5c3e\u6b8b\u5dee\uff0c\u663e\u8457\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u5c06\u591a\u4efb\u52a1\u6a21\u578b\u5408\u5e76\u95ee\u9898\u5efa\u6a21\u4e3a\u57fa\u4e8e\u80fd\u91cf\u6a21\u578b\u7684\u4e13\u5bb6\u4e58\u79ef\uff08PoE\uff09\u6982\u7387\u63a8\u65ad\u6846\u67b6\uff0c\u53d1\u73b0\u73b0\u6709\u65b9\u6cd5\u5747\u4e3a\u8be5\u6846\u67b6\u5728\u9ad8\u65af\u5047\u8bbe\u4e0b\u7684\u7279\u4f8b\uff0c\u5e76\u9488\u5bf9\u5b9e\u9645\u89c2\u6d4b\u5230\u7684\u91cd\u5c3e\u6b8b\u5dee\u5206\u5e03\u63d0\u51fa\u57fa\u4e8e\u67ef\u897f\u5206\u5e03\u7684\u6539\u8fdb\u65b9\u6848\u3002", "why_notable": "\u9996\u6b21\u4ece\u6982\u7387\u63a8\u65ad\u89c6\u89d2\u7edf\u4e00\u89e3\u91ca\u5e76\u6539\u8fdb\u6a21\u578b\u5408\u5e76\u65b9\u6cd5\uff0c\u63ed\u793a\u4e86\u73b0\u6709\u65b9\u6cd5\u7684\u9690\u542b\u5047\u8bbe\u7f3a\u9677\uff0c\u63d0\u4f9b\u4e86\u7406\u8bba\u4e25\u8c28\u4e14\u5b9e\u9a8c\u6709\u6548\u7684\u65b0\u6846\u67b6\uff0c\u5bf9\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u7684\u591a\u4efb\u52a1\u6a21\u578b\u878d\u5408\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multi-agent systems are increasingly used for forecasting future events, as deliberation among multiple LLMs is believed to improve reasoning and calibration. Yet existing approaches overlook a critical design choice: what information each agent receives. When all agents are given identical evidence, deliberation collapses into herding rather than genuine belief revision, leaving multi-agent systems little better than a single agent. We identify this as a fundamental gap and propose designed information asymmetry to close it: by partitioning evidence into shared public and disjoint private subsets, each agent holds exclusive knowledge that can only reach others through deliberation. We theoretically show that this decomposition reduces inter-agent error correlation, and instantiate it in InfoDelphi, a framework combining relevance-aware evidence routing, rationale-based iterative deliberation, and confidence-weighted aggregation. On PolyGym, a benchmark of 375 binary forecasting questions derived from real-world prediction markets, InfoDelphi outperforms the strongest single-agent and multi-agent baselines by 12--18% in Brier score and 4--8 percentage points in accuracy. More detailed experiments confirm that removing information asymmetry eliminates most deliberation gains, establishing diversity of input as the key enabler of effective multi-agent reasoning.", "arxiv_id": "2607.01661", "arxiv_url": "https://arxiv.org/abs/2607.01661", "authors": ["Yuante Li", "Yicheng Tao", "Kate Zhang", "Taozhi Wang", "Gefei Gu", "Yaxin Zhou"], "brief": "\u63d0\u51faInfoDelphi\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u8bc1\u636e\u5212\u5206\u4e3a\u5171\u4eab\u516c\u5f00\u5b50\u96c6\u548c\u5404\u667a\u80fd\u4f53\u72ec\u6709\u7684\u79c1\u6709\u5b50\u96c6\uff0c\u89e3\u51b3\u591aLLM\u534f\u5546\u9884\u6d4b\u4e2d\"\u4fe1\u606f\u540c\u8d28\u5316\u5bfc\u81f4\u4ece\u4f17\"\u7684\u6839\u672c\u7f3a\u9677\uff0c\u5b9e\u73b0\u771f\u6b63\u6709\u6548\u7684\u591a\u667a\u80fd\u4f53\u63a8\u7406\u4e0e\u9884\u6d4b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01661", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u7406\u8bba\u8bc1\u660e\uff1a\u8bc1\u636e\u5206\u533a\uff08\u516c\u5171+\u79c1\u6709\uff09\u53ef\u964d\u4f4e\u667a\u80fd\u4f53\u95f4\u7684\u8bef\u5dee\u76f8\u5173\u6027\uff0c\u4ece\u800c\u63d0\u5347\u96c6\u6210\u9884\u6d4b\u8d28\u91cf", "InfoDelphi\u5305\u542b\u4e09\u4e2a\u6838\u5fc3\u6a21\u5757\uff1a\u76f8\u5173\u6027\u611f\u77e5\u8bc1\u636e\u8def\u7531\u3001\u57fa\u4e8e\u7406\u7531\u7684\u8fed\u4ee3\u534f\u5546\u3001\u7f6e\u4fe1\u5ea6\u52a0\u6743\u805a\u5408", "\u5728PolyGym\u57fa\u51c6\uff08375\u9053\u771f\u5b9e\u9884\u6d4b\u5e02\u573a\u4e8c\u5143\u95ee\u9898\uff09\u4e0a\uff0cBrier\u5206\u6570\u63d0\u534712\u201318%\uff0c\u51c6\u786e\u7387\u63d0\u53474\u20138\u4e2a\u767e\u5206\u70b9\uff1b\u6d88\u878d\u5b9e\u9a8c\u8bc1\u660e\u53bb\u9664\u4fe1\u606f\u4e0d\u5bf9\u79f0\u540e\u5927\u90e8\u5206\u6536\u76ca\u6d88\u5931"], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u9884\u6d4b\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4fe1\u606f\u4e0d\u5bf9\u79f0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01661v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Diverse Evidence, Better Forecasts: Multi-Agent Deliberation Under Information Asymmetry", "tldr": "\u901a\u8fc7\u8bbe\u8ba1\u4fe1\u606f\u4e0d\u5bf9\u79f0\uff0c\u8ba9\u591a\u667a\u80fd\u4f53\u9884\u6d4b\u7cfb\u7edf\u5b9e\u73b0\u771f\u6b63\u7684\u534f\u5546\u800c\u975e\u4ece\u4f17", "upvotes": 0, "what_it_is": "\u63d0\u51faInfoDelphi\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u8bc1\u636e\u5212\u5206\u4e3a\u5171\u4eab\u516c\u5f00\u5b50\u96c6\u548c\u5404\u667a\u80fd\u4f53\u72ec\u6709\u7684\u79c1\u6709\u5b50\u96c6\uff0c\u89e3\u51b3\u591aLLM\u534f\u5546\u9884\u6d4b\u4e2d\"\u4fe1\u606f\u540c\u8d28\u5316\u5bfc\u81f4\u4ece\u4f17\"\u7684\u6839\u672c\u7f3a\u9677\uff0c\u5b9e\u73b0\u771f\u6b63\u6709\u6548\u7684\u591a\u667a\u80fd\u4f53\u63a8\u7406\u4e0e\u9884\u6d4b\u3002", "why_notable": "\u63ed\u793a\u4e86\u591a\u667a\u80fd\u4f53\u9884\u6d4b\u7cfb\u7edf\u4e2d\u88ab\u5ffd\u89c6\u7684\u5173\u952e\u8bbe\u8ba1\u7ef4\u5ea6\u2014\u2014\u8f93\u5165\u4fe1\u606f\u591a\u6837\u6027\uff0c\u800c\u975e\u4ec5\u9760\u589e\u52a0\u667a\u80fd\u4f53\u6570\u91cf\u6216\u534f\u5546\u8f6e\u6b21\uff1b\u4e3a\u6784\u5efa\u9ad8\u6548\u591a\u667a\u80fd\u4f53\u63a8\u7406\u7cfb\u7edf\u63d0\u4f9b\u4e86\u7406\u8bba\u4f9d\u636e\u548c\u5b9e\u8df5\u6846\u67b6\u3002"}, {"abstract": "We present Zeus, a unified tuning-free Time Series Foundation Model (TSFM) that delivers superior performance across diverse analysis tasks without any task-specific fine-tuning. Unlike prior studies that primarily focus on zero-shot forecasting but require task-specific tuning for other tasks, Zeus bridges this gap by addressing two fundamental challenges in multi-task generalization. First, to reconcile point-level granularity with long-sequence scalability, Zeus incorporates a multi-scale Transformer featuring point-wise tokenization and a U-shaped hierarchy, effectively balancing fine-grained fidelity with computational efficiency. Second, to accommodate varying inductive biases across different tasks, Zeus introduces Multi-Objective Temporal Masking (MOTM), a unified strategy that supports heterogeneous tasks (e.g., extrapolation, interpolation, and global abstraction) within a single framework. Extensive experiments across five representative tasks demonstrate that Zeus consistently achieves competitive results in tuning-free settings, underscoring its potential as a general-purpose TSFM.", "arxiv_id": "2607.01918", "arxiv_url": "https://arxiv.org/abs/2607.01918", "authors": ["Yisong Fu", "Zezhi Shao", "Chengqing Yu", "Yujie Li", "Yongjun Xu", "Xueqi Cheng", "Fei Wang"], "brief": "\u63d0\u51faZeus\uff0c\u4e00\u4e2a\u7edf\u4e00\u7684\u514d\u8c03\u4f18\u65f6\u95f4\u5e8f\u5217\u57fa\u7840\u6a21\u578b\uff08TSFM\uff09\uff0c\u901a\u8fc7\u591a\u5c3a\u5ea6Transformer\u548c\u591a\u76ee\u6807\u65f6\u5e8f\u63a9\u7801\u7b56\u7565\uff08MOTM\uff09\uff0c\u5728\u65e0\u9700\u4efb\u52a1\u7279\u5b9a\u5fae\u8c03\u7684\u60c5\u51b5\u4e0b\u652f\u6301\u9884\u6d4b\u3001\u63d2\u503c\u3001\u5168\u5c40\u62bd\u8c61\u7b49\u591a\u79cd\u5206\u6790\u4efb\u52a1\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01918", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u591a\u5c3a\u5ea6Transformer\u91c7\u7528\u9010\u70b9\u6807\u8bb0\u5316\uff08point-wise tokenization\uff09\u4e0eU\u5f62\u5c42\u6b21\u7ed3\u6784\uff0c\u517c\u987e\u7ec6\u7c92\u5ea6\u7cbe\u5ea6\u4e0e\u8ba1\u7b97\u6548\u7387", "\u63d0\u51fa\u591a\u76ee\u6807\u65f6\u5e8f\u63a9\u7801\uff08MOTM\uff09\u7edf\u4e00\u7b56\u7565\uff0c\u5728\u5355\u4e00\u6846\u67b6\u5185\u652f\u6301\u5916\u63a8\u3001\u63d2\u503c\u3001\u5168\u5c40\u62bd\u8c61\u7b49\u5f02\u6784\u4efb\u52a1", "\u5728\u4e94\u7c7b\u4ee3\u8868\u6027\u4efb\u52a1\u4e0a\u5b9e\u73b0\u514d\u8c03\u4f18\u7ade\u4e89\u6027\u6027\u80fd\uff0c\u65e0\u9700\u4efb\u4f55\u4efb\u52a1\u7279\u5b9a\u5fae\u8c03"], "keywords": ["\u65f6\u95f4\u5e8f\u5217", "\u57fa\u7840\u6a21\u578b", "\u591a\u4efb\u52a1\u5b66\u4e60", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01918v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Zeus: Towards Tuning-Free Foundation Model for Time Series Analysis", "tldr": "Zeus\uff1a\u65e0\u9700\u5fae\u8c03\u5373\u53ef\u8de8\u591a\u4efb\u52a1\u7684\u65f6\u95f4\u5e8f\u5217\u57fa\u7840\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faZeus\uff0c\u4e00\u4e2a\u7edf\u4e00\u7684\u514d\u8c03\u4f18\u65f6\u95f4\u5e8f\u5217\u57fa\u7840\u6a21\u578b\uff08TSFM\uff09\uff0c\u901a\u8fc7\u591a\u5c3a\u5ea6Transformer\u548c\u591a\u76ee\u6807\u65f6\u5e8f\u63a9\u7801\u7b56\u7565\uff08MOTM\uff09\uff0c\u5728\u65e0\u9700\u4efb\u52a1\u7279\u5b9a\u5fae\u8c03\u7684\u60c5\u51b5\u4e0b\u652f\u6301\u9884\u6d4b\u3001\u63d2\u503c\u3001\u5168\u5c40\u62bd\u8c61\u7b49\u591a\u79cd\u5206\u6790\u4efb\u52a1\u3002", "why_notable": "\u73b0\u6709\u65f6\u95f4\u5e8f\u5217\u57fa\u7840\u6a21\u578b\u591a\u805a\u7126\u4e8e\u96f6\u6837\u672c\u9884\u6d4b\uff0c\u5176\u4ed6\u4efb\u52a1\u4ecd\u9700\u5fae\u8c03\uff1bZeus\u9996\u6b21\u5728\u7edf\u4e00\u6846\u67b6\u4e0b\u5b9e\u73b0\u771f\u6b63\u7684\u591a\u4efb\u52a1\u514d\u8c03\u4f18\u6cdb\u5316\uff0c\u63a8\u52a8\u901a\u7528\u65f6\u95f4\u5e8f\u5217\u57fa\u7840\u6a21\u578b\u7684\u5b9e\u7528\u5316\u8fdb\u7a0b\u3002"}, {"abstract": "Reliable reward and preference signals are critical for evaluating and optimizing large language models on open-ended tasks. Rubric-based judges offer a transparent way to decompose such judgments into explicit evaluation criteria, but existing annotation-free rubric generators typically rely on a single generic evaluator. As a result, they may overlook important dimensions of human preference, a failure mode we term dimensional blind spots. To address this limitation, we propose Multi-Role Rubric Generation (MRRG), a training-free and reference-free framework that elicits evaluation criteria from multiple complementary roles and consolidates them into an auditable rubric-based scorer. This scorer can be used both to validate pairwise preferences and to provide rewards for GRPO-style Reinforcement Learning with Verifiable Rewards (RLVR). Experiments on preference validation benchmarks show that MRRG consistently outperforms single-role rubric generation baselines across multiple backbone models. Further RLVR experiments demonstrate that MRRG yields a stronger reward signal for improving open-ended generation.", "arxiv_id": "2607.01830", "arxiv_url": "https://arxiv.org/abs/2607.01830", "authors": ["Dazhi Fu", "Jiuding Yang", "Yiwen Guo", "Jicong Fan"], "brief": "\u63d0\u51fa\u591a\u89d2\u8272\u8bc4\u5206\u6807\u51c6\u751f\u6210\u6846\u67b6\uff08MRRG\uff09\uff0c\u901a\u8fc7\u8ba9\u591a\u4e2a\u4e92\u8865\u89d2\u8272\u5404\u81ea\u751f\u6210\u8bc4\u4f30\u7ef4\u5ea6\u5e76\u6574\u5408\u4e3a\u53ef\u5ba1\u8ba1\u7684\u8bc4\u5206\u6807\u51c6\uff0c\u7528\u4e8eLLM\u504f\u597d\u9a8c\u8bc1\u548c\u5f3a\u5316\u5b66\u4e60\u5956\u52b1\u5efa\u6a21\uff0c\u65e0\u9700\u8bad\u7ec3\u548c\u53c2\u8003\u7b54\u6848\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01830", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bc6\u522b\u73b0\u6709\u5355\u4e00\u8bc4\u4f30\u8005\u65b9\u6cd5\u5b58\u5728\u0027\u7ef4\u5ea6\u76f2\u70b9\u0027\u95ee\u9898\uff0c\u5373\u9057\u6f0f\u91cd\u8981\u7684\u4eba\u7c7b\u504f\u597d\u7ef4\u5ea6", "MRRG\u4e3a\u65e0\u8bad\u7ec3\u3001\u65e0\u53c2\u8003\u7b54\u6848\u7684\u6846\u67b6\uff0c\u53ef\u540c\u65f6\u652f\u6301\u6210\u5bf9\u504f\u597d\u9a8c\u8bc1\u548cGRPO\u98ce\u683c\u7684RLVR\u5956\u52b1\u4fe1\u53f7", "\u5728\u504f\u597d\u9a8c\u8bc1\u57fa\u51c6\u4e0a\uff0cMRRG\u5728\u591a\u4e2a\u9aa8\u5e72\u6a21\u578b\u4e0a\u5747\u4f18\u4e8e\u5355\u89d2\u8272\u8bc4\u5206\u6807\u51c6\u751f\u6210\u57fa\u7ebf"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5956\u52b1\u6a21\u578b", "LLM\u8bc4\u4f30", "\u504f\u597d\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01830v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Many Voices, One Reward: Multi-Role Rubric Generation for LLM Judging and Reward Modeling", "tldr": "\u591a\u89d2\u8272\u8bc4\u5206\u6807\u51c6\u751f\u6210\u6846\u67b6MRRG\uff0c\u89e3\u51b3\u5355\u4e00\u8bc4\u4f30\u8005\u7684\u7ef4\u5ea6\u76f2\u70b9\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u591a\u89d2\u8272\u8bc4\u5206\u6807\u51c6\u751f\u6210\u6846\u67b6\uff08MRRG\uff09\uff0c\u901a\u8fc7\u8ba9\u591a\u4e2a\u4e92\u8865\u89d2\u8272\u5404\u81ea\u751f\u6210\u8bc4\u4f30\u7ef4\u5ea6\u5e76\u6574\u5408\u4e3a\u53ef\u5ba1\u8ba1\u7684\u8bc4\u5206\u6807\u51c6\uff0c\u7528\u4e8eLLM\u504f\u597d\u9a8c\u8bc1\u548c\u5f3a\u5316\u5b66\u4e60\u5956\u52b1\u5efa\u6a21\uff0c\u65e0\u9700\u8bad\u7ec3\u548c\u53c2\u8003\u7b54\u6848\u3002", "why_notable": "\u4e3aLLM\u8bc4\u4f30\u548c\u5bf9\u9f50\u63d0\u4f9b\u4e86\u66f4\u5168\u9762\u3001\u900f\u660e\u7684\u5956\u52b1\u4fe1\u53f7\u751f\u6210\u65b9\u6848\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u63d0\u5347\u5f00\u653e\u5f0f\u751f\u6210\u4efb\u52a1\u7684\u5f3a\u5316\u5b66\u4e60\u6548\u679c\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Discrete diffusion models have steadily improved in quality relative to autoregressive (AR) models. However, these models are normally constrained to fixed-length generation and do not support key-value (KV) caching. Block diffusion partially bridges diffusion and AR by generating token blocks left-to-right, but its fixed-size sequential blocks limit decoding flexibility and parallelism. Here, we present a new class of language models, set diffusion, comprised of (i) a likelihood parameterization that factorizes over flexible-position, flexible-length token sets and (ii) a set-causal diffusion architecture that supports KV cache updates after every inference step. By factorizing over token sets instead of fixed-size blocks, tokens can be decoded in arbitrarily-ordered sets, including sliding-window sets, enabling faster inference and support for any-order decoding. Set diffusion achieves better speed-quality tradeoffs on mathematical reasoning, summarization, and unconditional generation compared to prior diffusion language models while offering stronger infilling performance than block diffusion. We provide the code, along with the model weights and blog post on the project page: https://m-arriola.com/setdlms/", "arxiv_id": "2607.01775", "arxiv_url": "https://arxiv.org/abs/2607.01775", "authors": ["Marianne Arriola", "Volodymyr Kuleshov"], "brief": "\u63d0\u51fa\u96c6\u5408\u6269\u6563\uff08Set Diffusion\uff09\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u5bf9\u7075\u6d3b\u4f4d\u7f6e\u3001\u7075\u6d3b\u957f\u5ea6\u7684token\u96c6\u5408\u8fdb\u884c\u4f3c\u7136\u5206\u89e3\uff0c\u5e76\u8bbe\u8ba1\u652f\u6301\u6bcf\u6b65KV\u7f13\u5b58\u66f4\u65b0\u7684\u96c6\u5408\u56e0\u679c\u6269\u6563\u67b6\u6784\uff0c\u5b9e\u73b0\u81ea\u56de\u5f52\u4e0e\u79bb\u6563\u6269\u6563\u4e4b\u95f4\u7684\u5e73\u6ed1\u8fc7\u6e21\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01775", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u57fa\u4e8etoken\u96c6\u5408\u7684\u4f3c\u7136\u5206\u89e3\uff0c\u652f\u6301\u4efb\u610f\u987a\u5e8f\u89e3\u7801\uff08\u5305\u62ec\u6ed1\u52a8\u7a97\u53e3\u96c6\u5408\uff09\uff0c\u7a81\u7834\u56fa\u5b9a\u5757\u5927\u5c0f\u9650\u5236", "\u8bbe\u8ba1\u96c6\u5408\u56e0\u679c\u6ce8\u610f\u529b\u67b6\u6784\uff0c\u6bcf\u6b21\u63a8\u7406\u6b65\u9aa4\u540e\u5747\u53ef\u66f4\u65b0KV\u7f13\u5b58\uff0c\u663e\u8457\u63d0\u5347\u63a8\u7406\u901f\u5ea6", "\u5728\u6570\u5b66\u63a8\u7406\u3001\u6458\u8981\u751f\u6210\u548c\u65e0\u6761\u4ef6\u751f\u6210\u4efb\u52a1\u4e0a\u4f18\u4e8e\u73b0\u6709\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u4e14infilling\u6027\u80fd\u5f3a\u4e8eBlock Diffusion"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u8bed\u8a00\u6a21\u578b", "\u81ea\u56de\u5f52", "\u63a8\u7406\u52a0\u901f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01775v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Set Diffusion: Interpolating Token Orderings Between Autoregression and Diffusion for Fast and Flexible Decoding", "tldr": "\u96c6\u5408\u6269\u6563\u6a21\u578b\uff1a\u5728\u81ea\u56de\u5f52\u4e0e\u6269\u6563\u4e4b\u95f4\u63d2\u503c\uff0c\u652f\u6301KV\u7f13\u5b58\u4e0e\u7075\u6d3b\u89e3\u7801", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u96c6\u5408\u6269\u6563\uff08Set Diffusion\uff09\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u5bf9\u7075\u6d3b\u4f4d\u7f6e\u3001\u7075\u6d3b\u957f\u5ea6\u7684token\u96c6\u5408\u8fdb\u884c\u4f3c\u7136\u5206\u89e3\uff0c\u5e76\u8bbe\u8ba1\u652f\u6301\u6bcf\u6b65KV\u7f13\u5b58\u66f4\u65b0\u7684\u96c6\u5408\u56e0\u679c\u6269\u6563\u67b6\u6784\uff0c\u5b9e\u73b0\u81ea\u56de\u5f52\u4e0e\u79bb\u6563\u6269\u6563\u4e4b\u95f4\u7684\u5e73\u6ed1\u8fc7\u6e21\u3002", "why_notable": "\u9996\u6b21\u5c06KV\u7f13\u5b58\u673a\u5236\u5f15\u5165\u79bb\u6563\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u540c\u65f6\u5b9e\u73b0\u7075\u6d3b\u957f\u5ea6\u751f\u6210\u4e0e\u4efb\u610f\u987a\u5e8f\u89e3\u7801\uff0c\u6709\u6548\u5f25\u5408\u81ea\u56de\u5f52\u4e0e\u6269\u6563\u6a21\u578b\u4e4b\u95f4\u7684\u6548\u7387\u4e0e\u7075\u6d3b\u6027\u9e3f\u6c9f\uff0c\u5bf9\u5b9e\u7528\u5316\u6269\u6563\u8bed\u8a00\u6a21\u578b\u5177\u6709\u91cd\u8981\u63a8\u52a8\u610f\u4e49\u3002"}, {"abstract": "Foundation models are routinely released to the public, yet the data recipes used to train them -- such as domain mixture weights that determine how different sources are sampled -- are rarely disclosed. This creates an access asymmetry: researchers study the resulting models but lack visibility into the training distribution that produces them. Prior works for inferring training data, such as membership inference, detect at the level of individual samples and thus cannot characterize the global composition of the training corpus. We introduce WARP, a framework that recovers a fine-tuned model\u0027s training mixtures directly from its released weights. WARP interpolates between the base and fine-tuned models using model merging, generating pseudo-checkpoints that approximate the missing training trajectory and expose a geometric footprint of the training data in the weight space. From these simulated footprints, WARP extracts geometric features and maps them to domain proportions using either a parameter-free softmax readout or an MLP projector trained on synthetic mixtures. In controlled experiments with BERT and GPT-2, WARP recovers domain mixtures with an average MAE as low as 0.046 and 0.104 respectively, outperforming membership inference and a variant with access to the true training trajectory.", "arxiv_id": "2607.01686", "arxiv_url": "https://arxiv.org/abs/2607.01686", "authors": ["Tzu-Heng Huang", "Aditya Goyal", "John Cooper", "Frederic Sala"], "brief": "\u63d0\u51faWARP\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u57fa\u7840\u6a21\u578b\u4e0e\u5fae\u8c03\u6a21\u578b\u4e4b\u95f4\u8fdb\u884c\u6743\u91cd\u63d2\u503c\u751f\u6210\u4f2a\u68c0\u67e5\u70b9\uff0c\u4ece\u6743\u91cd\u7a7a\u95f4\u7684\u51e0\u4f55\u7279\u5f81\u4e2d\u63a8\u65ad\u51fa\u8bad\u7ec3\u6570\u636e\u7684\u9886\u57df\u6df7\u5408\u914d\u6bd4\uff0c\u65e0\u9700\u8bbf\u95ee\u8bad\u7ec3\u6570\u636e\u6216\u8bad\u7ec3\u8fc7\u7a0b\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01686", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5229\u7528\u6a21\u578b\u5408\u5e76\u6280\u672f\u5728\u57fa\u7840\u6a21\u578b\u4e0e\u5fae\u8c03\u6a21\u578b\u95f4\u63d2\u503c\uff0c\u751f\u6210\u8fd1\u4f3c\u8bad\u7ec3\u8f68\u8ff9\u7684\u4f2a\u68c0\u67e5\u70b9\uff0c\u66b4\u9732\u6743\u91cd\u7a7a\u95f4\u4e2d\u7684\u51e0\u4f55\u8db3\u8ff9", "\u4ece\u51e0\u4f55\u7279\u5f81\u4e2d\u63d0\u53d6\u9886\u57df\u6bd4\u4f8b\uff0c\u652f\u6301\u65e0\u53c2\u6570softmax\u8bfb\u51fa\u6216\u57fa\u4e8e\u5408\u6210\u6df7\u5408\u6570\u636e\u8bad\u7ec3\u7684MLP\u6295\u5f71\u4e24\u79cd\u65b9\u5f0f", "\u5728BERT\u548cGPT-2\u7684\u53d7\u63a7\u5b9e\u9a8c\u4e2d\uff0c\u5e73\u5747MAE\u5206\u522b\u4f4e\u81f30.046\u548c0.104\uff0c\u4f18\u4e8e\u6210\u5458\u63a8\u65ad\u7b49\u57fa\u7ebf\u65b9\u6cd5"], "keywords": ["\u6a21\u578b\u5b89\u5168", "\u8bad\u7ec3\u6570\u636e\u63a8\u65ad", "\u6743\u91cd\u7a7a\u95f4\u5206\u6790", "\u6a21\u578b\u5408\u5e76"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01686v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "WARP: Weight-Space Analysis for Recovering Training Data Portfolios", "tldr": "WARP\u6846\u67b6\u901a\u8fc7\u5206\u6790\u6a21\u578b\u6743\u91cd\u7a7a\u95f4\uff0c\u76f4\u63a5\u4ece\u53d1\u5e03\u7684\u6a21\u578b\u4e2d\u6062\u590d\u8bad\u7ec3\u6570\u636e\u7684\u9886\u57df\u6df7\u5408\u6bd4\u4f8b", "upvotes": 0, "what_it_is": "\u63d0\u51faWARP\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u57fa\u7840\u6a21\u578b\u4e0e\u5fae\u8c03\u6a21\u578b\u4e4b\u95f4\u8fdb\u884c\u6743\u91cd\u63d2\u503c\u751f\u6210\u4f2a\u68c0\u67e5\u70b9\uff0c\u4ece\u6743\u91cd\u7a7a\u95f4\u7684\u51e0\u4f55\u7279\u5f81\u4e2d\u63a8\u65ad\u51fa\u8bad\u7ec3\u6570\u636e\u7684\u9886\u57df\u6df7\u5408\u914d\u6bd4\uff0c\u65e0\u9700\u8bbf\u95ee\u8bad\u7ec3\u6570\u636e\u6216\u8bad\u7ec3\u8fc7\u7a0b\u3002", "why_notable": "\u9996\u6b21\u4ece\u6a21\u578b\u6743\u91cd\u5c42\u9762\u6062\u590d\u8bad\u7ec3\u6570\u636e\u7684\u5168\u5c40\u9886\u57df\u5206\u5e03\uff08\u800c\u975e\u5355\u6837\u672c\u7ea7\u522b\uff09\uff0c\u5bf9\u6a21\u578b\u900f\u660e\u5ea6\u3001\u6570\u636e\u5ba1\u8ba1\u548c\u7248\u6743\u8ffd\u6eaf\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u4e5f\u63ed\u793a\u4e86\u6a21\u578b\u53d1\u5e03\u4e2d\u6f5c\u5728\u7684\u6570\u636e\u9690\u79c1\u98ce\u9669\u3002"}, {"abstract": "Large vision-language models can reason over multimodal inputs by generating textual chains of thought (CoT). A key capability exhibited in CoT reasoning is self-reflection: revisiting earlier decisions and correcting previous errors. However, existing LVLMs often fail to properly attend to visual inputs during reflection, limiting their ability to translate feedback into grounded corrections, especially for out-of-distribution images. To address this issue, we propose a novel reinforcement learning training framework VRRL, with two components explicitly designed to elicit visually grounded self-reflection. First, we randomly mask trajectory prefixes during training to emphasize recovery from incorrect intermediate predictions rather than making early mistakes. Second, we introduce buffered roll-ins from an experience replay buffer to expose the model to diverse failure states that it must learn to correct. We evaluate our approach on visual grounding tasks involving tables and charts, as well as spatial navigation benchmarks. While off-the-shelf and conventionally fine-tuned models degrade substantially under distribution shift, our method substantially improves average out-of-distribution accuracy over standard RL and reflection-oriented fine-tuning baselines by using self-reflection effectively.", "arxiv_id": "2607.02490", "arxiv_url": "https://arxiv.org/abs/2607.02490", "authors": ["Liyan Tang", "Fangcong Yin", "Greg Durrett"], "brief": "\u63d0\u51faVRRL\u8bad\u7ec3\u6846\u67b6\uff0c\u901a\u8fc7\u968f\u673a\u63a9\u7801\u8f68\u8ff9\u524d\u7f00\u548c\u7ecf\u9a8c\u56de\u653e\u7f13\u51b2\u533a\u4e24\u9879\u673a\u5236\uff0c\u4f7f\u5927\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728CoT\u63a8\u7406\u7684\u81ea\u6211\u53cd\u601d\u9636\u6bb5\u80fd\u591f\u771f\u6b63\u57fa\u4e8e\u89c6\u89c9\u4fe1\u606f\u8fdb\u884c\u9519\u8bef\u7ea0\u6b63\uff0c\u800c\u975e\u4ec5\u4f9d\u8d56\u6587\u672c\u3002", "categories": ["cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02490", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u968f\u673a\u63a9\u7801\u8f68\u8ff9\u524d\u7f00\uff1a\u8bad\u7ec3\u65f6\u5f3a\u8c03\u4ece\u9519\u8bef\u4e2d\u95f4\u9884\u6d4b\u4e2d\u6062\u590d\uff0c\u800c\u975e\u907f\u514d\u65e9\u671f\u9519\u8bef", "\u7ecf\u9a8c\u56de\u653e\u7f13\u51b2\u533a\u7684\u7f13\u51b2roll-in\uff1a\u8ba9\u6a21\u578b\u63a5\u89e6\u591a\u6837\u5316\u5931\u8d25\u72b6\u6001\u5e76\u5b66\u4e60\u7ea0\u6b63", "\u5728\u8868\u683c\u3001\u56fe\u8868\u89c6\u89c9\u5b9a\u4f4d\u53ca\u7a7a\u95f4\u5bfc\u822a\u57fa\u51c6\u4e0a\uff0c\u5206\u5e03\u5916\u51c6\u786e\u7387\u663e\u8457\u4f18\u4e8e\u6807\u51c6RL\u548c\u53cd\u601d\u5fae\u8c03\u57fa\u7ebf"], "keywords": ["\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02490v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Visually Grounded Self-Reflection for Vision-Language Models via Reinforcement Learning", "tldr": "\u63d0\u51faVRRL\u6846\u67b6\uff0c\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u8ba9\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u81ea\u6211\u53cd\u601d\u65f6\u771f\u6b63\u5173\u6ce8\u89c6\u89c9\u8f93\u5165", "upvotes": 0, "what_it_is": "\u63d0\u51faVRRL\u8bad\u7ec3\u6846\u67b6\uff0c\u901a\u8fc7\u968f\u673a\u63a9\u7801\u8f68\u8ff9\u524d\u7f00\u548c\u7ecf\u9a8c\u56de\u653e\u7f13\u51b2\u533a\u4e24\u9879\u673a\u5236\uff0c\u4f7f\u5927\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728CoT\u63a8\u7406\u7684\u81ea\u6211\u53cd\u601d\u9636\u6bb5\u80fd\u591f\u771f\u6b63\u57fa\u4e8e\u89c6\u89c9\u4fe1\u606f\u8fdb\u884c\u9519\u8bef\u7ea0\u6b63\uff0c\u800c\u975e\u4ec5\u4f9d\u8d56\u6587\u672c\u3002", "why_notable": "\u73b0\u6709LVLM\u5728\u81ea\u6211\u53cd\u601d\u65f6\u666e\u904d\u5ffd\u89c6\u89c6\u89c9\u8f93\u5165\uff0cVRRL\u9488\u5bf9\u6027\u89e3\u51b3\u4e86\u5206\u5e03\u5916\u6cdb\u5316\u95ee\u9898\uff0c\u5bf9\u63d0\u5347\u591a\u6a21\u6001\u63a8\u7406\u53ef\u9760\u6027\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Reasoning Language Models (RLMs) have significantly improved performance on complex tasks by extending the reasoning chain. However, these chains are prone to containing factual errors, particularly in knowledge-intensive tasks. To address this issue, we propose CheckRLM, a framework that improves the reliability of the reasoning process through Retrieval-Augmented Generation (RAG) by timely checking and correcting factual errors. Specifically, CheckRLM extracts factual claims from the reasoning chain to identify and localize subtle knowledge inconsistencies during inference. Upon detection of errors, a refinement mechanism performs minimal-cost yet precise corrections by leveraging external knowledge, ensuring coherence between the reasoning chain and correct knowledge. Extensive experiments demonstrate that CheckRLM substantially outperforms existing baselines, exhibiting a strong capability to mitigate error accumulation in long-horizon reasoning with lower costs. The code and data are available at https://github.com/AI9Stars/CheckRLM.", "arxiv_id": "2607.02262", "arxiv_url": "https://arxiv.org/abs/2607.02262", "authors": ["Dingling Xu", "Ruobing Wang", "Qingfei Zhao", "Yukun Yan", "Zhichun Wang", "Daren Zha", "Shi Yu", "Zhenghao Liu", "Shuo Wang", "Xu Han", "Maosong Sun"], "brief": "\u63d0\u51faCheckRLM\u6846\u67b6\uff0c\u5728\u63a8\u7406\u8bed\u8a00\u6a21\u578b\uff08RLM\uff09\u751f\u6210\u63a8\u7406\u94fe\u7684\u8fc7\u7a0b\u4e2d\uff0c\u5b9e\u65f6\u63d0\u53d6\u4e8b\u5b9e\u58f0\u660e\u5e76\u68c0\u6d4b\u77e5\u8bc6\u4e0d\u4e00\u81f4\uff0c\u5229\u7528\u5916\u90e8\u68c0\u7d22\u77e5\u8bc6\u4ee5\u6700\u5c0f\u4ee3\u4ef7\u7cbe\u51c6\u7ea0\u6b63\u9519\u8bef\uff0c\u4fdd\u8bc1\u63a8\u7406\u94fe\u4e0e\u6b63\u786e\u77e5\u8bc6\u7684\u8fde\u8d2f\u6027\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02262", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4ece\u63a8\u7406\u94fe\u4e2d\u52a8\u6001\u63d0\u53d6\u4e8b\u5b9e\u58f0\u660e\uff0c\u7cbe\u51c6\u5b9a\u4f4d\u7ec6\u5fae\u77e5\u8bc6\u4e0d\u4e00\u81f4\u95ee\u9898", "\u68c0\u6d4b\u5230\u9519\u8bef\u540e\u89e6\u53d1\u6700\u5c0f\u4ee3\u4ef7\u7cbe\u51c6\u4fee\u6b63\u673a\u5236\uff0c\u5229\u7528\u5916\u90e8\u77e5\u8bc6\u4fdd\u6301\u63a8\u7406\u8fde\u8d2f\u6027", "\u5927\u91cf\u5b9e\u9a8c\u8868\u660eCheckRLM\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\uff0c\u6709\u6548\u7f13\u89e3\u957f\u94fe\u63a8\u7406\u4e2d\u7684\u9519\u8bef\u7d2f\u79ef"], "keywords": ["\u63a8\u7406\u8bed\u8a00\u6a21\u578b", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u4e8b\u5b9e\u6838\u67e5", "\u77e5\u8bc6\u5bc6\u96c6\u578b\u4efb\u52a1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02262v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CheckRLM: Effective Knowledge-Thought Coherence Checking in Retrieval-Augmented Reasoning", "tldr": "CheckRLM\u6846\u67b6\u901a\u8fc7RAG\u5b9e\u65f6\u68c0\u6d4b\u5e76\u7ea0\u6b63\u63a8\u7406\u94fe\u4e2d\u7684\u4e8b\u5b9e\u9519\u8bef\uff0c\u63d0\u5347\u63a8\u7406\u8bed\u8a00\u6a21\u578b\u53ef\u9760\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51faCheckRLM\u6846\u67b6\uff0c\u5728\u63a8\u7406\u8bed\u8a00\u6a21\u578b\uff08RLM\uff09\u751f\u6210\u63a8\u7406\u94fe\u7684\u8fc7\u7a0b\u4e2d\uff0c\u5b9e\u65f6\u63d0\u53d6\u4e8b\u5b9e\u58f0\u660e\u5e76\u68c0\u6d4b\u77e5\u8bc6\u4e0d\u4e00\u81f4\uff0c\u5229\u7528\u5916\u90e8\u68c0\u7d22\u77e5\u8bc6\u4ee5\u6700\u5c0f\u4ee3\u4ef7\u7cbe\u51c6\u7ea0\u6b63\u9519\u8bef\uff0c\u4fdd\u8bc1\u63a8\u7406\u94fe\u4e0e\u6b63\u786e\u77e5\u8bc6\u7684\u8fde\u8d2f\u6027\u3002", "why_notable": "\u9488\u5bf9\u63a8\u7406\u8bed\u8a00\u6a21\u578b\u5728\u77e5\u8bc6\u5bc6\u96c6\u578b\u4efb\u52a1\u4e2d\u6613\u4ea7\u751f\u4e8b\u5b9e\u9519\u8bef\u7684\u75db\u70b9\uff0c\u5c06RAG\u4e0e\u63a8\u7406\u8fc7\u7a0b\u6df1\u5ea6\u7ed3\u5408\uff0c\u5b9e\u73b0\u63a8\u7406\u65f6\u7684\u5b9e\u65f6\u4e8b\u5b9e\u6838\u67e5\u4e0e\u7ea0\u9519\uff0c\u5bf9\u63d0\u5347LLM\u63a8\u7406\u53ef\u9760\u6027\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Steering vectors have emerged as a promising approach to controlled text generation, offering interpretable, training-free mechanisms for shaping model outputs. However, their practical generality remains poorly understood. We study the limits of steering vector generalization along three dimensions: trait expressibility, task transfer, and multi-trait composition. Using the PLUME writing personalization benchmark, we extract steering vectors for a range of preferences and evaluate them on summarization and email-writing tasks across two open-source models (Qwen2.5-7B-Instruct and Llama3.1-8B-Instruct). We find that steering effectiveness varies substantially across traits. We further show that steering effectiveness can degrade when vectors extracted from positive and negative style examples are transferred to downstream writing personalization tasks. Finally, we compare common methods for composing multiple steering vectors and find that all methods suffer significant drops in trait expression as more vectors are added, with a tradeoff between coherence and expressibility that requires per-setting hyperparameter tuning. Taken together, our results suggest that steering vectors face meaningful limits as a general-purpose tool for preference alignment.", "arxiv_id": "2607.01802", "arxiv_url": "https://arxiv.org/abs/2607.01802", "authors": ["Melanie Subbiah", "Zara Hall", "Kathleen McKeown"], "brief": "\u672c\u6587\u901a\u8fc7PLUME\u5199\u4f5c\u4e2a\u6027\u5316\u57fa\u51c6\uff0c\u4ece\u7279\u5f81\u53ef\u8868\u8fbe\u6027\u3001\u4efb\u52a1\u8fc1\u79fb\u548c\u591a\u7279\u5f81\u7ec4\u5408\u4e09\u4e2a\u7ef4\u5ea6\uff0c\u7cfb\u7edf\u7814\u7a76\u4e86Steering Vectors\u4f5c\u4e3a\u901a\u7528\u504f\u597d\u5bf9\u9f50\u5de5\u5177\u7684\u5c40\u9650\u6027\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01802", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4e0d\u540c\u7279\u5f81\u7684Steering\u6548\u679c\u5dee\u5f02\u663e\u8457\uff0c\u5e76\u975e\u6240\u6709\u504f\u597d\u7279\u5f81\u90fd\u80fd\u88ab\u6709\u6548\u5f15\u5bfc", "\u4ece\u6b63\u8d1f\u6837\u672c\u63d0\u53d6\u7684Steering Vectors\u8fc1\u79fb\u5230\u4e0b\u6e38\u5199\u4f5c\
