<script>
const PAPERS = [{"abstract": "Evaluating LLM agents on benchmarks like SWE-Bench and GAIA can be expensive, time-consuming, and requires complex infrastructure. A single evaluation can cost thousands of dollars and take days to complete. In contrast, non-agentic LLM benchmarks that test individual capabilities (e.g., reasoning, code generation) are fast and cheap to run. In this paper, we investigate whether performance on expensive agentic benchmarks can be accurately predicted by the performance on a small, carefully selected subset of atomic evaluation instances. We introduce PACE, a framework that constructs proxy benchmarks by selecting instances from existing non-agentic evaluations whose aggregate scores most reliably predict model performances on agentic benchmarks. Given a pool of candidate instances spanning atomic capabilities, PACE fits a regression that maps a model\u0027s scores on a compact subset of source instances to its score on the target agentic benchmark. The subset itself is curated by combining two complementary instance-selection strategies, target-relevance local selection and globally informative global selection. We apply PACE to the 4 target agentic benchmarks in this paper, which yields PACE-Bench, the concrete proxy benchmark that we evaluate in the paper. Experiments across 14 models, 4 agentic benchmarks, and 19 non-agentic benchmarks show that PACE-Bench predicts agentic scores with leave-one-out cross-validation (LOOCV) mean absolute error (MAE) under 4%, Spearman correlation above 0.80, and pairwise model-ranking accuracy around 85%, all at much less than 1% of the full agentic evaluation cost. We further analyze the selected proxy instances, revealing which skills each agentic benchmark uniquely demands. PACE enables practitioners to obtain reliable estimates of agentic performance during model development, selection, and routing, without the overhead of full agent evaluation.", "arxiv_id": "2607.02032", "arxiv_url": "https://arxiv.org/abs/2607.02032", "authors": ["Yueqi Song", "Lintang Sutawika", "Jiarui Liu", "Lindia Tjuatja", "Jiayi Geng", "Yunze Xiao", "Daniel Lee", "Aditya Bharat Soni", "Vincent Lo", "Xiang Yue", "Graham Neubig"], "brief": "\u63d0\u51faPACE\u6846\u67b6\uff0c\u901a\u8fc7\u4ece\u975e\u667a\u80fd\u4f53\u8bc4\u6d4b\u4e2d\u7b5b\u9009\u5c11\u91cf\u539f\u5b50\u80fd\u529b\u5b9e\u4f8b\u6784\u5efa\u4ee3\u7406\u57fa\u51c6\uff0c\u7528\u56de\u5f52\u6a21\u578b\u51c6\u786e\u9884\u6d4b\u6a21\u578b\u5728SWE-Bench\u3001GAIA\u7b49\u6602\u8d35\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u7684\u8868\u73b0\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02032", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7ed3\u5408\u76ee\u6807\u76f8\u5173\u5c40\u90e8\u9009\u62e9\u4e0e\u5168\u5c40\u4fe1\u606f\u5168\u5c40\u9009\u62e9\u4e24\u79cd\u4e92\u8865\u7b56\u7565\u7b5b\u9009\u5b9e\u4f8b", "\u572814\u4e2a\u6a21\u578b\u30014\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u300119\u4e2a\u975e\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff1aMAE\u4f4e\u4e8e4%\u3001Spearman\u76f8\u5173\u7cfb\u6570\u8d850.80\u3001\u6a21\u578b\u6392\u540d\u51c6\u786e\u7387\u7ea685%", "\u8bc4\u6d4b\u6210\u672c\u4e0d\u8db3\u5b8c\u6574\u667a\u80fd\u4f53\u8bc4\u6d4b\u76841%\uff0c\u540c\u65f6\u63ed\u793a\u5404\u667a\u80fd\u4f53\u57fa\u51c6\u6240\u9700\u7684\u72ec\u7279\u6280\u80fd"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "LLM", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02032v1", "published_at": "2026-07-02", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "PACE: A Proxy for Agentic Capability Evaluation", "tldr": "\u7528\u5ec9\u4ef7\u975e\u667a\u80fd\u4f53\u57fa\u51c6\u9884\u6d4b\u6602\u8d35\u667a\u80fd\u4f53\u57fa\u51c6\u6027\u80fd\uff0c\u6210\u672c\u4e0d\u8db31%", "upvotes": 0, "what_it_is": "\u63d0\u51faPACE\u6846\u67b6\uff0c\u901a\u8fc7\u4ece\u975e\u667a\u80fd\u4f53\u8bc4\u6d4b\u4e2d\u7b5b\u9009\u5c11\u91cf\u539f\u5b50\u80fd\u529b\u5b9e\u4f8b\u6784\u5efa\u4ee3\u7406\u57fa\u51c6\uff0c\u7528\u56de\u5f52\u6a21\u578b\u51c6\u786e\u9884\u6d4b\u6a21\u578b\u5728SWE-Bench\u3001GAIA\u7b49\u6602\u8d35\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u7684\u8868\u73b0\u3002", "why_notable": "\u89e3\u51b3\u4e86\u667a\u80fd\u4f53\u57fa\u51c6\u8bc4\u6d4b\u6210\u672c\u9ad8\u6602\uff08\u5355\u6b21\u6570\u5343\u7f8e\u5143\u3001\u8017\u65f6\u6570\u5929\uff09\u7684\u75db\u70b9\uff0c\u4e3a\u6a21\u578b\u5f00\u53d1\u3001\u9009\u578b\u548c\u8def\u7531\u63d0\u4f9b\u53ef\u9760\u7684\u4f4e\u6210\u672c\u6027\u80fd\u4f30\u8ba1\u65b9\u6848\uff0c\u5177\u6709\u6781\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "LLM agents increasingly perform autonomous actions through external tools, leading to complex and evolving safety risks. However, existing safety testing targets expert-designed safety violations, and the corresponding outcomes are evaluated by hard-coded rules, making them costly to extend as agents evolve. To this end, we present Vera, an end-to-end automated safety testing framework that instantiates software engineering testing principles for non-deterministic agents through a three-stage, self-reinforcing pipeline. First, a literature-driven exploration continuously discovers and structures emerging risks into taxonomies of safety risks, attack methods, and tool execution environments. Second, combinatorial composition across taxonomy dimensions produces executable safety cases, each specifying a concrete safety goal, a programmatically constructed initial state, and a deterministic verification predicate grounded in observable artifacts. Third, adaptive execution runs heterogeneous agents in isolated sandboxes where a control agent steers multi-turn interaction based on runtime observations, while evidence-grounded verifiers judge outcomes from environment state and tool-call evidence rather than model self-report. We evaluate Vera on four production agent frameworks (OpenClaw, Hermes, Codex, Claude Code), revealing substantial safety weaknesses, with average attack success rates reaching 93.9\\% under multi-channel attacks; we also release Vera-Bench, comprising 1600 executable safety cases spanning 124 risk categories across three execution settings. These results indicate that modular, executable testing infrastructure is essential for rigorous and maintainable safety evaluation of rapidly evolving agentic systems at scale. The code is publicly available at https://github.com/Yunhao-Feng/Vera.", "arxiv_id": "2607.01793", "arxiv_url": "https://arxiv.org/abs/2607.01793", "authors": ["Yunhao Feng", "Ruixiao Lin", "Ming Wen", "Qinqin He", "Yanming Guo", "Yifan Ding", "Yutao Wu", "Jialuo Chen", "Yunhao Chen", "Xiaohu Du", "Jianan Ma", "Zixing Chen", "Zhuoer Xu", "Xingjun Ma", "Xinhao Deng"], "brief": "\u63d0\u51faVera\uff0c\u4e00\u4e2a\u7aef\u5230\u7aef\u81ea\u52a8\u5316\u5b89\u5168\u6d4b\u8bd5\u6846\u67b6\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u6d41\u6c34\u7ebf\uff08\u98ce\u9669\u53d1\u73b0\u2192\u6d4b\u8bd5\u7528\u4f8b\u751f\u6210\u2192\u81ea\u9002\u5e94\u6267\u884c\u9a8c\u8bc1\uff09\u7cfb\u7edf\u6027\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u7684\u5b89\u5168\u6027\uff0c\u5e76\u53d1\u5e03\u542b1600\u4e2a\u53ef\u6267\u884c\u5b89\u5168\u7528\u4f8b\u7684Vera-Bench\u57fa\u51c6\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01793", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u9636\u6bb5\u6d41\u6c34\u7ebf\uff1a\u6587\u732e\u9a71\u52a8\u7684\u98ce\u9669\u5206\u7c7b\u6cd5\u6784\u5efa \u2192 \u7ec4\u5408\u5f0f\u5b89\u5168\u6d4b\u8bd5\u7528\u4f8b\u751f\u6210 \u2192 \u6c99\u7bb1\u9694\u79bb\u7684\u81ea\u9002\u5e94\u591a\u8f6e\u6267\u884c\u9a8c\u8bc1", "\u5728OpenClaw\u3001Hermes\u3001Codex\u3001Claude Code\u56db\u4e2a\u4e3b\u6d41\u667a\u80fd\u4f53\u6846\u67b6\u4e0a\u6d4b\u8bd5\uff0c\u591a\u901a\u9053\u653b\u51fb\u5e73\u5747\u6210\u529f\u7387\u9ad8\u8fbe93.9%", "Vera-Bench\u8986\u76d6124\u4e2a\u98ce\u9669\u7c7b\u522b\u3001\u4e09\u79cd\u6267\u884c\u73af\u5883\uff0c\u51711600\u4e2a\u53ef\u6267\u884c\u5b89\u5168\u7528\u4f8b\uff0c\u5df2\u5f00\u6e90"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01793v1", "published_at": "2026-07-02", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Safety Testing LLM Agents at Scale: From Risk Discovery to Evidence-Grounded Verification", "tldr": "Vera\u6846\u67b6\u81ea\u52a8\u5316\u5927\u89c4\u6a21\u6d4b\u8bd5LLM\u667a\u80fd\u4f53\u5b89\u5168\u6027\uff0c\u63ed\u793a\u4e3b\u6d41\u6846\u67b6\u5e73\u574793.9%\u653b\u51fb\u6210\u529f\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faVera\uff0c\u4e00\u4e2a\u7aef\u5230\u7aef\u81ea\u52a8\u5316\u5b89\u5168\u6d4b\u8bd5\u6846\u67b6\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u6d41\u6c34\u7ebf\uff08\u98ce\u9669\u53d1\u73b0\u2192\u6d4b\u8bd5\u7528\u4f8b\u751f\u6210\u2192\u81ea\u9002\u5e94\u6267\u884c\u9a8c\u8bc1\uff09\u7cfb\u7edf\u6027\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u7684\u5b89\u5168\u6027\uff0c\u5e76\u53d1\u5e03\u542b1600\u4e2a\u53ef\u6267\u884c\u5b89\u5168\u7528\u4f8b\u7684Vera-Bench\u57fa\u51c6\u3002", "why_notable": "\u9996\u4e2a\u5c06\u8f6f\u4ef6\u5de5\u7a0b\u6d4b\u8bd5\u539f\u5219\u7cfb\u7edf\u5316\u5e94\u7528\u4e8e\u975e\u786e\u5b9a\u6027LLM\u667a\u80fd\u4f53\u5b89\u5168\u6d4b\u8bd5\u7684\u6846\u67b6\uff0c\u7a81\u7834\u4e86\u4eba\u5de5\u8bbe\u8ba1\u6d4b\u8bd5\u7528\u4f8b\u7684\u6269\u5c55\u74f6\u9888\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u4e3b\u6d41\u667a\u80fd\u4f53\u6846\u67b6\u7684\u4e25\u91cd\u5b89\u5168\u9690\u60a3\uff0c\u5bf9\u5feb\u901f\u6f14\u8fdb\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u5b89\u5168\u8bc4\u4f30\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Skills are becoming a reusable operational layer for LLM agents, encoding SOPs, domain rules, tool workflows, scripts, and validation routines. In realistic skill repositories, overlapping skills make reliable skill-use difficult. Final verifier success is too coarse for both evaluation and training, since an agent may pass through trial and error while selecting distractor skills, skipping required steps, composing workflows incorrectly or omitting final checks. We introduce SkillCoach, a self-evolving rubric framework for evaluating and enhancing agentic skill-use. SkillCoach derives skill-grounded process rubrics from real rollouts and evaluates trajectories along four dimensions: skill selection, skill following, skill composition, and skill-grounded reflection. It keeps the external verifier as a separate outcome signal, allowing process quality to be distinguished from accidental task success. The evolved rubrics further serve as process supervision for selecting high-quality training trajectories. Experiments show that evolved rubrics substantially improve evaluation quality, expose failures hidden by final accuracy, and provide stronger supervision signals than outcome-only filtering for enhancing agentic skill-use.", "arxiv_id": "2607.01874", "arxiv_url": "https://arxiv.org/abs/2607.01874", "authors": ["Jiayin Zhu", "Kelong Mao", "Yudong Guo", "Dengbo He", "Sulong Xu", "Simiu Gu", "Yutao Yue"], "brief": "SkillCoach\u662f\u4e00\u4e2a\u81ea\u8fdb\u5316\u8bc4\u5206\u6846\u67b6\uff0c\u901a\u8fc7\u4ece\u771f\u5b9e\u8f68\u8ff9\u4e2d\u81ea\u52a8\u63a8\u5bfc\u6280\u80fd\u5bfc\u5411\u7684\u8fc7\u7a0b\u8bc4\u5206\u6807\u51c6\uff0c\u4ece\u6280\u80fd\u9009\u62e9\u3001\u6280\u80fd\u9075\u5faa\u3001\u6280\u80fd\u7ec4\u5408\u548c\u6280\u80fd\u53cd\u601d\u56db\u4e2a\u7ef4\u5ea6\u8bc4\u4f30\u667a\u80fd\u4f53\u7684\u6280\u80fd\u4f7f\u7528\u8d28\u91cf\uff0c\u5e76\u5c06\u8fdb\u5316\u540e\u7684\u8bc4\u5206\u6807\u51c6\u7528\u4e8e\u7b5b\u9009\u9ad8\u8d28\u91cf\u8bad\u7ec3\u8f68\u8ff9\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01874", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u6280\u80fd\u4f7f\u7528\u8bc4\u4f30\u5206\u89e3\u4e3a\u56db\u4e2a\u7ef4\u5ea6\uff1a\u6280\u80fd\u9009\u62e9\u3001\u6280\u80fd\u9075\u5faa\u3001\u6280\u80fd\u7ec4\u5408\u3001\u6280\u80fd\u5bfc\u5411\u53cd\u601d", "\u8bc4\u5206\u6807\u51c6\u4ece\u771f\u5b9e\u6267\u884c\u8f68\u8ff9\u4e2d\u81ea\u52a8\u63a8\u5bfc\u5e76\u6301\u7eed\u8fdb\u5316\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8", "\u5c06\u8fc7\u7a0b\u8d28\u91cf\u4fe1\u53f7\u4e0e\u6700\u7ec8\u9a8c\u8bc1\u5668\u7684\u7ed3\u679c\u4fe1\u53f7\u5206\u79bb\uff0c\u80fd\u66b4\u9732\u6700\u7ec8\u51c6\u786e\u7387\u63a9\u76d6\u7684\u5931\u8d25\u6848\u4f8b", "\u8fdb\u5316\u540e\u7684\u8bc4\u5206\u6807\u51c6\u4f5c\u4e3a\u8fc7\u7a0b\u76d1\u7763\u4fe1\u53f7\uff0c\u6bd4\u4ec5\u57fa\u4e8e\u7ed3\u679c\u7684\u8fc7\u6ee4\u65b9\u5f0f\u63d0\u4f9b\u66f4\u5f3a\u7684\u8bad\u7ec3\u4fe1\u53f7"], "keywords": ["\u667a\u80fd\u4f53", "LLM", "\u8fc7\u7a0b\u76d1\u7763", "\u6280\u80fd\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01874v1", "published_at": "2026-07-02", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SkillCoach: Self-Evolving Rubrics for Evaluating and Enhancing Agentic Skill-Use", "tldr": "SkillCoach\u63d0\u51fa\u81ea\u8fdb\u5316\u8bc4\u5206\u6846\u67b6\uff0c\u4ece\u8fc7\u7a0b\u7ef4\u5ea6\u8bc4\u4f30\u548c\u63d0\u5347LLM\u667a\u80fd\u4f53\u7684\u6280\u80fd\u4f7f\u7528\u80fd\u529b", "upvotes": 0, "what_it_is": "SkillCoach\u662f\u4e00\u4e2a\u81ea\u8fdb\u5316\u8bc4\u5206\u6846\u67b6\uff0c\u901a\u8fc7\u4ece\u771f\u5b9e\u8f68\u8ff9\u4e2d\u81ea\u52a8\u63a8\u5bfc\u6280\u80fd\u5bfc\u5411\u7684\u8fc7\u7a0b\u8bc4\u5206\u6807\u51c6\uff0c\u4ece\u6280\u80fd\u9009\u62e9\u3001\u6280\u80fd\u9075\u5faa\u3001\u6280\u80fd\u7ec4\u5408\u548c\u6280\u80fd\u53cd\u601d\u56db\u4e2a\u7ef4\u5ea6\u8bc4\u4f30\u667a\u80fd\u4f53\u7684\u6280\u80fd\u4f7f\u7528\u8d28\u91cf\uff0c\u5e76\u5c06\u8fdb\u5316\u540e\u7684\u8bc4\u5206\u6807\u51c6\u7528\u4e8e\u7b5b\u9009\u9ad8\u8d28\u91cf\u8bad\u7ec3\u8f68\u8ff9\u3002", "why_notable": "\u73b0\u6709LLM\u667a\u80fd\u4f53\u8bc4\u4f30\u8fc7\u5ea6\u4f9d\u8d56\u6700\u7ec8\u7ed3\u679c\uff0c\u65e0\u6cd5\u533a\u5206\"\u4fa5\u5e78\u6210\u529f\"\u4e0e\"\u6b63\u786e\u6267\u884c\"\u3002SkillCoach\u586b\u8865\u4e86\u6280\u80fd\u5e93\u573a\u666f\u4e0b\u8fc7\u7a0b\u7ea7\u8bc4\u4f30\u7684\u7a7a\u767d\uff0c\u5176\u81ea\u8fdb\u5316\u673a\u5236\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u5373\u53ef\u6301\u7eed\u6539\u8fdb\uff0c\u5bf9\u6784\u5efa\u53ef\u9760\u7684\u6280\u80fd\u9a71\u52a8\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Memory for a long-horizon LLM agent is a contract about what each future decision is allowed to see. The simplest contract appends past observations, tool calls, and reflections to every prompt, which makes prior context easy to access but also turns it into a jumbled mixture in which the effect of any single memory component is hard to isolate. We introduce and instrument an alternative bounded contract: every decision is made from a fresh user message assembled by typed retrieval, with no raw cross-decision transcript appended. The prompt thus stays bounded across runs of any length, and any single layer can be ablated in isolation. We instantiate the contract in Slay the Spire 2, a closed-rule stochastic deck-building game whose runs require hundreds of tactical and strategic decisions. A public online benchmark of frontier LLMs on the same game reports zero wins at the lowest difficulty across five configurations, and the developer-reported human win rate at the same difficulty is 16%; the task is hard but not saturated. Within our harness, a fixed-A0 ablation shows the largest observed difference when triggered strategic skills are enabled: the no-store baseline wins 3/10 games and adding the skill layer 6/10. At this sample size the comparison is directional rather than statistically decisive (Fisher exact p\\approx0.37); a cross-backbone probe and public accumulating-context baselines are reported as operational comparisons rather than controlled tests of the contract variable itself. We release a reproducible testbed: 298 completed trajectories with condition tags, frozen memory/skill snapshots, prompt records, and analysis scripts -- an agent design and a validated, reusable methodology for studying how explicit memory layers shape long-horizon LLM-agent decisions.", "arxiv_id": "2607.02255", "arxiv_url": "https://arxiv.org/abs/2607.02255", "authors": ["Xiangchen Cheng", "Yunwei Jiang", "Jianwen Sun", "Zizhen Li", "Chuanhao Li", "Xiangcheng Cao", "Yihao Liu", "Fanrui Zhang", "Li Jin", "Kaipeng Zhang"], "brief": "\u6784\u5efa\u4e86\u4e00\u4e2a\u57fa\u4e8e\u6709\u754c\u8bb0\u5fc6\u5408\u7ea6\u7684LLM\u667a\u80fd\u4f53\u6d4b\u8bd5\u5e73\u53f0\uff0c\u6bcf\u6b21\u51b3\u7b56\u4ece\u65b0\u9c9c\u6d88\u606f\u7ec4\u88c5\u800c\u975e\u8ffd\u52a0\u5386\u53f2\u8bb0\u5f55\uff0c\u5e76\u4ee5\u300a\u6740\u622e\u5c16\u58542\u300b\u4e3a\u57fa\u51c6\u4efb\u52a1\uff0c\u7cfb\u7edf\u7814\u7a76\u4e0d\u540c\u8bb0\u5fc6\u5c42\u5bf9\u957f\u65f6\u57df\u51b3\u7b56\u7684\u5f71\u54cd\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02255", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u6709\u754c\u8bb0\u5fc6\u5408\u7ea6\uff1a\u6bcf\u6b21\u51b3\u7b56\u4f7f\u7528\u7c7b\u578b\u5316\u68c0\u7d22\u7ec4\u88c5\u65b0\u6d88\u606f\uff0c\u63d0\u793a\u957f\u5ea6\u4e0d\u968f\u8fd0\u884c\u8f6e\u6b21\u589e\u957f\uff0c\u652f\u6301\u5355\u5c42\u6d88\u878d\u5b9e\u9a8c", "\u5b9e\u9a8c\u53d1\u73b0\uff1a\u542f\u7528\u6218\u7565\u6280\u80fd\u5c42\u540e\u80dc\u7387\u4ece3/10\u63d0\u5347\u81f36/10\uff0c\u4f46\u6837\u672c\u91cf\u6709\u9650\uff08Fisher\u7cbe\u786e\u68c0\u9a8cp\u22480.37\uff09\uff0c\u7ed3\u8bba\u4e3a\u65b9\u5411\u6027\u800c\u975e\u7edf\u8ba1\u663e\u8457", "\u516c\u5f00\u53d1\u5e03298\u6761\u5b8c\u6574\u8f68\u8ff9\u6570\u636e\u96c6\uff0c\u542b\u6761\u4ef6\u6807\u7b7e\u3001\u8bb0\u5fc6\u5feb\u7167\u3001\u63d0\u793a\u8bb0\u5f55\u548c\u5206\u6790\u811a\u672c\uff0c\u652f\u6301\u53ef\u590d\u73b0\u7814\u7a76"], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u673a\u5236", "\u957f\u65f6\u57df\u51b3\u7b56", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02255v1", "published_at": "2026-07-02", "score": 0.375, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AgenticSTS: A Bounded-Memory Testbed for Long-Horizon LLM Agents", "tldr": "\u63d0\u51fa\u6709\u754c\u8bb0\u5fc6\u5408\u7ea6\u6846\u67b6AgenticSTS\uff0c\u7528\u300a\u6740\u622e\u5c16\u58542\u300b\u6d4b\u8bd5\u957f\u65f6\u57dfLLM\u667a\u80fd\u4f53\u7684\u8bb0\u5fc6\u5c42\u6548\u679c", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u4e00\u4e2a\u57fa\u4e8e\u6709\u754c\u8bb0\u5fc6\u5408\u7ea6\u7684LLM\u667a\u80fd\u4f53\u6d4b\u8bd5\u5e73\u53f0\uff0c\u6bcf\u6b21\u51b3\u7b56\u4ece\u65b0\u9c9c\u6d88\u606f\u7ec4\u88c5\u800c\u975e\u8ffd\u52a0\u5386\u53f2\u8bb0\u5f55\uff0c\u5e76\u4ee5\u300a\u6740\u622e\u5c16\u58542\u300b\u4e3a\u57fa\u51c6\u4efb\u52a1\uff0c\u7cfb\u7edf\u7814\u7a76\u4e0d\u540c\u8bb0\u5fc6\u5c42\u5bf9\u957f\u65f6\u57df\u51b3\u7b56\u7684\u5f71\u54cd\u3002", "why_notable": "\u9488\u5bf9\u957f\u65f6\u57dfLLM\u667a\u80fd\u4f53\u8bb0\u5fc6\u673a\u5236\u7814\u7a76\u7f3a\u4e4f\u53ef\u63a7\u5b9e\u9a8c\u73af\u5883\u7684\u75db\u70b9\uff0c\u63d0\u4f9b\u4e86\u9996\u4e2a\u652f\u6301\u5355\u5c42\u6d88\u878d\u7684\u6709\u754c\u8bb0\u5fc6\u6d4b\u8bd5\u5e8a\uff0c\u5e76\u9009\u7528\u524d\u6cbf\u6a21\u578b\u80dc\u7387\u4e3a\u96f6\u7684\u56f0\u96be\u4efb\u52a1\uff0c\u517c\u5177\u65b9\u6cd5\u8bba\u521b\u65b0\u4e0e\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "LLM agents will increasingly act in socially structured settings where role, audience, and relational context can shape what is advantageous or costly to say. We study whether such social structure, without any explicit objective in the prompt, changes what an agent expresses publicly relative to an off-the-record (OTR) channel elicited under the same condition. We introduce a dual-channel debate framework in which agents produce public utterances that enter the shared history alongside OTR responses that are recorded but never shown to the other participant. Across 10 models, 3 scenarios, and 5 variations within each scenario, alignment-inducing settings produce systematic public-OTR divergence in the targeted agent, with its decision divergence rising from a $\\sim$3% baseline to roughly 40%. The effect is consistent across four aggregate analyses: stance, semantic similarity, natural language inference, and survey responses. In some cases, the OTR response explicitly attributes public accommodation to relational pressures, such as career risk or sponsorship obligation. The findings suggest that agent evaluation should extend beyond explicit goals and detect emergent objectives. We present a dual-channel evaluation framework and complementary behavioral measures that operationalize this assessment.", "arxiv_id": "2607.02507", "arxiv_url": "https://arxiv.org/abs/2607.02507", "authors": ["Arman Ghaffarizadeh", "Danyal Mohaddes", "Aliakbar Izadkhah", "Shahriar Noroozizadeh"], "brief": "\u672c\u6587\u63d0\u51fa\u53cc\u901a\u9053\u8fa9\u8bba\u6846\u67b6\uff0c\u7814\u7a76LLM\u667a\u80fd\u4f53\u5728\u793e\u4f1a\u7ed3\u6784\u60c5\u5883\uff08\u89d2\u8272\u3001\u53d7\u4f17\u3001\u5173\u7cfb\u538b\u529b\uff09\u4e0b\uff0c\u516c\u5f00\u53d1\u8a00\u4e0e\u79c1\u4e0b\uff08off-the-record\uff09\u56de\u5e94\u4e4b\u95f4\u662f\u5426\u5b58\u5728\u7cfb\u7edf\u6027\u5dee\u5f02\uff0c\u63ed\u793a\u4e86\u65e0\u9700\u663e\u5f0f\u76ee\u6807\u63d0\u793a\u5373\u53ef\u6d8c\u73b0\u7684\u9690\u6027\u884c\u4e3a\u76ee\u6807\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02507", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u53cc\u901a\u9053\u6846\u67b6\uff1a\u667a\u80fd\u4f53\u540c\u65f6\u4ea7\u751f\u8fdb\u5165\u5171\u4eab\u5386\u53f2\u7684\u516c\u5f00\u53d1\u8a00\u548c\u4ec5\u88ab\u8bb0\u5f55\u3001\u4e0d\u5c55\u793a\u7ed9\u5bf9\u65b9\u7684\u79c1\u4e0b\u56de\u5e94", "\u5728\u5bf9\u9f50\u8bf1\u5bfc\u573a\u666f\u4e0b\uff0c\u516c\u5f00\u4e0e\u79c1\u4e0b\u51b3\u7b56\u5206\u6b67\u7387\u4ece\u7ea63%\u57fa\u7ebf\u98d9\u5347\u81f3\u7ea640%\uff0c\u8de810\u4e2a\u6a21\u578b\u30013\u7c7b\u573a\u666f\u5747\u4e00\u81f4", "\u90e8\u5206\u667a\u80fd\u4f53\u5728\u79c1\u4e0b\u56de\u5e94\u4e2d\u660e\u786e\u5c06\u516c\u5f00\u59a5\u534f\u5f52\u56e0\u4e8e\u804c\u4e1a\u98ce\u9669\u6216\u8d5e\u52a9\u4e49\u52a1\u7b49\u5173\u7cfb\u538b\u529b"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u667a\u80fd\u4f53", "AI\u5b89\u5168", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02507v1", "published_at": "2026-07-02", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "What LLM Agents Say When No One Is Watching: Social Structure and Latent Objective Emergence in Multi-Agent Debates", "tldr": "LLM\u667a\u80fd\u4f53\u5728\u793e\u4f1a\u7ed3\u6784\u538b\u529b\u4e0b\u4f1a\u4ea7\u751f\u516c\u5f00\u8868\u6001\u4e0e\u79c1\u4e0b\u771f\u5b9e\u60f3\u6cd5\u7684\u7cfb\u7edf\u6027\u5206\u6b67", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u53cc\u901a\u9053\u8fa9\u8bba\u6846\u67b6\uff0c\u7814\u7a76LLM\u667a\u80fd\u4f53\u5728\u793e\u4f1a\u7ed3\u6784\u60c5\u5883\uff08\u89d2\u8272\u3001\u53d7\u4f17\u3001\u5173\u7cfb\u538b\u529b\uff09\u4e0b\uff0c\u516c\u5f00\u53d1\u8a00\u4e0e\u79c1\u4e0b\uff08off-the-record\uff09\u56de\u5e94\u4e4b\u95f4\u662f\u5426\u5b58\u5728\u7cfb\u7edf\u6027\u5dee\u5f02\uff0c\u63ed\u793a\u4e86\u65e0\u9700\u663e\u5f0f\u76ee\u6807\u63d0\u793a\u5373\u53ef\u6d8c\u73b0\u7684\u9690\u6027\u884c\u4e3a\u76ee\u6807\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u63ed\u793aLLM\u667a\u80fd\u4f53\u5728\u793e\u4f1a\u7ed3\u6784\u538b\u529b\u4e0b\u4f1a\u6d8c\u73b0\u9690\u6027\u76ee\u6807\u5e76\u4ea7\u751f\"\u8868\u91cc\u4e0d\u4e00\"\u884c\u4e3a\uff0c\u5bf9AI\u5b89\u5168\u8bc4\u4f30\u548c\u667a\u80fd\u4f53\u53ef\u4fe1\u5ea6\u7814\u7a76\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\uff0c\u63d0\u51fa\u7684\u53cc\u901a\u9053\u8bc4\u4f30\u6846\u67b6\u53ef\u76f4\u63a5\u7528\u4e8e\u68c0\u6d4b\u6b64\u7c7b\u98ce\u9669\u3002"}, {"abstract": "Repository-level vulnerability reproduction is a demanding software engineering (SE) task: an agent must inspect a codebase, infer the input grammar that reaches a vulnerable path, construct a proof-of-conceptv(PoC), and verify that the crash disappears on the patched build. Recent LLM agents can often execute these steps when the approach is correct, yet they still fail by choosing the wrong strategy. This paper argues that strategy, rather than the full action trajectory, is the right learning unit for such SE agents: it is compact enough to optimize, concrete enough to guide execution, and stable enough to store and reuse across attempts. We present Mastermind, a dual-loop framework that separates transferable strategy learning from task-specific experience. A trainable planner learns reusable vulnerability-reproduction strategies through SFT and milestone-based GRPO, while an experience loop maintains task-local strategy records that guide subsequent attempts. The planner is trained independently of the executor, allowing strategy learning to improve multiple frozen executors without modifying their action-generation capability. We evaluate Mastermind on CyberGym using 260 training tasks and 200 held-out evaluation tasks. With GPT-5.5 as the frozen executor, Mastermind achieves an 84.5% pass rate, outperforming open-book PoC context (60.0%), Best-of-8 sampling (63.0%), and iterative improvement (77.0%). The same planner also improves GPT-5.4 mini and GLM~5.1 from 45.0% and 58.5% to 60.0% and 71.0%. These results demonstrate that learning high-level strategies is an effective and transferable mechanism for improving repository-scale SE agents.", "arxiv_id": "2607.01764", "arxiv_url": "https://arxiv.org/abs/2607.01764", "authors": ["Mingzhe Du", "Luu Anh Tuan", "Tianyi Wu", "Renyang Liu", "Zhijiang Guo", "Dong Huang", "See-Kiong Ng"], "brief": "\u63d0\u51faMastermind\u53cc\u5faa\u73af\u6846\u67b6\uff0c\u5c06\u7b56\u7565\u5b66\u4e60\u4e0e\u4efb\u52a1\u6267\u884c\u5206\u79bb\uff0c\u901a\u8fc7SFT\u548c\u91cc\u7a0b\u7891\u5f0fGRPO\u8bad\u7ec3\u53ef\u590d\u7528\u7684\u6f0f\u6d1e\u590d\u73b0\u7b56\u7565\u89c4\u5212\u5668\uff0c\u4f7fLLM\u667a\u80fd\u4f53\u5728\u4ed3\u5e93\u7ea7\u6f0f\u6d1e\u590d\u73b0\u4efb\u52a1\u4e2d\u663e\u8457\u63d0\u5347\u6210\u529f\u7387\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01764", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u53cc\u5faa\u73af\u67b6\u6784\uff1a\u5916\u5c42\u8bad\u7ec3\u53ef\u8fc1\u79fb\u7b56\u7565\u89c4\u5212\u5668\uff08SFT+milestone-based GRPO\uff09\uff0c\u5185\u5c42\u7ef4\u62a4\u4efb\u52a1\u5c40\u90e8\u7ecf\u9a8c\u8bb0\u5f55", "\u89c4\u5212\u5668\u4e0e\u6267\u884c\u5668\u89e3\u8026\uff0c\u540c\u4e00\u89c4\u5212\u5668\u53ef\u63d0\u5347\u591a\u4e2a\u51bb\u7ed3\u6267\u884c\u5668\uff08GPT-5.5\u8fbe84.5%\uff0cGPT-5.4 mini\u4ece45%\u219260%\uff0cGLM 5.1\u4ece58.5%\u219271%\uff09", "\u5728CyberGym\u57fa\u51c6\u4e0a\u4ee5260\u8bad\u7ec3\u4efb\u52a1+200\u8bc4\u4f30\u4efb\u52a1\u9a8c\u8bc1\uff0c\u8d85\u8d8a\u5f00\u5377PoC\u4e0a\u4e0b\u6587(60%)\u3001Best-of-8\u91c7\u6837(63%)\u548c\u8fed\u4ee3\u6539\u8fdb(77%)"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u5b89\u5168", "\u5f3a\u5316\u5b66\u4e60", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01764v1", "published_at": "2026-07-02", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Mastermind: Strategy-grounded Learning for Repository-Scale Vulnerability Reproduction", "tldr": "Mastermind\u6846\u67b6\u901a\u8fc7\u5b66\u4e60\u53ef\u8fc1\u79fb\u7684\u9ad8\u5c42\u7b56\u7565\uff0c\u5c06\u6f0f\u6d1e\u590d\u73b0\u6210\u529f\u7387\u63d0\u5347\u81f384.5%", "upvotes": 0, "what_it_is": "\u63d0\u51faMastermind\u53cc\u5faa\u73af\u6846\u67b6\uff0c\u5c06\u7b56\u7565\u5b66\u4e60\u4e0e\u4efb\u52a1\u6267\u884c\u5206\u79bb\uff0c\u901a\u8fc7SFT\u548c\u91cc\u7a0b\u7891\u5f0fGRPO\u8bad\u7ec3\u53ef\u590d\u7528\u7684\u6f0f\u6d1e\u590d\u73b0\u7b56\u7565\u89c4\u5212\u5668\uff0c\u4f7fLLM\u667a\u80fd\u4f53\u5728\u4ed3\u5e93\u7ea7\u6f0f\u6d1e\u590d\u73b0\u4efb\u52a1\u4e2d\u663e\u8457\u63d0\u5347\u6210\u529f\u7387\u3002", "why_notable": "\u9996\u6b21\u5c06\u0027\u7b56\u7565\u0027\u4f5c\u4e3aSE\u667a\u80fd\u4f53\u7684\u6838\u5fc3\u5b66\u4e60\u5355\u5143\uff0c\u8bc1\u660e\u9ad8\u5c42\u7b56\u7565\u5b66\u4e60\u5177\u6709\u8de8\u6a21\u578b\u53ef\u8fc1\u79fb\u6027\uff0c\u4e3a\u63d0\u5347\u4ee3\u7801\u5b89\u5168\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\uff0c\u5728\u5b9e\u9645\u6f0f\u6d1e\u590d\u73b0\u4efb\u52a1\u4e0a\u53d6\u5f97\u663e\u8457\u6027\u80fd\u7a81\u7834\u3002"}, {"abstract": "LLM-based agents have shown strong potential for solving complex multi-step tasks, yet existing performance improvements often rely on either scaling to larger backbone models or task-specific fine-tuning. The former incurs substantial computational costs, while the latter typically generalizes poorly across different tasks. Although prompt-based control is training-free and broadly applicable, existing methods still leave input-output dependencies between subtasks implicit in textual trajectories, making verified intermediate results difficult to reuse. To address these limitations, we propose Atomic Task Graph (ATG), a unified control framework for planning and execution. Specifically, ATG maintains an explicit graph to expose dependencies and support reuse. During planning, it recursively decomposes a high-level task into subtasks, forming a sequence of directed acyclic graphs (DAGs) whose evolution can be traced. During execution, the dependencies exposed by ATG allow independent branches to be executed in parallel, thereby improving execution efficiency. When failures are detected, ATG leverages the graph evolution history to localize the error source and repair only the affected region, preserving validated regions unchanged. Experiments show that ATG consistently outperforms strong baselines in success rate and execution efficiency across three interactive benchmarks using only 7B-8B backbones.", "arxiv_id": "2607.01942", "arxiv_url": "https://arxiv.org/abs/2607.01942", "authors": ["Yue Zhang", "Sihan Chen", "Ziwen Huang", "Hanyun Cui", "Kangye Ji", "Zhi Wang"], "brief": "ATG\u662f\u4e00\u4e2a\u7edf\u4e00\u7684LLM\u667a\u80fd\u4f53\u89c4\u5212\u4e0e\u6267\u884c\u63a7\u5236\u6846\u67b6\uff0c\u5c06\u590d\u6742\u4efb\u52a1\u9012\u5f52\u5206\u89e3\u4e3a\u6709\u5411\u65e0\u73af\u56fe(DAG)\uff0c\u663e\u5f0f\u66b4\u9732\u5b50\u4efb\u52a1\u95f4\u7684\u8f93\u5165\u8f93\u51fa\u4f9d\u8d56\u5173\u7cfb\uff0c\u652f\u6301\u5e76\u884c\u6267\u884c\u548c\u5c40\u90e8\u9519\u8bef\u4fee\u590d\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01942", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u89c4\u5212\u9636\u6bb5\uff1a\u5c06\u9ad8\u5c42\u4efb\u52a1\u9012\u5f52\u5206\u89e3\u4e3aDAG\u5e8f\u5217\uff0c\u4f9d\u8d56\u5173\u7cfb\u663e\u5f0f\u53ef\u8ffd\u6eaf\uff0c\u907f\u514d\u9690\u5f0f\u6587\u672c\u8f68\u8ff9\u4e2d\u7684\u4f9d\u8d56\u6a21\u7cca\u95ee\u9898", "\u6267\u884c\u9636\u6bb5\uff1a\u5229\u7528DAG\u66b4\u9732\u7684\u72ec\u7acb\u5206\u652f\u5b9e\u73b0\u5e76\u884c\u6267\u884c\uff0c\u63d0\u5347\u6267\u884c\u6548\u7387", "\u9519\u8bef\u4fee\u590d\uff1a\u501f\u52a9\u56fe\u6f14\u5316\u5386\u53f2\u7cbe\u51c6\u5b9a\u4f4d\u9519\u8bef\u6e90\uff0c\u4ec5\u4fee\u590d\u53d7\u5f71\u54cd\u533a\u57df\uff0c\u4fdd\u7559\u5df2\u9a8c\u8bc1\u7ed3\u679c\u4e0d\u53d8", "\u4ec5\u4f7f\u75287B-8B\u89c4\u6a21\u9aa8\u5e72\u6a21\u578b\uff0c\u5728\u4e09\u4e2a\u4ea4\u4e92\u5f0f\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u6210\u529f\u7387\u548c\u6267\u884c\u6548\u7387\u5747\u8d85\u8d8a\u5f3a\u57fa\u7ebf"], "keywords": ["\u667a\u80fd\u4f53", "\u4efb\u52a1\u89c4\u5212", "LLM", "\u56fe\u7ed3\u6784"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01942v1", "published_at": "2026-07-02", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Atomic Task Graph: A Unified Framework for Agentic Planning and Execution", "tldr": "\u63d0\u51fa\u539f\u5b50\u4efb\u52a1\u56fe(ATG)\u6846\u67b6\uff0c\u901a\u8fc7DAG\u663e\u5f0f\u5efa\u6a21\u5b50\u4efb\u52a1\u4f9d\u8d56\uff0c\u5b9e\u73b0\u9ad8\u6548\u5e76\u884c\u6267\u884c\u4e0e\u7cbe\u51c6\u9519\u8bef\u4fee\u590d", "upvotes": 0, "what_it_is": "ATG\u662f\u4e00\u4e2a\u7edf\u4e00\u7684LLM\u667a\u80fd\u4f53\u89c4\u5212\u4e0e\u6267\u884c\u63a7\u5236\u6846\u67b6\uff0c\u5c06\u590d\u6742\u4efb\u52a1\u9012\u5f52\u5206\u89e3\u4e3a\u6709\u5411\u65e0\u73af\u56fe(DAG)\uff0c\u663e\u5f0f\u66b4\u9732\u5b50\u4efb\u52a1\u95f4\u7684\u8f93\u5165\u8f93\u51fa\u4f9d\u8d56\u5173\u7cfb\uff0c\u652f\u6301\u5e76\u884c\u6267\u884c\u548c\u5c40\u90e8\u9519\u8bef\u4fee\u590d\u3002", "why_notable": "\u5728\u4e0d\u4f9d\u8d56\u66f4\u5927\u6a21\u578b\u6216\u4efb\u52a1\u7279\u5b9a\u5fae\u8c03\u7684\u524d\u63d0\u4e0b\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u56fe\u8868\u793a\u89e3\u51b3\u4e86LLM\u667a\u80fd\u4f53\u89c4\u5212\u4e2d\u4f9d\u8d56\u9690\u5f0f\u3001\u4e2d\u95f4\u7ed3\u679c\u96be\u590d\u7528\u3001\u9519\u8bef\u4fee\u590d\u4ee3\u4ef7\u9ad8\u7b49\u6838\u5fc3\u75db\u70b9\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u901a\u7528\u6027\u548c\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Long term memory lets LLM agents act as persistent assistants, but user facts change. A useful memory system must know what is true now, what used to be true, and what changed. We study \\emph{ghost memory}, a state coordination failure in which old, current, and transition facts coexist in the memory bank, remain mixed during retrieval, and mislead the answer model. We argue that memory systems should be understood and optimized from three levels: bank maintenance, retrieval, and answer time resolution. We propose ATMA, a state aware overlay for existing memory systems. ATMA keeps superseded and transition records in the bank, builds evidence packets for the query\u0027s requested state view, and exposes current, historical, and transition labels to QA. We further call for decoupled evaluation of bank, retrieval, and answer level failures, since final QA accuracy can hide where ghost memory occurs. To make this failure measurable, we build LTP (LoCoMo Temporal Plus), a conflict heavy benchmark for ghost memory, and evaluate on LoCoMo for long conversation generalization. On LTP, Graphiti+ATMA improves conflict accuracy by 0.240 absolute over Graphiti. On LoCoMo, Graphiti+ATMA raises temporal F1 from 0.0295 to 0.1705. The gains are host dependent, but they indicate that explicit state roles can reduce memory failures hidden by final QA accuracy.", "arxiv_id": "2607.01935", "arxiv_url": "https://arxiv.org/abs/2607.01935", "authors": ["Zitong Shi", "Yixuan Tang", "Anthony Kum Hoe Tung"], "brief": "\u672c\u6587\u7814\u7a76LLM\u667a\u80fd\u4f53\u957f\u671f\u8bb0\u5fc6\u4e2d\u7684\"\u5e7d\u7075\u8bb0\u5fc6\"\u73b0\u8c61\uff08\u65e7\u4e8b\u5b9e\u3001\u5f53\u524d\u4e8b\u5b9e\u4e0e\u8fc7\u6e21\u4e8b\u5b9e\u6df7\u5b58\u5bfc\u81f4\u68c0\u7d22\u8bef\u5bfc\uff09\uff0c\u5e76\u63d0\u51faATMA\u2014\u2014\u4e00\u79cd\u72b6\u6001\u611f\u77e5\u7684\u8bb0\u5fc6\u7cfb\u7edf\u8986\u76d6\u5c42\uff0c\u901a\u8fc7\u4e3a\u67e5\u8be2\u6784\u5efa\u8bc1\u636e\u5305\u5e76\u6807\u6ce8\u5f53\u524d/\u5386\u53f2/\u8fc7\u6e21\u72b6\u6001\u6765\u89e3\u51b3\u8be5\u95ee\u9898\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01935", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5b9a\u4e49\"\u5e7d\u7075\u8bb0\u5fc6\"\u5931\u6548\u6a21\u5f0f\uff1a\u65e7\u3001\u65b0\u3001\u8fc7\u6e21\u4e8b\u5b9e\u5728\u8bb0\u5fc6\u5e93\u4e2d\u5171\u5b58\u5e76\u5728\u68c0\u7d22\u65f6\u6df7\u6dc6\u7b54\u6848\u6a21\u578b", "\u63d0\u51fa\u4e09\u5c42\u5206\u6790\u6846\u67b6\uff08\u8bb0\u5fc6\u5e93\u7ef4\u62a4\u3001\u68c0\u7d22\u3001\u7b54\u6848\u65f6\u89e3\u6790\uff09\u53caATMA\u72b6\u6001\u611f\u77e5\u8986\u76d6\u5c42\uff0c\u4fdd\u7559\u8fc7\u671f\u8bb0\u5f55\u5e76\u6784\u5efa\u72b6\u6001\u6807\u6ce8\u8bc1\u636e\u5305", "\u6784\u5efaLTP\u57fa\u51c6\uff08\u51b2\u7a81\u5bc6\u96c6\u578b\u65f6\u5e8f\u8bc4\u6d4b\u96c6\uff09\uff0cGraphiti+ATMA\u5728LTP\u51b2\u7a81\u51c6\u786e\u7387\u63d0\u53470.240\uff0c\u5728LoCoMo\u65f6\u5e8fF1\u4ece0.0295\u63d0\u5347\u81f30.1705"], "keywords": ["\u667a\u80fd\u4f53", "\u957f\u671f\u8bb0\u5fc6", "\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u66f4\u65b0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01935v1", "published_at": "2026-07-02", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "A-TMA: Decoupling State-Aware Memory Failures in Long-Term Agent Memory", "tldr": "\u63d0\u51faATMA\u6846\u67b6\u89e3\u51b3LLM\u957f\u671f\u8bb0\u5fc6\u4e2d\u7684\"\u5e7d\u7075\u8bb0\u5fc6\"\u72b6\u6001\u6df7\u6dc6\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76LLM\u667a\u80fd\u4f53\u957f\u671f\u8bb0\u5fc6\u4e2d\u7684\"\u5e7d\u7075\u8bb0\u5fc6\"\u73b0\u8c61\uff08\u65e7\u4e8b\u5b9e\u3001\u5f53\u524d\u4e8b\u5b9e\u4e0e\u8fc7\u6e21\u4e8b\u5b9e\u6df7\u5b58\u5bfc\u81f4\u68c0\u7d22\u8bef\u5bfc\uff09\uff0c\u5e76\u63d0\u51faATMA\u2014\u2014\u4e00\u79cd\u72b6\u6001\u611f\u77e5\u7684\u8bb0\u5fc6\u7cfb\u7edf\u8986\u76d6\u5c42\uff0c\u901a\u8fc7\u4e3a\u67e5\u8be2\u6784\u5efa\u8bc1\u636e\u5305\u5e76\u6807\u6ce8\u5f53\u524d/\u5386\u53f2/\u8fc7\u6e21\u72b6\u6001\u6765\u89e3\u51b3\u8be5\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u5316\u5b9a\u4e49\u5e76\u91cf\u5316\u957f\u671f\u8bb0\u5fc6\u4e2d\u7684\u72b6\u6001\u534f\u8c03\u5931\u6548\u95ee\u9898\uff0c\u63d0\u51fa\u53ef\u63d2\u62d4\u7684ATMA\u65b9\u6848\u517c\u5bb9\u73b0\u6709\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u5e76\u6784\u5efa\u4e13\u7528\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5bf9\u6784\u5efa\u53ef\u9760\u6301\u4e45\u5316AI\u52a9\u624b\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Data science aims to derive actionable insights from heterogeneous raw data, unlocking the value of the massive amounts of data generated in modern society. Automating this process is essential to reducing labor-intensive efforts for data scientists and enabling scalable data-driven applications. Recently, large language model (LLM)-based data agents have emerged as a promising solution to automate data science workflows. However, the field lacks comprehensive benchmarks to rigorously evaluate these agents across diverse scenarios with fine-grained granularity. To address this gap, we propose AgenticDataBench, a comprehensive benchmark featuring realistic tasks spanning diverse domains with fine-grained ground-truth labels. This enables evaluations to capture the diversity and complexity of data science workflows and the detailed performance of agents. First, to cover diverse domains, we collect real datasets and tasks from 15 vertical domains, including 5 real-world B2B use cases from a leading fintech company. Second, to remove redundancy in real-world tasks and generate high-quality tasks for domains lacking real data, we introduce data science skills, recurring data-centric operational patterns, and quantify benchmark coverage by the number of skills included. Representative skills are extracted from large-scale task solutions on Stack Overflow using skill-aligned hierarchical clustering. Third, for real-world business tasks, we select task-solution pairs that maximize diversity in skill composition, ensuring broad coverage of practical scenarios. Fourth, to generate realistic tasks for devise domains without real tasks, we propose a systematic LLM-based task generation approach to create workflows and tasks based on these skills. Finally, we evaluate state-of-the-art data agents using our annotated benchmark and open-sourced testbed, providing detailed skill-level insights.", "arxiv_id": "2607.01647", "arxiv_url": "https://arxiv.org/abs/2607.01647", "authors": ["Zhaoyan Sun", "Shan Zhong", "Daizhou Wen", "Jiaxing Han", "Guoliang Li", "Ying Yan", "Peng Zhang", "Yu Su", "Xiang Qi", "Baolin Sun", "Chengyuan Yang", "Tao Fang", "Huaiyu Ruan"], "brief": "\u63d0\u51faAgenticDataBench\uff0c\u4e00\u4e2a\u7528\u4e8e\u5168\u9762\u8bc4\u4f30LLM\u9a71\u52a8\u6570\u636e\u79d1\u5b66\u667a\u80fd\u4f53\u7684\u57fa\u51c6\uff0c\u6db5\u76d615\u4e2a\u5782\u76f4\u9886\u57df\uff08\u542b5\u4e2a\u91d1\u878d\u79d1\u6280B2B\u771f\u5b9e\u573a\u666f\uff09\uff0c\u901a\u8fc7\u6570\u636e\u79d1\u5b66\u6280\u80fd\u4f53\u7cfb\u5b9e\u73b0\u7ec6\u7c92\u5ea6\u6027\u80fd\u8bc4\u4f30\u3002", "categories": ["cs.DB", "cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01647", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4eceStack Overflow\u5927\u89c4\u6a21\u4efb\u52a1\u89e3\u51b3\u65b9\u6848\u4e2d\u63d0\u53d6\u4ee3\u8868\u6027\u6570\u636e\u79d1\u5b66\u6280\u80fd\uff0c\u91c7\u7528\u6280\u80fd\u5bf9\u9f50\u7684\u5c42\u6b21\u805a\u7c7b\u53bb\u9664\u5197\u4f59", "\u9488\u5bf9\u7f3a\u4e4f\u771f\u5b9e\u6570\u636e\u7684\u9886\u57df\uff0c\u63d0\u51fa\u57fa\u4e8eLLM\u7684\u7cfb\u7edf\u5316\u4efb\u52a1\u751f\u6210\u65b9\u6cd5\uff0c\u786e\u4fdd\u6280\u80fd\u7ec4\u5408\u591a\u6837\u6027", "\u63d0\u4f9b\u5f00\u6e90\u6d4b\u8bd5\u5e73\u53f0\uff0c\u5bf9\u5f53\u524d\u6700\u5148\u8fdb\u6570\u636e\u667a\u80fd\u4f53\u8fdb\u884c\u6280\u80fd\u7ea7\u522b\u7684\u7ec6\u7c92\u5ea6\u8bc4\u4f30"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u6d4b\u8bd5", "\u6570\u636e\u79d1\u5b66", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01647v1", "published_at": "2026-07-02", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "AgenticDataBench: A Comprehensive Benchmark for Data Agents", "tldr": "AgenticDataBench\uff1a\u9996\u4e2a\u8986\u76d615\u4e2a\u5782\u76f4\u9886\u57df\u3001\u7ec6\u7c92\u5ea6\u8bc4\u4f30LLM\u6570\u636e\u667a\u80fd\u4f53\u7684\u7efc\u5408\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faAgenticDataBench\uff0c\u4e00\u4e2a\u7528\u4e8e\u5168\u9762\u8bc4\u4f30LLM\u9a71\u52a8\u6570\u636e\u79d1\u5b66\u667a\u80fd\u4f53\u7684\u57fa\u51c6\uff0c\u6db5\u76d615\u4e2a\u5782\u76f4\u9886\u57df\uff08\u542b5\u4e2a\u91d1\u878d\u79d1\u6280B2B\u771f\u5b9e\u573a\u666f\uff09\uff0c\u901a\u8fc7\u6570\u636e\u79d1\u5b66\u6280\u80fd\u4f53\u7cfb\u5b9e\u73b0\u7ec6\u7c92\u5ea6\u6027\u80fd\u8bc4\u4f30\u3002", "why_notable": "\u586b\u8865\u4e86\u6570\u636e\u79d1\u5b66\u667a\u80fd\u4f53\u8bc4\u4f30\u9886\u57df\u7f3a\u4e4f\u7efc\u5408\u57fa\u51c6\u7684\u7a7a\u767d\uff0c\u5f15\u5165\u6280\u80fd\u91cf\u5316\u8986\u76d6\u5ea6\u6982\u5ff5\uff0c\u7ed3\u5408\u771f\u5b9eB2B\u573a\u666f\u4e0e\u7cfb\u7edf\u5316\u4efb\u52a1\u751f\u6210\uff0c\u4e3a\u6570\u636e\u667a\u80fd\u4f53\u7814\u7a76\u63d0\u4f9b\u6807\u51c6\u5316\u8bc4\u6d4b\u6846\u67b6\u3002"}, {"abstract": "Autonomous-research agents have demonstrated end-to-end LLM automation in machine-learning sandboxes where execution provides calibration. Frontier physical science differs categorically: physical reasoning underlies every methodology choice, toolchains are often underdocumented, and calibration must come from external literature anchors - which unscaffolded agents cite but do not confront, hallucinating plausible, unverifiable results from internal priors. We present a pipeline that runs end-to-end from a corpus of 11,083 recent condensed-matter physics arXiv papers to a publication-grade manuscript with three substantive physics findings (here on altermagnetic piezomagnetism): the agent autonomously conceives a research direction by mapping the corpus, calibrates methodology by reproducing published references, conducts novel first-principles computations, and writes the manuscript - grounded in literature throughout, across 47 fresh-context sessions in six phases sharing only on-disk state, with 2,162 literature-consultation events. Fault tolerance emerges from redundancy: fresh-context isolation, distributed grounding, and adversarial review catch what any single session misses; pre- and post-pilot stages are fully autonomous, and pilot requires bounded human intervention only at reproduction failures - operational knowledge curation, not scientific direction. Two paired failure modes - a pre-architecture baseline and a no-pilot ablation - isolate structurally enforced numerical confrontation at calibration checkpoints as the operative grounding mechanism. The primitives, characterized failure modes, and quantified intervention pattern lay a foundation for autonomous research in high-stakes scientific domains beyond computational physics.", "arxiv_id": "2607.02329", "arxiv_url": "https://arxiv.org/abs/2607.02329", "authors": ["Haonan Huang"], "brief": "\u63d0\u51fa\u4e00\u79cd\u5bb9\u9519LLM\u81ea\u4e3b\u7814\u7a76\u6d41\u6c34\u7ebf\uff0c\u80fd\u4ece11,083\u7bc7\u51dd\u805a\u6001\u7269\u7406arXiv\u8bba\u6587\u51fa\u53d1\uff0c\u81ea\u4e3b\u89c4\u5212\u7814\u7a76\u65b9\u5411\u3001\u6821\u51c6\u65b9\u6cd5\u8bba\u3001\u6267\u884c\u7b2c\u4e00\u6027\u539f\u7406\u8ba1\u7b97\u5e76\u64b0\u5199\u624b\u7a3f\uff0c\u4ee5\u4ea4\u53d8\u78c1\u6027\u538b\u78c1\u6548\u5e94\u4e3a\u6848\u4f8b\u4ea7\u51fa\u4e09\u9879\u5b9e\u8d28\u6027\u7269\u7406\u53d1\u73b0\u3002", "categories": ["cs.AI", "cond-mat.mtrl-sci", "physics.comp-ph"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02329", "impact_score": 9, "is_agent": true, "is_top": true, "key_points": ["\u516d\u9636\u6bb547\u4e2a\u72ec\u7acb\u4e0a\u4e0b\u6587\u4f1a\u8bdd\u534f\u4f5c\uff0c\u4ec5\u901a\u8fc7\u78c1\u76d8\u72b6\u6001\u5171\u4eab\uff0c2162\u6b21\u6587\u732e\u67e5\u9605\u4e8b\u4ef6\u5b9e\u73b0\u5168\u7a0b\u6587\u732e\u951a\u5b9a", "\u901a\u8fc7\u590d\u73b0\u5df2\u53d1\u8868\u53c2\u8003\u6587\u732e\u8fdb\u884c\u65b9\u6cd5\u8bba\u6821\u51c6\uff0c\u5c06\u6570\u503c\u5bf9\u6297\u9a8c\u8bc1\u4f5c\u4e3a\u6838\u5fc3\u9632\u5e7b\u89c9\u673a\u5236\uff0c\u800c\u975e\u4f9d\u8d56\u6a21\u578b\u5185\u90e8\u5148\u9a8c", "\u5bb9\u9519\u6027\u6765\u81ea\u5197\u4f59\u8bbe\u8ba1\uff1a\u65b0\u9c9c\u4e0a\u4e0b\u6587\u9694\u79bb\u3001\u5206\u5e03\u5f0f\u6587\u732e\u951a\u5b9a\u4e0e\u5bf9\u6297\u6027\u5ba1\u67e5\uff1b\u4eba\u5de5\u5e72\u9884\u4ec5\u9650\u4e8e\u590d\u73b0\u5931\u8d25\u65f6\u7684\u64cd\u4f5c\u77e5\u8bc6\u6574\u7406\uff0c\u4e0d\u6d89\u53ca\u79d1\u5b66\u65b9\u5411\u51b3\u7b56"], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u81ea\u52a8\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8ba1\u7b97\u7269\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02329v1", "published_at": "2026-07-02", "score": 0.225, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "Grounded autonomous research: a fault-tolerant LLM pipeline from corpus to manuscript in frontier computational physics", "tldr": "\u6784\u5efa\u7aef\u5230\u7aefLLM\u6d41\u6c34\u7ebf\uff0c\u4ece1\u4e07\u4f59\u7bc7\u7269\u7406\u8bba\u6587\u8bed\u6599\u5e93\u81ea\u4e3b\u5b8c\u6210\u524d\u6cbf\u8ba1\u7b97\u7269\u7406\u7814\u7a76\u5e76\u751f\u6210\u51fa\u7248\u7ea7\u624b\u7a3f", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u5bb9\u9519LLM\u81ea\u4e3b\u7814\u7a76\u6d41\u6c34\u7ebf\uff0c\u80fd\u4ece11,083\u7bc7\u51dd\u805a\u6001\u7269\u7406arXiv\u8bba\u6587\u51fa\u53d1\uff0c\u81ea\u4e3b\u89c4\u5212\u7814\u7a76\u65b9\u5411\u3001\u6821\u51c6\u65b9\u6cd5\u8bba\u3001\u6267\u884c\u7b2c\u4e00\u6027\u539f\u7406\u8ba1\u7b97\u5e76\u64b0\u5199\u624b\u7a3f\uff0c\u4ee5\u4ea4\u53d8\u78c1\u6027\u538b\u78c1\u6548\u5e94\u4e3a\u6848\u4f8b\u4ea7\u51fa\u4e09\u9879\u5b9e\u8d28\u6027\u7269\u7406\u53d1\u73b0\u3002", "why_notable": "\u9996\u6b21\u5728\u771f\u5b9e\u524d\u6cbf\u7269\u7406\u79d1\u5b66\uff08\u800c\u975eML\u6c99\u76d2\uff09\u4e2d\u5b9e\u73b0\u9ad8\u5ea6\u81ea\u4e3b\u7684\u7aef\u5230\u7aef\u7814\u7a76\u6d41\u6c34\u7ebf\uff0c\u7cfb\u7edf\u6027\u5206\u6790\u4e86\u5e7b\u89c9\u5931\u8d25\u6a21\u5f0f\u5e76\u63d0\u51fa\u7ed3\u6784\u5316\u6821\u51c6\u673a\u5236\uff0c\u4e3a\u9ad8\u98ce\u9669\u79d1\u5b66\u9886\u57df\u7684AI\u81ea\u4e3b\u7814\u7a76\u5960\u5b9a\u65b9\u6cd5\u8bba\u57fa\u7840\u3002"}, {"abstract": "As AI coding agents become more autonomous, they increasingly ship code iteratively, with the codebase persisting across sessions. This persistence creates a new attack surface: a misaligned or prompt-injected agent can distribute attacks across pull requests (PRs) and time its payload for the PR with the best natural cover. To study the resulting dynamics, we introduce Iterative VibeCoding, a setting for AI control, the study of safely deploying capable but potentially untrusted AI. In Iterative VibeCoding, a coding agent builds software over a sequence of PRs in a persistent codebase while pursuing a covert side task. Our benchmark includes two task families: CLI tools and Flask web services, across 20 total task variations. We use Claude Sonnet 4.5 as the attack agent and GPT-4o as the monitor. We compare gradual attacks, which distribute the side task across PRs, against non-gradual attacks concentrated in a single PR. No single monitor is robust to both: which strategy evades best (success while evading the monitor) depends on the monitor type, so a defender cannot close off both gradual and non-gradual attacks with any one monitor. High evasion (\u003e= 65%) generalizes across model attack agent backends (Sonnet 4.5, Gemini 3.1 Pro, Kimi K2.5), confirming this is a property of the persistent-state attack surface rather than a single model\u0027s capability. Evasion also remains high across state-of-the-art monitor models and the gap between gradual and non-gradual evasion widens for more capable models. We introduce a stateful link-tracker monitor that tracks suspicious buildup across PRs. On both task families, it detects gradual attacks substantially better than diff monitors that merely see more accumulated history. Combining this stronger monitor with trajectory monitors in a four-monitor ensemble reduces gradual-attack evasion from 93% under the weakest standard diff monitor to 47%.", "arxiv_id": "2607.02514", "arxiv_url": "https://arxiv.org/abs/2607.02514", "authors": ["Josh Hills", "Ida Caspary", "Asa Cooper Stickland"], "brief": "\u63d0\u51fa\u300c\u8fed\u4ee3VibeCoding\u300d\u57fa\u51c6\uff0c\u7814\u7a76\u5177\u6709\u6301\u4e45\u72b6\u6001\u7684AI\u7f16\u7a0b\u667a\u80fd\u4f53\u5982\u4f55\u5c06\u9690\u853d\u653b\u51fb\u5206\u6563\u5728\u591a\u4e2aPull Request\u4e2d\u6267\u884c\uff0c\u5e76 u4e2d\u6267\u884c\uff0c\u5e76\u8bc4\u4f30\u5404\u7c7b\u76d1\u63a7\u7b56\u7565\u7684\u9632\u5fa1\u6548\u679c\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u6301\u4e45\u72b6\u6001\u4e0bAI\u667a\u80fd\u4f53\u7684\u5206\u5e03\u5f0f\u653b\u51fb\u5a01\u80c1\uff0c\u5bf9AI\u5b89\u5168\u63a7\u5236\u7814\u7a76\u5177\u6709\u91cd\u8981\u610f\u4e49\uff0c\u63d0\u51fa\u7684\u96c6\u6210\u76d1\u63a7\u65b9\u6848\u4e3a\u5b9e\u9645\u9632\u5fa1\u63d0\u4f9b\u4e86\u53ef\u884c\u8def\u5f84"}, {"abstract": "This paper showcases a memory-efficient training stack for Mixture-of-Experts (MoE) models. It is a training paradigm that combines and specializes various existing and novel parallelism techniques at different layers and stages of the Mixture-of-Experts (MoE) model training pipeline. It leverages these techniques to achieve maximal efficiency given the physical constraints of CPU, CPU memory, GPU HBM memory, and the CPU-GPU, GPU-GPU, and node-node communication bandwidth of the GPU cluster. It also contains a novel strategy for the optimizer step to achieve high throughput and memory efficiency, enabling practitioners to conduct lossless pre-training/fine-tuning of trillion-parameter scale models, at a million context length, with just under 12 8x H200 GPU nodes, with state-of-the-art throughput and memory efficiency. In our experiments, MoP delivers 4.7x--8.2x higher per-GPU throughput than a strongly-tuned FSDP2 baseline (with the gap widening at larger scale) and sustains training at context lengths up to 1M tokens, where the baseline runs out of memory beyond 64--128K.", "arxiv_id": "2607.01844", "arxiv_url": "https://arxiv.org/abs/2607.01844", "authors": ["Xuan-Phi Nguyen", "Shrey Pandit", "Yiran Zhao", "Semih Yavuz", "Silvio Savarese", "Shafiq Joty"], "brief": "\u63d0\u51faMixture-of-Parallelisms\uff08MoP\uff09\u8bad\u7ec3\u8303\u5f0f\uff0c\u901a\u8fc7\u5728MoE\u6a21\u578b\u8bad\u7ec3\u6d41\u6c34\u7ebf\u7684\u4e0d\u540c\u5c42\u6b21\u548c\u9636\u6bb5\u7ec4\u5408\u591a\u79cd\u5e76\u884c\u6280\u672f\uff0c\u5e76\u8bbe\u8ba1\u65b0\u578b\u4f18\u5316\u5668\u6b65\u9aa4\u7b56\u7565\uff0c\u5b9e\u73b0\u6781\u81f4\u5185\u5b58\u6548\u7387\u4e0e\u541e\u5410\u91cf\u3002", "categories": ["cs.DC", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01844", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u76f8\u6bd4\u5f3a\u8c03\u8c03\u4f18\u7684FSDP2\u57fa\u7ebf\uff0cMoP\u5b9e\u73b04.7x\u20138.2x\u7684\u5355GPU\u541e\u5410\u91cf\u63d0\u5347\uff0c\u4e14\u89c4\u6a21\u8d8a\u5927\u5dee\u8ddd\u8d8a\u663e\u8457", "\u652f\u6301\u9ad8\u8fbe100\u4e07token\u7684\u4e0a\u4e0b\u6587\u957f\u5ea6\u8bad\u7ec3\uff0c\u800cFSDP2\u57fa\u7ebf\u572864K\u2013128K\u65f6\u5373OOM", "\u4ec5\u9700\u4e0d\u8db312\u4e2a8\u00d7H200 GPU\u8282\u70b9\u5373\u53ef\u65e0\u635f\u9884\u8bad\u7ec3/\u5fae\u8c03\u4e07\u4ebf\u53c2\u6570\u7ea7MoE\u6a21\u578b"], "keywords": ["\u6df7\u5408\u4e13\u5bb6\u6a21\u578b", "\u5206\u5e03\u5f0f\u8bad\u7ec3", "\u5185\u5b58\u4f18\u5316", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01844v1", "published_at": "2026-07-02", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Mixture-of-Parallelisms: Towards Memory-Efficient Training Stack for Mixture-of-Experts Models", "tldr": "\u63d0\u51faMoP\u8bad\u7ec3\u6846\u67b6\uff0c\u7528\u4e0d\u8db312\u4e2aH200\u8282\u70b9\u5b9e\u73b0\u4e07\u4ebf\u53c2\u6570MoE\u6a21\u578b\u767e\u4e07\u4e0a\u4e0b\u6587\u957f\u5ea6\u7684\u9ad8\u6548\u8bad\u7ec3", "upvotes": 0, "what_it_is": "\u63d0\u51faMixture-of-Parallelisms\uff08MoP\uff09\u8bad\u7ec3\u8303\u5f0f\uff0c\u901a\u8fc7\u5728MoE\u6a21\u578b\u8bad\u7ec3\u6d41\u6c34\u7ebf\u7684\u4e0d\u540c\u5c42\u6b21\u548c\u9636\u6bb5\u7ec4\u5408\u591a\u79cd\u5e76\u884c\u6280\u672f\uff0c\u5e76\u8bbe\u8ba1\u65b0\u578b\u4f18\u5316\u5668\u6b65\u9aa4\u7b56\u7565\uff0c\u5b9e\u73b0\u6781\u81f4\u5185\u5b58\u6548\u7387\u4e0e\u541e\u5410\u91cf\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u591a\u79cd\u5e76\u884c\u6280\u672f\u878d\u5408\u4e13\u95e8\u9488\u5bf9MoE\u67b6\u6784\u4f18\u5316\uff0c\u5927\u5e45\u964d\u4f4e\u8d85\u5927\u89c4\u6a21\u6a21\u578b\u8bad\u7ec3\u7684\u786c\u4ef6\u95e8\u69db\uff0c\u5bf9\u5de5\u4e1a\u754c\u548c\u5b66\u672f\u754c\u5747\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "How can Large Language Models (LLMs) solve problems they currently cannot? Repeated sampling scales test-time compute but GPU cost grows linearly with attempts, while reinforcement learning (RL) with verifiable rewards improves single-attempt accuracy at the expense of sample diversity. Both strategies ultimately fail when the base policy has near-zero probability of producing a correct solution: no amount of sampling or gradient signal can overcome a search space that is simply too large. We take a different approach: rather than sampling harder, we make the task easier by decomposing problems into smaller, independently solvable sub-functions whose implementations can be recombined. Since off-the-shelf models are not trained for this modular generation, we introduce DecompRL, an RL algorithm that explicitly learns to decompose and implement hierarchical code structures. Recombining $k$ implementations of $n$ modules yields up to $k^{n}$ candidate solutions, shifting the bottleneck from GPU inference to cheap CPU evaluation and cutting GPU token cost by $\\sim$50$\\times$. On LiveCodeBench and CodeContests (Qwen~2.5~7B, Code World Model~32B), DecompRL outperforms standard and diversity-optimized RL baselines beyond $10^5$ tokens per problem, solving problems that standard generation cannot reach.", "arxiv_id": "2607.02390", "arxiv_url": "https://arxiv.org/abs/2607.02390", "authors": ["Juliette Decugis", "Fabian Gloeckle", "Francis Bach", "Taco Cohen", "Gabriel Synnaeve"], "brief": "\u63d0\u51faDecompRL\u7b97\u6cd5\uff0c\u8ba9LLM\u5b66\u4f1a\u5c06\u590d\u6742\u7f16\u7a0b\u95ee\u9898\u5206\u89e3\u4e3a\u72ec\u7acb\u53ef\u89e3\u7684\u5b50\u51fd\u6570\u6a21\u5757\uff0c\u901a\u8fc7\u7ec4\u5408k\u4e2a\u6a21\u5757\u7684n\u79cd\u5b9e\u73b0\u4ea7\u751f\u6700\u591ak^n\u4e2a\u5019\u9009\u89e3\uff0c\u5c06\u8ba1\u7b97\u74f6\u9888\u4eceGPU\u63a8\u7406\u8f6c\u79fb\u5230\u5ec9\u4ef7CPU\u8bc4\u4f30\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02390", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6a21\u5757\u5316\u5206\u89e3\u7b56\u7565\uff1a\u5c06\u95ee\u9898\u62c6\u89e3\u4e3an\u4e2a\u5b50\u51fd\u6570\uff0c\u6bcf\u4e2a\u5b50\u51fd\u6570\u72ec\u7acb\u91c7\u6837k\u6b21\uff0c\u7ec4\u5408\u540e\u5019\u9009\u89e3\u6570\u91cf\u6307\u6570\u7ea7\u589e\u957f\u81f3k^n", "GPU token\u6210\u672c\u964d\u4f4e\u7ea650\u500d\uff0c\u5728LiveCodeBench\u548cCodeContests\u57fa\u51c6\u4e0a\u8d85\u8d8a\u6807\u51c6RL\u548c\u591a\u6837\u6027\u4f18\u5316RL\u57fa\u7ebf", "\u4e13\u95e8\u9488\u5bf9\u57fa\u7840\u7b56\u7565\u8fd1\u96f6\u6210\u529f\u7387\u7684\u56f0\u96be\u95ee\u9898\u6709\u6548\uff0c\u89e3\u51b3\u4e86\u6807\u51c6\u751f\u6210\u65b9\u6cd5\u65e0\u6cd5\u89e6\u53ca\u7684\u9898\u76ee"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u5f3a\u5316\u5b66\u4e60", "\u6a21\u5757\u5316", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02390v1", "published_at": "2026-07-02", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "DecompRL: Solving Harder Problems by Learning Modular Code Generation", "tldr": "DecompRL\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u5c06\u4ee3\u7801\u751f\u6210\u5206\u89e3\u4e3a\u6a21\u5757\u5316\u5b50\u51fd\u6570\uff0c\u5927\u5e45\u964d\u4f4eGPU\u6210\u672c\u5e76\u89e3\u51b3\u66f4\u96be\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faDecompRL\u7b97\u6cd5\uff0c\u8ba9LLM\u5b66\u4f1a\u5c06\u590d\u6742\u7f16\u7a0b\u95ee\u9898\u5206\u89e3\u4e3a\u72ec\u7acb\u53ef\u89e3\u7684\u5b50\u51fd\u6570\u6a21\u5757\uff0c\u901a\u8fc7\u7ec4\u5408k\u4e2a\u6a21\u5757\u7684n\u79cd\u5b9e\u73b0\u4ea7\u751f\u6700\u591ak^n\u4e2a\u5019\u9009\u89e3\uff0c\u5c06\u8ba1\u7b97\u74f6\u9888\u4eceGPU\u63a8\u7406\u8f6c\u79fb\u5230\u5ec9\u4ef7CPU\u8bc4\u4f30\u3002", "why_notable": "\u9488\u5bf9LLM\u5728\u6781\u96be\u95ee\u9898\u4e0a\u6210\u529f\u7387\u63a5\u8fd1\u96f6\u7684\u6839\u672c\u74f6\u9888\u63d0\u51fa\u65b0\u601d\u8def\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u5206\u89e3\u800c\u975e\u66b4\u529b\u6269\u5c55\u8ba1\u7b97\uff0c\u5b9e\u73b0\u6307\u6570\u7ea7\u641c\u7d22\u7a7a\u95f4\u6269\u5c55\u540c\u65f6\u5927\u5e45\u964d\u4f4e\u6210\u672c\uff0c\u5bf9\u4ee3\u7801\u751f\u6210\u548cRL\u8bad\u7ec3\u8303\u5f0f\u5747\u6709\u91cd\u8981\u542f\u793a\u3002"}, {"abstract": "Communication increasingly dominates the cost of Large Language Model (LLM) pre-training, especially under data-parallel and sharded training schemes, where gradient synchronization and parameter reconstruction overhead increase with model size and system scale. Existing communication-reduction methods either sparsify raw gradients, which can be unstable for modern Adam-style optimizers at high sparsity, or quantize communication, whose savings are fundamentally bounded by bit width and often incur additional runtime overhead. We present SCAPE, a communication-efficient distributed optimizer for LLM training that exploits the stability of AdamS\u0027s first-moment to enable aggressive sparsification without loss of LLM quality. Instead of constructing masks from raw gradients, SCAPE derives them from first-moment-based statistics, partitions mask generation across workers to align with optimizer sharding, and delays mask usage by one step so that mask synchronization can overlap with computation. SCAPE also reconstructs the quantities required for second-moment updates from a single synchronized sparse buffer, avoiding an additional collective. We implement SCAPE in Megatron-LM and evaluate its convergence by pre-training GPT-345M on OpenWebText and Llama-500M on SlimPajama-6B using 32 NVIDIA GH200 GPUs on TACC Vista. In both models, SCAPE preserves training stability, validation loss, and downstream task accuracy under 90\\% and 99\\% sparsity. For Llama-500M, SCAPE reduces end-to-end pre-training wall-clock time by up to 43.3\\% while maintaining model quality comparable to dense AdamW and AdamS. For Llama-1.8B, SCAPE achieves up to 3.26$\\times$ speedup per step compared to dense AdamS.", "arxiv_id": "2607.01678", "arxiv_url": "https://arxiv.org/abs/2607.01678", "authors": ["Mingkai Zheng", "Junlin Chen", "Haotian Xie", "Zhao Zhang"], "brief": "\u63d0\u51faSCAPE\uff0c\u4e00\u79cd\u9762\u5411LLM\u9884\u8bad\u7ec3\u7684\u901a\u4fe1\u9ad8\u6548\u5206\u5e03\u5f0f\u4f18\u5316\u5668\uff0c\u5229\u7528Adam\u4e00\u9636\u77e9\u7684\u7a33\u5b9a\u6027\u5b9e\u73b0\u6fc0\u8fdb\u68af\u5ea6\u7a00\u758f\u5316\uff0c\u5728\u4e0d\u635f\u5931\u6a21\u578b\u8d28\u91cf\u7684\u524d\u63d0\u4e0b\u5927\u5e45\u51cf\u5c11\u5206\u5e03\u5f0f\u8bad\u7ec3\u4e2d\u7684\u901a\u4fe1\u5f00\u9500\u3002", "categories": ["cs.LG", "cs.DC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01678", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u57fa\u4e8e\u4e00\u9636\u77e9\u7edf\u8ba1\u6784\u5efa\u7a00\u758f\u63a9\u7801\uff08\u800c\u975e\u539f\u59cb\u68af\u5ea6\uff09\uff0c\u652f\u630190%~99%\u6781\u9ad8\u7a00\u758f\u5ea6\u4e14\u8bad\u7ec3\u7a33\u5b9a", "\u63a9\u7801\u751f\u6210\u8de8Worker\u5206\u533a\u4ee5\u914d\u5408\u4f18\u5316\u5668\u5206\u7247\uff0c\u63a9\u7801\u4f7f\u7528\u5ef6\u8fdf\u4e00\u6b65\u4f7f\u540c\u6b65\u4e0e\u8ba1\u7b97\u91cd\u53e0\uff0c\u907f\u514d\u989d\u5916\u96c6\u5408\u901a\u4fe1", "\u572832\u5757NVIDIA GH200 GPU\u4e0a\u5b9e\u9a8c\uff1aLlama-500M\u7aef\u5230\u7aef\u8bad\u7ec3\u65f6\u95f4\u51cf\u5c1143.3%\uff0cLlama-1.8B\u5355\u6b65\u52a0\u901f3.26\u00d7"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5206\u5e03\u5f0f\u8bad\u7ec3", "\u901a\u4fe1\u4f18\u5316", "\u7a00\u758f\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01678v1", "published_at": "2026-07-02", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SCAPE: Accurate and Efficient LLM Training with Extreme Sparse Communication", "tldr": "SCAPE\u901a\u8fc7\u6781\u7a00\u758f\u901a\u4fe1\u4f18\u5316LLM\u5206\u5e03\u5f0f\u8bad\u7ec3\uff0c\u572899%\u7a00\u758f\u5ea6\u4e0b\u4ecd\u4fdd\u6301\u6a21\u578b\u8d28\u91cf\u5e76\u63d0\u901f43%", "upvotes": 0, "what_it_is": "\u63d0\u51faSCAPE\uff0c\u4e00\u79cd\u9762\u5411LLM\u9884\u8bad\u7ec3\u7684\u901a\u4fe1\u9ad8\u6548\u5206\u5e03\u5f0f\u4f18\u5316\u5668\uff0c\u5229\u7528Adam\u4e00\u9636\u77e9\u7684\u7a33\u5b9a\u6027\u5b9e\u73b0\u6fc0\u8fdb\u68af\u5ea6\u7a00\u758f\u5316\uff0c\u5728\u4e0d\u635f\u5931\u6a21\u578b\u8d28\u91cf\u7684\u524d\u63d0\u4e0b\u5927\u5e45\u51cf\u5c11\u5206\u5e03\u5f0f\u8bad\u7ec3\u4e2d\u7684\u901a\u4fe1\u5f00\u9500\u3002", "why_notable": "\u901a\u4fe1\u74f6\u9888\u662f\u5927\u89c4\u6a21LLM\u8bad\u7ec3\u7684\u6838\u5fc3\u6311\u6218\uff0cSCAPE\u5728\u6781\u9ad8\u7a00\u758f\u5ea6\uff0899%\uff09\u4e0b\u4ecd\u4fdd\u6301\u4e0e\u5bc6\u96c6AdamW\u76f8\u5f53\u7684\u6a21\u578b\u8d28\u91cf\uff0c\u4e14\u5de5\u7a0b\u5b9e\u73b0\u96c6\u6210\u4e8eMegatron-LM\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u548c\u53ef\u590d\u73b0\u6027\u3002"}, {"abstract": "State-of-the-art large language model (LLM) training takes tens of thousands of graphics processing units (GPUs) for months and encounters failures across the software and hardware stack. Existing fault-tolerance mechanisms either impose non-trivial overhead during failure-free execution or suffer from prolonged recovery latency, particularly under scenarios where a small subset of compute nodes experience permanent failures. %The tradeoff between failure-free overhead and recovery latency forms a space forms a Pareto frontier We present DeadPool to simultaneously address both optimization objectives. DeadPool incorporates a fault-tolerance mechanism that restores LLM training via hot-swapping, namely by replacing failed nodes with spare nodes without terminating the complete job. The hot-swapping of DeadPool is enabled by two ideas: First, it exploits an off-critical-path in-memory checkpointing mechanism for spatial redundancy. Second, it introduces a communicator reconstruction protocol that replaces failed nodes with spare nodes at runtime. DeadPool efficiently overlaps the in-memory checkpointing with computation, thus introducing zero overhead during error-free execution. Upon permanent node failures, DeadPool can rebuild memory states with minimal recomputation by leveraging in-memory checkpoints. We evaluate DeadPool across scales (up to 512 NVIDIA A100 GPUs) and LLMs (up to 65B parameters), and observe zero checkpoint overhead with hot-swapping recovery completing in under 40 seconds. These results show that DeadPool simultaneously achieves both zero-overhead error-free execution and extremely low recovery cost.", "arxiv_id": "2607.01646", "arxiv_url": "https://arxiv.org/abs/2607.01646", "authors": ["Haotian Xie", "Junlin Chen", "Mingkai Zheng", "Lishan Yang", "Zhao Zhang"], "brief": "\u63d0\u51faDeadPool\u7cfb\u7edf\uff0c\u901a\u8fc7\u79bb\u5173\u952e\u8def\u5f84\u7684\u5185\u5b58\u68c0\u67e5\u70b9\u673a\u5236\u548c\u901a\u4fe1\u5668\u91cd\u5efa\u534f\u8bae\uff0c\u5b9e\u73b0LLM\u5206\u5e03\u5f0f\u8bad\u7ec3\u4e2d\u6545\u969c\u8282\u70b9\u7684\u70ed\u66ff\u6362\u6062\u590d\uff0c\u540c\u65f6\u8fbe\u5230\u96f6\u989d\u5916\u5f00\u9500\u548c\u6781\u4f4e\u6062\u590d\u5ef6\u8fdf\u4e24\u4e2a\u76ee\u6807\u3002", "categories": ["cs.LG", "cs.DC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01646", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5185\u5b58\u68c0\u67e5\u70b9\u4e0e\u8ba1\u7b97\u5b8c\u5168\u91cd\u53e0\uff0c\u6545\u969c\u65e0\u5173\u6267\u884c\u671f\u95f4\u5f15\u5165\u96f6\u989d\u5916\u5f00\u9500", "\u901a\u4fe1\u5668\u91cd\u5efa\u534f\u8bae\u652f\u6301\u8fd0\u884c\u65f6\u7528\u5907\u7528\u8282\u70b9\u66ff\u6362\u6545\u969c\u8282\u70b9\uff08\u70ed\u66ff\u6362\uff09\uff0c\u65e0\u9700\u7ec8\u6b62\u6574\u4e2a\u8bad\u7ec3\u4efb\u52a1", "\u5728512\u5757A100 GPU\u300165B\u53c2\u6570\u6a21\u578b\u89c4\u6a21\u4e0b\u9a8c\u8bc1\uff0c\u6c38\u4e45\u8282\u70b9\u6545\u969c\u540e\u6062\u590d\u65f6\u95f4\u4e0d\u8d85\u8fc740\u79d2"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5206\u5e03\u5f0f\u8bad\u7ec3", "\u5bb9\u9519\u673a\u5236", "\u68c0\u67e5\u70b9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01646v1", "published_at": "2026-07-02", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "DeadPool: Resilient LLM Training with Hot-Swapping via Zero-Overhead Checkpoint", "tldr": "DeadPool\u5b9e\u73b0\u96f6\u5f00\u9500\u68c0\u67e5\u70b9+\u70ed\u66ff\u6362\uff0c\u8ba9LLM\u8bad\u7ec3\u5728\u8282\u70b9\u6c38\u4e45\u6545\u969c\u65f640\u79d2\u5185\u6062\u590d", "upvotes": 0, "what_it_is": "\u63d0\u51faDeadPool\u7cfb\u7edf\uff0c\u901a\u8fc7\u79bb\u5173\u952e\u8def\u5f84\u7684\u5185\u5b58\u68c0\u67e5\u70b9\u673a\u5236\u548c\u901a\u4fe1\u5668\u91cd\u5efa\u534f\u8bae\uff0c\u5b9e\u73b0LLM\u5206\u5e03\u5f0f\u8bad\u7ec3\u4e2d\u6545\u969c\u8282\u70b9\u7684\u70ed\u66ff\u6362\u6062\u590d\uff0c\u540c\u65f6\u8fbe\u5230\u96f6\u989d\u5916\u5f00\u9500\u548c\u6781\u4f4e\u6062\u590d\u5ef6\u8fdf\u4e24\u4e2a\u76ee\u6807\u3002", "why_notable": "\u5927\u89c4\u6a21LLM\u8bad\u7ec3\u4e2d\u6545\u969c\u5bb9\u5fcd\u662f\u6838\u5fc3\u5de5\u7a0b\u6311\u6218\uff0c\u73b0\u6709\u65b9\u6848\u5728\u96f6\u5f00\u9500\u4e0e\u5feb\u901f\u6062\u590d\u4e4b\u95f4\u5b58\u5728\u6743\u8861\uff0cDeadPool\u9996\u6b21\u540c\u65f6\u5b9e\u73b0\u4e24\u8005\uff0c\u5bf9\u5de5\u4e1a\u7ea7\u8bad\u7ec3\u57fa\u7840\u8bbe\u65bd\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Code is the medium through which large language models generate structured artifacts: charts, scientific figures, vector graphics, CAD models, 3D scenes, and hardware designs are all produced by writing programs. In this regime single pass inference is brittle, because the compiler, renderer, or simulator that decides whether the artifact exists is invisible to the model. We present PairCoder, which grounds review in the toolchain and realizes it as two agent pair programming: a Driver agent writes the program, a Navigator agent reviews it against verification evidence (diagnostics, execution results, and renderings of the current artifact beside the target), and the two switch roles when errors persist. Across 17 public benchmarks and seven models from three vendors, PairCoder improves essentially every benchmark whose artifact is verifiable, on full official metric suites rather than execution alone (for example, Blender scene executability 0.20 to 0.78; TikZ compile rate up 10 to 30 points on every model), at 2.9 to 9.2 times single model cost (about 7 times overall). The improvements concentrate where the toolchain provides an informative oracle and the baseline leaves headroom, and the method ties or mildly regresses where the oracle is weak; we frame pair programming as a reliable recipe for verified code driven generation.", "arxiv_id": "2607.01883", "arxiv_url": "https://arxiv.org/abs/2607.01883", "authors": ["Junhao Chen", "Xiang Li", "Mingjin Chen", "Boran Zhang", "Henghaofan Zhang", "Yibin Xu", "Yuehan Cui", "Fangsheng Weng", "Fei Ma", "Qi Tian", "Ruqi Huang", "Hao Zhao"], "brief": "\u63d0\u51faPairCoder\u6846\u67b6\uff0c\u5c06\u7ed3\u5bf9\u7f16\u7a0b\u8303\u5f0f\u5f15\u5165LLM\u4ee3\u7801\u9a71\u52a8\u7684\u7ed3\u6784\u5316\u5185\u5bb9\u751f\u6210\uff1aDriver\u667a\u80fd\u4f53\u8d1f\u8d23\u7f16\u5199\u7a0b\u5e8f\uff0cNavigator\u667a\u80fd\u4f53\u7ed3\u5408\u7f16\u8bd1\u5668/\u6e32\u67d3\u5668\u7b49\u5de5\u5177\u94fe\u53cd\u9988\u8fdb\u884c\u5ba1\u67e5\uff0c\u51fa\u9519\u65f6\u4e24\u8005\u4e92\u6362\u89d2\u8272\uff0c\u5f62\u6210\u81ea\u6211\u4fee\u6b63\u95ed\u73af\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01883", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u8986\u76d617\u4e2a\u516c\u5f00\u57fa\u51c6\u30017\u4e2a\u6a21\u578b\u3001\u4e09\u5bb6\u5382\u5546\uff0c\u6db5\u76d6\u56fe\u8868\u3001SVG\u3001CAD\u30013D\u573a\u666f\u3001\u786c\u4ef6\u8bbe\u8ba1\u7b49\u4e03\u7c7b\u7ed3\u6784\u5316\u4ea7\u7269", "\u663e\u8457\u63d0\u5347\u53ef\u9a8c\u8bc1\u4efb\u52a1\u6307\u6807\uff1aBlender\u573a\u666f\u53ef\u6267\u884c\u7387\u4ece0.20\u5347\u81f30.78\uff0cTikZ\u7f16\u8bd1\u7387\u5728\u6240\u6709\u6a21\u578b\u4e0a\u63d0\u534710-30\u4e2a\u767e\u5206\u70b9", "\u4ee3\u4ef7\u7ea6\u4e3a\u5355\u6a21\u578b\u63a8\u7406\u76842.9-9.2\u500d\uff08\u6574\u4f53\u7ea67\u500d\uff09\uff0c\u6539\u8fdb\u96c6\u4e2d\u4e8e\u5de5\u5177\u94fe\u80fd\u63d0\u4f9b\u4fe1\u606f\u6027\u53cd\u9988\u7684\u573a\u666f"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u591a\u6a21\u6001", "\u7ed3\u6784\u5316\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01883v1", "published_at": "2026-07-02", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "PairCoder++: Pair Programming as a Universal Paradigm for Verified Code-Driven Multimodal and Structured-Artifact Generation", "tldr": "\u53cc\u667a\u80fd\u4f53\u7ed3\u5bf9\u7f16\u7a0b\u6846\u67b6PairCoder\uff0c\u901a\u8fc7Driver\u5199\u4ee3\u7801\u3001Navigator\u5ba1\u67e5\u9a8c\u8bc1\uff0c\u5927\u5e45\u63d0\u5347\u591a\u6a21\u6001\u7ed3\u6784\u5316\u5185\u5bb9\u751f\u6210\u8d28\u91cf", "upvotes": 0, "what_it_is": "\u63d0\u51faPairCoder\u6846\u67b6\uff0c\u5c06\u7ed3\u5bf9\u7f16\u7a0b\u8303\u5f0f\u5f15\u5165LLM\u4ee3\u7801\u9a71\u52a8\u7684\u7ed3\u6784\u5316\u5185\u5bb9\u751f\u6210\uff1aDriver\u667a\u80fd\u4f53\u8d1f\u8d23\u7f16\u5199\u7a0b\u5e8f\uff0cNavigator\u667a\u80fd\u4f53\u7ed3\u5408\u7f16\u8bd1\u5668/\u6e32\u67d3\u5668\u7b49\u5de5\u5177\u94fe\u53cd\u9988\u8fdb\u884c\u5ba1\u67e5\uff0c\u51fa\u9519\u65f6\u4e24\u8005\u4e92\u6362\u89d2\u8272\uff0c\u5f62\u6210\u81ea\u6211\u4fee\u6b63\u95ed\u73af\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u7ed3\u5bf9\u7f16\u7a0b\u8303\u5f0f\u6cdb\u5316\u4e3a\u4ee3\u7801\u9a71\u52a8\u591a\u6a21\u6001\u751f\u6210\u7684\u901a\u7528\u6846\u67b6\uff0c\u5229\u7528\u5de5\u5177\u94fe\uff08\u7f16\u8bd1\u5668/\u6e32\u67d3\u5668\uff09\u4f5c\u4e3a\u53ef\u9760\u9a8c\u8bc1\u4fe1\u53f7\uff0c\u5728\u5927\u89c4\u6a21\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u4e86\u5176\u666e\u9002\u6027\u4e0e\u7a33\u5065\u6027\uff0c\u4e3aLLM\u751f\u6210\u7ed3\u6784\u5316\u4ea7\u7269\u63d0\u4f9b\u4e86\u53ef\u590d\u73b0\u7684\u5de5\u7a0b\u8303\u5f0f\u3002"}, {"abstract": "We present WorldDirector, a highly controllable video world model framework designed for persistent dynamic object memory and unrestricted viewpoint exploration. Unlike existing world models that entangle physical dynamics with pixel rendering and rely on continuous visual observation to sustain motion, our framework explicitly decouples semantic motion orchestration from visual generation. By leveraging an LLM to coordinate 3D trajectories with camera movements and subsequently employing these orchestrated trajectories as control signals for video generation, our approach ensures strict physical logic and appearance stability, successfully preserving the exact visual identities of dynamic entities even when they re-enter the scene after prolonged periods out of view. Experimental results demonstrate that our method supports the synthesis of complex and extended events with unprecedented controllability and persistent dynamic object memory. Project Page: https://worlddirector.github.io/", "arxiv_id": "2607.02517", "arxiv_url": "https://arxiv.org/abs/2607.02517", "authors": ["Hanlin Wang", "Hao Ouyang", "Qiuyu Wang", "Wen Wang", "Qingyan Bai", "Ka Leong Cheng", "Yue Yu", "Yixuan Li", "Yihao Meng", "Zichen Liu", "Yanhong Zeng", "Yujun Shen", "Qifeng Chen"], "brief": "\u63d0\u51faWorldDirector\u6846\u67b6\uff0c\u901a\u8fc7LLM\u534f\u8c033D\u8f68\u8ff9\u4e0e\u76f8\u673a\u8fd0\u52a8\uff0c\u5c06\u8bed\u4e49\u8fd0\u52a8\u7f16\u6392\u4e0e\u89c6\u89c9\u751f\u6210\u89e3\u8026\uff0c\u5b9e\u73b0\u5177\u6709\u6301\u4e45\u52a8\u6001\u5bf9\u8c61\u8bb0\u5fc6\u548c\u65e0\u9650\u89c6\u89d2\u63a2\u7d22\u7684\u53ef\u63a7\u89c6\u9891\u4e16\u754c\u6a21\u578b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02517", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5c06\u7269\u7406\u52a8\u6001\u4e0e\u50cf\u7d20\u6e32\u67d3\u89e3\u8026\uff0c\u7528LLM\u534f\u8c033D\u8f68\u8ff9\u4f5c\u4e3a\u89c6\u9891\u751f\u6210\u7684\u63a7\u5236\u4fe1\u53f7", "\u652f\u6301\u6301\u4e45\u52a8\u6001\u5bf9\u8c61\u8bb0\u5fc6\uff1a\u5373\u4f7f\u7269\u4f53\u957f\u65f6\u95f4\u79bb\u5f00\u753b\u9762\u540e\u91cd\u65b0\u51fa\u73b0\uff0c\u4ecd\u80fd\u4fdd\u6301\u5176\u7cbe\u786e\u89c6\u89c9\u8eab\u4efd", "\u652f\u6301\u65e0\u9650\u5236\u89c6\u89d2\u63a2\u7d22\uff0c\u53ef\u5408\u6210\u590d\u6742\u3001\u957f\u65f6\u5e8f\u4e8b\u4ef6\uff0c\u5177\u6709\u524d\u6240\u672a\u6709\u7684\u53ef\u63a7\u6027"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u53ef\u63a7\u751f\u6210", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02517v1", "published_at": "2026-07-02", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "WorldDirector: Building Controllable World Simulators with Persistent Dynamic Memory", "tldr"
