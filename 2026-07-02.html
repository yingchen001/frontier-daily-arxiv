2", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Language Models as Measurement Apparatus for Culture", "tldr": "\u672c\u6587\u63a2\u8ba8\u8bed\u8a00\u6a21\u578b\u4f5c\u4e3a\u6587\u5316\u6d4b\u91cf\u5de5\u5177\u7684\u672c\u8d28\uff0c\u501f\u52a9Karen Barad\u7684\"\u80fd\u52a8\u6027\u5207\u5272\"\u6982\u5ff5\uff0c\u6307\u51faNLP\u6587\u5316\u7814\u7a76\u4e2d\u6a21\u578b\u3001\u6570\u636e\u3001\u6807\u6ce8\u7b49\u88c5\u7f6e\u672c\u8eab\u53c2\u4e0e\u6784\u5efa\u4e86\u5176\u6240\u6d4b\u91cf\u7684\u6587\u5316\u73b0\u5b9e\uff0c\u800c\u975e\u88ab\u52a8\u8bb0\u5f55\u3002\u901a\u8fc7\u5f71\u89c6\u5bf9\u8bdd\u7684\u4e09\u4e2a\u6848\u4f8b\u7814\u7a76\uff0c\u63d0\u51fa\u4e00\u4e2a\u7406\u8bba\u9a71\u52a8\u3001\u7ecf\u9a8c\u4e25\u8c28\u4e14\u6587\u5316\u60c5\u5883\u5316\u7684\u7814\u7a76\u7eb2\u9886\uff0c\u5c06\u6bcf\u6b21\u6d4b\u91cf\u8bbe\u8ba1\u89c6\u4e3a\u65b9\u6cd5\u8bba\u4e0e\u4f26\u7406\u7684\u53cc\u91cd\u627f\u8bfa\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Rewriting inputs to improve frozen downstream models has become a common strategy in modern NLP pipelines. Prior work on incremental dialogue discourse parsing (DDP) shows that supervised clarification models can rewrite fragmentary or underspecified utterances, such as resolving ellipsis or references, to improve parsing accuracy. In this work, we revisit this idea under realistic deployment conditions, where no clarification supervision is available and the clarifier must rely on zero-shot prompting or feedback from a frozen parser. Across three Segmented Discourse Representation Theory (SDRT) datasets and multiple parsers, we find that last-utterance clarification is far less reliable than suggested by supervised settings. Parser-agnostic rewriting often introduces more regressions than repairs, as edits that enable fixes also disrupt discourse cues relied upon by the parser. A best-of-8 rewriting analysis further reveals a practical ceiling: a large fraction of errors are not repairable through input rewriting alone. A parser-aware clarifier trained with GRPO reduces regressions by up to 37% by learning conservative abstention, yet still fails to produce selectivity-aware clarifications that consistently improve parsing. Together, these findings recast clarification as a selective intervention problem. We identify rewritability prediction, deciding whether an utterance is repairable before intervention, as the key missing capability for input-side optimization of frozen discourse parsers, and a critical direction for improving agentic pipelines more broadly.", "arxiv_id": "2607.01964", "arxiv_url": "https://arxiv.org/abs/2607.01964", "authors": ["Yiming Liu", "Ziyue Zhang", "Zhichao Xu", "Xin Yu", "Yingheng Tang", "Tianyu Jiang", "Jie Cao"], "brief": "\u672c\u6587\u5728\u65e0\u76d1\u7763\u6f84\u6e05\u6807\u6ce8\u7684\u73b0\u5b9e\u6761\u4ef6\u4e0b\uff0c\u91cd\u65b0\u5ba1\u89c6\u901a\u8fc7\u8f93\u5165\u6539\u5199\u63d0\u5347\u5bf9\u8bdd\u8bdd\u8bed\u89e3\u6790\uff08DDP\uff09\u7684\u7b56\u7565\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u96f6\u6837\u672c\u6216\u57fa\u4e8e\u89e3\u6790\u5668\u53cd\u9988\u7684\u6539\u5199\u5f80\u5f80\u5f15\u5165\u66f4\u591a\u9519\u8bef\u800c\u975e\u4fee\u590d\uff0c\u5373\u4f7f\u4f7f\u7528GRPO\u8bad\u7ec3\u7684\u89e3\u6790\u5668\u611f\u77e5\u6f84\u6e05\u5668\u4e5f\u4ec5\u80fd\u51cf\u5c1137%\u7684\u56de\u5f52\uff1b\u5173\u952e\u7f3a\u5931\u80fd\u529b\u662f\"\u53ef\u6539\u5199\u6027\u9884\u6d4b\"\u2014\u2014\u5728\u5e72\u9884\u524d\u5224\u65ad\u67d0\u53e5\u8bdd\u662f\u5426\u503c\u5f97\u6539\u5199\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01964", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5bf9\u8bdd\u8bdd\u8bed\u89e3\u6790", "\u8f93\u5165\u6539\u5199", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01964v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Beyond Supervised Clarification: Input Rewriting with LLMs for Dialogue Discourse Parsing", "tldr": "\u672c\u6587\u5728\u65e0\u76d1\u7763\u6f84\u6e05\u6807\u6ce8\u7684\u73b0\u5b9e\u6761\u4ef6\u4e0b\uff0c\u91cd\u65b0\u5ba1\u89c6\u901a\u8fc7\u8f93\u5165\u6539\u5199\u63d0\u5347\u5bf9\u8bdd\u8bdd\u8bed\u89e3\u6790\uff08DDP\uff09\u7684\u7b56\u7565\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u96f6\u6837\u672c\u6216\u57fa\u4e8e\u89e3\u6790\u5668\u53cd\u9988\u7684\u6539\u5199\u5f80\u5f80\u5f15\u5165\u66f4\u591a\u9519\u8bef\u800c\u975e\u4fee\u590d\uff0c\u5373\u4f7f\u4f7f\u7528GRPO\u8bad\u7ec3\u7684\u89e3\u6790\u5668\u611f\u77e5\u6f84\u6e05\u5668\u4e5f\u4ec5\u80fd\u51cf\u5c1137%\u7684\u56de\u5f52\uff1b\u5173\u952e\u7f3a\u5931\u80fd\u529b\u662f\"\u53ef\u6539\u5199\u6027\u9884\u6d4b\"\u2014\u2014\u5728\u5e72\u9884\u524d\u5224\u65ad\u67d0\u53e5\u8bdd\u662f\u5426\u503c\u5f97\u6539\u5199\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-language models (VLMs) can follow complex textual instructions, yet they struggle to reason from purely visual context. In particular, current models fail to infer shared concepts from sets of example images and apply them to new inputs. We introduce Visual Concept Inference from Sets (VICIS), a task that evaluates this capability. Given a small context set of images sharing a concept and a query image, the model must generate new images that preserve the context-defined concept while remaining consistent with the query. We show that state-of-the-art VLMs perform poorly on this task, often ignoring the visual context or defaulting to biased generations. To address this gap, we propose a training framework and architecture that learn to infer visual concepts from image sets and extract concept-specific embeddings from queries. Experiments on synthetic data and large-scale ImageNet/WordNet data show that our model generates more accurate and diverse outputs and generalizes to unseen concepts and modalities such as sketches.", "arxiv_id": "2607.02402", "arxiv_url": "https://arxiv.org/abs/2607.02402", "authors": ["Nick Stracke", "Kolja Bauer", "Stefan Andreas Baumann", "Miguel Angel Bautista", "Josh Susskind", "Bj\u00f6rn Ommer"], "brief": "\u63d0\u51faVICIS\u4efb\u52a1\uff1a\u7ed9\u5b9a\u4e00\u7ec4\u5171\u4eab\u67d0\u6982\u5ff5\u7684\u56fe\u50cf\u793a\u4f8b\uff0c\u6a21\u578b\u9700\u63a8\u65ad\u8be5\u89c6\u89c9\u6982\u5ff5\u5e76\u5c06\u5176\u5e94\u7528\u4e8e\u65b0\u67e5\u8be2\u56fe\u50cf\u751f\u6210\u3002\u5f53\u524d\u4e3b\u6d41\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u6b64\u4efb\u52a1\u4e0a\u8868\u73b0\u8f83\u5dee\uff0c\u4f5c\u8005\u8bbe\u8ba1\u4e86\u4e13\u95e8\u7684\u8bad\u7ec3\u6846\u67b6\u548c\u67b6\u6784\uff0c\u5728ImageNet/WordNet\u6570\u636e\u4e0a\u9a8c\u8bc1\u4e86\u66f4\u51c6\u786e\u3001\u591a\u6837\u7684\u751f\u6210\u6548\u679c\uff0c\u5e76\u80fd\u6cdb\u5316\u5230\u8349\u56fe\u7b49\u672a\u89c1\u6a21\u6001\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02402", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u6982\u5ff5\u63a8\u65ad", "\u56fe\u50cf\u751f\u6210", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02402v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Show Me Examples: Inferring Visual Concepts from Image Sets", "tldr": "\u63d0\u51faVICIS\u4efb\u52a1\uff1a\u7ed9\u5b9a\u4e00\u7ec4\u5171\u4eab\u67d0\u6982\u5ff5\u7684\u56fe\u50cf\u793a\u4f8b\uff0c\u6a21\u578b\u9700\u63a8\u65ad\u8be5\u89c6\u89c9\u6982\u5ff5\u5e76\u5c06\u5176\u5e94\u7528\u4e8e\u65b0\u67e5\u8be2\u56fe\u50cf\u751f\u6210\u3002\u5f53\u524d\u4e3b\u6d41\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u6b64\u4efb\u52a1\u4e0a\u8868\u73b0\u8f83\u5dee\uff0c\u4f5c\u8005\u8bbe\u8ba1\u4e86\u4e13\u95e8\u7684\u8bad\u7ec3\u6846\u67b6\u548c\u67b6\u6784\uff0c\u5728ImageNet/WordNet\u6570\u636e\u4e0a\u9a8c\u8bc1\u4e86\u66f4\u51c6\u786e\u3001\u591a\u6837\u7684\u751f\u6210\u6548\u679c\uff0c\u5e76\u80fd\u6cdb\u5316\u5230\u8349\u56fe\u7b49\u672a\u89c1\u6a21\u6001\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-Language-Action (VLA) models have shown remarkable promise in generalized robotic manipulation. However, their spatial generalization remains fragile. We argue that simply increasing the number of viewpoints is insufficient. Models often fall into the trap of Shortcut Learning, latching onto spurious correlations (e.g., fixed relative poses between objects or between the camera and robot base) rather than learning true spatial relationships. In this work, we propose a data-centric solution to enhance VLA spatial generalization. We utilize a dual-arm setup where one arm performs manipulation while the other serves as a mobile environmental camera. We systematically evaluate three data distribution patterns: Fixed, Multi-Fixed, and Moving Views. Our findings reveal that a hybrid strategy, combining continuous camera motion with diverse static viewpoints, yields the best performance by substantially reducing spurious correlations while maintaining training stability. Our experiments demonstrate that this strategy mitigates spurious correlations, enabling VLAs to generalize to unseen camera poses and object configurations where simply adding more static viewpoints fails. Crucially, we reveal that the susceptibility to shortcut learning and the struggle with spatial generalization are universal characteristics shared across diverse architectures. Consequently, all evaluated models (ACT, Diffusion, and VLA models including Pi0 and Gr00t) benefit significantly from our mixed data strategy.", "arxiv_id": "2607.02322", "arxiv_url": "https://arxiv.org/abs/2607.02322", "authors": ["Jincheng Tang", "Yilong Zhu", "Zhengyuan Xie", "Jiang-Jiang Liu", "Jiaxing Zhang"], "brief": "\u9488\u5bf9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u7a7a\u95f4\u6cdb\u5316\u80fd\u529b\u8106\u5f31\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4ee5\u53cc\u81c2\u673a\u5668\u4eba\u4e3a\u5e73\u53f0\u7684\u6df7\u5408\u52a8\u6001\u6570\u636e\u91c7\u96c6\u7b56\u7565\uff0c\u7528\u4e00\u53ea\u624b\u81c2\u4f5c\u4e3a\u79fb\u52a8\u6444\u50cf\u5934\u91c7\u96c6\u8fde\u7eed\u8fd0\u52a8\u89c6\u89d2\u4e0e\u591a\u6837\u9759\u6001\u89c6\u89d2\u7684\u6df7\u5408\u6570\u636e\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u7b56\u7565\u6709\u6548\u51cf\u5c11\u6377\u5f84\u5b66\u4e60\u4e2d\u7684\u865a\u5047\u76f8\u5173\u6027\uff0c\u4f7fACT\u3001Diffusion Policy\u3001Pi0\u3001Gr00t\u7b49\u591a\u79cd\u6a21\u578b\u5728\u672a\u89c1\u6444\u50cf\u5934\u59ff\u6001\u548c\u7269\u4f53\u914d\u7f6e\u4e0b\u7684\u7a7a\u95f4\u6cdb\u5316\u80fd\u529b\u663e\u8457\u63d0\u5347\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02322", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b", "\u7a7a\u95f4\u6cdb\u5316", "\u6570\u636e\u91c7\u96c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02322v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Moving Eye: Enhancing VLA Spatial Generalization via Hybrid Dynamic Data Collection", "tldr": "\u9488\u5bf9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u7a7a\u95f4\u6cdb\u5316\u80fd\u529b\u8106\u5f31\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4ee5\u53cc\u81c2\u673a\u5668\u4eba\u4e3a\u5e73\u53f0\u7684\u6df7\u5408\u52a8\u6001\u6570\u636e\u91c7\u96c6\u7b56\u7565\uff0c\u7528\u4e00\u53ea\u624b\u81c2\u4f5c\u4e3a\u79fb\u52a8\u6444\u50cf\u5934\u91c7\u96c6\u8fde\u7eed\u8fd0\u52a8\u89c6\u89d2\u4e0e\u591a\u6837\u9759\u6001\u89c6\u89d2\u7684\u6df7\u5408\u6570\u636e\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u7b56\u7565\u6709\u6548\u51cf\u5c11\u6377\u5f84\u5b66\u4e60\u4e2d\u7684\u865a\u5047\u76f8\u5173\u6027\uff0c\u4f7fACT\u3001Diffusion Policy\u3001Pi0\u3001Gr00t\u7b49\u591a\u79cd\u6a21\u578b\u5728\u672a\u89c1\u6444\u50cf\u5934\u59ff\u6001\u548c\u7269\u4f53\u914d\u7f6e\u4e0b\u7684\u7a7a\u95f4\u6cdb\u5316\u80fd\u529b\u663e\u8457\u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Egocentric videos capture rich and diverse human-object interactions and have emerged as a fundamental resource for understanding human activities related to objects. In this context, Video Referring Expression Comprehension (Video REC), the task of localizing the temporal and spatial extent of a referred object in video frames given a natural language query, plays a key role in linking textual descriptions to observed objects in untrimmed egocentric recordings. However, existing egocentric Video REC benchmarks primarily focus on short video clips, where some target object appears densely within frames. Such settings do not reflect real-world egocentric recordings, which are long-form, untrimmed, and characterized by sparse object occurrences and complex activity transitions. To address this limitation, we introduce LongEgoRefer, a novel and challenging benchmark constructed from long-form videos in the Ego4D dataset. LongEgoRefer contains 1,498 referring expressions with an average video duration of 45 minutes. The benchmark exhibits extreme target sparsity, detailed linguistic descriptions, and complex human-object interactions embedded in long, dynamic egocentric narratives. Consequently, it defines a demanding spatio-temporal grounding problem that requires models to identify both when an event occurs and where the referred object appears within extended video sequences. We evaluate existing Video REC approaches, including training-free baselines based on vision-language models combined with Grounded SAM2. Extensive experiments show that even advanced baselines and current state-of-the-art models struggle significantly on LongEgoRefer. These results highlight the intrinsic difficulty of long-form egocentric spatio-temporal grounding and emphasize the need for more robust video understanding models.", "arxiv_id": "2607.02096", "arxiv_url": "https://arxiv.org/abs/2607.02096", "authors": ["Shunya Kato", "Taiki Miyanishi", "Shuhei Kurita", "Mahiro Ukai", "Nakamasa Inoue", "Chenhui Chu"], "brief": "\u63d0\u51faLongEgoRefer\u57fa\u51c6\uff0c\u4e13\u6ce8\u4e8e\u957f\u89c6\u9891\u7b2c\u4e00\u4eba\u79f0\u89c6\u89d2\u4e2d\u7684\u6307\u4ee3\u8868\u8fbe\u7406\u89e3\u4efb\u52a1\uff0c\u5305\u542b1498\u4e2a\u6307\u4ee3\u8868\u8fbe\u3001\u5e73\u574745\u5206\u949f\u89c6\u9891\u65f6\u957f\uff0c\u5177\u6709\u6781\u7a00\u758f\u76ee\u6807\u51fa\u73b0\u548c\u590d\u6742\u4eba\u7269-\u7269\u4f53\u4ea4\u4e92\u7279\u5f81\u3002\u5b9e\u9a8c\u8868\u660e\u73b0\u6709\u6700\u5148\u8fdb\u6a21\u578b\u5728\u8be5\u57fa\u51c6\u4e0a\u8868\u73b0\u663e\u8457\u4e0d\u8db3\uff0c\u63ed\u793a\u4e86\u957f\u89c6\u9891\u65f6\u7a7a\u5b9a\u4f4d\u7684\u5185\u5728\u6311\u6218\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02096", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u7406\u89e3", "\u591a\u6a21\u6001", "\u65f6\u7a7a\u5b9a\u4f4d", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02096v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "LongEgoRefer: A Benchmark for Long-Form Egocentric Video Referring Expression Comprehension", "tldr": "\u63d0\u51faLongEgoRefer\u57fa\u51c6\uff0c\u4e13\u6ce8\u4e8e\u957f\u89c6\u9891\u7b2c\u4e00\u4eba\u79f0\u89c6\u89d2\u4e2d\u7684\u6307\u4ee3\u8868\u8fbe\u7406\u89e3\u4efb\u52a1\uff0c\u5305\u542b1498\u4e2a\u6307\u4ee3\u8868\u8fbe\u3001\u5e73\u574745\u5206\u949f\u89c6\u9891\u65f6\u957f\uff0c\u5177\u6709\u6781\u7a00\u758f\u76ee\u6807\u51fa\u73b0\u548c\u590d\u6742\u4eba\u7269-\u7269\u4f53\u4ea4\u4e92\u7279\u5f81\u3002\u5b9e\u9a8c\u8868\u660e\u73b0\u6709\u6700\u5148\u8fdb\u6a21\u578b\u5728\u8be5\u57fa\u51c6\u4e0a\u8868\u73b0\u663e\u8457\u4e0d\u8db3\uff0c\u63ed\u793a\u4e86\u957f\u89c6\u9891\u65f6\u7a7a\u5b9a\u4f4d\u7684\u5185\u5728\u6311\u6218\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present HandsOnWorld, a framework for hand-controlled egocentric video generation that forgoes multi-view and marker-based motion capture, learning instead from unconstrained monocular video. Such generality is bottlenecked by the scarcity of scalable 3D hand annotations: large egocentric corpora lack finger-level labels, whereas precise hand datasets are confined to narrow, instrumented settings, limiting prior hand-controlled generators to restricted scene distributions. We instead annotate 3D hands directly on in-the-wild egocentric video through monocular reconstruction, introducing a protagonist-centered annotation pipeline that filters the reconstructions at the action-semantic, image-quality, and 3D-geometric levels to build EgoVid-Pro, a dataset of clean, protagonist-only hand trajectories spanning 103K clips and roughly 12M frames across diverse everyday scenes. To resolve the camera-hand entanglement induced by large ego-motion, we further propose the Pl\u00fccker Hand Map, a 3D-aware control signal that extends Pl\u00fccker-ray representations from camera rays to the hand surface, disentangling camera and hand motion at the representation level. Experiments show that \\method surpasses prior hand-controlled generators in reconstruction fidelity and control accuracy, and generalizes to out-of-distribution everyday scenes beyond the laboratory datasets on which prior methods rely.", "arxiv_id": "2607.02075", "arxiv_url": "https://arxiv.org/abs/2607.02075", "authors": ["Yushuo Chen", "Xiaoyu Shi", "Xiaoshi Wu", "Xintao Wang", "Pengfei Wan", "Yebin Liu"], "brief": "\u63d0\u51faHandsOnWorld\u6846\u67b6\uff0c\u5229\u7528\u5355\u76ee\u91ce\u5916\u81ea\u6211\u4e2d\u5fc3\u89c6\u9891\u751f\u6210\u624b\u90e8\u63a7\u5236\u7684\u7b2c\u4e00\u4eba\u79f0\u89c6\u9891\uff0c\u65e0\u9700\u591a\u89c6\u89d2\u6216\u6807\u8bb0\u5f0f\u52a8\u6355\u3002\u901a\u8fc7\u6784\u5efa\u542b103K\u7247\u6bb5\u7684EgoVid-Pro\u6570\u636e\u96c6\u548cPl\u00fccker\u624b\u90e8\u6620\u5c04\u4fe1\u53f7\u89e3\u8026\u76f8\u673a\u4e0e\u624b\u90e8\u8fd0\u52a8\uff0c\u5728\u91cd\u5efa\u4fdd\u771f\u5ea6\u548c\u63a7\u5236\u7cbe\u5ea6\u4e0a\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5\uff0c\u5e76\u80fd\u6cdb\u5316\u5230\u5b9e\u9a8c\u5ba4\u5916\u7684\u65e5\u5e38\u573a\u666f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02075", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u81ea\u6211\u4e2d\u5fc3\u89c6\u9891", "\u624b\u90e8\u63a7\u5236", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02075v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "HandsOnWorld: Unconstrained Egocentric Video Generation with Camera-Disentangled Hand Control", "tldr": "\u63d0\u51faHandsOnWorld\u6846\u67b6\uff0c\u5229\u7528\u5355\u76ee\u91ce\u5916\u81ea\u6211\u4e2d\u5fc3\u89c6\u9891\u751f\u6210\u624b\u90e8\u63a7\u5236\u7684\u7b2c\u4e00\u4eba\u79f0\u89c6\u9891\uff0c\u65e0\u9700\u591a\u89c6\u89d2\u6216\u6807\u8bb0\u5f0f\u52a8\u6355\u3002\u901a\u8fc7\u6784\u5efa\u542b103K\u7247\u6bb5\u7684EgoVid-Pro\u6570\u636e\u96c6\u548cPl\u00fccker\u624b\u90e8\u6620\u5c04\u4fe1\u53f7\u89e3\u8026\u76f8\u673a\u4e0e\u624b\u90e8\u8fd0\u52a8\uff0c\u5728\u91cd\u5efa\u4fdd\u771f\u5ea6\u548c\u63a7\u5236\u7cbe\u5ea6\u4e0a\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5\uff0c\u5e76\u80fd\u6cdb\u5316\u5230\u5b9e\u9a8c\u5ba4\u5916\u7684\u65e5\u5e38\u573a\u666f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large vision-language models (LVLMs) have achieved strong performance across many medical imaging tasks, yet their application to ultrasound remains limited due to its inherent complexity and variability. In this work, we revisit what is truly needed to enable real-world ultrasound understanding. Instead of introducing complex architectures or elaborate training strategies, we show that data scale and clinically faithful data alignment are the key factors. We construct a large-scale dataset of 1.5M real-world ultrasound examinations, containing 17.7M images, multi-organ coverage, and paired uncurated clinical reports. Crucially, we organize the data at the examination level, aligning multiple images with their corresponding reports to reflect real clinical workflows. We then fine-tune a standard LVLM using low-rank adaptation (LoRA) on this dataset without task-specific modifications. Surprisingly, this simple recipe already leads to strong performance across diverse ultrasound understanding tasks, outperforming prior methods designed with more complex pipelines. Beyond these results, we present model and data scaling analyses that provide insights into the role of scale in ultrasound LVLMs.", "arxiv_id": "2607.01908", "arxiv_url": "https://arxiv.org/abs/2607.01908", "authors": ["Bingcong Yan", "Chunlei Li", "Jingliang Hu", "Yilei Shi", "Xiao Xiang Zhu", "Lichao Mou"], "brief": "\u6784\u5efa\u4e86\u5305\u542b150\u4e07\u6b21\u771f\u5b9e\u8d85\u58f0\u68c0\u67e5\u30011770\u4e07\u5f20\u56fe\u50cf\u7684\u5927\u89c4\u6a21\u6570\u636e\u96c6\uff0c\u4ee5\u68c0\u67e5\u7ea7\u522b\u5bf9\u9f50\u591a\u56fe\u50cf\u4e0e\u4e34\u5e8a\u62a5\u544a\uff0c\u4f7f\u7528\u6807\u51c6LVLM\u52a0LoRA\u5fae\u8c03\uff0c\u65e0\u9700\u590d\u6742\u67b6\u6784\u5373\u5728\u591a\u79cd\u8d85\u58f0\u7406\u89e3\u4efb\u52a1\u4e0a\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5\uff0c\u63ed\u793a\u6570\u636e\u89c4\u6a21\u4e0e\u4e34\u5e8a\u5bf9\u9f50\u662f\u5173\u952e\u56e0\u7d20\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01908", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u533b\u5b66\u5f71\u50cf", "\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u8d85\u58f0\u7406\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01908v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Towards Real-World Ultrasound Understanding: Large Vision-Language Models from Multi-Image Examinations with Long-Form Reports", "tldr": "\u6784\u5efa\u4e86\u5305\u542b150\u4e07\u6b21\u771f\u5b9e\u8d85\u58f0\u68c0\u67e5\u30011770\u4e07\u5f20\u56fe\u50cf\u7684\u5927\u89c4\u6a21\u6570\u636e\u96c6\uff0c\u4ee5\u68c0\u67e5\u7ea7\u522b\u5bf9\u9f50\u591a\u56fe\u50cf\u4e0e\u4e34\u5e8a\u62a5\u544a\uff0c\u4f7f\u7528\u6807\u51c6LVLM\u52a0LoRA\u5fae\u8c03\uff0c\u65e0\u9700\u590d\u6742\u67b6\u6784\u5373\u5728\u591a\u79cd\u8d85\u58f0\u7406\u89e3\u4efb\u52a1\u4e0a\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5\uff0c\u63ed\u793a\u6570\u636e\u89c4\u6a21\u4e0e\u4e34\u5e8a\u5bf9\u9f50\u662f\u5173\u952e\u56e0\u7d20\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Video diffusion transformers (DiTs) generate high-fidelity and temporally coherent videos, yet motion control remains implicit, primarily relying on text prompts. As a result, achieving desired motion often requires extensive prompt engineering and repeated resampling. While fine-tuning models with additional spatial prompts (e.g., bounding boxes or point trajectories) enables explicit control, it demands substantial data curation and computation, and may compromise the generative capabilities of pretrained models. Consequently, training-free motion control using such spatial prompts has been explored in U-Net-based video diffusion models, but remains largely unexplored for DiTs. We introduce QWERTY, a training-free framework that enables flexible motion control in pretrained image-to-video DiTs via user-defined object warping and optical flow. We carefully manipulate the 3D full attention of DiTs by warping the frame-invariant semantic subspace of queries. We find that the noise predicted by the query-warped DiT naturally guides the diffusion trajectory toward the desired motion, and further show that leveraging this noise as self-guidance for latent optimization improves control stability and visual quality. Experiments show that QWERTY achieves the most effective motion control among existing training-free approaches on a recent image-to-video DiT, with performance comparable to fine-tuning-based methods.", "arxiv_id": "2607.01869", "arxiv_url": "https://arxiv.org/abs/2607.01869", "authors": ["Kyobin Choo", "Youngmin Kim", "Hyunkyung Han", "Geunrip Park", "Chanyoung Kim", "Sunyoung Jung", "Seong Jae Hwang"], "brief": "\u63d0\u51faQWERTY\u6846\u67b6\uff0c\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u5728\u56fe\u50cf\u5230\u89c6\u9891\u6269\u6563Transformer\u4e2d\u5b9e\u73b0\u7075\u6d3b\u8fd0\u52a8\u63a7\u5236\u3002\u901a\u8fc7\u5bf9\u67e5\u8be2\uff08Query\uff09\u7684\u5e27\u4e0d\u53d8\u8bed\u4e49\u5b50\u7a7a\u95f4\u8fdb\u884c\u626d\u66f2\u53d8\u6362\u6765\u64cd\u63a73D\u5168\u6ce8\u610f\u529b\uff0c\u5e76\u5229\u7528\u9884\u6d4b\u566a\u58f0\u4f5c\u4e3a\u81ea\u5f15\u5bfc\u4f18\u5316\u6f5c\u53d8\u91cf\uff0c\u5728\u8fd0\u52a8\u63a7\u5236\u6548\u679c\u4e0a\u5ab2\u7f8e\u5fae\u8c03\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01869", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u8fd0\u52a8\u63a7\u5236", "\u65e0\u8bad\u7ec3\u65b9\u6cd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01869v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "QWERTY: Training-Free Motion Control via Query-Warped Video Diffusion Transformers", "tldr": "\u63d0\u51faQWERTY\u6846\u67b6\uff0c\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u5728\u56fe\u50cf\u5230\u89c6\u9891\u6269\u6563Transformer\u4e2d\u5b9e\u73b0\u7075\u6d3b\u8fd0\u52a8\u63a7\u5236\u3002\u901a\u8fc7\u5bf9\u67e5\u8be2\uff08Query\uff09\u7684\u5e27\u4e0d\u53d8\u8bed\u4e49\u5b50\u7a7a\u95f4\u8fdb\u884c\u626d\u66f2\u53d8\u6362\u6765\u64cd\u63a73D\u5168\u6ce8\u610f\u529b\uff0c\u5e76\u5229\u7528\u9884\u6d4b\u566a\u58f0\u4f5c\u4e3a\u81ea\u5f15\u5bfc\u4f18\u5316\u6f5c\u53d8\u91cf\uff0c\u5728\u8fd0\u52a8\u63a7\u5236\u6548\u679c\u4e0a\u5ab2\u7f8e\u5fae\u8c03\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Visual-spatial understanding, defined as the ability to infer object relationships and scene layouts from visual inputs, is fundamental to downstream tasks such as robotic navigation and embodied interaction. However, pre-trained vision-language models (VLMs) remain constrained by spatial uncertainty stemming from inherently 2D observations and by the scarcity of data for 3D spatial understanding. To address these limitations, we proposed a novel framework, SpaceEra, in the NeurIPS 2025 Spotlight paper. Although it achieved significant performance gains, we further observed that its effectiveness is hindered by insufficient input from scanning videos and weak reasoning constraints. To tackle these newly emerged challenges, we extend the original framework into a comprehensive system, termed SpaceEra++, which spans data construction, model design, training optimization, and prompting inference. Specifically, to alleviate input insufficiency, we introduce ScenePick, a frame sampling strategy that balances spatial coverage with object semantics to produce compact yet comprehensive scene representations. In addition, to enhance spatial reasoning, we develop SpaceAlign, which enforces pairwise object constraints by jointly exploiting absolute coordinates and relative spatial relations, thereby aligning optimization with spatial accuracy. Extensive experiments across multiple benchmarks demonstrate consistent improvements over strong baselines, while ablation studies validate both the individual and joint contributions of each component, and further analyses provide guidance for future research.", "arxiv_id": "2607.01784", "arxiv_url": "https://arxiv.org/abs/2607.01784", "authors": ["Weili Guan", "Haoyu Zhang", "Meng Liu", "Qianlong Xiang", "Yaowei Wang", "Liqiang Nie"], "brief": "\u63d0\u51faSpaceEra++\u6846\u67b6\uff0c\u901a\u8fc7ScenePick\u5e27\u91c7\u6837\u7b56\u7565\u548cSpaceAlign\u7a7a\u95f4\u7ea6\u675f\u5bf9\u9f50\u65b9\u6cd5\uff0c\u89e3\u51b3\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u57283D\u7a7a\u95f4\u63a8\u7406\u4e2d\u8f93\u5165\u4e0d\u8db3\u548c\u63a8\u7406\u7ea6\u675f\u5f31\u7684\u95ee\u9898\u3002\u5728\u591a\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u76f8\u6bd4\u5f3a\u57fa\u7ebf\u53d6\u5f97\u4e00\u81f4\u6027\u63d0\u5347\uff0c\u9a8c\u8bc1\u4e86\u5404\u7ec4\u4ef6\u7684\u6709\u6548\u6027\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01784", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u7a7a\u95f4\u63a8\u7406", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001", "\u5177\u8eab\u667a\u80fd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01784v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SpaceEra++: A Unified Framework Towards 3D Spatial Reasoning in Video", "tldr": "\u63d0\u51faSpaceEra++\u6846\u67b6\uff0c\u901a\u8fc7ScenePick\u5e27\u91c7\u6837\u7b56\u7565\u548cSpaceAlign\u7a7a\u95f4\u7ea6\u675f\u5bf9\u9f50\u65b9\u6cd5\uff0c\u89e3\u51b3\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u57283D\u7a7a\u95f4\u63a8\u7406\u4e2d\u8f93\u5165\u4e0d\u8db3\u548c\u63a8\u7406\u7ea6\u675f\u5f31\u7684\u95ee\u9898\u3002\u5728\u591a\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u76f8\u6bd4\u5f3a\u57fa\u7ebf\u53d6\u5f97\u4e00\u81f4\u6027\u63d0\u5347\uff0c\u9a8c\u8bc1\u4e86\u5404\u7ec4\u4ef6\u7684\u6709\u6548\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "3D plant phenotyping is notoriously known to be procedure-complicated and of low throughput due to the extensive multi-view imaging, the fragile 3D reconstruction pipeline, and the additional cost from reconstructed geometry to phenotypic extraction. These limitations are further amplified in low-cost data acquisition, where smartphone videos or sparsely sampled multi-view images provide limited view overlap and self-occlusion. In this work, we show that the conventional 3D plant phenotyping pipeline could be streamlined and significantly accelerated with 3D Foundation Models (3DFMs), and particularly, present one of the first cross-crop 3D phenotyping frameworks powered by 3DFMs. The framework replaces COLMAP-style sparse initialization with 3DFM-based feed-forward geometric recovery, combines geometry-constrained 3D Gaussian Splatting for dense reconstruction, enables few-view reconstruction through iterative view synthesis and refinement, and converts reconstructed geometry into measurable organs through 2D-to-3D semantic transfer, metric scale recovery, and organ instance separation. We further construct a cross-crop dataset with smartphone-based image acquisition, diverse plant morphologies, and manual annotations for segmentation and phenotypic evaluation. Experiments across 26 plant sequences show that 3D Foundation Models reduce the average reconstruction time from 6.52 minutes to 1.58 seconds while maintaining high reconstruction quality and phenotyping accuracy. These results suggest a fresh technical route for high-throughput 3D plant phenotyping, from low-cost image acquisition to fast reconstruction, perception, scale recovery, and phenotypic measurement.", "arxiv_id": "2607.01753", "arxiv_url": "https://arxiv.org/abs/2607.01753", "authors": ["Hanyue Jia", "Wei Zhou", "Wenbo Zhou", "Yanan Li", "Hao Lu", "Tingting Wu"], "brief": "\u63d0\u51fa\u57fa\u4e8e3D\u57fa\u7840\u6a21\u578b\u7684\u8de8\u4f5c\u7269\u690d\u7269\u4e09\u7ef4\u8868\u578b\u5206\u6790\u6846\u67b6\uff0c\u7528\u524d\u9988\u5f0f\u51e0\u4f55\u6062\u590d\u66ff\u4ee3\u4f20\u7edfCOLMAP\u6d41\u7a0b\uff0c\u7ed3\u54083D\u9ad8\u65af\u6cfc\u6e85\u4e0e\u8bed\u4e49\u8fc1\u79fb\u5b9e\u73b0\u5668\u5b98\u7ea7\u8868\u578b\u63d0\u53d6\u3002\u572826\u4e2a\u690d\u7269\u5e8f\u5217\u4e0a\uff0c\u5e73\u5747\u91cd\u5efa\u65f6\u95f4\u4ece6.52\u5206\u949f\u538b\u7f29\u81f31.58\u79d2\uff0c\u540c\u65f6\u4fdd\u6301\u9ad8\u8d28\u91cf\u91cd\u5efa\u4e0e\u8868\u578b\u7cbe\u5ea6\u3002", "categories": ["cs.CV", "q-bio.QM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01753", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e09\u7ef4\u91cd\u5efa", "\u690d\u7269\u8868\u578b", "\u57fa\u7840\u6a21\u578b", "\u9ad8\u65af\u6cfc\u6e85"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01753v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Turning Point of 3D Plant Phenotyping: 3D Foundation Models Enable Minute-to-Second Cross-Crop Reconstruction and Beyond", "tldr": "\u63d0\u51fa\u57fa\u4e8e3D\u57fa\u7840\u6a21\u578b\u7684\u8de8\u4f5c\u7269\u690d\u7269\u4e09\u7ef4\u8868\u578b\u5206\u6790\u6846\u67b6\uff0c\u7528\u524d\u9988\u5f0f\u51e0\u4f55\u6062\u590d\u66ff\u4ee3\u4f20\u7edfCOLMAP\u6d41\u7a0b\uff0c\u7ed3\u54083D\u9ad8\u65af\u6cfc\u6e85\u4e0e\u8bed\u4e49\u8fc1\u79fb\u5b9e\u73b0\u5668\u5b98\u7ea7\u8868\u578b\u63d0\u53d6\u3002\u572826\u4e2a\u690d\u7269\u5e8f\u5217\u4e0a\uff0c\u5e73\u5747\u91cd\u5efa\u65f6\u95f4\u4ece6.52\u5206\u949f\u538b\u7f29\u81f31.58\u79d2\uff0c\u540c\u65f6\u4fdd\u6301\u9ad8\u8d28\u91cf\u91cd\u5efa\u4e0e\u8868\u578b\u7cbe\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large vision-language models (LVLMs) exhibit strong reasoning ability but suffer from visual forgetting during long-horizon decoding, where attention progressively drifts away from visual evidence. Existing methods largely treat this issue as a late-stage attention decay problem or attempt to mitigate it through heuristic reminders or post-hoc attention lifting. Through systematic empirical analysis, we find that performance degradation under visual forgetting is largely driven by two overlooked factors: early-stage attention decay disrupts evidence acquisition, and attention concentration on a subset of task-irrelevant visual sink tokens. Motivated by these insights, we propose LASER, a post-training framework that regulates both the visual attention trajectory and intra-visual token attention distribution during reasoning. Technically, LASER introduces two complementary rewards: a Visual Grounding Reward, which encourages the model to maintain attention on semantically salient visual tokens throughout decoding, and a Sink Suppression Reward, which penalizes excessive attention concentration on visual sink tokens. Together, these rewards preserve early-stage grounding while preventing attention collapse onto uninformative regions. Extensive experiments on eight benchmark datasets demonstrate that LASER consistently outperforms strong baselines, validating attention-aware training as an effective remedy for visual forgetting.", "arxiv_id": "2607.01707", "arxiv_url": "https://arxiv.org/abs/2607.01707", "authors": ["Bowen Yuan", "Zijian Wang", "Yadan Luo", "Shijie Wang", "Zi Huang"], "brief": "\u5927\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u957f\u5e8f\u5217\u89e3\u7801\u65f6\u5b58\u5728\"\u89c6\u89c9\u9057\u5fd8\"\u95ee\u9898\uff0c\u6ce8\u610f\u529b\u9010\u6e10\u504f\u79bb\u89c6\u89c9\u8bc1\u636e\u3002\u672c\u6587\u63d0\u51faLASER\u6846\u67b6\uff0c\u901a\u8fc7\u89c6\u89c9\u63a5\u5730\u5956\u52b1\u548c\u6ce8\u610f\u529b\u6c47\u805a\u6291\u5236\u5956\u52b1\u4e24\u4e2a\u4e92\u8865\u673a\u5236\uff0c\u5728\u8bad\u7ec3\u540e\u9636\u6bb5\u540c\u65f6\u89c4\u8303\u89c6\u89c9\u6ce8\u610f\u529b\u8f68\u8ff9\u548c\u5206\u5e03\uff0c\u5728\u516b\u4e2a\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\u6301\u7eed\u8d85\u8d8a\u5f3a\u57fa\u7ebf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01707", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u6ce8\u610f\u529b\u673a\u5236", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01707v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "LASER: A Corrective Lens for LVLMs via Visual Attention Preservation and Sink Suppression", "tldr": "\u5927\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u957f\u5e8f\u5217\u89e3\u7801\u65f6\u5b58\u5728\"\u89c6\u89c9\u9057\u5fd8\"\u95ee\u9898\uff0c\u6ce8\u610f\u529b\u9010\u6e10\u504f\u79bb\u89c6\u89c9\u8bc1\u636e\u3002\u672c\u6587\u63d0\u51faLASER\u6846\u67b6\uff0c\u901a\u8fc7\u89c6\u89c9\u63a5\u5730\u5956\u52b1\u548c\u6ce8\u610f\u529b\u6c47\u805a\u6291\u5236\u5956\u52b1\u4e24\u4e2a\u4e92\u8865\u673a\u5236\uff0c\u5728\u8bad\u7ec3\u540e\u9636\u6bb5\u540c\u65f6\u89c4\u8303\u89c6\u89c9\u6ce8\u610f\u529b\u8f68\u8ff9\u548c\u5206\u5e03\uff0c\u5728\u516b\u4e2a\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\u6301\u7eed\u8d85\u8d8a\u5f3a\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Monocular video depth estimation requires temporal consistency, geometric accuracy, and generalization across diverse scenarios, yet existing methods struggle to achieve all three simultaneously. Discriminative models excel at per-frame accuracy but suffer from temporal drift due to limited context windows, while generative methods improve consistency and generalization at the cost of extensive training data (10M+ samples) and lack of geometric precision. In response to these issues, we introduce \\textbf{ICDepth}, a framework that adapts pre-trained text-to-video diffusion transformers for video depth estimation via In-Context Conditioning (ICC), leveraging their rich spatial-temporal priors. To address key challenges in transferring ICC from generation to dense prediction, we propose: (1)~\\textbf{SAND-Attention}, which ensures precise spatial-temporal alignment via shared RoPE and enforces unidirectional attention to prevent noise contamination; (2)~\\textbf{SRFM}, which injects DINOv2 semantic and resolution priors to enhance geometric precision. ICDepth achieves state-of-the-art results on multiple benchmarks with remarkable data efficiency, trained on only 0.8M frames ($6$--$13\\times$ less than competing generative methods), while demonstrating strong zero-shot generalization to diverse domains.", "arxiv_id": "2607.01677", "arxiv_url": "https://arxiv.org/abs/2607.01677", "authors": ["Xuanhua He", "Jiaxin Xie", "Mingzhe Zheng", "Qifeng Chen"], "brief": "ICDepth\u5c06\u9884\u8bad\u7ec3\u6587\u672c\u8f6c\u89c6\u9891\u6269\u6563Transformer\u9002\u914d\u7528\u4e8e\u5355\u76ee\u89c6\u9891\u6df1\u5ea6\u4f30\u8ba1\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u6761\u4ef6\u5316\uff08ICC\uff09\u673a\u5236\u5229\u7528\u5176\u4e30\u5bcc\u7684\u65f6\u7a7a\u5148\u9a8c\u3002\u63d0\u51faSAND-Attention\u548cSRFM\u4e24\u4e2a\u5173\u952e\u6a21\u5757\uff0c\u5206\u522b\u89e3\u51b3\u65f6\u7a7a\u5bf9\u9f50\u548c\u51e0\u4f55\u7cbe\u5ea6\u95ee\u9898\uff0c\u4ec5\u752880\u4e07\u5e27\u8bad\u7ec3\u6570\u636e\u5373\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff0c\u6bd4\u540c\u7c7b\u751f\u6210\u65b9\u6cd5\u5c116-13\u500d\u6570\u636e\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01677", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6df1\u5ea6\u4f30\u8ba1", "\u6269\u6563\u6a21\u578b", "\u89c6\u9891\u7406\u89e3", "\u96f6\u6837\u672c\u6cdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01677v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ICDepth: Taming Video Diffusion Models for Video Depth Estimation via In-Context Conditioning", "tldr": "ICDepth\u5c06\u9884\u8bad\u7ec3\u6587\u672c\u8f6c\u89c6\u9891\u6269\u6563Transformer\u9002\u914d\u7528\u4e8e\u5355\u76ee\u89c6\u9891\u6df1\u5ea6\u4f30\u8ba1\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u6761\u4ef6\u5316\uff08ICC\uff09\u673a\u5236\u5229\u7528\u5176\u4e30\u5bcc\u7684\u65f6\u7a7a\u5148\u9a8c\u3002\u63d0\u51faSAND-Attention\u548cSRFM\u4e24\u4e2a\u5173\u952e\u6a21\u5757\uff0c\u5206\u522b\u89e3\u51b3\u65f6\u7a7a\u5bf9\u9f50\u548c\u51e0\u4f55\u7cbe\u5ea6\u95ee\u9898\uff0c\u4ec5\u752880\u4e07\u5e27\u8bad\u7ec3\u6570\u636e\u5373\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff0c\u6bd4\u540c\u7c7b\u751f\u6210\u65b9\u6cd5\u5c116-13\u500d\u6570\u636e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-Language-Action (VLA) models have emerged as a promising paradigm for end-to-end autonomous driving. However, existing VLAs\u0027 training relies heavily on text-centric visual question answering and chain-of-thought reasoning data, which emphasizes linguistic reasoning rather than action-grounded planning. As a result, the learned representations capture semantic knowledge but lack spatial dependencies crucial for reliable trajectory prediction. We propose DriveTeach-VLA, a framework that explicitly teaches VLAs what to see and where to look. Driving-aware Vision Distillation (DVD) injects driving-specific perceptual priors into the vision encoder, while 2D Trajectory-Guided Prompts (2D-TGP) provide spatial conditioning aligned with feasible driving trajectories. Together, they form a vision-guided learning pipeline: what to see (DVD pretraining) - where to look (TGP-guided SFT) - how to act (TGP-guided GRPO). DriveTeach-VLA achieves the state-of-the-art performance on NAVSIM and nuScenes. Our code is available at: https://github.com/ShivaTeam/DriveTeach-VLA.", "arxiv_id": "2607.01658", "arxiv_url": "https://arxiv.org/abs/2607.01658", "authors": ["Yuguang Yang", "Canyu Chen", "Zhewen Tan", "Yizhi Wang", "Zichao Feng", "Chunyang Liu", "Kehua Sheng", "Juan Zhang", "Linlin Yang", "Baochang Zhang", "Yan Wang", "Bo Zhang", "Xianbin Cao"], "brief": "\u63d0\u51faDriveTeach-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u9a7e\u9a76\u611f\u77e5\u89c6\u89c9\u84b8\u998f\uff08DVD\uff09\u548c2D\u8f68\u8ff9\u5f15\u5bfc\u63d0\u793a\uff082D-TGP\uff09\u663e\u5f0f\u6559\u5bfc\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\"\u770b\u4ec0\u4e48\"\u548c\"\u770b\u54ea\u91cc\"\uff0c\u89e3\u51b3\u73b0\u6709VLA\u6a21\u578b\u7a7a\u95f4\u611f\u77e5\u4e0d\u8db3\u7684\u95ee\u9898\u3002\u5728NAVSIM\u548cnuScenes\u6570\u636e\u96c6\u4e0a\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01658", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u8f68\u8ff9\u9884\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01658v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Teaching Vision-Language-Action Models What to See and Where to Look", "tldr": "\u63d0\u51faDriveTeach-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u9a7e\u9a76\u611f\u77e5\u89c6\u89c9\u84b8\u998f\uff08DVD\uff09\u548c2D\u8f68\u8ff9\u5f15\u5bfc\u63d0\u793a\uff082D-TGP\uff09\u663e\u5f0f\u6559\u5bfc\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\"\u770b\u4ec0\u4e48\"\u548c\"\u770b\u54ea\u91cc\"\uff0c\u89e3\u51b3\u73b0\u6709VLA\u6a21\u578b\u7a7a\u95f4\u611f\u77e5\u4e0d\u8db3\u7684\u95ee\u9898\u3002\u5728NAVSIM\u548cnuScenes\u6570\u636e\u96c6\u4e0a\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Hardware-agnostic strategies for accelerating text-to-image diffusion, such as timestep distillation and feature caching, can reduce inference time without custom kernels or system-level optimization. Among them, multi-resolution generation strategies have recently received broad attention, attaining more than 5x speedup without any training. However, the design of performing upsampling in the latent space, together with the selective modification of partial regions, causes these methods to exhibit noticeable blurring or artifacts. To this end, we propose MrFlow, a training-free multi-resolution acceleration strategy for pretrained flow-matching models built upon a staged low-to-high-resolution pipeline. MrFlow first rapidly generates the main structure at low resolution, then performs super-resolution in the pixel space using a lightweight pretrained GAN-based model, subsequently injects low-strength noise to enable high-frequency resampling, and finally refines the details at high resolution. Quantitative and qualitative results on FLUX.1-dev and Qwen-Image show that MrFlow exploits the quadratic token reduction and reduced step requirement of low-resolution sampling to achieve 10x end-to-end acceleration while keeping OneIG within a 1% gap relative to that before acceleration, significantly surpassing other training-free acceleration strategies, and requiring no training or runtime dynamic identification whatsoever. MrFlow can further be directly combined orthogonally with pre-trained timestep distillation strategies, achieving even higher generation acceleration of up to 25x.", "arxiv_id": "2607.01642", "arxiv_url": "https://arxiv.org/abs/2607.01642", "authors": ["Xingyu Zheng", "Xianglong Liu", "Yifu Ding", "Weilun Feng", "Junqing Lin", "Jinyang Guo", "Haotong Qin"], "brief": "\u63d0\u51faMrFlow\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u591a\u5206\u8fa8\u7387\u6d41\u5339\u914d\u52a0\u901f\u7b56\u7565\uff1a\u5148\u5728\u4f4e\u5206\u8fa8\u7387\u5feb\u901f\u751f\u6210\u4e3b\u4f53\u7ed3\u6784\uff0c\u518d\u901a\u8fc7\u8f7b\u91cfGAN\u8d85\u5206\u8fa8\u7387\u5230\u50cf\u7d20\u7a7a\u95f4\uff0c\u6ce8\u5165\u4f4e\u5f3a\u5ea6\u566a\u58f0\u540e\u5728\u9ad8\u5206\u8fa8\u7387\u7ec6\u5316\u7ec6\u8282\u3002\u5728FLUX.1-dev\u4e0a\u5b9e\u73b010\u500d\u7aef\u5230\u7aef\u52a0\u901f\uff0c\u56fe\u50cf\u8d28\u91cf\u635f\u5931\u4e0d\u8d85\u8fc71%\uff0c\u4e0e\u65f6\u95f4\u6b65\u84b8\u998f\u7ed3\u5408\u53ef\u8fbe25\u500d\u52a0\u901f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01642", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u6d41\u5339\u914d", "\u63a8\u7406\u52a0\u901f", "\u591a\u5206\u8fa8\u7387\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01642v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Multi-Resolution Flow Matching: Training-Free Diffusion Acceleration via Staged Sampling", "tldr": "\u63d0\u51faMrFlow\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u591a\u5206\u8fa8\u7387\u6d41\u5339\u914d\u52a0\u901f\u7b56\u7565\uff1a\u5148\u5728\u4f4e\u5206\u8fa8\u7387\u5feb\u901f\u751f\u6210\u4e3b\u4f53\u7ed3\u6784\uff0c\u518d\u901a\u8fc7\u8f7b\u91cfGAN\u8d85\u5206\u8fa8\u7387\u5230\u50cf\u7d20\u7a7a\u95f4\uff0c\u6ce8\u5165\u4f4e\u5f3a\u5ea6\u566a\u58f0\u540e\u5728\u9ad8\u5206\u8fa8\u7387\u7ec6\u5316\u7ec6\u8282\u3002\u5728FLUX.1-dev\u4e0a\u5b9e\u73b010\u500d\u7aef\u5230\u7aef\u52a0\u901f\uff0c\u56fe\u50cf\u8d28\u91cf\u635f\u5931\u4e0d\u8d85\u8fc71%\uff0c\u4e0e\u65f6\u95f4\u6b65\u84b8\u998f\u7ed3\u5408\u53ef\u8fbe25\u500d\u52a0\u901f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLMs memorize sensitive training data, including personally identifiable information (PII), creating a pressing need for reliable post hoc removal methods. Unlearning has emerged as a promising solution, with state-of-the-art(SOTA) methods often following a localize-first, unlearn-second paradigm that targets specific model parameters. However, existing benchmarks evaluate unlearning solely at the output level, leaving open the question of whether unlearning truly erases knowledge from a model\u0027s parameters or merely obfuscates it, a concern reinforced by the success of resurfacing attacks. To bridge this gap, we introduce LACUNA: the first unlearning testbed with ground-truth parameter-level localization. LACUNA injects PII of synthetic individuals into predefined parameters of 1B and 7B OLMo-based models via masked continual pretraining, enabling direct evaluation of whether unlearning targets the weights responsible for knowledge storage. We use LACUNA to benchmark current SOTA unlearning methods and find that, despite strong output-level performance, existing methods are highly imprecise and susceptible to resurfacing attacks. We further show that when localization is successful, even a simple gradient-based unlearning method achieves strong erasure and robustness to resurfacing attacks, highlighting the importance of precise unlearning. We release LACUNA to complement behavioral evaluations and drive further advances in robust, localization-based unlearning.", "arxiv_id": "2607.02513", "arxiv_url": "https://arxiv.org/abs/2607.02513", "authors": ["Matteo Boglioni", "Thibault Rousset", "Siva Reddy", "Marius Mosbach", "Verna Dankers"], "brief": "\u63d0\u51faLACUNA\u6d4b\u8bd5\u5e73\u53f0\uff0c\u9996\u6b21\u5728\u53c2\u6570\u7ea7\u522b\u8bc4\u4f30LLM\u9057\u5fd8\u65b9\u6cd5\u7684\u5b9a\u4f4d\u7cbe\u5ea6\u3002\u901a\u8fc7\u5411\u9884\u5b9a\u4e49\u53c2\u6570\u6ce8\u5165\u5408\u6210PII\uff0c\u53d1\u73b0\u73b0\u6709SOTA\u9057\u5fd8\u65b9\u6cd5\u5c3d\u7ba1\u8f93\u51fa\u5c42\u8868\u73b0\u826f\u597d\uff0c\u4f46\u53c2\u6570\u5b9a\u4f4d\u6781\u4e0d\u7cbe\u786e\u4e14\u6613\u53d7\u91cd\u73b0\u653b\u51fb\uff1b\u800c\u7cbe\u51c6\u5b9a\u4f4d\u540e\u5373\u4f7f\u7b80\u5355\u68af\u5ea6\u9057\u5fd8\u65b9\u6cd5\u4e5f\u80fd\u5b9e\u73b0\u5f3a\u9c81\u68d2\u6027\u64e6\u9664\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02513", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u673a\u5668\u9057\u5fd8", "\u5927\u8bed\u8a00\u6a21\u578b", "\u9690\u79c1\u4fdd\u62a4", "\u53c2\u6570\u5b9a\u4f4d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02513v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "LACUNA: A Testbed for Evaluating Localization Precision for LLM Unlearning", "tldr": "\u63d0\u51faLACUNA\u6d4b\u8bd5\u5e73\u53f0\uff0c\u9996\u6b21\u5728\u53c2\u6570\u7ea7\u522b\u8bc4\u4f30LLM\u9057\u5fd8\u65b9\u6cd5\u7684\u5b9a\u4f4d\u7cbe\u5ea6\u3002\u901a\u8fc7\u5411\u9884\u5b9a\u4e49\u53c2\u6570\u6ce8\u5165\u5408\u6210PII\uff0c\u53d1\u73b0\u73b0\u6709SOTA\u9057\u5fd8\u65b9\u6cd5\u5c3d\u7ba1\u8f93\u51fa\u5c42\u8868\u73b0\u826f\u597d\uff0c\u4f46\u53c2\u6570\u5b9a\u4f4d\u6781\u4e0d\u7cbe\u786e\u4e14\u6613\u53d7\u91cd\u73b0\u653b\u51fb\uff1b\u800c\u7cbe\u51c6\u5b9a\u4f4d\u540e\u5373\u4f7f\u7b80\u5355\u68af\u5ea6\u9057\u5fd8\u65b9\u6cd5\u4e5f\u80fd\u5b9e\u73b0\u5f3a\u9c81\u68d2\u6027\u64e6\u9664\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
