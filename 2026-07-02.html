u4efb\u52a1\u65f6\u6548\u679c\u660e\u663e\u4e0b\u964d", "\u591a\u4e2aSteering Vectors\u7ec4\u5408\u65f6\uff0c\u6240\u6709\u65b9\u6cd5\u5747\u51fa\u73b0\u7279\u5f81\u8868\u8fbe\u80fd\u529b\u968f\u5411\u91cf\u6570\u91cf\u589e\u52a0\u800c\u5927\u5e45\u4e0b\u964d\u7684\u95ee\u9898\uff0c\u4e14\u8fde\u8d2f\u6027\u4e0e\u53ef\u8868\u8fbe\u6027\u4e4b\u95f4\u5b58\u5728\u6743\u8861"], "keywords": ["\u53ef\u63a7\u6587\u672c\u751f\u6210", "\u504f\u597d\u5bf9\u9f50", "Steering Vectors", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01802v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "On the Limits of Steering Vectors for Preference-Aligned Generation", "tldr": "\u7cfb\u7edf\u8bc4\u4f30Steering Vectors\u5728\u504f\u597d\u5bf9\u9f50\u751f\u6210\u4e2d\u7684\u5c40\u9650\u6027\uff0c\u53d1\u73b0\u5176\u6cdb\u5316\u80fd\u529b\u5b58\u5728\u663e\u8457\u7f3a\u9677", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7PLUME\u5199\u4f5c\u4e2a\u6027\u5316\u57fa\u51c6\uff0c\u4ece\u7279\u5f81\u53ef\u8868\u8fbe\u6027\u3001\u4efb\u52a1\u8fc1\u79fb\u548c\u591a\u7279\u5f81\u7ec4\u5408\u4e09\u4e2a\u7ef4\u5ea6\uff0c\u7cfb\u7edf\u7814\u7a76\u4e86Steering Vectors\u4f5c\u4e3a\u901a\u7528\u504f\u597d\u5bf9\u9f50\u5de5\u5177\u7684\u5c40\u9650\u6027\u3002", "why_notable": "Steering Vectors\u88ab\u89c6\u4e3a\u65e0\u9700\u8bad\u7ec3\u7684\u53ef\u89e3\u91ca\u63a7\u5236\u751f\u6210\u65b9\u6cd5\uff0c\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u5176\u6cdb\u5316\u8fb9\u754c\uff0c\u5bf9\u8be5\u65b9\u5411\u7684\u5b9e\u9645\u5e94\u7528\u4ef7\u503c\u63d0\u51fa\u91cd\u8981\u8b66\u793a\uff0c\u6709\u52a9\u4e8e\u5f15\u5bfc\u793e\u533a\u66f4\u7406\u6027\u5730\u8bc4\u4f30\u8be5\u6280\u672f\u8def\u7ebf\u3002"}, {"abstract": "Synthetic data can be scaled along two routes: Source Expansion (SE), which enlarges the source by adding seed materials or generators, and Fixed-Source Synthesis (FSS), which holds the source fixed and scales the generation budget. Existing scaling studies typically expand the source as the data grows, conflating SE with FSS and leaving FSS underexplored. We isolate FSS by holding the seed-question pool and teacher model fixed, varying only the per-question response budget under Rejection Sampling (RS). We adapt the rectified scaling law to FSS, deriving it from how repeated sampling covers a fixed source. Empirically, the derived form, fit on low budgets, predicts performance at the held-out highest budget for every evaluated teacher--student pair. At matched total-sample budgets, SE and FSS are comparable at small budgets; at large budgets, adding seed questions outperforms spending the same budget on more responses. Within FSS, however, neither synthesizing additional questions from the existing seeds nor varying the synthesis protocol outperforms plain RS at matched budgets. FSS is thus a bounded scaling axis and a controlled setting for comparing synthesis protocols. We will release our code and data to facilitate further research.", "arxiv_id": "2607.01727", "arxiv_url": "https://arxiv.org/abs/2607.01727", "authors": ["Xu Guo", "Jian Tong", "Zhihui Lu", "Qipeng Guo"], "brief": "\u672c\u6587\u5c06\u5408\u6210\u6570\u636e\u6269\u5c55\u5206\u4e3a\"\u56fa\u5b9a\u6e90\u5408\u6210\uff08FSS\uff09\"\u548c\"\u6e90\u6269\u5c55\uff08SE\uff09\"\u4e24\u6761\u8def\u5f84\uff0c\u901a\u8fc7\u63a7\u5236\u53d8\u91cf\u5b9e\u9a8c\u7cfb\u7edf\u7814\u7a76FSS\u7684\u7f29\u653e\u89c4\u5f8b\uff0c\u5e76\u63a8\u5bfc\u51fa\u9002\u7528\u4e8eFSS\u7684\u4fee\u6b63\u7f29\u653e\u5b9a\u5f8b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01727", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51faFSS\u4e0eSE\u7684\u660e\u786e\u533a\u5206\uff1aFSS\u56fa\u5b9a\u79cd\u5b50\u95ee\u9898\u6c60\u548c\u6559\u5e08\u6a21\u578b\uff0c\u4ec5\u589e\u52a0\u6bcf\u9898\u751f\u6210\u9884\u7b97\uff1bSE\u5219\u6269\u5145\u79cd\u5b50\u6216\u751f\u6210\u5668", "\u5c06\u4fee\u6b63\u7f29\u653e\u5b9a\u5f8b\u9002\u914d\u81f3FSS\u573a\u666f\uff0c\u4f4e\u9884\u7b97\u62df\u5408\u540e\u53ef\u51c6\u786e\u9884\u6d4b\u6700\u9ad8\u9884\u7b97\u4e0b\u7684\u6027\u80fd", "\u5728\u76f8\u540c\u603b\u6837\u672c\u9884\u7b97\u4e0b\uff0c\u5c0f\u9884\u7b97\u65f6FSS\u4e0eSE\u76f8\u5f53\uff0c\u5927\u9884\u7b97\u65f6\u589e\u52a0\u79cd\u5b50\u95ee\u9898\u4f18\u4e8e\u589e\u52a0\u54cd\u5e94\u6570\u91cf\uff1bFSS\u5185\u90e8\u989d\u5916\u751f\u6210\u95ee\u9898\u6216\u6539\u53d8\u5408\u6210\u534f\u8bae\u5747\u4e0d\u4f18\u4e8e\u666e\u901a\u62d2\u7edd\u91c7\u6837"], "keywords": ["\u5408\u6210\u6570\u636e", "\u6570\u636e\u6269\u5c55", "\u7f29\u653e\u5b9a\u5f8b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01727v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "When Does Generating More Help? Disentangling Fixed-Source Synthesis from Source Expansion in Synthetic Data Scaling", "tldr": "\u533a\u5206\u5408\u6210\u6570\u636e\u7684\u4e24\u79cd\u6269\u5c55\u8def\u5f84\uff0c\u63ed\u793a\u56fa\u5b9a\u6e90\u5408\u6210\u7684\u89c4\u5f8b\u4e0e\u8fb9\u754c", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06\u5408\u6210\u6570\u636e\u6269\u5c55\u5206\u4e3a\"\u56fa\u5b9a\u6e90\u5408\u6210\uff08FSS\uff09\"\u548c\"\u6e90\u6269\u5c55\uff08SE\uff09\"\u4e24\u6761\u8def\u5f84\uff0c\u901a\u8fc7\u63a7\u5236\u53d8\u91cf\u5b9e\u9a8c\u7cfb\u7edf\u7814\u7a76FSS\u7684\u7f29\u653e\u89c4\u5f8b\uff0c\u5e76\u63a8\u5bfc\u51fa\u9002\u7528\u4e8eFSS\u7684\u4fee\u6b63\u7f29\u653e\u5b9a\u5f8b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u9694\u79bb\u5e76\u91cf\u5316FSS\u8fd9\u4e00\u88ab\u5ffd\u89c6\u7684\u6269\u5c55\u8f74\uff0c\u63ed\u793a\u5176\u6709\u754c\u6027\uff0c\u4e3a\u5408\u6210\u6570\u636e\u7b56\u7565\u9009\u62e9\u63d0\u4f9b\u7406\u8bba\u4f9d\u636e\uff0c\u5e76\u4e3a\u540e\u7eed\u534f\u8bae\u6bd4\u8f83\u63d0\u4f9b\u53d7\u63a7\u57fa\u51c6\u3002"}, {"abstract": "Generative diffusion models excel at synthesizing high-quality images, videos, and 3D content under multimodal control. However, arbitrary user-defined modality-to-4D (X-to-4D) generation remains challenging due to the high cost of constructing diverse datasets and the limited scalability of existing methods. This paper presents Align4D, a flexible framework that translates any-modal input into coherent video-3D pairs, using video to guide 4D motion and 3D data to shape 4D geometry. Align4D introduces three key techniques: (1) Object Distance Alignment, which searches Video-Aligned and Multiview-Aligned Object Distances (VAOD/MAOD), respectively, to reconcile 4D renderings with video and the priors of multiview diffusion models; (2) Motion-Geometry Joint Alignment, which constrains known and unknown views through synchronized video and 3D inputs, ensuring consistent 4D generation; and (3) Asynchronous Optimization, which decouples Gaussian attribute and deformation network training to enhance motion and geometry fidelity. We further propose the X4D dataset, which integrates prompt, image, video, and 3D data for benchmarking. Experiments on X4D and Consistent4D demonstrate that Align4D achieves state-of-the-art quality and consistency in X-to-4D generation. Project page: https://miaoqiaowei.github.io/Align4D/.", "arxiv_id": "2607.02516", "arxiv_url": "https://arxiv.org/abs/2607.02516", "authors": ["Qiaowei Miao", "Kehan Li", "Yawei Luo", "Yi Yang"], "brief": "\u63d0\u51faAlign4D\u6846\u67b6\uff0c\u5c06\u4efb\u610f\u6a21\u6001\u8f93\u5165\uff08\u6587\u672c/\u56fe\u50cf/\u89c6\u9891/3D\uff09\u8f6c\u5316\u4e3a\u8fde\u8d2f\u7684\u89c6\u9891-3D\u5bf9\uff0c\u901a\u8fc7\u89c6\u9891\u5f15\u5bfc4D\u8fd0\u52a8\u30013D\u6570\u636e\u5851\u90204D\u51e0\u4f55\uff0c\u5b9e\u73b0X-to-4D\u751f\u6210\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02516", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5bf9\u8c61\u8ddd\u79bb\u5bf9\u9f50\uff08VAOD/MAOD\uff09\uff1a\u5206\u522b\u641c\u7d22\u89c6\u9891\u5bf9\u9f50\u548c\u591a\u89c6\u89d2\u5bf9\u9f50\u7684\u5bf9\u8c61\u8ddd\u79bb\uff0c\u534f\u8c034D\u6e32\u67d3\u4e0e\u89c6\u9891\u53ca\u591a\u89c6\u89d2\u6269\u6563\u6a21\u578b\u5148\u9a8c", "\u8fd0\u52a8-\u51e0\u4f55\u8054\u5408\u5bf9\u9f50\uff1a\u901a\u8fc7\u540c\u6b65\u89c6\u9891\u548c3D\u8f93\u5165\u7ea6\u675f\u5df2\u77e5\u4e0e\u672a\u77e5\u89c6\u89d2\uff0c\u786e\u4fdd4D\u751f\u6210\u7684\u4e00\u81f4\u6027", "\u5f02\u6b65\u4f18\u5316\u7b56\u7565\uff1a\u89e3\u8026\u9ad8\u65af\u5c5e\u6027\u4e0e\u5f62\u53d8\u7f51\u7edc\u8bad\u7ec3\uff0c\u5206\u522b\u63d0\u5347\u8fd0\u52a8\u548c\u51e0\u4f55\u4fdd\u771f\u5ea6\uff1b\u5e76\u6784\u5efaX4D\u57fa\u51c6\u6570\u636e\u96c6"], "keywords": ["4D\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u591a\u6a21\u6001", "\u4e09\u7ef4\u91cd\u5efa"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02516v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Alignment Is All You Need For X-to-4D Generation", "tldr": "Align4D\u6846\u67b6\u5b9e\u73b0\u4efb\u610f\u6a21\u6001\u8f93\u5165\u52304D\u5185\u5bb9\u7684\u9ad8\u8d28\u91cf\u751f\u6210", "upvotes": 0, "what_it_is": "\u63d0\u51faAlign4D\u6846\u67b6\uff0c\u5c06\u4efb\u610f\u6a21\u6001\u8f93\u5165\uff08\u6587\u672c/\u56fe\u50cf/\u89c6\u9891/3D\uff09\u8f6c\u5316\u4e3a\u8fde\u8d2f\u7684\u89c6\u9891-3D\u5bf9\uff0c\u901a\u8fc7\u89c6\u9891\u5f15\u5bfc4D\u8fd0\u52a8\u30013D\u6570\u636e\u5851\u90204D\u51e0\u4f55\uff0c\u5b9e\u73b0X-to-4D\u751f\u6210\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u89e3\u51b3\u4efb\u610f\u6a21\u6001\u52304D\u751f\u6210\u7684\u5bf9\u9f50\u95ee\u9898\uff0c\u65e0\u9700\u6784\u5efa\u5927\u89c4\u6a21\u4e13\u7528\u6570\u636e\u96c6\uff0c\u5728Consistent4D\u7b49\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u5177\u6709\u9ad8\u5ea6\u7075\u6d3b\u6027\u548c\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Embodied AI models now span vision-language-action (VLA) models and world-action models (WAMs), but practical deployment remains fragmented across model-specific Python stacks, backend assumptions, and robot-side glue code, especially on heterogeneous edge devices. Existing inference runtimes are designed mainly for request-response serving and therefore do not satisfy the runtime contract of embodied deployment: multi-rate execution inside closed-loop control, latency-first batch-1 inference on heterogeneous hardware, and extensible embodied interfaces beyond fixed token I/O. We present Embodied.cpp, a portable C++ inference runtime for embodied models. Based on an architectural analysis of representative VLA models and WAMs, Embodied.cpp captures a shared execution path and organizes it into five layers: input adapters, sequence builders, backbone execution, head plugins, and deployment adapters. The runtime provides modular multi-rate execution, latency-first fused inference, and extensible operator and I/O support, enabling deployment across heterogeneous devices, robots, and simulators through one backend abstraction. We evaluate Embodied.cpp on two VLA models, HY-VLA and pi0.5, and on a preliminary WAM benchmark using a LingBot-VA Transformer block. The VLA deployments achieve successful closed-loop execution with 100.0% and 91.0% task success rates, respectively. The WAM benchmark reduces block memory from 312.2 MiB to 88.1 MiB. These results show that Embodied.cpp improves deployment efficiency while preserving high accuracy across diverse embodied model architectures.", "arxiv_id": "2607.02501", "arxiv_url": "https://arxiv.org/abs/2607.02501", "authors": ["Ling Xu", "Chuyu Han", "Borui Li", "Hao Wu", "Shiqi Jiang", "Ting Cao", "Chuanyou Li", "Sheng Zhong", "Shuai Wang"], "brief": "\u63d0\u51faEmbodied.cpp\uff0c\u4e00\u4e2a\u4e13\u4e3a\u5177\u8eabAI\u6a21\u578b\u8bbe\u8ba1\u7684\u53ef\u79fb\u690dC++\u63a8\u7406\u8fd0\u884c\u65f6\uff0c\u901a\u8fc7\u4e94\u5c42\u67b6\u6784\uff08\u8f93\u5165\u9002\u914d\u5668\u3001\u5e8f\u5217\u6784\u5efa\u5668\u3001\u4e3b\u5e72\u6267\u884c\u3001\u5934\u90e8\u63d2\u4ef6\u3001\u90e8\u7f72\u9002\u914d\u5668\uff09\u7edf\u4e00\u652f\u6301VLA\u6a21\u578b\u548c\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\u5728\u5f02\u6784\u8fb9\u7f18\u8bbe\u5907\u4e0a\u7684\u95ed\u73af\u90e8\u7f72\u3002", "categories": ["cs.RO", "cs.CV", "cs.OS"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02501", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4e94\u5c42\u6a21\u5757\u5316\u67b6\u6784\u652f\u6301\u591a\u901f\u7387\u6267\u884c\u3001\u5ef6\u8fdf\u4f18\u5148\u7684\u6279\u91cf1\u63a8\u7406\uff0c\u4ee5\u53ca\u53ef\u6269\u5c55\u7684\u7b97\u5b50\u548cI/O\u63a5\u53e3", "\u5728HY-VLA\u548cpi0.5\u4e24\u4e2aVLA\u6a21\u578b\u4e0a\u5b9e\u73b0\u95ed\u73af\u6267\u884c\uff0c\u4efb\u52a1\u6210\u529f\u7387\u5206\u522b\u8fbe100%\u548c91%", "WAM\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u5c06Transformer\u5757\u5185\u5b58\u5360\u7528\u4ece312.2 MiB\u538b\u7f29\u81f388.1 MiB\uff08\u964d\u4f4e\u7ea672%\uff09"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u63a8\u7406\u8fd0\u884c\u65f6", "\u673a\u5668\u4eba", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02501v1", "published_at": "2026-07-02", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Embodied.cpp: A Portable Inference Runtime of Embodied AI Models on Heterogeneous Robots", "tldr": "Embodied.cpp\uff1a\u9762\u5411\u5f02\u6784\u673a\u5668\u4eba\u7684\u5177\u8eabAI\u6a21\u578b\u53ef\u79fb\u690dC++\u63a8\u7406\u8fd0\u884c\u65f6", "upvotes": 0, "what_it_is": "\u63d0\u51faEmbodied.cpp\uff0c\u4e00\u4e2a\u4e13\u4e3a\u5177\u8eabAI\u6a21\u578b\u8bbe\u8ba1\u7684\u53ef\u79fb\u690dC++\u63a8\u7406\u8fd0\u884c\u65f6\uff0c\u901a\u8fc7\u4e94\u5c42\u67b6\u6784\uff08\u8f93\u5165\u9002\u914d\u5668\u3001\u5e8f\u5217\u6784\u5efa\u5668\u3001\u4e3b\u5e72\u6267\u884c\u3001\u5934\u90e8\u63d2\u4ef6\u3001\u90e8\u7f72\u9002\u914d\u5668\uff09\u7edf\u4e00\u652f\u6301VLA\u6a21\u578b\u548c\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\u5728\u5f02\u6784\u8fb9\u7f18\u8bbe\u5907\u4e0a\u7684\u95ed\u73af\u90e8\u7f72\u3002", "why_notable": "\u73b0\u6709\u63a8\u7406\u8fd0\u884c\u65f6\u4e3b\u8981\u9762\u5411\u8bf7\u6c42-\u54cd\u5e94\u670d\u52a1\u573a\u666f\uff0c\u65e0\u6cd5\u6ee1\u8db3\u5177\u8eabAI\u95ed\u73af\u63a7\u5236\u7684\u5b9e\u65f6\u6027\u9700\u6c42\uff1bEmbodied.cpp\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u89e3\u51b3\u4e86\u5177\u8eab\u6a21\u578b\u5728\u5f02\u6784\u673a\u5668\u4eba\u786c\u4ef6\u4e0a\u7684\u788e\u7247\u5316\u90e8\u7f72\u95ee\u9898\uff0c\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Flow-matching vision-language-action policies generate robot action chunks through an iterative transport process, creating an opportunity for test-time guidance without retraining the base policy. We study this opportunity in Guided Action Flow, an inference-time framework that keeps a pretrained SmolVLA policy frozen and uses a learned action-chunk critic to guide its reverse-time flow sampler. The critic is trained from real success and failure rollouts, can condition on task-description features from the frozen SmolVLA language pathway, and is used only through action gradients during sampling. We evaluate the approach on LIBERO manipulation tasks. A single-task critic improves success from 68.0% to 82.0% on one seed window and from 82.0% to 86.0% on another. A multi-family task-description critic improves validation success from 46.0% to 56.0%, while the locked held-out test gain is positive but modest, from 65.0% to 67.5%. These results support the feasibility of Q-guided inference for frozen flow-matching VLA policies, while showing that critic generalization and uncertainty-aware guidance remain the central bottlenecks.", "arxiv_id": "2607.02092", "arxiv_url": "https://arxiv.org/abs/2607.02092", "authors": ["Liuhaichen Yang", "Zhuang Jiang", "Chenchao Sheng", "Zezhi Tang"], "brief": "\u63d0\u51faGuided Action Flow\u6846\u67b6\uff0c\u5728\u63a8\u7406\u9636\u6bb5\u5229\u7528\u5b66\u4e60\u5230\u7684\u52a8\u4f5c\u5757\u8bc4\u4ef7\u51fd\u6570\uff08critic\uff09\u901a\u8fc7\u68af\u5ea6\u5f15\u5bfc\u51bb\u7ed3\u7684SmolVLA\u6d41\u5339\u914d\u7b56\u7565\u91c7\u6837\uff0c\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u57fa\u7840\u7b56\u7565\u5373\u53ef\u63d0\u5347\u673a\u5668\u4eba\u64cd\u4f5c\u6027\u80fd\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02092", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["Critic\u4ece\u771f\u5b9e\u6210\u529f/\u5931\u8d25\u8f68\u8ff9\u4e2d\u8bad\u7ec3\uff0c\u5e76\u53ef\u5229\u7528\u51bb\u7ed3VLA\u7684\u8bed\u8a00\u7279\u5f81\u8fdb\u884c\u4efb\u52a1\u6761\u4ef6\u5316", "\u5355\u4efb\u52a1Critic\u5728LIBERO\u64cd\u4f5c\u4efb\u52a1\u4e0a\u5c06\u6210\u529f\u7387\u4ece68%\u63d0\u5347\u81f382%\uff0c\u591a\u4efb\u52a1Critic\u5c06\u9a8c\u8bc1\u6210\u529f\u7387\u4ece46%\u63d0\u5347\u81f356%", "Critic\u6cdb\u5316\u80fd\u529b\u4e0d\u8db3\u4e0e\u4e0d\u786e\u5b9a\u6027\u611f\u77e5\u5f15\u5bfc\u662f\u5f53\u524d\u4e3b\u8981\u74f6\u9888\uff0c\u6d4b\u8bd5\u96c6\u63d0\u5347\u76f8\u5bf9\u6709\u9650\uff0865%\u219267.5%\uff09"], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u6d41\u5339\u914d", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02092v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Guided Action Flow: Q-Guided Inference for Flow-Matching Vision-Language-Action Policies", "tldr": "\u7528Q\u503c\u5f15\u5bfc\u51bb\u7ed3\u6d41\u5339\u914dVLA\u7b56\u7565\u7684\u63a8\u7406\uff0c\u65e0\u9700\u91cd\u8bad\u7ec3\u5373\u53ef\u63d0\u5347\u673a\u5668\u4eba\u64cd\u4f5c\u6210\u529f\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faGuided Action Flow\u6846\u67b6\uff0c\u5728\u63a8\u7406\u9636\u6bb5\u5229\u7528\u5b66\u4e60\u5230\u7684\u52a8\u4f5c\u5757\u8bc4\u4ef7\u51fd\u6570\uff08critic\uff09\u901a\u8fc7\u68af\u5ea6\u5f15\u5bfc\u51bb\u7ed3\u7684SmolVLA\u6d41\u5339\u914d\u7b56\u7565\u91c7\u6837\uff0c\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u57fa\u7840\u7b56\u7565\u5373\u53ef\u63d0\u5347\u673a\u5668\u4eba\u64cd\u4f5c\u6027\u80fd\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u5728\u6d41\u5339\u914dVLA\u7b56\u7565\u4e0a\u8fdb\u884c\u63a8\u7406\u65f6Q\u503c\u5f15\u5bfc\u7684\u53ef\u884c\u6027\uff0c\u63d0\u4f9b\u4e86\u4e00\u79cd\u65e0\u9700\u91cd\u8bad\u7ec3\u5373\u53ef\u63d0\u5347\u9884\u8bad\u7ec3\u673a\u5668\u4eba\u7b56\u7565\u6027\u80fd\u7684\u8f7b\u91cf\u5316\u65b9\u6cd5\uff0c\u5bf9\u90e8\u7f72\u9636\u6bb5\u7b56\u7565\u4f18\u5316\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Visual regression testing (VRT) is a standard quality assurance step in modern software release pipelines. On every change, it re-renders user interface (UI) screenshots, compares each one against an approved baseline image, and routes any detected difference to a human reviewer who decides whether it is an intended update or an unintended regression. A widely used approach, especially in open-source and continuous-integration pipelines, is pixel-level comparison, which is semantically blind and treats rendering noise and genuine defects identically, producing large volumes of false positives that force developers and testers to spend substantial time and effort manually reviewing flagged differences at every release cycle. Industry tools apply machine learning to VRT, but lack public evaluation. More critically, no dataset or benchmark exists to support natural language descriptions of UI changes, a capability that tells testers what changed in words instead of leaving them to interpret a binary flag or a highlighted region. To address the gap, we propose a new task, Web UI Image Change Captioning (WUICC), which sits at the intersection of VRT and image difference captioning (IDC), and release WUICC-bench, its first dataset and benchmark for the task. We evaluate eleven representative IDC methods, together with two zero-shot general-purpose LLMs. We find that: (1) these methods tend to struggle in the Web UI domain due to its layout diversity, dense text, and fine-grained changes, and (2) yet the trained methods already suppress non-meaningful visual noise far more selectively than the pixel-level comparison VRT relies on, providing a solid foundation for future domain-specific research.", "arxiv_id": "2607.01728", "arxiv_url": "https://arxiv.org/abs/2607.01728", "authors": ["Licheng Zhang", "Bach Le", "Pengtao Zhao", "Naveed Akhtar"], "brief": "\u8bba\u6587\u63d0\u51fa\u4e86Web UI\u56fe\u50cf\u53d8\u66f4\u63cf\u8ff0\uff08WUICC\uff09\u65b0\u4efb\u52a1\u53ca\u9996\u4e2a\u914d\u5957\u6570\u636e\u96c6WUICC-bench\uff0c\u65e8\u5728\u7528\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0UI\u622a\u56fe\u53d8\u5316\uff0c\u66ff\u4ee3\u4f20\u7edf\u50cf\u7d20\u7ea7\u6bd4\u8f83\u5728\u89c6\u89c9\u56de\u5f52\u6d4b\u8bd5\u4e2d\u7684\u8bed\u4e49\u76f2\u533a\u3002", "categories": ["cs.CV", "cs.CL", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01728", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u8bc4\u4f30\u4e8611\u79cd\u56fe\u50cf\u5dee\u5f02\u63cf\u8ff0\u65b9\u6cd5\u53ca2\u4e2a\u96f6\u6837\u672c\u901a\u7528LLM\uff0c\u53d1\u73b0\u73b0\u6709\u65b9\u6cd5\u5728Web UI\u9886\u57df\u56e0\u5e03\u5c40\u591a\u6837\u3001\u6587\u5b57\u5bc6\u96c6\u3001\u7ec6\u7c92\u5ea6\u53d8\u5316\u800c\u8868\u73b0\u6b20\u4f73", "\u5df2\u8bad\u7ec3\u65b9\u6cd5\u76f8\u6bd4\u50cf\u7d20\u7ea7\u6bd4\u8f83\u80fd\u66f4\u6709\u9009\u62e9\u6027\u5730\u8fc7\u6ee4\u65e0\u610f\u4e49\u89c6\u89c9\u566a\u58f0\uff0c\u51cf\u5c11\u8bef\u62a5", "\u53d1\u5e03WUICC-bench\u4f5c\u4e3a\u8be5\u4efb\u52a1\u7684\u9996\u4e2a\u516c\u5f00\u6570\u636e\u96c6\u4e0e\u8bc4\u6d4b\u57fa\u51c6\uff0c\u586b\u8865\u4e86VRT\u9886\u57df\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u80fd\u529b\u7684\u7a7a\u767d"], "keywords": ["\u591a\u6a21\u6001", "\u57fa\u51c6\u8bc4\u6d4b", "\u8f6f\u4ef6\u6d4b\u8bd5", "\u56fe\u50cf\u63cf\u8ff0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01728v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Beyond Pixel Diffs: Benchmarking Image Change Captioning for Web UI Visual Regression Testing", "tldr": "\u63d0\u51faWeb UI\u56fe\u50cf\u53d8\u66f4\u63cf\u8ff0\u4efb\u52a1\u4e0e\u57fa\u51c6\uff0c\u7528\u81ea\u7136\u8bed\u8a00\u66ff\u4ee3\u50cf\u7d20\u5dee\u5f02\u6807\u8bb0\u8f85\u52a9\u89c6\u89c9\u56de\u5f52\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u4e86Web UI\u56fe\u50cf\u53d8\u66f4\u63cf\u8ff0\uff08WUICC\uff09\u65b0\u4efb\u52a1\u53ca\u9996\u4e2a\u914d\u5957\u6570\u636e\u96c6WUICC-bench\uff0c\u65e8\u5728\u7528\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0UI\u622a\u56fe\u53d8\u5316\uff0c\u66ff\u4ee3\u4f20\u7edf\u50cf\u7d20\u7ea7\u6bd4\u8f83\u5728\u89c6\u89c9\u56de\u5f52\u6d4b\u8bd5\u4e2d\u7684\u8bed\u4e49\u76f2\u533a\u3002", "why_notable": "\u9996\u6b21\u5c06\u56fe\u50cf\u5dee\u5f02\u63cf\u8ff0\u4e0eWeb UI\u89c6\u89c9\u56de\u5f52\u6d4b\u8bd5\u7ed3\u5408\uff0c\u63d0\u4f9b\u516c\u5f00\u57fa\u51c6\uff0c\u6709\u671b\u5927\u5e45\u964d\u4f4e\u5f00\u53d1\u8005\u4eba\u5de5\u5ba1\u67e5\u6210\u672c\uff0c\u5bf9\u8f6f\u4ef6\u5de5\u7a0b\u4e0e\u8ba1\u7b97\u673a\u89c6\u89c9\u4ea4\u53c9\u9886\u57df\u5177\u6709\u5b9e\u9645\u5e94\u7528\u4ef7\u503c\u3002"}, {"abstract": "Autonomous agents are increasingly expected to improve executable policies through feedback, yet existing evaluations often collapse this process into a final score or confound it with open-ended software-engineering progress. We introduce Autonomous Policy Evolution, a controlled evaluation setting in which a harness-model agent repeatedly edits an executable policy system under a fixed interaction budget. We instantiate this setting in EvoPolicyGym, a benchmark built from compact interactive RL environments that evaluates how agents iteratively improve explored policies. On the EvoPolicyGym suite, GPT-5.5 achieves the strongest aggregate rank score and top-two performance on all 16 environments. Beyond leaderboard results, EvoPolicyGym also provides trajectory-level diagnostics that distinguish how agents allocate budget, convert feedback into parametric tuning. These analyses show that strong autonomous policy evolution depends not only on isolated task wins, but on discovering task-appropriate mechanisms and refining policies under bounded feedback.", "arxiv_id": "2607.02440", "arxiv_url": "https://arxiv.org/abs/2607.02440", "authors": ["Zhilin Wang", "Han Song", "Runzhe Zhan", "Jusen Du", "Jiacheng Chen", "Tianle Li", "Qingyu Yin", "Yulun Wu", "Zhennan Shen", "Tong Zhu", "Yanshu Li", "Guanjie Chen", "Derek F. Wong", "Yafu Li", "Yu Cheng", "Yang Yang"], "brief": "\u63d0\u51faEvoPolicyGym\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u56fa\u5b9a\u4ea4\u4e92\u9884\u7b97\u4e0b\u81ea\u4e3b\u8fed\u4ee3\u6539\u8fdb\u53ef\u6267\u884c\u7b56\u7565\u7684\u80fd\u529b\u3002\u8be5\u57fa\u51c6\u57fa\u4e8e\u7d27\u51d1\u578b\u4ea4\u4e92\u5f0f\u5f3a\u5316\u5b66\u4e60\u73af\u5883\uff0c\u63d0\u4f9b\u8f68\u8ff9\u7ea7\u8bca\u65ad\u5206\u6790\uff0c\u63ed\u793a\u667a\u80fd\u4f53\u5982\u4f55\u5206\u914d\u9884\u7b97\u5e76\u5c06\u53cd\u9988\u8f6c\u5316\u4e3a\u53c2\u6570\u8c03\u4f18\u3002\u5b9e\u9a8c\u8868\u660eGPT-4.5\u5728\u5168\u90e816\u4e2a\u73af\u5883\u4e2d\u53d6\u5f97\u6700\u5f3a\u7efc\u5408\u6392\u540d\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02440", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u7b56\u7565\u4f18\u5316", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02440v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "EvoPolicyGym: Evaluating Autonomous Policy Evolution in Interactive Environments", "tldr": "\u63d0\u51faEvoPolicyGym\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u56fa\u5b9a\u4ea4\u4e92\u9884\u7b97\u4e0b\u81ea\u4e3b\u8fed\u4ee3\u6539\u8fdb\u53ef\u6267\u884c\u7b56\u7565\u7684\u80fd\u529b\u3002\u8be5\u57fa\u51c6\u57fa\u4e8e\u7d27\u51d1\u578b\u4ea4\u4e92\u5f0f\u5f3a\u5316\u5b66\u4e60\u73af\u5883\uff0c\u63d0\u4f9b\u8f68\u8ff9\u7ea7\u8bca\u65ad\u5206\u6790\uff0c\u63ed\u793a\u667a\u80fd\u4f53\u5982\u4f55\u5206\u914d\u9884\u7b97\u5e76\u5c06\u53cd\u9988\u8f6c\u5316\u4e3a\u53c2\u6570\u8c03\u4f18\u3002\u5b9e\u9a8c\u8868\u660eGPT-4.5\u5728\u5168\u90e816\u4e2a\u73af\u5883\u4e2d\u53d6\u5f97\u6700\u5f3a\u7efc\u5408\u6392\u540d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Agentic coding assistants are increasingly given extra capabilities, such as browser based testing tools and design oriented system prompts, on the assumption that more capability yields better software. This study tested that assumption directly. Ninety independent agent runs built the same application, a real time retrospective board, from one detailed specification, each scored on a fixed 14 criterion functional rubric (42 point maximum) and a visual quality review. The runs spanned several model generations, two agent harnesses, two reasoning effort levels, a testing tool, and two design oriented prompts. Capability tier dominated: frontier models clustered near the ceiling while a low cost local model fell to 24 to 37 points. A criterion level analysis revealed what run totals conceal. Container deployment was the dominant defect, failing first try in 44 percent of runs, with its failure rate shifting sharply across model generations while mean totals moved less than a point. The testing tool raised cost by 42 to 68 percent without improving functional score or reliability, even on interface visible criteria. Raising reasoning effort from High to xHigh lifted first try perfect runs from 28 percent to 89 percent and cut corrective prompts about five fold, for 9 to 29 percent more cost. A design oriented prompt raised visual quality, 4.5 versus 3.0 on a 5 point scale, without lifting function, and a one paragraph paraphrase of its directive reproduced the entire lift. The practical lesson is to match the fix to the failure: most first run failures came from weak reasoning, which a stronger model or more effort prevents, not from visible flaws a checking tool would catch.", "arxiv_id": "2607.02436", "arxiv_url": "https://arxiv.org/abs/2607.02436", "authors": ["Achint Mehta"], "brief": "\u901a\u8fc790\u6b21\u72ec\u7acb\u667a\u80fd\u4f53\u7f16\u7a0b\u5b9e\u9a8c\uff0c\u7814\u7a76\u53d1\u73b0\u63d0\u5347\u63a8\u7406\u5f3a\u5ea6\uff08\u800c\u975e\u589e\u52a0\u5de5\u5177\u8bbf\u95ee\u6743\u9650\uff09\u624d\u662f\u63d0\u9ad8\u9996\u6b21\u6210\u529f\u7387\u7684\u5173\u952e\uff1a\u5c06\u63a8\u7406\u7b49\u7ea7\u4eceHigh\u63d0\u5347\u81f3xHigh\u4f7f\u5b8c\u7f8e\u9996\u6b21\u8fd0\u884c\u7387\u4ece28%\u8dc3\u5347\u81f389%\uff0c\u800c\u6d4b\u8bd5\u5de5\u5177\u5728\u589e\u52a042-68%\u6210\u672c\u7684\u540c\u65f6\u5e76\u672a\u6539\u5584\u529f\u80fd\u5f97\u5206\u3002\u524d\u6cbf\u6a21\u578b\u80fd\u529b\u5c42\u7ea7\u662f\u51b3\u5b9a\u6027\u56e0\u7d20\uff0c\u8bbe\u8ba1\u5bfc\u5411\u63d0\u793a\u8bcd\u53ef\u63d0\u5347\u89c6\u89c9\u8d28\u91cf\u4f46\u4e0d\u5f71\u54cd\u529f\u80fd\u8868\u73b0\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02436", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u63a8\u7406\u80fd\u529b", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02436v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Reasoning effort, not tool access, buys first-try reliability in agentic code generation: an observational study", "tldr": "\u901a\u8fc790\u6b21\u72ec\u7acb\u667a\u80fd\u4f53\u7f16\u7a0b\u5b9e\u9a8c\uff0c\u7814\u7a76\u53d1\u73b0\u63d0\u5347\u63a8\u7406\u5f3a\u5ea6\uff08\u800c\u975e\u589e\u52a0\u5de5\u5177\u8bbf\u95ee\u6743\u9650\uff09\u624d\u662f\u63d0\u9ad8\u9996\u6b21\u6210\u529f\u7387\u7684\u5173\u952e\uff1a\u5c06\u63a8\u7406\u7b49\u7ea7\u4eceHigh\u63d0\u5347\u81f3xHigh\u4f7f\u5b8c\u7f8e\u9996\u6b21\u8fd0\u884c\u7387\u4ece28%\u8dc3\u5347\u81f389%\uff0c\u800c\u6d4b\u8bd5\u5de5\u5177\u5728\u589e\u52a042-68%\u6210\u672c\u7684\u540c\u65f6\u5e76\u672a\u6539\u5584\u529f\u80fd\u5f97\u5206\u3002\u524d\u6cbf\u6a21\u578b\u80fd\u529b\u5c42\u7ea7\u662f\u51b3\u5b9a\u6027\u56e0\u7d20\uff0c\u8bbe\u8ba1\u5bfc\u5411\u63d0\u793a\u8bcd\u53ef\u63d0\u5347\u89c6\u89c9\u8d28\u91cf\u4f46\u4e0d\u5f71\u54cd\u529f\u80fd\u8868\u73b0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Coding agents are capable; human oversight is the bottleneck. Unconstrained agents introduce security risks, erode codebase scalability, and make human review increasingly costly. We argue that the same methods used for decades to manage large human engineering teams: access control, network policies, strict coding conventions enforced by tooling; transfer directly to coding agents, and are cheaper (in token) than recent agentic scaffolding. We sketch a start-to-end system on this principle, and report a controlled experiment in scalable oversight: a small reviewer (Gemma 4 e4b) inspects a Python codebase containing 11 inserted backdoors. Recall rises from 54.5% (unconstrained, no tools) to 90.9% (constrained substrate plus a ~200-LoC `docs` CLI), with substrate and tools contributing independently. We choose Python deliberately: substrate-level oversight gains are largest where the language gives the fewest guarantees by default; the principles extend to languages like Rust.", "arxiv_id": "2607.02389", "arxiv_url": "https://arxiv.org/abs/2607.02389", "authors": ["Thomas Winninger"], "brief": "\u63d0\u51fa\u901a\u8fc7\u8bbf\u95ee\u63a7\u5236\u3001\u7f51\u7edc\u7b56\u7565\u548c\u7f16\u7801\u89c4\u8303\u7b49\u7ea6\u675f\u673a\u5236\u6765\u76d1\u7763\u7f16\u7a0b\u667a\u80fd\u4f53\uff0c\u5b9e\u9a8c\u8868\u660e\u5728\u53d7\u7ea6\u675f\u73af\u5883\u4e0b\u5c0f\u578b\u5ba1\u67e5\u6a21\u578b\uff08Gemma 4 4B\uff09\u5bf9\u540e\u95e8\u4ee3\u7801\u7684\u68c0\u51fa\u7387\u4ece54.5%\u63d0\u5347\u81f390.9%\uff0c\u4e14\u7ea6\u675f\u57fa\u5e95\u4e0e\u5de5\u5177\u5404\u81ea\u72ec\u7acb\u8d21\u732e\u6548\u679c\u3002", "categories": ["cs.AI", "cs.CR", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02389", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u53ef\u6269\u5c55\u76d1\u7763", "\u4ee3\u7801\u5b89\u5168", "\u7ea6\u675f\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02389v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Steerability via constraints: a substrate for scalable oversight of coding agents", "tldr": "\u63d0\u51fa\u901a\u8fc7\u8bbf\u95ee\u63a7\u5236\u3001\u7f51\u7edc\u7b56\u7565\u548c\u7f16\u7801\u89c4\u8303\u7b49\u7ea6\u675f\u673a\u5236\u6765\u76d1\u7763\u7f16\u7a0b\u667a\u80fd\u4f53\uff0c\u5b9e\u9a8c\u8868\u660e\u5728\u53d7\u7ea6\u675f\u73af\u5883\u4e0b\u5c0f\u578b\u5ba1\u67e5\u6a21\u578b\uff08Gemma 4 4B\uff09\u5bf9\u540e\u95e8\u4ee3\u7801\u7684\u68c0\u51fa\u7387\u4ece54.5%\u63d0\u5347\u81f390.9%\uff0c\u4e14\u7ea6\u675f\u57fa\u5e95\u4e0e\u5de5\u5177\u5404\u81ea\u72ec\u7acb\u8d21\u732e\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent advances in agentic AI are producing increasingly complex autonomous systems that integrate large language models, world models, optimization engines, specialized neural architectures, autonomous platforms, and human operators. While much current research focuses on improving reasoning capabilities, safety-critical real-time deployment also requires bounded and verifiable coordination among heterogeneous components operating concurrently under uncertainty. Software-mediated coordination presents fundamental limitations in domains where bounded latency, deterministic coordination, and enforceable safety guarantees are essential. Hence, we propose a hardware-enforced semantic coordination architecture in which selected coordination semantics are implemented directly at the hardware level via field-programmable gate arrays (FPGAs). The approach builds on the Topic-Based Communication Space Petri Net (TB-CSPN) framework, which separates semantic reasoning from interaction management. In this approach, selected TB-CSPN coordination mechanisms are mapped onto FPGA primitives, creating a hardware-native semantic coordination layer. Focus is not on acceleration, but on enforcing temporal synchronization, semantic gating, authorization constraints, and bounded coordination behavior directly in hardware. Semantic reasoning remains adaptive and software-driven, while embedded coordination semantics become deterministic.", "arxiv_id": "2607.02376", "arxiv_url": "https://arxiv.org/abs/2607.02376", "authors": ["Uwe M. Borghoff", "Paolo Bottoni", "Remo Pareschi"], "brief": "\u9488\u5bf9\u5b89\u5168\u5173\u952e\u5b9e\u65f6\u81ea\u4e3b\u7cfb\u7edf\u4e2d\u8f6f\u4ef6\u534f\u8c03\u7684\u5c40\u9650\u6027\uff0c\u63d0\u51fa\u57fa\u4e8eFPGA\u7684\u786c\u4ef6\u5f3a\u5236\u8bed\u4e49\u534f\u8c03\u67b6\u6784\uff0c\u5c06TB-CSPN\u534f\u8c03\u673a\u5236\u76f4\u63a5\u6620\u5c04\u5230\u786c\u4ef6\u539f\u8bed\uff0c\u5b9e\u73b0\u786e\u5b9a\u6027\u7684\u65f6\u5e8f\u540c\u6b65\u3001\u8bed\u4e49\u95e8\u63a7\u548c\u6388\u6743\u7ea6\u675f\uff0c\u540c\u65f6\u4fdd\u6301\u8f6f\u4ef6\u5c42\u7684\u81ea\u9002\u5e94\u8bed\u4e49\u63a8\u7406\u80fd\u529b\u3002", "categories": ["cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02376", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u4e3b\u7cfb\u7edf", "\u5b89\u5168\u5173\u952e\u7cfb\u7edf", "\u786c\u4ef6\u52a0\u901f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02376v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Hardware-Enforced Semantic Coordination for Safety-Critical Real-Time Autonomous Systems", "tldr": "\u9488\u5bf9\u5b89\u5168\u5173\u952e\u5b9e\u65f6\u81ea\u4e3b\u7cfb\u7edf\u4e2d\u8f6f\u4ef6\u534f\u8c03\u7684\u5c40\u9650\u6027\uff0c\u63d0\u51fa\u57fa\u4e8eFPGA\u7684\u786c\u4ef6\u5f3a\u5236\u8bed\u4e49\u534f\u8c03\u67b6\u6784\uff0c\u5c06TB-CSPN\u534f\u8c03\u673a\u5236\u76f4\u63a5\u6620\u5c04\u5230\u786c\u4ef6\u539f\u8bed\uff0c\u5b9e\u73b0\u786e\u5b9a\u6027\u7684\u65f6\u5e8f\u540c\u6b65\u3001\u8bed\u4e49\u95e8\u63a7\u548c\u6388\u6743\u7ea6\u675f\uff0c\u540c\u65f6\u4fdd\u6301\u8f6f\u4ef6\u5c42\u7684\u81ea\u9002\u5e94\u8bed\u4e49\u63a8\u7406\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "As Large Language Models (LLMs) and agentic systems become integrated into real-world applications, ensuring their safety and security is critical. Guardrail systems that detect and block malicious instructions sent to and from an LLM are an essential component of AI security. However, researchers conducting black-box adversarial emulation against production AI systems often struggle to determine whether a guardrail block or an LLM rejection has occurred. This distinction is important because the techniques used to bypass guardrails can differ substantially from those used to bypass LLM safety alignment, and has a material impact on attack technique selection and optimization. We propose the first black-box guardrail reconnaissance methodology, which detects the presence of a guardrail within a target AI system through behavioral monitoring of HTTP, lexical, and timing signals, assuming only black-box access and zero prior knowledge of the guardrail or AI system. Experiments demonstrate that our approach detects guardrail presence with 100% accuracy, with statistically significant behavioral separation between benign and malicious interactions (q \u003c 0.001). Our approach further identifies the content categories a guardrail is designed to block, and distinguishes guardrail blocks from LLM rejection on unseen prompts with an average F1 score of 98%.", "arxiv_id": "2607.02121", "arxiv_url": "https://arxiv.org/abs/2607.02121", "authors": ["William Hackett", "Peter Garraghan"], "brief": "\u63d0\u51fa\u9996\u4e2a\u9ed1\u76d2\u62a4\u680f\u4fa6\u5bdf\u65b9\u6cd5\uff0c\u901a\u8fc7\u76d1\u6d4bHTTP\u3001\u8bcd\u6cd5\u548c\u65f6\u5e8f\u884c\u4e3a\u4fe1\u53f7\uff0c\u5728\u96f6\u5148\u9a8c\u77e5\u8bc6\u6761\u4ef6\u4e0b\u68c0\u6d4bAI\u7cfb\u7edf\u4e2d\u62a4\u680f\u7684\u5b58\u5728\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u4ee5100%\u51c6\u786e\u7387\u68c0\u6d4b\u62a4\u680f\u5b58\u5728\uff0c\u5e76\u80fd\u4ee5\u5e73\u5747F1\u5206\u657098%\u533a\u5206\u62a4\u680f\u62e6\u622a\u4e0eLLM\u81ea\u8eab\u62d2\u7edd\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02121", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u9632\u62a4", "\u5bf9\u6297\u653b\u51fb", "\u9ed1\u76d2\u68c0\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02121v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Behind the Refusal: Determining Guardrail Activation via Behavioral Monitoring", "tldr": "\u63d0\u51fa\u9996\u4e2a\u9ed1\u76d2\u62a4\u680f\u4fa6\u5bdf\u65b9\u6cd5\uff0c\u901a\u8fc7\u76d1\u6d4bHTTP\u3001\u8bcd\u6cd5\u548c\u65f6\u5e8f\u884c\u4e3a\u4fe1\u53f7\uff0c\u5728\u96f6\u5148\u9a8c\u77e5\u8bc6\u6761\u4ef6\u4e0b\u68c0\u6d4bAI\u7cfb\u7edf\u4e2d\u62a4\u680f\u7684\u5b58\u5728\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u4ee5100%\u51c6\u786e\u7387\u68c0\u6d4b\u62a4\u680f\u5b58\u5728\uff0c\u5e76\u80fd\u4ee5\u5e73\u5747F1\u5206\u657098%\u533a\u5206\u62a4\u680f\u62e6\u622a\u4e0eLLM\u81ea\u8eab\u62d2\u7edd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In recent years, it has become increasingly evident that large language models (LLMs) and autonomous agents raise the level of abstraction in software development by shifting the focus from writing precise procedures to expressing intents and goals. This paradigm shift introduces new challenges, particularly in how testing should be guided when prompts, rather than code, become primary development artifacts. To address this challenge, we propose Prompt Coverage Adequacy, a novel coverage criterion designed to support the testing of code generated from task descriptions. Prompt Coverage Adequacy serves as an analog to traditional code coverage, but operates at the level of prompts used in LLM and agent-based programming. Specifically, it measures how well a given test suite satisfies the requirements expressed in a prompt by leveraging the attention mechanisms of LLMs. We evaluate a simple instantiation of this criterion, based on attention boosting, across two datasets and multiple LLMs. Our results demonstrate that Prompt Coverage is associated with fault-detection effectiveness and can uncover over 30+% more faults than traditional code coverage when used to guide test generation. These findings suggest that Prompt Coverage Adequacy can serve as a foundation for developing testing metrics better suited to the emerging paradigm of LLM-driven software development, addressing the limitations of classical coverage criteria in this new context.", "arxiv_id": "2607.02057", "arxiv_url": "https://arxiv.org/abs/2607.02057", "authors": ["Florian Tambon", "Michael Konstantinou", "Cedric Richter", "Charles Chenouard", "Mark Harman", "Mike Papadakis"], "brief": "\u63d0\u51fa\u300c\u63d0\u793a\u8986\u76d6\u5145\u5206\u6027\u300d\u8fd9\u4e00\u65b0\u578b\u6d4b\u8bd5\u8986\u76d6\u51c6\u5219\uff0c\u9488\u5bf9\u4ee5\u63d0\u793a\u8bcd\u800c\u975e\u4ee3\u7801\u4e3a\u4e3b\u8981\u5f00\u53d1\u4ea7\u7269\u7684LLM/\u667a\u80fd\u4f53\u7f16\u7a0b\u8303\u5f0f\u3002\u8be5\u51c6\u5219\u5229\u7528LLM\u6ce8\u610f\u529b\u673a\u5236\u8861\u91cf\u6d4b\u8bd5\u5957\u4ef6\u5bf9\u63d0\u793a\u8bcd\u9700\u6c42\u7684\u6ee1\u8db3\u7a0b\u5ea6\uff0c\u5b9e\u9a8c\u8868\u660e\u5176\u6bd4\u4f20\u7edf\u4ee3\u7801\u8986\u76d6\u7387\u591a\u53d1\u73b030%\u4ee5\u4e0a\u7684\u7f3a\u9677\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02057", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8f6f\u4ef6\u6d4b\u8bd5", "\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02057v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Prompt Coverage Adequacy", "tldr": "\u63d0\u51fa\u300c\u63d0\u793a\u8986\u76d6\u5145\u5206\u6027\u300d\u8fd9\u4e00\u65b0\u578b\u6d4b\u8bd5\u8986\u76d6\u51c6\u5219\uff0c\u9488\u5bf9\u4ee5\u63d0\u793a\u8bcd\u800c\u975e\u4ee3\u7801\u4e3a\u4e3b\u8981\u5f00\u53d1\u4ea7\u7269\u7684LLM/\u667a\u80fd\u4f53\u7f16\u7a0b\u8303\u5f0f\u3002\u8be5\u51c6\u5219\u5229\u7528LLM\u6ce8\u610f\u529b\u673a\u5236\u8861\u91cf\u6d4b\u8bd5\u5957\u4ef6\u5bf9\u63d0\u793a\u8bcd\u9700\u6c42\u7684\u6ee1\u8db3\u7a0b\u5ea6\uff0c\u5b9e\u9a8c\u8868\u660e\u5176\u6bd4\u4f20\u7edf\u4ee3\u7801\u8986\u76d6\u7387\u591a\u53d1\u73b030%\u4ee5\u4e0a\u7684\u7f3a\u9677\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) are often asked to produce JSON conforming to a fixed schema, powering information extraction, tool calling, agentic planning, and knowledge-graph construction. Measuring how closely an output matches a gold reference is essential yet surprisingly hard: exact match is brittle, text similarity ignores structure, and an LLM judge is expensive, opaque, and non-deterministic. We address this with Object Aligner (OA), an open-source Python library that scores two JSON objects deterministically by recursively aligning their trees (the Hungarian algorithm for unordered collections, sequence alignment for ordered ones) and awarding partial credit at the granularity the schema declares. The Object Aligner is configured entirely through a set of JSON Schema extensions, so adapting it to a new task involves annotating a schema rather than writing code. Complex structured data, however, are rarely flat trees: records may form graphs or hypergraphs keyed by arbitrary identifiers, breaking the assumptions of prior similarity metrics. Our central contribution, referential alignment, closes this gap by inferring a bijection between gold and candidate identifiers and scoring every reference through it, so the score is invariant to relabeling. Since recovering this bijection exactly is graph isomorphism, the Object Aligner approximates it with Weisfeiler-Leman color refinement. An order-sensitive sequence regime targets ranking and planning. Since the same alignment localizes every mismatch, the Object Aligner emits ranked repair suggestions at no extra cost. Used as a reward inside the GEPA prompt optimizer, Object Aligner helps or stays neutral across all datasets.", "arxiv_id": "2607.01972", "arxiv_url": "https://arxiv.org/abs/2607.01972", "authors": ["Jan Drchal"], "brief": "\u63d0\u51faObject Aligner\uff08OA\uff09\uff0c\u4e00\u4e2a\u5f00\u6e90Python\u5e93\uff0c\u901a\u8fc7\u9012\u5f52\u5bf9\u9f50JSON\u6811\u7ed3\u6784\uff08\u4f7f\u7528\u5308\u7259\u5229\u7b97\u6cd5\u548c\u5e8f\u5217\u5bf9\u9f50\uff09\u6765\u786e\u5b9a\u6027\u5730\u8bc4\u5206LLM\u8f93\u51fa\u4e0e\u53c2\u8003\u7b54\u6848\u7684\u76f8\u4f3c\u5ea6\u3002\u6838\u5fc3\u8d21\u732e\u662f\"\u5f15\u7528\u5bf9\u9f50\"\u673a\u5236\uff0c\u5229\u7528Weisfeiler-Leman\u989c\u8272\u7ec6\u5316\u8fd1\u4f3c\u56fe\u540c\u6784\uff0c\u89e3\u51b3\u4e86\u56fe/\u8d85\u56fe\u7ed3\u6784\u4e2d\u6807\u8bc6\u7b26\u91cd\u6807\u8bb0\u5bfc\u81f4\u8bc4\u5206\u4e0d\u7a33\u5b9a\u7684\u95ee\u9898\u3002\u5c06\u5176\u4f5c\u4e3a\u5956\u52b1\u4fe1\u53f7\u7528\u4e8eGEPA\u63d0\u793a\u4f18\u5316\u5668\u65f6\uff0c\u5728\u6240\u6709\u6570\u636e\u96c6\u4e0a\u8868\u73b0\u6301\u5e73\u6216\u6709\u6240\u63d0\u5347\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01972", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "JSON\u7ed3\u6784\u8bc4\u4f30", "\u63d0\u793a\u4f18\u5316", "\u56fe\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01972v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Object Aligner: A Configurable JSON Schema Similarity Score for Graphs, Applied to LLM Prompt Optimization", "tldr": "\u63d0\u51faObject Aligner\uff08OA\uff09\uff0c\u4e00\u4e2a\u5f00\u6e90Python\u5e93\uff0c\u901a\u8fc7\u9012\u5f52\u5bf9\u9f50JSON\u6811\u7ed3\u6784\uff08\u4f7f\u7528\u5308\u7259\u5229\u7b97\u6cd5\u548c\u5e8f\u5217\u5bf9\u9f50\uff09\u6765\u786e\u5b9a\u6027\u5730\u8bc4\u5206LLM\u8f93\u51fa\u4e0e\u53c2\u8003\u7b54\u6848\u7684\u76f8\u4f3c\u5ea6\u3002\u6838\u5fc3\u8d21\u732e\u662f\"\u5f15\u7528\u5bf9\u9f50\"\u673a\u5236\uff0c\u5229\u7528Weisfeiler-Leman\u989c\u8272\u7ec6\u5316\u8fd1\u4f3c\u56fe\u540c\u6784\uff0c\u89e3\u51b3\u4e86\u56fe/\u8d85\u56fe\u7ed3\u6784\u4e2d\u6807\u8bc6\u7b26\u91cd\u6807\u8bb0\u5bfc\u81f4\u8bc4\u5206\u4e0d\u7a33\u5b9a\u7684\u95ee\u9898\u3002\u5c06\u5176\u4f5c\u4e3a\u5956\u52b1\u4fe1\u53f7\u7528\u4e8eGEPA\u63d0\u793a\u4f18\u5316\u5668\u65f6\uff0c\u5728\u6240\u6709\u6570\u636e\u96c6\u4e0a\u8868\u73b0\u6301\u5e73\u6216\u6709\u6240\u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Learning causal models from high-dimensional data is a significant challenge, particularly in real-world settings where violations of core assumptions lead to causal identifiability issues. Although massive amounts of prior knowledge are available, and contain valuable causal information, effectively integrating this knowledge into the causal discovery process remains an open problem. We introduce CausalSTeward (CAST), a novel human-in-the-loop framework for interactively assembling large causal models. CausalSteward is a multi-agent collaborative system that tackles high-dimensional causality through a divide-and-conquer approach where large clusters of variables are iteratively partitioned and then separately analyzed. Our framework fuses prior knowledge with a data-driven approach by using tailored tools such as retrieval augmented generation and conditional independence tests. Finally, we use this work to examine the capabilities and limitations of causal reasoning in multi-agent frameworks, and how the human-in-the-loop can contribute to accurate and trustworthy results.", "arxiv_id": "2607.01936", "arxiv_url": "https://arxiv.org/abs/2607.01936", "authors": ["Nicholas Tagliapietra", "Gian Lorenzo Marchioni", "Moritz Willig", "Juergen Luettin", "Lavdim Halilaj", "Kristian Kersting"], "brief": "\u63d0\u51faCausalSteward\uff08CAST\uff09\uff0c\u4e00\u4e2a\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7684\u56e0\u679c\u53d1\u73b0\u6846\u67b6\uff0c\u91c7\u7528\u5206\u6cbb\u7b56\u7565\u5c06\u9ad8\u7ef4\u53d8\u91cf\u96c6\u8fed\u4ee3\u5212\u5206\u5e76\u5206\u522b\u5206\u6790\uff0c\u878d\u5408\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u4e0e\u6761\u4ef6\u72ec\u7acb\u6027\u68c0\u9a8c\u7b49\u5de5\u5177\uff0c\u5e76\u5f15\u5165\u4eba\u673a\u534f\u4f5c\u673a\u5236\u4ee5\u63d0\u5347\u56e0\u679c\u6a21\u578b\u7684\u51c6\u786e\u6027\u4e0e\u53ef\u4fe1\u5ea6\u3002", "categories": ["cs.MA", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01936", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u56e0\u679c\u53d1\u73b0", "\u4eba\u673a\u534f\u4f5c", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01936v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "CausalSteward: An Agentic Divide-Conquer-Combine Copilot for Causal Discovery", "tldr": "\u63d0\u51faCausalSteward\uff08CAST\uff09\uff0c\u4e00\u4e2a\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7684\u56e0\u679c\u53d1\u73b0\u6846\u67b6\uff0c\u91c7\u7528\u5206\u6cbb\u7b56\u7565\u5c06\u9ad8\u7ef4\u53d8\u91cf\u96c6\u8fed\u4ee3\u5212\u5206\u5e76\u5206\u522b\u5206\u6790\uff0c\u878d\u5408\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u4e0e\u6761\u4ef6\u72ec\u7acb\u6027\u68c0\u9a8c\u7b49\u5de5\u5177\uff0c\u5e76\u5f15\u5165\u4eba\u673a\u534f\u4f5c\u673a\u5236\u4ee5\u63d0\u5347\u56e0\u679c\u6a21\u578b\u7684\u51c6\u786e\u6027\u4e0e\u53ef\u4fe1\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Agentic systems enhance their capabilities by invoking external tools and maintaining persistent memory. However, these external dependencies introduce novel attack surfaces. Recent tool and memory poisoning attacks show that maliciously crafted tool descriptors and poisoned memory can covertly bias agent behavior. These threats reflect a deeper issue: the lack of verifiable continuity in the agent\u0027s contextual state for planning and execution. We present ElephantAgent, a protocol that enforces Contextual State Continuity to defend against contextual state poisoning. Inspired by prior state-continuity mechanisms (e.g., Nimble), ElephantAgent extends this protection to the evolving contextual state of agentic systems. We define the contextual state as the bounded, security-critical subset of the agent\u0027s entire context (e.g., tool state and memory). Before processing each query, ElephantAgent recomputes the digest of the local contextual state and verifies it against the latest authorized digest. Using replicated trusted hardware, ElephantAgent maintains a linearizable ledger of authorized contextual state transitions and detects out-of-band state tampering. To handle in-band semantic abuse, ElephantAgent additionally provides Historical Traceability, enabling conditional post-hoc audit and recovery to a known-good prior state.", "arxiv_id": "2607.01919", "arxiv_url": "https://arxiv.org/abs/2607.01919", "authors": ["Jiankai Jin", "Xiangzheng Zhang", "Zhao Liu", "Wenzhuo Xu", "Dongdong Yang", "Deyue Zhang", "Quanchen Zou"], "brief": "ElephantAgent\u63d0\u51fa\u4e86\u4e00\u79cd\u4e0a\u4e0b\u6587\u72b6\u6001\u8fde\u7eed\u6027\u534f\u8bae\uff0c\u901a\u8fc7\u53ef\u4fe1\u786c\u4ef6\u7ef4\u62a4\u7ebf\u6027\u5316\u8d26\u672c\u6765\u9a8c\u8bc1\u667a\u80fd\u4f53\u7684\u5de5\u5177\u72b6\u6001\u548c\u8bb0\u5fc6\u5b8c\u6574\u6027\uff0c\u9632\u5fa1\u5de5\u5177\u63cf\u8ff0\u7b26\u6295\u6bd2\u548c\u8bb0\u5fc6\u6295\u6bd2\u7b49\u653b\u51fb\u3002\u8be5\u534f\u8bae\u8fd8\u63d0\u4f9b\u5386\u53f2\u53ef\u8ffd\u6eaf\u6027\uff0c\u652f\u6301\u4e8b\u540e\u5ba1\u8ba1\u548c\u72b6\u6001\u6062\u590d\uff0c\u6709\u6548\u4fdd\u969c\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u5b89\u5168\u6267\u884c\u3002", "categories": ["cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01919", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u9632\u5fa1", "\u53ef\u4fe1\u786c\u4ef6", "\u8bb0\u5fc6\u6295\u6bd2"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01919v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "ElephantAgent: Contextual State Continuity in Agentic Systems", "tldr": "ElephantAgent\u63d0\u51fa\u4e86\u4e00\u79cd\u4e0a\u4e0b\u6587\u72b6\u6001\u8fde\u7eed\u6027\u534f\u8bae\uff0c\u901a\u8fc7\u53ef\u4fe1\u786c\u4ef6\u7ef4\u62a4\u7ebf\u6027\u5316\u8d26\u672c\u6765\u9a8c\u8bc1\u667a\u80fd\u4f53\u7684\u5de5\u5177\u72b6\u6001\u548c\u8bb0\u5fc6\u5b8c\u6574\u6027\uff0c\u9632\u5fa1\u5de5\u5177\u63cf\u8ff0\u7b26\u6295\u6bd2\u548c\u8bb0\u5fc6\u6295\u6bd2\u7b49\u653b\u51fb\u3002\u8be5\u534f\u8bae\u8fd8\u63d0\u4f9b\u5386\u53f2\u53ef\u8ffd\u6eaf\u6027\uff0c\u652f\u6301\u4e8b\u540e\u5ba1\u8ba1\u548c\u72b6\u6001\u6062\u590d\uff0c\u6709\u6548\u4fdd\u969c\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u5b89\u5168\u6267\u884c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLM agents are increasingly used to translate natural language into 3D scenes in a procedural way, but existing systems focus on static output. Dynamic 4D scenes from text alone, in which liquids flow, particles emit, rigid bodies cascade, and articulated mechanisms move, remain largely unexplored despite their value as editable content and as physics-grounded training data for video generation and embodied AI. Two challenges set the dynamic case apart from static text-to-scene work: an agent must jointly coordinate spatial layout, multiple physics solvers, temporal sequencing, camera, and lighting in a single coherent scene, and verifying motion correctness from rendered video is fundamentally harder than judging a single image. We present SimWorlds: a multi-agent framework that produces dynamic, editable 4D scenes from text, with Blender-specific procedural knowledge, a planner-coder-reviewer workflow driving a fixed ordered sequence of construction stages, a layered scene protocol enforced by a deterministic verifier, and a runtime-state inspection tool suite that catches mechanism failures the rendered image cannot reveal. We also introduce 4DBuildBench, a benchmark for assessing both visual fidelity and physical consistency of the procedural dynamic 3D scenes generated from text prompts. Experiments show that SimWorlds outperforms prior dynamic Blender generation baselines.", "arxiv_id": "2607.01766", "arxiv_url": "https://arxiv.org/abs/2607.01766", "authors": ["Chunjiang Liu", "Xiaoyuan Wang", "Haoyu Chen", "Yizhou Zhao", "Ming-Hsuan Yang", "L\u00e1szl\u00f3 A. Jeni"], "brief": "SimWorlds\u662f\u4e00\u4e2a\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u80fd\u591f\u4ece\u6587\u672c\u63cf\u8ff0\u751f\u6210\u52a8\u6001\u53ef\u7f16\u8f91\u76844D\u573a\u666f\uff08\u542b\u6d41\u4f53\u3001\u7c92\u5b50\u3001\u521a\u4f53\u3001\u5173\u8282\u673a\u6784\u7b49\u7269\u7406\u6548\u679c\uff09\u3002\u7cfb\u7edf\u91c7\u7528\u89c4\u5212-\u7f16\u7801-\u5ba1\u67e5\u5de5\u4f5c\u6d41\uff0c\u7ed3\u5408Blender\u4e13\u7528\u7a0b\u5e8f\u5316\u77e5\u8bc6\u548c\u786e\u5b9a\u6027\u9a8c\u8bc1\u5668\uff0c\u5e76\u5f15\u51654DBuildBench\u57fa\u51c6\u6d4b\u8bd5\u8bc4\u4f30\u89c6\u89c9\u4fdd\u771f\u5ea6\u4e0e\u7269\u7406\u4e00\u81f4\u6027\uff0c\u5b9e\u9a8c\u8868\u660e\u5176\u4f18\u4e8e\u73b0\u6709\u52a8\u6001\u573a\u666f\u751f\u6210\u57fa\u7ebf\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01766", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "3D\u573a\u666f\u751f\u6210", "\u591a\u667a\u80fd\u4f53\u7cfb\u7edf", "\u7269\u7406\u4eff\u771f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01766v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "SimWorlds: A Multi-Agent System for Dynamic 3D Scene Creation", "tldr": "SimWorlds\u662f\u4e00\u4e2a\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u80fd\u591f\u4ece\u6587\u672c\u63cf\u8ff0\u751f\u6210\u52a8\u6001\u53ef\u7f16\u8f91\u76844D\u573a\u666f\uff08\u542b\u6d41\u4f53\u3001\u7c92\u5b50\u3001\u521a\u4f53\u3001\u5173\u8282\u673a\u6784\u7b49\u7269\u7406\u6548\u679c\uff09\u3002\u7cfb\u7edf\u91c7\u7528\u89c4\u5212-\u7f16\u7801-\u5ba1\u67e5\u5de5\u4f5c\u6d41\uff0c\u7ed3\u5408Blender\u4e13\u7528\u7a0b\u5e8f\u5316\u77e5\u8bc6\u548c\u786e\u5b9a\u6027\u9a8c\u8bc1\u5668\uff0c\u5e76\u5f15\u51654DBuildBench\u57fa\u51c6\u6d4b\u8bd5\u8bc4\u4f30\u89c6\u89c9\u4fdd\u771f\u5ea6\u4e0e\u7269\u7406\u4e00\u81f4\u6027\uff0c\u5b9e\u9a8c\u8868\u660e\u5176\u4f18\u4e8e\u73b0\u6709\u52a8\u6001\u573a\u666f\u751f\u6210\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Agents are increasingly used to construct workflows and assist humans in completing recurring tasks more efficiently. As these workflows become repeated and domain-specific, agent memory and reusable skills become increasingly important: agents should be able to recall workflow patterns, execution constraints, and user preferences from previous runs. We study this problem in workflow-based image generation and introduce COMFYCLAW, an agentic skill evolution harness for controlling ComfyUI workflows. COMFYCLAW formulates workflow construction as typed graph editing, exposes tools organized by construction stage, automatically reverts invalid edits, and uses a region-level vision-language model (VLM) verifier to translate visual failures into actionable repair suggestions. The framework further evolves a progressively disclosed skill library, where trajectories, execution errors, and verifier feedback from previous runs are distilled into reusable Agent Skills. Across four benchmark splits, three agent models, and two image backbones, COMFYCLAW achieves the best average image-generation evaluation score across all six agent configurations, outperforming a verifier-only baseline without skill evolution. Human annotations further show that annotators prefer COMFYCLAW over variants without skill evolution. Our results suggest that skill evolution is an effective mechanism for improving agent reliability and performance in recurring visual workflow construction.", "arxiv_id": "2607.01709", "arxiv_url": "https://arxiv.org/abs/2607.01709", "authors": ["Zongxia Li", "Dawei Liu", "Fuxiao Liu", "Yuhang Zhou", "Xiyang Wu", "Jingxi Chen", "Jing Xie", "Xiaomin Wu", "Lichao Sun"], "brief": "\u63d0\u51faCOMFYCLAW\u6846\u67b6\uff0c\u5c06ComfyUI\u56fe\u50cf\u751f\u6210\u5de5\u4f5c\u6d41\u6784\u5efa\u5f62\u5f0f\u5316\u4e3a\u7c7b\u578b\u5316\u56fe\u7f16\u8f91\uff0c\u5e76\u901a\u8fc7\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u9a8c\u8bc1\u5668\u5c06\u6267\u884c\u9519\u8bef\u548c\u89c6\u89c9\u53cd\u9988\u84b8\u998f\u4e3a\u53ef\u590d\u7528\u7684\u667a\u80fd\u4f53\u6280\u80fd\u5e93\uff0c\u5b9e\u73b0\u81ea\u8fdb\u5316\u7684\u5de5\u4f5c\u6d41\u6784\u5efa\u80fd\u529b\u3002\u5728\u56db\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0cCOMFYCLAW\u5728\u516d\u79cd\u667a\u80fd\u4f53\u914d\u7f6e\u4e0b\u5747\u53d6\u5f97\u6700\u4f73\u56fe\u50cf\u751f\u6210\u8bc4\u5206\uff0c\u4eba\u5de5\u6807\u6ce8\u4e5f\u663e\u793a\u5176\u4f18\u4e8e\u65e0\u6280\u80fd\u8fdb\u5316\u7684\u53d8\u4f53\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01709", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u4f5c\u6d41\u81ea\u52a8\u5316", "\u6280\u80fd\u8fdb\u5316", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01709v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "COMFYCLAW: Self-Evolving Skill Harnesses for Image Generation Workflows", "tldr": "\u63d0\u51faCOMFYCLAW\u6846\u67b6\uff0c\u5c06ComfyUI\u56fe\u50cf\u751f\u6210\u5de5\u4f5c\u6d41\u6784\u5efa\u5f62\u5f0f\u5316\u4e3a\u7c7b\u578b\u5316\u56fe\u7f16\u8f91\uff0c\u5e76\u901a\u8fc7\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u9a8c\u8bc1\u5668\u5c06\u6267\u884c\u9519\u8bef\u548c\u89c6\u89c9\u53cd\u9988\u84b8\u998f\u4e3a\u53ef\u590d\u7528\u7684\u667a\u80fd\u4f53\u6280\u80fd\u5e93\uff0c\u5b9e\u73b0\u81ea\u8fdb\u5316\u7684\u5de5\u4f5c\u6d41\u6784\u5efa\u80fd\u529b\u3002\u5728\u56db\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0cCOMFYCLAW\u5728\u516d\u79cd\u667a\u80fd\u4f53\u914d\u7f6e\u4e0b\u5747\u53d6\u5f97\u6700\u4f73\u56fe\u50cf\u751f\u6210\u8bc4\u5206\uff0c\u4eba\u5de5\u6807\u6ce8\u4e5f\u663e\u793a\u5176\u4f18\u4e8e\u65e0\u6280\u80fd\u8fdb\u5316\u7684\u53d8\u4f53\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Universal traffic laws describe recurrent patterns in congestion, mobility and driving behavior across cities, providing a scientific basis for transportation planning, management and control. Their discovery, however, remains expert-driven, requiring candidate regularities to be identified from heterogeneous observational evidence or validated through intervention experiments. Although autonomous artificial intelligence (AI) systems have advanced scientific discovery in controlled laboratory settings, extending them to complex transportation domains remains a challenge. Here we present TrafficSci, an agentic AI system that formulates traffic-law discovery as an iterative, auditable workflow integrating evidence scoping, critic-judge hypothesis induction, and observational-interventional validation. Across four case studies spanning population, network, control and trajectory scales, TrafficSci autonomously rediscovers three established traffic laws and identifies an unreported intrinsic temporal memory scale in urban driving behavior, statistically consistent across eight cities and two trajectory datasets. TrafficSci provides a route for extending AI-driven scientific discovery from controlled domains to complex urban systems.", "arxiv_id": "2607.01639", "arxiv_url": "https://arxiv.org/abs/2607.01639", "authors": ["Xingyuan Dai", "Yue Liu", "Xiaoyan Gong", "Qinghai Miao", "Junyou Shang", "Yutong Wang", "Chao Guo", "Yonglin Tian", "Yizhang Chai", "Chao Xiang", "Yisheng Lv", "Fei-Yue Wang"], "brief": "\u63d0\u51faTrafficSci\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u5c06\u4ea4\u901a\u89c4\u5f8b\u53d1\u73b0\u5f62\u5f0f\u5316\u4e3a\u53ef\u5ba1\u8ba1\u7684\u8fed\u4ee3\u5de5\u4f5c\u6d41\uff0c\u6db5\u76d6\u8bc1\u636e\u7b5b\u9009\u3001\u5047\u8bbe\u5f52\u7eb3\u4e0e\u9a8c\u8bc1\u3002\u7cfb\u7edf\u81ea\u4e3b\u91cd\u65b0\u53d1\u73b0\u4e86\u4e09\u6761\u5df2\u77e5\u4ea4\u901a\u5b9a\u5f8b\uff0c\u5e76\u5728\u516b\u4e2a\u57ce\u5e02\u6570\u636e\u4e2d\u8bc6\u522b\u51fa\u4e00\u4e2a\u6b64\u524d\u672a\u62a5\u544a\u7684\u57ce\u5e02\u9a7e\u9a76\u884c\u4e3a\u5185\u5728\u65f6\u95f4\u8bb0\u5fc6\u5c3a\u5ea6\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01639", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u53d1\u73b0", "\u4ea4\u901a\u7cfb\u7edf", "\u81ea\u4e3b\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01639v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Autonomous discovery of traffic laws with AI traffic scientists", "tldr": "\u63d0\u51faTrafficSci\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u5c06\u4ea4\u901a\u89c4\u5f8b\u53d1\u73b0\u5f62\u5f0f\u5316\u4e3a\u53ef\u5ba1\u8ba1\u7684\u8fed\u4ee3\u5de5\u4f5c\u6d41\uff0c\u6db5\u76d6\u8bc1\u636e\u7b5b\u9009\u3001\u5047\u8bbe\u5f52\u7eb3\u4e0e\u9a8c\u8bc1\u3002\u7cfb\u7edf\u81ea\u4e3b\u91cd\u65b0\u53d1\u73b0\u4e86\u4e09\u6761\u5df2\u77e5\u4ea4\u901a\u5b9a\u5f8b\uff0c\u5e76\u5728\u516b\u4e2a\u57ce\u5e02\u6570\u636e\u4e2d\u8bc6\u522b\u51fa\u4e00\u4e2a\u6b64\u524d\u672a\u62a5\u544a\u7684\u57ce\u5e02\u9a7e\u9a76\u884c\u4e3a\u5185\u5728\u65f6\u95f4\u8bb0\u5fc6\u5c3a\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "NASA and its data centers hold thousands of geoscience datasets and tools like Worldview, Giovanni, the Science Discovery Engine, and Harmony. Finding the right one is hard even for domain experts. We present an agentic search system, deployed as a public service for the geoscience community, that takes a natural-language research query and returns the matching datasets and tools. We demonstrate that, in the era of large language models, the latent value of knowledge graphs (KGs) can be substantially amplified through agentic search. From the NASA Earth Observation Knowledge Graph (NASA EO-KG) we derive NASA-EO-Bench, an open benchmark of 47k query-dataset pairs (21k task-based queries). A neural scorer fine-tuned on NASA-EO-Bench beats cosine and BM25 baselines. Further combining it with BM25 via score fusion raises both Recall@10 (R@10) and MRR by over 5x. On top of this supervised pipeline, we add a zero-shot agentic reranking stage that, without any additional training, lifts MRR by 28% on a stratified N=200 subset, showing that LLM reasoning is complementary to supervised retrieval.", "arxiv_id": "2607.02387", "arxiv_url": "https://arxiv.org/abs/2607.02387", "authors": ["Minghan Yu", "Youran Sun", "Chugang Yi", "Yixin Wen", "Haizhao Yang"], "brief": "\u9488\u5bf9NASA\u5730\u7403\u89c2\u6d4b\u6570\u636e\u53d1\u73b0\u96be\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u4e2a\u667a\u80fd\u4f53\u641c\u7d22\u7cfb\u7edf\uff0c\u7ed3\u5408\u77e5\u8bc6\u56fe\u8c31\u3001\u795e\u7ecf\u8bc4\u5206\u5668\u4e0eBM25\u878d\u5408\u68c0\u7d22\uff0c\u518d\u52a0\u5165\u96f6\u6837\u672c\u667a\u80fd\u4f53\u91cd\u6392\u5e8f\uff0c\u4f7fMRR\u63d0\u534728%\uff0c\u5df2\u4f5c\u4e3a\u516c\u5171\u670d\u52a1\u90e8\u7f72\u3002", "categories": ["cs.IR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02387", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4fe1\u606f\u68c0\u7d22", "\u77e5\u8bc6\u56fe\u8c31", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02387v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Bringing Agentic Search to Earth Observation Data Discovery", "tldr": "\u9488\u5bf9NASA\u5730\u7403\u89c2\u6d4b\u6570\u636e\u53d1\u73b0\u96be\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u4e2a\u667a\u80fd\u4f53\u641c\u7d22\u7cfb\u7edf\uff0c\u7ed3\u5408\u77e5\u8bc6\u56fe\u8c31\u3001\u795e\u7ecf\u8bc4\u5206\u5668\u4e0eBM25\u878d\u5408\u68c0\u7d22\uff0c\u518d\u52a0\u5165\u96f6\u6837\u672c\u667a\u80fd\u4f53\u91cd\u6392\u5e8f\uff0c\u4f7fMRR\u63d0\u534728%\uff0c\u5df2\u4f5c\u4e3a\u516c\u5171\u670d\u52a1\u90e8\u7f72\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present HaloGuard 1.0, an open-weights implementation of the constitutional-classifier paradigm for input safety. It achieves state-of-the-art performance on English and multilingual prompt-safety benchmarks at roughly one-tenth the model size of current leading open guard models. The safety constitution is the organising structure of the corpus: a natural-language constitution of 46 policies and 2,940 subcategories drives synthetic data generation, with exhaustive one-to-one paired counterfactuals that hold topic and vocabulary fixed while flipping intent, a two-tier harmless design that separately targets boundary and baseline false positives (FPs), and balanced multilingual materialisation across 46 languages that treats language as a surface form appearing on both sides of the boundary rather than as an adversarial signal. Across seven prompt-safety benchmarks, HaloGuard 1.0-0.8B attains the best average F1 (90.9) of any open guard we evaluate, outperforming baselines up to 27B parameters (over 30 times larger) while holding false-positive rate (FPR) to 4.3 and false-negative rate (FNR) to 9.5. The HaloGuard 1.0-4B variant reaches average F1 of 92.1 and FPR of 3.5, spending its extra capacity on precision rather than recall. A structured adjudication of the remaining failures indicates that most apparent missed-harm cases are benchmark mislabels rather than genuine model misses. An always-on adversarial red-teaming protocol continuously hardens the guard against both content-level and agentic attacks. We release the models as open weights.", "arxiv_id": "2607.02079", "arxiv_url": "https://arxiv.org/abs/2607.02079", "authors": ["Navaneeth Sangameswaran", "Preetham S", "Ashmiya Lenin"], "brief": "HaloGuard 1.0\u662f\u4e00\u4e2a\u5f00\u6e90\u591a\u8bed\u8a00AI\u5b89\u5168\u5206\u7c7b\u5668\uff0c\u57fa\u4e8e46\u6761\u653f\u7b56\u548c2940\u4e2a\u5b50\u7c7b\u522b\u7684\u5baa\u6cd5\u4f53\u7cfb\u9a71\u52a8\u5408\u6210\u6570\u636e\u751f\u6210\u30020.8B\u53c2\u6570\u7248\u672c\u57287\u4e2a\u5b89\u5168\u57fa\u51c6\u4e0a\u5e73\u5747F1\u8fbe90.9\uff0c\u8d85\u8d8a\u9ad8\u8fbe27B\u53c2\u6570\u7684\u73b0\u6709\u6a21\u578b\uff0c\u540c\u65f6\u4fdd\u6301\u6781\u4f4e\u8bef\u62a5\u7387\u3002", "categories": ["cs.CL", "cs.CR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02079", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["AI\u5b89\u5168", "\u5185\u5bb9\u5ba1\u6838", "\u591a\u8bed\u8a00", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02079v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "HaloGuard 1.0: An Open Weights Constitutional Classifier for Multilingual AI Safety", "tldr": "HaloGuard 1.0\u662f\u4e00\u4e2a\u5f00\u6e90\u591a\u8bed\u8a00AI\u5b89\u5168\u5206\u7c7b\u5668\uff0c\u57fa\u4e8e46\u6761\u653f\u7b56\u548c2940\u4e2a\u5b50\u7c7b\u522b\u7684\u5baa\u6cd5\u4f53\u7cfb\u9a71\u52a8\u5408\u6210\u6570\u636e\u751f\u6210\u30020.8B\u53c2\u6570\u7248\u672c\u57287\u4e2a\u5b89\u5168\u57fa\u51c6\u4e0a\u5e73\u5747F1\u8fbe90.9\uff0c\u8d85\u8d8a\u9ad8\u8fbe27B\u53c2\u6570\u7684\u73b0\u6709\u6a21\u578b\uff0c\u540c\u65f6\u4fdd\u6301\u6781\u4f4e\u8bef\u62a5\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Long-context inference is increasingly common in large language model (LLM) serving, driven by retrieval-augmented generation and agentic systems. In disaggregated inference, these workloads require transferring large Key-Value (KV) caches across the network, where decoding cannot begin until the transfer completes. Recent KV quantization techniques reduce data volume and alleviate this bottleneck, but existing schemes fail to achieve both low network-exposed latency and high inference accuracy. We challenge the assumption that the KV cache is an indivisible unit that must be fully received before use. We leverage the observation that different bits in the KV cache contribute unequally to attention computation and inference precision: the most significant bits capture the coarse structure of attention and the least significant bits refine precision. This property enables partial use of the KV cache during decoding. We present Lynx, a system that enables progressive, split-stream KV transfer by partitioning the KV cache into a high-priority Anchor stream carrying the most significant bits and a low-priority Residual stream carrying remaining precision. Decoding begins upon receipt of the Anchor stream and proceeds speculatively while the Residual stream is transferred concurrently, followed by verification that ensures equivalence to higher-precision decoding. Across multiple models and serving workloads, Lynx achieves Time-to-First-Token (TTFT) comparable to aggressive 4-bit KV quantization, while matching the accuracy of high-precision (BF16) inference, improving TTFT over standard 8-bit KV quantization by up to $1.43\\times$ and improving accuracy over state-of-the-art by up to $5.1\\%$.", "arxiv_id": "2607.01831", "arxiv_url": "https://arxiv.org/abs/2607.01831", "authors": ["Wenchen Han", "Gingfung Matthew Yeung", "Marco Barletta", "William Toner", "Amory Hoste", "Adam Barker"], "brief": "Lynx\u63d0\u51fa\u6e10\u8fdb\u5f0f\u63a8\u6d4b\u91cf\u5316\u65b9\u6cd5\uff0c\u5c06KV\u7f13\u5b58\u5206\u4e3a\u9ad8\u4f18\u5148\u7ea7\u951a\u6d41\uff08\u6700\u9ad8\u6709\u6548\u4f4d\uff09\u548c\u4f4e\u4f18\u5148\u7ea7\u6b8b\u5dee\u6d41\uff0c\u89e3\u7801\u5728\u6536\u5230\u951a\u6d41\u540e\u7acb\u5373\u5f00\u59cb\u5e76\u63a8\u6d4b\u6267\u884c\uff0c\u6b8b\u5dee\u6d41\u5e76\u53d1\u4f20\u8f93\u540e\u8fdb\u884c\u9a8c\u8bc1\u3002\u76f8\u6bd4\u6807\u51c68\u4f4dKV\u91cf\u5316\uff0cTTFT\u63d0\u5347\u6700\u9ad81.43\u500d\uff0c\u540c\u65f6\u7cbe\u5ea6\u63a5\u8fd1BF16\u63a8\u7406\uff0c\u6bd4\u73b0\u6709\u65b9\u6848\u7cbe\u5ea6\u63d0\u5347\u6700\u9ad85.1%\u3002", "categories": ["cs.DC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01831", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "KV\u7f13\u5b58", "\u91cf\u5316", "\u957f\u4e0a\u4e0b\u6587"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01831v1", "published_at": "2026-07-02", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Lynx: Progressive Speculative Quantization for accelerating KV Transfer in Long-Context Inference", "tldr": "Lynx\u63d0\u51fa\u6e10\u8fdb\u5f0f\u63a8\u6d4b\u91cf\u5316\u65b9\u6cd5\uff0c\u5c06KV\u7f13\u5b58\u5206\u4e3a\u9ad8\u4f18\u5148\u7ea7\u951a\u6d41\uff08\u6700\u9ad8\u6709\u6548\u4f4d\uff09\u548c\u4f4e\u4f18\u5148\u7ea7\u6b8b\u5dee\u6d41\uff0c\u89e3\u7801\u5728\u6536\u5230\u951a\u6d41\u540e\u7acb\u5373\u5f00\u59cb\u5e76\u63a8\u6d4b\u6267\u884c\uff0c\u6b8b\u5dee\u6d41\u5e76\u53d1\u4f20\u8f93\u540e\u8fdb\u884c\u9a8c\u8bc1\u3002\u76f8\u6bd4\u6807\u51c68\u4f4dKV\u91cf\u5316\uff0cTTFT\u63d0\u5347\u6700\u9ad81.43\u500d\uff0c\u540c\u65f6\u7cbe\u5ea6\u63a5\u8fd1BF16\u63a8\u7406\uff0c\u6bd4\u73b0\u6709\u65b9\u6848\u7cbe\u5ea6\u63d0\u5347\u6700\u9ad85.1%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Language models are increasingly used to quantify cultural phenomena, but what makes such measurement distinctively cultural? This paper argues that NLP work on culture is a material-discursive practice: the apparatus -- model, data, annotation, evaluation -- participates in constituting the cultural reality it measures, rather than passively recording it. Drawing on Karen Barad\u0027s concept of the agential cut -- the contingent boundary between phenomenon and instrument -- I show that the apparatus\u0027s substantive design choices draw such boundaries, and that the boundary is entangled from the start because language models have already internalized much of the cultural material they measure. I illustrate this through three case studies on television and film dialogue (measuring structure, interaction, and deviation) and three examinations of the apparatus itself (erasure of cultural markers, attunement to historical material, and agency in an agentic workflow). This big picture analysis proposes a research program that is theory-driven, empirically rigorous, and culturally contingent, treating each agential cut as a conscious commitment, at once methodological and ethical.", "arxiv_id": "2607.02459", "arxiv_url": "https://arxiv.org/abs/2607.02459", "authors": ["Kent K. Chang"], "brief": "\u672c\u6587\u63a2\u8ba8\u8bed\u8a00\u6a21\u578b\u4f5c\u4e3a\u6587\u5316\u6d4b\u91cf\u5de5\u5177\u7684\u672c\u8d28\uff0c\u501f\u52a9Karen Barad\u7684\"\u80fd\u52a8\u6027\u5207\u5272\"\u6982\u5ff5\uff0c\u6307\u51faNLP\u6587\u5316\u7814\u7a76\u4e2d\u6a21\u578b\u3001\u6570\u636e\u3001\u6807\u6ce8\u7b49\u88c5\u7f6e\u672c\u8eab\u53c2\u4e0e\u6784\u5efa\u4e86\u5176\u6240\u6d4b\u91cf\u7684\u6587\u5316\u73b0\u5b9e\uff0c\u800c\u975e\u88ab\u52a8\u8bb0\u5f55\u3002\u901a\u8fc7\u5f71\u89c6\u5bf9\u8bdd\u7684\u4e09\u4e2a\u6848\u4f8b\u7814\u7a76\uff0c\u63d0\u51fa\u4e00\u4e2a\u7406\u8bba\u9a71\u52a8\u3001\u7ecf\u9a8c\u4e25\u8c28\u4e14\u6587\u5316\u60c5\u5883\u5316\u7684\u7814\u7a76\u7eb2\u9886\uff0c\u5c06\u6bcf\u6b21\u6d4b\u91cf\u8bbe\u8ba1\u89c6\u4e3a\u65b9\u6cd5\u8bba\u4e0e\u4f26\u7406\u7684\u53cc\u91cd\u627f\u8bfa\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02459", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u8a00\u6a21\u578b", "\u6587\u5316\u6d4b\u91cf", "NLP\u65b9\u6cd5\u8bba", "\u4f26\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02459v1", "published_at": "2026-07-0
