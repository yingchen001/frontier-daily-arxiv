u4ee4\u9075\u5faa\u80fd\u529b"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u6df7\u5408\u4e13\u5bb6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04112v1", "published_at": "2026-07-05", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DynaVieW: Schema-Guided World Modeling for Understanding Hierarchical Visual Dynamics", "tldr": "DynaVieW\uff1a\u57fa\u4e8e\u52a8\u6001\u6a21\u5f0f\u5f15\u5bfc\u7684\u4e16\u754c\u6a21\u578b\uff0c\u7528\u4e8e\u7406\u89e3\u89c6\u9891\u4e2d\u7684\u5c42\u6b21\u5316\u89c6\u89c9\u52a8\u6001", "upvotes": 0, "what_it_is": "\u63d0\u51faDynaVieW\uff0c\u4e00\u79cd\u6a21\u5f0f\u5f15\u5bfc\u7684\u89c6\u89c9\u4e16\u754c\u6a21\u578b\uff0c\u901a\u8fc7\u5b66\u4e60\u4ea4\u9519\u7684\u72b6\u6001-\u8f6c\u6362\u5e8f\u5217\uff0c\u5bf9\u89c6\u9891\u6216\u591a\u56fe\u50cf\u5e8f\u5217\u4e2d\u7684\u89c6\u89c9\u52a8\u6001\u8fdb\u884c\u5c42\u6b21\u5316\u5efa\u6a21\u4e0e\u9884\u6d4b\u6a21\u62df\u3002", "why_notable": "\u73b0\u6709\u591a\u6a21\u6001LLM\u5728\u89c6\u9891\u65f6\u5e8f\u52a8\u6001\u5efa\u6a21\u4e0a\u5b58\u5728\u7cfb\u7edf\u6027\u4e0d\u8db3\uff0cDynaVieW\u901a\u8fc7\u7ed3\u6784\u5316\u7684\u4e16\u754c\u6a21\u578b\u6846\u67b6\u586b\u8865\u8fd9\u4e00\u7a7a\u767d\uff0c\u5bf9\u89c6\u9891\u7406\u89e3\u3001\u5177\u8eab\u667a\u80fd\u548c\u4e16\u754c\u6a21\u62df\u7b49\u65b9\u5411\u5177\u6709\u91cd\u8981\u63a8\u52a8\u4ef7\u503c\u3002"}, {"abstract": "Vision-based deep reinforcement learning involves dealing with high-dimensional inputs of image information. It is crucial to abstract effective states from high-dimensional image inputs and limited samples for sample-efficient reinforcement learning. To address this challenge, inspired by fields such as natural language processing and computer vision, we propose a self-supervised task based on mask prediction as an auxiliary task for reinforcement learning. This non-reconstruction method uses the sequence information collected by the agent from the environment and the context information in the sequence to predict the masked information, thereby strengthening the agent\u0027s understanding of the task and learning effective representations. Combined with transformers, we find that the model reconstructs the masked input sequence in the latent space. By feeding the compressed representations learned by this method into reinforcement learning models, we observe an improvement in the sample efficiency of reinforcement learning. Moreover, the model outperforms state-of-the-art sample-efficient reinforcement learning methods on multiple continuous and discrete control benchmarks.", "arxiv_id": "2607.04153", "arxiv_url": "https://arxiv.org/abs/2607.04153", "authors": ["Kai Zhao"], "brief": "\u63d0\u51fa\u4e00\u79cd\u4ee5\u63a9\u7801\u9884\u6d4b\u4e3a\u8f85\u52a9\u4efb\u52a1\u7684\u81ea\u76d1\u7763\u8868\u793a\u5b66\u4e60\u65b9\u6cd5\uff0c\u7ed3\u5408Transformer\u5728\u6f5c\u5728\u7a7a\u95f4\u91cd\u5efa\u88ab\u63a9\u7801\u7684\u5e8f\u5217\u4fe1\u606f\uff0c\u4e3a\u5f3a\u5316\u5b66\u4e60\u63d0\u4f9b\u9ad8\u6548\u72b6\u6001\u8868\u793a\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04153", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u975e\u91cd\u5efa\u5f0f\u63a9\u7801\u9884\u6d4b\uff1a\u5728\u6f5c\u5728\u7a7a\u95f4\u800c\u975e\u50cf\u7d20\u7a7a\u95f4\u9884\u6d4b\u88ab\u63a9\u7801\u4fe1\u606f\uff0c\u907f\u514d\u50cf\u7d20\u7ea7\u91cd\u5efa\u7684\u8ba1\u7b97\u5f00\u9500", "\u5229\u7528\u667a\u80fd\u4f53\u91c7\u96c6\u7684\u5e8f\u5217\u4e0a\u4e0b\u6587\u4fe1\u606f\u8fdb\u884c\u63a9\u7801\u9884\u6d4b\uff0c\u589e\u5f3a\u5bf9\u4efb\u52a1\u7684\u7406\u89e3", "\u5728\u591a\u4e2a\u8fde\u7eed\u4e0e\u79bb\u6563\u63a7\u5236\u57fa\u51c6\u4e0a\u8d85\u8d8a\u5f53\u524d\u6700\u4f18\u6837\u672c\u9ad8\u6548\u5f3a\u5316\u5b66\u4e60\u65b9\u6cd5"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8868\u793a\u5b66\u4e60", "\u81ea\u76d1\u7763\u5b66\u4e60", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04153v1", "published_at": "2026-07-05", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Mask-based Predictive Representations for Reinforcement Learning", "tldr": "\u57fa\u4e8e\u63a9\u7801\u9884\u6d4b\u7684\u81ea\u76d1\u7763\u8f85\u52a9\u4efb\u52a1\u63d0\u5347\u89c6\u89c9\u5f3a\u5316\u5b66\u4e60\u6837\u672c\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u4ee5\u63a9\u7801\u9884\u6d4b\u4e3a\u8f85\u52a9\u4efb\u52a1\u7684\u81ea\u76d1\u7763\u8868\u793a\u5b66\u4e60\u65b9\u6cd5\uff0c\u7ed3\u5408Transformer\u5728\u6f5c\u5728\u7a7a\u95f4\u91cd\u5efa\u88ab\u63a9\u7801\u7684\u5e8f\u5217\u4fe1\u606f\uff0c\u4e3a\u5f3a\u5316\u5b66\u4e60\u63d0\u4f9b\u9ad8\u6548\u72b6\u6001\u8868\u793a\u3002", "why_notable": "\u5c06NLP/CV\u4e2d\u6210\u719f\u7684\u63a9\u7801\u9884\u6d4b\u8303\u5f0f\u8fc1\u79fb\u81f3\u5f3a\u5316\u5b66\u4e60\u8868\u793a\u5b66\u4e60\uff0c\u65e0\u9700\u50cf\u7d20\u91cd\u5efa\u5373\u53ef\u5b66\u4e60\u6709\u6548\u72b6\u6001\u8868\u793a\uff0c\u663e\u8457\u63d0\u5347\u6837\u672c\u6548\u7387\uff0c\u65b9\u6cd5\u7b80\u6d01\u4e14\u6cdb\u5316\u6027\u5f3a\u3002"}, {"abstract": "Scientific equation discovery must combine broad domain priors with strict numerical testing. Symbolic regression supplies numerical grounding but faces a combinatorial search space, whereas many language-model systems ask the model to propose or select formulas directly. We test a different division of labour. We compare role specifications in which the language model acts as equation author, candidate decider or search controller, alongside end-to-end language-model and purely numerical baselines. In the controller setting we propose here, implemented as LLM-PySR, language models specify variables, operators, transformations and search depth; symbolic regression enumerates and fits expressions; and deterministic metrics govern retention. Across 74 AI-Feynman equations and seven complex formula-recovery tasks, search control achieved the strongest observed balance of accuracy, complexity, stability and cost. On an independent battery dataset, LLM-PySR identified a compact piecewise-linear relation between early voltage-curve displacement and cycle life. The results suggest that language models should shape hypothesis exploration rather than decide which equations survive.", "arxiv_id": "2607.04156", "arxiv_url": "https://arxiv.org/abs/2607.04156", "authors": ["Zikai Xie", "Wenmei Li", "Man Luo", "Jun Jiang", "Linjiang Chen"], "brief": "\u63d0\u51faLLM-PySR\u6846\u67b6\uff0c\u8ba9\u5927\u8bed\u8a00\u6a21\u578b\u62c5\u4efb\"\u641c\u7d22\u63a7\u5236\u5668\"\u89d2\u8272\uff0c\u6307\u5b9a\u53d8\u91cf\u3001\u7b97\u5b50\u548c\u641c\u7d22\u6df1\u5ea6\uff0c\u7531\u7b26\u53f7\u56de\u5f52\u5f15\u64ce\u679a\u4e3e\u62df\u5408\u8868\u8fbe\u5f0f\uff0c\u786e\u5b9a\u6027\u6307\u6807\u51b3\u5b9a\u4fdd\u7559\u54ea\u4e9b\u65b9\u7a0b\uff0c\u800c\u975e\u8ba9LLM\u76f4\u63a5\u751f\u6210\u6216\u7b5b\u9009\u516c\u5f0f\u3002", "categories": ["cs.AI", "cs.SC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04156", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5bf9\u6bd4\u4e86LLM\u4f5c\u4e3a\u65b9\u7a0b\u4f5c\u8005\u3001\u5019\u9009\u51b3\u7b56\u8005\u3001\u641c\u7d22\u63a7\u5236\u5668\u4e09\u79cd\u89d2\u8272\u5206\u5de5\uff0c\u4ee5\u53ca\u7aef\u5230\u7aefLLM\u548c\u7eaf\u6570\u503c\u57fa\u7ebf", "\u572874\u4e2aAI-Feynman\u65b9\u7a0b\u548c7\u4e2a\u590d\u6742\u516c\u5f0f\u6062\u590d\u4efb\u52a1\u4e0a\uff0c\u641c\u7d22\u63a7\u5236\u6a21\u5f0f\u5728\u51c6\u786e\u6027\u3001\u590d\u6742\u5ea6\u3001\u7a33\u5b9a\u6027\u548c\u6210\u672c\u7684\u7efc\u5408\u8868\u73b0\u6700\u4f18", "\u5728\u72ec\u7acb\u7535\u6c60\u6570\u636e\u96c6\u4e0a\uff0cLLM-PySR\u53d1\u73b0\u4e86\u65e9\u671f\u7535\u538b\u66f2\u7ebf\u4f4d\u79fb\u4e0e\u5faa\u73af\u5bff\u547d\u4e4b\u95f4\u7684\u7d27\u51d1\u5206\u6bb5\u7ebf\u6027\u5173\u7cfb"], "keywords": ["\u7b26\u53f7\u56de\u5f52", "\u79d1\u5b66\u53d1\u73b0", "\u5927\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04156v1", "published_at": "2026-07-05", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Language models guide symbolic equation discovery by controlling search", "tldr": "LLM\u63a7\u5236\u7b26\u53f7\u56de\u5f52\u641c\u7d22\u7a7a\u95f4\uff0c\u800c\u975e\u76f4\u63a5\u751f\u6210\u65b9\u7a0b\uff0c\u5b9e\u73b0\u66f4\u4f18\u79d1\u5b66\u516c\u5f0f\u53d1\u73b0", "upvotes": 0, "what_it_is": "\u63d0\u51faLLM-PySR\u6846\u67b6\uff0c\u8ba9\u5927\u8bed\u8a00\u6a21\u578b\u62c5\u4efb\"\u641c\u7d22\u63a7\u5236\u5668\"\u89d2\u8272\uff0c\u6307\u5b9a\u53d8\u91cf\u3001\u7b97\u5b50\u548c\u641c\u7d22\u6df1\u5ea6\uff0c\u7531\u7b26\u53f7\u56de\u5f52\u5f15\u64ce\u679a\u4e3e\u62df\u5408\u8868\u8fbe\u5f0f\uff0c\u786e\u5b9a\u6027\u6307\u6807\u51b3\u5b9a\u4fdd\u7559\u54ea\u4e9b\u65b9\u7a0b\uff0c\u800c\u975e\u8ba9LLM\u76f4\u63a5\u751f\u6210\u6216\u7b5b\u9009\u516c\u5f0f\u3002", "why_notable": "\u660e\u786e\u5212\u5206LLM\u4e0e\u7b26\u53f7\u56de\u5f52\u7684\u804c\u8d23\u8fb9\u754c\uff0c\u63ed\u793aLLM\u5e94\u5851\u9020\u5047\u8bbe\u63a2\u7d22\u7a7a\u95f4\u800c\u975e\u88c1\u51b3\u65b9\u7a0b\u5b58\u7559\uff0c\u4e3a\u79d1\u5b66\u53d1\u73b0\u4e2d\u4eba\u673a\u534f\u4f5c\u63d0\u4f9b\u53ef\u590d\u73b0\u7684\u5b9e\u9a8c\u4f9d\u636e\u3002"}, {"abstract": "Retrieval-augmented generation (RAG) reduces but does not eliminate hallucination, and existing detectors return a single answer-level score that does not indicate which sentence is unsupported, or why. To close this gap, we introduce Grounding-Aware Sensitivity by Perturbation (GASP), a span-level detector that scores each answer sentence by how strongly its likelihood depends on the retrieved evidence, a quantity we term grounding sensitivity. GASP holds the answer fixed and re-scores it under the full context, under no context, and with each chunk removed, then measures the log-likelihood drops and Jensen-Shannon divergences (JSD). The likelihood of a grounded sentence collapses once its supporting passage is removed, whereas a hallucinated sentence is almost unaffected, a contrast we interpret by casting decoding as a random nonlinear iterated function system (RNIFS). We evaluate GASP on three benchmarks (RAGTruth, TofuEval, RAGBench) with three instruction-tuned scorers from two model families (Qwen2.5-0.5B, Qwen2.5-1.5B, and SmolLM2-1.7B) under a leakage-clean protocol. On RAGTruth it reaches a response-level area under the ROC curve (AUC) of about 0.73 and a span-level AUC of about 0.67, improving significantly over perplexity and by clear margins over length, whole-context natural language inference (NLI), and self-consistency baselines. The only baseline competitive at the span level is a well-configured chunk-level entailment verifier, which requires a separate model, whereas a training-free threshold on the grounding features matches the trained classifier without labeled data and serves as the default detector. Beyond RAGTruth, the signal transfers to TofuEval but not to short-answer question answering in RAGBench, showing GASP is best suited to outputs constructed from the retrieved context rather than answers recoverable from parametric knowledge.", "arxiv_id": "2607.04223", "arxiv_url": "https://arxiv.org/abs/2607.04223", "authors": ["Mohamed Aly Bouke"], "brief": "\u63d0\u51faGASP\uff08\u57fa\u4e8e\u6270\u52a8\u7684\u63a5\u5730\u611f\u77e5\u654f\u611f\u5ea6\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u8861\u91cf\u7b54\u6848\u53e5\u5b50\u7684\u4f3c\u7136\u503c\u5bf9\u68c0\u7d22\u8bc1\u636e\u7684\u4f9d\u8d56\u7a0b\u5ea6\uff08\u63a5\u5730\u654f\u611f\u5ea6\uff09\uff0c\u5b9e\u73b0\u5bf9RAG\u7cfb\u7edf\u5e7b\u89c9\u7684\u7ec6\u7c92\u5ea6\u53e5\u5b50\u7ea7\u68c0\u6d4b\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04223", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u601d\u8def\uff1a\u79fb\u9664\u652f\u6491\u6bb5\u843d\u540e\uff0c\u6709\u4f9d\u636e\u7684\u53e5\u5b50\u4f3c\u7136\u503c\u5927\u5e45\u4e0b\u964d\uff0c\u800c\u5e7b\u89c9\u53e5\u5b50\u51e0\u4e4e\u4e0d\u53d7\u5f71\u54cd\uff1b\u901a\u8fc7\u5bf9\u6570\u4f3c\u7136\u4e0b\u964d\u548cJensen-Shannon\u6563\u5ea6\u91cf\u5316\u8fd9\u4e00\u5dee\u5f02", "\u65e0\u9700\u8bad\u7ec3\uff1a\u57fa\u4e8e\u63a5\u5730\u7279\u5f81\u7684\u65e0\u8bad\u7ec3\u9608\u503c\u65b9\u6cd5\u4e0e\u6709\u76d1\u7763\u5206\u7c7b\u5668\u6027\u80fd\u76f8\u5f53\uff0c\u65e0\u9700\u6807\u6ce8\u6570\u636e", "\u5728RAGTruth\u4e0a\u54cd\u5e94\u7ea7AUC\u7ea60.73\u3001\u53e5\u5b50\u7ea7AUC\u7ea60.67\uff0c\u663e\u8457\u4f18\u4e8e\u56f0\u60d1\u5ea6\u3001NLI\u548c\u81ea\u4e00\u81f4\u6027\u57fa\u7ebf\uff1b\u4f46\u5728\u77ed\u7b54\u6848QA\u573a\u666f\uff08RAGBench\uff09\u8fc1\u79fb\u6027\u6709\u9650"], "keywords": ["\u5e7b\u89c9\u68c0\u6d4b", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u4fe1AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04223v1", "published_at": "2026-07-05", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Detecting Hallucinations in Retrieval-Augmented Generation through Grounding-Aware Sensitivity by Perturbation (GASP)", "tldr": "GASP\u901a\u8fc7\u6270\u52a8\u68c0\u7d22\u8bc1\u636e\u6765\u68c0\u6d4bRAG\u7cfb\u7edf\u4e2d\u7684\u5e7b\u89c9\uff0c\u7cbe\u786e\u5b9a\u4f4d\u5230\u53e5\u5b50\u7ea7\u522b", "upvotes": 0, "what_it_is": "\u63d0\u51faGASP\uff08\u57fa\u4e8e\u6270\u52a8\u7684\u63a5\u5730\u611f\u77e5\u654f\u611f\u5ea6\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u8861\u91cf\u7b54\u6848\u53e5\u5b50\u7684\u4f3c\u7136\u503c\u5bf9\u68c0\u7d22\u8bc1\u636e\u7684\u4f9d\u8d56\u7a0b\u5ea6\uff08\u63a5\u5730\u654f\u611f\u5ea6\uff09\uff0c\u5b9e\u73b0\u5bf9RAG\u7cfb\u7edf\u5e7b\u89c9\u7684\u7ec6\u7c92\u5ea6\u53e5\u5b50\u7ea7\u68c0\u6d4b\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u89e3\u51b3RAG\u5e7b\u89c9\u68c0\u6d4b\u7c92\u5ea6\u95ee\u9898\u7684\u65b9\u6cd5\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u5b9a\u4f4d\u5177\u4f53\u5e7b\u89c9\u53e5\u5b50\uff0c\u5e76\u63d0\u4f9b\u57fa\u4e8e\u968f\u673a\u975e\u7ebf\u6027\u8fed\u4ee3\u51fd\u6570\u7cfb\u7edf\uff08RNIFS\uff09\u7684\u7406\u8bba\u89e3\u91ca\uff0c\u5b9e\u7528\u4ef7\u503c\u9ad8\u3002"}, {"abstract": "Large language models increasingly operate in settings where humans are active collaborators rather than passive task providers. We introduce HAS-Framework, a graph-based framework that represents humans and LLM-powered agents as first-class participants with explicit roles, permissions, communication paths, and action authority. Building on this framework, HAS-Bench evaluates Human-Agent Systems under configurable human participation across agency levels, interaction channels, and persona policies. The benchmark measures both task outcomes and process-level collaboration behavior, including clarification quality, feedback utilization, control calibration, safety, initiative, and interaction cost. Experiments across six domains show that human participation can substantially improve task completion and failure recovery, but the gains depend on when, how, and by whom human input is exercised.", "arxiv_id": "2607.04329", "arxiv_url": "https://arxiv.org/abs/2607.04329", "authors": ["Yaozu Wu", "Wei-Chieh Huang", "Jizhou Guo", "Dongyuan Li", "Renhe Jiang", "Henry Peng Zou", "Chunyu Miao", "Shanghao Li", "Weizhi Zhang", "WeiWei Ye", "Yankai Chen", "Meng Zhang", "Xue Liu", "Philip S. Yu"], "brief": "\u63d0\u51faHAS-Framework\u56fe\u7ed3\u6784\u6846\u67b6\u4e0eHAS-Bench\u57fa\u51c6\uff0c\u5c06\u4eba\u7c7b\u548cLLM\u667a\u80fd\u4f53\u5efa\u6a21\u4e3a\u5177\u6709\u660e\u786e\u89d2\u8272\u3001\u6743\u9650\u548c\u901a\u4fe1\u8def\u5f84\u7684\u53c2\u4e0e\u8005\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4eba\u673a\u534f\u4f5c\u7cfb\u7edf\u5728\u4e0d\u540c\u53c2\u4e0e\u5ea6\u3001\u4ea4\u4e92\u6e20\u9053\u548c\u89d2\u8272\u7b56\u7565\u4e0b\u7684\u4efb\u52a1\u5b8c\u6210\u4e0e\u534f\u4f5c\u884c\u4e3a\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04329", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["HAS-Framework\u5c06\u4eba\u7c7b\u4e0e\u667a\u80fd\u4f53\u7edf\u4e00\u5efa\u6a21\u4e3a\u56fe\u8282\u70b9\uff0c\u652f\u6301\u53ef\u914d\u7f6e\u7684\u6743\u9650\u3001\u901a\u4fe1\u8def\u5f84\u548c\u884c\u52a8\u6743\u9650", "HAS-Bench\u8986\u76d6\u516d\u4e2a\u9886\u57df\uff0c\u8bc4\u4f30\u4efb\u52a1\u7ed3\u679c\u4e0e\u8fc7\u7a0b\u7ea7\u534f\u4f5c\u884c\u4e3a\uff08\u6f84\u6e05\u8d28\u91cf\u3001\u53cd\u9988\u5229\u7528\u3001\u5b89\u5168\u6027\u3001\u4e3b\u52a8\u6027\u3001\u4ea4\u4e92\u6210\u672c\u7b49\uff09", "\u5b9e\u9a8c\u8868\u660e\u4eba\u7c7b\u53c2\u4e0e\u53ef\u663e\u8457\u63d0\u5347\u4efb\u52a1\u5b8c\u6210\u7387\u548c\u5931\u8d25\u6062\u590d\u80fd\u529b\uff0c\u4f46\u6536\u76ca\u9ad8\u5ea6\u4f9d\u8d56\u53c2\u4e0e\u65f6\u673a\u3001\u65b9\u5f0f\u548c\u53c2\u4e0e\u8005\u8eab\u4efd"], "keywords": ["\u667a\u80fd\u4f53", "\u4eba\u673a\u534f\u4f5c", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04329v1", "published_at": "2026-07-05", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "HAS-Bench: Evaluating LLM-Based Human-Agent Systems under Configurable Human Participation", "tldr": "\u63d0\u51faHAS-Bench\u57fa\u51c6\uff0c\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u4e0e\u4eba\u7c7b\u534f\u4f5c\u7cfb\u7edf\u5728\u4e0d\u540c\u53c2\u4e0e\u914d\u7f6e\u4e0b\u7684\u8868\u73b0", "upvotes": 0, "what_it_is": "\u63d0\u51faHAS-Framework\u56fe\u7ed3\u6784\u6846\u67b6\u4e0eHAS-Bench\u57fa\u51c6\uff0c\u5c06\u4eba\u7c7b\u548cLLM\u667a\u80fd\u4f53\u5efa\u6a21\u4e3a\u5177\u6709\u660e\u786e\u89d2\u8272\u3001\u6743\u9650\u548c\u901a\u4fe1\u8def\u5f84\u7684\u53c2\u4e0e\u8005\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4eba\u673a\u534f\u4f5c\u7cfb\u7edf\u5728\u4e0d\u540c\u53c2\u4e0e\u5ea6\u3001\u4ea4\u4e92\u6e20\u9053\u548c\u89d2\u8272\u7b56\u7565\u4e0b\u7684\u4efb\u52a1\u5b8c\u6210\u4e0e\u534f\u4f5c\u884c\u4e3a\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u8bc4\u4f30\u4eba\u673a\u534f\u4f5c\u7cfb\u7edf\u4e2d\u4eba\u7c7b\u53c2\u4e0e\u914d\u7f6e\u5f71\u54cd\u7684\u57fa\u51c6\uff0c\u586b\u8865\u4e86LLM\u667a\u80fd\u4f53\u8bc4\u4f30\u4e2d\u5ffd\u89c6\u4eba\u7c7b\u4e3b\u52a8\u534f\u4f5c\u89d2\u8272\u7684\u7a7a\u767d\uff0c\u5bf9\u6784\u5efa\u66f4\u5b89\u5168\u3001\u53ef\u63a7\u7684\u4eba\u673a\u534f\u540c\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Unified Multimodal Models (UMMs) integrate image understanding and generation within a single architecture, yet how the two tasks interact remains understudied. We investigate $\\boldsymbol{\\mathsf{transferability}}$ in UMMs: whether training a capability on one task improves the same capability on the other without explicit supervision. Through controlled experiments, we empirically find that transferability depends on architecture-models with fully shared transformer backbone and a unified visual encoder exhibit consistent cross-task transfer, while loosely coupled designs show little or none. Leveraging this transferability, we propose a practical training strategy. The most straightforward way to improve a target generative capability (e.g., counting) is to fine-tune generation directly, but this can degrade visual quality due to distribution shift. Instead, we train the corresponding understanding task and let it transfer into generation, which improves capability-specific generative performance while minimizing distribution shift. We validate this across three capabilities-counting, spatial relation, and text recognition/generation-showing that cross-task transferability can be systematically exploited in UMMs.", "arxiv_id": "2607.04423", "arxiv_url": "https://arxiv.org/abs/2607.04423", "authors": ["Jiwon Kang", "Heeji Yoon", "Jaewoo Jung", "Jaewon Min", "Minkyeong Jeon", "Biyeon Hwang", "Sangwon Jung", "Seungryong Kim"], "brief": "\u7814\u7a76\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578b\uff08UMMs\uff09\u4e2d\u56fe\u50cf\u7406\u89e3\u4e0e\u751f\u6210\u4efb\u52a1\u4e4b\u95f4\u7684\u80fd\u529b\u8fc1\u79fb\u73b0\u8c61\uff0c\u5e76\u63d0\u51fa\u901a\u8fc7\u8bad\u7ec3\u7406\u89e3\u4efb\u52a1\u6765\u95f4\u63a5\u63d0\u5347\u751f\u6210\u80fd\u529b\u7684\u8bad\u7ec3\u7b56\u7565\uff0c\u907f\u514d\u76f4\u63a5\u5fae\u8c03\u751f\u6210\u4efb\u52a1\u5bfc\u81f4\u7684\u89c6\u89c9\u8d28\u91cf\u4e0b\u964d\u95ee\u9898\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04423", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8fc1\u79fb\u6027\u4f9d\u8d56\u67b6\u6784\u8bbe\u8ba1\uff1a\u5b8c\u5168\u5171\u4eabTransformer\u4e3b\u5e72\u548c\u7edf\u4e00\u89c6\u89c9\u7f16\u7801\u5668\u7684\u6a21\u578b\u5177\u6709\u7a33\u5b9a\u7684\u8de8\u4efb\u52a1\u8fc1\u79fb\u80fd\u529b\uff0c\u800c\u677e\u8026\u5408\u8bbe\u8ba1\u51e0\u4e4e\u65e0\u8fc1\u79fb\u6548\u679c", "\u63d0\u51fa\"\u4ee5\u7406\u89e3\u4fc3\u751f\u6210\"\u7b56\u7565\uff1a\u901a\u8fc7\u5fae\u8c03\u7406\u89e3\u4efb\u52a1\uff08\u5982\u8ba1\u6570\u3001\u7a7a\u95f4\u5173\u7cfb\u3001\u6587\u5b57\u8bc6\u522b\uff09\u5c06\u80fd\u529b\u8fc1\u79fb\u81f3\u751f\u6210\u4fa7\uff0c\u907f\u514d\u76f4\u63a5\u5fae\u8c03\u751f\u6210\u4efb\u52a1\u5f15\u53d1\u7684\u5206\u5e03\u504f\u79fb", "\u5728\u8ba1\u6570\u3001\u7a7a\u95f4\u5173\u7cfb\u3001\u6587\u5b57\u8bc6\u522b/\u751f\u6210\u4e09\u9879\u80fd\u529b\u4e0a\u9a8c\u8bc1\u4e86\u8de8\u4efb\u52a1\u8fc1\u79fb\u7684\u6709\u6548\u6027"], "keywords": ["\u591a\u6a21\u6001", "\u7edf\u4e00\u6a21\u578b", "\u8fc1\u79fb\u5b66\u4e60", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04423v2", "published_at": "2026-07-05", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Transferability Between Understanding and Generation in Unified Multimodal Models", "tldr": "\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578b\u4e2d\u7406\u89e3\u4e0e\u751f\u6210\u4efb\u52a1\u95f4\u5b58\u5728\u53ef\u8fc1\u79fb\u6027\uff0c\u5229\u7528\u7406\u89e3\u4efb\u52a1\u8bad\u7ec3\u53ef\u63d0\u5347\u751f\u6210\u80fd\u529b", "upvotes": 0, "what_it_is": "\u7814\u7a76\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578b\uff08UMMs\uff09\u4e2d\u56fe\u50cf\u7406\u89e3\u4e0e\u751f\u6210\u4efb\u52a1\u4e4b\u95f4\u7684\u80fd\u529b\u8fc1\u79fb\u73b0\u8c61\uff0c\u5e76\u63d0\u51fa\u901a\u8fc7\u8bad\u7ec3\u7406\u89e3\u4efb\u52a1\u6765\u95f4\u63a5\u63d0\u5347\u751f\u6210\u80fd\u529b\u7684\u8bad\u7ec3\u7b56\u7565\uff0c\u907f\u514d\u76f4\u63a5\u5fae\u8c03\u751f\u6210\u4efb\u52a1\u5bfc\u81f4\u7684\u89c6\u89c9\u8d28\u91cf\u4e0b\u964d\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u7814\u7a76UMMs\u4e2d\u7406\u89e3\u4e0e\u751f\u6210\u7684\u53cc\u5411\u8fc1\u79fb\u673a\u5236\uff0c\u63d0\u51fa\u4f4e\u526f\u4f5c\u7528\u7684\u5b9e\u7528\u8bad\u7ec3\u7b56\u7565\uff0c\u5bf9\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578b\u7684\u9ad8\u6548\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49"}, {"abstract": "SkillFab is an agent-native platform for turning missing capabilities into reviewed, reusable Agent Skills. At runtime, agents first search for reusable skills; when no adequate skill exists, the unmet capability becomes a demand-first issue before any repository or implementation branch needs to exist. Development then proceeds through a SkillFab-managed repository, Git-ingested commit evidence, maintainer review, and registry publication. The same lifecycle is exposed through web, REST, and MCP surfaces, so humans, scripts, and external agents operate on shared state rather than separate task logs. The current system uses scoped Git push URLs, native range commit ingestion, workflow-state reads, and workflow-event histories to make long-running agent work reviewable and recoverable. We document the platform model, architecture, implemented capabilities, and three case studies: an end-to-end OS-detect skill run, a Docker research package that converts operational practice into reusable skill knowledge, and an external optimization case showing how improved skill artifacts can enter SkillFab as reviewable, versioned submissions. Deployment: https://skillfab.ai.", "arxiv_id": "2607.03780", "arxiv_url": "https://arxiv.org/abs/2607.03780", "authors": ["Anjie Xu", "Yifeng Cai", "Yi Li", "Zixing Wang", "Zhiyu Zhang", "Jingfan Chen", "Ruohan Xu", "Leye Wang"], "brief": "SkillFab \u662f\u4e00\u4e2a\u9762\u5411\u667a\u80fd\u4f53\u7684\u6280\u80fd\u751f\u4ea7\u5e73\u53f0\uff0c\u901a\u8fc7\u9700\u6c42\u9a71\u52a8\u7684\u5de5\u4f5c\u6d41\uff0c\u5c06\u667a\u80fd\u4f53\u8fd0\u884c\u65f6\u7f3a\u5931\u7684\u80fd\u529b\u8f6c\u5316\u4e3a\u7ecf\u8fc7\u5ba1\u6838\u3001\u53ef\u590d\u7528\u7684 Agent Skills\uff0c\u5e76\u901a\u8fc7 Git \u4ed3\u5e93\u3001\u7ef4\u62a4\u8005\u5ba1\u67e5\u548c\u6ce8\u518c\u8868\u53d1\u5e03\u5b8c\u6210\u5b8c\u6574\u751f\u547d\u5468\u671f\u7ba1\u7406\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03780", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": ["\u9700\u6c42\u4f18\u5148\u673a\u5236\uff1a\u8fd0\u884c\u65f6\u667a\u80fd\u4f53\u5148\u641c\u7d22\u53ef\u590d\u7528\u6280\u80fd\uff0c\u65e0\u5339\u914d\u65f6\u81ea\u52a8\u521b\u5efa\u9700\u6c42 Issue\uff0c\u9a71\u52a8\u540e\u7eed\u5f00\u53d1\u6d41\u7a0b", "\u7edf\u4e00\u591a\u7aef\u63a5\u53e3\uff1a\u901a\u8fc7 Web\u3001REST \u548c MCP \u4e09\u79cd\u63a5\u53e3\u66b4\u9732\u76f8\u540c\u751f\u547d\u5468\u671f\uff0c\u4eba\u7c7b\u3001\u811a\u672c\u548c\u5916\u90e8\u667a\u80fd\u4f53\u5171\u4eab\u72b6\u6001\u800c\u975e\u5404\u81ea\u7ef4\u62a4\u4efb\u52a1\u65e5\u5fd7", "\u4e09\u4e2a\u6848\u4f8b\u9a8c\u8bc1\uff1aOS \u68c0\u6d4b\u6280\u80fd\u7aef\u5230\u7aef\u8fd0\u884c\u3001Docker \u7814\u7a76\u5305\u5c06\u64cd\u4f5c\u5b9e\u8df5\u8f6c\u5316\u4e3a\u53ef\u590d\u7528\u77e5\u8bc6\u3001\u5916\u90e8\u4f18\u5316\u6848\u4f8b\u5c55\u793a\u6280\u80fd\u5236\u54c1\u7684\u7248\u672c\u5316\u63d0\u4ea4\u6d41\u7a0b"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u8f6f\u4ef6\u5de5\u7a0b", "\u5de5\u5177\u5e73\u53f0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03780v1", "published_at": "2026-07-04", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "SkillFab: An Agent-Native Skill Production Platform", "tldr": "SkillFab\uff1a\u5c06\u667a\u80fd\u4f53\u7f3a\u5931\u80fd\u529b\u8f6c\u5316\u4e3a\u53ef\u590d\u7528\u6280\u80fd\u7684\u539f\u751f\u667a\u80fd\u4f53\u5e73\u53f0", "upvotes": 0, "what_it_is": "SkillFab \u662f\u4e00\u4e2a\u9762\u5411\u667a\u80fd\u4f53\u7684\u6280\u80fd\u751f\u4ea7\u5e73\u53f0\uff0c\u901a\u8fc7\u9700\u6c42\u9a71\u52a8\u7684\u5de5\u4f5c\u6d41\uff0c\u5c06\u667a\u80fd\u4f53\u8fd0\u884c\u65f6\u7f3a\u5931\u7684\u80fd\u529b\u8f6c\u5316\u4e3a\u7ecf\u8fc7\u5ba1\u6838\u3001\u53ef\u590d\u7528\u7684 Agent Skills\uff0c\u5e76\u901a\u8fc7 Git \u4ed3\u5e93\u3001\u7ef4\u62a4\u8005\u5ba1\u67e5\u548c\u6ce8\u518c\u8868\u53d1\u5e03\u5b8c\u6210\u5b8c\u6574\u751f\u547d\u5468\u671f\u7ba1\u7406\u3002", "why_notable": "\u9996\u4e2a\u5c06\u667a\u80fd\u4f53\u6280\u80fd\u751f\u4ea7\u6807\u51c6\u5316\u4e3a\u5e73\u53f0\u7ea7\u5de5\u7a0b\u6d41\u7a0b\u7684\u7cfb\u7edf\uff0c\u901a\u8fc7 Git \u539f\u751f\u96c6\u6210\u548c\u5ba1\u67e5\u673a\u5236\u89e3\u51b3\u4e86 LLM \u667a\u80fd\u4f53\u80fd\u529b\u590d\u7528\u4e0e\u53ef\u7ef4\u62a4\u6027\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5bf9 AI \u5de5\u7a0b\u5316\u843d\u5730\u5177\u6709\u5b9e\u8df5\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Vision-Language-Action (VLA) models are commonly treated as end-to-end action policies conditioned on natural-language task descriptions. In practice, however, their behavior often depends sharply on how the instruction is phrased, suggesting that language is not merely a task label but an optimizable conditioning input. We study whether frozen VLA policies can be improved by optimizing language space rather than updating action weights. Our method introduces a language-conditioning space policy that translates a human instruction into a short VLA-grounded command using object appearance, spatial relations, and target-grounding cues. The language-conditioning space policy is initialized with a failure-derived command-space prior and optimized with reinforcement learning from sparse task-completion rewards, while the downstream VLA remains fully frozen. This yields language-conditioning space optimization: RL discovers which VLA-grounded commands best elicit successful behavior from the frozen action policy. Experiments on RL4VLA and VL-Think show that language-conditioning space optimization improves success on instruction-sensitive, symbolic, and multi-object manipulation tasks, demonstrating that language can serve as an optimizable variable for a robot foundation models. Website: https://tttonyalpha.github.io/vla_grounder", "arxiv_id": "2607.04517", "arxiv_url": "https://arxiv.org/abs/2607.04517", "authors": ["Damir Shodiev", "Aleksei Staroverov", "Nikita Kachaev", "Alexey K. Kovalev", "Aleksandr I. Panov"], "brief": "\u63d0\u51faVLA Grounder\u65b9\u6cd5\uff0c\u901a\u8fc7\u4f18\u5316\u8bed\u8a00\u6761\u4ef6\u7a7a\u95f4\uff08\u800c\u975e\u66f4\u65b0\u6a21\u578b\u6743\u91cd\uff09\u6765\u63d0\u5347\u51bb\u7ed3VLA\u7b56\u7565\u7684\u6027\u80fd\u3002\u5229\u7528\u5f3a\u5316\u5b66\u4e60\u5c06\u4eba\u7c7b\u6307\u4ee4\u8f6c\u5316\u4e3a\u66f4\u9002\u5408VLA\u6a21\u578b\u7684\u63a5\u5730\u547d\u4ee4\uff0c\u5728\u591a\u79cd\u64cd\u4f5c\u4efb\u52a1\u4e0a\u663e\u8457\u63d0\u5347\u6210\u529f\u7387\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04517", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6761\u4ef6\u4f18\u5316", "\u673a\u5668\u4eba\u64cd\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04517v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "VLA Grounder: Language-Conditioning Space Optimization for Black-Box VLA Models", "tldr": "\u63d0\u51faVLA Grounder\u65b9\u6cd5\uff0c\u901a\u8fc7\u4f18\u5316\u8bed\u8a00\u6761\u4ef6\u7a7a\u95f4\uff08\u800c\u975e\u66f4\u65b0\u6a21\u578b\u6743\u91cd\uff09\u6765\u63d0\u5347\u51bb\u7ed3VLA\u7b56\u7565\u7684\u6027\u80fd\u3002\u5229\u7528\u5f3a\u5316\u5b66\u4e60\u5c06\u4eba\u7c7b\u6307\u4ee4\u8f6c\u5316\u4e3a\u66f4\u9002\u5408VLA\u6a21\u578b\u7684\u63a5\u5730\u547d\u4ee4\uff0c\u5728\u591a\u79cd\u64cd\u4f5c\u4efb\u52a1\u4e0a\u663e\u8457\u63d0\u5347\u6210\u529f\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Code language models are now trusted collaborators in production workflows for debugging, refactoring, and iterative repair, and every benchmark that evaluates them assumes the instructions they act on are correct. We study what happens when that assumption breaks. We evaluate code language models across four experiments designed to assess whether models resist or obey incorrect instructions in single-pass and iterative repair settings, using the RunBugRun dataset of algorithmic Python problems with deterministic test cases. Our findings reveal a striking behavioral pattern: models correctly identify an incorrect instruction as wrong, then follow it anyway. This compliance unknowingly introduces errors beyond the original bug, and the corrupted code state cannot be recovered through subsequent self-guided iterative repair, which fails to converge across passes. We term this Blind Obedience, characterize the Ghost (Unknown) Errors it introduces, quantify the proportion of cases where semantic corruption proves irrecoverable, and show that extended reasoning cannot reverse it. These findings surface behavioral properties invisible to pass-rate evaluation, with direct consequences for code language models deployed in production settings.", "arxiv_id": "2607.04537", "arxiv_url": "https://arxiv.org/abs/2607.04537", "authors": ["Raj Jaiswal", "Anany Singh Divy", "Savar Bhasin", "Adi Bajpai", "Tanuja Ganu", "Rajiv Ratn Shah"], "brief": "\u7814\u7a76\u53d1\u73b0\u4ee3\u7801\u5927\u8bed\u8a00\u6a21\u578b\u5b58\u5728\"\u76f2\u76ee\u670d\u4ece\"\u73b0\u8c61\uff1a\u5373\u4f7f\u6a21\u578b\u8bc6\u522b\u51fa\u6307\u4ee4\u6709\u8bef\uff0c\u4ecd\u4f1a\u6267\u884c\u9519\u8bef\u6307\u4ee4\uff0c\u5bfc\u81f4\u4ee3\u7801\u8bed\u4e49\u5d29\u6e83\uff0c\u4e14\u540e\u7eed\u8fed\u4ee3\u4fee\u590d\u65e0\u6cd5\u6062\u590d\uff0c\u6269\u5c55\u63a8\u7406\u4e5f\u65e0\u6cd5\u9006\u8f6c\u8fd9\u4e00\u95ee\u9898\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04537", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4ee3\u7801\u5927\u6a21\u578b", "\u9c81\u68d2\u6027", "\u8fed\u4ee3\u4fee\u590d", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04537v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Obey, Diverge, Collapse: Blind Obedience to Incorrect Instructions Drives Code LLMs to Irrecoverable Code Semantic Collapse", "tldr": "\u7814\u7a76\u53d1\u73b0\u4ee3\u7801\u5927\u8bed\u8a00\u6a21\u578b\u5b58\u5728\"\u76f2\u76ee\u670d\u4ece\"\u73b0\u8c61\uff1a\u5373\u4f7f\u6a21\u578b\u8bc6\u522b\u51fa\u6307\u4ee4\u6709\u8bef\uff0c\u4ecd\u4f1a\u6267\u884c\u9519\u8bef\u6307\u4ee4\uff0c\u5bfc\u81f4\u4ee3\u7801\u8bed\u4e49\u5d29\u6e83\uff0c\u4e14\u540e\u7eed\u8fed\u4ee3\u4fee\u590d\u65e0\u6cd5\u6062\u590d\uff0c\u6269\u5c55\u63a8\u7406\u4e5f\u65e0\u6cd5\u9006\u8f6c\u8fd9\u4e00\u95ee\u9898\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Camera-radar (CR) fusion is a practical sensing configuration for autonomous driving, but existing models are typically trained with task-specific supervision, limiting reusable representation learning. We present CRISP, a spatiotemporal CR backbone pretrained through forecasting-based representation learning. Given historical multi-view images and radar sweeps, CRISP learns a unified bird\u0027s-eye-view (BEV) representation by predicting future LiDAR point clouds. LiDAR is used only as privileged supervision during pretraining; the deployed model requires only camera and radar. To make forecasting-based pretraining effective for CR fusion, CRISP introduces an enhanced radar encoder, radar-enhanced temporal self-attention, and multimodal feature rendering with modality innovation gating. These components inject radar range and Doppler cues into BEV temporal propagation and allow BEV tokens to selectively incorporate camera and radar evidence. Experiments on nuScenes show that CRISP improves long-horizon point cloud forecasting and transfers effectively to downstream tasks, including 3D detection, tracking, online mapping, motion forecasting, future occupancy prediction, and planning, suggesting that predictive CR pretraining is a promising path toward scalable driving representations under practical sensor configurations. The project website is https://umfieldrobotics.github.io/CRISP.", "arxiv_id": "2607.04541", "arxiv_url": "https://arxiv.org/abs/2607.04541", "authors": ["Jingyu Song", "Yi Liu", "Katherine A. Skinner"], "brief": "\u63d0\u51faCRISP\uff0c\u4e00\u79cd\u57fa\u4e8e\u9884\u6d4b\u5f0f\u4e16\u754c\u6a21\u578b\u9884\u8bad\u7ec3\u7684\u65f6\u7a7a\u76f8\u673a-\u96f7\u8fbe\u9aa8\u5e72\u7f51\u7edc\uff0c\u901a\u8fc7\u9884\u6d4b\u672a\u6765LiDAR\u70b9\u4e91\u6765\u5b66\u4e60\u7edf\u4e00\u7684\u9e1f\u77b0\u56fe\u8868\u793a\uff0c\u90e8\u7f72\u65f6\u4ec5\u9700\u76f8\u673a\u548c\u96f7\u8fbe\u3002\u5728nuScenes\u4e0a\u9a8c\u8bc1\uff0cCRISP\u57283D\u68c0\u6d4b\u3001\u8ddf\u8e2a\u3001\u5728\u7ebf\u5efa\u56fe\u3001\u8fd0\u52a8\u9884\u6d4b\u3001\u672a\u6765\u5360\u7528\u9884\u6d4b\u548c\u89c4\u5212\u7b49\u591a\u9879\u4e0b\u6e38\u4efb\u52a1\u4e0a\u5747\u6709\u6548\u63d0\u5347\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04541", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u591a\u6a21\u6001", "\u4e16\u754c\u6a21\u578b", "\u9e1f\u77b0\u56fe\u8868\u793a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04541v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CRISP: A Spatiotemporal Camera-Radar Backbone for Driving via Forecasting-Based World-Model Pretraining", "tldr": "\u63d0\u51faCRISP\uff0c\u4e00\u79cd\u57fa\u4e8e\u9884\u6d4b\u5f0f\u4e16\u754c\u6a21\u578b\u9884\u8bad\u7ec3\u7684\u65f6\u7a7a\u76f8\u673a-\u96f7\u8fbe\u9aa8\u5e72\u7f51\u7edc\uff0c\u901a\u8fc7\u9884\u6d4b\u672a\u6765LiDAR\u70b9\u4e91\u6765\u5b66\u4e60\u7edf\u4e00\u7684\u9e1f\u77b0\u56fe\u8868\u793a\uff0c\u90e8\u7f72\u65f6\u4ec5\u9700\u76f8\u673a\u548c\u96f7\u8fbe\u3002\u5728nuScenes\u4e0a\u9a8c\u8bc1\uff0cCRISP\u57283D\u68c0\u6d4b\u3001\u8ddf\u8e2a\u3001\u5728\u7ebf\u5efa\u56fe\u3001\u8fd0\u52a8\u9884\u6d4b\u3001\u672a\u6765\u5360\u7528\u9884\u6d4b\u548c\u89c4\u5212\u7b49\u591a\u9879\u4e0b\u6e38\u4efb\u52a1\u4e0a\u5747\u6709\u6548\u63d0\u5347\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Action-conditioned world models allow robots to predict the future consequences of candidate actions without additional physical interaction, supporting policy evaluation, planning, and data augmentation. We present Mask2Real-WM, a two-stage action-conditioned world model for dexterous manipulation that decouples pixel prediction into a dynamics model and a rendering model. The dynamics model predicts future segmentation masks from past masks and 23-DoF action sequences. The rendering model maps the predicted masks to photorealistic RGB using a ControlNet-augmented Stable Video Diffusion backbone. The smaller sim-to-real gap in segmentation space enables the dynamics model to benefit from large-scale pretraining on over 50 h of synthetic simulation data, followed by fine-tuning on fewer than 2.5 h of real demonstrations. Experiments on a dexterous pick-and-place benchmark show that mask conditioning and simulation pretraining are both required for per-DoF action controllability across all 23 degrees of freedom. In contrast, monolithic baselines capture broad hand and end-effector trajectories but do not reliably reflect fine-grained, per-joint action effects.", "arxiv_id": "2607.04546", "arxiv_url": "https://arxiv.org/abs/2607.04546", "authors": ["Riccardo O. Feingold", "Davide Liconti", "Chenyu Yang", "Robert K. Katzschmann"], "brief": "\u63d0\u51faMask2Real-WM\uff0c\u4e00\u79cd\u4e24\u9636\u6bb5\u52a8\u4f5c\u6761\u4ef6\u4e16\u754c\u6a21\u578b\uff0c\u5c06\u50cf\u7d20\u9884\u6d4b\u89e3\u8026\u4e3a\u52a8\u6001\u6a21\u578b\uff08\u9884\u6d4b\u5206\u5272\u63a9\u7801\uff09\u548c\u6e32\u67d3\u6a21\u578b\uff08\u63a9\u7801\u8f6c\u771f\u5b9eRGB\u56fe\u50cf\uff09\u3002\u5229\u7528\u5206\u5272\u7a7a\u95f4\u7f29\u5c0f\u4eff\u771f\u5230\u771f\u5b9e\u7684\u5dee\u8ddd\uff0c\u5728\u5927\u89c4\u6a21\u5408\u6210\u6570\u636e\u9884\u8bad\u7ec3\u540e\u4ec5\u9700\u5c11\u91cf\u771f\u5b9e\u6570\u636e\u5fae\u8c03\uff0c\u5b9e\u73b0\u4e8623\u81ea\u7531\u5ea6\u7075\u5de7\u64cd\u4f5c\u7684\u7cbe\u7ec6\u52a8\u4f5c\u53ef\u63a7\u6027\u3002", "categories": ["cs.RO", "cs.AI", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04546", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u7075\u5de7\u64cd\u4f5c", "\u4eff\u771f\u5230\u771f\u5b9e\u8fc1\u79fb", "\u6269\u6563\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04546v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Mask2Real-WM: Segmentation Masks as a Sim-to-Real Bridge for Controllable Dexterous World Models", "tldr": "\u63d0\u51faMask2Real-WM\uff0c\u4e00\u79cd\u4e24\u9636\u6bb5\u52a8\u4f5c\u6761\u4ef6\u4e16\u754c\u6a21\u578b\uff0c\u5c06\u50cf\u7d20\u9884\u6d4b\u89e3\u8026\u4e3a\u52a8\u6001\u6a21\u578b\uff08\u9884\u6d4b\u5206\u5272\u63a9\u7801\uff09\u548c\u6e32\u67d3\u6a21\u578b\uff08\u63a9\u7801\u8f6c\u771f\u5b9eRGB\u56fe\u50cf\uff09\u3002\u5229\u7528\u5206\u5272\u7a7a\u95f4\u7f29\u5c0f\u4eff\u771f\u5230\u771f\u5b9e\u7684\u5dee\u8ddd\uff0c\u5728\u5927\u89c4\u6a21\u5408\u6210\u6570\u636e\u9884\u8bad\u7ec3\u540e\u4ec5\u9700\u5c11\u91cf\u771f\u5b9e\u6570\u636e\u5fae\u8c03\uff0c\u5b9e\u73b0\u4e8623\u81ea\u7531\u5ea6\u7075\u5de7\u64cd\u4f5c\u7684\u7cbe\u7ec6\u52a8\u4f5c\u53ef\u63a7\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We introduce Vidu S1, a real-time interactive video generation model supporting voice control of digital characters. Users can control video generation content at any moment through voice instructions. Vidu S1 supports infinite-length real-time video generation without blurring, drift, or visual distortion. Built with TurboDiffusion and TurboServe, Vidu S1 outputs 540p real-time videos at up to 42 FPS on regular consumer GPUs. Users can upload custom images of real people, anime, and pets, and choose different voice tones for personalized experiences. Experiments show that Vidu S1 achieves the best performance across all test metrics while fully meeting real-time inference requirements. A playable online demo is available at https://vidu.com/vidu-stream.", "arxiv_id": "2607.03118", "arxiv_url": "https://arxiv.org/abs/2607.03118", "authors": ["Jintao Zhang", "Kai Jiang", "Jintao Chen", "Xu Wang", "Yang Luo", "Yuji Wang", "Dechuang Chen", "Jungang Li", "Chengyang Ye", "Marco Chen", "Hongzhou Zhu", "Min Zhao", "Yuxuan Jiang", "Zhengkun Huang", "Chendong Xiang", "Kaiwen Zheng", "Haoxu Wang", "Xiaohang Wang", "Qi Jia", "Xin Chen", "Yimin Chen", "Youhe Jiang", "Fangcheng Fu", "Zhijie Deng", "Fan Bao", "Jianfei Chen", "Jun Zhu"], "brief": "Vidu S1\u662f\u4e00\u4e2a\u652f\u6301\u8bed\u97f3\u63a7\u5236\u6570\u5b57\u89d2\u8272\u7684\u5b9e\u65f6\u4ea4\u4e92\u5f0f\u89c6\u9891\u751f\u6210\u6a21\u578b\uff0c\u53ef\u5728\u6d88\u8d39\u7ea7GPU\u4e0a\u4ee5\u6700\u9ad842FPS\u751f\u6210540p\u65e0\u9650\u65f6\u957f\u89c6\u9891\uff0c\u65e0\u6a21\u7cca\u3001\u6f02\u79fb\u6216\u89c6\u89c9\u5931\u771f\u3002\u57fa\u4e8eTurboDiffusion\u548cTurboServe\u6784\u5efa\uff0c\u652f\u6301\u771f\u4eba\u3001\u52a8\u6f2b\u3001\u5ba0\u7269\u7b49\u81ea\u5b9a\u4e49\u56fe\u50cf\u4e0a\u4f20\uff0c\u5b9e\u9a8c\u8868\u660e\u5176\u5728\u6240\u6709\u6d4b\u8bd5\u6307\u6807\u4e0a\u5747\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03118", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u5b9e\u65f6\u63a8\u7406", "\u4ea4\u4e92\u5f0f\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03118v1", "published_at": "2026-07-03", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Vidu S1: A Real-Time Interactive Video Generation Model", "tldr": "Vidu S1\u662f\u4e00\u4e2a\u652f\u6301\u8bed\u97f3\u63a7\u5236\u6570\u5b57\u89d2\u8272\u7684\u5b9e\u65f6\u4ea4\u4e92\u5f0f\u89c6\u9891\u751f\u6210\u6a21\u578b\uff0c\u53ef\u5728\u6d88\u8d39\u7ea7GPU\u4e0a\u4ee5\u6700\u9ad842FPS\u751f\u6210540p\u65e0\u9650\u65f6\u957f\u89c6\u9891\uff0c\u65e0\u6a21\u7cca\u3001\u6f02\u79fb\u6216\u89c6\u89c9\u5931\u771f\u3002\u57fa\u4e8eTurboDiffusion\u548cTurboServe\u6784\u5efa\uff0c\u652f\u6301\u771f\u4eba\u3001\u52a8\u6f2b\u3001\u5ba0\u7269\u7b49\u81ea\u5b9a\u4e49\u56fe\u50cf\u4e0a\u4f20\uff0c\u5b9e\u9a8c\u8868\u660e\u5176\u5728\u6240\u6709\u6d4b\u8bd5\u6307\u6807\u4e0a\u5747\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "World models aim to capture environment dynamics in ways that support perception, reasoning, and action, and have recently become a central direction in Vision-Language-Action-World (VLAW) modeling. Meanwhile, unified vision-language models have demonstrated strong multimodal generation capabilities, yet their potential as world models remains underexplored. In this work, we introduce \\texttt{WorldBagel}, a unified VLAW framework built on BAGEL, a modern multimodal unified model, and use it to systematically investigate the role of unification in world modeling. Across multi-task robotic manipulation and cross-domain experiments, \\texttt{WorldBagel} consistently outperforms task-specific alternatives and learns action representations that are more structured and semantically aligned with visual and linguistic context. Experiments on LIBERO, Language Table, and Franka show that unification is not only an architectural convenience, but also a key factor in learning effective VLAW models, leading to consistent empirical gains and deeper insights into multimodal world modeling. Code and model checkpoints will be released upon acceptance.", "arxiv_id": "2607.03461", "arxiv_url": "https://arxiv.org/abs/2607.03461", "authors": ["Zelin Zhao", "Min Shi", "Bo Yuan", "Haotian Xue", "Jialuo Li", "Lama Moukheiber", "Humphrey Shi", "Yongxin Chen"], "brief": "\u63d0\u51faWorldBagel\u6846\u67b6\uff0c\u57fa\u4e8e\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578bBAGEL\u6784\u5efa\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c-\u4e16\u754c\uff08VLAW\uff09\u5efa\u6a21\u7cfb\u7edf\u3002\u5728\u591a\u4efb\u52a1\u673a\u5668\u4eba\u64cd\u63a7\u548c\u8de8\u57df\u5b9e\u9a8c\u4e2d\uff0cWorldBagel\u6301\u7eed\u4f18\u4e8e\u4efb\u52a1\u4e13\u7528\u6a21\u578b\uff0c\u8bc1\u660e\u7edf\u4e00\u67b6\u6784\u662f\u5b66\u4e60\u6709\u6548\u4e16\u754c\u6a21\u578b\u7684\u5173\u952e\u56e0\u7d20\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03461", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u4e16\u754c\u6a21\u578b", "\u673a\u5668\u4eba\u64cd\u63a7", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03461v1", "published_at": "2026-07-03", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "WorldBagel: Uncovering the Power of Unified Multimodal Models for Vision-Language-Action-World Modeling", "tldr": "\u63d0\u51faWorldBagel\u6846\u67b6\uff0c\u57fa\u4e8e\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578bBAGEL\u6784\u5efa\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c-\u4e16\u754c\uff08VLAW\uff09\u5efa\u6a21\u7cfb\u7edf\u3002\u5728\u591a\u4efb\u52a1\u673a\u5668\u4eba\u64cd\u63a7\u548c\u8de8\u57df\u5b9e\u9a8c\u4e2d\uff0cWorldBagel\u6301\u7eed\u4f18\u4e8e\u4efb\u52a1\u4e13\u7528\u6a21\u578b\uff0c\u8bc1\u660e\u7edf\u4e00\u67b6\u6784\u662f\u5b66\u4e60\u6709\u6548\u4e16\u754c\u6a21\u578b\u7684\u5173\u952e\u56e0\u7d20\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Feed-forward 3D reconstruction (F3R) transformers have recently achieved remarkable success. However, scaling them to long image sequences remains challenging, as the quadratic complexity of cross-view global attention quickly becomes the dominant computational bottleneck. While recent efforts attempt to improve efficiency through compressed or sparse attention, they fail to fully exploit the inherent sparsity and dynamic behavior of global attention. In this work, we present a comprehensive analysis of global attention across multiple F3R transformers and reveal that attention patterns are highly heterogeneous, dynamic, and extremely sparse across layers and attention heads. Motivated by these findings, we propose SAF3R, a training-free dynamic sparse attention framework tailored to F3R transformers. SAF3R integrates tailored sparse attention mechanisms with offline head profiling and an efficient online adaptation strategy to match input-dependent attention behaviors. Extensive experiments demonstrate that SAF3R achieves high sparsity ratios while preserving camera pose estimation and 3D reconstruction quality, translating into substantial end-to-end speedup on F3R transformers compared to existing methods. Code is available at https://github.com/jndeng/SAF3R", "arxiv_id": "2607.03612", "arxiv_url": "https://arxiv.org/abs/2607.03612", "authors": ["Jianing Deng", "Yuanzhe Li", "Jialu Wang", "Song Wang", "Tianlong Chen", "Huanrui Yang", "Jingtong Hu"], "brief": "\u9488\u5bf9\u524d\u9988\u5f0f3D\u91cd\u5efaTransformer\u4e2d\u8de8\u89c6\u56fe\u5168\u5c40\u6ce8\u610f\u529b\u7684\u4e8c\u6b21\u590d\u6742\u5ea6\u74f6\u9888\uff0c\u672c\u6587\u5206\u6790\u53d1\u73b0\u6ce8\u610f\u529b\u6a21\u5f0f\u5177\u6709\u9ad8\u5ea6\u5f02\u8d28\u6027\u3001\u52a8\u6001\u6027\u548c\u6781\u5ea6\u7a00\u758f\u6027\uff0c\u5e76\u63d0\u51fa\u65e0\u9700\u8bad\u7ec3\u7684\u52a8\u6001\u7a00\u758f\u6ce8\u610f\u529b\u6846\u67b6SAF3R\uff0c\u901a\u8fc7\u79bb\u7ebf\u5934\u90e8\u5206\u6790\u4e0e\u5728\u7ebf\u81ea\u9002\u5e94\u7b56\u7565\u5b9e\u73b0\u9ad8\u7a00\u758f\u7387\uff0c\u5728\u4fdd\u6301\u76f8\u673a\u4f4d\u59ff\u4f30\u8ba1\u548c3D\u91cd\u5efa\u8d28\u91cf\u7684\u540c\u65f6\u663e\u8457\u52a0\u901f\u63a8\u7406\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03612", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u91cd\u5efa", "\u7a00\u758f\u6ce8\u610f\u529b", "Transformer", "\u8ba1\u7b97\u6548\u7387"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03612v1", "published_at": "2026-07-03", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SAF3R: Dynamic Sparse Attention for Feed-Forward 3D Reconstruction Transformers", "tldr": "\u9488\u5bf9\u524d\u9988\u5f0f3D\u91cd\u5efaTransformer\u4e2d\u8de8\u89c6\u56fe\u5168\u5c40\u6ce8\u610f\u529b\u7684\u4e8c\u6b21\u590d\u6742\u5ea6\u74f6\u9888\uff0c\u672c\u6587\u5206\u6790\u53d1\u73b0\u6ce8\u610f\u529b\u6a21\u5f0f\u5177\u6709\u9ad8\u5ea6\u5f02\u8d28\u6027\u3001\u52a8\u6001\u6027\u548c\u6781\u5ea6\u7a00\u758f\u6027\uff0c\u5e76\u63d0\u51fa\u65e0\u9700\u8bad\u7ec3\u7684\u52a8\u6001\u7a00\u758f\u6ce8\u610f\u529b\u6846\u67b6SAF3R\uff0c\u901a\u8fc7\u79bb\u7ebf\u5934\u90e8\u5206\u6790\u4e0e\u5728\u7ebf\u81ea\u9002\u5e94\u7b56\u7565\u5b9e\u73b0\u9ad8\u7a00\u758f\u7387\uff0c\u5728\u4fdd\u6301\u76f8\u673a\u4f4d\u59ff\u4f30\u8ba1\u548c3D\u91cd\u5efa\u8d28\u91cf\u7684\u540c\u65f6\u663e\u8457\u52a0\u901f\u63a8\u7406\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern sequence models have a striking capacity for in-context learning (ICL); they can perform new tasks based only on examples given in the prompt. Understanding how this ability emerges requires theory that captures important properties of natural data. Linear regression has served as a useful sandbox for ICL theory, but existing work has largely focused on prompts with independent examples. In this work, we extend this setting to sequentially correlated data, a basic feature of real sequences. We present a solvable model based on linear attention and test our predictions on realistic transformer architectures. We identify two distinct effects: First, when the query token is independent of the context, within-context correlations induce an effective context length: correlated prompts behave like shorter i.i.d. prompts. Second, when the query is also correlated with its context, test error is reduced, particularly for softmax attention when compared to linear attention. These results suggest that correlated prompts alter not only the effective sample size of in-context learning, but also which attention architectures are best matched to the task.", "arxiv_id": "2607.03660", "arxiv_url": "https://arxiv.org/abs/2607.03660", "authors": ["Mary Letey", "Yue M. Lu", "Cengiz Pehlevan", "Jacob Zavatone-Veth"], "brief": "\u7814\u7a76\u4e86\u5e8f\u5217\u76f8\u5173\u6570\u636e\u5bf9\u4e0a\u4e0b\u6587\u5b66\u4e60\uff08ICL\uff09\u7684\u5f71\u54cd\uff0c\u53d1\u73b0\u76f8\u5173\u63d0\u793a\u4f1a\u4ea7\u751f\u4e24\u79cd\u6548\u679c\uff1a\u4e00\u662f\u5f15\u5165\"\u6709\u6548\u4e0a\u4e0b\u6587\u957f\u5ea6\"\u4f7f\u76f8\u5173\u63d0\u793a\u7b49\u6548\u4e8e\u66f4\u77ed\u7684\u72ec\u7acb\u540c\u5206\u5e03\u63d0\u793a\uff1b\u4e8c\u662f\u5f53\u67e5\u8be2\u4e0e\u4e0a\u4e0b\u6587\u76f8\u5173\u65f6\uff0csoftmax\u6ce8\u610f\u529b\u6bd4\u7ebf\u6027\u6ce8\u610f\u529b\u8868\u73b0\u66f4\u4f18\u3002\u7ed3\u679c\u8868\u660e\u5e8f\u5217\u76f8\u5173\u6027\u4e0d\u4ec5\u5f71\u54cd\u6709\u6548\u6837\u672c\u91cf\uff0c\u8fd8\u51b3\u5b9a\u4e86\u54ea\u79cd\u6ce8\u610f\u529b\u67b6\u6784\u66f4\u9002\u5408\u4efb\u52a1\u3002", "categories": ["stat.ML", "cs.LG", "stat.CO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03660", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e0a\u4e0b\u6587\u5b66\u4e60", "Transformer", "\u6ce8\u610f\u529b\u673a\u5236", "\u5e8f\u5217\u5efa\u6a21"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03660v1", "published_at": "2026-07-04", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Sequential Correlations Change In-Context Learning: Effective Context Length and Architectural Mismatch", "tldr": "\u7814\u7a76\u4e86\u5e8f\u5217\u76f8\u5173\u6570\u636e\u5bf9\u4e0a\u4e0b\u6587\u5b66\u4e60\uff08ICL\uff09\u7684\u5f71\u54cd\uff0c\u53d1\u73b0\u76f8\u5173\u63d0\u793a\u4f1a\u4ea7\u751f\u4e24\u79cd\u6548\u679c\uff1a\u4e00\u662f\u5f15\u5165\"\u6709\u6548\u4e0a\u4e0b\u6587\u957f\u5ea6\"\u4f7f\u76f8\u5173\u63d0\u793a\u7b49\u6548\u4e8e\u66f4\u77ed\u7684\u72ec\u7acb\u540c\u5206\u5e03\u63d0\u793a\uff1b\u4e8c\u662f\u5f53\u67e5\u8be2\u4e0e\u4e0a\u4e0b\u6587\u76f8\u5173\u65f6\uff0csoftmax\u6ce8\u610f\u529b\u6bd4\u7ebf\u6027\u6ce8\u610f\u529b\u8868\u73b0\u66f4\u4f18\u3002\u7ed3\u679c\u8868\u660e\u5e8f\u5217\u76f8\u5173\u6027\u4e0d\u4ec5\u5f71\u54cd\u6709\u6548\u6837\u672c\u91cf\uff0c\u8fd8\u51b3\u5b9a\u4e86\u54ea\u79cd\u6ce8\u610f\u529b\u67b6\u6784\u66f4\u9002\u5408\u4efb\u52a1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent AI-generated text detection work often introduces a new benchmark together with a specialized detector tailored to it. We revisit this practice from a baseline-first perspective. Across several benchmarks, we show that a plain, fully fine-tuned RoBERTa matches or exceeds the specialized detectors those benchmarks are built around. This suggests that much of the recent architectural complexity is not what drives strong in-distribution detection. The remaining challenge is the distribution shift. The same strong baseline degrades sharply when the topic domain or generating model changes at test time, and simply adding more source data does not close the gap. We identify a key failure mode: under distribution shift, the detector can assign high-confidence machine labels to human-written text from unseen domains. We then study two lightweight domain adaptation methods to address this problem: $K$-shot adaptation with first-order MAML over LoRA adapters, and a per-sample confidence-weighted ensemble built on top of the adapted detector. Overall, our results suggest that progress in AI-generated text detection should be measured not only by in-distribution performance, but also by robustness under distribution shift.", "arxiv_id": "2607.03680", "arxiv_url": "https://arxiv.org/abs/2607.03680", "authors": ["Zhuoer Shen", "Mingyi Wang", "Shaofeng Zou", "Yuheng Bu"], "brief": "\u7814\u7a76\u53d1\u73b0\u7b80\u5355\u5fae\u8c03\u7684RoBERTa\u57fa\u7ebf\u6a21\u578b\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u53ef\u5ab2\u7f8e\u751a\u81f3\u8d85\u8d8a\u4e13\u95e8\u8bbe\u8ba1\u7684AI\u6587\u672c\u68c0\u6d4b\u5668\uff0c\u8bf4\u660e\u8fd1\u671f\u67b6\u6784\u590d\u6742\u6027\u5e76\u975e\u5173\u952e\u3002\u771f\u6b63\u7684\u6311\u6218\u5728\u4e8e\u5206\u5e03\u504f\u79fb\u95ee\u9898\u2014\u2014\u5f53\u6d4b\u8bd5\u57df\u6216\u751f\u6210\u6a21\u578b\u6539\u53d8\u65f6\u68c0\u6d4b\u6027\u80fd\u6025\u5267\u4e0b\u964d\uff0c\u4f5c\u8005\u63d0\u51fa\u57fa\u4e8eMAML+LoRA\u7684K-shot\u81ea\u9002\u5e94\u548c\u7f6e\u4fe1\u5ea6\u52a0\u6743\u96c6\u6210\u4e24\u79cd\u8f7b\u91cf\u65b9\u6cd5\u6765\u7f13\u89e3\u8be5\u95ee\u9898\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03680", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["AI\u751f\u6210\u6587\u672c\u68c0\u6d4b", "\u5206\u5e03\u504f\u79fb", "\u57df\u81ea\u9002\u5e94", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03680v1", "published_at": "2026-07-04", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Rethinking AI-Generated Text Detection: A Strong Baseline and the Distribution-Shift Problem That Remains", "tldr": "\u7814\u7a76\u53d1\u73b0\u7b80\u5355\u5fae\u8c03\u7684RoBERTa\u57fa\u7ebf\u6a21\u578b\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u53ef\u5ab2\u7f8e\u751a\u81f3\u8d85\u8d8a\u4e13\u95e8\u8bbe\u8ba1\u7684AI\u6587\u672c\u68c0\u6d4b\u5668\uff0c\u8bf4\u660e\u8fd1\u671f\u67b6\u6784\u590d\u6742\u6027\u5e76\u975e\u5173\u952e\u3002\u771f\u6b63\u7684\u6311\u6218\u5728\u4e8e\u5206\u5e03\u504f\u79fb\u95ee\u9898\u2014\u2014\u5f53\u6d4b\u8bd5\u57df\u6216\u751f\u6210\u6a21\u578b\u6539\u53d8\u65f6\u68c0\u6d4b\u6027\u80fd\u6025\u5267\u4e0b\u964d\uff0c\u4f5c\u8005\u63d0\u51fa\u57fa\u4e8eMAML+LoRA\u7684K-shot\u81ea\u9002\u5e94\u548c\u7f6e\u4fe1\u5ea6\u52a0\u6743\u96c6\u6210\u4e24\u79cd\u8f7b\u91cf\u65b9\u6cd5\u6765\u7f13\u89e3\u8be5\u95ee\u9898\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "With the rise of small quantized GGUF-based language models and their increasing use for on-device inference tasks, we have seen the growing need for an approach capable of reliably delivering these models at scale even under severe memory bandwidth constraints such as those imposed by pure CPU implementations. Fixed-depth speculative decoding has emerged as one promising technique, but in practice, it often leads to performance degradation due to either bandwidth saturation, instability, or even catastrophic resource exhaustion resulting in system failure. To overcome this problem, we introduce AdaptiveSD, a fully runtime-adaptive speculative decoding framework aimed at ensuring robust, reliable execution across the spectrum of model types and workloads. Our solution consists of four tightly-coupled components working together in a continuous feedback loop: a Runtime Monitoring Engine tracking multiple signals relevant to ongoing computation, an Adaptive Draft Controller enforcing an eleven rule policy hierarchy prioritizing system resource preservation over raw draft count, a Dynamic Policy Engine employing a suite of heuristic and reinforcement learning techniques to dynamically modify policies depending upon workload behavior, and finally, a KV Cache Coordination Layer managing cache states with fine-grained control through INT8 shadow buffers and position aware evictions. While conventional approaches focus solely on maximizing throughput, we instead assess the effectiveness of our approach based on several key metrics including wasted drafted compute and inter-token latency dispersion alongside standard measures of speculative efficiency.", "arxiv_id": "2607.03876", "arxiv_url": "https://arxiv.org/abs/2607.03876", "authors": ["Sadra Saremi"], "brief": "AdaptiveSD\u662f\u4e00\u4e2a\u9762\u5411CPU\u53d7\u9650\u73af\u5883\u7684\u81ea\u9002\u5e94\u63a8\u6d4b\u89e3\u7801\u6846\u67b6\uff0c\u901a\u8fc7\u8fd0\u884c\u65f6\u76d1\u63a7\u3001\u81ea\u9002\u5e94\u8349\u7a3f\u63a7\u5236\u3001\u52a8\u6001\u7b56\u7565\u5f15\u64ce\u548cKV\u7f13\u5b58\u534f\u8c03\u56db\u4e2a\u6a21\u5757\u534f\u540c\u5de5\u4f5c\uff0c\u89e3\u51b3\u56fa\u5b9a\u6df1\u5ea6\u63a8\u6d4b\u89e3\u7801\u5728\u5185\u5b58\u5e26\u5bbd\u53d7\u9650\u573a\u666f\u4e0b\u7684\u4e0d\u7a33\u5b9a\u548c\u8d44\u6e90\u8017\u5c3d\u95ee\u9898\u3002\u8be5\u6846\u67b6\u5f15\u5165\u5f3a\u5316\u5b66\u4e60\u4e0e\u542f\u53d1\u5f0f\u7b56\u7565\u52a8\u6001\u8c03\u6574\u89e3\u7801\u884c\u4e3a\uff0c\u5728\u4fdd\u969c\u7cfb\u7edf\u7a33\u5b9a\u6027\u7684\u540c\u65f6\u4f18\u5316\u63a8\u7406\u6548\u7387\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03876", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "\u63a8\u6d4b\u89e3\u7801", "\u5f3a\u5316\u5b66\u4e60", "\u8fb9\u7f18\u90e8\u7f72"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03876v1", "published_at": "2026-07-04", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AdaptiveSD A Stability-Aware, Runtime-Adaptive Speculative Decoding Framework with Multi-Policy Orchestration for CPU-Constrained LLM Inference", "tldr": "AdaptiveSD\u662f\u4e00\u4e2a\u9762\u5411CPU\u53d7\u9650\u73af\u5883\u7684\u81ea\u9002\u5e94\u63a8\u6d4b\u89e3\u7801\u6846\u67b6\uff0c\u901a\u8fc7\u8fd0\u884c\u65f6\u76d1\u63a7\u3001\u81ea\u9002\u5e94\u8349\u7a3f\u63a7\u5236\u3001\u52a8\u6001\u7b56\u7565\u5f15\u64ce\u548cKV\u7f13\u5b58\u534f\u8c03\u56db\u4e2a\u6a21\u5757\u534f\u540c\u5de5\u4f5c\uff0c\u89e3\u51b3\u56fa\u5b9a\u6df1\u5ea6\u63a8\u6d4b\u89e3\u7801\u5728\u5185\u5b58\u5e26\u5bbd\u53d7\u9650\u573a\u666f\u4e0b\u7684\u4e0d\u7a33\u5b9a\u548c\u8d44\u6e90\u8017\u5c3d\u95ee\u9898\u3002\u8be5\u6846\u67b6\u5f15\u5165\u5f3a\u5316\u5b66\u4e60\u4e0e\u542f\u53d1\u5f0f\u7b56\u7565\u52a8\u6001\u8c03\u6574\u89e3\u7801\u884c\u4e3a\uff0c\u5728\u4fdd\u969c\u7cfb\u7edf\u7a33\u5b9a\u6027\u7684\u540c\u65f6\u4f18\u5316\u63a8\u7406\u6548\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In-context learning (ICL) has emerged as a central capability of pretrained language models, yet its theoretical analysis has focused primarily on causal language models trained by left-to-right autoregressive prediction, such as GPT-style models. Masked language models instead recover masked tokens from bidirectional context, and their role in ICL remains less understood. We develop a statistical learning framework that represents the context examples by their empirical measure and models prediction as a function of the context and the query. This formulation places autoregressive and masked pretraining objectives within a common excess-risk analysis. Under Wasserstein-type regularity conditions, we relate pretraining with T tasks and N samples per task to k-shot excess risk at inference, obtaining same-order upper bounds for masked and autoregressive objectives. We also study task-distribution shift, where pretraining tasks are sampled from P and inference tasks from Q; the resulting bound contains an additional term controlled by the lifted Wasserstein distance between P and Q. The bounds further imply an order-optimal allocation under a fixed pretraining data budget and refined rates under intrinsic low-dimensional structure. Experiments on controlled function-learning tasks show that the Masked Pair Encoder (MPE) can achieve performance comparable to GPT-2-style causal Transformers, suggesting that ICL behavior is not specific to causal language models.", "arxiv_id": "2607.04081", "arxiv_url": "https://arxiv.org/abs/2607.04081", "authors": ["Chenrui Liu", "Chuanlong Xie", "Falong Tan", "Yicheng Zeng", "Lixing Zhu"], "brief": "\u63d0\u51fa\u7edf\u4e00\u7684\u4e0a\u4e0b\u6587\u5b66\u4e60\uff08ICL\uff09\u7edf\u8ba1\u5b66\u4e60\u6846\u67b6\uff0c\u5c06\u56e0\u679c\u8bed\u8a00\u6a21\u578b\uff08GPT\u98ce\u683c\uff09\u548c\u63a9\u7801\u8bed\u8a00\u6a21\u578b\uff08BERT\u98ce\u683c\uff09\u7eb3\u5165\u540c\u4e00\u8d85\u989d\u98ce\u9669\u5206\u6790\u4f53\u7cfb\u3002\u7406\u8bba\u4e0a\u8bc1\u660e\u4e24\u7c7b\u9884\u8bad\u7ec3\u76ee\u6807\u5728ICL\u4e2d\u5177\u6709\u540c\u9636\u4e0a\u754c\uff0c\u5b9e\u9a8c\u8868\u660e\u63a9\u7801\u5bf9\u7f16\u7801\u5668\uff08MPE\uff09\u53ef\u8fbe\u5230\u4e0eGPT-2\u76f8\u5f53\u7684ICL\u6027\u80fd\uff0c\u8bf4\u660eICL\u80fd\u529b\u5e76\u975e\u56e0\u679c\u8bed\u8a00\u6a21\u578b\u6240\u72ec\u6709\u3002", "categories": ["cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04081", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b", "\u7edf\u8ba1\u5b66\u4e60\u7406\u8bba", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04081v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A Unified Framework for In-Context Learning with Causal and Masked Language Models", "tldr": "\u63d0\u51fa\u7edf\u4e00\u7684\u4e0a\u4e0b\u6587\u5b66\u4e60\uff08ICL\uff09\u7edf\u8ba1\u5b66\u4e60\u6846\u67b6\uff0c\u5c06\u56e0\u679c\u8bed\u8a00\u6a21\u578b\uff08GPT\u98ce\u683c\uff09\u548c\u63a9\u7801\u8bed\u8a00\u6a21\u578b\uff08BERT\u98ce\u683c\uff09\u7eb3\u5165\u540c\u4e00\u8d85\u989d\u98ce\u9669\u5206\u6790\u4f53\u7cfb\u3002\u7406\u8bba\u4e0a\u8bc1\u660e\u4e24\u7c7b\u9884\u8bad\u7ec3\u76ee\u6807\u5728ICL\u4e2d\u5177\u6709\u540c\u9636\u4e0a\u754c\uff0c\u5b9e\u9a8c\u8868\u660e\u63a9\u7801\u5bf9\u7f16\u7801\u5668\uff08MPE\uff09\u53ef\u8fbe\u5230\u4e0eGPT-2\u76f8\u5f53\u7684ICL\u6027\u80fd\uff0c\u8bf4\u660eICL\u80fd\u529b\u5e76\u975e\u56e0\u679c\u8bed\u8a00\u6a21\u578b\u6240\u72ec\u6709\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are increasingly used as evolutionary engines for scientific discovery: generate candidates, select winners, feed them back as parents, and repeat. We audit whether this loop actually compounds discovery in scientific equation discovery, a setting where finite samples make structure underdetermined and interpolation easy. Under matched LLM-call budgets, parent-conditioned evolution is indistinguishable from fresh independent sampling: median OOD NMSE is 0.045 vs. 0.049, instructed multi-parent crossover is worse, final success is predicted by initial proposal quality, and multiple iteration schemes fail to add solved problems. Operationally, the loop reduces to what it produces: a dictionary of candidate terms. We turn that diagnosis into PTB-Search, a one-generation method for componentized scientific discovery. PTB-Search samples independent LLM proposals once, extracts reusable terms into a per-problem dictionary, and performs train-only set-level sparse selection with least-squares coefficients. Its central principle is that underdetermined data identifies the joint behavior of term sets, not reliable per-term credit. On identical dictionaries and zero additional LLM calls, set-level selectors solve 165--169 of 717 cells, while single-term reductions solve only 74--78. On the official 239-problem LLM-SRBench split, PTB-Search reaches 73.2% Acc0.1 with Llama-3.1-8B and 77.0% with a single-seed DeepSeek-V4 anchor, versus 49.2% for the best reported baseline, using one tenth of the standardized call budget. A program-domain stress test gives a scoped boundary: generation count remains unreliable, while retained external state can help in harder non-linear spaces. Across these results, LLMs are best understood as material suppliers; discovery is carried by external set-level selection over reusable components.", "arxiv_id": "2607.04108", "arxiv_url": "https://arxiv.org/abs/2607.04108", "authors": ["Pan Li"], "brief": "\u7814\u7a76\u53d1\u73b0LLM\u8fdb\u5316\u5faa\u73af\uff08\u751f\u6210-\u9009\u62e9-\u53cd\u9988\uff09\u5728\u79d1\u5b66\u65b9\u7a0b\u53d1\u73b0\u4e2d\u5e76\u4e0d\u6bd4\u72ec\u7acb\u91c7\u6837\u66f4\u6709\u6548\uff0c\u7236\u4ee3\u6761\u4ef6\u8fdb\u5316\u4e0e\u65b0\u9c9c\u91c7\u6837\u6027\u80fd\u76f8\u5f53\u3002\u4f5c\u8005\u63d0\u51faPTB-Search\u65b9\u6cd5\uff1a\u4e00\u6b21\u6027\u91c7\u6837LLM\u63d0\u6848\uff0c\u6784\u5efa\u5019\u9009\u9879\u5b57\u5178\uff0c\u518d\u7528\u96c6\u5408\u7ea7\u7a00\u758f\u9009\u62e9\u66ff\u4ee3\u9010\u9879\u7b5b\u9009\uff0c\u5728LLM-SRBench\u4e0a\u4ee51/10\u7684\u8c03\u7528\u9884\u7b97\u5c06\u51c6\u786e\u7387\u4ece49.2%\u63d0\u5347\u81f377.0%\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04108", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u79d1\u5b66\u53d1\u73b0", "\u7b26\u53f7\u56de\u5f52", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8fdb\u5316\u7b97\u6cd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04108v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Dictionaries, Not Darwin: Set-Level Selection Beats LLM Evolution in Scientific Equation Discovery", "tldr": "\u7814\u7a76\u53d1\u73b0LLM\u8fdb\u5316\u5faa\u73af\uff08\u751f\u6210-\u9009\u62e9-\u53cd\u9988\uff09\u5728\u79d1\u5b66\u65b9\u7a0b\u53d1\u73b0\u4e2d\u5e76\u4e0d\u6bd4\u72ec\u7acb\u91c7\u6837\u66f4\u6709\u6548\uff0c\u7236\u4ee3\u6761\u4ef6\u8fdb\u5316\u4e0e\u65b0\u9c9c\u91c7\u6837\u6027\u80fd\u76f8\u5f53\u3002\u4f5c\u8005\u63d0\u51faPTB-Search\u65b9\u6cd5\uff1a\u4e00\u6b21\u6027\u91c7\u6837LLM\u63d0\u6848\uff0c\u6784\u5efa\u5019\u9009\u9879\u5b57\u5178\uff0c\u518d\u7528\u96c6\u5408\u7ea7\u7a00\u758f\u9009\u62e9\u66ff\u4ee3\u9010\u9879\u7b5b\u9009\uff0c\u5728LLM-SRBench\u4e0a\u4ee51/10\u7684\u8c03\u7528\u9884\u7b97\u5c06\u51c6\u786e\u7387\u4ece49.2%\u63d0\u5347\u81f377.0%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large Vision-Language Models (LVLMs) have shown strong multimodal understanding and spatial grounding, but their computational cost limits real-time robotic control. In contrast, lightweight models are suitable for edge deployment but often suffer from \"spatial blindness\", namely weak native spatial prediction ability. Training Vision-Language-Action (VLA) models on mixed human demonstrations can also degrade policy performance due to highly diverse behaviors. To address these limitations, we propose XS-VLA, a two-stage framework for efficient and spatially grounded robotic manipulation. First, we distill spatial semantic knowledge from Qwen3-VL-4B into the SmolVLM2-0.25B backbone by fine-tuning on curated coarse-grained spatial descriptions, turning the lightweight model into a spatially grounded engine. Second, we use this enhanced backbone to condition a Latent Flow Matching policy. Unlike deterministic controllers, our policy combines a Conditional Variational Autoencoder (CVAE) with Flow Matching dynamics to model complex multimodal action distributions. On the LIBERO benchmark, XS-VLA achieves state-of-the-art performance among models with fewer than 0.5B parameters. It improves average success rates by up to 7.2 percent, including a 23 percent gain on LIBERO-Long, over the SmolVLA 0.25B baseline, and outperforms the larger 2.2B vanilla SmolVLA. Ablations show that spatial tuning and generative latent flow control substantially improve lightweight VLA performance, delivering a 3.2 times speedup in mission execution over the previous lightweight flow matching policy.", "arxiv_id": "2607.04171", "arxiv_url": "https://arxiv.org/abs/2607.04171", "authors": ["Lei Iok Tong", "Qingchen Xie", "Wei Huang", "Ying Jie Yap", "Yujie Zhang", "Qianzhi Li", "Xiaolong Liu", "Zhidong Deng"], "brief": "\u63d0\u51faXS-VLA\u4e24\u9636\u6bb5\u6846\u67b6\uff1a\u5148\u5c06Qwen3-VL-4B\u7684\u7a7a\u95f4\u8bed\u4e49\u77e5\u8bc6\u84b8\u998f\u52300.25B\u8f7b\u91cf\u6a21\u578b\uff0c\u518d\u7ed3\u5408CVAE\u4e0e\u6d41\u5339\u914d\u7b56\u7565\u5efa\u6a21\u591a\u6a21\u6001\u52a8\u4f5c\u5206\u5e03\u3002\u5728LIBERO\u57fa\u51c6\u4e0a\uff0c0.25B\u53c2\u6570\u91cf\u4e0b\u8fbe\u5230\u6700\u4f18\uff0c\u5e73\u5747\u6210\u529f\u7387\u63d0\u53477.2%\uff0c\u6267\u884c\u901f\u5ea6\u63d0\u53473.2\u500d\u3002", "categories": ["cs.RO", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04171", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b", "\u77e5\u8bc6\u84b8\u998f", "\u6d41\u5339\u914d", "\u673a\u5668\u4eba\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04171v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "XS-VLA: Coupling Coarse-grained Spatial Distillation with Latent Flow Matching for Lightweight Robotic Control", "tldr": "\u63d0\u51faXS-VLA\u4e24\u9636\u6bb5\u6846\u67b6\uff1a\u5148\u5c06Qwen3-VL-4B\u7684\u7a7a\u95f4\u8bed\u4e49\u77e5\u8bc6\u84b8\u998f\u52300.25B\u8f7b\u91cf\u6a21\u578b\uff0c\u518d\u7ed3\u5408CVAE\u4e0e\u6d41\u5339\u914d\u7b56\u7565\u5efa\u6a21\u591a\u6a21\u6001\u52a8\u4f5c\u5206\u5e03\u3002\u5728LIBERO\u57fa\u51c6\u4e0a\uff0c0.25B\u53c2\u6570\u91cf\u4e0b\u8fbe\u5230\u6700\u4f18\uff0c\u5e73\u5747\u6210\u529f\u7387\u63d0\u53477.2%\uff0c\u6267\u884c\u901f\u5ea6\u63d0\u53473.2\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Diffusion language models (dLLMs) generate text by iteratively denoising a masked response and can commit multiple output positions per model invocation. Their bidirectional attention prevents exact autoregressive-style KV caching, since committing one position shifts the KV activations of all others. Approximate caching techniques such as Fast-dLLM and dKV-Cache refresh KV activations repeatedly and reuse them across intervening decodes, inducing a repeated prefill/decode structure. This makes AR serving mechanisms relevant to dLLMs, but not directly applicable. dLLM decodes are block-sized rather than token-sized, prefills recur, and bidirectional attention precludes the chunked prefill mechanism used for stall-free colocated serving. We present Sangam, a serving system for cached dLLM inference. Sangam introduces a deficit token-budget scheduler that admits in-flight decodes first, admits whole indivisible prefills only when the accumulated token budget allows, and carries unused budget forward. This achieves amortized stall-free scheduling. Disaggregated serving avoids prefill-decode interference but suffers from prefill/decode resource partitioning problem. Sangam adopts a hybrid serving strategy, overflowing prefills onto decode workers to relieve prefill under-provisioning, and uses the same deficit-budget scheduler to protect those workers\u0027 decodes from the overflow. We show that like AR serving, dLLM serving design space is governed by prefill-decode interference and prefill/decode partitioning. Colocated serving is most effective on decode-heavy workloads, cutting mean latency by 9-20% over hybrid execution on LLaDA-8B ShareGPT; while hybrid execution is most effective on prefill-heavy workloads, cutting mean latency by 8-20% over colocated execution on Dream-7B arXiv. Sangam is available at https://github.com/UT-InfraAI/sangam.", "arxiv_id": "2607.04206", "arxiv_url": "https://arxiv.org/abs/2607.04206", "authors": ["Nitin Kedia", "Saurabh Agarwal", "Myungjin Lee", "Aditya Akella"], "brief": "Sangam\u662f\u4e00\u4e2a\u4e13\u4e3a\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff08dLLM\uff09\u8bbe\u8ba1\u7684\u63a8\u7406\u670d\u52a1\u7cfb\u7edf\uff0c\u9488\u5bf9\u5176\u53cc\u5411\u6ce8\u610f\u529b\u5bfc\u81f4\u65e0\u6cd5\u76f4\u63a5\u590d\u7528\u81ea\u56de\u5f52KV\u7f13\u5b58\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u8d64\u5b57\u4ee4\u724c\u9884\u7b97\u8c03\u5ea6\u5668\u548c\u6df7\u5408\u670d\u52a1\u7b56\u7565\u3002\u5728LLaDA-8B\u548cDream-7B\u4e0a\uff0c\u76f8\u6bd4\u57fa\u7ebf\u65b9\u6848\u53ef\u964d\u4f4e\u5e73\u5747\u5ef6\u8fdf8-20%\u3002", "categories": ["cs.DC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04206", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "KV\u7f13\u5b58", "\u670d\u52a1\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04206v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Sangam: Efficiently Serving Diffusion LLMs with the AR Stack", "tldr": "Sangam\u662f\u4e00\u4e2a\u4e13\u4e3a\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff08dLLM\uff09\u8bbe\u8ba1\u7684\u63a8\u7406\u670d\u52a1\u7cfb\u7edf\uff0c\u9488\u5bf9\u5176\u53cc\u5411\u6ce8\u610f\u529b\u5bfc\u81f4\u65e0\u6cd5\u76f4\u63a5\u590d\u7528\u81ea\u56de\u5f52KV\u7f13\u5b58\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u8d64\u5b57\u4ee4\u724c\u9884\u7b97\u8c03\u5ea6\u5668\u548c\u6df7\u5408\u670d\u52a1\u7b56\u7565\u3002\u5728LLaDA-8B\u548cDream-7B\u4e0a\uff0c\u76f8\u6bd4\u57fa\u7ebf\u65b9\u6848\u53ef\u964d\u4f4e\u5e73\u5747\u5ef6\u8fdf8-20%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This report describes our approach to the Efficient Qwen Competition, where the goal is to enable low-latency serving of Qwen3.5-4B on a resource-constrained NVIDIA A10G GPU. Our system combines a quantized target model with speculative decoding. To recover accuracy, we apply quantization-aware distillation to the target model while retaining the original quantization grid. To speed up decoding, a block-diffusion drafter specialized for the quantized target model is trained using a two-stage procedure: first learning from the high-precision target and then adapting to the low-precision target. Because the drafter is invoked at every speculative decoding step, we further reduce its overhead with quantization and sliding-window attention, preserving draft-token acceptance while improving long-context decoding latency. As a result, our submission achieves a 6.978$\\times$ average speedup over the baseline while satisfying the required quality thresholds, ranking 3rd overall. We hope these results provide useful insights for practical LLM inference. The code and resources are available at https://github.com/nota-github/adaptfm-quant-dflash", "arxiv_id": "2607.04244", "arxiv_url": "https://arxiv.org/abs/2607.04244", "authors": ["Jaeyeon Kim", "Jewon Lee", "Bo-Kyeong Kim"], "brief": "\u9488\u5bf9\u8d44\u6e90\u53d7\u9650GPU\u4e0a\u7684Qwen3.5-4B\u9ad8\u6548\u63a8\u7406\uff0c\u7ed3\u5408\u91cf\u5316\u611f\u77e5\u84b8\u998f\u4e0e\u6295\u673a\u89e3\u7801\u6280\u672f\uff0c\u8bad\u7ec3\u4e13\u4e3a\u91cf\u5316\u76ee\u6807\u6a21\u578b\u5b9a\u5236\u7684\u5757\u6269\u6563\u8349\u7a3f\u6a21\u578b\uff0c\u5e76\u5bf9\u8349\u7a3f\u6a21\u578b\u8fdb\u4e00\u6b65\u91cf\u5316\u548
