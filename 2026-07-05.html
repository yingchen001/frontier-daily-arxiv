const PAPERS = [{"abstract": "Accurate protein-protein interaction (PPI) prediction is central to functional genomics, disease mechanism discovery, and drug development. A difficult setting arises when candidate interactions include proteins that have no observed PPI edges during training, where models relying on network topology alone often lose useful context. This paper presents \\method, a multimodal representation framework for cold-start PPI prediction. \\method\\ combines region-aware protein sequence encoding with four protein-centered biomedical knowledge graphs, including protein-drug, protein-disease, protein-miRNA, and protein-lncRNA associations. The sequence branch extracts contextual representations from structurally informed sequence regions, while graph attention encoders learn modality-specific protein embeddings from sparse biomedical associations. A bridge reconstruction objective regularizes graph learning by recovering shared protein-entity associations, and a pair-level gating module adaptively integrates sequence and graph evidence for each candidate protein pair. Experiments on two benchmark datasets under novel-old and novel-novel cold-start settings show that \\method\\ consistently outperforms competitive sequence, network, and knowledge-graph baselines across ACC, F1, AUC, AUPR, and MCC.", "arxiv_id": "2607.01627", "arxiv_url": "https://arxiv.org/abs/2607.01627", "authors": ["Wenbo Zhang"], "brief": "\u63d0\u51faMKGR\u6846\u67b6\uff0c\u878d\u5408\u533a\u57df\u611f\u77e5\u86cb\u767d\u8d28\u5e8f\u5217\u7f16\u7801\u4e0e\u56db\u7c7b\u751f\u7269\u533b\u5b66\u77e5\u8bc6\u56fe\u8c31\uff08\u86cb\u767d\u8d28-\u836f\u7269\u3001\u86cb\u767d\u8d28-\u75be\u75c5\u3001\u86cb\u767d\u8d28-miRNA\u3001\u86cb\u767d\u8d28-lncRNA\uff09\uff0c\u4e13\u95e8\u5e94\u5bf9\u8bad\u7ec3\u65f6\u65e0\u5df2\u77e5\u4ea4\u4e92\u8fb9\u7684\u51b7\u542f\u52a8\u86cb\u767d\u8d28\u76f8\u4e92\u4f5c\u7528\u9884\u6d4b\u573a\u666f\u3002", "categories": ["cs.LG", "cs.AI"], "github_rep 684\u51b7\u542f\u52a8\u86cb\u767d\u8d28\u76f8\u4e92\u4f5c\u7528\u9884\u6d4b\u573a\u666f\u3002", "why_notable": "\u51b7\u542f\u52a8PPI\u9884\u6d4b\u662f\u529f\u80fd\u57fa\u56e0\u7ec4\u5b66\u548c\u836f\u7269\u5f00\u53d1\u4e2d\u7684\u6838\u5fc3\u96be\u9898\uff0cMKGR\u901a\u8fc7\u591a\u6a21\u6001\u77e5\u8bc6\u56fe\u8c31\u6709\u6548\u5f25\u8865\u62d3\u6251\u4fe1\u606f\u7f3a\u5931\uff0c\u4e3a\u65b0\u86cb\u767d\u8d28\u7684\u529f\u80fd\u6ce8\u91ca\u548c\u75be\u75c5\u673a\u5236\u7814\u7a76\u63d0\u4f9b\u5b9e\u7528\u5de5\u5177\u3002"}, {"abstract": "Fine-scale rainfall reconstruction is critical for urban flood modeling, but real rainfall sensing systems observe the field through incompatible spatial supports: gauges measure points, microwave links measure paths, and radar/satellite products measure gridded areas. These differences in measurement support impose geometrically distinct constraints on the rainfall field, yet existing heterogeneous graph approaches reconcile such sources in feature space, giving each its own embedding while discarding the geometry of its support. We propose a geometry-aware multi-support heterogeneous graph neural network that represents each observation according to its support type (0D point, 1D line, or 2D grid) as a distinct node layer, and fuses them through cross-support message passing into a point-support prediction layer from which the field is reconstructed. An inductive masked-node formulation decouples prediction resolution from sensing resolution, allowing the same trained model to reconstruct the field at user-defined target locations or display grids. On Singapore data, the proposed method reduces RMSE by 23.2\\% over the classical interpolation baseline, inverse-distance weighting, and consistently outperforms other neural architectures such as convolutional fusion and support-agnostic heterogeneous graph baselines. A generalization study using data from Sydney, Australia lets us characterize when multi-support fusion helps: the available skill appears to depend on gauge spacing relative to the spatial correlation length of the field, so fusion delivers the largest gains where the field is under-sampled relative to its correlation length and little when it is already resolved. Code and models will be open-sourced upon paper acceptance.", "arxiv_id": "2607.01621", "arxiv_url": "https://arxiv.org/abs/2607.01621", "authors": ["Low Jun Yu", "Niramay Kachhadiya", "Herath Mudiyanselage Viraj Vidura Herath", "Sanka Rasnayaka", "Lucy Amanda Marshall"], "brief": "\u63d0\u51fa\u4e00\u79cd\u51e0\u4f55\u611f\u77e5\u591a\u652f\u6491\u5f02\u6784\u56fe\u795e\u7ecf\u7f51\u7edc\uff0c\u5c06\u70b9\uff08\u96e8\u91cf\u8ba1\uff09\u3001\u7ebf\uff08\u5fae\u6ce2\u94fe\u8def\uff09\u3001\u9762\uff08\u96f7\u8fbe/\u536b\u661f\uff09\u4e09\u7c7b\u7a7a\u95f4\u652f\u6491\u7684\u964d\u96e8\u89c2\u6d4b\u5206\u522b\u5efa\u6a21\u4e3a\u4e0d\u540c\u8282\u70b9\u5c42\uff0c\u901a\u8fc7\u8de8\u652f\u6491\u6d88\u606f\u4f20\u9012\u878d\u5408\u540e\u91cd\u5efa\u964d\u96e8\u573a\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01621", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5c060D\u70b9\u30011D\u7ebf\u30012D\u7f51\u683c\u4e09\u79cd\u7a7a\u95f4\u652f\u6491\u7c7b\u578b\u663e\u5f0f\u7f16\u7801\u4e3a\u5f02\u6784\u56fe\u7684\u72ec\u7acb\u8282\u70b9\u5c42\uff0c\u4fdd\u7559\u51e0\u4f55\u7ea6\u675f\u4fe1\u606f", "\u5f52\u7eb3\u5f0f\u63a9\u7801\u8282\u70b9\u8bbe\u8ba1\u4f7f\u9884\u6d4b\u5206\u8fa8\u7387\u4e0e\u4f20\u611f\u5206\u8fa8\u7387\u89e3\u8026\uff0c\u540c\u4e00\u6a21\u578b\u53ef\u5728\u4efb\u610f\u76ee\u6807\u4f4d\u7f6e\u91cd\u5efa", "\u5728\u65b0\u52a0\u5761\u6570\u636e\u4e0aRMSE\u8f83\u53cd\u8ddd\u79bb\u52a0\u6743\u57fa\u7ebf\u964d\u4f4e23.2%\uff0c\u5e76\u5728\u6089\u5c3c\u6570\u636e\u4e0a\u9a8c\u8bc1\u6cdb\u5316\u6027\uff1b\u878d\u5408\u589e\u76ca\u5728\u96e8\u91cf\u8ba1\u95f4\u8ddd\u5927\u4e8e\u573a\u76f8\u5173\u957f\u5ea6\u65f6\u6700\u imitives are mainly optimized through image-space objectives and remain weakly constrained in unobserved regions. We propose \\textit{COVScene}, a pose-free semantic Gaussian framework that couples renderable Gaussian primitives with a dense semantic occupancy field through differentiable volumetric lifting. Instead of converting Gaussians to voxels only at evaluation time, COVScene lifts the predicted semantic Gaussians inside the training computation graph, so volumetric regularization provides gradients to Gaussian opacity, geometry, and semantic features. The framework combines a semantic-aware Geometry Transformer, multi-task Gaussian decoding, geometric foundation distillation, and occupancy entropy regularization to support novel view synthesis, open-vocabulary semantic querying, and semantic occupancy prediction within a single representation. Experiments on ScanNet and ScanNet++ show that COVScene maintains competitive rendering quality, improves open-vocabulary segmentation, and achieves stronger semantic occupancy prediction than the self-supervised baseline without direct voxel-level supervision.", "arxiv_id": "2607.01633", "arxiv_url": "https://arxiv.org/abs/2607.01633", "authors": ["Hu Zhu", "Bohan Li", "Xianda Guo", "Yanlun Peng", "Zheng Zhu", "Xin Jin", "Wenjun Zeng", "Chang Wen Chen"], "brief": "\u63d0\u51faCOVScene\u6846\u67b6\uff0c\u5c06\u53ef\u6e32\u67d3\u9ad8\u65af\u57fa\u5143\u4e0e\u5bc6\u96c6\u8bed\u4e49\u5360\u7528\u573a\u901a\u8fc7\u53ef\u5fae\u4f53\u79ef\u63d0\u5347\u8026\u5408\uff0c\u65e0\u9700\u5916\u90e8\u76f8\u673a\u6807\u5b9a\u5373\u53ef\u4ece\u7a00\u758f\u65e0\u4f4d\u59ff\u56fe\u50cf\u4e2d\u540c\u65f6\u5b8c\u6210\u65b0\u89c6\u89d2\u5408\u6210\u3001\u5f00\u653e\u8bcd\u6c47\u8bed\u4e49\u67e5\u8be2\u548c\u8bed\u4e49\u5360\u7528\u9884\u6d4b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01633", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5728\u8bad\u7ec3\u8ba1\u7b97\u56fe\u5185\u5c06\u9884\u6d4b\u7684\u8bed\u4e49\u9ad8\u65af\u63d0\u5347\u4e3a\u4f53\u79ef\u8868\u793a\uff0c\u4f7f\u4f53\u79ef\u6b63\u5219\u5316\u68af\u5ea6\u76f4\u63a5\u4f5c\u7528\u4e8e\u9ad8\u65af\u4e0d\u900f\u660e\u5ea6\u3001\u51e0\u4f55\u548c\u8bed\u4e49\u7279\u5f81", "\u96c6\u6210\u8bed\u4e49\u611f\u77e5\u51e0\u4f55Transformer\u3001\u591a\u4efb\u52a1\u9ad8\u65af\u89e3\u7801\u3001\u51e0\u4f55\u57fa\u7840\u84b8\u998f\u548c\u5360\u7528\u71b5\u6b63\u5219\u5316\u4e8e\u5355\u4e00\u8868\u793a", "\u5728ScanNet\u548cScanNet++\u4e0a\uff0c\u65e0\u9700\u4f53\u7d20\u7ea7\u76d1\u7763\u5373\u8d85\u8d8a\u81ea\u76d1\u7763\u57fa\u7ebf\uff0c\u5728\u5f00\u653e\u8bcd\u6c47\u5206\u5272\u548c\u8bed\u4e49\u5360\u7528\u9884\u6d4b\u4e0a\u5747\u6709\u63d0\u5347"], "keywords": ["3D\u9ad8\u65af", "\u8bed\u4e49\u7406\u89e3", "\u4e09\u7ef4\u91cd\u5efa", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01633v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Bridging 3D Gaussians and Semantic Occupancy for Comprehensive Open-Vocabulary Scene Understanding from Unposed Images", "tldr": "COVScene\uff1a\u65e0\u9700\u76f8\u673a\u6807\u5b9a\uff0c\u4ece\u7a00\u758f\u56fe\u50cf\u5b9e\u73b0\u53ef\u6e32\u67d3\u51e0\u4f55\u3001\u5f00\u653e\u8bcd\u6c47\u8bed\u4e49\u4e0e3D\u5360\u7528\u7684\u7edf\u4e00\u7406\u89e3", "upvotes": 0, "what_it_is": "\u63d0\u51faCOVScene\u6846\u67b6\uff0c\u5c06\u53ef\u6e32\u67d3\u9ad8\u65af\u57fa\u5143\u4e0e\u5bc6\u96c6\u8bed\u4e49\u5360\u7528\u573a\u901a\u8fc7\u53ef\u5fae\u4f53\u79ef\u63d0\u5347\u8026\u5408\uff0c\u65e0\u9700\u5916\u90e8\u76f8\u673a\u6807\u5b9a\u5373\u53ef\u4ece\u7a00\u758f\u65e0\u4f4d\u59ff\u56fe\u50cf\u4e2d\u540c\u65f6\u5b8c\u6210\u65b0\u89c6\u89d2\u5408\u6210\u3001\u5f00\u653e\u8bcd\u6c47\u8bed\u4e49\u67e5\u8be2\u548c\u8bed\u4e49\u5360\u7528\u9884\u6d4b\u3002", "why_notable": "\u9996\u6b21\u5c06\u65e0\u4f4d\u59ff\u9ad8\u65af\u91cd\u5efa\u4e0e\u8bed\u4e49\u5360\u7528\u573a\u5728\u8bad\u7ec3\u9636\u6bb5\u6df1\u5ea6\u8026\u5408\uff0c\u89e3\u51b3\u4e86\u9ad8\u65af\u57fa\u5143\u5728\u672a\u89c2\u6d4b\u533a\u57df\u7ea6\u675f\u5f31\u7684\u6838\u5fc3\u95ee\u9898\uff0c\u63a8\u52a8\u4e86\u5355\u4e00\u6a21\u578b\u5904\u7406\u591a\u4efb\u52a13D\u573a\u666f\u7406\u89e3\u7684\u5b9e\u7528\u5316\u8fdb\u7a0b\u3002"}, {"abstract": "Dynamic expansion methods for class-incremental learning (CIL) protect task-specific knowledge by growing dedicated tokens or subnetworks, yet our analyses suggest that classification supervision alone does not sufficiently preserve task-agnostic shared backbone representations over long incremental sequences. We identify two intertwined challenges: cross-task confusion from sequential training on predominantly current-task data, which biases decision boundaries toward recent tasks; and under-optimized shared representations in the backbone that cap long-term discriminability as tasks accumulate. We propose the Decoupled Representation Dynamic Network (DRDN), which addresses these challenges via two orthogonal mechanisms. For shared backbone representations, DRDN continuously applies masked image modeling (MIM) at every incremental step, with reconstruction gradients routed exclusively through the backbone, encouraging it to retain general visual structure beyond class-discriminative cues. For task-specific discrimination, DRDN employs hierarchical task token expansion across all transformer layers, with a modified per-task attention rule that reduces inter-task interference. We support this design with accuracy degradation analysis and cross-task confusion rate measurements. In the from-scratch ViT CIL setting (no external pretraining), DRDN consistently improves over strong token-expansion baselines with comparable backbone scale. On CIFAR100-B0 (10 steps), DRDN achieves 77.19% average accuracy, outperforming DKT by 1.36 points and DyTox by 3.53 points, with an advantage that grows at longer incremental sequences. Multi-seed validation confirms stability (+/-0.31%). The MIM decoder is active only during training, adding no inference-time parameters or computation.", "arxiv_id": "2607.01630", "arxiv_url": "https://arxiv.org/abs/2607.01630", "authors": ["Bingchen Huang", "Yifu Chen", "Zhiling Wang", "Yuanchao Du"], "brief": "\u63d0\u51fa\u89e3\u8026\u8868\u793a\u52a8\u6001\u7f51\u7edc\uff08DRDN\uff09\uff0c\u9488\u5bf9\u4ece\u5934\u8bad\u7ec3ViT\u7684\u7c7b\u589e\u91cf\u5b66\u4e60\u573a\u666f\uff0c\u901a\u8fc7\u63a9\u7801\u56fe\u50cf\u5efa\u6a21\uff08MIM\uff09\u7ef4\u62a4\u5171\u4eab\u9aa8\u5e72\u7f51\u7edc\u7684\u901a\u7528\u8868\u793a\uff0c\u540c\u65f6\u5229\u7528\u5c42\u6b21\u5316\u4efb\u52a1token\u6269\u5c55\u51cf\u5c11\u4efb\u52a1\u95f4\u5e72\u6270\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01630", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u53cc\u673a\u5236\u89e3\u8026\uff1aMIM\u91cd\u5efa\u68af\u5ea6\u4ec5\u6d41\u7ecf\u9aa8\u5e72\u7f51\u7edc\u4ee5\u4fdd\u7559\u901a\u7528\u89c6\u89c9\u7ed3\u6784\uff0c\u4efb\u52a1\u7279\u5b9a\u5224\u522b\u7531\u5c42\u6b21\u5316token\u6269\u5c55\u8d1f\u8d23\uff0c\u4e24\u8005\u6b63\u4ea4\u4e92\u8865", "\u5728CIFAR100-B0\uff0810\u6b65\uff09\u4e0a\u8fbe\u523077.19%\u5e73\u5747\u7cbe\u5ea6\uff0c\u8d85\u8d8aDKT 1.36\u4e2a\u767e\u5206\u70b9\u3001DyTox 3.53\u4e2a\u767e\u5206\u70b9\uff0c\u4e14\u4f18\u52bf\u968f\u589e\u91cf\u6b65\u6570\u589e\u52a0\u800c\u6269\u5927", "MIM\u89e3\u7801\u5668\u4ec5\u5728\u8bad\u7ec3\u9636\u6bb5\u6fc0\u6d3b\uff0c\u63a8\u7406\u65f6\u4e0d\u589e\u52a0\u4efb\u4f55\u53c2\u6570\u6216\u8ba1\u7b97\u5f00\u9500\uff0c\u591a\u79cd\u5b50\u9a8c\u8bc1\u7a33\u5b9a\u6027\u00b10.31%"], "keywords": ["\u7c7b\u589e\u91cf\u5b66\u4e60", "\u89c6\u89c9Transformer", "\u8868\u793a\u5b66\u4e60", "\u52a8\u6001\u7f51\u7edc"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01630v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DRDN: Decoupled Representation Dynamic Network for From-Scratch ViT Class-Incremental Learning", "tldr": "\u63d0\u51faDRDN\u7f51\u7edc\uff0c\u901a\u8fc7\u89e3\u8026\u8868\u793a\u673a\u5236\u89e3\u51b3\u4ece\u5934\u8bad\u7ec3ViT\u7684\u7c7b\u589e\u91cf\u5b66\u4e60\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u89e3\u8026\u8868\u793a\u52a8\u6001\u7f51\u7edc\uff08DRDN\uff09\uff0c\u9488\u5bf9\u4ece\u5934\u8bad\u7ec3ViT\u7684\u7c7b\u589e\u91cf\u5b66\u4e60\u573a\u666f\uff0c\u901a\u8fc7\u63a9\u7801\u56fe\u50cf\u5efa\u6a21\uff08MIM\uff09\u7ef4\u62a4\u5171\u4eab\u9aa8\u5e72\u7f51\u7edc\u7684\u901a\u7528\u8868\u793a\uff0c\u540c\u65f6\u5229\u7528\u5c42\u6b21\u5316\u4efb\u52a1token\u6269\u5c55\u51cf\u5c11\u4efb\u52a1\u95f4\u5e72\u6270\u3002", "why_notable": "\u5728\u65e0\u9884\u8bad\u7ec3\u7684\u4ece\u5934\u8bad\u7ec3ViT\u7c7b\u589e\u91cf\u5b66\u4e60\u8fd9\u4e00\u66f4\u5177\u6311\u6218\u6027\u7684\u8bbe\u5b9a\u4e0b\uff0c\u901a\u8fc7\u89e3\u8026\u5171\u4eab\u8868\u793a\u4e0e\u4efb\u52a1\u7279\u5b9a\u5224\u522b\u4e24\u4e2a\u7ef4\u5ea6\uff0c\u7cfb\u7edf\u6027\u5730\u89e3\u51b3\u4e86\u957f\u5e8f\u5217\u589e\u91cf\u5b66\u4e60\u4e2d\u7684\u8de8\u4efb\u52a1\u6df7\u6dc6\u548c\u8868\u793a\u9000\u5316\u95ee\u9898\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Interactive segmentation of 3D Gaussians offers a compelling opportunity for real-time manipulation of 3D scenes, thanks to the real-time rendering capability of 3D Gaussian Splatting (3DGS). However, existing methods require a time-consuming per-scene setup - typically tens of seconds or even minutes - before interactive segmentation can begin on a raw 3DGS scene. This setup involves multi-view mask preparation, mask lifting, and feature distillation, creating a major bottleneck for online applications. To address this limitation, we aim to completely eliminate the setup stage for interactive 3DGS segmentation while keeping the segmentation time practical (under 1 second). In this work, we present SAGO (Segment Any Gaussians Online), a novel setup-free framework for interactive 3DGS segmentation. By introducing virtual drones, our method reframes the 3D segmentation problem as an online Next-Best-View (NBV) planning task formulated within a Markov process. Extensive experiments demonstrate that SAGO can extract clean 3D assets directly from 3D Gaussians with sub-second latency, thereby enabling a broad range of downstream applications such as object manipulation and scene editing. Moreover, our method achieves over a 50x speedup compared to the previous setup-free 3DGS segmentation frameworks.", "arxiv_id": "2607.01628", "arxiv_url": "https://arxiv.org/abs/2607.01628", "authors": ["Liwei Liao", "Rongjie Wang", "Ronggang Wang"], "brief": "\u63d0\u51faSAGO\u6846\u67b6\uff0c\u5c063D\u9ad8\u65af\u5206\u5272\u95ee\u9898\u91cd\u6784\u4e3a\u57fa\u4e8e\u9a6c\u5c14\u53ef\u592b\u8fc7\u7a0b\u7684\u5728\u7ebf\u6700\u4f73\u89c6\u89d2\uff08NBV\uff09\u89c4\u5212\u4efb\u52a1\uff0c\u901a\u8fc7\u5f15\u5165\u865a\u62df\u65e0\u4eba\u673a\u81ea\u52a8\u9009\u62e9\u6700\u4f18\u89c6\u89d2\uff0c\u5b8c\u5168\u6d88\u9664\u4f20\u7edf\u65b9\u6cd5\u4e2d\u8017\u65f6\u7684\u9884\u8bbe\u7f6e\u9636\u6bb5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01628", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5b8c\u5168\u6d88\u9664\u591a\u89c6\u89d2\u63a9\u7801\u51c6\u5907\u3001\u63a9\u7801\u63d0\u5347\u548c\u7279\u5f81\u84b8\u998f\u7b49\u9884\u8bbe\u7f6e\u6b65\u9aa4\uff0c\u5b9e\u73b0\u96f6\u8bbe\u7f6e\u542f\u52a8", "\u5206\u5272\u5ef6\u8fdf\u4f4e\u4e8e1\u79d2\uff0c\u76f8\u6bd4\u6b64\u524d\u65e0\u8bbe\u7f6e3DGS\u5206\u5272\u6846\u67b6\u5b9e\u73b0\u8d8550\u500d\u52a0\u901f", "\u5c063D\u5206\u5272\u5efa\u6a21\u4e3a\u9a6c\u5c14\u53ef\u592b\u51b3\u7b56\u8fc7\u7a0b\u4e2d\u7684NBV\u89c4\u5212\uff0c\u865a\u62df\u65e0\u4eba\u673a\u52a8\u6001\u9009\u62e9\u6700\u4f18\u89c2\u6d4b\u89c6\u89d2"], "keywords": ["3D\u9ad8\u65af\u6cfc\u6e85", "\u4ea4\u4e92\u5f0f\u5206\u5272", "\u89c6\u89d2\u89c4\u5212", "\u5b9e\u65f6\u6e32\u67d3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.01628v1", "published_at": "2026-07-02", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Online Segment 3D Gaussians via Launching Virtual Drones", "tldr": "\u65e0\u9700\u9884\u8bbe\u7f6e\u9636\u6bb5\uff0c\u7528\u865a\u62df\u65e0\u4eba\u673a\u5b9e\u73b0\u4e9a\u79d2\u7ea73D\u9ad8\u65af\u5b9e\u65f6\u4ea4\u4e92\u5206\u5272", "upvotes": 0, "what_it_is": "\u63d0\u51faSAGO\u6846\u67b6\uff0c\u5c063D\u9ad8\u65af\u5206\u5272\u95ee\u9898\u91cd\u6784\u4e3a\u57fa\u4e8e\u9a6c\u5c14\u53ef\u592b\u8fc7\u7a0b\u7684\u5728\u7ebf\u6700\u4f73\u89c6\u89d2\uff08NBV\uff09\u89c4\u5212\u4efb\u52a1\uff0c\u901a\u8fc7\u5f15\u5165\u865a\u62df\u65e0\u4eba\u673a\u81ea\u52a8\u9009\u62e9\u6700\u4f18\u89c6\u89d2\uff0c\u5b8c\u5168\u6d88\u9664\u4f20\u7edf\u65b9\u6cd5\u4e2d\u8017\u65f6\u7684\u9884\u8bbe\u7f6e\u9636\u6bb5\u3002", "why_notable": "\u73b0\u67093DGS\u4ea4\u4e92\u5206\u5272\u65b9\u6cd5\u9700\u6570\u5341\u79d2\u81f3\u6570\u5206\u949f\u9884\u5904\u7406\uff0c\u4e25\u91cd\u5236\u7ea6\u5728\u7ebf\u5e94\u7528\uff1bSAGO\u5f7b\u5e95\u6d88\u9664\u8be5\u74f6\u9888\u5e76\u5b9e\u73b050\u500d\u4ee5\u4e0a\u52a0\u901f\uff0c\u5bf9\u5b9e\u65f63D\u573a\u666f\u7f16\u8f91\u4e0e\u64cd\u63a7\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Tracking multi-person 3D human meshes from in-the-wild videos is a highly challenging problem due to complex interactions, frequent occlusions, and severe truncation inherent in unconstrained environments. While recent approaches have improved robustness against these issues, they largely overlook the critical challenge prevalent in real-world footage: frequent shot changes. These abrupt transitions in camera viewpoints often cause existing methods to lose track of human identities and fail in reconstructing temporally coherent trajectories. Although several recent works have explored 3D human mesh tracking under shot changes, they are still limited to single-person scenarios, making them inadequate for real-world videos where multiple people interact and appear simultaneously. To address this limitation, we propose Multi-THuMBS (Multi-person Tracking of 3D Human Meshes Beyond Video Shots) that leverages a state-of-the-art 3D scene prior to reconstruct the two boundary frames in a single shared 3D space. Human meshes are then registered within the shared 3D space, maintaining per-person identity and motion consistency across shot changes. Extensive experiments demonstrate that our approach yields significant improvements in 3D human mesh recovery, camera pose estimation, and identity tracking, thereby ensuring high-fidelity motion reconstruction with consistent identity preservation across shots compared to previous state-of-the-art methods.", "arxiv_id": "2607.01626", "arxiv_url": "https://arxiv.org/abs/2607.01626", "authors": ["Jeongwan On", "Muhammad Salman Ali", "Muneeb A. Khan", "Sunwoo Park", "Inwoong Moon", "Hyung Jin Chang", "Jaekwang Kim", "Seong Jong Ha", "Seungryul Baek"], "brief": "\u63d0\u51faMulti-THuMBS\u65b9\u6cd5\uff0c\u5229\u75283D\u573a\u666f\u5148\u9a8c\u5c06\u955c\u5934\u5207\u6362\u8fb9\u754c\u5e27\u91cd\u5efa\u5230\u5171\u4eab3D\u7a7a\u95f4\u4e2d\uff0c\u5b9e\u73b0\u8de8\u955c\u5934\u7684\u591a\u4eba\u8eab\u4efd\u4e00\u81f4\u6027\u4e0e\u8fd0\u52a8\u8fde\u8d2f\u6027\u8ffd\u8e2a\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.01626", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5229\u7528\u6700\u5148\u8fdb\u76843D\u573a\u666f\u5148\u9a8c\u5c06\u955c\u5934\u5207\u6362\u4e24\u4fa7\u8fb9\u754c\u5e27\u7edf\u4e00\u5230\u540c\u4e003D\u7a7a\u95f4\u let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
