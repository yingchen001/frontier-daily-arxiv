c\u6ed1\u52a8\u7a97\u53e3\u6ce8\u610f\u529b\u4f18\u5316\uff0c\u6700\u7ec8\u5b9e\u73b06.978\u500d\u5e73\u5747\u52a0\u901f\uff0c\u5728\u7ade\u8d5b\u4e2d\u6392\u540d\u7b2c3\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04244", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "\u91cf\u5316", "\u6295\u673a\u89e3\u7801", "\u77e5\u8bc6\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04244v2", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Quantize the Target, Quantize the Drafter: Efficient Inference with Qwen3.5-4B", "tldr": "\u9488\u5bf9\u8d44\u6e90\u53d7\u9650GPU\u4e0a\u7684Qwen3.5-4B\u9ad8\u6548\u63a8\u7406\uff0c\u7ed3\u5408\u91cf\u5316\u611f\u77e5\u84b8\u998f\u4e0e\u6295\u673a\u89e3\u7801\u6280\u672f\uff0c\u8bad\u7ec3\u4e13\u4e3a\u91cf\u5316\u76ee\u6807\u6a21\u578b\u5b9a\u5236\u7684\u5757\u6269\u6563\u8349\u7a3f\u6a21\u578b\uff0c\u5e76\u5bf9\u8349\u7a3f\u6a21\u578b\u8fdb\u4e00\u6b65\u91cf\u5316\u548c\u6ed1\u52a8\u7a97\u53e3\u6ce8\u610f\u529b\u4f18\u5316\uff0c\u6700\u7ec8\u5b9e\u73b06.978\u500d\u5e73\u5747\u52a0\u901f\uff0c\u5728\u7ade\u8d5b\u4e2d\u6392\u540d\u7b2c3\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Continual post-training is becoming a central paradigm for adapting vision-language models to evolving tasks. Recent work has increasingly favored reinforcement learning over supervised fine-tuning, driven by the belief that reinforcement learning is inherently less prone to forgetting. However, the belief remains insufficiently validated, as existing evidence is largely drawn from outdated or homogeneous benchmarks. To revisit this assumption, we introduce MRCL, a Multimodal Reasoning Continual Learning benchmark built from diverse and recently released multimodal datasets. Experiments on MRCL show that reinforcement learning can still suffer from severe catastrophic forgetting during continual post-training. To address this challenge, we propose Continual Policy Optimization (CPO), a replay-free framework grounded in the prior-task behavioral KL objective. CPO uses a theoretically justified parameter-movement regularization to limit policy drift on previous tasks. Extensive experiments across multiple model scales demonstrate that CPO consistently reduces forgetting while preserving, and in some cases improving, pretrained model capabilities. On Qwen3-VL-8B, CPO reduces forgetting by 13.7\\% and improves pretrained capability by 7.0\\%. The implementation code is available at https://github.com/MaolinLuo/CPO.", "arxiv_id": "2607.04364", "arxiv_url": "https://arxiv.org/abs/2607.04364", "authors": ["Mao-Lin Luo", "Zhe-Xu Wang", "Zi-Hao Zhou", "Bo Ye", "Jian Zhao", "Min-Ling Zhang", "Tong Wei"], "brief": "\u7814\u7a76\u53d1\u73b0\u5f3a\u5316\u5b66\u4e60\u5728\u6301\u7eed\u540e\u8bad\u7ec3\u4e2d\u540c\u6837\u5b58\u5728\u4e25\u91cd\u7684\u707e\u96be\u6027\u9057\u5fd8\u95ee\u9898\uff0c\u5e76\u63d0\u51fa\u4e86\u65e0\u56de\u653e\u6846\u67b6CPO\uff08\u6301\u7eed\u7b56\u7565\u4f18\u5316\uff09\uff0c\u901a\u8fc7\u57fa\u4e8eKL\u6563\u5ea6\u7684\u53c2\u6570\u79fb\u52a8\u6b63\u5219\u5316\u9650\u5236\u7b56\u7565\u6f02\u79fb\u3002\u5728Qwen3-VL-8B\u4e0a\uff0cCPO\u5c06\u9057\u5fd8\u7387\u964d\u4f4e13.7%\uff0c\u540c\u65f6\u63d0\u5347\u9884\u8bad\u7ec3\u80fd\u529b7.0%\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04364", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04364v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "RL Forgets! Towards Continual Policy Optimization", "tldr": "\u7814\u7a76\u53d1\u73b0\u5f3a\u5316\u5b66\u4e60\u5728\u6301\u7eed\u540e\u8bad\u7ec3\u4e2d\u540c\u6837\u5b58\u5728\u4e25\u91cd\u7684\u707e\u96be\u6027\u9057\u5fd8\u95ee\u9898\uff0c\u5e76\u63d0\u51fa\u4e86\u65e0\u56de\u653e\u6846\u67b6CPO\uff08\u6301\u7eed\u7b56\u7565\u4f18\u5316\uff09\uff0c\u901a\u8fc7\u57fa\u4e8eKL\u6563\u5ea6\u7684\u53c2\u6570\u79fb\u52a8\u6b63\u5219\u5316\u9650\u5236\u7b56\u7565\u6f02\u79fb\u3002\u5728Qwen3-VL-8B\u4e0a\uff0cCPO\u5c06\u9057\u5fd8\u7387\u964d\u4f4e13.7%\uff0c\u540c\u65f6\u63d0\u5347\u9884\u8bad\u7ec3\u80fd\u529b7.0%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Diffusion models (DMs) are a state-of-the-art generative method to approximately sample from an unknown distribution. Their training and evaluation primarily rely on an Evidence Lower Bound (ELBO), which relates the Kullback-Leibler (KL) divergence of model samples to the score matching loss along the path, which serves as a tractable surrogate. The difference between sample quality and the score matching loss produced by this bound leads to the \\emph{score matching gap}, which is known to be tight in the worst-case but not descriptive of sample quality in general. In this work, we provide a theoretical analysis of this gap, developing tighter bounds for three metrics: KL divergence, reverse KL divergence, and Wasserstein distance, effectively exploiting the regularity of the class of score estimators. Our results suggest that the quality of the score approximation has more impact on closing the score matching gap for low noise scales. To obtain these bounds, our key technical insight is to exploit the contraction properties of the backward processes. In particular, we rely on entropy flows, logarithmic Sobolev inequalities and reflection couplings, rigorously linking the ergodicity of the Langevin diffusion to the score matching gap problem.", "arxiv_id": "2607.04442", "arxiv_url": "https://arxiv.org/abs/2607.04442", "authors": ["Benjamin Dupuis", "Tyler Farghly", "Maxime Haddouche", "Alain Durmus", "Umut Simsekli"], "brief": "\u672c\u6587\u5bf9\u6269\u6563\u6a21\u578b\u4e2d\"\u5f97\u5206\u5339\u914d\u5dee\u8ddd\"\u8fdb\u884c\u7406\u8bba\u5206\u6790\uff0c\u9488\u5bf9KL\u6563\u5ea6\u3001\u53cd\u5411KL\u6563\u5ea6\u548cWasserstein\u8ddd\u79bb\u4e09\u79cd\u5ea6\u91cf\u63a8\u5bfc\u51fa\u66f4\u7d27\u7684\u4e0a\u754c\u3002\u5173\u952e\u6280\u672f\u624b\u6bb5\u662f\u5229\u7528\u540e\u5411\u8fc7\u7a0b\u7684\u6536\u7f29\u6027\u8d28\uff08\u71b5\u6d41\u3001\u5bf9\u6570Sobolev\u4e0d\u7b49\u5f0f\u548c\u53cd\u5c04\u8026\u5408\uff09\uff0c\u63ed\u793a\u4f4e\u566a\u58f0\u5c3a\u5ea6\u4e0b\u5f97\u5206\u4f30\u8ba1\u8d28\u91cf\u5bf9\u7f29\u5c0f\u8be5\u5dee\u8ddd\u5f71\u54cd\u66f4\u5927\u3002", "categories": ["stat.ML", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04442", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5f97\u5206\u5339\u914d", "\u751f\u6210\u6a21\u578b", "\u7406\u8bba\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04442v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Tightening the Score Matching Gap for Diffusion Models", "tldr": "\u672c\u6587\u5bf9\u6269\u6563\u6a21\u578b\u4e2d\"\u5f97\u5206\u5339\u914d\u5dee\u8ddd\"\u8fdb\u884c\u7406\u8bba\u5206\u6790\uff0c\u9488\u5bf9KL\u6563\u5ea6\u3001\u53cd\u5411KL\u6563\u5ea6\u548cWasserstein\u8ddd\u79bb\u4e09\u79cd\u5ea6\u91cf\u63a8\u5bfc\u51fa\u66f4\u7d27\u7684\u4e0a\u754c\u3002\u5173\u952e\u6280\u672f\u624b\u6bb5\u662f\u5229\u7528\u540e\u5411\u8fc7\u7a0b\u7684\u6536\u7f29\u6027\u8d28\uff08\u71b5\u6d41\u3001\u5bf9\u6570Sobolev\u4e0d\u7b49\u5f0f\u548c\u53cd\u5c04\u8026\u5408\uff09\uff0c\u63ed\u793a\u4f4e\u566a\u58f0\u5c3a\u5ea6\u4e0b\u5f97\u5206\u4f30\u8ba1\u8d28\u91cf\u5bf9\u7f29\u5c0f\u8be5\u5dee\u8ddd\u5f71\u54cd\u66f4\u5927\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Flow matching is a powerful tool for generative modeling, but emerging applications in robotics, planning, and physics require inference-time constraints on generated outputs. Such constraints are often complex and highly nonlinear. As a result, methods designed for linear constraints like image inpainting are rarely sufficient, and projection or optimization-based alternatives can be prohibitively expensive. In this paper, we introduce Lagrangian Dual Flows, a new family of constrained generation techniques based on Lagrangian dual dynamics. By simply flowing a dual co-state alongside generated samples, we can guarantee nonlinear constraint satisfaction without expensive optimization subproblems, pseudoinverses, or projection steps during the denoising process. The resulting constrained generation algorithms are simple, effective, and open new theoretical connections between flow matching and primal-dual methods in numerical optimization.", "arxiv_id": "2607.04513", "arxiv_url": "https://arxiv.org/abs/2607.04513", "authors": ["Vince Kurtz", "Alexander Davydov"], "brief": "\u63d0\u51fa\u62c9\u683c\u6717\u65e5\u5bf9\u5076\u6d41\uff08Lagrangian Dual Flows\uff09\uff0c\u5728\u6d41\u5339\u914d\u751f\u6210\u8fc7\u7a0b\u4e2d\u5f15\u5165\u5bf9\u5076\u534f\u6001\u53d8\u91cf\uff0c\u65e0\u9700\u6602\u8d35\u7684\u6295\u5f71\u6216\u4f18\u5316\u5b50\u95ee\u9898\u5373\u53ef\u4fdd\u8bc1\u975e\u7ebf\u6027\u7ea6\u675f\u6ee1\u8db3\u3002\u8be5\u65b9\u6cd5\u7b80\u5355\u9ad8\u6548\uff0c\u9002\u7528\u4e8e\u673a\u5668\u4eba\u3001\u89c4\u5212\u548c\u7269\u7406\u7b49\u9700\u8981\u63a8\u7406\u65f6\u7ea6\u675f\u7684\u573a\u666f\uff0c\u5e76\u5efa\u7acb\u4e86\u6d41\u5339\u914d\u4e0e\u539f\u59cb-\u5bf9\u5076\u4f18\u5316\u65b9\u6cd5\u4e4b\u95f4\u7684\u7406\u8bba\u8054\u7cfb\u3002", "categories": ["math.OC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04513", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6d41\u5339\u914d", "\u7ea6\u675f\u751f\u6210", "\u62c9\u683c\u6717\u65e5\u5bf9\u5076", "\u751f\u6210\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04513v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Constrained Flow Matching via Lagrangian Dual Flows", "tldr": "\u63d0\u51fa\u62c9\u683c\u6717\u65e5\u5bf9\u5076\u6d41\uff08Lagrangian Dual Flows\uff09\uff0c\u5728\u6d41\u5339\u914d\u751f\u6210\u8fc7\u7a0b\u4e2d\u5f15\u5165\u5bf9\u5076\u534f\u6001\u53d8\u91cf\uff0c\u65e0\u9700\u6602\u8d35\u7684\u6295\u5f71\u6216\u4f18\u5316\u5b50\u95ee\u9898\u5373\u53ef\u4fdd\u8bc1\u975e\u7ebf\u6027\u7ea6\u675f\u6ee1\u8db3\u3002\u8be5\u65b9\u6cd5\u7b80\u5355\u9ad8\u6548\uff0c\u9002\u7528\u4e8e\u673a\u5668\u4eba\u3001\u89c4\u5212\u548c\u7269\u7406\u7b49\u9700\u8981\u63a8\u7406\u65f6\u7ea6\u675f\u7684\u573a\u666f\uff0c\u5e76\u5efa\u7acb\u4e86\u6d41\u5339\u914d\u4e0e\u539f\u59cb-\u5bf9\u5076\u4f18\u5316\u65b9\u6cd5\u4e4b\u95f4\u7684\u7406\u8bba\u8054\u7cfb\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multilingual documents encapsulate rich regional cultures, scientific discoveries, and historical records. Parsing this content into structured, machine-readable formats is critical for unlocking global knowledge. However, existing benchmarks predominantly focus on high-resource languages like English and Chinese, creating an evaluation blind spot concerning model performance on other languages. While recent Vision-Language Models (VLMs) claim support for hundreds of languages, the lack of ground truth makes it impossible to empirically verify these capabilities. To bridge this gap, we introduce MORE, a large-scale benchmark designed for multilingual document parsing evaluation. MORE distinguishes itself through three key dimensions: (1) Unprecedented Scale: It covers 149 languages, making it the most linguistically diverse benchmark to date; (2) Structural Complexity: Unlike previous works, it extends evaluation beyond plain text to include structural elements such as code blocks, tables, and catalogs; and (3) Data Authenticity: All samples are curated from real-world documents via a model-assisted, human-refined annotation pipeline. We evaluate state-of-the-art models using MORE, establishing new performance baselines for long-tail languages and validating the benchmark\u0027s effectiveness in diagnosing model capabilities in realistic, diverse scenarios. The MORE dataset will be available at https://github.com/zimoqingfeng/MORE.", "arxiv_id": "2607.02956", "arxiv_url": "https://arxiv.org/abs/2607.02956", "authors": ["Long Xu", "Binghong Wu", "Tinghao Yu", "Hao Feng", "Zhenyu Huang", "Haoqing Jiang", "Yunhao Wang", "Shuo Huang", "Feng Zhang"], "brief": "\u63d0\u51faMORE\u57fa\u51c6\uff0c\u8986\u76d6149\u79cd\u8bed\u8a00\u7684\u591a\u8bed\u8a00\u6587\u6863\u89e3\u6790\u8bc4\u6d4b\u96c6\uff0c\u586b\u8865\u73b0\u6709\u57fa\u51c6\u5bf9\u4f4e\u8d44\u6e90\u8bed\u8a00\u8bc4\u4f30\u7684\u7a7a\u767d\u3002\u57fa\u51c6\u5305\u542b\u4ee3\u7801\u5757\u3001\u8868\u683c\u3001\u76ee\u5f55\u7b49\u7ed3\u6784\u5316\u5143\u7d20\uff0c\u6240\u6709\u6837\u672c\u6765\u81ea\u771f\u5b9e\u6587\u6863\u5e76\u7ecf\u4eba\u5de5\u7cbe\u6807\uff0c\u7528\u4e8e\u8bc4\u4f30\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u591a\u8bed\u8a00\u6587\u6863\u89e3\u6790\u4e0a\u7684\u771f\u5b9e\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02956", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u6587\u6863\u89e3\u6790", "\u591a\u8bed\u8a00\u57fa\u51c6", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02956v1", "published_at": "2026-07-03", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MORE: A Multilingual Document Parsing Benchmark and Evaluation", "tldr": "\u63d0\u51faMORE\u57fa\u51c6\uff0c\u8986\u76d6149\u79cd\u8bed\u8a00\u7684\u591a\u8bed\u8a00\u6587\u6863\u89e3\u6790\u8bc4\u6d4b\u96c6\uff0c\u586b\u8865\u73b0\u6709\u57fa\u51c6\u5bf9\u4f4e\u8d44\u6e90\u8bed\u8a00\u8bc4\u4f30\u7684\u7a7a\u767d\u3002\u57fa\u51c6\u5305\u542b\u4ee3\u7801\u5757\u3001\u8868\u683c\u3001\u76ee\u5f55\u7b49\u7ed3\u6784\u5316\u5143\u7d20\uff0c\u6240\u6709\u6837\u672c\u6765\u81ea\u771f\u5b9e\u6587\u6863\u5e76\u7ecf\u4eba\u5de5\u7cbe\u6807\uff0c\u7528\u4e8e\u8bc4\u4f30\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u591a\u8bed\u8a00\u6587\u6863\u89e3\u6790\u4e0a\u7684\u771f\u5b9e\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Code repair is an important capability for language models (LMs): given a buggy program and unit tests, an LM must produce a fixed program that passes the tests. Because code repair data is limited, we aim to scale supervision by using an LM to generate bug--fix tasks. We propose __generator--fixer self-play__, in which a single model is trained with reinforcement learning to generate bugs and fix them. As the fixer improves, the generator adapts to produce more difficult bugs, yielding an automatic curriculum. To test whether this curriculum generalizes, we introduce BugSourceBench, a repair benchmark spanning realistic bug sources: bugs in human-written code, LM-generated code, and human-edited LM-generated code. On BugSourceBench, we find that self-play drifts toward difficult but unrealistic bugs, improving on synthetic bugs but degrading on human-authored ones. We propose Anchored Self-Play (ASP), which anchors self-play with a small reference set by adding a code-embedding similarity reward for generation and mixing reference bugs into fixer training. Across bug sources, ASP achieves the best fix rates, improving average fix rate over standard self-play by $+24\\%$ relative / $+7.0$ pp absolute, with gains on bugs from both LMs and humans.", "arxiv_id": "2607.03523", "arxiv_url": "https://arxiv.org/abs/2607.03523", "authors": ["Caroline Choi", "Zeyneb Kaya", "Shirley Wu", "Tengyu Ma", "Tatsunori Hashimoto", "Ludwig Schmidt"], "brief": "\u63d0\u51fa\u951a\u5b9a\u81ea\u535a\u5f08\uff08ASP\uff09\u65b9\u6cd5\u7528\u4e8e\u4ee3\u7801\u4fee\u590d\uff1a\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u8ba9\u5355\u4e00\u6a21\u578b\u540c\u65f6\u626e\u6f14\u6f0f\u6d1e\u751f\u6210\u5668\u548c\u4fee\u590d\u5668\uff0c\u5e76\u5f15\u5165\u4ee3\u7801\u5d4c\u5165\u76f8\u4f3c\u5ea6\u5956\u52b1\u4e0e\u53c2\u8003\u6f0f\u6d1e\u6df7\u5408\u8bad\u7ec3\uff0c\u9632\u6b62\u81ea\u535a\u5f08\u504f\u5411\u4e0d\u73b0\u5b9e\u7684\u6f0f\u6d1e\u3002\u5728\u65b0\u6784\u5efa\u7684BugSourceBench\u57fa\u51c6\u4e0a\uff0cASP\u76f8\u6bd4\u6807\u51c6\u81ea\u535a\u5f08\u5e73\u5747\u4fee\u590d\u7387\u63d0\u534724%\uff08\u76f8\u5bf9\uff09/7.0\u4e2a\u767e\u5206\u70b9\uff08\u7edd\u5bf9\uff09\u3002", "categories": ["cs.SE", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03523", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4ee3\u7801\u4fee\u590d", "\u81ea\u535a\u5f08", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03523v1", "published_at": "2026-07-03", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Anchored Self-Play for Code Repair", "tldr": "\u63d0\u51fa\u951a\u5b9a\u81ea\u535a\u5f08\uff08ASP\uff09\u65b9\u6cd5\u7528\u4e8e\u4ee3\u7801\u4fee\u590d\uff1a\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u8ba9\u5355\u4e00\u6a21\u578b\u540c\u65f6\u626e\u6f14\u6f0f\u6d1e\u751f\u6210\u5668\u548c\u4fee\u590d\u5668\uff0c\u5e76\u5f15\u5165\u4ee3\u7801\u5d4c\u5165\u76f8\u4f3c\u5ea6\u5956\u52b1\u4e0e\u53c2\u8003\u6f0f\u6d1e\u6df7\u5408\u8bad\u7ec3\uff0c\u9632\u6b62\u81ea\u535a\u5f08\u504f\u5411\u4e0d\u73b0\u5b9e\u7684\u6f0f\u6d1e\u3002\u5728\u65b0\u6784\u5efa\u7684BugSourceBench\u57fa\u51c6\u4e0a\uff0cASP\u76f8\u6bd4\u6807\u51c6\u81ea\u535a\u5f08\u5e73\u5747\u4fee\u590d\u7387\u63d0\u534724%\uff08\u76f8\u5bf9\uff09/7.0\u4e2a\u767e\u5206\u70b9\uff08\u7edd\u5bf9\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Game engines provide real-time simulation, rendering, physics, interaction, networking, and asset pipelines, making them valuable not only for games but also for 3D applications in healthcare, robotics, architecture, manufacturing, and related domains. Because game development is where these systems are most mature and publicly available, it offers a practical testbed for evaluating coding agents that must modify C++ code within stateful, interactive, real-time systems. We present GameEngineBench, a benchmark for evaluating coding agents on scoped C++ implementation tasks inside Unreal Engine 5 projects, built from nine real-world game repositories. The evaluation set consists of 110 tasks spanning gameplay mechanics, multiplayer behavior, AI and world orchestration, animation and movement, UI and session code, loading behavior, online-service integration, persistence, data serialization, XR behavior, and rendering-oriented plugins. These tasks require models to make native C++ changes that compile and satisfy behavioral tests within executable Unreal Engine projects. Across twelve evaluated configurations, the strongest model reaches 55.5\\% pass@1, while 31 tasks remain unsolved by every configuration. Our results demonstrate that frontier coding agents continue to struggle with deeply integrated C++ development for real-time interactive software, highlighting game-engine benchmarks as a valuable complement to existing software engineering evaluations.", "arxiv_id": "2607.03525", "arxiv_url": "https://arxiv.org/abs/2607.03525", "authors": ["Brian La", "Sejoon Chang", "Ben Kim", "Junyoung Bae", "Aamish Ahmad Beg", "Sei Chang", "Gonzalo Gonzalez-Pumariega"], "brief": "\u63d0\u51faGameEngineBench\u57fa\u51c6\u6d4b\u8bd5\uff0c\u7528\u4e8e\u8bc4\u4f30\u7f16\u7a0b\u667a\u80fd\u4f53\u5728\u865a\u5e7b\u5f15\u64ce5\u771f\u5b9eC++\u9879\u76ee\u4e2d\u7684\u4ee3\u7801\u5b9e\u73b0\u80fd\u529b\uff0c\u6db5\u76d6110\u4e2a\u4efb\u52a1\u3002\u6700\u5f3a\u6a21\u578b\u4ec5\u8fbe55.5%\u901a\u8fc7\u7387\uff0c31\u4e2a\u4efb\u52a1\u65e0\u4e00\u914d\u7f6e\u80fd\u89e3\u51b3\uff0c\u8868\u660e\u524d\u6cbf\u7f16\u7a0b\u667a\u80fd\u4f53\u5728\u5b9e\u65f6\u4ea4\u4e92\u8f6f\u4ef6\u7684\u6df1\u5ea6C++\u5f00\u53d1\u4e0a\u4ecd\u5b58\u5728\u663e\u8457\u6311\u6218\u3002", "categories": ["cs.SE", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03525", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u6d4b\u8bd5", "C++"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03525v1", "published_at": "2026-07-03", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GameEngineBench: Evaluating Coding Agents on Real C++ Runtime Environments", "tldr": "\u63d0\u51faGameEngineBench\u57fa\u51c6\u6d4b\u8bd5\uff0c\u7528\u4e8e\u8bc4\u4f30\u7f16\u7a0b\u667a\u80fd\u4f53\u5728\u865a\u5e7b\u5f15\u64ce5\u771f\u5b9eC++\u9879\u76ee\u4e2d\u7684\u4ee3\u7801\u5b9e\u73b0\u80fd\u529b\uff0c\u6db5\u76d6110\u4e2a\u4efb\u52a1\u3002\u6700\u5f3a\u6a21\u578b\u4ec5\u8fbe55.5%\u901a\u8fc7\u7387\uff0c31\u4e2a\u4efb\u52a1\u65e0\u4e00\u914d\u7f6e\u80fd\u89e3\u51b3\uff0c\u8868\u660e\u524d\u6cbf\u7f16\u7a0b\u667a\u80fd\u4f53\u5728\u5b9e\u65f6\u4ea4\u4e92\u8f6f\u4ef6\u7684\u6df1\u5ea6C++\u5f00\u53d1\u4e0a\u4ecd\u5b58\u5728\u663e\u8457\u6311\u6218\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Writing a literature review requires a deep understanding of the relationships among cited papers: how they build on, challenge, or offer alternative perspectives to one another. We present Graph-Reasoning Aided Survey Planning (GRASP), a framework combining LLM planning for related work generation with graph algorithms to extract key relationships among cited papers. Our two-layer graph structure consists of a Graph of Thoughts and an Argument-Counterargument Planning Network, representing the cited papers at different levels of granularity, and we apply topology-aware pruning via a Steiner tree to identify the core inter-paper relationships captured in our graph. Our citation analysis-based evaluation shows that GRASP generates related work sections (RWS) that closely match human-written targets in terms of the discourse roles, intents, and grouping of citations.", "arxiv_id": "2607.03709", "arxiv_url": "https://arxiv.org/abs/2607.03709", "authors": ["Haoming Li", "Jessica Ouyang"], "brief": "\u63d0\u51faGRASP\u6846\u67b6\uff0c\u7ed3\u5408LLM\u89c4\u5212\u4e0e\u56fe\u7b97\u6cd5\uff08\u601d\u7ef4\u56fe+\u8bba\u70b9-\u53cd\u8bba\u70b9\u89c4\u5212\u7f51\u7edc\uff09\u81ea\u52a8\u751f\u6210\u9ad8\u8d28\u91cf\u6587\u732e\u7efc\u8ff0\u3002\u901a\u8fc7Steiner\u6811\u8fdb\u884c\u62d3\u6251\u611f\u77e5\u526a\u679d\uff0c\u63d0\u53d6\u8bba\u6587\u95f4\u6838\u5fc3\u5173\u7cfb\uff0c\u751f\u6210\u7684\u76f8\u5173\u5de5\u4f5c\u7ae0\u8282\u5728\u5f15\u7528\u8bdd\u8bed\u89d2\u8272\u3001\u610f\u56fe\u548c\u5206\u7ec4\u4e0a\u4e0e\u4eba\u5de5\u64b0\u5199\u9ad8\u5ea6\u543b\u5408\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03709", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u732e\u7efc\u8ff0\u751f\u6210", "\u56fe\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f15\u7528\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03709v1", "published_at": "2026-07-04", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GRASP: Graph-Reasoning Aided Survey Planning for High-Fidelity Related Work Generation", "tldr": "\u63d0\u51faGRASP\u6846\u67b6\uff0c\u7ed3\u5408LLM\u89c4\u5212\u4e0e\u56fe\u7b97\u6cd5\uff08\u601d\u7ef4\u56fe+\u8bba\u70b9-\u53cd\u8bba\u70b9\u89c4\u5212\u7f51\u7edc\uff09\u81ea\u52a8\u751f\u6210\u9ad8\u8d28\u91cf\u6587\u732e\u7efc\u8ff0\u3002\u901a\u8fc7Steiner\u6811\u8fdb\u884c\u62d3\u6251\u611f\u77e5\u526a\u679d\uff0c\u63d0\u53d6\u8bba\u6587\u95f4\u6838\u5fc3\u5173\u7cfb\uff0c\u751f\u6210\u7684\u76f8\u5173\u5de5\u4f5c\u7ae0\u8282\u5728\u5f15\u7528\u8bdd\u8bed\u89d2\u8272\u3001\u610f\u56fe\u548c\u5206\u7ec4\u4e0a\u4e0e\u4eba\u5de5\u64b0\u5199\u9ad8\u5ea6\u543b\u5408\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Unlike natural-language specifications, executable formal specifications provide machine-checkable constraints for verifying, debugging, and repairing code. However, writing such specifications is labor-intensive, and existing LLM-based methods mainly infer whole-program pre/postconditions, missing the intermediate semantic commitments that programmers rely on when reasoning about an algorithm. Our study further shows that prompting current CodeLLMs often produces executable assertions that are syntactically invalid, trivial, or too weak to reject behavior-changing faults. In this paper, we study executable checkpoint specification generation, where assertions are inserted at meaningful internal program points to describe expected intermediate states. We introduce SpecCoder, a verification-guided CodeLLM training framework that learns from validated reference programs, behavior-changing mutants, and multi-turn specification-refinement traces. SpecCoder selects specifications that hold on correct executions while rejecting faulty executions, turning specifications from passive annotations into executable evidence. To evaluate this setting, we introduce HumanExec, a benchmark built from recent Codeforces competitive programming problems with test suites, reference solutions, and human buggy submissions, supporting three tasks: specification generation, program correctness checking, and program repair. Experiments on HumanExec show that SpecCoder substantially improves checkpoint-specification quality over base CodeLLMs. Across Qwen2.5-Coder models, SpecCoder improves inline-specification correctness by up to 55.8%, completeness by up to 358.1%, and executable assertion validity by up to 26.6%. These gains further translate to downstream correctness reasoning and repair, showing that executable checkpoints provide fine-grained evidence for reliable verification.", "arxiv_id": "2607.04232", "arxiv_url": "https://arxiv.org/abs/2607.04232", "authors": ["Minh Le-Anh", "Cuong Chi Le", "Tien N. Nguyen"], "brief": "\u63d0\u51faSpecCoder\u6846\u67b6\uff0c\u901a\u8fc7\u9a8c\u8bc1\u5f15\u5bfc\u8bad\u7ec3\u8ba9\u4ee3\u7801\u5927\u6a21\u578b\u5728\u7a0b\u5e8f\u4e2d\u95f4\u70b9\u751f\u6210\u53ef\u6267\u884c\u7684\u5f62\u5f0f\u5316\u65ad\u8a00\u89c4\u8303\uff0c\u800c\u975e\u4ec5\u63a8\u65ad\u6574\u4f53\u524d\u540e\u7f6e\u6761\u4ef6\u3002\u5f15\u5165HumanExec\u57fa\u51c6\u6d4b\u8bd5\u96c6\uff0c\u5b9e\u9a8c\u8868\u660eSpecCoder\u5728\u89c4\u8303\u6b63\u786e\u6027\u3001\u5b8c\u6574\u6027\u548c\u65ad\u8a00\u6709\u6548\u6027\u4e0a\u5206\u522b\u63d0\u534755.8%\u3001358.1%\u548c26.6%\uff0c\u5e76\u8fdb\u4e00\u6b65\u6539\u5584\u7a0b\u5e8f\u9a8c\u8bc1\u4e0e\u4fee\u590d\u6548\u679c\u3002", "categories": ["cs.SE", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04232", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4ee3\u7801\u5927\u6a21\u578b", "\u5f62\u5f0f\u5316\u89c4\u8303", "\u7a0b\u5e8f\u9a8c\u8bc1", "\u7a0b\u5e8f\u4fee\u590d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04232v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Teaching Code LLMs to Reason with Intermediate Formal Specifications", "tldr": "\u63d0\u51faSpecCoder\u6846\u67b6\uff0c\u901a\u8fc7\u9a8c\u8bc1\u5f15\u5bfc\u8bad\u7ec3\u8ba9\u4ee3\u7801\u5927\u6a21\u578b\u5728\u7a0b\u5e8f\u4e2d\u95f4\u70b9\u751f\u6210\u53ef\u6267\u884c\u7684\u5f62\u5f0f\u5316\u65ad\u8a00\u89c4\u8303\uff0c\u800c\u975e\u4ec5\u63a8\u65ad\u6574\u4f53\u524d\u540e\u7f6e\u6761\u4ef6\u3002\u5f15\u5165HumanExec\u57fa\u51c6\u6d4b\u8bd5\u96c6\uff0c\u5b9e\u9a8c\u8868\u660eSpecCoder\u5728\u89c4\u8303\u6b63\u786e\u6027\u3001\u5b8c\u6574\u6027\u548c\u65ad\u8a00\u6709\u6548\u6027\u4e0a\u5206\u522b\u63d0\u534755.8%\u3001358.1%\u548c26.6%\uff0c\u5e76\u8fdb\u4e00\u6b65\u6539\u5584\u7a0b\u5e8f\u9a8c\u8bc1\u4e0e\u4fee\u590d\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Diffusion large language models (dLLMs) commit multiple tokens per denoising step by decoding each selected position independently from the shared context; when those positions are dependent, the resulting factorization error is captured by conditional total correlation, which confidence-based selection cannot observe from marginals alone. We propose CoCommit, a marker-gated coordination pass that briefly defers commitment: after the usual bundle selection, a learned marker announces the commit set and the backbone\u0027s last-$n$ layers are re-applied so marked positions coordinate -- approximating joint-mode decoding -- before greedy argmax writes tokens. The method reuses existing weights with one extra partial forward pass and no auxiliary model. On LLaDA2.1-mini with LoRA adapters and matched greedy inference, joint commitment improves accuracy on all six benchmarks we evaluate, with the largest gains on reasoning and exact-answer tasks.", "arxiv_id": "2607.04469", "arxiv_url": "https://arxiv.org/abs/2607.04469", "authors": ["Lin Yao"], "brief": "\u6269\u6563\u5927\u8bed\u8a00\u6a21\u578b\u5728\u6bcf\u6b65\u53bb\u566a\u65f6\u72ec\u7acb\u89e3\u7801\u591a\u4e2atoken\uff0c\u5bfc\u81f4\u76f8\u4e92\u4f9d\u8d56\u7684token\u4e4b\u95f4\u5b58\u5728\u56e0\u5b50\u5206\u89e3\u8bef\u5dee\u3002\u672c\u6587\u63d0\u51faCoCommit\u65b9\u6cd5\uff0c\u901a\u8fc7\u6807\u8bb0\u95e8\u63a7\u534f\u8c03\u673a\u5236\u8ba9\u5f85\u63d0\u4ea4\u7684token\u5728\u5199\u5165\u524d\u8fdb\u884c\u8054\u5408\u534f\u8c03\uff0c\u8fd1\u4f3c\u8054\u5408\u6a21\u5f0f\u89e3\u7801\u3002\u5728LLaDA2.1-mini\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728\u516d\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u5747\u63d0\u5347\u4e86\u51c6\u786e\u7387\uff0c\u63a8\u7406\u548c\u7cbe\u786e\u7b54\u6848\u4efb\u52a1\u6536\u76ca\u6700\u5927\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04469", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u8bed\u8a00\u6a21\u578b", "\u6587\u672c\u751f\u6210", "\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04469v1", "published_at": "2026-07-05", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Don\u0027t Commit Alone: Joint Token Commitment in Diffusion Large Language Models", "tldr": "\u6269\u6563\u5927\u8bed\u8a00\u6a21\u578b\u5728\u6bcf\u6b65\u53bb\u566a\u65f6\u72ec\u7acb\u89e3\u7801\u591a\u4e2atoken\uff0c\u5bfc\u81f4\u76f8\u4e92\u4f9d\u8d56\u7684token\u4e4b\u95f4\u5b58\u5728\u56e0\u5b50\u5206\u89e3\u8bef\u5dee\u3002\u672c\u6587\u63d0\u51faCoCommit\u65b9\u6cd5\uff0c\u901a\u8fc7\u6807\u8bb0\u95e8\u63a7\u534f\u8c03\u673a\u5236\u8ba9\u5f85\u63d0\u4ea4\u7684token\u5728\u5199\u5165\u524d\u8fdb\u884c\u8054\u5408\u534f\u8c03\uff0c\u8fd1\u4f3c\u8054\u5408\u6a21\u5f0f\u89e3\u7801\u3002\u5728LLaDA2.1-mini\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728\u516d\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u5747\u63d0\u5347\u4e86\u51c6\u786e\u7387\uff0c\u63a8\u7406\u548c\u7cbe\u786e\u7b54\u6848\u4efb\u52a1\u6536\u76ca\u6700\u5927\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "End-to-end autonomous driving (E2E-AD) aims to directly map raw sensor information to driving actions. Recently, with the rapid advancement of multi-modal large language models (MLLMs), researchers have proposed the paradigm of Vision-Language-Action (VLA) models for E2E-AD, where it seeks to integrate visual perception, language understanding and action prediction within a single policy. However, existing VLA-based policies largely adopts imitation learning, where it only learns to drive by optimizing distance-based metrics w.r.t. logged expert trajectories. Such distribution shift between open-loop training and closed-loop inference leads to suboptimal performance in closed-loop planning. To close this gap, we present CLEAR, a system that enables closed-loop training using Reinforcement Learning (RL) at scale for E2E-AD. We propose to learn a novel residual waypoint policy around the waypoint prior from pretrained VLA policies, effectively harnessing the knowledge within. On another front, one of the key challenges to scale up RL for vision-based policies is the number of parallel simulation environments since RL is data hungry. To that end, we design a heterogeneous pipeline that places the simulator and the VLA learner on distinct compute groups, which allows us to dramatically increase the number of simulation environments running in parallel while avoiding resource contention and maintaining training stability. We show that with a simple reward, CLEAR significantly outperforms previous methods and sets new state-of-the-art performance on the challenging benchmarks of CARLA longest6 v2 and Bench2Drive.", "arxiv_id": "2607.02841", "arxiv_url": "https://arxiv.org/abs/2607.02841", "authors": ["Yunxiao Shi", "Hong Cai", "Mohammad Ghavamzadeh", "Fatih Porikli"], "brief": "\u63d0\u51faCLEAR\u7cfb\u7edf\uff0c\u5c06\u5f3a\u5316\u5b66\u4e60\u5f15\u5165\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\u7684\u95ed\u73af\u8bad\u7ec3\uff0c\u901a\u8fc7\u5728\u9884\u8bad\u7ec3VLA\u7b56\u7565\u57fa\u7840\u4e0a\u5b66\u4e60\u6b8b\u5dee\u8def\u5f84\u70b9\u7b56\u7565\uff0c\u5e76\u8bbe\u8ba1\u5f02\u6784\u5e76\u884c\u4eff\u771f\u6d41\u6c34\u7ebf\u5927\u5e45\u6269\u5c55\u8bad\u7ec3\u89c4\u6a21\uff0c\u5728CARLA\u7b49\u57fa\u51c6\u4e0a\u8fbe\u5230\u65b0\u7684\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02841", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02841v1", "published_at": "2026-07-03", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CLEAR: Closed-Loop Reinforcement Learning at Scale for End-to-End Autonomous Driving", "tldr": "\u63d0\u51faCLEAR\u7cfb\u7edf\uff0c\u5c06\u5f3a\u5316\u5b66\u4e60\u5f15\u5165\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\u7684\u95ed\u73af\u8bad\u7ec3\uff0c\u901a\u8fc7\u5728\u9884\u8bad\u7ec3VLA\u7b56\u7565\u57fa\u7840\u4e0a\u5b66\u4e60\u6b8b\u5dee\u8def\u5f84\u70b9\u7b56\u7565\uff0c\u5e76\u8bbe\u8ba1\u5f02\u6784\u5e76\u884c\u4eff\u771f\u6d41\u6c34\u7ebf\u5927\u5e45\u6269\u5c55\u8bad\u7ec3\u89c4\u6a21\uff0c\u5728CARLA\u7b49\u57fa\u51c6\u4e0a\u8fbe\u5230\u65b0\u7684\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large Vision-Language Models (LVLMs) exhibit remarkable vision-language capabilities and are increasingly deployed in real-world applications such as personal assistants, document analysis systems, and embodied agents. However, their dual-modal attack surfaces make them vulnerable to jailbreak attacks. Existing LVLM jailbreaks rely on simple designs, e.g., short text and out-of-distribution images. Nevertheless, recent advancements in both large language model backbones and multimodal mechanisms undermine these attacks, particularly their transferability among model architectures. To overcome this limitation, we propose a novel information overloading method that is equipped with both extensive text and multi-dimensional image attacks. These components are arranged in recursion-based image-typography layouts to exponentially increase multimodal information complexity. This overloading approach amplifies the cross-modal processing required, which undermines the safety alignment in LVLMs. Extensive experiments on both open-sourced and commercial LVLMs establish our method as a new state-of-the-art LVLM jailbreak attack. On open-source models, our method achieves an average ASR of 88.6%; on commercial LVLMs, it reaches an average ASR of 84.0%, exceeding the best baseline by 48.7%. Moreover, our prompts optimized on open-source surrogate models transfer effectively across model families. Beyond empirical results, we probe the safety-critical information flows within victim LVLMs. Our observations reveal that complex image-typography compositions induce intensified cross-modal processing and reduce the model\u0027s certainty in generating refusal responses. Together, these findings highlight information overloading as a practical and emerging safety risk for real-world LVLM deployments, underscoring the need for stronger defenses against complex multimodal jailbreak inputs.", "arxiv_id": "2607.02961", "arxiv_url": "https://arxiv.org/abs/2607.02961", "authors": ["Haoyu Zhang", "Yangyang Guo", "Mohan Kankanhalli"], "brief": "\u63d0\u51fa\u4e00\u79cd\u9488\u5bf9\u5927\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\"\u4fe1\u606f\u8fc7\u8f7d\"\u8d8a\u72f1\u653b\u51fb\u65b9\u6cd5\uff0c\u901a\u8fc7\u9012\u5f52\u5f0f\u56fe\u6587\u6392\u7248\u5c06\u5927\u91cf\u6587\u672c\u4e0e\u591a\u7ef4\u56fe\u50cf\u7ec4\u5408\uff0c\u6307\u6570\u7ea7\u589e\u52a0\u591a\u6a21\u6001\u4fe1\u606f\u590d\u6742\u5ea6\uff0c\u4ece\u800c\u7834\u574f\u6a21\u578b\u5b89\u5168\u5bf9\u9f50\u3002\u5728\u5f00\u6e90\u548c\u5546\u4e1a\u6a21\u578b\u4e0a\u5206\u522b\u8fbe\u523088.6%\u548c84.0%\u7684\u653b\u51fb\u6210\u529f\u7387\uff0c\u8d85\u8d8a\u6700\u4f73\u57fa\u7ebf48.7%\uff0c\u4e14\u5177\u6709\u826f\u597d\u7684\u8de8\u6a21\u578b\u8fc1\u79fb\u6027\u3002", "categories": ["cs.CV", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02961", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u8d8a\u72f1\u653b\u51fb", "\u5b89\u5168\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02961v1", "published_at": "2026-07-03", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Overloading Large Vision-Language Models for Jailbreaking", "tldr": "\u63d0\u51fa\u4e00\u79cd\u9488\u5bf9\u5927\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\"\u4fe1\u606f\u8fc7\u8f7d\"\u8d8a\u72f1\u653b\u51fb\u65b9\u6cd5\uff0c\u901a\u8fc7\u9012\u5f52\u5f0f\u56fe\u6587\u6392\u7248\u5c06\u5927\u91cf\u6587\u672c\u4e0e\u591a\u7ef4\u56fe\u50cf\u7ec4\u5408\uff0c\u6307\u6570\u7ea7\u589e\u52a0\u591a\u6a21\u6001\u4fe1\u606f\u590d\u6742\u5ea6\uff0c\u4ece\u800c\u7834\u574f\u6a21\u578b\u5b89\u5168\u5bf9\u9f50\u3002\u5728\u5f00\u6e90\u548c\u5546\u4e1a\u6a21\u578b\u4e0a\u5206\u522b\u8fbe\u523088.6%\u548c84.0%\u7684\u653b\u51fb\u6210\u529f\u7387\uff0c\u8d85\u8d8a\u6700\u4f73\u57fa\u7ebf48.7%\uff0c\u4e14\u5177\u6709\u826f\u597d\u7684\u8de8\u6a21\u578b\u8fc1\u79fb\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Massive Activations (MAs) have been widely observed in Transformer-based models, yet their structure and functional roles in Diffusion Transformers (DiTs) remain insufficiently understood. In this work, we systematically analyze MAs in representative DiTs and find that they are spatially distributed across image tokens while concentrated in a small set of fixed feature dimensions. We further show that these dimensions are closely aligned with AdaLN residual scaling factors and are primarily modulated by the denoising timestep rather than text conditions. This structure leads to two task-dependent effects: for generation, MAs are critical for fine-grained detail synthesis while having limited influence on global semantics; for understanding, their shared high-magnitude directions make raw DiT features overly similar across spatial tokens and weaken dense feature discrimination. Based on these findings, we introduce Eliciting Massive Activation (EMA), a training-free framework that leverages Massive Activations (MAs) as a unified modulation signal to improve both generative and representational capabilities of DiTs. For generation, EMA proposes MA-driven Detail G}uidance (DG), which suppresses MA dimensions to construct a detail-deficient counterfactual prediction and guides sampling toward finer visual details. DG further supports efficient partial-forward inference, integration with classifier-free guidance, and token-level Local DG for refining selected image regions. For understanding, EMA introduces MA-modulated REPresentation extraction (MREP), which uses pretrained AdaLN channel-wise modulation to reduce MA directional dominance and concatenates spatially normalized MA maps to preserve useful spatial structure. Extensive experiments demonstrate that EMA consistently improves both the generation quality and representation capability of DiTs.", "arxiv_id": "2607.02968", "arxiv_url": "https://arxiv.org/abs/2607.02968", "authors": ["Chaofan Gan", "Zicheng Zhao", "Yuanpeng Tu", "Xi Chen", "Ziran Qin", "Tieyuan Chen", "Supavadee Aramvith", "Mehrtash Harandi", "Weiyao Lin"], "brief": "\u672c\u6587\u7cfb\u7edf\u5206\u6790\u4e86\u6269\u6563Transformer\uff08DiT\uff09\u4e2d\u7684\u5927\u6fc0\u6d3b\u503c\uff08Massive Activations\uff09\u73b0\u8c61\uff0c\u53d1\u73b0\u5176\u5206\u5e03\u4e8e\u56fa\u5b9a\u7279\u5f81\u7ef4\u5ea6\u5e76\u53d7\u53bb\u566a\u65f6\u95f4\u6b65\u8c03\u5236\u3002\u57fa\u4e8e\u6b64\u63d0\u51fa\u65e0\u9700\u8bad\u7ec3\u7684EMA\u6846\u67b6\uff1a\u751f\u6210\u4fa7\u901a\u8fc7\u6291\u5236MA\u7ef4\u5ea6\u6784\u5efa\u53cd\u4e8b\u5b9e\u9884\u6d4b\u4ee5\u5f15\u5bfc\u7ec6\u8282\u751f\u6210\uff0c\u7406\u89e3\u4fa7\u901a\u8fc7AdaLN\u8c03\u5236\u964d\u4f4eMA\u65b9\u5411\u4e3b\u5bfc\u6027\u4ee5\u589e\u5f3a\u7279\u5f81\u5224\u522b\u529b\uff0c\u5728\u751f\u6210\u8d28\u91cf\u548c\u8868\u5f81\u80fd\u529b\u4e0a\u5747\u53d6\u5f97\u63d0\u5347\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02968", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "Transformer", "\u56fe\u50cf\u751f\u6210", "\u89c6\u89c9\u8868\u5f81"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02968v1", "published_at": "2026-07-03", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Awakening Diffusion Transformers: Eliciting Stronger Generation and Understanding via Massive Activation Modulation", "tldr": "\u672c\u6587\u7cfb\u7edf\u5206\u6790\u4e86\u6269\u6563Transformer\uff08DiT\uff09\u4e2d\u7684\u5927\u6fc0\u6d3b\u503c\uff08Massive Activations\uff09\u73b0\u8c61\uff0c\u53d1\u73b0\u5176\u5206\u5e03\u4e8e\u56fa\u5b9a\u7279\u5f81\u7ef4\u5ea6\u5e76\u53d7\u53bb\u566a\u65f6\u95f4\u6b65\u8c03\u5236\u3002\u57fa\u4e8e\u6b64\u63d0\u51fa\u65e0\u9700\u8bad\u7ec3\u7684EMA\u6846\u67b6\uff1a\u751f\u6210\u4fa7\u901a\u8fc7\u6291\u5236MA\u7ef4\u5ea6\u6784\u5efa\u53cd\u4e8b\u5b9e\u9884\u6d4b\u4ee5\u5f15\u5bfc\u7ec6\u8282\u751f\u6210\uff0c\u7406\u89e3\u4fa7\u901a\u8fc7AdaLN\u8c03\u5236\u964d\u4f4eMA\u65b9\u5411\u4e3b\u5bfc\u6027\u4ee5\u589e\u5f3a\u7279\u5f81\u5224\u522b\u529b\uff0c\u5728\u751f\u6210\u8d28\u91cf\u548c\u8868\u5f81\u80fd\u529b\u4e0a\u5747\u53d6\u5f97\u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Human spatial understanding arises from jointly perceiving geometry and semantics, enabling consistent object identification and localization across viewpoints and time. Current video segmentation models depend on explicit object appearance memory banks for instance tracking, yet they remain vulnerable to large viewpoint changes and long-term occlusions. Leveraging the spatial consistency afforded by modern feed-forward 3D reconstruction models, we propose the Geometry Grounded Tracking Anything Model (G$^2$TAM), a unified framework for promptable instance tracking in 3D using only unordered RGB images or videos. G$^2$TAM employs spatially aligned geometric representations as implicit memory, ensuring stable instance identity and localization across frames and views. At its core is a cross-modal spatial encoder that integrates visual and textual prompts into a shared geometric space, enabling end-to-end spatial reconstruction and instance-consistent mask prediction. To support training and evaluation, we construct InsTrack, a large-scale dataset with a dedicated validation split for benchmarking. Extensive experiments show that G$^2$TAM delivers strong cross-view consistency, promptable instance spatial tracking, video object segmentation and spatial reconstruction, establishing a foundation for interactive, geometry-grounded spatial reasoning.", "arxiv_id": "2607.03789", "arxiv_url": "https://arxiv.org/abs/2607.03789", "authors": ["Chenming Zhu", "Peizhou Cao", "Jingli Lin", "Wenbo Hu", "Yunlong Ran", "Jiangmiao Pang", "Tai Wang", "Xihui Liu"], "brief": "\u63d0\u51faG\u00b2TAM\u6846\u67b6\uff0c\u5229\u7528\u524d\u99883D\u91cd\u5efa\u6a21\u578b\u7684\u7a7a\u95f4\u4e00\u81f4\u6027\u4f5c\u4e3a\u9690\u5f0f\u8bb0\u5fc6\uff0c\u66ff\u4ee3\u4f20\u7edf\u5916\u89c2\u8bb0\u5fc6\u5e93\uff0c\u5b9e\u73b0\u57fa\u4e8eRGB\u56fe\u50cf/\u89c6\u9891\u7684\u53ef\u63d0\u793a\u5b9e\u4f8b3D\u8ddf\u8e2a\u3002\u901a\u8fc7\u8de8\u6a21\u6001\u7a7a\u95f4\u7f16\u7801\u5668\u878d\u5408\u89c6\u89c9\u4e0e\u6587\u672c\u63d0\u793a\uff0c\u5728\u5927\u89c6\u89d2\u53d8\u5316\u548c\u957f\u671f\u906e\u6321\u573a\u666f\u4e0b\u4fdd\u6301\u7a33\u5b9a\u7684\u5b9e\u4f8b\u8eab\u4efd\u4e0e\u5b9a\u4f4d\uff0c\u5e76\u6784\u5efa\u4e86\u5927\u89c4\u6a21\u6570\u636e\u96c6InsTrack\u652f\u6301\u8bad\u7ec3\u4e0e\u8bc4\u6d4b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03789", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u5206\u5272", "3D\u91cd\u5efa", "\u5b9e\u4f8b\u8ddf\u8e2a", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03789v1", "published_at": "2026-07-04", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "G$^2$TAM: Geometry Grounded Track Anything Model", "tldr": "\u63d0\u51faG\u00b2TAM\u6846\u67b6\uff0c\u5229\u7528\u524d\u99883D\u91cd\u5efa\u6a21\u578b\u7684\u7a7a\u95f4\u4e00\u81f4\u6027\u4f5c\u4e3a\u9690\u5f0f\u8bb0\u5fc6\uff0c\u66ff\u4ee3\u4f20\u7edf\u5916\u89c2\u8bb0\u5fc6\u5e93\uff0c\u5b9e\u73b0\u57fa\u4e8eRGB\u56fe\u50cf/\u89c6\u9891\u7684\u53ef\u63d0\u793a\u5b9e\u4f8b3D\u8ddf\u8e2a\u3002\u901a\u8fc7\u8de8\u6a21\u6001\u7a7a\u95f4\u7f16\u7801\u5668\u878d\u5408\u89c6\u89c9\u4e0e\u6587\u672c\u63d0\u793a\uff0c\u5728\u5927\u89c6\u89d2\u53d8\u5316\u548c\u957f\u671f\u906e\u6321\u573a\u666f\u4e0b\u4fdd\u6301\u7a33\u5b9a\u7684\u5b9e\u4f8b\u8eab\u4efd\u4e0e\u5b9a\u4f4d\uff0c\u5e76\u6784\u5efa\u4e86\u5927\u89c4\u6a21\u6570\u636e\u96c6InsTrack\u652f\u6301\u8bad\u7ec3\u4e0e\u8bc4\u6d4b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "3D reconstruction of articulated objects from a single image is challenging because large training datasets with paired image and 3D supervision are difficult to obtain. Recent point map-based methods achieve strong performance but rely on synthetic datasets rendered from manually created articulated 3D assets with carefully curated pose distributions. While camera viewpoints can be easily sampled, generating realistic object articulations remains costly and labor-intensive. We propose a training framework that reduces this requirement by leveraging unannotated 2D images collections with only a single rigged canonical mesh per category. Starting from a weak 3D shape predictor trained on canonical-pose renders, we iteratively estimate object articulation and camera pose by fitting the mesh to predicted point maps. The recovered articulations and viewpoints are then used to render updated synthetic training data, progressively improving the predictor. Despite using substantially weaker 3D supervision, our models achieve performance comparable with DualPM, which requires manually curated articulated training datasets.", "arxiv_id": "2607.03891", "arxiv_url": "https://arxiv.org/abs/2607.03891", "authors": ["Jakub Zadrozny", "Oisin Mac Aodha", "Hakan Bilen"], "brief": "\u63d0\u51faBAT3R\u6846\u67b6\uff0c\u4ec5\u9700\u6bcf\u7c7b\u4e00\u4e2a\u7ed1\u5b9a\u9aa8\u9abc\u7684\u6807\u51c6\u7f51\u683c\u548c\u65e0\u6807\u6ce82D\u56fe\u50cf\u96c6\u5408\uff0c\u901a\u8fc7\u8fed\u4ee3\u4f30\u8ba1\u7269\u4f53\u5173\u8282\u59ff\u6001\u4e0e\u76f8\u673a\u4f4d\u59ff\u6765\u81ea\u52a8\u751f\u6210\u5408\u6210\u8bad\u7ec3\u6570\u636e\uff0c\u9010\u6b65\u63d0\u5347\u5355\u56fe\u94f0\u63a5\u7269\u4f533D\u91cd\u5efa\u6027\u80fd\uff0c\u6700\u7ec8\u8fbe\u5230\u4e0e\u9700\u8981\u4eba\u5de5\u6807\u6ce8\u5173\u8282\u6570\u636e\u96c6\u7684DualPM\u76f8\u5f53\u7684\u6548\u679c\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03891", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u91cd\u5efa", "\u94f0\u63a5\u7269\u4f53", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u70b9\u56fe"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03891v1", "published_at": "2026-07-04", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "BAT3R: Bootstrapping Articulated 3D Reconstruction from 2D Image Collections", "tldr": "\u63d0\u51faBAT3R\u6846\u67b6\uff0c\u4ec5\u9700\u6bcf\u7c7b\u4e00\u4e2a\u7ed1\u5b9a\u9aa8\u9abc\u7684\u6807\u51c6\u7f51\u683c\u548c\u65e0\u6807\u6ce82D\u56fe\u50cf\u96c6\u5408\uff0c\u901a\u8fc7\u8fed\u4ee3\u4f30\u8ba1\u7269\u4f53\u5173\u8282\u59ff\u6001\u4e0e\u76f8\u673a\u4f4d\u59ff\u6765\u81ea\u52a8\u751f\u6210\u5408\u6210\u8bad\u7ec3\u6570\u636e\uff0c\u9010\u6b65\u63d0\u5347\u5355\u56fe\u94f0\u63a5\u7269\u4f533D\u91cd\u5efa\u6027\u80fd\uff0c\u6700\u7ec8\u8fbe\u5230\u4e0e\u9700\u8981\u4eba\u5de5\u6807\u6ce8\u5173\u8282\u6570\u636e\u96c6\u7684DualPM\u76f8\u5f53\u7684\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent advances in single image-to-3D generation have enabled high-quality asset synthesis, yet extending these capabilities to indoor scene generation remains challenging. Existing methods focus on asset-level generation while neglecting the structural layout, which is essential for downstream applications and serves as the spatial anchor for grounding assets. However, a single image with a limited field of view lacks the spatial coverage to recover a coherent global layout. To this end, we use a 360\u00b0 image represented in equirectangular projection (ERP) and propose InSpace, a structure-aware framework for 3D indoor scene generation. InSpace comprises three stages: (1) estimating partial scene geometry as spatial priors, (2) generating coarse scene structure with view-selective cross-attention, and (3) producing detailed layout and asset geometry with textures through a global-local hybrid attention, using flow matching. We also propose ERP-FRONT, a paired ERP-Image-to-3D indoor scene dataset based on 3D-FRONT. Experiments show that InSpace generates complete 3D indoor scenes with structural layout, along with separate textured assets from a single ERP image, achieving strong performance across 3D and 2D metrics. Project Page: https://kookie12.github.io/InSpace-Project-Page/", "arxiv_id": "2607.03990", "arxiv_url": "https://arxiv.org/abs/2607.03990", "authors": ["Gwanhyeong Koo", "Hyunsu Kim", "Youngji Kim", "Taejae Lee", "Siwoo Lim", "Sunjae Yoon", "Suyong Yeon", "Chang D. Yoo"], "brief": "\u63d0\u51faInSpace\u6846\u67b6\uff0c\u4ece\u5355\u5f20360\u00b0\u5168\u666f\u56fe\u751f\u6210\u7ed3\u6784\u611f\u77e5\u7684\u5b8c\u65743D\u5ba4\u5185\u573a\u666f\u3002\u901a\u8fc7\u4e09\u9636\u6bb5\u6d41\u7a0b\uff08\u51e0\u4f55\u4f30\u8ba1\u3001\u7c97\u7ed3\u6784\u751f\u6210\u3001\u7ec6\u8282\u5e03\u5c40\u4e0e\u8d44\u4ea7\u751f\u6210\uff09\u7ed3\u5408\u6d41\u5339\u914d\u6280\u672f\uff0c\u540c\u65f6\u8f93\u51fa\u573a\u666f\u7ed3\u6784\u5e03\u5c40\u548c\u72ec\u7acb\u5e26\u7eb9\u7406\u8d44\u4ea7\uff0c\u5e76\u6784\u5efa\u4e86\u914d\u5957\u6570\u636e\u96c6ERP-FRONT\uff0c\u57282D\u548c3D\u6307\u6807\u4e0a\u5747\u8868\u73b0\u4f18\u5f02\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03990", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u573a\u666f\u751f\u6210", "\u5ba4\u5185\u573a\u666f", "\u5168\u666f\u56fe", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03990v1", "published_at": "2026-07-04", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "InSpace: Structure-Aware 3D Indoor Scene Generation from a Single 360\u00b0 Image", "tldr": "\u63d0\u51faInSpace\u6846\u67b6\uff0c\u4ece\u5355\u5f20360\u00b0\u5168\u666f\u56fe\u751f\u6210\u7ed3\u6784\u611f\u77e5\u7684\u5b8c\u65743D\u5ba4\u5185\u573a\u666f\u3002\u901a\u8fc7\u4e09\u9636\u6bb5\u6d41\u7a0b\uff08\u51e0\u4f55\u4f30\u8ba1\u3001\u7c97\u7ed3\u6784\u751f\u6210\u3001\u7ec6\u8282\u5e03\u5c40\u4e0e\u8d44\u4ea7\u751f\u6210\uff09\u7ed3\u5408\u6d41\u5339\u914d\u6280\u672f\uff0c\u540c\u65f6\u8f93\u51fa\u573a\u666f\u7ed3\u6784\u5e03\u5c40\u548c\u72ec\u7acb\u5e26\u7eb9\u7406\u8d44\u4ea7\uff0c\u5e76\u6784\u5efa\u4e86\u914d\u5957\u6570\u636e\u96c6ERP-FRONT\uff0c\u57282D\u548c3D\u6307\u6807\u4e0a\u5747\u8868\u73b0\u4f18\u5f02\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
