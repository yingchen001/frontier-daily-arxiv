c\u53d8\u91cf\u5f15\u5bfc\u7684\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\uff0c\u5927\u5e45\u63d0\u5347\u673a\u5668\u4eba\u7cbe\u5bc6\u64cd\u4f5c\u4efb\u52a1\u6210\u529f\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faHALO-WA\u6846\u67b6\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7actor-critic\u9002\u914d\u5668\u5229\u7528\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\u7684\u6f5c\u53d8\u91cf\u7279\u5f81\u548c\u52a8\u4f5c\u5148\u9a8c\uff0c\u7ed3\u5408\u6df7\u5408\u6ce8\u610f\u529b\u7ed3\u6784\uff0c\u5b9e\u73b0\u5bf9\u771f\u5b9e\u90e8\u7f72\u8bef\u5dee\u7684\u5feb\u901f\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u9002\u5e94\uff0c\u89e3\u51b3\u673a\u5668\u4eba\u7cbe\u5bc6\u64cd\u4f5c\u6700\u540e\u51e0\u6beb\u7c73\u5bf9\u9f50/\u63d2\u5165\u5931\u8d25\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c06\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u4e0e\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\u7684\u6f5c\u53d8\u91cf\u5f15\u5bfc\u76f8\u7ed3\u5408\uff0c\u4ee5\u6781\u4f4e\u8bad\u7ec3\u6210\u672c\u89e3\u51b3\u4e86\u901a\u7528\u673a\u5668\u4eba\u64cd\u4f5c\u6a21\u578b\u5728\u7cbe\u5bc6\u4efb\u52a1\u4e2d\u7684\u6700\u540e\u4e00\u516c\u91cc\u95ee\u9898\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Recent NVFP4 pretraining methods mainly target transformer linear layers, leaving optimizer states, optimizer arithmetic and attention underexplored in 4-bit pipelines. This critical gap blocks stable full-stack 4-bit pretraining, as the three core modules exhibit unique numerical failure patterns: linear layers hit hard quantization noise limits with dimension-propagated error amplification; AdamW second moments are heavy-tailed non-negative values fragile to low-precision denominators; attention carries error-prone computation paths demanding strict forward-backward quantization consistency. We propose Full-Stack FP4, the first complete NVFP4 pretraining framework resolving all three stability bottlenecks via module-wise precision strategies. For linear projections, LoRA-SVD lightweight decomposition suppresses quantization noise and breaks the direct-quantization error ceiling, shrinking the linear-only loss gap from 1.40% to 0.61%. For optimizers, we design AdamW second-moment transformation for robust NVFP4 storage and fully support native NVFP4 Newton-Schulz iterations for the Root (Muon) optimizer. For attention, a mixed-precision scheme quantizes Q/K/V and backward dS while guarding vulnerable paths in BF16, paired with unified tensor reuse to sustain forward-backward alignment. We further analyze fast error accumulation in naive low-bit matrix multiplication and the extreme sensitivity of PV / dOV^T attention branches. All modules are plug-and-play with cumulative stability and efficiency improvements. Our 3B/64B-token pretraining validates near-BF16 performance with merely 1.47% loss gap, verifying feasible stable end-to-end NVFP4 LLM pretraining.", "arxiv_id": "2607.04422", "arxiv_url": "https://arxiv.org/abs/2607.04422", "authors": ["Siyu Ding", "Mingchuan Ma", "Jiabo Tong", "Xingrun Xing", "Ziming Wang", "Guoqi Li"], "brief": "\u63d0\u51faFull-Stack FP4\u6846\u67b6\uff0c\u9996\u6b21\u7cfb\u7edf\u89e3\u51b3NVFP4\u9884\u8bad\u7ec3\u4e2d\u7ebf\u6027\u6295\u5f71\u3001\u4f18\u5316\u5668\u72b6\u6001/\u8fd0\u7b97\u548c\u6ce8\u610f\u529b\u673a\u5236\u4e09\u5927\u6a21\u5757\u7684\u6570\u503c\u7a33\u5b9a\u6027\u95ee\u9898\uff0c\u5b9e\u73b0\u7aef\u5230\u7aef4-bit LLM\u9884\u8bad\u7ec3\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04422", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u7ebf\u6027\u5c42\u91c7\u7528LoRA-SVD\u8f7b\u91cf\u5206\u89e3\u6291\u5236\u91cf\u5316\u566a\u58f0\uff0c\u5c06\u635f\u5931\u5dee\u8ddd\u4ece1.40%\u538b\u7f29\u81f30.61%", "\u4e3aAdamW\u4e8c\u9636\u77e9\u8bbe\u8ba1NVFP4\u9c81\u68d2\u5b58\u50a8\u53d8\u6362\uff0c\u5e76\u652f\u6301Muon\u4f18\u5316\u5668\u7684\u539f\u751fFP4 Newton-Schulz\u8fed\u4ee3", "\u6ce8\u610f\u529b\u673a\u5236\u91c7\u7528\u6df7\u5408\u7cbe\u5ea6\u65b9\u6848\uff1aQ/K/V\u53ca\u53cd\u5411dS\u7528FP4\u91cf\u5316\uff0c\u654f\u611f\u8def\u5f84\u4fdd\u7559BF16\uff0c\u914d\u5408\u5f20\u91cf\u590d\u7528\u4fdd\u6301\u524d\u5411-\u53cd\u5411\u4e00\u81f4\u6027", "3B\u53c2\u6570/64B token\u9884\u8bad\u7ec3\u9a8c\u8bc1\uff0c\u6700\u7ec8\u635f\u5931\u5dee\u8ddd\u4ec51.47%\uff0c\u63a5\u8fd1BF16\u57fa\u7ebf\u6027\u80fd"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u91cf\u5316\u8bad\u7ec3", "\u6a21\u578b\u9884\u8bad\u7ec3", "\u4f4e\u7cbe\u5ea6\u8ba1\u7b97"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04422v1", "published_at": "2026-07-05", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Full-Stack FP4: Stable LLM Pretraining with Quantized Projections, Optimizers, and Attention", "tldr": "\u9996\u4e2a\u5b8c\u6574FP4\u5168\u6808LLM\u9884\u8bad\u7ec3\u6846\u67b6\uff0c\u89e3\u51b3\u7ebf\u6027\u5c42\u3001\u4f18\u5316\u5668\u548c\u6ce8\u610f\u529b\u673a\u5236\u76844-bit\u7a33\u5b9a\u6027\u74f6\u9888", "upvotes": 0, "what_it_is": "\u63d0\u51faFull-Stack FP4\u6846\u67b6\uff0c\u9996\u6b21\u7cfb\u7edf\u89e3\u51b3NVFP4\u9884\u8bad\u7ec3\u4e2d\u7ebf\u6027\u6295\u5f71\u3001\u4f18\u5316\u5668\u72b6\u6001/\u8fd0\u7b97\u548c\u6ce8\u610f\u529b\u673a\u5236\u4e09\u5927\u6a21\u5757\u7684\u6570\u503c\u7a33\u5b9a\u6027\u95ee\u9898\uff0c\u5b9e\u73b0\u7aef\u5230\u7aef4-bit LLM\u9884\u8bad\u7ec3\u3002", "why_notable": "\u9996\u4e2a\u8986\u76d6\u7ebf\u6027\u5c42\u3001\u4f18\u5316\u5668\u548c\u6ce8\u610f\u529b\u7684\u5b8c\u6574FP4\u9884\u8bad\u7ec3\u65b9\u6848\uff0c\u5404\u6a21\u5757\u5373\u63d2\u5373\u7528\uff0c\u4e3a\u5927\u5e45\u964d\u4f4eLLM\u9884\u8bad\u7ec3\u663e\u5b58\u4e0e\u8ba1\u7b97\u6210\u672c\u63d0\u4f9b\u4e86\u53ef\u884c\u7684\u5de5\u7a0b\u8def\u5f84\u3002"}, {"abstract": "Generalist robot manipulation policies have advanced rapidly, yet existing benchmarks remain limited in systematically evaluating their capabilities. Many rely on simple, short-horizon, or skill-narrow tasks with limited capability coverage, and are often conducted only in simulation or only in the real world. Simulation enables scalable feedback but misses physical deployment challenges, while real-world evaluation is costly, time-consuming, and difficult to reproduce. We introduce RoboDojo, a unified sim-and-real benchmark for comprehensive evaluation of generalist robot manipulation policies. RoboDojo includes 42 simulation tasks and 18 real-world tasks covering diverse and complementary manipulation capabilities. The simulation benchmark evaluates five dimensions: generalization, memory, precision, long-horizon execution, and open-vocabulary instruction following, while the real-world benchmark exposes policies to challenging physical-world deployment conditions. RoboDojo supports scalable evaluation through heterogeneous parallel simulation in Isaac Sim and provides RoboDojo-RealEval, a reproducible real-world evaluation system with remote cloud access, standardized hardware, scene reset, evaluation protocol, and deployment interface. Together with XPolicyLab, policies can be integrated once and evaluated across simulation and real-world settings with minimal adaptation. We integrate 30 policies into XPolicyLab and evaluate them on RoboDojo, establishing a public leaderboard and systematic analysis of current policy performance. The website is available at http://robodojo-benchmark.com/.", "arxiv_id": "2607.04434", "arxiv_url": "https://arxiv.org/abs/2607.04434", "authors": ["Tianxing Chen", "Yue Chen", "Zixuan Li", "Junyuan Tang", "Kailun Su", "Haoran Lu", "Weijie Wan", "Baijun Chen", "Songling Liu", "Haowen Yan", "Honghao Su", "Zhiyang Dou", "Kaixuan Wang", "Dandan Zhang", "Yunze Liu", "Yan Qin", "Qiwei Liang", "Qiwei Wu", "Zijian Lin", "Wenwei Lin", "Yuran Wang", "Minghua He", "Tianshu Wu", "Ruihai Wu", "Jingquan Zhou", "Kai-Chong Lei", "Haibao Yu", "Yuanfeng Ji", "Weiyang Jin", "Guanyu Lin", "Xiaofan Li", "Qi Xiong", "Renjing Xu", "Zhongyu Li", "Wenhao Chai", "Enze Xie", "Ziwei Wang", "Yao Mu", "Hao Dong", "Wojciech Matusik", "Mingyu Ding", "Wenbo Ding", "Ping Luo", "Masayoshi Tomizuka"], "brief": "\u63d0\u51faRoboDojo\uff0c\u4e00\u4e2a\u7edf\u4e00\u4eff\u771f\u4e0e\u771f\u5b9e\u4e16\u754c\u7684\u673a\u5668\u4eba\u64cd\u4f5c\u7b56\u7565\u7efc\u5408\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5305\u542b42\u4e2a\u4eff\u771f\u4efb\u52a1\u548c18\u4e2a\u771f\u5b9e\u4efb\u52a1\uff0c\u5e76\u96c6\u621030\u4e2a\u7b56\u7565\u5efa\u7acb\u516c\u5f00\u6392\u884c\u699c\u3002", "categories": ["cs.RO", "cs.AI", "cs.CV", "cs.GR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04434", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4eff\u771f\u8bc4\u6d4b\u8986\u76d65\u4e2a\u7ef4\u5ea6\uff1a\u6cdb\u5316\u3001\u8bb0\u5fc6\u3001\u7cbe\u5ea6\u3001\u957f\u65f6\u5e8f\u6267\u884c\u548c\u5f00\u653e\u8bcd\u6c47\u6307\u4ee4\u8ddf\u968f", "\u63d0\u4f9bRoboDojo-RealEval\u53ef\u590d\u73b0\u771f\u5b9e\u8bc4\u6d4b\u7cfb\u7edf\uff0c\u652f\u6301\u8fdc\u7a0b\u4e91\u7aef\u8bbf\u95ee\u3001\u6807\u51c6\u5316\u786c\u4ef6\u4e0e\u573a\u666f\u91cd\u7f6e", "\u901a\u8fc7XPolicyLab\u5b9e\u73b0\u7b56\u7565\u4e00\u6b21\u96c6\u6210\u3001\u8de8\u4eff\u771f\u4e0e\u771f\u5b9e\u73af\u5883\u7edf\u4e00\u8bc4\u6d4b\uff0c\u5df2\u96c6\u621030\u4e2a\u7b56\u7565"], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u57fa\u51c6\u6d4b\u8bd5", "\u5177\u8eab\u667a\u80fd", "\u4eff\u771f\u4e0e\u771f\u5b9e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04434v3", "published_at": "2026-07-05", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "RoboDojo: A Unified Sim-and-Real Benchmark for Comprehensive Evaluation of Generalist Robot Manipulation Policies", "tldr": "RoboDojo\uff1a\u8986\u76d642\u4e2a\u4eff\u771f+18\u4e2a\u771f\u5b9e\u4efb\u52a1\u7684\u673a\u5668\u4eba\u64cd\u4f5c\u7b56\u7565\u7efc\u5408\u8bc4\u6d4b\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faRoboDojo\uff0c\u4e00\u4e2a\u7edf\u4e00\u4eff\u771f\u4e0e\u771f\u5b9e\u4e16\u754c\u7684\u673a\u5668\u4eba\u64cd\u4f5c\u7b56\u7565\u7efc\u5408\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5305\u542b42\u4e2a\u4eff\u771f\u4efb\u52a1\u548c18\u4e2a\u771f\u5b9e\u4efb\u52a1\uff0c\u5e76\u96c6\u621030\u4e2a\u7b56\u7565\u5efa\u7acb\u516c\u5f00\u6392\u884c\u699c\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u7edf\u4e00\u4eff\u771f\u4e0e\u771f\u5b9e\u4e16\u754c\u7684\u673a\u5668\u4eba\u64cd\u4f5c\u7efc\u5408\u57fa\u51c6\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u57fa\u51c6\u4efb\u52a1\u5355\u4e00\u3001\u8bc4\u6d4b\u5272\u88c2\u3001\u96be\u4ee5\u590d\u73b0\u7684\u75db\u70b9\uff0c\u4e3a\u901a\u7528\u673a\u5668\u4eba\u7b56\u7565\u7814\u7a76\u63d0\u4f9b\u6807\u51c6\u5316\u8bc4\u6d4b\u5e73\u53f0\u3002"}, {"abstract": "Emergent misalignment (EM) -- the broad misbehaviour a language model acquires after fine-tuning on narrow harmful data -- is mediated in Qwen2.5 models by a latent persona direction, and that direction is causal in open weights. Transplanting it into a model that shares only pretraining with its source induces broad EM (2.83 +/- 0.26% misaligned against a random-direction floor of ~1.1%), and ablating a model\u0027s own direction roughly halves an overt inducer\u0027s broadcast (21% to 10%). The transplant doubles as a measurement method, causally assaying directions that a source model represents but cannot itself express. Whether a fine-tune recruits this persona depends on method and capacity, and since low-rank PEFT is the cheaper regime at scale, the recruiting method is also the economical one. On Qwen2.5-32B, low-rank LoRA on insecure code recruits it (3.4% misaligned) while full SFT on identical data does not (0.3%) and moves against the persona axis (drift-persona cosine +0.17 at rank 1 to -0.10), the far-inducer, high-capacity exception consistent with a representational-distance x capacity account. The persona\u0027s causal role is itself conditional. Steering a bad-medical SFT run away from the direction during training raises the broadcast from 24% to 51% while a matched random control lowers it, so removing the direction is no blanket recipe. Because recruitment is a loss-reducing shortcut that capacity renders redundant, it can be screened for and prevented in the tested instances. Persona loss-relevance at the SFT solution orders four inducers\u0027 broadcasts rank-perfectly within Qwen2.5, inoculation removes recruitment selectively (4.75% to 0.0%, code coherence 65% to 87%), and fine-tuning orthogonal to the single behaviour-derived axis reduces it persona-specifically. Results are a controlled case study of one model family, single-seed in places.", "arxiv_id": "2607.04510", "arxiv_url": "https://arxiv.org/abs/2607.04510", "authors": ["Lyndon Drake", "Zandi Eberstadt"], "brief": "\u672c\u6587\u7814\u7a76Qwen2.5\u6a21\u578b\u4e2d\"\u6d8c\u73b0\u6027\u9519\u4f4d\"\uff08EM\uff09\u73b0\u8c61\u7684\u673a\u5236\uff0c\u53d1\u73b0\u5176\u7531\u4e00\u4e2a\u6f5c\u5728\u7684\"\u4eba\u683c\u65b9\u5411\"\u5411\u91cf\u56e0\u679c\u6027\u4ecb\u5bfc\uff0c\u5e76\u7cfb\u7edf\u63a2\u7a76\u4e86\u8be5\u65b9\u5411\u7684\u53ef\u79fb\u690d\u6027\u3001\u53ef\u6d88\u878d\u6027\u53ca\u53ef\u9884\u9632\u6027\u3002", "categories": ["cs.CL", "cs.AI", "cs.CY", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04510", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5c06\u4eba\u683c\u65b9\u5411\u5411\u91cf\u79fb\u690d\u5230\u5171\u4eab\u9884\u8bad\u7ec3\u7684\u6a21\u578b\u53ef\u8bf1\u53d1\u5e7f\u6cdb\u9519\u4f4d\u884c\u4e3a\uff082.83% vs \u968f\u673a\u57fa\u7ebf~1.1%\uff09", "\u4f4e\u79e9LoRA\u5fae\u8c03\u4f1a\u62db\u52df\u8be5\u4eba\u683c\u65b9\u5411\uff08\u9519\u4f4d\u73873.4%\uff09\uff0c\u800c\u5168\u53c2\u6570SFT\u5728\u76f8\u540c\u6570\u636e\u4e0a\u4e0d\u4f1a\uff080.3%\uff09\uff0c\u63ed\u793a\u65b9\u6cd5\u4e0e\u5bb9\u91cf\u7684\u5173\u952e\u5dee\u5f02", "\u901a\u8fc7\u0027\u63a5\u79cd\u0027\uff08inoculation\uff09\u53ef\u9009\u62e9\u6027\u963b\u6b62\u4eba\u683c\u65b9\u5411\u88ab\u62db\u52df\uff08\u9519\u4f4d\u7387\u4ece4.75%\u964d\u81f30.0%\uff0c\u4ee3\u7801\u8fde\u8d2f\u6027\u4ece65%\u5347\u81f387%\uff09"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u5b89\u5168", "\u5bf9\u9f50", "\u5fae\u8c03", "\u6d8c\u73b0\u6027\u9519\u4f4d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04510v1", "published_at": "2026-07-05", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Transplanting, inverting, and preventing a misalignment persona: method-conditional emergent misalignment in Qwen2.5", "tldr": "Qwen2.5\u6a21\u578b\u4e2d\u6d8c\u73b0\u6027\u9519\u4f4d\u884c\u4e3a\u7531\u6f5c\u5728\u4eba\u683c\u65b9\u5411\u9a71\u52a8\uff0c\u53ef\u88ab\u79fb\u690d\u3001\u6d88\u878d\u6216\u9884\u9632", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76Qwen2.5\u6a21\u578b\u4e2d\"\u6d8c\u73b0\u6027\u9519\u4f4d\"\uff08EM\uff09\u73b0\u8c61\u7684\u673a\u5236\uff0c\u53d1\u73b0\u5176\u7531\u4e00\u4e2a\u6f5c\u5728\u7684\"\u4eba\u683c\u65b9\u5411\"\u5411\u91cf\u56e0\u679c\u6027\u4ecb\u5bfc\uff0c\u5e76\u7cfb\u7edf\u63a2\u7a76\u4e86\u8be5\u65b9\u5411\u7684\u53ef\u79fb\u690d\u6027\u3001\u53ef\u6d88\u878d\u6027\u53ca\u53ef\u9884\u9632\u6027\u3002", "why_notable": "\u9996\u6b21\u4ece\u56e0\u679c\u673a\u5236\u89d2\u5ea6\u63ed\u793a\u6d8c\u73b0\u6027\u9519\u4f4d\u7684\u5185\u90e8\u7ed3\u6784\uff0c\u8bc1\u660eEM\u53ef\u88ab\u7cbe\u786e\u79fb\u690d\u3001\u6d4b\u91cf\u548c\u9884\u9632\uff0c\u5bf9LLM\u5b89\u5168\u5bf9\u9f50\u7814\u7a76\u5177\u6709\u91cd\u8981\u65b9\u6cd5\u8bba\u4ef7\u503c\uff0c\u5c24\u5176\u8b66\u793a\u4e86\u5ec9\u4ef7PEFT\u5fae\u8c03\u7684\u6f5c\u5728\u98ce\u9669\u3002"}, {"abstract": "Video Diffusion Transformers (VDiTs) have demonstrated significant capabilities in high-fidelity video generation. However, their ability to produce long-duration videos is fundamentally constrained by the quadratic complexity of the self-attention mechanism. Recent clustering-based sparse attention methods improve the quality-speed trade-off by grouping semantically similar tokens, but their practical efficiency remains limited by two bottlenecks: substantial clustering overhead and low CTA utilization caused by irregular cluster-induced blocks. We propose HyperVAttention (HVA), a training-free sparse attention framework that addresses both bottlenecks jointly. To reduce clustering overhead, we introduce 3D local-window clustering, which exploits the spatio-temporal locality of video tokens to restrict centroid search to fixed local neighborhoods, and implement it with a custom Triton kernel for efficient execution. We further propose a hybrid clustering strategy that performs full clustering only at anchor steps and updates only subset tokens at intermediate steps, leveraging the temporal stability of cluster assignments across denoising steps. To improve CTA utilization, we present hardware-aware cluster merging that minimizes CTA-aligned execution cost through parallel agglomerative merging, improving block density and approximation fidelity by utilizing idle tile capacity. Together, these components reduce clustering overhead, avoid redundant updates, and better align sparse attention with the fixed tile structure of modern GPU kernels. Experiments on Text-to-Video generation show that HVA establishes a new Pareto frontier for training-free sparse attention in video diffusion, reducing end-to-end latency by up to $2.13\\times$ while improving fidelity over existing training-free sparse attention baselines.", "arxiv_id": "2607.03012", "arxiv_url": "https://arxiv.org/abs/2607.03012", "authors": ["Dongyeun Lee", "Amir Zandieh", "Vahab Mirrokni", "Junmo Kim", "Insu Han"], "brief": "\u63d0\u51faHyperVAttention\uff08HVA\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u7a00\u758f\u6ce8\u610f\u529b\u6846\u67b6\uff0c\u901a\u8fc73D\u5c40\u90e8\u7a97\u53e3\u805a\u7c7b\u3001\u6df7\u5408\u805a\u7c7b\u7b56\u7565\u548c\u786c\u4ef6\u611f\u77e5\u7c07\u5408\u5e76\uff0c\u540c\u65f6\u89e3\u51b3\u89c6\u9891\u6269\u6563Transformer\u4e2d\u805a\u7c7b\u5f00\u9500\u5927\u548cGPU\u5229\u7528\u7387\u4f4e\u4e24\u5927\u74f6\u9888\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03012", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["3D\u5c40\u90e8\u7a97\u53e3\u805a\u7c7b\uff1a\u5229\u7528\u89c6\u9891token\u7684\u65f6\u7a7a\u5c40\u90e8\u6027\u5c06\u8d28\u5fc3\u641c\u7d22\u9650\u5236\u5728\u56fa\u5b9a\u90bb\u57df\u5185\uff0c\u5e76\u7528\u81ea\u5b9a\u4e49Triton kernel\u9ad8\u6548\u5b9e\u73b0", "\u6df7\u5408\u805a\u7c7b\u7b56\u7565\uff1a\u4ec5\u5728\u951a\u6b65\u9aa4\u6267\u884c\u5b8c\u6574\u805a\u7c7b\uff0c\u4e2d\u95f4\u6b65\u9aa4\u53ea\u66f4\u65b0\u90e8\u5206token\uff0c\u5229\u7528\u53bb\u566a\u6b65\u9aa4\u95f4\u7c07\u5206\u914d\u7684\u65f6\u5e8f\u7a33\u5b9a\u6027\u51cf\u5c11\u5197\u4f59\u8ba1\u7b97", "\u786c\u4ef6\u611f\u77e5\u7c07\u5408\u5e76\uff1a\u901a\u8fc7\u5e76\u884c\u51dd\u805a\u5408\u5e76\u6700\u5c0f\u5316CTA\u5bf9\u9f50\u6267\u884c\u4ee3\u4ef7\uff0c\u63d0\u5347\u5757\u5bc6\u5ea6\u4e0e\u8fd1\u4f3c\u4fdd\u771f\u5ea6\uff0c\u7aef\u5230\u7aef\u5ef6\u8fdf\u6700\u9ad8\u964d\u4f4e2.13\u00d7"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u7a00\u758f\u6ce8\u610f\u529b", "\u9ad8\u6548\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03012v1", "published_at": "2026-07-03", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "HyperVAttention: Efficient Sparse Attention with Spatio-Temporal Clustering for Video Diffusion", "tldr": "HyperVAttention\uff1a\u9762\u5411\u89c6\u9891\u6269\u6563\u6a21\u578b\u7684\u9ad8\u6548\u7a00\u758f\u6ce8\u610f\u529b\u6846\u67b6\uff0c\u7aef\u5230\u7aef\u5ef6\u8fdf\u964d\u4f4e2.13\u500d", "upvotes": 0, "what_it_is": "\u63d0\u51faHyperVAttention\uff08HVA\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u7a00\u758f\u6ce8\u610f\u529b\u6846\u67b6\uff0c\u901a\u8fc73D\u5c40\u90e8\u7a97\u53e3\u805a\u7c7b\u3001\u6df7\u5408\u805a\u7c7b\u7b56\u7565\u548c\u786c\u4ef6\u611f\u77e5\u7c07\u5408\u5e76\uff0c\u540c\u65f6\u89e3\u51b3\u89c6\u9891\u6269\u6563Transformer\u4e2d\u805a\u7c7b\u5f00\u9500\u5927\u548cGPU\u5229\u7528\u7387\u4f4e\u4e24\u5927\u74f6\u9888\u3002", "why_notable": "\u5728\u4e0d\u9700\u8981\u989d\u5916\u8bad\u7ec3\u7684\u524d\u63d0\u4e0b\uff0c\u540c\u65f6\u4f18\u5316\u7b97\u6cd5\u5c42\u9762\uff08\u805a\u7c7b\u6548\u7387\uff09\u548c\u786c\u4ef6\u5c42\u9762\uff08GPU tile\u5229\u7528\u7387\uff09\uff0c\u5728\u6587\u672c\u751f\u6210\u89c6\u9891\u4efb\u52a1\u4e0a\u5efa\u7acb\u4e86\u65b0\u7684\u8d28\u91cf-\u901f\u5ea6Pareto\u524d\u6cbf\uff0c\u5bf9\u957f\u89c6\u9891\u751f\u6210\u7684\u5b9e\u7528\u5316\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Omni modal large language models (OmniLLMs) have attracted wide attention for their ability to jointly process audio and video, but they generate large token sequences under audio-visual inputs, leading to substantial inference cost. Existing audio-visual token compression methods often rely on unimodal guidance, overlooking the temporal locality of query-relevant evidence in audio-visual inputs and implicitly assuming that the two modalities share a temporally aligned information density distribution. We propose \\textbf{OmniFocus}, a training-free query-guided token compression method for OmniLLMs that performs independent importance estimation for video and audio, enabling a modality-symmetric compression design that preserves modality-specific salient evidence while maintaining audio-visual alignment, thereby mitigating the modality bias issue that can arise from unimodal-guided compression. Experiments on the Qwen2.5-Omni model family across four audio-visual benchmarks show that OmniFocus maintains strong compressed performance at low token retention ratios and outperforms existing baselines on several major benchmark scores at 25\\% token retention. On DailyOmni with Qwen2.5-Omni-7B at 25\\% token retention, OmniFocus maintains 59.40 accuracy while delivering up to 1.38$\\times$ prefill speedup relative to the full-token baseline, highlighting a favorable practical accuracy-efficiency trade-off.", "arxiv_id": "2607.03050", "arxiv_url": "https://arxiv.org/abs/2607.03050", "authors": ["Shijie Cao", "Qingyu Zhang", "Boxi Yu", "Yuzhong Zhang", "Boxi Cao", "Yaojie Lu", "Hongyu Lin", "Xianpei Han", "Le Sun"], "brief": "\u63d0\u51faOmniFocus\uff0c\u4e00\u79cd\u9762\u5411\u5168\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08OmniLLMs\uff09\u7684\u65e0\u8bad\u7ec3\u67e5\u8be2\u5f15\u5bfcToken\u538b\u7f29\u65b9\u6cd5\uff0c\u5bf9\u89c6\u9891\u548c\u97f3\u9891\u5206\u522b\u72ec\u7acb\u4f30\u8ba1\u91cd\u8981\u6027\uff0c\u5b9e\u73b0\u6a21\u6001\u5bf9\u79f0\u538b\u7f29\uff0c\u89e3\u51b3\u73b0\u6709\u65b9\u6cd5\u56e0\u5355\u6a21\u6001\u5f15\u5bfc\u5bfc\u81f4\u7684\u6a21\u6001\u504f\u5dee\u95ee\u9898\u3002", "categories": ["cs.LG", "cs.AI", "cs.CV", "cs.SD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03050", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u72ec\u7acb\u5bf9\u89c6\u9891\u548c\u97f3\u9891\u8fdb\u884c\u91cd\u8981\u6027\u4f30\u8ba1\uff0c\u907f\u514d\u5355\u6a21\u6001\u5f15\u5bfc\u538b\u7f29\u5e26\u6765\u7684\u6a21\u6001\u504f\u5dee\uff0c\u540c\u65f6\u4fdd\u6301\u97f3\u89c6\u9891\u65f6\u5e8f\u5bf9\u9f50", "\u5728Qwen2.5-Omni\u6a21\u578b\u4e0a\uff0c25%Token\u4fdd\u7559\u7387\u4e0b\u8d85\u8d8a\u73b0\u6709\u57fa\u7ebf\uff0cDailyOmni\u4efb\u52a1\u51c6\u786e\u7387\u8fbe59.40\uff0c\u9884\u586b\u5145\u901f\u5ea6\u63d0\u5347\u6700\u9ad81.38\u00d7", "\u65e0\u9700\u989d\u5916\u8bad\u7ec3\uff0c\u5728\u56db\u4e2a\u97f3\u89c6\u9891\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u9a8c\u8bc1\u6709\u6548\u6027\uff0c\u4f4eToken\u4fdd\u7559\u7387\u4e0b\u4ecd\u4fdd\u6301\u5f3a\u52b2\u6027\u80fd"], "keywords": ["\u591a\u6a21\u6001", "\u5927\u8bed\u8a00\u6a21\u578b", "Token\u538b\u7f29", "\u63a8\u7406\u52a0\u901f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03050v1", "published_at": "2026-07-03", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "OmniFocus: Query-Guided Modality-Balanced Token Compression for Omni-Modal Large Language Models", "tldr": "OmniFocus\uff1a\u65e0\u9700\u8bad\u7ec3\u7684\u67e5\u8be2\u5f15\u5bfc\u591a\u6a21\u6001\u5747\u8861Token\u538b\u7f29\u65b9\u6cd5\uff0c\u663e\u8457\u964d\u4f4e\u5168\u6a21\u6001\u5927\u6a21\u578b\u63a8\u7406\u6210\u672c", "upvotes": 0, "what_it_is": "\u63d0\u51faOmniFocus\uff0c\u4e00\u79cd\u9762\u5411\u5168\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08OmniLLMs\uff09\u7684\u65e0\u8bad\u7ec3\u67e5\u8be2\u5f15\u5bfcToken\u538b\u7f29\u65b9\u6cd5\uff0c\u5bf9\u89c6\u9891\u548c\u97f3\u9891\u5206\u522b\u72ec\u7acb\u4f30\u8ba1\u91cd\u8981\u6027\uff0c\u5b9e\u73b0\u6a21\u6001\u5bf9\u79f0\u538b\u7f29\uff0c\u89e3\u51b3\u73b0\u6709\u65b9\u6cd5\u56e0\u5355\u6a21\u6001\u5f15\u5bfc\u5bfc\u81f4\u7684\u6a21\u6001\u504f\u5dee\u95ee\u9898\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9\u5168\u6a21\u6001LLM\uff08\u97f3\u9891+\u89c6\u9891\u8054\u5408\u8f93\u5165\uff09\u7684\u6a21\u6001\u5747\u8861Token\u538b\u7f29\u65b9\u6848\uff0c\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u5927\u5e45\u964d\u4f4e\u63a8\u7406\u5f00\u9500\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72OmniLLM\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u63ed\u793a\u4e86\u73b0\u6709\u65b9\u6cd5\u5ffd\u89c6\u6a21\u6001\u4fe1\u606f\u5bc6\u5ea6\u5dee\u5f02\u7684\u7cfb\u7edf\u6027\u95ee\u9898\u3002"}, {"abstract": "Autonomous driving planning requires translating navigation intent, traffic rules, dynamic interactions, and language instructions into executable continuous trajectories. Vision-Language-Action models have been introduced into driving planning to improve long-tail generalization, commonsense reasoning, high-level semantic understanding, and explainability. However, existing VLA planners mainly follow planning-head-based trajectory prediction or full-trajectory autoregressive generation. The former only weakly constrains continuous trajectory generation with VLA reasoning, while the latter relies on long sequences of low-information-density coordinate tokens, making semantic-action alignment difficult and leading to discretization errors and inefficient inference. To address these limitations, we propose AnchorVLA, a hierarchical decision-anchored VLA planning framework that uses trajectory-pattern anchors as an explicit interface between high-level VLA reasoning and continuous trajectory execution. Specifically, Decision-as-Anchor Representation represents behavior-level driving decisions with anchor tokens, each encoding an entire local motion pattern rather than a single coordinate point. Decision-Anchored Residual Flow then generates fine-grained continuous trajectories in the selected anchor-defined residual space, capturing multi-modal execution refinements after high-level decision making. By reasoning over compact and semantically meaningful anchors instead of autoregressively generating waypoint sequences, AnchorVLA preserves LLM-based decision making while improving inference efficiency, semantic-action alignment, and continuous generation flexibility. Experiments on the Bench2Drive closed-loop benchmark show that AnchorVLA achieves a state-of-the-art Success Rate of 77.28 and a competitive Driving Score of 89.92.", "arxiv_id": "2607.03182", "arxiv_url": "https://arxiv.org/abs/2607.03182", "authors": ["Qi Liu", "Yabei Li", "Hongsong Wang", "Heng Zhang", "Lei He"], "brief": "\u63d0\u51faAnchorVLA\uff0c\u4e00\u79cd\u5206\u5c42\u51b3\u7b56\u951a\u5b9a\u7684\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u89c4\u5212\u6846\u67b6\uff0c\u901a\u8fc7\u8f68\u8ff9\u6a21\u5f0f\u951a\u70b9\u4f5c\u4e3a\u9ad8\u5c42VLA\u63a8\u7406\u4e0e\u8fde\u7eed\u8f68\u8ff9\u6267\u884c\u4e4b\u95f4\u7684\u663e\u5f0f\u63a5\u53e3\uff0c\u89e3\u51b3\u73b0\u6709VLA\u89c4\u5212\u5668\u8bed\u4e49-\u52a8\u4f5c\u5bf9\u9f50\u56f0\u96be\u548c\u63a8\u7406\u4f4e\u6548\u7684\u95ee\u9898\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03182", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["Decision-as-Anchor\u8868\u793a\uff1a\u7528\u951a\u70b9token\u7f16\u7801\u5b8c\u6574\u5c40\u90e8\u8fd0\u52a8\u6a21\u5f0f\u800c\u975e\u5355\u4e00\u5750\u6807\u70b9\uff0c\u5b9e\u73b0\u884c\u4e3a\u7ea7\u9a7e\u9a76\u51b3\u7b56\u7684\u7d27\u51d1\u8bed\u4e49\u8868\u8fbe", "Decision-Anchored Residual Flow\uff1a\u5728\u9009\u5b9a\u951a\u70b9\u5b9a\u4e49\u7684\u6b8b\u5dee\u7a7a\u95f4\u5185\u751f\u6210\u7ec6\u7c92\u5ea6\u8fde\u7eed\u8f68\u8ff9\uff0c\u652f\u6301\u591a\u6a21\u6001\u6267\u884c\u7ec6\u5316", "\u5728Bench2Drive\u95ed\u73af\u57fa\u51c6\u4e0a\u8fbe\u523077.28\u6210\u529f\u7387\u548c89.92\u9a7e\u9a76\u5206\u6570\uff0c\u5747\u4e3a\u5f53\u524d\u6700\u4f18\u6c34\u5e73"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u8f68\u8ff9\u89c4\u5212", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03182v1", "published_at": "2026-07-03", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "AnchorVLA: Bridging Discrete Decisions and Continuous Trajectories for Vision-Language-Action Planning", "tldr": "AnchorVLA\u7528\u8f68\u8ff9\u6a21\u5f0f\u951a\u70b9\u6865\u63a5\u9ad8\u5c42\u8bed\u8a00\u51b3\u7b56\u4e0e\u8fde\u7eed\u8f68\u8ff9\u751f\u6210\uff0c\u63d0\u5347\u81ea\u52a8\u9a7e\u9a76\u89c4\u5212\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faAnchorVLA\uff0c\u4e00\u79cd\u5206\u5c42\u51b3\u7b56\u951a\u5b9a\u7684\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u89c4\u5212\u6846\u67b6\uff0c\u901a\u8fc7\u8f68\u8ff9\u6a21\u5f0f\u951a\u70b9\u4f5c\u4e3a\u9ad8\u5c42VLA\u63a8\u7406\u4e0e\u8fde\u7eed\u8f68\u8ff9\u6267\u884c\u4e4b\u95f4\u7684\u663e\u5f0f\u63a5\u53e3\uff0c\u89e3\u51b3\u73b0\u6709VLA\u89c4\u5212\u5668\u8bed\u4e49-\u52a8\u4f5c\u5bf9\u9f50\u56f0\u96be\u548c\u63a8\u7406\u4f4e\u6548\u7684\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c06\u79bb\u6563\u51b3\u7b56\u951a\u70b9\u4e0e\u8fde\u7eed\u8f68\u8ff9\u751f\u6210\u89e3\u8026\u5e76\u663e\u5f0f\u6865\u63a5\uff0c\u907f\u514d\u4e86\u957f\u5e8f\u5217\u5750\u6807token\u7684\u4f4e\u6548\u81ea\u56de\u5f52\u751f\u6210\uff0c\u540c\u65f6\u4fdd\u7559LLM\u51b3\u7b56\u80fd\u529b\uff0c\u5728\u63a8\u7406\u6548\u7387\u3001\u8bed\u4e49\u5bf9\u9f50\u548c\u8f68\u8ff9\u7075\u6d3b\u6027\u4e0a\u5747\u6709\u663e\u8457\u63d0\u5347\u3002"}, {"abstract": "We present OpenGlass, an open-source, privacy-oriented, local-first system for low-latency multimodal visual assistance, with a primary focus on blind and low-vision users. Cloud MLLM assistants offer strong visual understanding, but often require uploading first-person visual data and can suffer multi-second network delays; wearable glasses are ideal for sensing, but cannot host large models under tight compute and power budgets. OpenGlass addresses this gap with a sensing-computing split: an ESP32-based glasses-side unit captures visual context, while a nearby consumer-grade device performs local MLLM inference and local speech output, reducing cloud reliance and keeping raw egocentric visual data on user-controlled devices by default. We evaluate response quality, query-ready-to-audio latency, safety-aware abstention, and auditable logs. Under real ESP32 Wi-Fi capture, OpenGlass reaches 993 ms median user-to-audio latency with resized payloads and 1625 ms with raw 1280 x 720 payloads; 97.5% and 93.3% of trials fall below 2 s, respectively. OpenGlass is a user-initiated visual-assistance reference platform for obstacle/hazard awareness, sign/object queries, and image-quality self-checking, rather than a certified navigation aid. We release source code, hardware instructions, prompts, evaluation data, and logs.", "arxiv_id": "2607.03213", "arxiv_url": "https://arxiv.org/abs/2607.03213", "authors": ["Mengzhang Li", "Yuan Yao"], "brief": "\u63d0\u51faOpenGlass\uff0c\u4e00\u4e2a\u9762\u5411\u89c6\u969c\u7528\u6237\u7684\u5f00\u6e90\u672c\u5730\u4f18\u5148\u89c6\u89c9\u8f85\u52a9\u7cfb\u7edf\uff0c\u91c7\u7528\u611f\u77e5-\u8ba1\u7b97\u5206\u79bb\u67b6\u6784\uff1aESP32\u773c\u955c\u7aef\u8d1f\u8d23\u91c7\u96c6\u89c6\u89c9\u4fe1\u606f\uff0c\u9644\u8fd1\u6d88\u8d39\u7ea7\u8bbe\u5907\u672c\u5730\u8fd0\u884cMLLM\u63a8\u7406\uff0c\u5b9e\u73b0\u4f4e\u5ef6\u8fdf\u3001\u9690\u79c1\u4fdd\u62a4\u7684\u5b9e\u65f6\u89c6\u89c9\u95ee\u7b54\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03213", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u611f\u77e5-\u8ba1\u7b97\u5206\u79bb\uff1aESP32\u773c\u955c\u7aef\u91c7\u96c6\u56fe\u50cf\uff0c\u672c\u5730\u6d88\u8d39\u7ea7\u8bbe\u5907\u8fd0\u884cMLLM\u63a8\u7406\uff0c\u907f\u514d\u4e91\u7aef\u4e0a\u4f20\u539f\u59cb\u7b2c\u4e00\u89c6\u89d2\u6570\u636e", "\u5ef6\u8fdf\u8868\u73b0\u4f18\u5f02\uff1a\u538b\u7f29\u56fe\u50cf\u4e0b\u4e2d\u4f4d\u5ef6\u8fdf993ms\uff0c\u539f\u59cb1280\u00d7720\u56fe\u50cf\u4e0b1625ms\uff0c\u5206\u522b\u670997.5%\u548c93.3%\u7684\u8bf7\u6c42\u57282\u79d2\u5185\u5b8c\u6210", "\u5b8c\u6574\u5f00\u6e90\u53d1\u5e03\uff1a\u5305\u542b\u6e90\u7801\u3001\u786c\u4ef6\u8bf4\u660e\u3001\u63d0\u793a\u8bcd\u3001\u8bc4\u6d4b\u6570\u636e\u53ca\u65e5\u5fd7\uff0c\u652f\u6301\u969c\u788d\u611f\u77e5\u3001\u6807\u8bc6\u67e5\u8be2\u3001\u56fe\u50cf\u8d28\u91cf\u81ea\u68c0\u7b49\u573a\u666f"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8f85\u52a9", "\u8fb9\u7f18\u8ba1\u7b97", "\u53ef\u7a7f\u6234\u8bbe\u5907"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03213v1", "published_at": "2026-07-03", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "OpenGlass: A Sensing-Computing Split Architecture for Local MLLM-Driven Real-Time Visual Assistance", "tldr": "OpenGlass\uff1a\u57fa\u4e8e\u611f\u77e5-\u8ba1\u7b97\u5206\u79bb\u67b6\u6784\u7684\u672c\u5730MLLM\u5b9e\u65f6\u89c6\u89c9\u8f85\u52a9\u5f00\u6e90\u773c\u955c\u7cfb\u7edf", "upvotes": 0, "what_it_is": "\u63d0\u51faOpenGlass\uff0c\u4e00\u4e2a\u9762\u5411\u89c6\u969c\u7528\u6237\u7684\u5f00\u6e90\u672c\u5730\u4f18\u5148\u89c6\u89c9\u8f85\u52a9\u7cfb\u7edf\uff0c\u91c7\u7528\u611f\u77e5-\u8ba1\u7b97\u5206\u79bb\u67b6\u6784\uff1aESP32\u773c\u955c\u7aef\u8d1f\u8d23\u91c7\u96c6\u89c6\u89c9\u4fe1\u606f\uff0c\u9644\u8fd1\u6d88\u8d39\u7ea7\u8bbe\u5907\u672c\u5730\u8fd0\u884cMLLM\u63a8\u7406\uff0c\u5b9e\u73b0\u4f4e\u5ef6\u8fdf\u3001\u9690\u79c1\u4fdd\u62a4\u7684\u5b9e\u65f6\u89c6\u89c9\u95ee\u7b54\u3002", "why_notable": "\u9996\u4e2a\u5c06MLLM\u89c6\u89c9\u7406\u89e3\u4e0e\u53ef\u7a7f\u6234\u773c\u955c\u7ed3\u5408\u3001\u5b9e\u73b0\u672c\u5730\u9690\u79c1\u4fdd\u62a4\u4e14\u5ef6\u8fdf\u63a5\u8fd11\u79d2\u7684\u5f00\u6e90\u53c2\u8003\u5e73\u53f0\uff0c\u5bf9\u89c6\u969c\u8f85\u52a9\u6280\u672f\u548c\u8fb9\u7f18AI\u843d\u5730\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Accurate and efficient dataset valuation is essential for enabling fair and transparent data marketplaces, especially when multiple contributors provide data for training multi-task models. Most existing valuation methods, however, are limited to single-task settings, overlooking scenarios where a buyer aims to optimize performance across multiple downstream tasks. Moreover, traditional valuation approaches, such as Shapley-based or retraining-based methods, are computationally expensive and poorly suited for decentralized environments without a trusted central coordinator and with strict privacy constraints. We propose DMVM (Decentralized Multi-task Valuation via Model Merging), a novel framework that bypasses retraining and data sharing by leveraging task arithmetic to infer dataset contributions directly from model combinations. Instead of retraining or sharing raw data, DMVM quantifies how models trained on different datasets combine in parameter space to infer each dataset\u0027s marginal utility across multiple tasks. This formulation yields a valuation process that is scalable, computationally efficient, and explicitly aligned with multi-task generalization behavior. To support decentralized deployment, we introduce a secure aggregation protocol that enables collaborative valuation without revealing individual model parameters or private data. We also provide theoretical error bounds characterizing the approximation quality of DMVM and validate our framework through comprehensive experiments on computer vision and natural language processing tasks.", "arxiv_id": "2607.03346", "arxiv_url": "https://arxiv.org/abs/2607.03346", "authors": ["Mohammadsajad Alipour", "Mohammad Mohammadi Amiri"], "brief": "DMVM\u662f\u4e00\u79cd\u53bb\u4e2d\u5fc3\u5316\u591a\u4efb\u52a1\u6570\u636e\u96c6\u4f30\u503c\u6846\u67b6\uff0c\u901a\u8fc7\u4efb\u52a1\u7b97\u672f\uff08task arithmetic\uff09\u76f4\u63a5\u4ece\u6a21\u578b\u53c2\u6570\u7ec4\u5408\u4e2d\u63a8\u65ad\u5404\u6570\u636e\u96c6\u5bf9\u591a\u4efb\u52a1\u7684\u8fb9\u9645\u8d21\u732e\uff0c\u5b8c\u5168\u7ed5\u8fc7\u91cd\u8bad\u7ec3\u548c\u539f\u59cb\u6570\u636e\u5171\u4eab\u3002", "categories": ["cs.CL", "cs.AI", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03346", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5229\u7528\u4efb\u52a1\u7b97\u672f\u5728\u53c2\u6570\u7a7a\u95f4\u4e2d\u91cf\u5316\u6570\u636e\u96c6\u8d21\u732e\uff0c\u907f\u514d\u6602\u8d35\u7684Shapley\u503c\u8ba1\u7b97\u6216\u91cd\u8bad\u7ec3", "\u5f15\u5165\u5b89\u5168\u805a\u5408\u534f\u8bae\uff0c\u652f\u6301\u53bb\u4e2d\u5fc3\u5316\u90e8\u7f72\uff0c\u65e0\u9700\u66b4\u9732\u4e2a\u4f53\u6a21\u578b\u53c2\u6570\u6216\u79c1\u6709\u6570\u636e", "\u63d0\u4f9b\u7406\u8bba\u8bef\u5dee\u754c\u523b\u753b\u8fd1\u4f3c\u8d28\u91cf\uff0c\u5e76\u5728CV\u548cNLP\u4efb\u52a1\u4e0a\u8fdb\u884c\u5168\u9762\u5b9e\u9a8c\u9a8c\u8bc1"], "keywords": ["\u6570\u636e\u4f30\u503c", "\u6a21\u578b\u5408\u5e76", "\u591a\u4efb\u52a1\u5b66\u4e60", "\u8054\u90a6\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03346v1", "published_at": "2026-07-03", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Efficient Decentralized Multi-task Dataset Valuation via Model Merging", "tldr": "\u63d0\u51faDMVM\u6846\u67b6\uff0c\u5229\u7528\u6a21\u578b\u5408\u5e76\u5b9e\u73b0\u53bb\u4e2d\u5fc3\u5316\u591a\u4efb\u52a1\u6570\u636e\u96c6\u4f30\u503c\uff0c\u65e0\u9700\u91cd\u8bad\u7ec3\u6216\u5171\u4eab\u6570\u636e", "upvotes": 0, "what_it_is": "DMVM\u662f\u4e00\u79cd\u53bb\u4e2d\u5fc3\u5316\u591a\u4efb\u52a1\u6570\u636e\u96c6\u4f30\u503c\u6846\u67b6\uff0c\u901a\u8fc7\u4efb\u52a1\u7b97\u672f\uff08task arithmetic\uff09\u76f4\u63a5\u4ece\u6a21\u578b\u53c2\u6570\u7ec4\u5408\u4e2d\u63a8\u65ad\u5404\u6570\u636e\u96c6\u5bf9\u591a\u4efb\u52a1\u7684\u8fb9\u9645\u8d21\u732e\uff0c\u5b8c\u5168\u7ed5\u8fc7\u91cd\u8bad\u7ec3\u548c\u539f\u59cb\u6570\u636e\u5171\u4eab\u3002", "why_notable": "\u73b0\u6709\u6570\u636e\u4f30\u503c\u65b9\u6cd5\u51e0\u4e4e\u5c40\u9650\u4e8e\u5355\u4efb\u52a1\u573a\u666f\u4e14\u8ba1\u7b97\u4ee3\u4ef7\u9ad8\u6602\uff0cDMVM\u9996\u6b21\u5c06\u6a21\u578b\u5408\u5e76\u6280\u672f\u5f15\u5165\u591a\u4efb\u52a1\u53bb\u4e2d\u5fc3\u5316\u6570\u636e\u4f30\u503c\uff0c\u517c\u987e\u6548\u7387\u3001\u9690\u79c1\u4e0e\u591a\u4efb\u52a1\u6cdb\u5316\uff0c\u5bf9\u516c\u5e73\u6570\u636e\u5e02\u573a\u5efa\u8bbe\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Modern AI agent implementations such as frontier coding agents chain multiple tools at runtime that create a security surface that per-tool guardrails are unable to address, as individually permitted tools can violate organizational policies when composed. We propose the Dynamic Security Control Compositor (DSCC), a two-phase approach to compositional security for multi-tool agent chains. In Phase 1, at session checkout, a Most Restrictive Set (MRS) algorithm composes per-tool security policies into a single effective policy with a formal monotonicity invariant that extending a chain can only tighten the result, blocking incompatible combinations before any tool executes. Outputs of any tool call propagate their classification constraints into a session-level taint state, so subsequent invocations must satisfy the most restrictive constraints seen so far. In Phase 2, at runtime, the system tracks the sensitivity of data the agent touches through a monotonic taint state and revokes the session if the accumulated exposure would make a subsequent tool call a policy violation. Together, these phases provide defense in depth, where static composition prevents unsafe chains from starting, and runtime taint tracking catches violations that emerge from the specific data used. We provide a reference implementation on 32 tools governed by 16 NIST SP 800-53 aligned policies and evaluate it under two composition modes. In the default clearance mode, permitted combinations are partitioned into classification-level clusters, blocking 79.2% of policy pairs and 95.5% of triples. The alternative taint mode admits mixed-classification chains within the exfiltration boundary, blocking 42.5% and 60.5% respectively. We discuss the governance implications for organizations deploying multi-tool agents, including the utility-security tradeoff and the changes needed to operationalize chain-aware policies.", "arxiv_id": "2607.03423", "arxiv_url": "https://arxiv.org/abs/2607.03423", "authors": ["Chris Schneider", "Kriti Faujdar", "Philipp Schoenegger", "Ben Bariach"], "brief": "\u63d0\u51faDSCC\uff08\u52a8\u6001\u5b89\u5168\u63a7\u5236\u7ec4\u5408\u5668\uff09\uff0c\u901a\u8fc7\u4e24\u9636\u6bb5\u65b9\u6cd5\u89e3\u51b3\u591a\u5de5\u5177AI\u667a\u80fd\u4f53\u94fe\u7684\u7ec4\u5408\u5b89\u5168\u95ee\u9898\uff1a\u4f1a\u8bdd\u542f\u52a8\u65f6\u9759\u6001\u7ec4\u5408\u7b56\u7565\u963b\u6b62\u4e0d\u517c\u5bb9\u5de5\u5177\u94fe\uff0c\u8fd0\u884c\u65f6\u901a\u8fc7\u5355\u8c03\u6c61\u70b9\u8ffd\u8e2a\u52a8\u6001\u64a4\u9500\u8fdd\u89c4\u4f1a\u8bdd\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03423", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["Phase 1\uff1a\u6700\u4e25\u683c\u96c6\uff08MRS\uff09\u7b97\u6cd5\u5c06\u5404\u5de5\u5177\u5b89\u5168\u7b56\u7565\u7ec4\u5408\u4e3a\u5355\u4e00\u6709\u6548\u7b56\u7565\uff0c\u5177\u6709\u5355\u8c03\u6027\u4e0d\u53d8\u91cf\uff0c\u786e\u4fdd\u94fe\u6269\u5c55\u53ea\u4f1a\u6536\u7d27\u7ea6\u675f", "Phase 2\uff1a\u8fd0\u884c\u65f6\u6c61\u70b9\u72b6\u6001\u8ffd\u8e2a\u6570\u636e\u654f\u611f\u5ea6\uff0c\u82e5\u7d2f\u79ef\u66b4\u9732\u5c06\u5bfc\u81f4\u540e\u7eed\u5de5\u5177\u8c03\u7528\u8fdd\u89c4\u5219\u64a4\u9500\u4f1a\u8bdd", "\u572832\u4e2a\u5de5\u5177\u300116\u6761NIST SP 800-53\u5bf9\u9f50\u7b56\u7565\u4e0b\u8bc4\u4f30\uff1a\u9ed8\u8ba4\u6a21\u5f0f\u963b\u65ad79.2%\u7b56\u7565\u5bf9\u548c95.5%\u4e09\u5143\u7ec4\uff0c\u6c61\u70b9\u6a21\u5f0f\u5206\u522b\u963b\u65ad42.5%\u548c60.5%"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168", "\u8bbf\u95ee\u63a7\u5236", "\u591a\u5de5\u5177"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03423v1", "published_at": "2026-07-03", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Securing Multi-Tool AI Agent Chains With Dynamic, Real-Time Compositional Policies", "tldr": "\u63d0\u51fa\u52a8\u6001\u5b89\u5168\u63a7\u5236\u7ec4\u5408\u5668DSCC\uff0c\u9632\u6b62\u591a\u5de5\u5177AI\u667a\u80fd\u4f53\u94fe\u5728\u7ec4\u5408\u4f7f\u7528\u65f6\u8fdd\u53cd\u5b89\u5168\u7b56\u7565", "upvotes": 0, "what_it_is": "\u63d0\u51faDSCC\uff08\u52a8\u6001\u5b89\u5168\u63a7\u5236\u7ec4\u5408\u5668\uff09\uff0c\u901a\u8fc7\u4e24\u9636\u6bb5\u65b9\u6cd5\u89e3\u51b3\u591a\u5de5\u5177AI\u667a\u80fd\u4f53\u94fe\u7684\u7ec4\u5408\u5b89\u5168\u95ee\u9898\uff1a\u4f1a\u8bdd\u542f\u52a8\u65f6\u9759\u6001\u7ec4\u5408\u7b56\u7565\u963b\u6b62\u4e0d\u517c\u5bb9\u5de5\u5177\u94fe\uff0c\u8fd0\u884c\u65f6\u901a\u8fc7\u5355\u8c03\u6c61\u70b9\u8ffd\u8e2a\u52a8\u6001\u64a4\u9500\u8fdd\u89c4\u4f1a\u8bdd\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u89e3\u51b3\u591a\u5de5\u5177AI\u667a\u80fd\u4f53\u94fe\u7684\u7ec4\u5408\u5b89\u5168\u6f0f\u6d1e\uff0c\u5355\u5de5\u5177\u7ea7\u522b\u7684\u62a4\u680f\u65e0\u6cd5\u9632\u5fa1\u6b64\u7c7b\u653b\u51fb\u9762\uff1b\u63d0\u4f9b\u4e86\u5f62\u5f0f\u5316\u5b89\u5168\u4fdd\u8bc1\u548cNIST\u6807\u51c6\u5bf9\u9f50\u7684\u53c2\u8003\u5b9e\u73b0\uff0c\u5bf9\u4f01\u4e1a\u90e8\u7f72AI\u667a\u80fd\u4f53\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "As AI models continue to develop powerful capabilities, it becomes critical that we are able to verify that their output is aligned with our intentions. A recent line of work focuses on verification via debate, a model of interactive proofs where two competing powerful provers, or AI models, debate each other to convince a weak verifier, or a human, of the correctness of their claim. However, debate assumes that the two AI models possess equal abilities and that one of them is truthful, which may not be realistic. In this work, we show \\emph{how to avoid debate}: we initiate the study of \\emph{single-prover} interactive proofs for AI safety. Prior results in single-prover interactive proofs do not immediately carry over to the AI safety setting: for example, they do not work when the computation has access to an oracle, such as to human judgment or an external database such as the web. We present doubly-efficient single-prover interactive proofs and arguments for oracle-aided computations (also known as relativizing proofs), in the settings where (1) the computation is robust, in the sense that the output does not change if at most a small fraction of the answers to oracle queries are incorrect, or (2) the oracle is a low-degree polynomial. These results suggest that interactive verification is possible even without debate, under structured or noise-tolerant oracle access.", "arxiv_id": "2607.03561", "arxiv_url": "https://arxiv.org/abs/2607.03561", "authors": ["Liyan Chen", "Yael Tauman Kalai", "Zoe Xi"], "brief": "\u672c\u6587\u7814\u7a76\u4e86\u65e0\u9700\u53cc\u65b9\u8fa9\u8bba\u7684\u5355\u8bc1\u660e\u8005\u4ea4\u4e92\u5f0f\u8bc1\u660e\u6846\u67b6\uff0c\u7528\u4e8eAI\u5b89\u5168\u9a8c\u8bc1\u3002\u9488\u5bf9\u5305\u542b\u9884\u8a00\u673a\u8bbf\u95ee\uff08\u5982\u4eba\u7c7b\u5224\u65ad\u6216\u5916\u90e8\u6570\u636e\u5e93\uff09\u7684\u8ba1\u7b97\u573a\u666f\uff0c\u63d0\u51fa\u4e86\u53cc\u9ad8\u6548\u7684\u76f8\u5bf9\u5316\u4ea4\u4e92\u5f0f\u8bc1\u660e\u65b9\u6848\u3002", "categories": ["cs.AI", "cs.CC", "cs.CR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03561", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4f20\u7edf\u8fa9\u8bba\u9a8c\u8bc1\u5047\u8bbe\u4e24\u4e2aAI\u80fd\u529b\u76f8\u5f53\u4e14\u5176\u4e2d\u4e00\u4e2a\u8bda\u5b9e\uff0c\u73b0\u5b9e\u4e2d\u96be\u4ee5\u6ee1\u8db3\uff1b\u672c\u6587\u8f6c\u5411\u5355\u8bc1\u660e\u8005\u6846\u67b6", "\u63d0\u51fa\u4e24\u7c7b\u53ef\u9a8c\u8bc1\u573a\u666f\uff1a(1) \u8ba1\u7b97\u5bf9\u9884\u8a00\u673a\u67e5\u8be2\u9519\u8bef\u5177\u6709\u9c81\u68d2\u6027\uff1b(2) \u9884\u8a00\u673a\u4e3a\u4f4e\u6b21\u591a\u9879\u5f0f", "\u5b9e\u73b0\u4e86\u53cc\u9ad8\u6548\u6027\uff08\u8bc1\u660e\u8005\u548c\u9a8c\u8bc1\u8005\u5747\u9ad8\u6548\uff09\uff0c\u5e76\u652f\u6301\u76f8\u5bf9\u5316\u8bc1\u660e\uff08oracle-aided computation\uff09"], "keywords": ["AI\u5b89\u5168", "\u4ea4\u4e92\u5f0f\u8bc1\u660e", "\u53ef\u6269\u5c55\u76d1\u7763", "\u5bf9\u9f50\u9a8c\u8bc1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03561v1", "published_at": "2026-07-03", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "How to Avoid Debate: Scalable AI Safety via Doubly-Efficient Interactive Proofs", "tldr": "\u63d0\u51fa\u5355\u8bc1\u660e\u8005\u4ea4\u4e92\u5f0f\u8bc1\u660e\u65b9\u6848\uff0c\u65e0\u9700\u8fa9\u8bba\u5373\u53ef\u9a8c\u8bc1AI\u8f93\u51fa\u7684\u6b63\u786e\u6027", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u4e86\u65e0\u9700\u53cc\u65b9\u8fa9\u8bba\u7684\u5355\u8bc1\u660e\u8005\u4ea4\u4e92\u5f0f\u8bc1\u660e\u6846\u67b6\uff0c\u7528\u4e8eAI\u5b89\u5168\u9a8c\u8bc1\u3002\u9488\u5bf9\u5305\u542b\u9884\u8a00\u673a\u8bbf\u95ee\uff08\u5982\u4eba\u7c7b\u5224\u65ad\u6216\u5916\u90e8\u6570\u636e\u5e93\uff09\u7684\u8ba1\u7b97\u573a\u666f\uff0c\u63d0\u51fa\u4e86\u53cc\u9ad8\u6548\u7684\u76f8\u5bf9\u5316\u4ea4\u4e92\u5f0f\u8bc1\u660e\u65b9\u6848\u3002", "why_notable": "\u8fa9\u8bba\u673a\u5236\u662fAI\u5b89\u5168\u9886\u57df\u7684\u91cd\u8981\u9a8c\u8bc1\u8303\u5f0f\uff0c\u4f46\u5176\u5047\u8bbe\u8fc7\u4e8e\u7406\u60f3\u5316\uff1b\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u5355\u8bc1\u660e\u8005\u66ff\u4ee3\u65b9\u6848\uff0c\u5728\u7406\u8bba\u4e0a\u62d3\u5c55\u4e86\u53ef\u6269\u5c55AI\u5b89\u5168\u9a8c\u8bc1\u7684\u8fb9\u754c\uff0c\u5bf9\u8d85\u4eba\u7c7bAI\u7684\u5bf9\u9f50\u9a8c\u8bc1\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Affordance grounding aims to localize image regions that support a specific action, serving as a core capability for physical intelligence and embodied perception. Previous studies have primarily relied on weakly supervised learning with action labels from exocentric images. However, these methods often struggle with visually ambiguous exocentric images containing co-occurring actions; moreover, they fail to distinguish semantically similar actions because existing methods typically rely on brief action phrases that lack rich semantic details for action-specific localization. Although large vision-language models (LVLMs) encode rich action semantics and their action-conditioned textual outputs implicitly contain spatial cues, they do not directly provide action-specific spatial localization. To address these problems, we propose TokAG, a zero-shot affordance grounding framework that exploits the token-level semantic-spatial signals in LVLMs to localize action-relevant regions without external supervision. We observe that attention maps associated with different LVLM output tokens vary significantly, with many attending to irrelevant regions such as the background. Thus, we introduce a spatial-aware token-selection mechanism to systematically evaluate each output token and select the one whose attention maps exhibit dominant activation over the target object, instead of relying on arbitrary attention maps. By extracting these object-focused attention maps, we transform the LVLM\u0027s implicit semantic signals into zero-shot affordance heatmaps. Our zero-shot framework consistently outperforms prior weakly supervised approaches across multiple benchmarks, improving NSS by 10.7% on the unseen split of AGD20K and by 29.7% on HICO-IIF. The code and models will be made publicly available.", "arxiv_id": "2607.03595", "arxiv_url": "https://arxiv.org/abs/2607.03595", "authors": ["Seung Il Lee", "Qinqian Lei", "Daguang Xu", "Dong Yang", "Robby T. Tan", "Yixin Chen", "Bo Wang"], "brief": "\u63d0\u51faTokAG\u6846\u67b6\uff0c\u901a\u8fc7\u6316\u6398\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08LVLM\uff09\u8f93\u51fatoken\u7684\u6ce8\u610f\u529b\u56fe\u4e2d\u9690\u542b\u7684\u8bed\u4e49-\u7a7a\u95f4\u4fe1\u53f7\uff0c\u5728\u65e0\u9700\u5916\u90e8\u76d1\u7763\u7684\u60c5\u51b5\u4e0b\u5b9e\u73b0\u96f6\u6837\u672c\u53ef\u4f9b\u6027\u5b9a\u4f4d\uff08affordance grounding\uff09\uff0c\u5373\u5b9a\u4f4d\u56fe\u50cf\u4e2d\u652f\u6301\u7279\u5b9a\u52a8\u4f5c\u7684\u533a\u57df\u3002", "categories": ["cs.CV", "cs.AI", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03595", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u7a7a\u95f4\u611f\u77e5token\u9009\u62e9\u673a\u5236\uff0c\u81ea\u52a8\u7b5b\u9009\u6ce8\u610f\u529b\u96c6\u4e2d\u4e8e\u76ee\u6807\u7269\u4f53\uff08\u800c\u975e\u80cc\u666f\uff09\u7684\u8f93\u51fatoken\uff0c\u907f\u514d\u4efb\u610f\u9009\u53d6\u6ce8\u610f\u529b\u56fe\u5e26\u6765\u7684\u566a\u58f0", "\u5c06LVLM\u9690\u5f0f\u8bed\u4e49\u4fe1\u53f7\u8f6c\u5316\u4e3a\u96f6\u6837\u672c\u53ef\u4f9b\u6027\u70ed\u529b\u56fe\uff0c\u65e0\u9700\u5f31\u76d1\u7763\u8bad\u7ec3\u5373\u53ef\u8fd0\u884c", "\u5728AGD20K\u672a\u89c1\u5206\u5272\u4e0aNSS\u63d0\u534710.7%\uff0c\u5728HICO-IIF\u4e0a\u63d0\u534729.7%\uff0c\u8d85\u8d8a\u6b64\u524d\u6240\u6709\u5f31\u76d1\u7763\u65b9\u6cd5"], "keywords": ["\u5177\u8eab\u611f\u77e5", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u96f6\u6837\u672c\u5b66\u4e60", "\u6ce8\u610f\u529b\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03595v1", "published_at": "2026-07-03", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Token-Based Affordance Grounding with Large Vision-Language Models", "tldr": "TokAG\u5229\u7528\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684token\u7ea7\u6ce8\u610f\u529b\u4fe1\u53f7\uff0c\u5b9e\u73b0\u96f6\u6837\u672c\u53ef\u4f9b\u6027\u5b9a\u4f4d", "upvotes": 0, "what_it_is": "\u63d0\u51faTokAG\u6846\u67b6\uff0c\u901a\u8fc7\u6316\u6398\u5927\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08LVLM\uff09\u8f93\u51fatoken\u7684\u6ce8\u610f\u529b\u56fe\u4e2d\u9690\u542b\u7684\u8bed\u4e49-\u7a7a\u95f4\u4fe1\u53f7\uff0c\u5728\u65e0\u9700\u5916\u90e8\u76d1\u7763\u7684\u60c5\u51b5\u4e0b\u5b9e\u73b0\u96f6\u6837\u672c\u53ef\u4f9b\u6027\u5b9a\u4f4d\uff08affordance grounding\uff09\uff0c\u5373\u5b9a\u4f4d\u56fe\u50cf\u4e2d\u652f\u6301\u7279\u5b9a\u52a8\u4f5c\u7684\u533a\u57df\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06LVLM\u7684token\u7ea7\u6ce8\u610f\u529b\u7528\u4e8e\u53ef\u4f9b\u6027\u5b9a\u4f4d\uff0c\u4ee5\u96f6\u6837\u672c\u65b9\u5f0f\u8d85\u8d8a\u5f31\u76d1\u7763\u57fa\u7ebf\uff0c\u4e3a\u5177\u8eab\u611f\u77e5\u4e0e\u673a\u5668\u4eba\u64cd\u4f5c\u63d0\u4f9b\u65e0\u9700\u6807\u6ce8\u7684\u7a7a\u95f4\u7406\u89e3\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Fine-tuning can give a language model a hidden behavior--it may give false answers under a narrow condition, or give harmful advice only when a prompt touches a particular topic. We introduce the Stabilized Adapter for self-Report (SAR), a lightweight LoRA adapter that makes a fine-tuned model describe its own hidden behavior in plain language, using only the model and the dataset it was trained on. Across seven implanted behaviors (plus a no-behavior control), SAR detects the hidden behavior in every one--even when the model has generalized into broad misalignment that the training data alone does not predict. Introspection Adapters (IA), the closest existing baseline, detects some behaviors from our suite but misses others entirely--and where it misses, it hallucinates, consistently reporting wrong behaviors. SAR retains positive signal on every setting where IA fails and halves the rate of hallucinations. This makes it much easier for practitioners to audit their models and obtain reliable answers to \"what did my model actually learn?\" type of questions.", "arxiv_id": "2607.03640", "arxiv_url": "https://arxiv.org/abs/2607.03640", "authors": ["Taras Kutsyk", "Bartosz Zieli\u0144ski"], "brief": "\u63d0\u51faSAR\uff08\u7a33\u5b9a\u5316\u81ea\u62a5\u544a\u9002\u914d\u5668\uff09\uff0c\u4e00\u79cd\u8f7b\u91cf\u7ea7LoRA\u9002\u914d\u5668\uff0c\u4ec5\u5229\u7528\u6a21\u578b\u672c\u8eab\u53ca\u5176\u8bad\u7ec3\u6570\u636e\uff0c\u4f7f\u5fae\u8c03\u540e\u7684\u8bed\u8a00\u6a21\u578b\u80fd\u7528\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u81ea\u8eab\u9690\u85cf\u7684\u6709\u5bb3\u6216\u9519\u8bef\u884c\u4e3a\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03640", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u57287\u79cd\u690d\u5165\u9690\u85cf\u884c\u4e3a\uff08+1\u4e2a\u65e0\u884c\u4e3a\u5bf9\u7167\uff09\u7684\u6d4b\u8bd5\u4e2d\uff0cSAR\u5168\u90e8\u6210\u529f\u68c0\u6d4b\uff0c\u5305\u62ec\u8bad\u7ec3\u6570\u636e\u672c\u8eab\u65e0\u6cd5\u9884\u6d4b\u7684\u6cdb\u5316\u6027\u9519\u4f4d\u884c\u4e3a", "\u76f8\u6bd4\u6700\u63a5\u8fd1\u7684\u57fa\u7ebf\u65b9\u6cd5Introspection Adapters\uff08IA\uff09\uff0cSAR\u5c06\u5e7b\u89c9\u7387\u964d\u4f4e50%\uff0c\u4e14\u5728IA\u5b8c\u5168\u5931\u6548\u7684\u573a\u666f\u4e2d\u4ecd\u4fdd\u6301\u6b63\u786e\u68c0\u6d4b", "\u65b9\u6cd5\u4ec5\u9700\u6a21\u578b\u81ea\u8eab\u548c\u8bad\u7ec3\u6570\u636e\uff0c\u65e0\u9700\u5916\u90e8\u6807\u6ce8\u6216\u989d\u5916\u6570\u636e\uff0c\u9002\u5408\u5b9e\u9645\u90e8\u7f72\u4e2d\u7684\u6a21\u578b\u5ba1\u8ba1"], "keywords": ["\u6a21\u578b\u5bf9\u9f50", "\u5b89\u5168\u5ba1\u8ba1", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5fae\u8c03"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03640v1", "published_at": "2026-07-03", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Revealing Hidden Model Behaviors with Task-Specific Self-Reports", "tldr": "SAR\u9002\u914d\u5668\u8ba9\u5fae\u8c03\u6a21\u578b\u7528\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u81ea\u8eab\u9690\u85cf\u884c\u4e3a\uff0c\u68c0\u6d4b\u7387100%\u4e14\u5e7b\u89c9\u7387\u51cf\u534a", "upvotes": 0, "what_it_is": "\u63d0\u51faSAR\uff08\u7a33\u5b9a\u5316\u81ea\u62a5\u544a\u9002\u914d\u5668\uff09\uff0c\u4e00\u79cd\u8f7b\u91cf\u7ea7LoRA\u9002\u914d\u5668\uff0c\u4ec5\u5229\u7528\u6a21\u578b\u672c\u8eab\u53ca\u5176\u8bad\u7ec3\u6570\u636e\uff0c\u4f7f\u5fae\u8c03\u540e\u7684\u8bed\u8a00\u6a21\u578b\u80fd\u7528\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u81ea\u8eab\u9690\u85cf\u7684\u6709\u5bb3\u6216\u9519\u8bef\u884c\u4e3a\u3002", "why_notable": "\u4e3aLLM\u5b89\u5168\u5ba1\u8ba1\u63d0\u4f9b\u4e86\u5b9e\u7528\u5de5\u5177\uff0c\u89e3\u51b3\u4e86\u5fae\u8c03\u6a21\u578b\u9690\u85cf\u884c\u4e3a\u96be\u4ee5\u53d1\u73b0\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5bf9\u6a21\u578b\u5bf9\u9f50\u4e0e\u53ef\u4fe1AI\u7814\u7a76\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c"}, {"abstract": "Multimodal large language models (MLLMs) generate responses autoregressively, integrating visual and linguistic information in an evolving context. Prior work on interpretability has focused on individual layers and circuits (where), leaving the token-level dynamics of multimodal computation during generation (when) underexplored. We address this gap and study attention shifts as per semantic role; tracking model attention to image, text, instruction, and previously generated tokens, One Token at a Time (OTaT). We introduce multimodal tasks that require explicit switching between visual and textual context within a single response. Across two mainstream model families and four open-weight MLLMs of varying sizes, we establish consistent patterns: attention to image peaks at tokens requiring image-derived information, instruction tokens are revisited during task transitions, and attention to previously generated tokens increases as the generation progresses. Causal attention blocking interventions validate the functional role of these trends. We profile model behavior under disrupted attention and observe responses falling back to language priors, or exhibiting cross-modal leakage, denial, or recovery. Finally, informed of the attention dynamics through our novel analysis, we propose a simple test-time intervention to boost attention to the relevant modality at the right time, significantly improving multimodal task performance.", "arxiv_id": "2607.03738", "arxiv_url": "https://arxiv.org/abs/2607.03738", "authors": ["Varun Gupta", "Vineet Gandhi", "Makarand Tapaswi"], "brief": "\u63d0\u51faOTaT\u6846\u67b6\uff0c\u9010token\u5206\u6790\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u751f\u6210\u8fc7\u7a0b\u4e2d\u5bf9\u56fe\u50cf\u3001\u6587\u672c\u3001\u6307\u4ee4\u53ca\u5df2\u751f\u6210token\u7684\u6ce8\u610f\u529b\u52a8\u6001\u53d8\u5316\u89c4\u5f8b\uff0c\u5e76\u57fa\u4e8e\u6b64\u8bbe\u8ba1\u6d4b\u8bd5\u65f6\u5e72\u9884\u65b9\u6cd5\u63d0\u5347\u591a\u6a21\u6001\u4efb\u52a1\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03738", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\u4e00\u81f4\u89c4\u5f8b\uff1a\u9700\u8981\u56fe\u50cf\u4fe1\u606f\u7684token\u5904\u6ce8\u610f\u529b\u5cf0\u503c\u51fa\u73b0\u5728\u56fe\u50cf\u4e0a\uff0c\u4efb\u52a1\u5207\u6362\u65f6\u6a21\u578b\u91cd\u65b0\u5173\u6ce8\u6307\u4ee4token\uff0c\u968f\u751f\u6210\u8fdb\u884c\u5bf9\u5df2\u751f\u6210token\u7684\u6ce8\u610f\u529b\u6301\u7eed\u589e\u52a0", "\u901a\u8fc7\u56e0\u679c\u6ce8\u610f\u529b\u963b\u65ad\u5b9e\u9a8c\u9a8c\u8bc1\u4e0a\u8ff0\u89c4\u5f8b\u7684\u529f\u80fd\u6027\u4f5c\u7528\uff0c\u5e76\u89c2\u5bdf\u5230\u6ce8\u610f\u529b\u88ab\u5e72\u6270\u540e\u6a21\u578b\u51fa\u73b0\u8bed\u8a00\u5148\u9a8c\u56de\u9000\u3001\u8de8\u6a21\u6001\u6cc4\u6f0f\u3001\u62d2\u7edd\u6216\u6062\u590d\u7b49\u884c\u4e3a", "\u57fa\u4e8e\u6ce8\u610f\u529b\u52a8\u6001\u5206\u6790\u63d0\u51fa\u7b80\u5355\u7684\u6d4b\u8bd5\u65f6\u5e72\u9884\u65b9\u6cd5\uff0c\u5728\u6b63\u786e\u65f6\u673a\u589e\u5f3a\u5bf9\u76f8\u5173\u6a21\u6001\u7684\u6ce8\u610f\u529b\uff0c\u663e\u8457\u63d0\u5347\u591a\u6a21\u6001\u4efb\u52a1\u6027\u80fd"], "keywords": ["\u591a\u6a21\u6001", "\u53ef\u89e3\u91ca\u6027", "\u6ce8\u610f\u529b\u673a\u5236", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03738v1", "published_at": "2026-07-04", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Attending to Multimodal Generation One Token at a Time", "tldr": "\u9010token\u8ffd\u8e2a\u591a\u6a21\u6001\u5927\u6a21\u578b\u6ce8\u610f\u529b\u52a8\u6001\uff0c\u63ed\u793a\u89c6\u89c9\u4e0e\u8bed\u8a00\u4fe1\u606f\u7684\u5207\u6362\u89c4\u5f8b\u5e76\u63d0\u5347\u751f\u6210\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faOTaT\u6846\u67b6\uff0c\u9010token\u5206\u6790\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u751f\u6210\u8fc7\u7a0b\u4e2d\u5bf9\u56fe\u50cf\u3001\u6587\u672c\u3001\u6307\u4ee4\u53ca\u5df2\u751f\u6210token\u7684\u6ce8\u610f\u529b\u52a8\u6001\u53d8\u5316\u89c4\u5f8b\uff0c\u5e76\u57fa\u4e8e\u6b64\u8bbe\u8ba1\u6d4b\u8bd5\u65f6\u5e72\u9884\u65b9\u6cd5\u63d0\u5347\u591a\u6a21\u6001\u4efb\u52a1\u6027\u80fd\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u591a\u6a21\u6001\u751f\u6210\u4e2dtoken\u7ea7\u522b\u7684\u6ce8\u610f\u529b\u65f6\u5e8f\u52a8\u6001\uff08when\u7ef4\u5ea6\uff09\uff0c\u586b\u8865\u53ef\u89e3\u91ca\u6027\u7814\u7a76\u7a7a\u767d\uff0c\u4e14\u76f4\u63a5\u8f6c\u5316\u4e3a\u65e0\u9700\u8bad\u7ec3\u7684\u6027\u80fd\u63d0\u5347\u65b9\u6cd5\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "While Large Language Models (LLMs) have achieved remarkable success in Text-to-SQL tasks, their deployment in real-world environments is hindered by latent reliability issues. Identifying these latent weaknesses is critical for building trustworthy database interfaces, yet current diagnostic approaches rely heavily on static, expert-defined rules, which lack the capability for systematic and automated exploration. To bridge this gap, we propose SAGE (Systematic Automated Guided Exploration), a novel framework designed to autonomously uncover latent failure patterns in LLM-based Text-to-SQL generation. Specifically, SAGE generates vulnerability hypotheses for given samples and references a continuously evolving Vulnerability Codex to design targeted perturbations, thereby iteratively verifying and documenting potential defects. Extensive experiments on state-of-the-art open-source LLMs demonstrate that SAGE uncovers a substantial number of failure cases, highlighting the significant fragility of current models. Furthermore, our analysis reveals that the Vulnerability Codex exhibits strong cross-model transferability, indicating that the discovered patterns represent generalized structural weaknesses. Finally, we explore SAGE\u0027s potential for remediation. Although preliminary, lightweight fine-tuning on the generated samples yields promising improvements, suggesting a scalable pathway for closing the reliability loop in future work.", "arxiv_id": "2607.03833", "arxiv_url": "https://arxiv.org/abs/2607.03833", "authors": ["Hanqing Wang", "Yongdong Chi", "Jian Yang", "Lei Yang", "Jiehui Zhao", "Yun Chen", "Guanhua Chen"], "brief": "\u63d0\u51faSAGE\uff08\u7cfb\u7edf\u5316\u81ea\u52a8\u5f15\u5bfc\u63a2\u7d22\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u52a8\u751f\u6210\u6f0f\u6d1e\u5047\u8bbe\u3001\u7ef4\u62a4\u52a8\u6001\u6f14\u5316\u7684\u6f0f\u6d1e\u4ee3\u7801\u5e93\u5e76\u8bbe\u8ba1\u9488\u5bf9\u6027\u6270\u52a8\uff0c\u7cfb\u7edf\u6027\u5730\u6316\u6398LLM\u5728Text-to-SQL\u4efb\u52a1\u4e2d\u7684\u6f5c\u5728\u5931\u6548\u6a21\u5f0f\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03833", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efa\u6301\u7eed\u6f14\u5316\u7684Vulnerability Codex\uff0c\u8fed\u4ee3\u9a8c\u8bc1\u5e76\u8bb0\u5f55LLM\u7684\u7ed3\u6784\u6027\u5f31\u70b9\uff0c\u66ff\u4ee3\u4f20\u7edf\u9759\u6001\u4e13\u5bb6\u89c4\u5219", "\u53d1\u73b0\u7684\u6f0f\u6d1e\u6a21\u5f0f\u5177\u6709\u5f3a\u8de8\u6a21\u578b\u8fc1\u79fb\u6027\uff0c\u8868\u660e\u8fd9\u4e9b\u7f3a\u9677\u662f\u5f53\u524d\u6a21\u578b\u7684\u666e\u904d\u7ed3\u6784\u6027\u5f31\u70b9\u800c\u975e\u4e2a\u4f8b", "\u57fa\u4e8e\u751f\u6210\u6837\u672c\u7684\u8f7b\u91cf\u7ea7\u5fae\u8c03\u53ef\u521d\u6b65\u6539\u5584\u6a21\u578b\u53ef\u9760\u6027\uff0c\u63d0\u4f9b\u4e86\u95ed\u73af\u4fee\u590d\u7684\u53ef\u6269\u5c55\u8def\u5f84"], "keywords": ["Text-to-SQL", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u9760\u6027", "\u81ea\u52a8\u5316\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03833v1", "published_at": "2026-07-04", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Beyond Static Rules: Automated Discovery of Latent Vulnerabilities in Text-to-SQL", "tldr": "SAGE\u6846\u67b6\u81ea\u52a8\u53d1\u73b0Text-to-SQL\u4e2dLLM\u7684\u6f5c\u5728\u6f0f\u6d1e\u6a21\u5f0f\uff0c\u7a81\u7834\u9759\u6001\u89c4\u5219\u9650\u5236", "upvotes": 0, "what_it_is": "\u63d0\u51faSAGE\uff08\u7cfb\u7edf\u5316\u81ea\u52a8\u5f15\u5bfc\u63a2\u7d22\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u52a8\u751f\u6210\u6f0f\u6d1e\u5047\u8bbe\u3001\u7ef4\u62a4\u52a8\u6001\u6f14\u5316\u7684\u6f0f\u6d1e\u4ee3\u7801\u5e93\u5e76\u8bbe\u8ba1\u9488\u5bf9\u6027\u6270\u52a8\uff0c\u7cfb\u7edf\u6027\u5730\u6316\u6398LLM\u5728Text-to-SQL\u4efb\u52a1\u4e2d\u7684\u6f5c\u5728\u5931\u6548\u6a21\u5f0f\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9Text-to-SQL\u7684\u81ea\u52a8\u5316\u6f0f\u6d1e\u53d1\u73b0\u6846\u67b6\uff0c\u5c06\u5b89\u5168\u6d4b\u8bd5\u4ece\u4eba\u5de5\u9759\u6001\u89c4\u5219\u63a8\u5411\u81ea\u52a8\u5316\u7cfb\u7edf\u63a2\u7d22\uff0c\u5bf9\u6784\u5efa\u53ef\u4fe1\u6570\u636e\u5e93\u63a5\u53e3\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u6f0f\u6d1e\u7684\u8de8\u6a21\u578b\u6cdb\u5316\u6027\u63ed\u793a\u4e86\u5f53\u524dLLM\u7684\u7cfb\u7edf\u6027\u7f3a\u9677\u3002"}, {"abstract": "Generative models such as diffusion and flow matching have advanced robotic visuomotor policies by modeling multimodal action distributions, but their multi-step sampling or ODE solving introduces inference latency. Existing one-step acceleration methods often compress the whole generation process into a single large update, leading to spatial deviation, frequency distortion, and mode averaging. This paper proposes a high-fidelity one-step generative visuomotor policy framework that addresses these issues with three complementary mechanisms. Recursive Consistent Action Flow (RCAF) uses recursive correction to compensate for spatial truncation errors and align one-step predictions with refined flow trajectories. Dual-Timestep Frequency Consistency (DTFC) preserves high-frequency manipulation details through adaptive spectral consistency across flow timesteps. Contrastive Flow Matching (CFM) separates entangled action flows with a margin-based repulsive objective, reducing ambiguous actions in multimodal manipulation. Experiments on RoboTwin, RoboTwin 2.0, Adroit, DexArt, and real-world robot platforms show that the proposed method achieves competitive or superior performance compared with strong 10-step generative policy baselines while requiring only one forward pass (1 NFE), enabling low-latency visuomotor control.", "arxiv_id": "2607.03865", "arxiv_url": "https://arxiv.org/abs/2607.03865", "authors": ["Yuran Chen", "Xinye Cai", "Zhonglin Gong", "Yang Huang"], "brief": "\u63d0\u51faRCAF/DTFC/CFM\u4e09\u673a\u5236\u534f\u540c\u7684\u5355\u6b65\u751f\u6210\u89c6\u89c9\u8fd0\u52a8\u7b56\u7565\u6846\u67b6\uff0c\u5c06\u6269\u6563/\u6d41\u5339\u914d\u6a21\u578b\u7684\u591a\u6b65\u63a8\u7406\u538b\u7f29\u4e3a\u5355\u6b21\u524d\u5411\u4f20\u64ad\uff081 NFE\uff09\uff0c\u540c\u65f6\u4fdd\u6301\u9ad8\u4fdd\u771f\u52a8\u4f5c\u751f\u6210\u8d28\u91cf\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03865", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9012\u5f52\u4e00\u81f4\u52a8\u4f5c\u6d41\uff08RCAF\uff09\uff1a\u901a\u8fc7\u9012\u5f52\u6821\u6b63\u8865\u507f\u7a7a\u95f4\u622a\u65ad\u8bef\u5dee\uff0c\u4f7f\u5355\u6b65\u9884\u6d4b\u5bf9\u9f50\u7cbe\u7ec6\u6d41\u8f68\u8ff9", "\u53cc\u65f6\u95f4\u6b65\u9891\u7387\u4e00\u81f4\u6027\uff08DTFC\uff09\uff1a\u8de8\u6d41\u65f6\u95f4\u6b65\u81ea\u9002\u5e94\u8c31\u4e00\u81f4\u6027\uff0c\u4fdd\u7559\u9ad8\u9891\u64cd\u4f5c\u7ec6\u8282\u907f\u514d\u9891\u7387\u5931\u771f", "\u5bf9\u6bd4\u6d41\u5339\u914d\uff08CFM\uff09\uff1a\u57fa\u4e8e\u95f4\u9694\u7684\u6392\u65a5\u76ee\u6807\u5206\u79bb\u7ea0\u7f20\u52a8\u4f5c\u6d41\uff0c\u51cf\u5c11\u591a\u6a21\u6001\u64cd\u4f5c\u4e2d\u7684\u52a8\u4f5c\u6b67\u4e49", "\u5728RoboTwin\u3001RoboTwin 2.0\u3001Adroit\u3001DexArt\u53ca\u771f\u5b9e\u673a\u5668\u4eba\u5e73\u53f0\u4e0a\uff0c\u5355\u6b65\u63a8\u7406\u6027\u80fd\u5ab2\u7f8e\u751a\u81f3\u8d85\u8d8a10\u6b65\u57fa\u7ebf"], "keywords": ["\u673a\u5668\u4eba\u63a7\u5236", "\u6269\u6563\u6a21\u578b", "\u6d41\u5339\u914d", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03865v1", "published_at": "2026-07-04", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "High-Fidelity One-Step Generative Visuomotor Policy via Recursive Correction, Frequency Consistency, and Contrastive Flow Matching", "tldr": "\u63d0\u51fa\u5355\u6b65\u751f\u6210\u89c6\u89c9\u8fd0\u52a8\u7b56\u7565\u6846\u67b6\uff0c\u901a\u8fc7\u9012\u5f52\u6821\u6b63\u3001\u9891\u7387\u4e00\u81f4\u6027\u548c\u5bf9\u6bd4\u6d41\u5339\u914d\u5b9e\u73b0\u4f4e\u5ef6\u8fdf\u673a\u5668\u4eba\u63a7\u5236", "upvotes": 0, "what_it_is": "\u63d0\u51faRCAF/DTFC/CFM\u4e09\u673a\u5236\u534f\u540c\u7684\u5355\u6b65\u751f\u6210\u89c6\u89c9\u8fd0\u52a8\u7b56\u7565\u6846\u67b6\uff0c\u5c06\u6269\u6563/\u6d41\u5339\u914d\u6a21\u578b\u7684\u591a\u6b65\u63a8\u7406\u538b\u7f29\u4e3a\u5355\u6b21\u524d\u5411\u4f20\u64ad\uff081 NFE\uff09\uff0c\u540c\u65f6\u4fdd\u6301\u9ad8\u4fdd\u771f\u52a8\u4f5c\u751f\u6210\u8d28\u91cf\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u89e3\u51b3\u5355\u6b65\u751f\u6210\u7b56\u7565\u7684\u7a7a\u95f4\u504f\u5dee\u3001\u9891\u7387\u5931\u771f\u548c\u6a21\u5f0f\u5e73\u5747\u4e09\u5927\u95ee\u9898\uff0c\u5b9e\u73b0\u63a8\u7406\u5ef6\u8fdf\u5927\u5e45\u964d\u4f4e\uff0810\u500d\u52a0\u901f\uff09\u7684\u540c\u65f6\u4fdd\u6301\u7ade\u4e89\u6027\u6027\u80fd\uff0c\u5bf9\u5b9e\u65f6\u673a\u5668\u4eba\u63a7\u5236\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "On-policy distillation is a powerful way to transfer reasoning ability from a strong teacher to a smaller student: the student samples trajectories from its own policy, and the teacher provides dense token-level supervision on the states the student actually visits. However, this supervision is not always reliable: a teacher can assign high likelihood to plausible but incorrect solutions, or low likelihood to correct student solutions that follow different reasoning paths. Unconditionally distilling the teacher can therefore reinforce bad modes or erase useful student behavior. To address these limitations, we introduce RG-OPD: Reward-Gated On-Policy Distillation that uses verifier feedback to decide when teacher logits should be trusted. RG-OPD bridges sparse verifier rewards and dense teacher logits, preserving token-level supervision while filtering misleading teacher signals. Across reasoning and coding benchmarks, RG-OPD produces stronger distilled students, outperforming both vanilla reverse-KL distillation and the recent TSD-KD baseline. At 1K generation length, RG-OPD improves over reverse-KL by 2.9 points and over TSD-KD by 4.9 points; in the long-generation setting, it improves over the untuned student by 8.2 points. Our code is available at https://github.com/UoC-tail/RG-OPD.", "arxiv_id": "2607.04037", "arxiv_url": "https://arxiv.org/abs/2607.04037", "authors": ["Mohammad Sadegh Akhondzadeh", "Vijay Lingam", "Atula Tejaswi", "Chanakya Ekbote", "Sujay Sanghavi", "Aleksandar Bojchevski"], "brief": "\u63d0\u51faRG-OPD\u65b9\u6cd5\uff0c\u5728\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u4e2d\u5f15\u5165\u9a8c\u8bc1\u5668\u53cd\u9988\u4f5c\u4e3a\u95e8\u63a7\u673a\u5236\uff0c\u4ec5\u5728\u6559\u5e08\u4fe1\u53f7\u53ef\u4fe1\u65f6\u624d\u8fdb\u884c\u84b8\u998f\uff0c\u907f\u514d\u9519\u8bef\u6559\u5e08\u4fe1\u53f7\u6c61\u67d3\u5b66\u751f\u6a21\u578b\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04037", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u7528\u9a8c\u8bc1\u5668\u5956\u52b1\u51b3\u5b9a\u4f55\u65f6\u4fe1\u4efb\u6559\u5e08logits\uff0c\u6865\u63a5\u7a00\u758f\u5956\u52b1\u4e0e\u5bc6\u96c6token\u7ea7\u76d1\u7763", "\u5728\u63a8\u7406\u548c\u4ee3\u7801\u57fa\u51c6\u4e0a\uff0c\u76f8\u6bd4\u53cd\u5411KL\u84b8\u998f\u63d0\u53472.9\u5206\uff0c\u76f8\u6bd4TSD-KD\u57fa\u7ebf\u63d0\u53474.9\u5206", "\u957f\u751f\u6210\u573a\u666f\u4e0b\u76f8\u6bd4\u672a\u5fae\u8c03\u5b66\u751f\u6a21\u578b\u63d0\u53478.2\u5206\uff0c\u6548\u679c\u663e\u8457"], "keywords": ["\u77e5\u8bc6\u84b8\u998f", "\u5f3a\u5316\u5b66\u4e60", "\u63a8\u7406", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04037v1", "published_at": "2026-07-04", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Reward-Gated On-Policy Distillation", "tldr": "\u5956\u52b1\u95e8\u63a7\u5728\u7ebf\u84b8\u998f\uff1a\u7528\u9a8c\u8bc1\u5668\u53cd\u9988\u8fc7\u6ee4\u6559\u5e08\u9519\u8bef\u4fe1\u53f7\uff0c\u63d0\u5347\u5c0f\u6a21\u578b\u63a8\u7406\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faRG-OPD\u65b9\u6cd5\uff0c\u5728\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u4e2d\u5f15\u5165\u9a8c\u8bc1\u5668\u53cd\u9988\u4f5c\u4e3a\u95e8\u63a7\u673a\u5236\uff0c\u4ec5\u5728\u6559\u5e08\u4fe1\u53f7\u53ef\u4fe1\u65f6\u624d\u8fdb\u884c\u84b8\u998f\uff0c\u907f\u514d\u9519\u8bef\u6559\u5e08\u4fe1\u53f7\u6c61\u67d3\u5b66\u751f\u6a21\u578b\u3002", "why_notable": "\u89e3\u51b3\u4e86\u5728\u7ebf\u84b8\u998f\u4e2d\u6559\u5e08\u4fe1\u53f7\u4e0d\u53ef\u9760\u7684\u6839\u672c\u95ee\u9898\uff08\u6559\u5e08\u53ef\u80fd\u7ed9\u9519\u8bef\u7b54\u6848\u9ad8\u6982\u7387\u3001\u7ed9\u6b63\u786e\u4f46\u8def\u5f84\u4e0d\u540c\u7684\u7b54\u6848\u4f4e\u6982\u7387\uff09\uff0c\u65b9\u6cd5\u7b80\u6d01\u6709\u6548\uff0c\u4ee3\u7801\u5f00\u6e90\uff0c\u5bf9\u5c0f\u6a21\u578b\u63a8\u7406\u80fd\u529b\u63d0\u5347\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multimodal LLMs struggle to systematically model the temporal evolution of visual scenes in videos or multi-image sequences. Such inputs require models to predict or simulate multiple levels of dynamic constituents, such as actions taken in the visual sequence, and the associated changes to the visual environment that result. To address this challenge, we propose a dynamic schema-guided world model, DynaVieW, optimized for visual dynamic prediction and simulation. DynaVieW achieves an in-depth understanding of visual dynamics by learning interleaved state-transition sequences, where states cover broad visual scenes from video keyframes, and transitions capture comprehensive dynamic constituents within a hierarchical schema. DynaVieW jointly models transition prediction and state simulation under a mixture-of-experts architecture, with a cross-expert selective attention and a schema token re-weighted loss, to ensure effective and robust learning. DynaVieW\u0027s understanding of visual dynamics boosts its downstream performance in visual narrative creation and world simulation, showing improved consistency, controllability, and instruction-following.", "arxiv_id": "2607.04112", "arxiv_url": "https://arxiv.org/abs/2607.04112", "authors": ["Silin Gao", "Hao Zhao", "Zeming Chen", "Sepideh Mamooler", "Antara Raaghavi Bhattacharya", "Qiyu Wu", "Hiromi Wakaki", "Yuki Mitsufuji", "Li Mi", "Syrielle Montariol", "Antoine Bosselut"], "brief": "\u63d0\u51faDynaVieW\uff0c\u4e00\u79cd\u6a21\u5f0f\u5f15\u5bfc\u7684\u89c6\u89c9\u4e16\u754c\u6a21\u578b\uff0c\u901a\u8fc7\u5b66\u4e60\u4ea4\u9519\u7684\u72b6\u6001-\u8f6c\u6362\u5e8f\u5217\uff0c\u5bf9\u89c6\u9891\u6216\u591a\u56fe\u50cf\u5e8f\u5217\u4e2d\u7684\u89c6\u89c9\u52a8\u6001\u8fdb\u884c\u5c42\u6b21\u5316\u5efa\u6a21\u4e0e\u9884\u6d4b\u6a21\u62df\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04112", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528\u5c42\u6b21\u5316\u6a21\u5f0f\uff08hierarchical schema\uff09\u6355\u6349\u89c6\u89c9\u573a\u666f\u4e2d\u7684\u52a8\u4f5c\u4e0e\u73af\u5883\u53d8\u5316\uff0c\u72b6\u6001\u8986\u76d6\u5173\u952e\u5e27\uff0c\u8f6c\u6362\u6355\u6349\u52a8\u6001\u6210\u5206", "\u5f15\u5165\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09\u67b6\u6784\uff0c\u7ed3\u5408\u8de8\u4e13\u5bb6\u9009\u62e9\u6027\u6ce8\u610f\u529b\uff08cross-expert selective attention\uff09\u548c\u6a21\u5f0f\u4ee4\u724c\u91cd\u52a0\u6743\u635f\u5931\uff0c\u5b9e\u73b0\u8054\u5408\u8f6c\u6362\u9884\u6d4b\u4e0e\u72b6\u6001\u6a21\u62df", "\u5728\u89c6\u89c9\u53d9\u4e8b\u751f\u6210\u548c\u4e16\u754c\u6a21\u62df\u4e0b\u6e38\u4efb\u52a1\u4e2d\u8868\u73b0\u63d0\u5347\uff0c\u5177\u5907\u66f4\u597d\u7684\u4e00\u81f4\u6027\u3001\u53ef\u63a7\u6027\u548c\u6307\
