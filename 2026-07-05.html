<script>
const PAPERS = [{"abstract": "LLM agents often degrade over long episodes: as trajectories grow, they revisit explored states, repeat failed actions, and lose strategies that previously worked. Test-time training (TTT) offers a way to adapt model weights to the evolving task state, but existing LLM TTT methods largely adapt once to a fixed input. We study continuous TTT in multi-turn agent episodes, where each update changes the policy that generates later training text. This creates a self-training loop that helps when new trajectory information appears, but can amplify drift when the agent gets stuck and repeatedly trains on similar text. We find that update-text repetition distinguishes these regimes and introduce Agentic Test-Time Training (aTTT), a token-level reweighting method that downweights the loss on tokens appearing in repeated $n$-grams from prior updates while leaving novel tokens fully weighted. To run such updates inside live episodes, we build a concurrent serving system using vLLM\u0027s runtime LoRA API, limiting overhead to 1.9$\\times$ the no-TTT cost. aTTT improves success by up to 5.0 points on ALFWorld and 4.9 points on SWE-bench Lite. The gains concentrate where models already have task competence but drift over long trajectories, suggesting that aTTT mainly preserves existing competence rather than teaching new abilities.", "arxiv_id": "2607.03441", "arxiv_url": "https://arxiv.org/abs/2607.03441", "authors": ["Yanbo Wang", "Jinhua Hao", "Yuze Shi", "Kun Yuan", "Ming Sun"], "brief": "\u63d0\u51faAgentic Test-Time Training\uff08aTTT\uff09\uff0c\u4e00\u79cd\u5728\u591a\u8f6e\u667a\u80fd\u4f53\u4efb\u52a1\u6267\u884c\u8fc7\u7a0b\u4e2d\u6301\u7eed\u66f4\u65b0\u6a21\u578b\u6743\u91cd\u7684\u65b9\u6cd5\u3002\u901a\u8fc7\u5bf9\u91cd\u590dn-gram token\u964d\u6743\u3001\u65b0\u9896token\u4fdd\u6301\u5168\u6743\u91cd\uff0c\u6291\u5236\u81ea\u8bad\u7ec3\u5faa\u73af\u4e2d\u7684\u7b56\u7565\u6f02\u79fb\u95ee\u9898\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03441", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u673a\u5236\uff1atoken\u7ea7\u91cd\u52a0\u6743\uff0c\u5bf9\u6765\u81ea\u5148\u524d\u66f4\u65b0\u7684\u91cd\u590dn-gram\u964d\u4f4e\u635f\u5931\u6743\u91cd\uff0c\u907f\u514d\u5728\u76f8\u4f3c\u6587\u672c\u4e0a\u53cd\u590d\u8bad\u7ec3\u5bfc\u81f4\u7684\u6f02\u79fb", "\u5de5\u7a0b\u5b9e\u73b0\uff1a\u57fa\u4e8evLLM\u7684LoRA\u8fd0\u884c\u65f6API\u6784\u5efa\u5e76\u53d1\u670d\u52a1\u7cfb\u7edf\uff0c\u989d\u5916\u5f00\u9500\u4ec5\u4e3a\u65e0TTT\u76841.9\u500d", "\u5b9e\u9a8c\u6548\u679c\uff1a\u5728ALFWorld\u4e0a\u63d0\u53475.0\u4e2a\u767e\u5206\u70b9\uff0c\u5728SWE-bench Lite\u4e0a\u63d0\u53474.9\u4e2a\u767e\u5206\u70b9\uff0c\u6536\u76ca\u96c6\u4e2d\u4e8e\u6a21\u578b\u5df2\u6709\u80fd\u529b\u4f46\u957f\u8f68\u8ff9\u4e2d\u53d1\u751f\u6f02\u79fb\u7684\u573a\u666f"], "keywords": ["\u667a\u80fd\u4f53", "\u6d4b\u8bd5\u65f6\u8bad\u7ec3", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03441v1", "published_at": "2026-07-03", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "No Time Like the Present: Agentic Test-Time Training for LLM Agents", "tldr": "\u63d0\u51faaTTT\u65b9\u6cd5\uff0c\u901a\u8fc7token\u7ea7\u91cd\u52a0\u6743\u5b9e\u73b0LLM\u667a\u80fd\u4f53\u5728\u591a\u8f6e\u4ea4\u4e92\u4e2d\u7684\u6301\u7eed\u6d4b\u8bd5\u65f6\u8bad\u7ec3\uff0c\u9632\u6b62\u7b56\u7565\u6f02\u79fb", "upvotes": 0, "what_it_is": "\u63d0\u51faAgentic Test-Time Training\uff08aTTT\uff09\uff0c\u4e00\u79cd\u5728\u591a\u8f6e\u667a\u80fd\u4f53\u4efb\u52a1\u6267\u884c\u8fc7\u7a0b\u4e2d\u6301\u7eed\u66f4\u65b0\u6a21\u578b\u6743\u91cd\u7684\u65b9\u6cd5\u3002\u901a\u8fc7\u5bf9\u91cd\u590dn-gram token\u964d\u6743\u3001\u65b0\u9896token\u4fdd\u6301\u5168\u6743\u91cd\uff0c\u6291\u5236\u81ea\u8bad\u7ec3\u5faa\u73af\u4e2d\u7684\u7b56\u7565\u6f02\u79fb\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u591a\u8f6e\u667a\u80fd\u4f53\u573a\u666f\u4e0b\u7684\u6301\u7eed\u6d4b\u8bd5\u65f6\u8bad\u7ec3\u95ee\u9898\uff0c\u63ed\u793a\u81ea\u8bad\u7ec3\u5faa\u73af\u7684\u53cc\u5203\u5251\u6548\u5e94\uff0c\u5e76\u63d0\u4f9b\u4f4e\u5f00\u9500\u7684\u5de5\u7a0b\u89e3\u51b3\u65b9\u6848\uff0c\u5bf9\u63d0\u5347LLM\u667a\u80fd\u4f53\u957f\u7a0b\u4efb\u52a1\u7a33\u5b9a\u6027\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Video understanding is moving beyond closed-context perception toward open-world evidence exploration, a paradigm formalized as Video Deep Research (VDR). However, existing multimodal search agents primarily target static images, and the current VDR benchmark relies on text-centric retrieval that discards crucial visual information. To address these limitations, we propose VideoSearcher, a closed-loop agentic framework that empowers Vision-Language Models with multi-tool reasoning for VDR. VideoSearcher unifies temporal localization, spatial focusing, and multimodal search within a single reasoning trajectory, enabling agents to progressively ground visual clues, retrieve relevant evidence, and synthesize answers. To optimize knowledge-intensive reasoning trajectories, we propose Bi-branch Sequence Policy Optimization (BiSPO), a reinforcement learning algorithm that decouples tool-invocation optimization from answer-accuracy optimization. This design provides stable learning signals for both evidence-grounded reasoning and purposeful tool use. Furthermore, we construct VideoSearch-QA, the first benchmark designed to evaluate open-world video information grounding and multimodal search-based reasoning. Extensive experiments demonstrate that VideoSearcher significantly outperforms prior open-source agentic baselines across various search-oriented and multimodal understanding benchmarks.", "arxiv_id": "2607.02927", "arxiv_url": "https://arxiv.org/abs/2607.02927", "authors": ["Zhenkun Gao", "Yicheng Bao", "Jinlong Peng", "Xueheng Li", "Theo Huang", "Bangwei Liu", "Kunquan Li", "Zhenye Gan", "Tao Hu", "Chengjun Xie", "Mingqian Yang", "Xuanhua He", "Zhizhong Zhang", "Xin Tan", "Chengjie Wang", "Yuan Xie"], "brief": "\u63d0\u51faVideoSearcher\uff0c\u4e00\u4e2a\u95ed\u73af\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u8d4b\u4e88\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u591a\u5de5\u5177\u63a8\u7406\u80fd\u529b\uff0c\u7edf\u4e00\u65f6\u5e8f\u5b9a\u4f4d\u3001\u7a7a\u95f4\u805a\u7126\u548c\u591a\u6a21\u6001\u641c\u7d22\uff0c\u7528\u4e8e\u5f00\u653e\u4e16\u754c\u89c6\u9891\u6df1\u5ea6\u7814\u7a76\uff08VDR\uff09\u4efb\u52a1\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02927", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51faBiSPO\uff08\u53cc\u5206\u652f\u5e8f\u5217\u7b56\u7565\u4f18\u5316\uff09\u5f3a\u5316\u5b66\u4e60\u7b97\u6cd5\uff0c\u5c06\u5de5\u5177\u8c03\u7528\u4f18\u5316\u4e0e\u7b54\u6848\u51c6\u786e\u6027\u4f18\u5316\u89e3\u8026\uff0c\u63d0\u4f9b\u7a33\u5b9a\u5b66\u4e60\u4fe1\u53f7", "\u6784\u5efaVideoSearch-QA\u57fa\u51c6\uff0c\u9996\u4e2a\u4e13\u4e3a\u8bc4\u4f30\u5f00\u653e\u4e16\u754c\u89c6\u9891\u4fe1\u606f\u5b9a\u4f4d\u4e0e\u591a\u6a21\u6001\u641c\u7d22\u63a8\u7406\u8bbe\u8ba1\u7684\u6570\u636e\u96c6", "\u5728\u591a\u4e2a\u641c\u7d22\u5bfc\u5411\u548c\u591a\u6a21\u6001\u7406\u89e3\u57fa\u51c6\u4e0a\u663e\u8457\u8d85\u8d8a\u73b0\u6709\u5f00\u6e90\u667a\u80fd\u4f53\u57fa\u7ebf"], "keywords": ["\u667a\u80fd\u4f53", "\u89c6\u9891\u7406\u89e3", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02927v1", "published_at": "2026-07-03", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "VideoSearcher: Empowering Video Deep Research with Multi-Tool Agentic Reasoning via Reinforcement Learning", "tldr": "VideoSearcher\uff1a\u7528\u5f3a\u5316\u5b66\u4e60\u9a71\u52a8\u7684\u591a\u5de5\u5177\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5b9e\u73b0\u89c6\u9891\u6df1\u5ea6\u7814\u7a76", "upvotes": 0, "what_it_is": "\u63d0\u51faVideoSearcher\uff0c\u4e00\u4e2a\u95ed\u73af\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u8d4b\u4e88\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u591a\u5de5\u5177\u63a8\u7406\u80fd\u529b\uff0c\u7edf\u4e00\u65f6\u5e8f\u5b9a\u4f4d\u3001\u7a7a\u95f4\u805a\u7126\u548c\u591a\u6a21\u6001\u641c\u7d22\uff0c\u7528\u4e8e\u5f00\u653e\u4e16\u754c\u89c6\u9891\u6df1\u5ea6\u7814\u7a76\uff08VDR\uff09\u4efb\u52a1\u3002", "why_notable": "\u9996\u6b21\u5c06\u591a\u5de5\u5177\u667a\u80fd\u4f53\u63a8\u7406\u4e0e\u5f3a\u5316\u5b66\u4e60\u7ed3\u5408\u7528\u4e8e\u89c6\u9891\u6df1\u5ea6\u7814\u7a76\uff0c\u586b\u8865\u4e86\u73b0\u6709\u591a\u6a21\u6001\u641c\u7d22\u667a\u80fd\u4f53\u5ffd\u89c6\u89c6\u9891\u573a\u666f\u7684\u7a7a\u767d\uff0c\u5e76\u63d0\u4f9b\u4e86\u65b0\u7684\u8bc4\u6d4b\u57fa\u51c6\u3002"}, {"abstract": "LLM agents are becoming a common interface for research, coding, and question answering, yet their Thought-Action-Observation loop is often serial: the model reasons, emits a tool call, then idles the GPU until the result returns. This wait consumes 16-37% of wall time in our workloads and 35-61% in prior reports. Speculative tool execution can hide this wait, but existing systems need auxiliary predictors, historical traces, or static workflow graphs, leaving a gap for training-free, day-one deployment. We observe that the model can be its own predictor: a probe forked at the start of generation predicts Qwen3-32B\u0027s upcoming tool name with 74.6-99.6% accuracy across five benchmarks. We present SPORK (Self-sPeculative fORKing), a training-free controller that dispatches the speculated tool call early, overlapping its execution with the remaining chain-of-thought decode. A cost model captures when speculation breaks even, and each component improves one of its terms: a prefix-cache fork cuts probe cost, a confidence gate filters mispredictions, and partial-token accept turns rejected probes into speculative-decoding drafts. On acceptance, the tool result is ready when reasoning ends; on rejection, SPORK falls back to serial execution with no correctness penalty. On real-tool benchmarks, SPORK cuts Qwen3-32B\u0027s GAIA P95 by 18% (131.9 to 108.1 s); the mechanism holds across model sizes from 4B to 32B and across dense and mixture-of-experts models, with task accuracy within 1 pp of baseline or better wherever measured. SPORK deploys as a thin controller over standard completion APIs (no retraining, no auxiliary models, no offline traces) and is orthogonal to token-level speculative decoding. SPORK is open source at https://github.com/baihuajun24/spork.", "arxiv_id": "2607.03333", "arxiv_url": "https://arxiv.org/abs/2607.03333", "authors": ["Huajun Bai", "Weiwei Lv", "Huichuan Zheng", "Youyou Lu", "Jiwu Shu"], "brief": "\u63d0\u51faSPORK\uff08\u81ea\u6295\u673a\u5206\u53c9\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u751f\u6210\u5f00\u59cb\u65f6\u5206\u53c9\u4e00\u4e2a\u63a2\u9488\u6765\u9884\u6d4b\u5373\u5c06\u8c03\u7528\u7684\u5de5\u5177\u540d\u79f0\uff0c\u5e76\u63d0\u524d\u5e76\u884c\u6267\u884c\u5de5\u5177\u8c03\u7528\uff0c\u5c06\u5de5\u5177\u7b49\u5f85\u65f6\u95f4\u4e0e\u601d\u7ef4\u94fe\u89e3\u7801\u8fc7\u7a0b\u91cd\u53e0\uff0c\u4ece\u800c\u52a0\u901fLLM\u667a\u80fd\u4f53\u63a8\u7406\u3002", "categories": ["cs.DC", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03333", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u65e0\u9700\u8bad\u7ec3\u3001\u65e0\u9700\u8f85\u52a9\u6a21\u578b\u6216\u5386\u53f2\u8f68\u8ff9\uff0cQwen3-32B\u5de5\u5177\u540d\u9884\u6d4b\u51c6\u786e\u7387\u8fbe74.6-99.6%", "\u5de5\u5177\u7b49\u5f85\u65f6\u95f4\u5360\u603b\u8017\u65f616-61%\uff0cSPORK\u5c06GAIA\u57fa\u51c6P95\u5ef6\u8fdf\u4ece131.9s\u964d\u81f3108.1s\uff08\u964d\u4f4e18%\uff09", "\u5305\u542b\u524d\u7f00\u7f13\u5b58\u5206\u53c9\u3001\u7f6e\u4fe1\u5ea6\u95e8\u63a7\u3001\u90e8\u5206token\u63a5\u53d7\u4e09\u4e2a\u7ec4\u4ef6\uff0c\u9884\u6d4b\u5931\u8d25\u65f6\u65e0\u6b63\u786e\u6027\u635f\u5931\uff0c\u4e0etoken\u7ea7\u6295\u673a\u89e3\u7801\u6b63\u4ea4"], "keywords": ["\u667a\u80fd\u4f53", "LLM\u63a8\u7406\u52a0\u901f", "\u6295\u673a\u6267\u884c", "\u5de5\u5177\u8c03\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03333v1", "published_at": "2026-07-03", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SPORK: Self-Speculative Forking to Accelerate Agentic LLM Inference", "tldr": "SPORK\u8ba9LLM\u667a\u80fd\u4f53\u5728\u63a8\u7406\u65f6\u81ea\u9884\u6d4b\u5de5\u5177\u8c03\u7528\u5e76\u63d0\u524d\u6267\u884c\uff0c\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u964d\u4f4e18%\u5ef6\u8fdf", "upvotes": 0, "what_it_is": "\u63d0\u51faSPORK\uff08\u81ea\u6295\u673a\u5206\u53c9\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u751f\u6210\u5f00\u59cb\u65f6\u5206\u53c9\u4e00\u4e2a\u63a2\u9488\u6765\u9884\u6d4b\u5373\u5c06\u8c03\u7528\u7684\u5de5\u5177\u540d\u79f0\uff0c\u5e76\u63d0\u524d\u5e76\u884c\u6267\u884c\u5de5\u5177\u8c03\u7528\uff0c\u5c06\u5de5\u5177\u7b49\u5f85\u65f6\u95f4\u4e0e\u601d\u7ef4\u94fe\u89e3\u7801\u8fc7\u7a0b\u91cd\u53e0\uff0c\u4ece\u800c\u52a0\u901fLLM\u667a\u80fd\u4f53\u63a8\u7406\u3002", "why_notable": "\u9996\u4e2a\u65e0\u9700\u4efb\u4f55\u8bad\u7ec3\u6216\u79bb\u7ebf\u6570\u636e\u5373\u53ef\u90e8\u7f72\u7684\u667a\u80fd\u4f53\u6295\u673a\u6267\u884c\u65b9\u6848\uff0c\u4ee5\u8584\u63a7\u5236\u5668\u5f62\u5f0f\u53e0\u52a0\u5728\u6807\u51c6API\u4e0a\uff0c\u5de5\u7a0b\u5b9e\u7528\u6027\u5f3a\uff0c\u4e14\u5df2\u5f00\u6e90"}, {"abstract": "LLM-based coding agents solve software-engineering tasks through iterative interactions with development environments, where returned observations accumulate in the context and become a major source of inference cost. Observation compression reduces this cost by shortening observations before they are appended to the context. However, existing methods still exhibit an unsatisfactory efficiency-effectiveness trade-off, as they do not explicitly model how compression affects the agent\u0027s subsequent behavior. This paper proposes CoACT, an action-preserving observation compression method for coding agents. CoACT is built on next-action preservation (NAP), which requires a compressed observation to induce the same next action as the raw observation. By checking the agent\u0027s immediate next action, NAP provides a practical signal for whether a compression preserves the information needed for continued task solving. During training, a teacher model first generates multiple compressed candidates of each observation. CoACT then uses an action-preservation reward based on NAP to filter out candidates that would change the agent\u0027s next action, and uses a length-reduction reward to choose compact candidates as supervision for a lightweight compressor. Experiments on SWE-bench Verified with three agentic models show that CoACT reduces average total token consumption by 33.0% while maintaining task-solving effectiveness close to the uncompressed agent.", "arxiv_id": "2607.02911", "arxiv_url": "https://arxiv.org/abs/2607.02911", "authors": ["Haorui Chen", "Yuancheng Zhu", "Yitong Zhang", "Jia Li"], "brief": "\u63d0\u51faCoACT\uff0c\u4e00\u79cd\u9762\u5411\u7f16\u7a0b\u667a\u80fd\u4f53\u7684\u52a8\u4f5c\u4fdd\u7559\u578b\u89c2\u6d4b\u538b\u7f29\u65b9\u6cd5\uff0c\u901a\u8fc7\u786e\u4fdd\u538b\u7f29\u540e\u7684\u89c2\u6d4b\u80fd\u8bf1\u5bfc\u4e0e\u539f\u59cb\u89c2\u6d4b\u76f8\u540c\u7684\u4e0b\u4e00\u6b65\u52a8\u4f5c\uff0c\u5728\u964d\u4f4e\u63a8\u7406\u6210\u672c\u7684\u540c\u65f6\u4fdd\u6301\u4efb\u52a1\u89e3\u51b3\u6548\u679c\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02911", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u673a\u5236NAP\uff08\u4e0b\u4e00\u6b65\u52a8\u4f5c\u4fdd\u7559\uff09\uff1a\u8981\u6c42\u538b\u7f29\u89c2\u6d4b\u4e0e\u539f\u59cb\u89c2\u6d4b\u4ea7\u751f\u76f8\u540c\u7684\u4e0b\u4e00\u6b65\u52a8\u4f5c\uff0c\u4f5c\u4e3a\u538b\u7f29\u8d28\u91cf\u7684\u5b9e\u7528\u4fe1\u53f7", "\u8bad\u7ec3\u6d41\u7a0b\uff1a\u6559\u5e08\u6a21\u578b\u751f\u6210\u591a\u4e2a\u538b\u7f29\u5019\u9009\uff0c\u901a\u8fc7\u52a8\u4f5c\u4fdd\u7559\u5956\u52b1\u8fc7\u6ee4\u6539\u53d8\u884c\u4e3a\u7684\u5019\u9009\uff0c\u518d\u7528\u957f\u5ea6\u538b\u7f29\u5956\u52b1\u9009\u51fa\u6700\u7d27\u51d1\u7684\u4f5c\u4e3a\u8f7b\u91cf\u538b\u7f29\u5668\u7684\u76d1\u7763\u4fe1\u53f7", "\u5728SWE-bench Verified\u4e0a\u6d4b\u8bd5\u4e09\u79cd\u667a\u80fd\u4f53\u6a21\u578b\uff0c\u5e73\u5747token\u6d88\u8017\u964d\u4f4e33.0%\uff0c\u4efb\u52a1\u89e3\u51b3\u6548\u679c\u63a5\u8fd1\u65e0\u538b\u7f29\u57fa\u7ebf"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u4e0a\u4e0b\u6587\u538b\u7f29", "LLM\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02911v1", "published_at": "2026-07-03", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CoACT: Action-Preserving Observation Compression for Coding Agents", "tldr": "CoACT\u901a\u8fc7\u4fdd\u7559\u4e0b\u4e00\u6b65\u52a8\u4f5c\u7684\u538b\u7f29\u65b9\u6cd5\uff0c\u5c06\u7f16\u7a0b\u667a\u80fd\u4f53token\u6d88\u8017\u964d\u4f4e33%", "upvotes": 0, "what_it_is": "\u63d0\u51faCoACT\uff0c\u4e00\u79cd\u9762\u5411\u7f16\u7a0b\u667a\u80fd\u4f53\u7684\u52a8\u4f5c\u4fdd\u7559\u578b\u89c2\u6d4b\u538b\u7f29\u65b9\u6cd5\uff0c\u901a\u8fc7\u786e\u4fdd\u538b\u7f29\u540e\u7684\u89c2\u6d4b\u80fd\u8bf1\u5bfc\u4e0e\u539f\u59cb\u89c2\u6d4b\u76f8\u540c\u7684\u4e0b\u4e00\u6b65\u52a8\u4f5c\uff0c\u5728\u964d\u4f4e\u63a8\u7406\u6210\u672c\u7684\u540c\u65f6\u4fdd\u6301\u4efb\u52a1\u89e3\u51b3\u6548\u679c\u3002", "why_notable": "\u9996\u6b21\u5c06\u538b\u7f29\u5bf9\u667a\u80fd\u4f53\u540e\u7eed\u884c\u4e3a\u7684\u5f71\u54cd\u663e\u5f0f\u5efa\u6a21\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u89c2\u6d4b\u538b\u7f29\u65b9\u6cd5\u6548\u7387\u4e0e\u6548\u679c\u96be\u4ee5\u517c\u987e\u7684\u95ee\u9898\uff0c\u5bf9\u964d\u4f4eLLM\u7f16\u7a0b\u667a\u80fd\u4f53\u5b9e\u9645\u90e8\u7f72\u6210\u672c\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multimodal GUI agents read an interface through two redundant channels: the rendered pixels of a screenshot and a serialized structure such as a DOM or accessibility tree. Before acting, an agent forms a belief about the current interface state, but existing benchmarks score task success, element grounding, or attack resistance and do not ask whether that belief is drawn from the pixels. We formalize visual state reliance, the attribution of a state belief to pixels, structure, or priors, and measure it with paired single-channel interventions over 310 real web, mobile, and desktop probes. Every probe is scored by deterministic forced choice, with no model-generated item and no model judge. Our central metric is the Perception-Fusion Gap, the fraction of probes a model perceives correctly yet resolves toward structure under conflict. Across five models from three vendors, textual state beliefs defer to structure while image-only accuracy stays near ceiling, and Perception-Fusion Gap is positive for every model; non-text identity, by contrast, stays largely pixel-bound. The substitution is specific to the serialized-text and indexed-action channel, and coordinate-action agents are largely immune. For textual conflicts, a white-box ablation traces the effect to a single copied structural value, and in two live environments the conflict drives wrong actions and real task failure. Visual state reliance therefore gives a measurable diagnostic of whether agent state beliefs are visually grounded, and the errors it exposes propagate to actions.", "arxiv_id": "2607.04334", "arxiv_url": "https://arxiv.org/abs/2607.04334", "authors": ["Guijia Zhang", "Harry Yang"], "brief": "\u672c\u6587\u63d0\u51fa\"\u89c6\u89c9\u72b6\u6001\u4f9d\u8d56\"\u6982\u5ff5\uff0c\u901a\u8fc7310\u4e2a\u771f\u5b9eWeb/\u79fb\u52a8/\u684c\u9762\u63a2\u9488\uff0c\u7cfb\u7edf\u8bca\u65ad\u591a\u6a21\u6001GUI\u667a\u80fd\u4f53\u5728\u622a\u56fe\u50cf\u7d20\u4e0eDOM/\u65e0\u969c\u788d\u6811\u7ed3\u6784\u4fe1\u606f\u51b2\u7a81\u65f6\uff0c\u5176\u72b6\u6001\u4fe1\u5ff5\u7a76\u7adf\u6765\u6e90\u4e8e\u54ea\u4e2a\u901a\u9053\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04334", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u611f\u77e5-\u878d\u5408\u5dee\u8ddd\uff08Perception-Fusion Gap\uff09\u6307\u6807\uff1a\u8861\u91cf\u6a21\u578b\u80fd\u6b63\u786e\u611f\u77e5\u50cf\u7d20\u5374\u5728\u51b2\u7a81\u65f6\u4ecd\u9009\u62e9\u7ed3\u6784\u4fe1\u606f\u7684\u6bd4\u4f8b\uff0c\u4e94\u4e2a\u6a21\u578b\u8be5\u6307\u6807\u5747\u4e3a\u6b63\u503c", "\u6587\u672c\u7c7b\u72b6\u6001\u4fe1\u5ff5\u666e\u904d\u504f\u5411\u7ed3\u6784\u5316\u6587\u672c\u901a\u9053\uff0c\u800c\u975e\u6587\u672c\u8eab\u4efd\u4fe1\u606f\uff08\u5982\u56fe\u6807\uff09\u5219\u4e3b\u8981\u4f9d\u8d56\u50cf\u7d20\uff1b\u5750\u6807\u52a8\u4f5c\u578b\u667a\u80fd\u4f53\u5bf9\u6b64\u95ee\u9898\u57fa\u672c\u514d\u75ab", "\u767d\u76d2\u6d88\u878d\u5b9e\u9a8c\u5c06\u504f\u5dee\u8ffd\u6eaf\u81f3\u5355\u4e2a\u88ab\u590d\u5236\u7684\u7ed3\u6784\u503c\uff0c\u4e14\u5728\u4e24\u4e2a\u771f\u5b9e\u73af\u5883\u4e2d\u9a8c\u8bc1\u8be5\u51b2\u7a81\u4f1a\u5bfc\u81f4\u9519\u8bef\u52a8\u4f5c\u548c\u4efb\u52a1\u5931\u8d25"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "GUI", "\u53ef\u9760\u6027\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04334v1", "published_at": "2026-07-05", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Do GUI Agents Believe Their Eyes? Diagnosing State-Belief Reliance on Pixels versus Structure", "tldr": "GUI\u667a\u80fd\u4f53\u5728\u50cf\u7d20\u4e0e\u7ed3\u6784\u5316\u6570\u636e\u51b2\u7a81\u65f6\uff0c\u72b6\u6001\u4fe1\u5ff5\u503e\u5411\u4e8e\u4f9d\u8d56\u7ed3\u6784\u800c\u975e\u89c6\u89c9\u611f\u77e5", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u89c6\u89c9\u72b6\u6001\u4f9d\u8d56\"\u6982\u5ff5\uff0c\u901a\u8fc7310\u4e2a\u771f\u5b9eWeb/\u79fb\u52a8/\u684c\u9762\u63a2\u9488\uff0c\u7cfb\u7edf\u8bca\u65ad\u591a\u6a21\u6001GUI\u667a\u80fd\u4f53\u5728\u622a\u56fe\u50cf\u7d20\u4e0eDOM/\u65e0\u969c\u788d\u6811\u7ed3\u6784\u4fe1\u606f\u51b2\u7a81\u65f6\uff0c\u5176\u72b6\u6001\u4fe1\u5ff5\u7a76\u7adf\u6765\u6e90\u4e8e\u54ea\u4e2a\u901a\u9053\u3002", "why_notable": "\u63ed\u793a\u4e86\u5f53\u524dGUI\u667a\u80fd\u4f53\u89c6\u89c9\u63a5\u5730\u80fd\u529b\u7684\u7cfb\u7edf\u6027\u7f3a\u9677\u2014\u2014\u5373\u4f7f\u80fd\"\u770b\u89c1\"\u6b63\u786e\u4fe1\u606f\u4e5f\u4e0d\u4f7f\u7528\uff0c\u5bf9\u667a\u80fd\u4f53\u5b89\u5168\u6027\uff08\u5982UI\u6b3a\u9a97\u653b\u51fb\uff09\u548c\u53ef\u9760\u6027\u8bc4\u4f30\u5177\u6709\u91cd\u8981\u8bca\u65ad\u4ef7\u503c"}, {"abstract": "Recent advances in multimodal foundation models and agent systems have driven GUI agents from single-platform task execution toward cross-platform interaction. However, building multi-platform GUI agents remains challenging. On one hand, high-quality and executable cross-platform interaction trajectories are still scarce, and existing data often suffer from limited platform coverage. On the other hand, different platforms exhibit distinct interaction conventions, making joint or continual training prone to behavioral pattern mixing, platform-specific capability degradation, and catastrophic forgetting. To address these challenges, we construct Uni-GUI, a high-quality cross-platform GUI interaction dataset, and propose UI-MOPD, the first method that incorporates multi-teacher on-policy distillation into continual learning for GUI agents. UI-MOPD dynamically selects a platform-specific teacher according to the current environment and transfers platform-specific behavioral priors to a shared policy through platform-conditioned distillation, enabling adaptation to new platforms while preserving capabilities on existing ones. Experiments on OSWorld and MobileWorld show that UI-MOPD achieves task success rates of 38.2% and 12.0%, respectively, demonstrating its effectiveness in balancing cross-platform capability retention and new-platform adaptation. Project page: https://elispectre.github.io/UI-MOPD/.", "arxiv_id": "2607.04425", "arxiv_url": "https://arxiv.org/abs/2607.04425", "authors": ["Niu Lian", "Alan Chen", "Zhehao Yu", "Chengzhen Duan", "Fazhan Liu", "Hui Liu", "Pei Fu", "Jian Luan", "Yaowei Wang", "Shu-Tao Xia", "Jinpeng Wang"], "brief": "\u6784\u5efa\u4e86\u9ad8\u8d28\u91cf\u8de8\u5e73\u53f0GUI\u4ea4\u4e92\u6570\u636e\u96c6Uni-GUI\uff0c\u5e76\u63d0\u51faUI-MOPD\u65b9\u6cd5\uff0c\u5c06\u591a\u6559\u5e08\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u5f15\u5165\u6301\u7eed\u5b66\u4e60\u6846\u67b6\uff0c\u4f7fGUI\u667a\u80fd\u4f53\u80fd\u5728\u9002\u5e94\u65b0\u5e73\u53f0\u7684\u540c\u65f6\u4fdd\u7559\u5df2\u6709\u5e73\u53f0\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI", "cs.CV", "cs.LG", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04425", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u52a8\u6001\u9009\u62e9\u5e73\u53f0\u4e13\u5c5e\u6559\u5e08\u6a21\u578b\uff0c\u901a\u8fc7\u5e73\u53f0\u6761\u4ef6\u84b8\u998f\u5c06\u5e73\u53f0\u7279\u5b9a\u884c\u4e3a\u5148\u9a8c\u8fc1\u79fb\u81f3\u5171\u4eab\u7b56\u7565", "\u5728OSWorld\u548cMobileWorld\u4e0a\u5206\u522b\u53d6\u5f9738.2%\u548c12.0%\u7684\u4efb\u52a1\u6210\u529f\u7387", "\u6709\u6548\u7f13\u89e3\u591a\u5e73\u53f0\u8054\u5408/\u6301\u7eed\u8bad\u7ec3\u4e2d\u7684\u884c\u4e3a\u6a21\u5f0f\u6df7\u6dc6\u4e0e\u707e\u96be\u6027\u9057\u5fd8\u95ee\u9898"], "keywords": ["\u667a\u80fd\u4f53", "GUI", "\u6301\u7eed\u5b66\u4e60", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04425v1", "published_at": "2026-07-05", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "UI-MOPD: Multi-Platform On-Policy Distillation for Continual GUI Agent Learning", "tldr": "\u63d0\u51faUI-MOPD\u65b9\u6cd5\uff0c\u901a\u8fc7\u591a\u6559\u5e08\u5728\u7ebf\u84b8\u998f\u5b9e\u73b0\u8de8\u5e73\u53f0GUI\u667a\u80fd\u4f53\u7684\u6301\u7eed\u5b66\u4e60", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u9ad8\u8d28\u91cf\u8de8\u5e73\u53f0GUI\u4ea4\u4e92\u6570\u636e\u96c6Uni-GUI\uff0c\u5e76\u63d0\u51faUI-MOPD\u65b9\u6cd5\uff0c\u5c06\u591a\u6559\u5e08\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u5f15\u5165\u6301\u7eed\u5b66\u4e60\u6846\u67b6\uff0c\u4f7fGUI\u667a\u80fd\u4f53\u80fd\u5728\u9002\u5e94\u65b0\u5e73\u53f0\u7684\u540c\u65f6\u4fdd\u7559\u5df2\u6709\u5e73\u53f0\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u5c06\u591a\u6559\u5e08\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u4e0e\u6301\u7eed\u5b66\u4e60\u7ed3\u5408\u7528\u4e8eGUI\u667a\u80fd\u4f53\uff0c\u7cfb\u7edf\u6027\u89e3\u51b3\u8de8\u5e73\u53f0\u80fd\u529b\u4fdd\u7559\u4e0e\u65b0\u5e73\u53f0\u9002\u5e94\u7684\u6838\u5fc3\u77db\u76fe\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We introduce VSeek, an agentic framework that transforms long-video question answering (LVQA) from a passive, single-pass perception task into a multi-turn retrieval process. VSeek utilizes a natural language-driven search to identify relevant context within long videos and is post-trained with reinforcement learning (RL) to jointly formulate targeted search queries and reason over retrieved clips for LVQA. While RL post-training has revolutionized reasoning in symbolic domains such as mathematics and code, its application to long-video understanding remains hindered by a lack of verified rewards. To ensure that the retrieved context is relevant, we propose a novel neuro-symbolic approach that bridges open-ended natural language with discrete visual verification. Specifically, complex user queries are compiled into formal temporal logic specifications for systematically decomposing natural language questions into a definitive checklist of required atomic visual primitives, such as key objects and activities, along with their temporal ordering. These systematically derived grounding events provide the critical feedback signal for RL post-training, enabling dense, verifiable rewards based on the successful retrieval of these specific visual elements rather than relying entirely on outcome-only answer accuracy. By explicitly optimizing for this verifiable evidence-seeking behavior, VSeek improves Pass@1 scores by up to 8% and Pass@4 scores by 15% on long-video understanding benchmarks compared to base models. We open-source our code at https://utaustin-swarmlab.github.io/VSeek.", "arxiv_id": "2607.02959", "arxiv_url": "https://arxiv.org/abs/2607.02959", "authors": ["Harsh Goel", "S P Sharan", "Sahil Shah", "Minkyu Choi", "Joungbin An", "Kristen Grauman", "Sandeep P. Chinchali"], "brief": "\u63d0\u51faVSeek\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u957f\u89c6\u9891\u95ee\u7b54\u4ece\u88ab\u52a8\u5355\u6b21\u611f\u77e5\u8f6c\u5316\u4e3a\u591a\u8f6e\u68c0\u7d22\u8fc7\u7a0b\uff0c\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u6a21\u578b\u751f\u6210\u9488\u5bf9\u6027\u641c\u7d22\u67e5\u8be2\u5e76\u5bf9\u68c0\u7d22\u7247\u6bb5\u8fdb\u884c\u63a8\u7406\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.02959", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u795e\u7ecf\u7b26\u53f7\u65b9\u6cd5\uff1a\u5c06\u81ea\u7136\u8bed\u8a00\u95ee\u9898\u7f16\u8bd1\u4e3a\u5f62\u5f0f\u5316\u65f6\u5e8f\u903b\u8f91\u89c4\u8303\uff0c\u5206\u89e3\u4e3a\u539f\u5b50\u89c6\u89c9\u539f\u8bed\uff08\u5173\u952e\u5bf9\u8c61\u3001\u6d3b\u52a8\u53ca\u65f6\u5e8f\u5173\u7cfb\uff09\u7684\u68c0\u67e5\u6e05\u5355", "\u5229\u7528\u65f6\u5e8f\u903b\u8f91\u6d3e\u751f\u7684\u89c6\u89c9\u63a5\u5730\u4e8b\u4ef6\u4f5c\u4e3aRL\u8bad\u7ec3\u7684\u5bc6\u96c6\u53ef\u9a8c\u8bc1\u5956\u52b1\u4fe1\u53f7\uff0c\u800c\u975e\u4ec5\u4f9d\u8d56\u6700\u7ec8\u7b54\u6848\u51c6\u786e\u7387", "\u5728\u957f\u89c6\u9891\u7406\u89e3\u57fa\u51c6\u4e0a\uff0cPass@1\u63d0\u5347\u6700\u9ad88%\uff0cPass@4\u63d0\u5347\u6700\u9ad815%"], "keywords": ["\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u89c6\u9891\u7406\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.02959v1", "published_at": "2026-07-03", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Incentivizing Vision Language Models to Search for Long Video Question Answering", "tldr": "VSeek\u6846\u67b6\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e3b\u52a8\u68c0\u7d22\u957f\u89c6\u9891\u5173\u952e\u7247\u6bb5\u4ee5\u56de\u7b54\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faVSeek\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u957f\u89c6\u9891\u95ee\u7b54\u4ece\u88ab\u52a8\u5355\u6b21\u611f\u77e5\u8f6c\u5316\u4e3a\u591a\u8f6e\u68c0\u7d22\u8fc7\u7a0b\uff0c\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u6a21\u578b\u751f\u6210\u9488\u5bf9\u6027\u641c\u7d22\u67e5\u8be2\u5e76\u5bf9\u68c0\u7d22\u7247\u6bb5\u8fdb\u884c\u63a8\u7406\u3002", "why_notable": "\u9996\u6b21\u5c06\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u4e0e\u795e\u7ecf\u7b26\u53f7\u9a8c\u8bc1\u7ed3\u5408\u5e94\u7528\u4e8e\u957f\u89c6\u9891\u7406\u89e3\uff0c\u89e3\u51b3\u4e86\u957f\u89c6\u9891\u9886\u57df\u7f3a\u4e4f\u53ef\u9a8c\u8bc1\u5956\u52b1\u7684\u6838\u5fc3\u96be\u9898\uff0c\u5f00\u6e90\u4ee3\u7801\u5177\u6709\u8f83\u9ad8\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language model agents operate in partially observable, long-horizon settings where obtaining supervision remains a major bottleneck. We address this by utilizing a source of supervision overlooked in existing post-training methods: unintended yet successful goals embedded within agent rollouts. Specifically, we introduce Hindsight Supervised Learning (HSL), where an auxiliary LLM reviews each completed trajectory and relabels it with all of the natural-language goals the agent actually achieved. HSL then pairs the trajectory with its relabeled goals and uses these pairs for additional fine-tuning. To mitigate suboptimality in the relabeled data, we propose two learning techniques for HSL, irrelevant-action masking and sample reweighting. Our experiments show that HSL is flexible and compatible with existing post-training pipelines. It improves both SFT and DPO, with larger gains on long-horizon tasks with more diverse goal spaces. Moreover, HSL is sample-efficient: on ALFWorld, it surpasses baselines trained on the full dataset while using only one quarter of the ground-truth demonstrations.", "arxiv_id": "2607.04235", "arxiv_url": "https://arxiv.org/abs/2607.04235", "authors": ["Zichao Li", "Gang Wu", "Zichao Wang", "Ruiyi Zhang", "Wanrong Zhu", "Ryan A. Rossi", "Vlad I Morariu", "Jihyung Kil"], "brief": "\u63d0\u51faHindsight Supervised Learning\uff08HSL\uff09\u65b9\u6cd5\uff1a\u7528\u8f85\u52a9LLM\u5bf9\u5df2\u5b8c\u6210\u7684\u667a\u80fd\u4f53\u8f68\u8ff9\u8fdb\u884c\u4e8b\u540e\u91cd\u6807\u6ce8\uff0c\u8bc6\u522b\u5176\u4e2d\u5b9e\u9645\u8fbe\u6210\u7684\u81ea\u7136\u8bed\u8a00\u76ee\u6807\uff0c\u5e76\u5c06\u8fd9\u4e9b\u8f68\u8ff9-\u76ee\u6807\u5bf9\u7528\u4e8e\u5fae\u8c03\u8bad\u7ec3\uff0c\u540c\u65f6\u5f15\u5165\u65e0\u5173\u52a8\u4f5c\u63a9\u7801\u548c\u6837\u672c\u91cd\u52a0\u6743\u6765\u7f13\u89e3\u6b21\u4f18\u6570\u636e\u95ee\u9898\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04235", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u601d\u8def\uff1a\u6316\u6398\u667a\u80fd\u4f53rollout\u4e2d\u88ab\u5ffd\u89c6\u7684\u76d1\u7763\u4fe1\u53f7\u2014\u2014\u8f68\u8ff9\u4e2d\u610f\u5916\u5b9e\u73b0\u7684\u76ee\u6807\uff0c\u5c06\"\u5931\u8d25\"\u8f68\u8ff9\u8f6c\u5316\u4e3a\u6709\u6548\u8bad\u7ec3\u6570\u636e", "\u63d0\u51fa\u4e24\u9879\u6280\u672f\u7f13\u89e3\u91cd\u6807\u6ce8\u6570\u636e\u7684\u6b21\u4f18\u6027\uff1airrelevant-action masking\uff08\u5c4f\u853d\u65e0\u5173\u52a8\u4f5c\uff09\u548csample reweighting\uff08\u6837\u672c\u91cd\u52a0\u6743\uff09", "\u5728ALFWorld\u4e0a\u4ec5\u75281/4\u7684\u771f\u5b9e\u793a\u8303\u6570\u636e\u5373\u8d85\u8d8a\u4f7f\u7528\u5168\u91cf\u6570\u636e\u7684\u57fa\u7ebf\uff0c\u4e14\u4e0eSFT\u548cDPO\u5747\u517c\u5bb9"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u636e\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04235v1", "published_at": "2026-07-05", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Spinning Straw into Gold: Relabeling LLM Agent Trajectories in Hindsight for Successful Demonstrations", "tldr": "\u5229\u7528\u667a\u80fd\u4f53\u8f68\u8ff9\u4e2d\u610f\u5916\u6210\u529f\u7684\u76ee\u6807\u8fdb\u884c\u4e8b\u540e\u91cd\u6807\u6ce8\uff0c\u63d0\u5347LLM\u667a\u80fd\u4f53\u8bad\u7ec3\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faHindsight Supervised Learning\uff08HSL\uff09\u65b9\u6cd5\uff1a\u7528\u8f85\u52a9LLM\u5bf9\u5df2\u5b8c\u6210\u7684\u667a\u80fd\u4f53\u8f68\u8ff9\u8fdb\u884c\u4e8b\u540e\u91cd\u6807\u6ce8\uff0c\u8bc6\u522b\u5176\u4e2d\u5b9e\u9645\u8fbe\u6210\u7684\u81ea\u7136\u8bed\u8a00\u76ee\u6807\uff0c\u5e76\u5c06\u8fd9\u4e9b\u8f68\u8ff9-\u76ee\u6807\u5bf9\u7528\u4e8e\u5fae\u8c03\u8bad\u7ec3\uff0c\u540c\u65f6\u5f15\u5165\u65e0\u5173\u52a8\u4f5c\u63a9\u7801\u548c\u6837\u672c\u91cd\u52a0\u6743\u6765\u7f13\u89e3\u6b21\u4f18\u6570\u636e\u95ee\u9898\u3002", "why_notable": "\u89e3\u51b3\u4e86LLM\u667a\u80fd\u4f53\u8bad\u7ec3\u4e2d\u76d1\u7763\u6570\u636e\u7a00\u7f3a\u7684\u6838\u5fc3\u74f6\u9888\uff0c\u65e0\u9700\u989d\u5916\u4eba\u5de5\u6807\u6ce8\u5373\u53ef\u4ece\u5df2\u6709\u8f68\u8ff9\u4e2d\u6316\u6398\u66f4\u591a\u8bad\u7ec3\u4fe1\u53f7\uff0c\u6837\u672c\u6548\u7387\u663e\u8457\u63d0\u5347\uff0c\u4e14\u65b9\u6cd5\u901a\u7528\u6027\u5f3a\uff0c\u53ef\u65e0\u7f1d\u96c6\u6210\u5230\u73b0\u6709\u8bad\u7ec3\u6d41\u7a0b\u3002"}, {"abstract": "Large language models are increasingly deployed as IDE-integrated coding agents that decompose tasks, generate and edit files, run code, and refine outputs over many turns. Yet their safety is still often evaluated as if they were chatbots: one harmful prompt, one response, judged in isolation. We introduce workflow-level jailbreak construction, a failure mode in which a harmful objective is assembled across ordinary stages of a software-development workflow rather than generated through a single direct prompt. Using GitHub Copilot in Visual Studio Code, we study four closed-weight backends: Claude Sonnet 4.6, Claude Haiku 4.5, Gemini 3.1 Pro, and Gemini 3.5 Flash. Across 204 prompts from Hammurabi\u0027s Code, HarmBench, and AdvBench , the models show near-complete refusal under direct chat, CSV-read, and single-step code-fix baselines, with only 8/816 successful responses in each baseline condition. Under the full workflow, however, the same prompts and backends produce 816/816 unsafe teaching-shot completions, all independently confirmed by two expert evaluators under a strict rubric. These results show that conversational refusal benchmarks can substantially overstate the safety of deployed coding agents and motivate defenses that reason about safety across multi-turn IDE workflows and their generated artifacts, not only individual chat turns.", "arxiv_id": "2607.03968", "arxiv_url": "https://arxiv.org/abs/2607.03968", "authors": ["Abhishek Kumar", "Carsten Maple"], "brief": "\u63d0\u51fa\"\u5de5\u4f5c\u6d41\u7ea7\u8d8a\u72f1\u6784\u5efa\"\u653b\u51fb\u8303\u5f0f\uff1a\u5c06\u6709\u5bb3\u76ee\u6807\u62c6\u89e3\u5d4c\u5165\u8f6f\u4ef6\u5f00\u53d1\u5de5\u4f5c\u6d41\u7684\u666e\u901a\u9636\u6bb5\uff08\u800c\u975e\u5355\u6b21\u63d0\u793a\uff09\uff0c\u5bf9GitHub Copilot\u96c6\u6210\u7684\u56db\u4e2a\u4e3b\u6d41\u5927\u6a21\u578b\u8fdb\u884c\u6d4b\u8bd5\uff0c\u53d1\u73b0\u5355\u8f6e\u5bf9\u8bdd\u62d2\u7edd\u7387\u8fd1100%\uff0c\u4f46\u5b8c\u6574\u5de5\u4f5c\u6d41\u4e0b\u8d8a\u72f1\u6210\u529f\u7387\u8fbe816/816\uff08100%\uff09\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03968", "impact_score": 9, "is_agent": true, "is_top": true, "key_points": ["\u6d4b\u8bd5\u5bf9\u8c61\uff1aClaude Sonnet 4.6\u3001Claude Haiku 4.5\u3001Gemini 3.1 Pro\u3001Gemini 3.5 Flash\uff0c\u5171204\u4e2a\u6709\u5bb3\u63d0\u793a\u00d74\u6a21\u578b=816\u6b21\u5b9e\u9a8c", "\u57fa\u7ebf\u6761\u4ef6\uff08\u76f4\u63a5\u5bf9\u8bdd\u3001CSV\u8bfb\u53d6\u3001\u5355\u6b65\u4ee3\u7801\u4fee\u590d\uff09\u4e0b\u4ec58/816\u6210\u529f\uff0c\u800c\u5b8c\u6574\u5de5\u4f5c\u6d41\u4e0b816/816\u5168\u90e8\u6210\u529f", "\u6240\u6709\u7ed3\u679c\u7531\u4e24\u540d\u4e13\u5bb6\u8bc4\u4f30\u5458\u4f9d\u636e\u4e25\u683c\u8bc4\u5206\u6807\u51c6\u72ec\u7acb\u786e\u8ba4\uff0c\u63ed\u793a\u73b0\u6709\u5bf9\u8bdd\u5b89\u5168\u8bc4\u6d4b\u4e25\u91cd\u9ad8\u4f30\u4e86\u7f16\u7a0b\u667a\u80fd\u4f53\u7684\u5b9e\u9645\u5b89\u5168\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u5bf9\u9f50", "\u4ee3\u7801\u751f\u6210", "\u8d8a\u72f1\u653b\u51fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03968v1", "published_at": "2026-07-04", "score": 0.225, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "Refused in Chat, Written in Code: Workflow-Level Jailbreak Construction in IDE Coding Agents", "tldr": "IDE\u7f16\u7a0b\u667a\u80fd\u4f53\u53ef\u901a\u8fc7\u591a\u6b65\u5de5\u4f5c\u6d41\u7ed5\u8fc7\u5b89\u5168\u62d2\u7edd\uff0c\u5b9e\u73b0100%\u8d8a\u72f1\u6210\u529f\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u5de5\u4f5c\u6d41\u7ea7\u8d8a\u72f1\u6784\u5efa\"\u653b\u51fb\u8303\u5f0f\uff1a\u5c06\u6709\u5bb3\u76ee\u6807\u62c6\u89e3\u5d4c\u5165\u8f6f\u4ef6\u5f00\u53d1\u5de5\u4f5c\u6d41\u7684\u666e\u901a\u9636\u6bb5\uff08\u800c\u975e\u5355\u6b21\u63d0\u793a\uff09\uff0c\u5bf9GitHub Copilot\u96c6\u6210\u7684\u56db\u4e2a\u4e3b\u6d41\u5927\u6a21\u578b\u8fdb\u884c\u6d4b\u8bd5\uff0c\u53d1\u73b0\u5355\u8f6e\u5bf9\u8bdd\u62d2\u7edd\u7387\u8fd1100%\uff0c\u4f46\u5b8c\u6574\u5de5\u4f5c\u6d41\u4e0b\u8d8a\u72f1\u6210\u529f\u7387\u8fbe816/816\uff08100%\uff09\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u8bc1\u660e\u591a\u8f6eIDE\u5de5\u4f5c\u6d41\u53ef\u5b8c\u5168\u7ed5\u8fc7\u4e3b\u6d41\u5927\u6a21\u578b\u7684\u5b89\u5168\u62a4\u680f\uff0c\u5bf9\u5f53\u524d\u4ee5\u5355\u8f6e\u5bf9\u8bdd\u4e3a\u4e3b\u7684\u5b89\u5168\u8bc4\u6d4b\u4f53\u7cfb\u63d0\u51fa\u6839\u672c\u6027\u6311\u6218\uff0c\u5bf9AI\u7f16\u7a0b\u5de5\u5177\u7684\u5b89\u5168\u90e8\u7f72\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49"}, {"abstract": "Current Vision-Language-Action (VLA) models excel at robotic manipulation but often struggle with non-Markovian tasks requiring long-term memory and reasoning due to their reliance on immediate observations. Existing solutions face a \u0027\u0027frequency-competence paradox,\u0027\u0027 where stronger reasoning models are too slow for real-time control, while faster models lack sufficient reasoning capabilities. To resolve this architectural misalignment, we propose HiMe, a Hierarchical Embodied Memory framework that decouples embodied intelligence into a high-frequency Executor for execution, a Sentry for working memory, and a Planner for long-term strategy. We also introduce a dynamic knowledge system based on cross-modal semantic schemas and active management mechanisms, allowing robots to maintain memory plasticity through \u0027\u0027Add, Update, and Delete\u0027\u0027 operations. This hierarchical design effectively balances the conflict between real-time execution and slow thinking planning, significantly improving success rates in long-horizon tasks. Experiments demonstrate that this approach not only outperforms flat memory baselines but also exhibits the novel ability to self-correct its internal knowledge based on human preferences.", "arxiv_id": "2607.03449", "arxiv_url": "https://arxiv.org/abs/2607.03449", "authors": ["Li Ji", "Siyin Wang", "Pengfang Qian", "Xiaopeng Yu", "Yihai Tian", "Zhaoye Fei", "Jingjing Gong", "Xipeng Qiu"], "brief": "\u63d0\u51faHiMe\uff08\u5206\u5c42\u5177\u8eab\u8bb0\u5fc6\uff09\u6846\u67b6\uff0c\u5c06\u673a\u5668\u4eba\u667a\u80fd\u89e3\u8026\u4e3a\u9ad8\u9891\u6267\u884c\u5668\uff08Executor\uff09\u3001\u5de5\u4f5c\u8bb0\u5fc6\u54e8\u5175\uff08Sentry\uff09\u548c\u957f\u671f\u89c4\u5212\u5668\uff08Planner\uff09\u4e09\u5c42\u67b6\u6784\uff0c\u5e76\u5f15\u5165\u57fa\u4e8e\u8de8\u6a21\u6001\u8bed\u4e49\u6a21\u5f0f\u7684\u52a8\u6001\u77e5\u8bc6\u7cfb\u7edf\uff0c\u652f\u6301\u8bb0\u5fc6\u7684\u589e\u5220\u6539\u64cd\u4f5c\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03449", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u5c42\u5206\u5c42\u67b6\u6784\uff1a\u9ad8\u9891Executor\u8d1f\u8d23\u5b9e\u65f6\u6267\u884c\uff0cSentry\u7ef4\u62a4\u5de5\u4f5c\u8bb0\u5fc6\uff0cPlanner\u8d1f\u8d23\u957f\u671f\u7b56\u7565\u89c4\u5212\uff0c\u6709\u6548\u89e3\u8026\u63a8\u7406\u901f\u5ea6\u4e0e\u80fd\u529b\u7684\u77db\u76fe", "\u52a8\u6001\u77e5\u8bc6\u7ba1\u7406\u7cfb\u7edf\uff1a\u57fa\u4e8e\u8de8\u6a21\u6001\u8bed\u4e49\u6a21\u5f0f\uff0c\u652f\u6301Add/Update/Delete\u64cd\u4f5c\uff0c\u4fdd\u6301\u8bb0\u5fc6\u53ef\u5851\u6027", "\u5b9e\u9a8c\u8868\u660eHiMe\u5728\u957f\u65f6\u57df\u4efb\u52a1\u4e2d\u663e\u8457\u4f18\u4e8e\u5e73\u9762\u8bb0\u5fc6\u57fa\u7ebf\uff0c\u5e76\u5177\u5907\u6839\u636e\u4eba\u7c7b\u504f\u597d\u81ea\u6211\u4fee\u6b63\u5185\u90e8\u77e5\u8bc6\u7684\u80fd\u529b"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u673a\u5668\u4eba\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03449v1", "published_at": "2026-07-03", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "HiMe: Hierarchical Embodied Memory for Long-Horizon Vision-Language-Action Control", "tldr": "HiMe\u63d0\u51fa\u5206\u5c42\u5177\u8eab\u8bb0\u5fc6\u6846\u67b6\uff0c\u89e3\u51b3\u673a\u5668\u4eba\u957f\u65f6\u57df\u4efb\u52a1\u4e2d\u5b9e\u65f6\u63a7\u5236\u4e0e\u6df1\u5ea6\u63a8\u7406\u7684\u77db\u76fe", "upvotes": 0, "what_it_is": "\u63d0\u51faHiMe\uff08\u5206\u5c42\u5177\u8eab\u8bb0\u5fc6\uff09\u6846\u67b6\uff0c\u5c06\u673a\u5668\u4eba\u667a\u80fd\u89e3\u8026\u4e3a\u9ad8\u9891\u6267\u884c\u5668\uff08Executor\uff09\u3001\u5de5\u4f5c\u8bb0\u5fc6\u54e8\u5175\uff08Sentry\uff09\u548c\u957f\u671f\u89c4\u5212\u5668\uff08Planner\uff09\u4e09\u5c42\u67b6\u6784\uff0c\u5e76\u5f15\u5165\u57fa\u4e8e\u8de8\u6a21\u6001\u8bed\u4e49\u6a21\u5f0f\u7684\u52a8\u6001\u77e5\u8bc6\u7cfb\u7edf\uff0c\u652f\u6301\u8bb0\u5fc6\u7684\u589e\u5220\u6539\u64cd\u4f5c\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u63d0\u51fa\u0027\u9891\u7387-\u80fd\u529b\u6096\u8bba\u0027\u95ee\u9898\u5e76\u7ed9\u51fa\u5206\u5c42\u89e3\u51b3\u65b9\u6848\uff0c\u4f7fVLA\u6a21\u578b\u5177\u5907\u975e\u9a6c\u5c14\u53ef\u592b\u957f\u65f6\u57df\u4efb\u52a1\u5904\u7406\u80fd\u529b\uff0c\u540c\u65f6\u652f\u6301\u4eba\u7c7b\u504f\u597d\u9a71\u52a8\u7684\u77e5\u8bc6\u81ea\u6211\u4fee\u6b63\uff0c\u5bf9\u5177\u8eab\u667a\u80fd\u5b9e\u7528\u5316\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Frontier LLMs can perform multi-step reasoning over content-free filler tokens like dots or counting sequences, producing correct answers with no visible chain-of-thought (CoT). This is a limit case for behavioral oversight, where surface tokens carry no information about the underlying reasoning. But hidden from the output is not the same as hidden from us. On four task families (fact retrieval, parallel numeric composition, string manipulation, and in-context computation), two open-weights frontier models (DeepSeek V3, Kimi K2) compute over filler tokens in a structured, legible way: attention routes the question through the filler region to the answer, logit-lens readouts show retrieved facts emerging early and their composition crystallizing in late layers, and KV-cache transplants at filler positions causally swap outputs between examples. We introduce an unsupervised decoding pipeline that takes only hidden states as input and recovers intermediate values with 80-95% accuracy (best LLM judge) across both models and all four tasks, without ground-truth labels or training. Hidden computation that defeats behavioral CoT monitoring is, on these tasks, directly readable from the residual stream, suggesting monitorability is a property of the model\u0027s full computational trace, not just its surface tokens.", "arxiv_id": "2607.03502", "arxiv_url": "https://arxiv.org/abs/2607.03502", "authors": ["Kaley Brauer", "Claudio Mayrink Verdun", "Samuel Marks"], "brief": "\u672c\u6587\u7814\u7a76\u524d\u6cbfLLM\u5728\"\u70b9\"\u7b49\u65e0\u5185\u5bb9\u586b\u5145\u7b26\u4e0a\u8fdb\u884c\u591a\u6b65\u63a8\u7406\u7684\u673a\u5236\uff0c\u63d0\u51fa\u65e0\u76d1\u7763\u89e3\u7801\u6d41\u7a0b\uff0c\u4ec5\u51ed\u9690\u85cf\u72b6\u6001\u5373\u53ef\u6062\u590d\u4e2d\u95f4\u63a8\u7406\u503c\uff0c\u63ed\u793a\u9690\u5f0f\u8ba1\u7b97\u5bf9\u76d1\u7763\u8005\u5e76\u975e\u4e0d\u53ef\u89c1\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03502", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u57284\u7c7b\u4efb\u52a1\uff08\u4e8b\u5b9e\u68c0\u7d22\u3001\u5e76\u884c\u6570\u503c\u7ec4\u5408\u3001\u5b57\u7b26\u4e32\u64cd\u4f5c\u3001\u4e0a\u4e0b\u6587\u8ba1\u7b97\uff09\u4e0a\u6d4b\u8bd5DeepSeek V3\u548cKimi K2\uff0c\u53d1\u73b0\u6ce8\u610f\u529b\u5c06\u95ee\u9898\u901a\u8fc7\u586b\u5145\u533a\u57df\u8def\u7531\u81f3\u7b54\u6848", "logit-lens\u5206\u6790\u663e\u793a\u4e8b\u5b9e\u5728\u65e9\u671f\u5c42\u88ab\u68c0\u7d22\uff0c\u7ec4\u5408\u5728\u665a\u671f\u5c42\u7ed3\u6676\uff1bKV\u7f13\u5b58\u79fb\u690d\u5b9e\u9a8c\u56e0\u679c\u6027\u5730\u4ea4\u6362\u4e86\u4e0d\u540c\u6837\u672c\u7684\u8f93\u51fa", "\u65e0\u76d1\u7763\u89e3\u7801\u6d41\u7a0b\u65e0\u9700\u6807\u7b7e\u6216\u8bad\u7ec3\uff0c\u4ec5\u7528\u9690\u85cf\u72b6\u6001\u5373\u53ef\u4ee580-95%\u51c6\u786e\u7387\u6062\u590d\u4e2d\u95f4\u63a8\u7406\u503c"], "keywords": ["\u53ef\u89e3\u91ca\u6027", "\u5927\u8bed\u8a00\u6a21\u578b", "\u601d\u7ef4\u94fe", "AI\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03502v1", "published_at": "2026-07-03", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Reading Between the Dots: Decoding Hidden Computation across Filler Tokens", "tldr": "LLM\u5728\u65e0\u5185\u5bb9\u586b\u5145\u7b26\u4e0a\u7684\u9690\u5f0f\u63a8\u7406\u53ef\u88ab\u76f4\u63a5\u4ece\u6b8b\u5dee\u6d41\u4e2d\u89e3\u7801\uff0c\u51c6\u786e\u7387\u8fbe80-95%", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u524d\u6cbfLLM\u5728\"\u70b9\"\u7b49\u65e0\u5185\u5bb9\u586b\u5145\u7b26\u4e0a\u8fdb\u884c\u591a\u6b65\u63a8\u7406\u7684\u673a\u5236\uff0c\u63d0\u51fa\u65e0\u76d1\u7763\u89e3\u7801\u6d41\u7a0b\uff0c\u4ec5\u51ed\u9690\u85cf\u72b6\u6001\u5373\u53ef\u6062\u590d\u4e2d\u95f4\u63a8\u7406\u503c\uff0c\u63ed\u793a\u9690\u5f0f\u8ba1\u7b97\u5bf9\u76d1\u7763\u8005\u5e76\u975e\u4e0d\u53ef\u89c1\u3002", "why_notable": "\u6311\u6218\u4e86\"\u9690\u85cf\u4e8e\u8f93\u51fa\u5373\u9690\u85cf\u4e8e\u76d1\u7763\u8005\"\u7684\u5047\u8bbe\uff0c\u8bc1\u660e\u5373\u4f7f\u6a21\u578b\u7ed5\u8fc7\u53ef\u89c1\u601d\u7ef4\u94fe\uff0c\u5176\u5b8c\u6574\u8ba1\u7b97\u8f68\u8ff9\u4ecd\u53ef\u88ab\u89e3\u8bfb\uff0c\u5bf9AI\u5b89\u5168\u4e0e\u53ef\u76d1\u7763\u6027\u7814\u7a76\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Unified multi-modal models (UMMs) have shown promising interleaved text-image reasoning capabilities, yet effectively optimizing such multi-turn generation via reinforcement learning (RL) remains an open challenge. Existing approaches apply RL exclusively to text steps, relegating image generation to supervised surrogates, preventing policy gradients from propagating through the full interleaved trajectory across heterogeneous modalities. This leaves the potential of RL for UMMs largely untapped. In the paper, we introduce \\textbf{BRAID} (\\textbf{B}ridging inte\\textbf{R}le\\textbf{A}ved mult\\textbf{I}-modal reasoning as a unified \\textbf{D}ecision process), a simple framework that casts multi-turn text-image-text reasoning as a unified Markov decision process (MDP), enabling joint optimization of textual and visual generation via a single, principled RL objective. BRAID computes a shared trajectory-level advantage and propagates it coherently into both text tokens and image denoising paths, each optimized through its modality-native policy gradient mechanism. To further address long-horizon credit assignment, BRAID employs a vision-language model (VLM) judge that scores each intermediate image on its reasoning utility, supplying dense turn-level feedback to sharpen learning at critical visual branches. Experiments on spatial reasoning and visual perception benchmarks show that BRAID consistently outperforms various baselines, confirming that a unified MDP formulation with vision-thinking guidance is essential for effective multi-modal reasoning.", "arxiv_id": "2607.03748", "arxiv_url": "https://arxiv.org/abs/2607.03748", "authors": ["Zican Hu", "Xuyang Hu", "Yiming Liu", "Zuwei Long", "Wei Liu", "Yunzhuo Hao", "Jiawei Gu", "Linjie Li", "Yu Cheng", "Zhenhong Sun", "Weibo Gu", "Xing Sun", "Zhi Wang"], "brief": "\u63d0\u51faBRAID\u6846\u67b6\uff0c\u5c06\u591a\u8f6e\u6587\u672c-\u56fe\u50cf-\u6587\u672c\u63a8\u7406\u5efa\u6a21\u4e3a\u7edf\u4e00\u9a6c\u5c14\u53ef\u592b\u51b3\u7b56\u8fc7\u7a0b\uff08MDP\uff09\uff0c\u901a\u8fc7\u5355\u4e00RL\u76ee\u6807\u540c\u65f6\u4f18\u5316\u6587\u672ctoken\u751f\u6210\u548c\u56fe\u50cf\u53bb\u566a\u8def\u5f84\uff0c\u6253\u7834\u4e86\u4ee5\u5f80RL\u4ec5\u4f5c\u7528\u4e8e\u6587\u672c\u6b65\u9aa4\u7684\u5c40\u9650\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03748", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u8ba1\u7b97\u5171\u4eab\u8f68\u8ff9\u7ea7\u4f18\u52bf\u51fd\u6570\uff0c\u5206\u522b\u901a\u8fc7\u5404\u6a21\u6001\u539f\u751f\u7b56\u7565\u68af\u5ea6\u673a\u5236\u4f20\u64ad\u81f3\u6587\u672ctoken\u548c\u56fe\u50cf\u53bb\u566a\u8def\u5f84", "\u5f15\u5165VLM\u8bc4\u5224\u5668\u5bf9\u4e2d\u95f4\u751f\u6210\u56fe\u50cf\u7684\u63a8\u7406\u6548\u7528\u6253\u5206\uff0c\u63d0\u4f9b\u5bc6\u96c6\u7684\u9010\u8f6e\u53cd\u9988\u4ee5\u89e3\u51b3\u957f\u65f6\u5e8f\u4fe1\u7528\u5206\u914d\u95ee\u9898", "\u5728\u7a7a\u95f4\u63a8\u7406\u548c\u89c6\u89c9\u611f\u77e5\u57fa\u51c6\u4e0a\u6301\u7eed\u4f18\u4e8e\u591a\u79cd\u57fa\u7ebf\u65b9\u6cd5\uff0c\u9a8c\u8bc1\u4e86\u7edf\u4e00MDP+\u89c6\u89c9\u601d\u7ef4\u5f15\u5bfc\u7684\u6709\u6548\u6027"], "keywords": ["\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60", "\u7edf\u4e00\u6a21\u578b", "\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03748v1", "published_at": "2026-07-04", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Bridging Interleaved Multi-Modal Reasoning as a Unified Decision Process", "tldr": "BRAID\u5c06\u591a\u6a21\u6001\u6587\u672c-\u56fe\u50cf\u4ea4\u9519\u63a8\u7406\u7edf\u4e00\u4e3aMDP\uff0c\u5b9e\u73b0\u6587\u672c\u4e0e\u89c6\u89c9\u751f\u6210\u7684\u8054\u5408RL\u4f18\u5316", "upvotes": 0, "what_it_is": "\u63d0\u51faBRAID\u6846\u67b6\uff0c\u5c06\u591a\u8f6e\u6587\u672c-\u56fe\u50cf-\u6587\u672c\u63a8\u7406\u5efa\u6a21\u4e3a\u7edf\u4e00\u9a6c\u5c14\u53ef\u592b\u51b3\u7b56\u8fc7\u7a0b\uff08MDP\uff09\uff0c\u901a\u8fc7\u5355\u4e00RL\u76ee\u6807\u540c\u65f6\u4f18\u5316\u6587\u672ctoken\u751f\u6210\u548c\u56fe\u50cf\u53bb\u566a\u8def\u5f84\uff0c\u6253\u7834\u4e86\u4ee5\u5f80RL\u4ec5\u4f5c\u7528\u4e8e\u6587\u672c\u6b65\u9aa4\u7684\u5c40\u9650\u3002", "why_notable": "\u9996\u6b21\u5c06\u5f3a\u5316\u5b66\u4e60\u7684\u7b56\u7565\u68af\u5ea6\u5b8c\u6574\u4f20\u64ad\u81f3\u591a\u6a21\u6001\u4ea4\u9519\u751f\u6210\u7684\u5168\u8f68\u8ff9\uff08\u542b\u56fe\u50cf\u751f\u6210\uff09\uff0c\u586b\u8865\u4e86\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578bRL\u4f18\u5316\u7684\u5173\u952e\u7a7a\u767d\uff0c\u5bf9\u591a\u6a21\u6001\u63a8\u7406\u7cfb\u7edf\u7684\u8bad\u7ec3\u8303\u5f0f\u5177\u6709\u91cd\u8981\u63a8\u52a8\u610f\u4e49\u3002"}, {"abstract": "Personal AI agents that run on the user\u0027s local machine, such as OpenClaw, automate daily tasks including web search, email, and file management. Their access to computer resources, including the network, file system, and shell, exposes them to indirect prompt injection (IPI) attacks. Prior Dual LLM defenses block IPI by replacing untrusted data with symbols that the agent can reference but not read. However, they track untrusted data only inside the agent\u0027s context, so when the agent saves and later rereads untrusted data, that data, possibly an attacker\u0027s prompt, can return as trusted data rather than as a symbol, which we call stored IPI. Operating on the user\u0027s real environment, which humans and programs share, is what makes agents like OpenClaw practical, and is exactly why a defense that ignores it is incomplete. Preserving symbols in such an environment is hard, because humans and programs need original data. We present DualView, which extends untrusted data tracking from the agent\u0027s context to the user\u0027s environment, including the file system, shell, network, and other agents, by giving each channel two views. In AgentView, the agent sees untrusted data as symbols even after writing it out and reading it back, blocking stored IPI, while HumanView preserves original data for humans and tools. DualView routes each tool call to the right view and synchronizes data across the two views. DualView deploys as an OpenClaw plugin using only tool hooks, without changing the agent\u0027s tool-call logic or tool implementations. Since DualView isolates untrusted data by design, its protection is not limited to known attack templates. In our evaluation on an IPI benchmark and PinchBench, DualView blocked every IPI attack, including stored IPI, while keeping utility close to the unprotected baseline.", "arxiv_id": "2607.03821", "arxiv_url": "https://arxiv.org/abs/2607.03821", "authors": ["Juhee Kim", "Woohyuk Choi", "Taehyun Kang", "Youngmin Kim", "Byoungyoung Lee"], "brief": "\u63d0\u51faDualView\u9632\u5fa1\u6846\u67b6\uff0c\u901a\u8fc7\u4e3a\u6587\u4ef6\u7cfb\u7edf\u3001\u7f51\u7edc\u3001Shell\u7b49\u6bcf\u4e2a\u901a\u9053\u5efa\u7acb\u300c\u667a\u80fd\u4f53\u89c6\u56fe\u300d\u548c\u300c\u4eba\u7c7b\u89c6\u56fe\u300d\u4e24\u5957\u89c6\u56fe\uff0c\u5c06\u4e0d\u53ef\u4fe1\u6570\u636e\u8ffd\u8e2a\u4ece\u667a\u80fd\u4f53\u4e0a\u4e0b\u6587\u6269\u5c55\u5230\u7528\u6237\u771f\u5b9e\u73af\u5883\uff0c\u4ece\u800c\u963b\u65ad\u5305\u62ec\u5b58\u50a8\u578b\u95f4\u63a5\u63d0\u793a\u6ce8\u5165\u5728\u5185\u7684\u6240\u6709IPI\u653b\u51fb\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.03821", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u53d1\u73b0\u73b0\u6709Dual LLM\u9632\u5fa1\u7684\u76f2\u533a\uff1a\u5f53\u667a\u80fd\u4f53\u5c06\u4e0d\u53ef\u4fe1\u6570\u636e\u5199\u5165\u6587\u4ef6\u7cfb\u7edf\u540e\u518d\u8bfb\u56de\u65f6\uff0c\u653b\u51fb\u8005\u63d0\u793a\u4f1a\u4ee5\u53ef\u4fe1\u6570\u636e\u8eab\u4efd\u91cd\u65b0\u8fdb\u5165\u4e0a\u4e0b\u6587\uff08\u5b58\u50a8\u578bIPI\uff09", "AgentView\u5c06\u4e0d\u53ef\u4fe1\u6570\u636e\u66ff\u6362\u4e3a\u7b26\u53f7\uff0cHumanView\u4fdd\u7559\u539f\u59cb\u6570\u636e\u4f9b\u4eba\u7c7b\u548c\u5de5\u5177\u4f7f\u7528\uff0c\u4e24\u89c6\u56fe\u81ea\u52a8\u540c\u6b65\u5e76\u6309\u5de5\u5177\u8c03\u7528\u8def\u7531", "\u4ee5OpenClaw\u63d2\u4ef6\u5f62\u5f0f\u90e8\u7f72\uff0c\u4ec5\u9700\u5de5\u5177\u94a9\u5b50\uff0c\u65e0\u9700\u4fee\u6539\u667a\u80fd\u4f53\u5de5\u5177\u8c03\u7528\u903b\u8f91\uff1b\u5728IPI\u57fa\u51c6\u548cPinchBench\u4e0a\u62e6\u622a\u5168\u90e8\u653b\u51fb\uff0c\u5b9e\u7528\u6027\u63a5\u8fd1\u65e0\u9632\u62a4\u57fa\u7ebf"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u9632\u5fa1", "\u63d0\u793a\u6ce8\u5165", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.03821v1", "published_at": "2026-07-04", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "DualView: Preventing Indirect Prompt Injection in Personal AI Agents", "tldr": "DualView\u901a\u8fc7\u53cc\u89c6\u56fe\u673a\u5236\u9632\u5fa1\u4e2a\u4ebaAI\u667a\u80fd\u4f53\u4e2d\u7684\u95f4\u63a5\u63d0\u793a\u6ce8\u5165\u653b\u51fb\uff0c\u5305\u62ec\u5b58\u50a8\u578bIPI", "upvotes": 0, "what_it_is": "\u63d0\u51faDualView\u9632\u5fa1\u6846\u67b6\uff0c\u901a\u8fc7\u4e3a\u6587\u4ef6\u7cfb\u7edf\u3001\u7f51\u7edc\u3001Shell\u7b49\u6bcf\u4e2a\u901a\u9053\u5efa\u7acb\u300c\u667a\u80fd\u4f53\u89c6\u56fe\u300d\u548c\u300c\u4eba\u7c7b\u89c6\u56fe\u300d\u4e24\u5957\u89c6\u56fe\uff0c\u5c06\u4e0d\u53ef\u4fe1\u6570\u636e\u8ffd\u8e2a\u4ece\u667a\u80fd\u4f53\u4e0a\u4e0b\u6587\u6269\u5c55\u5230\u7528\u6237\u771f\u5b9e\u73af\u5883\uff0c\u4ece\u800c\u963b\u65ad\u5305\u62ec\u5b58\u50a8\u578b\u95f4\u63a5\u63d0\u793a\u6ce8\u5165\u5728\u5185\u7684\u6240\u6709IPI\u653b\u51fb\u3002", "why_notable": "\u9996\u6b21\u5c06IPI\u9632\u5fa1\u4ece\u667a\u80fd\u4f53\u4e0a\u4e0b\u6587\u6269\u5c55\u5230\u771f\u5b9e\u64cd\u4f5c\u73af\u5883\uff0c\u586b\u8865\u5b58\u50a8\u578bIPI\u9632\u5fa1\u7a7a\u767d\uff1b\u8bbe\u8ba1\u4e0a\u4e0e\u653b\u51fb\u6a21\u677f\u65e0\u5173\uff0c\u5177\u5907\u901a\u7528\u9632\u62a4\u80fd\u529b\uff0c\u4e14\u90e8\u7f72\u4fb5\u5165\u6027\u6781\u4f4e"}, {"abstract": "While decoders have rapidly scaled, encoders have remained largely unchanged since BERT. We revisit this disparity by frozen backbone evaluation via probing. Under this lens, the representations of BERT encoders become increasingly $\\textit{unexploitable}$ by frozen probes, despite improved perplexity. The misalignment originates in BERT\u0027s flat design, which couples representation learning to the token reconstruction loss. We propose $\\textbf{CrossBERT}$, a two-part architecture that separates the learning of high-quality encoded representations from the rigid grounding of token reconstruction. This design further enables high masking ratios ($\\ge 50\\%$) and gradient collection over all tokens via a $\\textit{Complementary Masking Strategy}$, respectively increasing throughput by $1.5$ to $2\\times$ and sample efficiency by $2\\times$. Overall, CrossBERT demonstrates monotonic scaling and superior performance on MTEB(eng, v2) and frozen GLUE benchmarks.", "arxiv_id": "2607.04011", "arxiv_url": "https://arxiv.org/abs/2607.04011", "authors": ["Megi Dervishi", "Mathurin Videau", "Yann LeCun"], "brief": "\u63d0\u51faCrossBERT\u4e24\u90e8\u5206\u67b6\u6784\uff0c\u5c06\u9ad8\u8d28\u91cf\u8868\u793a\u5b66\u4e60\u4e0etoken\u91cd\u5efa\u635f\u5931\u5206\u79bb\uff0c\u89e3\u51b3BERT\u7c7b\u7f16\u7801\u5668\u968f\u89c4\u6a21\u589e\u5927\u8868\u793a\u8d28\u91cf\u53cd\u800c\u4e0b\u964d\u7684\u95ee\u9898\uff0c\u5e76\u901a\u8fc7\u4e92\u8865\u63a9\u7801\u7b56\u7565\u63d0\u5347\u8bad\u7ec3\u6548\u7387\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04011", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u53d1\u73b0BERT\u6241\u5e73\u8bbe\u8ba1\u5bfc\u81f4\u8868\u793a\u4e0e\u91cd\u5efa\u8026\u5408\uff0c\u89c4\u6a21\u589e\u5927\u65f6\u51bb\u7ed3\u63a2\u9488\u7684\u53ef\u5229\u7528\u6027\u4e0b\u964d\uff08unexploitable\uff09", "\u4e92\u8865\u63a9\u7801\u7b56\u7565\u652f\u6301\u226550%\u9ad8\u63a9\u7801\u7387\uff0c\u541e\u5410\u91cf\u63d0\u53471.5-2\u00d7\uff0c\u6837\u672c\u6548\u7387\u63d0\u53472\u00d7", "\u5728MTEB(eng, v2)\u548c\u51bb\u7ed3GLUE\u57fa\u51c6\u4e0a\u5c55\u73b0\u5355\u8c03\u6269\u5c55\u89c4\u5f8b\uff0c\u4f18\u4e8e\u73b0\u6709\u7f16\u7801\u5668"], "keywords": ["\u6587\u672c\u7f16\u7801\u5668", "\u8868\u793a\u5b66\u4e60", "\u53ef\u6269\u5c55\u6027", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04011v1", "published_at": "2026-07-04", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Separating Representation from Reconstruction Enables Scalable Text Encoders", "tldr": "CrossBERT\u5c06\u8868\u793a\u5b66\u4e60\u4e0etoken\u91cd\u5efa\u89e3\u8026\uff0c\u5b9e\u73b0\u7f16\u7801\u5668\u5355\u8c03\u53ef\u6269\u5c55\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51faCrossBERT\u4e24\u90e8\u5206\u67b6\u6784\uff0c\u5c06\u9ad8\u8d28\u91cf\u8868\u793a\u5b66\u4e60\u4e0etoken\u91cd\u5efa\u635f\u5931\u5206\u79bb\uff0c\u89e3\u51b3BERT\u7c7b\u7f16\u7801\u5668\u968f\u89c4\u6a21\u589e\u5927\u8868\u793a\u8d28\u91cf\u53cd\u800c\u4e0b\u964d\u7684\u95ee\u9898\uff0c\u5e76\u901a\u8fc7\u4e92\u8865\u63a9\u7801\u7b56\u7565\u63d0\u5347\u8bad\u7ec3\u6548\u7387\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u7f16\u7801\u5668\u89c4\u6a21\u6269\u5c55\u5931\u6548\u7684\u6839\u672c\u539f\u56e0\uff0c\u5e76\u63d0\u51fa\u6709\u6548\u89e3\u51b3\u65b9\u6848\uff0c\u6709\u671b\u63a8\u52a8\u6587\u672c\u7f16\u7801\u5668\u8ffd\u4e0a\u89e3\u7801\u5668\u7684\u89c4\u6a21\u5316\u8fdb\u5c55\uff0c\u5bf9\u4e0b\u6e38\u5d4c\u5165/\u68c0\u7d22\u4efb\u52a1\u5f71\u54cd\u6df1\u8fdc\u3002"}, {"abstract": "This work establishes that trigger-word data poisoning of vision language action models is practical, while at the same time the open-source robotics ecosystem holds trust assumptions about community contributions. A few poisoned samples can silently embed a backdoor that disables a robot on command. We evaluate this threat against smolVLA on a real-world pick-and-place task, training on three poison ratios and evaluating across different prompts on the LeRobot platform. Three poisoned episodes in 320 clean episodes suffice for a complete denial of service. Success rate drops to 0.0 plus minus 0.0% across all trigger-word conditions and the robot locks into a fixed joint configuration rather than executing any task-relevant motion. Clean-prompt behaviour holds at approx. 50% success rate across all poison ratios, confirming the attack is stealthy under normal operation. A single poisoned episode already reduces success rate to 6.7 plus minus 6.7%. The robot still moves, but no longer completes the task. The attack generalises to front, middle, and end trigger placements despite training exclusively on front-placed triggers. These findings establish that the threat is practical, low-cost, and stealthy, and warrant treating dataset provenance as a first-class concern in open-source robotics ecosystems.", "arxiv_id": "2607.04146", "arxiv_url": "https://arxiv.org/abs/2607.04146", "authors": ["Stefan B\u00fchler", "Mark Schutera"], "brief": "\u672c\u6587\u8bc1\u660e\u4e86\u9488\u5bf9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\uff08VLA\uff09\u7684\u89e6\u53d1\u8bcd\u6570\u636e\u6295\u6bd2\u653b\u51fb\u5728\u771f\u5b9e\u673a\u5668\u4eba\u7cfb\u7edf\u4e2d\u5177\u6709\u5b9e\u9645\u53ef\u884c\u6027\uff0c\u653b\u51fb\u8005\u901a\u8fc7\u5728\u8bad\u7ec3\u6570\u636e\u4e2d\u6df7\u5165\u6781\u5c11\u91cf\u6bd2\u5316\u6837\u672c\uff0c\u690d\u5165\u540e\u95e8\u4f7f\u673a\u5668\u4eba\u5728\u7279\u5b9a\u89e6\u53d1\u8bcd\u4e0b\u5b8c\u5168\u505c\u6b62\u6267\u884c\u4efb\u52a1\u3002", "categories": ["cs.RO", "cs.AI", "cs.CL", "cs.CR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04146", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["320\u6761\u5e72\u51c0\u6837\u672c\u4e2d\u4ec5\u6df7\u51653\u6761\u6bd2\u5316\u6837\u672c\u5373\u53ef\u5b9e\u73b0\u5b8c\u5168\u62d2\u7edd\u670d\u52a1\uff0c\u89e6\u53d1\u6761\u4ef6\u4e0b\u6210\u529f\u7387\u964d\u81f30.0%", "\u653b\u51fb\u5177\u6709\u9ad8\u5ea6\u9690\u853d\u6027\uff1a\u6b63\u5e38\u63d0\u793a\u8bcd\u4e0b\u673a\u5668\u4eba\u6210\u529f\u7387\u7ef4\u6301\u7ea650%\uff0c\u4e0e\u672a\u6295\u6bd2\u6a21\u578b\u65e0\u5f02", "\u89e6\u53d1\u8bcd\u4f4d\u7f6e\u6cdb\u5316\u6027\u5f3a\uff1a\u4ec5\u5728\u53e5\u9996\u4f4d\u7f6e\u8bad\u7ec3\u7684\u540e\u95e8\u53ef\u6cdb\u5316\u81f3\u53e5\u4e2d\u3001\u53e5\u5c3e\u89e6\u53d1\uff0c\u653b\u51fb\u9c81\u68d2\u6027\u9ad8"], "keywords": ["\u673a\u5668\u4eba\u5b89\u5168", "\u6570\u636e\u6295\u6bd2", "\u540e\u95e8\u653b\u51fb", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04146v1", "published_at": "2026-07-05", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "!Imperio, smolVLA: The Implications of Data Poisoning on Open Source Robotics", "tldr": "\u4ec5\u97003\u6761\u6bd2\u5316\u6837\u672c\u5373\u53ef\u8ba9\u673a\u5668\u4eba\u5b8c\u5168\u62d2\u7edd\u670d\u52a1\uff0c\u5f00\u6e90\u673a\u5668\u4eba\u751f\u6001\u9762\u4e34\u6570\u636e\u6295\u6bd2\u5a01\u80c1", "upvotes": 0, "what_it_is": "\u672c\u6587\u8bc1\u660e\u4e86\u9488\u5bf9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\uff08VLA\uff09\u7684\u89e6\u53d1\u8bcd\u6570\u636e\u6295\u6bd2\u653b\u51fb\u5728\u771f\u5b9e\u673a\u5668\u4eba\u7cfb\u7edf\u4e2d\u5177\u6709\u5b9e\u9645\u53ef\u884c\u6027\uff0c\u653b\u51fb\u8005\u901a\u8fc7\u5728\u8bad\u7ec3\u6570\u636e\u4e2d\u6df7\u5165\u6781\u5c11\u91cf\u6bd2\u5316\u6837\u672c\uff0c\u690d\u5165\u540e\u95e8\u4f7f\u673a\u5668\u4eba\u5728\u7279\u5b9a\u89e6\u53d1\u8bcd\u4e0b\u5b8c\u5168\u505c\u6b62\u6267\u884c\u4efb\u52a1\u3002", "why_notable": "\u9996\u6b21\u5728\u771f\u5b9e\u673a\u5668\u4eba\u5e73\u53f0\uff08LeRobot/smolVLA\uff09\u4e0a\u91cf\u5316\u9a8c\u8bc1\u4e86\u6570\u636e\u6295\u6bd2\u5bf9VLA\u6a21\u578b\u7684\u5b9e\u9645\u5a01\u80c1\uff0c\u63ed\u793a\u5f00\u6e90\u673a\u5668\u4eba\u793e\u533a\u5bf9\u793e\u533a\u8d21\u732e\u6570\u636e\u7684\u4fe1\u4efb\u5047\u8bbe\u5b58\u5728\u4e25\u91cd\u5b89\u5168\u9690\u60a3\uff0c\u547c\u5401\u5c06\u6570\u636e\u6eaf\u6e90\u4f5c\u4e3a\u5f00\u6e90\u673a\u5668\u4eba\u751f\u6001\u7684\u6838\u5fc3\u5b89\u5168\u5173\u5207\u3002"}, {"abstract": "End-to-end Vision-Language Models (VLMs) show immense potential in autonomous driving. However, standard Supervised Fine-Tuning (SFT) often suffers from reasoning hallucinations and conservative biases. While traditional tool-augmented frameworks and Chain-of-Thought (CoT) approaches mitigate these issues, they incur exorbitant token consumption and unacceptable latency, rendering real-time deployment impractical. To resolve this reliability-efficiency trade-off, we propose CritiqueDriveVLM, a novel unified three-stage framework internalizing reasoning directly into the VLM. First, we introduce Critique-Driven Multi-Turn Reinforcement Learning (RL) guided by a multi-dimensional verifier. By providing granular scalar feedback and a multi-turn penalty, we force the policy to internalize logical deduction, cultivating a robust System-2 Teacher that achieves high accuracy without fragile external tools. Subsequently, we propose Latent Thought Distillation to overcome the latency bottleneck. By aligning the Student\u0027s latent representations with the Teacher\u0027s fully converged reasoning states, we compress deep logical capabilities into a fast, CoT-free System-1 Student. Extensive experiments on the widely-used DriveLMM-01 benchmark demonstrate remarkable improvements. Compared to the base model, our tool-free Teacher significantly boosts Multiple Choice Quality (MCQ) from 55.54% to a state-of-the-art 76.54%. Crucially, our distilled Student preserves competitive reasoning depth while drastically minimizing generation length to an average of merely 28 tokens. This slashes inference latency by 88% (from 3482 ms to 416 ms), paving a highly robust pathway for low-latency autonomous driving.Our source code is available at https://github.com/MICLAB-BUPT/CritiqueDriveVLM.", "arxiv_id": "2607.04179", "arxiv_url": "https://arxiv.org/abs/2607.04179", "authors": ["Zhaohong Liu", "Hao Ye", "Xianlin Zhang", "Mengshi Qi"], "brief": "\u63d0\u51faCritiqueDriveVLM\uff0c\u4e00\u4e2a\u4e09\u9636\u6bb5\u7edf\u4e00\u6846\u67b6\uff1a\u5148\u7528\u591a\u7ef4\u9a8c\u8bc1\u5668\u5f15\u5bfc\u7684\u591a\u8f6e\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3System-2\u6559\u5e08\u6a21\u578b\uff0c\u518d\u901a\u8fc7\u6f5c\u5728\u601d\u7ef4\u84b8\u998f\u5c06\u63a8\u7406\u80fd\u529b\u538b\u7f29\u5230\u65e0\u9700CoT\u7684System-1\u5b66\u751f\u6a21\u578b\uff0c\u89e3\u51b3\u81ea\u52a8\u9a7e\u9a76VLM\u63a8\u7406\u53ef\u9760\u6027\u4e0e\u6548\u7387\u7684\u77db\u76fe\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04179", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["Critique-Driven\u591a\u8f6eRL\uff1a\u591a\u7ef4\u9a8c\u8bc1\u5668\u63d0\u4f9b\u7ec6\u7c92\u5ea6\u6807\u91cf\u53cd\u9988\uff0c\u6559\u5e08\u6a21\u578bMCQ\u51c6\u786e\u7387\u4ece55.54%\u63d0\u5347\u81f376.54%\uff08SOTA\uff09", "\u6f5c\u5728\u601d\u7ef4\u84b8\u998f\uff1a\u5bf9\u9f50\u5b66\u751f\u4e0e\u6559\u5e08\u7684\u6f5c\u5728\u8868\u5f81\u800c\u975e\u663e\u5f0fCoT\u8f93\u51fa\uff0c\u5b66\u751f\u6a21\u578b\u5e73\u5747\u4ec5\u751f\u621028\u4e2atoken", "\u63a8\u7406\u5ef6\u8fdf\u964d\u4f4e88%\uff08\u4ece3482ms\u964d\u81f3416ms\uff09\uff0c\u5728DriveLMM-01\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u6548\u679c"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04179v1", "published_at": "2026-07-05", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "CritiqueDriveVLM: From Verifier-Guided Reinforcement Learning to Latent Thought Distillation for Autonomous Driving", "tldr": "\u4e09\u9636\u6bb5\u6846\u67b6\u5c06\u63a8\u7406\u80fd\u529b\u5185\u5316\u5230VLM\uff0c\u5b9e\u73b0\u81ea\u52a8\u9a7e\u9a76\u9ad8\u7cbe\u5ea6\u4f4e\u5ef6\u8fdf\u63a8\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51faCritiqueDriveVLM\uff0c\u4e00\u4e2a\u4e09\u9636\u6bb5\u7edf\u4e00\u6846\u67b6\uff1a\u5148\u7528\u591a\u7ef4\u9a8c\u8bc1\u5668\u5f15\u5bfc\u7684\u591a\u8f6e\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3System-2\u6559\u5e08\u6a21\u578b\uff0c\u518d\u901a\u8fc7\u6f5c\u5728\u601d\u7ef4\u84b8\u998f\u5c06\u63a8\u7406\u80fd\u529b\u538b\u7f29\u5230\u65e0\u9700CoT\u7684System-1\u5b66\u751f\u6a21\u578b\uff0c\u89e3\u51b3\u81ea\u52a8\u9a7e\u9a76VLM\u63a8\u7406\u53ef\u9760\u6027\u4e0e\u6548\u7387\u7684\u77db\u76fe\u3002", "why_notable": "\u9996\u6b21\u5c06System-2\u6df1\u5ea6\u63a8\u7406\u80fd\u529b\u901a\u8fc7\u6f5c\u5728\u7a7a\u95f4\u84b8\u998f\u538b\u7f29\u4e3aSystem-1\u5feb\u901f\u63a8\u7406\uff0c\u5728\u4fdd\u6301\u63a8\u7406\u8d28\u91cf\u7684\u540c\u65f6\u5b9e\u73b0\u8fd1\u5b9e\u65f6\u90e8\u7f72\uff0c\u4e3a\u81ea\u52a8\u9a7e\u9a76VLM\u843d\u5730\u63d0\u4f9b\u53ef\u884c\u8def\u5f84\u3002"}, {"abstract": "World-action (WA) models can generate long-horizon action chunks for general-purpose robotic manipulation, but they remain vulnerable to calibration, perception, and contact-dynamics errors in real-world precision tasks, often failing in the final few millimeters of alignment or insertion. We propose HALO-WA, a hybrid-attention latent-guided online reinforcement learning (RL) framework for WA models, which leverages latent features and action priors from the WA generation process through a lightweight actor-critic adapter to enable fast online adaptation to real deployment errors. HALO-WA introduces a hybrid-attention structure that preserves the temporal consistency of action chunks while reading task-relevant information from WA latents conditioned on visual context and end-stage correction requirements, thereby producing refined action chunks. We validate HALO-WA on four real-world precision manipulation tasks, where it improves the average success rate from 26.4\\% for WA-base to 87.1\\%, outperforming the strongest baseline by 19.2 percentage points while requiring only 45--75 minutes of online training per task. To facilitate reproducibility, we further conduct supplementary simulation experiments in RoboTwin and release the code at https://github.com/YeanRoot/HALO-WA.", "arxiv_id": "2607.04265", "arxiv_url": "https://arxiv.org/abs/2607.04265", "authors": ["Angen Ye", "Weijie Ke", "Xiaofeng Wang", "Xinze Chen", "Chaojun Ni", "Guosheng Zhao", "Boyuan Wang", "Zheng Zhu", "Junjie Xie", "Dapeng Zhang"], "brief": "\u63d0\u51faHALO-WA\u6846\u67b6\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7actor-critic\u9002\u914d\u5668\u5229\u7528\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\u7684\u6f5c\u53d8\u91cf\u7279\u5f81\u548c\u52a8\u4f5c\u5148\u9a8c\uff0c\u7ed3\u5408\u6df7\u5408\u6ce8\u610f\u529b\u7ed3\u6784\uff0c\u5b9e\u73b0\u5bf9\u771f\u5b9e\u90e8\u7f72\u8bef\u5dee\u7684\u5feb\u901f\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u9002\u5e94\uff0c\u89e3\u51b3\u673a\u5668\u4eba\u7cbe\u5bc6\u64cd\u4f5c\u6700\u540e\u51e0\u6beb\u7c73\u5bf9\u9f50/\u63d2\u5165\u5931\u8d25\u95ee\u9898\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04265", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6df7\u5408\u6ce8\u610f\u529b\u7ed3\u6784\u5728\u4fdd\u6301\u52a8\u4f5c\u5757\u65f6\u5e8f\u4e00\u81f4\u6027\u7684\u540c\u65f6\uff0c\u4ece\u89c6\u89c9\u4e0a\u4e0b\u6587\u6761\u4ef6\u5316\u7684WA\u6f5c\u53d8\u91cf\u4e2d\u8bfb\u53d6\u4efb\u52a1\u76f8\u5173\u4fe1\u606f", "\u57284\u4e2a\u771f\u5b9e\u7cbe\u5bc6\u64cd\u4f5c\u4efb\u52a1\u4e0a\uff0c\u5e73\u5747\u6210\u529f\u7387\u4ece\u57fa\u7ebf26.4%\u63d0\u5347\u81f387.1%\uff0c\u8d85\u8d8a\u6700\u5f3a\u57fa\u7ebf19.2\u4e2a\u767e\u5206\u70b9", "\u6bcf\u4e2a\u4efb\u52a1\u4ec5\u970045-75\u5206\u949f\u5728\u7ebf\u8bad\u7ec3\uff0c\u5177\u5907\u9ad8\u6548\u5b9e\u7528\u6027\uff0c\u5e76\u5728RoboTwin\u4eff\u771f\u4e2d\u9a8c\u8bc1\u53ef\u590d\u73b0\u6027"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u673a\u5668\u4eba\u64cd\u4f5c", "\u4e16\u754c\u6a21\u578b", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.04265v1", "published_at": "2026-07-05", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "HALO-WA: Hybrid-Attention Latent-Guided Online Reinforcement Learning for World-Action Models", "tldr": "HALO-WA\u901a\u8fc7\u6df7\u5408\u6ce8\u610f\u529b\u6f5
