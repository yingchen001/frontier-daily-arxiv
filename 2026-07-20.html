u6a21\u7cca\u7b49\u5377\u79ef\u6270\u52a8\uff0c\u63d0\u51fa\u4e00\u79cd\u8ba4\u8bc1\u8bad\u7ec3\u65b9\u6cd5\uff0c\u901a\u8fc7\u9ad8\u6548\u7f16\u7801\u5377\u79ef\u6270\u52a8\u6765\u8bad\u7ec3\u53ef\u8bc1\u660e\u9c81\u68d2\u7684\u89c6\u89c9\u6a21\u578b\u3002\u5728CIFAR10\u4e0a\u5bf9\u5408\u7406\u5f3a\u5ea6\u7684\u8fd0\u52a8\u6a21\u7cca\u5b9e\u73b0\u8d85\u8fc780%\u7684\u9c81\u68d2\u51c6\u786e\u7387\uff0c\u663e\u8457\u4f18\u4e8e\u5bf9\u6297\u8bad\u7ec3\uff0c\u540c\u65f6\u4fdd\u6301\u6807\u51c6\u7cbe\u5ea6\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18195", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8ba4\u8bc1\u9c81\u68d2\u6027", "\u5377\u79ef\u6270\u52a8", "\u5bf9\u6297\u8bad\u7ec3", "\u8ba1\u7b97\u673a\u89c6\u89c9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18195v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Certified Training for Convolutional Perturbations", "tldr": "\u9488\u5bf9\u8fd0\u52a8\u6a21\u7cca\u7b49\u5377\u79ef\u6270\u52a8\uff0c\u63d0\u51fa\u4e00\u79cd\u8ba4\u8bc1\u8bad\u7ec3\u65b9\u6cd5\uff0c\u901a\u8fc7\u9ad8\u6548\u7f16\u7801\u5377\u79ef\u6270\u52a8\u6765\u8bad\u7ec3\u53ef\u8bc1\u660e\u9c81\u68d2\u7684\u89c6\u89c9\u6a21\u578b\u3002\u5728CIFAR10\u4e0a\u5bf9\u5408\u7406\u5f3a\u5ea6\u7684\u8fd0\u52a8\u6a21\u7cca\u5b9e\u73b0\u8d85\u8fc780%\u7684\u9c81\u68d2\u51c6\u786e\u7387\uff0c\u663e\u8457\u4f18\u4e8e\u5bf9\u6297\u8bad\u7ec3\uff0c\u540c\u65f6\u4fdd\u6301\u6807\u51c6\u7cbe\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Dynamic object segmentation plays a critical role in many visual applications such as static scene reconstruction from dynamic videos. However, existing optical flow-based methods fail to ensure consistent static/dynamic segmentation along object boundaries, while 3D reconstruction-based approaches are highly sensitive to reconstruction errors. To address these limitations, we present a dynamic object segmentation framework that can generate both precise and complete dynamic masks by integrating multimodal cues including 2D point tracks, 3D reconstruction, and semantic information. We design a network combining Transformer architectures with feature clustering aggregation modules to perform static/dynamic classification of multimodal feature trajectories. It enables the model to adaptively determine which type of feature should dominate based on the characteristics of each scene, while also mitigating the impact of feature degradation. Additionally, we introduce a novel point-query-based SAM post-processing method capable of handling multiple objects within a single mask. Extensive experiments demonstrate that our approach achieves state-of-the-art performance in both dynamic object segmentation and static scene reconstruction tasks.", "arxiv_id": "2607.18153", "arxiv_url": "https://arxiv.org/abs/2607.18153", "authors": ["Zhe Xin", "Hanzhi Chang", "Penghui Huang", "Yinian Mao", "Guoquan Huang"], "brief": "\u63d0\u51fa\u4e00\u79cd\u591a\u6a21\u6001\u52a8\u6001\u76ee\u6807\u5206\u5272\u6846\u67b6\uff0c\u878d\u54082D\u70b9\u8f68\u8ff9\u30013D\u91cd\u5efa\u548c\u8bed\u4e49\u4fe1\u606f\uff0c\u901a\u8fc7Transformer\u4e0e\u7279\u5f81\u805a\u7c7b\u6a21\u5757\u81ea\u9002\u5e94\u5224\u65ad\u9759\u6001/\u52a8\u6001\u533a\u57df\uff0c\u5e76\u5f15\u5165\u57fa\u4e8e\u70b9\u67e5\u8be2\u7684SAM\u540e\u5904\u7406\u65b9\u6cd5\u3002\u5728\u52a8\u6001\u76ee\u6807\u5206\u5272\u548c\u9759\u6001\u573a\u666f\u91cd\u5efa\u4efb\u52a1\u4e0a\u5747\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18153", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u52a8\u6001\u76ee\u6807\u5206\u5272", "\u591a\u6a21\u6001\u878d\u5408", "\u573a\u666f\u91cd\u5efa", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18153v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Robust Multimodal Dynamic Object Segmentation", "tldr": "\u63d0\u51fa\u4e00\u79cd\u591a\u6a21\u6001\u52a8\u6001\u76ee\u6807\u5206\u5272\u6846\u67b6\uff0c\u878d\u54082D\u70b9\u8f68\u8ff9\u30013D\u91cd\u5efa\u548c\u8bed\u4e49\u4fe1\u606f\uff0c\u901a\u8fc7Transformer\u4e0e\u7279\u5f81\u805a\u7c7b\u6a21\u5757\u81ea\u9002\u5e94\u5224\u65ad\u9759\u6001/\u52a8\u6001\u533a\u57df\uff0c\u5e76\u5f15\u5165\u57fa\u4e8e\u70b9\u67e5\u8be2\u7684SAM\u540e\u5904\u7406\u65b9\u6cd5\u3002\u5728\u52a8\u6001\u76ee\u6807\u5206\u5272\u548c\u9759\u6001\u573a\u666f\u91cd\u5efa\u4efb\u52a1\u4e0a\u5747\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present a novel Generalized Scene Reconstruction (GSR) approach called Plenoptic Condensation (PCon). PCon uses a multi-stage reconstruction pipeline, initially converting images into \"soupy\" scene elements with low (representational) power, then adaptively condensing the \"soup\" into \"structured\" elements of higher power capable of efficiently representing, for example, sharp edges and smooth reflective surfaces. PCon scene models called Reality Models (Relms) enable spatially varying representational power, which is essential for high-fidelity rendering, measurement, and scene understanding. We showcase several in-the-wild PCon reconstructions captured with consumer phone cameras and drones. In one case called \"Damaged Fiat\", PCon is benchmarked against two state-of-the-art (SOTA) GSR methods: NeRO and RT-Splatting. Referring to Figure 1 below, PCon reconstructs the car hood more than twice as accurately as the SOTA methods. But more importantly, the local damage profile error for PCon is 35 um (0.035 mm), whereas the two other SOTA methods are essentially unable to measure the damage at all. Our project website is available at https://quidient.github.io/pcon-2026.html.", "arxiv_id": "2607.18151", "arxiv_url": "https://arxiv.org/abs/2607.18151", "authors": ["Brevin Tilmon", "Alex DeJournett", "John Leffingwell", "Scott Ackerson"], "brief": "\u63d0\u51fa\u5168\u5149\u51dd\u805a\uff08PCon\uff09\u65b9\u6cd5\u7528\u4e8e\u5e7f\u4e49\u573a\u666f\u91cd\u5efa\uff0c\u901a\u8fc7\u591a\u9636\u6bb5\u6d41\u6c34\u7ebf\u5c06\u56fe\u50cf\u5148\u8f6c\u5316\u4e3a\u4f4e\u8868\u8fbe\u529b\u7684\"\u6c64\u72b6\"\u5143\u7d20\uff0c\u518d\u81ea\u9002\u5e94\u51dd\u805a\u4e3a\u9ad8\u8868\u8fbe\u529b\u7684\u7ed3\u6784\u5316\u5143\u7d20\u3002\u5728\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0cPCon\u91cd\u5efa\u7cbe\u5ea6\u8d85\u8fc7NeRO\u548cRT-Splatting\u7b49\u6700\u5148\u8fdb\u65b9\u6cd5\u4e24\u500d\u4ee5\u4e0a\uff0c\u5c40\u90e8\u635f\u4f24\u6d4b\u91cf\u8bef\u5dee\u4ec535\u5fae\u7c73\uff0c\u800c\u5bf9\u6bd4\u65b9\u6cd5\u51e0\u4e4e\u65e0\u6cd5\u5b8c\u6210\u8be5\u6d4b\u91cf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18151", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e09\u7ef4\u573a\u666f\u91cd\u5efa", "\u795e\u7ecf\u6e32\u67d3", "\u9ad8\u4fdd\u771f\u91cd\u5efa", "\u591a\u9636\u6bb5\u6d41\u6c34\u7ebf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18151v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Plenoptic Condensation: A Novel Approach to Generalized Scene Reconstruction", "tldr": "\u63d0\u51fa\u5168\u5149\u51dd\u805a\uff08PCon\uff09\u65b9\u6cd5\u7528\u4e8e\u5e7f\u4e49\u573a\u666f\u91cd\u5efa\uff0c\u901a\u8fc7\u591a\u9636\u6bb5\u6d41\u6c34\u7ebf\u5c06\u56fe\u50cf\u5148\u8f6c\u5316\u4e3a\u4f4e\u8868\u8fbe\u529b\u7684\"\u6c64\u72b6\"\u5143\u7d20\uff0c\u518d\u81ea\u9002\u5e94\u51dd\u805a\u4e3a\u9ad8\u8868\u8fbe\u529b\u7684\u7ed3\u6784\u5316\u5143\u7d20\u3002\u5728\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0cPCon\u91cd\u5efa\u7cbe\u5ea6\u8d85\u8fc7NeRO\u548cRT-Splatting\u7b49\u6700\u5148\u8fdb\u65b9\u6cd5\u4e24\u500d\u4ee5\u4e0a\uff0c\u5c40\u90e8\u635f\u4f24\u6d4b\u91cf\u8bef\u5dee\u4ec535\u5fae\u7c73\uff0c\u800c\u5bf9\u6bd4\u65b9\u6cd5\u51e0\u4e4e\u65e0\u6cd5\u5b8c\u6210\u8be5\u6d4b\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Implicit neural representation (INR) methods provide continuous coordinate-to-value mappings and integrate naturally with direct volume rendering, making them attractive for representing volumetric data. However, existing INR-based approaches for volumetric data are inherently lossy, and even small reconstruction errors can propagate through rendering and downstream analysis. In this work, we explore Lossless-INR, a lossless INR framework for 3D scientific volumetric data based on bit-plane decomposition. By decomposing each voxel value into binary bit-planes, we reformulate reconstruction as per-bit binary classification, so that exact recovery reduces to predicting every bit correctly. To make this optimization tractable while keeping the representation compact, we combine an octree block-partitioning strategy that adaptively subdivides complex regions with a ternary feature-grid network whose grid entries are parameterized by a ternary set of values. Experiments on diverse volumetric datasets show that this design can achieve zero bit-error rate and bit-exact reconstruction, enabling faithful rendering and downstream analysis with a compact representation. The code is available at https://github.com/TouKaienn/Lossless-INR.", "arxiv_id": "2607.18150", "arxiv_url": "https://arxiv.org/abs/2607.18150", "authors": ["Kaiyuan Tang", "Daniel Burke", "Chaoli Wang"], "brief": "\u63d0\u51faLossless-INR\u6846\u67b6\uff0c\u901a\u8fc7\u4f4d\u5e73\u9762\u5206\u89e3\u5c06\u4f53\u7d20\u91cd\u5efa\u8f6c\u5316\u4e3a\u9010\u4f4d\u4e8c\u5206\u7c7b\u95ee\u9898\uff0c\u5b9e\u73b0\u4e09\u7ef4\u79d1\u5b66\u4f53\u6570\u636e\u7684\u65e0\u635f\u9690\u5f0f\u795e\u7ecf\u8868\u793a\u3002\u7ed3\u5408\u516b\u53c9\u6811\u5757\u5212\u5206\u4e0e\u4e09\u503c\u7279\u5f81\u7f51\u683c\uff0c\u5728\u591a\u79cd\u4f53\u6570\u636e\u96c6\u4e0a\u8fbe\u5230\u96f6\u6bd4\u7279\u9519\u8bef\u7387\u548c\u7cbe\u786e\u91cd\u5efa\u3002", "categories": ["cs.CV", "cs.GR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18150", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9690\u5f0f\u795e\u7ecf\u8868\u793a", "\u4f53\u6570\u636e", "\u65e0\u635f\u538b\u7f29", "\u4e09\u7ef4\u91cd\u5efa"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18150v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Lossless-INR: Lossless Volumetric Implicit Neural Representations", "tldr": "\u63d0\u51faLossless-INR\u6846\u67b6\uff0c\u901a\u8fc7\u4f4d\u5e73\u9762\u5206\u89e3\u5c06\u4f53\u7d20\u91cd\u5efa\u8f6c\u5316\u4e3a\u9010\u4f4d\u4e8c\u5206\u7c7b\u95ee\u9898\uff0c\u5b9e\u73b0\u4e09\u7ef4\u79d1\u5b66\u4f53\u6570\u636e\u7684\u65e0\u635f\u9690\u5f0f\u795e\u7ecf\u8868\u793a\u3002\u7ed3\u5408\u516b\u53c9\u6811\u5757\u5212\u5206\u4e0e\u4e09\u503c\u7279\u5f81\u7f51\u683c\uff0c\u5728\u591a\u79cd\u4f53\u6570\u636e\u96c6\u4e0a\u8fbe\u5230\u96f6\u6bd4\u7279\u9519\u8bef\u7387\u548c\u7cbe\u786e\u91cd\u5efa\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Panoptic segmentation in complex scenes remains challenging because of occlusions, yet modern approaches often neglect occlusion modelling. In this paper, we propose \\textbf{P}osition \\textbf{E}mbedding \\textbf{M}odulation with \\textbf{O}cclusion-\\textbf{L}evel \\textbf{A}ttention (PEMOLA), a novel occlusion-aware module that can be seamlessly integrated into transformer-based panoptic segmentation. To obtain occlusion cues, we train an occlusion classifier on the COCO-OLAC dataset. The classifier derives the occlusion-level attention, which serves as spatial guidance, while the occlusion labels are encoded into a learnable embedding to produce channel-wise weights. Through joint modulation, PEMOLA elegantly introduces the occlusion priors into the position embedding, thereby improving the occlusion modelling. We further annotate the Cityscapes dataset with occlusion levels, termed Cityscapes Occlusion Labels for All Computer Vision Tasks (Cityscapes-OLAC), following the same labelling protocol as COCO-OLAC, to evaluate the cross-dataset generalisation ability of PEMOLA. Extensive experiments on COCO-OLAC and Cityscapes-OLAC demonstrate that PEMOLA consistently improves panoptic segmentation quality while introducing minimal computational overhead. These results highlight the importance of occlusion modelling, where incorporating occlusion-level attention helps deliver robust panoptic segmentation under occlusion. Code and dataset are available at https://github.com/wenbo-wei/PEMOLA.", "arxiv_id": "2607.18112", "arxiv_url": "https://arxiv.org/abs/2607.18112", "authors": ["Wenbo Wei", "Jun Wang", "Shan Raza", "Abhir Bhalerao"], "brief": "\u63d0\u51faPEMOLA\u6a21\u5757\uff0c\u901a\u8fc7\u8054\u5408\u4f4d\u7f6e\u5d4c\u5165\u8c03\u5236\u4e0e\u906e\u6321\u7ea7\u522b\u6ce8\u610f\u529b\u673a\u5236\uff0c\u5c06\u906e\u6321\u5148\u9a8c\u4fe1\u606f\u878d\u5165\u57fa\u4e8eTransformer\u7684\u5168\u666f\u5206\u5272\u6846\u67b6\u3002\u5728COCO-OLAC\u548c\u65b0\u6807\u6ce8\u7684Cityscapes-OLAC\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\uff0c\u4ee5\u6781\u5c0f\u8ba1\u7b97\u5f00\u9500\u6301\u7eed\u63d0\u5347\u906e\u6321\u573a\u666f\u4e0b\u7684\u5168\u666f\u5206\u5272\u8d28\u91cf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18112", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5168\u666f\u5206\u5272", "\u906e\u6321\u5efa\u6a21", "\u6ce8\u610f\u529b\u673a\u5236", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18112v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Occlusion-Aware Panoptic Segmentation with Joint Position Embedding and Occlusion-Level Attention", "tldr": "\u63d0\u51faPEMOLA\u6a21\u5757\uff0c\u901a\u8fc7\u8054\u5408\u4f4d\u7f6e\u5d4c\u5165\u8c03\u5236\u4e0e\u906e\u6321\u7ea7\u522b\u6ce8\u610f\u529b\u673a\u5236\uff0c\u5c06\u906e\u6321\u5148\u9a8c\u4fe1\u606f\u878d\u5165\u57fa\u4e8eTransformer\u7684\u5168\u666f\u5206\u5272\u6846\u67b6\u3002\u5728COCO-OLAC\u548c\u65b0\u6807\u6ce8\u7684Cityscapes-OLAC\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\uff0c\u4ee5\u6781\u5c0f\u8ba1\u7b97\u5f00\u9500\u6301\u7eed\u63d0\u5347\u906e\u6321\u573a\u666f\u4e0b\u7684\u5168\u666f\u5206\u5272\u8d28\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Understanding human emotions in spoken conversations is a key challenge in affective computing, with applications in empathetic AI, human computer interaction, and mental health monitoring. However, existing datasets vary in scale, emotion distribution, modality alignment, and data partitioning strategies, which can influence reliable cross-dataset generalization and minority-emotion modeling. We introduce SpEmoC a Speaking segment Emotion for Conversations comprising 306,544 raw clips from 3,100 English language movies and TV series. From these, 30,000 high quality, class balanced clips are curated, featuring synchronized visual, audio, and textual modalities annotated for seven emotions through a hybrid pipeline that integrates pretrained models with human validation. SpEmoC uses strict movie- and series-level splits to prevent content overlap between split sets, allowing more reliable evaluation of model generalization. The dataset also maintains a near-balanced distribution across seven emotions, including minority classes such as Fear and Disgust, which supports more balanced learning across categories. Extensive experiments, including in-domain benchmarking, cross-dataset transfer, low-data training, class-imbalance analysis, and modality transfer show that balanced data and careful splitting lead to more stable performance across emotions when models are evaluated on other datasets. These results highlight the importance of dataset design for robust and transferable multimodal emotion recognition.", "arxiv_id": "2607.18109", "arxiv_url": "https://arxiv.org/abs/2607.18109", "authors": ["Sania Bano", "Shahzad Ahmad", "Santosh Kumar Vipparthi", "Sukalpa Chanda", "Subrahmanyam Murala"], "brief": "\u63d0\u51faSpEmoC\u591a\u6a21\u6001\u60c5\u611f\u6570\u636e\u96c6\uff0c\u5305\u542b\u6765\u81ea3100\u90e8\u82f1\u8bed\u7535\u5f71\u548c\u7535\u89c6\u5267\u768430000\u4e2a\u9ad8\u8d28\u91cf\u7247\u6bb5\uff0c\u6db5\u76d6\u89c6\u89c9\u3001\u97f3\u9891\u548c\u6587\u672c\u4e09\u79cd\u6a21\u6001\uff0c\u6807\u6ce8\u4e03\u7c7b\u60c5\u611f\u4e14\u7c7b\u522b\u5747\u8861\u3002\u901a\u8fc7\u4e25\u683c\u7684\u7535\u5f71\u7ea7\u6570\u636e\u5212\u5206\u9632\u6b62\u5185\u5bb9\u6cc4\u9732\uff0c\u5b9e\u9a8c\u8868\u660e\u5747\u8861\u6570\u636e\u548c\u5408\u7406\u5212\u5206\u7b56\u7565\u80fd\u663e\u8457\u63d0\u5347\u6a21\u578b\u8de8\u6570\u636e\u96c6\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18109", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u60c5\u611f\u8bc6\u522b", "\u6570\u636e\u96c6", "\u60c5\u611f\u8ba1\u7b97"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18109v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SpEmoC: A Balanced Speaker-Segment Multimodal Emotion Benchmark", "tldr": "\u63d0\u51faSpEmoC\u591a\u6a21\u6001\u60c5\u611f\u6570\u636e\u96c6\uff0c\u5305\u542b\u6765\u81ea3100\u90e8\u82f1\u8bed\u7535\u5f71\u548c\u7535\u89c6\u5267\u768430000\u4e2a\u9ad8\u8d28\u91cf\u7247\u6bb5\uff0c\u6db5\u76d6\u89c6\u89c9\u3001\u97f3\u9891\u548c\u6587\u672c\u4e09\u79cd\u6a21\u6001\uff0c\u6807\u6ce8\u4e03\u7c7b\u60c5\u611f\u4e14\u7c7b\u522b\u5747\u8861\u3002\u901a\u8fc7\u4e25\u683c\u7684\u7535\u5f71\u7ea7\u6570\u636e\u5212\u5206\u9632\u6b62\u5185\u5bb9\u6cc4\u9732\uff0c\u5b9e\u9a8c\u8868\u660e\u5747\u8861\u6570\u636e\u548c\u5408\u7406\u5212\u5206\u7b56\u7565\u80fd\u663e\u8457\u63d0\u5347\u6a21\u578b\u8de8\u6570\u636e\u96c6\u6cdb\u5316\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "On-device model adaptation is essential to enable lifelong personalization on resource-constrained hardware, but compute, power, and memory limitations of such devices make end-to-end backpropagation impractical for modern deep neural networks. This work proposes a heterogeneous adaptation pipeline that repurposes a commercial edge AI inference accelerator, Hailo-8L, for frozen-backbone feature extraction during on-device training. The computational graph is partitioned so that the pre-trained backbone is quantized to INT8 and run on the accelerator, while only a lightweight FP32 classification head is fine-tuned on the host CPU, enabling frequent, energy-efficient in-field updates with most weights remaining fixed. Across multiple architectures and datasets, this pipeline achieves up to 15.4x faster wall-clock training time compared to a Raspberry Pi 5 CPU baseline, offers competitive throughput in favorable settings, and consistently reduces energy per sample. Post-training quantization restoration is shown to be crucial for preserving the quality of accelerator-generated features and mitigating accuracy loss in quantization-sensitive architectures. Overall, the results demonstrate a practical approach to efficient on-device adaptation using inference-oriented edge accelerators. The implementation is available at https://github.com/MatPiech/accelerator-training.", "arxiv_id": "2607.18101", "arxiv_url": "https://arxiv.org/abs/2607.18101", "authors": ["Mateusz Piechocki", "Alessandro Capotondi", "Marek Kraft"], "brief": "\u63d0\u51fa\u4e00\u79cd\u5f02\u6784\u9002\u914d\u6d41\u6c34\u7ebf\uff0c\u5c06\u5546\u7528\u8fb9\u7f18AI\u63a8\u7406\u52a0\u901f\u5668\uff08Hailo-8L\uff09\u7528\u4e8e\u8bbe\u5907\u7aef\u6a21\u578b\u8bad\u7ec3\uff1a\u9884\u8bad\u7ec3\u9aa8\u5e72\u7f51\u7edc\u4ee5INT8\u91cf\u5316\u8fd0\u884c\u5728\u52a0\u901f\u5668\u4e0a\uff0c\u4ec5\u5728CPU\u4e0a\u5fae\u8c03\u8f7b\u91cf\u5206\u7c7b\u5934\u3002\u76f8\u6bd4\u6811\u8393\u6d3e5\u57fa\u7ebf\uff0c\u8bad\u7ec3\u901f\u5ea6\u6700\u9ad8\u63d0\u534715.4\u500d\uff0c\u540c\u65f6\u663e\u8457\u964d\u4f4e\u6bcf\u6837\u672c\u80fd\u8017\uff0c\u5b9e\u73b0\u9ad8\u6548\u7684\u8bbe\u5907\u7aef\u6301\u7eed\u4e2a\u6027\u5316\u5b66\u4e60\u3002", "categories": ["cs.LG", "cs.AR", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18101", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8fb9\u7f18AI", "\u8bbe\u5907\u7aef\u8bad\u7ec3", "\u6a21\u578b\u91cf\u5316", "\u8fc1\u79fb\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18101v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Empowering On-Device Model Adaptation with an Edge AI Inference Accelerator", "tldr": "\u63d0\u51fa\u4e00\u79cd\u5f02\u6784\u9002\u914d\u6d41\u6c34\u7ebf\uff0c\u5c06\u5546\u7528\u8fb9\u7f18AI\u63a8\u7406\u52a0\u901f\u5668\uff08Hailo-8L\uff09\u7528\u4e8e\u8bbe\u5907\u7aef\u6a21\u578b\u8bad\u7ec3\uff1a\u9884\u8bad\u7ec3\u9aa8\u5e72\u7f51\u7edc\u4ee5INT8\u91cf\u5316\u8fd0\u884c\u5728\u52a0\u901f\u5668\u4e0a\uff0c\u4ec5\u5728CPU\u4e0a\u5fae\u8c03\u8f7b\u91cf\u5206\u7c7b\u5934\u3002\u76f8\u6bd4\u6811\u8393\u6d3e5\u57fa\u7ebf\uff0c\u8bad\u7ec3\u901f\u5ea6\u6700\u9ad8\u63d0\u534715.4\u500d\uff0c\u540c\u65f6\u663e\u8457\u964d\u4f4e\u6bcf\u6837\u672c\u80fd\u8017\uff0c\u5b9e\u73b0\u9ad8\u6548\u7684\u8bbe\u5907\u7aef\u6301\u7eed\u4e2a\u6027\u5316\u5b66\u4e60\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Structural fidelity is essential to scientific methodology diagrams. To communicate research logic, these diagrams must faithfully render components, directional relations, and textual annotations. Since a single error, such as a reversed arrow or an unreadable equation, can invalidate the entire figure, structural fidelity is inherently conjunctive: correctness on one axis cannot compensate for failure on another. Current open-source models fail to satisfy this criterion. Supervised fine-tuning (SFT) learns plausible layouts but cannot reliably ensure structural correctness, while scalar reward-based post-training obscures which structural dimension has failed. To address this, we introduce SciForma, a framework for the structure faithful generation of scientific methodology diagrams. Specifically, SciForma decomposes diagram quality into three structural axes: Component, Arrow, and Text, guided by a structural inventory. Built on this foundation, we curate SciFormaData-700K for structured training and SciFormaBench-2K for logic-verified evaluation. To close the gap left by SFT, we develop Multi-Dimensional Conjunctive Preference Optimization (M-DPO), which enforces simultaneous correctness across all axes and adaptively routes gradients to the most deficient dimension in post-training. The same structural inventory also enables iterative editing at inference time to correct residual errors. This combination allows SciForma-9B to exceed all open-source baselines and GPT-Image-1.5 on both SciFormaBench-2K and AIBench, bringing open scientific diagram generation close to proprietary-level structural fidelity. Our code and data will be available at: https://github.com/microsoft/SciForma.", "arxiv_id": "2607.18091", "arxiv_url": "https://arxiv.org/abs/2607.18091", "authors": ["Yuxuan Luo", "Peng Zhang", "Xinjie Zhang", "Xun Guo", "Zhouhui Lian", "Yan Lu"], "brief": "SciForma\u662f\u4e00\u4e2a\u7528\u4e8e\u751f\u6210\u79d1\u5b66\u65b9\u6cd5\u8bba\u56fe\u8868\u7684\u6846\u67b6\uff0c\u5c06\u56fe\u8868\u8d28\u91cf\u5206\u89e3\u4e3a\u7ec4\u4ef6\u3001\u7bad\u5934\u548c\u6587\u672c\u4e09\u4e2a\u7ed3\u6784\u7ef4\u5ea6\uff0c\u5e76\u63d0\u51fa\u591a\u7ef4\u8054\u5408\u504f\u597d\u4f18\u5316\uff08M-DPO\uff09\u786e\u4fdd\u5404\u7ef4\u5ea6\u540c\u65f6\u6b63\u786e\u3002SciForma-9B\u5728SciFormaBench-2K\u548cAIBench\u4e0a\u8d85\u8d8a\u6240\u6709\u5f00\u6e90\u57fa\u7ebf\u53caGPT-Image-1\uff0c\u63a5\u8fd1\u5546\u4e1a\u6a21\u578b\u7684\u7ed3\u6784\u4fdd\u771f\u5ea6\u3002", "categories": ["cs.CV", "cs.GR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18091", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u79d1\u5b66\u56fe\u8868\u751f\u6210", "\u591a\u6a21\u6001", "\u504f\u597d\u4f18\u5316", "\u7ed3\u6784\u4fdd\u771f\u5ea6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18091v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SciForma: Structure-Faithful Generation of Scientific Diagrams", "tldr": "SciForma\u662f\u4e00\u4e2a\u7528\u4e8e\u751f\u6210\u79d1\u5b66\u65b9\u6cd5\u8bba\u56fe\u8868\u7684\u6846\u67b6\uff0c\u5c06\u56fe\u8868\u8d28\u91cf\u5206\u89e3\u4e3a\u7ec4\u4ef6\u3001\u7bad\u5934\u548c\u6587\u672c\u4e09\u4e2a\u7ed3\u6784\u7ef4\u5ea6\uff0c\u5e76\u63d0\u51fa\u591a\u7ef4\u8054\u5408\u504f\u597d\u4f18\u5316\uff08M-DPO\uff09\u786e\u4fdd\u5404\u7ef4\u5ea6\u540c\u65f6\u6b63\u786e\u3002SciForma-9B\u5728SciFormaBench-2K\u548cAIBench\u4e0a\u8d85\u8d8a\u6240\u6709\u5f00\u6e90\u57fa\u7ebf\u53caGPT-Image-1\uff0c\u63a5\u8fd1\u5546\u4e1a\u6a21\u578b\u7684\u7ed3\u6784\u4fdd\u771f\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Standard evaluation of many recognition systems contains distribution shift by construction, since benchmarks place disjoint conditions in the training and test splits. Under such a shift, split conformal prediction keeps marginal coverage near the nominal level while per-class coverage fails silently: on a real cross-subject skeleton benchmark, marginal coverage stays near ninety percent, the worst action class is covered about seventy percent of the time, and ten of the sixty classes fall below eighty percent coverage. We characterize the cost of restoring per-class validity. First, an impossibility: once the shift acts jointly on the covariates and the labels, the target class-conditional score law is unidentified from source labels and an unlabeled target sample, so no label-free method attains per-class coverage that is at once valid and efficient. Second, we make the cost precise: per-class validity alone needs only a handful of target labels per class, while the label count necessary and sufficient for validity together with per-class efficiency grows as the inverse square of the efficiency tolerance and the logarithm of the number of classes, with matching upper and lower bounds. Third, within the evaluated prediction-powered inference family, even the most favorable use of the classifier\u0027s own pseudo-labels on an unbounded unlabeled target pool improves efficiency by at most a small constant factor where coverage collapses. Skeleton action recognition is our real-data case study. A per-class calibration using source labels alone recovers a substantial share of the per-class gap while the shift preserves marginal coverage, and stops helping exactly when marginal coverage itself breaks. Three real shifts of increasing severity trace this boundary, and the same collapse and recovery appears on a natural-image corruption benchmark, beyond any single modality.", "arxiv_id": "2607.18088", "arxiv_url": "https://arxiv.org/abs/2607.18088", "authors": ["Weijia Han", "Lisha Qu"], "brief": "\u7814\u7a76\u5206\u5e03\u504f\u79fb\u4e0b\u7c7b\u6761\u4ef6\u8986\u76d6\u7387\u7684\u6807\u7b7e\u590d\u6742\u5ea6\u95ee\u9898\uff1a\u8fb9\u9645\u8986\u76d6\u7387\u770b\u4f3c\u6b63\u5e38\u4f46\u5404\u7c7b\u522b\u8986\u76d6\u7387\u53ef\u80fd\u4e25\u91cd\u5931\u6548\u3002\u7406\u8bba\u4e0a\u8bc1\u660e\u4e86\u65e0\u6807\u7b7e\u65b9\u6cd5\u65e0\u6cd5\u540c\u65f6\u4fdd\u8bc1\u7c7b\u6761\u4ef6\u6709\u6548\u6027\u4e0e\u6548\u7387\uff0c\u5e76\u7ed9\u51fa\u4e86\u6062\u590d\u7c7b\u6761\u4ef6\u6709\u6548\u6027\u6240\u9700\u76ee\u6807\u57df\u6807\u7b7e\u6570\u91cf\u7684\u7cbe\u786e\u4e0a\u4e0b\u754c\uff08\u4e0e\u6548\u7387\u5bb9\u5fcd\u5ea6\u7684\u5e73\u65b9\u6210\u53cd\u6bd4\uff09\u3002", "categories": ["cs.LG", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18088", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5171\u5f62\u9884\u6d4b", "\u5206\u5e03\u504f\u79fb", "\u7c7b\u6761\u4ef6\u8986\u76d6", "\u6807\u7b7e\u590d\u6742\u5ea6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18088v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Label Complexity of Class-Conditional Coverage under Distribution Shift", "tldr": "\u7814\u7a76\u5206\u5e03\u504f\u79fb\u4e0b\u7c7b\u6761\u4ef6\u8986\u76d6\u7387\u7684\u6807\u7b7e\u590d\u6742\u5ea6\u95ee\u9898\uff1a\u8fb9\u9645\u8986\u76d6\u7387\u770b\u4f3c\u6b63\u5e38\u4f46\u5404\u7c7b\u522b\u8986\u76d6\u7387\u53ef\u80fd\u4e25\u91cd\u5931\u6548\u3002\u7406\u8bba\u4e0a\u8bc1\u660e\u4e86\u65e0\u6807\u7b7e\u65b9\u6cd5\u65e0\u6cd5\u540c\u65f6\u4fdd\u8bc1\u7c7b\u6761\u4ef6\u6709\u6548\u6027\u4e0e\u6548\u7387\uff0c\u5e76\u7ed9\u51fa\u4e86\u6062\u590d\u7c7b\u6761\u4ef6\u6709\u6548\u6027\u6240\u9700\u76ee\u6807\u57df\u6807\u7b7e\u6570\u91cf\u7684\u7cbe\u786e\u4e0a\u4e0b\u754c\uff08\u4e0e\u6548\u7387\u5bb9\u5fcd\u5ea6\u7684\u5e73\u65b9\u6210\u53cd\u6bd4\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-only occupancy prediction requires recovering a semantic 3D occupancy field from calibrated surround-view images, where each view provides observations with ambiguous depth along camera rays. Existing methods have progressed from dense structured representations to sparse Gaussian primitives, improving the efficiency of 3D scene representation. However, Gaussian learning still relies primarily on image domain features, which provide limited explicit geometric information for volumetric reasoning. Our key observation is that effective Gaussian occupancy modeling requires not only sparse primitives, but also richer geometric and semantic learning cues. In this paper, we propose VGOcc, which learns visual and geometric cues from foundation models for Gaussian modeling. VGOcc incorporates these cues into primitive initialization and refinement, yielding a representation termed Visual-Geometric Gaussians tailored to semantic occupancy prediction. Specifically, we propose Visual-Geometric Gaussian Birth to form spatially balanced Gaussian centers from ray depth hypotheses, while visual semantic features initialize primitive attributes. Next, we design Pose-Aware Feature Learning to combine foundation tokens with camera embeddings and calibrated ray information. Features from neighboring views are then aggregated at projected 3D locations for each Gaussian refinement stage. Finally, Gaussian decoder refines birth Gaussians with pose-aware features and renders them into semantic occupancy. Experiments on nuScenes demonstrate that VGOcc achieves state-of-the-art performance in vision-only 3D occupancy prediction. Codes will be available at https://github.com/JHLin42in/VGOcc.", "arxiv_id": "2607.18078", "arxiv_url": "https://arxiv.org/abs/2607.18078", "authors": ["Junhong Lin", "Xianda Guo", "Kangli Wang", "Yuqi Ye", "Xiaoyu Liang", "Yanlun Peng", "Wei Gao"], "brief": "\u63d0\u51faVGOcc\u6846\u67b6\uff0c\u5229\u7528\u57fa\u7840\u6a21\u578b\u7684\u89c6\u89c9\u4e0e\u51e0\u4f55\u7ebf\u7d22\u589e\u5f3a\u9ad8\u65af\u57fa\u5143\u7684\u521d\u59cb\u5316\u4e0e\u7ec6\u5316\uff0c\u89e3\u51b3\u7eaf\u89c6\u89c93D\u5360\u7528\u9884\u6d4b\u4e2d\u6df1\u5ea6\u6a21\u7cca\u95ee\u9898\u3002\u5728nuScenes\u6570\u636e\u96c6\u4e0a\u5b9e\u73b0\u4e86\u89c6\u89c9\u4e2d\u5fc33D\u9a7e\u9a76\u573a\u666f\u5360\u7528\u9884\u6d4b\u7684\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18078", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u5360\u7528\u9884\u6d4b", "\u9ad8\u65af\u57fa\u5143", "\u81ea\u52a8\u9a7e\u9a76", "\u591a\u89c6\u56fe\u611f\u77e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18078v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "VGOcc: Learning Visual-Geometric Gaussians for Vision-Centric 3D Driving Occupancy Prediction", "tldr": "\u63d0\u51faVGOcc\u6846\u67b6\uff0c\u5229\u7528\u57fa\u7840\u6a21\u578b\u7684\u89c6\u89c9\u4e0e\u51e0\u4f55\u7ebf\u7d22\u589e\u5f3a\u9ad8\u65af\u57fa\u5143\u7684\u521d\u59cb\u5316\u4e0e\u7ec6\u5316\uff0c\u89e3\u51b3\u7eaf\u89c6\u89c93D\u5360\u7528\u9884\u6d4b\u4e2d\u6df1\u5ea6\u6a21\u7cca\u95ee\u9898\u3002\u5728nuScenes\u6570\u636e\u96c6\u4e0a\u5b9e\u73b0\u4e86\u89c6\u89c9\u4e2d\u5fc33D\u9a7e\u9a76\u573a\u666f\u5360\u7528\u9884\u6d4b\u7684\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "3D Gaussian Splatting (3DGS) achieves high-quality real-time rendering by representing a scene with a large collection of anisotropic Gaussian primitives. However, complex scenes often require millions of Gaussians, resulting in substantial storage and rendering costs. Existing compression methods mainly reduce redundancy through primitive-wise pruning, attribute quantization, clustering, or neural coding, while redundancy caused by strongly overlapping and non-orthogonal Gaussian basis functions remains largely unexplored. We present QIRF, a quantum-inspired non-orthogonal function-space compression method for 3D Gaussian Splatting. QIRF models neighboring Gaussian primitives as a local non-orthogonal basis and formulates primitive reduction as a subspace-aware selection problem. Specifically, an analytic Gaussian overlap matrix and a radiance-response density matrix are constructed to characterize functional redundancy and rendering relevance. Generalized eigendecomposition is then used to identify the dominant local subspace and select representative Gaussian primitives. An RRDM-based response model and detail-aware safeguarding further preserve visually important high-frequency structures under aggressive pruning. Experiments on 13 scenes from Mip-NeRF 360, Tanks and Temples, and Deep Blending show that QIRF reduces the Gaussian count and raw PLY storage by 71.7 percent on average, corresponding to approximately 3.54 times compression, while maintaining reconstruction quality comparable to 3DGS and achieving a marginal average PSNR improvement of 0.10 dB. QIRF also improves the average rendering speed over 3DGS by 34.3 percent. These results suggest that non-orthogonal function-space redundancy is an important yet underexplored source of representational redundancy in explicit Gaussian radiance fields.", "arxiv_id": "2607.18067", "arxiv_url": "https://arxiv.org/abs/2607.18067", "authors": ["Shizeng Jiang", "Hao Zhang", "Xuerui Ma", "Ying Hu", "Tao Zhang"], "brief": "\u63d0\u51faQIRF\u65b9\u6cd5\uff0c\u5c063D\u9ad8\u65af\u6cfc\u6e85\u4e2d\u76f8\u90bb\u9ad8\u65af\u57fa\u51fd\u6570\u5efa\u6a21\u4e3a\u975e\u6b63\u4ea4\u5c40\u90e8\u57fa\uff0c\u901a\u8fc7\u5e7f\u4e49\u7279\u5f81\u5206\u89e3\u8bc6\u522b\u4e3b\u5bfc\u5b50\u7a7a\u95f4\u5e76\u7b5b\u9009\u4ee3\u8868\u6027\u9ad8\u65af\u539f\u8bed\u3002\u572813\u4e2a\u573a\u666f\u4e0a\u5e73\u5747\u538b\u7f2971.7%\u7684\u9ad8\u65af\u6570\u91cf\uff08\u7ea63.54\u500d\u538b\u7f29\uff09\uff0c\u6e32\u67d3\u901f\u5ea6\u63d0\u534734.3%\uff0c\u540c\u65f6\u4fdd\u6301\u4e0e\u539f\u59cb3DGS\u76f8\u5f53\u7684\u91cd\u5efa\u8d28\u91cf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18067", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u9ad8\u65af\u6cfc\u6e85", "\u573a\u666f\u538b\u7f29", "\u91cf\u5b50\u542f\u53d1", "\u5b9e\u65f6\u6e32\u67d3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18067v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "QIRF Quantum-Inspired Non-Orthogonal Function-Space Compression for 3D Gaussian Splatting", "tldr": "\u63d0\u51faQIRF\u65b9\u6cd5\uff0c\u5c063D\u9ad8\u65af\u6cfc\u6e85\u4e2d\u76f8\u90bb\u9ad8\u65af\u57fa\u51fd\u6570\u5efa\u6a21\u4e3a\u975e\u6b63\u4ea4\u5c40\u90e8\u57fa\uff0c\u901a\u8fc7\u5e7f\u4e49\u7279\u5f81\u5206\u89e3\u8bc6\u522b\u4e3b\u5bfc\u5b50\u7a7a\u95f4\u5e76\u7b5b\u9009\u4ee3\u8868\u6027\u9ad8\u65af\u539f\u8bed\u3002\u572813\u4e2a\u573a\u666f\u4e0a\u5e73\u5747\u538b\u7f2971.7%\u7684\u9ad8\u65af\u6570\u91cf\uff08\u7ea63.54\u500d\u538b\u7f29\uff09\uff0c\u6e32\u67d3\u901f\u5ea6\u63d0\u534734.3%\uff0c\u540c\u65f6\u4fdd\u6301\u4e0e\u539f\u59cb3DGS\u76f8\u5f53\u7684\u91cd\u5efa\u8d28\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In astronomical imaging surveys, repeated observations of the same sky patches are taken in order to obtain deeper images and detect new sources. This is the case in the search for many transient phenomena, such as supernovae, gravitational wave (GW) optical counterparts and other cataclysmic variables. In many such surveys some of the images are undersampled, meaning that the pixel size is too large, and the image suffers from aliasing. For undersampled images, both co-addition of the images and background subtraction are done in a non-optimal manner, which leads to reduced sensitivity and an increased rate of false alarms. We present a new method (named Linear Undersampled Transients \\\u0026 Addition (LUTRA)) that performs both processes in a mathematically proven optimal way, which allows improved performance for many scientific applications. It also allows easy and direct performance of measurements such as photometry and astrometry in a simple manner, while providing results in super-resolution. We demonstrate the performance of the method on public ZTF data and show $\\times 1.25$ higher SNR compared to current methods. We provide an open source Python implementation.", "arxiv_id": "2607.18054", "arxiv_url": "https://arxiv.org/abs/2607.18054", "authors": ["Matan Schlanger", "Barak Zackay"], "brief": "\u9488\u5bf9\u5929\u6587\u5de1\u5929\u4e2d\u6b20\u91c7\u6837\u56fe\u50cf\u7684\u53e0\u52a0\u4e0e\u80cc\u666f\u51cf\u9664\u95ee\u9898\uff0c\u63d0\u51faLUTRA\u65b9\u6cd5\uff0c\u4ee5\u6570\u5b66\u6700\u4f18\u65b9\u5f0f\u540c\u65f6\u5904\u7406\u4e24\u4e2a\u8fc7\u7a0b\u5e76\u5b9e\u73b0\u8d85\u5206\u8fa8\u7387\u8f93\u51fa\u3002\u5728ZTF\u516c\u5f00\u6570\u636e\u4e0a\u9a8c\u8bc1\uff0c\u4fe1\u566a\u6bd4\u6bd4\u73b0\u6709\u65b9\u6cd5\u63d0\u53471.25\u500d\uff0c\u6709\u52a9\u4e8e\u8d85\u65b0\u661f\u3001\u5f15\u529b\u6ce2\u5149\u5b66\u5bf9\u5e94\u4f53\u7b49\u6682\u73b0\u6e90\u7684\u63a2\u6d4b\u3002", "categories": ["astro-ph.IM", "astro-ph.HE", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18054", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5929\u6587\u56fe\u50cf\u5904\u7406", "\u8d85\u5206\u8fa8\u7387", "\u6682\u73b0\u6e90\u63a2\u6d4b", "\u56fe\u50cf\u53e0\u52a0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18054v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Co-addition and Subtraction of Undersampled Images", "tldr": "\u9488\u5bf9\u5929\u6587\u5de1\u5929\u4e2d\u6b20\u91c7\u6837\u56fe\u50cf\u7684\u53e0\u52a0\u4e0e\u80cc\u666f\u51cf\u9664\u95ee\u9898\uff0c\u63d0\u51faLUTRA\u65b9\u6cd5\uff0c\u4ee5\u6570\u5b66\u6700\u4f18\u65b9\u5f0f\u540c\u65f6\u5904\u7406\u4e24\u4e2a\u8fc7\u7a0b\u5e76\u5b9e\u73b0\u8d85\u5206\u8fa8\u7387\u8f93\u51fa\u3002\u5728ZTF\u516c\u5f00\u6570\u636e\u4e0a\u9a8c\u8bc1\uff0c\u4fe1\u566a\u6bd4\u6bd4\u73b0\u6709\u65b9\u6cd5\u63d0\u53471.25\u500d\uff0c\u6709\u52a9\u4e8e\u8d85\u65b0\u661f\u3001\u5f15\u529b\u6ce2\u5149\u5b66\u5bf9\u5e94\u4f53\u7b49\u6682\u73b0\u6e90\u7684\u63a2\u6d4b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Detecting vessels engaging in illegal activities is of paramount importance for maritime security. One of the major goals is to detect dark vessels, ships that disable their transponders to evade surveillance. Deep Learning (DL) models can detect vessels in Synthetic Aperture Radar (SAR) images, enabling maritime traffic analysis regardless of weather or visibility conditions. However, to detect potential dark vessels, a DL model must select only those that are required to carry a transponder based on their Gross Tonnage (GT). Unfortunately, no public SAR dataset is available for training an end-to-end DL model for vessel detection and GT regression. In this work, we present a framework that leverages heterogeneous image and tabular datasets to solve this task. Our solution combines a multi-task DL framework for predicting the location, vessel type, and physical dimensions of ships, cascaded with a non-parametric model for predicting GT from vessel size and category. We perform GT regression by a KNN that measures sample similarity using a hybrid Euclidean and categorical distance. Experiments show that our solution can predict multiple outputs while remaining competitive with state-of-the-art models on individual subtasks, thus enabling the identification of dark vessels. We publish our code on GitHub https://github.com/PaltrinieriDavide/vesseldetection.", "arxiv_id": "2607.18051", "arxiv_url": "https://arxiv.org/abs/2607.18051", "authors": ["Davide Paltrinieri", "Andrea Diecidue", "Roberto Basla", "Daniele Casciani", "Piero Fraternali", "Giacomo Boracchi"], "brief": "\u9488\u5bf9\u6d77\u4e0a\u6697\u8239\uff08\u5173\u95ed\u5e94\u7b54\u5668\u7684\u975e\u6cd5\u8239\u53ea\uff09\u8bc6\u522b\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u4e2a\u591a\u4efb\u52a1\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u7ed3\u5408\u5f02\u6784\u56fe\u50cf\u4e0e\u8868\u683c\u6570\u636e\u96c6\uff0c\u5728SAR\u56fe\u50cf\u4e2d\u540c\u65f6\u5b8c\u6210\u8239\u53ea\u68c0\u6d4b\u3001\u7c7b\u578b\u5206\u7c7b\u548c\u7269\u7406\u5c3a\u5bf8\u9884\u6d4b\uff0c\u518d\u901a\u8fc7KNN\u56de\u5f52\u4f30\u7b97\u603b\u5428\u4f4d\uff0c\u4ece\u800c\u5224\u65ad\u8239\u53ea\u662f\u5426\u5e94\u643a\u5e26\u5e94\u7b54\u5668\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6848\u5728\u5404\u5b50\u4efb\u52a1\u4e0a\u5747\u5177\u6709\u7ade\u4e89\u529b\uff0c\u53ef\u6709\u6548\u652f\u6301\u6697\u8239\u8bc6\u522b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18051", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["SAR\u56fe\u50cf", "\u76ee\u6807\u68c0\u6d4b", "\u591a\u4efb\u52a1\u5b66\u4e60", "\u6d77\u4e8b\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18051v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SAR Vessel Detection and Gross Tonnage Estimation from Heterogeneous Datasets for Dark Vessel Identification", "tldr": "\u9488\u5bf9\u6d77\u4e0a\u6697\u8239\uff08\u5173\u95ed\u5e94\u7b54\u5668\u7684\u975e\u6cd5\u8239\u53ea\uff09\u8bc6\u522b\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u4e2a\u591a\u4efb\u52a1\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u7ed3\u5408\u5f02\u6784\u56fe\u50cf\u4e0e\u8868\u683c\u6570\u636e\u96c6\uff0c\u5728SAR\u56fe\u50cf\u4e2d\u540c\u65f6\u5b8c\u6210\u8239\u53ea\u68c0\u6d4b\u3001\u7c7b\u578b\u5206\u7c7b\u548c\u7269\u7406\u5c3a\u5bf8\u9884\u6d4b\uff0c\u518d\u901a\u8fc7KNN\u56de\u5f52\u4f30\u7b97\u603b\u5428\u4f4d\uff0c\u4ece\u800c\u5224\u65ad\u8239\u53ea\u662f\u5426\u5e94\u643a\u5e26\u5e94\u7b54\u5668\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6848\u5728\u5404\u5b50\u4efb\u52a1\u4e0a\u5747\u5177\u6709\u7ade\u4e89\u529b\uff0c\u53ef\u6709\u6548\u652f\u6301\u6697\u8239\u8bc6\u522b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Existing image manipulation localization (IML) methods rely heavily on 2D forensic cues, such as low-level artifacts, noise traces, and semantic inconsistencies in the manipulated image. While effective in many cases, these cues become much less discriminative when manipulated regions are well blended with their surrounding context in appearance. In such cases, a manipulated region may remain locally appearance-consistent, but still violate the geometric structure of the surrounding scene. This limitation motivates us to go beyond purely 2D evidence and introduce geometric reasoning into IML. To this end, we leverage monocular reconstruction to obtain auxiliary geometric cues, including depth and surface normals. However, a key challenge lies in the fact that reconstructed geometry on manipulated images is inherently noisy and cannot be used naively. Rather than treating depth and normals as direct evidence, we estimate their reliability and exploit them selectively for localization. Based on this principle, we design a geometry-aware framework (GFrame) that fuses reliable geometric cues with RGB features and propagates them across scales to improve fine-grained localization. Extensive experiments show that the proposed method achieves excellent performance under limited budget constraints. These results indicate that reliable 3D geometry provides complementary forensic evidence beyond traditional 2D cues for IML. Related code will be released.", "arxiv_id": "2607.18040", "arxiv_url": "https://arxiv.org/abs/2607.18040", "authors": ["Guofeng Yu", "Zhiqing Guo", "Dan Ma", "Gaobo Yang"], "brief": "\u73b0\u6709\u56fe\u50cf\u7be1\u6539\u5b9a\u4f4d\u65b9\u6cd5\u4f9d\u8d562D\u7ebf\u7d22\uff0c\u5728\u7be1\u6539\u533a\u57df\u4e0e\u80cc\u666f\u5916\u89c2\u878d\u5408\u826f\u597d\u65f6\u6548\u679c\u4e0b\u964d\u3002\u672c\u6587\u5f15\u5165\u5355\u76ee\u91cd\u5efa\u83b7\u53d6\u6df1\u5ea6\u548c\u8868\u9762\u6cd5\u7ebf\u7b493D\u51e0\u4f55\u7ebf\u7d22\uff0c\u5e76\u901a\u8fc7\u53ef\u9760\u6027\u4f30\u8ba1\u9009\u62e9\u6027\u878d\u5408\u51e0\u4f55\u7279\u5f81\uff0c\u8bbe\u8ba1GFrame\u6846\u67b6\u663e\u8457\u63d0\u5347\u7ec6\u7c92\u5ea6\u7be1\u6539\u5b9a\u4f4d\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18040", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u50cf\u53d6\u8bc1", "\u7be1\u6539\u5b9a\u4f4d", "3D\u51e0\u4f55", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18040v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "When 2D Cues Fail: Improving Image Manipulation Localization with Reliable 3D Geometry", "tldr": "\u73b0\u6709\u56fe\u50cf\u7be1\u6539\u5b9a\u4f4d\u65b9\u6cd5\u4f9d\u8d562D\u7ebf\u7d22\uff0c\u5728\u7be1\u6539\u533a\u57df\u4e0e\u80cc\u666f\u5916\u89c2\u878d\u5408\u826f\u597d\u65f6\u6548\u679c\u4e0b\u964d\u3002\u672c\u6587\u5f15\u5165\u5355\u76ee\u91cd\u5efa\u83b7\u53d6\u6df1\u5ea6\u548c\u8868\u9762\u6cd5\u7ebf\u7b493D\u51e0\u4f55\u7ebf\u7d22\uff0c\u5e76\u901a\u8fc7\u53ef\u9760\u6027\u4f30\u8ba1\u9009\u62e9\u6027\u878d\u5408\u51e0\u4f55\u7279\u5f81\uff0c\u8bbe\u8ba1GFrame\u6846\u67b6\u663e\u8457\u63d0\u5347\u7ec6\u7c92\u5ea6\u7be1\u6539\u5b9a\u4f4d\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "As with most ``in the wild\u0027\u0027 collections of the natural world, the North America Camera Trap Images (NACTI) dataset exhibits long-tailed class imbalance, with the largest class covering over 50% of its 3.7M images. Building on the PyTorch Wildlife model, we systematically evaluate Long-Tail Recognition (LTR) methodologies to benchmark species recognition performance, including specialised loss functions and LTR-sensitive regularisation. Our optimised configuration achieves state-of-the-art 99.40% Top-1 accuracy on the NACTI test split, significantly outperforming standard baselines and previously reported top performances. To assess robustness under domain shifts (e.g., night-time captures, occlusion, motion-blur), we extend our evaluation across three independent reduced-bias test sets (including ENA-Detection, Caltech Camera Traps and Missouri Camera Traps). Across these out-of-distribution (OOD) evaluations, our LTR-enhanced model consistently demonstrates substantially stronger generalisation capabilities compared to standard cross-entropy approaches. However, qualitative and quantitative analyses underline that current LTR optimisations cannot fully overcome representational bottlenecks, resulting in catastrophic predictive breakdown for rare `Tail\u0027 classes under severe domain shift. For maximum reproducibility, all dataset splits, key code, and network weights are published with this paper at https://github.com/ZehuaLiuY/Species-Classification.", "arxiv_id": "2607.18033", "arxiv_url": "https://arxiv.org/abs/2607.18033", "authors": ["Zehua Liu", "Tilo Burghardt"], "brief": "\u9488\u5bf9\u5317\u7f8e\u76f8\u673a\u9677\u9631\u56fe\u50cf\u6570\u636e\u96c6\uff08NACTI\uff09\u7684\u957f\u5c3e\u7c7b\u522b\u4e0d\u5e73\u8861\u95ee\u9898\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4e86\u591a\u79cd\u957f\u5c3e\u8bc6\u522b\u65b9\u6cd5\uff0c\u6700\u7ec8\u5728\u6d4b\u8bd5\u96c6\u4e0a\u8fbe\u523099.40%\u7684Top-1\u51c6\u786e\u7387\uff0c\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\u3002\u8de8\u57df\u8bc4\u4f30\u8868\u660eLTR\u589e\u5f3a\u6a21\u578b\u6cdb\u5316\u80fd\u529b\u66f4\u5f3a\uff0c\u4f46\u7a00\u6709\u5c3e\u90e8\u7c7b\u522b\u5728\u4e25\u91cd\u57df\u504f\u79fb\u4e0b\u4ecd\u5b58\u5728\u9884\u6d4b\u5d29\u6e83\u95ee\u9898\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18033", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u957f\u5c3e\u8bc6\u522b", "\u7269\u79cd\u8bc6\u522b", "\u56fe\u50cf\u5206\u7c7b", "\u57df\u6cdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18033v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Benchmarking NACTI Species Recognition in Long-Tailed Regimes", "tldr": "\u9488\u5bf9\u5317\u7f8e\u76f8\u673a\u9677\u9631\u56fe\u50cf\u6570\u636e\u96c6\uff08NACTI\uff09\u7684\u957f\u5c3e\u7c7b\u522b\u4e0d\u5e73\u8861\u95ee\u9898\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4e86\u591a\u79cd\u957f\u5c3e\u8bc6\u522b\u65b9\u6cd5\uff0c\u6700\u7ec8\u5728\u6d4b\u8bd5\u96c6\u4e0a\u8fbe\u523099.40%\u7684Top-1\u51c6\u786e\u7387\uff0c\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\u3002\u8de8\u57df\u8bc4\u4f30\u8868\u660eLTR\u589e\u5f3a\u6a21\u578b\u6cdb\u5316\u80fd\u529b\u66f4\u5f3a\uff0c\u4f46\u7a00\u6709\u5c3e\u90e8\u7c7b\u522b\u5728\u4e25\u91cd\u57df\u504f\u79fb\u4e0b\u4ecd\u5b58\u5728\u9884\u6d4b\u5d29\u6e83\u95ee\u9898\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
