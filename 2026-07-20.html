const PAPERS = [{"abstract": "Skills are a useful abstraction for software agents, turning human and agent experience into reusable procedural knowledge. Yet existing skill libraries are mostly hand-written, text-centric, or derived from agent traces, leaving tutorial videos and other multimodal human resources largely underused. We present RESOURCE2SKILL, a framework that distills multimodal resources, including tutorial videos, repositories, articles, and reference artifacts, into executable skills for software agents. RESOURCE2SKILL organizes these skills as a hierarchical multimodal Skill Wiki, where each entry combines structured text, code, visual examples, metadata, and provenance. This design preserves complementary signals from different resources: videos capture temporal operations and visual effects, code captures executable tool patterns, and articles or artifacts provide conceptual and stylistic grounding. At inference time, agents retrieve and compose relevant skills from the wiki; when coverage is insufficient, the same construction operator can acquire new skills online. Across seven practical authoring domains, RESOURCE2SKILL improves average overall score by +11.9 percentage points over no-skill agents and outperforms strong harness baselines in 26 of 28 main-aggregate model-domain cells. Ablations confirm the value of multimodal skill format, hierarchical organization, source diversity, selection strategy, and online acquisition.", "arxiv_id": "2606.29538", "arxiv_url": "https://arxiv.org/abs/2606.29538", "authors": ["Yijia Fan", "Zonglin Di", "Zimo Wen", "Yifan Yang", "Mingxi Cheng", "Qi Dai", "Bei Liu", "Kai Qiu", "Yue Dong", "Ji Li", "Chong Luo"], "brief": "\u63d0\u51faRESOURCE2SKILL\u6846\u67b6\uff0c\u5c06\u6559\u7a0b\u89c6\u9891\u3001\u4ee3\u7801\u4ed3\u5e93\u3001\u6587\u7ae0\u7b49\u591a\u6a21\u6001\u4eba\u7c7b\u8d44\u6e90\u81ea\u52a8\u84b8\u998f\u4e3a\u8f6f\u4ef6\u667a\u80fd\u4f53\u53ef\u6267\u884c\u7684\u6280\u80fd\uff0c\u5e76\u7ec4\u7ec7\u  ":", "Haolin Chen", "Leon Qi", "Steve Brown", "Deon Metelski", "Tao Xia", "Joonyul Lee", "Qixuan Wang", "Kevin Riley", "Frank Wang", "Weiran Yao"], "brief": "\u63d0\u51faCura 1T\uff0c\u4e00\u4e2a\u8986\u76d6\u60a3\u8005\u54a8\u8be2\u3001\u4e34\u5e8a\u63a8\u7406\u3001\u4ea4\u4e92\u8bca\u65ad\u548cEHR\u5de5\u5177\u4f7f\u7528\u7684\u533b\u7597\u4e13\u7528LLM\uff0c\u901a\u8fc7\u4eba\u5de5\u95e8\u63a7\u7684\u81ea\u8fdb\u5316\u8bad\u7ec3\u5faa\u73af\uff0c\u7531\u8bad\u7ec3\u667a\u80fd\u4f53\u81ea\u52a8\u89c4\u5212\u80fd\u529b\u76ee\u6807\u3001\u8bad\u7ec3\u6a21\u578b\u3001\u8bc4\u4f30\u5e76\u4f18\u5316\u6570\u636e\u6df7\u5408\u7b56\u7565\u3002", "categories": ["cs.AI"], "github_repo": "https://github.com/actava-ai/Cura", "github_stars": 17, "hf_url": "https://huggingface.co/papers/2607.15314", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u91c7\u7528\u4eba\u5de5\u95e8\u63a7\u81ea\u8fdb\u5316\u5faa\u73af\uff1a\u6bcf\u8f6e\u7531\u8bad\u7ec3\u667a\u80fd\u4f53\u89c4\u5212\u76ee\u6807\u80fd\u529b\u3001\u8bad\u7ec3\u3001\u8bc4\u4f30\u8f68\u8ff9\u5e76\u4ece\u5931\u8d25\u4e2d\u7cbe\u70bc\u6570\u636e\u6df7\u5408", "\u4ee5\u6570\u636e\u4e3a\u4e2d\u5fc3\u7684\u8fed\u4ee3\u4f18\u5316\uff0c\u901a\u8fc7\u6709\u9488\u5bf9\u6027\u7684\u5408\u6210\u4e0e\u7cbe\u9009\u6837\u672c\u66ff\u4ee3\u5355\u6b21\u901a\u7528\u533b\u7597\u6570\u636e\u66f4\u65b0\uff0c\u907f\u514d\u591a\u4efb\u52a1\u95f4\u7684\u80fd\u529b\u9000\u5316", "\u5728\u533b\u7597\u8bc4\u4f30\u5957\u4ef6\u4e2d\u6392\u540d\u524d\u5217\uff0c\u540c\u65f6\u5728\u57df\u5916\u63a8\u7406\u548c\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u4fdd\u6301\u7ade\u4e89\u529b"], "keywords": ["\u533b\u7597AI", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 4, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15314v1", "published_at": "2026-07-15", "score": 0.534, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (43\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.15314.png", "title": "Cura 1T: Specialized Model for Agentic Healthcare", "tldr": "Cura 1T\uff1a\u901a\u8fc7\u4eba\u5de5\u95e8\u63a7\u81ea\u8fdb\u5316\u5faa\u73af\u8bad\u7ec3\u7684\u533b\u7597\u4e13\u7528\u5927\u8bed\u8a00\u6a21\u578b", "upvotes": 43, "what_it_is": "\u63d0\u51faCura 1T\uff0c\u4e00\u4e2a\u8986\u76d6\u60a3\u8005\u54a8\u8be2\u3001\u4e34\u5e8a\u63a8\u7406\u3001\u4ea4\u4e92\u8bca\u65ad\u548cEHR\u5de5\u5177\u4f7f\u7528\u7684\u533b\u7597\u4e13\u7528LLM\uff0c\u901a\u8fc7\u4eba\u5de5\u95e8\u63a7\u7684\u81ea\u8fdb\u5316\u8bad\u7ec3\u5faa\u73af\uff0c\u7531\u8bad\u7ec3\u667a\u80fd\u4f53\u81ea\u52a8\u89c4\u5212\u80fd\u529b\u76ee\u6807\u3001\u8bad\u7ec3\u6a21\u578b\u3001\u8bc4\u4f30\u5e76\u4f18\u5316\u6570\u636e\u6df7\u5408\u7b56\u7565\u3002", "why_notable": "\u9996\u6b21\u5c06\u81ea\u8fdb\u5316\u8bad\u7ec3\u5faa\u73af\u5f15\u5165\u533b\u7597\u4e13\u7528LLM\uff0c\u7cfb\u7edf\u6027\u89e3\u51b3\u591a\u533b\u7597\u4efb\u52a1\u95f4\u80fd\u529b\u51b2\u7a81\u95ee\u9898\uff0c\u517c\u987e\u4e13\u79d1\u6df1\u5ea6\u4e0e\u901a\u7528\u63a8\u7406\u80fd\u529b\uff0c\u5bf9\u533b\u7597AI\u843d\u5730\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "In this report, we introduce Qwen-Music, a powerful music generation model capable of producing highly musical and high-fidelity songs with complete vocal singing. Qwen-Music supports two core tasks: Text to Music Generation, which create entirely new songs from text descriptions, lyrics, and musical attributes, and Cover Song Generation, which reinterprets existing songs with different styles and vocal characteristics. Architecturally, Qwen-Music integrates three core components: Qwen-Music-Tokenizer, Qwen-Music-LLM, and Qwen-Music-Render. Qwen-Music-Tokenizer compresses audio into a 25 Hz single-codebook stream of Music Semantic Tokens that preserve semantic and melodic information for LLM prediction. Based on these tokens, Qwen-Music-LLM performs autoregressive music semantic modeling, with a key novelty being a melody-token-based chain-of-thought (Melody-CoT) mechanism that plans melodies before full-song generation, improving creativity, musicality, structural coherence, and reference-audio-based melody cloning. To overcome the fidelity limitations of discrete semantic tokens, Qwen-Music-Render performs generative stereo rendering, enriching acoustic details and producing high-fidelity stereo waveforms. Finally, we train Qwen-Music-LLM on more than 5 million hours of multilingual music data covering hundreds of languages. We first apply quality-aware pre-training curriculum, then use progressive post-training, comprising supervised initialization, offline DPO, and online GSPO, to further improve musicality and instruction-following ability. Across 600 Chinese and English prompts, Qwen-Music achieves state-of-the-art results in 13 of 16 objective musicality and audio-quality metrics. Professional evaluators also prefer Qwen-Music over leading proprietary systems. For cover song generation, Qwen-Music preserves reference melodies more accurately than leading proprietary systems.", "arxiv_id": "2607.11699", "arxiv_url": "https://arxiv.org/abs/2607.11699", "authors": ["Jin Xu", "Kangdi Wang", "Ruibin Yuan", "Shun Lei", "Xiong Wang", "Xize Cheng", "Xueyao Zhang", "Yang Zhang", "Yiheng Chen", "Yongqi Wang", "Yue Wang", "Zhifang Guo", "Zihan Liu", "Zijian Lin", "Dake Guo", "Hangrui Hu", "Lei Xie", "Linhan Ma", "Wei Xue", "Wenxiang Guo", "Xinfa Zhu", "Xipin Wei", "Yangze Li", "Yuanjun Lv", "Yuxuan Wang", "Yunfei Chu", "Zhiyong Wu"], "brief": "\u963f\u91cc\u63d0\u51faQwen-Music\uff0c\u4e00\u4e2a\u96c6\u97f3\u4e50\u8bed\u4e49\u5206\u8bcd\u5668\u3001\u81ea\u56de\u5f52LLM\u548c\u7acb\u4f53\u58f0\u6e32\u67d3\u5668\u4e8e\u4e00\u4f53\u7684\u97f3\u4e50\u751f\u6210\u7cfb\u7edf\uff0c\u652f\u6301\u6587\u672c\u63cf\u8ff0\u751f\u6210\u5b8c\u6574\u6b4c\u66f2\u53ca\u7ffb\u5531\u751f\u6210\u4e24\u5927\u6838\u5fc3\u4efb\u52a1\u3002", "categories": ["cs.SD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11699", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u521b\u65b0\u63d0\u51fa\u65cb\u5f8b\u94fe\u5f0f\u601d\u7ef4\uff08Melody-CoT\uff09\u673a\u5236\uff0c\u5148\u89c4\u5212\u65cb\u5f8b\u518d\u751f\u6210\u5b8c\u6574\u6b4c\u66f2\uff0c\u63d0\u5347\u521b\u610f\u6027\u4e0e\u7ed3\u6784\u8fde\u8d2f\u6027", "\u8bad\u7ec3\u6570\u636e\u8d85500\u4e07\u5c0f\u65f6\u591a\u8bed\u8a00\u97f3\u4e50\uff0c\u8986\u76d6\u6570\u767e\u79cd\u8bed\u8a00\uff1b\u91c7\u7528\u8d28\u91cf\u611f\u77e5\u9884\u8bad\u7ec3+SFT+\u79bb\u7ebfDPO+\u5728\u7ebfGSPO\u6e10\u8fdb\u5f0f\u540e\u8bad\u7ec3", "\u5728600\u6761\u4e2d\u82f1\u6587\u63d0\u793a\u768416\u9879\u5ba2\u89c2\u6307\u6807\u4e2d13\u9879\u8fbe\u5230SOTA\uff0c\u4e13\u4e1a\u8bc4\u6d4b\u8005\u504f\u597d\u5ea6\u4f18\u4e8e\u4e3b\u6d41\u5546\u4e1a\u7cfb\u7edf"], "keywords": ["\u97f3\u4e50\u751f\u6210", "\u591a\u6a21\u6001", "\u5927\u8bed\u8a00\u6a21\u578b", "\u97f3\u9891\u5408\u6210"], "num_comments": 3, "on_hf": true, "organization": "Qwen", "pdf_url": "https://arxiv.org/pdf/2607.11699v1", "published_at": "2026-07-13", "score": 0.523, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Qwen/Alibaba", "HF trending (18\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.11699.png", "title": "Qwen-Music Technical Report", "tldr": "Qwen-Music\uff1a\u652f\u6301\u6587\u672c\u751f\u6210\u4e0e\u7ffb\u5531\u7684\u9ad8\u4fdd\u771f\u591a\u8bed\u8a00\u97f3\u4e50\u751f\u6210\u6a21\u578b", "upvotes": 18, "what_it_is": "\u963f\u91cc\u63d0\u51faQwen-Music\uff0c\u4e00\u4e2a\u96c6\u97f3\u4e50\u8bed\u4e49\u5206\u8bcd\u5668\u3001\u81ea\u56de\u5f52LLM\u548c\u7acb\u4f53\u58f0\u6e32\u67d3\u5668\u4e8e\u4e00\u4f53\u7684\u97f3\u4e50\u751f\u6210\u7cfb\u7edf\uff0c\u652f\u6301\u6587\u672c\u63cf\u8ff0\u751f\u6210\u5b8c\u6574\u6b4c\u66f2\u53ca\u7ffb\u5531\u751f\u6210\u4e24\u5927\u6838\u5fc3\u4efb\u52a1\u3002", "why_notable": "Qwen-Music\u5728\u97f3\u4e50\u751f\u6210\u9886\u57df\u5b9e\u73b0\u4e86\u4ece\u8bed\u4e49\u5efa\u6a21\u5230\u9ad8\u4fdd\u771f\u6e32\u67d3\u7684\u5b8c\u6574\u95ed\u73af\uff0cMelody-CoT\u673a\u5236\u662fLLM\u63a8\u7406\u8303\u5f0f\u5728\u97f3\u4e50\u521b\u4f5c\u4e2d\u7684\u65b0\u9896\u5e94\u7528\uff0c\u5f00\u6e90\u6f5c\u529b\u5927\u4e14\u591a\u8bed\u8a00\u8986\u76d6\u5e7f\u6cdb\u3002"}, {"abstract": "We present Audio-Visual Flamingo (AV-Flamingo), a fully open state-of-the-art audio-visual large language model (AV-LLM) for joint understanding and reasoning over audio, images, and long-form videos. Unlike prior AV-LLMs that primarily focus on short clips, AV-Flamingo is designed for understanding and reasoning over long and complex real-world (audio-visual) videos. To support this, we make three key contributions: (i) Audio-Visual-Skills, a large-scale collection of real-world videos with ~7M caption and question-answer training instances designed to emphasize temporal, compositional, and cross-modal audio-visual reasoning; (ii) a novel three-stage curriculum that progressively trains the model from short-range perception to long-horizon multi-event reasoning; and (iii) Temporal Audio-Visual Interleaved Chain-of-Thought, a reasoning framework that explicitly grounds intermediate reasoning steps to timestamps in long audio-visual streams, improving temporal alignment and interpretability. Extensive experiments across 15+ audio-visual, omni-modal, audio, and vision benchmarks show that AV-Flamingo outperforms similarly sized open models by clear margins and remains highly competitive with, and in some cases surpasses, much larger open-weight and closed models, particularly on long and complex real-world audio-visual understanding and reasoning tasks. Beyond benchmark performance, AV-Flamingo exhibits strong real-world utility and transfers well to unseen tasks, highlighting its robustness and generalization ability.", "arxiv_id": "2607.16107", "arxiv_url": "https://arxiv.org/abs/2607.16107", "authors": ["Sreyan Ghosh", "Arushi Goel", "Kaousheik Jayakumar", "Lasha Koroshinadze", "Nishit Anand", "Siddharth Gururani", "Hanrong Ye", "Pritam Biswas", "Yuanhang Su", "Ehsan Hosseini-Asl", "Sang-gil Lee", "Zhifeng Kong", "Jaehyeon Kim", "Sungwon Kim", "S Sakshi", "Ramani Duraiswami", "Dinesh Manocha", "Andrew Tao", "Mohammad Shoeybi", "Bryan Catanzaro", "Ming-Yu Liu", "Wei Ping"], "brief": "\u63d0\u51faAudio-Visual Flamingo\uff08AV-Flamingo\uff09\uff0c\u4e00\u4e2a\u5b8c\u5168\u5f00\u6e90\u7684\u97f3\u89c6\u9891\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u4e13\u4e3a\u957f\u89c6\u9891\u548c\u590d\u6742\u771f\u5b9e\u573a\u666f\u4e0b\u7684\u97f3\u9891\u3001\u56fe\u50cf\u3001\u89c6\u9891\u8054\u5408\u7406\u89e3\u4e0e\u63a8\u7406\u800c\u8bbe\u8ba1\u3002", "categories": ["eess.AS", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16107", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6784\u5efaAudio-Visual-Skills\u6570\u636e\u96c6\uff1a\u7ea6700\u4e07\u6761\u771f\u5b9e\u89c6\u9891\u6807\u6ce8\u4e0e\u95ee\u7b54\u5b9e\u4f8b\uff0c\u5f3a\u8c03\u65f6\u5e8f\u3001\u7ec4\u5408\u53ca\u8de8\u6a21\u6001\u63a8\u7406", "\u4e09\u9636\u6bb5\u8bfe\u7a0b\u8bad\u7ec3\u7b56\u7565\uff1a\u4ece\u77ed\u65f6\u611f\u77e5\u9010\u6b65\u8fc7\u6e21\u5230\u957f\u65f6\u591a\u4e8b\u4ef6\u63a8\u7406", "\u63d0\u51fa\u65f6\u5e8f\u97f3\u89c6\u9891\u4ea4\u9519\u601d\u7ef4\u94fe\uff08Temporal AV Interleaved CoT\uff09\uff0c\u5c06\u63a8\u7406\u6b65\u9aa4\u663e\u5f0f\u951a\u5b9a\u5230\u65f6\u95f4\u6233\uff0c\u63d0\u5347\u65f6\u5e8f\u5bf9\u9f50\u4e0e\u53ef\u89e3\u91ca\u6027", "\u572815+\u97f3\u89c6\u9891\u3001\u5168\u6a21\u6001\u3001\u97f3\u9891\u548c\u89c6\u89c9\u57fa\u51c6\u4e0a\u8d85\u8d8a\u540c\u7b49\u89c4\u6a21\u5f00\u6e90\u6a21\u578b\uff0c\u90e8\u5206\u4efb\u52a1\u5ab2\u7f8e\u751a\u81f3\u8d85\u8d8a\u66f4\u5927\u89c4\u6a21\u95ed\u6e90\u6a21\u578b"], "keywords": ["\u591a\u6a21\u6001", "\u97f3\u89c6\u9891\u7406\u89e3", "\u5927\u8bed\u8a00\u6a21\u578b", "\u957f\u89c6\u9891"], "num_comments": 1, "on_hf": true, "organization": "NVIDIA", "pdf_url": "https://arxiv.org/pdf/2607.16107v1", "published_at": "2026-07-17", "score": 0.484, "selected_reasons": ["\u77e5\u540d\u673a\u6784: NVIDIA", "HF trending (7\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16107.png", "title": "Audio-Visual Flamingo: Open Audio-Visual Intelligence for Long and Complex Videos", "tldr": "AV-Flamingo\uff1a\u9762\u5411\u957f\u89c6\u9891\u7684\u5f00\u6e90\u97f3\u89c6\u9891\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u652f\u6301\u8de8\u6a21\u6001\u65f6\u5e8f\u63a8\u7406", "upvotes": 7, "what_it_is": "\u63d0\u51faAudio-Visual Flamingo\uff08AV-Flamingo\uff09\uff0c\u4e00\u4e2a\u5b8c\u5168\u5f00\u6e90\u7684\u97f3\u89c6\u9891\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u4e13\u4e3a\u957f\u89c6\u9891\u548c\u590d\u6742\u771f\u5b9e\u573a\u666f\u4e0b\u7684\u97f3\u9891\u3001\u56fe\u50cf\u3001\u89c6\u9891\u8054\u5408\u7406\u89e3\u4e0e\u63a8\u7406\u800c\u8bbe\u8ba1\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u89e3\u51b3\u957f\u89c6\u9891\u97f3\u89c6\u9891\u8054\u5408\u63a8\u7406\u7684\u5f00\u6e90\u6a21\u578b\uff0c\u6570\u636e\u3001\u8bad\u7ec3\u7b56\u7565\u3001\u63a8\u7406\u6846\u67b6\u4e09\u4f4d\u4e00\u4f53\uff0c\u6cdb\u5316\u80fd\u529b\u5f3a\uff0c\u5bf9\u5b66\u672f\u754c\u548c\u5de5\u4e1a\u754c\u5747\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Code review helps maintain software quality before code integration, but it also imposes a substantial workload on human reviewers. As generative artificial intelligence becomes part of software development, code review is shifting from a primarily human review process toward AI-supported review processes in which large language model (LLM) reviewers and AI agent reviewers participate alongside human reviewers. However, we still lack empirical evidence on how this transition affects review efficiency and review quality. In this paper, we study 1.02 million reviewed pull requests from 207 GitHub projects that transition across three code review eras: human-centric review, LLM-assisted review, and agentic code review. We identify three AI reviewer adoption practices: Gradual AI Adoption, Rapid LLM Adoption, and Rapid AI Agent Adoption. We further model pull request review discussions as reviewer interaction sequences to characterize how human, LLM, and AI agent reviewers collaborate during the review process. Our results show that agent-involved collaboration patterns, especially reviews initiated by AI agents or involving multiple AI agents, are associated with faster review decisions under Gradual AI Adoption and Rapid AI Agent Adoption. However, these efficiency gains do not translate into better review quality. We also find that review activity and pull request type remain important across eras, while human-AI collaboration patterns become the strongest explanatory factor for review efficiency once LLM and AI agent reviewers participate. These findings provide empirical guidance for designing AI-supported code review processes that improve efficiency without weakening review quality.", "arxiv_id": "2607.13196", "arxiv_url": "https://arxiv.org/abs/2607.13196", "authors": ["Suzhen Zhong", "Shayan Noei", "Bram Adams", "Ying Zou"], "brief": "\u672c\u6587\u901a\u8fc7\u5206\u6790207\u4e2aGitHub\u9879\u76ee\u7684102\u4e07\u6761Pull Request\uff0c\u5b9e\u8bc1\u7814\u7a76\u4e86\u4ee3\u7801\u5ba1\u67e5\u4ece\u4eba\u5de5\u4e3b\u5bfc\u3001LLM\u8f85\u52a9\u5230AI\u667a\u80fd\u4f53\u53c2\u4e0e\u4e09\u4e2a\u65f6\u4ee3\u7684\u6f14\u53d8\uff0c\u91cf\u5316\u8bc4\u4f30\u4e0d\u540cAI\u91c7\u7528\u6a21\u5f0f\u5bf9\u5ba1\u67e5\u6548\u7387\u4e0e\u8d28\u91cf\u7684\u5f71\u54cd\u3002", "categories": ["cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13196", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u8bc6\u522b\u51fa\u4e09\u79cdAI\u91c7\u7528\u6a21\u5f0f\uff1a\u6e10\u8fdb\u5f0fAI\u91c7\u7528\u3001\u5feb\u901fLLM\u91c7\u7528\u3001\u5feb\u901fAI\u667a\u80fd\u4f53\u91c7\u7528", "AI\u667a\u80fd\u4f53\u53d1\u8d77\u6216\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7684\u5ba1\u67e5\u6a21\u5f0f\u663e\u8457\u52a0\u5feb\u4e86\u5ba1\u67e5\u51b3\u7b56\u901f\u5ea6\uff0c\u4f46\u6548\u7387\u63d0\u5347\u5e76\u672a\u8f6c\u5316\u4e3a\u66f4\u9ad8\u7684\u5ba1\u67e5\u8d28\u91cf", "\u5f15\u5165LLM/AI\u667a\u80fd\u4f53\u540e\uff0c\u4eba\u673a\u534f\u4f5c\u6a21\u5f0f\u6210\u4e3a\u89e3\u91ca\u5ba1\u67e5\u6548\u7387\u7684\u6700\u5f3a\u56e0\u5b50\uff0c\u8d85\u8d8a\u4e86\u5ba1\u67e5\u6d3b\u8dc3\u5ea6\u7b49\u4f20\u7edf\u56e0\u7d20"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u5ba1\u67e5", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 1, "on_hf": true, "organization": "Queen\u0027s University", "pdf_url": "https://arxiv.org/pdf/2607.13196v1", "published_at": "2026-07-14", "score": 0.413, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (24\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.13196.png", "title": "From Human-Centric to Agentic Code Review: The Impact of Different Generations of Generative AI Technology on Review Quality", "tldr": "\u767e\u4e07\u7ea7PR\u6570\u636e\u63ed\u793a\uff1aAI\u667a\u80fd\u4f53\u52a0\u901f\u4ee3\u7801\u5ba1\u67e5\u4f46\u4e0d\u63d0\u5347\u8d28\u91cf", "upvotes": 24, "what_it_is": "\u672c\u6587\u901a\u8fc7\u5206\u6790207\u4e2aGitHub\u9879\u76ee\u7684102\u4e07\u6761Pull Request\uff0c\u5b9e\u8bc1\u7814\u7a76\u4e86\u4ee3\u7801\u5ba1\u67e5\u4ece\u4eba\u5de5\u4e3b\u5bfc\u3001LLM\u8f85\u52a9\u5230AI\u667a\u80fd\u4f53\u53c2\u4e0e\u4e09\u4e2a\u65f6\u4ee3\u7684\u6f14\u53d8\uff0c\u91cf\u5316\u8bc4\u4f30\u4e0d\u540cAI\u91c7\u7528\u6a21\u5f0f\u5bf9\u5ba1\u67e5\u6548\u7387\u4e0e\u8d28\u91cf\u7684\u5f71\u54cd\u3002", "why_notable": "\u9996\u4e2a\u5927\u89c4\u6a21\u5b9e\u8bc1\u7814\u7a76\u8986\u76d6\u4ee3\u7801\u5ba1\u67e5\u4e09\u4e2aAI\u65f6\u4ee3\uff0c\u6570\u636e\u91cf\u8fbe\u767e\u4e07\u7ea7PR\uff0c\u4e3a\u4e1a\u754c\u8bbe\u8ba1AI\u8f85\u52a9\u4ee3\u7801\u5ba1\u67e5\u6d41\u7a0b\u63d0\u4f9b\u4e86\u76f4\u63a5\u7684\u7ecf\u9a8c\u4f9d\u636e\uff0c\u63ed\u793a\u4e86\u6548\u7387\u4e0e\u8d28\u91cf\u4e4b\u95f4\u7684\u6f5c\u5728\u6743\u8861\u3002"}, {"abstract": "We present Xiaomi-Robotics-1, a foundational vision-language-action (VLA) model capable of (1) following diverse language instructions to perform a wide range of mobile manipulation tasks in unseen environments out-of-the-box, and (2) efficiently adapting to novel downstream tasks with minimal fine-tuning data. We propose a two-stage training recipe consisting of pre-training and post-training. During pre-training, we imbue the model with broad and generalizable action-generation capabilities by training on over 100k hours of real-world manipulation trajectories collected via UMI devices. Crucially, we develop a scalable auto-labeling pipeline that annotates trajectory clips with natural languages describing scene state transitions, providing rich and precise conditioning for action learning. During post-training, we aim to align these capabilities with robot embodiments and imperative instructions that humans naturally use to prompt robots. Extensive experiments demonstrate strong scaling behavior. Xiaomi-Robotics-1 consistently improves with increased data scales and model sizes during pre-training. This scaling behavior directly transfers to post-training, where a stronger pre-training model yields better out-of-the-box real-robot performance in unseen environments. Furthermore, Xiaomi-Robotics-1 serves as a strong robot foundation policy that can be efficiently fine-tuned on complex, dexterous tasks with high data efficiency. Across multiple simulation benchmarks, Xiaomi-Robotics-1 outperforms state-of-the-art methods. Notably, it establishes a new state-of-the-art with a 57.6% success rate on RoboCasa365, surpassing the previous best of 46.6%. Furthermore, it achieves an average score of 20.07 on RoboDojo, significantly outperforming the prior state-of-the-art (13.07). Code and model checkpoints will be released. Project page: https://robotics.xiaomi.com/xiaomi-robotics-1.html", "arxiv_id": "2607.15330", "arxiv_url": "https://arxiv.org/abs/2607.15330", "authors": ["Xiaomi Robotics Team", "Jun Guo", "Piaopiao Jin", "Jason Li", "Peiyan Li", "Yingyan Li", "Futeng Liu", "Wanli Peng", "Optimus Qin", "Yifei Su", "Nan Sun", "Qiao Sun", "Runze Suo", "Heyun Wang", "Yunhong Wang", "Rujie Wu", "Caoyu Xia", "Lina Zhang", "Jack Zhao", "Guoliang Chen", "Wenlong Chen", "Xinze He", "Bin Li", "Qing Li", "Zhuorong Li", "Heng Qu", "Wenxuan Song", "Diyun Xiang", "Yifan Xie", "Peiran Xu", "Hangjun Ye", "Wen Ye", "Han Zhao", "Quanyun Zhou"], "brief": "\u5c0f\u7c73\u63d0\u51faXiaomi-Robotics-1\uff0c\u4e00\u4e2a\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u57fa\u7840\u6a21\u578b\uff0c\u901a\u8fc7\u4e24\u9636\u6bb5\u8bad\u7ec3\uff08\u9884\u8bad\u7ec3+\u540e\u8bad\u7ec3\uff09\u5b9e\u73b0\u5f00\u7bb1\u5373\u7528\u7684\u79fb\u52a8\u64cd\u63a7\u6cdb\u5316\u80fd\u529b\u53ca\u9ad8\u6548\u5fae\u8c03\u9002\u5e94\u65b0\u4efb\u52a1\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": "https://github.com/XiaomiRobotics/Xiaomi-Robotics-1", "github_stars": 172, "hf_url": "https://huggingface.co/papers/2607.15330", "impact_score": 9, "is_agent": false, "is_top": true, "key_points": ["\u9884\u8bad\u7ec3\u6570\u636e\u89c4\u6a21\u8d8510\u4e07\u5c0f\u65f6\u771f\u5b9e\u4e16\u754c\u64cd\u63a7\u8f68\u8ff9\uff08\u901a\u8fc7UMI\u8bbe\u5907\u91c7\u96c6\uff09\uff0c\u5e76\u914d\u5957\u53ef\u6269\u5c55\u7684\u81ea\u52a8\u6807\u6ce8\u6d41\u6c34\u7ebf\u751f\u6210\u81ea\u7136\u8bed\u8a00\u573a\u666f\u63cf\u8ff0", "\u5c55\u73b0\u51fa\u5f3a\u70c8\u7684Scaling\u89c4\u5f8b\uff1a\u6570\u636e\u91cf\u4e0e\u6a21\u578b\u89c4\u6a21\u589e\u5927\u5747\u6301\u7eed\u63d0\u5347\u6027\u80fd\uff0c\u4e14\u9884\u8bad\u7ec3\u589e\u76ca\u76f4\u63a5\u8fc1\u79fb\u81f3\u540e\u8bad\u7ec3\u9636\u6bb5", "\u5728RoboCasa365\u4e0a\u4ee557.6%\u6210\u529f\u7387\u8d85\u8d8a\u6b64\u524d\u6700\u4f1846.6%\uff0c\u5728RoboDojo\u4e0a\u4ee520.07\u5206\u5927\u5e45\u8d85\u8d8a\u524dSOTA 13.07\u5206"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u673a\u5668\u4eba\u64cd\u63a7", "\u5927\u89c4\u6a21\u9884\u8bad\u7ec3"], "num_comments": 1, "on_hf": true, "organization": "Xiaomi Robotics", "pdf_url": "https://arxiv.org/pdf/2607.15330v1", "published_at": "2026-07-16", "score": 0.379, "selected_reasons": ["HF trending (56\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.15330.png", "title": "Xiaomi-Robotics-1: Scaling Vision-Language-Action Models with over 100K Hours of Real-World Trajectories", "tldr": "\u5c0f\u7c73\u53d1\u5e03\u673a\u5668\u4eba\u57fa\u7840\u6a21\u578b\uff0c\u57fa\u4e8e10\u4e07\u5c0f\u65f6\u771f\u5b9e\u8f68\u8ff9\u8bad\u7ec3\uff0c\u5237\u65b0\u591a\u9879\u64cd\u63a7\u57fa\u51c6", "upvotes": 56, "what_it_is": "\u5c0f\u7c73\u63d0\u51faXiaomi-Robotics-1\uff0c\u4e00\u4e2a\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u57fa\u7840\u6a21\u578b\uff0c\u901a\u8fc7\u4e24\u9636\u6bb5\u8bad\u7ec3\uff08\u9884\u8bad\u7ec3+\u540e\u8bad\u7ec3\uff09\u5b9e\u73b0\u5f00\u7bb1\u5373\u7528\u7684\u79fb\u52a8\u64cd\u63a7\u6cdb\u5316\u80fd\u529b\u53ca\u9ad8\u6548\u5fae\u8c03\u9002\u5e94\u65b0\u4efb\u52a1\u3002", "why_notable": "10\u4e07\u5c0f\u65f6\u771f\u5b9e\u8f68\u8ff9\u6570\u636e\u89c4\u6a21\u5728\u673a\u5668\u4eba\u9886\u57df\u6781\u4e3a\u7f55\u89c1\uff0c\u9a8c\u8bc1\u4e86VLA\u6a21\u578b\u7684Scaling Law\uff0c\u5bf9\u673a\u5668\u4eba\u901a\u7528\u64cd\u63a7\u57fa\u7840\u6a21\u578b\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\uff0c\u4e14\u4ee3\u7801\u4e0e\u6743\u91cd\u5c06\u5f00\u6e90\u3002"}, {"abstract": "Autonomous negotiation agents are increasingly deployed in high-stakes settings such as insurance and procurement. While cryptographic techniques protect explicitly disclosed constraint values, they fail to address a subtler threat: behavioral privacy leakage, where an adversary infers private constraints from observable negotiation dynamics such as concession trajectories, timing, and convergence patterns. This paper investigates behavioral differential privacy in multi-round negotiation protocols. We design an adaptive stochastic negotiation policy that jointly guarantees $(\\varepsilon, \u03b4)$-differential privacy, almost-sure convergence of the offer sequence (reaching agreement when the counterparty\u0027s reservation value permits), and high negotiation utility. Evaluated on 3,000 synthetic bilateral negotiations, our mechanism reduces adversarial inference accuracy by 43-50% while maintaining a negotiation success rate and utility above 90%, demonstrating that strong privacy guarantees can be achieved without significant loss of performance.", "arxiv_id": "2607.06815", "arxiv_url": "https://arxiv.org/abs/2607.06815", "authors": ["Barkha Rani"], "brief": "\u63d0\u51fa\u4e00\u79cd\u81ea\u9002\u5e94\u968f\u673a\u8c08\u5224\u7b56\u7565\uff0c\u901a\u8fc7\u5dee\u5206\u9690\u79c1\u673a\u5236\u9632\u6b62\u5bf9\u624b\u4ece\u8c08\u5224\u884c\u4e3a\uff08\u8ba9\u6b65\u8f68\u8ff9\u3001\u65f6\u5e8f\u3001\u6536\u655b\u6a21\u5f0f\uff09\u4e2d\u63a8\u65ad\u51fa\u79c1\u5bc6\u7ea6\u675f\u4fe1\u606f\uff0c\u540c\u65f6\u4fdd\u8bc1\u8c08\u5224\u6536\u655b\u6027\u4e0e\u9ad8\u6548\u7528\u3002", "categories": ["cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06815", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5f62\u5f0f\u5316\u5b9a\u4e49\"\u884c\u4e3a\u9690\u79c1\u6cc4\u9732\"\u5a01\u80c1\uff1a\u5bf9 2a4\u660e\u6587\u6570\u636e\u5374\u5ffd\u89c6\u884c\u4e3a\u4fa7\u4fe1\u9053\u7684\u7a7a\u767d\uff0c\u5bf9\u4fdd\u9669\u3001\u91c7\u8d2d\u7b49\u9ad8\u98ce\u9669\u81ea\u52a8\u5316\u8c08\u5224\u573a\u666f\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Security-agent evaluations commonly measure peak offensive capability under generous inference budgets, emphasizing vulnerability discovery, exploit development, penetration testing, and CTF completion. Such measurements are useful but incomplete: in operational security, every reasoning step, tool call, telemetry query, and enrichment request consumes budget. We evaluate language-model security agents through this cost-success lens on offensive Cybench challenges and defensive Splunk BOTS v1 investigation challenges. Instead of reporting only best-case success, we compare models at fixed cost levels and decompose performance by inference spend and tool spend. Our results show distinct scalingregimes for red- and blue-team tasks. Offensive CTF performance improves with additional test-time compute, and scaled open-weight models can approach frontier proprietary systems while remaining cost-competitive. Defensive SOC investigation does not scale in the same way: success depends more heavily on disciplined tool use, telemetry navigation, and selective enrichment than on raw reasoning budget alone. We argue that security-agent benchmarks should measure economic efficiency and operational fit alongside task success. Cost-aware, SOC-native evaluations provide a clearer picture of which models are practically useful today and where defensive agents still need to improve. We present an interactive website with our results https://evals.frontier.security.", "arxiv_id": "2607.15263", "arxiv_url": "https://arxiv.org/abs/2607.15263", "authors": ["Paul Kassianik", "Blaine Nelson", "Yaron Singer"], "brief": "\u672c\u6587\u63d0\u51fa\u8d85\u8d8a\u6210\u529f\u7387\u7684\u5b89\u5168\u667a\u80fd\u4f53\u8bc4\u4f30\u65b9\u6cd5\uff0c\u5728\u56fa\u5b9a\u9884\u7b97\u7ea6\u675f\u4e0b\u540c\u65f6\u8bc4\u4f30\u653b\u51fb\u6027\uff08CTF\u6311\u6218\uff09\u548c\u9632\u5fa1\u6027\uff08Splunk SOC\u8c03\u67e5\uff09\u4efb\u52a1\uff0c\u5206\u89e3\u63a8\u7406\u5f00\u9500\u4e0e\u5de5\u5177\u8c03\u7528\u5f00\u9500\u5bf9\u6027\u80fd\u7684\u5f71\u54cd\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15263", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u653b\u51fb\u6027CTF\u4efb\u52a1\u6027\u80fd\u968f\u6d4b\u8bd5\u65f6\u8ba1\u7b97\u91cf\u589e\u52a0\u800c\u63d0\u5347\uff0c\u5f00\u6e90\u6a21\u578b\u5728\u6210\u672c\u7ade\u4e89\u529b\u4e0a\u53ef\u63a5\u8fd1\u524d\u6cbf\u95ed\u6e90\u6a21\u578b", "\u9632\u5fa1\u6027SOC\u8c03\u67e5\u4efb\u52a1\u4e0d\u9075\u5faa\u76f8\u540c\u7684\u6269\u5c55\u89c4\u5f8b\uff0c\u6210\u529f\u66f4\u4f9d\u8d56\u4e8e\u89c4\u8303\u7684\u5de5\u5177\u4f7f\u7528\u548c\u9065\u6d4b\u5bfc\u822a\uff0c\u800c\u975e\u5355\u7eaf\u589e\u52a0\u63a8\u7406\u9884\u7b97", "\u63d0\u51fa\u5c06\u7ecf\u6d4e\u6548\u7387\u548c\u64cd\u4f5c\u9002\u914d\u6027\u7eb3\u5165\u5b89\u5168\u667a\u80fd\u4f53\u57fa\u51c6\uff0c\u63ed\u793a\u653b\u9632\u4efb\u52a1\u5728\u8d44\u6e90\u5229\u7528\u6a21\u5f0f\u4e0a\u7684\u672c\u8d28\u5dee\u5f02"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u8bc4\u4f30", "\u5927\u8bed\u8a00\u6a21\u578b", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15263v2", "published_at": "2026-07-16", "score": 0.366, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (3\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.15263.png", "title": "Beyond Success Rate: Cost-Aware Evaluation of Offensive and Defensive Security Agents", "tldr": "\u63d0\u51fa\u6210\u672c\u611f\u77e5\u8bc4\u4f30\u6846\u67b6\uff0c\u4ece\u7ecf\u6d4e\u6548\u7387\u89d2\u5ea6\u91cd\u65b0\u8bc4\u4f30\u653b\u9632\u5b89\u5168\u667a\u80fd\u4f53\u7684\u5b9e\u9645\u4ef7\u503c", "upvotes": 3, "what_it_is": "\u672c\u6587\u63d0\u51fa\u8d85\u8d8a\u6210\u529f\u7387\u7684\u5b89\u5168\u667a\u80fd\u4f53\u8bc4\u4f30\u65b9\u6cd5\uff0c\u5728\u56fa\u5b9a\u9884\u7b97\u7ea6\u675f\u4e0b\u540c\u65f6\u8bc4\u4f30\u653b\u51fb\u6027\uff08CTF\u6311\u6218\uff09\u548c\u9632\u5fa1\u6027\uff08Splunk SOC\u8c03\u67e5\uff09\u4efb\u52a1\uff0c\u5206\u89e3\u63a8\u7406\u5f00\u9500\u4e0e\u5de5\u5177\u8c03\u7528\u5f00\u9500\u5bf9\u6027\u80fd\u7684\u5f71\u54cd\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u6210\u672c\u7ef4\u5ea6\u5f15\u5165\u5b89\u5168\u667a\u80fd\u4f53\u8bc4\u4f30\uff0c\u53d1\u73b0\u653b\u9632\u4efb\u52a1\u5b58\u5728\u622a\u7136\u4e0d\u540c\u7684\u6269\u5c55\u89c4\u5f8b\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u5b89\u5168AI\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\uff0c\u6539\u53d8\u4e86\u4ec5\u770b\u5cf0\u503c\u6210\u529f\u7387\u7684\u8bc4\u4f30\u8303\u5f0f\u3002"}, {"abstract": "Agentic computer-use RL is reported in single runs, and those numbers mislead. Using verifier-guided repair of a 35B computer-use agent (CUA) across five oracle-graded environments, we show a repaired policy\u0027s success rate is dominated by upstream variance: a variance-components decomposition across three cells (crossed data-draw $\\times$ seed grid, bootstrap CIs) finds evaluation variance negligible ($\u03c3_{\\mathrm{eval}} \\approx 0$) and the training-seed effect small everywhere ($\\leq 10\\%$); instead it splits between the data draw and run-to-run nondeterminism, the data draw\u0027s share rising to dominant ($48\\%$) on the hardest cell. There the run-to-run distribution is bimodal (Hartigan dip $p=0.07$, $k=10$), so a single run has roughly a 30% chance of the failure mode and mean$\\pm$std is the wrong summary. On that footing, two findings hold. First, repairability is two-tier in how constrained the corrective action is: a single fixed token installs reliably (done-detection $0.97\\pm0.06$), while open-ended corrections are only partial -- spatial-coordinate clicks (grounding $0.53\\pm0.35$) and a generative field-fill ($0.14\\pm0.04$). Second, the frame-level repair transfers to task success only when the corrective action is the task\u0027s sole remaining blocker (LinkedIn 8/20 vs. base 0/15, Fisher $p=0.006$). We caught two of our own over-claims -- a sample-efficiency curve and a \u0027grounding cannot be bought\u0027 boundary -- only by replicating across seeds; a stress test makes the stakes external: a single-run improvement of the size this field publishes would have the wrong sign roughly one-third of the time in a comparable regime. We release a library (cua_reliability) for routine k-seed reporting. The apparatus is, to our knowledge, the first multimodal segment-aggregated on-policy self-distillation (SA-OPSD) update on a real 35B CUA policy.", "arxiv_id": "2607.17136", "arxiv_url": "https://arxiv.org/abs/2607.17136", "authors": ["Barada Sahu", "Shivesh Pandey"], "brief": "\u672c\u6587\u901a\u8fc7\u5bf935B\u8ba1\u7b97\u673a\u4f7f\u7528\u667a\u80fd\u4f53\uff08CUA\uff09\u8fdb\u884c\u9a8c\u8bc1\u5668\u5f15\u5bfc\u7684\u4fee\u590d\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u9886\u57df\u5355\u6b21\u8fd0\u884c\u62a5\u544a\u7684\u7edf\u8ba1\u53ef\u9760\u6027\u95ee\u9898\uff0c\u5e76\u63d0\u51fa\u65b9\u5dee\u5206\u89e3\u6846\u67b6\u4e0e\u591a\u79cd\u5b50\u8bc4\u4f30\u89c4\u8303\u3002", "categories": ["cs.SE", "cs.AI", "cs.HC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17136", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u65b9\u5dee\u5206\u89e3\u663e\u793a\u8bc4\u4f30\u65b9\u5dee\u51e0\u4e4e\u4e3a\u96f6\uff0c\u4e3b\u8981\u65b9\u5dee\u6765\u6e90\u662f\u6570\u636e\u62bd\u53d6\uff08\u6700\u96be\u4efb\u52a1\u4e2d\u536048%\uff09\u548c\u8fd0\u884c\u95f4\u4e0d\u786e\u5b9a\u6027\uff0c\u800c\u975e\u8bad\u7ec3\u79cd\u5b50", "\u4fee\u590d\u80fd\u529b\u5448\u4e24\u7ea7\u5206\u5316\uff1a\u56fa\u5b9atoken\u4fee\u590d\uff08\u5b8c\u6210\u68c0\u6d4b0.97\u00b10.06\uff09\u53ef\u9760\uff0c\u800c\u5f00\u653e\u5f0f\u4fee\u590d\uff08\u5750\u6807\u70b9\u51fb0.53\u00b10.35\uff0c\u5b57\u6bb5\u586b\u51990.14\u00b10.04\uff09\u6548\u679c\u6709\u9650", "\u5355\u6b21\u8fd0\u884c\u6539\u8fdb\u5728\u53ef\u6bd4\u573a\u666f\u4e0b\u7ea61/3\u6982\u7387\u7b26\u53f7\u9519\u8bef\uff1b\u4f5c\u8005\u53d1\u5e03cua_reliability\u5e93\u4ee5\u652f\u6301\u5e38\u89c4k\u79cd\u5b50\u62a5\u544a"], "keywords": ["\u667a\u80fd\u4f53", "\u53ef\u9760\u6027\u8bc4\u4f30", "\u8ba1\u7b97\u673a\u4f7f\u7528", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17136v1", "published_at": "2026-07-19", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Teach it to stop, not just to click", "tldr": "\u5355\u6b21\u8fd0\u884c\u7684\u8ba1\u7b97\u673a\u4f7f\u7528\u667a\u80fd\u4f53\u8bc4\u4f30\u7ed3\u679c\u4e25\u91cd\u8bef\u5bfc\uff0c\u9700\u591a\u79cd\u5b50\u590d\u73b0\u624d\u53ef\u9760", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7\u5bf935B\u8ba1\u7b97\u673a\u4f7f\u7528\u667a\u80fd\u4f53\uff08CUA\uff09\u8fdb\u884c\u9a8c\u8bc1\u5668\u5f15\u5bfc\u7684\u4fee\u590d\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u9886\u57df\u5355\u6b21\u8fd0\u884c\u62a5\u544a\u7684\u7edf\u8ba1\u53ef\u9760\u6027\u95ee\u9898\uff0c\u5e76\u63d0\u51fa\u65b9\u5dee\u5206\u89e3\u6846\u67b6\u4e0e\u591a\u79cd\u5b50\u8bc4\u4f30\u89c4\u8303\u3002", "why_notable": "\u76f4\u63a5\u6311\u6218\u5f53\u524dagentic AI\u8bc4\u4f30\u8303\u5f0f\uff0c\u8bc1\u660e\u5355\u6b21\u8fd0\u884c\u7ed3\u8bba\u4e0d\u53ef\u9760\uff0c\u5e76\u63d0\u4f9b\u9996\u4e2a\u9488\u5bf9\u771f\u5b9e35B CUA\u7b56\u7565\u7684\u591a\u6a21\u6001\u7247\u6bb5\u805a\u5408\u5728\u7ebf\u81ea\u84b8\u998f\uff08SA-OPSD\uff09\u66f4\u65b0\u65b9\u6cd5\uff0c\u5bf9\u6574\u4e2a\u9886\u57df\u7684\u8bc4\u4f30\u6807\u51c6\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "GUI agents must reason about how actions transform interface states, but end-to-end success rates entangle this ability with perception, grounding, planning, and recovery. We introduce EvoGUI, a diagnostic framework that converts normalized GUI trajectories into three complementary visual question answering probes: temporal ordering, inverse action/value prediction, and contrastive one-step successor discrimination. Their labels are derived from trajectory order and logged actions, requiring no additional task-label annotation after trajectory normalization. We instantiate EvoGUI-Bench from Mind2Web and WebLINX, yielding 3,000 instances across 120 domains, and evaluate 28 vision-language model configurations zero-shot. The strongest model reaches only 60.4 EvoGain, while model scale and GUI specialization do not reliably predict performance. These results establish EvoGUI-Bench as a scalable diagnostic complement to end-to-end GUI-agent evaluation while exposing substantial headroom in state-transition understanding. The source code is publicly available at https://github.com/Yyhhh6/EvoGUI.", "arxiv_id": "2607.17050", "arxiv_url": "https://arxiv.org/abs/2607.17050", "authors": ["Yaohan Yang", "Minglei Shi", "Borui Zhang", "Jie Zhou", "Jiwen Lu"], "brief": "\u63d0\u51faEvoGUI\u8bca\u65ad\u6846\u67b6\uff0c\u5c06GUI\u64cd\u4f5c\u8f68\u8ff9\u8f6c\u5316\u4e3a\u4e09\u7c7b\u89c6\u89c9\u95ee\u7b54\u63a2\u9488\uff08\u65f6\u5e8f\u6392\u5e8f\u3001\u9006\u52a8\u4f5c\u9884\u6d4b\u3001\u5355\u6b65\u540e\u7ee7\u8fa8\u522b\uff09\uff0c\u6784\u5efa\u542b3000\u4e2a\u5b9e\u4f8b\u7684EvoGUI-Bench\uff0c\u4e13\u95e8\u8bc4\u4f30GUI\u667a\u80fd\u4f53\u5bf9\u754c\u9762\u72b6\u6001\u8f6c\u6362\u7684\u7406\u89e3\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17050", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u7c7b\u4e92\u8865\u63a2\u9488\uff1a\u65f6\u5e8f\u6392\u5e8f\u3001\u9006\u52a8\u4f5c/\u503c\u9884\u6d4b\u3001\u5bf9\u6bd4\u5f0f\u5355\u6b65\u540e\u7ee7\u8fa8\u522b\uff0c\u6807\u7b7e\u81ea\u52a8\u4ece\u8f68\u8ff9\u4e2d\u63d0\u53d6\uff0c\u65e0\u9700\u989d\u5916\u6807\u6ce8", "\u57fa\u4e8eMind2Web\u548cWebLINX\u6784\u5efa\uff0c\u8986\u76d6120\u4e2a\u9886\u57df\u51713000\u4e2a\u5b9e\u4f8b\uff0c\u5bf928\u79cd\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u8fdb\u884c\u96f6\u6837\u672c\u8bc4\u4f30", "\u6700\u5f3a\u6a21\u578bEvoGain\u4ec5\u8fbe60.4\u5206\uff0c\u4e14\u6a21\u578b\u89c4\u6a21\u4e0eGUI\u4e13\u9879\u8bad\u7ec3\u5747\u4e0d\u80fd\u53ef\u9760\u9884\u6d4b\u6027\u80fd\uff0c\u63ed\u793a\u663e\u8457\u63d0\u5347\u7a7a\u95f4"], "keywords": ["\u667a\u80fd\u4f53", "GUI", "\u591a\u6a21\u6001", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17050v1", "published_at": "2026-07-19", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EvoGUI: An Evolution-Aware Benchmark for GUI State-Transition Understanding", "tldr": "EvoGUI\uff1a\u4e13\u95e8\u8bc4\u4f30GUI\u667a\u80fd\u4f53\u754c\u9762\u72b6\u6001\u8f6c\u6362\u7406\u89e3\u80fd\u529b\u7684\u8bca\u65ad\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faEvoGUI\u8bca\u65ad\u6846\u67b6\uff0c\u5c06GUI\u64cd\u4f5c\u8f68\u8ff9\u8f6c\u5316\u4e3a\u4e09\u7c7b\u89c6\u89c9\u95ee\u7b54\u63a2\u9488\uff08\u65f6\u5e8f\u6392\u5e8f\u3001\u9006\u52a8\u4f5c\u9884\u6d4b\u3001\u5355\u6b65\u540e\u7ee7\u8fa8\u522b\uff09\uff0c\u6784\u5efa\u542b3000\u4e2a\u5b9e\u4f8b\u7684EvoGUI-Bench\uff0c\u4e13\u95e8\u8bc4\u4f30GUI\u667a\u80fd\u4f53\u5bf9\u754c\u9762\u72b6\u6001\u8f6c\u6362\u7684\u7406\u89e3\u80fd\u529b\u3002", "why_notable": "\u9996\u4e2a\u4e13\u6ce8\u4e8eGUI\u72b6\u6001\u8f6c\u6362\u7406\u89e3\u7684\u8bca\u65ad\u6027\u57fa\u51c6\uff0c\u5c06\u7aef\u5230\u7aef\u6210\u529f\u7387\u4e2d\u6df7\u6742\u7684\u611f\u77e5\u3001\u89c4\u5212\u7b49\u80fd\u529b\u89e3\u8026\uff0c\u4e3aGUI\u667a\u80fd\u4f53\u80fd\u529b\u5206\u6790\u63d0\u4f9b\u7cbe\u7ec6\u5316\u8bc4\u4f30\u5de5\u5177\uff0c\u4e14\u6807\u7b7e\u751f\u6210\u81ea\u52a8\u5316\u3001\u53ef\u6269\u5c55\u3002"}, {"abstract": "Large language model agents solve tasks by generating trajectories that interleave planning, tool calls, and intermediate results. Current evaluation metrics reduce such a trajectory to a binary success flag or compare it against a reference by exact matching. A success flag cannot distinguish a sound solution from one that succeeds by luck, and says nothing about why a failed run went wrong. Exact matching penalizes plans that are valid but reordered or decomposed differently from the reference. We reframe trajectory evaluation as a distance between the agent\u0027s execution graph and a set of valid solution graphs, and instantiate it via an unbalanced fused Gromov-Wasserstein transport problem over attributed dependency graphs. The resulting score, termed \\otap{} (Optimal Transport for Agentic Planning), is a pseudo-metric that is provably invariant to dependency-preserving reorderings and has bounded sensitivity to redundant steps. Its unbalanced marginals handle missing or hallucinated steps without forcing a match, and its soft coupling accommodates variation in plan granularity. On controlled perturbations and three public benchmarks, \\otap{} separates valid from invalid trajectories in a regime where semantics-only metrics score below chance. Its accuracy is highest when the dependency graph is recovered exactly, and drops only when the graph is inferred heuristically from free-text traces.", "arxiv_id": "2607.17082", "arxiv_url": "https://arxiv.org/abs/2607.17082", "authors": ["Babak Barazandeh", "Subhabrata Majumdar", "George Michailidis"], "brief": "\u63d0\u51faOTAP\uff08Optimal Transport for Agentic Planning\uff09\uff0c\u5c06\u667a\u80fd\u4f53\u8f68\u8ff9\u8bc4\u4f30\u91cd\u6784\u4e3a\u6267\u884c\u56fe\u4e0e\u6709\u6548\u89e3\u56fe\u4e4b\u95f4\u7684\u8ddd\u79bb\u5ea6\u91cf\uff0c\u57fa\u4e8e\u975e\u5e73\u8861\u878d\u5408Gromov-Wasserstein\u4f20\u8f93\u95ee\u9898\u5b9e\u73b0\uff0c\u80fd\u591f\u7ed3\u6784\u611f\u77e5\u5730\u8bc4\u4f30\u89c4\u5212\u4e0e\u6267\u884c\u8d28\u91cf\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17082", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u8f68\u8ff9\u5efa\u6a21\u4e3a\u5e26\u5c5e\u6027\u4f9d\u8d56\u56fe\uff0c\u901a\u8fc7\u975e\u5e73\u8861\u878d\u5408Gromov-Wasserstein\u6700\u4f18\u4f20\u8f93\u8ba1\u7b97\u4f2a\u5ea6\u91cf\uff0c\u7406\u8bba\u4e0a\u5bf9\u4fdd\u4f9d\u8d56\u5173\u7cfb\u7684\u91cd\u6392\u5e8f\u5177\u6709\u4e0d\u53d8\u6027", "\u975e\u5e73\u8861\u8fb9\u9645\u8bbe\u8ba1\u53ef\u5904\u7406\u7f3a\u5931\u6b65\u9aa4\u6216\u5e7b\u89c9\u6b65\u9aa4\uff0c\u8f6f\u8026\u5408\u673a\u5236\u9002\u5e94\u4e0d\u540c\u7c92\u5ea6\u7684\u89c4\u5212\u65b9\u6848\uff0c\u65e0\u9700\u5f3a\u5236\u4e00\u4e00\u5339\u914d", "\u5728\u53d7\u63a7\u6270\u52a8\u5b9e\u9a8c\u548c\u4e09\u4e2a\u516c\u5f00\u57fa\u51c6\u4e0a\uff0cOTAP\u5728\u8bed\u4e49\u6307\u6807\u8868\u73b0\u4f4e\u4e8e\u968f\u673a\u6c34\u5e73\u7684\u533a\u95f4\u5185\u4ecd\u80fd\u6709\u6548\u533a\u5206\u6709\u6548\u4e0e\u65e0\u6548\u8f68\u8ff9"], "keywords": ["\u667a\u80fd\u4f53", "\u8f68\u8ff9\u8bc4\u4f30", "\u6700\u4f18\u4f20\u8f93", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17082v1", "published_at": "2026-07-19", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Otap:Structure-Aware Optimal Transport for Evaluating Planning and Execution in Agent Trajectories", "tldr": "\u7528\u6700\u4f18\u4f20\u8f93\u7406\u8bba\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u8f68\u8ff9\u8d28\u91cf\uff0c\u533a\u5206\u6709\u6548\u4e0e\u65e0\u6548\u6267\u884c\u8def\u5f84", "upvotes": 0, "what_it_is": "\u63d0\u51faOTAP\uff08Optimal Transport for Agentic Planning\uff09\uff0c\u5c06\u667a\u80fd\u4f53\u8f68\u8ff9\u8bc4\u4f30\u91cd\u6784\u4e3a\u6267\u884c\u56fe\u4e0e\u6709\u6548\u89e3\u56fe\u4e4b\u95f4\u7684\u8ddd\u79bb\u5ea6\u91cf\uff0c\u57fa\u4e8e\u975e\u5e73\u8861\u878d\u5408Gromov-Wasserstein\u4f20\u8f93\u95ee\u9898\u5b9e\u73b0\uff0c\u80fd\u591f\u7ed3\u6784\u611f\u77e5\u5730\u8bc4\u4f30\u89c4\u5212\u4e0e\u6267\u884c\u8d28\u91cf\u3002", "why_notable": "\u73b0\u6709\u8bc4\u4f30\u6307\u6807\uff08\u4e8c\u5143\u6210\u529f\u6807\u5fd7\u6216\u7cbe\u786e\u5339\u914d\uff09\u65e0\u6cd5\u533a\u5206\u8fd0\u6c14\u6210\u529f\u4e0e\u5408\u7406\u89c4\u5212\uff0cOTAP\u63d0\u4f9b\u4e86\u9996\u4e2a\u7ed3\u6784\u611f\u77e5\u7684\u8f68\u8ff9\u8bc4\u4f30\u6846\u67b6\uff0c\u5bf9\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u8c03\u8bd5\u4e0e\u6539\u8fdb\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Industrial Video Anomaly Detection (IVAD) aims to identify anomalous objects and events in an industrial process, which is crucial for modern manufacturing and quality control systems. Existing VLM-based anomaly reasoning methods are capable of detecting open-ended anomalies in general domains. However, their performance declines in industrial settings characterized by intricate object transformations, strict physics, and procedural constraints. To tackle the complexity of such interaction-intensive detection, we introduce a training-free agentic framework for anomaly detection free of domain-specific knowledge, emphasizing object state evolution like humans inspectors. It is designed to track spatial-temporal dynamics and underlying transformations of detected objects over time, and then reason over the object-wise temporal state trajectories to identify abnormal objects in grounded frames. Our method overcomes limitations of prior approaches that rely on retraining on normal clips or injecting domain knowledge as context for test-time inference. Extensive experiments on three IVAD datasets demonstrate that our method outperforms frontier VLMs, agentic frameworks, and traditional VAD methods fine-tuned on the respective datasets, while providing interpretable reports over anomaly processes and types.", "arxiv_id": "2607.18142", "arxiv_url": "https://arxiv.org/abs/2607.18142", "authors": ["Mei Yuan", "Qi Long", "Qifeng Wu", "Zhenyang Li", "Yizhou Zhao", "Lei Wang", "Yang Liu", "Min Xu"], "brief": "\u63d0\u51faO-VAD\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u8ffd\u8e2a\u5de5\u4e1a\u89c6\u9891\u4e2d\u5bf9\u8c61\u7684\u65f6\u7a7a\u52a8\u6001\u4e0e\u72b6\u6001\u6f14\u53d8\u8f68\u8ff9\uff0c\u63a8\u7406\u8bc6\u522b\u5f02\u5e38\u5bf9\u8c61\uff0c\u65e0\u9700\u9886\u57df\u77e5\u8bc6\u6216\u6b63\u5e38\u6837\u672c\u5fae\u8c03\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18142", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4ee5\u5bf9\u8c61\u4e3a\u4e2d\u5fc3\u7684\u65f6\u5e8f\u72b6\u6001\u8f68\u8ff9\u8ffd\u8e2a\uff0c\u6a21\u62df\u4eba\u7c7b\u68c0\u67e5\u5458\u5173\u6ce8\u7269\u4f53\u72b6\u6001\u53d8\u5316\u7684\u65b9\u5f0f", "\u5b8c\u5168\u65e0\u9700\u8bad\u7ec3\uff08training-free\uff09\uff0c\u4e0d\u4f9d\u8d56\u9886\u57df\u7279\u5b9a\u77e5\u8bc6\u6216\u6b63\u5e38\u89c6\u9891\u7247\u6bb5\u91cd\u8bad\u7ec3", "\u5728\u4e09\u4e2a\u5de5\u4e1a\u89c6\u9891\u5f02\u5e38\u68c0\u6d4b\u6570\u636e\u96c6\u4e0a\u8d85\u8d8a\u524d\u6cbfVLM\u3001\u667a\u80fd\u4f53\u6846\u67b6\u53ca\u6570\u636e\u96c6\u5fae\u8c03\u7684\u4f20\u7edfVAD\u65b9\u6cd5\uff0c\u5e76\u8f93\u51fa\u53ef\u89e3\u91ca\u62a5\u544a"], "keywords": ["\u5f02\u5e38\u68c0\u6d4b", "\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18142v1", "published_at": "2026-07-20", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "O-VAD: Industrial Video Anomaly Detection through Object-Centric Tracking and Reasoning", "tldr": "\u65e0\u9700\u8bad\u7ec3\u7684\u4ee5\u5bf9\u8c61\u4e3a\u4e2d\u5fc3\u7684\u5de5\u4e1a\u89c6\u9891\u5f02\u5e38\u68c0\u6d4b\u667a\u80fd\u4f53\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faO-VAD\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u8ffd\u8e2a\u5de5\u4e1a\u89c6\u9891\u4e2d\u5bf9\u8c61\u7684\u65f6\u7a7a\u52a8\u6001\u4e0e\u72b6\u6001\u6f14\u53d8\u8f68\u8ff9\uff0c\u63a8\u7406\u8bc6\u522b\u5f02\u5e38\u5bf9\u8c61\uff0c\u65e0\u9700\u9886\u57df\u77e5\u8bc6\u6216\u6b63\u5e38\u6837\u672c\u5fae\u8c03\u3002", "why_notable": "\u9996\u4e2a\u5c06\u5bf9\u8c61\u7ea7\u65f6\u5e8f\u8ffd\u8e2a\u4e0eVLM\u63a8\u7406\u7ed3\u5408\u7684\u65e0\u8bad\u7ec3\u5de5\u4e1a\u5f02\u5e38\u68c0\u6d4b\u6846\u67b6\uff0c\u7a81\u7834\u4e86\u73b0\u6709\u65b9\u6cd5\u4f9d\u8d56\u9886\u57df\u77e5\u8bc6\u6216\u91cd\u8bad\u7ec3\u7684\u74f6\u9888\uff0c\u5177\u5907\u5f3a\u6cdb\u5316\u6027\u4e0e\u53ef\u89e3\u91ca\u6027\uff0c\u5bf9\u5de5\u4e1a\u8d28\u68c0\u573a\u666f\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multimodal video misinformation detection is commonly formulated as a holistic video-understanding task, where the entire video and its associated content are processed and judged in a single pass. However, real-world misinformation often exhibits a sparse and compositional evidence structure: a reliable decision may depend on only a few coupled clues, while most video content contributes limited additional information. Exhaustive multimodal reasoning may therefore introduce substantial redundancy and obscure decisive evidence. This motivates decoupling evidence acquisition from verification: first identifying sparse, decision-relevant clues and then judging veracity based on the acquired evidence. Accordingly, we propose SIEVE, a framework for Sparse Interactive Evidence Verification via Extraction in multimodal video misinformation detection. An evidence-seeking agent actively explores the available multimodal evidence and constructs a compact evidence package, which is then used by a verifier to determine veracity. The agent is trained with supervised evidence-seeking trajectories and an evidence-aware reinforcement learning objective that promotes informative evidence acquisition while discouraging unnecessary or invalid interactions. Experiments on multiple video misinformation benchmarks show that SIEVE consistently outperforms the evaluated baselines and supports reliable verification using compact evidence packages. Moreover, the resulting acquisition process provides an explicit and inspectable evidence trail, improving the transparency and groundedness of multimodal misinformation detection.", "arxiv_id": "2607.18080", "arxiv_url": "https://arxiv.org/abs/2607.18080", "authors": ["Haochen Zhao", "Yongxiu Xu", "Xinkui Lin", "Dong Xie", "Jiarui Lu", "Yuqi Qian", "Yubin Wang", "Hongbo Xu", "Gaopeng Gou"], "brief": "\u63d0\u51faSIEVE\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u865a\u5047\u4fe1\u606f\u68c0\u6d4b\u89e3\u8026\u4e3a\u4e24\u9636\u6bb5\uff1a\u8bc1\u636e\u5bfb\u627e\u667a\u80fd\u4f53\u4e3b\u52a8\u63a2\u7d22\u5e76\u6784\u5efa\u7d27\u51d1\u8bc1\u636e\u5305\uff0c\u518d\u7531\u9a8c\u8bc1\u5668\u5224\u65ad\u771f\u5b9e\u6027\uff0c\u907f\u514d\u5168\u91cf\u591a\u6a21\u6001\u63a8\u7406\u5e26\u6765\u7684\u5197\u4f59\u5e72\u6270\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18080", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u6d1e\u5bdf\uff1a\u771f\u5b9e\u865a\u5047\u4fe1\u606f\u5177\u6709\u7a00\u758f\u7ec4\u5408\u8bc1\u636e\u7ed3\u6784\uff0c\u5c11\u6570\u5173\u952e\u7ebf\u7d22\u5373\u53ef\u652f\u6491\u51b3\u7b56", "\u667a\u80fd\u4f53\u901a\u8fc7\u76d1\u7763\u8f68\u8ff9\u8bad\u7ec3\u4e0e\u8bc1\u636e\u611f\u77e5\u5f3a\u5316\u5b66\u4e60\u76ee\u6807\uff0c\u5b66\u4f1a\u9ad8\u6548\u83b7\u53d6\u4fe1\u606f\u6027\u8bc1\u636e\u5e76\u6291\u5236\u65e0\u6548\u4ea4\u4e92", "\u5728\u591a\u4e2a\u89c6\u9891\u865a\u5047\u4fe1\u606f\u57fa\u51c6\u4e0a\u6301\u7eed\u8d85\u8d8a\u57fa\u7ebf\uff0c\u540c\u65f6\u63d0\u4f9b\u53ef\u68c0\u67e5\u7684\u8bc1\u636e\u94fe\uff0c\u63d0\u5347\u68c0\u6d4b\u900f\u660e\u5ea6"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u865a\u5047\u4fe1\u606f\u68c0\u6d4b", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18080v1", "published_at": "2026-07-20", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Sparse Evidence Can Suffice: Agentic Evidence Seeking for Multimodal Video Misinformation Detection", "tldr": "\u63d0\u51faSIEVE\u6846\u67b6\uff0c\u7528\u7a00\u758f\u8bc1\u636e\u5bfb\u627e\u667a\u80fd\u4f53\u9ad8\u6548\u68c0\u6d4b\u591a\u6a21\u6001\u89c6\u9891\u865a\u5047\u4fe1\u606f", "upvotes": 0, "what_it_is": "\u63d0\u51faSIEVE\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u865a\u5047\u4fe1\u606f\u68c0\u6d4b\u89e3\u8026\u4e3a\u4e24\u9636\u6bb5\uff1a\u8bc1\u636e\u5bfb\u627e\u667a\u80fd\u4f53\u4e3b\u52a8\u63a2\u7d22\u5e76\u6784\u5efa\u7d27\u51d1\u8bc1\u636e\u5305\uff0c\u518d\u7531\u9a8c\u8bc1\u5668\u5224\u65ad\u771f\u5b9e\u6027\uff0c\u907f\u514d\u5168\u91cf\u591a\u6a21\u6001\u63a8\u7406\u5e26\u6765\u7684\u5197\u4f59\u5e72\u6270\u3002", "why_notable": "\u9996\u6b21\u5c06\u7a00\u758f\u8bc1\u636e\u5bfb\u627e\u8303\u5f0f\u5f15\u5165\u591a\u6a21\u6001\u89c6\u9891\u865a\u5047\u4fe1\u606f\u68c0\u6d4b\uff0c\u517c\u987e\u6548\u7387\u4e0e\u53ef\u89e3\u91ca\u6027\uff0c\u5bf9\u5185\u5bb9\u5ba1\u6838\u5b9e\u9645\u5e94\u7528\u5177\u6709\u91cd\u8981\u4ef7\u503c"}, {"abstract": "Recent work leverages Large Language Models (LLMs) to generate executable code for pedagogical animations using libraries such as Manim. However, ensuring spatial correctness and visual legibility remains challenging, as existing frameworks emphasize pedagogical content while overlooking geometric occlusions. We propose the Symbolic Geometric Agent (SGA), a plug-and-play module for code-centric animation pipelines that intercepts LLM-generated code, performs partial execution to extract symbolic scene graphs, and applies targeted refinement when spatial conflicts are detected. We further introduce the Manim Visual Quality Score (MVQS), a deterministic rendering-free proxy for spatial integrity. Experiments on the MMMC-Code benchmark across four LLM backbones and two agentic pipelines show that SGA achieves a peak MVQS of 73.11 (Code2Video + GPT-5.1), corresponding to a 16.1% relative improvement over the raw baseline, and improves MVQS in 7 of 8 backbone x pipeline configurations.", "arxiv_id": "2607.18116", "arxiv_url": "https://arxiv.org/abs/2607.18116", "authors": ["Lopez Jhon", "Hinojosa Carlos", "Ghanem Bernard"], "brief": "SGA\uff08\u7b26\u53f7\u51e0\u4f55\u667a\u80fd\u4f53\uff09\u662f\u4e00\u4e2a\u5373\u63d2\u5373\u7528\u6a21\u5757\uff0c\u62e6\u622aLLM\u751f\u6210\u7684Manim\u52a8\u753b\u4ee3\u7801\uff0c\u63d0\u53d6\u7b26\u53f7\u573a\u666f\u56fe\u5e76\u68c0\u6d4b\u7a7a\u95f4\u51b2\u7a81\uff0c\u81ea\u52a8\u4fee\u6b63\u51e0\u4f55\u906e\u6321\u95ee\u9898\uff1b\u540c\u65f6\u63d0\u51fa\u65e0\u9700\u6e32\u67d3\u7684\u7a7a\u95f4\u8d28\u91cf\u8bc4\u4f30\u6307\u6807MVQS\u3002", "categories": ["cs.AI", "cs.CV", "cs.GR", "cs.MA", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18116", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u5373\u63d2\u5373\u7528\u8bbe\u8ba1\uff1aSGA\u53ef\u5d4c\u5165\u4efb\u610f\u4ee5\u4ee3\u7801\u4e3a\u4e2d\u5fc3\u7684\u52a8\u753b\u751f\u6210\u6d41\u6c34\u7ebf\uff0c\u65e0\u9700\u4fee\u6539\u539f\u6709\u6846\u67b6", "\u5728MMMC-Code\u57fa\u51c6\u4e0a\uff0c\u7ed3\u5408GPT-4.1\u7684\u6700\u4f18\u914d\u7f6eMVQS\u8fbe73.11\uff0c\u76f8\u5bf9\u57fa\u7ebf\u63d0\u534716.1%", "\u57288\u79cd\u9aa8\u5e72\u6a21\u578b\u00d7\u6d41\u6c34\u7ebf\u7ec4\u5408\u4e2d7\u79cd\u5747\u6709\u63d0\u5347\uff0c\u6cdb\u5316\u6027\u5f3a"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u591a\u6a21\u6001", "\u6559\u80b2AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18116v1", "published_at": "2026-07-20", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "SGA: Plug\u0026Play Geometric Verification for Educational Video Synthesis", "tldr": "\u63d0\u51faSGA\u6a21\u5757\uff0c\u901a\u8fc7\u7b26\u53f7\u573a\u666f\u56fe\u68c0\u6d4b\u51e0\u4f55\u906e\u6321\uff0c\u63d0\u5347LLM\u751f\u6210\u6559\u5b66\u52a8\u753b\u7684\u7a7a\u95f4\u6b63\u786e\u6027", "upvotes": 0, "what_it_is": "SGA\uff08\u7b26\u53f7\u51e0\u4f55\u667a\u80fd\u4f53\uff09\u662f\u4e00\u4e2a\u5373\u63d2\u5373\u7528\u6a21\u5757\uff0c\u62e6\u622aLLM\u751f\u6210\u7684Manim\u52a8\u753b\u4ee3\u7801\uff0c\u63d0\u53d6\u7b26\u53f7\u573a\u666f\u56fe\u5e76\u68c0\u6d4b\u7a7a\u95f4\u51b2\u7a81\uff0c\u81ea\u52a8\u4fee\u6b63\u51e0\u4f55\u906e\u6321\u95ee\u9898\uff1b\u540c\u65f6\u63d0\u51fa\u65e0\u9700\u6e32\u67d3\u7684\u7a7a\u95f4\u8d28\u91cf\u8bc4\u4f30\u6307\u6807MVQS\u3002", "why_notable": "\u73b0\u6709LLM\u9a71\u52a8\u7684\u6559\u5b66\u89c6\u9891\u751f\u6210\u6846\u67b6\u666e\u904d\u5ffd\u89c6\u51e0\u4f55\u906e\u6321\u95ee\u9898\uff0cSGA\u4ee5\u8f7b\u91cf\u7ea7\u7b26\u53f7\u63a8\u7406\u586b\u8865\u8fd9\u4e00\u7a7a\u767d\uff0c\u4e14\u63d0\u51fa\u7684MVQS\u6307\u6807\u65e0\u9700\u6e32\u67d3\u5373\u53ef\u8bc4\u4f30\u7a7a\u95f4\u8d28\u91cf\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Video generative models commonly rely on latent spaces learned by 3D Variational Autoencoders (3D-VAEs). However, conventional 3D-VAEs are mainly optimized for pixel-level reconstruction, which can limit the semantic and spatio-temporal structure captured by their latents. Meanwhile, Video Foundation Models (VFMs) such as V-JEPA 2 and VideoMAEv2 show strong video understanding capabilities, yet whether their frozen representations can be transformed into compact, reconstruction-capable, and generation-friendly video latents remains largely unexplored. We answer this question with VideoRAE, a representation autoencoder that leverages multi-scale hierarchical features from a frozen video foundation encoder and compresses them with a lightweight 1D self-attention projector. VideoRAE supports both continuous latents for Diffusion Transformers and discrete tokens for autoregressive models via multi-codebook high-dimensional quantization. During decoding, a local-and-global representation alignment objective with the frozen VFM teacher improves semantic preservation and enables training without KL regularization. Experiments show that VideoRAE achieves strong reconstruction in both continuous and discrete regimes. On UCF-101, it obtains state-of-the-art class-to-video gFVDs of 40 and 93 with AR and DiT generators, respectively, while converging approximately 5x faster than competing autoencoder baselines. In a controlled 2B-scale text-to-video study, replacing LTX-VAE with VideoRAE leads to faster convergence under comparable settings. These results validate frozen VFM representations as versatile and generation-friendly video latents. The model and code will be released on https://zhxie0117.github.io/VideoRAE.", "arxiv_id": "2607.14088", "arxiv_url": "https://arxiv.org/abs/2607.14088", "authors": ["Zhihao Xie", "Junfeng Wu", "Xinting Hu", "Junchao Huang", "Li Jiang"], "brief": "\u63d0\u51faVideoRAE\uff0c\u4e00\u79cd\u8868\u793a\u81ea\u7f16\u7801\u5668\uff0c\u5c06\u51bb\u7ed3\u89c6\u9891\u57fa\u7840\u6a21\u578b\uff08\u5982V-JEPA 2\u3001VideoMAEv2\uff09\u7684\u591a\u5c3a\u5ea6\u5c42\u6b21\u7279\u5f81\u538b\u7f29\u4e3a\u7d27\u51d1\u7684\u89c6\u9891\u6f5c\u5728\u8868\u793a\uff0c\u540c\u65f6\u652f\u6301\u6269\u6563Transformer\u7684\u8fde\u7eed\u6f5c\u53d8\u91cf\u548c\u81ea\u56de\u5f52\u6a21\u578b\u7684\u79bb\u6563token\u3002", "categories": ["cs.CV"], "github_repo": "https://github.com/zhxie0117/VideoRAE", "github_stars": 36, "hf_url": "https://huggingface.co/papers/2607.14088", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4f7f\u7528\u8f7b\u91cf\u7ea71D\u81ea\u6ce8\u610f\u529b\u6295\u5f71\u5668\u538b\u7f29\u51bb\u7ed3VFM\u7684\u591a\u5c3a\u5ea6\u7279\u5f81\uff0c\u65e0\u9700KL\u6b63\u5219\u5316\u5373\u53ef\u8bad\u7ec3", "\u901a\u8fc7\u5c40\u90e8-\u5168\u5c40\u8868\u793a\u5bf9\u9f50\u76ee\u6807\u4e0e\u51bb\u7ed3VFM\u6559\u5e08\u5bf9\u9f50\uff0c\u63d0\u5347\u8bed\u4e49\u4fdd\u7559\u80fd\u529b", "\u5728UCF-101\u4e0a\u5b9e\u73b0SOTA\u7c7b\u522b\u5230\u89c6\u9891gFVD\uff08AR:40, DiT:93\uff09\uff0c\u6536\u655b\u901f\u5ea6\u6bd4\u7ade\u4e89\u57fa\u7ebf\u5feb\u7ea65\u500d"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u81ea\u7f16\u7801\u5668", "\u591a\u6a21\u6001", "\u6269\u6563\u6a21\u578b"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14088v1", "published_at": "2026-07-15", "score": 0.293, "selected_reasons": ["HF trending (8\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.14088.png", "title": "VideoRAE: Taming Video Foundation Models for Generative Modeling via Representation Autoencoders", "tldr": "VideoRAE\u5229\u7528\u51bb\u7ed3\u89c6\u9891\u57fa\u7840\u6a21\u578b\u7279\u5f81\u6784\u5efa\u751f\u6210\u53cb\u597d\u7684\u89c6\u9891\u6f5c\u5728\u7a7a\u95f4\uff0c\u91cd\u5efa\u8d28\u91cf\u4f18\u5f02\u4e14\u6536\u655b\u901f\u5ea6\u63d0\u53475\u500d", "upvotes": 8, "what_it_is": "\u63d0\u51faVideoRAE\uff0c\u4e00\u79cd\u8868\u793a\u81ea\u7f16\u7801\u5668\uff0c\u5c06\u51bb\u7ed3\u89c6\u9891\u57fa\u7840\u6a21\u578b\uff08\u5982V-JEPA 2\u3001VideoMAEv2\uff09\u7684\u591a\u5c3a\u5ea6\u5c42\u6b21\u7279\u5f81\u538b\u7f29\u4e3a\u7d27\u51d1\u7684\u89c6\u9891\u6f5c\u5728\u8868\u793a\uff0c\u540c\u65f6\u652f\u6301\u6269\u6563Transformer\u7684\u8fde\u7eed\u6f5c\u53d8\u91cf\u548c\u81ea\u56de\u5f52\u6a21\u578b\u7684\u79bb\u6563token\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u9a8c\u8bc1\u51bb\u7ed3\u89c6\u9891\u57fa\u7840\u6a21\u578b\u8868\u793a\u53ef\u76f4\u63a5\u4f5c\u4e3a\u751f\u6210\u53cb\u597d\u7684\u89c6\u9891\u6f5c\u5728\u7a7a\u95f4\uff0c\u6253\u901a\u89c6\u9891\u7406\u89e3\u4e0e\u751f\u6210\u7684\u6865\u6881\uff0c\u663e\u8457\u52a0\u901f\u8bad\u7ec3\u6536\u655b\uff0c\u5bf9\u89c6\u9891\u751f\u6210\u9886\u57df\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language models (LLMs) are transforming recommender systems from matching co-occurrence patterns in historical behavior toward reasoning about the intent that drives it. RecGPT-V1 pioneered this paradigm on Taobao by centering user understanding, and RecGPT-V2 scaled it via coordinated multi-agent reasoning; both are deployed in production with consistent gains in user experience and commercial outcomes. However, operating RecGPT at scale reveals three challenges: (1) stateless behavior modeling, where each request reprocesses full user history, wasting computation and discarding prior analysis; (2) a tag-to-item information bottleneck, where natural-language tags form a lossy channel between user understanding and item grounding; and (3) inefficient explicit reasoning, whose lengthy chain-of-thought incurs untenable latency and compute overhead. We present RecGPT-V3, a stateful, hybrid-modal recommender that reasons over natural language for open-world knowledge and Semantic IDs (SIDs) for concrete item grounding. A Memory Hub maintains structured, continually evolving user memory that distills long-horizon behavior into condensed units, cutting user-modeling computation by 55.8%. A Hybrid-modal Foundation Model allows the LLM jointly reason over text tags and SIDs, opening a high-bandwidth channel into the item space. Latent Intent Reasoning internalizes verbose rationales into compact learnable latent tokens that remain decodable into readable explanations, lowering output token cost by 200x. Deployed in Taobao\u0027s \"Guess What You Like\" feed, RecGPT-V3 achieves consistent gains in large-scale online A/B tests: IPV +1.28%, CTR +1.00%, TC +1.97%, GMV +3.97%, while cutting end-to-end serving resource consumption by 52.4%.", "arxiv_id": "2607.15591", "arxiv_url": "https://arxiv.org/abs/2607.15591", "authors": ["Bowen Zheng", "Chao Yi", "Dian Chen", "Gaoyang Guo", "Han Zhu", "Jiakai Tang", "Jian Wu", "Mao Zhang", "Wen Chen", "Yifan Lu", "Yujie Luo", "Yuning Jiang", "Zhujin Gao", "Bo Zheng", "Dixuan Wang", "Hao Fang", "Jiancai Liu", "Jing Yu", "Ke Chen", "Kewei Zhu", "Mingke Xu", "Wenjun Yang", "Xunke Xi", "Zile Zhou"], "brief": "\u963f\u91cc\u5df4\u5df4\u63d0\u51faRecGPT-V3\uff0c\u4e00\u4e2a\u90e8\u7f72\u4e8e\u6dd8\u5b9d\u7684\u6709\u72b6\u6001\u6df7\u5408\u6a21\u6001LLM\u63a8\u8350\u7cfb\u7edf\uff0c\u901a\u8fc7\u8bb0\u5fc6\u4e2d\u67a2\u3001\u6df7\u5408\u6a21\u6001\u57fa\u7840\u6a21\u578b\u548c\u6f5c\u5728\u610f\u56fe\u63a8\u7406\u4e09\u5927\u521b\u65b0\uff0c\u89e3\u51b3\u4e86\u524d\u4ee3\u7cfb\u7edf\u5728\u8ba1\u7b97\u6548\u7387\u548c\u4fe1\u606f\u74f6\u9888\u4e0a\u7684\u6838\u5fc3\u95ee\u9898\u3002", "categories": ["cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15591", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["Memory Hub\u7ef4\u62a4\u6301\u7eed\u6f14\u5316\u7684\u7ed3\u6784\u5316\u7528\u6237\u8bb0\u5fc6\uff0c\u5c06\u957f\u671f\u884c\u4e3a\u538b\u7f29\u4e3a\u7d27\u51d1\u5355\u5143\uff0c\u7528\u6237\u5efa\u6a21\u8ba1\u7b97\u91cf\u964d\u4f4e55.8%", "\u6df7\u5408\u6a21\u6001\u57fa\u7840\u6a21\u578b\u8ba9LLM\u540c\u65f6\u63a8\u7406\u6587\u672c\u6807\u7b7e\u548cSemantic IDs\uff08SIDs\uff09\uff0c\u6253\u901a\u4ece\u7528\u6237\u7406\u89e3\u5230\u5177\u4f53\u5546\u54c1\u7684\u9ad8\u5e26\u5bbd\u901a\u9053", "\u6f5c\u5728\u610f\u56fe\u63a8\u7406\u5c06\u5197\u957f\u601d\u7ef4\u94fe\u5185\u5316\u4e3a\u53ef\u5b66\u4e60\u7684\u6f5c\u5728token\uff0c\u8f93\u51fatoken\u6210\u672c\u964d\u4f4e200\u500d\uff0c\u7aef\u5230\u7aef\u670d\u52a1\u8d44\u6e90\u6d88\u8017\u51cf\u5c1152.4%\uff0c\u7ebf\u4e0aA/B\u6d4b\u8bd5GMV\u63d0\u5347+3.97%"], "keywords": ["\u63a8\u8350\u7cfb\u7edf", "\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001", "\u667a\u80fd\u4f53"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15591v1", "published_at": "2026-07-17", "score": 0.29, "selected_reasons": ["HF trending (26\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.15591.png", "title": "RecGPT-V3 Technical Report", "tldr": "RecGPT-V3\uff1a\u6709\u72b6\u6001\u6df7\u5408\u6a21\u6001\u63a8\u8350\u7cfb\u7edf\uff0c\u5927\u5e45\u964d\u4f4e\u8ba1\u7b97\u5f00\u9500\u540c\u65f6\u63d0\u5347GMV\u8fd14%", "upvotes": 26, "what_it_is": "\u963f\u91cc\u5df4\u5df4\u63d0\u51faRecGPT-V3\uff0c\u4e00\u4e2a\u90e8\u7f72\u4e8e\u6dd8\u5b9d\u7684\u6709\u72b6\u6001\u6df7\u5408\u6a21\u6001LLM\u63a8\u8350\u7cfb\u7edf\uff0c\u901a\u8fc7\u8bb0\u5fc6\u4e2d\u67a2\u3001\u6df7\u5408\u6a21\u6001\u57fa\u7840\u6a21\u578b\u548c\u6f5c\u5728\u610f\u56fe\u63a8\u7406\u4e09\u5927\u521b\u65b0\uff0c\u89e3\u51b3\u4e86\u524d\u4ee3\u7cfb\u7edf\u5728\u8ba1\u7b97\u6548\u7387\u548c\u4fe1\u606f\u74f6\u9888\u4e0a\u7684\u6838\u5fc3\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5728\u5de5\u4e1a\u7ea7\u63a8\u8350\u7cfb\u7edf\u4e2d\u5b9e\u73b0\u6709\u72b6\u6001LLM\u63a8\u7406\u4e0eSemantic ID\u6df7\u5408\u6a21\u6001\u878d\u5408\uff0c\u540c\u65f6\u5728\u6548\u679c\uff08GMV+3.97%\uff09\u548c\u6548\u7387\uff08\u8d44\u6e90-52.4%\uff09\u4e0a\u53d6\u5f97\u53cc\u8d62\uff0c\u4e3a\u5927\u89c4\u6a21LLM\u63a8\u8350\u843d\u5730\u63d0\u4f9b\u4e86\u5b8c\u6574\u7684\u5de5\u7a0b\u8303\u5f0f\u3002"}, {"abstract": "Under model--harness co-evolution, harnesses are not merely inference-time scaffolds but data-generating components whose execution traces can shape future foundation models. This motivates harness-in-the-loop learning: optimizing harnesses for both immediate agent performance and the quality of traces used for future model training. However, continually updating provider-built scaffolds is costly and labor-intensive. We therefore investigate whether optimizing user-constructed harnesses in a task-specific manner can improve execution-trace quality while remaining computationally lightweight and requiring only a few update iterations. To this end, we introduce Recursive Harness Self-Improvement (RHI), which represents the harness as a prompt-level specification of the agent loop and iteratively refines it using pairwise feedback over its own revision history. Across 30 synthetic machine-learning research tasks spanning quantitative finance, robotics, and pharmacy, a few RHI iterations suffice to substantially raise the performance ceiling of low-reasoning-effort agents, exceeding the corresponding maximum-reasoning-effort setting while reducing inference cost by up to 60%. We show that these gains arise primarily from improved task-specific context management through more effective inter-agent information flow rather than longer reasoning traces. Finally, we formalize this behavior as an information-theoretic hypothesis for RHI\u0027s implicit optimization objective, suggesting RHI as a practical algorithm for continual learning within the paradigm of model--harness co-evolution.", "arxiv_id": "2607.15524", "arxiv_url": "https://arxiv.org/abs/2607.15524", "authors": ["Hyunin Lee", "Jinglue Xu", "Jeffrey Seely", "Donghyun Lee", "Matei Zaharia", "Yujin Tang"], "brief": "\u63d0\u51fa\u9012\u5f52Harness\u81ea\u6211\u6539\u8fdb\uff08RHI\uff09\u65b9\u6cd5\uff0c\u5c06\u667a\u80fd\u4f53\u8fd0\u884c\u6846\u67b6\uff08harness\uff09\u8868\u793a\u4e3a\u63d0\u793a\u7ea7\u89c4\u8303\uff0c\u901a\u8fc7\u5bf9\u81ea\u8eab\u4fee\u8ba2\u5386\u53f2\u7684\u6210\u5bf9\u53cd\u9988\u8fed\u4ee3\u4f18\u5316\uff0c\u5728\u6a21\u578b-\u6846\u67b6\u534f\u540c\u8fdb\u5316\u8303\u5f0f\u4e0b\u63d0\u5347\u6267\u884c\u8f68\u8ff9\u8d28\u91cf\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15524", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4ec5\u9700\u5c11\u91cf\u8fed\u4ee3\u5373\u53ef\u663e\u8457\u63d0\u5347\u4f4e\u63a8\u7406\u5f3a\u5ea6\u667a\u80fd\u4f53\u7684\u6027\u80fd\u4e0a\u9650\uff0c\u751a\u81f3\u8d85\u8d8a\u6700\u5927\u63a8\u7406\u5f3a\u5ea6\u8bbe\u7f6e", "\u63a8\u7406\u6210\u672c\u964d\u4f4e\u6700\u9ad860%\uff0c\u5728\u91cf\u5316\u91d1\u878d\u3001\u673a\u5668\u4eba\u3001\u836f\u5b66\u7b4930\u4e2a\u5408\u6210ML\u7814\u7a76\u4efb\u52a1\u4e0a\u9a8c\u8bc1", "\u6027\u80fd\u63d0\u5347\u4e3b\u8981\u6765\u6e90\u4e8e\u6539\u8fdb\u7684\u4efb\u52a1\u7279\u5b9a\u4e0a\u4e0b\u6587\u7ba1\u7406\u548c\u66f4\u6709\u6548\u7684\u667a\u80fd\u4f53\u95f4\u4fe1\u606f\u6d41\uff0c\u800c\u975e\u66f4\u957f\u7684\u63a8\u7406\u94fe"], "keywords": ["\u667a\u80fd\u4f53", "\u6301\u7eed\u5b66\u4e60", "\u63d0\u793a\u4f18\u5316", "\u63a8\u7406\u6548\u7387"], "num_comments": 0, "on_hf": true, "organization": "Sakana AI", "pdf_url": "https://arxiv.org/pdf/2607.15524v1", "published_at": "2026-07-17", "score": 0.245, "selected_reasons": ["HF trending (14\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.15524.png", "title": "Recursive Harness Self-Improvement", "tldr": "\u9012\u5f52Harness\u81ea\u6211\u6539\u8fdb\uff08RHI\uff09\u901a\u8fc7\u8fed\u4ee3\u4f18\u5316\u667a\u80fd\u4f53\u5faa\u73af\u63d0\u793a\u89c4\u8303\uff0c\u5927\u5e45\u63d0\u5347\u6267\u884c\u8f68\u8ff9\u8d28\u91cf\u5e76\u964d\u4f4e\u63a8\u7406\u6210\u672c60%", "upvotes": 14, "what_it_is": "\u63d0\u51fa\u9012\u5f52Harness\u81ea\u6211\u6539\u8fdb\uff08RHI\uff09\u65b9\u6cd5\uff0c\u5c06\u667a\u80fd\u4f53\u8fd0\u884c\u6846\u67b6\uff08harness\uff09\u8868\u793a\u4e3a\u63d0\u793a\u7ea7\u89c4\u8303\uff0c\u901a\u8fc7\u5bf9\u81ea\u8eab\u4fee\u8ba2\u5386\u53f2\u7684\u6210\u5bf9\u53cd\u9988\u8fed\u4ee3\u4f18\u5316\uff0c\u5728\u6a21\u578b-\u6846\u67b6\u534f\u540c\u8fdb\u5316\u8303\u5f0f\u4e0b\u63d0\u5347\u6267\u884c\u8f68\u8ff9\u8d28\u91cf\u3002", "why_notable": "\u9996\u6b21\u5c06harness\u4f18\u5316\u7eb3\u5165\u6301\u7eed\u5b66\u4e60\u5faa\u73af\uff0c\u63d0\u4f9b\u4e86\u4e00\u79cd\u8f7b\u91cf\u7ea7\u3001\u65e0\u9700\u4eba\u5de5\u5e72\u9884\u7684\u6846\u67b6\u81ea\u52a8\u4f18\u5316\u65b9\u6848\uff0c\u5e76\u4ee5\u4fe1\u606f\u8bba\u5047\u8bbe\u5f62\u5f0f\u5316\u5176\u9690\u5f0f\u4f18\u5316\u76ee\u6807\uff0c\u5bf9LLM\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u5b9e\u9645\u90e8\u7f72\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Existing 3D generative models predominantly rely on implicit volumetric representations, which enforce watertight topology and struggle to represent thin-shell and non-manifold geometries such as garments. Geometry image-based approaches offer a surface-centric alternative, but existing methods rely on discrete binary occupancy maps whose resolution-dependent boundary encoding causes staircase artifacts and information loss upon downsampling, while surface reconstruction remains a non-differentiable post-processing step disconnected from the learning pipeline. To address this, we propose Differentiable Geometry Image (DiffGI), an end-to-end 3D-to-2D mapping framework that seamlessly integrates surface representation and geometric optimization. DiffGI replaces binary maps with a continuous 2D Truncated Signed Distance Function (TSDF), which encodes boundary position at subpixel precision within a fixed grid resolution, eliminating resolution-dependent staircase artifacts even under aggressive downsampling. Building on this continuous field, we introduce a differentiable Marching Squares algorithm based on analytical linear interpolation, allowing gradients from 3D surface losses to propagate back to the 2D latent space. Leveraging this differentiable pipeline, we train a DiffGI-VAE augmented with a geometry-aware normal rendering loss to compress complex 3D surfaces into an ultra-compact 32X32 latent space, and instantiate a transformer-based latent diffusion model with a flow-matching objective on top of this space for conditional 3D generation. Extensive experiments on garment and object datasets demonstrate that our method achieves superior reconstruction fidelity and boundary precision compared to prior geometry-image and voxel-based approaches, while requiring significantly fewer computational resources.", "arxiv_id": "2607.13365", "arxiv_url": "https://arxiv.org/abs/2607.13365", "authors": ["Eungjune Shim", "Hansol Lee", "Eunjung Ju"], "brief": "DiffGI\u662f\u4e00\u4e2a\u7aef\u5230\u7aef\u76843D-to-2D\u6620\u5c04\u6846\u67b6\uff0c\u7528\u8fde\u7eed2D\u622a\u65ad\u7b26\u53f7\u8ddd\u79bb\u51fd\u6570\uff08TSDF\uff09\u66ff\u4ee3\u4e8c\u503c\u5360\u7528\u56fe\uff0c\u5e76\u5f15\u5165\u53ef\u5fae\u5206Marching Squares\u7b97\u6cd5\uff0c\u4f7f3D\u8868\u9762\u635f\u5931\u68af\u5ea6\u53ef\u53cd\u5411\u4f20\u64ad\u81f32D\u6f5c\u7a7a\u95f4\uff0c\u4ece\u800c\u652f\u6301\u670d\u88c5\u7b49\u8584\u58f3\u51e0\u4f55\u7684\u9ad8\u8d28\u91cf\u751f\u6210\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13365", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u7528\u8fde\u7eed2D TSDF\u66ff\u4ee3\u79bb\u6563\u4e8c\u503c\u5360\u7528\u56fe\uff0c\u5b9e\u73b0\u4e9a\u50cf\u7d20\u7cbe\u5ea6\u8fb9\u754c\u7f16\u7801\uff0c\u6d88\u9664\u4e0b\u91c7\u6837\u9636\u68af\u4f2a\u5f71", "\u57fa\u4e8e\u89e3\u6790\u7ebf\u6027\u63d2\u503c\u7684\u53ef\u5fae\u5206Marching Squares\u7b97\u6cd5\uff0c\u6253\u901a3D\u635f\u5931\u52302D\u6f5c\u7a7a\u95f4\u7684\u68af\u5ea6\u4f20\u64ad", "DiffGI-VAE\u5c06\u590d\u67423D\u8868\u9762\u538b\u7f29\u81f332\u00d732\u8d85\u7d27\u51d1\u6f5c\u7a7a\u95f4\uff0c\u5e76\u7ed3\u5408Flow Matching\u76ee\u6807\u7684Transformer\u6269\u6563\u6a21\u578b\u5b9e\u73b0\u6761\u4ef6\u751f\u6210"], "keywords": ["3D\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u51e0\u4f55\u8868\u793a", "\u53ef\u5fae\u5206\u6e32\u67d3"], "num_comments": 1, "on_hf": true, "organization": "CLO Virtual Fashion", "pdf_url": "https://arxiv.org/pdf/2607.13365v1", "published_at": "2026-07-15", "score": 0.216, "selected_reasons": ["HF trending (3\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.13365.png", "title": "DiffGI: Differentiable Geometry Images for High-Fidelity Thin-Shell 3D Generation", "tldr": "\u63d0\u51fa\u53ef\u5fae\u5206\u51e0\u4f55\u56fe\u50cf\u6846\u67b6DiffGI\uff0c\u5b9e\u73b0\u8584\u58f33D\u51e0\u4f55\uff08\u5982\u670d\u88c5\uff09\u7684\u9ad8\u4fdd\u771f\u751f\u6210", "upvotes": 3, "what_it_is": "DiffGI\u662f\u4e00\u4e2a\u7aef\u5230\u7aef\u76843D-to-2D\u6620\u5c04\u6846\u67b6\uff0c\u7528\u8fde\u7eed2D\u622a\u65ad\u7b26\u53f7\u8ddd\u79bb\u51fd\u6570\uff08TSDF\uff09\u66ff\u4ee3\u4e8c\u503c\u5360\u7528\u56fe\uff0c\u5e76\u5f15\u5165\u53ef\u5fae\u5206Marching Squares\u7b97\u6cd5\uff0c\u4f7f3D\u8868\u9762\u635f\u5931\u68af\u5ea6\u53ef\u53cd\u5411\u4f20\u64ad\u81f32D\u6f5c\u7a7a\u95f4\uff0c\u4ece\u800c\u652f\u6301\u670d\u88c5\u7b49\u8584\u58f3\u51e0\u4f55\u7684\u9ad8\u8d28\u91cf\u751f\u6210\u3002", "why_notable": "\u9996\u6b21\u5c06\u51e0\u4f55\u56fe\u50cf\u8868\u793a\u4e0e\u53ef\u5fae\u5206\u4f18\u5316\u5b8c\u5168\u6253\u901a\uff0c\u7a81\u7834\u4e86\u73b0\u6709\u65b9\u6cd5\u65e0\u6cd5\u5904\u7406\u8584\u58f3/\u975e\u6d41\u5f62\u51e0\u4f55
