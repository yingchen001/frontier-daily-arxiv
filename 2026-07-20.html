\u7684\u74f6\u9888\uff0c\u5728\u670d\u88c5\u7b49\u590d\u6742\u62d3\u6251\u573a\u666f\u4e0b\u4ee5\u6781\u4f4e\u8ba1\u7b97\u8d44\u6e90\u5b9e\u73b0\u9ad8\u4fdd\u771f3D\u751f\u6210"}, {"abstract": "Large language model (LLM) post-training is essential for improving reasoning, adaptation, and alignment. Existing methods mainly follow two paradigms: reinforcement learning (RL) and on-policy distillation (OPD). However, RL relies on coarse-grained outcome supervision, resulting in difficult credit assignment and limited capability to acquire new knowledge. OPD, meanwhile, unconditionally matches teacher logits through KL divergence, which creates a dilemma: similar teachers provide little new knowledge, while substantially different teachers often yield ineffective guidance, largely restricting OPD to within-family distillation. We propose Distilled Reinforcement Learning (Distilled RL), which integrates teacher supervision into the RL objective to provide fine-grained guidance, selectively transfer new knowledge and avoid unconditional imitation. Distilled RL contains three components: reverse importance sampling with clipping, negative sample reset, and sequence-level geometric normalization. Through a concise and interpretable case study, we demonstrate that Distilled RL can effectively transfer previously unavailable knowledge from a teacher model to a student model. Extensive experiments across both within-family and cross-family distillation settings show that Distilled RL substantially outperforms standard RL and OPD in terms of both pass@1 and pass@k. Our code is available at https://github.com/597358816/Distilled-RL.", "arxiv_id": "2607.17247", "arxiv_url": "https://arxiv.org/abs/2607.17247", "authors": ["Chen Wang", "Zhaochun Li", "Jionghao Bai", "Yining Zhang", "Hexuan Deng", "Ge Lan", "Yue Wang"], "brief": "\u63d0\u51faDistilled RL\u65b9\u6cd5\uff0c\u5c06\u6559\u5e08\u6a21\u578b\u76d1\u7763\u4fe1\u53f7\u6574\u5408\u8fdb\u5f3a\u5316\u5b66\u4e60\u76ee\u6807\uff0c\u901a\u8fc7\u53cd\u5411\u91cd\u8981\u6027\u91c7\u6837+\u88c1\u526a\u3001\u8d1f\u6837\u672c\u91cd\u7f6e\u548c\u5e8f\u5217\u7ea7\u51e0\u4f55\u5f52\u4e00\u5316\u4e09\u4e2a\u7ec4\u4ef6\uff0c\u89e3\u51b3RL\u4fe1\u7528\u5206\u914d\u96be\u548cOPD\u65e0\u6761\u4ef6\u6a21\u4eff\u7684\u53cc\u91cd\u56f0\u5883\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17247", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4e09\u5927\u6838\u5fc3\u7ec4\u4ef6\uff1a\u53cd\u5411\u91cd\u8981\u6027\u91c7\u6837\uff08\u5e26\u88c1\u526a\uff09\u3001\u8d1f\u6837\u672c\u91cd\u7f6e\u3001\u5e8f\u5217\u7ea7\u51e0\u4f55\u5f52\u4e00\u5316", "\u652f\u6301\u8de8\u5bb6\u65cf\u84b8\u998f\uff08cross-family\uff09\uff0c\u7a81\u7834OPD\u4ec5\u9650\u540c\u7cfb\u5217\u6a21\u578b\u7684\u5c40\u9650", "\u5728pass@1\u548cpass@k\u6307\u6807\u4e0a\u5747\u663e\u8457\u4f18\u4e8e\u6807\u51c6RL\u548cOPD\u57fa\u7ebf"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f", "\u5927\u8bed\u8a00\u6a21\u578b", "\u540e\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17247v1", "published_at": "2026-07-19", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Distilled Reinforcement Learning for LLM Post-training", "tldr": "\u63d0\u51fa\u84b8\u998f\u5f3a\u5316\u5b66\u4e60\uff08Distilled RL\uff09\uff0c\u878d\u5408\u6559\u5e08\u76d1\u7763\u4e0eRL\u76ee\u6807\uff0c\u5b9e\u73b0\u7ec6\u7c92\u5ea6\u77e5\u8bc6\u8fc1\u79fb", "upvotes": 0, "what_it_is": "\u63d0\u51faDistilled RL\u65b9\u6cd5\uff0c\u5c06\u6559\u5e08\u6a21\u578b\u76d1\u7763\u4fe1\u53f7\u6574\u5408\u8fdb\u5f3a\u5316\u5b66\u4e60\u76ee\u6807\uff0c\u901a\u8fc7\u53cd\u5411\u91cd\u8981\u6027\u91c7\u6837+\u88c1\u526a\u3001\u8d1f\u6837\u672c\u91cd\u7f6e\u548c\u5e8f\u5217\u7ea7\u51e0\u4f55\u5f52\u4e00\u5316\u4e09\u4e2a\u7ec4\u4ef6\uff0c\u89e3\u51b3RL\u4fe1\u7528\u5206\u914d\u96be\u548cOPD\u65e0\u6761\u4ef6\u6a21\u4eff\u7684\u53cc\u91cd\u56f0\u5883\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u84b8\u998f\u4e0e\u5f3a\u5316\u5b66\u4e60\u7edf\u4e00\u6846\u67b6\uff0c\u65e2\u89e3\u51b3RL\u7c97\u7c92\u5ea6\u76d1\u7763\u95ee\u9898\uff0c\u53c8\u907f\u514dOPD\u65e0\u6761\u4ef6\u6a21\u4eff\u7f3a\u9677\uff0c\u5b9e\u73b0\u8de8\u5bb6\u65cf\u77e5\u8bc6\u8fc1\u79fb\uff0c\u5bf9LLM\u540e\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Approximately 3,000 of the 4,500 oracle bone script (OBS) characters remain undeciphered due to fragmentary inscriptions and sparse evidence. Current AI approaches fail to replicate expert workflows that integrate form analysis, contextual semantics, and philological reasoning. We introduce AlphaOracle, a human-workflow-inspired framework that systematizes OBS decipherment using the largest digitized corpus to date. Its multi-stage pipeline comprises: (i) rubbing parsing; (ii) radical-based morphological analysis with diachronic modeling; (iii) contextual retrieval with semantic alignment; and (iv) philological validation against classical sources. Each stage generates explicit, confidence-weighted evidence chains, culminating in interpretable reports for scholarly verification. Across multiple test characters, AlphaOracle\u0027s readings strongly agreed with expert interpretations. In a study of 86 domain specialists, it reduced analysis time by 64% and 79% of participants rated it highly useful. Notably, AlphaOracle resolves the character \"Lao\" as a toponymic or clan designation, offering concrete revisions to Shang administrative and social interpretations. These results suggest that computational methods aligned with philological practice can facilitate OBS research and provide a conceptual reference for studies of other undeciphered scripts.", "arxiv_id": "2607.17849", "arxiv_url": "https://arxiv.org/abs/2607.17849", "authors": ["Yuliang Liu", "Haisu Guan", "Pengjie Wang", "Xinyu Wang", "Jinpeng Wan", "Kaile Zhang", "Handong Zheng", "Xingchen Liu", "Zhebin Kuang", "Huanxin Yang", "Bang Li", "Yongge Liu", "Lianwen Jin", "Xiang Bai"], "brief": "\u63d0\u51faAlphaOracle\u7cfb\u7edf\uff0c\u901a\u8fc7\u6a21\u62df\u4eba\u7c7b\u4e13\u5bb6\u5de5\u4f5c\u6d41\u7684\u591a\u9636\u6bb5\u6d41\u6c34\u7ebf\uff08\u62d3\u7247\u89e3\u6790\u2192\u504f\u65c1\u5f62\u6001\u5206\u6790\u2192\u8bed\u5883\u68c0\u7d22\u2192\u6587\u732e\u9a8c\u8bc1\uff09\uff0c\u5bf9\u7532\u9aa8\u6587\u8fdb\u884c\u8ba1\u7b97\u673a\u8f85\u52a9\u91ca\u8bfb\uff0c\u5e76\u751f\u6210\u53ef\u89e3\u91ca\u7684\u8bc1\u636e\u94fe\u62a5\u544a\u3002", "categories": ["cs.HC", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17849", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u56db\u9636\u6bb5\u6d41\u6c34\u7ebf\uff1a\u62d3\u7247\u89e3\u6790\u3001\u57fa\u4e8e\u504f\u65c1\u7684\u5386\u65f6\u5f62\u6001\u5206\u6790\u3001\u8bed\u4e49\u5bf9\u9f50\u7684\u4e0a\u4e0b\u6587\u68c0\u7d22\u3001\u53e4\u5178\u6587\u732e\u9a8c\u8bc1", "\u4f7f\u7528\u8fc4\u4eca\u6700\u5927\u6570\u5b57\u5316\u7532\u9aa8\u6587\u8bed\u6599\u5e93\uff0c86\u4f4d\u9886\u57df\u4e13\u5bb6\u6d4b\u8bd5\u663e\u793a\u5206\u6790\u65f6\u95f4\u51cf\u5c1164%\uff0c79%\u53c2\u4e0e\u8005\u8bc4\u4ef7\u9ad8\u5ea6\u6709\u7528", "\u6210\u529f\u5c06\u0027\u52b3\u0027\u5b57\u89e3\u8bfb\u4e3a\u5730\u540d\u6216\u65cf\u540d\u79f0\u8c13\uff0c\u4e3a\u5546\u4ee3\u884c\u653f\u4e0e\u793e\u4f1a\u7814\u7a76\u63d0\u4f9b\u65b0\u4fee\u8ba2"], "keywords": ["\u53e4\u6587\u5b57\u8bc6\u522b", "\u591a\u6a21\u6001", "\u4eba\u673a\u534f\u4f5c", "\u81ea\u7136\u8bed\u8a00\u5904\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17849v1", "published_at": "2026-07-20", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "AlphaOracle: Oracle bone script decipherment via human-workflow-inspired deep learning", "tldr": "AlphaOracle\u6846\u67b6\u6a21\u62df\u4e13\u5bb6\u5de5\u4f5c\u6d41\uff0c\u7528\u6df1\u5ea6\u5b66\u4e60\u8f85\u52a9\u7532\u9aa8\u6587\u91ca\u8bfb\uff0c\u6548\u7387\u63d0\u534764%", "upvotes": 0, "what_it_is": "\u63d0\u51faAlphaOracle\u7cfb\u7edf\uff0c\u901a\u8fc7\u6a21\u62df\u4eba\u7c7b\u4e13\u5bb6\u5de5\u4f5c\u6d41\u7684\u591a\u9636\u6bb5\u6d41\u6c34\u7ebf\uff08\u62d3\u7247\u89e3\u6790\u2192\u504f\u65c1\u5f62\u6001\u5206\u6790\u2192\u8bed\u5883\u68c0\u7d22\u2192\u6587\u732e\u9a8c\u8bc1\uff09\uff0c\u5bf9\u7532\u9aa8\u6587\u8fdb\u884c\u8ba1\u7b97\u673a\u8f85\u52a9\u91ca\u8bfb\uff0c\u5e76\u751f\u6210\u53ef\u89e3\u91ca\u7684\u8bc1\u636e\u94fe\u62a5\u544a\u3002", "why_notable": "\u7ea64500\u4e2a\u7532\u9aa8\u6587\u5b57\u7b26\u4e2d\u4ecd\u67093000\u4e2a\u672a\u91ca\u8bfb\uff0c\u8be5\u7cfb\u7edf\u9996\u6b21\u5c06AI\u4e0e\u53e4\u6587\u5b57\u5b66\u4e13\u5bb6\u5de5\u4f5c\u6d41\u6df1\u5ea6\u878d\u5408\uff0c\u517c\u987e\u53ef\u89e3\u91ca\u6027\u4e0e\u5b66\u672f\u4e25\u8c28\u6027\uff0c\u5bf9\u5176\u4ed6\u672a\u89e3\u8bfb\u53e4\u6587\u5b57\u7814\u7a76\u5177\u6709\u65b9\u6cd5\u8bba\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Recent advances in world models and video generation have given rise to an emerging reasoning paradigm that leverages video generative models to simulate, predict, and reason about real-world dynamics. We redefine this paradigm as Thinking in Video, where video is not merely an output artifact but a medium for constructing, extending, and verifying causal thought. However, this promise remains unverified: convincing rollouts may reflect memorized appearances rather than causal understanding, while existing metrics separate perceptual fidelity from semantic logic. To evaluate whether video generators support such reasoning, we introduce the Causal-Generative Dual-Judge (CGDJ), auditing World Model Consistency from two perspectives. Explicit Causal Perception tests whether a generator reads a video scenario as a reasoning problem through spatio-temporal flattened visual question answering, while Implicit Generative Perception-Prediction Gap evaluates whether it renders the causal consequence as a consistent future video. Applying CGDJ to representative open- and closed-source generators reveals a clear Perception-Prediction Gap: open-source models produce plausible dynamics despite near-zero explicit causal perception, whereas advanced closed-source systems show stronger but still limited alignment between reasoning and generation. Further analysis exposes audio-visual misalignment, where models verbalize correct causal logic more reliably than they render it, challenging the \"world simulator\" narrative.", "arxiv_id": "2607.17523", "arxiv_url": "https://arxiv.org/abs/2607.17523", "authors": ["Yongheng Zhang", "Guang Yang", "Ruihan Hou", "Qiguang Chen", "Ziang Liu", "Xiaolong Liu", "Manman Zhang", "Yanchao Hao", "Zheng Wei", "Hao Wu", "Libo Qin", "Peishan Dai", "Yinghui Li", "Di Yin", "Xing Sun"], "brief": "\u672c\u6587\u63d0\u51fa\"Thinking in Video\"\u8303\u5f0f\uff0c\u5c06\u89c6\u9891\u751f\u6210\u6a21\u578b\u89c6\u4e3a\u56e0\u679c\u63a8\u7406\u5a92\u4ecb\uff0c\u5e76\u6784\u5efa\u56e0\u679c-\u751f\u6210\u53cc\u8bc4\u5224\u6846\u67b6\uff08CGDJ\uff09\uff0c\u4ece\u663e\u5f0f\u56e0\u679c\u611f\u77e5\u548c\u9690\u5f0f\u751f\u6210\u9884\u6d4b\u4e24\u4e2a\u7ef4\u5ea6\u8bc4\u4f30\u89c6\u9891\u751f\u6210\u6a21\u578b\u662f\u5426\u771f\u6b63\u7406\u89e3\u771f\u5b9e\u4e16\u754c\u52a8\u6001\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17523", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["CGDJ\u6846\u67b6\u5305\u542b\u4e24\u4e2a\u8bc4\u4f30\u7ef4\u5ea6\uff1a\u663e\u5f0f\u56e0\u679c\u611f\u77e5\uff08\u901a\u8fc7\u65f6\u7a7a\u5c55\u5e73\u7684\u89c6\u89c9\u95ee\u7b54\u6d4b\u8bd5\uff09\u548c\u9690\u5f0f\u751f\u6210\u611f\u77e5-\u9884\u6d4b\u5dee\u8ddd\uff08\u8bc4\u4f30\u751f\u6210\u89c6\u9891\u7684\u56e0\u679c\u4e00\u81f4\u6027\uff09", "\u5b9e\u9a8c\u53d1\u73b0\u5f00\u6e90\u6a21\u578b\u5728\u56e0\u679c\u611f\u77e5\u8fd1\u4e4e\u4e3a\u96f6\u7684\u60c5\u51b5\u4e0b\u4ecd\u80fd\u751f\u6210\u770b\u4f3c\u5408\u7406\u7684\u52a8\u6001\uff0c\u95ed\u6e90\u6a21\u578b\u63a8\u7406\u4e0e\u751f\u6210\u7684\u5bf9\u9f50\u66f4\u5f3a\u4f46\u4ecd\u6709\u9650", "\u63ed\u793a\u97f3\u89c6\u9891\u4e0d\u5bf9\u9f50\u73b0\u8c61\uff1a\u6a21\u578b\u5728\u8bed\u8a00\u5c42\u9762\u6b63\u786e\u8868\u8fbe\u56e0\u679c\u903b\u8f91\u7684\u80fd\u529b\u8fdc\u5f3a\u4e8e\u5728\u89c6\u9891\u6e32\u67d3\u5c42\u9762\u4f53\u73b0\u8be5\u903b\u8f91\uff0c\u6311\u6218\u4e86\"\u4e16\u754c\u6a21\u62df\u5668\"\u7684\u53d9\u4e8b"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u56e0\u679c\u63a8\u7406", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17523v1", "published_at": "2026-07-20", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Thinking in Video: Can Video Generators Really Reason About the Real World?", "tldr": "\u63d0\u51faCGDJ\u6846\u67b6\u8bc4\u4f30\u89c6\u9891\u751f\u6210\u6a21\u578b\u7684\u56e0\u679c\u63a8\u7406\u80fd\u529b\uff0c\u63ed\u793a\u611f\u77e5\u4e0e\u751f\u6210\u4e4b\u95f4\u7684\u663e\u8457\u5dee\u8ddd", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"Thinking in Video\"\u8303\u5f0f\uff0c\u5c06\u89c6\u9891\u751f\u6210\u6a21\u578b\u89c6\u4e3a\u56e0\u679c\u63a8\u7406\u5a92\u4ecb\uff0c\u5e76\u6784\u5efa\u56e0\u679c-\u751f\u6210\u53cc\u8bc4\u5224\u6846\u67b6\uff08CGDJ\uff09\uff0c\u4ece\u663e\u5f0f\u56e0\u679c\u611f\u77e5\u548c\u9690\u5f0f\u751f\u6210\u9884\u6d4b\u4e24\u4e2a\u7ef4\u5ea6\u8bc4\u4f30\u89c6\u9891\u751f\u6210\u6a21\u578b\u662f\u5426\u771f\u6b63\u7406\u89e3\u771f\u5b9e\u4e16\u754c\u52a8\u6001\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u533a\u5206\u89c6\u9891\u751f\u6210\u4e2d\u7684\"\u5916\u89c2\u8bb0\u5fc6\"\u4e0e\"\u56e0\u679c\u7406\u89e3\"\uff0c\u4e3a\u4e16\u754c\u6a21\u578b\u8bc4\u4f30\u63d0\u4f9b\u65b0\u6846\u67b6\uff0c\u63ed\u793a\u5f53\u524d\u89c6\u9891\u751f\u6210\u6a21\u578b\u4f5c\u4e3a\u63a8\u7406\u5de5\u5177\u7684\u6839\u672c\u5c40\u9650\uff0c\u5bf9\u4e16\u754c\u6a21\u578b\u7814\u7a76\u65b9\u5411\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "Video multimodal large language models (MLLMs) can describe what happens in a video, but rarely identify when the supporting evidence occurs. We study generalist video temporal grounding, in which one model predicts a variable-cardinality set of evidence intervals across video lengths, domains, query forms, and viewpoints. Existing training strategies are misaligned with this set-valued task: long-video labels often rely on brittle one-pass annotation, while reinforcement-learning rewards either fail to distinguish non-overlapping predictions or require fragile segment matching. TimeLens2 treats temporal evidence as an interval set throughout supervision and optimization. TimeLens2-93K constructs reliable multi-span supervision through caption-derived proposals, independent localization, cross-agent consensus, semantic verification, and boundary refinement. Our temporal Wasserstein reward computes exact one-dimensional \\(W_1\\) between uniform distributions over merged interval supports, providing dense, matching-free feedback under unequal cardinalities and equivalent fragmentation; temporal IoU complements it with precise-overlap feedback. Across seven benchmarks, TimeLens2-2B outperforms all size-matched baselines on every benchmark, while the 4B and 8B variants achieve state-of-the-art performance, surpassing open-source models with up to 397B parameters. The 2B, 4B, and 8B variants improve over their Qwen3-VL backbones by 14.2, 13.0, and 18.1 mIoU points, respectively.", "arxiv_id": "2607.17423", "arxiv_url": "https://arxiv.org/abs/2607.17423", "authors": ["Yuhan Zhu", "Changlian Ma", "Xiangyu Zeng", "Xinhao Li", "Zhiqiu Zhang", "Songze Li", "Jun Zhang", "Tianxiang Jiang", "Yuandong Yang", "Ziang Yan", "Zikang Wang", "Xinyu Chen", "Haoran Chen", "Shaowei Zhang", "Limin Wang"], "brief": "TimeLens2\u662f\u4e00\u4e2a\u901a\u7528\u89c6\u9891\u65f6\u5e8f\u5b9a\u4f4d\u6a21\u578b\uff0c\u80fd\u591f\u8de8\u89c6\u9891\u957f\u5ea6\u3001\u9886\u57df\u3001\u67e5\u8be2\u5f62\u5f0f\u548c\u89c6\u89d2\u9884\u6d4b\u53ef\u53d8\u6570\u91cf\u7684\u8bc1\u636e\u65f6\u95f4\u533a\u95f4\u96c6\u5408\u3002\u6838\u5fc3\u8d21\u732e\u5305\u62ec93K\u89c4\u6a21\u7684\u591a\u8de8\u5ea6\u76d1\u7763\u6570\u636e\u96c6\u548c\u57fa\u4e8eWasserstein\u8ddd\u79bb\u7684\u65f6\u5e8f\u5956\u52b1\u51fd\u6570\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17423", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efaTimeLens2-93K\u6570\u636e\u96c6\uff1a\u901a\u8fc7\u5b57\u5e55\u6d3e\u751f\u63d0\u6848\u3001\u72ec\u7acb\u5b9a\u4f4d\u3001\u8de8\u667a\u80fd\u4f53\u5171\u8bc6\u3001\u8bed\u4e49\u9a8c\u8bc1\u548c\u8fb9\u754c\u7cbe\u5316\u751f\u6210\u53ef\u9760\u7684\u591a\u8de8\u5ea6\u6807\u6ce8", "\u63d0\u51fa\u65f6\u5e8fWasserstein\u5956\u52b1\uff1a\u8ba1\u7b97\u5408\u5e76\u533a\u95f4\u652f\u6491\u4e0a\u5747\u5300\u5206\u5e03\u7684\u7cbe\u786e\u4e00\u7ef4W\u2081\u8ddd\u79bb\uff0c\u65e0\u9700\u7247\u6bb5\u5339\u914d\u5373\u53ef\u5904\u7406\u4e0d\u7b49\u57fa\u6570\u9884\u6d4b", "2B/4B/8B\u6a21\u578b\u57287\u4e2a\u57fa\u51c6\u4e0a\u5168\u9762\u8d85\u8d8a\u540c\u89c4\u6a21\u57fa\u7ebf\uff0c8B\u7248\u672c\u8d85\u8d8a\u53c2\u6570\u91cf\u9ad8\u8fbe397B\u7684\u5f00\u6e90\u6a21\u578b\uff0c\u76f8\u6bd4Qwen3-VL\u9aa8\u5e72\u5206\u522b\u63d0\u534714.2/13.0/18.1 mIoU"], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u89c6\u9891\u7406\u89e3", "\u65f6\u5e8f\u5b9a\u4f4d", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17423v1", "published_at": "2026-07-19", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "TimeLens2: Generalist Video Temporal Grounding with Multimodal LLMs", "tldr": "TimeLens2\u63d0\u51fa\u901a\u7528\u89c6\u9891\u65f6\u5e8f\u5b9a\u4f4d\u6846\u67b6\uff0c\u7528\u591a\u6a21\u6001LLM\u7cbe\u51c6\u9884\u6d4b\u89c6\u9891\u4e2d\u8bc1\u636e\u7247\u6bb5\u7684\u65f6\u95f4\u533a\u95f4", "upvotes": 0, "what_it_is": "TimeLens2\u662f\u4e00\u4e2a\u901a\u7528\u89c6\u9891\u65f6\u5e8f\u5b9a\u4f4d\u6a21\u578b\uff0c\u80fd\u591f\u8de8\u89c6\u9891\u957f\u5ea6\u3001\u9886\u57df\u3001\u67e5\u8be2\u5f62\u5f0f\u548c\u89c6\u89d2\u9884\u6d4b\u53ef\u53d8\u6570\u91cf\u7684\u8bc1\u636e\u65f6\u95f4\u533a\u95f4\u96c6\u5408\u3002\u6838\u5fc3\u8d21\u732e\u5305\u62ec93K\u89c4\u6a21\u7684\u591a\u8de8\u5ea6\u76d1\u7763\u6570\u636e\u96c6\u548c\u57fa\u4e8eWasserstein\u8ddd\u79bb\u7684\u65f6\u5e8f\u5956\u52b1\u51fd\u6570\u3002", "why_notable": "\u9996\u6b21\u5c06\u65f6\u5e8f\u5b9a\u4f4d\u4efb\u52a1\u5efa\u6a21\u4e3a\u533a\u95f4\u96c6\u5408\u9884\u6d4b\u5e76\u8bbe\u8ba1\u5339\u914d\u65e0\u5173\u7684Wasserstein\u5956\u52b1\uff0c\u89e3\u51b3\u4e86\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u7247\u6bb5\u5339\u914d\u8106\u5f31\u6027\u95ee\u9898\uff1b\u5c0f\u53c2\u6570\u91cf\u6a21\u578b\u8d85\u8d8a\u8d85\u5927\u89c4\u6a21\u5f00\u6e90\u6a21\u578b\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Multi-object tracking (MOT) is conventionally decomposed into detection followed by association, with object identity maintained as external state: track buffers, motion models, and appearance embeddings. We ask whether a video generator can maintain that state in pixels. We fine-tune a 22B text-to-video diffusion model (LTX-2.3) with a lightweight in-context LoRA to translate an RGB clip into an ID-map clip, a video in which every person is painted a flat, distinct color that persists over time: same color, same identity. Long videos are generated as chained windows, where each window is conditioned on the cleaned tail of the previous one. A brief continuation fine-tune teaches the model to extend a given coloring, after which identity flows through the chain with no tracker, no motion model, and no re-identification module. On the DanceTrack test server, our system, to our knowledge the first generative tracker evaluated there and the only entry with no detector and no tracking stack, reaches 40.3 HOTA. This is well below today\u0027s specialist state of the art (\u003e=70 HOTA), but with a unique, inverted error profile: its association score (AssA 44.1) exceeds every tracker of the original benchmark suite while detection remains the sole deficit. Controlled comparisons show the mechanism matters: the same generated windows linked by classical post-hoc association score 2x worse (18.2 HOTA), and frame-to-frame IoU association fragments tracks that the generator\u0027s colors keep whole. On 383 mined occlusion events, the generator re-acquires identities after gaps at a 42% conditional rate where appearance-embedding baselines score zero, including gaps longer than its temporal context, evidence that the generator\u0027s color assignment functions as an emergent re-identification signal. We release code, checkpoints, and the full pre-registered experimental log.", "arxiv_id": "2607.17120", "arxiv_url": "https://arxiv.org/abs/2607.17120", "authors": ["Haiyu Yang", "Miel Hostens"], "brief": "\u5c06220\u4ebf\u53c2\u6570\u6587\u672c\u8f6c\u89c6\u9891\u6269\u6563\u6a21\u578b\u5fae\u8c03\u4e3a\"\u8eab\u4efd\u8272\u56fe\u751f\u6210\u5668\"\uff0c\u628aRGB\u89c6\u9891\u8f6c\u6362\u4e3a\u6bcf\u4eba\u4e00\u79cd\u56fa\u5b9a\u989c\u8272\u7684ID\u56fe\u89c6\u9891\uff0c\u989c\u8272\u6301\u4e45\u6027\u5373\u8eab\u4efd\u6301\u4e45\u6027\uff0c\u65e0\u9700\u4f20\u7edf\u8ddf\u8e2a\u6808\u5373\u53ef\u5b8c\u6210\u591a\u76ee\u6807\u8ddf\u8e2a\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17120", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u57fa\u4e8eLTX-2.3\uff0822B\u53c2\u6570\uff09\u52a0\u8f7b\u91cfLoRA\u5fae\u8c03\uff0c\u5c06\u89c6\u9891\u5e27\u8f6c\u4e3a\u5e73\u94fa\u8eab\u4efd\u8272\u56fe\uff0c\u540c\u4e00\u989c\u8272=\u540c\u4e00\u8eab\u4efd", "\u957f\u89c6\u9891\u901a\u8fc7\u94fe\u5f0f\u7a97\u53e3\u751f\u6210\uff0c\u6bcf\u7a97\u53e3\u4ee5\u524d\u4e00\u7a97\u53e3\u6e05\u6d01\u5c3e\u5e27\u4e3a\u6761\u4ef6\uff0c\u8eab\u4efd\u989c\u8272\u8de8\u7a97\u53e3\u81ea\u7136\u5ef6\u7eed", "DanceTrack\u4e0a\u8fbe\u523040.3 HOTA\uff0c\u5173\u8054\u5206AssA 44.1\u8d85\u8d8a\u539f\u59cb\u57fa\u51c6\u6240\u6709\u4e13\u7528\u8ddf\u8e2a\u5668\uff1b\u906e\u6321\u540e\u8eab\u4efd\u91cd\u83b7\u738742%\uff0c\u800c\u5916\u89c2\u5d4c\u5165\u57fa\u7ebf\u4e3a0%"], "keywords": ["\u591a\u76ee\u6807\u8ddf\u8e2a", "\u6269\u6563\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u91cd\u8bc6\u522b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17120v1", "published_at": "2026-07-19", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "The generator is the tracker: Multi-object tracking by painting persistent identity colours", "tldr": "\u7528\u89c6\u9891\u751f\u6210\u6a21\u578b\u4e3a\u6bcf\u4e2a\u4eba\u6d82\u6301\u4e45\u8eab\u4efd\u8272\uff0c\u5b9e\u73b0\u65e0\u68c0\u6d4b\u5668\u7684\u591a\u76ee\u6807\u8ddf\u8e2a", "upvotes": 0, "what_it_is": "\u5c06220\u4ebf\u53c2\u6570\u6587\u672c\u8f6c\u89c6\u9891\u6269\u6563\u6a21\u578b\u5fae\u8c03\u4e3a\"\u8eab\u4efd\u8272\u56fe\u751f\u6210\u5668\"\uff0c\u628aRGB\u89c6\u9891\u8f6c\u6362\u4e3a\u6bcf\u4eba\u4e00\u79cd\u56fa\u5b9a\u989c\u8272\u7684ID\u56fe\u89c6\u9891\uff0c\u989c\u8272\u6301\u4e45\u6027\u5373\u8eab\u4efd\u6301\u4e45\u6027\uff0c\u65e0\u9700\u4f20\u7edf\u8ddf\u8e2a\u6808\u5373\u53ef\u5b8c\u6210\u591a\u76ee\u6807\u8ddf\u8e2a\u3002", "why_notable": "\u9996\u6b21\u8bc1\u660e\u751f\u6210\u6a21\u578b\u53ef\u5c06\u8eab\u4efd\u72b6\u6001\u7f16\u7801\u8fdb\u50cf\u7d20\uff0c\u98a0\u8986\"\u68c0\u6d4b+\u5173\u8054\"\u8303\u5f0f\uff1b\u5173\u8054\u80fd\u529b\u5df2\u8d85\u8d8a\u4e13\u7528\u8ddf\u8e2a\u5668\uff0c\u63ed\u793a\u6269\u6563\u6a21\u578b\u5177\u5907\u6d8c\u73b0\u5f0f\u91cd\u8bc6\u522b\u80fd\u529b\uff0c\u4e3a\u751f\u6210\u5f0f\u611f\u77e5\u5f00\u8f9f\u65b0\u65b9\u5411\u3002"}, {"abstract": "Node representation learning has advanced rapidly, yet most existing methods rely on per-dataset training and hyperparameter tuning. This dataset-specific optimization comes from the difficulty of designing reusable graph models that generalize across diverse graph datasets. In this work, we introduce Node4All, a node representation learner applicable to arbitrary graph datasets without any dataset-specific optimization. Node4All is built on two complementary ideas. At the architectural level, we introduce the Channel Graph Transformer (CGT), which enables a single fixed parameterization to process arbitrary graph datasets. At the learning level, we propose a self-supervised learning based on a series of synthetic graphs. Together, these components enable generalization beyond individual datasets, which is infeasible with existing architectures and learning frameworks. We extensively evaluate Node4All on node classification across 25 benchmarks against 21 baselines, covering both supervised and self-supervised methods. Despite all baselines being trained and optimized for each dataset, a single Node4All, applied uniformly across the datasets, achieves a competitive ranking of 5th among 21 baselines. Moreover, Node4All supports one-shot and in-context learning with an appropriate predictor and outperforms recent graph foundation models (GFMs) in these settings. These results demonstrate that Node4All not only achieves reusability across arbitrary graph datasets, but also remains an effective solution in practice. Code and model checkpoints are available in https://github.com/dooho00/node4all.", "arxiv_id": "2607.17272", "arxiv_url": "https://arxiv.org/abs/2607.17272", "authors": ["Dooho Lee", "Jaemin Yoo"], "brief": "\u63d0\u51faNode4All\uff0c\u4e00\u79cd\u65e0\u9700\u9488\u5bf9\u7279\u5b9a\u6570\u636e\u96c6\u8bad\u7ec3\u6216\u8c03\u53c2\u5373\u53ef\u5e94\u7528\u4e8e\u4efb\u610f\u56fe\u6570\u636e\u96c6\u7684\u8282\u70b9\u8868\u793a\u5b66\u4e60\u6846\u67b6\uff0c\u901a\u8fc7Channel Graph Transformer\uff08CGT\uff09\u67b6\u6784\u4e0e\u57fa\u4e8e\u5408\u6210\u56fe\u7684\u81ea\u76d1\u7763\u5b66\u4e60\u5b9e\u73b0\u8de8\u6570\u636e\u96c6\u6cdb\u5316\u3002", "categories": ["cs.LG", "cs.SI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17272", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["CGT\uff08Channel Graph Transformer\uff09\u91c7\u7528\u56fa\u5b9a\u53c2\u6570\u5316\u8bbe\u8ba1\uff0c\u53ef\u5904\u7406\u4efb\u610f\u7ed3\u6784\u7684\u56fe\u6570\u636e\u96c6\uff0c\u65e0\u9700\u6570\u636e\u96c6\u7279\u5b9a\u9002\u914d", "\u57fa\u4e8e\u5408\u6210\u56fe\u7684\u81ea\u76d1\u7763\u9884\u8bad\u7ec3\u7b56\u7565\uff0c\u4f7f\u6a21\u578b\u5728\u65e0\u6807\u7b7e\u771f\u5b9e\u56fe\u6570\u636e\u7684\u60c5\u51b5\u4e0b\u5b66\u4e60\u53ef\u8fc1\u79fb\u7684\u8282\u70b9\u8868\u793a", "\u572825\u4e2a\u57fa\u51c6\u6570\u636e\u96c6\u3001\u5bf9\u6bd421\u4e2a\u57fa\u7ebf\u65b9\u6cd5\u7684\u8282\u70b9\u5206\u7c7b\u8bc4\u6d4b\u4e2d\uff0c\u5355\u4e00\u6a21\u578b\u6392\u540d\u7b2c5\uff0c\u5e76\u5728one-shot\u548cin-context\u5b66\u4e60\u573a\u666f\u4e0b\u8d85\u8d8a\u8fd1\u671f\u56fe\u57fa\u7840\u6a21\u578b\uff08GFMs\uff09"], "keywords": ["\u56fe\u795e\u7ecf\u7f51\u7edc", "\u8868\u793a\u5b66\u4e60", "\u57fa\u7840\u6a21\u578b", "\u81ea\u76d1\u7763\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17272v1", "published_at": "2026-07-19", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Node4All: Learning Node Representation Beyond Datasets", "tldr": "Node4All\uff1a\u65e0\u9700\u6570\u636e\u96c6\u7279\u5b9a\u4f18\u5316\u3001\u53ef\u8de8\u4efb\u610f\u56fe\u6570\u636e\u96c6\u6cdb\u5316\u7684\u8282\u70b9\u8868\u793a\u5b66\u4e60\u5668", "upvotes": 0, "what_it_is": "\u63d0\u51faNode4All\uff0c\u4e00\u79cd\u65e0\u9700\u9488\u5bf9\u7279\u5b9a\u6570\u636e\u96c6\u8bad\u7ec3\u6216\u8c03\u53c2\u5373\u53ef\u5e94\u7528\u4e8e\u4efb\u610f\u56fe\u6570\u636e\u96c6\u7684\u8282\u70b9\u8868\u793a\u5b66\u4e60\u6846\u67b6\uff0c\u901a\u8fc7Channel Graph Transformer\uff08CGT\uff09\u67b6\u6784\u4e0e\u57fa\u4e8e\u5408\u6210\u56fe\u7684\u81ea\u76d1\u7763\u5b66\u4e60\u5b9e\u73b0\u8de8\u6570\u636e\u96c6\u6cdb\u5316\u3002", "why_notable": "\u9996\u6b21\u5b9e\u73b0\u771f\u6b63\u610f\u4e49\u4e0a\u8de8\u4efb\u610f\u56fe\u6570\u636e\u96c6\u7684\u901a\u7528\u8282\u70b9\u8868\u793a\u5b66\u4e60\uff0c\u65e0\u9700\u4efb\u4f55\u6570\u636e\u96c6\u7279\u5b9a\u4f18\u5316\uff0c\u63a8\u52a8\u56fe\u5b66\u4e60\u5411\u57fa\u7840\u6a21\u578b\u8303\u5f0f\u6f14\u8fdb\uff0c\u5177\u6709\u91cd\u8981\u7684\u5b9e\u7528\u4ef7\u503c\u4e0e\u65b9\u6cd5\u8bba\u521b\u65b0\u610f\u4e49\u3002"}, {"abstract": "Plasma diagnostic models for tokamak fusion devices are almost universally evaluated on clean, complete sensor data. In practice, fusion diagnostics fail regularly: acquisition systems start late, individual sensors die, and signal dropouts cluster precisely when a plasma disruption is approaching. We present the first systematic robustness benchmark for plasma diagnostic ML using the TokaMark dataset of 11,573 MAST shots, evaluating XGBoost, LSTM, Transformer, and the TokaMark CNN baseline across six physically-grounded failure scenarios and three imputation strategies. We introduce the Robustness Score (RS) for standardized cross-architecture comparison. Our central finding is that disruption-proximate sensor failure (corruption injected in the final window timesteps) collapses sequence model performance (LSTM +212% NRMSE) while a statistical feature model remains comparatively stable (XGBoost +37%). Forward-fill imputation eliminates nearly all degradation from random dropout for sequence models (LSTM +57% to ~0%), but offers little help when the end of the window is corrupted. Shot-level alarm evaluation using ground-truth disruption timestamps reveals that LSTM alarm detection collapses to TPR=0.00 under proximate sensor failure, while mean-fill imputation recovers it to TPR=1.00, a reversal of the pattern observed in NRMSE. Plasma current emerges as the single most critical diagnostic across all architectures (+73% to +140% upon removal). Code, data, and trained checkpoints are available at https://github.com/Neerav-Gupta/tokamark-robustness.", "arxiv_id": "2607.11915", "arxiv_url": "https://arxiv.org/abs/2607.11915", "authors": ["Neerav Gupta"], "brief": "\u57fa\u4e8eTokaMark\u6570\u636e\u96c6\uff0811,573\u6b21MAST\u5b9e\u9a8c\uff09\uff0c\u7cfb\u7edf\u8bc4\u4f30XGBoost\u3001LSTM\u3001Transformer\u7b49\u6a21\u578b\u5728\u516d\u79cd\u4f20\u611f\u5668\u6545\u969c\u573a\u666f\u4e0b\u7684\u9c81\u68d2\u6027\uff0c\u5e76\u63d0\u51fa\u6807\u51c6\u5316\u9c81\u68d2\u6027\u8bc4\u5206\uff08RS\uff09\u7528\u4e8e\u8de8\u67b6\u6784\u6bd4\u8f83\u3002", "categories": ["physics.plasm-ph", "cs.LG"], "github_repo": "https://github.com/Neerav-Gupta/tokamark-robustness", "github_stars": 3, "hf_url": "https://huggingface.co/papers/2607.11915", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u7834\u574f\u6027\u653e\u7535\u4e34\u8fd1\u65f6\u7684\u4f20\u611f\u5668\u6545\u969c\u5bf9\u5e8f\u5217\u6a21\u578b\u5f71\u54cd\u6700\u5927\uff08LSTM NRMSE\u4e0a\u5347212%\uff09\uff0c\u800c\u7edf\u8ba1\u7279\u5f81\u6a21\u578bXGBoost\u76f8\u5bf9\u7a33\u5b9a\uff08\u4ec5+37%\uff09", "\u524d\u5411\u586b\u5145\u63d2\u8865\u51e0\u4e4e\u6d88\u9664\u968f\u673a\u4e22\u5931\u5bf9\u5e8f\u5217\u6a21\u578b\u7684\u5f71\u54cd\uff08LSTM\u4ece+57%\u964d\u81f3~0%\uff09\uff0c\u4f46\u5bf9\u7a97\u53e3\u672b\u7aef\u6570\u636e\u635f\u574f\u65e0\u6548\uff1b\u5747\u503c\u586b\u5145\u5219\u53ef\u5c06LSTM\u62a5\u8b66TPR\u4ece0.00\u6062\u590d\u81f31.00", "\u7b49\u79bb\u5b50\u4f53\u7535\u6d41\u662f\u6240\u6709\u67b6\u6784\u4e2d\u6700\u5173\u952e\u7684\u8bca\u65ad\u4fe1\u53f7\uff0c\u79fb\u9664\u540eNRMSE\u4e0a\u534773%~140%"], "keywords": ["\u7b49\u79bb\u5b50\u4f53\u8bca\u65ad", "\u9c81\u68d2\u6027\u8bc4\u4f30", "\u65f6\u5e8f\u6a21\u578b", "\u6838\u805a\u53d8"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11915v1", "published_at": "2026-07-05", "score": 0.192, "selected_reasons": ["HF trending (0\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.11915.png", "title": "Benchmarking Sensor Robustness in Plasma Diagnostic Models: A Systematic Evaluation on TokaMark", "tldr": "\u9996\u4e2a\u6258\u5361\u9a6c\u514b\u7b49\u79bb\u5b50\u4f53\u8bca\u65adML\u6a21\u578b\u4f20\u611f\u5668\u9c81\u68d2\u6027\u7cfb\u7edf\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u57fa\u4e8eTokaMark\u6570\u636e\u96c6\uff0811,573\u6b21MAST\u5b9e\u9a8c\uff09\uff0c\u7cfb\u7edf\u8bc4\u4f30XGBoost\u3001LSTM\u3001Transformer\u7b49\u6a21\u578b\u5728\u516d\u79cd\u4f20\u611f\u5668\u6545\u969c\u573a\u666f\u4e0b\u7684\u9c81\u68d2\u6027\uff0c\u5e76\u63d0\u51fa\u6807\u51c6\u5316\u9c81\u68d2\u6027\u8bc4\u5206\uff08RS\uff09\u7528\u4e8e\u8de8\u67b6\u6784\u6bd4\u8f83\u3002", "why_notable": "\u9996\u6b21\u9488\u5bf9\u6838\u805a\u53d8\u7b49\u79bb\u5b50\u4f53\u8bca\u65adML\u6a21\u578b\u8fdb\u884c\u7cfb\u7edf\u6027\u4f20\u611f\u5668\u9c81\u68d2\u6027\u8bc4\u4f30\uff0c\u63ed\u793a\u4e86NRMSE\u4e0e\u62a5\u8b66\u68c0\u6d4b\u6307\u6807\u4e4b\u95f4\u7684\u53cd\u8f6c\u73b0\u8c61\uff0c\u5bf9\u5b9e\u9645\u6258\u5361\u9a6c\u514b\u8fd0\u884c\u4e2d\u7684\u6a21\u578b\u90e8\u7f72\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "LLM constraint reasoners are often evaluated near the random-SAT phase transition, confounding density and solver hardness. We test instance-level transfer while near-matching clause density. At aligned size bins, with near-matched density and matched maximum clause width, we compare proof-hard expander-Tseitin and proof-easy ladder-Tseitin formulas, pigeonhole anchors, and density-mismatched controls. Theory separates their resolution hardness; a solver-specific Glucose mean-conflict proxy differs by up to $51\\times$, and five other solvers preserve the direction. Across three included models (243 instances each; a fourth is excluded for abstention), the near-matched-density accuracy gaps range from $-32$ to $+20$ points, with a pooled gap of $+1.7$ points ($p=0.74$) and a wrong-signed correctness-versus-conflict association ($r=+0.15$). A proof-preserving relabeling lowers accuracy in all five clusters for one model (mean $-93$ points) but not another, exposing model-surface sensitivity. In a preregistered extension, provider-reported completion-token spend does not consistently increase with the proxy after accounting for formula length and censoring. At 16k, the reasoning model spends more on proof-easy matched formulas and exhausts its budget on the solver-easiest UNSAT family; the 32k C1 gap is absent. These scoped dissociations concern verdict accuracy and observed token spend, not certificate solving, exact proof length, or allocation efficiency.", "arxiv_id": "2607.17047", "arxiv_url": "https://arxiv.org/abs/2607.17047", "authors": ["Lucky Verma"], "brief": "\u672c\u6587\u63ed\u793a\u4e86\u7528SAT\u76f8\u53d8\u9644\u8fd1\u5b9e\u4f8b\u8bc4\u4f30LLM\u7ea6\u675f\u63a8\u7406\u80fd\u529b\u7684\u65b9\u6cd5\u8bba\u7f3a\u9677\uff0c\u901a\u8fc7\u63a7\u5236\u5b50\u53e5\u5bc6\u5ea6\u3001\u5bf9\u6bd4\u8bc1\u660e\u96be\u5ea6\u4e0d\u540c\u7684\u516c\u5f0f\u65cf\uff08\u6269\u5c55Tseitin vs \u68af\u5f62Tseitin\uff09\uff0c\u7cfb\u7edf\u8bca\u65adLLM\u63a8\u7406\u80fd\u529b\u4e0e\u6c42\u89e3\u5668\u786c\u5ea6\u4e4b\u95f4\u7684\u89e3\u8026\u5173\u7cfb\u3002", "categories": ["cs.LG", "cs.AI", "cs.LO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17047", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6c42\u89e3\u5668\u96be\u5ea6\u4ee3\u7406\uff08Glucose\u51b2\u7a81\u6570\uff09\u6700\u9ad8\u76f8\u5dee51\u500d\uff0c\u4f46LLM\u51c6\u786e\u7387\u5dee\u8ddd\u5728\u8fd1\u5339\u914d\u5bc6\u5ea6\u4e0b\u4ec5\u4e3a+1.7\u70b9\uff08p=0.74\uff09\uff0c\u8bf4\u660e\u6a21\u578b\u5bf9\u8bc1\u660e\u590d\u6742\u5ea6\u4e0d\u654f\u611f", "\u8bc1\u660e\u4fdd\u7559\u7684\u91cd\u6807\u7b7e\u64cd\u4f5c\u4f7f\u67d0\u4e00\u6a21\u578b\u51c6\u786e\u7387\u5e73\u5747\u4e0b\u964d93\u70b9\uff0c\u66b4\u9732\u6a21\u578b\u5bf9\u8868\u9762\u7b26\u53f7\u7684\u654f\u611f\u6027\u800c\u975e\u771f\u6b63\u7684\u903b\u8f91\u63a8\u7406\u80fd\u529b", "\u63a8\u7406\u6a21\u578b\u7684token\u6d88\u8017\u4e0e\u6c42\u89e3\u5668\u96be\u5ea6\u4ee3\u7406\u4e0d\u4e00\u81f4\uff1a\u5728\u8bc1\u660e\u5bb9\u6613\u7684\u5339\u914d\u516c\u5f0f\u4e0a\u53cd\u800c\u82b1\u8d39\u66f4\u591atoken\uff0c\u4e14\u5728\u6700\u7b80\u5355\u7684UNSAT\u65cf\u4e0a\u8017\u5c3d\u9884\u7b97"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u903b\u8f91\u63a8\u7406", "\u57fa\u51c6\u8bc4\u4f30", "\u7ea6\u675f\u6ee1\u8db3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17047v1", "published_at": "2026-07-19", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Solver-Hard Is Not Model-Hard: A Hardness-Controlled Diagnostic for LLM Constraint Reasoning", "tldr": "\u6c42\u89e3\u5668\u96be\u5ea6\u2260\u6a21\u578b\u96be\u5ea6\uff1aLLM\u7ea6\u675f\u63a8\u7406\u8bc4\u4f30\u4e2d\u7684\u786c\u5ea6\u63a7\u5236\u8bca\u65ad\u7814\u7a76", "upvotes": 0, "what_it_is": "\u672c\u6587\u63ed\u793a\u4e86\u7528SAT\u76f8\u53d8\u9644\u8fd1\u5b9e\u4f8b\u8bc4\u4f30LLM\u7ea6\u675f\u63a8\u7406\u80fd\u529b\u7684\u65b9\u6cd5\u8bba\u7f3a\u9677\uff0c\u901a\u8fc7\u63a7\u5236\u5b50\u53e5\u5bc6\u5ea6\u3001\u5bf9\u6bd4\u8bc1\u660e\u96be\u5ea6\u4e0d\u540c\u7684\u516c\u5f0f\u65cf\uff08\u6269\u5c55Tseitin vs \u68af\u5f62Tseitin\uff09\uff0c\u7cfb\u7edf\u8bca\u65adLLM\u63a8\u7406\u80fd\u529b\u4e0e\u6c42\u89e3\u5668\u786c\u5ea6\u4e4b\u95f4\u7684\u89e3\u8026\u5173\u7cfb\u3002", "why_notable": "\u6307\u51fa\u5f53\u524dLLM\u903b\u8f91\u63a8\u7406\u8bc4\u4f30\u57fa\u51c6\u7684\u7cfb\u7edf\u6027\u7f3a\u9677\u2014\u2014\u6df7\u6dc6\u4e86\u5bc6\u5ea6\u4e0e\u6c42\u89e3\u5668\u786c\u5ea6\uff0c\u63d0\u4f9b\u4e86\u9884\u6ce8\u518c\u7684\u53d7\u63a7\u5b9e\u9a8c\u6846\u67b6\uff0c\u5bf9\u672a\u6765\u57fa\u51c6\u8bbe\u8ba1\u548c\u63a8\u7406\u80fd\u529b\u8bc4\u4f30\u65b9\u6cd5\u8bba\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "This paper focuses on the problem of Embodied Task Planning, where an agent is required to execute a sequence of atomic actions within an interactive environment to complete a user-specified task. Though a variety of simulators and datasets have previously been built for this task, these efforts are largely isolated, with each using its own observation format, action type, and task domain. This fragmentation complicates comprehensive model evaluation and hinders the scalability of training data. As an effort towards generalizable embodied planning, we propose UniETP, a unified interface integrating four commonly-used simulators (AI2-THOR, VirtualHome, Habitat, BEHAVIOR). UniETP is characterized by both standardization and diversity. On one hand, it formalizes all the simulators into a consistent observation and action space, and builds an evaluation system to support complicated task goal. On the other hand, it enhances task diversity and complexity across dimensions like task logic, instance grounding, and instruction understanding, constructing a new dataset with varied levels of difficulty in an automatic manner. Extensive experiments on the proposed benchmark are conducted to evaluate the embodied planning capabilities of recent models and analyze the performance bottlenecks. Codes and data will be available at https://github.com/woyut/UniETP .", "arxiv_id": "2607.18062", "arxiv_url": "https://arxiv.org/abs/2607.18062", "authors": ["Peiran Xu", "Jiaqi Zheng", "Ziyou Wang", "Yadong Mu"], "brief": "\u63d0\u51faUniETP\uff0c\u4e00\u4e2a\u6574\u5408AI2-THOR\u3001VirtualHome\u3001Habitat\u3001BEHAVIOR\u56db\u5927\u4eff\u771f\u5668\u7684\u7edf\u4e00\u63a5\u53e3\u6846\u67b6\uff0c\u901a\u8fc7\u6807\u51c6\u5316\u89c2\u6d4b\u4e0e\u52a8\u4f5c\u7a7a\u95f4\uff0c\u5e76\u81ea\u52a8\u6784\u5efa\u591a\u96be\u5ea6\u5c42\u6b21\u7684\u5177\u8eab\u4efb\u52a1\u89c4\u5212\u6570\u636e\u96c6\u4e0e\u8bc4\u6d4b\u4f53\u7cfb\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18062", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u7edf\u4e00\u56db\u5927\u4e3b\u6d41\u5177\u8eab\u4eff\u771f\u5668\u7684\u89c2\u6d4b\u683c\u5f0f\u4e0e\u52a8\u4f5c\u7c7b\u578b\uff0c\u6d88\u9664\u788e\u7247\u5316\u95ee\u9898", "\u4ece\u4efb\u52a1\u903b\u8f91\u3001\u5b9e\u4f8b\u5b9a\u4f4d\u3001\u6307\u4ee4\u7406\u89e3\u4e09\u4e2a\u7ef4\u5ea6\u589e\u5f3a\u4efb\u52a1\u591a\u6837\u6027\u4e0e\u590d\u6742\u5ea6\uff0c\u81ea\u52a8\u5316\u6784\u5efa\u5206\u7ea7\u96be\u5ea6\u6570\u636e\u96c6", "\u63d0\u4f9b\u5b8c\u6574\u8bc4\u6d4b\u7cfb\u7edf\uff0c\u652f\u6301\u590d\u6742\u4efb\u52a1\u76ee\u6807\uff0c\u5e76\u901a\u8fc7\u5927\u91cf\u5b9e\u9a8c\u5206\u6790\u5f53\u524d\u6a21\u578b\u7684\u6027\u80fd\u74f6\u9888"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u4efb\u52a1\u89c4\u5212", "\u667a\u80fd\u4f53", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18062v1", "published_at": "2026-07-20", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "UniETP: Unifying Environments for Generalizable Embodied Task Planning", "tldr": "UniETP\u7edf\u4e00\u56db\u5927\u5177\u8eab\u4eff\u771f\u5668\uff0c\u6784\u5efa\u6807\u51c6\u5316\u8bc4\u6d4b\u4e0e\u591a\u6837\u5316\u8bad\u7ec3\u6570\u636e\u96c6", "upvotes": 0, "what_it_is": "\u63d0\u51faUniETP\uff0c\u4e00\u4e2a\u6574\u5408AI2-THOR\u3001VirtualHome\u3001Habitat\u3001BEHAVIOR\u56db\u5927\u4eff\u771f\u5668\u7684\u7edf\u4e00\u63a5\u53e3\u6846\u67b6\uff0c\u901a\u8fc7\u6807\u51c6\u5316\u89c2\u6d4b\u4e0e\u52a8\u4f5c\u7a7a\u95f4\uff0c\u5e76\u81ea\u52a8\u6784\u5efa\u591a\u96be\u5ea6\u5c42\u6b21\u7684\u5177\u8eab\u4efb\u52a1\u89c4\u5212\u6570\u636e\u96c6\u4e0e\u8bc4\u6d4b\u4f53\u7cfb\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u7edf\u4e00\u591a\u4e2a\u4e3b\u6d41\u5177\u8eab\u4eff\u771f\u73af\u5883\u7684\u6846\u67b6\uff0c\u89e3\u51b3\u4e86\u9886\u57df\u5185\u6570\u636e\u5b64\u5c9b\u95ee\u9898\uff0c\u6709\u671b\u5927\u5e45\u63d0\u5347\u5177\u8eab\u89c4\u5212\u6a21\u578b\u7684\u6cdb\u5316\u80fd\u529b\u4e0e\u8bad\u7ec3\u6570\u636e\u53ef\u6269\u5c55\u6027\u3002"}, {"abstract": "End-to-end vision-language navigation (VLN) with causal vision-language models can map instructions and egocentric observations directly to actions, but standard behavior cloning supervises only the next action and does not explicitly train the policy state to be predictive of future visual outcomes. We first ask a diagnostic question: if the policy is given an expert-trajectory future image as privileged input at training and testing time, is that additional visual evidence useful for choosing the current action? (These expert-trajectory future images are unavailable at test time in real deployment, so we use this setting only as a privileged-input diagnostic.) The answer is yes; this sanity check shows that future observations can provide rich, actionable cues. We then ask a deployable question: without accessing future images at inference, can we still benefit from future information by using a compressed future visual latent only as training supervision? We propose Future-State-Conditioned VLN (FSC-VLN), which adds a future-query token and aligns its hidden state to a frozen visual embedding $\u0394$ steps ahead via a training-only target branch that is removed after training. On R2R val-unseen, FSC-VLN improves SR/OSR/SPL over a StreamVLN-style baseline under two training-data regimes, with larger gains on long-horizon episodes; ablations further support the dual-query design (separating future and action queries).", "arxiv_id": "2607.18042", "arxiv_url": "https://arxiv.org/abs/2607.18042", "authors": ["Lingfeng Zhang", "Zhanguang Zhang", "Liheng Ma", "Tongtong Cao", "Yingxue Zhang"], "brief": "\u63d0\u51faFuture-State-Conditioned VLN\uff08FSC-VLN\uff09\uff0c\u5728\u8bad\u7ec3\u9636\u6bb5\u5f15\u5165\u672a\u6765\u67e5\u8be2token\u5e76\u5c06\u5176\u9690\u72b6\u6001\u5bf9\u9f50\u5230\u524d\u65b9\u0394\u6b65\u7684\u89c6\u89c9\u5d4c\u5165\uff0c\u63a8\u7406\u65f6\u79fb\u9664\u8be5\u5206\u652f\uff0c\u4f7f\u7b56\u7565\u9690\u5f0f\u5b66\u4e60\u9884\u6d4b\u672a\u6765\u89c6\u89c9\u72b6\u6001\u7684\u80fd\u529b\u4ee5\u6539\u5584\u5f53\u524d\u52a8\u4f5c\u51b3\u7b56\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18042", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u8bca\u65ad\u5b9e\u9a8c\u9a8c\u8bc1\uff1a\u5c06\u4e13\u5bb6\u8f68\u8ff9\u672a\u6765\u56fe\u50cf\u4f5c\u4e3a\u7279\u6743\u8f93\u5165\u65f6\uff0c\u5bfc\u822a\u6027\u80fd\u663e\u8457\u63d0\u5347\uff0c\u8bc1\u660e\u672a\u6765\u89c2\u6d4b\u542b\u6709\u4e30\u5bcc\u53ef\u64cd\u4f5c\u7ebf\u7d22", "\u8bad\u7ec3\u4e13\u7528\u76ee\u6807\u5206\u652f\uff1a\u901a\u8fc7\u51bb\u7ed3\u89c6\u89c9\u5d4c\u5165\u5bf9\u9f50future-query token\u7684\u9690\u72b6\u6001\uff0c\u63a8\u7406\u65f6\u5b8c\u5168\u79fb\u9664\uff0c\u96f6\u989d\u5916\u63a8\u7406\u5f00\u9500", "\u5728R2R val-unseen\u4e0aSR/OSR/SPL\u5747\u4f18\u4e8eStreamVLN\u57fa\u7ebf\uff0c\u957f\u8ddd\u79bb\u5bfc\u822a\u4efb\u52a1\u6536\u76ca\u66f4\u5927\uff0c\u6d88\u878d\u5b9e\u9a8c\u652f\u6301\u52a8\u4f5c\u67e5\u8be2\u4e0e\u672a\u6765\u67e5\u8be2\u5206\u79bb\u8bbe\u8ba1"], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a", "\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18042v1", "published_at": "2026-07-20", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Anticipate Before Acting: Future-State-Conditioned Vision-Language Navigation", "tldr": "FSC-VLN\u901a\u8fc7\u672a\u6765\u89c6\u89c9\u72b6\u6001\u76d1\u7763\u8bad\u7ec3\uff0c\u65e0\u9700\u63a8\u7406\u65f6\u8bbf\u95ee\u672a\u6765\u56fe\u50cf\u5373\u53ef\u63d0\u5347\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faFuture-State-Conditioned VLN\uff08FSC-VLN\uff09\uff0c\u5728\u8bad\u7ec3\u9636\u6bb5\u5f15\u5165\u672a\u6765\u67e5\u8be2token\u5e76\u5c06\u5176\u9690\u72b6\u6001\u5bf9\u9f50\u5230\u524d\u65b9\u0394\u6b65\u7684\u89c6\u89c9\u5d4c\u5165\uff0c\u63a8\u7406\u65f6\u79fb\u9664\u8be5\u5206\u652f\uff0c\u4f7f\u7b56\u7565\u9690\u5f0f\u5b66\u4e60\u9884\u6d4b\u672a\u6765\u89c6\u89c9\u72b6\u6001\u7684\u80fd\u529b\u4ee5\u6539\u5584\u5f53\u524d\u52a8\u4f5c\u51b3\u7b56\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u672a\u6765\u72b6\u6001\u9884\u6d4b\u4f5c\u4e3a\u8bad\u7ec3\u76d1\u7763\u4fe1\u53f7\u5f15\u5165\u7aef\u5230\u7aefVLN\uff0c\u65e0\u63a8\u7406\u5f00\u9500\u5730\u63d0\u5347\u957f\u7a0b\u5bfc\u822a\u80fd\u529b\uff0c\u65b9\u6cd5\u7b80\u6d01\u4e14\u5177\u6709\u666e\u9002\u6027"}, {"abstract": "Current video generation models achieve impressive results in single-shot generation, yet remain limited in cinematic video generation, where coherent narratives and effective multi-shot composition require explicit shot planning. To address this challenge, we propose ShotPlan, a framework for explicit multi-shot cinematic video generation built upon a video diffusion foundation model. Our method introduces learnable planning tokens that capture shot-level transition cues and can be seamlessly integrated with the original video generation tokens to control transition timestamps. Unlike standard video generation tokens, the proposed planning tokens are equipped with Fractional Temporal Rotary Position Embedding (FRoPE), enabling shot transitions to be modeled at the frame level. Experiments demonstrate that ShotPlan significantly outperforms existing cinematic video generation methods, offering more flexible shot management and stronger inter-shot consistency.", "arxiv_id": "2607.17675", "arxiv_url": "https://arxiv.org/abs/2607.17675", "authors": ["Su Guo", "Guangce Liu", "Haosen Yang", "Jiepeng Wang", "Cong Liu", "Junqi Liu", "Haibin Huang", "Hongxun Yao", "Chi Zhang", "Xuelong Li"], "brief": "\u63d0\u51faShotPlan\u6846\u67b6\uff0c\u5728\u89c6\u9891\u6269\u6563\u6a21\u578b\u57fa\u7840\u4e0a\u5f15\u5165\u53ef\u5b66\u4e60\u89c4\u5212Token\uff0c\u663e\u5f0f\u63a7\u5236\u591a\u955c\u5934\u7535\u5f71\u89c6\u9891\u7684\u955c\u5934\u8f6c\u6362\u65f6\u95f4\u6233\uff0c\u5b9e\u73b0\u8fde\u8d2f\u53d9\u4e8b\u4e0e\u591a\u955c\u5934\u7ec4\u5408\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17675", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u53ef\u5b66\u4e60\u89c4\u5212Token\uff08Planning Token\uff09\uff0c\u6355\u6349\u955c\u5934\u7ea7\u8f6c\u6362\u7ebf\u7d22\uff0c\u4e0e\u539f\u59cb\u89c6\u9891\u751f\u6210Token\u65e0\u7f1d\u96c6\u6210", "\u63d0\u51fa\u5206\u6570\u65f6\u5e8f\u65cb\u8f6c\u4f4d\u7f6e\u7f16\u7801\uff08FRoPE\uff09\uff0c\u4f7f\u955c\u5934\u8f6c\u6362\u53ef\u5728\u5e27\u7ea7\u522b\u7cbe\u786e\u5efa\u6a21", "\u5b9e\u9a8c\u8868\u660eShotPlan\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u7535\u5f71\u89c6\u9891\u751f\u6210\u65b9\u6cd5\uff0c\u5177\u5907\u66f4\u7075\u6d3b\u7684\u955c\u5934\u7ba1\u7406\u548c\u66f4\u5f3a\u7684\u8de8\u955c\u5934\u4e00\u81f4\u6027"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u591a\u6a21\u6001", "\u5185\u5bb9\u521b\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17675v1", "published_at": "2026-07-20", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ShotPlan: Cinematic Video Generation with Learnable Planning Token", "tldr": "ShotPlan\u901a\u8fc7\u53ef\u5b66\u4e60\u89c4\u5212Token\u5b9e\u73b0\u591a\u955c\u5934\u7535\u5f71\u7ea7\u89c6\u9891\u751f\u6210", "upvotes": 0, "what_it_is": "\u63d0\u51faShotPlan\u6846\u67b6\uff0c\u5728\u89c6\u9891\u6269\u6563\u6a21\u578b\u57fa\u7840\u4e0a\u5f15\u5165\u53ef\u5b66\u4e60\u89c4\u5212Token\uff0c\u663e\u5f0f\u63a7\u5236\u591a\u955c\u5934\u7535\u5f71\u89c6\u9891\u7684\u955c\u5934\u8f6c\u6362\u65f6\u95f4\u6233\uff0c\u5b9e\u73b0\u8fde\u8d2f\u53d9\u4e8b\u4e0e\u591a\u955c\u5934\u7ec4\u5408\u3002", "why_notable": "\u9996\u6b21\u5c06\u663e\u5f0f\u955c\u5934\u89c4\u5212\u673a\u5236\u5f15\u5165\u89c6\u9891\u6269\u6563\u6a21\u578b\uff0c\u586b\u8865\u4e86\u5355\u955c\u5934\u751f\u6210\u5230\u591a\u955c\u5934\u7535\u5f71\u53d9\u4e8b\u4e4b\u95f4\u7684\u5173\u952e\u7a7a\u767d\uff0c\u5bf9\u5f71\u89c6\u5185\u5bb9\u81ea\u52a8\u5316\u751f\u6210\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Latent diffusion models (LDMs) enable efficient high-resolution image synthesis by denoising in a VAE-compressed latent space. However, fixed visual tokenizers can discard fine textures and structural details, while separate representation and diffusion training creates a mismatch between reconstruction and generation objectives. These limitations have renewed interest in pixel-space diffusion, which models raw pixels directly, removes the VAE bottleneck, and supports end-to-end optimization. This formulation better matches the demands of high-fidelity generation but introduces challenges in high-dimensional modeling, including noise scheduling, loss weighting, token efficiency, and scalable architecture design. Pixel-space modeling also offers a promising basis for unified multimodal systems: raw pixels, text, and task conditions can be represented in a shared token space and jointly processed by a single Transformer, narrowing the gap between visual understanding and generation. This paper reviews Pixel-Space Diffusion Transformers (pDiTs) from the perspectives of model architecture, continuous generative mechanisms, and unified multimodal modeling. We summarize representative methods, identify key technical challenges, and discuss future directions toward high-fidelity, end-to-end vision foundation models that integrate generation and understanding.", "arxiv_id": "2607.17585", "arxiv_url": "https://arxiv.org/abs/2607.17585", "authors": ["Renye Yan", "Jikang Cheng", "You Wu", "Ling Liang", "Wei Peng", "Athanasios V. Vasilakos", "Qingyu Zhao", "Yu Zhang", "Ehsan Adeli", "Kilian M. Pohl", "Guoying Zhao"], "brief": "\u672c\u6587\u7cfb\u7edf\u7efc\u8ff0\u50cf\u7d20\u7a7a\u95f4\u6269\u6563Transformer\uff08pDiTs\uff09\uff0c\u4ece\u6a21\u578b\u67b6\u6784\u3001\u8fde\u7eed\u751f\u6210\u673a\u5236\u548c\u7edf\u4e00\u591a\u6a21\u6001\u5efa\u6a21\u4e09\u4e2a\u7ef4\u5ea6\u68b3\u7406\u4ee3\u8868\u6027\u65b9\u6cd5\uff0c\u5206\u6790\u5173\u952e\u6280\u672f\u6311\u6218\u5e76\u5c55\u671b\u672a\u6765\u65b9\u5411\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17585", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u50cf\u7d20\u7a7a\u95f4\u6269\u6563\u76f4\u63a5\u5bf9\u539f\u59cb\u50cf\u7d20\u5efa\u6a21\uff0c\u6d88\u9664VAE\u74f6\u9888\uff0c\u652f\u6301\u7aef\u5230\u7aef\u4f18\u5316\uff0c\u907f\u514d\u6f5c\u5728\u7a7a\u95f4\u56fa\u5b9a\u5206\u8bcd\u5668\u4e22\u5931\u7ec6\u8282\u7684\u95ee\u9898", "\u6838\u5fc3\u6311\u6218\u5305\u62ec\u9ad8\u7ef4\u5efa\u6a21\u4e2d\u7684\u566a\u58f0\u8c03\u5ea6\u3001\u635f\u5931\u52a0\u6743\u3001token\u6548\u7387\u53ca\u53ef\u6269\u5c55\u67b6\u6784\u8bbe\u8ba1", "\u50cf\u7d20\u7a7a\u95f4\u4e3a\u7edf\u4e00\u591a\u6a21\u6001\u7cfb\u7edf\u63d0\u4f9b\u57fa\u7840\uff1a\u539f\u59cb\u50cf\u7d20\u3001\u6587\u672c\u548c\u4efb\u52a1\u6761\u4ef6\u53ef\u5728\u5171\u4eabtoken\u7a7a\u95f4\u4e2d\u7531\u5355\u4e00Transformer\u8054\u5408\u5904\u7406"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u591a\u6a21\u6001", "\u56fe\u50cf\u751f\u6210", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17585v1", "published_at": "2026-07-20", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Pixel-Space Diffusion Transformers", "tldr": "\u7efc\u8ff0\u50cf\u7d20\u7a7a\u95f4\u6269\u6563Transformer\uff0c\u63a2\u8ba8\u5176\u67b6\u6784\u3001\u751f\u6210\u673a\u5236\u4e0e\u591a\u6a21\u6001\u7edf\u4e00\u5efa\u6a21", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u7efc\u8ff0\u50cf\u7d20\u7a7a\u95f4\u6269\u6563Transformer\uff08pDiTs\uff09\uff0c\u4ece\u6a21\u578b\u67b6\u6784\u3001\u8fde\u7eed\u751f\u6210\u673a\u5236\u548c\u7edf\u4e00\u591a\u6a21\u6001\u5efa\u6a21\u4e09\u4e2a\u7ef4\u5ea6\u68b3\u7406\u4ee3\u8868\u6027\u65b9\u6cd5\uff0c\u5206\u6790\u5173\u952e\u6280\u672f\u6311\u6218\u5e76\u5c55\u671b\u672a\u6765\u65b9\u5411\u3002", "why_notable": "\u968f\u7740LDM\u5c40\u9650\u6027\u65e5\u76ca\u51f8\u663e\uff0c\u50cf\u7d20\u7a7a\u95f4\u6269\u6563\u91cd\u65b0\u53d7\u5230\u5173\u6ce8\uff1b\u672c\u7efc\u8ff0\u7cfb\u7edf\u68b3\u7406\u8be5\u65b9\u5411\u7684\u6280\u672f\u8109\u7edc\uff0c\u4e3a\u6784\u5efa\u96c6\u751f\u6210\u4e0e\u7406\u89e3\u4e8e\u4e00\u4f53\u7684\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u63d0\u4f9b\u8def\u7ebf\u56fe\u3002"}, {"abstract": "Group Relative Policy Optimization (GRPO) is a powerful reinforcement learning algorithm for aligning generative models with human preferences. While successful in large language models~\\cite{shao2024deepseekmathpushinglimitsmathematical}, its extension to diffusion and flow matching models introduces a severe computational bottleneck: gradients must be back-propagated through the high-capacity DiT backbone at \\emph{every} timestep of the sampling trajectory, making high-resolution text-to-image (T2I) training prohibitively expensive. Training-free DiT inference acceleration methods (e.g., $\u0394$-DiT, ScalingCache) exploit the fact that DiT hidden states and velocity predictions vary \\emph{smoothly and nearly linearly} along the trajectory. We ask whether the same linearity can reduce the backward-pass cost of DiT RL training, and answer affirmatively with \\textbf{JAGG} (\\textbf{J}acobian-\\textbf{A}ggregated \\textbf{G}roup \\textbf{G}radient), which reduces full transformer backward passes from $W$ to $2$ per group of $W$ consecutive steps. JAGG approximates intermediate-step Jacobians via $t$-weighted interpolation of the endpoint Jacobians, then aggregates per-step upstream signals into two composite gradients applied through a single joint backward pass. We prove this interpolation is \\emph{exact} when the velocity is linear in $(z,t)$, and a cosine-similarity routing rule (\\texttt{jagg\\_frac}) deploys JAGG only where the assumption holds. Experiments on T2I benchmarks show JAGG delivers $\\sim$2$\\times$ backward speedup with negligible quality degradation.", "arxiv_id": "2607.17572", "arxiv_url": "https://arxiv.org/abs/2607.17572", "authors": ["Ruiyi Ding", "Jie Li", "He Kang", "Ziyan Liu", "Chengru Song", "Yuan chen"], "brief": "JAGG\u901a\u8fc7\u5bf9\u7aef\u70b9Jacobian\u8fdb\u884c\u65f6\u95f4\u52a0\u6743\u63d2\u503c\u6765\u8fd1\u4f3c\u4e2d\u95f4\u6b65\u9aa4\u7684Jacobian\uff0c\u5e76\u5c06\u591a\u6b65\u68af\u5ea6\u4fe1\u53f7\u805a\u5408\u4e3a\u4e24\u4e2a\u590d\u5408\u68af\u5ea6\uff0c\u4ec5\u9700\u4e00\u6b21\u8054\u5408\u53cd\u5411\u4f20\u64ad\uff0c\u5927\u5e45\u964d\u4f4e\u6269\u6563\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u5bf9\u9f50\u8bad\u7ec3\u7684\u8ba1\u7b97\u5f00\u9500\u3002", "categories": ["cs.LG", "cs.CV", "eess.SY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17572", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u6d1e\u5bdf\uff1aDiT\u9690\u85cf\u72b6\u6001\u548c\u901f\u5ea6\u9884\u6d4b\u6cbf\u91c7\u6837\u8f68\u8ff9\u8fd1\u4f3c\u7ebf\u6027\u53d8\u5316\uff0c\u53ef\u7528\u7aef\u70b9Jacobian\u63d2\u503c\u66ff\u4ee3\u4e2d\u95f4\u6b65\u9aa4\u7684\u5b8c\u6574\u53cd\u5411\u4f20\u64ad", "\u7406\u8bba\u4fdd\u8bc1\uff1a\u5f53\u901f\u5ea6\u5173\u4e8e(z,t)\u7ebf\u6027\u65f6\u63d2\u503c\u7cbe\u786e\u6210\u7acb\uff1b\u5f15\u5165\u4f59\u5f26\u76f8\u4f3c\u5ea6\u8def\u7531\u89c4\u5219(jagg_frac)\u81ea\u9002\u5e94\u51b3\u5b9a\u4f55\u65f6\u542f\u7528JAGG", "\u5b9e\u9a8c\u7ed3\u679c\uff1a\u5728\u6587\u672c\u5230\u56fe\u50cf\u57fa\u51c6\u4e0a\u5b9e\u73b0\u7ea62\u500d\u53cd\u5411\u4f20\u64ad\u52a0\u901f\uff0c\u8d28\u91cf\u635f\u5931\u53ef\u5ffd\u7565\u4e0d\u8ba1"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u8bad\u7ec3\u52a0\u901f", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17572v1", "published_at": "2026-07-20", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "AGG: Jacobian-Aggregated Group Gradient for Efficient GRPO Training of Diffusion Models", "tldr": "\u63d0\u51faJAGG\u65b9\u6cd5\uff0c\u5c06\u6269\u6563\u6a21\u578bGRPO\u8bad\u7ec3\u7684\u53cd\u5411\u4f20\u64ad\u6b21\u6570\u4eceW\u6b21\u964d\u81f32\u6b21\uff0c\u5b9e\u73b0\u7ea62\u500d\u52a0\u901f", "upvotes": 0, "what_it_is": "JAGG\u901a\u8fc7\u5bf9\u7aef\u70b9Jacobian\u8fdb\u884c\u65f6\u95f4\u52a0\u6743\u63d2\u503c\u6765\u8fd1\u4f3c\u4e2d\u95f4\u6b65\u9aa4\u7684Jacobian\uff0c\u5e76\u5c06\u591a\u6b65\u68af\u5ea6\u4fe1\u53f7\u805a\u5408\u4e3a\u4e24\u4e2a\u590d\u5408\u68af\u5ea6\uff0c\u4ec5\u9700\u4e00\u6b21\u8054\u5408\u53cd\u5411\u4f20\u64ad\uff0c\u5927\u5e45\u964d\u4f4e\u6269\u6563\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u5bf9\u9f50\u8bad\u7ec3\u7684\u8ba1\u7b97\u5f00\u9500\u3002", "why_notable": "GRPO\u6269\u5c55\u5230\u6269\u6563\u6a21\u578b\u9762\u4e34\u6bcf\u4e2a\u91c7\u6837\u65f6\u95f4\u6b65\u90fd\u9700\u5b8c\u6574\u53cd\u5411\u4f20\u64ad\u7684\u4e25\u91cd\u8ba1\u7b97\u74f6\u9888\uff0cJAGG\u4ece\u7406\u8bba\u548c\u5b9e\u8df5\u4e24\u65b9\u9762\u89e3\u51b3\u4e86\u8fd9\u4e00\u95ee\u9898\uff0c\u4f7f\u9ad8\u5206\u8fa8\u7387T2I\u7684RL\u5bf9\u9f50\u8bad\u7ec3\u53d8\u5f97\u53ef\u884c\uff0c\u5bf9\u6269\u6563\u6a21\u578b\u4e0e\u4eba\u7c7b\u504f\u597d\u5bf9\u9f50\u7814\u7a76\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Teleoperating a robotic manipulator in industrial environments demands precision that camera-based interfaces alone struggle to deliver. The operator must align the end-effector with a target in clutter, under limited depth perception, and without colliding with the surrounding structures. This paper presents a shared-autonomy framework that assists the operator throughout this process. A single RGB-D camera captures the operator\u0027s arm motion and hand gestures without wearables, fiducials, or a calibration stage. The intended target is specified by a free-form text prompt, grounded by a vision-language model in the robot\u0027s gripper camera, and tracked across its onboard cameras by a promptable video-segmentation model, resulting in a grasp frame continuously separated from the obstacle map. Every commanded motion is executed by a GPU-accelerated model-predictive controller that enforces self- and environment-collision avoidance against an online volumetric reconstruction, while a potential field corrects the operator\u0027s reference toward the grounded target during the final approach. An autonomous mode can be gesture-triggered to complete the grasp on the same target without a separate perception pipeline. The framework is validated on a quadruped mobile manipulator. The interface achieves a positional RMSE of 59 mm relative to motion-capture ground truth, and the controller keeps the arm at least 18 cm from obstacles while the operator deliberately commands the arm into them by 6 cm. In an industrial valve manipulation and a pick-and-place task, the full framework succeeded in all trials, while ablating either the collision or the assistance module produced failures through complementary mechanisms, and autonomous execution succeeded in four of five trials per task.", "arxiv_id": "2607.17323", "arxiv_url": "https://arxiv.org/abs/2607.17323", "authors": ["Murilo Vinicius da Silva", "Ricardo V. Godoy", "Juliano Negri", "Gustavo J. G. Lahr", "Ranulfo Bezerra", "Marcelo Becker"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u5171\u4eab\u81ea\u4e3b\u6846\u67b6\uff0c\u7ed3\u5408RGB-D\u76f8\u673a\u624b\u52bf\u6355\u6349\u3001\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u76ee\u6807\u5b9a\u4f4d\u3001\u53ef\u63d0\u793a\u89c6\u9891\u5206\u5272\u8ddf\u8e2a\u4e0eGPU\u52a0\u901f\u6a21\u578b\u9884\u6d4b\u63a7\u5236\uff0c\u5e2e\u52a9\u64cd\u4f5c\u5458\u5728\u6742\u4e71\u5de5\u4e1a\u73af\u5883\u4e2d\u7cbe\u51c6\u9065\u64cd\u4f5c\u673a\u68b0\u81c2\uff0c\u65e0\u9700\u7a7f\u6234\u8bbe\u5907\u6216\u6807\u5b9a\u3002", "categories": ["cs.RO", "cs.CV", "cs.HC", "eess.SY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17323", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5355RGB-D\u76f8\u673a\u65e0\u6807\u8bb0\u6355\u6349\u64cd\u4f5c\u5458\u624b\u81c2\u52a8\u4f5c\u4e0e\u624b\u52bf\uff0c\u81ea\u7531\u6587\u672c\u63d0\u793a\u901a\u8fc7VLM\u5b9a\u4f4d\u76ee\u6807\uff0c\u5b9e\u73b0\u5f00\u653e\u8bcd\u6c47\u76ee\u6807\u6307\u5b9a", "GPU\u52a0\u901fMPC\u63a7\u5236\u5668\u7ed3\u5408\u5728\u7ebf\u4f53\u79ef\u91cd\u5efa\u5b9e\u73b0\u5b9e\u65f6\u78b0\u649e\u907f\u514d\uff0c\u969c\u788d\u7269\u8ddd\u79bb\u4fdd\u6301\u226518cm\uff08\u64cd\u4f5c\u5458\u6545\u610f\u504f\u79fb6cm\u65f6\u4ecd\u6709\u6548\uff09", "\u4f4d\u7f6eRMSE\u4e3a59mm\uff0c\u5de5\u4e1a\u9600\u95e8\u64cd\u4f5c\u4e0e\u62fe\u653e\u4efb\u52a1\u5168\u90e8\u6210\u529f\uff0c\u81ea\u4e3b\u6a21\u5f0f5\u6b21\u4e2d4\u6b21\u6210\u529f\uff1b\u6d88\u878d\u78b0\u649e\u6216\u8f85\u52a9\u6a21\u5757\u5747\u5bfc\u81f4\u5931\u8d25"], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u5171\u4eab\u81ea\u4e3b", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u9065\u64cd\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17323v1", "published_at": "2026-07-19", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "From Perception to Assistance: Open-Vocabulary Shared Autonomy for Robotic Manipulation", "tldr": "\u63d0\u51fa\u5f00\u653e\u8bcd\u6c47\u5171\u4eab\u81ea\u4e3b\u6846\u67b6\uff0c\u8f85\u52a9\u64cd\u4f5c\u5458\u7cbe\u51c6\u9065\u64cd\u4f5c\u673a\u68b0\u81c2\u5b8c\u6210\u5de5\u4e1a\u6293\u53d6\u4efb\u52a1", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u5171\u4eab\u81ea\u4e3b\u6846\u67b6\uff0c\u7ed3\u5408RGB-D\u76f8\u673a\u624b\u52bf\u6355\u6349\u3001\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u76ee\u6807\u5b9a\u4f4d\u3001\u53ef\u63d0\u793a\u89c6\u9891\u5206\u5272\u8ddf\u8e2a\u4e0eGPU\u52a0\u901f\u6a21\u578b\u9884\u6d4b\u63a7\u5236\uff0c\u5e2e\u52a9\u64cd\u4f5c\u5458\u5728\u6742\u4e71\u5de5\u4e1a\u73af\u5883\u4e2d\u7cbe\u51c6\u9065\u64cd\u4f5c\u673a\u68b0\u81c2\uff0c\u65e0\u9700\u7a7f\u6234\u8bbe\u5907\u6216\u6807\u5b9a\u3002", "why_notable": "\u9996\u6b21\u5c06\u5f00\u653e\u8bcd\u6c47VLM\u76ee\u6807\u5b9a\u4f4d\u3001\u65e0\u6807\u8bb0\u624b\u52bf\u9065\u64cd\u4f5c\u4e0e\u5b9e\u65f6\u78b0\u649e\u611f\u77e5MPC\u6574\u5408\u4e3a\u5b8c\u6574\u5171\u4eab\u81ea\u4e3b\u7cfb\u7edf\uff0c\u5728\u56db\u8db3\u79fb\u52a8\u673a\u68b0\u81c2\u4e0a\u9a8c\u8bc1\uff0c\u5bf9\u5de5\u4e1a\u9065\u64cd\u4f5c\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Direct generation of Chinese vector fonts is a challenging and ongoing problem. A Chinese vector glyph contains complex component structure, anchor layout, and B\u00e9zier curve details, which work at different scales, but a standard vector sequence writes them together in one long sequence, making the task of vector font synthesis challenging. Existing direct vector generators often fail on complex characters, while raster-domain methods must vectorize the synthesized glyph images afterward. To address the above-mentioned problem, this paper proposes VecFontLLM, an anchor-guided multimodal large language model for direct few-shot synthesis of Chinese vector fonts. Our key idea is to generate vector glyphs through anchors rather than a standard vector sequence. Specifically, the proposed VecFontLLM first predicts and refines an anchor scaffold that fixes the coarse layout of components and contours, and then completes B\u00e9zier control points to recover local curvature and style. At test time, a confidence-guided generation chain samples multiple component candidates and continues synthesis from the highest-confidence one, improving stability for complex glyphs. This work demonstrates, for the first time, high-quality few-shot synthesis of complex Chinese vector glyphs directly in the vector domain, without raster generation or vectorization. Experiments on several Chinese font datasets show substantial improvements over existing vector font synthesis methods, competitive glyph rendering quality against raster-domain baselines, and vector command distributions close to real fonts.", "arxiv_id": "2607.17251", "arxiv_url": "https://arxiv.org/abs/2607.17251", "authors": ["Hao Yuan", "Yuxuan Luo", "Xing Chen", "Zhouhui Lian"], "brief": "\u63d0\u51faVecFontLLM\uff0c\u4e00\u79cd\u951a\u70b9\u5f15\u5bfc\u7684\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u65e0\u9700\u5149\u6805\u5316\u6216\u77e2\u91cf\u5316\u540e\u5904\u7406\uff0c\u76f4\u63a5\u5728\u5411\u91cf\u57df\u5b9e\u73b0\u4e2d\u6587\u77e2\u91cf\u5b57\u4f53\u7684\u5c11\u6837\u672c\u5408\u6210\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17251", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u590d\u6742\u6c49\u5b57\u751f\u6210\u5206\u89e3\u4e3a\u4e24\u9636\u6bb5\uff1a\u5148\u9884\u6d4b\u5e76\u7cbe\u5316\u951a\u70b9\u811a\u624b\u67b6\uff08\u786e\u5b9a\u7b14\u753b/\u90e8\u4ef6\u7c97\u5e03\u5c40\uff09\uff0c\u518d\u8865\u5168\u8d1d\u585e\u5c14\u63a7\u5236\u70b9\uff08\u6062\u590d\u5c40\u90e8\u66f2\u7387\u4e0e\u98ce\u683c\uff09", "\u63a8\u7406\u65f6\u91c7\u7528\u7f6e\u4fe1\u5ea6\u5f15\u5bfc\u7684\u751f\u6210\u94fe\uff0c\u5bf9\u591a\u4e2a\u90e8\u4ef6\u5019\u9009\u91c7\u6837\u5e76\u4ece\u6700\u9ad8\u7f6e\u4fe1\u5ea6\u8005\u7ee7\u7eed\u5408\u6210\uff0c\u63d0\u5347\u590d\u6742\u5b57\u5f62\u7684\u7a33\u5b9a\u6027", "\u5b9e\u9a8c\u8868\u660e\u5728\u591a\u4e2a\u4e2d\u6587\u5b57\u4f53\u6570\u636e\u96c6\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u77e2\u91cf\u5b57\u4f53\u5408\u6210\u65b9\u6cd5\uff0c\u6e32\u67d3\u8d28\u91cf\u53ef\u4e0e\u5149\u6805\u57df\u57fa\u7ebf\u5ab2\u7f8e\uff0c\u4e14\u5411\u91cf\u547d\u4ee4\u5206\u5e03\u63a5\u8fd1\u771f\u5b9e\u5b57\u4f53"], "keywords": ["\u5b57\u4f53\u751f\u6210", "\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u77e2\u91cf\u56fe\u5f62", "\u5c11\u6837\u672c\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17251v1", "published_at": "2026-07-19", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "VecFontLLM: Anchor-Guided Direct Synthesis of Chinese Vector Fonts", "tldr": "\u9996\u4e2a\u57fa\u4e8e\u951a\u70b9\u5f15\u5bfc\u7684\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u76f4\u63a5\u5728\u5411\u91cf\u57df\u5408\u6210\u9ad8\u8d28\u91cf\u4e2d\u6587\u77e2\u91cf\u5b57\u4f53", "upvotes": 0, "what_it_is": "\u63d0\u51faVecFontLLM\uff0c\u4e00\u79cd\u951a\u70b9\u5f15\u5bfc\u7684\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u65e0\u9700\u5149\u6805\u5316\u6216\u77e2\u91cf\u5316\u540e\u5904\u7406\uff0c\u76f4\u63a5\u5728\u5411\u91cf\u57df\u5b9e\u73b0\u4e2d\u6587\u77e2\u91cf\u5b57\u4f53\u7684\u5c11\u6837\u672c\u5408\u6210\u3002", "why_notable": "\u9996\u6b21\u5728\u7eaf\u5411\u91cf\u57df\u5b9e\u73b0\u9ad8\u8d28\u91cf\u590d\u6742\u4e2d\u6587\u5b57\u5f62\u7684\u5c11\u6837\u672c\u5408\u6210\uff0c\u7ed5\u8fc7\u4e86\u5149\u6805\u751f\u6210+\u77e2\u91cf\u5316\u7684\u4e24\u6b65\u6d41\u7a0b\uff0c\u4e3a\u5b57\u4f53\u8bbe\u8ba1\u81ea\u52a8\u5316\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f"}, {"abstract": "Recent geometric foundation models (e.g., Metric3D, Depth Anything and UniDepth) have substantially improved monocular depth estimation (MDE) in both cross-scene generalization and metric-scale prediction, yet these gains have not translated to tiny models. We bridge this gap with DepthART (Depth Anything Rethought for Tiny Models), which is a compact MDE model for on-device deployment across diverse scenes. We first identify two capacity-driven bottlenecks in tiny models: (i) overfitting to dataset-specific distribution bias and (ii) unstable metric adaptation under camera shift, where full fine-tuning easily damages transferable geometry. Accordingly, DepthART combines two simple but effective strategies: a bias-resistant data sampling scheme to reduce distribution bias under the same training budget, and a camera-conditioned fine-tuning protocol that freezes the distilled encoder and adjusts metric scale conditioned on intrinsics while better preserving cross-dataset generalization. Across datasets, DepthART consistently surpasses previous tiny baselines in both zero-shot generalization and metric accuracy (e.g., zero-shot $\u03b4_1$=0.964 for DepthART-S on NYUD v2), and in some cases approaches heavy models. We further provide a scalable model family, with DepthART-S reaching 347/245 FPS (strict FP32) on an RTX A6000 at $224^2/448^2$, 102 FPS (TF32) on a Orin NX 8GB, and over 15 FPS (FP32) on a Jetson Nano 4GB.", "arxiv_id": "2607.17099", "arxiv_url": "https://arxiv.org/abs/2607.17099", "authors": ["Feng Xue", "Wu Chen", "Mingshuai Zhao", "Guofeng Zhong", "Anlong Ming", "Haozhe Wang", "Dianqiao Lei", "Zhaowen Lin", "Haiyang Zhang", "Nicu Sebe"], "brief": "\u63d0\u51faDepthART\uff0c\u4e00\u4e2a\u4e13\u4e3a\u7aef\u4fa7\u8bbe\u5907\u8bbe\u8ba1\u7684\u7d27\u51d1\u578b\u5355\u76ee\u6df1\u5ea6\u4f30\u8ba1\u6a21\u578b\uff0c\u901a\u8fc7\u6297\u504f\u5dee\u6570\u636e\u91c7\u6837\u548c\u76f8\u673a\u6761\u4ef6\u5fae\u8c03\u4e24\u9879\u7b56\u7565\uff0c\u89e3\u51b3\u5c0f\u6a21\u578b\u5728\u8de8\u573a\u666f\u6cdb\u5316\u548c\u5ea6\u91cf\u5c3a\u5ea6\u9884\u6d4b\u4e0a\u7684\u74f6\u9888\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17099", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bc6\u522b\u5c0f\u6a21\u578b\u4e24\u5927\u74f6\u9888\uff1a\u6570\u636e\u96c6\u5206\u5e03\u504f\u5dee\u8fc7\u62df\u5408 \u0026 \u76f8\u673a\u53c2\u6570\u53d8\u5316\u5bfc\u81f4\u5ea6\u91cf\u9002\u5e94\u4e0d\u7a33\u5b9a", "\u91c7\u7528\u504f\u5dee\u62b5\u6297\u6570\u636e\u91c7\u6837 + \u51bb\u7ed3\u7f16\u7801\u5668\u7684\u76f8\u673a\u6761\u4ef6\u5fae\u8c03\u534f\u8bae\uff0c\u4fdd\u7559\u8de8\u6570\u636e\u96c6\u6cdb\u5316\u80fd\u529b", "DepthART-S\u5728NYUD v2\u96f6\u6837\u672c\u6d4b\u8bd5\u03b4\u2081=0.964\uff0cRTX A6000\u4e0a\u8fbe347 FPS\uff0cJetson Nano 4GB\u4e0a\u8d8515 FPS"], "keywords": ["\u5355\u76ee\u6df1\u5ea6\u4f30\u8ba1", "\u8f7b\u91cf\u5316\u6a21\u578b", "\u7aef\u4fa7\u90e8\u7f72", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17099v1", "published_at": "2026-07-19", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DepthART: Scaling Foundation Monocular Depth to Tiny Models", "tldr": "DepthART\uff1a\u9762\u5411\u7aef\u4fa7\u90e8\u7f72\u7684\u8f7b\u91cf\u7ea7\u5355\u76ee\u6df1\u5ea6\u4f30\u8ba1\u6a21\u578b\uff0c\u6027\u80fd\u63a5\u8fd1\u5927\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faDepthART\uff0c\u4e00\u4e2a\u4e13\u4e3a\u7aef\u4fa7\u8bbe\u5907\u8bbe\u8ba1\u7684\u7d27\u51d1\u578b\u5355\u76ee\u6df1\u5ea6\u4f30\u8ba1\u6a21\u578b\uff0c\u901a\u8fc7\u6297\u504f\u5dee\u6570\u636e\u91c7\u6837\u548c\u76f8\u673a\u6761\u4ef6\u5fae\u8c03\u4e24\u9879\u7b56\u7565\uff0c\u89e3\u51b3\u5c0f\u6a21\u578b\u5728\u8de8\u573a\u666f\u6cdb\u5316\u548c\u5ea6\u91cf\u5c3a\u5ea6\u9884\u6d4b\u4e0a\u7684\u74f6\u9888\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u57fa\u7840\u6df1\u5ea6\u6a21\u578b\u7684\u80fd\u529b\u8fc1\u79fb\u5230\u6781\u5c0f\u6a21\u578b\uff0c\u5728\u4fdd\u6301\u9ad8\u7cbe\u5ea6\u7684\u540c\u65f6\u5b9e\u73b0\u7aef\u4fa7\u5b9e\u65f6\u63a8\u7406\uff0c\u5bf9\u673a\u5668\u4eba\u3001AR/VR\u7b49\u8d44\u6e90\u53d7\u9650\u573a\u666f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Generative CAD modeling has broad design and application potential. Despite significant advances in Boundary Representation (B-Rep) generation, the dominant representation in CAD, existing methods largely depend on uniformly sampled point- or grid-based geometry representations, sacrificing native surface types and parameters and thereby limiting geometric fidelity and downstream usability. We present ParaCAD, an autoregressive framework for point-cloud-conditioned B-Rep generation that directly operates on native parametric surfaces. ParaCAD introduces a surface-centric tokenization that explicitly encodes each face by its exact surface type and continuous parameters, preserving the intrinsic semantics of CAD geometry. Our model first generates parametric surfaces with constrained UV domains, and then constructs a valid B-Rep by globally intersecting these surfaces to recover edges and vertices. ParaCAD places point-cloud-conditioned generation at the core of B-Rep synthesis, making it practical for user-guided reconstruction and seamless integration into existing 3D generation pipelines. Extensive experiments demonstrate that ParaCAD produces accurate B-Reps with faithful point-cloud alignment, outperforming point-based baselines in geometric precision, robustness, watertightness and downstream usability.", "arxiv_id": "2607.17093", "arxiv_url": "https://arxiv.org/abs/2607.17093", "authors": ["Dafei Qin", "Rui Xu", "Zeyu Shen", "Kaichun Qiao", "Hongyang Lin", "Qixuan Zhang", "Huaijin Pi", "Lan Xu", "Jingyi Yu", "Wenping Wang", "Taku Komura"], "brief": "\u63d0\u51faParaCAD\uff0c\u4e00\u4e2a\u4ee5\u70b9\u4e91\u4e3a\u6761\u4ef6\u3001\u76f4\u63a5\u64cd\u4f5c\u539f\u751f\u53c2\u6570\u66f2\u9762\u7684\u81ea\u56de\u5f52B-Rep\u751f\u6210\u6846\u67b6\uff0c\u901a\u8fc7\u9762\u4e2d\u5fc3\u5316tokenization\u7f16\u7801\u66f2\u9762\u7c7b\u578b\u4e0e\u8fde\u7eed\u53c2\u6570\uff0c\u518d\u5168\u5c40\u6c42\u4ea4\u6062\u590d\u8fb9\u548c\u9876\u70b9\uff0c\u6784\u5efa\u6709\u6548B-Rep\u6a21\u578b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17093", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u9762\u4e2d\u5fc3\u5316tokenization\uff0c\u663e\u5f0f\u7f16\u7801\u6bcf\u4e2a\u9762\u7684\u7cbe\u786e\u66f2\u9762\u7c7b\u578b\uff08\u5e73\u9762\u3001\u67f1\u9762\u3001\u7403\u9762\u7b49\uff09\u53ca\u8fde\u7eed\u53c2\u6570\uff0c\u4fdd\u7559CAD\u51e0\u4f55\u8bed\u4e49", "\u5148\u751f\u6210\u5e26\u7ea6\u675fUV\u57df\u7684\u53c2\u6570\u66f2\u9762\uff0c\u518d\u901a\u8fc7\u5168\u5c40\u66f2\u9762\u6c42\u4ea4\u6062\u590d\u62d3\u6251\u8fb9\u548c\u9876\u70b9\uff0c\u786e\u4fddB-Rep\u6709\u6548\u6027", "\u5728\u51e0\u4f55\u7cbe\u5ea6\u3001\u9c81\u68d2\u6027\u3001\u6c34\u5bc6\u6027\u548c\u4e0b\u6e38\u53ef\u7528\u6027\u4e0a\u5168\u9762\u4f18\u4e8e\u57fa\u4e8e\u70b9/\u7f51\u683c\u7684\u57fa\u7ebf\u65b9\u6cd5"], "keywords": ["CAD\u751f\u6210", "\u4e09\u7ef4\u91cd\u5efa", "\u81ea\u56de\u5f52\u6a21\u578b", "\u53c2\u6570\u5316\u5efa\u6a21"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17093v1", "published_at": "2026-07-19", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Autoregressive B-Rep Shape Generation with Parametric Surfaces", "tldr": "ParaCAD\uff1a\u57fa\u4e8e\u539f\u751f\u53c2\u6570\u66f2\u9762\u7684\u81ea\u56de\u5f52B-Rep CAD\u6a21\u578b\u751f\u6210\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faParaCAD\uff0c\u4e00\u4e2a\u4ee5\u70b9\u4e91\u4e3a\u6761\u4ef6\u3001\u76f4\u63a5\u64cd\u4f5c\u539f\u751f\u53c2\u6570\u66f2\u9762\u7684\u81ea\u56de\u5f52B-Rep\u751f\u6210\u6846\u67b6\uff0c\u901a\u8fc7\u9762\u4e2d\u5fc3\u5316tokenization\u7f16\u7801\u66f2\u9762\u7c7b\u578b\u4e0e\u8fde\u7eed\u53c2\u6570\uff0c\u518d\u5168\u5c40\u6c42\u4ea4\u6062\u590d\u8fb9\u548c\u9876\u70b9\uff0c\u6784\u5efa\u6709\u6548B-Rep\u6a21\u578b\u3002", "why_notable": "\u73b0\u6709B-Rep\u751f\u6210\u65b9\u6cd5\u4f9d\u8d56\u5747\u5300\u91c7\u6837\u7684\u70b9\u6216\u7f51\u683c\u8868\u793a\uff0c\u4e22\u5931\u539f\u751f\u66f2\u9762\u7c7b\u578b\u4e0e\u53c2\u6570\uff1bParaCAD\u9996\u6b21\u5728\u751f\u6210\u8fc7\u7a0b\u4e2d\u4fdd\u7559\u53c2\u6570\u66f2\u9762\u7684\u5185\u5728\u8bed\u4e49\uff0c\u663e\u8457\u63d0\u5347\u51e0\u4f55\u4fdd\u771f\u5ea6\u4e0e\u5de5\u7a0b\u53ef\u7528\u6027\uff0c\u5bf9CAD\u9006\u5411\u5de5\u7a0b\u548c3D\u751f\u6210\u7ba1\u7ebf\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Classical rate-distortion (RD) theory has long established the fundamental limits of lossy compression by quantifying the minimum number of bits required to represent a source under a prescribed distortion constraint. However, widely used distortion measures su
