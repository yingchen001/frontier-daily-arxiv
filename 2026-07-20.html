ch as mean-squared error often fail to capture perceptual quality or semantic validity, which are increasingly central in modern learning-driven applications. Rate-distortion-perception (RDP) theory extends the RD framework by introducing perception as a third fundamental axis, quantified via distributional similarity between the source and reconstructed signals, leading to the rate-distortion-perception function (RDPF). This tutorial provides a structured overview of the coding principles underlying perception-aware lossy compression and surveys recent achievability results under different randomness assumptions. It then presents a unifying optimization viewpoint for computing the RDPF as defined by Blau and Michaeli, for both discrete and continuous sources under broad families of perceptual constraints, including f-divergences, alpha-divergences, and Wasserstein-based metrics. Special attention is given to computational tools such as alternating minimization schemes, Newton-based methods, and convex optimization formulations, as well as to analytically tractable cases such as Gaussian sources and the perfect-realism regime. Unlike recent broad surveys that emphasize generative architectures and AI-empowered communication systems, this tutorial focuses on the coding-theoretic and computational machinery needed to characterize, compute, and interpret the RDP limits. Finally, the tutorial outlines promising research directions at the intersection of information theory, neural compression, robust source coding, and perception-aware networked control systems.", "arxiv_id": "2607.17232", "arxiv_url": "https://arxiv.org/abs/2607.17232", "authors": ["Photios A. Stavrou", "Giuseppe Serra", "Marios Kountouris"], "brief": "\u672c\u6587\u662f\u4e00\u7bc7\u5173\u4e8e\u7387-\u5931\u771f-\u611f\u77e5\uff08RDP\uff09\u7406\u8bba\u7684\u6559\u7a0b\u7efc\u8ff0\uff0c\u7cfb\u7edf\u4ecb\u7ecd\u4e86\u5728\u7ecf\u5178\u7387-\u5931\u771f\u6846\u67b6\u4e2d\u5f15\u5165\u611f\u77e5\u7ea6\u675f\uff08\u5206\u5e03\u76f8\u4f3c\u6027\uff09\u540e\u7684\u7406\u8bba\u57fa\u7840\u3001\u53ef\u8fbe\u6027\u7ed3\u679c\u4e0e\u8ba1\u7b97\u65b9\u6cd5\uff0c\u91cd\u70b9\u9610\u8ff0\u7387-\u5931\u771f-\u611f\u77e5\u51fd\u6570\uff08RDPF\uff09\u7684\u4f18\u5316\u8ba1\u7b97\u6846\u67b6\u3002", "categories": ["cs.IT", "cs.LG", "eess.SY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17232", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u611f\u77e5\u8d28\u91cf\u4f5c\u4e3a\u7b2c\u4e09\u7ef4\u5ea6\u5f15\u5165\u538b\u7f29\u6846\u67b6\uff0c\u901a\u8fc7f-\u6563\u5ea6\u3001\u03b1-\u6563\u5ea6\u3001Wasserstein\u8ddd\u79bb\u7b49\u5ea6\u91cf\u5206\u5e03\u76f8\u4f3c\u6027", "\u63d0\u4f9b\u7edf\u4e00\u4f18\u5316\u89c6\u89d2\u8ba1\u7b97RDPF\uff0c\u6db5\u76d6\u4ea4\u66ff\u6700\u5c0f\u5316\u3001Newton\u6cd5\u3001\u51f8\u4f18\u5316\u7b49\u8ba1\u7b97\u5de5\u5177\uff0c\u5e76\u7ed9\u51fa\u9ad8\u65af\u6e90\u7684\u89e3\u6790\u89e3", "\u8986\u76d6\u79bb\u6563\u4e0e\u8fde\u7eed\u6e90\u3001\u4e0d\u540c\u968f\u673a\u6027\u5047\u8bbe\u4e0b\u7684\u53ef\u8fbe\u6027\u7ed3\u679c\uff0c\u5e76\u6307\u51fa\u4e0e\u795e\u7ecf\u538b\u7f29\u3001\u9c81\u68d2\u6e90\u7f16\u7801\u53ca\u611f\u77e5\u7f51\u7edc\u63a7\u5236\u7684\u4ea4\u53c9\u7814\u7a76\u65b9\u5411"], "keywords": ["\u4fe1\u606f\u8bba", "\u6709\u635f\u538b\u7f29", "\u611f\u77e5\u8d28\u91cf", "\u7387\u5931\u771f\u7406\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17232v1", "published_at": "2026-07-19", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Rate-Distortion-Perception Theory: Redefining the Fundamental Limits of Information Representation", "tldr": "\u7cfb\u7edf\u68b3\u7406\u611f\u77e5\u611f\u77e5\u6709\u635f\u538b\u7f29\u7684\u7387-\u5931\u771f-\u611f\u77e5\u7406\u8bba\u6846\u67b6\u4e0e\u8ba1\u7b97\u65b9\u6cd5", "upvotes": 0, "what_it_is": "\u672c\u6587\u662f\u4e00\u7bc7\u5173\u4e8e\u7387-\u5931\u771f-\u611f\u77e5\uff08RDP\uff09\u7406\u8bba\u7684\u6559\u7a0b\u7efc\u8ff0\uff0c\u7cfb\u7edf\u4ecb\u7ecd\u4e86\u5728\u7ecf\u5178\u7387-\u5931\u771f\u6846\u67b6\u4e2d\u5f15\u5165\u611f\u77e5\u7ea6\u675f\uff08\u5206\u5e03\u76f8\u4f3c\u6027\uff09\u540e\u7684\u7406\u8bba\u57fa\u7840\u3001\u53ef\u8fbe\u6027\u7ed3\u679c\u4e0e\u8ba1\u7b97\u65b9\u6cd5\uff0c\u91cd\u70b9\u9610\u8ff0\u7387-\u5931\u771f-\u611f\u77e5\u51fd\u6570\uff08RDPF\uff09\u7684\u4f18\u5316\u8ba1\u7b97\u6846\u67b6\u3002", "why_notable": "\u968f\u7740\u751f\u6210\u6a21\u578b\u9a71\u52a8\u7684\u56fe\u50cf/\u89c6\u9891\u538b\u7f29\u5174\u8d77\uff0c\u611f\u77e5\u8d28\u91cf\u4e0e\u8bed\u4e49\u6709\u6548\u6027\u65e5\u76ca\u91cd\u8981\uff0c\u672c\u6587\u4ece\u7f16\u7801\u7406\u8bba\u4e0e\u8ba1\u7b97\u673a\u5236\u89d2\u5ea6\u7cfb\u7edf\u5316RDP\u7406\u8bba\uff0c\u586b\u8865\u4e86\u73b0\u6709\u7efc\u8ff0\u504f\u91cd\u751f\u6210\u67b6\u6784\u800c\u5ffd\u89c6\u7406\u8bba\u57fa\u7840\u7684\u7a7a\u767d\uff0c\u5bf9\u4fe1\u606f\u8bba\u4e0e\u795e\u7ecf\u538b\u7f29\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Within Explainable Artificial Intelligence, mechanistic interpretability uses Sparse Autoencoders (SAEs) to extract more interpretable features from neural representations. However, assessing their monosemanticity, and thus explanation quality, remains challenging. Existing metrics require external concept labels or depend on pretrained embedding models, making them sensitive to encoder\u0027s geometry. We introduce the Tversky Monosemanticity Score (TMS), a label-free metric that operationalizes monosemanticity as activation-set coherence of binarized SAE latents, and does not require external embedding encoders. We evaluate TMS on SAEs trained on features from pretrained vision and vision-language models (DINOv3, CLIP, BLIP2), two common SAE regimes (TopK, BatchTopK), multiple sparsity levels, and expansion factors. Our results show that TMS is less affected by encoder anisotropy than its embedding-based alternative, while remaining aligned with established monosemanticity indicators. TMS also reveals distinct SAE training dynamics across base models. Moreover, under encoder anisotropy, TMS provides a stronger indication of probe-based concept deletion effectiveness, while being competitive otherwise.", "arxiv_id": "2607.17770", "arxiv_url": "https://arxiv.org/abs/2607.17770", "authors": ["Katarzyna Filus", "Sebastian Pokuci\u0144ski"], "brief": "\u672c\u6587\u63d0\u51faTversky\u5355\u4e49\u6027\u8bc4\u5206\uff08TMS\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u5916\u90e8\u6982\u5ff5\u6807\u7b7e\u6216\u9884\u8bad\u7ec3\u5d4c\u5165\u6a21\u578b\u7684\u6307\u6807\uff0c\u901a\u8fc7\u4e8c\u503c\u5316SAE\u6f5c\u53d8\u91cf\u7684\u6fc0\u6d3b\u96c6\u5408\u4e00\u81f4\u6027\u6765\u91cf\u5316\u7a00\u758f\u81ea\u7f16\u7801\u5668\u7684\u5355\u4e49\u6027\uff0c\u5e76\u5728\u591a\u79cd\u89c6\u89c9/\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0a\u8fdb\u884c\u4e86\u7cfb\u7edf\u8bc4\u4f30\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17770", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["TMS\u57fa\u4e8eTversky\u76f8\u4f3c\u5ea6\u8861\u91cf\u6fc0\u6d3b\u96c6\u5408\u7684\u5185\u805a\u6027\uff0c\u5b8c\u5168\u65e0\u6807\u7b7e\u3001\u4e0d\u4f9d\u8d56\u5916\u90e8\u5d4c\u5165\u7f16\u7801\u5668\uff0c\u907f\u514d\u4e86\u7f16\u7801\u5668\u5404\u5411\u5f02\u6027\u7684\u5e72\u6270", "\u5728DINOv3\u3001CLIP\u3001BLIP2\u7b49\u6a21\u578b\u53caTopK/BatchTopK\u4e24\u79cdSAE\u8bad\u7ec3\u8303\u5f0f\u3001\u591a\u79cd\u7a00\u758f\u5ea6\u548c\u6269\u5c55\u56e0\u5b50\u4e0b\u8fdb\u884c\u4e86\u5168\u9762\u8bc4\u4f30", "TMS\u5728\u7f16\u7801\u5668\u5404\u5411\u5f02\u6027\u6761\u4ef6\u4e0b\u6bd4\u57fa\u4e8e\u5d4c\u5165\u7684\u66ff\u4ee3\u6307\u6807\u66f4\u80fd\u6709\u6548\u9884\u6d4b\u57fa\u4e8e\u63a2\u9488\u7684\u6982\u5ff5\u5220\u9664\u6548\u679c"], "keywords": ["\u53ef\u89e3\u91caAI", "\u7a00\u758f\u81ea\u7f16\u7801\u5668", "\u591a\u6a21\u6001", "\u8868\u5f81\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17770v1", "published_at": "2026-07-20", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Measuring Monosemanticity in Sparse Autoencoders via Latent Activation Coherence", "tldr": "\u63d0\u51fa\u65e0\u9700\u5916\u90e8\u6807\u7b7e\u7684\u5355\u4e49\u6027\u8bc4\u4f30\u6307\u6807TMS\uff0c\u7528\u4e8e\u8861\u91cf\u7a00\u758f\u81ea\u7f16\u7801\u5668\u7684\u53ef\u89e3\u91ca\u6027\u8d28\u91cf", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51faTversky\u5355\u4e49\u6027\u8bc4\u5206\uff08TMS\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u5916\u90e8\u6982\u5ff5\u6807\u7b7e\u6216\u9884\u8bad\u7ec3\u5d4c\u5165\u6a21\u578b\u7684\u6307\u6807\uff0c\u901a\u8fc7\u4e8c\u503c\u5316SAE\u6f5c\u53d8\u91cf\u7684\u6fc0\u6d3b\u96c6\u5408\u4e00\u81f4\u6027\u6765\u91cf\u5316\u7a00\u758f\u81ea\u7f16\u7801\u5668\u7684\u5355\u4e49\u6027\uff0c\u5e76\u5728\u591a\u79cd\u89c6\u89c9/\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0a\u8fdb\u884c\u4e86\u7cfb\u7edf\u8bc4\u4f30\u3002", "why_notable": "\u73b0\u6709\u5355\u4e49\u6027\u8bc4\u4f30\u65b9\u6cd5\u4f9d\u8d56\u5916\u90e8\u8d44\u6e90\u4e14\u53d7\u5d4c\u5165\u51e0\u4f55\u5f71\u54cd\uff0cTMS\u63d0\u4f9b\u4e86\u4e00\u79cd\u8f7b\u91cf\u3001\u9c81\u68d2\u7684\u66ff\u4ee3\u65b9\u6848\uff0c\u6709\u52a9\u4e8e\u63a8\u52a8\u673a\u68b0\u53ef\u89e3\u91ca\u6027\u7814\u7a76\u4e2dSAE\u8d28\u91cf\u8bc4\u4f30\u7684\u6807\u51c6\u5316"}, {"abstract": "Longitudinal T cell receptor repertoires contain signals of clonal expansion, contraction, disappearance, and reappearance after immune perturbation. Static repertoire language models usually summarize a sample as a bag of sequences, so the sampling interval, sequencing depth, and clone presence pattern are only weakly represented. This paper presents DynImmune-BERT, a continuous time repertoire model for patient level immune status prediction. The method combines depth adaptive centered log ratio initialization, clone presence gated Neural ordinary differential equation dynamics, bounded neighborhood self attention, event based state restart, and a hybrid transport objective that supervises dominant and rare clone mass. A low rank meta adapter initializes reappearing clonotypes while keeping the parameter count independent of the number of observed clones. The evaluation separates literature reported baselines from internally controlled temporal comparisons, reports uncertainty for small external cohorts, adds calibration and threshold diagnostics, and visualizes latent clone trajectories and attention neighborhoods. The results indicate that event aware temporal modeling can complement strong static encoders when longitudinal repertoire structure is available, while small external cohorts and protocol differences require cautious interpretation.", "arxiv_id": "2607.17244", "arxiv_url": "https://arxiv.org/abs/2607.17244", "authors": ["Rong Fu", "Yongtai Liu", "Xiaowen Ma", "Haoyu Zhao", "Shuo Yin", "Yiqing Lyu", "Long Zhang", "Wangyu Wu"], "brief": "\u63d0\u51faDynImmune-BERT\uff0c\u4e00\u79cd\u9762\u5411\u60a3\u8005\u7ea7\u514d\u75ab\u72b6\u6001\u9884\u6d4b\u7684\u8fde\u7eed\u65f6\u95f4T\u7ec6\u80de\u53d7\u4f53\u5e93\u6a21\u578b\uff0c\u901a\u8fc7\u795e\u7ecf\u5e38\u5fae\u5206\u65b9\u7a0b\uff08Neural ODE\uff09\u6355\u6349\u514b\u9686\u6269\u589e\u3001\u6536\u7f29\u3001\u6d88\u5931\u4e0e\u518d\u73b0\u7684\u52a8\u6001\u8fc7\u7a0b\uff0c\u514b\u670d\u9759\u6001\u8bed\u8a00\u6a21\u578b\u5ffd\u7565\u65f6\u5e8f\u7ed3\u6784\u7684\u7f3a\u9677\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17244", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u7ed3\u5408\u6df1\u5ea6\u81ea\u9002\u5e94\u4e2d\u5fc3\u5bf9\u6570\u6bd4\u521d\u59cb\u5316\u3001\u514b\u9686\u5b58\u5728\u95e8\u63a7Neural ODE\u52a8\u529b\u5b66\u4e0e\u6709\u754c\u90bb\u57df\u81ea\u6ce8\u610f\u529b\u673a\u5236\uff0c\u5b9e\u73b0\u8fde\u7eed\u65f6\u95f4\u5e8f\u5217\u5efa\u6a21", "\u5f15\u5165\u4e8b\u4ef6\u9a71\u52a8\u72b6\u6001\u91cd\u542f\u673a\u5236\u4e0e\u6df7\u5408\u4f20\u8f93\u76ee\u6807\uff0c\u540c\u65f6\u76d1\u7763\u4e3b\u5bfc\u514b\u9686\u548c\u7a00\u6709\u514b\u9686\u7684\u8d28\u91cf\u5206\u5e03", "\u4f4e\u79e9\u5143\u9002\u914d\u5668\u521d\u59cb\u5316\u518d\u73b0\u514b\u9686\u578b\uff0c\u53c2\u6570\u91cf\u4e0e\u89c2\u6d4b\u514b\u9686\u6570\u65e0\u5173\uff0c\u5177\u5907\u826f\u597d\u53ef\u6269\u5c55\u6027"], "keywords": ["\u751f\u7269\u4fe1\u606f\u5b66", "\u65f6\u5e8f\u5efa\u6a21", "Transformer", "\u795e\u7ecfODE"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17244v1", "published_at": "2026-07-19", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "DynImmune-BERT: Dynamic Immune Repertoire Modeling with Neural ODE Driven Continuous Transformers", "tldr": "DynImmune-BERT\uff1a\u7528\u795e\u7ecfODE\u9a71\u52a8\u8fde\u7eed\u65f6\u95f4Transformer\u5efa\u6a21\u7eb5\u5411T\u7ec6\u80de\u53d7\u4f53\u5e93\uff0c\u9884\u6d4b\u60a3\u8005\u514d\u75ab\u72b6\u6001", "upvotes": 0, "what_it_is": "\u63d0\u51faDynImmune-BERT\uff0c\u4e00\u79cd\u9762\u5411\u60a3\u8005\u7ea7\u514d\u75ab\u72b6\u6001\u9884\u6d4b\u7684\u8fde\u7eed\u65f6\u95f4T\u7ec6\u80de\u53d7\u4f53\u5e93\u6a21\u578b\uff0c\u901a\u8fc7\u795e\u7ecf\u5e38\u5fae\u5206\u65b9\u7a0b\uff08Neural ODE\uff09\u6355\u6349\u514b\u9686\u6269\u589e\u3001\u6536\u7f29\u3001\u6d88\u5931\u4e0e\u518d\u73b0\u7684\u52a8\u6001\u8fc7\u7a0b\uff0c\u514b\u670d\u9759\u6001\u8bed\u8a00\u6a21\u578b\u5ffd\u7565\u65f6\u5e8f\u7ed3\u6784\u7684\u7f3a\u9677\u3002", "why_notable": "\u9996\u6b21\u5c06Neural ODE\u4e0e\u514d\u75ab\u7ec4\u5e93\u8bed\u8a00\u6a21\u578b\u7ed3\u5408\uff0c\u5b9e\u73b0\u771f\u6b63\u610f\u4e49\u4e0a\u7684\u8fde\u7eed\u65f6\u95f4\u7eb5\u5411\u514d\u75ab\u52a8\u6001\u5efa\u6a21\uff0c\u5bf9\u75ab\u82d7\u54cd\u5e94\u3001\u81ea\u8eab\u514d\u75ab\u7b49\u9700\u8981\u8ffd\u8e2a\u514b\u9686\u6f14\u5316\u7684\u4e34\u5e8a\u573a\u666f\u5177\u6709\u91cd\u8981\u5e94\u7528\u4ef7\u503c\u3002"}, {"abstract": "In this work we study the Best Policy Identification (BPI) problem in online, tabular Reinforcement Learning. This is an active sequential hypothesis testing problem in which the learner\u0027s objective is to identify an optimal policy in a Markov Decision Process (MDP) with high confidence, while minimizing the expected sample complexity to do so. We consider an online setting with deterministic rewards, where the agent must strategically navigate through the MDP in order to effectively explore. Previous works in the literature have provided asymptotically optimal methods for BPI, such as the Navigate and Stop (NaS) algorithm and its variants, however existing analysis remains asymptotic. In this work, we fill that gap by providing the first non-asymptotic sample complexity guarantees for NaS, showing that its sample complexity depends not only on the characteristic time, but also on the connectivity of the underlying MDP, the curvature of the optimal characteristic time, and other instance-dependent quantities. We identify these additional attributes and make explicit their contributions to the overall sample complexity.", "arxiv_id": "2607.17201", "arxiv_url": "https://arxiv.org/abs/2607.17201", "authors": ["Joseph Lazzaro", "Alessio Russo", "Aldo Pacchiano"], "brief": "\u672c\u6587\u7814\u7a76\u5728\u7ebf\u8868\u683c\u5f3a\u5316\u5b66\u4e60\u4e2d\u7684\u6700\u4f18\u7b56\u7565\u8bc6\u522b\uff08BPI\uff09\u95ee\u9898\uff0c\u9996\u6b21\u4e3aNaS\u7b97\u6cd5\u63d0\u4f9b\u975e\u6e10\u8fd1\u6837\u672c\u590d\u6742\u5ea6\u4e0a\u754c\uff0c\u63ed\u793a\u4e86\u5f71\u54cd\u590d\u6742\u5ea6\u7684\u591a\u4e2a\u5b9e\u4f8b\u76f8\u5173\u56e0\u7d20\u3002", "categories": ["stat.ML", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17201", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u586b\u8865\u4e86NaS\u7b97\u6cd5\u53ca\u5176\u53d8\u4f53\u4ec5\u6709\u6e10\u8fd1\u5206\u6790\u7684\u7406\u8bba\u7a7a\u767d\uff0c\u7ed9\u51fa\u9996\u4e2a\u975e\u6e10\u8fd1\u4fdd\u8bc1", "\u6837\u672c\u590d\u6742\u5ea6\u4e0d\u4ec5\u4f9d\u8d56\u7279\u5f81\u65f6\u95f4\uff0c\u8fd8\u53d7MDP\u8fde\u901a\u6027\u3001\u6700\u4f18\u7279\u5f81\u65f6\u95f4\u66f2\u7387\u7b49\u56e0\u7d20\u5f71\u54cd", "\u660e\u786e\u91cf\u5316\u4e86\u5404\u5b9e\u4f8b\u76f8\u5173\u5c5e\u6027\u5bf9\u603b\u4f53\u6837\u672c\u590d\u6742\u5ea6\u7684\u8d21\u732e"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u6837\u672c\u590d\u6742\u5ea6", "\u5047\u8bbe\u68c0\u9a8c", "\u63a2\u7d22\u7b56\u7565"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17201v1", "published_at": "2026-07-19", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Non-Asymptotic Best Policy Identification Guarantees in Online Reinforcement Learning", "tldr": "\u9996\u6b21\u4e3a\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u6700\u4f18\u7b56\u7565\u8bc6\u522b\u7b97\u6cd5NaS\u63d0\u4f9b\u975e\u6e10\u8fd1\u6837\u672c\u590d\u6742\u5ea6\u4fdd\u8bc1", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u5728\u7ebf\u8868\u683c\u5f3a\u5316\u5b66\u4e60\u4e2d\u7684\u6700\u4f18\u7b56\u7565\u8bc6\u522b\uff08BPI\uff09\u95ee\u9898\uff0c\u9996\u6b21\u4e3aNaS\u7b97\u6cd5\u63d0\u4f9b\u975e\u6e10\u8fd1\u6837\u672c\u590d\u6742\u5ea6\u4e0a\u754c\uff0c\u63ed\u793a\u4e86\u5f71\u54cd\u590d\u6742\u5ea6\u7684\u591a\u4e2a\u5b9e\u4f8b\u76f8\u5173\u56e0\u7d20\u3002", "why_notable": "\u5c06BPI\u9886\u57df\u7684\u7406\u8bba\u5206\u6790\u4ece\u6e10\u8fd1\u63a8\u8fdb\u5230\u975e\u6e10\u8fd1\uff0c\u4e3a\u5b9e\u9645\u6709\u9650\u6837\u672c\u573a\u666f\u63d0\u4f9b\u53ef\u64cd\u4f5c\u7684\u7406\u8bba\u4f9d\u636e\uff0c\u5bf9\u5f3a\u5316\u5b66\u4e60\u63a2\u7d22\u7b56\u7565\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Imbalanced learning addresses predictive modeling problems with underrepresented regions of the data distribution. Although widely studied in classification, imbalanced regression remains challenging because of continuous target variables and heterogeneous density distributions. Existing data-level methods often rely on fixed target partitioning or synthetic sample generation without jointly considering density variations and local feature-space structure. We propose DADIR, a Density-Aware Data-level Imbalanced Regression framework that exploits density information throughout the balancing process. DADIR comprises three components: (1) Density-Aware Adaptive Partitioning (DAAP), which recursively partitions the target space according to density variations; (2) a Density-Regularized Conditional Variational Autoencoder (DR-CVAE), which preserves sparse-region representations while learning latent features; and (3) latent-space data balancing, which combines feature-level clustering with oversampling to generate structurally consistent synthetic samples. Together, these components identify minority regions more effectively, preserve sparse-region information, and generate realistic synthetic data. The resulting balanced dataset can be used directly with existing regression models without modifying their architecture or learning objective. Experiments on diverse imbalanced regression datasets demonstrate consistent improvements in predictive performance, particularly in underrepresented regions, while also improving overall accuracy.", "arxiv_id": "2607.17178", "arxiv_url": "https://arxiv.org/abs/2607.17178", "authors": ["Shermin Shahbazi", "Hossein Mohammadi", "Mohsen Afsharchi"], "brief": "\u63d0\u51faDADIR\u6846\u67b6\uff0c\u9488\u5bf9\u8fde\u7eed\u76ee\u6807\u53d8\u91cf\u7684\u4e0d\u5e73\u8861\u56de\u5f52\u95ee\u9898\uff0c\u901a\u8fc7\u5bc6\u5ea6\u611f\u77e5\u81ea\u9002\u5e94\u5206\u533a\u3001\u5bc6\u5ea6\u6b63\u5219\u5316\u6761\u4ef6\u53d8\u5206\u81ea\u7f16\u7801\u5668\u548c\u6f5c\u7a7a\u95f4\u6570\u636e\u5e73\u8861\u4e09\u4e2a\u7ec4\u4ef6\uff0c\u751f\u6210\u7ed3\u6784\u4e00\u81f4\u7684\u5408\u6210\u6837\u672c\u4ee5\u5e73\u8861\u6570\u636e\u5206\u5e03\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17178", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5bc6\u5ea6\u611f\u77e5\u81ea\u9002\u5e94\u5206\u533a\uff08DAAP\uff09\uff1a\u6839\u636e\u5bc6\u5ea6\u53d8\u5316\u9012\u5f52\u5212\u5206\u76ee\u6807\u7a7a\u95f4\uff0c\u66f4\u7cbe\u51c6\u8bc6\u522b\u5c11\u6570\u533a\u57df", "\u5bc6\u5ea6\u6b63\u5219\u5316CVAE\uff08DR-CVAE\uff09\uff1a\u5728\u5b66\u4e60\u6f5c\u5728\u7279\u5f81\u7684\u540c\u65f6\u4fdd\u7559\u7a00\u758f\u533a\u57df\u7684\u8868\u793a\u4fe1\u606f", "\u6f5c\u7a7a\u95f4\u6570\u636e\u5e73\u8861\uff1a\u7ed3\u5408\u7279\u5f81\u7ea7\u805a\u7c7b\u4e0e\u8fc7\u91c7\u6837\u751f\u6210\u7ed3\u6784\u4e00\u81f4\u7684\u5408\u6210\u6837\u672c\uff0c\u65e0\u9700\u4fee\u6539\u4e0b\u6e38\u6a21\u578b\u67b6\u6784"], "keywords": ["\u4e0d\u5e73\u8861\u5b66\u4e60", "\u56de\u5f52", "\u6570\u636e\u589e\u5f3a", "\u53d8\u5206\u81ea\u7f16\u7801\u5668"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17178v1", "published_at": "2026-07-19", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "DADIR: Density-Aware Data-level Imbalanced Regression Framework", "tldr": "\u63d0\u51faDADIR\u6846\u67b6\uff0c\u901a\u8fc7\u5bc6\u5ea6\u611f\u77e5\u5206\u533a\u4e0e\u6761\u4ef6\u53d8\u5206\u81ea\u7f16\u7801\u5668\u89e3\u51b3\u4e0d\u5e73\u8861\u56de\u5f52\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faDADIR\u6846\u67b6\uff0c\u9488\u5bf9\u8fde\u7eed\u76ee\u6807\u53d8\u91cf\u7684\u4e0d\u5e73\u8861\u56de\u5f52\u95ee\u9898\uff0c\u901a\u8fc7\u5bc6\u5ea6\u611f\u77e5\u81ea\u9002\u5e94\u5206\u533a\u3001\u5bc6\u5ea6\u6b63\u5219\u5316\u6761\u4ef6\u53d8\u5206\u81ea\u7f16\u7801\u5668\u548c\u6f5c\u7a7a\u95f4\u6570\u636e\u5e73\u8861\u4e09\u4e2a\u7ec4\u4ef6\uff0c\u751f\u6210\u7ed3\u6784\u4e00\u81f4\u7684\u5408\u6210\u6837\u672c\u4ee5\u5e73\u8861\u6570\u636e\u5206\u5e03\u3002", "why_notable": "\u73b0\u6709\u4e0d\u5e73\u8861\u56de\u5f52\u65b9\u6cd5\u591a\u4f9d\u8d56\u56fa\u5b9a\u76ee\u6807\u5206\u533a\u6216\u5ffd\u7565\u5c40\u90e8\u7279\u5f81\u7ed3\u6784\uff0cDADIR\u9996\u6b21\u5c06\u5bc6\u5ea6\u4fe1\u606f\u8d2f\u7a7f\u6574\u4e2a\u5e73\u8861\u6d41\u7a0b\uff0c\u4e14\u751f\u6210\u7684\u5e73\u8861\u6570\u636e\u96c6\u53ef\u76f4\u63a5\u7528\u4e8e\u4efb\u610f\u56de\u5f52\u6a21\u578b\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u901a\u7528\u6027\u548c\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Transformer-based large language models (LLMs) continue to achieve state-of-the-art performance across various natural language processing tasks. However, their subpar performance on seemingly elementary problems, such as basic arithmetic, raises concerns about model reliability, safety, and ethical deployment. In this study, we demonstrate that the performance of a vanilla Transformer model trained on integer arithmetic tasks can be improved using methods effective for human learners. We begin by decomposing the arithmetic task into well-defined subtasks and conducting loss convergence order analysis together with ablation studies for each subtask. Our findings reveal that LLMs exhibit learning patterns similar to those of human learners, with a faster learning speed for simpler subtasks compared to more complex ones. In addition, we successfully improved the accuracy of LLMs by applying problem-solving strategies and cognitive empowerment methods shown to enhance the performance of human learners. This suggests that transformer-based LLMs may share cognitive processes with human learners in arithmetic. Lastly, we provide a comprehensive demonstration of our method\u0027s effectiveness, including significant accuracy improvement experiments, visualization verification, and explanation-based analysis to illuminate the intricacies of LLMs in arithmetic learning. In general, this work explores the potential similarities between transformer-based LLMs and human learners, supported by explainable AI (XAI) verifications, ultimately fostering trust in LLMs for critical and high-stakes applications.", "arxiv_id": "2607.17166", "arxiv_url": "https://arxiv.org/abs/2607.17166", "authors": ["Luyu Qiu", "Jianing Li", "Hwanhee Kim", "Xiaoyong Wei", "Yueyuan Zheng", "Janet Hsiao", "Lei Chen"], "brief": "\u7814\u7a76\u53d1\u73b0Transformer\u5927\u8bed\u8a00\u6a21\u578b\u5728\u7b97\u672f\u4efb\u52a1\u4e2d\u7684\u5b66\u4e60\u6a21\u5f0f\u4e0e\u4eba\u7c7b\u5b66\u4e60\u8005\u76f8\u4f3c\uff0c\u7b80\u5355\u5b50\u4efb\u52a1\u5b66\u4e60\u66f4\u5feb\u3002\u901a\u8fc7\u501f\u9274\u4eba\u7c7b\u8ba4\u77e5\u7b56\u7565\uff08\u5982\u95ee\u9898\u5206\u89e3\u3001\u8ba4\u77e5\u589e\u5f3a\u65b9\u6cd5\uff09\u663e\u8457\u63d0\u5347\u4e86\u6a21\u578b\u5728\u7b97\u672f\u4efb\u52a1\u4e0a\u7684\u51c6\u786e\u7387\uff0c\u5e76\u7ed3\u5408\u53ef\u89e3\u91caAI\u65b9\u6cd5\u9a8c\u8bc1\u4e86\u8fd9\u4e00\u673a\u5236\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17166", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u7b97\u672f\u63a8\u7406", "\u53ef\u89e3\u91caAI", "\u8ba4\u77e5\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17166v1", "published_at": "2026-07-19", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Explaining and Tuning Transformer-based LLMs in Arithmetic Tasks with Human Strategies", "tldr": "\u7814\u7a76\u53d1\u73b0Transformer\u5927\u8bed\u8a00\u6a21\u578b\u5728\u7b97\u672f\u4efb\u52a1\u4e2d\u7684\u5b66\u4e60\u6a21\u5f0f\u4e0e\u4eba\u7c7b\u5b66\u4e60\u8005\u76f8\u4f3c\uff0c\u7b80\u5355\u5b50\u4efb\u52a1\u5b66\u4e60\u66f4\u5feb\u3002\u901a\u8fc7\u501f\u9274\u4eba\u7c7b\u8ba4\u77e5\u7b56\u7565\uff08\u5982\u95ee\u9898\u5206\u89e3\u3001\u8ba4\u77e5\u589e\u5f3a\u65b9\u6cd5\uff09\u663e\u8457\u63d0\u5347\u4e86\u6a21\u578b\u5728\u7b97\u672f\u4efb\u52a1\u4e0a\u7684\u51c6\u786e\u7387\uff0c\u5e76\u7ed3\u5408\u53ef\u89e3\u91caAI\u65b9\u6cd5\u9a8c\u8bc1\u4e86\u8fd9\u4e00\u673a\u5236\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Developing Automatic Speech Recognition (ASR) for morphologically rich, low-resource languages such as Assamese is challenging due to insufficient annotated speech data. The pretrained Whisper model performs poorly on Assamese speech recognition tasks. This paper presents a controlled, fine-tuned Whisper-based Assamese ASR system trained on the Mozilla Common Voice 24.0-Assamese corpus. A hardware-aware optimized training pipeline is implemented for resource-constrained environments, employing mixed-precision training and gradient accumulation on Tesla 4 Graphics Processing Units (T4 GPUs). The proposed fine-tuned model significantly outperformed the Zero-shot baseline, yielding Word Error Rate (WER), Character Error Rate (CER), Match Error Rate (MER), and Word Infomation Loss (WIL) of 43.17\\%, 13.18\\%, 43\\%, and 64.81\\%, respectively, achieving significant relative improvements of 78.26\\%, 93.10\\%, 57.0\\%, and 35.19\\% over the baseline. Semantic evaluation of the fine-tuned model also demonstrates notable improvement over a zero baseline, attaining Bilingual Evaluation Understudy (BLEU) and Metric for Evaluation of Translation with Explicit ORdering (METEOR) scores of 30.81 and 0.5262, respectively. Additionally, the predicted hallucination rate and Real-Time Factor (RTF) are substantially improved by 96.70\\% and 32.38\\%, compared to the zero-shot baseline.", "arxiv_id": "2607.17164", "arxiv_url": "https://arxiv.org/abs/2607.17164", "authors": ["Ganapati Das", "Dwipen Laskar", "Hasin Afzal Ahmed", "Sanjib Kr Kalita", "Kshirod Sarmah", "Hem Chandra Das", "Manjula Kalita"], "brief": "\u9488\u5bf9\u4f4e\u8d44\u6e90\u5f62\u6001\u4e30\u5bcc\u8bed\u8a00\u963f\u8428\u59c6\u8bed\uff0c\u5bf9Whisper\u6a21\u578b\u8fdb\u884c\u53d7\u63a7\u5fae\u8c03\uff0c\u5728Mozilla Common Voice\u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\uff0c\u8bcd\u9519\u8bef\u7387\u76f8\u6bd4\u96f6\u6837\u672c\u57fa\u7ebf\u76f8\u5bf9\u964d\u4f4e78.26%\uff0c\u5e7b\u89c9\u7387\u964d\u4f4e96.70%\uff0c\u663e\u8457\u63d0\u5347\u4e86\u963f\u8428\u59c6\u8bed\u81ea\u52a8\u8bed\u97f3\u8bc6\u522b\u6027\u80fd\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17164", "impact_score": 4, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u97f3\u8bc6\u522b", "\u4f4e\u8d44\u6e90\u8bed\u8a00", "Whisper\u5fae\u8c03", "\u81ea\u52a8\u8bed\u97f3\u8bc6\u522b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17164v1", "published_at": "2026-07-19", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Robust Assamese Speech Recognition through Controlled Fine-Tuning of Whisper Models", "tldr": "\u9488\u5bf9\u4f4e\u8d44\u6e90\u5f62\u6001\u4e30\u5bcc\u8bed\u8a00\u963f\u8428\u59c6\u8bed\uff0c\u5bf9Whisper\u6a21\u578b\u8fdb\u884c\u53d7\u63a7\u5fae\u8c03\uff0c\u5728Mozilla Common Voice\u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\uff0c\u8bcd\u9519\u8bef\u7387\u76f8\u6bd4\u96f6\u6837\u672c\u57fa\u7ebf\u76f8\u5bf9\u964d\u4f4e78.26%\uff0c\u5e7b\u89c9\u7387\u964d\u4f4e96.70%\uff0c\u663e\u8457\u63d0\u5347\u4e86\u963f\u8428\u59c6\u8bed\u81ea\u52a8\u8bed\u97f3\u8bc6\u522b\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Although mixture-of-experts, MoE, models have been increasingly adopted to scale large language models with moderate computation cost, it remains challenging to deploy MoE inference over resource-constrained and bandwidth-limited edge infrastructures. Existing distributed MoE serving methods mainly rely on exact expert placement, caching, replication, or communication scheduling, while overlooking the functional similarity among experts, which provides an opportunity to reduce cross-server token transmission. Therefore, this paper introduces a similarity-aware expert allocation and distributed deployment framework, dubbed OrderMoE, which aims to accelerate edge MoE inference while balancing inference latency, communication overhead, server workload, and inference quality. OrderMoE first constructs an expert similarity model based on router-induced logits representations and partitions experts in each MoE layer into multiple similarity groups. Then, it develops a similarity-aware expert grouping and deployment strategy to improve local similarity coverage across edge servers. Since reducing remote expert invocation and preserving exact inference quality are conflicting objectives, OrderMoE further designs a quality-aware and trajectory-aware runtime server-expert selection algorithm to decide whether a token should invoke its remote target expert or use a feasible local substitute expert. Experimental results on a real distributed edge testbed show that OrderMoE significantly reduces average latency, tail latency, cross-server traffic, and remote expert invocation ratio, while introducing only small and controllable inference quality degradation.", "arxiv_id": "2607.17154", "arxiv_url": "https://arxiv.org/abs/2607.17154", "authors": ["Xin Yuan", "Ning Li", "Quan Chen", "Wenchao Xu", "Athanasios V. Vasilakos", "Song Guo", "Haijun Zhang"], "brief": "\u9488\u5bf9\u8fb9\u7f18\u8bbe\u5907\u4e0aMoE\u6a21\u578b\u63a8\u7406\u7684\u9ad8\u901a\u4fe1\u5f00\u9500\u95ee\u9898\uff0c\u63d0\u51faOrderMoE\u6846\u67b6\uff0c\u5229\u7528\u4e13\u5bb6\u529f\u80fd\u76f8\u4f3c\u6027\u8fdb\u884c\u5206\u7ec4\u90e8\u7f72\uff0c\u5e76\u8bbe\u8ba1\u8d28\u91cf\u611f\u77e5\u7684\u8fd0\u884c\u65f6\u4e13\u5bb6\u66ff\u6362\u7b97\u6cd5\uff0c\u5728\u771f\u5b9e\u5206\u5e03\u5f0f\u8fb9\u7f18\u6d4b\u8bd5\u5e8a\u4e0a\u663e\u8457\u964d\u4f4e\u5ef6\u8fdf\u548c\u8de8\u670d\u52a1\u5668\u6d41\u91cf\uff0c\u540c\u65f6\u4fdd\u6301\u53ef\u63a7\u7684\u63a8\u7406\u8d28\u91cf\u635f\u5931\u3002", "categories": ["cs.NI", "cs.DC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17154", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6df7\u5408\u4e13\u5bb6\u6a21\u578b", "\u8fb9\u7f18\u63a8\u7406", "\u5206\u5e03\u5f0f\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17154v1", "published_at": "2026-07-19", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "OrderMoE: An expert similarity driven distributed edge MoE inference", "tldr": "\u9488\u5bf9\u8fb9\u7f18\u8bbe\u5907\u4e0aMoE\u6a21\u578b\u63a8\u7406\u7684\u9ad8\u901a\u4fe1\u5f00\u9500\u95ee\u9898\uff0c\u63d0\u51faOrderMoE\u6846\u67b6\uff0c\u5229\u7528\u4e13\u5bb6\u529f\u80fd\u76f8\u4f3c\u6027\u8fdb\u884c\u5206\u7ec4\u90e8\u7f72\uff0c\u5e76\u8bbe\u8ba1\u8d28\u91cf\u611f\u77e5\u7684\u8fd0\u884c\u65f6\u4e13\u5bb6\u66ff\u6362\u7b97\u6cd5\uff0c\u5728\u771f\u5b9e\u5206\u5e03\u5f0f\u8fb9\u7f18\u6d4b\u8bd5\u5e8a\u4e0a\u663e\u8457\u964d\u4f4e\u5ef6\u8fdf\u548c\u8de8\u670d\u52a1\u5668\u6d41\u91cf\uff0c\u540c\u65f6\u4fdd\u6301\u53ef\u63a7\u7684\u63a8\u7406\u8d28\u91cf\u635f\u5931\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present a continuous geometric framework that models the discrete algebraic operations of the Transformer architecture as an integro-differential equation (IDE) on a semantic fiber bundle $\\calE = \\calM \\times \\R^d$. Beginning from a single geometric axiom -- that the token sequence forms a discrete $1$-manifold equipped with a canonical measure lattice -- we translate every core component of the modern Transformer (RMSNorm, RoPE, Softmax Attention, FFN, Residual Stream, SGD, Weight Decay) into a cohesive vocabulary of differential geometry, measure theory, and stochastic calculus. The resulting framework yields quantitative predictions spanning entropic optimal transport (Attention as a Schr\u00f6dinger bridge) and non-equilibrium thermodynamics (SGD as It\u00f4 diffusion violating detailed balance). We conduct a six-part experimental campaign across five architectures (Qwen3, LLaMA\\nobreakdash-3.1, Gemma\\nobreakdash-3, GPT-2, Mistral) spanning $124$M to $8$B parameters. The empirical observables are quantitatively consistent with the geometric predictions: the $\u03b5^{-1/2}$ Lipschitz scaling calibration at machine precision ($R^2 = 1.000$), the Lie--Trotter operator-splitting torsion, the symmetric ablation instability confirming the Dual-Law of Topological Stability, the $\\calO(1/\\sqrt{k})$ thermodynamic suppression of Poincar\u00e9 recurrence on the RoPE torus, the thermodynamic context-limit phase transition, and the Non-Equilibrium Steady State parameter vortex -- verified across two optimizers (AdamW and Pure SGD) to exclude momentum artifacts. The results demonstrate that analyzing Transformers through the lens of continuous stochastic differential geometry provides a predictive descriptive vocabulary for the stability limits, context bounds, and optimization dynamics of Large Language Models.", "arxiv_id": "2607.17146", "arxiv_url": "https://arxiv.org/abs/2607.17146", "authors": ["Zhihua Liang"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u8fde\u7eed\u51e0\u4f55\u6846\u67b6\uff0c\u5c06Transformer\u67b6\u6784\u7684\u79bb\u6563\u4ee3\u6570\u64cd\u4f5c\uff08RMSNorm\u3001RoPE\u3001\u6ce8\u610f\u529b\u3001FFN\u7b49\uff09\u7edf\u4e00\u5efa\u6a21\u4e3a\u8bed\u4e49\u7ea4\u7ef4\u4e1b\u4e0a\u7684\u79ef\u5206\u5fae\u5206\u65b9\u7a0b\uff0c\u5e76\u901a\u8fc7\u968f\u673a\u5fae\u5206\u51e0\u4f55\u3001\u6700\u4f18\u4f20\u8f93\u548c\u975e\u5e73\u8861\u70ed\u529b\u5b66\u7ed9\u51fa\u53ef\u91cf\u5316\u9884\u6d4b\u3002\u5728\u4e94\u79cd\u4e3b\u6d41\u5927\u8bed\u8a00\u6a21\u578b\uff08Qwen3\u3001LLaMA-3.1\u3001Gemma-3\u7b49\uff0c\u53c2\u6570\u91cf\u4ece124M\u52308B\uff09\u4e0a\u7684\u516d\u7ec4\u5b9e\u9a8c\u9a8c\u8bc1\u4e86\u51e0\u4f55\u9884\u6d4b\u4e0e\u5b9e\u9a8c\u89c2\u6d4b\u9ad8\u5ea6\u4e00\u81f4\uff0c\u4e3aLLM\u7684\u7a33\u5b9a\u6027\u3001\u4e0a\u4e0b\u6587\u8fb9\u754c\u548c\u4f18\u5316\u52a8\u6001\u63d0\u4f9b\u4e86\u7edf\u4e00\u7684\u63cf\u8ff0\u6027\u6846\u67b6\u3002", "categories": ["cond-mat.dis-nn", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17146", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["Transformer\u67b6\u6784", "\u51e0\u4f55\u6846\u67b6", "\u968f\u673a\u5fae\u5206\u65b9\u7a0b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17146v1", "published_at": "2026-07-19", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Geometry of Semantic Space: A Continuous Geometric Framework for the Transformer Architecture", "tldr": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u8fde\u7eed\u51e0\u4f55\u6846\u67b6\uff0c\u5c06Transformer\u67b6\u6784\u7684\u79bb\u6563\u4ee3\u6570\u64cd\u4f5c\uff08RMSNorm\u3001RoPE\u3001\u6ce8\u610f\u529b\u3001FFN\u7b49\uff09\u7edf\u4e00\u5efa\u6a21\u4e3a\u8bed\u4e49\u7ea4\u7ef4\u4e1b\u4e0a\u7684\u79ef\u5206\u5fae\u5206\u65b9\u7a0b\uff0c\u5e76\u901a\u8fc7\u968f\u673a\u5fae\u5206\u51e0\u4f55\u3001\u6700\u4f18\u4f20\u8f93\u548c\u975e\u5e73\u8861\u70ed\u529b\u5b66\u7ed9\u51fa\u53ef\u91cf\u5316\u9884\u6d4b\u3002\u5728\u4e94\u79cd\u4e3b\u6d41\u5927\u8bed\u8a00\u6a21\u578b\uff08Qwen3\u3001LLaMA-3.1\u3001Gemma-3\u7b49\uff0c\u53c2\u6570\u91cf\u4ece124M\u52308B\uff09\u4e0a\u7684\u516d\u7ec4\u5b9e\u9a8c\u9a8c\u8bc1\u4e86\u51e0\u4f55\u9884\u6d4b\u4e0e\u5b9e\u9a8c\u89c2\u6d4b\u9ad8\u5ea6\u4e00\u81f4\uff0c\u4e3aLLM\u7684\u7a33\u5b9a\u6027\u3001\u4e0a\u4e0b\u6587\u8fb9\u754c\u548c\u4f18\u5316\u52a8\u6001\u63d0\u4f9b\u4e86\u7edf\u4e00\u7684\u63cf\u8ff0\u6027\u6846\u67b6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Sparse autoencoders (SAEs) decompose language model activations into sparse features, but standard SAEs encode each token independently and do not expose information that persists across a sequence. We introduce Persistent Sparse Autoencoders (Persistent SAEs), which extend standard SAEs by learning a persistence coefficient for each feature, allowing the model to learn which features should persist and for how long. Our experiments show that they retain competitive reconstruction quality while learning a spectrum of feature timescales: fast features behave as locally interpretable detectors, whereas slow features concentrate topic-level information in a persistent state. Moreover, as shown in a prompt-injection monitoring case study, slow features preserve detection signals and remain causally effective over long contexts. These results suggest that Persistent SAEs open up new opportunities for interpreting and monitoring language models through persistent semantic representations.", "arxiv_id": "2607.17117", "arxiv_url": "https://arxiv.org/abs/2607.17117", "authors": ["Haoyan Luo", "Mateo Espinosa Zarlenga", "Mateja Jamnik"], "brief": "\u63d0\u51fa\u6301\u4e45\u7a00\u758f\u81ea\u7f16\u7801\u5668\uff08Persistent SAEs\uff09\uff0c\u4e3a\u6bcf\u4e2a\u7279\u5f81\u5b66\u4e60\u4e00\u4e2a\u6301\u4e45\u7cfb\u6570\uff0c\u4f7f\u6a21\u578b\u80fd\u8de8\u5e8f\u5217\u4fdd\u7559\u4fe1\u606f\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u91cd\u5efa\u8d28\u91cf\u7684\u540c\u65f6\uff0c\u5b66\u5230\u4e86\u5feb\u6162\u4e0d\u540c\u65f6\u95f4\u5c3a\u5ea6\u7684\u7279\u5f81\uff1a\u5feb\u7279\u5f81\u6355\u6349\u5c40\u90e8\u8bed\u4e49\uff0c\u6162\u7279\u5f81\u805a\u5408\u4e3b\u9898\u7ea7\u4fe1\u606f\uff0c\u5e76\u5728\u63d0\u793a\u6ce8\u5165\u68c0\u6d4b\u4efb\u52a1\u4e2d\u5c55\u73b0\u51fa\u957f\u4e0a\u4e0b\u6587\u4e0b\u7684\u56e0\u679c\u6709\u6548\u6027\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17117", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7a00\u758f\u81ea\u7f16\u7801\u5668", "\u53ef\u89e3\u91ca\u6027", "\u8bed\u8a00\u6a21\u578b", "\u7279\u5f81\u8868\u793a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17117v1", "published_at": "2026-07-19", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Persistent Sparse Autoencoders: Learning Feature Timescales in Language Models", "tldr": "\u63d0\u51fa\u6301\u4e45\u7a00\u758f\u81ea\u7f16\u7801\u5668\uff08Persistent SAEs\uff09\uff0c\u4e3a\u6bcf\u4e2a\u7279\u5f81\u5b66\u4e60\u4e00\u4e2a\u6301\u4e45\u7cfb\u6570\uff0c\u4f7f\u6a21\u578b\u80fd\u8de8\u5e8f\u5217\u4fdd\u7559\u4fe1\u606f\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u91cd\u5efa\u8d28\u91cf\u7684\u540c\u65f6\uff0c\u5b66\u5230\u4e86\u5feb\u6162\u4e0d\u540c\u65f6\u95f4\u5c3a\u5ea6\u7684\u7279\u5f81\uff1a\u5feb\u7279\u5f81\u6355\u6349\u5c40\u90e8\u8bed\u4e49\uff0c\u6162\u7279\u5f81\u805a\u5408\u4e3b\u9898\u7ea7\u4fe1\u606f\uff0c\u5e76\u5728\u63d0\u793a\u6ce8\u5165\u68c0\u6d4b\u4efb\u52a1\u4e2d\u5c55\u73b0\u51fa\u957f\u4e0a\u4e0b\u6587\u4e0b\u7684\u56e0\u679c\u6709\u6548\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "It is crucial to safeguard computer networks from evolving network security threats and unknown cyberattacks. An essential tool for protecting computer networks against unknown cyber threats is Network Intrusion Detection System (NIDS). However, NIDS faces a major security concern due to its susceptibility to adversarial attacks. Adversarial attacks aim to deceive NIDS by crafting and injecting adversarial examples into the system. These adversarial inputs can deceive the NIDS into misclassifying benign network traffic as malicious. We developed a resilient hybrid defense mechanism aimed to mitigate the impact of two potent adversarial attacks: Fast Gradient Sign Method (FGSM) and Carlini \u0026 Wagner (C\u0026W) attack. Our hybrid defense approach leverages the combined strength of two heuristic defense methods: Adversarial Training (AT) and Gaussian Data Augmentation (GDA). GDA provides multi-directional defense, while AT enhances NIDS robustness against specific adversarial vectors. Under pre-attack scenarios, NIDS demonstrated good accuracy and f1-score. However, in the post-attack scenario, its accuracy significantly dropped under FGSM and C\u0026W attacks (0.2649 and 0.4961, respectively). Our proposed hybrid defense method effectively mitigated these adversarial threats, with post-defense accuracy of 96.57% and 89.20% for FGSM and C\u0026W attacks. We evaluated the defense strategy across a range of epsilon and confidence noise factor values (ranging from 0.0001 to 0.0009). This research provides a good direction for future researchers in the emerging area of adversarial machine learning from a security perspective.", "arxiv_id": "2607.17105", "arxiv_url": "https://arxiv.org/abs/2607.17105", "authors": ["Khushnaseeb Roshan"], "brief": "\u9488\u5bf9\u7f51\u7edc\u5165\u4fb5\u68c0\u6d4b\u7cfb\u7edf\uff08NIDS\uff09\u6613\u53d7\u5bf9\u6297\u653b\u51fb\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u7ed3\u5408\u5bf9\u6297\u8bad\u7ec3\uff08AT\uff09\u4e0e\u9ad8\u65af\u6570\u636e\u589e\u5f3a\uff08GDA\uff09\u7684\u6df7\u5408\u9632\u5fa1\u673a\u5236\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728FGSM\u548cC\u0026W\u653b\u51fb\u4e0b\u5c06\u51c6\u786e\u7387\u5206\u522b\u4ece26.49%\u548c49.61%\u6062\u590d\u81f396.57%\u548c89.20%\uff0c\u663e\u8457\u63d0\u5347\u4e86NIDS\u7684\u9c81\u68d2\u6027\u3002", "categories": ["cs.CR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17105", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5bf9\u6297\u653b\u51fb", "\u7f51\u7edc\u5165\u4fb5\u68c0\u6d4b", "\u5bf9\u6297\u8bad\u7ec3", "\u7f51\u7edc\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17105v1", "published_at": "2026-07-19", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A Multi-Model Hybrid Defense Approach Against White-box Adversarial Attacks in Computer Network Traffic", "tldr": "\u9488\u5bf9\u7f51\u7edc\u5165\u4fb5\u68c0\u6d4b\u7cfb\u7edf\uff08NIDS\uff09\u6613\u53d7\u5bf9\u6297\u653b\u51fb\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u7ed3\u5408\u5bf9\u6297\u8bad\u7ec3\uff08AT\uff09\u4e0e\u9ad8\u65af\u6570\u636e\u589e\u5f3a\uff08GDA\uff09\u7684\u6df7\u5408\u9632\u5fa1\u673a\u5236\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728FGSM\u548cC\u0026W\u653b\u51fb\u4e0b\u5c06\u51c6\u786e\u7387\u5206\u522b\u4ece26.49%\u548c49.61%\u6062\u590d\u81f396.57%\u548c89.20%\uff0c\u663e\u8457\u63d0\u5347\u4e86NIDS\u7684\u9c81\u68d2\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Processing-In-Memory (PIM) has emerged as a promising technology for accelerating machine learning (ML) workloads. Specifically, non-volatile memory-based PIM architectures have enabled effective ML acceleration due to their ability to perform energy-efficient matrix-vector multiplication operations. However, these devices suffer from non-idealities such as thermal noise. This noise alters the stored values in the memory cells which correspond to actual model weights, compromising the inference accuracy. In this work, we introduce ThRIve, a noise-aware training methodology that leverages low-rank adaptation to enable thermally robust inference on heterogeneous PIM architectures. ThRIve selectively stores these low-rank noise-aware parameters on a hardware that is less susceptible to thermal noise, enabling robustness against temperature-induced noise variations. ThRIve mitigates the effects of thermal-noise and prevent the drop in inference accuracy across the entire operating temperature range. Experimental results demonstrate that ThRIve-enabled architectures maintain consistent inference accuracy, with the mean accuracy staying within 2% of the ideal (i.e., noise-free) accuracy, and the variation in accuracy across the entire operating temperature range remaining within 2% of the mean. The proposed methodology achieves accuracy and robustness comparable to thermally-resilient Static Random-Access Memory (SRAM)-based PIM systems, while delivering up to 5.4x reduction in energy-delay product (EDP) during CNN model inferencing.", "arxiv_id": "2607.17091", "arxiv_url": "https://arxiv.org/abs/2607.17091", "authors": ["Vibhanshu Sharma", "Pratyush Dhingra", "Janardhan Rao Doppa", "Partha Pratim Pande"], "brief": "\u63d0\u51faThRIve\u65b9\u6cd5\uff0c\u901a\u8fc7\u4f4e\u79e9\u9002\u5e94\u8bad\u7ec3\u4f7fCNN\u63a8\u7406\u5728\u975e\u6613\u5931\u6027\u5b58\u50a8\u5668\u5185\u8ba1\u7b97\uff08PIM\uff09\u67b6\u6784\u4e2d\u5bf9\u70ed\u566a\u58f0\u5177\u6709\u9c81\u68d2\u6027\u3002\u5c06\u4f4e\u79e9\u566a\u58f0\u611f\u77e5\u53c2\u6570\u9009\u62e9\u6027\u5b58\u50a8\u4e8e\u5bf9\u70ed\u566a\u58f0\u4e0d\u654f\u611f\u7684\u786c\u4ef6\u4e0a\uff0c\u5728\u6574\u4e2a\u5de5\u4f5c\u6e29\u5ea6\u8303\u56f4\u5185\u63a8\u7406\u7cbe\u5ea6\u4e0e\u65e0\u566a\u58f0\u57fa\u51c6\u76f8\u5dee\u4e0d\u8d85\u8fc72%\uff0c\u540c\u65f6\u76f8\u6bd4SRAM-PIM\u7cfb\u7edf\u5b9e\u73b0\u6700\u9ad85.4\u500d\u7684\u80fd\u91cf\u5ef6\u8fdf\u79ef\u964d\u4f4e\u3002", "categories": ["cs.AR", "cs.ET", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17091", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5b58\u5185\u8ba1\u7b97", "\u4f4e\u79e9\u9002\u5e94", "\u70ed\u566a\u58f0\u9c81\u68d2\u6027", "\u795e\u7ecf\u7f51\u7edc\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17091v1", "published_at": "2026-07-19", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ThRIve: Thermally Robust CNN Inference via Low-Rank Adaptation in Heterogeneous PIM Architectures", "tldr": "\u63d0\u51faThRIve\u65b9\u6cd5\uff0c\u901a\u8fc7\u4f4e\u79e9\u9002\u5e94\u8bad\u7ec3\u4f7fCNN\u63a8\u7406\u5728\u975e\u6613\u5931\u6027\u5b58\u50a8\u5668\u5185\u8ba1\u7b97\uff08PIM\uff09\u67b6\u6784\u4e2d\u5bf9\u70ed\u566a\u58f0\u5177\u6709\u9c81\u68d2\u6027\u3002\u5c06\u4f4e\u79e9\u566a\u58f0\u611f\u77e5\u53c2\u6570\u9009\u62e9\u6027\u5b58\u50a8\u4e8e\u5bf9\u70ed\u566a\u58f0\u4e0d\u654f\u611f\u7684\u786c\u4ef6\u4e0a\uff0c\u5728\u6574\u4e2a\u5de5\u4f5c\u6e29\u5ea6\u8303\u56f4\u5185\u63a8\u7406\u7cbe\u5ea6\u4e0e\u65e0\u566a\u58f0\u57fa\u51c6\u76f8\u5dee\u4e0d\u8d85\u8fc72%\uff0c\u540c\u65f6\u76f8\u6bd4SRAM-PIM\u7cfb\u7edf\u5b9e\u73b0\u6700\u9ad85.4\u500d\u7684\u80fd\u91cf\u5ef6\u8fdf\u79ef\u964d\u4f4e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "A Bayes-filtered transformer (BFT) is a transformer trained on sequences that are generated in two steps: first a latent task is drawn from a prior, then observations are drawn conditional on that task. Trained under autoregressive log loss, the BFT\u0027s next-token prediction, in the idealized limit, is the Bayesian posterior predictive distribution (PPD) induced by that prior and that conditional law. In practice the trained BFT is only an approximation of this ideal PPD, raising an interpretive question: what prior and posterior over the latent task has the trained BFT actually internalized? Existing work answers this question by comparing the trained BFT\u0027s predictions against the predictions of various \"reference\" posteriors, each standing in for a different candidate algorithm or computation the BFT might be implementing. This prediction-space comparison is fragile: different posteriors can share the same posterior-mean predictions. We use predictive Monte Carlo (PMC) as a general interpretability tool for any BFT: using only next-token generation, PMC returns an approximation to the implicit prior and posterior over the latent task, answering the interpretive question directly in latent space. We apply PMC to three stylized task families spanning 0-Markov and 1-Markov exchangeability. The phenomena previously reported in these settings remain visible in latent space. Code is available at https://github.com/afiq-aswadi/bft-pmc", "arxiv_id": "2607.17060", "arxiv_url": "https://arxiv.org/abs/2607.17060", "authors": ["Afiq Abdillah Effiezal Aswadi", "Haotong Ma", "Susan Wei"], "brief": "\u8d1d\u53f6\u65af\u8fc7\u6ee4Transformer\uff08BFT\uff09\u5728\u7406\u60f3\u60c5\u51b5\u4e0b\u5b9e\u73b0\u8d1d\u53f6\u65af\u540e\u9a8c\u9884\u6d4b\u5206\u5e03\uff0c\u4f46\u5b9e\u9645\u8bad\u7ec3\u7ed3\u679c\u5b58\u5728\u504f\u5dee\u3002\u672c\u6587\u63d0\u51fa\u9884\u6d4b\u8499\u7279\u5361\u6d1b\uff08PMC\uff09\u65b9\u6cd5\uff0c\u4ec5\u5229\u7528\u4e0b\u4e00token\u751f\u6210\u5373\u53ef\u5728\u6f5c\u5728\u7a7a\u95f4\u4e2d\u76f4\u63a5\u6062\u590dBFT\u9690\u542b\u7684\u5148\u9a8c\u4e0e\u540e\u9a8c\u5206\u5e03\uff0c\u6bd4\u73b0\u6709\u9884\u6d4b\u7a7a\u95f4\u6bd4\u8f83\u65b9\u6cd5\u66f4\u5177\u9c81\u68d2\u6027\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17060", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["Transformer", "\u8d1d\u53f6\u65af\u63a8\u65ad", "\u53ef\u89e3\u91ca\u6027", "\u8499\u7279\u5361\u6d1b\u65b9\u6cd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17060v1", "published_at": "2026-07-19", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "What does a Bayes-filtered transformer believe? A predictive Monte Carlo approach", "tldr": "\u8d1d\u53f6\u65af\u8fc7\u6ee4Transformer\uff08BFT\uff09\u5728\u7406\u60f3\u60c5\u51b5\u4e0b\u5b9e\u73b0\u8d1d\u53f6\u65af\u540e\u9a8c\u9884\u6d4b\u5206\u5e03\uff0c\u4f46\u5b9e\u9645\u8bad\u7ec3\u7ed3\u679c\u5b58\u5728\u504f\u5dee\u3002\u672c\u6587\u63d0\u51fa\u9884\u6d4b\u8499\u7279\u5361\u6d1b\uff08PMC\uff09\u65b9\u6cd5\uff0c\u4ec5\u5229\u7528\u4e0b\u4e00token\u751f\u6210\u5373\u53ef\u5728\u6f5c\u5728\u7a7a\u95f4\u4e2d\u76f4\u63a5\u6062\u590dBFT\u9690\u542b\u7684\u5148\u9a8c\u4e0e\u540e\u9a8c\u5206\u5e03\uff0c\u6bd4\u73b0\u6709\u9884\u6d4b\u7a7a\u95f4\u6bd4\u8f83\u65b9\u6cd5\u66f4\u5177\u9c81\u68d2\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "High-resolution atmospheric data are required to resolve mesoscale and localized meteorological structures, however such datasets remain limited in many regions of the world. Existing high-resolution weather products are typically produced through dynamical downscaling, which is computationally expensive and difficult to scale across locations, variables, and forecast scenarios. These limitations motivate machine-learning-based downscaling systems that can generate multiple weather variables stochastically while producing new high-resolution fields directly. In this paper we present Apeliotes, a framework for high-resolution weather forecasting. Built on the global re-analysis atmospheric data, a pre-trained global weather foundation model, and a regionally trained generative diffusion model, Apeliotes not only provides accurate kilometer-scale weather variables, but also multi-level atmospheric fields which are not directly available in the existing global atmospheric data. Our comprehensive evaluation demonstrates that Apeliotes achieves highly competitive performance. The model predicts vertical wind profile with less than 3\\% error between truth and predicted fields, achieving correlations of 0.91 for 10-m wind speed and 0.99 for 2-m temperature, with NRMSE values of 0.42 and 0.17, respectively.", "arxiv_id": "2607.17037", "arxiv_url": "https://arxiv.org/abs/2607.17037", "authors": ["Evangelia Rafaela Frastali", "Achyut Paudel", "Maryam Golbazi", "Frank Liu"], "brief": "\u63d0\u51faApeliotes\u6846\u67b6\uff0c\u7ed3\u5408\u5168\u7403\u518d\u5206\u6790\u6570\u636e\u3001\u9884\u8bad\u7ec3\u5929\u6c14\u57fa\u7840\u6a21\u578b\u548c\u533a\u57df\u6269\u6563\u751f\u6210\u6a21\u578b\uff0c\u5b9e\u73b0\u516c\u91cc\u7ea7\u9ad8\u5206\u8fa8\u7387\u591a\u5c42\u5927\u6c14\u573a\u9884\u6d4b\u3002\u6a21\u578b\u572810\u7c73\u98ce\u901f\u548c2\u7c73\u6e29\u5ea6\u4e0a\u5206\u522b\u8fbe\u52300.91\u548c0.99\u7684\u76f8\u5173\u7cfb\u6570\uff0c\u5782\u76f4\u98ce\u5ed3\u7ebf\u8bef\u5dee\u4f4e\u4e8e3%\uff0c\u663e\u8457\u4f18\u4e8e\u4f20\u7edf\u52a8\u529b\u964d\u5c3a\u5ea6\u65b9\u6cd5\u3002", "categories": ["cs.LG", "cs.CE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17037", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5929\u6c14\u9884\u62a5", "\u964d\u5c3a\u5ea6", "\u5927\u6c14\u79d1\u5b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17037v1", "published_at": "2026-07-19", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Apeliotes: A Diffusion-Based Modeling Framework for km-scale Multi-Level Atmospheric Fields", "tldr": "\u63d0\u51faApeliotes\u6846\u67b6\uff0c\u7ed3\u5408\u5168\u7403\u518d\u5206\u6790\u6570\u636e\u3001\u9884\u8bad\u7ec3\u5929\u6c14\u57fa\u7840\u6a21\u578b\u548c\u533a\u57df\u6269\u6563\u751f\u6210\u6a21\u578b\uff0c\u5b9e\u73b0\u516c\u91cc\u7ea7\u9ad8\u5206\u8fa8\u7387\u591a\u5c42\u5927\u6c14\u573a\u9884\u6d4b\u3002\u6a21\u578b\u572810\u7c73\u98ce\u901f\u548c2\u7c73\u6e29\u5ea6\u4e0a\u5206\u522b\u8fbe\u52300.91\u548c0.99\u7684\u76f8\u5173\u7cfb\u6570\uff0c\u5782\u76f4\u98ce\u5ed3\u7ebf\u8bef\u5dee\u4f4e\u4e8e3%\uff0c\u663e\u8457\u4f18\u4e8e\u4f20\u7edf\u52a8\u529b\u964d\u5c3a\u5ea6\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Human visual similarity judgments are context-dependent. For example, two images may be similar in shape but distinct in color. Existing perceptual similarity metrics, however, collapse these nuances into a single scalar value, offering no mechanism to condition on specific aspects. To bridge this gap, we introduce a large-scale dataset of human similarity judgments over image triplets, where each triplet is annotated across multiple, free-form semantic aspects of similarity. Benchmarking a broad range of frontier vision-language models (VLMs) reveals a considerable performance gap compared to human annotators\u0027 consensus. Leveraging our data, we fine-tune a VLM to produce our Text-Prompted Image Perceptual Similarity (TPIPS) metric, capturing multiple senses of visual similarity depending on the specified text prompt. We demonstrate that TPIPS aligns more closely with human perception and generalizes reliably beyond the training distribution. Finally, we show that TPIPS unlocks new capabilities in text-guided retrieval, compositional search, and the fine-grained evaluation of generative models. Our code, data, and trained models are at https://peterwang512.github.io/TPIPS", "arxiv_id": "2607.18237", "arxiv_url": "https://arxiv.org/abs/2607.18237", "authors": ["Sheng-Yu Wang", "Yotam Nitzan", "Aaron Hertzmann", "Jun-Yan Zhu", "Eli Shechtman", "Alexei A. Efros", "Richard Zhang"], "brief": "\u4eba\u7c7b\u89c6\u89c9\u76f8\u4f3c\u6027\u5224\u65ad\u4f9d\u8d56\u4e0a\u4e0b\u6587\uff08\u5982\u5f62\u72b6\u3001\u989c\u8272\u7b49\u4e0d\u540c\u7ef4\u5ea6\uff09\uff0c\u73b0\u6709\u611f\u77e5\u76f8\u4f3c\u6027\u6307\u6807\u5c06\u5176\u538b\u7f29\u4e3a\u5355\u4e00\u6807\u91cf\u3002\u672c\u6587\u6784\u5efa\u4e86\u591a\u7ef4\u5ea6\u4eba\u7c7b\u76f8\u4f3c\u6027\u6807\u6ce8\u6570\u636e\u96c6\uff0c\u5e76\u5fae\u8c03\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5f97\u5230TPIPS\u6307\u6807\uff0c\u53ef\u6839\u636e\u6587\u672c\u63d0\u793a\u6355\u6349\u4e0d\u540c\u7ef4\u5ea6\u7684\u89c6\u89c9\u76f8\u4f3c\u6027\uff0c\u5728\u68c0\u7d22\u548c\u751f\u6210\u6a21\u578b\u8bc4\u4f30\u4e2d\u8868\u73b0\u4f18\u5f02\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18237", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u611f\u77e5\u76f8\u4f3c\u6027", "\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u56fe\u50cf\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18237v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Many Senses of Visual Similarity: A Text-Prompted Image Perceptual Metric", "tldr": "\u4eba\u7c7b\u89c6\u89c9\u76f8\u4f3c\u6027\u5224\u65ad\u4f9d\u8d56\u4e0a\u4e0b\u6587\uff08\u5982\u5f62\u72b6\u3001\u989c\u8272\u7b49\u4e0d\u540c\u7ef4\u5ea6\uff09\uff0c\u73b0\u6709\u611f\u77e5\u76f8\u4f3c\u6027\u6307\u6807\u5c06\u5176\u538b\u7f29\u4e3a\u5355\u4e00\u6807\u91cf\u3002\u672c\u6587\u6784\u5efa\u4e86\u591a\u7ef4\u5ea6\u4eba\u7c7b\u76f8\u4f3c\u6027\u6807\u6ce8\u6570\u636e\u96c6\uff0c\u5e76\u5fae\u8c03\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5f97\u5230TPIPS\u6307\u6807\uff0c\u53ef\u6839\u636e\u6587\u672c\u63d0\u793a\u6355\u6349\u4e0d\u540c\u7ef4\u5ea6\u7684\u89c6\u89c9\u76f8\u4f3c\u6027\uff0c\u5728\u68c0\u7d22\u548c\u751f\u6210\u6a21\u578b\u8bc4\u4f30\u4e2d\u8868\u73b0\u4f18\u5f02\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern vision-language models (VLMs) have significantly improved image generation and editing capabilities, making pixel-level image tampering detection increasingly important yet challenging under cross-model and out-of-distribution shifts. This work studies domain generalization for pixel-level image tampering detection in modern VLMs like ChatGPT, Gemini, Qwen-Image, etc., aiming to learn tampering localization models that remain robust across diverse VLM-generated manipulation distributions. We propose a simple yet effective domain-generalized training framework built on two practical strategies. First, we introduce a balanced minibatch sampling scheme that strategically samples tampered and real images in each minibatch, preventing biased optimization toward either manipulated artifacts or clean-image priors and avoiding training collapse, ensuring that each optimization step receives proper sampled gradient signals. Second, we adopt a simple late-injection strategy, where the detector is first trained on large-scale base data until stable convergence, and then exposed to a small amount of newly selected supporting data from emerging VLM distributions, improving adaptability without overfitting to limited new domains. Together, these components provide a simple yet strong recipe for improving pixel-level tampering localization and OOD robustness across modern VLMs. Despite the conceptual simplicity, our framework outperforms the prior state-of-the-art PIXAR by a large margin of 26.1% and 26.8% relative improvement in average gIoU and cIoU, respectively, across OOD VLMs of GPT-Images-2.0, Gemini-3.1, FLUX.2, and Seedream 4.5. Our code is available at https://github.com/VILA-Lab/PIXAR-DG", "arxiv_id": "2607.18230", "arxiv_url": "https://arxiv.org/abs/2607.18230", "authors": ["Yi Tang", "Xinyi Shang", "Jiacheng Cui", "Sondos Mahmoud Bsharat", "Jiacheng Liu", "Xiaohan Zhao", "Tran Dinh Tien", "Ahmed Elhagry", "Salwa K. Al Khatib", "Tianjun Yao", "Yonina C. Eldar", "Jing-Hao Xue", "Hao Li", "Salman Khan", "Zhiqiang Shen"], "brief": "\u9488\u5bf9\u73b0\u4ee3\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08\u5982ChatGPT\u3001Gemini\u7b49\uff09\u751f\u6210\u7684\u56fe\u50cf\u7be1\u6539\u68c0\u6d4b\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u7b80\u5355\u6709\u6548\u7684\u57df\u6cdb\u5316\u8bad\u7ec3\u6846\u67b6\uff0c\u5305\u542b\u5e73\u8861\u5c0f\u6279\u91cf\u91c7\u6837\u548c\u5ef6\u8fdf\u6ce8\u5165\u4e24\u4e2a\u7b56\u7565\u3002\u5728\u8de8\u6a21\u578bOOD\u8bc4\u6d4b\u4e2d\uff0c\u76f8\u6bd4SOTA\u65b9\u6cd5PIXAR\u5206\u522b\u63d0\u534726.1%\u548c26.8%\u7684gIoU\u548ccIoU\u6307\u6807\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18230", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u50cf\u7be1\u6539\u68c0\u6d4b", "\u57df\u6cdb\u5316", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18230v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Simple Domain Generalization for Strong Pixel-Level Image Tampering Detection in Modern VLMs", "tldr": "\u9488\u5bf9\u73b0\u4ee3\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08\u5982ChatGPT\u3001Gemini\u7b49\uff09\u751f\u6210\u7684\u56fe\u50cf\u7be1\u6539\u68c0\u6d4b\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u7b80\u5355\u6709\u6548\u7684\u57df\u6cdb\u5316\u8bad\u7ec3\u6846\u67b6\uff0c\u5305\u542b\u5e73\u8861\u5c0f\u6279\u91cf\u91c7\u6837\u548c\u5ef6\u8fdf\u6ce8\u5165\u4e24\u4e2a\u7b56\u7565\u3002\u5728\u8de8\u6a21\u578bOOD\u8bc4\u6d4b\u4e2d\uff0c\u76f8\u6bd4SOTA\u65b9\u6cd5PIXAR\u5206\u522b\u63d0\u534726.1%\u548c26.8%\u7684gIoU\u548ccIoU\u6307\u6807\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In line with the prevailing direction of vision research, we explore the integration of both generation and editing capabilities for video and image modalities within a single model. Current approaches to collecting video editing data typically depend on labour-intensive, time-consuming curated procedures--involving object mask annotation, the use of error-introducing pair synthesis via I2V model and ControlNet-like guidance, and VLM-based quality filtering or refinement--and demonstrate limited task scalability. As a result, the diversity of editing tasks remains substantially narrower than that available for image editing models. We develop a pixel-pair temporal warped flow field that can directly generate corresponding video editing samples in real time from image editing samples, and we demonstrate across multiple levels of video editing tasks that a model can learn video editing using only such data. We regard the image modality as a particular form of the video modality. Accordingly, we design a modality mimic generation loss and a modality mimic editing loss to relatively align the capabilities--and thereby the output distributions--of the two modalities through mutual imitation. Moreover, language-based visual editing entails the comprehension of the editing instruction and the reference visual content, the localization of the region corresponding to that instruction within the reference visual contents, and the modification of that region alone. Existing approaches predominantly rely on external aids, such as fine-tuning an additional MLLM or explicitly supplying a mask sequence as auxiliary input during inference. In contrast, we aspire for the model to internalize this capability. To that end, we introduce sense-related tasks--for instance, referring expression segmentation--along with corresponding editing-region-aware latent-level loss and attention-level loss.", "arxiv_id": "2607.18227", "arxiv_url": "https://arxiv.org/abs/2607.18227", "authors": ["Dingyun Zhang", "Lixue Gong", "Wei Liu"], "brief": "\u63d0\u51faFlowMimic\u6846\u67b6\uff0c\u901a\u8fc7\u50cf\u7d20\u5bf9\u65f6\u5e8f\u626d\u66f2\u6d41\u573a\u4ece\u56fe\u50cf\u7f16\u8f91\u6837\u672c\u5b9e\u65f6\u751f\u6210\u89c6\u9891\u7f16\u8f91\u8bad\u7ec3\u6570\u636e\uff0c\u65e0\u9700\u7e41\u7410\u7684\u63a9\u7801\u6807\u6ce8\u6d41\u7a0b\u3002\u8bbe\u8ba1\u6a21\u6001\u6a21\u4eff\u751f\u6210/\u7f16\u8f91\u635f\u5931\u4f7f\u56fe\u50cf\u4e0e\u89c6\u9891\u6a21\u6001\u80fd\u529b\u76f8\u4e92\u5bf9\u9f50\uff0c\u5e76\u5f15\u5165\u6307\u4ee3\u8868\u8fbe\u5206\u5272\u7b49\u611f\u77e5\u4efb\u52a1\u4f7f\u6a21\u578b\u5185\u5316\u65e0\u63a9\u7801\u7684\u533a\u57df\u5b9a\u4f4d\u4e0e\u7f16\u8f91\u80fd\u529b\uff0c\u5728\u591a\u5c42\u6b21\u89c6\u9891\u7f16\u8f91\u4efb\u52a1\u4e0a\u53d6\u5f97\u826f\u597d\u6548\u679c\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18227", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u7f16\u8f91", "\u56fe\u50cf\u751f\u6210", "\u591a\u6a21\u6001", "\u6570\u636e\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18227v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "FlowMimic: Mask-free Visual Editing and Generation with Pixel-pair Warped Flow Field for Online Video Editing Data Generation and Modality Mimicry", "tldr": "\u63d0\u51faFlowMimic\u6846\u67b6\uff0c\u901a\u8fc7\u50cf\u7d20\u5bf9\u65f6\u5e8f\u626d\u66f2\u6d41\u573a\u4ece\u56fe\u50cf\u7f16\u8f91\u6837\u672c\u5b9e\u65f6\u751f\u6210\u89c6\u9891\u7f16\u8f91\u8bad\u7ec3\u6570\u636e\uff0c\u65e0\u9700\u7e41\u7410\u7684\u63a9\u7801\u6807\u6ce8\u6d41\u7a0b\u3002\u8bbe\u8ba1\u6a21\u6001\u6a21\u4eff\u751f\u6210/\u7f16\u8f91\u635f\u5931\u4f7f\u56fe\u50cf\u4e0e\u89c6\u9891\u6a21\u6001\u80fd\u529b\u76f8\u4e92\u5bf9\u9f50\uff0c\u5e76\u5f15\u5165\u6307\u4ee3\u8868\u8fbe\u5206\u5272\u7b49\u611f\u77e5\u4efb\u52a1\u4f7f\u6a21\u578b\u5185\u5316\u65e0\u63a9\u7801\u7684\u533a\u57df\u5b9a\u4f4d\u4e0e\u7f16\u8f91\u80fd\u529b\uff0c\u5728\u591a\u5c42\u6b21\u89c6\u9891\u7f16\u8f91\u4efb\u52a1\u4e0a\u53d6\u5f97\u826f\u597d\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Foundation models have emerged as a driving force in computational pathology, with the potential to transform cancer diagnosis, prognosis, and treatment selection by learning transferable representations from large-scale histopathology data. A growing landscape of pathology foundation models now spans diverse data sources, architectures, and downstream applications. However, most pretrained models operate only at the image-tile level, use restrictive licenses, and remain computationally expensive, limiting large-scale slide-level clinical and research use. Here, we introduce GigaPath-Flash and GigaTIME-Flash, efficient models for whole-slide pathology AI and spatial proteomics prediction. GigaPath-Flash combines a 22M-parameter ViT-S tile encoder with a 21M-parameter LongNet slide encoder, both pretrained on large-scale real-world histopathology data. Its compact tile encoder is distilled from the billion-parameter GigaPath (ViT-g) teacher and shared by both models. GigaPath-Flash retains 97% of GigaPath\u0027s average slide-level performance with 50x less compute. GigaTIME-Flash extends this backbone to predict the tumor immune microenvironment directly from routine H\u0026E images. It surpasses the original CNN-based GigaTIME in prediction quality while running 6x faster and using 8x less GPU memory. Together with GigaPath and GigaTIME, these models form an open-weight, Apache-2.0-licensed family pretrained on large-scale real-world clinical data. By releasing all models and weights, we provide accessible building blocks for computational pathology, immuno-oncology, and precision health.", "arxiv_id": "2607.18218", "arxiv_url": "https://arxiv.org/abs/2607.18218", "authors": ["Naoto Usuyama", "Jeya Maria Jose Valanarasu", "Sicong Yao", "Hanwen Xu", "Jaspreet Bagga", "Guanghui Qin", "Robert E. Kramer", "Cliff Wong", "Soohee Lee", "Hao Qiu", "Theodore Zhengde Zhao", "Racheli Ben Shimol", "Angela Crabtree", "Kevin Matlock", "Eduardo Alejandro Lozano Garcia", "Naiteek Sangani", "Alberto Santamaria-Pang", "Jason Entenmann", "Alexandra Q. Bartlett", "Bill J. Wright", "Bernard A. Fox", "Brian Piening", "Sheng Zhang", "Sheng Wang", "Tristan Naumann", "Carlo Bifulco", "Hoifung Poon"], "brief": "\u63d0\u51faGigaPath-Flash\u548cGigaTIME-Flash\u4e24\u4e2a\u9ad8\u6548\u75c5\u7406\u57fa\u7840\u6a21\u578b\uff0c\u5206\u522b\u7528\u4e8e\u5168\u5207\u7247\u5206\u6790\u548c\u80bf\u7624\u514d\u75ab\u5fae\u73af\u5883\u9884\u6d4b\u3002\u524d\u8005\u4ee550\u500d\u66f4\u5c11\u8ba1\u7b97\u91cf\u4fdd\u755997%\u7684\u539f\u59cb\u6027\u80fd\uff0c\u540e\u8005\u6bd4CNN\u7248\u672c\u5feb6\u500d\u4e14\u663e\u5b58\u51cf\u5c118\u500d\uff0c\u5168\u90e8\u4ee5Apache-2.0\u5f00\u6e90\u53d1\u5e03\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18218", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8ba1\u7b97\u75c5\u7406\u5b66", "\u57fa\u7840\u6a21\u578b", "\u77e5\u8bc6\u84b8\u998f", "\u80bf\u7624\u5fae\u73af\u5883"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18218v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GigaPath-Flash and GigaTIME-Flash: Efficient Pathology Foundation Models for Whole-Slide and Tumor Microenvironment Analysis", "tldr": "\u63d0\u51faGigaPath-Flash\u548cGigaTIME-Flash\u4e24\u4e2a\u9ad8\u6548\u75c5\u7406\u57fa\u7840\u6a21\u578b\uff0c\u5206\u522b\u7528\u4e8e\u5168\u5207\u7247\u5206\u6790\u548c\u80bf\u7624\u514d\u75ab\u5fae\u73af\u5883\u9884\u6d4b\u3002\u524d\u8005\u4ee550\u500d\u66f4\u5c11\u8ba1\u7b97\u91cf\u4fdd\u755997%\u7684\u539f\u59cb\u6027\u80fd\uff0c\u540e\u8005\u6bd4CNN\u7248\u672c\u5feb6\u500d\u4e14\u663e\u5b58\u51cf\u5c118\u500d\uff0c\u5168\u90e8\u4ee5Apache-2.0\u5f00\u6e90\u53d1\u5e03\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Human-object centric video personalization (HOCVP) is a core task within subject-driven video generation. However, existing methods suffer from two key limitations. First, most approaches focusing on inter-subject personalization still struggle to strike a balance between high subject fidelity and accurate interaction patterns between humans and diverse objects, especially when objects represent abstract concepts such as logos. Second, while intra-subject references (e.g., OCR maps, multi-view inputs) are expected to enhance subject fidelity, most existing works lack mechanisms to understand such latent correspondence. To address both challenges, we propose HOMIE, an HOCVP framework that tackles both inter- and intra-subject input settings in a unified manner. Compared to previous approaches, HOMIE proposes a better MLLM integration strategy to extract knowledge of reference-level relationships without compromising the controllability of text encoders or incurring costly re-alignment. Specifically, we introduce global multimodal guidance within self-attention to better align MLLM-derived semantic features with VAE tokens. Furthermore, we propose modality-reference embedding to differentiate tokens from MLLM features and VAE tokens and associate intra-subject reference image tokens. Extensive experiments validate that our method achieves state-of-the-art performance across various HOCVP tasks. Project Page: https://yiyangcai.github.io/homie-page.github.io/", "arxiv_id": "2607.18217", "arxiv_url": "https://arxiv.org/abs/2607.18217", "authors": ["Yiyang Cai", "Nan Chen", "Rongchang Xie", "Junwen Pan", "Chunyang Jiang", "Cheng Chen", "Wen Zhou", "Zhenbang Sun", "Wei Xue", "Wenhan Luo", "Yike Guo"], "brief": "\u63d0\u51faHOMIE\u6846\u67b6\uff0c\u7edf\u4e00\u5904\u7406\u4eba\u7269-\u7269\u4f53\u4e2d\u5fc3\u89c6\u9891\u4e2a\u6027\u5316\u751f\u6210\u4e2d\u7684\u4e3b\u4f53\u95f4\u548c\u4e3b\u4f53\u5185\u4e24\u7c7b\u8f93\u5165\u8bbe\u7f6e\u3002\u901a\u8fc7\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u96c6\u6210\u7b56\u7565\u3001\u5168\u5c40\u591a\u6a21\u6001\u5f15\u5bfc\u81ea\u6ce8\u610f\u529b\u673a\u5236\u53ca\u6a21\u6001\u53c2\u8003\u5d4c\u5165\uff0c\u5728\u4fdd\u6301\u9ad8\u4e3b\u4f53\u4fdd\u771f\u5ea6\u7684\u540c\u65f6\u51c6\u786e\u5efa\u6a21\u4eba\u7269\u4e0e\u7269\u4f53\uff08\u542b\u62bd\u8c61\u6982\u5ff5\u5982Logo\uff09\u7684\u4ea4\u4e92\u6a21\u5f0f\uff0c\u5b9e\u9a8c\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18217", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u591a\u6a21\u6001", "\u4e2a\u6027\u5316\u751f\u6210", "\u4eba\u7269-\u7269\u4f53\u4ea4\u4e92"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18217v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "HOMIE: Human-object Centric Video Personalization via Multimodal Intelligent Enchancement", "tldr": "\u63d0\u51faHOMIE\u6846\u67b6\uff0c\u7edf\u4e00\u5904\u7406\u4eba\u7269-\u7269\u4f53\u4e2d\u5fc3\u89c6\u9891\u4e2a\u6027\u5316\u751f\u6210\u4e2d\u7684\u4e3b\u4f53\u95f4\u548c\u4e3b\u4f53\u5185\u4e24\u7c7b\u8f93\u5165\u8bbe\u7f6e\u3002\u901a\u8fc7\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u96c6\u6210\u7b56\u7565\u3001\u5168\u5c40\u591a\u6a21\u6001\u5f15\u5bfc\u81ea\u6ce8\u610f\u529b\u673a\u5236\u53ca\u6a21\u6001\u53c2\u8003\u5d4c\u5165\uff0c\u5728\u4fdd\u6301\u9ad8\u4e3b\u4f53\u4fdd\u771f\u5ea6\u7684\u540c\u65f6\u51c6\u786e\u5efa\u6a21\u4eba\u7269\u4e0e\u7269\u4f53\uff08\u542b\u62bd\u8c61\u6982\u5ff5\u5982Logo\uff09\u7684\u4ea4\u4e92\u6a21\u5f0f\uff0c\u5b9e\u9a8c\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern generative models typically rely on an adversarial critic, a prescribed noise-to-data path, or an autoregressive factorization. Instead, we show that a proper distributional energy can induce sample-level motion and provide direct regression supervision for a one-step generator. Three-Body Scattering Modeling (TBSM) for generation turns the energy distance into a constant-size per-projectile interaction: each projectile is attracted toward one real source and repelled from one independently generated source. Conditioned on the projectile and its condition, its expectation equals the $2$-Wasserstein gradient-flow velocity of $\\frac12D_E^2(P_\u03b8,Q)$. A batch of $B$ frozen-target events yields $O(B)$ sample-level losses, each using one reference for its condition instead of the minibatch-wide all-pairs field used by methods such as Drifting Models. Tracking this conditional expectation online can reduce field noise. Using scattering in frozen image features, TBSM trains one-step generators on ImageNet-256, achieving FID${}=2.23$ with pixel-space PixelDiT-XL and FID${}=1.63$ with latent-space DiT-XL at NFE${}=1$. We provide a design map relating diffusion-related supervision, Drift-like dynamics, and GAN-like objectives. These results establish tracked scattering as a route to high-dimensional one-step generation. Code: https://github.com/sp12138/TBSM.", "arxiv_id": "2607.18198", "arxiv_url": "https://arxiv.org/abs/2607.18198", "authors": ["Peng Sun", "Zhenglin Cheng", "Deyuan Liu", "Jun Xie", "Xinyi Shang", "Tao Lin"], "brief": "\u63d0\u51fa\u4e09\u4f53\u6563\u5c04\u751f\u6210\u6a21\u578b\uff08TBSM\uff09\uff0c\u5229\u7528\u80fd\u91cf\u8ddd\u79bb\u5c06\u751f\u6210\u95ee\u9898\u8f6c\u5316\u4e3a\u6bcf\u4e2a\u6837\u672c\u4e0e\u4e00\u4e2a\u771f\u5b9e\u6e90\u5438\u5f15\u3001\u4e0e\u4e00\u4e2a\u751f\u6210\u6e90\u6392\u65a5\u7684\u4e09\u4f53\u4ea4\u4e92\uff0c\u65e0\u9700\u5bf9\u6297\u8bad\u7ec3\u6216\u6269\u6563\u8def\u5f84\u3002\u5728ImageNet-256\u4e0a\u5b9e\u73b0\u5355\u6b65\u751f\u6210\uff0cPixelDiT-XL\u8fbe\u5230FID=2.23\uff0cDiT-XL\u8fbe\u5230FID=1.63\uff0c\u6027\u80fd\u4f18\u5f02\u3002", "categories": ["cs.LG", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18198", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u751f\u6210\u6a21\u578b", "\u6269\u6563\u6a21\u578b", "\u5355\u6b65\u751f\u6210", "\u80fd\u91cf\u8ddd\u79bb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18198v1", "published_at": "2026-07-20", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Three-Body Scattering for Generative Modeling", "tldr": "\u63d0\u51fa\u4e09\u4f53\u6563\u5c04\u751f\u6210\u6a21\u578b\uff08TBSM\uff09\uff0c\u5229\u7528\u80fd\u91cf\u8ddd\u79bb\u5c06\u751f\u6210\u95ee\u9898\u8f6c\u5316\u4e3a\u6bcf\u4e2a\u6837\u672c\u4e0e\u4e00\u4e2a\u771f\u5b9e\u6e90\u5438\u5f15\u3001\u4e0e\u4e00\u4e2a\u751f\u6210\u6e90\u6392\u65a5\u7684\u4e09\u4f53\u4ea4\u4e92\uff0c\u65e0\u9700\u5bf9\u6297\u8bad\u7ec3\u6216\u6269\u6563\u8def\u5f84\u3002\u5728ImageNet-256\u4e0a\u5b9e\u73b0\u5355\u6b65\u751f\u6210\uff0cPixelDiT-XL\u8fbe\u5230FID=2.23\uff0cDiT-XL\u8fbe\u5230FID=1.63\uff0c\u6027\u80fd\u4f18\u5f02\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision models have been found to be susceptible to perturbations such as motion blur induced at runtime by a shaking camera. This impedes their deployment in critical applications since phenomena such as slightly blurred vision might lead to failures, for example an object detector missing objects. While methods such as data augmentation or Adversarial Training can improve empirical robustness, they lack formal safety guarantees, making it difficult to identify and mitigate hidden vulnerabilities. We introduce a novel Certified Training approach that leverages an efficient encoding of convolutional perturbations to train provably robust models. Our method significantly outperforms Adversarial Training, achieving, for example, over 80% robust accuracy against motion blur of reasonable intensity on CIFAR10 while maintaining comparable standard accuracy.", "arxiv_id": "2607.18195", "arxiv_url": "https://arxiv.org/abs/2607.18195", "authors": ["Benedikt Br\u00fcckner", "Alessio Lomuscio"], "brief": "\u9488\u5bf9\u8fd0\u52a8\
