<script>
const PAPERS = [{"abstract": "Multi-task model merging combines separately trained expert models into a single model that handles all tasks without co-training. Standard practice merges experts at their optimal validation loss. We challenge this convention by systematically studying how training duration of domain experts affects the quality of the merged model. We fine-tune experts on five domains (Math, Code, Instruction Following, Multilingual, and Safety) across three model sizes (Qwen 3.5 0.8B, 2B, and 4B), saving checkpoints from 25\\% to 500\\% of the optimal training steps and evaluating five merging methods at each duration. Our findings reveal a striking method-dependent pattern: simple averaging degrades sharply with overfitting, while sparsification-based methods achieve their best performance well past the validation optimum. We formalize this through bias-variance decomposition analysis, drawing a parallel to random forests where averaging benefits from high-variance individual learners. These results suggest that training duration and merging method should be chosen jointly rather than independently.", "arxiv_id": "2607.11997", "arxiv_url": "https://arxiv.org/abs/2607.11997", "authors": ["Nikita Kozodoi", "Zainab Afolabi", "Jack Butler"], "brief": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86\u4e13\u5bb6\u6a21\u578b\u8bad\u7ec3\u65f6\u957f\u5bf9\u591a\u4efb\u52a1\u6a21\u578b\u5408\u5e76\u8d28\u91cf\u7684\u5f71\u54cd\uff0c\u53d1\u73b0\u4e0d\u540c\u5408\u5e76\u65b9\u6cd5\u5bf9\u8bad\u7ec3\u65f6\u957f\u7684\u654f\u611f\u6027\u622a\u7136\u4e0d\u540c\uff0c\u6311\u6218\u4e86\"\u5728\u6700\u4f18\u9a8c\u8bc1\u635f\u5931\u5904\u5408\u5e76\"\u7684\u60ef\u4f8b\u505a\u6cd5\u3002", "categories": ["cs.LG", "cs.AI", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11997", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u57285\u4e2a\u9886\u57df\uff08\u6570\u5b66\u3001\u4ee3\u7801\u3001\u6307\u4ee4\ u5408\u5e76\u65b9\u6cd5\u4f5c\u4e3a\u8054\u5408\u8bbe\u8ba1\u53d8\u91cf\u8fdb\u884c\u7cfb\u7edf\u7814\u7a76\uff0c\u4e3a\u5b9e\u8df5\u4e2d\u7684\u6a21\u578b\u5408\u5e76\u63d0\u4f9b\u4e86\u91cd\u8981\u6307\u5bfc\uff1a\u4e0d\u5e94\u5b64\u7acb\u9009\u62e9\u8bad\u7ec3\u65f6\u957f\uff0c\u9700\u4e0e\u5408\u5e76\u7b56\u7565\u534f\u540c\u4f18\u5316\u3002"}, {"abstract": "Feedforward network (FFN) blocks account for a large fraction of the parameters and computation in Transformer architectures, yet their internal structure remains difficult to interpret due to the additive superposition induced by the residual stream. We examine whether the activation of an FFN neuron can be explained by a sparse set of preceding neuron activations and attention outputs. We introduce a training-free attribution method that estimates the relative influence of upstream neurons and attention outputs on a target neuron\u0027s activation. Empirically, across models and layers, we find that small subsets of preceding activations and attention outputs suffice to preserve neuron activations with high fidelity when all remaining inputs are masked with their average values. Effective sparsity is even greater when accounting for the inherent activation sparsity of upstream layers. Moreover, applying the neuron-specific masks in all layers simultaneously, such that the induced deviations propagate through the network, leaves model perplexity largely unchanged at moderate sparsity levels. These results demonstrate that, despite dense parameterization, FFNs exhibit sparse and structured inter-layer dependencies at the neuron level. Our method provides a practical, scalable tool for circuit-level interpretability and identifies candidate sparse pathways with potential implications for efficient inference.", "arxiv_id": "2607.11990", "arxiv_url": "https://arxiv.org/abs/2607.11990", "authors": ["Johannes Knittel", "Hanspeter Pfister"], "brief": "\u63d0\u51fa\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u5f52\u56e0\u65b9\u6cd5\uff0c\u63ed\u793aTransformer FFN\u795e\u7ecf\u5143\u7684\u6fc0\u6d3b\u53ef\u7531\u5c11\u91cf\u524d\u9a71\u795e\u7ecf\u5143\u6fc0\u6d3b\u548c\u6ce8\u610f\u529b\u8f93\u51fa\u7a00\u758f\u89e3\u91ca\uff0c\u53d1\u73b0FFN\u5728\u5bc6\u96c6\u53c2\u6570\u5316\u4e0b\u5177\u6709\u7a00\u758f\u7ed3\u6784\u5316\u7684\u5c42\u95f4\u4f9d\u8d56\u5173\u7cfb\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11990", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u65e0\u9700\u8bad\u7ec3\u7684\u5f52\u56e0\u65b9\u6cd5\uff1a\u901a\u8fc7\u5c06\u975e\u5173\u952e\u8f93\u5165\u66ff\u6362\u4e3a\u5747\u503c\u6765\u4f30\u8ba1\u4e0a\u6e38\u795e\u7ecf\u5143\u5bf9\u76ee\u6807\u795e\u7ecf\u5143\u6fc0\u6d3b\u7684\u76f8\u5bf9\u5f71\u54cd", "\u5b9e\u9a8c\u53d1\u73b0\uff1a\u5c11\u91cf\u524d\u9a71\u6fc0\u6d3b\u5b50\u96c6\u5373\u53ef\u9ad8\u4fdd\u771f\u4fdd\u7559\u795e\u7ecf\u5143\u6fc0\u6d3b\uff0c\u8003\u8651\u4e0a\u6e38\u5c42\u56fa\u6709\u6fc0\u6d3b\u7a00\u758f\u6027\u540e\u6709\u6548\u7a00\u758f\u5ea6\u66f4\u9ad8", "\u5728\u4e2d\u7b49\u7a00\u758f\u5ea6\u4e0b\u540c\u65f6\u5bf9\u6240\u6709\u5c42\u5e94\u7528\u795e\u7ecf\u5143\u7279\u5b9a\u63a9\u7801\uff0c\u6a21\u578b\u56f0\u60d1\u5ea6\u57fa\u672c\u4e0d\u53d8\uff0c\u9a8c\u8bc1\u4e86\u7a00\u758f\u8def\u5f84\u7684\u6709\u6548\u6027"], "keywords": ["\u53ef\u89e3\u91ca\u6027", "Transformer", "\u7a00\u758f\u6027", "\u795e\u7ecf\u7f51\u7edc"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11990v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Sparse Inter-Layer Dependencies of Transformer FFN Neurons", "tldr": "Transformer FFN\u795e\u7ecf\u5143\u95f4\u5b58\u5728\u7a00\u758f\u5c42\u95f4\u4f9d\u8d56\uff0c\u5c11\u91cf\u4e0a\u6e38\u6fc0\u6d3b\u5373\u53ef\u9ad8\u4fdd\u771f\u91cd\u5efa\u76ee\u6807\u795e\u7ecf\u5143", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u5f52\u56e0\u65b9\u6cd5\uff0c\u63ed\u793aTransformer FFN\u795e\u7ecf\u5143\u7684\u6fc0\u6d3b\u53ef\u7531\u5c11\u91cf\u524d\u9a71\u795e\u7ecf\u5143\u6fc0\u6d3b\u548c\u6ce8\u610f\u529b\u8f93\u51fa\u7a00\u758f\u89e3\u91ca\uff0c\u53d1\u73b0FFN\u5728\u5bc6\u96c6\u53c2\u6570\u5316\u4e0b\u5177\u6709\u7a00\u758f\u7ed3\u6784\u5316\u7684\u5c42\u95f4\u4f9d\u8d56\u5173\u7cfb\u3002", "why_notable": "\u4e3aTransformer\u7535\u8def\u7ea7\u53ef\u89e3\u91ca\u6027\u63d0\u4f9b\u5b9e\u7528\u53ef\u6269\u5c55\u5de5\u5177\uff0c\u540c\u65f6\u8bc6\u522b\u51fa\u7a00\u758f\u63a8\u7406\u8def\u5f84\uff0c\u5bf9\u9ad8\u6548\u63a8\u7406\u548c\u6a21\u578b\u538b\u7f29\u5177\u6709\u6f5c\u5728\u4ef7\u503c"}, {"abstract": "Precision molecular design aims to discover personalized drug candidates through joint control of multiple conditions, such as biological relevance and molecular design strategies. Biological relevance reflects cellular functional states under disease or perturbation conditions, while molecular design strategies provide complementary guidance in terms of structural intentions and property optimization. In this study, we propose JoPMol, a jointly controlled precision molecular generative model that integrates biological states encoded by gene expression profiles with molecular structure information expressed in text, and chemical properties quantified by numerical values within a unified modeling framework. This formulation enables coordinated generation and optimization of candidate molecules under joint condition control. Experimental results show that JoPMol outperforms state-of-the-art methods across multiple evaluation metrics. Moreover, JoPMol demonstrates strong generalization ability in both transfer tasks and biologically grounded simulation scenarios, validating its effectiveness for precision molecular design. The source code is publicly available at https://github.com/hala-yh/JoPMol.", "arxiv_id": "2607.11978", "arxiv_url": "https://arxiv.org/abs/2607.11978", "authors": ["Hang Yuan", "Chen Li", "Wenjun Ma", "Tadahiko Murata", "Yuncheng Jiang"], "brief": "\u63d0\u51faJoPMol\uff0c\u4e00\u4e2a\u5c06\u57fa\u56e0\u8868\u8fbe\u8c31\uff08\u751f\u7269\u72b6\u6001\uff09\u3001\u5206\u5b50\u7ed3\u6784\u6587\u672c\u63cf\u8ff0\u548c\u5316\u5b66\u6027\u8d28\u6570\u503c\u4e09\u7c7b\u6761\u4ef6\u7edf\u4e00\u6574\u5408\u7684\u7cbe\u51c6\u5206\u5b50\u751f\u6210\u6846\u67b6\uff0c\u5b9e\u73b0\u591a\u6761\u4ef6\u8054\u5408\u63a7\u5236\u4e0b\u7684\u5019\u9009\u836f\u7269\u5206\u5b50\u751f\u6210\u4e0e\u4f18\u5316\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11978", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u4e09\u8def\u8054\u5408\u63a7\u5236\uff1a\u57fa\u56e0\u8868\u8fbe\u8c31\u7f16\u7801\u7ec6\u80de\u529f\u80fd\u72b6\u6001\u3001\u6587\u672c\u63cf\u8ff0\u7ed3\u6784\u610f\u56fe\u3001\u6570\u503c\u91cf\u5316\u5316\u5b66\u6027\u8d28\uff0c\u4e09\u8005\u5728\u7edf\u4e00\u6846\u67b6\u5185\u534f\u540c\u9a71\u52a8\u751f\u6210", "\u5728\u591a\u9879\u8bc4\u4f30\u6307\u6807\u4e0a\u8d85\u8d8a\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\uff0c\u5e76\u5728\u8fc1\u79fb\u4efb\u52a1\u548c\u751f\u7269\u4eff\u771f\u573a\u666f\u4e2d\u5c55\u73b0\u5f3a\u6cdb\u5316\u80fd\u529b", "\u4ee3\u7801\u5df2\u5f00\u6e90\uff08GitHub: hala-yh/JoPMol\uff09\uff0c\u652f\u6301\u7cbe\u51c6\u533b\u7597\u5bfc\u5411\u7684\u4e2a\u6027\u5316\u836f\u7269\u5019\u9009\u53d1\u73b0"], "keywords": ["\u5206\u5b50\u751f\u6210", "\u591a\u6a21\u6001", "\u836f\u7269\u53d1\u73b0", "\u751f\u6210\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11978v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Gene Expression-Informed Jointly Controlled Generative Modeling for Precision Molecular Design", "tldr": "JoPMol\uff1a\u878d\u5408\u57fa\u56e0\u8868\u8fbe\u3001\u6587\u672c\u7ed3\u6784\u4e0e\u5316\u5b66\u6027\u8d28\u7684\u8054\u5408\u63a7\u5236\u7cbe\u51c6\u5206\u5b50\u751f\u6210\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faJoPMol\uff0c\u4e00\u4e2a\u5c06\u57fa\u56e0\u8868\u8fbe\u8c31\uff08\u751f\u7269\u72b6\u6001\uff09\u3001\u5206\u5b50\u7ed3\u6784\u6587\u672c\u63cf\u8ff0\u548c\u5316\u5b66\u6027\u8d28\u6570\u503c\u4e09\u7c7b\u6761\u4ef6\u7edf\u4e00\u6574\u5408\u7684\u7cbe\u51c6\u5206\u5b50\u751f\u6210\u6846\u67b6\uff0c\u5b9e\u73b0\u591a\u6761\u4ef6\u8054\u5408\u63a7\u5236\u4e0b\u7684\u5019\u9009\u836f\u7269\u5206\u5b50\u751f\u6210\u4e0e\u4f18\u5316\u3002", "why_notable": "\u9996\u6b21\u5c06\u57fa\u56e0\u8868\u8fbe\u8c31\u4e0e\u5206\u5b50\u6587\u672c/\u6570\u503c\u6761\u4ef6\u7edf\u4e00\u7eb3\u5165\u751f\u6210\u6a21\u578b\uff0c\u6253\u901a\u4e86\u4ece\u75be\u75c5\u7ec6\u80de\u72b6\u6001\u5230\u4e2a\u6027\u5316\u836f\u7269\u8bbe\u8ba1\u7684\u7aef\u5230\u7aef\u901a\u8def\uff0c\u5bf9\u7cbe\u51c6\u533b\u7597\u548cAI\u836f\u7269\u53d1\u73b0\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Synthetic image attribution aims at identifying the generator responsible for a given AI-generated image. Training-free reference-based attribution methods are easily scalable, since newly emerging generators can be incorporated by adding source-specific references rather than retraining a task-specific classifier. Their performance depends on two coupled factors: the representation space used for comparison and the way source-specific references are constructed. However, the interaction between these two factors remains largely unexplored. In this paper, we provide a controlled analysis of this interaction using references and off-the-shelf pretrained representations. We study representations extracted from different layers of CLIP and DINOv2, along with three reference selection methods with varying semantic constraints: arbitrary, semantically aligned, and resynthesis-based references. Our results show that attribution accuracy consistently peaks at intermediate representation levels, indicating that source-discriminative cues are more accessible before strong semantic abstraction dominates. We further show that intermediate representations are not completely semantically neutral, making reference selection critical: semantically constrained references reduce query-reference mismatch and improve attribution, especially under limited reference budgets. Resynthesis is most useful in low-reference regimes, while semantically aligned references provide a better accuracy-cost trade-off when a moderate-sized reference pool is available. Our findings show that training-free reference-based attribution should be understood as the interaction between where images are compared, how the reference set is constructed, and how many references are available.", "arxiv_id": "2607.12052", "arxiv_url": "https://arxiv.org/abs/2607.12052", "authors": ["Meiling Li", "Pietro Bongini", "Benedetta Tondi", "Mauro Barni"], "brief": "\u672c\u6587\u7cfb\u7edf\u5206\u6790\u4e86\u65e0\u8bad\u7ec3\u53c2\u8003\u5f0f\u5408\u6210\u56fe\u50cf\u5f52\u56e0\u65b9\u6cd5\u4e2d\uff0c\u8868\u793a\u7a7a\u95f4\uff08CLIP/DINOv2\u4e0d\u540c\u5c42\uff09\u4e0e\u53c2\u8003\u96c6\u6784\u5efa\u7b56\u7565\uff08\u4efb\u610f\u3001\u8bed\u4e49\u5bf9\u9f50\u3001\u91cd\u5408\u6210\uff09\u4e4b\u95f4\u7684\u4ea4\u4e92\u5173\u7cfb\uff0c\u63ed\u793a\u4e86\u5f71\u54cd\u5f52\u56e0\u7cbe\u5ea6\u7684\u5173\u952e\u56e0\u7d20\u3002", "categories": ["cs.CV", "cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.12052", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u5f52\u56e0\u7cbe\u5ea6\u5728\u4e2d\u95f4\u5c42\u8868\u793a\u5904\u6301\u7eed\u8fbe\u5230\u5cf0\u503c\uff0c\u8bf4\u660e\u6e90\u5224\u522b\u7ebf\u7d22\u5728\u5f3a\u8bed\u4e49\u62bd\u8c61\u4e4b\u524d\u66f4\u6613\u83b7\u53d6", "\u4e2d\u95f4\u5c42\u8868\u793a\u5e76\u975e\u8bed\u4e49\u4e2d\u7acb\uff0c\u8bed\u4e49\u7ea6\u675f\u7684\u53c2\u8003\u96c6\u53ef\u51cf\u5c11\u67e5\u8be2-\u53c2\u8003\u4e0d\u5339\u914d\uff0c\u5c24\u5176\u5728\u53c2\u8003\u6570\u91cf\u6709\u9650\u65f6\u6548\u679c\u663e\u8457", "\u91cd\u5408\u6210\u53c2\u8003\u5728\u4f4e\u53c2\u8003\u9884\u7b97\u4e0b\u6700\u6709\u6548\uff0c\u800c\u8bed\u4e49\u5bf9\u9f50\u53c2\u8003\u5728\u4e2d\u7b49\u89c4\u6a21\u53c2\u8003\u6c60\u65f6\u63d0\u4f9b\u66f4\u4f18\u7684\u7cbe\u5ea6-\u6210\u672c\u6743\u8861"], "keywords": ["\u5408\u6210\u56fe\u50cf\u6eaf\u6e90", "\u591a\u6a21\u6001", "\u56fe\u50cf\u53d6\u8bc1", "\u8868\u793a\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.12052v1", "published_at": "2026-07-13", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Representation and Reference Selection in Training-Free Synthetic Image Attribution", "tldr": "\u65e0\u9700\u8bad\u7ec3\u7684\u5408\u6210\u56fe\u50cf\u6eaf\u6e90\u4e2d\uff0c\u8868\u793a\u5c42\u7ea7\u4e0e\u53c2\u8003\u96c6\u6784\u5efa\u65b9\u5f0f\u7684\u4ea4\u4e92\u6548\u5e94\u7814\u7a76", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u5206\u6790\u4e86\u65e0\u8bad\u7ec3\u53c2\u8003\u5f0f\u5408\u6210\u56fe\u50cf\u5f52\u56e0\u65b9\u6cd5\u4e2d\uff0c\u8868\u793a\u7a7a\u95f4\uff08CLIP/DINOv2\u4e0d\u540c\u5c42\uff09\u4e0e\u53c2\u8003\u96c6\u6784\u5efa\u7b56\u7565\uff08\u4efb\u610f\u3001\u8bed\u4e49\u5bf9\u9f50\u3001\u91cd\u5408\u6210\uff09\u4e4b\u95f4\u7684\u4ea4\u4e92\u5173\u7cfb\uff0c\u63ed\u793a\u4e86\u5f71\u54cd\u5f52\u56e0\u7cbe\u5ea6\u7684\u5173\u952e\u56e0\u7d20\u3002", "why_notable": "\u4e3a\u65e0\u8bad\u7ec3\u5408\u6210\u56fe\u50cf\u6eaf\u6e90\u63d0\u4f9b\u4e86\u9996\u4e2a\u7cfb\u7edf\u6027\u7684\u53d7\u63a7\u5206\u6790\u6846\u67b6\uff0c\u63ed\u793a\u4e86\u8868\u793a\u5c42\u7ea7\u4e0e\u53c2\u8003\u9009\u62e9\u7684\u8026\u5408\u673a\u5236\uff0c\u5bf9\u53ef\u6269\u5c55\u7684AI\u751f\u6210\u5185\u5bb9\u6eaf\u6e90\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Deploying medical visual question answering (MedVQA) systems in real-world clinical settings requires models that adapt to new clinical tasks without forgetting previously acquired knowledge. Continual learning (CL) provides a practical framework for this setting. Despite rapid progress in medical vision-language models, the behavior of CL methods when training these models across heterogeneous MedVQA tasks remains underexplored. This work presents a systematic evaluation of CL for MedVQA across diverse clinical objectives, including classification, multi-label classification, detection, cell counting, and report generation. Specifically, we explore (1) the ability of existing CL methods to mitigate catastrophic forgetting; (2) their sensitivity to task ordering, analyzing how different task sequences influence performance retention and forgetting; and (3) the evolution of low-rank adaptation parameters as new tasks are learned, revealing patterns of weight drift under different CL methods. Our findings suggest that existing CL methods struggle to maintain stability-plasticity balance when tasks with different objectives and supervision formats are interleaved. Code and full experimental setup will be publicly available.", "arxiv_id": "2607.12048", "arxiv_url": "https://arxiv.org/abs/2607.12048", "authors": ["Mai A. Shaaban", "Tausifa Jan Saleem", "Alaa Mohamed", "Dilnaz Utemissova", "Ufaq Khan", "Mohammad Yaqub"], "brief": "\u672c\u6587\u5bf9\u6301\u7eed\u5b66\u4e60\uff08CL\uff09\u65b9\u6cd5\u5728\u591a\u79cd\u5f02\u6784\u533b\u5b66VQA\u4efb\u52a1\uff08\u5206\u7c7b\u3001\u68c0\u6d4b\u3001\u7ec6\u80de\u8ba1\u6570\u3001\u62a5\u544a\u751f\u6210\u7b49\uff09\u4e0a\u8fdb\u884c\u7cfb\u7edf\u6027\u5b9e\u8bc1\u5206\u6790\uff0c\u63ed\u793a\u73b0\u6709\u65b9\u6cd5\u5728\u7a33\u5b9a\u6027-\u53ef\u5851\u6027\u5e73\u8861\u4e0a\u7684\u4e0d\u8db3\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.12048", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u8bc4\u4f30\u73b0\u6709CL\u65b9\u6cd5\u7f13\u89e3\u707e\u96be\u6027\u9057\u5fd8\u7684\u80fd\u529b\uff0c\u8986\u76d65\u7c7b\u5f02\u6784\u4e34\u5e8a\u4efb\u52a1", "\u5206\u6790\u4efb\u52a1\u987a\u5e8f\u5bf9\u6a21\u578b\u6027\u80fd\u4fdd\u7559\u4e0e\u9057\u5fd8\u7a0b\u5ea6\u7684\u5f71\u54cd", "\u8ffd\u8e2a\u4f4e\u79e9\u9002\u914d\uff08LoRA\uff09\u53c2\u6570\u5728\u4e0d\u540cCL\u65b9\u6cd5\u4e0b\u7684\u6743\u91cd\u6f02\u79fb\u6f14\u5316\u89c4\u5f8b"], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u533b\u5b66\u89c6\u89c9\u95ee\u7b54", "\u591a\u6a21\u6001", "\u707e\u96be\u6027\u9057\u5fd8"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.12048v1", "published_at": "2026-07-13", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "An Empirical Analysis of Continual Learning for Heterogeneous Medical Visual Question Answering", "tldr": "\u7cfb\u7edf\u8bc4\u4f30\u6301\u7eed\u5b66\u4e60\u65b9\u6cd5\u5728\u5f02\u6784\u533b\u5b66\u89c6\u89c9\u95ee\u7b54\u4efb\u52a1\u4e2d\u7684\u8868\u73b0\u4e0e\u9057\u5fd8\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9\u6301\u7eed\u5b66\u4e60\uff08CL\uff09\u65b9\u6cd5\u5728\u591a\u79cd\u5f02\u6784\u533b\u5b66VQA\u4efb\u52a1\uff08\u5206\u7c7b\u3001\u68c0\u6d4b\u3001\u7ec6\u80de\u8ba1\u6570\u3001\u62a5\u544a\u751f\u6210\u7b49\uff09\u4e0a\u8fdb\u884c\u7cfb\u7edf\u6027\u5b9e\u8bc1\u5206\u6790\uff0c\u63ed\u793a\u73b0\u6709\u65b9\u6cd5\u5728\u7a33\u5b9a\u6027-\u53ef\u5851\u6027\u5e73\u8861\u4e0a\u7684\u4e0d\u8db3\u3002", "why_notable": "\u533b\u5b66AI\u843d\u5730\u9700\u8981\u6a21\u578b\u6301\u7eed\u9002\u5e94\u65b0\u4efb\u52a1\uff0c\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u73b0\u6709CL\u65b9\u6cd5\u5728\u5f02\u6784\u533b\u5b66VQA\u573a\u666f\u4e0b\u7684\u5c40\u9650\u6027\uff0c\u4e3a\u672a\u6765\u65b9\u6cd5\u8bbe\u8ba1\u63d0\u4f9b\u91cd\u8981\u57fa\u51c6\u4e0e\u6d1e\u5bdf\u3002"}, {"abstract": "High deployment cost, poor spatial coverage and susceptibility to storm conditions are all challenges faced by traditional in-situ methods. This paper presents a video-based and high performance computing (HPC) enabled deep learning framework for joint sensor free estimation of five coastal wave parameters, namely significant wave height (Hs), maximum wave height (Hmax), peak period (Tp), zero upcrossing period (Tz) and wave direction (theta) from monocular coastal video. The proposed architecture comprises of a V-JEPA (self supervised) ViT Small backbone for robust spatiotemporal feature extraction in visually challenging scenarios, a dual-stream SlowFast temporal encoder for broad bandwidth representation of wave motion in both hydrodynamic breaking and swell regimes, an optical flow stream based on Farneback optical flow algorithm for adding saliency information to the structure with emphasis on hydrodynamically active wavelength bands of waves, and a multi-task regression layer with dispersion constraints (Airy wave dispersion lambda_p = 0.1). The model was trained on an NVIDIA DGX A100 cluster and was early stopped at epoch 31 and achieved Pearson correlation coefficients of 0.451, 0.578, 0.643, 0.680 and 0.832 for Hs, Hmax, Tp, Tz and wave direction respectively, with generalization ability to geographically diverse held out test data sites. While operating in a data-limited regime (6 annotated training scenes), the framework demonstrates statistically significant temporal correlations (PCC of 0.451 to 0.832), confirming proof of concept feasibility; R2 values (max 0.246) indicate that variance capture will improve with larger annotated datasets.", "arxiv_id": "2607.11998", "arxiv_url": "https://arxiv.org/abs/2607.11998", "authors": ["Abubakar Hamisu Kamagata", "Dharm Singh Jat", "Attlee Munyaradzi Gamundani", "Saravanakumar Paramasivam", "Babangida Sani", "Aliyu Zakariyya"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u7ed3\u5408V-JEPA\u81ea\u76d1\u7763\u9aa8\u5e72\u7f51\u7edc\u3001SlowFast\u53cc\u6d41\u65f6\u5e8f\u7f16\u7801\u5668\u548c\u5149\u6d41\u6d41\u7684\u591a\u4efb\u52a1\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u4ec5\u51ed\u5355\u76ee\u6d77\u5cb8\u89c6\u9891\u5373\u53ef\u8054\u5408\u4f30\u8ba1\u663e\u8457\u6ce2\u9ad8\u3001\u6700\u5927\u6ce2\u9ad8\u3001\u5cf0\u503c\u5468\u671f\u3001\u96f6\u4e0a\u7a7f\u5468\u671f\u548c\u6ce2\u5411\u4e94\u4e2a\u5173\u952e\u6ce2\u6d6a\u53c2\u6570\u3002", "categories": ["eess.IV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11998", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u91c7\u7528V-JEPA\uff08\u81ea\u76d1\u7763ViT Small\uff09\u63d0\u53d6\u65f6\u7a7a\u7279\u5f81\uff0c\u7ed3\u5408SlowFast\u53cc\u6d41\u7f16\u7801\u5668\u6355\u6349\u5bbd\u5e26\u6ce2\u6d6a\u8fd0\u52a8\uff0c\u5e76\u5f15\u5165Farneback\u5149\u6d41\u589e\u5f3a\u6c34\u52a8\u529b\u6d3b\u8dc3\u6ce2\u6bb5\u7684\u663e\u8457\u6027\u4fe1\u606f", "\u591a\u4efb\u52a1\u56de\u5f52\u5c42\u5f15\u5165Airy\u6ce2\u8272\u6563\u7ea6\u675f\uff08\u03bb_p=0.1\uff09\uff0c\u5728\u4ec56\u4e2a\u6807\u6ce8\u8bad\u7ec3\u573a\u666f\u7684\u6570\u636e\u7a00\u7f3a\u6761\u4ef6\u4e0b\u8bad\u7ec3\uff0c\u5728NVIDIA DGX A100\u96c6\u7fa4\u4e0a\u5b8c\u6210", "\u4e94\u4e2a\u6ce2\u6d6a\u53c2\u6570\u7684Pearson\u76f8\u5173\u7cfb\u6570\u5206\u522b\u4e3a0.451\u30010.578\u30010.643\u30010.680\u548c0.832\uff0c\u6a21\u578b\u53ef\u6cdb\u5316\u81f3\u5730\u7406\u591a\u6837\u7684\u6d4b\u8bd5\u7ad9\u70b9"], "keywords": ["\u591a\u6a21\u6001", "\u65f6\u7a7a\u5b66\u4e60", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u6d77\u6d0b\u9065\u611f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11998v1", "published_at": "2026-07-13", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "HPC-Enabled Video-based Coastal Wave Parameter Estimation Using V-JEPA and Deep Spatiotemporal Learning", "tldr": "\u57fa\u4e8e\u89c6\u9891\u7684\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u65e0\u9700\u4f20\u611f\u5668\u5373\u53ef\u4ece\u6d77\u5cb8\u89c6\u9891\u4f30\u8ba1\u4e94\u79cd\u6ce2\u6d6a\u53c2\u6570", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u7ed3\u5408V-JEPA\u81ea\u76d1\u7763\u9aa8\u5e72\u7f51\u7edc\u3001SlowFast\u53cc\u6d41\u65f6\u5e8f\u7f16\u7801\u5668\u548c\u5149\u6d41\u6d41\u7684\u591a\u4efb\u52a1\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u4ec5\u51ed\u5355\u76ee\u6d77\u5cb8\u89c6\u9891\u5373\u53ef\u8054\u5408\u4f30\u8ba1\u663e\u8457\u6ce2\u9ad8\u3001\u6700\u5927\u6ce2\u9ad8\u3001\u5cf0\u503c\u5468\u671f\u3001\u96f6\u4e0a\u7a7f\u5468\u671f\u548c\u6ce2\u5411\u4e94\u4e2a\u5173\u952e\u6ce2\u6d6a\u53c2\u6570\u3002", "why_notable": "\u5728\u6781\u5ea6\u6570\u636e\u7a00\u7f3a\uff08\u4ec56\u4e2a\u6807\u6ce8\u573a\u666f\uff09\u6761\u4ef6\u4e0b\u5b9e\u73b0\u65e0\u4f20\u611f\u5668\u6d77\u5cb8\u6ce2\u6d6a\u53c2\u6570\u4f30\u8ba1\uff0c\u4e3a\u964d\u4f4e\u6d77\u6d0b\u76d1\u6d4b\u6210\u672c\u3001\u63d0\u5347\u7a7a\u95f4\u8986\u76d6\u63d0\u4f9b\u4e86\u53ef\u884c\u7684\u6982\u5ff5\u9a8c\u8bc1\u65b9\u6848\uff0c\u5177\u6709\u91cd\u8981\u7684\u6d77\u6d0b\u5de5\u7a0b\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Classifying cybersecurity vulnerabilities using the Common Weakness Enumeration (CWE) taxonomy is challenging due to extreme class imbalance and strong hierarchical dependencies among weakness categories. Although oversampling techniques such as Synthetic Minority Oversampling Technique (SMOTE) and Adaptive Synthetic Sampling (ADASYN) are widely adopted to mitigate class imbalance, their effectiveness for hierarchical CWE text classification remains largely unexplored. This paper proposes a Hierarchy-Aware RoBERTa framework that explicitly incorporates CWE structural information through learnable parent-class embeddings, preserving taxonomic consistency. Our experiments demonstrate that synthetic interpolation in high-dimensional embedding spaces violates the inherent parent-child constraints of the CWE hierarchy, offering only marginal benefits for classical ML models while consistently degrading deep learning architectures. Evaluated on a CWE Research Concept dataset, the proposed model achieves a weighted F1-score of 0.76 without data augmentation, outperforming all baselines with notable gains on minority classes, including the Class category whose F1-score improved from 0.40 to 0.60 over the BERT baseline. Our results suggest that hierarchy-aware representation learning is a more principled alternative to oversampling for structured vulnerability classification.", "arxiv_id": "2607.11994", "arxiv_url": "https://arxiv.org/abs/2607.11994", "authors": ["Bipin Chhetri", "Deepika Giri", "Avishek Kadel", "Rabin Kumar Karki", "Akbar Siami Namin"], "brief": "\u672c\u6587\u63d0\u51faHierarchy-Aware RoBERTa\u6846\u67b6\uff0c\u901a\u8fc7\u53ef\u5b66\u4e60\u7684\u7236\u7c7b\u5d4c\u5165\u5c06CWE\u5c42\u6b21\u7ed3\u6784\u4fe1\u606f\u663e\u5f0f\u878d\u5165\u6a21\u578b\uff0c\u7528\u4e8e\u89e3\u51b3\u7f51\u7edc\u5b89\u5168\u6f0f\u6d1e\u5206\u7c7b\u4e2d\u6781\u7aef\u7c7b\u522b\u4e0d\u5e73\u8861\u4e0e\u5c42\u6b21\u4f9d\u8d56\u95ee\u9898\uff0c\u65e0\u9700\u6570\u636e\u589e\u5f3a\u5373\u53ef\u8d85\u8d8a\u6240\u6709\u57fa\u7ebf\u6a21\u578b\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11994", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51fa\u5c42\u6b21\u611f\u77e5RoBERTa\uff0c\u5229\u7528\u53ef\u5b66\u4e60\u7236\u7c7b\u5d4c\u5165\u4fdd\u6301CWE\u5206\u7c7b\u4f53\u7cfb\u7684\u7236\u5b50\u7ea6\u675f\u4e00\u81f4\u6027", "\u5b9e\u9a8c\u8bc1\u660eSMOTE/ADASYN\u7b49\u5408\u6210\u8fc7\u91c7\u6837\u5728\u9ad8\u7ef4\u5d4c\u5165\u7a7a\u95f4\u4e2d\u7834\u574f\u5c42\u6b21\u7ea6\u675f\uff0c\u5bf9\u6df1\u5ea6\u5b66\u4e60\u6a21\u578b\u6301\u7eed\u6709\u5bb3", "\u5728CWE Research Concept\u6570\u636e\u96c6\u4e0a\u52a0\u6743F1\u8fbe0.76\uff0c\u5c11\u6570\u7c7b\u522b\uff08Class\u7c7b\uff09F1\u4ece0.40\u63d0\u5347\u81f30.60\uff0c\u4f18\u4e8eBERT\u57fa\u7ebf"], "keywords": ["\u6587\u672c\u5206\u7c7b", "\u7c7b\u522b\u4e0d\u5e73\u8861", "\u7f51\u7edc\u5b89\u5168", "\u9884\u8bad\u7ec3\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11994v1", "published_at": "2026-07-13", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Mitigating The Effect of Class Imbalance in Data with Hierarchical and Dependable Structure", "tldr": "\u63d0\u51fa\u5c42\u6b21\u611f\u77e5RoBERTa\u6846\u67b6\uff0c\u901a\u8fc7\u878d\u5165CWE\u5206\u7c7b\u7ed3\u6784\u4fe1\u606f\u66ff\u4ee3\u8fc7\u91c7\u6837\u6765\u89e3\u51b3\u7f51\u7edc\u5b89\u5168\u6f0f\u6d1e\u5206\u7c7b\u4e2d\u7684\u7c7b\u522b\u4e0d\u5e73\u8861\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51faHierarchy-Aware RoBERTa\u6846\u67b6\uff0c\u901a\u8fc7\u53ef\u5b66\u4e60\u7684\u7236\u7c7b\u5d4c\u5165\u5c06CWE\u5c42\u6b21\u7ed3\u6784\u4fe1\u606f\u663e\u5f0f\u878d\u5165\u6a21\u578b\uff0c\u7528\u4e8e\u89e3\u51b3\u7f51\u7edc\u5b89\u5168\u6f0f\u6d1e\u5206\u7c7b\u4e2d\u6781\u7aef\u7c7b\u522b\u4e0d\u5e73\u8861\u4e0e\u5c42\u6b21\u4f9d\u8d56\u95ee\u9898\uff0c\u65e0\u9700\u6570\u636e\u589e\u5f3a\u5373\u53ef\u8d85\u8d8a\u6240\u6709\u57fa\u7ebf\u6a21\u578b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u4f20\u7edf\u8fc7\u91c7\u6837\u65b9\u6cd5\u5728\u5c42\u6b21\u7ed3\u6784\u6587\u672c\u5206\u7c7b\u4e2d\u7684\u5c40\u9650\u6027\uff0c\u63d0\u51fa\u4ee5\u7ed3\u6784\u611f\u77e5\u8868\u793a\u5b66\u4e60\u66ff\u4ee3\u6570\u636e\u589e\u5f3a\u7684\u65b0\u8303\u5f0f\uff0c\u5bf9\u7f51\u7edc\u5b89\u5168\u6f0f\u6d1e\u81ea\u52a8\u5206\u7c7b\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "A specialist tolerates blind spots that a generalist does not. Usually this is treated as a cost to be minimized. We treat it as a design variable: a deficiency can be kept because it pays and removed on demand in the rare situation where it would be fatal, by routing to a compensation channel. We give three results. First, an advantage condition under which keeping the deficiency is a computable economic position; structurally it is the Ehrlich-Becker market-vs-self-insurance margin applied to a competence gap, with the detector as a Townsend costly-state-verification technology. Second, a two-sided characterization of removability. A coupling lemma shows that when the deficiency is a coarsening of perception, no switch can separate benefit from harm, yielding a converse (a confounded detector earns zero premium, and any within-defect policy insisting on positive premium is driven, under multiplicative dynamics, to negative long-run growth) and an achievability result (a detector outside the deficiency earns a positive premium). Together, over structured uncertainty classes with severity capped or miss rate O(1/L): a defect is profitably removable iff the detector-relevant distinction survives the restriction and the advantage condition holds; the premium is the support function of the class\u0027s ROC set at an economic price vector. Third, observation defects and capacity defects differ exactly on whether access to the deployment distribution rescues them; the gap decomposes as cross-leak plus a closure deficit, and per-task randomization buys back the latter, never the former. The detector can be learned from declared fatal categories at a training bill linear in loss severity (up to a log factor). The results synthesize Chow\u0027s reject option, Kelly growth under ruin, and selective prediction.", "arxiv_id": "2607.11983", "arxiv_url": "https://arxiv.org/abs/2607.11983", "authors": ["Cheng Qian"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u7ecf\u6d4e\u5b66\u6846\u67b6\uff0c\u5c06AI/\u4e13\u5bb6\u7cfb\u7edf\u7684\u80fd\u529b\u7f3a\u9677\uff08\u76f2\u70b9\uff09\u89c6\u4e3a\u8bbe\u8ba1\u53d8\u91cf\u800c\u975e\u7eaf\u7cb9\u6210\u672c\uff1a\u5728\u5927\u591a\u6570\u60c5\u51b5\u4e0b\u4fdd\u7559\u7f3a\u9677\u4ee5\u8282\u7701\u8d44\u6e90\uff0c\u4ec5\u5728\u7f3a\u9677\u81f4\u547d\u65f6\u901a\u8fc7\"\u8865\u507f\u901a\u9053\"\u8def\u7531\u5904\u7406\u3002\u8bba\u6587\u7ed9\u51fa\u4e09\u4e2a\u6838\u5fc3\u7ed3\u679c\uff1a\u4fdd\u7559\u7f3a\u9677\u7684\u4f18\u52bf\u6761\u4ef6\u3001\u7f3a\u9677\u53ef\u79fb\u9664\u6027\u7684\u53cc\u5411\u523b\u753b\uff0c\u4ee5\u53ca\u89c2\u6d4b\u7f3a\u9677\u4e0e\u5bb9\u91cf\u7f3a\u9677\u7684\u672c\u8d28\u533a\u522b\u3002", "categories": ["econ.EM", "cs.AI", "cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11983", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u4f18\u52bf\u6761\u4ef6\uff1a\u5c06Ehrlich-Becker\u5e02\u573a\u4fdd\u9669vs\u81ea\u4fdd\u9669\u8fb9\u9645\u5e94\u7528\u4e8e\u80fd\u529b\u5dee\u8ddd\uff0c\u68c0\u6d4b\u5668\u4f5c\u4e3aTownsend\u4ee3\u4ef7\u72b6\u6001\u9a8c\u8bc1\u6280\u672f\uff0c\u7ed9\u51fa\u4fdd\u7559\u7f3a\u9677\u7684\u53ef\u8ba1\u7b97\u7ecf\u6d4e\u6761\u4ef6", "\u53ef\u79fb\u9664\u6027\u53cc\u5411\u523b\u753b\uff1a\u8026\u5408\u5f15\u7406\u8bc1\u660e\u5f53\u7f3a\u9677\u662f\u611f\u77e5\u7c97\u5316\u65f6\u65e0\u6cd5\u5206\u79bb\u6536\u76ca\u4e0e\u5371\u5bb3\uff08\u6df7\u6dc6\u68c0\u6d4b\u5668\u6ea2\u4ef7\u4e3a\u96f6\uff0c\u5728\u4e58\u6cd5\u52a8\u6001\u4e0b\u5bfc\u81f4\u8d1f\u957f\u671f\u589e\u957f\uff09\uff1b\u7f3a\u9677\u5916\u68c0\u6d4b\u5668\u53ef\u83b7\u6b63\u6ea2\u4ef7", "\u89c2\u6d4b\u7f3a\u9677vs\u5bb9\u91cf\u7f3a\u9677\u7684\u672c\u8d28\u5dee\u5f02\uff1a\u524d\u8005\u65e0\u6cd5\u901a\u8fc7\u8bbf\u95ee\u90e8\u7f72\u5206\u5e03\u6765\u4fee\u590d\uff0c\u540e\u8005\u53ef\u4ee5\uff1b\u5dee\u8ddd\u5206\u89e3\u4e3a\u4ea4\u53c9\u6cc4\u6f0f+\u95ed\u5408\u8d64\u5b57\uff0c\u4efb\u52a1\u7ea7\u968f\u673a\u5316\u53ea\u80fd\u5f25\u8865\u540e\u8005\uff1b\u68c0\u6d4b\u5668\u8bad\u7ec3\u6210\u672c\u4e0e\u635f\u5931\u4e25\u91cd\u5ea6\u7ebf\u6027\u76f8\u5173\uff08\u542b\u5bf9\u6570\u56e0\u5b50\uff09"], "keywords": ["AI\u7cfb\u7edf\u8bbe\u8ba1", "\u7ecf\u6d4e\u5b66", "\u9009\u62e9\u6027\u9884\u6d4b", "\u98ce\u9669\u7ba1\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11983v1", "published_at": "2026-07-13", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Removable Defects: The Economics and Limits of Deliberate Deficiency", "tldr": "\u5c06AI\u7cfb\u7edf\u7684\u80fd\u529b\u7f3a\u9677\u89c6\u4e3a\u53ef\u8bbe\u8ba1\u53d8\u91cf\uff0c\u5efa\u7acb\u7ecf\u6d4e\u6846\u67b6\u5206\u6790\u4f55\u65f6\u4fdd\u7559\u7f3a\u9677\u6bd4\u4fee\u590d\u66f4\u5408\u7b97", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u7ecf\u6d4e\u5b66\u6846\u67b6\uff0c\u5c06AI/\u4e13\u5bb6\u7cfb\u7edf\u7684\u80fd\u529b\u7f3a\u9677\uff08\u76f2\u70b9\uff09\u89c6\u4e3a\u8bbe\u8ba1\u53d8\u91cf\u800c\u975e\u7eaf\u7cb9\u6210\u672c\uff1a\u5728\u5927\u591a\u6570\u60c5\u51b5\u4e0b\u4fdd\u7559\u7f3a\u9677\u4ee5\u8282\u7701\u8d44\u6e90\uff0c\u4ec5\u5728\u7f3a\u9677\u81f4\u547d\u65f6\u901a\u8fc7\"\u8865\u507f\u901a\u9053\"\u8def\u7531\u5904\u7406\u3002\u8bba\u6587\u7ed9\u51fa\u4e09\u4e2a\u6838\u5fc3\u7ed3\u679c\uff1a\u4fdd\u7559\u7f3a\u9677\u7684\u4f18\u52bf\u6761\u4ef6\u3001\u7f3a\u9677\u53ef\u79fb\u9664\u6027\u7684\u53cc\u5411\u523b\u753b\uff0c\u4ee5\u53ca\u89c2\u6d4b\u7f3a\u9677\u4e0e\u5bb9\u91cf\u7f3a\u9677\u7684\u672c\u8d28\u533a\u522b\u3002", "why_notable": "\u5c06AI\u7cfb\u7edf\u7f3a\u9677\u7ba1\u7406\u4ece\u5de5\u7a0b\u95ee\u9898\u63d0\u5347\u4e3a\u7ecf\u6d4e\u4f18\u5316\u95ee\u9898\uff0c\u878d\u5408Kelly\u589e\u957f\u51c6\u5219\u3001Chow\u62d2\u7edd\u9009\u9879\u548c\u9009\u62e9\u6027\u9884\u6d4b\u7406\u8bba\uff0c\u4e3aAI\u90e8\u7f72\u4e2d\u7684\"\u4f55\u65f6\u8def\u7531\u7ed9\u4eba\u7c7b\"\u63d0\u4f9b\u4e86\u4e25\u683c\u7684\u7406\u8bba\u57fa\u7840\uff0c\u5bf9\u9ad8\u98ce\u9669AI\u7cfb\u7edf\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c"}, {"abstract": "Retrieval-Augmented Generation (RAG) addresses the limitations of Large Language Models (LLMs) when providing responses to domain-specific questions. Graph-based RAG approaches, such as GraphRAG, enhance retrieval by capturing semantic relationships within knowledge graphs (KGs). While the FAIR principles (Findability, Accessibility, Interoperability, and Reusability) are becoming prevalent for scientific data management, especially in complex domains such as medicine, existing RAG approaches lack a structured FAIRification of the underlying knowledge resources. This lack limits their potential for FAIR information retrieval in these domains. To address this gap, we introduce FAIR GraphRAG, a novel framework that integrates FAIR Digital Objects (FDOs) as the fundamental units of a graph-based retrieval system. Each graph node represents an FDO that incorporates core data, metadata, persistent identifiers, and semantic links. We leverage LLMs to support schema construction and automated extraction of content and metadata from data sources. The framework was co-designed by physicians and computer scientists to ensure technical and clinical relevance. We apply FAIR GraphRAG to a biomedical dataset in gastroenterology, demonstrating its applicability to RNA-sequencing data. Beyond ensuring adherence to the FAIR principles, FAIR GraphRAG significantly improves question answering accuracy, coverage, and explainability, particularly for complex queries involving metadata and ontology links. This work shows the feasibility of combining FAIR data practices with graph-based retrieval techniques. We see potential for applying our approach to other specialized fields such as education and business.", "arxiv_id": "2607.11464", "arxiv_url": "https://arxiv.org/abs/2607.11464", "authors": ["Marlena Fl\u00fch", "Soo-Yon Kim", "Carolin Victoria Schneider", "Sandra Geisler"], "brief": "\u63d0\u51faFAIR GraphRAG\u6846\u67b6\uff0c\u5c06FAIR\u6570\u5b57\u5bf9\u8c61\uff08FDO\uff09\u4f5c\u4e3a\u77e5\u8bc6\u56fe\u8c31\u8282\u70b9\u7684\u57fa\u672c\u5355\u5143\uff0c\u6bcf\u4e2a\u8282\u70b9\u5305\u542b\u6838\u5fc3\u6570\u636e\u3001\u5143\u6570\u636e\u3001\u6301\u4e45\u6807\u8bc6\u7b26\u548c\u8bed\u4e49\u94fe\u63a5\uff0c\u5e76\u5e94\u7528\u4e8e\u80c3\u80a0\u75c5\u5b66RNA\u6d4b\u5e8f\u6570\u636e\u7684\u95ee\u7b54\u4efb\u52a1\u3002", "categories": ["cs.IR", "cs.AI", "cs.CL", "cs.DB"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11464", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u4ee5FAIR\u6570\u5b57\u5bf9\u8c61\uff08FDO\uff09\u4e3a\u56fe\u8282\u70b9\uff0c\u6574\u5408\u5143\u6570\u636e\u3001\u6301\u4e45\u6807\u8bc6\u7b26\u4e0e\u672c\u4f53\u8bed\u4e49\u94fe\u63a5\uff0c\u5b9e\u73b0\u77e5\u8bc6\u56fe\u8c31\u7684FAIRification", "\u5229\u7528LLM\u8f85\u52a9\u77e5\u8bc6\u56fe\u8c31\u6a21\u5f0f\u6784\u5efa\u4e0e\u5185\u5bb9/\u5143\u6570\u636e\u81ea\u52a8\u62bd\u53d6\uff0c\u7531\u533b\u751f\u4e0e\u8ba1\u7b97\u673a\u79d1\u5b66\u5bb6\u8054\u5408\u8bbe\u8ba1", "\u5728\u80c3\u80a0\u75c5\u5b66\u751f\u7269\u533b\u5b66\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\uff0c\u663e\u8457\u63d0\u5347\u590d\u6742\u67e5\u8be2\u7684\u95ee\u7b54\u51c6\u786e\u7387\u3001\u8986\u76d6\u7387\u4e0e\u53ef\u89e3\u91ca\u6027"], "keywords": ["\u77e5\u8bc6\u56fe\u8c31", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u751f\u7269\u533b\u5b66", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11464v1", "published_at": "2026-07-13", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "FAIR GraphRAG: A Retrieval-Augmented Generation Approach for Semantic Data Analysis", "tldr": "\u5c06FAIR\u6570\u5b57\u5bf9\u8c61\u878d\u5165\u56fe\u8c31\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u6846\u67b6\uff0c\u63d0\u5347\u751f\u7269\u533b\u5b66\u9886\u57df\u95ee\u7b54\u51c6\u786e\u6027\u4e0e\u53ef\u89e3\u91ca\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51faFAIR GraphRAG\u6846\u67b6\uff0c\u5c06FAIR\u6570\u5b57\u5bf9\u8c61\uff08FDO\uff09\u4f5c\u4e3a\u77e5\u8bc6\u56fe\u8c31\u8282\u70b9\u7684\u57fa\u672c\u5355\u5143\uff0c\u6bcf\u4e2a\u8282\u70b9\u5305\u542b\u6838\u5fc3\u6570\u636e\u3001\u5143\u6570\u636e\u3001\u6301\u4e45\u6807\u8bc6\u7b26\u548c\u8bed\u4e49\u94fe\u63a5\uff0c\u5e76\u5e94\u7528\u4e8e\u80c3\u80a0\u75c5\u5b66RNA\u6d4b\u5e8f\u6570\u636e\u7684\u95ee\u7b54\u4efb\u52a1\u3002", "why_notable": "\u9996\u6b21\u5c06FAIR\u6570\u636e\u539f\u5219\u7cfb\u7edf\u6027\u5730\u878d\u5165GraphRAG\u6846\u67b6\uff0c\u586b\u8865\u4e86\u79d1\u5b66\u6570\u636e\u7ba1\u7406\u89c4\u8303\u4e0e\u56fe\u8c31\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u4e4b\u95f4\u7684\u7a7a\u767d\uff0c\u5bf9\u533b\u5b66\u7b49\u9ad8\u5ea6\u4f9d\u8d56\u6807\u51c6\u5316\u6570\u636e\u7684\u4e13\u4e1a\u9886\u57df\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Aggregate reliability estimates can obscure heterogeneity in measurement-design burden across response conditions, so a single G- or D-study may mischaracterize a design\u0027s adequacy for particular strata. This study introduces a conditional generalizability framework with three components. First, automated scoring configurations -- the encoder architectures and scoring-head families admissible within a fixed pipeline -- are treated as a universe of admissible measurement conditions rather than incidental modeling choices. Second, analytical D-study projections are compared with empirical configuration sweeps over a finite scoring pool, yielding two estimands of design adequacy whose agreement or divergence diagnoses the realized configuration universe. Third, evidence is conditioned on entropy-defined response strata, treating entropy as an operational stratification variable, not a construct claim about writing quality. Whereas recent generalizability-theory extensions address AI-generated item variants on the response side, this framework addresses the analogous scoring-side problem: AI-mediated scoring configurations. Demonstrated with automated essay scoring of timed L2 writing, the realized design was dependable in aggregate (Phi approx 0.76). Re-estimated within entropy strata, dependability stayed high but declined modestly and robustly (Phi = 0.88, 0.87, 0.84) -- a gradient implying different decision-study requirements, the highest-entropy stratum requiring the most crossed conditions. The framework offers a portable workflow for evaluating nonuniform dependability.", "arxiv_id": "2607.11981", "arxiv_url": "https://arxiv.org/abs/2607.11981", "authors": ["Yi Gui"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u6761\u4ef6\u6982\u5316\uff08Generalizability\uff09\u6846\u67b6\uff0c\u5c06\u81ea\u52a8\u8bc4\u5206\u914d\u7f6e\uff08\u7f16\u7801\u5668\u67b6\u6784\u4e0e\u8bc4\u5206\u5934\uff09\u89c6\u4e3a\u53ef\u5bb9\u8bb8\u6d4b\u91cf\u6761\u4ef6\u7684\u5168\u96c6\uff0c\u5e76\u6309\u71b5\u5206\u5c42\u8bc4\u4f30\u8bc4\u5206\u53ef\u9760\u6027\uff0c\u63ed\u793a\u805a\u5408\u53ef\u9760\u6027\u6307\u6807\u63a9\u76d6\u7684\u5f02\u8d28\u6027\u95ee\u9898\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11981", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u5c06\u81ea\u52a8\u8bc4\u5206\u914d\u7f6e\uff08encoder\u67b6\u6784+\u8bc4\u5206\u5934\u7ec4\u5408\uff09\u7eb3\u5165\u6982\u5316\u7406\u8bba\u7684\u6d4b\u91cf\u6761\u4ef6\u5b87\u5b99\uff0c\u800c\u975e\u89c6\u4e3a\u5076\u7136\u5efa\u6a21\u9009\u62e9", "\u5bf9\u6bd4\u5206\u6790\u6027D\u7814\u7a76\u6295\u5f71\u4e0e\u6709\u9650\u8bc4\u5206\u6c60\u7684\u5b9e\u8bc1\u914d\u7f6e\u626b\u63cf\uff0c\u8bca\u65ad\u5b9e\u73b0\u914d\u7f6e\u5b87\u5b99\u7684\u5145\u5206\u6027", "\u6309\u54cd\u5e94\u71b5\u5206\u5c42\u540e\uff0c\u6574\u4f53Phi\u22480.76\uff0c\u5404\u71b5\u5c42Phi\u4f9d\u6b21\u4e3a0.88\u30010.87\u30010.84\uff0c\u9ad8\u71b5\u5c42\u9700\u8981\u66f4\u591a\u4ea4\u53c9\u6761\u4ef6"], "keywords": ["\u81ea\u52a8\u4f5c\u6587\u8bc4\u5206", "\u6d4b\u91cf\u7406\u8bba", "\u81ea\u7136\u8bed\u8a00\u5904\u7406", "\u8bc4\u4f30\u65b9\u6cd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11981v1", "published_at": "2026-07-13", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Evaluating Nonuniform Dependability Across Response Conditions: A Conditional Generalizability Framework Illustrated in Automated Essay Scoring", "tldr": "\u63d0\u51fa\u6761\u4ef6\u6982\u5316\u6846\u67b6\uff0c\u63ed\u793a\u81ea\u52a8\u4f5c\u6587\u8bc4\u5206\u5728\u4e0d\u540c\u56de\u7b54\u6761\u4ef6\u4e0b\u7684\u975e\u5747\u5300\u53ef\u9760\u6027", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u6761\u4ef6\u6982\u5316\uff08Generalizability\uff09\u6846\u67b6\uff0c\u5c06\u81ea\u52a8\u8bc4\u5206\u914d\u7f6e\uff08\u7f16\u7801\u5668\u67b6\u6784\u4e0e\u8bc4\u5206\u5934\uff09\u89c6\u4e3a\u53ef\u5bb9\u8bb8\u6d4b\u91cf\u6761\u4ef6\u7684\u5168\u96c6\uff0c\u5e76\u6309\u71b5\u5206\u5c42\u8bc4\u4f30\u8bc4\u5206\u53ef\u9760\u6027\uff0c\u63ed\u793a\u805a\u5408\u53ef\u9760\u6027\u6307\u6807\u63a9\u76d6\u7684\u5f02\u8d28\u6027\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c06AI\u8bc4\u5206\u914d\u7f6e\u7cfb\u7edf\u6027\u7eb3\u5165\u6982\u5316\u7406\u8bba\u6846\u67b6\uff0c\u63ed\u793a\u805a\u5408\u53ef\u9760\u6027\u6307\u6807\u7684\u5c40\u9650\u6027\uff0c\u4e3a\u81ea\u52a8\u8bc4\u5206\u7cfb\u7edf\u7684\u5dee\u5f02\u5316\u51b3\u7b56\u8bbe\u8ba1\u63d0\u4f9b\u53ef\u79fb\u690d\u7684\u65b9\u6cd5\u8bba\u5de5\u5177"}, {"abstract": "Like many optimization-driven domains, railway rescheduling relies on Mixed-Integer Linear Programming (MILP), yet the field\u0027s modeling knowledge is scattered across hundreds of papers in incompatible notations, and narrative surveys organize it subjectively: they classify models by vocabulary rather than by structure, and reproduce neither. We present LP Mining with LP2Graph, a method that mines the structure of published LP and MILP formulations into a reproducible dataset and an induced taxonomy. Its core, LP2Graph, represents each formulation admitted by its canonical grammar as a typed variable--equation graph derived from a single canonical model; once a source is extracted into that model, everything downstream is deterministic. Each source is parsed into this model, homologized, and clustered bottom-up (over variables, then constraints and the objective, then whole-model structure) and, separately, by application domain and solution approach; the resulting groups are labeled by a rule-seeded, self-updating classifier. We validate the representation rather than assume it: per-cluster representatives are regenerated as independent LaTeX and re-solved across CBC, HiGHS and Gurobi against the optimum reported in the source paper. The outcome is an objective, repeatable taxonomy of variables, constraints and model types: the principled foundation on which our raiLPminer line of automated railway-rescheduling model development builds.", "arxiv_id": "2607.11980", "arxiv_url": "https://arxiv.org/abs/2607.11980", "authors": ["J\u00f6rn Maurischat", "Nikola Be\u0161inovi\u0107", "Michael F\u00e4rber"], "brief": "\u63d0\u51faLP Mining with LP2Graph\u65b9\u6cd5\uff0c\u5c06\u5206\u6563\u5728\u5927\u91cf\u8bba\u6587\u4e2d\u7684\u7ebf\u6027\u89c4\u5212/\u6df7\u5408\u6574\u6570\u89c4\u5212\u6a21\u578b\u89e3\u6790\u4e3a\u7edf\u4e00\u7684\u53d8\u91cf-\u65b9\u7a0b\u56fe\u7ed3\u6784\uff0c\u81ea\u52a8\u6784\u5efa\u53ef\u590d\u73b0\u7684\u6a21\u578b\u6570\u636e\u96c6\u548c\u5ba2\u89c2\u5206\u7c7b\u4f53\u7cfb\uff0c\u4e13\u95e8\u670d\u52a1\u4e8e\u94c1\u8def\u91cd\u8c03\u5ea6\u9886\u57df\u7684\u81ea\u52a8\u5316\u5efa\u6a21\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11980", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u6838\u5fc3LP2Graph\u5c06\u6bcf\u4e2aMILP\u6a21\u578b\u8868\u793a\u4e3a\u57fa\u4e8e\u89c4\u8303\u8bed\u6cd5\u7684\u7c7b\u578b\u5316\u53d8\u91cf-\u65b9\u7a0b\u56fe\uff0c\u4e0b\u6e38\u5904\u7406\u5b8c\u5168\u786e\u5b9a\u6027", "\u91c7\u7528\u81ea\u5e95\u5411\u4e0a\u805a\u7c7b\uff08\u53d8\u91cf\u2192\u7ea6\u675f\u4e0e\u76ee\u6807\u2192\u6574\u4f53\u6a21\u578b\u7ed3\u6784\uff09\u5e76\u7ed3\u5408\u5e94\u7528\u57df\u548c\u6c42\u89e3\u65b9\u6cd5\u53cc\u7ef4\u5ea6\u5206\u7c7b\uff0c\u7531\u89c4\u5219\u79cd\u5b50+\u81ea\u66f4\u65b0\u5206\u7c7b\u5668\u6807\u6ce8", "\u901a\u8fc7\u5c06\u805a\u7c7b\u4ee3\u8868\u6a21\u578b\u91cd\u65b0\u751f\u6210LaTeX\u5e76\u5728CBC\u3001HiGHS\u3001Gurobi\u4e09\u79cd\u6c42\u89e3\u5668\u4e0a\u9a8c\u8bc1\u6700\u4f18\u89e3\u6765\u786e\u8ba4\u8868\u793a\u6b63\u786e\u6027"], "keywords": ["\u6df7\u5408\u6574\u6570\u89c4\u5212", "\u77e5\u8bc6\u6316\u6398", "\u94c1\u8def\u8c03\u5ea6", "\u81ea\u52a8\u5316\u5efa\u6a21"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11980v1", "published_at": "2026-07-13", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "LP Mining with LP2Graph: A Use Case for Railway Rescheduling", "tldr": "LP2Graph\u5c06\u94c1\u8def\u91cd\u8c03\u5ea6\u9886\u57df\u7684MILP\u6a21\u578b\u7ed3\u6784\u5316\u6316\u6398\u4e3a\u53ef\u590d\u73b0\u6570\u636e\u96c6\u4e0e\u5ba2\u89c2\u5206\u7c7b\u4f53\u7cfb", "upvotes": 0, "what_it_is": "\u63d0\u51faLP Mining with LP2Graph\u65b9\u6cd5\uff0c\u5c06\u5206\u6563\u5728\u5927\u91cf\u8bba\u6587\u4e2d\u7684\u7ebf\u6027\u89c4\u5212/\u6df7\u5408\u6574\u6570\u89c4\u5212\u6a21\u578b\u89e3\u6790\u4e3a\u7edf\u4e00\u7684\u53d8\u91cf-\u65b9\u7a0b\u56fe\u7ed3\u6784\uff0c\u81ea\u52a8\u6784\u5efa\u53ef\u590d\u73b0\u7684\u6a21\u578b\u6570\u636e\u96c6\u548c\u5ba2\u89c2\u5206\u7c7b\u4f53\u7cfb\uff0c\u4e13\u95e8\u670d\u52a1\u4e8e\u94c1\u8def\u91cd\u8c03\u5ea6\u9886\u57df\u7684\u81ea\u52a8\u5316\u5efa\u6a21\u3002", "why_notable": "\u89e3\u51b3\u4e86\u4f18\u5316\u9886\u57df\u5efa\u6a21\u77e5\u8bc6\u788e\u7247\u5316\u3001\u7b26\u53f7\u4e0d\u7edf\u4e00\u3001\u5206\u7c7b\u4e3b\u89c2\u7684\u957f\u671f\u75db\u70b9\uff0c\u63d0\u4f9b\u4e86\u5ba2\u89c2\u53ef\u590d\u73b0\u7684\u5206\u7c7b\u57fa\u7840\uff0c\u4e3a\u94c1\u8def\u91cd\u8c03\u5ea6\u81ea\u52a8\u5316\u5efa\u6a21\u6d41\u6c34\u7ebf\uff08raiLPminer\uff09\u5960\u5b9a\u57fa\u7840\uff0c\u65b9\u6cd5\u8bba\u53ef\u63a8\u5e7f\u81f3\u5176\u4ed6MILP\u5e94\u7528\u9886\u57df\u3002"}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
