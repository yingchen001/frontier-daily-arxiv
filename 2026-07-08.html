 subsequent reasoning stage largely unexplored. In this work, we study Post Hallucination Reasoning (PHR), the stage in which hallucinated semantics enter the model\u0027s inference context and influence downstream predictions. To systematically investigate PHR, we introduce HIVE, Hallucination Inference and Verification Engine, an evaluation infrastructure that enables controlled comparisons between faithful and hallucinated captions. Across nine tasks and nine models, we observe structured modality dependent patterns: hallucinated captions often improve accuracy on vision language tasks, while text only tasks exhibit limited or unstable effects. Further analyses show that hallucinated cues broaden semantic coverage and reshape reasoning dynamics while preserving stable inference. These findings highlight that hallucinated semantics may influence downstream reasoning once they enter the model\u0027s inference context. Understanding this post hallucination stage is important for improving the reliability and interpretability of multimodal reasoning systems. Code is publicly available at https://github.com/hefengcs/HIVE.", "arxiv_id": "2607.07507", "arxiv_url": "https://arxiv.org/abs/2607.07507", "authors": ["Feng He", "Zhenting Wang", "Qifan Wang", "Qiang Guan", "Dongfang Liu", "Ruixiang Tang", "Qiankun Li"], "brief": "\u7814\u7a76\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e2d\"\u5e7b\u89c9\u540e\u63a8\u7406\"\uff08PHR\uff09\u73b0\u8c61\uff0c\u5373\u5e7b\u89c9\u8bed\u4e49\u8fdb\u5165\u63a8\u7406\u4e0a\u4e0b\u6587\u540e\u5982\u4f55\u5f71\u54cd\u4e0b\u6e38\u9884\u6d4b\u3002\u901a\u8fc7\u6784\u5efaHIVE\u8bc4\u4f30\u6846\u67b6\uff0c\u57289\u4e2a\u4efb\u52a1\u548c9\u4e2a\u6a21\u578b\u4e0a\u53d1\u73b0\uff1a\u5e7b\u89c9\u63cf\u8ff0\u5728\u89c6\u89c9\u8bed\u8a00\u4efb\u52a1\u4e2d\u5f80\u5f80\u53cd\u800c\u63d0\u5347\u51c6\u786e\u7387\uff0c\u63ed\u793a\u4e86\u5e7b\u89c9\u8bed\u4e49\u5bf9\u591a\u6a21\u6001\u63a8\u7406\u7684\u590d\u6742\u5f71\u54cd\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07507", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5e7b\u89c9", "\u63a8\u7406\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07507v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "HIVE: Understanding Post-Hallucination Reasoning in Vision Language Models", "tldr": "\u7814\u7a76\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e2d\"\u5e7b\u89c9\u540e\u63a8\u7406\"\uff08PHR\uff09\u73b0\u8c61\uff0c\u5373\u5e7b\u89c9\u8bed\u4e49\u8fdb\u5165\u63a8\u7406\u4e0a\u4e0b\u6587\u540e\u5982\u4f55\u5f71\u54cd\u4e0b\u6e38\u9884\u6d4b\u3002\u901a\u8fc7\u6784\u5efaHIVE\u8bc4\u4f30\u6846\u67b6\uff0c\u57289\u4e2a\u4efb\u52a1\u548c9\u4e2a\u6a21\u578b\u4e0a\u53d1\u73b0\uff1a\u5e7b\u89c9\u63cf\u8ff0\u5728\u89c6\u89c9\u8bed\u8a00\u4efb\u52a1\u4e2d\u5f80\u5f80\u53cd\u800c\u63d0\u5347\u51c6\u786e\u7387\uff0c\u63ed\u793a\u4e86\u5e7b\u89c9\u8bed\u4e49\u5bf9\u591a\u6a21\u6001\u63a8\u7406\u7684\u590d\u6742\u5f71\u54cd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Product data scientists often ask LLM-based agents to help with recurring execution tasks such as cleaning data, writing SQL, choosing statistical tests, and formatting results. Reusable skill files are meant to avoid prompting from scratch by packaging guidance for a task family. Expert-written skills can encode high-quality guidance, but writing and maintaining them across many data-science task families creates a manual bottleneck. We ask whether LLM-generated skills offer a useful low-curation alternative: do they improve performance over the task prompt alone? We test this question across four lifecycle stages: data preparation, data extraction, statistical analysis, and reporting, using one generated skill per stage. We find no reliable improvement from full generated skills over No-Skill prompting. We then ask whether any part of the skill is useful by ablating different skill components. The main ablation covers 56 tasks, nine model configurations, and three providers, yielding 7,560 runs. Compared with prompting using the task alone, neither the full generated skill nor any ablated skill variant significantly improves performance; all p-values are at least 0.396, and the total spread across variants is only 1.2 pp. A supplemental token-matched control adds 1,512 runs and finds that Full skills perform similarly to task-irrelevant skill-formatted content. The results caution against using one LLM-generated skill per data-science workflow as a default single-shot prompting strategy.", "arxiv_id": "2607.07504", "arxiv_url": "https://arxiv.org/abs/2607.07504", "authors": ["Wei-Jung Huang"], "brief": "\u7814\u7a76\u6d4b\u8bd5\u4e86LLM\u751f\u6210\u7684\u6280\u80fd\u6587\u4ef6\uff08skill files\uff09\u5728\u6570\u636e\u79d1\u5b66\u5de5\u4f5c\u6d41\u4e2d\u7684\u6548\u679c\uff0c\u6db5\u76d6\u6570\u636e\u51c6\u5907\u3001\u63d0\u53d6\u3001\u7edf\u8ba1\u5206\u6790\u548c\u62a5\u544a\u56db\u4e2a\u9636\u6bb5\uff0c\u5171\u8fdb\u884c7560\u6b21\u5b9e\u9a8c\u3002\u7ed3\u679c\u53d1\u73b0\uff0cLLM\u751f\u6210\u7684\u6280\u80fd\u6587\u4ef6\u76f8\u6bd4\u65e0\u6280\u80fd\u63d0\u793a\u5e76\u65e0\u663e\u8457\u63d0\u5347\uff08p\u503c\u5747\u22650.396\uff0c\u6027\u80fd\u5dee\u5f02\u4ec51.2\u4e2a\u767e\u5206\u70b9\uff09\uff0c\u751a\u81f3\u4e0e\u4efb\u52a1\u65e0\u5173\u7684\u5185\u5bb9\u6548\u679c\u76f8\u5f53\uff0c\u4e0d\u5efa\u8bae\u5c06\u5176\u4f5c\u4e3a\u9ed8\u8ba4\u63d0\u793a\u7b56\u7565\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07504", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63d0\u793a\u5de5\u7a0b", "\u6570\u636e\u79d1\u5b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07504v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Do LLM-Generated Skills Make Better AI Data Scientists? A Component Ablation Across Data-Science Workflows", "tldr": "\u7814\u7a76\u6d4b\u8bd5\u4e86LLM\u751f\u6210\u7684\u6280\u80fd\u6587\u4ef6\uff08skill files\uff09\u5728\u6570\u636e\u79d1\u5b66\u5de5\u4f5c\u6d41\u4e2d\u7684\u6548\u679c\uff0c\u6db5\u76d6\u6570\u636e\u51c6\u5907\u3001\u63d0\u53d6\u3001\u7edf\u8ba1\u5206\u6790\u548c\u62a5\u544a\u56db\u4e2a\u9636\u6bb5\uff0c\u5171\u8fdb\u884c7560\u6b21\u5b9e\u9a8c\u3002\u7ed3\u679c\u53d1\u73b0\uff0cLLM\u751f\u6210\u7684\u6280\u80fd\u6587\u4ef6\u76f8\u6bd4\u65e0\u6280\u80fd\u63d0\u793a\u5e76\u65e0\u663e\u8457\u63d0\u5347\uff08p\u503c\u5747\u22650.396\uff0c\u6027\u80fd\u5dee\u5f02\u4ec51.2\u4e2a\u767e\u5206\u70b9\uff09\uff0c\u751a\u81f3\u4e0e\u4efb\u52a1\u65e0\u5173\u7684\u5185\u5bb9\u6548\u679c\u76f8\u5f53\uff0c\u4e0d\u5efa\u8bae\u5c06\u5176\u4f5c\u4e3a\u9ed8\u8ba4\u63d0\u793a\u7b56\u7565\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Time series classification (TSC) is dominated by a two-stage paradigm: train a feature encoder -- either from scratch on the target dataset or via pretraining on large corpora -- and then fit a task-specific classifier on top. While effective, this decoupling optimizes representation learning independently of the classification objective, requires per-dataset training, and prevents the model from exploiting label information during inference. We introduce TimEE, a 4.5M-parameter foundation model for end-to-end TSC via in-context learning. Given a labeled support set and a query time series, TimEE directly outputs a predicted class distribution in a single forward pass with no per-dataset training required. Following the prior-data fitted network (PFN) framework, TimEE is meta-trained exclusively on synthetic TSC tasks, where each task contains time series with distinct class identities arising from structured distributional shifts in the generative process. Despite seeing no real time series during pre-training, TimEE ranks first in ROC AUC (and third on accuracy) on the UCR benchmark among all compared methods, which include both foundation models and supervised deep learning baselines. To our knowledge, TimEE is the first purely synthetic-pretrained model to reach state-of-the-art performance on the UCR benchmark. These results establish end-to-end ICL with synthetic priors as a compelling, largely unexplored direction for TSC, with scaling, prior design, and richer generation mechanisms as natural avenues for improvement. Code is publicly available at http://github.com/automl/timee.", "arxiv_id": "2607.07500", "arxiv_url": "https://arxiv.org/abs/2607.07500", "authors": ["Jaris K\u00fcken", "Shi Bin Hoo", "Martin Mr\u00e1z", "Frank Hutter", "Lennart Purucker"], "brief": "\u63d0\u51faTimEE\uff0c\u4e00\u4e2a450\u4e07\u53c2\u6570\u7684\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b\u57fa\u7840\u6a21\u578b\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u5b66\u4e60\u5b9e\u73b0\u7aef\u5230\u7aef\u5206\u7c7b\uff0c\u65e0\u9700\u9488\u5bf9\u6bcf\u4e2a\u6570\u636e\u96c6\u8bad\u7ec3\u3002\u6a21\u578b\u4ec5\u5728\u5408\u6210\u6570\u636e\u4e0a\u9884\u8bad\u7ec3\uff0c\u5728UCR\u57fa\u51c6\u6d4b\u8bd5\u4e2dROC AUC\u6392\u540d\u7b2c\u4e00\uff0c\u662f\u9996\u4e2a\u7eaf\u5408\u6210\u9884\u8bad\u7ec3\u8fbe\u5230SOTA\u7684\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b\u6a21\u578b\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07500", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u57fa\u7840\u6a21\u578b", "\u5408\u6210\u6570\u636e\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07500v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "TimEE: End-to-end Time Series Classification via In-Context Learning", "tldr": "\u63d0\u51faTimEE\uff0c\u4e00\u4e2a450\u4e07\u53c2\u6570\u7684\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b\u57fa\u7840\u6a21\u578b\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u5b66\u4e60\u5b9e\u73b0\u7aef\u5230\u7aef\u5206\u7c7b\uff0c\u65e0\u9700\u9488\u5bf9\u6bcf\u4e2a\u6570\u636e\u96c6\u8bad\u7ec3\u3002\u6a21\u578b\u4ec5\u5728\u5408\u6210\u6570\u636e\u4e0a\u9884\u8bad\u7ec3\uff0c\u5728UCR\u57fa\u51c6\u6d4b\u8bd5\u4e2dROC AUC\u6392\u540d\u7b2c\u4e00\uff0c\u662f\u9996\u4e2a\u7eaf\u5408\u6210\u9884\u8bad\u7ec3\u8fbe\u5230SOTA\u7684\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Testing is a major effort for the gaming industry, requiring a significant part of development budget and people power. We present a case study on a development version of the ice hockey game EA SPORTS NHL 26, for which human playtesters test the goalie AI for behavioral exploits. To reduce the effort of re-testing the goalie AI after every game or behavior modification in the development phase, we propose Reward-Adaptive Iterative Discovery (RAID), a novel approach to automatically find exploits using an iterative Reinforcement Learning (RL) approach that trains a population of goal scoring agents. While previous approaches can already successfully find exploits, RL algorithms tend to overfit to a single solution. We introduce a simple extension on top of existing RL algorithms, such that they find multiple diverse high-quality solutions. For our first deployment of this approach, within a single experiment we were able to find six hockey scoring exploit strategies that were qualitatively similar to those that playtesters had found in hours-long manual testing sessions.", "arxiv_id": "2607.07498", "arxiv_url": "https://arxiv.org/abs/2607.07498", "authors": ["Florian Fuchs", "Jessy Gosselin-Grant", "Boris Skuin", "Michele Petteni", "Alessandro Sestini", "Joakim Bergdahl", "Amir Baghi", "Linus Gissl\u00e9n"], "brief": "\u63d0\u51faRAID\u65b9\u6cd5\uff0c\u5229\u7528\u8fed\u4ee3\u5f3a\u5316\u5b66\u4e60\u81ea\u52a8\u53d1\u73b0\u6e38\u620fAI\u7684\u884c\u4e3a\u6f0f\u6d1e\uff0c\u5e94\u7528\u4e8eEA SPORTS NHL 26\u51b0\u7403\u6e38\u620f\u5b88\u95e8\u5458AI\u6d4b\u8bd5\u3002\u901a\u8fc7\u8bad\u7ec3\u591a\u6837\u5316\u7684\u8fdb\u7403\u667a\u80fd\u4f53\u79cd\u7fa4\uff0c\u5728\u5355\u6b21\u5b9e\u9a8c\u4e2d\u627e\u52306\u79cd\u4e0e\u4eba\u5de5\u6d4b\u8bd5\u5458\u76f8\u5f53\u7684\u6f0f\u6d1e\u7b56\u7565\uff0c\u5927\u5e45\u51cf\u5c11\u91cd\u590d\u6d4b\u8bd5\u5de5\u4f5c\u91cf\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07498", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u6e38\u620f\u6d4b\u8bd5", "\u667a\u80fd\u4f53", "\u591a\u6837\u6027\u641c\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07498v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Reward-Adaptive Iterative Discovery: A Case Study on Automated Game Testing for NHL26", "tldr": "\u63d0\u51faRAID\u65b9\u6cd5\uff0c\u5229\u7528\u8fed\u4ee3\u5f3a\u5316\u5b66\u4e60\u81ea\u52a8\u53d1\u73b0\u6e38\u620fAI\u7684\u884c\u4e3a\u6f0f\u6d1e\uff0c\u5e94\u7528\u4e8eEA SPORTS NHL 26\u51b0\u7403\u6e38\u620f\u5b88\u95e8\u5458AI\u6d4b\u8bd5\u3002\u901a\u8fc7\u8bad\u7ec3\u591a\u6837\u5316\u7684\u8fdb\u7403\u667a\u80fd\u4f53\u79cd\u7fa4\uff0c\u5728\u5355\u6b21\u5b9e\u9a8c\u4e2d\u627e\u52306\u79cd\u4e0e\u4eba\u5de5\u6d4b\u8bd5\u5458\u76f8\u5f53\u7684\u6f0f\u6d1e\u7b56\u7565\uff0c\u5927\u5e45\u51cf\u5c11\u91cd\u590d\u6d4b\u8bd5\u5de5\u4f5c\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Machine learning models are increasingly deployed in high-stakes domains, raising concerns about both privacy and fairness. Differential Privacy (DP) has become a gold standard for privacy-preserving data analysis, while fairness-aware mechanisms aim to mitigate discrimination against underrepresented groups. However, these objectives can conflict: DP often amplifies disparities across demographic groups, and little is known about whether established fairness interventions remain effective under DP constraints. In this work, we present, to our knowledge, the first systematic evaluation of fairness interventions on differentially private synthetic tabular data. Our benchmark centers on the Adaptive Iterative Mechanism (AIM), identified as the state-of-the-art marginal-based DP synthesizer (Cormode et al. 2025). We thus evaluate fairness interventions across four datasets, multiple group fairness metrics, and three categories of mitigation strategies (pre-processing, in-processing, and post-processing) under a wide range of privacy budgets. We compare four pipeline configurations: (Baseline) training on original data; (DP-only) training on DP synthetic data; (Fair-only) applying fairness mechanisms on original data; and (DP+Fair) combining fairness mechanisms with DP synthetic data. Our results demonstrate that while DP alone can degrade both utility and fairness, applying fairness interventions can partially restore equitable outcomes. Among them, post-processing methods tend to provide more stable fairness-utility trade-offs across privacy budgets and synthesizers, achieving strong fairness improvements while preserving competitive utility relative to other intervention stages. We release all code, data, and experimental artifacts in an open-source repository to ensure full reproducibility and to support future research on the privacy-fairness-utility trade-off.", "arxiv_id": "2607.07471", "arxiv_url": "https://arxiv.org/abs/2607.07471", "authors": ["Vin\u00edcius Gabriel Angelozzi", "H\u00e9ber H. Arcolezi"], "brief": "\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u8bc4\u4f30\u4e86\u5dee\u5206\u9690\u79c1\u5408\u6210\u8868\u683c\u6570\u636e\u4e0a\u516c\u5e73\u6027\u5e72\u9884\u65b9\u6cd5\u7684\u6548\u679c\uff0c\u57fa\u51c6\u6d4b\u8bd5\u6db5\u76d6\u56db\u4e2a\u6570\u636e\u96c6\u3001\u591a\u79cd\u516c\u5e73\u6027\u6307\u6807\u548c\u4e09\u7c7b\u7f13\u89e3\u7b56\u7565\uff08\u9884\u5904\u7406\u3001\u5904\u7406\u4e2d\u3001\u540e\u5904\u7406\uff09\u3002\u7ed3\u679c\u8868\u660e\u5dee\u5206\u9690\u79c1\u4f1a\u635f\u5bb3\u516c\u5e73\u6027\uff0c\u4f46\u540e\u5904\u7406\u65b9\u6cd5\u5728\u4e0d\u540c\u9690\u79c1\u9884\u7b97\u4e0b\u80fd\u63d0\u4f9b\u6700\u7a33\u5b9a\u7684\u516c\u5e73\u6027-\u6548\u7528\u6743\u8861\u3002", "categories": ["cs.LG", "cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07471", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5dee\u5206\u9690\u79c1", "\u516c\u5e73\u6027\u5b66\u4e60", "\u5408\u6210\u6570\u636e", "\u9690\u79c1\u4fdd\u62a4"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07471v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Where to Intervene? Benchmarking Fairness-Aware Learning on Differentially Private Synthetic Tabular Data", "tldr": "\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u8bc4\u4f30\u4e86\u5dee\u5206\u9690\u79c1\u5408\u6210\u8868\u683c\u6570\u636e\u4e0a\u516c\u5e73\u6027\u5e72\u9884\u65b9\u6cd5\u7684\u6548\u679c\uff0c\u57fa\u51c6\u6d4b\u8bd5\u6db5\u76d6\u56db\u4e2a\u6570\u636e\u96c6\u3001\u591a\u79cd\u516c\u5e73\u6027\u6307\u6807\u548c\u4e09\u7c7b\u7f13\u89e3\u7b56\u7565\uff08\u9884\u5904\u7406\u3001\u5904\u7406\u4e2d\u3001\u540e\u5904\u7406\uff09\u3002\u7ed3\u679c\u8868\u660e\u5dee\u5206\u9690\u79c1\u4f1a\u635f\u5bb3\u516c\u5e73\u6027\uff0c\u4f46\u540e\u5904\u7406\u65b9\u6cd5\u5728\u4e0d\u540c\u9690\u79c1\u9884\u7b97\u4e0b\u80fd\u63d0\u4f9b\u6700\u7a33\u5b9a\u7684\u516c\u5e73\u6027-\u6548\u7528\u6743\u8861\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Fine-tuning large language models (LLMs) for e-commerce attribute extraction requires labeled data representative across thousands of product types, attributes, and multiple languages. This combinatorial scale translates to millions of annotations, rendering human labeling prohibitively costly. While recent work has demonstrated synthetic label generation using LLMs, deploying such approaches at industrial scale requires integrated quality control mechanisms. We present SynthAVE, a large-scale human-validated benchmark for attribute value extraction spanning 12,726 products across 229 product types, 792 attributes, and 4 languages (Spanish, French, Italian, German). To validate synthetic labels at scale, we introduce a multi-LLM arena framework where samples are independently evaluated by 21 judge configurations (7 model families $\\times$ 3 prompts), with final labels determined via majority voting. The majority vote ensemble agrees with human experts at Cohen\u0027s $\u03ba= 0.92$ (95.2% agreement), while individual judges show substantial inter-model agreement (Fleiss\u0027 $\u03ba= 0.76$). This demonstrates that diverse models with varying individual judgments aggregate into highly reliable predictions, enabling cost-effective validation at scale while maintaining quality parity with human review.", "arxiv_id": "2607.07469", "arxiv_url": "https://arxiv.org/abs/2607.07469", "authors": ["Andrea Scarinci", "Virginia Negri", "Brayan Impata", "Suleiman Khan", "Victor Martinez", "Marcello Federico"], "brief": "\u63d0\u51faSynthAVE\u6846\u67b6\uff0c\u7528\u4e8e\u7535\u5546\u5c5e\u6027\u503c\u63d0\u53d6\u7684\u5927\u89c4\u6a21\u5408\u6210\u6807\u6ce8\uff0c\u901a\u8fc721\u79cdLLM\u8bc4\u5224\u914d\u7f6e\u7684\u591a\u6a21\u578b\u7ade\u6280\u573a\u8fdb\u884c\u8d28\u91cf\u9a8c\u8bc1\u3002\u591a\u6570\u6295\u7968\u96c6\u6210\u4e0e\u4eba\u7c7b\u4e13\u5bb6\u7684Cohen\u0027s \u03ba=0.92\uff0c\u5728\u4fdd\u6301\u6807\u6ce8\u8d28\u91cf\u7684\u540c\u65f6\u5927\u5e45\u964d\u4f4e\u4eba\u5de5\u6807\u6ce8\u6210\u672c\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07469", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5408\u6210\u6570\u636e\u6807\u6ce8", "\u7535\u5546\u4fe1\u606f\u62bd\u53d6", "\u8d28\u91cf\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07469v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SynthAVE: Scalable Synthetic Labeling for E-Commerce with LLM-Arena Validation", "tldr": "\u63d0\u51faSynthAVE\u6846\u67b6\uff0c\u7528\u4e8e\u7535\u5546\u5c5e\u6027\u503c\u63d0\u53d6\u7684\u5927\u89c4\u6a21\u5408\u6210\u6807\u6ce8\uff0c\u901a\u8fc721\u79cdLLM\u8bc4\u5224\u914d\u7f6e\u7684\u591a\u6a21\u578b\u7ade\u6280\u573a\u8fdb\u884c\u8d28\u91cf\u9a8c\u8bc1\u3002\u591a\u6570\u6295\u7968\u96c6\u6210\u4e0e\u4eba\u7c7b\u4e13\u5bb6\u7684Cohen\u0027s \u03ba=0.92\uff0c\u5728\u4fdd\u6301\u6807\u6ce8\u8d28\u91cf\u7684\u540c\u65f6\u5927\u5e45\u964d\u4f4e\u4eba\u5de5\u6807\u6ce8\u6210\u672c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Spatial and Single-cell transcriptomics are transformative in deciphering cellular dynamics. As the fundamental paradigm for reconstructing cell developmental paths, trajectory inference (TI) is critical. However, existing methods require extensive manual intervention and proficiency in heterogeneous tools, posing a significant barrier to efficient TI analysis. To bridge this gap, we propose SpaCellAgent, an autonomous large language model (LLM) multi-agent framework that automates end-to-end spatiotemporal analysis and narrative generation. SpaCellAgent utilizes a multi-agent architecture for strategic workflow planning, a dynamic tool-orchestration engine for adaptive algorithm selection, and a self-evolution module that iteratively refines performance through feedback. We evaluate SpaCellAgent on six heterogeneous datasets encompassing complex temporal developmental trajectories, diverse sequencing platforms, and spatially-resolved tissue architectures. SpaCellAgent consistently demonstrates over 40\\% improvement in analytical efficiency while maintaining expert-aligned performance. By converting natural language specifications into optimized analytical workflows and fully automating the pipeline, SpaCellAgent democratizes advanced spatiotemporal modeling and establishes a scalable, agent-driven paradigm for computational biology. The code and materials are available at https://github.com/LittleXH-shw/SpaCellAgent.", "arxiv_id": "2607.07467", "arxiv_url": "https://arxiv.org/abs/2607.07467", "authors": ["Songhan Wang", "Haoang Chi", "He Li", "Zhiheng Zhang", "Jiayan Yuan", "Cheems Wang", "Hao Peng", "Xinwang Liu", "Wenjing Yang"], "brief": "\u63d0\u51faSpaCellAgent\uff0c\u4e00\u4e2a\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u7684\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u7528\u4e8e\u81ea\u52a8\u5316\u7a7a\u95f4\u548c\u5355\u7ec6\u80de\u8f6c\u5f55\u7ec4\u5b66\u4e2d\u7684\u8f68\u8ff9\u63a8\u65ad\u5206\u6790\u3002\u8be5\u6846\u67b6\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u3001\u52a8\u6001\u5de5\u5177\u7f16\u6392\u548c\u81ea\u8fdb\u5316\u6a21\u5757\uff0c\u5c06\u81ea\u7136\u8bed\u8a00\u6307\u4ee4\u8f6c\u5316\u4e3a\u4f18\u5316\u7684\u5206\u6790\u6d41\u7a0b\uff0c\u5728\u516d\u4e2a\u5f02\u6784\u6570\u636e\u96c6\u4e0a\u5b9e\u73b0\u8d85\u8fc740%\u7684\u5206\u6790\u6548\u7387\u63d0\u5347\uff0c\u540c\u65f6\u4fdd\u6301\u4e13\u5bb6\u7ea7\u6027\u80fd\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07467", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5355\u7ec6\u80de\u8f6c\u5f55\u7ec4\u5b66", "\u8ba1\u7b97\u751f\u7269\u5b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07467v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SpaCellAgent: A Self-Evolving LLM-Based Multi-Agent Framework for Trajectory Analysis", "tldr": "\u63d0\u51faSpaCellAgent\uff0c\u4e00\u4e2a\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u7684\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u7528\u4e8e\u81ea\u52a8\u5316\u7a7a\u95f4\u548c\u5355\u7ec6\u80de\u8f6c\u5f55\u7ec4\u5b66\u4e2d\u7684\u8f68\u8ff9\u63a8\u65ad\u5206\u6790\u3002\u8be5\u6846\u67b6\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u3001\u52a8\u6001\u5de5\u5177\u7f16\u6392\u548c\u81ea\u8fdb\u5316\u6a21\u5757\uff0c\u5c06\u81ea\u7136\u8bed\u8a00\u6307\u4ee4\u8f6c\u5316\u4e3a\u4f18\u5316\u7684\u5206\u6790\u6d41\u7a0b\uff0c\u5728\u516d\u4e2a\u5f02\u6784\u6570\u636e\u96c6\u4e0a\u5b9e\u73b0\u8d85\u8fc740%\u7684\u5206\u6790\u6548\u7387\u63d0\u5347\uff0c\u540c\u65f6\u4fdd\u6301\u4e13\u5bb6\u7ea7\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Logical Multi-Hop Query Answering over Knowledge Graphs (KGs) can be formulated as querying, with an implicit completeness assumption. Current works mainly focus on Existential First Order Logic (EFO) queries. These EFO queries contain conjunction, disjunction, and negation operators. Most existing works employ transductive reasoning, meaning they are not capable of reasoning over entities unseen during training. In the real world, there is a resource scarcity, and we cannot train a model with all the nodes of a large KG. Hence, we propose InductWave, a wavelet-based inductive embedding method for logical query answering on large KGs. Here, the training graph consists of fewer nodes than the test graph. Our model performs on par with the baseline models while having half the number of message-passing layers. It outperforms all of them in most cases, with 75% of the layers. These fewer resource requirements enable us to evaluate InductWave on massive graphs, such as Wiki-KG. We test our model using extensive experiments across varying train-test graph proportions of the FB15k-(237) dataset, comparing it with the state-of-the-art models. The code and datasets for the model are available at https://github.com/kracr/inductwave/.", "arxiv_id": "2607.07422", "arxiv_url": "https://arxiv.org/abs/2607.07422", "authors": ["Mayank Kharbanda", "Michael Cochez", "Rajiv Ratn Shah", "Raghava Mutharaju"], "brief": "\u63d0\u51faInductWave\uff0c\u4e00\u79cd\u57fa\u4e8e\u5c0f\u6ce2\u7684\u5f52\u7eb3\u5f0f\u5d4c\u5165\u65b9\u6cd5\uff0c\u7528\u4e8e\u77e5\u8bc6\u56fe\u8c31\u4e0a\u7684\u591a\u8df3\u903b\u8f91\u67e5\u8be2\u56de\u7b54\u3002\u8be5\u65b9\u6cd5\u652f\u6301\u5bf9\u8bad\u7ec3\u65f6\u672a\u89c1\u5b9e\u4f53\u7684\u63a8\u7406\uff08\u5f52\u7eb3\u63a8\u7406\uff09\uff0c\u5728\u51cf\u5c11\u6d88\u606f\u4f20\u9012\u5c42\u6570\uff08\u4ec5\u970075%\u5c42\u6570\uff09\u7684\u60c5\u51b5\u4e0b\u4ecd\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u6a21\u578b\uff0c\u5e76\u80fd\u6269\u5c55\u5230Wiki-KG\u7b49\u5927\u89c4\u6a21\u56fe\u8c31\u3002", "categories": ["cs.AI", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07422", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u77e5\u8bc6\u56fe\u8c31", "\u903b\u8f91\u67e5\u8be2", "\u5f52\u7eb3\u63a8\u7406", "\u56fe\u795e\u7ecf\u7f51\u7edc"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07422v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "InductWave: Inductive Multi-Hop Logical Query Answering on Knowledge Graphs", "tldr": "\u63d0\u51faInductWave\uff0c\u4e00\u79cd\u57fa\u4e8e\u5c0f\u6ce2\u7684\u5f52\u7eb3\u5f0f\u5d4c\u5165\u65b9\u6cd5\uff0c\u7528\u4e8e\u77e5\u8bc6\u56fe\u8c31\u4e0a\u7684\u591a\u8df3\u903b\u8f91\u67e5\u8be2\u56de\u7b54\u3002\u8be5\u65b9\u6cd5\u652f\u6301\u5bf9\u8bad\u7ec3\u65f6\u672a\u89c1\u5b9e\u4f53\u7684\u63a8\u7406\uff08\u5f52\u7eb3\u63a8\u7406\uff09\uff0c\u5728\u51cf\u5c11\u6d88\u606f\u4f20\u9012\u5c42\u6570\uff08\u4ec5\u970075%\u5c42\u6570\uff09\u7684\u60c5\u51b5\u4e0b\u4ecd\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u6a21\u578b\uff0c\u5e76\u80fd\u6269\u5c55\u5230Wiki-KG\u7b49\u5927\u89c4\u6a21\u56fe\u8c31\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "While whole-body multimodal medical imaging scanners have been increasingly recognized for more effective medical applications, the excessive long acquisition time in PET-MR scanning is a major obstacle in more efficient clinical practice. Deep learning-based MRI translation provides a potential solution to reduce scan duration. However, current models often focus on specific anatomical regions and face challenges for whole-body scans that consists of highly heterogeneous feature distributions mainly due to (1) different anatomical regions across whole-body, and (2) lesions or pathological tissues. This paper tackles the challenges through a novel Heterogeneity-Adaptive Diffusion Schrodinger Bridge (HA-DSB) framework. By explicitly modeling translation as stochastic transport between source and target distributions, HA-DSB incorporates region context embeddings derived from a vision-language model (VLM) to enable region-specific modeling. To enhance fidelity of the pathological tissue, lesion-aware metabolic prior from PET is integrated directly into the bridge dynamics through a dual-stage guidance mechanism. Specifically, a PET-guided noise modulation module adaptively scales spatial diffusion perturbations during the forward process, while PET features are leveraged during the reverse process to selectively amplify lesion-relevant structures via an attention mechanism. Experiments demonstrate the superiority of our method across different body regions in whole-body MRI translation and show improved translation quality in lesion areas under PET guidance. Our code is available at Github.", "arxiv_id": "2607.07401", "arxiv_url": "https://arxiv.org/abs/2607.07401", "authors": ["Chengbo Wang", "Jiacheng Yu", "Linjie Bian", "Ming Qi", "Xiaosheng Liu", "Tongtong Che", "Jichang Zhang", "Shuyu Li", "Shaoli Song", "Xiuying Wang"], "brief": "\u63d0\u51faHA-DSB\u6846\u67b6\uff0c\u5229\u7528\u6269\u6563\u859b\u5b9a\u8c14\u6865\u89e3\u51b3\u5168\u8eabPET\u5f15\u5bfcMRI\u5408\u6210\u4e2d\u7684\u5f02\u8d28\u6027\u6311\u6218\u3002\u901a\u8fc7\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u63d0\u4f9b\u533a\u57df\u4e0a\u4e0b\u6587\u5d4c\u5165\u5b9e\u73b0\u533a\u57df\u81ea\u9002\u5e94\u5efa\u6a21\uff0c\u5e76\u8bbe\u8ba1\u53cc\u9636\u6bb5PET\u5f15\u5bfc\u673a\u5236\u589e\u5f3a\u75c5\u7076\u533a\u57df\u7684\u7ffb\u8bd1\u4fdd\u771f\u5ea6\uff0c\u5728\u5168\u8eab\u591a\u533a\u57dfMRI\u5408\u6210\u4efb\u52a1\u4e0a\u53d6\u5f97\u4f18\u8d8a\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07401", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u533b\u5b66\u56fe\u50cf\u5408\u6210", "\u591a\u6a21\u6001", "PET-MRI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07401v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Heterogeneity-Adaptive Diffusion Schrodinger Bridge for PET-Guided Whole-Body MRI Translation", "tldr": "\u63d0\u51faHA-DSB\u6846\u67b6\uff0c\u5229\u7528\u6269\u6563\u859b\u5b9a\u8c14\u6865\u89e3\u51b3\u5168\u8eabPET\u5f15\u5bfcMRI\u5408\u6210\u4e2d\u7684\u5f02\u8d28\u6027\u6311\u6218\u3002\u901a\u8fc7\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u63d0\u4f9b\u533a\u57df\u4e0a\u4e0b\u6587\u5d4c\u5165\u5b9e\u73b0\u533a\u57df\u81ea\u9002\u5e94\u5efa\u6a21\uff0c\u5e76\u8bbe\u8ba1\u53cc\u9636\u6bb5PET\u5f15\u5bfc\u673a\u5236\u589e\u5f3a\u75c5\u7076\u533a\u57df\u7684\u7ffb\u8bd1\u4fdd\u771f\u5ea6\uff0c\u5728\u5168\u8eab\u591a\u533a\u57dfMRI\u5408\u6210\u4efb\u52a1\u4e0a\u53d6\u5f97\u4f18\u8d8a\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reliable confidence estimation remains a key limitation of test-time adaptation in vision-language models (VLMs), where prompt tuning improves zero-shot accuracy but often degrades calibration due to entropy-driven overconfidence. Prior approaches mitigate this using LLM-derived class attributes and contrastive regularization, yet treat attributes independently, ignoring their relational structure. We propose ARGTCA, which represents (class, attribute) pairs as nodes in a Symbolic Attribute Graph and trains a Graph Attention Network (GAT) using contrastive objectives to produce structurally informed embeddings that capture inter-attribute dependencies. We introduce two attribute selection strategies: ARGTCA-DIV for intra-class diversity and ARGTCA-DISC for inter-class discrimination. Experiments across nine benchmarks show that ARGTCA-DIV reduces average Expected Calibration Error (ECE) by approximately ~37% over baselines, while ARGTCA-DISC consistently performs as the second-best variant, reducing average ECE by approximately ~17% over baselines. These results suggest that modeling symbolic attribute interactions provides a principled approach for reliable test-time adaptation in VLMs.", "arxiv_id": "2607.07395", "arxiv_url": "https://arxiv.org/abs/2607.07395", "authors": ["Tanay Sodha", "Aditya Sharma", "Ramya Hebbalaguppe", "Vinti Agarwal", "Pranav Murthy Yeluripaty"], "brief": "\u9488\u5bf9\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u6d4b\u8bd5\u65f6\u9002\u5e94\u4e2d\u7684\u7f6e\u4fe1\u5ea6\u6821\u51c6\u95ee\u9898\uff0c\u63d0\u51faARGTCA\u65b9\u6cd5\uff0c\u5c06\u7c7b\u522b-\u5c5e\u6027\u5bf9\u6784\u5efa\u4e3a\u7b26\u53f7\u5c5e\u6027\u56fe\u5e76\u8bad\u7ec3\u56fe\u6ce8\u610f\u529b\u7f51\u7edc\uff0c\u6355\u6349\u5c5e\u6027\u95f4\u5173\u7cfb\u7ed3\u6784\u3002\u57289\u4e2a\u57fa\u51c6\u4e0a\uff0cARGTCA-DIV\u53d8\u4f53\u5c06\u671f\u671b\u6821\u51c6\u8bef\u5dee\u5e73\u5747\u964d\u4f4e\u7ea637%\uff0c\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07395", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u7f6e\u4fe1\u5ea6\u6821\u51c6", "\u56fe\u795e\u7ecf\u7f51\u7edc", "\u63d0\u793a\u8c03\u4f18"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07395v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "When Prompts Ignore Structure: Graph-Based Attribute Reasoning for Calibrated VLMs", "tldr": "\u9488\u5bf9\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u6d4b\u8bd5\u65f6\u9002\u5e94\u4e2d\u7684\u7f6e\u4fe1\u5ea6\u6821\u51c6\u95ee\u9898\uff0c\u63d0\u51faARGTCA\u65b9\u6cd5\uff0c\u5c06\u7c7b\u522b-\u5c5e\u6027\u5bf9\u6784\u5efa\u4e3a\u7b26\u53f7\u5c5e\u6027\u56fe\u5e76\u8bad\u7ec3\u56fe\u6ce8\u610f\u529b\u7f51\u7edc\uff0c\u6355\u6349\u5c5e\u6027\u95f4\u5173\u7cfb\u7ed3\u6784\u3002\u57289\u4e2a\u57fa\u51c6\u4e0a\uff0cARGTCA-DIV\u53d8\u4f53\u5c06\u671f\u671b\u6821\u51c6\u8bef\u5dee\u5e73\u5747\u964d\u4f4e\u7ea637%\uff0c\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Mathematical reasoning benchmarks typically provide all facts needed to solve each problem, while interactive benchmarks often mix reasoning with tools, retrieval, and long-horizon dialogue. We introduce MIRA-Math, a benchmark for a narrower diagnostic capability: solving mathematical problems whose full latent state has a unique answer, but whose solver-facing view is missing exactly one necessary atomic fact. The solver must request the missing information in natural language under a strict budget and then integrate the returned fact into an exact final answer. A fixed constrained LLM responder sees only the dataset-provided atomic fact and must either offer the quoted fact when the request matches it, or decline otherwise. Thus, instance generation, typed hint specifications, validation, and final-answer verification are deterministic, while request metrics are measured under a fixed LLM-mediated responder channel. MIRA-Math contains 2{,}310 generated instances from 22 typed mathematical families spanning algebra, probability, linear systems, discrete structures, signal processing, Markov chains, circuits, interpolation, and numerical boundary-value problems. Experiments across frontier and small models show that request success and final-answer accuracy are separable: models may ask for the right fact yet fail the downstream computation, or fail before obtaining the canonical hint. We release generators, verifiers, prompts, run metadata, and dataset documentation to support reproducible evaluation of minimal information requesting in mathematical reasoning.", "arxiv_id": "2607.07391", "arxiv_url": "https://arxiv.org/abs/2607.07391", "authors": ["Charbel Al Bateh", "Samer Saab"], "brief": "\u63d0\u51faMIRA-Math\u57fa\u51c6\uff0c\u4e13\u95e8\u6d4b\u8bd5\u6a21\u578b\u5728\u6570\u5b66\u63a8\u7406\u4e2d\u300c\u6070\u597d\u7f3a\u5c11\u4e00\u4e2a\u5173\u952e\u4e8b\u5b9e\u300d\u65f6\u7684\u4fe1\u606f\u8bf7\u6c42\u80fd\u529b\uff1a\u6a21\u578b\u9700\u7528\u81ea\u7136\u8bed\u8a00\u8bf7\u6c42\u7f3a\u5931\u4fe1\u606f\uff0c\u518d\u6574\u5408\u8fd4\u56de\u7684\u4e8b\u5b9e\u7ed9\u51fa\u7cbe\u786e\u7b54\u6848\u3002\u5b9e\u9a8c\u53d1\u73b0\u8bf7\u6c42\u6210\u529f\u7387\u4e0e\u6700\u7ec8\u7b54\u6848\u51c6\u786e\u7387\u662f\u53ef\u5206\u79bb\u7684\uff0c\u6a21\u578b\u53ef\u80fd\u95ee\u5bf9\u4e86\u95ee\u9898\u5374\u7b97\u9519\u7b54\u6848\uff0c\u63ed\u793a\u4e86\u4e24\u79cd\u72ec\u7acb\u7684\u80fd\u529b\u74f6\u9888\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07391", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u6570\u5b66\u63a8\u7406", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4ea4\u4e92\u5f0f\u95ee\u7b54"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07391v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MIRA-Math: A Benchmark for Minimal Information Requesting and Mathematical Reasoning", "tldr": "\u63d0\u51faMIRA-Math\u57fa\u51c6\uff0c\u4e13\u95e8\u6d4b\u8bd5\u6a21\u578b\u5728\u6570\u5b66\u63a8\u7406\u4e2d\u300c\u6070\u597d\u7f3a\u5c11\u4e00\u4e2a\u5173\u952e\u4e8b\u5b9e\u300d\u65f6\u7684\u4fe1\u606f\u8bf7\u6c42\u80fd\u529b\uff1a\u6a21\u578b\u9700\u7528\u81ea\u7136\u8bed\u8a00\u8bf7\u6c42\u7f3a\u5931\u4fe1\u606f\uff0c\u518d\u6574\u5408\u8fd4\u56de\u7684\u4e8b\u5b9e\u7ed9\u51fa\u7cbe\u786e\u7b54\u6848\u3002\u5b9e\u9a8c\u53d1\u73b0\u8bf7\u6c42\u6210\u529f\u7387\u4e0e\u6700\u7ec8\u7b54\u6848\u51c6\u786e\u7387\u662f\u53ef\u5206\u79bb\u7684\uff0c\u6a21\u578b\u53ef\u80fd\u95ee\u5bf9\u4e86\u95ee\u9898\u5374\u7b97\u9519\u7b54\u6848\uff0c\u63ed\u793a\u4e86\u4e24\u79cd\u72ec\u7acb\u7684\u80fd\u529b\u74f6\u9888\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Adversarial vulnerability in deep neural networks (DNNs) has been studied from the perspectives of decision-boundary geometry, feature robustness, input-output Jacobians, and the instability of inverse problems. Here, we focus on the spectral structure of intermediate linear transformations that propagate information through modern DNNs, an unexplored mechanism of adversarial vulnerability. Specifically, we investigate transformer-based vision-language models, whose linear layers admit interpretable spectral decompositions and whose widespread adoption makes understanding their robustness increasingly important. We propose a white-box spectral-subspace-guided attack (SSGRA) that aligns intermediate representations with the subspace spanned by the bottom right singular vectors. Our experiments show improved attack effectiveness over existing baselines. In addition, SSGRA offers a spectral interpretation of adversarial vulnerability in VLMs, providing insights for improving their robustness.", "arxiv_id": "2607.07375", "arxiv_url": "https://arxiv.org/abs/2607.07375", "authors": ["Chethan Krishnamurthy Ramanaik", "Tobias Callies", "Michael Hecht", "Eirini Ntoutsi"], "brief": "\u7814\u7a76\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u4e2d\u95f4\u7ebf\u6027\u53d8\u6362\u7684\u8c31\u7ed3\u6784\u4e0e\u5bf9\u6297\u8106\u5f31\u6027\u7684\u5173\u7cfb\uff0c\u63d0\u51fa\u57fa\u4e8e\u8c31\u5b50\u7a7a\u95f4\u5f15\u5bfc\u7684\u767d\u76d2\u653b\u51fb\u65b9\u6cd5SSGRA\uff0c\u901a\u8fc7\u5c06\u4e2d\u95f4\u8868\u793a\u5bf9\u9f50\u5230\u6700\u5c0f\u53f3\u5947\u5f02\u5411\u91cf\u5f20\u6210\u7684\u5b50\u7a7a\u95f4\u6765\u5b9e\u65bd\u653b\u51fb\uff0c\u5b9e\u9a8c\u8868\u660e\u653b\u51fb\u6548\u679c\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\uff0c\u5e76\u4e3a\u63d0\u5347VLM\u9c81\u68d2\u6027\u63d0\u4f9b\u4e86\u8c31\u5206\u6790\u89c6\u89d2\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07375", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5bf9\u6297\u653b\u51fb", "\u8c31\u5206\u6790", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07375v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "On Adversarial Vulnerability of Vision-Language Models through the Lens of Intermediate Spectral Subspaces", "tldr": "\u7814\u7a76\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u4e2d\u95f4\u7ebf\u6027\u53d8\u6362\u7684\u8c31\u7ed3\u6784\u4e0e\u5bf9\u6297\u8106\u5f31\u6027\u7684\u5173\u7cfb\uff0c\u63d0\u51fa\u57fa\u4e8e\u8c31\u5b50\u7a7a\u95f4\u5f15\u5bfc\u7684\u767d\u76d2\u653b\u51fb\u65b9\u6cd5SSGRA\uff0c\u901a\u8fc7\u5c06\u4e2d\u95f4\u8868\u793a\u5bf9\u9f50\u5230\u6700\u5c0f\u53f3\u5947\u5f02\u5411\u91cf\u5f20\u6210\u7684\u5b50\u7a7a\u95f4\u6765\u5b9e\u65bd\u653b\u51fb\uff0c\u5b9e\u9a8c\u8868\u660e\u653b\u51fb\u6548\u679c\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\uff0c\u5e76\u4e3a\u63d0\u5347VLM\u9c81\u68d2\u6027\u63d0\u4f9b\u4e86\u8c31\u5206\u6790\u89c6\u89d2\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In embodied intelligence systems, the motion controller serves as the critical bridge between semantic reasoning and physical execution. Humanoid control has progressed rapidly through large-scale human motion-capture data and motion-tracking paradigm. However, producing quadruped robots motion corpora with scalability and physical feasibility faces more fundamental obstacles: animal motion data is scarce, and cross-embodiment retargeting remains fragile. We present ABot-C0, a generalist motion-control system for quadruped robots that establishes three complementary behavior foundations: a scalable multi-source motion-data pipeline, robust policy learning across motion tracking, locomotion, and scene interaction, and a unified deployment stack for reliable real-world operation. Fundamentally, we construct a data pyramid through conditional video-generation synthesis, annotated motion capture, teleoperation and human design, producing 16,074 physically feasible motion clips as the data foundation for various motion learning demands. We then train a Flow-Matching generalist policy that demonstrates for the first time quadruped motion tracking scaling law that its performance improves consistently as training scales up, with zero-shot capability to track unseen motions. Then, we push a step further for robust all-terrain traversal locomotion by adopting a three-stage privileged-to-perceptive framework with temporal LiDAR memory and terrain-predictive supervision. Collectively, these components form a motion generalist that coordinates multi-policy execution, smooth behavior transitions, energy-efficient control, and safety mechanisms for real-world deployment. Extensive experiments on urban-terrain autonomous navigation and companion-style multimodal interaction demonstrate that quadruped robots move beyond single-function demos toward product-level behavioral intelligence.", "arxiv_id": "2607.07370", "arxiv_url": "https://arxiv.org/abs/2607.07370", "authors": ["Xufeng Zhao", "Fuzhi Yang", "Jianhui Chen", "Li Gao", "Zhang Meng", "Jie Gao", "Yao Zheng", "Wenyu Liu", "Menglin Yang", "Minqi Gu", "Yaru Zhao", "Honglin Han", "Shihui Su", "Zixiao Tang", "Liu Liu", "Mu Xu", "Yang Cai", "Wenbin Tang"], "brief": "\u63d0\u51faABot-C0\u56db\u8db3\u673a\u5668\u4eba\u901a\u7528\u8fd0\u52a8\u63a7\u5236\u7cfb\u7edf\uff0c\u901a\u8fc7\u6761\u4ef6\u89c6\u9891\u751f\u6210\u5408\u6210\u7b49\u591a\u6e90\u6570\u636e\u7ba1\u9053\u6784\u5efa16074\u4e2a\u8fd0\u52a8\u7247\u6bb5\u6570\u636e\u96c6\uff0c\u8bad\u7ec3Flow-Matching\u7b56\u7565\u5e76\u9996\u6b21\u9a8c\u8bc1\u56db\u8db3\u8fd0\u52a8\u8ddf\u8e2a\u7684\u7f29\u653e\u5b9a\u5f8b\uff0c\u7ed3\u5408\u4e09\u9636\u6bb5\u7279\u6743-\u611f\u77e5\u6846\u67b6\u5b9e\u73b0\u5168\u5730\u5f62\u9c81\u68d2\u8fd0\u52a8\uff0c\u6700\u7ec8\u5728\u57ce\u5e02\u5bfc\u822a\u548c\u591a\u6a21\u6001\u4ea4\u4e92\u4e2d\u5c55\u73b0\u4ea7\u54c1\u7ea7\u884c\u4e3a\u667a\u80fd\u3002", "categories": ["cs.RO", "cs.AI", "cs.HC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07370", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u56db\u8db3\u673a\u5668\u4eba", "\u8fd0\u52a8\u63a7\u5236", "\u5f3a\u5316\u5b66\u4e60", "\u5177\u8eab\u667a\u80fd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07370v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Behavior Foundations for Quadruped Robots: ABot-C0 Technical Report", "tldr": "\u63d0\u51faABot-C0\u56db\u8db3\u673a\u5668\u4eba\u901a\u7528\u8fd0\u52a8\u63a7\u5236\u7cfb\u7edf\uff0c\u901a\u8fc7\u6761\u4ef6\u89c6\u9891\u751f\u6210\u5408\u6210\u7b49\u591a\u6e90\u6570\u636e\u7ba1\u9053\u6784\u5efa16074\u4e2a\u8fd0\u52a8\u7247\u6bb5\u6570\u636e\u96c6\uff0c\u8bad\u7ec3Flow-Matching\u7b56\u7565\u5e76\u9996\u6b21\u9a8c\u8bc1\u56db\u8db3\u8fd0\u52a8\u8ddf\u8e2a\u7684\u7f29\u653e\u5b9a\u5f8b\uff0c\u7ed3\u5408\u4e09\u9636\u6bb5\u7279\u6743-\u611f\u77e5\u6846\u67b6\u5b9e\u73b0\u5168\u5730\u5f62\u9c81\u68d2\u8fd0\u52a8\uff0c\u6700\u7ec8\u5728\u57ce\u5e02\u5bfc\u822a\u548c\u591a\u6a21\u6001\u4ea4\u4e92\u4e2d\u5c55\u73b0\u4ea7\u54c1\u7ea7\u884c\u4e3a\u667a\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Effective social robot navigation requires sensitivity to human behavior, often revealed through subtle skeletal cues like gait and orientation. We present Human-Aware Implicit Social Robot Navigation (HumAIN), a novel framework that fuses implicit social cues directly into the planning loop via knowledge distillation. We first employ a transformer-based teacher model that fuses rich multi-modal inputs, including historic images, skeletal keypoints, robot state, and a robot\u0027s target goal, to learn robust, human-aware representations for the robot\u0027s future trajectory planning. To enable real-time deployment, we then distill this knowledge into a lightweight student model. By optimizing for both trajectory reconstruction and latent feature alignment with the teacher, the student learns to infer complex social dynamics from mini let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
