51c6\u4e0a\u9a8c\u8bc1\uff0c\u6027\u80fd\u4f18\u4e8e\u73b0\u6709\u8bb0\u5fc6\u589e\u5f3aVLA\u65b9\u6cd5"], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u8bb0\u5fc6\u589e\u5f3a", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07608v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Dual Latent Memory in Vision-Language-Action Models for Robotic Manipulation", "tldr": "LaMem-VLA\u5c06\u5386\u53f2\u7ecf\u9a8c\u91cd\u6784\u4e3a\u6f5c\u5728\u8bb0\u5fc6\u4ee4\u724c\uff0c\u76f4\u63a5\u878d\u5165VLA\u63a8\u7406\u4ee5\u63d0\u5347\u673a\u5668\u4eba\u957f\u65f6\u5e8f\u64cd\u4f5c\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faLaMem-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u5386\u53f2\u7ecf\u9a8c\u7f16\u7801\u4e3a\u77ed\u671f\u548c\u957f\u671f\u6f5c\u5728\u8bb0\u5fc6\u4ee4\u724c\uff0c\u5e76\u4e0e\u5f53\u524d\u89c2\u6d4b\u548c\u6307\u4ee4\u4ea4\u7ec7\u878d\u5408\uff0c\u4f7f\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u80fd\u5728\u7edf\u4e00\u8fde\u7eed\u6f5c\u5728\u7a7a\u95f4\u4e2d\u8fdb\u884c\u8bb0\u5fc6\u589e\u5f3a\u63a8\u7406\u3002", "why_notable": "\u9996\u6b21\u5c06\u5386\u53f2\u8bb0\u5fc6\u539f\u751f\u5d4c\u5165VLA\u7684\u6f5c\u5728\u7a7a\u95f4\u800c\u975e\u4f5c\u4e3a\u5916\u90e8\u4e0a\u4e0b\u6587\u9644\u52a0\uff0c\u7a81\u7834\u4e86\u9a6c\u5c14\u53ef\u592b\u5047\u8bbe\u9650\u5236\uff0c\u5bf9\u957f\u65f6\u5e8f\u4f9d\u8d56\u4efb\u52a1\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Current Vision-Language Models (VLMs) often struggle to handle complex visual tasks that require consistent and fine-grained reasoning. Recent methods aim to train models to facilitate self-reflective reasoning, i.e., reviewing and improving the generated reasoning. However, they require large volumes of annotated data and lack explicit reflective behavior during test time. This work aims to bridge this gap through inspiration from neuroscience. The human brain exhibits efficient backward prediction, i.e., predicting which current states are likely to precede a given future state. In this work, we first verify that mainstream VLMs can perform backward prediction, similar to the human brain. Then, we propose Brain-inspired Unsupervised Self-reflection (BUS), a label-free training framework to enhance reflective reasoning capability in challenging image analysis. BUS enables VLMs to perform backward prediction and provide explicit learning signals on data without ground-truth labels. In this way, BUS eliminates reliance on annotated data while improving reasoning performance. Notably, BUS is compatible with popular fine-tuning methods, such as Supervised Fine-Tuning (SFT) and Reinforcement Learning (RL). Finally, extensive experiments on 8 benchmarks demonstrate the effectiveness of BUS across a wide range of complex visual tasks. It achieves notable improvements over the base model while using only unlabeled training data. Our experimental findings validate that backward prediction capability is critical for VLM reasoning.", "arxiv_id": "2607.07361", "arxiv_url": "https://arxiv.org/abs/2607.07361", "authors": ["Jiacheng Yang", "Tongying Xiao", "Yunkai Dang", "Cong Wang", "Yuekun Yang", "Qi Fan", "Wenbin Li", "Feng Miao", "Yang Gao"], "brief": "\u63d0\u51faBUS\uff08\u8111\u542f\u53d1\u65e0\u76d1\u7763\u81ea\u53cd\u601d\uff09\u6846\u67b6\uff0c\u501f\u9274\u4eba\u8111\u53cd\u5411\u9884\u6d4b\u673a\u5236\uff0c\u8ba9VLM\u5728\u65e0\u6807\u6ce8\u6570\u636e\u4e0a\u81ea\u4e3b\u751f\u6210\u5b66\u4e60\u4fe1\u53f7\uff0c\u5b9e\u73b0\u81ea\u6211\u53cd\u601d\u5f0f\u63a8\u7406\u589e\u5f3a\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07361", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9a8c\u8bc1\u4e3b\u6d41VLM\u5177\u5907\u7c7b\u4f3c\u4eba\u8111\u7684\u53cd\u5411\u9884\u6d4b\u80fd\u529b\uff08\u4ece\u672a\u6765\u72b6\u6001\u63a8\u65ad\u524d\u7f6e\u72b6\u6001\uff09", "\u65e0\u9700\u6807\u6ce8\u6570\u636e\u7684\u6807\u7b7e\u81ea\u7531\u8bad\u7ec3\u6846\u67b6\uff0c\u517c\u5bb9SFT\u548c\u5f3a\u5316\u5b66\u4e60\u7b49\u4e3b\u6d41\u5fae\u8c03\u65b9\u6cd5", "\u57288\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u5747\u53d6\u5f97\u663e\u8457\u63d0\u5347\uff0c\u4ec5\u4f7f\u7528\u65e0\u6807\u7b7e\u8bad\u7ec3\u6570\u636e\u5373\u8d85\u8d8a\u57fa\u7840\u6a21\u578b"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u81ea\u53cd\u601d\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07361v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "BUS: Brain-Inspired Unsupervised Self-Reflection for Advanced Multimodal Reasoning", "tldr": "\u53d7\u795e\u7ecf\u79d1\u5b66\u542f\u53d1\uff0c\u63d0\u51fa\u65e0\u6807\u6ce8\u81ea\u53cd\u601d\u6846\u67b6BUS\uff0c\u901a\u8fc7\u53cd\u5411\u9884\u6d4b\u589e\u5f3a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u63a8\u7406\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faBUS\uff08\u8111\u542f\u53d1\u65e0\u76d1\u7763\u81ea\u53cd\u601d\uff09\u6846\u67b6\uff0c\u501f\u9274\u4eba\u8111\u53cd\u5411\u9884\u6d4b\u673a\u5236\uff0c\u8ba9VLM\u5728\u65e0\u6807\u6ce8\u6570\u636e\u4e0a\u81ea\u4e3b\u751f\u6210\u5b66\u4e60\u4fe1\u53f7\uff0c\u5b9e\u73b0\u81ea\u6211\u53cd\u601d\u5f0f\u63a8\u7406\u589e\u5f3a\u3002", "why_notable": "\u9996\u6b21\u5c06\u795e\u7ecf\u79d1\u5b66\u53cd\u5411\u9884\u6d4b\u673a\u5236\u5f15\u5165VLM\u81ea\u53cd\u601d\u8bad\u7ec3\uff0c\u7a81\u7834\u4e86\u73b0\u6709\u65b9\u6cd5\u4f9d\u8d56\u5927\u91cf\u6807\u6ce8\u6570\u636e\u7684\u74f6\u9888\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u548c\u6cdb\u5316\u6027\u3002"}, {"abstract": "Pose-Free Feed-forward 3D Gaussian Splatting (3DGS) has recently emerged as a powerful paradigm for fast scene reconstruction. However, its performance degrades significantly in long image sequences due to cumulative camera pose estimation drift, which propagates errors into geometric modeling and severely limits rendering fidelity. In this work, we revisit the long-sequence bottleneck and identify pose drift as the primary factor restricting reconstruction quality. Furthermore, while SfM-based pseudo ground-truth poses introduce sensor noise, purely rendering-based supervision often leads to optimization instability and local minima due to the entangled optimization of geometry and pose. To address the challenges, we propose a synergistic pose-free framework that explicitly couples geometry and appearance via a Raymap-Guided Coupling Module (RGC). Concretely, we anchor Gaussian centers to raymap-induced geometry and jointly optimize RGB reconstruction, raymap consistency, and camera regularization under a unified objective, yielding a bidirectional feedback loop: stronger geometry improves rendering, and appearance supervision in turn refines geometry and pose. To further stabilize learning across wide temporal ranges, we introduce a Dual-Frequency Viewpoint Scheduling strategy that combines easy-to-hard interval expansion with replay of short-interval pairs. Extensive experiments across in-domain and cross-domain datasets show consistent gains in both rendering and pose estimation, with notably improved robustness on long sequences. Ablation studies validate our central insight: explicitly designed geometry-appearance synergy is the key to scalable and drift-robust pose-free feed-forward 3D reconstruction.", "arxiv_id": "2607.07168", "arxiv_url": "https://arxiv.org/abs/2607.07168", "authors": ["Xiangyu Sun", "Liu Liu", "Seungkwon Yang", "Jingbing Han", "Seungtae Nam", "Zhizhong Su", "Eunbyung Park"], "brief": "\u63d0\u51faNoDrift3R\uff0c\u4e00\u79cd\u65e0\u4f4d\u59ff\u524d\u99883D\u9ad8\u65af\u6cfc\u6e85\u91cd\u5efa\u6846\u67b6\uff0c\u901a\u8fc7\u5c04\u7ebf\u56fe\u5f15\u5bfc\u8026\u5408\u6a21\u5757\uff08RGC\uff09\u663e\u5f0f\u8026\u5408\u51e0\u4f55\u4e0e\u5916\u89c2\uff0c\u5e76\u7ed3\u5408\u53cc\u9891\u89c6\u70b9\u8c03\u5ea6\u7b56\u7565\uff0c\u6709\u6548\u6291\u5236\u957f\u56fe\u50cf\u5e8f\u5217\u4e2d\u7684\u7d2f\u79ef\u76f8\u673a\u4f4d\u59ff\u6f02\u79fb\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07168", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c04\u7ebf\u56fe\u5f15\u5bfc\u8026\u5408\u6a21\u5757\uff08RGC\uff09\u5c06\u9ad8\u65af\u4e2d\u5fc3\u951a\u5b9a\u5230\u5c04\u7ebf\u56fe\u8bf1\u5bfc\u7684\u51e0\u4f55\u4e0a\uff0c\u8054\u5408\u4f18\u5316RGB\u91cd\u5efa\u3001\u5c04\u7ebf\u56fe\u4e00\u81f4\u6027\u548c\u76f8\u673a\u6b63\u5219\u5316\uff0c\u5f62\u6210\u51e0\u4f55-\u5916\u89c2\u53cc\u5411\u53cd\u9988\u95ed\u73af", "\u53cc\u9891\u89c6\u70b9\u8c03\u5ea6\u7b56\u7565\u7ed3\u5408\u7531\u6613\u5230\u96be\u7684\u533a\u95f4\u6269\u5c55\u4e0e\u77ed\u533a\u95f4\u5bf9\u56de\u653e\uff0c\u7a33\u5b9a\u957f\u65f6\u5e8f\u8303\u56f4\u5185\u7684\u5b66\u4e60\u8fc7\u7a0b", "\u5728\u57df\u5185\u548c\u8de8\u57df\u6570\u636e\u96c6\u4e0a\u5747\u53d6\u5f97\u6e32\u67d3\u8d28\u91cf\u4e0e\u4f4d\u59ff\u4f30\u8ba1\u7684\u4e00\u81f4\u63d0\u5347\uff0c\u957f\u5e8f\u5217\u9c81\u68d2\u6027\u663e\u8457\u6539\u5584"], "keywords": ["3D\u91cd\u5efa", "\u9ad8\u65af\u6cfc\u6e85", "\u4f4d\u59ff\u4f30\u8ba1", "\u591a\u89c6\u56fe"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07168v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "NoDrift3R: Raymap-Guided Coupling for Drift-Robust Unposed Feed-Forward 3D Reconstruction", "tldr": "\u63d0\u51faNoDrift3R\u6846\u67b6\uff0c\u901a\u8fc7\u5c04\u7ebf\u56fe\u5f15\u5bfc\u8026\u5408\u6a21\u5757\u89e3\u51b3\u65e0\u4f4d\u59ff\u524d\u99883D\u91cd\u5efa\u4e2d\u7684\u957f\u5e8f\u5217\u6f02\u79fb\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faNoDrift3R\uff0c\u4e00\u79cd\u65e0\u4f4d\u59ff\u524d\u99883D\u9ad8\u65af\u6cfc\u6e85\u91cd\u5efa\u6846\u67b6\uff0c\u901a\u8fc7\u5c04\u7ebf\u56fe\u5f15\u5bfc\u8026\u5408\u6a21\u5757\uff08RGC\uff09\u663e\u5f0f\u8026\u5408\u51e0\u4f55\u4e0e\u5916\u89c2\uff0c\u5e76\u7ed3\u5408\u53cc\u9891\u89c6\u70b9\u8c03\u5ea6\u7b56\u7565\uff0c\u6709\u6548\u6291\u5236\u957f\u56fe\u50cf\u5e8f\u5217\u4e2d\u7684\u7d2f\u79ef\u76f8\u673a\u4f4d\u59ff\u6f02\u79fb\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u4f4d\u59ff\u6f02\u79fb\u8bc6\u522b\u4e3a\u65e0\u4f4d\u59ff\u524d\u99883DGS\u7684\u6838\u5fc3\u74f6\u9888\uff0c\u5e76\u901a\u8fc7\u663e\u5f0f\u51e0\u4f55-\u5916\u89c2\u534f\u540c\u8bbe\u8ba1\u52a0\u4ee5\u89e3\u51b3\uff0c\u4e3a\u53ef\u6269\u5c55\u7684\u957f\u5e8f\u52173D\u91cd\u5efa\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Large Language Models (LLMs) store factual knowledge and domain-specific patterns implicitly in dense Transformer parameters, making knowledge expansion costly through pretraining, fine-tuning, retrieval augmentation, or longer contexts. Engram-style memory offers a compact hidden-state injection pathway, but existing GPU-resident designs often rely on hash-based compression, causing unrelated phrases to collide in shared slots and weakening phrase-level semantic fidelity. We present TF-Engram, a train-free Engram system that constructs phrase-specific semantic memory offline from external corpora, stores large memory tables across a GPU--DRAM--SSD hierarchy, and uses Early-Exit Guided Predictive Prefetching to hide external-memory latency during autoregressive decoding. On Qwen3-0.6B, TF-Engram improves the average downstream score from 57.6 to 59.4, outperforming both the frozen backbone and a parameter-matched LoRA baseline. System evaluation shows that large TF-Engram tables can be built with moderate offline cost, SSD-backed storage substantially reduces GPU memory demand, and predictive prefetching recovers much of the throughput loss caused by external memory access. These results demonstrate that static phrase memory can be integrated into LLM inference as a scalable, train-free, and low-overhead system component.", "arxiv_id": "2607.07388", "arxiv_url": "https://arxiv.org/abs/2607.07388", "authors": ["Yutang Ma", "Kecheng Huang", "Xikun Jiang", "Zili Shao"], "brief": "TF-Engram\u662f\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684Engram\u5f0f\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u79bb\u7ebf\u4ece\u5916\u90e8\u8bed\u6599\u6784\u5efa\u77ed\u8bed\u7ea7\u8bed\u4e49\u8bb0\u5fc6\uff0c\u901a\u8fc7GPU-DRAM-SSD\u4e09\u7ea7\u5b58\u50a8\u5c42\u7ea7\u7ba1\u7406\u5927\u89c4\u6a21\u8bb0\u5fc6\u8868\uff0c\u5e76\u5229\u7528Early-Exit\u5f15\u5bfc\u7684\u9884\u53d6\u673a\u5236\u964d\u4f4e\u5916\u90e8\u5b58\u50a8\u8bbf\u95ee\u5ef6\u8fdf\uff0c\u5728\u63a8\u7406\u65f6\u6ce8\u5165\u9690\u72b6\u6001\u4ee5\u589e\u5f3aLLM\u77e5\u8bc6\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07388", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u65e0\u9700\u8bad\u7ec3/\u5fae\u8c03\uff1a\u5b8c\u5168\u79bb\u7ebf\u6784\u5efa\u77ed\u8bed\u7ea7\u8bed\u4e49\u8bb0\u5fc6\uff0c\u907f\u514d\u54c8\u5e0c\u78b0\u649e\u5bfc\u81f4\u7684\u8bed\u4e49\u6df7\u6dc6\u95ee\u9898", "\u4e09\u7ea7\u5b58\u50a8\u67b6\u6784\uff08GPU-DRAM-SSD\uff09\u5927\u5e45\u964d\u4f4eGPU\u663e\u5b58\u9700\u6c42\uff0c\u652f\u6301\u8d85\u5927\u89c4\u6a21\u8bb0\u5fc6\u8868", "\u5728Qwen3-0.6B\u4e0a\u5e73\u5747\u4e0b\u6e38\u5f97\u5206\u4ece57.6\u63d0\u5347\u81f359.4\uff0c\u8d85\u8d8a\u51bb\u7ed3\u57fa\u7ebf\u548c\u53c2\u6570\u91cf\u5339\u914d\u7684LoRA\u57fa\u7ebf"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u589e\u5f3a", "\u8bb0\u5fc6\u673a\u5236", "\u63a8\u7406\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07388v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "TF-Engram: A Train-Free Engram with SSD-Backed Memory for Large Language Models", "tldr": "\u65e0\u9700\u8bad\u7ec3\u7684\u77ed\u8bed\u7ea7\u8bed\u4e49\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u901a\u8fc7GPU-DRAM-SSD\u5c42\u7ea7\u5b58\u50a8\u6269\u5c55LLM\u77e5\u8bc6", "upvotes": 0, "what_it_is": "TF-Engram\u662f\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684Engram\u5f0f\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u79bb\u7ebf\u4ece\u5916\u90e8\u8bed\u6599\u6784\u5efa\u77ed\u8bed\u7ea7\u8bed\u4e49\u8bb0\u5fc6\uff0c\u901a\u8fc7GPU-DRAM-SSD\u4e09\u7ea7\u5b58\u50a8\u5c42\u7ea7\u7ba1\u7406\u5927\u89c4\u6a21\u8bb0\u5fc6\u8868\uff0c\u5e76\u5229\u7528Early-Exit\u5f15\u5bfc\u7684\u9884\u53d6\u673a\u5236\u964d\u4f4e\u5916\u90e8\u5b58\u50a8\u8bbf\u95ee\u5ef6\u8fdf\uff0c\u5728\u63a8\u7406\u65f6\u6ce8\u5165\u9690\u72b6\u6001\u4ee5\u589e\u5f3aLLM\u77e5\u8bc6\u80fd\u529b\u3002", "why_notable": "\u63d0\u4f9b\u4e86\u4e00\u79cd\u65e0\u9700\u4efb\u4f55\u68af\u5ea6\u66f4\u65b0\u5373\u53ef\u6269\u5c55LLM\u77e5\u8bc6\u7684\u8f7b\u91cf\u7ea7\u7cfb\u7edf\u65b9\u6848\uff0c\u517c\u987e\u5b58\u50a8\u6548\u7387\u4e0e\u63a8\u7406\u541e\u5410\u91cf\uff0c\u5bf9\u8d44\u6e90\u53d7\u9650\u573a\u666f\u4e0b\u7684\u77e5\u8bc6\u6ce8\u5165\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The key-value (KV) cache dominates the memory cost of long-context autoregressive inference, and a growing body of work compresses it through quantization, eviction, or offloading. We study a complementary question: once a position\u0027s KV state has been quantized to codebook indices, how should the resulting symbol stream be stored, and can the storage layer do more than store? A family of contractive iterated-map codes that serialize a symbol sequence into a sequence of low-dimensional real vectors is revisited, and it is shown that they form a natural archive format for a quantized KV cache with the following features. The method provides exactly the access pattern a growing cache requires. It is lossless, it runs in linear time, and supports O(1) random access and O(1) amortized append. A controlled study of the quantizer feeding this archive is conducted on GPT-2 with 1024-token contexts. Keeping a small exact window (4 attention sinks + 32 recent tokens) and archiving the rest, per-head residual vector quantization reduces the archived cache by 36-54x relative to an fp16 cache at a perplexity cost of 11-15%, and we quantify a sharp key/value asymmetry -- quantizing keys is roughly 4x more damaging than quantizing values, consistent with prior low-bit KV work -- and use it to allocate bits in a hybrid scheme. Finally, we show the archive is simultaneously a search index: approximate substring queries execute directly on the stored vectors, and matched context is decoded from the matched vector without ever materializing the surrounding text. We release all code; every number reproduces from a single command on a laptop CPU.", "arxiv_id": "2607.07144", "arxiv_url": "https://arxiv.org/abs/2607.07144", "authors": ["Vladimir Gusev"], "brief": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u6536\u7f29\u8fed\u4ee3\u6620\u5c04\u7f16\u7801\u7684KV\u7f13\u5b58\u5f52\u6863\u683c\u5f0f\uff0c\u5c06\u91cf\u5316\u540e\u7684KV\u7f13\u5b58\u7b26\u53f7\u6d41\u5e8f\u5217\u5316\u4e3a\u4f4e\u7ef4\u5b9e\u6570\u5411\u91cf\u5e8f\u5217\uff0c\u5b9e\u73b0\u65e0\u635f\u5b58\u50a8\u3001\u7ebf\u6027\u65f6\u95f4\u7f16\u89e3\u7801\u53caO(1)\u968f\u673a\u8bbf\u95ee\u4e0e\u8ffd\u52a0\u64cd\u4f5c\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07144", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u4fdd\u7559\u5c11\u91cf\u7cbe\u786e\u7a97\u53e3\uff084\u4e2a\u6ce8\u610f\u529b\u951a\u70b9+32\u4e2a\u8fd1\u671ftoken\uff09\uff0c\u5176\u4f59\u90e8\u5206\u901a\u8fc7\u9010\u5934\u6b8b\u5dee\u5411\u91cf\u91cf\u5316\u5f52\u6863\uff0c\u76f8\u6bd4fp16\u7f13\u5b58\u538b\u7f2936-54\u500d\uff0c\u56f0\u60d1\u5ea6\u4ee3\u4ef7\u4ec511-15%", "\u53d1\u73b0\u952e\u503c\u975e\u5bf9\u79f0\u6027\uff1a\u91cf\u5316Key\u7684\u635f\u5bb3\u7ea6\u662f\u91cf\u5316Value\u76844\u500d\uff0c\u636e\u6b64\u8bbe\u8ba1\u6df7\u5408\u6bd4\u7279\u5206\u914d\u65b9\u6848", "\u5f52\u6863\u7ed3\u6784\u540c\u65f6\u5145\u5f53\u641c\u7d22\u7d22\u5f15\uff0c\u652f\u6301\u76f4\u63a5\u5728\u5b58\u50a8\u5411\u91cf\u4e0a\u6267\u884c\u8fd1\u4f3c\u5b50\u4e32\u67e5\u8be2\uff0c\u65e0\u9700\u8fd8\u539f\u539f\u59cb\u6587\u672c"], "keywords": ["KV\u7f13\u5b58\u538b\u7f29", "\u957f\u4e0a\u4e0b\u6587\u63a8\u7406", "\u5411\u91cf\u91cf\u5316", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07144v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Fractal KV-Cache Archives: Lossless Symbolic Storage with In-Place Retrieval for Long-Context LLM Inference", "tldr": "\u63d0\u51fa\u5206\u5f62KV\u7f13\u5b58\u5f52\u6863\u65b9\u6848\uff0c\u5b9e\u73b0\u65e0\u635f\u7b26\u53f7\u5b58\u50a8\u4e0eO(1)\u968f\u673a\u8bbf\u95ee\uff0c\u538b\u7f29\u6bd4\u8fbe36-54\u500d", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u6536\u7f29\u8fed\u4ee3\u6620\u5c04\u7f16\u7801\u7684KV\u7f13\u5b58\u5f52\u6863\u683c\u5f0f\uff0c\u5c06\u91cf\u5316\u540e\u7684KV\u7f13\u5b58\u7b26\u53f7\u6d41\u5e8f\u5217\u5316\u4e3a\u4f4e\u7ef4\u5b9e\u6570\u5411\u91cf\u5e8f\u5217\uff0c\u5b9e\u73b0\u65e0\u635f\u5b58\u50a8\u3001\u7ebf\u6027\u65f6\u95f4\u7f16\u89e3\u7801\u53caO(1)\u968f\u673a\u8bbf\u95ee\u4e0e\u8ffd\u52a0\u64cd\u4f5c\u3002", "why_notable": "\u5c06\u5b58\u50a8\u683c\u5f0f\u4e0e\u68c0\u7d22\u529f\u80fd\u7edf\u4e00\uff0c\u4e3a\u957f\u4e0a\u4e0b\u6587LLM\u63a8\u7406\u63d0\u4f9b\u4e86\u517c\u987e\u538b\u7f29\u7387\u3001\u65e0\u635f\u6027\u548c\u53ef\u68c0\u7d22\u6027\u7684\u65b0\u8303\u5f0f\uff0c\u4e14\u5168\u90e8\u5b9e\u9a8c\u53ef\u5728\u7b14\u8bb0\u672cCPU\u4e0a\u5355\u547d\u4ee4\u590d\u73b0"}, {"abstract": "Speculative decoding accelerates LLM inference by drafting multiple tokens and verifying them in parallel. Block-parallel drafters such as DFlash further improve drafting efficiency by predicting an entire block in one pass, but their position-wise predictions lack explicit intra-block causal conditioning. Recent methods such as Domino and DSpark attempt to introduce such causality into block-parallel drafting, but they require training the draft model from scratch, which limits their flexibility and increases training cost. We propose DeLS-Spec, a decoupled long-short context speculative decoding method. DeLS-Spec treats the fixed DFlash model as a long-context expert and introduces a lightweight local head as a short-context expert. The local head can be trained independently with a standard next-token prediction objective, without joint training with the target model or the DFlash backbone, leading to extremely low training cost. At inference time, DeLS-Spec combines long-context and short-context logits, and the local head is not tied to a specific DFlash checkpoint, making the method more modular and flexible. Experiments on Qwen3 models show that DeLS-Spec consistently improves speedup and average acceptance length over DFlash across math, code, and dialogue benchmarks.", "arxiv_id": "2607.07409", "arxiv_url": "https://arxiv.org/abs/2607.07409", "authors": ["Hong-Kai Zheng", "Piji Li"], "brief": "\u63d0\u51faDeLS-Spec\u65b9\u6cd5\uff0c\u5c06\u56fa\u5b9a\u7684DFlash\u6a21\u578b\u4f5c\u4e3a\u957f\u4e0a\u4e0b\u6587\u4e13\u5bb6\uff0c\u5f15\u5165\u8f7b\u91cf\u7ea7\u5c40\u90e8\u5934\u4f5c\u4e3a\u77ed\u4e0a\u4e0b\u6587\u4e13\u5bb6\uff0c\u901a\u8fc7\u89e3\u8026\u8bad\u7ec3\u5b9e\u73b0\u5757\u5e76\u884c\u63a8\u6d4b\u89e3\u7801\u4e2d\u7684\u56e0\u679c\u6761\u4ef6\u5efa\u6a21\uff0c\u65e0\u9700\u4ece\u5934\u8bad\u7ec3\u8349\u7a3f\u6a21\u578b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07409", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5c40\u90e8\u5934\uff08local head\uff09\u53ef\u72ec\u7acb\u8bad\u7ec3\uff0c\u4ec5\u4f7f\u7528\u6807\u51c6\u4e0b\u4e00\u8bcd\u9884\u6d4b\u76ee\u6807\uff0c\u65e0\u9700\u4e0e\u76ee\u6807\u6a21\u578b\u6216DFlash\u8054\u5408\u8bad\u7ec3\uff0c\u8bad\u7ec3\u6210\u672c\u6781\u4f4e", "\u63a8\u7406\u65f6\u878d\u5408\u957f\u4e0a\u4e0b\u6587\uff08DFlash\uff09\u4e0e\u77ed\u4e0a\u4e0b\u6587\uff08\u5c40\u90e8\u5934\uff09\u7684logits\uff0c\u4e14\u5c40\u90e8\u5934\u4e0d\u7ed1\u5b9a\u7279\u5b9aDFlash\u68c0\u67e5\u70b9\uff0c\u6a21\u5757\u5316\u7075\u6d3b\u6027\u5f3a", "\u5728Qwen3\u6a21\u578b\u4e0a\uff0c\u8de8\u6570\u5b66\u3001\u4ee3\u7801\u3001\u5bf9\u8bdd\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0cDeLS-Spec\u5728\u52a0\u901f\u6bd4\u548c\u5e73\u5747\u63a5\u53d7\u957f\u5ea6\u4e0a\u5747\u4f18\u4e8eDFlash"], "keywords": ["\u63a8\u6d4b\u89e3\u7801", "LLM\u63a8\u7406\u52a0\u901f", "\u5927\u8bed\u8a00\u6a21\u578b", "\u9ad8\u6548\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07409v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "DeLS-Spec: Decoupled Long-Short Contexts for Parallel Speculative Drafting", "tldr": "\u89e3\u8026\u957f\u77ed\u4e0a\u4e0b\u6587\u7684\u5e76\u884c\u63a8\u6d4b\u89e3\u7801\u65b9\u6cd5\uff0c\u4f4e\u6210\u672c\u63d0\u5347LLM\u63a8\u7406\u901f\u5ea6", "upvotes": 0, "what_it_is": "\u63d0\u51faDeLS-Spec\u65b9\u6cd5\uff0c\u5c06\u56fa\u5b9a\u7684DFlash\u6a21\u578b\u4f5c\u4e3a\u957f\u4e0a\u4e0b\u6587\u4e13\u5bb6\uff0c\u5f15\u5165\u8f7b\u91cf\u7ea7\u5c40\u90e8\u5934\u4f5c\u4e3a\u77ed\u4e0a\u4e0b\u6587\u4e13\u5bb6\uff0c\u901a\u8fc7\u89e3\u8026\u8bad\u7ec3\u5b9e\u73b0\u5757\u5e76\u884c\u63a8\u6d4b\u89e3\u7801\u4e2d\u7684\u56e0\u679c\u6761\u4ef6\u5efa\u6a21\uff0c\u65e0\u9700\u4ece\u5934\u8bad\u7ec3\u8349\u7a3f\u6a21\u578b\u3002", "why_notable": "\u73b0\u6709\u5f15\u5165\u5757\u5e76\u884c\u56e0\u679c\u6761\u4ef6\u7684\u65b9\u6cd5\uff08\u5982Domino\u3001DSpark\uff09\u9700\u4ece\u5934\u8bad\u7ec3\u8349\u7a3f\u6a21\u578b\uff0c\u6210\u672c\u9ad8\u4e14\u7075\u6d3b\u6027\u5dee\uff1bDeLS-Spec\u901a\u8fc7\u89e3\u8026\u8bbe\u8ba1\u5927\u5e45\u964d\u4f4e\u8bad\u7ec3\u6210\u672c\uff0c\u540c\u65f6\u4fdd\u6301\u6a21\u5757\u5316\uff0c\u5bf9\u5de5\u4e1a\u90e8\u7f72\u5177\u6709\u8f83\u9ad8\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Vision-language models (VLMs) and agentic AI have shown strong performance on semantic visual tasks, but it remains unclear whether they can handle the physics and inverse problems that underlie computational imaging. We present ImagingBench, a benchmark of 20 computational imaging tasks spanning five categories: ray and wave optics, image signal processing, inverse reconstruction, computational sensing, and calibration. ImagingBench evaluates three complementary settings: Expert, fixed expert-guided inverse reconstruction; Planner, planner-guided inverse reconstruction; and Forward, forward-system simulation for consistency checking. We benchmark leading proprietary and open-source image-centric multimodal systems, including Gemini, GPT, and Qwen, and compare them with representative task-specific non-agentic baselines. Across tasks, agentic models remain consistently weaker than specialized methods, especially on computational sensing problems such as lensless imaging, event-based reconstruction, time-of-flight imaging, and holography. Planner guidance provides only modest and inconsistent gains over the fixed-prompt Expert baseline. Although the models often generate visually plausible outputs, their reference-based fidelity remains poor, revealing a substantial gap between semantic visual competence and physically grounded imaging performance. ImagingBench provides a unified testbed for measuring this gap and tracking progress in agentic AI for computational imaging.", "arxiv_id": "2607.07189", "arxiv_url": "https://arxiv.org/abs/2607.07189", "authors": ["Ethan Chung", "Chuanjun Zheng", "Jasper Tan", "Jingxi Li", "Haopeng Zhang", "Huaijin Chen"], "brief": "\u63d0\u51faImagingBench\u57fa\u51c6\uff0c\u6db5\u76d620\u9879\u8ba1\u7b97\u6210\u50cf\u4efb\u52a1\uff0c\u7cfb\u7edf\u8bc4\u4f30VLM\u548c\u667a\u80fd\u4f53AI\u5728\u5149\u5b66\u3001\u56fe\u50cf\u4fe1\u53f7\u5904\u7406\u3001\u9006\u91cd\u5efa\u7b49\u7269\u7406\u6210\u50cf\u95ee\u9898\u4e0a\u7684\u80fd\u529b\u3002\u7ed3\u679c\u663e\u793a\uff0cGemini\u3001GPT\u3001Qwen\u7b49\u524d\u6cbf\u6a21\u578b\u5728\u8ba1\u7b97\u6210\u50cf\u4efb\u52a1\u4e0a\u663e\u8457\u5f31\u4e8e\u4e13\u7528\u65b9\u6cd5\uff0c\u63ed\u793a\u4e86\u8bed\u4e49\u89c6\u89c9\u80fd\u529b\u4e0e\u7269\u7406\u6210\u50cf\u6027\u80fd\u4e4b\u95f4\u7684\u5de8\u5927\u5dee\u8ddd\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07189", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u8ba1\u7b97\u6210\u50cf", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07189v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Does AI Understand Imaging? A Systematic Benchmark of Agentic AI for Computational Imaging Tasks", "tldr": "\u63d0\u51faImagingBench\u57fa\u51c6\uff0c\u6db5\u76d620\u9879\u8ba1\u7b97\u6210\u50cf\u4efb\u52a1\uff0c\u7cfb\u7edf\u8bc4\u4f30VLM\u548c\u667a\u80fd\u4f53AI\u5728\u5149\u5b66\u3001\u56fe\u50cf\u4fe1\u53f7\u5904\u7406\u3001\u9006\u91cd\u5efa\u7b49\u7269\u7406\u6210\u50cf\u95ee\u9898\u4e0a\u7684\u80fd\u529b\u3002\u7ed3\u679c\u663e\u793a\uff0cGemini\u3001GPT\u3001Qwen\u7b49\u524d\u6cbf\u6a21\u578b\u5728\u8ba1\u7b97\u6210\u50cf\u4efb\u52a1\u4e0a\u663e\u8457\u5f31\u4e8e\u4e13\u7528\u65b9\u6cd5\uff0c\u63ed\u793a\u4e86\u8bed\u4e49\u89c6\u89c9\u80fd\u529b\u4e0e\u7269\u7406\u6210\u50cf\u6027\u80fd\u4e4b\u95f4\u7684\u5de8\u5927\u5dee\u8ddd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent breakthroughs of Reinforcement Learning (RL) have highlighted its potential for complex agentic Large Language Model (LLM) tasks. However, existing efforts largely focus on single-task settings, whereas real-world deployment necessitates a generalist agent capable of solving multiple tasks simultaneously. In this work, we identify a critical yet underexplored phenomenon in multi-task agentic RL: different tasks can exhibit exploration-exploitation pace mismatch. Specifically, easier tasks may converge early to low-entropy policies that hinder learning on harder tasks, while harder tasks can, in turn, push easier tasks back toward high-entropy exploration. This back-and-forth interaction creates inter-task entropy crossovers and frequent entropy spikes. Inspired by this observation, we introduce Entropy Pacing Policy Optimization (EPPO) for multi-task agentic LLMs, which coordinates entropy across tasks to stabilize multi-task optimization. At the core of EPPO is a task-wise dynamic clipping mechanism that replaces the fixed clipping threshold in Group Relative Policy Optimization (GRPO) with a task entropy-aware adaptive bound, tightening updates for over-confident tasks while relaxing them for under-explored ones. Experiments on the multi-task agentic benchmarks demonstrate that the proposed EPPO yields results superior to its counterparts.", "arxiv_id": "2607.07178", "arxiv_url": "https://arxiv.org/abs/2607.07178", "authors": ["Zetian Hu", "Shunyu Liu", "Junjie Zhang", "Yongcheng Jing", "Ting-En Lin", "Yongbin Li", "Dacheng Tao"], "brief": "\u9488\u5bf9\u591a\u4efb\u52a1\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u4e2d\u4e0d\u540c\u4efb\u52a1\u63a2\u7d22-\u5229\u7528\u8282\u594f\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u63d0\u51fa\u71b5\u8282\u594f\u7b56\u7565\u4f18\u5316\uff08EPPO\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u4efb\u52a1\u7ea7\u52a8\u6001\u88c1\u526a\u673a\u5236\u66ff\u4ee3GRPO\u4e2d\u56fa\u5b9a\u88c1\u526a\u9608\u503c\uff0c\u534f\u8c03\u5404\u4efb\u52a1\u95f4\u7684\u71b5\u53d8\u5316\uff0c\u5728\u591a\u4efb\u52a1\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u53d6\u5f97\u4f18\u4e8e\u5bf9\u6bd4\u65b9\u6cd5\u7684\u6548\u679c\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07178", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u591a\u4efb\u52a1\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07178v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Entropy Pacing Policy Optimization for Multi-Task Agentic Reinforcement Learning", "tldr": "\u9488\u5bf9\u591a\u4efb\u52a1\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u4e2d\u4e0d\u540c\u4efb\u52a1\u63a2\u7d22-\u5229\u7528\u8282\u594f\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u63d0\u51fa\u71b5\u8282\u594f\u7b56\u7565\u4f18\u5316\uff08EPPO\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u4efb\u52a1\u7ea7\u52a8\u6001\u88c1\u526a\u673a\u5236\u66ff\u4ee3GRPO\u4e2d\u56fa\u5b9a\u88c1\u526a\u9608\u503c\uff0c\u534f\u8c03\u5404\u4efb\u52a1\u95f4\u7684\u71b5\u53d8\u5316\uff0c\u5728\u591a\u4efb\u52a1\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u53d6\u5f97\u4f18\u4e8e\u5bf9\u6bd4\u65b9\u6cd5\u7684\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Agentic language models must learn when to call tools, when to consume tool responses, and when to answer directly. This makes multi-teacher on-policy distillation a natural training strategy: one teacher can specialize in tool calls, another in direct responses, and the student can learn from both on its own generated distribution. We show that this strategy can induce a behavior shift that is invisible from aggregate losses alone. In a two-teacher tool-use setting, vanilla generalized knowledge distillation improves tool-call recall but also moves the model toward over-calling, where it calls tools on examples that should be answered directly. Aggregate explanations are insufficient: tool-call samples do not receive more token exposure, and full-sequence per-token divergence is not larger for the tool-call teacher. We instead analyze behavior leverage imbalance: local token-level signals at mode- entry and structural positions, such as \u003ctool_call\u003e and function names, can have disproportionate control over the global generation mode. We propose Soft Clamp, a per-token divergence calibration method that dynamically compresses extreme token-level Jensen-Shannon divergence while preserving nonzero gradients. On APIGen-MT, Soft Clamp reduces over-calling from 13.7% to 9.0% relative to vanilla GKD while matching its decision accuracy. In a BFCL multi-turn diagnostic, it also lowers tool-call loops and repeated calls among GKD variants. These results suggest that multi-teacher OPD should monitor where teacher signals act, not only how large they are in aggregate.", "arxiv_id": "2607.07050", "arxiv_url": "https://arxiv.org/abs/2607.07050", "authors": ["Jiabin Shen", "Guang Chen", "Chengjun Mao"], "brief": "\u591a\u6559\u5e08\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u8bad\u7ec3\u667a\u80fd\u4f53\u8bed\u8a00\u6a21\u578b\u65f6\uff0c\u5c40\u90e8token\u7ea7\u4fe1\u53f7\uff08\u5982\u003ctool_call\u003e\u7b49\u7ed3\u6784\u4f4d\u7f6e\uff09\u4f1a\u9020\u6210\u884c\u4e3a\u6760\u6746\u5931\u8861\uff0c\u5bfc\u81f4\u6a21\u578b\u8fc7\u5ea6\u8c03\u7528\u5de5\u5177\u3002\u63d0\u51faSoft Clamp\u65b9\u6cd5\u5bf9\u9010token\u7684JS\u6563\u5ea6\u8fdb\u884c\u52a8\u6001\u538b\u7f29\u6821\u51c6\uff0c\u5728APIGen-MT\u4e0a\u5c06\u8fc7\u5ea6\u8c03\u7528\u7387\u4ece13.7%\u964d\u81f39.0%\uff0c\u540c\u65f6\u4fdd\u6301\u51b3\u7b56\u51c6\u786e\u7387\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07050", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u77e5\u8bc6\u84b8\u998f", "\u5de5\u5177\u8c03\u7528", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07050v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Behavior Leverage Imbalance in Multi-Teacher On-Policy Distillation", "tldr": "\u591a\u6559\u5e08\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u8bad\u7ec3\u667a\u80fd\u4f53\u8bed\u8a00\u6a21\u578b\u65f6\uff0c\u5c40\u90e8token\u7ea7\u4fe1\u53f7\uff08\u5982\u003ctool_call\u003e\u7b49\u7ed3\u6784\u4f4d\u7f6e\uff09\u4f1a\u9020\u6210\u884c\u4e3a\u6760\u6746\u5931\u8861\uff0c\u5bfc\u81f4\u6a21\u578b\u8fc7\u5ea6\u8c03\u7528\u5de5\u5177\u3002\u63d0\u51faSoft Clamp\u65b9\u6cd5\u5bf9\u9010token\u7684JS\u6563\u5ea6\u8fdb\u884c\u52a8\u6001\u538b\u7f29\u6821\u51c6\uff0c\u5728APIGen-MT\u4e0a\u5c06\u8fc7\u5ea6\u8c03\u7528\u7387\u4ece13.7%\u964d\u81f39.0%\uff0c\u540c\u65f6\u4fdd\u6301\u51b3\u7b56\u51c6\u786e\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present LingBot-World 2.0 (also known as LingBot-World-Infinity), an advanced iteration of LingBot-World featuring four distinct upgrades. (1) Our model achieves an unbounded interaction horizon while maintaining consistent output quality, benefiting from a carefully crafted causal pretraining paradigm. (2) Through distilling a real-time variant from the base model, our system guarantees rapid response time, sufficient to drive 720p video streams at 60 fps. (3) Compared to the previous version, this update introduces highly diverse interactive elements, comprising a broader spectrum of actions (e.g., attacking, archery, spell-casting, and shooting) alongside a richer variety of text-driven events. (4) We pioneer the integration of an agentic harness within the domain of world modeling, wherein a pilot agent is tasked with planning and executing character behaviors, while a director agent is responsible for synthesizing novel environmental elements as the scene progresses. Additionally, to facilitate a shared experience, we develop an interface that permits multiple players to simultaneously immerse themselves in this vivid world simulator. We pair our primary 14B model with a lightweight 1.3B counterpart, which supports effortless deployment on a single GPU.", "arxiv_id": "2607.07534", "arxiv_url": "https://arxiv.org/abs/2607.07534", "authors": ["Zelin Gao", "Qiuyu Wang", "Jiapeng Zhu", "Jingye Chen", "Zichen Liu", "Qingyan Bai", "Jiahao Wang", "Yufeng Yuan", "Hanlin Wang", "Yichong Lu", "Ka Leong Cheng", "Haojie Zhang", "Jian Gao", "Tianrui Feng", "Yuzheng Liu", "Yao Yao", "Yinghao Xu", "Xing Zhu", "Yujun Shen", "Hao Ouyang"], "brief": "\u63d0\u51faLingBot-World 2.0\uff0c\u4e00\u4e2a\u652f\u6301\u65e0\u9650\u4ea4\u4e92\u65f6\u57df\u7684\u4e16\u754c\u6a21\u62df\u5668\uff0c\u80fd\u4ee560fps\u751f\u6210720p\u89c6\u9891\u6d41\uff0c\u5e76\u5f15\u5165\u591a\u6837\u5316\u4ea4\u4e92\u52a8\u4f5c\u4e0e\u6587\u672c\u9a71\u52a8\u4e8b\u4ef6\u3002\u521b\u65b0\u6027\u5730\u5c06\u667a\u80fd\u4f53\u6846\u67b6\u878d\u5165\u4e16\u754c\u5efa\u6a21\uff0c\u7531\u5bfc\u822a\u667a\u80fd\u4f53\u89c4\u5212\u89d2\u8272\u884c\u4e3a\u3001\u5bfc\u6f14\u667a\u80fd\u4f53\u751f\u6210\u73af\u5883\u5143\u7d20\uff0c\u540c\u65f6\u652f\u6301\u591a\u4eba\u540c\u65f6\u6e38\u73a9\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07534", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u667a\u80fd\u4f53", "\u4ea4\u4e92\u5f0f\u4eff\u771f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07534v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Infinite Worlds with Versatile Interactions", "tldr": "\u63d0\u51faLingBot-World 2.0\uff0c\u4e00\u4e2a\u652f\u6301\u65e0\u9650\u4ea4\u4e92\u65f6\u57df\u7684\u4e16\u754c\u6a21\u62df\u5668\uff0c\u80fd\u4ee560fps\u751f\u6210720p\u89c6\u9891\u6d41\uff0c\u5e76\u5f15\u5165\u591a\u6837\u5316\u4ea4\u4e92\u52a8\u4f5c\u4e0e\u6587\u672c\u9a71\u52a8\u4e8b\u4ef6\u3002\u521b\u65b0\u6027\u5730\u5c06\u667a\u80fd\u4f53\u6846\u67b6\u878d\u5165\u4e16\u754c\u5efa\u6a21\uff0c\u7531\u5bfc\u822a\u667a\u80fd\u4f53\u89c4\u5212\u89d2\u8272\u884c\u4e3a\u3001\u5bfc\u6f14\u667a\u80fd\u4f53\u751f\u6210\u73af\u5883\u5143\u7d20\uff0c\u540c\u65f6\u652f\u6301\u591a\u4eba\u540c\u65f6\u6e38\u73a9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Structure-property relationships are foundational to biology, chemistry and materials science, where function, reactivity and physical response emerge from spatial, chemical and periodic organization. Mechanistically explaining these relationships requires interpreting structural evidence through scientific principles and physical constraints, from stereochemistry and bonding to symmetry, energetics and periodic order. However, applying artificial intelligence to this process presents a joint challenge of representation and reasoning: models must preserve domain-native structural information while showing how specific evidence supports predictions under these constraints. Here we introduce SciReasoner, a multimodal scientific foundation model for native structural reasoning across proteins, small molecules and inorganic crystals. SciReasoner discretizes coordinates, topologies and periodic connectivities into a unified structure-aware vocabulary, treating structural tokens as addressable evidence units during reasoning. In homology-controlled Gene Ontology prediction, SciReasoner improves Cellular Component annotation for low-homology and orphan-like proteins, increasing $F_{\\max}$ from 0.42 to 0.55. In chemistry, it raises single-step retrosynthesis accuracy from 0.63 to 0.72 while generating fragment-level disconnection and precursor-verification traces. In materials science, its representations separate elemental and compound phases and resolve high- and low-band-gap regimes. Across 86 benchmarks, SciReasoner achieves state-of-the-art performance on 67 tasks. Double-blind expert evaluation rates its reasoning traces as preferred or at least comparable to those of a frontier large language model in 98% of cases. By making structure an inspectable substrate for reasoning under scientific constraints, SciReasoner connects accurate prediction with interpretable scientific inference.", "arxiv_id": "2607.07708", "arxiv_url": "https://arxiv.org/abs/2607.07708", "authors": ["Chen Tang", "Yizhou Wang", "Jianyu Wu", "Lintao Wang", "Shixiang Tang", "Pengze Li", "Encheng Su", "Jun Yao", "Jiabei Xiao", "Yuqi Shi", "Jielan Li", "Hongxia Hao", "Zhangyang Gao", "Fang Wu", "Ben Fei", "Xiangyu Yue", "Pan Tan", "Bozitao Zhong", "Jinouwen Zhang", "Aoran Wang", "Yan Lu", "Jiaheng Liu", "Xinzhu Ma", "Liang Hong", "Mingyue Zheng", "Phil Torr", "Bowen Zhou", "Wanli Ouyang", "Lei Bai"], "brief": "\u63d0\u51faSciReasoner\uff0c\u4e00\u4e2a\u8de8\u86cb\u767d\u8d28\u3001\u5c0f\u5206\u5b50\u548c\u65e0\u673a\u6676\u4f53\u7684\u591a\u6a21\u6001\u79d1\u5b66\u57fa\u7840\u6a21\u578b\uff0c\u5c06\u7ed3\u6784\u5750\u6807\u3001\u62d3\u6251\u548c\u5468\u671f\u8fde\u63a5\u6027\u79bb\u6563\u5316\u4e3a\u7edf\u4e00\u8bcd\u6c47\uff0c\u5b9e\u73b0\u539f\u751f\u7ed3\u6784\u63a8\u7406\u3002\u572886\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c67\u9879\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff0c\u4e13\u5bb6\u76f2\u8bc4\u4e2d98%\u7684\u6848\u4f8b\u5176\u63a8\u7406\u94fe\u4f18\u4e8e\u6216\u6301\u5e73\u524d\u6cbf\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u663e\u8457\u63d0\u5347\u57fa\u56e0\u672c\u4f53\u9884\u6d4b\u3001\u9006\u5408\u6210\u5206\u6790\u7b49\u4efb\u52a1\u8868\u73b0\u3002", "categories": ["cs.CL", "cs.AI", "cs.CE", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07708", "impact_score": 9, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u79d1\u5b66\u63a8\u7406", "\u7ed3\u6784-\u6027\u8d28\u5173\u7cfb", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07708v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Accurate, Interdisciplinary and Transparent Structure-property Understanding with Deep Native Structural Reasoning", "tldr": "\u63d0\u51faSciReasoner\uff0c\u4e00\u4e2a\u8de8\u86cb\u767d\u8d28\u3001\u5c0f\u5206\u5b50\u548c\u65e0\u673a\u6676\u4f53\u7684\u591a\u6a21\u6001\u79d1\u5b66\u57fa\u7840\u6a21\u578b\uff0c\u5c06\u7ed3\u6784\u5750\u6807\u3001\u62d3\u6251\u548c\u5468\u671f\u8fde\u63a5\u6027\u79bb\u6563\u5316\u4e3a\u7edf\u4e00\u8bcd\u6c47\uff0c\u5b9e\u73b0\u539f\u751f\u7ed3\u6784\u63a8\u7406\u3002\u572886\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c67\u9879\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff0c\u4e13\u5bb6\u76f2\u8bc4\u4e2d98%\u7684\u6848\u4f8b\u5176\u63a8\u7406\u94fe\u4f18\u4e8e\u6216\u6301\u5e73\u524d\u6cbf\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u663e\u8457\u63d0\u5347\u57fa\u56e0\u672c\u4f53\u9884\u6d4b\u3001\u9006\u5408\u6210\u5206\u6790\u7b49\u4efb\u52a1\u8868\u73b0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Limited memory language models (LMLMs) externalize factual knowledge during pretraining to a knowledge base (KB), rather than memorizing it in their weights. During generation, the model then fetches knowledge from the KB as needed. This recently introduced paradigm provides multiple advantages, including knowledge control capabilities that remain beyond conventional LLMs. We propose continuous-query LMLM (CO-LMLM), where the KB pairs continuous keys with textual knowledge values, a significant departure from prior reliance on relational KB and queries. CO-LMLM generates flexible vector queries at minimal cost, while still integrating human-readable and attributable retrieved knowledge into its generation. We pair this design with an annotation pipeline that tags free-form factual spans in arbitrary text, removing prior work\u0027s restriction to Wikipedia. Across pretraining on Wikipedia and FineWeb-Edu and at multiple model scales, CO-LMLM outperforms prior LMLMs and vanilla LLMs in both perplexity and factual precision. At 360M scale, this includes lower perplexity than models pretrained on 40x more data, and SimpleQA-verified performance that is in line with gpt-4o-mini and higher than Claude Sonnet 4.5.", "arxiv_id": "2607.07707", "arxiv_url": "https://arxiv.org/abs/2607.07707", "authors": ["Yair Feldman", "Linxi Zhao", "Nathan Godey", "Dongyoung Go", "Yilun Hua", "Kilian Q. Weinberger", "Jennifer J. Sun", "Yoav Artzi"], "brief": "\u63d0\u51faCO-LMLM\uff0c\u4e00\u79cd\u5c06\u4e8b\u5b9e\u77e5\u8bc6\u5916\u5316\u5230\u77e5\u8bc6\u5e93\u7684\u8bed\u8a00\u6a21\u578b\u65b0\u8303\u5f0f\uff0c\u901a\u8fc7\u8fde\u7eed\u5411\u91cf\u67e5\u8be2\u66ff\u4ee3\u4f20\u7edf\u5173\u7cfb\u578b\u77e5\u8bc6\u5e93\u67e5\u8be2\uff0c\u5b9e\u73b0\u7075\u6d3b\u9ad8\u6548\u7684\u77e5\u8bc6\u68c0\u7d22\u3002\u5728Wikipedia\u548cFineWeb-Edu\u4e0a\u9884\u8bad\u7ec3\u540e\uff0c360M\u89c4\u6a21\u6a21\u578b\u7684\u56f0\u60d1\u5ea6\u4f4e\u4e8e\u8bad\u7ec3\u6570\u636e\u91cf40\u500d\u7684\u6a21\u578b\uff0c\u4e8b\u5b9e\u7cbe\u5ea6\u5ab2\u7f8eGPT-4o-mini\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07707", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u5e93", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u4e8b\u5b9e\u77e5\u8bc6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07707v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Co-LMLM: Continuous-Query Limited Memory Language Models", "tldr": "\u63d0\u51faCO-LMLM\uff0c\u4e00\u79cd\u5c06\u4e8b\u5b9e\u77e5\u8bc6\u5916\u5316\u5230\u77e5\u8bc6\u5e93\u7684\u8bed\u8a00\u6a21\u578b\u65b0\u8303\u5f0f\uff0c\u901a\u8fc7\u8fde\u7eed\u5411\u91cf\u67e5\u8be2\u66ff\u4ee3\u4f20\u7edf\u5173\u7cfb\u578b\u77e5\u8bc6\u5e93\u67e5\u8be2\uff0c\u5b9e\u73b0\u7075\u6d3b\u9ad8\u6548\u7684\u77e5\u8bc6\u68c0\u7d22\u3002\u5728Wikipedia\u548cFineWeb-Edu\u4e0a\u9884\u8bad\u7ec3\u540e\uff0c360M\u89c4\u6a21\u6a21\u578b\u7684\u56f0\u60d1\u5ea6\u4f4e\u4e8e\u8bad\u7ec3\u6570\u636e\u91cf40\u500d\u7684\u6a21\u578b\uff0c\u4e8b\u5b9e\u7cbe\u5ea6\u5ab2\u7f8eGPT-4o-mini\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning from human feedback (RLHF) has emerged as a powerful paradigm for aligning generative models with human preferences. However, applying RLHF to diffusion models remains highly feedback inefficient, as existing approaches typically require large amounts of human or reward model evaluations. This limitation reduces the practicality of diffusion RLHF in realworld settings where feedback is the primary bottleneck. In this paper, we propose two complementary strategies that substantially improve the feedback efficiency of diffusion RLHF while preserving generalization to unseen prompts. Our key observation is that reward information in diffusion trajectories is unevenly distributed: not all denoising timesteps or trajectories contribute equally to learning from a reward signal. By emphasizing informative timesteps and trajectories during optimization, we obtain more effective gradient updates. First, we introduce a per-timestep weighting scheme that reweights denoising steps during policy optimization. We theoretically connect this weighting to the optimal convergence properties of proximal policy optimization (PPO) and approximate the resulting weighting trend empirically. Second, we introduce a replay mechanism that prioritizes informative trajectories, enabling the model to reuse past samples instead of repeatedly querying new rewards. Together, these strategies significantly improve the feedback efficiency of diffusion RLHF. Under identical hyperparameter settings, our approach achieves up to a 6$\\times$ improvement in sample efficiency compared to widely used diffusion RLHF baselines.", "arxiv_id": "2607.07693", "arxiv_url": "https://arxiv.org/abs/2607.07693", "authors": ["Eric Zhu", "Abhinav Shrivastava", "Soumik Mukhopadhyay"], "brief": "\u9488\u5bf9\u6269\u6563\u6a21\u578b\u7684RLHF\u53cd\u9988\u6548\u7387\u4f4e\u95ee\u9898\uff0c\u63d0\u51fa\u4e24\u79cd\u4e92\u8865\u7b56\u7565\uff1a\u57fa\u4e8e\u65f6\u95f4\u6b65\u7684\u68af\u5ea6\u91cd\u52a0\u6743\u548c\u57fa\u4e8e\u4f18\u52bf\u51fd\u6570\u7684\u8f68\u8ff9\u56de\u653e\u673a\u5236\u3002\u7406\u8bba\u4e0a\u4e0ePPO\u6700\u4f18\u6536\u655b\u6027\u76f8\u8fde\uff0c\u5b9e\u9a8c\u8868\u660e\u5728\u76f8\u540c\u8d85\u53c2\u6570\u8bbe\u7f6e\u4e0b\u6837\u672c\u6548\u7387\u63d0\u5347\u6700\u9ad86\u500d\u3002", "categories": ["cs.LG", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07693", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "RLHF", "\u6837\u672c\u6548\u7387"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07693v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Selective Timestep Weighting and Advantage-Based Replay for Sample-Efficient Diffusion RLHF", "tldr": "\u9488\u5bf9\u6269\u6563\u6a21\u578b\u7684RLHF\u53cd\u9988\u6548\u7387\u4f4e\u95ee\u9898\uff0c\u63d0\u51fa\u4e24\u79cd\u4e92\u8865\u7b56\u7565\uff1a\u57fa\u4e8e\u65f6\u95f4\u6b65\u7684\u68af\u5ea6\u91cd\u52a0\u6743\u548c\u57fa\u4e8e\u4f18\u52bf\u51fd\u6570\u7684\u8f68\u8ff9\u56de\u653e\u673a\u5236\u3002\u7406\u8bba\u4e0a\u4e0ePPO\u6700\u4f18\u6536\u655b\u6027\u76f8\u8fde\uff0c\u5b9e\u9a8c\u8868\u660e\u5728\u76f8\u540c\u8d85\u53c2\u6570\u8bbe\u7f6e\u4e0b\u6837\u672c\u6548\u7387\u63d0\u5347\u6700\u9ad86\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning from verifiable rewards (e.g. GRPO) is the engine behind today\u0027s reasoning models, yet it grades only the final answer. On hard problems this trains models to write more rather than to think better, since the trace itself is never graded and no label for good thinking exists. We introduce Agon, which makes two competing models each other\u0027s graders. Both attempt the same problem; in alternating roles, one drafts a solution and the other reads it while solving, and each is rewarded for out-solving the other. To win, a model must out-reason a rival that has seen its work, so reasoning is judged implicitly during training, with no process labels and no reward model. Because both models are optimized, each faces a progressively stronger rival, which single-model RL cannot provide. The two need only be comparably strong and behaviorally different. At inference the pair deploys as it trains, a two-stage cascade in which one model drafts and the other answers after reading the draft. On the hard split of DeepMath with Qwen3, this doubles GRPO\u0027s pass@1, roughly eight times the gain of an untrained Mixture-of-Agents pass over the same base. The ordering replicates on competitive-programming code and across model families (Qwen3.5, Gemma 4). For now the models talk in text; the next step is to let them reason together in latent space.", "arxiv_id": "2607.07690", "arxiv_url": "https://arxiv.org/abs/2607.07690", "authors": ["Vladislav Beliaev"], "brief": "Agon\u63d0\u51fa\u8ba9\u4e24\u4e2a\u6a21\u578b\u4e92\u76f8\u7ade\u4e89\u4f5c\u4e3a\u5bf9\u65b9\u7684\u8bc4\u5206\u8005\uff0c\u901a\u8fc7\u4ea4\u66ff\u89d2\u8272\uff08\u4e00\u4e2a\u8d77\u8349\u89e3\u7b54\uff0c\u53e6\u4e00\u4e2a\u9605\u8bfb\u540e\u6c42\u89e3\uff09\u9690\u5f0f\u8bc4\u4f30\u63a8\u7406\u8d28\u91cf\uff0c\u65e0\u9700\u8fc7\u7a0b\u6807\u7b7e\u6216\u5956\u52b1\u6a21\u578b\u3002\u5728DeepMath\u96be\u9898\u96c6\u4e0a\uff0c\u8be5\u65b9\u6cd5\u5c06GRPO\u7684pass@1\u63d0\u5347\u4e86\u4e00\u500d\uff0c\u7ea6\u4e3a\u672a\u8bad\u7ec3\u6df7\u5408\u667a\u80fd\u4f53\u65b9\u6848\u6536\u76ca\u76848\u500d\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07690", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u63a8\u7406\u6a21\u578b", "\u7ade\u4e89\u8bad\u7ec3", "\u591a\u6a21\u578b\u534f\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07690v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Agon: Competitive Cross-Model RL with Implicit Rival Grading of Reasoning", "tldr": "Agon\u63d0\u51fa\u8ba9\u4e24\u4e2a\u6a21\u578b\u4e92\u76f8\u7ade\u4e89\u4f5c\u4e3a\u5bf9\u65b9\u7684\u8bc4\u5206\u8005\uff0c\u901a\u8fc7\u4ea4\u66ff\u89d2\u8272\uff08\u4e00\u4e2a\u8d77\u8349\u89e3\u7b54\uff0c\u53e6\u4e00\u4e2a\u9605\u8bfb\u540e\u6c42\u89e3\uff09\u9690\u5f0f\u8bc4\u4f30\u63a8\u7406\u8d28\u91cf\uff0c\u65e0\u9700\u8fc7\u7a0b\u6807\u7b7e\u6216\u5956\u52b1\u6a21\u578b\u3002\u5728DeepMath\u96be\u9898\u96c6\u4e0a\uff0c\u8be5\u65b9\u6cd5\u5c06GRPO\u7684pass@1\u63d0\u5347\u4e86\u4e00\u500d\uff0c\u7ea6\u4e3a\u672a\u8bad\u7ec3\u6df7\u5408\u667a\u80fd\u4f53\u65b9\u6848\u6536\u76ca\u76848\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models increasingly \\emph{understand} dialectal English, yet still \\emph{produce} only standard, US-leaning English, leaving dialectal generation, the harder half of the problem, largely unaddressed. We introduce \\textbf{DiaLLM}, which continually pretrains three open-weight language model families on the International Corpus of English and applies implicit and explicit post-training paradigms, each combined with three model alignment strategies, giving the first controlled comparison of these components across Australian, Indian, and Northern British English. Our results reveal that dialectal robustness and generation are \\emph{dissociated}: benchmarks are shaped by continual pretraining and SFT, while alignment visibly reshapes generation in ways benchmarks do not capture. Explicit variety-targeted adaptation produces output reliably recognised as dialectal and preferred over broad alignment, yet the method that most aggressively optimises the dialectal reward is not preferred by human evaluators. Independent linguistic analysis corroborates this reward-quality gap, most clearly on two of the three families. No single alignment method dominates, and closing the gap will require richer reward designs and continued investment in dialectal resources. We release all code, checkpoints, and preference datasets.", "arxiv_id": "2607.07669", "arxiv_url": "https://arxiv.org/abs/2607.07669", "authors": ["Jordan Painter", "Dipankar Srirag", "Adarsh Kappiyath", "Diptesh Kanojia", "Aditya Joshi", "Lu Yin"], "brief": "\u7814\u7a76\u53d1\u73b0\u5927\u8bed\u8a00\u6a21\u578b\u80fd\u7406\u89e3\u65b9\u8a00\u82f1\u8bed\u4f46\u65e0\u6cd5\u751f\u6210\u65b9\u8a00\uff0c\u63d0\u51faDiaLLM\u6846\u67b6\u901a\u8fc7\u6301\u7eed\u9884\u8bad\u7ec3\u548c\u591a\u79cd\u5bf9\u9f50\u7b56\u7565\u5bf9\u6fb3\u5927\u5229\u4e9a\u3001\u5370\u5ea6\u548c\u5317\u82f1\u683c\u5170\u65b9\u8a00\u8fdb\u884c\u9002\u914d\uff0c\u63ed\u793a\u4e86\u65b9\u8a00\u9c81\u68d2\u6027\u4e0e\u751f\u6210\u80fd\u529b\u4e4b\u95f4\u7684\u89e3\u8026\u73b0\u8c61\uff0c\u4ee5\u53ca\u5956\u52b1\u4f18\u5316\u4e0e\u4eba\u7c7b\u504f\u597d\u4e4b\u95f4\u7684\u5dee\u8ddd\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07669", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u65b9\u8a00\u9002\u914d", "\u6a21\u578b\u5bf9\u9f50", "\u6301\u7eed\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07669v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DiaLLM: An Investigation into the Robustness-Generation Gap in English Dialect Adaptation", "tldr": "\u7814\u7a76\u53d1\u73b0\u5927\u8bed\u8a00\u6a21\u578b\u80fd\u7406\u89e3\u65b9\u8a00\u82f1\u8bed\u4f46\u65e0\u6cd5\u751f\u6210\u65b9\u8a00\uff0c\u63d0\u51faDiaLLM\u6846\u67b6\u901a\u8fc7\u6301\u7eed\u9884\u8bad\u7ec3\u548c\u591a\u79cd\u5bf9\u9f50\u7b56\u7565\u5bf9\u6fb3\u5927\u5229\u4e9a\u3001\u5370\u5ea6\u548c\u5317\u82f1\u683c\u5170\u65b9\u8a00\u8fdb\u884c\u9002\u914d\uff0c\u63ed\u793a\u4e86\u65b9\u8a00\u9c81\u68d2\u6027\u4e0e\u751f\u6210\u80fd\u529b\u4e4b\u95f4\u7684\u89e3\u8026\u73b0\u8c61\uff0c\u4ee5\u53ca\u5956\u52b1\u4f18\u5316\u4e0e\u4eba\u7c7b\u504f\u597d\u4e4b\u95f4\u7684\u5dee\u8ddd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Deep learning has significantly advanced time series imputation, yet most existing architectures primarily rely on localized temporal context within the corrupted input sequence. This reliance can be limiting in real-world scenarios, where time series often exhibit non-stationary dynamics, weak temporal correlations, and infrequent patterns that are difficult to reconstruct from nearby observations alone. In this paper, we propose ALER-TI, Aligned Latent Embedding Retrieval for Time Series Imputation, a retrieval-augmented framework that explicitly leverages historical patterns to supplement degraded local context for more reliable missing-value reconstruction. The core of ALER-TI is Latent Embedding Alignment (LEA), which mitigates the representation mismatch between corrupted queries and complete historical candidates. By applying post-hoc masking in the latent space, LEA aligns candidates with the query\u0027s missingness pattern while allowing historical embeddings to be pre-computed and cached for efficient retrieval. ALER-TI is model-agnostic and can be integrated with various imputation backbones through a lightweight adaptation module. Extensive experiments on six real-world datasets under different missing rates demonstrate that ALER-TI consistently improves strong baseline models and enhances robustness across diverse imputation settings.", "arxiv_id": "2607.07640", "arxiv_url": "https://arxiv.org/abs/2607.07640", "authors": ["Xuan-Thong Truong", "Trung-Kien Le", "Tung Kieu", "Thi-Thu Nguyen", "Nhat-Hai Nguyen"], "brief": "\u63d0\u51faALER-TI\u6846\u67b6\uff0c\u901a\u8fc7\u68c0\u7d22\u589e\u5f3a\u65b9\u5f0f\u5229\u7528\u5386\u53f2\u6a21\u5f0f\u8f85\u52a9\u65f6\u95f4\u5e8f\u5217\u7f3a\u5931\u503c\u91cd\u5efa\u3002\u6838\u5fc3\u6a21\u5757LEA\u901a\u8fc7\u6f5c\u7a7a\u95f4\u5bf9\u9f50\u89e3\u51b3\u635f\u574f\u67e5\u8be2\u4e0e\u5b8c\u6574\u5386\u53f2\u5019\u9009\u4e4b\u95f4\u7684\u8868\u793a\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u652f\u6301\u5386\u53f2\u5d4c\u5165\u9884\u8ba1\u7b97\u7f13\u5b58\u4ee5\u63d0\u5347\u6548\u7387\u3002\u5728\u516d\u4e2a\u771f\u5b9e\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\u4e86\u8be5\u6a21\u578b\u65e0\u5173\u6846\u67b6\u80fd\u6301\u7eed\u63d0\u5347\u591a\u79cd\u57fa\u7ebf\u6a21\u578b\u7684\u63d2\u8865\u6027\u80fd\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07640", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u65f6\u95f4\u5e8f\u5217", "\u7f3a\u5931\u503c\u63d2\u8865", "\u68c0\u7d22\u589e\u5f3a", "\u8868\u793a\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07640v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ALER-TI: Aligned Latent Embedding Retrieval for Time Series Imputation", "tldr": "\u63d0\u51faALER-TI\u6846\u67b6\uff0c\u901a\u8fc7\u68c0\u7d22\u589e\u5f3a\u65b9\u5f0f\u5229\u7528\u5386\u53f2\u6a21\u5f0f\u8f85\u52a9\u65f6\u95f4\u5e8f\u5217\u7f3a\u5931\u503c\u91cd\u5efa\u3002\u6838\u5fc3\u6a21\u5757LEA\u901a\u8fc7\u6f5c\u7a7a\u95f4\u5bf9\u9f50\u89e3\u51b3\u635f\u574f\u67e5\u8be2\u4e0e\u5b8c\u6574\u5386\u53f2\u5019\u9009\u4e4b\u95f4\u7684\u8868\u793a\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u652f\u6301\u5386\u53f2\u5d4c\u5165\u9884\u8ba1\u7b97\u7f13\u5b58\u4ee5\u63d0\u5347\u6548\u7387\u3002\u5728\u516d\u4e2a\u771f\u5b9e\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\u4e86\u8be5\u6a21\u578b\u65e0\u5173\u6846\u67b6\u80fd\u6301\u7eed\u63d0\u5347\u591a\u79cd\u57fa\u7ebf\u6a21\u578b\u7684\u63d2\u8865\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Time series analysis plays a vital role across a wide range of scientific and engineering domains but poses substantial computational challenges. A major difficulty arises from the time reparameterization invariance of time series data, which complicates the extraction of meaningful temporal features. In this work, we address the problem of time series classification by exploring the application of quantum computation techniques. We propose a hybrid quantum-classical architecture that integrates recent advances in quantum neural networks with the mathematical framework of path signatures, mitigating the impact of time reparametrization invariance. The architecture employs feature layers that compute a signature kernel between pairs of input paths, consisting of a reference path and a target path for classification, using either classical or quantum variational linear solvers (VQLS). These feature layers are followed by a Quantum Convolutional Neural Network (QCNN) to perform downstream learning tasks. We evaluate several realizations of the proposed architecture, differing in QCNN configurations, on a binary classification task involving time series representations of handwritten digits. Our experiments demonstrate the potential advantages of implementing path signature kernel layers within quantum circuits and provide an analysis of the computational limitations associated with the VQLS component.", "arxiv_id": "2607.07634", "arxiv_url": "https://arxiv.org/abs/2607.07634", "authors": ["Leonardo Nogueira Falabella", "Vasily Sazonov"], "brief": "\u63d0\u51fa\u4e00\u79cd\u6df7\u5408\u91cf\u5b50-\u7ecf\u5178\u67b6\u6784\uff0c\u5c06\u8def\u5f84\u7b7e\u540d\u6838\u4e0e\u91cf\u5b50\u5377\u79ef\u795e\u7ecf\u7f51\u7edc\uff08QCNN\uff09\u7ed3\u5408\uff0c\u7528\u4e8e\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b\u4efb\u52a1\u3002\u8be5\u65b9\u6cd5\u901a\u8fc7\u8def\u5f84\u7b7e\u540d\u7279\u5f81\u5c42\u7f13\u89e3\u65f6\u95f4\u91cd\u53c2\u6570\u5316\u4e0d\u53d8\u6027\u95ee\u9898\uff0c\u5e76\u5728\u624b\u5199\u6570\u5b57\u65f6\u95f4\u5e8f\u5217\u4e8c\u5206\u7c7b\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u4e86\u5176\u6f5c\u5728\u4f18\u52bf\u3002", "categories": ["quant-ph", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07634", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u91cf\u5b50\u795e\u7ecf\u7f51\u7edc", "\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b", "\u8def\u5f84\u7b7e\u540d\u6838", "\u6df7\u5408\u91cf\u5b50-\u7ecf\u5178\u67b6\u6784"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07634v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "QCNN with Rough Path Signature Kernels", "tldr": "\u63d0\u51fa\u4e00\u79cd\u6df7\u5408\u91cf\u5b50-\u7ecf\u5178\u67b6\u6784\uff0c\u5c06\u8def\u5f84\u7b7e\u540d\u6838\u4e0e\u91cf\u5b50\u5377\u79ef\u795e\u7ecf\u7f51\u7edc\uff08QCNN\uff09\u7ed3\u5408\uff0c\u7528\u4e8e\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b\u4efb\u52a1\u3002\u8be5\u65b9\u6cd5\u901a\u8fc7\u8def\u5f84\u7b7e\u540d\u7279\u5f81\u5c42\u7f13\u89e3\u65f6\u95f4\u91cd\u53c2\u6570\u5316\u4e0d\u53d8\u6027\u95ee\u9898\uff0c\u5e76\u5728\u624b\u5199\u6570\u5b57\u65f6\u95f4\u5e8f\u5217\u4e8c\u5206\u7c7b\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u4e86\u5176\u6f5c\u5728\u4f18\u52bf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Safety evaluation for autonomous driving is dominated by rare, safety-critical interactions, motivating simulators that can deliberately synthesize corner cases with photorealistic observations. Corner-case generation is inherently a multi-source problem spanning visual representation, scene reasoning, and vehicle trajectory generation and control. Prior knowledge- and model-based approaches typically focus on scene or trajectory components in isolation, while diffusion-based methods attempt end-to-end generation but still struggle to ensure spatiotemporal consistency and physical realism. To unify these aspects within a single framework, we propose CARLA-GS, a modular corner-case synthesis pipeline that decouples visual representation, semantic reasoning, and physics-based execution while maintaining tight cross-module coupling. Starting from real driving data, we reconstruct an editable gaussian scene with additional geometry-consistent constraints. A multi-agent LLM then performs scene-level reasoning to identify risky interactions and generate intent-level waypoint trajectories, while the low-level motion control is delegated to CARLA, where a PID controller ensures kinematic and dynamic feasibility. The simulated vehicle states are finally re-projected into the gaussian scene for ego-centric rendering. This design enables high-level semantic reasoning, low-level physically executable motion, and photorealistic corner-case generation within a unified pipeline. Experiments on the Waymo Open Dataset show, both quantitatively and qualitatively, that our framework enables controllable corner-case generation and produces photorealistic, spatiotemporally consistent videos aligned with semantic intent and physically feasible motion.", "arxiv_id": "2607.07601", "arxiv_url": "https://arxiv.org/abs/2607.07601", "authors": ["Kaicong Huang", "Meng Ma", "Ruimin Ke"], "brief": "\u63d0\u51faCARLA-GS\u6846\u67b6\uff0c\u5c06\u89c6\u89c9\u8868\u793a\u3001\u8bed\u4e49\u63a8\u7406\u548c\u7269\u7406\u4eff\u771f\u89e3\u8026\uff0c\u7528\u4e8e\u81ea\u52a8\u9a7e\u9a76\u8fb9\u7f18\u6848\u4f8b\u5408\u6210\u3002\u901a\u8fc7\u9ad8\u65af\u573a\u666f\u91cd\u5efa\u3001\u591a\u667a\u80fd\u4f53LLM\u63a8\u7406\u548cCARLA\u7269\u7406\u63a7\u5236\u7684\u534f\u540c\uff0c\u5728Waymo\u6570\u636e\u96c6\u4e0a\u5b9e\u73b0\u4e86\u53ef\u63a7\u3001\u771f\u5b9e\u4e14\u65f6\u7a7a\u4e00\u81f4\u7684\u5371\u9669\u573a\u666f\u89c6\u9891\u751f\u6210\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07601", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u667a\u80fd\u4f53", "\u9ad8\u65af\u6e32\u67d3", "\u573a\u666f\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07601v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CARLA-GS: Decoupling Representation, Reasoning, and Physics Simulation for Autonomous Driving Corner-Case Synthesis", "tldr": "\u63d0\u51faCARLA-GS\u6846\u67b6\uff0c\u5c06\u89c6\u89c9\u8868\u793a\u3001\u8bed\u4e49\u63a8\u7406\u548c\u7269\u7406\u4eff\u771f\u89e3\u8026\uff0c\u7528\u4e8e\u81ea\u52a8\u9a7e\u9a76\u8fb9\u7f18\u6848\u4f8b\u5408\u6210\u3002\u901a\u8fc7\u9ad8\u65af\u573a\u666f\u91cd\u5efa\u3001\u591a\u667a\u80fd\u4f53LLM\u63a8\u7406\u548cCARLA\u7269\u7406\u63a7\u5236\u7684\u534f\u540c\uff0c\u5728Waymo\u6570\u636e\u96c6\u4e0a\u5b9e\u73b0\u4e86\u53ef\u63a7\u3001\u771f\u5b9e\u4e14\u65f6\u7a7a\u4e00\u81f4\u7684\u5371\u9669\u573a\u666f\u89c6\u9891\u751f\u6210\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "One-shot federated learning (OSFL) addresses the communication overhead of federated learning by limiting training to a single round, but doing so without sacrificing model quality is non-trivial, particularly when client data distributions diverge. Recent work has addressed this challenge by aggregating client knowledge on the server through the construction of transferable synthetic datasets or distillates. However, most of these methods lack formal privacy guarantees, leaving a gap in jointly achieving low communication, robustness to heterogeneity, and rigorous privacy. We propose FedKT-CSD (Federated Knowledge Transfer via Collaborative Synthetic Data), a framework inspired by neural image compression that closes this gap by leveraging publicly pretrained autoencoders as a shared latent space. Each client encodes its private data in a single forward pass, computes class-conditional latent statistics, and transmits these to the server. The server aggregates these statistics via secure aggregation, adds calibrated differential privacy noise, and decodes a synthetic dataset for training a global model and further downstream tasks. This design provides formal $(\\varepsilon,\u03b4)$-differential privacy by construction, while keeping client-side computation and communication lightweight. Despite operating under privacy constraints, FedKT-CSD is competitive with and even outperforms non-private baselines across diverse datasets and heterogeneity settings, and scales to a large number of clients. Our code is available at: https://github.com/an7123/FedKT-CSD", "arxiv_id": "2607.07565", "arxiv_url": "https://arxiv.org/abs/2607.07565", "authors": ["Maximilian Andreas Hoefler", "Karsten Mueller", "Wojciech Samek"], "brief": "\u63d0\u51faFedKT-CSD\u6846\u67b6\uff0c\u5229\u7528\u9884\u8bad\u7ec3\u81ea\u7f16\u7801\u5668\u4f5c\u4e3a\u5171\u4eab\u6f5c\u7a7a\u95f4\uff0c\u5728\u5355\u8f6e\u8054\u90a6\u5b66\u4e60\u4e2d\u5b9e\u73b0\u77e5\u8bc6\u8fc1\u79fb\u3002\u5ba2\u6237\u7aef\u4ec5\u4f20\u8f93\u7c7b\u6761\u4ef6\u6f5c\u5728\u7edf\u8ba1\u91cf\uff0c\u670d\u52a1\u7aef\u901a\u8fc7\u5b89\u5168\u805a\u5408\u4e0e\u5dee\u5206\u9690\u79c1\u566a\u58f0\u751f\u6210\u5408\u6210\u6570\u636e\u96c6\uff0c\u5728\u4fdd\u8bc1\u6b63\u5f0f\u9690\u79c1\u4fdd\u8bc1\u7684\u540c\u65f6\uff0c\u6027\u80fd\u4e0e\u975e\u9690\u79c1\u57fa\u7ebf\u76f8\u5f53\u751a\u81f3\u66f4\u4f18\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07565", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8054\u90a6\u5b66\u4e60", "\u5408\u6210\u6570\u636e", "\u5dee\u5206\u9690\u79c1", "\u77e5\u8bc6\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07565v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Collaborative Synthetic Data Generation for Knowledge Transfer in Federated Learning", "tldr": "\u63d0\u51faFedKT-CSD\u6846\u67b6\uff0c\u5229\u7528\u9884\u8bad\u7ec3\u81ea\u7f16\u7801\u5668\u4f5c\u4e3a\u5171\u4eab\u6f5c\u7a7a\u95f4\uff0c\u5728\u5355\u8f6e\u8054\u90a6\u5b66\u4e60\u4e2d\u5b9e\u73b0\u77e5\u8bc6\u8fc1\u79fb\u3002\u5ba2\u6237\u7aef\u4ec5\u4f20\u8f93\u7c7b\u6761\u4ef6\u6f5c\u5728\u7edf\u8ba1\u91cf\uff0c\u670d\u52a1\u7aef\u901a\u8fc7\u5b89\u5168\u805a\u5408\u4e0e\u5dee\u5206\u9690\u79c1\u566a\u58f0\u751f\u6210\u5408\u6210\u6570\u636e\u96c6\uff0c\u5728\u4fdd\u8bc1\u6b63\u5f0f\u9690\u79c1\u4fdd\u8bc1\u7684\u540c\u65f6\uff0c\u6027\u80fd\u4e0e\u975e\u9690\u79c1\u57fa\u7ebf\u76f8\u5f53\u751a\u81f3\u66f4\u4f18\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "AI agents that generate final answers based on user input often do not meet the needs of creative fields. Fields such as structural design and architecture need interactive systems that help users externalise and develop ideas, explore alternatives, and refine partial solutions. The final product of such designs needs to comply with many constraints concerning, e.g., spatial configuration, mechanical behaviour, material quantities, and costs. These constraints create friction in the design process, which can stimulate novel and creative solutions. In this paper, we discuss the misalignment between current generative AI goals to remove friction and provide final solutions and the needs of creators, such as structural designers, who develop ideas through iterative work. We present the design dimensions of systems allowing for constrained human-AI co-creation that rely on vision-language models making structural exploration conversational, multimodal, and responsive to evolving human intent in ways that follow and augment the discipline\u0027s creative process. Through a pilot design interface based on these principles and a study with experts in the field, this paper shows how structural designers perceive interactive AI systems and how such systems can support design space exploration by reducing repetitive modelling friction while preserving reflective design friction.", "arxiv_id": "2607.07521", "arxiv_url": "https://arxiv.org/abs/2607.07521", "authors": ["Ricardo Maia Avelino", "Rita Sevastjanova", "Tom Van Mele", "Philippe Block", "Mennatallah El-Assady"], "brief": "\u9488\u5bf9\u7ed3\u6784\u8bbe\u8ba1\u7b49\u521b\u610f\u9886\u57df\uff0c\u73b0\u6709\u751f\u6210\u5f0fAI\u8ffd\u6c42\u6d88\u9664\u6469\u64e6\u3001\u76f4\u63a5\u7ed9\u51fa\u7b54\u6848\u7684\u76ee\u6807\u4e0e\u8bbe\u8ba1\u5e08\u901a\u8fc7\u8fed\u4ee3\u63a2\u7d22\u53d1\u5c55\u521b\u610f\u7684\u9700\u6c42\u5b58\u5728\u9519\u4f4d\u3002\u672c\u6587\u63d0\u51fa\u57fa\u4e8e\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u4eba\u673a\u534f\u540c\u521b\u4f5c\u7cfb\u7edf\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u901a\u8fc7\u4e13\u5bb6\u7814\u7a76\u9a8c\u8bc1\u4e86\u8be5\u7cfb\u7edf\u5982\u4f55\u5728\u51cf\u5c11\u91cd\u590d\u5efa\u6a21\u6469\u64e6\u7684\u540c\u65f6\u4fdd\u7559\u4fc3\u8fdb\u521b\u610f\u7684\u53cd\u601d\u6027\u6469\u64e6\u3002", "categories": ["cs.HC", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07521", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u4eba\u673a\u4ea4\u4e92", "\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u521b\u610f\u8bbe\u8ba1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07521v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Creativity from Friction: Human-AI Interaction for Exploratory Structural Design", "tldr": "\u9488\u5bf9\u7ed3\u6784\u8bbe\u8ba1\u7b49\u521b\u610f\u9886\u57df\uff0c\u73b0\u6709\u751f\u6210\u5f0fAI\u8ffd\u6c42\u6d88\u9664\u6469\u64e6\u3001\u76f4\u63a5\u7ed9\u51fa\u7b54\u6848\u7684\u76ee\u6807\u4e0e\u8bbe\u8ba1\u5e08\u901a\u8fc7\u8fed\u4ee3\u63a2\u7d22\u53d1\u5c55\u521b\u610f\u7684\u9700\u6c42\u5b58\u5728\u9519\u4f4d\u3002\u672c\u6587\u63d0\u51fa\u57fa\u4e8e\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u4eba\u673a\u534f\u540c\u521b\u4f5c\u7cfb\u7edf\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u901a\u8fc7\u4e13\u5bb6\u7814\u7a76\u9a8c\u8bc1\u4e86\u8be5\u7cfb\u7edf\u5982\u4f55\u5728\u51cf\u5c11\u91cd\u590d\u5efa\u6a21\u6469\u64e6\u7684\u540c\u65f6\u4fdd\u7559\u4fc3\u8fdb\u521b\u610f\u7684\u53cd\u601d\u6027\u6469\u64e6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Generating signals on graphs requires permutation-equivariant models that exhibit stability with respect to relative structural perturbations. While favorable stability properties of Graph Neural Networks (GNNs) have been well documented, it is unclear how structural errors propagate through the dynamics of continuous generative flow models that are gaining traction for graph signal generation. In this paper, we analyze continuous normalized flow models parameterized by GNNs and show that permutation equivariance is preserved for both the resulting continuous-time ordinary differential equations and their discrete numerical approximations used as graph signal samplers. Our primary contribution is to derive explicit stability bounds on the generated probability distributions, which quantify how relative graph perturbations affect the final sampled signals. Motivated by these theoretical bounds, we introduce a stability-promoting regularized flow matching strategy that actively penalizes the spatial Lipschitz constant of the vector field during model training. Experiments using synthetic smooth signals on stochastic block model graphs and real-world fMRI signals on brain connectomes demonstrate that this bound-oriented approach yields generative models that are more robust to structural noise, without sacrificing output quality.", "arxiv_id": "2607.07510", "arxiv_url": "https://arxiv.org/abs/2607.07510", "authors": ["Martin Schmidt", "Gonzalo Mateos"], "brief": "\u672c\u6587\u5206\u6790\u4e86\u57fa\u4e8e\u56fe\u795e\u7ecf\u7f51\u7edc\u53c2\u6570\u5316\u7684\u8fde\u7eed\u5f52\u4e00\u5316\u6d41\u6a21\u578b\u5728\u56fe\u4fe1\u53f7\u751f\u6210\u4e2d\u7684\u7a33\u5b9a\u6027\uff0c\u63a8\u5bfc\u4e86\u56fe\u7ed3\u6784\u6270\u52a8\u5bf9\u751f\u6210\u6982\u7387\u5206\u5e03\u5f71\u54cd\u7684\u663e\u5f0f\u7a33\u5b9a\u6027\u754c\uff0c\u5e76\u63d0\u51fa\u4e86\u4e00\u79cd\u901a\u8fc7\u60e9\u7f5a\u5411\u91cf\u573a\u7a7a\u95f4Lipschitz\u5e38\u6570\u7684\u6b63\u5219\u5316\u6d41\u5339\u914d\u8bad\u7ec3\u7b56\u7565\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u5408\u6210\u4fe1\u53f7\u548c\u771f\u5b9efMRI\u8111\u8fde\u63a5\u7ec4\u6570\u636e\u4e0a\u5747\u80fd\u5728\u4e0d\u635f\u5931\u751f\u6210\u8d28\u91cf\u7684\u524d\u63d0\u4e0b\u663e\u8457\u63d0\u5347\u5bf9\u7ed3\u6784\u566a\u58f0\u7684\u9c81\u68d2\u6027\u3002", "categories": ["eess.SP", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07510", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u795e\u7ecf\u7f51\u7edc", "\u751f\u6210\u6a21\u578b", "\u56fe\u4fe1\u53f7\u5904\u7406", "\u7a33\u5b9a\u6027\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07510v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Stability of Flow Models for Graph Signals", "tldr": "\u672c\u6587\u5206\u6790\u4e86\u57fa\u4e8e\u56fe\u795e\u7ecf\u7f51\u7edc\u53c2\u6570\u5316\u7684\u8fde\u7eed\u5f52\u4e00\u5316\u6d41\u6a21\u578b\u5728\u56fe\u4fe1\u53f7\u751f\u6210\u4e2d\u7684\u7a33\u5b9a\u6027\uff0c\u63a8\u5bfc\u4e86\u56fe\u7ed3\u6784\u6270\u52a8\u5bf9\u751f\u6210\u6982\u7387\u5206\u5e03\u5f71\u54cd\u7684\u663e\u5f0f\u7a33\u5b9a\u6027\u754c\uff0c\u5e76\u63d0\u51fa\u4e86\u4e00\u79cd\u901a\u8fc7\u60e9\u7f5a\u5411\u91cf\u573a\u7a7a\u95f4Lipschitz\u5e38\u6570\u7684\u6b63\u5219\u5316\u6d41\u5339\u914d\u8bad\u7ec3\u7b56\u7565\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u5408\u6210\u4fe1\u53f7\u548c\u771f\u5b9efMRI\u8111\u8fde\u63a5\u7ec4\u6570\u636e\u4e0a\u5747\u80fd\u5728\u4e0d\u635f\u5931\u751f\u6210\u8d28\u91cf\u7684\u524d\u63d0\u4e0b\u663e\u8457\u63d0\u5347\u5bf9\u7ed3\u6784\u566a\u58f0\u7684\u9c81\u68d2\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Hallucinations in vision language models (VLMs) are commonly treated as semantic errors, yet they often arise from partial or ambiguous visual evidence. Prior work mainly focuses on detecting or suppressing hallucinations at generation time, leaving the
