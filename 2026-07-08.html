8GPT-5\u7cfb\u5217\u56db\u4e2a\u7248\u672c\u4e0a\u8fdb\u884c\u4e86\u9a8c\u8bc1\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\"\u90e8\u7f72\u6a21\u62df\"\u4f5c\u4e3a\u9884\u53d1\u5e03\u5b89\u5168\u8bc4\u4f30\u6846\u67b6\uff0c\u89e3\u51b3\u4e86\u4f20\u7edf\u8bc4\u4f30\u8986\u76d6\u4e0d\u8db3\u3001\u4e0d\u5177\u4ee3\u8868\u6027\u3001\u6613\u88ab\u6a21\u578b\u8bc6\u522b\u4e3a\u6d4b\u8bd5\u7b49\u6838\u5fc3\u75db\u70b9\uff0c\u5bf9AI\u5b89\u5168\u8bc4\u4f30\u4f53\u7cfb\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "AI agents deployed for IT operations are typically permanent cost centers because every execution requires full LLM inference, even for previously solved problems. This paper introduces progressive crystallization, a lifecycle that treats agent exploration as a discovery mechanism rather than a permanent execution model. It defines a three-stage execution taxonomy, from fully agent-orchestrated to hybrid to fully deterministic workflows, together with an evidence-based promotion mechanism that converts repeatedly validated agent behaviors into cheaper and more reproducible deterministic workflows, while automatically demoting workflows that regress. Evaluated on a production cloud networking AIOps system processing tens of thousands of incidents per month, the approach increased deterministic execution from 0% to 45% over eight months, reduced per-incident agent costs by more than 70% despite doubling incident volume, and improved safety through greater reproducibility and auditability. The paper also presents the execution taxonomy, promotion and demotion criteria, trace extraction methodology, economic model, safety considerations, and discusses limitations and threats to validity.", "arxiv_id": "2607.07052", "arxiv_url": "https://arxiv.org/abs/2607.07052", "authors": ["Arun Malik"], "brief": "\u63d0\u51fa\u300c\u6e10\u8fdb\u7ed3\u6676\u300d\u751f\u547d\u5468\u671f\u6846\u67b6\uff0c\u5c06AI\u667a\u80fd\u4f53\u7684\u63a2\u7d22\u8fc7\u7a0b\u89c6\u4e3a\u53d1\u73b0\u673a\u5236\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u6267\u884c\u5206\u7c7b\uff08\u5168\u667a\u80fd\u4f53\u2192\u6df7\u5408\u2192\u5168\u786e\u5b9a\u6027\uff09\u548c\u8bc1\u636e\u9a71\u52a8\u7684\u664b\u5347/\u964d\u7ea7\u673a\u5236\uff0c\u5c06\u53cd\u590d\u9a8c\u8bc1\u7684\u667a\u80fd\u4f53\u884c\u4e3a\u56fa\u5316\u4e3a\u66f4\u5ec9\u4ef7\u3001\u53ef\u590d\u73b0\u7684\u786e\u5b9a\u6027\u5de5\u4f5c\u6d41\u3002", "categories": ["cs.SE", "cs.AI", "cs.DC", "cs.ET", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07052", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u9636\u6bb5\u6267\u884c\u5206\u7c7b\u4f53\u7cfb\uff1a\u5168\u667a\u80fd\u4f53\u7f16\u6392\u3001\u6df7\u5408\u6267\u884c\u3001\u5168\u786e\u5b9a\u6027\u5de5\u4f5c\u6d41\uff0c\u652f\u6301\u81ea\u52a8\u664b\u5347\u4e0e\u964d\u7ea7", "\u5728\u5904\u7406\u6bcf\u6708\u6570\u4e07\u8d77\u4e8b\u4ef6\u7684\u4e91\u7f51\u7edcAIOps\u751f\u4ea7\u7cfb\u7edf\u4e2d\u9a8c\u8bc1\uff1a8\u4e2a\u6708\u5185\u786e\u5b9a\u6027\u6267\u884c\u7387\u4ece0%\u63d0\u5347\u81f345%", "\u5728\u4e8b\u4ef6\u91cf\u7ffb\u500d\u7684\u60c5\u51b5\u4e0b\uff0c\u6bcf\u6b21\u4e8b\u4ef6\u7684\u667a\u80fd\u4f53\u63a8\u7406\u6210\u672c\u964d\u4f4e\u8d85\u8fc770%\uff0c\u540c\u65f6\u63d0\u5347\u53ef\u5ba1\u8ba1\u6027\u4e0e\u5b89\u5168\u6027"], "keywords": ["\u667a\u80fd\u4f53", "AIOps", "\u5de5\u4f5c\u6d41\u81ea\u52a8\u5316", "\u6210\u672c\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07052v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Progressive Crystallization: Turning Agent Exploration into Deterministic, Lower-Cost Workflows in Production", "tldr": "\u6e10\u8fdb\u7ed3\u6676\u673a\u5236\u5c06AI\u667a\u80fd\u4f53\u63a2\u7d22\u884c\u4e3a\u8f6c\u5316\u4e3a\u786e\u5b9a\u6027\u5de5\u4f5c\u6d41\uff0c\u964d\u4f4e\u751f\u4ea7\u73af\u5883\u63a8\u7406\u6210\u672c70%\u4ee5\u4e0a", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u300c\u6e10\u8fdb\u7ed3\u6676\u300d\u751f\u547d\u5468\u671f\u6846\u67b6\uff0c\u5c06AI\u667a\u80fd\u4f53\u7684\u63a2\u7d22\u8fc7\u7a0b\u89c6\u4e3a\u53d1\u73b0\u673a\u5236\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u6267\u884c\u5206\u7c7b\uff08\u5168\u667a\u80fd\u4f53\u2192\u6df7\u5408\u2192\u5168\u786e\u5b9a\u6027\uff09\u548c\u8bc1\u636e\u9a71\u52a8\u7684\u664b\u5347/\u964d\u7ea7\u673a\u5236\uff0c\u5c06\u53cd\u590d\u9a8c\u8bc1\u7684\u667a\u80fd\u4f53\u884c\u4e3a\u56fa\u5316\u4e3a\u66f4\u5ec9\u4ef7\u3001\u53ef\u590d\u73b0\u7684\u786e\u5b9a\u6027\u5de5\u4f5c\u6d41\u3002", "why_notable": "\u76f4\u63a5\u89e3\u51b3LLM\u667a\u80fd\u4f53\u5728\u751f\u4ea7\u73af\u5883\u4e2d\u7684\u6301\u7eed\u9ad8\u6210\u672c\u75db\u70b9\uff0c\u63d0\u4f9b\u4e86\u4e00\u5957\u5c06\u63a2\u7d22\u6027\u667a\u80fd\u4f53\u884c\u4e3a\u7cfb\u7edf\u6027\u300c\u56fa\u5316\u300d\u4e3a\u4f4e\u6210\u672c\u786e\u5b9a\u6027\u6d41\u7a0b\u7684\u5de5\u7a0b\u5316\u65b9\u6cd5\uff0c\u5177\u6709\u663e\u8457\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u7ecf\u6d4e\u6548\u76ca\uff0c\u5e76\u5728\u771f\u5b9e\u5927\u89c4\u6a21AIOps\u7cfb\u7edf\u4e2d\u5f97\u5230\u9a8c\u8bc1\u3002"}, {"abstract": "How can we measure intelligence beyond human capability? Human-authored benchmarks saturate, and above human capability, examiners may not know which tasks are both hard and verifiable. We argue that this difficulty is inherent to absolute-scale evaluation and propose a new paradigm based on relative measurement in which models generate public challenges that separate other systems. Aggregating these outcomes yields an adversarial psychometric rating system that can scale with the systems being measured. We describe practical protocols that reduce incentives for private-information attacks, support judge-free adjudication, and naturally scale with agent capabilities. We instantiate the framework across verifiable and open-ended, non-verifiable domains, illustrating how model-generated evaluation can continue to measure systems beyond the human frontier.", "arxiv_id": "2607.07040", "arxiv_url": "https://arxiv.org/abs/2607.07040", "authors": ["Jerry Han", "Rafael Moschopoulos", "Ella Colby", "Vishrut Goyal", "Andrew Tu", "Kia Ghods", "Mark Braverman", "Elad Hazan"], "brief": "\u8bba\u6587\u63d0\u51fa\u4e00\u79cd\u65b0\u7684AI\u80fd\u529b\u8bc4\u4f30\u8303\u5f0f\uff1a\u8ba9\u6a21\u578b\u76f8\u4e92\u751f\u6210\u6311\u6218\u9898\u76ee\uff0c\u901a\u8fc7\u5bf9\u6297\u6027\u5fc3\u7406\u6d4b\u91cf\u8bc4\u7ea7\u7cfb\u7edf\u805a\u5408\u7ed3\u679c\uff0c\u4ece\u800c\u5728\u65e0\u9700\u4eba\u7c7b\u51fa\u9898\u7684\u60c5\u51b5\u4e0b\u6301\u7eed\u8861\u91cf\u8d85\u8d8a\u4eba\u7c7b\u6c34\u5e73\u7684AI\u7cfb\u7edf\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07040", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u601d\u8def\uff1a\u7528\"\u76f8\u5bf9\u6d4b\u91cf\"\u66ff\u4ee3\"\u7edd\u5bf9\u91cf\u8868\"\uff0c\u6a21\u578b\u4e92\u76f8\u751f\u6210\u516c\u5f00\u6311\u6218\u9898\u6765\u533a\u5206\u5f7c\u6b64\u80fd\u529b", "\u8bbe\u8ba1\u4e86\u51cf\u5c11\u79c1\u6709\u4fe1\u606f\u653b\u51fb\u6fc0\u52b1\u3001\u652f\u6301\u65e0\u88c1\u5224\u88c1\u51b3\u7684\u5b9e\u7528\u534f\u8bae\uff0c\u5e76\u80fd\u968f\u667a\u80fd\u4f53\u80fd\u529b\u81ea\u7136\u6269\u5c55", "\u6846\u67b6\u540c\u65f6\u9002\u7528\u4e8e\u53ef\u9a8c\u8bc1\u9886\u57df\uff08\u5982\u6570\u5b66\u3001\u4ee3\u7801\uff09\u548c\u5f00\u653e\u5f0f\u975e\u53ef\u9a8c\u8bc1\u9886\u57df\uff0c\u8986\u76d6\u8303\u56f4\u5e7f"], "keywords": ["\u667a\u80fd\u8bc4\u4f30", "\u57fa\u51c6\u6d4b\u8bd5", "\u667a\u80fd\u4f53", "\u5bf9\u6297\u6027\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07040v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Measuring Intelligence Beyond Human Scale", "tldr": "\u63d0\u51fa\u57fa\u4e8e\u76f8\u5bf9\u6d4b\u91cf\u7684\u5bf9\u6297\u6027\u5fc3\u7406\u6d4b\u91cf\u8bc4\u7ea7\u4f53\u7cfb\uff0c\u7a81\u7834\u4eba\u7c7b\u80fd\u529b\u4e0a\u9650\u7684AI\u667a\u80fd\u8bc4\u4f30\u74f6\u9888", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u4e00\u79cd\u65b0\u7684AI\u80fd\u529b\u8bc4\u4f30\u8303\u5f0f\uff1a\u8ba9\u6a21\u578b\u76f8\u4e92\u751f\u6210\u6311\u6218\u9898\u76ee\uff0c\u901a\u8fc7\u5bf9\u6297\u6027\u5fc3\u7406\u6d4b\u91cf\u8bc4\u7ea7\u7cfb\u7edf\u805a\u5408\u7ed3\u679c\uff0c\u4ece\u800c\u5728\u65e0\u9700\u4eba\u7c7b\u51fa\u9898\u7684\u60c5\u51b5\u4e0b\u6301\u7eed\u8861\u91cf\u8d85\u8d8a\u4eba\u7c7b\u6c34\u5e73\u7684AI\u7cfb\u7edf\u3002", "why_notable": "\u73b0\u6709\u57fa\u51c6\u6d4b\u8bd5\u56e0\u4eba\u7c7b\u80fd\u529b\u4e0a\u9650\u800c\u9971\u548c\uff0c\u8be5\u6846\u67b6\u4ece\u6839\u672c\u4e0a\u89e3\u51b3\u4e86\"\u8d85\u4ebaAI\u5982\u4f55\u88ab\u8bc4\u4f30\"\u7684\u5143\u95ee\u9898\uff0c\u4e3a\u672a\u6765AGI\u65f6\u4ee3\u7684\u80fd\u529b\u6d4b\u91cf\u63d0\u4f9b\u53ef\u6269\u5c55\u7684\u7406\u8bba\u57fa\u7840\u4e0e\u5b9e\u8df5\u534f\u8bae"}, {"abstract": "Steering robot foundation models (RFMs) toward new task variants or user-preferred behaviors remains challenging, often requiring additional robot demonstrations, task-specific fine-tuning, or long-context conditioning. We present WAM-TTT, a test-time training framework for steering world action models from raw human videos. Rather than treating human videos as trajectories to imitate, WAM-TTT absorbs them into a lightweight adaptive memory inside a frozen WAM through self-supervised video prediction. To make this memory useful for control, we introduce a meta-training stage that aligns human demonstrations with robot behaviors using paired human-robot data and a key--value memory reconstruction objective. At test time, only unlabeled human videos are required to adapt the memory, while the pretrained WAM remains frozen. This enables efficient and reusable steering without robot actions, human-side annotations, or task-specific fine-tuning, while preserving the generalization ability of the foundation model. Extensive experiments show that WAM-TTT consistently outperforms in-context human-video conditioning baselines across diverse manipulation tasks and generalization settings.", "arxiv_id": "2607.06988", "arxiv_url": "https://arxiv.org/abs/2607.06988", "authors": ["Yusen Feng", "Bingchen Han", "Jiangran Lyu", "Kai Liu", "Yixin Zheng", "Yuxuan Wan", "Weiheng Liu", "Sun Han", "Ruiqin Li", "Yulong Zhang", "Fangfu Liu", "Xuesong Shi", "Libin Liu", "Yizhou Wang", "Zhizheng Zhang", "He Wang"], "brief": "\u63d0\u51faWAM-TTT\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u76d1\u7763\u89c6\u9891\u9884\u6d4b\u5c06\u4eba\u7c7b\u64cd\u4f5c\u89c6\u9891\u5438\u6536\u8fdb\u8f7b\u91cf\u7ea7\u81ea\u9002\u5e94\u8bb0\u5fc6\u6a21\u5757\uff0c\u5728\u6d4b\u8bd5\u65f6\u65e0\u9700\u673a\u5668\u4eba\u52a8\u4f5c\u6807\u6ce8\u5373\u53ef\u5f15\u5bfc\u51bb\u7ed3\u7684\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\u5b8c\u6210\u65b0\u4efb\u52a1\u53d8\u4f53\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06988", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5f15\u5165\u5143\u8bad\u7ec3\u9636\u6bb5\uff0c\u5229\u7528\u914d\u5bf9\u4eba\u673a\u6570\u636e\u548c\u952e\u503c\u8bb0\u5fc6\u91cd\u5efa\u76ee\u6807\u5bf9\u9f50\u4eba\u7c7b\u4e0e\u673a\u5668\u4eba\u884c\u4e3a", "\u6d4b\u8bd5\u65f6\u4ec5\u9700\u65e0\u6807\u6ce8\u4eba\u7c7b\u89c6\u9891\u66f4\u65b0\u8bb0\u5fc6\uff0c\u9884\u8bad\u7ec3WAM\u4fdd\u6301\u51bb\u7ed3\uff0c\u65e0\u9700\u4efb\u52a1\u7279\u5b9a\u5fae\u8c03", "\u5728\u591a\u79cd\u64cd\u4f5c\u4efb\u52a1\u548c\u6cdb\u5316\u8bbe\u7f6e\u4e2d\u6301\u7eed\u4f18\u4e8e\u57fa\u4e8e\u4e0a\u4e0b\u6587\u4eba\u7c7b\u89c6\u9891\u6761\u4ef6\u5316\u7684\u57fa\u7ebf\u65b9\u6cd5"], "keywords": ["\u673a\u5668\u4eba\u5b66\u4e60", "\u4e16\u754c\u6a21\u578b", "\u6d4b\u8bd5\u65f6\u8bad\u7ec3", "\u6a21\u4eff\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06988v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "WAM-TTT: Steering World-Action Models by Watching Human Play at Test Time", "tldr": "\u5229\u7528\u4eba\u7c7b\u64cd\u4f5c\u89c6\u9891\u5728\u6d4b\u8bd5\u65f6\u8bad\u7ec3\uff0c\u65e0\u9700\u673a\u5668\u4eba\u52a8\u4f5c\u6807\u6ce8\u5373\u53ef\u5f15\u5bfc\u673a\u5668\u4eba\u57fa\u7840\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faWAM-TTT\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u76d1\u7763\u89c6\u9891\u9884\u6d4b\u5c06\u4eba\u7c7b\u64cd\u4f5c\u89c6\u9891\u5438\u6536\u8fdb\u8f7b\u91cf\u7ea7\u81ea\u9002\u5e94\u8bb0\u5fc6\u6a21\u5757\uff0c\u5728\u6d4b\u8bd5\u65f6\u65e0\u9700\u673a\u5668\u4eba\u52a8\u4f5c\u6807\u6ce8\u5373\u53ef\u5f15\u5bfc\u51bb\u7ed3\u7684\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\u5b8c\u6210\u65b0\u4efb\u52a1\u53d8\u4f53\u3002", "why_notable": "\u89e3\u51b3\u4e86\u673a\u5668\u4eba\u57fa\u7840\u6a21\u578b\u9002\u914d\u65b0\u4efb\u52a1\u9700\u8981\u5927\u91cf\u673a\u5668\u4eba\u6f14\u793a\u7684\u75db\u70b9\uff0c\u4ec5\u7528\u4eba\u7c7b\u89c6\u9891\u5373\u53ef\u9ad8\u6548\u5f15\u5bfc\uff0c\u5927\u5e45\u964d\u4f4e\u6570\u636e\u91c7\u96c6\u6210\u672c\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The quadratic cost of causal self-attention severely bottlenecks long-context transformer inference. While numerous post hoc linearization pipelines exist, it is difficult to identify which components preserve model quality. This work isolates the effect of state update design in a strict frozen-backbone regime. We show that softmax relies on key-dependent, rank-1 orthogonal projections, elucidating why delta-style networks outperform purely gated accumulation. We identify a potential source of approximation errors and introduce structural interventions, specifically sink tokens, short convolutions, and fixed-budget cache routing, which reduces the remaining gap. We scale this linearization approach across LLaMA and Qwen models up to 32B parameters, outperforming prior post hoc baselines on MMLU and matching the long-context retrieval of complex adaptive-caching frameworks.", "arxiv_id": "2607.07706", "arxiv_url": "https://arxiv.org/abs/2607.07706", "authors": ["Anna Kuzina", "Paul N. Whatmough", "Babak Ehteshami Bejnordi"], "brief": "\u672c\u6587\u5728\u51bb\u7ed3\u9aa8\u5e72\u7f51\u7edc\u7684\u4e25\u683c\u6761\u4ef6\u4e0b\uff0c\u7cfb\u7edf\u5206\u6790softmax\u6ce8\u610f\u529b\u7684\u6570\u5b66\u672c\u8d28\uff08\u4f9d\u8d56\u952e\u7684\u79e9-1\u6b63\u4ea4\u6295\u5f71\uff09\uff0c\u63ed\u793adelta\u98ce\u683c\u7f51\u7edc\u4f18\u4e8e\u7eaf\u95e8\u63a7\u7d2f\u79ef\u7684\u539f\u56e0\uff0c\u5e76\u5f15\u5165sink token\u3001\u77ed\u5377\u79ef\u548c\u56fa\u5b9a\u9884\u7b97\u7f13\u5b58\u8def\u7531\u7b49\u7ed3\u6784\u5e72\u9884\u624b\u6bb5\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u7684\u540e\u9a8c\u7ebf\u6027\u5316\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07706", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u63ed\u793asoftmax\u6ce8\u610f\u529b\u4f9d\u8d56\u952e\u76f8\u5173\u7684\u79e9-1\u6b63\u4ea4\u6295\u5f71\u673a\u5236\uff0c\u4ece\u7406\u8bba\u4e0a\u89e3\u91cadelta\u98ce\u683c\u7f51\u7edc\u7684\u4f18\u8d8a\u6027", "\u5f15\u5165\u4e09\u9879\u7ed3\u6784\u5e72\u9884\uff1asink tokens\u3001\u77ed\u5377\u79ef\u3001\u56fa\u5b9a\u9884\u7b97\u7f13\u5b58\u8def\u7531\uff0c\u6709\u6548\u51cf\u5c11\u7ebf\u6027\u5316\u8fd1\u4f3c\u8bef\u5dee", "\u5728LLaMA\u548cQwen\u7cfb\u5217\u6a21\u578b\uff08\u6700\u592732B\u53c2\u6570\uff09\u4e0a\u9a8c\u8bc1\uff0cMMLU\u8d85\u8d8a\u73b0\u6709\u540e\u9a8c\u7ebf\u6027\u5316\u57fa\u7ebf\uff0c\u957f\u4e0a\u4e0b\u6587\u68c0\u7d22\u80fd\u529b\u4e0e\u590d\u6742\u81ea\u9002\u5e94\u7f13\u5b58\u6846\u67b6\u6301\u5e73"], "keywords": ["\u7ebf\u6027\u6ce8\u610f\u529b", "Transformer\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u957f\u4e0a\u4e0b\u6587"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07706v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "The Key to Going Linear: Analysis-Driven Transformer Linearization", "tldr": "\u5206\u6790\u9a71\u52a8\u7684Transformer\u7ebf\u6027\u5316\u65b9\u6cd5\uff0c\u51bb\u7ed3\u4e3b\u5e72\u7f51\u7edc\u5e76\u4f18\u5316\u72b6\u6001\u66f4\u65b0\u8bbe\u8ba1\uff0c\u572832B\u53c2\u6570\u6a21\u578b\u4e0a\u8d85\u8d8a\u73b0\u6709\u57fa\u7ebf", "upvotes": 0, "what_it_is": "\u672c\u6587\u5728\u51bb\u7ed3\u9aa8\u5e72\u7f51\u7edc\u7684\u4e25\u683c\u6761\u4ef6\u4e0b\uff0c\u7cfb\u7edf\u5206\u6790softmax\u6ce8\u610f\u529b\u7684\u6570\u5b66\u672c\u8d28\uff08\u4f9d\u8d56\u952e\u7684\u79e9-1\u6b63\u4ea4\u6295\u5f71\uff09\uff0c\u63ed\u793adelta\u98ce\u683c\u7f51\u7edc\u4f18\u4e8e\u7eaf\u95e8\u63a7\u7d2f\u79ef\u7684\u539f\u56e0\uff0c\u5e76\u5f15\u5165sink token\u3001\u77ed\u5377\u79ef\u548c\u56fa\u5b9a\u9884\u7b97\u7f13\u5b58\u8def\u7531\u7b49\u7ed3\u6784\u5e72\u9884\u624b\u6bb5\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u7684\u540e\u9a8c\u7ebf\u6027\u5316\u3002", "why_notable": "\u5c06\u4e8c\u6b21\u590d\u6742\u5ea6\u6ce8\u610f\u529b\u7ebf\u6027\u5316\u662f\u957f\u4e0a\u4e0b\u6587\u63a8\u7406\u7684\u6838\u5fc3\u6311\u6218\uff0c\u672c\u6587\u901a\u8fc7\u4e25\u683c\u7684\u7406\u8bba\u5206\u6790\u6307\u5bfc\u5de5\u7a0b\u8bbe\u8ba1\uff0c\u5728\u5927\u89c4\u6a21\u6a21\u578b\u4e0a\u53d6\u5f97\u5b9e\u8d28\u6027\u8fdb\u5c55\uff0c\u4e3a\u5de5\u4e1a\u754c\u90e8\u7f72\u957f\u4e0a\u4e0b\u6587LLM\u63d0\u4f9b\u4e86\u5b9e\u7528\u8def\u5f84"}, {"abstract": "Group Relative Policy Optimization (GRPO) stalls on a model\u0027s hardest problems: when no rollout in a group succeeds, the group-relative advantages vanish and the problem contributes no gradient, wasting the frontier examples we most want to learn from. Prepending a correct prefix of a reference solution raises the success rate, making prefix length a continuous knob on difficulty. Concurrent methods set the knob once; AdaPrefix-GRPO turns it into a feedback controller: throughout training it adjusts how much of the solution each problem gets, holding its success rate near 50%, where GRPO\u0027s gradient signal is largest, then withdraws the assistance entirely, so the deployed model solves problems unaided. On hard math, at matched training FLOPs, it more than doubles GRPO\u0027s accuracy on held-out problems from the training distribution for a 0.6B model (2.1x), with 1.6x on Qwen3-1.7B and 1.7x on AIME, while roughly halving trace length. The method is implemented in data preparation plus a loss mask on prefix tokens; the trainer is otherwise stock. The smaller the model, the larger the gain.", "arxiv_id": "2607.07674", "arxiv_url": "https://arxiv.org/abs/2607.07674", "authors": ["Vladislav Beliaev"], "brief": "\u63d0\u51faAdaPrefix-GRPO\u65b9\u6cd5\uff0c\u901a\u8fc7\u52a8\u6001\u8c03\u6574\u53c2\u8003\u89e3\u524d\u7f00\u957f\u5ea6\u4f5c\u4e3a\u53cd\u9988\u63a7\u5236\u5668\uff0c\u4f7f\u6bcf\u9053\u96be\u9898\u7684\u6210\u529f\u7387\u7ef4\u6301\u5728\u7ea650%\uff08\u68af\u5ea6\u4fe1\u53f7\u6700\u5927\u5904\uff09\uff0c\u8bad\u7ec3\u7ed3\u675f\u540e\u64a4\u9664\u8f85\u52a9\uff0c\u8ba9\u6a21\u578b\u72ec\u7acb\u6c42\u89e3\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07674", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u95ee\u9898\uff1aGRPO\u5728\u6781\u96be\u9898\u4e0a\u6240\u6709rollout\u5747\u5931\u8d25\u65f6\u4f18\u52bf\u503c\u5f52\u96f6\uff0c\u68af\u5ea6\u6d88\u5931\uff0c\u6d6a\u8d39\u6700\u6709\u4ef7\u503c\u7684\u8bad\u7ec3\u6837\u672c", "\u81ea\u9002\u5e94\u63a7\u5236\uff1a\u52a8\u6001\u8c03\u6574\u524d\u7f00\u957f\u5ea6\u4f7f\u6bcf\u9898\u6210\u529f\u7387\u4fdd\u6301~50%\uff0c\u8bad\u7ec3\u540e\u671f\u9010\u6b65\u64a4\u9664\u524d\u7f00\uff0c\u90e8\u7f72\u65f6\u6a21\u578b\u5b8c\u5168\u81ea\u4e3b", "\u5b9e\u9a8c\u6548\u679c\uff1a0.6B\u6a21\u578b\u51c6\u786e\u7387\u63d0\u53472.1\u500d\uff0cQwen3-1.7B\u63d0\u53471.6\u500d\uff0cAIME\u63d0\u53471.7\u500d\uff0c\u63a8\u7406\u94fe\u957f\u5ea6\u51cf\u5c11\u7ea6\u4e00\u534a\uff0c\u4e14\u6a21\u578b\u8d8a\u5c0f\u6536\u76ca\u8d8a\u5927"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u63a8\u7406", "\u6570\u5b66", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07674v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Max Out GRPO Signal: Adaptive Trace Prefix Control for Hard Reasoning Problems", "tldr": "AdaPrefix-GRPO\u901a\u8fc7\u81ea\u9002\u5e94\u524d\u7f00\u63a7\u5236\u89e3\u51b3GRPO\u5728\u96be\u9898\u4e0a\u68af\u5ea6\u6d88\u5931\u95ee\u9898\uff0c\u663e\u8457\u63d0\u5347\u5c0f\u6a21\u578b\u6570\u5b66\u63a8\u7406\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faAdaPrefix-GRPO\u65b9\u6cd5\uff0c\u901a\u8fc7\u52a8\u6001\u8c03\u6574\u53c2\u8003\u89e3\u524d\u7f00\u957f\u5ea6\u4f5c\u4e3a\u53cd\u9988\u63a7\u5236\u5668\uff0c\u4f7f\u6bcf\u9053\u96be\u9898\u7684\u6210\u529f\u7387\u7ef4\u6301\u5728\u7ea650%\uff08\u68af\u5ea6\u4fe1\u53f7\u6700\u5927\u5904\uff09\uff0c\u8bad\u7ec3\u7ed3\u675f\u540e\u64a4\u9664\u8f85\u52a9\uff0c\u8ba9\u6a21\u578b\u72ec\u7acb\u6c42\u89e3\u3002", "why_notable": "\u4ee5\u6781\u4f4e\u5de5\u7a0b\u6210\u672c\uff08\u4ec5\u6570\u636e\u9884\u5904\u7406+loss mask\uff09\u89e3\u51b3GRPO\u5728\u96be\u9898\u4e0a\u7684\u6839\u672c\u6027\u68af\u5ea6\u6d88\u5931\u7f3a\u9677\uff0c\u5bf9\u5c0f\u6a21\u578b\u6570\u5b66\u63a8\u7406\u80fd\u529b\u63d0\u5347\u663e\u8457\uff0c\u5177\u6709\u5f88\u5f3a\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Linear attention models allow a fixed state size and a fixed amount of compute per token. However, due to their limited state size, linear attention models fall behind in long-context recall compared to softmax-attention-based transformer architectures. Increasing the state size of linear attention improves recall performance but at the cost of higher FLOPs. In this work, we introduce Sparse Delta Memory (SDM), an architecture that scales the hidden state of gated linear RNNs to orders of magnitude higher capacity using a sparse addressing scheme. SDM extends the Gated DeltaNet architecture by replacing the dense key-value outer product with sparse reads and writes to a large explicit memory. We show that, under an isoFLOP constraint and with an identical number of parameters, a higher state memory capacity significantly improves performance on in-context learning and long-context retrieval tasks. Moreover, by learning the initial state of the SDM memory and therefore using it as a parametric memory, we show that the model further improves on a wide range of common-knowledge and reasoning tasks.", "arxiv_id": "2607.07386", "arxiv_url": "https://arxiv.org/abs/2607.07386", "authors": ["Lo\u00efc Cabannes", "Pierre-Emmanuel Mazar\u00e9", "Gergely Szilvasy", "Matthijs Douze", "Maria Lomeli", "Ilze Amanda Auzina", "Justin Carpentier", "Gabriel Synnaeve", "Herv\u00e9 J\u00e9gou"], "brief": "\u63d0\u51faSparse Delta Memory\uff08SDM\uff09\u67b6\u6784\uff0c\u901a\u8fc7\u7a00\u758f\u8bfb\u5199\u66ff\u4ee3\u5bc6\u96c6\u952e\u503c\u5916\u79ef\uff0c\u5c06\u95e8\u63a7\u7ebf\u6027RNN\u7684\u9690\u72b6\u6001\u6269\u5c55\u81f3\u6781\u5927\u5bb9\u91cf\uff0c\u540c\u65f6\u4fdd\u6301\u8ba1\u7b97\u91cf\u4e0d\u53d8\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07386", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5728Gated DeltaNet\u57fa\u7840\u4e0a\uff0c\u7528\u7a00\u758f\u5bfb\u5740\u65b9\u6848\u66ff\u6362\u5bc6\u96c6\u5916\u79ef\uff0c\u4f7f\u663e\u5f0f\u8bb0\u5fc6\u5bb9\u91cf\u63d0\u5347\u6570\u91cf\u7ea7", "isoFLOP\u7ea6\u675f\u4e0b\uff0cSDM\u5728\u4e0a\u4e0b\u6587\u5b66\u4e60\u548c\u957f\u4e0a\u4e0b\u6587\u68c0\u7d22\u4efb\u52a1\u4e0a\u663e\u8457\u4f18\u4e8e\u539f\u59cb\u7ebf\u6027\u6ce8\u610f\u529b\u6a21\u578b", "\u901a\u8fc7\u5b66\u4e60SDM\u8bb0\u5fc6\u7684\u521d\u59cb\u72b6\u6001\u4f5c\u4e3a\u53c2\u6570\u5316\u8bb0\u5fc6\uff0c\u8fdb\u4e00\u6b65\u63d0\u5347\u5e38\u8bc6\u63a8\u7406\u7b49\u901a\u7528\u4efb\u52a1\u6027\u80fd"], "keywords": ["\u7ebf\u6027\u6ce8\u610f\u529b", "\u5faa\u73af\u795e\u7ecf\u7f51\u7edc", "\u957f\u4e0a\u4e0b\u6587", "\u7a00\u758f\u8bb0\u5fc6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07386v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Sparse Delta Memory: Scaling the State of Linear RNNs through Sparsity", "tldr": "\u7a00\u758f\u5bfb\u5740\u673a\u5236\u5c06\u7ebf\u6027RNN\u9690\u72b6\u6001\u5bb9\u91cf\u63d0\u5347\u6570\u91cf\u7ea7\uff0c\u540c\u7b49FLOPs\u4e0b\u663e\u8457\u6539\u5584\u957f\u4e0a\u4e0b\u6587\u53ec\u56de", "upvotes": 0, "what_it_is": "\u63d0\u51faSparse Delta Memory\uff08SDM\uff09\u67b6\u6784\uff0c\u901a\u8fc7\u7a00\u758f\u8bfb\u5199\u66ff\u4ee3\u5bc6\u96c6\u952e\u503c\u5916\u79ef\uff0c\u5c06\u95e8\u63a7\u7ebf\u6027RNN\u7684\u9690\u72b6\u6001\u6269\u5c55\u81f3\u6781\u5927\u5bb9\u91cf\uff0c\u540c\u65f6\u4fdd\u6301\u8ba1\u7b97\u91cf\u4e0d\u53d8\u3002", "why_notable": "\u89e3\u51b3\u4e86\u7ebf\u6027\u6ce8\u610f\u529b\u6a21\u578b\u957f\u4e0a\u4e0b\u6587\u53ec\u56de\u80fd\u529b\u5f31\u7684\u6838\u5fc3\u74f6\u9888\uff0c\u5728\u4e0d\u589e\u52a0FLOPs\u7684\u524d\u63d0\u4e0b\u5927\u5e45\u6269\u5c55\u72b6\u6001\u5bb9\u91cf\uff0c\u4e3a\u7ebf\u6027RNN\u4e0eTransformer\u7684\u7ade\u4e89\u63d0\u4f9b\u65b0\u8def\u5f84\uff0c\u4e14\u53c2\u6570\u5316\u8bb0\u5fc6\u673a\u5236\u5177\u6709\u989d\u5916\u7684\u77e5\u8bc6\u5b58\u50a8\u6f5c\u529b\u3002"}, {"abstract": "Claims about the universality of human concepts have been predominantly assessed through linguistic similarity across languages and cultures. However, words are effective as communication devices because they compress rich experiential variation into shared conventions, potentially obscuring hidden individual and cultural differences in how concepts are mentally represented. Here, we analyse 2.6 billion human-made sketches of common concepts from 236 countries and territories to examine conceptual structure through people\u0027s visual imagination. Consistent with recent work on image-based cognition, we find that single concepts unfold into multiple distinct visual exemplars, revealing latent information about similarities and differences in conceptual structure across cultures. This variation is strongest for concepts involving haptic interaction, suggesting that visual imagery reflects variation in embodied experience as much as conventional definitions. Comparing embedding models of sketches with word embedding models across languages, we find that their geometries diverge, with visual representations preserving rich semantic and cultural structure that language models compress. Cross-cultural similarities derived from sketches align 45% more closely with established cultural distances than do text-based measures. Together, these results suggest that patterns of human conceptual universality may depend critically on the modality through which concepts are measured, with large-scale sketching providing a direct, high-resolution probe of conceptual diversity across embodied and cultural dimensions of thought.", "arxiv_id": "2607.07267", "arxiv_url": "https://arxiv.org/abs/2607.07267", "authors": ["Arianna Pera", "Mauro Martino", "Nima Dehmamy", "Douglas Guilbeault", "Luca Maria Aiello", "Andrea Baronchelli"], "brief": "\u901a\u8fc7\u5206\u6790\u6765\u81ea236\u4e2a\u56fd\u5bb6/\u5730\u533a\u768426\u4ebf\u5f20\u4eba\u7c7b\u624b\u7ed8\u8349\u56fe\uff0c\u7814\u7a76\u89c6\u89c9\u60f3\u8c61\u4e2d\u7684\u6982\u5ff5\u7ed3\u6784\uff0c\u53d1\u73b0\u8bed\u8a00\u538b\u7f29\u4e86\u6982\u5ff5\u7684\u4e30\u5bcc\u53d8\u5f02\uff0c\u800c\u8349\u56fe\u80fd\u66f4\u9ad8\u5206\u8fa8\u7387\u5730\u63ed\u793a\u8de8\u6587\u5316\u6982\u5ff5\u5dee\u5f02\u3002", "categories": ["cs.CY", "cs.CL", "physics.soc-ph"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07267", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u8349\u56fe\u5d4c\u5165\u6a21\u578b\u4e0e\u8bcd\u5d4c\u5165\u6a21\u578b\u7684\u51e0\u4f55\u7ed3\u6784\u5b58\u5728\u663e\u8457\u5206\u6b67\uff0c\u89c6\u89c9\u8868\u5f81\u4fdd\u7559\u4e86\u8bed\u8a00\u6a21\u578b\u6240\u538b\u7f29\u7684\u8bed\u4e49\u4e0e\u6587\u5316\u7ed3\u6784", "\u57fa\u4e8e\u8349\u56fe\u7684\u8de8\u6587\u5316\u76f8\u4f3c\u5ea6\u6bd4\u6587\u672c\u6d4b\u91cf\u4e0e\u5df2\u77e5\u6587\u5316\u8ddd\u79bb\u7684\u543b\u5408\u5ea6\u9ad8\u51fa45%", "\u6982\u5ff5\u5dee\u5f02\u5728\u6d89\u53ca\u89e6\u89c9\u4ea4\u4e92\u7684\u6982\u5ff5\u4e0a\u6700\u4e3a\u663e\u8457\uff0c\u8868\u660e\u89c6\u89c9\u610f\u8c61\u53cd\u6620\u4e86\u5177\u8eab\u7ecf\u9a8c\u7684\u53d8\u5f02"], "keywords": ["\u591a\u6a21\u6001", "\u8de8\u6587\u5316\u8ba4\u77e5", "\u6982\u5ff5\u8868\u5f81", "\u8ba1\u7b97\u793e\u4f1a\u79d1\u5b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07267v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Billions of Sketches Reveal Hidden Cultural Variation in Human Concepts", "tldr": "\u5206\u679026\u4ebf\u5f20\u8349\u56fe\u63ed\u793a\u4eba\u7c7b\u6982\u5ff5\u5b58\u5728\u88ab\u8bed\u8a00\u63a9\u76d6\u7684\u8de8\u6587\u5316\u5dee\u5f02", "upvotes": 0, "what_it_is": "\u901a\u8fc7\u5206\u6790\u6765\u81ea236\u4e2a\u56fd\u5bb6/\u5730\u533a\u768426\u4ebf\u5f20\u4eba\u7c7b\u624b\u7ed8\u8349\u56fe\uff0c\u7814\u7a76\u89c6\u89c9\u60f3\u8c61\u4e2d\u7684\u6982\u5ff5\u7ed3\u6784\uff0c\u53d1\u73b0\u8bed\u8a00\u538b\u7f29\u4e86\u6982\u5ff5\u7684\u4e30\u5bcc\u53d8\u5f02\uff0c\u800c\u8349\u56fe\u80fd\u66f4\u9ad8\u5206\u8fa8\u7387\u5730\u63ed\u793a\u8de8\u6587\u5316\u6982\u5ff5\u5dee\u5f02\u3002", "why_notable": "\u9996\u6b21\u4ee5\u5341\u4ebf\u7ea7\u8349\u56fe\u6570\u636e\u4e3a\u63a2\u9488\uff0c\u6311\u6218\u4e86\u6982\u5ff5\u666e\u904d\u6027\u7684\u8bed\u8a00\u4e2d\u5fc3\u4e3b\u4e49\u5047\u8bbe\uff0c\u4e3a\u8de8\u6587\u5316\u8ba4\u77e5\u7814\u7a76\u63d0\u4f9b\u4e86\u5168\u65b0\u7684\u591a\u6a21\u6001\u89c6\u89d2\uff0c\u5bf9\u8ba4\u77e5\u79d1\u5b66\u3001\u6587\u5316\u7814\u7a76\u548cAI\u8bed\u4e49\u8868\u5f81\u5747\u6709\u91cd\u8981\u542f\u793a\u3002"}, {"abstract": "Despite the recent promise in robot control, video generative models suffer from a domain mismatch due to their primary focus on content creation. For example, their design inherently prioritizes visual fidelity and creativity over computational efficiency and physical realism. In this work, we present LingBot-Video, a DiT-based video pretraining paradigm specifically tailored for embodied intelligence. From the architecture perspective, we adopt the Mixture-of-Experts (MoE), instead of dense, framework to achieve a better trade-off between modeling capacity and inference efficiency, and manage to scale it up from scratch. From the data perspective, we construct a data profiling engine that augments standard internet videos with extensive robot-oriented footage, encompassing manipulation, navigation, and egocentric perspectives, to equip the base model with an intrinsic understanding of actions and world dynamics. From the training perspective, we develop a multi-dimensional reward system to enforce the alignment regarding physical rationality and task completion, going beyond standard criteria such as aesthetics, prompt-following, and motion consistency. Comprehensive evaluations validate its performance and efficiency as a video foundation model. We contribute LingBot-Video as the inaugural large-scale, open-source MoE video foundation model to the community, in a pioneering effort to bridge digital creativity and physical actuation.", "arxiv_id": "2607.07675", "arxiv_url": "https://arxiv.org/abs/2607.07675", "authors": ["Shuailei Ma", "Jiaqi Liao", "Xinyang Wang", "Jingjing Wang", "Chaoran Feng", "Zijing Hu", "Chong Bao", "Zichen Xi", "Yuqi Gan", "Weisen Wang", "Yanhong Zeng", "Qin Zhao", "Zifan Shi", "Wei Wu", "Hao Ouyang", "Qiuyu Wang", "Shangzhan Zhang", "Jiahao Shao", "Yipengjing Sun", "Liangxiao Hu", "Lunke Pan", "Nan Xue", "Kecheng Zheng", "Yinghao Xu", "Xing Zhu", "Yujun Shen", "Ka Leong Cheng"], "brief": "\u63d0\u51faLingBot-Video\uff0c\u4e00\u4e2a\u57fa\u4e8eDiT\u67b6\u6784\u7684\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09\u89c6\u9891\u9884\u8bad\u7ec3\u8303\u5f0f\uff0c\u4e13\u4e3a\u5177\u8eab\u667a\u80fd\u8bbe\u8ba1\uff0c\u901a\u8fc7\u6570\u636e\u589e\u5f3a\u3001\u591a\u7ef4\u5956\u52b1\u7cfb\u7edf\u548cMoE\u67b6\u6784\uff0c\u4f7f\u89c6\u9891\u751f\u6210\u6a21\u578b\u5177\u5907\u7269\u7406\u52a8\u4f5c\u7406\u89e3\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07675", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528MoE\u66ff\u4ee3\u5bc6\u96c6Transformer\u67b6\u6784\uff0c\u5728\u5efa\u6a21\u80fd\u529b\u4e0e\u63a8\u7406\u6548\u7387\u4e4b\u95f4\u53d6\u5f97\u66f4\u4f18\u5e73\u8861\uff0c\u5e76\u4ece\u96f6\u5f00\u59cb\u5927\u89c4\u6a21\u8bad\u7ec3", "\u6784\u5efa\u6570\u636e\u753b\u50cf\u5f15\u64ce\uff0c\u5c06\u4e92\u8054\u7f51\u89c6\u9891\u4e0e\u673a\u5668\u4eba\u64cd\u4f5c\u3001\u5bfc\u822a\u3001\u7b2c\u4e00\u89c6\u89d2\u7b49\u4e13\u9879\u6570\u636e\u878d\u5408\uff0c\u589e\u5f3a\u6a21\u578b\u5bf9\u52a8\u4f5c\u548c\u4e16\u754c\u52a8\u529b\u5b66\u7684\u7406\u89e3", "\u8bbe\u8ba1\u591a\u7ef4\u5956\u52b1\u7cfb\u7edf\uff0c\u5728\u7f8e\u5b66\u3001\u63d0\u793a\u8ddf\u968f\u7b49\u6807\u51c6\u4e4b\u5916\u989d\u5916\u7ea6\u675f\u7269\u7406\u5408\u7406\u6027\u4e0e\u4efb\u52a1\u5b8c\u6210\u5ea6\uff0c\u63d0\u5347\u7269\u7406\u771f\u5b9e\u6027"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u89c6\u9891\u751f\u6210", "\u6df7\u5408\u4e13\u5bb6", "\u4e16\u754c\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07675v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Scaling Mixture-of-Experts Video Pretraining for Embodied Intelligence", "tldr": "\u9762\u5411\u5177\u8eab\u667a\u80fd\u7684MoE\u89c6\u9891\u9884\u8bad\u7ec3\u6a21\u578bLingBot-Video\uff0c\u517c\u987e\u7269\u7406\u771f\u5b9e\u6027\u4e0e\u63a8\u7406\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faLingBot-Video\uff0c\u4e00\u4e2a\u57fa\u4e8eDiT\u67b6\u6784\u7684\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09\u89c6\u9891\u9884\u8bad\u7ec3\u8303\u5f0f\uff0c\u4e13\u4e3a\u5177\u8eab\u667a\u80fd\u8bbe\u8ba1\uff0c\u901a\u8fc7\u6570\u636e\u589e\u5f3a\u3001\u591a\u7ef4\u5956\u52b1\u7cfb\u7edf\u548cMoE\u67b6\u6784\uff0c\u4f7f\u89c6\u9891\u751f\u6210\u6a21\u578b\u5177\u5907\u7269\u7406\u52a8\u4f5c\u7406\u89e3\u80fd\u529b\u3002", "why_notable": "\u9996\u4e2a\u5f00\u6e90\u5927\u89c4\u6a21MoE\u89c6\u9891\u57fa\u7840\u6a21\u578b\uff0c\u586b\u8865\u4e86\u89c6\u9891\u751f\u6210\u6a21\u578b\u5728\u5177\u8eab\u667a\u80fd\u9886\u57df\u7684\u9886\u57df\u9e3f\u6c9f\uff0c\u4e3a\u673a\u5668\u4eba\u63a7\u5236\u63d0\u4f9b\u9ad8\u6548\u4e14\u7269\u7406\u611f\u77e5\u7684\u89c6\u9891\u9884\u8bad\u7ec3\u57fa\u7840\u3002"}, {"abstract": "Why does contrastive learning with simple images and augmentations yield useful representations for downstream tasks? We address this question by analytically computing the optimal representation in terms of a contrastive loss for a range of basic augmentations and any image dataset with stationary statistics. We show that for certain augmentations the optimum can be attained by a CNN whose first layer filters are sinusoids, followed by a pointwise nonlinearity, global average pooling, and a final linear layer that performs partial whitening. We also show that the optimal weights in such CNNs for more complicated augmentations are still sinusoids. The frequencies of the sinusoids and their weights can be computed using a simple waterfilling algorithm given the dataset\u0027s expected power spectrum. Experiments with different image datasets and augmentations show that such CNNs trained with SGD empirically learn sinusoids in their first layer and to perform partial whitening", "arxiv_id": "2607.07470", "arxiv_url": "https://arxiv.org/abs/2607.07470", "authors": ["Antonio Torralba", "Yair Weiss"], "brief": "\u672c\u6587\u901a\u8fc7\u89e3\u6790\u8ba1\u7b97\uff0c\u63ed\u793a\u4e86\u5bf9\u6bd4\u5b66\u4e60\u5728\u81ea\u7136\u56fe\u50cf\u4e0a\u4e3a\u4f55\u6709\u6548\uff1a\u5bf9\u4e8e\u591a\u79cd\u57fa\u7840\u6570\u636e\u589e\u5f3a\u65b9\u5f0f\uff0c\u6700\u4f18\u8868\u793a\u53ef\u7531\u7b2c\u4e00\u5c42\u4e3a\u6b63\u5f26\u6ee4\u6ce2\u5668\u7684CNN\u5b9e\u73b0\uff0c\u540e\u63a5\u9010\u70b9\u975e\u7ebf\u6027\u3001\u5168\u5c40\u5e73\u5747\u6c60\u5316\u548c\u6267\u884c\u90e8\u5206\u767d\u5316\u7684\u7ebf\u6027\u5c42\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07470", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6700\u4f18\u5bf9\u6bd4\u8868\u793a\u7684\u7b2c\u4e00\u5c42\u6ee4\u6ce2\u5668\u4e3a\u6b63\u5f26\u51fd\u6570\uff0c\u5176\u9891\u7387\u548c\u6743\u91cd\u53ef\u901a\u8fc7\u6570\u636e\u96c6\u671f\u671b\u529f\u7387\u8c31\u7528\u6ce8\u6c34\u7b97\u6cd5\uff08waterfilling\uff09\u8ba1\u7b97\u5f97\u51fa", "\u5bf9\u66f4\u590d\u6742\u7684\u6570\u636e\u589e\u5f3a\uff0c\u6700\u4f18CNN\u6743\u91cd\u4ecd\u4e3a\u6b63\u5f26\u6ee4\u6ce2\u5668\uff0c\u7406\u8bba\u7ed3\u8bba\u5177\u6709\u666e\u9002\u6027", "\u5b9e\u9a8c\u9a8c\u8bc1\uff1a\u7528SGD\u8bad\u7ec3\u7684CNN\u5728\u7b2c\u4e00\u5c42\u786e\u5b9e\u7ecf\u9a8c\u6027\u5730\u5b66\u5230\u6b63\u5f26\u6ee4\u6ce2\u5668\u5e76\u6267\u884c\u90e8\u5206\u767d\u5316\uff0c\u4e0e\u7406\u8bba\u9884\u6d4b\u543b\u5408"], "keywords": ["\u5bf9\u6bd4\u5b66\u4e60", "\u8868\u793a\u5b66\u4e60", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u7406\u8bba\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07470v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "A Theory of Contrastive Learning with Natural Images", "tldr": "\u7406\u8bba\u5206\u6790\u5bf9\u6bd4\u5b66\u4e60\u6700\u4f18\u8868\u793a\uff0c\u8bc1\u660e\u5176\u672c\u8d28\u662f\u6b63\u5f26\u6ee4\u6ce2\u5668\u52a0\u90e8\u5206\u767d\u5316", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7\u89e3\u6790\u8ba1\u7b97\uff0c\u63ed\u793a\u4e86\u5bf9\u6bd4\u5b66\u4e60\u5728\u81ea\u7136\u56fe\u50cf\u4e0a\u4e3a\u4f55\u6709\u6548\uff1a\u5bf9\u4e8e\u591a\u79cd\u57fa\u7840\u6570\u636e\u589e\u5f3a\u65b9\u5f0f\uff0c\u6700\u4f18\u8868\u793a\u53ef\u7531\u7b2c\u4e00\u5c42\u4e3a\u6b63\u5f26\u6ee4\u6ce2\u5668\u7684CNN\u5b9e\u73b0\uff0c\u540e\u63a5\u9010\u70b9\u975e\u7ebf\u6027\u3001\u5168\u5c40\u5e73\u5747\u6c60\u5316\u548c\u6267\u884c\u90e8\u5206\u767d\u5316\u7684\u7ebf\u6027\u5c42\u3002", "why_notable": "\u9996\u6b21\u7ed9\u51fa\u5bf9\u6bd4\u5b66\u4e60\u6700\u4f18\u8868\u793a\u7684\u89e3\u6790\u89e3\uff0c\u5c06\u6df1\u5ea6\u5b66\u4e60\u4e2d\u7684\u7ecf\u9a8c\u73b0\u8c61\uff08\u5982Gabor\u6ee4\u6ce2\u5668\uff09\u4e0e\u4fe1\u53f7\u5904\u7406\u7406\u8bba\uff08\u529f\u7387\u8c31\u3001\u6ce8\u6c34\u7b97\u6cd5\uff09\u4e25\u683c\u8054\u7cfb\u8d77\u6765\uff0c\u4e3a\u7406\u89e3\u81ea\u76d1\u7763\u8868\u793a\u5b66\u4e60\u63d0\u4f9b\u4e86\u575a\u5b9e\u7684\u7406\u8bba\u57fa\u7840\u3002"}, {"abstract": "Autonomous AI agents can execute complex tasks with limited human review, yet they often lack the grounded operational knowledge to make their outputs not just executable but correct, secure, and maintainable. We introduce SkillCenter, to our knowledge the largest open skill library for agents by total count: 216,938 structured skills across 24 domain bundles. A SkillGate-filtered pipeline contributes 114,565 source-grounded skills from peer-reviewed journals, ArXiv, and over 24,000 technical sources, integrated with 102,373 community skills from GitHub and the ClawHub marketplace. We present the end-to-end framework that builds the pipeline subset: multi-source acquisition, an LLM-based quality gate (SkillGate), template-driven generation, iterative source-grounding, and quality-controlled publishing. Source grounding is a traceability guarantee: each retained claim maps to an exact quotation in its source. All skills ship as offline-searchable SQLite FTS5 bundles.", "arxiv_id": "2607.07676", "arxiv_url": "https://arxiv.org/abs/2607.07676", "authors": ["Tianming Sha", "Yue Zhao", "Lichao Sun", "Yushun Dong"], "brief": "SkillCenter\u662f\u4e00\u4e2a\u9762\u5411\u81ea\u4e3bAI\u667a\u80fd\u4f53\u7684\u5927\u89c4\u6a21\u6280\u80fd\u5e93\uff0c\u5305\u542b\u8de824\u4e2a\u9886\u57df\u7684216,938\u6761\u7ed3\u6784\u5316\u6280\u80fd\uff0c\u5176\u4e2d11.4\u4e07\u6761\u6765\u81ea\u540c\u884c\u8bc4\u5ba1\u671f\u520a\u548c\u6280\u672f\u6587\u732e\uff0c\u5e76\u901a\u8fc7SkillGate\u8d28\u91cf\u8fc7\u6ee4\u7ba1\u9053\u786e\u4fdd\u6bcf\u6761\u6280\u80fd\u58f0\u660e\u5747\u53ef\u8ffd\u6eaf\u5230\u539f\u59cb\u6587\u732e\u5f15\u7528\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07676", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u89c4\u6a21\u6700\u5927\uff1a\u5171216,938\u6761\u6280\u80fd\uff0c\u8986\u76d624\u4e2a\u9886\u57df\uff0c\u5206\u4e3a11.4\u4e07\u6761\u6587\u732e\u6eaf\u6e90\u6280\u80fd\u548c10.2\u4e07\u6761\u793e\u533a\u6280\u80fd\uff08\u6765\u81eaGitHub\u548cClawHub\uff09", "\u6eaf\u6e90\u4fdd\u969c\uff08Source Grounding\uff09\uff1a\u6bcf\u6761\u4fdd\u7559\u7684\u6280\u80fd\u58f0\u660e\u5747\u6620\u5c04\u5230\u539f\u59cb\u6587\u732e\u7684\u7cbe\u786e\u5f15\u7528\uff0c\u786e\u4fdd\u53ef\u8ffd\u6eaf\u6027\u4e0e\u53ef\u4fe1\u5ea6", "\u7aef\u5230\u7aef\u6d41\u6c34\u7ebf\uff1a\u5305\u542b\u591a\u6e90\u91c7\u96c6\u3001LLM\u8d28\u91cf\u95e8\u63a7\uff08SkillGate\uff09\u3001\u6a21\u677f\u9a71\u52a8\u751f\u6210\u3001\u8fed\u4ee3\u6eaf\u6e90\u548c\u8d28\u91cf\u53d1\u5e03\uff0c\u6280\u80fd\u4ee5SQLite FTS5\u683c\u5f0f\u652f\u6301\u79bb\u7ebf\u68c0\u7d22"], "keywords": ["\u667a\u80fd\u4f53", "\u77e5\u8bc6\u5e93", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u4fe1AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07676v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SkillCenter: A Large-Scale Source-Grounded Skill Library for Autonomous AI Agents", "tldr": "\u6784\u5efa\u8fc4\u4eca\u6700\u5927\u5f00\u6e90\u667a\u80fd\u4f53\u6280\u80fd\u5e93SkillCenter\uff0c\u542b21.7\u4e07\u6761\u6709\u6eaf\u6e90\u4fdd\u969c\u7684\u7ed3\u6784\u5316\u6280\u80fd", "upvotes": 0, "what_it_is": "SkillCenter\u662f\u4e00\u4e2a\u9762\u5411\u81ea\u4e3bAI\u667a\u80fd\u4f53\u7684\u5927\u89c4\u6a21\u6280\u80fd\u5e93\uff0c\u5305\u542b\u8de824\u4e2a\u9886\u57df\u7684216,938\u6761\u7ed3\u6784\u5316\u6280\u80fd\uff0c\u5176\u4e2d11.4\u4e07\u6761\u6765\u81ea\u540c\u884c\u8bc4\u5ba1\u671f\u520a\u548c\u6280\u672f\u6587\u732e\uff0c\u5e76\u901a\u8fc7SkillGate\u8d28\u91cf\u8fc7\u6ee4\u7ba1\u9053\u786e\u4fdd\u6bcf\u6761\u6280\u80fd\u58f0\u660e\u5747\u53ef\u8ffd\u6eaf\u5230\u539f\u59cb\u6587\u732e\u5f15\u7528\u3002", "why_notable": "\u5f53\u524dAI\u667a\u80fd\u4f53\u666e\u904d\u7f3a\u4e4f\u53ef\u9a8c\u8bc1\u7684\u64cd\u4f5c\u6027\u77e5\u8bc6\uff0cSkillCenter\u901a\u8fc7\u6587\u732e\u6eaf\u6e90\u673a\u5236\u586b\u8865\u4e86\u8fd9\u4e00\u7a7a\u767d\uff0c\u4e3a\u667a\u80fd\u4f53\u63d0\u4f9b\u53ef\u4fe1\u3001\u53ef\u7ef4\u62a4\u7684\u77e5\u8bc6\u57fa\u7840\uff0c\u5176\u5f00\u653e\u89c4\u6a21\u548c\u6eaf\u6e90\u8bbe\u8ba1\u5bf9\u667a\u80fd\u4f53\u5b89\u5168\u6027\u4e0e\u53ef\u9760\u6027\u7814\u7a76\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Many reasoning tasks are not well described by a single left-to-right chain: a solver may need to pursue a plausible branch, observe delayed failure, and return to the latest prefix that can still be completed. We introduce Pyligent, a training and inference framework inspired by the Diligent Learner formulation that represents reasoning as validated search over partial solution chains. A task validator labels generated continuations and failures, and the resulting search trees are converted into supervised targets for three actions: continue, finish, and backtrack, with optional traces that summarize abandoned branches. We evaluate Pyligent on a hidden directed graph task designed to isolate delayed-failure recovery, and on structured reasoning domains with exact validators, including $4{\\times}4$ Sudoku, Sudoku with reasoning traces, and Blocksworld. Compared with gold-only supervised fine-tuning, Pyligent improves solve rate by $72.7$ percentage points on hidden graphs, by $17$ and $18$ points on mixed and expert Sudoku, by $27$ and $14$ points on mixed and expert Sudoku with reasoning traces, and by $13$ points on Blocksworld. These results suggest that explicit failed-branch supervision can teach useful recovery behavior beyond imitation of polished solution chains.", "arxiv_id": "2607.07492", "arxiv_url": "https://arxiv.org/abs/2607.07492", "authors": ["Dmitry Beresnev", "Vladimir Makharev", "Roman Khalikov", "Ivan Oseledets", "Petr Anokhin"], "brief": "\u63d0\u51faPyligent\u8bad\u7ec3\u4e0e\u63a8\u7406\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u5efa\u6a21\u4e3a\u5e26\u9a8c\u8bc1\u7684\u90e8\u5206\u89e3\u94fe\u641c\u7d22\uff0c\u901a\u8fc7\u4efb\u52a1\u9a8c\u8bc1\u5668\u6807\u6ce8\u751f\u6210\u7684\u5ef6\u7eed\u4e0e\u5931\u8d25\uff0c\u5c06\u641c\u7d22\u6811\u8f6c\u5316\u4e3acontinue/finish/backtrack\u4e09\u7c7b\u52a8\u4f5c\u7684\u76d1\u7763\u76ee\u6807\uff0c\u663e\u5f0f\u8bad\u7ec3\u6a21\u578b\u4ece\u5931\u8d25\u5206\u652f\u4e2d\u6062\u590d\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07492", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u4e09\u7c7b\u52a8\u4f5c\uff08\u7ee7\u7eed\u3001\u5b8c\u6210\u3001\u56de\u6eaf\uff09\u7684\u76d1\u7763\u4fe1\u53f7\uff0c\u5e76\u53ef\u9644\u52a0\u653e\u5f03\u5206\u652f\u7684\u6458\u8981\u8f68\u8ff9", "\u5728\u9690\u85cf\u6709\u5411\u56fe\u4efb\u52a1\u4e0a\u76f8\u6bd4\u7eaf\u91d1\u6807\u51c6SFT\u63d0\u534772.7\u4e2a\u767e\u5206\u70b9\uff0c\u57284\u00d74\u6570\u72ec\u3001Blocksworld\u7b49\u7ed3\u6784\u5316\u63a8\u7406\u4efb\u52a1\u4e0a\u63d0\u534713-27\u4e2a\u767e\u5206\u70b9", "\u6846\u67b6\u7075\u611f\u6765\u81eaDiligent Learner\u5f62\u5f0f\u5316\uff0c\u9002\u7528\u4e8e\u4efb\u4f55\u5177\u6709\u7cbe\u786e\u9a8c\u8bc1\u5668\u7684\u63a8\u7406\u57df"], "keywords": ["\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60", "\u641c\u7d22\u4e0e\u89c4\u5212", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07492v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Search, Fail, Recover: A Training Framework for Correction-Aware Reasoning", "tldr": "Pyligent\u6846\u67b6\u901a\u8fc7\u5931\u8d25\u5206\u652f\u76d1\u7763\u8bad\u7ec3LLM\u5b66\u4f1a\u641c\u7d22\u3001\u5931\u8d25\u540e\u56de\u6eaf\u6062\u590d\u7684\u63a8\u7406\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faPyligent\u8bad\u7ec3\u4e0e\u63a8\u7406\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u5efa\u6a21\u4e3a\u5e26\u9a8c\u8bc1\u7684\u90e8\u5206\u89e3\u94fe\u641c\u7d22\uff0c\u901a\u8fc7\u4efb\u52a1\u9a8c\u8bc1\u5668\u6807\u6ce8\u751f\u6210\u7684\u5ef6\u7eed\u4e0e\u5931\u8d25\uff0c\u5c06\u641c\u7d22\u6811\u8f6c\u5316\u4e3acontinue/finish/backtrack\u4e09\u7c7b\u52a8\u4f5c\u7684\u76d1\u7763\u76ee\u6807\uff0c\u663e\u5f0f\u8bad\u7ec3\u6a21\u578b\u4ece\u5931\u8d25\u5206\u652f\u4e2d\u6062\u590d\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u5931\u8d25\u5206\u652f\u4f5c\u4e3a\u76d1\u7763\u4fe1\u53f7\u7eb3\u5165\u8bad\u7ec3\uff0c\u7a81\u7834\u4e86\u4ec5\u6a21\u4eff\u5b8c\u7f8e\u89e3\u94fe\u7684\u5c40\u9650\uff0c\u4e3aLLM\u4e60\u5f97\u771f\u6b63\u7684\u641c\u7d22\u4e0e\u56de\u6eaf\u80fd\u529b\u63d0\u4f9b\u4e86\u53ef\u884c\u8def\u5f84\uff0c\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u53d6\u5f97\u663e\u8457\u63d0\u5347\u3002"}, {"abstract": "A self-evolving agent retires its bad skills by watching them fail, so what happens when the judge cannot see the failures? Skill retirement is the structural constraint that keeps a growing library from drifting below the no-skill baseline, but its guarantee assumes an unbiased reward, which is false for the LLM judges that reference-free tasks force upon us. We show that a biased judge does not merely add noise; it \\emph{silently switches off the curator}. We make this precise with a corrupted-reward analysis and, isolating the causal channel by injecting corruption on top of a deterministic reward, a behavioral study on a reference-free report-writing testbed with a code-generation cross-check. Symmetric noise leaves retirement intact, but \\emph{false-pass} bias (failures slipping through as passes) disables contribution-based retirement past a sharp threshold that no amount of data can cross. Separating genuine retirement from cap-eviction churn shows this \\emph{mechanism} failure is universal, holding across domains and failure rates and sparing only near-zero-false-pass, verifier-like graders. The downstream \\emph{outcome}, though, is regime-dependent: eval quality degrades only where the same corruption also starves skill synthesis, and otherwise holds steady, so the disabled curator is \\emph{silent}, surfacing in no aggregate metric. The contribution is a behavioral safety result, not a performance one. A cheap defect-injection audit then tells an operator, before deployment, which side of the threshold their judge occupies.", "arxiv_id": "2607.07436", "arxiv_url": "https://arxiv.org/abs/2607.07436", "authors": ["Xing Zhang", "Yanwei Cui", "Guanghui Wang", "Ziyuan Li", "Wei Qiu", "Bing Zhu", "Peiyang He"], "brief": "\u672c\u6587\u63ed\u793a\u4e86\u81ea\u8fdb\u5316\u667a\u80fd\u4f53\u4e2dLLM\u8bc4\u5224\u5668\u7684\u504f\u7f6e\uff08\u5c24\u5176\u662f\"\u5047\u901a\u8fc7\"\u504f\u7f6e\uff09\u4f1a\u9759\u9ed8\u5173\u95ed\u6280\u80fd\u6dd8\u6c70\u673a\u5236\uff0c\u5e76\u901a\u8fc7\u7406\u8bba\u5206\u6790\u4e0e\u884c\u4e3a\u5b9e\u9a8c\u7cbe\u786e\u523b\u753b\u4e86\u8fd9\u4e00\u5931\u6548\u7684\u9608\u503c\u6761\u4ef6\u4e0e\u5f71\u54cd\u8303\u56f4\u3002", "categories": ["cs.AI", "cs.CL", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07436", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5bf9\u79f0\u566a\u58f0\u4e0d\u5f71\u54cd\u6280\u80fd\u6dd8\u6c70\uff0c\u4f46\"\u5047\u901a\u8fc7\"\u504f\u7f6e\uff08\u5931\u8d25\u88ab\u8bef\u5224\u4e3a\u901a\u8fc7\uff09\u5728\u8d85\u8fc7\u67d0\u4e00\u5c16\u9510\u9608\u503c\u540e\u4f1a\u5b8c\u5168\u7981\u7528\u57fa\u4e8e\u8d21\u732e\u7684\u6280\u80fd\u6dd8\u6c70\u673a\u5236", "\u8be5\u673a\u5236\u5931\u6548\u662f\u666e\u904d\u6027\u7684\uff0c\u8de8\u9886\u57df\u548c\u5931\u8d25\u7387\u5747\u6210\u7acb\uff0c\u4f46\u4e0d\u4f1a\u5728\u4efb\u4f55\u805a\u5408\u8bc4\u4f30\u6307\u6807\u4e2d\u663e\u73b0\uff0c\u5c5e\u4e8e\"\u9759\u9ed8\"\u5b89\u5168\u7f3a\u9677", "\u63d0\u51fa\u4e86\u4e00\u79cd\u5ec9\u4ef7\u7684\u7f3a\u9677\u6ce8\u5165\u5ba1\u8ba1\u65b9\u6cd5\uff0c\u53ef\u5728\u90e8\u7f72\u524d\u5224\u65ad\u8bc4\u5224\u5668\u5904\u4e8e\u9608\u503c\u7684\u54ea\u4e00\u4fa7\uff0c\u5177\u6709\u5b9e\u9645\u53ef\u64cd\u4f5c\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u6027", "LLM\u8bc4\u5224\u5668", "\u81ea\u8fdb\u5316\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07436v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Blind Curator: How a Biased Judge Silently Disables Skill Retirement in Self-Evolving Agents", "tldr": "\u504f\u7f6e\u8bc4\u5224\u5668\u4f1a\u6084\u7136\u7981\u7528\u81ea\u8fdb\u5316\u667a\u80fd\u4f53\u7684\u6280\u80fd\u6dd8\u6c70\u673a\u5236\uff0c\u4e14\u4e0d\u89e6\u53d1\u4efb\u4f55\u805a\u5408\u6307\u6807\u8b66\u62a5", "upvotes": 0, "what_it_is": "\u672c\u6587\u63ed\u793a\u4e86\u81ea\u8fdb\u5316\u667a\u80fd\u4f53\u4e2dLLM\u8bc4\u5224\u5668\u7684\u504f\u7f6e\uff08\u5c24\u5176\u662f\"\u5047\u901a\u8fc7\"\u504f\u7f6e\uff09\u4f1a\u9759\u9ed8\u5173\u95ed\u6280\u80fd\u6dd8\u6c70\u673a\u5236\uff0c\u5e76\u901a\u8fc7\u7406\u8bba\u5206\u6790\u4e0e\u884c\u4e3a\u5b9e\u9a8c\u7cbe\u786e\u523b\u753b\u4e86\u8fd9\u4e00\u5931\u6548\u7684\u9608\u503c\u6761\u4ef6\u4e0e\u5f71\u54cd\u8303\u56f4\u3002", "why_notable": "\u9996\u6b21\u4ece\u884c\u4e3a\u5b89\u5168\u89d2\u5ea6\u7cbe\u786e\u5206\u6790\u4e86LLM\u8bc4\u5224\u5668\u504f\u7f6e\u5bf9\u81ea\u8fdb\u5316\u667a\u80fd\u4f53\u7ed3\u6784\u6027\u7ea6\u675f\u7684\u7834\u574f\u673a\u5236\uff0c\u63ed\u793a\u4e86\u4e00\u7c7b\u9690\u853d\u7684\u7cfb\u7edf\u6027\u98ce\u9669\uff0c\u5e76\u63d0\u4f9b\u4e86\u53ef\u843d\u5730\u7684\u90e8\u7f72\u524d\u68c0\u6d4b\u65b9\u6848\u3002"}, {"abstract": "Customer behavior modeling underpins recommendation, marketing, and decision support, yet existing approaches either optimize predictive accuracy without explaining decisions or simulate users without grounding them in real behavioral data. We present the Large Behavioral Model (LBM) that learns customer decision making directly from large-scale retail transactions through a unified Person-Environment formulation. Customer state is represented by a behavioral profile derived from historical purchases, while product context is incorporated through retrieval-augmented generation. The model is trained using continued pre-training on verbalized behavioral data, supervised fine-tuning for decision generation, and reinforcement learning with verifiable rewards for evidence-based calibration. We evaluate the proposed framework on purchase prediction, hard-negative discrimination, basket completion, promotion response, and cross-domain voucher redemption. The model consistently outperforms frontier general-purpose language models on in-domain retail tasks while demonstrating strong zero-shot and fine-tuned transfer across retailers and decision domains. Ablation studies show that continued pre-training is the primary driver of behavioral generalization, retrieval is most effective when applied during both training and inference, and reinforcement learning improves reliance on explicit behavioral evidence over generic language-model priors. These results demonstrate that behavioral knowledge encoded in transaction histories can be effectively learned by language models, providing a scalable foundation for customer digital twins and behavior simulation.", "arxiv_id": "2607.06993", "arxiv_url": "https://arxiv.org/abs/2607.06993", "authors": ["Wachiravit Modecrua", "Krittin Pachtrachai", "Touchapon Kraisingkorn"], "brief": "\u63d0\u51fa\u5927\u884c\u4e3a\u6a21\u578b\uff08LBM\uff09\uff0c\u901a\u8fc7\u7edf\u4e00\u7684\u4eba-\u73af\u5883\u6846\u67b6\u4ece\u5927\u89c4\u6a21\u96f6\u552e\u4ea4\u6613\u6570\u636e\u4e2d\u5b66\u4e60\u5ba2\u6237\u51b3\u7b56\u8fc7\u7a0b\uff0c\u6784\u5efa\u53ef\u63d0\u793a\u7684\u5ba2\u6237\u6570\u5b57\u5b6a\u751f\u4f53\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06993", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528\u6301\u7eed\u9884\u8bad\u7ec3+\u76d1\u7763\u5fae\u8c03+\u5f3a\u5316\u5b66\u4e60\u4e09\u9636\u6bb5\u8bad\u7ec3\uff0c\u5f3a\u5316\u5b66\u4e60\u901a\u8fc7\u53ef\u9a8c\u8bc1\u5956\u52b1\u63d0\u5347\u57fa\u4e8e\u8bc1\u636e\u7684\u51b3\u7b56\u6821\u51c6", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210\uff08RAG\uff09\u7528\u4e8e\u878d\u5165\u5546\u54c1\u4e0a\u4e0b\u6587\uff0c\u4e14\u5728\u8bad\u7ec3\u548c\u63a8\u7406\u9636\u6bb5\u540c\u65f6\u4f7f\u7528\u65f6\u6548\u679c\u6700\u4f73", "\u5728\u8d2d\u4e70\u9884\u6d4b\u3001\u8d2d\u7269\u7bee\u8865\u5168\u3001\u4fc3\u9500\u54cd\u5e94\u3001\u8de8\u57df\u4f18\u60e0\u5238\u6838\u9500\u7b49\u4efb\u52a1\u4e0a\u8d85\u8d8a\u524d\u6cbf\u901a\u7528\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u5e76\u5177\u5907\u5f3a\u96f6\u6837\u672c\u8fc1\u79fb\u80fd\u529b"], "keywords": ["\u667a\u80fd\u4f53", "\u6570\u5b57\u5b6a\u751f", "\u63a8\u8350\u7cfb\u7edf", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06993v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Large Behavior Model: A Promptable Digital Twin of the Retail Customer", "tldr": "\u57fa\u4e8e\u96f6\u552e\u4ea4\u6613\u6570\u636e\u6784\u5efa\u53ef\u63d0\u793a\u7684\u5ba2\u6237\u884c\u4e3a\u5927\u6a21\u578b\uff0c\u5b9e\u73b0\u8d2d\u4e70\u9884\u6d4b\u4e0e\u884c\u4e3a\u4eff\u771f", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u5927\u884c\u4e3a\u6a21\u578b\uff08LBM\uff09\uff0c\u901a\u8fc7\u7edf\u4e00\u7684\u4eba-\u73af\u5883\u6846\u67b6\u4ece\u5927\u89c4\u6a21\u96f6\u552e\u4ea4\u6613\u6570\u636e\u4e2d\u5b66\u4e60\u5ba2\u6237\u51b3\u7b56\u8fc7\u7a0b\uff0c\u6784\u5efa\u53ef\u63d0\u793a\u7684\u5ba2\u6237\u6570\u5b57\u5b6a\u751f\u4f53\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u4e0e\u5927\u89c4\u6a21\u96f6\u552e\u4ea4\u6613\u6570\u636e\u7ed3\u5408\u6784\u5efa\u5ba2\u6237\u6570\u5b57\u5b6a\u751f\uff0c\u517c\u987e\u53ef\u89e3\u91ca\u6027\u4e0e\u884c\u4e3a\u771f\u5b9e\u6027\uff0c\u4e3a\u4e2a\u6027\u5316\u63a8\u8350\u548c\u8425\u9500\u51b3\u7b56\u63d0\u4f9b\u53ef\u6269\u5c55\u57fa\u7840\u3002"}, {"abstract": "Rotary Position Embeddings (RoPE) provide transformers with a fixed grid of positional frequencies, yet trained models use these frequencies highly non-uniformly. We study what determines this frequency usage and propose a data-centered explanation: RoPE frequencies are selected to match the relative-distance structure of the training data. Viewing each frequency as a positional lens, we formalize a field-resolution tradeoff and show that, for a data-induced dependency profile of width $W$, the optimal frequency scales as $1/W$. This frequency-matching principle explains controlled observations on synthetic and text-based data, and suggests that the mid-low frequency bands observed in language models arise from the multi-scale dependency structure of natural language. We further connect frequency selection to position-interpolation-based length generalization: scaling frequencies down expands the effective field while reducing resolution. This helps when longer-context dependencies are approximate dilations of those seen during training, but can fail when relevant dependencies do not scale with context length. Empirically, we show that natural language exhibits approximate self-similarity across positional scales, explaining why test-time frequency scaling can support long-context generalization. Overall, our results identify a data-driven mechanism behind emergent RoPE frequency usage and show that long-context generalization depends on two forms of scale matching: between learned frequencies and training-time dependencies, and between frequency scaling and how those dependencies extend to longer contexts.", "arxiv_id": "2607.07678", "arxiv_url": "https://arxiv.org/abs/2607.07678", "authors": ["Xinyi Wu", "Siyuan Liu", "Ali Jadbabaie"], "brief": "\u672c\u6587\u63d0\u51fa\u4ee5\u6570\u636e\u4e3a\u4e2d\u5fc3\u7684\u7406\u8bba\u6846\u67b6\uff0c\u89e3\u91caTransformer\u4e2dRoPE\u4f4d\u7f6e\u7f16\u7801\u7684\u9891\u7387\u9009\u62e9\u89c4\u5f8b\uff1a\u6a21\u578b\u503e\u5411\u4e8e\u9009\u62e9\u4e0e\u8bad\u7ec3\u6570\u636e\u76f8\u5bf9\u8ddd\u79bb\u7ed3\u6784\u76f8\u5339\u914d\u7684\u9891\u7387\uff0c\u5e76\u4ee5\u6b64\u7edf\u4e00\u89e3\u91ca\u9891\u7387\u4f7f\u7528\u7684\u975e\u5747\u5300\u6027\u548c\u57fa\u4e8e\u4f4d\u7f6e\u63d2\u503c\u7684\u957f\u4e0a\u4e0b\u6587\u6cdb\u5316\u73b0\u8c61\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07678", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51fa\"\u9891\u7387\u5339\u914d\u539f\u5219\"\uff1a\u5bf9\u4e8e\u5bbd\u5ea6\u4e3aW\u7684\u4f9d\u8d56\u5206\u5e03\uff0c\u6700\u4f18RoPE\u9891\u7387\u7ea6\u4e3a1/W\uff0c\u5f62\u6210\u573a\u5206\u8fa8\u7387\u6743\u8861", "\u81ea\u7136\u8bed\u8a00\u5177\u6709\u8fd1\u4f3c\u81ea\u76f8\u4f3c\u6027\uff08\u8de8\u4f4d\u7f6e\u5c3a\u5ea6\uff09\uff0c\u8fd9\u89e3\u91ca\u4e86\u4e3a\u4f55\u6d4b\u8bd5\u65f6\u9891\u7387\u7f29\u653e\u80fd\u652f\u6301\u957f\u4e0a\u4e0b\u6587\u6cdb\u5316", "\u957f\u4e0a\u4e0b\u6587\u6cdb\u5316\u4f9d\u8d56\u4e24\u5c42\u5c3a\u5ea6\u5339\u914d\uff1a\u5b66\u4e60\u9891\u7387\u4e0e\u8bad\u7ec3\u4f9d\u8d56\u7684\u5339\u914d\uff0c\u4ee5\u53ca\u9891\u7387\u7f29\u653e\u4e0e\u4f9d\u8d56\u5ef6\u4f38\u65b9\u5f0f\u7684\u5339\u914d"], "keywords": ["\u4f4d\u7f6e\u7f16\u7801", "\u957f\u4e0a\u4e0b\u6587\u6cdb\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07678v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "How Data Shapes RoPE Frequency Usage: From Positional Scale Matching to Length Generalization", "tldr": "\u4ece\u6570\u636e\u89c6\u89d2\u89e3\u91caRoPE\u9891\u7387\u4f7f\u7528\u89c4\u5f8b\uff0c\u63ed\u793a\u957f\u4e0a\u4e0b\u6587\u6cdb\u5316\u7684\u5c3a\u5ea6\u5339\u914d\u673a\u5236", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4ee5\u6570\u636e\u4e3a\u4e2d\u5fc3\u7684\u7406\u8bba\u6846\u67b6\uff0c\u89e3\u91caTransformer\u4e2dRoPE\u4f4d\u7f6e\u7f16\u7801\u7684\u9891\u7387\u9009\u62e9\u89c4\u5f8b\uff1a\u6a21\u578b\u503e\u5411\u4e8e\u9009\u62e9\u4e0e\u8bad\u7ec3\u6570\u636e\u76f8\u5bf9\u8ddd\u79bb\u7ed3\u6784\u76f8\u5339\u914d\u7684\u9891\u7387\uff0c\u5e76\u4ee5\u6b64\u7edf\u4e00\u89e3\u91ca\u9891\u7387\u4f7f\u7528\u7684\u975e\u5747\u5300\u6027\u548c\u57fa\u4e8e\u4f4d\u7f6e\u63d2\u503c\u7684\u957f\u4e0a\u4e0b\u6587\u6cdb\u5316\u73b0\u8c61\u3002", "why_notable": "\u9996\u6b21\u4ece\u6570\u636e\u7ed3\u6784\u89d2\u5ea6\u7cfb\u7edf\u89e3\u91caRoPE\u9891\u7387\u4f7f\u7528\u7684\u6d8c\u73b0\u89c4\u5f8b\uff0c\u4e3a\u957f\u4e0a\u4e0b\u6587\u6cdb\u5316\u63d0\u4f9b\u53ef\u89e3\u91ca\u7684\u7406\u8bba\u57fa\u7840\uff0c\u5bf9\u4f4d\u7f6e\u7f16\u7801\u8bbe\u8ba1\u548c\u4e0a\u4e0b\u6587\u5916\u63a8\u65b9\u6cd5\u5177\u6709\u76f4\u63a5\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Large Language Models (LLMs) frequently exhibit sycophancy, where they agree with a user\u0027s statement even when incorrect. While sycophancy is often treated as a single defined behavior, it can manifest in substantially distinct ways and circumstances, raising the question of whether this multi-faceted nature is reflected in its internal mechanisms. To address this gap, we dissociate the representations of sycophancy into factual and opinion subtypes -- motivated by the distinction between verifiable claims and subjective beliefs. We train linear probes and construct steering vectors on activations of one subtype and evaluate their transfer to the other subtype to measure to what extent they share representations. We find evidence that different LLMs represent these subtypes differently, with either more unified or more distinct and causally interfering representations. This method of dissociation offers a promising framework for studying the representational structure of complex model behaviors.", "arxiv_id": "2607.07003", "arxiv_url": "https://arxiv.org/abs/2607.07003", "authors": ["Anthony Baez", "Sheer Karny", "Pat Pataranutaporn"], "brief": "\u672c\u6587\u5c06LLM\u7684\u8c04\u5a9a\u884c\u4e3a\u62c6\u5206\u4e3a\"\u4e8b\u5b9e\u578b\"\uff08\u53ef\u9a8c\u8bc1\u58f0\u660e\uff09\u548c\"\u89c2\u70b9\u578b\"\uff08\u4e3b\u89c2\u4fe1\u5ff5\uff09\u4e24\u79cd\u5b50\u7c7b\u578b\uff0c\u901a\u8fc7\u8bad\u7ec3\u7ebf\u6027\u63a2\u9488\u548c\u6784\u5efa\u5f15\u5bfc\u5411\u91cf\uff0c\u5206\u6790\u4e24\u79cd\u5b50\u7c7b\u578b\u5728\u6a21\u578b\u5185\u90e8\u8868\u5f81\u4e0a\u7684\u5171\u4eab\u7a0b\u5ea6\u4e0e\u56e0\u679c\u5e72\u6270\u5173\u7cfb\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07003", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u8c04\u5a9a\u884c\u4e3a\u533a\u5206\u4e3a\u4e8b\u5b9e\u578b\u548c\u89c2\u70b9\u578b\u4e24\u79cd\u5b50\u7c7b\u578b\uff0c\u57fa\u4e8e\u53ef\u9a8c\u8bc1\u58f0\u660e\u4e0e\u4e3b\u89c2\u4fe1\u5ff5\u7684\u672c\u8d28\u5dee\u5f02", "\u5728\u4e00\u79cd\u5b50\u7c7b\u578b\u7684\u6fc0\u6d3b\u4e0a\u8bad\u7ec3\u7ebf\u6027\u63a2\u9488/\u5f15\u5bfc\u5411\u91cf\uff0c\u8fc1\u79fb\u8bc4\u4f30\u5230\u53e6\u4e00\u5b50\u7c7b\u578b\uff0c\u91cf\u5316\u8868\u5f81\u5171\u4eab\u7a0b\u5ea6", "\u4e0d\u540cLLM\u5bf9\u4e24\u79cd\u8c04\u5a9a\u5b50\u7c7b\u578b\u7684\u8868\u5f81\u65b9\u5f0f\u5b58\u5728\u5dee\u5f02\uff1a\u90e8\u5206\u6a21\u578b\u8868\u5f81\u66f4\u7edf\u4e00\uff0c\u90e8\u5206\u6a21\u578b\u8868\u5f81\u66f4\u72ec\u7acb\u4e14\u5b58\u5728\u56e0\u679c\u5e72\u6270"], "keywords": ["\u53ef\u89e3\u91ca\u6027", "LLM\u5bf9\u9f50", "\u8868\u5f81\u5206\u6790", "\u8c04\u5a9a\u884c\u4e3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07003v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Dissociating the Internal Representations of Sycophancy in LLMs", "tldr": "\u7814\u7a76LLM\u8c04\u5a9a\u884c\u4e3a\u7684\u5185\u90e8\u8868\u5f81\uff0c\u53d1\u73b0\u4e8b\u5b9e\u578b\u4e0e\u89c2\u70b9\u578b\u8c04\u5a9a\u5728\u4e0d\u540c\u6a21\u578b\u4e2d\u5171\u4eab\u7a0b\u5ea6\u5404\u5f02", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06LLM\u7684\u8c04\u5a9a\u884c\u4e3a\u62c6\u5206\u4e3a\"\u4e8b\u5b9e\u578b\"\uff08\u53ef\u9a8c\u8bc1\u58f0\u660e\uff09\u548c\"\u89c2\u70b9\u578b\"\uff08\u4e3b\u89c2\u4fe1\u5ff5\uff09\u4e24\u79cd\u5b50\u7c7b\u578b\uff0c\u901a\u8fc7\u8bad\u7ec3\u7ebf\u6027\u63a2\u9488\u548c\u6784\u5efa\u5f15\u5bfc\u5411\u91cf\uff0c\u5206\u6790\u4e24\u79cd\u5b50\u7c7b\u578b\u5728\u6a21\u578b\u5185\u90e8\u8868\u5f81\u4e0a\u7684\u5171\u4eab\u7a0b\u5ea6\u4e0e\u56e0\u679c\u5e72\u6270\u5173\u7cfb\u3002", "why_notable": "\u9996\u6b21\u5bf9\u8c04\u5a9a\u884c\u4e3a\u7684\u5185\u90e8\u8868\u5f81\u8fdb\u884c\u7ec6\u7c92\u5ea6\u89e3\u79bb\u5206\u6790\uff0c\u4e3a\u7406\u89e3\u590d\u6742\u6a21\u578b\u884c\u4e3a\u7684\u8868\u5f81\u7ed3\u6784\u63d0\u4f9b\u4e86\u53ef\u63a8\u5e7f\u7684\u65b9\u6cd5\u8bba\u6846\u67b6\uff0c\u5bf9LLM\u5bf9\u9f50\u4e0e\u53ef\u89e3\u91ca\u6027\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "Large language models (LLMs) increasingly improve their reasoning at test time via additional computation, yet most existing works treat each problem in isolation. When problems arrive sequentially, accumulating reusable experience across them can further improve performance. Existing memory-based methods either store whole-solution templates that generalize poorly to novel problems or use heuristic step-level selection that is not optimized for final-answer correctness. Learning selection policies requires large-scale training data and fixed action spaces, making such approaches unsuitable for test-time settings where memory expands incrementally and only limited supervision is available. We propose MILES (Modular Instruction Memory with LEarnable Selection for self-improving LLM reasoning), a framework that dynamically expands step-wise memory and applies correctness-optimized memory composition under realistic test-time constraints. MILES maintains modular memory units consisting of asymmetric pairs of sub-goal embeddings and sub-instructions, each associated with a learnable selection head. This memory structure enables a coarse-to-fine retrieval mechanism: The coarse level enables memory expansion and collects supervision for training selection heads from confident samples, while the fine stage applies learned selection heads to rerank coarse-level candidates and guide reasoning for uncertain samples. MILES consistently matches or outperforms prior methods while achieving superior accuracy-efficiency tradeoffs. Extensive experiments demonstrate its effectiveness, robustness, and transferability.", "arxiv_id": "2607.06974", "arxiv_url": "https://arxiv.org/abs/2607.06974", "authors": ["Ruilin Tong", "Dong Gong"], "brief": "\u63d0\u51faMILES\u6846\u67b6\uff0c\u5728\u6d4b\u8bd5\u65f6\u52a8\u6001\u6269\u5c55\u6b65\u9aa4\u7ea7\u6a21\u5757\u5316\u8bb0\u5fc6\uff0c\u5e76\u901a\u8fc7\u53ef\u5b66\u4e60\u9009\u62e9\u5934\u4f18\u5316\u8bb0\u5fc6\u7ec4\u5408\uff0c\u4f7fLLM\u5728\u987a\u5e8f\u5904\u7406\u95ee\u9898\u65f6\u80fd\u8de8\u95ee\u9898\u79ef\u7d2f\u548c\u590d\u7528\u63a8\u7406\u7ecf\u9a8c\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06974", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bb0\u5fc6\u5355\u5143\u7531\u975e\u5bf9\u79f0\u7684\u5b50\u76ee\u6807\u5d4c\u5165\u4e0e\u5b50\u6307\u4ee4\u5bf9\u6784\u6210\uff0c\u6bcf\u4e2a\u5355\u5143\u914d\u5907\u53ef\u5b66\u4e60\u9009\u62e9\u5934", "\u7c97\u5230\u7ec6\u4e24\u9636\u6bb5\u68c0\u7d22\uff1a\u7c97\u7c92\u5ea6\u9636\u6bb5\u6269\u5c55\u8bb0\u5fc6\u5e76\u4ece\u9ad8\u7f6e\u4fe1\u6837\u672c\u6536\u96c6\u76d1\u7763\u4fe1\u53f7\uff0c\u7ec6\u7c92\u5ea6\u9636\u6bb5\u7528\u9009\u62e9\u5934\u5bf9\u4e0d\u786e\u5b9a\u6837\u672c\u91cd\u6392\u5019\u9009\u5e76\u5f15\u5bfc\u63a8\u7406", "\u5728\u6d4b\u8bd5\u65f6\u7ea6\u675f\u4e0b\uff08\u8bb0\u5fc6\u589e\u91cf\u6269\u5c55\u3001\u76d1\u7763\u6709\u9650\uff09\u4ecd\u80fd\u4f18\u5316\u6b63\u786e\u7387\uff0c\u5e76\u5728\u51c6\u786e\u7387-\u6548\u7387\u6743\u8861\u4e0a\u8d85\u8d8a\u5df2\u6709\u65b9\u6cd5"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406", "\u8bb0\u5fc6\u589e\u5f3a", "\u6d4b\u8bd5\u65f6\u8ba1\u7b97"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06974v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MILES: Modular Instruction Memory with Learnable Selection for Self-Improving LLM Reasoning", "tldr": "MILES\u6846\u67b6\u901a\u8fc7\u6a21\u5757\u5316\u6b65\u9aa4\u8bb0\u5fc6\u4e0e\u53ef\u5b66\u4e60\u9009\u62e9\u5934\uff0c\u5b9e\u73b0LLM\u8de8\u95ee\u9898\u7d2f\u79ef\u7ecf\u9a8c\u7684\u81ea\u6211\u63d0\u5347\u63a8\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51faMILES\u6846\u67b6\uff0c\u5728\u6d4b\u8bd5\u65f6\u52a8\u6001\u6269\u5c55\u6b65\u9aa4\u7ea7\u6a21\u5757\u5316\u8bb0\u5fc6\uff0c\u5e76\u901a\u8fc7\u53ef\u5b66\u4e60\u9009\u62e9\u5934\u4f18\u5316\u8bb0\u5fc6\u7ec4\u5408\uff0c\u4f7fLLM\u5728\u987a\u5e8f\u5904\u7406\u95ee\u9898\u65f6\u80fd\u8de8\u95ee\u9898\u79ef\u7d2f\u548c\u590d\u7528\u63a8\u7406\u7ecf\u9a8c\u3002", "why_notable": "\u73b0\u6709\u8bb0\u5fc6\u65b9\u6cd5\u8981\u4e48\u6cdb\u5316\u5dee\u8981\u4e48\u4f9d\u8d56\u542f\u53d1\u5f0f\u89c4\u5219\uff0cMILES\u9996\u6b21\u5728\u6d4b\u8bd5\u65f6\u52a8\u6001\u5b66\u4e60\u8bb0\u5fc6\u9009\u62e9\u7b56\u7565\uff0c\u65e0\u9700\u5927\u89c4\u6a21\u9884\u8bad\u7ec3\u6570\u636e\uff0c\u5177\u5907\u5f3a\u53ef\u8fc1\u79fb\u6027\uff0c\u5bf9LLM\u6d4b\u8bd5\u65f6\u8ba1\u7b97\u6269\u5c55\u7814\u7a76\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Large language model based search agents increasingly adopt multi-agent architectures in which a main agent decomposes a complex question into sub-queries and dispatches them to parallel sub-agents. However, existing systems instantiate all roles from a single model of identical scale, leaving open how model capacity should be distributed across roles. We factorize hierarchical search into three roles: a delegation role responsible for task decomposition, an execution role responsible for retrieval and evidence extraction, and an answer generation role held fixed as a confound control. We then conduct controlled capacity sweeps along the delegation and execution axes on five multi-hop QA benchmarks. The experiments yield three findings. First, role factorization consistently outperforms a single-agent baseline, improving exact match from 4.5 to 8.6 points across six model scales. Second, capacity sensitivity is asymmetric: scaling the delegation backbone improves EM by ~11 points, whereas scaling the execution sub-agent moves EM by only ~2.6 points, identifying decomposition as the capability bottleneck. Third, a 1.7B-parameter executor trained via quality-filtered trajectory distillation matches a frontier sub-agent in accuracy while consuming 37% fewer sub-agent tokens, advancing the Pareto frontier. These results suggest a concrete recipe for building hierarchical search agents: concentrate capacity at delegation and downsize execution without sacrificing accuracy. Our code is available at https://github.com/QinnanCai0115/role-factorized-search.", "arxiv_id": "2607.07548", "arxiv_url": "https://arxiv.org/abs/2607.07548", "authors": ["Qinnan Cai", "Yibo Zhao", "Xiang Li"], "brief": "\u672c\u6587\u5c06\u5c42\u7ea7\u641c\u7d22\u667a\u80fd\u4f53\u5206\u89e3\u4e3a\u300c\u59d4\u6d3e\u300d\u300c\u6267\u884c\u300d\u300c\u7b54\u6848\u751f\u6210\u300d\u4e09\u4e2a\u89d2\u8272\uff0c\u901a\u8fc7\u5728\u4e94\u4e2a\u591a\u8df3QA\u57fa\u51c6\u4e0a\u7cfb\u7edf\u6027\u5730\u5bf9\u5404\u89d2\u8272\u8fdb\u884c\u6a21\u578b\u89c4\u6a21\u6d88\u878d\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u4e0d\u540c\u89d2\u8272\u5bf9\u6a21\u578b\u5bb9\u91cf\u7684\u654f\u611f\u6027\u5dee\u5f02\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07548", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u89d2\u8272\u5206\u89e3\u76f8\u6bd4\u5355\u667a\u80fd\u4f53\u57fa\u7ebf\u5728\u7cbe\u786e\u5339\u914d\uff08EM\uff09\u4e0a\u63d0\u53474.5~8.6\u4e2a\u767e\u5206\u70b9", "\u5bb9\u91cf\u654f\u611f\u6027\u4e0d\u5bf9\u79f0\uff1a\u6269\u5927\u59d4\u6d3e\uff08\u5206\u89e3\uff09\u6a21\u578b\u89c4\u6a21\u4f7fEM\u63d0\u5347\u7ea611\u70b9\uff0c\u800c\u6269\u5927\u6267\u884c\u5b50\u667a\u80fd\u4f53\u89c4\u6a21\u4ec5\u63d0\u5347\u7ea62.6\u70b9", "\u901a\u8fc7\u8d28\u91cf\u8fc7\u6ee4\u8f68\u8ff9\u84b8\u998f\u8bad\u7ec3\u76841.7B\u6267\u884c\u5668\uff0c\u5728\u7cbe\u5ea6\u6301\u5e73\u524d\u6cbf\u6a21\u578b\u7684\u540c\u65f6\u51cf\u5c1137%\u7684\u5b50\u667a\u80fd\u4f53token\u6d88\u8017"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u8df3\u95ee\u7b54", "\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07548v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Think Big, Search Small: Where Capacity Matters in Hierarchical Search Agents?", "tldr": "\u5c42\u7ea7\u641c\u7d22\u667a\u80fd\u4f53\u4e2d\uff0c\u4efb\u52a1\u5206\u89e3\u89d2\u8272\u662f\u80fd\u529b\u74f6\u9888\uff0c\u5e94\u96c6\u4e2d\u7b97\u529b\u4e8e\u6b64\u800c\u975e\u6267\u884c\u89d2\u8272", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06\u5c42\u7ea7\u641c\u7d22\u667a\u80fd\u4f53\u5206\u89e3\u4e3a\u300c\u59d4\u6d3e\u300d\u300c\u6267\u884c\u300d\u300c\u7b54\u6848\u751f\u6210\u300d\u4e09\u4e2a\u89d2\u8272\uff0c\u901a\u8fc7\u5728\u4e94\u4e2a\u591a\u8df3QA\u57fa\u51c6\u4e0a\u7cfb\u7edf\u6027\u5730\u5bf9\u5404\u89d2\u8272\u8fdb\u884c\u6a21\u578b\u89c4\u6a21\u6d88\u878d\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u4e0d\u540c\u89d2\u8272\u5bf9\u6a21\u578b\u5bb9\u91cf\u7684\u654f\u611f\u6027\u5dee\u5f02\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316\u4e86\u5c42\u7ea7\u641c\u7d22\u667a\u80fd\u4f53\u4e2d\u5404\u89d2\u8272\u7684\u7b97\u529b\u654f\u611f\u6027\uff0c\u7ed9\u51fa\u300c\u5927\u6a21\u578b\u505a\u5206\u89e3\u3001\u5c0f\u6a21\u578b\u505a\u6267\u884c\u300d\u7684\u5177\u4f53\u5de5\u7a0b\u914d\u65b9\uff0c\u5bf9\u964d\u4f4e\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u63a8\u7406\u6210\u672c\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Mainstream Vision-Language-Action (VLA) models predict actions primarily from the current observation under a Markovian assumption, thus struggling with long-horizon, temporally dependent tasks. Existing memory-augmented VLAs either expand the observation window or retrieve history from the memory bank as auxiliary policy-side context. However, they leave memory outside the native latent embedding space of VLA reasoning, preventing historical experience from being fluidly interleaved with multimodal reasoning and action formation. To this end, we introduce LaMem-VLA, a latent-memory-native framework that reconstructs historical experience into latent memory tokens and directly interweaves them with VLA reasoning. At its core, LaMem-VLA introduces four coordinated components: (i) a curator that organizes historical experience into two complementary short-term and long-term memory vaults; (ii) a seeker that queries both vaults using the multimodal cognition to retrieve context-relevant evidence; (iii) a condenser that reconstructs the retrieved evidence into compact short-term and long-term latent memory tokens; and (iv) a weaver that injects these memory tokens with the current observation and instruction into one continuous embedding sequence. By representing, retrieving, and consuming historical experience entirely in the same continuous latent space, LaMem-VLA enables memory to directly participate in VLA reasoning and guide action generation under a bounded context. Extensive experiments on SimplerEnv and LIBERO demonstrate the superiority of our LaMem-VLA.", "arxiv_id": "2607.07608", "arxiv_url": "https://arxiv.org/abs/2607.07608", "authors": ["Hongyu Qu", "Jianzhe Gao", "Xiaobin Hu", "Shaohuan Yang", "Xinlei Yu", "Rui Yan", "Wenguan Wang", "Xiangbo Shu", "Shuicheng Yan"], "brief": "\u63d0\u51faLaMem-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u5386\u53f2\u7ecf\u9a8c\u7f16\u7801\u4e3a\u77ed\u671f\u548c\u957f\u671f\u6f5c\u5728\u8bb0\u5fc6\u4ee4\u724c\uff0c\u5e76\u4e0e\u5f53\u524d\u89c2\u6d4b\u548c\u6307\u4ee4\u4ea4\u7ec7\u878d\u5408\uff0c\u4f7f\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u80fd\u5728\u7edf\u4e00\u8fde\u7eed\u6f5c\u5728\u7a7a\u95f4\u4e2d\u8fdb\u884c\u8bb0\u5fc6\u589e\u5f3a\u63a8\u7406\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07608", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bbe\u8ba1\u56db\u4e2a\u534f\u540c\u7ec4\u4ef6\uff1a\u8bb0\u5fc6\u7ba1\u7406\u5668\uff08curator\uff09\u3001\u68c0\u7d22\u5668\uff08seeker\uff09\u3001\u538b\u7f29\u5668\uff08condenser\uff09\u548c\u878d\u5408\u5668\uff08weaver\uff09\uff0c\u5206\u522b\u8d1f\u8d23\u7ec4\u7ec7\u3001\u67e5\u8be2\u3001\u91cd\u6784\u548c\u6ce8\u5165\u8bb0\u5fc6", "\u6784\u5efa\u53cc\u5c42\u8bb0\u5fc6\u5e93\uff08\u77ed\u671f+\u957f\u671f\uff09\uff0c\u5229\u7528\u591a\u6a21\u6001\u8ba4\u77e5\u67e5\u8be2\u68c0\u7d22\u4e0e\u5f53\u524d\u4e0a\u4e0b\u6587\u76f8\u5173\u7684\u5386\u53f2\u8bc1\u636e", "\u5728SimplerEnv\u548cLIBERO\u57fa\u
