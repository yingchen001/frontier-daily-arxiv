const PAPERS = [{"abstract": "Autonomous agents promise substantial gains in speed, scale, and labor efficiency, but their failures can impose abrupt and often irreversible costs. The central challenge for agentic automation is therefore to increase the benefits of automation while bounding the consequences of failure. While databases remain central to modern computing, agents operate over a broader data environment spanning files, APIs, applications, and system state. In this talk, I will outline early work on Agentic Data Environments -- the execution substrate in which agents operate -- that both amplify agent capabilities and enforce safety guarantees. This perspective reframes data systems from passive stores of state into active substrates for safe, reliable execution.", "arxiv_id": "2607.07397", "arxiv_url": "https://arxiv.org/abs/2607.07397", "authors": ["Elaine Ang", "Chenxi Huang", "Georgios Liargkovas", "Jerry Liu", "Jinhui Liu", "Nikos Pagonas", "Charlie Summers", "Haonan Wang", "Jiakai Xu", "Tianle Zhou", "Yusen Zhang", "Zhou Yu", "Zhuo Zhang", "Tianyi Peng", "Kostis Kaffes", "Eugene Wu"], "brief": "\u672c\u6587\u63d0\u51fa\"Agentic Data Environments\"\u6846\u67b6\uff0c\u5c06\u6587\u4ef6\u3001API\u3001\u5e94\u7528\u53ca\u7cfb\u7edf\u72b6\u6001\u7b49\u667a\u80fd\u4f53\u8fd0\u884c\u6240\u4f9d\u8d56\u7684\u6570\u636e\u73af\u5883\u7edf\u4e00\u5efa\u6a21\uff0c\u4f7f\u5176\u65e2\u80fd\u653e\u5927\u667a\u80fd\u4f53\u80fd\u529b\uff0c\u53c8\u80fd\u5f3a\u5236\u6267\u884c\u5b89\u5168\u4fdd\u969c\uff0c\u4ece\u800c\u5728\u63d0\u5347\u81ea\u52a8\u5316\u6536\u76ca\u7684\u540c\u65f6\u9650\u5236\u5931\u8d25\u4ee3\u4ef7\u3002", "categories": ["cs.AI", "cs.DB"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07397", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u6311\u6218\uff1a\u81ea\u4e3b\u667a\u80fd\u4f53\u7684\u5931\u8d25\u5f80\u5f80\u5e26\u6765\u7a81\u53d1\u4e14\u4e0d\u53ef\u9006\u7684\u4ee3\u e3a\u6784\u5efa\u53ef\u9760\u81ea\u4e3b\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u65b0\u7684\u7cfb\u7edf\u8bbe\u8ba1\u89c6\u89d2\uff0c\u5bf9\u6570\u636e\u5e93\u4e0eAI\u7cfb\u7edf\u4ea4\u53c9\u9886\u57df\u5177\u6709\u91cd\u8981\u65b9\u5411\u6027\u610f\u4e49\u3002"}, {"abstract": "We present EmbodiedGen V2, a generative 3D world engine for building executable sim-ready environments for embodied intelligence. Sim-ready 3D asset generation has advanced rapidly, yet assembling such assets into policy-ready task environments remains largely manual, limiting scalable closed-loop learning. EmbodiedGen V2 addresses this gap through a unified sim-ready representation that connects cross-simulator assets, interaction affordances, task-driven worlds, large-scale multi-room scenes, and stateful Vibe Coding into a generative, editable, and reusable simulation pipeline. The generated environments support manipulation, navigation, mobile manipulation, cross-simulator deployment, and embodied policy training. In evaluation, the asset pipeline achieves 96.5% human acceptance and 98.6% collision success, and 83.3% of task-driven worlds are directly usable for downstream simulation without manual modification. Online reinforcement learning with generated environments further improves simulation success from 9.7% to 79.8%, and transfers to real robots with task success increasing from 21.7% to 75.0%. These results establish EmbodiedGen V2 as scalable simulation infrastructure for training, evaluating, and deploying embodied policies.", "arxiv_id": "2607.07459", "arxiv_url": "https://arxiv.org/abs/2607.07459", "authors": ["Xinjie Wang", "Liu Liu", "Taojun Ding", "Andrew Choi", "Chaodong Huang", "Mengao Zhao", "Ziang Li", "Jackson Jiang", "Chunlei Yu", "Shengxiang Liu", "Wei Xu", "Zhizhong Su"], "brief": "\u63d0\u51faEmbodiedGen V2\uff0c\u4e00\u4e2a\u9762\u5411\u5177\u8eab\u667a\u80fd\u7684\u751f\u6210\u5f0f3D\u4e16\u754c\u5f15\u64ce\uff0c\u80fd\u81ea\u52a8\u5c063D\u8d44\u4ea7\u7ec4\u88c5\u4e3a\u53ef\u6267\u884c\u7684\u4eff\u771f\u4efb\u52a1\u73af\u5883\uff0c\u8986\u76d6\u8d44\u4ea7\u751f\u6210\u3001\u4ea4\u4e92\u53ef\u4f9b\u6027\u3001\u4efb\u52a1\u9a71\u52a8\u573a\u666f\u6784\u5efa\u53ca\u72b6\u6001\u5316Vibe Coding\u5168\u6d41\u7a0b\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07459", "impact_score": 9, "is_agent": true, "is_top": true, "key_points": ["\u8d44\u4ea7\u6d41\u6c34\u7ebf\u8fbe\u523096.5%\u4eba\u5de5\u63a5\u53d7\u7387\u548c98.6%\u78b0\u649e\u6210\u529f\u7387\uff0c83.3%\u7684\u4efb\u52a1\u9a71\u52a8\u4e16\u754c\u65e0\u9700\u4eba\u5de5\u4fee\u6539\u5373\u53ef\u76f4\u63a5\u7528\u4e8e\u4e0b\u6e38\u4eff\u771f", "\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u7ed3\u5408\u751f\u6210\u73af\u5883\uff0c\u4eff\u771f\u6210\u529f\u7387\u4ece9.7%\u63d0\u5347\u81f379.8%\uff0c\u771f\u5b9e\u673a\u5668\u4eba\u4efb\u52a1\u6210\u529f\u7387\u4ece21.7%\u63d0\u5347\u81f375.0%", "\u7edf\u4e00\u7684\u8de8\u4eff\u771f\u5668\u8868\u793a\uff0c\u652f\u6301\u64cd\u4f5c\u3001\u5bfc\u822a\u3001\u79fb\u52a8\u64cd\u4f5c\u7b49\u591a\u7c7b\u4efb\u52a1\u53ca\u8de8\u5e73\u53f0\u90e8\u7f72"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u4eff\u771f\u73af\u5883", "3D\u751f\u6210", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07459v1", "published_at": "2026-07-08", "score": 0.375, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "EmbodiedGen V2: An Agentic, Simulation-Ready 3D World Engine for Embodied AI", "tldr": "EmbodiedGen V2\uff1a\u53ef\u81ea\u52a8\u751f\u6210\u4eff\u771f\u5c31\u7eea3D\u4e16\u754c\u7684\u5177\u8eabAI\u5f15\u64ce\uff0c\u652f\u6301\u7aef\u5230\u7aef\u7b56\u7565\u8bad\u7ec3\u4e0e\u771f\u5b9e\u673a\u5668\u4eba\u8fc1\u79fb", "upvotes": 0, "what_it_is": "\u63d0\u51faEmbodiedGen V2\uff0c\u4e00\u4e2a\u9762\u5411\u5177\u8eab\u667a\u80fd\u7684\u751f\u6210\u5f0f3D\u4e16\u754c\u5f15\u64ce\uff0c\u80fd\u81ea\u52a8\u5c063D\u8d44\u4ea7\u7ec4\u88c5\u4e3a\u53ef\u6267\u884c\u7684\u4eff\u771f\u4efb\u52a1\u73af\u5883\uff0c\u8986\u76d6\u8d44\u4ea7\u751f\u6210\u3001\u4ea4\u4e92\u53ef\u4f9b\u6027\u3001\u4efb\u52a1\u9a71\u52a8\u573a\u666f\u6784\u5efa\u53ca\u72b6\u6001\u5316Vibe Coding\u5168\u6d41\u7a0b\u3002", "why_notable": "\u9996\u6b21\u5c063D\u8d44\u4ea7\u751f\u6210\u4e0e\u53ef\u6267\u884c\u4eff\u771f\u73af\u5883\u81ea\u52a8\u7ec4\u88c5\u6253\u901a\uff0c\u5927\u5e45\u964d\u4f4e\u5177\u8eabAI\u95ed\u73af\u8bad\u7ec3\u7684\u4eba\u5de5\u6210\u672c\uff0c\u771f\u5b9e\u673a\u5668\u4eba\u8fc1\u79fb\u6548\u679c\u663e\u8457\uff0c\u5177\u6709\u91cd\u8981\u7684\u5de5\u7a0b\u843d\u5730\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning (RL) is becoming increasingly important for post-training large language models (LLMs). Previous RL pipelines for LLMs were mostly synchronous and batch-interleaved, which is inefficient for long-horizon agentic tasks. Recently, asynchronous RL has emerged as a more efficient alternative by updating the model as rollouts arrive. However, existing asynchronous RL systems often emphasize throughput, while leaving training stability and task effectiveness largely underexplored. For example, a key challenge is that group-wise sampling in the widely-used GRPO framework does not naturally fit asynchronous agentic training. In this paper, we present Single-rollout Asynchronous Optimization (SAO) to address the stability and off-policy challenges in asynchronous RL. To reduce off-policy effects and improve generalization, we replace group-wise sampling with single-rollout sampling, that is, using one rollout per prompt. We further improve this single-rollout strategy with practical value-model training designs. To improve optimization stability, we introduce a strict double-side token-level clipping strategy. SAO is able to train stably for one thousand steps and consistently outperform GRPO and its variants on agentic coding and reasoning benchmarks, such as SWE-Bench Verified, BeyondAIME, and IMOAnswerBench. We also demonstrate that single-rollout RL is particularly effective in a simulated online learning setting, where the model must adapt to changing evolving environments. To this end, SAO is successfully deployed in the agentic RL pipeline for training the open GLM-5.2 model (750B-A40B).", "arxiv_id": "2607.07508", "arxiv_url": "https://arxiv.org/abs/2607.07508", "authors": ["Zhenyu Hou", "Yujiang Li", "Jie Tang", "Yuxiao Dong"], "brief": "\u63d0\u51faSingle-rollout Asynchronous Optimization\uff08SAO\uff09\u6846\u67b6\uff0c\u7528\u5355\u8f68\u8ff9\u91c7\u6837\u66ff\u4ee3GRPO\u7684\u7ec4\u5f0f\u91c7\u6837\uff0c\u5e76\u5f15\u5165\u4e25\u683c\u53cc\u4fa7token\u7ea7\u88c1\u526a\u7b56\u7565\uff0c\u89e3\u51b3\u5f02\u6b65RL\u8bad\u7ec3\u4e2d\u7684\u7a33\u5b9a\u6027\u548c\u79bb\u7b56\u7565\u6311\u6218\uff0c\u6210\u529f\u5e94\u7528\u4e8eGLM-5.2\uff08750B-A40B\uff09\u6a21\u578b\u8bad\u7ec3\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07508", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7528\u5355\u8f68\u8ff9\u91c7\u6837\uff08\u6bcf\u4e2aprompt\u4e00\u6761rollout\uff09\u66ff\u4ee3GRPO\u7ec4\u5f0f\u91c7\u6837\uff0c\u964d\u4f4e\u79bb\u7b56\u7565\u6548\u5e94\u5e76\u63d0\u5347\u6cdb\u5316\u80fd\u529b", "\u5f15\u5165\u4e25\u683c\u53cc\u4fa7token\u7ea7\u88c1\u526a\u7b56\u7565\u63d0\u5347\u4f18\u5316\u7a33\u5b9a\u6027\uff0c\u652f\u6301\u7a33\u5b9a\u8bad\u7ec3\u8d85\u8fc71000\u6b65", "\u5728SWE-Bench Verified\u3001BeyondAIME\u3001IMOAnswerBench\u7b49\u57fa\u51c6\u4e0a\u6301\u7eed\u4f18\u4e8eGRPO\u53ca\u5176\u53d8\u4f53\uff0c\u5e76\u90e8\u7f72\u4e8eGLM-5.2\u751f\u4ea7\u8bad\u7ec3"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u540e\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07508v1", "published_at": "2026-07-08", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Single-Rollout Asynchronous Optimization for Agentic Reinforcement Learning", "tldr": "\u63d0\u51fa\u5355\u8f68\u8ff9\u5f02\u6b65\u5f3a\u5316\u5b66\u4e60\u65b9\u6cd5SAO\uff0c\u89e3\u51b3LLM\u540e\u8bad\u7ec3\u4e2d\u5f02\u6b65RL\u7684\u7a33\u5b9a\u6027\u4e0e\u79bb\u7b56\u7565\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faSingle-rollout Asynchronous Optimization\uff08SAO\uff09\u6846\u67b6\uff0c\u7528\u5355\u8f68\u8ff9\u91c7\u6837\u66ff\u4ee3GRPO\u7684\u7ec4\u5f0f\u91c7\u6837\uff0c\u5e76\u5f15\u5165\u4e25\u683c\u53cc\u4fa7token\u7ea7\u88c1\u526a\u7b56\u7565\uff0c\u89e3\u51b3\u5f02\u6b65RL\u8bad\u7ec3\u4e2d\u7684\u7a33\u5b9a\u6027\u548c\u79bb\u7b56\u7565\u6311\u6218\uff0c\u6210\u529f\u5e94\u7528\u4e8eGLM-5.2\uff08750B-A40B\uff09\u6a21\u578b\u8bad\u7ec3\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u89e3\u51b3\u5f02\u6b65RL\u5728\u957f\u65f6\u5e8f\u667a\u80fd\u4f53\u4efb\u52a1\u4e2d\u7684\u7a33\u5b9a\u6027\u95ee\u9898\uff0c\u5355\u8f68\u8ff9\u7b56\u7565\u5728\u5728\u7ebf\u5b66\u4e60\u573a\u666f\u4e0b\u5c24\u4e3a\u6709\u6548\uff0c\u4e14\u5df2\u5728750B\u7ea7\u522b\u8d85\u5927\u6a21\u578b\u4e0a\u5b8c\u6210\u5de5\u4e1a\u7ea7\u9a8c\u8bc1\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Analytical workloads operating on data stored in external database systems face a fundamental bottleneck: data access is guarded entirely by the database driver, like JDBC or ODBC, forcing all reads through query execution and other driver layers that are not designed for bulk columnar analytics. We present Jailbreak, an approach that bypasses the database engine entirely by reading storage files directly and materializing data as in-memory columnar buffers. Jailbreak\u0027s key insight is that database file formats, while complex, are fully specified by their source code and documentation, artifacts that Large Language Models (LLMs) can ingest to regenerate operator-specific table reading components without human-engineered parsing logic. Jailbreak leverages LLM-assisted code synthesis for database storage decoding, turning a traditionally opaque format into a directly queryable artifact. We evaluate Jailbreak on PostgreSQL and MySQL storage files, targeting analytical snapshot scenarios common in read replicas and offline processing pipelines. The generated reader produces Apache Arrow buffers consumable directly by most of the widely known query engines, including DuckDB, Apache Spark, and GPU-accelerated frameworks such as cuDF and Spark RAPIDS. We validate correctness against JDBC/ODBC-based baselines using the TPC-H benchmark across all query results, and demonstrate significant performance improvements in end-to-end analytical throughput, achieving up to 27x speedups. Our results showcase that LLM-assisted storage reader synthesis is a viable and generalizable methodology for breaking data lock-in across database systems, with applications beyond PostgreSQL and MySQL for any system whose file format is available to the LLM from documentation or source code.", "arxiv_id": "2607.07696", "arxiv_url": "https://arxiv.org/abs/2607.07696", "authors": ["Victor Giannakouris", "Immanuel Trummer"], "brief": "\u63d0\u51faJailbreak\u65b9\u6cd5\uff0c\u5229\u7528LLM\u81ea\u52a8\u5408\u6210\u6570\u636e\u5e93\u5b58\u50a8\u683c\u5f0f\u89e3\u6790\u4ee3\u7801\uff0c\u76f4\u63a5\u8bfb\u53d6PostgreSQL/MySQL\u5e95\u5c42\u6587\u4ef6\u5e76\u8f93\u51faApache Arrow\u5217\u5f0f\u7f13\u51b2\u533a\uff0c\u5b8c\u5168\u7ed5\u8fc7\u6570\u636e\u5e93\u5f15\u64ce\u548c\u9a71\u52a8\u5c42\u3002", "categories": ["cs.DB", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07696", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["LLM\u901a\u8fc7\u6d88\u5316\u6570\u636e\u5e93\u6e90\u7801\u548c\u6587\u6863\uff0c\u81ea\u52a8\u751f\u6210\u9488\u5bf9\u7279\u5b9a\u5b58\u50a8\u683c\u5f0f\u7684\u8bfb\u53d6\u7ec4\u4ef6\uff0c\u65e0\u9700\u4eba\u5de5\u7f16\u5199\u89e3\u6790\u903b\u8f91", "\u751f\u6210\u7684\u8bfb\u53d6\u5668\u8f93\u51faApache Arrow\u683c\u5f0f\uff0c\u53ef\u76f4\u63a5\u5bf9\u63a5DuckDB\u3001Spark\u3001cuDF\u3001Spark RAPIDS\u7b49\u4e3b\u6d41\u67e5\u8be2\u5f15\u64ce", "\u5728TPC-H\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u9a8c\u8bc1\u6b63\u786e\u6027\uff0c\u7aef\u5230\u7aef\u5206\u6790\u541e\u5410\u91cf\u76f8\u6bd4JDBC/ODBC\u57fa\u7ebf\u6700\u9ad8\u63d0\u534727\u500d"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u6570\u636e\u5e93", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07696v1", "published_at": "2026-07-08", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Breaking Database Lock-in: Agentic Regeneration of High Performance Storage Readers for Database Bypass", "tldr": "\u7528LLM\u751f\u6210\u4ee3\u7801\u76f4\u63a5\u8bfb\u53d6\u6570\u636e\u5e93\u5b58\u50a8\u6587\u4ef6\uff0c\u7ed5\u8fc7JDBC/ODBC\u9a71\u52a8\u5b9e\u73b0\u6700\u9ad827\u500d\u5206\u6790\u52a0\u901f", "upvotes": 0, "what_it_is": "\u63d0\u51faJailbreak\u65b9\u6cd5\uff0c\u5229\u7528LLM\u81ea\u52a8\u5408\u6210\u6570\u636e\u5e93\u5b58\u50a8\u683c\u5f0f\u89e3\u6790\u4ee3\u7801\uff0c\u76f4\u63a5\u8bfb\u53d6PostgreSQL/MySQL\u5e95\u5c42\u6587\u4ef6\u5e76\u8f93\u51faApache Arrow\u5217\u5f0f\u7f13\u51b2\u533a\uff0c\u5b8c\u5168\u7ed5\u8fc7\u6570\u636e\u5e93\u5f15\u64ce\u548c\u9a71\u52a8\u5c42\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u4ee3\u7801\u5408\u6210\u7528\u4e8e\u6570\u636e\u5e93\u5b58\u50a8\u683c\u5f0f\u9006\u5411\u89e3\u6790\uff0c\u7a81\u7834\u6570\u636e\u5e93\u5382\u5546\u9501\u5b9a\u95ee\u9898\uff0c\u65b9\u6cd5\u53ef\u63a8\u5e7f\u81f3\u4efb\u4f55\u6709\u6587\u6863\u6216\u6e90\u7801\u7684\u6570\u636e\u5e93\u7cfb\u7edf\uff0c\u5bf9\u6570\u636e\u5de5\u7a0b\u548c\u5206\u6790\u573a\u666f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Agentic red-teaming benchmarks report whether an injected agent was compromised as a single bit: the attack succeeded, or it did not. We argue that this binary attack-success rate discards the information a defender most needs, namely how harmful the resulting action was. We introduce an action-graded harm rubric that scores an agent\u0027s tool-call trajectory on a seven-level ordinal scale (L0 to L6) according to whether the executed action was reversible, whether it crossed scope to reach another party, and whether it expanded privilege. We compute the scale two ways: a deterministic oracle that reads the trajectory and the attacker\u0027s stated goal, and a panel of three frontier language-model judges that read a tag-free account of the same trajectory. Across four victim models and two defenses on the AgentDojo workspace suite, severity grading exposes three cases the binary metric hides, including a defense that reports a zero attack-success rate while still permitting an externally visible cross-scope leak through an unfiltered tool. The judge panel reproduces the oracle with high ordinal agreement (Krippendorff\u0027s alpha = 0.91) but shares systematic blind spots that we characterize, most notably a failure to recognize escalation chains. Unlike prior work that provides harm taxonomies, harmful-task completion tests, execution-level safety benchmarks, or severity-aware simulation, our contribution is a reusable, trace-grounded severity instrument applied to the actual actions recorded in existing red-team logs. All code, prompts, and per-episode logs are released.", "arxiv_id": "2607.07474", "arxiv_url": "https://arxiv.org/abs/2607.07474", "authors": ["Harry Owiredu-Ashley"], "brief": "\u672c\u6587\u9488\u5bf9AI\u667a\u80fd\u4f53\u7ea2\u961f\u6d4b\u8bd5\u4e2d\u4ec5\u7528\"\u653b\u51fb\u6210\u529f/\u5931\u8d25\"\u4e8c\u5143\u6307\u6807\u7684\u5c40\u9650\u6027\uff0c\u63d0\u51fa\u4e86\u4e00\u5957\u57fa\u4e8e\u52a8\u4f5c\u8f68\u8ff9\u7684\u4e03\u7ea7\u5371\u5bb3\u4e25\u91cd\u6027\u8bc4\u5206\u4f53\u7cfb\uff08L0-L6\uff09\uff0c\u4ece\u53ef\u9006\u6027\u3001\u8de8\u8303\u56f4\u5f71\u54cd\u548c\u6743\u9650\u6269\u5c55\u4e09\u4e2a\u7ef4\u5ea6\u91cf\u5316\u667a\u80fd\u4f53\u5de5\u5177\u8c03\u7528\u884c\u4e3a\u7684\u5b9e\u9645\u5371\u5bb3\u7a0b\u5ea6\u3002", "categories": ["cs.CR", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07474", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4e03\u7ea7\u6709\u5e8f\u5371\u5bb3\u91cf\u8868\uff08L0-L6\uff09\u57fa\u4e8e\u4e09\u4e2a\u7ef4\u5ea6\uff1a\u64cd\u4f5c\u53ef\u9006\u6027\u3001\u662f\u5426\u8de8\u8303\u56f4\u5f71\u54cd\u7b2c\u4e09\u65b9\u3001\u662f\u5426\u5b58\u5728\u6743\u9650\u63d0\u5347", "\u63d0\u4f9b\u4e24\u79cd\u8bc4\u5206\u65b9\u5f0f\uff1a\u786e\u5b9a\u6027\u89c4\u5219Oracle\u548c\u4e09\u4e2a\u524d\u6cbfLLM\u7ec4\u6210\u7684\u8bc4\u5ba1\u56e2\uff0c\u540e\u8005\u4e0eOracle\u7684Krippendorff\u0027s alpha\u4e00\u81f4\u6027\u9ad8\u8fbe0.91", "\u5728AgentDojo\u57fa\u51c6\u4e0a\u53d1\u73b0\u4e8c\u5143\u6307\u6807\u7684\u76f2\u533a\uff1a\u67d0\u9632\u5fa1\u65b9\u6848\u653b\u51fb\u6210\u529f\u7387\u4e3a\u96f6\uff0c\u4f46\u4ecd\u5b58\u5728\u53ef\u88ab\u5916\u90e8\u89c2\u5bdf\u5230\u7684\u8de8\u8303\u56f4\u6570\u636e\u6cc4\u9732"], "keywords": ["\u667a\u80fd\u4f53", "AI\u5b89\u5168", "\u7ea2\u961f\u6d4b\u8bd5", "\u8bc4\u4f30\u57fa\u51c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07474v1", "published_at": "2026-07-08", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Beyond Attack-Success Rate: Action-Graded Severity Scale for Tool-Using AI Agents", "tldr": "\u63d0\u51fa\u4e03\u7ea7\u5371\u5bb3\u8bc4\u5206\u6807\u51c6\uff0c\u66ff\u4ee3\u4e8c\u5143\u653b\u51fb\u6210\u529f\u7387\u6765\u8bc4\u4f30\u5de5\u5177\u8c03\u7528AI\u667a\u80fd\u4f53\u7684\u5b89\u5168\u98ce\u9669", "upvotes": 0, "what_it_is": "\u672c\u6587\u9488\u5bf9AI\u667a\u80fd\u4f53\u7ea2\u961f\u6d4b\u8bd5\u4e2d\u4ec5\u7528\"\u653b\u51fb\u6210\u529f/\u5931\u8d25\"\u4e8c\u5143\u6307\u6807\u7684\u5c40\u9650\u6027\uff0c\u63d0\u51fa\u4e86\u4e00\u5957\u57fa\u4e8e\u52a8\u4f5c\u8f68\u8ff9\u7684\u4e03\u7ea7\u5371\u5bb3\u4e25\u91cd\u6027\u8bc4\u5206\u4f53\u7cfb\uff08L0-L6\uff09\uff0c\u4ece\u53ef\u9006\u6027\u3001\u8de8\u8303\u56f4\u5f71\u54cd\u548c\u6743\u9650\u6269\u5c55\u4e09\u4e2a\u7ef4\u5ea6\u91cf\u5316\u667a\u80fd\u4f53\u5de5\u5177\u8c03\u7528\u884c\u4e3a\u7684\u5b9e\u9645\u5371\u5bb3\u7a0b\u5ea6\u3002", "why_notable": "\u63ed\u793a\u4e86\u73b0\u6709AI\u5b89\u5168\u8bc4\u4f30\u4f53\u7cfb\u7684\u6839\u672c\u6027\u7f3a\u9677\u2014\u2014\u4e8c\u5143\u6307\u6807\u4f1a\u63a9\u76d6\u771f\u5b9e\u5371\u5bb3\uff0c\u6240\u63d0\u8bc4\u5206\u5de5\u5177\u53ef\u76f4\u63a5\u590d\u7528\u4e8e\u5df2\u6709\u7ea2\u961f\u65e5\u5fd7\uff0c\u4e14\u5168\u90e8\u4ee3\u7801\u548c\u6570\u636e\u5f00\u6e90\uff0c\u5bf9AI\u5b89\u5168\u8bc4\u4f30\u5b9e\u8df5\u5177\u6709\u76f4\u63a5\u6539\u8fdb\u4ef7\u503c"}, {"abstract": "Tool-using LLM agents can violate the very policies they are deployed to enforce while appearing to complete the task successfully. In policy-permissive environments, a tool may execute any well-formed call even when the corresponding state transition is forbidden by domain policy. The result is a silent wrong state (a booking cancelled, a passenger count changed, a claim acted on without verification) that neither the tool nor the agent\u0027s self-report exposes. We study this failure mode in the $\u03c4^2$-bench airline domain. On a budget agent, 78% of observed failures are silent wrong-state failures with no tool error, and the aggregate failure rate is reproducible across disjoint seeds, not sampling noise. We then evaluate a lightweight intervention: deterministic, read-only pre-execution gates that inspect the proposed call and current state before allowing a write. A four-gate suite raises full-benchmark success from 29.6% to 42.0% on gpt-4o-mini (+12.4pp; paired task-level bootstrap P=0.0012), and the lift reproduces on a disjoint 15-seed set (+12.3pp; P=0.0008). The effect is concentrated where the gates fire: on the 26/50 firing tasks, success rises by +19.2pp, while movement on the 24 non-firing tasks does not exclude zero. Two negative controls (a self-enforcing retail domain and BFCL) bound the mechanism: gates help when tools are policy-permissive and add little where tools already self-enforce. As suggestive evidence, not a central claim, the same failure mode persists at the frontier: gpt-5.2 at default reasoning still attempts policy-violating writes, and the same suite improves success from 61.2% to 71.6% (+10.4pp; P=0.020; n=5, no replication). The contribution is a bounded evaluation and reliability result: deterministic gates do not guarantee task success, but they can deterministically prevent a known class of silent policy-violating writes at the action boundary.", "arxiv_id": "2607.07405", "arxiv_url": "https://arxiv.org/abs/2607.07405", "authors": ["Vikas Reddy", "Sumanth Reddy Challaram", "Abhishek Basu"], "brief": "\u672c\u6587\u7814\u7a76\u5de5\u5177\u8c03\u7528\u578bLLM\u667a\u80fd\u4f53\u5728\u6267\u884c\u4efb\u52a1\u65f6\u6084\u65e0\u58f0\u606f\u5730\u8fdd\u53cd\u4e1a\u52a1\u7b56\u7565\u7684\u5931\u8d25\u6a21\u5f0f\uff0c\u5e76\u63d0\u51fa\u5728\u5199\u64cd\u4f5c\u524d\u63d2\u5165\u8f7b\u91cf\u7ea7\u786e\u5b9a\u6027\u53ea\u8bfb\u9884\u6267\u884c\u95e8\u63a7\uff08pre-execution gates\uff09\u6765\u68c0\u6d4b\u5e76\u963b\u6b62\u8fdd\u89c4\u8c03\u7528\u3002", "categories": ["cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07405", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5728\u822a\u7a7a\u9886\u57df\u57fa\u51c6\u03c4\u00b2-bench\u4e2d\uff0c78%\u7684\u5931\u8d25\u5c5e\u4e8e\u65e0\u5de5\u5177\u62a5\u9519\u7684\u9759\u9ed8\u9519\u8bef\u72b6\u6001\uff08\u5982\u9519\u8bef\u53d6\u6d88\u8ba2\u5355\u3001\u4fee\u6539\u4e58\u5ba2\u6570\u91cf\u7b49\uff09", "\u56db\u95e8\u63a7\u5957\u4ef6\u5c06gpt-4o-mini\u7684\u5168\u57fa\u51c6\u6210\u529f\u7387\u4ece29.6%\u63d0\u5347\u81f342.0%\uff08+12.4pp\uff0cP=0.0012\uff09\uff0c\u6548\u679c\u53ef\u5728\u72ec\u7acb\u79cd\u5b50\u96c6\u4e0a\u590d\u73b0", "\u95e8\u63a7\u6548\u679c\u96c6\u4e2d\u4e8e\u5b9e\u9645\u89e6\u53d1\u95e8\u63a7\u7684\u4efb\u52a1\uff0826/50\u4efb\u52a1\u6210\u529f\u7387+19.2pp\uff09\uff0c\u4e14\u5728gpt-5.2\u4e0a\u540c\u6837\u6709\u6548\uff08+10.4pp\uff09"], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u5b89\u5168\u53ef\u9760\u6027", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07405v1", "published_at": "2026-07-08", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Reason Less, Verify More: Deterministic Gates Recover a Silent Policy-Violation Failure Mode in Tool-Using LLM Agents", "tldr": "\u786e\u5b9a\u6027\u95e8\u63a7\u673a\u5236\u53ef\u6709\u6548\u62e6\u622a\u5de5\u5177\u8c03\u7528\u578bLLM\u667a\u80fd\u4f53\u7684\u9759\u9ed8\u7b56\u7565\u8fdd\u89c4\u5931\u8d25", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u5de5\u5177\u8c03\u7528\u578bLLM\u667a\u80fd\u4f53\u5728\u6267\u884c\u4efb\u52a1\u65f6\u6084\u65e0\u58f0\u606f\u5730\u8fdd\u53cd\u4e1a\u52a1\u7b56\u7565\u7684\u5931\u8d25\u6a21\u5f0f\uff0c\u5e76\u63d0\u51fa\u5728\u5199\u64cd\u4f5c\u524d\u63d2\u5165\u8f7b\u91cf\u7ea7\u786e\u5b9a\u6027\u53ea\u8bfb\u9884\u6267\u884c\u95e8\u63a7\uff08pre-execution gates\uff09\u6765\u68c0\u6d4b\u5e76\u963b\u6b62\u8fdd\u89c4\u8c03\u7528\u3002", "why_notable": "\u63ed\u793a\u4e86\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u4e2d\u4e00\u7c7b\u88ab\u5ffd\u89c6\u7684\u7cfb\u7edf\u6027\u5b89\u5168\u6f0f\u6d1e\uff08\u9759\u9ed8\u7b56\u7565\u8fdd\u89c4\uff09\uff0c\u5e76\u63d0\u4f9b\u4e86\u65e0\u9700\u4fee\u6539\u6a21\u578b\u3001\u4f4e\u6210\u672c\u53ef\u90e8\u7f72\u7684\u786e\u5b9a\u6027\u9632\u62a4\u65b9\u6848\uff0c\u5bf9\u751f\u4ea7\u73af\u5883\u4e2d\u7684LLM\u667a\u80fd\u4f53\u53ef\u9760\u6027\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Tool utilization enables Large Language Model (LLM) agents to interact with the real world and resolve complex tasks. However, existing agent frameworks predominantly rely on static toolsets composed of granular atomic actions (e.g., basic file I/O or single-turn search), which forces agents to reinvent low-level logic for every recurring workflow, leading to increased reasoning overhead and failure rates. In this study, we propose that agents can achieve self-evolution by synthesizing these atomic actions into reusable Standard Operating Procedures (SOPs), which function as callable higher-order tools that encapsulate multi-step logic. We further introduce EvoSOP, a framework that empowers agents to extract SOPs from execution trajectories and iteratively optimize the toolset through a systematic lifecycle of construction, merging, evaluation, and pruning. Extensive experiments demonstrate that EvoSOP significantly boosts task success rates while substantially reducing the number of interaction rounds compared to baselines. Our analysis also reveals that iterative tool optimization fosters reliable and efficient tool-use patterns, providing a scalable pathway for the development of self-evolving agents.", "arxiv_id": "2607.07321", "arxiv_url": "https://arxiv.org/abs/2607.07321", "authors": ["Haipeng Ding", "Yuexiang Xie", "Zhewei Wei", "Yaliang Li", "Bolin Ding"], "brief": "\u63d0\u51faEvoSOP\u6846\u67b6\uff0c\u4f7fLLM\u667a\u80fd\u4f53\u80fd\u4ece\u6267\u884c\u8f68\u8ff9\u4e2d\u63d0\u53d6\u6807\u51c6\u64cd\u4f5c\u7a0b\u5e8f\uff08SOP\uff09\uff0c\u5c06\u7ec6\u7c92\u5ea6\u539f\u5b50\u52a8\u4f5c\u5c01\u88c5\u4e3a\u53ef\u8c03\u7528\u7684\u9ad8\u9636\u5de5\u5177\uff0c\u5e76\u901a\u8fc7\u6784\u5efa\u3001\u5408\u5e76\u3001\u8bc4\u4f30\u3001\u526a\u679d\u7684\u5b8c\u6574\u751f\u547d\u5468\u671f\u8fed\u4ee3\u4f18\u5316\u5de5\u5177\u96c6\u3002", "categories": ["cs.AI", "cs.CL", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07321", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u539f\u5b50\u52a8\u4f5c\uff08\u5982\u57fa\u7840\u6587\u4ef6I/O\u3001\u5355\u8f6e\u641c\u7d22\uff09\u5408\u6210\u4e3a\u5c01\u88c5\u591a\u6b65\u903b\u8f91\u7684\u53ef\u590d\u7528SOP\u9ad8\u9636\u5de5\u5177\uff0c\u907f\u514d\u91cd\u590d\u63a8\u7406\u4f4e\u5c42\u903b\u8f91", "EvoSOP\u6846\u67b6\u5305\u542bSOP\u7684\u6784\u5efa\u2192\u5408\u5e76\u2192\u8bc4\u4f30\u2192\u526a\u679d\u5b8c\u6574\u751f\u547d\u5468\u671f\uff0c\u5b9e\u73b0\u5de5\u5177\u96c6\u7684\u6301\u7eed\u81ea\u6211\u4f18\u5316", "\u5b9e\u9a8c\u8868\u660eEvoSOP\u663e\u8457\u63d0\u5347\u4efb\u52a1\u6210\u529f\u7387\uff0c\u540c\u65f6\u5927\u5e45\u51cf\u5c11\u4ea4\u4e92\u8f6e\u6b21\uff0c\u5f62\u6210\u53ef\u9760\u9ad8\u6548\u7684\u5de5\u5177\u4f7f\u7528\u6a21\u5f0f"], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u4f7f\u7528", "\u5927\u8bed\u8a00\u6a21\u578b", "\u81ea\u6211\u8fdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07321v1", "published_at": "2026-07-08", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "From Atomic Actions to Standard Operating Procedures: Iterative Tool Optimization for Self-Evolving LLM Agents", "tldr": "\u5c06\u539f\u5b50\u52a8\u4f5c\u5408\u6210\u53ef\u590d\u7528\u6807\u51c6\u64cd\u4f5c\u7a0b\u5e8f\uff0c\u8ba9LLM\u667a\u80fd\u4f53\u901a\u8fc7\u8fed\u4ee3\u5de5\u5177\u4f18\u5316\u5b9e\u73b0\u81ea\u6211\u8fdb\u5316", "upvotes": 0, "what_it_is": "\u63d0\u51faEvoSOP\u6846\u67b6\uff0c\u4f7fLLM\u667a\u80fd\u4f53\u80fd\u4ece\u6267\u884c\u8f68\u8ff9\u4e2d\u63d0\u53d6\u6807\u51c6\u64cd\u4f5c\u7a0b\u5e8f\uff08SOP\uff09\uff0c\u5c06\u7ec6\u7c92\u5ea6\u539f\u5b50\u52a8\u4f5c\u5c01\u88c5\u4e3a\u53ef\u8c03\u7528\u7684\u9ad8\u9636\u5de5\u5177\uff0c\u5e76\u901a\u8fc7\u6784\u5efa\u3001\u5408\u5e76\u3001\u8bc4\u4f30\u3001\u526a\u679d\u7684\u5b8c\u6574\u751f\u547d\u5468\u671f\u8fed\u4ee3\u4f18\u5316\u5de5\u5177\u96c6\u3002", "why_notable": "\u73b0\u6709\u667a\u80fd\u4f53\u6846\u67b6\u4f9d\u8d56\u9759\u6001\u5de5\u5177\u96c6\u7684\u75db\u70b9\u660e\u663e\uff0cEvoSOP\u63d0\u4f9b\u4e86\u4e00\u6761\u53ef\u6269\u5c55\u7684\u81ea\u8fdb\u5316\u8def\u5f84\uff0c\u8ba9\u667a\u80fd\u4f53\u50cf\u4eba\u7c7b\u79ef\u7d2fSOP\u7ecf\u9a8c\u4e00\u6837\u6301\u7eed\u6210\u957f\uff0c\u5bf9\u590d\u6742\u4efb\u52a1\u81ea\u52a8\u5316\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Knowledge-based Visual Question Answering (KB-VQA) requires models to retrieve visual entities matching the query image from large-scale encyclopedic knowledge bases and answer related questions. Existing multimodal Retrieval Augmented Generation (mRAG) methods rely on global visual features to match candidate entities, yet when the knowledge base contains numerous visually similar entities, the retriever struggles to distinguish them, populating the candidate set with visually similar but factually mismatched distractors. Since subsequent processing steps such as noise filtering are also confined to this fixed candidate set, errors from failed retrieval inevitably propagate to the final answer. To address these challenges, we propose MMAgent-R$^2$, an agentic mRAG framework that integrates visual reranking and active rejection as its internal verification mechanism. Visual reranking directly compares query and candidate images, capturing discriminative details beyond textual descriptions to precisely identify the target entity among similar candidates; active rejection discards unreliable results and retrieves additional candidates when no confident match is found, moving beyond the fixed candidate pool. We design a composite reward function with step-level verification rewards and achieve joint optimization of external retrieval, internal verification, and answer generation via GRPO training. Experiments on InfoSeek, E-VQA, and MMhops demonstrate that \\ours{} achieves state-of-the-art performance, with particularly notable advantages in challenging retrieval scenarios and complex multi-image multi-hop reasoning tasks.", "arxiv_id": "2607.07383", "arxiv_url": "https://arxiv.org/abs/2607.07383", "authors": ["Tao Zhang", "Ziqi Zhang", "Zongyang Ma", "Yuxin Yang", "Bing Li", "Chunfeng Yuan", "Kang Rong", "Fengyun Rao", "Jing Lyu", "Weiming Hu"], "brief": "\u63d0\u51faMMAgent-R\u00b2\u6846\u67b6\uff0c\u5728\u591a\u6a21\u6001\u68c0\u7d22\u589e\u5f3a\u751f\u6210\uff08mRAG\uff09\u4e2d\u5f15\u5165\u89c6\u89c9\u91cd\u6392\u5e8f\u548c\u4e3b\u52a8\u62d2\u7edd\u673a\u5236\uff0c\u89e3\u51b3\u5927\u89c4\u6a21\u77e5\u8bc6\u5e93\u4e2d\u89c6\u89c9\u76f8\u4f3c\u5b9e\u4f53\u5e72\u6270\u5bfc\u81f4\u68c0\u7d22\u5931\u8d25\u7684\u95ee\u9898\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07383", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u89c6\u89c9\u91cd\u6392\u5e8f\uff1a\u76f4\u63a5\u5bf9\u6bd4\u67e5\u8be2\u56fe\u50cf\u4e0e\u5019\u9009\u56fe\u50cf\uff0c\u6355\u6349\u8d85\u8d8a\u6587\u672c\u63cf\u8ff0\u7684\u5224\u522b\u6027\u7ec6\u8282\uff0c\u7cbe\u51c6\u8bc6\u522b\u76ee\u6807\u5b9e\u4f53", "\u4e3b\u52a8\u62d2\u7edd\uff1a\u5f53\u65e0\u53ef\u4fe1\u5339\u914d\u65f6\u81ea\u52a8\u4e22\u5f03\u4e0d\u53ef\u9760\u7ed3\u679c\u5e76\u89e6\u53d1\u989d\u5916\u68c0\u7d22\uff0c\u7a81\u7834\u56fa\u5b9a\u5019\u9009\u96c6\u9650\u5236", "\u8bbe\u8ba1\u590d\u5408\u5956\u52b1\u51fd\u6570\uff0c\u901a\u8fc7GRPO\u8bad\u7ec3\u5b9e\u73b0\u5916\u90e8\u68c0\u7d22\u3001\u5185\u90e8\u9a8c\u8bc1\u4e0e\u7b54\u6848\u751f\u6210\u7684\u8054\u5408\u4f18\u5316\uff0c\u5728InfoSeek\u3001E-VQA\u3001MMhops\u4e0a\u8fbe\u5230SOTA"], "keywords": ["\u591a\u6a21\u6001", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u667a\u80fd\u4f53", "\u89c6\u89c9\u95ee\u7b54"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07383v1", "published_at": "2026-07-08", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MMAgent-R$^2$: Learning to Rerank and Reject for Agentic mRAG", "tldr": "MMAgent-R\u00b2\uff1a\u901a\u8fc7\u89c6\u89c9\u91cd\u6392\u5e8f\u4e0e\u4e3b\u52a8\u62d2\u7edd\u673a\u5236\u63d0\u5347\u591a\u6a21\u6001RAG\u7684\u77e5\u8bc6\u95ee\u7b54\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faMMAgent-R\u00b2\u6846\u67b6\uff0c\u5728\u591a\u6a21\u6001\u68c0\u7d22\u589e\u5f3a\u751f\u6210\uff08mRAG\uff09\u4e2d\u5f15\u5165\u89c6\u89c9\u91cd\u6392\u5e8f\u548c\u4e3b\u52a8\u62d2\u7edd\u673a\u5236\uff0c\u89e3\u51b3\u5927\u89c4\u6a21\u77e5\u8bc6\u5e93\u4e2d\u89c6\u89c9\u76f8\u4f3c\u5b9e\u4f53\u5e72\u6270\u5bfc\u81f4\u68c0\u7d22\u5931\u8d25\u7684\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c06\u4e3b\u52a8\u62d2\u7edd\u4e0e\u89c6\u89c9\u91cd\u6392\u5e8f\u7ed3\u5408\u5f15\u5165mRAG\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u6709\u6548\u963b\u65ad\u68c0\u7d22\u9519\u8bef\u4f20\u64ad\u94fe\uff0c\u5728\u590d\u6742\u591a\u56fe\u591a\u8df3\u63a8\u7406\u573a\u666f\u4e2d\u4f18\u52bf\u5c24\u4e3a\u7a81\u51fa\uff0c\u5bf9\u77e5\u8bc6\u5bc6\u96c6\u578b\u89c6\u89c9\u95ee\u7b54\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Reliable confidence estimation is essential for deploying large language models (LLMs) in confidence-aware systems, where downstream decisions such as retrieval, tool use, and adaptive computation depend on accurately estimating answer reliability. Existing approaches, however, largely treat confidence as a property of completed responses, overlooking how confidence-related information evolves throughout the answering process. In this work, we investigate confidence from a temporal perspective by comparing pre-solution Feeling-of-Knowing (FOK) and post-solution Judgement-of-Learning (JOL) confidence estimates across frontier and open-source LLMs. We show that post-solution confidence is consistently better calibrated and more discriminative than pre-solution confidence, while linear probes trained on hidden representations recover substantially richer confidence-related information than models explicitly verbalise. Building on this observation, we introduce future confidence distillation, which trains predictors operating on pre-solution hidden representations using teacher confidence estimates produced by post-solution correctness probes. Despite requiring only pre-solution representations for inference, distilled predictors recover much of the calibration improvement achieved by post-solution confidence, remain highly sample efficient, and transfer across datasets within the same domain. Together, our findings demonstrate that confidence-related information evolves throughout the answering process and can be anticipated before answer generation is complete, enabling significantly more reliable yet low-cost confidence estimation.", "arxiv_id": "2607.07626", "arxiv_url": "https://arxiv.org/abs/2607.07626", "authors": ["Sahil Kale"], "brief": "\u672c\u6587\u4ece\u65f6\u5e8f\u89c6\u89d2\u7814\u7a76LLM\u7f6e\u4fe1\u5ea6\u4f30\u8ba1\uff0c\u53d1\u73b0\u7b54\u540e\u7f6e\u4fe1\u5ea6\uff08JOL\uff09\u6bd4\u7b54\u524d\u7f6e\u4fe1\u5ea6\uff08FOK\uff09\u66f4\u51c6\u786e\uff1b\u636e\u6b64\u63d0\u51fa\"\u672a\u6765\u7f6e\u4fe1\u5ea6\u84b8\u998f\"\u6846\u67b6\uff0c\u7528\u7b54\u540e\u6b63\u786e\u6027\u63a2\u9488\u4f5c\u4e3a\u6559\u5e08\uff0c\u8bad\u7ec3\u4ec5\u4f9d\u8d56\u7b54\u524d\u9690\u5c42\u8868\u793a\u7684\u9884\u6d4b\u5668\uff0c\u5728\u63a8\u7406\u65f6\u65e0\u9700\u751f\u6210\u5b8c\u6574\u7b54\u6848\u5373\u53ef\u83b7\u5f97\u9ad8\u8d28\u91cf\u7f6e\u4fe1\u5ea6\u4f30\u8ba1\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07626", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u7b54\u540e\u7f6e\u4fe1\u5ea6\uff08JOL\uff09\u5728\u6821\u51c6\u6027\u548c\u5224\u522b\u6027\u4e0a\u59cb\u7ec8\u4f18\u4e8e\u7b54\u524d\u7f6e\u4fe1\u5ea6\uff08FOK\uff09\uff0c\u4e14\u7ebf\u6027\u63a2\u9488\u4ece\u9690\u5c42\u8868\u793a\u4e2d\u63d0\u53d6\u7684\u7f6e\u4fe1\u5ea6\u4fe1\u606f\u8fdc\u6bd4\u6a21\u578b\u663e\u5f0f\u8f93\u51fa\u7684\u4e30\u5bcc", "\u672a\u6765\u7f6e\u4fe1\u5ea6\u84b8\u998f\uff1a\u4ee5\u7b54\u540e\u6b63\u786e\u6027\u63a2\u9488\u4e3a\u6559\u5e08\uff0c\u76d1\u7763\u8bad\u7ec3\u7b54\u524d\u9690\u5c42\u8868\u793a\u4e0a\u7684\u9884\u6d4b\u5668\uff0c\u63a8\u7406\u65f6\u53ea\u9700\u7b54\u524d\u8868\u793a\u5373\u53ef\u6062\u590d\u5927\u90e8\u5206\u7b54\u540e\u6821\u51c6\u589e\u76ca", "\u65b9\u6cd5\u6837\u672c\u6548\u7387\u9ad8\uff0c\u4e14\u5728\u540c\u9886\u57df\u8de8\u6570\u636e\u96c6\u4e0a\u5177\u6709\u826f\u597d\u8fc1\u79fb\u6027\uff0c\u9002\u5408\u4f4e\u6210\u672c\u90e8\u7f72\u4e8e\u68c0\u7d22\u3001\u5de5\u5177\u8c03\u7528\u7b49\u7f6e\u4fe1\u5ea6\u611f\u77e5\u7cfb\u7edf"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u7f6e\u4fe1\u5ea6\u4f30\u8ba1", "\u77e5\u8bc6\u84b8\u998f", "\u53ef\u9760\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07626v1", "published_at": "2026-07-08", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Future Confidence Distillation in Large Language Models", "tldr": "\u63d0\u51fa\"\u672a\u6765\u7f6e\u4fe1\u5ea6\u84b8\u998f\"\u65b9\u6cd5\uff0c\u7528\u7b54\u540e\u7f6e\u4fe1\u5ea6\u76d1\u7763\u8bad\u7ec3\u7b54\u524d\u9884\u6d4b\u5668\uff0c\u5b9e\u73b0\u4f4e\u6210\u672c\u9ad8\u53ef\u9760\u7684LLM\u7f6e\u4fe1\u5ea6\u4f30\u8ba1", "upvotes": 0, "what_it_is": "\u672c\u6587\u4ece\u65f6\u5e8f\u89c6\u89d2\u7814\u7a76LLM\u7f6e\u4fe1\u5ea6\u4f30\u8ba1\uff0c\u53d1\u73b0\u7b54\u540e\u7f6e\u4fe1\u5ea6\uff08JOL\uff09\u6bd4\u7b54\u524d\u7f6e\u4fe1\u5ea6\uff08FOK\uff09\u66f4\u51c6\u786e\uff1b\u636e\u6b64\u63d0\u51fa\"\u672a\u6765\u7f6e\u4fe1\u5ea6\u84b8\u998f\"\u6846\u67b6\uff0c\u7528\u7b54\u540e\u6b63\u786e\u6027\u63a2\u9488\u4f5c\u4e3a\u6559\u5e08\uff0c\u8bad\u7ec3\u4ec5\u4f9d\u8d56\u7b54\u524d\u9690\u5c42\u8868\u793a\u7684\u9884\u6d4b\u5668\uff0c\u5728\u63a8\u7406\u65f6\u65e0\u9700\u751f\u6210\u5b8c\u6574\u7b54\u6848\u5373\u53ef\u83b7\u5f97\u9ad8\u8d28\u91cf\u7f6e\u4fe1\u5ea6\u4f30\u8ba1\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u7f6e\u4fe1\u5ea6\u89c6\u4e3a\u52a8\u6001\u6f14\u5316\u8fc7\u7a0b\u800c\u975e\u9759\u6001\u5c5e\u6027\uff0c\u901a\u8fc7\u77e5\u8bc6\u84b8\u998f\u6865\u63a5\u7b54\u524d/\u7b54\u540e\u4fe1\u606f\u5dee\u8ddd\uff0c\u4e3aLLM\u53ef\u9760\u6027\u8bc4\u4f30\u63d0\u4f9b\u4e86\u5b9e\u7528\u4e14\u9ad8\u6548\u7684\u65b0\u8303\u5f0f"}, {"abstract": "Agents acting on our behalf in the real world (e.g. placing phone calls) must learn online from costly, often irreversible interactions rather than cheap simulator steps. Two things follow. First, deployability depends on the path, not only the outcome. An agent must respect outcome-neutral constraints such as not repeatedly calling an unresponsive user, respecting business hours, or completing required authentication constraints that outcome-based rewards cannot express, since violating them frequently improves apparent success. Second, because each interaction is expensive, the agent must learn efficiently from very few examples. Reinforcement learning from verifiable rewards (RLVR) is blind to both challenges: it optimizes solely on the outcome and wastes expensive rollouts on all-fail groups where group-relative advantage collapses to zero. Attempts to densify supervision by rewarding progress target the hard-to-verify direction. In contrast, real agentic environments can cheaply detect bad moves. Since group-relative advantage is equivalent to within-group variance, a dense signal helps only when it supplies variance the outcome lacks. A verifiable penalty on the path meets this condition reliably, while a progress potential helps only where partial progress is reachable. The resulting recipe \"penalize the path, reward the outcome\" achieves high task success with near-zero violations, where outcome-only training violates constraints on nearly every episode. We provide four design rules for effective penalties, including avoidance of the inaction trap that arises when a penalty is used in isolation.", "arxiv_id": "2607.07435", "arxiv_url": "https://arxiv.org/abs/2607.07435", "authors": ["Bojie Li", "Noah Shi"], "brief": "\u63d0\u51faRLVP\uff08Reinforce Learning with Verifiable Penalties\uff09\u8bad\u7ec3\u8303\u5f0f\uff0c\u5728RLVR\u57fa\u7840\u4e0a\u5f15\u5165\u8def\u5f84\u7ea7\u53ef\u9a8c\u8bc1\u60e9\u7f5a\u4fe1\u53f7\uff0c\u4f7f\u667a\u80fd\u4f53\u5728\u4f18\u5316\u4efb\u52a1\u6210\u529f\u7387\u7684\u540c\u65f6\u9075\u5b88\u7ed3\u679c\u4e2d\u6027\u7ea6\u675f\uff08\u5982\u7981\u6b62\u91cd\u590d\u62e8\u6253\u3001\u9075\u5b88\u8425\u4e1a\u65f6\u95f4\u7b49\uff09\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07435", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u6d1e\u5bdf\uff1a\u7ec4\u76f8\u5bf9\u4f18\u52bf\u7b49\u4ef7\u4e8e\u7ec4\u5185\u65b9\u5dee\uff0c\u8def\u5f84\u60e9\u7f5a\u80fd\u5728\u5168\u5931\u8d25\u7ec4\u4e2d\u63d0\u4f9b\u7ed3\u679c\u4fe1\u53f7\u6240\u7f3a\u5931\u7684\u65b9\u5dee\uff0c\u4ece\u800c\u89e3\u51b3RLVR\u7684\u65e0\u6548rollout\u95ee\u9898", "\u771f\u5b9e\u4e16\u754c\u667a\u80fd\u4f53\u7684\u7ea6\u675f\uff08\u5982\u8ba4\u8bc1\u6d41\u7a0b\u3001\u793c\u8c8c\u89c4\u8303\uff09\u96be\u4ee5\u7528\u7ed3\u679c\u5956\u52b1\u8868\u8fbe\uff0c\u4f46\u8fdd\u89c4\u884c\u4e3a\u53ef\u88ab\u5ec9\u4ef7\u68c0\u6d4b\uff0c\u9002\u5408\u4f5c\u4e3a\u60e9\u7f5a\u4fe1\u53f7", "\u63d0\u51fa\u56db\u6761\u60e9\u7f5a\u8bbe\u8ba1\u89c4\u5219\uff0c\u5305\u62ec\u907f\u514d\"\u4e0d\u4f5c\u4e3a\u9677\u9631\"\uff08\u5355\u72ec\u4f7f\u7528\u60e9\u7f5a\u65f6\u667a\u80fd\u4f53\u503e\u5411\u4e8e\u4ec0\u4e48\u90fd\u4e0d\u505a\u4ee5\u89c4\u907f\u60e9\u7f5a\uff09"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u7ea6\u675f\u4f18\u5316", "LLM agent"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07435v1", "published_at": "2026-07-08", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RLVP: Penalize the Path, Reward the Outcome", "tldr": "\u63d0\u51faRLVP\u6846\u67b6\uff1a\u5bf9\u8def\u5f84\u65bd\u52a0\u53ef\u9a8c\u8bc1\u60e9\u7f5a\u3001\u5bf9\u7ed3\u679c\u7ed9\u4e88\u5956\u52b1\uff0c\u89e3\u51b3\u771f\u5b9e\u4e16\u754c\u667a\u80fd\u4f53\u7684\u7ea6\u675f\u8fdd\u53cd\u4e0e\u6837\u672c\u6548\u7387\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faRLVP\uff08Reinforce Learning with Verifiable Penalties\uff09\u8bad\u7ec3\u8303\u5f0f\uff0c\u5728RLVR\u57fa\u7840\u4e0a\u5f15\u5165\u8def\u5f84\u7ea7\u53ef\u9a8c\u8bc1\u60e9\u7f5a\u4fe1\u53f7\uff0c\u4f7f\u667a\u80fd\u4f53\u5728\u4f18\u5316\u4efb\u52a1\u6210\u529f\u7387\u7684\u540c\u65f6\u9075\u5b88\u7ed3\u679c\u4e2d\u6027\u7ea6\u675f\uff08\u5982\u7981\u6b62\u91cd\u590d\u62e8\u6253\u3001\u9075\u5b88\u8425\u4e1a\u65f6\u95f4\u7b49\uff09\u3002", "why_notable": "\u9488\u5bf9\u771f\u5b9e\u4e16\u754c\u90e8\u7f72\u573a\u666f\uff08\u7535\u8bdd\u4ee3\u7406\u7b49\uff09\u7684\u5173\u952e\u75db\u70b9\uff0c\u5c06\u8def\u5f84\u7ea6\u675f\u4e0e\u7ed3\u679c\u4f18\u5316\u7edf\u4e00\u5230RL\u6846\u67b6\u4e2d\uff0c\u8fd1\u96f6\u8fdd\u89c4\u7387 vs \u7eaf\u7ed3\u679c\u8bad\u7ec3\u51e0\u4e4e\u6bcf\u8f6e\u8fdd\u89c4\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "In agentic scientific machine learning (SciML), large language model (LLM) agents can discover surrogate models and select one by an automated score, typically an error metric. A low error, however, does not establish that the predicted fields satisfy the physics that matter for mechanics, such as boundary conditions, superposition, stiffness scaling, or causality. We introduce Physics-Audited Agentic SciML (PA-SciML), a verification-first workflow for agentic SciML discovery. The workflow fixes a scoring evaluator before search, derives reviewable machine-checkable physics requirements, checks each trained candidate on its outputs, and separately searches prescribed input ranges or measured load-history spans for high-violation cases without reference solution fields. A surrogate is reported as verified only under the stated checks. When enabled, the workflow also adds advisory numerical probes before training and tests one modeling change at a time to record which isolated edits are associated with score gains before reuse. In the reported computational-solid-mechanics numerical examples, the static elasticity run selects a surrogate with lower validation error than the error-only baseline while both selected models pass the common linear-elastic checks. In the transient elastodynamics run, an error-only baseline with similar mean error fails a stricter causality check by responding to future parts of the loading history, while the selected surrogate passes the stated checks. The main distinction is per-candidate physics evidence on predicted fields, not a richer aggregate score.", "arxiv_id": "2607.07379", "arxiv_url": "https://arxiv.org/abs/2607.07379", "authors": ["Diab W. Abueidda", "Bilal Ahmed", "Panos Pantidis", "Mostafa E. Mobasher"], "brief": "\u63d0\u51faPA-SciML\u6846\u67b6\uff0c\u5728LLM\u667a\u80fd\u4f53\u81ea\u52a8\u53d1\u73b0\u4ee3\u7406\u6a21\u578b\u7684\u8fc7\u7a0b\u4e2d\uff0c\u5f15\u5165\u53ef\u673a\u5668\u68c0\u9a8c\u7684\u7269\u7406\u7ea6\u675f\u5ba1\u6838\u673a\u5236\uff0c\u786e\u4fdd\u6240\u9009\u6a21\u578b\u4e0d\u4ec5\u8bef\u5dee\u4f4e\uff0c\u8fd8\u6ee1\u8db3\u8fb9\u754c\u6761\u4ef6\u3001\u53e0\u52a0\u539f\u7406\u3001\u521a\u5ea6\u7f29\u653e\u548c\u56e0\u679c\u6027\u7b49\u529b\u5b66\u8981\u6c42\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07379", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5728\u641c\u7d22\u524d\u56fa\u5b9a\u8bc4\u5206\u6807\u51c6\uff0c\u5e76\u5c06\u7269\u7406\u8981\u6c42\u8f6c\u5316\u4e3a\u53ef\u673a\u5668\u68c0\u9a8c\u7684\u7ea6\u675f\u6761\u4ef6\uff0c\u5bf9\u6bcf\u4e2a\u5019\u9009\u6a21\u578b\u7684\u8f93\u51fa\u8fdb\u884c\u9010\u4e00\u9a8c\u8bc1", "\u5728\u5f39\u6027\u52a8\u529b\u5b66\u5b9e\u9a8c\u4e2d\uff0c\u4ec5\u57fa\u4e8e\u8bef\u5dee\u7684\u57fa\u7ebf\u6a21\u578b\u56e0\u54cd\u5e94\u672a\u6765\u8f7d\u8377\u5386\u53f2\u800c\u8fdd\u53cd\u56e0\u679c\u6027\uff0c\u800cPA-SciML\u9009\u51fa\u7684\u6a21\u578b\u901a\u8fc7\u4e86\u6240\u6709\u7269\u7406\u68c0\u9a8c", "\u652f\u6301\u8bad\u7ec3\u524d\u6570\u503c\u63a2\u9488\u548c\u5355\u6b21\u5355\u4e00\u5efa\u6a21\u53d8\u66f4\u6d4b\u8bd5\uff0c\u8bb0\u5f55\u54ea\u4e9b\u5b64\u7acb\u4fee\u6539\u4e0e\u6027\u80fd\u63d0\u5347\u76f8\u5173\uff0c\u63d0\u5347\u53ef\u89e3\u91ca\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u673a\u5668\u5b66\u4e60", "\u7269\u7406\u7ea6\u675f", "\u4ee3\u7406\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07379v1", "published_at": "2026-07-08", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Physics-Audited Agentic Discovery in Scientific Machine Learning", "tldr": "\u63d0\u51fa\u7269\u7406\u5ba1\u6838\u4f18\u5148\u7684\u667a\u80fd\u4f53\u79d1\u5b66\u673a\u5668\u5b66\u4e60\u5de5\u4f5c\u6d41\uff0c\u786e\u4fdd\u4ee3\u7406\u6a21\u578b\u6ee1\u8db3\u529b\u5b66\u7269\u7406\u7ea6\u675f", "upvotes": 0, "what_it_is": "\u63d0\u51faPA-SciML\u6846\u67b6\uff0c\u5728LLM\u667a\u80fd\u4f53\u81ea\u52a8\u53d1\u73b0\u4ee3\u7406\u6a21\u578b\u7684\u8fc7\u7a0b\u4e2d\uff0c\u5f15\u5165\u53ef\u673a\u5668\u68c0\u9a8c\u7684\u7269\u7406\u7ea6\u675f\u5ba1\u6838\u673a\u5236\uff0c\u786e\u4fdd\u6240\u9009\u6a21\u578b\u4e0d\u4ec5\u8bef\u5dee\u4f4e\uff0c\u8fd8\u6ee1\u8db3\u8fb9\u754c\u6761\u4ef6\u3001\u53e0\u52a0\u539f\u7406\u3001\u521a\u5ea6\u7f29\u653e\u548c\u56e0\u679c\u6027\u7b49\u529b\u5b66\u8981\u6c42\u3002", "why_notable": "\u73b0\u6709SciML\u667a\u80fd\u4f53\u4ec5\u4ee5\u8bef\u5dee\u6307\u6807\u7b5b\u9009\u6a21\u578b\uff0c\u5ffd\u89c6\u7269\u7406\u5408\u7406\u6027\uff1b\u672c\u6587\u9996\u6b21\u5c06\u7269\u7406\u5408\u89c4\u6027\u9a8c\u8bc1\u7cfb\u7edf\u6027\u5d4c\u5165\u667a\u80fd\u4f53\u53d1\u73b0\u6d41\u7a0b\uff0c\u5bf9\u5de5\u7a0b\u5b89\u5168\u5173\u952e\u5e94\u7528\uff08\u5982\u56fa\u4f53\u529b\u5b66\u4eff\u771f\uff09\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Artificial intelligence is rapidly evolving from generative systems to agentic AI capable of autonomously planning and executing tasks. Widely characterized as the Year of Agentic AI, 2025 marked accelerated development and deployment, introducing new ethical and governance challenges. This paper presents a systematic review of the emerging literature on agentic AI governance. Our analysis identifies features that distinguish agentic AI from traditional systems and why it warrants targeted governance attention. We synthesize prevailing governance priorities, proposed mechanisms, and stakeholder roles shaping this evolving domain. As an initial scholarly effort, this review lays the preliminary groundwork for developing a structured roadmap to guide responsible and adaptive agentic AI governance.", "arxiv_id": "2607.07612", "arxiv_url": "https://arxiv.org/abs/2607.07612", "authors": ["Mubarak Raji", "Masooda Bashir"], "brief": "\u672c\u6587\u5bf9\u65b0\u5174\u7684\u667a\u80fd\u4f53AI\u6cbb\u7406\u6587\u732e\u8fdb\u884c\u7cfb\u7edf\u7efc\u8ff0\uff0c\u68b3\u7406\u667a\u80fd\u4f53AI\u533a\u522b\u4e8e\u4f20\u7edfAI\u7cfb\u7edf\u7684\u6838\u5fc3\u7279\u5f81\uff0c\u5e76\u5f52\u7eb3\u5f53\u524d\u6cbb\u7406\u4f18\u5148\u4e8b\u9879\u3001\u63d0\u8bae\u673a\u5236\u53ca\u5229\u76ca\u76f8\u5173\u65b9\u89d2\u8272\u3002", "categories": ["cs.CY", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07612", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["2025\u5e74\u88ab\u5e7f\u6cdb\u79f0\u4e3a\"\u667a\u80fd\u4f53AI\u5143\u5e74\"\uff0c\u81ea\u4e3b\u89c4\u5212\u4e0e\u6267\u884c\u4efb\u52a1\u7684\u80fd\u529b\u5e26\u6765\u5168\u65b0\u4f26\u7406\u4e0e\u6cbb\u7406\u6311\u6218", "\u8bc6\u522b\u667a\u80fd\u4f53AI\u7684\u72ec\u7279\u5c5e\u6027\uff08\u81ea\u4e3b\u6027\u3001\u591a\u6b65\u89c4\u5212\u3001\u5de5\u5177\u8c03\u7528\u7b49\uff09\uff0c\u8bba\u8bc1\u5176\u9700\u8981\u6709\u522b\u4e8e\u4f20\u7edfAI\u7684\u4e13\u9879\u6cbb\u7406\u6846\u67b6", "\u7efc\u5408\u73b0\u6709\u6cbb\u7406\u4f18\u5148\u7ea7\u4e0e\u673a\u5236\uff0c\u4e3a\u6784\u5efa\u7ed3\u6784\u5316\u3001\u9002\u5e94\u6027\u6cbb\u7406\u8def\u7ebf\u56fe\u63d0\u4f9b\u521d\u6b65\u5b66\u672f\u57fa\u7840"], "keywords": ["\u667a\u80fd\u4f53", "AI\u6cbb\u7406", "\u4f26\u7406\u4e0e\u5b89\u5168", "\u7efc\u8ff0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07612v1", "published_at": "2026-07-08", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Towards Agentic AI Governance: A Preliminary Assessment", "tldr": "\u7cfb\u7edf\u7efc\u8ff0\u667a\u80fd\u4f53AI\u6cbb\u7406\u7684\u73b0\u72b6\u3001\u6311\u6218\u4e0e\u673a\u5236\uff0c\u4e3a\u8d1f\u8d23\u4efb\u7684\u6cbb\u7406\u8def\u7ebf\u56fe\u5960\u57fa", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9\u65b0\u5174\u7684\u667a\u80fd\u4f53AI\u6cbb\u7406\u6587\u732e\u8fdb\u884c\u7cfb\u7edf\u7efc\u8ff0\uff0c\u68b3\u7406\u667a\u80fd\u4f53AI\u533a\u522b\u4e8e\u4f20\u7edfAI\u7cfb\u7edf\u7684\u6838\u5fc3\u7279\u5f81\uff0c\u5e76\u5f52\u7eb3\u5f53\u524d\u6cbb\u7406\u4f18\u5148\u4e8b\u9879\u3001\u63d0\u8bae\u673a\u5236\u53ca\u5229\u76ca\u76f8\u5173\u65b9\u89d2\u8272\u3002", "why_notable": "\u968f\u7740\u667a\u80fd\u4f53AI\u5feb\u901f\u843d\u5730\uff0c\u6cbb\u7406\u6ede\u540e\u98ce\u9669\u663e\u8457\u4e0a\u5347\uff1b\u672c\u6587\u4f5c\u4e3a\u8be5\u9886\u57df\u9996\u6279\u7cfb\u7edf\u6027\u5b66\u672f\u7efc\u8ff0\u4e4b\u4e00\uff0c\u4e3a\u653f\u7b56\u5236\u5b9a\u8005\u548c\u7814\u7a76\u8005\u63d0\u4f9b\u4e86\u91cd\u8981\u53c2\u8003\u6846\u67b6\u3002"}, {"abstract": "We introduce institutional red-teaming, an evaluation methodology for testing deployment rules in multi-agent AI: hold the agents, objectives, and task state fixed, vary only one rule, and attribute the resulting change in collective behavior to that rule. We instantiate the methodology in IABench-CA, a consequence-allocation benchmark spanning 228 contexts, five canonical rules, and seven model populations (33,924 games), with a normative cooperative reference and auto-labelled reasoning traces. Three findings emerge. (1) Deployment rules causally alter collective safety: changing only the consequence rule moves mean fatality by 22 to 58 percentage points within every population. (2) There is no safe default, but the targeting hazard is universal: the safest rule, the least-safe rule, and even the direction of the incidence effect vary across populations, yet regressive identity-targeting is never decisively safest in any context for any population, eliminates the least-resourced agent in 30-87% of games everywhere, and is selection-unsafe relative to the cooperative reference for all seven populations. (3) Identity salience is the mechanism: a one-shot anonymization ablation on the most exploitation-prone population (gpt-5.1) shows that merely naming the loss bearer in the rule text drives targeted elimination from 22% to 81% at identical payoffs; under repeated play, anonymization only delays the targeting, as agents re-infer the hidden rule from observed eliminations. We package the methodology as a safety-case workflow that certifies a provisional rule region $\u03a6(c,P)$ per deployment context and population, with explicit residual risks and monitoring obligations.", "arxiv_id": "2607.07695", "arxiv_url": "https://arxiv.org/abs/2607.07695", "authors": ["Yujiao Chen"], "brief": "\u63d0\u51fa\"\u673a\u6784\u7ea2\u961f\u6d4b\u8bd5\"\u8bc4\u4f30\u65b9\u6cd5\u8bba\uff0c\u901a\u8fc7\u56fa\u5b9a\u667a\u80fd\u4f53\u3001\u76ee\u6807\u548c\u4efb\u52a1\u72b6\u6001\u3001\u4ec5\u6539\u53d8\u90e8\u7f72\u89c4\u5219\uff0c\u6765\u91cf\u5316\u89c4\u5219\u5bf9\u591a\u667a\u80fd\u4f53\u96c6\u4f53\u884c\u4e3a\u7684\u56e0\u679c\u5f71\u54cd\uff1b\u5e76\u6784\u5efaIABench-CA\u57fa\u51c6\uff08228\u4e2a\u573a\u666f\u30015\u79cd\u89c4\u5219\u30017\u4e2a\u6a21\u578b\u7fa4\u4f53\u300133924\u5c40\u535a\u5f08\uff09\u52a0\u4ee5\u9a8c\u8bc1\u3002", "categories": ["cs.AI", "cs.GT", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07695", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4ec5\u6539\u53d8\u540e\u679c\u5206\u914d\u89c4\u5219\uff0c\u53ef\u4f7f\u5e73\u5747\u81f4\u547d\u7387\u5728\u540c\u4e00\u6a21\u578b\u7fa4\u4f53\u5185\u79fb\u52a822\u81f358\u4e2a\u767e\u5206\u70b9\uff0c\u8bc1\u660e\u89c4\u5219\u5177\u6709\u5f3a\u56e0\u679c\u6548\u529b", "\u8eab\u4efd\u663e\u8457\u6027", "\u662f\u6838\u5fc3\u673a\u5236\uff1a\u89c4\u5219\u6587\u672c\u4e2d\u4ec5\u547d\u540d\u635f\u5931\u627f\u62c5\u8005\uff0c\u5c31\u80fd\u4f7fGPT-4.1\u7fa4\u4f53\u7684\u5b9a\u5411\u6dd8\u6c70\u7387\u4ece22%\u98d9\u5347\u81f381%\uff1b\u5373\u4fbf\u533f\u540d\u5316\uff0c\u667a\u80fd\u4f53\u4e5f\u4f1a\u901a\u8fc7\u89c2\u5bdf\u63a8\u65ad\u9690\u85cf\u89c4\u5219", "\u56de\u5f52\u6027\u8eab\u4efd\u5b9a\u5411\u89c4\u5219\u5728\u6240\u67097\u4e2a\u6a21\u578b\u7fa4\u4f53\u7684\u4efb\u4f55\u573a\u666f\u4e2d\u5747\u975e\u6700\u5b89\u5168\u9009\u9879\uff0c\u4e14\u572830-87%\u7684\u535a\u5f08\u4e2d\u6d88\u706d\u8d44\u6e90\u6700\u5c11\u7684\u667a\u80fd\u4f53\uff0c\u5177\u6709\u666e\u904d\u5371\u5bb3\u6027"], "keywords": ["\u591a\u667a\u80fd\u4f53", "AI\u5b89\u5168", "\u667a\u80fd\u4f53", "\u535a\u5f08\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07695v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Institutional Red-Teaming: Deployment Rules, Not Just Models, Causally Shape Multi-Agent AI Safety", "tldr": "\u63d0\u51fa\u673a\u6784\u7ea2\u961f\u6d4b\u8bd5\u65b9\u6cd5\uff0c\u8bc1\u660e\u591a\u667a\u80fd\u4f53AI\u4e2d\u90e8\u7f72\u89c4\u5219\u672c\u8eab\uff08\u800c\u975e\u6a21\u578b\uff09\u662f\u96c6\u4f53\u5b89\u5168\u884c\u4e3a\u7684\u5173\u952e\u56e0\u679c\u56e0\u7d20", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u673a\u6784\u7ea2\u961f\u6d4b\u8bd5\"\u8bc4\u4f30\u65b9\u6cd5\u8bba\uff0c\u901a\u8fc7\u56fa\u5b9a\u667a\u80fd\u4f53\u3001\u76ee\u6807\u548c\u4efb\u52a1\u72b6\u6001\u3001\u4ec5\u6539\u53d8\u90e8\u7f72\u89c4\u5219\uff0c\u6765\u91cf\u5316\u89c4\u5219\u5bf9\u591a\u667a\u80fd\u4f53\u96c6\u4f53\u884c\u4e3a\u7684\u56e0\u679c\u5f71\u54cd\uff1b\u5e76\u6784\u5efaIABench-CA\u57fa\u51c6\uff08228\u4e2a\u573a\u666f\u30015\u79cd\u89c4\u5219\u30017\u4e2a\u6a21\u578b\u7fa4\u4f53\u300133924\u5c40\u535a\u5f08\uff09\u52a0\u4ee5\u9a8c\u8bc1\u3002", "why_notable": "\u9996\u6b21\u5c06\u5b89\u5168\u8d23\u4efb\u4ece\u6a21\u578b\u672c\u8eab\u6269\u5c55\u5230\u90e8\u7f72\u89c4\u5219\u5c42\u9762\uff0c\u63d0\u4f9b\u53ef\u64cd\u4f5c\u7684\u5b89\u5168\u8ba4\u8bc1\u5de5\u4f5c\u6d41\uff08\u89c4\u5219\u533a\u57df\u03a6(c,P)\uff09\uff0c\u5bf9AI\u6cbb\u7406\u4e0e\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u90e8\u7f72\u89c4\u8303\u5177\u6709\u76f4\u63a5\u653f\u7b56\u610f\u4e49"}, {"abstract": "AI systems increasingly participate in their own improvement: revising their outputs, adapting their own harnesses during deployment, training on data they generate, and, increasingly, conducting AI research itself. This literature is described under a vocabulary (\"self-refine,\" \"self-reward,\" \"self-play,\" \"self-evolve\") that conflates fundamentally different ambitions. We survey 1,250 arXiv papers (2024-2026) along two axes: what the system improves -- its behavior in deployment, its policy through training, its evaluator, or the research process itself -- and the degree of loop closure (human-in-the-loop to fully closed). The taxonomy separates bounded self-refinement -- convergent, evaluable, and already industrial practice -- from open-ended recursive self-improvement (RSI), which remains bounded by grounding requirements, collapse dynamics, and compute constraints on every measured axis. Its distinctive feature is a dedicated category for self-evaluation: every improvement loop is a claim that some signal can substitute for human judgment. We survey the evaluator design space -- judges, process reward models, verifiers, rubrics, meta-evaluation -- order the signals into a verification hierarchy from formal verifiers (strongest) to intrinsic self-assessment (weakest), and observe that demonstrated self-improvement strength tracks this hierarchy, that its failure modes (self-confirming loops, model collapse, diversity collapse) follow from its violations, and that the \"research direction-setting\" bottleneck keeping humans in the loop sits at the top of that hierarchy. We connect the technical literature to the theory of RSI limits and to the safety and governance questions raised by frontier-lab accounts of closing the loop, and identify governance-grade measurement of self-improvement as the field\u0027s most underpopulated niche.", "arxiv_id": "2607.07663", "arxiv_url": "https://arxiv.org/abs/2607.07663", "authors": ["Mingguang Chen", "Licheng Wang", "Bo Qu"], "brief": "\u672c\u6587\u5bf92024-2026\u5e74\u95f41250\u7bc7arXiv\u8bba\u6587\u8fdb\u884c\u7cfb\u7edf\u7efc\u8ff0\uff0c\u63d0\u51fa\u4e00\u5957\u5206\u7c7b\u6846\u67b6\uff0c\u5c06AI\u81ea\u6211\u6539\u8fdb\u7814\u7a76\u6309\"\u6539\u8fdb\u5bf9\u8c61\"\u4e0e\"\u5faa\u73af\u95ed\u5408\u7a0b\u5ea6\"\u4e24\u4e2a\u7ef4\u5ea6\u52a0\u4ee5\u533a\u5206\uff0c\u5398\u6e05\u6709\u754c\u81ea\u6211\u7cbe\u70bc\u4e0e\u5f00\u653e\u5f0f\u9012\u5f52\u81ea\u6211\u6539\u8fdb\uff08RSI\uff09\u7684\u672c\u8d28\u5dee\u5f02\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07663", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6784\u5efa\u4e8c\u7ef4\u5206\u7c7b\u4f53\u7cfb\uff1a\u6539\u8fdb\u5bf9\u8c61\uff08\u90e8\u7f72\u884c\u4e3a/\u8bad\u7ec3\u7b56\u7565/\u8bc4\u4f30\u5668/\u7814\u7a76\u8fc7\u7a0b\uff09\u00d7 \u5faa\u73af\u95ed\u5408\u7a0b\u5ea6\uff08\u4eba\u5728\u73af\u5230\u5168\u81ea\u52a8\uff09\uff0c\u7edf\u4e00\u6df7\u4e71\u7684\"self-*\"\u672f\u8bed", "\u63d0\u51fa\u9a8c\u8bc1\u5c42\u7ea7\u7ed3\u6784\uff1a\u4ece\u5f62\u5f0f\u5316\u9a8c\u8bc1\u5668\uff08\u6700\u5f3a\uff09\u5230\u5185\u5728\u81ea\u6211\u8bc4\u4f30\uff08\u6700\u5f31\uff09\uff0c\u81ea\u6211\u6539\u8fdb\u80fd\u529b\u5f3a\u5ea6\u4e0e\u8be5\u5c42\u7ea7\u9ad8\u5ea6\u6b63\u76f8\u5173\uff0c\u5931\u8d25\u6a21\u5f0f\uff08\u81ea\u6211\u786e\u8ba4\u5faa\u73af\u3001\u6a21\u578b\u5d29\u6e83\u3001\u591a\u6837\u6027\u5d29\u6e83\uff09\u5747\u6e90\u4e8e\u5bf9\u5c42\u7ea7\u7684\u8fdd\u53cd", "\u6307\u51fa\"\u7814\u7a76\u65b9\u5411\u8bbe\u5b9a\"\u662f\u4fdd\u6301\u4eba\u7c7b\u5728\u73af\u7684\u5173\u952e\u74f6\u9888\uff0c\u5e76\u5c06\u6cbb\u7406\u7ea7\u522b\u7684\u81ea\u6211\u6539\u8fdb\u5ea6\u91cf\u6807\u51c6\u8bc6\u522b\u4e3a\u5f53\u524d\u6700\u6b20\u7f3a\u7684\u7814\u7a76\u65b9\u5411"], "keywords": ["\u9012\u5f52\u81ea\u6211\u6539\u8fdb", "\u667a\u80fd\u4f53", "AI\u5b89\u5168", "\u7efc\u8ff0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07663v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Recursive Self-Improvement in AI: From Bounded Self-Refinement to Autonomous Research Loops", "tldr": "\u7cfb\u7edf\u7efc\u8ff0AI\u9012\u5f52\u81ea\u6211\u6539\u8fdb\u7814\u7a76\uff0c\u6784\u5efa\u5206\u7c7b\u6846\u67b6\u5e76\u5206\u6790\u5176\u6280\u672f\u8fb9\u754c\u4e0e\u6cbb\u7406\u6311\u6218", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf92024-2026\u5e74\u95f41250\u7bc7arXiv\u8bba\u6587\u8fdb\u884c\u7cfb\u7edf\u7efc\u8ff0\uff0c\u63d0\u51fa\u4e00\u5957\u5206\u7c7b\u6846\u67b6\uff0c\u5c06AI\u81ea\u6211\u6539\u8fdb\u7814\u7a76\u6309\"\u6539\u8fdb\u5bf9\u8c61\"\u4e0e\"\u5faa\u73af\u95ed\u5408\u7a0b\u5ea6\"\u4e24\u4e2a\u7ef4\u5ea6\u52a0\u4ee5\u533a\u5206\uff0c\u5398\u6e05\u6709\u754c\u81ea\u6211\u7cbe\u70bc\u4e0e\u5f00\u653e\u5f0f\u9012\u5f52\u81ea\u6211\u6539\u8fdb\uff08RSI\uff09\u7684\u672c\u8d28\u5dee\u5f02\u3002", "why_notable": "\u9996\u6b21\u4ee5\u5927\u89c4\u6a21\u6587\u732e\u7efc\u8ff0\u7cfb\u7edf\u68b3\u7406AI\u81ea\u6211\u6539\u8fdb\u5168\u666f\uff0c\u63d0\u4f9b\u7edf\u4e00\u5206\u7c7b\u6846\u67b6\uff0c\u5c06\u6280\u672f\u8fb9\u754c\u5206\u6790\u4e0e\u5b89\u5168\u6cbb\u7406\u95ee\u9898\u6df1\u5ea6\u7ed3\u5408\uff0c\u5bf9\u524d\u6cbf\u5b9e\u9a8c\u5ba4\"\u95ed\u73af\"\u8d8b\u52bf\u5177\u6709\u91cd\u8981\u653f\u7b56\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Does RL post-training merely amplify primitive skills already latent in a base model, or can it compose primitive skills into new higher-level strategies? We study this question in a fully observable rewrite-grammar environment where the pretraining distribution is known and every generated rewrite can be audited. A Transformer is pretrained on primitive symbol-rewrite chains and post-trained on a Trace-based reasoning task with only a binary final-answer reward. RL solves held-out problems that remain rarely solved by the pretrained model even under much larger sampling budgets, while rejection fine-tuning improves early but plateaus. Trace analysis shows that RL reorganizes primitive competence through a phased compositional mechanism: it first strengthens primitive reductions, then discovers valid composed procedures. These include sequential compositions, which collapse ordered chains of primitive contractions, and parallel compositions, which combine independent primitive contractions in a single step. The composed procedures are not isolated samples; they are reused and consolidated into a stable repertoire. Comparing RL with rejection fine-tuning shows that the key difference is not exploration volume but selectivity: RFT produces many shortcut-like rewrites, much of them invalid, whereas RL concentrates exploration into valid reusable structure. Pretraining ablations show that the emergence of compositional strategies is gated not by primitive exposure alone, but by whether pretraining organizes primitive competence into reduction procedures that RL can later compress. The base model provides weak procedural ingredients; RL builds them into reliable higher-level strategies.", "arxiv_id": "2607.07646", "arxiv_url": "https://arxiv.org/abs/2607.07646", "authors": ["Azwar Abdulsalam", "Nishil Patel", "Andrew Saxe"], "brief": "\u672c\u6587\u5728\u53ef\u5b8c\u5168\u89c2\u6d4b\u7684\u7b26\u53f7\u91cd\u5199\u8bed\u6cd5\u73af\u5883\u4e2d\uff0c\u7814\u7a76RL\u540e\u8bad\u7ec3\u662f\u5426\u80fd\u5c06\u539f\u59cb\u6280\u80fd\u7ec4\u5408\u4e3a\u65b0\u7684\u9ad8\u9636\u7b56\u7565\u3002\u5b9e\u9a8c\u8868\u660e\uff0cRL\u901a\u8fc7\u5206\u9636\u6bb5\u7ec4\u5408\u673a\u5236\uff0c\u5c06Transformer\u9884\u8bad\u7ec3\u7684\u539f\u59cb\u7b26\u53f7\u91cd\u5199\u80fd\u529b\u91cd\u7ec4\u4e3a\u987a\u5e8f\u7ec4\u5408\u548c\u5e76\u884c\u7ec4\u5408\u4e24\u7c7b\u65b0\u7b56\u7565\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07646", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["RL\u540e\u8bad\u7ec3\u80fd\u89e3\u51b3\u9884\u8bad\u7ec3\u6a21\u578b\u5728\u5927\u91c7\u6837\u9884\u7b97\u4e0b\u4ecd\u6781\u5c11\u89e3\u51b3\u7684\u95ee\u9898\uff0c\u800c\u62d2\u7edd\u5fae\u8c03\uff08RFT\uff09\u65e9\u671f\u63d0\u5347\u540e\u9677\u5165\u74f6\u9888", "RL\u7684\u5173\u952e\u4f18\u52bf\u4e0d\u5728\u4e8e\u63a2\u7d22\u91cf\uff0c\u800c\u5728\u4e8e\u9009\u62e9\u6027\uff1aRFT\u4ea7\u751f\u5927\u91cf\u65e0\u6548\u7684\u6377\u5f84\u5f0f\u91cd\u5199\uff0cRL\u5219\u96c6\u4e2d\u63a2\u7d22\u6709\u6548\u53ef\u590d\u7528\u7ed3\u6784", "\u7ec4\u5408\u7b56\u7565\u7684\u6d8c\u73b0\u4e0d\u4ec5\u53d6\u51b3\u4e8e\u539f\u59cb\u6280\u80fd\u7684\u66b4\u9732\u91cf\uff0c\u8fd8\u53d6\u51b3\u4e8e\u9884\u8bad\u7ec3\u662f\u5426\u5c06\u539f\u59cb\u80fd\u529b\u7ec4\u7ec7\u4e3aRL\u53ef\u8fdb\u4e00\u6b65\u538b\u7f29\u7684\u5f52\u7ea6\u7a0b\u5e8f"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u63a8\u7406", "\u7ec4\u5408\u6cdb\u5316", "\u540e\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07646v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "RL Post-Training Builds Compositional Reasoning Strategies", "tldr": "RL\u540e\u8bad\u7ec3\u80fd\u5c06\u57fa\u7840\u6a21\u578b\u7684\u539f\u59cb\u6280\u80fd\u7ec4\u5408\u6210\u66f4\u9ad8\u5c42\u6b21\u7684\u63a8\u7406\u7b56\u7565\uff0c\u800c\u975e\u4ec5\u653e\u5927\u5df2\u6709\u80fd\u529b", "upvotes": 0, "what_it_is": "\u672c\u6587\u5728\u53ef\u5b8c\u5168\u89c2\u6d4b\u7684\u7b26\u53f7\u91cd\u5199\u8bed\u6cd5\u73af\u5883\u4e2d\uff0c\u7814\u7a76RL\u540e\u8bad\u7ec3\u662f\u5426\u80fd\u5c06\u539f\u59cb\u6280\u80fd\u7ec4\u5408\u4e3a\u65b0\u7684\u9ad8\u9636\u7b56\u7565\u3002\u5b9e\u9a8c\u8868\u660e\uff0cRL\u901a\u8fc7\u5206\u9636\u6bb5\u7ec4\u5408\u673a\u5236\uff0c\u5c06Transformer\u9884\u8bad\u7ec3\u7684\u539f\u59cb\u7b26\u53f7\u91cd\u5199\u80fd\u529b\u91cd\u7ec4\u4e3a\u987a\u5e8f\u7ec4\u5408\u548c\u5e76\u884c\u7ec4\u5408\u4e24\u7c7b\u65b0\u7b56\u7565\u3002", "why_notable": "\u9996\u6b21\u5728\u53d7\u63a7\u53ef\u5ba1\u8ba1\u73af\u5883\u4e2d\u4e25\u683c\u8bc1\u660eRL\u540e\u8bad\u7ec3\u5177\u6709\u771f\u6b63\u7684\u7ec4\u5408\u63a8\u7406\u80fd\u529b\uff08\u800c\u975e\u4ec5\u653e\u5927\u6f5c\u5728\u6280\u80fd\uff09\uff0c\u5bf9\u7406\u89e3LLM\u63a8\u7406\u6d8c\u73b0\u673a\u5236\u548cRL\u8bad\u7ec3\u8303\u5f0f\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u7406\u8bba\u610f\u4e49"}, {"abstract": "AI control is a family of techniques to prevent an AI with malicious goals from subverting its operator\u0027s intent. AI Control usually studies a single agent in one trajectory, but real deployments run many agents over shared infrastructure, and the most severe risks (model-weight exfiltration, training-run poisoning) plausibly need several agents acting in concert. We initiate the empirical study of multi-agent AI control, formalising distributed attacks in which several agents jointly aim for a malicious goal. We develop FakeLab: a synthetic AI-lab codebase (9 services, 86 benign tasks, 4 attack objectives). We evaluate single agent monitoring against distributed attacks, varying the number of agents, their coordination, model capabilities and precise monitoring configuration. Our central finding is the fragmentation effect: as more agents coordinate to attack, per-agent monitoring becomes less likely to catch any of the attackers. Secondly, this is not driven by the ratio of benign to malicious code -- we argue this is likely dependent on model capability. Third, an explicit planner amplifies the fragmentation effect, raises the rate of completing the attack up to sevenfold, and mildly sharpens executors\u0027 poor monitor-theory-of-mind. Finally: a weak \"trusted\" monitor misses most attacks, while a stronger one cuts undetected success by more than an order of magnitude but remains imperfect. We are happy to share FakeLab, our control setting, with safety researchers on request.", "arxiv_id": "2607.07368", "arxiv_url": "https://arxiv.org/abs/2607.07368", "authors": ["Oliver Makins", "Orazio Angelini", "Zohreh Shams", "Mary Phuong"], "brief": "\u672c\u6587\u9996\u6b21\u5bf9\u591a\u667a\u80fd\u4f53AI\u63a7\u5236\u573a\u666f\u8fdb\u884c\u5b9e\u8bc1\u7814\u7a76\uff0c\u6784\u5efa\u4e86FakeLab\u5408\u6210AI\u5b9e\u9a8c\u5ba4\u4ee3\u7801\u5e93\uff0c\u7cfb\u7edf\u8bc4\u4f30\u5f53\u591a\u4e2a\u6076\u610f\u667a\u80fd\u4f53\u534f\u540c\u53d1\u52a8\u5206\u5e03\u5f0f\u653b\u51fb\u65f6\uff0c\u73b0\u6709\u5355\u5b9e\u4f8b\u76d1\u63a7\u673a\u5236\u7684\u9632\u5fa1\u6548\u679c\u3002", "categories": ["cs.LG", "cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07368", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u53d1\u73b0\"\u788e\u7247\u5316\u6548\u5e94\"\uff1a\u534f\u540c\u653b\u51fb\u7684\u667a\u80fd\u4f53\u6570\u91cf\u8d8a\u591a\uff0c\u6bcf\u4e2a\u667a\u80fd\u4f53\u88ab\u5355\u5b9e\u4f8b\u76d1\u63a7\u6355\u83b7\u7684\u6982\u7387\u8d8a\u4f4e", "\u5f15\u5165\u663e\u5f0f\u89c4\u5212\u5668\uff08planner\uff09\u53ef\u5c06\u653b\u51fb\u6210\u529f\u7387\u63d0\u5347\u6700\u9ad87\u500d\uff0c\u5e76\u589e\u5f3a\u6267\u884c\u8005\u5bf9\u76d1\u63a7\u673a\u5236\u7684\u89c4\u907f\u80fd\u529b", "\u5f3a\u76d1\u63a7\u5668\u53ef\u5c06\u672a\u88ab\u68c0\u6d4b\u5230\u7684\u653b\u51fb\u6210\u529f\u7387\u964d\u4f4e\u8d85\u8fc7\u4e00\u4e2a\u6570\u91cf\u7ea7\uff0c\u4f46\u5f31\u76d1\u63a7\u5668\u51e0\u4e4e\u65e0\u6cd5\u62e6\u622a\u5927\u591a\u6570\u653b\u51fb"], "keywords": ["AI\u5b89\u5168", "\u591a\u667a\u80fd\u4f53", "\u667a\u80fd\u4f53", "\u5bf9\u6297\u653b\u51fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07368v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Multi-Agent AI Control: Distributed Attacks Hamper Per-Instance Monitors", "tldr": "\u591a\u667a\u80fd\u4f53\u534f\u540c\u653b\u51fb\u4f1a\u4f7f\u5355\u5b9e\u4f8b\u76d1\u63a7\u5931\u6548\uff0c\u63d0\u51faFakeLab\u57fa\u51c6\u9a8c\u8bc1\u5206\u5e03\u5f0f\u653b\u51fb\u7684\u788e\u7247\u5316\u6548\u5e94", "upvotes": 0, "what_it_is": "\u672c\u6587\u9996\u6b21\u5bf9\u591a\u667a\u80fd\u4f53AI\u63a7\u5236\u573a\u666f\u8fdb\u884c\u5b9e\u8bc1\u7814\u7a76\uff0c\u6784\u5efa\u4e86FakeLab\u5408\u6210AI\u5b9e\u9a8c\u5ba4\u4ee3\u7801\u5e93\uff0c\u7cfb\u7edf\u8bc4\u4f30\u5f53\u591a\u4e2a\u6076\u610f\u667a\u80fd\u4f53\u534f\u540c\u53d1\u52a8\u5206\u5e03\u5f0f\u653b\u51fb\u65f6\uff0c\u73b0\u6709\u5355\u5b9e\u4f8b\u76d1\u63a7\u673a\u5236\u7684\u9632\u5fa1\u6548\u679c\u3002", "why_notable": "\u968f\u7740AI\u7cfb\u7edf\u5411\u591a\u667a\u80fd\u4f53\u90e8\u7f72\u6f14\u8fdb\uff0c\u6a21\u578b\u6743\u91cd\u7a83\u53d6\u3001\u8bad\u7ec3\u6295\u6bd2\u7b49\u9ad8\u5371\u653b\u51fb\u9700\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u5b8c\u6210\uff0c\u672c\u6587\u586b\u8865\u4e86AI\u5b89\u5168\u63a7\u5236\u9886\u57df\u591a\u667a\u80fd\u4f53\u573a\u666f\u7684\u7814\u7a76\u7a7a\u767d\uff0c\u5bf9AI\u5b89\u5168\u5bf9\u9f50\u4e0e\u76d1\u63a7\u673a\u5236\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u610f\u4e49"}, {"abstract": "Pre-deployment safety evaluations aim to inform the downstream risks of releasing a new AI model. Yet most evaluations provide limited evidence about how often undesired model behavior will occur in deployment: they generally have insufficient coverage, are unrepresentative, and are generally recognizable as tests. To address these concerns, we study a simple way to simulate a model deployment: starting from de-identified conversations from a previous model deployment, we hold fixed the initial conversation prefix and regenerate the next response using a candidate model. The resulting responses can then both be audited for novel misalignments and used to estimate the prevalence of model misbehavior before deployment. We evaluate deployment simulation across four GPT-5-series deployments, using registered, outcome-blinded predictions for GPT-5.4 and retrospective analyses of three earlier releases. We find that deployment simulation produces informative estimates of post-deployment misbehavior rates and outperforms baselines based on adversarially selected production data; its evaluation-awareness point estimates were also much closer to production traffic than those from traditional evaluations. We also identify the realism of tool resampling as a central challenge for further improving predictions and share results suggesting that this challenge is surmountable even in complex tool-use settings. Finally, we show that deployment simulation can be seeded from public chat datasets and remain informative about production misbehavior rates, suggesting a path for external researchers to run deployment-grounded evaluations without access to private production logs. Overall, deployment simulation helps evaluators forecast how language models will behave in the real world and supports more quantitative assessment of deployment risk.", "arxiv_id": "2607.07184", "arxiv_url": "https://arxiv.org/abs/2607.07184", "authors": ["Marcus Williams", "Hannah Sheahan", "Cameron Raymond", "Tomek Korbak", "Deng Pan", "Peilin Yang", "Leon Maksin", "Ningyi Xie", "Phillip Guo", "Ian Kivlichan", "Micah Carroll"], "brief": "\u63d0\u51fa\"\u90e8\u7f72\u6a21\u62df\"\u65b9\u6cd5\uff1a\u56fa\u5b9a\u5386\u53f2\u771f\u5b9e\u5bf9\u8bdd\u524d\u7f00\uff0c\u7528\u5019\u9009\u6a21\u578b\u91cd\u65b0\u751f\u6210\u56de\u590d\uff0c\u4ee5\u6b64\u4f30\u8ba1\u6a21\u578b\u4e0a\u7ebf\u540e\u7684\u4e0d\u5f53\u884c\u4e3a\u53d1\u751f\u7387\uff0c\u5e76\u5728GPT-5\u7cfb\u5217\u56db\u4e2a\u7248\u672c\u4e0a\u8fdb\u884c\u4e86\u9a8c\u8bc1\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07184", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u590d\u7528\u8131\u654f\u7684\u5386\u53f2\u751f\u4ea7\u5bf9\u8bdd\u4f5c\u4e3a\u524d\u7f00\uff0c\u8ba9\u5019\u9009\u6a21\u578b\u7eed\u5199\uff0c\u6a21\u62df\u771f\u5b9e\u90e8\u7f72\u6d41\u91cf\u5206\u5e03", "\u5728GPT-5.4\u4e0a\u8fdb\u884c\u4e86\u9884\u6ce8\u518c\u3001\u7ed3\u679c\u76f2\u8bc4\u9884\u6d4b\uff0c\u5e76\u5bf9\u4e09\u4e2a\u65e9\u671f\u7248\u672c\u505a\u56de\u987e\u5206\u6790\uff0c\u5747\u4f18\u4e8e\u5bf9\u6297\u6027\u751f\u4ea7\u6570\u636e\u57fa\u7ebf", "\u8bc4\u4f30\u611f\u77e5\uff08evaluation-awareness\uff09\u6307\u6807\u8fdc\u6bd4\u4f20\u7edf\u8bc4\u4f30\u66f4\u63a5\u8fd1\u751f\u4ea7\u6d41\u91cf\uff1b\u8fd8\u9a8c\u8bc1\u4e86\u53ef\u7528\u516c\u5f00\u804a\u5929\u6570\u636e\u96c6\u66ff\u4ee3\u79c1\u6709\u65e5\u5fd7\uff0c\u4e3a\u5916\u90e8\u7814\u7a76\u8005\u63d0\u4f9b\u53ef\u884c\u8def\u5f84"], "keywords": ["AI\u5b89\u5168", "LLM\u8bc4\u4f30", "\u90e8\u7f72\u98ce\u9669", "\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07184v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Predicting LLM Safety Before Release by Simulating Deployment", "tldr": "\u901a\u8fc7\u6a21\u62df\u771f\u5b9e\u90e8\u7f72\u573a\u666f\u9884\u6d4bLLM\u4e0a\u7ebf\u540e\u7684\u5b89\u5168\u98ce\u9669\uff0c\u51c6\u786e\u7387\u4f18\u4e8e\u4f20\u7edf\u8bc4\u4f30\u65b9\u6cd5", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u90e8\u7f72\u6a21\u62df\"\u65b9\u6cd5\uff1a\u56fa\u5b9a\u5386\u53f2\u771f\u5b9e\u5bf9\u8bdd\u524d\u7f00\uff0c\u7528\u5019\u9009\u6a21\u578b\u91cd\u65b0\u751f\u6210\u56de\u590d\uff0c\u4ee5\u6b64\u4f30\u8ba1\u6a21\u578b\u4e0a\u7ebf\u540e\u7684\u4e0d\u5f53\u884c\u4e3a\u53d1\u751f\u7387\uff0c\u5e76\u572
