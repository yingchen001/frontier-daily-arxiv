 triangulation using three parallel cross-attention streams alongside a relational fusion mechanism that explicitly models entailment and contradiction. Extensive evaluations demonstrate that TRENT consistently outperforms state-of-the-art specialized models and commercial VLMs. The code, prompt templates, and dataset are available at https://github.com/stevejpapad/evidence-triangulation", "arxiv_id": "2606.31367", "arxiv_url": "https://arxiv.org/abs/2606.31367", "authors": ["Stefanos-Iordanis Papadopoulos", "Zacharias Chrysidis", "Christos Koutlis", "Symeon Papadopoulos", "Panagiotis C. Petrantonakis"], "brief": "\u6784\u5efa\u4e86X-POSE\u2014\u2014\u6765\u81eaTwitter\u7684\u771f\u5b9e\u793e\u533a\u6807\u6ce8\u591a\u6a21\u6001\u5e16\u5b50\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u5e76\u63d0\u51faTRENT\u6a21\u578b\uff0c\u901a\u8fc7\u4e09\u8def\u5e76\u884c\u4ea4\u53c9\u6ce8\u610f\u529b\u6d41\u4e0e\u5173\u7cfb\u878d\u5408\u673a\u5236\u5bf9\u5e16\u5b50\u4e0e\u5916\u90e8\u8bc1\u636e\u8fdb\u884c\u4e09\u89d2\u9a8c\u8bc1\uff0c\u4ee5\u68c0\u6d4b\u56fe\u6587\u865a\u5047\u4fe1\u606f\u3002", "categories": ["cs.MM", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31367", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["X-POSE\u57fa\u51c6\u5305\u542b\u771f\u5b9e\u91ce\u5916\u591a\u6a21\u6001\u5e16\u5b50\uff0c\u914d\u5408VLM\u4f18\u5316\u68c0\u7d22\u7684\u5b8c\u6574\u65b0\u95fb\u6587\u7ae0\u4f5c\u4e3a\u5916\u90e8\u8bc1\u636e\uff0c\u514b\u670d\u5408\u6210\u6570\u636e\u5c40\u9650", "TRENT\u91c7\u7528\u4e09\u8def\u5e76\u884c\u4ea4\u53c9\u6ce8\u610f\u529b\u6d41\uff0c\u663e\u5f0f\u5efa\u6a21\u8574\u542b\u4e0e\u77db\u76fe\u5173\u7cfb\uff0c\u4f18\u4e8e\u7b80\u5355\u5168\u5bf9\u5168\u878d\u5408", "\u5728\u5e7f\u6cdb\u8bc4\u4f30\u4e2dTRENT\u6301\u7eed\u8d85\u8d8aSOTA\u4e13\u7528\u6a21\u578b\u53ca\u5546\u4e1aVLM"], "keywords": ["\u591a\u6a21\u6001", "\u4e8b\u5b9e\u6838\u67e5", "\u865a\u5047\u4fe1\u606f\u68c0\u6d4b", "\u57fa\u51c6\u6570\u636e\u96c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31367v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Evidence Triangulation for Multimodal Fact-Checking in the Wild", "tldr": "\u63d0\u51faX-POSE\u771f\u5b9e\u591a\u6a21\u6001\u4e8b\u5b9e\u6838\u67e5\u57fa\u51c6\u4e0eTRENT\u8bc1\u636e\u4e09\u89d2\u9a8c\u8bc1\u6a21\u578b", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86X-POSE\u2014\u2014\u6765\u81eaTwitter\u7684\u771f\u5b9e\u793e\u533a\u6807\u6ce8\u591a\u6a21\u6001\u5e16\u5b50\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u5e76\u63d0\u51faTRENT\u6a21\u578b\uff0c\u901a\u8fc7\u4e09\u8def\u5e76\u884c\u4ea4\u53c9\u6ce8\u610f\u529b\u6d41\u4e0e\u5173\u7cfb\u878d\u5408\u673a\u5236\u5bf9\u5e16\u5b50\u4e0e\u5916\u90e8\u8bc1\u636e\u8fdb\u884c\u4e09\u89d2\u9a8c\u8bc1\uff0c\u4ee5\u68c0\u6d4b\u56fe\u6587\u865a\u5047\u4fe1\u606f\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9\u771f\u5b9e\u91ce\u5916\u591a\u6a21\u6001\u865a\u5047\u4fe1\u606f\u7684\u793e\u533a\u6807\u6ce8\u57fa\u51c6\uff0c\u7ed3\u5408\u65b0\u9896\u7684\u8bc1\u636e\u4e09\u89d2\u9a8c\u8bc1\u67b6\u6784\uff0c\u63a8\u52a8\u4e8b\u5b9e\u6838\u67e5\u4ece\u5b9e\u9a8c\u5ba4\u8d70\u5411\u5b9e\u9645\u5e94\u7528\u573a\u666f\u3002"}, {"abstract": "Recently, unified image generation and understanding have been extensively explored. However, extending such unified modeling paradigms to the video domain remains largely underexplored. A central challenge is that video understanding favors compact, discriminative semantic representations, whereas video generation requires dense signals that preserve visual details and temporal coherence. Videos naturally capture both spatial semantics and temporal dynamics, making them a more suitable modality for unified multimodal modeling compared to static images. In this paper, we propose Vega, a unified framework that bridges video understanding and generation. Vega leverages a shared vocabulary to jointly model text and visual representations and employs a hybrid architecture combining autoregressive (AR) prediction with diffusion-based rendering. Specifically, the AR model focuses on predicting semantically meaningful visual tokens for keyframes, providing a structured representation that guides the diffusion module in rendering dense, high-resolution video frames. Extensive experiments demonstrate that Vega achieves strong performance on video generation benchmarks such as VBench and video understanding benchmarks like VideoMME.", "arxiv_id": "2606.31326", "arxiv_url": "https://arxiv.org/abs/2606.31326", "authors": ["Yuqi Wang", "Runyi Li", "Ruoyu Feng", "Renjie Chen", "Wenfeng Lin", "Mingyu Guo"], "brief": "\u63d0\u51faVega\u6846\u67b6\uff0c\u901a\u8fc7\u5171\u4eab\u8bcd\u6c47\u8868\u8054\u5408\u5efa\u6a21\u6587\u672c\u4e0e\u89c6\u89c9\u8868\u793a\uff0c\u91c7\u7528\u81ea\u56de\u5f52\u6a21\u578b\u9884\u6d4b\u5173\u952e\u5e27\u8bed\u4e49token\uff0c\u518d\u7531\u6269\u6563\u6a21\u5757\u6e32\u67d3\u9ad8\u5206\u8fa8\u7387\u89c6\u9891\u5e27\uff0c\u5b9e\u73b0\u89c6\u9891\u7406\u89e3\u4e0e\u751f\u6210\u7684\u7edf\u4e00\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31326", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6df7\u5408\u67b6\u6784\uff1a\u81ea\u56de\u5f52\uff08AR\uff09\u8d1f\u8d23\u5173\u952e\u5e27\u8bed\u4e49token\u9884\u6d4b\uff0c\u6269\u6563\u6a21\u5757\u8d1f\u8d23\u5bc6\u96c6\u89c6\u9891\u5e27\u6e32\u67d3", "\u5171\u4eab\u8bcd\u6c47\u8868\u540c\u65f6\u5efa\u6a21\u6587\u672c\u4e0e\u89c6\u89c9\u8868\u793a\uff0c\u5f25\u5408\u7406\u89e3\uff08\u7d27\u51d1\u5224\u522b\uff09\u4e0e\u751f\u6210\uff08\u5bc6\u96c6\u7ec6\u8282\uff09\u7684\u8868\u793a\u9e3f\u6c9f", "\u5728VBench\u89c6\u9891\u751f\u6210\u548cVideoMME\u89c6\u9891\u7406\u89e3\u4e24\u7c7b\u57fa\u51c6\u4e0a\u5747\u53d6\u5f97\u5f3a\u52b2\u6027\u80fd"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u7edf\u4e00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31326v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Bridging Video Understanding and Generation in a Unified Framework", "tldr": "Vega\uff1a\u7edf\u4e00\u89c6\u9891\u7406\u89e3\u4e0e\u751f\u6210\u7684\u6df7\u5408\u6846\u67b6\uff0c\u7ed3\u5408\u81ea\u56de\u5f52\u4e0e\u6269\u6563\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faVega\u6846\u67b6\uff0c\u901a\u8fc7\u5171\u4eab\u8bcd\u6c47\u8868\u8054\u5408\u5efa\u6a21\u6587\u672c\u4e0e\u89c6\u89c9\u8868\u793a\uff0c\u91c7\u7528\u81ea\u56de\u5f52\u6a21\u578b\u9884\u6d4b\u5173\u952e\u5e27\u8bed\u4e49token\uff0c\u518d\u7531\u6269\u6563\u6a21\u5757\u6e32\u67d3\u9ad8\u5206\u8fa8\u7387\u89c6\u9891\u5e27\uff0c\u5b9e\u73b0\u89c6\u9891\u7406\u89e3\u4e0e\u751f\u6210\u7684\u7edf\u4e00\u3002", "why_notable": "\u89c6\u9891\u7edf\u4e00\u7406\u89e3\u4e0e\u751f\u6210\u662f\u591a\u6a21\u6001\u9886\u57df\u7684\u91cd\u8981\u6311\u6218\uff0cVega\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06AR\u4e0e\u6269\u6563\u6a21\u578b\u7ed3\u5408\u7528\u4e8e\u89c6\u9891\u53cc\u4efb\u52a1\u7edf\u4e00\u5efa\u6a21\uff0c\u4e3a\u540e\u7eed\u89c6\u9891\u591a\u6a21\u6001\u5927\u6a21\u578b\u63d0\u4f9b\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Editing multiple elements of an image in a single forward pass is a practical alternative to multi-turn image manipulation, offering improved efficiency and potentially better harmonization. However, when several instructions target different regions, semantic interference often leads to attribute leakage and poor edit disentanglement, especially as the number of edits increases. In this work, we propose MICE (Multi-Instance Concurrent Editing), a training-free strategy for scalable multi-instance image editing with Multimodal Diffusion Transformers. MICE modifies the additive bias of joint attention to regulate interactions between instance-specific edit instructions, latent, and context tokens identified via user-provided segmentation masks. Specifically, MICE allows intra-instance attention, penalizes interactions between neighboring region tokens, and suppresses unrelated cross-instance attention. As a result, our method enforces attribute binding while preserving global visual consistency. We evaluate MICE on LoMOE-Bench and introduce MICE-Bench, a more challenging benchmark with an average of 8.5 concurrent edits per image. The experiments demonstrate that our approach outperforms strong baselines and recent competitors in terms of visual quality preservation and faithfulness to the editing instructions.", "arxiv_id": "2606.31278", "arxiv_url": "https://arxiv.org/abs/2606.31278", "authors": ["Fabio Quattrini", "Carmine Zaccagnino", "Enis Simsar", "Marta Tintor\u00e9 Gazulla", "Rita Cucchiara", "Alessio Tonioni", "Silvia Cascianelli"], "brief": "\u63d0\u51faMICE\uff08\u591a\u5b9e\u4f8b\u5e76\u53d1\u7f16\u8f91\uff09\u7b56\u7565\uff0c\u901a\u8fc7\u4fee\u6539\u591a\u6a21\u6001\u6269\u6563Transformer\u7684\u8054\u5408\u6ce8\u610f\u529b\u504f\u7f6e\uff0c\u5728\u5355\u6b21\u524d\u5411\u4f20\u64ad\u4e2d\u540c\u65f6\u7f16\u8f91\u56fe\u50cf\u4e2d\u7684\u591a\u4e2a\u533a\u57df\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31278", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u65e0\u8bad\u7ec3\u7b56\u7565\uff1a\u901a\u8fc7\u8c03\u6574\u8054\u5408\u6ce8\u610f\u529b\u7684\u52a0\u6027\u504f\u7f6e\u6765\u63a7\u5236\u5b9e\u4f8b\u95f4\u8bed\u4e49\u5e72\u6270\uff0c\u5229\u7528\u7528\u6237\u63d0\u4f9b\u7684\u5206\u5272\u63a9\u7801\u533a\u5206\u5404\u7f16\u8f91\u533a\u57df", "\u4e09\u91cd\u6ce8\u610f\u529b\u673a\u5236\uff1a\u5141\u8bb8\u5b9e\u4f8b\u5185\u90e8\u6ce8\u610f\u529b\u3001\u60e9\u7f5a\u76f8\u90bb\u533a\u57dftoken\u4ea4\u4e92\u3001\u6291\u5236\u65e0\u5173\u8de8\u5b9e\u4f8b\u6ce8\u610f\u529b\uff0c\u6709\u6548\u9632\u6b62\u5c5e\u6027\u6cc4\u6f0f", "\u5f15\u5165MICE-Bench\u57fa\u51c6\uff0c\u5e73\u5747\u6bcf\u5f20\u56fe\u50cf\u5305\u542b8.5\u4e2a\u5e76\u53d1\u7f16\u8f91\u4efb\u52a1\uff0c\u5728LoMOE-Bench\u548cMICE-Bench\u4e0a\u5747\u8d85\u8d8a\u73b0\u6709\u57fa\u7ebf"], "keywords": ["\u56fe\u50cf\u7f16\u8f91", "\u6269\u6563\u6a21\u578b", "\u591a\u6a21\u6001", "\u6ce8\u610f\u529b\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31278v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Editing Everything Everywhere All at Once", "tldr": "\u65e0\u9700\u8bad\u7ec3\u7684\u591a\u5b9e\u4f8b\u5e76\u53d1\u56fe\u50cf\u7f16\u8f91\u65b9\u6cd5\uff0c\u5355\u6b21\u524d\u5411\u4f20\u64ad\u5b8c\u6210\u591a\u533a\u57df\u540c\u6b65\u7f16\u8f91", "upvotes": 0, "what_it_is": "\u63d0\u51faMICE\uff08\u591a\u5b9e\u4f8b\u5e76\u53d1\u7f16\u8f91\uff09\u7b56\u7565\uff0c\u901a\u8fc7\u4fee\u6539\u591a\u6a21\u6001\u6269\u6563Transformer\u7684\u8054\u5408\u6ce8\u610f\u529b\u504f\u7f6e\uff0c\u5728\u5355\u6b21\u524d\u5411\u4f20\u64ad\u4e2d\u540c\u65f6\u7f16\u8f91\u56fe\u50cf\u4e2d\u7684\u591a\u4e2a\u533a\u57df\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u3002", "why_notable": "\u89e3\u51b3\u4e86\u591a\u6307\u4ee4\u5e76\u53d1\u7f16\u8f91\u4e2d\u7684\u8bed\u4e49\u5e72\u6270\u96be\u9898\uff0c\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u6a21\u578b\u5373\u53ef\u6269\u5c55\u5230\u5927\u91cf\u5e76\u53d1\u7f16\u8f91\uff0c\u517c\u987e\u6548\u7387\u4e0e\u7f16\u8f91\u8d28\u91cf\uff0c\u540c\u65f6\u63d0\u4f9b\u4e86\u66f4\u5177\u6311\u6218\u6027\u7684\u8bc4\u6d4b\u57fa\u51c6\u63a8\u52a8\u9886\u57df\u53d1\u5c55\u3002"}, {"abstract": "World-model-based autonomous driving endows the model with the ability to understand scene evolution. Yet this promise is undermined by the prevailing imagine-then-act paradigm, which allows errors from the more challenging visual generation stage to cascade into action planning. We introduce ForgeDrive, a unified autoregressive diffusion framework with visual-action cross-conditioning that closes this gap through act-then-imagine paradigm. ForgeDrive factorizes the future as a sequence of per-timestep frame-action pairs, intertwining each action with its corresponding visual observation. During training, we decouple the diffusion timesteps of the two modalities and introduce a UniDiffuser-style noise scheduler to get the ability to infer either modality from its counterpart and deepen understanding of relationships between images and actions. At inference, we propose a novel act-then-imagine inference paradigm, and find that at each step, action generation is a capability internalized during training, requiring no clean future frame as a prerequisite at inference time; instead, the generated action can improve the accuracy of future frame generation, which in turn enhances the quality of the next action. Additionally, we augment each step with future ego-status prediction, further sharpening planning ability. Extensive experiments on NAVSIM demonstrate that ForgeDrive not only unifies driving simulation, planning, and visual odometry into a single model, but also outperforms existing strong planners without any post-training strategy.", "arxiv_id": "2606.31226", "arxiv_url": "https://arxiv.org/abs/2606.31226", "authors": ["Xuchang Zhong", "He Zheng", "Chenxu Zhao", "Tianxiong Lv", "Hangqi Fan", "Bohua Wang", "Yushan Liu", "Zhihao Liao", "Leigang Luo", "Congyang Zhao", "Yang Cai"], "brief": "ForgeDrive\u662f\u4e00\u4e2a\u7edf\u4e00\u7684\u81ea\u56de\u5f52\u6269\u6563\u6846\u67b6\uff0c\u901a\u8fc7\u89c6\u89c9-\u52a8\u4f5c\u53cc\u5411\u4ea4\u53c9\u6761\u4ef6\u673a\u5236\uff0c\u5c06\u81ea\u52a8\u9a7e\u9a76\u4e2d\u7684\u573a\u666f\u6a21\u62df\u3001\u89c4\u5212\u548c\u89c6\u89c9\u91cc\u7a0b\u8ba1\u6574\u5408\u4e3a\u5355\u4e00\u6a21\u578b\uff0c\u5e76\u63d0\u51fa\"\u5148\u884c\u52a8\u540e\u60f3\u8c61\"\u63a8\u7406\u8303\u5f0f\u53d6\u4ee3\u4f20\u7edf\"\u5148\u60f3\u8c61\u540e\u884c\u52a8\"\u6d41\u7a0b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31226", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u672a\u6765\u9884\u6d4b\u5206\u89e3\u4e3a\u9010\u65f6\u95f4\u6b65\u7684\u5e27-\u52a8\u4f5c\u5bf9\u5e8f\u5217\uff0c\u91c7\u7528UniDiffuser\u98ce\u683c\u566a\u58f0\u8c03\u5ea6\u5668\u89e3\u8026\u4e24\u79cd\u6a21\u6001\u7684\u6269\u6563\u65f6\u95f4\u6b65", "\u63a8\u7406\u65f6\u91c7\u7528act-then-imagine\u8303\u5f0f\uff1a\u52a8\u4f5c\u751f\u6210\u65e0\u9700\u5e72\u51c0\u672a\u6765\u5e27\uff0c\u751f\u6210\u7684\u52a8\u4f5c\u53cd\u8fc7\u6765\u63d0\u5347\u672a\u6765\u5e27\u8d28\u91cf\uff0c\u5f62\u6210\u6b63\u5411\u5faa\u73af", "\u5728NAVSIM\u57fa\u51c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u5f3a\u89c4\u5212\u5668\uff0c\u4e14\u65e0\u9700\u4efb\u4f55\u540e\u8bad\u7ec3\u7b56\u7565\uff0c\u540c\u65f6\u652f\u6301\u9a7e\u9a76\u4eff\u771f\u3001\u89c4\u5212\u548c\u89c6\u89c9\u91cc\u7a0b\u8ba1\u4e09\u9879\u4efb\u52a1"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u4e16\u754c\u6a21\u578b", "\u6269\u6563\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31226v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ForgeDrive: Bidirectional Cross-Conditioning for Unified Visual-Action Generation in Autonomous Driving", "tldr": "ForgeDrive\u63d0\u51fa\u5148\u884c\u52a8\u540e\u60f3\u8c61\u7684\u53cc\u5411\u4ea4\u53c9\u6761\u4ef6\u6846\u67b6\uff0c\u7edf\u4e00\u81ea\u52a8\u9a7e\u9a76\u89c6\u89c9\u751f\u6210\u4e0e\u52a8\u4f5c\u89c4\u5212", "upvotes": 0, "what_it_is": "ForgeDrive\u662f\u4e00\u4e2a\u7edf\u4e00\u7684\u81ea\u56de\u5f52\u6269\u6563\u6846\u67b6\uff0c\u901a\u8fc7\u89c6\u89c9-\u52a8\u4f5c\u53cc\u5411\u4ea4\u53c9\u6761\u4ef6\u673a\u5236\uff0c\u5c06\u81ea\u52a8\u9a7e\u9a76\u4e2d\u7684\u573a\u666f\u6a21\u62df\u3001\u89c4\u5212\u548c\u89c6\u89c9\u91cc\u7a0b\u8ba1\u6574\u5408\u4e3a\u5355\u4e00\u6a21\u578b\uff0c\u5e76\u63d0\u51fa\"\u5148\u884c\u52a8\u540e\u60f3\u8c61\"\u63a8\u7406\u8303\u5f0f\u53d6\u4ee3\u4f20\u7edf\"\u5148\u60f3\u8c61\u540e\u884c\u52a8\"\u6d41\u7a0b\u3002", "why_notable": "\u89e3\u51b3\u4e86\u4e16\u754c\u6a21\u578b\u9a7e\u9a76\u4e2d\u89c6\u89c9\u751f\u6210\u8bef\u5dee\u7ea7\u8054\u4f20\u64ad\u5230\u52a8\u4f5c\u89c4\u5212\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u901a\u8fc7\u53cc\u5411\u6761\u4ef6\u673a\u5236\u5b9e\u73b0\u89c6\u89c9\u4e0e\u52a8\u4f5c\u7684\u534f\u540c\u751f\u6210\uff0c\u5728\u7edf\u4e00\u6846\u67b6\u4e0b\u8fbe\u5230SOTA\u6027\u80fd\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u65b9\u6cd5\u521b\u65b0\u6027\u3002"}, {"abstract": "Autonomous driving systems benefit from high-definition (HD) maps that provide critical information about road infrastructure. The online construction of HD maps offers a scalable approach to generate local vectorized maps from onboard sensor observations. Existing methods commonly adopt bird\u0027s-eye-view (BEV) features as the intermediate scene representation, encoding the surrounding space with fixed-resolution dense grids. However, map elements are spatially sparse yet require fine-grained geometric localization, making uniformly allocated BEV representations redundant and less effective for vectorized map prediction. In this work, we propose GaussianMap, an online HD map construction framework that learns an adaptive Gaussian representation of the surrounding scene. This representation consists of a set of Gaussian primitives on the BEV plane, each encoding a flexible local region with geometric properties and a feature vector, allowing the model to allocate representational capacity to map-relevant regions. To generate such a representation from sensor observations, we introduce a feed-forward Gaussian encoder that progressively refines these primitives through Gaussian interaction modeling and multi-sensor feature aggregation. The refined Gaussian representation is then splatted into a BEV feature map and decoded into vectorized map predictions. Extensive experiments on nuScenes and Argoverse 2 datasets demonstrate that GaussianMap achieves state-of-the-art performance in both camera-only and camera-LiDAR fusion settings. Our code will be made publicly available.", "arxiv_id": "2606.31177", "arxiv_url": "https://arxiv.org/abs/2606.31177", "authors": ["Hongyu Lyu", "Julie Stephany Berrio Perez", "Mao Shan", "Stewart Worrall"], "brief": "\u63d0\u51faGaussianMap\u6846\u67b6\uff0c\u7528BEV\u5e73\u9762\u4e0a\u7684\u9ad8\u65af\u57fa\u5143\u96c6\u5408\u66ff\u4ee3\u4f20\u7edf\u5747\u5300\u5bc6\u96c6\u7f51\u683c\uff0c\u81ea\u9002\u5e94\u5730\u5c06\u8868\u5f81\u5bb9\u91cf\u5206\u914d\u5230\u5730\u56fe\u76f8\u5173\u533a\u57df\uff0c\u5b9e\u73b0\u66f4\u9ad8\u6548\u7684\u5728\u7ebf\u77e2\u91cf\u5316\u9ad8\u7cbe\u5730\u56fe\u6784\u5efa\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31177", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bbe\u8ba1\u9ad8\u65af\u7f16\u7801\u5668\uff0c\u901a\u8fc7\u9ad8\u65af\u4ea4\u4e92\u5efa\u6a21\u4e0e\u591a\u4f20\u611f\u5668\u7279\u5f81\u805a\u5408\u9010\u6b65\u7cbe\u5316\u9ad8\u65af\u57fa\u5143", "\u6bcf\u4e2a\u9ad8\u65af\u57fa\u5143\u7f16\u7801\u5c40\u90e8\u51e0\u4f55\u5c5e\u6027\u4e0e\u7279\u5f81\u5411\u91cf\uff0c\u518d\u901a\u8fc7Splatting\u751f\u6210BEV\u7279\u5f81\u56fe", "\u5728nuScenes\u548cArgoverse 2\u6570\u636e\u96c6\u4e0a\uff0c\u7eaf\u76f8\u673a\u53ca\u76f8\u673a-LiDAR\u878d\u5408\u8bbe\u7f6e\u5747\u8fbe\u5230SOTA\u6027\u80fd"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u9ad8\u7cbe\u5730\u56fe", "\u9ad8\u65af\u8868\u793a", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31177v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "GaussianMap: Learning Gaussian Representation for Multi-Sensor Online HD Map Construction", "tldr": "GaussianMap\u7528\u9ad8\u65af\u57fa\u5143\u81ea\u9002\u5e94\u8868\u793a\u573a\u666f\uff0c\u5b9e\u73b0\u591a\u4f20\u611f\u5668\u5728\u7ebf\u9ad8\u7cbe\u5730\u56fe\u6784\u5efa", "upvotes": 0, "what_it_is": "\u63d0\u51faGaussianMap\u6846\u67b6\uff0c\u7528BEV\u5e73\u9762\u4e0a\u7684\u9ad8\u65af\u57fa\u5143\u96c6\u5408\u66ff\u4ee3\u4f20\u7edf\u5747\u5300\u5bc6\u96c6\u7f51\u683c\uff0c\u81ea\u9002\u5e94\u5730\u5c06\u8868\u5f81\u5bb9\u91cf\u5206\u914d\u5230\u5730\u56fe\u76f8\u5173\u533a\u57df\uff0c\u5b9e\u73b0\u66f4\u9ad8\u6548\u7684\u5728\u7ebf\u77e2\u91cf\u5316\u9ad8\u7cbe\u5730\u56fe\u6784\u5efa\u3002", "why_notable": "\u9488\u5bf9\u5730\u56fe\u5143\u7d20\u7a7a\u95f4\u7a00\u758f\u4f46\u9700\u7cbe\u7ec6\u5b9a\u4f4d\u7684\u7279\u70b9\uff0c\u7528\u81ea\u9002\u5e94\u9ad8\u65af\u8868\u793a\u53d6\u4ee3\u5197\u4f59\u5bc6\u96c6BEV\u7f51\u683c\uff0c\u5728\u8868\u5f81\u6548\u7387\u548c\u9884\u6d4b\u7cbe\u5ea6\u4e0a\u5747\u6709\u63d0\u5347\uff0c\u4ee3\u7801\u5c06\u5f00\u6e90\u3002"}, {"abstract": "Modern Vision-Language-Action (VLA) planners for autonomous driving emit a chain-of-causation (CoC) reasoning step \\emph{before} producing a trajectory. The reasoning is autoregressive and dominates inference latency, while the trajectory head is parallel and cheap. Latency is an operational constraint in autonomous driving, so accelerating the reasoning step is the central problem we address. We observe that CoC reasoning has two qualitatively different needs: most tokens continue routine setup that follows naturally from the ego-trajectory history, and a small fraction encode commitments that require fresh visual evidence about an unexpected situation. We split this reasoning into two specialized paths: a \\emph{routine reasoner} that handles the predictable continuation by attending to trajectory history, and a \\emph{deliberative reasoner} (the unmodified VLA target) that handles novel cases by attending to current visual evidence, using the speculative decoding framework as the architectural template for how the two paths cooperate. Unlike standard speculative decoding, our routine reasoner is not a smaller replica of the target; the two reasoners are deliberately specialized to read different parts of the prompt. We propose two techniques to realize this. First, we introduce \\textbf{FlatRoPE}, a 1D rotary positional embedding in the draft that breaks the rotational symmetry of the target\u0027s 3D M-RoPE, redirecting attention away from visual tokens and onto trajectory-history tokens. Second, we introduce \\textbf{Action-aware RL (AARL)}, a post-training stage that uses an action-quality reward together with a static-reference KL anchor. Together, our two-reasoner system reduces the reasoning-step running time by approximately $4\\times$ relative to the original Alpamayo planner.", "arxiv_id": "2606.31160", "arxiv_url": "https://arxiv.org/abs/2606.31160", "authors": ["Anh Dung Dinh", "Simon Khan", "Flora Salim"], "brief": "\u9488\u5bf9\u81ea\u52a8\u9a7e\u9a76VLA\u89c4\u5212\u5668\u4e2d\u94fe\u5f0f\u56e0\u679c\u63a8\u7406\uff08CoC\uff09\u5ef6\u8fdf\u9ad8\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u5c06\u63a8\u7406\u5206\u4e3a\"\u5e38\u89c4\u63a8\u7406\u5668\"\u548c\"\u6df1\u601d\u63a8\u7406\u5668\"\u4e24\u6761\u4e13\u7528\u8def\u5f84\uff0c\u501f\u52a9\u6295\u673a\u89e3\u7801\u6846\u67b6\u534f\u540c\u5de5\u4f5c\uff0c\u663e\u8457\u52a0\u901f\u63a8\u7406\u6b65\u9aa4\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31160", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51faFlatRoPE\uff1a\u5c06\u8349\u7a3f\u6a21\u578b\u7684\u4f4d\u7f6e\u7f16\u7801\u4ece3D M-RoPE\u6539\u4e3a1D\u65cb\u8f6c\u4f4d\u7f6e\u7f16\u7801\uff0c\u4f7f\u6ce8\u610f\u529b\u4ece\u89c6\u89c9token\u8f6c\u5411\u8f68\u8ff9\u5386\u53f2token\uff0c\u5b9e\u73b0\u8def\u5f84\u4e13\u7528\u5316", "\u63d0\u51faAction-aware RL\uff08AARL\uff09\uff1a\u4ee5\u52a8\u4f5c\u8d28\u91cf\u5956\u52b1\u7ed3\u5408\u9759\u6001\u53c2\u8003KL\u951a\u70b9\u8fdb\u884c\u540e\u8bad\u7ec3\uff0c\u63d0\u5347\u8349\u7a3f\u6a21\u578b\u4e0e\u76ee\u6807\u6a21\u578b\u7684\u5bf9\u9f50\u8d28\u91cf", "\u6574\u4f53\u7cfb\u7edf\u76f8\u6bd4\u539f\u59cbAlpamayo\u89c4\u5212\u5668\uff0c\u63a8\u7406\u6b65\u9aa4\u8fd0\u884c\u65f6\u95f4\u51cf\u5c11\u7ea64\u500d"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u6295\u673a\u89e3\u7801", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31160v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Reasoning-aware Speculative Decoding for Efficient Vision-Language-Action Models in Autonomous Driving", "tldr": "\u63d0\u51fa\u53cc\u63a8\u7406\u8def\u5f84+\u6295\u673a\u89e3\u7801\u6846\u67b6\uff0c\u5c06\u81ea\u52a8\u9a7e\u9a76VLA\u89c4\u5212\u5668\u63a8\u7406\u5ef6\u8fdf\u964d\u4f4e\u7ea64\u500d", "upvotes": 0, "what_it_is": "\u9488\u5bf9\u81ea\u52a8\u9a7e\u9a76VLA\u89c4\u5212\u5668\u4e2d\u94fe\u5f0f\u56e0\u679c\u63a8\u7406\uff08CoC\uff09\u5ef6\u8fdf\u9ad8\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u5c06\u63a8\u7406\u5206\u4e3a\"\u5e38\u89c4\u63a8\u7406\u5668\"\u548c\"\u6df1\u601d\u63a8\u7406\u5668\"\u4e24\u6761\u4e13\u7528\u8def\u5f84\uff0c\u501f\u52a9\u6295\u673a\u89e3\u7801\u6846\u67b6\u534f\u540c\u5de5\u4f5c\uff0c\u663e\u8457\u52a0\u901f\u63a8\u7406\u6b65\u9aa4\u3002", "why_notable": "\u9996\u6b21\u5c06\u6295\u673a\u89e3\u7801\u6846\u67b6\u4e0eVLA\u81ea\u52a8\u9a7e\u9a76\u89c4\u5212\u5668\u7ed3\u5408\uff0c\u5e76\u901a\u8fc7\u4f4d\u7f6e\u7f16\u7801\u8bbe\u8ba1\u548c\u5f3a\u5316\u5b66\u4e60\u5b9e\u73b0\u4e24\u8def\u63a8\u7406\u5668\u7684\u529f\u80fd\u5206\u5316\uff0c\u5728\u4e0d\u727a\u7272\u89c4\u5212\u8d28\u91cf\u7684\u524d\u63d0\u4e0b\u5927\u5e45\u964d\u4f4e\u63a8\u7406\u5ef6\u8fdf\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We study agentic code generation in Dafny, where a model must generate both executable code and the proof artifacts for verification. We present AxDafny, a verifier-guided repair framework that iteratively generates implementations, invariants, assertions, and termination arguments. We also introduce LiveCodeBench-Pro-Dafny (LCB-Pro-Dafny), a benchmark of 250 competition-style programming problems translated into Dafny with formal specifications and a verifier-based evaluation harness. On LCB-Pro-Dafny, AxDafny substantially improves verification success over baseline GPT-5.5 performance. On DafnyBench, AxDafny achieves 92.7\\% verification success, outperforming the strongest previously reported proof-hint baseline by 6.5 percentage points. Lastly, we show that verification success and runtime test performance measure different aspects of generated code.", "arxiv_id": "2606.32007", "arxiv_url": "https://arxiv.org/abs/2606.32007", "authors": ["Benjamin Breen", "Austin Letson", "Borja Requena Pozo", "Leopoldo Sarra"], "brief": "\u63d0\u51faAxDafny\u6846\u67b6\uff0c\u901a\u8fc7\u9a8c\u8bc1\u5668\u5f15\u5bfc\u7684\u8fed\u4ee3\u4fee\u590d\u673a\u5236\u81ea\u52a8\u751f\u6210Dafny\u53ef\u9a8c\u8bc1\u4ee3\u7801\u53ca\u8bc1\u660e\u6784\u4ef6\u3002\u5728DafnyBench\u4e0a\u8fbe\u523092.7%\u9a8c\u8bc1\u6210\u529f\u7387\uff0c\u8d85\u8d8a\u6b64\u524d\u6700\u4f73\u57fa\u7ebf6.5\u4e2a\u767e\u5206\u70b9\uff0c\u5e76\u5f15\u5165\u5305\u542b250\u9053\u7ade\u8d5b\u9898\u7684\u65b0\u57fa\u51c6LCB-Pro-Dafny\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.32007", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "\u4ee3\u7801\u751f\u6210", "\u7a0b\u5e8f\u5408\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.32007v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AxDafny: Agentic Verified Code Generation in Dafny", "tldr": "\u63d0\u51faAxDafny\u6846\u67b6\uff0c\u901a\u8fc7\u9a8c\u8bc1\u5668\u5f15\u5bfc\u7684\u8fed\u4ee3\u4fee\u590d\u673a\u5236\u81ea\u52a8\u751f\u6210Dafny\u53ef\u9a8c\u8bc1\u4ee3\u7801\u53ca\u8bc1\u660e\u6784\u4ef6\u3002\u5728DafnyBench\u4e0a\u8fbe\u523092.7%\u9a8c\u8bc1\u6210\u529f\u7387\uff0c\u8d85\u8d8a\u6b64\u524d\u6700\u4f73\u57fa\u7ebf6.5\u4e2a\u767e\u5206\u70b9\uff0c\u5e76\u5f15\u5165\u5305\u542b250\u9053\u7ade\u8d5b\u9898\u7684\u65b0\u57fa\u51c6LCB-Pro-Dafny\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Human-labeled data are widely used as reference annotations in ML, despite known variability across annotators in many expert-driven domains. In addition, expert annotation is slow, inconsistent, and remains a major bottleneck for scaling tasks like tree height bias classification in forestry remote sensing. We propose a multi-agent system (MAS) that orchestrates expert decision trees with Vision-Language Models (VLMs), treating the decision tree as a structural prior while VLMs perform localized semantic perception at individual nodes, with multi-agent voting to mitigate VLM stochasticity. We formalize a Decoupled Declarative Decision (D3) Framework that enables zero-modification generalization across diverse expert-defined decision structures. On a tree bias classification testbed, our framework outperforms supervised ML baselines and reduces the amount of expert labeling effort required. These results suggest that agentic orchestration of VLMs with expert priors can reproduce expert-defined labeling procedures at substantially lower annotation cost while maintaining interpretability.", "arxiv_id": "2606.31976", "arxiv_url": "https://arxiv.org/abs/2606.31976", "authors": ["Shiyi Chen", "Nicholas Saban", "Collin Hargreaves", "Huiqi Wang"], "brief": "\u63d0\u51faTreeAgent\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u5c06\u4e13\u5bb6\u51b3\u7b56\u6811\u4e0e\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7ed3\u5408\uff0c\u7528\u4e8e\u6797\u4e1a\u9065\u611f\u4e2d\u6811\u6728\u9ad8\u5ea6\u504f\u5dee\u7684\u81ea\u52a8\u6807\u6ce8\u3002\u901a\u8fc7\u89e3\u8026\u58f0\u660e\u5f0f\u51b3\u7b56\uff08D3\uff09\u6846\u67b6\u5b9e\u73b0\u96f6\u4fee\u6539\u6cdb\u5316\uff0c\u591a\u667a\u80fd\u4f53\u6295\u7968\u964d\u4f4eVLM\u968f\u673a\u6027\uff0c\u5728\u5206\u7c7b\u4efb\u52a1\u4e0a\u8d85\u8d8a\u76d1\u7763\u5b66\u4e60\u57fa\u7ebf\u5e76\u5927\u5e45\u51cf\u5c11\u4e13\u5bb6\u6807\u6ce8\u5de5\u4f5c\u91cf\u3002", "categories": ["cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31976", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u81ea\u52a8\u6807\u6ce8", "\u9065\u611f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31976v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "TreeAgent: A Generalizable Multi-Agent Framework for Automated Bias Labeling in Forestry via Compiled Expert Rules and Vision-Language Models", "tldr": "\u63d0\u51faTreeAgent\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u5c06\u4e13\u5bb6\u51b3\u7b56\u6811\u4e0e\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7ed3\u5408\uff0c\u7528\u4e8e\u6797\u4e1a\u9065\u611f\u4e2d\u6811\u6728\u9ad8\u5ea6\u504f\u5dee\u7684\u81ea\u52a8\u6807\u6ce8\u3002\u901a\u8fc7\u89e3\u8026\u58f0\u660e\u5f0f\u51b3\u7b56\uff08D3\uff09\u6846\u67b6\u5b9e\u73b0\u96f6\u4fee\u6539\u6cdb\u5316\uff0c\u591a\u667a\u80fd\u4f53\u6295\u7968\u964d\u4f4eVLM\u968f\u673a\u6027\uff0c\u5728\u5206\u7c7b\u4efb\u52a1\u4e0a\u8d85\u8d8a\u76d1\u7763\u5b66\u4e60\u57fa\u7ebf\u5e76\u5927\u5e45\u51cf\u5c11\u4e13\u5bb6\u6807\u6ce8\u5de5\u4f5c\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "High-throughput plant phenotyping now generates image derived datasets far faster than scientists can analyze them. At Oak Ridge National Laboratory\u0027s Advanced Plant Phenotyping Laboratory (APPL), automated stations image hundreds of plants daily across multiple remote sensing modalities; yet, trait extraction and interpretation remain manual, expert-bound, and strictly post-hoc, making analysis, not acquisition, the binding constraint on discovery. We present an end-to-end agentic AI framework that turns the facility from a data factory into an interactive autonomous, discovery platform, where scientists partner with AI agents to accelerate time to insight. A conversational Co-Scientist Agent translates a scientist\u0027s natural-language question into a structured analysis plan, and a headless Compute Agent dispatches Vision Transformer segmentation and trait extraction on the Frontier exascale supercomputer. The two agents run in separate security and resource domains and communicate over a secure, token-authenticated streaming channel, a design that accounts for the federation, data-movement, and provenance realities cloud-native agentic frameworks ignore, ensuring end-to-end provenance is captured for every interaction. The framework turns a days- to weeks-long analysis process into an interactive loop where agents reason over results, recommend next analyses, and respond to follow-up questions in seconds.", "arxiv_id": "2606.31831", "arxiv_url": "https://arxiv.org/abs/2606.31831", "authors": ["Renan Souza", "Daniel Rosendo", "Kelsey Carter", "John Lagergren", "Fr\u00e9d\u00e9ric Suter", "Shelaine L. Curd", "Gerald A. Tuskan", "Rafael Ferreira da Silva", "David Weston"], "brief": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u7aef\u5230\u7aef\u667a\u80fd\u4f53AI\u6846\u67b6\uff0c\u5c06\u690d\u7269\u8868\u578b\u9ad8\u901a\u91cf\u6210\u50cf\u8bbe\u65bd\u8f6c\u53d8\u4e3a\u4ea4\u4e92\u5f0f\u81ea\u4e3b\u53d1\u73b0\u5e73\u53f0\u3002\u6846\u67b6\u7531\u5bf9\u8bdd\u5f0f\u79d1\u5b66\u5bb6\u667a\u80fd\u4f53\u548c\u8ba1\u7b97\u667a\u80fd\u4f53\u7ec4\u6210\uff0c\u524d\u8005\u5c06\u81ea\u7136\u8bed\u8a00\u95ee\u9898\u8f6c\u5316\u4e3a\u5206\u6790\u8ba1\u5212\uff0c\u540e\u8005\u5728Frontier\u8d85\u7b97\u4e0a\u6267\u884c\u89c6\u89c9Transformer\u5206\u5272\u4e0e\u6027\u72b6\u63d0\u53d6\uff0c\u5c06\u539f\u672c\u6570\u5929\u81f3\u6570\u5468\u7684\u5206\u6790\u6d41\u7a0b\u538b\u7f29\u81f3\u79d2\u7ea7\u4ea4\u4e92\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31831", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u690d\u7269\u8868\u578b", "\u89c6\u89c9Transformer", "\u79d1\u5b66\u53d1\u73b0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31831v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "An Agentic AI Framework to Accelerate Scientific Discovery in Plant Phenotyping", "tldr": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u7aef\u5230\u7aef\u667a\u80fd\u4f53AI\u6846\u67b6\uff0c\u5c06\u690d\u7269\u8868\u578b\u9ad8\u901a\u91cf\u6210\u50cf\u8bbe\u65bd\u8f6c\u53d8\u4e3a\u4ea4\u4e92\u5f0f\u81ea\u4e3b\u53d1\u73b0\u5e73\u53f0\u3002\u6846\u67b6\u7531\u5bf9\u8bdd\u5f0f\u79d1\u5b66\u5bb6\u667a\u80fd\u4f53\u548c\u8ba1\u7b97\u667a\u80fd\u4f53\u7ec4\u6210\uff0c\u524d\u8005\u5c06\u81ea\u7136\u8bed\u8a00\u95ee\u9898\u8f6c\u5316\u4e3a\u5206\u6790\u8ba1\u5212\uff0c\u540e\u8005\u5728Frontier\u8d85\u7b97\u4e0a\u6267\u884c\u89c6\u89c9Transformer\u5206\u5272\u4e0e\u6027\u72b6\u63d0\u53d6\uff0c\u5c06\u539f\u672c\u6570\u5929\u81f3\u6570\u5468\u7684\u5206\u6790\u6d41\u7a0b\u538b\u7f29\u81f3\u79d2\u7ea7\u4ea4\u4e92\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Autonomous wet-lab experimentation requires more than plausible protocol text: biological intent, quantitative procedures, device constraints and experimental feedback must remain aligned from protocol and SOP design to code and physical execution. We developed ProtoPilot, a self-evolving multi-agent system, together with an expert-grounded benchmark and evaluation framework for testing this conversion as an experimental automation problem. The framework spans 294 synthetic-biology and molecular-biology tasks derived from 98 gold-standard protocols, wet-lab expert rubrics, device-level validity gates and real experimental tests. ProtoPilot incorporates layer-wise verifiability, multi-agent orchestration and a runtime-updated skill library to generate protocols, expand SOPs, synthesize SDK-compliant code and revise workflows from wet-lab feedback. It achieved a Top@3 expert-preference rate of 90.2%, an overall protocol-to-code gate pass rate of 89.5% and an Opentrons pass rate of 88.24%, compared with 32.35% for OpenTrons-AI. Wet-lab validation produced interpretable readouts, Sanger-confirmed products and feedback-corrected PCA-assembled DNA targets, establishing a verifiable route to autonomous experimentation. Together, these results show that the evaluation framework captures execution-relevant requirements for autonomous wet-lab automation, and that ProtoPilot can meet them by converting protocol and code generation into validated execution and feedback-guided revision.", "arxiv_id": "2606.31763", "arxiv_url": "https://arxiv.org/abs/2606.31763", "authors": ["Yankai Jiang", "Weiting Tang", "Haoran Sun", "Zhenyu Tang", "Yuejie Hou", "Yingnan Han", "Rubo Wang", "Yueyuxiao Yang", "Cheng Liang", "Lilong Wang", "Wenjie Lou", "Xiaosong Wang", "Lei Bai", "Meng Yang"], "brief": "\u63d0\u51faProtoPilot\u2014\u2014\u4e00\u4e2a\u81ea\u8fdb\u5316\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u80fd\u5c06\u751f\u7269\u5b9e\u9a8c\u534f\u8bae\u81ea\u52a8\u8f6c\u5316\u4e3a\u53ef\u6267\u884c\u4ee3\u7801\u5e76\u5728\u6e7f\u5b9e\u9a8c\u5ba4\u4e2d\u8fd0\u884c\u3002\u7cfb\u7edf\u6db5\u76d6\u534f\u8bae\u751f\u6210\u3001SOP\u6269\u5c55\u3001SDK\u4ee3\u7801\u5408\u6210\u53ca\u53cd\u9988\u4fee\u6b63\uff0c\u5728294\u4e2a\u5408\u6210/\u5206\u5b50\u751f\u7269\u5b66\u4efb\u52a1\u4e0a\u8fbe\u523090.2%\u4e13\u5bb6\u504f\u597d\u7387\u548c88.24%\u7684Opentrons\u901a\u8fc7\u7387\uff0c\u8fdc\u8d85\u5bf9\u6bd4\u57fa\u7ebf\u768432.35%\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31763", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5b9e\u9a8c\u5ba4\u81ea\u52a8\u5316", "\u751f\u7269\u534f\u8bae", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31763v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "A Self-Evolving Agentic System for Automated Generation and Execution of Biological Protocols", "tldr": "\u63d0\u51faProtoPilot\u2014\u2014\u4e00\u4e2a\u81ea\u8fdb\u5316\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u80fd\u5c06\u751f\u7269\u5b9e\u9a8c\u534f\u8bae\u81ea\u52a8\u8f6c\u5316\u4e3a\u53ef\u6267\u884c\u4ee3\u7801\u5e76\u5728\u6e7f\u5b9e\u9a8c\u5ba4\u4e2d\u8fd0\u884c\u3002\u7cfb\u7edf\u6db5\u76d6\u534f\u8bae\u751f\u6210\u3001SOP\u6269\u5c55\u3001SDK\u4ee3\u7801\u5408\u6210\u53ca\u53cd\u9988\u4fee\u6b63\uff0c\u5728294\u4e2a\u5408\u6210/\u5206\u5b50\u751f\u7269\u5b66\u4efb\u52a1\u4e0a\u8fbe\u523090.2%\u4e13\u5bb6\u504f\u597d\u7387\u548c88.24%\u7684Opentrons\u901a\u8fc7\u7387\uff0c\u8fdc\u8d85\u5bf9\u6bd4\u57fa\u7ebf\u768432.35%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Research on artificial intelligence (AI) in the public sector often treats \"AI\" as a single category, neglecting technical distinctions between different AI systems. But these distinctions affect how different systems impact core public values like accountability, procedural justice, and non-discrimination. This paper argues that public administration research would benefit from more technical precision on \"AI\" and makes three contributions to this end. First, we introduce a typology of five categories of AI systems: hand-coded, glass-box, black-box, general-purpose, and agentic systems. We calibrate the typology to public administration by grouping system types by their distinct implications for public values. Second, we evaluate technical precision in recent public administration research about AI by coding 91 highly-cited papers (2019-2025) using our typology. We find widespread imprecision: most papers (55\\%) leave the studied system underspecified, 31\\% motivate their work with a different system than they study, and 41\\% make more general conclusions than the studied system supports. Finally, we give practical recommendations for future research. We highlight common pitfalls to avoid, and suggest that researchers should, at a minimum, provide enough technical detail to locate the studied system in our typology. To this end, we provide a practical guide -- a short set of diagnostic questions answerable from public information and without specialist technical knowledge.", "arxiv_id": "2606.31755", "arxiv_url": "https://arxiv.org/abs/2606.31755", "authors": ["Jonathan Rystr\u00f8m", "Chris Schmitz", "Nathan Davies", "Gerhard Hammerschmid", "Albert Meijer", "Chris Russell"], "brief": "\u672c\u6587\u9488\u5bf9\u516c\u5171\u884c\u653f\u9886\u57dfAI\u7814\u7a76\u4e2d\u6280\u672f\u6982\u5ff5\u6a21\u7cca\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u5957\u5305\u542b\u4e94\u7c7bAI\u7cfb\u7edf\uff08\u624b\u5de5\u7f16\u7801\u3001\u73bb\u7483\u76d2\u3001\u9ed1\u76d2\u3001\u901a\u7528\u3001\u667a\u80fd\u4f53\uff09\u7684\u5206\u7c7b\u6846\u67b6\uff0c\u5e76\u901a\u8fc7\u5206\u679091\u7bc7\u9ad8\u5f15\u8bba\u6587\u53d1\u73b0\u8d85\u534a\u6570\u7814\u7a76\u5b58\u5728\u7cfb\u7edf\u7c7b\u578b\u754c\u5b9a\u4e0d\u6e05\u7684\u95ee\u9898\uff0c\u6700\u7ec8\u7ed9\u51fa\u5b9e\u7528\u8bca\u65ad\u6307\u5357\u4ee5\u63d0\u5347\u7814\u7a76\u7cbe\u786e\u6027\u3002", "categories": ["cs.CY", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31755", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u516c\u5171\u884c\u653f", "AI\u5206\u7c7b", "\u667a\u80fd\u4f53", "\u7b97\u6cd5\u95ee\u8d23"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31755v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "A Technical Typology of AI Systems in Public Administration", "tldr": "\u672c\u6587\u9488\u5bf9\u516c\u5171\u884c\u653f\u9886\u57dfAI\u7814\u7a76\u4e2d\u6280\u672f\u6982\u5ff5\u6a21\u7cca\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u5957\u5305\u542b\u4e94\u7c7bAI\u7cfb\u7edf\uff08\u624b\u5de5\u7f16\u7801\u3001\u73bb\u7483\u76d2\u3001\u9ed1\u76d2\u3001\u901a\u7528\u3001\u667a\u80fd\u4f53\uff09\u7684\u5206\u7c7b\u6846\u67b6\uff0c\u5e76\u901a\u8fc7\u5206\u679091\u7bc7\u9ad8\u5f15\u8bba\u6587\u53d1\u73b0\u8d85\u534a\u6570\u7814\u7a76\u5b58\u5728\u7cfb\u7edf\u7c7b\u578b\u754c\u5b9a\u4e0d\u6e05\u7684\u95ee\u9898\uff0c\u6700\u7ec8\u7ed9\u51fa\u5b9e\u7528\u8bca\u65ad\u6307\u5357\u4ee5\u63d0\u5347\u7814\u7a76\u7cbe\u786e\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Long-horizon language agents must repeatedly interact with tools, accumulate evidence, and make decisions under bounded context windows. Existing context-management methods make such rollouts feasible by truncating distant history, folding past turns into summaries, or selecting compact memory states. However, these breakthroughs introduce two coupled limitations. First, as the number of turns grows, historical observations are progressively removed or collapsed into compressed states, making it harder for the policy to reuse fine-grained evidence. Second, once the original turns are no longer source-addressable, outcome-based RL loses an explicit path for aligning policy updates with the evidence that supported a successful final answer. To this end, we propose ECHO, a selective turn-memory framework that jointly addresses history collapse and traceable learning through source-indexed reconstruction. Specifically, ECHO compresses each completed environment turn into a compact memory record, reconstructs bounded policy contexts by selecting from these records, and reuses the selected source indices to route positive outcome credit to the evidence and selection actions that support successful answers. On BrowseComp-Plus, ECHO reaches 43.4% held-out accuracy, outperforming GRPO (28.9%) and the rolling-summary baseline SUPO (36.1%), while using fewer turns and lower trajectory volume than SUPO (Figure 1). Additionally, the trained policy improves zero-shot generalization across multi-objective QA, code generation, and deep information-seeking benchmarks on both dense and MoE backbones.", "arxiv_id": "2606.31650", "arxiv_url": "https://arxiv.org/abs/2606.31650", "authors": ["Zijun Xie", "Binbin Zheng", "Enlei Gong", "Jihua Liu", "Yuyang You", "Lingfeng Liu", "Jiayao Tang", "Guanqun Zhao", "Aoqi Hu", "Zeyu Chen"], "brief": "ECHO\u662f\u4e00\u4e2a\u9009\u62e9\u6027\u8f6e\u6b21\u8bb0\u5fc6\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u5386\u53f2\u4ea4\u4e92\u538b\u7f29\u4e3a\u7d27\u51d1\u8bb0\u5fc6\u8bb0\u5f55\u5e76\u57fa\u4e8e\u6e90\u7d22\u5f15\u91cd\u5efa\u4e0a\u4e0b\u6587\uff0c\u89e3\u51b3\u4e86\u957f\u7a0b\u667a\u80fd\u4f53\u5728\u6709\u9650\u4e0a\u4e0b\u6587\u7a97\u53e3\u4e0b\u5386\u53f2\u4fe1\u606f\u4e22\u5931\u548c\u5f3a\u5316\u5b66\u4e60\u4fe1\u7528\u5206\u914d\u56f0\u96be\u7684\u95ee\u9898\u3002\u5728BrowseComp-Plus\u57fa\u51c6\u4e0a\u8fbe\u523043.4%\u51c6\u786e\u7387\uff0c\u663e\u8457\u4f18\u4e8eGRPO\uff0828.9%\uff09\u548cSUPO\uff0836.1%\uff09\uff0c\u540c\u65f6\u63d0\u5347\u4e86\u591a\u4efb\u52a1\u96f6\u6837\u672c\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31650", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u8bb0\u5fc6\u7ba1\u7406", "\u957f\u7a0b\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31650v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "ECHO: Prune to act, trace to learn with selective turn memory in agentic RL", "tldr": "ECHO\u662f\u4e00\u4e2a\u9009\u62e9\u6027\u8f6e\u6b21\u8bb0\u5fc6\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u5386\u53f2\u4ea4\u4e92\u538b\u7f29\u4e3a\u7d27\u51d1\u8bb0\u5fc6\u8bb0\u5f55\u5e76\u57fa\u4e8e\u6e90\u7d22\u5f15\u91cd\u5efa\u4e0a\u4e0b\u6587\uff0c\u89e3\u51b3\u4e86\u957f\u7a0b\u667a\u80fd\u4f53\u5728\u6709\u9650\u4e0a\u4e0b\u6587\u7a97\u53e3\u4e0b\u5386\u53f2\u4fe1\u606f\u4e22\u5931\u548c\u5f3a\u5316\u5b66\u4e60\u4fe1\u7528\u5206\u914d\u56f0\u96be\u7684\u95ee\u9898\u3002\u5728BrowseComp-Plus\u57fa\u51c6\u4e0a\u8fbe\u523043.4%\u51c6\u786e\u7387\uff0c\u663e\u8457\u4f18\u4e8eGRPO\uff0828.9%\uff09\u548cSUPO\uff0836.1%\uff09\uff0c\u540c\u65f6\u63d0\u5347\u4e86\u591a\u4efb\u52a1\u96f6\u6837\u672c\u6cdb\u5316\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present LuckyStar 111B, a 111B-parameter hybrid reasoning model developed through a collaboration between Cohere and LG CNS for Korean-English enterprise agents under practical memory and serving constraints. The model trains from Cohere\u0027s fully post-trained Command A model rather than a new pretraining run, and uses preamble conditioning to switch between concise non-reasoning behavior and longer tool-oriented reasoning. We study four choices for scaling tool-using agents efficiently: multilingual supervised fine-tuning, reinforcement learning with verifiable rewards for multi-step tool-use tasks, language-consistency rewards for Korean user-facing responses, and 4-bit quantization for single-GPU serving. The adapted model improves mathematical reasoning, function calling, and agentic natural-language-to-SQL (NL2SQL) performance while preserving general Korean and English instruction-following quality. These results provide a practical recipe and failure-mode analysis for adapting post-trained multilingual models to verifiable agentic workflows under memory-constrained deployment.", "arxiv_id": "2606.31648", "arxiv_url": "https://arxiv.org/abs/2606.31648", "authors": ["Utsav Garg", "Sungjin Hong", "Jason Jung", "Justin Lee", "Shaan Desai", "Joon Hee Kim", "Anirudh Shrinivason", "Edmond Wen", "Susie Park"], "brief": "Cohere\u4e0eLG CNS\u5408\u4f5c\u5f00\u53d1\u4e86LuckyStar 111B\uff0c\u4e00\u4e2a\u9762\u5411\u97e9\u82f1\u4f01\u4e1a\u573a\u666f\u7684\u6df7\u5408\u63a8\u7406\u6a21\u578b\uff0c\u901a\u8fc7\u591a\u8bed\u8a00\u5fae\u8c03\u3001\u53ef\u9a8c\u8bc1\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\u3001\u8bed\u8a00\u4e00\u81f4\u6027\u5956\u52b1\u548c4-bit\u91cf\u5316\u56db\u79cd\u7b56\u7565\u9ad8\u6548\u9002\u914d\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u3002\u8be5\u6a21\u578b\u5728\u6570\u5b66\u63a8\u7406\u3001\u51fd\u6570\u8c03\u7528\u548cNL2SQL\u4efb\u52a1\u4e0a\u663e\u8457\u63d0\u5347\uff0c\u540c\u65f6\u4fdd\u6301\u97e9\u82f1\u53cc\u8bed\u6307\u4ee4\u8ddf\u968f\u8d28\u91cf\uff0c\u5e76\u5b9e\u73b0\u5355GPU\u90e8\u7f72\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31648", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u8bed\u8a00", "\u5de5\u5177\u8c03\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31648v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Think in English, Answer in Korean: Efficient Adaptation of Multilingual Tool-Using Agents", "tldr": "Cohere\u4e0eLG CNS\u5408\u4f5c\u5f00\u53d1\u4e86LuckyStar 111B\uff0c\u4e00\u4e2a\u9762\u5411\u97e9\u82f1\u4f01\u4e1a\u573a\u666f\u7684\u6df7\u5408\u63a8\u7406\u6a21\u578b\uff0c\u901a\u8fc7\u591a\u8bed\u8a00\u5fae\u8c03\u3001\u53ef\u9a8c\u8bc1\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\u3001\u8bed\u8a00\u4e00\u81f4\u6027\u5956\u52b1\u548c4-bit\u91cf\u5316\u56db\u79cd\u7b56\u7565\u9ad8\u6548\u9002\u914d\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u3002\u8be5\u6a21\u578b\u5728\u6570\u5b66\u63a8\u7406\u3001\u51fd\u6570\u8c03\u7528\u548cNL2SQL\u4efb\u52a1\u4e0a\u663e\u8457\u63d0\u5347\uff0c\u540c\u65f6\u4fdd\u6301\u97e9\u82f1\u53cc\u8bed\u6307\u4ee4\u8ddf\u968f\u8d28\u91cf\uff0c\u5e76\u5b9e\u73b0\u5355GPU\u90e8\u7f72\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are no longer only text generators. They are increasingly embedded in retrieval pipelines, enterprise assistants, coding environments, robotic systems, security-operation workflows, and autonomous agents that can read private data, call tools, write files, execute code, and act across organizational boundaries. This shift changes the security problem: risks do not arise from the model weights alone, but from the full lifecycle and application stack through which data, prompts, model outputs, tools, memories, and user authority interact. This paper systematizes the literature on vulnerabilities in large language model systems through a lifecycle and application-stack lens. We organize attacks across eight stages: data collection, pretraining, post-training alignment, model packaging and supply chain, retrieval and memory, prompting and inference, tool/agent execution, and deployment/maintenance. For each stage, we analyze attacker capabilities, affected security objectives, representative attacks, practical risks, evaluation practices, and defenses. We further map LLM-specific vulnerabilities to confidentiality, integrity, availability, safety, privacy, fairness, accountability, and agency-control objectives. Unlike taxonomies that list isolated attack names, the proposed systematization emphasizes where trust boundaries fail, how untrusted data becomes executable instruction, how delegated authority amplifies model errors, and why point defenses rarely compose. We close with a research agenda for secure LLM systems, including compositional security, provenance-aware retrieval, tool-call containment, long-horizon agent evaluation, privacy-preserving adaptation, realistic red teaming, and deployment-grade incident response.", "arxiv_id": "2606.31639", "arxiv_url": "https://arxiv.org/abs/2606.31639", "authors": ["Seyed Bagher Hashemi Natanzi", "Bo Tang"], "brief": "\u672c\u6587\u7cfb\u7edf\u68b3\u7406\u4e86\u5927\u578b\u8bed\u8a00\u6a21\u578b\u5168\u751f\u547d\u5468\u671f\u4e0e\u5e94\u7528\u6808\u4e2d\u7684\u5b89\u5168\u6f0f\u6d1e\uff0c\u6db5\u76d6\u6570\u636e\u6536\u96c6\u3001\u9884\u8bad\u7ec3\u3001\u5bf9\u9f50\u3001\u4f9b\u5e94\u94fe\u3001\u68c0\u7d22\u8bb0\u5fc6\u3001\u63a8\u7406\u3001\u5de5\u5177/\u667a\u80fd\u4f53\u6267\u884c\u53ca\u90e8\u7f72\u7ef4\u62a4\u516b\u4e2a\u9636\u6bb5\u7684\u653b\u51fb\u4e0e\u9632\u5fa1\u3002\u7814\u7a76\u5f3a\u8c03\u4fe1\u4efb\u8fb9\u754c\u5931\u6548\u3001\u4e0d\u53ef\u4fe1\u6570\u636e\u5982\u4f55\u53d8\u4e3a\u53ef\u6267\u884c\u6307\u4ee4\u3001\u59d4\u6258\u6743\u9650\u5982\u4f55\u653e\u5927\u6a21\u578b\u9519\u8bef\u7b49\u6838\u5fc3\u95ee\u9898\uff0c\u5e76\u6307\u51fa\u5355\u70b9\u9632\u5fa1\u96be\u4ee5\u7ec4\u5408\u751f\u6548\u3002\u6700\u7ec8\u63d0\u51fa\u5305\u62ec\u7ec4\u5408\u5b89\u5168\u3001\u6eaf\u6e90\u611f\u77e5\u68c0\u7d22\u3001\u5de5\u5177\u8c03\u7528\u9694\u79bb\u7b49\u5728\u5185\u7684\u672a\u6765\u7814\u7a76\u8bae\u7a0b\u3002", "categories": ["cs.CR", "cs.AI", "cs.GT", "cs.LO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31639", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u6f0f\u6d1e", "\u667a\u80fd\u4f53", "\u4f9b\u5e94\u94fe\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31639v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "A Lifecycle and Application-Stack Survey of Large Language Model Vulnerabilities: Attacks, Risks, Defenses, and Open Problems", "tldr": "\u672c\u6587\u7cfb\u7edf\u68b3\u7406\u4e86\u5927\u578b\u8bed\u8a00\u6a21\u578b\u5168\u751f\u547d\u5468\u671f\u4e0e\u5e94\u7528\u6808\u4e2d\u7684\u5b89\u5168\u6f0f\u6d1e\uff0c\u6db5\u76d6\u6570\u636e\u6536\u96c6\u3001\u9884\u8bad\u7ec3\u3001\u5bf9\u9f50\u3001\u4f9b\u5e94\u94fe\u3001\u68c0\u7d22\u8bb0\u5fc6\u3001\u63a8\u7406\u3001\u5de5\u5177/\u667a\u80fd\u4f53\u6267\u884c\u53ca\u90e8\u7f72\u7ef4\u62a4\u516b\u4e2a\u9636\u6bb5\u7684\u653b\u51fb\u4e0e\u9632\u5fa1\u3002\u7814\u7a76\u5f3a\u8c03\u4fe1\u4efb\u8fb9\u754c\u5931\u6548\u3001\u4e0d\u53ef\u4fe1\u6570\u636e\u5982\u4f55\u53d8\u4e3a\u53ef\u6267\u884c\u6307\u4ee4\u3001\u59d4\u6258\u6743\u9650\u5982\u4f55\u653e\u5927\u6a21\u578b\u9519\u8bef\u7b49\u6838\u5fc3\u95ee\u9898\uff0c\u5e76\u6307\u51fa\u5355\u70b9\u9632\u5fa1\u96be\u4ee5\u7ec4\u5408\u751f\u6548\u3002\u6700\u7ec8\u63d0\u51fa\u5305\u62ec\u7ec4\u5408\u5b89\u5168\u3001\u6eaf\u6e90\u611f\u77e5\u68c0\u7d22\u3001\u5de5\u5177\u8c03\u7528\u9694\u79bb\u7b49\u5728\u5185\u7684\u672a\u6765\u7814\u7a76\u8bae\u7a0b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Fault recovery in process plants still relies heavily on plant operators, especially when faults fall outside predefined supervisory logic. Operators interpret alarms, procedures, P\\\u0026IDs, interlocks, and process trends, then decide how to move the plant to a safe operating mode without triggering a shutdown. This paper examines how Large Language Model (LLM) agents can support such recovery decisions. The proposed framework treats the LLM as a constrained supervisory planner. It uses plant-specific knowledge to propose recovery actions, and every proposal is checked by an external validator (symbolic or simulation-based) before actuation. The paper develops three design dimensions for applying the framework: the recovery patterns for which LLM agents are useful, the validation strategies that separate admissible from inadmissible proposals, and the deployment constraints imposed by latency, knowledge engineering, safety integration, and model lifecycle management. To make the framework directly usable, two openly available executable Python environments are provided. Both re-implement established case studies, a modular mixing module and a continuous stirred-tank reactor, extended with configurable faults and defined interfaces for custom recovery and validation methods.", "arxiv_id": "2606.31635", "arxiv_url": "https://arxiv.org/abs/2606.31635", "authors": ["Javal Vyas", "Milapji Singh Gill", "Artan Markaj", "Felix Gehlhoff", "Mehmet Mercang\u00f6z"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\uff08LLM\uff09\u7684\u81ea\u4e3b\u5bb9\u9519\u63a7\u5236\u6846\u67b6\uff0c\u5c06LLM\u4f5c\u4e3a\u53d7\u7ea6\u675f\u7684\u76d1\u7763\u89c4\u5212\u5668\uff0c\u5229\u7528\u5de5\u5382\u4e13\u6709\u77e5\u8bc6\u63d0\u51fa\u6545\u969c\u6062\u590d\u52a8\u4f5c\uff0c\u5e76\u901a\u8fc7\u5916\u90e8\u9a8c\u8bc1\u5668\uff08\u7b26\u53f7\u6216\u4eff\u771f\uff09\u8fc7\u6ee4\u4e0d\u53ef\u884c\u65b9\u6848\u3002\u6846\u67b6\u6db5\u76d6\u6062\u590d\u6a21\u5f0f\u3001\u9a8c\u8bc1\u7b56\u7565\u548c\u90e8\u7f72\u7ea6\u675f\u4e09\u4e2a\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u5e76\u63d0\u4f9b\u4e24\u4e2a\u53ef\u6267\u884cPython\u73af\u5883\uff08\u6df7\u5408\u6a21\u5757\u548c\u8fde\u7eed\u6405\u62cc\u91dc\u53cd\u5e94\u5668\uff09\u4f9b\u76f4\u63a5\u4f7f\u7528\u3002", "categories": ["eess.SY", "cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31635", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5bb9\u9519\u63a7\u5236", "\u8fc7\u7a0b\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31635v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "A Tutorial on Autonomous Fault-Tolerant Control Using Knowledge-Grounded LLM Agents", "tldr": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\uff08LLM\uff09\u7684\u81ea\u4e3b\u5bb9\u9519\u63a7\u5236\u6846\u67b6\uff0c\u5c06LLM\u4f5c\u4e3a\u53d7\u7ea6\u675f\u7684\u76d1\u7763\u89c4\u5212\u5668\uff0c\u5229\u7528\u5de5\u5382\u4e13\u6709\u77e5\u8bc6\u63d0\u51fa\u6545\u969c\u6062\u590d\u52a8\u4f5c\uff0c\u5e76\u901a\u8fc7\u5916\u90e8\u9a8c\u8bc1\u5668\uff08\u7b26\u53f7\u6216\u4eff\u771f\uff09\u8fc7\u6ee4\u4e0d\u53ef\u884c\u65b9\u6848\u3002\u6846\u67b6\u6db5\u76d6\u6062\u590d\u6a21\u5f0f\u3001\u9a8c\u8bc1\u7b56\u7565\u548c\u90e8\u7f72\u7ea6\u675f\u4e09\u4e2a\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u5e76\u63d0\u4f9b\u4e24\u4e2a\u53ef\u6267\u884cPython\u73af\u5883\uff08\u6df7\u5408\u6a21\u5757\u548c\u8fde\u7eed\u6405\u62cc\u91dc\u53cd\u5e94\u5668\uff09\u4f9b\u76f4\u63a5\u4f7f\u7528\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The increasing complexity of agentic tasks has led to rapidly growing trajectory lengths, which poses significant challenges for large language model (LLM) based agents with fixed context windows. Existing context management techniques, such as truncation and summarization, suffer from inherent inflexibility and irreversibility: once information is discarded or compressed, it cannot be recovered even when it becomes critically relevant in later decision steps. To address these limitations, we propose the Adaptive Context Elasticizer (ACE), a plug-and-play module that elastically orchestrates historical step information into the agent\u0027s context at each decision step. ACE maintains a lossless message maintenance layer that stores both raw messages and compressed abstractions for each historical step, while a context orchestration layer adaptively assigns each step an elastic type as raw, abstract, or drop, at every decision step based on the current task state. This reversible design ensures that the main LLM always receives a compact yet information-rich context. We adapt ACE to four diverse agent frameworks, including ReAct, DeepAgent, WebThinker, and MiroFlow, without training or architectural modifications. Experiments show that ACE consistently outperforms truncation and summarization baselines, and brings consistent performance gains across all four agent frameworks.", "arxiv_id": "2606.31564", "arxiv_url": "https://arxiv.org/abs/2606.31564", "authors": ["Ning Liao", "Zihao Long", "Xiaoxing Wang", "Xue Yang", "Yaoming Wang", "Ziyuan Zhuang", "Xunliang Cai", "Rongxiang Weng", "Junchi Yan"], "brief": "\u9488\u5bf9\u667a\u80fd\u4f53\u4efb\u52a1\u4e2d\u4e0a\u4e0b\u6587\u7a97\u53e3\u4e0d\u8db3\u7684\u95ee\u9898\uff0c\u63d0\u51faACE\uff08\u81ea\u9002\u5e94\u4e0a\u4e0b\u6587\u5f39\u6027\u5668\uff09\uff0c\u901a\u8fc7\u65e0\u635f\u6d88\u606f\u7ef4\u62a4\u5c42\u548c\u4e0a\u4e0b\u6587\u7f16\u6392\u5c42\uff0c\u5728\u6bcf\u4e2a\u51b3\u7b56\u6b65\u9aa4\u52a8\u6001\u5206\u914d\u5386\u53f2\u4fe1\u606f\u7684\u5c55\u793a\u5f62\u5f0f\uff08\u539f\u59cb/\u6458\u8981/\u4e22\u5f03\uff09\uff0c\u5b9e\u73b0\u53ef\u9006\u7684\u4e0a\u4e0b\u6587\u7ba1\u7406\u3002\u5b9e\u9a8c\u8868\u660eACE\u5728ReAct\u3001DeepAgent\u7b49\u56db\u79cd\u667a\u80fd\u4f53\u6846\u67b6\u4e0a\u5747\u4f18\u4e8e\u622a\u65ad\u548c\u6458\u8981\u57fa\u7ebf\u65b9\u6cd5\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31564", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4e0a\u4e0b\u6587\u7ba1\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u957f\u8f68\u8ff9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31564v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "ACE: Pluggable Adaptive Context Elasticizer across Agents", "tldr": "\u9488\u5bf9\u667a\u80fd\u4f53\u4efb\u52a1\u4e2d\u4e0a\u4e0b\u6587\u7a97\u53e3\u4e0d\u8db3\u7684\u95ee\u9898\uff0c\u63d0\u51faACE\uff08\u81ea\u9002\u5e94\u4e0a\u4e0b\u6587\u5f39\u6027\u5668\uff09\uff0c\u901a\u8fc7\u65e0\u635f\u6d88\u606f\u7ef4\u62a4\u5c42\u548c\u4e0a\u4e0b\u6587\u7f16\u6392\u5c42\uff0c\u5728\u6bcf\u4e2a\u51b3\u7b56\u6b65\u9aa4\u52a8\u6001\u5206\u914d\u5386\u53f2\u4fe1\u606f\u7684\u5c55\u793a\u5f62\u5f0f\uff08\u539f\u59cb/\u6458\u8981/\u4e22\u5f03\uff09\uff0c\u5b9e\u73b0\u53ef\u9006\u7684\u4e0a\u4e0b\u6587\u7ba1\u7406\u3002\u5b9e\u9a8c\u8868\u660eACE\u5728ReAct\u3001DeepAgent\u7b49\u56db\u79cd\u667a\u80fd\u4f53\u6846\u67b6\u4e0a\u5747\u4f18\u4e8e\u622a\u65ad\u548c\u6458\u8981\u57fa\u7ebf\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Agentic Business Process Management has gained momentum recently. The prospect is that the autonomy of AI agents, i.e., predominantly LLM-based agents, can be balanced with a certain level of robustness, tractability, and traceability through a combination with process technology. In this paper, we provide a classification framework for agentic orchestration options along properties such as task specificity, traceability and tractability, autonomy and reactivity, and correctness assurance and present qualitative decision criteria for realizations of different scenarios. We also provide metrics for the quantitative assessment of realization properties and show them through different agentic implementations of a predictive light sensing scenario. Altogether, this work aims at providing properties, criteria, and metrics for the design and implementation of agentic orchestrations and orchestration of agents.", "arxiv_id": "2606.31518", "arxiv_url": "https://arxiv.org/abs/2606.31518", "authors": ["Stefanie Rinderle-Ma", "Juergen Mangler", "Johannes Loebbecke", "Dominik Voigt", "Nataliia Klievtsova", "Matthias Ehrendorfer"], "brief": "\u672c\u6587\u9488\u5bf9\u667a\u80fd\u4f53\u4e1a\u52a1\u6d41\u7a0b\u7ba1\u7406\u63d0\u51fa\u4e86\u4e00\u5957\u5206\u7c7b\u6846\u67b6\uff0c\u4ece\u4efb\u52a1\u7279\u5f02\u6027\u3001\u53ef\u8ffd\u6eaf\u6027\u3001\u81ea\u4e3b\u6027\u7b49\u7ef4\u5ea6\u5bf9\u667a\u80fd\u4f53\u7f16\u6392\u65b9\u6848\u8fdb\u884c\u5206\u7c7b\uff0c\u5e76\u7ed9\u51fa\u5b9a\u6027\u51b3\u7b56\u51c6\u5219\u4e0e\u5b9a\u91cf\u8bc4\u4f30\u6307\u6807\uff0c\u901a\u8fc7\u9884\u6d4b\u6027\u5149\u611f\u77e5\u573a\u666f\u7684\u591a\u79cd\u667a\u80fd\u4f53\u5b9e\u73b0\u52a0\u4ee5\u9a8c\u8bc1\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31518", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4e1a\u52a1\u6d41\u7a0b\u7ba1\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7f16\u6392\u6846\u67b6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31518v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Design and Implementation of Agentic Orchestrations and Orchestration of Agents", "tldr": "\u672c\u6587\u9488\u5bf9\u667a\u80fd\u4f53\u4e1a\u52a1\u6d41\u7a0b\u7ba1\u7406\u63d0\u51fa\u4e86\u4e00\u5957\u5206\u7c7b\u6846\u67b6\uff0c\u4ece\u4efb\u52a1\u7279\u5f02\u6027\u3001\u53ef\u8ffd\u6eaf\u6027\u3001\u81ea\u4e3b\u6027\u7b49\u7ef4\u5ea6\u5bf9\u667a\u80fd\u4f53\u7f16\u6392\u65b9\u6848\u8fdb\u884c\u5206\u7c7b\uff0c\u5e76\u7ed9\u51fa\u5b9a\u6027\u51b3\u7b56\u51c6\u5219\u4e0e\u5b9a\u91cf\u8bc4\u4f30\u6307\u6807\uff0c\u901a\u8fc7\u9884\u6d4b\u6027\u5149\u611f\u77e5\u573a\u666f\u7684\u591a\u79cd\u667a\u80fd\u4f53\u5b9e\u73b0\u52a0\u4ee5\u9a8c\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Real-world data analysis is a multi-step process over heterogeneous inputs rather than merely producing a final answer. A practical system should autonomously organize multi-step workflows, execute generated code in a sandboxed and controllable environment, and remain inspectable through visible action traces and intermediate artifacts. Existing LLM-based analysis tools, however, often emphasize isolated subtasks, leaving limited support for complete execution-grounded workflows. We present DA-Studio (Data Analysis Studio), an interactive web-based demo system for end-to-end data analysis that is autonomous, sandboxed, and inspectable. DA-Studio integrates an action-structured analysis backend, a sandboxed execution workspace, and a browser interface for task setup, streamed action traces, artifact preview, code editing and rerunning, and report export. Through iterative action generation, code execution, and feedback incorporation, it incrementally constructs executable analysis steps from raw files and natural-language requests while exposing intermediate results and artifacts throughout the process.", "arxiv_id": "2606.31423", "arxiv_url": "https://arxiv.org/abs/2606.31423", "authors": ["Yizhe Liu", "Shaolei Zhang", "Ju Fan"], "brief": "DA-Studio\u662f\u4e00\u4e2a\u7aef\u5230\u7aef\u6570\u636e\u5206\u6790\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u80fd\u591f\u81ea\u4e3b\u7ec4\u7ec7\u591a\u6b65\u9aa4\u5de5\u4f5c\u6d41\u3001\u5728\u6c99\u7bb1\u73af\u5883\u4e2d\u6267\u884c\u4ee3\u7801\uff0c\u5e76\u901a\u8fc7\u53ef\u89c6\u5316\u52a8\u4f5c\u8f68\u8ff9\u548c\u4e2d\u95f4\u4ea7\u7269\u4fdd\u6301\u5168\u7a0b\u53ef\u68c0\u67e5\u6027\u3002\u7cfb\u7edf\u96c6\u6210\u4e86\u7ed3\u6784\u5316\u52a8\u4f5c\u540e\u7aef\u3001\u6c99\u7bb1\u6267\u884c\u73af\u5883\u548c\u6d4f\u89c8\u5668\u4ea4\u4e92\u754c\u9762\uff0c\u652f\u6301\u4ece\u539f\u59cb\u6587\u4ef6\u548c\u81ea\u7136\u8bed\u8a00\u8bf7\u6c42\u51fa\u53d1\u8fed\u4ee3\u6784\u5efa\u5b8c\u6574\u5206\u6790\u6d41\u7a0b\u3002", "categories": ["cs.DB", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31423", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u6570\u636e\u5206\u6790", "\u4ee3\u7801\u751f\u6210", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31423v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "DA-Studio: An Agentic System for End-to-End Data Analysis", "tldr": "DA-Studio\u662f\u4e00\u4e2a\u7aef\u5230\u7aef\u6570\u636e\u5206\u6790\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u80fd\u591f\u81ea\u4e3b\u7ec4\u7ec7\u591a\u6b65\u9aa4\u5de5\u4f5c\u6d41\u3001\u5728\u6c99\u7bb1\u73af\u5883\u4e2d\u6267\u884c\u4ee3\u7801\uff0c\u5e76\u901a\u8fc7\u53ef\u89c6\u5316\u52a8\u4f5c\u8f68\u8ff9\u548c\u4e2d\u95f4\u4ea7\u7269\u4fdd\u6301\u5168\u7a0b\u53ef\u68c0\u67e5\u6027\u3002\u7cfb\u7edf\u96c6\u6210\u4e86\u7ed3\u6784\u5316\u52a8\u4f5c\u540e\u7aef\u3001\u6c99\u7bb1\u6267\u884c\u73af\u5883\u548c\u6d4f\u89c8\u5668\u4ea4\u4e92\u754c\u9762\uff0c\u652f\u6301\u4ece\u539f\u59cb\u6587\u4ef6\u548c\u81ea\u7136\u8bed\u8a00\u8bf7\u6c42\u51fa\u53d1\u8fed\u4ee3\u6784\u5efa\u5b8c\u6574\u5206\u6790\u6d41\u7a0b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "When large language model (LLM) agents adapt their behavior through evaluator feedback, systematic evaluator biases propagate into the agent\u0027s learned strategy distribution - a phenomenon termed evaluator preference coupling. Prior work has documented this coupling and established a diagnostic framework (EPC) to measure it, but has not investigated whether calibration techniques can mitigate the effect. We present the first study of evaluator calibration as mitigation: applying probability calibration to the evaluator\u0027s pairwise judgments to reduce spurious preference propagation. In a controlled within-subjects experiment (N=5) comparing standard binary TTRL (win/loss) with confidence-calibrated TTRL (probability-weighted updates) using DeepSeek-V4-Pro as executor and GLM5.2 as evaluator, we find that calibration reduces the coupling coefficient gamma by 20-49% and Jensen-Shannon divergence by 45-67%. A symmetric-LR control confirms the effect is not due to reduced update asymmetry. We release the calibrated TTRL protocol and recommend it as a lightweight mitigation for LLM-as-judge deployment pipelines.", "arxiv_id": "2606.31371", "arxiv_url": "https://arxiv.org/abs/2606.31371", "authors": ["Zewen Liu"], "brief": "\u7814\u7a76LLM\u667a\u80fd\u4f53\u5728\u8bc4\u4f30\u5668\u53cd\u9988\u5faa\u73af\u4e2d\u4ea7\u751f\u7684\"\u8bc4\u4f30\u5668\u504f\u597d\u8026\u5408\"\u95ee\u9898\uff0c\u9996\u6b21\u63d0\u51fa\u7528\u6982\u7387\u6821\u51c6\u65b9\u6cd5\u5bf9\u8bc4\u4f30\u5668\u7684\u6210\u5bf9\u5224\u65ad\u8fdb\u884c\u6821\u51c6\uff0c\u4ee5\u51cf\u5c11\u865a\u5047\u504f\u597d\u4f20\u64ad\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u6821\u51c6\u540e\u8026\u5408\u7cfb\u6570\u964d\u4f4e20-49%\uff0cJensen-Shannon\u6563\u5ea6\u964d\u4f4e45-67%\uff0c\u662f\u4e00\u79cd\u8f7b\u91cf\u7ea7\u7684LLM-as-judge\u90e8\u7f72\u4f18\u5316\u65b9\u6848\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31371", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8bc4\u4f30\u5668\u6821\u51c6", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31371v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Calibrating the Evaluator: Does Probability Calibration Mitigate Preference Coupling in LLM Agent Feedback Loops?", "tldr": "\u7814\u7a76LLM\u667a\u80fd\u4f53\u5728\u8bc4\u4f30\u5668\u53cd\u9988\u5faa\u73af\u4e2d\u4ea7\u751f\u7684\"\u8bc4\u4f30\u5668\u504f\u597d\u8026\u5408\"\u95ee\u9898\uff0c\u9996\u6b21\u63d0\u51fa\u7528\u6982\u7387\u6821\u51c6\u65b9\u6cd5\u5bf9\u8bc4\u4f30\u5668\u7684\u6210\u5bf9\u5224\u65ad\u8fdb\u884c\u6821\u51c6\uff0c\u4ee5\u51cf\u5c11\u865a\u5047\u504f\u597d\u4f20\u64ad\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u6821\u51c6\u540e\u8026\u5408\u7cfb\u6570\u964d\u4f4e20-49%\uff0cJensen-Shannon\u6563\u5ea6\u964d\u4f4e45-67%\uff0c\u662f\u4e00\u79cd\u8f7b\u91cf\u7ea7\u7684LLM-as-judge\u90e8\u7f72\u4f18\u5316\u65b9\u6848\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The electrification of transportation through electric vehicles introduces new challenges for power grid management, such as increased peak demand, voltage fluctuations, line overloads, and the integration of variable renewable energy sources. To enable efficient integration of EVs while minimizing costs for users and avoiding network overloads, implicit coordination between EVs is required. This work compares two independent multi-agent reinforcement learning approaches for optimizing such decentralized EV charging: contextual combinatorial bandits and policy gradient algorithms. Using a realistic simulation environment with autonomous agents making decisions based on local environmental information (including price signals, state-of-charge, and temporal constraints), we evaluate their performance across varying congestion levels, and mixed-strategy configurations with heterogeneous agent groups under dynamic electricity pricing derived from real photovoltaic production data.", "arxiv_id": "2606.31347", "arxiv_url": "https://arxiv.org/abs/2606.31347", "authors": ["Xavier Rate", "Eloann Le Guern", "Rapha\u00ebl F\u00e9raud", "Fatma Salem", "Melissa Chiknoun", "Eymeric Giabicani", "Mehdi Feki", "Patrick Maill\u00e9", "Guy Camilleri", "Anne Blavette", "Hamid Benhamed"], "brief": "\u7814\u7a76\u6bd4\u8f83\u4e86\u4e24\u79cd\u72ec\u7acb\u591a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u65b9\u6cd5\uff08\u4e0a\u4e0b\u6587\u7ec4\u5408\u8d4c\u535a\u673a\u548c\u7b56\u7565\u68af\u5ea6\u7b97\u6cd5\uff09\u7528\u4e8e\u5927\u89c4\u6a21\u7535\u52a8\u6c7d\u8f66\u667a\u80fd\u5145\u7535\u8c03\u5ea6\uff0c\u5728\u771f\u5b9e\u5149\u4f0f\u53d1\u7535\u6570\u636e\u9a71\u52a8\u7684\u52a8\u6001\u7535\u4ef7\u73af\u5883\u4e0b\u8bc4\u4f30\u5176\u5728\u4e0d\u540c\u62e5\u585e\u6c34\u5e73\u548c\u5f02\u6784\u667a\u80fd\u4f53\u914d\u7f6e\u4e0b\u7684\u6027\u80fd\u8868\u73b0\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31347", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u591a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u7535\u52a8\u6c7d\u8f66", "\u80fd\u6e90\u7ba1\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31347v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Smart charging of large fleets of Electric Vehicles: Independent Multi-Agent Reinforcement Learning approaches", "tldr": "\u7814\u7a76\u6bd4\u8f83\u4e86\u4e24\u79cd\u72ec\u7acb\u591a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u65b9\u6cd5\uff08\u4e0a\u4e0b\u6587\u7ec4\u5408\u8d4c\u535a\u673a\u548c\u7b56\u7565\u68af\u5ea6\u7b97\u6cd5\uff09\u7528\u4e8e\u5927\u89c4\u6a21\u7535\u52a8\u6c7d\u8f66\u667a\u80fd\u5145\u7535\u8c03\u5ea6\uff0c\u5728\u771f\u5b9e\u5149\u4f0f\u53d1\u7535\u6570\u636e\u9a71\u52a8\u7684\u52a8\u6001\u7535\u4ef7\u73af\u5883\u4e0b\u8bc4\u4f30\u5176\u5728\u4e0d\u540c\u62e5\u585e\u6c34\u5e73\u548c\u5f02\u6784\u667a\u80fd\u4f53\u914d\u7f6e\u4e0b\u7684\u6027\u80fd\u8868\u73b0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models can write plausible CAD scripts, but reliable industrial CAD modeling requires more than syntactically valid code: every feature, placement, and assembly relation must be accepted by an exact geometric kernel while remaining editable as parametric boundary representation geometry. We present Embodied CAD, solver-grounded LLM agents for parametric B-Rep assembly modeling. Instead of generating a complete script in one pass, the agent iteratively selects actions from a stratified L0-L4 CAD skill library, resolves them into typed geometric operations, executes them in a CAD backend, and uses solver feedback to plan, repair, and learn. The framework combines action grammar constraints, deterministic parameter resolution, and solver-derived rewards for supervised warm-up and GRPO-style refinement. We evaluate Embodied CAD on multi-step mechanical, industrial equipment, and mold-oriented assembly tasks using solver-aligned metrics: executable rate, skill accuracy, operation-family accuracy, exact policy accuracy, and task completion success. The results show that solver-grounded planning executes all strong-planner workflows in the current benchmark, while learned controllers reach high executable rates and expose the remaining gap between valid tool calls and exact long-horizon policy prediction.", "arxiv_id": "2606.31252", "arxiv_url": "https://arxiv.org/abs/2606.31252", "authors": ["Fumin Liu", "Haoyu Zhou", "Fei Hao", "Lin Yang"], "brief": "\u63d0\u51faEmbodied CAD\u6846\u67b6\uff0c\u5c06LLM\u667a\u80fd\u4f53\u4e0eCAD\u51e0\u4f55\u6c42\u89e3\u5668\u6df1\u5ea6\u7ed3\u5408\uff0c\u901a\u8fc7\u5206\u5c42\u6280\u80fd\u5e93\u3001\u8fed\u4ee3\u6267\u884c\u548c\u6c42\u89e3\u5668\u53cd\u9988\u5b9e\u73b0\u53ef\u9760\u7684\u53c2\u6570\u5316B-Rep\u88c5\u914d\u5efa\u6a21\u3002\u5b9e\u9a8c\u8868\u660e\u6c42\u89e3\u5668\u5f15\u5bfc\u7684\u89c4\u5212\u80fd\u6267\u884c\u6240\u6709\u5f3a\u89c4\u5212\u5668\u5de5\u4f5c\u6d41\uff0c\u5b66\u4e60\u63a7\u5236\u5668\u4e5f\u8fbe\u5230\u8f83\u9ad8\u53ef\u6267\u884c\u7387\uff0c\u4f46\u5728\u957f\u65f6\u5e8f\u7cbe\u786e\u7b56\u7565\u9884\u6d4b\u4e0a\u4ecd\u5b58\u5728\u5dee\u8ddd\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31252", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "CAD\u5efa\u6a21", "\u5927\u8bed\u8a00\u6a21\u578b", "\u51e0\u4f55\u6c42\u89e3\u5668"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31252v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Embodied CAD: Solver-Grounded LLM Agents for Parametric B-Rep Assembly Modeling", "tldr": "\u63d0\u51faEmbodied CAD\u6846\u67b6\uff0c\u5c06LLM\u667a\u80fd\u4f53\u4e0eCAD\u51e0\u4f55\u6c42\u89e3\u5668\u6df1\u5ea6\u7ed3\u5408\uff0c\u901a\u8fc7\u5206\u5c42\u6280\u80fd\u5e93\u3001\u8fed\u4ee3\u6267\u884c\u548c\u6c42\u89e3\u5668\u53cd\u9988\u5b9e\u73b0\u53ef\u9760\u7684\u53c2\u6570\u5316B-Rep\u88c5\u914d\u5efa\u6a21\u3002\u5
