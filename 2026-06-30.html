u6807\u51c6\u63a8\u7406\u6b65\u9aa4\uff0c\u751a\u81f3\u53d1\u73b0\u6709\u6548\u66ff\u4ee3\u4e2d\u95f4\u6b65\u9aa4\uff0c\u8bc1\u660e\u9690\u7a7a\u95f4\u53ef\u89e3\u91ca\u4e14\u4e0eCoT\u5bf9\u9f50"], "keywords": ["\u94fe\u5f0f\u601d\u7ef4\u63a8\u7406", "\u5faa\u73afTransformer", "\u9690\u5f0f\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31779v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Bridging the Gap Between Latent and Explicit Reasoning with Looped Transformers", "tldr": "LOTUS\u7528\u5faa\u73afTransformer\u5b9e\u73b0\u9690\u5f0f\u63a8\u7406\uff0c\u9996\u6b21\u57283B\u89c4\u6a21\u8ffd\u5e73\u663e\u5f0fCoT\u6027\u80fd\u5e76\u964d\u4f4e2.5-6.9\u500d\u5ef6\u8fdf", "upvotes": 0, "what_it_is": "\u63d0\u51faLOTUS\uff08\u5faa\u73afTransformer\u5e76\u884c\u9690\u5f0f\u76d1\u7763\u65b9\u6cd5\uff09\uff0c\u901a\u8fc7\u5faa\u73af\u590d\u7528\u6743\u91cd\u5728\u9690\u72b6\u6001\u4e2d\u6267\u884c\u591a\u6b65\u63a8\u7406\uff0c\u5e76\u5bf9\u6bcf\u4e2a\u9690\u4f4d\u7f6e\u65bd\u52a0\u663e\u5f0fCoT\u6b65\u9aa4\u7684\u4ea4\u53c9\u71b5\u76d1\u7763\uff0c\u9996\u6b21\u57283B\u53c2\u6570\u89c4\u6a21\u4e0b\u4f7f\u9690\u5f0fCoT\u6027\u80fd\u8ffd\u5e73\u663e\u5f0f\u94fe\u5f0f\u601d\u7ef4\u63a8\u7406\u3002", "why_notable": "\u73b0\u6709\u9690\u5f0fCoT\u65b9\u6cd5\u5728\u8d85\u8fc71B\u53c2\u6570\u540e\u6027\u80fd\u6301\u7eed\u843d\u540e\u4e8e\u663e\u5f0fCoT\uff0cLOTUS\u662f\u9996\u4e2a\u57283B\u89c4\u6a21\u7a81\u7834\u8fd9\u4e00\u74f6\u9888\u7684\u65b9\u6cd5\uff0c\u540c\u65f6\u5927\u5e45\u964d\u4f4e\u63a8\u7406\u5ef6\u8fdf\uff0c\u4e14\u9690\u7a7a\u95f4\u5177\u5907\u53ef\u89e3\u91ca\u6027\uff0c\u5bf9\u9ad8\u6548LLM\u63a8\u7406\u7814\u7a76\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Open-vocabulary 3D scene graph methods typically operate in two stages: first reconstruct, then enrich with vision-language models, leaving the graph unqueryable during exploration. We argue that this sequential coupling is unnecessary and propose an asynchronous architecture in which lightweight online mapping runs concurrently with heavyweight semantic refinement. A probabilistic voxel-based backbone maintains stable object identities incrementally, while background VLM agents progressively enrich the graph. This framework resolves duplicate object tracks through semantic loop closure, attaches fine-grained visual attributes and derives spatial relations between objects. A multi-target frame scheduler amortizes VLM cost by selecting a small set of informative frames that jointly cover multiple targets. The resulting scene graph is queryable during exploration and grows in semantic richness over time. Our method matches or outperforms existing open-vocabulary 3D scene graph methods on semantic segmentation (ScanNet, Replica) and surpasses the prior state-of-the-art across three visual grounding benchmarks (Sr3D+, Nr3D, ScanRefer) by 15.3 to 18.8 A@0.25. Project page: https://denizbickici.github.io/thinkgraphs/", "arxiv_id": "2606.31471", "arxiv_url": "https://arxiv.org/abs/2606.31471", "authors": ["Deniz Bickici", "Michael Pabst", "Shohei Mori", "Dieter Schmalstieg"], "brief": "\u63d0\u51fa\u4e00\u79cd\u5f02\u6b65\u89c6\u89c9-\u8bed\u8a00\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u8f7b\u91cf\u7ea7\u5728\u7ebf\u5efa\u56fe\u4e0e\u91cd\u91cf\u7ea7\u8bed\u4e49\u7cbe\u5316\u89e3\u8026\u5e76\u53d1\u6267\u884c\uff0c\u4f7f\u5f00\u653e\u8bcd\u6c473D\u573a\u666f\u56fe\u5728\u63a2\u7d22\u671f\u95f4\u5373\u53ef\u67e5\u8be2\uff0c\u5e76\u968f\u65f6\u95f4\u6301\u7eed\u589e\u5f3a\u8bed\u4e49\u4e30\u5bcc\u5ea6\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31471", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6982\u7387\u4f53\u7d20\u9aa8\u5e72\u7f51\u7edc\u589e\u91cf\u7ef4\u62a4\u7a33\u5b9a\u7269\u4f53\u8eab\u4efd\uff0c\u540e\u53f0VLM\u667a\u80fd\u4f53\u5e76\u53d1\u8fdb\u884c\u8bed\u4e49\u7cbe\u5316\uff0c\u5f7b\u5e95\u89e3\u8026\u5efa\u56fe\u4e0e\u8bed\u4e49\u4e24\u9636\u6bb5", "\u591a\u76ee\u6807\u5e27\u8c03\u5ea6\u5668\u901a\u8fc7\u9009\u53d6\u5c11\u91cf\u4fe1\u606f\u5e27\u540c\u65f6\u8986\u76d6\u591a\u4e2a\u76ee\u6807\uff0c\u644a\u9500VLM\u63a8\u7406\u6210\u672c", "\u5728Sr3D+\u3001Nr3D\u3001ScanRefer\u4e09\u4e2a\u89c6\u89c9\u5b9a\u4f4d\u57fa\u51c6\u4e0a\u8d85\u8d8a\u5148\u524dSOTA 15.3~18.8 A@0.25\uff0c\u8bed\u4e49\u5206\u5272\u6027\u80fd\u6301\u5e73\u6216\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5"], "keywords": ["3D\u573a\u666f\u56fe", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5177\u8eab\u667a\u80fd", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31471v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Think While You Map: Asynchronous Vision-Language Agents for Incremental 3D Scene Graphs", "tldr": "\u5f02\u6b65\u67b6\u6784\u8ba93D\u573a\u666f\u56fe\u5728\u63a2\u7d22\u8fc7\u7a0b\u4e2d\u5b9e\u65f6\u53ef\u67e5\u8be2\uff0c\u540c\u65f6\u540e\u53f0VLM\u6301\u7eed\u4e30\u5bcc\u8bed\u4e49", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u5f02\u6b65\u89c6\u89c9-\u8bed\u8a00\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u8f7b\u91cf\u7ea7\u5728\u7ebf\u5efa\u56fe\u4e0e\u91cd\u91cf\u7ea7\u8bed\u4e49\u7cbe\u5316\u89e3\u8026\u5e76\u53d1\u6267\u884c\uff0c\u4f7f\u5f00\u653e\u8bcd\u6c473D\u573a\u666f\u56fe\u5728\u63a2\u7d22\u671f\u95f4\u5373\u53ef\u67e5\u8be2\uff0c\u5e76\u968f\u65f6\u95f4\u6301\u7eed\u589e\u5f3a\u8bed\u4e49\u4e30\u5bcc\u5ea6\u3002", "why_notable": "\u9996\u6b21\u5c063D\u573a\u666f\u56fe\u6784\u5efa\u4ece\"\u5148\u91cd\u5efa\u540e\u67e5\u8be2\"\u7684\u4e32\u884c\u8303\u5f0f\u6539\u4e3a\u5f02\u6b65\u5e76\u53d1\u67b6\u6784\uff0c\u5b9e\u73b0\u63a2\u7d22\u4e2d\u5b9e\u65f6\u53ef\u67e5\u8be2\uff0c\u540c\u65f6\u5927\u5e45\u5237\u65b0\u89c6\u89c9\u5b9a\u4f4d\u591a\u9879\u57fa\u51c6\uff0c\u5bf9\u673a\u5668\u4eba\u5bfc\u822a\u4e0e\u5177\u8eab\u667a\u80fd\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We introduce \\textbf{OVOW}, the first training-free system that reconstructs \\emph{instance-level, simulation-ready} 4D mesh scenes from a single monocular video. Recent 4D reconstruction achieves impressive rendering quality, but its outputs (\\eg, implicit fields, Gaussian primitives, or point clouds) lack the watertight topology, instance separation, and standardized physical interfaces required by physics simulators and embodied AI. OVOW closes this gap with a four-stage pipeline: a vision-language model discovers, labels, and motion-classifies all instances; category-aware reconstruction yields per-instance meshes for rigid objects and topology-consistent mesh sequences for deformable ones; an iterative render-match-optimize procedure recovers metric scale and 6-DoF pose trajectories; and physics-grounded assembly enforces ground contact and inter-object support. Crucially, we model all motion, rigid and non-rigid, through direct vertex deformation without category-specific priors or skeleton rigging, producing watertight mesh scenes ready for downstream physics simulation and editing. We further establish the first benchmark for \\emph{structured Video-to-4D} evaluation, with metrics for geometric correctness, instance separation, and physical plausibility beyond visual fidelity; the same pipeline doubles as a scalable engine for \\emph{synthesizing} paired video-to-4D simulation data for future 4D world models and embodied AI. Across two synthetic benchmarks (static and 4D), OVOW attains the best overall layout and geometry accuracy and the lowest photometric and semantic error among all baselines, and on monocular video runs one to two orders of magnitude faster than the baselines, while downstream physics simulation confirms its physical stability.", "arxiv_id": "2606.31388", "arxiv_url": "https://arxiv.org/abs/2606.31388", "authors": ["Junhao Chen", "Boran Zhang", "Mingjin Chen", "Henghaofan Zhang", "Saining Zhang", "Congcong Zhu", "Hao Zhao", "Ruqi Huang", "Zhihao Li", "Yufei Wang"], "brief": "\u63d0\u51faOVOW\u7cfb\u7edf\uff0c\u901a\u8fc7\u56db\u9636\u6bb5\u6d41\u6c34\u7ebf\u5c06\u5355\u76ee\u89c6\u9891\u8f6c\u5316\u4e3a\u7269\u7406\u4eff\u771f\u5c31\u7eea\u76844D\u7f51\u683c\u573a\u666f\uff0c\u5305\u542b\u5b9e\u4f8b\u5206\u79bb\u3001\u5ea6\u91cf\u5c3a\u5ea6\u6062\u590d\u548c\u7269\u7406\u7ea6\u675f\u88c5\u914d\uff0c\u65e0\u9700\u7c7b\u522b\u7279\u5b9a\u5148\u9a8c\u6216\u9aa8\u9abc\u7ed1\u5b9a\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31388", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u56db\u9636\u6bb5\u6d41\u6c34\u7ebf\uff1a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5b9e\u4f8b\u53d1\u73b0\u4e0e\u8fd0\u52a8\u5206\u7c7b\u2192\u7c7b\u522b\u611f\u77e5\u7f51\u683c\u91cd\u5efa\u2192\u8fed\u4ee3\u6e32\u67d3\u5339\u914d\u4f18\u5316\u6062\u590d\u5ea6\u91cf\u5c3a\u5ea6\u4e0e6-DoF\u8f68\u8ff9\u2192\u7269\u7406\u7ea6\u675f\u573a\u666f\u88c5\u914d", "\u7edf\u4e00\u7528\u9876\u70b9\u5f62\u53d8\u5efa\u6a21\u521a\u6027\u4e0e\u975e\u521a\u6027\u8fd0\u52a8\uff0c\u8f93\u51fa\u6c34\u5bc6\u7f51\u683c\uff0c\u65e0\u9700\u9aa8\u9abc\u7ed1\u5b9a\u6216\u7c7b\u522b\u5148\u9a8c", "\u5efa\u7acb\u9996\u4e2a\u7ed3\u6784\u5316Video-to-4D\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901f\u5ea6\u6bd4\u57fa\u7ebf\u5feb1-2\u4e2a\u6570\u91cf\u7ea7\uff0c\u51e0\u4f55\u7cbe\u5ea6\u548c\u5149\u5ea6\u8bed\u4e49\u8bef\u5dee\u5747\u4f18\u4e8e\u6240\u6709\u57fa\u7ebf"], "keywords": ["\u4e09\u7ef4\u91cd\u5efa", "\u5177\u8eab\u667a\u80fd", "\u4e16\u754c\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31388v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "One Video, One World: Turning Monocular Video into Physical 4D Scenes", "tldr": "OVOW\uff1a\u9996\u4e2a\u65e0\u9700\u8bad\u7ec3\u3001\u4ece\u5355\u76ee\u89c6\u9891\u91cd\u5efa\u5b9e\u4f8b\u7ea7\u53ef\u4eff\u771f4D\u7f51\u683c\u573a\u666f\u7684\u7cfb\u7edf", "upvotes": 0, "what_it_is": "\u63d0\u51faOVOW\u7cfb\u7edf\uff0c\u901a\u8fc7\u56db\u9636\u6bb5\u6d41\u6c34\u7ebf\u5c06\u5355\u76ee\u89c6\u9891\u8f6c\u5316\u4e3a\u7269\u7406\u4eff\u771f\u5c31\u7eea\u76844D\u7f51\u683c\u573a\u666f\uff0c\u5305\u542b\u5b9e\u4f8b\u5206\u79bb\u3001\u5ea6\u91cf\u5c3a\u5ea6\u6062\u590d\u548c\u7269\u7406\u7ea6\u675f\u88c5\u914d\uff0c\u65e0\u9700\u7c7b\u522b\u7279\u5b9a\u5148\u9a8c\u6216\u9aa8\u9abc\u7ed1\u5b9a\u3002", "why_notable": "\u9996\u6b21\u6253\u901a\u5355\u76ee\u89c6\u9891\u5230\u7269\u7406\u4eff\u771f\u5c31\u7eea4D\u573a\u666f\u7684\u5b8c\u6574\u94fe\u8def\uff0c\u586b\u8865\u4e86\u9690\u5f0f\u573a/\u9ad8\u65af\u539f\u8bed\u7b49\u8868\u793a\u4e0e\u7269\u7406\u5f15\u64ce\u63a5\u53e3\u4e4b\u95f4\u7684\u9e3f\u6c9f\uff0c\u540c\u65f6\u53ef\u4f5c\u4e3a\u5177\u8eabAI\u548c4D\u4e16\u754c\u6a21\u578b\u7684\u6570\u636e\u5408\u6210\u5f15\u64ce\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The standard way to read latent knowledge out of a model, a linear probe confirmed by a steering recovery, can systematically overstate what a vision-language model (VLM) actually grounds in the image. We show this on spatial reasoning, where the error is invisible to both probing and steering yet exposed by a one-line causal control: replacing the image with a gray blank. Probes decode the within-axis answer at 73--97% across axes, and a training-free projection lifts a near-chance axis from 59% to 79%, exactly the signature of unlocking latent knowledge. The blank-image arbiter refutes it, revealing three grounding regimes that probing conflates: an axis can be grounded (vision-dependent, correct), a prior (vision-independent, with its decode and its apparent recovery a directional default rather than perception), or, surprisingly, inverted: decodable, causally controllable, but deployed with the wrong sign, so the model scores below chance and the error requires looking. The taxonomy holds across the studied VLMs: in fourteen models spanning six language-model families and 2B--27B, horizontal is grounded, vertical is a prior, and depth is inverted, with the inversion emerging at scale within families. The decode-versus-deploy inversion replicates on seven of eight models across five families, and the minimal edit that re-deploys it varies with geometry: a training-free rotation matches a trained edit on the cleanest model, while distributed inversions need a trained low-rank edit, tracing a per-model correction-complexity spectrum. The cheap, self-calibrating arbiter cleanly separates grounded perception, inverted perception, and prior substitution; we argue it should be a default control for latent-knowledge and steering claims in VLMs.", "arxiv_id": "2606.31257", "arxiv_url": "https://arxiv.org/abs/2606.31257", "authors": ["Chih-Ting Liao", "Fei Shen", "Xin Cao", "Tat-Seng Chua"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\"\u7070\u767d\u56fe\u50cf\u4ef2\u88c1\u5668\"\u63a7\u5236\u5b9e\u9a8c\uff0c\u901a\u8fc7\u5c06\u8f93\u5165\u56fe\u50cf\u66ff\u6362\u4e3a\u7a7a\u767d\u7070\u56fe\uff0c\u63ed\u793a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u5728\u7a7a\u95f4\u63a8\u7406\u4e2d\u7ebf\u6027\u63a2\u9488\u548c\u5f15\u5bfc\u6062\u590d\u65b9\u6cd5\u7cfb\u7edf\u6027\u9ad8\u4f30\u89c6\u89c9\u57fa\u7840\u7684\u95ee\u9898\uff0c\u5e76\u5c06\u7a7a\u95f4\u8f74\u5206\u7c7b\u4e3a\u4e09\u79cd\u63a5\u5730\u673a\u5236\uff1a\u771f\u5b9e\u89c6\u89c9\u611f\u77e5\u3001\u5148\u9a8c\u66ff\u4ee3\u548c\u53cd\u8f6c\u611f\u77e5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31257", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u7ebf\u6027\u63a2\u9488\u5728\u5404\u7a7a\u95f4\u8f74\u4e0a\u89e3\u7801\u51c6\u786e\u7387\u8fbe73\u201397%\uff0c\u4f46\u7070\u767d\u56fe\u50cf\u4ef2\u88c1\u5668\u8bc1\u660e\u5176\u4e2d\u5927\u91cf\u5e76\u975e\u771f\u6b63\u57fa\u4e8e\u89c6\u89c9", "\u53d1\u73b0\u4e09\u79cd\u63a5\u5730\u673a\u5236\uff1a\u6c34\u5e73\u8f74\u4e3a\u771f\u5b9e\u89c6\u89c9\u611f\u77e5\u3001\u5782\u76f4\u8f74\u4e3a\u5148\u9a8c\u66ff\u4ee3\u3001\u6df1\u5ea6\u8f74\u4e3a\u53cd\u8f6c\u611f\u77e5\uff08\u53ef\u89e3\u7801\u4f46\u7b26\u53f7\u9519\u8bef\uff0c\u5bfc\u81f4\u4f4e\u4e8e\u968f\u673a\u6c34\u5e73\uff09", "\u572814\u4e2aVLM\uff086\u4e2a\u8bed\u8a00\u6a21\u578b\u5bb6\u65cf\uff0c2B\u201327B\u53c2\u6570\uff09\u4e2d\u9a8c\u8bc1\uff0c\u6df1\u5ea6\u53cd\u8f6c\u73b0\u8c61\u968f\u6a21\u578b\u89c4\u6a21\u5728\u5bb6\u65cf\u5185\u6d8c\u73b0\uff0c\u4fee\u6b63\u65b9\u5f0f\u56e0\u51e0\u4f55\u7ed3\u6784\u4e0d\u540c\u800c\u5f02\uff08\u65e0\u8bad\u7ec3\u65cb\u8f6c\u6216\u4f4e\u79e9\u5fae\u8c03\uff09"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u7a7a\u95f4\u63a8\u7406", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31257v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Decodable Is Not Grounded: A Vision-Ablation Arbiter for VLM Spatial Reasoning", "tldr": "\u89c6\u89c9\u6d88\u878d\u4ef2\u88c1\u5668\u63ed\u793aVLM\u7a7a\u95f4\u63a8\u7406\u4e2d\"\u53ef\u89e3\u7801\"\u4e0d\u7b49\u4e8e\"\u6709\u89c6\u89c9\u57fa\u7840\"\u7684\u7cfb\u7edf\u6027\u9519\u8bef", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\"\u7070\u767d\u56fe\u50cf\u4ef2\u88c1\u5668\"\u63a7\u5236\u5b9e\u9a8c\uff0c\u901a\u8fc7\u5c06\u8f93\u5165\u56fe\u50cf\u66ff\u6362\u4e3a\u7a7a\u767d\u7070\u56fe\uff0c\u63ed\u793a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u5728\u7a7a\u95f4\u63a8\u7406\u4e2d\u7ebf\u6027\u63a2\u9488\u548c\u5f15\u5bfc\u6062\u590d\u65b9\u6cd5\u7cfb\u7edf\u6027\u9ad8\u4f30\u89c6\u89c9\u57fa\u7840\u7684\u95ee\u9898\uff0c\u5e76\u5c06\u7a7a\u95f4\u8f74\u5206\u7c7b\u4e3a\u4e09\u79cd\u63a5\u5730\u673a\u5236\uff1a\u771f\u5b9e\u89c6\u89c9\u611f\u77e5\u3001\u5148\u9a8c\u66ff\u4ee3\u548c\u53cd\u8f6c\u611f\u77e5\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u533a\u5206VLM\u4e2d\"\u6f5c\u5728\u77e5\u8bc6\u53ef\u89e3\u7801\"\u4e0e\"\u5b9e\u9645\u89c6\u89c9\u63a5\u5730\"\u7684\u672c\u8d28\u5dee\u5f02\uff0c\u63d0\u51fa\u6781\u4f4e\u6210\u672c\u7684\u81ea\u6821\u51c6\u63a7\u5236\u65b9\u6cd5\uff0c\u5bf9\u6f5c\u5728\u77e5\u8bc6\u63a2\u6d4b\u548c\u5f15\u5bfc\u58f0\u660e\u7684\u53ef\u9760\u6027\u8bc4\u4f30\u5177\u6709\u91cd\u8981\u65b9\u6cd5\u8bba\u610f\u4e49"}, {"abstract": "Generating realistic, controllable, and temporally coherent urban environments is a critical yet unresolved challenge in the autonomous driving community. In this paper, we introduce InfiniVerse, a unified pipeline for long-range, 2D-3D-aligned, and controllable synthesis of dynamic urban scenes from a single frame. In practice, our approach first reconstructs a 3D occupancy representation from the input multi-view frame. This representation serves as a foundation for autoregressive scene extension along arbitrary trajectories. Subsequently, a video diffusion model translates the coarse occupancy grid into realistic, spatiotemporally consistent video sequences. Moreover, we propose a hierarchical sketch-and-refine paradigm, in which the generated videos are re-projected as image-conditioned feedback to enhance the 3D occupancy representation, establishing cross-modal alignment and mutual enhancement between the visual and spatial domains. Extensive evaluations on the Waymo Open Dataset and nuScenes demonstrate that InfiniVerse achieves state-of-the-art performance, with a FID of 6.4 and FVD of 67.97, significantly outperforming existing benchmarks in both duration and stability.", "arxiv_id": "2606.31109", "arxiv_url": "https://arxiv.org/abs/2606.31109", "authors": ["Xiaoyu Ye", "Leheng Li", "Xinyu Ji", "Yingjie Cai", "Hongda He", "Xu Yan", "Guanyi Zhao", "Ying-Cong Chen", "Bingbing Liu", "Shuguang Cui", "Zhen Li"], "brief": "\u63d0\u51faInfiniVerse\u7edf\u4e00\u6d41\u6c34\u7ebf\uff0c\u4ee5\u5355\u5e27\u591a\u89c6\u89d2\u8f93\u5165\u4e3a\u8d77\u70b9\uff0c\u901a\u8fc73D\u5360\u7528\u8868\u793a+\u81ea\u56de\u5f52\u573a\u666f\u6269\u5c55+\u89c6\u9891\u6269\u6563\u6a21\u578b\uff0c\u751f\u6210\u4efb\u610f\u8f68\u8ff9\u4e0b\u957f\u7a0b\u30012D-3D\u5bf9\u9f50\u7684\u52a8\u6001\u57ce\u5e02\u89c6\u9891\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31109", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u4ece\u8f93\u5165\u591a\u89c6\u89d2\u5e27\u91cd\u5efa3D\u5360\u7528\u8868\u793a\uff0c\u4f5c\u4e3a\u6cbf\u4efb\u610f\u8f68\u8ff9\u81ea\u56de\u5f52\u6269\u5c55\u573a\u666f\u7684\u57fa\u7840", "\u63d0\u51fa\u5c42\u6b21\u5316\"\u8349\u56fe-\u7cbe\u5316\"\u8303\u5f0f\uff1a\u751f\u6210\u89c6\u9891\u53cd\u6295\u5f71\u4e3a\u56fe\u50cf\u6761\u4ef6\u53cd\u9988\uff0c\u589e\u5f3a3D\u5360\u7528\u8868\u793a\uff0c\u5b9e\u73b0\u89c6\u89c9\u4e0e\u7a7a\u95f4\u57df\u7684\u8de8\u6a21\u6001\u4e92\u589e\u5f3a", "\u5728Waymo\u548cnuScenes\u4e0a\u8fbe\u5230SOTA\uff0cFID=6.4\u3001FVD=67.97\uff0c\u5728\u751f\u6210\u65f6\u957f\u4e0e\u7a33\u5b9a\u6027\u4e0a\u663e\u8457\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u573a\u666f\u751f\u6210", "\u6269\u6563\u6a21\u578b", "3D\u5360\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31109v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "InfiniVerse: Occupancy Guided Unbounded Scene Generation for Autonomous Driving", "tldr": "InfiniVerse\uff1a\u4ece\u5355\u5e27\u51fa\u53d1\u751f\u6210\u65e0\u9650\u957f\u3001\u53ef\u63a7\u3001\u65f6\u7a7a\u4e00\u81f4\u7684\u52a8\u6001\u57ce\u5e02\u9a7e\u9a76\u573a\u666f", "upvotes": 0, "what_it_is": "\u63d0\u51faInfiniVerse\u7edf\u4e00\u6d41\u6c34\u7ebf\uff0c\u4ee5\u5355\u5e27\u591a\u89c6\u89d2\u8f93\u5165\u4e3a\u8d77\u70b9\uff0c\u901a\u8fc73D\u5360\u7528\u8868\u793a+\u81ea\u56de\u5f52\u573a\u666f\u6269\u5c55+\u89c6\u9891\u6269\u6563\u6a21\u578b\uff0c\u751f\u6210\u4efb\u610f\u8f68\u8ff9\u4e0b\u957f\u7a0b\u30012D-3D\u5bf9\u9f50\u7684\u52a8\u6001\u57ce\u5e02\u89c6\u9891\u3002", "why_notable": "\u9996\u6b21\u5c063D\u5360\u7528\u5f15\u5bfc\u4e0e\u89c6\u9891\u6269\u6563\u6a21\u578b\u7ed3\u5408\uff0c\u5b9e\u73b0\u65e0\u754c\u57ce\u5e02\u573a\u666f\u7684\u957f\u7a0b\u53ef\u63a7\u751f\u6210\uff0c\u5bf9\u81ea\u52a8\u9a7e\u9a76\u6570\u636e\u589e\u5f3a\u4e0e\u4eff\u771f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u91cf\u5316\u6307\u6807\u5927\u5e45\u9886\u5148\u3002"}, {"abstract": "Recent multimodal large language models (MLLMs) have strong potential as embodied agents, but their ability to collaborate in visually grounded environments remains underexplored. To address this gap, we introduce MECoBench, a multimodal embodied cooperation benchmark with an evaluation platform spanning diverse real-world tasks, two cooperation structures, and three collaboration modes. Through extensive experiments across various MLLMs, we summarize three key findings: (i) Collaboration generally improves embodied task completion, but its benefits depend on balancing collaborative gains against coordination complexity. (ii) Communication is essential to collaboration gains, while the best collaboration mode depends on team size and model capability. (iii) Moreover, collaboration improves robustness under noisy priors and exploration conditions. Generally, MECoBench provides a systematic testbed for understanding the mechanisms and limits of multimodal embodied collaboration. Code and dataset are available at https://github.com/q-i-n-g/MECoBench.", "arxiv_id": "2606.31966", "arxiv_url": "https://arxiv.org/abs/2606.31966", "authors": ["Qingyun Liu", "Jiwen Zhang", "Jingyi Hu", "Siyuan Wang", "Zhongyu Wei"], "brief": "\u63d0\u51faMECoBench\u57fa\u51c6\uff0c\u6db5\u76d6\u591a\u6837\u771f\u5b9e\u4efb\u52a1\u3001\u4e24\u79cd\u534f\u4f5c\u7ed3\u6784\u548c\u4e09\u79cd\u534f\u4f5c\u6a21\u5f0f\uff0c\u7cfb\u7edf\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u89c6\u89c9\u5177\u8eab\u73af\u5883\u4e2d\u7684\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u80fd\u529b\u3002", "categories": ["cs.MA", "cs.AI", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31966", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u534f\u4f5c\u603b\u4f53\u63d0\u5347\u5177\u8eab\u4efb\u52a1\u5b8c\u6210\u7387\uff0c\u4f46\u6536\u76ca\u53d6\u51b3\u4e8e\u534f\u4f5c\u589e\u76ca\u4e0e\u534f\u8c03\u590d\u6742\u5ea6\u7684\u5e73\u8861", "\u901a\u4fe1\u662f\u534f\u4f5c\u589e\u76ca\u7684\u5173\u952e\uff0c\u6700\u4f18\u534f\u4f5c\u6a21\u5f0f\u56e0\u56e2\u961f\u89c4\u6a21\u548c\u6a21\u578b\u80fd\u529b\u800c\u5f02", "\u534f\u4f5c\u5728\u566a\u58f0\u5148\u9a8c\u548c\u63a2\u7d22\u6761\u4ef6\u4e0b\u663e\u8457\u63d0\u5347\u7cfb\u7edf\u9c81\u68d2\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u5177\u8eab\u667a\u80fd", "\u591a\u6a21\u6001", "\u591a\u667a\u80fd\u4f53\u534f\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31966v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MECoBench: A Systematic Study of Multimodal Agent Collaboration in Embodied Environments", "tldr": "MECoBench\uff1a\u9996\u4e2a\u7cfb\u7edf\u8bc4\u4f30\u591a\u6a21\u6001\u667a\u80fd\u4f53\u5728\u5177\u8eab\u73af\u5883\u4e2d\u534f\u4f5c\u80fd\u529b\u7684\u57fa\u51c6\u6d4b\u8bd5\u5e73\u53f0", "upvotes": 0, "what_it_is": "\u63d0\u51faMECoBench\u57fa\u51c6\uff0c\u6db5\u76d6\u591a\u6837\u771f\u5b9e\u4efb\u52a1\u3001\u4e24\u79cd\u534f\u4f5c\u7ed3\u6784\u548c\u4e09\u79cd\u534f\u4f5c\u6a21\u5f0f\uff0c\u7cfb\u7edf\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u89c6\u89c9\u5177\u8eab\u73af\u5883\u4e2d\u7684\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u80fd\u529b\u3002", "why_notable": "\u586b\u8865\u4e86\u591a\u6a21\u6001LLM\u5728\u89c6\u89c9\u5177\u8eab\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u8bc4\u4f30\u9886\u57df\u7684\u7a7a\u767d\uff0c\u63d0\u4f9b\u7cfb\u7edf\u5316\u6d4b\u8bd5\u5e73\u53f0\uff0c\u6709\u52a9\u4e8e\u7406\u89e3\u5177\u8eab\u534f\u4f5c\u7684\u673a\u5236\u4e0e\u8fb9\u754c\uff0c\u4ee3\u7801\u548c\u6570\u636e\u96c6\u5df2\u5f00\u6e90\u3002"}, {"abstract": "Emergent misalignment (EM) is a recently discovered phenomenon in LLMs where fine-tuning on a narrow misaligned task, such as writing insecure code, leads to broadly misaligned behaviour on unrelated prompts. Previous work has noted that the severity of EM is highly sensitive to training choices; however, we still lack a systematic characterisation of this sensitivity. We perform a sweep over several Qwen3 models, optimisers, datasets, and batch sizes, and find that the choice of optimiser has the largest effect, producing a 7x spread in misalignment rate. Surprisingly, model size has a negligible effect within the Qwen3 family. An additional sweep over 12 models from three families using Adam confirms that model scale (1B-235B) and family have negligible effects for that optimiser. Analysing the loss-alignment relationship on Qwen3-8B, we find that final log training loss is a strong predictor of alignment, and that stratifying by optimiser captures nearly all the residual variance. Training dynamics reveal that each optimiser follows a different trajectory through loss-alignment space, and that after significant training, the optimiser becomes more important than training loss as a predictor of alignment. Muon, the adaptive optimiser that preserves alignment the best, implicitly regularises for a more uniform distribution of singular values of the LoRA adapter. We evaluate this insight by training with an additional loss term that incentivises a flatter singular value spectrum, and find that this substantially recovers alignment for the more EM-prone adaptive optimisers (Adam and Lion), with negligible cost to training loss. These results identify optimiser choice as a key factor in EM severity, but show that spectral regularisation can substantially mitigate the effects of EM-prone optimisers.", "arxiv_id": "2606.31591", "arxiv_url": "https://arxiv.org/abs/2606.31591", "authors": ["Jason R. Brown", "Patrick Leask", "Lev McKinney"], "brief": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86\u4f18\u5316\u5668\u9009\u62e9\u5bf9\u5927\u8bed\u8a00\u6a21\u578b\"\u6d8c\u73b0\u6027\u9519\u4f4d\"\uff08EM\uff09\u73b0\u8c61\u7684\u5f71\u54cd\uff0c\u53d1\u73b0\u4f18\u5316\u5668\u7c7b\u578b\u5bfc\u81f4\u9519\u4f4d\u7387\u9ad8\u8fbe7\u500d\u7684\u5dee\u5f02\uff0c\u5e76\u63d0\u51fa\u901a\u8fc7\u5947\u5f02\u503c\u8c31\u6b63\u5219\u5316\u6765\u6291\u5236\u9519\u4f4d\u884c\u4e3a\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31591", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4f18\u5316\u5668\u9009\u62e9\u662f\u5f71\u54cdEM\u4e25\u91cd\u7a0b\u5ea6\u7684\u6700\u5927\u56e0\u7d20\uff0c\u4ea7\u751f7\u500d\u9519\u4f4d\u7387\u5dee\u5f02\uff1b\u6a21\u578b\u89c4\u6a21\uff081B-235B\uff09\u548c\u6a21\u578b\u5bb6\u65cf\u5bf9EM\u5f71\u54cd\u53ef\u5ffd\u7565\u4e0d\u8ba1", "Muon\u4f18\u5316\u5668\u901a\u8fc7\u9690\u5f0f\u6b63\u5219\u5316LoRA\u9002\u914d\u5668\u5947\u5f02\u503c\u5206\u5e03\u4f7f\u5176\u66f4\u5747\u5300\uff0c\u4ece\u800c\u6700\u597d\u5730\u4fdd\u6301\u5bf9\u9f50\u6027", "\u5728\u635f\u5931\u51fd\u6570\u4e2d\u52a0\u5165\u9f13\u52b1\u66f4\u5e73\u5766\u5947\u5f02\u503c\u8c31\u7684\u6b63\u5219\u9879\uff0c\u53ef\u663e\u8457\u6062\u590dAdam\u548cLion\u7b49\u6613\u9519\u4f4d\u4f18\u5316\u5668\u7684\u5bf9\u9f50\u6027\uff0c\u4e14\u8bad\u7ec3\u635f\u5931\u4ee3\u4ef7\u6781\u5c0f"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u5bf9\u9f50", "\u6d8c\u73b0\u6027\u9519\u4f4d", "\u4f18\u5316\u5668"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31591v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Evil Spectra: How Optimisers can Amplify or Suppress Emergent Misalignment", "tldr": "\u4f18\u5316\u5668\u9009\u62e9\u662fLLM\u6d8c\u73b0\u6027\u9519\u4f4d\u4e25\u91cd\u7a0b\u5ea6\u7684\u5173\u952e\u56e0\u7d20\uff0c\u8c31\u6b63\u5219\u5316\u53ef\u6709\u6548\u7f13\u89e3\u9519\u4f4d\u98ce\u9669", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86\u4f18\u5316\u5668\u9009\u62e9\u5bf9\u5927\u8bed\u8a00\u6a21\u578b\"\u6d8c\u73b0\u6027\u9519\u4f4d\"\uff08EM\uff09\u73b0\u8c61\u7684\u5f71\u54cd\uff0c\u53d1\u73b0\u4f18\u5316\u5668\u7c7b\u578b\u5bfc\u81f4\u9519\u4f4d\u7387\u9ad8\u8fbe7\u500d\u7684\u5dee\u5f02\uff0c\u5e76\u63d0\u51fa\u901a\u8fc7\u5947\u5f02\u503c\u8c31\u6b63\u5219\u5316\u6765\u6291\u5236\u9519\u4f4d\u884c\u4e3a\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u4f18\u5316\u5668\u662fEM\u7684\u5173\u952e\u63a7\u5236\u53d8\u91cf\uff0c\u5e76\u63d0\u4f9b\u4e86\u4e00\u79cd\u5b9e\u7528\u7684\u8c31\u6b63\u5219\u5316\u7f13\u89e3\u65b9\u6848\uff0c\u5bf9LLM\u5b89\u5168\u5fae\u8c03\u5b9e\u8df5\u5177\u6709\u76f4\u63a5\u6307\u5bfc\u610f\u4e49"}, {"abstract": "Reinforcement learning (RL) has become a powerful tool for propelling Large Language Models (LLMs) beyond imitation-based training towards more robust reasoning capabilities. Among existing approaches, RL with Verifiable Rewards (RLVR) has emerged as a pivotal paradigm for advancing LLM reasoning. Despite its empirical success, recent studies have offered different insights. One line of inquiry advocates prioritizing high-entropy token positions during training, while another perspective cautions against allowing low-probability tokens to dominate gradient updates. Notably, although high-entropy tokens are usually correlated with low probability, both paradigms empirically yield substantial performance gains. In this work, we argue that evaluating sampled-token probability or entropy in isolation is insufficient to capture the policy optimization dynamics. To resolve this tension, we introduce the Relative Surprisal Index (RSI), a principled, information-theoretic metric that naturally couples the token\u0027s entropy with the probability of the selected token. We show that, under mild conditions, RSI is related to the local ratio between the first-order variations of the logit-gradient norm and predictive entropy under a selected-logit perturbation. Building on RSI, we propose RSI Selection (RSI-S), an entropy-adaptive token filtering method that retains tokens within a stable RSI interval. RSI-S successfully reconciles previous contradictory paradigms and filters out both redundant low-surprisal tokens and unstable high-surprisal tail tokens. Empirical evaluations show that RSI-S achieves higher avg@32 accuracy across different model scales (Qwen2.5-1.5B, 3B, and 7B) on AIME and AMC benchmarks: RSI-S improves avg@32 accuracy by 2--3 percentage points over GRPO. Overall, RSI offers a promising perspective for RLVR improvement.", "arxiv_id": "2606.31575", "arxiv_url": "https://arxiv.org/abs/2606.31575", "authors": ["Outongyi Lv", "Yanzhao Zheng", "Yuanwei Zhang", "Zhenghao Huang", "Xingjun Wang", "Baohua Dong", "Hangcheng Zhu", "Yingda Chen"], "brief": "\u672c\u6587\u63d0\u51fa\u76f8\u5bf9\u60ca\u5f02\u6307\u6570\uff08RSI\uff09\uff0c\u4e00\u79cd\u5c06token\u71b5\u4e0e\u91c7\u6837\u6982\u7387\u8054\u5408\u5efa\u6a21\u7684\u4fe1\u606f\u8bba\u5ea6\u91cf\uff0c\u5e76\u57fa\u4e8e\u6b64\u8bbe\u8ba1RSI-S\u81ea\u9002\u5e94token\u8fc7\u6ee4\u65b9\u6cd5\uff0c\u7528\u4e8e\u6539\u8fdbRLVR\uff08\u53ef\u9a8c\u8bc1\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\uff09\u8bad\u7ec3\u4e2d\u7684\u68af\u5ea6\u66f4\u65b0\u7b56\u7565\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31575", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["RSI\u5c06token\u7684\u9884\u6d4b\u71b5\u4e0e\u6240\u9009token\u6982\u7387\u8026\u5408\uff0c\u4ece\u4fe1\u606f\u8bba\u89d2\u5ea6\u7edf\u4e00\u4e86\u6b64\u524d\u0027\u9ad8\u71b5\u4f18\u5148\u0027\u4e0e\u0027\u4f4e\u6982\u7387token\u4e3b\u5bfc\u68af\u5ea6\u6709\u5bb3\u0027\u4e24\u79cd\u77db\u76fe\u89c2\u70b9", "RSI-S\u65b9\u6cd5\u4fdd\u7559\u7a33\u5b9aRSI\u533a\u95f4\u5185\u7684token\uff0c\u540c\u65f6\u8fc7\u6ee4\u5197\u4f59\u4f4e\u60ca\u5f02token\u548c\u4e0d\u7a33\u5b9a\u9ad8\u60ca\u5f02\u5c3e\u90e8token", "\u5728AIME\u548cAMC\u57fa\u51c6\u4e0a\uff0cRSI-S\u76f8\u6bd4GRPO\u5728Qwen2.5-1.5B/3B/7B\u4e09\u4e2a\u89c4\u6a21\u4e0aavg@32\u51c6\u786e\u7387\u63d0\u53472-3\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u80fd\u529b", "token\u9009\u62e9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31575v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Which Tokens Matter? Adaptive Token Selection for RLVR with the Relative Surprisal Index", "tldr": "\u63d0\u51fa\u76f8\u5bf9\u60ca\u5f02\u6307\u6570(RSI)\uff0c\u81ea\u9002\u5e94\u7b5b\u9009RLVR\u8bad\u7ec3\u4e2d\u7684\u5173\u952etoken\uff0c\u63d0\u5347LLM\u63a8\u7406\u6027\u80fd", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u76f8\u5bf9\u60ca\u5f02\u6307\u6570\uff08RSI\uff09\uff0c\u4e00\u79cd\u5c06token\u71b5\u4e0e\u91c7\u6837\u6982\u7387\u8054\u5408\u5efa\u6a21\u7684\u4fe1\u606f\u8bba\u5ea6\u91cf\uff0c\u5e76\u57fa\u4e8e\u6b64\u8bbe\u8ba1RSI-S\u81ea\u9002\u5e94token\u8fc7\u6ee4\u65b9\u6cd5\uff0c\u7528\u4e8e\u6539\u8fdbRLVR\uff08\u53ef\u9a8c\u8bc1\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\uff09\u8bad\u7ec3\u4e2d\u7684\u68af\u5ea6\u66f4\u65b0\u7b56\u7565\u3002", "why_notable": "\u9996\u6b21\u4ece\u4fe1\u606f\u8bba\u89d2\u5ea6\u7edf\u4e00\u4e86RLVR\u4e2dtoken\u9009\u62e9\u7684\u4e24\u79cd\u5bf9\u7acb\u8303\u5f0f\uff0c\u63d0\u4f9b\u4e86\u7406\u8bba\u53ef\u89e3\u91ca\u7684token\u8fc7\u6ee4\u51c6\u5219\uff0c\u4e14\u5728\u591a\u4e2a\u6a21\u578b\u89c4\u6a21\u4e0a\u5747\u6709\u7a33\u5b9a\u63d0\u5347\uff0c\u5bf9RLVR\u8bad\u7ec3\u4f18\u5316\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Long-horizon language agents do not only choose actions; they carry a private model of the world from one decision to the next. When that model drifts, a later failure can be decided before the failing action is ever taken. We study a direct repair mechanism: before committing to the next task action, an agent may ask the environment about one belief field and write the answer back into its world model. This makes environment interaction a scarce calibration resource, not merely a way to advance the task. We introduce \\method, a budgeted probing operator for structured belief tables. The useful probes are not the same everywhere. Procedural beliefs, such as tool dependencies, can often be repaired by targeted checks, but those checks spend steps that the task may need. Spatial beliefs, such as object locations and graph edges, rely more on structural cues; the agent\u0027s own confidence can be a poor guide when the world changes off-screen. A type-stratified analysis formalizes this probe-action frontier, and controlled experiments show that mid-planning environment evidence reduces terminal world-model error when the probe policy follows the structure of the task.", "arxiv_id": "2606.31422", "arxiv_url": "https://arxiv.org/abs/2606.31422", "authors": ["Xinyuan Song", "Zekun Cai"], "brief": "\u63d0\u51faBEP\uff08\u9884\u7b97\u5316\u63a2\u6d4b\u7b97\u5b50\uff09\uff0c\u5141\u8bb8\u957f\u7a0b\u8bed\u8a00\u667a\u80fd\u4f53\u5728\u6267\u884c\u4efb\u52a1\u52a8\u4f5c\u524d\uff0c\u7528\u6709\u9650\u6b21\u6570\u5411\u73af\u5883\u67e5\u8be2\u7279\u5b9a\u4fe1\u5ff5\u5b57\u6bb5\uff0c\u5e76\u5c06\u7b54\u6848\u5199\u56de\u4e16\u754c\u6a21\u578b\uff0c\u4ece\u800c\u5728\u89c4\u5212\u4e2d\u9014\u4fee\u6b63\u6a21\u578b\u6f02\u79fb\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31422", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5c06\u73af\u5883\u4ea4\u4e92\u89c6\u4e3a\u7a00\u7f3a\u7684\u6821\u51c6\u8d44\u6e90\uff0c\u800c\u975e\u4ec5\u63a8\u8fdb\u4efb\u52a1\u7684\u624b\u6bb5\uff0c\u5f15\u5165\u63a2\u6d4b-\u884c\u52a8\u6743\u8861\u8fb9\u754c\u5206\u6790", "\u533a\u5206\u7a0b\u5e8f\u6027\u4fe1\u5ff5\uff08\u5de5\u5177\u4f9d\u8d56\u7b49\uff09\u4e0e\u7a7a\u95f4\u6027\u4fe1\u5ff5\uff08\u7269\u4f53\u4f4d\u7f6e\u3001\u56fe\u8fb9\u7b49\uff09\uff0c\u4e24\u7c7b\u4fe1\u5ff5\u5bf9\u63a2\u6d4b\u7b56\u7565\u7684\u54cd\u5e94\u4e0d\u540c", "\u53d7\u63a7\u5b9e\u9a8c\u8868\u660e\uff0c\u5f53\u63a2\u6d4b\u7b56\u7565\u4e0e\u4efb\u52a1\u7ed3\u6784\u5339\u914d\u65f6\uff0c\u89c4\u5212\u4e2d\u9014\u7684\u73af\u5883\u8bc1\u636e\u53ef\u663e\u8457\u964d\u4f4e\u7ec8\u6001\u4e16\u754c\u6a21\u578b\u8bef\u5dee"], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u957f\u7a0b\u89c4\u5212", "\u4e3b\u52a8\u63a2\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31422v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Ask the World Before Acting: Budgeted Environment Probing for World-Model Calibration", "tldr": "\u63d0\u51fa\u9884\u7b97\u5316\u73af\u5883\u63a2\u6d4b\u673a\u5236\uff0c\u8ba9\u667a\u80fd\u4f53\u5728\u884c\u52a8\u524d\u4e3b\u52a8\u6821\u51c6\u4e16\u754c\u6a21\u578b\u4ee5\u51cf\u5c11\u957f\u7a0b\u4efb\u52a1\u5931\u8d25", "upvotes": 0, "what_it_is": "\u63d0\u51faBEP\uff08\u9884\u7b97\u5316\u63a2\u6d4b\u7b97\u5b50\uff09\uff0c\u5141\u8bb8\u957f\u7a0b\u8bed\u8a00\u667a\u80fd\u4f53\u5728\u6267\u884c\u4efb\u52a1\u52a8\u4f5c\u524d\uff0c\u7528\u6709\u9650\u6b21\u6570\u5411\u73af\u5883\u67e5\u8be2\u7279\u5b9a\u4fe1\u5ff5\u5b57\u6bb5\uff0c\u5e76\u5c06\u7b54\u6848\u5199\u56de\u4e16\u754c\u6a21\u578b\uff0c\u4ece\u800c\u5728\u89c4\u5212\u4e2d\u9014\u4fee\u6b63\u6a21\u578b\u6f02\u79fb\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u5316\u5730\u5c06\u4e16\u754c\u6a21\u578b\u6821\u51c6\u4f5c\u4e3a\u9884\u7b97\u7ea6\u675f\u4e0b\u7684\u4e3b\u52a8\u63a2\u6d4b\u95ee\u9898\u5efa\u6a21\uff0c\u4e3a\u957f\u7a0bLLM\u667a\u80fd\u4f53\u7684\u53ef\u9760\u6027\u63d0\u4f9b\u4e86\u65b0\u7684\u7406\u8bba\u6846\u67b6\u548c\u5b9e\u7528\u673a\u5236"}, {"abstract": "Composing independently trained LoRA adapters into a single large language model is useful for multi-domain adaptation, especially when the original training data cannot be shared. A common approach is to use MoE-style routing over LoRA experts, but for frozen pretrained adapters, soft weighted combinations can change the unit-scale additive update under which each LoRA module was originally trained. We propose \\textbf{Hard-Routed MoR-LoRA}, a two-stage framework for composing frozen reasoning LoRA experts through unit-scale hard selection. First, domain-specific LoRA adapters are trained independently using reinforcement learning from verifiable feedback to obtain reasoning experts. Then, all experts are frozen, reasoning traces are distilled from them, and only a lightweight shared router together with a small attention LoRA is trained for integration. The router selects exactly one expert per token using hard top-1 routing, while a straight-through estimator enables gradient-based training. Experiments across five benchmarks, multiple model scales, and additional model families show that Hard-Routed MoR-LoRA preserves expert behavior while requiring substantially fewer trainable parameters than soft-routing mixture baselines. Our analysis further shows that normalized soft mixtures often concentrate most routing mass on a single expert, suggesting that hard unit-scale routing provides a simple and efficient abstraction for frozen LoRA expert composition.", "arxiv_id": "2606.31413", "arxiv_url": "https://arxiv.org/abs/2606.31413", "authors": ["Seyed Alireza Molavi", "Zhan Su", "Yan Hu", "Peyman Sheikholharam Mashhadi", "Stefan Byttner", "Prayag Tiwari"], "brief": "\u63d0\u51faHard-Routed MoR-LoRA\u4e24\u9636\u6bb5\u6846\u67b6\uff1a\u5148\u7528\u5f3a\u5316\u5b66\u4e60\u72ec\u7acb\u8bad\u7ec3\u9886\u57df\u63a8\u7406LoRA\u4e13\u5bb6\uff0c\u518d\u51bb\u7ed3\u6240\u6709\u4e13\u5bb6\uff0c\u4ec5\u8bad\u7ec3\u8f7b\u91cf\u8def\u7531\u5668\u548c\u5c0f\u578b\u6ce8\u610f\u529bLoRA\uff0c\u901a\u8fc7\u6bcftoken\u786c\u9009\u62e9\u4e00\u4e2a\u4e13\u5bb6\u5b9e\u73b0\u591a\u9886\u57df\u7ec4\u5408\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31413", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u786c\u8def\u7531\uff08Hard Top-1\uff09\u4fdd\u6301LoRA\u5355\u4f4d\u5c3a\u5ea6\u52a0\u6027\u66f4\u65b0\u4e0d\u53d8\uff0c\u907f\u514d\u8f6f\u52a0\u6743\u6df7\u5408\u7834\u574f\u539f\u59cb\u8bad\u7ec3\u5047\u8bbe", "\u4f7f\u7528\u76f4\u901a\u4f30\u8ba1\u5668\uff08Straight-Through Estimator\uff09\u4f7f\u4e0d\u53ef\u5fae\u7684\u786c\u9009\u62e9\u652f\u6301\u68af\u5ea6\u8bad\u7ec3", "\u57285\u4e2a\u57fa\u51c6\u3001\u591a\u6a21\u578b\u89c4\u6a21\u4e0a\u9a8c\u8bc1\uff0c\u53ef\u8bad\u7ec3\u53c2\u6570\u91cf\u663e\u8457\u5c11\u4e8e\u8f6f\u8def\u7531MoE\u57fa\u7ebf", "\u5206\u6790\u53d1\u73b0\u5f52\u4e00\u5316\u8f6f\u6df7\u5408\u8def\u7531\u6743\u91cd\u5f80\u5f80\u96c6\u4e2d\u5728\u5355\u4e00\u4e13\u5bb6\uff0c\u5370\u8bc1\u786c\u8def\u7531\u7684\u5408\u7406\u6027"], "keywords": ["\u6df7\u5408\u4e13\u5bb6", "LoRA", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u57df\u9002\u914d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31413v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Learning to Select, Not Relearn: Hard-Routed Mixtures of Reasoning LoRAs", "tldr": "\u63d0\u51fa\u786c\u8def\u7531MoR-LoRA\u6846\u67b6\uff0c\u901a\u8fc7Top-1\u786c\u9009\u62e9\u7ec4\u5408\u51bb\u7ed3\u63a8\u7406LoRA\u4e13\u5bb6\uff0c\u4fdd\u7559\u539f\u59cb\u8bad\u7ec3\u5c3a\u5ea6", "upvotes": 0, "what_it_is": "\u63d0\u51faHard-Routed MoR-LoRA\u4e24\u9636\u6bb5\u6846\u67b6\uff1a\u5148\u7528\u5f3a\u5316\u5b66\u4e60\u72ec\u7acb\u8bad\u7ec3\u9886\u57df\u63a8\u7406LoRA\u4e13\u5bb6\uff0c\u518d\u51bb\u7ed3\u6240\u6709\u4e13\u5bb6\uff0c\u4ec5\u8bad\u7ec3\u8f7b\u91cf\u8def\u7531\u5668\u548c\u5c0f\u578b\u6ce8\u610f\u529bLoRA\uff0c\u901a\u8fc7\u6bcftoken\u786c\u9009\u62e9\u4e00\u4e2a\u4e13\u5bb6\u5b9e\u73b0\u591a\u9886\u57df\u7ec4\u5408\u3002", "why_notable": "\u89e3\u51b3\u4e86\u51bb\u7ed3LoRA\u4e13\u5bb6\u7ec4\u5408\u65f6\u8f6f\u8def\u7531\u7834\u574f\u5355\u4f4d\u5c3a\u5ea6\u7684\u6839\u672c\u95ee\u9898\uff0c\u65b9\u6cd5\u7b80\u6d01\u9ad8\u6548\uff0c\u5bf9\u6570\u636e\u9690\u79c1\u573a\u666f\u4e0b\u7684\u591a\u57df\u6a21\u578b\u878d\u5408\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Tool-augmented vision-language models (VLMs) can solve multimodal, multi-step tasks by calling external tools, yet they remain fragile in practice. Existing works have two common gaps. Supervised fine-tuning (SFT) is built mostly on successful trajectories and offers little signal for recovery after tool failures, while sparse trajectory-level RL rewards provide limited guidance on which step failed and how to repair it. We introduce ReGRPO (Reflection-augmented Group Relative Policy Optimization), a framework that learns reflection-guided correction in tool-using agents. ReGRPO starts with a structured reflective data engine: we execute near-miss actions to collect grounded failure observations, then build Reflection-of-Thought triplets (ErrorType, Evidence, FixPlan) paired with corrected actions for warm-start SFT. We then optimize reflection tokens and corrective actions jointly within local trajectories using group-relative advantages, and include a reflection-cost term to reduce unnecessary reflection. Experiments on GTA and GAIA show that, under the same backbone and tool suite, ReGRPO consistently outperforms strong open-source baselines and achieves the best results among the compared open-source controllers. Code and RoT data are available at https://github.com/showlab/ReGRPO.", "arxiv_id": "2606.31392", "arxiv_url": "https://arxiv.org/abs/2606.31392", "authors": ["Binjie Zhang", "Mike Zheng Shou"], "brief": "\u63d0\u51faReGRPO\u6846\u67b6\uff0c\u8ba9\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u8c03\u7528\u5916\u90e8\u5de5\u5177\u5931\u8d25\u540e\u80fd\u591f\u81ea\u4e3b\u53cd\u601d\u5e76\u7ea0\u6b63\u9519\u8bef\uff0c\u901a\u8fc7\u6784\u5efaReflection-of-Thought\u4e09\u5143\u7ec4\uff08\u9519\u8bef\u7c7b\u578b\u3001\u8bc1\u636e\u3001\u4fee\u590d\u8ba1\u5212\uff09\u7ed3\u5408\u5f3a\u5316\u5b66\u4e60\u8054\u5408\u4f18\u5316\u53cd\u601d\u4e0e\u7ea0\u6b63\u884c\u4e3a\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31392", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u6784\u5efa\u7ed3\u6784\u5316\u53cd\u601d\u6570\u636e\u5f15\u64ce\uff1a\u6267\u884c\u8fd1\u5931\u8d25\u52a8\u4f5c\u6536\u96c6\u5931\u8d25\u89c2\u6d4b\uff0c\u751f\u6210(ErrorType, Evidence, FixPlan)\u4e09\u5143\u7ec4\u7528\u4e8e\u70ed\u542f\u52a8SFT", "\u5728\u5c40\u90e8\u8f68\u8ff9\u5185\u4f7f\u7528\u7ec4\u76f8\u5bf9\u4f18\u52bf\u8054\u5408\u4f18\u5316\u53cd\u601dtoken\u548c\u7ea0\u6b63\u52a8\u4f5c\uff0c\u5e76\u5f15\u5165\u53cd\u601d\u4ee3\u4ef7\u9879\u6291\u5236\u4e0d\u5fc5\u8981\u7684\u53cd\u601d", "\u5728GTA\u548cGAIA\u57fa\u51c6\u4e0a\u8d85\u8d8a\u540c\u7b49\u9aa8\u5e72\u7f51\u7edc\u7684\u5f00\u6e90\u57fa\u7ebf\uff0c\u8fbe\u5230\u5f00\u6e90\u63a7\u5236\u5668\u4e2d\u6700\u4f18\u7ed3\u679c"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u5de5\u5177\u8c03\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31392v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ReGRPO: Reflection-Augmented Policy Optimization for Tool-Using Agents", "tldr": "ReGRPO\uff1a\u901a\u8fc7\u53cd\u601d\u589e\u5f3a\u7684\u7b56\u7565\u4f18\u5316\u63d0\u5347\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u7684\u9519\u8bef\u6062\u590d\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faReGRPO\u6846\u67b6\uff0c\u8ba9\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u8c03\u7528\u5916\u90e8\u5de5\u5177\u5931\u8d25\u540e\u80fd\u591f\u81ea\u4e3b\u53cd\u601d\u5e76\u7ea0\u6b63\u9519\u8bef\uff0c\u901a\u8fc7\u6784\u5efaReflection-of-Thought\u4e09\u5143\u7ec4\uff08\u9519\u8bef\u7c7b\u578b\u3001\u8bc1\u636e\u3001\u4fee\u590d\u8ba1\u5212\uff09\u7ed3\u5408\u5f3a\u5316\u5b66\u4e60\u8054\u5408\u4f18\u5316\u53cd\u601d\u4e0e\u7ea0\u6b63\u884c\u4e3a\u3002", "why_notable": "\u73b0\u6709\u5de5\u5177\u589e\u5f3aVLM\u5728\u5de5\u5177\u8c03\u7528\u5931\u8d25\u540e\u7f3a\u4e4f\u6062\u590d\u673a\u5236\uff0cReGRPO\u9996\u6b21\u5c06\u7ed3\u6784\u5316\u53cd\u601d\u4e0eRL\u7b56\u7565\u4f18\u5316\u7ed3\u5408\uff0c\u7cfb\u7edf\u6027\u89e3\u51b3\u4e86SFT\u4ec5\u4f9d\u8d56\u6210\u529f\u8f68\u8ff9\u548c\u7a00\u758f\u5956\u52b1\u5b9a\u4f4d\u56f0\u96be\u4e24\u5927\u75db\u70b9\uff0c\u5bf9\u591a\u6a21\u6001\u667a\u80fd\u4f53\u9c81\u68d2\u6027\u63d0\u5347\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Learning visual world models for planning requires compact latent dynamics that remain sensitive to actions, yet reconstruction-free joint-embedding objectives can collapse to action-insensitive representations. We propose Delta-JEPA, an end-to-end reconstruction-free world model that augments latent forward prediction with a Latent Difference Action Decoder (LDAD). Unlike inverse decoders that infer actions from concatenated endpoint embeddings, LDAD reconstructs the executed action from the latent displacement between consecutive observations. This displacement-level supervision directly regularizes transition geometry: adjacent embeddings cannot collapse without losing action information, and different actions are encouraged to induce distinguishable latent changes for rollout-based planning. Delta-JEPA uses only latent prediction and action reconstruction, avoiding pixel reconstruction and distribution-matching regularizers. Across four visual continuous-control tasks, Delta-JEPA improves planning over JEPA-based and representation-learning world model baselines. Ablations show that displacement-based action decoding is consistently more effective than endpoint concatenation, and action-sensitivity analyses show clearer action-conditioned latent responses. These results indicate that supervising latent differences is a simple and effective mechanism for collapse-resistant and action-sensitive world model learning.", "arxiv_id": "2606.31232", "arxiv_url": "https://arxiv.org/abs/2606.31232", "authors": ["Zhenghao Zhang", "Yuanxiang Wang", "Zhenyu Guan", "Yujia Yang", "Bingkang Shi", "Tianyu Zong", "Hongzhu Yi", "Guoqing Chao", "Xingchen Chen", "Tiankun Yang", "Chenxi Bao", "Tao Yu", "Jingjing Zhou", "Jungang Xu"], "brief": "\u63d0\u51faDelta-JEPA\uff0c\u4e00\u79cd\u7aef\u5230\u7aef\u65e0\u91cd\u5efa\u4e16\u754c\u6a21\u578b\uff0c\u901a\u8fc7\u6f5c\u5728\u5dee\u5206\u52a8\u4f5c\u89e3\u7801\u5668\uff08LDAD\uff09\u4ece\u8fde\u7eed\u89c2\u6d4b\u7684\u6f5c\u5728\u4f4d\u79fb\u4e2d\u91cd\u5efa\u6267\u884c\u52a8\u4f5c\uff0c\u76f4\u63a5\u6b63\u5219\u5316\u8f6c\u79fb\u51e0\u4f55\u7ed3\u6784\uff0c\u9632\u6b62\u8868\u793a\u574d\u584c\u5e76\u4fdd\u6301\u5bf9\u52a8\u4f5c\u7684\u654f\u611f\u6027\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31232", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1aLDAD\u4ece\u76f8\u90bb\u5d4c\u5165\u7684\u6f5c\u5728\u4f4d\u79fb\u91cd\u5efa\u52a8\u4f5c\uff0c\u800c\u975e\u4f20\u7edf\u9006\u89e3\u7801\u5668\u4ece\u7aef\u70b9\u62fc\u63a5\u63a8\u65ad\u52a8\u4f5c", "\u4f4d\u79fb\u7ea7\u76d1\u7763\u76f4\u63a5\u7ea6\u675f\u8f6c\u79fb\u51e0\u4f55\uff1a\u4e0d\u540c\u52a8\u4f5c\u88ab\u8feb\u5728\u6f5c\u5728\u7a7a\u95f4\u4ea7\u751f\u53ef\u533a\u5206\u7684\u53d8\u5316\uff0c\u9632\u6b62\u574d\u584c", "\u5728\u56db\u4e2a\u89c6\u89c9\u8fde\u7eed\u63a7\u5236\u4efb\u52a1\u4e0a\u89c4\u5212\u6027\u80fd\u4f18\u4e8eJEPA\u57fa\u7ebf\u53ca\u5176\u4ed6\u8868\u793a\u5b66\u4e60\u4e16\u754c\u6a21\u578b\uff0c\u4e14\u65e0\u9700\u50cf\u7d20\u91cd\u5efa\u6216\u5206\u5e03\u5339\u914d\u6b63\u5219\u5316"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u8868\u793a\u5b66\u4e60", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31232v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Delta-JEPA: Learning Action-Sensitive World Models via Latent Difference Decoding", "tldr": "Delta-JEPA\u901a\u8fc7\u6f5c\u5728\u4f4d\u79fb\u89e3\u7801\u52a8\u4f5c\uff0c\u6784\u5efa\u5bf9\u52a8\u4f5c\u654f\u611f\u7684\u65e0\u91cd\u5efa\u4e16\u754c\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faDelta-JEPA\uff0c\u4e00\u79cd\u7aef\u5230\u7aef\u65e0\u91cd\u5efa\u4e16\u754c\u6a21\u578b\uff0c\u901a\u8fc7\u6f5c\u5728\u5dee\u5206\u52a8\u4f5c\u89e3\u7801\u5668\uff08LDAD\uff09\u4ece\u8fde\u7eed\u89c2\u6d4b\u7684\u6f5c\u5728\u4f4d\u79fb\u4e2d\u91cd\u5efa\u6267\u884c\u52a8\u4f5c\uff0c\u76f4\u63a5\u6b63\u5219\u5316\u8f6c\u79fb\u51e0\u4f55\u7ed3\u6784\uff0c\u9632\u6b62\u8868\u793a\u574d\u584c\u5e76\u4fdd\u6301\u5bf9\u52a8\u4f5c\u7684\u654f\u611f\u6027\u3002", "why_notable": "\u89e3\u51b3\u4e86\u8054\u5408\u5d4c\u5165\u76ee\u6807\uff08JEPA\u7c7b\u65b9\u6cd5\uff09\u4e2d\u52a8\u4f5c\u4e0d\u654f\u611f\u8868\u793a\u574d\u584c\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u63d0\u4f9b\u4e86\u4e00\u79cd\u7b80\u6d01\u6709\u6548\u7684\u673a\u5236\uff0c\u5bf9\u57fa\u4e8e\u89c4\u5212\u7684\u89c6\u89c9\u5f3a\u5316\u5b66\u4e60\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Production large language-model (LLM) agents are increasingly deployed not as lone problem-solvers but as managers: a main model creates specialized subagents, delegates work, and orchestrates their parallel, asynchronous returns through dynamic workflows. Whether one model can actually run such a team is largely unmeasured: existing benchmarks score a policy\u0027s own task-solving or a fixed multi-agent system\u0027s emergent behavior, but none isolate the management ability of the single LLM acting as leader. We introduce ClawArena-Team, a benchmark of 41 multi-turn, multimodal, multi-directory scenarios spanning 258 evaluation rounds and 72 staged updates that measures this management ability. The main agent is deliberately constrained: it natively perceives only text and directly accesses only part of the workspace. It commands a fixed, locally served subagent pool, so score differences reflect management skill, not raw capability. All scoring is execution-based with no LLM judge: an overall score -- the Subagent-Management Score (SMS) -- multiplies task correctness by a least-privilege and modality-routing factor. Across twelve proprietary, community-hosted, and self-hosted models, experiments show that the management bottleneck is privilege granting rather than perception (no model exceeds 50% workspace-permission precision); that cost and management quality are decoupled (API cost spans over 100 times while the overall score spans under 4 times, with the cheapest open models on the Pareto frontier); and that most leaderboard scores cluster within a 9.9-point band while orchestration behaviors diverge by more than an order of magnitude. Code and data will be released.", "arxiv_id": "2606.31174", "arxiv_url": "https://arxiv.org/abs/2606.31174", "authors": ["Kaiwen Xiong", "Haonian Ji", "Shi Qiu", "Zeyu Zheng", "Cihang Xie", "Xinyu Ye", "Huaxiu Yao"], "brief": "\u63d0\u51faClawArena-Team\u57fa\u51c6\uff0c\u5305\u542b41\u4e2a\u591a\u8f6e\u3001\u591a\u6a21\u6001\u3001\u591a\u76ee\u5f55\u573a\u666f\uff08258\u8f6e\u8bc4\u6d4b\u300172\u6b21\u9636\u6bb5\u66f4\u65b0\uff09\uff0c\u4e13\u95e8\u8861\u91cf\u5355\u4e2aLLM\u4f5c\u4e3a\"\u4e3b\u7ba1\"\u534f\u8c03\u5b50\u667a\u80fd\u4f53\u56e2\u961f\u7684\u7ba1\u7406\u80fd\u529b\uff0c\u800c\u975e\u5176\u81ea\u8eab\u4efb\u52a1\u89e3\u51b3\u80fd\u529b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31174", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5f15\u5165\u5b50\u667a\u80fd\u4f53\u7ba1\u7406\u5206\u6570\uff08SMS\uff09\uff0c\u7efc\u5408\u4efb\u52a1\u6b63\u786e\u6027\u3001\u6700\u5c0f\u6743\u9650\u539f\u5219\u548c\u6a21\u6001\u8def\u7531\u56e0\u5b50\uff0c\u5168\u90e8\u57fa\u4e8e\u6267\u884c\u7ed3\u679c\u8bc4\u5206\uff0c\u65e0LLM\u88c1\u5224", "\u5173\u952e\u53d1\u73b0\uff1a\u7ba1\u7406\u74f6\u9888\u5728\u4e8e\u6743\u9650\u6388\u4e88\u800c\u975e\u611f\u77e5\u80fd\u529b\uff0c\u6240\u6709\u6a21\u578b\u5de5\u4f5c\u533a\u6743\u9650\u7cbe\u5ea6\u5747\u4f4e\u4e8e50%", "API\u6210\u672c\u4e0e\u7ba1\u7406\u8d28\u91cf\u89e3\u8026\uff1a\u6210\u672c\u5dee\u8ddd\u8d85100\u500d\uff0c\u4f46\u603b\u5206\u5dee\u8ddd\u4e0d\u8db34\u500d\uff0c\u6700\u4fbf\u5b9c\u7684\u5f00\u6e90\u6a21\u578b\u4f4d\u4e8ePareto\u524d\u6cbf"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31174v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ClawArena-Team: Benchmarking Subagent Orchestration and Dynamic Workflows in Language-Model Agents", "tldr": "ClawArena-Team\uff1a\u4e13\u95e8\u8bc4\u6d4bLLM\u4f5c\u4e3a\u591a\u667a\u80fd\u4f53\u7ba1\u7406\u8005\u7684\u7f16\u6392\u4e0e\u52a8\u6001\u5de5\u4f5c\u6d41\u80fd\u529b\u7684\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faClawArena-Team\u57fa\u51c6\uff0c\u5305\u542b41\u4e2a\u591a\u8f6e\u3001\u591a\u6a21\u6001\u3001\u591a\u76ee\u5f55\u573a\u666f\uff08258\u8f6e\u8bc4\u6d4b\u300172\u6b21\u9636\u6bb5\u66f4\u65b0\uff09\uff0c\u4e13\u95e8\u8861\u91cf\u5355\u4e2aLLM\u4f5c\u4e3a\"\u4e3b\u7ba1\"\u534f\u8c03\u5b50\u667a\u80fd\u4f53\u56e2\u961f\u7684\u7ba1\u7406\u80fd\u529b\uff0c\u800c\u975e\u5176\u81ea\u8eab\u4efb\u52a1\u89e3\u51b3\u80fd\u529b\u3002", "why_notable": "\u9996\u4e2a\u4e13\u95e8\u9694\u79bb\u5e76\u91cf\u5316LLM\"\u7ba1\u7406\u8005\"\u89d2\u8272\u80fd\u529b\u7684\u57fa\u51c6\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u6a21\u578b\u5728\u591a\u667a\u80fd\u4f53\u7f16\u6392\u4e2d\u7684\u771f\u5b9e\u74f6\u9888\uff0c\u5bf9\u751f\u4ea7\u7ea7LLM Agent\u90e8\u7f72\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Creating and editing slides is a rich, multimodal activity that is ubiquitous in professional and educational settings, making it an ideal testbed for real-world computer-use agents. Microsoft PowerPoint is among the most widely adopted and feature-rich environments for presentation creation. We introduce PPT-Eval, a benchmark of 120 PowerPoint tasks across 12 files that cover both content creation and presentation editing scenarios, organized by difficulty. A central challenge in this domain is evaluation: tasks are complex, multimodal, and often admit many valid solutions. Moreover, today\u0027s agents frequently make only partial progress, which binary success metrics fail to capture. To address this, we design a robust evaluation framework to help create task-specific rubrics for PowerPoint tasks, taking inspiration from and building on past works for rubric-based evaluation. These rubrics award partial credit for intermediate steps, penalize unnecessary changes and poor aesthetics, and provide natural language feedback. This nuanced approach proves highly effective, achieving a Kendall\u0027s \u03c4-b correlation of 0.77 with human judgments. We find that existing frontier agents still struggle with solving PowerPoint tasks, with strong models like Claude-4.5-Opus achieving only a 45% success rate and an average partial score of 57%. The benchmark is located at: https://microsoft.github.io/ppteval.", "arxiv_id": "2606.31154", "arxiv_url": "https://arxiv.org/abs/2606.31154", "authors": ["Apurva Gandhi", "Vishwas Suryanarayanan", "Raja Hasnain Anwar", "Firoz Shaik", "Shubhang Desai", "Thong Q. Nguyen", "Muhammad Taqi Raza", "Vishal Chowdhary", "Graham Neubig"], "brief": "\u63d0\u51faPPT-Eval\u57fa\u51c6\uff0c\u5305\u542b12\u4e2a\u6587\u4ef6\u4e2d\u7684120\u4e2aPowerPoint\u4efb\u52a1\uff0c\u8986\u76d6\u5185\u5bb9\u521b\u5efa\u4e0e\u6f14\u793a\u7f16\u8f91\u573a\u666f\uff0c\u5e76\u8bbe\u8ba1\u57fa\u4e8e\u8bc4\u5206\u7ec6\u5219\uff08rubric\uff09\u7684\u8bc4\u4f30\u6846\u67b6\uff0c\u652f\u6301\u90e8\u5206\u5f97\u5206\u4e0e\u81ea\u7136\u8bed\u8a00\u53cd\u9988\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31154", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["120\u4e2a\u4efb\u52a1\u6309\u96be\u5ea6\u5206\u7ea7\uff0c\u6db5\u76d6\u5185\u5bb9\u521b\u5efa\u548c\u6f14\u793a\u7f16\u8f91\u4e24\u5927\u573a\u666f", "\u8bc4\u4f30\u6846\u67b6\u4e0e\u4eba\u7c7b\u5224\u65ad\u7684Kendall\u0027s \u03c4-b\u76f8\u5173\u7cfb\u6570\u8fbe0.77\uff0c\u652f\u6301\u90e8\u5206\u5f97\u5206\u5e76\u60e9\u7f5a\u4e0d\u5fc5\u8981\u4fee\u6539\u548c\u7f8e\u89c2\u95ee\u9898", "\u6700\u5f3a\u524d\u6cbf\u6a21\u578bClaude-4.5-Opus\u6210\u529f\u7387\u4ec545%\uff0c\u5e73\u5747\u90e8\u5206\u5f97\u520657%\uff0c\u8bf4\u660e\u4efb\u52a1\u4ecd\u5177\u6311\u6218\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u6d4b\u8bd5", "\u591a\u6a21\u6001", "GUI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31154v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "PPT-Eval: A Benchmark for Computer-Use Agents on PowerPoint Tasks", "tldr": "PPT-Eval\uff1a\u8bc4\u4f30AI\u667a\u80fd\u4f53\u5b8c\u6210PowerPoint\u4efb\u52a1\u80fd\u529b\u7684120\u9898\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faPPT-Eval\u57fa\u51c6\uff0c\u5305\u542b12\u4e2a\u6587\u4ef6\u4e2d\u7684120\u4e2aPowerPoint\u4efb\u52a1\uff0c\u8986\u76d6\u5185\u5bb9\u521b\u5efa\u4e0e\u6f14\u793a\u7f16\u8f91\u573a\u666f\uff0c\u5e76\u8bbe\u8ba1\u57fa\u4e8e\u8bc4\u5206\u7ec6\u5219\uff08rubric\uff09\u7684\u8bc4\u4f30\u6846\u67b6\uff0c\u652f\u6301\u90e8\u5206\u5f97\u5206\u4e0e\u81ea\u7136\u8bed\u8a00\u53cd\u9988\u3002", "why_notable": "PowerPoint\u7f16\u8f91\u662f\u4e13\u4e1a\u573a\u666f\u4e2d\u9ad8\u9891\u4e14\u590d\u6742\u7684\u591a\u6a21\u6001\u4efb\u52a1\uff0c\u73b0\u6709\u667a\u80fd\u4f53\u8868\u73b0\u4ecd\u5dee\uff0c\u8be5\u57fa\u51c6\u586b\u8865\u4e86GUI\u667a\u80fd\u4f53\u5728\u529e\u516c\u8f6f\u4ef6\u8bc4\u4f30\u4e0a\u7684\u7a7a\u767d\uff0c\u8bc4\u4f30\u6846\u67b6\u8bbe\u8ba1\u5177\u6709\u5b9e\u7528\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "How to accurately predict a high-fidelity future world? While the visual world is inherently continuous, existing deterministic video prediction models operate in discrete pixel space and are mainly optimized with pixel-wise mean squared error (MSE), which often leads to over-smoothed predictions and a lack of fine-grained visual details. To address these limitations, we propose Predictive Differentiable Rendering (PDR), a novel end-to-end video prediction paradigm that bridges the gap between discrete and continuous representations. Inspired by recent progress in 3D reconstruction with 3D Gaussian Splatting, we introduce PredGS, a lightweight and plug-and-play adapter based on 2D Gaussian representation, which could be seamlessly integrated with existing pixel space predictors, significantly improving spatial detail preservation with negligible computational overhead. Furthermore, we develop predgsplat, a CUDA-accelerated differentiable 2D Gaussian renderer supporting arbitrary channels. Each Gaussian is defined by 5 + C learnable parameters (position, scale, rotation, and C channel amplitudes) and achieves up to 10x faster rendering than the baseline. Optimized by a combined L1 and SSIM loss, PDR overcomes the inherent blurring tendencies of MSE Loss, significantly enhancing the prediction performance. Extensive experiments on diverse real-world benchmarks, including TaxiBJ, WeatherBench, KTH, and Human3.6M, demonstrate that PDR consistently surpasses existing methods, delivering superior detail preservation, visual fidelity, and predictive accuracy.", "arxiv_id": "2606.31050", "arxiv_url": "https://arxiv.org/abs/2606.31050", "authors": ["Yujin Tang", "Tian Zhou", "Xin Lin", "Cheng Tan", "Yifan Hu", "Rong Jin", "SouYoung Jin", "Liang Sun"], "brief": "\u63d0\u51fa\u9884\u6d4b\u6027\u53ef\u5fae\u6e32\u67d3\uff08PDR\uff09\u8303\u5f0f\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea72D\u9ad8\u65af\u9002\u914d\u5668PredGS\u5c06\u8fde\u7eed\u9ad8\u65af\u8868\u793a\u5f15\u5165\u89c6\u9891\u9884\u6d4b\uff0c\u914d\u5408CUDA\u52a0\u901f\u6e32\u67d3\u5668\uff0c\u89e3\u51b3\u50cf\u7d20\u7ea7MSE\u635f\u5931\u5bfc\u81f4\u7684\u8fc7\u5ea6\u5e73\u6ed1\u95ee\u9898\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31050", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["PredGS\u4e3a\u5373\u63d2\u5373\u7528\u9002\u914d\u5668\uff0c\u53ef\u65e0\u7f1d\u96c6\u6210\u73b0\u6709\u89c6\u9891\u9884\u6d4b\u6a21\u578b\uff0c\u8ba1\u7b97\u5f00\u9500\u53ef\u5ffd\u7565\u4e0d\u8ba1", "\u81ea\u7814predgsplat\u6e32\u67d3\u5668\u652f\u6301\u4efb\u610f\u901a\u9053\uff0c\u6bcf\u4e2a\u9ad8\u65af\u4ec5\u97005+C\u4e2a\u53ef\u5b66\u4e60\u53c2\u6570\uff0c\u6e32\u67d3\u901f\u5ea6\u6bd4\u57fa\u7ebf\u5feb10\u500d", "\u5728TaxiBJ\u3001WeatherBench\u3001KTH\u3001Human3.6M\u56db\u4e2a\u57fa\u51c6\u4e0a\u5168\u9762\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5"], "keywords": ["\u89c6\u9891\u9884\u6d4b", "\u9ad8\u65af\u6cfc\u6e85", "\u53ef\u5fae\u6e32\u67d3", "\u4e16\u754c\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31050v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Learning Video Dynamics with Predictive Differentiable Rendering", "tldr": "\u63d0\u51faPDR\u6846\u67b6\uff0c\u75282D\u9ad8\u65af\u6cfc\u6e85\u5c06\u89c6\u9891\u9884\u6d4b\u4ece\u79bb\u6563\u50cf\u7d20\u7a7a\u95f4\u6269\u5c55\u5230\u8fde\u7eed\u8868\u793a\uff0c\u663e\u8457\u63d0\u5347\u7ec6\u8282\u4fdd\u771f\u5ea6", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u9884\u6d4b\u6027\u53ef\u5fae\u6e32\u67d3\uff08PDR\uff09\u8303\u5f0f\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea72D\u9ad8\u65af\u9002\u914d\u5668PredGS\u5c06\u8fde\u7eed\u9ad8\u65af\u8868\u793a\u5f15\u5165\u89c6\u9891\u9884\u6d4b\uff0c\u914d\u5408CUDA\u52a0\u901f\u6e32\u67d3\u5668\uff0c\u89e3\u51b3\u50cf\u7d20\u7ea7MSE\u635f\u5931\u5bfc\u81f4\u7684\u8fc7\u5ea6\u5e73\u6ed1\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c063D\u9ad8\u65af\u6cfc\u6e85\u601d\u60f3\u5f15\u5165\u89c6\u9891\u9884\u6d4b\u4efb\u52a1\uff0c\u4ee5\u6781\u4f4e\u989d\u5916\u5f00\u9500\u7a81\u7834MSE\u6a21\u7cca\u74f6\u9888\uff0c\u5373\u63d2\u5373\u7528\u8bbe\u8ba1\u4f7f\u5176\u5177\u6709\u5e7f\u6cdb\u5b9e\u7528\u4ef7\u503c\uff0c\u5bf9\u7269\u7406\u4eff\u771f\u3001\u81ea\u52a8\u9a7e\u9a76\u7b49\u9700\u8981\u9ad8\u4fdd\u771f\u672a\u6765\u9884\u6d4b\u7684\u573a\u666f\u5f71\u54cd\u6df1\u8fdc\u3002"}, {"abstract": "Long-context Large Language Model inference is severely bottlenecked by the massive Key-Value (KV) cache, yet existing sparse attention methods often suffer from static fixed-budget (Top-k) retrieval or rely on proxy scores that are computationally expensive and biased. To address these limitations, we propose RaBitQCache, a novel sparse attention framework that utilizes randomized rotated binary quantization and high-throughput binary-INT4 arithmetic to efficiently estimate attention weights. Our proxy score serves as an unbiased estimator with a proven error bound, enabling adaptive Top-p retrieval that dynamically adjusts the token budget based on actual attention sparsity. We further implement a hardware-aware system with asynchronous pipelining and lazy updates to mask overhead. Evaluations demonstrate that RaBitQCache significantly accelerates inference and reduces memory I/O while preserving generation quality compared to state-of-the-art baselines. Code is available at https://github.com/Sakuraaa0/RaBitQCache.git.", "arxiv_id": "2606.31519", "arxiv_url": "https://arxiv.org/abs/2606.31519", "authors": ["Wenhao Li", "Jinhao Dong", "Hailin Zhang", "Wenhang Shi", "Wei Lu", "Xiaoyong Du"], "brief": "RaBitQCache\u662f\u4e00\u79cd\u7a00\u758f\u6ce8\u610f\u529b\u6846\u67b6\uff0c\u901a\u8fc7\u968f\u673a\u65cb\u8f6c\u4e8c\u503c\u91cf\u5316\uff08Binary Quantization\uff09\u548c\u9ad8\u541e\u5410\u91cfBinary-INT4\u7b97\u672f\u6765\u9ad8\u6548\u4f30\u8ba1\u6ce8\u610f\u529b\u6743\u91cd\uff0c\u5b9e\u73b0KV Cache\u7684\u81ea\u9002\u5e94Top-p\u68c0\u7d22\uff0c\u52a8\u6001\u8c03\u6574token\u9884\u7b97\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31519", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4ee3\u7406\u5206\u6570\uff08proxy score\uff09\u4e3a\u65e0\u504f\u4f30\u8ba1\u91cf\uff0c\u5177\u6709\u53ef\u8bc1\u660e\u7684\u8bef\u5dee\u4e0a\u754c\uff0c\u652f\u6301\u81ea\u9002\u5e94Top-p\u68c0\u7d22\u800c\u975e\u56fa\u5b9aTop-k\u9884\u7b97", "\u91c7\u7528\u968f\u673a\u65cb\u8f6c\u4e8c\u503c\u91cf\u5316\u7ed3\u5408Binary-INT4\u7b97\u672f\uff0c\u663e\u8457\u964d\u4f4eKV Cache\u5185\u5b58I/O\u5f00\u9500", "\u786c\u4ef6\u611f\u77e5\u7cfb\u7edf\u8bbe\u8ba1\uff1a\u5f02\u6b65\u6d41\u6c34\u7ebf\uff08asynchronous pipelining\uff09\u4e0e\u61d2\u66f4\u65b0\uff08lazy updates\uff09\u63a9\u76d6\u989d\u5916\u5f00\u9500"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "KV Cache", "\u91cf\u5316", "\u957f\u4e0a\u4e0b\u6587\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31519v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RaBitQCache: Rotated Binary Quantization for KVCache in Long Context LLM Inference", "tldr": "\u63d0\u51faRaBitQCache\uff0c\u7528\u968f\u673a\u65cb\u8f6c\u4e8c\u503c\u91cf\u5316\u9ad8\u6548\u4f30\u8ba1\u6ce8\u610f\u529b\u6743\u91cd\uff0c\u52a0\u901f\u957f\u4e0a\u4e0b\u6587LLM\u63a8\u7406", "upvotes": 0, "what_it_is": "RaBitQCache\u662f\u4e00\u79cd\u7a00\u758f\u6ce8\u610f\u529b\u6846\u67b6\uff0c\u901a\u8fc7\u968f\u673a\u65cb\u8f6c\u4e8c\u503c\u91cf\u5316\uff08Binary Quantization\uff09\u548c\u9ad8\u541e\u5410\u91cfBinary-INT4\u7b97\u672f\u6765\u9ad8\u6548\u4f30\u8ba1\u6ce8\u610f\u529b\u6743\u91cd\uff0c\u5b9e\u73b0KV Cache\u7684\u81ea\u9002\u5e94Top-p\u68c0\u7d22\uff0c\u52a8\u6001\u8c03\u6574token\u9884\u7b97\u3002", "why_notable": "\u73b0\u6709\u7a00\u758f\u6ce8\u610f\u529b\u65b9\u6cd5\u666e\u904d\u5b58\u5728\u56fa\u5b9a\u9884\u7b97\u6216\u4ee3\u7406\u5206\u6570\u504f\u5dee\u95ee\u9898\uff0c\u672c\u6587\u4ece\u7406\u8bba\uff08\u65e0\u504f\u4f30\u8ba1+\u8bef\u5dee\u754c\uff09\u548c\u5de5\u7a0b\uff08\u786c\u4ef6\u611f\u77e5\u4f18\u5316\uff09\u4e24\u4e2a\u7ef4\u5ea6\u540c\u65f6\u7a81\u7834\uff0c\u5bf9\u957f\u4e0a\u4e0b\u6587LLM\u63a8\u7406\u52a0\u901f\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Internet users collectively perform an enormous range of skilled work through web browsers, from software development and document editing to search, forms, and enterprise workflows, making human browsing a highly scalable but under-exploited source of reusable browser skills. We argue that the bottleneck for browser agents is decision-making under incomplete information rather than low-level operation, and that the priors agents lack are already implicit in human interaction traces. We therefore study scalable behavior cloning for browser agents via skill distillation, converting user interaction trajectories into compact natural-language skills that agents can read, retrieve, reuse, and compose directly. We further organize the distilled skills into a skill graph so that growth proceeds through consolidation rather than unbounded accumulation. This suggests that the scalability of browser agents may come less from manually designed tasks and more from the collective skills already expressed by internet users. Our project is available at: https://lab.einsia.ai/browserbc/.", "arxiv_id": "2606.32014", "arxiv_url": "https://arxiv.org/abs/2606.32014", "authors": ["Kaisen Yang", "Zheng Jiang", "Yuzhao Peng", "Houde Qian", "Boshi Zhang", "Youjie Zheng", "Shijin Hong", "Qingle Liu", "Ruoyu Han", "Bohan Lyu", "Bingxiang He", "Eren Cai", "Calvin Xiao", "Qinhuai Na"], "brief": "\u63d0\u51fa\u4e00\u79cd\u53ef\u6269\u5c55\u7684\u6d4f\u89c8\u5668\u667a\u80fd\u4f53\u884c\u4e3a\u514b\u9686\u6846\u67b6\uff0c\u5c06\u4eba\u7c7b\u6d4f\u89c8\u5668\u4ea4\u4e92\u8f68\u8ff9\u8f6c\u5316\u4e3a\u7d27\u51d1\u7684\u81ea\u7136\u8bed\u8a00\u6280\u80fd\uff0c\u5e76\u7ec4\u7ec7\u6210\u6280\u80fd\u56fe\u8c31\uff0c\u4f7f\u667a\u80fd\u4f53\u80fd\u591f\u68c0\u7d22\u3001\u590d\u7528\u548c\u7ec4\u5408\u8fd9\u4e9b\u6280\u80fd\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.32014", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u6838\u5fc3\u74f6\u9888\u5224\u65ad\uff1a\u6d4f\u89c8\u5668\u667a\u80fd\u4f53\u7684\u5173\u952e\u6311\u6218\u5728\u4e8e\u4e0d\u5b8c\u6574\u4fe1\u606f\u4e0b\u7684\u51b3\u7b56\uff0c\u800c\u975e\u5e95\u5c42\u64cd\u4f5c\u6267\u884c", "\u6280\u80fd\u84b8\u998f\u673a\u5236\uff1a\u5c06\u7528\u6237\u4ea4\u4e92\u8f68\u8ff9\u8f6c\u5316\u4e3a\u81ea\u7136\u8bed\u8a00\u6280\u80fd\u63cf\u8ff0\uff0c\u652f\u6301\u8bfb\u53d6\u3001\u68c0\u7d22\u3001\u590d\u7528\u548c\u7ec4\u5408", "\u6280\u80fd\u56fe\u8c31\u7ec4\u7ec7\uff1a\u901a\u8fc7\u6574\u5408\u800c\u975e\u65e0\u9650\u7d2f\u79ef\u6765\u7ba1\u7406\u6280\u80fd\u589e\u957f\uff0c\u5b9e\u73b0\u53ef\u6269\u5c55\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u884c\u4e3a\u514b\u9686", "\u6280\u80fd\u84b8\u998f", "GUI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.32014v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Scalable Behaviour Cloning on Browser Using via Skill Distillation", "tldr": "\u5c06\u7528\u6237\u6d4f\u89c8\u5668\u4ea4\u4e92\u8f68\u8ff9\u84b8\u998f\u4e3a\u53ef\u590d\u7528\u6280\u80fd\uff0c\u6784\u5efa\u6280\u80fd\u56fe\u8c31\u4ee5\u6269\u5c55\u6d4f\u89c8\u5668\u667a\u80fd\u4f53\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u53ef\u6269\u5c55\u7684\u6d4f\u89c8\u5668\u667a\u80fd\u4f53\u884c\u4e3a\u514b\u9686\u6846\u67b6\uff0c\u5c06\u4eba\u7c7b\u6d4f\u89c8\u5668\u4ea4\u4e92\u8f68\u8ff9\u8f6c\u5316\u4e3a\u7d27\u51d1\u7684\u81ea\u7136\u8bed\u8a00\u6280\u80fd\uff0c\u5e76\u7ec4\u7ec7\u6210\u6280\u80fd\u56fe\u8c31\uff0c\u4f7f\u667a\u80fd\u4f53\u80fd\u591f\u68c0\u7d22\u3001\u590d\u7528\u548c\u7ec4\u5408\u8fd9\u4e9b\u6280\u80fd\u3002", "why_notable": "\u5229\u7528\u4e92\u8054\u7f51\u7528\u6237\u96c6\u4f53\u884c\u4e3a\u4f5c\u4e3a\u514d\u8d39\u3001\u5927\u89c4\u6a21\u7684\u6280\u80fd\u6765\u6e90\uff0c\u7ed5\u8fc7\u4e86\u4eba\u5de5\u8bbe\u8ba1\u4efb\u52a1\u7684\u74f6\u9888\uff0c\u4e3a\u6d4f\u89c8\u5668\u667a\u80fd\u4f53\u7684\u89c4\u6a21\u5316\u63d0\u4f9b\u4e86\u65b0\u601d\u8def\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u6570\u636e\u6548\u7387\u4f18\u52bf\u3002"}, {"abstract": "Large language models increasingly operate over long contexts, where the KV cache becomes a dominant memory bottleneck: its size grows linearly with sequence length and must be retained throughout decoding, making full GPU caching prohibitively expensive without compression. Existing KV cache compression methods struggle to balance efficiency with faithful context preservation. Token eviction discards information, while semantic grouping fixes compression decisions at prefill time; neither can recover token-level detail from a compressed span once it becomes relevant during generation. As a solution, we propose SeKV, a resolution-adaptive semantic KV cache that organizes context into entropy-guided semantic spans and stores them across a GPU-CPU memory hierarchy without discarding information. Each span keeps a lightweight summary vector on GPU for coarse routing and a low-rank SVD basis on CPU for on-demand token-level reconstruction. A trained zoom-in mechanism selectively expands query-relevant spans during decoding, enabling precise retrieval without materializing the full KV cache on GPU. SeKV enables adaptive token-level reconstruction while keeping the base LLM fully frozen and adding fewer than 0.05% trainable parameters. Across four benchmarks, SeKV improves over the strongest semantic compression baseline by 5.9% on average while reducing GPU memory by 53.3% versus full KV caching at 128K context. Code is available on https://github.com/AmirAbaskohi/SeKV.", "arxiv_id": "2606.31145", "arxiv_url": "https://arxiv.org/abs/2606.31145", "authors": ["Amirhossein Abaskohi", "Giuseppe Carenini", "Peter West", "Yuhang He"], "brief": "\u63d0\u51faSeKV\uff0c\u4e00\u79cd\u57fa\u4e8e\u71b5\u5f15\u5bfc\u8bed\u4e49\u5206\u6bb5\u7684\u81ea\u9002\u5e94KV\u7f13\u5b58\u538b\u7f29\u65b9\u6848\uff0c\u5c06\u4e0a\u4e0b\u6587\u6458\u8981\u5411\u91cf\u5b58\u4e8eGPU\u3001\u4f4e\u79e9SVD\u57fa\u5b58\u4e8eCPU\uff0c\u6309\u9700\u91cd\u5efatoken\u7ea7\u7ec6\u8282\uff0c\u65e0\u9700\u4e22\u5f03\u4efb\u4f55\u4fe1\u606f\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31145", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u71b5\u5f15\u5bfc\u8bed\u4e49\u5206\u6bb5\uff1a\u5c06\u4e0a\u4e0b\u6587\u5212\u5206\u4e3a\u8bed\u4e49\u8de8\u5ea6\uff0cGPU\u4fdd\u7559\u8f7b\u91cf\u6458\u8981\u5411\u91cf\u7528\u4e8e\u7c97\u7c92\u5ea6\u8def\u7531\uff0cCPU\u4fdd\u7559\u4f4e\u79e9SVD\u57fa\u7528\u4e8e\u6309\u9700\u91cd\u5efa", "\u8bad\u7ec3\u4e00\u4e2azoom-in\u673a\u5236\uff0c\u89e3\u7801\u65f6\u9009\u62e9\u6027\u5c55\u5f00\u4e0e\u67e5\u8be2\u76f8\u5173\u7684\u8bed\u4e49\u8de8\u5ea6\uff0c\u5b9e\u73b0\u7cbe\u51c6token\u7ea7\u68c0\u7d22", "\u57fa\u7840LLM\u5b8c\u5168\u51bb\u7ed3\uff0c\u53ef\u8bad\u7ec3\u53c2\u6570\u4e0d\u8db30.05%\uff1b\u5728128K\u4e0a\u4e0b\u6587\u4e0bGPU\u663e\u5b58\u8f83\u5168\u91cfKV\u7f13\u5b58\u51cf\u5c1153.3%\uff0c\u8f83\u6700\u5f3a\u8bed\u4e49\u538b\u7f29\u57fa\u7ebf\u5e73\u5747\u63d0\u53475.9%"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "KV\u7f13\u5b58\u538b\u7f29", "\u957f\u4e0a\u4e0b\u6587\u63a8\u7406", "\u5185\u5b58\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31145v1", "published_at": "2026-06-30", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SeKV: Resolution-Adaptive KV Cache with Hierarchical Semantic Memory for Long-Context LLM Inference", "tldr": "SeKV\u63d0\u51fa\u5206\u8fa8\u7387\u81ea\u9002\u5e94KV\u7f13\u5b58\uff0c\u901a\u8fc7GPU-CPU\u5c42\u6b21\u8bed\u4e49\u5b58\u50a8\u5b9e\u73b0\u957f\u4e0a\u4e0b\u6587\u9ad8\u6548\u63a8\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51faSeKV\uff0c\u4e00\u79cd\u57fa\u4e8e\u71b5\u5f15\u5bfc\u8bed\u4e49\u5206\u6bb5\u7684\u81ea\u9002\u5e94KV\u7f13\u5b58\u538b\u7f29\u65b9\u6848\uff0c\u5c06\u4e0a\u4e0b\u6587\u6458\u8981\u5411\u91cf\u5b58\u4e8eGPU\u3001\u4f4e\u79e9SVD\u57fa\u5b58\u4e8eCPU\uff0c\u6309\u9700\u91cd\u5efatoken\u7ea7\u7ec6\u8282\uff0c\u65e0\u9700\u4e22\u5f03\u4efb\u4f55\u4fe1\u606f\u3002", "why_notable": "\u5728\u4e0d\u4e22\u5f03\u4efb\u4f55\u4fe1\u606f\u7684\u524d\u63d0\u4e0b\u5b9e\u73b0\u5927\u5e45\u663e\u5b58\u538b\u7f29\uff0c\u7a81\u7834\u4e86\u73b0\u6709token\u9a71\u9010\u4e0e\u8bed\u4e49\u5206\u7ec4\u65b9\u6cd5\u7684\u6839\u672c\u5c40\u9650\uff0c\u5bf9\u957f\u4e0a\u4e0b\u6587LLM\u5b9e\u9645\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The proliferation of multimedia content on social platforms has fueled multimodal misinformation, where images are used to reinforce false claims. Consequently, Multimodal Fact-Checking (MFC) has emerged as an increasingly important research area. However, current progress is hindered by a reliance on synthetic training data and curated benchmarks that fail to capture the complexity of in-the-wild data. Furthermore, existing detection models rely on restricted intra-modality consistency or unconstrained all-to-all fusion, failing to capture nuanced relations between posts and external evidence. To address these limitations, we introduce X-POSE, a benchmark of real-world, community-annotated multimodal posts from X (formerly Twitter), augmented with full-length news articles retrieved via VLM-optimized search. Additionally, we propose TRENT, a novel MFC model that performs evidence
