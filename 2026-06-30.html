b9e\u9a8c\u8868\u660e\u6c42\u89e3\u5668\u5f15\u5bfc\u7684\u89c4\u5212\u80fd\u6267\u884c\u6240\u6709\u5f3a\u89c4\u5212\u5668\u5de5\u4f5c\u6d41\uff0c\u5b66\u4e60\u63a7\u5236\u5668\u4e5f\u8fbe\u5230\u8f83\u9ad8\u53ef\u6267\u884c\u7387\uff0c\u4f46\u5728\u957f\u65f6\u5e8f\u7cbe\u786e\u7b56\u7565\u9884\u6d4b\u4e0a\u4ecd\u5b58\u5728\u5dee\u8ddd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Ideation plays a pivotal role in scientific discovery. Recent LLM, especially AI Scientist systems, show promising potential for automated ideation. However, existing approaches predominantly rely on pre-defined agentic workflows. This constraint severely limits the flexibility required to navigate the vast search space of scientific literature and the complex action space of research reasoning. Recently, training Agentic LLMs has emerged as a promising direction, offering flexible reasoning frameworks and the capability for autonomous tool utilization. However, there remains a non-trivial challenge: applying previous agentic data synthesis methods to scientific ideation suffers from prohibitively high data synthesis cost. To bridge this gap, we propose Agentic-Ideation, a novel framework comprising an automated trajectory synthesis pipeline and a specialized agentic LLM trained for scientific ideation. Specifically, we first define a comprehensive tool space incorporating three external tools and three cognitive tools. Then we introduce an Oracle-Guided Data Synthesis strategy. By leveraging a reference idea as oracle guidance, this approach steers the multi-agent system to efficiently reconstruct the logical reasoning and tool invocation paths, transforming aimless trial-and-error into directed trajectory generation. Finally, we train the agent on these synthesized trajectories, employing a masking strategy on tool execution results. This ensures the model focuses on decision-making logic without interference from external feedback. Experimental results demonstrate that our method outperforms the SOTA workflow-based baseline by \\textbf{11.91\\%} in overall quality. Furthermore, our approach improves the sample efficiency of high-quality data synthesis by \\textbf{over 10$\\times$}.", "arxiv_id": "2606.31229", "arxiv_url": "https://arxiv.org/abs/2606.31229", "authors": ["Keyu Zhao", "Lingyan Kong", "Fengli Xu", "Yong Li"], "brief": "\u63d0\u51faAgentic-Ideation\u6846\u67b6\uff0c\u901a\u8fc7Oracle\u5f15\u5bfc\u7684\u6570\u636e\u5408\u6210\u7b56\u7565\uff0c\u5c06\u53c2\u8003\u60f3\u6cd5\u4f5c\u4e3a\u5f15\u5bfc\u4fe1\u53f7\u9a71\u52a8\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u9ad8\u6548\u91cd\u5efa\u63a8\u7406\u8def\u5f84\uff0c\u8bad\u7ec3\u4e13\u7528\u79d1\u5b66\u521b\u610f\u751f\u6210\u667a\u80fd\u4f53\u3002\u76f8\u6bd4\u73b0\u6709\u57fa\u4e8e\u9884\u5b9a\u4e49\u5de5\u4f5c\u6d41\u7684\u65b9\u6cd5\uff0c\u6574\u4f53\u8d28\u91cf\u63d0\u534711.91%\uff0c\u9ad8\u8d28\u91cf\u6570\u636e\u5408\u6210\u6548\u7387\u63d0\u5347\u8d8510\u500d\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31229", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u53d1\u73b0", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u636e\u5408\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31229v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agentic-Ideation: Sample Efficient Agentic Trajectories Synthesis for Scientific Ideation Agents", "tldr": "\u63d0\u51faAgentic-Ideation\u6846\u67b6\uff0c\u901a\u8fc7Oracle\u5f15\u5bfc\u7684\u6570\u636e\u5408\u6210\u7b56\u7565\uff0c\u5c06\u53c2\u8003\u60f3\u6cd5\u4f5c\u4e3a\u5f15\u5bfc\u4fe1\u53f7\u9a71\u52a8\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u9ad8\u6548\u91cd\u5efa\u63a8\u7406\u8def\u5f84\uff0c\u8bad\u7ec3\u4e13\u7528\u79d1\u5b66\u521b\u610f\u751f\u6210\u667a\u80fd\u4f53\u3002\u76f8\u6bd4\u73b0\u6709\u57fa\u4e8e\u9884\u5b9a\u4e49\u5de5\u4f5c\u6d41\u7684\u65b9\u6cd5\uff0c\u6574\u4f53\u8d28\u91cf\u63d0\u534711.91%\uff0c\u9ad8\u8d28\u91cf\u6570\u636e\u5408\u6210\u6548\u7387\u63d0\u5347\u8d8510\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Generalizable robotic grasping in cluttered environments is essential for deploying manipulators in unstructured human spaces, yet existing VLM-based methods rely on visual similarity for object matching, neglecting physical affordances such as handle graspability and material fragility, and operate open-loop without spatial reasoning or failure recovery, limiting their effectiveness when objects are densely packed or physically diverse. We present Agentic RAG-VLM, a unified framework that bridges VLM-based semantic understanding and physically grounded grasp execution by integrating retrieval-augmented generation (RAG) with vision-language models (VLMs) and agentic self-reflective planning. Agentic RAG-VLM introduces three tightly coupled components: (1) a Hierarchical Affordance-Aware RAG (HAA-RAG) that encodes four-dimensional affordance descriptors, including type, material, fragility, and graspable region, and retrieves strategies by functional affordance compatibility rather than visual appearance; (2) a Scene Graph Constraint Reasoner that constructs spatial relationship graphs from VLM perception and translates proximity, occlusion, and support constraints into concrete grasp parameter adjustments; and (3) an Agentic Self-Reflective Pipeline with a 14-type failure taxonomy and three-level adaptive retry for closed-loop grasp refinement. Evaluated on a 12-task benchmark spanning single-grasp, interactive, and long-horizon scenarios with 360 trials per configuration, Agentic RAG-VLM achieves 78.3 percent overall success, a 53.3 percentage-point absolute gain over VLM-only baselines, demonstrating that affordance-aware retrieval, scene graph reasoning, and agentic recovery are jointly essential for robust manipulation.", "arxiv_id": "2606.31200", "arxiv_url": "https://arxiv.org/abs/2606.31200", "authors": ["Tao Chen", "Lizheng Liu", "Jiaxu Wang", "Ziyue Jiang", "Ruiqi Tian", "JiGuang Huo", "Zhongxue Gan"], "brief": "\u63d0\u51faAgentic RAG-VLM\u6846\u67b6\uff0c\u5c06\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u4e0e\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7ed3\u5408\uff0c\u901a\u8fc7\u53ef\u4f9b\u6027\u611f\u77e5\u68c0\u7d22\u3001\u573a\u666f\u56fe\u7ea6\u675f\u63a8\u7406\u548c\u81ea\u53cd\u601d\u95ed\u73af\u89c4\u5212\u5b9e\u73b0\u673a\u5668\u4eba\u6293\u53d6\u3002\u572812\u4efb\u52a1\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u8fbe\u523078.3%\u6210\u529f\u7387\uff0c\u6bd4\u7eafVLM\u57fa\u7ebf\u63d0\u534753.3\u4e2a\u767e\u5206\u70b9\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31200", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u673a\u5668\u4eba\u6293\u53d6", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31200v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agentic RAG-VLM: Affordance-Aware Retrieval-Augmented Generation with Self-Reflective Planning for Robotic Grasping", "tldr": "\u63d0\u51faAgentic RAG-VLM\u6846\u67b6\uff0c\u5c06\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u4e0e\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7ed3\u5408\uff0c\u901a\u8fc7\u53ef\u4f9b\u6027\u611f\u77e5\u68c0\u7d22\u3001\u573a\u666f\u56fe\u7ea6\u675f\u63a8\u7406\u548c\u81ea\u53cd\u601d\u95ed\u73af\u89c4\u5212\u5b9e\u73b0\u673a\u5668\u4eba\u6293\u53d6\u3002\u572812\u4efb\u52a1\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u8fbe\u523078.3%\u6210\u529f\u7387\uff0c\u6bd4\u7eafVLM\u57fa\u7ebf\u63d0\u534753.3\u4e2a\u767e\u5206\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent work shows that LLM agents can improve sharp-constant inequalities by searching for extremal constructions, which yield upper bounds. We address the complementary side: a lower bound holds for every admissible function and follows from a convex relaxation of the nonconvex problem, with tighter relaxations giving stronger bounds. We instantiate the autoresearch paradigm to discover such relaxations: a coding agent proposes valid tightening constraints, a theory agent verifies each one and searches for counterexamples, and every reported bound is certified by an explicit dual-feasible point checked in rigorous interval arithmetic. On two optimization constants studied by \\citet{tao2025alphaevolve} - the first autocorrelation inequality ($C_{6.2}$) and the Erd\u0151s minimum-overlap constant ($C_{6.5}$) - we improve the certified lower bounds from $1.28$ to $1.2937$ and from $0.379005$ to $0.37912$, respectively.", "arxiv_id": "2606.31182", "arxiv_url": "https://arxiv.org/abs/2606.31182", "authors": ["Sungyoon Kim", "Mert Pilanci"], "brief": "\u63d0\u51fa\u53cc\u667a\u80fd\u4f53\u6846\u67b6\uff08\u7f16\u7801\u667a\u80fd\u4f53+\u7406\u8bba\u667a\u80fd\u4f53\uff09\u81ea\u52a8\u53d1\u73b0\u51f8\u677e\u5f1b\u4ee5\u6539\u8fdb\u4f18\u5316\u95ee\u9898\u7684\u4e0b\u754c\u8ba4\u8bc1\uff0c\u901a\u8fc7\u4e25\u683c\u533a\u95f4\u7b97\u672f\u9a8c\u8bc1\u5bf9\u5076\u53ef\u884c\u70b9\u3002\u5728\u4e24\u4e2a\u7ecf\u5178\u4f18\u5316\u5e38\u6570\u95ee\u9898\u4e0a\u663e\u8457\u63d0\u5347\u4e86\u5df2\u77e5\u4e0b\u754c\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31182", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u52a8\u5316\u79d1\u7814", "\u51f8\u4f18\u5316", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31182v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AI-Assisted Discovery of Convex Relaxations via Dual Agents", "tldr": "\u63d0\u51fa\u53cc\u667a\u80fd\u4f53\u6846\u67b6\uff08\u7f16\u7801\u667a\u80fd\u4f53+\u7406\u8bba\u667a\u80fd\u4f53\uff09\u81ea\u52a8\u53d1\u73b0\u51f8\u677e\u5f1b\u4ee5\u6539\u8fdb\u4f18\u5316\u95ee\u9898\u7684\u4e0b\u754c\u8ba4\u8bc1\uff0c\u901a\u8fc7\u4e25\u683c\u533a\u95f4\u7b97\u672f\u9a8c\u8bc1\u5bf9\u5076\u53ef\u884c\u70b9\u3002\u5728\u4e24\u4e2a\u7ecf\u5178\u4f18\u5316\u5e38\u6570\u95ee\u9898\u4e0a\u663e\u8457\u63d0\u5347\u4e86\u5df2\u77e5\u4e0b\u754c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper presents an integrated system for the CMU Vision-Language-Action (VLA) Challenge, designed to enable an autonomous agent to perform complex tasks based on natural language instructions. Our framework employs a modular architecture that orchestrates environment mapping, question processing, and navigation. The system operates in two parallel streams: a perception pipeline that constructs a semantic voxel map from real-time camera feeds using OwlViT embeddings, and a language pipeline that classifies user commands with a Vision-Language Model. The mapping is time-constrained; the system proceeds with a partial map if a 500-second exploration limit is reached. The classified query is then grounded in the geometric and semantic context of the map to generate a detailed prompt for the VLM. This yields an actionable output, demonstrating a capable solution for bridging the gap between human language and robotic action.", "arxiv_id": "2606.31144", "arxiv_url": "https://arxiv.org/abs/2606.31144", "authors": ["Anindya Jana", "Snehasis Banerjee", "Arup Sadhu", "Ranjan Dasgupta"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u6a21\u5757\u5316\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u673a\u5668\u4eba\u6846\u67b6\uff0c\u7528\u4e8e\u5ba4\u5185\u73af\u5883\u4e2d\u57fa\u4e8e\u81ea\u7136\u8bed\u8a00\u6307\u4ee4\u7684\u81ea\u4e3b\u4efb\u52a1\u6267\u884c\u3002\u7cfb\u7edf\u5e76\u884c\u8fd0\u884c\u611f\u77e5\u6d41\uff08\u5229\u7528OwlViT\u6784\u5efa\u8bed\u4e49\u4f53\u7d20\u5730\u56fe\uff09\u548c\u8bed\u8a00\u6d41\uff08VLM\u5206\u7c7b\u7528\u6237\u6307\u4ee4\uff09\uff0c\u5c06\u8bed\u4e49\u5730\u56fe\u4e0e\u8bed\u8a00\u7406\u89e3\u7ed3\u5408\u751f\u6210\u53ef\u6267\u884c\u52a8\u4f5c\uff0c\u6709\u6548\u6865\u63a5\u4eba\u7c7b\u8bed\u8a00\u4e0e\u673a\u5668\u4eba\u884c\u4e3a\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31144", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c", "\u6a21\u5757\u5316\u673a\u5668\u4eba", "\u8bed\u4e49\u5730\u56fe", "\u5ba4\u5185\u5bfc\u822a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31144v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "A Modular Vision-Language-Action Robotics Framework for Indoor Environments", "tldr": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u6a21\u5757\u5316\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u673a\u5668\u4eba\u6846\u67b6\uff0c\u7528\u4e8e\u5ba4\u5185\u73af\u5883\u4e2d\u57fa\u4e8e\u81ea\u7136\u8bed\u8a00\u6307\u4ee4\u7684\u81ea\u4e3b\u4efb\u52a1\u6267\u884c\u3002\u7cfb\u7edf\u5e76\u884c\u8fd0\u884c\u611f\u77e5\u6d41\uff08\u5229\u7528OwlViT\u6784\u5efa\u8bed\u4e49\u4f53\u7d20\u5730\u56fe\uff09\u548c\u8bed\u8a00\u6d41\uff08VLM\u5206\u7c7b\u7528\u6237\u6307\u4ee4\uff09\uff0c\u5c06\u8bed\u4e49\u5730\u56fe\u4e0e\u8bed\u8a00\u7406\u89e3\u7ed3\u5408\u751f\u6210\u53ef\u6267\u884c\u52a8\u4f5c\uff0c\u6709\u6548\u6865\u63a5\u4eba\u7c7b\u8bed\u8a00\u4e0e\u673a\u5668\u4eba\u884c\u4e3a\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "While Large Language Models (LLMs) have demonstrated exceptional capabilities in mathematical reasoning, they frequently produce subtle errors that evade human detection. Formal mathematical languages like Lean 4 offer mechanical proof checking, strongly motivating the need for autoformalization: the automatic translation of natural language mathematics into verifiable code. Recent trends indicate that general-purpose LLMs, heavily optimized for standard programming, now outperform smaller models explicitly fine-tuned for Lean. Leveraging this shift, we introduce an agentic autoformalization framework powered by general coding LLMs. At the core of our system is an orchestrator that manages a multi-agent pipeline tailored for research-level mathematics. Because cutting-edge research frequently relies on concepts outside the scope of existing libraries like Mathlib, our system dynamically extends necessary type definitions and validates them via a novel Auxiliary Lemma technique before formalizing the primary theorems. We applied our approach to PutnamBench, producing machine-checked Lean proofs for a random sample of 32 problems. Furthermore, we evaluate our system on five papers from the ACM Symposium on Theory of Computing (STOC) spanning combinatorics, communication complexity, mechanism design, and learning theory, successfully formalizing their main theorems and validating the generated formalizations with human experts; for all five we also formalize the proofs alongside the statements, and notably two of them are proved with no axioms beyond Lean\u0027s kernel. All of our formalizations are available at https://beyondthelibrary.github.io/formal_arxiv .", "arxiv_id": "2606.31134", "arxiv_url": "https://arxiv.org/abs/2606.31134", "authors": ["Arshia Soltani Moakhar", "Iman Gholami", "Max Springer", "Mahdi JafariRaviz", "MohammadTaghi Hajiaghayi"], "brief": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u57fa\u4e8e\u901a\u7528\u4ee3\u7801\u5927\u6a21\u578b\u7684\u667a\u80fd\u4f53\u81ea\u52a8\u5f62\u5f0f\u5316\u6846\u67b6\uff0c\u80fd\u5c06\u7814\u7a76\u7ea7\u6570\u5b66\u8bba\u6587\u81ea\u52a8\u7ffb\u8bd1\u4e3a\u53ef\u673a\u5668\u9a8c\u8bc1\u7684Lean 4\u8bc1\u660e\u3002\u7cfb\u7edf\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u6d41\u6c34\u7ebf\u548c\u8f85\u52a9\u5f15\u7406\u6280\u672f\u52a8\u6001\u6269\u5c55Mathlib\u5e93\u4e4b\u5916\u7684\u6982\u5ff5\uff0c\u6210\u529f\u5f62\u5f0f\u5316\u4e86PutnamBench\u4e2d32\u9053\u9898\u53ca5\u7bc7STOC\u8bba\u6587\u7684\u4e3b\u5b9a\u7406\uff0c\u5e76\u83b7\u4eba\u7c7b\u4e13\u5bb6\u9a8c\u8bc1\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31134", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u52a8\u5f62\u5f0f\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u5b66\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31134v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Beyond the Library: An Agentic Framework for Autoformalizing Research Mathematics", "tldr": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u57fa\u4e8e\u901a\u7528\u4ee3\u7801\u5927\u6a21\u578b\u7684\u667a\u80fd\u4f53\u81ea\u52a8\u5f62\u5f0f\u5316\u6846\u67b6\uff0c\u80fd\u5c06\u7814\u7a76\u7ea7\u6570\u5b66\u8bba\u6587\u81ea\u52a8\u7ffb\u8bd1\u4e3a\u53ef\u673a\u5668\u9a8c\u8bc1\u7684Lean 4\u8bc1\u660e\u3002\u7cfb\u7edf\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u6d41\u6c34\u7ebf\u548c\u8f85\u52a9\u5f15\u7406\u6280\u672f\u52a8\u6001\u6269\u5c55Mathlib\u5e93\u4e4b\u5916\u7684\u6982\u5ff5\uff0c\u6210\u529f\u5f62\u5f0f\u5316\u4e86PutnamBench\u4e2d32\u9053\u9898\u53ca5\u7bc7STOC\u8bba\u6587\u7684\u4e3b\u5b9a\u7406\uff0c\u5e76\u83b7\u4eba\u7c7b\u4e13\u5bb6\u9a8c\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) provide a promising interface for high-level robotic task planning, but their use in multi-UAV collaboration remains difficult to evaluate systematically. Existing UAV simulators mainly emphasize dynamics, perception, or low-level control, while existing LLM-agent benchmarks rarely capture aerial-robotics constraints such as partial observability, spatial coverage, UAV assignment, and multi-vehicle coordination. To bridge this gap, we present MultiUAV-Plat, a lightweight, easy-to-use, LLM-agent-oriented simulation platform for multi-UAV collaborative task planning. The platform exposes concise RESTful APIs, agent-facing observations, role-based information access, hidden validation logic, and optional 2D/3D visualization, allowing agents to solve missions through realistic tool interaction rather than privileged simulator access. Built on this platform, the MultiUAV-Plat Benchmark contains 75 mission sessions, 1500 natural-language tasks, and 9396 validation checks across target assignment, area search, and area assignment and patrol scenarios. We further propose Agent4Drone, a task-specific LLM agent framework that structures multi-UAV behavior into memory, observation, task understanding, planning, execution, and verification. In a full paired benchmark comparison, Agent4Drone achieves a 57.9% task pass rate, a 74.6% average task check pass rate, and a 72.0% global check pass rate, substantially outperforming a ReAct baseline at 30.6%, 47.9%, and 43.1%, respectively. Agent4Drone also reduces the total failed task rate from 32.4% to 12.9%. These results demonstrate that MultiUAV-Plat and MultiUAV-Plat Benchmark provide a reproducible foundation for studying LLM-driven multi-UAV autonomy under realistic information and execution constraints.", "arxiv_id": "2606.31073", "arxiv_url": "https://arxiv.org/abs/2606.31073", "authors": ["Sheng Zhang", "Qinglin Li", "Yuechao Zang", "Xueqin Huang", "Yijia Fu", "Cheng Zhu"], "brief": "\u63d0\u51faMultiUAV-Plat\u5e73\u53f0\uff0c\u4e13\u4e3a\u8bc4\u4f30LLM\u9a71\u52a8\u7684\u591a\u65e0\u4eba\u673a\u534f\u540c\u4efb\u52a1\u89c4\u5212\u800c\u8bbe\u8ba1\uff0c\u5305\u542b1500\u4e2a\u81ea\u7136\u8bed\u8a00\u4efb\u52a1\u548c9396\u9879\u9a8c\u8bc1\u68c0\u67e5\u7684\u57fa\u51c6\u6d4b\u8bd5\u96c6\u3002\u914d\u5957\u7684Agent4Drone\u6846\u67b6\u5728\u4efb\u52a1\u901a\u8fc7\u7387\u4e0a\u8fbe57.9%\uff0c\u5927\u5e45\u8d85\u8d8aReAct\u57fa\u7ebf\u768430.6%\u3002", "categories": ["cs.AI", "cs.MA", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31073", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u65e0\u4eba\u673a\u534f\u540c", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4efb\u52a1\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31073v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "MultiUAV-Plat: An LLM-Oriented Platform, Benchmark and Framework for Multi-UAV Collaborative Task Planning", "tldr": "\u63d0\u51faMultiUAV-Plat\u5e73\u53f0\uff0c\u4e13\u4e3a\u8bc4\u4f30LLM\u9a71\u52a8\u7684\u591a\u65e0\u4eba\u673a\u534f\u540c\u4efb\u52a1\u89c4\u5212\u800c\u8bbe\u8ba1\uff0c\u5305\u542b1500\u4e2a\u81ea\u7136\u8bed\u8a00\u4efb\u52a1\u548c9396\u9879\u9a8c\u8bc1\u68c0\u67e5\u7684\u57fa\u51c6\u6d4b\u8bd5\u96c6\u3002\u914d\u5957\u7684Agent4Drone\u6846\u67b6\u5728\u4efb\u52a1\u901a\u8fc7\u7387\u4e0a\u8fbe57.9%\uff0c\u5927\u5e45\u8d85\u8d8aReAct\u57fa\u7ebf\u768430.6%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent LLM agents benefit from skills for solving complex tasks. Skills encapsulate modular packages of procedural knowledge and instructions for performing specialized tasks, such as setting up a sandboxed environment, running a test suite, or refactoring a function across multiple files. As skill libraries grow and become reusable across tasks and domains, selecting an appropriate skill composition has emerged as a central bottleneck. Existing approaches fall into two categories. One exposes the agent\u0027s reasoning to the entire skill collection; the other performs skill retrieval via embeddings or LLM-based rerankers. Both provide useful insights; however, they miss the structural nature of skill composition, which is a joint decision over which skills, how many, and in what order -- three dimensions that cannot be decoupled. We formalize this as structured skill composition: given a task and a skill library, predict an executable skill plan that jointly specifies the activated subset, count, and execution order. We propose SkillComposer, which instantiates structured skill composition as task-conditioned skill sequence prediction. SkillComposer uses a constrained autoregressive decoder over skill identifiers, so subset, count, and order emerge jointly from a single decoding pass, and dependencies between successive skills are captured naturally. We build a training set of task-composition pairs from a real, human-curated skill library. We then evaluate SkillComposer along two axes: composition quality on a held-out test set, and downstream task success on SkillsBench across two production-grade coding agents. On GPT-5.2-Codex, Gemini-3-Pro-Preview, SkillComposer raises the pass rate by +23.1, +18.2pp over the no-skill baseline, surpassing top-3 retrieval and matching the gold-skill retrieval upper bound at lower prompt-token cost.", "arxiv_id": "2606.32025", "arxiv_url": "https://arxiv.org/abs/2606.32025", "authors": ["Xinyu Zhao", "Zhen Tan", "Vaishnav Tadiparthi", "Nakul Agarwal", "Kwonjoon Lee", "Ehsan Moradi Pari", "Hossein Nourkhiz Mahjoub", "Tianlong Chen"], "brief": "\u63d0\u51faSkillComposer\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7684\u6280\u80fd\u7ec4\u5408\u5f62\u5f0f\u5316\u4e3a\u7ed3\u6784\u5316\u5e8f\u5217\u9884\u6d4b\u95ee\u9898\uff0c\u901a\u8fc7\u7ea6\u675f\u81ea\u56de\u5f52\u89e3\u7801\u5668\u8054\u5408\u9884\u6d4b\u6280\u80fd\u5b50\u96c6\u3001\u6570\u91cf\u548c\u6267\u884c\u987a\u5e8f\u3002\u5728\u7f16\u7a0b\u667a\u80fd\u4f53\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c\u76f8\u6bd4\u65e0\u6280\u80fd\u57fa\u7ebf\u63d0\u534723.1\u548c18.2\u4e2a\u767e\u5206\u70b9\uff0c\u4ee5\u66f4\u4f4etoken\u6210\u672c\u8fbe\u5230\u91d1\u6807\u51c6\u68c0\u7d22\u7684\u4e0a\u754c\u6c34\u5e73\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.32025", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u6280\u80fd\u7ec4\u5408", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.32025v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Generative Skill Composition for LLM Agents", "tldr": "\u63d0\u51faSkillComposer\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7684\u6280\u80fd\u7ec4\u5408\u5f62\u5f0f\u5316\u4e3a\u7ed3\u6784\u5316\u5e8f\u5217\u9884\u6d4b\u95ee\u9898\uff0c\u901a\u8fc7\u7ea6\u675f\u81ea\u56de\u5f52\u89e3\u7801\u5668\u8054\u5408\u9884\u6d4b\u6280\u80fd\u5b50\u96c6\u3001\u6570\u91cf\u548c\u6267\u884c\u987a\u5e8f\u3002\u5728\u7f16\u7a0b\u667a\u80fd\u4f53\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c\u76f8\u6bd4\u65e0\u6280\u80fd\u57fa\u7ebf\u63d0\u534723.1\u548c18.2\u4e2a\u767e\u5206\u70b9\uff0c\u4ee5\u66f4\u4f4etoken\u6210\u672c\u8fbe\u5230\u91d1\u6807\u51c6\u68c0\u7d22\u7684\u4e0a\u754c\u6c34\u5e73\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Theory of Mind (ToM) benchmarks for Large Language Models (LLMs) typically rely on passive question-answering formats, but the deployment of LLMs in increasingly agentic and autonomous forms demands new evaluations. In this paper we evaluate an agent\u0027s ability to induce specific belief states in other agents by taking actions rather than using conversational persuasion, a capability we call Non-Conversational Planning ToM (NCP-ToM). NCP-ToM is likely to be essential for many agent use-cases, including within user-assistant interactions and pedagogical contexts, but may also present manipulation or misinformation risks. Using a novel framework, NCP-ExploreToM, we subvert the conventional task structure by providing models with a set of belief state goals and requiring them to move objects or direct characters into rooms to achieve their goals. We evaluated six frontier models, including GPT-5, Gemini 2.5 Pro and the Claude 4 series, and a cohort of human participants, across 600 task instances. GPT-5 was successful on approximately 80% of tasks in the agentic setting, and was the only model to outperform human participants on our task, but was still less robust than humans across contexts. We additionally found that all models, like humans, performed better on tasks inducing true belief states than false belief states, which is a positive signal for alignment efforts. These findings highlight emerging social-reasoning capabilities in LLMs for non-conversational task completion and underscore the necessity of agentic evaluations for understanding the safety and alignment of autonomous social agents.", "arxiv_id": "2606.31916", "arxiv_url": "https://arxiv.org/abs/2606.31916", "authors": ["Ben Slater", "Matteo G. Mecattaf", "Lucy G. Cheke", "John Burden", "Winnie Street"], "brief": "\u63d0\u51fa\u975e\u5bf9\u8bdd\u5f0f\u5fc3\u667a\u7406\u8bba\uff08NCP-ToM\uff09\u8bc4\u4f30\u6846\u67b6\uff0c\u6d4b\u8bd5LLM\u901a\u8fc7\u79fb\u52a8\u7269\u4f53/\u89d2\u8272\u7b49\u884c\u52a8\uff08\u800c\u975e\u5bf9\u8bdd\uff09\u6765\u8bf1\u5bfc\u4ed6\u4eba\u7279\u5b9a\u4fe1\u5ff5\u72b6\u6001\u7684\u80fd\u529b\u3002GPT-5\u5728\u667a\u80fd\u4f53\u8bbe\u7f6e\u4e2d\u6210\u529f\u7387\u7ea680%\uff0c\u662f\u552f\u4e00\u8d85\u8d8a\u4eba\u7c7b\u53c2\u4e0e\u8005\u7684\u6a21\u578b\uff0c\u4f46\u6240\u6709\u6a21\u578b\u4e0e\u4eba\u7c7b\u4e00\u6837\u5728\u8bf1\u5bfc\u771f\u5b9e\u4fe1\u5ff5\u65f6\u8868\u73b0\u4f18\u4e8e\u865a\u5047\u4fe1\u5ff5\uff0c\u4e3a\u5bf9\u9f50\u7814\u7a76\u63d0\u4f9b\u4e86\u79ef\u6781\u4fe1\u53f7\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31916", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5fc3\u667a\u7406\u8bba", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31916v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Theory of Mind and Persuasion Beyond Conversation: Assessing the Capacity of LLMs to Induce Belief States via Planning and Action", "tldr": "\u63d0\u51fa\u975e\u5bf9\u8bdd\u5f0f\u5fc3\u667a\u7406\u8bba\uff08NCP-ToM\uff09\u8bc4\u4f30\u6846\u67b6\uff0c\u6d4b\u8bd5LLM\u901a\u8fc7\u79fb\u52a8\u7269\u4f53/\u89d2\u8272\u7b49\u884c\u52a8\uff08\u800c\u975e\u5bf9\u8bdd\uff09\u6765\u8bf1\u5bfc\u4ed6\u4eba\u7279\u5b9a\u4fe1\u5ff5\u72b6\u6001\u7684\u80fd\u529b\u3002GPT-5\u5728\u667a\u80fd\u4f53\u8bbe\u7f6e\u4e2d\u6210\u529f\u7387\u7ea680%\uff0c\u662f\u552f\u4e00\u8d85\u8d8a\u4eba\u7c7b\u53c2\u4e0e\u8005\u7684\u6a21\u578b\uff0c\u4f46\u6240\u6709\u6a21\u578b\u4e0e\u4eba\u7c7b\u4e00\u6837\u5728\u8bf1\u5bfc\u771f\u5b9e\u4fe1\u5ff5\u65f6\u8868\u73b0\u4f18\u4e8e\u865a\u5047\u4fe1\u5ff5\uff0c\u4e3a\u5bf9\u9f50\u7814\u7a76\u63d0\u4f9b\u4e86\u79ef\u6781\u4fe1\u53f7\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Autonomous aerial inspection of marine infrastructure is frequently compromised by stochastic sea states, introducing risks of high-kinetic impacts, post-landing toppling, and sensory occlusion. This paper proposes a decoupled, multi-vehicle landing framework synchronizing an Unmanned Surface Vehicle (USV) equipped with a 3-RPU stabilized platform with a robust Unmanned Aerial Vehicle (UAV). The architecture utilizes two independent Deep Reinforcement Learning (DRL) agents: a Soft Actor-Critic (SAC) agent providing high-frequency wave-motion compensation for the landing deck, and a multimodal RL agent for the UAVs final approach. Evaluated in high-fidelity maritime simulations, the system achieved a 100% landing success rate across 15 trials in wave states varying from calm to rough. Results show a mean stabilization efficacy of 87.8%, maintaining the landing surface within 1 degree of the horizontal plane for 96% of the mission duration in rough conditions, effectively contributing to safer landings.", "arxiv_id": "2606.31613", "arxiv_url": "https://arxiv.org/abs/2606.31613", "authors": ["Francisco S. Neves", "Pedro N. Pereira", "Raul D. S. G. Campilho", "Andry M. Pinto"], "brief": "\u63d0\u51fa\u4e00\u79cd\u591a\u6a21\u6001\u667a\u80fd\u4f53AI\u6846\u67b6\uff0c\u7528\u4e8e\u65e0\u4eba\u673a\u5728\u6d77\u4e0a\u5e73\u53f0\u7684\u81ea\u4e3b\u7740\u9646\u3002\u7cfb\u7edf\u7ed3\u5408\u65e0\u4eba\u6c34\u9762\u8247\uff08USV\uff09\u7684\u4e3b\u52a8\u6ce2\u6d6a\u8865\u507f\u5e73\u53f0\u4e0e\u4e24\u4e2a\u72ec\u7acb\u6df1\u5ea6\u5f3a\u5316\u5b66\u4e60\u667a\u80fd\u4f53\uff0c\u5728\u9ad8\u4fdd\u771f\u6d77\u6d0b\u4eff\u771f\u4e2d\u5b9e\u73b015\u6b21\u8bd5\u9a8c100%\u7740\u9646\u6210\u529f\u7387\uff0c\u6076\u52a3\u6d77\u51b5\u4e0b\u5e73\u53f0\u7a33\u5b9a\u7cbe\u5ea6\u8fbe87.8%\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31613", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u65e0\u4eba\u673a", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31613v1", "published_at": "2026-06-30", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Robust Autonomous UAV Landing on Maritime Platforms via Multimodal Agentic AI and Active Wave Compensation", "tldr": "\u63d0\u51fa\u4e00\u79cd\u591a\u6a21\u6001\u667a\u80fd\u4f53AI\u6846\u67b6\uff0c\u7528\u4e8e\u65e0\u4eba\u673a\u5728\u6d77\u4e0a\u5e73\u53f0\u7684\u81ea\u4e3b\u7740\u9646\u3002\u7cfb\u7edf\u7ed3\u5408\u65e0\u4eba\u6c34\u9762\u8247\uff08USV\uff09\u7684\u4e3b\u52a8\u6ce2\u6d6a\u8865\u507f\u5e73\u53f0\u4e0e\u4e24\u4e2a\u72ec\u7acb\u6df1\u5ea6\u5f3a\u5316\u5b66\u4e60\u667a\u80fd\u4f53\uff0c\u5728\u9ad8\u4fdd\u771f\u6d77\u6d0b\u4eff\u771f\u4e2d\u5b9e\u73b015\u6b21\u8bd5\u9a8c100%\u7740\u9646\u6210\u529f\u7387\uff0c\u6076\u52a3\u6d77\u51b5\u4e0b\u5e73\u53f0\u7a33\u5b9a\u7cbe\u5ea6\u8fbe87.8%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Long-range 3D object detection is critical for safe autonomous driving at highway speeds, yet existing radar-camera fusion methods remain limited at extended ranges. BEV-based methods capture scene-level context but incur rapidly growing computation and often lose fine-grained object detail, while query-based methods are efficient but provide limited scene-level context. Temporal fusion further requires both multi-frame accumulation for sparse distant observations and object-level motion modeling for fast-moving objects. We propose Horizon3D, a sparse radar-camera fusion framework for long-range 3D object detection that combines Gaussian primitives with sparse BEV features. Horizon3D initializes Gaussian primitives at radar- and camera-estimated object keypoints using Keypoint-Guided Gaussian Initialization, refines them through Object-Centric Sparse Fusion, and splats them onto the BEV plane to fuse object-level detail with sparse radar BEV context. It further introduces Dual-Path Temporal Fusion, which aggregates temporal cues through a BEV path for scene-level accumulation and a Gaussian path for object-level motion propagation. Experiments on TruckScenes show that Horizon3D achieves state-of-the-art radar-camera 3D detection performance. On the validation set, it outperforms the previous best method by +3.0 NDS and +1.6 mAP while maintaining competitive inference speed.", "arxiv_id": "2606.31096", "arxiv_url": "https://arxiv.org/abs/2606.31096", "authors": ["Geonho Bang", "Geunju Baek", "Dongyoung Lee", "Wonjun Jeong", "Jun Won Choi"], "brief": "\u63d0\u51faHorizon3D\u6846\u67b6\uff0c\u7ed3\u5408\u9ad8\u65af\u57fa\u5143\u4e0e\u7a00\u758fBEV\u7279\u5f81\u5b9e\u73b0\u96f7\u8fbe-\u76f8\u673a\u878d\u5408\u7684\u8fdc\u8ddd\u79bb3D\u76ee\u6807\u68c0\u6d4b\u3002\u901a\u8fc7\u5173\u952e\u70b9\u5f15\u5bfc\u7684\u9ad8\u65af\u521d\u59cb\u5316\u3001\u4ee5\u76ee\u6807\u4e3a\u4e2d\u5fc3\u7684\u7a00\u758f\u878d\u5408\u53ca\u53cc\u8def\u5f84\u65f6\u5e8f\u878d\u5408\uff0c\u5728TruckScenes\u6570\u636e\u96c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u6700\u4f18\u65b9\u6cd53.0 NDS\u548c1.6 mAP\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31096", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "3D\u76ee\u6807\u68c0\u6d4b", "\u591a\u6a21\u6001", "\u96f7\u8fbe\u76f8\u673a\u878d\u5408"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31096v1", "published_at": "2026-06-30", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Horizon3D: Sparse Radar-Camera Fusion for Long-Range 3D Perception in Autonomous Driving", "tldr": "\u63d0\u51faHorizon3D\u6846\u67b6\uff0c\u7ed3\u5408\u9ad8\u65af\u57fa\u5143\u4e0e\u7a00\u758fBEV\u7279\u5f81\u5b9e\u73b0\u96f7\u8fbe-\u76f8\u673a\u878d\u5408\u7684\u8fdc\u8ddd\u79bb3D\u76ee\u6807\u68c0\u6d4b\u3002\u901a\u8fc7\u5173\u952e\u70b9\u5f15\u5bfc\u7684\u9ad8\u65af\u521d\u59cb\u5316\u3001\u4ee5\u76ee\u6807\u4e3a\u4e2d\u5fc3\u7684\u7a00\u758f\u878d\u5408\u53ca\u53cc\u8def\u5f84\u65f6\u5e8f\u878d\u5408\uff0c\u5728TruckScenes\u6570\u636e\u96c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u6700\u4f18\u65b9\u6cd53.0 NDS\u548c1.6 mAP\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Semantic navigation is a fundamental task for embodied agents operating in unseen environments, requiring both semantic understanding and long-term decision-making. Recent foundation models have empowered agents with rich semantic priors for this task. However, without structured global representations, decision-making often falls back on local observations and greedy strategies, resulting in inefficient exploration and myopic behaviors, especially in long-distance navigation. To address these challenges, we propose a zero-shot semantic navigation framework. Our method incrementally maintains an online Hierarchical 3D Scene Graph (HSG) to form a multi-granular semantic topology over objects, zones, and regions, serving as a compact state abstraction for global planning. Building on this memory, we introduce a hierarchical belief-based planning framework that fuses semantic priors with exploration evidence on the HSG, and performs finite-horizon rollouts on an HSG-based simulator to explicitly estimate the long-term expected returns of candidate macro-actions. This enables globally consistent decisions and reduces redundant backtracking. Extensive experiments in high-fidelity simulation environments across multiple tasks and datasets demonstrate that our method outperforms existing state-of-the-art methods, particularly in long-distance scenarios, where our approach improves SR and SPL by an average of 9.4\\% and 5.0\\%, respectively.", "arxiv_id": "2606.31071", "arxiv_url": "https://arxiv.org/abs/2606.31071", "authors": ["Bing Wu", "Zuyao Chen", "Changwen Chen"], "brief": "\u63d0\u51fa\u96f6\u6837\u672c\u8bed\u4e49\u5bfc\u822a\u6846\u67b6\uff0c\u901a\u8fc7\u589e\u91cf\u6784\u5efa\u5c42\u6b21\u53163D\u573a\u666f\u56fe\uff08HSG\uff09\u5b9e\u73b0\u591a\u7c92\u5ea6\u8bed\u4e49\u62d3\u6251\u8868\u793a\uff0c\u5e76\u7ed3\u5408\u57fa\u4e8e\u4fe1\u5ff5\u7684\u5c42\u6b21\u89c4\u5212\u5728HSG\u6a21\u62df\u5668\u4e0a\u8fdb\u884c\u6709\u9650\u89c6\u91ce\u5c55\u5f00\u4ee5\u4f30\u8ba1\u957f\u671f\u56de\u62a5\u3002\u5728\u591a\u4efb\u52a1\u591a\u6570\u636e\u96c6\u5b9e\u9a8c\u4e2d\uff0c\u957f\u8ddd\u79bb\u5bfc\u822a\u573a\u666f\u4e0bSR\u548cSPL\u5206\u522b\u5e73\u5747\u63d0\u53479.4%\u548c5.0%\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31071", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u8bed\u4e49\u5bfc\u822a", "\u573a\u666f\u56fe", "\u5177\u8eab\u667a\u80fd\u4f53", "\u5c42\u6b21\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31071v1", "published_at": "2026-06-30", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Hierarchical 3D Scene Graph Construction and Belief-based Planning for Semantic Navigation", "tldr": "\u63d0\u51fa\u96f6\u6837\u672c\u8bed\u4e49\u5bfc\u822a\u6846\u67b6\uff0c\u901a\u8fc7\u589e\u91cf\u6784\u5efa\u5c42\u6b21\u53163D\u573a\u666f\u56fe\uff08HSG\uff09\u5b9e\u73b0\u591a\u7c92\u5ea6\u8bed\u4e49\u62d3\u6251\u8868\u793a\uff0c\u5e76\u7ed3\u5408\u57fa\u4e8e\u4fe1\u5ff5\u7684\u5c42\u6b21\u89c4\u5212\u5728HSG\u6a21\u62df\u5668\u4e0a\u8fdb\u884c\u6709\u9650\u89c6\u91ce\u5c55\u5f00\u4ee5\u4f30\u8ba1\u957f\u671f\u56de\u62a5\u3002\u5728\u591a\u4efb\u52a1\u591a\u6570\u636e\u96c6\u5b9e\u9a8c\u4e2d\uff0c\u957f\u8ddd\u79bb\u5bfc\u822a\u573a\u666f\u4e0bSR\u548cSPL\u5206\u522b\u5e73\u5747\u63d0\u53479.4%\u548c5.0%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "When does training language models (LMs) to generate explanations of their predictions yield faithful introspection, rather than superficial imitation? We study LMs trained to explain which features of their inputs influenced their behavior, using models\u0027 counterfactual behavior on modified inputs as supervision. Surprisingly, we find that LMs trained on fixed counterfactual explanations derived from earlier checkpoints of themselves, or even from behaviorally similar models in different families, frequently produce explanations more faithful to their own current behaviors than to those of their training targets. This \"introspective\" coupling between LM explanations and behaviors occurs when training explanations remain sufficiently correlated with current behaviors over the course of training, even as behaviors themselves shift. We also show that introspective coupling tracks behavior shifts: when explanation training is provided concurrently with other post-training objectives, explanations track those shifts without requiring updated supervision. This phenomenon appears in multiple tasks, including sycophancy and refusal, and is robust to label noise. Overall, our results show that even fixed datasets of counterfactual explanations can provide scalable and generalizable post-training signal for introspection.", "arxiv_id": "2606.32038", "arxiv_url": "https://arxiv.org/abs/2606.32038", "authors": ["Zifan Carl Guo", "Laura Ruis", "Jacob Andreas", "Belinda Z. Li"], "brief": "\u7814\u7a76\u53d1\u73b0\uff0c\u7528\u56fa\u5b9a\u7684\u53cd\u4e8b\u5b9e\u89e3\u91ca\u6570\u636e\u8bad\u7ec3\u8bed\u8a00\u6a21\u578b\u65f6\uff0c\u6a21\u578b\u751f\u6210\u7684\u89e3\u91ca\u5f80\u5f80\u66f4\u5fe0\u5b9e\u4e8e\u81ea\u8eab\u5f53\u524d\u884c\u4e3a\uff0c\u800c\u975e\u8bad\u7ec3\u76ee\u6807\u7684\u884c\u4e3a\uff0c\u8fd9\u79cd\"\u5185\u7701\u8026\u5408\"\u73b0\u8c61\u5728\u884c\u4e3a\u53d1\u751f\u53d8\u5316\u65f6\u4ecd\u80fd\u6301\u7eed\u8ffd\u8e2a\u3002\u5373\u4f7f\u76d1\u7763\u4fe1\u53f7\u56fa\u5b9a\u4e0d\u53d8\uff0c\u89e3\u91ca\u4e5f\u80fd\u8ddf\u968f\u6a21\u578b\u884c\u4e3a\u7684\u52a8\u6001\u53d8\u5316\uff0c\u4e3a\u53ef\u6269\u5c55\u7684\u5185\u7701\u8bad\u7ec3\u63d0\u4f9b\u4e86\u65b0\u601d\u8def\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.32038", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u8a00\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027", "\u5185\u7701", "\u53cd\u4e8b\u5b9e\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.32038v1", "published_at": "2026-06-30", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Introspective Coupling: Self-Explanation Training Tracks Behavioral Change Despite Fixed Supervision", "tldr": "\u7814\u7a76\u53d1\u73b0\uff0c\u7528\u56fa\u5b9a\u7684\u53cd\u4e8b\u5b9e\u89e3\u91ca\u6570\u636e\u8bad\u7ec3\u8bed\u8a00\u6a21\u578b\u65f6\uff0c\u6a21\u578b\u751f\u6210\u7684\u89e3\u91ca\u5f80\u5f80\u66f4\u5fe0\u5b9e\u4e8e\u81ea\u8eab\u5f53\u524d\u884c\u4e3a\uff0c\u800c\u975e\u8bad\u7ec3\u76ee\u6807\u7684\u884c\u4e3a\uff0c\u8fd9\u79cd\"\u5185\u7701\u8026\u5408\"\u73b0\u8c61\u5728\u884c\u4e3a\u53d1\u751f\u53d8\u5316\u65f6\u4ecd\u80fd\u6301\u7eed\u8ffd\u8e2a\u3002\u5373\u4f7f\u76d1\u7763\u4fe1\u53f7\u56fa\u5b9a\u4e0d\u53d8\uff0c\u89e3\u91ca\u4e5f\u80fd\u8ddf\u968f\u6a21\u578b\u884c\u4e3a\u7684\u52a8\u6001\u53d8\u5316\uff0c\u4e3a\u53ef\u6269\u5c55\u7684\u5185\u7701\u8bad\u7ec3\u63d0\u4f9b\u4e86\u65b0\u601d\u8def\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Metacognition is a critical component of intelligence that describes the ability to monitor and regulate one\u0027s own cognitive processes. Yet LLMs exhibit systemic deficiencies in key metacognitive faculties: they hallucinate with high confidence, fail to recognize knowledge boundaries, and misrepresent their internal uncertainty--undermining trustworthiness and reliability. Since monitoring task performance and adapting behavior accordingly are central to metacognition, we posit that models capable of accurately judging their own performance are better positioned to improve it. We operationalize this idea via two novel mechanisms: reinforcement learning with metacognitive feedback (RLMF), a paradigm to refine completion rankings during preference optimization based on the quality of a model\u0027s self-judgments of performance, and metacognitive data selection, which uses similar self-judgments to identify high-value training examples, outperforming naive active learning. We apply these innovations to the problem of faithful calibration (FC), a task that is itself fundamentally metacognitive: the goal is to align expressed with intrinsic uncertainty, difficult even for frontier LLMs. We adopt a two-stage, decoupled approach, first using these methods to calibrate the faithfulness of models\u0027 self-reported confidence scores, then mapping to natural, context-adaptable linguistic uncertainty via targeted output editing. Extensive experiments show RLMF achieves generalizable, state-of-the-art FC on diverse tasks while preserving accuracy. Further, RLMF surpasses standard RL by up to 63% while enhancing models\u0027 ability to assess and express their own capability limits. This positions RLMF as a promising paradigm to enhance LLM metacognition toward improved abilities and alignment, and suggests metacognitive performance as an effective RL signal to overcome limits of prior intrinsic feedback methods.", "arxiv_id": "2606.32032", "arxiv_url": "https://arxiv.org/abs/2606.32032", "authors": ["Gabrielle Kaili-May Liu", "Avi Caciularu", "Gal Yona", "Idan Szpektor", "Arman Cohan"], "brief": "\u63d0\u51fa\u5143\u8ba4\u77e5\u53cd\u9988\u5f3a\u5316\u5b66\u4e60\uff08RLMF\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u8ba9LLM\u81ea\u6211\u8bc4\u5224\u8868\u73b0\u8d28\u91cf\u6765\u4f18\u5316\u504f\u597d\u5b66\u4e60\uff0c\u89e3\u51b3\u5927\u6a21\u578b\u7f6e\u4fe1\u5ea6\u6821\u51c6\u95ee\u9898\u3002\u5b9e\u9a8c\u8868\u660eRLMF\u5728\u591a\u79cd\u4efb\u52a1\u4e0a\u5b9e\u73b0\u6700\u4f18\u5fe0\u5b9e\u6821\u51c6\u6548\u679c\uff0c\u6bd4\u6807\u51c6RL\u63d0\u5347\u6700\u9ad863%\uff0c\u540c\u65f6\u4fdd\u6301\u6a21\u578b\u51c6\u786e\u7387\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.32032", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4e0d\u786e\u5b9a\u6027\u6821\u51c6", "\u5143\u8ba4\u77e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.32032v1", "published_at": "2026-06-30", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Reinforcement Learning with Metacognitive Feedback Elicits Faithful Uncertainty Expression in LLMs", "tldr": "\u63d0\u51fa\u5143\u8ba4\u77e5\u53cd\u9988\u5f3a\u5316\u5b66\u4e60\uff08RLMF\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u8ba9LLM\u81ea\u6211\u8bc4\u5224\u8868\u73b0\u8d28\u91cf\u6765\u4f18\u5316\u504f\u597d\u5b66\u4e60\uff0c\u89e3\u51b3\u5927\u6a21\u578b\u7f6e\u4fe1\u5ea6\u6821\u51c6\u95ee\u9898\u3002\u5b9e\u9a8c\u8868\u660eRLMF\u5728\u591a\u79cd\u4efb\u52a1\u4e0a\u5b9e\u73b0\u6700\u4f18\u5fe0\u5b9e\u6821\u51c6\u6548\u679c\uff0c\u6bd4\u6807\u51c6RL\u63d0\u5347\u6700\u9ad863%\uff0c\u540c\u65f6\u4fdd\u6301\u6a21\u578b\u51c6\u786e\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "While large language models (LLMs) perform well on table tasks, they still make data referencing errors (DREs), i.e., incorrectly citing or omitting table values, despite understanding the table structure. Beyond final-answer accuracy, DREs directly compromise the correctness and reliability of intermediate reasoning steps. Yet prior studies have only offered limited, small-scale analyses. In this work, we present the first systematic evaluation of tabular data referencing errors across different models and tasks. Our results show that DREs occur across all tested models (1.7B to 20B parameters). Furthermore, we demonstrate that incorporating data referencing as a critic significantly improves answer accuracy up to 12.0%, through critic-based filtering and rejection sampling. Finally, we trained a lightweight 4B-parameter critic model that achieves an average F1 score of 78.2% in detecting both in-distribution and out-of-distribution DREs, and effectively assists inference for larger models.", "arxiv_id": "2606.32029", "arxiv_url": "https://arxiv.org/abs/2606.32029", "authors": ["Yuqing Yang", "Qi Zhu", "Zhen Han", "Boran Han", "Zhengyuan Shen", "Shuai Wang", "Vassilis N. Ioannidis", "Huzefa Rangwala"], "brief": "\u7814\u7a76LLM\u5728\u5904\u7406\u8868\u683c\u4efb\u52a1\u65f6\u5b58\u5728\u7684\u6570\u636e\u5f15\u7528\u9519\u8bef\uff08DRE\uff09\u95ee\u9898\uff0c\u9996\u6b21\u7cfb\u7edf\u6027\u8bc4\u4f30\u4e86\u4e0d\u540c\u6a21\u578b\u548c\u4efb\u52a1\u4e2d\u7684DRE\u73b0\u8c61\u3002\u901a\u8fc7\u5f15\u5165\u6570\u636e\u5f15\u7528\u6279\u8bc4\u6a21\u578b\uff0c\u7b54\u6848\u51c6\u786e\u7387\u6700\u9ad8\u63d0\u534712%\uff0c\u5e76\u8bad\u7ec3\u4e86\u4e00\u4e2a\u8f7b\u91cf\u7ea74B\u53c2\u6570\u6279\u8bc4\u6a21\u578b\uff0cF1\u8fbe78.2%\uff0c\u53ef\u6709\u6548\u8f85\u52a9\u66f4\u5927\u6a21\u578b\u7684\u63a8\u7406\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.32029", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8868\u683c\u7406\u89e3", "\u63a8\u7406\u53ef\u9760\u6027", "\u6279\u8bc4\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.32029v1", "published_at": "2026-06-30", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "When LLMs Read Tables Carelessly: Measuring and Reducing Data Referencing Errors", "tldr": "\u7814\u7a76LLM\u5728\u5904\u7406\u8868\u683c\u4efb\u52a1\u65f6\u5b58\u5728\u7684\u6570\u636e\u5f15\u7528\u9519\u8bef\uff08DRE\uff09\u95ee\u9898\uff0c\u9996\u6b21\u7cfb\u7edf\u6027\u8bc4\u4f30\u4e86\u4e0d\u540c\u6a21\u578b\u548c\u4efb\u52a1\u4e2d\u7684DRE\u73b0\u8c61\u3002\u901a\u8fc7\u5f15\u5165\u6570\u636e\u5f15\u7528\u6279\u8bc4\u6a21\u578b\uff0c\u7b54\u6848\u51c6\u786e\u7387\u6700\u9ad8\u63d0\u534712%\uff0c\u5e76\u8bad\u7ec3\u4e86\u4e00\u4e2a\u8f7b\u91cf\u7ea74B\u53c2\u6570\u6279\u8bc4\u6a21\u578b\uff0cF1\u8fbe78.2%\uff0c\u53ef\u6709\u6548\u8f85\u52a9\u66f4\u5927\u6a21\u578b\u7684\u63a8\u7406\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
