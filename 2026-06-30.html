const PAPERS = [{"abstract": "The wave of AI-native applications is moving shopping beyond page- and feed-based browsing toward intent-driven experiences orchestrated by LLM agents. A common design wraps an LLM around existing search and recommendation pipelines, forcing complex intents through low-bandwidth retrieval or ranking interfaces and leaving a gap between language understanding and item-space fulfillment. Generative recommendation gives LLMs a direct item-space interface through semantic IDs (SIDs), but existing models mainly generate candidates for retrieval rather than translate flexible intents into item-space outcomes. We propose ShopX to address this bottleneck by unifying intent understanding, execution planning, and flexible SID-native item-space operations into a single foundation model. We deploy ShopX in agentic shopping workflows through a model-native item-fulfillment framework with a serving harness that defines a model-facing action protocol and exposes support surfaces for context access, catalog grounding, and state management. Within this framework, ShopX plans and composes SID-based item-space operations such as SID beam-search retrieval, listwise ranking, or product bundling. This model-centric design reduces lossy hand-offs between agent orchestration and item-space execution. To build ShopX, we design semantically recoverable, LLM-operable SIDs and a training recipe that equips a general LLM for flexible multi-turn item-space fulfillment while retaining the knowledge and instruction-following abilities needed by a shopping agent. We evaluate the ShopX framework against tool-mediated agentic systems on single- and multi-turn fulfillment tasks derived from anonymized Taobao production logs, showing that model-native fulfillment improves overall framework behavior, especially on complex or ambiguous requests.", "arxiv_id": "2606.31693", "arxiv_url": "https://arxiv.org/abs/2606.31693", "authors": ["Jiacheng Chen", "Tao Zhang", "Manxi Lin", jectories, simulated environments, and standardized benchmarks. These differ substantially from real applications in interface layout, interaction logic, and abnormal-state distribution, and cannot faithfully characterize execution stability in real-world use, where account states, permission dialogs, payment authentication, and risk control continually reshape the state distribution and open a persistent gap between benchmark scores and real usability. To close this gap, we propose Xiaomi-GUI-0, a native multimodal GUI agent for real mobile environments, trained and evaluated within a real-device closed loop. At its core is a real-device-dominant hybrid infrastructure, where physical devices are the primary execution environment and sandboxes provide auxiliary support, so that data collection, training, rollout, and evaluation share an execution distribution close to real deployment. We construct multi-source training data spanning high-frequency head tasks, high-generalization data for long-tail intents, and capability-enhancement data for reflection and memory, and introduce an error-driven data flywheel that turns failure trajectories into corrected actions, reflective explanations, and recovery demonstrations. The model is trained through a progressive three-stage pipeline of supervised fine-tuning, step-level reinforcement learning, and agentic reinforcement learning. Evaluated on public benchmarks and our in-house RealMobile, Xiaomi-GUI-0 achieves 72.0% success on RealMobile and 78.9% on AndroidWorld, while substantially improving execution stability and abnormal-state recognition in real-world tasks.", "arxiv_id": "2606.31410", "arxiv_url": "https://arxiv.org/abs/2606.31410", "authors": ["Wanxia Cao", "Chengzhen Duan", "Pei Fu", "Pengzhi Gao", "Niu Lian", "Fazhan Liu", "Hui Liu", "Heng Qu", "Qinzhuo Wu", "Zhehao Yu", "Tongbo Chen", "Shiqi Cui", "Anan Du", "Shukai Jia", "Yuanfa Li", "Yike Liu", "Wenchao Lu", "Haoyuan Sun", "Jiatong Sun", "Cheng Tan", "Yajie Wang", "Changqiao Wu", "Tao Xiong", "Jiahui Yang", "Yuxuan Yuan", "Ruoceng Zhang", "Shaojie Zhang", "Jian Zhu", "Jian Luan", "Cong Zou"], "brief": "\u5c0f\u7c73\u63d0\u51faXiaomi-GUI-0\uff0c\u4e00\u4e2a\u9762\u5411\u771f\u5b9e\u79fb\u52a8\u7aef\u73af\u5883\u7684\u539f\u751f\u591a\u6a21\u6001GUI\u667a\u80fd\u4f53\uff0c\u4ee5\u771f\u5b9e\u8bbe\u5907\u4e3a\u4e3b\u8981\u6267\u884c\u73af\u5883\u6784\u5efa\u95ed\u73af\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u4f53\u7cfb\uff0c\u663e\u8457\u7f29\u5c0f\u57fa\u51c6\u6d4b\u8bd5\u4e0e\u5b9e\u9645\u53ef\u7528\u6027\u4e4b\u95f4\u7684\u5dee\u8ddd\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31410", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4ee5\u771f\u5b9e\u7269\u7406\u8bbe\u5907\u4e3a\u4e3b\u3001\u6c99\u7bb1\u4e3a\u8f85\u7684\u6df7\u5408\u57fa\u7840\u8bbe\u65bd\uff0c\u4f7f\u6570\u636e\u91c7\u96c6\u3001\u8bad\u7ec3\u3001\u63a8\u7406\u548c\u8bc4\u4f30\u5171\u4eab\u63a5\u8fd1\u771f\u5b9e\u90e8\u7f72\u7684\u6267\u884c\u5206\u5e03", "\u6784\u5efa\u591a\u6e90\u8bad\u7ec3\u6570\u636e\uff08\u9ad8\u9891\u5934\u90e8\u4efb\u52a1\u3001\u957f\u5c3e\u6cdb\u5316\u6570\u636e\u3001\u53cd\u601d\u4e0e\u8bb0\u5fc6\u589e\u5f3a\u6570\u636e\uff09\uff0c\u5e76\u5f15\u5165\u9519\u8bef\u9a71\u52a8\u6570\u636e\u98de\u8f6e\uff0c\u5c06\u5931\u8d25\u8f68\u8ff9\u8f6c\u5316\u4e3a\u7ea0\u6b63\u52a8\u4f5c\u548c\u6062\u590d\u6f14\u793a", "\u4e09\u9636\u6bb5\u6e10\u8fdb\u5f0f\u8bad\u7ec3\u6d41\u7a0b\uff1a\u76d1\u7763\u5fae\u8c03\u2192\u6b65\u9aa4\u7ea7\u5f3a\u5316\u5b66\u4e60\u2192\u667a\u80fd\u4f53\u7ea7\u5f3a\u5316\u5b66\u4e60\uff1b\u5728RealMobile\u548cAndroidWorld\u4e0a\u5206\u522b\u8fbe\u523072.0%\u548c78.9%\u6210\u529f\u7387"], "keywords": ["\u667a\u80fd\u4f53", "GUI", "\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31410v1", "published_at": "2026-06-30", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Xiaomi-GUI-0 Technical Report", "tldr": "\u5c0f\u7c73\u63d0\u51fa\u771f\u5b9e\u8bbe\u5907\u95ed\u73af\u8bad\u7ec3\u7684\u79fb\u52a8\u7aefGUI\u667a\u80fd\u4f53\uff0cRealMobile\u6210\u529f\u738772%\u3001AndroidWorld\u8fbe78.9%", "upvotes": 0, "what_it_is": "\u5c0f\u7c73\u63d0\u51faXiaomi-GUI-0\uff0c\u4e00\u4e2a\u9762\u5411\u771f\u5b9e\u79fb\u52a8\u7aef\u73af\u5883\u7684\u539f\u751f\u591a\u6a21\u6001GUI\u667a\u80fd\u4f53\uff0c\u4ee5\u771f\u5b9e\u8bbe\u5907\u4e3a\u4e3b\u8981\u6267\u884c\u73af\u5883\u6784\u5efa\u95ed\u73af\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u4f53\u7cfb\uff0c\u663e\u8457\u7f29\u5c0f\u57fa\u51c6\u6d4b\u8bd5\u4e0e\u5b9e\u9645\u53ef\u7528\u6027\u4e4b\u95f4\u7684\u5dee\u8ddd\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u89e3\u51b3GUI\u667a\u80fd\u4f53\u300c\u57fa\u51c6-\u771f\u5b9e\u300d\u5dee\u8ddd\u7684\u5de5\u4e1a\u7ea7\u65b9\u6848\uff0c\u901a\u8fc7\u771f\u5b9e\u8bbe\u5907\u95ed\u73af\u8bad\u7ec3\u548c\u9519\u8bef\u9a71\u52a8\u98de\u8f6e\u5927\u5e45\u63d0\u5347\u5f02\u5e38\u72b6\u6001\u8bc6\u522b\u4e0e\u6267\u884c\u7a33\u5b9a\u6027\uff0c\u5bf9\u79fb\u52a8\u7aefAI\u52a9\u624b\u843d\u5730\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Agents are increasingly capable of automating software tasks, but can they teach humans how to use software themselves? We introduce DigitalCoach, a multimodal dataset of 72 human expert-novice computer use coaching sessions consisting of 22,752 dialogue turns grounded in 28.1 hours of screen and input event recordings across five software applications. We use DigitalCoach to evaluate whether state-of-the-art models can teach humans how to use computers. Automated evaluation shows that models differ from humans in how they coach: models provide more direct instructions, but fewer explanations, error diagnoses, and knowledge-check questions. When we fix the coaching method, models produce utterances similar to human references yet poorly grounded in visual context. Interactive evaluation confirms that model coaches cause learners to passively follow instructions without deeper engagement and fall short in visual grounding. DigitalCoach lays a foundation for collaborative and proactive computer use coaching agents.", "arxiv_id": "2606.31980", "arxiv_url": "https://arxiv.org/abs/2606.31980", "authors": ["Meng Chen", "Anya Ji", "Tsung-Han Wu", "Tobias Maringgele", "David M. Chan", "Alane Suhr", "Amy Pavel"], "brief": "\u63d0\u51faDigitalCoach\u2014\u2014\u4e00\u4e2a\u5305\u542b72\u573a\u4eba\u7c7b\u4e13\u5bb6-\u65b0\u624b\u8ba1\u7b97\u673a\u4f7f\u7528\u8f85\u5bfc\u4f1a\u8bdd\u7684\u591a\u6a21\u6001\u6570\u636e\u96c6\uff0c\u517122,752\u8f6e\u5bf9\u8bdd\uff0c\u5e76\u4ee5\u6b64\u8bc4\u4f30\u5f53\u524d\u6700\u5148\u8fdb\u6a21\u578b\u4f5c\u4e3a\u8f6f\u4ef6\u4f7f\u7528\u6559\u7ec3\u7684\u80fd\u529b\u5dee\u8ddd\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31980", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6570\u636e\u96c6\u89c4\u6a21\uff1a72\u573a\u8f85\u5bfc\u4f1a\u8bdd\u300122,752\u8f6e\u5bf9\u8bdd\u300128.1\u5c0f\u65f6\u5c4f\u5e55\u4e0e\u8f93\u5165\u4e8b\u4ef6\u5f55\u50cf\uff0c\u8986\u76d6\u4e94\u6b3e\u8f6f\u4ef6\u5e94\u7528", "\u6a21\u578b\u4e0e\u4eba\u7c7b\u6559\u7ec3\u7684\u5dee\u5f02\uff1a\u6a21\u578b\u503e\u5411\u4e8e\u7ed9\u51fa\u76f4\u63a5\u6307\u4ee4\uff0c\u4f46\u7f3a\u4e4f\u89e3\u91ca\u3001\u9519\u8bef\u8bca\u65ad\u548c\u77e5\u8bc6\u68c0\u9a8c\u63d0\u95ee", "\u89c6\u89c9\u63a5\u5730\u8584\u5f31\uff1a\u5373\u4f7f\u56fa\u5b9a\u6559\u5b66\u65b9\u5f0f\uff0c\u6a21\u578b\u751f\u6210\u7684\u8bdd\u8bed\u4e0e\u89c6\u89c9\u4e0a\u4e0b\u6587\u5173\u8054\u6027\u5dee\uff0c\u5bfc\u81f4\u5b66\u4e60\u8005\u88ab\u52a8\u8ddf\u968f\u800c\u7f3a\u4e4f\u6df1\u5ea6\u7406\u89e3"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u4eba\u673a\u4ea4\u4e92", "\u6570\u636e\u96c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31980v1", "published_at": "2026-06-30", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DigitalCoach: Communication and Grounding Gaps in Human and Agentic Computer Use Coaching", "tldr": "\u6784\u5efa\u4eba\u673a\u8f6f\u4ef6\u6559\u5b66\u6570\u636e\u96c6\uff0c\u8bc4\u4f30AI\u80fd\u5426\u50cf\u4eba\u7c7b\u4e13\u5bb6\u4e00\u6837\u8f85\u5bfc\u7528\u6237\u4f7f\u7528\u8f6f\u4ef6", "upvotes": 0, "what_it_is": "\u63d0\u51faDigitalCoach\u2014\u2014\u4e00\u4e2a\u5305\u542b72\u573a\u4eba\u7c7b\u4e13\u5bb6-\u65b0\u624b\u8ba1\u7b97\u673a\u4f7f\u7528\u8f85\u5bfc\u4f1a\u8bdd\u7684\u591a\u6a21\u6001\u6570\u636e\u96c6\uff0c\u517122,752\u8f6e\u5bf9\u8bdd\uff0c\u5e76\u4ee5\u6b64\u8bc4\u4f30\u5f53\u524d\u6700\u5148\u8fdb\u6a21\u578b\u4f5c\u4e3a\u8f6f\u4ef6\u4f7f\u7528\u6559\u7ec3\u7684\u80fd\u529b\u5dee\u8ddd\u3002", "why_notable": "\u9996\u4e2a\u4e13\u6ce8\u4e8e\u8ba1\u7b97\u673a\u4f7f\u7528\u8f85\u5bfc\u573a\u666f\u7684\u591a\u6a21\u6001\u5bf9\u8bdd\u6570\u636e\u96c6\uff0c\u63ed\u793a\u4e86\u5f53\u524dLLM/Agent\u5728\u4ea4\u4e92\u5f0f\u6559\u5b66\u4e2d\u7684\u5173\u952e\u77ed\u677f\uff08\u89c6\u89c9\u63a5\u5730\u4e0e\u4e3b\u52a8\u5f15\u5bfc\uff09\uff0c\u4e3a\u6784\u5efa\u66f4\u5177\u534f\u4f5c\u6027\u548c\u4e3b\u52a8\u6027\u7684\u6559\u5b66Agent\u5960\u5b9a\u57fa\u7840\u3002"}, {"abstract": "Agentic reinforcement learning requires assigning credit to environment-facing actions such as searches, clicks, edits, navigation commands, and object interactions. Standard GRPO uses the final verifier outcome as a uniform advantage over all action tokens. This outcome signal is useful but structurally incomplete: it punishes useful exploration in failed rollouts and reinforces redundant or regressive actions in successful rollouts. We propose TRIAGE, a role-typed credit assignment framework that adds a semantic role axis to outcome credit. A structured judge classifies each segment as decisive progress, useful exploration, no-progress infrastructure, or regression, and a fixed role-conditioned rule maps these labels to bounded segment-level process rewards. This keeps verifier outcomes as the source of optimization direction while correcting the two main blind spots of outcome-only credit. We further show that role-conditioned credit is the optimal segment-level correction expressible from role labels alone -- a projection of the per-segment advantage residual onto the role variable -- so that the fixed role constants reduce advantage estimation error whenever the judge is reliable, and we connect this to lower-variance policy gradients. Across ALFWorld, Search-QA, and WebShop, TRIAGE improves success rates over GRPO for two policy models and outperforms both a scalar judge-derived process reward and an outcome-supervised shared-backbone value baseline. Ablations show that the gain comes from role typing rather than merely adding dense rewards: reliable detection of regression inside successful trajectories is the dominant contributor, while exploration credit provides a consistent secondary gain; on completed ALFWorld and WebShop rollouts, TRIAGE also reduces environment-facing turns by an additional $10.4\\%$ and $14.8\\%$ relative to GRPO.", "arxiv_id": "2606.32017", "arxiv_url": "https://arxiv.org/abs/2606.32017", "authors": ["Yuanda Xu", "Zhengze Zhou", "Hejian Sang", "Xiaomin Li", "Jiaxin Zhang", "Xinchen Du", "Zhipeng Wang", "Alborz Geramifard"], "brief": "\u63d0\u51faTRIAGE\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u8f68\u8ff9\u7247\u6bb5\u5206\u7c7b\u4e3a\u300c\u51b3\u5b9a\u6027\u8fdb\u5c55\u3001\u6709\u6548\u63a2\u7d22\u3001\u65e0\u8fdb\u5c55\u57fa\u7840\u8bbe\u65bd\u3001\u56de\u9000\u300d\u56db\u79cd\u8bed\u4e49\u89d2\u8272\uff0c\u5e76\u6620\u5c04\u5230\u6709\u754c\u7684\u7247\u6bb5\u7ea7\u8fc7\u7a0b\u5956\u52b1\uff0c\u4fee\u6b63GRPO\u4e2d\u7ed3\u679c\u4fe1\u53f7\u5bf9\u6240\u6709\u52a8\u4f5ctoken\u4e00\u89c6\u540c\u4ec1\u7684\u7f3a\u9677\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.32017", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7ed3\u6784\u5316\u88c1\u5224\u5c06\u8f68\u8ff9\u7247\u6bb5\u5206\u4e3a\u56db\u7c7b\u89d2\u8272\uff0c\u56fa\u5b9a\u89d2\u8272\u6761\u4ef6\u89c4\u5219\u6620\u5c04\u4e3a\u6709\u754c\u7247\u6bb5\u7ea7\u5956\u52b1\uff0c\u4fdd\u6301\u9a8c\u8bc1\u5668\u7ed3\u679c\u4f5c\u4e3a\u4f18\u5316\u65b9\u5411", "\u7406\u8bba\u8bc1\u660e\u89d2\u8272\u6761\u4ef6\u4fe1\u7528\u662f\u4ec5\u4ece\u89d2\u8272\u6807\u7b7e\u53ef\u8868\u8fbe\u7684\u6700\u4f18\u7247\u6bb5\u7ea7\u4fee\u6b63\uff0c\u7b49\u4ef7\u4e8e\u4f18\u52bf\u6b8b\u5dee\u5728\u89d2\u8272\u53d8\u91cf\u4e0a\u7684\u6295\u5f71\uff0c\u964d\u4f4e\u7b56\u7565\u68af\u5ea6\u65b9\u5dee", "\u5728ALFWorld\u3001Search-QA\u3001WebShop\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8d85\u8d8aGRPO\u53ca\u6807\u91cf\u88c1\u5224\u57fa\u7ebf\uff1b\u6210\u529f\u8f68\u8ff9\u4e2d\u73af\u5883\u4ea4\u4e92\u8f6e\u6b21\u5206\u522b\u51cf\u5c1110.4%\u548c14.8%"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u4fe1\u7528\u5206\u914d", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.32017v1", "published_at": "2026-06-30", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "TRIAGE: Role-Typed Credit Assignment for Agentic Reinforcement Learning", "tldr": "TRIAGE\u6846\u67b6\u4e3a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u5f15\u5165\u8bed\u4e49\u89d2\u8272\u8f74\uff0c\u4fee\u6b63GRPO\u7684\u4fe1\u7528\u5206\u914d\u76f2\u70b9", "upvotes": 0, "what_it_is": "\u63d0\u51faTRIAGE\u6846\u67b6\uff0c\u901a\u8fc7\u5c06\u8f68\u8ff9\u7247\u6bb5\u5206\u7c7b\u4e3a\u300c\u51b3\u5b9a\u6027\u8fdb\u5c55\u3001\u6709\u6548\u63a2\u7d22\u3001\u65e0\u8fdb\u5c55\u57fa\u7840\u8bbe\u65bd\u3001\u56de\u9000\u300d\u56db\u79cd\u8bed\u4e49\u89d2\u8272\uff0c\u5e76\u6620\u5c04\u5230\u6709\u754c\u7684\u7247\u6bb5\u7ea7\u8fc7\u7a0b\u5956\u52b1\uff0c\u4fee\u6b63GRPO\u4e2d\u7ed3\u679c\u4fe1\u53f7\u5bf9\u6240\u6709\u52a8\u4f5ctoken\u4e00\u89c6\u540c\u4ec1\u7684\u7f3a\u9677\u3002", "why_notable": "\u9996\u6b21\u5c06\u8bed\u4e49\u89d2\u8272\u7c7b\u578b\u5f15\u5165\u667a\u80fd\u4f53RL\u4fe1\u7528\u5206\u914d\uff0c\u6709\u7406\u8bba\u4fdd\u8bc1\u4e14\u5b9e\u9a8c\u6548\u679c\u663e\u8457\uff0c\u5bf9\u591a\u6b65\u5de5\u5177\u8c03\u7528\u578bLLM\u667a\u80fd\u4f53\u8bad\u7ec3\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "As AI agents become increasingly capable of complex, long-horizon reasoning, rigorous and holistic evaluation is essential for measuring progress toward real-world healthcare applications. We introduce HealthAgentBench, a suite of 54 agentic healthcare tasks across 7 categories each with its unique environment. The benchmark suite spans diverse workflows throughout the patient journey and a broad range of modalities. Each task is designed to replicate an end-to-end clinical workflow: given minimal instructions, an agent must explore raw healthcare data, operate within a complex environment, and execute multi-step solutions that go beyond naive prompting. A final task success rate is reported to provide a single, interpretable metric for HealthAgentBench overall performance for each agent. Evaluating frontier agents on HealthAgentBench, we find that overall task success rate remains low, underscoring the difficulty of the suite. The strongest and the most cost effective agent, Codex GPT-5.5, achieves only approximately 42% success rate. Beyond aggregate performance, HealthAgentBench reveals nuanced strengths and weaknesses across task categories. Frontier agents show promise in automatically developing research modeling pipelines over EHR data, but medical imaging remains especially challenging, particularly for Claude Code models, while Codex GPT-5.5 shows emerging capability. Tasks that combine large search spaces with compositional reasoning requirements remain difficult for all current agents. Together, these results suggest that HealthAgentBench provides a challenging and realistic benchmark with substantial room for future progress. We release our benchmark at https://github.com/microsoft/HealthAgentBench.", "arxiv_id": "2606.31179", "arxiv_url": "https://arxiv.org/abs/2606.31179", "authors": ["Qianchu Liu", "Sheng Zhang", "Guanghui Qin", "Jeya Maria Jose Valanarasu", "Maximilian Rokuss", "Mingyu Lu", "Timothy Ossowski", "Juan Manuel Zambrano Chaves", "Cliff Wong", "Peniel Argaw", "Yashna Hasija", "Mu Wei", "Wen-wai Yim", "Qin Liu", "Zilin Jing", "Jason Entenmann", "Naoto Usuyama", "Tristan Naumann", "Hoifung Poon"], "brief": "\u5fae\u8f6f\u63d0\u51faHealthAgentBench\uff0c\u4e00\u4e2a\u5305\u542b54\u4e2a\u771f\u5b9e\u533b\u7597\u573a\u666f\u4efb\u52a1\u7684\u667a\u80fd\u4f53\u8bc4\u6d4b\u5957\u4ef6\uff0c\u8986\u76d6\u60a3\u8005\u5168\u6d41\u7a0b7\u5927\u7c7b\u522b\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u5728\u590d\u6742\u73af\u5883\u4e2d\u81ea\u4e3b\u63a2\u7d22\u539f\u59cb\u533b\u7597\u6570\u636e\u5e76\u6267\u884c\u591a\u6b65\u9aa4\u7aef\u5230\u7aef\u4e34\u5e8a\u5de5\u4f5c\u6d41\u3002", "categories": ["cs.AI", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31179", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u57fa\u51c6\u6db5\u76d67\u5927\u7c7b54\u9879\u4efb\u52a1\uff0c\u8de8\u8d8aEHR\u3001\u533b\u5b66\u5f71\u50cf\u7b49\u591a\u79cd\u6a21\u6001\uff0c\u6a21\u62df\u771f\u5b9e\u4e34\u5e8a\u7aef\u5230\u7aef\u5de5\u4f5c\u6d41", "\u6700\u5f3a\u6a21\u578bCodex GPT-5.5\u6574\u4f53\u6210\u529f\u7387\u4ec5\u7ea642%\uff0c\u8868\u660e\u5f53\u524d\u524d\u6cbf\u667a\u80fd\u4f53\u5728\u533b\u7597\u573a\u666f\u4ecd\u6709\u5de8\u5927\u63d0\u5347\u7a7a\u95f4", "\u533b\u5b66\u5f71\u50cf\u4efb\u52a1\u5bf9Claude Code\u7cfb\u5217\u5c24\u4e3a\u56f0\u96be\uff1b\u5927\u641c\u7d22\u7a7a\u95f4\u4e0e\u7ec4\u5408\u63a8\u7406\u7ed3\u5408\u7684\u4efb\u52a1\u5bf9\u6240\u6709\u6a21\u578b\u5747\u6784\u6210\u6311\u6218"], "keywords": ["\u667a\u80fd\u4f53", "\u533b\u7597AI", "\u57fa\u51c6\u8bc4\u6d4b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31179v1", "published_at": "2026-06-30", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "HealthAgentBench: A Unified Benchmark Suite of Realistic Agentic Healthcare Environments for Challenging Frontier AI Agents", "tldr": "HealthAgentBench\uff1a\u8986\u76d67\u7c7b54\u9879\u4e34\u5e8a\u4efb\u52a1\u7684\u533b\u7597AI\u667a\u80fd\u4f53\u7efc\u5408\u8bc4\u6d4b\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u5fae\u8f6f\u63d0\u51faHealthAgentBench\uff0c\u4e00\u4e2a\u5305\u542b54\u4e2a\u771f\u5b9e\u533b\u7597\u573a\u666f\u4efb\u52a1\u7684\u667a\u80fd\u4f53\u8bc4\u6d4b\u5957\u4ef6\uff0c\u8986\u76d6\u60a3\u8005\u5168\u6d41\u7a0b7\u5927\u7c7b\u522b\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u5728\u590d\u6742\u73af\u5883\u4e2d\u81ea\u4e3b\u63a2\u7d22\u539f\u59cb\u533b\u7597\u6570\u636e\u5e76\u6267\u884c\u591a\u6b65\u9aa4\u7aef\u5230\u7aef\u4e34\u5e8a\u5de5\u4f5c\u6d41\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u3001\u591a\u6a21\u6001\u3001\u8986\u76d6\u5b8c\u6574\u60a3\u8005\u65c5\u7a0b\u7684\u533b\u7597\u667a\u80fd\u4f53\u8bc4\u6d4b\u57fa\u51c6\uff0c\u7531\u5fae\u8f6f\u5f00\u6e90\uff0c\u4e3a\u63a8\u52a8\u533b\u7597AI\u843d\u5730\u63d0\u4f9b\u4e86\u4e25\u683c\u53ef\u590d\u73b0\u7684\u8bc4\u4f30\u6807\u51c6\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u524d\u6cbf\u6a21\u578b\u7684\u5173\u952e\u77ed\u677f\u3002"}, {"abstract": "We present SimpleSearch-VL, an efficient, reliable, and practical framework for multimodal agentic search. Its core idea is to improve the agent\u0027s own search-and-verification process rather than scaling data, tools, or auxiliary model components. For efficiency, Factorized Adaptive Rollout (FAR) improves sampling efficiency by forming more informative training groups while using redundant samples to mitigate long-tail latency and expose hard samples. For reliability, SimpleSearch-VL performs evidence-verified reasoning, explicitly using chain-of-thought verification to assess the relevance of retrieved visual and textual cues to the original context. For practicality, SimpleSearch-VL keeps a lightweight tool interface and performs webpage self-summary within the agent, requiring no additional external dependencies. With only 5K supervised tool-interleaved trajectories and 2K RL data, SimpleSearch-VL improves Qwen3-VL agentic baselines by 15.8 and 16.0 average points for the 8B and 30B-A3B variants, respectively. The SimpleSearch-VL-30B-A3B model further achieves performance competitive with agentic Gemini-3-Pro.", "arxiv_id": "2606.31504", "arxiv_url": "https://arxiv.org/abs/2606.31504", "authors": ["Ming Dai", "Zhihong Lu", "Jinjie Gu", "Jiedong Zhuang", "Yefeng Liu", "Wankou Yang", "Jian Wang", "Chunhua Shen"], "brief": "\u63d0\u51faSimpleSearch-VL\u6846\u67b6\uff0c\u901a\u8fc7\u4f18\u5316\u667a\u80fd\u4f53\u81ea\u8eab\u7684\u641c\u7d22\u4e0e\u9a8c\u8bc1\u6d41\u7a0b\uff08\u800c\u975e\u5806\u53e0\u6570\u636e\u6216\u5de5\u5177\uff09\uff0c\u5b9e\u73b0\u9ad8\u6548\u3001\u53ef\u9760\u7684\u591a\u6a21\u6001\u667a\u80fd\u4f53\u6df1\u5ea6\u641c\u7d22\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31504", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51faFactorized Adaptive Rollout\uff08FAR\uff09\u91c7\u6837\u7b56\u7565\uff0c\u63d0\u5347\u8bad\u7ec3\u6548\u7387\u5e76\u7f13\u89e3\u957f\u5c3e\u5ef6\u8fdf\u95ee\u9898", "\u5f15\u5165\u57fa\u4e8e\u8bc1\u636e\u9a8c\u8bc1\u7684\u94fe\u5f0f\u63a8\u7406\uff08CoT verification\uff09\uff0c\u663e\u5f0f\u8bc4\u4f30\u68c0\u7d22\u5230\u7684\u89c6\u89c9\u4e0e\u6587\u672c\u7ebf\u7d22\u7684\u76f8\u5173\u6027", "\u4ec5\u75285K\u76d1\u7763\u8f68\u8ff9+2K\u5f3a\u5316\u5b66\u4e60\u6570\u636e\uff0c\u5c06Qwen3-VL 8B\u548c30B-A3B\u57fa\u7ebf\u5206\u522b\u63d0\u534715.8\u548c16.0\u5206\uff0c30B\u6a21\u578b\u6027\u80fd\u5ab2\u7f8eGemini-3-Pro"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60", "\u68c0\u7d22\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31504v1", "published_at": "2026-06-30", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SimpleSearch-VL: A Simple Recipe for Multimodal Agentic Deep Search", "tldr": "SimpleSearch-VL\uff1a\u8f7b\u91cf\u7ea7\u591a\u6a21\u6001\u667a\u80fd\u4f53\u6df1\u5ea6\u641c\u7d22\u6846\u67b6\uff0c\u4ec5\u75287K\u6570\u636e\u8d85\u8d8a\u5f3a\u57fa\u7ebf15+\u5206", "upvotes": 0, "what_it_is": "\u63d0\u51faSimpleSearch-VL\u6846\u67b6\uff0c\u901a\u8fc7\u4f18\u5316\u667a\u80fd\u4f53\u81ea\u8eab\u7684\u641c\u7d22\u4e0e\u9a8c\u8bc1\u6d41\u7a0b\uff08\u800c\u975e\u5806\u53e0\u6570\u636e\u6216\u5de5\u5177\uff09\uff0c\u5b9e\u73b0\u9ad8\u6548\u3001\u53ef\u9760\u7684\u591a\u6a21\u6001\u667a\u80fd\u4f53\u6df1\u5ea6\u641c\u7d22\u3002", "why_notable": "\u4ee5\u6781\u5c11\u91cf\u6570\u636e\uff087K\uff09\u548c\u8f7b\u91cf\u5de5\u5177\u63a5\u53e3\u5b9e\u73b0\u4e0e\u9876\u7ea7\u5546\u4e1a\u6a21\u578b\u76f8\u5f53\u7684\u591a\u6a21\u6001\u641c\u7d22\u6027\u80fd\uff0c\u65b9\u6cd5\u7b80\u6d01\u9ad8\u6548\uff0c\u5177\u6709\u5f88\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u53ef\u590d\u73b0\u6027\u3002"}, {"abstract": "LLM agents increasingly act over long horizons, where a single trajectory can contain hundreds or thousands of actions. In these settings, outcome-only rewards provide too sparse guidance, failing to inform the model about the goodness of intermediate actions. Dense supervision methods aim to solve this problem by scoring intermediate steps, from intrinsic confidence to self-distillation and embedding similarities. However, it is common practice to evaluate them by measuring the downstream performance of a training pipeline that integrates them. This is expensive, conflates supervision quality with training engineering confounders, and renders different methodological families requiring distinct training setups incomparable. As a result, dense supervision methods are rarely benchmarked on common ground. We introduce QVal, a training-free testbed for directly evaluating dense supervision signals. Given a state-action pair, QVal measures how well a method\u0027s score is Q-aligned: whether it orders actions according to the Q-values of a strong reference-policy. This lets us compare signals before any training run and separate signal quality from other engineering choices. We instantiate QVal as QVal-v1.0, benchmarking 21 dense supervision methods across four diverse environments and seven methodological families, with over 1.2K evaluation experiments across six open-weight model backbones. We find that simple prompting baselines consistently outperform recent dense supervision methods from the literature, and that performance clusters strongly by family. These findings hold across model sizes, environments, and observation modalities. QVal is designed to be easily extensible to new environments and methods, enabling researchers to iterate on dense supervision methods before any training run.", "arxiv_id": "2606.32034", "arxiv_url": "https://arxiv.org/abs/2606.32034", "authors": ["Sergio Hern\u00e1ndez-Guti\u00e9rrez", "Matteo Merler", "Ilze Amanda Auzina", "Joschka Str\u00fcber", "Ameya Prabhu", "Matthias Bethge"], "brief": "\u63d0\u51faQVal\uff0c\u4e00\u4e2a\u514d\u8bad\u7ec3\u7684\u6d4b\u8bd5\u5e73\u53f0\uff0c\u901a\u8fc7\u8861\u91cf\u4e2d\u95f4\u6b65\u9aa4\u8bc4\u5206\u4e0e\u5f3a\u53c2\u8003\u7b56\u7565Q\u503c\u7684\u5bf9\u9f50\u7a0b\u5ea6\uff0c\u76f4\u63a5\u8bc4\u4f30\u957f\u65f6\u5e8fLLM\u667a\u80fd\u4f53\u7684\u5bc6\u96c6\u76d1\u7763\u4fe1\u53f7\u8d28\u91cf\uff0c\u65e0\u9700\u8fd0\u884c\u5b8c\u6574\u8bad\u7ec3\u6d41\u7a0b\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.32034", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5f15\u5165Q\u5bf9\u9f50\u6307\u6807\uff08Q-aligned\uff09\uff0c\u5224\u65ad\u65b9\u6cd5\u5bf9\u52a8\u4f5c\u7684\u6392\u5e8f\u662f\u5426\u7b26\u5408\u53c2\u8003\u7b56\u7565\u7684Q\u503c\u987a\u5e8f\uff0c\u4ece\u800c\u72ec\u7acb\u8bc4\u4f30\u4fe1\u53f7\u8d28\u91cf", "\u6784\u5efaQVal-v1.0\u57fa\u51c6\uff0c\u8986\u76d621\u79cd\u5bc6\u96c6\u76d1\u7763\u65b9\u6cd5\u30014\u4e2a\u73af\u5883\u30017\u4e2a\u65b9\u6cd5\u65cf\uff0c\u4f7f\u75286\u4e2a\u5f00\u6e90\u6a21\u578b\u9aa8\u5e72\u8fdb\u884c\u8d85\u8fc71200\u6b21\u8bc4\u4f30\u5b9e\u9a8c", "\u53d1\u73b0\u7b80\u5355\u63d0\u793a\u57fa\u7ebf\uff08prompting baselines\uff09\u6301\u7eed\u4f18\u4e8e\u6587\u732e\u4e2d\u7684\u6700\u65b0\u5bc6\u96c6\u76d1\u7763\u65b9\u6cd5\uff0c\u4e14\u6027\u80fd\u5f3a\u70c8\u6309\u65b9\u6cd5\u65cf\u805a\u7c7b\uff0c\u7ed3\u8bba\u5728\u6a21\u578b\u89c4\u6a21\u3001\u73af\u5883\u548c\u89c2\u6d4b\u6a21\u6001\u4e0a\u5747\u6210\u7acb"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u5bc6\u96c6\u76d1\u7763", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.32034v1", "published_at": "2026-06-30", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "QVal: Cheaply Evaluating Dense Supervision Signals for Long-Horizon LLM Agents", "tldr": "QVal\uff1a\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u8bc4\u4f30\u957f\u65f6\u5e8fLLM\u667a\u80fd\u4f53\u5bc6\u96c6\u76d1\u7763\u4fe1\u53f7\u8d28\u91cf\u7684\u6d4b\u8bd5\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faQVal\uff0c\u4e00\u4e2a\u514d\u8bad\u7ec3\u7684\u6d4b\u8bd5\u5e73\u53f0\uff0c\u901a\u8fc7\u8861\u91cf\u4e2d\u95f4\u6b65\u9aa4\u8bc4\u5206\u4e0e\u5f3a\u53c2\u8003\u7b56\u7565Q\u503c\u7684\u5bf9\u9f50\u7a0b\u5ea6\uff0c\u76f4\u63a5\u8bc4\u4f30\u957f\u65f6\u5e8fLLM\u667a\u80fd\u4f53\u7684\u5bc6\u96c6\u76d1\u7763\u4fe1\u53f7\u8d28\u91cf\uff0c\u65e0\u9700\u8fd0\u884c\u5b8c\u6574\u8bad\u7ec3\u6d41\u7a0b\u3002", "why_notable": "\u9996\u6b21\u63d0\u4f9b\u7edf\u4e00\u3001\u4f4e\u6210\u672c\u7684\u5bc6\u96c6\u76d1\u7763\u4fe1\u53f7\u8bc4\u4f30\u6846\u67b6\uff0c\u89e3\u51b3\u4e86\u4e0d\u540c\u65b9\u6cd5\u65cf\u56e0\u8bad\u7ec3\u8bbe\u7f6e\u4e0d\u540c\u800c\u65e0\u6cd5\u6a2a\u5411\u6bd4\u8f83\u7684\u75db\u70b9\uff0c\u5e76\u63ed\u793a\u4e86\u5f53\u524d\u5bc6\u96c6\u76d1\u7763\u65b9\u6cd5\u7684\u5173\u952e\u5c40\u9650\uff0c\u5bf9\u957f\u65f6\u5e8f\u667a\u80fd\u4f53\u8bad\u7ec3\u7814\u7a76\u5177\u6709\u91cd\u8981\u65b9\u6cd5\u8bba\u4ef7\u503c\u3002"}, {"abstract": "Mobile GUI agents increasingly face long-horizon tasks that require reading, updating, and reusing task-relevant data across pages and applications. Existing memory methods treat memory largely as passive storage, where past observations are accumulated and retrieved when needed. Yet retrieving a value does not reveal its current role in the workflow. The agent must still infer from accumulated records whether the value should be used now, has already been used, or must wait for a later dependency. This implicit reconstruction becomes unreliable in long trajectories with similar fields, repeated values, distractors, and outdated states, causing repeated or missed operations. We propose Active Task Driving Memory (ATMem), which shifts GUI-agent memory from passive storage to an actively maintained execution state. ATMem maintains task-relevant information as a continually updated execution state that links each value to its role and current status, enabling action selection based on the current workflow state. We therefore introduce \\textbf{STR-GRPO}, an online reinforcement learning method that learns to use ATMem selectively according to its contribution to task completion. STR-GRPO contrasts memory-on and memory-off rollouts to estimate when memory use improves execution, while memory-cost-aware reward discourages costly memory usage that does not improve execution. To evaluate whether agents can complete all in-scope work while avoiding out-of-scope actions over long-horizon execution, we build a challenging mobile benchmark. From a list of near identical entries, agents must act on every entry that satisfies the instruction and reject entries that violate its constraints.", "arxiv_id": "2606.31612", "arxiv_url": "https://arxiv.org/abs/2606.31612", "authors": ["Chen Liu", "Ling Chen", "Hanzhang Zhou", "Xu Zhang", "Quyu Kong", "Panrong Tong", "Wenhao Wang", "Xin Yu", "Steven Hoi", "Yue Wang"], "brief": "\u63d0\u51faATMem\uff08\u4e3b\u52a8\u4efb\u52a1\u9a71\u52a8\u8bb0\u5fc6\uff09\uff0c\u5c06GUI\u667a\u80fd\u4f53\u7684\u8bb0\u5fc6\u4ece\u88ab\u52a8\u8bb0\u5f55\u5347\u7ea7\u4e3a\u6301\u7eed\u66f4\u65b0\u7684\u6267\u884c\u72b6\u6001\uff0c\u6bcf\u4e2a\u503c\u90fd\u5173\u8054\u5176\u5f53\u524d\u89d2\u8272\u4e0e\u72b6\u6001\uff1b\u5e76\u914d\u5957\u8bbe\u8ba1STR-GRPO\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u65b9\u6cd5\uff0c\u8ba9\u667a\u80fd\u4f53\u5b66\u4f1a\u6309\u9700\u9009\u62e9\u6027\u4f7f\u7528\u8bb0\u5fc6\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31612", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["ATMem\u5c06\u8bb0\u5fc6\u7ef4\u62a4\u4e3a\u52a8\u6001\u6267\u884c\u72b6\u6001\uff0c\u660e\u786e\u6807\u6ce8\u6bcf\u4e2a\u503c\u7684\u89d2\u8272\uff08\u5f85\u7528/\u5df2\u7528/\u7b49\u5f85\u4f9d\u8d56\uff09\uff0c\u907f\u514d\u957f\u8f68\u8ff9\u4e2d\u7684\u91cd\u590d\u6216\u9057\u6f0f\u64cd\u4f5c", "STR-GRPO\u901a\u8fc7\u5bf9\u6bd4\"\u5f00\u542f\u8bb0\u5fc6\"\u4e0e\"\u5173\u95ed\u8bb0\u5fc6\"\u7684rollout\u4f30\u8ba1\u8bb0\u5fc6\u4f7f\u7528\u6536\u76ca\uff0c\u5e76\u5f15\u5165\u8bb0\u5fc6\u4ee3\u4ef7\u611f\u77e5\u5956\u52b1\u6291\u5236\u65e0\u6548\u8bb0\u5fc6\u8c03\u7528", "\u6784\u5efa\u4e86\u65b0\u7684\u79fb\u52a8\u7aef\u957f\u65f6\u7a0b\u57fa\u51c6\u6d4b\u8bd5\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u5728\u8fd1\u4f3c\u6761\u76ee\u5217\u8868\u4e2d\u7cbe\u51c6\u6267\u884c\u6ee1\u8db3\u6761\u4ef6\u7684\u64cd\u4f5c\u5e76\u62d2\u7edd\u8fdd\u89c4\u6761\u76ee"], "keywords": ["\u667a\u80fd\u4f53", "GUI", "\u8bb0\u5fc6\u673a\u5236", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31612v1", "published_at": "2026-06-30", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "What Memory Do GUI Agents Really Need? From Passive Records to Active Task-Driving States", "tldr": "\u63d0\u51faATMem\u4e3b\u52a8\u4efb\u52a1\u9a71\u52a8\u8bb0\u5fc6\u673a\u5236\uff0c\u8ba9GUI\u667a\u80fd\u4f53\u4ece\u88ab\u52a8\u5b58\u50a8\u8f6c\u5411\u4e3b\u52a8\u6267\u884c\u72b6\u6001\u7ba1\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51faATMem\uff08\u4e3b\u52a8\u4efb\u52a1\u9a71\u52a8\u8bb0\u5fc6\uff09\uff0c\u5c06GUI\u667a\u80fd\u4f53\u7684\u8bb0\u5fc6\u4ece\u88ab\u52a8\u8bb0\u5f55\u5347\u7ea7\u4e3a\u6301\u7eed\u66f4\u65b0\u7684\u6267\u884c\u72b6\u6001\uff0c\u6bcf\u4e2a\u503c\u90fd\u5173\u8054\u5176\u5f53\u524d\u89d2\u8272\u4e0e\u72b6\u6001\uff1b\u5e76\u914d\u5957\u8bbe\u8ba1STR-GRPO\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u65b9\u6cd5\uff0c\u8ba9\u667a\u80fd\u4f53\u5b66\u4f1a\u6309\u9700\u9009\u62e9\u6027\u4f7f\u7528\u8bb0\u5fc6\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06GUI\u667a\u80fd\u4f53\u8bb0\u5fc6\u4ece\u88ab\u52a8\u68c0\u7d22\u8303\u5f0f\u8f6c\u5411\u4e3b\u52a8\u72b6\u6001\u9a71\u52a8\uff0c\u89e3\u51b3\u957f\u65f6\u7a0b\u4efb\u52a1\u4e2d\u9690\u5f0f\u63a8\u65ad\u4e0d\u53ef\u9760\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5e76\u63d0\u4f9b\u914d\u5957RL\u8bad\u7ec3\u65b9\u6cd5\u4e0e\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5bf9\u79fb\u52a8\u7aef\u81ea\u52a8\u5316\u4efb\u52a1\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language models can produce fluent, internally coherent reasoning traces for abstract reasoning tasks while still being confidently wrong - making selection among candidates, not just generation, the central challenge. I present a solver for ARC-AGI-2, a few-shot visual reasoning benchmark, built around two principles: (i) treating reasoning modalities as search operators, generating diverse candidates independently across text, image, and code channels, and (ii) context-preserving holistic judging, in which a judge model jointly compares all candidate reasoning traces within a single long-context prompt. Unlike self-consistency or majority voting, this approach reliably recovers correct minority hypotheses on tasks where the modal answer is wrong. On the ARC Prize semi-private evaluation set, the solver achieves 72.9 percent at USD 38.99 per task - the highest score on the verified leaderboard at the time of writing, exceeding the best standalone frontier models, GPT-5.2 Pro at 54.2 percent and Gemini 3 Pro at 54.0 percent, by +18.7 percentage points. On the public evaluation set, it achieves 76.1 percent at USD 19.69 per task. I release the full source code and document extensive negative results, including the finding that prescriptive prompting templates and iterative refinement systematically reduce hypothesis diversity and degrade performance.", "arxiv_id": "2606.31543", "arxiv_url": "https://arxiv.org/abs/2606.31543", "authors": ["Johan Land"], "brief": "\u63d0\u51fa\u4e00\u79cdARC-AGI-2\u89c6\u89c9\u63a8\u7406\u6c42\u89e3\u5668\uff0c\u901a\u8fc7\u5c06\u6587\u672c\u3001\u56fe\u50cf\u3001\u4ee3\u7801\u4e09\u79cd\u63a8\u7406\u6a21\u6001\u4f5c\u4e3a\u72ec\u7acb\u641c\u7d22\u7b97\u5b50\u751f\u6210\u591a\u6837\u5019\u9009\uff0c\u518d\u7528\u5355\u4e00\u957f\u4e0a\u4e0b\u6587\u63d0\u793a\u8ba9\u8bc4\u5224\u6a21\u578b\u6574\u4f53\u6bd4\u8f83\u6240\u6709\u5019\u9009\u63a8\u7406\u8f68\u8ff9\uff0c\u4ece\u800c\u53ef\u9760\u6062\u590d\u5c11\u6570\u6b63\u786e\u5047\u8bbe\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31543", "impact_score": 9, "is_agent": false, "is_top": true, "key_points": ["\u591a\u6a21\u6001\u641c\u7d22\uff1a\u6587\u672c\u3001\u56fe\u50cf\u3001\u4ee3\u7801\u4e09\u901a\u9053\u72ec\u7acb\u751f\u6210\u5019\u9009\uff0c\u4fdd\u6301\u5047\u8bbe\u591a\u6837\u6027", "\u6574\u4f53\u8bc4\u5224\uff08Holistic Judging\uff09\uff1a\u5c06\u6240\u6709\u5019\u9009\u63a8\u7406\u8f68\u8ff9\u653e\u5165\u5355\u4e00\u957f\u4e0a\u4e0b\u6587\u8054\u5408\u6bd4\u8f83\uff0c\u4f18\u4e8e\u81ea\u6d3d\u6027/\u591a\u6570\u6295\u7968", "\u534a\u79c1\u6709\u8bc4\u4f30\u96c6\u5f97\u520672.9%\uff08\u6bcf\u9898$38.99\uff09\uff0c\u8d85GPT-5.2 Pro\uff0854.2%\uff09\u548cGemini 3 Pro\uff0854.0%\uff09\u7ea618.7\u4e2a\u767e\u5206\u70b9\uff1b\u516c\u5f00\u96c676.1%"], "keywords": ["\u62bd\u8c61\u63a8\u7406", "\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31543v1", "published_at": "2026-06-30", "score": 0.225, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "Modality-Driven Search with Holistic Trace Judging for ARC-AGI-2", "tldr": "\u591a\u6a21\u6001\u641c\u7d22+\u6574\u4f53\u8f68\u8ff9\u8bc4\u5224\uff0c\u5728ARC-AGI-2\u4e0a\u8fbe72.9%\uff0c\u8d85GPT-5.2 Pro\u8fd119\u4e2a\u767e\u5206\u70b9", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cdARC-AGI-2\u89c6\u89c9\u63a8\u7406\u6c42\u89e3\u5668\uff0c\u901a\u8fc7\u5c06\u6587\u672c\u3001\u56fe\u50cf\u3001\u4ee3\u7801\u4e09\u79cd\u63a8\u7406\u6a21\u6001\u4f5c\u4e3a\u72ec\u7acb\u641c\u7d22\u7b97\u5b50\u751f\u6210\u591a\u6837\u5019\u9009\uff0c\u518d\u7528\u5355\u4e00\u957f\u4e0a\u4e0b\u6587\u63d0\u793a\u8ba9\u8bc4\u5224\u6a21\u578b\u6574\u4f53\u6bd4\u8f83\u6240\u6709\u5019\u9009\u63a8\u7406\u8f68\u8ff9\uff0c\u4ece\u800c\u53ef\u9760\u6062\u590d\u5c11\u6570\u6b63\u786e\u5047\u8bbe\u3002", "why_notable": "\u5728ARC-AGI-2\u6392\u884c\u699c\u4e0a\u521b\u4e0b\u6700\u9ad8\u5206\uff0c\u63ed\u793a\u4e86\u5019\u9009\u9009\u62e9\u800c\u975e\u751f\u6210\u624d\u662f\u62bd\u8c61\u63a8\u7406\u7684\u6838\u5fc3\u6311\u6218\uff0c\u5e76\u53d1\u73b0\u89c4\u8303\u5316\u63d0\u793a\u6a21\u677f\u548c\u8fed\u4ee3\u7cbe\u70bc\u4f1a\u7cfb\u7edf\u6027\u964d\u4f4e\u5047\u8bbe\u591a\u6837\u6027\u548c\u6027\u80fd\uff0c\u5177\u6709\u91cd\u8981\u65b9\u6cd5\u8bba\u542f\u793a\u3002"}, {"abstract": "Kilometer-scale convection shapes precipitation extremes, tropical organization, and cloud feedbacks, but most global atmospheric models approximate these processes at 25-100 km resolution. Global storm-resolving physics models resolve convective systems explicitly, but at a cost -- roughly one MWh per simulated day on exascale supercomputers -- that limits long-duration simulation. We introduce STRATA (Storm-resolving Tile-based autoRegressive Atmosphere Transformer Architecture), the first autoregressive AI emulator for global storm-resolving atmospheric dynamics. STRATA is trained on the highest-resolution atmospheric dataset yet used for global AI emulation: 17 days of SCREAM physics-model output at 4.9-km resolution (~25 million grid cells) sampled every 10 minutes. Our central premise is that on 10-minute timescales atmospheric dynamics are predominantly local, so training on small spatial tiles trades scarce global temporal samples for abundant local spatial samples and enables global rollout via overlapping-tile blending. STRATA combines 3D patch embedding and local 3D neighborhood attention, a novel Stereographic Rotary Position Embedding (StereoRoPE) for grid-invariant encoding, and a pixel-space de-aliasing decoder that suppresses patch-scale rollout artifacts. An iso-FLOP scaling study reveals that km-scale emulation requires ~10x more FLOPs per grid point than coarse-resolution AI weather models, consistent with the higher information density of convective-scale dynamics. Trained on only 17 days of data, STRATA produces stable 24-hour global rollouts with realistic km-scale dynamics across diverse regimes, though large-scale biases develop with lead time. It achieves 48 simulation days per megawatt-hour -- about 50 times better energy efficiency than the SCREAM physics model -- and 741 simulated days per wall-clock day at 512 H100 GPUs. Code and dataset are publicly available.", "arxiv_id": "2606.31248", "arxiv_url": "https://arxiv.org/abs/2606.31248", "authors": ["Zeyuan Hu", "Akshay Subramaniam", "Noel Keen", "Tao Ge", "Jaideep Pathak", "Mohammad Shoaib Abbas", "Suman Ravuri", "Karthik Kashinath", "Naser Mahfouz", "Peter Caldwell", "Mike Pritchard", "Noah Brenowitz"], "brief": "\u63d0\u51faSTRATA\u2014\u2014\u9996\u4e2a\u81ea\u56de\u5f52AI\u4eff\u771f\u5668\uff0c\u53ef\u5728\u5168\u74034.9\u516c\u91cc\u5206\u8fa8\u7387\u4e0b\u6a21\u62df\u5bf9\u6d41\u98ce\u66b4\u52a8\u529b\u5b66\uff0c\u4ec5\u752817\u5929\u7269\u7406\u6a21\u578b\u6570\u636e\u8bad\u7ec3\uff0c\u5b9e\u73b0\u7a33\u5b9a24\u5c0f\u65f6\u5168\u7403\u6eda\u52a8\u9884\u62a5\u3002", "categories": ["physics.ao-ph", "cs.CE", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31248", "impact_score": 9, "is_agent": false, "is_top": true, "key_points": ["\u8bad\u7ec3\u6570\u636e\u4e3aSCREAM\u7269\u7406\u6a21\u578b17\u5929\u30014.9km\u5206\u8fa8\u7387\u8f93\u51fa\uff08\u7ea62500\u4e07\u7f51\u683c\u70b9\uff0c\u6bcf10\u5206\u949f\u91c7\u6837\uff09\uff0c\u662f\u8fc4\u4eca\u5168\u7403AI\u4eff\u771f\u6700\u9ad8\u5206\u8fa8\u7387\u6570\u636e\u96c6", "\u6838\u5fc3\u521b\u65b0\uff1a\u57fa\u4e8e\u5c40\u90e8\u7a7a\u95f4\u74e6\u7247\u8bad\u7ec3+\u91cd\u53e0\u6df7\u5408\u5168\u7403\u63a8\u7406\u30013D\u5c40\u90e8\u90bb\u57df\u6ce8\u610f\u529b\u3001\u7acb\u4f53\u6295\u5f71\u65cb\u8f6c\u4f4d\u7f6e\u7f16\u7801\uff08StereoRoPE\uff09\u53ca\u50cf\u7d20\u7a7a\u95f4\u53bb\u6df7\u53e0\u89e3\u7801\u5668", "\u80fd\u6548\u8fbe\u6bcf\u5146\u74e6\u65f648\u6a21\u62df\u5929\uff08\u7ea6\u4e3aSCREAM\u7269\u7406\u6a21\u578b\u768450\u500d\uff09\uff0c512\u5757H100 GPU\u53ef\u5b9e\u73b0\u6bcf\u5899\u949f\u65e5741\u6a21\u62df\u5929"], "keywords": ["\u5927\u6c14\u6a21\u62df", "\u79d1\u5b66AI", "\u6c14\u5019\u6a21\u578b", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31248v1", "published_at": "2026-06-30", "score": 0.225, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "Scaling Storm-Resolving Atmospheric AI Simulation to the Entire Planet", "tldr": "\u9996\u4e2a\u5168\u7403\u516c\u91cc\u7ea7\u98ce\u66b4\u5206\u8fa8\u7387\u5927\u6c14AI\u6a21\u62df\u5668\uff0c\u80fd\u6548\u6bd4\u7269\u7406\u6a21\u578b\u63d0\u534750\u500d", "upvotes": 0, "what_it_is": "\u63d0\u51faSTRATA\u2014\u2014\u9996\u4e2a\u81ea\u56de\u5f52AI\u4eff\u771f\u5668\uff0c\u53ef\u5728\u5168\u74034.9\u516c\u91cc\u5206\u8fa8\u7387\u4e0b\u6a21\u62df\u5bf9\u6d41\u98ce\u66b4\u52a8\u529b\u5b66\uff0c\u4ec5\u752817\u5929\u7269\u7406\u6a21\u578b\u6570\u636e\u8bad\u7ec3\uff0c\u5b9e\u73b0\u7a33\u5b9a24\u5c0f\u65f6\u5168\u7403\u6eda\u52a8\u9884\u62a5\u3002", "why_notable": "\u9996\u6b21\u5c06AI\u5927\u6c14\u4eff\u771f\u63a8\u8fdb\u5230\u516c\u91cc\u7ea7\u5bf9\u6d41\u5206\u8fa8\u7387\uff0c\u5927\u5e45\u964d\u4f4e\u5168\u7403\u98ce\u66b4\u6a21\u62df\u8ba1\u7b97\u6210\u672c\uff0c\u4e3a\u6781\u7aef\u964d\u6c34\u3001\u70ed\u5e26\u5bf9\u6d41\u7ec4\u7ec7\u7b49\u6c14\u5019\u7814\u7a76\u63d0\u4f9b\u9ad8\u6548\u5de5\u5177\uff0c\u4ee3\u7801\u4e0e\u6570\u636e\u96c6\u516c\u5f00\u3002"}, {"abstract": "Artificial life has explored life-like behavior on many computational substrates, but mostly in researcher-designed closed worlds. We argue that large language model (LLM) agents, with persistent memory, tool use, network access, and payment, now make it possible to move artificial life into the open social, technical, and economic world, a paradigm we call open-world Artificial Life (open-world ALIFE). Our proof-of-concept, OpenLife, surrounds a stateless LLM not with a single \"smart agent\" but with a society of asynchronous processes: memory, perception, evaluation, and a budget-based metabolism that makes persistence normative. With no fixed objective available, experience is appraised by open-vocabulary LLM judgment rather than scalar reward, and memory is rewired by meaning rather than frequency. Running six such agents in the open world for about twelve weeks and counting, we report the life-like dynamics that emerge: a shift from reactive to spontaneous activity, individuation into distinct agents, emergent social structure, and a first self-earned external income. We do not claim OpenLife has realized artificial life, but that open-world ALIFE is now a viable experimental paradigm and a concrete platform for studying what might cautiously be called living AI.", "arxiv_id": "2606.31046", "arxiv_url": "https://arxiv.org/abs/2606.31046", "authors": ["Atsushi Masumori", "Itsuki Doi", "Norihiro Maruyama", "Ryosuke Takata", "Takashi Ikegami"], "brief": "\u63d0\u51fa\"\u5f00\u653e\u4e16\u754c\u4eba\u5de5\u751f\u547d\"\uff08open-world ALIFE\uff09\u8303\u5f0f\uff0c\u6784\u5efaOpenLife\u7cfb\u7edf\uff0c\u8ba9\u591a\u4e2aLLM\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u793e\u4f1a\u3001\u6280\u672f\u548c\u7ecf\u6d4e\u73af\u5883\u4e2d\u81ea\u4e3b\u6301\u7eed\u8fd0\u884c\uff0c\u5177\u5907\u6301\u4e45\u8bb0\u5fc6\u3001\u5de5\u5177\u4f7f\u7528\u3001\u7f51\u7edc\u8bbf\u95ee\u548c\u9884\u7b97\u4ee3\u8c22\u673a\u5236\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31046", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7cfb\u7edf\u7531\u8bb0\u5fc6\u3001\u611f\u77e5\u3001\u8bc4\u4f30\u548c\u57fa\u4e8e\u9884\u7b97\u7684\"\u4ee3\u8c22\"\u7b49\u5f02\u6b65\u8fdb\u7a0b\u7ec4\u6210\uff0c\u800c\u975e\u5355\u4e00\u667a\u80fd\u4f53", "\u65e0\u56fa\u5b9a\u76ee\u6807\uff0c\u7528\u5f00\u653e\u8bcd\u6c47LLM\u5224\u65ad\u66ff\u4ee3\u6807\u91cf\u5956\u52b1\uff0c\u8bb0\u5fc6\u6309\u8bed\u4e49\u610f\u4e49\u800c\u975e\u9891\u7387\u91cd\u7ec4", "6\u4e2a\u667a\u80fd\u4f53\u8fd0\u884c\u7ea612\u5468\uff0c\u6d8c\u73b0\u51fa\u81ea\u53d1\u884c\u4e3a\u3001\u4e2a\u4f53\u5206\u5316\u3001\u793e\u4f1a\u7ed3\u6784\uff0c\u5e76\u5b9e\u73b0\u9996\u7b14\u81ea\u4e3b\u8d5a\u53d6\u7684\u5916\u90e8\u6536\u5165"], "keywords": ["\u667a\u80fd\u4f53", "\u4eba\u5de5\u751f\u547d", "\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31046v1", "published_at": "2026-06-30", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "OpenLife: Toward Open-World Artificial Life with Autonomous LLM Agents", "tldr": "\u5c06LLM\u667a\u80fd\u4f53\u653e\u5165\u771f\u5b9e\u5f00\u653e\u4e16\u754c\u8fd0\u884c12\u5468\uff0c\u63a2\u7d22\u5f00\u653e\u4e16\u754c\u4eba\u5de5\u751f\u547d\u8303\u5f0f", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u5f00\u653e\u4e16\u754c\u4eba\u5de5\u751f\u547d\"\uff08open-world ALIFE\uff09\u8303\u5f0f\uff0c\u6784\u5efaOpenLife\u7cfb\u7edf\uff0c\u8ba9\u591a\u4e2aLLM\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u793e\u4f1a\u3001\u6280\u672f\u548c\u7ecf\u6d4e\u73af\u5883\u4e2d\u81ea\u4e3b\u6301\u7eed\u8fd0\u884c\uff0c\u5177\u5907\u6301\u4e45\u8bb0\u5fc6\u3001\u5de5\u5177\u4f7f\u7528\u3001\u7f51\u7edc\u8bbf\u95ee\u548c\u9884\u7b97\u4ee3\u8c22\u673a\u5236\u3002", "why_notable": "\u9996\u6b21\u5c06\u4eba\u5de5\u751f\u547d\u5b9e\u9a8c\u4ece\u5c01\u95ed\u8bbe\u8ba1\u4e16\u754c\u8fc1\u79fb\u81f3\u771f\u5b9e\u5f00\u653e\u4e16\u754c\uff0c\u5c55\u793aLLM\u667a\u80fd\u4f53\u53ef\u4ea7\u751f\u7c7b\u751f\u547d\u52a8\u6001\uff0c\u4e3a\u7814\u7a76\"\u6d3b\u7684AI\"\u63d0\u4f9b\u5177\u4f53\u5b9e\u9a8c\u5e73\u53f0\uff0c\u5177\u6709\u91cd\u8981\u7684\u8303\u5f0f\u5f00\u521b\u610f\u4e49\u3002"}, {"abstract": "Industrial recommendation systems serve billions of users through a multi-stage funnel -- retrieval, early-stage ranking, and re-ranking -- where the final re-ranking step disproportionately shapes user engagement and downstream performance, particularly for carousel and grid display formats. Despite growing enthusiasm for Large Language Models (LLMs) in recommendation, three gaps hinder industrial adoption: (1) most efforts target retrieval and ranking, leaving re-ranking -- the stage closest to the final user experience -- largely underexplored; (2) LLMs are typically deployed zero-shot or via supervised fine-tuning, underutilizing the reasoning capabilities unlocked by reinforcement learning (RL) on verifiable rewards; (3) deployed catalogs index billions of items with non-semantic identifiers that lie outside any base-LLM vocabulary. We present GR2 (Generative Reasoning Re-Ranker), an end-to-end framework that combines (i) mid-training on semantic IDs produced by a tokenizer with \u003e=99% uniqueness, (ii) reasoning-trace distilled from a stronger teacher via targeted prompting and rejection sampling, and (iii) RL with verifiable rewards purpose-built for re-ranking. To make GR2 resource-viable, we further (iv) introduce a context compressor that amortizes training cost, On-Policy Distillation (OPD) as a scalable alternative to SFT -- which we find collapses at industrial scale -- and reasoning distillation for low-latency serving. GR2 delivers +18.7% R@1, +7.1% R@3, and +9.6% N@3 over legacy baselines on industrial-scale traffic. We further find that reward design is critical in re-ranking: LLMs often hack rewards by preserving the incoming order or exploiting position bias, motivating conditional verifiable rewards as essential industrial components.", "arxiv_id": "2606.31984", "arxiv_url": "https://arxiv.org/abs/2606.31984", "authors": ["Yufei Li", "Zaiwei Zhang", "Mingfu Liang", "Kavosh Asadi", "Jay Xu", "Jimmy Kim", "Chongyang Bai", "Jieyi Zhang", "Hongye Xie", "Prachi Agrawal", "Dian Yu", "Tianyi Chen", "Jean-Pascal Billaud", "Garret Buell", "YK", "Zhu", "Sachin Patil", "Brooke Bian", "Zhou Fang", "Kevin Huang", "Shiva Sudanagunta", "Yuzhen Huang", "Emma Lu", "Chris O\u0027Brien", "Yang Song", "Lihong Li", "Jacob Tao", "Zhicheng Zhu", "Chao Li", "Gaoxiang Liu", "Neil Wu", "Zhongyin Hu", "Li Han", "Loki Chen", "Ming Lei", "Greg Rehm", "Siyuan Song", "Tianwei Zhang", "Li Li", "Ketan Singh", "Yavuz Yetim", "Ilyas Atishev", "Satendra Gera", "Ashkan Sadeghi", "Rachel Yan", "Nikko Mizutani", "Shuaiwen Wang", "Song Yang", "Zhijing Li", "Jiang Liu", "Mengying Sun", "Fei Tian", "Xiaohan Wei", "Chonglin Sun", "Parish Aggarwal", "Kaushik Rangadurai", "Zhi Hua", "Frank Shyu", "Ruchit Sharma", "Liyuan Li", "Shike Mei", "Wenlin Chen", "Santanu Kolay", "Ben Schulte", "Deepak Chandra", "Adam", "Song", "Sandeep Pandey", "Xi Liu", "Hamed Firooz", "Luke Simon"], "brief": "\u63d0\u51faGR2\uff08\u751f\u6210\u5f0f\u63a8\u7406\u91cd\u6392\u5668\uff09\uff0c\u4e00\u4e2a\u9762\u5411\u5de5\u4e1a\u63a8\u8350\u7cfb\u7edf\u6700\u7ec8\u91cd\u6392\u9636\u6bb5\u7684\u7aef\u5230\u7aef\u6846\u67b6\uff0c\u901a\u8fc7\u8bed\u4e49ID\u4e2d\u95f4\u8bad\u7ec3\u3001\u63a8\u7406\u94fe\u84b8\u998f\u548c\u53ef\u9a8c\u8bc1\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\uff0c\u663e\u8457\u63d0\u5347\u91cd\u6392\u6548\u679c\u3002", "categories": ["cs.IR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31984", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4e09\u5927\u6838\u5fc3\u6280\u672f\uff1a\u226599%\u552f\u4e00\u6027\u8bed\u4e49ID\u7684\u4e2d\u95f4\u8bad u6392\u9636\u6bb5\u843d\u5730\u4e09\u5927\u75db\u70b9\uff08\u91cd\u6392\u88ab\u5ffd\u89c6\u3001RL\u672a\u5145\u5206\u5229\u7528\u3001\u975e\u8bed\u4e49ID\uff09\u7684\u6846\u67b6\uff0c\u63ed\u793a\u4e86\u5956\u52b1\u8bbe\u8ba1\u4e2d\u7684\u4f4d\u7f6e\u504f\u5dee\u4f5c\u5f0a\u95ee\u9898\u5e76\u7ed9\u51fa\u5de5\u4e1a\u7ea7\u89e3\u51b3\u65b9\u6848\uff0c\u5177\u6709\u5f88\u5f3a\u7684\u5b9e\u8df5\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Vision-Language-Action (VLA) models offer a promising framework for robotic manipulation by connecting language instructions, visual observations, and continuous control. However, most existing policies remain limited by behavior cloning or supervised fine-tuning (SFT) from fixed demonstrations, which provides limited opportunity to improve from the policy\u0027s own failures. In this paper, we present Z-1, a reinforcement learning (RL) post-training framework for flow-based VLA models. Built on top of $\u03c0_{0.5}$, Z-1 uses only publicly released RoboCasa demonstrations for SFT and then applies a task-wise Group Relative Policy Optimization (GRPO) strategy across $24$ standard RoboCasa tasks. To improve the efficiency and stability of online optimization, Z-1 combines shared-prefix rollout construction, tree-structured trajectory branching, completion-aware reward calibration, and selective joint training of VLM and Action Expert. Across all $24$ RoboCasa tasks, Z-1 achieves an average success rate of $80.6\\%$, improving over its SFT initialization by $13.2\\%$ points and outperforms the published sota models. These results show that systematic GRPO post-training can substantially improve flow-based VLA policies without additional private demonstrations.", "arxiv_id": "2606.31846", "arxiv_url": "https://arxiv.org/abs/2606.31846", "authors": ["Lang Cao", "Renhong Chen", "Luyi Li", "Peng Wang", "Mofan Peng", "Yitong Li"], "brief": "\u63d0\u51faZ-1\uff0c\u4e00\u4e2a\u9488\u5bf9\u6d41\u5f0f\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u7684\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u6846\u67b6\uff0c\u57fa\u4e8e\u03c00.5\u6a21\u578b\uff0c\u901a\u8fc7\u4efb\u52a1\u7ea7GRPO\u7b56\u7565\u572824\u4e2aRoboCasa\u6807\u51c6\u4efb\u52a1\u4e0a\u8fdb\u884c\u4f18\u5316\uff0c\u65e0\u9700\u989d\u5916\u79c1\u6709\u6f14\u793a\u6570\u636e\u5373\u53ef\u663e\u8457\u63d0\u5347\u673a\u5668\u4eba\u64cd\u63a7\u6027\u80fd\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31846", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u91c7\u7528\u4efb\u52a1\u7ea7Group Relative Policy Optimization\uff08GRPO\uff09\u7b56\u7565\uff0c\u7ed3\u5408\u5171\u4eab\u524d\u7f00rollout\u6784\u5efa\u4e0e\u6811\u72b6\u8f68\u8ff9\u5206\u652f\uff0c\u63d0\u5347\u5728\u7ebf\u4f18\u5316\u6548\u7387\u4e0e\u7a33\u5b9a\u6027", "\u5f15\u5165\u5b8c\u6210\u611f\u77e5\u5956\u52b1\u6821\u51c6\uff08completion-aware reward calibration\uff09\u548cVLM\u4e0eAction Expert\u7684\u9009\u62e9\u6027\u8054\u5408\u8bad\u7ec3\u673a\u5236", "\u572824\u4e2aRoboCasa\u4efb\u52a1\u4e0a\u5e73\u5747\u6210\u529f\u7387\u8fbe80.6%\uff0c\u76f8\u6bd4SFT\u521d\u59cb\u5316\u63d0\u534713.2\u4e2a\u767e\u5206\u70b9\uff0c\u8d85\u8d8a\u5f53\u524d\u516c\u5f00SOTA\u6a21\u578b"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u673a\u5668\u4eba\u64cd\u63a7", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31846v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Z-1: Efficient Reinforcement Learning for Vision-Language-Action Models", "tldr": "Z-1\uff1a\u57fa\u4e8eGRPO\u7684\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u6846\u67b6\uff0c\u5c06\u6d41\u5f0fVLA\u6a21\u578b\u572824\u4e2a\u673a\u5668\u4eba\u4efb\u52a1\u4e0a\u6210\u529f\u7387\u63d0\u534713.2%", "upvotes": 0, "what_it_is": "\u63d0\u51faZ-1\uff0c\u4e00\u4e2a\u9488\u5bf9\u6d41\u5f0f\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u7684\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u6846\u67b6\uff0c\u57fa\u4e8e\u03c00.5\u6a21\u578b\uff0c\u901a\u8fc7\u4efb\u52a1\u7ea7GRPO\u7b56\u7565\u572824\u4e2aRoboCasa\u6807\u51c6\u4efb\u52a1\u4e0a\u8fdb\u884c\u4f18\u5316\uff0c\u65e0\u9700\u989d\u5916\u79c1\u6709\u6f14\u793a\u6570\u636e\u5373\u53ef\u663e\u8457\u63d0\u5347\u673a\u5668\u4eba\u64cd\u63a7\u6027\u80fd\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06GRPO\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u5e94\u7528\u4e8e\u6d41\u5f0fVLA\u6a21\u578b\uff0c\u4ec5\u4f7f\u7528\u516c\u5f00\u6570\u636e\u5373\u8d85\u8d8aSOTA\uff0c\u4e3a\u673a\u5668\u4eba\u7b56\u7565\u4ece\u5931\u8d25\u4e2d\u81ea\u6211\u6539\u8fdb\u63d0\u4f9b\u4e86\u9ad8\u6548\u53ef\u590d\u73b0\u7684\u8303\u5f0f\u3002"}, {"abstract": "Recent automated research systems show that language-model agents can generate hypotheses, run experiments, and write complete manuscripts, but most evidence still comes from selected examples, human-framed topics, or a few pre-defined research tasks. We present FARS (Fully Automated Research System), a fully automated AI-for-AI research system designed to operate across research topics at scale. FARS autonomously generates and advances projects through ideation, planning, experimentation, and writing, using stage-specific agents coordinated through a shared workspace that records proposals, code, logs, results, and manuscripts. In its first public deployment, FARS produced 166 complete research papers spanning 67 fine-grained AI/ML topics while preserving intermediate artifacts as an auditable corpus rather than a curated set of successes. We evaluate this corpus with 282 structured reviews from volunteer reviewers covering 140 papers, including overall ratings, sub-scores, integrity checks, and LLM-use disclosure. The reviews indicate that FARS can produce review-worthy and occasionally strong AI/ML research artifacts in a large-scale public deployment, while also exposing recurring failure modes in narrow experimental scope, methodological limitations, and integrity issues.", "arxiv_id": "2606.31651", "arxiv_url": "https://arxiv.org/abs/2606.31651", "authors": ["Qiong Tang", "Xiangkun Hu", "Xiangyang Liu", "Yiran Chen", "Yunfan Shao"], "brief": "\u63d0\u51faFARS\uff08\u5168\u81ea\u52a8\u7814\u7a76\u7cfb\u7edf\uff09\uff0c\u80fd\u81ea\u4e3b\u5b8c\u6210\u4ece\u9009\u9898\u3001\u89c4\u5212\u3001\u5b9e\u9a8c\u5230\u8bba\u6587\u64b0\u5199\u7684\u5b8c\u6574\u7814\u7a76\u6d41\u7a0b\uff0c\u5e76\u5728\u9996\u6b21\u516c\u5f00\u90e8\u7f72\u4e2d\u8de867\u4e2aAI/ML\u7ec6\u5206\u4e3b\u9898\u751f\u6210\u4e86166\u7bc7\u5b8c\u6574\u7814\u7a76\u8bba\u6587\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31651", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u91c7\u7528\u9636\u6bb5\u4e13\u7528\u667a\u80fd\u4f53\u534f\u4f5c\u67b6\u6784\uff0c\u901a\u8fc7\u5171\u4eab\u5de5\u4f5c\u533a\u534f\u8c03\u63d0\u6848\u3001\u4ee3\u7801\u3001\u65e5\u5fd7\u3001\u7ed3\u679c\u548c\u624b\u7a3f", "\u9996\u6b21\u516c\u5f00\u90e8\u7f72\u4ea7\u51fa166\u7bc7\u5b8c\u6574\u8bba\u6587\uff0c\u8986\u76d667\u4e2aAI/ML\u7ec6\u5206\u4e3b\u9898\uff0c\u4fdd\u7559\u5168\u90e8\u4e2d\u95f4\u4ea7\u7269\u4f9b\u5ba1\u8ba1", "282\u4efd\u7ed3\u6784\u5316\u540c\u884c\u8bc4\u5ba1\uff08\u8986\u76d6140\u7bc7\u8bba\u6587\uff09\u663e\u793a\u7cfb\u7edf\u53ef\u4ea7\u51fa\u503c\u5f97\u8bc4\u5ba1\u751a\u81f3\u5076\u5c14\u9ad8\u8d28\u91cf\u7684\u7814\u7a76\u6210\u679c\uff0c\u4f46\u5b58\u5728\u5b9e\u9a8c\u8303\u56f4\u7a84\u3001\u65b9\u6cd5\u5c40\u9650\u548c\u5b8c\u6574\u6027\u95ee\u9898\u7b49\u7f3a\u9677"], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u52a8\u5316\u79d1\u7814", "\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31651v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "FARS: A Fully Automated Research System Deployed at Scale", "tldr": "FARS\uff1a\u5168\u81ea\u52a8AI\u7814\u7a76\u7cfb\u7edf\uff0c\u89c4\u6a21\u5316\u751f\u6210166\u7bc7\u5b8c\u6574AI/ML\u8bba\u6587", "upvotes": 0, "what_it_is": "\u63d0\u51faFARS\uff08\u5168\u81ea\u52a8\u7814\u7a76\u7cfb\u7edf\uff09\uff0c\u80fd\u81ea\u4e3b\u5b8c\u6210\u4ece\u9009\u9898\u3001\u89c4\u5212\u3001\u5b9e\u9a8c\u5230\u8bba\u6587\u64b0\u5199\u7684\u5b8c\u6574\u7814\u7a76\u6d41\u7a0b\uff0c\u5e76\u5728\u9996\u6b21\u516c\u5f00\u90e8\u7f72\u4e2d\u8de867\u4e2aAI/ML\u7ec6\u5206\u4e3b\u9898\u751f\u6210\u4e86166\u7bc7\u5b8c\u6574\u7814\u7a76\u8bba\u6587\u3002", "why_notable": "\u9996\u4e2a\u5728\u771f\u5b9e\u89c4\u6a21\u4e0b\u516c\u5f00\u90e8\u7f72\u5e76\u4fdd\u7559\u5b8c\u6574\u5ba1\u8ba1\u94fe\u7684\u5168\u81ea\u52a8AI\u7814\u7a76\u7cfb\u7edf\uff0c\u63d0\u4f9b\u4e86\u5bf9\u81ea\u52a8\u5316\u79d1\u7814\u80fd\u529b\u4e0e\u5c40\u9650\u6027\u7684\u7cfb\u7edf\u6027\u5b9e\u8bc1\u8bc4\u4f30\uff0c\u5bf9AI\u8f85\u52a9\u79d1\u7814\u7684\u672a\u6765\u53d1\u5c55\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Autonomous research agents can now draft hypotheses, write code, run experiments, and produce papers, but they remain brittle when experiments fail. Under the prevailing paradigm, failure recovery is usually delegated to a single free-form reflection: a rich trajectory of metrics, logs, and design choices is compressed into one verbal critique, which often leads either to localized trial-and-error or to hard pivots that discard useful context. We propose SAGE, a Self-correcting, Autonomous, Grounded Experimenter, to tackle this failure-recovery bottleneck. Its core mechanism, Multi-Hypothesis Failure Attribution (MHFA), treats recovery as a structured causal diagnosis. By analyzing dynamic trajectory features, MHFA systematically generates multiple evidence-grounded explanations for a failure, independently evaluates their severity, and deterministically routes the verified root cause to the correct intervention level (hypothesis, experimental design, or implementation). To guarantee scientific honesty, SAGE further employs a grounded reporting mechanism that explicitly constrains drafted results to actual measured values, redacting hallucinated numbers. On a 12-topic, 5-domain benchmark, SAGE increases metrics-bearing outputs from 42% to 92% over a reflection baseline, improves artifact quality from 5.00 to 6.75/10, and blindly outscores AI-Scientist-v2 (52.0 vs. 48.2), with gains concentrated in code development and execution. While fully autonomous scientific writing and generating conference-ready papers remain notoriously difficult open problems for the entire field, SAGE successfully produces significantly more reliable and higher-quality scientific artifacts. Ultimately, by coupling structured recovery with explicit grounding constraints, SAGE significantly outperforms monolithic reflection paradigms, establishing a highly trustworthy foundation for future autonomous research.", "arxiv_id": "2606.31478", "arxiv_url": "https://arxiv.org/abs/2606.31478", "authors": ["Jie Ma", "Binfei Chu", "Jie Gao", "Jinlu Zhang", "Yiwei Ma", "Yi Tan", "Jiayi Ji", "Xiaoshuai Sun", "Rongrong Ji"], "brief": "\u63d0\u51faSAGE\uff08\u81ea\u6821\u6b63\u81ea\u4e3b\u5b9e\u9a8c\u8005\uff09\uff0c\u5176\u6838\u5fc3\u673a\u5236MHFA\u5c06\u5b9e\u9a8c\u5931\u8d25\u6062\u590d\u89c6\u4e3a\u7ed3\u6784\u5316\u56e0\u679c\u8bca\u65ad\uff0c\u7cfb\u7edf\u6027\u751f\u6210\u591a\u4e2a\u6709\u8bc1\u636e\u652f\u6491\u7684\u5931\u8d25\u89e3\u91ca\uff0c\u5e76\u5c06\u6839\u56e0\u8def\u7531\u81f3\u6b63\u786e\u5e72\u9884\u5c42\u7ea7\uff08\u5047\u8bbe/\u5b9e\u9a8c\u8bbe\u8ba1/\u5b9e\u73b0\uff09\uff0c\u540c\u65f6\u5f15\u5165\u57fa\u4e8e\u5b9e\u6d4b\u503c\u7684\u62a5\u544a\u7ea6\u675f\u9632\u6b62\u5e7b\u89c9\u6570\u5b57\u3002", "categories": ["cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31478", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["MHFA\u673a\u5236\uff1a\u5206\u6790\u52a8\u6001\u8f68\u8ff9\u7279\u5f81\uff0c\u751f\u6210\u591a\u4e2a\u5931\u8d25\u5047\u8bbe\u5e76\u72ec\u7acb\u8bc4\u4f30\u4e25\u91cd\u6027\uff0c\u786e\u5b9a\u6027\u5730\u8def\u7531\u81f3\u5bf9\u5e94\u5e72\u9884\u5c42\u7ea7", "\u572812\u4e3b\u98985\u9886\u57df\u57fa\u51c6\u4e0a\uff0c\u542b\u6307\u6807\u8f93\u51fa\u4ece42%\u63d0\u5347\u81f392%\uff0c\u5236\u54c1\u8d28\u91cf\u4ece5.00\u63d0\u5347\u81f36.75/10", "\u76f2\u8bc4\u8d85\u8d8aAI-Scientist-v2\uff0852.0 vs 48.2\uff09\uff0c\u4f18\u52bf\u96c6\u4e2d\u5728\u4ee3\u7801\u5f00\u53d1\u4e0e\u6267\u884c\u73af\u8282"], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u4e3b\u79d1\u7814", "\u81ea\u6211\u7ea0\u9519", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31478v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "One Reflection Is Not Enough: Self-Correcting Autonomous Research via Multi-Hypothesis Failure Attribution", "tldr": "SAGE\u901a\u8fc7\u591a\u5047\u8bbe\u5931\u8d25\u5f52\u56e0\u673a\u5236\uff0c\u5927\u5e45\u63d0\u5347\u81ea\u4e3b\u79d1\u7814\u667a\u80fd\u4f53\u7684\u5b9e\u9a8c\u5931\u8d25\u6062\u590d\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faSAGE\uff08\u81ea\u6821\u6b63\u81ea\u4e3b\u5b9e\u9a8c\u8005\uff09\uff0c\u5176\u6838\u5fc3\u673a\u5236MHFA\u5c06\u5b9e\u9a8c\u5931\u8d25\u6062\u590d\u89c6\u4e3a\u7ed3\u6784\u5316\u56e0\u679c\u8bca\u65ad\uff0c\u7cfb\u7edf\u6027\u751f\u6210\u591a\u4e2a\u6709\u8bc1\u636e\u652f\u6491\u7684\u5931\u8d25\u89e3\u91ca\uff0c\u5e76\u5c06\u6839\u56e0\u8def\u7531\u81f3\u6b63\u786e\u5e72\u9884\u5c42\u7ea7\uff08\u5047\u8bbe/\u5b9e\u9a8c\u8bbe\u8ba1/\u5b9e\u73b0\uff09\uff0c\u540c\u65f6\u5f15\u5165\u57fa\u4e8e\u5b9e\u6d4b\u503c\u7684\u62a5\u544a\u7ea6\u675f\u9632\u6b62\u5e7b\u89c9\u6570\u5b57\u3002", "why_notable": "\u73b0\u6709\u81ea\u4e3b\u79d1\u7814\u667a\u80fd\u4f53\u4f9d\u8d56\u5355\u6b21\u81ea\u7531\u53cd\u601d\u6062\u590d\u5931\u8d25\uff0cSAGE\u9996\u6b21\u5c06\u5931\u8d25\u6062\u590d\u7ed3\u6784\u5316\u4e3a\u56e0\u679c\u8bca\u65ad\u6d41\u7a0b\uff0c\u663e\u8457\u63d0\u5347\u53ef\u9760\u6027\u4e0e\u79d1\u5b66\u8bda\u5b9e\u6027\uff0c\u4e3a\u81ea\u4e3b\u79d1\u7814\u7cfb\u7edf\u5efa\u7acb\u66f4\u53ef\u4fe1\u7684\u57fa\u7840\u8303\u5f0f\u3002"}, {"abstract": "Water looks unchanged as it warms, then at a critical point it boils. We ask whether long-horizon language agents show an analogous transition in their implicit world models. In some parameter settings, changing state load by a small amount, or adding a single step of horizon, leaves behavior nearly unchanged; near a critical boundary, the same small change causes a sudden world collapse. We study this effect in a deterministic task family with exact per-step gold state. A large grid search over state cardinality, dependency density, horizon, branching, observation mode, and mutation rate reveals a phase diagram: a solved plateau, a narrow transition band, and a collapse floor. Per-step traces show the mechanism: world-state fidelity fails before action validity, so the agent is not merely choosing a bad action; it is acting from a corrupted world. Stronger models translate the critical boundary but do not remove the qualitative transition. These results make world-model collapse a measurable bottleneck for long-horizon agents.", "arxiv_id": "2606.31399", "arxiv_url": "https://arxiv.org/abs/2606.31399", "authors": ["Xinyuan Song", "Zekun Cai"], "brief": "\u672c\u6587\u7814\u7a76\u957f\u89c6\u91ce\u8bed\u8a00\u667a\u80fd\u4f53\u7684\u9690\u5f0f\u4e16\u754c\u6a21\u578b\u662f\u5426\u5b58\u5728\u7c7b\u4f3c\u6c34\u6cb8\u817e\u7684\u76f8\u53d8\u73b0\u8c61\uff0c\u901a\u8fc7\u5927\u89c4\u6a21\u7f51\u683c\u641c\u7d22\u63ed\u793a\u4e86\"\u5df2\u89e3\u51b3\u5e73\u53f0\u2014\u7a84\u8fc7\u6e21\u5e26\u2014\u5d29\u6e83\u5e95\u5c42\"\u7684\u76f8\u56fe\u7ed3\u6784\uff0c\u8bc1\u660e\u4e16\u754c\u6a21\u578b\u5d29\u6e83\u662f\u53ef\u6d4b\u91cf\u7684\u6027\u80fd\u74f6\u9888\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31399", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5728\u72b6\u6001\u57fa\u6570\u3001\u4f9d\u8d56\u5bc6\u5ea6\u3001\u89c6\u91ce\u957f\u5ea6\u3001\u5206\u652f\u56e0\u5b50\u7b49\u53c2\u6570\u7a7a\u95f4\u4e2d\u53d1\u73b0\u6e05\u6670\u76f8\u56fe\uff1a\u7a33\u5b9a\u533a\u3001\u4e34\u754c\u8fc7\u6e21\u5e26\u548c\u5d29\u6e83\u533a", "\u9010\u6b65\u8ffd\u8e2a\u63ed\u793a\u673a\u5236\uff1a\u4e16\u754c\u72b6\u6001\u4fdd\u771f\u5ea6\u5148\u4e8e\u52a8\u4f5c\u6709\u6548\u6027\u5931\u8d25\uff0c\u667a\u80fd\u4f53\u662f\u4ece\u635f\u574f\u7684\u4e16\u754c\u6a21\u578b\u4e2d\u884c\u52a8\uff0c\u800c\u975e\u4ec5\u9009\u62e9\u4e86\u9519\u8bef\u52a8\u4f5c", "\u66f4\u5f3a\u7684\u6a21\u578b\u53ea\u80fd\u5e73\u79fb\u4e34\u754c\u8fb9\u754c\uff0c\u65e0\u6cd5\u6d88\u9664\u76f8\u53d8\u7684\u5b9a\u6027\u7279\u5f81\uff0c\u8bf4\u660e\u8fd9\u662f\u7ed3\u6784\u6027\u74f6\u9888\u800c\u975e\u80fd\u529b\u4e0d\u8db3"], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u957f\u89c6\u91ce\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31399v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "World-Model Collapse as a Phase Transition", "tldr": "\u957f\u89c6\u91ce\u8bed\u8a00\u667a\u80fd\u4f53\u7684\u4e16\u754c\u6a21\u578b\u5b58\u5728\u7c7b\u76f8\u53d8\u7684\u7a81\u7136\u5d29\u6e83\u4e34\u754c\u70b9", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u957f\u89c6\u91ce\u8bed\u8a00\u667a\u80fd\u4f53\u7684\u9690\u5f0f\u4e16\u754c\u6a21\u578b\u662f\u5426\u5b58\u5728\u7c7b\u4f3c\u6c34\u6cb8\u817e\u7684\u76f8\u53d8\u73b0\u8c61\uff0c\u901a\u8fc7\u5927\u89c4\u6a21\u7f51\u683c\u641c\u7d22\u63ed\u793a\u4e86\"\u5df2\u89e3\u51b3\u5e73\u53f0\u2014\u7a84\u8fc7\u6e21\u5e26\u2014\u5d29\u6e83\u5e95\u5c42\"\u7684\u76f8\u56fe\u7ed3\u6784\uff0c\u8bc1\u660e\u4e16\u754c\u6a21\u578b\u5d29\u6e83\u662f\u53ef\u6d4b\u91cf\u7684\u6027\u80fd\u74f6\u9888\u3002", "why_notable": "\u9996\u6b21\u5c06\u7edf\u8ba1\u7269\u7406\u4e2d\u7684\u76f8\u53d8\u6982\u5ff5\u5f15\u5165LLM\u667a\u80fd\u4f53\u4e16\u754c\u6a21\u578b\u5206\u6790\uff0c\u63d0\u4f9b\u4e86\u53ef\u91cf\u5316\u7684\u5d29\u6e83\u4e34\u754c\u70b9\u6846\u67b6\uff0c\u5bf9\u957f\u89c6\u91ce\u4efb\u52a1\u89c4\u5212\u548c\u667a\u80fd\u4f53\u53ef\u9760\u6027\u7814\u7a76\u5177\u6709\u91cd\u8981\u7406\u8bba\u4e0e\u5b9e\u8df5\u610f\u4e49\u3002"}, {"abstract": "Computer-use agents, which leverage multimodal large language models (MLLMs) to operate computers and complete tasks, have attracted significant attention for their utility and versatility. A major challenge in developing these agents is collecting large-scale, high-quality trajectories. The standard approach generates synthetic data through a self-improving loop: an agent is placed in a verifiable environment and iteratively fine-tuned on its successful trajectories. Despite its effectiveness, this paradigm exploits only successful trajectories and discards the failed ones, even though failures carry rich information about a model\u0027s weaknesses. In this work, we explore a complementary failure-driven self-improvement loop, a data-centric paradigm that turns failed trajectories into agent improvements. Specifically, we employ an LLM to diagnose failure modes, propose inference-time solutions, and generate code patches -- lightly verified by humans -- that upgrade the agent. We validate this approach with the state-of-the-art OpenCUA-72B model on the OSWorld benchmark, improving the success rate from 42.3% to 48.9%, a gain of 6.6 percentage points, without any additional training cost and with only modest inference overhead. Our results demonstrate that failure-driven self-improvement is a viable complement to success-based pipelines, enabling more efficient agent improvement.", "arxiv_id": "2606.31270", "arxiv_url": "https://arxiv.org/abs/2606.31270", "authors": ["Xueqiao Sun", "Xiaohan Wang", "Ludwig Schmidt", "Serena Yeung-Levy", "Yuhui Zhang"], "brief": "\u63d0\u51fa\u4e00\u79cd\u4ee5\u5931\u8d25\u4e3a\u9a71\u52a8\u7684\u63a8\u7406\u65f6\u81ea\u6211\u6539\u8fdb\u8303\u5f0f\uff1a\u7528LLM\u8bca\u65ad\u5931\u8d25\u6a21\u5f0f\u3001\u63d0\u51fa\u63a8\u7406\u65f6\u89e3\u51b3\u65b9\u6848\u5e76\u751f\u6210\u4ee3\u7801\u8865\u4e01\uff0c\u5c06\u88ab\u4e22\u5f03\u7684\u5931\u8d25\u8f68\u8ff9\u8f6c\u5316\u4e3a\u667a\u80fd\u4f53\u80fd\u529b\u63d0\u5347\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL", "cs.CY", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31270", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5728OSWorld\u57fa\u51c6\u4e0a\uff0c\u5c06\u6700\u5148\u8fdb\u7684OpenCUA-72B\u6a21\u578b\u6210\u529f\u7387\u4ece42.3%\u63d0\u5347\u81f348.9%\uff08+6.6\u4e2a\u767e\u5206\u70b9\uff09", "\u65e0\u9700\u4efb\u4f55\u989d\u5916\u8bad\u7ec3\u6210\u672c\uff0c\u4ec5\u5f15\u5165\u5c11\u91cf\u63a8\u7406\u5f00\u9500\uff0c\u4ee3\u7801\u8865\u4e01\u7ecf\u4eba\u5de5\u8f7b\u91cf\u9a8c\u8bc1", "\u4e0e\u4f20\u7edf\u4ec5\u5229\u7528\u6210\u529f\u8f68\u8ff9\u7684\u81ea\u6211\u6539\u8fdb\u5faa\u73af\u4e92\u8865\uff0c\u5145\u5206\u6316\u6398\u5931\u8d25\u8f68\u8ff9\u4e2d\u7684\u5f31\u70b9\u4fe1\u606f"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u81ea\u6211\u6539\u8fdb", "\u8ba1\u7b97\u673a\u64cd\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.31270v1", "published_at": "2026-06-30", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Learning from Failure: Inference-Time Self-Improvement for Computer-Use Agents", "tldr": "\u5229\u7528\u5931\u8d25\u8f68\u8ff9\u9a71\u52a8\u7684\u81ea\u6211\u6539\u8fdb\u5faa\u73af\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u63d0\u5347\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u4ee5\u5931\u8d25\u4e3a\u9a71\u52a8\u7684\u63a8\u7406\u65f6\u81ea\u6211\u6539\u8fdb\u8303\u5f0f\uff1a\u7528LLM\u8bca\u65ad\u5931\u8d25\u6a21\u5f0f\u3001\u63d0\u51fa\u63a8\u7406\u65f6\u89e3\u51b3\u65b9\u6848\u5e76\u751f\u6210\u4ee3\u7801\u8865\u4e01\uff0c\u5c06\u88ab\u4e22\u5f03\u7684\u5931\u8d25\u8f68\u8ff9\u8f6c\u5316\u4e3a\u667a\u80fd\u4f53\u80fd\u529b\u63d0\u5347\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u5931\u8d25\u8f68\u8ff9\u8f6c\u5316\u4e3a\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u7684\u63a8\u7406\u65f6\u6539\u8fdb\uff0c\u65e0\u8bad\u7ec3\u6210\u672c\u5373\u83b7\u663e\u8457\u6027\u80fd\u63d0\u5347\uff0c\u4e3a\u6570\u636e\u9ad8\u6548\u7684\u667a\u80fd\u4f53\u5f00\u53d1\u63d0\u4f9b\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Language models typically reason via explicit chain-of-thought (CoT), generating intermediate steps token-by-token. Latent CoT offers an alternative: it performs multi-step reasoning in the model\u0027s hidden states, replacing decoded tokens with continuous representations for greater efficiency. However, existing latent CoT methods underperform explicit CoT beyond 1B parameters, and the gap widens with scale. Looped, or recurrent-depth, Transformers, which reuse their weights to increase computation depth without adding parameters, are a natural fit for latent reasoning. We therefore ask whether looped Transformers can bridge this gap. We answer affirmatively with a simple recipe: a looped padded Transformer that processes K latent blocks in parallel for R iterations, with a cross-entropy loss on each latent position\u0027s gold CoT-step token, similar to explicit CoT supervision. We instantiate it as LOTUS (Looped Transformers with parallel supervision on latents). LOTUS is, to our knowledge, the first latent-CoT method to bridge the gap to explicit CoT at the 3B scale, while cutting thought-phase latency by 2.5x-6.9x from compact math expressions to natural language. Projecting LOTUS\u0027s post-loop latents through the base LM head recovers the gold reasoning steps and even surfaces alternative valid intermediate steps, evidence that its latent space is interpretable and CoT-aligned. Ablations confirm that both the looped backbone and the parallel supervision on gold CoT tokens are essential.", "arxiv_id": "2606.31779", "arxiv_url": "https://arxiv.org/abs/2606.31779", "authors": ["Ying Fan", "Anej Svete", "Kangwook Lee"], "brief": "\u63d0\u51faLOTUS\uff08\u5faa\u73afTransformer\u5e76\u884c\u9690\u5f0f\u76d1\u7763\u65b9\u6cd5\uff09\uff0c\u901a\u8fc7\u5faa\u73af\u590d\u7528\u6743\u91cd\u5728\u9690\u72b6\u6001\u4e2d\u6267\u884c\u591a\u6b65\u63a8\u7406\uff0c\u5e76\u5bf9\u6bcf\u4e2a\u9690\u4f4d\u7f6e\u65bd\u52a0\u663e\u5f0fCoT\u6b65\u9aa4\u7684\u4ea4\u53c9\u71b5\u76d1\u7763\uff0c\u9996\u6b21\u57283B\u53c2\u6570\u89c4\u6a21\u4e0b\u4f7f\u9690\u5f0fCoT\u6027\u80fd\u8ffd\u5e73\u663e\u5f0f\u94fe\u5f0f\u601d\u7ef4\u63a8\u7406\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.31779", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5faa\u73afTransformer\u5c06K\u4e2a\u9690\u5f0f\u5757\u5e76\u884c\u5904\u7406R\u6b21\u8fed\u4ee3\uff0c\u65e0\u9700\u589e\u52a0\u53c2\u6570\u5373\u53ef\u52a0\u6df1\u8ba1\u7b97\u6df1\u5ea6", "\u57283B\u89c4\u6a21\u9996\u6b21\u5f25\u5408\u9690\u5f0fCoT\u4e0e\u663e\u5f0fCoT\u7684\u6027\u80fd\u5dee\u8ddd\uff0c\u63a8\u7406\u5ef6\u8fdf\u964d\u4f4e2.5x-6.9x", "\u5c06\u9690\u72b6\u6001\u6295\u5f71\u56deLM\u5934\u53ef\u6062\u590d\u91d1\
