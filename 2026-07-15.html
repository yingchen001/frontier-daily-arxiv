af\u5883\u538b\u529b\u6d4b\u8bd5\u641c\u7d22\u667a\u80fd\u4f53\u5bf9\u4f4e\u8d28\u91cf\u8bc1\u636e\u7684\u9c81\u68d2\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51faDeepStress\u538b\u529b\u6d4b\u8bd5\u6846\u67b6\uff0c\u7528\u53ef\u63a7\u5408\u6210\u73af\u5883\u66ff\u6362\u641c\u7d22\u667a\u80fd\u4f53\u7684\u68c0\u7d22\u6a21\u5757\uff0c\u7cfb\u7edf\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u9762\u5bf9\u4e0d\u53ef\u9760\u6587\u6863\u65f6\u7684\u8868\u73b0\uff0c\u6db5\u76d6\u53ef\u4fe1\u5ea6\u3001\u76f8\u5173\u6027\u548c\u4e8b\u5b9e\u6027\u4e09\u4e2a\u7ef4\u5ea6\u3002", "why_notable": "\u73b0\u6709\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u4f4e\u8d28\u91cf\u8bc1\u636e\u573a\u666f\u6781\u5c11\uff0c\u5bfc\u81f4\u641c\u7d22\u667a\u80fd\u4f53\u7684\u9c81\u68d2\u6027\u88ab\u9ad8\u4f30\uff1b\u8be5\u6846\u67b6\u586b\u8865\u4e86\u8fd9\u4e00\u8bc4\u4f30\u7a7a\u767d\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u4e2d\u7684\u53ef\u9760\u6027\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Large language models have made strong reasoning gains through supervised fine-tuning, reinforcement learning, and on-policy distillation, yet these post-training methods are usually evaluated only by final-answer accuracy. We study how they reshape confidence during reasoning. We introduce a three-stage calibration framework that evaluates confidence before, during, and after chain-of-thought generation, corresponding to difficulty estimation, early termination, and answer aggregation. Through a controlled comparison on mathematical reasoning benchmarks, we find that OPD provides the most useful pre-reasoning confidence, SFT gives the strongest online signal for early stopping, and RL produces the most reliable trace-level signal for aggregation. We further show that confidence reliability is position-dependent: RL confidence becomes informative after a path-commitment phase, while OPD confidence is useful early but can become inversely calibrated later. Based on this observation, we propose PosConf, a position-aware confidence strategy that uses confidence only from reliable relative-position intervals. PosConf improves RL answer aggregation by 6.1 points over majority voting and consistently improves OPD early stopping under tight token budgets, with gains up to 4.3 points by avoiding its later inverse-calibration region, showing that \\emph{confidence in reasoning models should be used both stage-wise and position-awarely}. Our code is available at https://github.com/EIT-NLP/Post-Training-Calibration.", "arxiv_id": "2607.13753", "arxiv_url": "https://arxiv.org/abs/2607.13753", "authors": ["Shuhao Li", "Guodong Du", "Anhao Zhao", "Wanyu Lin", "Tianyu Yuan", "Xiaoyu Shen"], "brief": "\u672c\u6587\u63d0\u51fa\u4e09\u9636\u6bb5\u7f6e\u4fe1\u5ea6\u6821\u51c6\u6846\u67b6\uff0c\u7cfb\u7edf\u5206\u6790\u76d1\u7763\u5fae\u8c03(SFT)\u3001\u5f3a\u5316\u5b66\u4e60(RL)\u548c\u5728\u7ebf\u7b56\u7565\u84b8\u998f(OPD)\u4e09\u79cd\u540e\u8bad\u7ec3\u65b9\u6cd5\u5982\u4f55\u5206\u522b\u5f71\u54cd\u63a8\u7406\u524d\u3001\u63a8\u7406\u4e2d\u548c\u63a8\u7406\u540e\u7684\u7f6e\u4fe1\u5ea6\u53ef\u9760\u6027\uff0c\u5e76\u63d0\u51fa\u4f4d\u7f6e\u611f\u77e5\u7f6e\u4fe1\u5ea6\u7b56\u7565PosConf\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13753", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4e09\u9636\u6bb5\u6846\u67b6\uff1a\u63a8\u7406\u524d\uff08\u96be\u5ea6\u4f30\u8ba1\uff09\u3001\u63a8\u7406\u4e2d\uff08\u65e9\u505c\uff09\u3001\u63a8\u7406\u540e\uff08\u7b54\u6848\u805a\u5408\uff09\uff0cOPD/SFT/RL\u5206\u522b\u5728\u5404\u9636\u6bb5\u8868\u73b0\u6700\u4f18", "\u53d1\u73b0\u7f6e\u4fe1\u5ea6\u53ef\u9760\u6027\u4e0e\u4f4d\u7f6e\u76f8\u5173\uff1aRL\u7f6e\u4fe1\u5ea6\u5728\u8def\u5f84\u627f\u8bfa\u9636\u6bb5\u540e\u624d\u6709\u6548\uff0cOPD\u7f6e\u4fe1\u5ea6\u65e9\u671f\u6709\u7528\u4f46\u540e\u671f\u53ef\u80fd\u51fa\u73b0\u53cd\u5411\u6821\u51c6", "PosConf\u7b56\u7565\u4ec5\u4f7f\u7528\u53ef\u9760\u4f4d\u7f6e\u533a\u95f4\u7684\u7f6e\u4fe1\u5ea6\uff0cRL\u7b54\u6848\u805a\u5408\u63d0\u53476.1\u5206\uff0cOPD\u65e9\u505c\u5728\u7d27\u5f20token\u9884\u7b97\u4e0b\u63d0\u5347\u6700\u9ad84.3\u5206"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u7f6e\u4fe1\u5ea6\u6821\u51c6", "\u94fe\u5f0f\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13753v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Post-Training Shifts Confidence: A Three-Stage Analysis of How SFT, RL, and OPD Shape Pre-, Intra-, and Post-CoT Calibration", "tldr": "\u63d0\u51fa\u4e09\u9636\u6bb5\u7f6e\u4fe1\u5ea6\u6846\u67b6\uff0c\u5206\u6790SFT/RL/OPD\u5982\u4f55\u5f71\u54cdCoT\u63a8\u7406\u524d\u4e2d\u540e\u7684\u7f6e\u4fe1\u5ea6\u6821\u51c6", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e09\u9636\u6bb5\u7f6e\u4fe1\u5ea6\u6821\u51c6\u6846\u67b6\uff0c\u7cfb\u7edf\u5206\u6790\u76d1\u7763\u5fae\u8c03(SFT)\u3001\u5f3a\u5316\u5b66\u4e60(RL)\u548c\u5728\u7ebf\u7b56\u7565\u84b8\u998f(OPD)\u4e09\u79cd\u540e\u8bad\u7ec3\u65b9\u6cd5\u5982\u4f55\u5206\u522b\u5f71\u54cd\u63a8\u7406\u524d\u3001\u63a8\u7406\u4e2d\u548c\u63a8\u7406\u540e\u7684\u7f6e\u4fe1\u5ea6\u53ef\u9760\u6027\uff0c\u5e76\u63d0\u51fa\u4f4d\u7f6e\u611f\u77e5\u7f6e\u4fe1\u5ea6\u7b56\u7565PosConf\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u4e0d\u540c\u540e\u8bad\u7ec3\u65b9\u6cd5\u5bf9CoT\u63a8\u7406\u5404\u9636\u6bb5\u7f6e\u4fe1\u5ea6\u7684\u5dee\u5f02\u5316\u5f71\u54cd\uff0c\u63d0\u51fa\u7684\u4f4d\u7f6e\u611f\u77e5\u7f6e\u4fe1\u5ea6\u7b56\u7565\u5177\u6709\u5b9e\u7528\u4ef7\u503c\uff0c\u5bf9\u63a8\u7406\u6a21\u578b\u7684\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1\u548c\u6548\u7387\u4f18\u5316\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "The emergence of Chain-of-Thought (CoT) reasoning has significantly enhanced the ability of large language models (LLMs) to tackle complex, multi-step tasks. However, when errors occur, current interaction approaches typically involve re-generating another response that may make mistakes again, or users laboriously flag the faulty step in follow-up turns that may get responses \u003cYou are right, I made a mistake here\u003e followed by similar errors recurring. To address this issue, we propose an efficient human intervention mechanism for precisely correcting reasoning errors in LLMs, termed Deep Interaction. Our approach enables direct editing of the original response, allowing erroneous parts to be corrected while preserving accurate reasoning steps. We refine the edited CoT into a distilled prompt, which then steers the LLM along the corrected reasoning path. Experimental results show that our method achieves over a 25% improvement in correction success rate and reduces token usage by approximately 40% on STEM tasks reasoning compared to baseline approaches.", "arxiv_id": "2607.14049", "arxiv_url": "https://arxiv.org/abs/2607.14049", "authors": ["Hefeng Zhou", "Jinxuan Zhang", "Jiong Lou", "Yuxin Liu", "Chaochao Lu", "Jingjing Qu", "Jie Li"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u9ad8\u6548\u7684\u4eba\u673a\u4ea4\u4e92\u7ea0\u9519\u673a\u5236Deep Interaction\uff0c\u5141\u8bb8\u7528\u6237\u76f4\u63a5\u7f16\u8f91LLM\u539f\u59cb\u63a8\u7406\u94fe\u4e2d\u7684\u9519\u8bef\u6b65\u9aa4\uff0c\u5c06\u4fee\u6b63\u540e\u7684CoT\u63d0\u70bc\u4e3a\u5f15\u5bfc\u63d0\u793a\uff0c\u9a71\u52a8\u6a21\u578b\u6cbf\u6b63\u786e\u63a8\u7406\u8def\u5f84\u7ee7\u7eed\u751f\u6210\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14049", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u652f\u6301\u5bf9\u539f\u59cbCoT\u54cd\u5e94\u8fdb\u884c\u76f4\u63a5\u7f16\u8f91\uff0c\u4fdd\u7559\u6b63\u786e\u63a8\u7406\u6b65\u9aa4\uff0c\u4ec5\u4fee\u6b63\u9519\u8bef\u90e8\u5206", "\u5c06\u7f16\u8f91\u540e\u7684CoT\u63d0\u70bc\u4e3a\u84b8\u998f\u63d0\u793a\uff08distilled prompt\uff09\uff0c\u5f15\u5bfc\u6a21\u578b\u6cbf\u4fee\u6b63\u8def\u5f84\u63a8\u7406", "\u5728STEM\u4efb\u52a1\u4e0a\u7ea0\u9519\u6210\u529f\u7387\u63d0\u5347\u8d8525%\uff0ctoken\u6d88\u8017\u51cf\u5c11\u7ea640%"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406", "\u4eba\u673a\u4ea4\u4e92", "Chain-of-Thought"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14049v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Deep Interaction: An Efficient Human-AI Interaction Method for Large Reasoning Models", "tldr": "\u63d0\u51faDeep Interaction\u673a\u5236\uff0c\u5141\u8bb8\u7528\u6237\u76f4\u63a5\u7f16\u8f91CoT\u63a8\u7406\u6b65\u9aa4\uff0c\u7cbe\u51c6\u7ea0\u6b63\u5927\u6a21\u578b\u63a8\u7406\u9519\u8bef", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u9ad8\u6548\u7684\u4eba\u673a\u4ea4\u4e92\u7ea0\u9519\u673a\u5236Deep Interaction\uff0c\u5141\u8bb8\u7528\u6237\u76f4\u63a5\u7f16\u8f91LLM\u539f\u59cb\u63a8\u7406\u94fe\u4e2d\u7684\u9519\u8bef\u6b65\u9aa4\uff0c\u5c06\u4fee\u6b63\u540e\u7684CoT\u63d0\u70bc\u4e3a\u5f15\u5bfc\u63d0\u793a\uff0c\u9a71\u52a8\u6a21\u578b\u6cbf\u6b63\u786e\u63a8\u7406\u8def\u5f84\u7ee7\u7eed\u751f\u6210\u3002", "why_notable": "\u73b0\u6709\u4ea4\u4e92\u65b9\u5f0f\uff08\u91cd\u65b0\u751f\u6210\u6216\u591a\u8f6e\u5bf9\u8bdd\u6307\u51fa\u9519\u8bef\uff09\u6548\u7387\u4f4e\u4e14\u6613\u91cd\u590d\u72af\u9519\uff0c\u8be5\u65b9\u6cd5\u4ee5\u6700\u5c0f\u7528\u6237\u5e72\u9884\u5b9e\u73b0\u7cbe\u51c6\u5b9a\u70b9\u7ea0\u9519\uff0c\u517c\u987e\u6548\u7387\u4e0e\u6548\u679c\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u5927\u63a8\u7406\u6a21\u578b\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Music-driven dance generation aims to produce human motion that is both rhythmically synchronized and semantically consistent with music. While recent neural approaches have achieved impressive visual realism, they typically model motion as a continuous signal and neglect its compositional nature, making generated dances structurally incoherent and difficult to control. In this work, we introduce a structure-aware framework that models choreography as a sequence of atomic movements-semantically interpretable motion events that serve as the building blocks of dance. To construct this atomic movement vocabulary, we first segment large-scale dance data and cluster them into atomic movement groups. We then employ a large language model to semantically relabel and refine the clusters, yielding a set of interpretable and reusable atomic movements. Based on these atomic movement annotations, we design a two-stage generation framework that mirrors the human choreography process. In the atomic movement planning stage, the model predicts the type, duration, and timing of atomic movements conditioned on the input music, forming a symbolic dance allocation. In the completion stage, a transition-aware generator synthesizes smooth and stylistically coherent motion conditioned on the planned structure. Extensive experiments demonstrate that our method produces dances with significantly improved structural coherence, rhythmic alignment, and perceptual naturalness compared to existing baselines, while providing enhanced interpretability and controllable editing through explicit structural representation.", "arxiv_id": "2607.13978", "arxiv_url": "https://arxiv.org/abs/2607.13978", "authors": ["Xinhao Cai", "Yixuan Sun", "Minghang Zheng", "Qingchao Chen", "Xin Jin", "Song-chun Zhu", "Yang Liu"], "brief": "\u63d0\u51fa\u4e00\u79cd\u7ed3\u6784\u611f\u77e5\u6846\u67b6\uff0c\u5c06\u7f16\u821e\u5efa\u6a21\u4e3a\"\u539f\u5b50\u52a8\u4f5c\"\u5e8f\u5217\u2014\u2014\u5373\u8bed\u4e49\u53ef\u89e3\u91ca\u7684\u57fa\u672c\u52a8\u4f5c\u5355\u5143\uff0c\u901a\u8fc7\u4e24\u9636\u6bb5\u751f\u6210\uff08\u52a8\u4f5c\u89c4\u5212+\u5e73\u6ed1\u8865\u5168\uff09\u5b9e\u73b0\u97f3\u4e50\u9a71\u52a8\u7684\u821e\u8e48\u751f\u6210\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13978", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efa\u539f\u5b50\u52a8\u4f5c\u8bcd\u6c47\u8868\uff1a\u5bf9\u5927\u89c4\u6a21\u821e\u8e48\u6570\u636e\u8fdb\u884c\u5206\u5272\u4e0e\u805a\u7c7b\uff0c\u518d\u7528LLM\u5bf9\u7c07\u8fdb\u884c\u8bed\u4e49\u91cd\u6807\u6ce8\uff0c\u5f97\u5230\u53ef\u590d\u7528\u7684\u539f\u5b50\u52a8\u4f5c\u96c6\u5408", "\u4e24\u9636\u6bb5\u751f\u6210\u6846\u67b6\uff1a\u7b2c\u4e00\u9636\u6bb5\u6839\u636e\u97f3\u4e50\u9884\u6d4b\u539f\u5b50\u52a8\u4f5c\u7684\u7c7b\u578b\u3001\u65f6\u957f\u4e0e\u65f6\u5e8f\uff08\u7b26\u53f7\u5316\u821e\u8e48\u5206\u914d\uff09\uff1b\u7b2c\u4e8c\u9636\u6bb5\u7528\u8fc7\u6e21\u611f\u77e5\u751f\u6210\u5668\u5408\u6210\u5e73\u6ed1\u8fde\u8d2f\u7684\u52a8\u4f5c", "\u76f8\u6bd4\u73b0\u6709\u57fa\u7ebf\uff0c\u751f\u6210\u821e\u8e48\u5728\u7ed3\u6784\u8fde\u8d2f\u6027\u3001\u8282\u594f\u5bf9\u9f50\u548c\u611f\u77e5\u81ea\u7136\u5ea6\u4e0a\u5747\u6709\u663e\u8457\u63d0\u5347\uff0c\u5e76\u652f\u6301\u53ef\u89e3\u91ca\u7684\u7ed3\u6784\u5316\u7f16\u8f91"], "keywords": ["\u821e\u8e48\u751f\u6210", "\u591a\u6a21\u6001", "\u52a8\u4f5c\u751f\u6210", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13978v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Music-to-Dance Generation via Atomic Movements", "tldr": "\u5c06\u821e\u8e48\u5206\u89e3\u4e3a\u539f\u5b50\u52a8\u4f5c\u5e8f\u5217\uff0c\u5b9e\u73b0\u7ed3\u6784\u611f\u77e5\u7684\u97f3\u4e50\u9a71\u52a8\u821e\u8e48\u751f\u6210", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u7ed3\u6784\u611f\u77e5\u6846\u67b6\uff0c\u5c06\u7f16\u821e\u5efa\u6a21\u4e3a\"\u539f\u5b50\u52a8\u4f5c\"\u5e8f\u5217\u2014\u2014\u5373\u8bed\u4e49\u53ef\u89e3\u91ca\u7684\u57fa\u672c\u52a8\u4f5c\u5355\u5143\uff0c\u901a\u8fc7\u4e24\u9636\u6bb5\u751f\u6210\uff08\u52a8\u4f5c\u89c4\u5212+\u5e73\u6ed1\u8865\u5168\uff09\u5b9e\u73b0\u97f3\u4e50\u9a71\u52a8\u7684\u821e\u8e48\u751f\u6210\u3002", "why_notable": "\u9996\u6b21\u5c06\u821e\u8e48\u7684\u7ec4\u5408\u6027\u672c\u8d28\u663e\u5f0f\u5efa\u6a21\u4e3a\u539f\u5b50\u52a8\u4f5c\u5e8f\u5217\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u65b9\u6cd5\u7ed3\u6784\u4e0d\u8fde\u8d2f\u3001\u96be\u4ee5\u63a7\u5236\u7684\u75db\u70b9\uff0c\u540c\u65f6\u5f15\u5165LLM\u8f85\u52a9\u8bed\u4e49\u6807\u6ce8\uff0c\u517c\u987e\u53ef\u89e3\u91ca\u6027\u4e0e\u53ef\u7f16\u8f91\u6027\u3002"}, {"abstract": "Historical Manchu OCR must accommodate various visually distinct writing styles, including regular script, running script, and the semi-cursive chancery hand used in palace memorials, despite limited labeled data. We study a multi-expert system that reuses checkpoints from an iterative fine-tuning process as domain specialists and uses a lightweight page-level image classifier to dispatch pages by visual style. When the checkpoint pool lacks a suitable specialist, we train an additional expert for that domain. On three frozen test sets, the routed system matches the selected specialist for each style at two-decimal precision: 0.30 percent CER on regular script, 1.57 percent on memorials, and 4.83 percent on running script. The router achieves 99.3 percent page-level domain accuracy and matches the domain-label oracle at the same precision. Two of the three selected specialists were not trained specifically for their final domain; only the running-script expert was trained with that domain as its target. We report the evaluation protocol, router design, and per-page predictions to make the comparison reproducible.", "arxiv_id": "2607.14041", "arxiv_url": "https://arxiv.org/abs/2607.14041", "authors": ["Zhan Chen", "Jiqiao Ma", "Chih-wen Kuo"], "brief": "\u63d0\u51fa\u4e00\u79cd\u591a\u4e13\u5bb6\u8def\u7531\u6846\u67b6\uff0c\u590d\u7528\u8fed\u4ee3\u5fae\u8c03\u8fc7\u7a0b\u4e2d\u7684\u68c0\u67e5\u70b9\u4f5c\u4e3a\u9886\u57df\u4e13\u5bb6\uff0c\u914d\u5408\u8f7b\u91cf\u7ea7\u9875\u9762\u7ea7\u56fe\u50cf\u5206\u7c7b\u5668\u6309\u89c6\u89c9\u98ce\u683c\u5206\u53d1\u9875\u9762\uff0c\u4e13\u95e8\u5e94\u5bf9\u6ee1\u6587\u5386\u53f2\u6587\u732e\u4e2d\u6b63\u6977\u3001\u884c\u4e66\u3001\u594f\u6298\u4f53\u7b49\u591a\u79cd\u4e66\u5199\u98ce\u683c\u7684\u4f4e\u8d44\u6e90OCR\u6311\u6218\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14041", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u8def\u7531\u5668\u9875\u9762\u7ea7\u9886\u57df\u5206\u7c7b\u51c6\u786e\u7387\u8fbe99.3%\uff0c\u4e0e\u4eba\u5de5\u6807\u6ce8oracle\u7cbe\u5ea6\u6301\u5e73", "\u4e09\u79cd\u4e66\u5199\u98ce\u683cCER\u5206\u522b\u4e3a\uff1a\u6b63\u69770.30%\u3001\u594f\u62981.57%\u3001\u884c\u4e664.83%\uff0c\u4e0e\u5404\u9886\u57df\u6700\u4f18\u4e13\u5bb6\u5339\u914d", "\u4e09\u4f4d\u4e13\u5bb6\u4e2d\u6709\u4e24\u4f4d\u5e76\u975e\u9488\u5bf9\u5176\u6700\u7ec8\u6d4b\u8bd5\u9886\u57df\u4e13\u95e8\u8bad\u7ec3\uff0c\u5c55\u793a\u4e86\u68c0\u67e5\u70b9\u590d\u7528\u7684\u6709\u6548\u6027"], "keywords": ["OCR", "\u591a\u4e13\u5bb6\u7cfb\u7edf", "\u4f4e\u8d44\u6e90\u5b66\u4e60", "\u5386\u53f2\u6587\u732e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14041v1", "published_at": "2026-07-15", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Multi-Expert Routing for Multi-Domain Low-Resource OCR: A Manchu Case Study", "tldr": "\u591a\u4e13\u5bb6\u8def\u7531\u7cfb\u7edf\u89e3\u51b3\u6ee1\u6587\u5386\u53f2\u6587\u732e\u591a\u98ce\u683c\u4f4e\u8d44\u6e90OCR\u95ee\u9898\uff0cCER\u6700\u4f4e\u8fbe0.30%", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u591a\u4e13\u5bb6\u8def\u7531\u6846\u67b6\uff0c\u590d\u7528\u8fed\u4ee3\u5fae\u8c03\u8fc7\u7a0b\u4e2d\u7684\u68c0\u67e5\u70b9\u4f5c\u4e3a\u9886\u57df\u4e13\u5bb6\uff0c\u914d\u5408\u8f7b\u91cf\u7ea7\u9875\u9762\u7ea7\u56fe\u50cf\u5206\u7c7b\u5668\u6309\u89c6\u89c9\u98ce\u683c\u5206\u53d1\u9875\u9762\uff0c\u4e13\u95e8\u5e94\u5bf9\u6ee1\u6587\u5386\u53f2\u6587\u732e\u4e2d\u6b63\u6977\u3001\u884c\u4e66\u3001\u594f\u6298\u4f53\u7b49\u591a\u79cd\u4e66\u5199\u98ce\u683c\u7684\u4f4e\u8d44\u6e90OCR\u6311\u6218\u3002", "why_notable": "\u4e3a\u6fd2\u5371\u8bed\u8a00\u5386\u53f2\u6587\u732e\u6570\u5b57\u5316\u63d0\u4f9b\u4e86\u4f4e\u8d44\u6e90\u591a\u98ce\u683cOCR\u7684\u53ef\u590d\u73b0\u89e3\u51b3\u65b9\u6848\uff0c\u591a\u4e13\u5bb6\u8def\u7531\u7b56\u7565\u53ef\u63a8\u5e7f\u81f3\u5176\u4ed6\u5386\u53f2\u6587\u5b57\u8bc6\u522b\u573a\u666f\uff0c\u4e14\u5b8c\u6574\u516c\u5f00\u8bc4\u4f30\u534f\u8bae\u4e0e\u9010\u9875\u9884\u6d4b\u7ed3\u679c\u3002"}, {"abstract": "With rising global energy demand and growing awareness of climate change and its impacts, the share of renewable energies in the global energy mix continues to grow. Unlike conventional power generation, the output of renewable energy sources cannot be controlled as consistently due to their dependence on environmental conditions. Therefore, reliable prediction of current and future energy production is essential. In this paper, we report findings from two structured literature reviews on real-world renewable energy prediction tasks: wind turbine power curve modeling and photovoltaic power prediction. For the former, we conducted a comprehensive literature review ourselves, while for the latter, we synthesize the key findings regarding frequently selected input features based on an existing survey. Across both domains, our analysis reveals that despite the large number of available monitoring and environmental variables, only limited or unsystematic methods for feature selection exist. To address this gap, we propose Cluster-based Sequential Feature Selection (CSFS), a novel, model-agnostic, clustering-based wrapper method for automatic, efficient, and reliable feature selection in renewable energy prediction pipelines. To support reproducibility and reuse, we provide an open-source implementation of CSFS on GitHub. We empirically evaluate the proposed approach on both use cases and compare it with established feature selection techniques such as wrapper-based sequential feature selection (SFS), filter-based methods, and Random Forest\u0027s embedded feature importance. The results show that the wrapper-based methods overall provide better-performing selections of features. CSFS achieves a predictive performance comparable to SFS while reducing computational cost by an average of 21%.", "arxiv_id": "2607.14024", "arxiv_url": "https://arxiv.org/abs/2607.14024", "authors": ["Daniel Grillmeyer", "Marius Hadry", "Michael Stenger", "Vanessa Borst", "Veronika Lesch", "Samuel Kounev"], "brief": "\u672c\u6587\u9488\u5bf9\u98ce\u529b\u53d1\u7535\u548c\u5149\u4f0f\u53d1\u7535\u9884\u6d4b\u4efb\u52a1\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u65b0\u578b\u6a21\u578b\u65e0\u5173\u7684\u805a\u7c7b\u5305\u88f9\u5f0f\u7279\u5f81\u9009\u62e9\u65b9\u6cd5CSFS\uff0c\u5728\u4fdd\u6301\u4e0e\u4f20\u7edfSFS\u76f8\u5f53\u9884\u6d4b\u6027\u80fd\u7684\u540c\u65f6\uff0c\u5e73\u5747\u964d\u4f4e21%\u7684\u8ba1\u7b97\u5f00\u9500\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14024", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u901a\u8fc7\u6587\u732e\u7efc\u8ff0\u53d1\u73b0\u73b0\u6709\u53ef\u518d\u751f\u80fd\u6e90\u9884\u6d4b\u4e2d\u7279\u5f81\u9009\u62e9\u65b9\u6cd5\u532e\u4e4f\u6216\u7f3a\u4e4f\u7cfb\u7edf\u6027", "CSFS\u7ed3\u5408\u805a\u7c7b\u4e0e\u5e8f\u5217\u7279\u5f81\u9009\u62e9\uff0c\u5b9e\u73b0\u81ea\u52a8\u3001\u9ad8\u6548\u3001\u53ef\u9760\u7684\u7279\u5f81\u7b5b\u9009\uff0c\u8ba1\u7b97\u6210\u672c\u5e73\u5747\u964d\u4f4e21%", "\u5b9e\u9a8c\u5bf9\u6bd4SFS\u3001\u8fc7\u6ee4\u5f0f\u65b9\u6cd5\u548c\u968f\u673a\u68ee\u6797\u5d4c\u5165\u5f0f\u91cd\u8981\u6027\uff0c\u5305\u88f9\u5f0f\u65b9\u6cd5\u6574\u4f53\u8868\u73b0\u6700\u4f18\uff0c\u4ee3\u7801\u5df2\u5f00\u6e90"], "keywords": ["\u65f6\u95f4\u5e8f\u5217\u9884\u6d4b", "\u7279\u5f81\u9009\u62e9", "\u53ef\u518d\u751f\u80fd\u6e90", "\u673a\u5668\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14024v1", "published_at": "2026-07-15", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Improving Wind and Solar Power Prediction with Efficient Wrapper-based Feature Selection: An Empirical Study", "tldr": "\u63d0\u51fa\u57fa\u4e8e\u805a\u7c7b\u7684\u5e8f\u5217\u7279\u5f81\u9009\u62e9\u65b9\u6cd5CSFS\uff0c\u63d0\u5347\u98ce\u80fd\u548c\u5149\u4f0f\u53d1\u7535\u9884\u6d4b\u6548\u7387", "upvotes": 0, "what_it_is": "\u672c\u6587\u9488\u5bf9\u98ce\u529b\u53d1\u7535\u548c\u5149\u4f0f\u53d1\u7535\u9884\u6d4b\u4efb\u52a1\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u65b0\u578b\u6a21\u578b\u65e0\u5173\u7684\u805a\u7c7b\u5305\u88f9\u5f0f\u7279\u5f81\u9009\u62e9\u65b9\u6cd5CSFS\uff0c\u5728\u4fdd\u6301\u4e0e\u4f20\u7edfSFS\u76f8\u5f53\u9884\u6d4b\u6027\u80fd\u7684\u540c\u65f6\uff0c\u5e73\u5747\u964d\u4f4e21%\u7684\u8ba1\u7b97\u5f00\u9500\u3002", "why_notable": "\u53ef\u518d\u751f\u80fd\u6e90\u9884\u6d4b\u662f\u80fd\u6e90\u8f6c\u578b\u7684\u5173\u952e\u73af\u8282\uff0cCSFS\u5728\u4e0d\u635f\u5931\u7cbe\u5ea6\u7684\u524d\u63d0\u4e0b\u663e\u8457\u63d0\u5347\u7279\u5f81\u9009\u62e9\u6548\u7387\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u63d0\u4f9b\u5f00\u6e90\u5b9e\u73b0\u4fbf\u4e8e\u590d\u73b0\u548c\u63a8\u5e7f\u3002"}, {"abstract": "This paper presents Earthquaker-AI, a hybrid educational framework building upon a previously implemented educational robotics project by integrating a conversational AI assistant based on Retrieval-Augmented Generation. It aims to enhance earthquake preparedness and conscious action among primary-school students. The system extends the award-winning STEM project Earthquaker moving from mechanical simulation with Lego WeDo2 to cognitive and metacognitive processing. The robotics component uses Lego WeDo2 automation to simulate seismic response, letting students interact with sensors and actuators as tangible representations of protective actions. The assistant operates as a guided learning mechanism aligning student responses with safety guidelines, while providing rubric-based verbal feedback that supports self-regulated learning and calmness under emergency conditions. Earthquaker-AI follows a progressive learning trajectory aligned with cognitive development. In early grades, the focus is on basic recognition of safety actions through multiple-choice questions, assessed via a two-dimensional rubric. In middle grades, students identify correct action sequences through multiple-choice questions, evaluated via a three-axis rubric. In upper grades, the approach shifts to verbal production, requiring short written responses assessed via a four-dimensional rubric that includes clarity of expression. The dialogic module uses RAG to match student queries semantically with official guidelines, generating safe, accurate responses. Experimental evaluation shows high groundedness and accuracy, with a low hallucination rate. Overall, Earthquaker-AI combines hands-on engagement, information processing, and reflective practice. Combining robotics, rubrics, and AI promotes technological literacy, self-regulation, and responsible use of digital systems, contributing to early crisis-management skills.", "arxiv_id": "2607.14046", "arxiv_url": "https://arxiv.org/abs/2607.14046", "authors": ["Xanthi Kokkinou", "Chaido Mizeli", "Nafsika Koulaxidou", "Marina Delianidi", "Konstantinos Diamantaras"], "brief": "Earthquaker-AI\u662f\u4e00\u4e2a\u878d\u5408\u68c0\u7d22\u589e\u5f3a\u751f\u6210\uff08RAG\uff09\u5bf9\u8bdd\u52a9\u624b\u4e0e\u4e50\u9ad8WeDo2\u673a\u5668\u4eba\u7684\u6df7\u5408\u6559\u80b2\u6846\u67b6\uff0c\u9488\u5bf9\u5c0f\u5b66\u4e0d\u540c\u5e74\u7ea7\u8bbe\u8ba1\u6e10\u8fdb\u5f0f\u5730\u9707\u5b89\u5168\u6559\u80b2\u8bfe\u7a0b\uff0c\u5e76\u901a\u8fc7\u591a\u7ef4\u8bc4\u5206\u91cf\u89c4\u63d0\u4f9b\u4e2a\u6027\u5316\u53cd\u9988\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14046", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": ["\u6309\u5e74\u7ea7\u5206\u4e09\u9636\u6bb5\u8bbe\u8ba1\uff1a\u4f4e\u5e74\u7ea7\u591a\u9009\u9898+\u4e8c\u7ef4\u91cf\u89c4\u3001\u4e2d\u5e74\u7ea7\u52a8\u4f5c\u5e8f\u5217+\u4e09\u8f74\u91cf\u89c4\u3001\u9ad8\u5e74\u7ea7\u4e66\u9762\u8868\u8fbe+\u56db\u7ef4\u91cf\u89c4", "RAG\u6a21\u5757\u5c06\u5b66\u751f\u95ee\u9898\u4e0e\u5b98\u65b9\u5b89\u5168\u6307\u5357\u8fdb\u884c\u8bed\u4e49\u5339\u914d\uff0c\u5b9e\u9a8c\u8bc4\u4f30\u663e\u793a\u9ad8\u51c6\u786e\u7387\u4e0e\u4f4e\u5e7b\u89c9\u7387", "\u4e50\u9ad8WeDo2\u673a\u5668\u4eba\u6a21\u62df\u5730\u9707\u54cd\u5e94\uff0c\u63d0\u4f9b\u4f20\u611f\u5668\u4e0e\u6267\u884c\u5668\u7684\u5177\u8eab\u4ea4\u4e92\u4f53\u9a8c"], "keywords": ["\u6559\u80b2AI", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u667a\u80fd\u4f53", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14046v1", "published_at": "2026-07-15", "score": 0.125, "selected_reasons": [], "thumbnail": null, "title": "Earthquaker-AI: A Retrieval-Augmented Generation Framework with Rubric-Based Assessment for Primary School Earthquake Education", "tldr": "\u9762\u5411\u5c0f\u5b66\u751f\u5730\u9707\u6559\u80b2\u7684RAG\u5bf9\u8bddAI\u6846\u67b6\uff0c\u7ed3\u5408\u4e50\u9ad8\u673a\u5668\u4eba\u4e0e\u8bc4\u5206\u91cf\u89c4\u5b9e\u73b0\u5206\u7ea7\u5b66\u4e60", "upvotes": 0, "what_it_is": "Earthquaker-AI\u662f\u4e00\u4e2a\u878d\u5408\u68c0\u7d22\u589e\u5f3a\u751f\u6210\uff08RAG\uff09\u5bf9\u8bdd\u52a9\u624b\u4e0e\u4e50\u9ad8WeDo2\u673a\u5668\u4eba\u7684\u6df7\u5408\u6559\u80b2\u6846\u67b6\uff0c\u9488\u5bf9\u5c0f\u5b66\u4e0d\u540c\u5e74\u7ea7\u8bbe\u8ba1\u6e10\u8fdb\u5f0f\u5730\u9707\u5b89\u5168\u6559\u80b2\u8bfe\u7a0b\uff0c\u5e76\u901a\u8fc7\u591a\u7ef4\u8bc4\u5206\u91cf\u89c4\u63d0\u4f9b\u4e2a\u6027\u5316\u53cd\u9988\u3002", "why_notable": "\u5c06RAG\u6280\u672f\u3001\u6559\u80b2\u673a\u5668\u4eba\u4e0e\u5f62\u6210\u6027\u8bc4\u4f30\u91cf\u89c4\u4e09\u8005\u7ed3\u5408\uff0c\u63a2\u7d22AI\u8f85\u52a9\u5371\u673a\u6559\u80b2\u7684\u843d\u5730\u8def\u5f84\uff0c\u5bf9K-12 STEM\u6559\u80b2\u4e0eAI\u5b89\u5168\u5e94\u7528\u5177\u6709\u53c2\u8003\u4ef7\u503c"}, {"abstract": "Personal health management unfolds over repeated encounters, yet most health AI systems treat each request in isolation. We developed HealthClaw, an open-source agent architecture that updates support as a person\u0027s routines, preferences, measurements and risks change. It separates shared safety rules and medical knowledge from private longitudinal memory containing profile facts, reusable procedures and episodic traces. After each episode, induction determines what should update the profile, revise a procedure, remain episodic or be excluded. We evaluated HealthClaw with a synthetic year-long benchmark and nine 200-case biomedical tasks. Across 900 longitudinal support probes, answer accuracy increased from 0.2% with current-query prompting to 45.7% with HealthClaw, while prompt-side context exposure was 71.7% lower than with full-history prompting. In 100 privacy probes, HealthClaw produced higher privacy-aware answer quality and fewer unsafe disclosures than both baselines. Across the biomedical tasks, the mean absolute gain in the task-specific primary metric was 27.0 percentage points, and seven gains remained significant after false-discovery-rate correction. These offline benchmarks support governed, self-evolving memory for longitudinal personal health agents, although clinical effectiveness requires prospective evaluation. HealthClaw is publicly available at https://github.com/HC-Guo/HealthClaw.", "arxiv_id": "2607.13940", "arxiv_url": "https://arxiv.org/abs/2607.13940", "authors": ["Haoran Li", "Jiebi Deng", "Tong Jin", "Jinghong Han", "Yuxin Wang", "Zexin Wang", "Qingyi Si", "Weikang Gong", "Xiahai Zhuang", "Jia You", "Wei Cheng", "Jianfeng Feng", "Hongcheng Guo"], "brief": "\u63d0\u51faHealthClaw\uff0c\u4e00\u4e2a\u5f00\u6e90\u7684\u7eb5\u5411\u4e2a\u4eba\u5065\u5eb7\u7ba1\u7406\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u5206\u79bb\u5171\u4eab\u533b\u5b66\u77e5\u8bc6\u4e0e\u79c1\u6709\u7eb5\u5411\u8bb0\u5fc6\uff08\u5305\u542b\u7528\u6237\u753b\u50cf\u3001\u53ef\u590d\u7528\u6d41\u7a0b\u548c\u60c5\u8282\u8bb0\u5f55\uff09\uff0c\u5b9e\u73b0\u968f\u65f6\u95f4\u81ea\u6211\u6f14\u5316\u7684\u5065\u5eb7\u652f\u6301\u3002\u5728900\u4e2a\u7eb5\u5411\u6d4b\u8bd5\u4e2d\uff0c\u7b54\u6848\u51c6\u786e\u7387\u4ece0.2%\u63d0\u5347\u81f345.7%\uff0c\u540c\u65f6\u964d\u4f4e71.7%\u7684\u4e0a\u4e0b\u6587\u66b4\u9732\uff0c\u9690\u79c1\u4fdd\u62a4\u548c\u751f\u7269\u533b\u5b66\u4efb\u52a1\u8868\u73b0\u5747\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13940", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5065\u5eb7\u7ba1\u7406", "\u7eb5\u5411\u8bb0\u5fc6", "\u9690\u79c1\u4fdd\u62a4"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13940v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A Self-Evolving Agent for Longitudinal Personal Health Management", "tldr": "\u63d0\u51faHealthClaw\uff0c\u4e00\u4e2a\u5f00\u6e90\u7684\u7eb5\u5411\u4e2a\u4eba\u5065\u5eb7\u7ba1\u7406\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u5206\u79bb\u5171\u4eab\u533b\u5b66\u77e5\u8bc6\u4e0e\u79c1\u6709\u7eb5\u5411\u8bb0\u5fc6\uff08\u5305\u542b\u7528\u6237\u753b\u50cf\u3001\u53ef\u590d\u7528\u6d41\u7a0b\u548c\u60c5\u8282\u8bb0\u5f55\uff09\uff0c\u5b9e\u73b0\u968f\u65f6\u95f4\u81ea\u6211\u6f14\u5316\u7684\u5065\u5eb7\u652f\u6301\u3002\u5728900\u4e2a\u7eb5\u5411\u6d4b\u8bd5\u4e2d\uff0c\u7b54\u6848\u51c6\u786e\u7387\u4ece0.2%\u63d0\u5347\u81f345.7%\uff0c\u540c\u65f6\u964d\u4f4e71.7%\u7684\u4e0a\u4e0b\u6587\u66b4\u9732\uff0c\u9690\u79c1\u4fdd\u62a4\u548c\u751f\u7269\u533b\u5b66\u4efb\u52a1\u8868\u73b0\u5747\u663e\u8457\u4f18\u4e8e\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Languages with rich static semantics, such as Rust, provide stronger guarantees for AI-generated code, but their strictness makes generation more difficult. Off-the-shelf compilers can provide useful feedback post-generation, but does not guide intermediate generation steps, such as those during autoregressive LLM decoding. Constrained decoding intervenes earlier by rejecting invalid tokens during sampling, but requires white-box model access and costly reimplementation for semantic constraints.We introduce generative compilation, the first approach to obtaining compiler feedback on partial programs during generation. The core technical device is a sealor: a lightweight, mostly syntax-guided transformation that converts partial programs into complete ones that standard compilers can diagnose. It is designed such that possible-to-complete partial programs are never rejected, while preserving enough code context to catch genuine dead ends early. We construct such a sealor on a core Rust-like calculus and prove that it satisfies these properties, all mechanized in Lean. We extend it to the first partial-program checker for real Rust. We evaluate our method on challenging repository-level Rust coding tasks, across both frontier black-box and open-weight models. We show that generative compilation reduces non-compiling outputs and improves functional correctness, relative to standard post-generation feedback. It does so by detecting a broad range of errors close to their source and early during generation, thereby reducing errors cascades and enabling focused diagnostics. More broadly, generative compilation is a step toward making compilers a first-class citizen of AI-assisted programming active during generation, rather than a separate post-generation check.", "arxiv_id": "2607.13921", "arxiv_url": "https://arxiv.org/abs/2607.13921", "authors": ["Niels M\u00fcndler-Sasahara", "Hristo Venev", "Dawn Song", "Martin Vechev", "Jingxuan He"], "brief": "\u63d0\u51fa\u300c\u751f\u6210\u5f0f\u7f16\u8bd1\u300d\u65b9\u6cd5\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7\u8bed\u6cd5\u8f6c\u6362\uff08sealor\uff09\u5c06\u90e8\u5206\u7a0b\u5e8f\u8865\u5168\u4e3a\u53ef\u7f16\u8bd1\u7684\u5b8c\u6574\u7a0b\u5e8f\uff0c\u4f7f\u7f16\u8bd1\u5668\u80fd\u5728LLM\u81ea\u56de\u5f52\u751f\u6210\u8fc7\u7a0b\u4e2d\u5b9e\u65f6\u63d0\u4f9b\u53cd\u9988\u3002\u5728Rust\u4ee3\u7801\u751f\u6210\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0c\u76f8\u6bd4\u4f20\u7edf\u540e\u5904\u7406\u53cd\u9988\uff0c\u663e\u8457\u51cf\u5c11\u7f16\u8bd1\u9519\u8bef\u5e76\u63d0\u5347\u529f\u80fd\u6b63\u786e\u6027\u3002", "categories": ["cs.PL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13921", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u7f16\u8bd1\u5668\u53cd\u9988", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7a0b\u5e8f\u5408\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13921v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Generative Compilation: On-the-Fly Compiler Feedback as AI Generates Code", "tldr": "\u63d0\u51fa\u300c\u751f\u6210\u5f0f\u7f16\u8bd1\u300d\u65b9\u6cd5\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7\u8bed\u6cd5\u8f6c\u6362\uff08sealor\uff09\u5c06\u90e8\u5206\u7a0b\u5e8f\u8865\u5168\u4e3a\u53ef\u7f16\u8bd1\u7684\u5b8c\u6574\u7a0b\u5e8f\uff0c\u4f7f\u7f16\u8bd1\u5668\u80fd\u5728LLM\u81ea\u56de\u5f52\u751f\u6210\u8fc7\u7a0b\u4e2d\u5b9e\u65f6\u63d0\u4f9b\u53cd\u9988\u3002\u5728Rust\u4ee3\u7801\u751f\u6210\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0c\u76f8\u6bd4\u4f20\u7edf\u540e\u5904\u7406\u53cd\u9988\uff0c\u663e\u8457\u51cf\u5c11\u7f16\u8bd1\u9519\u8bef\u5e76\u63d0\u5347\u529f\u80fd\u6b63\u786e\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Serial verification gates are a core reliability primitive in LLM harnesses: a candidate answer is returned only if $k$ verifier calls all accept it. Under conditionally independent gates, the recent Odds Law (arXiv:2606.15712) shows that posterior log-odds grow linearly in $k$, so failure decays exponentially, and states that \"a tight theory of partially correlated verifier cascades remains open.\" This note gives a minimal such theory. Modeling the per-instance false-accept rate on the generator\u0027s own errors as a latent variable $\u03b1\\sim G$ (de Finetti), the exact cascade posterior is $\\ell_k = \\ell_0 - \\ln m_k$, with $m_k$ the $k$-th moment of $G$. Then: (i) $\\ell_k$ is concave in $k$ for every non-degenerate $G$ -- the Odds Law is its tangent at the first gate and an upper bound; (ii) for Beta$(a,b)$ latents, failure decays polynomially, $1-r_k \\asymp k^{-b}$, with correlation parameter $\u03c1_v = 1/(a+b+1)$; (iii) a blind-spot atom of mass $1-\u03c0$ at $\u03b1=1$ caps the evidence extractable from any number of gates at $-\\ln(1-\u03c0)$ nats, so reliability saturates below 1; (iv) letting the true-accept rate also vary ($\u03b2\\sim H$) yields a trichotomy -- gates eventually always help, plateau, or actively harm -- decided by the upper-tail exponents of $G$ and $H$, with closed-form crossover $k^\\dagger$. The mechanism is survivorship: errors surviving gates are the high-$\u03b1$ ones. The theory is measurable: $R$ repeated verdicts per instance identify the first $R$ moments of $G$, so two verdicts identify $\u03c1_v$; beta-binomial likelihood and NPMLE recover the reliability curve and the ill-posed ceiling. In synthetic tests, independence-based extrapolation underestimates failure by 20x at $k=5$ and ~3000x at $k=10$; the correlated fit at $R=8$ tracks held-out depths. The practical lever is decorrelation -- changing model family, modality, or evidence source -- not adding gates.", "arxiv_id": "2607.13918", "arxiv_url": "https://arxiv.org/abs/2607.13918", "authors": ["Jiangang Han"], "brief": "\u672c\u6587\u9488\u5bf9LLM\u9a8c\u8bc1\u5668\u7ea7\u8054\u4e2d\u7684\u90e8\u5206\u76f8\u5173\u6027\u95ee\u9898\uff0c\u5efa\u7acb\u4e86\u6700\u5c0f\u5316\u7406\u8bba\u6846\u67b6\uff1a\u901a\u8fc7\u6f5c\u53d8\u91cf\u5efa\u6a21\uff08de Finetti\uff09\uff0c\u8bc1\u660e\u540e\u9a8c\u5bf9\u6570\u51e0\u7387\u5173\u4e8e\u95e8\u6570\u662f\u51f9\u51fd\u6570\uff08\u800c\u975e\u7ebf\u6027\uff09\uff0c\u5931\u8d25\u7387\u4ee5\u591a\u9879\u5f0f\u800c\u975e\u6307\u6570\u8870\u51cf\uff0c\u4e14\u5b58\u5728\"\u76f2\u70b9\u4e0a\u9650\"\u4f7f\u53ef\u9760\u6027\u65e0\u6cd5\u8fbe\u52301\u3002\u5b9e\u9a8c\u8868\u660e\u72ec\u7acb\u6027\u5047\u8bbe\u4f1a\u4e25\u91cd\u4f4e\u4f30\u5931\u8d25\u7387\uff08k=10\u65f6\u4f4e\u4f30\u7ea63000\u500d\uff09\uff0c\u5b9e\u9645\u63d0\u5347\u53ef\u9760\u6027\u7684\u5173\u952e\u662f\u53bb\u76f8\u5173\uff08\u6362\u6a21\u578b\u65cf/\u6a21\u6001/\u8bc1\u636e\u6e90\uff09\uff0c\u800c\u975e\u589e\u52a0\u9a8c\u8bc1\u95e8\u6570\u3002", "categories": ["math.ST", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13918", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u9760\u6027\u7406\u8bba", "\u9a8c\u8bc1\u5668\u7ea7\u8054", "\u7edf\u8ba1\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13918v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Partially Correlated Verifier Cascades in LLM Harnesses: Concave Log-Odds, Polynomial Reliability, and Blind-Spot Ceilings", "tldr": "\u672c\u6587\u9488\u5bf9LLM\u9a8c\u8bc1\u5668\u7ea7\u8054\u4e2d\u7684\u90e8\u5206\u76f8\u5173\u6027\u95ee\u9898\uff0c\u5efa\u7acb\u4e86\u6700\u5c0f\u5316\u7406\u8bba\u6846\u67b6\uff1a\u901a\u8fc7\u6f5c\u53d8\u91cf\u5efa\u6a21\uff08de Finetti\uff09\uff0c\u8bc1\u660e\u540e\u9a8c\u5bf9\u6570\u51e0\u7387\u5173\u4e8e\u95e8\u6570\u662f\u51f9\u51fd\u6570\uff08\u800c\u975e\u7ebf\u6027\uff09\uff0c\u5931\u8d25\u7387\u4ee5\u591a\u9879\u5f0f\u800c\u975e\u6307\u6570\u8870\u51cf\uff0c\u4e14\u5b58\u5728\"\u76f2\u70b9\u4e0a\u9650\"\u4f7f\u53ef\u9760\u6027\u65e0\u6cd5\u8fbe\u52301\u3002\u5b9e\u9a8c\u8868\u660e\u72ec\u7acb\u6027\u5047\u8bbe\u4f1a\u4e25\u91cd\u4f4e\u4f30\u5931\u8d25\u7387\uff08k=10\u65f6\u4f4e\u4f30\u7ea63000\u500d\uff09\uff0c\u5b9e\u9645\u63d0\u5347\u53ef\u9760\u6027\u7684\u5173\u952e\u662f\u53bb\u76f8\u5173\uff08\u6362\u6a21\u578b\u65cf/\u6a21\u6001/\u8bc1\u636e\u6e90\uff09\uff0c\u800c\u975e\u589e\u52a0\u9a8c\u8bc1\u95e8\u6570\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We propose the AIMO Interpretability Challenge, a competition on distinguishing robust from spurious reasoning in frontier mathematical language models based on the models\u0027 internal mechanisms. The challenge is motivated by a central limitation of standard reasoning benchmarks: strong final-answer accuracy does not reveal whether a model relies on stable reasoning mechanisms or exploits brittle reasoning shortcuts. Building on AI Mathematical Olympiad (AIMO) problems and submissions, together with resources from the Fields Model Initiative, the competition will provide (1) newly-published olympiad-level math reasoning problems and their symbolic representations, allowing generation of novel functional variants, (2) access to frontier reasoning models, and (3) assessments of models\u0027 adversarial robustness on these problems. Participants will use these resources, along with our computing infrastructure support, to develop methods for identifying which models solve problems robustly. Our competition will also create a new, open robustness benchmark and baseline systems, aiming to provide a lasting foundation for standard benchmarking in mathematical reasoning and interpretability. Scientifically, the competition connects interpretability and generalization research around a central question in AI research: can we determine if, and to what extent, the decision-making of frontier AI models is generalizable and thus, reliable?", "arxiv_id": "2607.13899", "arxiv_url": "https://arxiv.org/abs/2607.13899", "authors": ["Michal \u0160tef\u00e1nik", "Philipp Mondorf", "Andreas Waldis", "Qianying Liu", "Chuan Yang", "Michal Spiegel", "Josef Kucha\u0159", "Marek Kadl\u010d\u00edk", "Adam Vawda-Oomerjee", "Chaoran Liu", "Simon Frieder", "Barbara Plank", "Fazl Barez", "Pontus Stenetorp"], "brief": "\u63d0\u51faAIMO\u53ef\u89e3\u91ca\u6027\u6311\u6218\u8d5b\uff0c\u65e8\u5728\u533a\u5206\u524d\u6cbf\u6570\u5b66\u8bed\u8a00\u6a21\u578b\u4e2d\u7684\u9c81\u68d2\u63a8\u7406\u4e0e\u865a\u5047\u63a8\u7406\u3002\u901a\u8fc7\u5965\u6797\u5339\u514b\u6570\u5b66\u9898\u53ca\u5176\u53d8\u4f53\uff0c\u7ed3\u5408\u5bf9\u6297\u9c81\u68d2\u6027\u8bc4\u4f30\uff0c\u63a8\u52a8\u5f00\u53d1\u80fd\u8bc6\u522b\u6a21\u578b\u662f\u5426\u771f\u6b63\u5177\u5907\u53ef\u6cdb\u5316\u63a8\u7406\u80fd\u529b\u7684\u65b9\u6cd5\uff0c\u5e76\u5efa\u7acb\u5f00\u653e\u7684\u9c81\u68d2\u6027\u57fa\u51c6\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13899", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u53ef\u89e3\u91ca\u6027", "\u6570\u5b66\u63a8\u7406", "\u9c81\u68d2\u6027", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13899v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AIMO Interpretability Challenge", "tldr": "\u63d0\u51faAIMO\u53ef\u89e3\u91ca\u6027\u6311\u6218\u8d5b\uff0c\u65e8\u5728\u533a\u5206\u524d\u6cbf\u6570\u5b66\u8bed\u8a00\u6a21\u578b\u4e2d\u7684\u9c81\u68d2\u63a8\u7406\u4e0e\u865a\u5047\u63a8\u7406\u3002\u901a\u8fc7\u5965\u6797\u5339\u514b\u6570\u5b66\u9898\u53ca\u5176\u53d8\u4f53\uff0c\u7ed3\u5408\u5bf9\u6297\u9c81\u68d2\u6027\u8bc4\u4f30\uff0c\u63a8\u52a8\u5f00\u53d1\u80fd\u8bc6\u522b\u6a21\u578b\u662f\u5426\u771f\u6b63\u5177\u5907\u53ef\u6cdb\u5316\u63a8\u7406\u80fd\u529b\u7684\u65b9\u6cd5\uff0c\u5e76\u5efa\u7acb\u5f00\u653e\u7684\u9c81\u68d2\u6027\u57fa\u51c6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We formalize verification in causal graphical models: deciding whether a given observational formula identifies a target interventional distribution. This opens a problem complementary to identification, asking not whether any identifying formula exists, but whether the given formula is identifying. We show that even sound and complete solutions to identification do not solve verification. We propose a falsifier as a first practical route forward, prove that it induces an almost-surely correct verifier for regular exponential-family models, and use the resulting verifier to develop the gateway test, which finds all sets admissible for use in a front-door formula.", "arxiv_id": "2607.13883", "arxiv_url": "https://arxiv.org/abs/2607.13883", "authors": ["Francesco Freni", "Leonard Henckel", "Sebastian Weichwald"], "brief": "\u672c\u6587\u5f62\u5f0f\u5316\u4e86\u56e0\u679c\u56fe\u6a21\u578b\u4e2d\u7684\"\u9a8c\u8bc1\"\u95ee\u9898\uff1a\u5224\u65ad\u7ed9\u5b9a\u7684\u89c2\u6d4b\u516c\u5f0f\u662f\u5426\u80fd\u8bc6\u522b\u76ee\u6807\u5e72\u9884\u5206\u5e03\u3002\u4e0e\u4f20\u7edf\u8bc6\u522b\u95ee\u9898\u4e92\u8865\uff0c\u4f5c\u8005\u63d0\u51fa\u4e86\u4e00\u79cd\u4f2a\u8bc1\u5668\uff0c\u8bc1\u660e\u5176\u5728\u6b63\u5219\u6307\u6570\u65cf\u6a21\u578b\u4e2d\u51e0\u4e4e\u5fc5\u7136\u6b63\u786e\uff0c\u5e76\u57fa\u4e8e\u6b64\u5f00\u53d1\u4e86\"\u7f51\u5173\u6d4b\u8bd5\"\uff0c\u53ef\u627e\u51fa\u6240\u6709\u9002\u7528\u4e8e\u524d\u95e8\u516c\u5f0f\u7684\u53d8\u91cf\u96c6\u5408\u3002", "categories": ["stat.ME", "cs.AI", "cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13883", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56e0\u679c\u63a8\u65ad", "\u5e72\u9884\u5206\u5e03", "\u56fe\u6a21\u578b", "\u8bc6\u522b\u95ee\u9898"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13883v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Verifying formulas for interventional distributions", "tldr": "\u672c\u6587\u5f62\u5f0f\u5316\u4e86\u56e0\u679c\u56fe\u6a21\u578b\u4e2d\u7684\"\u9a8c\u8bc1\"\u95ee\u9898\uff1a\u5224\u65ad\u7ed9\u5b9a\u7684\u89c2\u6d4b\u516c\u5f0f\u662f\u5426\u80fd\u8bc6\u522b\u76ee\u6807\u5e72\u9884\u5206\u5e03\u3002\u4e0e\u4f20\u7edf\u8bc6\u522b\u95ee\u9898\u4e92\u8865\uff0c\u4f5c\u8005\u63d0\u51fa\u4e86\u4e00\u79cd\u4f2a\u8bc1\u5668\uff0c\u8bc1\u660e\u5176\u5728\u6b63\u5219\u6307\u6570\u65cf\u6a21\u578b\u4e2d\u51e0\u4e4e\u5fc5\u7136\u6b63\u786e\uff0c\u5e76\u57fa\u4e8e\u6b64\u5f00\u53d1\u4e86\"\u7f51\u5173\u6d4b\u8bd5\"\uff0c\u53ef\u627e\u51fa\u6240\u6709\u9002\u7528\u4e8e\u524d\u95e8\u516c\u5f0f\u7684\u53d8\u91cf\u96c6\u5408\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This study examines the integration of AI into Human Resource Management in German companies. We ask if and how AI-based technologies are \\enquote{augmenting} human resource management. Organisations employ generative AI or predictive analytics to transform traditional human resource functions, to streamline routine tasks and to reallocate resources toward strategic, people-centred activities. Our findings from interviews and group discussions and a survey (N=410) reveal that while AI tools enhance HR analytics capabilities, their adoption mainly serves efficiency and rationalising goals. The introduction of AI tools is shaped by organisational transformation factors such as digital infrastructure, co-determination frameworks, and ethical implications. The research highlights both the strategic potential for improved talent development and the challenges posed by data governance and algorithmic transparency. Overall, this work contributes to understanding the ambiguous role of technological change in HR, which promises to augment predictive capabilities yet serves the ends of efficiency and rationalisation.", "arxiv_id": "2607.13839", "arxiv_url": "https://arxiv.org/abs/2607.13839", "authors": ["Yannick Kalff", "Katharina Simbeck"], "brief": "\u672c\u7814\u7a76\u901a\u8fc7\u8bbf\u8c08\u3001\u5c0f\u7ec4\u8ba8\u8bba\u53ca410\u4efd\u95ee\u5377\u8c03\u67e5\uff0c\u8003\u5bdf\u5fb7\u56fd\u4f01\u4e1a\u5c06AI\u878d\u5165\u4eba\u529b\u8d44\u6e90\u7ba1\u7406\u7684\u73b0\u72b6\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u751f\u6210\u5f0fAI\u548c\u9884\u6d4b\u5206\u6790\u867d\u63d0\u5347\u4e86HR\u5206\u6790\u80fd\u529b\uff0c\u4f46\u5176\u91c7\u7528\u4e3b\u8981\u670d\u52a1\u4e8e\u6548\u7387\u63d0\u5347\u548c\u5408\u7406\u5316\u76ee\u6807\uff0c\u800c\u975e\u771f\u6b63\u4ee5\u4eba\u4e3a\u4e2d\u5fc3\u7684\u6218\u7565\u8f6c\u578b\u3002\u6570\u636e\u6cbb\u7406\u3001\u7b97\u6cd5\u900f\u660e\u5ea6\u53ca\u5171\u540c\u51b3\u5b9a\u6846\u67b6\u662f\u5236\u7ea6AI\u5728HR\u9886\u57df\u6df1\u5ea6\u5e94\u7528\u7684\u5173\u952e\u6311\u6218\u3002", "categories": ["cs.CY", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13839", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4eba\u529b\u8d44\u6e90\u7ba1\u7406", "\u4eba\u673a\u534f\u4f5c", "\u751f\u6210\u5f0fAI", "\u7b97\u6cd5\u6cbb\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13839v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AI-Augmented Human Resource Management? Insights from German companies", "tldr": "\u672c\u7814\u7a76\u901a\u8fc7\u8bbf\u8c08\u3001\u5c0f\u7ec4\u8ba8\u8bba\u53ca410\u4efd\u95ee\u5377\u8c03\u67e5\uff0c\u8003\u5bdf\u5fb7\u56fd\u4f01\u4e1a\u5c06AI\u878d\u5165\u4eba\u529b\u8d44\u6e90\u7ba1\u7406\u7684\u73b0\u72b6\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u751f\u6210\u5f0fAI\u548c\u9884\u6d4b\u5206\u6790\u867d\u63d0\u5347\u4e86HR\u5206\u6790\u80fd\u529b\uff0c\u4f46\u5176\u91c7\u7528\u4e3b\u8981\u670d\u52a1\u4e8e\u6548\u7387\u63d0\u5347\u548c\u5408\u7406\u5316\u76ee\u6807\uff0c\u800c\u975e\u771f\u6b63\u4ee5\u4eba\u4e3a\u4e2d\u5fc3\u7684\u6218\u7565\u8f6c\u578b\u3002\u6570\u636e\u6cbb\u7406\u3001\u7b97\u6cd5\u900f\u660e\u5ea6\u53ca\u5171\u540c\u51b3\u5b9a\u6846\u67b6\u662f\u5236\u7ea6AI\u5728HR\u9886\u57df\u6df1\u5ea6\u5e94\u7528\u7684\u5173\u952e\u6311\u6218\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In real-world applications, node classification on graphs often faces the challenge of class imbalance, where majority classes dominate training, resulting in biased model performance. Traditional GNNs often struggle in such scenarios, as they tend to overfit to majority classes while underrepresenting minority classes. Existing solutions, which either prioritize nodes based on class size or synthesize new nodes for minority classes, often fall short of effectively addressing this imbalance issue. This paper introduces an approach to class-imbalanced node classification by utilizing a balanced meta-set for importance measurement, where a training node is considered significant if it enhances model performance under an unbiased setting. Our method identifies important nodes that can counteract class imbalance and utilizes them for model training, allowing for fine-grained and dynamic node selection throughout the training process. We theoretically derive a formula to directly assess node importance, reducing computational overhead and providing an intuitive threshold for node selection. Guided by this metric, we develop a novel framework that filters valuable labeled, unlabeled, and synthetic nodes that enhance model performance in an unbiased context. A key advantage of this framework is its separation of the synthetic node generation process from the filtering process, ensuring compatibility with various node generation methods. Furthermore, we introduce a strategy to construct a high-quality meta-set that closely approximates the overall feature distribution, ensuring robust representation of each class. We evaluate our framework, NodeImport, across multiple datasets using popular GNN architectures, demonstrating its superiority over existing baselines. Our results highlight the flexibility and effectiveness of the framework in mitigating class imbalance, leading to improved outcomes.", "arxiv_id": "2607.13837", "arxiv_url": "https://arxiv.org/abs/2607.13837", "authors": ["Nan Chen", "Zemin Liu", "Bryan Hooi", "Bingsheng He", "Jun Hu", "Jia Chen"], "brief": "\u9488\u5bf9\u56fe\u8282\u70b9\u5206\u7c7b\u4e2d\u7684\u7c7b\u522b\u4e0d\u5e73\u8861\u95ee\u9898\uff0c\u63d0\u51faNodeImport\u6846\u67b6\uff0c\u901a\u8fc7\u5e73\u8861\u5143\u96c6\u8bc4\u4f30\u8282\u70b9\u91cd\u8981\u6027\uff0c\u52a8\u6001\u7b5b\u9009\u6709\u4ef7\u503c\u7684\u6807\u6ce8\u3001\u672a\u6807\u6ce8\u53ca\u5408\u6210\u8282\u70b9\u7528\u4e8e\u8bad\u7ec3\u3002\u7406\u8bba\u63a8\u5bfc\u4e86\u8282\u70b9\u91cd\u8981\u6027\u8ba1\u7b97\u516c\u5f0f\uff0c\u964d\u4f4e\u8ba1\u7b97\u5f00\u9500\uff0c\u5e76\u5c06\u8282\u70b9\u751f\u6210\u4e0e\u7b5b\u9009\u8fc7\u7a0b\u89e3\u8026\uff0c\u517c\u5bb9\u591a\u79cd\u751f\u6210\u65b9\u6cd5\uff0c\u5728\u591a\u4e2a\u6570\u636e\u96c6\u4e0a\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13837", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u795e\u7ecf\u7f51\u7edc", "\u7c7b\u522b\u4e0d\u5e73\u8861", "\u8282\u70b9\u5206\u7c7b", "\u5143\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13837v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "NodeImport: Imbalanced Node Classification with Node Importance Assessment", "tldr": "\u9488\u5bf9\u56fe\u8282\u70b9\u5206\u7c7b\u4e2d\u7684\u7c7b\u522b\u4e0d\u5e73\u8861\u95ee\u9898\uff0c\u63d0\u51faNodeImport\u6846\u67b6\uff0c\u901a\u8fc7\u5e73\u8861\u5143\u96c6\u8bc4\u4f30\u8282\u70b9\u91cd\u8981\u6027\uff0c\u52a8\u6001\u7b5b\u9009\u6709\u4ef7\u503c\u7684\u6807\u6ce8\u3001\u672a\u6807\u6ce8\u53ca\u5408\u6210\u8282\u70b9\u7528\u4e8e\u8bad\u7ec3\u3002\u7406\u8bba\u63a8\u5bfc\u4e86\u8282\u70b9\u91cd\u8981\u6027\u8ba1\u7b97\u516c\u5f0f\uff0c\u964d\u4f4e\u8ba1\u7b97\u5f00\u9500\uff0c\u5e76\u5c06\u8282\u70b9\u751f\u6210\u4e0e\u7b5b\u9009\u8fc7\u7a0b\u89e3\u8026\uff0c\u517c\u5bb9\u591a\u79cd\u751f\u6210\u65b9\u6cd5\uff0c\u5728\u591a\u4e2a\u6570\u636e\u96c6\u4e0a\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Accurate determination of pancreatic ductal adenocarcinoma (PDAC) resectability relies on evaluating how the tumor interacts with major peripancreatic vessels on CT imaging, yet expert assessment often shows substantial variability. We introduce a fully automated multimodal deep learning framework that jointly analyzes 3D contrast enhanced CT and structured clinical information to classify patients into the three National Comprehensive Cancer Network (NCCN) resectability categories (upfront resectable, borderline resectable, locally advanced). The approach uses a Swin-UNETR backbone to obtain anatomy aware image representations through auxiliary segmentation of pancreas, tumor, and vascular structures. These features are fused with a compact clinical embedding derived from 17 routinely collected variables and processed by a lightweight classification head. Model training is guided by a dynamic multitask objective that adapts the balance between segmentation and classification based on current tumor Dice performance, promoting feature representations that remain both anatomically informed and discriminative.", "arxiv_id": "2607.13826", "arxiv_url": "https://arxiv.org/abs/2607.13826", "authors": ["Vincent Ochs", "Christoph Kuemmerli", "Florentin Bieder", "Julia Wolleb", "Joel L. Lavanchy", "Julia Ruppel", "Jan Liechti", "Stephanie Taha-Mehlitz", "Christian Andreas Nebiker", "Beat Mueller", "Giuseppe Kito Fusai", "Joerg-Matthias Pollok", "Anas Taha", "Philippe C. Cattin", "Sebastian Staubli"], "brief": "\u63d0\u51fa\u4e00\u79cd\u5168\u81ea\u52a8\u591a\u6a21\u6001\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u8054\u5408\u5206\u67903D\u589e\u5f3aCT\u56fe\u50cf\u4e0e\u7ed3\u6784\u5316\u4e34\u5e8a\u4fe1\u606f\uff0c\u5c06\u80f0\u817a\u5bfc\u7ba1\u817a\u764c\u60a3\u8005\u5206\u7c7b\u4e3a\u4e09\u79cdNCCN\u53ef\u5207\u9664\u6027\u7c7b\u522b\u3002\u91c7\u7528Swin-UNETR\u9aa8\u5e72\u7f51\u7edc\u8fdb\u884c\u80f0\u817a\u3001\u80bf\u7624\u53ca\u8840\u7ba1\u7684\u8f85\u52a9\u5206\u5272\uff0c\u5e76\u901a\u8fc7\u52a8\u6001\u591a\u4efb\u52a1\u76ee\u6807\u51fd\u6570\u81ea\u9002\u5e94\u5e73\u8861\u5206\u5272\u4e0e\u5206\u7c7b\u4efb\u52a1\uff0c\u63d0\u5347\u4e86\u5206\u7c7b\u7684\u89e3\u5256\u611f\u77e5\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.AI", "cs.IR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13826", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u533b\u5b66\u5f71\u50cf", "\u6df1\u5ea6\u5b66\u4e60", "\u80bf\u7624\u5206\u7c7b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13826v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Multimodal Assessment of Pancreatic Cancer Resectability Using Deep Learning", "tldr": "\u63d0\u51fa\u4e00\u79cd\u5168\u81ea\u52a8\u591a\u6a21\u6001\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u8054\u5408\u5206\u67903D\u589e\u5f3aCT\u56fe\u50cf\u4e0e\u7ed3\u6784\u5316\u4e34\u5e8a\u4fe1\u606f\uff0c\u5c06\u80f0\u817a\u5bfc\u7ba1\u817a\u764c\u60a3\u8005\u5206\u7c7b\u4e3a\u4e09\u79cdNCCN\u53ef\u5207\u9664\u6027\u7c7b\u522b\u3002\u91c7\u7528Swin-UNETR\u9aa8\u5e72\u7f51\u7edc\u8fdb\u884c\u80f0\u817a\u3001\u80bf\u7624\u53ca\u8840\u7ba1\u7684\u8f85\u52a9\u5206\u5272\uff0c\u5e76\u901a\u8fc7\u52a8\u6001\u591a\u4efb\u52a1\u76ee\u6807\u51fd\u6570\u81ea\u9002\u5e94\u5e73\u8861\u5206\u5272\u4e0e\u5206\u7c7b\u4efb\u52a1\uff0c\u63d0\u5347\u4e86\u5206\u7c7b\u7684\u89e3\u5256\u611f\u77e5\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language model (LLM)-based intrusion detection systems (IDS) are increasingly studied for security monitoring, yet their robustness against feasible traffic manipulation remains largely empirical. We present Traffic-Aware Randomized Smoothing (TA-RS), a classifier-agnostic certified defense that injects Gaussian noise exclusively into the directly controllable (DC) subspace -- features a remote attacker can modify -- during both fine-tuning and certification, aligning the smoothing distribution with the attacker-controllable subspace. We identify a critical prerequisite: applying standard randomized smoothing to clean-trained LLM-IDS yields weak certified accuracy in three of four (model, dataset) pairs tested (14-33%, at or below random) and only 57% in the fourth (43 pp below the noise-augmented result); noise-augmented fine-tuning recovers to 68-100% on two of three benchmark datasets (at sigma=0.25). At the L_inf-equivalent threshold R_inf = epsilon*sqrt(|DC|) (epsilon=0.05), TA-RS achieves 55-100% certified accuracy on CIC-IDS-2018 and HIKARI-2021, with median certified radii (R approx 0.45-0.96) exceeding R_inf by 1.8-5x (across sigma=0.25-1.00). Against a fairly trained iso-trained RS baseline the residual advantage is dataset-dependent (4-19 pp on CIC-IDS-2018). The larger gap -- up to 72 pp against an isotropic RS baseline that shares the DC-noise-augmented training recipe -- primarily reflects the training-certification mismatch rather than DC alignment alone: isotropic test-time noise perturbs uncontrollable features the attacker cannot exploit, triggering abstention rates up to 68%. RT-IoT2022 probes the limits of the method: it fails under the default fine-tuning recipe but recovers to 76%/69% certified accuracy (LLaMA3-8B/Qwen3-8B) when noise augmentation is increased.", "arxiv_id": "2607.13801", "arxiv_url": "https://arxiv.org/abs/2607.13801", "authors": ["Zhenpeng Li"], "brief": "\u63d0\u51fa\u6d41\u91cf\u611f\u77e5\u968f\u673a\u5e73\u6ed1\uff08TA-RS\uff09\u65b9\u6cd5\uff0c\u4e13\u95e8\u9488\u5bf9\u653b\u51fb\u8005\u53ef\u63a7\u7279\u5f81\u5b50\u7a7a\u95f4\u6ce8\u5165\u9ad8\u65af\u566a\u58f0\uff0c\u4e3a\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u7684\u7f51\u7edc\u5165\u4fb5\u68c0\u6d4b\u7cfb\u7edf\u63d0\u4f9b\u53ef\u8ba4\u8bc1\u9c81\u68d2\u6027\u9632\u5fa1\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u76f8\u6bd4\u6807\u51c6\u968f\u673a\u5e73\u6ed1\uff0cTA-RS\u5728\u591a\u4e2a\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\u5c06\u8ba4\u8bc1\u51c6\u786e\u7387\u63d0\u5347\u81f355-100%\uff0c\u8ba4\u8bc1\u534a\u5f84\u8d85\u8fc7\u653b\u51fb\u9608\u503c1.8-5\u500d\u3002", "categories": ["cs.CR", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13801", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5165\u4fb5\u68c0\u6d4b", "\u968f\u673a\u5e73\u6ed1", "\u5bf9\u6297\u9c81\u68d2\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13801v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Traffic-Aware Randomized Smoothing for LLM-Based Network Intrusion Detection", "tldr": "\u63d0\u51fa\u6d41\u91cf\u611f\u77e5\u968f\u673a\u5e73\u6ed1\uff08TA-RS\uff09\u65b9\u6cd5\uff0c\u4e13\u95e8\u9488\u5bf9\u653b\u51fb\u8005\u53ef\u63a7\u7279\u5f81\u5b50\u7a7a\u95f4\u6ce8\u5165\u9ad8\u65af\u566a\u58f0\uff0c\u4e3a\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u7684\u7f51\u7edc\u5165\u4fb5\u68c0\u6d4b\u7cfb\u7edf\u63d0\u4f9b\u53ef\u8ba4\u8bc1\u9c81\u68d2\u6027\u9632\u5fa1\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u76f8\u6bd4\u6807\u51c6\u968f\u673a\u5e73\u6ed1\uff0cTA-RS\u5728\u591a\u4e2a\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\u5c06\u8ba4\u8bc1\u51c6\u786e\u7387\u63d0\u5347\u81f355-100%\uff0c\u8ba4\u8bc1\u534a\u5f84\u8d85\u8fc7\u653b\u51fb\u9608\u503c1.8-5\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Chest radiograph datasets often combine multiple images with Clinical Indication, Findings, and Impression, although these inputs are produced at different stages of care. We evaluated 15,000 ReXGradient-160K studies with two readable images and five CheXbert-derived report observations. Frozen DenseNet-121 and Bio+ClinicalBERT encoders were used to compare image-only, Indication-only, fixed-order multimodal, random-swap, DeepSets, and SectionGuard-MI models. Findings and Impression were evaluated only as post-hoc leakage controls. Models were trained with five seeds, and public-test uncertainty was estimated with 2,000 patient-cluster bootstrap replicates. Under U-Ones, macro AUROC was 0.643 for the primary image, 0.694 for two images, 0.749 for Indication, and 0.780 for ordinary two-image-plus-Indication fusion. SectionGuard-MI achieved AUROC 0.783 and AUPRC 0.260. Relative to ordinary fusion, its paired AUROC difference was 0.0031 (95% CI, -0.0042 to 0.0104; adjusted p=0.374), while its AUPRC difference was 0.0289 (95% CI, 0.0095 to 0.0413; adjusted p=0.004). DeepSets had the highest prospective AUROC point estimate (0.787), and random-swap fusion had the highest prospective AUPRC point estimate (0.265) with better calibration than SectionGuard-MI. Full report text alone reached AUROC 0.979 and AUPRC 0.836; AUROC remained above 0.973 after exact or expanded masking. These results show that prospective Indication is strongly associated with report-derived targets, permutation-aware fusion is competitive, and post-hoc report text creates substantial report-label circularity.", "arxiv_id": "2607.13800", "arxiv_url": "https://arxiv.org/abs/2607.13800", "authors": ["Kamran Shahid", "Muhammad Munwar Iqbal"], "brief": "\u7814\u7a76\u8bc4\u4f30\u4e86\u80f8\u90e8X\u5149\u591a\u56fe\u50cf\u4e0e\u4e34\u5e8a\u6587\u672c\u878d\u5408\u5206\u7c7b\u6a21\u578b\uff0c\u53d1\u73b0\u4e34\u5e8a\u6307\u5f81\uff08Indication\uff09\u4e0e\u62a5\u544a\u6807\u7b7e\u9ad8\u5ea6\u76f8\u5173\uff0c\u591a\u56fe\u50cf\u878d\u5408\u53ef\u63d0\u5347\u8bca\u65ad\u6027\u80fd\uff0c\u4f46\u62a5\u544a\u6587\u672c\uff08Findings/Impression\uff09\u5b58\u5728\u4e25\u91cd\u7684\u6807\u7b7e\u5faa\u73af\u6cc4\u6f0f\u95ee\u9898\u3002SectionGuard-MI\u7b49\u6392\u5217\u611f\u77e5\u878d\u5408\u65b9\u6cd5\u5728AUPRC\u4e0a\u6709\u663e\u8457\u63d0\u5347\uff0c\u4f46AUROC\u6539\u5584\u6709\u9650\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13800", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u5f71\u50cf", "\u591a\u6a21\u6001", "\u80f8\u90e8X\u5149", "\u6570\u636e\u6cc4\u6f0f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13800v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Prospective clinical indication, post-hoc report leakage, and fusion design in multi-image chest radiograph classification: a patient-clustered evaluation", "tldr": "\u7814\u7a76\u8bc4\u4f30\u4e86\u80f8\u90e8X\u5149\u591a\u56fe\u50cf\u4e0e\u4e34\u5e8a\u6587\u672c\u878d\u5408\u5206\u7c7b\u6a21\u578b\uff0c\u53d1\u73b0\u4e34\u5e8a\u6307\u5f81\uff08Indication\uff09\u4e0e\u62a5\u544a\u6807\u7b7e\u9ad8\u5ea6\u76f8\u5173\uff0c\u591a\u56fe\u50cf\u878d\u5408\u53ef\u63d0\u5347\u8bca\u65ad\u6027\u80fd\uff0c\u4f46\u62a5\u544a\u6587\u672c\uff08Findings/Impression\uff09\u5b58\u5728\u4e25\u91cd\u7684\u6807\u7b7e\u5faa\u73af\u6cc4\u6f0f\u95ee\u9898\u3002SectionGuard-MI\u7b49\u6392\u5217\u611f\u77e5\u878d\u5408\u65b9\u6cd5\u5728AUPRC\u4e0a\u6709\u663e\u8457\u63d0\u5347\uff0c\u4f46AUROC\u6539\u5584\u6709\u9650\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper establishes a direct analogue of the classical Coding Theorem in the setting of symmetry groups. We consider computable bijections on the set of binary strings, called symmetries and define the symmetry prior of a string as the probability that a randomly chosen symmetry from a given group has the string as its unique fixed point. We show that for any fix-retractable symmetry group, a group admitting a computable section that selects an isolating symmetry for every string, the symmetry prior is a universal lower semi-computable semi-measure. In this case, the Geometric Coding Theorem holds. We also develop a Galois connection between subgroups of G and subsets of binary strings, characterizing closed points and maximal closed subgroups, and explore the join-semilattice of dense subgroups. Our results unify algorithmic information theory with group theory and provide a framework for studying symmetry-induced complexity measures. This paper is the first in a series on Computational Algorithmic Statistics (CAS).", "arxiv_id": "2607.13796", "arxiv_url": "https://arxiv.org/abs/2607.13796", "authors": ["Romie Banerjee"], "brief": "\u672c\u6587\u5728\u5bf9\u79f0\u7fa4\u6846\u67b6\u4e0b\u5efa\u7acb\u4e86\u7ecf\u5178\u7f16\u7801\u5b9a\u7406\u7684\u7c7b\u6bd4\uff0c\u5b9a\u4e49\u4e86\u5b57\u7b26\u4e32\u7684\u5bf9\u79f0\u5148\u9a8c\u6982\u7387\uff0c\u5e76\u8bc1\u660e\u5bf9\u4e8e\u53ef\u4fee\u7f29\u5bf9\u79f0\u7fa4\uff0c\u8be5\u5148\u9a8c\u662f\u901a\u7528\u4e0b\u534a\u53ef\u8ba1\u7b97\u534a\u6d4b\u5ea6\uff08\u51e0\u4f55\u7f16\u7801\u5b9a\u7406\uff09\u3002\u540c\u65f6\u6784\u5efa\u4e86\u5b50\u7fa4\u4e0e\u4e8c\u8fdb\u5236\u5b57\u7b26\u4e32\u5b50\u96c6\u4e4b\u95f4\u7684Galois\u8fde\u63a5\uff0c\u5c06\u7b97\u6cd5\u4fe1\u606f\u8bba\u4e0e\u7fa4\u8bba\u7edf\u4e00\u5728\u540c\u4e00\u6846\u67b6\u4e0b\u3002", "categories": ["cs.IT", "cs.AI", "math.CT", "math.GR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13796", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7b97\u6cd5\u4fe1\u606f\u8bba", "\u7f16\u7801\u5b9a\u7406", "\u7fa4\u8bba", "\u590d\u6742\u6027\u5ea6\u91cf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13796v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CAS I: A Geometric Coding Theorem", "tldr": "\u672c\u6587\u5728\u5bf9\u79f0\u7fa4\u6846\u67b6\u4e0b\u5efa\u7acb\u4e86\u7ecf\u5178\u7f16\u7801\u5b9a\u7406\u7684\u7c7b\u6bd4\uff0c\u5b9a\u4e49\u4e86\u5b57\u7b26\u4e32\u7684\u5bf9\u79f0\u5148\u9a8c\u6982\u7387\uff0c\u5e76\u8bc1\u660e\u5bf9\u4e8e\u53ef\u4fee\u7f29\u5bf9\u79f0\u7fa4\uff0c\u8be5\u5148\u9a8c\u662f\u901a\u7528\u4e0b\u534a\u53ef\u8ba1\u7b97\u534a\u6d4b\u5ea6\uff08\u51e0\u4f55\u7f16\u7801\u5b9a\u7406\uff09\u3002\u540c\u65f6\u6784\u5efa\u4e86\u5b50\u7fa4\u4e0e\u4e8c\u8fdb\u5236\u5b57\u7b26\u4e32\u5b50\u96c6\u4e4b\u95f4\u7684Galois\u8fde\u63a5\uff0c\u5c06\u7b97\u6cd5\u4fe1\u606f\u8bba\u4e0e\u7fa4\u8bba\u7edf\u4e00\u5728\u540c\u4e00\u6846\u67b6\u4e0b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Video diffusion transformers (vDiTs) generate high quality video but introduce extremely high compute cost due to the long diffusion timesteps and self attention computation. As diffusion timesteps are reduced, the computation cost of self attention becomes the dominant bottleneck. Existing acceleration approaches largely inherit sparse attention techniques from large language models, which fail to consider the unique spatiotemporal correlation of video data. This paper presents Kaleido, an algorithm hardware codesign that accelerates all operations in vDiTs by exploiting channel-wise spatiotemporal correlations in latent space. Based on this insight, we propose a lightweight channelwise reuse algorithm that skips redundant computations by reusing partial results while preserving higher generative quality than prior methods (\u003e17 dB). To efficiently support this algorithm, we design a systolic array like accelerator with reconfigurable processing elements and a lightweight data dispatcher to mitigate irregular sparsity and data access patterns introduced by our reuse algorithm. Evaluations across three mainstream vDiT models show that Kaleido achieves up to 5.9x speedup and 16.0x energy savings over state of the art accelerators.", "arxiv_id": "2607.13770", "arxiv_url": "https://arxiv.org/abs/2607.13770", "authors": ["Wenxuan Miao", "Haosong Liu", "Weiming Hu", "Zihan Liu", "Aiyue Chen", "Jianlin Yu", "Yiwu Yao", "Yiming Gan", "Jieru Zhao", "Jingwen Leng", "Minyi Guo", "Yu Feng"], "brief": "\u63d0\u51faKaleido\uff0c\u4e00\u79cd\u9488\u5bf9\u89c6\u9891\u6269\u6563Transformer\u7684\u7b97\u6cd5-\u786c\u4ef6\u534f\u540c\u8bbe\u8ba1\u65b9\u6848\uff0c\u901a\u8fc7\u6316\u6398\u6f5c\u5728\u7a7a\u95f4\u4e2d\u901a\u9053\u7ef4\u5ea6\u7684\u65f6\u7a7a\u76f8\u5173\u6027\u6765\u8df3\u8fc7\u5197\u4f59\u8ba1\u7b97\u3002\u76f8\u6bd4\u73b0\u6709\u52a0\u901f\u5668\u5b9e\u73b0\u6700\u9ad85.9\u500d\u52a0\u901f\u548c16\u500d\u80fd\u8017\u8282\u7701\uff0c\u540c\u65f6\u751f\u6210\u8d28\u91cf\u4f18\u4e8e\u5148\u524d\u65b9\u6cd5\uff08\u003e17 dB\uff09\u3002", "categories": ["cs.AR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13770", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u786c\u4ef6\u52a0\u901f", "\u89c6\u9891\u751f\u6210", "\u7a00\u758f\u6ce8\u610f\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13770v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Kaleido: Algorithm-Hardware Co-Design for Video Diffusion Transformers by Exploiting Latent Space Correlations", "tldr": "\u63d0\u51faKaleido\uff0c\u4e00\u79cd\u9488\u5bf9\u89c6\u9891\u6269\u6563Transformer\u7684\u7b97\u6cd5-\u786c\u4ef6\u534f\u540c\u8bbe\u8ba1\u65b9\u6848\uff0c\u901a\u8fc7\u6316\u6398\u6f5c\u5728\u7a7a\u95f4\u4e2d\u901a\u9053\u7ef4\u5ea6\u7684\u65f6\u7a7a\u76f8\u5173\u6027\u6765\u8df3\u8fc7\u5197\u4f59\u8ba1\u7b97\u3002\u76f8\u6bd4\u73b0\u6709\u52a0\u901f\u5668\u5b9e\u73b0\u6700\u9ad85.9\u500d\u52a0\u901f\u548c16\u500d\u80fd\u8017\u8282\u7701\uff0c\u540c\u65f6\u751f\u6210\u8d28\u91cf\u4f18\u4e8e\u5148\u524d\u65b9\u6cd5\uff08\u003e17 dB\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Single-task fine-tuning of graph neural networks (GNNs) for power grid problems exhibits a systematic failure mode: models that achieve the lowest in-distribution error degrade the most under topology shift. We term this topology overfitting: the tendency of task-specific gradient signals to encode relational structure particular to the training topologies rather than the underlying physics, causing models to fail on unseen grids despite strong in-distribution performance. To expose and address this failure mode, we introduce MxGPS (Multiplex GPS), a multiplex graph transformer that runs K task-specialised GPS branches over a shared node encoder, jointly trained on Static State Estimation (SSE) and AC Power Flow (PF) via a self-supervised pre-training and multi-task fine-tuning protocol, with a cross-branch attention module evaluated in ablation. The joint SSE+PF objective forces the shared encoder to simultaneously satisfy complementary gradient signals, preventing it from overfitting to topology-specific relational structure. Under a 3-fold sliding-window cross-validation spanning four unseen topologies (14-, 24-, 162-, and 300-bus), MxGPS attains 0% boundary violation rate (BVR) on all four zero-shot Power Flow topologies. Critically, models with substantially lower in-distribution PF error degrade by 190% to 1400% under topology shift, whereas MxGPS degrades by only 39%, an inversion that directly implicates topology overfitting as the failure mechanism rather than insufficient model capacity. With only 1.6M parameters (12x fewer than the GridFM reference baseline), MxGPS demonstrates that multi-task joint training is a principled and parameter-efficient mechanism for topology-agnostic generalisation in power grid foundation models.", "arxiv_id": "2607.13763", "arxiv_url": "https://arxiv.org/abs/2607.13763", "authors": ["Charilaos Papaioannou", "Ioannis Tsantilas", "Dimitris Giannakakos", "Vasilis Michalakopoulos", "Sotiris Pelekis", "Vangelis Marinakis", "Arsam Aryandoust", "Antonello Monti", "Ricardo J. Bessa", "Perdo P. Vergara", "Jochen Cremer", "Elissaios Sarmas"], "brief": "\u9488\u5bf9\u7535\u7f51\u56fe\u795e\u7ecf\u7f51\u7edc\u7684\u62d3\u6251\u8fc7\u62df\u5408\u95ee\u9898\uff0c\u63d0\u51faMxGPS\u591a\u8def\u56feTransformer\uff0c\u901a\u8fc7\u8054\u5408\u8bad\u7ec3\u9759\u6001\u72b6\u6001\u4f30\u8ba1\u548c\u4ea4\u6d41\u6f6e\u6d41\u4e24\u4e2a\u4efb\u52a1\uff0c\u5f3a\u8feb\u5171\u4eab\u7f16\u7801\u5668\u5b66\u4e60\u7269\u7406\u672c\u8d28\u800c\u975e\u62d3\u6251\u7279\u5b9a\u7ed3\u6784\u3002\u5728\u56db\u4e2a\u672a\u89c1\u62d3\u6251\u7684\u96f6\u6837\u672c\u6d4b\u8bd5\u4e2d\uff0cMxGPS\u62d3\u6251\u8fc1\u79fb\u6027\u80fd\u9000\u5316\u4ec539%\uff0c\u8fdc\u4f18\u4e8e\u57fa\u7ebf\u7684190%-1400%\uff0c\u4e14\u53c2\u6570\u91cf\u51cf\u5c1112\u500d\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13763", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u795e\u7ecf\u7f51\u7edc", "\u7535\u7f51\u57fa\u7840\u6a21\u578b", "\u591a\u4efb\u52a1\u5b66\u4e60", "\u56feTransformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13763v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MxGPS: Multiplex Graph Transformers for a Power Grid Foundation Model", "tldr": "\u9488\u5bf9\u7535\u7f51\u56fe\u795e\u7ecf\u7f51\u7edc\u7684\u62d3\u6251\u8fc7\u62df\u5408\u95ee\u9898\uff0c\u63d0\u51faMxGPS\u591a\u8def\u56feTransformer\uff0c\u901a\u8fc7\u8054\u5408\u8bad\u7ec3\u9759\u6001\u72b6\u6001\u4f30\u8ba1\u548c\u4ea4\u6d41\u6f6e\u6d41\u4e24\u4e2a\u4efb\u52a1\uff0c\u5f3a\u8feb\u5171\u4eab\u7f16\u7801\u5668\u5b66\u4e60\u7269\u7406\u672c\u8d28\u800c\u975e\u62d3\u6251\u7279\u5b9a\u7ed3\u6784\u3002\u5728\u56db\u4e2a\u672a\u89c1\u62d3\u6251\u7684\u96f6\u6837\u672c\u6d4b\u8bd5\u4e2d\uff0cMxGPS\u62d3\u6251\u8fc1\u79fb\u6027\u80fd\u9000\u5316\u4ec539%\uff0c\u8fdc\u4f18\u4e8e\u57fa\u7ebf\u7684190%-1400%\uff0c\u4e14\u53c2\u6570\u91cf\u51cf\u5c1112\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Background and Objective: Deep video models estimate left-ventricular ejection fraction (EF) from echocardiography with near-expert accuracy, and post-hoc attribution (Chefer relevance for transformers, Grad-CAM for CNNs) is increasingly used to certify that models \"look at the right place.\" Yet whether these explanations are faithful both spatially and temporally is unaudited. Because EF is defined by the end-systolic (ES) and end-diastolic (ED) frames, a faithful explanation must localize the left ventricle (space) and the decisive frames (time). Methods: We fine-tune two distinct EF regressors on EchoNet-Dynamic -- a self-supervised VideoMAE transformer and a Kinetics-pretrained R(2+1)D CNN -- and audit each with architecture-matched attribution along three axes: intersection-over-relevance (IoR) against LV masks, deletion AUC, and a temporal localization index on ES/ED frames, each relative to chance with per-case 95% CIs over 50 studies. A tubelet-occlusion probe separates attribution failure from model behavior. Results: Both models are anatomically faithful -- IoR 2.91x (VideoMAE) and 1.98x (R(2+1)D) above chance -- yet temporally blind: temporal localization is indistinguishable from chance (0.97--1.00) and no better than random attribution. Occlusion shows the models do not preferentially rely on ES/ED (0.90x chance), so temporal blindness reflects model behavior, not an attribution artifact. Conclusions: Spatial faithfulness does not imply temporal faithfulness. Attribution can certify anatomical grounding while masking that a model ignores the clinically decisive frames -- a caution for XAI-based validation of video diagnostic models and a call for temporally-aware training and evaluation.", "arxiv_id": "2607.13738", "arxiv_url": "https://arxiv.org/abs/2607.13738", "authors": ["Hyunkyung Han", "Min Jung Kim"], "brief": "\u7814\u7a76\u5ba1\u8ba1\u4e86\u7528\u4e8e\u8d85\u58f0\u5fc3\u52a8\u56fe\u5c04\u8840\u5206\u6570\u4f30\u8ba1\u7684\u6df1\u5ea6\u89c6\u9891\u6a21\u578b\uff08VideoMAE\u548cR(2+1)D CNN\uff09\u7684\u5f52\u56e0\u89e3\u91ca\uff0c\u53d1\u73b0\u6a21\u578b\u5728\u7a7a\u95f4\u4e0a\u80fd\u6b63\u786e\u5b9a\u4f4d\u5de6\u5fc3\u5ba4\uff08\u89e3\u5256\u5fe0\u5b9e\uff09\uff0c\u4f46\u5728\u65f6\u95f4\u4e0a\u5b8c\u5168\u65e0\u6cd5\u8bc6\u522b\u5173\u952e\u5e27\uff08\u6536\u7f29\u672b\u6
