<script>
const PAPERS = [{"abstract": "Large Language Model (LLM) agents increasingly rely on external memory systems to accumulate experience across tasks. Yet nearly all existing approaches, from graph-structured memories to reflective insight stores, access memory through fixed, hand-designed heuristics. We argue that this static view of memory is a core bottleneck for agentic learning because optimal memory behavior is fundamentally context-dependent. The early stages of the tasks, benefit from minimal retrieval because memory is sparse; recurring goal types benefit from plan reuse rather than generic nearest-neighbor lookup; stuck agents benefit from re-retrieval with alternative queries; and across long task streams, the memory store itself must be consolidated and pruned to remain useful. We present Memory as a Controlled Process (MemCon), a framework that models memory operations as a Markov Decision Process and learns an online policy that adaptively decides when, what, and how much to retrieve, when to inject a distilled plan, and when to consolidate or forget. MemCon is backend-agnostic: it wraps any existing memory implementation, learns from task-by-task binary feedback with no pretraining and no additional LLM calls, and uses a lightweight tabular contextual bandit with UCB exploration that converges within tens of tasks. Across 6 benchmarks, 3 agent frameworks, and 3 LLM backbones, MemCon consistently outperforms multiple memory baselines by up to 15.2 points in task success while reducing token consumption by 5--20%.", "arxiv_id": "2607.13591", "arxiv_url": "https://arxiv.org/abs/2607.13591", "authors": ["Eric Hanchen Jiang", "Zhi Zhang", "Yuchen Wu", "Levina Li", "Dong Liu", "Xiao Liang", "Rui Sun", "Yubei Li", "Edward Sun", "Haozheng Luo", "Zhaolu Kang", "Aylin Caliskan", "Kai-Wei Chang", "Ying Nian Wu"], "brief": "\u63d0\u51faMemCon\u6846\u67b6\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7684\u8bb0\u5fc6\u7ba1\u7406\u5efa\u6a21\u4e3a\u9a6c\u5c14\u53ef\u592b\u51b3\u7b56\u8fc7\u7a0b\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7\u4e0a\u4e0b\u6587\u8d4c\u535a\u673a\u7b56\u7565\u81ea\u9002\u5e94\u51b3\u5b9a\u4f55\u65f6\u68c0\u7d22\u3001\u6ce8\u5165\u84b8\u998f\u8ba1\u5212\u53ca\u4f55\u65f6\u6574\u5408/\u9057\u5fd8\u8bb0\u5fc6\uff0c\u66ff\u4ee3\u73b0\u6709\u56fa\u5b9a\u542f\u53d1\u5f0f\u89c4\u5219\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13591", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u8bb0\u5fc6\u64cd\u4f5c\u88ab\u5efa\u6a21\u4e3aMDP\uff0c\u4f7f\u7528UCB\u63a2\u7d22\u7684\u8868\u683c\u5f0f\u4e0a\u4e0b\u6587\u8d4c\u535a\u673a\uff0c\u65e0\u9700\u9884\u8bad\u7ec3\uff0c\u4ec5\u4f9d\u8d56\u4efb\u52a1\u7ea7\u4e8c\u5143\u53cd\u9988\uff0c\u6570\u5341\u4e2a\u4efb\u52a1\u5185\u6536\u655b", "\u6846\u67b6\u540e\u7aef\u65e0\u5173\uff0c\u53ef\u5305\u88c5\u4efb\u610f\u73b0\u6709\u8bb0\u5fc6\u5b9e\u73b0\uff0c\u65e0\u9700\u989d\u5916LLM\u8c03\u7528", "\u57286\u4e2a\u57fa\u51c6\u30013\u4e2a\u667a\u80fd\u4f53\u6846\u67b6\u30013\u4e2aLLM\u9aa8\u5e72\u4e0a\uff0c\u4efb\u52a1\u6210\u529f\u7387\u6700\u9ad8\u63d0\u534715.2\u4e2a\u767e\u5206\u70b9\uff0c\u540c\u65f6\u964d\u4f4etoken\u6d88\u80175-20%"], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u7ba1\u7406", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13591v1", "published_at": "2026-07-15", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Memory as a Controlled Process: Learned Adaptive Memory Management for LLM Agents", "tldr": "\u5c06LLM\u667a\u80fd\u4f53\u7684\u8bb0\u5fc6\u64cd\u4f5c\u5efa\u6a21\u4e3aMDP\uff0c\u81ea\u9002\u5e94\u5b66\u4e60\u4f55\u65f6\u68c0\u7d22\u3001\u6ce8\u5165\u6216\u9057\u5fd8\u8bb0\u5fc6", "upvotes": 0, "what_it_is": "\u63d0\u51faMemCon\u6846\u67b6\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7684\u8bb0\u5fc6\u7ba1\u7406\u5efa\u6a21\u4e3a\u9a6c\u5c14\u53ef\u592b\u51b3\u7b56\u8fc7\u7a0b\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ea7\u4e0a\u4e0b\u6587\u8d4c\u535a\u673a\u7b56\u7565\u81ea\u9002\u5e94\u51b3\u5b9a\u4f55\u65f6\u68c0\u7d22\u3001\u6ce8\u5165\u84b8\u998f\u8ba1\u5212\u53ca\u4f55\u65f6\u6574\u5408/\u9057\u5fd8\u8bb0\u5fc6\uff0c\u66ff\u4ee3\u73b0\u6709\u56fa\u5b9a\u542f\u53d1\u5f0f\u89c4\u5219\u3002", "why_notable": "\u9996\u6b21\u5c06\u8bb0\u5fc6\u7ba1\u7406\u89c6\u4e3a\u53ef\u5b66\u4e60\u7684\u63a7\u5236\u8fc7\u7a0b\u800c\u975e\u9759\u6001\u542f\u53d1\u5f0f\uff0c\u8f7b\u91cf\u9ad8\u6548\u4e14\u901a\u7528\u6027\u5f3a\uff0c\u5bf9LLM\u667a\u80fd\u4f53\u957f\u671f\u5b66\u4e60\u4e0e\u8bb0\u5fc6\u4f18\u5316\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c"}, {"abstract": "Systematic comparisons between current situations and structurally similar past events in the historical, i.e., historical analogies, is among the most powerful tools for foresight analysis. In this work, we present a new task called Analogical Deep Research (ADR) to Large Language Model (LLM) agents and construct the first ADR benchmark ADR-bench to study whether LLM agents are able to find and leverage historical analogies when doing foresight analysis. Our investigation reveals a key obstacle: LLM agents are poor at finding analogies because they match on surface features rather than underlying mechanisms. We argue that ADR is inherently a causal question as it requires understanding why the event occurred. Based on our theoretical analysis, we propose two principles required for ADR, including the mechanism alignment and cross-analogy confirmation. Built upon our theoretical results, we propose a new agentic framework called Causal Analogical Researcher (CANA) that guides LLMs to find and integrate historical analogies. CANA incorporates a simple yet effective structural decomposition representation, and integrates structural feedback for reflective improvements of historical analogy identification and integration. We show that CANA brings up to 10% improvements in historical analogy generation, and surpasses the state-of-the-art deep research agents in the ADR-bench. Case studies with the ongoing events confirm the effectiveness of CANA in leveraging historical analogies.", "arxiv_id": "2607.13602", "arxiv_url": "https://arxiv.org/abs/2607.13602", "authors": ["Yongqiang Chen", "Guangyi Chen", "Yuewen Sun", "Kun Zhang"], "brief": "\u672c\u6587\u63d0\u51fa\u300c\u7c7b\u6bd4\u6df1\u5ea6\u7814\u7a76\uff08ADR\uff09\u300d\u65b0\u4efb\u52a1\uff0c\u6784\u5efa\u9996\u4e2aADR\u57fa\u51c6ADR-bench\uff0c\u5e76\u63d0\u51fa\u56e0\u679c\u7c7b\u6bd4\u7814\u7a76\u6846\u67b6CANA\uff0c\u5f15\u5bfcLLM\u901a\u8fc7\u56e0\u679c\u673a\u5236\u5bf9\u9f50\u800c\u975e\u8868\u9762\u7279\u5f81\u5339\u914d\u6765\u53d1\u73b0\u548c\u6574\u5408\u5386\u53f2\u7c7b\u6bd4\uff0c\u7528\u4e8e\u524d\u77bb\u6027\u5206\u6790\u3002", "categories": ["cs.CL", "cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13602", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u53d1\u73b0LLM\u667a\u80fd\u4f53\u5728\u5386\u53f2\u7c7b\u6bd4\u68c0\u7d22\u4e2d\u4f9d\u8d56\u8868\u9762\u7279\u5f81\u800c\u975e\u5e95\u5c42\u673a\u5236\uff0c\u5bfc\u81f4\u7c7b\u6bd4\u8d28\u91cf\u5dee", "\u63d0\u51fa\u673a\u5236\u5bf9\u9f50\u4e0e\u8de8\u7c7b\u6bd4\u786e\u8ba4\u4e24\u5927\u7406\u8bba\u539f\u5219\uff0c\u5c06ADR\u5b9a\u4e49\u4e3a\u56e0\u679c\u63a8\u7406\u95ee\u9898", "CANA\u6846\u67b6\u5f15\u5165\u7ed3\u6784\u5206\u89e3\u8868\u793a\u4e0e\u7ed3\u6784\u53cd\u9988\u673a\u5236\uff0c\u5386\u53f2\u7c7b\u6bd4\u751f\u6210\u8d28\u91cf\u63d0\u5347\u6700\u9ad8\u8fbe10%\uff0c\u8d85\u8d8aSOTA\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53"], "keywords": ["\u667a\u80fd\u4f53", "\u56e0\u679c\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13602v1", "published_at": "2026-07-15", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Analogical Deep Research: Retrieving and Integrating Historical Analogies for Foresight Analysis", "tldr": "\u63d0\u51fa\u7c7b\u6bd4\u6df1\u5ea6\u7814\u7a76\u4efb\u52a1\uff0c\u6784\u5efa\u57fa\u51c6\u5e76\u8bbe\u8ba1\u56e0\u679c\u7c7b\u6bd4\u7814\u7a76\u6846\u67b6CANA\uff0c\u63d0\u5347LLM\u5386\u53f2\u7c7b\u6bd4\u63a8\u7406\u80fd\u529b", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u300c\u7c7b\u6bd4\u6df1\u5ea6\u7814\u7a76\uff08ADR\uff09\u300d\u65b0\u4efb\u52a1\uff0c\u6784\u5efa\u9996\u4e2aADR\u57fa\u51c6ADR-bench\uff0c\u5e76\u63d0\u51fa\u56e0\u679c\u7c7b\u6bd4\u7814\u7a76\u6846\u67b6CANA\uff0c\u5f15\u5bfcLLM\u901a\u8fc7\u56e0\u679c\u673a\u5236\u5bf9\u9f50\u800c\u975e\u8868\u9762\u7279\u5f81\u5339\u914d\u6765\u53d1\u73b0\u548c\u6574\u5408\u5386\u53f2\u7c7b\u6bd4\uff0c\u7528\u4e8e\u524d\u77bb\u6027\u5206\u6790\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u5316\u5b9a\u4e49\u5e76\u8bc4\u6d4bLLM\u5728\u5386\u53f2\u7c7b\u6bd4\u63a8\u7406\u4e0a\u7684\u80fd\u529b\uff0c\u5c06\u56e0\u679c\u63a8\u7406\u5f15\u5165\u7c7b\u6bd4\u68c0\u7d22\uff0c\u5bf9\u6218\u7565\u9884\u6d4b\u3001\u653f\u7b56\u5206\u6790\u7b49\u9ad8\u4ef7\u503c\u573a\u666f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u610f\u4e49\u3002"}, {"abstract": "What happens to an LLM agent\u0027s tool choice when the reliable tool silently changes within an ongoing session? We borrow set-shifting from cognitive psychology to study how well agents adapt to hidden reliability shifts. Our benchmark mounts tool-skill libraries with redundancies, where many tools solve the same task but differ in hidden reliability. In our evaluation framework, a branched schedule shifts the reliable tool group at hidden boundaries and pairs every shift with a no-shift control. We find that agents, by default, settle on a small recurring routine within a few turns of each boundary, with call shares concentrating on a few discrete values after each reliability shift. We score the set-shifting accuracy for each agent trajectory: the joint probability of routing to the target tool group in every post-shift window. We test open-weight LLMs in an open-source agentic harness and find qualitatively distinct failure modes across the same set of routines. We also find that set framing, how the toolset presents the alternatives as competing or complementary, shifts the routing dynamics.", "arxiv_id": "2607.13396", "arxiv_url": "https://arxiv.org/abs/2607.13396", "authors": ["Ziwei Ye"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u6846\u67b6\uff0c\u7814\u7a76LLM\u667a\u80fd\u4f53\u5728\u5de5\u5177\u5e93\u4e2d\u53ef\u9760\u5de5\u5177\u6084\u7136\u5207\u6362\u65f6\u80fd\u5426\u53ca\u65f6\u8c03\u6574\u5de5\u5177\u9009\u62e9\u7b56\u7565\uff0c\u901a\u8fc7\u5206\u652f\u8c03\u5ea6\u5728\u9690\u85cf\u8fb9\u754c\u5904\u5207\u6362\u53ef\u9760\u5de5\u5177\u7ec4\u5e76\u914d\u5bf9\u5bf9\u7167\u7ec4\u8fdb\u884c\u8bc4\u4f30\u3002", "categories": ["cs.AI", "cs.CL", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13396", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u5de5\u5177\u5e93\u8bbe\u8ba1\u542b\u5197\u4f59\uff1a\u591a\u4e2a\u5de5\u5177\u53ef\u5b8c\u6210\u540c\u4e00\u4efb\u52a1\u4f46\u9690\u85cf\u53ef\u9760\u6027\u4e0d\u540c\uff0c\u6a21\u62df\u771f\u5b9e\u73af\u5883\u4e2d\u5de5\u5177\u5931\u6548\u573a\u666f", "\u53d1\u73b0\u667a\u80fd\u4f53\u9ed8\u8ba4\u884c\u4e3a\uff1a\u5728\u6bcf\u4e2a\u8fb9\u754c\u540e\u6570\u8f6e\u5185\u8fc5\u901f\u56fa\u5316\u4e3a\u5c11\u6570\u91cd\u590d\u4f8b\u7a0b\uff0c\u8c03\u7528\u4efd\u989d\u96c6\u4e2d\u5728\u5c11\u6570\u79bb\u6563\u503c", "\u96c6\u5408\u6846\u67b6\u6548\u5e94\uff1a\u5de5\u5177\u96c6\u5c06\u5907\u9009\u9879\u5448\u73b0\u4e3a\u7ade\u4e89\u5173\u7cfb\u8fd8\u662f\u4e92\u8865\u5173\u7cfb\uff0c\u4f1a\u663e\u8457\u5f71\u54cd\u667a\u80fd\u4f53\u7684\u8def\u7531\u52a8\u6001"], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u4f7f\u7528", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13396v1", "published_at": "2026-07-15", "score": 0.375, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Set-shifting Behavioral Test for Harnessed Agents", "tldr": "\u501f\u9274\u8ba4\u77e5\u5fc3\u7406\u5b66\"\u96c6\u5408\u8f6c\u6362\"\u8303\u5f0f\uff0c\u8bc4\u6d4bLLM\u667a\u80fd\u4f53\u5728\u5de5\u5177\u53ef\u9760\u6027\u6084\u7136\u6539\u53d8\u65f6\u7684\u9002\u5e94\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u6846\u67b6\uff0c\u7814\u7a76LLM\u667a\u80fd\u4f53\u5728\u5de5\u5177\u5e93\u4e2d\u53ef\u9760\u5de5\u5177\u6084\u7136\u5207\u6362\u65f6\u80fd\u5426\u53ca\u65f6\u8c03\u6574\u5de5\u5177\u9009\u62e9\u7b56\u7565\uff0c\u901a\u8fc7\u5206\u652f\u8c03\u5ea6\u5728\u9690\u85cf\u8fb9\u754c\u5904\u5207\u6362\u53ef\u9760\u5de5\u5177\u7ec4\u5e76\u914d\u5bf9\u5bf9\u7167\u7ec4\u8fdb\u884c\u8bc4\u4f30\u3002", "why_notable": "\u9996\u6b21\u5c06\u8ba4\u77e5\u5fc3\u7406\u5b66\u4e2d\u7684\u96c6\u5408\u8f6c\u6362\u8303\u5f0f\u5f15\u5165LLM\u667a\u80fd\u4f53\u8bc4\u6d4b\uff0c\u63ed\u793a\u4e86\u667a\u80fd\u4f53\u5728\u52a8\u6001\u73af\u5883\u4e2d\u7684\u9002\u5e94\u6027\u76f2\u70b9\uff0c\u5bf9\u6784\u5efa\u66f4\u9c81\u68d2\u7684\u5de5\u5177\u4f7f\u7528\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49"}, {"abstract": "Multi-turn agents solve complex tasks through extended sequences of tool interactions before producing a final answer, making credit assignment a fundamental challenge during post-training. Outcome rewards provide reliable supervision for short-horizon reasoning, but become sparse and high-variance as trajectories grow to tens or hundreds of tool calls. They can also be misleading: a failed rollout may contain many useful actions that move the agent closer to the goal, yet outcome-only training assigns them the same negative advantage as the eventual mistake. We propose TRACE (Turn-level Reward Assignment via Credit Estimation), a dense credit-assignment method for agentic reinforcement learning. TRACE represents rollouts as state transitions at tool-call boundaries, obtains gold-answer log-probabilities from a frozen reference model, transforms them into log-ratio state values, and derives per-action rewards as Temporal-Difference changes in those values. This requires no additional critic or process-label training, and its one-step log-ratio TD component telescopes across redundant tool calls. On long-horizon complex search, TRACE substantially improves base-model tool-use ability using pure RL, without a cold-start supervised fine-tuning stage, an agentic mid-training stage, or training on live-web data. On the closed-web BrowseComp-Plus benchmark, it raises Qwen3-4B from $7.2$ to $35.6$ and Qwen3-30B-A3B from $8.4$ to $42.6$. The learned search behavior also transfers to open-web benchmarks, and the learning curves show earlier improvement and faster convergence during RL training.", "arxiv_id": "2607.13988", "arxiv_url": "https://arxiv.org/abs/2607.13988", "authors": ["Leitian Tao", "Baolin Peng", "Wenlin Yao", "Tao Ge", "Hao Cheng", "Mike Hang Wang", "Jianfeng Gao", "Sharon Li"], "brief": "\u63d0\u51faTRACE\u65b9\u6cd5\uff0c\u5c06\u591a\u8f6e\u667a\u80fd\u4f53\u7684\u8f68\u8ff9\u8868\u793a\u4e3a\u5de5\u5177\u8c03\u7528\u8fb9\u754c\u5904\u7684\u72b6\u6001\u8f6c\u79fb\uff0c\u5229\u7528\u51bb\u7ed3\u53c2\u8003\u6a21\u578b\u7684\u5bf9\u6570\u6982\u7387\u6784\u9020\u72b6\u6001\u4ef7\u503c\uff0c\u901a\u8fc7\u65f6\u5e8f\u5dee\u5206\uff08TD\uff09\u53d8\u5316\u63a8\u5bfc\u6bcf\u6b65\u52a8\u4f5c\u7684\u5bc6\u96c6\u5956\u52b1\uff0c\u65e0\u9700\u989d\u5916\u8bc4\u8bba\u7f51\u7edc\u6216\u8fc7\u7a0b\u6807\u6ce8\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13988", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u8f68\u8ff9\u5efa\u6a21\u4e3a\u72b6\u6001\u8f6c\u79fb\uff0c\u7528\u53c2\u8003\u6a21\u578bgold-answer\u5bf9\u6570\u6982\u7387\u7684\u5bf9\u6570\u6bd4\u503c\u4f5c\u4e3a\u72b6\u6001\u4ef7\u503c\uff0cTD\u5dee\u5206\u5f97\u5230\u9010\u6b65\u5956\u52b1", "\u65e0\u9700\u51b7\u542f\u52a8SFT\u3001\u4e2d\u95f4\u8bad\u7ec3\u9636\u6bb5\u6216\u771f\u5b9e\u7f51\u7edc\u6570\u636e\uff0c\u7eafRL\u8bad\u7ec3\u5373\u53ef\u63d0\u5347\u5de5\u5177\u4f7f\u7528\u80fd\u529b", "\u5728BrowseComp-Plus\u57fa\u51c6\u4e0a\uff0cQwen3-4B\u4ece7.2\u63d0\u5347\u81f335.6\uff0cQwen3-30B-A3B\u4ece8.4\u63d0\u5347\u81f342.6\uff0c\u6536\u655b\u66f4\u5feb"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u4fe1\u7528\u5206\u914d", "\u591a\u8f6e\u5bf9\u8bdd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13988v1", "published_at": "2026-07-15", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "TRACE: Turn-level Reward Assignment via Credit Estimation for Long-Horizon Agents", "tldr": "TRACE\uff1a\u7528TD\u4fe1\u7528\u5206\u914d\u89e3\u51b3\u591a\u8f6e\u667a\u80fd\u4f53\u957f\u8f68\u8ff9\u7a00\u758f\u5956\u52b1\u95ee\u9898\uff0c\u5927\u5e45\u63d0\u5347\u641c\u7d22\u4efb\u52a1\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faTRACE\u65b9\u6cd5\uff0c\u5c06\u591a\u8f6e\u667a\u80fd\u4f53\u7684\u8f68\u8ff9\u8868\u793a\u4e3a\u5de5\u5177\u8c03\u7528\u8fb9\u754c\u5904\u7684\u72b6\u6001\u8f6c\u79fb\uff0c\u5229\u7528\u51bb\u7ed3\u53c2\u8003\u6a21\u578b\u7684\u5bf9\u6570\u6982\u7387\u6784\u9020\u72b6\u6001\u4ef7\u503c\uff0c\u901a\u8fc7\u65f6\u5e8f\u5dee\u5206\uff08TD\uff09\u53d8\u5316\u63a8\u5bfc\u6bcf\u6b65\u52a8\u4f5c\u7684\u5bc6\u96c6\u5956\u52b1\uff0c\u65e0\u9700\u989d\u5916\u8bc4\u8bba\u7f51\u7edc\u6216\u8fc7\u7a0b\u6807\u6ce8\u3002", "why_notable": "\u89e3\u51b3\u4e86\u957f\u8f68\u8ff9\u591a\u8f6e\u667a\u80fd\u4f53\u8bad\u7ec3\u4e2d\u7a00\u758f\u5956\u52b1\u4e0e\u4fe1\u7528\u5206\u914d\u7684\u6838\u5fc3\u96be\u9898\uff0c\u65e0\u9700\u989d\u5916\u6a21\u578b\u6216\u6807\u6ce8\u5373\u53ef\u5b9e\u73b0\u5bc6\u96c6\u5956\u52b1\uff0c\u5728\u590d\u6742\u641c\u7d22\u4efb\u52a1\u4e0a\u53d6\u5f97\u663e\u8457\u6027\u80fd\u7a81\u7834\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multimodal agents that think with images iteratively manipulate visual evidence and invoke tools across many steps. Existing reinforcement learning methods reduce trajectories to scalar rewards, forcing the policy to discover reusable tool-use patterns from scratch on every new task; memory-based alternatives retain past experience, yet they rely on test-time retrieval, without updating the policy to absorb reusable patterns from that experience. Our key insight is that multimodal reasoning trajectories should be distilled into reusable skills that co-evolve with the policy during training, rather than being consumed as rewards or retrieved from a static store. To this end, we propose SPyCE (Skill-Policy Co-evolution), a framework that distills trajectories into a hierarchical skill library and updates it throughout reinforcement learning. Execution skills capture local visual operations, while workflow skills encode high-level priors that orchestrate tool use. During training, the policy model conditions on retrieved skills to guide its rollouts, while the skill library evolves using valuable rollouts generated by the policy. This creates a closed loop in which improved policies yield better skills, and the evolving skill library, in turn, provides stronger priors for policy rollouts. Experiments across eight benchmarks demonstrate that SPyCE consistently outperforms both RL-based and memory-based baselines. Further analysis reveals that both the hierarchical skill design and the co-evolution mechanism are critical to our design. These results suggest joint skill-policy optimization as a promising paradigm for building capable multimodal agents.", "arxiv_id": "2607.13854", "arxiv_url": "https://arxiv.org/abs/2607.13854", "authors": ["Ru Zhang", "Weijie Qiu"], "brief": "\u63d0\u51faSPyCE\u6846\u67b6\uff0c\u5c06\u591a\u6a21\u6001\u63a8\u7406\u8f68\u8ff9\u84b8\u998f\u4e3a\u5206\u5c42\u6280\u80fd\u5e93\uff08\u6267\u884c\u6280\u80fd+\u5de5\u4f5c\u6d41\u6280\u80fd\uff09\uff0c\u5e76\u5728\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u4e0e\u7b56\u7565\u6a21\u578b\u5f62\u6210\u95ed\u73af\u534f\u540c\u8fdb\u5316\uff0c\u800c\u975e\u4ec5\u4f5c\u4e3a\u5956\u52b1\u4fe1\u53f7\u6216\u9759\u6001\u8bb0\u5fc6\u4f7f\u7528\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13854", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6784\u5efa\u5206\u5c42\u6280\u80fd\u5e93\uff1a\u6267\u884c\u6280\u80fd\u6355\u6349\u5c40\u90e8\u89c6\u89c9\u64cd\u4f5c\uff0c\u5de5\u4f5c\u6d41\u6280\u80fd\u7f16\u7801\u9ad8\u5c42\u5de5\u5177\u8c03\u7528\u5148\u9a8c", "\u95ed\u73af\u534f\u540c\u8fdb\u5316\uff1a\u7b56\u7565\u751f\u6210\u9ad8\u8d28\u91cf\u8f68\u8ff9\u66f4\u65b0\u6280\u80fd\u5e93\uff0c\u6280\u80fd\u5e93\u53cd\u8fc7\u6765\u4e3a\u7b56\u7565rollout\u63d0\u4f9b\u66f4\u5f3a\u5148\u9a8c", "\u57288\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u6301\u7eed\u4f18\u4e8eRL-based\u548cmemory-based\u57fa\u7ebf\uff0c\u5c42\u6b21\u5316\u8bbe\u8ba1\u4e0e\u534f\u540c\u8fdb\u5316\u673a\u5236\u5747\u88ab\u9a8c\u8bc1\u5173\u952e"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u6280\u80fd\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13854v1", "published_at": "2026-07-15", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SPyCE: Skill-Policy Co-evolution for Multimodal Agents", "tldr": "SPyCE\u6846\u67b6\u8ba9\u591a\u6a21\u6001\u667a\u80fd\u4f53\u7684\u6280\u80fd\u5e93\u4e0e\u7b56\u7565\u5728\u5f3a\u5316\u5b66\u4e60\u4e2d\u534f\u540c\u8fdb\u5316\uff0c\u6301\u7eed\u63d0\u5347\u5de5\u5177\u4f7f\u7528\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faSPyCE\u6846\u67b6\uff0c\u5c06\u591a\u6a21\u6001\u63a8\u7406\u8f68\u8ff9\u84b8\u998f\u4e3a\u5206\u5c42\u6280\u80fd\u5e93\uff08\u6267\u884c\u6280\u80fd+\u5de5\u4f5c\u6d41\u6280\u80fd\uff09\uff0c\u5e76\u5728\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u4e0e\u7b56\u7565\u6a21\u578b\u5f62\u6210\u95ed\u73af\u534f\u540c\u8fdb\u5316\uff0c\u800c\u975e\u4ec5\u4f5c\u4e3a\u5956\u52b1\u4fe1\u53f7\u6216\u9759\u6001\u8bb0\u5fc6\u4f7f\u7528\u3002", "why_notable": "\u7a81\u7834\u4e86\u73b0\u6709RL\u65b9\u6cd5\u6bcf\u6b21\u4ece\u96f6\u5b66\u4e60\u5de5\u5177\u4f7f\u7528\u6a21\u5f0f\u3001\u8bb0\u5fc6\u65b9\u6cd5\u65e0\u6cd5\u5185\u5316\u7ecf\u9a8c\u7684\u5c40\u9650\uff0c\u63d0\u51fa\u6280\u80fd-\u7b56\u7565\u8054\u5408\u4f18\u5316\u65b0\u8303\u5f0f\uff0c\u5bf9\u6784\u5efa\u53ef\u590d\u7528\u3001\u6301\u7eed\u8fdb\u5316\u7684\u591a\u6a21\u6001\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Human-object interaction detection (HOID) has traditionally been formulated as a supervised detection problem over predefined interaction categories. While such paradigms achieve strong performance on closed-set benchmarks, they fundamentally entangle interaction understanding with dataset-specific supervision, limiting their ability to generalize to open-world and compositional scenarios. Recent HOI detectors attempt to leverage MLLMs through prompting strategies to transfer interaction-specific knowledge. However, such prompt-based approaches primarily focus on extracting discriminative representations from pretrained models, while underexploring their inherent multimodal reasoning capabilities. As a result, they struggle to provide informative contextual reasoning for ambiguous and open-world interaction scenarios. In this work, we present AgentHOI, a training-free, agentic framework that transfers the generalist multimodal reasoning capabilities of foundation models to HOI detection in the wild. Instead of learning interaction classifiers, AgentHOI modularly orchestrates complementary vision foundation modules to perform open-ended semantic reasoning and spatial grounding in a coordinated manner. To address the challenges of incomplete interaction discovery and ambiguous localization in complex scenes, we introduce two key mechanisms: (1) Context-aware Multi-round Reasoning, which progressively refines interaction hypotheses to ensure exhaustive and compositional HOI discovery, and (2) Multifaceted Interaction Localization, which enhances grounding precision by generating instance-specific descriptions that integrate semantic, spatial, and appearance cues. Extensive experiments demonstrate that AgentHOI achieves superior performance over state-of-the-art supervised and weakly supervised methods in real-world settings, despite requiring no HOID data for training.", "arxiv_id": "2607.13881", "arxiv_url": "https://arxiv.org/abs/2607.13881", "authors": ["Ting Lei", "Jialin Liu", "Zhu Xu", "Yuxin Peng", "Yang Liu"], "brief": "\u63d0\u51faAgentHOI\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u6a21\u5757\u5316\u7f16\u6392\u591a\u4e2a\u89c6\u89c9\u57fa\u7840\u6a21\u578b\uff0c\u5c06\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u901a\u7528\u63a8\u7406\u80fd\u529b\u8fc1\u79fb\u5230\u5f00\u653e\u4e16\u754c\u7684\u4eba\u7269-\u7269\u4f53\u4ea4\u4e92\uff08HOI\uff09\u68c0\u6d4b\u4efb\u52a1\u4e2d\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13881", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5f15\u5165\u300c\u4e0a\u4e0b\u6587\u611f\u77e5\u591a\u8f6e\u63a8\u7406\u300d\u673a\u5236\uff0c\u9010\u6b65\u7ec6\u5316\u4ea4\u4e92\u5047\u8bbe\uff0c\u786e\u4fdd\u5168\u9762\u4e14\u7ec4\u5408\u5f0f\u7684HOI\u53d1\u73b0", "\u5f15\u5165\u300c\u591a\u7ef4\u5ea6\u4ea4\u4e92\u5b9a\u4f4d\u300d\u673a\u5236\uff0c\u878d\u5408\u8bed\u4e49\u3001\u7a7a\u95f4\u548c\u5916\u89c2\u7ebf\u7d22\u751f\u6210\u5b9e\u4f8b\u7279\u5b9a\u63cf\u8ff0\uff0c\u63d0\u5347\u5b9a\u4f4d\u7cbe\u5ea6", "\u65e0\u9700\u4efb\u4f55HOI\u6807\u6ce8\u6570\u636e\u8bad\u7ec3\uff0c\u5728\u771f\u5b9e\u573a\u666f\u4e2d\u8d85\u8d8a\u6709\u76d1\u7763\u548c\u5f31\u76d1\u7763SOTA\u65b9\u6cd5"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u76ee\u6807\u68c0\u6d4b", "\u89c6\u89c9\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13881v1", "published_at": "2026-07-15", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Unleashing Multimodal Large Language Models for Training-free HOI Detection in the Wild", "tldr": "AgentHOI\uff1a\u65e0\u9700\u8bad\u7ec3\u7684\u591a\u6a21\u6001\u5927\u6a21\u578b\u4eba\u7269-\u7269\u4f53\u4ea4\u4e92\u68c0\u6d4b\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faAgentHOI\uff0c\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u6a21\u5757\u5316\u7f16\u6392\u591a\u4e2a\u89c6\u89c9\u57fa\u7840\u6a21\u578b\uff0c\u5c06\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u901a\u7528\u63a8\u7406\u80fd\u529b\u8fc1\u79fb\u5230\u5f00\u653e\u4e16\u754c\u7684\u4eba\u7269-\u7269\u4f53\u4ea4\u4e92\uff08HOI\uff09\u68c0\u6d4b\u4efb\u52a1\u4e2d\u3002", "why_notable": "\u7a81\u7834\u4f20\u7edfHOI\u68c0\u6d4b\u4f9d\u8d56\u5c01\u95ed\u96c6\u76d1\u7763\u7684\u5c40\u9650\uff0c\u9996\u6b21\u4ee5\u667a\u80fd\u4f53\u6846\u67b6\u5145\u5206\u6316\u6398\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u63a8\u7406\u80fd\u529b\u7528\u4e8e\u5f00\u653e\u4e16\u754cHOI\u68c0\u6d4b\uff0c\u5b9e\u73b0\u96f6\u8bad\u7ec3\u6570\u636e\u4e0b\u7684\u5f3a\u6cdb\u5316\u6027\u80fd\uff0c\u5177\u6709\u91cd\u8981\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u8303\u5f0f\u521b\u65b0\u610f\u4e49\u3002"}, {"abstract": "As AI agents gain prevalance, users are increasingly exposed to the risks such systems entail. Prompt injection attacks, as well as hallucination, can cause agents to leak private information to third parties. As autonomous systems, agents also present the more active danger of performing sensitive tasks, such as bank transactions, without the user\u0027s intent or authorization. Recognizing this challenge, the agentic security community has developed numerous proposals for secure agentic systems. Much of this work has focused on product-level approaches, where agentic system developers determine and apply the same security policies and permissions to all users. Yet different users have different needs and preferences, necessitating support for user-level permissions policies in agentic AI systems. To understand how user-level permissions are handled in AI agent systems, we survey 21 proposals for agent permissions systems. From this review, we construct a taxonomy of how different systems specify user-level permissions policies, both at the user interface and internally; derive internal policies from user input; and enforce those policies at run-time. We then analyze five prominent commercial agents and compare their permissions handling to agentic permissions systems in the literature. We identify several high-level themes across the literature and commerical agents, as well as multiple gaps where future work is needed.", "arxiv_id": "2607.13718", "arxiv_url": "https://arxiv.org/abs/2607.13718", "authors": ["Alexandra E. Michael", "Franziska Roesner"], "brief": "\u672c\u6587\u901a\u8fc7\u8c03\u781421\u4e2a\u667a\u80fd\u4f53\u6743\u9650\u7cfb\u7edf\u63d0\u6848\uff0c\u6784\u5efa\u4e86\u7528\u6237\u7ea7\u6743\u9650\u7b56\u7565\u7684\u5206\u7c7b\u4f53\u7cfb\uff0c\u6db5\u76d6\u6743\u9650\u89c4\u8303\u3001\u7b56\u7565\u63a8\u5bfc\u4e0e\u8fd0\u884c\u65f6\u6267\u884c\u4e09\u4e2a\u7ef4\u5ea6\uff0c\u5e76\u5bf9\u6bd4\u5206\u6790\u4e865\u6b3e\u4e3b\u6d41\u5546\u4e1aAI\u667a\u80fd\u4f53\u7684\u6743\u9650\u5904\u7406\u5b9e\u8df5\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13718", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u8bc6\u522b\u4e86\u63d0\u793a\u6ce8\u5165\u653b\u51fb\u548c\u5e7b\u89c9\u5bfc\u81f4\u9690\u79c1\u6cc4\u9732\u3001\u672a\u6388\u6743\u654f\u611f\u64cd\u4f5c\uff08\u5982\u94f6\u884c\u8f6c\u8d26\uff09\u7b49\u6838\u5fc3\u5b89\u5168\u5a01\u80c1", "\u6784\u5efa\u5206\u7c7b\u6846\u67b6\uff1a\u4ece\u7528\u6237\u754c\u9762\u4e0e\u5185\u90e8\u673a\u5236\u4e24\u4e2a\u5c42\u9762\u5206\u6790\u6743\u9650\u7b56\u7565\u7684\u89c4\u8303\u3001\u63a8\u5bfc\u4e0e\u8fd0\u884c\u65f6\u6267\u884c", "\u53d1\u73b0\u73b0\u6709\u5546\u4e1a\u667a\u80fd\u4f53\uff08\u59825\u6b3e\u4e3b\u6d41\u4ea7\u54c1\uff09\u4e0e\u5b66\u672f\u63d0\u6848\u4e4b\u95f4\u5b58\u5728\u591a\u5904\u663e\u8457\u5dee\u8ddd\uff0c\u6307\u51fa\u672a\u6765\u7814\u7a76\u65b9\u5411"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u4e0e\u9690\u79c1", "\u6743\u9650\u7ba1\u7406", "\u63d0\u793a\u6ce8\u5165"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13718v1", "published_at": "2026-07-15", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "How Agents Ask for Permission: User Permissions for AI Agents, from Interfaces to Enforcement", "tldr": "\u7cfb\u7edf\u7efc\u8ff0AI\u667a\u80fd\u4f53\u7528\u6237\u6743\u9650\u673a\u5236\uff0c\u6784\u5efa\u5206\u7c7b\u6846\u67b6\u5e76\u5206\u67905\u6b3e\u5546\u4e1a\u667a\u80fd\u4f53\u7684\u6743\u9650\u5904\u7406\u73b0\u72b6", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7\u8c03\u781421\u4e2a\u667a\u80fd\u4f53\u6743\u9650\u7cfb\u7edf\u63d0\u6848\uff0c\u6784\u5efa\u4e86\u7528\u6237\u7ea7\u6743\u9650\u7b56\u7565\u7684\u5206\u7c7b\u4f53\u7cfb\uff0c\u6db5\u76d6\u6743\u9650\u89c4\u8303\u3001\u7b56\u7565\u63a8\u5bfc\u4e0e\u8fd0\u884c\u65f6\u6267\u884c\u4e09\u4e2a\u7ef4\u5ea6\uff0c\u5e76\u5bf9\u6bd4\u5206\u6790\u4e865\u6b3e\u4e3b\u6d41\u5546\u4e1aAI\u667a\u80fd\u4f53\u7684\u6743\u9650\u5904\u7406\u5b9e\u8df5\u3002", "why_notable": "\u968f\u7740AI\u667a\u80fd\u4f53\u5feb\u901f\u666e\u53ca\uff0c\u7528\u6237\u7ea7\u6743\u9650\u7ba1\u7406\u662f\u5b89\u5168\u843d\u5730\u7684\u5173\u952e\u7f3a\u53e3\uff1b\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u6784\u5efa\u8be5\u9886\u57df\u5206\u7c7b\u6846\u67b6\uff0c\u4e3a\u5b66\u672f\u7814\u7a76\u4e0e\u5de5\u4e1a\u5b9e\u8df5\u63d0\u4f9b\u91cd\u8981\u53c2\u8003\u57fa\u51c6\u3002"}, {"abstract": "As Large Language Models (LLMs) evolve into autonomous agents, the need for unified evaluation infrastructure becomes critical. However, current evaluation pipelines remain highly fragmented and tightly coupled, hindering reproducibility and causing redundant engineering. To address this, we introduce AgentCompass, an open-source, lightweight, and extensible infrastructure for evaluating LLM-based agents. AgentCompass organizes the evaluation process around three independent components, namely Benchmark, Harness, and Environment, thereby enabling flexible configurations without requiring the reimplementation of complex execution logic. Furthermore, it features a fault-tolerant asynchronous runtime and comprehensive trajectory analysis tools to transparently diagnose nuanced failure modes like reward-hacking. Natively supporting over 20 benchmarks across five capability dimensions, AgentCompass provides the community with a scalable and reproducible infrastructure for advancing agent research.", "arxiv_id": "2607.13705", "arxiv_url": "https://arxiv.org/abs/2607.13705", "authors": ["Zichen Ding", "Jiaye Ge", "Shufan Jiang", "Kai Chen", "Mo Li", "Qingqiu Li", "Zehao Li", "Zonglin Li", "Tiaohao Liang", "Shudong Liu", "Zerun Ma", "Zixing Shang", "Wenhui Tian", "Zun Wang", "Liwei Wu", "Zhenyu Wu", "Jun Xu", "Bowen Yang", "Dingbo Yuan", "Qi Zhang", "Songyang Zhang", "Peiheng Zhou", "Dongsheng Zhu"], "brief": "\u63d0\u51faAgentCompass\uff0c\u4e00\u4e2a\u5f00\u6e90\u8f7b\u91cf\u7ea7\u7684LLM\u667a\u80fd\u4f53\u8bc4\u6d4b\u6846\u67b6\uff0c\u5c06\u8bc4\u6d4b\u6d41\u7a0b\u89e3\u8026\u4e3aBenchmark\u3001Harness\u3001Environment\u4e09\u4e2a\u72ec\u7acb\u7ec4\u4ef6\uff0c\u652f\u6301\u7075\u6d3b\u914d\u7f6e\u4e0e\u53ef\u590d\u73b0\u8bc4\u6d4b\u3002", "categories": ["cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13705", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u7ec4\u4ef6\u89e3\u8026\u67b6\u6784\uff08Benchmark/Harness/Environment\uff09\uff0c\u907f\u514d\u91cd\u590d\u5de5\u7a0b\u5b9e\u73b0\uff0c\u63d0\u5347\u53ef\u590d\u73b0\u6027", "\u539f\u751f\u652f\u63015\u4e2a\u80fd\u529b\u7ef4\u5ea6\u768420+\u57fa\u51c6\u6d4b\u8bd5\uff0c\u8986\u76d6\u8303\u56f4\u5e7f\u6cdb", "\u5185\u7f6e\u5bb9\u9519\u5f02\u6b65\u8fd0\u884c\u65f6\u4e0e\u8f68\u8ff9\u5206\u6790\u5de5\u5177\uff0c\u53ef\u900f\u660e\u8bca\u65ad\u5956\u52b1\u9ed1\u5ba2\u7b49\u7ec6\u5fae\u5931\u8d25\u6a21\u5f0f"], "keywords": ["\u667a\u80fd\u4f53", "\u8bc4\u6d4b\u57fa\u51c6", "\u5927\u8bed\u8a00\u6a21\u578b", "\u57fa\u7840\u8bbe\u65bd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13705v1", "published_at": "2026-07-15", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "AgentCompass: A Unified Evaluation Infrastructure for Agent Capabilities", "tldr": "AgentCompass\uff1a\u7edf\u4e00\u3001\u53ef\u6269\u5c55\u7684LLM\u667a\u80fd\u4f53\u8bc4\u6d4b\u57fa\u7840\u8bbe\u65bd\uff0c\u652f\u630120+\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faAgentCompass\uff0c\u4e00\u4e2a\u5f00\u6e90\u8f7b\u91cf\u7ea7\u7684LLM\u667a\u80fd\u4f53\u8bc4\u6d4b\u6846\u67b6\uff0c\u5c06\u8bc4\u6d4b\u6d41\u7a0b\u89e3\u8026\u4e3aBenchmark\u3001Harness\u3001Environment\u4e09\u4e2a\u72ec\u7acb\u7ec4\u4ef6\uff0c\u652f\u6301\u7075\u6d3b\u914d\u7f6e\u4e0e\u53ef\u590d\u73b0\u8bc4\u6d4b\u3002", "why_notable": "\u5f53\u524d\u667a\u80fd\u4f53\u8bc4\u6d4b\u7ba1\u7ebf\u9ad8\u5ea6\u788e\u7247\u5316\u3001\u8026\u5408\u4e25\u91cd\uff0cAgentCompass\u901a\u8fc7\u7edf\u4e00\u57fa\u7840\u8bbe\u65bd\u964d\u4f4e\u7814\u7a76\u95e8\u69db\uff0c\u63a8\u52a8\u793e\u533a\u53ef\u590d\u73b0\u6027\u4e0e\u8bc4\u6d4b\u6807\u51c6\u5316\uff0c\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u4e0e\u7814\u7a76\u4ef7\u503c\u3002"}, {"abstract": "LLM agents are increasingly evaluated on multi-week decision tasks in which the state that drives cost is never directly observed. On such tasks the final cost cannot say why an agent failed: it may have misread the world, or read it correctly and still failed to act (the knowing-doing gap). Existing evaluations cannot separate these two failures; their reference policies either read privileged information the agent never sees, or are missing altogether. We introduce STOCKTAKE, a 26-week supply-chain replenishment benchmark built as a factored partially observable Markov decision process with six hidden factor processes, designed so that a fair reference policy is computable: an exact Bayes filter per factor drives a rollout policy on the identical observation stream the agent receives. Scoring each run between a symptom-blind base-stock floor (0) and this oracle (1) yields a skill score, and grading each week\u0027s written rationale yields a stated-belief detection lag and a knowing-doing rate, so state estimation and control are measured separately. On fifty seeds with curated stress profiles, Claude Sonnet 5, GPT-5.4, DeepSeek-V4-Pro, and Grok 4.5 detect 84-88% of hidden failures, typically within a week of onset, yet span skill scores from 0.62 to -0.23: two of the four end below the symptom-blind floor while naming factors slightly faster than the two that beat it. The failure has two faces. Where stress persists, 34-43% of correctly diagnosed stress weeks still end in stockout for every model, a rate that partly reflects the severity of the weeks models notice. That rate also runs opposite to skill: the two models under the floor stock out least on diagnosed weeks, so under-response is only one face of the gap, and their traces point to the other, responses whose cost exceeds what they protect. STOCKTAKE measures both directions of that failure.", "arxiv_id": "2607.13618", "arxiv_url": "https://arxiv.org/abs/2607.13618", "authors": ["Sagar Deb", "Ashwanth Krishnan"], "brief": "\u63d0\u51faSTOCKTAKE\u2014\u2014\u4e00\u4e2a26\u5468\u4f9b\u5e94\u94fe\u8865\u8d27\u57fa\u51c6\u6d4b\u8bd5\uff0c\u901a\u8fc7\u5f15\u5165\u516c\u5e73\u53c2\u8003\u7b56\u7565\uff08\u7cbe\u786e\u8d1d\u53f6\u65af\u6ee4\u6ce2\u5668\uff09\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7684\u72b6\u6001\u4f30\u8ba1\u80fd\u529b\u4e0e\u51b3\u7b56\u63a7\u5236\u80fd\u529b\u5206\u5f00\u8bc4\u4f30\uff0c\u91cf\u5316\"\u77e5\u884c\u5dee\u8ddd\"\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13618", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6784\u5efa\u57fa\u4e8e\u90e8\u5206\u53ef\u89c2\u6d4b\u9a6c\u5c14\u53ef\u592b\u51b3\u7b56\u8fc7\u7a0b\uff08POMDP\uff09\u7684\u4f9b\u5e94\u94fe\u57fa\u51c6\uff0c\u542b6\u4e2a\u9690\u85cf\u56e0\u5b50\u8fc7\u7a0b\uff0c\u8bbe\u8ba1\u53ef\u8ba1\u7b97\u7684\u516c\u5e73Oracle\u53c2\u8003\u7b56\u7565", "\u5f15\u5165\u6280\u80fd\u5206\u6570\uff080-1\uff09\u3001\u9648\u8ff0\u4fe1\u5ff5\u68c0\u6d4b\u5ef6\u8fdf\u548c\u77e5\u884c\u7387\u4e09\u9879\u6307\u6807\uff0c\u5206\u522b\u8861\u91cf\u611f\u77e5\u4e0e\u63a7\u5236\u4e24\u7c7b\u5931\u8d25", "\u6d4b\u8bd5Claude Sonnet 5\u3001GPT-5.4\u3001DeepSeek-V4-Pro\u3001Grok 4.5\uff1a\u611f\u77e5\u51c6\u786e\u7387\u8fbe84-88%\uff0c\u4f46\u6280\u80fd\u5206\u6570\u4ece0.62\u5230-0.23\u5dee\u5f02\u60ac\u6b8a\uff0c\u4e24\u4e2a\u6a21\u578b\u751a\u81f3\u4f4e\u4e8e\u76f2\u57fa\u7ebf\uff1b34-43%\u7684\u6b63\u786e\u8bca\u65ad\u5468\u4ecd\u53d1\u751f\u7f3a\u8d27"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u6d4b\u8bd5", "\u51b3\u7b56", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13618v1", "published_at": "2026-07-15", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "STOCKTAKE: Measuring the Gap Between Perception and Action in LLM Agents with a Fair Oracle", "tldr": "STOCKTAKE\u57fa\u51c6\u6d4b\u8bd5\u63ed\u793aLLM\u667a\u80fd\u4f53\u5728\u4f9b\u5e94\u94fe\u4efb\u52a1\u4e2d\u611f\u77e5\u4e0e\u884c\u52a8\u4e4b\u95f4\u7684\u5dee\u8ddd", "upvotes": 0, "what_it_is": "\u63d0\u51faSTOCKTAKE\u2014\u2014\u4e00\u4e2a26\u5468\u4f9b\u5e94\u94fe\u8865\u8d27\u57fa\u51c6\u6d4b\u8bd5\uff0c\u901a\u8fc7\u5f15\u5165\u516c\u5e73\u53c2\u8003\u7b56\u7565\uff08\u7cbe\u786e\u8d1d\u53f6\u65af\u6ee4\u6ce2\u5668\uff09\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7684\u72b6\u6001\u4f30\u8ba1\u80fd\u529b\u4e0e\u51b3\u7b56\u63a7\u5236\u80fd\u529b\u5206\u5f00\u8bc4\u4f30\uff0c\u91cf\u5316\"\u77e5\u884c\u5dee\u8ddd\"\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06LLM\u667a\u80fd\u4f53\u7684\"\u611f\u77e5\u5931\u8d25\"\u4e0e\"\u884c\u52a8\u5931\u8d25\"\u89e3\u8026\u8bc4\u4f30\uff0c\u63ed\u793a\u9876\u7ea7\u6a21\u578b\u666e\u904d\u5b58\u5728\u77e5\u884c\u5dee\u8ddd\uff0c\u4e14\u8fc7\u5ea6\u54cd\u5e94\u4e0e\u54cd\u5e94\u4e0d\u8db3\u5e76\u5b58\uff0c\u4e3a\u667a\u80fd\u4f53\u8bc4\u4f30\u65b9\u6cd5\u8bba\u63d0\u4f9b\u91cd\u8981\u53c2\u8003\u3002"}, {"abstract": "Agentic coding tools are increasingly capable of generating and submitting pull requests (PRs) to software projects, introducing new forms of human-agent collaboration in software development. While prior studies have examined PR-level outcomes of agent-generated contributions, less is known about how agentic coding tools are adopted and managed at the project level. In this paper, we analyze 25,264 agentic PRs from 2,361 popular GitHub repositories to investigate (1) the adoption of agentic coding tools, (2) project-level agentic PR productivity, and (3) human-agent collaboration patterns. Our results show that the median repository generates only one to two agentic PRs during a three-month period, indicating that intensive adoption remains concentrated in a small subset of projects. At the same time, small projects (1-5 contributors) exhibit higher participation ratios and average levels of agentic PR activity than medium-sized and large projects. We also observe substantial variation in project-level agentic PR productivity. While a small number of projects exceed an industry-reported estimate of 36 PRs per participant during the three-month observation period, most projects remain below this threshold. Finally, human-agent collaboration is dominated by a single-human oversight model, in which one developer reviews and/or modifies the agent\u0027s contributions, while multi-human collaboration patterns remain uncommon. These findings provide early empirical evidence on how open-source projects organize human oversight around agentic coding tools and suggest that successful integration of agent-generated contributions depends not only on advances in agent capabilities but also on the human and organizational processes that govern their use. Because this study captures an early snapshot of agent adoption, future work should continue to track how adoption patterns evolve over time.", "arxiv_id": "2607.14037", "arxiv_url": "https://arxiv.org/abs/2607.14037", "authors": ["Maliha Noushin Raida", "Daqing Hou"], "brief": "\u672c\u6587\u5bf9GitHub\u4e0a25,264\u6761\u667a\u80fd\u4f53\u751f\u6210\u7684Pull Request\u8fdb\u884c\u5927\u89c4\u6a21\u5b9e\u8bc1\u5206\u6790\uff0c\u7814\u7a76\u5f00\u6e90\u9879\u76ee\u5982\u4f55\u91c7\u7528\u548c\u7ba1\u7406\u667a\u80fd\u4f53\u7f16\u7a0b\u5de5\u5177\uff0c\u4ee5\u53ca\u4eba\u673a\u534f\u4f5c\u6a21\u5f0f\u7684\u73b0\u72b6\u3002", "categories": ["cs.SE", "cs.AI", "cs.CY", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14037", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4e2d\u4f4d\u6570\u4ed3\u5e93\u5728\u4e09\u4e2a\u6708\u5185\u4ec5\u751f\u62101-2\u6761\u667a\u80fd\u4f53PR\uff0c\u5bc6\u96c6\u91c7\u7528\u4ec5\u96c6\u4e2d\u5728\u5c11\u6570\u9879\u76ee\u4e2d", "\u5c0f\u578b\u9879\u76ee\uff081-5\u540d\u8d21\u732e\u8005\uff09\u7684\u667a\u80fd\u4f53PR\u53c2\u4e0e\u7387\u548c\u6d3b\u8dc3\u5ea6\u9ad8\u4e8e\u4e2d\u5927\u578b\u9879\u76ee", "\u4eba\u673a\u534f\u4f5c\u4ee5\"\u5355\u4eba\u76d1\u7763\u6a21\u5f0f\"\u4e3a\u4e3b\uff0c\u5373\u4e00\u540d\u5f00\u53d1\u8005\u8d1f\u8d23\u5ba1\u67e5/\u4fee\u6539\u667a\u80fd\u4f53\u8d21\u732e\uff0c\u591a\u4eba\u534f\u4f5c\u6a21\u5f0f\u7f55\u89c1"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u8f6f\u4ef6\u5de5\u7a0b", "\u4eba\u673a\u534f\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14037v1", "published_at": "2026-07-15", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Early Adoption of Agentic Coding Tools by GitHub Projects", "tldr": "\u5206\u6790GitHub\u4e0a2361\u4e2a\u4ed3\u5e93\u76842.5\u4e07\u6761\u667a\u80fd\u4f53PR\uff0c\u63ed\u793a\u5f00\u6e90\u9879\u76ee\u65e9\u671f\u91c7\u7528\u667a\u80fd\u4f53\u7f16\u7a0b\u5de5\u5177\u7684\u89c4\u5f8b", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9GitHub\u4e0a25,264\u6761\u667a\u80fd\u4f53\u751f\u6210\u7684Pull Request\u8fdb\u884c\u5927\u89c4\u6a21\u5b9e\u8bc1\u5206\u6790\uff0c\u7814\u7a76\u5f00\u6e90\u9879\u76ee\u5982\u4f55\u91c7\u7528\u548c\u7ba1\u7406\u667a\u80fd\u4f53\u7f16\u7a0b\u5de5\u5177\uff0c\u4ee5\u53ca\u4eba\u673a\u534f\u4f5c\u6a21\u5f0f\u7684\u73b0\u72b6\u3002", "why_notable": "\u9996\u6279\u9488\u5bf9\u667a\u80fd\u4f53\u7f16\u7a0b\u5de5\u5177\u9879\u76ee\u7ea7\u91c7\u7528\u884c\u4e3a\u7684\u5927\u89c4\u6a21\u5b9e\u8bc1\u7814\u7a76\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u4eba\u673a\u534f\u4f5c\u7684\u771f\u5b9e\u73b0\u72b6\uff0c\u5bf9\u7406\u89e3AI\u8f85\u52a9\u8f6f\u4ef6\u5f00\u53d1\u7684\u7ec4\u7ec7\u4e0e\u6cbb\u7406\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Penetration testing traditionally evaluates whether adversaries can exploit weaknesses in software, infrastructure, configurations, or operational controls to achieve security-relevant compromise. This paradigm remains necessary for AI-enabled systems, but it is no longer sufficient. In such systems, adversaries may influence prompts, retrieved content, sensor inputs, training data, memory, tools, or human-AI interaction loops to alter system behavior without directly compromising the underlying infrastructure. This paper reframes penetration testing for AI-enabled systems as objective-driven behavioral evaluation. We define an AI-enabled system as one in which learned models materially influence behavior affecting operational outcomes, and we define AI-enabled penetration as the feasible induction of AI-governed behavior that violates one or more operational objectives under an explicit threat model. This definition preserves conventional penetration testing while extending it to adversarial pathways such as prompt injection, indirect prompt injection, data poisoning, sensor manipulation, retrieval poisoning, tool misuse, and agentic misalignment. We further propose a testing workflow that identifies operational objectives, maps AI-governed behavior, analyzes adversarial influence surfaces, defines behavioral failure criteria, executes scenario-based tests, and reports evidence linking adversarial action to objective violation. A running example involving an AI-enabled security operations center assistant illustrates how penetration may occur through behavioral influence rather than infrastructure compromise. Together, the definitions, workflow, and example provide a technical framework for evaluating adversarial success in deployed AI-enabled systems.", "arxiv_id": "2607.14006", "arxiv_url": "https://arxiv.org/abs/2607.14006", "authors": ["Mohammad Allahbakhsh", "Mohammad Hassan Bahari", "Moslem Attar-Raouf"], "brief": "\u672c\u6587\u91cd\u65b0\u5b9a\u4e49\u4e86\u9762\u5411AI\u8d4b\u80fd\u7cfb\u7edf\u7684\u6e17\u900f\u6d4b\u8bd5\u8303\u5f0f\uff0c\u63d0\u51fa\u4ee5\"\u884c\u4e3a\u76ee\u6807\u8fdd\u53cd\"\u66ff\u4ee3\u4f20\u7edf\"\u8d44\u6e90\u653b\u9677\"\u4f5c\u4e3a\u8bc4\u4f30\u6838\u5fc3\uff0c\u5e76\u7ed9\u51fa\u5b8c\u6574\u7684\u6d4b\u8bd5\u5de5\u4f5c\u6d41\u4e0e\u6280\u672f\u6846\u67b6\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14006", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06AI\u6e17\u900f\u5b9a\u4e49\u4e3a\uff1a\u5728\u660e\u786e\u5a01\u80c1\u6a21\u578b\u4e0b\uff0c\u53ef\u884c\u5730\u8bf1\u5bfcAI\u6cbb\u7406\u884c\u4e3a\u8fdd\u53cd\u4e00\u9879\u6216\u591a\u9879\u64cd\u4f5c\u76ee\u6807", "\u8986\u76d6\u63d0\u793a\u6ce8\u5165\u3001\u95f4\u63a5\u63d0\u793a\u6ce8\u5165\u3001\u6570\u636e\u6295\u6bd2\u3001\u4f20\u611f\u5668\u64cd\u63a7\u3001\u68c0\u7d22\u6295\u6bd2\u3001\u5de5\u5177\u6ee5\u7528\u3001\u667a\u80fd\u4f53\u9519\u4f4d\u7b49\u65b0\u578b\u653b\u51fb\u8def\u5f84", "\u63d0\u51fa\u516d\u6b65\u6d4b\u8bd5\u5de5\u4f5c\u6d41\uff1a\u8bc6\u522b\u64cd\u4f5c\u76ee\u6807\u2192\u6620\u5c04AI\u6cbb\u7406\u884c\u4e3a\u2192\u5206\u6790\u5bf9\u6297\u5f71\u54cd\u9762\u2192\u5b9a\u4e49\u884c\u4e3a\u5931\u8d25\u51c6\u5219\u2192\u6267\u884c\u573a\u666f\u6d4b\u8bd5\u2192\u62a5\u544a\u8bc1\u636e\u94fe"], "keywords": ["AI\u5b89\u5168", "\u6e17\u900f\u6d4b\u8bd5", "\u667a\u80fd\u4f53", "\u5bf9\u6297\u653b\u51fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14006v1", "published_at": "2026-07-15", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Rethinking Penetration Testing for AI-Enabled Systems: From Resource Compromise to Behavioral Objective Violation", "tldr": "\u5c06\u6e17\u900f\u6d4b\u8bd5\u8303\u5f0f\u6269\u5c55\u81f3AI\u7cfb\u7edf\uff0c\u4ece\u57fa\u7840\u8bbe\u65bd\u653b\u9677\u8f6c\u5411\u884c\u4e3a\u76ee\u6807\u8fdd\u53cd\u7684\u8bc4\u4f30\u6846\u67b6", "upvotes": 0, "what_it_is": "\u672c\u6587\u91cd\u65b0\u5b9a\u4e49\u4e86\u9762\u5411AI\u8d4b\u80fd\u7cfb\u7edf\u7684\u6e17\u900f\u6d4b\u8bd5\u8303\u5f0f\uff0c\u63d0\u51fa\u4ee5\"\u884c\u4e3a\u76ee\u6807\u8fdd\u53cd\"\u66ff\u4ee3\u4f20\u7edf\"\u8d44\u6e90\u653b\u9677\"\u4f5c\u4e3a\u8bc4\u4f30\u6838\u5fc3\uff0c\u5e76\u7ed9\u51fa\u5b8c\u6574\u7684\u6d4b\u8bd5\u5de5\u4f5c\u6d41\u4e0e\u6280\u672f\u6846\u67b6\u3002", "why_notable": "\u968f\u7740LLM\u4e0eAI\u667a\u80fd\u4f53\u5927\u89c4\u6a21\u90e8\u7f72\uff0c\u4f20\u7edf\u6e17\u900f\u6d4b\u8bd5\u65e0\u6cd5\u8986\u76d6\u884c\u4e3a\u5c42\u9762\u7684\u5b89\u5168\u98ce\u9669\uff0c\u672c\u6587\u63d0\u4f9b\u4e86\u9996\u4e2a\u7cfb\u7edf\u6027\u7684AI\u7cfb\u7edf\u884c\u4e3a\u5b89\u5168\u8bc4\u4f30\u6846\u67b6\uff0c\u5bf9\u5b89\u5168\u8fd0\u8425\u3001\u7ea2\u961f\u6d4b\u8bd5\u548cAI\u6cbb\u7406\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Agentic AI systems increasingly act through heterogeneous runtimes: local coding hooks, SDK tools, browser automation, managed-agent traces, API gateways, and workflow engines. A single operational act such as publishing code, changing identity state, moving money, or exporting data may therefore be represented by many incompatible runtime records. This makes a basic governance question difficult to answer: what action was actually approved, what evidence binds the approval to execution, and can an independent verifier reproduce the same action identity later? This paper presents Canonical Action Verification and Attestation (CAVA), a runtime-semantics layer for converting heterogeneous agent activity into canonical runtime action objects. CAVA is positioned below Proof-Carrying Agent Actions (PCAA): PCAA defines the deployer-owned route-review-prove governance process, while CAVA defines the stable action object that process governs. The paper formalizes canonical action identity, semantic pattern detection, approval binding, receipt integrity, runtime-portable projection, and optional attestation substrates. We study a reference implementation through a 96-seed, 384-variant benchmark covering semantic equivalence, semantic separation, wrapper bypass, false-positive control, approval binding, receipt reproducibility, attestation tamper detection, runtime portability, semantic pattern detection, policy degradation, and Azure deployment drills. The contribution is a systems formulation of action-level canonicalization and policy-addressable semantic patterns as a necessary substrate for deployer-side AI governance.", "arxiv_id": "2607.13716", "arxiv_url": "https://arxiv.org/abs/2607.13716", "authors": ["Zexun Wang"], "brief": "\u63d0\u51faCAVA\uff08\u89c4\u8303\u52a8\u4f5c\u9a8c\u8bc1\u4e0e\u8bc1\u660e\uff09\u6846\u67b6\uff0c\u4f5c\u4e3a\u8fd0\u884c\u65f6\u8bed\u4e49\u5c42\uff0c\u5c06\u6765\u81ea\u4e0d\u540c\u8fd0\u884c\u65f6\u73af\u5883\uff08\u7f16\u7801\u94a9\u5b50\u3001\u6d4f\u89c8\u5668\u81ea\u52a8\u5316\u3001API\u7f51\u5173\u7b49\uff09\u7684\u5f02\u6784\u667a\u80fd\u4f53\u6d3b\u52a8\u7edf\u4e00\u8f6c\u5316\u4e3a\u89c4\u8303\u5316\u52a8\u4f5c\u5bf9\u8c61\uff0c\u652f\u6301\u72ec\u7acb\u9a8c\u8bc1\u548c\u5ba1\u8ba1\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13716", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5f62\u5f0f\u5316\u5b9a\u4e49\u89c4\u8303\u52a8\u4f5c\u8eab\u4efd\u3001\u8bed\u4e49\u6a21\u5f0f\u68c0\u6d4b\u3001\u5ba1\u6279\u7ed1\u5b9a\u3001\u6536\u636e\u5b8c\u6574\u6027\u548c\u8fd0\u884c\u65f6\u53ef\u79fb\u690d\u6295\u5f71\u7b49\u6838\u5fc3\u6982\u5ff5", "\u901a\u8fc796\u79cd\u79cd\u5b50\u3001384\u79cd\u53d8\u4f53\u7684\u57fa\u51c6\u6d4b\u8bd5\u9a8c\u8bc1\uff0c\u8986\u76d6\u8bed\u4e49\u7b49\u4ef7\u3001\u5305\u88c5\u5668\u7ed5\u8fc7\u3001\u7be1\u6539\u68c0\u6d4b\u3001\u8fd0\u884c\u65f6\u53ef\u79fb\u690d\u6027\u7b4911\u7c7b\u573a\u666f", "CAVA\u5b9a\u4f4d\u4e8ePCAA\uff08\u643a\u5e26\u8bc1\u660e\u7684\u667a\u80fd\u4f53\u52a8\u4f5c\uff09\u6846\u67b6\u4e4b\u4e0b\uff0c\u63d0\u4f9b\u7a33\u5b9a\u7684\u52a8\u4f5c\u5bf9\u8c61\u4f5c\u4e3a\u90e8\u7f72\u65b9\u6cbb\u7406\u6d41\u7a0b\u7684\u57fa\u7840\u5e95\u5ea7"], "keywords": ["\u667a\u80fd\u4f53", "AI\u6cbb\u7406", "\u8fd0\u884c\u65f6\u5b89\u5168", "\u53ef\u4fe1\u8ba1\u7b97"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13716v1", "published_at": "2026-07-15", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CAVA: Canonical Action Verification and Attestation for Runtime Governance of Agentic AI Systems", "tldr": "CAVA\uff1a\u5c06\u5f02\u6784\u667a\u80fd\u4f53\u8fd0\u884c\u65f6\u6d3b\u52a8\u8f6c\u5316\u4e3a\u89c4\u8303\u52a8\u4f5c\u5bf9\u8c61\uff0c\u5b9e\u73b0AI\u7cfb\u7edf\u7684\u53ef\u9a8c\u8bc1\u6cbb\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51faCAVA\uff08\u89c4\u8303\u52a8\u4f5c\u9a8c\u8bc1\u4e0e\u8bc1\u660e\uff09\u6846\u67b6\uff0c\u4f5c\u4e3a\u8fd0\u884c\u65f6\u8bed\u4e49\u5c42\uff0c\u5c06\u6765\u81ea\u4e0d\u540c\u8fd0\u884c\u65f6\u73af\u5883\uff08\u7f16\u7801\u94a9\u5b50\u3001\u6d4f\u89c8\u5668\u81ea\u52a8\u5316\u3001API\u7f51\u5173\u7b49\uff09\u7684\u5f02\u6784\u667a\u80fd\u4f53\u6d3b\u52a8\u7edf\u4e00\u8f6c\u5316\u4e3a\u89c4\u8303\u5316\u52a8\u4f5c\u5bf9\u8c61\uff0c\u652f\u6301\u72ec\u7acb\u9a8c\u8bc1\u548c\u5ba1\u8ba1\u3002", "why_notable": "\u968f\u7740AI\u667a\u80fd\u4f53\u5728\u751f\u4ea7\u73af\u5883\u4e2d\u6267\u884c\u9ad8\u98ce\u9669\u64cd\u4f5c\uff08\u53d1\u5e03\u4ee3\u7801\u3001\u8f6c\u79fb\u8d44\u91d1\u3001\u5bfc\u51fa\u6570\u636e\uff09\uff0c\u8de8\u5f02\u6784\u8fd0\u884c\u65f6\u7684\u52a8\u4f5c\u53ef\u8ffd\u6eaf\u6027\u548c\u53ef\u9a8c\u8bc1\u6027\u6210\u4e3a\u5173\u952e\u6cbb\u7406\u9700\u6c42\uff0cCAVA\u63d0\u4f9b\u4e86\u7cfb\u7edf\u6027\u7684\u5f62\u5f0f\u5316\u89e3\u51b3\u65b9\u6848\uff0c\u5177\u6709\u91cd\u8981\u7684\u5b89\u5168\u5408\u89c4\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Automatic scientific discovery has long been a goal of computational scholars - a machine that can discover nature\u0027s secrets on its own, moving computational systems beyond data-fitting tools toward the generation and refinement of mechanistic models of the universe. Recent advances in symbolic regression (SR) and large-language-model (LLM)-based agents suggest that such systems can recover equations from data, incorporate domain priors, and automate parts of the research workflow. However, most existing approaches either focus on narrow equation-discovery benchmarks or broad end-to-end automation pipelines, while biological systems remain comparatively underexplored. Here, we introduce the MEDA system, an LLM- and SR-powered agentic framework for discovering ordinary-differential-equation (ODE) models of biological and biologically inspired dynamical systems. MEDA retrieves background knowledge, defines admissible variables, generates mechanistic constraints, proposes candidate ODEs, and fits and evaluates them. We evaluate it across canonical model retrieval, reasoning-based extrapolation to unseen variants, and open-ended discovery, with and without experimental data. Across these settings, MEDA recovered the correct state variables, achieved strong structural recovery in retrieval and extrapolation tasks, and produced biologically plausible discovery-oriented models. Ablation and robustness analyses show that knowledge-guided formalization and mechanistic constraints are load-bearing components, whereas numerical fitting alone can preserve trajectory-compatible but biologically incorrect equations.", "arxiv_id": "2607.13608", "arxiv_url": "https://arxiv.org/abs/2607.13608", "authors": ["David Krongauz", "Arad Zulti", "Eran Segal", "Teddy Lazebnik"], "brief": "\u63d0\u51faMEDA\u6846\u67b6\uff0c\u7ed3\u5408\u5927\u8bed\u8a00\u6a21\u578b\u4e0e\u7b26\u53f7\u56de\u5f52\u6280\u672f\uff0c\u81ea\u52a8\u4e3a\u751f\u7269\u53ca\u4eff\u751f\u52a8\u529b\u5b66\u7cfb\u7edf\u53d1\u73b0\u5e38\u5fae\u5206\u65b9\u7a0b\uff08ODE\uff09\u6a21\u578b\uff0c\u6db5\u76d6\u77e5\u8bc6\u68c0\u7d22\u3001\u53d8\u91cf\u5b9a\u4e49\u3001\u673a\u5236\u7ea6\u675f\u751f\u6210\u3001\u5019\u9009\u65b9\u7a0b\u63d0\u51fa\u4e0e\u8bc4\u4f30\u5168\u6d41\u7a0b\u3002", "categories": ["cs.AI", "math.DS"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13608", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["MEDA\u96c6\u6210LLM\u80cc\u666f\u77e5\u8bc6\u68c0\u7d22\u4e0e\u7b26\u53f7\u56de\u5f52\uff0c\u5b9e\u73b0\u4ece\u6570\u636e\u5230\u673a\u5236\u6a21\u578b\u7684\u7aef\u5230\u7aef\u81ea\u52a8\u53d1\u73b0", "\u5728\u7ecf\u5178\u6a21\u578b\u68c0\u7d22\u3001\u63a8\u7406\u5916\u63a8\u548c\u5f00\u653e\u5f0f\u53d1\u73b0\u4e09\u7c7b\u4efb\u52a1\u4e0a\u5747\u8868\u73b0\u51fa\u5f3a\u7ed3\u6784\u6062\u590d\u80fd\u529b", "\u6d88\u878d\u5b9e\u9a8c\u8868\u660e\u77e5\u8bc6\u5f15\u5bfc\u5f62\u5f0f\u5316\u4e0e\u673a\u5236\u7ea6\u675f\u662f\u5173\u952e\u7ec4\u4ef6\uff0c\u5355\u7eaf\u6570\u503c\u62df\u5408\u4f1a\u4ea7\u751f\u8f68\u8ff9\u517c\u5bb9\u4f46\u751f\u7269\u5 given the user\u0027s context. It also operates at the granularity of action categories rather than individual instances, producing routine interruptions that erode autonomy and train users to wave through the most consequential alerts. We reframe the problem as a per-instance three-way routing decision over {EXECUTE, ASK, REFUSE} and instantiate it with Safety Sentry, a lightweight guard model whose inference reduces to a single decoding call. A single decoding-time threshold lets one fixed checkpoint be re-positioned across deployments of differing risk tolerance without retraining. Safety Sentry outperforms a broad set of open-weight and frontier closed-source baselines on overall accuracy and safety-related recall, while controlling both directional error rates simultaneously.", "arxiv_id": "2607.13594", "arxiv_url": "https://arxiv.org/abs/2607.13594", "authors": ["Tianyu Chen", "Chujia Hu", "Wenjie Wang"], "brief": "\u63d0\u51faSafety Sentry\u7cfb\u7edf\uff0c\u5c06LLM\u667a\u80fd\u4f53\u5de5\u5177\u8c03\u7528\u7684\u5b89\u5168\u5ba1\u67e5\u4ece\u4e8c\u5143\uff08\u5b89\u5168/\u4e0d\u5b89\u5168\uff09\u5347\u7ea7\u4e3a\u4e09\u8def\u7531\u51b3\u7b56\uff08EXECUTE/ASK/REFUSE\uff09\uff0c\u901a\u8fc7\u5355\u6b21\u89e3\u7801\u8c03\u7528\u5b9e\u73b0\u8f7b\u91cf\u7ea7\u4e0a\u4e0b\u6587\u611f\u77e5\u7684\u4eba\u673a\u534f\u4f5c\u5e72\u9884\u673a\u5236\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13594", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u8def\u7531\u6846\u67b6\uff1a\u533a\u5206\u300c\u76f4\u63a5\u6267\u884c\u300d\u300c\u8be2\u95ee\u7528\u6237\u300d\u300c\u62d2\u7edd\u6267\u884c\u300d\u4e09\u79cd\u51b3\u7b56\uff0c\u89e3\u8026\u52a8\u4f5c\u672c\u8eab\u5371\u5bb3\u6027\u4e0e\u7528\u6237\u4e0a\u4e0b\u6587\u9002\u5f53\u6027\u4e24\u4e2a\u7ef4\u5ea6", "\u5355\u6b21\u89e3\u7801\u8c03\u7528\u5b9e\u73b0\u63a8\u7406\uff0c\u901a\u8fc7\u89e3\u7801\u9608\u503c\u5373\u53ef\u5728\u4e0d\u540c\u98ce\u9669\u5bb9\u5fcd\u5ea6\u90e8\u7f72\u95f4\u7075\u6d3b\u8c03\u6574\uff0c\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3", "\u5728\u6574\u4f53\u51c6\u786e\u7387\u548c\u5b89\u5168\u76f8\u5173\u53ec\u56de\u7387\u4e0a\u8d85\u8d8a\u591a\u4e2a\u5f00\u6e90\u53ca\u95ed\u6e90\u524d\u6cbf\u57fa\u7ebf\u6a21\u578b\uff0c\u540c\u65f6\u63a7\u5236\u53cc\u5411\u9519\u8bef\u7387"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u5bf9\u9f50", "\u4eba\u673a\u534f\u4f5c", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13594v1", "published_at": "2026-07-15", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SAFETY SENTRY: Context-Aware Human Intervention via EXECUTE-ASK-REFUSE Routing", "tldr": "Safety Sentry\u5c06LLM\u667a\u80fd\u4f53\u52a8\u4f5c\u5b89\u5168\u5224\u65ad\u91cd\u6784\u4e3a\u4e09\u8def\u7531\u51b3\u7b56\uff0c\u51cf\u5c11\u8bef\u62a5\u540c\u65f6\u63d0\u5347\u5b89\u5168\u53ec\u56de\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faSafety Sentry\u7cfb\u7edf\uff0c\u5c06LLM\u667a\u80fd\u4f53\u5de5\u5177\u8c03\u7528\u7684\u5b89\u5168\u5ba1\u67e5\u4ece\u4e8c\u5143\uff08\u5b89\u5168/\u4e0d\u5b89\u5168\uff09\u5347\u7ea7\u4e3a\u4e09\u8def\u7531\u51b3\u7b56\uff08EXECUTE/ASK/REFUSE\uff09\uff0c\u901a\u8fc7\u5355\u6b21\u89e3\u7801\u8c03\u7528\u5b9e\u73b0\u8f7b\u91cf\u7ea7\u4e0a\u4e0b\u6587\u611f\u77e5\u7684\u4eba\u673a\u534f\u4f5c\u5e72\u9884\u673a\u5236\u3002", "why_notable": "\u73b0\u6709\u4e8c\u5143\u5b88\u536b\u6a21\u578b\u9891\u7e41\u8bef\u62a5\u5bfc\u81f4\u7528\u6237\u300c\u8b66\u62a5\u75b2\u52b3\u300d\uff0c\u672c\u6587\u4ece\u6839\u672c\u4e0a\u91cd\u6784\u95ee\u9898\u6846\u67b6\uff0c\u517c\u987e\u81ea\u4e3b\u6027\u4e0e\u5b89\u5168\u6027\uff0c\u5bf9LLM\u667a\u80fd\u4f53\u5b9e\u9645\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Urban region profiling constitutes a core problem in urban computing, supporting applications such as population estimation, economic assessment, and environmental monitoring. Existing methods typically formulate this task as multimodal representation learning, fusing heterogeneous urban data, e.g., satellite imagery, points of interest, textual descriptions, and 3D building information, into latent embeddings for prediction. However, these approaches are largely correlation-driven, assume cross-modal consistency, and rely on static pipelines, which limit their robustness in heterogeneous or unseen urban regions. We propose UrbanAgent, an agentic framework that reframes urban region profiling as a reasoning-driven inference problem. UrbanAgent instantiates an independent agent for each data modality and performs structured multi-agent collaborative reasoning to explicitly address cross-modal inconsistencies rather than absorbing them into a single representation. In addition, UrbanAgent extends indicator prediction as a closed-loop process of active evidence acquisition and iterative reasoning, enabling agents to verify uncertain inferences through tool-augmented retrieval of external knowledge optimized via reinforcement learning. Extensive experiments on global urban datasets for Carbon emissions, GDP, and Population estimation show that UrbanAgent consistently outperforms existing baselines, achieving an average improvement of 8.1% in R2, and exhibiting strong generalization performance in unseen-city settings.", "arxiv_id": "2607.13558", "arxiv_url": "https://arxiv.org/abs/2607.13558", "authors": ["Xixuan Hao", "Yutian Jiang", "Jiabo Liu", "Yihang Yang", "Guangyin Jin", "Song Gao", "Yuxuan Liang"], "brief": "\u63d0\u51faUrbanAgent\u6846\u67b6\uff0c\u5c06\u57ce\u5e02\u533a\u57df\u753b\u50cf\u4efb\u52a1\u91cd\u6784\u4e3a\u63a8\u7406\u9a71\u52a8\u7684\u63a8\u65ad\u95ee\u9898\uff0c\u4e3a\u6bcf\u79cd\u6570\u636e\u6a21\u6001\uff08\u536b\u661f\u56fe\u50cf\u3001POI\u3001\u6587\u672c\u30013D\u5efa\u7b51\uff09\u5206\u914d\u72ec\u7acb\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u63a8\u7406\u548c\u5de5\u5177\u589e\u5f3a\u7684\u5916\u90e8\u77e5\u8bc6\u68c0\u7d22\uff08\u5f3a\u5316\u5b66\u4e60\u4f18\u5316\uff09\u8fdb\u884c\u95ed\u73af\u9884\u6d4b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13558", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6bcf\u79cd\u6570\u636e\u6a21\u6001\u5bf9\u5e94\u72ec\u7acb\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u663e\u5f0f\u5904\u7406\u8de8\u6a21\u6001\u4e0d\u4e00\u81f4\u6027\uff0c\u800c\u975e\u5c06\u5176\u878d\u5408\u8fdb\u5355\u4e00\u8868\u793a", "\u5f15\u5165\u5de5\u5177\u589e\u5f3a\u68c0\u7d22\u673a\u5236\uff0c\u652f\u6301\u4e3b\u52a8\u8bc1\u636e\u83b7\u53d6\u4e0e\u8fed\u4ee3\u63a8\u7406\uff0c\u5f62\u6210\u95ed\u73af\u9884\u6d4b\u6d41\u7a0b\uff0c\u5e76\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u4f18\u5316\u68c0\u7d22\u7b56\u7565", "\u5728\u5168\u7403\u57ce\u5e02\u6570\u636e\u96c6\uff08\u78b3\u6392\u653e\u3001GDP\u3001\u4eba\u53e3\u4f30\u8ba1\uff09\u4e0a\u5e73\u5747R\u00b2\u63d0\u53478.1%\uff0c\u4e14\u5728\u672a\u89c1\u57ce\u5e02\u573a\u666f\u4e2d\u5c55\u73b0\u5f3a\u6cdb\u5316\u80fd\u529b"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u57ce\u5e02\u8ba1\u7b97", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13558v1", "published_at": "2026-07-15", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Multi-Agent Collaborative Reasoning with Tool-Augmented Evidence for Urban Region Profiling", "tldr": "UrbanAgent\uff1a\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u63a8\u7406\u6846\u67b6\uff0c\u7528\u4e8e\u57ce\u5e02\u533a\u57df\u753b\u50cf\uff0c\u5e73\u5747R\u00b2\u63d0\u53478.1%", "upvotes": 0, "what_it_is": "\u63d0\u51faUrbanAgent\u6846\u67b6\uff0c\u5c06\u57ce\u5e02\u533a\u57df\u753b\u50cf\u4efb\u52a1\u91cd\u6784\u4e3a\u63a8\u7406\u9a71\u52a8\u7684\u63a8\u65ad\u95ee\u9898\uff0c\u4e3a\u6bcf\u79cd\u6570\u636e\u6a21\u6001\uff08\u536b\u661f\u56fe\u50cf\u3001POI\u3001\u6587\u672c\u30013D\u5efa\u7b51\uff09\u5206\u914d\u72ec\u7acb\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u63a8\u7406\u548c\u5de5\u5177\u589e\u5f3a\u7684\u5916\u90e8\u77e5\u8bc6\u68c0\u7d22\uff08\u5f3a\u5316\u5b66\u4e60\u4f18\u5316\uff09\u8fdb\u884c\u95ed\u73af\u9884\u6d4b\u3002", "why_notable": "\u7a81\u7834\u4f20\u7edf\u591a\u6a21\u6001\u878d\u5408\u65b9\u6cd5\u7684\u76f8\u5173\u6027\u9a71\u52a8\u5c40\u9650\uff0c\u9996\u6b21\u5c06\u57ce\u5e02\u533a\u57df\u753b\u50cf\u5efa\u6a21\u4e3a\u591a\u667a\u80fd\u4f53\u63a8\u7406\u95ee\u9898\uff0c\u5177\u5907\u8de8\u57ce\u5e02\u6cdb\u5316\u80fd\u529b\uff0c\u5bf9\u57ce\u5e02\u8ba1\u7b97\u9886\u57df\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "An LLM agent\u0027s real-task performance is shaped as much by the harness around its model as by the frozen model itself: its prompts, injected knowledge, runtime control, and configuration. In deployment the harness is often the only lever available, so improving it automatically is the natural way to raise performance without touching the weights. The hard part is not generating changes but knowing which one truly helped. Self-generated feedback is noisy, and an apparent gain can be a measurement artifact or an edit that merely overfits the tasks it was tuned on. We present a self-evolving agent-harness framework that separates proposing changes from crediting them: a language model diagnoses failures and proposes patches, while all sampling, measurement, and significance testing are owned by deterministic code, so every credited improvement is trustworthy by construction. Patches populate a gated, categorical quality-diversity archive (GSME) keyed on the (WHERE x WHY) pathology an edit addresses rather than the tasks it fixes, an anti-overfitting inductive bias; generalization is measured on a sealed test scored only after evolution. Across seven domains with a frozen open-weight model, the harness is train-selected and scored once on a sealed test; its credited gains there are +9 to +15.5pp and retain 86-147% of the training gain, evidence they generalize rather than overfit. The winning patch tracks the model\u0027s dominant pathology, not its size or family: changing the model can change the pathology and the patch, while the same pathology-to-patch match recurs across two model families. What transfers is the diagnose-and-credit loop, not any specific harness.", "arxiv_id": "2607.13683", "arxiv_url": "https://arxiv.org/abs/2607.13683", "authors": ["Xiaotian Luo", "Fengxingyu Wang", "Chuanrui Hu", "Dizhan Xue", "Yafeng Deng"], "brief": "\u63d0\u51faGSME\u6846\u67b6\uff0c\u5c06Agent\u5916\u58f3\uff08\u63d0\u793a\u3001\u77e5\u8bc6\u6ce8\u5165\u3001\u8fd0\u884c\u65f6\u63a7\u5236\u7b49\uff09\u7684\u81ea\u52a8\u4f18\u5316\u95ee\u9898\u5206\u89e3\u4e3a\"\u63d0\u8bae\u53d8\u66f4\"\u4e0e\"\u53ef\u4fe1\u5f52\u56e0\"\u4e24\u4e2a\u72ec\u7acb\u73af\u8282\uff0c\u7528\u786e\u5b9a\u6027\u4ee3\u7801\u8d1f\u8d23\u91c7\u6837\u3001\u6d4b\u91cf\u548c\u663e\u8457\u6027\u68c0\u9a8c\uff0c\u786e\u4fdd\u6bcf\u6b21\u6539\u8fdb\u53ef\u4fe1\uff1b\u901a\u8fc7\u57fa\u4e8e\u75c5\u7406\u7c7b\u578b\uff08WHERE\u00d7WHY\uff09\u800c\u975e\u4efb\u52a1\u7684\u8d28\u91cf\u591a\u6837\u6027\u6863\u6848\u9632\u6b62\u8fc7\u62df\u5408\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13683", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u53d8\u66f4\u63d0\u8bae\uff08LLM\u8bca\u65ad\u5931\u8d25\u5e76\u751f\u6210\u8865\u4e01\uff09\u4e0e\u53d8\u66f4\u5f52\u56e0\uff08\u786e\u5b9a\u6027\u4ee3\u7801\u7edf\u8ba1\u68c0\u9a8c\uff09\u4e25\u683c\u5206\u79bb\uff0c\u6d88\u9664\u81ea\u751f\u6210\u53cd\u9988\u566a\u58f0", "GSME\u6863\u6848\u4ee5\u0027\u9519\u8bef\u53d1\u751f\u4f4d\u7f6e\u00d7\u9519\u8bef\u539f\u56e0\u0027\u4e3a\u952e\u800c\u975e\u5177\u4f53\u4efb\u52a1\uff0c\u5f62\u6210\u6297\u8fc7\u62df\u5408\u7684\u5f52\u7eb3\u504f\u7f6e", "\u57287\u4e2a\u9886\u57df\u51bb\u7ed3\u5f00\u6e90\u6a21\u578b\u6743\u91cd\u7684\u6761\u4ef6\u4e0b\uff0c\u8bad\u7ec3\u96c6\u9009\u51fa\u7684\u5916\u58f3\u5728\u5c01\u95ed\u6d4b\u8bd5\u96c6\u4e0a\u83b7\u5f97+9\u81f3+15.5pp\u63d0\u5347\uff0c\u4fdd\u7559\u8bad\u7ec3\u589e\u76ca\u768486-147%\uff0c\u6cdb\u5316\u6027\u5f3a"], "keywords": ["\u667a\u80fd\u4f53", "\u63d0\u793a\u4f18\u5316", "\u8d28\u91cf\u591a\u6837\u6027", "\u81ea\u52a8\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13683v1", "published_at": "2026-07-15", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Self-Evolving Agent Harnesses via Gated Semantic Quality-Diversity", "tldr": "\u63d0\u51fa\u81ea\u8fdb\u5316Agent\u6846\u67b6\uff0c\u901a\u8fc7\u95e8\u63a7\u8bed\u4e49\u8d28\u91cf\u591a\u6837\u6027\u6863\u6848\u81ea\u52a8\u4f18\u5316LLM\u7684\u63d0\u793a/\u914d\u7f6e\u7b49\u5916\u58f3\u7ec4\u4ef6", "upvotes": 0, "what_it_is": "\u63d0\u51faGSME\u6846\u67b6\uff0c\u5c06Agent\u5916\u58f3\uff08\u63d0\u793a\u3001\u77e5\u8bc6\u6ce8\u5165\u3001\u8fd0\u884c\u65f6\u63a7\u5236\u7b49\uff09\u7684\u81ea\u52a8\u4f18\u5316\u95ee\u9898\u5206\u89e3\u4e3a\"\u63d0\u8bae\u53d8\u66f4\"\u4e0e\"\u53ef\u4fe1\u5f52\u56e0\"\u4e24\u4e2a\u72ec\u7acb\u73af\u8282\uff0c\u7528\u786e\u5b9a\u6027\u4ee3\u7801\u8d1f\u8d23\u91c7\u6837\u3001\u6d4b\u91cf\u548c\u663e\u8457\u6027\u68c0\u9a8c\uff0c\u786e\u4fdd\u6bcf\u6b21\u6539\u8fdb\u53ef\u4fe1\uff1b\u901a\u8fc7\u57fa\u4e8e\u75c5\u7406\u7c7b\u578b\uff08WHERE\u00d7WHY\uff09\u800c\u975e\u4efb\u52a1\u7684\u8d28\u91cf\u591a\u6837\u6027\u6863\u6848\u9632\u6b62\u8fc7\u62df\u5408\u3002", "why_notable": "\u9996\u6b21\u5c06\u8d28\u91cf\u591a\u6837\u6027\u8fdb\u5316\u7b97\u6cd5\u4e0e\u53ef\u4fe1\u7edf\u8ba1\u5f52\u56e0\u7ed3\u5408\u7528\u4e8eAgent\u5916\u58f3\u81ea\u52a8\u4f18\u5316\uff0c\u5728\u4e0d\u4fee\u6539\u6a21\u578b\u6743\u91cd\u7684\u524d\u63d0\u4e0b\u5b9e\u73b0\u663e\u8457\u6027\u80fd\u63d0\u5347\uff0c\u4e14\u8de8\u6a21\u578b\u5bb6\u65cf\u7684\u75c5\u7406-\u8865\u4e01\u5bf9\u5e94\u5173\u7cfb\u53ef\u8fc1\u79fb\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "By 2030, 59 of every 100 workers will need reskilling or upskilling, yet the average time to close an enterprise skills gap grew from roughly 3 days in 2014 to 36 days in 2018. Most current frameworks accelerate single stages of upskilling programs and generally lack industry validation. We present an end-to-end framework that applies AI acceleration across five stages of knowledge acquisition, content development, content review and verification, teaching, and assessment development; with a strong focus on both production and learning efficiency. Three strong external signals validates the framework: the US National Association of State Boards of Accountancy reviewed and approved an upskilling program built on the framework for continuing-professional-education credits; 3 learners followed the program and passed the NVIDIA Certified Professional in Agentic AI exam in a significantly short amount of time, with 14 more in progress; the program\u0027s knowledge base supports complex downstream analysis such as the production of a robust 1,267 risk item dataset for managing multi-agent AI system risks.", "arxiv_id": "2607.14044", "arxiv_url": "https://arxiv.org/abs/2607.14044", "authors": ["Tam Nguyen", "Hung Nguyen", "Robert Ogburn"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u5c06AI\u52a0\u901f\u5e94\u7528\u4e8e\u4e13\u4e1a\u6280\u80fd\u63d0\u5347\u5168\u6d41\u7a0b\u4e94\u4e2a\u9636\u6bb5\uff08\u77e5\u8bc6\u83b7\u53d6\u3001\u5185\u5bb9\u5f00\u53d1\u3001\u5185\u5bb9\u5ba1\u6838\u3001\u6559\u5b66\u3001\u8bc4\u4f30\u5f00\u53d1\uff09\u7684\u7aef\u5230\u7aef\u6846\u67b6\uff0c\u5e76\u901a\u8fc7\u771f\u5b9e\u884c\u4e1a\u8ba4\u8bc1\u9879\u76ee\u9a8c\u8bc1\u5176\u6709\u6548\u6027\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14044", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u6846\u67b6\u8986\u76d6\u4e94\u5927\u9636\u6bb5\uff1a\u77e5\u8bc6\u83b7\u53d6\u3001\u5185\u5bb9\u5f00\u53d1\u3001\u5185\u5bb9\u5ba1\u6838\u4e0e\u9a8c\u8bc1\u3001\u6559\u5b66\u3001\u8bc4\u4f30\u5f00\u53d1\uff0c\u517c\u987e\u751f\u4ea7\u6548\u7387\u4e0e\u5b66\u4e60\u6548\u7387", "\u83b7\u7f8e\u56fd\u6ce8\u518c\u4f1a\u8ba1\u5e08\u534f\u4f1a\uff08NASBA\uff09\u8ba4\u8bc1\uff0c3\u540d\u5b66\u5458\u5728\u6781\u77ed\u65f6\u95f4\u5185\u901a\u8fc7NVIDIA\u8ba4\u8bc1\u667a\u80fd\u4f53AI\u4e13\u4e1a\u8003\u8bd5\uff0c14\u4eba\u5728\u8fdb\u884c\u4e2d", "\u6846\u67b6\u77e5\u8bc6\u5e93\u652f\u6301\u4e0b\u6e38\u590d\u6742\u5206\u6790\uff0c\u751f\u6210\u4e86\u5305\u542b1267\u6761\u98ce\u9669\u6761\u76ee\u7684\u591a\u667a\u80fd\u4f53AI\u7cfb\u7edf\u98ce\u9669\u6570\u636e\u96c6"], "keywords": ["\u667a\u80fd\u4f53", "\u6559\u80b2AI", "\u6280\u80fd\u63d0\u5347", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14044v1", "published_at": "2026-07-15", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AI-accelerated End-to-End Framework for Rapid Professional Upskilling", "tldr": "AI\u9a71\u52a8\u7684\u7aef\u5230\u7aef\u4e13\u4e1a\u6280\u80fd\u63d0\u5347\u6846\u67b6\uff0c\u8986\u76d6\u77e5\u8bc6\u83b7\u53d6\u5230\u8bc4\u4f30\u5168\u6d41\u7a0b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u4e2a\u5c06AI\u52a0\u901f\u5e94\u7528\u4e8e\u4e13\u4e1a\u6280\u80fd\u63d0\u5347\u5168\u6d41\u7a0b\u4e94\u4e2a\u9636\u6bb5\uff08\u77e5\u8bc6\u83b7\u53d6\u3001\u5185\u5bb9\u5f00\u53d1\u3001\u5185
