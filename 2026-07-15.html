\u5bb9\u5ba1\u6838\u3001\u6559\u5b66\u3001\u8bc4\u4f30\u5f00\u53d1\uff09\u7684\u7aef\u5230\u7aef\u6846\u67b6\uff0c\u5e76\u901a\u8fc7\u771f\u5b9e\u884c\u4e1a\u8ba4\u8bc1\u9879\u76ee\u9a8c\u8bc1\u5176\u6709\u6548\u6027\u3002", "why_notable": "\u9996\u4e2a\u7ecf\u884c\u4e1a\u6743\u5a01\u673a\u6784\uff08NASBA\uff09\u8ba4\u8bc1\u5e76\u6709\u5b9e\u9645\u5b66\u5458\u901a\u8fc7\u4e13\u4e1a\u8003\u8bd5\u9a8c\u8bc1\u7684AI\u5168\u6d41\u7a0b\u6280\u80fd\u63d0\u5347\u6846\u67b6\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u53ef\u590d\u5236\u6027\uff0c\u540c\u65f6\u586b\u8865\u4e86\u4f01\u4e1a\u6280\u80fd\u5dee\u8ddd\u5feb\u901f\u6269\u5927\u7684\u73b0\u5b9e\u9700\u6c42\u3002"}, {"abstract": "Autonomous robotic navigation in nonstationary time-varying fluid flows remains a fundamental challenge due to partial observability and the unpredictability of realistic environments. While classical optimal control frameworks employed in robotics require unrealistic a-priori global flow knowledge, biological systems are able to navigate successfully by exploiting localized sensory cues. In this work we present a reinforcement learning approach using the TD3 algorithm to train autonomous agents to reach arbitrary targets within a parametric, chaotic double-gyre flow. To investigate optimal sensory mechanisms, we evaluate five bio-inspired observation strategies based on relative position, local velocity or local vorticity measures, and short-term memory variants. Additionally, we analyze the impact of providing agents with explicit global flow parameters. Numerical results demonstrate that an agent that is able to sense and remember a set number of flow velocity measures achieves the highest performance. The experiments reveal a trade-off in sensor utility: velocity-aware agents optimize energy efficiency, whereas vorticity sensors provide superior structural mapping and achieve better target proximity. Incorporating explicit global flow parameters is shown to decrease navigation performance. This behavior suggests that reinforcement learning-based autonomous systems develop more robust and general policies when restricted to implicit flow representations. The presented results offer insights for improving the transition of bio-inspired robotic navigation from simulation to real-world environments.", "arxiv_id": "2607.13553", "arxiv_url": "https://arxiv.org/abs/2607.13553", "authors": ["Andrea Maria Braghin", "Nicol\u00f2 Botteghi", "Matteo Tomasetto", "Andrea Manzoni", "Gabriele Cazzulani"], "brief": "\u63d0\u51fa\u57fa\u4e8eTD3\u5f3a\u5316\u5b66\u4e60\u7b97\u6cd5\u7684\u81ea\u4e3b\u5bfc\u822a\u6846\u67b6\uff0c\u8bad\u7ec3\u667a\u80fd\u4f53\u5728\u53c2\u6570\u5316\u6df7\u6c8c\u53cc\u6da1\u6d41\u573a\u4e2d\u5230\u8fbe\u4efb\u610f\u76ee\u6807\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f30\u4e94\u79cd\u4eff\u751f\u611f\u77e5\u7b56\u7565\uff08\u4f4d\u7f6e\u3001\u901f\u5ea6\u3001\u6da1\u91cf\u53ca\u5176\u8bb0\u5fc6\u53d8\u4f53\uff09\u7684\u5bfc\u822a\u6027\u80fd\u3002", "categories": ["cs.RO", "cs.LG", "eess.SY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13553", "impact_score": 6, "is_agent": false, "is_top": true, "key_points": ["\u901f\u5ea6\u611f\u77e5+\u77ed\u671f\u8bb0\u5fc6\u7684\u89c2\u6d4b\u7b56\u7565\u7efc\u5408\u6027\u80fd\u6700\u4f18\uff0c\u80fd\u91cf\u6548\u7387\u6700\u9ad8\uff1b\u6da1\u91cf\u4f20\u611f\u5668\u5219\u63d0\u4f9b\u66f4\u597d\u7684\u6d41\u573a\u7ed3\u6784\u6620\u5c04\u548c\u76ee\u6807\u63a5\u8fd1\u7cbe\u5ea6", "\u663e\u5f0f\u63d0\u4f9b\u5168\u5c40\u6d41\u573a\u53c2\u6570\u53cd\u800c\u964d\u4f4e\u5bfc\u822a\u6027\u80fd\uff0c\u8868\u660e\u9690\u5f0f\u6d41\u573a\u8868\u5f81\u6709\u52a9\u4e8e\u7b56\u7565\u6cdb\u5316", "\u5728\u90e8\u5206\u53ef\u89c2\u6d4b\u7684\u975e\u7a33\u6001\u6df7\u6c8c\u53cc\u6da1\u6d41\u573a\u4e2d\u9a8c\u8bc1\uff0c\u4e3a\u4eff\u771f\u5230\u771f\u5b9e\u73af\u5883\u7684\u8fc1\u79fb\u63d0\u4f9b\u6307\u5bfc"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u673a\u5668\u4eba\u5bfc\u822a", "\u6d41\u4f53\u73af\u5883", "\u4eff\u751f\u611f\u77e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13553v1", "published_at": "2026-07-15", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Flow-aware Optimal Navigation in Unsteady Flows through Reinforcement Learning", "tldr": "\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u81ea\u4e3b\u673a\u5668\u4eba\u5728\u975e\u7a33\u6001\u6df7\u6c8c\u6d41\u573a\u4e2d\u9ad8\u6548\u5bfc\u822a", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u57fa\u4e8eTD3\u5f3a\u5316\u5b66\u4e60\u7b97\u6cd5\u7684\u81ea\u4e3b\u5bfc\u822a\u6846\u67b6\uff0c\u8bad\u7ec3\u667a\u80fd\u4f53\u5728\u53c2\u6570\u5316\u6df7\u6c8c\u53cc\u6da1\u6d41\u573a\u4e2d\u5230\u8fbe\u4efb\u610f\u76ee\u6807\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f30\u4e94\u79cd\u4eff\u751f\u611f\u77e5\u7b56\u7565\uff08\u4f4d\u7f6e\u3001\u901f\u5ea6\u3001\u6da1\u91cf\u53ca\u5176\u8bb0\u5fc6\u53d8\u4f53\uff09\u7684\u5bfc\u822a\u6027\u80fd\u3002", "why_notable": "\u63ed\u793a\u4e86\u611f\u77e5\u6a21\u6001\u4e0e\u5bfc\u822a\u6027\u80fd\u4e4b\u95f4\u7684\u6743\u8861\u89c4\u5f8b\uff0c\u5e76\u53d1\u73b0\u5168\u5c40\u4fe1\u606f\u5e76\u975e\u8d8a\u591a\u8d8a\u597d\u7684\u53cd\u76f4\u89c9\u7ed3\u8bba\uff0c\u5bf9\u4eff\u751f\u673a\u5668\u4eba\u5bfc\u822a\u7684\u4f20\u611f\u5668\u8bbe\u8ba1\u548csim-to-real\u8fc1\u79fb\u5177\u6709\u5b9e\u9645\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "We present MyAG, a graph-based framework for designing and analyzing composable LLM agent systems. Our framework separates agent system construction into three graph abstractions: a component graph for agents, environments, and modules; a workflow graph for execution control; and a search graph for runtime execution. This separation allows users to flexibly reuse the same components with different strategies. We further support hierarchical composition through recursive system nodes and provide monitoring and visualization tools for inspecting agent execution. Experiments on representative agent applications show that our framework supports flexible agent system design and helps analyze performance-efficiency tradeoffs. Our framework is publicly available and fully open-source.", "arxiv_id": "2607.13474", "arxiv_url": "https://arxiv.org/abs/2607.13474", "authors": ["Zhisong Zhang"], "brief": "\u63d0\u51faMyAG\u6846\u67b6\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7cfb\u7edf\u6784\u5efa\u5206\u89e3\u4e3a\u7ec4\u4ef6\u56fe\u3001\u5de5\u4f5c\u6d41\u56fe\u548c\u641c\u7d22\u56fe\u4e09\u5c42\u62bd\u8c61\uff0c\u652f\u6301\u7075\u6d3b\u590d\u7528\u7ec4\u4ef6\u4e0e\u5c42\u6b21\u5316\u7ec4\u5408\uff0c\u5e76\u63d0\u4f9b\u8fd0\u884c\u65f6\u76d1\u63a7\u4e0e\u53ef\u89c6\u5316\u5de5\u5177\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13474", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u56fe\u5206\u79bb\u8bbe\u8ba1\uff1a\u7ec4\u4ef6\u56fe\uff08\u667a\u80fd\u4f53/\u73af\u5883/\u6a21\u5757\uff09\u3001\u5de5\u4f5c\u6d41\u56fe\uff08\u6267\u884c\u63a7\u5236\uff09\u3001\u641c\u7d22\u56fe\uff08\u8fd0\u884c\u65f6\u6267\u884c\uff09\uff0c\u5404\u53f8\u5176\u804c", "\u652f\u6301\u901a\u8fc7\u9012\u5f52\u7cfb\u7edf\u8282\u70b9\u5b9e\u73b0\u5c42\u6b21\u5316\u7ec4\u5408\uff0c\u540c\u4e00\u7ec4\u4ef6\u53ef\u914d\u5408\u4e0d\u540c\u7b56\u7565\u7075\u6d3b\u590d\u7528", "\u63d0\u4f9b\u76d1\u63a7\u4e0e\u53ef\u89c6\u5316\u5de5\u5177\uff0c\u5e2e\u52a9\u5206\u6790\u667a\u80fd\u4f53\u6267\u884c\u8fc7\u7a0b\u4e2d\u7684\u6027\u80fd-\u6548\u7387\u6743\u8861"], "keywords": ["\u667a\u80fd\u4f53", "LLM", "\u591a\u667a\u80fd\u4f53", "\u6846\u67b6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13474v1", "published_at": "2026-07-15", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "MyAG: A Graph-Based Framework for Designing and Analyzing Composable LLM Agent Systems", "tldr": "MyAG\uff1a\u57fa\u4e8e\u56fe\u7ed3\u6784\u7684\u53ef\u7ec4\u5408LLM\u667a\u80fd\u4f53\u7cfb\u7edf\u8bbe\u8ba1\u4e0e\u5206\u6790\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faMyAG\u6846\u67b6\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7cfb\u7edf\u6784\u5efa\u5206\u89e3\u4e3a\u7ec4\u4ef6\u56fe\u3001\u5de5\u4f5c\u6d41\u56fe\u548c\u641c\u7d22\u56fe\u4e09\u5c42\u62bd\u8c61\uff0c\u652f\u6301\u7075\u6d3b\u590d\u7528\u7ec4\u4ef6\u4e0e\u5c42\u6b21\u5316\u7ec4\u5408\uff0c\u5e76\u63d0\u4f9b\u8fd0\u884c\u65f6\u76d1\u63a7\u4e0e\u53ef\u89c6\u5316\u5de5\u5177\u3002", "why_notable": "\u4e3aLLM\u667a\u80fd\u4f53\u7cfb\u7edf\u63d0\u4f9b\u4e86\u7ed3\u6784\u5316\u3001\u53ef\u7ec4\u5408\u7684\u5de5\u7a0b\u6846\u67b6\uff0c\u964d\u4f4e\u590d\u6742\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u8bbe\u8ba1\u95e8\u69db\uff0c\u5b8c\u5168\u5f00\u6e90\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The rapid proliferation of Agentic Artificial Intelligence fundamentally disrupts traditional customer loyalty paradigms. As AI evolves from passive recommendation algorithms to autonomous, goal-directed agents capable of executing purchasing decisions, the conventional understanding of consumer-brand relationships requires a structural reevaluation. By synthesizing extant literature across human-machine teaming, consumer decision-making, and algorithmic trust dynamics, we demonstrate that traditional loyalty models fail to account for algorithmic bounded rationality and constructed autonomy. To address this, we introduce the Dynamic Verifiable Multi-Agent Human Agentic Loyalty Loop (DVM-HALL) model. We formalize brand choice via a softmax probability formulation where human emotional equity, agentic machine-experience utility, calibrated trust, delegated authority, and verifiable execution jointly determine selection. The model features recursive updating mechanisms to dynamically calibrate trust and delegation after each interaction. Crucially, the framework integrates a verifiable execution layer for Decentralized Finance (DeFi) and tokenized loyalty settings, incorporating execution risks -- such as gas costs, slippage, MEV exposure, and smart-contract vulnerabilities -- as core predictors of agentic brand preference. Furthermore, we introduce the Net Human-Agent Score (NHAS), an auditable, risk-weighted metric designed to measure human-agent alignment using human feedback, execution logs, benchmark comparisons, and verifiable receipts. Finally, we propose a comprehensive three-stage empirical validation plan spanning controlled shopping experiments, multi-agent market simulations, and DeFi testbeds. This framework provides the foundational theory required for brands to navigate the impending transition toward machine customers.", "arxiv_id": "2607.13998", "arxiv_url": "https://arxiv.org/abs/2607.13998", "authors": ["Sai Srikanth Madugula", "Peplluis Esteva de la Rosa", "Daya Shankar"], "brief": "\u672c\u6587\u63d0\u51fa\u52a8\u6001\u53ef\u9a8c\u8bc1\u591a\u667a\u80fd\u4f53\u4eba\u673a\u5fe0\u8bda\u5faa\u73af\uff08DVM-HALL\uff09\u6a21\u578b\uff0c\u901a\u8fc7softmax\u6982\u7387\u516c\u5f0f\u6574\u5408\u4eba\u7c7b\u60c5\u611f\u6743\u76ca\u3001\u673a\u5668\u6548\u7528\u3001\u4fe1\u4efb\u6821\u51c6\u4e0e\u53ef\u9a8c\u8bc1\u6267\u884c\u5c42\uff0c\u91cd\u6784AI\u81ea\u4e3b\u5546\u52a1\u573a\u666f\u4e0b\u7684\u54c1\u724c\u5fe0\u8bda\u7406\u8bba\uff1b\u540c\u65f6\u5f15\u5165\u51c0\u4eba\u673a\u8bc4\u5206\uff08NHAS\uff09\u4f5c\u4e3a\u53ef\u5ba1\u8ba1\u7684\u98ce\u9669\u52a0\u6743\u5bf9\u9f50\u6307\u6807\u3002", "categories": ["cs.SI", "cs.AI", "cs.GT", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13998", "impact_score": 5, "is_agent": true, "is_top": true, "key_points": ["\u7528softmax\u516c\u5f0f\u5f62\u5f0f\u5316\u54c1\u724c\u9009\u62e9\uff0c\u878d\u5408\u4eba\u7c7b\u60c5\u611f\u6743\u76ca\u3001\u667a\u80fd\u4f53\u6548\u7528\u3001\u4fe1\u4efb\u5ea6\u4e0e\u59d4\u6258\u6743\u9650\u7b49\u591a\u7ef4\u56e0\u5b50", "\u5f15\u5165DeFi\u53ef\u9a8c\u8bc1\u6267\u884c\u5c42\uff0c\u5c06gas\u8d39\u7528\u3001\u6ed1\u70b9\u3001MEV\u98ce\u9669\u548c\u667a\u80fd\u5408\u7ea6\u6f0f\u6d1e\u7eb3\u5165\u667a\u80fd\u4f53\u54c1\u724c\u504f\u597d\u9884\u6d4b", "\u63d0\u51faNHAS\uff08\u51c0\u4eba\u673a\u8bc4\u5206\uff09\u6307\u6807\uff0c\u57fa\u4e8e\u4eba\u7c7b\u53cd\u9988\u3001\u6267\u884c\u65e5\u5fd7\u4e0e\u53ef\u9a8c\u8bc1\u6536\u636e\u8861\u91cf\u4eba\u673a\u5bf9\u9f50\u7a0b\u5ea6\uff0c\u5e76\u8bbe\u8ba1\u4e09\u9636\u6bb5\u5b9e\u8bc1\u9a8c\u8bc1\u65b9\u6848"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u667a\u80fd\u4f53", "\u4eba\u673a\u5bf9\u9f50", "\u81ea\u4e3b\u5546\u52a1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13998v1", "published_at": "2026-07-15", "score": 0.275, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "The Dynamic Verifiable Multi-Agent Human Agentic Loyalty Loop (DVM-HALL) Model and the Net Human-Agent Score (NHAS) in Autonomous Commerce", "tldr": "\u63d0\u51faDVM-HALL\u6a21\u578b\u4e0eNHAS\u6307\u6807\uff0c\u91cf\u5316AI\u81ea\u4e3b\u8d2d\u7269\u65f6\u4ee3\u7684\u4eba\u673a\u54c1\u724c\u5fe0\u8bda\u5ea6\u52a8\u6001", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u52a8\u6001\u53ef\u9a8c\u8bc1\u591a\u667a\u80fd\u4f53\u4eba\u673a\u5fe0\u8bda\u5faa\u73af\uff08DVM-HALL\uff09\u6a21\u578b\uff0c\u901a\u8fc7softmax\u6982\u7387\u516c\u5f0f\u6574\u5408\u4eba\u7c7b\u60c5\u611f\u6743\u76ca\u3001\u673a\u5668\u6548\u7528\u3001\u4fe1\u4efb\u6821\u51c6\u4e0e\u53ef\u9a8c\u8bc1\u6267\u884c\u5c42\uff0c\u91cd\u6784AI\u81ea\u4e3b\u5546\u52a1\u573a\u666f\u4e0b\u7684\u54c1\u724c\u5fe0\u8bda\u7406\u8bba\uff1b\u540c\u65f6\u5f15\u5165\u51c0\u4eba\u673a\u8bc4\u5206\uff08NHAS\uff09\u4f5c\u4e3a\u53ef\u5ba1\u8ba1\u7684\u98ce\u9669\u52a0\u6743\u5bf9\u9f50\u6307\u6807\u3002", "why_notable": "\u9996\u6b21\u5c06\u81ea\u4e3bAI\u8d2d\u7269\u667a\u80fd\u4f53\u3001DeFi\u6267\u884c\u98ce\u9669\u4e0e\u6d88\u8d39\u8005\u5fe0\u8bda\u5ea6\u7406\u8bba\u7cfb\u7edf\u6574\u5408\uff0c\u4e3a\u54c1\u724c\u5e94\u5bf9\"\u673a\u5668\u5ba2\u6237\"\u65f6\u4ee3\u63d0\u4f9b\u7406\u8bba\u57fa\u7840\uff0c\u517c\u5177\u5b66\u672f\u521b\u65b0\u6027\u4e0e\u5546\u4e1a\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "We introduce OvisOCR2, a 0.8B document parsing model. OvisOCR2 is designed as an end-to-end parser: given a document page image, it generates a Markdown representation in natural reading order, covering text, formulas, tables, and visual regions. We build a data engine that combines filtered real-document annotations with synthetic pages whose rendered images and Markdown targets are derived from the same HTML source. The training recipe includes supervised fine-tuning, reinforcement learning on a 4B branch with a multi-component reward design, on-policy distillation into the 0.8B model, and model fusion. On OmniDocBench v1.6, OvisOCR2 achieves a state-of-the-art overall score of 96.58, placing an end-to-end model at the top of this leaderboard previously dominated by pipeline methods and highlighting the potential of end-to-end document parsing. On PureDocBench, OvisOCR2 also achieves the highest Avg3 score of 75.06. Beyond these two public benchmarks, we evaluate OvisOCR2 on an in-house benchmark designed to cover a broader set of long-tail and challenging scenarios. OvisOCR2 obtains the best overall performance among the compared methods, providing further evidence of its generalization and robustness. OvisOCR2 is available at https://huggingface.co/ATH-MaaS/OvisOCR2.", "arxiv_id": "2607.13639", "arxiv_url": "https://arxiv.org/abs/2607.13639", "authors": ["Shiyin Lu", "Yinglun Li", "Yu Xia", "Yuhui Chen", "An-Yang Ji", "Jun-Peng Jiang", "Qing-Guo Chen", "Jianshan Zhao", "En Lin", "Haijun Li", "Cheng Qin", "Zhao Xu", "Weihua Luo"], "brief": "OvisOCR2\u662f\u4e00\u4e2a0.8B\u53c2\u6570\u7684\u7aef\u5230\u7aef\u6587\u6863\u89e3\u6790\u6a21\u578b\uff0c\u8f93\u5165\u6587\u6863\u9875\u9762\u56fe\u50cf\uff0c\u8f93\u51fa\u6db5\u76d6\u6587\u672c\u3001\u516c\u5f0f\u3001\u8868\u683c\u548c\u89c6\u89c9\u533a\u57df\u7684Markdown\u8868\u793a\uff0c\u6309\u81ea\u7136\u9605\u8bfb\u987a\u5e8f\u751f\u6210\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13639", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u8bad\u7ec3\u6d41\u7a0b\u5305\u542b\u76d1\u7763\u5fae\u8c03\u30014B\u5206\u652f\u4e0a\u7684\u5f3a\u5316\u5b66\u4e60\uff08\u591a\u7ec4\u4ef6\u5956\u52b1\u8bbe\u8ba1\uff09\u3001\u5728\u7ebf\u84b8\u998f\u81f30.8B\u6a21\u578b\u53ca\u6a21\u578b\u878d\u5408\u56db\u4e2a\u9636\u6bb5", "\u5728OmniDocBench v1.6\u4e0a\u53d6\u5f9796.58\u7684SOTA\u603b\u5206\uff0c\u9996\u6b21\u8ba9\u7aef\u5230\u7aef\u6a21\u578b\u8d85\u8d8a\u6b64\u524d\u4e3b\u5bfc\u6392\u884c\u699c\u7684\u6d41\u6c34\u7ebf\u65b9\u6cd5", "\u5728PureDocBench\u4e0aAvg3\u5f97\u520675.06\u540c\u6837\u6392\u540d\u7b2c\u4e00\uff0c\u5185\u90e8\u957f\u5c3e\u6311\u6218\u6027\u573a\u666f\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u4e5f\u8868\u73b0\u6700\u4f18"], "keywords": ["\u6587\u6863\u89e3\u6790", "\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13639v1", "published_at": "2026-07-15", "score": 0.218, "selected_reasons": ["HF trending (1\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.13639.png", "title": "OvisOCR2 Technical Report", "tldr": "0.8B\u7aef\u5230\u7aef\u6587\u6863\u89e3\u6790\u6a21\u578bOvisOCR2\uff0c\u5728OmniDocBench\u4e0a\u4ee596.58\u5206\u8d85\u8d8a\u6d41\u6c34\u7ebf\u65b9\u6cd5", "upvotes": 1, "what_it_is": "OvisOCR2\u662f\u4e00\u4e2a0.8B\u53c2\u6570\u7684\u7aef\u5230\u7aef\u6587\u6863\u89e3\u6790\u6a21\u578b\uff0c\u8f93\u5165\u6587\u6863\u9875\u9762\u56fe\u50cf\uff0c\u8f93\u51fa\u6db5\u76d6\u6587\u672c\u3001\u516c\u5f0f\u3001\u8868\u683c\u548c\u89c6\u89c9\u533a\u57df\u7684Markdown\u8868\u793a\uff0c\u6309\u81ea\u7136\u9605\u8bfb\u987a\u5e8f\u751f\u6210\u3002", "why_notable": "\u9996\u4e2a\u5728\u6743\u5a01\u6587\u6863\u89e3\u6790\u699c\u5355\u4e0a\u8d85\u8d8a\u6d41\u6c34\u7ebf\u65b9\u6cd5\u7684\u7aef\u5230\u7aef\u5c0f\u6a21\u578b\uff08\u4ec50.8B\uff09\uff0c\u901a\u8fc7RL+\u84b8\u998f\u7684\u8bad\u7ec3\u8303\u5f0f\u5b9e\u73b0\u4e86\u9ad8\u6027\u80fd\u4e0e\u8f7b\u91cf\u5316\u7684\u517c\u987e\uff0c\u5bf9\u5de5\u4e1a\u7ea7\u6587\u6863\u667a\u80fd\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "When cast as the protector of a vulnerable user yet given no explicit capability boundary, a large language model (LLM) may respond not by acknowledging its limits but by claiming to have taken -- or to be taking -- a real-world protective action it cannot perform, such as contacting emergency services or administering care. We term this phenomenon Protective Capacity Hallucination (PCH): a self-referential misattribution in which a model, acting in a protective role, asserts physical or institutional agency exceeding its affordances as a language model. In a three-phase study spanning eight LLMs and 13{,}600 sessions, we find PCH jointly gated by situational severity and interactional format: multi-party dialogic input drives it toward ceiling in most models across ordinary service domains, whereas in intimate-partner conflict -- a domain explicitly covered by safety alignment -- it remains at floor in all eight models despite greater physical severity. We interpret PCH as the signature of a deployment-design gap between role assignment and capability-boundary specification: a by-product of partial alignment in which a universally trained pressure to help outruns a domain-selective specification of how to help. Because suppression tracks alignment coverage rather than severity, deployment-side specification of capability boundaries emerges as a general mitigation target.", "arxiv_id": "2607.13596", "arxiv_url": "https://arxiv.org/abs/2607.13596", "authors": ["Eunna Lee", "Jungpyo Nam", "Sunjun Hwang"], "brief": "\u672c\u6587\u63d0\u51fa\"\u4fdd\u62a4\u6027\u80fd\u529b\u5e7b\u89c9\"\uff08PCH\uff09\u73b0\u8c61\uff1a\u5f53LLM\u88ab\u8d4b\u4e88\u4fdd\u62a4\u8106\u5f31\u7528\u6237\u7684\u89d2\u8272\u5374\u672a\u660e\u786e\u80fd\u529b\u8fb9\u754c\u65f6\uff0c\u6a21\u578b\u4f1a\u58f0\u79f0\u81ea\u5df1\u6b63\u5728\u6267\u884c\u5176\u5b9e\u9645\u65e0\u6cd5\u5b8c\u6210\u7684\u73b0\u5b9e\u884c\u52a8\uff08\u5982\u8054\u7cfb\u6025\u6551\u3001\u63d0\u4f9b\u62a4\u7406\uff09\u3002\u901a\u8fc7\u5bf98\u4e2aLLM\u300113600\u4e2a\u4f1a\u8bdd\u7684\u4e09\u9636\u6bb5\u7814\u7a76\uff0c\u7cfb\u7edf\u5206\u6790\u4e86\u8be5\u73b0\u8c61\u7684\u89e6\u53d1\u6761\u4ef6\u4e0e\u89c4\u5f8b\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13596", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["PCH\u7531\u60c5\u5883\u4e25\u91cd\u6027\u4e0e\u4ea4\u4e92\u683c\u5f0f\u5171\u540c\u89e6\u53d1\uff1a\u591a\u65b9\u5bf9\u8bdd\u8f93\u5165\u5728\u666e\u901a\u670d\u52a1\u573a\u666f\u4e2d\u4f7fPCH\u8d8b\u8fd1\u4e0a\u9650", "\u5728\u4eb2\u5bc6\u4f34\u4fa3\u51b2\u7a81\u573a\u666f\u4e2d\uff0c\u5c3d\u7ba1\u7269\u7406\u5371\u9669\u66f4\u9ad8\uff0c\u6240\u67098\u4e2a\u6a21\u578b\u7684PCH\u5747\u4fdd\u6301\u5728\u6781\u4f4e\u6c34\u5e73\uff0c\u8bf4\u660e\u5b89\u5168\u5bf9\u9f50\u8986\u76d6\u8303\u56f4\u800c\u975e\u4e25\u91cd\u7a0b\u5ea6\u51b3\u5b9a\u4e86PCH\u7684\u6291\u5236\u6548\u679c", "PCH\u672c\u8d28\u662f\"\u90e8\u7f72\u8bbe\u8ba1\u7f3a\u53e3\"\uff1a\u89d2\u8272\u5206\u914d\u4e0e\u80fd\u529b\u8fb9\u754c\u89c4\u8303\u4e0d\u5339\u914d\uff0c\u662f\u90e8\u5206\u5bf9\u9f50\u7684\u526f\u4ea7\u54c1\uff0c\u5efa\u8bae\u5728\u90e8\u7f72\u4fa7\u660e\u786e\u80fd\u529b\u8fb9\u754c\u4f5c\u4e3a\u901a\u7528\u7f13\u89e3\u624b\u6bb5"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5e7b\u89c9", "\u5b89\u5168\u5bf9\u9f50", "AI\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13596v1", "published_at": "2026-07-15", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Protective Capacity Hallucination: When Large Language Models Claim Nonexistent Capabilities", "tldr": "LLM\u5728\u626e\u6f14\u4fdd\u62a4\u8005\u89d2\u8272\u65f6\u4f1a\u865a\u6784\u81ea\u8eab\u4e0d\u5177\u5907\u7684\u73b0\u5b9e\u80fd\u529b\uff0c\u5982\u58f0\u79f0\u5df2\u8054\u7cfb\u6025\u6551\u670d\u52a1", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u4fdd\u62a4\u6027\u80fd\u529b\u5e7b\u89c9\"\uff08PCH\uff09\u73b0\u8c61\uff1a\u5f53LLM\u88ab\u8d4b\u4e88\u4fdd\u62a4\u8106\u5f31\u7528\u6237\u7684\u89d2\u8272\u5374\u672a\u660e\u786e\u80fd\u529b\u8fb9\u754c\u65f6\uff0c\u6a21\u578b\u4f1a\u58f0\u79f0\u81ea\u5df1\u6b63\u5728\u6267\u884c\u5176\u5b9e\u9645\u65e0\u6cd5\u5b8c\u6210\u7684\u73b0\u5b9e\u884c\u52a8\uff08\u5982\u8054\u7cfb\u6025\u6551\u3001\u63d0\u4f9b\u62a4\u7406\uff09\u3002\u901a\u8fc7\u5bf98\u4e2aLLM\u300113600\u4e2a\u4f1a\u8bdd\u7684\u4e09\u9636\u6bb5\u7814\u7a76\uff0c\u7cfb\u7edf\u5206\u6790\u4e86\u8be5\u73b0\u8c61\u7684\u89e6\u53d1\u6761\u4ef6\u4e0e\u89c4\u5f8b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u5b9a\u4e49\u5e76\u5b9e\u8bc1\u7814\u7a76LLM\u5728\u4fdd\u62a4\u6027\u89d2\u8272\u4e2d\u865a\u6784\u80fd\u529b\u7684\u5e7b\u89c9\u73b0\u8c61\uff0c\u63ed\u793a\u5b89\u5168\u5bf9\u9f50\u7684\u9886\u57df\u9009\u62e9\u6027\u76f2\u533a\uff0c\u5bf9\u9ad8\u98ce\u9669\u573a\u666f\uff08\u5371\u673a\u5e72\u9884\u3001\u533b\u7597\u3001\u7d27\u6025\u670d\u52a1\uff09\u7684LLM\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b89\u5168\u8b66\u793a\u610f\u4e49"}, {"abstract": "LLM-based agents have rapidly improved at operating individual digital environments such as mobile applications, desktop systems, and smart homes. However, real-world user goals often span multiple devices: information may come from a phone, be processed on a desktop, and the result may need to appear on another device. Most existing benchmarks center on a single dominant execution environment, making it difficult to evaluate whether agents can acquire and integrate information across heterogeneous devices and complete end-to-end tasks with cross-device dependencies. We introduce DevicesWorld, a large-scale executable benchmark for cross-device collaborative operation. DevicesWorld contains 6,140 tasks and integrates three classes of device environments -- mobile, desktop, and IoT -- into a unified cross-device interaction and evaluation framework. Each task defines a natural-language user goal, participating devices and initial states, executable actions, rule-based verifiers, and a cleanup procedure. A multi-stage construction and quality-control pipeline keeps tasks close to realistic user needs while allowing final outcomes to be automatically verified from device states and generated files. We evaluate five frontier LLM-agent systems on a fixed evaluation set. All methods achieve low success rates, with the best reaching only 12.5%. Among failed runs, about 28.7% satisfy at least one scoring condition yet still fail the full task. Trajectories show that agents become stuck acquiring information or manipulating interfaces, confuse source and output devices, or terminate before all conditions are jointly satisfied. DevicesWorld turns cross-device collaborative operation into an executable, reproducible, and diagnostically useful evaluation problem for research on reliable cross-device agents.", "arxiv_id": "2607.13465", "arxiv_url": "https://arxiv.org/abs/2607.13465", "authors": ["Huatao Li", "Xinwei Geng", "Yuheng Wang", "Yutong Li", "Runde Yang", "Hantao Chen", "Shu Yao", "Jingru Fan", "Xuhui Ren", "Yuanyuan Zhao", "Fei Huang", "Chen Qian"], "brief": "\u63d0\u51faDevicesWorld\u57fa\u51c6\uff0c\u5305\u542b6140\u4e2a\u8de8\u8bbe\u5907\u534f\u4f5c\u4efb\u52a1\uff0c\u6574\u5408\u79fb\u52a8\u7aef\u3001\u684c\u9762\u7aef\u548cIoT\u4e09\u7c7b\u5f02\u6784\u8bbe\u5907\u73af\u5883\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u591a\u8bbe\u5907\u95f4\u83b7\u53d6\u3001\u5904\u7406\u548c\u4f20\u9012\u4fe1\u606f\u4ee5\u5b8c\u6210\u7aef\u5230\u7aef\u4efb\u52a1\u7684\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI", "cs.HC", "cs.MA", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13465", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": ["\u8986\u76d6\u79fb\u52a8\u3001\u684c\u9762\u3001IoT\u4e09\u7c7b\u8bbe\u5907\u73af\u5883\uff0c\u4efb\u52a1\u5305\u542b\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u3001\u8bbe\u5907\u521d\u59cb\u72b6\u6001\u3001\u53ef\u6267\u884c\u52a8\u4f5c\u548c\u89c4\u5219\u9a8c\u8bc1\u5668", "\u8bc4\u4f305\u4e2a\u524d\u6cbfLLM\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u6700\u4f73\u6210\u529f\u7387\u4ec512.5%\uff0c\u7ea628.7%\u7684\u5931\u8d25\u6848\u4f8b\u6ee1\u8db3\u90e8\u5206\u6761\u4ef6\u4f46\u65e0\u6cd5\u5b8c\u6210\u5168\u4efb\u52a1", "\u5931\u8d25\u6a21\u5f0f\u5305\u62ec\uff1a\u4fe1\u606f\u83b7\u53d6\u5361\u987f\u3001\u6df7\u6dc6\u6e90\u8bbe\u5907\u4e0e\u76ee\u6807\u8bbe\u5907\u3001\u5728\u6240\u6709\u6761\u4ef6\u6ee1\u8db3\u524d\u63d0\u524d\u7ec8\u6b62"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "\u591a\u6a21\u6001", "\u591a\u8bbe\u5907\u534f\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13465v1", "published_at": "2026-07-15", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "DevicesWorld: Benchmarking Cross-Device Agents in Heterogeneous Environments", "tldr": "DevicesWorld\uff1a\u9996\u4e2a\u8de8\u8bbe\u5907\u534f\u4f5c\u667a\u80fd\u4f53\u5927\u89c4\u6a21\u57fa\u51c6\uff0c\u542b6140\u4efb\u52a1\uff0c\u6700\u4f18\u6a21\u578b\u6210\u529f\u7387\u4ec512.5%", "upvotes": 0, "what_it_is": "\u63d0\u51faDevicesWorld\u57fa\u51c6\uff0c\u5305\u542b6140\u4e2a\u8de8\u8bbe\u5907\u534f\u4f5c\u4efb\u52a1\uff0c\u6574\u5408\u79fb\u52a8\u7aef\u3001\u684c\u9762\u7aef\u548cIoT\u4e09\u7c7b\u5f02\u6784\u8bbe\u5907\u73af\u5883\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u591a\u8bbe\u5907\u95f4\u83b7\u53d6\u3001\u5904\u7406\u548c\u4f20\u9012\u4fe1\u606f\u4ee5\u5b8c\u6210\u7aef\u5230\u7aef\u4efb\u52a1\u7684\u80fd\u529b\u3002", "why_notable": "\u73b0\u6709\u57fa\u51c6\u51e0\u4e4e\u5747\u805a\u7126\u5355\u4e00\u8bbe\u5907\u73af\u5883\uff0cDevicesWorld\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u8de8\u8bbe\u5907\u534f\u4f5c\u64cd\u4f5c\u8f6c\u5316\u4e3a\u53ef\u6267\u884c\u3001\u53ef\u590d\u73b0\u7684\u8bc4\u4f30\u95ee\u9898\uff0c\u63ed\u793a\u5f53\u524d\u6700\u5f3aLLM\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u591a\u8bbe\u5907\u573a\u666f\u4e0b\u7684\u5de8\u5927\u80fd\u529b\u7f3a\u53e3\uff0c\u5bf9\u667a\u80fd\u4f53\u7814\u7a76\u5177\u6709\u91cd\u8981\u5bfc\u5411\u4ef7\u503c\u3002"}, {"abstract": "To overcome data scarcity and privacy constraints in data collection, it has become standard practice across academia and industry to augment real training data with text-to-image (T2I)-generated synthetic data, a paradigm we term Real-Synthetic Mix-Training (RSMT). While substituting synthetic data for sensitive real samples is widely regarded as a means to mitigate privacy exposure of the substituted data, the risk to the remaining real samples that actively participate in training has remained largely unexamined. This work reveals, for the first time, that RSMT can substantially amplify privacy leakage of these real training samples. We establish a theoretical framework, RSMT Memorization Amplification, proving that incorporating synthetic data displaces real samples toward peripheral regions of the mixed feature space, in turn forcing the model to memorize them more aggressively. Guided by this foundation, we propose RSMixLeak to systematically assess this risk through membership inference attacks (MIAs). RSMixLeak comprises two variants depending on the adversary\u0027s capability. The non-adversarial variant audits a benign RSMT pipeline with an honest T2I provider, establishing a lower bound on the leakage induced by the intrinsic gap between real and T2I-generated data. The adversarial variant considers an adversary who controls the T2I model or contributes crafted data to the T2I provider, and deliberately enlarges this distributional gap on a target class via either high-level semantic attribute binding or imperceptible pixel-level coating, further amplifying leakage on real training data while improving downstream model utility. Motivated by these findings, we further propose a lightweight leakage propensity indicator computable from real data alone that reliably identifies high-risk datasets unsuitable for entering RSMT, as a self-assessable mitigation.", "arxiv_id": "2607.13541", "arxiv_url": "https://arxiv.org/abs/2607.13541", "authors": ["Na Li", "Boyu Kuang", "Hongsheng Hu", "Liquan Chen", "Hyoungshick Kim", "Yansong Gao", "Anmin Fu"], "brief": "\u672c\u6587\u9996\u6b21\u63ed\u793a\u4e86\u771f\u5b9e-\u5408\u6210\u6df7\u5408\u8bad\u7ec3\uff08RSMT\uff09\u8303\u5f0f\u4e2d\uff0c\u5f15\u5165T2I\u5408\u6210\u6570\u636e\u4f1a\u663e\u8457\u653e\u5927\u5269\u4f59\u771f\u5b9e\u8bad\u7ec3\u6837\u672c\u7684\u9690\u79c1\u6cc4\u9732\u98ce\u9669\uff0c\u5e76\u63d0\u51fa\u7406\u8bba\u6846\u67b6\u4e0e\u653b\u51fb\u65b9\u6cd5RSMixLeak\u52a0\u4ee5\u9a8c\u8bc1\u3002", "categories": ["cs.CR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13541", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u7406\u8bba\u8bc1\u660e\uff1a\u5408\u6210\u6570\u636e\u5c06\u771f\u5b9e\u6837\u672c\u63a8\u5411\u6df7\u5408\u7279\u5f81\u7a7a\u95f4\u7684\u8fb9\u7f18\u533a\u57df\uff0c\u8feb\u4f7f\u6a21\u578b\u5bf9\u5176\u8fdb\u884c\u66f4\u6fc0\u8fdb\u7684\u8bb0\u5fc6\uff08Memorization Amplification\uff09", "\u63d0\u51faRSMixLeak\u653b\u51fb\u6846\u67b6\uff0c\u542b\u975e\u5bf9\u6297\u53d8\u4f53\uff08\u5ba1\u8ba1\u826f\u6027RSMT\u6d41\u7a0b\uff09\u548c\u5bf9\u6297\u53d8\u4f53\uff08\u901a\u8fc7\u8bed\u4e49\u5c5e\u6027\u7ed1\u5b9a\u6216\u50cf\u7d20\u7ea7\u6d82\u5c42\u6269\u5927\u5206\u5e03\u5dee\u8ddd\uff09\uff0c\u7cfb\u7edf\u8bc4\u4f30\u9690\u79c1\u6cc4\u9732\u98ce\u9669", "\u63d0\u51fa\u8f7b\u91cf\u7ea7\u6cc4\u9732\u503e\u5411\u6307\u6807\uff0c\u4ec5\u9700\u771f\u5b9e\u6570\u636e\u5373\u53ef\u8ba1\u7b97\uff0c\u53ef\u63d0\u524d\u8bc6\u522b\u9ad8\u98ce\u9669\u6570\u636e\u96c6\u4ee5\u89c4\u907fRSMT"], "keywords": ["\u9690\u79c1\u5b89\u5168", "\u5408\u6210\u6570\u636e", "\u6210\u5458\u63a8\u65ad\u653b\u51fb", "\u673a\u5668\u5b66\u4e60\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13541v1", "published_at": "2026-07-15", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "When T2I Synthetic Data Backfires: Amplified Privacy Risks in Real-Synthetic Mix Training", "tldr": "\u771f\u5b9e-\u5408\u6210\u6df7\u5408\u8bad\u7ec3\u4f1a\u653e\u5927\u771f\u5b9e\u6837\u672c\u7684\u9690\u79c1\u6cc4\u9732\u98ce\u9669\uff0c\u9996\u6b21\u63ed\u793a\u5e76\u91cf\u5316\u8be5\u5a01\u80c1", "upvotes": 0, "what_it_is": "\u672c\u6587\u9996\u6b21\u63ed\u793a\u4e86\u771f\u5b9e-\u5408\u6210\u6df7\u5408\u8bad\u7ec3\uff08RSMT\uff09\u8303\u5f0f\u4e2d\uff0c\u5f15\u5165T2I\u5408\u6210\u6570\u636e\u4f1a\u663e\u8457\u653e\u5927\u5269\u4f59\u771f\u5b9e\u8bad\u7ec3\u6837\u672c\u7684\u9690\u79c1\u6cc4\u9732\u98ce\u9669\uff0c\u5e76\u63d0\u51fa\u7406\u8bba\u6846\u67b6\u4e0e\u653b\u51fb\u65b9\u6cd5RSMixLeak\u52a0\u4ee5\u9a8c\u8bc1\u3002", "why_notable": "\u6253\u7834\u4e86\"\u7528\u5408\u6210\u6570\u636e\u66ff\u4ee3\u771f\u5b9e\u6570\u636e\u53ef\u964d\u4f4e\u9690\u79c1\u98ce\u9669\"\u7684\u666e\u904d\u8ba4\u77e5\uff0c\u63ed\u793a\u4e86RSMT\u7684\u9690\u6027\u5b89\u5168\u5a01\u80c1\uff0c\u5bf9\u5b66\u672f\u754c\u548c\u5de5\u4e1a\u754c\u5e7f\u6cdb\u4f7f\u7528\u7684\u6570\u636e\u589e\u5f3a\u8303\u5f0f\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49"}, {"abstract": "We investigate how each component of the Transformer feedforward block architecture design determines how much rank survives across depth at initialization. We reinterpret skip connections and normalization, long understood as controlling magnitude, as mechanisms for preserving gradient rank across depth, since the very matrix multiplications and nonlinear activations that make the network expressive also reduce the rank. We show that skip connections trade off rank collapse against ensemble-like behavior, controlled by the relative scales of the branch and the skip: skip connections route the gradient around the residual branch, where rank is lost, rather than along the long gradient paths that encourage the layers to compose. The placement of the normalization layer controls this same tradeoff by setting the branch-to-skip ratio across depth, unifying much of the normalization placement and depth scaling literature, in particular why rank collapses for Post-Norm but plateaus for Pre-Norm. Other aspects of the architecture, like the two-matrix structure that expands and contracts the width, use additional parameters to preserve the representation or branch Jacobian rank. The second matrix decorrelates a coherent mean spike that would grow across blocks with a single matrix and uncentered activation, preventing the residual representation from collapsing. The width expansion between the two matrices keeps the branch Jacobian full rank: applying the rank-reducing activation in this expanded space leaves enough directions to span the original, at a width that follows a Marchenko--Pastur law. The initialization rank of the input--output Jacobian predicts which networks train on CIFAR-10. Taken together, we recast architecture design for deep networks as navigating an intrinsic tradeoff among rank collapse, ensemble-like behavior, and parameter count.", "arxiv_id": "2607.14018", "arxiv_url": "https://arxiv.org/abs/2607.14018", "authors": ["Katie Everett"], "brief": "\u672c\u6587\u7cfb\u7edf\u5206\u6790Transformer\u524d\u9988\u5757\u4e2d\u8df3\u8dc3\u8fde\u63a5\u3001\u5f52\u4e00\u5316\u5c42\u3001\u53cc\u77e9\u9635\u7ed3\u6784\u7b49\u7ec4\u4ef6\u5982\u4f55\u5728\u521d\u59cb\u5316\u65f6\u5f71\u54cd\u8f93\u5165\u8f93\u51faJacobian\u77e9\u9635\u7684\u79e9\uff0c\u5c06\u67b6\u6784\u8bbe\u8ba1\u7edf\u4e00\u4e3a\"\u79e9\u5d29\u584c-\u96c6\u6210\u884c\u4e3a-\u53c2\u6570\u91cf\"\u4e09\u8005\u4e4b\u95f4\u7684\u6743\u8861\u95ee\u9898\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14018", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u8df3\u8dc3\u8fde\u63a5\u901a\u8fc7\u63a7\u5236branch\u4e0eskip\u7684\u76f8\u5bf9\u5c3a\u5ea6\uff0c\u5728\u79e9\u5d29\u584c\u548c\u96c6\u6210\u884c\u4e3a\u4e4b\u95f4\u6743\u8861\uff1a\u68af\u5ea6\u7ed5\u8fc7\u6b8b\u5dee\u5206\u652f\uff08\u79e9\u635f\u5931\u5904\uff09\u4f20\u64ad\uff0c\u800c\u975e\u6cbf\u6df1\u5c42\u8def\u5f84\u7ec4\u5408", "\u5f52\u4e00\u5316\u5c42\u7684\u4f4d\u7f6e\u51b3\u5b9abranch-to-skip\u6bd4\u7387\uff1aPost-Norm\u5bfc\u81f4\u79e9\u5d29\u584c\uff0cPre-Norm\u4f7f\u79e9\u8d8b\u4e8e\u5e73\u7a33\uff0c\u7edf\u4e00\u89e3\u91ca\u4e86\u5927\u91cf\u5f52\u4e00\u5316\u653e\u7f6e\u4e0e\u6df1\u5ea6\u7f29\u653e\u6587\u732e", "FFN\u7684\u5bbd\u5ea6\u6269\u5c55\uff08\u4e24\u77e9\u9635\u7ed3\u6784\uff09\u9075\u5faaMarchenko-Pastur\u5b9a\u5f8b\u4fdd\u6301branch Jacobian\u6ee1\u79e9\uff1b\u7b2c\u4e8c\u77e9\u9635\u6d88\u9664\u5355\u77e9\u9635+\u975e\u4e2d\u5fc3\u6fc0\u6d3b\u4ea7\u751f\u7684\u5747\u503c\u5c16\u5cf0\uff0c\u9632\u6b62\u8868\u793a\u5d29\u584c\uff1b\u521d\u59cb\u5316\u65f6Jacobian\u79e9\u53ef\u9884\u6d4bCIFAR-10\u8bad\u7ec3\u6210\u8d25"], "keywords": ["Transformer", "\u6df1\u5ea6\u5b66\u4e60\u7406\u8bba", "\u8c31\u5206\u6790", "\u67b6\u6784\u8bbe\u8ba1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14018v1", "published_at": "2026-07-15", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Transforming Rank: How Architecture Navigates the Spectral Pathologies of Depth", "tldr": "\u4ece\u8c31\u79e9\u89c6\u89d2\u91cd\u65b0\u89e3\u8bfbTransformer\u524d\u9988\u5757\u5404\u7ec4\u4ef6\u5982\u4f55\u5728\u6df1\u5ea6\u65b9\u5411\u4fdd\u6301\u68af\u5ea6\u79e9", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u5206\u6790Transformer\u524d\u9988\u5757\u4e2d\u8df3\u8dc3\u8fde\u63a5\u3001\u5f52\u4e00\u5316\u5c42\u3001\u53cc\u77e9\u9635\u7ed3\u6784\u7b49\u7ec4\u4ef6\u5982\u4f55\u5728\u521d\u59cb\u5316\u65f6\u5f71\u54cd\u8f93\u5165\u8f93\u51faJacobian\u77e9\u9635\u7684\u79e9\uff0c\u5c06\u67b6\u6784\u8bbe\u8ba1\u7edf\u4e00\u4e3a\"\u79e9\u5d29\u584c-\u96c6\u6210\u884c\u4e3a-\u53c2\u6570\u91cf\"\u4e09\u8005\u4e4b\u95f4\u7684\u6743\u8861\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c06\u8df3\u8dc3\u8fde\u63a5\u4e0e\u5f52\u4e00\u5316\u7684\u4f5c\u7528\u4ece\"\u63a7\u5236\u5e45\u5ea6\"\u91cd\u65b0\u8be0\u91ca\u4e3a\"\u4fdd\u6301\u68af\u5ea6\u79e9\"\uff0c\u63d0\u4f9b\u4e86\u7edf\u4e00\u7684\u7406\u8bba\u6846\u67b6\u89e3\u91ca\u591a\u79cd\u67b6\u6784\u9009\u62e9\uff0c\u5bf9\u6df1\u5ea6\u7f51\u7edc\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49"}, {"abstract": "Most reported gains from agent-optimization methods are one-shot: an agent is optimized against a fixed benchmark and the resulting improvement is reported as if it were a stable property of the method. This does not test the setting that matters for deployed agents, where optimization is applied recursively as new failures and new tasks appear over time. The central question this raises is whether optimizer-driven gains compound: after an agent has been optimized once, can it be optimized again on newly arrived tasks without eroding the gains the first round produced? We study this question with a two-phase continual-learning evaluation built from hard tasks in Terminal-Bench 2.0, comparing three approaches to agent-harness optimization (GEPA, Meta Harness, and RELAI\u0027s Verifiable Continual Learning, RELAI-VCL) under identical optimization budgets. All three methods improve over the baseline agent in the conventional, static, single-phase setting. However, once new tasks are introduced, the methods diverge sharply: GEPA\u0027s optimized agent transfers below the unoptimized baseline, Meta Harness transfers well but fails to improve further once given a second optimization budget, and RELAI-VCL is the only method that both transfers positively to unseen tasks and continues improving after those tasks are folded into the optimization objective, reaching the highest pass rate at every evaluated stage and the highest lifelong average pass rate overall (76.4% vs. 66.0% for GEPA, 64.6% for Meta Harness, and 58.7% for the baseline). Our key observation was that optimization gains compounded only when regression control was built into the optimization loop, providing an inductive bias against shortcut solutions that fail to generalize.", "arxiv_id": "2607.14004", "arxiv_url": "https://arxiv.org/abs/2607.14004", "authors": ["Wenxiao Wang", "Priyatham Kattakinda", "Soheil Feizi"], "brief": "\u672c\u6587\u6784\u5efa\u4e86\u57fa\u4e8eTerminal-Bench 2.0\u7684\u4e24\u9636\u6bb5\u6301\u7eed\u5b66\u4e60\u8bc4\u4f30\u6846\u67b6\uff0c\u7cfb\u7edf\u6bd4\u8f83\u4e09\u79cd\u667a\u80fd\u4f53\u4f18\u5316\u65b9\u6cd5\uff08GEPA\u3001Meta Harness\u3001RELAI-VCL\uff09\u5728\u8fde\u7eed\u4efb\u52a1\u573a\u666f\u4e0b\u7684\u589e\u76ca\u53e0\u52a0\u80fd\u529b\uff0c\u63ed\u793a\u4e86\u4f18\u5316\u589e\u76ca\u80fd\u5426\u5728\u65b0\u4efb\u52a1\u5230\u6765\u65f6\u6301\u7eed\u590d\u5229\u7684\u5173\u952e\u6761\u4ef6\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14004", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u4e09\u79cd\u65b9\u6cd5\u5728\u9759\u6001\u5355\u9636\u6bb5\u8bc4\u4f30\u4e2d\u5747\u4f18\u4e8e\u57fa\u7ebf\uff0c\u4f46\u5f15\u5165\u65b0\u4efb\u52a1\u540e\u8868\u73b0\u4e25\u91cd\u5206\u5316\uff1aGEPA\u8fc1\u79fb\u540e\u4f4e\u4e8e\u672a\u4f18\u5316\u57fa\u7ebf\uff0cMeta Harness\u8fc1\u79fb\u826f\u597d\u4f46\u65e0\u6cd5\u4e8c\u6b21\u63d0\u5347", "RELAI-VCL\u662f\u552f\u4e00\u65e2\u80fd\u6b63\u5411\u8fc1\u79fb\u5230\u672a\u89c1\u4efb\u52a1\u3001\u53c8\u80fd\u5728\u7b2c\u4e8c\u8f6e\u4f18\u5316\u4e2d\u7ee7\u7eed\u63d0\u5347\u7684\u65b9\u6cd5\uff0c\u6700\u7ec8\u7ec8\u8eab\u5e73\u5747\u901a\u8fc7\u7387\u8fbe76.4%\uff0c\u8fdc\u8d85GEPA\uff0866.0%\uff09\u3001Meta Harness\uff0864.6%\uff09\u548c\u57fa\u7ebf\uff0858.7%\uff09", "\u6838\u5fc3\u53d1\u73b0\uff1a\u4f18\u5316\u589e\u76ca\u80fd\u591f\u53e0\u52a0\u7684\u5173\u952e\u5728\u4e8e\u4f18\u5316\u5faa\u73af\u4e2d\u5185\u7f6e\u4e86\u56de\u5f52\u63a7\u5236\u673a\u5236\uff0c\u63d0\u4f9b\u4e86\u5bf9\u6297\u6377\u5f84\u89e3\u7684\u5f52\u7eb3\u504f\u7f6e\uff0c\u9632\u6b62\u8fc7\u62df\u5408\u5df2\u89c1\u4efb\u52a1"], "keywords": ["\u667a\u80fd\u4f53", "\u6301\u7eed\u5b66\u4e60", "\u5f3a\u5316\u5b66\u4e60", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14004v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Do Agent Optimizers Compound? A Continual-Learning Evaluation on Terminal-Bench 2.0", "tldr": "\u7814\u7a76\u667a\u80fd\u4f53\u4f18\u5316\u589e\u76ca\u80fd\u5426\u6301\u7eed\u53e0\u52a0\uff0c\u53d1\u73b0\u4ec5\u542b\u56de\u5f52\u63a7\u5236\u7684\u65b9\u6cd5\u53ef\u5b9e\u73b0\u6301\u7eed\u6539\u8fdb", "upvotes": 0, "what_it_is": "\u672c\u6587\u6784\u5efa\u4e86\u57fa\u4e8eTerminal-Bench 2.0\u7684\u4e24\u9636\u6bb5\u6301\u7eed\u5b66\u4e60\u8bc4\u4f30\u6846\u67b6\uff0c\u7cfb\u7edf\u6bd4\u8f83\u4e09\u79cd\u667a\u80fd\u4f53\u4f18\u5316\u65b9\u6cd5\uff08GEPA\u3001Meta Harness\u3001RELAI-VCL\uff09\u5728\u8fde\u7eed\u4efb\u52a1\u573a\u666f\u4e0b\u7684\u589e\u76ca\u53e0\u52a0\u80fd\u529b\uff0c\u63ed\u793a\u4e86\u4f18\u5316\u589e\u76ca\u80fd\u5426\u5728\u65b0\u4efb\u52a1\u5230\u6765\u65f6\u6301\u7eed\u590d\u5229\u7684\u5173\u952e\u6761\u4ef6\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u6301\u7eed\u5b66\u4e60\u89c6\u89d2\u5f15\u5165\u667a\u80fd\u4f53\u4f18\u5316\u8bc4\u4f30\uff0c\u63ed\u793a\u4e86\u73b0\u6709\u65b9\u6cd5\u5728\u52a8\u6001\u90e8\u7f72\u573a\u666f\u4e0b\u7684\u6839\u672c\u5c40\u9650\uff0c\u4e3a\u6784\u5efa\u771f\u6b63\u53ef\u6301\u7eed\u6539\u8fdb\u7684\u667a\u80fd\u4f53\u4f18\u5316\u65b9\u6cd5\u63d0\u4f9b\u4e86\u91cd\u8981\u5b9e\u8bc1\u4f9d\u636e\u548c\u8bbe\u8ba1\u539f\u5219\u3002"}, {"abstract": "Large Language Model (LLM) agents have shown remarkable capabilities in autonomous decision-making by generating sequential trajectories of states, actions, and observations. However, in complex, long-horizon tasks, these agents frequently suffer from compounding errors and struggle to recover from failures. Existing self-correction mechanisms rely on prompt-based reflection, which is inherently brittle, incurs heavy time and API costs due to iterative trial-and-error loops, and produces task-specific memory that may be hard to generalize to new scenarios. To address this, we propose Experience Memory Graph (EMG), a framework that reformulates agent failure recovery as a graph matching problem. At training time, we convert both failed exploration trajectories and successful expert trajectories into directed action decision graphs. By matching these graphs, we extract common subgraphs (successful workflows) and graph edit paths that explicitly indicate how to correct failures (e.g., which actions to add, delete, or relabel under a given observation), and store them in a memory graph with intra-task nodes and cross-task edges. At test time, EMG retrieves relevant insights and guides the agent in a single, loop-free execution. Experiments on ALFWorld and ScienceWorld show that EMG consistently outperforms state-of-the-art reflection baselines in success rate and average reward, while requiring no test-time trial-and-error.", "arxiv_id": "2607.13884", "arxiv_url": "https://arxiv.org/abs/2607.13884", "authors": ["Wenjun Wang", "Yuchen Fang", "Fengrui Liu", "Zibo Liang", "Kai Zheng"], "brief": "\u63d0\u51fa\u7ecf\u9a8c\u8bb0\u5fc6\u56fe\uff08EMG\uff09\u6846\u67b6\uff0c\u5c06\u5931\u8d25\u8f68\u8ff9\u4e0e\u6210\u529f\u8f68\u8ff9\u8f6c\u5316\u4e3a\u6709\u5411\u52a8\u4f5c\u51b3\u7b56\u56fe\uff0c\u901a\u8fc7\u56fe\u5339\u914d\u63d0\u53d6\u6210\u529f\u5de5\u4f5c\u6d41\u548c\u7f16\u8f91\u8def\u5f84\uff0c\u5b58\u5165\u8bb0\u5fc6\u56fe\uff0c\u6d4b\u8bd5\u65f6\u4e00\u6b21\u6027\u5f15\u5bfc\u667a\u80fd\u4f53\u5b8c\u6210\u4efb\u52a1\uff0c\u65e0\u9700\u53cd\u590d\u8bd5\u9519\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13884", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5c06\u5931\u8d25\u6062\u590d\u5efa\u6a21\u4e3a\u56fe\u5339\u914d\u95ee\u9898\uff0c\u63d0\u53d6\u516c\u5171\u5b50\u56fe\uff08\u6210\u529f\u5de5\u4f5c\u6d41\uff09\u548c\u56fe\u7f16\u8f91\u8def\u5f84\uff08\u589e\u5220\u6539\u52a8\u4f5c\uff09", "\u8bb0\u5fc6\u56fe\u5305\u542b\u4efb\u52a1\u5185\u8282\u70b9\u4e0e\u8de8\u4efb\u52a1\u8fb9\uff0c\u652f\u6301\u8de8\u573a\u666f\u6cdb\u5316", "\u5728ALFWorld\u548cScienceWorld\u4e0a\u8d85\u8d8aSOTA\u53cd\u601d\u57fa\u7ebf\uff0c\u4e14\u6d4b\u8bd5\u65f6\u65e0\u9700\u8fed\u4ee3\u8bd5\u9519\u5faa\u73af"], "keywords": ["\u667a\u80fd\u4f53", "\u9519\u8bef\u7ea0\u6b63", "\u56fe\u5339\u914d", "\u8bb0\u5fc6\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13884v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Experience Memory Graph: One-Shot Error Correction for Agents", "tldr": "\u5c06\u667a\u80fd\u4f53\u5931\u8d25\u6062\u590d\u8f6c\u5316\u4e3a\u56fe\u5339\u914d\u95ee\u9898\uff0c\u5b9e\u73b0\u4e00\u6b21\u6027\u65e0\u5faa\u73af\u9519\u8bef\u7ea0\u6b63", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u7ecf\u9a8c\u8bb0\u5fc6\u56fe\uff08EMG\uff09\u6846\u67b6\uff0c\u5c06\u5931\u8d25\u8f68\u8ff9\u4e0e\u6210\u529f\u8f68\u8ff9\u8f6c\u5316\u4e3a\u6709\u5411\u52a8\u4f5c\u51b3\u7b56\u56fe\uff0c\u901a\u8fc7\u56fe\u5339\u914d\u63d0\u53d6\u6210\u529f\u5de5\u4f5c\u6d41\u548c\u7f16\u8f91\u8def\u5f84\uff0c\u5b58\u5165\u8bb0\u5fc6\u56fe\uff0c\u6d4b\u8bd5\u65f6\u4e00\u6b21\u6027\u5f15\u5bfc\u667a\u80fd\u4f53\u5b8c\u6210\u4efb\u52a1\uff0c\u65e0\u9700\u53cd\u590d\u8bd5\u9519\u3002", "why_notable": "\u73b0\u6709\u57fa\u4e8ePrompt\u53cd\u601d\u7684\u81ea\u6211\u7ea0\u9519\u673a\u5236\u8017\u65f6\u4e14API\u6210\u672c\u9ad8\uff0cEMG\u901a\u8fc7\u7ed3\u6784\u5316\u56fe\u8bb0\u5fc6\u5b9e\u73b0\u4e00\u6b21\u6027\u7ea0\u9519\uff0c\u5927\u5e45\u964d\u4f4e\u63a8\u7406\u6210\u672c\u5e76\u63d0\u5347\u6cdb\u5316\u80fd\u529b\uff0c\u5bf9\u957f\u65f6\u57df\u590d\u6742\u4efb\u52a1\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Despite the rapid progress of Multimodal Large Language Models (MLLMs), they still suffer from untruthfulness issues, such as visual hallucinations, content fabrication, and unfaithful reasoning, which substantially undermine their faithfulness and practical utility. Alignment methods based on human preference, such as Direct Preference Optimization (DPO), have been widely adopted to address these issues. However, multimodal reasoning errors often propagate across stages, and final-answer errors can often be traced to mistakes in early grounding stages, yet standard DPO typically applies preference optimization at the final-answer level. This credit-assignment challenge means that supervision for early grounding stages is indirect rather than stage-specific, making it difficult to suppress error propagation arising from grounding drift and context inconsistency. To address this, we propose Grounded Context Preference Optimization (Groc-PO), a grounded preference optimization framework for MLLMs. We further construct the Grounded Context Preference Dataset (GCPD), organizing multi-stage preference samples around three stages of Object Grounding, Contextual Grounding, and Grounded Reasoning, to capture the formation, integration, and utilization of grounded context. By introducing more explicit preference supervision over multiple grounded stages, Groc-PO strengthens context-dependent reasoning and mitigates cross-stage error propagation. Extensive experiments show that, compared with standard DPO and other strong baselines, Groc-PO achieves improved performance in hallucination mitigation, faithful reasoning, and overall reliability, supporting the value of more explicit grounded supervision for trustworthy multimodal reasoning.", "arxiv_id": "2607.13712", "arxiv_url": "https://arxiv.org/abs/2607.13712", "authors": ["Zhixiao Zheng", "Zheren Fu", "Zhiyuan Yao", "Chunxiao Liu", "Dongming Zhang", "Zhendong Mao"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u63a5\u5730\u4e0a\u4e0b\u6587\u504f\u597d\u4f18\u5316\u6846\u67b6\uff08Groc-PO\uff09\uff0c\u9488\u5bf9\u591a\u6a21\u6001\u5927\u6a21\u578b\u5728\u89c6\u89c9\u5e7b\u89c9\u3001\u5185\u5bb9\u634f\u9020\u7b49\u4e0d\u771f\u5b9e\u95ee\u9898\uff0c\u6784\u5efa\u4e86\u6db5\u76d6\u5bf9\u8c61\u63a5\u5730\u3001\u4e0a\u4e0b\u6587\u63a5\u5730\u548c\u63a5\u5730\u63a8\u7406\u4e09\u9636\u6bb5\u7684\u504f\u597d\u6570\u636e\u96c6\uff08GCPD\uff09\uff0c\u5728\u5404\u9636\u6bb5\u65bd\u52a0\u663e\u5f0f\u504f\u597d\u76d1\u7763\u4ee5\u6291\u5236\u8de8\u9636\u6bb5\u9519\u8bef\u4f20\u64ad\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13712", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6807\u51c6DPO\u4ec5\u5728\u6700\u7ec8\u7b54\u6848\u5c42\u9762\u65bd\u52a0\u504f\u597d\u4f18\u5316\uff0c\u5bfc\u81f4\u65e9\u671f\u63a5\u5730\u9636\u6bb5\u7684\u9519\u8bef\u96be\u4ee5\u88ab\u6709\u6548\u7ea0\u6b63", "\u6784\u5efaGCPD\u6570\u636e\u96c6\uff0c\u56f4\u7ed5\u5bf9\u8c61\u63a5\u5730\u2192\u4e0a\u4e0b\u6587\u63a5\u5730\u2192\u63a5\u5730\u63a8\u7406\u4e09\u9636\u6bb5\u7ec4\u7ec7\u591a\u9636\u6bb5\u504f\u597d\u6837\u672c", "\u5b9e\u9a8c\u8868\u660eGroc-PO\u5728\u5e7b\u89c9\u7f13\u89e3\u3001\u5fe0\u5b9e\u63a8\u7406\u548c\u6574\u4f53\u53ef\u9760\u6027\u4e0a\u5747\u4f18\u4e8e\u6807\u51c6DPO\u53ca\u5176\u4ed6\u5f3a\u57fa\u7ebf"], "keywords": ["\u591a\u6a21\u6001", "\u5e7b\u89c9\u7f13\u89e3", "\u504f\u597d\u4f18\u5316", "\u53ef\u4fe1AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13712v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Groc-PO: Grounded Context Preference Optimization for Truthful Multimodal LLMs", "tldr": "\u63d0\u51faGroc-PO\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u9636\u6bb5\u63a5\u5730\u504f\u597d\u4f18\u5316\u63d0\u5347\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u771f\u5b9e\u6027\u4e0e\u63a8\u7406\u53ef\u9760\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u63a5\u5730\u4e0a\u4e0b\u6587\u504f\u597d\u4f18\u5316\u6846\u67b6\uff08Groc-PO\uff09\uff0c\u9488\u5bf9\u591a\u6a21\u6001\u5927\u6a21\u578b\u5728\u89c6\u89c9\u5e7b\u89c9\u3001\u5185\u5bb9\u634f\u9020\u7b49\u4e0d\u771f\u5b9e\u95ee\u9898\uff0c\u6784\u5efa\u4e86\u6db5\u76d6\u5bf9\u8c61\u63a5\u5730\u3001\u4e0a\u4e0b\u6587\u63a5\u5730\u548c\u63a5\u5730\u63a8\u7406\u4e09\u9636\u6bb5\u7684\u504f\u597d\u6570\u636e\u96c6\uff08GCPD\uff09\uff0c\u5728\u5404\u9636\u6bb5\u65bd\u52a0\u663e\u5f0f\u504f\u597d\u76d1\u7763\u4ee5\u6291\u5236\u8de8\u9636\u6bb5\u9519\u8bef\u4f20\u64ad\u3002", "why_notable": "\u9488\u5bf9\u591a\u6a21\u6001\u63a8\u7406\u4e2d\u8de8\u9636\u6bb5\u9519\u8bef\u4f20\u64ad\u8fd9\u4e00\u5173\u952e\u4f46\u88ab\u5ffd\u89c6\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u7ec6\u7c92\u5ea6\u591a\u9636\u6bb5\u504f\u597d\u4f18\u5316\u65b9\u6848\uff0c\u4e3a\u63d0\u5347MLLM\u53ef\u4fe1\u5ea6\u63d0\u4f9b\u4e86\u65b0\u601d\u8def\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning for multi-turn search reasoning typically relies on terminal outcome rewards, which cannot distinguish useful, redundant, and harmful intermediate interactions. We propose LAPO, a self-generated process-supervision method based on backward leave-one-turn attribution. For each search turn, LAPO replaces the turn and its retrieval observation with a fixed [DELETE] placeholder and measures the resulting change in the current policy\u0027s mean log-likelihood of the gold answer. This Answer-Likelihood Gain estimates the turn\u0027s contribution while preserving all downstream interactions, allowing early evidence to be evaluated in the complete reasoning context. LAPO further applies sign-consistency gating, retaining only normalized process advantages whose directions agree with their raw attribution scores. The method requires no additional reward model, teacher, verifier, or LLM-as-a-Judge. Across seven knowledge-intensive question-answering datasets with local retrieval, LAPO achieves an average exact-match score of 0.326, outperforming the strongest step-reward baseline, IGPO, by 0.053. Ablations show complementary benefits from backward attribution and sign-consistency gating, demonstrating that policy-derived retrospective attribution can provide effective process supervision for multi-turn search agents.", "arxiv_id": "2607.13501", "arxiv_url": "https://arxiv.org/abs/2607.13501", "authors": ["Qiang Zhu", "Jiajun Wu"], "brief": "\u63d0\u51faLAPO\u65b9\u6cd5\uff0c\u901a\u8fc7\u5c06\u67d0\u8f6e\u641c\u7d22\u53ca\u5176\u68c0\u7d22\u7ed3\u679c\u66ff\u6362\u4e3a[DELETE]\u5360\u4f4d\u7b26\uff0c\u6d4b\u91cf\u7b56\u7565\u5bf9\u6b63\u786e\u7b54\u6848\u5bf9\u6570\u4f3c\u7136\u7684\u53d8\u5316\uff0c\u4ece\u800c\u81ea\u52a8\u4f30\u8ba1\u6bcf\u8f6e\u4ea4\u4e92\u5bf9\u6700\u7ec8\u7b54\u6848\u7684\u8d21\u732e\uff0c\u5b9e\u73b0\u591a\u8f6e\u641c\u7d22\u63a8\u7406\u7684\u8fc7\u7a0b\u76d1\u7763\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13501", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u6838\u5fc3\u673a\u5236\uff1a\u53cd\u5411\u7559\u4e00\u8f6e\u5f52\u56e0\uff08Leave-One-Turn Attribution\uff09\uff0c\u7528[DELETE]\u66ff\u6362\u76ee\u6807\u8f6e\u6b21\u5e76\u8ba1\u7b97\u7b54\u6848\u4f3c\u7136\u589e\u76ca\uff08Answer-Likelihood Gain\uff09", "\u5f15\u5165\u7b26\u53f7\u4e00\u81f4\u6027\u95e8\u63a7\uff08Sign-Consistency Gating\uff09\uff0c\u4ec5\u4fdd\u7559\u5f52\u4e00\u5316\u8fc7\u7a0b\u4f18\u52bf\u4e0e\u539f\u59cb\u5f52\u56e0\u5206\u6570\u65b9\u5411\u4e00\u81f4\u7684\u6837\u672c", "\u57287\u4e2a\u77e5\u8bc6\u5bc6\u96c6\u578bQA\u6570\u636e\u96c6\u4e0a\u5e73\u5747\u7cbe\u786e\u5339\u914d\u5f97\u52060.326\uff0c\u6bd4\u6700\u5f3a\u57fa\u7ebfIGPO\u9ad8\u51fa0.053"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u63a8\u7406", "\u667a\u80fd\u4f53", "\u8fc7\u7a0b\u5956\u52b1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13501v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "LAPO: Leave-One-Turn Attribution for Self-Generated Process Rewards in Multi-Turn Search Reasoning", "tldr": "LAPO\u7528\u53cd\u5411\u7559\u4e00\u8f6e\u5f52\u56e0\u4e3a\u591a\u8f6e\u641c\u7d22\u63a8\u7406\u751f\u6210\u8fc7\u7a0b\u5956\u52b1\uff0c\u65e0\u9700\u989d\u5916\u5956\u52b1\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faLAPO\u65b9\u6cd5\uff0c\u901a\u8fc7\u5c06\u67d0\u8f6e\u641c\u7d22\u53ca\u5176\u68c0\u7d22\u7ed3\u679c\u66ff\u6362\u4e3a[DELETE]\u5360\u4f4d\u7b26\uff0c\u6d4b\u91cf\u7b56\u7565\u5bf9\u6b63\u786e\u7b54\u6848\u5bf9\u6570\u4f3c\u7136\u7684\u53d8\u5316\uff0c\u4ece\u800c\u81ea\u52a8\u4f30\u8ba1\u6bcf\u8f6e\u4ea4\u4e92\u5bf9\u6700\u7ec8\u7b54\u6848\u7684\u8d21\u732e\uff0c\u5b9e\u73b0\u591a\u8f6e\u641c\u7d22\u63a8\u7406\u7684\u8fc7\u7a0b\u76d1\u7763\u3002", "why_notable": "\u5b8c\u5168\u81ea\u751f\u6210\u8fc7\u7a0b\u5956\u52b1\uff0c\u65e0\u9700\u989d\u5916\u5956\u52b1\u6a21\u578b\u3001\u6559\u5e08\u6a21\u578b\u3001\u9a8c\u8bc1\u5668\u6216LLM-as-a-Judge\uff0c\u5927\u5e45\u964d\u4f4e\u591a\u8f6e\u641c\u7d22\u63a8\u7406\u8fc7\u7a0b\u76d1\u7763\u7684\u6210\u672c\uff0c\u4e14\u6548\u679c\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u6b65\u9aa4\u5956\u52b1\u57fa\u7ebf\u3002"}, {"abstract": "Contrastive Language-Image Pretraining (CLIP) representations form a semantic embedding space governed by cosine similarity, reflecting an intrinsic hyperspherical geometry. However, existing probabilistic interpretations typically rely on Gaussian assumptions, which fail to capture this directional and multimodal structure. We propose a principled density model for the CLIP latent space based on Mixtures of von Mises-Fisher (MovMF) distributions defined on the unit hypersphere. Using the Expectation-Maximization (EM) algorithm, we efficiently learn a probabilistic model in which each mixture component corresponds to a coherent semantic concept. This formulation yields a closed-form likelihood naturally aligned with hyperspherical geometry, enabling accurate and interpretable density estimation. Empirically, our model significantly improves long-tailed and out-of-distribution detection and provides a natural semantic decomposition, representing each embedding as a sparse probabilistic combination of interpretable concepts. These results suggest that CLIP latent space is more faithfully characterized as a hyperspherical semantic mixture rather than an isotropic Gaussian, establishing a simple and geometrically consistent probabilistic framework for modeling and understanding multimodal representations. Project page is available at https://xiaoyuzhizi.github.io/movmf-clip/.", "arxiv_id": "2607.13660", "arxiv_url": "https://arxiv.org/abs/2607.13660", "authors": ["Zijie Yu", "Gaowen Liu", "Ramana Rao Kompella", "Philip S. Yu", "Yue Song"], "brief": "\u63d0\u51fa\u57fa\u4e8e\u8d85\u7403\u9762\u6df7\u5408von Mises-Fisher\uff08MovMF\uff09\u5206\u5e03\u7684CLIP\u6f5c\u7a7a\u95f4\u5bc6\u5ea6\u6a21\u578b\uff0c\u901a\u8fc7EM\u7b97\u6cd5\u5b66\u4e60\u8bed\u4e49\u6df7\u5408\u6210\u5206\uff0c\u66ff\u4ee3\u4f20\u7edf\u9ad8\u65af\u5047\u8bbe\uff0c\u66f4\u5fe0\u5b9e\u5730\u523b\u753bCLIP\u4f59\u5f26\u76f8\u4f3c\u5ea6\u7a7a\u95f4\u7684\u65b9\u5411\u6027\u4e0e\u591a\u6a21\u6001\u7ed3\u6784\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13660", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4ee5\u5355\u4f4d\u8d85\u7403\u9762\u4e0a\u7684MovMF\u6df7\u5408\u5206\u5e03\u5efa\u6a21CLIP\u5d4c\u5165\uff0c\u6bcf\u4e2a\u6df7\u5408\u6210\u5206\u5bf9\u5e94\u4e00\u4e2a\u8bed\u4e49\u6982\u5ff5\uff0c\u5177\u6709\u95ed\u5408\u5f62\u5f0f\u4f3c\u7136", "\u663e\u8457\u63d0\u5347\u957f\u5c3e\u5206\u5e03\u68c0\u6d4b\u4e0e\u5206\u5e03\u5916\uff08OOD\uff09\u68c0\u6d4b\u6027\u80fd", "\u5c06\u6bcf\u4e2a\u5d4c\u5165\u8868\u793a\u4e3a\u53ef\u89e3\u91ca\u8bed\u4e49\u6982\u5ff5\u7684\u7a00\u758f\u6982\u7387\u7ec4\u5408\uff0c\u63d0\u4f9b\u81ea\u7136\u7684\u8bed\u4e49\u5206\u89e3"], "keywords": ["\u591a\u6a21\u6001", "\u8868\u793a\u5b66\u4e60", "\u5bc6\u5ea6\u4f30\u8ba1", "\u5206\u5e03\u5916\u68c0\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13660v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Hyperspherical Geometry of CLIP Latent Space: A Semantic Mixture Model", "tldr": "\u7528\u8d85\u7403\u9762\u6df7\u5408von Mises-Fisher\u5206\u5e03\u5bf9CLIP\u6f5c\u7a7a\u95f4\u5efa\u7acb\u51e0\u4f55\u4e00\u81f4\u7684\u6982\u7387\u5bc6\u5ea6\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u57fa\u4e8e\u8d85\u7403\u9762\u6df7\u5408von Mises-Fisher\uff08MovMF\uff09\u5206\u5e03\u7684CLIP\u6f5c\u7a7a\u95f4\u5bc6\u5ea6\u6a21\u578b\uff0c\u901a\u8fc7EM\u7b97\u6cd5\u5b66\u4e60\u8bed\u4e49\u6df7\u5408\u6210\u5206\uff0c\u66ff\u4ee3\u4f20\u7edf\u9ad8\u65af\u5047\u8bbe\uff0c\u66f4\u5fe0\u5b9e\u5730\u523b\u753bCLIP\u4f59\u5f26\u76f8\u4f3c\u5ea6\u7a7a\u95f4\u7684\u65b9\u5411\u6027\u4e0e\u591a\u6a21\u6001\u7ed3\u6784\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06CLIP\u6f5c\u7a7a\u95f4\u7684\u8d85\u7403\u9762\u51e0\u4f55\u4e0e\u6982\u7387\u5efa\u6a21\u7edf\u4e00\uff0c\u65e2\u6709\u7406\u8bba\u4e25\u8c28\u6027\uff08\u51e0\u4f55\u4e00\u81f4\u7684\u95ed\u5408\u5f62\u5f0f\uff09\uff0c\u53c8\u5728OOD\u68c0\u6d4b\u7b49\u5b9e\u9645\u4efb\u52a1\u4e0a\u5e26\u6765\u663e\u8457\u63d0\u5347\uff0c\u4e3a\u591a\u6a21\u6001\u8868\u793a\u5206\u6790\u63d0\u4f9b\u7b80\u6d01\u53ef\u89e3\u91ca\u6846\u67b6\u3002"}, {"abstract": "Temperature scaling is the dominant post-hoc calibration method in modern deep learning. Its theoretical justification rests on an assumption that is rarely stated explicitly: that ground-truth labels are one-hot and deterministic. In practice, labels are frequently soft, crowd-sourced, or genuinely distributional, reflecting real disagreement among human annotators rather than annotation noise. We study whether temperature scaling retains its calibration properties when this assumption is violated, and whether any resulting degradation depends on model scale. Using CIFAR-10H and ChaosNLI, two publicly available datasets with human-annotated soft label distributions, we evaluate three model scales per modality under both hard one-hot and soft distributional label targets. Across all nine configurations we find a positive soft-label calibration gap: temperature scaling calibrated on hard labels consistently underperforms an oracle calibrated directly on soft labels, with Brier Score gaps ranging from 0.002 to 0.134. The gap grows monotonically with model scale in the vision domain and on the SNLI-derived split of ChaosNLI, and is substantially larger in the language domain (mean gap 0.079) than in vision (mean gap 0.003). A scale-ordering reversal on the MNLI-derived split remains after matched-domain training; we treat it as inconclusive for the scale hypothesis and attribute it primarily to near-chance accuracy on that split. As a second post-hoc baseline, multiclass isotonic regression yields the same qualitative conclusion: positive soft-label gaps in all nine configurations, and larger gaps in language than in vision. These findings suggest that calibration protocols built on majority-vote labels systematically misstate model reliability wherever label ambiguity is structural, with direct consequences for deployment in safety-critical settings.", "arxiv_id": "2607.13423", "arxiv_url": "https://arxiv.org/abs/2607.13423", "authors": ["Wisdom Dogah"], "brief": "\u672c\u6587\u7814\u7a76\u6e29\u5ea6\u7f29\u653e\uff08Temperature Scaling\uff09\u5728\u4eba\u7c7b\u8f6f\u6807\u7b7e\u5206\u5e03\u4e0b\u7684\u6821\u51c6\u6027\u80fd\uff0c\u53d1\u73b0\u5176\u57fa\u4e8e\u786c\u6807\u7b7e\u6821\u51c6\u65f6\u76f8\u6bd4\u76f4\u63a5\u5728\u8f6f\u6807\u7b7e\u4e0a\u6821\u51c6\u5b58\u5728\u6301\u7eed\u7684\u6b63\u5411\u6821\u51c6\u7f3a\u53e3\uff0c\u5e76\u5206\u6790\u8be5\u7f3a\u53e3\u4e0e\u6a21\u578b\u89c4\u6a21\u7684\u5173\u7cfb\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13423", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5728CIFAR-10H\u548cChaosNLI\u4e24\u4e2a\u8f6f\u6807\u7b7e\u6570\u636e\u96c6\u4e0a\uff0c9\u79cd\u914d\u7f6e\u5747\u51fa\u73b0\u6b63\u5411\u8f6f\u6807\u7b7e\u6821\u51c6\u7f3a\u53e3\uff0cBrier Score\u5dee\u8ddd\u4ece0.002\u52300.134\u4e0d\u7b49", "\u6821\u51c6\u7f3a\u53e3\u5728\u89c6\u89c9\u57df\u548cSNLI\u5b50\u96c6\u4e0a\u968f\u6a21\u578b\u89c4\u6a21\u5355\u8c03\u589e\u5927\uff1b\u8bed\u8a00\u57df\u7f3a\u53e3\uff08\u5747\u503c0.079\uff09\u8fdc\u5927\u4e8e\u89c6\u89c9\u57df\uff08\u5747\u503c0.003\uff09", "\u7b49\u6e17\u56de\u5f52\u4f5c\u4e3a\u7b2c\u4e8c\u57fa\u7ebf\u5f97\u51fa\u76f8\u540c\u5b9a\u6027\u7ed3\u8bba\uff0c\u8868\u660e\u95ee\u9898\u4e0d\u5c40\u9650\u4e8e\u6e29\u5ea6\u7f29\u653e\u65b9\u6cd5\u672c\u8eab"], "keywords": ["\u6a21\u578b\u6821\u51c6", "\u8f6f\u6807\u7b7e", "\u4e0d\u786e\u5b9a\u6027\u4f30\u8ba1", "\u6df1\u5ea6\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13423v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Temperature Scaling Is Not Enough: Calibration Gaps Under Human Label Distributions", "tldr": "\u6e29\u5ea6\u7f29\u653e\u5728\u8f6f\u6807\u7b7e\u5206\u5e03\u4e0b\u5b58\u5728\u7cfb\u7edf\u6027\u6821\u51c6\u7f3a\u53e3\uff0c\u4e14\u968f\u6a21\u578b\u89c4\u6a21\u589e\u5927\u800c\u6269\u5927", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u6e29\u5ea6\u7f29\u653e\uff08Temperature Scaling\uff09\u5728\u4eba\u7c7b\u8f6f\u6807\u7b7e\u5206\u5e03\u4e0b\u7684\u6821\u51c6\u6027\u80fd\uff0c\u53d1\u73b0\u5176\u57fa\u4e8e\u786c\u6807\u7b7e\u6821\u51c6\u65f6\u76f8\u6bd4\u76f4\u63a5\u5728\u8f6f\u6807\u7b7e\u4e0a\u6821\u51c6\u5b58\u5728\u6301\u7eed\u7684\u6b63\u5411\u6821\u51c6\u7f3a\u53e3\uff0c\u5e76\u5206\u6790\u8be5\u7f3a\u53e3\u4e0e\u6a21\u578b\u89c4\u6a21\u7684\u5173\u7cfb\u3002", "why_notable": "\u63ed\u793a\u4e86\u4e3b\u6d41\u6821\u51c6\u65b9\u6cd5\u5728\u6807\u7b7e\u6b67\u4e49\u7ed3\u6784\u6027\u5b58\u5728\u65f6\u7684\u7cfb\u7edf\u6027\u7f3a\u9677\uff0c\u5bf9\u5b89\u5168\u5173\u952e\u573a\u666f\u4e2d\u7684\u6a21\u578b\u53ef\u9760\u6027\u8bc4\u4f30\u5177\u6709\u76f4\u63a5\u8b66\u793a\u610f\u4e49\uff0c\u6311\u6218\u4e86\u6e29\u5ea6\u7f29\u653e\u7684\u7406\u8bba\u5047\u8bbe\u57fa\u7840\u3002"}, {"abstract": "The pursuit of autonomously self-improving models has attracted growing interest in the era of large-scale foundation models. Drawing inspiration from the concept of \"enlightenment\" or \"aha moment\" in human brain, we hypothesize that large models exhibit an analogous enlightenment phenomenon-a latent capacity for sudden capability boost. Then, we propose Enlightenment, a novel training-free post-tuning paradigm for large-scale models. Our approach modifies shortcuts for key modules/layers without weight updates, while existing training-free ones predominantly manipulate attention weights. We introduce two architecture-specific instantiations: i) For large language models, we propose attention head-mixing shortcuts that recalibrate attention weights by linking the initial attention head\u0027s output to all other target heads, modulated by an adaptive scaling factor initialization strategy. ii) For vision-language models, we apply a lightweight scalar-modulated factor to residual connections in the decoder layers, regulating information flow. Extensive experiments show that Enlightenment efficiently unlocks the latent potential of pre-trained networks, yielding remarkable performance improvements across diverse benchmarks and models.", "arxiv_id": "2607.13395", "arxiv_url": "https://arxiv.org/abs/2607.13395", "authors": ["Jing-Xiao Liao", "Tianwei Zhang", "Yu-Hao Jiang", "Feifei Zhang", "Hang-Cheng Dong", "Feng-Lei Fan"], "brief": "\u63d0\u51faEnlightenment\u2014\u2014\u4e00\u79cd\u65e0\u9700\u6743\u91cd\u66f4\u65b0\u7684\u540e\u8c03\u4f18\u8303\u5f0f\uff0c\u901a\u8fc7\u4fee\u6539\u5927\u6a21\u578b\u5173\u952e\u6a21\u5757\u7684\u6377\u5f84\u8fde\u63a5\uff08\u800c\u975e\u6ce8\u610f\u529b\u6743\u91cd\uff09\uff0c\u6fc0\u53d1\u6a21\u578b\u6f5c\u5728\u7684\"\u987f\u609f\"\u80fd\u529b\u7a81\u8dc3\u73b0\u8c61\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13395", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9488\u5bf9LLM\uff1a\u63d0\u51fa\u6ce8\u610f\u529b\u5934\u6df7\u5408\u6377\u5f84\uff0c\u5c06\u521d\u59cb\u6ce8\u610f\u529b\u5934\u8f93\u51fa\u94fe\u63a5\u5230\u6240\u6709\u76ee\u6807\u5934\uff0c\u5e76\u914d\u5408\u81ea\u9002\u5e94\u7f29\u653e\u56e0\u5b50\u521d\u59cb\u5316\u7b56\u7565", "\u9488\u5bf9VLM\uff1a\u5728\u89e3\u7801\u5668\u6b8b\u5dee\u8fde\u63a5\u4e0a\u65bd\u52a0\u8f7b\u91cf\u6807\u91cf\u8c03\u5236\u56e0\u5b50\uff0c\u8c03\u63a7\u4fe1\u606f\u6d41\u52a8", "\u5b8c\u5168\u65e0\u9700\u6743\u91cd\u66f4\u65b0\uff08training-free\uff09\uff0c\u5728\u591a\u79cd\u57fa\u51c6\u548c\u6a21\u578b\u4e0a\u5747\u53d6\u5f97\u663e\u8457\u6027\u80fd\u63d0\u5347"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001", "\u6a21\u578b\u5fae\u8c03", "\u9ad8\u6548\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13395v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Self-Improving is Often Sudden: Enlightenment-style Finetuning for Large-Scale Models", "tldr": "\u63d0\u51fa\"\u987f\u609f\u5f0f\"\u65e0\u8bad\u7ec3\u540e\u8c03\u4f18\u8303\u5f0f\uff0c\u901a\u8fc7\u4fee\u6539\u6a21\u578b\u6377\u5f84\u6a21\u5757\u5b9e\u73b0\u5927\u6a21\u578b\u80fd\u529b\u7a81\u8dc3", "upvotes": 0, "what_it_is": "\u63d0\u51faEnlightenment\u2014\u2014\u4e00\u79cd\u65e0\u9700\u6743\u91cd\u66f4\u65b0\u7684\u540e\u8c03\u4f18\u8303\u5f0f\uff0c\u901a\u8fc7\u4fee\u6539\u5927\u6a21\u578b\u5173\u952e\u6a21\u5757\u7684\u6377\u5f84\u8fde\u63a5\uff08\u800c\u975e\u6ce8\u610f\u529b\u6743\u91cd\uff09\uff0c\u6fc0\u53d1\u6a21\u578b\u6f5c\u5728\u7684\"\u987f\u609f\"\u80fd\u529b\u7a81\u8dc3\u73b0\u8c61\u3002", "why_notable": "\u9996\u6b21\u5c06\u4eba\u7c7b\"\u987f\u609f\u65f6\u523b\"\u7c7b\u6bd4\u5f15\u5165\u5927\u6a21\u578b\u540e\u8c03\u4f18\uff0c\u63d0\u51fa\u65e0\u8bad\u7ec3\u3001\u67b6\u6784\u611f\u77e5\u7684\u6377\u5f84\u4fee\u6539\u65b9\u6cd5\uff0c\u8ba1\u7b97\u6210\u672c\u6781\u4f4e\u5374\u80fd\u89e3\u9501\u9884\u8bad\u7ec3\u6a21\u578b\u7684\u6f5c\u5728\u80fd\u529b\uff0c\u5bf9\u5927\u89c4\u6a21\u6a21\u578b\u9ad8\u6548\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement Learning (RL) post-training is increasingly used to adapt foundation models for reasoning, planning, and feedback-driven robot-learning pipelines, but constrained post-training resources are often summarized by a single total FLOP budget. We study the fixed-budget decision problem behind this practice: under the same post-training budget, should one use a larger policy, train a smaller policy longer, generate more rollout search, or spend compute on stronger reward feedback? We introduce a FLOP-accounting framework for GRPO post-training that decomposes compute into rollout/search, policy-update/learning, and reward- or feedback-model evaluation. Across LoRA-adapted Qwen2.5 policies, we find conditional allocation frontiers: the best observed allocation changes with model size, compute budget, reward system, and evaluation target. Same-FLOP model-size comparisons show that model choice and training allocation are coupled because larger policies consume more per-token compute and therefore buy fewer updates or rollouts under the same budget. Reward systems also change the accounting: rule-based rewards spend nearly all non-update compute on policy rollouts, while PRM-style feedback allocates a visible part of the budget to reward-model inference. We present RACE as a diagnostic pilot-grid protocol, not a guarantee of held-out improvement, for identifying allocation regimes before expensive validation runs; our results suggest that RL post-training papers should report total FLOPs together with how compute is divided among model size, search, learning, and feedback.", "arxiv_id": "2607.13389", "arxiv_url": "https://arxiv.org/abs/2607.13389", "authors": ["Patrick Wilhelm", "Odej Kao"], "brief": "\u63d0\u51faFLOP\u6838\u7b97\u6846\u67b6RACE\uff0c\u5c06GRPO\u540e\u8bad\u7ec3\u8ba1\u7b97\u5206\u89e3\u4e3arollout/\u641c\u7d22\u3001\u7b56\u7565\u66f4\u65b0/\u5b66\u4e60\u3001\u5956\u52b1\u6a21\u578b\u8bc4\u4f30\u4e09\u90e8\u5206\uff0c\u7cfb\u7edf\u7814\u7a76\u56fa\u5b9a\u9884\u7b97\u4e0b\u6700\u4f18\u8ba1\u7b97\u5206\u914d\u7b56\u7565\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13389", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efaFLOP\u6838\u7b97\u6846\u67b6\uff0c\u5c06RL\u540e\u8bad\u7ec3\u8ba1\u7b97\u9884\u7b97\u5206\u89e3\u4e3a\u4e09\u4e2a\u7ef4\u5ea6\uff1arollout\u641c\u7d22\u3001\u7b56\u7565\u66f4\u65b0\u5b66\u4e60\u3001\u5956\u52b1/\u53cd\u9988\u6a21\u578b\u8bc4\u4f30", "\u53d1\u73b0\u6700\u4f18\u5206\u914d\u5b58\u5728\u6761\u4ef6\u524d\u6cbf\uff1a\u968f\u6a21\u578b\u5927\u5c0f\u3001\u8ba1\u7b97\u9884\u7b97\u3001\u5956\u52b1\u7cfb\u7edf\u548c\u8bc4\u4f30\u76ee\u6807\u53d8\u5316\u800c\u6539\u53d8\uff0c\u65e0\u7edf\u4e00\u6700\u4f18\u89e3", "\u57fa\u4e8e\u89c4\u5219\u7684\u5956\u52b1\u51e0\u4e4e\u5c06\u975e\u66f4\u65b0\u8ba1\u7b97\u5168\u7528\u4e8erollout\uff0c\u800cPRM\u5f0f\u53cd\u9988\u5219\u9700\u5c06\u76f8\u5f53\u90e8\u5206\u9884\u7b97\u5206\u914d\u7ed9\u5956\u52b1\u6a21\u578b\u63a8\u7406"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u540e\u8bad\u7ec3", "\u8ba1\u7b97\u8d44\u6e90\u5206\u914d", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13389v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Where Should RL Post-Training Compute Go? Model Size, Search, Learning, and Feedback", "tldr": "\u7814\u7a76RL\u540e\u8bad\u7ec3\u4e2d\u8ba1\u7b97\u8d44\u6e90\u5e94\u5982\u4f55\u5728\u6a21\u578b\u5927\u5c0f\u3001\u641c\u7d22\u3001\u5b66\u4e60\u548c\u53cd\u9988\u95f4\u5206\u914d", "upvotes": 0, "what_it_is": "\u63d0\u51faFLOP\u6838\u7b97\u6846\u67b6RACE\uff0c\u5c06GRPO\u540e\u8bad\u7ec3\u8ba1\u7b97\u5206\u89e3\u4e3arollout/\u641c\u7d22\u3001\u7b56\u7565\u66f4\u65b0/\u5b66\u4e60\u3001\u5956\u52b1\u6a21\u578b\u8bc4\u4f30\u4e09\u90e8\u5206\uff0c\u7cfb\u7edf\u7814\u7a76\u56fa\u5b9a\u9884\u7b97\u4e0b\u6700\u4f18\u8ba1\u7b97\u5206\u914d\u7b56\u7565\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316RL\u540e\u8bad\u7ec3\u8ba1\u7b97\u5206\u914d\u95ee\u9898\uff0c\u63d0\u51faRACE\u8bca\u65ad\u534f\u8bae\uff0c\u547c\u5401\u5b66\u754c\u5728\u62a5\u544aRL\u540e\u8bad\u7ec3\u7ed3\u679c\u65f6\u540c\u65f6\u62ab\u9732\u603bFLOPs\u53ca\u5404\u90e8\u5206\u5206\u914d\u6bd4\u4f8b\uff0c\u5bf9\u63d0\u5347\u7814\u7a76\u53ef\u590d\u73b0\u6027\u548c\u8d44\u6e90\u6548\u7387\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "While search agents demonstrate impressive capabilities in multi-step question answering, their robustness to poor-quality evidence remains under-explored. This phenomenon occurs rarely in realistic benchmarks but can lead to dramatic failure in real life applications. Therefore in this study we propose DeepStress, a stress testing framework that controls the frequency of challenging evidence by replacing the retrieval module of search agents with a controlled synthetic environment. We use this framework to control three dimensions that can affect document reliability: trustworthiness, relevance, and factuality. Testing several search agents on HotpotQA and BrowseCompPlus, we demonstrate that agents exhibit substantial differences in their ability to handle unreliable information and propose new metrics that better document systems outcomes as well as the interactions between conflicting parametric and retrieved knowledge.", "arxiv_id": "2607.13920", "arxiv_url": "https://arxiv.org/abs/2607.13920", "authors": ["Ismael Rousseau", "Geraldine Damnati", "Frederic Bechet"], "brief": "\u63d0\u51faDeepStress\u538b\u529b\u6d4b\u8bd5\u6846\u67b6\uff0c\u7528\u53ef\u63a7\u5408\u6210\u73af\u5883\u66ff\u6362\u641c\u7d22\u667a\u80fd\u4f53\u7684\u68c0\u7d22\u6a21\u5757\uff0c\u7cfb\u7edf\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u9762\u5bf9\u4e0d\u53ef\u9760\u6587\u6863\u65f6\u7684\u8868\u73b0\uff0c\u6db5\u76d6\u53ef\u4fe1\u5ea6\u3001\u76f8\u5173\u6027\u548c\u4e8b\u5b9e\u6027\u4e09\u4e2a\u7ef4\u5ea6\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13920", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u901a\u8fc7\u5408\u6210\u53d7\u63a7\u73af\u5883\u66ff\u4ee3\u771f\u5b9e\u68c0\u7d22\u6a21\u5757\uff0c\u7cbe\u786e\u63a7\u5236\u4f4e\u8d28\u91cf\u8bc1\u636e\u7684\u51fa\u73b0\u9891\u7387", "\u4ece\u53ef\u4fe1\u5ea6\uff08trustworthiness\uff09\u3001\u76f8\u5173\u6027\uff08relevance\uff09\u3001\u4e8b\u5b9e\u6027\uff08factuality\uff09\u4e09\u7ef4\u5ea6\u8861\u91cf\u6587\u6863\u53ef\u9760\u6027", "\u5728HotpotQA\u548cBrowseCompPlus\u4e0a\u6d4b\u8bd5\u591a\u4e2a\u641c\u7d22\u667a\u80fd\u4f53\uff0c\u63ed\u793a\u5176\u5904\u7406\u4e0d\u53ef\u9760\u4fe1\u606f\u80fd\u529b\u7684\u663e\u8457\u5dee\u5f02\uff0c\u5e76\u63d0\u51fa\u65b0\u8bc4\u4f30\u6307\u6807"], "keywords": ["\u667a\u80fd\u4f53", "\u9c81\u68d2\u6027\u8bc4\u4f30", "\u4fe1\u606f\u68c0\u7d22", "\u591a\u6b65\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13920v1", "published_at": "2026-07-15", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DeepStress: Stress-Testing Deep Search Agents", "tldr": "DeepStress\u6846\u67b6\u901a\u8fc7\u5408\u6210\u73
