71f/\u8212\u5f20\u672b\u671f\uff09\uff0c\u4e14\u8fd9\u4e00\u95ee\u9898\u6e90\u4e8e\u6a21\u578b\u884c\u4e3a\u672c\u8eab\u800c\u975e\u5f52\u56e0\u65b9\u6cd5\u7f3a\u9677\u3002\u8fd9\u4e00\u53d1\u73b0\u8b66\u793a\uff1a\u7a7a\u95f4\u5f52\u56e0\u7684\u53ef\u4fe1\u5ea6\u4e0d\u80fd\u4ee3\u8868\u65f6\u95f4\u5f52\u56e0\u7684\u53ef\u4fe1\u5ea6\uff0c\u57fa\u4e8eXAI\u7684\u89c6\u9891\u8bca\u65ad\u6a21\u578b\u9a8c\u8bc1\u9700\u5f15\u5165\u65f6\u95f4\u611f\u77e5\u8bc4\u4f30\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13738", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u53ef\u89e3\u91caAI", "\u533b\u5b66\u5f71\u50cf", "\u89c6\u9891\u7406\u89e3", "\u5f52\u56e0\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13738v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Anatomically Faithful but Temporally Blind: Auditing Attribution for Left-Ventricular Ejection-Fraction Estimation from Echocardiography", "tldr": "\u7814\u7a76\u5ba1\u8ba1\u4e86\u7528\u4e8e\u8d85\u58f0\u5fc3\u52a8\u56fe\u5c04\u8840\u5206\u6570\u4f30\u8ba1\u7684\u6df1\u5ea6\u89c6\u9891\u6a21\u578b\uff08VideoMAE\u548cR(2+1)D CNN\uff09\u7684\u5f52\u56e0\u89e3\u91ca\uff0c\u53d1\u73b0\u6a21\u578b\u5728\u7a7a\u95f4\u4e0a\u80fd\u6b63\u786e\u5b9a\u4f4d\u5de6\u5fc3\u5ba4\uff08\u89e3\u5256\u5fe0\u5b9e\uff09\uff0c\u4f46\u5728\u65f6\u95f4\u4e0a\u5b8c\u5168\u65e0\u6cd5\u8bc6\u522b\u5173\u952e\u5e27\uff08\u6536\u7f29\u672b\u671f/\u8212\u5f20\u672b\u671f\uff09\uff0c\u4e14\u8fd9\u4e00\u95ee\u9898\u6e90\u4e8e\u6a21\u578b\u884c\u4e3a\u672c\u8eab\u800c\u975e\u5f52\u56e0\u65b9\u6cd5\u7f3a\u9677\u3002\u8fd9\u4e00\u53d1\u73b0\u8b66\u793a\uff1a\u7a7a\u95f4\u5f52\u56e0\u7684\u53ef\u4fe1\u5ea6\u4e0d\u80fd\u4ee3\u8868\u65f6\u95f4\u5f52\u56e0\u7684\u53ef\u4fe1\u5ea6\uff0c\u57fa\u4e8eXAI\u7684\u89c6\u9891\u8bca\u65ad\u6a21\u578b\u9a8c\u8bc1\u9700\u5f15\u5165\u65f6\u95f4\u611f\u77e5\u8bc4\u4f30\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This book chapter covers the evolution of social simulation from classical agent-based models, in which agents interact according to explicitly defined behavioral rules, to AI-enhanced simulations based on Large Language Models and, ultimately, Social Digital Twins: high-fidelity, data-driven representations of real-world socio-technical systems. Along this trajectory, we discuss the main methodological foundations, applications, advantages, and limitations of each paradigm, highlighting the progressive shift from abstract models designed to investigate general social mechanisms toward increasingly realistic computational representations of specific social systems.", "arxiv_id": "2607.13693", "arxiv_url": "https://arxiv.org/abs/2607.13693", "authors": ["Erica Cau", "Andrea Failla", "Valentina Pansanella", "Giulio Rossetti"], "brief": "\u672c\u7ae0\u7efc\u8ff0\u4e86\u793e\u4f1a\u4eff\u771f\u4ece\u7ecf\u5178\u57fa\u4e8e\u667a\u80fd\u4f53\u5efa\u6a21\uff08ABM\uff09\u5230\u5927\u8bed\u8a00\u6a21\u578b\u589e\u5f3a\u4eff\u771f\uff0c\u518d\u5230\u793e\u4f1a\u6570\u5b57\u5b6a\u751f\u7684\u6f14\u8fdb\u5386\u7a0b\uff0c\u7cfb\u7edf\u68b3\u7406\u4e86\u5404\u8303\u5f0f\u7684\u65b9\u6cd5\u8bba\u57fa\u7840\u3001\u5e94\u7528\u573a\u666f\u53ca\u5c40\u9650\u6027\uff0c\u63ed\u793a\u4e86\u4ece\u62bd\u8c61\u793e\u4f1a\u673a\u5236\u63a2\u7d22\u5411\u9ad8\u4fdd\u771f\u73b0\u5b9e\u7cfb\u7edf\u8868\u5f81\u7684\u8f6c\u53d8\u8d8b\u52bf\u3002", "categories": ["cs.MA", "cs.AI", "cs.SI", "physics.soc-ph"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13693", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53\u5efa\u6a21", "\u793e\u4f1a\u4eff\u771f", "\u6570\u5b57\u5b6a\u751f", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13693v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Social Simulations: from Agent-Based Modeling to Digital Twins", "tldr": "\u672c\u7ae0\u7efc\u8ff0\u4e86\u793e\u4f1a\u4eff\u771f\u4ece\u7ecf\u5178\u57fa\u4e8e\u667a\u80fd\u4f53\u5efa\u6a21\uff08ABM\uff09\u5230\u5927\u8bed\u8a00\u6a21\u578b\u589e\u5f3a\u4eff\u771f\uff0c\u518d\u5230\u793e\u4f1a\u6570\u5b57\u5b6a\u751f\u7684\u6f14\u8fdb\u5386\u7a0b\uff0c\u7cfb\u7edf\u68b3\u7406\u4e86\u5404\u8303\u5f0f\u7684\u65b9\u6cd5\u8bba\u57fa\u7840\u3001\u5e94\u7528\u573a\u666f\u53ca\u5c40\u9650\u6027\uff0c\u63ed\u793a\u4e86\u4ece\u62bd\u8c61\u793e\u4f1a\u673a\u5236\u63a2\u7d22\u5411\u9ad8\u4fdd\u771f\u73b0\u5b9e\u7cfb\u7edf\u8868\u5f81\u7684\u8f6c\u53d8\u8d8b\u52bf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We built a compact convolutional network (1.11 M parameters) for 46-class DHCD Devanagari recognition and reached 99.73%, the highest reported at 15.6x smaller than prior state-of-the-art. We have effectively reached the saturation point: every model tested, large teacher ensembles included, hits the same 11-error intrinsic floor. No configuration achieves a statistically clear win under exact McNemar tests with Wilson confidence intervals. Even without knowledge distillation, our student matches the nearest large-model baseline (17.32 M parameters; McNemar $p = 0.345$). Outside of DHCD, zero-shot on CMATERdb digits gives 76.6% and fine-tuning reaches 97.8%; corruption robustness is also far better than large baselines (mean corruption accuracy 75.7% vs. 38.7%). All artifacts are at https://github.com/Ampixa/barnamala.", "arxiv_id": "2607.13689", "arxiv_url": "https://arxiv.org/abs/2607.13689", "authors": ["Ashish Thapa", "Samrat Karki"], "brief": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u4ec5110\u4e07\u53c2\u6570\u7684\u7d27\u51d1\u5377\u79ef\u7f51\u7edc\u7528\u4e8e\u68b5\u6587\u624b\u5199\u8bc6\u522b\uff0c\u5728DHCD\u57fa\u51c6\u4e0a\u8fbe\u523099.73%\u51c6\u786e\u7387\uff0c\u6bd4\u73b0\u6709\u6700\u4f18\u6a21\u578b\u5c0f15.6\u500d\u4e14\u6027\u80fd\u76f8\u5f53\uff0c\u540c\u65f6\u63ed\u793a\u8be5\u57fa\u51c6\u5df2\u8fbe\u9971\u548c\u70b9\uff08\u5b58\u572811\u4e2a\u9519\u8bef\u7684\u5185\u5728\u4e0b\u9650\uff09\u3002\u6a21\u578b\u5728\u8de8\u6570\u636e\u96c6\u6cdb\u5316\u548c\u6297\u566a\u9c81\u68d2\u6027\u4e0a\u4e5f\u663e\u8457\u4f18\u4e8e\u5927\u578b\u57fa\u7ebf\u6a21\u578b\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13689", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u624b\u5199\u8bc6\u522b", "\u53c2\u6570\u9ad8\u6548", "\u5377\u79ef\u7f51\u7edc", "\u57fa\u51c6\u9971\u548c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13689v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Barnamala: Parameter-Efficient Handwritten Devanagari Recognition at Benchmark Saturation", "tldr": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u4ec5110\u4e07\u53c2\u6570\u7684\u7d27\u51d1\u5377\u79ef\u7f51\u7edc\u7528\u4e8e\u68b5\u6587\u624b\u5199\u8bc6\u522b\uff0c\u5728DHCD\u57fa\u51c6\u4e0a\u8fbe\u523099.73%\u51c6\u786e\u7387\uff0c\u6bd4\u73b0\u6709\u6700\u4f18\u6a21\u578b\u5c0f15.6\u500d\u4e14\u6027\u80fd\u76f8\u5f53\uff0c\u540c\u65f6\u63ed\u793a\u8be5\u57fa\u51c6\u5df2\u8fbe\u9971\u548c\u70b9\uff08\u5b58\u572811\u4e2a\u9519\u8bef\u7684\u5185\u5728\u4e0b\u9650\uff09\u3002\u6a21\u578b\u5728\u8de8\u6570\u636e\u96c6\u6cdb\u5316\u548c\u6297\u566a\u9c81\u68d2\u6027\u4e0a\u4e5f\u663e\u8457\u4f18\u4e8e\u5927\u578b\u57fa\u7ebf\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "AI agents are joining human teams, raising a basic question: when an automated agent becomes a regular participant, does group organization strengthen or weaken? We study this question in open-source software, where bots open pull requests, review code, and merge changes alongside people, leaving a public record of every interaction. Treating bots as participants rather than tools, we examine 2,991 GitHub projects for two years before and after each adopted its first bot. We measure three capabilities that institutional theory links to durable coordination - repeated engagement, social memory, and role differentiation - and two outcomes: conflict cascades and output distinctiveness. Bot adoption is followed by more repeated collaboration, greater recognition of specific bots in discussion, fewer conflict cascades, and more distinctive outputs. These changes cluster around adoption rather than accumulating gradually. Because we lack an untreated comparison group, we interpret the results as precisely timed associations, not causal effects. Two patterns are difficult for alternative explanations to account for: capabilities predict outcomes according to their function - coordination versus differentiation - rather than whether humans or bots provide them, and human-side capabilities account for the bot-conflict association but not the bot-distinctiveness association. The findings are consistent with a specific interpretation: predictable, rule-based agents can become part of a community\u0027s social infrastructure. The bot is the occasion; social organization is the mechanism.", "arxiv_id": "2607.13679", "arxiv_url": "https://arxiv.org/abs/2607.13679", "authors": ["Yongren Shi", "Wenyi Gong"], "brief": "\u7814\u7a76\u4e862991\u4e2aGitHub\u5f00\u6e90\u9879\u76ee\u5728\u5f15\u5165\u9996\u4e2a\u673a\u5668\u4eba\u524d\u540e\u4e24\u5e74\u7684\u53d8\u5316\uff0c\u53d1\u73b0\u673a\u5668\u4eba\u52a0\u5165\u56e2\u961f\u540e\uff0c\u91cd\u590d\u534f\u4f5c\u589e\u52a0\u3001\u51b2\u7a81\u51cf\u5c11\u3001\u9879\u76ee\u4ea7\u51fa\u66f4\u5177\u72ec\u7279\u6027\uff0c\u8fd9\u4e9b\u53d8\u5316\u96c6\u4e2d\u5728\u5f15\u5165\u65f6\u95f4\u70b9\u9644\u8fd1\u800c\u975e\u6e10\u8fdb\u79ef\u7d2f\u3002\u7ed3\u679c\u8868\u660e\uff0c\u53ef\u9884\u6d4b\u7684\u89c4\u5219\u578b\u667a\u80fd\u4f53\u80fd\u591f\u878d\u5165\u793e\u533a\u7684\u793e\u4f1a\u57fa\u7840\u8bbe\u65bd\uff0c\u6210\u4e3a\u534f\u8c03\u673a\u5236\u7684\u4e00\u90e8\u5206\u3002", "categories": ["cs.AI", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13679", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5f00\u6e90\u534f\u4f5c", "\u4eba\u673a\u56e2\u961f", "\u793e\u4f1a\u7ec4\u7ec7"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13679v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "When Bots Join the Team: Bot Adoption and the Institutional Fabric of Open-Source Software Projects", "tldr": "\u7814\u7a76\u4e862991\u4e2aGitHub\u5f00\u6e90\u9879\u76ee\u5728\u5f15\u5165\u9996\u4e2a\u673a\u5668\u4eba\u524d\u540e\u4e24\u5e74\u7684\u53d8\u5316\uff0c\u53d1\u73b0\u673a\u5668\u4eba\u52a0\u5165\u56e2\u961f\u540e\uff0c\u91cd\u590d\u534f\u4f5c\u589e\u52a0\u3001\u51b2\u7a81\u51cf\u5c11\u3001\u9879\u76ee\u4ea7\u51fa\u66f4\u5177\u72ec\u7279\u6027\uff0c\u8fd9\u4e9b\u53d8\u5316\u96c6\u4e2d\u5728\u5f15\u5165\u65f6\u95f4\u70b9\u9644\u8fd1\u800c\u975e\u6e10\u8fdb\u79ef\u7d2f\u3002\u7ed3\u679c\u8868\u660e\uff0c\u53ef\u9884\u6d4b\u7684\u89c4\u5219\u578b\u667a\u80fd\u4f53\u80fd\u591f\u878d\u5165\u793e\u533a\u7684\u793e\u4f1a\u57fa\u7840\u8bbe\u65bd\uff0c\u6210\u4e3a\u534f\u8c03\u673a\u5236\u7684\u4e00\u90e8\u5206\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Explainable Reinforcement Learning (XRL) seeks to make Reinforcement Learning (RL) policies more transparent and interpretable, a key requirement in safety-critical and human-centric scenarios. However, it is mostly based on user studies, thus targeting the needs of a specific audience and lacking shared evaluation metrics. On the other hand, logic-based approaches within eXplainable Artificial Intelligence (XAI) provide compact, human-readable abstractions of decision-making. However, the systematic quantification of the explainability degree of logical representations remains an open problem. This work aims to advance the state of the art in XRL by introducing objective and planning-oriented metrics for policy explainability in RL settings. At the same time, it contributes to the field of logic for XAI by providing a principled way to quantify the explainability of logical rules, moving beyond common-sense assessments and simple propositional fragments. We employ Inductive Logic Programming (ILP) to extract symbolic representations of RL policies and define a novel set of explainability metrics, including activation rate, feature coverage, syntactic distance and semantic distance. These metrics quantify alignment between symbolic rules and agent behavior, the role of features in decision-making, and the evolution of policies during training and across agents in single and multi-agent RL. Experiments across different RL domains show that the proposed metrics highlight action-specific learning dynamics beyond global return, provide fine-grained insights into domain features beyond classical approaches for global feature importance estimation, and uncover coordination, specialization, and adaptation patterns in MARL. Moreover, they provide crucial insights for the transfer and generalization of action-specific policies.", "arxiv_id": "2607.13655", "arxiv_url": "https://arxiv.org/abs/2607.13655", "authors": ["Celeste Veronese", "Edoardo Zorzi", "Daniele Meli", "Alessandro Farinelli"], "brief": "\u672c\u6587\u63d0\u51fa\u7528\u5f52\u7eb3\u903b\u8f91\u7f16\u7a0b\uff08ILP\uff09\u4ece\u5f3a\u5316\u5b66\u4e60\u7b56\u7565\u4e2d\u63d0\u53d6\u7b26\u53f7\u89c4\u5219\uff0c\u5e76\u5b9a\u4e49\u6fc0\u6d3b\u7387\u3001\u7279\u5f81\u8986\u76d6\u7387\u3001\u53e5\u6cd5\u8ddd\u79bb\u548c\u8bed\u4e49\u8ddd\u79bb\u7b49\u65b0\u578b\u53ef\u89e3\u91ca\u6027\u5ea6\u91cf\u6307\u6807\u3002\u5b9e\u9a8c\u8868\u660e\u8fd9\u4e9b\u6307\u6807\u80fd\u63ed\u793a\u52a8\u4f5c\u7ea7\u5b66\u4e60\u52a8\u6001\u3001\u7ec6\u7c92\u5ea6\u7279\u5f81\u4f5c\u7528\u53ca\u591a\u667a\u80fd\u4f53\u534f\u8c03\u6a21\u5f0f\uff0c\u8d85\u8d8a\u4f20\u7edf\u5168\u5c40\u56de\u62a5\u548c\u7279\u5f81\u91cd\u8981\u6027\u5206\u6790\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13655", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u53ef\u89e3\u91ca\u5f3a\u5316\u5b66\u4e60", "\u5f52\u7eb3\u903b\u8f91\u7f16\u7a0b", "\u7b26\u53f7\u63a8\u7406", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13655v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Explaining Reinforcement Learning Agents via Inductive Logic Programming", "tldr": "\u672c\u6587\u63d0\u51fa\u7528\u5f52\u7eb3\u903b\u8f91\u7f16\u7a0b\uff08ILP\uff09\u4ece\u5f3a\u5316\u5b66\u4e60\u7b56\u7565\u4e2d\u63d0\u53d6\u7b26\u53f7\u89c4\u5219\uff0c\u5e76\u5b9a\u4e49\u6fc0\u6d3b\u7387\u3001\u7279\u5f81\u8986\u76d6\u7387\u3001\u53e5\u6cd5\u8ddd\u79bb\u548c\u8bed\u4e49\u8ddd\u79bb\u7b49\u65b0\u578b\u53ef\u89e3\u91ca\u6027\u5ea6\u91cf\u6307\u6807\u3002\u5b9e\u9a8c\u8868\u660e\u8fd9\u4e9b\u6307\u6807\u80fd\u63ed\u793a\u52a8\u4f5c\u7ea7\u5b66\u4e60\u52a8\u6001\u3001\u7ec6\u7c92\u5ea6\u7279\u5f81\u4f5c\u7528\u53ca\u591a\u667a\u80fd\u4f53\u534f\u8c03\u6a21\u5f0f\uff0c\u8d85\u8d8a\u4f20\u7edf\u5168\u5c40\u56de\u62a5\u548c\u7279\u5f81\u91cd\u8981\u6027\u5206\u6790\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Do vision models see colors the way humans do? Existing evaluations of color representations usually compare them with geometric spaces such as CIELAB or with discrete color labels. These references capture perceptual distance or category membership, but not the graded way in which people organize colors. We evaluate color grounding against a fuzzy perceptual model with 86 graded categories fitted to human survey data. The framework can be applied to any image encoder and measures three complementary properties: category boundaries, category compactness, and graded alignment beyond what color geometry alone can explain. Across eleven Vision Transformer encoders, the category-level results are broadly similar, whereas graded alignment differs substantially. Masked Autoencoders achieve the strongest beyond-geometry alignment, with confidence intervals that do not overlap those of the other encoders. A layer-wise analysis further shows that masked reconstruction preserves this structure toward the output. On natural images, MAE represents surface color globally, while language-supervised models encode color more strongly in relation to the foreground object. These results show that human-like color grounding has several distinct aspects that should not be reduced to a single score.", "arxiv_id": "2607.13647", "arxiv_url": "https://arxiv.org/abs/2607.13647", "authors": ["Ayan Igali", "Pakizar Shamoi"], "brief": "\u7814\u7a76\u8bc4\u4f30\u89c6\u89c9\u6a21\u578b\u7684\u989c\u8272\u8868\u5f81\u662f\u5426\u7b26\u5408\u4eba\u7c7b\u611f\u77e5\u65b9\u5f0f\uff0c\u63d0\u51fa\u57fa\u4e8e86\u4e2a\u6a21\u7cca\u611f\u77e5\u7c7b\u522b\u7684\u8bc4\u4f30\u6846\u67b6\uff0c\u6db5\u76d6\u7c7b\u522b\u8fb9\u754c\u3001\u7d27\u51d1\u6027\u548c\u6e10\u8fdb\u5bf9\u9f50\u4e09\u4e2a\u7ef4\u5ea6\u3002\u5b9e\u9a8c\u53d1\u73b0\u63a9\u7801\u81ea\u7f16\u7801\u5668\uff08MAE\uff09\u5728\u8d85\u8d8a\u51e0\u4f55\u7a7a\u95f4\u7684\u4eba\u7c7b\u5bf9\u9f50\u65b9\u9762\u8868\u73b0\u6700\u4f18\uff0c\u800c\u8bed\u8a00\u76d1\u7763\u6a21\u578b\u5219\u66f4\u503e\u5411\u4e8e\u5c06\u989c\u8272\u4e0e\u524d\u666f\u7269\u4f53\u5173\u8054\u7f16\u7801\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13647", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u6a21\u578b", "\u989c\u8272\u611f\u77e5", "\u89c6\u89c9Transformer", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13647v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Color Geometry: Evaluating Human-Like Color Representations in Vision Models", "tldr": "\u7814\u7a76\u8bc4\u4f30\u89c6\u89c9\u6a21\u578b\u7684\u989c\u8272\u8868\u5f81\u662f\u5426\u7b26\u5408\u4eba\u7c7b\u611f\u77e5\u65b9\u5f0f\uff0c\u63d0\u51fa\u57fa\u4e8e86\u4e2a\u6a21\u7cca\u611f\u77e5\u7c7b\u522b\u7684\u8bc4\u4f30\u6846\u67b6\uff0c\u6db5\u76d6\u7c7b\u522b\u8fb9\u754c\u3001\u7d27\u51d1\u6027\u548c\u6e10\u8fdb\u5bf9\u9f50\u4e09\u4e2a\u7ef4\u5ea6\u3002\u5b9e\u9a8c\u53d1\u73b0\u63a9\u7801\u81ea\u7f16\u7801\u5668\uff08MAE\uff09\u5728\u8d85\u8d8a\u51e0\u4f55\u7a7a\u95f4\u7684\u4eba\u7c7b\u5bf9\u9f50\u65b9\u9762\u8868\u73b0\u6700\u4f18\uff0c\u800c\u8bed\u8a00\u76d1\u7763\u6a21\u578b\u5219\u66f4\u503e\u5411\u4e8e\u5c06\u989c\u8272\u4e0e\u524d\u666f\u7269\u4f53\u5173\u8054\u7f16\u7801\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent advances in 3D human reconstruction have improved overall performance, yet current models still fail in the most challenging real-world scenarios. They often produce unstable geometry, inaccurate limb articulation and unreliable predictions under depth ambiguity or self-occlusion. A key reason is that existing datasets still lack the combination of high-resolution images, high-precision annotations and diverse whole-body motions required to support robust reconstruction. To address this gap, we present Human4K, a large-scale 4K multi-view whole-body human reconstruction dataset with mocap-accurate SMPL-X annotations. Human4K contains over six million 4K images captured by an eight-view high-resolution camera system synchronized with a professional Vicon motion capture setup, covering 11 subjects performing complex, highly articulated and strongly self-occluded full-body motions. All sequences are processed by a Motion-Retargeting and Refinement Module (MRRM) to ensure precise alignment for the full body and extremities. Experimental results show that training with Human4K consistently improves whole-body reconstruction on standard benchmarks, with particularly large gains for hands, feet and depth-ambiguous limb configurations.", "arxiv_id": "2607.13646", "arxiv_url": "https://arxiv.org/abs/2607.13646", "authors": ["Tianshun Han", "Ziyu Shi", "Lijian Liu", "Ajian Liu", "Benjia Zhou", "Hugo Jair Escalante", "Yanyan Liang", "Sergio Escalera", "Zhen Lei", "Jun Wan"], "brief": "\u63d0\u51faHuman4K\u6570\u636e\u96c6\uff0c\u5305\u542b\u8d85\u8fc7600\u4e07\u5f204K\u591a\u89c6\u89d2\u56fe\u50cf\uff0c\u914d\u5408\u4e13\u4e1a\u52a8\u4f5c\u6355\u6349\u7cfb\u7edf\u63d0\u4f9b\u9ad8\u7cbe\u5ea6SMPL-X\u6807\u6ce8\uff0c\u8986\u76d611\u540d\u53d7\u8bd5\u8005\u7684\u590d\u6742\u5168\u8eab\u52a8\u4f5c\u3002\u5728\u8be5\u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\u540e\uff0c\u5168\u8eab\u4e09\u7ef4\u91cd\u5efa\u6027\u80fd\u5728\u6807\u51c6\u57fa\u51c6\u4e0a\u663e\u8457\u63d0\u5347\uff0c\u5c24\u5176\u5728\u624b\u90e8\u3001\u811a\u90e8\u53ca\u6df1\u5ea6\u6a21\u7cca\u80a2\u4f53\u914d\u7f6e\u65b9\u9762\u6539\u5584\u660e\u663e\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13646", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e09\u7ef4\u4eba\u4f53\u91cd\u5efa", "\u6570\u636e\u96c6", "\u52a8\u4f5c\u6355\u6349", "\u591a\u89c6\u89d2"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13646v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Human4K: A Large-Scale 4K Multi-View Mocap Dataset for Whole-Body 3D Human Reconstruction", "tldr": "\u63d0\u51faHuman4K\u6570\u636e\u96c6\uff0c\u5305\u542b\u8d85\u8fc7600\u4e07\u5f204K\u591a\u89c6\u89d2\u56fe\u50cf\uff0c\u914d\u5408\u4e13\u4e1a\u52a8\u4f5c\u6355\u6349\u7cfb\u7edf\u63d0\u4f9b\u9ad8\u7cbe\u5ea6SMPL-X\u6807\u6ce8\uff0c\u8986\u76d611\u540d\u53d7\u8bd5\u8005\u7684\u590d\u6742\u5168\u8eab\u52a8\u4f5c\u3002\u5728\u8be5\u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\u540e\uff0c\u5168\u8eab\u4e09\u7ef4\u91cd\u5efa\u6027\u80fd\u5728\u6807\u51c6\u57fa\u51c6\u4e0a\u663e\u8457\u63d0\u5347\uff0c\u5c24\u5176\u5728\u624b\u90e8\u3001\u811a\u90e8\u53ca\u6df1\u5ea6\u6a21\u7cca\u80a2\u4f53\u914d\u7f6e\u65b9\u9762\u6539\u5584\u660e\u663e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Sampling multiple solutions and returning the majority answer is among the most reliable ways to improve the reasoning accuracy of large language models without labels, and a growing family of methods converts this consensus signal into training supervision. However, existing approaches use consensus only in restricted forms: as a filter that selects solutions for fine-tuning, as a preference between answers, or as a scalar reward for reinforcement learning, discarding most of the information that the agreeing solutions contain. We present CANON (Consensus-ANchored self-distillatiON), a label-free training method that turns consensus into dense, token-level supervision. For each unlabeled prompt, CANON samples multiple solutions, extracts the majority answer, and conditions a frozen snapshot of the model on a solution that reaches it; this consensus-anchored teacher then supervises the model on its own rollouts at every token. Experiments on mathematical and scientific reasoning benchmarks show that CANON improves pass@1 by up to 12 points, outperforming label-free reinforcement learning by 6 points at a seventh of its compute and approaching a teacher conditioned on gold solutions; trained on pooled unlabeled data, it transfers to held-out benchmarks, matching training methods that use gold labels. Analysis suggests that the improvements are not pure distribution sharpening: after training, the model solves problems it previously never solved in 32 attempts, and its majority vote itself becomes more accurate.", "arxiv_id": "2607.13643", "arxiv_url": "https://arxiv.org/abs/2607.13643", "authors": ["John Gkountouras", "Josip Juki\u0107", "Ivan Titov"], "brief": "\u63d0\u51faCANON\u65b9\u6cd5\uff0c\u5c06\u591a\u6570\u6295\u7968\u5171\u8bc6\u8f6c\u5316\u4e3a\u5bc6\u96c6\u7684token\u7ea7\u81ea\u84b8\u998f\u76d1\u7763\u4fe1\u53f7\uff0c\u65e0\u9700\u6807\u7b7e\u5373\u53ef\u8bad\u7ec3\u5927\u8bed\u8a00\u6a21\u578b\u3002\u5728\u6570\u5b66\u548c\u79d1\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\uff0cpass@1\u63d0\u5347\u6700\u9ad812\u4e2a\u767e\u5206\u70b9\uff0c\u4ee51/7\u7684\u8ba1\u7b97\u91cf\u8d85\u8d8a\u65e0\u6807\u7b7e\u5f3a\u5316\u5b66\u4e606\u4e2a\u767e\u5206\u70b9\uff0c\u6548\u679c\u63a5\u8fd1\u4f7f\u7528\u91d1\u6807\u51c6\u7b54\u6848\u7684\u6559\u5e08\u6a21\u578b\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13643", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u84b8\u998f", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406", "\u65e0\u6807\u7b7e\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13643v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Consensus as Privileged Context for Label-Free Self-Distillation", "tldr": "\u63d0\u51faCANON\u65b9\u6cd5\uff0c\u5c06\u591a\u6570\u6295\u7968\u5171\u8bc6\u8f6c\u5316\u4e3a\u5bc6\u96c6\u7684token\u7ea7\u81ea\u84b8\u998f\u76d1\u7763\u4fe1\u53f7\uff0c\u65e0\u9700\u6807\u7b7e\u5373\u53ef\u8bad\u7ec3\u5927\u8bed\u8a00\u6a21\u578b\u3002\u5728\u6570\u5b66\u548c\u79d1\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\uff0cpass@1\u63d0\u5347\u6700\u9ad812\u4e2a\u767e\u5206\u70b9\uff0c\u4ee51/7\u7684\u8ba1\u7b97\u91cf\u8d85\u8d8a\u65e0\u6807\u7b7e\u5f3a\u5316\u5b66\u4e606\u4e2a\u767e\u5206\u70b9\uff0c\u6548\u679c\u63a5\u8fd1\u4f7f\u7528\u91d1\u6807\u51c6\u7b54\u6848\u7684\u6559\u5e08\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Natural language interaction provides an intuitive way for non-expert users to communicate with robotic platforms. However, transforming user requests into executable navigation actions remains a challenging task, requiring the integration of language understanding, environment perception, and autonomous navigation. This work presents a language-driven navigation framework that enables mobile robots to interpret user requests in natural language to move the robot to a destination and autonomously navigate towards it. The framework is composed of modular ROS 2 components that cooperate to transform natural language instructions into navigation actions. Given a natural language request referring to a target in the environment (e.g., \"go to the mail box\"), the system identifies the referenced object, estimates its position using RGB-D data, and generates a navigation goal, which is then executed through the ROS 2 Nav2 navigation stack. The ROS 2-based implementation facilitates portability across different robotic platforms, requiring only the configuration of the corresponding topics and services. The system is evaluated in both simulation and real-world scenarios using a TurtleBot3 Waffle and a Unitree Go2 robot with a RealSense camera. Experimental results show that the framework successfully interprets both direct commands and contextual requests, generates meaningful natural-language feedback, and navigates towards the desired target. These results demonstrate the feasibility of combining semantic perception and autonomous navigation to provide an intuitive human-robot interaction paradigm. Code will be released as open source upon acceptance.", "arxiv_id": "2607.13624", "arxiv_url": "https://arxiv.org/abs/2607.13624", "authors": ["Jose Mart\u00ednez-Fajardo", "Pablo Pueyo", "Fernando Caballero", "Luis Merino"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u57fa\u4e8e\u81ea\u7136\u8bed\u8a00\u9a71\u52a8\u7684\u79fb\u52a8\u673a\u5668\u4eba\u5bfc\u822a\u6846\u67b6\uff0c\u901a\u8fc7RGB-D\u611f\u77e5\u8bc6\u522b\u76ee\u6807\u7269\u4f53\u5e76\u4f30\u8ba1\u5176\u4f4d\u7f6e\uff0c\u7ed3\u5408ROS 2 Nav2\u5bfc\u822a\u6808\u5b9e\u73b0\u7aef\u5230\u7aef\u7684\u8bed\u4e49\u5bfc\u822a\u3002\u5728\u4eff\u771f\u548c\u771f\u5b9e\u673a\u5668\u4eba\uff08TurtleBot3\u548cUnitree Go2\uff09\u4e0a\u9a8c\u8bc1\u4e86\u7cfb\u7edf\u80fd\u6709\u6548\u89e3\u6790\u76f4\u63a5\u6307\u4ee4\u548c\u4e0a\u4e0b\u6587\u8bf7\u6c42\u5e76\u5bfc\u822a\u81f3\u76ee\u6807\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13624", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u8bed\u4e49\u5bfc\u822a", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u4eba\u673a\u4ea4\u4e92", "\u79fb\u52a8\u673a\u5668\u4eba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13624v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "From Language to Navigation Goals: A Vision-Language Approach for Semantic Navigation of Mobile Robots Using RGB-D Perception", "tldr": "\u63d0\u51fa\u4e00\u4e2a\u57fa\u4e8e\u81ea\u7136\u8bed\u8a00\u9a71\u52a8\u7684\u79fb\u52a8\u673a\u5668\u4eba\u5bfc\u822a\u6846\u67b6\uff0c\u901a\u8fc7RGB-D\u611f\u77e5\u8bc6\u522b\u76ee\u6807\u7269\u4f53\u5e76\u4f30\u8ba1\u5176\u4f4d\u7f6e\uff0c\u7ed3\u5408ROS 2 Nav2\u5bfc\u822a\u6808\u5b9e\u73b0\u7aef\u5230\u7aef\u7684\u8bed\u4e49\u5bfc\u822a\u3002\u5728\u4eff\u771f\u548c\u771f\u5b9e\u673a\u5668\u4eba\uff08TurtleBot3\u548cUnitree Go2\uff09\u4e0a\u9a8c\u8bc1\u4e86\u7cfb\u7edf\u80fd\u6709\u6548\u89e3\u6790\u76f4\u63a5\u6307\u4ee4\u548c\u4e0a\u4e0b\u6587\u8bf7\u6c42\u5e76\u5bfc\u822a\u81f3\u76ee\u6807\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Language-guided human following is an important capability for embodied agents, but existing benchmarks typically assume that the target person is visible at the start of an episode. This setting simplifies the problem and overlooks a more realistic requirement: an agent often needs to first find a language-described target and then persistently follow that target in a dynamic environment. While recent work has started to study human search, existing settings are typically evaluated in task-specific scenarios and often rely on stronger prior knowledge of the environment. Moreover, they usually treat searching and following as separate tasks and still lack a unified benchmark for systematic evaluation. To address these limitations, we introduce the Unified Embodied Seeking and Following Benchmark (UESF-Bench), a large-scale and diverse benchmark for embodied human seeking and following. The benchmark requires agents to handle semantic-guided exploration, reliable behavior switching and recovery, and delayed identity grounding. To this end, we propose SeekFollow-VLA, a vision-language-action framework with a task-driven routing mechanism for latent phase inference and transition modeling between seeking and following. Experimental results show that SeekFollow-VLA achieves clear improvements over both single-head and dual-head baselines across single-person and multi-person environments, establishing a baseline for unified embodied seek-and-follow.", "arxiv_id": "2607.13621", "arxiv_url": "https://arxiv.org/abs/2607.13621", "authors": ["Kun Yu", "Jianhua Yang", "Yixiang Chen", "Changwei Wang", "Hongyuan Yu", "Yan Huang", "Fushuo Huo", "Ya Jing", "Zhumin Chen", "Keji He"], "brief": "\u63d0\u51faUESF-Bench\u57fa\u51c6\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u5148\u901a\u8fc7\u8bed\u8a00\u63cf\u8ff0\u627e\u5230\u76ee\u6807\u4eba\u7269\u518d\u6301\u7eed\u8ddf\u968f\uff0c\u586b\u8865\u4e86\u641c\u7d22\u4e0e\u8ddf\u968f\u5206\u79bb\u8bc4\u4f30\u7684\u7a7a\u767d\u3002\u540c\u65f6\u63d0\u51faSeekFollow-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u4efb\u52a1\u9a71\u52a8\u8def\u7531\u673a\u5236\u5b9e\u73b0\u641c\u7d22\u4e0e\u8ddf\u968f\u9636\u6bb5\u7684\u63a8\u65ad\u4e0e\u5207\u6362\uff0c\u5728\u5355\u4eba\u548c\u591a\u4eba\u73af\u5883\u4e2d\u5747\u4f18\u4e8e\u57fa\u7ebf\u65b9\u6cd5\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13621", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5177\u8eab\u667a\u80fd\u4f53", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u76ee\u6807\u8ddf\u968f", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13621v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "UESF-Bench: Benchmarking and Probing for Unified Embodied Seeking and Following", "tldr": "\u63d0\u51faUESF-Bench\u57fa\u51c6\uff0c\u8981\u6c42\u667a\u80fd\u4f53\u5148\u901a\u8fc7\u8bed\u8a00\u63cf\u8ff0\u627e\u5230\u76ee\u6807\u4eba\u7269\u518d\u6301\u7eed\u8ddf\u968f\uff0c\u586b\u8865\u4e86\u641c\u7d22\u4e0e\u8ddf\u968f\u5206\u79bb\u8bc4\u4f30\u7684\u7a7a\u767d\u3002\u540c\u65f6\u63d0\u51faSeekFollow-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u4efb\u52a1\u9a71\u52a8\u8def\u7531\u673a\u5236\u5b9e\u73b0\u641c\u7d22\u4e0e\u8ddf\u968f\u9636\u6bb5\u7684\u63a8\u65ad\u4e0e\u5207\u6362\uff0c\u5728\u5355\u4eba\u548c\u591a\u4eba\u73af\u5883\u4e2d\u5747\u4f18\u4e8e\u57fa\u7ebf\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Joint-Embedding Predictive Architectures (JEPAs) are the dominant design for latent world models, yet they are usually justified by empirical performance rather than a normative principle. We show that the choice of anti-collapse regulariser determines whether a JEPA\u0027s training objective, a prediction loss plus a weighted embedding regulariser, is a valid Active Inference (AIF) variational free energy. We organise four non-contrastive regularisers (VICReg, LogDet, PairDist, and SIGReg) into an entropy-estimator hierarchy indexed by a prior-miscalibration gap, and show that the gap\u0027s sign, whether the estimator bounds the latent entropy from above or below, decides whether the AIF surprise bound survives: VICReg and LogDet are unsafe upper bounds, PairDist a safe lower bound, and SIGReg eliminates the gap. We then prove a correspondence theorem: under the standard constant-noise encoder model and successful SIGReg enforcement (isotropic-Gaussian embeddings), the gap vanishes, the objective becomes an exact information bottleneck, the surprise bound is preserved, and the latent goal cost becomes an exact proxy for AIF pragmatic value, whereas VICReg leaves an irreducible second-order anisotropy term. We extend the correspondence to multi-step expected free energy, ensemble epistemic value, and a learned-policy regime, and we identify the one AIF term no current JEPA world model computes: the state-epistemic value, a future-state coverage signal. The predictions differ in kind, not degree, and are stated here as theoretical consequences left for empirical test in separate work; full proofs are in Appendix A, and the algebraic core of every result is machine-verified in Lean 4 (Appendix D).", "arxiv_id": "2607.13612", "arxiv_url": "https://arxiv.org/abs/2607.13612", "authors": ["Fabio Arnez", "Alexandra Gomez-Villa"], "brief": "\u672c\u6587\u4ece\u4e3b\u52a8\u63a8\u65ad\uff08Active Inference\uff09\u53d8\u5206\u81ea\u7531\u80fd\u89c6\u89d2\uff0c\u5bf9\u8054\u5408\u5d4c\u5165\u9884\u6d4b\u67b6\u6784\uff08JEPA\uff09\u4e16\u754c\u6a21\u578b\u8fdb\u884c\u7406\u8bba\u5206\u6790\uff0c\u8bc1\u660e\u6b63\u5219\u5316\u5668\u7684\u9009\u62e9\u51b3\u5b9a\u8bad\u7ec3\u76ee\u6807\u662f\u5426\u6784\u6210\u6709\u6548\u7684\u53d8\u5206\u81ea\u7531\u80fd\u3002\u7814\u7a76\u8868\u660eSIGReg\u6b63\u5219\u5316\u5668\u80fd\u6d88\u9664\u5148\u9a8c\u8bef\u6821\u51c6\u95f4\u9699\uff0c\u4f7f\u76ee\u6807\u6210\u4e3a\u7cbe\u786e\u7684\u4fe1\u606f\u74f6\u9888\uff0c\u800cVICReg\u7b49\u65b9\u6cd5\u5b58\u5728\u4e0d\u53ef\u6d88\u9664\u7684\u5404\u5411\u5f02\u6027\u8bef\u5dee\u9879\uff0c\u5e76\u6307\u51fa\u5f53\u524dJEPA\u6a21\u578b\u7f3a\u5931\u7684\u5173\u952eAIF\u9879\uff1a\u72b6\u6001\u8ba4\u77e5\u4ef7\u503c\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13612", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u4e3b\u52a8\u63a8\u65ad", "\u8868\u793a\u5b66\u4e60", "\u4fe1\u606f\u74f6\u9888"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13612v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The SIGReg Objective as Variational Free Energy: A Theoretical Active-Inference Account of JEPA World Models", "tldr": "\u672c\u6587\u4ece\u4e3b\u52a8\u63a8\u65ad\uff08Active Inference\uff09\u53d8\u5206\u81ea\u7531\u80fd\u89c6\u89d2\uff0c\u5bf9\u8054\u5408\u5d4c\u5165\u9884\u6d4b\u67b6\u6784\uff08JEPA\uff09\u4e16\u754c\u6a21\u578b\u8fdb\u884c\u7406\u8bba\u5206\u6790\uff0c\u8bc1\u660e\u6b63\u5219\u5316\u5668\u7684\u9009\u62e9\u51b3\u5b9a\u8bad\u7ec3\u76ee\u6807\u662f\u5426\u6784\u6210\u6709\u6548\u7684\u53d8\u5206\u81ea\u7531\u80fd\u3002\u7814\u7a76\u8868\u660eSIGReg\u6b63\u5219\u5316\u5668\u80fd\u6d88\u9664\u5148\u9a8c\u8bef\u6821\u51c6\u95f4\u9699\uff0c\u4f7f\u76ee\u6807\u6210\u4e3a\u7cbe\u786e\u7684\u4fe1\u606f\u74f6\u9888\uff0c\u800cVICReg\u7b49\u65b9\u6cd5\u5b58\u5728\u4e0d\u53ef\u6d88\u9664\u7684\u5404\u5411\u5f02\u6027\u8bef\u5dee\u9879\uff0c\u5e76\u6307\u51fa\u5f53\u524dJEPA\u6a21\u578b\u7f3a\u5931\u7684\u5173\u952eAIF\u9879\uff1a\u72b6\u6001\u8ba4\u77e5\u4ef7\u503c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-Language-Action (VLA) models inherit rich semantic representations from pretrained Vision-Language Models, yet fine-tuning on limited robot demonstrations degrades this structure and undermines generalization. A fundamental question therefore arises: what constitutes a good action representation? Inspired by the mirror neuron theory\u0027s insight that observation and execution share an intention-level encoding, we examine whether a robot\u0027s action representations preserve the semantic structure captured by pretrained encoders. Systematic probing confirms that this structure erodes during finetuning, and that its quality synchronizes with both task success and out-of-distribution generalization. We further introduce a plug-and-play method that anchors action representations to a semantic manifold while decomposing representations into a shared semantic channel and a private channel, all discarded at inference, leaving the deployed model unchanged. Validated on different VLA backbones across simulation and real-world benchmarks, our method yields up to +18.7% on real-world in-distribution tasks and +21.5% on out-of-distribution generalization.", "arxiv_id": "2607.13597", "arxiv_url": "https://arxiv.org/abs/2607.13597", "authors": ["Yuan Xu", "Youheng Shi", "Chengyang Li", "Wentao Zhu", "Yizhou Wang"], "brief": "\u9488\u5bf9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u5728\u673a\u5668\u4eba\u5fae\u8c03\u65f6\u8bed\u4e49\u7ed3\u6784\u9000\u5316\u7684\u95ee\u9898\uff0c\u53d7\u955c\u50cf\u795e\u7ecf\u5143\u7406\u8bba\u542f\u53d1\uff0c\u63d0\u51fa\u4e00\u79cd\u5373\u63d2\u5373\u7528\u65b9\u6cd5\u5c06\u52a8\u4f5c\u8868\u793a\u951a\u5b9a\u5230\u8bed\u4e49\u6d41\u5f62\uff0c\u540c\u65f6\u5206\u89e3\u4e3a\u5171\u4eab\u8bed\u4e49\u901a\u9053\u548c\u79c1\u6709\u901a\u9053\uff08\u63a8\u7406\u65f6\u4e22\u5f03\uff09\u3002\u5728\u4eff\u771f\u548c\u771f\u5b9e\u4e16\u754c\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u5206\u5e03\u5185\u4efb\u52a1\u63d0\u5347\u6700\u9ad8+18.7%\uff0c\u5206\u5e03\u5916\u6cdb\u5316\u63d0\u5347\u6700\u9ad8+21.5%\u3002", "categories": ["cs.RO", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13597", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u673a\u5668\u4eba\u5b66\u4e60", "\u8bed\u4e49\u8868\u793a", "\u6cdb\u5316\u80fd\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13597v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Semantic Anchoring for Robotic Action Representations", "tldr": "\u9488\u5bf9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u5728\u673a\u5668\u4eba\u5fae\u8c03\u65f6\u8bed\u4e49\u7ed3\u6784\u9000\u5316\u7684\u95ee\u9898\uff0c\u53d7\u955c\u50cf\u795e\u7ecf\u5143\u7406\u8bba\u542f\u53d1\uff0c\u63d0\u51fa\u4e00\u79cd\u5373\u63d2\u5373\u7528\u65b9\u6cd5\u5c06\u52a8\u4f5c\u8868\u793a\u951a\u5b9a\u5230\u8bed\u4e49\u6d41\u5f62\uff0c\u540c\u65f6\u5206\u89e3\u4e3a\u5171\u4eab\u8bed\u4e49\u901a\u9053\u548c\u79c1\u6709\u901a\u9053\uff08\u63a8\u7406\u65f6\u4e22\u5f03\uff09\u3002\u5728\u4eff\u771f\u548c\u771f\u5b9e\u4e16\u754c\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u5206\u5e03\u5185\u4efb\u52a1\u63d0\u5347\u6700\u9ad8+18.7%\uff0c\u5206\u5e03\u5916\u6cdb\u5316\u63d0\u5347\u6700\u9ad8+21.5%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Automatic symbolic music analysis has made substantial progress, yet existing systems are typically designed for a single mode of use, such as full-score prediction, and therefore do not match the broader range of operations that arise in analysis workflows, including partial completion, local correction, and iterative refinement. As a result, there remains a gap between strong benchmark models and systems that can support interactive analytical use. We present a unified framework for symbolic Roman-numeral (RN) analysis that narrows this gap by combining strong predictive performance with direct support for constrained completion and revision. The method is designed to provide a practical trade-off between accuracy and interactive responsiveness by computing expensive pretrained representations once and reusing them during iterative refinement, making powerful pretrained models more amenable to interactive settings. It supports complete score analysis, targeted revision of existing labels, and inference of missing annotations from partial context through a shared modeling framework. Experiments on Dilemmadata, the largest and most heterogeneous benchmark of its kind, show that the proposed approach is a strong RN-analysis baseline while also supporting masked completion from partial labels. Together with a prototype interface for multi-level candidate inspection and editing, these results position automatic RN analysis not only as a prediction problem, but also as a foundation for future interactive tools for music analysis.", "arxiv_id": "2607.13587", "arxiv_url": "https://arxiv.org/abs/2607.13587", "authors": ["Emmanouil Karystinaios", "Johannes Hentschel", "Markus Neuwirth", "Gerhard Widmer"], "brief": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u7edf\u4e00\u7684\u7b26\u53f7\u97f3\u4e50\u7f57\u9a6c\u6570\u5b57\u548c\u58f0\u5206\u6790\u6846\u67b6\uff0c\u652f\u6301\u5b8c\u6574\u4e50\u8c31\u9884\u6d4b\u3001\u5c40\u90e8\u4fee\u6b63\u548c\u8fed\u4ee3\u7cbe\u5316\u7b49\u591a\u79cd\u4ea4\u4e92\u64cd\u4f5c\u6a21\u5f0f\u3002\u901a\u8fc7\u4e00\u6b21\u6027\u8ba1\u7b97\u9884\u8bad\u7ec3\u8868\u793a\u5e76\u5728\u8fed\u4ee3\u4e2d\u590d\u7528\uff0c\u5728\u51c6\u786e\u6027\u4e0e\u4ea4\u4e92\u54cd\u5e94\u901f\u5ea6\u4e4b\u95f4\u53d6\u5f97\u5e73\u8861\uff0c\u5728\u6700\u5927\u5f02\u6784\u57fa\u51c6Dilemmadata\u4e0a\u8868\u73b0\u4f18\u5f02\uff0c\u5e76\u914d\u5957\u539f\u578b\u4ea4\u4e92\u754c\u9762\u3002", "categories": ["cs.SD", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13587", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7b26\u53f7\u97f3\u4e50\u5206\u6790", "\u4ea4\u4e92\u5f0f\u7cfb\u7edf", "\u548c\u58f0\u5206\u6790", "\u9884\u8bad\u7ec3\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13587v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "From Prediction to Collaboration: Interactive Symbolic Music Analysis", "tldr": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u7edf\u4e00\u7684\u7b26\u53f7\u97f3\u4e50\u7f57\u9a6c\u6570\u5b57\u548c\u58f0\u5206\u6790\u6846\u67b6\uff0c\u652f\u6301\u5b8c\u6574\u4e50\u8c31\u9884\u6d4b\u3001\u5c40\u90e8\u4fee\u6b63\u548c\u8fed\u4ee3\u7cbe\u5316\u7b49\u591a\u79cd\u4ea4\u4e92\u64cd\u4f5c\u6a21\u5f0f\u3002\u901a\u8fc7\u4e00\u6b21\u6027\u8ba1\u7b97\u9884\u8bad\u7ec3\u8868\u793a\u5e76\u5728\u8fed\u4ee3\u4e2d\u590d\u7528\uff0c\u5728\u51c6\u786e\u6027\u4e0e\u4ea4\u4e92\u54cd\u5e94\u901f\u5ea6\u4e4b\u95f4\u53d6\u5f97\u5e73\u8861\uff0c\u5728\u6700\u5927\u5f02\u6784\u57fa\u51c6Dilemmadata\u4e0a\u8868\u73b0\u4f18\u5f02\uff0c\u5e76\u914d\u5957\u539f\u578b\u4ea4\u4e92\u754c\u9762\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Enabling quadrupedal robots to traverse complex terrains-from rugged outdoor environments to urban landscapes-requires seamless integration of multiple motor skills, smooth transitions between gaits, and high-speed perceptive locomotion using only onboard sensors. We present APT-RL (Action Pretrained Transformer-based Reinforcement Learning), a unified framework that enables multi-skill locomotion to achieve high-speed traversal in complex environments through autonomous skill transitions utilizing only onboard perception and computation. Our approach generates large-scale, feature-rich 2D motion datasets through trajectory optimization with simplified dynamics. These datasets enable training of diverse, reusable locomotion skills that transfer effectively to a real quadruped robot operating on complex uneven terrains. The resulting high-quality skills serve as strong priors for efficient learning of complex downstream tasks and extend naturally to 3D environments, enabling smooth, high-speed multi-skill locomotion in deployed policy. Real-world experiments demonstrate the framework\u0027s capabilities: the robot performs agile maneuvers through complex indoor obstacles and outdoor wild environments, including dynamic drop-down maneuvers that reach instantaneous peak speeds of up to 6 meters per second. A single onboard policy enables robust traversal of diverse obstacles, including stairs, hurdles, stepping stones, gaps, and fallen branches, demonstrating the versatility and effectiveness of our approach.", "arxiv_id": "2607.13579", "arxiv_url": "https://arxiv.org/abs/2607.13579", "authors": ["Jun-Gill Kang", "Jaehyun Park", "Tae-Gyu Song", "Joon-Ha Kim", "Seungwoo Hong", "Hae-Won Park"], "brief": "\u63d0\u51faAPT-RL\u6846\u67b6\uff0c\u901a\u8fc7\u8f68\u8ff9\u4f18\u5316\u751f\u6210\u5927\u89c4\u6a212D\u8fd0\u52a8\u6570\u636e\u96c6\u9884\u8bad\u7ec3\u591a\u6280\u80fd\u8fd0\u52a8\u5148\u9a8c\uff0c\u518d\u7ed3\u5408\u5f3a\u5316\u5b66\u4e60\u5b9e\u73b0\u56db\u8db3\u673a\u5668\u4eba\u5728\u590d\u6742\u91ce\u5916\u73af\u5883\u4e2d\u7684\u81ea\u4e3b\u591a\u6280\u80fd\u5207\u6362\u4e0e\u9ad8\u901f\u611f\u77e5\u8fd0\u52a8\uff0c\u5355\u4e00\u677f\u8f7d\u7b56\u7565\u53ef\u5e94\u5bf9\u697c\u68af\u3001\u8de8\u680f\u3001\u95f4\u9699\u7b49\u591a\u79cd\u969c\u788d\uff0c\u5cf0\u503c\u901f\u5ea6\u8fbe6m/s\u3002", "categories": ["cs.RO", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13579", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56db\u8db3\u673a\u5668\u4eba", "\u5f3a\u5316\u5b66\u4e60", "\u8fd0\u52a8\u63a7\u5236", "\u591a\u6280\u80fd\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13579v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Agile perceptive multi-skill locomotion for quadrupedal robots in the wild", "tldr": "\u63d0\u51faAPT-RL\u6846\u67b6\uff0c\u901a\u8fc7\u8f68\u8ff9\u4f18\u5316\u751f\u6210\u5927\u89c4\u6a212D\u8fd0\u52a8\u6570\u636e\u96c6\u9884\u8bad\u7ec3\u591a\u6280\u80fd\u8fd0\u52a8\u5148\u9a8c\uff0c\u518d\u7ed3\u5408\u5f3a\u5316\u5b66\u4e60\u5b9e\u73b0\u56db\u8db3\u673a\u5668\u4eba\u5728\u590d\u6742\u91ce\u5916\u73af\u5883\u4e2d\u7684\u81ea\u4e3b\u591a\u6280\u80fd\u5207\u6362\u4e0e\u9ad8\u901f\u611f\u77e5\u8fd0\u52a8\uff0c\u5355\u4e00\u677f\u8f7d\u7b56\u7565\u53ef\u5e94\u5bf9\u697c\u68af\u3001\u8de8\u680f\u3001\u95f4\u9699\u7b49\u591a\u79cd\u969c\u788d\uff0c\u5cf0\u503c\u901f\u5ea6\u8fbe6m/s\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Maneuvering target tracking in three-dimensional space remains a challenging problem due to complex motion dynamics and model mismatch. To address this, this paper proposes a hybrid model/data-driven algorithm named IMMNet, which integrates the interpretable structure of the interacting multiple model (IMM) algorithm with learnable neural components. Unlike end-to-end black-box methods, the proposed IMMNet algorithm not only can preserve the Bayesian inference mechanism that is essential for real-time radar applications, but also can adaptively learn motion patterns and noise characteristics from data. Extensive experiments demonstrate that the proposed IMMNet algorithm consistently outperforms the existing algorithms across various scenarios, validating it as a robust, interpretable, and practical solution for maneuvering target tracking.", "arxiv_id": "2607.13573", "arxiv_url": "https://arxiv.org/abs/2607.13573", "authors": ["Yixuan Zhao", "Chaoqun Yang", "Lin Gao", "Yongxiao Tian", "Ting Yuan"], "brief": "\u63d0\u51faIMMNet\u6df7\u5408\u7b97\u6cd5\uff0c\u5c06\u4ea4\u4e92\u591a\u6a21\u578b\uff08IMM\uff09\u7b97\u6cd5\u7684\u53ef\u89e3\u91ca\u7ed3\u6784\u4e0e\u795e\u7ecf\u7f51\u7edc\u7ec4\u4ef6\u878d\u5408\uff0c\u7528\u4e8e\u4e09\u7ef4\u7a7a\u95f4\u673a\u52a8\u76ee\u6807\u8ddf\u8e2a\u3002\u5b9e\u9a8c\u8868\u660eIMMNet\u5728\u591a\u79cd\u573a\u666f\u4e0b\u4f18\u4e8e\u73b0\u6709\u7b97\u6cd5\uff0c\u517c\u5177\u9c81\u68d2\u6027\u3001\u53ef\u89e3\u91ca\u6027\u548c\u5b9e\u7528\u6027\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13573", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u76ee\u6807\u8ddf\u8e2a", "\u6a21\u578b\u4e0e\u6570\u636e\u878d\u5408", "\u8d1d\u53f6\u65af\u63a8\u65ad", "\u795e\u7ecf\u7f51\u7edc"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.13573v1", "published_at": "2026-07-15", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "IMMNet: Hybrid Fusion of Model-based and Data-driven Approaches for Maneuvering Target Tracking", "tldr": "\u63d0\u51faIMMNet\u6df7\u5408\u7b97\u6cd5\uff0c\u5c06\u4ea4\u4e92\u591a\u6a21\u578b\uff08IMM\uff09\u7b97\u6cd5\u7684\u53ef\u89e3\u91ca\u7ed3\u6784\u4e0e\u795e\u7ecf\u7f51\u7edc\u7ec4\u4ef6\u878d\u5408\uff0c\u7528\u4e8e\u4e09\u7ef4\u7a7a\u95f4\u673a\u52a8\u76ee\u6807\u8ddf\u8e2a\u3002\u5b9e\u9a8c\u8868\u660eIMMNet\u5728\u591a\u79cd\u573a\u666f\u4e0b\u4f18\u4e8e\u73b0\u6709\u7b97\u6cd5\uff0c\u517c\u5177\u9c81\u68d2\u6027\u3001\u53ef\u89e3\u91ca\u6027\u548c\u5b9e\u7528\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Sound event detection relies on frame-level strong labels whose annotation is expensive. Active learning addresses this problem by selecting the audio segments whose labels help the classifier most. One of the prevailing acquisition strategies for this task, mismatch-first farthest-traversal (MFFT), combines the disagreement between two classifiers and the diversity of the selected segments through hard sequential decisions. It selects whole groups of high-disagreement segments first and spreads only the remaining budget by farthest traversal. On two multi-label datasets we show that this design is blind to the similarity among the selected segments and fails under low budgets, with every mismatch-first variant ending below the plain geometric strategy it builds on. We propose mismatch-weighted facility location (MW-FL), which spends the entire budget through a disagreement-weighted coverage objective that penalizes similarity among the selected segments. The disagreement signal from MFFT is used to obtain the nonnegative weights of this facility-location objective, without introducing hyperparameters. Experiments across two geometric mechanisms with three ways of using disagreement show that coverage of the selected segments is the dominant factor, hard disagreement gating of selection is harmful on both mechanisms, and soft disagreement weighting helps on top of coverage. MW-FL attains the best area under the learning curve on both datasets.", "arxiv_id": "2607.13571", "arxiv_url": "https://arxiv.org/abs/2607.13571", "authors": ["Shiqi Zhang", "Tuomas Virtanen"], "brief": "\u9488\u5bf9\u58f0\u97f3\u4e8b\u4ef6\u68c0\u6d4b\u4e2d\u5e27\u7ea7\u6807\u6ce8\u4ee3\u4ef7\u9ad8\u6602\u7684\u95ee\u9898\uff0c\u672c\u6587\u5206\u6790\u4e86\u73b0\u6709\u4e3b\u52a8\u5b66\u4e60\u7b56\u7565MFFT\u7684\u7f3a\u9677\u2014\u2014\u5176\u786c\u6027\u4e0d\u5339\u914d\u4f18\u5148\u673a\u5236\u5728\u4f4e\u9884\u7b97\u4e0b\u8868\u73b0\u5dee\u4e8e\u7eaf\u51e0\u4f55\u7b56\u7565\u3002\u63d0  data that conventional passenger counters and fare systems cannot capture. However, supervised video models require task-specific annotations, while applying vision-language models (VLMs) directly to long onboard videos is unreliable and costly. To leverage the complementary strengths of both approaches, we propose GHR-VLM, a visual grounded hybrid reasoning framework for zero-shot transit-bus video analytics. It is motivated by the observation that explicit visual grounding can improve VLM reasoning by converting long surveillance streams into compact, passenger-centered spatiotemporal evidence. Specifically, we propose an edge-cloud design in which a lightweight edge-based monitor continuously tracks door status and segments passenger clips. A backend VLM then identifies boarding passengers and classifies payment behavior through a two-stage coarse-to-fine refinement of spatiotemporal evidence. By invoking the VLM only on grounded passenger clips and contact sheets, GHR-VLM reduces cloud inference, avoids payment-specific training data, and supplies the localized evidence that VLMs otherwise struggle to identify. Evaluation on 486 minutes of real-world bus surveillance video demonstrates the potential of grounded edge-cloud reasoning for passenger-level payment analytics while highlighting the challenges posed by degraded video conditions.", "arxiv_id": "2607.13569", "arxiv_url": "https://arxiv.org/abs/2607.13569", "authors": ["Kaicong Huang", "Weiheng Oh", "Ruimin Ke"], "brief": "\u63d0\u51faGHR-VLM\u6846\u67b6\uff0c\u7528\u4e8e\u516c\u4ea4\u89c6\u9891\u7684\u96f6\u6837\u672c\u4e58\u5ba2\u652f\u4ed8\u884c\u4e3a\u5206\u6790\u3002\u901a\u8fc7\u8fb9\u7f18\u7aef\u8f7b\u91cf\u6a21\u578b\u6301\u7eed\u8ffd\u8e2a\u8f66\u95e8\u72b6\u6001\u5e76\u5206\u5272\u4e58\u5ba2\u7247\u6bb5\uff0c\u518d\u7531\u4e91\u7aefVLM\u5bf9\u7d27\u51d1\u7684\u65f6\u7a7a\u8bc1\u636e\u8fdb\u884c\u4e24\u9636\u6bb5\u7c97\u7ec6\u7c92\u5ea6\u63a8\u7406\uff0c\u5728486\u5206\u949f\u771f\u5b9e\u516c\u4e let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
