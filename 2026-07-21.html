6\u67b6\uff0c\u7edf\u4e00\u5904\u7406\u8de8\u4e3b\u4f53\u4e0e\u4e3b\u4f53\u5185\u53c2\u8003\u8f93\u5165\u3002\u5b83\u901a\u8fc7\u66f4\u597d\u5730\u878d\u5408\u591a\u6a21\u6001\u5927\u6a21\u578b\u8bed\u4e49\u4e0e\u89c6\u9891\u751f\u6210\u6a21\u578b\u7279\u5f81\uff0c\u63d0\u5347\u4eba\u7269\u3001\u7269\u4f53\u53ca\u4ea4\u4e92\u5173\u7cfb\u7684\u751f\u6210\u4e00\u81f4\u6027\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c06\u591a\u6a21\u6001\u5927\u6a21\u578b\u66f4\u81ea\u7136\u5730\u5d4c\u5165\u89c6\u9891\u4e2a\u6027\u5316\u751f\u6210\u6d41\u7a0b\uff0c\u907f\u514d\u6602\u8d35\u91cd\u5bf9\u9f50\uff0c\u540c\u65f6\u589e\u5f3a\u5bf9\u590d\u6742\u4eba-\u7269\u5173\u7cfb\u548c\u591a\u53c2\u8003\u8f93\u5165\u7684\u7406\u89e3\uff0c\u5bf9\u53ef\u63a7\u89c6\u9891\u751f\u6210\u3001\u54c1\u724c\u690d\u5165\u548c\u4eba\u7269\u4ea4\u4e92\u5185\u5bb9\u521b\u4f5c\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language model (LLM) post-training is essential for improving reasoning, adaptation, and alignment. Existing methods mainly follow two paradigms: reinforcement learning (RL) and on-policy distillation (OPD). However, RL relies on coarse-grained outcome supervision, resulting in difficult credit assignment and limited capability to acquire new knowledge. OPD, meanwhile, unconditionally matches teacher logits through KL divergence, which creates a dilemma: similar teachers provide little new knowledge, while substantially different teachers often yield ineffective guidance, largely restricting OPD to within-family distillation. We propose Distilled Reinforcement Learning (Distilled RL), which integrates teacher supervision into the RL objective to provide fine-grained guidance, selectively transfer new knowledge and avoid unconditional imitation. Distilled RL contains three components: reverse importance sampling with clipping, negative sample reset, and sequence-level geometric normalization. Through a concise and interpretable case study, we demonstrate that Distilled RL can effectively transfer previously unavailable knowledge from a teacher model to a student model. Extensive experiments across both within-family and cross-family distillation settings show that Distilled RL substantially outperforms standard RL and OPD in terms of both pass@1 and pass@k. Our code is available at https://github.com/597358816/Distilled-RL.", "arxiv_id": "2607.17247", "arxiv_url": "https://arxiv.org/abs/2607.17247", "authors": ["Chen Wang", "Zhaochun Li", "Jionghao Bai", "Yining Zhang", "Hexuan Deng", "Ge Lan", "Yue Wang"], "brief": "\u8bba\u6587\u63d0\u51fa Distilled Reinforcement Learning\uff0c\u5c06\u6559\u5e08\u6a21\u578b\u7684\u7ec6\u7c92\u5ea6\u76d1\u7763\u6574\u5408\u8fdb\u5f3a\u5316\u5b66\u4e60\u76ee\u6807\uff0c\u7528\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u540e\u8bad\u7ec3\u3002\u8be5\u65b9\u6cd5\u65e8\u5728\u514b\u670d\u6807\u51c6RL\u4fe1\u7528\u5206\u914d\u7c97\u7cd9\u3001OPD\u65e0\u6761\u4ef6\u6a21\u4eff\u6559\u5e08\u7684\u95ee\u9898\uff0c\u5b9e\u73b0\u66f4\u6709\u6548\u7684\u77e5\u8bc6\u8fc1\u79fb\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": "https://github.com/597358816/Distilled-RL", "github_stars": 3, "hf_url": "https://huggingface.co/papers/2607.17247", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51fa\u4e09\u9879\u6838\u5fc3\u673a\u5236\uff1a\u5e26\u88c1\u526a\u7684\u53cd\u5411\u91cd\u8981\u6027\u91c7\u6837\u3001\u8d1f\u6837\u672c\u91cd\u7f6e\u3001\u5e8f\u5217\u7ea7\u51e0\u4f55\u5f52\u4e00\u5316", "\u53ef\u5728\u540c\u65cf\u4e0e\u8de8\u65cf\u6a21\u578b\u84b8\u998f\u4e2d\u9009\u62e9\u6027\u5438\u6536\u6559\u5e08\u77e5\u8bc6\uff0c\u907f\u514d\u7b80\u5355\u5339\u914d\u6559\u5e08logits", "\u5b9e\u9a8c\u663e\u793a\u5728pass@1\u548cpass@k\u4e0a\u5747\u663e\u8457\u4f18\u4e8e\u6807\u51c6RL\u548con-policy distillation"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f", "\u540e\u8bad\u7ec3"], "num_comments": 1, "on_hf": true, "organization": "Zhongguancun Academy", "pdf_url": "https://arxiv.org/pdf/2607.17247v1", "published_at": "2026-07-19", "score": 0.274, "selected_reasons": ["HF trending (8\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17247.png", "title": "Distilled Reinforcement Learning for LLM Post-training", "tldr": "\u5c06\u6559\u5e08\u76d1\u7763\u878d\u5165RL\uff0c\u6539\u8fdbLLM\u540e\u8bad\u7ec3", "upvotes": 8, "what_it_is": "\u8bba\u6587\u63d0\u51fa Distilled Reinforcement Learning\uff0c\u5c06\u6559\u5e08\u6a21\u578b\u7684\u7ec6\u7c92\u5ea6\u76d1\u7763\u6574\u5408\u8fdb\u5f3a\u5316\u5b66\u4e60\u76ee\u6807\uff0c\u7528\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u540e\u8bad\u7ec3\u3002\u8be5\u65b9\u6cd5\u65e8\u5728\u514b\u670d\u6807\u51c6RL\u4fe1\u7528\u5206\u914d\u7c97\u7cd9\u3001OPD\u65e0\u6761\u4ef6\u6a21\u4eff\u6559\u5e08\u7684\u95ee\u9898\uff0c\u5b9e\u73b0\u66f4\u6709\u6548\u7684\u77e5\u8bc6\u8fc1\u79fb\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u84b8\u998f\u7684\u7ec6\u7c92\u5ea6\u6307\u5bfc\u4e0eRL\u7684\u9009\u62e9\u6027\u4f18\u5316\u7ed3\u5408\u8d77\u6765\uff0c\u53ef\u80fd\u4e3aLLM\u63a8\u7406\u80fd\u529b\u3001\u77e5\u8bc6\u8fc1\u79fb\u548c\u8de8\u6a21\u578b\u540e\u8bad\u7ec3\u63d0\u4f9b\u66f4\u7a33\u5065\u7684\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Existing 3D generative models predominantly rely on implicit volumetric representations, which enforce watertight topology and struggle to represent thin-shell and non-manifold geometries such as garments. Geometry image-based approaches offer a surface-centric alternative, but existing methods rely on discrete binary occupancy maps whose resolution-dependent boundary encoding causes staircase artifacts and information loss upon downsampling, while surface reconstruction remains a non-differentiable post-processing step disconnected from the learning pipeline. To address this, we propose Differentiable Geometry Image (DiffGI), an end-to-end 3D-to-2D mapping framework that seamlessly integrates surface representation and geometric optimization. DiffGI replaces binary maps with a continuous 2D Truncated Signed Distance Function (TSDF), which encodes boundary position at subpixel precision within a fixed grid resolution, eliminating resolution-dependent staircase artifacts even under aggressive downsampling. Building on this continuous field, we introduce a differentiable Marching Squares algorithm based on analytical linear interpolation, allowing gradients from 3D surface losses to propagate back to the 2D latent space. Leveraging this differentiable pipeline, we train a DiffGI-VAE augmented with a geometry-aware normal rendering loss to compress complex 3D surfaces into an ultra-compact 32X32 latent space, and instantiate a transformer-based latent diffusion model with a flow-matching objective on top of this space for conditional 3D generation. Extensive experiments on garment and object datasets demonstrate that our method achieves superior reconstruction fidelity and boundary precision compared to prior geometry-image and voxel-based approaches, while requiring significantly fewer computational resources.", "arxiv_id": "2607.13365", "arxiv_url": "https://arxiv.org/abs/2607.13365", "authors": ["Eungjune Shim", "Hansol Lee", "Eunjung Ju"], "brief": "\u8bba\u6587\u63d0\u51fa DiffGI\uff0c\u4e00\u79cd\u7aef\u5230\u7aef\u7684 3D-to-2D \u8868\u9762\u8868\u793a\u4e0e\u751f\u6210\u6846\u67b6\uff0c\u7528\u8fde\u7eed 2D TSDF \u66ff\u4ee3\u4e8c\u503c\u5360\u7528\u56fe\u6765\u7f16\u7801\u8584\u58f3\u3001\u975e\u6d41\u5f62\u51e0\u4f55\u3002\u5b83\u7ed3\u5408\u53ef\u5fae Marching Squares\u3001DiffGI-VAE \u548c\u57fa\u4e8e flow matching \u7684\u6f5c\u7a7a\u95f4\u6269\u6563\u6a21\u578b\uff0c\u5b9e\u73b0\u670d\u88c5\u7b49\u590d\u6742\u8868\u9762\u7684\u9ad8\u4fdd\u771f\u6761\u4ef6\u751f\u6210\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.13365", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u8fde\u7eed 2D TSDF \u5728\u56fa\u5b9a\u7f51\u683c\u5185\u4ee5\u4e9a\u50cf\u7d20\u7cbe\u5ea6\u8868\u793a\u8fb9\u754c\uff0c\u7f13\u89e3\u4f20\u7edf\u51e0\u4f55\u56fe\u50cf\u7684\u9636\u68af\u4f2a\u5f71\u548c\u4e0b\u91c7\u6837\u4fe1\u606f\u4e22\u5931\u95ee\u9898", "\u63d0\u51fa\u57fa\u4e8e\u89e3\u6790\u7ebf\u6027\u63d2\u503c\u7684\u53ef\u5fae Marching Squares\uff0c\u4f7f 3D \u8868\u9762\u635f\u5931\u53ef\u53cd\u5411\u4f20\u64ad\u5230 2D \u6f5c\u7a7a\u95f4", "\u5728 32\u00d732 \u8d85\u7d27\u51d1\u6f5c\u7a7a\u95f4\u4e2d\u8bad\u7ec3\u5e26\u51e0\u4f55\u611f\u77e5\u6cd5\u7ebf\u6e32\u67d3\u635f\u5931\u7684 VAE\uff0c\u5e76\u63a5\u5165 Transformer \u6f5c\u6269\u6563\u6a21\u578b\u8fdb\u884c\u6761\u4ef6 3D \u751f\u6210"], "keywords": ["3D\u751f\u6210", "\u51e0\u4f55\u8868\u793a", "\u6269\u6563\u6a21\u578b", "\u53ef\u5fae\u6e32\u67d3"], "num_comments": 1, "on_hf": true, "organization": "CLO Virtual Fashion", "pdf_url": "https://arxiv.org/pdf/2607.13365v1", "published_at": "2026-07-15", "score": 0.271, "selected_reasons": ["HF trending (12\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.13365.png", "title": "DiffGI: Differentiable Geometry Images for High-Fidelity Thin-Shell 3D Generation", "tldr": "\u7528\u53ef\u5fae\u51e0\u4f55\u56fe\u50cf\u9ad8\u4fdd\u771f\u751f\u6210\u8584\u58f33D\u5f62\u72b6", "upvotes": 12, "what_it_is": "\u8bba\u6587\u63d0\u51fa DiffGI\uff0c\u4e00\u79cd\u7aef\u5230\u7aef\u7684 3D-to-2D \u8868\u9762\u8868\u793a\u4e0e\u751f\u6210\u6846\u67b6\uff0c\u7528\u8fde\u7eed 2D TSDF \u66ff\u4ee3\u4e8c\u503c\u5360\u7528\u56fe\u6765\u7f16\u7801\u8584\u58f3\u3001\u975e\u6d41\u5f62\u51e0\u4f55\u3002\u5b83\u7ed3\u5408\u53ef\u5fae Marching Squares\u3001DiffGI-VAE \u548c\u57fa\u4e8e flow matching \u7684\u6f5c\u7a7a\u95f4\u6269\u6563\u6a21\u578b\uff0c\u5b9e\u73b0\u670d\u88c5\u7b49\u590d\u6742\u8868\u9762\u7684\u9ad8\u4fdd\u771f\u6761\u4ef6\u751f\u6210\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u9488\u5bf9\u9690\u5f0f\u4f53\u8868\u793a\u96be\u4ee5\u5904\u7406\u7684\u8584\u58f3\u3001\u975e\u6c34\u5bc6\u548c\u975e\u6d41\u5f62\u7ed3\u6784\u63d0\u4f9b\u4e86\u66f4\u9002\u5408\u7684\u8868\u9762\u4e2d\u5fc3\u8868\u793a\uff0c\u5728\u670d\u88c5\u548c\u7269\u4f53\u6570\u636e\u96c6\u4e0a\u63d0\u5347\u91cd\u5efa\u7cbe\u5ea6\u4e0e\u8fb9\u754c\u8d28\u91cf\uff0c\u540c\u65f6\u663e\u8457\u964d\u4f4e\u8ba1\u7b97\u8d44\u6e90\u9700\u6c42\u3002"}, {"abstract": "Temporal grounding in long recordings remains challenging for audio-conditioned LLMs. We present a time-aware audio LLM that answers questions with explicit timestamps over up to 120 minutes of input. Our approach interleaves periodic time markers with continuous audio tokens using large-scale synthetic supervision from a cascaded pipeline. Our model achieves strong temporal-grounding accuracy on short and long benchmarks and supports time-anchored fragment descriptions and summaries. Extensive ablations examine how time representation, marker frequency, tokenization, and duration-mixture design affect accuracy and computational cost. We release model weights and datasets to support further research on time-aware audio understanding, available at https://huggingface.co/ai-sage/GigaChat3.1-Audio-10B-A1.8B.", "arxiv_id": "2607.10387", "arxiv_url": "https://arxiv.org/abs/2607.10387", "authors": ["Aleksandr Kutsakov", "Mariia Sadovina", "Georgii Gospodinov", "Alexandr Maximenko", "Oleg Kutuzov", "Pavel Bogomolov", "Fyodor Minkin"], "brief": "\u8bba\u6587\u63d0\u51fa GigaChat Audio\uff0c\u4e00\u4e2a\u5177\u5907\u65f6\u95f4\u611f\u77e5\u80fd\u529b\u7684\u5927\u578b\u97f3\u9891\u8bed\u8a00\u6a21\u578b\uff0c\u53ef\u5728\u6700\u957f 120 \u5206\u949f\u97f3\u9891\u4e2d\u56de\u7b54\u5e26\u660e\u786e\u65f6\u95f4\u6233\u7684\u95ee\u9898\uff0c\u5e76\u751f\u6210\u65f6\u95f4\u951a\u5b9a\u7684\u7247\u6bb5\u63cf\u8ff0\u4e0e\u6458\u8981\u3002", "categories": ["eess.AS", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10387", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u901a\u8fc7\u5728\u8fde\u7eed\u97f3\u9891 token \u4e2d\u5468\u671f\u6027\u63d2\u5165\u65f6\u95f4\u6807\u8bb0\uff0c\u5b9e\u73b0\u957f\u97f3\u9891\u4e2d\u7684\u663e\u5f0f\u65f6\u95f4\u5b9a\u4f4d", "\u4f7f\u7528\u7ea7\u8054\u6d41\u6c34\u7ebf\u6784\u5efa\u5927\u89c4\u6a21\u5408\u6210\u76d1\u7763\u6570\u636e\uff0c\u8bad\u7ec3\u6a21\u578b\u8fdb\u884c\u65f6\u95f4\u951a\u5b9a\u95ee\u7b54\u4e0e\u603b\u7ed3", "\u5728\u77ed\u97f3\u9891\u548c\u957f\u97f3\u9891\u65f6\u95f4\u5b9a\u4f4d\u57fa\u51c6\u4e0a\u53d6\u5f97\u8f83\u5f3a\u8868\u73b0\uff0c\u5e76\u7cfb\u7edf\u5206\u6790\u65f6\u95f4\u8868\u793a\u3001\u6807\u8bb0\u9891\u7387\u3001token \u5316\u548c\u65f6\u957f\u6df7\u5408\u8bbe\u8ba1\u7684\u5f71\u54cd"], "keywords": ["\u97f3\u9891\u7406\u89e3", "\u5927\u8bed\u8a00\u6a21\u578b", "\u65f6\u95f4\u5b9a\u4f4d", "\u591a\u6a21\u6001"], "num_comments": 1, "on_hf": true, "organization": "ai-sage", "pdf_url": "https://arxiv.org/pdf/2607.10387v1", "published_at": "2026-07-11", "score": 0.269, "selected_reasons": ["HF trending (30\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.10387.png", "title": "GigaChat Audio: Time-aware Large Audio Language Model", "tldr": "\u53ef\u4e3a\u4e24\u5c0f\u65f6\u97f3\u9891\u95ee\u7b54\u63d0\u4f9b\u7cbe\u786e\u65f6\u95f4\u6233", "upvotes": 30, "what_it_is": "\u8bba\u6587\u63d0\u51fa GigaChat Audio\uff0c\u4e00\u4e2a\u5177\u5907\u65f6\u95f4\u611f\u77e5\u80fd\u529b\u7684\u5927\u578b\u97f3\u9891\u8bed\u8a00\u6a21\u578b\uff0c\u53ef\u5728\u6700\u957f 120 \u5206\u949f\u97f3\u9891\u4e2d\u56de\u7b54\u5e26\u660e\u786e\u65f6\u95f4\u6233\u7684\u95ee\u9898\uff0c\u5e76\u751f\u6210\u65f6\u95f4\u951a\u5b9a\u7684\u7247\u6bb5\u63cf\u8ff0\u4e0e\u6458\u8981\u3002", "why_notable": "\u957f\u5f55\u97f3\u4e2d\u7684\u65f6\u95f4\u5b9a\u4f4d\u662f\u97f3\u9891 LLM \u7684\u5173\u952e\u77ed\u677f\uff0c\u8be5\u5de5\u4f5c\u5c06\u53ef\u89e3\u91ca\u65f6\u95f4\u6233\u80fd\u529b\u6269\u5c55\u5230\u4e24\u5c0f\u65f6\u7ea7\u8f93\u5165\uff0c\u5e76\u5f00\u6e90\u6a21\u578b\u6743\u91cd\u548c\u6570\u636e\u96c6\uff0c\u6709\u52a9\u4e8e\u63a8\u52a8\u4f1a\u8bae\u3001\u64ad\u5ba2\u3001\u901a\u8bdd\u7b49\u957f\u97f3\u9891\u7406\u89e3\u5e94\u7528\u3002"}, {"abstract": "Hand-Object Interaction (HOI) synthesis is a cornerstone for animation production and embodied AI. Despite the strong priors of video foundation models, multi-view consistent HOI synthesis remains challenging due to complex hand motions and occlusions. We present HarmoHOI, a unified diffusion framework that jointly and harmoniously generates synchronized multi-view HOI videos and globally aligned 3D point tracks. Our core insight is that robust multi-view consistency fundamentally requires globally aligned 3D geometry and motion. To this end, we propose a Mixture of Multi-view Diffusion Transformer that co-models RGB videos and 3D point tracks. By representing point tracks as pseudo-videos, we align 3D geometric signals with the 2D latent space of foundation models, thereby minimizing the domain gap and easing adaptation of priors. To further ensure geometry consistency, we introduce Global Motion Aligning Diffusion, which refines coarse point tracks into metric-scale, globally aligned 3D trajectories. HarmoHOI enables on-the-fly co-evolution of 2D appearance and 3D motion during denoising. To overcome the scarcity of multi-view HOI data, we employ a hybrid data curriculum learning strategy that successfully transfers generic priors from single-view data to synchronized multi-view generation. Experimental results show that HarmoHOI achieves state-of-the-art performance in visual quality, motion plausibility, and multi-view geometric consistency. Project page available at https://droliven.github.io/HarmoHOI_project.", "arxiv_id": "2607.17097", "arxiv_url": "https://arxiv.org/abs/2607.17097", "authors": ["Lingwei Dang", "Juntong Li", "Zonghan Li", "Hongwen Zhang", "Liang An", "Wei Min", "Yebin Liu", "Qingyao Wu"], "brief": "HarmoHOI \u662f\u4e00\u4e2a\u7edf\u4e00\u6269\u6563\u6846\u67b6\uff0c\u7528\u4e8e\u540c\u6b65\u751f\u6210\u591a\u89c6\u89d2\u624b-\u7269\u4ea4\u4e92\u89c6\u9891\u548c\u5168\u5c40\u5bf9\u9f50\u7684 3D \u70b9\u8f68\u8ff9\u3002\u5b83\u5c06\u5916\u89c2\u751f\u6210\u4e0e\u4e09\u7ef4\u8fd0\u52a8\u5efa\u6a21\u5728\u53bb\u566a\u8fc7\u7a0b\u4e2d\u534f\u540c\u6f14\u5316\uff0c\u4ee5\u63d0\u5347\u591a\u89c6\u89d2\u4e00\u81f4\u6027\u4e0e\u8fd0\u52a8\u5408\u7406\u6027\u3002", "categories": ["cs.CV"], "github_repo": "https://github.com/Droliven/HarmoHOI_project", "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17097", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51fa Mixture of Multi-view Diffusion Transformer\uff0c\u540c\u65f6\u5efa\u6a21 RGB \u89c6\u9891\u4e0e 3D \u70b9\u8f68\u8ff9\uff0c\u5b9e\u73b0\u5916\u89c2\u548c\u51e0\u4f55\u8fd0\u52a8\u7684\u8054\u5408\u751f\u6210", "\u5c06 3D \u70b9\u8f68\u8ff9\u8868\u793a\u4e3a\u4f2a\u89c6\u9891\uff0c\u4f7f\u4e09\u7ef4\u51e0\u4f55\u4fe1\u53f7\u5bf9\u9f50\u5230\u89c6\u9891\u57fa\u7840\u6a21\u578b\u7684\u4e8c\u7ef4\u6f5c\u7a7a\u95f4\uff0c\u964d\u4f4e\u8de8\u6a21\u6001\u9002\u914d\u96be\u5ea6", "\u5f15\u5165 Global Motion Aligning Diffusion\uff0c\u5c06\u7c97\u7cd9\u70b9\u8f68\u8ff9\u7ec6\u5316\u4e3a\u516c\u5236\u5c3a\u5ea6\u3001\u5168\u5c40\u5bf9\u9f50\u7684 3D \u8f68\u8ff9\uff0c\u5e76\u7528\u6df7\u5408\u6570\u636e\u8bfe\u7a0b\u5b66\u4e60\u7f13\u89e3\u591a\u89c6\u89d2 HOI \u6570\u636e\u7a00\u7f3a"], "keywords": ["\u591a\u6a21\u6001\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u4e09\u7ef4\u91cd\u5efa", "\u624b\u7269\u4ea4\u4e92"], "num_comments": 1, "on_hf": true, "organization": "South China University of Technology", "pdf_url": "https://arxiv.org/pdf/2607.17097v1", "published_at": "2026-07-19", "score": 0.264, "selected_reasons": ["HF trending (9\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17097.png", "title": "HarmoHOI: Harmonizing Appearance and 3D Motion for Multi-view Hand-Object Interaction Synthesis", "tldr": "\u8054\u5408\u751f\u6210\u591a\u89c6\u89d2\u624b\u7269\u4ea4\u4e92\u89c6\u9891\u4e0e3D\u8fd0\u52a8", "upvotes": 9, "what_it_is": "HarmoHOI \u662f\u4e00\u4e2a\u7edf\u4e00\u6269\u6563\u6846\u67b6\uff0c\u7528\u4e8e\u540c\u6b65\u751f\u6210\u591a\u89c6\u89d2\u624b-\u7269\u4ea4\u4e92\u89c6\u9891\u548c\u5168\u5c40\u5bf9\u9f50\u7684 3D \u70b9\u8f68\u8ff9\u3002\u5b83\u5c06\u5916\u89c2\u751f\u6210\u4e0e\u4e09\u7ef4\u8fd0\u52a8\u5efa\u6a21\u5728\u53bb\u566a\u8fc7\u7a0b\u4e2d\u534f\u540c\u6f14\u5316\uff0c\u4ee5\u63d0\u5347\u591a\u89c6\u89d2\u4e00\u81f4\u6027\u4e0e\u8fd0\u52a8\u5408\u7406\u6027\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u591a\u89c6\u89d2\u89c6\u9891\u751f\u6210\u4e0e\u5168\u5c40\u4e00\u81f4\u7684 3D \u8fd0\u52a8\u8f68\u8ff9\u6df1\u5ea6\u8026\u5408\uff0c\u9488\u5bf9\u624b-\u7269\u4ea4\u4e92\u4e2d\u906e\u6321\u591a\u3001\u8fd0\u52a8\u590d\u6742\u3001\u89c6\u89d2\u4e00\u81f4\u6027\u96be\u7684\u95ee\u9898\u63d0\u4f9b\u4e86\u5b9e\u7528\u65b9\u6848\uff0c\u5bf9\u52a8\u753b\u5236\u4f5c\u3001\u865a\u62df\u4eba\u548c\u5177\u8eab\u667a\u80fd\u6570\u636e\u5408\u6210\u5177\u6709\u8f83\u9ad8\u4ef7\u503c\u3002"}, {"abstract": "Entropy control has become an effective tool in reinforcement learning (RL) of large language models (LLMs), helping balance exploration-exploitation trade-off during alignment process. Such RL paradigm is often conducted on mixtures of heterogeneous tasks, which induce distinct entropy regimes under the same policy, making global or token-level entropy regulation insufficient to corresponding heterogeneous needs of exploration. This heterogeneity further makes GRPO-style normalized advantages induce an entropy-dependent bias, making advantage signals across prompt groups statistically non-comparable. To address this issue, we propose Group Entropy-Controlled Policy Optimization (GEPO), a lightweight extension to GRPO that uses group entropy, estimated from existing grouped samples to perform entropy-conditioned asymmetric advantage shaping. GEPO attenuates positive advantages in low-entropy groups to reduce over-exploitation, and negative advantages in high-entropy groups to preserve exploration, with adaptive thresholds derived from historical entropy statistics. Extensive experiments on two base models across thirteen benchmarks spanning mathematics, physics, science, code generation, and instruction following show that GEPO consistently outperforms GRPO and recent entropy-controlled methods, delivering balanced cross-task improvements while preserving task-specific exploration levels throughout training.", "arxiv_id": "2607.16850", "arxiv_url": "https://arxiv.org/abs/2607.16850", "authors": ["Guangran Cheng", "Chengqi Lyu", "Songyang Gao", "Wenwei Zhang", "Kai Chen"], "brief": "\u672c\u6587\u63d0\u51fa Group Entropy-Controlled Policy Optimization\uff08GEPO\uff09\uff0c\u5728 GRPO \u57fa\u7840\u4e0a\u5229\u7528\u6bcf\u4e2a prompt \u7ec4\u7684\u71b5\u4f30\u8ba1\u8fdb\u884c\u71b5\u6761\u4ef6\u5316\u7684\u975e\u5bf9\u79f0\u4f18\u52bf\u5851\u5f62\u3002\u5b83\u9488\u5bf9\u591a\u4efb\u52a1\u8bad\u7ec3\u4e2d\u4e0d\u540c\u4efb\u52a1\u63a2\u7d22\u9700\u6c42\u4e0d\u4e00\u81f4\u7684\u95ee\u9898\uff0c\u52a8\u6001\u8c03\u8282\u4f4e\u71b5\u7ec4\u548c\u9ad8\u71b5\u7ec4\u7684\u4f18\u52bf\u4fe1\u53f7\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16850", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6307\u51fa GRPO \u5f0f\u5f52\u4e00\u5316\u4f18\u52bf\u5728\u5f02\u6784\u4efb\u52a1\u6df7\u5408\u8bad\u7ec3\u4e2d\u4f1a\u4ea7\u751f\u4e0e\u71b5\u76f8\u5173\u7684\u504f\u5dee\uff0c\u4f7f\u4e0d\u540c prompt \u7ec4\u7684\u4f18\u52bf\u4fe1\u53f7\u4e0d\u53ef\u76f4\u63a5\u6bd4\u8f83\u3002", "GEPO \u5229\u7528\u5df2\u6709\u5206\u7ec4\u91c7\u6837\u4f30\u8ba1 group entropy\uff0c\u5e76\u57fa\u4e8e\u5386\u53f2\u71b5\u7edf\u8ba1\u81ea\u9002\u5e94\u786e\u5b9a\u9608\u503c\uff0c\u65e0\u9700\u989d\u5916\u590d\u6742\u5efa\u6a21\u3002", "\u5728\u6570\u5b66\u3001\u7269\u7406\u3001\u79d1\u5b66\u3001\u4ee3\u7801\u751f\u6210\u548c\u6307\u4ee4\u8ddf\u968f\u7b49 13 \u4e2a\u57fa\u51c6\u4e0a\uff0cGEPO \u76f8\u6bd4 GRPO \u548c\u8fd1\u671f\u71b5\u63a7\u5236\u65b9\u6cd5\u53d6\u5f97\u66f4\u7a33\u5b9a\u7684\u8de8\u4efb\u52a1\u63d0\u5347\u3002"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5bf9\u9f50", "\u7b56\u7565\u4f18\u5316"], "num_comments": 1, "on_hf": true, "organization": "Intern Large Models", "pdf_url": "https://arxiv.org/pdf/2607.16850v1", "published_at": "2026-07-18", "score": 0.263, "selected_reasons": ["HF trending (24\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16850.png", "title": "Group Entropy-Controlled Policy Optimization", "tldr": "\u7528\u7ec4\u71b5\u81ea\u9002\u5e94\u8c03\u63a7LLM\u5f3a\u5316\u5b66\u4e60\u4f18\u52bf", "upvotes": 24, "what_it_is": "\u672c\u6587\u63d0\u51fa Group Entropy-Controlled Policy Optimization\uff08GEPO\uff09\uff0c\u5728 GRPO \u57fa\u7840\u4e0a\u5229\u7528\u6bcf\u4e2a prompt \u7ec4\u7684\u71b5\u4f30\u8ba1\u8fdb\u884c\u71b5\u6761\u4ef6\u5316\u7684\u975e\u5bf9\u79f0\u4f18\u52bf\u5851\u5f62\u3002\u5b83\u9488\u5bf9\u591a\u4efb\u52a1\u8bad\u7ec3\u4e2d\u4e0d\u540c\u4efb\u52a1\u63a2\u7d22\u9700\u6c42\u4e0d\u4e00\u81f4\u7684\u95ee\u9898\uff0c\u52a8\u6001\u8c03\u8282\u4f4e\u71b5\u7ec4\u548c\u9ad8\u71b5\u7ec4\u7684\u4f18\u52bf\u4fe1\u53f7\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u6293\u4f4f\u4e86 LLM \u5f3a\u5316\u5b66\u4e60\u4e2d\u591a\u4efb\u52a1\u71b5\u5f02\u8d28\u6027\u7684\u6838\u5fc3\u95ee\u9898\uff0c\u4ee5\u8f7b\u91cf\u65b9\u5f0f\u6539\u8fdb\u4f18\u52bf\u4f30\u8ba1\u4e0e\u63a2\u7d22\u63a7\u5236\uff0c\u53ef\u80fd\u63d0\u5347\u5927\u6a21\u578b\u5bf9\u9f50\u8bad\u7ec3\u5728\u590d\u6742\u4efb\u52a1\u6df7\u5408\u573a\u666f\u4e0b\u7684\u7a33\u5b9a\u6027\u548c\u6cdb\u5316\u8868\u73b0\u3002"}, {"abstract": "Scaling robust driving policies is fundamentally bottlenecked by the scarcity of edge cases in curated datasets. While the real world continuously captures these critical events, such long-tail events remain underutilized when collected from heterogeneous sources. Specifically, diverse but valuable in-the-wild long-tail videos lack the full view coverage required for training policy models, often missing multi-view poses or originating solely from monocular dash cameras. This modality gap prevents these ubiquitous observations from being converted into scalable training data for long-tail generalization. We introduce OpenLongTail, an open-source generative data engine for scaling autonomous driving policies under long-tail events. To transform heterogeneous data sources into view-aligned and temporally coherent multi-view assets that are useful for policy learning, we develop a pose-informed extrapolative view synthesis pipeline that generates the missing views. We further enhance cross-view consistency and the temporal alignment for the newly generated views by injecting Pl\u00fccker ray geometry into the scalable generation engine. By synthesizing heterogeneous long-tail data, we observe a significant improvement in closed-loop driving robustness in handling long-tail events. By measuring the extrapolative view synthesis and pose metrics, we validate the effectiveness of OpenLongTail in visual fidelity, cross-view consistency, and ego-trajectory recovery.", "arxiv_id": "2607.09655", "arxiv_url": "https://arxiv.org/abs/2607.09655", "authors": ["Lulin Liu", "Nuo Chen", "Yan Wang", "Bangya Liu", "Wenyan Cong", "Hezhen Hu", "Boris Ivanovic", "Hao Wang", "Ziyao Zeng", "Xinyu Gong", "Yang Zhou", "Zixiang Xiong", "Dilin Wang", "Zhangyang Wang", "Weisong Shi", "Ruohan Zhang", "Marco Pavone", "Zhiwen Fan"], "brief": "OpenLongTail \u662f\u4e00\u4e2a\u5f00\u6e90\u751f\u6210\u5f0f\u6570\u636e\u5f15\u64ce\uff0c\u5c06\u5f02\u6784\u6765\u6e90\u7684\u957f\u5c3e\u9a7e\u9a76\u89c6\u9891\u8f6c\u5316\u4e3a\u89c6\u89d2\u5bf9\u9f50\u3001\u65f6\u95f4\u4e00\u81f4\u7684\u591a\u89c6\u89d2\u8bad\u7ec3\u8d44\u4ea7\u3002\u5b83\u901a\u8fc7\u59ff\u6001\u611f\u77e5\u7684\u5916\u63a8\u89c6\u89d2\u5408\u6210\u548c\u51e0\u4f55\u7ea6\u675f\uff0c\u8865\u5168\u5355\u76ee\u884c\u8f66\u8bb0\u5f55\u4eea\u7b49\u6570\u636e\u7f3a\u5931\u7684\u591a\u89c6\u89d2\u4fe1\u606f\u3002", "categories": ["cs.CV"], "github_repo": "https://github.com/phai-lab/OpenLongTail", "github_stars": 27, "hf_url": "https://huggingface.co/papers/2607.09655", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u9762\u5411\u81ea\u52a8\u9a7e\u9a76\u957f\u5c3e\u4e8b\u4ef6\u6570\u636e\u7a00\u7f3a\u95ee\u9898\uff0c\u5229\u7528\u771f\u5b9e\u4e16\u754c\u5f02\u6784\u89c6\u9891\u6269\u5c55\u53ef\u8bad\u7ec3\u6570\u636e\u89c4\u6a21", "\u63d0\u51fa\u59ff\u6001\u611f\u77e5\u7684\u5916\u63a8\u89c6\u89d2\u5408\u6210\u6d41\u7a0b\uff0c\u751f\u6210\u7f3a\u5931\u89c6\u89d2\u5e76\u5bf9\u9f50\u591a\u89c6\u89d2\u8d44\u4ea7", "\u5f15\u5165 Pl\u00fccker ray \u51e0\u4f55\u4ee5\u63d0\u5347\u8de8\u89c6\u89d2\u4e00\u81f4\u6027\u3001\u65f6\u95f4\u5bf9\u9f50\u548c\u81ea\u8f66\u8f68\u8ff9\u6062\u590d"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u751f\u6210\u6a21\u578b", "\u591a\u89c6\u89d2", "\u957f\u5c3e\u6570\u636e"], "num_comments": 1, "on_hf": true, "organization": "Texas A\u0026M University", "pdf_url": "https://arxiv.org/pdf/2607.09655v1", "published_at": "2026-07-10", "score": 0.262, "selected_reasons": ["HF trending (2\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.09655.png", "title": "OpenLongTail: Generative Scaling of Long-Tail Driving Data", "tldr": "\u7528\u751f\u6210\u5f0f\u8865\u5168\u591a\u89c6\u89d2\u957f\u5c3e\u9a7e\u9a76\u6570\u636e", "upvotes": 2, "what_it_is": "OpenLongTail \u662f\u4e00\u4e2a\u5f00\u6e90\u751f\u6210\u5f0f\u6570\u636e\u5f15\u64ce\uff0c\u5c06\u5f02\u6784\u6765\u6e90\u7684\u957f\u5c3e\u9a7e\u9a76\u89c6\u9891\u8f6c\u5316\u4e3a\u89c6\u89d2\u5bf9\u9f50\u3001\u65f6\u95f4\u4e00\u81f4\u7684\u591a\u89c6\u89d2\u8bad\u7ec3\u8d44\u4ea7\u3002\u5b83\u901a\u8fc7\u59ff\u6001\u611f\u77e5\u7684\u5916\u63a8\u89c6\u89d2\u5408\u6210\u548c\u51e0\u4f55\u7ea6\u675f\uff0c\u8865\u5168\u5355\u76ee\u884c\u8f66\u8bb0\u5f55\u4eea\u7b49\u6570\u636e\u7f3a\u5931\u7684\u591a\u89c6\u89d2\u4fe1\u606f\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u5927\u91cf\u672a\u5145\u5206\u5229\u7528\u7684\u91ce\u5916\u957f\u5c3e\u89c6\u9891\u8f6c\u5316\u4e3a\u53ef\u7528\u4e8e\u95ed\u73af\u9a7e\u9a76\u7b56\u7565\u8bad\u7ec3\u7684\u6570\u636e\uff0c\u6709\u671b\u63d0\u5347\u81ea\u52a8\u9a7e\u9a76\u5728\u7f55\u89c1\u5371\u9669\u573a\u666f\u4e0b\u7684\u9c81\u68d2\u6027\u4e0e\u6cdb\u5316\u80fd\u529b\u3002"}, {"abstract": "Scaling executable agent training data for LLM post-training is bottlenecked by substrate-bound methods that tie task generation to predefined tools, repositories, or skill graphs: expanding coverage requires manual substrate engineering, each new domain demands a bespoke pipeline, and the resulting task distributions often reflect substrate biases rather than real-world demand. We introduce NexForge, a requirement-driven framework that takes high-level capability requirements as input and synthesizes diverse, executable agent tasks and expert trajectories for SFT. NexForge first investigates real-world demand to construct representative scenarios and task profiles, then performs distribution-aware compilation to generate task directives. For each directive, NexForge automatically retrieves or constructs the required files, dependencies, and runtime configurations, and finally synthesizes expert rollouts and produces training trajectories. Without domain-specific infrastructure, NexForge produces 3.6K terminal and 2K office tasks, improving Qwen3.5-35B-A3B Base from 22.5\\% to 52.0\\% on Terminal-Bench 2.0 and from 813 to 1338 Elo on GDPval; scaling further to 43.2K terminal tasks yields 58.4\\%, on par with Claude Opus 4.6 equipped with Claude Code. Scaled further, NexForge-synthesized data contributes to the training of Nex-N2, a family of publicly available agent models that lift Qwen3.5-35B-A3B to 75.3\\% on Terminal-Bench 2.1 and to 1585 Elo on GDPval -- achieving state-of-the-art open-source performance and surpassing several frontier proprietary systems. Nex-N2 models are available at https://nex.sii.edu.cn/.", "arxiv_id": "2607.14186", "arxiv_url": "https://arxiv.org/abs/2607.14186", "authors": ["Jiarong Zhao", "Zhikai Lei", "Zhiheng Xi", "Rui Zheng", "Hang Yan", "Jie Zhou", "Qin Chen", "Liang He"], "brief": "\u8bba\u6587\u63d0\u51fa NexForge\uff1a\u4ece\u9ad8\u5c42\u80fd\u529b\u9700\u6c42\u51fa\u53d1\uff0c\u81ea\u52a8\u8c03\u7814\u771f\u5b9e\u9700\u6c42\u3001\u751f\u6210\u53ef\u6267\u884c\u4efb\u52a1\u6307\u4ee4\uff0c\u5e76\u6784\u5efa\u6240\u9700\u6587\u4ef6\u3001\u4f9d\u8d56\u3001\u8fd0\u884c\u73af\u5883\u4e0e\u4e13\u5bb6\u8f68\u8ff9\uff0c\u7528\u4e8e LLM \u667a\u80fd\u4f53\u540e\u8bad\u7ec3\u3002", "categories": ["cs.SE", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14186", "impact_score": 9, "is_agent": true, "is_top": false, "key_points": ["\u6446\u8131\u9884\u5b9a\u4e49\u5de5\u5177\u3001\u4ed3\u5e93\u6216\u6280\u80fd\u56fe\u7b49\u201c\u57fa\u5e95\u7ed1\u5b9a\u201d\u9650\u5236\uff0c\u964d\u4f4e\u8de8\u9886\u57df\u4efb\u52a1\u751f\u6210\u7684\u4eba\u5de5\u5de5\u7a0b\u6210\u672c\u3002", "\u751f\u6210 3.6K \u7ec8\u7aef\u4efb\u52a1\u548c 2K \u529e\u516c\u4efb\u52a1\u540e\uff0c\u5c06 Qwen3.5-35B-A3B Base \u5728 Terminal-Bench 2.0 \u4e0a\u4ece 22.5% \u63d0\u5347\u5230 52.0%\uff0cGDPval \u4ece 813 \u63d0\u5347\u5230 1338 Elo\u3002", "\u6269\u5c55\u5230\u66f4\u5927\u89c4\u6a21\u540e\u8bad\u7ec3\u51fa\u5f00\u6e90 Nex-N2\uff0c\u5728 Terminal-Bench 2.1 \u8fbe\u5230 75.3%\u3001GDPval \u8fbe\u5230 1585 Elo\uff0c\u53d6\u5f97\u5f00\u6e90 SOTA \u5e76\u8d85\u8fc7\u90e8\u5206\u95ed\u6e90\u524d\u6cbf\u7cfb\u7edf\u3002"], "keywords": ["\u667a\u80fd\u4f53", "\u6570\u636e\u5408\u6210", "\u540e\u8bad\u7ec3", "\u4ee3\u7801\u4e0e\u529e\u516c\u81ea\u52a8\u5316"], "num_comments": 1, "on_hf": true, "organization": "Nex AGI", "pdf_url": "https://arxiv.org/pdf/2607.14186v3", "published_at": "2026-07-15", "score": 0.258, "selected_reasons": ["HF trending (2\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.14186.png", "title": "NexForge: Scaling Agent Capabilities through Requirement-Driven Task Synthesis for LLMs", "tldr": "\u7528\u9700\u6c42\u9a71\u52a8\u5408\u6210\u5927\u89c4\u6a21\u667a\u80fd\u4f53\u8bad\u7ec3\u4efb\u52a1\u3002", "upvotes": 2, "what_it_is": "\u8bba\u6587\u63d0\u51fa NexForge\uff1a\u4ece\u9ad8\u5c42\u80fd\u529b\u9700\u6c42\u51fa\u53d1\uff0c\u81ea\u52a8\u8c03\u7814\u771f\u5b9e\u9700\u6c42\u3001\u751f\u6210\u53ef\u6267\u884c\u4efb\u52a1\u6307\u4ee4\uff0c\u5e76\u6784\u5efa\u6240\u9700\u6587\u4ef6\u3001\u4f9d\u8d56\u3001\u8fd0\u884c\u73af\u5883\u4e0e\u4e13\u5bb6\u8f68\u8ff9\uff0c\u7528\u4e8e LLM \u667a\u80fd\u4f53\u540e\u8bad\u7ec3\u3002", "why_notable": "NexForge \u5c06\u667a\u80fd\u4f53\u8bad\u7ec3\u6570\u636e\u751f\u6210\u4ece\u624b\u5de5\u6784\u5efa\u4efb\u52a1\u57fa\u5e95\u8f6c\u5411\u9700\u6c42\u9a71\u52a8\u7684\u81ea\u52a8\u5408\u6210\uff0c\u663e\u8457\u63d0\u5347\u53ef\u6269\u5c55\u6027\u4e0e\u771f\u5b9e\u9700\u6c42\u8986\u76d6\uff0c\u5bf9\u5f00\u6e90\u901a\u7528\u667a\u80fd\u4f53\u80fd\u529b\u63d0\u5347\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Structure-based drug design (SBDD) leverages the 3D structure of protein targets, often complemented by other spatial constraints, to generate candidate binding molecules. While diffusion models have dominated as a leading paradigm for high-quality 3D molecule generation, LLM-based methods are rapidly emerging in molecular design and have shown competitive performance in pocket-conditioned molecular generation. However, their ability to reason about physics and 3D spatial environments is largely underexplored. In this work, we systematically analyze whether current general-purpose LLMs are capable of navigating complex 3D constraints compared to established baselines such as specialized diffusion models. We consider 3D ligand generation conditioned on protein pockets together with ligand- and interaction-derived spatial constraints, including anchor fragments, pharmacophore points, and mandatory pocket-ligand interactions. To enable this evaluation, we introduce 3D-Fit - a token-efficient benchmarking strategy for assessing LLM performance on multi-conditioned spatial molecule generation. Our findings reveal a clear pattern in LLM spatial capabilities: while they still lag behind state-of-the-art approaches, they are promising and can handle multiple spatial constraints simultaneously, enabling scaling to heterogeneous setups.", "arxiv_id": "2607.18144", "arxiv_url": "https://arxiv.org/abs/2607.18144", "authors": ["Thomas MacDougall", "Maksim Kuznetsov", "Roman Schutski", "Rim Shayakhmetov", "Maxim Malkov", "Vladimir Aladinskiy", "Alex Aliper", "Alex Zhavoronkov"], "brief": "\u8bba\u6587\u63d0\u51fa3D-Fit\uff0c\u4e00\u4e2a\u9762\u5411LLM\u7684\u9ad8\u6548\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u5176\u5728\u86cb\u767d\u53e3\u888b\u6761\u4ef6\u4e0b\u3001\u540c\u65f6\u6ee1\u8db3\u591a\u79cd3D\u7a7a\u95f4\u7ea6\u675f\u7684\u914d\u4f53\u751f\u6210\u80fd\u529b\u3002\u7814\u7a76\u6bd4\u8f83\u4e86\u901a\u7528LLM\u4e0e\u4e13\u7528\u6269\u6563\u6a21\u578b\u5728\u951a\u5b9a\u7247\u6bb5\u3001\u836f\u6548\u56e2\u70b9\u548c\u5f3a\u5236\u53e3\u888b-\u914d\u4f53\u76f8\u4e92\u4f5c\u7528\u7b49\u7ea6\u675f\u4e0b\u7684\u8868\u73b0\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": "https://github.com/insilicomedicine/bench-3d-fit", "github_stars": 1, "hf_url": "https://huggingface.co/papers/2607.18144", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5173\u6ce8\u7ed3\u6784\u57fa\u7840\u836f\u7269\u8bbe\u8ba1\u4e2d\u76843D\u914d\u4f53\u751f\u6210\uff0c\u6761\u4ef6\u5305\u62ec\u86cb\u767d\u53e3\u888b\u3001\u914d\u4f53\u7247\u6bb5\u548c\u76f8\u4e92\u4f5c\u7528\u7ea6\u675f", "3D-Fit\u4ee5token\u9ad8\u6548\u65b9\u5f0f\u6784\u5efa\u591a\u6761\u4ef6\u7a7a\u95f4\u5206\u5b50\u751f\u6210\u8bc4\u6d4b\uff0c\u9002\u914dLLM\u8f93\u5165\u8f93\u51fa\u9650\u5236", "\u7ed3\u679c\u663e\u793aLLM\u4ecd\u843d\u540e\u4e8e\u6700\u5148\u8fdb\u6269\u6563\u6a21\u578b\uff0c\u4f46\u5df2\u80fd\u540c\u65f6\u5904\u7406\u591a\u79cd\u5f02\u6784\u7a7a\u95f4\u7ea6\u675f"], "keywords": ["\u836f\u7269\u8bbe\u8ba1", "\u5206\u5b50\u751f\u6210", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6269\u6563\u6a21\u578b"], "num_comments": 1, "on_hf": true, "organization": "Insilico Medicine", "pdf_url": "https://arxiv.org/pdf/2607.18144v1", "published_at": "2026-07-20", "score": 0.252, "selected_reasons": ["HF trending (12\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18144.png", "title": "Do Language Models Dream of Binding Molecules? Benchmarking LLMs under Spatial Constraints", "tldr": "\u8bc4\u6d4bLLM\u57283D\u7ea6\u675f\u5206\u5b50\u751f\u6210\u4e2d\u7684\u80fd\u529b", "upvotes": 12, "what_it_is": "\u8bba\u6587\u63d0\u51fa3D-Fit\uff0c\u4e00\u4e2a\u9762\u5411LLM\u7684\u9ad8\u6548\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u5176\u5728\u86cb\u767d\u53e3\u888b\u6761\u4ef6\u4e0b\u3001\u540c\u65f6\u6ee1\u8db3\u591a\u79cd3D\u7a7a\u95f4\u7ea6\u675f\u7684\u914d\u4f53\u751f\u6210\u80fd\u529b\u3002\u7814\u7a76\u6bd4\u8f83\u4e86\u901a\u7528LLM\u4e0e\u4e13\u7528\u6269\u6563\u6a21\u578b\u5728\u951a\u5b9a\u7247\u6bb5\u3001\u836f\u6548\u56e2\u70b9\u548c\u5f3a\u5236\u53e3\u888b-\u914d\u4f53\u76f8\u4e92\u4f5c\u7528\u7b49\u7ea6\u675f\u4e0b\u7684\u8868\u73b0\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u7cfb\u7edf\u63ed\u793a\u4e86\u901a\u7528LLM\u5728\u7269\u7406\u4e0e\u4e09\u7ef4\u7a7a\u95f4\u63a8\u7406\u4e0a\u7684\u8fb9\u754c\uff0c\u4e3aLLM\u8fdb\u5165\u7ed3\u6784\u836f\u7269\u8bbe\u8ba1\u63d0\u4f9b\u4e86\u53ef\u590d\u7528\u8bc4\u6d4b\u6846\u67b6\uff0c\u4e5f\u63d0\u793a\u5176\u5728\u591a\u7ea6\u675f\u5206\u5b50\u751f\u6210\u4e2d\u5177\u5907\u6269\u5c55\u6f5c\u529b\u3002"}, {"abstract": "Predicting a football match before kickoff requires more than knowing past results: a model must use changing information and make a clear prediction before the answer is available. We present WorldCupArena, a dynamic benchmark for language models and deep-research agents. The 2026 FIFA World Cup is its first evaluation, and the same process can be reused for future leagues and cups. Before each match, a model either receives a common evidence package or searches for information itself. It predicts the result and score, likely players and events, match statistics, and the outcome of the competition. After the match, these predictions are compared with the recorded result. We report result accuracy, exact-score accuracy, and a scoreline score that gives some credit when a predicted score is close but not exact, together with scores for the other prediction tasks. Across 104 matches and 13 systems, models with similar result accuracy differ more clearly on detailed predictions. Compared with betting-market and human-fan baselines, the best system shows only small gains in result and exact-score accuracy, but a clearer gain in Scoreline. New schedules can be added as they begin, allowing the benchmark to evaluate future models without using outcomes that are already known. Code, prompts, predictions, and evaluation scripts are open sourced at https://github.com/wzk1015/WorldCupArena.", "arxiv_id": "2607.18084", "arxiv_url": "https://arxiv.org/abs/2607.18084", "authors": ["Zhaokai Wang", "Tianlin Gui", "Jiayuan Rao", "Shangzhe Di", "Yihong Tang", "Dingli Liang"], "brief": "\u8bba\u6587\u63d0\u51fa WorldCupArena\uff0c\u4e00\u4e2a\u7528\u4e8e\u7ec6\u7c92\u5ea6\u8bc4\u4f30\u8bed\u8a00\u6a21\u578b\u4e0e\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53\u8db3\u7403\u8d5b\u524d\u9884\u6d4b\u80fd\u529b\u7684\u52a8\u6001\u57fa\u51c6\u3002\u5b83\u4ee5 2026 \u5e74\u4e16\u754c\u676f\u4e3a\u9996\u4e2a\u8bc4\u6d4b\u573a\u666f\uff0c\u5728\u8d5b\u524d\u8ba9\u6a21\u578b\u57fa\u4e8e\u7edf\u4e00\u8bc1\u636e\u5305\u6216\u81ea\u4e3b\u68c0\u7d22\u4fe1\u606f\uff0c\u9884\u6d4b\u8d5b\u679c\u3001\u6bd4\u5206\u3001\u7403\u5458\u4e8b\u4ef6\u3001\u7edf\u8ba1\u6570\u636e\u548c\u8d5b\u4e8b\u8d70\u5411\uff0c\u5e76\u5728\u8d5b\u540e\u81ea\u52a8\u5bf9\u7167\u771f\u5b9e\u7ed3\u679c\u8bc4\u5206\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": "https://github.com/wzk1015/WorldCupArena", "github_stars": 18, "hf_url": "https://huggingface.co/papers/2607.18084", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u8986\u76d6 104 \u573a\u6bd4\u8d5b\u548c 13 \u4e2a\u7cfb\u7edf\uff0c\u8bc4\u4f30\u7ed3\u679c\u51c6\u786e\u7387\u3001\u7cbe\u786e\u6bd4\u5206\u51c6\u786e\u7387\u3001Scoreline \u8fd1\u4f3c\u6bd4\u5206\u5f97\u5206\u7b49\u591a\u7ef4\u6307\u6807", "\u652f\u6301\u4e24\u79cd\u6a21\u5f0f\uff1a\u6a21\u578b\u63a5\u6536\u7edf\u4e00\u8bc1\u636e\u5305\uff0c\u6216\u7531\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53\u81ea\u4e3b\u641c\u7d22\u8d5b\u524d\u4fe1\u606f", "\u7ed3\u679c\u663e\u793a\u76f8\u8fd1\u8d5b\u679c\u51c6\u786e\u7387\u4e0b\uff0c\u6a21\u578b\u5728\u7ec6\u7c92\u5ea6\u9884\u6d4b\u4e0a\u5dee\u5f02\u66f4\u660e\u663e\uff1b\u6700\u4f73\u7cfb\u7edf\u76f8\u5bf9\u535a\u5f69\u5e02\u573a\u548c\u7403\u8ff7\u57fa\u7ebf\u4ec5\u6709\u5c0f\u5e45\u8d5b\u679c\u4f18\u52bf\uff0c\u4f46 Scoreline \u8868\u73b0\u66f4\u597d"], "keywords": ["\u667a\u80fd\u4f53", "\u8bed\u8a00\u6a21\u578b", "\u57fa\u51c6\u8bc4\u6d4b", "\u4fe1\u606f\u68c0\u7d22"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18084v1", "published_at": "2026-07-20", "score": 0.247, "selected_reasons": ["HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18084.png", "title": "WorldCupArena: Fine-Grained Evaluation of Language Models and Deep-Research Agents on Football Forecasting", "tldr": "\u9762\u5411\u4e16\u754c\u676f\u9884\u6d4b\u7684\u52a8\u6001\u6a21\u578b\u8bc4\u6d4b\u57fa\u51c6", "upvotes": 4, "what_it_is": "\u8bba\u6587\u63d0\u51fa WorldCupArena\uff0c\u4e00\u4e2a\u7528\u4e8e\u7ec6\u7c92\u5ea6\u8bc4\u4f30\u8bed\u8a00\u6a21\u578b\u4e0e\u6df1\u5ea6\u7814\u7a76\u667a\u80fd\u4f53\u8db3\u7403\u8d5b\u524d\u9884\u6d4b\u80fd\u529b\u7684\u52a8\u6001\u57fa\u51c6\u3002\u5b83\u4ee5 2026 \u5e74\u4e16\u754c\u676f\u4e3a\u9996\u4e2a\u8bc4\u6d4b\u573a\u666f\uff0c\u5728\u8d5b\u524d\u8ba9\u6a21\u578b\u57fa\u4e8e\u7edf\u4e00\u8bc1\u636e\u5305\u6216\u81ea\u4e3b\u68c0\u7d22\u4fe1\u606f\uff0c\u9884\u6d4b\u8d5b\u679c\u3001\u6bd4\u5206\u3001\u7403\u5458\u4e8b\u4ef6\u3001\u7edf\u8ba1\u6570\u636e\u548c\u8d5b\u4e8b\u8d70\u5411\uff0c\u5e76\u5728\u8d5b\u540e\u81ea\u52a8\u5bf9\u7167\u771f\u5b9e\u7ed3\u679c\u8bc4\u5206\u3002", "why_notable": "\u8be5\u57fa\u51c6\u5f3a\u8c03\u52a8\u6001\u3001\u8d5b\u524d\u3001\u4e0d\u53ef\u6cc4\u6f0f\u7b54\u6848\u7684\u771f\u5b9e\u9884\u6d4b\u8bc4\u6d4b\uff0c\u6bd4\u9759\u6001\u95ee\u7b54\u66f4\u80fd\u68c0\u9a8c\u6a21\u578b\u7684\u4fe1\u606f\u83b7\u53d6\u3001\u65f6\u6548\u63a8\u7406\u548c\u4e0d\u786e\u5b9a\u6027\u5224\u65ad\u80fd\u529b\uff1b\u5f00\u6e90\u4ee3\u7801\u3001\u63d0\u793a\u8bcd\u3001\u9884\u6d4b\u548c\u8bc4\u6d4b\u811a\u672c\uff0c\u4fbf\u4e8e\u672a\u6765\u8d5b\u4e8b\u6301\u7eed\u590d\u7528\u3002"}, {"abstract": "Real-time multimodal applications, including voice agents and interactive video generation, compose heterogeneous models into pipelines whose efficient deployment requires application-specific decisions about placement, streaming, and intra-model parallelism. Existing serving systems and auto-parallelism compilers commit to limited transformations and fixed workload assumptions, so achieving high performance on a new application requires hand-crafting an efficient implementation. We present FlashRT, an agent harness that guides coding agents to lift simple developer-written reference implementations into optimized multi-GPU deployments that flexibly weigh target metrics like latency and throughput. Using a new chain-of-program paradigm, FlashRT directs a generic coding agent through a multi-pass transformation process where an agent transforms the reference into an intermediate representation (IR) to capture data dependencies and persistent-state scopes, validates this IR via a sequential interpreter, and performs static analyses to identify candidate transformations. Then, the agent iteratively implements, verifies, and benchmarks each candidate under a measurement-gated optimization loop to produce effective deployments that span different hardware budgets. Across various applications, including video world models and multimodal LLMs, FlashRT converts reference implementations into highly efficient deployments, delivering up to ~70x latency reduction and 2.8x throughput improvement on NVIDIA B200 GPUs. On AMD MI355X GPUs, FlashRT matches the peak latency reduction while increasing peak throughput improvement to 3.6x, demonstrating that agent-driven optimization can be more scalable on platforms with less mature expert optimization. In fact, for Qwen3-Omni text-to-audio inference, FlashRT reduces response latency by 65% compared to the expert vLLM-Omni implementation on AMD MI355X.", "arxiv_id": "2607.18171", "arxiv_url": "https://arxiv.org/abs/2607.18171", "authors": ["Krish Agarwal", "Zhuoming Chen", "Yanyuan Qin", "Zhenyu Gu", "Atri Rudra", "Beidi Chen"], "brief": "FlashRT \u662f\u4e00\u4e2a\u9762\u5411\u5b9e\u65f6\u591a\u6a21\u6001\u5e94\u7528\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u53ef\u5c06\u5f00\u53d1\u8005\u7f16\u5199\u7684\u7b80\u5355\u53c2\u8003\u5b9e\u73b0\u81ea\u52a8\u63d0\u5347\u4e3a\u9ad8\u6548\u7684\u591a GPU \u90e8\u7f72\u3002\u5b83\u901a\u8fc7\u201c\u7a0b\u5e8f\u94fe\u201d\u6d41\u7a0b\u5f15\u5bfc\u901a\u7528\u7f16\u7801\u667a\u80fd\u4f53\u5b8c\u6210\u4f9d\u8d56\u5206\u6790\u3001\u5e76\u884c\u5316\u6539\u5199\u3001\u9a8c\u8bc1\u4e0e\u57fa\u51c6\u6d4b\u8bd5\u4f18\u5316\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18171", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": ["\u63d0\u51fa chain-of-program \u8303\u5f0f\uff1a\u5148\u628a\u53c2\u8003\u5b9e\u73b0\u8f6c\u6362\u4e3a\u4e2d\u95f4\u8868\u793a\uff0c\u6355\u83b7\u6570\u636e\u4f9d\u8d56\u4e0e\u6301\u4e45\u72b6\u6001\u4f5c\u7528\u57df\uff0c\u518d\u7528\u987a\u5e8f\u89e3\u91ca\u5668\u9a8c\u8bc1\u6b63\u786e\u6027\u3002", "\u7ed3\u5408\u9759\u6001\u5206\u6790\u4e0e\u6d4b\u91cf\u95e8\u63a7\u4f18\u5316\u5faa\u73af\uff0c\u8ba9\u667a\u80fd\u4f53\u9010\u6b65\u5b9e\u73b0\u3001\u9a8c\u8bc1\u3001benchmark \u5019\u9009\u90e8\u7f72\u53d8\u6362\uff0c\u6743\u8861\u5ef6\u8fdf\u3001\u541e\u5410\u548c\u786c\u4ef6\u9884\u7b97\u3002", "\u5728\u89c6\u9891\u4e16\u754c\u6a21\u578b\u3001\u591a\u6a21\u6001 LLM \u7b49\u5e94\u7528\u4e0a\uff0c\u5728 NVIDIA B200 \u4e0a\u6700\u9ad8\u964d\u4f4e\u7ea6 70 \u500d\u5ef6\u8fdf\u3001\u63d0\u5347 2.8 \u500d\u541e\u5410\uff1b\u5728 AMD MI355X \u4e0a\u541e\u5410\u63d0\u5347\u6700\u9ad8 3.6 \u500d\u3002"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u6a21\u578b\u90e8\u7f72", "\u7cfb\u7edf\u4f18\u5316"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18171v1", "published_at": "2026-07-20", "score": 0.246, "selected_reasons": ["HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18171.png", "title": "FlashRT: Agent Harness for Guiding Agents to Deploy Real-Time Multimodal Applications", "tldr": "\u7528\u7f16\u7801\u667a\u80fd\u4f53\u81ea\u52a8\u4f18\u5316\u5b9e\u65f6\u591a\u6a21\u6001\u90e8\u7f72", "upvotes": 4, "what_it_is": "FlashRT \u662f\u4e00\u4e2a\u9762\u5411\u5b9e\u65f6\u591a\u6a21\u6001\u5e94\u7528\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u53ef\u5c06\u5f00\u53d1\u8005\u7f16\u5199\u7684\u7b80\u5355\u53c2\u8003\u5b9e\u73b0\u81ea\u52a8\u63d0\u5347\u4e3a\u9ad8\u6548\u7684\u591a GPU \u90e8\u7f72\u3002\u5b83\u901a\u8fc7\u201c\u7a0b\u5e8f\u94fe\u201d\u6d41\u7a0b\u5f15\u5bfc\u901a\u7528\u7f16\u7801\u667a\u80fd\u4f53\u5b8c\u6210\u4f9d\u8d56\u5206\u6790\u3001\u5e76\u884c\u5316\u6539\u5199\u3001\u9a8c\u8bc1\u4e0e\u57fa\u51c6\u6d4b\u8bd5\u4f18\u5316\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a LLM \u7f16\u7801\u667a\u80fd\u4f53\u7528\u4e8e\u590d\u6742\u7cfb\u7edf\u4f18\u5316\u4e0e\u591a GPU \u63a8\u7406\u90e8\u7f72\uff0c\u51cf\u5c11\u624b\u5de5\u5de5\u7a0b\u8c03\u4f18\u6210\u672c\uff0c\u5e76\u663e\u793a\u5728\u751f\u6001\u8f83\u4e0d\u6210\u719f\u7684\u786c\u4ef6\u5e73\u53f0\u4e0a\u667a\u80fd\u4f53\u9a71\u52a8\u4f18\u5316\u53ef\u80fd\u66f4\u5177\u6269\u5c55\u6027\u3002"}, {"abstract": "Structural fidelity is essential to scientific methodology diagrams. To communicate research logic, these diagrams must faithfully render components, directional relations, and textual annotations. Since a single error, such as a reversed arrow or an unreadable equation, can invalidate the entire figure, structural fidelity is inherently conjunctive: correctness on one axis cannot compensate for failure on another. Current open-source models fail to satisfy this criterion. Supervised fine-tuning (SFT) learns plausible layouts but cannot reliably ensure structural correctness, while scalar reward-based post-training obscures which structural dimension has failed. To address this, we introduce SciForma, a framework for the structure faithful generation of scientific methodology diagrams. Specifically, SciForma decomposes diagram quality into three structural axes: Component, Arrow, and Text, guided by a structural inventory. Built on this foundation, we curate SciFormaData-700K for structured training and SciFormaBench-2K for logic-verified evaluation. To close the gap left by SFT, we develop Multi-Dimensional Conjunctive Preference Optimization (M-DPO), which enforces simultaneous correctness across all axes and adaptively routes gradients to the most deficient dimension in post-training. The same structural inventory also enables iterative editing at inference time to correct residual errors. This combination allows SciForma-9B to exceed all open-source baselines and GPT-Image-1.5 on both SciFormaBench-2K and AIBench, bringing open scientific diagram generation close to proprietary-level structural fidelity. Our code and data will be available at: https://github.com/microsoft/SciForma.", "arxiv_id": "2607.18091", "arxiv_url": "https://arxiv.org/abs/2607.18091", "authors": ["Yuxuan Luo", "Peng Zhang", "Xinjie Zhang", "Xun Guo", "Zhouhui Lian", "Yan Lu"], "brief": "SciForma\u63d0\u51fa\u79d1\u5b66\u65b9\u6cd5\u56fe\u751f\u6210\u6846\u67b6\uff0c\u5c06\u56fe\u8868\u8d28\u91cf\u62c6\u89e3\u4e3a\u7ec4\u4ef6\u3001\u7bad\u5934\u3001\u6587\u672c\u4e09\u7c7b\u7ed3\u6784\u7ef4\u5ea6\uff0c\u5e76\u6784\u5efa70\u4e07\u8bad\u7ec3\u6570\u636e\u4e0e2\u5343\u8bc4\u6d4b\u96c6\u3002\u5b83\u8fdb\u4e00\u6b65\u63d0\u51faM-DPO\u540e\u8bad\u7ec3\u65b9\u6cd5\u4e0e\u63a8\u7406\u65f6\u8fed\u4ee3\u7f16\u8f91\u673a\u5236\uff0c\u4ee5\u63d0\u5347\u79d1\u5b66\u56fe\u4e2d\u903b\u8f91\u7ed3\u6784\u3001\u65b9\u5411\u5173\u7cfb\u548c\u6587\u5b57\u6807\u6ce8\u7684\u53ef\u9760\u6027\u3002", "categories": ["cs.CV", "cs.GR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18091", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u79d1\u5b66\u56fe\u7ed3\u6784\u5fe0\u5b9e\u5ea6\u5206\u89e3\u4e3aComponent\u3001Arrow\u3001Text\u4e09\u6761\u8f74\u7ebf\uff0c\u907f\u514d\u5355\u4e00\u6807\u91cf\u5956\u52b1\u63a9\u76d6\u5177\u4f53\u9519\u8bef\u6765\u6e90", "\u6784\u5efaSciFormaData-700K\u7528\u4e8e\u7ed3\u6784\u5316\u8bad\u7ec3\uff0cSciFormaBench-2K\u7528\u4e8e\u903b\u8f91\u9a8c\u8bc1\u8bc4\u4f30", "\u63d0\u51faMulti-Dimensional Conjunctive Preference Optimization\uff0c\u53ef\u540c\u65f6\u7ea6\u675f\u591a\u7ef4\u6b63\u786e\u6027\u5e76\u5c06\u68af\u5ea6\u81ea\u9002\u5e94\u8def\u7531\u5230\u8584\u5f31\u7ef4\u5ea6"], "keywords": ["\u591a\u6a21\u6001\u751f\u6210", "\u79d1\u5b66\u56fe\u8868", "\u504f\u597d\u4f18\u5316", "\u89c6\u89c9\u751f\u6210"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18091v1", "published_at": "2026-07-20", "score": 0.246, "selected_reasons": ["HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18091.png", "title": "SciForma: Structure-Faithful Generation of Scientific Diagrams", "tldr": "\u9762\u5411\u79d1\u5b66\u6d41\u7a0b\u56fe\u7684\u7ed3\u6784\u5fe0\u5b9e\u751f\u6210\u6846\u67b6", "upvotes": 4, "what_it_is": "SciForma\u63d0\u51fa\u79d1\u5b66\u65b9\u6cd5\u56fe\u751f\u6210\u6846\u67b6\uff0c\u5c06\u56fe\u8868\u8d28\u91cf\u62c6\u89e3\u4e3a\u7ec4\u4ef6\u3001\u7bad\u5934\u3001\u6587\u672c\u4e09\u7c7b\u7ed3\u6784\u7ef4\u5ea6\uff0c\u5e76\u6784\u5efa70\u4e07\u8bad\u7ec3\u6570\u636e\u4e0e2\u5343\u8bc4\u6d4b\u96c6\u3002\u5b83\u8fdb\u4e00\u6b65\u63d0\u51faM-DPO\u540e\u8bad\u7ec3\u65b9\u6cd5\u4e0e\u63a8\u7406\u65f6\u8fed\u4ee3\u7f16\u8f91\u673a\u5236\uff0c\u4ee5\u63d0\u5347\u79d1\u5b66\u56fe\u4e2d\u903b\u8f91\u7ed3\u6784\u3001\u65b9\u5411\u5173\u7cfb\u548c\u6587\u5b57\u6807\u6ce8\u7684\u53ef\u9760\u6027\u3002", "why_notable": "\u79d1\u5b66\u56fe\u751f\u6210\u5bf9\u7ed3\u6784\u6b63\u786e\u6027\u8981\u6c42\u6781\u9ad8\uff0c\u4e00\u4e2a\u7bad\u5934\u65b9\u5411\u6216\u516c\u5f0f\u9519\u8bef\u5c31\u4f1a\u7834\u574f\u6574\u5f20\u56fe\u7684\u542b\u4e49\u3002\u8be5\u5de5\u4f5c\u7cfb\u7edf\u6027\u89e3\u51b3\u5f00\u6e90\u6a21\u578b\u5728\u79d1\u5b66\u65b9\u6cd5\u56fe\u7ed3\u6784\u4fdd\u771f\u4e0a\u7684\u77ed\u677f\uff0c\u5e76\u5ba3\u79f0SciForma-9B\u5728\u57fa\u51c6\u4e0a\u8d85\u8fc7\u5f00\u6e90\u6a21\u578b\u548cGPT-Image-1.5\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Optical coherence tomography (OCT) imaging is essential for the diagnosis and treatment of retinal diseases. Although multimodal large language models (MLLMs) have demonstrated considerable potential in medical image analysis, existing benchmarks largely reduce OCT understanding to coarse-grained disease classification or isolated visual question answering, leaving the complete cognitive process from visual perception to clinical reasoning insufficiently evaluated. To address this limitation, we introduce OCT-Bench, a comprehensive benchmark dedicated to OCT image understanding. OCT-Bench comprises 10,076 high-quality multiple-choice questions constructed from 4,137 OCT images across seven public datasets. Following the real-world clinical interpretation workflow, we establish a hierarchical capability taxonomy consisting of 20 fine-grained tasks across three dimensions: Perception, Cognition, and Reasoning. These tasks cover a broad range of capabilities, including imaging attributes, retinal anatomy, lesion characteristics, spatial relationships, disease assessment, therapeutic decision-making, and prognostic management. We systematically evaluate 20 representative MLLMs, including proprietary models, open-source general-purpose models, and medical-domain models. Experimental results demonstrate that current models remain substantially short of reliable OCT understanding. Moreover, neither medical-domain adaptation nor increased model scale consistently improves performance across capability levels. OCT-Bench enables comprehensive and fine-grained evaluation of MLLMs, providing a foundation for identifying capability bottlenecks and advancing clinically grounded OCT understanding.", "arxiv_id": "2607.16609", "arxiv_url": "https://arxiv.org/abs/2607.16609", "authors": ["Baochen Fu", "Wenzhi Deng", "Baihao Jin", "Yang Li", "Zihan Nie", "Kailin Jiang", "Yuntao Du", "Weiye Song"], "brief": "\u672c\u6587\u63d0\u51fa OCT-Bench\uff0c\u4e00\u4e2a\u9762\u5411\u89c6\u7f51\u819c OCT \u56fe\u50cf\u7406\u89e3\u7684\u7efc\u5408\u57fa\u51c6\uff0c\u5305\u542b\u6765\u81ea7\u4e2a\u516c\u5f00\u6570\u636e\u96c6\u76844137\u5f20\u56fe\u50cf\u4e0e10076\u9053\u9ad8\u8d28\u91cf\u9009\u62e9\u9898\u3002\u57fa\u51c6\u6309\u4e34\u5e8a\u89e3\u8bfb\u6d41\u7a0b\u5212\u5206\u4e3a\u611f\u77e5\u3001\u8ba4\u77e5\u3001\u63a8\u7406\u4e09\u5927\u7ef4\u5ea6\u548c20\u4e2a\u7ec6\u7c92\u5ea6\u4efb\u52a1\uff0c\u7528\u4e8e\u7cfb\u7edf\u8bc4\u4f30MLLM\u7684OCT\u7406\u89e3\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.CL"], "github_repo": "https://github.com/baochenfu/OCT-Bench", "github_stars": 3, "hf_url": "https://huggingface.co/papers/2607.16609", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u8986\u76d6\u6210\u50cf\u5c5e\u6027\u3001\u89c6\u7f51\u819c\u89e3\u5256\u3001\u75c5\u7076\u7279\u5f81\u3001\u7a7a\u95f4\u5173\u7cfb\u3001\u75be\u75c5\u8bc4\u4f30\u3001\u6cbb\u7597\u51b3\u7b56\u4e0e\u9884\u540e\u7ba1\u7406\u7b4920\u7c7b\u4efb\u52a1", "\u8bc4\u6d4b20\u4e2a\u4ee3\u8868\u6027\u591a\u6a21\u6001\u5927\u6a21\u578b\uff0c\u5305\u62ec\u95ed\u6e90\u6a21\u578b\u3001\u901a\u7528\u5f00\u6e90\u6a21\u578b\u548c\u533b\u5b66\u9886\u57df\u6a21\u578b", "\u7ed3\u679c\u663e\u793a\u5f53\u524dMLLM\u8ddd\u79bb\u53ef\u9760OCT\u7406\u89e3\u4ecd\u6709\u660e\u663e\u5dee\u8ddd\uff0c\u533b\u5b66\u9002\u914d\u548c\u6a21\u578b\u89c4\u6a21\u589e\u5927\u5e76\u4e0d\u7a33\u5b9a\u63d0\u5347\u5404\u5c42\u7ea7\u80fd\u529b"], "keywords": ["\u591a\u6a21\u6001", "\u533b\u5b66\u5f71\u50cf", "\u57fa\u51c6\u8bc4\u6d4b", "\u89c6\u89c9\u95ee\u7b54"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16609v1", "published_at": "2026-07-18", "score": 0.245, "selected_reasons": ["HF trending (2\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16609.png", "title": "Can Multimodal Large Language Models Understand OCT?", "tldr": "OCT-Bench\u7ec6\u8bc4\u591a\u6a21\u6001\u6a21\u578b\u773c\u79d1OCT\u7406\u89e3\u80fd\u529b", "upvotes": 2, "what_it_is": "\u672c\u6587\u63d0\u51fa OCT-Bench\uff0c\u4e00\u4e2a\u9762\u5411\u89c6\u7f51\u819c OCT \u56fe\u50cf\u7406\u89e3\u7684\u7efc\u5408\u57fa\u51c6\uff0c\u5305\u542b\u6765\u81ea7\u4e2a\u516c\u5f00\u6570\u636e\u96c6\u76844137\u5f20\u56fe\u50cf\u4e0e10076\u9053\u9ad8\u8d28\u91cf\u9009\u62e9\u9898\u3002\u57fa\u51c6\u6309\u4e34\u5e8a\u89e3\u8bfb\u6d41\u7a0b\u5212\u5206\u4e3a\u611f\u77e5\u3001\u8ba4\u77e5\u3001\u63a8\u7406\u4e09\u5927\u7ef4\u5ea6\u548c20\u4e2a\u7ec6\u7c92\u5ea6\u4efb\u52a1\uff0c\u7528\u4e8e\u7cfb\u7edf\u8bc4\u4f30MLLM\u7684OCT\u7406\u89e3\u80fd\u529b\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c06OCT\u8bc4\u6d4b\u4ece\u7c97\u7c92\u5ea6\u75be\u75c5\u5206\u7c7b\u6216\u5355\u70b9VQA\u6269\u5c55\u5230\u66f4\u8d34\u8fd1\u771f\u5b9e\u4e34\u5e8a\u6d41\u7a0b\u7684\u7ec6\u7c92\u5ea6\u8ba4\u77e5\u94fe\u6761\uff0c\u6709\u52a9\u4e8e\u5b9a\u4f4d\u591a\u6a21\u6001\u533b\u5b66\u6a21\u578b\u5728\u773c\u79d1\u5f71\u50cf\u7406\u89e3\u4e2d\u7684\u80fd\u529b\u74f6\u9888\uff0c\u5e76\u63a8\u52a8\u4e34\u5e8a\u53ef\u4fe1\u8bc4\u6d4b\u3002"}, {"abstract": "Current video generation models achieve impressive results in single-shot generation, yet remain limited in cinematic video generation, where coherent narratives and effective multi-shot composition require explicit shot planning. To address this challenge, we propose ShotPlan, a framework for explicit multi-shot cinematic video generation built upon a video diffusion foundation model. Our method introduces learnable planning tokens that capture shot-level transition cues and can be seamlessly integrated with the original video generation tokens to control transition timestamps. Unlike standard video generation tokens, the proposed planning tokens are equipped with Fractional Temporal Rotary Position Embedding (FRoPE), enabling shot transitions to be modeled at the frame level. Experiments demonstrate that ShotPlan significantly outperforms existing cinematic video generation methods, offering more flexible shot management and stronger inter-shot consistency.", "arxiv_id": "2607.17675", "arxiv_url": "https://arxiv.org/abs/2607.17675", "authors": ["Su Guo", "Guangce Liu", "Haosen Yang", "Jiepeng Wang", "Cong Liu", "Junqi Liu", "Haibin Huang", "Hongxun Yao", "Chi Zhang", "Xuelong Li"], "brief": "\u8bba\u6587\u63d0\u51fa ShotPlan\uff0c\u4e00\u4e2a\u57fa\u4e8e\u89c6\u9891\u6269\u6563\u57fa\u7840\u6a21\u578b\u7684\u663e\u5f0f\u591a\u955c\u5934\u7535\u5f71\u89c6\u9891\u751f\u6210\u6846\u67b6\u3002\u5b83\u901a\u8fc7\u53ef\u5b66\u4e60\u7684 planning token \u5efa\u6a21\u955c\u5934\u7ea7\u8f6c\u573a\u7ebf\u7d22\uff0c\u5e76\u63a7\u5236\u955c\u5934\u5207\u6362\u65f6\u95f4\u70b9\u3002", "categories": ["cs.CV"], "github_repo": "https://github.com/Pensioner-11/ShotPlan", "github_stars": 9, "hf_url": "https://huggingface.co/papers/2607.17675", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u53ef\u5b66\u4e60\u89c4\u5212\u4ee4\u724c\uff0c\u4e0e\u539f\u6709\u89c6\u9891\u751f\u6210 token \u65e0\u7f1d\u7ed3\u5408\uff0c\u7528\u4e8e\u8868\u8fbe\u591a\u955c\u5934\u8f6c\u573a\u4e0e\u53d9\u4e8b\u7ed3\u6784", "\u4e3a\u89c4\u5212\u4ee4\u724c\u8bbe\u8ba1 Fractional Temporal Rotary Position Embedding\uff08FRoPE\uff09\uff0c\u652f\u6301\u5e27\u7ea7\u522b\u7684\u8f6c\u573a\u65f6\u95f4\u5efa\u6a21", "\u5b9e\u9a8c\u663e\u793a\u76f8\u6bd4\u73b0\u6709\u7535\u5f71\u7ea7\u89c6\u9891\u751f\u6210\u65b9\u6cd5\uff0cShotPlan \u5728\u955c\u5934\u7ba1\u7406\u7075\u6d3b\u6027\u548c\u955c\u5934\u95f4\u4e00\u81f4\u6027\u4e0a\u66f4\u5f3a"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u53ef\u63a7\u751f\u6210", "\u591a\u6a21\u6001"], "num_comments": 2, "on_hf": true, "organization": "Tele-AI", "pdf_url": "https://arxiv.org/pdf/2607.17675v1", "published_at": "2026-07-20", "score": 0.244, "selected_reasons": ["HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17675.png", "title": "ShotPlan: Cinematic Video Generation with Learnable Planning Token", "tldr": "\u7528\u53ef\u5b66\u4e60\u89c4\u5212\u4ee4\u724c\u5b9e\u73b0\u591a\u955c\u5934\u7535\u5f71\u7ea7\u89c6\u9891\u751f\u6210", "upvotes": 4, "what_it_is": "\u8bba\u6587\u63d0\u51fa ShotPlan\uff0c\u4e00\u4e2a\u57fa\u4e8e\u89c6\u9891\u6269\u6563\u57fa\u7840\u6a21\u578b\u7684\u663e\u5f0f\u591a\u955c\u5934\u7535\u5f71\u89c6\u9891\u751f\u6210\u6846\u67b6\u3002\u5b83\u901a\u8fc7\u53ef\u5b66\u4e60\u7684 planning token \u5efa\u6a21\u955c\u5934\u7ea7\u8f6c\u573a\u7ebf\u7d22\uff0c\u5e76\u63a7\u5236\u955c\u5934\u5207\u6362\u65f6\u95f4\u70b9\u3002", "why_notable": "\u73b0\u6709\u89c6\u9891\u751f\u6210\u591a\u805a\u7126\u5355\u955c\u5934\uff0c\u96be\u4ee5\u5904\u7406\u7535\u5f71\u53d9\u4e8b\u4e2d\u7684\u591a\u955c\u5934\u7ec4\u5408\u4e0e\u8fde\u8d2f\u8f6c\u573a\uff1bShotPlan \u5c06\u201c\u955c\u5934\u89c4\u5212\u201d\u663e\u5f0f\u6ce8\u5165\u6269\u6563\u751f\u6210\u8fc7\u7a0b\uff0c\u4e3a\u53ef\u63a7\u3001\u957f\u7a0b\u4e00\u81f4\u7684\u5f71\u89c6\u5316\u89c6\u9891\u751f\u6210\u63d0\u4f9b\u4e86\u5b9e\u7528\u65b9\u5411\u3002"}, {"abstract": "Self-hosted AI agents read and write their own memory and configuration files to function. An agent may get compromised via corruption of its own state -- a compromise realized via legitimate OS system call invocation. We refer to this class of threats as self-state attacks. In this paper, we investigate the OS resilience to this class of attacks. Formally, we characterize a four-axis attack space (Target, Mechanism, Granularity, Temporal); investigate the structural limits of prevention, detection, and recovery; and introduce a workload-conditioned view of detectability. To instantiate the framework, we collect live activity traces from a representative self-hosted agent running across distinct workload profiles, and realize the attack space as a 23-cell matrix, 43 concrete operations on real self-state files, and injected into those traces. We then evaluate both canonical and workload-conditioned defense strategies. The empirical results show that a layered defense stack (access-control prevention on the instruction and configuration layers, workload-conditioned detection on the memory layer, and periodic backup for recovery) is effective on most attack cells while a small residual attack surface remains structurally indistinguishable at the OS level. These findings suggest that against the newly established class of self-state attacks, OS-level defense needs to be reconsidered, potentially opening new research directions in the field.", "arxiv_id": "2607.17986", "arxiv_url": "https://arxiv.org/abs/2607.17986", "authors": ["Yimeng Chen", "Nathana\u00ebl Denis", "Roberto Di Pietro", "J\u00fcrgen Schmidhuber"], "brief": "\u672c\u6587\u63d0\u51fa\u201c\u81ea\u72b6\u6001\u653b\u51fb\u201d\u8fd9\u4e00\u5a01\u80c1\u7c7b\u522b\uff1a\u653b\u51fb\u8005\u901a\u8fc7\u5408\u6cd5\u7cfb\u7edf\u8c03\u7528\u7be1\u6539\u81ea\u6258\u7ba1 AI \u667a\u80fd\u4f53\u81ea\u8eab\u7684\u5185\u5b58\u3001\u914d\u7f6e\u6216\u72b6\u6001\u6587\u4ef6\u3002\u8bba\u6587\u6784\u5efa\u56db\u8f74\u653b\u51fb\u7a7a\u95f4\uff0c\u5e76\u7528\u771f\u5b9e\u667a\u80fd\u4f53\u8fd0\u884c\u8f68\u8ff9\u6ce8\u516543\u79cd\u5177\u4f53\u653b\u51fb\u64cd\u4f5c\uff0c\u8bc4\u4f30\u64cd\u4f5c\u7cfb\u7edf\u5c42\u9762\u7684\u9884\u9632\u3001\u68c0\u6d4b\u4e0e\u6062\u590d\u80fd\u529b\u3002", "categories": ["cs.CR", "cs.AI", "cs.CL", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17986", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": ["\u5c06\u653b\u51fb\u7a7a\u95f4\u5f62\u5f0f\u5316\u4e3a Target\u3001Mechanism\u3001Granularity\u3001Temporal \u56db\u4e2a\u7ef4\u5ea6\uff0c\u5e76\u843d\u5730\u4e3a23\u4e2a\u653b\u51fb\u5355\u5143\u4e0e43\u4e2a\u771f\u5b9e\u81ea\u72b6\u6001\u6587\u4ef6\u64cd\u4f5c\u3002", "\u53d1\u73b0\u5206\u5c42\u9632\u5fa1\u8f83\u6709\u6548\uff1a\u6307\u4ee4\u4e0e\u914d\u7f6e\u5c42\u7528\u8bbf\u95ee\u63a7\u5236\u9884\u9632\uff0c\u8bb0\u5fc6\u5c42\u7528\u5de5\u4f5c\u8d1f\u8f7d\u6761\u4ef6\u5316\u68c0\u6d4b\uff0c\u6062\u590d\u5c42\u7528\u5468\u671f\u5907\u4efd\u3002", "\u6307\u51fa\u4ecd\u5b58\u5728\u4e00\u5c0f\u90e8\u5206\u653b\u51fb\u5728OS\u5c42\u9762\u4e0e\u6b63\u5e38\u884c\u4e3a\u7ed3\u6784\u4e0a\u4e0d\u53ef\u533a\u5206\uff0c\u5f62\u6210\u6b8b\u4f59\u653b\u51fb\u9762\u3002"], "keywords": ["\u667a\u80fd\u4f53", "\u7cfb\u7edf\u5b89\u5168", "\u8fd0\u884c\u65f6\u76d1\u63a7", "AI\u5b89\u5168"], "num_comments": 1, "on_hf": true, "organization": "KAUST Center of Excellence in Generative AI", "pdf_url": "https://arxiv.org/pdf/2607.17986v1", "published_at": "2026-07-20", "score": 0.241, "selected_reasons": ["HF trending (3\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17986.png", "title": "Self-State Attacks on Self-Hosted AI Agents: How Far Can OS Defenses Go?", "tldr": "\u7cfb\u7edf\u523b\u753b\u81ea\u6258\u7ba1\u667a\u80fd\u4f53\u7684\u81ea\u72b6\u6001\u653b\u51fb\u4e0eOS\u9632\u5fa1\u8fb9\u754c", "upvotes": 3, "what_it_is": "\u672c\u6587\u63d0\u51fa\u201c\u81ea\u72b6\u6001\u653b\u51fb\u201d\u8fd9\u4e00\u5a01\u80c1\u7c7b\u522b\uff1a\u653b\u51fb\u8005\u901a\u8fc7\u5408\u6cd5\u7cfb\u7edf\u8c03\u7528\u7be1\u6539\u81ea\u6258\u7ba1 AI \u667a\u80fd\u4f53\u81ea\u8eab\u7684\u5185\u5b58\u3001\u914d\u7f6e\u6216\u72b6\u6001\u6587\u4ef6\u3002\u8bba\u6587\u6784\u5efa\u56db\u8f74\u653b\u51fb\u7a7a\u95f4\uff0c\u5e76\u7528\u771f\u5b9e\u667a\u80fd\u4f53\u8fd0\u884c\u8f68\u8ff9\u6ce8\u516543\u79cd\u5177\u4f53\u653b\u51fb\u64cd\u4f5c\uff0c\u8bc4\u4f30\u64cd\u4f5c\u7cfb\u7edf\u5c42\u9762\u7684\u9884\u9632\u3001\u68c0\u6d4b\u4e0e\u6062\u590d\u80fd\u529b\u3002", "why_notable": "\u8bba\u6587\u628a\u81ea\u6258\u7ba1 AI \u667a\u80fd\u4f53\u7684\u201c\u8bfb\u5199\u81ea\u8eab\u72b6\u6001\u201d\u4e0a\u5347\u4e3a\u65b0\u7684\u5b89\u5168\u95ee\u9898\uff0c\u8bf4\u660e\u4f20\u7edfOS\u9632\u5fa1\u9762\u5bf9\u5408\u6cd5\u7cfb\u7edf\u8c03\u7528\u578b\u7834\u574f\u5b58\u5728\u6839\u672c\u8fb9\u754c\uff0c\u5bf9\u667a\u80fd\u4f53\u5b89\u5168\u3001\u6c99\u7bb1\u9694\u79bb\u548c\u8fd0\u884c\u65f6\u76d1\u63a7\u90fd\u6709\u76f4\u63a5\u542f\u53d1\u3002"}, {"abstract": "Large language models (LLMs) have demonstrated growing competence in web page generation. However, existing text-driven approaches rely on complex prompts that impose substantial demands on users and offer limited expressivity for page layout and cross-page visual coherence. Image-driven paradigms, which take UI screenshots as input, align more closely with real development workflows. However, current benchmarks focus primarily on visual fidelity and lack a systematic evaluation of the interaction capabilities in generated artifacts. To address this gap, we introduce UI2App, the first benchmark targeting interaction inference, the ability to recover application behavior from screenshots alone, without any textual or behavioral guidance. UI2App comprises 327 screenshots grouped into 45 state-coherent screenshot sets for runnable multi-route web applications. We design an end-to-end pipeline that evaluates each artifact along four dimensions: executability, navigation reachability, visual fidelity, and interaction inference. The interaction metric (IIS) assesses inferred interactions by functional correctness and state-management complexity, crediting any valid implementation rather than matching a single reference. Experiments on six frontier vision-language models reveal a marked capability mismatch between visual reconstruction and interaction realization: the visual-fidelity leader scores only 7.5 on IIS, ranking fourth and trailing the IIS leader by 5.2x. High-complexity interactions such as cross-page state remain a pervasive bottleneck, with half of the evaluated models scoring exactly zero on this dimension. Overall, the results indicate that inferring complete interaction behavior from static screenshots remains a key challenge for models.", "arxiv_id": "2607.06306", "arxiv_url": "https://arxiv.org/abs/2607.06306", "authors": ["Grace Man Chen", "Litao Guo", "Yifan Wu", "Yiyu Chen", "Yenchi Tseng", "Sicheng Liu", "Yuyu Luo", "Ying-Cong Chen"], "brief": "\u8bba\u6587\u63d0\u51fa UI2App \u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u6a21\u578b\u4ec5\u51ed UI \u622a\u56fe\u751f\u6210\u53ef\u8fd0\u884c\u591a\u9875\u9762 Web \u5e94\u7528\u65f6\uff0c\u80fd\u5426\u63a8\u65ad\u51fa\u5bfc\u822a\u3001\u72b6\u6001\u7ba1\u7406\u7b49\u4ea4\u4e92\u884c\u4e3a\u3002\u57fa\u51c6\u5305\u542b 45 \u7ec4\u72b6\u6001\u4e00\u81f4\u7684\u622a\u56fe\u96c6\uff0c\u5171 327 \u5f20\u622a\u56fe\uff0c\u5e76\u63d0\u4f9b\u7aef\u5230\u7aef\u8bc4\u6d4b\u6d41\u7a0b\u3002", "categories": ["cs.SE", "cs.AI", "cs.CV"], "github_repo": "https://github.com/chenmancm169/UI2App", "github_stars": 1, "hf_url": "https://huggingface.co/papers/2607.06306", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": ["\u8bc4\u6d4b\u7ef4\u5ea6\u5305\u62ec\u53ef\u6267\u884c\u6027\u3001\u5bfc\u822a\u53ef\u8fbe\u6027\u3001\u89c6\u89c9\u4fdd\u771f\u5ea6\u548c\u4ea4\u4e92\u63a8\u65ad\u80fd\u529b", "\u63d0\u51fa IIS \u6307\u6807\uff0c\u4ece\u529f\u80fd\u6b63\u786e\u6027\u548c\u72b6\u6001\u7ba1\u7406\u590d\u6742\u5ea6\u8bc4\u4f30\u4ea4\u4e92\u5b9e\u73b0\uff0c\u5141\u8bb8\u591a\u79cd\u6709\u6548\u5b9e\u73b0\u800c\u975e\u5339\u914d\u552f\u4e00\u53c2\u8003", "\u516d\u4e2a\u524d\u6cbf\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5b9e\u9a8c\u663e\u793a\uff0c\u89c6\u89c9\u8fd8\u539f\u80fd\u529b\u4e0e\u4ea4\u4e92\u5b9e\u73b0\u80fd\u529b\u5b58\u5728\u660e\u663e\u8131\u8282\uff0c\u8de8\u9875\u9762\u72b6\u6001\u7b49\u9ad8\u590d\u6742\u4ea4\u4e92\u4ecd\u662f\u74f6\u9888"], "keywords": ["GUI", "\u591a\u6a21\u6001", "\u4ee3\u7801\u751f\u6210", "\u667a\u80fd\u4f53"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06306v1", "published_at": "2026-07-07", "score": 0.239, "selected_reasons": ["HF trending (2\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.06306.png", "title": "UI2App: Benchmarking Visual Interaction Inference in Executable Web Application Generation", "tldr": "\u9996\u4e2a\u8bc4\u6d4b\u4ece\u622a\u56fe\u63a8\u65ad\u7f51\u9875\u4ea4\u4e92\u7684\u57fa\u51c6", "upvotes": 2, "what_it_is": "\u8bba\u6587\u63d0\u51fa UI2App \u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u6a21\u578b\u4ec5\u51ed UI \u622a\u56fe\u751f\u6210\u53ef\u8fd0\u884c\u591a\u9875\u9762 Web \u5e94\u7528\u65f6\uff0c\u80fd\u5426\u63a8\u65ad\u51fa\u5bfc\u822a\u3001\u72b6\u6001\u7ba1\u7406\u7b49\u4ea4\u4e92\u884c\u4e3a\u3002\u57fa\u51c6\u5305\u542b 45 \u7ec4\u72b6\u6001\u4e00\u81f4\u7684\u622a\u56fe\u96c6\uff0c\u5171 327 \u5f20\u622a\u56fe\uff0c\u5e76\u63d0\u4f9b\u7aef\u5230\u7aef\u8bc4\u6d4b\u6d41\u7a0b\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u622a\u56fe\u751f\u6210\u7f51\u9875\u7684\u8bc4\u6d4b\u91cd\u70b9\u4ece\u201c\u770b\u8d77\u6765\u50cf\u201d\u63a8\u8fdb\u5230\u201c\u80fd\u5426\u771f\u6b63\u4ea4\u4e92\u201d\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u4ece\u9759\u6001 UI \u63a8\u65ad\u52a8\u6001\u5e94\u7528\u884c\u4e3a\u4e0a\u7684\u5173\u952e\u77ed\u677f\uff0c\u5bf9 GUI \u751f\u6210\u3001\u524d\u7aef\u81ea\u52a8\u5316\u548c\u667a\u80fd\u4f53\u73af\u5883\u6784\u5efa\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We propose Token-Level Off-Policy Labeling (TOPL), an off-policy training paradigm that reframes post-training as a token-level correctness prediction task. Our key intuition is that by training the model to distinguish good and bad tokens in a response, we naturally guide the model towards generating good tokens, while avoiding the pitfalls that come with directly training the model to generate off-policy tokens. Experiments on document summarization tasks show that TOPL achieves strong out-of-distribution generalization across 11 datasets against a diverse set of sequence-level and token-level baselines. We further demonstrate that TOPL transfers effectively to machine translation, suggesting that its benefits generalize across different faithful generation tasks. Through ablation studies, we confirm that our token-level learning signal is critical to good performance; sequence-level analogues do not confer similar benefits. Finally, we show that TOPL induces interpretable model updates: the LoRA adapters learned through TOPL function as linear classification heads and steering vectors.", "arxiv_id": "2607.17524", "arxiv_url": "https://arxiv.org/abs/2607.17524", "authors": ["Zitong Huang", "Gustavo Lucas Carvalho", "Deqing Fu", "Robin Jia"], "brief": "\u8bba\u6587\u63d0\u51fa Token-Level Off-Policy Labeling\uff08TOPL\uff09\uff0c\u5c06\u540e\u8bad\u7ec3\u91cd\u6784\u4e3a\u5bf9\u56de\u590d\u4e2d\u6bcf\u4e2a token \u8fdb\u884c\u6b63\u786e\u6027\u9884\u6d4b\uff0c\u800c\u975e\u76f4\u63a5\u6a21\u4eff\u79bb\u7b56\u7565\u8f93\u51fa\u3002\u5728\u6458\u8981\u4e0e\u673a\u5668\u7ffb\u8bd1\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u4e86\u5176\u80fd\u63d0\u5347\u5206\u5e03\u5916\u5fe0\u5b9e\u751f\u6210\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17524", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["TOPL \u8bad\u7ec3\u6a21\u578b\u533a\u5206\u597d/\u574f token\uff0c\u4ece\u800c\u5f15\u5bfc\u751f\u6210\u66f4\u53ef\u9760\u5185\u5bb9\uff0c\u907f\u514d\u76f4\u63a5\u5b66\u4e60\u79bb\u7b56\u7565 token \u5e26\u6765\u7684\u504f\u5dee\u3002", "\u5728\u6587\u6863\u6458\u8981\u4efb\u52a1\u7684 11 \u4e2a\u6570\u636e\u96c6\u4e0a\uff0c\u76f8\u6bd4\u591a\u79cd\u5e8f\u5217\u7ea7\u548c token \u7ea7\u57fa\u7ebf\u8868\u73b0\u51fa\u66f4\u5f3a\u7684\u5206\u5e03\u5916\u6cdb\u5316\u3002", "\u6d88\u878d\u5b9e\u9a8c\u663e\u793a token \u7ea7\u5b66\u4e60\u4fe1\u53f7\u662f\u6027\u80fd\u5173\u952e\uff1bTOPL \u5b66\u5230\u7684 LoRA \u9002\u914d\u5668\u8fd8\u53ef\u89e3\u91ca\u4e3a\u7ebf\u6027\u5206\u7c7b\u5934\u548c steering vectors\u3002"], "keywords": ["\u5fe0\u5b9e\u751f\u6210", "\u79bb\u7b56\u7565\u5b66\u4e60", "\u540e\u8bad\u7ec3", "\u81ea\u7136\u8bed\u8a00\u751f\u6210"], "num_comments": 1, "on_hf": true, "organization": "University of Southern California", "pdf_url": "https://arxiv.org/pdf/2607.17524v1", "published_at": "2026-07-20", "score": 0.226, "selected_reasons": ["HF trending (5\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17524.png", "title": "Token-Level Off-Policy Learning for Faithful Generation Under Distribution Shift", "tldr": "\u7528 token \u7ea7\u79bb\u7b56\u7565\u6807\u6ce8\u63d0\u5347\u5fe0\u5b9e\u751f\u6210\u6cdb\u5316\u3002", "upvotes": 5, "what_it_is": "\u8bba\u6587\u63d0\u51fa Token-Level Off-Policy Labeling\uff08TOPL\uff09\uff0c\u5c06\u540e\u8bad\u7ec3\u91cd\u6784\u4e3a\u5bf9\u56de\u590d\u4e2d\u6bcf\u4e2a token \u8fdb\u884c\u6b63\u786e\u6027\u9884\u6d4b\uff0c\u800c\u975e\u76f4\u63a5\u6a21\u4eff\u79bb\u7b56\u7565\u8f93\u51fa\u3002\u5728\u6458\u8981\u4e0e\u673a\u5668\u7ffb\u8bd1\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u4e86\u5176\u80fd\u63d0\u5347\u5206\u5e03\u5916\u5fe0\u5b9e\u751f\u6210\u80fd\u529b\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u4e3a\u5fe0\u5b9e\u751f\u6210\u63d0\u4f9b\u4e86\u4e00\u79cd\u66f4\u7ec6\u7c92\u5ea6\u3001\u53ef\u89e3\u91ca\u7684\u540e\u8bad\u7ec3\u8303\u5f0f\uff0c\u5c24\u5176\u9002\u5408\u5e94\u5bf9\u6458\u8981\u548c\u7ffb\u8bd1\u4e2d\u7684\u5206\u5e03\u504f\u79fb\u4e0e\u5e7b\u89c9\u95ee\u9898\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "This paper is a practitioner guide to graph-based workflow pathways for long-running, stateful, multi-step generative AI systems in business processes. Rather than treating LangGraph, a low-level orchestration framework for stateful agents, as a model-quality benchmark target, we present three executable recipes -- SQL analytics with repair loops, agentic retrieval-augmented generation with evidence gating, and human-in-the-loop policy review with interrupt and checkpoint recovery -- to show how typed state, conditional routing, deterministic tools, retries, interrupts, checkpoints, and traces fit together. LangGraph is positioned by workflow-complexity fit, not as a universal default: simpler ReAct-style or plain SDK loops may be better for basic tool use, schema-first tools for structured extraction and validation, and DSPy when prompt or program optimization is the main goal. Each recipe explains when LangGraph is worth the extra structure and which implementation patterns make routes, pauses, and audit trails explicit product behavior rather than hidden prompt logic.", "arxiv_id": "2607.19297", "arxiv_url": "https://arxiv.org/abs/2607.19297", "authors": ["Daniel Pearson", "Sidney Shapiro", "Emiliano Sebastian Gonzalez Venegas", "Sanad Al-Khatib", "Aurora Pinz\u00f3n Arzola"], "brief": "\u672c\u6587\u662f\u4e00\u7bc7\u9762\u5411\u5b9e\u8df5\u7684\u6307\u5357\uff0c\u4ecb\u7ecd\u5982\u4f55\u7528 LangGraph \u6784\u5efa\u957f\u6d41\u7a0b\u3001\u6709\u72b6\u6001\u3001\u591a\u6b65\u9aa4\u7684\u4f01\u4e1a\u7ea7\u751f\u6210\u5f0f AI \u5de5\u4f5c\u6d41\u3002\u901a\u8fc7 SQL \u5206\u6790\u4fee\u590d\u5faa\u73af\u3001\u5e26\u8bc1\u636e\u95e8\u63a7\u7684 RAG\u3001\u4eba\u5728\u56de\u8def\u7684\u7b56\u7565\u5ba1\u6838\u7b49\u6848\u4f8b\uff0c\u5c55\u793a\u7c7b\u578b\u5316\u72b6\u6001\u3001\u6761\
