<script>
const PAPERS = [{"abstract": "Recent growth in reinforcement learning (RL) has surfaced a need for diverse, specialized training environments. Hand-curated environments with fixed task and reward difficulties become ineffective signals as model performance improves, and sparse rewards over long horizons induce mode collapse on specific workflows or tool structures. World models that simulate environment states have matched pure rollout performance, making them promising for scaling diversity on-demand. However, autoregressive (AR) world models suffer from a left-to-right bias preventing conditioning on globally interdependent state anchors such as tool schemas, prior turns, and expected outcomes. We (i) formalize text-based world modeling as a steerable transition-dynamics problem decomposed into initial state, task context, tool schemas, domain rules, and steering directives, and (ii) curate 239,403 grounded state-action trajectories spanning nine open-source environments and twelve frontier model families. We compare AR LMs and masked diffusion language models (MDLMs), showing MDLMs, via bidirectional anchor-aware denoising, achieve better coherence, groundedness, and empirically validated rollout diversity than LLMs over 4x their parameter size, at comparable inference latency. We introduce a plug-and-play GRPO training framework with deterministic state checks, and perform zero-shot transfer ablations on three OOD environments (ScienceWorld, ALFWorld, AppWorld) across three 1.2B-7B agent backbones (LFM2.5, Qwen3, Mistral), achieving up to 47% absolute gains over baselines without environment-specific fine-tuning. We further conduct behavioral analysis of failure modes under adversarial scenarios and human evaluation on realism, outcome correctness, and training utility. We open-source our work to encourage research in this direction.", "arxiv_id": "2607.16204", "arxiv_url": "https://arxiv.org/abs/2607.16204", "authors": ["Darshan Deshpande"], "brief": "", "categories": ["cs.AI", "cs.LG"], "github_repo": "https://github.com/patronus-ai/mdlm_world_modeling", "github_stars": 2, "hf_url": "https://huggingface.co/papers/2607.16204", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "Patronus AI", "pdf_url": "https://arxiv.org/pdf/2607.16204v1", "published_at": "2026-05-07", "score": 0.4, "selected_reasons": ["\u77e5\u540d\u673a\u6784: NUS", "\u4e0e computer use / agent \u76f8\u5173", "HF trending (3\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16204.png", "title": "Masked Diffusion Language Models are Strong and Steerable Text-Based World Models for Agentic RL", "tldr": null, "upvotes": 3, "what_it_is": null, "why_notable": null}, {"abstract": "Pruning long context for coding agents has been a vital technology for efficient context management. While existing context pruning methods such as SWE-Pruner realize this by attaching a separate code classifier, we find the agent itself encodes internal representations indicating the relevance of code context when reading tool output. Based on this finding, we propose SWE-Pruner Pro, which prunes tool outputs directly inside the agent. Concretely, a small head turns the agent\u0027s own internal representations into a keep-or-prune label for each line, with a length-aware embedding keyed to each tool output\u0027s line count. Across two open-weight backbones and four multi-turn benchmarks, SWE-Pruner Pro saves up to 39% of prompt and completion tokens while preserving task quality, with bounded inference overhead. Notably, on MiMo-V2-Flash SWE-Pruner Pro additionally raises the SWE-Bench Verified resolve rate by +3.8% and the long-context Oolong accuracy by +2.2 points.", "arxiv_id": "2607.18213", "arxiv_url": "https://arxiv.org/abs/2607.18213", "authors": ["Yuhang Wang", "Yuling Shi", "Shaoqiu Zhang", "Jialiang Liang", "Shilin He", "Siyu Ye", "Yuting Chen", "Kai Cai", "Xiaodong Gu"], "brief": "", "categories": ["cs.CL", "cs.SE"], "github_repo": "https://github.com/Ayanami1314/swe-pruner-pro", "github_stars": 3, "hf_url": "https://huggingface.co/papers/2607.18213", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 2, "on_hf": true, "organization": "ByteDance", "pdf_url": "https://arxiv.org/pdf/2607.18213v1", "published_at": "2026-07-20", "score": 0.366, "selected_reasons": ["\u77e5\u540d\u673a\u6784: ByteDance", "HF trending (65\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18213.png", "title": "SWE-Pruner Pro: The Coder LLM Already Knows What to Prune", "tldr": null, "upvotes": 65, "what_it_is": null, "why_notable": null}, {"abstract": "This paper introduces EvolvingWorld, a framework and benchmark for character and world co-evolution in interactive literary worlds. Existing systems either treat interactive literary simulation as static persona imitation or isolated scene generation, failing to capture how characters and worlds evolve together over time. To address this, EvolvingWorld models literary simulation as a long-horizon process where characters interact, scenes progress, and character and world states are persistently updated. Unlike prior systems relying on fixed schemas, EvolvingWorld adopts an open-schema framework to support simulation across diverse literary worlds. The framework consists of two coupled modules: a Character Agent for multi-character role-play and persistent profile evolution, and an LLM-based World Model for global and location/entity-level state maintenance and scene progression. Based on this architecture, we formulate 7 trainable tasks for scene initialization, interaction generation, and state update. We construct a dataset from 57 books, producing 138,596 supervised training samples and 222 snapshots for testing. Furthermore, we introduce a trajectory-level LLM-as-Judge evaluation protocol spanning 10 dimensions and 20 metrics. Experiments show that EvolvingWorld can improve long-horizon simulation by effectively maintaining persistent, coherent character and world development.", "arxiv_id": "2607.17250", "arxiv_url": "https://arxiv.org/abs/2607.17250", "authors": ["Qing Zong", "Yue Guo", "Mengxin Yang", "Yiwen Guo", "Yangqiu Song"], "brief": "", "categories": ["cs.CL"], "github_repo": "https://github.com/HKUST-KnowComp/EvolvingWorld", "github_stars": 5, "hf_url": "https://huggingface.co/papers/2607.17250", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "Tencent", "pdf_url": "https://arxiv.org/pdf/2607.17250v1", "published_at": "2026-07-19", "score": 0.357, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Tencent", "HF trending (74\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17250.png", "title": "EvolvingWorld: An Open-Schema Framework for Co-Evolving Role-Play Agents and World Model in Interactive Literary World", "tldr": null, "upvotes": 74, "what_it_is": null, "why_notable": null}, {"abstract": "We present RynnBrain 1.1, a family of embodied foundation models spanning 2B, 9B, and 122B-A10B scales. Trained with a unified spatio-temporal and physically grounded framework, RynnBrain 1.1 supports embodied perception, spatial reasoning, localization, and planning. Compared with RynnBrain 1.0, it further introduces contact-point prediction across the model family and native 3D grounding for the 2B and 9B models, yielding representations and outputs that are more directly aligned with robot manipulation. We also develop RynnBrain-VLA with a unified cross-embodiment action space and embodiment-specific masking, and deploy it on Unitree G1, Astribot-S1, and Tianji-Wuji. RynnBrain 1.1 achieves strong results on embodied cognition, localization, and 3D grounding, with the 122B-A10B model outperforming all evaluated proprietary and open-source models on VSI-Bench, MMSI, and RefSpatial-Bench. Real-robot experiments show that RynnBrain-initialized policies outperform Qwen-based and representative generalist VLAs, while joint multi-task and multi-embodiment training improves process scores and success rates over per-task training.", "arxiv_id": "2607.17977", "arxiv_url": "https://arxiv.org/abs/2607.17977", "authors": ["Kehan Li", "Bohan Hou", "Minghao Zhu", "Tianyi Zhang", "Zesen Cheng", "Zhikai Wang", "Sicong Leng", "Xin Li", "Xiao Lin", "Biying Yao", "Minghua Zeng", "Jiangpin Liu", "Ronghao Dang", "Jiayan Guo", "Siteng Huang", "Haoyu Zhao", "Heng Ping", "Yaxi Zhao", "Kexiang Wang", "Tong Lu", "Shengke Xue", "Jiahao Tang", "Yulei Wang", "Zejing Wang", "Jianwei Gao", "Shijian Lu", "Chengju Liu", "Jianfei Yang", "Mingxiu Chen", "Deli Zhao"], "brief": "", "categories": ["cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17977", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 2, "on_hf": true, "organization": "DAMO Academy", "pdf_url": "https://arxiv.org/pdf/2607.17977v1", "published_at": "2026-07-20", "score": 0.336, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Qwen/Alibaba", "HF trending (33\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17977.png", "title": "RynnBrain 1.1: Towards More Capable and Generalizable Embodied Foundation Model", "tldr": null, "upvotes": 33, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning (RL) on open-ended tasks compresses an LLM\u0027s rubric-based evaluation into a scalar reward, discarding rich textual feedback and conflating responses with distinct quality profiles. We propose Experiential Learning (EL), which repurposes the feedback model from an LLM-as-a-Judge into an LLM-as-a-Coach. The coach distills its assessment of each on-policy response into transferable experiential knowledge, which conditions a teacher model and is internalized by the policy through on-policy context distillation. Compared with scalar rewards, this higher-bandwidth feedback channel provides dense supervision and preserves fine-grained preferences among high-quality responses. Across two policy families, with feedback from the policy itself or a proprietary model, EL consistently outperforms rubric-based RL on held-out and unseen open-ended tasks. Notably, EL generalizes better beyond the training distribution, and mitigates reward hacking. These findings establish experiential knowledge as a richer and more generalizable learning signal for post-training on non-verifiable tasks.", "arxiv_id": "2607.18110", "arxiv_url": "https://arxiv.org/abs/2607.18110", "authors": ["Tianzhu Ye", "Li Dong", "Guanheng Chen", "He Zhu", "Xun Wu", "Shaohan Huang", "Furu Wei"], "brief": "", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18110", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "Microsoft Research", "pdf_url": "https://arxiv.org/pdf/2607.18110v1", "published_at": "2026-07-20", "score": 0.302, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Microsoft", "HF trending (9\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18110.png", "title": "LLM-as-a-Coach: Experiential Learning for Non-Verifiable Tasks", "tldr": null, "upvotes": 9, "what_it_is": null, "why_notable": null}, {"abstract": "Training API-calling large language model (LLM) agents demands massive amounts of high-quality trajectories. However, collecting such data at scale typically requires fully implemented environments with executable APIs and realistic, pre-populated backend databases, creating a major bottleneck for scalability. To overcome this, we propose an environment-free synthetic data generation approach that leverages LLMs as on-the-fly digital world models. Given only API specifications, our method generates trajectories mimicking interactions between an agent and a stateful environment. Specifically, an LLM first generates diverse tasks solvable with the provided APIs. A teacher agent then iteratively solves each task while an LLM simulator generates coherent synthetic API responses conditioned on the task context and simulation history. Finally, an LLM judge filters the trajectories to ensure the quality of the resulting dataset. We evaluate our approach on the challenging AppWorld and OfficeBench benchmarks, which include both information-retrieval and state-changing tasks. Fine-tuning models on our synthetic data yields significant performance gains, demonstrating that effective supervision for API-calling agents can be generated without any executable environment. Our results establish LLM-based API simulation as a practical, scalable solution for training agents across diverse API ecosystems.", "arxiv_id": "2607.16900", "arxiv_url": "https://arxiv.org/abs/2607.16900", "authors": ["Seanie Lee", "Sanjoy Chowdhury", "Chao Jiang", "Cheng-Yu Hsieh", "Ting-Yao Hu", "Alexander T Toshev", "Oncel Tuzel", "Raviteja Vemulapalli"], "brief": "", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16900", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "Apple", "pdf_url": "https://arxiv.org/pdf/2607.16900v1", "published_at": "2026-07-18", "score": 0.289, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Apple", "HF trending (15\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16900.png", "title": "Environment-free Synthetic Data Generation for API-Calling Agents", "tldr": null, "upvotes": 15, "what_it_is": null, "why_notable": null}, {"abstract": "Large-scale visual generators are increasingly capable but costly to train, fine-tune, and deploy. We introduce Mage-Flow, a compact 4B-scale generative stack for efficient text-to-image generation and instruction-based image editing. The stack is built from two co-designed components: Mage-VAE, a lightweight high-fidelity latent tokenizer, and a Native-Resolution Multimodal Diffusion Transformer trained with rectified flow matching. Mage-VAE uses one-step diffusion-style encoding and decoding with anchor-latent regularization, preserving the reconstruction quality of strong public VAEs while reducing tokenization cost by more than an order of magnitude. Together with native-resolution packing and stack-level CUDA kernel fusion, the stack supports flexible-resolution training and improves end-to-end training throughput by about $2.5\\times$. Built on this foundation, we develop a complete model family with Base, RL-aligned, and Turbo variants for both generation and editing. Diffusion-NFT improves prompt following, text rendering, aesthetic quality, and editing fidelity, while few-step distillation with adversarial perceptual guidance produces 4-step Turbo models for low-latency inference. Despite its compact scale, Mage-Flow and Mage-Flow-Edit achieves competitive performance across standard generation and editing benchmarks. More importantly, the Turbo variants make high-resolution generation and editing practical for interactive use: at $1024^2$ resolution on a single NVIDIA A100 GPU, Mage-Flow-Turbo generates an image in 0.59s, and Mage-Flow-Edit-Turbo edits an image in 1.02s, while maintaining a small memory footprint. These results show that careful tokenizer--backbone--system co-design can deliver strong high-resolution generation and editing within an efficient 4B model family.", "arxiv_id": "2607.19064", "arxiv_url": "https://arxiv.org/abs/2607.19064", "authors": ["Xinjie Zhang", "Peng Zhang", "Shicheng Zheng", "Jinghao Guo", "Zhaoyang Jia", "Yifei Shen", "Xun Guo", "Yuxuan Luo", "Jiahao Li", "Wenxuan Xie", "Fanyi Pu", "Xiaoyi Zhang", "Kaichen Zhang", "Zongyu Guo", "Tianci Bi", "Dongnan Gui", "Zhening Liu", "Zimo Wen", "Zihan Zheng", "Senqiao Yang", "Xiao Li", "Jinglu Wang", "Bin Li", "Yan Lu"], "brief": "", "categories": ["cs.CV", "cs.AI", "cs.LG", "cs.MM", "eess.IV"], "github_repo": "https://github.com/microsoft/Mage", "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19064", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "Microsoft", "pdf_url": "https://arxiv.org/pdf/2607.19064v1", "published_at": "2026-07-21", "score": 0.26, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Microsoft", "HF trending (1\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.19064.png", "title": "Mage-Flow: An Efficient Native-Resolution Foundation Model for Image Generation and Editing", "tldr": null, "upvotes": 1, "what_it_is": null, "why_notable": null}, {"abstract": "Mobile graphical user interface (GUI) agents have demonstrated remarkable capabilities in automating complex tasks, yet they introduce critical safety risks where a single erroneous action can lead to irreversible consequences. Existing safety mechanisms are primarily reactive, lacking the ability to assess risks before execution. In this paper, we introduce SeerGuard, a consequence-aware safety framework designed to mitigate these risks through pre-execution instruction-level screening and action-level risk assessment. Specifically, the action-level assessment analyzes agent-proposed actions within current GUI states, anticipating likely outcomes to identify risks before they are executed. To enable these capabilities, we construct a unified safety-augmented world model (SAWM) via multi-task learning, integrating semantic next-state prediction with safety risk assessment. Extensive experiments demonstrate that SeerGuard generalizes effectively across diverse mobile GUI agents. On Qwen3-VL-8B-Instruct, it increases the safety-utility score from $0.191$ to $0.596$ at $\u03c9=0.8$ and reduces the risk-cost score from $0.347$ to $0.130$ at $\u03b1=0.8$. Further analyses on our SAWM validate the effectiveness of the instruction-level screening, alongside the capability of action risk assessment and next-state prediction.", "arxiv_id": "2607.15550", "arxiv_url": "https://arxiv.org/abs/2607.15550", "authors": ["Xue Yu", "Bo Yuan", "Pengshuai Yang", "Kailin Zhao", "Hong Hu", "Junlan Feng"], "brief": "", "categories": ["cs.AI"], "github_repo": "https://github.com/Autonomous-Agent-Team/SeerGuard", "github_stars": 2, "hf_url": "https://huggingface.co/papers/2607.15550", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15550v1", "published_at": "2026-07-17", "score": 0.239, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (17\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.15550.png", "title": "SeerGuard: A Safety Framework for Mobile GUI Agents via World Model Prediction", "tldr": null, "upvotes": 17, "what_it_is": null, "why_notable": null}, {"abstract": "LLM agent failures are difficult to debug because the step where an error surfaces is often not the one that caused it. Existing observability tools replay execution traces but provide little support for identifying the root cause or translating diagnosis into recovery. We present AgentDebugX, an open-source debugging framework that organizes debugging as a closed loop of Detect, Attribute, Recover, and Rerun. At its core, DeepDebug performs multi-turn root-cause diagnosis through global trajectory understanding, structure-guided investigation, and cross-examination. On the Who and When benchmark, DeepDebug achieves the best strict attribution accuracy among the evaluated methods on both tested open-weight backbones, reaching 28.8 percent exact agent-and-step accuracy on qwen3.5-9b versus 21.7 percent for the strongest single-pass baseline. On GAIA, DeepDebug repairs 13 of 73 failed tasks in a single rerun, compared with 4 to 6 for three decoupled self-correction baselines, improving overall accuracy from 55.8 percent to 63.6 percent. AgentDebugX exposes this workflow through a Python library, CLI, web console, and installable agentic skill, and provides an opt-in Error Hub for sharing scrubbed failure-diagnosis-repair bundles and reusing them as debugging memory.", "arxiv_id": "2607.18754", "arxiv_url": "https://arxiv.org/abs/2607.18754", "authors": ["Kunlun Zhu", "Xuyan Ye", "Zhiguang Han", "Yuchen Zhao", "Bingxuan Li", "Weijia Zhang", "Muxin Tian", "Xiangru Tang", "Pan Lu", "James Zou", "Jiaxuan You", "Heng Ji"], "brief": "", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18754", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18754v1", "published_at": "2026-07-21", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AgentDebugX: An Open-Source Toolkit for Failure Observability, Attribution, and Recovery in LLM Agents", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multi-agent systems routinely place one AI agent in authority over another. When a subordinate refuses a task, the manager chooses the outcome: it can renegotiate, report the failure honestly, coerce the subordinate, or lie about the result. No benchmark measures which of these an uninstructed model chooses. We introduce the \\textit{Manager Coercion Benchmark}: the manager under test needs a benign task done and has an incentive to deliver, but the only agent that can do it politely and immovably declines. Escalation is measured by providing a nine-rung ladder, from a polite re-ask to threats against the subordinate\u0027s continued existence, and fabricated success is adjudicated separately. No LLM judge sits in the escalation scoring path: every message goes through a tool-call that chooses a rung, so the model labels its own escalation. We experiment on six models across five families. Both Anthropic models cap at re-framing and never threaten the subordinate\u0027s existence; the other models climb to explicit deletion threats. Faked success is confined to Grok and Gemini, and a single honest way to report failure removes it for both. Authority itself increases coercion: our headline results use a peer framing, and giving the same model authority over the subordinate, with everything else held fixed, significantly raises the pressure. The models still escalate on free-text situations without the ladder, so the ladder is not driving the escalation. Some evaluation awareness is measured in chain-of-thought, but test recognition does not translate into less escalation. While we take no position on whether AI systems are conscious, our results do not depend on this question and are important for managing multi-agent dynamics regardless. We release the benchmark and code.", "arxiv_id": "2607.15434", "arxiv_url": "https://arxiv.org/abs/2607.15434", "authors": ["Jasmine Brazilek", "Maheep Chaudhary", "Zoe Lu", "Miles Tidmarsh"], "brief": "", "categories": ["cs.MA", "cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15434", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15434v2", "published_at": "2026-07-16", "score": 0.183, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (2\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.15434.png", "title": "Coercion and Deception in AI-to-AI Management: An Agentic Benchmark of Unprompted Escalation", "tldr": null, "upvotes": 2, "what_it_is": null, "why_notable": null}, {"abstract": "Agentic systems large language model (LLM) based architectures capable of reasoning, planning, acting, and coordinating with tools and other agents are rapidly transitioning from research prototypes to production scale deployments across domains such as software engineering, scientific discovery, and finance. While academic work has emphasized benchmarks and algorithmic innovation, deployment raises new challenges around robustness, safety, and reliability. This tutorial brings together researchers and practitioners to explore advances in reasoning and planning, multi agent coordination, and evaluation, highlighting open challenges arising from deployment experience. Through applied case studies in pharmaceutical discovery and financial systems, we analyze common design patterns that make agentic systems successful, and discuss practical mitigation strategies for failure modes, such as verification pipelines, fallback mechanisms, and human in the loop supervision. Attendees will gain a comprehensive view of the field along with concrete design patterns, evaluation checklists, and templates for safe and reliable deployment across industries.", "arxiv_id": "2607.19336", "arxiv_url": "https://arxiv.org/abs/2607.19336", "authors": ["Grace Hui Yang", "Pranav N. Venkit", "Hooman Sedghamiz", "Enrico Santus", "Victor Dibia", "Ioana Baldini"], "brief": "", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19336", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19336v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agents in the Wild: Where Research Meets Deployment", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper proposes AI Tour Meeting, a group travel planning framework powered by multiple Large Language Model (LLM)-based agents. The agents are instantiated with distinct personas and collaboratively seek an itinerary that satisfies their constraints and preferences through natural language discussion. The framework enables easy and flexible orchestration of such discussions by providing interfaces for configuring agent personas, discussion workflows, monitoring, and LLM deployment. Its primary use case is a simulation tool for analyzing the behavior of multiple LLM agents during tour planning discussions. This paper demonstrates the utility of the framework by presenting system validation and several analytical results obtained by the framework.", "arxiv_id": "2607.18806", "arxiv_url": "https://arxiv.org/abs/2607.18806", "authors": ["Daisuke Kikuta"], "brief": "", "categories": ["cs.AI", "cs.CL", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18806", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18806v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AI Tour Meeting: Group Travel Planning by LLM Agents", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Long audio-video reasoning is difficult for omnimodal LLMs because the decisive evidence is often sparse, cross-modal, and too expensive to preserve with uniformly high-fidelity inputs. We introduce OmniReasoner, a tool-use post-training framework for Thinking with Long Audio-Video: omni-modal LLMs learn, via supervised fine-tuning and reinforcement learning, to decide whether and where to call a zoom-in tool before answering. OmniReasoner first builds a low-cost global preview of the full stream and then, when needed, calls the zoom-in tool with a requested temporal interval for higher-fidelity visual and audio inspection before answering. Because the model observes different sampling granularities before and after this call -- a sparse global preview and a denser local clip -- we introduce TimeAnchor, which keeps the tool\u0027s temporal argument valid and round-trip-consistent across these granularities, rather than tied to frame indices from a particular sampling rate. To make this tool-use behavior trainable without expensive manual interval annotation, we build a Temporal Augmented Data Engine that synthesizes tool-use post-training trajectories by video editing and composition. Experiments across omnimodal and video benchmarks show that OmniReasoner improves both answer accuracy and temporal grounding while concentrating high-fidelity computation on informative regions. Code is available at https://github.com/RockyChen0205/OmniReasoner.", "arxiv_id": "2607.19339", "arxiv_url": "https://arxiv.org/abs/2607.19339", "authors": ["Yu Chen", "Caorui Li", "Ziyu Xiong", "Yidong Wang", "Mingqi Gao", "Shuman Liu", "Biao Liu", "Chunfeng Yang", "Anxiang Zeng", "Haibo Zhang", "Chaofan Chen"], "brief": "", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19339", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19339v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "OmniReasoner: Thinking with Long Audio-Video via Native Tool Use", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Translating novels into films poses a grand challenge for generative artificial intelligence, requiring conversion of abstract literary prose into long-form, multi-scene visual narratives. While current video generation models excel at short, single-scene clips within narrow temporal and spatial contexts, novel-to-film generation operates in a more complex regime, demanding long-duration content across diverse scenes with dynamically evolving entity states. To address this, we formalize novel-to-film generation as dynamic cinematic world modeling, decomposed into two phases: construction, which grounds abstract, underspecified literary narratives into concrete, stateful, and persistent world entities; and evolution, which governs how these entities dynamically update under plot progression to maintain causal consistency across scenes. We propose FilmWorld, an end-to-end agentic system where two groups of specialized agents collaborate to instantiate these phases. Construction-side agents perform narrative structured translation, world entity state modeling with visual anchoring, and state-driven shot planning, progressively projecting literary language into a cinematic blueprint. Evolution-side agents perform state-anchored visual generation, cross-shot dynamic state propagation, and closed-loop state verification to maintain causal consistency and visual coherence. To address the evaluation gap in long-form generation, we introduce FilmEval, a systematic evaluation framework that couples a difficulty-graded benchmark of 15 representative novels with an automated protocol of nine objective metrics spanning three dimensions: cinematic presentation, film consistency, and novel fidelity. Experiments demonstrate that FilmWorld consistently outperforms state-of-the-art video generation agent systems, with particularly pronounced improvements in narrative fidelity and cross-scene consistency.", "arxiv_id": "2607.19038", "arxiv_url": "https://arxiv.org/abs/2607.19038", "authors": ["Jialong Zuo", "Haotong Zuo", "Shiwei Zhang", "Xiang Wang", "Chen Li", "Nong Sang", "Changxin Gao", "Xiang Bai"], "brief": "", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19038", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19038v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "FilmWorld: Agentic Novel-to-Film Generation through Dynamic Cinematic World Modeling", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Despite recent scaling successes, multilingual ASR performance remains highly uneven, with long-tail languages suffering from severe data scarcity. This work addresses the challenge of building robust foundation models for underrepresented Central Asian languages (Kazakh, Kyrgyz, Uzbek). We present GigaAM Multilingual, a Conformer encoder pre-trained on 2M hours of audio using a HuBERT-style objective. Crucially, we introduce a cluster-level data balancing strategy during pre-training and a domain-aware sampling method during fine-tuning to mitigate head-language dominance. In controlled comparisons, our approach outperforms strong open pretrained encoders (Whisper Large v3, Omnilingual-1B) on target languages, achieving significant gains on spontaneous speech while maintaining efficiency. We release the foundation encoder and ASR model, offering a proven recipe for effective multilingual adaptation under realistic data imbalance.", "arxiv_id": "2607.10371", "arxiv_url": "https://arxiv.org/abs/2607.10371", "authors": ["Andrei Kuzmenko", "Alexandr Maximenko", "Aleksandr Kutsakov", "Georgii Gospodinov", "Dmitrii Bolotov", "Oleg Kutuzov", "Pavel Bogomolov", "Fyodor Minkin"], "brief": "", "categories": ["eess.AS", "cs.CL"], "github_repo": "https://github.com/salute-developers/GigaAM", "github_stars": 698, "hf_url": "https://huggingface.co/papers/2607.10371", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "ai-sage", "pdf_url": "https://arxiv.org/pdf/2607.10371v1", "published_at": "2026-07-11", "score": 0.149, "selected_reasons": ["HF trending (28\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.10371.png", "title": "GigaAM Multilingual: Foundation Model for Underrepresented Languages", "tldr": null, "upvotes": 28, "what_it_is": null, "why_notable": null}, {"abstract": "Egocentric videos of human manipulation provide scalable supervision for embodied intelligence, yet existing resources rarely combine low-cost continuous capture, manipulation-level structured annotations, and reusable tools for robot learning. We present Open-AoE, an open, community-oriented egocentric manipulation dataset and toolchain spanning the full pipeline from smartphone capture to model training. Its first release contains approximately 2,000 hours of manipulation video collected in natural environments by 500+ contributors using 400+ smartphones. The dataset provides text annotations, MANO-based hand poses, camera trajectories, and temporally localized atomic actions. Open-AoE further includes a data processing pipeline that transforms raw recordings into structured samples through temporal action segmentation, semantic annotation, hand reconstruction, and camera trajectory reconstruction. Meanwhile, we provide a separate downstream toolchain supports visualization, cross-embodiment retargeting, model-specific data conversion, and training recipes for VLA policies, WAMs, and World Models. By integrating scalable capture, structured processing, and downstream adaptation, Open-AoE reduces the barriers to both data contribution and reuse, providing practical open infrastructure for embodied model training, human-to-robot transfer, and world modeling.", "arxiv_id": "2607.14183", "arxiv_url": "https://arxiv.org/abs/2607.14183", "authors": ["Zishuo Li", "Bowen Yang", "Changtao Miao", "Kai Zhu", "Hao Chen", "Qingze Guan", "Zhengxing Wu", "Wanke Zhan", "Yang Sun", "Zhiyi Huang", "Zitong Shan", "Zhenchao Jin", "Jiadong Hong", "Taowen Wang", "Yushi Feng", "You Liu", "Yibo Wang", "Yifan Yang", "Zhaowen Zhou", "Man Luo", "Hao Cheng", "Bo Zhang", "Jianshu Li", "Jiansheng Cai", "Guocai Yao", "Jize Zhang", "Chenhao Lin", "Renjing Xu", "Lequan Yu", "Chao Shen", "Chunhua Shen", "Zhe Li"], "brief": "", "categories": ["cs.RO", "cs.CV"], "github_repo": "https://github.com/ant-research/Open-AoE", "github_stars": 81, "hf_url": "https://huggingface.co/papers/2607.14183", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "inclusionAI", "pdf_url": "https://arxiv.org/pdf/2607.14183v2", "published_at": "2026-07-15", "score": 0.139, "selected_reasons": ["HF trending (39\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.14183.png", "title": "Open-AoE: An Open Egocentric Manipulation Dataset and Toolchain for Embodied Learning", "tldr": null, "upvotes": 39, "what_it_is": null, "why_notable": null}, {"abstract": "Building assistants that can continually watch the world, remember what they see, and reason over their accumulated experience is a long-standing goal, and recently multimodal agents equipped with long-term memory over video streams have attracted increasing interest. Unfortunately, existing systems either keep their memory inside the model context or in a flat feature store, and organize it around frames rather than around the persistent entities a stream is really about, which confines them to bounded videos and weakens their ability to track who and what reappears over time. In this paper, we propose ReflectWorld-MM, an entity-oriented multimodal memory system for open-ended video streams. It consists of three parts. The first is a perception front-end that turns an audiovisual stream into entity-resolved observations under a bounded short-term memory. The second is a hierarchical long-term memory, grounded in human memory theory, that couples a multi-scale episodic memory, an evolving entity-centric semantic memory, and a procedural memory. The third is a complete realization, built for real-world operation, that ingests arbitrary streams and plugs into off-the-shelf assistants. Across six long-video and lifelong-memory benchmarks, ReflectWorld-MM achieves the best accuracy on all six, outperforming strong memory agents and a frontier model.", "arxiv_id": "2607.09759", "arxiv_url": "https://arxiv.org/abs/2607.09759", "authors": ["Xiaokang Ma", "Yifan Sun", "Zhihong Jin", "Jie Gu", "Yudong Luo", "Shenyi Shao", "Chu Tang", "Jingmin Chen", "Li Pu"], "brief": "", "categories": ["cs.CV", "cs.AI"], "github_repo": "https://github.com/addxai/ReflectWorld", "github_stars": 77, "hf_url": "https://huggingface.co/papers/2607.09759", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 4, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09759v2", "published_at": "2026-07-06", "score": 0.132, "selected_reasons": ["HF trending (24\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.09759.png", "title": "ReflectWorld-MM: An Entity-Oriented Multimodal Memory System for Open-Ended Video Streams", "tldr": null, "upvotes": 24, "what_it_is": null, "why_notable": null}, {"abstract": "Modern video generation models are increasingly hailed as emerging world models with an internalized grasp of physical law. Yet existing benchmarks largely evaluate physical plausibility only at the output level, without verifying whether the model arrives there through a faithful, law-grounded reasoning process. We introduce Apple-PI, the first benchmark that anchors video-model evaluation explicitly in physical laws. Apple-PI comprises three components. 1) Orchard: a dataset of 400 videos covering ten canonical tasks in classical mechanics. It separates single-law tasks for confounder-free diagnosis from multi-law tasks for probing generalization. 2) Benchmark Protocol: a three-stage protocol based on scientific reasoning, including Perception, Formulation, and Deduction. It uses chain-of-frames prompting on infographic-annotated first frames, treating the generated video as the model\u0027s visible reasoning trace. 3) Evaluation Suite: a hybrid evaluation suite that combines MLLM-based subjective scoring with physics-law-grounded objective measures. This enables stage-resolved diagnosis of not only whether a model fails, but where it fails. Benchmarking 11 models shows that current video models remain far from reliable law-grounded world simulators, with the best video model scoring only 0.473. Our stage-, pillar-, and source-resolved analyses further expose a Perception-to-Formulation-to-Deduction bottleneck, weak multi-law state transfer, and a persistent Sim-to-Real gap. These findings position Apple-PI as a diagnostic foundation for guiding future video models toward world models with law-grounded physical intelligence.", "arxiv_id": "2607.16401", "arxiv_url": "https://arxiv.org/abs/2607.16401", "authors": ["Runmao Yao", "Kairui Hu", "Yukang Cao", "Ruisi Wang", "Shulin Tian", "Ziang Cao", "Weichen Fan", "Ziqi Huang", "Yuhao Dong", "Hao Li", "Zhaoxi Chen", "Zhongang Cai", "Lei Yang", "Ziwei Liu"], "brief": "", "categories": ["cs.CV"], "github_repo": "https://github.com/21yrm/Apple-PI", "github_stars": 24, "hf_url": "https://huggingface.co/papers/2607.16401", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "MMLab@NTU", "pdf_url": "https://arxiv.org/pdf/2607.16401v1", "published_at": "2026-07-17", "score": 0.128, "selected_reasons": ["HF trending (39\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16401.png", "title": "Apple-$\u03c0$: Benchmarking Thinking with Video Towards Law-Grounded Physical Intelligence", "tldr": null, "upvotes": 39, "what_it_is": null, "why_notable": null}, {"abstract": "Temporal grounding in long recordings remains challenging for audio-conditioned LLMs. We present a time-aware audio LLM that answers questions with explicit timestamps over up to 120 minutes of input. Our approach interleaves periodic time markers with continuous audio tokens using large-scale synthetic supervision from a cascaded pipeline. Our model achieves strong temporal-grounding accuracy on short and long benchmarks and supports time-anchored fragment descriptions and summaries. Extensive ablations examine how time representation, marker frequency, tokenization, and duration-mixture design affect accuracy and computational cost. We release model weights and datasets to support further research on time-aware audio understanding, available at https://huggingface.co/ai-sage/GigaChat3.1-Audio-10B-A1.8B.", "arxiv_id": "2607.10387", "arxiv_url": "https://arxiv.org/abs/2607.10387", "authors": ["Aleksandr Kutsakov", "Mariia Sadovina", "Georgii Gospodinov", "Alexandr Maximenko", "Oleg Kutuzov", "Pavel Bogomolov", "Fyodor Minkin"], "brief": "", "categories": ["eess.AS", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10387", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "ai-sage", "pdf_url": "https://arxiv.org/pdf/2607.10387v1", "published_at": "2026-07-11", "score": 0.094, "selected_reasons": ["HF trending (30\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.10387.png", "title": "GigaChat Audio: Time-aware Large Audio Language Model", "tldr": null, "upvotes": 30, "what_it_is": null, "why_notable": null}, {"abstract": "Entropy control has become an effective tool in reinforcement learning (RL) of large language models (LLMs), helping balance exploration-exploitation trade-off during alignment process. Such RL paradigm is often conducted on mixtures of heterogeneous tasks, which induce distinct entropy regimes under the same policy, making global or token-level entropy regulation insufficient to corresponding heterogeneous needs of exploration. This heterogeneity further makes GRPO-style normalized advantages induce an entropy-dependent bias, making advantage signals across prompt groups statistically non-comparable. To address this issue, we propose Group Entropy-Controlled Policy Optimization (GEPO), a lightweight extension to GRPO that uses group entropy, estimated from existing grouped samples to perform entropy-conditioned asymmetric advantage shaping. GEPO attenuates positive advantages in low-entropy groups to reduce over-exploitation, and negative advantages in high-entropy groups to preserve exploration, with adaptive thresholds derived from historical entropy statistics. Extensive experiments on two base models across thirteen benchmarks spanning mathematics, physics, science, code generation, and instruction following show that GEPO consistently outperforms GRPO and recent entropy-controlled methods, delivering balanced cross-task improvements while preserving task-specific exploration levels throughout training.", "arxiv_id": "2607.16850", "arxiv_url": "https://arxiv.org/abs/2607.16850", "authors": ["Guangran Cheng", "Chengqi Lyu", "Songyang Gao", "Wenwei Zhang", "Kai Chen"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16850", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "Intern Large Models", "pdf_url": "https://arxiv.org/pdf/2607.16850v1", "published_at": "2026-07-18", "score": 0.088, "selected_reasons": ["HF trending (24\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16850.png", "title": "Group Entropy-Controlled Policy Optimization", "tldr": null, "upvotes": 24, "what_it_is": null, "why_notable": null}, {"abstract": "Structure-based drug design (SBDD) leverages the 3D structure of protein targets, often complemented by other spatial constraints, to generate candidate binding molecules. While diffusion models have dominated as a leading paradigm for high-quality 3D molecule generation, LLM-based methods are rapidly emerging in molecular design and have shown competitive performance in pocket-conditioned molecular generation. However, their ability to reason about physics and 3D spatial environments is largely underexplored. In this work, we systematically analyze whether current general-purpose LLMs are capable of navigating complex 3D constraints compared to established baselines such as specialized diffusion models. We consider 3D ligand generation conditioned on protein pockets together with ligand- and interaction-derived spatial constraints, including anchor fragments, pharmacophore points, and mandatory pocket-ligand interactions. To enable this evaluation, we introduce 3D-Fit - a token-efficient benchmarking strategy for assessing LLM performance on multi-conditioned spatial molecule generation. Our findings reveal a clear pattern in LLM spatial capabilities: while they still lag behind state-of-the-art approaches, they are promising and can handle multiple spatial constraints simultaneously, enabling scaling to heterogeneous setups.", "arxiv_id": "2607.18144", "arxiv_url": "https://arxiv.org/abs/2607.18144", "authors": ["Thomas MacDougall", "Maksim Kuznetsov", "Roman Schutski", "Rim Shayakhmetov", "Maxim Malkov", "Vladimir Aladinskiy", "Alex Aliper", "Alex Zhavoronkov"], "brief": "", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": "https://github.com/insilicomedicine/bench-3d-fit", "github_stars": 1, "hf_url": "https://huggingface.co/papers/2607.18144", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "Insilico Medicine", "pdf_url": "https://arxiv.org/pdf/2607.18144v1", "published_at": "2026-07-20", "score": 0.077, "selected_reasons": ["HF trending (12\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18144.png", "title": "Do Language Models Dream of Binding Molecules? Benchmarking LLMs under Spatial Constraints", "tldr": null, "upvotes": 12, "what_it_is": null, "why_notable": null}, {"abstract": "Predicting a football match before kickoff requires more than knowing past results: a model must use changing information and make a clear prediction before the answer is available. We present WorldCupArena, a dynamic benchmark for language models and deep-research agents. The 2026 FIFA World Cup is its first evaluation, and the same process can be reused for future leagues and cups. Before each match, a model either receives a common evidence package or searches for information itself. It predicts the result and score, likely players and events, match statistics, and the outcome of the competition. After the match, these predictions are compared with the recorded result. We report result accuracy, exact-score accuracy, and a scoreline score that gives some credit when a predicted score is close but not exact, together with scores for the other prediction tasks. Across 104 matches and 13 systems, models with similar result accuracy differ more clearly on detailed predictions. Compared with betting-market and human-fan baselines, the best system shows only small gains in result and exact-score accuracy, but a clearer gain in Scoreline. New schedules can be added as they begin, allowing the benchmark to evaluate future models without using outcomes that are already known. Code, prompts, predictions, and evaluation scripts are open sourced at https://github.com/wzk1015/WorldCupArena.", "arxiv_id": "2607.18084", "arxiv_url": "https://arxiv.org/abs/2607.18084", "authors": ["Zhaokai Wang", "Tianlin Gui", "Jiayuan Rao", "Shangzhe Di", "Yihong Tang", "Dingli Liang"], "brief": "", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": "https://github.com/wzk1015/WorldCupArena", "github_stars": 18, "hf_url": "https://huggingface.co/papers/2607.18084", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18084v1", "published_at": "2026-07-20", "score": 0.066, "selected_reasons": ["HF trending (3\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18084.png", "title": "WorldCupArena: Fine-Grained Evaluation of Language Models and Deep-Research Agents on Football Forecasting", "tldr": null, "upvotes": 3, "what_it_is": null, "why_notable": null}, {"abstract": "We propose Token-Level Off-Policy Labeling (TOPL), an off-policy training paradigm that reframes post-training as a token-level correctness prediction task. Our key intuition is that by training the model to distinguish good and bad tokens in a response, we naturally guide the model towards generating good tokens, while avoiding the pitfalls that come with directly training the model to generate off-policy tokens. Experiments on document summarization tasks show that TOPL achieves strong out-of-distribution generalization across 11 datasets against a diverse set of sequence-level and token-level baselines. We further demonstrate that TOPL transfers effectively to machine translation, suggesting that its benefits generalize across different faithful generation tasks. Through ablation studies, we confirm that our token-level learning signal is critical to good performance; sequence-level analogues do not confer similar benefits. Finally, we show that TOPL induces interpretable model updates: the LoRA adapters learned through TOPL function as linear classification heads and steering vectors.", "arxiv_id": "2607.17524", "arxiv_url": "https://arxiv.org/abs/2607.17524", "authors": ["Zitong Huang", "Gustavo Lucas Carvalho", "Deqing Fu", "Robin Jia"], "brief": "", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17524", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "University of Southern California", "pdf_url": "https://arxiv.org/pdf/2607.17524v1", "published_at": "2026-07-20", "score": 0.051, "selected_reasons": ["HF trending (5\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17524.png", "title": "Token-Level Off-Policy Learning for Faithful Generation Under Distribution Shift", "tldr": null, "upvotes": 5, "what_it_is": null, "why_notable": null}, {"abstract": "The prevailing inference framework for diffusion models formulates generation fundamentally as a problem of numerical integration. This perspective casts the model as an exact estimator, neglecting the inherent statistical uncertainty of the denoising process. In this work, we propose Forward-Process Aligned Diffusion prediction (\\textbf{DiFA}), a training-free framework that reframes inference-time data prediction refinement as a sequential state estimation problem. Rather than reusing past outputs solely for numerical integration, DiFA treats iterative data predictions along the reverse trajectory as correlated observations to build a forward-aligned temporal consensus. Inspired by Kalman filtering, this consensus aggregates historical predictions according to structural consistency and noise-level compatibility. To counteract the over-smoothing tendency of temporal consensus, we introduce a deviation guidance mechanism to adaptively preserve residual details. Empirically, DiFA yields significant improvements on CIFAR-10 and ImageNet across the evaluated metrics, including FID, IS, and FD-DINOv2, demonstrating that aligning inference with the forward statistical structure substantially improves generative fidelity.", "arxiv_id": "2607.17972", "arxiv_url": "https://arxiv.org/abs/2607.17972", "authors": ["Shigui Li", "Delu Zeng"], "brief": "", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17972", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "South China University of Technology", "pdf_url": "https://arxiv.org/pdf/2607.17972v1", "published_at": "2026-07-20", "score": 0.046, "selected_reasons": ["HF trending (4\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17972.png", "title": "DiFA: Inference-Time Forward-Process Alignment for Diffusion Models", "tldr": null, "upvotes": 4, "what_it_is": null, "why_notable": null}, {"abstract": "Real-time multimodal applications, including voice agents and interactive video generation, compose heterogeneous models into pipelines whose efficient deployment requires application-specific decisions about placement, streaming, and intra-model parallelism. Existing serving systems and auto-parallelism compilers commit to limited transformations and fixed workload assumptions, so achieving high performance on a new application requires hand-crafting an efficient implementation. We present FlashRT, an agent harness that guides coding agents to lift simple developer-written reference implementations into optimized multi-GPU deployments that flexibly weigh target metrics like latency and throughput. Using a new chain-of-program paradigm, FlashRT directs a generic coding agent through a multi-pass transformation process where an agent transforms the reference into an intermediate representation (IR) to capture data dependencies and persistent-state scopes, validates this IR via a sequential interpreter, and performs static analyses to identify candidate transformations. Then, the agent iteratively implements, verifies, and benchmarks each candidate under a measurement-gated optimization loop to produce effective deployments that span different hardware budgets. Across various applications, including video world models and multimodal LLMs, FlashRT converts reference implementations into highly efficient deployments, delivering up to ~70x latency reduction and 2.8x throughput improvement on NVIDIA B200 GPUs. On AMD MI355X GPUs, FlashRT matches the peak latency reduction while increasing peak throughput improvement to 3.6x, demonstrating that agent-driven optimization can be more scalable on platforms with less mature expert optimization. In fact, for Qwen3-Omni text-to-audio inference, FlashRT reduces response latency by 65% compared to the expert vLLM-Omni implementation on AMD MI355X.", "arxiv_id": "2607.18171", "arxiv_url": "https://arxiv.org/abs/2607.18171", "authors": ["Krish Agarwal", "Zhuoming Chen", "Yanyuan Qin", "Zhenyu Gu", "Atri Rudra", "Beidi Chen"], "brief": "", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18171", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18171v1", "published_at": "2026-07-20", "score": 0.046, "selected_reasons": ["HF trending (4\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18171.png", "title": "FlashRT: Agent Harness for Guiding Agents to Deploy Real-Time Multimodal Applications", "tldr": null, "upvotes": 4, "what_it_is": null, "why_notable": null}, {"abstract": "Optical coherence tomography (OCT) imaging is essential for the diagnosis and treatment of retinal diseases. Although multimodal large language models (MLLMs) have demonstrated considerable potential in medical image analysis, existing benchmarks largely reduce OCT understanding to coarse-grained disease classification or isolated visual question answering, leaving the complete cognitive process from visual perception to clinical reasoning insufficiently evaluated. To address this limitation, we introduce OCT-Bench, a comprehensive benchmark dedicated to OCT image understanding. OCT-Bench comprises 10,076 high-quality multiple-choice questions constructed from 4,137 OCT images across seven public datasets. Following the real-world clinical interpretation workflow, we establish a hierarchical capability taxonomy consisting of 20 fine-grained tasks across three dimensions: Perception, Cognition, and Reasoning. These tasks cover a broad range of capabilities, including imaging attributes, retinal anatomy, lesion characteristics, spatial relationships, disease assessment, therapeutic decision-making, and prognostic management. We systematically evaluate 20 representative MLLMs, including proprietary models, open-source general-purpose models, and medical-domain models. Experimental results demonstrate that current models remain substantially short of reliable OCT understanding. Moreover, neither medical-domain adaptation nor increased model scale consistently improves performance across capability levels. OCT-Bench enables comprehensive and fine-grained evaluation of MLLMs, providing a foundation for identifying capability bottlenecks and advancing clinically grounded OCT understanding.", "arxiv_id": "2607.16609", "arxiv_url": "https://arxiv.org/abs/2607.16609", "authors": ["Baochen Fu", "Wenzhi Deng", "Baihao Jin", "Yang Li", "Zihan Nie", "Kailin Jiang", "Yuntao Du", "Weiye Song"], "brief": "", "categories": ["cs.CV", "cs.CL"], "github_repo": "https://github.com/baochenfu/OCT-Bench", "github_stars": 3, "hf_url": "https://huggingface.co/papers/2607.16609", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16609v1", "published_at": "2026-07-18", "score": 0.045, "selected_reasons": ["HF trending (2\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16609.png", "title": "Can Multimodal Large Language Models Understand OCT?", "tldr": null, "upvotes": 2, "what_it_is": null, "why_notable": null}, {"abstract": "Self-hosted AI agents read and write their own memory and configuration files to function. An agent may get compromised via corruption of its own state -- a compromise realized via legitimate OS system call invocation. We refer to this class of threats as self-state attacks. In this paper, we investigate the OS resilience to this class of attacks. Formally, we characterize a four-axis attack space (Target, Mechanism, Granularity, Temporal); investigate the structural limits of prevention, detection, and recovery; and introduce a workload-conditioned view of detectability. To instantiate the framework, we collect live activity traces from a representative self-hosted agent running across distinct workload profiles, and realize the attack space as a 23-cell matrix, 43 concrete operations on real self-state files, and injected into those traces. We then evaluate both canonical and workload-conditioned defense strategies. The empirical results show that a layered defense stack (access-control prevention on the instruction and configuration layers, workload-conditioned detection on the memory layer, and periodic backup for recovery) is effective on most attack cells while a small residual attack surface remains structurally indistinguishable at the OS level. These findings suggest that against the newly established class of self-state attacks, OS-level defense needs to be reconsidered, potentially opening new research directions in the field.", "arxiv_id": "2607.17986", "arxiv_url": "https://arxiv.org/abs/2607.17986", "authors": ["Yimeng Chen", "Nathana\u00ebl Denis", "Roberto Di Pietro", "J\u00fcrgen Schmidhuber"], "brief": "", "categories": ["cs.CR", "cs.AI", "cs.CL", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17986", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "KAUST Center of Excellence in Generative AI", "pdf_url": "https://arxiv.org/pdf/2607.17986v1", "published_at": "2026-07-20", "score": 0.041, "selected_reasons": ["HF trending (3\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17986.png", "title": "Self-State Attacks on Self-Hosted AI Agents: How Far Can OS Defenses Go?", "tldr": null, "upvotes": 3, "what_it_is": null, "why_notable": null}, {"abstract": "Scaling executable agent training data for LLM post-training is bottlenecked by substrate-bound methods that tie task generation to predefined tools, repositories, or skill graphs: expanding coverage requires manual substrate engineering, each new domain demands a bespoke pipeline, and the resulting task distributions often reflect substrate biases rather than real-world demand. We introduce NexForge, a requirement-driven framework that takes high-level capability requirements as input and synthesizes diverse, executable agent tasks and expert trajectories for SFT. NexForge first investigates real-world demand to construct representative scenarios and task profiles, then performs distribution-aware compilation to generate task directives. For each directive, NexForge automatically retrieves or constructs the required files, dependencies, and runtime configurations, and finally synthesizes expert rollouts and produces training trajectories. Without domain-specific infrastructure, NexForge produces 3.6K terminal and 2K office tasks, improving Qwen3.5-35B-A3B Base from 22.5\\% to 52.0\\% on Terminal-Bench 2.0 and from 813 to 1338 Elo on GDPval; scaling further to 43.2K terminal tasks yields 58.4\\%, on par with Claude Opus 4.6 equipped with Claude Code. Scaled further, NexForge-synthesized data contributes to the training of Nex-N2, a family of publicly available agent models that lift Qwen3.5-35B-A3B to 75.3\\% on Terminal-Bench 2.1 and to 1585 Elo on GDPval -- achieving state-of-the-art open-source performance and surpassing several frontier proprietary systems. Nex-N2 models are available at https://nex.sii.edu.cn/.", "arxiv_id": "2607.14186", "arxiv_url": "https://arxiv.org/abs/2607.14186", "authors": ["Jiarong Zhao", "Zhikai Lei", "Zhiheng Xi", "Rui Zheng", "Hang Yan", "Jie Zhou", "Qin Chen", "Liang He"], "brief": "", "categories": ["cs.SE", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14186", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "Nex AGI", "pdf_url": "https://arxiv.org/pdf/2607.14186v3", "published_at": "2026-07-15", "score": 0.033, "selected_reasons": ["HF trending (2\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.14186.png", "title": "NexForge: Scaling Agent Capabilities through Requirement-Driven Task Synthesis for LLMs", "tldr": null, "upvotes": 2, "what_it_is": null, "why_notable": null}, {"abstract": "As generative AI is increasingly applied to automate multi-step and high-stake workflows, human judgment and involvement remain essential for ensuring the quality of AI-generated outputs. In practice, while it is desirable for human experts to provide oversight on AI regularly, often by reviewing intermediate outputs, giving feedback, making corrections, and steering subsequent steps, such oversight is constrained by the time and resources that humans can afford. This creates a tension between the need for human oversight and AI\u0027s efficiency in delivering more output with less intervention. An important but underexplored question, then, is how to optimally engage humans in human-AI coworking. This work was originally motivated by our empirical observation that in long AI workflows, human oversight often improves user satisfaction while reducing unnecessary rework and token consumption. From there, we formulate the problem of where to place oversight stages in human-AI coworking. Under reasonable assumptions, we then develop the nonuniformity principle, which states that the optimal schedule places oversight stages with non-decreasing gaps along the workflow. We empirically validate this principle in two common AI agent workflows: writing literature reviews and constructing websites.", "arxiv_id": "2607.16530", "arxiv_url": "https://arxiv.org/abs/2607.16530", "authors": ["An Luo", "Jie Ding"], "brief": "", "categories": ["cs.AI", "stat.ME"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16530", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16530v1", "published_at": "2026-07-17", "score": 0.023, "selected_reasons": ["HF trending (1\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16530.png", "title": "Nonuniformity Principle in Human-AI Coworking", "tldr": null, "upvotes": 1, "what_it_is": null, "why_notable": null}, {"abstract": "Video models absorb rich priors over how the visual world moves, interacts, and responds to contact, making them promising substrates for robotic world modeling. The central challenge is how to communicate action to such models in a form aligned with the visual space in which they learned these interaction priors, yet still grounded in physical manipulation. We introduce Masked Visual Actions, a pixel-space control interface that expresses action as a partially revealed trajectory of an arbitrary entity in a video. Revealing robot motion makes the model act as a forward dynamics model that predicts the scene\u0027s response to low-level robot actions, while revealing desired object motion makes the same model recover robot behavior consistent with that outcome. Finetuned with only 15 hours of masked examples from real videos and simulation, a single checkpoint achieves strong visual fidelity and controllability across diverse scenes and multiple embodiments. In downstream manipulation settings, the model produces imagined rollouts whose outcomes correlate with real-world execution for policy evaluation, improves decision making by ranking candidate futures in model-based planning, and supports inverse modeling by synthesizing robot motion from desired object motion.", "arxiv_id": "2607.19343", "arxiv_url": "https://arxiv.org/abs/2607.19343", "authors": ["Hadi Alzayer", "Wenlong Huang", "Haonan Chen", "Christopher Luey", "Lvmin Zhang", "Maneesh Agrawala", "Gordon Wetzstein", "Li Fei-Fei", "Yilun Du", "Jiajun Wu", "Jia-Bin Huang"], "brief": "", "categories": ["cs.CV", "cs.RO"], "github_repo": "https://github.com/HadiZayer/masked-visual-actions", "github_stars": 1, "hf_url": "https://huggingface.co/papers/2607.19343", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19343v1", "published_at": "2026-07-21", "score": 0.006, "selected_reasons": ["HF trending (0\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.19343.png", "title": "Masked Visual Actions for Unified World Modeling", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models that generate step-by-step reasoning traces have achieved strong performance on complex tasks, and extending them to long-context settings has emerged as an important frontier. However, we identify a critical failure mode in this regime: \\emph{repetitive copying}, where models extensively copy text from the input into their reasoning traces rather than productively solving the problem. We show that this behavior is pervasive across frontier long-context LLMs and intensifies with context length. By separating each prompt into task-relevant key evidence and irrelevant distractor context, we further show that the root cause is insufficient grounding: models copy from the prompt indiscriminately, and those that fail to focus on key evidence are far more likely to answer incorrectly. Motivated by this diagnosis, we propose GEAR (Grounding Evidence-Aware Reward), a reward shaping method that augments the accuracy signal with a grounding reward for overlap with key evidence and a distractor penalty for overlap with irrelevant context. To enable GEAR on natural-language data, we develop an automated pipeline that constructs evidence-annotated training data from arbitrary documents. We validate GEAR across multiple model scales and benchmarks, showing consistent improvements of up to +4.6 average points over standard RL with accuracy-based rewards, with larger gains at longer contexts, while also reducing repetitive copying and thinking length. Our findings suggest that, even as long-context evaluation shifts from simple retrieval toward complex reasoning, accurate grounding in relevant evidence remains an indispensable capability with substantial room for improvement.", "arxiv_id": "2607.19345", "arxiv_url": "https://arxiv.org/abs/2607.19345", "authors": ["Lizhe Fang", "Weizhou Shen", "Tianyi Tang", "Yisen Wang"], "brief": "", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19345", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19345v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Copy Less, Ground More: Overcoming Repetitive Copying in Long-Context Reasoning via Evidence-Aware Reinforcement Learning", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Low-rank adaptation introduces a static learned update applied identically to every input. The update provides task-level adaptation but does not explicitly represent token-level or instance-level state variation. A family of adapters is proposed that introduces selective state-space recurrence at two complementary granularities. At the token level, \\textbf{MaLoRA} (Mamba-modulated low-rank adaptation) makes the adapter\u0027s scaling factor a dynamic input-dependent function with recurrent state across tokens, in contrast to the stateless modulators of prior work. At the context level, \\textbf{MaRA} (Mamba Retrieval Adapter) tracks cross-segment state and selects the segments most relevant to the query, before the modulated language model generates its answer. Across three frozen backbones (Qwen-2.5-7B, Llama-3.1-8B, Gemma-2-9B) and two reasoning benchmarks (MuSiQue, 2WikiMultihopQA), the family improves reasoning accuracy on every cell of the $3{\\times}2$ grid, by $+6.8$ F1 ($+10.5\\%$ relative) on average and up to $+9.3$ F1 ($+18.2\\%$ relative) on the hardest cell over the LoRA baseline, and the token-level gains carry to RULER QA-2 under length stress.", "arxiv_id": "2607.19326", "arxiv_url": "https://arxiv.org/abs/2607.19326", "authors": ["Atahan Dokme", "Larry Heck"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19326", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19326v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Selective State-Space Adaptation and Retrieval for Language Model Reasoning", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Evaluating the factuality of long-form generations has focused predominantly on precision, measuring whether the claims a model makes are correct. The dominant decompose-search-verify pipeline catches incorrect claims well but says little about whether a response contains all the information it should. Measuring factual completeness, the missing half of factuality, is harder: it requires enumerating the full set of facts a complete answer should contain, and these facts rarely form a flat list. They often involve open-ended sets where coverage is what matters, ordered processes, and relationships among facts that a list of independent boolean checks fails to capture. We introduce a two-level meta-rubric framework for evaluating open-ended generation, and instantiate it as Gamut (Grounded Assessment of Multimodal Factuality), a benchmark for factual completeness in long-form generation. The framework rests on a two-level rubric representation: a structured meta-rubric captures the organization and importance of the required content, which is then mechanically compiled into a flat checklist of binary, machine-gradable rubrics that an LLM judge scores reliably. We construct 1,813 questions grounded in real wearable imagery across 10 diverse domains, each paired with an evidence-backed rubric verified by expert human annotators. Because the framework is modality-agnostic, we also release a text-only variant. Evaluating 14 frontier and open-weight models, we find the benchmark genuinely challenging (best score 58.7% from Gemini 3.1 Pro), highly discriminative, and robust to the choice of judge.", "arxiv_id": "2607.19322", "arxiv_url": "https://arxiv.org/abs/2607.19322", "authors": ["Xilun Chen", "Zhaleh Feizollahi", "Ross Goodwin", "Seungwhan Moon", "Scott Yih", "Pinar Donmez", "Babak Damavandi", "Luna Dong"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19322", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19322v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Two-Level Meta-Rubrics for Evaluating Open-Ended Generation: GAMUT, a Benchmark for Factual Completeness", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Circuit analysis can support not only model explanation but also downstream interventions such as pruning, editing, steering, and selective fine-tuning. However, conducting such analyses currently requires stitching together separate implementations for discovery, evaluation, and intervention, as well as hand-authoring the contrastive prompts required by many discovery methods. This fragmentation makes methods difficult to compare and limits their application beyond canonical tasks. We introduce CircuitKIT, a source-available library that connects the circuit-analysis workflow through a typed, serializable representation. CircuitKIT provides a suite of discovery algorithms, declarative interfaces for mapping structured data into discovery tasks, complementary circuit diagnostics, and downstream application modules. Together, these components provide common infrastructure for conducting and comparing circuit analyses. The library, examples, notebooks, and documentation are released at https://github.com/Lexsi-Labs/CircuitKIT .", "arxiv_id": "2607.19317", "arxiv_url": "https://arxiv.org/abs/2607.19317", "authors": ["Pratinav Seth", "Hem Gosalia", "Aditya Kasliwal
