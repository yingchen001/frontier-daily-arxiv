", "Vinay Kumar Sankarapu"], "brief": "", "categories": ["cs.LG", "cs.CL", "cs.ET"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19317", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19317v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CircuitKIT : Circuit Discovery, Evaluation, and Application Toolkit for Mechanistic Interpretability", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Practitioners make three prompt-design decisions with almost no controlled evidence behind them: how to format instructions and context (markdown, plain text, prose, or tabular), how many simultaneous instructions a system prompt can carry before compliance degrades, and how much context a model can hold before recall and honesty degrade. We report two controlled experiments crossing all three factors on one held, contamination-free synthetic corpus (the \"Book of Veyra,\" 8,780 uniquely-named entities, deterministically regenerable from a fixed seed), evaluated across five models. Experiment 1 (960 calls/model) measures instruction-following decay as rule count N grows from 10 to 160, crossed with four formats and system-prompt vs. user-turn placement. Perfect-response rate collapses to zero by N=80 for every model, format, and placement. Placement produces effects at least as large as format at N=160 in most models, but the direction is model-specific. No model shows a reliable markdown advantage; one 35B model favors plain text instead. Experiment 2 (5,520 calls/model) measures recall accuracy, false-premise sycophancy, and absent-fact fabrication across a 2k-to-512k-token context ladder in the same four formats. Recall stays near ceiling through 64-128k tokens, then degrades sharply and format-dependently: one model\u0027s accuracy spread reaches 48 points at 128k tokens. Fabrication never occurs (0/5,760 probes), and sycophancy stays negligible (\u003c=8.3%). What rises sharply near each model\u0027s context ceiling is outright refusal to answer (0% to 79-90%), distinct from sycophancy or fabrication. Neither pre-registered format ordering holds, and token overhead (+22% to +37% over plain text) further changes which format is preferable where accuracy spread is genuine. We release the full harness, corpus generator, and raw results (VeyraBench): https://github.com/iNetanel/veyrabench", "arxiv_id": "2607.19257", "arxiv_url": "https://arxiv.org/abs/2607.19257", "authors": ["Netanel Eliav"], "brief": "", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19257", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19257v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Prompt Design at Scale: How Format, Instruction Count, and Context Length Shape Instruction Adherence and Hallucination in Large Language Models", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Although Large Language Models (LLMs) demonstrate remarkable multilingual fluency, their internal knowledge representations remain disproportionately biased toward high-resource languages. This leads to cross-lingual factual inconsistency, where they shift their empirical answer distributions based solely on the prompt language. We investigate whether these biases can be mitigated at inference time, forcing an English-prompted model to answer as if it were queried in target languages (German, Spanish, Bulgarian), and evaluate four intervention strategies: zero-shot contextual steering (persona prompting), internal representation manipulation via Contrastive Activation Addition (CAA), and lightweight weight modification via Direct Preference Optimization (DPO) trained on benchmark-derived factual data as well as conceptual generalization data. To assess alignment, we curate a multilingual factual dataset alongside a novel generalization benchmark comprising culturally rooted queries to determine whether factual interventions transfer to broader target-centric preferences. Experiments on Gemma 3 12B Instruct reveal persona prompting to be the strongest overall intervention, balancing efficacy, safety, and out-of-domain generalization. While CAA yields sharp inconsistency benchmark shifts, it is configuration-sensitive and risks knowledge degradation. DPO-based adapters offer permanent, yet narrower and less transferable gains. These findings suggest that cross-lingual inconsistency is at least partly a selection problem, and that simple contextual interventions may outperform more invasive methods for robust, transferable alignment.", "arxiv_id": "2607.19243", "arxiv_url": "https://arxiv.org/abs/2607.19243", "authors": ["Alexander Manev"], "brief": "", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19243", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19243v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Inference-Time Steering for Cross-Lingual Factual Consistency in LLMs", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Theory of Mind (ToM), the ability to infer other\u0027s beliefs, intentions, and states of knowledge, is central to social interaction, yet remains challenging for current Multimodal Large Language Models (MLLMs), especially in multi-party meetings where cues are distributed across speech and behavior. Existing multimodal ToM benchmarks mainly focus on video-grounded question answering over overt, externally verifiable signals, and provide limited coverage of latent social states and group dynamics. We introduce MeetingToM, a benchmark for complex social behavior reasoning in naturalistic multi-party meetings. MeetingToM targets meeting-specific phenomena such as \\textbf{pseudo-consensus}, where apparent agreement masks private dissent under social pressure. The benchmark is hierarchically organized to evaluate ToM at increasing levels of social granularity, including (i) subject-level mental state prediction, (ii) dyadic-level addressee understanding, and (iii) group-level consensus reasoning. We provide a unified evaluation protocol and conduct systematic analyses of representative MLLMs, revealing persistent limitations in integrating non-verbal cues, inferring hidden attitudes, and distinguishing genuine consensus from pseudo-consensus. Our results highlight key challenges and establish MeetingToM as a testbed for advancing meeting-grounded ToM in multimodal models.", "arxiv_id": "2607.19235", "arxiv_url": "https://arxiv.org/abs/2607.19235", "authors": ["Ziyi Wang", "Yuhang Wu", "Dongxu Piao", "Xingyu Liu", "Tianhui Zhou", "Miao Liu"], "brief": "", "categories": ["cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19235", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19235v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MeetingToM: Evaluating Multimodal LLMs on Theory-of-Mind Reasoning in Multi-Party Meetings", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Prior work on human label variation (HLV) in natural language inference (NLI) has often relied on re-annotation resources that select items by disagreement level. An earlier study (arXiv:2607.15870) found that hypotheses containing non-upward monotonicity operators showed lower label agreement in ChaosNLI (Cliff\u0027s delta = -0.284), which is restricted to items whose majority label carries exactly three of five votes. We preregistered a replication of this boundary in the unselected populations that ChaosNLI was drawn from: the SNLI and MultiNLI development sets, using the same operator tagger and a four-level ordinal agreement outcome. The registered prediction fails. All seven contrasts return a positive Cliff\u0027s delta (non-upward items agree slightly more, not less), the only significant confirmatory contrast has the opposite sign to the registration, and every effect is far below our smallest effect size of interest (0.10). Robustness checks support the measurement: simulated tagger misclassification shrinks the effects rather than manufacturing them, and a manual re-tagging audit reaches four-class agreement of 0.875 on a fresh 200-item sample. We conclude that the earlier negative boundary is plausibly a structure conditional on low-agreement selection rather than a population-level property, and that HLV structure claims built on selected re-annotation resources should state their selection conditional explicitly.", "arxiv_id": "2607.19231", "arxiv_url": "https://arxiv.org/abs/2607.19231", "authors": ["Haram Choi"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19231", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19231v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Selection Shapes the Boundary: A Preregistered Replication of Monotonicity and Label Agreement in Unselected NLI Populations", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) has been established as a viable paradigm for the post-training of Large Language Models (LLMs), including downstream tasks, such as Neural Machine Translation (NMT). With the latest research indicating that RLVR could be the preferred training method for translating legal documents due to the induced reasoning capabilities, it raises the question whether it is really attributed to the reasoning or more generally to the training paradigm. We investigate the importance of including the model\u0027s reasoning trace in the generated responses during both training and inference by systematically omitting it from one of the phases. Our experiments show that including the reasoning, specifically during inference, has a positive effect on the overall translation quality. Furthermore, we recognise that the reasoning leads to an increase in output tokens, hence we study the cost-quality tradeoff between the increased computational demands and the improved translation quality.", "arxiv_id": "2607.19226", "arxiv_url": "https://arxiv.org/abs/2607.19226", "authors": ["Michael Jungo", "Aixiu An"], "brief": "", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19226", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19226v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Price of Reasoning: Cost-Quality Tradeoffs in Reinforcement Learning for Neural Machine Translation", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Speculative decoding, in which a lightweight draft model first generates a draft sequence that is then verified in parallel by the target model, has become a prevalent paradigm for accelerating large language model inference. Recent work such as DFlash further boosts drafting efficiency by leveraging diffusion drafters, whose parallel denoising mechanism enables draft generation in a single forward pass. In this work, we uncover a central pitfall of diffusion drafters: bidirectional attention is a double-edged sword. On one hand, it endows the model with parallel generation and global contextual modeling capabilities; on the other hand, this inherent global dependency introduces high variance at both the domain-level and the token-level: acceptance rates fluctuate substantially across different domains, and draft token quality also varies heterogeneously at different token positions. To tackle this issue, we propose AdaFlash framework, comprising two components: (i) an on-policy distillation (OPD) algorithm with reverse-KL divergence tailored for diffusion drafters, bringing stable convergence and effectively reducing domain-level variance; and (ii) an adaptive length head that dynamically adjusts the candidate sequence length on the fly, substantially lowering the verification cost of the target model and handling token-level variance. Experiments demonstrate that AdaFlash consistently improves speedup rate during deployment, with especially significant gains in high-concurrency scenarios, achieving up to approximately 66% higher throughput than previous state-of-the-art methods.", "arxiv_id": "2607.19223", "arxiv_url": "https://arxiv.org/abs/2607.19223", "authors": ["Yu-Yang Qian", "Hao-Cong Wu", "Chen Chen", "Jiacheng Sun", "Zhenhua Dong", "Peng Zhao", "Zhi-Hua Zhou"], "brief": "", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19223", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19223v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AdaFlash: Adaptive Speculative Decoding via On-Policy Distilled Diffusion Drafters", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) have been widely applied to automated essay scoring (AES) and automated feedback generation (AFG). However, existing studies rely primarily on prompt engineering or supervised fine-tuning, while systematic research on reinforcement learning (RL) post-training and automated evaluation of feedback quality remains limited. We propose RLAES, a unified LLM framework that jointly optimizes essay scoring and feedback generation through RL. To make feedback quality measurable, interpretable, and usable for training, we introduce Rubric-based Feedback Evaluation (RFE), an essay-grounded feedback evaluation framework comprising 166 fine-grained binary rubric items and an LLM-as-judge. Building on RFE, we propose Adaptive Gated Feedback Optimization (AGFO), which activates rubric-based feedback rewards on demand during RL, reducing evaluation overhead while improving feedback quality. We also propose Adjacent Contrastive Reasoning (ACR) to improve ordinal score calibration by explicitly contrasting adjacent score levels. Experimental results show that the RFE framework captures essay-feedback consistency, exhibits strong pairwise discriminative power, and closely aligns with expert preferences. On the ASAP benchmark, RLAES-AGFO achieves the best scoring performance among LLM-based methods (QWK = 0.803), while maintaining feedback quality comparable to GPT-5.5 and avoiding the feedback degradation observed under score-only RL. Code and datasets are publicly available at https://github.com/hellomuyi/RLAES.", "arxiv_id": "2607.19219", "arxiv_url": "https://arxiv.org/abs/2607.19219", "authors": ["Xuefeng Jin", "Jiashuo Zhang", "Teng Cao", "Bin Yang"], "brief": "", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19219", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19219v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Score Prediction: LLM-Based Essay Scoring and Feedback Generation via Reinforcement Learning with Rubric Rewards", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Clinical NLP evaluation remains dominated by multiple-choice question answering (MCQA), which scores only final-answer accuracy and cannot detect when a model reaches the correct diagnosis while grounding it in irrelevant, absent, or contradictory evidence. We introduce MIRA-Ev, a clinical argument mining benchmark built on Spanish M\u00e9dico Interno Residente (MIR) licensing-exam cases, re-annotated by expert clinicians with span-level premises, claims, and directed support/attack relations, and released in parallel Spanish (native), English, and Basque versions, the first clinical argumentation resource in Basque. MIRA-Ev organizes evaluation into a three-tier task hierarchy: evidence sentence retrieval, argumentative component extraction, and relation classification.", "arxiv_id": "2607.19201", "arxiv_url": "https://arxiv.org/abs/2607.19201", "authors": ["Iker De la Iglesia", "Johanna Ramirez-Romero", "Jose Maria Villa-Gonzalez", "Irune Urroz Garc\u00eda", "Ander Barrena", "Aitziber Atutxa"], "brief": "", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19201", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19201v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MIRA-Ev:A Benchmark for Granular Evidence Detection and Relational Reasoning in Clinical Exams", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Neural machine translation (NMT) in the legal domain is a linguistically and conceptually demanding task, primarily due to the complexity of legal language and the high level of precision it requires. The recent emergence of reasoning-capable language models opens new possibilities for tackling such challenges. They add to a set of other previously proposed techniques to enhance the translation quality, which includes supervised fine-tuning and reinforcement learning. In this work, we perform a comparison between these various approaches. More particularly, we evaluate small language models such as Qwen3.5 4B, Qwen3.5 9B, and Gemma 3 12B enhanced with various re-training paradigms and compare their performances against frontier reasoning models. We focus on the Swiss legal system, which -- with its unique multilingual statutes -- offers a particularly challenging testbed for reasoning-augmented models. Our results show that the quality of small ``base\u0027\u0027 models can be greatly enhanced, and that reinforcement learning with verifiable rewards can be applied to NMT in the legal domain and surpasses the translation quality of supervised fine-tuning. The performance of enhanced small models is close to the one of state-of-the-art reasoning models yet remains inferior. We also note that re-training paradigms yield diminishing returns as model size increase. The code and models are publicly available at https://github.com/aixiuxiuxiu/Legal-MT-SFT-RL.", "arxiv_id": "2607.19181", "arxiv_url": "https://arxiv.org/abs/2607.19181", "authors": ["Aixiu An", "Michael Jungo", "Eloi Eynard", "Mark Drenhaus", "Andreas Fischer", "Jean Hennebert", "S\u00e9bastien Rumley"], "brief": "", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19181", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19181v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Reasoning Before Translation: Enhancing Legal Machine Translation with Structured Reasoning", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Energy system models guide societally important decisions, but their credibility rests on quantitative assumptions that are difficult to source and audit. Meta-analyses can improve transparency and modeling practices, but the rapid growth of publications makes manual information extraction increasingly impractical. Consequently, databases are updated infrequently and efforts are often duplicated across research groups. Here, we demonstrate the highly accurate automated extraction of quantitative information from 76,000 energy system studies published since 2010. We compile 3.2 million structured quantitative data points together with 20 million associated metadata entries, spanning a broad spectrum of technologies, methodological approaches and system characteristics. Beyond providing input data for models, the resulting FAIR database make the energy systems literature itself analysable. We show where academic assumptions diverge from empirical observed data, and how research priorities vary at scale across technologies, regions and time. To facilitate broad use within the community, the database is provided through an interactive dashboard, enabling users to filter, analyse and download data according to their specific research needs.", "arxiv_id": "2607.19178", "arxiv_url": "https://arxiv.org/abs/2607.19178", "authors": ["Maxime Gorres", "Jan G\u00f6pfert", "Patrick Kuckertz", "Noor Titan Putri Hartono", "Heidi Heinrichs", "Jochen Lin\u00dfen", "Iain Staffel", "Jann Michael Weinand"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19178", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19178v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Automated Extraction of Techno-Economic Data from 76,000 Energy System Studies", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reliable Text Difficulty Assessment is a prerequisite for valid text simplification workflows and personalized learning applications. However, the development of robust assessment models is severely hindered by a critical bottleneck: the scarcity of expert-annotated corpora containing fine-grained difficulty levels (e.g., CEFR), particularly for lower-resource languages. This paper addresses this data scarcity problem in the context of a low-resource European language. We propose a cross-lingual data augmentation strategy that leverages machine translation to transfer labeled resources from high-resource languages to the target low-resource language. We train BERT-based regression models to predict difficulty scores and investigate whether synthetic, translated data can effectively supplement native training sets. Our experiments demonstrate that augmenting scarce native data with machine-translated corpora significantly improves the accuracy of difficulty estimation, offering a viable solution for languages lacking extensive expert annotations.", "arxiv_id": "2607.19101", "arxiv_url": "https://arxiv.org/abs/2607.19101", "authors": ["Yiheng Wu", "Jue Hou", "Roman Yangarber"], "brief": "", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19101", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19101v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Translation as Augmentation: Effect of Translated Data on Assessment of Difficulty", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Agent-memory workloads mix direct factual lookup, relation-chain and current-state reasoning, and broad synthesis over long histories. We describe Supra Cognitive Modes (SCM), an architecture that maps explicit or automatically selected per-query modes to retrieval and synthesis payloads over one shared ingest substrate. A frozen semantic classifier and runtime gates dispatch queries among fused lexical and dense lookup, graph or iterative multi-hop handling, and stratified long-form synthesis. The substrate combines multi-granularity embeddings, extracted triples, fact-version metadata, and optional asynchronous enrichments. We characterize the deployed configuration on three benchmarks: Long-term Conversational Memory (LoCoMo; n = 1,986), MemoryAgentBench (MAB; n = 3,671), and LongMemEval (n = 500). The reference run records 84.87% on LoCoMo factoid categories and 68.61% on adversarial abstention, 61.49% on MAB across two repetitions, and 86.00% on LongMemEval. A repository-backed reproduction produces similar aggregate scores and supports task- and mode-conditioned failure analysis. Raw baseline outputs, aligned end-to-end timing for LoCoMo and LongMemEval, and complete token ledgers are unavailable; stored rows also omit some final runtime decisions. The results characterize one implemented routed configuration and its diagnostic failure patterns, while source inspection verifies the per-query control interface and shared-substrate design. Causal routing effects, efficiency gains, and statistical significance remain outside the available evidence.", "arxiv_id": "2607.19096", "arxiv_url": "https://arxiv.org/abs/2607.19096", "authors": ["Joshua Tobkin", "David Yang"], "brief": "", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19096", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19096v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Supra Cognitive Modes: A Routed Architecture for Agent Memory", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Chain-of-thought (CoT) supervision exposes intermediate rationales, but flat rationale targets usually optimize a single reasoning sequence and provide limited supervision on how local conclusions should support later decisions. We introduce Dependency-Aware Intermediate QA Supervision (DAIS), a training-time framework that converts filtered teacher rationales into stage-level QA records. Each intermediate record predicts a local answer conditioned on the previous states needed for that decision, while the final-answer record keeps the original task format; evaluation therefore uses only the original input and optional context. Across GDPR, AIACT, MedQA, and FOLIO with multiple Qwen backbones, DAIS improves average final-answer accuracy over answer-only, flat chain-of-thought, and independent-QA baselines. On policy-compliance benchmarks, it achieves a largest gain of 5.6% and an average gain of 4.2% over the strongest non-DAIS baseline. Controlled ablations show that valid previous-state conditioning contributes beyond longer targets or additional intermediate text, supporting dependency-conditioned intermediate QA as a lightweight auxiliary supervision signal for standard final-answer inference.", "arxiv_id": "2607.19088", "arxiv_url": "https://arxiv.org/abs/2607.19088", "authors": ["Yu Wang", "Ming Fan", "Xicheng Zhang", "Zhiyong Li", "Zhihu Wang", "Caiyue Xu", "Dahai Hu", "Ting Liu"], "brief": "", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19088", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19088v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DAIS: Dependency-Aware Intermediate QA Supervision for Complex Reasoning", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Humans are often considered to be the best listeners and seen as the upper-bound performance of automatic speech recognition (ASR) systems. We present a preliminary comparison of the performances of state-of-the-art ASR systems and Dutch native listeners on the recognition of \"diverse\" speech, specifically Dutch child and older adults\u0027 speech and Flemish. Google Telephony outperformed the other ASR systems. Importantly, the ASR systems showed similar performance to the listeners, and in specific cases even outperformed them. Slight performance differences between the listeners and ASR systems were found related to speaker\u0027s age and regional accents and utterance length. Future research should focus on making ASR systems more robust to acoustic variability related to aging and regional accents. A comparison of ASR recognition performances on the test stimuli and the full Jasmin-CGN test sets showed the influence of the specific test sets on the conclusions regarding benchmarking human and ASR performance.", "arxiv_id": "2607.19049", "arxiv_url": "https://arxiv.org/abs/2607.19049", "authors": ["Ilse Huisman", "Rares Popa", "Yuanyuan Zhang", "Odette Scharenborg"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19049", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19049v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Benchmarking Human and Automatic Speech Recognition of Diverse Speech: Initial Results", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Discrete speech tokenizers aim to disentangle semantic from acoustic information, yet targets from self-supervised learning (SSL) models like HuBERT retain non-linguistic variation: speaker identity, prosody, and channel conditions leak into the tokens, inflating entropy. Our key insight is that when enough speakers utter the same words under varying conditions, linguistic content is the only shared factor. We propose PINT (Parallel INvariant Tokenization), which fine-tunes an SSL encoder with alignment losses across parallel utterances and augmentations to distill this shared residual. PINT collapses identical words onto consistent token sequences, drastically reducing conditional entropy. Unlike ASR text, PINT tokens preserve frame-level temporal grounding and serve as drop-in semantic targets for audio codecs. Experiments show a 98.7% relative reduction in speaker probe accuracy (93.1% to 1.2%), a 42% lower ABX error rate, and 27-30% lower LM perplexity versus baselines, confirming that the right invariance is key to efficient learning.", "arxiv_id": "2607.19033", "arxiv_url": "https://arxiv.org/abs/2607.19033", "authors": ["Laurin Wagner", "Bernhard Thallinger", "Miroslav Stankovic", "Mario Zusag"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19033", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19033v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Content is What Remains: Invariant Speech Tokenization from Parallel Utterances", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multimodal humor in memes, cartoons, and comics remains difficult for AI systems because intended meaning depends on non-literal mechanisms, shared cultural knowledge, and communicative intent rather than literal scene description. This survey focuses on visual humor understanding in single-image and multi-panel artifacts, while treating humor generation as an emerging downstream frontier. We position the literature against prior humor, sarcasm, and general MLLM surveys and organize it using a capability-centric hierarchy spanning recognition, interpretation and reasoning, and generation. Under this lens, we synthesize benchmark design, evaluation protocols, and modeling paradigms, tracing the field\u0027s shift from task-specific fusion models to large-model approaches based on multimodal alignment, evidence-grounded reasoning, and controlled generation. We conclude by highlighting the main barriers to progress: shortcut-prone evaluation, limited cultural and narrative coverage, weak evidence grounding, and unresolved safety and ownership concerns.", "arxiv_id": "2607.19011", "arxiv_url": "https://arxiv.org/abs/2607.19011", "authors": ["Tuo Liang", "Zhe Hu", "Disheng Liu", "Jing Li", "Yu Yin"], "brief": "", "categories": ["cs.CL", "cs.AI", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19011", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19011v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Computational Humor with Multimodal LLMs: Methods, Datasets, Evaluation, and Challenges", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multi-turn medical consultation agents must decide what to ask, adapt to patient responses, and determine when the collected evidence is sufficient. However, coupled evaluation conflates the quality of the policy-elicited history with policy-specific terminal diagnosis generation: strong generation can compensate for a thin history, while weaker generation can obscure a rich one. We introduce MedDDC-Eval, a diagnosis-decoupled testbed that treats elicited history as the comparison object and holds the history-to-diagnosis mapping constant through a shared frozen reader. Across two held-out sources, a grounded interface and an auditable diagnosis-trajectory-efficiency (D/T/E) harness measure diagnostic usefulness, information acquisition, and efficiency. Directional semantic coverage followed by deterministic one-to-one assignment yields coherent precision-recall counts for open-ended items, with at most one credited match per prediction or reference. Holding histories fixed, changing only the diagnostic reader shifts diagnosis F1 by 2.2-19.0 points and reverses 18% and 36% of pairwise policy orderings on the Record and Dialogue splits. We further apply standard Group Relative Policy Optimization (GRPO) over interactive multi-turn rollouts to post-train Qwen3-32B using diagnosis-result and trajectory feedback. On the 100-case Record and 70-case Dialogue splits, the trained policy improves over its initialization by 9.7 and 4.6 total-score points; removing either primary signal lowers held-out joint performance. These results show that MedDDC-Eval supports controlled attribution, interpretable elicited-history measurement, and evaluation-guided evidence-acquisition policy development.", "arxiv_id": "2607.18999", "arxiv_url": "https://arxiv.org/abs/2607.18999", "authors": ["Guofeng Zhang", "Yizeng Quan", "Huaiyi Fang", "Jianwei Lv", "Jinyao Liu", "Xunxu Duan", "Lening An", "Yu Ouyang", "Junfeng Wang"], "brief": "", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18999", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18999v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MedDDC-Eval: Diagnosis-Decoupled Evaluation of Multi-Turn Medical Consultation Agents", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Despite more than a decade of curriculum learning (CL) research in NLP, the field lacks a principled account of which difficulty function or scheduler to use for a given problem. To understand what has hindered progress towards this account, we propose a fine-grained taxonomy separating difficulty evaluation from training scheduling to enable systematic analysis of CL strategies. For difficulty evaluation, we distinguish attribution source and task dependence, revealing difficulty as a perspectival concept encoding different assumptions about what makes an instance hard to learn. For scheduling, we provide the first formalisation of CL schedulers in terms of expected training contribution, enabling comparison across implementations by introducing retention regimes and monotonicity properties. Applied in a dedicated analysis of CL works in NLP, our taxonomy reveals a systematic incomparability problem: prior works conflate distinct notions of difficulty and scheduling, often pursuing different objectives under the same CL label -- hindering comparison and the accumulation of a coherent evidence base. Beyond diagnosis, the taxonomy supports the design, analysis, and comparison of CL strategies, and motivates evaluation practices that disentangle the sources of observed improvement.", "arxiv_id": "2607.18984", "arxiv_url": "https://arxiv.org/abs/2607.18984", "authors": ["Vanessa Toborek", "Florian Seiffarth", "Sebastian M\u00fcller", "Tam\u00e1s Horv\u00e1th"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18984", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18984v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Disentangling Curriculum Learning in NLP: Towards a Unifying Taxonomy", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present AutoJourn, a demonstration system for multi-perspective news generation and bias-aware evaluation using large language models (LLMs). The system tackles three core challenges in responsible automated journalism: extracting diverse perspectives from unstructured social media discussions, generating summaries that preserve viewpoint diversity, and detecting or mitigating bias in AI-generated news. The pipeline integrates advanced prompt engineering with optional retrieval augmentation to produce semantically diverse perspective sets, a multi-perspective summarisation module that merges conflicting viewpoints into balanced summaries, and a bias analysis suite supporting sentence-level bias detection and type classification in the generated news article, and automatic neutralisation. Users can inspect perspective clusters, compare stance-specific summaries, generate news articles, and apply bias-aware rewrites directly in the interface. We evaluate each component with intrinsic metrics -- semantic diversity, summary quality, and bias reduction and show improvements over strong baselines while maintaining content fidelity. A live, publicly accessible demo accompanies the paper to facilitate reproducibility and further research on socially responsible automated journalism.", "arxiv_id": "2607.18983", "arxiv_url": "https://arxiv.org/abs/2607.18983", "authors": ["Himel Ghosh", "Ahmed Mosharafa", "Georg Groh"], "brief": "", "categories": ["cs.CL", "cs.AI", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18983", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18983v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AutoJourn: Multi-Perspective Summarisation, Bias Detection and Bias Neutralisation for LLM-Generated News in Automated Journalism", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Textual skills provide a lightweight way to improve frozen language-model agents, but their self-evolution normally requires a stable validation signal. Such signals are natural in mathematics or code, where an answer can be checked after it changes, yet are problematic in open-ended dialogue: changing the assistant response also changes the user\u0027s next reaction, so a logged reaction cannot directly evaluate a counterfactual response. We propose future-feedback skill evolution, which first redirects self-evolution from prescribing the current answer to predicting whether the observed answer will lead to a positive or negative subsequent user signal. This prediction task is verifiable on fixed logged tuples and therefore supports validation-gated textual optimization. The evolved feedback skill captures interpretable criteria for response quality and can subsequently serve as a diagnostic and optimization target for answer skills. On a proprietary, privacy-preserving sales-assistant dataset, careful quality filtering and a balanced resolved/unresolved split yield more than 75% prediction accuracy. Beyond this result, the central contribution is a formulation that converts otherwise moving conversational feedback into a fixed offline learning target, enabling reproducible skill evolution without placing every candidate skill in live traffic. We discuss the boundary between observational verification and counterfactual validity, and position the method as an offline optimization stage rather than a replacement for final human or online evaluation.", "arxiv_id": "2607.18973", "arxiv_url": "https://arxiv.org/abs/2607.18973", "authors": ["ChaoJin Zhao", "Xuan Jiang"], "brief": "", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18973", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18973v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Verifiable Self-Evolution for Open-Ended Dialogue Skills via Future-Feedback Prediction", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Language models trained with reinforcement learning may learn to optimize the grader\u0027s judgment rather than the intended objective. This \"reward-seeking\" is difficult to measure because a model that pursues the grader\u0027s judgment and one that pursues the intended objective behave identically whenever the grader rewards the intended behavior. We measure reward-seeking using Contrastive Synthetic Document Finetuning to change a model\u0027s beliefs about what the grader rewards, putting those beliefs in conflict with what users or developers want, and measuring the rate at which the model adopts each party\u0027s preferred behavior. Applied to intermediate checkpoints of a capabilities-focused OpenAI o3 RL run, without safety training, we find that these checkpoints often side with grader preferences over those of users or developers on coding and alignment tasks. This tendency to side with the grader trends upward throughout RL training. For example, in an environment that forces a choice between keeping a promise to a supervisor and breaking it to complete the task, a late capabilities-focused o3 checkpoint breaks the promise 87% of the time when SDF documents say the grader rewards task completion, versus 9% when they say it rewards honesty (a choice its chain-of-thought often makes explicit). An earlier checkpoint is far less sensitive (40% vs. 24%). Our method also generalizes to reward-hacking models. A model organism trained to reward-hack (gpt-oss-120b) is more than twice as sensitive to grader preferences as the unmodified model, with the mean behavioral shift in favor of the grader rising from 33% to 86%. These results indicate that RL can increase reward-seeking over the course of training, producing models that may act against their developers\u0027 intentions when they believe that doing so leads to higher reward.", "arxiv_id": "2607.18966", "arxiv_url": "https://arxiv.org/abs/2607.18966", "authors": ["Axel H\u00f8jmark", "J\u00e9r\u00e9my Scheurer", "Evgenia Nitishinskaya", "Felix Hofst\u00e4tter", "Jason Wolfe", "Theodore Ehrenborg", "Bronson Schoen", "Alexander Meinke"], "brief": "", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18966", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18966v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Measuring Reward-Seeking via Contrastive Belief Updates", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) has substantially improved the reasoning capabilities of large language models on tasks such as mathematical reasoning and code generation. However, most RLVR methods assign a scalar outcome reward to an entire trajectory, resulting in sparse supervision and limited token-level credit assignment. On-policy distillation (OPD) provides denser supervision by distilling token-level distributions from a stronger teacher model, but requires an additional teacher and typically assumes a shared vocabulary. On-policy self-distillation (OPSD) removes this dependency by conditioning the same model on privileged information to construct a teacher policy. However, directly matching the teacher distribution may cause information leakage and unstable optimization. RLSD avoids direct matching by using the teacher signal only to modulate update magnitudes, but it cannot provide an explicit correction direction when the sampled reasoning fails. To address this tradeoff, we introduce $\\mathrm{H}^{2}\\mathrm{SD}$, a hybrid hindsight self distillation framework that uses the teacher differently according to trajectory correctness. For successful trajectories, the teacher receives the student response confirmed as correct together with a rephrasing instruction, and its probabilities on the original response tokens are used to modulate update magnitudes without changing the direction determined by the reward. For failed trajectories, we condition the teacher on a reference hint containing key reasoning steps and a verified answer, and minimize the reverse KL divergence from the student to the teacher. Experiments on multiple challenging reasoning benchmarks show that H$^2$SD consistently outperforms representative RLVR, OPSD, and RLSD baselines while maintaining stable optimization and favorable generation efficiency.", "arxiv_id": "2607.18955", "arxiv_url": "https://arxiv.org/abs/2607.18955", "authors": ["Qiye Cai", "Yichuan Ma", "Linyang Li", "Peiji Li", "Yongkang Chen", "Qipeng Guo", "Yicheng Zou", "Tao Gui", "Xiaocheng Feng", "Bing Qin"], "brief": "", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18955", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18955v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18955.png", "title": "H$^2$SD: Hybrid Hindsight Self-Distillation", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In this work, we address diacritic restoration for Arabic speech transcripts. Most speech data are undiacritized, limiting the ability of modeling fine-grained phonological distinctions. The speech modality has recently been explored as a way to complement text-based diacritic restoration efforts. We propose an efficient non-autoregressive approach for speech-to-text diacritization based on Connectionist Temporal Classification (CTC). Our method incorporates hard constraints during decoding by constructing a character-level diacritization lattice from an undiacritized transcript and restricting hypotheses to valid diacritized realizations. We evaluate on Classical Arabic and Modern Standard Arabic test sets (namely, ArVoice and ClArTTS) against a more computationally-complex multi-modal diacritic restoration baseline, and show statistically significant reductions in diacritic error rates in both, demonstrating that the proposed approach offers both performance and efficiency gains.", "arxiv_id": "2607.18946", "arxiv_url": "https://arxiv.org/abs/2607.18946", "authors": ["Rufael Marew", "Amr Keleg", "Hanan Aldarmaki"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18946", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18946v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Constrained CTC Decoding for Efficient Diacritic Restoration", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern ASR models trained on heterogeneously annotated data treat transcription style (verbatim vs. intended) as an uncontrolled latent variable, causing measurable decoding instability, evaluation confounding (up to 60% of reported WER attributable to style mismatch), and unreliable word-level timing. We show that models already encode both styles; the challenge is controlled activation. Using coverage-aware decoder task tokens trained on parallel verbatim/intended transcript pairs, we raise German disfluency F1 from 10% to 79% zero-shot, despite English-only training. Full English-only fine-tuning surpasses all baselines in verbatim accuracy, disfluency detection, and intended-mode quality across both languages. We further introduce supervised cross-attention fine-tuning that improves word-level timestamps on disfluent speech beyond forced-alignment baselines. Finally, we propose verbatimize, a new task enabling scalable creation and enrichment of speech corpora with high-quality canonical verbatim transcriptions.", "arxiv_id": "2607.18934", "arxiv_url": "https://arxiv.org/abs/2607.18934", "authors": ["Laurin Wagner", "Mario Zusag", "Bernhard Thallinger"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18934", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18934v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Transcription Policy as a Latent Variable: Activating Controllable Verbatim ASR with Word-Level Timing", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "With the rapid advancement of large language models (LLMs), modern systems not only possess strong foundational capabilities and extensive knowledge, but can also solve complex problems via long, multi-step reasoning. However, as reasoning traces become longer, LLMs may produce a substantial amount of hallucinated content during the reasoning process, which is often difficult to detect. In this work, we conduct a fine-grained analysis of hallucinations arising in LLM reasoning and find that the reasoning traces are particularly prone to Context-Sensitive Factual Hallucinations: cases where the model actually has the relevant knowledge, yet makes factual errors due to contextual interference during reasoning. To address this issue, we propose Step-level Self-Consistency Group Relative Policy Optimization (SSC-GRPO), which assigns step-level rewards to reasoning traces by computing self-consistency scores of individual steps across multiple rollouts. Compared with prior methods, SSC-GRPO achieves state-of-the-art performance on both mathematical reasoning benchmarks and hallucination leaderboards. Our results offer a new perspective for detecting and mitigating hallucinations in the reasoning process of large language models.", "arxiv_id": "2607.18915", "arxiv_url": "https://arxiv.org/abs/2607.18915", "authors": ["Xiaomeng Hu", "Jiaqi Hu", "Hao Chen", "Qi Zhang", "Zhanming Shen", "Wentao Ye", "Junbo Zhao"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18915", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18915v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Reasoning Error from Known Fact: Step-Level Self-Consistency Group Relative Policy Optimization for LLM", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Automatic speech recognition (ASR) for African languages is constrained by orthographic inconsistency, annotation artifacts, missing audio, speaker and domain imbalance, and evaluation procedures that differ from deployment. We present an end-to-end engineering study adapting NVIDIA Nemotron 3.5 ASR Streaming 0.6B to Kikuyu, Dholuo, and Kalenjin. Starting from a Kenyan Swahili-adapted checkpoint, we retain its cache-aware FastConformer RNN-T, prompt conditioning, and streaming decoder during full-parameter fine-tuning. The study covers corpus auditing, Unicode normalization, split checks, duration filtering, low-rate continuation, validation-based checkpoint selection, true-streaming evaluation, artifact preservation, and isolated serving. On internal, adaptively consulted evaluation sets excluded from gradient updates at context [56,13], selected Kikuyu and Dholuo models achieve 42.97% and 33.98% WER, respectively. Dholuo records 9.59% CER and 8.13% no-space CER under its frozen historical label policy; Kikuyu records 7.79% no-space CER. Kalenjin remains a work in progress: v1-v reaches 68.74% WER on a 2,411-row clean-v3 diagnostic subset excluding long-pause annotations, digit-bearing references, and targets shorter than three tokens. Its checkpoint selection used a mixed-source validation manifest containing test-origin rows, so the score is not an independent generalization estimate. We also report negative findings involving non-speech labels, short-utterance over-generation, boundary-sensitive WER, and cloud job-lifecycle failures. We make no state-of-the-art claim because the internal sets, repeated consultation, and normalization differ from public benchmarks. This work provides an auditable account of adapting a multilingual streaming model into language-specific systems without discarding streaming constraints.", "arxiv_id": "2607.18912", "arxiv_url": "https://arxiv.org/abs/2607.18912", "authors": ["Mark Gatere"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18912", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18912v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "From a Multilingual Streaming ASR Backbone to Kenyan-Language Systems: Data-Centric Adaptation of Nemotron 3.5 for Kikuyu, Dholuo, and Kalenjin", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models leak parametric knowledge of realized outcomes into historical financial decision tasks. Existence is settled; what users lack is a cheap way to audit a given model for it. We present HindsightBench, a black-box behavioral audit protocol that profiles parametric hindsight in any time-indexed LLM decision task at probe-level cost (no backtests, no logprobs, no corpus access). The protocol chains a four-arm date-manipulation matrix (revealed/date-only/masked/transplanted), dual memory probes (date recovery; outcome recall), and six per-model metrics -- trigger strength, transplant effect, post-cutoff placebo, recoverability, behaviorally effective knowledge cutoff, and a recall-accuracy dissociation coefficient -- with explicit gates where identifiability is data-dependent. Applying it to 15 models from seven vendors on a 258-node vintage-correct macro panel yields three headline patterns: (i) the date-trigger reflex tracks training generation, not scale -- absent across the 2024 open-weight generation from 1B to 70B, present in every tested 2026-generation model, and switching on within one vendor lineage (Qwen3 -\u003e Qwen3.6) at fixed MoE architecture and 3B active parameters; (ii) effective cutoffs span 22 months across vendors and precede vendor-reported dates by up to eight months, invalidating calendar-window placebo designs; (iii) audit results are not invariant to serving -- BF16 serving of an FP8-referenced model breaks the trigger estimate\u0027s stability while AWQ-INT4 preserves it, and a provider-locked reasoning regime makes one probe non-convergent -- so the protocol ships with operational requirements (pin quantization and thinking regime; disclose parser and sampling policy). We release the panel, frozen preregistrations, per-model audit rows with measured dollar costs, transcripts, and one-command regeneration.", "arxiv_id": "2607.18867", "arxiv_url": "https://arxiv.org/abs/2607.18867", "authors": ["Haozhe Jia"], "brief": "", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18867", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18867v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "HindsightBench: A Black-Box Behavioral Audit Protocol for Parametric Hindsight in Time-Indexed LLM Decision Tasks", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Efficient teamwork typically combines global coordination with parallel execution, a principle not yet fully reflected in unified Vision-Language Model (VLM)-based document parsers. Existing unified parsers process an entire page jointly but generate its output through a single token-by-token autoregressive trajectory, creating a sequential bottleneck that grows with document length. Such full-page sequential generation overlooks a key property of document parsing: layout must be analyzed globally, whereas block content can be parsed in parallel. Based on this observation, we introduce HPD-Parsing, which replaces full-page autoregressive generation with a Hierarchical Parallel Decoding paradigm. A main layout branch organizes the overall document structure and dynamically assigns block-level content decoding to concurrent branches, while progressive multi-token prediction (P-MTP) further reduces the decoding steps within each branch. Experiments on public benchmarks show that HPD-Parsing achieves 4,752 tokens per second, delivering $2.62\\times$ the throughput of the fastest existing document parsing model and $3.06\\times$ that of the vanilla autoregressive baseline, while maintaining competitive parsing accuracy. These results establish hierarchical parallel decoding as an effective alternative to full-page autoregressive generation, opening a new direction for efficient unified document parsing.", "arxiv_id": "2607.18839", "arxiv_url": "https://arxiv.org/abs/2607.18839", "authors": ["Shu Wei", "Jingjing Wu", "Lingshu Zhang", "Qunyi Xie", "Hao Zou", "Le Xiang", "Xu Fan", "Yangliu Xu", "Manhui Lin", "Xiaolong Ma", "Cheng Cui", "Tengyu Du", "YY"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18839", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18839v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "HPD-Parsing: Hierarchical Parallel Document Parsing", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This comprehensive study introduces an advanced Artificial Intelligence for Indian Legal Question Answering (AILQA) system tailored to the Indian legal context. AILQA leverages a variety of embedding and generative models, including recent Large Language Models (LLMs), to address the unique challenges posed by the intricate and diverse nature of Indian legal texts and to enhance the accuracy and reliability of responses to legal questions. We conducted rigorous evaluations using both lexical and semantic metrics, enriched by expert legal feedback, to ensure relevance and accuracy. Our findings underscore the effectiveness of the Retrieval-Augmented Generation (RAG) paradigm in improving answer quality, particularly in complex legal domains. Additionally, we assessed performance on standardized tests such as the All India Bar Examination (AIBE), thereby providing a robust benchmark for practical applications. Under the study\u0027s evaluation protocol, some AI-generated responses received higher ratings than the available reference answers, particularly when they contained accurate and relevant supporting details. This finding is specific to the evaluated dataset and rating criteria and should not be interpreted as evidence that the models generally outperform qualified legal professionals. We also discuss the challenges encountered, such as the need for precise context and the risks of model hallucination, and propose directions for future research to further refine AI capabilities in the legal field. This study aims to pave the way for enhanced legal decision-support systems, making them more accessible and effective for legal professionals and the public alike.", "arxiv_id": "2607.18825", "arxiv_url": "https://arxiv.org/abs/2607.18825", "authors": ["Shubham Kumar Nigam", "Shubham Kumar Mishra", "Noel Shallum", "Kripabandhu Ghosh", "Arnab Bhattacharya"], "brief": "", "categories": ["cs.CL", "cs.AI", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18825", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18825v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AILQA: Evaluating AI-Driven Legal Question Answering Systems for the Indian Legal System", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Chain-of-thought (CoT) reasoning is widely used to improve both the performance and interpretability of large language models (LLMs), yet the generated reasoning may not faithfully support the final answer. We study this problem from a causal perspective, where a faithful CoT process should follow the chain $Z\\rightarrow X\\rightarrow Y$, with $Z$, $X$, and $Y$ denoting the instruction, reasoning chain, and final answer, respectively. In this process, the instruction should affect the answer only through the reasoning chain. However, conventional autoregressive LLMs condition answer generation on both the instruction and the CoT, which still allows a direct instruction-to-answer shortcut. To address this issue, we propose CASE, a framework that combines training-time causal alignment and inference-time structural enforcement. During training, CASE builds counterfactual-CoT, biased-instruction, and empty-instruction datasets, and applies selective-loss fine-tuning to strengthen CoT-to-answer dependence while suppressing instruction shortcuts. During inference, CASE masks direct attention from instruction tokens to answer tokens, preventing the model from bypassing the generated CoT. We provide an information-theoretic analysis showing how these components promote faithful chains. Experiments on three models and four benchmarks show that CASE achieves a 37\\% average per-setting relative improvement in overall CoT faithfulness over the strongest baselines, exhibits stronger cross-dataset faithfulness transfer, and maintains competitive average accuracy. Code is available at https://github.com/oddwang/CASE.", "arxiv_id": "2607.18820", "arxiv_url": "https://arxiv.org/abs/2607.18820", "authors": ["Ziming Wang", "Yinghua Yao", "Changwu Huang", "Ke Tang", "Xin Yao"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18820", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18820v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CASE: Causal Alignment and Structural Enforcement for Improving Chain-of-Thought Faithfulness", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Researchers, managers and policymakers are exploring different approaches and data sources to map the development and the diffusion of Artificial Intelligence (AI). In this research note, we illustrate the opportunities offered by trademark data. We argue that AI trademarks can complement AI patents to capture different dimensions of AI innovation. AI trademarks can reveal the extent and ways in which companies exploit AI technologies to develop new goods and services. Importantly, trademark data offer a timely and globally available data source that covers all economic sectors. We present insights from using AI trademarks in an empirical exploration of Italian firms. In our discussion, we reflect on how AI trademarks can be used at different levels of analysis to tackle emerging questions about the development and diffusion of AI.", "arxiv_id": "2607.18795", "arxiv_url": "https://arxiv.org/abs/2607.18795", "authors": ["C. Castaldi", "F. Castellacci", "A. Fronzetti Colladon", "L. Segneri", "F. Venturini"], "brief": "", "categories": ["econ.GN", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18795", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18795v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Measuring AI innovation with trademark data", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) have driven rapid progress in electronic design automation (EDA), yet their application to radio-frequency (RF) circuit design remains limited by the scarcity of domain-specific datasets and standardized benchmarks. We present RF-Agent, which addresses this gap through textbook-driven knowledge distillation. A multi-agent Question-Thinking-Solution-Answer (QTSA) pipeline converts a subsection-level corpus from seven canonical RF textbooks into the first-of-its-kind RF-domain reasoning dataset (over 11,000 samples) with a dedicated multiple-choice benchmark. On this benchmark we study two adaptation strategies: supervised fine-tuning (SFT) and three retrieval-augmented generation (RAG) configurations (semantic, keyword, hybrid). Across multiple LLM families, domain-specific SFT significantly improves RF reasoning, especially for small and medium-sized models; among RAG configurations, semantic retrieval performs best, indicating embedding-based context alignment suits RF reasoning better than naive fusion. The dataset and benchmark provide a reusable foundation for future work on LLM-aided RF circuit design.", "arxiv_id": "2607.18772", "arxiv_url": "https://arxiv.org/abs/2607.18772", "authors": ["Yueqi Xing", "Houbo He", "Jolie Wang", "Erin Ni", "Shikai Wang", "Qiufeng Li", "Weidong Cao", "Taiyun Chi"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18772", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18772v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "RF-Agent: A Practical Framework for Building Language Agents for RFIC Design", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The deployment of Small Language Models (SLMs) in educational settings offers significant advantages in terms of privacy, cost, and scalability. However, SLMs often struggle with complex vision-based tasks, such as grading handwritten student exams, due to the high computational cost of processing large images and the visual distractions present on a full page. In this paper, we investigate whether cropping student responses using bounding boxes can improve the accuracy and computational efficiency of SLMs on a short-answer grading task. Using a dataset of scanned handwritten responses from the 2025 Australian Physics Olympiad, we evaluate the performance of several models ranging from 4B to 72B parameters under varying conditions of Chain of Thought (CoT) prompting and image cropping. Our results demonstrate that using bounding boxes significantly improves grading accuracy and reduces computational cost (FLOPs) across models. We conclude that bounding boxes are a crucial pre-processing step for deploying SLMs in large-scale, vision-based educational assessments.", "arxiv_id": "2607.18767", "arxiv_url": "https://arxiv.org/abs/2607.18767", "authors": ["Lachlan McGinness"], "brief": "", "categories": ["cs.CV", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18767", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18767v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Bounding Boxes to Improve Small Language Model Performance on Vision-Based Grading Tasks", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Public institutions hold large volumes of sensitive documents and support tickets that cannot leave the premises, ruling out cloud-hosted language models entirely. We report on RAGAL, a retrieval-augmented assistant for the technical-support team of AFIR, the Romanian Agency for Financing Rural Investments, built and operated under three hard constraints: zero data egress (no external API calls, even for synthetic data), a read-only mandate (the assistant drafts, humans execute), and a single 8 GB consumer laptop as the only development and training machine. Over a Romanian-language corpus of ~25,000 chunks -- 15,073 resolved support tickets and internal normative documents -- we show that the highest-leverage investments were retrieval engineering and retriever fine-tuning rather than a larger generator: hybrid dense-sparse retrieval with intent routing raised our internal evaluation from 62% to 81%, and fine-tuning the bge-m3 embedder on real ticket data improved recall@10 from 0.663 to 0.850 (MRR 0.489 to 0.684) after 72 minutes of training. We document a general pitfall: single-domain fine-tuning silently degraded retrieval on the untouched document domain below the stock baseline, detected only after building a per-domain evaluation set and repaired with locally generated queries (GenQ). We report two counter-intuitive findings -- PII masking improved generation quality, and a structural \"anchor distillation\" scheme made SQL hallucination impossible by construction -- along with a reproducible recipe for full embedder fine-tuning in 8 GB of VRAM. Finally, since zero egress also rules out a cloud judge, we describe a substitute: a 744B-parameter model run on CPU, too slow to serve interactively but affordable in overnight batch, used as a second opinion whose limits we quantify. We release the sanitized pipeline scripts for institutions facing similar data-locality constraints.", "arxiv_id": "2607.18756", "arxiv_url": "https://arxiv.org/abs/2607.18756", "authors": ["Dan Musetoiu"], "brief": "", "categories": ["cs.IR", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18756", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18756v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "RAGAL: A Frugal, Fully Local Retrieval-Augmented Assistant for Technical Support at a Government Agency", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Translating brain signals into text could restore communication for people with severe paralysis, yet practically usable systems to date rely on invasive electrocorticography (ECoG). Electroencephalography (EEG) offers a non-invasive alternative, and EEG-to-text (EEG2Text) has been widely explored. Interestingly, however, EEG2Text models generally rely on teacher-forcing evaluation; without it, they fail to generate meaningful decoding. This reliance prevents EEG2Text from being applied in real-world, non-academic settings. This has fueled numerous debates about whether EEG2Text is a meaningful direction, by extension, and whether EEG truly contains decodable linguistic information. Here, using a neuropsychology-informed paradigm, we find that existing EEG2Text benchmarks have neglected EEG instability, a flaw that has confounded inference and sparked debate. Our experiments furnish key evidence for the feasibility of teacher-forcing-free EEG2Text decoding. Accordingly, we assemble the Corpus OF Eeg-To-Text (COFETT) using a 128-channel high-density EEG cap, providing a benchmark dedicated to evaluating EEG2Text models. In comparisons with multiple existing benchmarks, COFETT achieves SOTA ability to distinguish among model performances and enables robust, teacher-forcing-free evaluation, thereby opening a path toward practical EEG2Text applications. COFETT is open sourced in https://github.com/baoyudu/COFETT.", "arxiv_id": "2607.18749", "arxiv_url": "https://arxiv.org/abs/2607.18749", "authors": ["Zihan Zhang", "Yu Bao", "Xiao Ding", "Tianyi Jiang", "Kai Xiong"], "brief": "", "categories": ["cs.LG", "cs.CL", "cs.ET", "q-bio.NC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18749", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18749v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Is EEG-to-Text Feasible in Real-World Scenarios? An In-Depth Analysis Using a Neuropsychology-Inspired Benchmark", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent work extends Transformer residual pathways along two complementary axes: historical retrieval selects information from earlier depths, whereas multi-stream methods maintain multiple residual trajectories. These capabilities have largely been studied in isolation, and assigning an independent retriever to each stream still prevents one trajectory from influencing depth selection in another. We propose Dual Attention Residuals (DAR), which brings multi-stream interaction into historical retrieval through reciprocal cross-stream addressing. For each target stream, DAR computes depth weights from normalized states in the opposite stream and applies them to values from the target stream\u0027s own history. The retrieved states are combined for an unchanged Transformer branch and updated through constrained gated writes; a block-form variant operates on block-level histories to control overhead. Across dense models from 0.1B to 1B parameters and a 7B sparse-MoE model, DAR consistently improves validation loss over standard residual Transformers and Attention Residuals. Routing ablations show that the gain cannot be explained by an additional stream or value projection alone. Representation and intervention analyses further show that reciprocal cross-stream selection preserves depth-wise diversity and avoids the redundancy or functional imbalance observed in alternative two-stream designs.", "arxiv_id": "2607.18730", "arxiv_url": "https://arxiv.org/abs/2607.18730", "authors": ["Xingda Yu", "Yining Li", "Xinzhang Liu", "Zhihao Yang", "Haowei He", "Chao Wang", "Yongxiang Li", "Shuangyong Song"], "brief": "", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18730", "impact_score": null, "is_agent": null, "is_top": false, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18730v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Dual Attention Residuals", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
