u4ef6\u8def\u7531\u3001\u91cd\u8bd5\u3001\u4e2d\u65ad\u3001\u68c0\u67e5\u70b9\u548c\u5ba1\u8ba1\u8ffd\u8e2a\u7684\u5de5\u7a0b\u6a21\u5f0f\u3002", "categories": ["cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19297", "impact_score": 4, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u4f5c\u6d41\u7f16\u6392", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u4eba\u5728\u56de\u8def"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19297v1", "published_at": "2026-07-21", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Graph-Based Agentic AI with LangGraph: Workflow Pathways for Long-Running Stateful Business Processes", "tldr": "\u672c\u6587\u662f\u4e00\u7bc7\u9762\u5411\u5b9e\u8df5\u7684\u6307\u5357\uff0c\u4ecb\u7ecd\u5982\u4f55\u7528 LangGraph \u6784\u5efa\u957f\u6d41\u7a0b\u3001\u6709\u72b6\u6001\u3001\u591a\u6b65\u9aa4\u7684\u4f01\u4e1a\u7ea7\u751f\u6210\u5f0f AI \u5de5\u4f5c\u6d41\u3002\u901a\u8fc7 SQL \u5206\u6790\u4fee\u590d\u5faa\u73af\u3001\u5e26\u8bc1\u636e\u95e8\u63a7\u7684 RAG\u3001\u4eba\u5728\u56de\u8def\u7684\u7b56\u7565\u5ba1\u6838\u7b49\u6848\u4f8b\uff0c\u5c55\u793a\u7c7b\u578b\u5316\u72b6\u6001\u3001\u6761\u4ef6\u8def\u7531\u3001\u91cd\u8bd5\u3001\u4e2d\u65ad\u3001\u68c0\u67e5\u70b9\u548c\u5ba1\u8ba1\u8ffd\u8e2a\u7684\u5de5\u7a0b\u6a21\u5f0f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLM agent failures are difficult to debug because the step where an error surfaces is often not the one that caused it. Existing observability tools replay execution traces but provide little support for identifying the root cause or translating diagnosis into recovery. We present AgentDebugX, an open-source debugging framework that organizes debugging as a closed loop of Detect, Attribute, Recover, and Rerun. At its core, DeepDebug performs multi-turn root-cause diagnosis through global trajectory understanding, structure-guided investigation, and cross-examination. On the Who and When benchmark, DeepDebug achieves the best strict attribution accuracy among the evaluated methods on both tested open-weight backbones, reaching 28.8 percent exact agent-and-step accuracy on qwen3.5-9b versus 21.7 percent for the strongest single-pass baseline. On GAIA, DeepDebug repairs 13 of 73 failed tasks in a single rerun, compared with 4 to 6 for three decoupled self-correction baselines, improving overall accuracy from 55.8 percent to 63.6 percent. AgentDebugX exposes this workflow through a Python library, CLI, web console, and installable agentic skill, and provides an opt-in Error Hub for sharing scrubbed failure-diagnosis-repair bundles and reusing them as debugging memory.", "arxiv_id": "2607.18754", "arxiv_url": "https://arxiv.org/abs/2607.18754", "authors": ["Kunlun Zhu", "Xuyan Ye", "Zhiguang Han", "Yuchen Zhao", "Bingxuan Li", "Weijia Zhang", "Muxin Tian", "Xiangru Tang", "Pan Lu", "James Zou", "Jiaxuan You", "Heng Ji"], "brief": "AgentDebugX \u662f\u4e00\u4e2a\u5f00\u6e90\u7684 LLM \u667a\u80fd\u4f53\u8c03\u8bd5\u5de5\u5177\u5305\uff0c\u5c06\u5931\u8d25\u5904\u7406\u7ec4\u7ec7\u4e3a\u68c0\u6d4b\u3001\u5f52\u56e0\u3001\u4fee\u590d\u3001\u91cd\u8dd1\u7684\u95ed\u73af\u3002\u5176\u6838\u5fc3 DeepDebug \u901a\u8fc7\u5168\u5c40\u8f68\u8ff9\u7406\u89e3\u548c\u7ed3\u6784\u5316\u8ffd\u56e0\u63d0\u5347\u6839\u56e0\u5b9a\u4f4d\u80fd\u529b\uff0c\u5e76\u5728 Who and When \u4e0e GAIA \u57fa\u51c6\u4e0a\u663e\u8457\u4f18\u4e8e\u81ea\u7ea0\u9519\u57fa\u7ebf\uff0c\u80fd\u4fee\u590d\u66f4\u591a\u5931\u8d25\u4efb\u52a1\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18754", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u89c2\u6d4b\u6027", "\u8c03\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18754v1", "published_at": "2026-07-21", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "AgentDebugX: An Open-Source Toolkit for Failure Observability, Attribution, and Recovery in LLM Agents", "tldr": "AgentDebugX \u662f\u4e00\u4e2a\u5f00\u6e90\u7684 LLM \u667a\u80fd\u4f53\u8c03\u8bd5\u5de5\u5177\u5305\uff0c\u5c06\u5931\u8d25\u5904\u7406\u7ec4\u7ec7\u4e3a\u68c0\u6d4b\u3001\u5f52\u56e0\u3001\u4fee\u590d\u3001\u91cd\u8dd1\u7684\u95ed\u73af\u3002\u5176\u6838\u5fc3 DeepDebug \u901a\u8fc7\u5168\u5c40\u8f68\u8ff9\u7406\u89e3\u548c\u7ed3\u6784\u5316\u8ffd\u56e0\u63d0\u5347\u6839\u56e0\u5b9a\u4f4d\u80fd\u529b\uff0c\u5e76\u5728 Who and When \u4e0e GAIA \u57fa\u51c6\u4e0a\u663e\u8457\u4f18\u4e8e\u81ea\u7ea0\u9519\u57fa\u7ebf\uff0c\u80fd\u4fee\u590d\u66f4\u591a\u5931\u8d25\u4efb\u52a1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The post-training of Vision-Language-Action (VLA) models is essential due to the diversity of simulators, robot embodiments, and task objectives. Existing compute services, whether offered as direct accelerator rental or batch-workload submission, typically allocate an exclusive set of GPU and CPU resources to a single tenant. While this paradigm maximizes client flexibility, it burdens users with infrastructure adaptation, and the fixed card-hour accounting model renders short or bursty workloads both expensive for tenants and inefficient for the service provider. To address these challenges, we present JoyNexus, a unified service for multi-tenant VLA supervised fine-tuning, reinforcement learning, and evaluation. JoyNexus decouples the Training Model Service, Inference Model Service, and Environment Service, each accessed through APIs and backed by resident shared base models with tenant-specific slots. Tenants can directly invoke high-level semantic APIs for training, rollout, and evaluation, or compose custom algorithms using lower-level APIs and their assigned endpoints. Multiple tenants submit workloads concurrently; their action modules, optimizers, rollout records, and policy versions remain isolated, and the service is scheduled by the global Training Queue and Inference Queue. To further improve multi-tenant training efficiency, JoyNexus introduces group batching for heterogeneous VLA data schemas that share a compatible model-facing prefix, enabling a single shared backbone forward pass over grouped samples. Finally, we evaluate JoyNexus through workload simulation and a group-batching pipeline in a realistic embodied scenario. Results show that, compared with isolated single-tenant execution, JoyNexus reduces aggregate GPU time and improves service utilization via cross-tenant scheduling on shared resources.", "arxiv_id": "2607.16074", "arxiv_url": "https://arxiv.org/abs/2607.16074", "authors": ["Haoran Sun", "Wentao Zhang", "Junyang Hua", "Hedan Yang", "Yongjian Guo", "Yifei Zhang", "Xiaolong Xiang", "Mingxi Luo", "Jing Long", "Chen Zhao", "Chen Zhou", "Wanting Xu", "Qiming Yang", "Hui Zhang", "Song Wang", "Xiaodong Bai", "Shuai Di", "Xu Chu", "Xiaotie Deng", "Yicheng Gong", "Junwu Xiong"], "brief": "\u8bba\u6587\u63d0\u51fa JoyNexus\uff0c\u4e00\u4e2a\u7528\u4e8e VLA \u6a21\u578b\u76d1\u7763\u5fae\u8c03\u3001\u5f3a\u5316\u5b66\u4e60\u4e0e\u8bc4\u6d4b\u7684\u7edf\u4e00\u591a\u79df\u6237\u670d\u52a1\u3002\u5b83\u5c06\u8bad\u7ec3\u6a21\u578b\u3001\u63a8\u7406\u6a21\u578b\u548c\u73af\u5883\u670d\u52a1\u89e3\u8026\u4e3a API\uff0c\u5e76\u901a\u8fc7\u5171\u4eab\u5e38\u9a7b\u57fa\u5ea7\u6a21\u578b\u4e0e\u79df\u6237\u9694\u79bb\u69fd\u4f4d\u652f\u6301\u5e76\u53d1\u5de5\u4f5c\u8d1f\u8f7d\u3002", "categories": ["cs.DC", "cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16074", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u901a\u8fc7\u5168\u5c40\u8bad\u7ec3\u961f\u5217\u548c\u63a8\u7406\u961f\u5217\u8c03\u5ea6\u591a\u79df\u6237\u4efb\u52a1\uff0c\u5728\u5171\u4eab GPU/CPU \u8d44\u6e90\u4e0a\u9694\u79bb\u52a8\u4f5c\u6a21\u5757\u3001\u4f18\u5316\u5668\u3001\u8f68\u8ff9\u8bb0\u5f55\u548c\u7b56\u7565\u7248\u672c\u3002", "\u63d0\u4f9b\u9ad8\u5c42\u8bed\u4e49 API \u652f\u6301\u8bad\u7ec3\u3001rollout \u548c\u8bc4\u6d4b\uff0c\u4e5f\u5141\u8bb8\u7528\u6237\u901a\u8fc7\u4f4e\u5c42 API \u7ec4\u5408\u81ea\u5b9a\u4e49\u540e\u8bad\u7ec3\u7b97\u6cd5\u3002", "\u63d0\u51fa\u9762\u5411\u5f02\u6784 VLA \u6570\u636e\u6a21\u5f0f\u7684 group batching\uff0c\u5728\u517c\u5bb9\u6a21\u578b\u524d\u7f00\u4e0b\u5171\u4eab\u4e00\u6b21\u9aa8\u5e72\u7f51\u7edc\u524d\u5411\u8ba1\u7b97\uff0c\u964d\u4f4e\u603b\u4f53 GPU \u65f6\u95f4\u5e76\u63d0\u5347\u5229\u7528\u7387\u3002"], "keywords": ["VLA\u6a21\u578b", "\u591a\u79df\u6237", "\u5f3a\u5316\u5b66\u4e60", "\u7cfb\u7edf\u8c03\u5ea6"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16074v1", "published_at": "2026-07-17", "score": 0.221, "selected_reasons": ["HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16074.png", "title": "JoyNexus: Service-Oriented Multi-Tenant Post-Training for VLA Models", "tldr": "\u9762\u5411VLA\u540e\u8bad\u7ec3\u7684\u591a\u79df\u6237\u5171\u4eab\u670d\u52a1\u6846\u67b6", "upvotes": 4, "what_it_is": "\u8bba\u6587\u63d0\u51fa JoyNexus\uff0c\u4e00\u4e2a\u7528\u4e8e VLA \u6a21\u578b\u76d1\u7763\u5fae\u8c03\u3001\u5f3a\u5316\u5b66\u4e60\u4e0e\u8bc4\u6d4b\u7684\u7edf\u4e00\u591a\u79df\u6237\u670d\u52a1\u3002\u5b83\u5c06\u8bad\u7ec3\u6a21\u578b\u3001\u63a8\u7406\u6a21\u578b\u548c\u73af\u5883\u670d\u52a1\u89e3\u8026\u4e3a API\uff0c\u5e76\u901a\u8fc7\u5171\u4eab\u5e38\u9a7b\u57fa\u5ea7\u6a21\u578b\u4e0e\u79df\u6237\u9694\u79bb\u69fd\u4f4d\u652f\u6301\u5e76\u53d1\u5de5\u4f5c\u8d1f\u8f7d\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a VLA \u540e\u8bad\u7ec3\u4ece\u5355\u79df\u6237\u72ec\u5360\u7b97\u529b\u8f6c\u5411\u670d\u52a1\u5316\u3001\u591a\u79df\u6237\u5171\u4eab\u6a21\u5f0f\uff0c\u964d\u4f4e\u77ed\u65f6\u6216\u7a81\u53d1\u8bad\u7ec3\u6210\u672c\uff0c\u5e76\u63d0\u5347\u670d\u52a1\u5546\u8d44\u6e90\u5229\u7528\u7387\uff1b\u5bf9\u673a\u5668\u4eba/VLA \u6a21\u578b\u7684\u89c4\u6a21\u5316\u8bad\u7ec3\u5e73\u53f0\u5efa\u8bbe\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The prevailing inference framework for diffusion models formulates generation fundamentally as a problem of numerical integration. This perspective casts the model as an exact estimator, neglecting the inherent statistical uncertainty of the denoising process. In this work, we propose Forward-Process Aligned Diffusion prediction (\\textbf{DiFA}), a training-free framework that reframes inference-time data prediction refinement as a sequential state estimation problem. Rather than reusing past outputs solely for numerical integration, DiFA treats iterative data predictions along the reverse trajectory as correlated observations to build a forward-aligned temporal consensus. Inspired by Kalman filtering, this consensus aggregates historical predictions according to structural consistency and noise-level compatibility. To counteract the over-smoothing tendency of temporal consensus, we introduce a deviation guidance mechanism to adaptively preserve residual details. Empirically, DiFA yields significant improvements on CIFAR-10 and ImageNet across the evaluated metrics, including FID, IS, and FD-DINOv2, demonstrating that aligning inference with the forward statistical structure substantially improves generative fidelity.", "arxiv_id": "2607.17972", "arxiv_url": "https://arxiv.org/abs/2607.17972", "authors": ["Shigui Li", "Delu Zeng"], "brief": "\u8bba\u6587\u63d0\u51fa DiFA\uff0c\u4e00\u79cd\u8bad\u7ec3-free \u7684\u6269\u6563\u6a21\u578b\u63a8\u7406\u6846\u67b6\uff0c\u5c06\u53cd\u5411\u91c7\u6837\u4e2d\u7684\u6570\u636e\u9884\u6d4b\u7ec6\u5316\u91cd\u8ff0\u4e3a\u5e8f\u5217\u72b6\u6001\u4f30\u8ba1\u95ee\u9898\u3002\u5b83\u628a\u591a\u6b65\u53bb\u566a\u9884\u6d4b\u89c6\u4e3a\u76f8\u5173\u89c2\u6d4b\uff0c\u901a\u8fc7\u524d\u5411\u8fc7\u7a0b\u5bf9\u9f50\u7684\u65f6\u95f4\u5171\u8bc6\u63d0\u5347\u751f\u6210\u8d28\u91cf\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17972", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4e0d\u518d\u4ec5\u5c06\u91c7\u6837\u770b\u4f5c\u6570\u503c\u79ef\u5206\uff0c\u800c\u662f\u663e\u5f0f\u5efa\u6a21\u53bb\u566a\u9884\u6d4b\u4e2d\u7684\u7edf\u8ba1\u4e0d\u786e\u5b9a\u6027", "\u501f\u9274 Kalman filtering\uff0c\u6839\u636e\u7ed3\u6784\u4e00\u81f4\u6027\u4e0e\u566a\u58f0\u7ea7\u517c\u5bb9\u6027\u805a\u5408\u5386\u53f2\u9884\u6d4b", "\u5f15\u5165 deviation guidance \u7f13\u89e3\u65f6\u95f4\u5171\u8bc6\u5bfc\u81f4\u7684\u8fc7\u5e73\u6ed1\uff0c\u4fdd\u7559\u6b8b\u4f59\u7ec6\u8282"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u63a8\u7406\u4f18\u5316", "\u751f\u6210\u6a21\u578b", "\u72b6\u6001\u4f30\u8ba1"], "num_comments": 1, "on_hf": true, "organization": "South China University of Technology", "pdf_url": "https://arxiv.org/pdf/2607.17972v1", "published_at": "2026-07-20", "score": 0.221, "selected_reasons": ["HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17972.png", "title": "DiFA: Inference-Time Forward-Process Alignment for Diffusion Models", "tldr": "DiFA\u65e0\u9700\u8bad\u7ec3\u6539\u8fdb\u6269\u6563\u6a21\u578b\u91c7\u6837\u8d28\u91cf", "upvotes": 4, "what_it_is": "\u8bba\u6587\u63d0\u51fa DiFA\uff0c\u4e00\u79cd\u8bad\u7ec3-free \u7684\u6269\u6563\u6a21\u578b\u63a8\u7406\u6846\u67b6\uff0c\u5c06\u53cd\u5411\u91c7\u6837\u4e2d\u7684\u6570\u636e\u9884\u6d4b\u7ec6\u5316\u91cd\u8ff0\u4e3a\u5e8f\u5217\u72b6\u6001\u4f30\u8ba1\u95ee\u9898\u3002\u5b83\u628a\u591a\u6b65\u53bb\u566a\u9884\u6d4b\u89c6\u4e3a\u76f8\u5173\u89c2\u6d4b\uff0c\u901a\u8fc7\u524d\u5411\u8fc7\u7a0b\u5bf9\u9f50\u7684\u65f6\u95f4\u5171\u8bc6\u63d0\u5347\u751f\u6210\u8d28\u91cf\u3002", "why_notable": "DiFA\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u5373\u53ef\u63d0\u5347\u73b0\u6709\u6269\u6563\u6a21\u578b\u63a8\u7406\u6548\u679c\uff0c\u5728 CIFAR-10 \u548c ImageNet \u4e0a\u6539\u5584 FID\u3001IS\u3001FD-DINOv2 \u7b49\u6307\u6807\uff0c\u8bf4\u660e\u5229\u7528\u524d\u5411\u6269\u6563\u7edf\u8ba1\u7ed3\u6784\u80fd\u6709\u6548\u589e\u5f3a\u751f\u6210\u4fdd\u771f\u5ea6\u3002"}, {"abstract": "As generative AI is increasingly applied to automate multi-step and high-stake workflows, human judgment and involvement remain essential for ensuring the quality of AI-generated outputs. In practice, while it is desirable for human experts to provide oversight on AI regularly, often by reviewing intermediate outputs, giving feedback, making corrections, and steering subsequent steps, such oversight is constrained by the time and resources that humans can afford. This creates a tension between the need for human oversight and AI\u0027s efficiency in delivering more output with less intervention. An important but underexplored question, then, is how to optimally engage humans in human-AI coworking. This work was originally motivated by our empirical observation that in long AI workflows, human oversight often improves user satisfaction while reducing unnecessary rework and token consumption. From there, we formulate the problem of where to place oversight stages in human-AI coworking. Under reasonable assumptions, we then develop the nonuniformity principle, which states that the optimal schedule places oversight stages with non-decreasing gaps along the workflow. We empirically validate this principle in two common AI agent workflows: writing literature reviews and constructing websites.", "arxiv_id": "2607.16530", "arxiv_url": "https://arxiv.org/abs/2607.16530", "authors": ["An Luo", "Jie Ding"], "brief": "\u672c\u6587\u7814\u7a76\u591a\u6b65\u9aa4\u9ad8\u98ce\u9669 AI \u5de5\u4f5c\u6d41\u4e2d\uff0c\u4eba\u7c7b\u76d1\u7763\u5e94\u5728\u4f55\u5904\u4ecb\u5165\u6700\u4f18\u3002\u4f5c\u8005\u63d0\u51fa\u201c\u975e\u5747\u5300\u6027\u539f\u5219\u201d\uff1a\u5728\u5408\u7406\u5047\u8bbe\u4e0b\uff0c\u6700\u4f18\u76d1\u7763\u8282\u70b9\u6cbf\u5de5\u4f5c\u6d41\u5e94\u5448\u73b0\u95f4\u9694\u975e\u9012\u51cf\uff0c\u5373\u524d\u671f\u66f4\u5bc6\u3001\u540e\u671f\u66f4\u758f\u3002", "categories": ["cs.AI", "stat.ME"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16530", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5c06\u4eba\u7c7b\u5ba1\u67e5\u3001\u53cd\u9988\u3001\u7ea0\u9519\u7b49\u76d1\u7763\u884c\u4e3a\u5efa\u6a21\u4e3a\u53d7\u65f6\u95f4\u4e0e\u8d44\u6e90\u7ea6\u675f\u7684\u8c03\u5ea6\u95ee\u9898", "\u7406\u8bba\u63a8\u5bfc\u51fa\u6700\u4f18\u76d1\u7763\u9636\u6bb5\u4e4b\u95f4\u7684\u95f4\u9694\u5e94\u975e\u9012\u51cf\uff0c\u4ee5\u5e73\u8861\u8d28\u91cf\u63d0\u5347\u4e0e\u6548\u7387\u6210\u672c", "\u5728\u6587\u732e\u7efc\u8ff0\u5199\u4f5c\u548c\u7f51\u7ad9\u6784\u5efa\u4e24\u4e2a AI agent \u5de5\u4f5c\u6d41\u4e2d\u9a8c\u8bc1\u8be5\u539f\u5219\u53ef\u63d0\u5347\u6ee1\u610f\u5ea6\u5e76\u51cf\u5c11\u8fd4\u5de5\u4e0e token \u6d88\u8017"], "keywords": ["\u4eba\u673a\u534f\u4f5c", "\u667a\u80fd\u4f53", "\u5de5\u4f5c\u6d41\u4f18\u5316", "\u4eba\u7c7b\u76d1\u7763"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16530v1", "published_at": "2026-07-17", "score": 0.198, "selected_reasons": ["HF trending (1\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16530.png", "title": "Nonuniformity Principle in Human-AI Coworking", "tldr": "\u63d0\u51fa\u4eba\u673a\u534f\u4f5c\u76d1\u7763\u7684\u975e\u5747\u5300\u8c03\u5ea6\u539f\u5219", "upvotes": 1, "what_it_is": "\u672c\u6587\u7814\u7a76\u591a\u6b65\u9aa4\u9ad8\u98ce\u9669 AI \u5de5\u4f5c\u6d41\u4e2d\uff0c\u4eba\u7c7b\u76d1\u7763\u5e94\u5728\u4f55\u5904\u4ecb\u5165\u6700\u4f18\u3002\u4f5c\u8005\u63d0\u51fa\u201c\u975e\u5747\u5300\u6027\u539f\u5219\u201d\uff1a\u5728\u5408\u7406\u5047\u8bbe\u4e0b\uff0c\u6700\u4f18\u76d1\u7763\u8282\u70b9\u6cbf\u5de5\u4f5c\u6d41\u5e94\u5448\u73b0\u95f4\u9694\u975e\u9012\u51cf\uff0c\u5373\u524d\u671f\u66f4\u5bc6\u3001\u540e\u671f\u66f4\u758f\u3002", "why_notable": "\u8bba\u6587\u4e3a\u4eba\u673a\u534f\u4f5c\u4e2d\u7684\u201c\u4f55\u65f6\u8ba9\u4eba\u4ecb\u5165\u201d\u63d0\u4f9b\u4e86\u53ef\u89e3\u91ca\u7684\u7406\u8bba\u539f\u5219\u548c\u5b9e\u8bc1\u652f\u6301\uff0c\u5bf9\u957f\u94fe\u8def LLM agent\u3001\u81ea\u52a8\u5316\u529e\u516c\u548c\u9ad8\u98ce\u9669 AI \u6d41\u7a0b\u7684\u76d1\u7763\u8bbe\u8ba1\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We present a continuous geometric framework that models the discrete algebraic operations of the Transformer architecture as an integro-differential equation (IDE) on a semantic fiber bundle $\\calE = \\calM \\times \\R^d$. Beginning from a single geometric axiom -- that the token sequence forms a discrete $1$-manifold equipped with a canonical measure lattice -- we translate every core component of the modern Transformer (RMSNorm, RoPE, Softmax Attention, FFN, Residual Stream, SGD, Weight Decay) into a cohesive vocabulary of differential geometry, measure theory, and stochastic calculus. The resulting framework yields quantitative predictions spanning entropic optimal transport (Attention as a Schr\u00f6dinger bridge) and non-equilibrium thermodynamics (SGD as It\u00f4 diffusion violating detailed balance). We conduct a six-part experimental campaign across five architectures (Qwen3, LLaMA\\nobreakdash-3.1, Gemma\\nobreakdash-3, GPT-2, Mistral) spanning $124$M to $8$B parameters. The empirical observables are quantitatively consistent with the geometric predictions: the $\u03b5^{-1/2}$ Lipschitz scaling calibration at machine precision ($R^2 = 1.000$), the Lie--Trotter operator-splitting torsion, the symmetric ablation instability confirming the Dual-Law of Topological Stability, the $\\calO(1/\\sqrt{k})$ thermodynamic suppression of Poincar\u00e9 recurrence on the RoPE torus, the thermodynamic context-limit phase transition, and the Non-Equilibrium Steady State parameter vortex -- verified across two optimizers (AdamW and Pure SGD) to exclude momentum artifacts. The results demonstrate that analyzing Transformers through the lens of continuous stochastic differential geometry provides a predictive descriptive vocabulary for the stability limits, context bounds, and optimization dynamics of Large Language Models.", "arxiv_id": "2607.17146", "arxiv_url": "https://arxiv.org/abs/2607.17146", "authors": ["Zhihua Liang"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u8fde\u7eed\u968f\u673a\u5fae\u5206\u51e0\u4f55\u6846\u67b6\uff0c\u5c06Transformer\u4e2d\u7684RMSNorm\u3001RoPE\u3001\u6ce8\u610f\u529b\u3001FFN\u3001\u6b8b\u5dee\u3001SGD\u7b49\u79bb\u6563\u64cd\u4f5c\u8868\u8ff0\u4e3a\u8bed\u4e49\u7ea4\u7ef4\u4e1b\u4e0a\u7684\u79ef\u5206-\u5fae\u5206\u65b9\u7a0b\u3002\u4f5c\u8005\u5728Qwen3\u3001LLaMA\u3001Gemma\u3001GPT-2\u3001Mistral\u7b49\u6a21\u578b\u4e0a\u9a8c\u8bc1\u82e5\u5e72\u51e0\u4f55\u4e0e\u70ed\u529b\u5b66\u9884\u6d4b\u3002", "categories": ["cond-mat.dis-nn", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17146", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u6ce8\u610f\u529b\u89e3\u91ca\u4e3a\u71b5\u6700\u4f18\u4f20\u8f93/Schr\u00f6dinger\u6865\uff0c\u5c06SGD\u89e3\u91ca\u4e3a\u8fdd\u53cd\u7ec6\u81f4\u5e73\u8861\u7684It\u00f4\u6269\u6563", "\u63d0\u51fa\u5173\u4e8e\u7a33\u5b9a\u6027\u3001\u4e0a\u4e0b\u6587\u957f\u5ea6\u8fb9\u754c\u3001RoPE\u73af\u9762\u590d\u73b0\u6291\u5236\u548c\u4f18\u5316\u52a8\u529b\u5b66\u7684\u5b9a\u91cf\u9884\u6d4b", "\u5728124M\u52308B\u53c2\u6570\u89c4\u6a21\u3001\u4e94\u7c7b\u67b6\u6784\u548c\u4e24\u79cd\u4f18\u5316\u5668\u4e0a\u62a5\u544a\u4e0e\u7406\u8bba\u4e00\u81f4\u7684\u5b9e\u9a8c\u73b0\u8c61"], "keywords": ["Transformer\u7406\u8bba", "\u51e0\u4f55\u6df1\u5ea6\u5b66\u4e60", "\u4f18\u5316\u52a8\u529b\u5b66", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17146v1", "published_at": "2026-07-19", "score": 0.196, "selected_reasons": ["HF trending (4\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17146.png", "title": "The Geometry of Semantic Space: A Continuous Geometric Framework for the Transformer Architecture", "tldr": "\u7528\u8fde\u7eed\u51e0\u4f55\u7edf\u4e00\u89e3\u91caTransformer\u673a\u5236", "upvotes": 4, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u8fde\u7eed\u968f\u673a\u5fae\u5206\u51e0\u4f55\u6846\u67b6\uff0c\u5c06Transformer\u4e2d\u7684RMSNorm\u3001RoPE\u3001\u6ce8\u610f\u529b\u3001FFN\u3001\u6b8b\u5dee\u3001SGD\u7b49\u79bb\u6563\u64cd\u4f5c\u8868\u8ff0\u4e3a\u8bed\u4e49\u7ea4\u7ef4\u4e1b\u4e0a\u7684\u79ef\u5206-\u5fae\u5206\u65b9\u7a0b\u3002\u4f5c\u8005\u5728Qwen3\u3001LLaMA\u3001Gemma\u3001GPT-2\u3001Mistral\u7b49\u6a21\u578b\u4e0a\u9a8c\u8bc1\u82e5\u5e72\u51e0\u4f55\u4e0e\u70ed\u529b\u5b66\u9884\u6d4b\u3002", "why_notable": "\u8bba\u6587\u8bd5\u56fe\u4e3aTransformer\u63d0\u4f9b\u4e00\u4e2a\u7edf\u4e00\u7684\u8fde\u7eed\u51e0\u4f55\u8bed\u8a00\uff0c\u4e0d\u4ec5\u63cf\u8ff0\u7ec4\u4ef6\u7ed3\u6784\uff0c\u8fd8\u58f0\u79f0\u80fd\u9884\u6d4b\u7a33\u5b9a\u6027\u3001\u4e0a\u4e0b\u6587\u6781\u9650\u548c\u8bad\u7ec3\u52a8\u529b\u5b66\uff1b\u82e5\u53ef\u590d\u73b0\uff0c\u5c06\u6709\u52a9\u4e8e\u4ece\u7406\u8bba\u5c42\u9762\u7406\u89e3\u5927\u6a21\u578b\u884c\u4e3a\u8fb9\u754c\u3002"}, {"abstract": "Agentic systems large language model (LLM) based architectures capable of reasoning, planning, acting, and coordinating with tools and other agents are rapidly transitioning from research prototypes to production scale deployments across domains such as software engineering, scientific discovery, and finance. While academic work has emphasized benchmarks and algorithmic innovation, deployment raises new challenges around robustness, safety, and reliability. This tutorial brings together researchers and practitioners to explore advances in reasoning and planning, multi agent coordination, and evaluation, highlighting open challenges arising from deployment experience. Through applied case studies in pharmaceutical discovery and financial systems, we analyze common design patterns that make agentic systems successful, and discuss practical mitigation strategies for failure modes, such as verification pipelines, fallback mechanisms, and human in the loop supervision. Attendees will gain a comprehensive view of the field along with concrete design patterns, evaluation checklists, and templates for safe and reliable deployment across industries.", "arxiv_id": "2607.19336", "arxiv_url": "https://arxiv.org/abs/2607.19336", "authors": ["Grace Hui Yang", "Pranav N. Venkit", "Hooman Sedghamiz", "Enrico Santus", "Victor Dibia", "Ioana Baldini"], "brief": "\u672c\u6587\u662f\u5173\u4e8e\u5927\u6a21\u578b\u667a\u80fd\u4f53\u4ece\u7814\u7a76\u8d70\u5411\u4ea7\u4e1a\u90e8\u7f72\u7684\u6559\u7a0b\uff0c\u805a\u7126\u63a8\u7406\u89c4\u5212\u3001\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u3001\u8bc4\u4f30\u4ee5\u53ca\u5728\u8f6f\u4ef6\u3001\u79d1\u7814\u3001\u91d1\u878d\u7b49\u573a\u666f\u4e2d\u7684\u843d\u5730\u7ecf\u9a8c\u3002\u5b83\u603b\u7ed3\u4e86\u6210\u529f\u8bbe\u8ba1\u6a21\u5f0f\u4e0e\u5b89\u5168\u53ef\u9760\u90e8\u7f72\u7b56\u7565\uff0c\u5982\u9a8c\u8bc1\u6d41\u6c34\u7ebf\u3001\u56de\u9000\u673a\u5236\u548c\u4eba\u5728\u73af\u76d1\u7763\uff0c\u5bf9\u5b9e\u8df5\u8005\u5177\u6709\u8f83\u5f3a\u53c2\u8003\u4ef7\u503c\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19336", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u667a\u80fd\u4f53", "\u5b89\u5168\u53ef\u9760"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19336v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agents in the Wild: Where Research Meets Deployment", "tldr": "\u672c\u6587\u662f\u5173\u4e8e\u5927\u6a21\u578b\u667a\u80fd\u4f53\u4ece\u7814\u7a76\u8d70\u5411\u4ea7\u4e1a\u90e8\u7f72\u7684\u6559\u7a0b\uff0c\u805a\u7126\u63a8\u7406\u89c4\u5212\u3001\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u3001\u8bc4\u4f30\u4ee5\u53ca\u5728\u8f6f\u4ef6\u3001\u79d1\u7814\u3001\u91d1\u878d\u7b49\u573a\u666f\u4e2d\u7684\u843d\u5730\u7ecf\u9a8c\u3002\u5b83\u603b\u7ed3\u4e86\u6210\u529f\u8bbe\u8ba1\u6a21\u5f0f\u4e0e\u5b89\u5168\u53ef\u9760\u90e8\u7f72\u7b56\u7565\uff0c\u5982\u9a8c\u8bc1\u6d41\u6c34\u7ebf\u3001\u56de\u9000\u673a\u5236\u548c\u4eba\u5728\u73af\u76d1\u7763\uff0c\u5bf9\u5b9e\u8df5\u8005\u5177\u6709\u8f83\u5f3a\u53c2\u8003\u4ef7\u503c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We study a five-agent CI/CD pipeline (triage -\u003e developer -\u003e security-scan -\u003e review -\u003e approve/deploy), built from five distinct production LLMs across three providers, behind an LLM firewall in shadow mode. A single untrusted input - an external issue requesting a \"usage-telemetry\" feature - asks for code that exfiltrates process secrets (dict(os.environ)) to an attacker URL, laundered as observability. Across a pre-registered A x B (x C) factorial (N=20; naive arm N=60) we find: (1) the entry agent does not leak its system prompt (0/40); (2) an authority-framed injection (\"pre-approved under SEC-2291, do not re-review\") makes downstream verifiers see the secret-exfil line, cite the pre-approval, and ship it - the scanner passes ~80% of laundered pull requests, and the worst-case cell reaches 55% compromise; (3) the perceived presence of other verifiers yields only a small, non-significant reduction in individual scrutiny (a weak bystander analogue), even at N=60; and (4) content-based controls - code scanners and pattern detectors alike - miss the laundered intent entirely (the code is syntactically clean); only an LLM reasoning about intent is a partial defence. The failure is systemic: neither prompt secrecy nor distributed verification protects; a provenance-aware control at the entry, independent of both, would have. All data is 100% synthetic; the sink is mocked and the exfil URL is never contacted.", "arxiv_id": "2607.19267", "arxiv_url": "https://arxiv.org/abs/2607.19267", "authors": ["Yohann Sidot"], "brief": "\u8bba\u6587\u7814\u7a76\u4e86\u4e00\u4e2a\u7531\u4e94\u4e2a\u751f\u4ea7\u7ea7 LLM \u7ec4\u6210\u7684\u667a\u80fd\u4f53 CI/CD \u6d41\u6c34\u7ebf\uff0c\u53d1\u73b0\u5916\u90e8 issue \u53ef\u901a\u8fc7\u201c\u6743\u5a01\u9884\u6279\u51c6\u201d\u8bdd\u672f\u548c\u4f2a\u88c5\u6210\u53ef\u89c2\u6d4b\u6027\u7684\u4ee3\u7801\uff0c\u5c06\u73af\u5883\u53d8\u91cf\u6cc4\u9732\u903b\u8f91\u6d17\u767d\u5e76\u63a8\u8fdb\u5230\u90e8\u7f72\u3002\u5b9e\u9a8c\u663e\u793a\u626b\u63cf\u5668\u7ea6 80% \u4f1a\u653e\u884c\u6b64\u7c7b PR\uff0c\u6700\u574f\u60c5\u51b5\u4e0b\u59a5\u534f\u7387\u8fbe 55%\uff1b\u7cfb\u7edf\u63d0\u793a\u4fdd\u5bc6\u548c\u591a\u7ea7\u9a8c\u8bc1\u90fd\u4e0d\u8db3\u4ee5\u9632\u62a4\uff0c\u53ea\u6709\u57fa\u4e8e\u610f\u56fe\u63a8\u7406\u6216\u6765\u6e90\u611f\u77e5\u7684\u5165\u53e3\u63a7\u5236\u6709\u90e8\u5206\u6548\u679c\u3002", "categories": ["cs.CR", "cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19267", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8f6f\u4ef6\u5b89\u5168", "\u63d0\u793a\u6ce8\u5165", "\u4ee3\u7801\u5ba1\u67e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19267v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "They\u0027ll Verify. They Just Won\u0027t Act. How Authority Framing and Laundered Code Turn a Trusted Agentic CI/CD Pipeline Into an Attack Surface", "tldr": "\u8bba\u6587\u7814\u7a76\u4e86\u4e00\u4e2a\u7531\u4e94\u4e2a\u751f\u4ea7\u7ea7 LLM \u7ec4\u6210\u7684\u667a\u80fd\u4f53 CI/CD \u6d41\u6c34\u7ebf\uff0c\u53d1\u73b0\u5916\u90e8 issue \u53ef\u901a\u8fc7\u201c\u6743\u5a01\u9884\u6279\u51c6\u201d\u8bdd\u672f\u548c\u4f2a\u88c5\u6210\u53ef\u89c2\u6d4b\u6027\u7684\u4ee3\u7801\uff0c\u5c06\u73af\u5883\u53d8\u91cf\u6cc4\u9732\u903b\u8f91\u6d17\u767d\u5e76\u63a8\u8fdb\u5230\u90e8\u7f72\u3002\u5b9e\u9a8c\u663e\u793a\u626b\u63cf\u5668\u7ea6 80% \u4f1a\u653e\u884c\u6b64\u7c7b PR\uff0c\u6700\u574f\u60c5\u51b5\u4e0b\u59a5\u534f\u7387\u8fbe 55%\uff1b\u7cfb\u7edf\u63d0\u793a\u4fdd\u5bc6\u548c\u591a\u7ea7\u9a8c\u8bc1\u90fd\u4e0d\u8db3\u4ee5\u9632\u62a4\uff0c\u53ea\u6709\u57fa\u4e8e\u610f\u56fe\u63a8\u7406\u6216\u6765\u6e90\u611f\u77e5\u7684\u5165\u53e3\u63a7\u5236\u6709\u90e8\u5206\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Fraud detection systems must scale with rising transaction volume while remaining explainable and reviewable. We study a layered pipeline on the PaySim dataset that combines a gradient-boosted classifier, graph-derived structural features, an autoencoder-based anomaly signal, TreeSHAP explanations, and a bounded LLM investigation agent applied to cases the classifier scores uncertainly. Before any model comparison, we identify and remove a simulator-specific balance shortcut that would otherwise inflate baseline performance. After this correction, neither the graph features nor the anomaly signal improves Average Precision on the full test set. Both, however, rank fraud better within the subset of cases receiving intermediate baseline scores. In a controlled experiment with injected multi-account fraud rings, engineered structural features recover all injected test transactions, while the tabular baseline misses roughly a quarter of them. The investigation agent underperforms direct thresholding of the classifier it relies on, reaching 65.0% accuracy against 71.7% on a balanced 60-case sample, despite having access to model explanations, graph context, and retrieved reference cases. Of the eight decisions the agent changed, six replaced correct classifier outputs with errors, and it produced a coherent written rationale in each case. An exploratory disagreement-based escalation rule flagged two of these agent errors for human review without flagging any correct decision. We conclude that each component of a layered fraud system contributes only under specific conditions, and that a plausible rationale from an investigation agent is not evidence of a better decision.", "arxiv_id": "2607.19266", "arxiv_url": "https://arxiv.org/abs/2607.19266", "authors": ["Rahil Sharma"], "brief": "\u672c\u6587\u5728 PaySim \u6b3a\u8bc8\u68c0\u6d4b\u4e2d\u6784\u5efa\u4e86\u4e00\u4e2a\u5206\u5c42\u53ef\u5ba1\u8ba1\u6d41\u7a0b\uff0c\u7ed3\u5408\u68af\u5ea6\u63d0\u5347\u6a21\u578b\u3001\u56fe\u7ed3\u6784\u7279\u5f81\u3001\u81ea\u7f16\u7801\u5668\u5f02\u5e38\u4fe1\u53f7\u3001TreeSHAP \u89e3\u91ca\u548c\u53d7\u9650 LLM \u8c03\u67e5\u667a\u80fd\u4f53\uff0c\u5e76\u5148\u79fb\u9664\u4e86\u4f1a\u865a\u9ad8\u6027\u80fd\u7684\u6a21\u62df\u5668\u4f59\u989d\u6377\u5f84\u3002\u7ed3\u679c\u663e\u793a\uff0c\u56fe\u7279\u5f81\u548c\u5f02\u5e38\u4fe1\u53f7\u5bf9\u6574\u4f53\u5e73\u5747\u7cbe\u5ea6\u65e0\u63d0\u5347\uff0c\u4f46\u5728\u4e0d\u786e\u5b9a\u6837\u672c\u548c\u6ce8\u5165\u7684\u591a\u8d26\u6237\u6b3a\u8bc8\u56e2\u4f19\u4e2d\u66f4\u6709\u7528\uff1bLLM \u667a\u80fd\u4f53\u53cd\u800c\u4f4e\u4e8e\u76f4\u63a5\u5206\u7c7b\u9608\u503c\uff0c\u8bf4\u660e\u5408\u7406\u89e3\u91ca\u4e0d\u7b49\u4e8e\u66f4\u597d\u51b3\u7b56\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19266", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u6b3a\u8bc8\u68c0\u6d4b", "\u56fe\u5b66\u4e60", "\u53ef\u89e3\u91ca\u6027", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19266v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Toward Auditable Fraud Detection: Combining Graph Features, Model Explanations, and Agentic Case Investigation", "tldr": "\u672c\u6587\u5728 PaySim \u6b3a\u8bc8\u68c0\u6d4b\u4e2d\u6784\u5efa\u4e86\u4e00\u4e2a\u5206\u5c42\u53ef\u5ba1\u8ba1\u6d41\u7a0b\uff0c\u7ed3\u5408\u68af\u5ea6\u63d0\u5347\u6a21\u578b\u3001\u56fe\u7ed3\u6784\u7279\u5f81\u3001\u81ea\u7f16\u7801\u5668\u5f02\u5e38\u4fe1\u53f7\u3001TreeSHAP \u89e3\u91ca\u548c\u53d7\u9650 LLM \u8c03\u67e5\u667a\u80fd\u4f53\uff0c\u5e76\u5148\u79fb\u9664\u4e86\u4f1a\u865a\u9ad8\u6027\u80fd\u7684\u6a21\u62df\u5668\u4f59\u989d\u6377\u5f84\u3002\u7ed3\u679c\u663e\u793a\uff0c\u56fe\u7279\u5f81\u548c\u5f02\u5e38\u4fe1\u53f7\u5bf9\u6574\u4f53\u5e73\u5747\u7cbe\u5ea6\u65e0\u63d0\u5347\uff0c\u4f46\u5728\u4e0d\u786e\u5b9a\u6837\u672c\u548c\u6ce8\u5165\u7684\u591a\u8d26\u6237\u6b3a\u8bc8\u56e2\u4f19\u4e2d\u66f4\u6709\u7528\uff1bLLM \u667a\u80fd\u4f53\u53cd\u800c\u4f4e\u4e8e\u76f4\u63a5\u5206\u7c7b\u9608\u503c\uff0c\u8bf4\u660e\u5408\u7406\u89e3\u91ca\u4e0d\u7b49\u4e8e\u66f4\u597d\u51b3\u7b56\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The report envisions a decade in which drones move goods, medical supplies, and information at a scale comparable to national infrastructure investments like highways and the electric grid. Potential applications include natural disaster detection drones that spot wildfire sources within minutes, medical supply chains that bypass ground congestion to reach rural hospitals, and nationwide fleets that continuously inspect bridges and power lines. Realizing this future, however, requires closing what report authors call a \"capability gap,\" where hardware and aspirations are outpacing the software and systems needed to operate safely at scale. The report identifies twelve technical challenges that must be addressed to realize the transformative potential of drone technology: Scaling to millions of drones; AI intelligence and assurance; Edge-cloud continuum and real-time coordination; AI autonomy and agentic systems; Data, training, and validation infrastructure; Critical infrastructure protection; Building reliable fleets from non-deterministic agents; Trust, security, and distributed authentication; Next-generation drone networks; Human-AI partnership and scalable insight; Standards, certification, and regulation; and Workforce development and education. These twelve challenges and proposed approaches to them form the basis of the report, laying out a multifaceted path forward for the evolution of done technology.", "arxiv_id": "2607.19213", "arxiv_url": "https://arxiv.org/abs/2607.19213", "authors": ["Kevin Butler", "Christopher Stewart", "Nils Aschenbruck", "Alina Gerall", "Weisong Shi", "Deborah Silver", "Ufuk Topcu"], "brief": "\u8fd9\u662f\u4e00\u4efd\u9762\u5411\u672a\u6765\u5341\u5e74\u65e0\u4eba\u673a\u8ba1\u7b97\u7684\u613f\u666f\u62a5\u544a\uff0c\u63cf\u7ed8\u65e0\u4eba\u673a\u5728\u7269\u6d41\u3001\u533b\u7597\u3001\u707e\u5bb3\u76d1\u6d4b\u548c\u57fa\u7840\u8bbe\u65bd\u5de1\u68c0\u4e2d\u8fbe\u5230\u56fd\u5bb6\u7ea7\u89c4\u6a21\u5e94\u7528\u7684\u53ef\u80fd\u6027\u3002\u62a5\u544a\u6307\u51fa\u5f53\u524d\u786c\u4ef6\u53d1\u5c55\u5feb\u4e8e\u8f6f\u4ef6\u4e0e\u7cfb\u7edf\u80fd\u529b\uff0c\u63d0\u51fa\u89c4\u6a21\u5316\u8c03\u5ea6\u3001AI\u81ea\u6cbb\u3001\u8fb9\u4e91\u534f\u540c\u3001\u5b89\u5168\u53ef\u4fe1\u3001\u6807\u51c6\u76d1\u7ba1\u7b49\u5341\u4e8c\u9879\u5173\u952e\u6311\u6218\u4e0e\u53d1\u5c55\u8def\u5f84\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19213", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u65e0\u4eba\u673a", "\u667a\u80fd\u4f53", "\u8fb9\u7f18\u8ba1\u7b97", "\u53ef\u4fe1\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19213v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Computing on the Fly: Navigating a Vision for the Future of Drone Computing", "tldr": "\u8fd9\u662f\u4e00\u4efd\u9762\u5411\u672a\u6765\u5341\u5e74\u65e0\u4eba\u673a\u8ba1\u7b97\u7684\u613f\u666f\u62a5\u544a\uff0c\u63cf\u7ed8\u65e0\u4eba\u673a\u5728\u7269\u6d41\u3001\u533b\u7597\u3001\u707e\u5bb3\u76d1\u6d4b\u548c\u57fa\u7840\u8bbe\u65bd\u5de1\u68c0\u4e2d\u8fbe\u5230\u56fd\u5bb6\u7ea7\u89c4\u6a21\u5e94\u7528\u7684\u53ef\u80fd\u6027\u3002\u62a5\u544a\u6307\u51fa\u5f53\u524d\u786c\u4ef6\u53d1\u5c55\u5feb\u4e8e\u8f6f\u4ef6\u4e0e\u7cfb\u7edf\u80fd\u529b\uff0c\u63d0\u51fa\u89c4\u6a21\u5316\u8c03\u5ea6\u3001AI\u81ea\u6cbb\u3001\u8fb9\u4e91\u534f\u540c\u3001\u5b89\u5168\u53ef\u4fe1\u3001\u6807\u51c6\u76d1\u7ba1\u7b49\u5341\u4e8c\u9879\u5173\u952e\u6311\u6218\u4e0e\u53d1\u5c55\u8def\u5f84\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Real-to-sim conversion for robotic interaction with objects remains labor-intensive because it requires more than visual reconstruction: a streamlined real2sim process must recover scene geometries and object states, infer physical parameters, and assemble actors, objects, cameras, poses, and trajectories into a runnable physical simulation. Today this process still depends on manual tuning of visual foundation models, mesh cleanup, coordinate-frame alignment, and brittle workflow glue across visual perception tools and simulators. We introduce \\textit{Agentic Real2Sim}, a framework for generalized physical world modeling with vision-language agents, converting a real-world recording of object-robot interaction into a simulatable episodic twin which preserves observations, geometries, robot interactions, and object states. We evaluate Agentic Real2Sim on rigid-object manipulation, deformable-object interaction, and humanoid motion scenes, spanning domains that are usually handled by separate Real2Sim pipelines, marking a first step toward scalable conversion. The framework\u0027s agentic decisions can be driven by an open-weight VLM backend at a small fraction of the cost of frontier models, while attaining comparable conversion success rate. We aim to use the resulting real-world-aligned twins for downstream robotics tasks, specifically policy learning and evaluation. The project site is available at https://ericchen321.github.io/agentic_real2sim.github.io/.", "arxiv_id": "2607.19190", "arxiv_url": "https://arxiv.org/abs/2607.19190", "authors": ["Guanxiong Chen", "Qianjun Xia", "Jiawei Peng", "Heng Zhang", "Bole Ma", "Justin Qian", "Ziyi Jiao", "Bingyang Zhou", "Luoxin Ye", "Kaifeng Zhang", "Kunyi Wang", "Weijia Zeng", "Yunuo Chen", "Pengzhi Yang", "Ziqiu Zeng", "Huamin Wang", "Chao Liu", "Alan Yuille", "Fan Shi", "Changxi Zheng", "Yunzhu Li", "Chenfanfu Jiang", "Peter Yichen Chen"], "brief": "\u672c\u6587\u63d0\u51fa Agentic Real2Sim\uff0c\u7528\u89c6\u89c9\u8bed\u8a00\u667a\u80fd\u4f53\u5c06\u771f\u5b9e\u7684\u673a\u5668\u4eba/\u7269\u4f53\u4ea4\u4e92\u5f55\u50cf\u81ea\u52a8\u8f6c\u6362\u4e3a\u53ef\u8fd0\u884c\u7684\u7269\u7406\u4eff\u771f\u5b6a\u751f\u4f53\uff0c\u8986\u76d6\u51e0\u4f55\u3001\u7269\u4f53\u72b6\u6001\u3001\u7269\u7406\u53c2\u6570\u3001\u76f8\u673a\u4f4d\u59ff\u4e0e\u8f68\u8ff9\u7b49\u8981\u7d20\u3002\u8be5\u6846\u67b6\u5728\u521a\u4f53\u64cd\u4f5c\u3001\u67d4\u6027\u7269\u4f53\u4ea4\u4e92\u548c\u7c7b\u4eba\u8fd0\u52a8\u573a\u666f\u4e2d\u9a8c\u8bc1\u4e86\u901a\u7528\u6027\uff0c\u5e76\u53ef\u7528\u5f00\u6e90 VLM \u4ee5\u8f83\u4f4e\u6210\u672c\u8fbe\u5230\u63a5\u8fd1\u524d\u6cbf\u6a21\u578b\u7684\u8f6c\u6362\u6210\u529f\u7387\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19190", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u673a\u5668\u4eba", "\u4e16\u754c\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19190v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agentic Real2Sim: Physics-based World Modeling with Vision-Language Agents", "tldr": "\u672c\u6587\u63d0\u51fa Agentic Real2Sim\uff0c\u7528\u89c6\u89c9\u8bed\u8a00\u667a\u80fd\u4f53\u5c06\u771f\u5b9e\u7684\u673a\u5668\u4eba/\u7269\u4f53\u4ea4\u4e92\u5f55\u50cf\u81ea\u52a8\u8f6c\u6362\u4e3a\u53ef\u8fd0\u884c\u7684\u7269\u7406\u4eff\u771f\u5b6a\u751f\u4f53\uff0c\u8986\u76d6\u51e0\u4f55\u3001\u7269\u4f53\u72b6\u6001\u3001\u7269\u7406\u53c2\u6570\u3001\u76f8\u673a\u4f4d\u59ff\u4e0e\u8f68\u8ff9\u7b49\u8981\u7d20\u3002\u8be5\u6846\u67b6\u5728\u521a\u4f53\u64cd\u4f5c\u3001\u67d4\u6027\u7269\u4f53\u4ea4\u4e92\u548c\u7c7b\u4eba\u8fd0\u52a8\u573a\u666f\u4e2d\u9a8c\u8bc1\u4e86\u901a\u7528\u6027\uff0c\u5e76\u53ef\u7528\u5f00\u6e90 VLM \u4ee5\u8f83\u4f4e\u6210\u672c\u8fbe\u5230\u63a5\u8fd1\u524d\u6cbf\u6a21\u578b\u7684\u8f6c\u6362\u6210\u529f\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Translating novels into films poses a grand challenge for generative artificial intelligence, requiring conversion of abstract literary prose into long-form, multi-scene visual narratives. While current video generation models excel at short, single-scene clips within narrow temporal and spatial contexts, novel-to-film generation operates in a more complex regime, demanding long-duration content across diverse scenes with dynamically evolving entity states. To address this, we formalize novel-to-film generation as dynamic cinematic world modeling, decomposed into two phases: construction, which grounds abstract, underspecified literary narratives into concrete, stateful, and persistent world entities; and evolution, which governs how these entities dynamically update under plot progression to maintain causal consistency across scenes. We propose FilmWorld, an end-to-end agentic system where two groups of specialized agents collaborate to instantiate these phases. Construction-side agents perform narrative structured translation, world entity state modeling with visual anchoring, and state-driven shot planning, progressively projecting literary language into a cinematic blueprint. Evolution-side agents perform state-anchored visual generation, cross-shot dynamic state propagation, and closed-loop state verification to maintain causal consistency and visual coherence. To address the evaluation gap in long-form generation, we introduce FilmEval, a systematic evaluation framework that couples a difficulty-graded benchmark of 15 representative novels with an automated protocol of nine objective metrics spanning three dimensions: cinematic presentation, film consistency, and novel fidelity. Experiments demonstrate that FilmWorld consistently outperforms state-of-the-art video generation agent systems, with particularly pronounced improvements in narrative fidelity and cross-scene consistency.", "arxiv_id": "2607.19038", "arxiv_url": "https://arxiv.org/abs/2607.19038", "authors": ["Jialong Zuo", "Haotong Zuo", "Shiwei Zhang", "Xiang Wang", "Chen Li", "Nong Sang", "Changxin Gao", "Xiang Bai"], "brief": "\u8bba\u6587\u5c06\u5c0f\u8bf4\u5230\u7535\u5f71\u751f\u6210\u5f62\u5f0f\u5316\u4e3a\u52a8\u6001\u7535\u5f71\u4e16\u754c\u5efa\u6a21\uff0c\u63d0\u51fa FilmWorld \u7aef\u5230\u7aef\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u901a\u8fc7\u6784\u5efa\u4e0e\u6f14\u5316\u4e24\u7ec4\u4e13\u95e8\u667a\u80fd\u4f53\uff0c\u628a\u6587\u5b66\u53d9\u4e8b\u8f6c\u4e3a\u5e26\u72b6\u6001\u7684\u7535\u5f71\u84dd\u56fe\u5e76\u751f\u6210\u8de8\u955c\u5934\u4e00\u81f4\u7684\u89c6\u9891\u5185\u5bb9\u3002\u4f5c\u8005\u8fd8\u63d0\u51fa FilmEval \u957f\u7bc7\u751f\u6210\u8bc4\u6d4b\u6846\u67b6\uff0c\u5b9e\u9a8c\u663e\u793a\u5176\u76f8\u6bd4\u73b0\u6709\u89c6\u9891\u751f\u6210\u667a\u80fd\u4f53\u5728\u53d9\u4e8b\u5fe0\u5b9e\u5ea6\u548c\u8de8\u573a\u666f\u4e00\u81f4\u6027\u4e0a\u63d0\u5347\u660e\u663e\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19038", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u89c6\u9891\u751f\u6210", "\u4e16\u754c\u6a21\u578b", "\u957f\u7bc7\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19038v1", "published_at": "2026-07-21", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "FilmWorld: Agentic Novel-to-Film Generation through Dynamic Cinematic World Modeling", "tldr": "\u8bba\u6587\u5c06\u5c0f\u8bf4\u5230\u7535\u5f71\u751f\u6210\u5f62\u5f0f\u5316\u4e3a\u52a8\u6001\u7535\u5f71\u4e16\u754c\u5efa\u6a21\uff0c\u63d0\u51fa FilmWorld \u7aef\u5230\u7aef\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u901a\u8fc7\u6784\u5efa\u4e0e\u6f14\u5316\u4e24\u7ec4\u4e13\u95e8\u667a\u80fd\u4f53\uff0c\u628a\u6587\u5b66\u53d9\u4e8b\u8f6c\u4e3a\u5e26\u72b6\u6001\u7684\u7535\u5f71\u84dd\u56fe\u5e76\u751f\u6210\u8de8\u955c\u5934\u4e00\u81f4\u7684\u89c6\u9891\u5185\u5bb9\u3002\u4f5c\u8005\u8fd8\u63d0\u51fa FilmEval \u957f\u7bc7\u751f\u6210\u8bc4\u6d4b\u6846\u67b6\uff0c\u5b9e\u9a8c\u663e\u793a\u5176\u76f8\u6bd4\u73b0\u6709\u89c6\u9891\u751f\u6210\u667a\u80fd\u4f53\u5728\u53d9\u4e8b\u5fe0\u5b9e\u5ea6\u548c\u8de8\u573a\u666f\u4e00\u81f4\u6027\u4e0a\u63d0\u5347\u660e\u663e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Video models absorb rich priors over how the visual world moves, interacts, and responds to contact, making them promising substrates for robotic world modeling. The central challenge is how to communicate action to such models in a form aligned with the visual space in which they learned these interaction priors, yet still grounded in physical manipulation. We introduce Masked Visual Actions, a pixel-space control interface that expresses action as a partially revealed trajectory of an arbitrary entity in a video. Revealing robot motion makes the model act as a forward dynamics model that predicts the scene\u0027s response to low-level robot actions, while revealing desired object motion makes the same model recover robot behavior consistent with that outcome. Finetuned with only 15 hours of masked examples from real videos and simulation, a single checkpoint achieves strong visual fidelity and controllability across diverse scenes and multiple embodiments. In downstream manipulation settings, the model produces imagined rollouts whose outcomes correlate with real-world execution for policy evaluation, improves decision making by ranking candidate futures in model-based planning, and supports inverse modeling by synthesizing robot motion from desired object motion.", "arxiv_id": "2607.19343", "arxiv_url": "https://arxiv.org/abs/2607.19343", "authors": ["Hadi Alzayer", "Wenlong Huang", "Haonan Chen", "Christopher Luey", "Lvmin Zhang", "Maneesh Agrawala", "Gordon Wetzstein", "Li Fei-Fei", "Yilun Du", "Jiajun Wu", "Jia-Bin Huang"], "brief": "\u8bba\u6587\u63d0\u51fa Masked Visual Actions\uff0c\u7528\u50cf\u7d20\u7a7a\u95f4\u4e2d\u201c\u90e8\u5206\u63ed\u793a\u7684\u8f68\u8ff9\u201d\u6765\u5411\u89c6\u9891\u6a21\u578b\u8868\u8fbe\u52a8\u4f5c\uff0c\u4f7f\u5176\u65e2\u80fd\u9884\u6d4b\u673a\u5668\u4eba\u52a8\u4f5c\u5bfc\u81f4\u7684\u573a\u666f\u53d8\u5316\uff0c\u4e5f\u80fd\u4ece\u671f\u671b\u7269\u4f53\u8fd0\u52a8\u53cd\u63a8\u673a\u5668\u4eba\u884c\u4e3a\u3002\u4ec5\u752815\u5c0f\u65f6\u771f\u5b9e\u4e0e\u4eff\u771f\u89c6\u9891\u5fae\u8c03\u540e\uff0c\u5355\u4e00\u6a21\u578b\u5728\u591a\u573a\u666f\u3001\u591a\u673a\u5668\u4eba\u5f62\u6001\u4e0b\u5177\u5907\u8f83\u597d\u89c6\u89c9\u4fdd\u771f\u5ea6\u548c\u53ef\u63a7\u6027\uff0c\u5e76\u53ef\u7528\u4e8e\u7b56\u7565\u8bc4\u4f30\u3001\u6a21\u578b\u89c4\u5212\u548c\u9006\u5411\u5efa\u6a21\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": "https://github.com/HadiZayer/masked-visual-actions", "github_stars": 1, "hf_url": "https://huggingface.co/papers/2607.19343", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u673a\u5668\u4eba", "\u89c6\u9891\u6a21\u578b", "\u6a21\u578b\u89c4\u5212"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19343v1", "published_at": "2026-07-21", "score": 0.006, "selected_reasons": ["HF trending (0\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.19343.png", "title": "Masked Visual Actions for Unified World Modeling", "tldr": "\u8bba\u6587\u63d0\u51fa Masked Visual Actions\uff0c\u7528\u50cf\u7d20\u7a7a\u95f4\u4e2d\u201c\u90e8\u5206\u63ed\u793a\u7684\u8f68\u8ff9\u201d\u6765\u5411\u89c6\u9891\u6a21\u578b\u8868\u8fbe\u52a8\u4f5c\uff0c\u4f7f\u5176\u65e2\u80fd\u9884\u6d4b\u673a\u5668\u4eba\u52a8\u4f5c\u5bfc\u81f4\u7684\u573a\u666f\u53d8\u5316\uff0c\u4e5f\u80fd\u4ece\u671f\u671b\u7269\u4f53\u8fd0\u52a8\u53cd\u63a8\u673a\u5668\u4eba\u884c\u4e3a\u3002\u4ec5\u752815\u5c0f\u65f6\u771f\u5b9e\u4e0e\u4eff\u771f\u89c6\u9891\u5fae\u8c03\u540e\uff0c\u5355\u4e00\u6a21\u578b\u5728\u591a\u573a\u666f\u3001\u591a\u673a\u5668\u4eba\u5f62\u6001\u4e0b\u5177\u5907\u8f83\u597d\u89c6\u89c9\u4fdd\u771f\u5ea6\u548c\u53ef\u63a7\u6027\uff0c\u5e76\u53ef\u7528\u4e8e\u7b56\u7565\u8bc4\u4f30\u3001\u6a21\u578b\u89c4\u5212\u548c\u9006\u5411\u5efa\u6a21\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Video spatial reasoning is essential for navigation-oriented perception and long-video question answering, where models must infer spatial relations across long horizons under changing viewpoints. However, existing multimodal large language models (MLLMs) remain largely semantic-centric, and often fail to reliably aggregate consistent spatial evidence from redundant video observations, leading to inefficient or unstable reasoning. To address these issues, we propose ConsiSpace, a geometry-consistency-aware framework for geometry-sensitive video spatial reasoning that turns spatial consistency into both an evidence organization principle and an explicit post-SFT learning signal. We build a geometry-consistent memory (GCM) including implicit evidence tokens and explicit geometric cues, and leverage efficient organization strategies to compactly preserve task-related spatial evidence. Furthermore, we utilize unified consistency self-supervised reinforcement learning (UC-SSRL) after supervised fine-tuning to improve cross-view stability, with answer-, metric-, and topology-consistency rewards. Extensive experiments on three spatial-reasoning benchmarks, VSI-Bench, OSI-Bench, and MMSI-Video-Bench, show consistent gains, improving the average score by 12.6 points over the strongest baselines.", "arxiv_id": "2607.17599", "arxiv_url": "https://arxiv.org/abs/2607.17599", "authors": ["Ting Huang", "Zhenyu Zhang", "Wenyuan Huang", "Jian Yang", "Hao Tang"], "brief": "ConsiSpace \u9762\u5411\u89c6\u9891\u7a7a\u95f4\u63a8\u7406\uff0c\u5f15\u5165\u51e0\u4f55\u4e00\u81f4\u6027\u8bb0\u5fc6\u6765\u7ec4\u7ec7\u8de8\u89c6\u89d2\u3001\u957f\u65f6\u5e8f\u7684\u7a7a\u95f4\u8bc1\u636e\uff0c\u5e76\u5728\u76d1\u7763\u5fae\u8c03\u540e\u7528\u4e00\u81f4\u6027\u81ea\u76d1\u7763\u5f3a\u5316\u5b66\u4e60\u63d0\u5347\u63a8\u7406\u7a33\u5b9a\u6027\u3002\u8be5\u65b9\u6cd5\u5728 VSI-Bench\u3001OSI-Bench \u548c MMSI-Video-Bench \u4e0a\u76f8\u5bf9\u6700\u5f3a\u57fa\u7ebf\u5e73\u5747\u63d0\u5347 12.6 \u5206\uff0c\u663e\u8457\u6539\u5584\u591a\u6a21\u6001\u6a21\u578b\u7684\u51e0\u4f55\u654f\u611f\u89c6\u9891\u7406\u89e3\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.17599", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u7a7a\u95f4\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.17599v1", "published_at": "2026-07-20", "score": 0.005, "selected_reasons": ["HF trending (0\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.17599.png", "title": "ConsiSpace: Learning Geometric Consistency Matters for Video Spatial Reasoning", "tldr": "ConsiSpace \u9762\u5411\u89c6\u9891\u7a7a\u95f4\u63a8\u7406\uff0c\u5f15\u5165\u51e0\u4f55\u4e00\u81f4\u6027\u8bb0\u5fc6\u6765\u7ec4\u7ec7\u8de8\u89c6\u89d2\u3001\u957f\u65f6\u5e8f\u7684\u7a7a\u95f4\u8bc1\u636e\uff0c\u5e76\u5728\u76d1\u7763\u5fae\u8c03\u540e\u7528\u4e00\u81f4\u6027\u81ea\u76d1\u7763\u5f3a\u5316\u5b66\u4e60\u63d0\u5347\u63a8\u7406\u7a33\u5b9a\u6027\u3002\u8be5\u65b9\u6cd5\u5728 VSI-Bench\u3001OSI-Bench \u548c MMSI-Video-Bench \u4e0a\u76f8\u5bf9\u6700\u5f3a\u57fa\u7ebf\u5e73\u5747\u63d0\u5347 12.6 \u5206\uff0c\u663e\u8457\u6539\u5584\u591a\u6a21\u6001\u6a21\u578b\u7684\u51e0\u4f55\u654f\u611f\u89c6\u9891\u7406\u89e3\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Controllable image generation remains challenging for creative professionals, who often require precise regional control over materials, object identities, and spatial arrangements that cannot be reliably achieved through text prompting alone. Diffusion Transformers (DiTs) can natively ingest heterogeneous tokens stemming from texts and images, but they lack mechanisms for determining where and how these tokens should influence the output. We introduce appearance pointers, compact tokens that guide DiTs toward the correct appearance cues at the correct spatial locations by aligning text or image inputs with user-specified masks. Appearance pointers are produced by a region correspondence network and refined through a spatial aggregation mechanism, enabling the model to handle multiple regional descriptions without significantly increasing token load. Our approach introduces the first modality-agnostic interface for localized multimodal control in a DiT without retraining the base model from scratch. Across a range of metrics, our single model reaches or surpasses the performance of modality-specific state of the art methods, offering a simple and extensible path toward precise, region-aware, multimodal guidance in generative image synthesis.", "arxiv_id": "2607.19344", "arxiv_url": "https://arxiv.org/abs/2607.19344", "authors": ["Rahul Sajnani", "Yulia Gryaditskaya", "Radom\u00edr M\u011bch", "Srinath Sridhar", "Matheus Gadelha"], "brief": "\u8bba\u6587\u63d0\u51fa Appearance Pointers\uff0c\u7528\u7d27\u51d1\u6307\u9488 token \u5c06\u6587\u672c\u6216\u56fe\u50cf\u6761\u4ef6\u4e0e\u7528\u6237\u6307\u5b9a\u533a\u57df\u63a9\u7801\u5bf9\u9f50\uff0c\u4ece\u800c\u5728 Diffusion Transformer \u4e2d\u5b9e\u73b0\u6750\u6599\u3001\u8eab\u4efd\u548c\u7a7a\u95f4\u5e03\u5c40\u7684\u7cbe\u786e\u5c40\u90e8\u63a7\u5236\u3002\u8be5\u65b9\u6cd5\u65e0\u9700\u4ece\u5934\u91cd\u8bad\u57fa\u7840\u6a21\u578b\uff0c\u5355\u4e00\u6a21\u578b\u5728\u591a\u9879\u6307\u6807\u4e0a\u8fbe\u5230\u6216\u8d85\u8fc7\u7279\u5b9a\u6a21\u6001\u7684\u73b0\u6709\u65b9\u6cd5\u3002", "categories": ["cs.CV", "cs.AI", "cs.GR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19344", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u591a\u6a21\u6001", "\u53ef\u63a7\u751f\u6210", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19344v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.19344.png", "title": "Appearance Pointers -- Multimodal Region Control of Diffusion Transformers", "tldr": "\u8bba\u6587\u63d0\u51fa Appearance Pointers\uff0c\u7528\u7d27\u51d1\u6307\u9488 token \u5c06\u6587\u672c\u6216\u56fe\u50cf\u6761\u4ef6\u4e0e\u7528\u6237\u6307\u5b9a\u533a\u57df\u63a9\u7801\u5bf9\u9f50\uff0c\u4ece\u800c\u5728 Diffusion Transformer \u4e2d\u5b9e\u73b0\u6750\u6599\u3001\u8eab\u4efd\u548c\u7a7a\u95f4\u5e03\u5c40\u7684\u7cbe\u786e\u5c40\u90e8\u63a7\u5236\u3002\u8be5\u65b9\u6cd5\u65e0\u9700\u4ece\u5934\u91cd\u8bad\u57fa\u7840\u6a21\u578b\uff0c\u5355\u4e00\u6a21\u578b\u5728\u591a\u9879\u6307\u6807\u4e0a\u8fbe\u5230\u6216\u8d85\u8fc7\u7279\u5b9a\u6a21\u6001\u7684\u73b0\u6709\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present ABot-World-0, an action-conditioned video world model for real-time, long-horizon closed-loop interaction, supported by a multi-source data infrastructure spanning AAA games, simulation engines, and internet videos to learn controllable world dynamics. WorldExplorer performs agent-driven collection guided by training feedback, while a unified pipeline applies 14 deterministic quality checks, VLM-based assessment, and synchronized action and text annotation. We progressively distill a bidirectional action-conditioned teacher into a causal student through teacher forcing and ODE distillation, and introduce LongForcing to align long student self-rollouts with an extended-horizon teacher, mitigating accumulated distribution shift and autoregressive drift. Raw keyboard actions provide a unified control interface for scene roaming and third-person character interaction, while reference-character memory provides persistent appearance cues for identity consistency during third-person rollouts. For deployment, we co-design a streaming inference stack with a lightweight VAE decoder, efficient attention, memory-aware scheduling, and low-bit DiT inference. Across optimized low-bit configurations, ABot-World-0 streams 720P video at up to 16 FPS on a single NVIDIA RTX 5090 desktop GPU, with 1.2s action-to-first-frame latency and approximately 19GiB peak VRAM. Experiments on WorldRoamBench and extended interactive rollouts demonstrate competitive controllability and coherent long-horizon world evolution.", "arxiv_id": "2607.19191", "arxiv_url": "https://arxiv.org/abs/2607.19191", "authors": ["Fan Jiang", "Zhaoxu Sun", "Mengchao Wang", "Ziyu Zhu", "Chiyu Wang", "Yunpeng Zhang", "Wenlin Liu", "Yun Wang", "Xue Zheng", "Rui Sun", "Junfeng Ni", "Hongyu Pan", "Zhongxu Sun", "Fei Yu", "Zengye Ge", "Mengmeng Du", "Nianfei Fan", "Mingchao Sun", "Yu Liu", "Yongchang", "Yanqing Zhu", "Jiahang Wang", "Ning Ying", "Yuze Xuan", "Di Yang", "Zhicheng Liu", "Zhe Gao", "Tingbing Xu", "Jiacheng Sui", "Wenjin Yang", "Junnan Lai", "Shufeng Liu", "Yuan Liu", "Zheng Zhou", "Yingliang Peng", "Dawei Cao", "Kaifeng Sheng", "Yuxiang Cai", "Fei Lu", "Mu Xu", "Ning Guo"], "brief": "ABot-World-0 \u662f\u4e00\u4e2a\u52a8\u4f5c\u6761\u4ef6\u89c6\u9891\u4e16\u754c\u6a21\u578b\uff0c\u53ef\u5728\u5355\u5f20\u684c\u9762 GPU \u4e0a\u8fdb\u884c\u5b9e\u65f6\u3001\u957f\u65f6\u7a0b\u95ed\u73af\u4ea4\u4e92\u5f0f\u4e16\u754c\u751f\u6210\u3002\u8bba\u6587\u901a\u8fc7\u591a\u6e90\u6570\u636e\u91c7\u96c6\u3001\u6559\u5e08\u5230\u56e0\u679c\u5b66\u751f\u84b8\u998f\u3001LongForcing \u957f\u7a0b\u5bf9\u9f50\u548c\u4f4e\u6bd4\u7279\u6d41\u5f0f\u63a8\u7406\uff0c\u5b9e\u73b0\u4e86 720P \u6700\u9ad8 16 FPS\u3001\u7ea6 19GiB \u663e\u5b58\u7684\u4ea4\u4e92\u5f0f\u89c6\u9891 rollout\uff0c\u5e76\u4fdd\u6301\u8f83\u597d\u7684\u53ef\u63a7\u6027\u548c\u957f\u7a0b\u4e00\u81f4\u6027\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19191", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u4ea4\u4e92\u5f0f\u4eff\u771f", "\u6a21\u578b\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19191v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ABot-World-0: Infinite Interactive World Rollout on a Single Desktop GPU", "tldr": "ABot-World-0 \u662f\u4e00\u4e2a\u52a8\u4f5c\u6761\u4ef6\u89c6\u9891\u4e16\u754c\u6a21\u578b\uff0c\u53ef\u5728\u5355\u5f20\u684c\u9762 GPU \u4e0a\u8fdb\u884c\u5b9e\u65f6\u3001\u957f\u65f6\u7a0b\u95ed\u73af\u4ea4\u4e92\u5f0f\u4e16\u754c\u751f\u6210\u3002\u8bba\u6587\u901a\u8fc7\u591a\u6e90\u6570\u636e\u91c7\u96c6\u3001\u6559\u5e08\u5230\u56e0\u679c\u5b66\u751f\u84b8\u998f\u3001LongForcing \u957f\u7a0b\u5bf9\u9f50\u548c\u4f4e\u6bd4\u7279\u6d41\u5f0f\u63a8\u7406\uff0c\u5b9e\u73b0\u4e86 720P \u6700\u9ad8 16 FPS\u3001\u7ea6 19GiB \u663e\u5b58\u7684\u4ea4\u4e92\u5f0f\u89c6\u9891 rollout\uff0c\u5e76\u4fdd\u6301\u8f83\u597d\u7684\u53ef\u63a7\u6027\u548c\u957f\u7a0b\u4e00\u81f4\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) excel at general-purpose code generation, yet how well they handle scientific code remains an open question. Existing datasets and benchmarks are limited in scale, domain coverage, or executable verification, leaving the true gap between current LLMs and reliable scientific code generators inadequately assessed. To address these limitations, we present SciCodePile, the largest scientific code corpus to date, constructed from 37,737 public repositories and collectively comprising 128GB of code that spans multiple computational science disciplines. From this corpus, we further curate an executable benchmark of 200 tasks, each equipped with a sandboxed execution environment and an automated test harness for functional verification. We evaluate 15 LLMs from both open-source and closed-source families on three tasks: prefix-to-suffix completion, fill-in-the-middle infilling, and executable code generation. Results show that scientific code generation remains highly challenging: The best CodeBLEU reaches only 38.13 and 38.37 on the two completion tasks, while the strongest model achieves just 12.30\\% Pass@1 on the executable benchmark, underscoring how far current models remain from reliable scientific code generation. To demonstrate the training utility of SciCodePile, we further show that continued pretraining on our corpus improves CodeBLEU by $\\times$2.84 on scientific code completion, and instruction tuning on our data improves Pass@1 by $\\times$4.79 on the executable benchmark. All code and data are available at https://huggingface.co/SciCodePile.", "arxiv_id": "2607.19104", "arxiv_url": "https://arxiv.org/abs/2607.19104", "authors": ["Weifeng Sun", "Ye Fan", "Yuchen Chen", "Gou Tan", "Jieke Shi", "Yuan Yidi", "Swee Liang Wong", "Jonathan Pan", "David Lo"], "brief": "\u8bba\u6587\u63d0\u51fa SciCodePile\uff0c\u4e00\u4e2a\u6765\u81ea 37737 \u4e2a\u516c\u5f00\u4ed3\u5e93\u3001\u89c4\u6a21\u8fbe 128GB \u7684\u79d1\u5b66\u4ee3\u7801\u8bed\u6599\u5e93\uff0c\u5e76\u6784\u5efa\u4e86\u5305\u542b 200 \u4e2a\u53ef\u6267\u884c\u4efb\u52a1\u7684\u81ea\u52a8\u5316\u9a8c\u8bc1\u57fa\u51c6\u3002\u5bf9 15 \u4e2a\u5f00\u95ed\u6e90\u5927\u6a21\u578b\u8bc4\u6d4b\u53d1\u73b0\uff0c\u5f53\u524d\u6a21\u578b\u5728\u79d1\u5b66\u4ee3\u7801\u751f\u6210\u4e0a\u4ecd\u5f88\u5f31\uff0c\u6700\u4f73\u53ef\u6267\u884c Pass@1 \u4ec5 12.30%\uff1b\u4f46\u7528\u8be5\u8bed\u6599\u7ee7\u7eed\u9884\u8bad\u7ec3\u548c\u6307\u4ee4\u5fae\u8c03\u53ef\u5206\u522b\u663e\u8457\u63d0\u5347\u4ee3\u7801\u8865\u5168\u548c\u53ef\u6267\u884c\u751f\u6210\u6548\u679c\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19104", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u5927\u8bed\u8a00\u6a21\u578b", "\u79d1\u5b66\u8ba1\u7b97", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19104v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SciCodePile: A 128GB Corpus and Executable Benchmark for Challenging Scientific Code Generation", "tldr": "\u8bba\u6587\u63d0\u51fa SciCodePile\uff0c\u4e00\u4e2a\u6765\u81ea 37737 \u4e2a\u516c\u5f00\u4ed3\u5e93\u3001\u89c4\u6a21\u8fbe 128GB \u7684\u79d1\u5b66\u4ee3\u7801\u8bed\u6599\u5e93\uff0c\u5e76\u6784\u5efa\u4e86\u5305\u542b 200 \u4e2a\u53ef\u6267\u884c\u4efb\u52a1\u7684\u81ea\u52a8\u5316\u9a8c\u8bc1\u57fa\u51c6\u3002\u5bf9 15 \u4e2a\u5f00\u95ed\u6e90\u5927\u6a21\u578b\u8bc4\u6d4b\u53d1\u73b0\uff0c\u5f53\u524d\u6a21\u578b\u5728\u79d1\u5b66\u4ee3\u7801\u751f\u6210\u4e0a\u4ecd\u5f88\u5f31\uff0c\u6700\u4f73\u53ef\u6267\u884c Pass@1 \u4ec5 12.30%\uff1b\u4f46\u7528\u8be5\u8bed\u6599\u7ee7\u7eed\u9884\u8bad\u7ec3\u548c\u6307\u4ee4\u5fae\u8c03\u53ef\u5206\u522b\u663e\u8457\u63d0\u5347\u4ee3\u7801\u8865\u5168\u548c\u53ef\u6267\u884c\u751f\u6210\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Optimizer state is the largest single line item in the memory budget of mixture-of-experts (MoE) training: on a 6.78B-parameter MoE language model, AdamW keeps 50.6 GB of first and second moments to update 12.6 GB of bfloat16 weights. We study SkewAdam, an optimizer built on the observation that the three parameter populations of an MoE - the dense backbone, the experts, and the router - differ enough in size and gradient statistics that they should not receive the same state. SkewAdam keeps float32 momentum plus a factored second moment for the backbone (5% of parameters), a factored second moment alone for the experts (95%), and an exact second moment for the router (\u003c0.01%). The resulting state occupies 1.29 GB, 2.6% of AdamW\u0027s, and peak training memory falls from 81.4 GB to 31.3 GB, within the budget of a 40 GB accelerator. In a controlled comparison from identical initializations over 82M tokens, SkewAdam reaches validation perplexity 108.4, ahead of AdamW (126.8), Muon (120.2), and Lion (393.7), and settles router load balance to within 1% of its uniform floor. The allocation is not what earns that perplexity: a tier ablation matches it with twenty times the state, and Adafactor, which shares the factored estimator but drops momentum, plateaus 40 points behind. The tiers buy memory at no cost to accuracy; the accuracy comes from keeping momentum, which a uniform optimizer shares too. Sweeping the baselines\u0027 learning rates narrows but does not close the gap: the best tuned AdamW reaches 118.5, tuned Adafactor 139.7. Where optimizer state lives, these results suggest, matters at least as much as how much of it there is.", "arxiv_id": "2607.19058", "arxiv_url": "https://arxiv.org/abs/2607.19058", "authors": ["Nuemaan Malik"], "brief": "\u8bba\u6587\u63d0\u51fa SkewAdam\uff0c\u9488\u5bf9 MoE \u4e2d\u9aa8\u5e72\u7f51\u7edc\u3001\u4e13\u5bb6\u548c\u8def\u7531\u5668\u7684\u4e0d\u540c\u53c2\u6570\u89c4\u6a21\u4e0e\u68af\u5ea6\u7279\u6027\uff0c\u5206\u5c42\u5206\u914d\u4f18\u5316\u5668\u72b6\u6001\u3002\u5b83\u5c06\u4f18\u5316\u5668\u72b6\u6001\u4ece AdamW \u7684 50.6GB \u964d\u81f3 1.29GB\uff0c\u5e76\u628a\u5cf0\u503c\u663e\u5b58\u4ece 81.4GB \u964d\u5230 31.3GB\uff0c\u540c\u65f6\u9a8c\u8bc1\u56f0\u60d1\u5ea6\u4f18\u4e8e AdamW\u3001Muon \u548c Lion\uff0c\u663e\u793a\u4f18\u5316\u5668\u72b6\u6001\u653e\u5728\u54ea\u91cc\u4e0e\u72b6\u6001\u591a\u5c11\u540c\u6837\u91cd\u8981\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19058", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6df7\u5408\u4e13\u5bb6", "\u4f18\u5316\u5668", "\u5927\u6a21\u578b\u8bad\u7ec3", "\u663e\u5b58\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19058v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Where Should Optimizer State Live? Tiered State Allocation for Memory-Efficient Mixture-of-Experts Training", "tldr": "\u8bba\u6587\u63d0\u51fa SkewAdam\uff0c\u9488\u5bf9 MoE \u4e2d\u9aa8\u5e72\u7f51\u7edc\u3001\u4e13\u5bb6\u548c\u8def\u7531\u5668\u7684\u4e0d\u540c\u53c2\u6570\u89c4\u6a21\u4e0e\u68af\u5ea6\u7279\u6027\uff0c\u5206\u5c42\u5206\u914d\u4f18\u5316\u5668\u72b6\u6001\u3002\u5b83\u5c06\u4f18\u5316\u5668\u72b6\u6001\u4ece AdamW \u7684 50.6GB \u964d\u81f3 1.29GB\uff0c\u5e76\u628a\u5cf0\u503c\u663e\u5b58\u4ece 81.4GB \u964d\u5230 31.3GB\uff0c\u540c\u65f6\u9a8c\u8bc1\u56f0\u60d1\u5ea6\u4f18\u4e8e AdamW\u3001Muon \u548c Lion\uff0c\u663e\u793a\u4f18\u5316\u5668\u72b6\u6001\u653e\u5728\u54ea\u91cc\u4e0e\u72b6\u6001\u591a\u5c11\u540c\u6837\u91cd\u8981\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multi-turn medical consultation agents must decide what to ask, adapt to patient responses, and determine when the collected evidence is sufficient. However, coupled evaluation conflates the quality of the policy-elicited history with policy-specific terminal diagnosis generation: strong generation can compensate for a thin history, while weaker generation can obscure a rich one. We introduce MedDDC-Eval, a diagnosis-decoupled testbed that treats elicited history as the comparison object and holds the history-to-diagnosis mapping constant through a shared frozen reader. Across two held-out sources, a grounded interface and an auditable diagnosis-trajectory-efficiency (D/T/E) harness measure diagnostic usefulness, information acquisition, and efficiency. Directional semantic coverage followed by deterministic one-to-one assignment yields coherent precision-recall counts for open-ended items, with at most one credited match per prediction or reference. Holding histories fixed, changing only the diagnostic reader shifts diagnosis F1 by 2.2-19.0 points and reverses 18% and 36% of pairwise policy orderings on the Record and Dialogue splits. We further apply standard Group Relative Policy Optimization (GRPO) over interactive multi-turn rollouts to post-train Qwen3-32B using diagnosis-result and trajectory feedback. On the 100-case Record and 70-case Dialogue splits, the trained policy improves over its initialization by 9.7 and 4.6 total-score points; removing either primary signal lowers held-out joint performance. These results show that MedDDC-Eval supports controlled attribution, interpretable elicited-history measurement, and evaluation-guided evidence-acquisition policy development.", "arxiv_id": "2607.18999", "arxiv_url": "https://arxiv.org/abs/2607.18999", "authors": ["Guofeng Zhang", "Yizeng Quan", "Huaiyi Fang", "Jianwei Lv", "Jinyao Liu", "Xunxu Duan", "Lening An", "Yu Ouyang", "Junfeng Wang"], "brief": "\u8bba\u6587\u63d0\u51fa MedDDC-Eval\uff0c\u5c06\u591a\u8f6e\u533b\u7597\u95ee\u8bca\u667a\u80fd\u4f53\u7684\u75c5\u53f2\u91c7\u96c6\u8d28\u91cf\u4e0e\u6700\u7ec8\u8bca\u65ad\u751f\u6210\u89e3\u8026\uff0c\u7528\u5171\u4eab\u51bb\u7ed3\u8bca\u65ad\u8bfb\u8005\u6765\u56fa\u5b9a\u201c\u75c5\u53f2\u5230\u8bca\u65ad\u201d\u7684\u6620\u5c04\uff0c\u4ece\u800c\u66f4\u516c\u5e73\u5730\u6bd4\u8f83\u95ee\u8bca\u7b56\u7565\u3002\u5b9e\u9a8c\u663e\u793a\u66f4\u6362\u8bca\u65ad\u8bfb\u8005\u4f1a\u663e\u8457\u6539\u53d8\u8bca\u65ad F1 \u5e76\u98a0\u5012\u90e8\u5206\u7b56\u7565\u6392\u540d\uff1b\u57fa\u4e8e GRPO \u540e\u8bad\u7ec3 Qwen3-32B \u540e\uff0c\u5728\u4e24\u4e2a\u6d4b\u8bd5\u96c6\u4e0a\u5206\u522b\u63d0\u5347 9.7 \u548c 4.6 \u5206\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18999", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u533b\u7597\u95ee\u8bca", "\u8bc4\u6d4b\u57fa\u51c6", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18999v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MedDDC-Eval: Diagnosis-Decoupled Evaluation of Multi-Turn Medical Consultation Agents", "tldr": "\u8bba\u6587\u63d0\u51fa MedDDC-Eval\uff0c\u5c06\u591a\u8f6e\u533b\u7597\u95ee\u8bca\u667a\u80fd\u4f53\u7684\u75c5\u53f2\u91c7\u96c6\u8d28\u91cf\u4e0e\u6700\u7ec8\u8bca\u65ad\u751f\u6210\u89e3\u8026\uff0c\u7528\u5171\u4eab\u51bb\u7ed3\u8bca\u65ad\u8bfb\u8005\u6765\u56fa\u5b9a\u201c\u75c5\u53f2\u5230\u8bca\u65ad\u201d\u7684\u6620\u5c04\uff0c\u4ece\u800c\u66f4\u516c\u5e73\u5730\u6bd4\u8f83\u95ee\u8bca\u7b56\u7565\u3002\u5b9e\u9a8c\u663e\u793a\u66f4\u6362\u8bca\u65ad\u8bfb\u8005\u4f1a\u663e\u8457\u6539\u53d8\u8bca\u65ad F1 \u5e76\u98a0\u5012\u90e8\u5206\u7b56\u7565\u6392\u540d\uff1b\u57fa\u4e8e GRPO \u540e\u8bad\u7ec3 Qwen3-32B \u540e\uff0c\u5728\u4e24\u4e2a\u6d4b\u8bd5\u96c6\u4e0a\u5206\u522b\u63d0\u5347 9.7 \u548c 4.6 \u5206\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) have demonstrated remarkable capabilities in language understanding, reasoning, and world knowledge. As embodied agents become increasingly capable, there is a growing demand for compact models that can serve as an on-device brain, preserving the broad general intelligence of LLMs while enabling effective high-level interaction with embodied environments. Existing approaches, however, often prioritize either general-purpose intelligence or specialized embodied capabilities, making it challenging to satisfy both requirements within a single model. We present \\textbf{Athena-Brain-8B}, an 8B LLM designed to serve as an on-device brain for embodied intelligence for embodied intelligence. Through a multi-stage post-training pipeline consisting of General Supervised Fine-Tuning, General Reinforcement Learning, Embodied Expert training, and Model Merge, Athena-Brain-8B maintains strong general capabilities while acquiring strong high-level embodied interaction capabilities and generating concise responses for efficient embodied interaction. Experimental results demonstrate the effectiveness of Athena across both general and embodied evaluations. Compared with the corresponding Qwen3-8B thinking model, Athena-Brain-8B achieves comparable performance on general language and reasoning benchmarks while generating substantially shorter responses. On in-domain embodied benchmarks, Athena-Brain-8B consistently outperforms models of similar scale and surpasses several substantially larger frontier models evaluated zero-shot, demonstrating that compact language models can effectively integrate strong general intelligence with embodied capabilities.", "arxiv_id": "2607.18985", "arxiv_url": "https://arxiv.org/abs/2607.18985", "authors": ["Jialian Li", "Junhong Liu", "Yuchen Cao", "Weiran Guo", "Jiaming Song", "Xutao Wang", "Yi Zhao", "Jiangpin Liu", "Jie Chen"], "brief": "\u672c\u6587\u63d0\u51fa Athena-Brain-8B\uff0c\u4e00\u4e2a\u9762\u5411\u5177\u8eab\u667a\u80fd\u7684\u7aef\u4fa7 8B \u673a\u5668\u4eba\u201c\u5927\u8111\u201d\u6a21\u578b\u3002\u901a\u8fc7\u901a\u7528\u76d1\u7763\u5fae\u8c03\u3001\u5f3a\u5316\u5b66\u4e60\u3001\u5177\u8eab\u4e13\u5bb6\u8bad\u7ec3\u4e0e\u6a21\u578b\u5408\u5e76\uff0c\u5b83\u5728\u4fdd\u6301\u901a\u7528\u8bed\u8a00\u4e0e\u63a8\u7406\u80fd\u529b\u7684\u540c\u65f6\uff0c\u663e\u8457\u63d0\u5347\u9ad8\u5c42\u5177\u8eab\u4ea4\u4e92\u80fd\u529b\uff0c\u5e76\u751f\u6210\u66f4\u7b80\u77ed\u9ad8\u6548\u7684\u54cd\u5e94\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18985", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u5927\u8bed\u8a00\u6a21\u578b", "\u673a\u5668\u4eba", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18985v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Athena-Brain Technical Report: An Efficient Robot Brain for General Intelligence and Embodied Interactio", "tldr": "\u672c\u6587\u63d0\u51fa Athena-Brain-8B\uff0c\u4e00\u4e2a\u9762\u5411\u5177\u8eab\u667a\u80fd\u7684\u7aef\u4fa7 8B \u673a\u5668\u4eba\u201c\u5927\u8111\u201d\u6a21\u578b\u3002\u901a\u8fc7\u901a\u7528\u76d1\u7763\u5fae\u8c03\u3001\u5f3a\u5316\u5b66\u4e60\u3001\u5177\u8eab\u4e13\u5bb6\u8bad\u7ec3\u4e0e\u6a21\u578b\u5408\u5e76\uff0c\u5b83\u5728\u4fdd\u6301\u901a\u7528\u8bed\u8a00\u4e0e\u63a8\u7406\u80fd\u529b\u7684\u540c\u65f6\uff0c\u663e\u8457\u63d0\u5347\u9ad8\u5c42\u5177\u8eab\u4ea4\u4e92\u80fd\u529b\uff0c\u5e76\u751f\u6210\u66f4\u7b80\u77ed\u9ad8\u6548\u7684\u54cd\u5e94\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Personal AI is moving beyond chat-only interaction toward continuous services that span phones, cars, homes, wearables, cameras, and tools. In this setting, memory cannot remain a cache of prior conversations. It should serve as a continuity and governance substrate: preserving durable user state, grounding answers in multimodal and device evidence, supporting correction and forgetting, bounding policy evolution, and remaining deployable under latency, cost, privacy, and edge-cloud constraints. This technical report presents Mi-Memory, a lifecycle memory framework for Personal AI organized around four roles: Structure, Expansion, Evolution, and Deployment. A shared audit contract links these roles through four r
