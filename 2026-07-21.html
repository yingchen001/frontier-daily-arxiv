ecurring artifact families: typed evidence payloads preserve source identity and provenance, diagnostic traces localize evidence loss across the serving pipeline, strategy artifacts make memory-policy changes explicit, and gate/rollback records bound accepted evolution. MiMemory instantiates the roles through MemStack, MemSense/MemFuse, D$^{2}$ACCI/E$^{2}$MEND, and LiteMem. In controlled-reference Structure evaluations, MemStack reaches 93.59%, 57.24%, and 87.47% on LoCoMo, PersonaMem-V2, and LongMemEval, respectively; other tracks report module-level, preliminary/internal, transfer-feasibility, or design-only evidence with explicit boundaries. MiMemory is a step toward auditable, evidence-gated, and deployment-aware memory systems for Personal AI. Project homepage: https://darwin-agent.github.io/Mi-Memory/ .", "arxiv_id": "2607.18975", "arxiv_url": "https://arxiv.org/abs/2607.18975", "authors": ["Xule Liu", "Hanlin Teng", "Chao Li", "Yanan Ni", "Shuo Lu", "Audrey Wang", "Yijun Liu", "Yunfei Wang", "Xiaofeng Li", "Xian Yi", "Yuanfa Li", "Kang Zhao", "Jian Liang", "Yuxuan Chen", "Jinyuan Chen", "Heng Qu", "Kun Shao", "Jian Luan"], "brief": "\u672c\u6587\u63d0\u51fa Mi-Memory\uff0c\u4e00\u4e2a\u9762\u5411\u4e2a\u4eba AI \u7684\u751f\u547d\u5468\u671f\u8bb0\u5fc6\u6846\u67b6\uff0c\u5c06\u8bb0\u5fc6\u4ece\u804a\u5929\u7f13\u5b58\u6269\u5c55\u4e3a\u53ef\u5ba1\u8ba1\u3001\u53ef\u7ea0\u9519\u3001\u53ef\u9057\u5fd8\u5e76\u9002\u914d\u7aef\u4e91\u90e8\u7f72\u7684\u6cbb\u7406\u5e95\u5ea7\u3002\u6846\u67b6\u5305\u542b\u7ed3\u6784\u5316\u3001\u6269\u5c55\u3001\u6f14\u5316\u548c\u90e8\u7f72\u56db\u7c7b\u89d2\u8272\uff0c\u5e76\u901a\u8fc7\u8bc1\u636e\u8f7d\u8377\u3001\u8bca\u65ad\u8f68\u8ff9\u3001\u7b56\u7565\u5de5\u4ef6\u548c\u56de\u6eda\u8bb0\u5f55\u6765\u7ea6\u675f\u8bb0\u5fc6\u66f4\u65b0\uff1b\u5176\u4e2d MemStack \u5728\u591a\u4e2a\u8bb0\u5fc6\u8bc4\u6d4b\u4e0a\u53d6\u5f97\u8f83\u597d\u7ed3\u679c\uff0c\u4f46\u90e8\u5206\u6a21\u5757\u4ecd\u4e3a\u521d\u6b65\u6216\u8bbe\u8ba1\u6027\u9a8c\u8bc1\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18975", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u7cfb\u7edf", "\u4e2a\u4ebaAI", "\u7aef\u4e91\u90e8\u7f72"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18975v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Mi-Memory: A Lifecycle Memory Framework for Personal AI", "tldr": "\u672c\u6587\u63d0\u51fa Mi-Memory\uff0c\u4e00\u4e2a\u9762\u5411\u4e2a\u4eba AI \u7684\u751f\u547d\u5468\u671f\u8bb0\u5fc6\u6846\u67b6\uff0c\u5c06\u8bb0\u5fc6\u4ece\u804a\u5929\u7f13\u5b58\u6269\u5c55\u4e3a\u53ef\u5ba1\u8ba1\u3001\u53ef\u7ea0\u9519\u3001\u53ef\u9057\u5fd8\u5e76\u9002\u914d\u7aef\u4e91\u90e8\u7f72\u7684\u6cbb\u7406\u5e95\u5ea7\u3002\u6846\u67b6\u5305\u542b\u7ed3\u6784\u5316\u3001\u6269\u5c55\u3001\u6f14\u5316\u548c\u90e8\u7f72\u56db\u7c7b\u89d2\u8272\uff0c\u5e76\u901a\u8fc7\u8bc1\u636e\u8f7d\u8377\u3001\u8bca\u65ad\u8f68\u8ff9\u3001\u7b56\u7565\u5de5\u4ef6\u548c\u56de\u6eda\u8bb0\u5f55\u6765\u7ea6\u675f\u8bb0\u5fc6\u66f4\u65b0\uff1b\u5176\u4e2d MemStack \u5728\u591a\u4e2a\u8bb0\u5fc6\u8bc4\u6d4b\u4e0a\u53d6\u5f97\u8f83\u597d\u7ed3\u679c\uff0c\u4f46\u90e8\u5206\u6a21\u5757\u4ecd\u4e3a\u521d\u6b65\u6216\u8bbe\u8ba1\u6027\u9a8c\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Textual skills provide a lightweight way to improve frozen language-model agents, but their self-evolution normally requires a stable validation signal. Such signals are natural in mathematics or code, where an answer can be checked after it changes, yet are problematic in open-ended dialogue: changing the assistant response also changes the user\u0027s next reaction, so a logged reaction cannot directly evaluate a counterfactual response. We propose future-feedback skill evolution, which first redirects self-evolution from prescribing the current answer to predicting whether the observed answer will lead to a positive or negative subsequent user signal. This prediction task is verifiable on fixed logged tuples and therefore supports validation-gated textual optimization. The evolved feedback skill captures interpretable criteria for response quality and can subsequently serve as a diagnostic and optimization target for answer skills. On a proprietary, privacy-preserving sales-assistant dataset, careful quality filtering and a balanced resolved/unresolved split yield more than 75% prediction accuracy. Beyond this result, the central contribution is a formulation that converts otherwise moving conversational feedback into a fixed offline learning target, enabling reproducible skill evolution without placing every candidate skill in live traffic. We discuss the boundary between observational verification and counterfactual validity, and position the method as an offline optimization stage rather than a replacement for final human or online evaluation.", "arxiv_id": "2607.18973", "arxiv_url": "https://arxiv.org/abs/2607.18973", "authors": ["ChaoJin Zhao", "Xuan Jiang"], "brief": "\u8bba\u6587\u63d0\u51fa\u201c\u672a\u6765\u53cd\u9988\u9884\u6d4b\u201d\u6765\u6539\u8fdb\u5f00\u653e\u5f0f\u5bf9\u8bdd\u4e2d\u7684\u8bed\u8a00\u6a21\u578b\u667a\u80fd\u4f53\u6280\u80fd\uff1a\u4e0d\u76f4\u63a5\u4f18\u5316\u5f53\u524d\u56de\u590d\uff0c\u800c\u662f\u9884\u6d4b\u5df2\u89c2\u6d4b\u56de\u590d\u662f\u5426\u4f1a\u5bfc\u81f4\u540e\u7eed\u7528\u6237\u6b63/\u8d1f\u53cd\u9988\uff0c\u4ece\u800c\u628a\u4f1a\u53d8\u5316\u7684\u5bf9\u8bdd\u53cd\u9988\u8f6c\u5316\u4e3a\u53ef\u79bb\u7ebf\u9a8c\u8bc1\u7684\u56fa\u5b9a\u5b66\u4e60\u76ee\u6807\u3002\u5728\u9690\u79c1\u4fdd\u62a4\u7684\u9500\u552e\u52a9\u624b\u6570\u636e\u96c6\u4e0a\uff0c\u7ecf\u8d28\u91cf\u8fc7\u6ee4\u548c\u5e73\u8861\u5212\u5206\u540e\u9884\u6d4b\u51c6\u786e\u7387\u8d85\u8fc775%\uff0c\u53ef\u7528\u4e8e\u79bb\u7ebf\u8bca\u65ad\u4e0e\u4f18\u5316\u56de\u590d\u6280\u80fd\uff0c\u4f46\u4ecd\u9700\u4eba\u5de5\u6216\u5728\u7ebf\u8bc4\u4f30\u9a8c\u8bc1\u6700\u7ec8\u6548\u679c\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18973", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5bf9\u8bdd\u7cfb\u7edf", "\u81ea\u6211\u8fdb\u5316", "\u79bb\u7ebf\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18973v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Verifiable Self-Evolution for Open-Ended Dialogue Skills via Future-Feedback Prediction", "tldr": "\u8bba\u6587\u63d0\u51fa\u201c\u672a\u6765\u53cd\u9988\u9884\u6d4b\u201d\u6765\u6539\u8fdb\u5f00\u653e\u5f0f\u5bf9\u8bdd\u4e2d\u7684\u8bed\u8a00\u6a21\u578b\u667a\u80fd\u4f53\u6280\u80fd\uff1a\u4e0d\u76f4\u63a5\u4f18\u5316\u5f53\u524d\u56de\u590d\uff0c\u800c\u662f\u9884\u6d4b\u5df2\u89c2\u6d4b\u56de\u590d\u662f\u5426\u4f1a\u5bfc\u81f4\u540e\u7eed\u7528\u6237\u6b63/\u8d1f\u53cd\u9988\uff0c\u4ece\u800c\u628a\u4f1a\u53d8\u5316\u7684\u5bf9\u8bdd\u53cd\u9988\u8f6c\u5316\u4e3a\u53ef\u79bb\u7ebf\u9a8c\u8bc1\u7684\u56fa\u5b9a\u5b66\u4e60\u76ee\u6807\u3002\u5728\u9690\u79c1\u4fdd\u62a4\u7684\u9500\u552e\u52a9\u624b\u6570\u636e\u96c6\u4e0a\uff0c\u7ecf\u8d28\u91cf\u8fc7\u6ee4\u548c\u5e73\u8861\u5212\u5206\u540e\u9884\u6d4b\u51c6\u786e\u7387\u8d85\u8fc775%\uff0c\u53ef\u7528\u4e8e\u79bb\u7ebf\u8bca\u65ad\u4e0e\u4f18\u5316\u56de\u590d\u6280\u80fd\uff0c\u4f46\u4ecd\u9700\u4eba\u5de5\u6216\u5728\u7ebf\u8bc4\u4f30\u9a8c\u8bc1\u6700\u7ec8\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Circuit extraction identifies a small set of model components whose presence preserves a target behavior under ablation, and the resulting circuit is often read as the mechanism behind that behavior. We argue that this reading is under-determined: preserving behavior does not single out one circuit, because the claim it supports depends on which circuit is reported and how two circuits are compared. We make this concrete in a synthetic Lean tactic-prediction benchmark -- predicting the next step of a proof -- where fixed proof rules with randomized surface form let differences between extracted circuits be attributed to these choices rather than to the task. Across dense and weight-sparse checkpoints (most weights constrained to zero) of the same transformer, evaluated on atomic (single-rule) and compositional (multi-rule) proofs, we vary which extracted object is reported (a compact prediction-preserving circuit, a broader graph that also keeps surrounding read, write, and routing structure, or the smallest subgraph meeting a post-ablation loss threshold), and whether each attention head\u0027s query and key are represented jointly or separately. Exact component-to-component edge overlap is low and sensitive to these choices, at times dropping to a random baseline, while two coarser summaries stay stable: the set of selected attention heads, and the circuit-size ranking of conditions that differ in which supervised checkpoint initializes reinforcement learning (RL). The largest accuracy gains from RL on compositional proofs come with the most structure beyond the atomic circuits. A circuit-level claim is therefore well defined only once one states which circuit is reported, the pruning threshold used to extract it, and the level at which circuits are compared. We distill these requirements into a reporting practice for circuit-extraction studies.", "arxiv_id": "2607.18921", "arxiv_url": "https://arxiv.org/abs/2607.18921", "authors": ["Yang Sheng", "Jie Fu"], "brief": "\u672c\u6587\u6307\u51fa\uff0c\u6a21\u578b\u7535\u8def\u62bd\u53d6\u4e2d\u201c\u4fdd\u7559\u884c\u4e3a\u201d\u7684\u5c0f\u7ec4\u4ef6\u96c6\u5408\u5e76\u4e0d\u80fd\u552f\u4e00\u786e\u5b9a\u673a\u5236\u7ed3\u8bba\uff0c\u7ed3\u679c\u4f1a\u5f3a\u70c8\u4f9d\u8d56\u4e8e\u62a5\u544a\u54ea\u79cd\u7535\u8def\u5bf9\u8c61\u3001\u526a\u679d\u9608\u503c\u4ee5\u53ca\u6bd4\u8f83\u7c92\u5ea6\u3002\u4f5c\u8005\u5728\u5408\u6210 Lean \u8bc1\u660e\u7b56\u7565\u9884\u6d4b\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u53d1\u73b0\uff0c\u7cbe\u7ec6\u7ec4\u4ef6\u8fb9\u91cd\u53e0\u5f88\u4f4e\u4e14\u5bf9\u9009\u62e9\u654f\u611f\uff0c\u4f46\u6ce8\u610f\u529b\u5934\u96c6\u5408\u548c\u90e8\u5206\u6761\u4ef6\u4e0b\u7684\u7535\u8def\u89c4\u6a21\u6392\u5e8f\u8f83\u7a33\u5b9a\uff1b\u5e76\u63d0\u51fa\u4e86\u7535\u8def\u62bd\u53d6\u7814\u7a76\u7684\u62a5\u544a\u89c4\u8303\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18921", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u53ef\u89e3\u91ca\u6027", "\u7535\u8def\u5206\u6790", "Transformer", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18921v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Circuit Claims Depend on What Is Extracted and How It Is Compared", "tldr": "\u672c\u6587\u6307\u51fa\uff0c\u6a21\u578b\u7535\u8def\u62bd\u53d6\u4e2d\u201c\u4fdd\u7559\u884c\u4e3a\u201d\u7684\u5c0f\u7ec4\u4ef6\u96c6\u5408\u5e76\u4e0d\u80fd\u552f\u4e00\u786e\u5b9a\u673a\u5236\u7ed3\u8bba\uff0c\u7ed3\u679c\u4f1a\u5f3a\u70c8\u4f9d\u8d56\u4e8e\u62a5\u544a\u54ea\u79cd\u7535\u8def\u5bf9\u8c61\u3001\u526a\u679d\u9608\u503c\u4ee5\u53ca\u6bd4\u8f83\u7c92\u5ea6\u3002\u4f5c\u8005\u5728\u5408\u6210 Lean \u8bc1\u660e\u7b56\u7565\u9884\u6d4b\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u53d1\u73b0\uff0c\u7cbe\u7ec6\u7ec4\u4ef6\u8fb9\u91cd\u53e0\u5f88\u4f4e\u4e14\u5bf9\u9009\u62e9\u654f\u611f\uff0c\u4f46\u6ce8\u610f\u529b\u5934\u96c6\u5408\u548c\u90e8\u5206\u6761\u4ef6\u4e0b\u7684\u7535\u8def\u89c4\u6a21\u6392\u5e8f\u8f83\u7a33\u5b9a\uff1b\u5e76\u63d0\u51fa\u4e86\u7535\u8def\u62bd\u53d6\u7814\u7a76\u7684\u62a5\u544a\u89c4\u8303\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "While Large Language Models have greatly advanced automated issue resolution, existing agent-based methods exhibit a fundamental limitation in their insufficient exploration of repair strategies. This insufficiency manifests in two key aspects. First, the exploration of multiple potential edit locations is limited. Second, the exploration of repair attempts at each location is also insufficient. To address these challenges, we present PhoenixRepair, a multi-agent framework that systematically explores multiple candidate edit locations and performs iterative reflection and refinement on patch generation, thereby expanding the search space of repair strategies. Our framework begins with multi-location sampling, optionally augmented with graph-based localization information for difficult tasks, followed by iterative reflection and refinement to generate better patches, culminating in final-round generation guided by distilled insights from all historical attempts. Experiments on SWE-bench-Verified demonstrate that PhoenixRepair achieves the largest relative improvement of 7.8\\% over SWE-agent under DeepSeek-V3.1, and attains the highest resolved rate of 76.0\\% Pass@1 under MiniMax-M2.5. Meanwhile, it achieves higher fault localization accuracy than existing approaches. Our code is available at https://github.com/DeepSoftwareAnalytics/PhoenixRepair.", "arxiv_id": "2607.18859", "arxiv_url": "https://arxiv.org/abs/2607.18859", "authors": ["Tianyue Jiang", "Yanlin Wang", "Xin He", "Daya Guo", "Jiachi Chen", "Ming Wen", "Ensheng Shi", "Xilin Liu", "Yuchi Ma", "Guanbin Li"], "brief": "PhoenixRepair \u63d0\u51fa\u4e00\u4e2a\u591a\u667a\u80fd\u4f53\u8f6f\u4ef6\u4fee\u590d\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u4f4d\u7f6e\u91c7\u6837\u3001\u8fed\u4ee3\u53cd\u601d\u4e0e\u8865\u4e01\u7cbe\u70bc\u6765\u66f4\u5145\u5206\u63a2\u7d22\u4fee\u590d\u7b56\u7565\u3002\u5b9e\u9a8c\u5728 SWE-bench-Verified \u4e0a\u76f8\u6bd4 SWE-agent \u53d6\u5f97\u6700\u9ad8 7.8% \u76f8\u5bf9\u63d0\u5347\uff0c\u5e76\u5728 MiniMax-M2.5 \u4e0b\u8fbe\u5230 76.0% Pass@1\uff0c\u540c\u65f6\u63d0\u5347\u6545\u969c\u5b9a\u4f4d\u51c6\u786e\u7387\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18859", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8f6f\u4ef6\u4fee\u590d", "\u4ee3\u7801\u751f\u6210", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18859v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PhoenixRepair: Rethinking Repair Strategy Exploration in Software Agents", "tldr": "PhoenixRepair \u63d0\u51fa\u4e00\u4e2a\u591a\u667a\u80fd\u4f53\u8f6f\u4ef6\u4fee\u590d\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u4f4d\u7f6e\u91c7\u6837\u3001\u8fed\u4ee3\u53cd\u601d\u4e0e\u8865\u4e01\u7cbe\u70bc\u6765\u66f4\u5145\u5206\u63a2\u7d22\u4fee\u590d\u7b56\u7565\u3002\u5b9e\u9a8c\u5728 SWE-bench-Verified \u4e0a\u76f8\u6bd4 SWE-agent \u53d6\u5f97\u6700\u9ad8 7.8% \u76f8\u5bf9\u63d0\u5347\uff0c\u5e76\u5728 MiniMax-M2.5 \u4e0b\u8fbe\u5230 76.0% Pass@1\uff0c\u540c\u65f6\u63d0\u5347\u6545\u969c\u5b9a\u4f4d\u51c6\u786e\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Latent world models underpin much of modern model-based control, yet current action-conditioned formulations supervise the next-latent transition with a single, undifferentiated target, forcing a monolithic learning signal to absorb every source of state change. In real world, however, transitions arise from two heterogeneous sources: an action-driven component induced by the agent, and an action-invariant world effect -- the change that would still occur under a null action, dictated by the environment\u0027s intrinsic dynamics (e.g., gravity-driven sliding, inertia, contact rebound, and persistent drift). Fusing them into a single target entangles the two inside the latent transition, prevents the model from attributing observed changes to their underlying causes, and undermines the transferability of the learned dynamics. We introduce DWM (Decomposed World Model), a supervision-level framework that operationalizes this decomposition. DWM augments the predictor of a latent world model with an auxiliary world head, regularized by a normalized world-contrastive objective to be action-invariant, while the original pred head is coupled to it via an orthogonality constraint; together, the two signals induce an explicit additive decomposition of the predicted transition into an action-invariant and a complementary action-driven component, without altering the underlying architecture or inference pipeline. To evaluate DWM under persistent world effects, we construct W-variants of three standard control benchmarks -- PushT-W, Reacher-W, and TwoRoom-W -- each instantiating a distinct action-invariant dynamic. DWM matches strong baselines on the flat counterparts and delivers a mean absolute improvement of 13.1% in CEM planning success across the W-variants.", "arxiv_id": "2607.18715", "arxiv_url": "https://arxiv.org/abs/2607.18715", "authors": ["Yi-Ge Zhang", "Tianqi Du", "Qi Zhang", "Yisen Wang"], "brief": "\u8bba\u6587\u63d0\u51fa DWM\uff08\u5206\u89e3\u5f0f\u4e16\u754c\u6a21\u578b\uff09\uff0c\u5c06\u6f5c\u5728\u4e16\u754c\u6a21\u578b\u4e2d\u7684\u72b6\u6001\u53d8\u5316\u663e\u5f0f\u62c6\u5206\u4e3a\u52a8\u4f5c\u65e0\u5173\u7684\u73af\u5883\u56fa\u6709\u6548\u5e94\u548c\u52a8\u4f5c\u9a71\u52a8\u6548\u5e94\u3002\u901a\u8fc7\u8f85\u52a9\u4e16\u754c\u5934\u3001\u4e16\u754c\u5bf9\u6bd4\u6b63\u5219\u4e0e\u6b63\u4ea4\u7ea6\u675f\uff0c\u5728\u4e0d\u6539\u53d8\u63a8\u7406\u6d41\u7a0b\u7684\u60c5\u51b5\u4e0b\u63d0\u5347\u52a8\u529b\u5b66\u5f52\u56e0\u4e0e\u8fc1\u79fb\u6027\uff1b\u5728\u542b\u6301\u7eed\u4e16\u754c\u6548\u5e94\u7684\u63a7\u5236\u57fa\u51c6\u4e0a\uff0cCEM \u89c4\u5212\u6210\u529f\u7387\u5e73\u5747\u63d0\u5347 13.1%\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18715", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u6a21\u578b\u9884\u6d4b\u63a7\u5236", "\u5f3a\u5316\u5b66\u4e60", "\u8868\u5f81\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18715v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DWM: Separating World Effects from Actions in Latent World Models", "tldr": "\u8bba\u6587\u63d0\u51fa DWM\uff08\u5206\u89e3\u5f0f\u4e16\u754c\u6a21\u578b\uff09\uff0c\u5c06\u6f5c\u5728\u4e16\u754c\u6a21\u578b\u4e2d\u7684\u72b6\u6001\u53d8\u5316\u663e\u5f0f\u62c6\u5206\u4e3a\u52a8\u4f5c\u65e0\u5173\u7684\u73af\u5883\u56fa\u6709\u6548\u5e94\u548c\u52a8\u4f5c\u9a71\u52a8\u6548\u5e94\u3002\u901a\u8fc7\u8f85\u52a9\u4e16\u754c\u5934\u3001\u4e16\u754c\u5bf9\u6bd4\u6b63\u5219\u4e0e\u6b63\u4ea4\u7ea6\u675f\uff0c\u5728\u4e0d\u6539\u53d8\u63a8\u7406\u6d41\u7a0b\u7684\u60c5\u51b5\u4e0b\u63d0\u5347\u52a8\u529b\u5b66\u5f52\u56e0\u4e0e\u8fc1\u79fb\u6027\uff1b\u5728\u542b\u6301\u7eed\u4e16\u754c\u6548\u5e94\u7684\u63a7\u5236\u57fa\u51c6\u4e0a\uff0cCEM \u89c4\u5212\u6210\u529f\u7387\u5e73\u5747\u63d0\u5347 13.1%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Circuit analysis can support not only model explanation but also downstream interventions such as pruning, editing, steering, and selective fine-tuning. However, conducting such analyses currently requires stitching together separate implementations for discovery, evaluation, and intervention, as well as hand-authoring the contrastive prompts required by many discovery methods. This fragmentation makes methods difficult to compare and limits their application beyond canonical tasks. We introduce CircuitKIT, a source-available library that connects the circuit-analysis workflow through a typed, serializable representation. CircuitKIT provides a suite of discovery algorithms, declarative interfaces for mapping structured data into discovery tasks, complementary circuit diagnostics, and downstream application modules. Together, these components provide common infrastructure for conducting and comparing circuit analyses. The library, examples, notebooks, and documentation are released at https://github.com/Lexsi-Labs/CircuitKIT .", "arxiv_id": "2607.19317", "arxiv_url": "https://arxiv.org/abs/2607.19317", "authors": ["Pratinav Seth", "Hem Gosalia", "Aditya Kasliwal", "Vinay Kumar Sankarapu"], "brief": "\u672c\u6587\u63d0\u51fa CircuitKIT\uff0c\u4e00\u4e2a\u9762\u5411\u673a\u5236\u53ef\u89e3\u91ca\u6027\u4e2d\u7535\u8def\u5206\u6790\u7684\u5de5\u5177\u5e93\uff0c\u5c06\u7535\u8def\u53d1\u73b0\u3001\u8bc4\u4f30\u8bca\u65ad\u548c\u4e0b\u6e38\u5e72\u9884\u5e94\u7528\u8fde\u63a5\u5230\u7edf\u4e00\u7684\u53ef\u5e8f\u5217\u5316\u8868\u793a\u4e2d\u3002\u5b83\u63d0\u4f9b\u591a\u79cd\u53d1\u73b0\u7b97\u6cd5\u3001\u7ed3\u6784\u5316\u6570\u636e\u5230\u4efb\u52a1\u7684\u58f0\u660e\u5f0f\u63a5\u53e3\u4ee5\u53ca\u526a\u679d\u3001\u7f16\u8f91\u3001\u5f15\u5bfc\u7b49\u5e94\u7528\u6a21\u5757\uff0c\u6709\u52a9\u4e8e\u964d\u4f4e\u5b9e\u9a8c\u62fc\u63a5\u6210\u672c\u5e76\u4fc3\u8fdb\u65b9\u6cd5\u6bd4\u8f83\u3002", "categories": ["cs.LG", "cs.CL", "cs.ET"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19317", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u673a\u5236\u53ef\u89e3\u91ca\u6027", "\u7535\u8def\u5206\u6790", "\u6a21\u578b\u5e72\u9884", "\u5de5\u5177\u5e93"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19317v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CircuitKIT : Circuit Discovery, Evaluation, and Application Toolkit for Mechanistic Interpretability", "tldr": "\u672c\u6587\u63d0\u51fa CircuitKIT\uff0c\u4e00\u4e2a\u9762\u5411\u673a\u5236\u53ef\u89e3\u91ca\u6027\u4e2d\u7535\u8def\u5206\u6790\u7684\u5de5\u5177\u5e93\uff0c\u5c06\u7535\u8def\u53d1\u73b0\u3001\u8bc4\u4f30\u8bca\u65ad\u548c\u4e0b\u6e38\u5e72\u9884\u5e94\u7528\u8fde\u63a5\u5230\u7edf\u4e00\u7684\u53ef\u5e8f\u5217\u5316\u8868\u793a\u4e2d\u3002\u5b83\u63d0\u4f9b\u591a\u79cd\u53d1\u73b0\u7b97\u6cd5\u3001\u7ed3\u6784\u5316\u6570\u636e\u5230\u4efb\u52a1\u7684\u58f0\u660e\u5f0f\u63a5\u53e3\u4ee5\u53ca\u526a\u679d\u3001\u7f16\u8f91\u3001\u5f15\u5bfc\u7b49\u5e94\u7528\u6a21\u5757\uff0c\u6709\u52a9\u4e8e\u964d\u4f4e\u5b9e\u9a8c\u62fc\u63a5\u6210\u672c\u5e76\u4fc3\u8fdb\u65b9\u6cd5\u6bd4\u8f83\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Speculative decoding, in which a lightweight draft model first generates a draft sequence that is then verified in parallel by the target model, has become a prevalent paradigm for accelerating large language model inference. Recent work such as DFlash further boosts drafting efficiency by leveraging diffusion drafters, whose parallel denoising mechanism enables draft generation in a single forward pass. In this work, we uncover a central pitfall of diffusion drafters: bidirectional attention is a double-edged sword. On one hand, it endows the model with parallel generation and global contextual modeling capabilities; on the other hand, this inherent global dependency introduces high variance at both the domain-level and the token-level: acceptance rates fluctuate substantially across different domains, and draft token quality also varies heterogeneously at different token positions. To tackle this issue, we propose AdaFlash framework, comprising two components: (i) an on-policy distillation (OPD) algorithm with reverse-KL divergence tailored for diffusion drafters, bringing stable convergence and effectively reducing domain-level variance; and (ii) an adaptive length head that dynamically adjusts the candidate sequence length on the fly, substantially lowering the verification cost of the target model and handling token-level variance. Experiments demonstrate that AdaFlash consistently improves speedup rate during deployment, with especially significant gains in high-concurrency scenarios, achieving up to approximately 66% higher throughput than previous state-of-the-art methods.", "arxiv_id": "2607.19223", "arxiv_url": "https://arxiv.org/abs/2607.19223", "authors": ["Yu-Yang Qian", "Hao-Cong Wu", "Chen Chen", "Jiacheng Sun", "Zhenhua Dong", "Peng Zhao", "Zhi-Hua Zhou"], "brief": "\u672c\u6587\u63d0\u51fa AdaFlash\uff0c\u7528\u4e8e\u52a0\u901f\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406\u4e2d\u7684\u63a8\u6d4b\u89e3\u7801\uff0c\u9488\u5bf9\u6269\u6563\u8349\u7a3f\u6a21\u578b\u56e0\u53cc\u5411\u6ce8\u610f\u529b\u5e26\u6765\u7684\u8de8\u9886\u57df\u548c\u9010 token \u8d28\u91cf\u6ce2\u52a8\u95ee\u9898\u3002\u65b9\u6cd5\u5305\u542b\u57fa\u4e8e\u53cd\u5411 KL \u7684 on-policy \u84b8\u998f\u548c\u81ea\u9002\u5e94\u957f\u5ea6\u9884\u6d4b\u5934\uff0c\u53ef\u7a33\u5b9a\u8349\u7a3f\u6a21\u578b\u5e76\u52a8\u6001\u8c03\u6574\u5019\u9009\u957f\u5ea6\u3002\u5b9e\u9a8c\u663e\u793a\u5176\u90e8\u7f72\u52a0\u901f\u66f4\u7a33\u5b9a\uff0c\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\u541e\u5410\u91cf\u76f8\u6bd4\u6b64\u524d\u6700\u4f18\u65b9\u6cd5\u6700\u9ad8\u63d0\u5347\u7ea6 66%\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19223", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u6d4b\u89e3\u7801", "\u6269\u6563\u6a21\u578b", "\u6a21\u578b\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19223v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AdaFlash: Adaptive Speculative Decoding via On-Policy Distilled Diffusion Drafters", "tldr": "\u672c\u6587\u63d0\u51fa AdaFlash\uff0c\u7528\u4e8e\u52a0\u901f\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406\u4e2d\u7684\u63a8\u6d4b\u89e3\u7801\uff0c\u9488\u5bf9\u6269\u6563\u8349\u7a3f\u6a21\u578b\u56e0\u53cc\u5411\u6ce8\u610f\u529b\u5e26\u6765\u7684\u8de8\u9886\u57df\u548c\u9010 token \u8d28\u91cf\u6ce2\u52a8\u95ee\u9898\u3002\u65b9\u6cd5\u5305\u542b\u57fa\u4e8e\u53cd\u5411 KL \u7684 on-policy \u84b8\u998f\u548c\u81ea\u9002\u5e94\u957f\u5ea6\u9884\u6d4b\u5934\uff0c\u53ef\u7a33\u5b9a\u8349\u7a3f\u6a21\u578b\u5e76\u52a8\u6001\u8c03\u6574\u5019\u9009\u957f\u5ea6\u3002\u5b9e\u9a8c\u663e\u793a\u5176\u90e8\u7f72\u52a0\u901f\u66f4\u7a33\u5b9a\uff0c\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\u541e\u5410\u91cf\u76f8\u6bd4\u6b64\u524d\u6700\u4f18\u65b9\u6cd5\u6700\u9ad8\u63d0\u5347\u7ea6 66%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) has substantially improved the reasoning capabilities of large language models on tasks such as mathematical reasoning and code generation. However, most RLVR methods assign a scalar outcome reward to an entire trajectory, resulting in sparse supervision and limited token-level credit assignment. On-policy distillation (OPD) provides denser supervision by distilling token-level distributions from a stronger teacher model, but requires an additional teacher and typically assumes a shared vocabulary. On-policy self-distillation (OPSD) removes this dependency by conditioning the same model on privileged information to construct a teacher policy. However, directly matching the teacher distribution may cause information leakage and unstable optimization. RLSD avoids direct matching by using the teacher signal only to modulate update magnitudes, but it cannot provide an explicit correction direction when the sampled reasoning fails. To address this tradeoff, we introduce $\\mathrm{H}^{2}\\mathrm{SD}$, a hybrid hindsight self distillation framework that uses the teacher differently according to trajectory correctness. For successful trajectories, the teacher receives the student response confirmed as correct together with a rephrasing instruction, and its probabilities on the original response tokens are used to modulate update magnitudes without changing the direction determined by the reward. For failed trajectories, we condition the teacher on a reference hint containing key reasoning steps and a verified answer, and minimize the reverse KL divergence from the student to the teacher. Experiments on multiple challenging reasoning benchmarks show that H$^2$SD consistently outperforms representative RLVR, OPSD, and RLSD baselines while maintaining stable optimization and favorable generation efficiency.", "arxiv_id": "2607.18955", "arxiv_url": "https://arxiv.org/abs/2607.18955", "authors": ["Qiye Cai", "Yichuan Ma", "Linyang Li", "Peiji Li", "Yongkang Chen", "Qipeng Guo", "Yicheng Zou", "Tao Gui", "Xiaocheng Feng", "Bing Qin"], "brief": "\u672c\u6587\u63d0\u51fa H\u00b2SD \u6df7\u5408\u540e\u89c1\u81ea\u84b8\u998f\u6846\u67b6\uff0c\u7528\u4e8e\u6539\u8fdb\u53ef\u9a8c\u8bc1\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\u4e2d\u5927\u6a21\u578b\u63a8\u7406\u7684\u7a00\u758f\u76d1\u7763\u4e0e\u4fe1\u7528\u5206\u914d\u95ee\u9898\u3002\u65b9\u6cd5\u6839\u636e\u8f68\u8ff9\u6b63\u786e\u4e0e\u5426\u91c7\u7528\u4e0d\u540c\u6559\u5e08\u4fe1\u53f7\uff1a\u6210\u529f\u6837\u672c\u8c03\u5236\u66f4\u65b0\u5e45\u5ea6\uff0c\u5931\u8d25\u6837\u672c\u5229\u7528\u53c2\u8003\u63d0\u793a\u8fdb\u884c\u53cd\u5411 KL \u6821\u6b63\uff0c\u5728\u591a\u4e2a\u63a8\u7406\u57fa\u51c6\u4e0a\u4f18\u4e8e RLVR\u3001OPSD \u548c RLSD\uff0c\u5e76\u4fdd\u6301\u8bad\u7ec3\u7a33\u5b9a\u4e0e\u8f83\u597d\u751f\u6210\u6548\u7387\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18955", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u81ea\u84b8\u998f", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18955v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.18955.png", "title": "H$^2$SD: Hybrid Hindsight Self-Distillation", "tldr": "\u672c\u6587\u63d0\u51fa H\u00b2SD \u6df7\u5408\u540e\u89c1\u81ea\u84b8\u998f\u6846\u67b6\uff0c\u7528\u4e8e\u6539\u8fdb\u53ef\u9a8c\u8bc1\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\u4e2d\u5927\u6a21\u578b\u63a8\u7406\u7684\u7a00\u758f\u76d1\u7763\u4e0e\u4fe1\u7528\u5206\u914d\u95ee\u9898\u3002\u65b9\u6cd5\u6839\u636e\u8f68\u8ff9\u6b63\u786e\u4e0e\u5426\u91c7\u7528\u4e0d\u540c\u6559\u5e08\u4fe1\u53f7\uff1a\u6210\u529f\u6837\u672c\u8c03\u5236\u66f4\u65b0\u5e45\u5ea6\uff0c\u5931\u8d25\u6837\u672c\u5229\u7528\u53c2\u8003\u63d0\u793a\u8fdb\u884c\u53cd\u5411 KL \u6821\u6b63\uff0c\u5728\u591a\u4e2a\u63a8\u7406\u57fa\u51c6\u4e0a\u4f18\u4e8e RLVR\u3001OPSD \u548c RLSD\uff0c\u5e76\u4fdd\u6301\u8bad\u7ec3\u7a33\u5b9a\u4e0e\u8f83\u597d\u751f\u6210\u6548\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Text-to-video generation has advanced significantly over the past five years through scaling of model size, data, and compute. Unlike model architecture, training data is often underexplored. Real-world data curation is complex and non-trivial, involving clip selection from raw videos and captioning to create video-text pairs for learning text-to-video mappings. We study how data distribution and caption quality impact text-to-video models. To enable controlled experiments, we introduce Moving Alphabet, a procedural testbed that renders letters with varying fonts, colors, sizes, and positions, moving in different directions and speeds against a black background. This design allows precise control over data distribution and caption quality by corrupting ground-truth metadata. Our experiments yield three findings: a) a diverse and balanced distribution of video content and duration is critical for generalization; b) caption quality significantly affects both model performance and training efficiency, suggesting that text-to-video models are bounded by video understanding capabilities; and c) classifier-free guidance and fine-tuning on high-quality data provide partial recovery from models trained on corrupted captions, but cannot fully compensate for poor pre-training data. We believe these insights can inform the development of large-scale text-to-video models, and we advocate for greater attention to the science of pre-training data.", "arxiv_id": "2607.18789", "arxiv_url": "https://arxiv.org/abs/2607.18789", "authors": ["Amber Yijia Zheng", "Lu Liu", "Raymond A. Yeh", "Xi Yin"], "brief": "\u672c\u6587\u63d0\u51fa Moving Alphabet \u7a0b\u5e8f\u5316\u6d4b\u8bd5\u5e73\u53f0\uff0c\u7528\u53ef\u63a7\u7684\u5b57\u6bcd\u8fd0\u52a8\u89c6\u9891\u7814\u7a76\u6587\u672c\u5230\u89c6\u9891\u751f\u6210\u4e2d\u7684\u8bad\u7ec3\u6570\u636e\u5206\u5e03\u4e0e\u5b57\u5e55\u8d28\u91cf\u5f71\u54cd\u3002\u5b9e\u9a8c\u53d1\u73b0\uff0c\u5185\u5bb9\u548c\u65f6\u957f\u5206\u5e03\u7684\u591a\u6837\u4e14\u5747\u8861\u5bf9\u6cdb\u5316\u5f88\u5173\u952e\uff0c\u5b57\u5e55\u8d28\u91cf\u663e\u8457\u5f71\u54cd\u6027\u80fd\u4e0e\u8bad\u7ec3\u6548\u7387\uff0c\u800c\u9ad8\u8d28\u91cf\u5fae\u8c03\u548c classifier-free guidance \u53ea\u80fd\u90e8\u5206\u5f25\u8865\u52a3\u8d28\u9884\u8bad\u7ec3\u6570\u636e\u7684\u635f\u5bb3\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18789", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u5230\u89c6\u9891\u751f\u6210", "\u6570\u636e\u8d28\u91cf", "\u89c6\u9891\u751f\u6210", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18789v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Moving Alphabet: A Controlled Study of Training Data for Text-to-Video Generation", "tldr": "\u672c\u6587\u63d0\u51fa Moving Alphabet \u7a0b\u5e8f\u5316\u6d4b\u8bd5\u5e73\u53f0\uff0c\u7528\u53ef\u63a7\u7684\u5b57\u6bcd\u8fd0\u52a8\u89c6\u9891\u7814\u7a76\u6587\u672c\u5230\u89c6\u9891\u751f\u6210\u4e2d\u7684\u8bad\u7ec3\u6570\u636e\u5206\u5e03\u4e0e\u5b57\u5e55\u8d28\u91cf\u5f71\u54cd\u3002\u5b9e\u9a8c\u53d1\u73b0\uff0c\u5185\u5bb9\u548c\u65f6\u957f\u5206\u5e03\u7684\u591a\u6837\u4e14\u5747\u8861\u5bf9\u6cdb\u5316\u5f88\u5173\u952e\uff0c\u5b57\u5e55\u8d28\u91cf\u663e\u8457\u5f71\u54cd\u6027\u80fd\u4e0e\u8bad\u7ec3\u6548\u7387\uff0c\u800c\u9ad8\u8d28\u91cf\u5fae\u8c03\u548c classifier-free guidance \u53ea\u80fd\u90e8\u5206\u5f25\u8865\u52a3\u8d28\u9884\u8bad\u7ec3\u6570\u636e\u7684\u635f\u5bb3\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We investigate whether a pretrained generative image-editing model can provide a common interface for numerical simulation. Physical inputs and solutions are rendered as images, while scalar quantities such as material properties, diffusivity, and loading parameters enter through lightweight adapters. Using established numerical and analytic solvers for supervision, we apply the same architecture and training protocol to heterogeneous elliptic equations, forced heat and Burgers evolution, complex Ginzburg-Landau dynamics, two-dimensional Navier-Stokes prediction, potential flow, elasticity, eikonal travel time, phase-field fracture, and entropic optimal transport. The results show that a pretrained image model can represent diverse static and time-dependent physical mappings, including unstable and shock-like behavior, when each task is expressed through a suitable visual encoding. This work is a capability study rather than an attempt to surpass specialized solvers. It also identifies fundamental constraints: image and latent representations complicate numerical range selection and direct enforcement of governing equations or invariants, while a failed Kuramoto-Sivashinsky experiment indicates that representation errors prevent meaningful long-horizon simulation of chaotic systems.", "arxiv_id": "2607.18787", "arxiv_url": "https://arxiv.org/abs/2607.18787", "authors": ["Ulysse Mizrahi"], "brief": "\u672c\u6587\u7814\u7a76\u9884\u8bad\u7ec3\u751f\u6210\u5f0f\u56fe\u50cf\u7f16\u8f91\u6a21\u578b\u662f\u5426\u80fd\u4f5c\u4e3a\u6570\u503c\u6a21\u62df\u7684\u901a\u7528\u63a5\u53e3\uff1a\u5c06\u7269\u7406\u8f93\u5165\u4e0e\u89e3\u6e32\u67d3\u4e3a\u56fe\u50cf\uff0c\u6807\u91cf\u53c2\u6570\u901a\u8fc7\u8f7b\u91cf\u9002\u914d\u5668\u6ce8\u5165\u3002\u5b9e\u9a8c\u8986\u76d6\u692d\u5706\u65b9\u7a0b\u3001\u70ed\u65b9\u7a0b\u3001Burgers\u3001Navier-Stokes\u3001\u5f39\u6027\u3001\u65ad\u88c2\u3001\u6700\u4f18\u4f20\u8f93\u7b49\u591a\u7c7b\u95ee\u9898\uff0c\u663e\u793a\u540c\u4e00\u67b6\u6784\u53ef\u5b66\u4e60\u591a\u6837\u9759\u6001\u4e0e\u65f6\u53d8\u7269\u7406\u6620\u5c04\uff0c\u4f46\u5728\u6570\u503c\u8303\u56f4\u3001\u7269\u7406\u7ea6\u675f enforcement \u548c\u6df7\u6c8c\u957f\u65f6\u6a21\u62df\u4e0a\u4ecd\u6709\u660e\u663e\u9650\u5236\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18787", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u50cf\u7f16\u8f91", "\u6570\u503c\u6a21\u62df", "\u751f\u6210\u6a21\u578b", "\u7269\u7406\u5efa\u6a21"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18787v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Image Editing Models are Numerical Solvers", "tldr": "\u672c\u6587\u7814\u7a76\u9884\u8bad\u7ec3\u751f\u6210\u5f0f\u56fe\u50cf\u7f16\u8f91\u6a21\u578b\u662f\u5426\u80fd\u4f5c\u4e3a\u6570\u503c\u6a21\u62df\u7684\u901a\u7528\u63a5\u53e3\uff1a\u5c06\u7269\u7406\u8f93\u5165\u4e0e\u89e3\u6e32\u67d3\u4e3a\u56fe\u50cf\uff0c\u6807\u91cf\u53c2\u6570\u901a\u8fc7\u8f7b\u91cf\u9002\u914d\u5668\u6ce8\u5165\u3002\u5b9e\u9a8c\u8986\u76d6\u692d\u5706\u65b9\u7a0b\u3001\u70ed\u65b9\u7a0b\u3001Burgers\u3001Navier-Stokes\u3001\u5f39\u6027\u3001\u65ad\u88c2\u3001\u6700\u4f18\u4f20\u8f93\u7b49\u591a\u7c7b\u95ee\u9898\uff0c\u663e\u793a\u540c\u4e00\u67b6\u6784\u53ef\u5b66\u4e60\u591a\u6837\u9759\u6001\u4e0e\u65f6\u53d8\u7269\u7406\u6620\u5c04\uff0c\u4f46\u5728\u6570\u503c\u8303\u56f4\u3001\u7269\u7406\u7ea6\u675f enforcement \u548c\u6df7\u6c8c\u957f\u65f6\u6a21\u62df\u4e0a\u4ecd\u6709\u660e\u663e\u9650\u5236\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Video multimodal large language models have shown strong capability in video understanding, yet their adaptation to sequentially evolving domains remains underexplored. In real-world deployments, video data often arrives continuously from heterogeneous domains, requiring the model to acquire new domain-specific knowledge without overwriting previously learned capabilities. Existing continual learning methods typically rely on shared adaptation spaces, which can induce severe cross-domain interference and catastrophic forgetting. We propose Distribution-Aware Expert Routing, a parameter-efficient framework for continual Video-MLLM adaptation over evolving domains. DAER maintains domain-isolated lightweight experts while keeping the pretrained Video-MLLM backbone frozen, thereby decoupling domain-specific adaptation from the general multimodal knowledge of the pretrained model. To enable fine-grained specialization, we introduce an intra-domain distribution-aware routing mechanism that matches each input to expert-level prototype reservoirs using MMD. To address the absence of task identities at inference time, we further propose an inter-domain routing mechanism that performs prototype matching in a discriminative subspace for robust domain identification. In addition, we introduce adaptive domain merging to improve parameter scalability and adopt a two-stage optimization strategy to stabilize expert specialization during continual learning. We evaluate DAER by curating a domain-incremental benchmark built from ten VidQA datasets covering diverse visual environments and reasoning demands. Experiments on two strong Video-MLLM backbones show that DAER consistently outperforms prior methods.", "arxiv_id": "2607.18716", "arxiv_url": "https://arxiv.org/abs/2607.18716", "authors": ["Rui Cheng", "Meixing Shi", "Yuxiang Cai", "Jingcai Guo", "Jianwei Yin", "Zhi Chen"], "brief": "\u672c\u6587\u7814\u7a76\u89c6\u9891\u591a\u6a21\u6001\u5927\u6a21\u578b\u5728\u8fde\u7eed\u53d8\u5316\u9886\u57df\u4e2d\u7684\u589e\u91cf\u9002\u5e94\u95ee\u9898\uff0c\u63d0\u51fa DAER\uff1a\u51bb\u7ed3\u9884\u8bad\u7ec3\u9aa8\u5e72\uff0c\u5e76\u4e3a\u4e0d\u540c\u9886\u57df\u7ef4\u62a4\u8f7b\u91cf\u4e13\u5bb6\u4ee5\u51cf\u5c11\u8de8\u57df\u5e72\u6270\u548c\u707e\u96be\u6027\u9057\u5fd8\u3002\u65b9\u6cd5\u901a\u8fc7\u57df\u5185\u5206\u5e03\u611f\u77e5\u8def\u7531\u3001\u57df\u95f4\u539f\u578b\u5339\u914d\u3001\u9886\u57df\u5408\u5e76\u548c\u4e24\u9636\u6bb5\u4f18\u5316\u63d0\u5347\u65e0\u4efb\u52a1\u6807\u8bc6\u63a8\u7406\u4e0b\u7684\u7a33\u5065\u6027\uff0c\u5728\u753110\u4e2a VidQA \u6570\u636e\u96c6\u6784\u5efa\u7684\u57fa\u51c6\u4e0a\u4f18\u4e8e\u5df2\u6709\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18716", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u6301\u7eed\u5b66\u4e60", "\u53c2\u6570\u9ad8\u6548\u5fae\u8c03"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18716v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Continual Video-MLLM Adaptation over Evolving Domains", "tldr": "\u672c\u6587\u7814\u7a76\u89c6\u9891\u591a\u6a21\u6001\u5927\u6a21\u578b\u5728\u8fde\u7eed\u53d8\u5316\u9886\u57df\u4e2d\u7684\u589e\u91cf\u9002\u5e94\u95ee\u9898\uff0c\u63d0\u51fa DAER\uff1a\u51bb\u7ed3\u9884\u8bad\u7ec3\u9aa8\u5e72\uff0c\u5e76\u4e3a\u4e0d\u540c\u9886\u57df\u7ef4\u62a4\u8f7b\u91cf\u4e13\u5bb6\u4ee5\u51cf\u5c11\u8de8\u57df\u5e72\u6270\u548c\u707e\u96be\u6027\u9057\u5fd8\u3002\u65b9\u6cd5\u901a\u8fc7\u57df\u5185\u5206\u5e03\u611f\u77e5\u8def\u7531\u3001\u57df\u95f4\u539f\u578b\u5339\u914d\u3001\u9886\u57df\u5408\u5e76\u548c\u4e24\u9636\u6bb5\u4f18\u5316\u63d0\u5347\u65e0\u4efb\u52a1\u6807\u8bc6\u63a8\u7406\u4e0b\u7684\u7a33\u5065\u6027\uff0c\u5728\u753110\u4e2a VidQA \u6570\u636e\u96c6\u6784\u5efa\u7684\u57fa\u51c6\u4e0a\u4f18\u4e8e\u5df2\u6709\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Generative world renderer AlayaRenderer receives structured world states exported from physics engines and synthesizes RGB frames. Unlike models that generate frames from text/control-hints prompts, AlayaRenderer preserves scene structure without altering the underlying world dynamics. This demonstrates an alternative path toward interactive world modeling and user-controllable play. However, the original AlayaRenderer is too computationally expensive for real-time deployment. This technical report introduces AlayaRenderer-Flash, a real-time-oriented generative forward world renderer that pushes AlayaRenderer from 0.56 FPS to 31.54 FPS, reaching the speed of play. AlayaRenderer-Flash reformulates the original renderer as a few-step autoregressive streaming model and introduces lightweight distilled codecs for efficient latent encoding and frame reconstruction. It retains the teacher model\u0027s G-buffer and text-prompt interfaces while enabling continuous rendering over input streams of unbounded length. We evaluate AlayaRenderer-Flash on G-buffer streams across content preservation, temporal consistency, cross-window stability, prompt controllability, and runtime efficiency. Our results show that AlayaRenderer-Flash substantially reduces inference cost while preserving the core rendering capabilities of the teacher model. By integrating AlayaRenderer-Flash with a physics engine, we build a fully playable generative world running at 30 FPS.", "arxiv_id": "2607.18703", "arxiv_url": "https://arxiv.org/abs/2607.18703", "authors": ["Guixu Lin", "Zheng-Hui Huang", "Siqi Yang", "Ming-Hsuan Yang", "Kaipeng Zhang", "Zhixiang Wang"], "brief": "\u672c\u6587\u63d0\u51fa AlayaRenderer-Flash\uff0c\u5c06\u57fa\u4e8e\u7269\u7406\u5f15\u64ce\u7ed3\u6784\u5316\u4e16\u754c\u72b6\u6001\u7684\u751f\u6210\u5f0f\u4e16\u754c\u6e32\u67d3\u5668\u6539\u9020\u6210\u5c11\u6b65\u81ea\u56de\u5f52\u6d41\u5f0f\u6a21\u578b\uff0c\u5e76\u7528\u8f7b\u91cf\u84b8\u998f\u7f16\u89e3\u7801\u5668\u63d0\u5347\u6f5c\u53d8\u91cf\u7f16\u7801\u4e0e\u91cd\u5efa\u6548\u7387\u3002\u76f8\u6bd4\u539f\u7248 AlayaRenderer\uff0c\u901f\u5ea6\u4ece 0.56 FPS \u63d0\u5347\u5230 31.54 FPS\uff0c\u57fa\u672c\u8fbe\u5230\u53ef\u4ea4\u4e92\u6e38\u73a9\u901f\u5ea6\uff0c\u540c\u65f6\u4fdd\u7559\u573a\u666f\u7ed3\u6784\u3001\u65f6\u95f4\u4e00\u81f4\u6027\u4e0e\u6587\u672c\u53ef\u63a7\u6027\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18703", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u751f\u6210\u5f0f\u6e32\u67d3", "\u5b9e\u65f6\u63a8\u7406", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18703v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Generative World Renderer at the Speed of Play", "tldr": "\u672c\u6587\u63d0\u51fa AlayaRenderer-Flash\uff0c\u5c06\u57fa\u4e8e\u7269\u7406\u5f15\u64ce\u7ed3\u6784\u5316\u4e16\u754c\u72b6\u6001\u7684\u751f\u6210\u5f0f\u4e16\u754c\u6e32\u67d3\u5668\u6539\u9020\u6210\u5c11\u6b65\u81ea\u56de\u5f52\u6d41\u5f0f\u6a21\u578b\uff0c\u5e76\u7528\u8f7b\u91cf\u84b8\u998f\u7f16\u89e3\u7801\u5668\u63d0\u5347\u6f5c\u53d8\u91cf\u7f16\u7801\u4e0e\u91cd\u5efa\u6548\u7387\u3002\u76f8\u6bd4\u539f\u7248 AlayaRenderer\uff0c\u901f\u5ea6\u4ece 0.56 FPS \u63d0\u5347\u5230 31.54 FPS\uff0c\u57fa\u672c\u8fbe\u5230\u53ef\u4ea4\u4e92\u6e38\u73a9\u901f\u5ea6\uff0c\u540c\u65f6\u4fdd\u7559\u573a\u666f\u7ed3\u6784\u3001\u65f6\u95f4\u4e00\u81f4\u6027\u4e0e\u6587\u672c\u53ef\u63a7\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision Language Models (VLMs) are well known for hallucinating non-existent objects in images. Objects with missing parts present a unique challenge for VLMs, stemming from both real-world knowledge bias and the scarcity of such images in training data. We present MissingBench-Verified, a benchmark designed to evaluate a specific and practically relevant scenario: when vision-language models fail to recognize that an essential component of an object has been removed. Across ten leading models, we observe consistent and significant failure rates that persist even when external tool evidence explicitly contradicts the model\u0027s visual perception. We further ask whether granting models access to image processing tools (e.g., cropping, contrast adjustment) enables autonomous inspection to resolve these failures. We find that existing mitigation strategies, including tool-assisted verification, autonomous visual reasoning, longer reasoning durations, and fine-tuning on an easier dataset, provide negligible improvement, indicating that this failure mode cannot be addressed through current prompting or post-hoc correction techniques. Our findings highlight a fundamental limitation of current VLM for inspection and monitoring tasks and underscore the need for architectural or training-level interventions that enable models to override internal expectations when confronted with contradictory evidence.", "arxiv_id": "2607.18673", "arxiv_url": "https://arxiv.org/abs/2607.18673", "authors": ["Wenqi Marshall Guo", "Qingyun Qian", "Shiyu Zhou", "Guoping Luo", "Shan Du"], "brief": "\u8bba\u6587\u63d0\u51fa MissingBench-Verified \u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u662f\u5426\u80fd\u53d1\u73b0\u7269\u4f53\u7f3a\u5931\u5173\u952e\u90e8\u4ef6\u3002\u5b9e\u9a8c\u663e\u793a\u5341\u4e2a\u4e3b\u6d41\u6a21\u578b\u666e\u904d\u5931\u8d25\uff0c\u5373\u4f7f\u6709\u5916\u90e8\u5de5\u5177\u8bc1\u636e\u3001\u56fe\u50cf\u5904\u7406\u5de5\u5177\u3001\u66f4\u957f\u63a8\u7406\u6216\u5fae\u8c03\u4e5f\u51e0\u4e4e\u65e0\u6539\u5584\uff0c\u66b4\u9732\u4e86\u5f53\u524d VLM \u5728\u68c0\u67e5\u4e0e\u76d1\u63a7\u4efb\u52a1\u4e2d\u7684\u57fa\u7840\u7f3a\u9677\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.18673", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001", "\u57fa\u51c6\u6d4b\u8bd5", "\u5e7b\u89c9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.18673v1", "published_at": "2026-07-21", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MissingBench-Verified: Probing Vision-Language Models\u0027 Inability to Detect Missing Object Parts", "tldr": "\u8bba\u6587\u63d0\u51fa MissingBench-Verified \u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u662f\u5426\u80fd\u53d1\u73b0\u7269\u4f53\u7f3a\u5931\u5173\u952e\u90e8\u4ef6\u3002\u5b9e\u9a8c\u663e\u793a\u5341\u4e2a\u4e3b\u6d41\u6a21\u578b\u666e\u904d\u5931\u8d25\uff0c\u5373\u4f7f\u6709\u5916\u90e8\u5de5\u5177\u8bc1\u636e\u3001\u56fe\u50cf\u5904\u7406\u5de5\u5177\u3001\u66f4\u957f\u63a8\u7406\u6216\u5fae\u8c03\u4e5f\u51e0\u4e4e\u65e0\u6539\u5584\uff0c\u66b4\u9732\u4e86\u5f53\u524d VLM \u5728\u68c0\u67e5\u4e0e\u76d1\u63a7\u4efb\u52a1\u4e2d\u7684\u57fa\u7840\u7f3a\u9677\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Video generation models achieve high visual quality but often struggle to generate physics-aware videos. Unlike rigid-body motion, which can be described by explicit trajectories or formulas, complex deformation dynamics remain challenging to synthesize. We observe that a lack of physical reasoning for localizing dynamic areas allows irrelevant regions to dilute the model\u0027s attention, leading to generation failure. In this paper, we propose DeforM, a reasoning-guided image-to-video generation framework that directs the model\u0027s focus toward physics-critical regions. To reason about and localize these critical regions, we introduce a VLM-guided physical reasoning module, DeforM-Reason, to identify target objects and generate spatial-temporal masks. For physical guidance, we develop two alternative strategies: DeforM-Free for training-free mechanism analysis and DeforM-Injection as a powerful training-based generator. Experimental results demonstrate that DeforM improves the realism of generated deformation scenarios, outperforming baseline models in both visual quality and physical consistency.", "arxiv_id": "2607.18664", "arxiv_url": "https://arxiv.org/abs/2607.18664", "authors": ["Yunyi Li", "Yu Qiao", "Yaohui Wang", "Xinyuan Chen"], "brief": "\u672c\u6587\u63d0\u51fa DeforM\uff0c\u4e00\u4e2a\u7531\u7269\u7406\u63a8\u7406\u5f15\u5bfc\u7684\u56fe\u751f\u89c6\u9891\u751f\u6210\u6846\u67b6\uff0c\u901a\u8fc7\u5b9a\u4f4d\u53d8\u5f62\u8fc7\u7a0b\u4e2d\u7269\u7406\u5173\u952e\u533a\u57df\u5e76\u751f\u6210\u65f6\u7a7a\u63a9\u7801\uff0c\u5f15\u5bfc\u6a21\u578b\u5173\u6ce8\u52a8\u6001\u533a\u57df\ let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
