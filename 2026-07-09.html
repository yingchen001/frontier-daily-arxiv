\u5bb6\u65cf\uff09\u9a8c\u8bc1\uff1a\u5355\u4e00\u4eba\u683c\u9002\u914d\u5668\u5bf9\u76ee\u6807\u7279\u8d28\u5448\u5355\u8c03\u5f71\u54cd\uff0c\u591a\u9002\u914d\u5668\u8fd1\u4f3c\u53ef\u52a0\u6027\u7ec4\u5408\uff0c\u6784\u5efa\u6df7\u5408\u4eba\u683c", "\u4eba\u683c\u8f74\u4e0e\u5b89\u5168\u76f8\u5173\u884c\u4e3a\u76f4\u63a5\u6302\u94a9\uff1a\u795e\u7ecf\u8d28\u8f74\u5f71\u54cd\u6a21\u578b\u632b\u8d25\u611f\u8868\u8fbe\uff0c\u5b9c\u4eba\u6027\u8f74\u5f71\u54cd\u8c04\u5a9a\uff08sycophancy\uff09\u7a0b\u5ea6", "\u5f15\u5165\u65e0\u76d1\u7763\u5fc3\u7406\u6d4b\u91cf\u6d41\u7a0b\uff0c\u4ece\u6a21\u578b\u8f93\u51fa\u4e2d\u81ea\u52a8\u6062\u590d\u56db\u4e2a\u53ef\u89e3\u91ca\u884c\u4e3a\u56e0\u5b50\uff1a\u8bed\u6c14\u3001\u4e3b\u52a8\u6027\u3001\u8bf4\u6559\u6027\u3001\u8ba4\u77e5\u8c28\u614e\u6027"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u4eba\u683c\u63a7\u5236", "\u6a21\u578b\u7f16\u8f91", "\u5b89\u5168\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07916v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Persona Cartography: Charting Language Model Personality Traits in Weight Space", "tldr": "\u7528OCEAN\u4eba\u683c\u6846\u67b6\u5728\u6743\u91cd\u7a7a\u95f4\u4e2d\u5206\u89e3\u3001\u6d4b\u91cf\u548c\u63a7\u5236\u5927\u8bed\u8a00\u6a21\u578b\u7684\u4eba\u683c\u7279\u8d28", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u4eba\u683c\u5236\u56fe\"\u65b9\u6cd5\uff0c\u5c06LLM\u7684\u884c\u4e3a\u6a21\u5f0f\uff08\u4eba\u683c\uff09\u6620\u5c04\u4e3a\u6743\u91cd\u7a7a\u95f4\u4e2d\u7684\u4f4d\u7f6e\uff0c\u8bad\u7ec3\u4f4e\u79e9\u9002\u914d\u5668\uff08LoRA\uff09\u6765\u653e\u5927\u6216\u6291\u5236OCEAN\u4e94\u5927\u4eba\u683c\u7ef4\u5ea6\uff08\u5f00\u653e\u6027\u3001\u5c3d\u8d23\u6027\u3001\u5916\u5411\u6027\u3001\u5b9c\u4eba\u6027\u3001\u795e\u7ecf\u8d28\uff09\uff0c\u5b9e\u73b0\u5bf9\u6a21\u578b\u4eba\u683c\u7684\u7cbe\u786e\u63a7\u5236\u4e0e\u7ec4\u5408\u3002", "why_notable": "\u9996\u6b21\u5c06\u5fc3\u7406\u5b66\u4eba\u683c\u6d4b\u91cf\uff08OCEAN\uff09\u4e0e\u6a21\u578b\u6743\u91cd\u7f16\u8f91\u7cfb\u7edf\u6027\u7ed3\u5408\uff0c\u4e3aLLM\u5b89\u5168\u5bf9\u9f50\u63d0\u4f9b\u53ef\u91cf\u5316\u3001\u53ef\u7ec4\u5408\u7684\u4eba\u683c\u63a7\u5236\u5de5\u5177\uff0c\u5bf9\u6a21\u578b\u884c\u4e3a\u53ef\u89e3\u91ca\u6027\u548c\u5b89\u5168\u7814\u7a76\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "With the growing adoption of VLMs, DMs, LLMs, and AFMs, these multimodal foundation models can inadvertently encode sensitive, copyrighted, biased, or unsafe cross-modal associations that originate from their training data. Retraining after deletion requests or policy updates is often impractical, and targeted forgetting remains difficult because knowledge is distributed across shared representations. Multimodal unlearning addresses this challenge by enabling selective removal across modalities while retaining overall utility. This survey offers a unified, system-oriented view of multimodal unlearning across vision, language, audio, and video, grounded in recent advances, emerging applications, and open problems. Our taxonomy enables systematic comparison across model architectures and modalities, clarifying trade-offs among deletion strength, retention, efficiency, reversibility, and robustness. This survey highlights open problems and practical considerations to support future research and deployment of multimodal unlearning. We release a curated repository: https://smsnobin77.github.io/Awesome-Multimodal-Unlearning/", "arxiv_id": "2607.07907", "arxiv_url": "https://arxiv.org/abs/2607.07907", "authors": ["Nobin Sarwar", "Shubhashis Roy Dipta", "Zheyuan Liu", "Vaidehi Patil"], "brief": "\u672c\u6587\u5bf9\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\uff08VLM\u3001DM\u3001LLM\u3001AFM\uff09\u4e2d\u7684\u673a\u5668\u9057\u5fd8\u6280\u672f\u8fdb\u884c\u5168\u9762\u7efc\u8ff0\uff0c\u63d0\u51fa\u7edf\u4e00\u5206\u7c7b\u4f53\u7cfb\uff0c\u8986\u76d6\u89c6\u89c9\u3001\u8bed\u8a00\u3001\u97f3\u9891\u3001\u89c6\u9891\u56db\u5927\u6a21\u6001\uff0c\u7cfb\u7edf\u6bd4\u8f83\u5404\u7c7b\u9009\u62e9\u6027\u9057\u5fd8\u65b9\u6cd5\u7684\u4f18\u52a3\u6743\u8861\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CR", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07907", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51fa\u8de8\u6a21\u6001\u9057\u5fd8\u7684\u7edf\u4e00\u5206\u7c7b\u6846\u67b6\uff0c\u6db5\u76d6\u5220\u9664\u5f3a\u5ea6\u3001\u4fdd\u7559\u6548\u7528\u3001\u6548\u7387\u3001\u53ef\u9006\u6027\u4e0e\u9c81\u68d2\u6027\u7b49\u591a\u7ef4\u5ea6\u6743\u8861", "\u68b3\u7406\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\u4e2d\u654f\u611f/\u7248\u6743/\u504f\u89c1/\u4e0d\u5b89\u5168\u8de8\u6a21\u6001\u5173\u8054\u7684\u9057\u5fd8\u6311\u6218\uff0c\u6307\u51fa\u77e5\u8bc6\u5206\u5e03\u4e8e\u5171\u4eab\u8868\u793a\u5bfc\u81f4\u5b9a\u5411\u9057\u5fd8\u56f0\u96be", "\u6574\u7406\u5e76\u5f00\u6e90\u76f8\u5173\u6570\u636e\u96c6\u3001\u57fa\u51c6\u53ca\u8bba\u6587\u4ed3\u5e93\uff0c\u5f52\u7eb3\u5f53\u524d\u5f00\u653e\u95ee\u9898\u4e0e\u5b9e\u9645\u90e8\u7f72\u8003\u91cf"], "keywords": ["\u673a\u5668\u9057\u5fd8", "\u591a\u6a21\u6001", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u4e0e\u9690\u79c1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07907v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Multimodal Unlearning Across Vision, Language, Video, and Audio: Survey of Methods, Datasets, and Benchmarks", "tldr": "\u9996\u4e2a\u8de8\u89c6\u89c9\u3001\u8bed\u8a00\u3001\u89c6\u9891\u3001\u97f3\u9891\u7684\u591a\u6a21\u6001\u673a\u5668\u9057\u5fd8\u7efc\u8ff0\uff0c\u7cfb\u7edf\u68b3\u7406\u65b9\u6cd5\u3001\u6570\u636e\u96c6\u4e0e\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\uff08VLM\u3001DM\u3001LLM\u3001AFM\uff09\u4e2d\u7684\u673a\u5668\u9057\u5fd8\u6280\u672f\u8fdb\u884c\u5168\u9762\u7efc\u8ff0\uff0c\u63d0\u51fa\u7edf\u4e00\u5206\u7c7b\u4f53\u7cfb\uff0c\u8986\u76d6\u89c6\u89c9\u3001\u8bed\u8a00\u3001\u97f3\u9891\u3001\u89c6\u9891\u56db\u5927\u6a21\u6001\uff0c\u7cfb\u7edf\u6bd4\u8f83\u5404\u7c7b\u9009\u62e9\u6027\u9057\u5fd8\u65b9\u6cd5\u7684\u4f18\u52a3\u6743\u8861\u3002", "why_notable": "\u968f\u7740\u591a\u6a21\u6001\u5927\u6a21\u578b\u5e7f\u6cdb\u90e8\u7f72\uff0c\u6570\u636e\u5220\u9664\u8bf7\u6c42\u4e0e\u5408\u89c4\u9700\u6c42\u65e5\u76ca\u8feb\u5207\uff0c\u673a\u5668\u9057\u5fd8\u662f\u907f\u514d\u91cd\u8bad\u7ec3\u7684\u5173\u952e\u6280\u672f\u8def\u5f84\uff1b\u672c\u7efc\u8ff0\u586b\u8865\u4e86\u8de8\u6a21\u6001\u9057\u5fd8\u7cfb\u7edf\u6027\u7814\u7a76\u7684\u7a7a\u767d\uff0c\u4e3a\u8be5\u9886\u57df\u63d0\u4f9b\u91cd\u8981\u53c2\u8003\u6846\u67b6\u3002"}, {"abstract": "Large language models (LLMs) are increasingly used for code generation, but they struggle to generate functional code free of security vulnerabilities. Prior work to improve the secure code generation abilities of such coding LLMs has largely focused on evaluating code functionality and security separately using different datasets, or focused on finding vulnerabilities post-generation. At the same time, the text-generation domain has seen significant work on alignment techniques, where models are tuned such that their outputs exhibit certain qualities (e.g., helpfulness, harmlessness). Of particular interest is task-vector arithmetic, where linear operations on LLM weights can be used to arbitrarily enhance alignment while incurring only minimal computational overhead. We develop a novel method, SecVecCoder, leveraging task vectors to produce trustworthy code that is simultaneously functional and secure without the need for post-generation adjustment. Across six coding LLMs from three families on the CodeGuard+ benchmark, SecVecCoder improves the rate of trustworthy code completions by 2.1-36.0 percentage points over the base model, with improvements on unseen CWE types reaching up to 39.1 percentage points. Since the effectiveness of the coding LLM relies only on changing the model weights, SecVecCoder requires no method-specific decoding and hence achieves a decoding latency within 0.6% of the base model\u0027s, on average.", "arxiv_id": "2607.07881", "arxiv_url": "https://arxiv.org/abs/2607.07881", "authors": ["Felix Wang", "Anudeep Das", "Mei Nagappan", "N. Asokan"], "brief": "\u63d0\u51faSecVecCoder\u65b9\u6cd5\uff0c\u901a\u8fc7\u5bf9LLM\u6743\u91cd\u8fdb\u884c\u4efb\u52a1\u5411\u91cf\u7ebf\u6027\u8fd0\u7b97\uff0c\u5728\u4e0d\u4fee\u6539\u89e3\u7801\u6d41\u7a0b\u7684\u524d\u63d0\u4e0b\uff0c\u540c\u65f6\u63d0\u5347\u4ee3\u7801\u7684\u529f\u80fd\u6027\u4e0e\u5b89\u5168\u6027\u3002", "categories": ["cs.SE", "cs.CR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07881", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5728CodeGuard+\u57fa\u51c6\u4e0a\u6d4b\u8bd56\u4e2a\u4ee3\u7801LLM\uff0c\u53ef\u4fe1\u4ee3\u7801\u751f\u6210\u7387\u63d0\u53472.1-36.0\u4e2a\u767e\u5206\u70b9", "\u5bf9\u672a\u89c1\u8fc7\u7684CWE\u6f0f\u6d1e\u7c7b\u578b\u6cdb\u5316\u80fd\u529b\u5f3a\uff0c\u63d0\u5347\u5e45\u5ea6\u6700\u9ad8\u8fbe39.1\u4e2a\u767e\u5206\u70b9", "\u4ec5\u4fee\u6539\u6a21\u578b\u6743\u91cd\uff0c\u65e0\u9700\u7279\u6b8a\u89e3\u7801\u7b56\u7565\uff0c\u63a8\u7406\u5ef6\u8fdf\u4ec5\u589e\u52a00.6%"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u5b89\u5168\u6f0f\u6d1e", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07881v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Functional and Secure Code Generation with Task Vectors", "tldr": "\u5229\u7528\u4efb\u52a1\u5411\u91cf\u7b97\u672f\u8ba9LLM\u540c\u65f6\u751f\u6210\u529f\u80fd\u6b63\u786e\u4e14\u65e0\u5b89\u5168\u6f0f\u6d1e\u7684\u4ee3\u7801", "upvotes": 0, "what_it_is": "\u63d0\u51faSecVecCoder\u65b9\u6cd5\uff0c\u901a\u8fc7\u5bf9LLM\u6743\u91cd\u8fdb\u884c\u4efb\u52a1\u5411\u91cf\u7ebf\u6027\u8fd0\u7b97\uff0c\u5728\u4e0d\u4fee\u6539\u89e3\u7801\u6d41\u7a0b\u7684\u524d\u63d0\u4e0b\uff0c\u540c\u65f6\u63d0\u5347\u4ee3\u7801\u7684\u529f\u80fd\u6027\u4e0e\u5b89\u5168\u6027\u3002", "why_notable": "\u9996\u6b21\u5c06\u4efb\u52a1\u5411\u91cf\u5bf9\u9f50\u6280\u672f\u5f15\u5165\u5b89\u5168\u4ee3\u7801\u751f\u6210\u9886\u57df\uff0c\u540c\u65f6\u517c\u987e\u529f\u80fd\u6027\u4e0e\u5b89\u5168\u6027\uff0c\u8ba1\u7b97\u5f00\u9500\u6781\u4f4e\u4e14\u5177\u5907\u8de8CWE\u7c7b\u578b\u7684\u6cdb\u5316\u80fd\u529b\uff0c\u5b9e\u7528\u4ef7\u503c\u663e\u8457\u3002"}, {"abstract": "The evolution of compute infrastructure has transformed multi-GPU systems into tightly integrated shared-memory structures. However, current software still mostly treats these coherent interconnects simply as high-speed networks. Simultaneously, the demand for serving Large Language Models under latency constraints has shifted GPU workload optimization from being throughput-driven to latency-bound, necessitating latency-oriented scaling methods beyond Tensor Parallelism (TP). Thus, we introduce CTA-pipelining, an execution paradigm designed to exploit shared-memory multi-GPU systems. As a latency-oriented spatial scaling technique, CTA-pipelining leverages dependencies at the Cooperative Thread Array level, enabling concurrent execution of dependent kernels across GPUs. We demonstrate its capability using CUTLASS, cuBLAS, and NCCL libraries on 8-GPU H200 and B200 systems. Results show on 2-layer GEMM, representing the MLP operation, CTA-pipelining reduces latency by up to 31.8% compared to micro-batching, and 29.6% compared to TP. It can also be combined with TP as an orthogonal scaling dimension to further push the latency boundary.", "arxiv_id": "2607.07862", "arxiv_url": "https://arxiv.org/abs/2607.07862", "authors": ["Tingkai Liu", "Muralidhar Andoorveedu", "Sanjoy Das", "Sanjay Patel", "Volodymyr Kindratenko"], "brief": "\u63d0\u51faCTA-pipelining\u6267\u884c\u8303\u5f0f\uff0c\u5229\u7528\u5171\u4eab\u5185\u5b58\u591aGPU\u7cfb\u7edf\u7684\u7d27\u8026\u5408\u4e92\u8054\u7279\u6027\uff0c\u5728CTA\uff08\u534f\u4f5c\u7ebf\u7a0b\u6570\u7ec4\uff09\u7ea7\u522b\u6316\u6398\u4f9d\u8d56\u5173\u7cfb\uff0c\u5b9e\u73b0\u8de8GPU\u7684\u76f8\u5173\u5185\u6838\u5e76\u53d1\u6267\u884c\uff0c\u4e13\u4e3aLLM\u4f4e\u5ef6\u8fdf\u63a8\u7406\u573a\u666f\u8bbe\u8ba1\u3002", "categories": ["cs.DC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07862", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5728CTA\u7ea7\u522b\u5efa\u7acb\u8de8GPU\u4f9d\u8d56\u5173\u7cfb\uff0c\u5141\u8bb8\u76f8\u90bb\u5c42\u7684\u8ba1\u7b97\u5728\u4e0d\u540cGPU\u4e0a\u6d41\u6c34\u7ebf\u5e76\u53d1\u6267\u884c\uff0c\u800c\u975e\u7b49\u5f85\u524d\u5c42\u5168\u90e8\u5b8c\u6210", "\u57288-GPU H200\u548cB200\u7cfb\u7edf\u4e0a\u9a8c\u8bc1\uff1a2\u5c42GEMM\uff08MLP\u64cd\u4f5c\uff09\u5ef6\u8fdf\u6bd4micro-batching\u964d\u4f4e31.8%\uff0c\u6bd4\u5f20\u91cf\u5e76\u884c\uff08TP\uff09\u964d\u4f4e29.6%", "\u4e0e\u5f20\u91cf\u5e76\u884c\u6b63\u4ea4\uff0c\u53ef\u7ec4\u5408\u4f7f\u7528\u8fdb\u4e00\u6b65\u538b\u7f29\u5ef6\u8fdf\u8fb9\u754c\uff0c\u652f\u6301CUTLASS\u3001cuBLAS\u3001NCCL\u7b49\u4e3b\u6d41\u5e93"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "\u591aGPU\u7cfb\u7edf", "\u5e76\u884c\u8ba1\u7b97", "\u5ef6\u8fdf\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07862v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CTA-Pipelining: A Latency-Oriented Spatial Scaling Method for Multi-GPU Systems", "tldr": "CTA\u6d41\u6c34\u7ebf\uff1a\u9762\u5411\u5ef6\u8fdf\u4f18\u5316\u7684\u591aGPU\u7a7a\u95f4\u6269\u5c55\u65b0\u8303\u5f0f\uff0c\u6700\u9ad8\u964d\u4f4e31.8%\u63a8\u7406\u5ef6\u8fdf", "upvotes": 0, "what_it_is": "\u63d0\u51faCTA-pipelining\u6267\u884c\u8303\u5f0f\uff0c\u5229\u7528\u5171\u4eab\u5185\u5b58\u591aGPU\u7cfb\u7edf\u7684\u7d27\u8026\u5408\u4e92\u8054\u7279\u6027\uff0c\u5728CTA\uff08\u534f\u4f5c\u7ebf\u7a0b\u6570\u7ec4\uff09\u7ea7\u522b\u6316\u6398\u4f9d\u8d56\u5173\u7cfb\uff0c\u5b9e\u73b0\u8de8GPU\u7684\u76f8\u5173\u5185\u6838\u5e76\u53d1\u6267\u884c\uff0c\u4e13\u4e3aLLM\u4f4e\u5ef6\u8fdf\u63a8\u7406\u573a\u666f\u8bbe\u8ba1\u3002", "why_notable": "\u5f53\u524d\u591aGPU\u8f6f\u4ef6\u6808\u5c06\u9ad8\u901f\u4e92\u8054\u4ec5\u89c6\u4e3a\u7f51\u7edc\u800c\u975e\u5171\u4eab\u5185\u5b58\uff0c\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u7d27\u8026\u5408\u591aGPU\u67b6\u6784\u7684\u786c\u4ef6\u7279\u6027\u8f6c\u5316\u4e3a\u5ef6\u8fdf\u4f18\u5316\u624b\u6bb5\uff0c\u586b\u8865\u4e86TP\u4e4b\u5916\u5ef6\u8fdf\u5bfc\u5411\u6269\u5c55\u65b9\u6cd5\u7684\u7a7a\u767d\uff0c\u5bf9LLM\u5728\u7ebf\u63a8\u7406\u670d\u52a1\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning (RL) research has increasingly shifted focus towards alignment, ensuring agents learn behaviors adhering to human values. While human demonstrations and feedback have proven crucial for alignment, existing approaches predominantly combine these signals using multi-stage pipelines designed for the contextual bandit framing of language generation. Yet little work explores how these complementary inputs can serve as a richer, interconnected signal for single-stage offline training in fully sequential decision-making environments. We propose Feedback Manipulation Regularization (FMR), an algorithm-agnostic method that harnesses evaluative feedback as a corrective signal to improve the alignment of imitation learning policies. We adapt Safety Gymnasium environments to be a principled testbed for alignment evaluation, demonstrating improved aptitude and up to a 98\\% reduction in misalignment across a range of imitation learning algorithms. FMR remains robust in limited data regimes, even when learning from scarce aligned and uninformative noisy demonstrations.", "arxiv_id": "2607.07859", "arxiv_url": "https://arxiv.org/abs/2607.07859", "authors": ["Benjamin Poole", "Minwoo Lee"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u7b97\u6cd5\u65e0\u5173\u7684\u65b9\u6cd5\u2014\u2014\u53cd\u9988\u64cd\u63a7\u6b63\u5219\u5316\uff08FMR\uff09\uff0c\u5c06\u8bc4\u4f30\u6027\u53cd\u9988\u4f5c\u4e3a\u4fee\u6b63\u4fe1\u53f7\u878d\u5165\u6a21\u4eff\u5b66\u4e60\uff0c\u5b9e\u73b0\u5355\u9636\u6bb5\u79bb\u7ebf\u8bad\u7ec3\u4e2d\u7684\u667a\u80fd\u4f53\u5bf9\u9f50\uff0c\u65e0\u9700\u591a\u9636\u6bb5\u6d41\u6c34\u7ebf\u3002", "categories": ["cs.AI", "cs.HC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07859", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["FMR\u4e0e\u5177\u4f53\u7b97\u6cd5\u65e0\u5173\uff0c\u53ef\u4e0e\u591a\u79cd\u6a21\u4eff\u5b66\u4e60\u7b97\u6cd5\u7ed3\u5408\u4f7f\u7528", "\u5728\u6539\u9020\u540e\u7684Safety Gymnasium\u73af\u5883\u4e2d\u9a8c\u8bc1\uff0c\u6700\u9ad8\u5b9e\u73b098%\u7684\u8bef\u5bf9\u9f50\u7387\u964d\u4f4e", "\u5728\u6570\u636e\u7a00\u7f3a\u573a\u666f\u4e0b\u4f9d\u7136\u9c81\u68d2\uff0c\u5373\u4f7f\u6f14\u793a\u6570\u636e\u542b\u566a\u58f0\u6216\u5bf9\u9f50\u8d28\u91cf\u5dee\u4e5f\u80fd\u6709\u6548\u5de5\u4f5c"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53\u5bf9\u9f50", "\u6a21\u4eff\u5b66\u4e60", "\u4eba\u7c7b\u53cd\u9988"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07859v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Feedback Manipulation Regularization: Enabling Offline Agent Alignment for Imitation Learning", "tldr": "\u63d0\u51faFMR\u65b9\u6cd5\uff0c\u5229\u7528\u8bc4\u4f30\u53cd\u9988\u4f5c\u4e3a\u4fee\u6b63\u4fe1\u53f7\uff0c\u63d0\u5347\u6a21\u4eff\u5b66\u4e60\u7b56\u7565\u7684\u4eba\u7c7b\u4ef7\u503c\u5bf9\u9f50\u6548\u679c", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u7b97\u6cd5\u65e0\u5173\u7684\u65b9\u6cd5\u2014\u2014\u53cd\u9988\u64cd\u63a7\u6b63\u5219\u5316\uff08FMR\uff09\uff0c\u5c06\u8bc4\u4f30\u6027\u53cd\u9988\u4f5c\u4e3a\u4fee\u6b63\u4fe1\u53f7\u878d\u5165\u6a21\u4eff\u5b66\u4e60\uff0c\u5b9e\u73b0\u5355\u9636\u6bb5\u79bb\u7ebf\u8bad\u7ec3\u4e2d\u7684\u667a\u80fd\u4f53\u5bf9\u9f50\uff0c\u65e0\u9700\u591a\u9636\u6bb5\u6d41\u6c34\u7ebf\u3002", "why_notable": "\u73b0\u6709\u5bf9\u9f50\u65b9\u6cd5\u591a\u4e3a\u591a\u9636\u6bb5\u6d41\u6c34\u7ebf\u4e14\u9488\u5bf9\u8bed\u8a00\u751f\u6210\u573a\u666f\uff0cFMR\u9996\u6b21\u7cfb\u7edf\u63a2\u7d22\u5728\u5b8c\u5168\u5e8f\u5217\u51b3\u7b56\u73af\u5883\u4e2d\u5355\u9636\u6bb5\u79bb\u7ebf\u5bf9\u9f50\uff0c\u586b\u8865\u4e86\u6a21\u4eff\u5b66\u4e60\u4e0e\u4eba\u7c7b\u53cd\u9988\u5bf9\u9f50\u4e4b\u95f4\u7684\u7814\u7a76\u7a7a\u767d\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Hierarchical Implicit Q-Learning (HIQL), an offline goal-conditioned RL method, selects subgoals by value-function advantages alone. This rule has two coupled failure modes. Optimistic bias treats lucky stochastic outcomes as skillful choices, and mode collapse reduces a multi-modal subgoal distribution to a single Gaussian mean that often falls in unreachable regions. We propose NFTR (Normalizing Flows subgoal policies with Triangle-slack Reweighting). A conditional Normalizing Flow replaces the Gaussian policy, and a closed-form mode-averaging result identifies NFs as the minimal generative class for AWR-based subgoal selection. A triangle slack score, built on the architectural triangle inequality without relying on distance accuracy, multiplicatively corrects the AWR weight to downweight subgoals whose detour cost exceeds average reachability. Triangle-slack vanishes on geodesics in deterministic MDPs and remains a conservative upper bound on composability violation under stochastic dynamics. The RWDR objective preserves AWR\u0027s population-level monotonic improvement and admits a three-term suboptimality decomposition. Together, these two ingredients yield subgoal selection that provably avoids the Gaussian collapse described above and remains stable under stochastic dynamics. GitHub page: https://github.com/erdemtbao/NFTR", "arxiv_id": "2607.07855", "arxiv_url": "https://arxiv.org/abs/2607.07855", "authors": ["Erdemt Bao", "Xing Lei", "Jun Chen"], "brief": "\u9488\u5bf9HIQL\u4e2d\u5b50\u76ee\u6807\u9009\u62e9\u7684\u4e24\u5927\u5931\u6548\u6a21\u5f0f\uff08\u4e50\u89c2\u504f\u5dee\u4e0e\u6a21\u5f0f\u574d\u584c\uff09\uff0c\u63d0\u51faNFTR\u65b9\u6cd5\uff1a\u7528\u6761\u4ef6\u5f52\u4e00\u5316\u6d41\u66ff\u4ee3\u9ad8\u65af\u7b56\u7565\uff0c\u5e76\u5f15\u5165\u57fa\u4e8e\u4e09\u89d2\u4e0d\u7b49\u5f0f\u7684\u677e\u5f1b\u5206\u6570\u5bf9AWR\u6743\u91cd\u8fdb\u884c\u4e58\u6cd5\u4fee\u6b63\uff0c\u4ece\u7406\u8bba\u4e0a\u4fdd\u8bc1\u5b50\u76ee\u6807\u6cbf\u6d4b\u5730\u7ebf\u9009\u53d6\u4e14\u5728\u968f\u673a\u52a8\u6001\u4e0b\u4fdd\u6301\u7a33\u5b9a\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07855", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u7406\u8bba\u8bc1\u660e\u5f52\u4e00\u5316\u6d41\u662fAWR\u5b50\u76ee\u6807\u9009\u62e9\u7684\u6700\u5c0f\u751f\u6210\u7c7b\uff0c\u4ece\u6839\u672c\u4e0a\u907f\u514d\u9ad8\u65af\u5747\u503c\u843d\u5165\u4e0d\u53ef\u8fbe\u533a\u57df\u7684\u6a21\u5f0f\u574d\u584c", "\u4e09\u89d2\u677e\u5f1b\u5206\u6570\u65e0\u9700\u7cbe\u786e\u8ddd\u79bb\u4f30\u8ba1\uff0c\u4ec5\u5229\u7528\u67b6\u6784\u4e09\u89d2\u4e0d\u7b49\u5f0f\u5bf9\u7ed5\u8def\u4ee3\u4ef7\u8fc7\u9ad8\u7684\u5b50\u76ee\u6807\u8fdb\u884c\u964d\u6743\uff0c\u5728\u786e\u5b9a\u6027MDP\u4e2d\u4e8e\u6d4b\u5730\u7ebf\u4e0a\u6052\u4e3a\u96f6", "RWDR\u76ee\u6807\u4fdd\u7559AWR\u7684\u79cd\u7fa4\u7ea7\u5355\u8c03\u6539\u8fdb\u6027\u8d28\uff0c\u5e76\u7ed9\u51fa\u4e09\u9879\u5b50\u4f18\u5316\u5206\u89e3\uff0c\u7406\u8bba\u4fdd\u8bc1\u5b8c\u6574"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u76ee\u6807\u6761\u4ef6RL", "\u5206\u5c42\u7b56\u7565", "\u5f52\u4e00\u5316\u6d41"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07855v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "NFTR: From Provable Mode-Averaging to Geodesic Subgoal Selection in Offline Goal-Conditioned RL", "tldr": "\u63d0\u51faNFTR\u65b9\u6cd5\uff0c\u7528\u5f52\u4e00\u5316\u6d41\u4e0e\u4e09\u89d2\u677e\u5f1b\u91cd\u52a0\u6743\u89e3\u51b3\u79bb\u7ebf\u76ee\u6807\u6761\u4ef6RL\u4e2d\u7684\u5b50\u76ee\u6807\u9009\u62e9\u5931\u6548\u95ee\u9898", "upvotes": 0, "what_it_is": "\u9488\u5bf9HIQL\u4e2d\u5b50\u76ee\u6807\u9009\u62e9\u7684\u4e24\u5927\u5931\u6548\u6a21\u5f0f\uff08\u4e50\u89c2\u504f\u5dee\u4e0e\u6a21\u5f0f\u574d\u584c\uff09\uff0c\u63d0\u51faNFTR\u65b9\u6cd5\uff1a\u7528\u6761\u4ef6\u5f52\u4e00\u5316\u6d41\u66ff\u4ee3\u9ad8\u65af\u7b56\u7565\uff0c\u5e76\u5f15\u5165\u57fa\u4e8e\u4e09\u89d2\u4e0d\u7b49\u5f0f\u7684\u677e\u5f1b\u5206\u6570\u5bf9AWR\u6743\u91cd\u8fdb\u884c\u4e58\u6cd5\u4fee\u6b63\uff0c\u4ece\u7406\u8bba\u4e0a\u4fdd\u8bc1\u5b50\u76ee\u6807\u6cbf\u6d4b\u5730\u7ebf\u9009\u53d6\u4e14\u5728\u968f\u673a\u52a8\u6001\u4e0b\u4fdd\u6301\u7a33\u5b9a\u3002", "why_notable": "\u9996\u6b21\u4ece\u53ef\u8bc1\u660e\u7684\u6a21\u5f0f\u5e73\u5747\u89d2\u5ea6\u5206\u6790\u79bb\u7ebf\u76ee\u6807\u6761\u4ef6RL\u5b50\u76ee\u6807\u9009\u62e9\u5931\u6548\uff0c\u63d0\u4f9b\u4e86\u7406\u8bba\u4e25\u683c\u4e14\u5b9e\u8df5\u53ef\u884c\u7684\u4fee\u590d\u65b9\u6848\uff0c\u5bf9\u5206\u5c42\u5f3a\u5316\u5b66\u4e60\u7684\u9c81\u68d2\u6027\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "Automated segmentation of cervical-spine MRI is increasingly used in clinical workflows, yet no fairness audit exists for this anatomy. We show that auditing these segmentation tasks is complicated by a common property of modern segmentation datasets: expert-annotated gold labels are expensive, so abundant machine-generated (silver) labels are added to limit annotation cost. This matters because the reference used to judge a model can itself be biased. In this study, we present the first fairness audit of cervical-spine MRI segmentation across sex, age, and race using the CSpineSeg dataset. We observe that the deployed model is demographically fair, but the choice of reference label, however, is not neutral. Because a dataset\u0027s silver labels are generated by a model trained on its gold labels, any new model trained on those same gold labels agrees more with the silver labels than with expert truth: scoring identical predictions against silver rather than gold overestimates performance by ~8 Dice points and turns the fairness verdict for age from non-significant to significant - not by the gap inflation Parikh et al. report (which we term false magnitude) but by collapsing within-group variance (which we term false confidence). Reference-label provenance is thus a first-order confounder in segmentation evaluation: performance and fairness should be reported against expert labels, and any fairness claim stated together with the provenance of its reference.", "arxiv_id": "2607.07852", "arxiv_url": "https://arxiv.org/abs/2607.07852", "authors": ["Linus Juni", "Aasa Feragen", "Aditya Parikh"], "brief": "\u672c\u6587\u5bf9\u9888\u690eMRI\u5206\u5272\u6a21\u578b\u8fdb\u884c\u9996\u6b21\u516c\u5e73\u6027\u5ba1\u8ba1\uff0c\u63ed\u793a\u673a\u5668\u751f\u6210\u7684\"\u94f6\u6807\u7b7e\"\u76f8\u6bd4\u4e13\u5bb6\"\u91d1\u6807\u7b7e\"\u4f1a\u7cfb\u7edf\u6027\u9ad8\u4f30\u6027\u80fd\u7ea68\u4e2aDice\u70b9\uff0c\u5e76\u5c06\u5e74\u9f84\u7ec4\u7684\u516c\u5e73\u6027\u7ed3\u8bba\u4ece\u4e0d\u663e\u8457\u53d8\u4e3a\u663e\u8457\uff0c\u63d0\u51fa\"\u865a\u5047\u7f6e\u4fe1\u5ea6\"\u8fd9\u4e00\u65b0\u578b\u504f\u5dee\u673a\u5236\u3002", "categories": ["eess.IV", "cs.CV", "cs.CY", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07852", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u94f6\u6807\u7b7e\uff08\u673a\u5668\u751f\u6210\uff09\u4e0e\u91d1\u6807\u7b7e\uff08\u4e13\u5bb6\u6807\u6ce8\uff09\u8bc4\u4f30\u540c\u4e00\u6a21\u578b\u65f6\uff0cDice\u5206\u6570\u5dee\u5f02\u7ea68\u4e2a\u70b9\uff0c\u4e14\u4f1a\u6539\u53d8\u516c\u5e73\u6027\u5ba1\u8ba1\u7ed3\u8bba", "\u63d0\u51fa\u4e24\u79cd\u504f\u5dee\u7c7b\u578b\uff1afalse magnitude\uff08\u5dee\u8ddd\u81a8\u80c0\uff09\u548cfalse confidence\uff08\u7ec4\u5185\u65b9\u5dee\u574d\u7f29\uff09\uff0c\u540e\u8005\u662f\u672c\u6587\u53d1\u73b0\u7684\u65b0\u673a\u5236", "\u53c2\u8003\u6807\u7b7e\u6765\u6e90\uff08provenance\uff09\u662f\u5206\u5272\u8bc4\u4f30\u4e2d\u7684\u4e00\u9636\u6df7\u6dc6\u56e0\u7d20\uff0c\u516c\u5e73\u6027\u58f0\u660e\u5fc5\u987b\u6ce8\u660e\u53c2\u8003\u6807\u7b7e\u7c7b\u578b"], "keywords": ["\u533b\u7597\u5f71\u50cf", "\u516c\u5e73\u6027\u5ba1\u8ba1", "\u56fe\u50cf\u5206\u5272", "\u504f\u5dee\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07852v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "False Confidence: Automated Labels Confound Fairness Audits in Cervical Spine Segmentation", "tldr": "\u94f6\u6807\u7b7e\u504f\u5dee\u5bfc\u81f4\u9888\u690eMRI\u5206\u5272\u516c\u5e73\u6027\u5ba1\u8ba1\u7ed3\u8bba\u5931\u771f\uff0c\u53c2\u8003\u6807\u7b7e\u6765\u6e90\u662f\u4e00\u9636\u6df7\u6dc6\u56e0\u7d20", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9\u9888\u690eMRI\u5206\u5272\u6a21\u578b\u8fdb\u884c\u9996\u6b21\u516c\u5e73\u6027\u5ba1\u8ba1\uff0c\u63ed\u793a\u673a\u5668\u751f\u6210\u7684\"\u94f6\u6807\u7b7e\"\u76f8\u6bd4\u4e13\u5bb6\"\u91d1\u6807\u7b7e\"\u4f1a\u7cfb\u7edf\u6027\u9ad8\u4f30\u6027\u80fd\u7ea68\u4e2aDice\u70b9\uff0c\u5e76\u5c06\u5e74\u9f84\u7ec4\u7684\u516c\u5e73\u6027\u7ed3\u8bba\u4ece\u4e0d\u663e\u8457\u53d8\u4e3a\u663e\u8457\uff0c\u63d0\u51fa\"\u865a\u5047\u7f6e\u4fe1\u5ea6\"\u8fd9\u4e00\u65b0\u578b\u504f\u5dee\u673a\u5236\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u6570\u636e\u96c6\u4e2d\u94f6\u6807\u7b7e\u5bf9\u516c\u5e73\u6027\u5ba1\u8ba1\u7684\u6df7\u6dc6\u6548\u5e94\uff0c\u5bf9\u533b\u7597AI\u8bc4\u4f30\u89c4\u8303\u5177\u6709\u91cd\u8981\u65b9\u6cd5\u8bba\u610f\u4e49\uff0c\u63d0\u9192\u7814\u7a76\u8005\u548c\u76d1\u7ba1\u8005\u4e0d\u80fd\u5ffd\u89c6\u53c2\u8003\u6807\u7b7e\u6765\u6e90"}, {"abstract": "The Hessian of the training loss governs the local geometry of the loss landscape, yet despite existing explanations for its largest eigenvalues, the origin of the vast multitude of vanishingly small eigenvalues remains elusive. We argue that the bulk consists of the weakly lifted pseudo-Goldstone modes of the continuous symmetries of the network parametrization. In deep linear networks these symmetries are exact: they generate flat directions and hence exact zero modes, whose eigenvectors we construct explicitly. Introducing a ReLU nonlinearity as a perturbation, we show that it breaks these symmetries weakly and explicitly. Resolving the spectrum at the level of eigenvectors, we find that the high-curvature directions are orthogonal to the symmetry subspace, while the bulk lies almost entirely within it. We demonstrate the mechanism in a two-layer ReLU student--teacher model and in a network trained on CIFAR-10. A convolutional example demonstrates that the same diagnostic extends beyond fully connected layers. Together, these results link the Hessian bulk to weakly broken symmetries and clarify the origin of near-zero modes.", "arxiv_id": "2607.07845", "arxiv_url": "https://arxiv.org/abs/2607.07845", "authors": ["Marcel K\u00fchn", "Bernd Rosenow"], "brief": "\u672c\u6587\u63ed\u793a\u4e86\u795e\u7ecf\u7f51\u7edc\u8bad\u7ec3\u635f\u5931Hessian\u77e9\u9635\u4e2d\u5927\u91cf\u8fd1\u96f6\u7279\u5f81\u503c\u7684\u8d77\u6e90\uff1a\u5b83\u4eec\u5bf9\u5e94\u4e8e\u7f51\u7edc\u53c2\u6570\u5316\u8fde\u7eed\u5bf9\u79f0\u6027\u88ab\u5f31\u7834\u7f3a\u540e\u4ea7\u751f\u7684\u4f2aGoldstone\u6a21\u5f0f\uff0c\u5e76\u5728\u6df1\u5ea6\u7ebf\u6027\u7f51\u7edc\u3001ReLU\u7f51\u7edc\u53ca\u5377\u79ef\u7f51\u7edc\u4e2d\u9a8c\u8bc1\u4e86\u8fd9\u4e00\u673a\u5236\u3002", "categories": ["cs.LG", "cond-mat.dis-nn"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07845", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6df1\u5ea6\u7ebf\u6027\u7f51\u7edc\u4e2d\u53c2\u6570\u5316\u5177\u6709\u7cbe\u786e\u8fde\u7eed\u5bf9\u79f0\u6027\uff0c\u4ea7\u751f\u7cbe\u786e\u96f6\u6a21\uff08flat directions\uff09\uff0c\u5e76\u663e\u5f0f\u6784\u9020\u4e86\u5bf9\u5e94\u7279\u5f81\u5411\u91cf", "ReLU\u975e\u7ebf\u6027\u4f5c\u4e3a\u5fae\u6270\u5f31\u7834\u7f3a\u8fd9\u4e9b\u5bf9\u79f0\u6027\uff0c\u5c06\u96f6\u6a21\u63d0\u5347\u4e3a\u8fd1\u96f6\u7684\u4f2aGoldstone\u6a21\u5f0f\uff0c\u6784\u6210Hessian\u8c31\u7684bulk\u90e8\u5206", "\u9ad8\u66f2\u7387\u65b9\u5411\u4e0e\u5bf9\u79f0\u5b50\u7a7a\u95f4\u6b63\u4ea4\uff0c\u800cbulk\u7279\u5f81\u5411\u91cf\u51e0\u4e4e\u5b8c\u5168\u843d\u5728\u5bf9\u79f0\u5b50\u7a7a\u95f4\u5185\uff0c\u5728\u4e24\u5c42ReLU\u5b66\u751f-\u6559\u5e08\u6a21\u578b\u548cCIFAR-10\u8bad\u7ec3\u7f51\u7edc\u4e2d\u5747\u5f97\u5230\u9a8c\u8bc1"], "keywords": ["\u635f\u5931\u666f\u89c2", "\u4f18\u5316\u7406\u8bba", "\u6df1\u5ea6\u5b66\u4e60\u7406\u8bba", "\u5bf9\u79f0\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07845v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Explaining Near-Zero Hessian Eigenvalues Through Approximate Symmetries in Neural Networks", "tldr": "\u795e\u7ecf\u7f51\u7edcHessian\u77e9\u9635\u8fd1\u96f6\u7279\u5f81\u503c\u6e90\u4e8e\u53c2\u6570\u5316\u7684\u8fd1\u4f3c\u8fde\u7eed\u5bf9\u79f0\u6027\uff08\u4f2aGoldstone\u6a21\u5f0f\uff09", "upvotes": 0, "what_it_is": "\u672c\u6587\u63ed\u793a\u4e86\u795e\u7ecf\u7f51\u7edc\u8bad\u7ec3\u635f\u5931Hessian\u77e9\u9635\u4e2d\u5927\u91cf\u8fd1\u96f6\u7279\u5f81\u503c\u7684\u8d77\u6e90\uff1a\u5b83\u4eec\u5bf9\u5e94\u4e8e\u7f51\u7edc\u53c2\u6570\u5316\u8fde\u7eed\u5bf9\u79f0\u6027\u88ab\u5f31\u7834\u7f3a\u540e\u4ea7\u751f\u7684\u4f2aGoldstone\u6a21\u5f0f\uff0c\u5e76\u5728\u6df1\u5ea6\u7ebf\u6027\u7f51\u7edc\u3001ReLU\u7f51\u7edc\u53ca\u5377\u79ef\u7f51\u7edc\u4e2d\u9a8c\u8bc1\u4e86\u8fd9\u4e00\u673a\u5236\u3002", "why_notable": "\u9996\u6b21\u4ece\u7269\u7406\u5b66\u5bf9\u79f0\u6027\u81ea\u53d1\u7834\u7f3a\uff08Goldstone\u5b9a\u7406\uff09\u89c6\u89d2\u7cfb\u7edf\u89e3\u91ca\u4e86\u795e\u7ecf\u7f51\u7edcHessian\u8c31bulk\u7684\u8d77\u6e90\uff0c\u4e3a\u7406\u89e3\u635f\u5931\u666f\u89c2\u51e0\u4f55\u3001\u4f18\u5316\u52a8\u529b\u5b66\u53ca\u6cdb\u5316\u63d0\u4f9b\u4e86\u65b0\u7684\u7406\u8bba\u6846\u67b6\uff0c\u5177\u6709\u91cd\u8981\u7684\u7406\u8bba\u4ef7\u503c\u3002"}, {"abstract": "While closed-loop motion planners trained on large-scale, object-level datasets, e.g., nuPlan, demonstrate strong in-distribution (ID) performance, their generalization to novel urban topologies and recovery mechanisms following execution perturbations remain under-explored. To address this, we present Shift \u0026 Drift, a novel dual-track benchmark designed to rigorously stress-test motion planners across two critical axes of distribution shift: (1) The Semantic Shift Track leverages a novel conversion pipeline that transforms the aerial, DeepScenario Open 3D dataset into the nuPlan simulation framework. This enables zero-shot evaluation of planners trained on North American and Singaporean data against 1,182 scenarios spanning four German cities and the US city of San Francisco featuring dense pedestrian-cyclist interactions. (2) The State-Distribution Drift Track injects stochastic perturbations into the ego vehicle\u0027s dynamics to quantify robustness against compounding execution errors. Based on this, we systematically evaluate the failure modes of diverse planning paradigms under semantic and state-distribution shifts. While imitation learning methods achieve high scores in ID benchmarks, they exhibit significant failures under semantic shift, particularly in pedestrian-dense environments, and suffer from persistent drift when subjected to temporally correlated actuation noise. In contrast, the evaluated reinforcement-learning-based planner demonstrates more graceful degradation, maintaining higher safety and progress metrics across both tracks. Our findings reveal an empirical trade-off between imitation fidelity and closed-loop resilience, providing the community with a rigorous benchmark to evaluate progress toward reliable deployment.", "arxiv_id": "2607.07844", "arxiv_url": "https://arxiv.org/abs/2607.07844", "authors": ["Alessandro Canevaro", "Hang Yu", "Julian Schmidt", "Peizheng Li", "Silvan Lindner", "Wilhelm Stork", "Georg Martius", "Julian Jordan"], "brief": "\u63d0\u51faShift \u0026 Drift\u53cc\u8f68\u57fa\u51c6\uff0c\u901a\u8fc7\u8bed\u4e49\u8fc1\u79fb\uff08\u8de8\u57ce\u5e02/\u8de8\u6570\u636e\u96c6\u96f6\u6837\u672c\u8bc4\u4f30\uff09\u548c\u72b6\u6001\u5206\u5e03\u6f02\u79fb\uff08\u968f\u673a\u6267\u884c\u6270\u52a8\u6ce8\u5165\uff09\u4e24\u4e2a\u7ef4\u5ea6\uff0c\u7cfb\u7edf\u538b\u529b\u6d4b\u8bd5\u81ea\u52a8\u9a7e\u9a76\u8fd0\u52a8\u89c4\u5212\u5668\u7684\u6cdb\u5316\u6027\u4e0e\u9c81\u68d2\u6027\u3002", "categories": ["cs.RO", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07844", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bed\u4e49\u8fc1\u79fb\u8f68\u9053\uff1a\u5c06DeepScenario Open 3D\u822a\u62cd\u6570\u636e\u96c6\u8f6c\u6362\u4e3anuPlan\u4eff\u771f\u6846\u67b6\uff0c\u8986\u76d6\u5fb7\u56fd4\u5ea7\u57ce\u5e02+\u65e7\u91d1\u5c71\u51711182\u4e2a\u573a\u666f\uff0c\u5b9e\u73b0\u96f6\u6837\u672c\u8de8\u57df\u8bc4\u4f30", "\u72b6\u6001\u6f02\u79fb\u8f68\u9053\uff1a\u5411\u81ea\u8f66\u52a8\u529b\u5b66\u6ce8\u5165\u968f\u673a\u6270\u52a8\uff0c\u91cf\u5316\u89c4\u5212\u5668\u5bf9\u65f6\u5e8f\u76f8\u5173\u6267\u884c\u566a\u58f0\u7684\u9c81\u68d2\u6027", "\u5b9e\u9a8c\u53d1\u73b0\uff1a\u6a21\u4eff\u5b66\u4e60\u65b9\u6cd5\u5728\u5206\u5e03\u5185\u8868\u73b0\u4f18\u5f02\uff0c\u4f46\u5728\u884c\u4eba\u5bc6\u96c6\u573a\u666f\u548c\u6267\u884c\u6270\u52a8\u4e0b\u663e\u8457\u5931\u6548\uff1b\u5f3a\u5316\u5b66\u4e60\u89c4\u5212\u5668\u5c55\u73b0\u66f4\u4f18\u96c5\u7684\u6027\u80fd\u9000\u5316\uff0c\u5b89\u5168\u6027\u548c\u8fdb\u5ea6\u6307\u6807\u66f4\u7a33\u5065"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u8fd0\u52a8\u89c4\u5212", "\u5f3a\u5316\u5b66\u4e60", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07844v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Shift \u0026 Drift: A Zero-Shot Benchmark for Generalizable and Robust Autonomous Driving Motion Planning", "tldr": "Shift \u0026 Drift\uff1a\u8bc4\u4f30\u81ea\u52a8\u9a7e\u9a76\u8fd0\u52a8\u89c4\u5212\u5668\u5728\u8bed\u4e49\u8fc1\u79fb\u548c\u72b6\u6001\u6270\u52a8\u4e0b\u6cdb\u5316\u80fd\u529b\u7684\u96f6\u6837\u672c\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faShift \u0026 Drift\u53cc\u8f68\u57fa\u51c6\uff0c\u901a\u8fc7\u8bed\u4e49\u8fc1\u79fb\uff08\u8de8\u57ce\u5e02/\u8de8\u6570\u636e\u96c6\u96f6\u6837\u672c\u8bc4\u4f30\uff09\u548c\u72b6\u6001\u5206\u5e03\u6f02\u79fb\uff08\u968f\u673a\u6267\u884c\u6270\u52a8\u6ce8\u5165\uff09\u4e24\u4e2a\u7ef4\u5ea6\uff0c\u7cfb\u7edf\u538b\u529b\u6d4b\u8bd5\u81ea\u52a8\u9a7e\u9a76\u8fd0\u52a8\u89c4\u5212\u5668\u7684\u6cdb\u5316\u6027\u4e0e\u9c81\u68d2\u6027\u3002", "why_notable": "\u63ed\u793a\u4e86\u6a21\u4eff\u4fdd\u771f\u5ea6\u4e0e\u95ed\u73af\u9c81\u68d2\u6027\u4e4b\u95f4\u7684\u7ecf\u9a8c\u6027\u6743\u8861\uff0c\u586b\u8865\u4e86\u73b0\u6709\u5927\u89c4\u6a21\u9a7e\u9a76\u57fa\u51c6\u5728\u8de8\u57df\u6cdb\u5316\u548c\u6267\u884c\u9c81\u68d2\u6027\u8bc4\u4f30\u4e0a\u7684\u7a7a\u767d\uff0c\u4e3a\u53ef\u9760\u90e8\u7f72\u63d0\u4f9b\u4e25\u683c\u7684\u8bc4\u6d4b\u5de5\u5177\u3002"}, {"abstract": "Gradient estimation -- the task of computing the gradient of the expected value of a probabilistic program -- has diverse applications in scientific computing, but is notoriously difficult because of issues such as high-dimensional integration, discrete random choices, and complex stochastic dependencies. This article introduces gradient inference, a new approach to developing sound and efficient gradient estimators for probabilistic programs. Gradient inference rests on a formal reduction from a gradient estimation problem to a closely related probabilistic inference problem, whose solution can be differentiated to obtain a gradient estimator. This inference problem is obtained by applying two powerful statistical operations -- coupling and factorization -- to the input probabilistic program. Our reduction lets us leverage the rich toolkit of probabilistic inference algorithms to design novel gradient estimators that extend and improve upon existing methods. We introduce GradInf, a probabilistic programming system that facilitates the sound and automated implementation of gradient inference. GradInf is centered around programmable source-to-source transformations for coupling and factorizing higher-order probabilistic programs, whose soundness is proven in terms of a denotational semantics. Key to our development is the use of information-flow typing to allow random choices in a probabilistic program to be factored out and partially evaluated, which improves our ability to deploy sophisticated probabilistic inference algorithms. The resulting system offers practitioners a principled framework for designing gradient estimators. We apply GradInf to several challenging case studies, showing that it can express prominent gradient estimators from the literature and enables the construction of new state-of-the-art estimators that outperform the best existing baselines.", "arxiv_id": "2607.07840", "arxiv_url": "https://arxiv.org/abs/2607.07840", "authors": ["Gaurav Arya", "Mathieu Huot", "Moritz Schauer", "Alexander K. Lew", "Feras A. Saad"], "brief": "\u63d0\u51fa\u68af\u5ea6\u63a8\u65ad\uff08Gradient Inference\uff09\u65b9\u6cd5\uff0c\u5c06\u6982\u7387\u7a0b\u5e8f\u7684\u68af\u5ea6\u4f30\u8ba1\u95ee\u9898\u5f62\u5f0f\u5316\u89c4\u7ea6\u4e3a\u76f8\u5173\u7684\u6982\u7387\u63a8\u65ad\u95ee\u9898\uff0c\u5e76\u57fa\u4e8e\u6b64\u6784\u5efa\u4e86\u53ef\u7f16\u7a0b\u7cfb\u7edfGradInf\uff0c\u652f\u6301\u81ea\u52a8\u5316\u3001\u53ef\u9760\u7684\u68af\u5ea6\u4f30\u8ba1\u5668\u8bbe\u8ba1\u3002", "categories": ["cs.PL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07840", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u601d\u8def\uff1a\u901a\u8fc7\u8026\u5408\uff08coupling\uff09\u548c\u56e0\u5b50\u5206\u89e3\uff08factorization\uff09\u4e24\u79cd\u7edf\u8ba1\u64cd\u4f5c\uff0c\u5c06\u68af\u5ea6\u4f30\u8ba1\u95ee\u9898\u8f6c\u5316\u4e3a\u6982\u7387\u63a8\u65ad\u95ee\u9898\uff0c\u518d\u5bf9\u5176\u89e3\u6c42\u5bfc\u5f97\u5230\u68af\u5ea6\u4f30\u8ba1\u5668", "\u7cfb\u7edf\u5b9e\u73b0\uff1aGradInf\u57fa\u4e8e\u9ad8\u9636\u6982\u7387\u7a0b\u5e8f\u7684\u6e90\u5230\u6e90\u53d8\u6362\uff0c\u7ed3\u5408\u4fe1\u606f\u6d41\u7c7b\u578b\u7cfb\u7edf\uff08information-flow typing\uff09\u5b9e\u73b0\u968f\u673a\u53d8\u91cf\u7684\u56e0\u5b50\u5206\u89e3\u4e0e\u90e8\u5206\u6c42\u503c\uff0c\u6b63\u786e\u6027\u7531\u6307\u79f0\u8bed\u4e49\u4fdd\u8bc1", "\u5b9e\u9a8c\u6548\u679c\uff1a\u80fd\u591f\u590d\u73b0\u6587\u732e\u4e2d\u4e3b\u6d41\u68af\u5ea6\u4f30\u8ba1\u5668\uff0c\u5e76\u6784\u9020\u51fa\u8d85\u8d8a\u73b0\u6709\u6700\u4f18\u57fa\u7ebf\u7684\u65b0\u578b\u4f30\u8ba1\u5668"], "keywords": ["\u6982\u7387\u7f16\u7a0b", "\u68af\u5ea6\u4f30\u8ba1", "\u6982\u7387\u63a8\u65ad", "\u7a0b\u5e8f\u53d8\u6362"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07840v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "GradInf: Gradient Estimation as Probabilistic Inference", "tldr": "\u5c06\u68af\u5ea6\u4f30\u8ba1\u95ee\u9898\u89c4\u7ea6\u4e3a\u6982\u7387\u63a8\u65ad\u95ee\u9898\uff0c\u6784\u5efa\u65b0\u578b\u68af\u5ea6\u4f30\u8ba1\u6846\u67b6GradInf", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u68af\u5ea6\u63a8\u65ad\uff08Gradient Inference\uff09\u65b9\u6cd5\uff0c\u5c06\u6982\u7387\u7a0b\u5e8f\u7684\u68af\u5ea6\u4f30\u8ba1\u95ee\u9898\u5f62\u5f0f\u5316\u89c4\u7ea6\u4e3a\u76f8\u5173\u7684\u6982\u7387\u63a8\u65ad\u95ee\u9898\uff0c\u5e76\u57fa\u4e8e\u6b64\u6784\u5efa\u4e86\u53ef\u7f16\u7a0b\u7cfb\u7edfGradInf\uff0c\u652f\u6301\u81ea\u52a8\u5316\u3001\u53ef\u9760\u7684\u68af\u5ea6\u4f30\u8ba1\u5668\u8bbe\u8ba1\u3002", "why_notable": "\u9996\u6b21\u5c06\u68af\u5ea6\u4f30\u8ba1\u4e0e\u6982\u7387\u63a8\u65ad\u7edf\u4e00\u5728\u4e25\u683c\u7684\u5f62\u5f0f\u6846\u67b6\u4e0b\uff0c\u4f7f\u5f97\u6982\u7387\u63a8\u65ad\u9886\u57df\u7684\u4e30\u5bcc\u7b97\u6cd5\u5de5\u5177\u7bb1\u53ef\u76f4\u63a5\u7528\u4e8e\u8bbe\u8ba1\u68af\u5ea6\u4f30\u8ba1\u5668\uff0c\u4e3a\u79d1\u5b66\u8ba1\u7b97\u548c\u673a\u5668\u5b66\u4e60\u4e2d\u7684\u968f\u673a\u4f18\u5316\u63d0\u4f9b\u4e86\u539f\u5219\u6027\u3001\u53ef\u6269\u5c55\u7684\u65b0\u8303\u5f0f\u3002"}, {"abstract": "EEG-based emotion recognition is critical for mental health monitoring and affective brain-computer interfaces, yet existing deep learning approaches often treat emotion classes as isolated labels, ignoring their psychological interdependencies. We propose a graph-regularized learning framework that conceptualizes emotions as nodes in a graph where edges encode proximity based on dimensional emotion theories. We adapt three complementary regularization strategies--Graph Label Smoothing (intuitive soft labeling), Commuting distance on graph via Graph Laplacian (spectral graph theory), and Sliced Wasserstein Distance (optimal transport on graph)--ordered by increasing computational complexity. These strategies penalize model predictions that deviate from the established emotion topology. Our framework is evaluated across three representative backbone architectures: AudioTransformer (pure transformer), Conformer (CNN-transformer hybrid), and DCGNN (causal graph neural network), demonstrating architecture-agnostic benefits. Experiments on SEED-IV (4 classes) and SEED-V (5 classes) datasets show consistent improvements: best case up to +5.42% accuracy and 39% reduction in psychologically implausible misclassifications. Ultimately, our framework help raise the upper bound of performance achievable with standard approaches. Code will be released.", "arxiv_id": "2607.07773", "arxiv_url": "https://arxiv.org/abs/2607.07773", "authors": ["Dongyang Kuang", "Zizheng Ma", "Yushan Zhang", "Xiaocong Zeng"], "brief": "\u63d0\u51fa\u4e00\u79cd\u56fe\u6b63\u5219\u5316\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u5c06\u60c5\u7eea\u7c7b\u522b\u5efa\u6a21\u4e3a\u56fe\u8282\u70b9\uff0c\u8fb9\u7f16\u7801\u57fa\u4e8e\u7ef4\u5ea6\u60c5\u7eea\u7406\u8bba\u7684\u5fc3\u7406\u90bb\u8fd1\u5173\u7cfb\uff0c\u901a\u8fc7\u4e09\u79cd\u6b63\u5219\u5316\u7b56\u7565\uff08\u56fe\u6807\u7b7e\u5e73\u6ed1\u3001\u56fe\u62c9\u666e\u62c9\u65af\u6362\u5411\u8ddd\u79bb\u3001\u5207\u7247Wasserstein\u8ddd\u79bb\uff09\u7ea6\u675f\u6a21\u578b\u9884\u6d4b\u7b26\u5408\u60c5\u7eea\u5fc3\u7406\u62d3\u6251\u7ed3\u6784\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07773", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4e09\u79cd\u4e92\u8865\u6b63\u5219\u5316\u7b56\u7565\u6309\u8ba1\u7b97\u590d\u6742\u5ea6\u9012\u589e\u6392\u5217\uff1a\u56fe\u6807\u7b7e\u5e73\u6ed1\u3001\u8c31\u56fe\u7406\u8bba\u6362\u5411\u8ddd\u79bb\u3001\u6700\u4f18\u4f20\u8f93\u5207\u7247Wasserstein\u8ddd\u79bb", "\u5728SEED-IV\u548cSEED-V\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\uff0c\u6700\u4f73\u60c5\u51b5\u51c6\u786e\u7387\u63d0\u5347+5.42%\uff0c\u5fc3\u7406\u4e0d\u5408\u7406\u8bef\u5206\u7c7b\u51cf\u5c1139%", "\u6846\u67b6\u4e0e\u67b6\u6784\u65e0\u5173\uff0c\u5728AudioTransformer\u3001Conformer\u3001DCGNN\u4e09\u79cd\u9aa8\u5e72\u7f51\u7edc\u4e0a\u5747\u6709\u4e00\u81f4\u63d0\u5347"], "keywords": ["\u8111\u673a\u63a5\u53e3", "\u60c5\u7eea\u8bc6\u522b", "\u56fe\u795e\u7ecf\u7f51\u7edc", "\u6df1\u5ea6\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07773v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Graph-Regularized Deep Learning for EEG-Based Emotion Recognition with Psychologically-Grounded Label Structure", "tldr": "\u56fe\u6b63\u5219\u5316\u6846\u67b6\u5c06\u60c5\u7eea\u5fc3\u7406\u62d3\u6251\u7ed3\u6784\u878d\u5165EEG\u60c5\u7eea\u8bc6\u522b\uff0c\u63d0\u5347\u51c6\u786e\u7387\u5e76\u51cf\u5c11\u5fc3\u7406\u4e0d\u5408\u7406\u8bef\u5206\u7c7b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u56fe\u6b63\u5219\u5316\u6df1\u5ea6\u5b66\u4e60\u6846\u67b6\uff0c\u5c06\u60c5\u7eea\u7c7b\u522b\u5efa\u6a21\u4e3a\u56fe\u8282\u70b9\uff0c\u8fb9\u7f16\u7801\u57fa\u4e8e\u7ef4\u5ea6\u60c5\u7eea\u7406\u8bba\u7684\u5fc3\u7406\u90bb\u8fd1\u5173\u7cfb\uff0c\u901a\u8fc7\u4e09\u79cd\u6b63\u5219\u5316\u7b56\u7565\uff08\u56fe\u6807\u7b7e\u5e73\u6ed1\u3001\u56fe\u62c9\u666e\u62c9\u65af\u6362\u5411\u8ddd\u79bb\u3001\u5207\u7247Wasserstein\u8ddd\u79bb\uff09\u7ea6\u675f\u6a21\u578b\u9884\u6d4b\u7b26\u5408\u60c5\u7eea\u5fc3\u7406\u62d3\u6251\u7ed3\u6784\u3002", "why_notable": "\u9996\u6b21\u5c06\u60c5\u7eea\u5fc3\u7406\u5b66\u62d3\u6251\u7ed3\u6784\u7cfb\u7edf\u6027\u5730\u5f15\u5165EEG\u60c5\u7eea\u8bc6\u522b\u7684\u635f\u5931\u51fd\u6570\u8bbe\u8ba1\uff0c\u4e0d\u4ec5\u63d0\u5347\u6027\u80fd\u6307\u6807\uff0c\u8fd8\u663e\u8457\u964d\u4f4e\u5fc3\u7406\u4e0d\u5408\u7406\u9884\u6d4b\uff0c\u5bf9\u8111\u673a\u63a5\u53e3\u548c\u5fc3\u7406\u5065\u5eb7\u76d1\u6d4b\u5177\u6709\u5b9e\u9645\u610f\u4e49\u3002"}, {"abstract": "Missing values undermine statistical inference and machine learning pipelines, yet most imputation methods rely on heuristics or restrictive parametric assumptions that ignore the joint data distribution. We recast imputation under missing completely at random (MCAR) as density estimation from masked observations: estimate a distribution whose observed marginals exactly match those in the data. Leveraging positive semi definite (PSD) kernel densities we obtain a convex empirical risk problem with closed form marginals, solvable by a Newton interior point method. The resulting PSD Impute model yields both single and multiple imputations from the same fitted density, enjoys statistical consistency with fast adaptive excess risk beating the curse of dimensionality for very regular probabilities. Preliminary experiments on one synthetic and eleven real world datasets already indicate competitive distributional accuracy compared with popular imputation baselines, suggesting strong practical promise.", "arxiv_id": "2607.07767", "arxiv_url": "https://arxiv.org/abs/2607.07767", "authors": ["Andrea Basteri", "Carlo Ciliberto", "Alessandro Rudi"], "brief": "\u63d0\u51faPSD Impute\u65b9\u6cd5\uff0c\u5c06MCAR\u7f3a\u5931\u503c\u586b\u8865\u95ee\u9898\u8f6c\u5316\u4e3a\u5bc6\u5ea6\u4f30\u8ba1\u95ee\u9898\uff0c\u5229\u7528\u6b63\u534a\u5b9a\u6838\u5bc6\u5ea6\u4f30\u8ba1\u6784\u5efa\u51f8\u7ecf\u9a8c\u98ce\u9669\u4f18\u5316\uff0c\u901a\u8fc7Newton\u5185\u70b9\u6cd5\u6c42\u89e3\uff0c\u4f7f\u586b\u8865\u540e\u6570\u636e\u7684\u89c2\u6d4b\u8fb9\u9645\u5206\u5e03\u4e0e\u539f\u59cb\u6570\u636e\u7cbe\u786e\u5339\u914d\u3002", "categories": ["stat.ML", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07767", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u7f3a\u5931\u503c\u586b\u8865\u91cd\u6784\u4e3a\u5e26\u7ea6\u675f\u7684\u5bc6\u5ea6\u4f30\u8ba1\u95ee\u9898\uff1a\u4f30\u8ba1\u4e00\u4e2a\u8054\u5408\u5206\u5e03\u4f7f\u5176\u89c2\u6d4b\u8fb9\u9645\u4e0e\u6570\u636e\u5b8c\u5168\u543b\u5408", "\u5229\u7528PSD\u6838\u5bc6\u5ea6\u7684\u95ed\u5408\u5f62\u5f0f\u8fb9\u9645\u7279\u6027\uff0c\u5c06\u95ee\u9898\u8f6c\u5316\u4e3a\u51f8\u4f18\u5316\uff0c\u53ef\u7528Newton\u5185\u70b9\u6cd5\u9ad8\u6548\u6c42\u89e3", "\u7406\u8bba\u4e0a\u5177\u6709\u7edf\u8ba1\u4e00\u81f4\u6027\uff0c\u5bf9\u9ad8\u5ea6\u89c4\u5219\u7684\u6982\u7387\u5206\u5e03\u53ef\u7a81\u7834\u7ef4\u5ea6\u8bc5\u5492\uff0c\u540c\u65f6\u652f\u6301\u5355\u6b21\u548c\u591a\u6b21\u586b\u8865"], "keywords": ["\u7f3a\u5931\u503c\u586b\u8865", "\u5bc6\u5ea6\u4f30\u8ba1", "\u6838\u65b9\u6cd5", "\u51f8\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07767v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Distributionally Faithful Imputation via Positive Semi-Definite Kernel Density Estimation", "tldr": "\u57fa\u4e8e\u6b63\u534a\u5b9a\u6838\u5bc6\u5ea6\u4f30\u8ba1\uff0c\u5c06\u7f3a\u5931\u503c\u586b\u8865\u91cd\u6784\u4e3a\u51f8\u4f18\u5316\u95ee\u9898\uff0c\u5b9e\u73b0\u5206\u5e03\u5fe0\u5b9e\u7684\u6570\u636e\u586b\u8865", "upvotes": 0, "what_it_is": "\u63d0\u51faPSD Impute\u65b9\u6cd5\uff0c\u5c06MCAR\u7f3a\u5931\u503c\u586b\u8865\u95ee\u9898\u8f6c\u5316\u4e3a\u5bc6\u5ea6\u4f30\u8ba1\u95ee\u9898\uff0c\u5229\u7528\u6b63\u534a\u5b9a\u6838\u5bc6\u5ea6\u4f30\u8ba1\u6784\u5efa\u51f8\u7ecf\u9a8c\u98ce\u9669\u4f18\u5316\uff0c\u901a\u8fc7Newton\u5185\u70b9\u6cd5\u6c42\u89e3\uff0c\u4f7f\u586b\u8865\u540e\u6570\u636e\u7684\u89c2\u6d4b\u8fb9\u9645\u5206\u5e03\u4e0e\u539f\u59cb\u6570\u636e\u7cbe\u786e\u5339\u914d\u3002", "why_notable": "\u73b0\u6709\u586b\u8865\u65b9\u6cd5\u5927\u591a\u4f9d\u8d56\u542f\u53d1\u5f0f\u6216\u53c2\u6570\u5047\u8bbe\u800c\u5ffd\u89c6\u8054\u5408\u5206\u5e03\uff0c\u672c\u6587\u4ece\u5bc6\u5ea6\u4f30\u8ba1\u89c6\u89d2\u63d0\u4f9b\u4e86\u7406\u8bba\u4e25\u8c28\u7684\u51f8\u4f18\u5316\u6846\u67b6\uff0c\u572811\u4e2a\u771f\u5b9e\u6570\u636e\u96c6\u4e0a\u5c55\u73b0\u7ade\u4e89\u529b\uff0c\u517c\u5177\u7406\u8bba\u4fdd\u8bc1\u4e0e\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Federated learning (FL) is a collaborative learning scheme to train deep learning models, where collaborating parties can consolidate their models without sharing local data with other parties, hence preserving data privacy. Nevertheless, when implementing FL in Industrial visual inspection (IVI), the constraints posed by limited data availability and the intricate nature of the inspection tasks significantly impact the performance of the resulting model. This paper introduces FedTR, a novel FL framework incorporating transfer learning designed for Autonomous IVI, focusing on the challenging task of identifying label defects through end-to-end text recognition. Transfer learning is a method that leverages the knowledge of a pre-trained model to adapt to a different dataset. FedTR initially trains the model using a publicly available dataset, after which performs the essential federated learning process with model fine-tuning on the distributed and limited private data. Extensive experiment results demonstrate the effectiveness and feasibility of FedTR on private ink cartridge datasets for label defect identification. FedTR achieves an end-to-end text recognition word-level accuracy of 95.5% and 94.2% on homogeneous and heterogeneous data respectively. Additionally, it attains performance levels that are on par with those achieved through centralized training.", "arxiv_id": "2607.08014", "arxiv_url": "https://arxiv.org/abs/2607.08014", "authors": ["Vikash Sathiamoorthy", "Shuo Huai", "Hao Kong", "Di Liu", "Wendy Yong Yi Loy", "Christian Makaya", "Daren Ho", "Ravi Subramaniam", "Qian Lin", "Weichen Liu"], "brief": "\u63d0\u51faFedTR\u6846\u67b6\uff0c\u5c06\u8fc1\u79fb\u5b66\u4e60\u4e0e\u8054\u90a6\u5b66\u4e60\u7ed3\u5408\uff0c\u5148\u7528\u516c\u5f00\u6570\u636e\u96c6\u9884\u8bad\u7ec3\u6a21\u578b\uff0c\u518d\u5728\u5206\u5e03\u5f0f\u79c1\u6709\u6570\u636e\u4e0a\u8fdb\u884c\u8054\u90a6\u5fae\u8c03\uff0c\u4e13\u6ce8\u4e8e\u5de5\u4e1a\u89c6\u89c9\u68c0\u6d4b\u4e2d\u7684\u7aef\u5230\u7aef\u6587\u672c\u8bc6\u522b\u4efb\u52a1\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.08014", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5148\u5728\u516c\u5f00\u6570\u636e\u96c6\u4e0a\u9884\u8bad\u7ec3\uff0c\u518d\u901a\u8fc7\u8054\u90a6\u5b66\u4e60\u5728\u5206\u5e03\u5f0f\u79c1\u6709\u6570\u636e\u4e0a\u5fae\u8c03\uff0c\u89e3\u51b3\u5de5\u4e1a\u573a\u666f\u6570\u636e\u7a00\u7f3a\u95ee\u9898", "\u5728\u540c\u6784\u6570\u636e\u4e0a\u7aef\u5230\u7aef\u6587\u5b57\u8bc6\u522b\u8bcd\u7ea7\u51c6\u786e\u7387\u8fbe95.5%\uff0c\u5f02\u6784\u6570\u636e\u4e0a\u8fbe94.2%", "\u6027\u80fd\u63a5\u8fd1\u96c6\u4e2d\u5f0f\u8bad\u7ec3\u6c34\u5e73\uff0c\u540c\u65f6\u4fdd\u62a4\u5404\u53c2\u4e0e\u65b9\u7684\u6570\u636e\u9690\u79c1"], "keywords": ["\u8054\u90a6\u5b66\u4e60", "\u8fc1\u79fb\u5b66\u4e60", "\u5de5\u4e1a\u89c6\u89c9\u68c0\u6d4b", "\u6587\u672c\u8bc6\u522b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.08014v1", "published_at": "2026-07-09", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "FedTR: Federated Learning Framework with Transfer Learning for Industrial Visual Inspection", "tldr": "FedTR\u5c06\u8fc1\u79fb\u5b66\u4e60\u4e0e\u8054\u90a6\u5b66\u4e60\u7ed3\u5408\uff0c\u7528\u4e8e\u5de5\u4e1a\u89c6\u89c9\u68c0\u6d4b\u4e2d\u7684\u6807\u7b7e\u7f3a\u9677\u8bc6\u522b", "upvotes": 0, "what_it_is": "\u63d0\u51faFedTR\u6846\u67b6\uff0c\u5c06\u8fc1\u79fb\u5b66\u4e60\u4e0e\u8054\u90a6\u5b66\u4e60\u7ed3\u5408\uff0c\u5148\u7528\u516c\u5f00\u6570\u636e\u96c6\u9884\u8bad\u7ec3\u6a21\u578b\uff0c\u518d\u5728\u5206\u5e03\u5f0f\u79c1\u6709\u6570\u636e\u4e0a\u8fdb\u884c\u8054\u90a6\u5fae\u8c03\uff0c\u4e13\u6ce8\u4e8e\u5de5\u4e1a\u89c6\u89c9\u68c0\u6d4b\u4e2d\u7684\u7aef\u5230\u7aef\u6587\u672c\u8bc6\u522b\u4efb\u52a1\u3002", "why_notable": "\u5c06\u8fc1\u79fb\u5b66\u4e60\u5f15\u5165\u8054\u90a6\u5b66\u4e60\u6846\u67b6\u6709\u6548\u7f13\u89e3\u4e86\u5de5\u4e1a\u573a\u666f\u4e2d\u6570\u636e\u91cf\u5c11\u3001\u4efb\u52a1\u590d\u6742\u7684\u53cc\u91cd\u6311\u6218\uff0c\u4e3a\u9690\u79c1\u4fdd\u62a4\u4e0b\u7684\u5de5\u4e1a\u89c6\u89c9\u68c0\u6d4b\u63d0\u4f9b\u4e86\u5b9e\u7528\u89e3\u51b3\u65b9\u6848\u3002"}, {"abstract": "Federated Learning (FL) empowers multiple clients to collaboratively learn a model, enlarging the training data of each client for high accuracy while protecting data privacy. However, when deploying FL in real-time edge systems, the heterogeneity of devices among systems has a severe impact on the performance of the inferred model. Existing optimizations on FL focus on improving the training efficiency but fail to speed up inference, especially when there is a latency constraint. In this work, we propose Collate, a novel training framework that collaboratively learns heterogeneous models to meet the latency constraints of multiple edge systems simultaneously. We design a dynamic zeroizing-recovering method to adjust each local model architecture for high accuracy under its latency constraint. A proto-corrected federated aggregation scheme is also introduced to aggregate all heterogeneous local models, satisfying the latency constraint of different systems with only one training process and maintaining high accuracy. Extensive experiments indicate that, compared to state-of-the-art methods and under a latency constraint, our extended models can improve the accuracy by 1.96% on average, and our shrunk models can also obtain a 3.09% accuracy improvement on average, with almost no extra training overhead. The related codes and data will be available at https://github.com/ntuliuteam/Collate", "arxiv_id": "2607.08013", "arxiv_url": "https://arxiv.org/abs/2607.08013", "authors": ["Shuo Huai", "Di Liu", "Hao Kong", "Xiangzhong Luo", "Weichen Liu", "Ravi Subramaniam", "Christian Makaya", "Qian Lin"], "brief": "\u63d0\u51faCollate\u8bad\u7ec3\u6846\u67b6\uff0c\u5728\u8054\u90a6\u5b66\u4e60\u4e2d\u5f15\u5165\u52a8\u6001\u96f6\u5316-\u6062\u590d\u65b9\u6cd5\u8c03\u6574\u672c\u5730\u6a21\u578b\u67b6\u6784\uff0c\u5e76\u8bbe\u8ba1\u539f\u578b\u6821\u6b63\u805a\u5408\u65b9\u6848\uff0c\u4f7f\u5f02\u6784\u8fb9\u7f18\u8bbe\u5907\u5728\u6ee1\u8db3\u5404\u81ea\u5ef6\u8fdf\u7ea6\u675f\u7684\u540c\u65f6\u901a\u8fc7\u5355\u6b21\u8bad\u7ec3\u8fc7\u7a0b\u83b7\u5f97\u9ad8\u7cbe\u5ea6\u6a21\u578b\u3002", "categories": ["cs.LG", "cs.DC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.08013", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u52a8\u6001\u96f6\u5316-\u6062\u590d\uff08zeroizing-recovering\uff09\u65b9\u6cd5\uff1a\u81ea\u9002\u5e94\u8c03\u6574\u6bcf\u4e2a\u672c\u5730\u6a21\u578b\u67b6\u6784\u4ee5\u5728\u5ef6\u8fdf\u7ea6\u675f\u4e0b\u4fdd\u6301\u9ad8\u7cbe\u5ea6", "\u539f\u578b\u6821\u6b63\u8054\u90a6\u805a\u5408\u65b9\u6848\uff1a\u5c06\u5f02\u6784\u672c\u5730\u6a21\u578b\u805a\u5408\u4e3a\u6ee1\u8db3\u4e0d\u540c\u7cfb\u7edf\u5ef6\u8fdf\u7ea6\u675f\u7684\u6a21\u578b\uff0c\u4ec5\u9700\u4e00\u6b21\u8bad\u7ec3", "\u5b9e\u9a8c\u7ed3\u679c\uff1a\u6269\u5c55\u6a21\u578b\u5e73\u5747\u7cbe\u5ea6\u63d0\u53471.96%\uff0c\u538b\u7f29\u6a21\u578b\u5e73\u5747\u7cbe\u5ea6\u63d0\u53473.09%\uff0c\u51e0\u4e4e\u65e0\u989d\u5916\u8bad\u7ec3\u5f00\u9500"], "keywords": ["\u8054\u90a6\u5b66\u4e60", "\u8fb9\u7f18\u8ba1\u7b97", "\u6a21\u578b\u538b\u7f29", "\u5f02\u6784\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.08013v1", "published_at": "2026-07-09", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Collate: Collaborative Neural Network Learning for Latency-Critical Edge Systems", "tldr": "Collate\u6846\u67b6\u901a\u8fc7\u534f\u4f5c\u5b66\u4e60\u5f02\u6784\u6a21\u578b\uff0c\u540c\u65f6\u6ee1\u8db3\u591a\u8fb9\u7f18\u7cfb\u7edf\u7684\u5ef6\u8fdf\u7ea6\u675f\u5e76\u63d0\u5347\u63a8\u7406\u7cbe\u5ea6", "upvotes": 0, "what_it_is": "\u63d0\u51faCollate\u8bad\u7ec3\u6846\u67b6\uff0c\u5728\u8054\u90a6\u5b66\u4e60\u4e2d\u5f15\u5165\u52a8\u6001\u96f6\u5316-\u6062\u590d\u65b9\u6cd5\u8c03\u6574\u672c\u5730\u6a21\u578b\u67b6\u6784\uff0c\u5e76\u8bbe\u8ba1\u539f\u578b\u6821\u6b63\u805a\u5408\u65b9\u6848\uff0c\u4f7f\u5f02\u6784\u8fb9\u7f18\u8bbe\u5907\u5728\u6ee1\u8db3\u5404\u81ea\u5ef6\u8fdf\u7ea6\u675f\u7684\u540c\u65f6\u901a\u8fc7\u5355\u6b21\u8bad\u7ec3\u8fc7\u7a0b\u83b7\u5f97\u9ad8\u7cbe\u5ea6\u6a21\u578b\u3002", "why_notable": "\u73b0\u6709FL\u4f18\u5316\u4e3b\u8981\u5173\u6ce8\u8bad\u7ec3\u6548\u7387\u800c\u5ffd\u89c6\u63a8\u7406\u5ef6\u8fdf\uff0cCollate\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u5ef6\u8fdf\u7ea6\u675f\u7eb3\u5165\u8054\u90a6\u5b66\u4e60\u8bad\u7ec3\u6846\u67b6\uff0c\u5bf9\u5b9e\u65f6\u8fb9\u7f18\u7cfb\u7edf\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Galvanic skin response (GSR) is widely used for stress detection, but wrist-based GSR remains challenging because its absolute amplitude can differ substantially from laboratory-grade palmar measurements. In this paper, we propose a unit-independent low-rate wrist GSR processing pipeline to extract the number of skin conductance responses per minute (nSCR/min) as a stress-related feature. We collect paired wrist and palmar GSR recordings from 31 participants during sitting baseline, standing baseline, neutral speaking, and the Trier Social Stress Test (TSST), a laboratory social stressor task. The proposed pipeline cleans the raw GSR signal, decomposes it into tonic skin conductance level (SCL) and phasic skin conductance response (SCR), applies robust z-score normalization, and detects phasic SCR peaks to compute nSCR/min. Using random forest on 25Hz We-Be GSR, nSCR/min achieved balanced accuracies of 0.823 and 0.871 for binary classification between TSST and the sitting and standing baselines, respectively. Moreover, the 25Hz We-Be GSR features achieved comparable balanced accuracy to the original 100Hz features across the evaluated tasks. These results suggest the feasibility of low-rate, unit-independent wrist GSR processing for wearable stress detection.", "arxiv_id": "2607.08007", "arxiv_url": "https://arxiv.org/abs/2607.08007", "authors": ["Zequan Liang", "Sally Hang", "Geneva M. Jost", "Ning Miao", "Wei Shao", "Mahdi Pirayesh Shirazi Nejad", "Hossein Sayadi", "Ehsan Kourkchi", "Setareh Rafatirad", "Camelia E. Hostinar", "Houman Homayoun"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u5355\u4f4d\u65e0\u5173\u7684\u4f4e\u91c7\u6837\u7387\u8155\u90e8GSR\u4fe1\u53f7\u5904\u7406\u6d41\u7a0b\uff0c\u901a\u8fc7\u63d0\u53d6\u6bcf\u5206\u949f\u76ae\u80a4\u7535\u53cd\u5e94\u6b21\u6570\uff08nSCR/min\uff09\u4f5c\u4e3a\u538b\u529b\u7279\u5f81\uff0c\u89e3\u51b3\u8155\u90e8GSR\u5e45\u503c\u4e0e\u638c\u90e8\u5b9e\u9a8c\u5ba4\u6d4b\u91cf\u5dee\u5f02\u5927\u7684\u95ee\u9898\u3002", "categories": ["eess.SP", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.08007", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u96c631\u540d\u53c2\u4e0e\u8005\u8155\u90e8\u4e0e\u638c\u90e8\u914d\u5bf9GSR\u6570\u636e\uff0c\u6db5\u76d6\u5750\u59ff/\u7ad9\u59ff\u57fa\u7ebf\u3001\u4e2d\u6027\u6f14\u8bb2\u53caTSST\u793e\u4f1a\u538b\u529b\u6d4b\u8bd5\u56db\u79cd\u573a\u666f", "\u6d41\u7a0b\u5305\u62ec\u4fe1\u53f7\u6e05\u6d17\u3001SCL/SCR\u5206\u89e3\u3001\u9c81\u68d2z-score\u5f52\u4e00\u5316\u53ca\u76f8\u4f4dSCR\u5cf0\u503c\u68c0\u6d4b\uff0c\u8f93\u51fanSCR/min\u7279\u5f81", "\u968f\u673a\u68ee\u6797\u5206\u7c7b\u5668\u572825Hz\u8155\u90e8GSR\u4e0a\u5bf9TSST\u4e0e\u5750/\u7ad9\u57fa\u7ebf\u7684\u4e8c\u5206\u7c7b\u5e73\u8861\u51c6\u786e\u7387\u5206\u522b\u8fbe0.823\u548c0.871\uff0c\u4e0e100Hz\u7279\u5f81\u6027\u80fd\u76f8\u5f53"], "keywords": ["\u53ef\u7a7f\u6234\u8bbe\u5907", "\u751f\u7406\u4fe1\u53f7\u5904\u7406", "\u538b\u529b\u68c0\u6d4b", "\u673a\u5668\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.08007v1", "published_at": "2026-07-09", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Unit-Independent Low-Rate Wrist GSR Processing for Stress Detection Using Phasic nSCR Features", "tldr": "\u63d0\u51fa\u5355\u4f4d\u65e0\u5173\u7684\u4f4e\u91c7\u6837\u7387\u8155\u90e8\u76ae\u80a4\u7535\u53cd\u5e94\u5904\u7406\u6d41\u7a0b\uff0c\u7528\u4e8e\u53ef\u7a7f\u6234\u538b\u529b\u68c0\u6d4b", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u5355\u4f4d\u65e0\u5173\u7684\u4f4e\u91c7\u6837\u7387\u8155\u90e8GSR\u4fe1\u53f7\u5904\u7406\u6d41\u7a0b\uff0c\u901a\u8fc7\u63d0\u53d6\u6bcf\u5206\u949f\u76ae\u80a4\u7535\u53cd\u5e94\u6b21\u6570\uff08nSCR/min\uff09\u4f5c\u4e3a\u538b\u529b\u7279\u5f81\uff0c\u89e3\u51b3\u8155\u90e8GSR\u5e45\u503c\u4e0e\u638c\u90e8\u5b9e\u9a8c\u5ba4\u6d4b\u91cf\u5dee\u5f02\u5927\u7684\u95ee\u9898\u3002", "why_notable": "\u5b9e\u73b0\u4e86\u4f4e\u91c7\u6837\u7387\uff0825Hz\uff09\u4e0b\u5355\u4f4d\u65e0\u5173\u7684\u8155\u90e8GSR\u538b\u529b\u68c0\u6d4b\uff0c\u964d\u4f4e\u4e86\u5bf9\u786c\u4ef6\u7cbe\u5ea6\u7684\u4f9d\u8d56\uff0c\u63a8\u52a8\u53ef\u7a7f\u6234\u8bbe\u5907\u5728\u771f\u5b9e\u573a\u666f\u4e2d\u7684\u5b9e\u7528\u5316\u90e8\u7f72\u3002"}, {"abstract": "Continuous oxygen saturation (SpO$_2$) estimation from wearable photoplethysmography (PPG) is important for long-term health monitoring, but low-quality red and infrared PPG segments can distort waveform morphology and degrade SpO$_2$ prediction accuracy. Existing PPG denoising and reconstruction methods usually optimize waveform fidelity or heart rate characteristics, while time-domain waveform loss on PPG signals alone insufficiently preserves frequency structure and SpO$_2$-relevant information. This paper proposes a SpO$_2$ predictor-guided stage-wise time-frequency reconstruction framework for low-quality dual-wavelength PPG signals. The proposed method first selects high-quality PPG segments to pretrain a SpO$_2$ predictor. A masked reconstruction model is then trained to recover randomly masked PPG regions using a joint reconstruction objective that combines time-domain waveform loss with frequency-domain loss computed from the short-time Fourier transform (STFT). To make the reconstruction task physiologically relevant, the pretrained SpO$_2$ predictor is incorporated as an additional constraint, encouraging the reconstructed PPG to preserve SpO$_2$ information rather than only minimizing waveform reconstruction error. The SpO$_2$ predictor and PPG reconstructor model are optimized through four training stages. Experiments on the public OpenOximetry Repository and a private wearable PPG dataset show that the proposed approach achieves the lowest subject-level MAE, with 2.882\\% on the public dataset and 2.359\\% on the private dataset.", "arxiv_id": "2607.07996", "arxiv_url": "https://arxiv.org/abs/2607.07996", "authors": ["Zequan Liang", "Elahe Hosseini", "Ning Miao", "Mahdi Pirayesh Shirazi Nejad", "Wei Shao", "Ehsan Kourkchi", "Setareh Rafatirad", "Houman Homayoun"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cdSpO\u2082\u9884\u6d4b\u5668\u5f15\u5bfc\u7684\u5206\u9636\u6bb5\u65f6\u9891\u91cd\u5efa\u6846\u67b6\uff0c\u7528\u4e8e\u4ece\u4f4e\u8d28\u91cf\u7ea2\u5149/\u7ea2\u5916\u53cc\u6ce2\u957fPPG\u4fe1\u53f7\u4e2d\u51c6\u786e\u4f30\u8ba1\u8840\u6c27\u9971\u548c\u5ea6\u3002\u8be5\u65b9\u6cd5\u7ed3\u5408\u65f6\u57df\u6ce2\u5f62\u635f\u5931\u3001STFT\u9891\u57df\u635f\u5931\u53ca\u9884\u8bad\u7ec3SpO\u2082\u9884\u6d4b\u5668\u7ea6\u675f\uff0c\u901a\u8fc7\u56db\u9636\u6bb5\u8bad\u7ec3\u4f18\u5316\u91cd\u5efa\u8d28\u91cf\u3002", "categories": ["eess.SP", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07996", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u8054\u5408\u65f6\u57df\u6ce2\u5f62\u635f\u5931\u4e0e\u77ed\u65f6\u5085\u91cc\u53f6\u53d8\u6362\uff08STFT\uff09\u9891\u57df\u635f\u5931\u8fdb\u884cPPG\u91cd\u5efa\uff0c\u4fdd\u7559\u9891\u7387\u7ed3\u6784\u4fe1\u606f", "\u5f15\u5165\u9884\u8bad\u7ec3SpO\u2082\u9884\u6d4b\u5668\u4f5c\u4e3a\u751f\u7406\u7ea6\u675f\uff0c\u4f7f\u91cd\u5efa\u4fe1\u53f7\u4fdd\u7559\u8840\u6c27\u76f8\u5173\u4fe1\u606f\u800c\u975e\u4ec5\u6700\u5c0f\u5316\u6ce2\u5f62\u8bef\u5dee", "\u5728\u516c\u5f00OpenOximetry\u6570\u636e\u96c6\u4e0aMAE\u8fbe2.882%\uff0c\u79c1\u6709\u53ef\u7a7f\u6234\u6570\u636e\u96c6\u4e0a\u8fbe2.359%\uff0c\u5747\u4e3a\u6700\u4f18"], "keywords": ["\u751f\u7406\u4fe1\u53f7\u5904\u7406", "\u53ef\u7a7f\u6234\u8bbe\u5907", "\u65f6\u9891\u5206\u6790", "\u5065\u5eb7\u76d1\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07996v1", "published_at": "2026-07-09", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "SpO$_2$ Predictor-Guided Stage-Wise Time-Frequency Reconstruction of Low-Quality Dual-Wavelength PPG for Oxygen Saturation Estimation", "tldr": "\u63d0\u51faSpO\u2082\u9884\u6d4b\u5668\u5f15\u5bfc\u7684\u5206\u9636\u6bb5\u65f6\u9891\u91cd\u5efa\u6846\u67b6\uff0c\u63d0\u5347\u4f4e\u8d28\u91cf\u53cc\u6ce2\u957fPPG\u8840\u6c27\u4f30\u8ba1\u7cbe\u5ea6", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u79cdSpO\u2082\u9884\u6d4b\u5668\u5f15\u5bfc\u7684\u5206\u9636\u6bb5\u65f6\u9891\u91cd\u5efa\u6846\u67b6\uff0c\u7528\u4e8e\u4ece\u4f4e\u8d28\u91cf\u7ea2\u5149/\u7ea2\u5916\u53cc\u6ce2\u957fPPG\u4fe1\u53f7\u4e2d\u51c6\u786e\u4f30\u8ba1\u8840\u6c27\u9971\u548c\u5ea6\u3002\u8be5\u65b9\u6cd5\u7ed3\u5408\u65f6\u57df\u6ce2\u5f62\u635f\u5931\u3001STFT\u9891\u57df\u635f\u5931\u53ca\u9884\u8bad\u7ec3SpO\u2082\u9884\u6d4b\u5668\u7ea6\u675f\uff0c\u901a\u8fc7\u56db\u9636\u6bb5\u8bad\u7ec3\u4f18\u5316\u91cd\u5efa\u8d28\u91cf\u3002", "why_notable": "\u9996\u6b21\u5c06SpO\u2082\u9884\u6d4b\u5668\u4f5c\u4e3a\u751f\u7406\u8bed\u4e49\u7ea6\u675f\u5f15\u5165PPG\u91cd\u5efa\u4efb\u52a1\uff0c\u7a81\u7834\u4f20\u7edf\u65b9\u6cd5\u4ec5\u4f18\u5316\u6ce2\u5f62\u4fdd\u771f\u5ea6\u7684\u5c40\u9650\uff0c\u5bf9\u53ef\u7a7f\u6234\u5065\u5eb7\u76d1\u6d4b\u4e2d\u4f4e\u8d28\u91cf\u4fe1\u53f7\u5904\u7406\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Autism spectrum disorder (ASD) affects over 75 million individuals worldwide, yet scalable computational methods for remote behavioral screening remain limited. This study addresses two complementary challenges in automated detection of autism-related self-stimulatory behaviors from video: (1) identifying the optimal sequence-based neural network architecture and temporal sampling rate, and (2) characterizing data augmentation strategies for training on small behavioral datasets. For the first objective, long short-term memory (LSTM) and gated recurrent unit (GRU) models were trained on pose-derived features from the Self-Stimulatory Behavior Diagnosis (SSBD) dataset at frame sampling intervals of 1, 5, 15, 30, 45, and 90 frames. Both architectures exceeded prior convolutional neural network (CNN) baselines (62-76% accuracy), with peak accuracies of 97.5% (LSTM) and 98.75% (GRU) at a sampling interval of every 15 frames. For the second objective, ten data augmentation strategies were applied to an I3D transfer learning pipeline, with an ablation study quantifying the marginal contribution of each technique. Horizontal flip achieved the highest standalone accuracy (48.78%), while exclusion of upsampling from the augmentation pipeline produced the largest performance degradation, indicating its necessity for complex behavioral video augmentation. A personalized machine learning approach, in which per-subject models were trained and tested on temporally split segments of each video, produced consistent predictions (mean loss 1.84, SD 0.79). These results provide practitioners with concrete guidance on architecture selection, sampling rate, and augmentation strategy for video-based behavioral classification in data-scarce clinical domains.", "arxiv_id": "2607.07957", "arxiv_url": "https://arxiv.org/abs/2607.07957", "authors": ["Raunak Mondal", "Peter Washington"], "brief": "\u672c\u6587\u9488\u5bf9\u81ea\u95ed\u75c7\u76f8\u5173\u81ea\u6211\u523a\u6fc0\u884c\u4e3a\u7684\u89c6\u9891\u81ea\u52a8\u68c0\u6d4b\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4e86\u5e8f\u5217\u795e\u7ecf\u7f51\u7edc\u67b6\u6784\uff08LSTM/GRU\uff09\u5728\u4e0d\u540c\u5e27\u7387\u91c7\u6837\u4e0b\u7684\u5206\u7c7b\u6027\u80fd\uff0c\u5e76\u5bf9\u5c0f\u6837\u672c\u884c\u4e3a\u6570\u636e\u96c6\u7684\u6570\u636e\u589e\u5f3a\u7b56\u7565\u8fdb\u884c\u4e86\u6d88\u878d\u7814\u7a76\u3002", "categories": ["cs.AI", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07957", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["LSTM\u548cGRU\u5728\u6bcf15\u5e27\u91c7\u6837\u95f4\u9694\u4e0b\u5206\u522b\u8fbe\u523097.5%\u548c98.75%\u51c6\u786e\u7387\uff0c\u663e\u8457\u8d85\u8d8aCNN\u57fa\u7ebf\uff0862-76%\uff09", "10\u79cd\u6570\u636e\u589e\u5f3a\u7b56\u7565\u4e2d\uff0c\u6c34\u5e73\u7ffb\u8f6c\u5355\u72ec\u4f7f\u7528\u51c6\u786e\u7387\u6700\u9ad8\uff0848.78%\uff09\uff0c\u53bb\u9664\u4e0a\u91c7\u6837\u5bfc\u81f4\u6700\u5927\u6027\u80fd\u4e0b\u964d\uff0c\u8bc1\u660e\u5176\u4e0d\u53ef\u6216\u7f3a", "\u4e2a\u6027\u5316\u6a21\u578b\uff08per-subject\uff09\u5728\u65f6\u95f4\u5206\u5272\u6d4b\u8bd5\u4e0a\u8868\u73b0\u7a33\u5b9a\uff08\u5e73\u5747\u635f\u59311.84\uff0cSD 0.79\uff09\uff0c\u9002\u5408\u4e34\u5e8a\u5c0f\u6570\u636e\u573a\u666f"], "keywords": ["\u533b\u7597AI", "\u884c\u4e3a\u8bc6\u522b", "\u5e8f\u5217\u6a21\u578b", "\u6570\u636e\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07957v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Evaluating the Effect of Frame Rate in Sequence-Based Classification of Autism-Related Self-Stimulatory Hand Idiosyncrasies", "tldr": "\u7528LSTM/GRU\u5bf9\u81ea\u95ed\u75c7\u523b\u677f\u624b\u90e8\u884c\u4e3a\u89c6\u9891\u5206\u7c7b\uff0cGRU\u8fbe98.75%\u51c6\u786e\u7387", "upvotes": 0, "what_it_is": "\u672c\u6587\u9488\u5bf9\u81ea\u95ed\u75c7\u76f8\u5173\u81ea\u6211\u523a\u6fc0\u884c\u4e3a\u7684\u89c6\u9891\u81ea\u52a8\u68c0\u6d4b\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4e86\u5e8f\u5217\u795e\u7ecf\u7f51\u7edc\u67b6\u6784\uff08LSTM/GRU\uff09\u5728\u4e0d\u540c\u5e27\u7387\u91c7\u6837\u4e0b\u7684\u5206\u7c7b\u6027\u80fd\uff0c\u5e76\u5bf9\u5c0f\u6837\u672c\u884c\u4e3a\u6570\u636e\u96c6\u7684\u6570\u636e\u589e\u5f3a\u7b56\u7565\u8fdb\u884c\u4e86\u6d88\u878d\u7814\u7a76\u3002", "why_notable": "\u4e3a\u4e34\u5e8a\u6570\u636e\u7a00\u7f3a\u573a\u666f\u4e0b\u7684\u89c6\u9891\u884c\u4e3a\u5206\u7c7b\u63d0\u4f9b\u4e86\u5177\u4f53\u53ef\u64cd\u4f5c\u7684\u67b6\u6784\u9009\u62e9\u3001\u91c7\u6837\u7387\u548c\u6570\u636e\u589e\u5f3a\u6307\u5bfc\uff0c\u5bf9\u81ea\u95ed\u75c7\u8fdc\u7a0b\u7b5b\u67e5\u7684\u89c4\u6a21\u5316\u843d\u5730\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Self-attention lets each token retrieve information from the full context, but its quadratic cost in sequence length limits training and inference at long context. This paper presents a comparative study of softmax attention and four recent recurrent linear-attention architectures: DeltaNet, Gated DeltaNet, Kimi Delta Attention, and Gated DeltaNet-2. We express these mechanisms in a common recurrent-memory notation, making explicit how they differ in expressivity, memory decay, erase and write control, training throughput, and implementation complexity. Our experiments center on 350M-parameter models trained for 15B tokens, and include optimizer and learning-rate comparisons, hybrid-versus-pure stack comparisons, sequence-length runtime measurements, larger DeltaNet runs at 1.3B and 3B parameters, and a small set of downstream evaluations. The reported speed results measure training throughput and iteration time; we do not provide an empirical inference-speed benchmark. Within the reported 350M-parameter, 15B-token sweep, Kimi Delta Attention with Muon reaches the lowest final validation loss, a pure Gated DeltaNet stack trained with AdamW has the highest normalized training throughput, hybrid stacks generally improve loss at a throughput cost, and Muon consistently lowers final validation loss relative to AdamW in the matched architecture settings we evaluate. We introduce and evaluate lightweight cross-layer routing mechanisms for DeltaNet-style memories. The most natural DeltaNet-inspired formulation, forwarding a lower layer\u0027s delta-rule write error into the next layer\u0027s value target, does not improve over matched baselines. Routing into the aligned hidden stream and forwarding the write value instead yields a modest improvement in the matched runs we report: Cross-Layer Value Routing (CLVR) lowers final validation loss for both DeltaNet and Gated DeltaNet.", "arxiv_id": "2607.07953", "arxiv_url": "https://arxiv.org/abs/2607.07953", "authors": ["Tommaso Cerruti", "Tim Rieder", "George Rowlands", "Lingfeng Jin", "Imanol Schlag"], "brief": "\u672c\u6587\u5bf9softmax\u6ce8\u610f\u529b\u4e0e\u56db\u79cd\u5faa\u73af\u7ebf\u6027\u6ce8\u610f\u529b\u67b6\u6784\uff08DeltaNet\u3001Gated DeltaNet\u3001Kimi Delta Attention\u3001Gated DeltaNet-2\uff09\u8fdb\u884c\u7edf\u4e00\u7b26\u53f7\u6846\u67b6\u4e0b\u7684\u5bf9\u6bd4\u7814\u7a76\uff0c\u5e76\u63d0\u51fa\u8de8\u5c42\u503c\u8def\u7531\uff08CLVR\uff09\u673a\u5236\u4ee5\u6539\u5584\u6a21\u578b\u6027\u80fd\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07953", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5728350M\u53c2\u6570/15B token\u89c4\u6a21\u4e0b\u7cfb\u7edf\u8bc4\u4f30\u56db\u79cd\u7ebf\u6027\u6ce8\u610f\u529b\u67b6\u6784\uff0cKimi Delta Attention\u914d\u5408Muon\u4f18\u5316\u5668\u8fbe\u5230\u6700\u4f4e\u9a8c\u8bc1\u635f\u5931", "\u7eafGated DeltaNet\u6808\u4f7f\u7528AdamW\u8bad\u7ec3\u541e\u5410\u91cf\u6700\u9ad8\uff0c\u6df7\u5408\u6808\u4ee5\u541e\u5410\u91cf\u4e3a\u4ee3\u4ef7\u6362\u53d6\u66f4\u4f4e\u635f\u5931\uff1bMuon\u4f18\u5316\u5668\u5728\u5339\u914d\u67b6\u6784\u4e0b\u4e00\u81f4\u4f18\u4e8eAdamW", "\u63d0\u51fa\u8de8\u5c42\u503c\u8def\u7531\uff08CLVR\uff09\u673a\u5236\uff0c\u5c06\u5199\u5165\u503c\u524d\u5411\u4f20\u9012\u81f3\u4e0b\u4e00\u5c42\uff0c\u5bf9DeltaNet\u548cGated DeltaNet\u5747\u5e26\u6765\u9a8c\u8bc1\u635f\u5931\u7684\u5c0f\u5e45\u6539\u5584"], "keywords": ["\u7ebf\u6027\u6ce8\u610f\u529b", "\u9ad8\u6548Transformer", "\u5e8f\u5217\u5efa\u6a21", "\u67b6\u6784\u5bf9\u6bd4"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07953v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Linear Attention Architectures: Mechanisms, Trade-offs, and Cross-Layer Routing", "tl
