const PAPERS = [{"abstract": "Production LLM agents often waste latency and reliability by regenerating code for the same procedural steps on every request. We replace this inference-time coding loop with an agentic tool-making pipeline that compiles repeated SOP steps into validated, versioned tools before deployment. The tool-maker grounds synthesis in the live environment as it collects execution traces, observes backend schemas and values, generates candidate tools, and repairs them against labeled cases. At runtime, the production agent calls these tools directly and falls back to code generation only when needed. We deploy the approach in a Fulfillment Center alarm-triage system, where an agent diagnoses alarms against a 44-node SOP over heterogeneous metric backends. In production, tool calls reduce p50 latency by 42%. On 1,500 historical alarms, they reduce end-to-end error rate by up to 53% by suppressing run-to-run variance in repeated steps. Because tools return compact structured verdicts, they also enable a simpler direct-call architecture, reducing p50 latency by a further 62% in a controlled ablation. Versioned tools also improve auditability and expose specification gaps and upstream data drift. Our results show that self-evolving agents can make industrial LLM systems faster, more reliable, and easier to operate.", "arxiv_id": "2607.08010", "arxiv_url": "https://arxiv.org/abs/2607.08010", "authors": ["Kalle Kujanp\u00e4\u00e4", "Ning Liu", "Shahnawaz Alam", "Yeshwanth Reddy Sura", "Tianyu Yang", "Kristina Klinkner", "Shervin Malmasi"], "brief": "\u63d0\u51fa\u4e00\u79cd\u300c\u5de5\u5177\u5236\u9020\u300d\u6d41\u6c34\u7ebf\uff0c\u8ba9LLM\u667a\u80fd\u4f53\u5c06\u53cd\u590d\u6267\u884c\u7684\u6807\u51c6\u64cd\u4f5c\u6b65\u9aa4\u9884\u7f16\u8bd1\u4e3a\u7ecf\u9a8c\u8bc1\u7684\u7248\u672c\u5316\u5de5\u5177\uff0c\u8fd0\u884c\u65f6\u76f4\u63a5\u8c03\u7528\u800c\u975e\u6bcf\u6b21\u91cd\u65b0\u751f\u6210\u4ee3\u7801\uff0c\u5e76\u5728\u4ed3\u50a8\u4e2d\u5fc3\u544a\u8b66\u5206\u8bca\u7cfb\u7edf\u4e2d\u5b8c\u6210\u5de5\u4e1a\u7ea7\u90e8\u7f72\u9a8c\u8bc1\u3002", "categories": ["cs.CL", "cs.LG", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.08010", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5de5\u5177\u5236\u9020\u5668\u901a\u8fc7\u6536\u96c6\u6267\u884c\u8f68\u8ff9\u3001\u89c2\u5bdf\u540e\u7aefSchema\u81ea\u52a8\u5408\u6210\u5e76\u4fee\u590d\u5019\u9009\u5de5\u5177\uff0c\u5f62\u6210\u81ea\u8fdb\u5316\u95ed\u73af", "\u751f\u4ea7\u73af\u5883\u4e2d\u5de5\u5177\u8c03\u7528\u5c06p50\u5ef6\u8fdf\u964d\u4f4e42%\uff0c\u5386\u53f2\u544a\u8b66\u7aef\u5230\u7aef\u9519\u8bef\u7387\u964d\u4f4e\u6700\u9ad853%", "\u7ed3\u6784\u5316\u5de5\u5177\u8fd4\u56de\u503c\u652f\u6301\u66f4\u7b80\u6d01\u7684\u76f4\u63a5\u8c03\u7528\u67b6\u6784\uff0c\u8fdb\u4e00\u6b65\u5c06p50\u5ef6\u8fdf\u518d\u964d62%\uff08\u6d88\u878d\u5b9e\u9a8c\uff09", "\u7248\u672c\u5316\u5de5\u5177\u63d0\u5347\u53ef\u5ba1\u8ba1\u6027\uff0c\u5e76\u80fd\u66b4\u9732\u89c4\u8303\u7f3a\u53e3\u4e0e\u4e0a\u6e38\u6570\u636e\u6f02\u79fb\u95ee\u9898"], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u751f\u6210", "\u4f4e\u5ef6\u8fdf\u7cfb\u7edf", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.08010v1", "published_at": "2026-07-09", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Tool-Making and Self-Evolving LLM Agents in Low-Latency Systems", "tldr": "\u5c06LLM\u667a\u80fd\u4f53\u91cd\u590d\u6267\u884c\u7684SOP\u6b65\u9aa4\u9884\u7f16\u8bd1\u4e3a\u53ef\u590d\u7528\u5de5\u5177\uff0c\u964d\u4f4e\u5ef6\u8fdf42%\u3001\u9519\u8bef\u738753%", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u300c\u5de5\u5177\u5236\u9020\u300d\u6d41\u6c34\u7ebf\uff0c\u8ba9LLM\u667a\u80fd\u4f53\u5c06\u53cd\u590d\u6267\u884c\u7684\u6807\u51c6\u64cd\u4f5c\u6b65\u9aa4\u9884\u7f16\u8bd1\u4e3a\u7ecf\u9a8c\u8bc1\u7684\u7248\u672c\u5316\u5de5\u5177\uff0c\u8fd0\u884c\u65f6\u76f4\u63a5\u8c03\u7528\u800c\u975e\u6bcf\u6b21\u91cd\u65b0\u751f\u6210\u4ee3\u7801\uff0c\u5e76\u5728\u4ed3\u50a8\u4e2d\u5fc3\u544a\u8b66\u5206\u8bca\u7cfb\u7edf\u4e2d\u5b8c\u6210\u5de5\u4e1a\u7ea7\u90e8\u7f72\u9a8c\u8bc1\u3002", "why_notable": "\u5c06LLM\u667a\u80fd\u4f53\u4ece\u300c\u6bcf\u6b21\u63a8\u7406\u751f\u6210\u4ee3\u7801\u300d\u8f6c\u53d8\u4e3a\u300c\u9884\u7f16\u8bd1\u5de5\u5177\u5e93+\u6309\u9700\u56de\u9000\u300d\u7684\u5de5\u7a0b\u8303\u5f0f\uff0c\u5728\u771f\u5b9e\u5de5\u4e1a\u7cfb\u7edf\u4e2d\u53d6\u5f97\u663e\u8457\u5ef6\u8fdf\u4e0e\u53ef\u9760\u6027\u63d0\u5347\uff0c\u4e3aLLM\u667a\u80fd\u4f53\u843d\u5730\u751f\u4ea7\u63d0\u4f9b\u4e86\u53ef\u590d\u5236\u7684\u65b9\u6cd5\u8bba\u3002"}, {"abstract": "DeepSWE is a benchmark of 113 original, long-horizon software engineering tasks for evaluating coding agents. Most public agentic coding benchmarks follow SWE-bench in mining merged fixes from public GitHub repositories, which creates two problems: the fixes and their discussion were likely seen during pretraining, so a high score can reflect recall rather than problem-solving; and each task is graded by the tests that shipped with its merged fix, which were written to confirm one specific fix rather than grade an arbitrary solution, so they can fail a correct alternative or pass an incomplete one. DeepSWE avoids both. Its tasks are written from scratch across 91 active open-source repositories and five languages and are never contributed back upstream, so their reference solutions stay out of the public record that model training scrapes; and each task is graded by a hand-written verifier that checks the requested functionality and accepts any implementation that provides it. When an independent LLM judge re-reviews graded runs, it disagrees with DeepSWE\u0027s verifier about an order of magnitude less often than with SWE-Bench Pro\u0027s inherited tests (1.4% versus 32.4%). Despite being about half the length of SWE-Bench Pro\u0027s prompts, DeepSWE\u0027s prompts describe tasks whose reference solutions touch 5.5x more code, and the benchmark separates frontier agents across a wider score band than the leaderboards on which they otherwise cluster. We release the benchmark, its verifiers, and the full record of evaluation trajectories.", "arxiv_id": "2607.07946", "arxiv_url": "https://arxiv.org/abs/2607.07946", "authors": ["Wenqi Huang", "Charley Lee", "Leonard Tng", "Serena Ge"], "brief": "\u63d0\u51faDeepSWE\u57fa\u51c6\u6d4b\u8bd5\u96c6\uff0c\u5305\u542b113\u4e2a\u5168\u65b0\u624b\u5199\u7684\u8f6f\u4ef6\u5de5\u7a0b\u4efb\u52a1\uff0c\u7528\u4e8e\u8bc4\u4f30\u7f16\u7a0b\u667a\u80fd\u4f53\u7684\u771f\u5b9e\u95ee\u9898\u89e3\u51b3\u80fd\u529b\uff0c\u800c\u975e\u8bb0\u5fc6\u80fd\u529b\u3002\u4efb\u52a1\u8986\u76d691\u4e2a\u6d3b\u8dc3\u5f00\u6e90\u4ed3\u5e93\u548c5\u79cd\u7f16\u7a0b\u8bed\u8a00\uff0c\u914d\u5907\u624b\u5199\u9a8c\u8bc1\u5668\u800c\u975e\u539f\u59cbPR\u6d4b\u8bd5\u3002", "categories": ["cs.SE", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07946", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4efb\u52a1\u4ece\u96f6\u7f16\u5199\u4e14\u4e0d\u56de\u6d41\u81f3\u4e0a\u6e38\u4ed3\u5e93\uff0c\u786e\u4fdd\u53c2\u8003\u89e3\u51b3\u65b9\u6848\u4e0d\u4f1a\u51fa\u73b0\u5728\u6a21\u578b\u8bad\u7ec3\u6570\u636e\u4e2d\uff0c\u907f\u514d\u6570\u636e\u6c61\u67d3", "\u624b\u5199\u9a8c\u8bc1\u5668\u68c0\u67e5\u529f\u80fd\u6b63\u786e\u6027\u800c\u975e\u7279\u5b9a\u5b9e\u73b0\uff0c\u4e0eLLM\u88c1\u5224\u7684\u5206\u6b67\u7387\u4ec51.4%\uff0c\u8fdc\u4f4e\u4e8eSWE-Bench Pro\u768432.4%", "\u53c2\u8003\u89e3\u51b3\u65b9\u6848\u5e73\u5747\u6d89\u53ca\u4ee3\u7801\u91cf\u662fSWE-Bench Pro\u76845.5\u500d\uff0c\u4e14\u80fd\u5728\u66f4\u5bbd\u5206\u6570\u533a\u95f4\u533a\u5206\u524d\u6cbf\u667a\u80fd\u4f53"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u6d4b\u8bd5", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07946v1", "published_at": "2026-07-08", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "DeepSWE: Measuring Frontier Coding Agents on Original, Long-Horizon Engineering Tasks", "tldr": "DeepSWE\uff1a113\u4e2a\u539f\u521b\u957f\u5468\u671f\u8f6f\u4ef6\u5de5\u7a0b\u4efb\u52a1\u57fa\u51c6\uff0c\u907f\u514d\u8bad\u7ec3\u6570\u636e\u6c61\u67d3\u548c\u6d4b\u8bd5\u7528\u4f8b\u504f\u5dee", "upvotes": 0, "what_it_is": "\u63d0\u51faDeepSWE\u57fa\u51c6\u6d4b\u8bd5\u96c6\uff0c\u5305\u542b113\u4e2a\u5168\u65b0\u624b\u5199\u7684\u8f6f\u4ef6\u5de5\u7a0b\u4efb\u52a1\uff0c\u7528\u4e8e\u8bc4\u4f30\u7f16\u7a0b\u667a\u80fd\u4f53\u7684\u771f\u5b9e\u95ee\u9898\u89e3\u51b3\u80fd\u529b\uff0c\u800c\u975e\u8bb0\u5fc6\u80fd\u529b\u3002\u4efb\u52a1\u8986\u76d691\u4e2a\u6d3b\u8dc3\u5f00\u6e90\u4ed3\u5e93\u548c5\u79cd\u7f16\u7a0b\u8bed\u8a00\uff0c\u914d\u5907\u624b\u5199\u9a8c\u8bc1\u5668\u800c\u975e\u539f\u59cbPR\u6d4b\u8bd5\u3002", "why_notable": "\u73b0\u6709\u4e3b\u6d41\u7f16\u7a0b\u57fa\u51c6\uff08\u5982SWE-bench\uff09\u5b58\u5728\u8bad\u7ec3\u6570\u636e\u6c61\u67d3\u548c\u6d4b\u8bd5\u7528\u4f8b\u504f\u5dee\u4e24\u5927\u6839\u672c\u7f3a\u9677\uff0cDeepSWE\u7cfb\u7edf\u6027\u5730\u89e3\u51b3\u4e86\u8fd9\u4e24\u4e2a\u95ee\u9898\uff0c\u4e3a\u771f\u5b9e\u8bc4\u4f30\u7f16\u7a0b\u667a\u80fd\u4f53\u80fd\u529b\u63d0\u4f9b\u4e86\u66f4\u53ef\u9760\u7684\u57fa\u51c6\uff0c\u5bf9\u9886\u57df\u8bc4\u4f30\u4f53\u7cfb\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "As large language models (LLMs) become increasingly capable, the next question is how can we enable models to continually learn? Today, the field largely frames this as a problem of context management and mitigating forgetting. We argue this framing is incomplete: continual learning is fundamentally about increasing model competence as the world changes. We disentangle this change along two axes -- space, where the model encounters new domains, and time, where the underlying data drifts under a fixed task. This framing lets us study continual learning under realistic conditions: new domains arrive over time, facts drift past their training cutoff, and agentic interactions accumulate state across episodes. To evaluate methods under this setting, we recast widely used LLM benchmarks as sequential problems and introduce a single mechanism-agnostic protocol that compares prompt-based methods (GEPA, ACE), supervised learning (SFT, SDFT), reinforcement learning (GRPO, SDPO), and context compression (Cartridges, In-place TTT). Prompt-based methods fit each new stage quickly but degrade on future tasks. Distillation-based methods accumulate knowledge stably but struggle to update outdated facts. Context compression improves efficiency without substantially improving the ability to learn new tasks. Online reinforcement learning adapts most effectively to knowledge updates but remains sensitive to noisy reward signals. Overall, our results suggest that continual learning is not a single capability: different patterns of environmental change require fundamentally different update behaviors, determining when adaptation must be learned inside model weights and when it can be achieved through external scaffolding. We hope that understanding where each method succeeds and fails will guide the design of stronger continual learning systems.", "arxiv_id": "2607.07847", "arxiv_url": "https://arxiv.org/abs/2607.07847", "authors": ["Anne Harrington", "Nayan Saxena", "Michael Murphy", "Anastasia Borovykh", "Zeyu Yun", "Sridhar Kamath", "Ara Eindra Kyi", "Trevor Darrell", "Jitendra Malik", "Yutong Bai"], "brief": "\u672c\u6587\u91cd\u65b0\u5ba1\u89c6\u5927\u8bed\u8a00\u6a21\u578b\u7684\u6301\u7eed\u5b66\u4e60\u95ee\u9898\uff0c\u5c06\u73af\u5883\u53d8\u5316\u5206\u89e3\u4e3a\u7a7a\u95f4\uff08\u65b0\u9886\u57df\uff09\u548c\u65f6\u95f4\uff08\u6570\u636e\u6f02\u79fb\uff09\u4e24\u4e2a\u7ef4\u5ea6\uff0c\u5e76\u5728\u7edf\u4e00\u534f\u8bae\u4e0b\u5bf9\u6bd4\u8bc4\u4f30\u591a\u7c7b\u65b9\u6cd5\uff08\u63d0\u793a\u3001\u76d1\u7763\u5b66\u4e60\u3001\u5f3a\u5316\u5b66\u4e60\u3001\u4e0a\u4e0b\u6587\u538b\u7f29\uff09\u7684\u9002\u5e94\u80fd\u529b\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07847", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u7a7a\u95f4\uff08\u65b0\u9886\u57df\uff09\u4e0e\u65f6\u95f4\uff08\u4e8b\u5b9e\u6f02\u79fb\uff09\u4e24\u8f74\u6846\u67b6\uff0c\u5c06\u4e3b\u6d41LLM\u57fa\u51c6\u91cd\u6784\u4e3a\u5e8f\u5217\u95ee\u9898\u8fdb\u884c\u8bc4\u6d4b", "\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\uff08GRPO/SDPO\uff09\u5bf9\u77e5\u8bc6\u66f4\u65b0\u9002\u5e94\u6700\u6709\u6548\uff0c\u4f46\u5bf9\u566a\u58f0\u5956\u52b1\u4fe1\u53f7\u654f\u611f\uff1b\u84b8\u998f\u65b9\u6cd5\u77e5\u8bc6\u79ef\u7d2f\u7a33\u5b9a\u4f46\u96be\u4ee5\u66f4\u65b0\u8fc7\u65f6\u4e8b\u5b9e", "\u63d0\u793a\u7c7b\u65b9\u6cd5\u5feb\u901f\u9002\u5e94\u65b0\u9636\u6bb5\u4f46\u5728\u672a\u6765\u4efb\u52a1\u4e0a\u9000\u5316\uff1b\u4e0a\u4e0b\u6587\u538b\u7f29\u63d0\u5347\u6548\u7387\u4f46\u4e0d\u663e\u8457\u63d0\u5347\u65b0\u4efb\u52a1\u5b66\u4e60\u80fd\u529b"], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u66f4\u65b0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07847v1", "published_at": "2026-07-08", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "When Does Continual Learning Require Learning", "tldr": "\u7cfb\u7edf\u7814\u7a76LLM\u6301\u7eed\u5b66\u4e60\uff1a\u4e0d\u540c\u73af\u5883\u53d8\u5316\u9700\u8981\u6839\u672c\u4e0d\u540c\u7684\u66f4\u65b0\u7b56\u7565", "upvotes": 0, "what_it_is": "\u672c\u6587\u91cd\u65b0\u5ba1\u89c6\u5927\u8bed\u8a00\u6a21\u578b\u7684\u6301\u7eed\u5b66\u4e60\u95ee\u9898\uff0c\u5c06\u73af\u5883\u53d8\u5316\u5206\u89e3\u4e3a\u7a7a\u95f4\uff08\u65b0\u9886\u57df\uff09\u548c\u65f6\u95f4\uff08\u6570\u636e\u6f02\u79fb\uff09\u4e24\u4e2a\u7ef4\u5ea6\uff0c\u5e76\u5728\u7edf\u4e00\u534f\u8bae\u4e0b\u5bf9\u6bd4\u8bc4\u4f30\u591a\u7c7b\u65b9\u6cd5\uff08\u63d0\u793a\u3001\u76d1\u7763\u5b66\u4e60\u3001\u5f3a\u5316\u5b66\u4e60\u3001\u4e0a\u4e0b\u6587\u538b\u7f29\uff09\u7684\u9002\u5e94\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u5728\u7edf\u4e00\u534f\u8bae\u4e0b\u7cfb\u7edf\u6bd4\u8f83\u591a\u7c7b\u6301\u7eed\u5b66\u4e60\u65b9\u6cd5\uff0c\u63ed\u793a\"\u6301\u7eed\u5b66\u4e60\u5e76\u975e\u5355\u4e00\u80fd\u529b\"\uff0c\u4e3a\u8bbe\u8ba1\u66f4\u5f3a\u6301\u7eed\u5b66\u4e60\u7cfb\u7edf\u63d0\u4f9b\u4e86\u6e05\u6670\u7684\u65b9\u6cd5\u9009\u62e9\u6307\u5357\uff0c\u5bf9LLM\u5b9e\u9645\u90e8\u7f72\u5177\u6709\u91cd\u8981\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Artificial intelligence (AI) is beginning to reshape actuarial practice, particularly in domains that require reasoning over unstructured documents, heterogeneous data sources, and regulated decision workflows. Actuaries now face a design space that ranges from traditional rule-based automation to large language models (LLMs), retrieval-augmented generation (RAG), and multi-agent ``agentic\u0027\u0027 systems that plan, retrieve, call tools, and reflect. This paper examines how these emerging architectures can support actuarial priorities such as transparency, auditability, and human-in-the-loop governance, with a focus on straight-through decision processes. To make these ideas concrete, we develop and analyze an agentic AI framework for straight-through underwriting of small commercial Business Owner Policies (BOPs). We construct a synthetic but realistic experimental environment and compare three underwriting pipelines: (i) a single-LLM baseline, (ii) a naive RAG system, and (iii) a multi-agent ``Agentic RAG\u0027\u0027 pipeline that combines targeted retrieval, third-party data checks, and explicit multi-step rule evaluation. The agentic system performs best overall, with the largest gains in multi-step and missing-information scenarios, where structured retrieval and reflection help the model avoid unsupported straight-through decisions.", "arxiv_id": "2607.07858", "arxiv_url": "https://arxiv.org/abs/2607.07858", "authors": ["Robert Richardson", "Josh Meyers", "Brian Hartman", "David Sandberg"], "brief": "\u672c\u6587\u6784\u5efa\u4e86\u4e00\u4e2a\u9762\u5411\u5c0f\u578b\u5546\u4e1a\u4e1a\u4e3b\u4fdd\u5355\uff08BOP\uff09\u76f4\u901a\u5f0f\u6838\u4fdd\u7684\u591a\u667a\u80fd\u4f53AI\u6846\u67b6\uff0c\u5bf9\u6bd4\u4e86\u5355LLM\u57fa\u7ebf\u3001\u6734\u7d20RAG\u7cfb\u7edf\u548c\u591a\u667a\u80fd\u4f53Agentic RAG\u4e09\u79cd\u6838\u4fdd\u6d41\u6c34\u7ebf\u7684\u6027\u80fd\u8868\u73b0\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07858", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u591a\u667a\u80fd\u4f53Agentic RAG\u7cfb\u7edf\u6574\u5408\u4e86\u5b9a\u5411\u68c0\u7d22\u3001\u7b2c\u4e09\u65b9\u6570\u636e\u6821\u9a8c\u548c\u663e\u5f0f\u591a\u6b65\u89c4\u5219\u8bc4\u4f30\uff0c\u5728\u6574\u4f53\u8868\u73b0\u4e0a\u4f18\u4e8e\u5355LLM\u548c\u6734\u7d20RAG\u65b9\u6848", "\u5728\u591a\u6b65\u63a8\u7406\u548c\u4fe1\u606f\u7f3a\u5931\u573a\u666f\u4e2d\u63d0\u5347\u6700\u4e3a\u663e\u8457\uff0c\u7ed3\u6784\u5316\u68c0\u7d22\u4e0e\u53cd\u601d\u673a\u5236\u6709\u6548\u907f\u514d\u4e86\u65e0\u4f9d\u636e\u7684\u76f4\u901a\u51b3\u7b56", "\u6846\u67b6\u8bbe\u8ba1\u517c\u987e\u7cbe\u7b97\u4f18\u5148\u7ea7\uff1a\u900f\u660e\u6027\u3001\u53ef\u5ba1\u8ba1\u6027\u548c\u4eba\u673a\u534f\u540c\u6cbb\u7406\uff0c\u9002\u914d\u53d7\u76d1\u7ba1\u7684\u51b3\u7b56\u5de5\u4f5c\u6d41"], "keywords": ["\u667a\u80fd\u4f53", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u591a\u6a21\u6001", "\u91d1\u878dAI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07858v1", "published_at": "2026-07-08", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agentic AI and Retrieval-Augmented Models in Straight-Through Underwriting", "tldr": "\u591a\u667a\u80fd\u4f53RAG\u6846\u67b6\u7528\u4e8e\u5546\u4e1a\u4fdd\u9669\u76f4\u901a\u5f0f\u6838\u4fdd\uff0c\u663e\u8457\u63d0\u5347\u590d\u6742\u573a\u666f\u51b3\u7b56\u51c6\u786e\u6027", "upvotes": 0, "what_it_is": "\u672c\u6587\u6784\u5efa\u4e86\u4e00\u4e2a\u9762\u5411\u5c0f\u578b\u5546\u4e1a\u4e1a\u4e3b\u4fdd\u5355\uff08BOP\uff09\u76f4\u901a\u5f0f\u6838\u4fdd\u7684\u591a\u667a\u80fd\u4f53AI\u6846\u67b6\uff0c\u5bf9\u6bd4\u4e86\u5355LLM\u57fa\u7ebf\u3001\u6734\u7d20RAG\u7cfb\u7edf\u548c\u591a\u667a\u80fd\u4f53Agentic RAG\u4e09\u79cd\u6838\u4fdd\u6d41\u6c34\u7ebf\u7684\u6027\u80fd\u8868\u73b0\u3002", "why_notable": "\u5c06LLM/RAG/\u591a\u667a\u80fd\u4f53\u6280\u672f\u843d\u5730\u4e8e\u9ad8\u5ea6\u76d1\u7ba1\u7684\u4fdd\u9669\u6838\u4fdd\u573a\u666f\uff0c\u63d0\u4f9b\u4e86\u53ef\u590d\u73b0\u7684\u5408\u6210\u5b9e\u9a8c\u73af\u5883\u4e0e\u7cfb\u7edf\u5bf9\u6bd4\uff0c\u5bf9\u91d1\u878d/\u4fdd\u9669AI\u5408\u89c4\u5e94\u7528\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "Post-training quantization (PTQ) is a widely adopted technique for compressing large language models (LLMs) without retraining. Existing second-order PTQ methods, including GPTQ, construct quantization objectives exclusively from input activation statistics, effectively assuming that all output channels contribute equally to the layer-wise reconstruction objective. We propose KronQ, a PTQ framework that challenges this assumption by introducing the gradient covariance into the quantization pipeline. Under the Kronecker-factored Hessian approximation, the quantization loss depends jointly on both the activation and gradient covariances, and KronQ exploits this at two complementary levels. (1) KronQ introduces bidirectional incoherence processing, extending the existing input-side random rotation to the output dimension using the gradient covariance, reducing weight magnitude variance across both input and output dimensions. (2) KronQ derives a new sensitivity metric for inter-layer mixed-precision allocation, driven by the gradient and activation Hessian traces. Notably, in the case of 2-bit weight-only quantization on LLaMA-3-70B, while GPTQ and GPTAQ diverge or produce degenerate quantizations (\u003e2000 perplexity on WikiText-2), KronQ achieves 7.93 perplexity.", "arxiv_id": "2607.07964", "arxiv_url": "https://arxiv.org/abs/2607.07964", "authors": ["Donghyun Lee", "Yuhang Li", "Ruokai Yin", "Priyadarshini Panda"], "brief": "\u63d0\u51faKronQ\u91cf\u5316\u6846\u67b6\uff0c\u901a\u8fc7Kronecker\u5206\u89e3Hessian\u8fd1\u4f3c\u5c06\u68af\u5ea6\u534f\u65b9\u5dee\u5f15\u5165\u91cf\u5316\u76ee\u6807\uff0c\u540c\u65f6\u5b9e\u73b0\u53cc\u5411\u4e0d\u76f8\u5e72\u5904\u7406\u548c\u57fa\u4e8eHessian\u8ff9\u7684\u6df7\u5408\u7cbe\u5ea6\u5206\u914d\u7b56\u7565\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07964", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u73b0\u6709GPTQ\u7b49\u65b9\u6cd5\u4ec5\u5229\u7528\u8f93\u5165\u6fc0\u6d3b\u7edf\u8ba1\uff0c\u9690\u542b\u5047\u8bbe\u6240\u6709\u8f93\u51fa\u901a\u9053\u8d21\u732e\u76f8\u7b49\uff1bKronQ\u901a\u8fc7Kronecker\u5206\u89e3Hessian\u540c\u65f6\u8003\u8651\u6fc0\u6d3b\u4e0e\u68af\u5ea6\u534f\u65b9\u5dee", "\u53cc\u5411\u4e0d\u76f8\u5e72\u5904\u7406\uff1a\u5c06\u968f\u673a\u65cb\u8f6c\u4ece\u8f93\u5165\u4fa7\u6269\u5c55\u5230\u8f93\u51fa\u7ef4\u5ea6\uff0c\u5229\u7528\u68af\u5ea6\u534f\u65b9\u5dee\u964d\u4f4e\u6743\u91cd\u5e45\u5ea6\u65b9\u5dee", "2-bit\u91cf\u5316LLaMA-3-70B\u65f6\uff0cGPTQ/GPTAQ\u56f0\u60d1\u5ea6\u53d1\u6563\uff08\u003e2000\uff09\uff0cKronQ\u8fbe\u52307.93\u7684WikiText-2\u56f0\u60d1\u5ea6"], "keywords": ["\u6a21\u578b\u91cf\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4e8c\u9636\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07964v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "KronQ: LLM Quantization via Kronecker-Factored Hessian", "tldr": "KronQ\u5f15\u5165\u68af\u5ea6\u534f\u65b9\u5dee\u6539\u8fdbLLM\u8bad\u7ec3\u540e\u91cf\u5316\uff0c2-bit\u91cf\u5316\u6548\u679c\u5927\u5e45\u4f18\u4e8eGPTQ", "upvotes": 0, "what_it_is": "\u63d0\u51faKronQ\u91cf\u5316\u6846\u67b6\uff0c\u901a\u8fc7Kronecker\u5206\u89e3Hessian\u8fd1\u4f3c\u5c06\u68af\u5ea6\u534f\u65b9\u5dee\u5f15\u5165\u91cf\u5316\u76ee\u6807\uff0c\u540c\u65f6\u5b9e\u73b0\u53cc\u5411\u4e0d\u76f8\u5e72\u5904\u7406\u548c\u57fa\u4e8eHessian\u8ff9\u7684\u6df7\u5408\u7cbe\u5ea6\u5206\u914d\u7b56\u7565\u3002", "why_notable": "\u5728\u6781\u4f4e\u6bd4\u7279\uff082-bit\uff09\u91cf\u5316\u573a\u666f\u4e0b\u89e3\u51b3\u4e86\u73b0\u6709\u65b9\u6cd5\u5b8c\u5168\u5931\u6548\u7684\u95ee\u9898\uff0c\u4e14\u65b9\u6cd5\u65e0\u9700\u91cd\u8bad\u7ec3\uff0c\u5bf9\u5927\u6a21\u578b\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Current safety methods for large language models are known to be vulnerable to adversarial attacks, motivating research into robust alternatives. Latent Adversarial Training (LAT) is among the most effective defenses, but can degrade utility and requires training on large datasets of harmful prompts. We introduce Latent Personality Alignment (LPA), which replaces explicit harm refusal with adversarial training on just 66 harm-agnostic statements drawn from psychometric personality literature. We hypothesize that personality-anchored representations share latent structure with harm avoidance, so adversarially stabilizing them implicitly constrains the subspace exploited by jailbreak attacks. LPA achieves near-zero attack success rates on HarmBench across direct requests and five jailbreak methods, despite never seeing harmful content during training and no loss of performance on standard benchmarks. Moreover, the training process is lightweight; the entire procedure completes in minutes on a single GPU and uses 75x fewer examples than standard LAT. Extensive ablations demonstrate the robustness, efficiency, and generalization of our method.", "arxiv_id": "2607.07918", "arxiv_url": "https://arxiv.org/abs/2607.07918", "authors": ["Mohamed Amine Merzouk", "Nolan Smyth", "Damiano Fornasiere", "Linh Le", "David Williams-King", "Adam Oberman"], "brief": "\u63d0\u51fa\u6f5c\u5728\u4eba\u683c\u5bf9\u9f50\uff08LPA\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u5bf9\u5fc3\u7406\u6d4b\u91cf\u4eba\u683c\u9648\u8ff0\u8fdb\u884c\u5bf9\u6297\u8bad\u7ec3\uff0c\u9690\u5f0f\u7ea6\u675f\u8d8a\u72f1\u653b\u51fb\u6240\u5229\u7528\u7684\u6f5c\u5728\u5b50\u7a7a\u95f4\uff0c\u65e0\u9700\u63a5\u89e6\u6709\u5bb3\u5185\u5bb9\u5373\u53ef\u5b9e\u73b0\u5b89\u5168\u5bf9\u9f50\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07918", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4ec5\u4f7f\u752866\u6761\u4e0e\u5371\u5bb3\u65e0\u5173\u7684\u4eba\u683c\u5fc3\u7406\u6d4b\u91cf\u8bed\u53e5\u8fdb\u884c\u5bf9\u6297\u8bad\u7ec3\uff0c\u6bd4\u6807\u51c6LAT\u5c1175\u500d\u8bad\u7ec3\u6837\u672c", "\u5728HarmBench\u4e0a\u5bf9\u76f4\u63a5\u8bf7\u6c42\u548c\u4e94\u79cd\u8d8a\u72f1\u65b9\u6cd5\u5747\u5b9e\u73b0\u63a5\u8fd1\u96f6\u7684\u653b\u51fb\u6210\u529f\u7387", "\u5355GPU\u4e0a\u8bad\u7ec3\u4ec5\u9700\u6570\u5206\u949f\uff0c\u4e14\u4e0d\u635f\u5931\u6807\u51c6\u57fa\u51c6\u6d4b\u8bd5\u6027\u80fd"], "keywords": ["\u5b89\u5168\u5bf9\u9f50", "\u5bf9\u6297\u8bad\u7ec3", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8d8a\u72f1\u653b\u51fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07918v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Efficient Safety Alignment of Language Models via Latent Personality Traits", "tldr": "\u752866\u6761\u4eba\u683c\u5fc3\u7406\u6d4b\u91cf\u8bed\u53e5\u66ff\u4ee3\u6709\u5bb3\u5185\u5bb9\u8bad\u7ec3\uff0c\u5b9e\u73b0\u9ad8\u6548\u9c81\u68d2\u7684LLM\u5b89\u5168\u5bf9\u9f50", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u6f5c\u5728\u4eba\u683c\u5bf9\u9f50\uff08LPA\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u5bf9\u5fc3\u7406\u6d4b\u91cf\u4eba\u683c\u9648\u8ff0\u8fdb\u884c\u5bf9\u6297\u8bad\u7ec3\uff0c\u9690\u5f0f\u7ea6\u675f\u8d8a\u72f1\u653b\u51fb\u6240\u5229\u7528\u7684\u6f5c\u5728\u5b50\u7a7a\u95f4\uff0c\u65e0\u9700\u63a5\u89e6\u6709\u5bb3\u5185\u5bb9\u5373\u53ef\u5b9e\u73b0\u5b89\u5168\u5bf9\u9f50\u3002", "why_notable": "\u7a81\u7834\u4e86\u5b89\u5168\u5bf9\u9f50\u5fc5\u987b\u4f9d\u8d56\u5927\u91cf\u6709\u5bb3\u5185\u5bb9\u6570\u636e\u96c6\u7684\u8303\u5f0f\uff0c\u4ee5\u6781\u4f4e\u6210\u672c\u5b9e\u73b0\u5f3a\u9c81\u68d2\u6027\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u540c\u65f6\u63ed\u793a\u4e86\u4eba\u683c\u8868\u5f81\u4e0e\u5371\u5bb3\u89c4\u907f\u4e4b\u95f4\u7684\u6f5c\u5728\u7ed3\u6784\u5173\u8054\u3002"}, {"abstract": "Bubeck, Li and Nagaraj conjectured that, for generic data, any two-layer neural network with $m$ neurons that fits $n$ noisy labels must have Lipschitz constant at least of order $\\sqrt{n/m}$, with no restriction on the size of the weights. Bubeck and Sellke proved a universal version of this law for Lipschitz-parameterized classes, but under a polynomial bound on the parameters; at depth three that boundedness hypothesis is genuinely necessary. The two-layer unbounded-weight case requires a different argument. We prove the conjectured law, up to one logarithmic factor, for every continuous piecewise-linear activation, in particular for ReLU networks. For data drawn uniformly from $\\mathbb{S}^{d-1}$, $d\\ge3$, or from $N(0,I_d/d)$, labels in $[-1,1]$ with noise level $\u03c3^2\u003e0$, and any width-$m$ two-layer network with arbitrary real weights, biases and affine skip connection, fitting the data $\\varepsilon$ below the noise floor forces $\\mathrm{Lip}(f)\\ge c\\,\\varepsilon\\sqrt{n/(\\bar m\\log(C\\bar m nd/\\varepsilon))}$, $\\bar m=(K-1)m+1$, with high probability. A realized-kink-count version holds on the same event: every realized two-layer piecewise-linear function with $k(f)\\le n$ distinct kink hyperplanes obeys the bound with $\\bar m$ replaced by $k(f)+1$, irrespective of how many redundant hidden units parameterize it. The proof replaces parameter-space covering, impossible for unbounded weights, by a function-space covering. The central deterministic ingredient is a rigidity lemma: on $B_2$, and on $\\mathbb{S}^{d-1}$ for $d\\ge3$, the coefficient of each canonical kink is controlled by the Lipschitz constant of the realized function, because kinks on distinct hyperplanes cannot cancel at generic points. Rigidity genuinely fails at $d=2$, and an explicit two-layer ReLU interpolant with $O(1)$ Lipschitz constant at width $2n$ matches the law at the overparameterized endpoint.", "arxiv_id": "2607.07778", "arxiv_url": "https://arxiv.org/abs/2607.07778", "authors": ["Yitzchak Shmalo"], "brief": "\u672c\u6587\u8bc1\u660e\u4e86Bubeck-Li-Nagaraj\u5173\u4e8e\u53cc\u5c42\u795e\u7ecf\u7f51\u7edc\u9c81\u68d2\u6027\u7684\u731c\u60f3\uff1a\u5bf9\u4e8e\u901a\u7528\u6570\u636e\uff0c\u4efb\u610f\u6743\u91cd\u7684\u53cc\u5c42\u795e\u7ecf\u7f51\u7edc\u82e5\u62df\u5408n\u4e2a\u566a\u58f0\u6807\u7b7e\uff0c\u5176Lipschitz\u5e38\u6570\u5fc5\u987b\u81f3\u5c11\u4e3a\u221a(n/m)\u91cf\u7ea7\uff08\u5dee\u4e00\u4e2a\u5bf9\u6570\u56e0\u5b50\uff09\uff0c\u9002\u7528\u4e8e\u6240\u6709\u8fde\u7eed\u5206\u6bb5\u7ebf\u6027\u6fc0\u6d3b\u51fd\u6570\uff08\u5305\u62ecReLU\uff09\u3002", "categories": ["cs.LG", "math.PR", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07778", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u7a81\u7834\u65e0\u754c\u6743\u91cd\u9650\u5236\uff1a\u901a\u8fc7\u51fd\u6570\u7a7a\u95f4\u8986\u76d6\u4ee3\u66ff\u53c2\u6570\u7a7a\u95f4\u8986\u76d6\uff0c\u7ed5\u5f00\u4e86Bubeck-Sellke\u5b9a\u7406\u8981\u6c42\u53c2\u6570\u6709\u754c\u7684\u5047\u8bbe", "\u6838\u5fc3\u521a\u6027\u5f15\u7406\uff1a\u5728d\u22653\u7ef4\u7403\u9762\u4e0a\uff0c\u6bcf\u4e2a\u5178\u8303\u6298\u75d5\u7cfb\u6570\u88ab\u51fd\u6570Lipschitz\u5e38\u6570\u63a7\u5236\uff0c\u56e0\u4e3a\u4e0d\u540c\u8d85\u5e73\u9762\u4e0a\u7684\u6298\u75d5\u5728\u901a\u7528\u70b9\u4e0d\u80fd\u76f8\u6d88", "d=2\u65f6\u521a\u6027\u771f\u6b63\u5931\u6548\uff0c\u5e76\u7ed9\u51fa\u663e\u5f0f\u5bbd\u5ea62n\u7684ReLU\u63d2\u503c\u6784\u9020\uff0cLipschitz\u5e38\u6570\u4e3aO(1)\uff0c\u4e0e\u5b9a\u5f8b\u5728\u8fc7\u53c2\u6570\u5316\u7aef\u70b9\u543b\u5408"], "keywords": ["\u795e\u7ecf\u7f51\u7edc\u7406\u8bba", "\u9c81\u68d2\u6027", "\u6cdb\u5316\u7406\u8bba", "ReLU\u7f51\u7edc"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07778v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "A law of robustness for two-layer neural networks with arbitrary weights", "tldr": "\u8bc1\u660e\u53cc\u5c42\u795e\u7ecf\u7f51\u7edc\u9c81\u68d2\u6027\u5b9a\u5f8b\uff1a\u62df\u5408n\u4e2a\u566a\u58f0\u6807\u7b7e\u7684\u5bbd\u5ea6m\u7f51\u7edcLipschitz\u5e38\u6570\u81f3\u5c11\u4e3a\u221a(n/m)\u91cf\u7ea7", "upvotes": 0, "what_it_is": "\u672c\u6587\u8bc1\u660e\u4e86Bubeck-Li-Nagaraj\u5173\u4e8e\u53cc\u5c42\u795e\u7ecf\u7f51\u7edc\u9c81\u68d2\u6027\u7684\u731c\u60f3\uff1a\u5bf9\u4e8e\u901a\u7528\u6570\u636e\uff0c\u4efb\u610f\u6743\u91cd\u7684\u53cc\u5c42\u795e\u7ecf\u7f51\u7edc\u82e5\u62df\u5408n\u4e2a\u566a\u58f0\u6807\u7b7e\uff0c\u5176Lipschitz\u5e38\u6570\u5fc5\u987b\u81f3\u5c11\u4e3a\u221a(n/m)\u91cf\u7ea7\uff08\u5dee\u4e00\u4e2a\u5bf9\u6570\u56e0\u5b50\uff09\uff0c\u9002\u7528\u4e8e\u6240\u6709\u8fde\u7eed\u5206\u6bb5\u7ebf\u6027\u6fc0\u6d3b\u51fd\u6570\uff08\u5305\u62ecReLU\uff09\u3002", "why_notable": "\u5b8c\u6574\u8bc1\u660e\u4e86\u4e00\u4e2a\u91cd\u8981\u7684\u5f00\u653e\u731c\u60f3\uff0c\u63ed\u793a\u4e86\u795e\u7ecf\u7f51\u7edc\u8fc7\u53c2\u6570\u5316\u4e0e\u9c81\u68d2\u6027\u4e4b\u95f4\u7684\u57fa\u672c\u6743\u8861\u89c4\u5f8b\uff0c\u5bf9\u7406\u89e3\u6df1\u5ea6\u5b66\u4e60\u6cdb\u5316\u4e0e\u5bf9\u6297\u9c81\u68d2\u6027\u5177\u6709\u91cd\u8981\u7406\u8bba\u610f\u4e49"}, {"abstract": "Starting from the utilization of deep neural networks to approximate the state-action value function that led to winning one of the most challenging games, to algorithmic advancements that allowed solving problems without even explicitly stating the rules of the challenge at hand, reinforcement learning research has been the center of remarkable scientific progress for the past decade. In this paper, we focus on the key ingredients of this research progress and we analyze the canonical evaluation and design paradigms in reinforcement learning. We introduce the theoretical foundations of scaling laws in reinforcement learning and show that the asymptotic performance of reinforcement learning algorithms does not have a monotone relationship between performance rankings and data-regimes. We conduct large-scale experiments and our results demonstrate that a line of reinforcement learning research under the canonical design and evaluation paradigms resulted in incorrect conclusions. Our analysis and results provide a core analysis on scaling, capacity and complexity of deep reinforcement learning.", "arxiv_id": "2607.07769", "arxiv_url": "https://arxiv.org/abs/2607.07769", "authors": ["Ezgi Korkmaz"], "brief": "\u672c\u6587\u5bf9\u6df1\u5ea6\u5f3a\u5316\u5b66\u4e60\u7684\u4e3b\u6d41\u8bc4\u4f30\u4e0e\u8bbe\u8ba1\u8303\u5f0f\u8fdb\u884c\u539f\u7406\u6027\u5206\u6790\uff0c\u63d0\u51fa\u5f3a\u5316\u5b66\u4e60\u4e2d\u7f29\u653e\u5b9a\u5f8b\u7684\u7406\u8bba\u57fa\u7840\uff0c\u5e76\u901a\u8fc7\u5927\u89c4\u6a21\u5b9e\u9a8c\u8bc1\u660e\u73b0\u6709\u6807\u51c6\u8bc4\u4f30\u8303\u5f0f\u5bfc\u81f4\u4e86\u9519\u8bef\u7ed3\u8bba\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07769", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u7406\u8bba\u8bc1\u660e\u5f3a\u5316\u5b66\u4e60\u7b97\u6cd5\u7684\u6e10\u8fd1\u6027\u80fd\u4e0e\u6570\u636e\u89c4\u6a21\u4e4b\u95f4\u4e0d\u5b58\u5728\u5355\u8c03\u5173\u7cfb\uff0c\u5373\u5c0f\u6570\u636e\u4e0b\u6392\u540d\u9760\u524d\u7684\u7b97\u6cd5\u5728\u5927\u6570\u636e\u4e0b\u672a\u5fc5\u66f4\u4f18", "\u5927\u89c4\u6a21\u5b9e\u9a8c\u9a8c\u8bc1\uff1a\u73b0\u6709\u4e3b\u6d41\u8bbe\u8ba1\u4e0e\u8bc4\u4f30\u8303\u5f0f\u4e0b\u5f97\u51fa\u7684\u591a\u9879\u7814\u7a76\u7ed3\u8bba\u5b58\u5728\u7cfb\u7edf\u6027\u9519\u8bef", "\u63d0\u4f9b\u4e86\u5173\u4e8e\u6df1\u5ea6\u5f3a\u5316\u5b66\u4e60\u7f29\u653e\u6027\u3001\u5bb9\u91cf\u4e0e\u590d\u6742\u5ea6\u7684\u6838\u5fc3\u5206\u6790\u6846\u67b6"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u7f29\u653e\u5b9a\u5f8b", "\u8bc4\u4f30\u8303\u5f0f", "\u6df1\u5ea6\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07769v1", "published_at": "2026-07-08", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Principled Analysis of Deep Reinforcement Learning Evaluation and Design Paradigms", "tldr": "\u63ed\u793a\u6df1\u5ea6\u5f3a\u5316\u5b66\u4e60\u8bc4\u4f30\u8303\u5f0f\u5b58\u5728\u7cfb\u7edf\u6027\u7f3a\u9677\uff0c\u7b97\u6cd5\u6027\u80fd\u6392\u540d\u968f\u6570\u636e\u89c4\u6a21\u975e\u5355\u8c03\u53d8\u5316", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9\u6df1\u5ea6\u5f3a\u5316\u5b66\u4e60\u7684\u4e3b\u6d41\u8bc4\u4f30\u4e0e\u8bbe\u8ba1\u8303\u5f0f\u8fdb\u884c\u539f\u7406\u6027\u5206\u6790\uff0c\u63d0\u51fa\u5f3a\u5316\u5b66\u4e60\u4e2d\u7f29\u653e\u5b9a\u5f8b\u7684\u7406\u8bba\u57fa\u7840\uff0c\u5e76\u901a\u8fc7\u5927\u89c4\u6a21\u5b9e\u9a8c\u8bc1\u660e\u73b0\u6709\u6807\u51c6\u8bc4\u4f30\u8303\u5f0f\u5bfc\u81f4\u4e86\u9519\u8bef\u7ed3\u8bba\u3002", "why_notable": "\u76f4\u63a5\u6311\u6218\u5f3a\u5316\u5b66\u4e60\u9886\u57df\u8fc7\u53bb\u5341\u5e74\u7684\u4e3b\u6d41\u8bc4\u4f30\u65b9\u6cd5\u8bba\uff0c\u6307\u51fa\u5927\u91cf\u5df2\u53d1\u8868\u7814\u7a76\u7ed3\u8bba\u53ef\u80fd\u56e0\u8bc4\u4f30\u8303\u5f0f\u7f3a\u9677\u800c\u5931\u6548\uff0c\u5bf9\u6574\u4e2a\u9886\u57df\u7684\u57fa\u51c6\u6d4b\u8bd5\u4e0e\u7b97\u6cd5\u6bd4\u8f83\u65b9\u5f0f\u5177\u6709\u6df1\u8fdc\u5f71\u54cd\u3002"}, {"abstract": "Long-horizon robot planning requires jointly reasoning over semantic task structure and geometric feasibility. To successfully execute a task, a robot must decompose goals, select task-relevant objects, and sequence actions, while ensuring that plans satisfy spatial constraints such as limited free space and object collisions. In this work, we propose APIVOT, a VLM-based planner that adaptively interleaves language and visual thoughts for long-horizon planning. APIVOT learns to leverage language for semantic reasoning, while using visual thoughts as imagined future states for internal verification of geometric feasibility. On long-horizon kitchen tasks, APIVOT outperforms general-purpose VLMs and prior planning frameworks, achieving the largest gains in spatially constrained settings. We find that APIVOT learns meaningful modality selection behavior, demonstrating that adaptive interleaving of vision-language thoughts improves both planning success and reasoning efficiency.", "arxiv_id": "2607.08024", "arxiv_url": "https://arxiv.org/abs/2607.08024", "authors": ["Emily Jin", "Joy Hsu", "Yiqing Xu", "Weiyu Liu", "Nick Haber", "Jiajun Wu"], "brief": "\u63d0\u51faAPIVOT\uff0c\u4e00\u79cd\u57fa\u4e8eVLM\u7684\u673a\u5668\u4eba\u89c4\u5212\u5668\uff0c\u80fd\u81ea\u9002\u5e94\u5730\u4ea4\u9519\u4f7f\u7528\u8bed\u8a00\u63a8\u7406\uff08\u8bed\u4e49\u5206\u89e3\uff09\u548c\u89c6\u89c9\u601d\u7ef4\uff08\u60f3\u8c61\u672a\u6765\u72b6\u6001\uff09\u6765\u9a8c\u8bc1\u51e0\u4f55\u53ef\u884c\u6027\uff0c\u5b9e\u73b0\u957f\u65f6\u7a0b\u4efb\u52a1\u89c4\u5212\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.08024", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u81ea\u9002\u5e94\u4ea4\u9519\u673a\u5236\uff1a\u52a8\u6001\u9009\u62e9\u8bed\u8a00\u6216\u89c6\u89c9\u601d\u7ef4\u6a21\u6001\uff0c\u8bed\u8a00\u8d1f\u8d23\u8bed\u4e49\u63a8\u7406\uff0c\u89c6\u89c9\u601d\u7ef4\u4f5c\u4e3a\u5185\u90e8\u60f3\u8c61\u72b6\u6001\u9a8c\u8bc1\u7a7a\u95f4\u7ea6\u675f", "\u5728\u957f\u65f6\u7a0b\u53a8\u623f\u4efb\u52a1\u57fa\u51c6\u4e0a\u8d85\u8d8a\u901a\u7528VLM\u548c\u5df2\u6709\u89c4\u5212\u6846\u67b6\uff0c\u5728\u7a7a\u95f4\u53d7\u9650\u573a\u666f\uff08\u6709\u9650\u7a7a\u95f4\u3001\u7269\u4f53\u78b0\u649e\uff09\u4e2d\u63d0\u5347\u6700\u4e3a\u663e\u8457", "\u6a21\u578b\u5b66\u5230\u4e86\u6709\u610f\u4e49\u7684\u6a21\u6001\u9009\u62e9\u884c\u4e3a\uff0c\u8bc1\u660e\u81ea\u9002\u5e94\u4ea4\u9519\u540c\u65f6\u63d0\u5347\u89c4\u5212\u6210\u529f\u7387\u548c\u63a8\u7406\u6548\u7387"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u673a\u5668\u4eba\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.08024v1", "published_at": "2026-07-09", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "APIVOT: Adaptive Planning with Interleaved Vision-Language Thoughts", "tldr": "APIVOT\uff1a\u81ea\u9002\u5e94\u4ea4\u9519\u89c6\u89c9-\u8bed\u8a00\u601d\u7ef4\u7684\u957f\u65f6\u7a0b\u673a\u5668\u4eba\u89c4\u5212\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faAPIVOT\uff0c\u4e00\u79cd\u57fa\u4e8eVLM\u7684\u673a\u5668\u4eba\u89c4\u5212\u5668\uff0c\u80fd\u81ea\u9002\u5e94\u5730\u4ea4\u9519\u4f7f\u7528\u8bed\u8a00\u63a8\u7406\uff08\u8bed\u4e49\u5206\u89e3\uff09\u548c\u89c6\u89c9\u601d\u7ef4\uff08\u60f3\u8c61\u672a\u6765\u72b6\u6001\uff09\u6765\u9a8c\u8bc1\u51e0\u4f55\u53ef\u884c\u6027\uff0c\u5b9e\u73b0\u957f\u65f6\u7a0b\u4efb\u52a1\u89c4\u5212\u3002", "why_notable": "\u9996\u6b21\u5c06\u89c6\u89c9\u601d\u7ef4\u4f5c\u4e3a\u0027\u60f3\u8c61\u672a\u6765\u72b6\u6001\u0027\u5f15\u5165\u673a\u5668\u4eba\u89c4\u5212\u7684\u5185\u90e8\u9a8c\u8bc1\u673a\u5236\uff0c\u89e3\u51b3\u4e86\u7eaf\u8bed\u8a00\u89c4\u5212\u65e0\u6cd5\u5904\u7406\u51e0\u4f55\u7ea6\u675f\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5bf9\u5177\u8eab\u667a\u80fd\u957f\u65f6\u7a0b\u89c4\u5212\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "This paper studies an online variant of the assistance games framework, where an informed agent and an uninformed agent repeatedly interact over $T$ timesteps to optimize a common reward function. While the informed agent (the human) observes a latent state of the world, the uninformed agent (the assistant) observes only the human\u0027s actions. We provide the first provably efficient learning algorithms for repeated assistance games. We introduce the notion of assistance regret: the gap between the cumulative utility of interactions and that of the optimal joint policies in hindsight, which map latent states to action pairs. We present decentralized algorithms for both the human and the assistant that achieve a $(1-1/e)$-approximate assistance regret rate of $\\widetilde{O}(T^{3/4})$, with runtime polynomial in the size of the action and state spaces. These algorithms are general; in particular, they accommodate any no-regret algorithm for the assistant. We prove that achieving a regret approximation factor better than $(1-1/e)$ is computationally intractable. Furthermore, we demonstrate how these generic no-regret algorithms can be tailored to a pseudo-decentralized setting -- using a shared random string -- to achieve a rate of $\\widetilde{O}(T^{1/2})$, optimal up to logarithmic factors.", "arxiv_id": "2607.08012", "arxiv_url": "https://arxiv.org/abs/2607.08012", "authors": ["Nivasini Ananthakrishnan", "Mark Bedaywi", "Michael I. Jordan", "Stuart Russell", "Nika Haghtalab"], "brief": "\u672c\u6587\u7814\u7a76\u8f85\u52a9\u535a\u5f08\uff08assistance games\uff09\u7684\u5728\u7ebf\u53d8\u4f53\uff0c\u63d0\u51fa\u9996\u4e2a\u53ef\u8bc1\u660e\u9ad8\u6548\u7684\u5b66\u4e60\u7b97\u6cd5\uff0c\u4f7f\u77e5\u60c5\u667a\u80fd\u4f53\uff08\u4eba\u7c7b\uff09\u4e0e\u975e\u77e5\u60c5\u667a\u80fd\u4f53\uff08\u52a9\u624b\uff09\u5728T\u6b65\u4ea4\u4e92\u4e2d\u6700\u5c0f\u5316\u8f85\u52a9\u9057\u61be\uff08assistance regret\uff09\u3002", "categories": ["cs.LG", "cs.AI", "cs.GT"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.08012", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u53bb\u4e2d\u5fc3\u5316\u7b97\u6cd5\uff0c\u5b9e\u73b0(1-1/e)\u8fd1\u4f3c\u8f85\u52a9\u9057\u61be\u7387 \u00d5(T^{3/4})\uff0c\u8fd0\u884c\u65f6\u95f4\u5173\u4e8e\u52a8\u4f5c\u548c\u72b6\u6001\u7a7a\u95f4\u591a\u9879\u5f0f", "\u8bc1\u660e\u8d85\u8d8a(1-1/e)\u8fd1\u4f3c\u56e0\u5b50\u5728\u8ba1\u7b97\u4e0a\u4e0d\u53ef\u884c\uff0c\u5373\u8be5\u8fd1\u4f3c\u6bd4\u662f\u6700\u4f18\u7684", "\u5728\u4f2a\u53bb\u4e2d\u5fc3\u5316\u8bbe\u7f6e\uff08\u5171\u4eab\u968f\u673a\u4e32\uff09\u4e0b\uff0c\u9057\u61be\u7387\u63d0\u5347\u81f3 \u00d5(T^{1/2})\uff0c\u8fbe\u5230\u5bf9\u6570\u56e0\u5b50\u610f\u4e49\u4e0b\u7684\u6700\u4f18"], "keywords": ["\u667a\u80fd\u4f53", "\u5728\u7ebf\u5b66\u4e60", "\u535a\u5f08\u8bba", "AI\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.08012v1", "published_at": "2026-07-09", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Provably Optimal Learning Algorithms for Assistance Games", "tldr": "\u9996\u6b21\u4e3a\u8f85\u52a9\u535a\u5f08\u63d0\u51fa\u53ef\u8bc1\u660e\u6700\u4f18\u7684\u5728\u7ebf\u5b66\u4e60\u7b97\u6cd5\uff0c\u5b9e\u73b0\u8fd1\u4f3c\u9057\u61be\u7387\u6700\u4f18\u754c", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u8f85\u52a9\u535a\u5f08\uff08assistance games\uff09\u7684\u5728\u7ebf\u53d8\u4f53\uff0c\u63d0\u51fa\u9996\u4e2a\u53ef\u8bc1\u660e\u9ad8\u6548\u7684\u5b66\u4e60\u7b97\u6cd5\uff0c\u4f7f\u77e5\u60c5\u667a\u80fd\u4f53\uff08\u4eba\u7c7b\uff09\u4e0e\u975e\u77e5\u60c5\u667a\u80fd\u4f53\uff08\u52a9\u624b\uff09\u5728T\u6b65\u4ea4\u4e92\u4e2d\u6700\u5c0f\u5316\u8f85\u52a9\u9057\u61be\uff08assistance regret\uff09\u3002", "why_notable": "\u9996\u6b21\u4e3a\u8f85\u52a9\u535a\u5f08\u63d0\u4f9b\u53ef\u8bc1\u660e\u9ad8\u6548\u7b97\u6cd5\u5e76\u7ed9\u51fa\u5339\u914d\u7684\u8ba1\u7b97\u4e0b\u754c\uff0c\u5bf9AI\u5bf9\u9f50\u4e0e\u4eba\u673a\u534f\u4f5c\u7684\u7406\u8bba\u57fa\u7840\u5177\u6709\u91cd\u8981\u610f\u4e49"}, {"abstract": "Large language models have enabled powerful code completion systems that assist developers by predicting subsequent lines of code. However, these models remain vulnerable to backdoor attacks, where malicious fine-tuning data covertly implants unsafe behaviors. Despite advances in defensive techniques, adaptive and sophisticated backdoor attacks still evade detection and mitigation. We present CodeTracer, a forensic framework that traces malicious code completions back to the backdoor fine-tuning data responsible for them. Operating under realistic post-deployment constraints, CodeTracer relies solely on the fine-tuning corpus and the reported miscompletion event. It extracts a structured behavioral fingerprint from the compromised output, narrows the search to semantically relevant code samples, and employs LLM-based reasoning to attribute unsafe logic to specific backdoor data. Extensive evaluations across three representative vulnerability cases and ten backdoor attacks, along with sixteen competitive baselines, demonstrate that CodeTracer consistently achieves high forensic accuracy, low false identification rates, and strong robustness against adaptive attacks.", "arxiv_id": "2607.08011", "arxiv_url": "https://arxiv.org/abs/2607.08011", "authors": ["Anjun Gao", "Yueyang Quan", "Zhuqing Liu", "Minghong Fang"], "brief": "\u63d0\u51faCodeTracer\u53d6\u8bc1\u6846\u67b6\uff0c\u80fd\u591f\u5728\u6a21\u578b\u90e8\u7f72\u540e\u4ec5\u51ed\u5fae\u8c03\u8bed\u6599\u548c\u9519\u8bef\u8865\u5168\u4e8b\u4ef6\uff0c\u5c06\u6076\u610f\u4ee3\u7801\u8865\u5168\u884c\u4e3a\u8ffd\u6eaf\u81f3\u5177\u4f53\u7684\u540e\u95e8\u5fae\u8c03\u6570\u636e\uff0c\u5b9e\u73b0\u653b\u51fb\u6eaf\u6e90\u3002", "categories": ["cs.CR", "cs.AI", "cs.IR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.08011", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u4ece\u88ab\u653b\u51fb\u8f93\u51fa\u4e2d\u63d0\u53d6\u7ed3\u6784\u5316\u884c\u4e3a\u6307\u7eb9\uff0c\u7f29\u5c0f\u8bed\u4e49\u76f8\u5173\u4ee3\u7801\u6837\u672c\u641c\u7d22\u8303\u56f4", "\u5229\u7528LLM\u63a8\u7406\u5c06\u4e0d\u5b89\u5168\u903b\u8f91\u5f52\u56e0\u81f3\u7279\u5b9a\u540e\u95e8\u6570\u636e", "\u57283\u7c7b\u6f0f\u6d1e\u573a\u666f\u300110\u79cd\u540e\u95e8\u653b\u51fb\u548c16\u4e2a\u57fa\u7ebf\u5bf9\u6bd4\u4e2d\u5747\u8868\u73b0\u51fa\u9ad8\u53d6\u8bc1\u51c6\u786e\u7387\u548c\u4f4e\u8bef\u5224\u7387"], "keywords": ["\u4ee3\u7801\u5b89\u5168", "\u540e\u95e8\u653b\u51fb", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53d6\u8bc1\u6eaf\u6e90"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.08011v1", "published_at": "2026-07-09", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Beware What You Autocomplete: Forensic Attribution of Backdoored Code Completions", "tldr": "CodeTracer\u6846\u67b6\u53ef\u8ffd\u6eaf\u6076\u610f\u4ee3\u7801\u8865\u5168\u81f3\u540e\u95e8\u5fae\u8c03\u6570\u636e\uff0c\u5b9e\u73b0\u7cbe\u51c6\u53d6\u8bc1\u5f52\u56e0", "upvotes": 0, "what_it_is": "\u63d0\u51faCodeTracer\u53d6\u8bc1\u6846\u67b6\uff0c\u80fd\u591f\u5728\u6a21\u578b\u90e8\u7f72\u540e\u4ec5\u51ed\u5fae\u8c03\u8bed\u6599\u548c\u9519\u8bef\u8865\u5168\u4e8b\u4ef6\uff0c\u5c06\u6076\u610f\u4ee3\u7801\u8865\u5168\u884c\u4e3a\u8ffd\u6eaf\u81f3\u5177\u4f53\u7684\u540e\u95e8\u5fae\u8c03\u6570\u636e\uff0c\u5b9e\u73b0\u653b\u51fb\u6eaf\u6e90\u3002", "why_notable": "\u73b0\u6709\u9632\u5fa1\u624b\u6bb5\u96be\u4ee5\u5e94\u5bf9\u81ea\u9002\u5e94\u540e\u95e8\u653b\u51fb\uff0cCodeTracer\u53e6\u8f9f\u8e4a\u5f84\u4ece\u53d6\u8bc1\u6eaf\u6e90\u89d2\u5ea6\u5207\u5165\uff0c\u4e3aLLM\u4ee3\u7801\u8865\u5168\u7cfb\u7edf\u7684\u5b89\u5168\u5ba1\u8ba1\u63d0\u4f9b\u4e86\u65b0\u601d\u8def\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Identifying faithfulness hallucinations in LLM-generated outputs remains challenging due to the scarcity of high-quality annotated data. Recent work relies on advanced LLMs to synthesize training data, including rationales, labels, and hallucinated claims. However, these methods treat the generator as a static component, limiting iterative improvement of the detector. To address this limitation, we introduce Hallucination Self-Play (HSP), a novel framework that enables the detector to bootstrap with an evolved generator. HSP involves two roles initialized from the same base model, a detector that assesses the faithfulness of model outputs, and a generator that produces increasingly hard-to-detect hallucinated responses. Specifically, the detector is first fine-tuned on human-labeled data and then employed as a reward model to train the generator via reinforcement learning from AI feedback (RLAIF). In turn, the evolved generator synthesizes hallucination data to further optimize the detector through rule-based reinforcement learning. Experiments on RAGTruth benchmark and two model families demonstrate that the proposed framework can progressively enhance a small LLM to match or even outperform advanced LLMs without external supervision. Our code is available at https://anonymous.4open.science/r/Hallucination-Self-Play-50B5 .", "arxiv_id": "2607.07993", "arxiv_url": "https://arxiv.org/abs/2607.07993", "authors": ["Shiping Yang", "Shining Liang", "Weihao Liu", "Wenbiao Ding", "Linjun Shou", "Lu Cheng", "Angel X. Chang"], "brief": "\u63d0\u51faHallucination Self-Play\uff08HSP\uff09\u6846\u67b6\uff0c\u8ba9\u68c0\u6d4b\u5668\u4e0e\u751f\u6210\u5668\u4ece\u540c\u4e00\u57fa\u7840\u6a21\u578b\u51fa\u53d1\u76f8\u4e92\u535a\u5f08\uff1a\u751f\u6210\u5668\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u751f\u6210\u8d8a\u6765\u8d8a\u96be\u88ab\u68c0\u6d4b\u7684\u5e7b\u89c9\u5185\u5bb9\uff0c\u68c0\u6d4b\u5668\u5219\u5229\u7528\u8fd9\u4e9b\u6570\u636e\u6301\u7eed\u4f18\u5316\uff0c\u5b9e\u73b0\u65e0\u9700\u5916\u90e8\u76d1\u7763\u7684\u81ea\u4e3e\u63d0\u5347\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07993", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u68c0\u6d4b\u5668\u5148\u5728\u4eba\u5de5\u6807\u6ce8\u6570\u636e\u4e0a\u5fae\u8c03\uff0c\u518d\u4f5c\u4e3a\u5956\u52b1\u6a21\u578b\u901a\u8fc7RLAIF\u8bad\u7ec3\u751f\u6210\u5668\u4ea7\u751f\u66f4\u96be\u68c0\u6d4b\u7684\u5e7b\u89c9", "\u8fdb\u5316\u540e\u7684\u751f\u6210\u5668\u5408\u6210\u65b0\u5e7b\u89c9\u6570\u636e\uff0c\u518d\u901a\u8fc7\u57fa\u4e8e\u89c4\u5219\u7684\u5f3a\u5316\u5b66\u4e60\u8fdb\u4e00\u6b65\u4f18\u5316\u68c0\u6d4b\u5668\uff0c\u5f62\u6210\u95ed\u73af\u8fed\u4ee3", "\u5728RAGTruth\u57fa\u51c6\u4e0a\uff0c\u5c0f\u578bLLM\u7ecfHSP\u8bad\u7ec3\u540e\u53ef\u5ab2\u7f8e\u751a\u81f3\u8d85\u8d8a\u66f4\u5927\u7684\u5148\u8fdbLLM\uff0c\u65e0\u9700\u5916\u90e8\u76d1\u7763"], "keywords": ["\u5e7b\u89c9\u68c0\u6d4b", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u81ea\u535a\u5f08"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07993v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Hallucination Self-Play: Bootstrapping Reinforced Detector via Evolved Generator", "tldr": "\u63d0\u51fa\u5e7b\u89c9\u81ea\u535a\u5f08\u6846\u67b6\uff0c\u901a\u8fc7\u68c0\u6d4b\u5668\u4e0e\u751f\u6210\u5668\u76f8\u4e92\u8fdb\u5316\u6765\u63d0\u5347\u5e7b\u89c9\u68c0\u6d4b\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faHallucination Self-Play\uff08HSP\uff09\u6846\u67b6\uff0c\u8ba9\u68c0\u6d4b\u5668\u4e0e\u751f\u6210\u5668\u4ece\u540c\u4e00\u57fa\u7840\u6a21\u578b\u51fa\u53d1\u76f8\u4e92\u535a\u5f08\uff1a\u751f\u6210\u5668\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u751f\u6210\u8d8a\u6765\u8d8a\u96be\u88ab\u68c0\u6d4b\u7684\u5e7b\u89c9\u5185\u5bb9\uff0c\u68c0\u6d4b\u5668\u5219\u5229\u7528\u8fd9\u4e9b\u6570\u636e\u6301\u7eed\u4f18\u5316\uff0c\u5b9e\u73b0\u65e0\u9700\u5916\u90e8\u76d1\u7763\u7684\u81ea\u4e3e\u63d0\u5347\u3002", "why_notable": "\u9996\u6b21\u5c06\u81ea\u535a\u5f08\u673a\u5236\u5f15\u5165\u5e7b\u89c9\u68c0\u6d4b\u9886\u57df\uff0c\u7a81\u7834\u4e86\u751f\u6210\u5668\u9759\u6001\u4e0d\u53d8\u7684\u5c40\u9650\uff0c\u4ee5\u4f4e\u6210\u672c\u5c0f\u6a21\u578b\u5b9e\u73b0\u4e0e\u5927\u6a21\u578b\u76f8\u5f53\u7684\u5e7b\u89c9\u68c0\u6d4b\u6027\u80fd\uff0c\u5bf9RAG\u7b49\u5b9e\u9645\u5e94\u7528\u573a\u666f\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Large language model (LLM) based multi-agent systems enable complex problem solving through coordinated reasoning and action, but their distributed structure also introduces new challenges in diagnosing system-level failures. When an execution fails, identifying which agent is responsible and at what point the trajectory first becomes irreversibly misdirected is difficult due to long-horizon interactions and tightly coupled agent behaviors. In this paper, we study the problem of failure localization in LLM-based multi-agent systems and present AgentLocate, a framework that attributes failures to both a specific agent and the earliest decisive step. AgentLocate combines an LLM-based judging mechanism with multi-perspective verification by independent evaluators, whose assessments are aggregated using a confidence-aware strategy. The resulting feedback is further used to adapt the judge through lightweight fine-tuning, improving attribution quality. We evaluate AgentLocate on two complementary benchmarks covering diverse tasks, agent configurations, and trajectory lengths. Experimental results show that AgentLocate consistently outperforms existing failure localization methods in identifying both responsible agents and failure steps, while remaining efficient in terms of token usage and running time.", "arxiv_id": "2607.07989", "arxiv_url": "https://arxiv.org/abs/2607.07989", "authors": ["Yufei Xia", "Anjun Gao", "Yueyang Quan", "Zhuqing Liu", "Minghong Fang"], "brief": "\u63d0\u51faAgentLocate\u6846\u67b6\uff0c\u7528\u4e8eLLM\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u6545\u969c\u5f52\u56e0\uff0c\u80fd\u540c\u65f6\u8bc6\u522b\u51fa\u54ea\u4e2a\u667a\u80fd\u4f53\u51fa\u9519\u4ee5\u53ca\u8f68\u8ff9\u4e2d\u6700\u65e9\u7684\u51b3\u5b9a\u6027\u5931\u8bef\u6b65\u9aa4\u3002", "categories": ["cs.CR", "cs.AI", "cs.IR", "cs.LG", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07989", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u7ed3\u5408LLM\u88c1\u5224\u673a\u5236\u4e0e\u591a\u89c6\u89d2\u72ec\u7acb\u8bc4\u4f30\u5668\uff0c\u901a\u8fc7\u7f6e\u4fe1\u5ea6\u611f\u77e5\u7b56\u7565\u805a\u5408\u8bc4\u4f30\u7ed3\u679c", "\u5229\u7528\u5f52\u56e0\u53cd\u9988\u5bf9\u88c1\u5224\u6a21\u578b\u8fdb\u884c\u8f7b\u91cf\u7ea7\u5fae\u8c03\uff0c\u6301\u7eed\u63d0\u5347\u5f52\u56e0\u8d28\u91cf", "\u5728\u4e24\u4e2a\u6db5\u76d6\u591a\u6837\u4efb\u52a1\u3001\u667a\u80fd\u4f53\u914d\u7f6e\u548c\u8f68\u8ff9\u957f\u5ea6\u7684\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u6027\u80fd\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\u4e14token\u6d88\u8017\u9ad8\u6548"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u667a\u80fd\u4f53", "\u6545\u969c\u8bca\u65ad", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07989v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Who Broke the System? Failure Localization in LLM-Based Multi-Agent Systems", "tldr": "AgentLocate\u6846\u67b6\u7cbe\u51c6\u5b9a\u4f4d\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u7684\u6545\u969c\u8d23\u4efb\u65b9\u4e0e\u6700\u65e9\u5931\u8bef\u6b65\u9aa4", "upvotes": 0, "what_it_is": "\u63d0\u51faAgentLocate\u6846\u67b6\uff0c\u7528\u4e8eLLM\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u6545\u969c\u5f52\u56e0\uff0c\u80fd\u540c\u65f6\u8bc6\u522b\u51fa\u54ea\u4e2a\u667a\u80fd\u4f53\u51fa\u9519\u4ee5\u53ca\u8f68\u8ff9\u4e2d\u6700\u65e9\u7684\u51b3\u5b9a\u6027\u5931\u8bef\u6b65\u9aa4\u3002", "why_notable": "\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u6545\u969c\u8bca\u65ad\u662f\u843d\u5730\u90e8\u7f72\u7684\u5173\u952e\u75db\u70b9\uff0cAgentLocate\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u6545\u969c\u5b9a\u4f4d\u5230\u5177\u4f53\u667a\u80fd\u4f53\u548c\u6700\u65e9\u5931\u8bef\u6b65\u9aa4\uff0c\u5bf9\u63d0\u5347\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u53ef\u9760\u6027\u4e0e\u53ef\u8c03\u8bd5\u6027\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Quantum reservoir computing uses a fixed quantum circuit as a feature generator and trains only a simple linear readout on top of it. This makes it cheap to train and free of the optimisation problems that affect many quantum machine-learning models. A natural worry is that the very large feature space the circuit produces might inflate apparent performance without adding anything real. This paper provides two things. First, it gives a complete, reproducible recipe for one such reservoir applied to forecasting chaotic systems, including how data is fed in, how the circuit is built, and how the readout is trained. Second, it gives a way to tell whether the reservoir\u0027s high dimension is actually doing useful work. We grow the size of the prediction problem and the size of the quantum reservoir together, so that extra capacity cannot be the explanation for any improvement, and we track a single stability number that measures how well behaved the readout fit is. On two chaotic test systems, a spatiotemporal chain and a shallow-water fluid model, the quantum reservoir keeps a flat, stable error as both sizes grow, while a matched classical reservoir does not. We report where the classical baseline is in fact stronger, so the comparison is honest. The result is a clean specification plus a diagnostic that other groups can apply to any reservoir whose features have a known scale.", "arxiv_id": "2607.07978", "arxiv_url": "https://arxiv.org/abs/2607.07978", "authors": ["Tushar Pandey"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u5957\u5b8c\u6574\u53ef\u590d\u73b0\u7684\u91cf\u5b50\u50a8\u5c42\u8ba1\u7b97\u65b9\u6848\u7528\u4e8e\u6df7\u6c8c\u7cfb\u7edf\u9884\u6d4b\uff0c\u5e76\u8bbe\u8ba1\u4e86\u4e00\u79cd\u8bca\u65ad\u65b9\u6cd5\uff0c\u901a\u8fc7\u540c\u6b65\u6269\u5927\u9884\u6d4b\u95ee\u9898\u89c4\u6a21\u4e0e\u91cf\u5b50\u50a8\u5c42\u89c4\u6a21\u6765\u9a8c\u8bc1\u9ad8\u7ef4\u7279\u5f81\u7a7a\u95f4\u662f\u5426\u771f\u6b63\u8d21\u732e\u4e86\u9884\u6d4b\u80fd\u529b\u3002", "categories": ["quant-ph", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07978", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u91cf\u5b50\u50a8\u5c42\u8ba1\u7b97\u4ec5\u8bad\u7ec3\u7ebf\u6027\u8bfb\u51fa\u5c42\uff0c\u907f\u514d\u4e86\u91cf\u5b50\u673a\u5668\u5b66\u4e60\u4e2d\u5e38\u89c1\u7684\u4f18\u5316\u95ee\u9898\uff0c\u8bad\u7ec3\u6210\u672c\u4f4e", "\u901a\u8fc7\u540c\u6b65\u589e\u5927\u95ee\u9898\u89c4\u6a21\u4e0e\u50a8\u5c42\u89c4\u6a21\u5e76\u8ffd\u8e2a\u8bfb\u51fa\u7a33\u5b9a\u6027\u6307\u6807\uff0c\u6392\u9664\u0027\u5bb9\u91cf\u81a8\u80c0\u0027\u5bf9\u6027\u80fd\u7684\u865a\u5047\u8d21\u732e", "\u5728\u65f6\u7a7a\u94fe\u548c\u6d45\u6c34\u6d41\u4f53\u6a21\u578b\u4e24\u4e2a\u6df7\u6c8c\u6d4b\u8bd5\u7cfb\u7edf\u4e0a\uff0c\u91cf\u5b50\u50a8\u5c42\u8bef\u5dee\u968f\u89c4\u6a21\u589e\u957f\u4fdd\u6301\u5e73\u7a33\uff0c\u800c\u5339\u914d\u7684\u7ecf\u5178\u50a8\u5c42\u5219\u4e0d\u7136"], "keywords": ["\u91cf\u5b50\u673a\u5668\u5b66\u4e60", "\u50a8\u5c42\u8ba1\u7b97", "\u6df7\u6c8c\u9884\u6d4b", "\u65f6\u95f4\u5e8f\u5217"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07978v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "A Quantum Reservoir Architecture for Chaotic Forecasting and a Test of Whether Its High Dimension Helps", "tldr": "\u91cf\u5b50\u50a8\u5c42\u8ba1\u7b97\u7528\u4e8e\u6df7\u6c8c\u7cfb\u7edf\u9884\u6d4b\uff0c\u5e76\u9a8c\u8bc1\u5176\u9ad8\u7ef4\u7279\u5f81\u7a7a\u95f4\u662f\u5426\u771f\u6b63\u6709\u6548", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u5957\u5b8c\u6574\u53ef\u590d\u73b0\u7684\u91cf\u5b50\u50a8\u5c42\u8ba1\u7b97\u65b9\u6848\u7528\u4e8e\u6df7\u6c8c\u7cfb\u7edf\u9884\u6d4b\uff0c\u5e76\u8bbe\u8ba1\u4e86\u4e00\u79cd\u8bca\u65ad\u65b9\u6cd5\uff0c\u901a\u8fc7\u540c\u6b65\u6269\u5927\u9884\u6d4b\u95ee\u9898\u89c4\u6a21\u4e0e\u91cf\u5b50\u50a8\u5c42\u89c4\u6a21\u6765\u9a8c\u8bc1\u9ad8\u7ef4\u7279\u5f81\u7a7a\u95f4\u662f\u5426\u771f\u6b63\u8d21\u732e\u4e86\u9884\u6d4b\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u63d0\u4f9b\u4e86\u4e00\u5957\u4e25\u683c\u7684\u8bca\u65ad\u6846\u67b6\u6765\u533a\u5206\u91cf\u5b50\u50a8\u5c42\u7684\u771f\u5b9e\u4f18\u52bf\u4e0e\u9ad8\u7ef4\u5047\u8c61\uff0c\u5b9e\u9a8c\u8bbe\u8ba1\u8bda\u5b9e\uff08\u62a5\u544a\u7ecf\u5178\u57fa\u7ebf\u66f4\u5f3a\u7684\u60c5\u5f62\uff09\uff0c\u65b9\u6cd5\u53ef\u63a8\u5e7f\u81f3\u4efb\u610f\u5df2\u77e5\u7279\u5f81\u5c3a\u5ea6\u7684\u50a8\u5c42\u7cfb\u7edf"}, {"abstract": "Reinforcement learning (RL) has achieved remarkable success in enhancing the reasoning capabilities of large language models (LLMs). However, widely used critic-free RL methods rely on uniform credit assignment, broadcasting the same advantage to all tokens regardless of their differences. We identify a critical failure mode of this design, which we refer to as Positive-Credit Contamination: low-probability tail tokens that are contextually erroneous receive identical positive credit to plausible ones within the same trajectory, resulting in the indiscriminate reinforcement of flawed reasoning behavior. To mitigate this issue, we propose Tail-Aware Credit calibratiOn (TACO), a method that calibrates uniform credit assignment to suppress undesirable positive updates. TACO first computes a tail-risk score that incorporates the local generation context to assess each token\u0027s risk of falling into the unreliable tail, distinguishing unexpected rarity from uncertainty-driven exploration. TACO then uses this score to tune positive credit for risky tokens without removing their gradients entirely, so that recurring useful rare patterns can accumulate reinforcement while incidental noise is progressively dampened. Experimental results across three LLMs and eight benchmarks show that TACO consistently outperforms GRPO-style baselines. Notably, TACO improves training stability, supporting sustained performance gains in long-horizon RL. The source code is available at: https://github.com/xiuyilou/TACO.", "arxiv_id": "2607.07976", "arxiv_url": "https://arxiv.org/abs/2607.07976", "authors": ["Xiuyi Lou", "Zicheng Xu", "Yu-Neng Chuang", "Hoang Anh Duy Le", "Zhaozhuo Xu", "Guanchu Wang", "Vladimir Braverman"], "brief": "\u672c\u6587\u8bc6\u522b\u4e86\u65e0\u8bc4\u8bba\u5bb6RL\u65b9\u6cd5\u4e2d\u7684\"\u6b63\u5411\u4fe1\u7528\u6c61\u67d3\"\u95ee\u9898\u2014\u2014\u4f4e\u6982\u7387\u5c3e\u90e8\u9519\u8beftoken\u4e0e\u6b63\u5e38token\u83b7\u5f97\u76f8\u540c\u6b63\u5411\u5956\u52b1\uff0c\u5bfc\u81f4\u9519\u8bef\u63a8\u7406\u88ab\u5f3a\u5316\u3002\u4e3a\u6b64\u63d0\u51faTACO\uff08\u5c3e\u90e8\u611f\u77e5\u4fe1\u7528\u6821\u51c6\uff09\uff0c\u901a\u8fc7\u8ba1\u7b97\u5c3e\u90e8\u98ce\u9669\u5206\u6570\u6765\u6821\u51c6token\u7ea7\u522b\u7684\u4fe1\u7528\u5206\u914d\uff0c\u6291\u5236\u5bf9\u9ad8\u98ce\u9669token\u7684\u4e0d\u5f53\u6b63\u5411\u66f4\u65b0\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07976", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u53d1\u73b0\"\u6b63\u5411\u4fe1\u7528\u6c61\u67d3\"\u5931\u6548\u6a21\u5f0f\uff1a\u5747\u5300\u4fe1\u7528\u5206\u914d\u4f7f\u4f4e\u6982\u7387\u9519\u8beftoken\u4e0e\u6b63\u5e38token\u83b7\u5f97\u76f8\u540c\u6b63\u5411\u5f3a\u5316\u4fe1\u53f7", "TACO\u8ba1\u7b97\u7ed3\u5408\u5c40\u90e8\u751f\u6210\u4e0a\u4e0b\u6587\u7684\u5c3e\u90e8\u98ce\u9669\u5206\u6570\uff0c\u533a\u5206\"\u610f\u5916\u7a00\u6709\"\u4e0e\"\u63a2\u7d22\u9a71\u52a8\u7684\u4e0d\u786e\u5b9a\u6027\"", "\u57283\u4e2aLLM\u30018\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u6301\u7eed\u4f18\u4e8eGRPO\u57fa\u7ebf\uff0c\u5e76\u63d0\u5347\u8bad\u7ec3\u7a33\u5b9a\u6027\uff0c\u652f\u6301\u957f\u671fRL\u7684\u6301\u7eed\u6027\u80fd\u589e\u76ca"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u80fd\u529b", "\u4fe1\u7528\u5206\u914d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07976v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "When Implausible Tokens Get Reinforced: Tail-Aware Credit Calibration for LLM Reinforcement Learning", "tldr": "\u63d0\u51faTACO\u65b9\u6cd5\uff0c\u901a\u8fc7\u5c3e\u90e8\u98ce\u9669\u611f\u77e5\u7684\u4fe1\u7528\u6821\u51c6\u6291\u5236LLM\u5f3a\u5316\u5b66\u4e60\u4e2d\u4f4e\u6982\u7387\u9519\u8beftoken\u88ab\u9519\u8bef\u5f3a\u5316\u7684\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u8bc6\u522b\u4e86\u65e0\u8bc4\u8bba\u5bb6RL\u65b9\u6cd5\u4e2d\u7684\"\u6b63\u5411\u4fe1\u7528\u6c61\u67d3\"\u95ee\u9898\u2014\u2014\u4f4e\u6982\u7387\u5c3e\u90e8\u9519\u8beftoken\u4e0e\u6b63\u5e38token\u83b7\u5f97\u76f8\u540c\u6b63\u5411\u5956\u52b1\uff0c\u5bfc\u81f4\u9519\u8bef\u63a8\u7406\u88ab\u5f3a\u5316\u3002\u4e3a\u6b64\u63d0\u51faTACO\uff08\u5c3e\u90e8\u611f\u77e5\u4fe1\u7528\u6821\u51c6\uff09\uff0c\u901a\u8fc7\u8ba1\u7b97\u5c3e\u90e8\u98ce\u9669\u5206\u6570\u6765\u6821\u51c6token\u7ea7\u522b\u7684\u4fe1\u7528\u5206\u914d\uff0c\u6291\u5236\u5bf9\u9ad8\u98ce\u9669token\u7684\u4e0d\u5f53\u6b63\u5411\u66f4\u65b0\u3002", "why_notable": "\u9488\u5bf9\u5f53\u524d\u4e3b\u6d41GRPO\u7b49\u65e0\u8bc4\u8bba\u5bb6RL\u65b9\u6cd5\u7684\u56fa\u6709\u7f3a\u9677\u63d0\u51fa\u7cbe\u51c6\u89e3\u51b3\u65b9\u6848\uff0c\u5728\u4e0d\u5b8c\u5168\u79fb\u9664\u68af\u5ea6\u7684\u524d\u63d0\u4e0b\u5b9e\u73b0\u7ec6\u7c92\u5ea6token\u7ea7\u4fe1\u7528\u6821\u51c6\uff0c\u517c\u987e\u7a00\u6709\u6709\u7528\u6a21\u5f0f\u7684\u79ef\u7d2f\u4e0e\u566a\u58f0\u6291\u5236\uff0c\u5bf9\u63d0\u5347LLM\u63a8\u7406\u8bad\u7ec3\u8d28\u91cf\u5177\u6709\u5b9e\u9645\u4ef7\u503c"}, {"abstract": "Diffusion-based policies have recently emerged as powerful policy parameterizations for reinforcement learning, representing state-conditioned action distributions as terminal laws of diffusion processes with parameterized drifts. This terminal-law representation has shown substantial expressive flexibility in practice, enabling diffusion policies to model complex, multimodal, and highly non-Gaussian action distributions; however, it remains unclear what mathematically drives this expressivity and how to fully exploit it when the policy is learned from finite data. In this paper, we identify the drift Lipschitz budget $K$ as a central quantity governing the expressivity and statistical behavior of diffusion policies. We quantify expressivity through approximation: diffusion policies with $K$-Lipschitz drifts can concentrate near optimal deterministic policies and achieve value approximation error of order $1/K$; moreover, we prove a matching lower bound under nondegenerate diffusion noise. This increased expressivity comes with a statistical cost. When the drift is parameterized by neural networks, increasing $K$ improves approximation but increases statistical complexity. Balancing these two terms yields a finite-sample performance gap of order $\\tilde{O}(n^{-2/(m+6)})$ for generic neural-network drifts, and a sharper rate $\\tilde{O}(n^{-2/(m+4)})$ for one-sided dissipative drift classes, where $n$ is the sample size and $m$ is the dimension of the state space. Numerical experiments provide empirical evidence for the sample-dependent trade-off in $K$, supporting both theoretical regimes. Our framework also suggests a practical implementation principle: choose the diffusion budget $K$ according to the available sample size, and then select a neural-network architecture with the corresponding fixed Lipschitz coefficient.", "arxiv_id": "2607.07967", "arxiv_url": "https://arxiv.org/abs/2607.07967", "authors": ["Viet Vu", "Renyuan Xu", "Jiacheng Zhang", "Yufei Zhang"], "brief": "\u672c\u6587\u4ece\u7406\u8bba\u4e0a\u5206\u6790\u6269\u6563\u7b56\u7565\u7684\u8868\u8fbe\u80fd\u529b\u4e0e\u7edf\u8ba1\u5b66\u4e60\u4e4b\u95f4\u7684\u6743\u8861\uff0c\u4ee5\u6f02\u79fb\u51fd\u6570\u7684Lipschitz\u5e38\u6570K\u4e3a\u6838\u5fc3\u91cf\uff0c\u5efa\u7acb\u8fd1\u4f3c\u8bef\u5dee\u4e0e\u6709\u9650\u6837\u672c\u6027\u80fd\u754c\u7684\u7cbe\u786e\u523b\u753b\u3002", "categories": ["stat.ML", "cs.LG", "math.OC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07967", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["K-Lipschitz\u6f02\u79fb\u7684\u6269\u6563\u7b56\u7565\u53ef\u5c06\u503c\u8fd1\u4f3c\u8bef\u5dee\u538b\u7f29\u81f3O(1/K)\uff0c\u5e76\u8bc1\u660e\u4e86\u5339\u914d\u4e0b\u754c", "\u795e\u7ecf\u7f51\u7edc\u53c2\u6570\u5316\u65f6\uff0c\u589e\u5927K\u63d0\u5347\u8fd1\u4f3c\u80fd\u529b\u4f46\u589e\u52a0\u7edf\u8ba1\u590d\u6742\u5ea6\uff0c\u5e73\u8861\u540e\u5f97\u5230\u6709\u9650\u6837\u672c\u6027\u80fd\u5dee\u8dddO(n^{-2/(m+6)})\uff0c\u8017\u6563\u6f02\u79fb\u7c7b\u53ef\u6539\u5584\u81f3O(n^{-2/(m+4)})", "\u63d0\u51fa\u5b9e\u8df5\u539f\u5219\uff1a\u6839\u636e\u6837\u672c\u91cf\u9009\u62e9\u6269\u6563\u9884\u7b97K\uff0c\u518d\u636e\u6b64\u9009\u62e9\u5bf9\u5e94Lipschitz\u7cfb\u6570\u7684\u795e\u7ecf\u7f51\u7edc\u67b6\u6784"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u7edf\u8ba1\u5b66\u4e60\u7406\u8bba", "\u7b56\u7565\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07967v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Expressivity and Statistical Trade-offs in Diffusion Policy Learning", "tldr": "\u63ed\u793a\u6269\u6563\u7b56\u7565\u4e2dLipschitz\u9884\u7b97K\u5982\u4f55\u6743\u8861\u8868\u8fbe\u80fd\u529b\u4e0e\u7edf\u8ba1\u590d\u6742\u5ea6", "upvotes": 0, "what_it_is": "\u672c\u6587\u4ece\u7406\u8bba\u4e0a\u5206\u6790\u6269\u6563\u7b56\u7565\u7684\u8868\u8fbe\u80fd\u529b\u4e0e\u7edf\u8ba1\u5b66\u4e60\u4e4b\u95f4\u7684\u6743\u8861\uff0c\u4ee5\u6f02\u79fb\u51fd\u6570\u7684Lipschitz\u5e38\u6570K\u4e3a\u6838\u5fc3\u91cf\uff0c\u5efa\u7acb\u8fd1\u4f3c\u8bef\u5dee\u4e0e\u6709\u9650\u6837\u672c\u6027\u80fd\u754c\u7684\u7cbe\u786e\u523b\u753b\u3002", "why_notable": "\u9996\u6b21\u4ece\u6570\u5b66\u4e0a\u4e25\u683c\u89e3\u91ca\u6269\u6563\u7b56\u7565\u5f3a\u8868\u8fbe\u80fd\u529b\u7684\u6765\u6e90\uff0c\u5e76\u7ed9\u51fa\u53ef\u64cd\u4f5c\u7684\u6837\u672c\u91cf-\u67b6\u6784\u9009\u62e9\u6307\u5bfc\uff0c\u586b\u8865\u4e86\u6269\u6563\u7b56\u7565\u7406\u8bba\u7406\u89e3\u7684\u7a7a\u767d\u3002"}, {"abstract": "Wildfire smoke events produce extreme PM$_{2.5}$ concentrations that pose severe public health risks, yet forecasting rare, hazardous-level spikes remains a fundamental challenge. Time series foundation models (TSFMs), pretrained models offering zero-shot inference and efficient adaptation, perform strongly on general benchmarks, but their behavior under extreme out-of-distribution conditions is poorly understood. We present the first systematic benchmark comparing six TSFM configurations (zero-shot TimesFM, Chronos-2, Moirai-2, and Time-MoE, plus LoRA fine-tuned Chronos-2 and Time-MoE) against fully-trained baselines (LSTM, BiLSTM, Transformer) and naive persistence on a 12-year (2013--2025) hourly PM$_{2.5}$ dataset covering 1,375 wildfire incidents across 79 California monitoring sites. A leave-one-incident-out (LOIO) protocol evaluates generalization to unseen fires, using MAE, RMSE, and exceedance F1 at EPA AQI thresholds across 6-, 12-, and 24-hour horizons. Results reveal a consistent hierarchy. The BiLSTM achieves the lowest MAE ($5.16\\,\u03bcg/m^3$) and the highest exceedance F1 at every threshold, including the Hazardous band ($\u003e225.5\\,\u03bcg/m^3$), reaching 0.63 versus at most 0.54 for any foundation model. Zero-shot TSFMs improve on persistence only modestly, and zero-shot Chronos-2 exhibits severe RMSE tail instability ($23.4\\,\u03bcg/m^3$, negative $R^2$) from sporadic large errors. LoRA fine-tuning substantially improves both adapted families and largely repairs this instability, yet no foundation model surpasses the trained recurrent baselines on any metric. These findings challenge the assumption that larger pretrained models universally dominate environmental forecasting and provide actionable deployment guidance for wildfire air quality prediction.", "arxiv_id": "2607.07951", "arxiv_url": "https://arxiv.org/abs/2607.07951", "authors": ["Yongcan Huang", "Li Jiang", "Ze Yu Liu"], "brief": "\u9996\u4e2a\u7cfb\u7edf\u6027\u57fa\u51c6\u6d4b\u8bd5\uff0c\u6bd4\u8f83\u516d\u79cd\u65f6\u5e8f\u57fa\u7840\u6a21\u578b\uff08\u96f6\u6837\u672c\u53caLoRA\u5fae\u8c03\uff09\u4e0e\u4f20\u7edf\u6df1\u5ea6\u5b66\u4e60\u6a21\u578b\u572812\u5e74\u52a0\u5dde\u91ce\u706bPM2.5\u6570\u636e\u4e0a\u7684\u6781\u7aef\u4e8b\u4ef6\u9884\u6d4b\u80fd\u529b\uff0c\u91c7\u7528\u7559\u4e00\u4e8b\u4ef6\u4ea4\u53c9\u9a8c\u8bc1\u534f\u8bae\u8bc4\u4f30\u6cdb\u5316\u6027\u3002", "categories": ["cs.LG", "physics.ao-ph"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07951", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["BiLSTM\u8868\u73b0\u6700\u4f18\uff1aMAE\u4ec55.16 \u03bcg/m\u00b3\uff0c\u5371\u9669\u7ea7\u522b\uff08\u003e225.5 \u03bcg/m\u00b3\uff09F1\u8fbe0.63\uff0c\u4f18\u4e8e\u6240\u6709\u57fa\u7840\u6a21\u578b\uff08\u6700\u9ad80.54\uff09", "\u96f6\u6837\u672cChronos-2\u5b58\u5728\u4e25\u91cd\u5c3e\u90e8\u4e0d\u7a33\u5b9a\u6027\uff1aRMSE\u9ad8\u8fbe23.4 \u03bcg/m\u00b3\uff0cR\u00b2\u4e3a\u8d1f\u503c\uff0c\u5076\u53d1\u5927\u8bef\u5dee\u5bfc\u81f4\u6027\u80fd\u5d29\u6e83", "LoRA\u5fae\u8c03\u663e\u8457\u4fee\u590d\u4e86\u57fa\u7840\u6a21\u578b\u7684\u4e0d\u7a33\u5b9a\u6027\uff0c\u4f46\u4ecd\u65e0\u6cd5\u8d85\u8d8a\u6709\u76d1\u7763\u8bad\u7ec3\u7684\u5faa\u73af\u795e\u7ecf\u7f51\u7edc\u57fa\u7ebf"], "keywords": ["\u65f6\u5e8f\u9884\u6d4b", "\u57fa\u7840\u6a21\u578b", "\u73af\u5883\u79d1\u5b66", "\u6781\u7aef\u4e8b\u4ef6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07951v1", "published_at": "2026-07-08", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Evaluating the Generalizability of Foundation Models for Extreme Environmental Events: Case Study of California Wildfire PM2.5", "tldr": "\u57fa\u7840\u65f6\u5e8f\u6a21\u578b\u5728\u52a0\u5dde\u91ce\u706bPM2.5\u6781\u7aef\u4e8b\u4ef6\u9884\u6d4b\u4e2d\u4e0d\u53ca\u4f20\u7edfBiLSTM\uff0cLoRA\u5fae\u8c03\u53ef\u6539\u5584\u4f46\u4ecd\u6709\u5dee\u8ddd", "upvotes": 0, "what_it_is": "\u9996\u4e2a\u7cfb\u7edf\u6027\u57fa\u51c6\u6d4b\u8bd5\uff0c\u6bd4\u8f83\u516d\u79cd\u65f6\u5e8f\u57fa\u7840\u6a21\u578b\uff08\u96f6\u6837\u672c\u53caLoRA\u5fae\u8c03\uff09\u4e0e\u4f20\u7edf\u6df1\u5ea6\u5b66\u4e60\u6a21\u578b\u572812\u5e74\u52a0\u5dde\u91ce\u706bPM2.5\u6570\u636e\u4e0a\u7684\u6781\u7aef\u4e8b\u4ef6\u9884\u6d4b\u80fd\u529b\uff0c\u91c7\u7528\u7559\u4e00\u4e8b\u4ef6\u4ea4\u53c9\u9a8c\u8bc1\u534f\u8bae\u8bc4\u4f30\u6cdb\u5316\u6027\u3002", "why_notable": "\u6311\u6218\u4e86\"\u5927\u578b\u9884\u8bad\u7ec3\u6a21\u578b\u5728\u6240\u6709\u4efb\u52a1\u4e0a\u666e\u904d\u4f18\u8d8a\"\u7684\u5047\u8bbe\uff0c\u4e3a\u6781\u7aef\u73af\u5883\u4e8b\u4ef6\u9884\u6d4b\u63d0\u4f9b\u4e86\u5b9e\u7528\u90e8\u7f72\u6307\u5bfc\uff0c\u63ed\u793a\u4e86\u65f6\u5e8f\u57fa\u7840\u6a21\u578b\u5728\u5206\u5e03\u5916\u6781\u7aef\u503c\u573a\u666f\u4e0b\u7684\u6839\u672c\u5c40\u9650\u6027\u3002"}, {"abstract": "Large language models exhibit recurring behavioural patterns -- personas -- that shape generalisation and safety, but we lack reliable tools for decomposing, measuring, and controlling them. Our central insight is to treat personas as positions in a space of behavioural traits, using the OCEAN framework to describe model personas in terms of Openness, Conscientiousness, Extraversion, Agreeableness, and Neuroticism. We train low-rank adapters to amplify or suppress individual traits, and evaluate their effects using an LLM-judge calibrated against a human-validated panel, trait-specific multiple-choice benchmarks, and standard capability evaluations. Across six models from three families (4B-32B), we find that each adapter moves its target trait largely monotonically with scale, combines approximately additively with other adapters to construct mixed personas, and preserves performance on capability benchmarks at moderate scales. We further show that the induced trait axes affect safety-relevant behaviour in downstream evaluations: for example, moving along neuroticism and agreeableness axes affects frustration and sycophancy respectively. We also introduce an unsupervised psychometric pipeline that recovers four interpretable behavioural factors (tone, initiative, didacticism, epistemic caution) from model rollouts. Persona control can then be considered in terms of learning, scaling, and composing traits in weight space, providing a bridge between personality measurement, model editing, and safety.", "arxiv_id": "2607.07916", "arxiv_url": "https://arxiv.org/abs/2607.07916", "authors": ["Luke Baines", "Anton Gonzalvez Hawthorne", "Mariia Koroliuk", "Irakli Shalibashvili", "Cl\u00e9ment Dumas", "Konstantinos Voudouris", "David Demitri Africa"], "brief": "\u63d0\u51fa\"\u4eba\u683c\u5236\u56fe\"\u65b9\u6cd5\uff0c\u5c06LLM\u7684\u884c\u4e3a\u6a21\u5f0f\uff08\u4eba\u683c\uff09\u6620\u5c04\u4e3a\u6743\u91cd\u7a7a\u95f4\u4e2d\u7684\u4f4d\u7f6e\uff0c\u8bad\u7ec3\u4f4e\u79e9\u9002\u914d\u5668\uff08LoRA\uff09\u6765\u653e\u5927\u6216\u6291\u5236OCEAN\u4e94\u5927\u4eba\u683c\u7ef4\u5ea6\uff08\u5f00\u653e\u6027\u3001\u5c3d\u8d23\u6027\u3001\u5916\u5411\u6027\u3001\u5b9c\u4eba\u6027\u3001\u795e\u7ecf\u8d28\uff09\uff0c\u5b9e\u73b0\u5bf9\u6a21\u578b\u4eba\u683c\u7684\u7cbe\u786e\u63a7\u5236\u4e0e\u7ec4\u5408\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07916", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u8de86\u4e2a\u6a21\u578b\uff084B-32B\uff0c\u4e09\u4e2a\u6a21\u578b
