dr": "\u7cfb\u7edf\u6bd4\u8f83\u56db\u79cd\u7ebf\u6027\u6ce8\u610f\u529b\u67b6\u6784\u5e76\u63d0\u51fa\u8de8\u5c42\u8def\u7531\u673a\u5236CLVR", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9softmax\u6ce8\u610f\u529b\u4e0e\u56db\u79cd\u5faa\u73af\u7ebf\u6027\u6ce8\u610f\u529b\u67b6\u6784\uff08DeltaNet\u3001Gated DeltaNet\u3001Kimi Delta Attention\u3001Gated DeltaNet-2\uff09\u8fdb\u884c\u7edf\u4e00\u7b26\u53f7\u6846\u67b6\u4e0b\u7684\u5bf9\u6bd4\u7814\u7a76\uff0c\u5e76\u63d0\u51fa\u8de8\u5c42\u503c\u8def\u7531\uff08CLVR\uff09\u673a\u5236\u4ee5\u6539\u5584\u6a21\u578b\u6027\u80fd\u3002", "why_notable": "\u9996\u6b21\u5728\u7edf\u4e00\u6846\u67b6\u4e0b\u7cfb\u7edf\u6bd4\u8f83\u591a\u79cd\u4e3b\u6d41\u7ebf\u6027\u6ce8\u610f\u529b\u67b6\u6784\u7684\u8868\u8fbe\u80fd\u529b\u3001\u5185\u5b58\u8870\u51cf\u3001\u8bad\u7ec3\u541e\u5410\u7b49\u7ef4\u5ea6\uff0c\u5e76\u63d0\u51faCLVR\u8fd9\u4e00\u8f7b\u91cf\u7ea7\u8de8\u5c42\u8def\u7531\u6539\u8fdb\uff0c\u4e3a\u957f\u5e8f\u5217\u9ad8\u6548\u5efa\u6a21\u63d0\u4f9b\u5b9e\u8df5\u53c2\u8003\u3002"}, {"abstract": "We present path_boost, a Python package for interpretable supervised learning on graph-structured input data. The package implements PathBoost, a gradient boosting algorithm that automatically discovers predictive labeled paths within graphs during the learning process. Unlike graph neural networks, which are generally difficult to interpret, PathBoost produces an additive prediction model over path-based features that explicitly reveals which substructures drive predictions. To avoid an exhaustive enumeration of all possible paths, the algorithm iteratively selects and extends paths during learning based on their predictive power, using boosting to combine weak learners into a strong ensemble. The package supports both regression and binary classification. Key features include compatibility with scikit-learn workflows, support for custom base learners and selectors, automatic starting node selection, parallel training across anchor nodes, and built-in variable importance computation. We demonstrate PathBoost on molecular property prediction of transition metal compounds, where atoms serve as nodes and bonds as edges, and further benchmark PathBoost against an established graph neural network and a graph kernel method across six molecular datasets. The package is available on PyPI and GitHub under an open-source license.", "arxiv_id": "2607.07935", "arxiv_url": "https://arxiv.org/abs/2607.07935", "authors": ["Claudio Meggio", "Johan Pensar", "Riccardo De Bin"], "brief": "\u63d0\u51faPathBoost\u7b97\u6cd5\u53ca\u540c\u540dPython\u5305\uff0c\u901a\u8fc7\u5728\u68af\u5ea6\u63d0\u5347\u8fc7\u7a0b\u4e2d\u81ea\u52a8\u53d1\u73b0\u56fe\u4e2d\u9884\u6d4b\u6027\u8def\u5f84\uff0c\u6784\u5efa\u57fa\u4e8e\u8def\u5f84\u7279\u5f81\u7684\u52a0\u6cd5\u9884\u6d4b\u6a21\u578b\uff0c\u5b9e\u73b0\u53ef\u89e3\u91ca\u7684\u56fe\u7ea7\u76d1\u7763\u5b66\u4e60\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07935", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u7b97\u6cd5\u8fed\u4ee3\u9009\u62e9\u5e76\u6269\u5c55\u8def\u5f84\uff0c\u907f\u514d\u7a77\u4e3e\u6240\u6709\u53ef\u80fd\u8def\u5f84\uff0c\u5229\u7528Boosting\u5c06\u5f31\u5b66\u4e60\u5668\u7ec4\u5408\u4e3a\u5f3a\u96c6\u6210\u6a21\u578b", "\u652f\u6301\u56de\u5f52\u4e0e\u4e8c\u5206\u7c7b\u4efb\u52a1\uff0c\u517c\u5bb9scikit-learn\u5de5\u4f5c\u6d41\uff0c\u652f\u6301\u81ea\u5b9a\u4e49\u57fa\u5b66\u4e60\u5668\u3001\u5e76\u884c\u8bad\u7ec3\u53ca\u53d8\u91cf\u91cd\u8981\u6027\u8ba1\u7b97", "\u5728\u8fc7\u6e21\u91d1\u5c5e\u5316\u5408\u7269\u5206\u5b50\u6027\u8d28\u9884\u6d4b\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0c\u5e76\u5728\u516d\u4e2a\u5206\u5b50\u6570\u636e\u96c6\u4e0a\u4e0eGNN\u548c\u56fe\u6838\u65b9\u6cd5\u8fdb\u884c\u57fa\u51c6\u5bf9\u6bd4"], "keywords": ["\u56fe\u5b66\u4e60", "\u53ef\u89e3\u91caAI", "\u68af\u5ea6\u63d0\u5347", "\u5206\u5b50\u6027\u8d28\u9884\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07935v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "path_boost: A Python Package for Interpretable Graph-Level Prediction using Path-Based Gradient Boosting", "tldr": "PathBoost\uff1a\u57fa\u4e8e\u8def\u5f84\u68af\u5ea6\u63d0\u5347\u7684\u53ef\u89e3\u91ca\u56fe\u7ea7\u9884\u6d4bPython\u5305", "upvotes": 0, "what_it_is": "\u63d0\u51faPathBoost\u7b97\u6cd5\u53ca\u540c\u540dPython\u5305\uff0c\u901a\u8fc7\u5728\u68af\u5ea6\u63d0\u5347\u8fc7\u7a0b\u4e2d\u81ea\u52a8\u53d1\u73b0\u56fe\u4e2d\u9884\u6d4b\u6027\u8def\u5f84\uff0c\u6784\u5efa\u57fa\u4e8e\u8def\u5f84\u7279\u5f81\u7684\u52a0\u6cd5\u9884\u6d4b\u6a21\u578b\uff0c\u5b9e\u73b0\u53ef\u89e3\u91ca\u7684\u56fe\u7ea7\u76d1\u7763\u5b66\u4e60\u3002", "why_notable": "\u76f8\u6bd4\u56fe\u795e\u7ecf\u7f51\u7edc\u96be\u4ee5\u89e3\u91ca\u7684\u9ed1\u76d2\u7279\u6027\uff0cPathBoost\u63d0\u4f9b\u660e\u786e\u7684\u8def\u5f84\u7ea7\u53ef\u89e3\u91ca\u6027\uff0c\u540c\u65f6\u4fdd\u6301\u7ade\u4e89\u6027\u9884\u6d4b\u6027\u80fd\uff0c\u5df2\u5f00\u6e90\u53d1\u5e03\u4e8ePyPI\u548cGitHub\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "In this short note we consider the gradient descent dynamics of deep scalar linear networks, $f(x) = \\prod_{l=1}^L w_l x$, which enjoy exact time-course solutions for any integer depth. We show that even in this minimal model, the optimal depth-wise learning rate scaling depends on data, whereas data-agnostic scaling rules fail to transfer across depths. Under the data-dependent optimal scaling, the learning dynamics is independent of data and weakly dependent on depth, resulting in a constant linear convergence rate across all depths including infinity. We further show similar data-dependent effects in deep scalar linear networks with residual connections.", "arxiv_id": "2607.07884", "arxiv_url": "https://arxiv.org/abs/2607.07884", "authors": ["Yedi Zhang", "Peter E. Latham", "Leena Chennuru Vankadara", "Andrew Saxe"], "brief": "\u672c\u6587\u7814\u7a76\u6df1\u5ea6\u6807\u91cf\u7ebf\u6027\u7f51\u7edc\u7684\u68af\u5ea6\u4e0b\u964d\u52a8\u529b\u5b66\uff0c\u8bc1\u660e\u6700\u4f18\u7684\u9010\u5c42\u5b66\u4e60\u7387\u7f29\u653e\u89c4\u5219\u4f9d\u8d56\u4e8e\u6570\u636e\u5206\u5e03\uff0c\u800c\u975e\u4ec5\u7531\u7f51\u7edc\u6df1\u5ea6\u51b3\u5b9a\uff1b\u5728\u6570\u636e\u4f9d\u8d56\u7684\u6700\u4f18\u7f29\u653e\u4e0b\uff0c\u6536\u655b\u901f\u7387\u5bf9\u6df1\u5ea6\uff08\u5305\u62ec\u65e0\u7a77\u6df1\u5ea6\uff09\u4fdd\u6301\u5e38\u6570\u7ea7\u7ebf\u6027\u6536\u655b\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07884", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u6df1\u5ea6\u6807\u91cf\u7ebf\u6027\u7f51\u7edc f(x)=\u220fw_l\u00b7x \u5b58\u5728\u4efb\u610f\u6574\u6570\u6df1\u5ea6\u7684\u7cbe\u786e\u65f6\u95f4\u89e3\u6790\u89e3", "\u6570\u636e\u65e0\u5173\u7684\u7f29\u653e\u89c4\u5219\uff08\u5982\u03bcP\u7b49\uff09\u65e0\u6cd5\u8de8\u6df1\u5ea6\u8fc1\u79fb\uff0c\u6700\u4f18\u5b66\u4e60\u7387\u7f29\u653e\u5fc5\u987b\u4f9d\u8d56\u6570\u636e", "\u5728\u6570\u636e\u4f9d\u8d56\u7684\u6700\u4f18\u7f29\u653e\u4e0b\uff0c\u5b66\u4e60\u52a8\u529b\u5b66\u4e0e\u6570\u636e\u65e0\u5173\u3001\u5bf9\u6df1\u5ea6\u5f31\u4f9d\u8d56\uff0c\u6240\u6709\u6df1\u5ea6\uff08\u542b\u65e0\u7a77\uff09\u5747\u5b9e\u73b0\u5e38\u6570\u7ebf\u6027\u6536\u655b\uff1b\u6b8b\u5dee\u8fde\u63a5\u7f51\u7edc\u4e2d\u4e5f\u89c2\u5bdf\u5230\u7c7b\u4f3c\u6570\u636e\u4f9d\u8d56\u6548\u5e94"], "keywords": ["\u5b66\u4e60\u7387\u7f29\u653e", "\u6df1\u5ea6\u5b66\u4e60\u7406\u8bba", "\u4f18\u5316\u52a8\u529b\u5b66", "\u7ebf\u6027\u7f51\u7edc"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07884v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Optimal Learning Rate Scaling Depends on Data in Deep Scalar Linear Networks", "tldr": "\u6df1\u5ea6\u6807\u91cf\u7ebf\u6027\u7f51\u7edc\u4e2d\uff0c\u6700\u4f18\u5b66\u4e60\u7387\u7f29\u653e\u4f9d\u8d56\u6570\u636e\uff0c\u4e0e\u6df1\u5ea6\u65e0\u5173\u7684\u7f29\u653e\u89c4\u5219\u65e0\u6cd5\u8de8\u6df1\u5ea6\u8fc1\u79fb", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u6df1\u5ea6\u6807\u91cf\u7ebf\u6027\u7f51\u7edc\u7684\u68af\u5ea6\u4e0b\u964d\u52a8\u529b\u5b66\uff0c\u8bc1\u660e\u6700\u4f18\u7684\u9010\u5c42\u5b66\u4e60\u7387\u7f29\u653e\u89c4\u5219\u4f9d\u8d56\u4e8e\u6570\u636e\u5206\u5e03\uff0c\u800c\u975e\u4ec5\u7531\u7f51\u7edc\u6df1\u5ea6\u51b3\u5b9a\uff1b\u5728\u6570\u636e\u4f9d\u8d56\u7684\u6700\u4f18\u7f29\u653e\u4e0b\uff0c\u6536\u655b\u901f\u7387\u5bf9\u6df1\u5ea6\uff08\u5305\u62ec\u65e0\u7a77\u6df1\u5ea6\uff09\u4fdd\u6301\u5e38\u6570\u7ea7\u7ebf\u6027\u6536\u655b\u3002", "why_notable": "\u5bf9\u5f53\u524d\u6d41\u884c\u7684\u6570\u636e\u65e0\u5173\u5b66\u4e60\u7387\u7f29\u653e\u89c4\u5219\uff08\u5982\u03bcP\uff09\u63d0\u51fa\u7406\u8bba\u6311\u6218\uff0c\u63ed\u793a\u5373\u4f7f\u5728\u6700\u7b80\u5355\u7684\u7ebf\u6027\u6a21\u578b\u4e2d\u6570\u636e\u4f9d\u8d56\u6027\u4e5f\u4e0d\u53ef\u5ffd\u89c6\uff0c\u5bf9\u6df1\u5ea6\u7f51\u7edc\u8d85\u53c2\u6570\u8fc1\u79fb\u7814\u7a76\u5177\u6709\u91cd\u8981\u7406\u8bba\u610f\u4e49"}, {"abstract": "In physically dominated machining processes, experimental datasets are small, expensive, and material-specific; in this regime, data curation, evaluation design, and the form of physics integration can matter as much as the learning algorithm. Using an abrasive waterjet milling dataset ($n{=}155$, Inconel\\,718), we make three methodological contributions. First, we separate physics-based data \\emph{cleaning} from statistical \\emph{curation} and treat the latter as competing modelling hypotheses rather than silent preprocessing. Second, we find that model rankings from a 15-point hold-out set can be unstable: the single-split winner drops from rank~1 to rank~7 under 10-fold cross-validation, while Gaussian Process (GP) variants occupy the top ranks. Third, we study a spectrum of physics integration levels and find that residual learning on a compact physics baseline is competitive for GP, yielding lower variance and an interpretable decomposition, but degrades tree-based models. Bayesian hyper parameter tuning improves parameter-sensitive baselines such as gradient boosting and SVR, yet harms multi-stage hybrid pipelines at this sample size. GP uncertainty intervals are approximately calibrated ($86\\%$ empirical coverage at nominal $90\\%$). The resulting picture is methodological: for small, expensive process datasets, our results suggest that, in this setting, reliable model comparison benefits from explicit curation hypotheses, robust evaluation, and careful choices about how physics enters the model.", "arxiv_id": "2607.07863", "arxiv_url": "https://arxiv.org/abs/2607.07863", "authors": ["Sarah Grewe", "J\u00f6rg Frochte"], "brief": "\u672c\u6587\u4ee5155\u4e2a\u6837\u672c\u7684Inconel 718\u78e8\u6599\u6c34\u5c04\u6d41\u94e3\u524a\u6570\u636e\u96c6\u4e3a\u6848\u4f8b\uff0c\u7cfb\u7edf\u7814\u7a76\u4e86\u5c0f\u6570\u636e\u573a\u666f\u4e0b\u7269\u7406\u4fe1\u606f\u673a\u5668\u5b66\u4e60\u7684\u65b9\u6cd5\u8bba\u95ee\u9898\uff0c\u63d0\u51fa\u6570\u636e\u6e05\u6d17\u4e0e\u7edf\u8ba1\u7b5b\u9009\u5206\u79bb\u3001\u9c81\u68d2\u8bc4\u4f30\u53ca\u7269\u7406\u96c6\u6210\u65b9\u5f0f\u9009\u62e9\u4e09\u9879\u65b9\u6cd5\u8bba\u8d21\u732e\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07863", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5355\u6b21\u5212\u5206\u6d4b\u8bd5\u96c6\uff0815\u70b9\uff09\u7684\u6a21\u578b\u6392\u540d\u6781\u4e0d\u7a33\u5b9a\uff1a\u6392\u540d\u7b2c1\u7684\u6a21\u578b\u572810\u6298\u4ea4\u53c9\u9a8c\u8bc1\u4e0b\u8dcc\u81f3\u7b2c7\uff0c\u9ad8\u65af\u8fc7\u7a0b\uff08GP\uff09\u53d8\u4f53\u5360\u636e\u524d\u5217", "\u6b8b\u5dee\u5b66\u4e60\u7ed3\u5408\u7d27\u51d1\u7269\u7406\u57fa\u7ebf\u5bf9GP\u6709\u6548\uff08\u65b9\u5dee\u66f4\u4f4e\u3001\u53ef\u89e3\u91ca\u6027\u66f4\u5f3a\uff09\uff0c\u4f46\u4f1a\u964d\u4f4e\u6811\u6a21\u578b\u6027\u80fd\uff1b\u8d1d\u53f6\u65af\u8d85\u53c2\u8c03\u4f18\u5728\u5c0f\u6837\u672c\u591a\u9636\u6bb5\u6df7\u5408\u7ba1\u9053\u4e2d\u53cd\u800c\u6709\u5bb3", "GP\u4e0d\u786e\u5b9a\u6027\u533a\u95f4\u8fd1\u4f3c\u6821\u51c6\uff08\u540d\u4e4990%\u7f6e\u4fe1\u533a\u95f4\u7684\u5b9e\u9645\u8986\u76d6\u7387\u4e3a86%\uff09\uff0c\u7269\u7406\u6570\u636e\u6e05\u6d17\u4e0e\u7edf\u8ba1\u7b5b\u9009\u5e94\u4f5c\u4e3a\u72ec\u7acb\u5efa\u6a21\u5047\u8bbe\u663e\u5f0f\u5904\u7406"], "keywords": ["\u7269\u7406\u4fe1\u606f\u673a\u5668\u5b66\u4e60", "\u5c0f\u6570\u636e", "\u9ad8\u65af\u8fc7\u7a0b", "\u5236\u9020\u5de5\u827a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07863v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Physics-Informed Machine Learning Under Small-Data Constraints: Lessons from Abrasive Waterjet Milling", "tldr": "\u5c0f\u6570\u636e\u7ea6\u675f\u4e0b\u7269\u7406\u4fe1\u606f\u673a\u5668\u5b66\u4e60\u7684\u65b9\u6cd5\u8bba\u7814\u7a76\uff0c\u4ee5\u78e8\u6599\u6c34\u5c04\u6d41\u94e3\u524a\u4e3a\u6848\u4f8b", "upvotes": 0, "what_it_is": "\u672c\u6587\u4ee5155\u4e2a\u6837\u672c\u7684Inconel 718\u78e8\u6599\u6c34\u5c04\u6d41\u94e3\u524a\u6570\u636e\u96c6\u4e3a\u6848\u4f8b\uff0c\u7cfb\u7edf\u7814\u7a76\u4e86\u5c0f\u6570\u636e\u573a\u666f\u4e0b\u7269\u7406\u4fe1\u606f\u673a\u5668\u5b66\u4e60\u7684\u65b9\u6cd5\u8bba\u95ee\u9898\uff0c\u63d0\u51fa\u6570\u636e\u6e05\u6d17\u4e0e\u7edf\u8ba1\u7b5b\u9009\u5206\u79bb\u3001\u9c81\u68d2\u8bc4\u4f30\u53ca\u7269\u7406\u96c6\u6210\u65b9\u5f0f\u9009\u62e9\u4e09\u9879\u65b9\u6cd5\u8bba\u8d21\u732e\u3002", "why_notable": "\u9488\u5bf9\u5de5\u4e1a\u5c0f\u6570\u636e\u573a\u666f\uff08\u6602\u8d35\u3001\u6750\u6599\u7279\u5b9a\uff09\u63d0\u4f9b\u4e86\u7cfb\u7edf\u6027\u65b9\u6cd5\u8bba\u6307\u5bfc\uff0c\u63ed\u793a\u4e86\u5e38\u89c1\u8bc4\u4f30\u9677\u9631\uff08\u5355\u6b21\u5212\u5206\u4e0d\u7a33\u5b9a\u6027\uff09\uff0c\u5bf9\u5236\u9020\u4e1aAI\u5e94\u7528\u5177\u6709\u76f4\u63a5\u5b9e\u8df5\u4ef7\u503c"}, {"abstract": "Pseudo-nitzschia diatoms pose recurrent risks to coastal ecosystems and shellfish harvesting along the Portuguese Atlantic coast. Here we develop and evaluate a spatio-temporal machine-learning framework to predict harmful algal bloom (HAB) occurrence using exclusively satellite-derived predictors under realistic forecasting constraints. We characterised environmental and biological variability across shellfish production zones (L1-L9) using 5,882 observations, providing system-wide context. Predictive models were developed for zones L1-L2, a hotspot for Pseudo-nitzschia and domoic acid events, using a decade-long dataset (2013-2023; 1,440 observations; more than 1,000 satellite-based predictors including sea surface temperature, an upwelling index, chlorophyll-a, and plankton functional types). Sampling locations were partitioned into ecologically meaningful sub-regions using a river-aware spatial clustering scheme. A stringent spatio-temporal cross-validation strategy that simultaneously withholds entire years and spatial clusters prevents leakage and closely mimics real-world forecasting conditions. HAB occurrence proved moderately predictable across model classes and feature configurations. Ensemble tree-based methods achieved the strongest discrimination: Random Forest reached 0.74 +/- 0.05 with environmental predictors; Extra Trees reached 0.77 +/- 0.06 with biological variables added. Feature-importance analyses revealed that seasonal structure, spatial context, and lagged environmental conditions dominate model decisions, while biological indicators refine bloom likelihood within physically favourable periods. The framework demonstrates operationally relevant skill for satellite-supported HAB early-warning systems along eastern boundary upwelling coasts.", "arxiv_id": "2607.07834", "arxiv_url": "https://arxiv.org/abs/2607.07834", "authors": ["Ayman Bnoussaad", "El Khalil Cherif", "Ligia Pinto", "Ramiro Neves", "Alexandra D. Silva", "Alexandre Bernardino"], "brief": "\u6784\u5efa\u4e86\u4e00\u4e2a\u65f6\u7a7a\u673a\u5668\u5b66\u4e60\u6846\u67b6\uff0c\u4ec5\u4f7f\u7528\u536b\u661f\u884d\u751f\u9884\u6d4b\u53d8\u91cf\uff08\u6d77\u8868\u6e29\u5ea6\u3001\u53f6\u7eff\u7d20\u7b491000+\u7279\u5f81\uff09\u9884\u6d4b\u8461\u8404\u7259\u5927\u897f\u6d0b\u6d77\u5cb8\u7684\u4f2a\u83f1\u5f62\u85fb\u6709\u5bb3\u85fb\u534e\u53d1\u751f\uff0c\u5e76\u91c7\u7528\u4e25\u683c\u7684\u65f6\u7a7a\u4ea4\u53c9\u9a8c\u8bc1\u7b56\u7565\u6a21\u62df\u771f\u5b9e\u9884\u62a5\u6761\u4ef6\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07834", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u4f7f\u752810\u5e74\u6570\u636e\uff082013-2023\uff0c1440\u6761\u89c2\u6d4b\uff09\u548c1000+\u536b\u661f\u7279\u5f81\uff0cExtra Trees\u6a21\u578bAUC\u8fbe0.77\u00b10.06", "\u8bbe\u8ba1\u4e86\u8003\u8651\u6cb3\u6d41\u5f71\u54cd\u7684\u7a7a\u95f4\u805a\u7c7b\u65b9\u6848\uff0c\u5e76\u540c\u65f6\u5254\u9664\u6574\u5e74\u548c\u7a7a\u95f4\u7c07\u4ee5\u9632\u6b62\u6570\u636e\u6cc4\u6f0f", "\u7279\u5f81\u91cd\u8981\u6027\u5206\u6790\u663e\u793a\u5b63\u8282\u7ed3\u6784\u3001\u7a7a\u95f4\u80cc\u666f\u548c\u6ede\u540e\u73af\u5883\u6761\u4ef6\u662f\u4e3b\u5bfc\u56e0\u7d20\uff0c\u751f\u7269\u6307\u6807\u5728\u7269\u7406\u6761\u4ef6\u6709\u5229\u65f6\u8fdb\u4e00\u6b65\u7ec6\u5316\u9884\u6d4b"], "keywords": ["\u673a\u5668\u5b66\u4e60", "\u65f6\u7a7a\u9884\u6d4b", "\u9065\u611f", "\u73af\u5883\u76d1\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07834v1", "published_at": "2026-07-08", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Predicting Pseudo-nitzschia harmful algal blooms along the Portuguese Coast using satellite-derived predictors", "tldr": "\u5229\u7528\u536b\u661f\u6570\u636e\u4e0e\u673a\u5668\u5b66\u4e60\u9884\u6d4b\u8461\u8404\u7259\u6d77\u5cb8\u6709\u5bb3\u85fb\u534e\uff0cAUC\u8fbe0.77", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u4e00\u4e2a\u65f6\u7a7a\u673a\u5668\u5b66\u4e60\u6846\u67b6\uff0c\u4ec5\u4f7f\u7528\u536b\u661f\u884d\u751f\u9884\u6d4b\u53d8\u91cf\uff08\u6d77\u8868\u6e29\u5ea6\u3001\u53f6\u7eff\u7d20\u7b491000+\u7279\u5f81\uff09\u9884\u6d4b\u8461\u8404\u7259\u5927\u897f\u6d0b\u6d77\u5cb8\u7684\u4f2a\u83f1\u5f62\u85fb\u6709\u5bb3\u85fb\u534e\u53d1\u751f\uff0c\u5e76\u91c7\u7528\u4e25\u683c\u7684\u65f6\u7a7a\u4ea4\u53c9\u9a8c\u8bc1\u7b56\u7565\u6a21\u62df\u771f\u5b9e\u9884\u62a5\u6761\u4ef6\u3002", "why_notable": "\u4e3a\u6cbf\u6d77\u6709\u5bb3\u85fb\u534e\u65e9\u671f\u9884\u8b66\u7cfb\u7edf\u63d0\u4f9b\u4e86\u53ef\u64cd\u4f5c\u7684\u536b\u661f\u652f\u6301\u65b9\u6848\uff0c\u4e25\u683c\u7684\u65f6\u7a7a\u9a8c\u8bc1\u7b56\u7565\u4f7f\u7ed3\u679c\u66f4\u8d34\u8fd1\u5b9e\u9645\u9884\u62a5\u573a\u666f\uff0c\u5bf9\u6e14\u4e1a\u7ba1\u7406\u548c\u751f\u6001\u4fdd\u62a4\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "This paper studies distributed sketching for ordinary least squares (OLS) regression, an approach that distributes small sketches of a large data set over multiple machines to separately construct OLS estimators and average them. Unlike prior studies that consider sketching on the whole data set, we consider sketching on partitioned subsets to further reduce computational cost. Under the fixed design setting, we characterize the exact excess loss of the averaged OLS estimator. Results show that this loss is comparable to the established loss for sketching on the whole data set when the divergence among subset covariances is small.", "arxiv_id": "2607.07888", "arxiv_url": "https://arxiv.org/abs/2607.07888", "authors": ["Luyuan Yang", "Brayden Garner", "Shayan Shafaei", "Chao Lan"], "brief": "\u63d0\u51fa\u5728\u5206\u533a\u6570\u636e\u5b50\u96c6\u4e0a\u5206\u522b\u8fdb\u884c\u8349\u56fe\u538b\u7f29\u3001\u72ec\u7acb\u6784\u5efaOLS\u4f30\u8ba1\u91cf\u540e\u53d6\u5e73\u5747\u7684\u5206\u5e03\u5f0f\u65b9\u6848\uff0c\u5e76\u5728\u56fa\u5b9a\u8bbe\u8ba1\u8bbe\u5b9a\u4e0b\u7cbe\u786e\u523b\u753b\u4e86\u5e73\u5747OLS\u4f30\u8ba1\u91cf\u7684\u8d85\u989d\u635f\u5931\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07888", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u5927\u89c4\u6a21\u6570\u636e\u96c6\u5206\u533a\u540e\u5728\u5404\u5b50\u96c6\u4e0a\u72ec\u7acb\u505a\u8349\u56fe\u538b\u7f29\uff0c\u8fdb\u4e00\u6b65\u964d\u4f4e\u8ba1\u7b97\u6210\u672c", "\u7cbe\u786e\u63a8\u5bfc\u4e86\u5e73\u5747OLS\u4f30\u8ba1\u91cf\u7684\u8d85\u989d\u635f\u5931\u8868\u8fbe\u5f0f", "\u5f53\u5404\u5b50\u96c6\u534f\u65b9\u5dee\u77e9\u9635\u5dee\u5f02\u8f83\u5c0f\u65f6\uff0c\u5206\u533a\u8349\u56fe\u6cd5\u7684\u635f\u5931\u4e0e\u5168\u5c40\u8349\u56fe\u6cd5\u76f8\u5f53"], "keywords": ["\u5206\u5e03\u5f0f\u5b66\u4e60", "\u8349\u56fe\u538b\u7f29", "\u7ebf\u6027\u56de\u5f52", "\u7edf\u8ba1\u7406\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07888v1", "published_at": "2026-07-08", "score": 0.125, "selected_reasons": [], "thumbnail": null, "title": "Distributed Sketching on Data Partitions for OLS Regression", "tldr": "\u7814\u7a76\u5206\u5e03\u5f0f\u8349\u56fe\u6cd5\u5728\u5206\u533a\u6570\u636e\u4e0a\u7684OLS\u56de\u5f52\uff0c\u8bc1\u660e\u5176\u635f\u5931\u4e0e\u5168\u5c40\u8349\u56fe\u6cd5\u76f8\u5f53", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u5728\u5206\u533a\u6570\u636e\u5b50\u96c6\u4e0a\u5206\u522b\u8fdb\u884c\u8349\u56fe\u538b\u7f29\u3001\u72ec\u7acb\u6784\u5efaOLS\u4f30\u8ba1\u91cf\u540e\u53d6\u5e73\u5747\u7684\u5206\u5e03\u5f0f\u65b9\u6848\uff0c\u5e76\u5728\u56fa\u5b9a\u8bbe\u8ba1\u8bbe\u5b9a\u4e0b\u7cbe\u786e\u523b\u753b\u4e86\u5e73\u5747OLS\u4f30\u8ba1\u91cf\u7684\u8d85\u989d\u635f\u5931\u3002", "why_notable": "\u4e3a\u5206\u5e03\u5f0f\u673a\u5668\u5b66\u4e60\u4e2d\u7684\u8349\u56fe\u538b\u7f29\u63d0\u4f9b\u4e86\u4e25\u683c\u7684\u7406\u8bba\u4fdd\u8bc1\uff0c\u586b\u8865\u4e86\u5206\u533a\u6570\u636e\u573a\u666f\u4e0b\u7684\u7406\u8bba\u7a7a\u767d\uff0c\u5bf9\u5927\u89c4\u6a21\u5206\u5e03\u5f0f\u7ebf\u6027\u56de\u5f52\u5177\u6709\u5b9e\u9645\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "World models are typically trained to predict discrete-time physical dynamics with a fixed step size baked into the model weights, preventing prediction at variable temporal resolutions. This matters for hierarchical planning, sim-to-real transfer, and scientific or game-engine applications that must query the same dynamics at multiple timescales. Hamiltonian Generative Networks (HGN) offer a principled path forward, grounding predictions in a continuous-time energy function that is, in principle, independent of the observation frame rate. In practice, however, their temporal generalization breaks down in non-conservative settings. We show that in externally forced, dissipative environments, HGN rollouts at step sizes beyond the training regime fail due to distinct failure modes, including latent magnitude growth driven by an unconstrained action-force map, and global truncation error accumulation from an under-resolved integrator. We identify a targeted fix for each mechanism and demonstrate stable dynamics prediction at temporal resolutions well outside the training distribution. In a detailed analysis, we recommend several strategies for enabling temporal generalization in continuous-time video generation.", "arxiv_id": "2607.07763", "arxiv_url": "https://arxiv.org/abs/2607.07763", "authors": ["Eli Laird", "Corey Clark"], "brief": "\u54c8\u5bc6\u987f\u751f\u6210\u7f51\u7edc\uff08HGN\uff09\u5728\u539f\u7406\u4e0a\u652f\u6301\u8fde\u7eed\u65f6\u95f4\u52a8\u529b\u5b66\u9884\u6d4b\uff0c\u4f46\u5728\u8017\u6563\u73af\u5883\u4e2d\u65f6\u95f4\u6cdb\u5316\u80fd\u529b\u4f1a\u5931\u6548\u3002\u672c\u6587\u5206\u6790\u4e86\u4e24\u79cd\u5931\u6548\u6a21\u5f0f\uff08\u6f5c\u53d8\u91cf\u5e45\u503c\u7206\u70b8\u548c\u79ef\u5206\u622a\u65ad\u8bef\u5dee\u7d2f\u79ef\uff09\uff0c\u5e76\u63d0\u51fa\u9488\u5bf9\u6027\u4fee\u590d\u65b9\u6848\uff0c\u5b9e\u73b0\u4e86\u5728\u8bad\u7ec3\u5206\u5e03\u4e4b\u5916\u7684\u65f6\u95f4\u5206\u8fa8\u7387\u4e0b\u7a33\u5b9a\u9884\u6d4b\u89c6\u9891\u52a8\u529b\u5b66\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07763", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u54c8\u5bc6\u987f\u52a8\u529b\u5b66", "\u65f6\u95f4\u6cdb\u5316", "\u89c6\u9891\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07763v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Unlocking Temporal Generalization in Hamiltonian Video Dynamics Models", "tldr": "\u54c8\u5bc6\u987f\u751f\u6210\u7f51\u7edc\uff08HGN\uff09\u5728\u539f\u7406\u4e0a\u652f\u6301\u8fde\u7eed\u65f6\u95f4\u52a8\u529b\u5b66\u9884\u6d4b\uff0c\u4f46\u5728\u8017\u6563\u73af\u5883\u4e2d\u65f6\u95f4\u6cdb\u5316\u80fd\u529b\u4f1a\u5931\u6548\u3002\u672c\u6587\u5206\u6790\u4e86\u4e24\u79cd\u5931\u6548\u6a21\u5f0f\uff08\u6f5c\u53d8\u91cf\u5e45\u503c\u7206\u70b8\u548c\u79ef\u5206\u622a\u65ad\u8bef\u5dee\u7d2f\u79ef\uff09\uff0c\u5e76\u63d0\u51fa\u9488\u5bf9\u6027\u4fee\u590d\u65b9\u6848\uff0c\u5b9e\u73b0\u4e86\u5728\u8bad\u7ec3\u5206\u5e03\u4e4b\u5916\u7684\u65f6\u95f4\u5206\u8fa8\u7387\u4e0b\u7a33\u5b9a\u9884\u6d4b\u89c6\u9891\u52a8\u529b\u5b66\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern machine learning (ML) increasingly relies on complex models whose behavior is difficult to characterize beyond empirical performance metrics. Across a wide range of tasks, including prediction, generation, and decision-making, models with similar empirical performance can exhibit markedly different properties in terms of their transparency, interpretability, robustness, fairness, privacy, and certifiability. This survey highlights how optimization- and certification-oriented reasoning can provide a useful framework for reasoning about such differences, supporting tasks ranging from model training and selection to auditing and certification. We review and synthesize recent advances at the intersection of combinatorial optimization (CO) and trustworthy ML, covering both training and post-training tasks, including interpretable model learning, explanation generation, robustness analysis, fairness auditing, model compression, and privacy attacks and protections. Across these domains, CO formulations offer additional capabilities over purely heuristic approaches, e.g., gradient-based ones, notably global guarantees, formal certificates, and explicit treatment of trade-offs. While scalability remains an important challenge, continued progress in solvers and hybrid algorithms suggests a growing role for CO in the design and deployment of trustworthy ML systems.", "arxiv_id": "2607.07762", "arxiv_url": "https://arxiv.org/abs/2607.07762", "authors": ["Thibaut Vidal", "Julien Ferry"], "brief": "\u672c\u6587\u7efc\u8ff0\u4e86\u7ec4\u5408\u4f18\u5316\uff08CO\uff09\u4e0e\u53ef\u4fe1\u673a\u5668\u5b66\u4e60\u7684\u4ea4\u53c9\u7814\u7a76\uff0c\u6db5\u76d6\u53ef\u89e3\u91ca\u6a21\u578b\u5b66\u4e60\u3001\u9c81\u68d2\u6027\u5206\u6790\u3001\u516c\u5e73\u6027\u5ba1\u8ba1\u3001\u6a21\u578b\u538b\u7f29\u53ca\u9690\u79c1\u4fdd\u62a4\u7b49\u4efb\u52a1\u3002\u76f8\u6bd4\u7eaf\u542f\u53d1\u5f0f\u65b9\u6cd5\uff0cCO\u65b9\u6cd5\u80fd\u63d0\u4f9b\u5168\u5c40\u4fdd\u8bc1\u3001\u5f62\u5f0f\u5316\u8bc1\u4e66\u548c\u663e\u5f0f\u6743\u8861\u5904\u7406\uff0c\u4e3a\u6784\u5efa\u53ef\u4fe1ML\u7cfb\u7edf\u63d0\u4f9b\u4e86\u7cfb\u7edf\u6027\u6846\u67b6\u3002", "categories": ["cs.LG", "math.OC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07762", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u53ef\u4fe1\u673a\u5668\u5b66\u4e60", "\u7ec4\u5408\u4f18\u5316", "\u53ef\u89e3\u91ca\u6027", "\u9c81\u68d2\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07762v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Trustworthy Machine Learning through the Lens of Combinatorial Optimization: Survey and Research Perspectives", "tldr": "\u672c\u6587\u7efc\u8ff0\u4e86\u7ec4\u5408\u4f18\u5316\uff08CO\uff09\u4e0e\u53ef\u4fe1\u673a\u5668\u5b66\u4e60\u7684\u4ea4\u53c9\u7814\u7a76\uff0c\u6db5\u76d6\u53ef\u89e3\u91ca\u6a21\u578b\u5b66\u4e60\u3001\u9c81\u68d2\u6027\u5206\u6790\u3001\u516c\u5e73\u6027\u5ba1\u8ba1\u3001\u6a21\u578b\u538b\u7f29\u53ca\u9690\u79c1\u4fdd\u62a4\u7b49\u4efb\u52a1\u3002\u76f8\u6bd4\u7eaf\u542f\u53d1\u5f0f\u65b9\u6cd5\uff0cCO\u65b9\u6cd5\u80fd\u63d0\u4f9b\u5168\u5c40\u4fdd\u8bc1\u3001\u5f62\u5f0f\u5316\u8bc1\u4e66\u548c\u663e\u5f0f\u6743\u8861\u5904\u7406\uff0c\u4e3a\u6784\u5efa\u53ef\u4fe1ML\u7cfb\u7edf\u63d0\u4f9b\u4e86\u7cfb\u7edf\u6027\u6846\u67b6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Foundation models (FMs) have transformed machine learning from isolated task-specific model development toward general-purpose models pretrained on broad data and adapted to multiple downstream tasks. Earth observation (EO) is an important domain for this paradigm because satellite and airborne archives are large, high-revisit, and increasingly multimodal, while reliable field labels are often sparse. Remote sensing foundation models (RSFMs) cannot be transferred reliably/optimally without domain-specific adaptation. This is because EO data are governed by measurement physics and operational decision constraints. This chapter reviews the design principles arising from these domain-specific constraints. It first defines the FMs paradigm in remote sensing (RS), then synthesizes the current model landscape, pretraining objectives, architecture designs, downstream adaptation and trustworthiness requirements. The chapter also incorporates recent benchmark evidence showing that no single geospatial foundation model is universally best and that inconsistent evaluation remains a major issue to fair comparison and reliable deployment. In addition, two brief environmental monitoring case studies; physics-informed spectral targeted masking for harmful algal bloom prediction and reinforcement learning for adaptive environmental monitoring station selection to illustrate the FMs domain-guided principles in practice. This chapter posits that next-generation RSFMs should be evaluated not only by benchmark accuracy, but also by modality-aware transfer and physically plausible representations for trustworthy EO decisions.", "arxiv_id": "2607.07758", "arxiv_url": "https://arxiv.org/abs/2607.07758", "authors": ["Syed Usama Imtiaz", "Mitra Nasr Azadani", "Nasrin Alamdari"], "brief": "\u672c\u6587\u7efc\u8ff0\u4e86\u9065\u611f\u57fa\u7840\u6a21\u578b\uff08RSFMs\uff09\u7684\u8bbe\u8ba1\u539f\u5219\uff0c\u6db5\u76d6\u9884\u8bad\u7ec3\u76ee\u6807\u3001\u67b6\u6784\u8bbe\u8ba1\u3001\u4e0b\u6e38\u9002\u914d\u4e0e\u53ef\u4fe1\u5ea6\u8981\u6c42\u3002\u7814\u7a76\u6307\u51fa\u5f53\u524d\u65e0\u5355\u4e00\u5730\u7406\u7a7a\u95f4\u57fa\u7840\u6a21\u578b\u80fd\u666e\u904d\u6700\u4f18\uff0c\u8bc4\u4f30\u4e0d\u4e00\u81f4\u662f\u516c\u5e73\u6bd4\u8f83\u7684\u4e3b\u8981\u969c\u788d\uff0c\u5e76\u901a\u8fc7\u6709\u5bb3\u85fb\u534e\u9884\u6d4b\u548c\u81ea\u9002\u5e94\u73af\u5883\u76d1\u6d4b\u7ad9\u9009\u62e9\u4e24\u4e2a\u6848\u4f8b\u5c55\u793a\u4e86\u9886\u57df\u5f15\u5bfc\u539f\u5219\u7684\u5b9e\u8df5\u3002\u63d0\u51fa\u4e0b\u4e00\u4ee3RSFMs\u5e94\u517c\u987e\u57fa\u51c6\u7cbe\u5ea6\u3001\u6a21\u6001\u611f\u77e5\u8fc1\u79fb\u4e0e\u7269\u7406\u5408\u7406\u8868\u5f81\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07758", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9065\u611f\u57fa\u7840\u6a21\u578b", "\u5730\u7403\u89c2\u6d4b", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07758v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Scalable and Trustworthy Earth Observation Foundation Models", "tldr": "\u672c\u6587\u7efc\u8ff0\u4e86\u9065\u611f\u57fa\u7840\u6a21\u578b\uff08RSFMs\uff09\u7684\u8bbe\u8ba1\u539f\u5219\uff0c\u6db5\u76d6\u9884\u8bad\u7ec3\u76ee\u6807\u3001\u67b6\u6784\u8bbe\u8ba1\u3001\u4e0b\u6e38\u9002\u914d\u4e0e\u53ef\u4fe1\u5ea6\u8981\u6c42\u3002\u7814\u7a76\u6307\u51fa\u5f53\u524d\u65e0\u5355\u4e00\u5730\u7406\u7a7a\u95f4\u57fa\u7840\u6a21\u578b\u80fd\u666e\u904d\u6700\u4f18\uff0c\u8bc4\u4f30\u4e0d\u4e00\u81f4\u662f\u516c\u5e73\u6bd4\u8f83\u7684\u4e3b\u8981\u969c\u788d\uff0c\u5e76\u901a\u8fc7\u6709\u5bb3\u85fb\u534e\u9884\u6d4b\u548c\u81ea\u9002\u5e94\u73af\u5883\u76d1\u6d4b\u7ad9\u9009\u62e9\u4e24\u4e2a\u6848\u4f8b\u5c55\u793a\u4e86\u9886\u57df\u5f15\u5bfc\u539f\u5219\u7684\u5b9e\u8df5\u3002\u63d0\u51fa\u4e0b\u4e00\u4ee3RSFMs\u5e94\u517c\u987e\u57fa\u51c6\u7cbe\u5ea6\u3001\u6a21\u6001\u611f\u77e5\u8fc1\u79fb\u4e0e\u7269\u7406\u5408\u7406\u8868\u5f81\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multimodal learning usually requires a dedicated encoder per modality. When a tabular modality is involved, prior work has been mostly using a \\emph{plain MLP} as the encoder. Yet if it were a strong encoder, the tabular domain would not be ``the last unconquered castle for deep learning\u0027\u0027. This study evaluates state-of-the-art tabular models as encoders in the image-tabular setting for the first time. An obstacle stands out. In-Context Learning models, among the best performing methods in the tabular domain, require labels to process instances, making it non-trivial to embed training and test instances the same way. We addressed this problem across multiple models of this family. With this study, we would like to highlight the importance of encoder factor in the multimodal learning.", "arxiv_id": "2607.07756", "arxiv_url": "https://arxiv.org/abs/2607.07756", "authors": ["Ilia Koloiarov", "Diego Coello de Portugal Mecke", "Vijaya Krishna Yalavarthi", "Tom Hanika", "Lars Schmidt-Thieme"], "brief": "\u672c\u7814\u7a76\u9996\u6b21\u5728\u56fe\u50cf-\u8868\u683c\u591a\u6a21\u6001\u5b66\u4e60\u4e2d\u8bc4\u4f30\u6700\u5148\u8fdb\u7684\u8868\u683c\u7f16\u7801\u5668\uff0c\u53d1\u73b0\u7f16\u7801\u5668\u9009\u62e9\u5bf9\u591a\u6a21\u6001\u5b66\u4e60\u6027\u80fd\u81f3\u5173\u91cd\u8981\u3002\u9488\u5bf9\u4e0a\u4e0b\u6587\u5b66\u4e60\uff08In-Context Learning\uff09\u6a21\u578b\u9700\u8981\u6807\u7b7e\u624d\u80fd\u5904\u7406\u5b9e\u4f8b\u7684\u96be\u9898\uff0c\u63d0\u51fa\u4e86\u89e3\u51b3\u65b9\u6848\uff0c\u5e76\u5f3a\u8c03\u4e86\u7f16\u7801\u5668\u56e0\u7d20\u5728\u591a\u6a21\u6001\u5b66\u4e60\u4e2d\u7684\u91cd\u8981\u6027\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07756", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5b66\u4e60", "\u8868\u683c\u6570\u636e", "\u7f16\u7801\u5668", "\u4e0a\u4e0b\u6587\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07756v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Importance of Encoder Choice:A Tabular-Image Study", "tldr": "\u672c\u7814\u7a76\u9996\u6b21\u5728\u56fe\u50cf-\u8868\u683c\u591a\u6a21\u6001\u5b66\u4e60\u4e2d\u8bc4\u4f30\u6700\u5148\u8fdb\u7684\u8868\u683c\u7f16\u7801\u5668\uff0c\u53d1\u73b0\u7f16\u7801\u5668\u9009\u62e9\u5bf9\u591a\u6a21\u6001\u5b66\u4e60\u6027\u80fd\u81f3\u5173\u91cd\u8981\u3002\u9488\u5bf9\u4e0a\u4e0b\u6587\u5b66\u4e60\uff08In-Context Learning\uff09\u6a21\u578b\u9700\u8981\u6807\u7b7e\u624d\u80fd\u5904\u7406\u5b9e\u4f8b\u7684\u96be\u9898\uff0c\u63d0\u51fa\u4e86\u89e3\u51b3\u65b9\u6848\uff0c\u5e76\u5f3a\u8c03\u4e86\u7f16\u7801\u5668\u56e0\u7d20\u5728\u591a\u6a21\u6001\u5b66\u4e60\u4e2d\u7684\u91cd\u8981\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Pattern recognition problems arise in a variety of physical image processing situations, and convolutional neural networks are a popular scheme for the required feature extraction and classification tasks. The classical networks use diffusion-based smearing and block-wise pooling to downsample the image data and capture important structural features. In this work, we propose and demonstrate a more efficient quantum-inspired strategy involving a mixture of experts. It is a hybrid classical-quantum framework. The quantum part consists of amplitude encoding of the images, convolution using local unitary operations, multiple experts processing the same image with different parameters, and feature extraction using quantum stabiliser codes. The classical part then jointly processes the features extracted by different experts using a standard fully connected neural network for image class prediction. Using MNIST and Fashion-MNIST datasets as benchmarks, we demonstrate that the joint expert analysis outperforms the individual expert one, as well as reduces the failure rate of image class prediction by around a factor of two. The overhead of our quantum-inspired strategy is only moderate on GPU workstations, which makes our proposal a practical alternative to existing classical schemes. We also point out how the quantum part of our framework can be executed on a quantum processor.", "arxiv_id": "2607.07754", "arxiv_url": "https://arxiv.org/abs/2607.07754", "authors": ["Kumari Jyoti", "Rohith Babu", "Apoorva D. Patel"], "brief": "\u63d0\u51fa\u4e00\u79cd\u91cf\u5b50\u542f\u53d1\u7684\u6df7\u5408\u7ecf\u5178-\u91cf\u5b50\u56fe\u50cf\u5206\u7c7b\u6846\u67b6\uff0c\u7ed3\u5408\u632f\u5e45\u7f16\u7801\u3001\u5c40\u90e8\u9149\u64cd\u4f5c\u5377\u79ef\u548c\u91cf\u5b50\u7a33\u5b9a\u5b50\u7801\u7279\u5f81\u63d0\u53d6\uff0c\u5e76\u901a\u8fc7\u591a\u4e13\u5bb6\u8054\u5408\u5206\u6790\u63d0\u5347\u5206\u7c7b\u6027\u80fd\u3002\u5728MNIST\u548cFashion-MNIST\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c\u8054\u5408\u4e13\u5bb6\u5206\u6790\u76f8\u6bd4\u5355\u4e13\u5bb6\u5c06\u5206\u7c7b\u5931\u8d25\u7387\u964d\u4f4e\u7ea6\u4e00\u534a\uff0c\u4e14GPU\u5f00\u9500\u9002\u4e2d\u3002", "categories": ["cs.LG", "quant-ph"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07754", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u91cf\u5b50\u673a\u5668\u5b66\u4e60", "\u56fe\u50cf\u5206\u7c7b", "\u6df7\u5408\u7ecf\u5178-\u91cf\u5b50\u6846\u67b6", "\u591a\u4e13\u5bb6\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07754v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Image classification via a quantum-inspired strategy involving a mixture of experts", "tldr": "\u63d0\u51fa\u4e00\u79cd\u91cf\u5b50\u542f\u53d1\u7684\u6df7\u5408\u7ecf\u5178-\u91cf\u5b50\u56fe\u50cf\u5206\u7c7b\u6846\u67b6\uff0c\u7ed3\u5408\u632f\u5e45\u7f16\u7801\u3001\u5c40\u90e8\u9149\u64cd\u4f5c\u5377\u79ef\u548c\u91cf\u5b50\u7a33\u5b9a\u5b50\u7801\u7279\u5f81\u63d0\u53d6\uff0c\u5e76\u901a\u8fc7\u591a\u4e13\u5bb6\u8054\u5408\u5206\u6790\u63d0\u5347\u5206\u7c7b\u6027\u80fd\u3002\u5728MNIST\u548cFashion-MNIST\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c\u8054\u5408\u4e13\u5bb6\u5206\u6790\u76f8\u6bd4\u5355\u4e13\u5bb6\u5c06\u5206\u7c7b\u5931\u8d25\u7387\u964d\u4f4e\u7ea6\u4e00\u534a\uff0c\u4e14GPU\u5f00\u9500\u9002\u4e2d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modelling psychological disorders in artificial agents offers both a testbed for computational psychiatry and a lens on the failure modes of affective control. Prior work induces one or two disorders in a reinforcement learning (RL) agent by hand-tuned reward shaping, labels the behaviour post hoc, and reports single runs. We recast disorder modelling as dose-controllable manipulation of cognitive appraisal signals in an appraisal-guided PPO agent, expressing seven disorders (anxiety, mania, obsessive-compulsive checking, depression, impulsivity, addiction, and post-traumatic stress) each as a single knob grounded in a computational psychiatry account, with each symptom measured by a preregistered assay mapped to a recognised paradigm. Across more than a thousand runs (10 seeds, four controls, 95% confidence intervals) every disorder shows a graded, monotone dose-response that no control reproduces. Beyond these induced effects, three findings emerge that were not written into the reward: the disorders self-organise into a two-dimensional affective space in which mania mirrors anxiety; removing a knob remits reward distortion disorders (mania, checking, addiction) but not avoidance disorders (anxiety, PTSD), which instead recover under a graded exposure curriculum; and two simultaneous knobs interact nonadditively, yielding testable comorbidity predictions. Appraisal weights thus parameterise a controllable space of affective phenotypes in which the same knobs that induce a disorder can model its treatment. We also show that three disorder knobs (depression, addiction, anxiety) transfer to a three-dimensional pixel environment (MiniWorld) with a standard convolutional agent and no appraisal critic, with cross-assay dissociation confirmed across both domains, indicating the framework is not specific to grid worlds or to PPO\u0027s appraisal critic.", "arxiv_id": "2607.07753", "arxiv_url": "https://arxiv.org/abs/2607.07753", "authors": ["Hari Prasad"], "brief": "\u7814\u7a76\u5c06\u5fc3\u7406\u969c\u788d\u5efa\u6a21\u4e3a\u5f3a\u5316\u5b66\u4e60\u667a\u80fd\u4f53\u4e2d\u8ba4\u77e5\u8bc4\u4f30\u4fe1\u53f7\u7684\u53ef\u63a7\u64cd\u7eb5\uff0c\u901a\u8fc7\u5355\u4e00\"\u65cb\u94ae\"\u53c2\u6570\u5316\u7126\u8651\u3001\u8e81\u72c2\u3001\u6291\u90c1\u7b49\u4e03\u79cd\u969c\u788d\uff0c\u5e76\u5728\u5343\u4f59\u6b21\u5b9e\u9a8c\u4e2d\u9a8c\u8bc1\u4e86\u5242\u91cf-\u53cd\u5e94\u5173\u7cfb\u3002\u53d1\u73b0\u969c\u788d\u81ea\u7ec4\u7ec7\u4e3a\u4e8c\u7ef4\u60c5\u611f\u7a7a\u95f4\uff0c\u4e14\u4e24\u4e2a\u65cb\u94ae\u540c\u65f6\u4f5c\u7528\u4f1a\u4ea7\u751f\u975e\u52a0\u6027\u7684\u5171\u75c5\u6548\u5e94\uff0c\u4e3a\u8ba1\u7b97\u7cbe\u795e\u75c5\u5b66\u63d0\u4f9b\u4e86\u53ef\u63a7\u7684\u60c5\u611f\u8868\u578b\u7814\u7a76\u6846\u67b6\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.07753", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8ba1\u7b97\u7cbe\u795e\u75c5\u5b66", "\u60c5\u611f\u5efa\u6a21", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.07753v1", "published_at": "2026-07-08", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A Transdiagnostic Space of Disorder Like Phenotypes in Reinforcement Learning Agents", "tldr": "\u7814\u7a76\u5c06\u5fc3\u7406\u969c\u788d\u5efa\u6a21\u4e3a\u5f3a\u5316\u5b66\u4e60\u667a\u80fd\u4f53\u4e2d\u8ba4\u77e5\u8bc4\u4f30\u4fe1\u53f7\u7684\u53ef\u63a7\u64cd\u7eb5\uff0c\u901a\u8fc7\u5355\u4e00\"\u65cb\u94ae\"\u53c2\u6570\u5316\u7126\u8651\u3001\u8e81\u72c2\u3001\u6291\u90c1\u7b49\u4e03\u79cd\u969c\u788d\uff0c\u5e76\u5728\u5343\u4f59\u6b21\u5b9e\u9a8c\u4e2d\u9a8c\u8bc1\u4e86\u5242\u91cf-\u53cd\u5e94\u5173\u7cfb\u3002\u53d1\u73b0\u969c\u788d\u81ea\u7ec4\u7ec7\u4e3a\u4e8c\u7ef4\u60c5\u611f\u7a7a\u95f4\uff0c\u4e14\u4e24\u4e2a\u65cb\u94ae\u540c\u65f6\u4f5c\u7528\u4f1a\u4ea7\u751f\u975e\u52a0\u6027\u7684\u5171\u75c5\u6548\u5e94\uff0c\u4e3a\u8ba1\u7b97\u7cbe\u795e\u75c5\u5b66\u63d0\u4f9b\u4e86\u53ef\u63a7\u7684\u60c5\u611f\u8868\u578b\u7814\u7a76\u6846\u67b6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
