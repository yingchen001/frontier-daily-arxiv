he newest observations. We present a fast-slow architecture that removes this compromise. A frozen 7B vision-language backbone acts as the slow system, digesting navigation instructions and visual history at low frequency while exposing its per-layer key-value cache as a standing representation of the scene. A lightweight action expert acts as the fast system, attending to this cache and to the current camera frame at every simulation tick to regress waypoints in a single forward pass. Since the cache lags behind the world at deployment, we train the expert under randomized staleness, aligning training with asynchronous execution. On LangAuto-Short routes in CARLA, our system produces fresh control at every 50 ms simulation tick and lifts route completion from 37.0 to 94.0 over the frame-skipping baseline. A frame-skip ablation with the same expert separates the two factors at work: the expert raises the driving score on its own, while per-tick freshness raises completion from 82.1 to 94.0 and cuts red-light violations by a third. Trained on a single town, the expert transfers zero-shot to two unseen towns, holding 84-94% route completion where the baseline reaches 31-41%. It reduces open-loop waypoint error by nearly a factor of four compared to the backbone\u0027s own action head, at a per-tick model cost of 32 ms that is independent of history length on a single consumer GPU.", "arxiv_id": "2607.15621", "arxiv_url": "https://arxiv.org/abs/2607.15621", "authors": ["Yun Li", "Jiachen Gong", "Simon Thompson", "Ehsan Javanmardi", "Qunli Zhang", "Zifan Zeng", "Shiming Liu", "Peng Wang", "Zixuan Guo", "Manabu Tsukada"], "brief": "\u63d0\u51faFast-Slow\u5f02\u6b65\u63a8\u7406\u67b6\u6784\u7528\u4e8e\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\uff1a\u51bb\u7ed3\u76847B\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4ee5\u4f4e\u9891\uff085Hz\uff09\u5904\u7406\u573a\u666f\u7406\u89e3\uff0c\u8f7b\u91cf\u52a8\u4f5c\u4e13\u5bb6\u6a21\u5757\u4ee5\u9ad8\u9891\uff0820Hz\uff09\u5229\u7528KV\u7f13\u5b58\u5728\u6bcf\u4e2a\u63a7\u5236\u5468\u671f\u8f93\u51fa\u65b0\u9c9c\u7684\u8def\u5f84\u70b9\uff0c\u89e3\u51b3\u5927\u6a21\u578b\u63a8\u7406\u5ef6\u8fdf\u4e0e\u8f66\u8f86\u63a7\u5236\u9891\u7387\u4e4b\u95f4\u7684\u77db\u76fe\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15621", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6162\u7cfb\u7edf\uff087B VLM\uff09\u66b4\u9732KV\u7f13\u5b58\u4f5c\u4e3a\u573a\u666f\u8868\u793a\uff0c\u5feb\u7cfb\u7edf\uff08\u52a8\u4f5c\u4e13\u5bb6\uff09\u6bcf50ms\u4e00\u4e2atick\u5b9e\u65f6\u67e5\u8be2\u7f13\u5b58\u5e76\u56de\u5f52\u8def\u5f84\u70b9", "\u5f15\u5165\u968f\u673a\u9648\u65e7\u6027\u8bad\u7ec3\uff08randomized staleness\uff09\uff0c\u4f7f\u52a8\u4f5c\u4e13\u5bb6\u9002\u5e94\u90e8\u7f72\u65f6\u7f13\u5b58\u6ede\u540e\u7684\u5f02\u6b65\u6267\u884c\u573a\u666f", "\u5728CARLA LangAuto-Short\u8def\u7ebf\u4e0a\uff0c\u8def\u7ebf\u5b8c\u6210\u7387\u4ece37.0\u63d0\u5347\u81f394.0\uff0c\u96f6\u6837\u672c\u8fc1\u79fb\u5230\u672a\u89c1\u57ce\u9547\u4ecd\u4fdd\u630184-94%\u5b8c\u6210\u7387\uff0c\u5f00\u73af\u8def\u5f84\u70b9\u8bef\u5dee\u964d\u4f4e\u8fd14\u500d"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5feb\u6162\u7cfb\u7edf", "\u95ed\u73af\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15621v1", "published_at": "2026-07-17", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Think at 5 Hz, Act at 20 Hz: Asynchronous Fast-Slow Vision-Language-Action Inference for Closed-Loop Driving", "tldr": "\u5f02\u6b65\u5feb\u6162\u67b6\u6784\u8ba9\u89c6\u89c9\u8bed\u8a00\u9a7e\u9a76\u6a21\u578b\u4ee55Hz\u63a8\u7406\u300120Hz\u63a7\u5236\uff0c\u5927\u5e45\u63d0\u5347\u95ed\u73af\u9a7e\u9a76\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faFast-Slow\u5f02\u6b65\u63a8\u7406\u67b6\u6784\u7528\u4e8e\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\uff1a\u51bb\u7ed3\u76847B\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4ee5\u4f4e\u9891\uff085Hz\uff09\u5904\u7406\u573a\u666f\u7406\u89e3\uff0c\u8f7b\u91cf\u52a8\u4f5c\u4e13\u5bb6\u6a21\u5757\u4ee5\u9ad8\u9891\uff0820Hz\uff09\u5229\u7528KV\u7f13\u5b58\u5728\u6bcf\u4e2a\u63a7\u5236\u5468\u671f\u8f93\u51fa\u65b0\u9c9c\u7684\u8def\u5f84\u70b9\uff0c\u89e3\u51b3\u5927\u6a21\u578b\u63a8\u7406\u5ef6\u8fdf\u4e0e\u8f66\u8f86\u63a7\u5236\u9891\u7387\u4e4b\u95f4\u7684\u77db\u76fe\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u89e3\u51b3VLM\u63a8\u7406\u5ef6\u8fdf\u4e0e\u5b9e\u65f6\u63a7\u5236\u9891\u7387\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u65e0\u9700\u5e27\u8df3\u8fc7\u59a5\u534f\u5373\u53ef\u5b9e\u73b0\u6bcftick\u65b0\u9c9c\u63a7\u5236\u8f93\u51fa\uff0c\u4e14\u5355\u6d88\u8d39\u7ea7GPU\u4e0a\u6bcftick\u4ec5\u970032ms\uff0c\u5177\u6709\u5f3a\u5b9e\u7528\u4ef7\u503c\u548c\u96f6\u6837\u672c\u6cdb\u5316\u80fd\u529b"}, {"abstract": "Large language models (LLMs) excel at answering pre-specified questions, yet their ability to navigate the open-ended, pre-conclusion stage of discovery remains largely unmeasured. We introduce Prospective Hypothesis Discovery (PHD), which asks models to autonomously construct grounded, discriminative, and testable hypothesis spaces from inconclusive evidence, including anomalous observations and fragmented records, to guide subsequent investigation. To evaluate this capability, we introduce HypoArena, comprising HypoData, a benchmark of 988 cases across six scientific and analytical domains, and HypoEval, an evaluation framework for open-ended hypothesis sets. To construct HypoData at scale, we propose Retrospective Context Regression, a Forge--Audit pipeline that reconstructs pre-conclusion contexts from completed expert documents by removing explicit conclusions, target hypotheses, and retrospective causal attributions while preserving the factual substrate. Because PHD admits multiple valid outputs, HypoEval combines bidirectional pairwise judgments with Bradley--Terry--Davidson aggregation for ranking and six-dimensional rubric scoring for diagnosis. Experiments on 15 frontier LLMs reveal clear capability stratification and model-dependent effects of structured analytical skills, with gains for several lower-performing models on HypoArena but regressions for other systems, including a top-performing model. Compared with absolute rubric scoring, arena evaluation resolves finer-grained differences among models, with aggregated rankings showing strong agreement with human experts and an independent judge. Together, these results support treating PHD as a distinct target for evaluating how LLMs formulate investigative directions when final conclusions are withheld. Our code and data are publicly available at github.com/SKYLENAGE-AI/HypoArena and github.com/SKYLENAGE-AI/HypoArena.", "arxiv_id": "2607.15766", "arxiv_url": "https://arxiv.org/abs/2607.15766", "authors": ["Tianyun Zhong", "Wangyi Jiang", "Wei Wang", "Xuanang Chen", "Yaojie Lu", "Shiwei Ye", "Yuzhen Shi", "Boyu Yang", "Jinghang Wang", "Han Li", "Weiqi Zhai", "Bing Zhao", "Hu Wei", "Haiyang Yu", "Yongbin Li", "Hongyu Lin", "Le Sun", "Xianpei Han"], "brief": "\u8bba\u6587\u63d0\u51fa\"\u524d\u77bb\u6027\u5047\u8bbe\u53d1\u73b0\"\uff08PHD\uff09\u4efb\u52a1\uff0c\u8981\u6c42LLM\u4ece\u4e0d\u5b8c\u6574\u8bc1\u636e\u4e2d\u81ea\u4e3b\u6784\u5efa\u53ef\u8fa8\u522b\u3001\u53ef\u6d4b\u8bd5\u7684\u5047\u8bbe\u7a7a\u95f4\uff1b\u5e76\u6784\u5efa\u5305\u542b988\u4e2a\u6848\u4f8b\u7684HypoArena\u57fa\u51c6\u53ca\u914d\u5957\u8bc4\u4f30\u6846\u67b6HypoEval\uff0c\u7cfb\u7edf\u8bc4\u4f3015\u4e2a\u524d\u6cbfLLM\u7684\u5047\u8bbe\u751f\u6210\u80fd\u529b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15766", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51faRetrospective Context Regression\uff08\u56de\u6eaf\u4e0a\u4e0b\u6587\u56de\u5f52\uff09\u6d41\u6c34\u7ebf\uff0c\u4ece\u5df2\u5b8c\u6210\u4e13\u5bb6\u6587\u6863\u4e2d\u5265\u79bb\u7ed3\u8bba\uff0c\u91cd\u5efa\"\u7ed3\u8bba\u524d\"\u60c5\u5883\u4ee5\u5927\u89c4\u6a21\u6784\u5efa\u57fa\u51c6\u6570\u636e", "HypoEval\u7ed3\u5408\u53cc\u5411\u6210\u5bf9\u5224\u65ad\u4e0eBradley-Terry-Davidson\u805a\u5408\u6392\u540d\uff0c\u4ee5\u53ca\u516d\u7ef4\u8bc4\u5206\u6807\u51c6\uff0c\u89e3\u51b3\u5f00\u653e\u5f0f\u5047\u8bbe\u96c6\u7684\u591a\u89e3\u8bc4\u4f30\u96be\u9898", "15\u4e2a\u524d\u6cbfLLM\u5b9e\u9a8c\u663e\u793a\u660e\u663e\u80fd\u529b\u5206\u5c42\uff1a\u7ed3\u6784\u5316\u5206\u6790\u6280\u80fd\u5bf9\u4f4e\u6027\u80fd\u6a21\u578b\u6709\u589e\u76ca\uff0c\u4f46\u5bf9\u90e8\u5206\u9876\u7ea7\u6a21\u578b\u53cd\u800c\u9020\u6210\u6027\u80fd\u56de\u9000"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u79d1\u5b66\u53d1\u73b0", "\u57fa\u51c6\u8bc4\u6d4b", "\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15766v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Before the Action: Benchmarking LLMs on Prospective Hypothesis Discovery", "tldr": "\u63d0\u51faPHD\u4efb\u52a1\u4e0eHypoArena\u57fa\u51c6\uff0c\u8bc4\u4f30LLM\u5728\u7ed3\u8bba\u672a\u77e5\u65f6\u81ea\u4e3b\u6784\u5efa\u53ef\u6d4b\u5047\u8bbe\u7a7a\u95f4\u7684\u80fd\u529b", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\"\u524d\u77bb\u6027\u5047\u8bbe\u53d1\u73b0\"\uff08PHD\uff09\u4efb\u52a1\uff0c\u8981\u6c42LLM\u4ece\u4e0d\u5b8c\u6574\u8bc1\u636e\u4e2d\u81ea\u4e3b\u6784\u5efa\u53ef\u8fa8\u522b\u3001\u53ef\u6d4b\u8bd5\u7684\u5047\u8bbe\u7a7a\u95f4\uff1b\u5e76\u6784\u5efa\u5305\u542b988\u4e2a\u6848\u4f8b\u7684HypoArena\u57fa\u51c6\u53ca\u914d\u5957\u8bc4\u4f30\u6846\u67b6HypoEval\uff0c\u7cfb\u7edf\u8bc4\u4f3015\u4e2a\u524d\u6cbfLLM\u7684\u5047\u8bbe\u751f\u6210\u80fd\u529b\u3002", "why_notable": "\u586b\u8865\u4e86LLM\u5728\u79d1\u5b66\u53d1\u73b0\"\u524d\u7ed3\u8bba\u9636\u6bb5\"\u80fd\u529b\u8bc4\u4f30\u7684\u7a7a\u767d\uff0c\u63d0\u51fa\u7684PHD\u4efb\u52a1\u4e0e\u8bc4\u4f30\u4f53\u7cfb\u5bf9AI\u8f85\u52a9\u79d1\u7814\u3001\u4fa6\u63a2\u63a8\u7406\u7b49\u5f00\u653e\u5f0f\u63a2\u7d22\u573a\u666f\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "Large reasoning models often solve problems through long chain-of-thought (CoT) traces, yet much of this computation is spent on redundant derivations, repeated self-verification, and detours that do not improve the final answer. Existing on-policy self-distillation methods reduce this cost by matching a student model to a concise copy of itself on prefixes sampled from the student\u0027s own rollouts. We show that this objective has an initialization bottleneck. Since supervision is applied only to visited prefixes, training from a verbose base model places the KL loss on contexts that are often noisy, redundant, or already off track. In such regions, a concise teacher can provide only local corrections, while the student continues to explore trajectories that an efficient reasoner should avoid. In this paper, we propose BIRD(Bootstrapped Iterative Self-Reasoning Distillation), a two-stage self-reasoning distillation method that improves the rollout distribution before on-policy training. BIRD first samples concise solutions from the base model under a brevity instruction, keeps only answer-correct traces, and performs a lightweight prompt-switch SFT step. The traces are generated with the brevity instruction but learned under the original task prompt, turning instruction-induced conciseness into a default reasoning behavior. Starting from this warm model, BIRD then applies on-policy reverse-KL distillation with a concise self-teacher, now on cleaner and more informative prefixes. Across Qwen3 series models, BIRD achieves a stronger accuracy-efficiency trade-off than prompting and cold-start on-policy distillation on MATH-500 and AIME benchmarks. On Qwen3-8B, it improves MATH-500 accuracy from 86.2% to 92.0% while reducing the average response length from 3,099 to 1,115 tokens. These results highlight prefix support as a central factor in efficient reasoning distillation.", "arxiv_id": "2607.15736", "arxiv_url": "https://arxiv.org/abs/2607.15736", "authors": ["Leichao Dong", "Dongxu Zhang", "Yiding Sun", "Qirui Wang", "Yuhan Wang", "Lin Chen", "Jihua Zhu"], "brief": "\u63d0\u51faBIRD\uff08\u81ea\u4e3e\u8fed\u4ee3\u81ea\u63a8\u7406\u84b8\u998f\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u5148\u7528\u7b80\u6d01\u6307\u4ee4\u91c7\u6837\u6b63\u786e\u8f68\u8ff9\u505aSFT\u70ed\u542f\u52a8\uff0c\u518d\u8fdb\u884c\u5728\u7ebf\u53cd\u5411KL\u84b8\u998f\uff0c\u89e3\u51b3\u73b0\u6709\u81ea\u84b8\u998f\u65b9\u6cd5\u56e0\u521d\u59cb\u5316\u566a\u58f0\u5bfc\u81f4\u7684\u6548\u7387\u74f6\u9888\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15736", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4e24\u9636\u6bb5\u8bbe\u8ba1\uff1a\u5148\u7528\u7b80\u6d01\u6307\u4ee4\u751f\u6210\u6b63\u786e\u8f68\u8ff9\u5e76\u505aprompt-switch SFT\u70ed\u542f\u52a8\uff0c\u518d\u5728\u66f4\u5e72\u51c0\u7684\u524d\u7f00\u5206\u5e03\u4e0a\u505a\u5728\u7ebf\u84b8\u998f", "Qwen3-8B\u4e0aMATH-500\u51c6\u786e\u7387\u4ece86.2%\u63d0\u5347\u81f392.0%\uff0c\u540c\u65f6\u5e73\u5747\u54cd\u5e94\u957f\u5ea6\u4ece3099 token\u538b\u7f29\u81f31115 token\uff08\u7f29\u77ed\u7ea664%\uff09", "\u63ed\u793a\u0027\u524d\u7f00\u652f\u6491\u0027\u662f\u9ad8\u6548\u63a8\u7406\u84b8\u998f\u7684\u6838\u5fc3\u56e0\u7d20\uff1a\u521d\u59cb\u5316\u566a\u58f0\u4f1a\u5bfc\u81f4\u5b66\u751f\u6a21\u578b\u5728\u4f4e\u8d28\u91cf\u8f68\u8ff9\u533a\u57df\u63a5\u53d7\u5c40\u90e8\u4fee\u6b63\uff0c\u96be\u4ee5\u6839\u672c\u6539\u5584"], "keywords": ["\u63a8\u7406\u538b\u7f29", "\u77e5\u8bc6\u84b8\u998f", "\u94fe\u5f0f\u601d\u7ef4", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15736v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Better Starts, Better Ends: Bootstrapped Iterative Self-Reasoning Distillation for Compressed Reasoning", "tldr": "BIRD\u65b9\u6cd5\u901a\u8fc7\u4e24\u9636\u6bb5\u81ea\u84b8\u998f\uff0c\u8ba9\u63a8\u7406\u6a21\u578b\u5728\u5927\u5e45\u7f29\u77ed\u8f93\u51fa\u957f\u5ea6\u7684\u540c\u65f6\u63d0\u5347\u51c6\u786e\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faBIRD\uff08\u81ea\u4e3e\u8fed\u4ee3\u81ea\u63a8\u7406\u84b8\u998f\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u5148\u7528\u7b80\u6d01\u6307\u4ee4\u91c7\u6837\u6b63\u786e\u8f68\u8ff9\u505aSFT\u70ed\u542f\u52a8\uff0c\u518d\u8fdb\u884c\u5728\u7ebf\u53cd\u5411KL\u84b8\u998f\uff0c\u89e3\u51b3\u73b0\u6709\u81ea\u84b8\u998f\u65b9\u6cd5\u56e0\u521d\u59cb\u5316\u566a\u58f0\u5bfc\u81f4\u7684\u6548\u7387\u74f6\u9888\u3002", "why_notable": "\u5728\u4e0d\u4f9d\u8d56\u5916\u90e8\u6559\u5e08\u6a21\u578b\u7684\u524d\u63d0\u4e0b\uff0c\u540c\u65f6\u5b9e\u73b0\u63a8\u7406\u51c6\u786e\u7387\u63d0\u5347\u548c\u8f93\u51fa\u957f\u5ea6\u5927\u5e45\u538b\u7f29\uff0c\u4e3a\u5927\u63a8\u7406\u6a21\u578b\u7684\u9ad8\u6548\u90e8\u7f72\u63d0\u4f9b\u4e86\u5b9e\u7528\u65b9\u6848\uff0c\u4e14\u5728MATH-500\u548cAIME\u4e24\u4e2a\u57fa\u51c6\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\u3002"}, {"abstract": "AI governance increasingly requires judgments about whether an AI system remains adequately trustworthy over time, whether observed changes are tolerable, and how such judgments should be documented in a transparent and contestable way. Yet existing work on AI trustworthiness remains either too high-level to support lifecycle monitoring and reassessment or too narrowly metric-driven to connect with governance needs. We therefore propose a lightweight methodology for auditable trustworthiness levels in AI governance. The methodology has two components: a formal framework for representing and learning trustworthiness levels, and a lightweight AI lifecycle governance procedure for documenting, monitoring, and reassessing them over time. The formal framework models governance-relative trustworthiness through a context-sensitive protocol of measurable dimensions and learns trustworthiness levels as interpretable rules over trustworthiness profiles. Using decision trees as an interpretable proof-of-concept model class, the methodology yields explicit trustworthiness plateaus, readable level transitions, and two simple lifecycle diagnostics: boundary margins and profile drift. The governance procedure embeds these formal objects in a conformity-oriented workflow for design-time labeling, post-deployment monitoring, reassessment, and reporting. It also assigns human responsibilities and control gates for protocol design, validation, monitoring, and reassessment. We illustrate the methodology on synthetic AI lifecycle traces involving degradation, shocks, updates, heterogeneous monitoring cadences, and system comparison. Our methodology does not replace legal or other expert judgment: it supports conformity documentation and lifecycle monitoring by providing an evidential basis for documenting and tracking AI governance-relevant changes over time.", "arxiv_id": "2607.16130", "arxiv_url": "https://arxiv.org/abs/2607.16130", "authors": ["Andrea Ferrario"], "brief": "\u63d0\u51fa\u4e00\u79cd\u8f7b\u91cf\u7ea7\u65b9\u6cd5\u8bba\uff0c\u901a\u8fc7\u5f62\u5f0f\u5316\u6846\u67b6\u4e0e\u6cbb\u7406\u6d41\u7a0b\u76f8\u7ed3\u5408\uff0c\u5bf9AI\u7cfb\u7edf\u5728\u6574\u4e2a\u751f\u547d\u5468\u671f\u4e2d\u7684\u53ef\u4fe1\u5ea6\u8fdb\u884c\u5efa\u6a21\u3001\u76d1\u6d4b\u4e0e\u53ef\u5ba1\u8ba1\u7684\u7b49\u7ea7\u8bc4\u4f30\u3002", "categories": ["cs.CY", "cs.AI", "eess.SY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16130", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f62\u5f0f\u5316\u6846\u67b6\uff1a\u57fa\u4e8e\u4e0a\u4e0b\u6587\u654f\u611f\u7684\u591a\u7ef4\u5ea6\u534f\u8bae\uff0c\u5229\u7528\u51b3\u7b56\u6811\u5b66\u4e60\u53ef\u89e3\u91ca\u7684\u53ef\u4fe1\u5ea6\u7b49\u7ea7\u89c4\u5219\uff0c\u751f\u6210\u660e\u786e\u7684\u53ef\u4fe1\u5ea6\u5e73\u53f0\u671f\u4e0e\u7b49\u7ea7\u8f6c\u6362\u8def\u5f84", "\u5f15\u5165\u4e24\u79cd\u751f\u547d\u5468\u671f\u8bca\u65ad\u5de5\u5177\uff1a\u8fb9\u754c\u88d5\u5ea6\uff08boundary margins\uff09\u4e0e\u8f6e\u5ed3\u6f02\u79fb\uff08profile drift\uff09\uff0c\u7528\u4e8e\u68c0\u6d4b\u7cfb\u7edf\u9000\u5316\u3001\u51b2\u51fb\u4e0e\u66f4\u65b0", "\u6cbb\u7406\u6d41\u7a0b\u6db5\u76d6\u8bbe\u8ba1\u671f\u6807\u6ce8\u3001\u90e8\u7f72\u540e\u76d1\u6d4b\u3001\u91cd\u65b0\u8bc4\u4f30\u4e0e\u62a5\u544a\uff0c\u5e76\u660e\u786e\u4eba\u5de5\u8d23\u4efb\u4e0e\u63a7\u5236\u8282\u70b9"], "keywords": ["AI\u6cbb\u7406", "\u53ef\u4fe1\u5ea6\u8bc4\u4f30", "\u751f\u547d\u5468\u671f\u76d1\u6d4b", "\u53ef\u89e3\u91caAI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16130v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "A Methodology for Auditable Trustworthiness Levels in AI Lifecycle Governance", "tldr": "\u63d0\u51fa\u4e00\u5957\u53ef\u5ba1\u8ba1\u7684AI\u751f\u547d\u5468\u671f\u6cbb\u7406\u53ef\u4fe1\u5ea6\u7b49\u7ea7\u8bc4\u4f30\u65b9\u6cd5\u8bba", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u8f7b\u91cf\u7ea7\u65b9\u6cd5\u8bba\uff0c\u901a\u8fc7\u5f62\u5f0f\u5316\u6846\u67b6\u4e0e\u6cbb\u7406\u6d41\u7a0b\u76f8\u7ed3\u5408\uff0c\u5bf9AI\u7cfb\u7edf\u5728\u6574\u4e2a\u751f\u547d\u5468\u671f\u4e2d\u7684\u53ef\u4fe1\u5ea6\u8fdb\u884c\u5efa\u6a21\u3001\u76d1\u6d4b\u4e0e\u53ef\u5ba1\u8ba1\u7684\u7b49\u7ea7\u8bc4\u4f30\u3002", "why_notable": "\u586b\u8865\u4e86AI\u53ef\u4fe1\u5ea6\u7814\u7a76\u5728\u9ad8\u5c42\u539f\u5219\u4e0e\u5177\u4f53\u6307\u6807\u4e4b\u95f4\u7684\u9e3f\u6c9f\uff0c\u4e3aAI\u76d1\u7ba1\u5408\u89c4\u6587\u6863\u5316\u63d0\u4f9b\u53ef\u64cd\u4f5c\u7684\u8bc1\u636e\u57fa\u7840\uff0c\u5951\u5408\u5f53\u524d\u5168\u7403AI\u6cbb\u7406\u7acb\u6cd5\u9700\u6c42\u3002"}, {"abstract": "Evaluations should do more than measure a models current performance. They should tell us what to fix for the next model iteration and provide a way to generate targeted post training data. Most evaluation pipelines identify weak examples, topics, or categories, but they leave the underlying capability failure implicit: they say where a model fails, not why. We introduce CRAFT, a method that converts any rubric based evaluation dataset into a model specific diagnosis of weak capabilities. CRAFT treats each grading criterion as a capability probe: it extracts a capability description from every prompt rubric pair, clusters these descriptions into a hierarchical capability tree, scores the target model at every node, and selects low performing nodes dynamically across tree levels, at the granularity where each failure is clearest. The selected weak capabilities then direct the generation of targeted supervised finetuning data. Holding the data generation, finetuning, and evaluation setup fixed, we compare CRAFT against prompt level EvalTree clustering and untargeted random generation on four open source models, two professional domains (finance and legal), and 13 held out benchmarks disjoint from the diagnostic data. CRAFT achieves the strongest finance domain average for all four models under repeated temperature decoding; on legal domain, it is strongest for three of four models and remains within the decoding variance bands of the best baseline on the fourth. Diagnosing weaknesses at the level of rubric criteria, rather than prompts or categories, thus yields both a sharper picture of what a model cannot do and measurably better models after finetuning on that diagnosis.", "arxiv_id": "2607.16122", "arxiv_url": "https://arxiv.org/abs/2607.16122", "authors": ["Vipul Gupta", "Zihao Wang", "Razvan-Gabriel Dumitru", "MohammadHossein Rezaei", "Aakash Sabharwal", "Yunzhong He"], "brief": "\u63d0\u51faCRAFT\u65b9\u6cd5\uff0c\u5c06\u57fa\u4e8e\u8bc4\u5206\u6807\u51c6\u7684\u8bc4\u6d4b\u6570\u636e\u96c6\u8f6c\u5316\u4e3a\u6a21\u578b\u7279\u5b9a\u7684\u80fd\u529b\u5f31\u70b9\u8bca\u65ad\u6811\uff0c\u901a\u8fc7\u805a\u7c7b\u8bc4\u5206\u51c6\u5219\u63d0\u53d6\u80fd\u529b\u63cf\u8ff0\u3001\u6784\u5efa\u5c42\u6b21\u5316\u80fd\u529b\u6811\u3001\u5b9a\u4f4d\u8584\u5f31\u8282\u70b9\uff0c\u5e76\u636e\u6b64\u751f\u6210\u6709\u9488\u5bf9\u6027\u7684\u76d1\u7763\u5fae\u8c03\u6570\u636e\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16122", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u6bcf\u6761\u8bc4\u5206\u6807\u51c6\u89c6\u4e3a\u80fd\u529b\u63a2\u9488\uff0c\u63d0\u53d6\u80fd\u529b\u63cf\u8ff0\u540e\u805a\u7c7b\u4e3a\u5c42\u6b21\u5316\u80fd\u529b\u6811\uff0c\u5728\u6700\u6e05\u6670\u7684\u7c92\u5ea6\u5c42\u7ea7\u52a8\u6001\u9009\u53d6\u4f4e\u5206\u8282\u70b9", "\u5728\u91d1\u878d\u548c\u6cd5\u5f8b\u4e24\u4e2a\u4e13\u4e1a\u9886\u57df\u30014\u4e2a\u5f00\u6e90\u6a21\u578b\u300113\u4e2a\u4fdd\u7559\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff1a\u91d1\u878d\u9886\u57df4\u4e2a\u6a21\u578b\u5747\u6700\u4f18\uff0c\u6cd5\u5f8b\u9886\u57df3/4\u6a21\u578b\u6700\u4f18", "\u4e0eEvalTree\u63d0\u793a\u7ea7\u805a\u7c7b\u548c\u65e0\u76ee\u6807\u968f\u673a\u751f\u6210\u57fa\u7ebf\u76f8\u6bd4\uff0cCRAFT\u5728\u56fa\u5b9a\u6570\u636e\u751f\u6210\u4e0e\u5fae\u8c03\u8bbe\u7f6e\u4e0b\u53d6\u5f97\u66f4\u4f18\u7ed3\u679c"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8bc4\u6d4b", "\u5fae\u8c03", "\u80fd\u529b\u8bca\u65ad"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16122v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CRAFT: Clustering Rubrics to Diagnose Weak LLM Capabilities and Generate Targeted Fine-Tuning Data", "tldr": "CRAFT\u5c06\u8bc4\u6d4b\u6570\u636e\u8f6c\u5316\u4e3a\u6a21\u578b\u80fd\u529b\u5f31\u70b9\u8bca\u65ad\uff0c\u5e76\u81ea\u52a8\u751f\u6210\u9488\u5bf9\u6027\u5fae\u8c03\u6570\u636e\u4ee5\u63d0\u5347\u6a21\u578b\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faCRAFT\u65b9\u6cd5\uff0c\u5c06\u57fa\u4e8e\u8bc4\u5206\u6807\u51c6\u7684\u8bc4\u6d4b\u6570\u636e\u96c6\u8f6c\u5316\u4e3a\u6a21\u578b\u7279\u5b9a\u7684\u80fd\u529b\u5f31\u70b9\u8bca\u65ad\u6811\uff0c\u901a\u8fc7\u805a\u7c7b\u8bc4\u5206\u51c6\u5219\u63d0\u53d6\u80fd\u529b\u63cf\u8ff0\u3001\u6784\u5efa\u5c42\u6b21\u5316\u80fd\u529b\u6811\u3001\u5b9a\u4f4d\u8584\u5f31\u8282\u70b9\uff0c\u5e76\u636e\u6b64\u751f\u6210\u6709\u9488\u5bf9\u6027\u7684\u76d1\u7763\u5fae\u8c03\u6570\u636e\u3002", "why_notable": "\u5c06\u8bc4\u6d4b\u4ece\"\u53d1\u73b0\u54ea\u91cc\u5931\u8d25\"\u63a8\u8fdb\u5230\"\u8bca\u65ad\u4e3a\u4f55\u5931\u8d25\"\uff0c\u5e76\u5f62\u6210\u8bca\u65ad\u2192\u6570\u636e\u751f\u6210\u2192\u5fae\u8c03\u7684\u95ed\u73af\uff0c\u5bf9LLM\u8fed\u4ee3\u6539\u8fdb\u5177\u6709\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Frontier AI companies have published capability thresholds that differ substantially, making it difficult for third parties to verify whether a threshold has been crossed or to compare requirements across companies. Moreover, without common minimum thresholds, risk mitigation may be inconsistent, creating a potential race to the bottom in safety standards. We develop a methodology for deriving harmonized thresholds across three risk domains. For misuse risks (cyber and biological), we take expected harm as the key primitive and use an explicit risk-modeling approach that accounts for risk channels and model release conditions. For automated AI R\u0026D, we base our proposed threshold on the observed rate of AI progress rather than expected harm. Our analysis expands upon prior work and highlights existing empirical gaps and limitations.", "arxiv_id": "2607.16112", "arxiv_url": "https://arxiv.org/abs/2607.16112", "authors": ["Wilber Sean Anterola", "Matthew Ball", "Luis F. Lafuerza", "Markov Grey"], "brief": "\u672c\u6587\u9488\u5bf9\u524d\u6cbfAI\u516c\u53f8\u5404\u81ea\u53d1\u5e03\u7684\u80fd\u529b\u5b89\u5168\u9608\u503c\u5dee\u5f02\u60ac\u6b8a\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u5957\u534f\u8c03\u7edf\u4e00\u9608\u503c\u7684\u65b9\u6cd5\u8bba\uff0c\u5206\u522b\u9488\u5bf9\u6ee5\u7528\u98ce\u9669\uff08\u7f51\u7edc/\u751f\u7269\uff09\u548c\u81ea\u52a8\u5316AI\u7814\u53d1\u98ce\u9669\u5efa\u7acb\u4e0d\u540c\u7684\u63a8\u5bfc\u6846\u67b6\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16112", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5bf9\u7f51\u7edc\u548c\u751f\u7269\u6ee5\u7528\u98ce\u9669\uff0c\u4ee5\u9884\u671f\u5371\u5bb3\u4e3a\u6838\u5fc3\u57fa\u5143\uff0c\u901a\u8fc7\u663e\u5f0f\u98ce\u9669\u5efa\u6a21\uff08\u8003\u8651\u98ce\u9669\u6e20\u9053\u4e0e\u6a21\u578b\u53d1\u5e03\u6761\u4ef6\uff09\u63a8\u5bfc\u9608\u503c", "\u5bf9\u81ea\u52a8\u5316AI\u7814\u53d1\u98ce\u9669\uff0c\u4ee5\u89c2\u6d4b\u5230\u7684AI\u8fdb\u6b65\u901f\u7387\u800c\u975e\u9884\u671f\u5371\u5bb3\u4e3a\u57fa\u7840\u8bbe\u5b9a\u9608\u503c", "\u6307\u51fa\u7f3a\u4e4f\u5171\u540c\u6700\u4f4e\u9608\u503c\u53ef\u80fd\u5bfc\u81f4\u5b89\u5168\u6807\u51c6\u7684\u0027\u9010\u5e95\u7ade\u4e89\u0027\uff0c\u5e76\u63ed\u793a\u73b0\u6709\u5b9e\u8bc1\u7814\u7a76\u7684\u7a7a\u767d\u4e0e\u5c40\u9650"], "keywords": ["AI\u5b89\u5168", "AI\u6cbb\u7406", "\u98ce\u9669\u8bc4\u4f30", "\u524d\u6cbf\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16112v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Harmonizing AI Safety Thresholds", "tldr": "\u63d0\u51fa\u8de8AI\u516c\u53f8\u7edf\u4e00\u5b89\u5168\u80fd\u529b\u9608\u503c\u7684\u65b9\u6cd5\u8bba\uff0c\u8986\u76d6\u7f51\u7edc\u3001\u751f\u7269\u53caAI\u81ea\u52a8\u7814\u53d1\u4e09\u5927\u98ce\u9669\u9886\u57df", "upvotes": 0, "what_it_is": "\u672c\u6587\u9488\u5bf9\u524d\u6cbfAI\u516c\u53f8\u5404\u81ea\u53d1\u5e03\u7684\u80fd\u529b\u5b89\u5168\u9608\u503c\u5dee\u5f02\u60ac\u6b8a\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u5957\u534f\u8c03\u7edf\u4e00\u9608\u503c\u7684\u65b9\u6cd5\u8bba\uff0c\u5206\u522b\u9488\u5bf9\u6ee5\u7528\u98ce\u9669\uff08\u7f51\u7edc/\u751f\u7269\uff09\u548c\u81ea\u52a8\u5316AI\u7814\u53d1\u98ce\u9669\u5efa\u7acb\u4e0d\u540c\u7684\u63a8\u5bfc\u6846\u67b6\u3002", "why_notable": "\u5f53\u524d\u5404\u5927AI\u516c\u53f8\u5b89\u5168\u9608\u503c\u6807\u51c6\u4e0d\u4e00\uff0c\u7b2c\u4e09\u65b9\u96be\u4ee5\u72ec\u7acb\u6838\u9a8c\uff0c\u672c\u6587\u63d0\u4f9b\u4e86\u9996\u4e2a\u7cfb\u7edf\u6027\u7684\u8de8\u673a\u6784\u9608\u503c\u534f\u8c03\u65b9\u6cd5\uff0c\u5bf9AI\u6cbb\u7406\u4e0e\u76d1\u7ba1\u5177\u6709\u91cd\u8981\u653f\u7b56\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Transferring policies across domains poses a vital challenge in reinforcement learning, due to the dynamics mismatch between the source and target domains. In this paper, we consider the setting of online dynamics adaptation, where policies are trained in the source domain with sufficient data, while only limited interactions with the target domain are allowed. There are a few existing works that address the dynamics mismatch by employing domain classifiers, value-guided data filtering, or representation learning. Instead, we study the domain adaptation problem from a generative modeling perspective. Specifically, we introduce DADiff, a diffusion-based framework that leverages the discrepancy between source and target domain generative trajectories in the generation process of the next state to estimate the dynamics mismatch. Both reward modification and data selection variants are developed to adapt the policy to the target domain. We also provide a theoretical analysis to show that the performance difference of a given policy between the two domains is bounded by the generative trajectory deviation. More discussions on the applicability of the variants and the connection between our theoretical analysis and the prior work are further provided. We conduct extensive experiments in environments with various shifts to validate the effectiveness of our method. The results demonstrate that our method provides superior performance compared to existing approaches, effectively addressing the dynamics mismatch. We provide the code of our method at https://github.com/hanyang-chen/DADiff-release", "arxiv_id": "2607.16090", "arxiv_url": "https://arxiv.org/abs/2607.16090", "authors": ["Hanyang Chen", "Anirudh Satheesh", "Longchao Da", "Hua Wei"], "brief": "\u63d0\u51faDADiff\u6846\u67b6\uff0c\u5229\u7528\u6269\u6563\u6a21\u578b\u5728\u751f\u6210\u4e0b\u4e00\u72b6\u6001\u65f6\u6355\u6349\u6e90\u57df\u4e0e\u76ee\u6807\u57df\u7684\u751f\u6210\u8f68\u8ff9\u5dee\u5f02\uff0c\u4ece\u751f\u6210\u5efa\u6a21\u89c6\u89d2\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u8de8\u57df\u7b56\u7565\u8fc1\u79fb\u4e2d\u7684\u52a8\u529b\u5b66\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u5e76\u5f00\u53d1\u4e86\u5956\u52b1\u4fee\u6b63\u548c\u6570\u636e\u9009\u62e9\u4e24\u79cd\u53d8\u4f53\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16090", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5229\u7528\u6269\u6563\u6a21\u578b\u751f\u6210\u8f68\u8ff9\u7684\u504f\u5dee\u6765\u91cf\u5316\u6e90\u57df\u4e0e\u76ee\u6807\u57df\u7684\u52a8\u529b\u5b66\u4e0d\u5339\u914d\u7a0b\u5ea6", "\u63d0\u4f9b\u7406\u8bba\u5206\u6790\uff1a\u8bc1\u660e\u4e24\u57df\u95f4\u7b56\u7565\u6027\u80fd\u5dee\u5f02\u7531\u751f\u6210\u8f68\u8ff9\u504f\u5dee\u4e0a\u754c\u7ea6\u675f", "\u5728\u591a\u79cd\u52a8\u529b\u5b66\u504f\u79fb\u73af\u5883\u4e2d\u5b9e\u9a8c\u9a8c\u8bc1\uff0c\u6027\u80fd\u4f18\u4e8e\u73b0\u6709\u57df\u9002\u5e94\u65b9\u6cd5"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u6269\u6563\u6a21\u578b", "\u57df\u9002\u5e94", "\u7b56\u7565\u8fc1\u79fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16090v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DADiff: Diffusion-Driven Cross-Domain Policy Adaptation for Reinforcement Learning", "tldr": "\u57fa\u4e8e\u6269\u6563\u6a21\u578b\u7684\u8de8\u57df\u7b56\u7565\u8fc1\u79fb\u6846\u67b6\uff0c\u901a\u8fc7\u751f\u6210\u8f68\u8ff9\u5dee\u5f02\u4f30\u8ba1\u52a8\u529b\u5b66\u4e0d\u5339\u914d", "upvotes": 0, "what_it_is": "\u63d0\u51faDADiff\u6846\u67b6\uff0c\u5229\u7528\u6269\u6563\u6a21\u578b\u5728\u751f\u6210\u4e0b\u4e00\u72b6\u6001\u65f6\u6355\u6349\u6e90\u57df\u4e0e\u76ee\u6807\u57df\u7684\u751f\u6210\u8f68\u8ff9\u5dee\u5f02\uff0c\u4ece\u751f\u6210\u5efa\u6a21\u89c6\u89d2\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u8de8\u57df\u7b56\u7565\u8fc1\u79fb\u4e2d\u7684\u52a8\u529b\u5b66\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u5e76\u5f00\u53d1\u4e86\u5956\u52b1\u4fee\u6b63\u548c\u6570\u636e\u9009\u62e9\u4e24\u79cd\u53d8\u4f53\u3002", "why_notable": "\u9996\u6b21\u5c06\u6269\u6563\u751f\u6210\u6a21\u578b\u5f15\u5165\u5728\u7ebf\u52a8\u529b\u5b66\u57df\u9002\u5e94\u95ee\u9898\uff0c\u63d0\u4f9b\u4e86\u6709\u7406\u8bba\u4fdd\u8bc1\u7684\u65b0\u89c6\u89d2\uff0c\u76f8\u6bd4\u4f20\u7edf\u57df\u5206\u7c7b\u5668\u6216\u8868\u793a\u5b66\u4e60\u65b9\u6cd5\u66f4\u5177\u901a\u7528\u6027\uff0c\u4e14\u4ee3\u7801\u5f00\u6e90\u3002"}, {"abstract": "Model merging is promoted as a substitute for joint multi-task training, yet in the reinforcement-learning setting this substitution is essentially never tested against the baseline it claims to replace: methods merge independently released agents precisely because a joint model is unavailable. We build the missing comparison. Training difficulty-1 and difficulty-2 Qwen3-8B specialists on the AppWorld agent benchmark with LOOP, we merge them (TIES, RAM+) and pit the result against a jointly trained model on the same data. On task-goal completion, merging matches joint RL -- and every merge variant is statistically indistinguishable. To explain why merge method does not matter here, we measure the geometry of the specialists\u0027 task vectors, which carries no task-sampling noise: they are near-orthogonal (cosine 0.06 - 0.10) despite ~65% support overlap, a small, shared direction that grows over training and that we calibrate against a random-init floor and a same-run ceiling to confirm it reflects learning, not the low-rank parameterization. Because direction and support are decoupled, support and sign-based merging (RAM, TIES) collapse to near-uniform averaging. We release all code and statistics.", "arxiv_id": "2607.16062", "arxiv_url": "https://arxiv.org/abs/2607.16062", "authors": ["S. Aaron McClendon"], "brief": "\u672c\u6587\u9996\u6b21\u5728\u5f3a\u5316\u5b66\u4e60\u8bbe\u7f6e\u4e0b\u5bf9\u6a21\u578b\u5408\u5e76\u4e0e\u8054\u5408\u591a\u4efb\u52a1\u8bad\u7ec3\u8fdb\u884c\u76f4\u63a5\u5bf9\u6bd4\uff0c\u53d1\u73b0\u5408\u5e76\u72ec\u7acb\u8bad\u7ec3\u7684\u4e13\u5bb6\u6a21\u578b\uff08TIES\u3001RAM+\uff09\u5728AppWorld\u57fa\u51c6\u4e0a\u4e0e\u8054\u5408\u8bad\u7ec3\u6a21\u578b\u6027\u80fd\u7edf\u8ba1\u4e0a\u65e0\u663e\u8457\u5dee\u5f02\uff0c\u5e76\u901a\u8fc7\u4efb\u52a1\u5411\u91cf\u51e0\u4f55\u5206\u6790\u63ed\u793a\u4e86\u80cc\u540e\u539f\u56e0\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16062", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u4f7f\u7528LOOP\u65b9\u6cd5\u8bad\u7ec3Qwen3-8B\u4e13\u5bb6\u6a21\u578b\uff0c\u5408\u5e76\u540e\u4e0e\u8054\u5408RL\u8bad\u7ec3\u6a21\u578b\u5728\u4efb\u52a1\u76ee\u6807\u5b8c\u6210\u7387\u4e0a\u7edf\u8ba1\u4e0d\u53ef\u533a\u5206", "\u4e24\u4e2a\u4e13\u5bb6\u7684\u4efb\u52a1\u5411\u91cf\u8fd1\u4e4e\u6b63\u4ea4\uff08\u4f59\u5f26\u76f8\u4f3c\u5ea6\u4ec50.06-0.10\uff09\uff0c\u5c3d\u7ba1\u53c2\u6570\u652f\u6491\u91cd\u53e0\u7ea665%\uff0c\u65b9\u5411\u4e0e\u652f\u6491\u89e3\u8026", "\u7531\u4e8e\u4efb\u52a1\u5411\u91cf\u8fd1\u6b63\u4ea4\uff0c\u57fa\u4e8e\u652f\u6491\u548c\u7b26\u53f7\u7684\u5408\u5e76\u65b9\u6cd5\uff08RAM\u3001TIES\uff09\u9000\u5316\u4e3a\u8fd1\u4f3c\u5747\u5300\u5e73\u5747\uff0c\u5408\u5e76\u7b56\u7565\u5dee\u5f02\u6d88\u5931"], "keywords": ["\u6a21\u578b\u5408\u5e76", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u4efb\u52a1\u5b66\u4e60", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16062v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "When Model Merging Rivals Joint Multi-Task Reinforcement Learning: A Task-Vector Geometry Analysis", "tldr": "\u6a21\u578b\u5408\u5e76\u5728\u5f3a\u5316\u5b66\u4e60\u591a\u4efb\u52a1\u573a\u666f\u4e2d\u53ef\u5ab2\u7f8e\u8054\u5408\u8bad\u7ec3\uff0c\u4efb\u52a1\u5411\u91cf\u8fd1\u6b63\u4ea4\u662f\u5173\u952e\u539f\u56e0", "upvotes": 0, "what_it_is": "\u672c\u6587\u9996\u6b21\u5728\u5f3a\u5316\u5b66\u4e60\u8bbe\u7f6e\u4e0b\u5bf9\u6a21\u578b\u5408\u5e76\u4e0e\u8054\u5408\u591a\u4efb\u52a1\u8bad\u7ec3\u8fdb\u884c\u76f4\u63a5\u5bf9\u6bd4\uff0c\u53d1\u73b0\u5408\u5e76\u72ec\u7acb\u8bad\u7ec3\u7684\u4e13\u5bb6\u6a21\u578b\uff08TIES\u3001RAM+\uff09\u5728AppWorld\u57fa\u51c6\u4e0a\u4e0e\u8054\u5408\u8bad\u7ec3\u6a21\u578b\u6027\u80fd\u7edf\u8ba1\u4e0a\u65e0\u663e\u8457\u5dee\u5f02\uff0c\u5e76\u901a\u8fc7\u4efb\u52a1\u5411\u91cf\u51e0\u4f55\u5206\u6790\u63ed\u793a\u4e86\u80cc\u540e\u539f\u56e0\u3002", "why_notable": "\u586b\u8865\u4e86RL\u6a21\u578b\u5408\u5e76\u9886\u57df\u7f3a\u4e4f\u4e0e\u8054\u5408\u8bad\u7ec3\u57fa\u7ebf\u5bf9\u6bd4\u7684\u7a7a\u767d\uff1b\u901a\u8fc7\u4efb\u52a1\u5411\u91cf\u51e0\u4f55\u89c6\u89d2\u63d0\u4f9b\u4e86\u53ef\u89e3\u91ca\u7684\u7406\u8bba\u4f9d\u636e\uff0c\u5bf9\u591a\u4efb\u52a1RL\u548c\u6a21\u578b\u5408\u5e76\u7814\u7a76\u5747\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\uff0c\u5e76\u5f00\u6e90\u4e86\u5168\u90e8\u4ee3\u7801\u4e0e\u7edf\u8ba1\u6570\u636e\u3002"}, {"abstract": "Data-driven pre-fault dynamic security assessment (DSA) rapidly evaluates the dynamic risk of credible contingencies on a power system using machine learning. Existing approaches face two limitations. First, they require a large labelled database for training, with a separate model trained, tuned, and maintained for each contingency in a potentially long list of credible contingencies. Second, the trained models generalize poorly to unseen contingencies. This work addresses the limitations by using a tabular foundation model (TFM) that assesses stability through in-context learning, requiring no retraining or hyperparameter optimization. A single TFM can assess many contingencies at once, removing the need for one model per classifier. We also characterize when the use of electrical distance coordinates (EDC) as continuous features enables generalization of TFM to unseen contingencies and when they do not, demonstrating how a few labelled samples can reliably improve generalization. Through comprehensive case studies on the IEEE 68-bus system, we show that a single TFM attains an average Macro F1 score of about 90% with only 120 labelled samples per contingency, roughly two orders of magnitude fewer than conventionally assumed, without any model retraining or hyperparameter tuning. For new/unseen contingencies, we show that using just 10 labelled samples of the new contingency with EDC encoding matches the best achievable transfer learning oracle model, which requires fully labelled data and is not deployable in practice. Overall, this initial study paves the way towards developing and deploying foundation models for power system operations, with possible applications across multiple operational tasks.", "arxiv_id": "2607.16031", "arxiv_url": "https://arxiv.org/abs/2607.16031", "authors": ["Olayiwola Arowolo", "Maosheng Yang", "Jochen Cremer"], "brief": "\u63d0\u51fa\u5c06\u8868\u683c\u57fa\u7840\u6a21\u578b\uff08TFM\uff09\u5e94\u7528\u4e8e\u7535\u529b\u7cfb\u7edf\u9884\u6545\u969c\u52a8\u6001\u5b89\u5168\u8bc4\u4f30\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u5b66\u4e60\uff08in-context learning\uff09\u66ff\u4ee3\u4f20\u7edf\"\u6bcf\u4e2a\u6545\u969c\u8bad\u7ec3\u4e00\u4e2a\u6a21\u578b\"\u7684\u8303\u5f0f\uff0c\u5355\u4e00\u6a21\u578b\u53ef\u540c\u65f6\u8bc4\u4f30\u591a\u79cd\u6545\u969c\u573a\u666f\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16031", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5355\u4e00TFM\u4ec5\u9700\u6bcf\u4e2a\u6545\u969c120\u4e2a\u6807\u6ce8\u6837\u672c\uff08\u6bd4\u4f20\u7edf\u65b9\u6cd5\u5c11\u7ea6\u4e24\u4e2a\u6570\u91cf\u7ea7\uff09\uff0c\u5e73\u5747Macro F1\u8fbe90%\uff0c\u65e0\u9700\u91cd\u8bad\u7ec3\u6216\u8d85\u53c2\u8c03\u4f18", "\u5f15\u5165\u7535\u6c14\u8ddd\u79bb\u5750\u6807\uff08EDC\uff09\u4f5c\u4e3a\u8fde\u7eed\u7279\u5f81\uff0c\u4f7f\u6a21\u578b\u80fd\u6cdb\u5316\u5230\u672a\u89c1\u6545\u969c\uff1b\u4ec5\u752810\u4e2a\u65b0\u6545\u969c\u6807\u6ce8\u6837\u672c\u5373\u53ef\u5339\u914d\u9700\u8981\u5b8c\u6574\u6807\u6ce8\u6570\u636e\u7684\u8fc1\u79fb\u5b66\u4e60\u4e0a\u754c", "\u5728IEEE 68\u8282\u70b9\u7cfb\u7edf\u4e0a\u8fdb\u884c\u5168\u9762\u6848\u4f8b\u7814\u7a76\uff0c\u7cfb\u7edf\u5206\u6790EDC\u6cdb\u5316\u80fd\u529b\u7684\u9002\u7528\u6761\u4ef6\u4e0e\u5c40\u9650\u6027"], "keywords": ["\u57fa\u7840\u6a21\u578b", "\u7535\u529b\u7cfb\u7edf", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u5c11\u6837\u672c\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16031v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Revisiting data-driven dynamic security assessment with a tabular foundation model", "tldr": "\u7528\u8868\u683c\u57fa\u7840\u6a21\u578b\u5b9e\u73b0\u7535\u529b\u7cfb\u7edf\u52a8\u6001\u5b89\u5168\u8bc4\u4f30\uff0c\u65e0\u9700\u91cd\u8bad\u7ec3\u5373\u53ef\u6cdb\u5316\u5230\u672a\u89c1\u6545\u969c", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u5c06\u8868\u683c\u57fa\u7840\u6a21\u578b\uff08TFM\uff09\u5e94\u7528\u4e8e\u7535\u529b\u7cfb\u7edf\u9884\u6545\u969c\u52a8\u6001\u5b89\u5168\u8bc4\u4f30\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u5b66\u4e60\uff08in-context learning\uff09\u66ff\u4ee3\u4f20\u7edf\"\u6bcf\u4e2a\u6545\u969c\u8bad\u7ec3\u4e00\u4e2a\u6a21\u578b\"\u7684\u8303\u5f0f\uff0c\u5355\u4e00\u6a21\u578b\u53ef\u540c\u65f6\u8bc4\u4f30\u591a\u79cd\u6545\u969c\u573a\u666f\u3002", "why_notable": "\u9996\u6b21\u5c06\u8868\u683c\u57fa\u7840\u6a21\u578b\u5f15\u5165\u7535\u529b\u7cfb\u7edf\u5b89\u5168\u8bc4\u4f30\u9886\u57df\uff0c\u5927\u5e45\u964d\u4f4e\u6570\u636e\u9700\u6c42\u5e76\u6d88\u9664\u591a\u6a21\u578b\u7ef4\u62a4\u8d1f\u62c5\uff0c\u5bf9\u672a\u89c1\u6545\u969c\u7684\u5c11\u6837\u672c\u6cdb\u5316\u80fd\u529b\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u4e3a\u7535\u529b\u7cfb\u7edf\u8fd0\u884c\u57fa\u7840\u6a21\u578b\u7814\u7a76\u5f00\u8f9f\u65b0\u65b9\u5411\u3002"}, {"abstract": "Multi-Task Learning (MTL) in robotics perception systems supports comprehensive 3D spatial scene understanding by integrating semantic segmentation and depth estimation. While Vision Foundation Models (VFMs) are increasingly adopted as robust feature encoders, existing decoding strategies present a critical bottleneck. To address this, we propose DPNeXt, a streamlined multi-scale feature fusion decoder and efficient alternative to the standard Dense Prediction Transformer (DPT). DPNeXt uses dual depthwise separable inverted bottlenecks to improve frozen VFM utilization through fusion-centric decoding and independent task modularization. To further mitigate negative inductive transfer between tasks, we introduce the Multi-Task Boundary Guidance (MTBG) strategy. Unlike prior boundary-aware methods that add fusion modules or gating, MTBG applies symmetric boundary-focused supervision to encourage geometric consistency without extra annotation or inference cost. Experiments on Cityscapes show that DPNeXt-S outperforms prior state-of-the-art (SOTA) MTL models, while DPNeXt-B further improves the overall performance and achieves the best results among the compared methods. On NYUv2, DPNeXt-B also achieves the best semantic segmentation and depth estimation results among the compared methods while requiring substantially fewer trainable parameters than prior large-scale MTL models. Compared with the standard DPT, DPNeXt-S reduces trainable parameters by 78.6% and achieves the fastest inference speed among the compared models on resource-constrained laptop hardware. The source code, model checkpoints, and a demo video will be made available at https://github.com/kangjehun/DPNeXt.", "arxiv_id": "2607.16012", "arxiv_url": "https://arxiv.org/abs/2607.16012", "authors": ["Jehun Kang", "Jungha Wang", "Youngjun Hwang", "David Hyunchul Shim"], "brief": "\u63d0\u51faDPNeXt\uff0c\u4e00\u79cd\u9762\u5411\u673a\u5668\u4eba\u611f\u77e5\u7684\u8f7b\u91cf\u7ea7\u591a\u4efb\u52a1\u5b66\u4e60\u89e3\u7801\u6846\u67b6\uff0c\u66ff\u4ee3\u6807\u51c6DPT\u89e3\u7801\u5668\uff0c\u540c\u65f6\u5b8c\u6210\u8bed\u4e49\u5206\u5272\u4e0e\u6df1\u5ea6\u4f30\u8ba1\u4efb\u52a1\uff0c\u5e76\u5f15\u5165\u591a\u4efb\u52a1\u8fb9\u754c\u5f15\u5bfc\uff08MTBG\uff09\u7b56\u7565\u7f13\u89e3\u4efb\u52a1\u95f4\u8d1f\u8fc1\u79fb\u3002", "categories": ["cs.CV", "cs.AI", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16012", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528\u53cc\u6df1\u5ea6\u53ef\u5206\u79bb\u5012\u7f6e\u74f6\u9888\u7ed3\u6784\u5b9e\u73b0\u878d\u5408\u4e2d\u5fc3\u89e3\u7801\u4e0e\u72ec\u7acb\u4efb\u52a1\u6a21\u5757\u5316\uff0c\u76f8\u6bd4\u6807\u51c6DPT\u51cf\u5c1178.6%\u53ef\u8bad\u7ec3\u53c2\u6570", "MTBG\u7b56\u7565\u901a\u8fc7\u5bf9\u79f0\u8fb9\u754c\u76d1\u7763\u4fc3\u8fdb\u51e0\u4f55\u4e00\u81f4\u6027\uff0c\u65e0\u9700\u989d\u5916\u6807\u6ce8\u6216\u63a8\u7406\u5f00\u9500", "\u5728Cityscapes\u548cNYUv2\u6570\u636e\u96c6\u4e0a\u8d85\u8d8a\u73b0\u6709SOTA\u591a\u4efb\u52a1\u6a21\u578b\uff0c\u4e14\u5728\u8d44\u6e90\u53d7\u9650\u7b14\u8bb0\u672c\u786c\u4ef6\u4e0a\u63a8\u7406\u901f\u5ea6\u6700\u5feb"], "keywords": ["\u591a\u4efb\u52a1\u5b66\u4e60", "\u5bc6\u96c6\u9884\u6d4b", "\u8f7b\u91cf\u5316\u6a21\u578b", "\u673a\u5668\u4eba\u611f\u77e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16012v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DPNeXt: A Lightweight Multi-Scale Feature Fusion Framework for Efficient ViT-Based Multi-Task Dense Prediction", "tldr": "DPNeXt\uff1a\u8f7b\u91cf\u7ea7\u591a\u5c3a\u5ea6\u7279\u5f81\u878d\u5408\u89e3\u7801\u5668\uff0c\u5927\u5e45\u63d0\u5347ViT\u591a\u4efb\u52a1\u5bc6\u96c6\u9884\u6d4b\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faDPNeXt\uff0c\u4e00\u79cd\u9762\u5411\u673a\u5668\u4eba\u611f\u77e5\u7684\u8f7b\u91cf\u7ea7\u591a\u4efb\u52a1\u5b66\u4e60\u89e3\u7801\u6846\u67b6\uff0c\u66ff\u4ee3\u6807\u51c6DPT\u89e3\u7801\u5668\uff0c\u540c\u65f6\u5b8c\u6210\u8bed\u4e49\u5206\u5272\u4e0e\u6df1\u5ea6\u4f30\u8ba1\u4efb\u52a1\uff0c\u5e76\u5f15\u5165\u591a\u4efb\u52a1\u8fb9\u754c\u5f15\u5bfc\uff08MTBG\uff09\u7b56\u7565\u7f13\u89e3\u4efb\u52a1\u95f4\u8d1f\u8fc1\u79fb\u3002", "why_notable": "\u5728\u4fdd\u6301\u751a\u81f3\u8d85\u8d8aSOTA\u6027\u80fd\u7684\u540c\u65f6\u5927\u5e45\u538b\u7f29\u53c2\u6570\u91cf\uff0c\u5bf9\u673a\u5668\u4eba\u8fb9\u7f18\u90e8\u7f72\u573a\u666f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u65e0\u9700\u4fee\u6539\u51bb\u7ed3\u7684\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u4e3b\u5e72\u3002"}, {"abstract": "Over the past decade, responsible AI (RAI) has produced a substantial body of practice for identifying and mitigating the risks AI poses in high-stakes settings. Yet this work has not produced a market that rewards trustworthiness. Firms that invest seriously in safety, fairness, and oversight cannot consistently prove to consumers, regulators, and shareholders that their systems go beyond the bare minimum of compliance. What is missing is a way for society to recognize or compare the difference. The result is a trust gap: a structural condition in which responsible development efforts happen inside organizations but produce no external, independently recognized and verifiable signal of trustworthy outcomes. We argue this gap is sustained in part because of a focus on responsible AI (a matter of internal process) as opposed to trustworthy AI (a matter of independently verifiable real-world outcomes), and that it persists because of three compounding failures: (1) the market cannot distinguish trustworthy systems from their imitations; (2) evaluation targets models and outputs rather than deployed sociotechnical systems and their outcomes; (3) the measurement ecosystem is oriented toward avoiding harm rather than demonstrating benefit. Reviewing existing AI governance instruments and comparing them to certification regimes in healthcare, sustainability, and security, we show that none integrate a governance baseline, independently verified positive-outcome evidence, and market signaling in a single framework. We propose independent, outcome-oriented certification as the connective layer that can close the trust gap, complementing regulation and internal governance by making trustworthiness measurable, comparable, and commercially rewarded.", "arxiv_id": "2607.15992", "arxiv_url": "https://arxiv.org/abs/2607.15992", "authors": ["Trisevgeni Papakonstantinou", "Cansu Canca", "Farah Nanji", "Waheedullah Pardess", "Jen Weedon", "Jasmijn Remmers", "Eliza Krigman", "Matthew Ball", "Yalda Daryani", "Kiran Iqbal", "Francielle Vargas", "Mar\u00eda Llorente S\u00e1nchez", "Joe Humphreys", "Fendi Tsim", "Kelly Fitzpatrick", "Jeff Dunn", "Catherine Feldman"], "brief": "\u672c\u6587\u5206\u6790\u4e86\u5f53\u524d\u8d1f\u8d23\u4efbAI\u5b9e\u8df5\u65e0\u6cd5\u4ea7\u751f\u53ef\u9a8c\u8bc1\u5916\u90e8\u4fe1\u4efb\u4fe1\u53f7\u7684\"\u4fe1\u4efb\u9e3f\u6c9f\"\u95ee\u9898\uff0c\u5e76\u63d0\u51fa\u4ee5\u72ec\u7acb\u3001\u7ed3\u679c\u5bfc\u5411\u7684\u8ba4\u8bc1\u4f53\u7cfb\u4f5c\u4e3a\u89e3\u51b3\u65b9\u6848\uff0c\u4f7fAI\u53ef\u4fe1\u5ea6\u53ef\u6d4b\u91cf\u3001\u53ef\u6bd4\u8f83\u3001\u53ef\u5546\u4e1a\u5316\u6fc0\u52b1\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15992", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4fe1\u4efb\u9e3f\u6c9f\u7531\u4e09\u91cd\u5931\u7075\u6784\u6210\uff1a\u5e02\u573a\u65e0\u6cd5\u533a\u5206\u771f\u5047\u53ef\u4fe1\u7cfb\u7edf\u3001\u8bc4\u4f30\u805a\u7126\u6a21\u578b\u8f93\u51fa\u800c\u975e\u90e8\u7f72\u7ed3\u679c\u3001\u6d4b\u91cf\u4f53\u7cfb\u91cd\u907f\u5bb3\u8f7b\u8bc1\u76ca", "\u5bf9\u6bd4\u533b\u7597\u3001\u53ef\u6301\u7eed\u53d1\u5c55\u3001\u7f51\u7edc\u5b89\u5168\u7b49\u9886\u57df\u7684\u8ba4\u8bc1\u673a\u5236\uff0c\u53d1\u73b0\u73b0\u6709AI\u6cbb\u7406\u5de5\u5177\u5747\u672a\u80fd\u6574\u5408\u6cbb\u7406\u57fa\u7ebf\u3001\u72ec\u7acb\u9a8c\u8bc1\u6b63\u5411\u7ed3\u679c\u4e0e\u5e02\u573a\u4fe1\u53f7\u4e8e\u4e00\u4f53", "\u63d0\u51fa\u72ec\u7acb\u7b2c\u4e09\u65b9\u3001\u7ed3\u679c\u5bfc\u5411\u7684AI\u8ba4\u8bc1\u6846\u67b6\uff0c\u4f5c\u4e3a\u76d1\u7ba1\u4e0e\u5185\u90e8\u6cbb\u7406\u7684\u8865\u5145\u5c42\uff0c\u5c06\u53ef\u4fe1\u5ea6\u8f6c\u5316\u4e3a\u53ef\u5546\u4e1a\u56de\u62a5\u7684\u7ade\u4e89\u4f18\u52bf"], "keywords": ["AI\u6cbb\u7406", "\u53ef\u4fe1AI", "\u8ba4\u8bc1\u673a\u5236", "\u8d1f\u8d23\u4efbAI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15992v1", "published_at": "2026-07-17", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Closing the AI Trust Gap: The Case for Independent Certification for Trustworthy AI", "tldr": "\u63d0\u51fa\u72ec\u7acb\u7b2c\u4e09\u65b9\u8ba4\u8bc1\u673a\u5236\u4ee5\u5f25\u5408AI\u53ef\u4fe1\u5ea6\u4e0e\u5e02\u573a\u4fe1\u4efb\u4e4b\u95f4\u7684\u7ed3\u6784\u6027\u9e3f\u6c9f", "upvotes": 0, "what_it_is": "\u672c\u6587\u5206\u6790\u4e86\u5f53\u524d\u8d1f\u8d23\u4efbAI\u5b9e\u8df5\u65e0\u6cd5\u4ea7\u751f\u53ef\u9a8c\u8bc1\u5916\u90e8\u4fe1\u4efb\u4fe1\u53f7\u7684\"\u4fe1\u4efb\u9e3f\u6c9f\"\u95ee\u9898\uff0c\u5e76\u63d0\u51fa\u4ee5\u72ec\u7acb\u3001\u7ed3\u679c\u5bfc\u5411\u7684\u8ba4\u8bc1\u4f53\u7cfb\u4f5c\u4e3a\u89e3\u51b3\u65b9\u6848\uff0c\u4f7fAI\u53ef\u4fe1\u5ea6\u53ef\u6d4b\u91cf\u3001\u53ef\u6bd4\u8f83\u3001\u53ef\u5546\u4e1a\u5316\u6fc0\u52b1\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06AI\u4fe1\u4efb\u95ee\u9898\u5b9a\u4f4d\u4e3a\u5e02\u573a\u7ed3\u6784\u5931\u7075\u800c\u975e\u6280\u672f\u95ee\u9898\uff0c\u5e76\u501f\u9274\u6210\u719f\u884c\u4e1a\u8ba4\u8bc1\u7ecf\u9a8c\u63d0\u51fa\u53ef\u64cd\u4f5c\u7684\u5236\u5ea6\u6027\u89e3\u51b3\u8def\u5f84\uff0c\u5bf9AI\u76d1\u7ba1\u653f\u7b56\u4e0e\u884c\u4e1a\u6807\u51c6\u5236\u5b9a\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Masked diffusion language models (DLMs) enable parallel text generation by iteratively refining masked tokens, offering a promising alternative to autoregressive decoding. Recent lookahead-based decoding methods improve the accuracy--efficiency trade-off by exploring future decoding states before committing token updates. However, existing approaches mainly rely on shallow one-step lookahead, which optimizes immediate information gain but can be suboptimal for longer-horizon decoding trajectories. Meanwhile, we find that a naive extension for deeper lookahead is also ineffective, as fixed-depth rollout introduces additional computation and cannot adapt to heterogeneous intermediate decoding states. Thus, in this work, we propose AdaLook, an adaptive lookahead framework for DLM decoding. AdaLook dynamically determines whether to continue rollout based on candidate-score variance and further enables branch expansion when intermediate rollout states require additional exploration. This design avoids unnecessary deep rollout while allowing the decoder to re-trigger lookahead from informative intermediate states. Experiments on various benchmarks and models demonstrate that AdaLook achieves a better accuracy--decoding steps trade-off than existing one-step lookahead decoding methods.", "arxiv_id": "2607.15655", "arxiv_url": "https://arxiv.org/abs/2607.15655", "authors": ["Yingqian Cui", "Wei Deng", "Lantao Mei", "Hang Li", "Charu C. Aggarwal", "Hui Liu", "Yue Xing"], "brief": "\u63d0\u51faAdaLook\u6846\u67b6\uff0c\u901a\u8fc7\u52a8\u6001\u51b3\u5b9a\u662f\u5426\u7ee7\u7eed\u524d\u77bb\u5c55\u5f00\uff08\u57fa\u4e8e\u5019\u9009\u5206\u6570\u65b9\u5dee\uff09\u5e76\u652f\u6301\u5206\u652f\u6269\u5c55\uff0c\u89e3\u51b3\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\u89e3\u7801\u4e2d\u56fa\u5b9a\u6df1\u5ea6\u524d\u77bb\u7684\u5c40\u9650\u6027\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15655", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u73b0\u6709\u65b9\u6cd5\u4f9d\u8d56\u6d45\u5c42\u5355\u6b65\u524d\u77bb\uff0c\u5bf9\u957f\u7a0b\u89e3\u7801\u8f68\u8ff9\u6b21\u4f18\uff1b\u56fa\u5b9a\u6df1\u5ea6\u5c55\u5f00\u5f15\u5165\u989d\u5916\u8ba1\u7b97\u4e14\u65e0\u6cd5\u9002\u5e94\u5f02\u6784\u4e2d\u95f4\u72b6\u6001", "AdaLook\u5229\u7528\u5019\u9009\u5206\u6570\u65b9\u5dee\u81ea\u9002\u5e94\u5224\u65ad\u662f\u5426\u7ee7\u7eed\u5c55\u5f00\uff0c\u5e76\u5728\u4fe1\u606f\u91cf\u4e30\u5bcc\u7684\u4e2d\u95f4\u72b6\u6001\u89e6\u53d1\u5206\u652f\u6269\u5c55", "\u5728\u591a\u4e2a\u57fa\u51c6\u548c\u6a21\u578b\u4e0a\uff0cAdaLook\u76f8\u6bd4\u73b0\u6709\u5355\u6b65\u524d\u77bb\u65b9\u6cd5\u5b9e\u73b0\u4e86\u66f4\u4f18\u7684\u7cbe\u5ea6-\u89e3\u7801\u6b65\u6570\u6743\u8861"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u8bed\u8a00\u6a21\u578b", "\u89e3\u7801\u7b56\u7565", "\u6587\u672c\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15655v1", "published_at": "2026-07-17", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Adaptive Multi-Step Lookahead Decoding for Diffusion Language Models", "tldr": "AdaLook\uff1a\u81ea\u9002\u5e94\u591a\u6b65\u524d\u77bb\u89e3\u7801\u6846\u67b6\uff0c\u63d0\u5347\u6269\u6563\u8bed\u8a00\u6a21\u578b\u7684\u7cbe\u5ea6-\u6548\u7387\u6743\u8861", "upvotes": 0, "what_it_is": "\u63d0\u51faAdaLook\u6846\u67b6\uff0c\u901a\u8fc7\u52a8\u6001\u51b3\u5b9a\u662f\u5426\u7ee7\u7eed\u524d\u77bb\u5c55\u5f00\uff08\u57fa\u4e8e\u5019\u9009\u5206\u6570\u65b9\u5dee\uff09\u5e76\u652f\u6301\u5206\u652f\u6269\u5c55\uff0c\u89e3\u51b3\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\u89e3\u7801\u4e2d\u56fa\u5b9a\u6df1\u5ea6\u524d\u77bb\u7684\u5c40\u9650\u6027\u3002", "why_notable": "\u6269\u6563\u8bed\u8a00\u6a21\u578b\u662f\u81ea\u56de\u5f52\u751f\u6210\u7684\u91cd\u8981\u66ff\u4ee3\u65b9\u5411\uff0cAdaLook\u901a\u8fc7\u81ea\u9002\u5e94\u673a\u5236\u7a81\u7834\u4e86\u524d\u77bb\u89e3\u7801\u7684\u56fa\u5b9a\u6df1\u5ea6\u74f6\u9888\uff0c\u5728\u4e0d\u589e\u52a0\u5197\u4f59\u8ba1\u7b97\u7684\u524d\u63d0\u4e0b\u63d0\u5347\u89e3\u7801\u8d28\u91cf\uff0c\u5bf9\u52a0\u901fDLM\u5b9e\u7528\u5316\u5177\u6709\u5b9e\u9645\u4ef7\u503c\u3002"}, {"abstract": "Connected and Autonomous Vehicles (CAVs) rely on interconnected software and hardware components, including sensors, Electronic Control Units, in-vehicle infotainment systems, and telematics units, where vulnerabilities can compromise assets, users, and vehicle operations. These vulnerabilities are commonly documented as plain text in the Common Vulnerabilities and Exposures (CVE) database; however, security practitioners require structured information about affected assets, types of weaknesses, and attack behaviors to effectively mitigate the risks from these vulnerabilities. To this end, we evaluate open-weight Large Language Models (LLMs) for generating Structured Threat Information Expression (STIX), a well-known structured format for representing threat information, for CAV-related CVEs. We construct a dataset called CAV-STIXGen that maps CAV vulnerability descriptions to STIX domain objects (SDO), STIX relationship objects (SRO), Common Weakness Enumeration (CWE), and MITRE ATT\u0026CK techniques mappings. Using this dataset, we evaluated 11 open-weight LLMs (4B to 120B parameters) across various prompting strategies and temperatures. Single-model configurations achieve F1 scores of 0.94 for SDO, 0.63 for SRO, and 0.99 for CWE mapping, while complete MITRE ATT\u0026CK mapping remains challenging. In a multi-agent setup, Gemma-4-31B and Codestral-22B achieve F1 scores of 0.91 for SDOs and 0.43 for SROs, respectively. Lastly, we analyze CWE and MITRE ATT\u0026CK co-occurrences to identify recurring threat patterns in the CAV domain, demonstrating how AI-assisted vulnerability-to-STIX translation can automate threat intelligence and prioritize defense in transportation security.", "arxiv_id": "2607.16175", "arxiv_url": "https://arxiv.org/abs/2607.16175", "authors": ["Md Erfan", "Ahmed Ryan", "Md Kamal Hossain Chowdhury", "Md Rayhanur Rahman"], "brief": "\u6784\u5efa\u4e86CAV-STIXGen\u6570\u636e\u96c6\uff0c\u5c06\u81ea\u52a8\u9a7e\u9a76\u6c7d\u8f66CVE\u6f0f\u6d1e\u63cf\u8ff0\u6620\u5c04\u5230STIX\u7ed3\u6784\u5316\u5a01\u80c1\u60c5\u62a5\u683c\u5f0f\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f3011\u4e2a\u5f00\u6e90LLM\uff084B~120B\u53c2\u6570\uff09\u5728\u4e0d\u540c\u63d0\u793a\u7b56\u7565\u4e0b\u751f\u6210STIX\u5bf9\u8c61\u3001CWE\u53caMITRE ATT\u0026CK\u6620\u5c04\u7684\u80fd\u529b\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16175", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": ["\u5355\u6a21\u578b\u914d\u7f6e\u5728SDO\u3001CWE\u6620\u5c04\u4e0aF1\u5206\u522b\u8fbe0.94\u548c0.99\uff0c\u4f46SRO\u5173\u7cfb\u5bf9\u8c61\u4ec50.63\uff0cMITRE ATT\u0026CK\u5b8c\u6574\u6620\u5c04\u4ecd\u5177\u6311\u6218", "\u591a\u667a\u80fd\u4f53\u8bbe\u7f6e\u4e2dGemma-4-31B\u548cCodestral-22B\u5206\u522b\u5728SDO\uff08F1=0.91\uff09\u548cSRO\uff08F1=0.43\uff09\u4e0a\u8868\u73b0\u6700\u4f18", "\u901a\u8fc7CWE\u4e0eMITRE ATT\u0026CK\u5171\u73b0\u5206\u6790\uff0c\u8bc6\u522b\u51faCAV\u9886\u57df\u53cd\u590d\u51fa\u73b0\u7684\u5a01\u80c1\u6a21\u5f0f\uff0c\u8f85\u52a9\u9632\u5fa1\u4f18\u5148\u7ea7\u6392\u5e8f"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u7f51\u7edc\u5b89\u5168", "\u667a\u80fd\u4f53", "\u81ea\u52a8\u9a7e\u9a76"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16175v1", "published_at": "2026-07-17", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Evaluating Open-Weight LLMs for Generating Structured Threat Information for Autonomous Vehicle Vulnerabilities", "tldr": "\u8bc4\u4f30\u5f00\u6e90LLM\u4e3a\u81ea\u52a8\u9a7e\u9a76\u6c7d\u8f66\u6f0f\u6d1e\u81ea\u52a8\u751f\u6210\u7ed3\u6784\u5316\u5a01\u80c1\u60c5\u62a5STIX\u683c\u5f0f", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86CAV-STIXGen\u6570\u636e\u96c6\uff0c\u5c06\u81ea\u52a8\u9a7e\u9a76\u6c7d\u8f66CVE\u6f0f\u6d1e\u63cf\u8ff0\u6620\u5c04\u5230STIX\u7ed3\u6784\u5316\u5a01\u80c1\u60c5\u62a5\u683c\u5f0f\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f3011\u4e2a\u5f00\u6e90LLM\uff084B~120B\u53c2\u6570\uff09\u5728\u4e0d\u540c\u63d0\u793a\u7b56\u7565\u4e0b\u751f\u6210STIX\u5bf9\u8c61\u3001CWE\u53caMITRE ATT\u0026CK\u6620\u5c04\u7684\u80fd\u529b\u3002", "why_notable": "\u9996\u4e2a\u4e13\u6ce8\u4e8e\u81ea\u52a8\u9a7e\u9a76\u6c7d\u8f66\u6f0f\u6d1e\u7684STIX\u751f\u6210\u8bc4\u4f30\u57fa\u51c6\uff0c\u63a8\u52a8AI\u8f85\u52a9\u5a01\u80c1\u60c5\u62a5\u81ea\u52a8\u5316\uff0c\u5bf9\u4ea4\u901a\u5b89\u5168\u9886\u57df\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Multimodal sarcasm and cyberbullying detection remain challenging because the intended meaning often emerges from incongruity between textual and visual information rather than from either modality alone. Existing multimodal approaches primarily rely on feature fusion or cross-modal attention, which may not effectively capture hierarchical semantic inconsistencies across different levels of representation. To address this limitation, this paper proposes HCIG (Hierarchical Cross-modal Incongruity Graph Network), a novel framework that models cross-modal incongruity at token, phrase, and global levels using graph attention networks and adaptively integrates these representations through a learned hierarchical attention mechanism. As a complementary architecture, we also introduce GCCN (Graph-based Cross-modal Contradiction Network), which performs graph-based reasoning using contradiction-aware pooling for efficient multimodal interaction learning. The proposed models are evaluated on the MMSD sarcasm benchmark and the MultiBully cyberbullying dataset, together with comprehensive ablation studies and cross-task transfer experiments. Experimental results demonstrate that HCIG achieves the best performance on MMSD with 85.74% accuracy and 85.29% macro-F1, while GCCN attains the highest macro-F1 (68.66%) on MultiBully and HCIG achieves the highest accuracy (69.62%) and bullying-class F1 (74.90%). The findings demonstrate that hierarchical multi-granularity incongruity modeling provides more effective multimodal reasoning than conventional fusion strategies, offering a robust framework for sarcasm and cyberbullying detection in social media.", "arxiv_id": "2607.16076", "arxiv_url": "https://arxiv.org/abs/2607.16076", "authors": ["Bhavana Verma", "Priyanka Meel", "Dinesh Kumar Vishwakarma"], "brief": "\u63d0\u51faHCIG\u6846\u67b6\uff0c\u901a\u8fc7\u56fe\u6ce8\u610f\u529b\u7f51\u7edc\u5728\u8bcd\u5143\u3001\u77ed\u8bed\u548c\u5168\u5c40\u4e09\u4e2a\u5c42\u6b21\u5efa\u6a21\u6587\u672c\u4e0e\u89c6\u89c9\u7684\u8de8\u6a21\u6001\u4e0d\u4e00\u81f4\u6027\uff0c\u5e76\u5f15\u5165\u4e92\u8865\u67b6\u6784GCCN\u8fdb\u884c\u57fa\u4e8e\u77db\u76fe\u611f\u77e5\u6c60\u5316\u7684\u56fe\u63a8\u7406\uff0c\u7528\u4e8e\u793e\u4ea4\u5a92\u4f53\u8bbd\u523a\u4e0e\u7f51\u7edc\u6b3a\u51cc\u68c0\u6d4b\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16076", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["HCIG\u5728MMSD\u8bbd\u523a\u57fa\u51c6\u4e0a\u8fbe\u523085.74%\u51c6\u786e\u7387\u548c85.29% macro-F1\uff0c\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5", "GCCN\u5728MultiBully\u6570\u636e\u96c6\u4e0a\u83b7\u5f97\u6700\u9ad8macro-F1\uff0868.66%\uff09\uff0cHCIG\u83b7\u5f97\u6700\u9ad8\u51c6\u786e\u7387\uff0869.62%\uff09\u548c\u6b3a\u51cc\u7c7bF1\uff0874.90%\uff09", "\u5c42\u6b21\u5316\u591a\u7c92\u5ea6\u4e0d\u4e00\u81f4\u5efa\u6a21\uff08\u8bcd\u5143/\u77ed\u8bed/\u5168\u5c40\u4e09\u7ea7\uff09\u6bd4\u4f20\u7edf\u7279\u5f81\u878d\u5408\u548c\u8de8\u6a21\u6001\u6ce8\u610f\u529b\u66f4\u6709\u6548"], "keywords": ["\u591a\u6a21\u6001", "\u56fe\u795e\u7ecf\u7f51\u7edc", "\u60c5\u611f\u5206\u6790", "\u5185\u5bb9\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16076v1", "published_at": "2026-07-17", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "HCIG: A Hierarchical Cross-Modal Incongruity Graph Network for Multimodal Sarcasm and Cyberbullying Detection", "tldr": "\u63d0\u51fa\u5c42\u6b21\u5316\u8de8\u6a21\u6001\u4e0d\u4e00\u81f4\u56fe\u7f51\u7edc\uff0c\u7528\u4e8e\u591a\u6a21\u6001\u8bbd\u523a\u4e0e\u7f51\u7edc\u6b3a\u51cc\u68c0\u6d4b", "upvotes": 0, "what_it_is": "\u63d0\u51faHCIG\u6846\u67b6\uff0c\u901a\u8fc7\u56fe\u6ce8\u610f\u529b\u7f51\u7edc\u5728\u8bcd\u5143\u3001\u77ed\u8bed\u548c\u5168\u5c40\u4e09\u4e2a\u5c42\u6b21\u5efa\u6a21\u6587\u672c\u4e0e\u89c6\u89c9\u7684\u8de8\u6a21\u6001\u4e0d\u4e00\u81f4\u6027\uff0c\u5e76\u5f15\u5165\u4e92\u8865\u67b6\u6784GCCN\u8fdb\u884c\u57fa\u4e8e\u77db\u76fe\u611f\u77e5\u6c60\u5316\u7684\u56fe\u63a8\u7406\uff0c\u7528\u4e8e\u793e\u4ea4\u5a92\u4f53\u8bbd\u523a\u4e0e\u7f51\u7edc\u6b3a\u51cc\u68c0\u6d4b\u3002", "why_notable": "\u9996\u6b21\u5c06\u8de8\u6a21\u6001\u4e0d\u4e00\u81f4\u6027\u5efa\u6a21\u5206\u89e3\u4e3a\u591a\u7c92\u5ea6\u5c42\u6b21\u7ed3\u6784\uff0c\u5e76\u901a\u8fc7\u56fe\u6ce8\u610f\u529b\u7f51\u7edc\u7edf\u4e00\u5904\u7406\u8bbd\u523a\u4e0e\u7f51\u7edc\u6b3a\u51cc\u4e24\u7c7b\u4efb\u52a1\uff0c\u8de8\u4efb\u52a1\u8fc1\u79fb\u5b9e\u9a8c\u9a8c\u8bc1\u4e86\u6846\u67b6\u7684\u901a\u7528\u6027\u4e0e\u9c81\u68d2\u6027\u3002"}, {"abstract": "The post-training of Vision-Language-Action (VLA) models is essential due to the diversity of simulators, robot embodiments, and task objectives. Existing compute services, whether offered as direct accelerator rental or batch-workload submission, typically allocate an exclusive set of GPU and CPU resources to a single tenant. While this paradigm maximizes client flexibility, it burdens users with infrastructure adaptation, and the fixed card-hour accounting model renders short or bursty workloads both expensive for tenants and inefficient for the service provider. To address these challenges, we present JoyNexus, a unified service for multi-tenant VLA supervised fine-tuning, reinforcement learning, and evaluation. JoyNexus decouples the Training Model Service, Inference Model Service, and Environment Service, each accessed through APIs and backed by resident shared base models with tenant-specific slots. Tenants can directly invoke high-level semantic APIs for training, rollout, and evaluation, or compose custom algorithms using lower-level APIs and their assigned endpoints. Multiple tenants submit workloads concurrently; their action modules, optimizers, rollout records, and policy versions remain isolated, and the service is scheduled by the global Training Queue and Inference Queue. To further improve multi-tenant training efficiency, JoyNexus introduces group batching for heterogeneous VLA data schemas that share a compatible model-facing prefix, enabling a single shared backbone forward pass over grouped samples. Finally, we evaluate JoyNexus through workload simulation and a group-batching pipeline in a realistic embodied scenario. Results show that, compared with isolated single-tenant execution, JoyNexus reduces aggregate GPU time and improves service utilization via cross-tenant scheduling on shared resources.", "arxiv_id": "2607.16074", "arxiv_url": "https://arxiv.org/abs/2607.16074", "authors": ["Haoran Sun", "Wentao Zhang", "Junyang Hua", "Hedan Yang", "Yongjian Guo", "Yifei Zhang", "Xiaolong Xiang", "Mingxi Luo", "Jing Long", "Chen Zhao", "Chen Zhou", "Wanting Xu", "Qiming Yang", "Hui Zhang", "Song Wang", "Xiaodong Bai", "Shuai Di", "Xu Chu", "Xiaotie Deng", "Yicheng Gong", "Junwu Xiong"], "brief": "\u63d0\u51faJoyNexus\uff0c\u4e00\u4e2a\u5c06VLA\u6a21\u578b\u7684\u76d1\u7763\u5fae\u8c03\u3001\u5f3a\u5316\u5b66\u4e60\u548c\u8bc4\u4f30\u7edf\u4e00\u4e3a\u591a\u79df\u6237\u670d\u52a1\u7684\u7cfb\u7edf\uff0c\u901a\u8fc7\u89e3\u8026\u8bad\u7ec3\u3001\u63a8\u7406\u548c\u73af\u5883\u670d\u52a1\uff0c\u652f\u6301\u591a\u79df\u6237\u5e76\u53d1\u63d0\u4ea4\u5de5\u4f5c\u8d1f\u8f7d\u5e76\u5171\u4eab\u57fa\u7840\u6a21\u578b\u8d44\u6e90\u3002", "categories": ["cs.DC", "cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16074", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": ["\u5c06\u8bad\u7ec3\u6a21\u578b\u670d\u52a1\u3001\u63a8\u7406\u6a21\u578b\u670d\u52a1\u548c\u73af\u5883\u670d\u52a1\u89e3\u8026\uff0c\u5404\u81ea\u901a\u8fc7API\u8bbf\u95ee\uff0c\u79df\u6237\u5171\u4eab\u57fa\u7840\u6a21\u578b\u4f46\u4fdd\u6301\u5404\u81ea\u7684\u52a8\u4f5c\u6a21\u5757\u3001\u4f18\u5316\u5668\u548c\u7b56\u7565\u7248\u672c\u9694\u79bb", "\u5f15\u5165Group Batching\u6280\u672f\uff0c\u5bf9\u5171\u4eab\u517c\u5bb9\u524d\u7f00\u7684\u5f02\u6784VLA\u6570\u636e\u6a21\u5f0f\u8fdb\u884c\u5206\u7ec4\uff0c\u5b9e\u73b0\u5355\u6b21\u5171\u4eab\u9aa8\u5e72\u7f51\u7edc\u524d\u5411\u4f20\u64ad\u5904\u7406\u591a\u79df\u6237\u6837\u672c", "\u901a\u8fc7\u5168\u5c40\u8bad\u7ec3\u961f\u5217\u548c\u63a8\u7406\u961f\u5217\u8c03\u5ea6\uff0c\u76f8\u6bd4\u5355\u79df\u6237\u72ec\u5360\u6267\u884c\u663e\u8457\u964d\u4f4e\u805a\u5408GPU\u65f6\u95f4\u5e76\u63d0\u5347\u670d\u52a1\u5229\u7528\u7387"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u591a\u79df\u6237\u7cfb\u7edf", "VLA\u6a21\u578b", "\u5206\u5e03\u5f0f\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16074v1", "published_at": "2026-07-17", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "JoyNexus: Service-Oriented Multi-Tenant Post-Training for VLA Models", "tldr": "JoyNexus\uff1a\u9762\u5411\u591a\u79df\u6237VLA\u6a21\u578b\u540e\u8bad\u7ec3\u7684\u670d\u52a1\u5316\u7edf\u4e00\u5e73\u53f0", "upvotes": 0, "what_it_is": "\u63d0\u51faJoyNexus\uff0c\u4e00\u4e2a\u5c06VLA\u6a21\u578b\u7684\u76d1\u7763\u5fae\u8c03\u3001\u5f3a\u5316\u5b66\u4e60\u548c\u8bc4\u4f30\u7edf\u4e00\u4e3a\u591a\u79df\u6237\u670d\u52a1\u7684\u7cfb\u7edf\uff0c\u901a\u8fc7\u89e3\u8026\u8bad\u7ec3\u3001\u63a8\u7406\u548c\u73af\u5883\u670d\u52a1\uff0c\u652f\u6301\u591a\u79df\u6237\u5e76\u53d1\u63d0\u4ea4\u5de5\u4f5c\u8d1f\u8f7d\u5e76\u5171\u4eab\u57fa\u7840\u6a21\u578b\u8d44\u6e90\u3002", "why_notable": "\u89e3\u51b3\u4e86\u5f53\u524dGPU\u79df\u7528\u6a21\u5f0f\u4e0bVLA\u540e\u8bad\u7ec3\u8d44\u6e90\u6d6a\u8d39\u548c\u57fa\u7840\u8bbe\u65bd\u9002\u914d\u8d1f\u62c5\u95ee\u9898\uff0c\u4e3a\u673a\u5668\u4eba\u5177\u8eab\u667a\u80fd\u7684\u89c4\u6a21\u5316\u8bad\u7ec3\u670d\u52a1\u63d0\u4f9b\u4e86\u5b9e\u7528\u7684\u5de5\u7a0b\u8303\u5f0f\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u4ea7\u4e1a\u843d\u5730\u4ef7\u503c\u3002"}, {"abstract": "Retinal layer segmentation in Optical Coherence Tomography (OCT) is a fundamental step for extracting quantitative biomarkers of retinal structure. Indeed, there is a growing interest in the analysis of OCTs in the context of neurodegenerative diseases. However, segmentation remains challenging due to speckle noise, shadowing artifacts, low contrast between adjacent layers, anatomical variability across subjects, and domain shifts arising from different acquisition protocols and clinical populations. While deep learning methods have achieved remarkable performance, their robustness and generalization across heterogeneous datasets remain limited. In this work, we investigate the role of spatial normalization as a preprocessing strategy to mitigate geometric domain shifts and improve the consistency of retinal layer segmentation. Inspired by standard practices in neuroimaging, we introduce a fovea-centered normalization framework that aligns OCT volumes into a common anatomical reference. We perform a comprehensive evaluation of state-of-the-art deep learning architectures. To provide a comprehensive assessment of segmentation quality, we combine conventional overlap-based metrics at B-scan level with topology-aware metrics at A-scan level and thickness-based measures at the en-face level. In cases where a ground truth is not available, we propose topology violation quantitative metrics that do not require ground truth annotations and a thickness-based qualitative assessment that captures structural consistency and clinically relevant patterns at the en-face level. The results demonstrate the importance of spatial normalization in OCT segmentation pipelines toward the development of robust and clinically meaningful retinal analysis tools, enabling reliable biomarker extraction and downstream computational analysis in neurodegenerative research.", "arxiv_id": "2607.16065", "arxiv_url": "https://arxiv.org/abs/2607.16065", "authors": ["Iker Moran-Cavero", "Monica Hernandez", "Elvira Mayordomo", "Naiara Artiaga", "Beatriz Pardi\u00f1as", "Beatriz Cordon", "Elena Garcia-Martin"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u53d7\u795e\u7ecf\u5f71\u50cf\u5b66\u542f\u53d1\u7684\u7a7a\u95f4\u5f52\u4e00\u5316\u9884\u5904\u7406\u6846\u67b6\uff0c\u5c06OCT\u4f53\u79ef\u5bf9\u9f50\u5230\u7edf\u4e00\u89e3\u5256\u53c2\u8003\u5750\u6807\u7cfb\uff0c\u4ee5\u7f13\u89e3\u8de8\u6570\u636e\u96c6\u7684\u51e0\u4f55\u57df\u504f\u79fb\u95ee\u9898\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f30\u5176\u5bf9\u89c6\u7f51\u819c\u5c42\u5206\u5272\u6027\u80fd\u7684\u5f71\u54cd\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16065", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u4ee5\u4e2d\u592e\u51f9\u4e3a\u4e2d\u5fc3\u7684\u5f52\u4e00\u5316\u6846\u67b6\uff0c\u5c06OCT\u4f53\u79ef\u5bf9\u9f50\u81f3\u516c\u5171\u89e3\u5256\u53c2\u8003\uff0c\u51cf\u5c11\u51e0\u4f55\u57df\u504f\u79fb", "\u63d0\u51fa\u65e0\u9700\u6807\u6ce8\u7684\u62d3\u6251\u8fdd\u89c4\u5b9a\u91cf\u6307\u6807\u4e0e\u539a\u5ea6\u56fe\u5b9a\u6027\u8bc4\u4f30\u65b9\u6cd5\uff0c\u9002\u7528\u4e8e\u65e0\u771f\u503c\u573a\u666f", "\u7efc\u5408B-scan\u91cd\u53e0\u6307\u6807\u3001A-scan\u62d3\u6251\u611f\u77e5\u6307\u6807\u548cen-face\u539a\u5ea6\u6307\u6807\u8fdb\u884c\u591a\u7ef4\u5ea6\u5206\u5272\u8d28\u91cf\u8bc4\u4f30"], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5206\u5272", "\u57df\u6cdb\u5316", "\u591a\u6a21\u6001", "\u6df1\u5ea6\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16065v1", "published_at": "2026-07-17", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Spatial Normalization for Cross-Domain Retinal Layer Segmentation in Optical Coherence Tomography", "tldr": "\u63d0\u51fa\u4ee5\u4e2d\u592e\u51f9\u4e3a\u4e2d\u5fc3\u7684\u7a7a\u95f4\u5f52\u4e00\u5316\u6846\u67b6\uff0c\u63d0\u5347OCT\u89c6\u7f51\u819c\u5c42\u8de8\u57df\u5206\u5272\u7684\u9c81\u68d2\u6027", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u53d7\u795e\u7ecf\u5f71\u50cf\u5b66\u542f\u53d1\u7684\u7a7a\u95f4\u5f52\u4e00\u5316\u9884\u5904\u7406\u6846\u67b6\uff0c\u5c06OCT\u4f53\u79ef\u5bf9\u9f50\u5230\u7edf\u4e00\u89e3\u5256\u53c2\u8003\u5750\u6807\u7cfb\uff0c\u4ee5\u7f13\u89e3\u8de8\u6570\u636e\u96c6\u7684\u51e0\u4f55\u57df\u504f\u79fb\u95ee\u9898\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f30\u5176\u5bf9\u89c6\u7f51\u819c\u5c42\u5206\u5272\u6027\u80fd\u7684\u5f71\u54cd\u3002", "why_notable": "\u5c06\u795e\u7ecf\u5f71\u50cf\u7a7a\u95f4\u5f52\u4e00\u5316\u601d\u8def\u8fc1\u79fb\u81f3\u773c\u79d1OCT\u5206\u6790\uff0c\u7cfb\u7edf\u9a8c\u8bc1\u4e86\u9884\u5904\u7406\u5bf9\u8de8\u57df\u6cdb\u5316\u7684\u5173\u952e\u4f5c\u7528\uff0c\u5e76\u63d0\u51fa\u65e0\u9700\u6807\u6ce8\u7684\u8bc4\u4f30\u6307\u6807\uff0c\u5bf9\u795e\u7ecf\u9000\u884c\u6027\u75be\u75c5\u751f\u7269\u6807\u5fd7\u7269\u63d0\u53d6\u5177\u6709\u5b9e\u9645\u4e34\u5e8a\u4ef7\u503c\u3002"}, {"abstract": "Quantum continual learning aims to train quantum models on sequential tasks without losing previously learned knowledge. However, variational quantum classifiers (VQCs) are prone to catastrophic forgetting under nonstationary task distributions. We propose quantum elastic weight consolidation (QEWC), a quantum Fisher information (QFI)-informed regularization method for mitigating forgetting. Unlike conventional elastic weight consolidation based on classical Fisher information (CFI), which measures parameter importance through measurement-dependent output statistics, QEWC uses QFI to quantify the intrinsic sensitivity of the parameterized quantum state. This gives an information-geometric view in which important parameters are identified by the local response of the quantum state manifold. We evaluate QEWC on VQCs trained on sequential binary classification tasks, including classical image-classification and quantum phase-classification tasks. Simulations show that sequential training without regularization causes severe forgetting, while both CFI-based EWC and QFI-based QEWC improve retention of previous tasks. Mechanistic analyses further show that the two methods impose different regularization geometries: CFI acts selectively on measurement-sensitive directions, whereas QFI imposes a denser state-geometric constraint over parameter space. Under depolarizing noise, CFI values are strongly suppressed by degraded measurement statistics, while QFI preserves a more stable sensitivity structure of the noisy parameterized quantum state. These results establish QEWC as a physically motivated approach for studying and mitigating forgetting in quantum continual learning through quantum-state geometry.", "arxiv_id": "2607.16030", "arxiv_url": "https://arxiv.org/abs/2607.16030", "authors": ["Yu-Chao Hsu", "Yu-Cheng Lin", "Tai-Yue Li", "Nan-Yow Chen", "En-Jui Kuo"], "brief": "\u672c\u6587\u63d0\u51fa\u91cf\u5b50\u5f39\u6027\u6743\u91cd\u5de9\u56fa\uff08QEWC\uff09\u65b9\u6cd5\uff0c\u5229\u7528\u91cf\u5b50Fisher\u4fe1\u606f\uff08QFI\uff09\u91cf\u5316\u53c2\u6570\u5316\u91cf\u5b50\u6001\u7684\u5185\u5728\u654f\u611f\u6027\uff0c\u4e3a\u53d8\u5206\u91cf\u5b50\u5206\u7c7b\u5668\uff08VQC\uff09\u5728\u5e8f\u5217\u4efb\u52a1\u5b66\u4e60\u4e2d\u63d0\u4f9b\u4fe1\u606f\u51e0\u4f55\u89c6\u89d2\u7684\u6b63\u5219\u5316\uff0c\u4ece\u800c\u7f13\u89e3\u707e\u96be\u6027\u9057\u5fd8\u3002", "categories": ["quant-ph", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingf
