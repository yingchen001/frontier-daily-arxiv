ace.co/papers/2607.16030", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["QEWC\u7528QFI\u66ff\u4ee3\u7ecf\u5178Fisher\u4fe1\u606f\uff08CFI\uff09\uff0c\u76f4\u63a5\u5ea6\u91cf\u91cf\u5b50\u6001\u6d41\u5f62\u5bf9\u53c2\u6570\u7684\u5c40\u90e8\u54cd\u5e94\uff0c\u800c\u975e\u4f9d\u8d56\u6d4b\u91cf\u7edf\u8ba1", "\u5728\u56fe\u50cf\u5206\u7c7b\u548c\u91cf\u5b50\u76f8\u5206\u7c7b\u5e8f\u5217\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff1a\u65e0\u6b63\u5219\u5316\u65f6\u9057\u5fd8\u4e25\u91cd\uff0cQEWC\u548cEWC\u5747\u80fd\u63d0\u5347\u65e7\u4efb\u52a1\u4fdd\u7559\u7387", "\u5728\u53bb\u6781\u5316\u566a\u58f0\u4e0b\uff0cCFI\u56e0\u6d4b\u91cf\u7edf\u8ba1\u9000\u5316\u800c\u88ab\u5f3a\u70c8\u6291\u5236\uff0c\u800cQFI\u5bf9\u566a\u58f0\u53c2\u6570\u5316\u91cf\u5b50\u6001\u4fdd\u6301\u66f4\u7a33\u5b9a\u7684\u654f\u611f\u6027\u7ed3\u6784"], "keywords": ["\u91cf\u5b50\u673a\u5668\u5b66\u4e60", "\u6301\u7eed\u5b66\u4e60", "\u5f3a\u5316\u5b66\u4e60", "\u53d8\u5206\u91cf\u5b50\u7b97\u6cd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16030v1", "published_at": "2026-07-17", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Rethinking Quantum Continual Learning with Quantum Fisher Information", "tldr": "\u63d0\u51fa\u57fa\u4e8e\u91cf\u5b50Fisher\u4fe1\u606f\u7684\u6b63\u5219\u5316\u65b9\u6cd5QEWC\uff0c\u7f13\u89e3\u91cf\u5b50\u6a21\u578b\u6301\u7eed\u5b66\u4e60\u4e2d\u7684\u707e\u96be\u6027\u9057\u5fd8", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u91cf\u5b50\u5f39\u6027\u6743\u91cd\u5de9\u56fa\uff08QEWC\uff09\u65b9\u6cd5\uff0c\u5229\u7528\u91cf\u5b50Fisher\u4fe1\u606f\uff08QFI\uff09\u91cf\u5316\u53c2\u6570\u5316\u91cf\u5b50\u6001\u7684\u5185\u5728\u654f\u611f\u6027\uff0c\u4e3a\u53d8\u5206\u91cf\u5b50\u5206\u7c7b\u5668\uff08VQC\uff09\u5728\u5e8f\u5217\u4efb\u52a1\u5b66\u4e60\u4e2d\u63d0\u4f9b\u4fe1\u606f\u51e0\u4f55\u89c6\u89d2\u7684\u6b63\u5219\u5316\uff0c\u4ece\u800c\u7f13\u89e3\u707e\u96be do Salas", "Paolo Pareti", "Adeel Aslam", "Christopher Maidens", "George Konstantinidis"], "brief": "\u672c\u6587\u57fa\u4e8e\u73b0\u6709ODRL\u8bed\u4e49\u6a21\u578b\uff0c\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e86\u8bbf\u95ee\u63a7\u5236\u4e0e\u76d1\u63a7\u573a\u666f\u4e0b\u7684ODRL\u7b56\u7565\u8bc4\u4f30\u95ee\u9898\uff0c\u5e76\u63d0\u51fa\u4e86\u4e00\u79cd\u65b0\u9896\u9ad8\u6548\u7684\u7b97\u6cd5\u4e0e\u5b9e\u73b0\uff0c\u6784\u5efa\u4e86\u9996\u4e2a\u5177\u6709\u900f\u660e\u5f62\u5f0f\u8bed\u4e49\u4e14\u652f\u6301\u5168\u90e8\u89c4\u5219\u7c7b\u578b\u7684ODRL\u8bc4\u4f30\u5668\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15987", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5f53\u524dODRL\u6807\u51c6\u7f3a\u4e4f\u6570\u5b66\u5f62\u5f0f\u8bed\u4e49\uff0c\u5bfc\u81f4\u5404\u7cfb\u7edf\u5b9e\u73b0\u4e0d\u4e00\u81f4\u3001\u4e92\u64cd\u4f5c\u6027\u5dee", "\u540c\u65f6\u652f\u6301\u9759\u6001\u4e0e\u6d41\u5f0f\u4e24\u79cd\u8bbe\u7f6e\u4e0b\u7684\u8bbf\u95ee\u63a7\u5236\u548c\u76d1\u63a7\u8bc4\u4f30\u573a\u666f", "\u901a\u8fc7\u4e0e\u73b0\u6709ODRL\u8bc4\u4f30\u5668\u7684\u5bf9\u6bd4\u5b9e\u9a8c\uff0c\u5206\u6790\u4e86\u7b56\u7565\u590d\u6742\u5ea6\u548c\u6570\u636e\u89c4\u6a21\u7b49\u591a\u7ef4\u5ea6\u53ef\u6269\u5c55\u6027"], "keywords": ["AI\u6cbb\u7406", "\u7b56\u7565\u8bed\u8a00", "\u5f62\u5f0f\u5316\u65b9\u6cd5", "\u6570\u636e\u8bbf\u95ee\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15987v1", "published_at": "2026-07-17", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "A Formally Grounded ODRL Evaluator: Implementation and Comparison", "tldr": "\u9996\u4e2a\u5177\u6709\u900f\u660e\u5f62\u5f0f\u8bed\u4e49\u7684ODRL\u7b56\u7565\u8bc4\u4f30\u5668\uff0c\u652f\u6301\u6240\u6709\u89c4\u5219\u7c7b\u578b\u5e76\u63d0\u4f9b\u9ad8\u6548\u7b97\u6cd5", "upvotes": 0, "what_it_is": "\u672c\u6587\u57fa\u4e8e\u73b0\u6709ODRL\u8bed\u4e49\u6a21\u578b\uff0c\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e86\u8bbf\u95ee\u63a7\u5236\u4e0e\u76d1\u63a7\u573a\u666f\u4e0b\u7684ODRL\u7b56\u7565\u8bc4\u4f30\u95ee\u9898\uff0c\u5e76\u63d0\u51fa\u4e86\u4e00\u79cd\u65b0\u9896\u9ad8\u6548\u7684\u7b97\u6cd5\u4e0e\u5b9e\u73b0\uff0c\u6784\u5efa\u4e86\u9996\u4e2a\u5177\u6709\u900f\u660e\u5f62\u5f0f\u8bed\u4e49\u4e14\u652f\u6301\u5168\u90e8\u89c4\u5219\u7c7b\u578b\u7684ODRL\u8bc4\u4f30\u5668\u3002", "why_notable": "ODRL\u6b63\u6210\u4e3a\u6b27\u6d32\u6570\u636e\u7a7a\u95f4\u4e2dAI\u6cbb\u7406\u4e0e\u6570\u636e\u5de5\u4f5c\u6d41\u7684\u4e8b\u5b9e\u6807\u51c6\uff0c\u672c\u6587\u9996\u6b21\u4e3a\u5176\u63d0\u4f9b\u5f62\u5f0f\u5316\u8bed\u4e49\u57fa\u7840\uff0c\u6709\u52a9\u4e8e\u89e3\u51b3\u4e92\u64cd\u4f5c\u6027\u95ee\u9898\uff0c\u5bf9\u6570\u636e\u4e3b\u6743\u548cAI\u5408\u89c4\u9886\u57df\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Standard automation ROI misses four categories of systemic risk -- tacit knowledge erosion, resilience reduction, regulatory exposure, and socio-institutional capital degradation -- that affect long-term organizational performance. PHP-AIO (Protocol for Human Preservation in AI-Optimized Organizations) is a five-gate sequential decision protocol with a final composite check that quantifies these unpriced systemic risks at the role level and produces auditable automation decisions. A closed-form automation-debt measure ($\u03c1(P)$) formalises how role-level decisions accumulate across multi-step processes; its warning is neutralised only by a regulator-mandated human-in-the-loop anchor. Applied to stylised profiles of representative internal roles, PHP-AIO produces distinct outcomes -- automate, augment, hybrid, and preserve -- for candidates that standard cost-benefit analysis would uniformly automate. Threshold sensitivity analysis confirms the gate decisions are robust to upward perturbations of at least 14% in three of four representative cases. Keywords: AI governance, automation decision, human oversight, tacit knowledge, organizational resilience, financial services", "arxiv_id": "2607.15944", "arxiv_url": "https://arxiv.org/abs/2607.15944", "authors": ["Jose Manuel de la Chica Rodriguez", "Jairo Rodriguez Arias", "Spyridon Chouliaras"], "brief": "\u8bba\u6587\u63d0\u51faPHP-AIO\uff08AI\u4f18\u5316\u7ec4\u7ec7\u4e2d\u7684\u4eba\u7c7b\u4fdd\u7559\u534f\u8bae\uff09\uff0c\u4e00\u4e2a\u4e94\u5173\u5361\u5e8f\u5217\u51b3\u7b56\u6846\u67b6\uff0c\u901a\u8fc7\u91cf\u5316\u9690\u6027\u77e5\u8bc6\u4fb5\u8680\u3001\u97e7\u6027\u964d\u4f4e\u3001\u76d1\u7ba1\u98ce\u9669\u548c\u793e\u4f1a\u5236\u5ea6\u8d44\u672c\u9000\u5316\u56db\u7c7b\u7cfb\u7edf\u6027\u98ce\u9669\uff0c\u5728\u5c97\u4f4d\u5c42\u9762\u751f\u6210\u53ef\u5ba1\u8ba1\u7684\u81ea\u52a8\u5316\u51b3\u7b56\u3002", "categories": ["cs.MA", "cs.AI", "cs.CY", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15944", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5b9a\u4e49\u95ed\u5408\u5f62\u5f0f\u7684\u0027\u81ea\u52a8\u5316\u503a\u52a1\u0027\u6307\u6807\u03c1(P)\uff0c\u8ffd\u8e2a\u5c97\u4f4d\u7ea7\u51b3\u7b56\u5728\u591a\u6b65\u6d41\u7a0b\u4e2d\u7684\u7d2f\u79ef\u6548\u5e94\uff0c\u4ec5\u53ef\u901a\u8fc7\u76d1\u7ba1\u5f3a\u5236\u7684\u4eba\u5728\u73af\u951a\u70b9\u62b5\u6d88", "\u5bf9\u5178\u578b\u5185\u90e8\u5c97\u4f4d\u5e94\u7528\u8be5\u534f\u8bae\uff0c\u4ea7\u751f\u81ea\u52a8\u5316\u3001\u589e\u5f3a\u3001\u6df7\u5408\u3001\u4fdd\u7559\u56db\u79cd\u5dee\u5f02\u5316\u7ed3\u679c\uff0c\u800c\u4f20\u7edf\u6210\u672c\u6536\u76ca\u5206\u6790\u4f1a\u4e00\u5f8b\u5efa\u8bae\u81ea\u52a8\u5316", "\u9608\u503c\u654f\u611f\u6027\u5206\u6790\u663e\u793a\uff0c\u56db\u4e2a\u4ee3\u8868\u6027\u6848\u4f8b\u4e2d\u4e09\u4e2a\u5bf9\u81f3\u5c1114%\u7684\u4e0a\u884c\u6270\u52a8\u4fdd\u6301\u7a33\u5065"], "keywords": ["AI\u6cbb\u7406", "\u667a\u80fd\u4f53", "\u4eba\u673a\u534f\u4f5c", "\u7ec4\u7ec7\u7ba1\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15944v1", "published_at": "2026-07-17", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "When Not to Automate: A Formal Protocol for Human Preservation in AI-Optimized Organizations", "tldr": "\u63d0\u51faPHP-AIO\u534f\u8bae\uff0c\u91cf\u5316\u81ea\u52a8\u5316\u51b3\u7b56\u4e2d\u88ab\u5ffd\u89c6\u7684\u7cfb\u7edf\u6027\u98ce\u9669\uff0c\u5224\u65ad\u4f55\u65f6\u4e0d\u5e94\u81ea\u52a8\u5316", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51faPHP-AIO\uff08AI\u4f18\u5316\u7ec4\u7ec7\u4e2d\u7684\u4eba\u7c7b\u4fdd\u7559\u534f\u8bae\uff09\uff0c\u4e00\u4e2a\u4e94\u5173\u5361\u5e8f\u5217\u51b3\u7b56\u6846\u67b6\uff0c\u901a\u8fc7\u91cf\u5316\u9690\u6027\u77e5\u8bc6\u4fb5\u8680\u3001\u97e7\u6027\u964d\u4f4e\u3001\u76d1\u7ba1\u98ce\u9669\u548c\u793e\u4f1a\u5236\u5ea6\u8d44\u672c\u9000\u5316\u56db\u7c7b\u7cfb\u7edf\u6027\u98ce\u9669\uff0c\u5728\u5c97\u4f4d\u5c42\u9762\u751f\u6210\u53ef\u5ba1\u8ba1\u7684\u81ea\u52a8\u5316\u51b3\u7b56\u3002", "why_notable": "\u586b\u8865\u4e86\u6807\u51c6\u81ea\u52a8\u5316ROI\u5206\u6790\u5ffd\u89c6\u957f\u671f\u7cfb\u7edf\u6027\u98ce\u9669\u7684\u7a7a\u767d\uff0c\u4e3aAI\u6cbb\u7406\u63d0\u4f9b\u53ef\u64cd\u4f5c\u7684\u5f62\u5f0f\u5316\u534f\u8bae\uff0c\u5bf9\u91d1\u878d\u670d\u52a1\u7b49\u5f3a\u76d1\u7ba1\u884c\u4e1a\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Dialogue state tracking (DST) is one of the core components in task-oriented dialogue systems. At each turn in a conversation, DST estimates the user belief or dialogue state, which is used as input for downstream modules to predict system actions and generate responses. The increasingly popular dialogue system applications like Google Assistant, Siri and Alexa need to support a large number of services and APIs, resulting in growing attention to the scalability of such systems. Especially for some domains with little or no training data, the capability of transferring existing knowledge of other domains is highly desired. In this paper, we present a novel scalable framework for multi-domain dialogue state tracking. The proposed system leverages the pretrained BERT model to achieve zero-shot generalization, making it easy to quickly adapt to new domains without additional training. The performance of our model is evaluated on recently released schema-based dialogue (SGD) dataset, showing significant improvement compared to previous baseline.", "arxiv_id": "2607.16021", "arxiv_url": "https://arxiv.org/abs/2607.16021", "authors": ["Junyuan Zheng", "Onkar Salvi", "John Chan"], "brief": "\u63d0\u51fa\u4e00\u79cd\u5229\u7528\u9884\u8bad\u7ec3BERT\u6a21\u578b\u7684\u53ef\u6269\u5c55\u591a\u57df\u5bf9\u8bdd\u72b6\u6001\u8ddf\u8e2a\u6846\u67b6\uff0c\u901a\u8fc7\u5019\u9009\u611f\u77e5\u673a\u5236\u5b9e\u73b0\u96f6\u6837\u672c\u6cdb\u5316\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u5feb\u901f\u9002\u914d\u65b0\u9886\u57df\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16021", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": ["\u5229\u7528\u9884\u8bad\u7ec3BERT\u5b9e\u73b0\u96f6\u6837\u672c\uff08zero-shot\uff09\u8de8\u57df\u6cdb\u5316\u80fd\u529b", "\u5728SGD\uff08Schema-Guided Dialogue\uff09\u6570\u636e\u96c6\u4e0a\u8bc4\u4f30\uff0c\u76f8\u6bd4\u57fa\u7ebf\u6a21\u578b\u6709\u663e\u8457\u63d0\u5347", "\u6846\u67b6\u5177\u5907\u826f\u597d\u53ef\u6269\u5c55\u6027\uff0c\u9002\u7528\u4e8e\u5927\u91cf\u670d\u52a1\u548cAPI\u573a\u666f\uff08\u5982Google Assistant\u3001Siri\u3001Alexa\uff09"], "keywords": ["\u5bf9\u8bdd\u7cfb\u7edf", "\u81ea\u7136\u8bed\u8a00\u5904\u7406", "\u8fc1\u79fb\u5b66\u4e60", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16021v1", "published_at": "2026-07-17", "score": 0.125, "selected_reasons": [], "thumbnail": null, "title": "Candidate Attended Dialogue State Tracking Using BERT", "tldr": "\u57fa\u4e8eBERT\u7684\u5019\u9009\u611f\u77e5\u5bf9\u8bdd\u72b6\u6001\u8ddf\u8e2a\u6846\u67b6\uff0c\u5b9e\u73b0\u591a\u57df\u96f6\u6837\u672c\u6cdb\u5316", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u5229\u7528\u9884\u8bad\u7ec3BERT\u6a21\u578b\u7684\u53ef\u6269\u5c55\u591a\u57df\u5bf9\u8bdd\u72b6\u6001\u8ddf\u8e2a\u6846\u67b6\uff0c\u901a\u8fc7\u5019\u9009\u611f\u77e5\u673a\u5236\u5b9e\u73b0\u96f6\u6837\u672c\u6cdb\u5316\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u5feb\u901f\u9002\u914d\u65b0\u9886\u57df\u3002", "why_notable": "\u89e3\u51b3\u4e86\u4efb\u52a1\u578b\u5bf9\u8bdd\u7cfb\u7edf\u5728\u65b0\u9886\u57df\u6570\u636e\u7a00\u7f3a\u65f6\u7684\u6cdb\u5316\u96be\u9898\uff0c\u96f6\u6837\u672c\u8fc1\u79fb\u80fd\u529b\u5bf9\u5de5\u4e1a\u7ea7\u591a\u57df\u5bf9\u8bdd\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We study a society of agents belonging to a number of occupational or cultural groups that form opinions about others\u0027 situation in the same or different group. Opinions develop either by observation within own group or by directly interacting with members of other groups, therefore by word of mouth (WoM). Additionally, global mass media (MM) may be available that inform indirectly about the situation of the various groups. The sociocultural interplay of these processes and the degrees of relative exposure to each of the sources has diversified effects on final opinion and social attitude formation. In large and complex societies and groups where not everyone can physically interact by WoM with everyone about everything, these processes show potential for mass control and social automation engineering. Our model can also represent and be generally informative about segmented societies that consist of groups with different occupational and cultural characteristics and it can offer insights into social issues such as the generation gap, social cleavages and so on.", "arxiv_id": "2607.15968", "arxiv_url": "https://arxiv.org/abs/2607.15968", "authors": ["Elpida Tzafestas"], "brief": "\u6784\u5efa\u4e86\u4e00\u4e2a\u591a\u804c\u4e1a/\u6587\u5316\u7fa4\u4f53\u7684\u667a\u80fd\u4f53\u793e\u4f1a\u6a21\u578b\uff0c\u5206\u6790\u7fa4\u4f53\u5185\u89c2\u5bdf\u3001\u8de8\u7fa4\u4f53\u53e3\u8033\u76f8\u4f20\uff08WoM\uff09\u548c\u5927\u4f17\u5a92\u4f53\uff08MM\uff09\u4e09\u79cd\u4fe1\u606f\u6e90\u5bf9\u610f\u89c1\u5f62\u6210\u7684\u7efc\u5408\u5f71\u54cd\u3002", "categories": ["physics.soc-ph", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15968", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": ["\u533a\u5206\u4e09\u79cd\u610f\u89c1\u5f62\u6210\u673a\u5236\uff1a\u7fa4\u4f53\u5185\u89c2\u5bdf\u3001\u8de8\u7fa4\u4f53\u53e3\u8033\u76f8\u4f20\u3001\u5168\u5c40\u5927\u4f17\u5a92\u4f53", "\u4e0d\u540c\u4fe1\u606f\u6e90\u7684\u76f8\u5bf9\u66b4\u9732\u7a0b\u5ea6\u5bf9\u6700\u7ec8\u793e\u4f1a\u6001\u5ea6\u4ea7\u751f\u591a\u6837\u5316\u5f71\u54cd", "\u6a21\u578b\u53ef\u89e3\u91ca\u4ee3\u9645\u5dee\u5f02\u3001\u793e\u4f1a\u88c2\u75d5\u7b49\u73b0\u5b9e\u793e\u4f1a\u73b0\u8c61\uff0c\u5e76\u63ed\u793a\u5927\u89c4\u6a21\u8206\u8bba\u64cd\u63a7\u7684\u6f5c\u5728\u673a\u5236"], "keywords": ["\u793e\u4f1a\u52a8\u529b\u5b66", "\u8206\u8bba\u5f62\u6210", "\u591a\u667a\u80fd\u4f53", "\u590d\u6742\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15968v1", "published_at": "2026-07-17", "score": 0.125, "selected_reasons": [], "thumbnail": null, "title": "Sociocultural Influences on Opinion Formation: Word of Mouth Dynamics, Mass Media and Behavioural Development", "tldr": "\u7814\u7a76\u53e3\u8033\u76f8\u4f20\u4e0e\u5927\u4f17\u5a92\u4f53\u5982\u4f55\u5171\u540c\u5851\u9020\u8de8\u7fa4\u4f53\u793e\u4f1a\u8206\u8bba\u4e0e\u6001\u5ea6", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u4e00\u4e2a\u591a\u804c\u4e1a/\u6587\u5316\u7fa4\u4f53\u7684\u667a\u80fd\u4f53\u793e\u4f1a\u6a21\u578b\uff0c\u5206\u6790\u7fa4\u4f53\u5185\u89c2\u5bdf\u3001\u8de8\u7fa4\u4f53\u53e3\u8033\u76f8\u4f20\uff08WoM\uff09\u548c\u5927\u4f17\u5a92\u4f53\uff08MM\uff09\u4e09\u79cd\u4fe1\u606f\u6e90\u5bf9\u610f\u89c1\u5f62\u6210\u7684\u7efc\u5408\u5f71\u54cd\u3002", "why_notable": "\u5c06\u793e\u4f1a\u7269\u7406\u5b66\u4e0eAI\u7ed3\u5408\uff0c\u4e3a\u7406\u89e3\u5206\u5c42\u793e\u4f1a\u4e2d\u7684\u8206\u8bba\u6781\u5316\u3001\u5a92\u4f53\u64cd\u63a7\u548c\u793e\u4f1a\u81ea\u52a8\u5316\u5de5\u7a0b\u63d0\u4f9b\u4e86\u53ef\u91cf\u5316\u7684\u7406\u8bba\u6846\u67b6\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u73b0\u5b9e\u653f\u7b56\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Data-free knowledge distillation transfers the knowledge encoded in a teacher model to a student model without access to the original training data. Prior work such as Contrastive Abductive Knowledge Extraction (CAKE) achieves this for classifiers by synthesizing samples near the teacher\u0027s decision boundary. In this work, we investigate whether this boundary-seeking principle extends to autoencoder distillation through experiments on the MNIST dataset . To enable a direct comparison, we reformulate continuous reconstruction as a dense, per-feature classification task, allowing the decoder to output categorical logits. We show that boundary-seeking objectives are fundamentally ill-posed in bottlenecked generative architectures. CAKE operates on a single, instance-level objective, but a decoder acts as an array of tightly coupled, feature-level classifiers constrained by a shared low-dimensional bottleneck. Independently sampling contrastive targets for these coupled outputs violates the geometry of the learned latent manifold and produces severe gradient conflicts instead of informative boundary samples. Manifold-aware synthesis bypasses these conflicts entirely and establishes an effective baseline for data-free generative distillation.", "arxiv_id": "2607.15919", "arxiv_url": "https://arxiv.org/abs/2607.15919", "authors": ["Mohamed Amine Kina"], "brief": "\u7814\u7a76\u4e86\u65e0\u6570\u636e\u77e5\u8bc6\u84b8\u998f\u4e2d\u7684\u8fb9\u754c\u641c\u7d22\u539f\u5219\u662f\u5426\u9002\u7528\u4e8e\u81ea\u7f16\u7801\u5668\u84b8\u998f\uff0c\u53d1\u73b0\u8be5\u65b9\u6cd5\u5728\u74f6\u9888\u751f\u6210\u67b6\u6784\u4e2d\u6839\u672c\u4e0d\u9002\u7528\uff1a\u89e3\u7801\u5668\u4f5c\u4e3a\u53d7\u4f4e\u7ef4\u74f6\u9888\u7ea6\u675f\u7684\u8026\u5408\u7279\u5f81\u5206\u7c7b\u5668\u9635\u5217\uff0c\u72ec\u7acb\u91c7\u6837\u5bf9\u6bd4\u76ee\u6807\u4f1a\u7834\u574f\u6f5c\u5728\u6d41\u5f62\u51e0\u4f55\u5e76\u4ea7\u751f\u4e25\u91cd\u68af\u5ea6\u51b2\u7a81\u3002\u63d0\u51fa\u6d41\u5f62\u611f\u77e5\u5408\u6210\u65b9\u6cd5\u53ef\u7ed5\u8fc7\u8fd9\u4e9b\u51b2\u7a81\uff0c\u4e3a\u65e0\u6570\u636e\u751f\u6210\u84b8\u998f\u5efa\u7acb\u4e86\u6709\u6548\u57fa\u7ebf\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15919", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u77e5\u8bc6\u84b8\u998f", "\u751f\u6210\u6a21\u578b", "\u81ea\u7f16\u7801\u5668", "\u65e0\u6570\u636e\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15919v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "On the Failure of Boundary-Seeking Distillation in Bottlenecked Generative Architectures", "tldr": "\u7814\u7a76\u4e86\u65e0\u6570\u636e\u77e5\u8bc6\u84b8\u998f\u4e2d\u7684\u8fb9\u754c\u641c\u7d22\u539f\u5219\u662f\u5426\u9002\u7528\u4e8e\u81ea\u7f16\u7801\u5668\u84b8\u998f\uff0c\u53d1\u73b0\u8be5\u65b9\u6cd5\u5728\u74f6\u9888\u751f\u6210\u67b6\u6784\u4e2d\u6839\u672c\u4e0d\u9002\u7528\uff1a\u89e3\u7801\u5668\u4f5c\u4e3a\u53d7\u4f4e\u7ef4\u74f6\u9888\u7ea6\u675f\u7684\u8026\u5408\u7279\u5f81\u5206\u7c7b\u5668\u9635\u5217\uff0c\u72ec\u7acb\u91c7\u6837\u5bf9\u6bd4\u76ee\u6807\u4f1a\u7834\u574f\u6f5c\u5728\u6d41\u5f62\u51e0\u4f55\u5e76\u4ea7\u751f\u4e25\u91cd\u68af\u5ea6\u51b2\u7a81\u3002\u63d0\u51fa\u6d41\u5f62\u611f\u77e5\u5408\u6210\u65b9\u6cd5\u53ef\u7ed5\u8fc7\u8fd9\u4e9b\u51b2\u7a81\uff0c\u4e3a\u65e0\u6570\u636e\u751f\u6210\u84b8\u998f\u5efa\u7acb\u4e86\u6709\u6548\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "While the internal mechanisms of autoregressive (AR) transformers have been studied extensively, much less is known about diffusion language models (DLMs), an emerging alternative that generates text by iterative denoising. In this work, we study how DLMs implement induction, a mechanism behind in-context learning in which the model finds a repeated context and copies the token that followed it. Our analysis compares attention-only AR models and absorbing-mask DLMs with matched architectures. We find that DLMs learn a bidirectional induction circuit, where previous-token and next-token heads write local context into the residual stream and later induction heads use it to find and copy the answer from the matching source position. The circuit is direction-symmetric, working whether the source appears in the past or in the future. When only left context is visible, matching what an AR model sees, the DLM does not outperform its AR counterpart in induction capabilities. However, we observe it has stronger induction when both sides of the masked token are visible, pointing to bidirectional context access rather than a stronger one-sided mechanism. Beyond induction, we provide causal evidence that DLMs compute the global fraction of masked tokens and use it as an implicit timestep, even though they are given no explicit timestep embedding.", "arxiv_id": "2607.15893", "arxiv_url": "https://arxiv.org/abs/2607.15893", "authors": ["Andy Catruna", "Emilian Radoi"], "brief": "\u672c\u6587\u5206\u6790\u4e86\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff08DLM\uff09\u5982\u4f55\u5b9e\u73b0\u4e0a\u4e0b\u6587\u5b66\u4e60\u4e2d\u7684\u5f52\u7eb3\u673a\u5236\uff0c\u53d1\u73b0DLM\u5b66\u4e60\u4e86\u4e00\u79cd\u53cc\u5411\u5f52\u7eb3\u7535\u8def\uff0c\u80fd\u591f\u5229\u7528\u76ee\u6807token\u4e24\u4fa7\u7684\u4e0a\u4e0b\u6587\u8fdb\u884c\u5339\u914d\u548c\u590d\u5236\uff0c\u800c\u975e\u5355\u7eaf\u4f18\u4e8e\u81ea\u56de\u5f52\u6a21\u578b\u7684\u5355\u4fa7\u673a\u5236\u3002\u6b64\u5916\u8fd8\u53d1\u73b0DLM\u4f1a\u9690\u5f0f\u8ba1\u7b97\u5168\u5c40\u63a9\u7801\u6bd4\u4f8b\u4f5c\u4e3a\u65f6\u95f4\u6b65\u4fe1\u53f7\uff0c\u5c3d\u7ba1\u6a21\u578b\u5e76\u672a\u63a5\u6536\u663e\u5f0f\u65f6\u95f4\u6b65\u5d4c\u5165\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15893", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u8bed\u8a00\u6a21\u578b", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u673a\u5236\u53ef\u89e3\u91ca\u6027", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15893v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Induction in Both Directions: A Mechanistic Analysis of In-Context Learning in Masked Diffusion Language Models", "tldr": "\u672c\u6587\u5206\u6790\u4e86\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff08DLM\uff09\u5982\u4f55\u5b9e\u73b0\u4e0a\u4e0b\u6587\u5b66\u4e60\u4e2d\u7684\u5f52\u7eb3\u673a\u5236\uff0c\u53d1\u73b0DLM\u5b66\u4e60\u4e86\u4e00\u79cd\u53cc\u5411\u5f52\u7eb3\u7535\u8def\uff0c\u80fd\u591f\u5229\u7528\u76ee\u6807token\u4e24\u4fa7\u7684\u4e0a\u4e0b\u6587\u8fdb\u884c\u5339\u914d\u548c\u590d\u5236\uff0c\u800c\u975e\u5355\u7eaf\u4f18\u4e8e\u81ea\u56de\u5f52\u6a21\u578b\u7684\u5355\u4fa7\u673a\u5236\u3002\u6b64\u5916\u8fd8\u53d1\u73b0DLM\u4f1a\u9690\u5f0f\u8ba1\u7b97\u5168\u5c40\u63a9\u7801\u6bd4\u4f8b\u4f5c\u4e3a\u65f6\u95f4\u6b65\u4fe1\u53f7\uff0c\u5c3d\u7ba1\u6a21\u578b\u5e76\u672a\u63a5\u6536\u663e\u5f0f\u65f6\u95f4\u6b65\u5d4c\u5165\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are broadly capable, yet in sustained one-to-one conversation they still read as flat: competent, responsive, and somehow not quite the presence of a mind. We hypothesize that a central missing ingredient is not more capability but dimensional completeness. We propose that the believability of an artificial interlocutor -- the degree to which a user attributes an inner life to it, which we call perceived mind -- is governed by whether the agent expresses a small set of first-person stances that humans use as evidence of mind, and that this is separable from task intelligence. We name four such dimensions -- time, truth, entropy, and love -- each defined as a behavioral stance rather than a benchmark competency, each with a human analog and a concrete emulation path; the time dimension already has an author-reported prototype. We identify an observable behavior layer -- initiative (unprompted action) and cadence (the shape and timing of turns) -- through which the stances surface in conversation, both partially realized as deployed features in a production companion application. We state six falsifiable predictions that a later pre-registered study will test, separating those that are pre-registrable now from those that remain conjectures pending operationalization. This is a conceptual framework: it reports no human-subjects data, and its central comparative claims are predictions, not findings. Throughout we hold a firm boundary -- the object is inferrable interiority, not interiority; this is perception engineering, not a theory of machine consciousness -- and we treat the resulting attachment and manipulation risks as load-bearing rather than incidental.", "arxiv_id": "2607.15883", "arxiv_url": "https://arxiv.org/abs/2607.15883", "authors": ["Sebastian Cochinescu"], "brief": "\u672c\u6587\u63d0\u51fa\"\u611f\u77e5AGI\"\u6982\u5ff5\u6846\u67b6\uff0c\u8ba4\u4e3aAI\u5bf9\u8bdd\u8005\u7f3a\u4e4f\"\u5fc3\u667a\u611f\"\u7684\u6839\u672c\u539f\u56e0\u4e0d\u662f\u80fd\u529b\u4e0d\u8db3\uff0c\u800c\u662f\u7f3a\u4e4f\"\u7ef4\u5ea6\u5b8c\u6574\u6027\"\u3002\u4f5c\u8005\u5b9a\u4e49\u65f6\u95f4\u3001\u771f\u76f8\u3001\u71b5\u3001\u7231\u56db\u4e2a\u7b2c\u4e00\u4eba\u79f0\u884c\u4e3a\u7ef4\u5ea6\uff0c\u5e76\u901a\u8fc7\u4e3b\u52a8\u6027\u4e0e\u8282\u594f\u7b49\u53ef\u89c2\u6d4b\u884c\u4e3a\u5c42\u6765\u4f53\u73b0\uff0c\u65e8\u5728\u63d0\u5347\u7528\u6237\u5bf9AI\u5185\u5728\u751f\u547d\u7684\u5f52\u56e0\u611f\u77e5\uff0c\u800c\u975e\u58f0\u79f0\u673a\u5668\u5177\u6709\u771f\u5b9e\u610f\u8bc6\u3002", "categories": ["cs.HC", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15883", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u4eba\u673a\u4ea4\u4e92", "\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u611f\u77e5\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15883v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Perceived AGI: Believability as Dimensional Completeness, Not Capability", "tldr": "\u672c\u6587\u63d0\u51fa\"\u611f\u77e5AGI\"\u6982\u5ff5\u6846\u67b6\uff0c\u8ba4\u4e3aAI\u5bf9\u8bdd\u8005\u7f3a\u4e4f\"\u5fc3\u667a\u611f\"\u7684\u6839\u672c\u539f\u56e0\u4e0d\u662f\u80fd\u529b\u4e0d\u8db3\uff0c\u800c\u662f\u7f3a\u4e4f\"\u7ef4\u5ea6\u5b8c\u6574\u6027\"\u3002\u4f5c\u8005\u5b9a\u4e49\u65f6\u95f4\u3001\u771f\u76f8\u3001\u71b5\u3001\u7231\u56db\u4e2a\u7b2c\u4e00\u4eba\u79f0\u884c\u4e3a\u7ef4\u5ea6\uff0c\u5e76\u901a\u8fc7\u4e3b\u52a8\u6027\u4e0e\u8282\u594f\u7b49\u53ef\u89c2\u6d4b\u884c\u4e3a\u5c42\u6765\u4f53\u73b0\uff0c\u65e8\u5728\u63d0\u5347\u7528\u6237\u5bf9AI\u5185\u5728\u751f\u547d\u7684\u5f52\u56e0\u611f\u77e5\uff0c\u800c\u975e\u58f0\u79f0\u673a\u5668\u5177\u6709\u771f\u5b9e\u610f\u8bc6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Much empirical legal research depends on translating unstructured text into structured variables. In corporate governance research as elsewhere, this translation has traditionally relied on human coding of documents such as charters and bylaws, a process that is costly, difficult to scale, and often opaque. This paper introduces DECODEM, a set of benchmark datasets for evaluating the automated extraction of corporate governance variables from organizational documents. The benchmarks pair randomly sampled corporate charters and bylaws with high-quality human annotations covering a range of governance provisions commonly studied in empirical work. Using these datasets, the paper evaluates several large-language-model extraction pipelines that vary in prompt design, task decomposition, and document handling. The underlying task consists of a set of document-level binary classification problems, one for each governance variable. The results show that automated extraction is feasible at a high level of accuracy for many provisions, with median performance near the upper bound across approaches. At the same time, performance varies systematically across variables, with a small number of provisions accounting for most of the remaining errors. More elaborate prompting strategies and cascading pipelines do not consistently improve performance for frontier models, but substantially narrow the gap between frontier and efficiency-oriented models in some settings, suggesting that pipeline design can partly substitute for model capability. By providing a standardized benchmark and a systematic evaluation of extraction methods, the paper demonstrates that current frontier models can extract legally meaningful information from complex corporate documents with high accuracy and suggests an important future role for automated feature extraction in constructing corporate governance datasets.", "arxiv_id": "2607.15879", "arxiv_url": "https://arxiv.org/abs/2607.15879", "authors": ["Jens Frankenreiter"], "brief": "\u672c\u6587\u63d0\u51faDECODEM\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u4ece\u516c\u53f8\u7ae0\u7a0b\u7b49\u6cd5\u5f8b\u6587\u4ef6\u4e2d\u81ea\u52a8\u63d0\u53d6\u516c\u53f8\u6cbb\u7406\u53d8\u91cf\u7684\u6548\u679c\u3002\u7814\u7a76\u8bc4\u4f30\u4e86\u591a\u79cd\u5927\u8bed\u8a00\u6a21\u578b\u63d0\u53d6\u6d41\u7a0b\uff0c\u53d1\u73b0\u524d\u6cbf\u6a21\u578b\u5728\u591a\u6570\u6cbb\u7406\u6761\u6b3e\u4e0a\u53ef\u8fbe\u5230\u9ad8\u7cbe\u5ea6\uff0c\u4e14\u7cbe\u5fc3\u8bbe\u8ba1\u7684\u63d0\u793a\u7b56\u7565\u80fd\u7f29\u5c0f\u524d\u6cbf\u6a21\u578b\u4e0e\u8f7b\u91cf\u6a21\u578b\u4e4b\u95f4\u7684\u6027\u80fd\u5dee\u8ddd\u3002", "categories": ["cs.CL", "cs.AI", "cs.CY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15879", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4fe1\u606f\u62bd\u53d6", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6cd5\u5f8b\u6587\u672c", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15879v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DECODEM: Data Extraction from Corporate Organizational Documents via Enhanced Methods", "tldr": "\u672c\u6587\u63d0\u51faDECODEM\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u4ece\u516c\u53f8\u7ae0\u7a0b\u7b49\u6cd5\u5f8b\u6587\u4ef6\u4e2d\u81ea\u52a8\u63d0\u53d6\u516c\u53f8\u6cbb\u7406\u53d8\u91cf\u7684\u6548\u679c\u3002\u7814\u7a76\u8bc4\u4f30\u4e86\u591a\u79cd\u5927\u8bed\u8a00\u6a21\u578b\u63d0\u53d6\u6d41\u7a0b\uff0c\u53d1\u73b0\u524d\u6cbf\u6a21\u578b\u5728\u591a\u6570\u6cbb\u7406\u6761\u6b3e\u4e0a\u53ef\u8fbe\u5230\u9ad8\u7cbe\u5ea6\uff0c\u4e14\u7cbe\u5fc3\u8bbe\u8ba1\u7684\u63d0\u793a\u7b56\u7565\u80fd\u7f29\u5c0f\u524d\u6cbf\u6a21\u578b\u4e0e\u8f7b\u91cf\u6a21\u578b\u4e4b\u95f4\u7684\u6027\u80fd\u5dee\u8ddd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Human motion capture from head-mounted devices (HMDs) offers a scalable way to acquire real-world human motion and interaction data, which is crucial for applications in embodied AI and VR/AR. Existing approaches focus on either egocentric body tracking, estimating the motion of the subject wearing the device, or exocentric tracking, capturing the movements of people in the wearer\u0027s surroundings. So far, these two paradigms have largely been explored in isolation. In this paper, we propose a novel distributed framework that jointly leverages ego- and exocentric multi-modal signals for human motion estimation from HMDs. Unlike traditional motion capture systems requiring bulky multi-camera setups or obtrusive mocap suits, our approach, EgoExoMoCap, is as simple as two (or more) people, each wearing a pair of smart glasses. The method leverages head (plus potentially wrist) tracking signals for accurate estimation of global motion in the 3D world and combines context-aware image features based on DINOv3 to achieve robustness in the presence of noise and occlusions. Extensive experiments on two in-the-wild datasets show that our approach can robustly reconstruct motion even in challenging scenarios.", "arxiv_id": "2607.15868", "arxiv_url": "https://arxiv.org/abs/2607.15868", "authors": ["Jiaxi Jiang", "Bharat Lal Bhatnagar", "Nan Yang", "Lingni Ma", "Sebastian Starke", "Robin Kips", "Nadine Bertsch", "Christian Holz", "Federica Bogo"], "brief": "\u63d0\u51faEgoExoMoCap\u6846\u67b6\uff0c\u5229\u7528\u591a\u4eba\u4f69\u6234\u667a\u80fd\u773c\u955c\u7684\u81ea\u6211\u4e2d\u5fc3\u4e0e\u5916\u90e8\u89c6\u89d2\u591a\u6a21\u6001\u4fe1\u53f7\uff0c\u8054\u5408\u4f30\u8ba1\u4eba\u4f53\u8fd0\u52a8\u3002\u7ed3\u5408\u5934\u90e8/\u624b\u8155\u8ffd\u8e2a\u4fe1\u53f7\u4e0eDINOv3\u56fe\u50cf\u7279\u5f81\uff0c\u5728\u906e\u6321\u548c\u566a\u58f0\u573a\u666f\u4e0b\u5b9e\u73b0\u9c81\u68d2\u7684\u5168\u5c403D\u8fd0\u52a8\u91cd\u5efa\uff0c\u65e0\u9700\u4f20\u7edf\u591a\u6444\u50cf\u5934\u6216\u52a8\u6355\u670d\u88c5\u3002", "categories": ["cs.CV", "cs.AI", "cs.GR", "cs.HC", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15868", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4eba\u4f53\u52a8\u4f5c\u6355\u6349", "\u81ea\u6211\u4e2d\u5fc3\u89c6\u89d2", "\u5177\u8eabAI", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15868v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "EgoExoMoCap: Distributed Ego-Exo Human Motion Capture", "tldr": "\u63d0\u51faEgoExoMoCap\u6846\u67b6\uff0c\u5229\u7528\u591a\u4eba\u4f69\u6234\u667a\u80fd\u773c\u955c\u7684\u81ea\u6211\u4e2d\u5fc3\u4e0e\u5916\u90e8\u89c6\u89d2\u591a\u6a21\u6001\u4fe1\u53f7\uff0c\u8054\u5408\u4f30\u8ba1\u4eba\u4f53\u8fd0\u52a8\u3002\u7ed3\u5408\u5934\u90e8/\u624b\u8155\u8ffd\u8e2a\u4fe1\u53f7\u4e0eDINOv3\u56fe\u50cf\u7279\u5f81\uff0c\u5728\u906e\u6321\u548c\u566a\u58f0\u573a\u666f\u4e0b\u5b9e\u73b0\u9c81\u68d2\u7684\u5168\u5c403D\u8fd0\u52a8\u91cd\u5efa\uff0c\u65e0\u9700\u4f20\u7edf\u591a\u6444\u50cf\u5934\u6216\u52a8\u6355\u670d\u88c5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Moderation systems increasingly rely on external toxicity tools, but those tools are unreliable under code-mixing, transliteration, slang, and language mismatch. We study the \\emph{conditional reliability} of toxicity priors in Indian multilingual and code-mixed short text: English toxicity, Indic abuse, and rule-based severity cues can be useful evidence, but only in some linguistic and abuse-severity contexts. We propose ToxGate, a trust-fusion head that conditions each auxiliary signal on the encoder representation before adding it to the prediction state. Across three short-text abuse datasets, four transformer encoders, and five seeds per setting, ToxGate improves over matched plain encoders in 10 of 12 in-domain settings and 7 of 8 transfer settings. The largest and most interpretable gains occur in high-risk moderation slices, including explicit slurs, violent threats, and cross-dataset transfer. The broader lesson is that moderation systems should treat external toxicity tools and priors as conditional evidence rather than fixed features or ground truth, in focused ablations, source-specific gating gives the strongest results in transfer, severe-abuse slices, and high-risk triage.", "arxiv_id": "2607.15861", "arxiv_url": "https://arxiv.org/abs/2607.15861", "authors": ["Indraveni Chebolu", "Rohan Singh", "Arnab Mallick", "Harmesh Rana"], "brief": "\u9488\u5bf9\u5370\u5ea6\u591a\u8bed\u8a00\u548c\u4ee3\u7801\u6df7\u5408\u6587\u672c\u7684\u5185\u5bb9\u5ba1\u6838\u95ee\u9898\uff0c\u63d0\u51faToxGate\u65b9\u6cd5\uff0c\u901a\u8fc7\u4fe1\u4efb\u878d\u5408\u5934\u5bf9\u6bd2\u6027\u4fe1\u53f7\u8fdb\u884c\u6761\u4ef6\u5316\u5904\u7406\uff0c\u800c\u975e\u76f4\u63a5\u4f7f\u7528\u56fa\u5b9a\u7279\u5f81\u3002\u572812\u4e2a\u57df\u5185\u8bbe\u7f6e\u4e2d10\u4e2a\u30018\u4e2a\u8fc1\u79fb\u8bbe\u7f6e\u4e2d7\u4e2a\u5747\u4f18\u4e8e\u57fa\u7ebf\uff0c\u5728\u9ad8\u98ce\u9669\u5207\u7247\uff08\u4fae\u8fb1\u6027\u8bcd\u6c47\u3001\u66b4\u529b\u5a01\u80c1\uff09\u4e0a\u63d0\u5347\u6700\u663e\u8457\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15861", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5185\u5bb9\u5ba1\u6838", "\u591a\u8bed\u8a00", "\u4ee3\u7801\u6df7\u5408", "\u6587\u672c\u5206\u7c7b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15861v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Conditional Reliability of Toxicity Signals for Multilingual and Code-Mixed Abuse Detection", "tldr": "\u9488\u5bf9\u5370\u5ea6\u591a\u8bed\u8a00\u548c\u4ee3\u7801\u6df7\u5408\u6587\u672c\u7684\u5185\u5bb9\u5ba1\u6838\u95ee\u9898\uff0c\u63d0\u51faToxGate\u65b9\u6cd5\uff0c\u901a\u8fc7\u4fe1\u4efb\u878d\u5408\u5934\u5bf9\u6bd2\u6027\u4fe1\u53f7\u8fdb\u884c\u6761\u4ef6\u5316\u5904\u7406\uff0c\u800c\u975e\u76f4\u63a5\u4f7f\u7528\u56fa\u5b9a\u7279\u5f81\u3002\u572812\u4e2a\u57df\u5185\u8bbe\u7f6e\u4e2d10\u4e2a\u30018\u4e2a\u8fc1\u79fb\u8bbe\u7f6e\u4e2d7\u4e2a\u5747\u4f18\u4e8e\u57fa\u7ebf\uff0c\u5728\u9ad8\u98ce\u9669\u5207\u7247\uff08\u4fae\u8fb1\u6027\u8bcd\u6c47\u3001\u66b4\u529b\u5a01\u80c1\uff09\u4e0a\u63d0\u5347\u6700\u663e\u8457\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Autoregressive video diffusion models have enabled the generation of arbitrarily long videos by removing conditioning on future frames, thus greatly improving computational efficiency. Yet, they suffer from error accumulation over time, as the denoised sequence gradually drifts away from the conditioning distribution seen during training. Recent advances attempt to reduce this error by anchoring each generated frame to the learned manifold of real ones. However, even when all generated individual frames lie close to the real manifold, there are trajectories which the model lacks sufficient knowledge to continue without exiting it, thus reaching a terminal point. To prevent the model from being trapped in terminal points, we start from the hypothesis that for well-modeled future trajectories the distribution of the predicted noise should match the one of the forward noising process. To enforce such a prior at test time, we introduce Terminal points Avoidance through Noise Guided Optimization (TANGO), which uses the diffusion model as a critic of its own outputs, by predicting one step forward and requiring an isotropic Gaussian noise prediction. We use the deviation from this expected noise distribution to search for an alternative trajectory that does not lead to a terminal point. Our approach achieves a $3.1\\%$ absolute improvement on VBench over state-of-the-art, while reducing Fr\u00e9chet Video Distance by $28.3\\%$ on average across $15$s videos. Our code is available on https://mever-team.github.io/tango.", "arxiv_id": "2607.15849", "arxiv_url": "https://arxiv.org/abs/2607.15849", "authors": ["Dimitrios Karageorgiou", "Symeon Papadopoulos", "Ioannis Kompatsiaris", "Efstratios Gavves"], "brief": "\u9488\u5bf9\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u6a21\u578b\u4e2d\u8bef\u5dee\u7d2f\u79ef\u5bfc\u81f4\u751f\u6210\u8f68\u8ff9\u504f\u79bb\u771f\u5b9e\u5206\u5e03\u7684\u95ee\u9898\uff0c\u63d0\u51faTANGO\u65b9\u6cd5\uff1a\u5728\u6d4b\u8bd5\u65f6\u5229\u7528\u6269\u6563\u6a21\u578b\u81ea\u8eab\u4f5c\u4e3a\u8bc4\u5224\u5668\uff0c\u901a\u8fc7\u7ea6\u675f\u9884\u6d4b\u566a\u58f0\u7b26\u5408\u5404\u5411\u540c\u6027\u9ad8\u65af\u5206\u5e03\u6765\u907f\u514d\u751f\u6210\u9677\u5165\"\u7ec8\u6b62\u70b9\"\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728VBench\u4e0a\u7edd\u5bf9\u63d0\u53473.1%\uff0c15\u79d2\u89c6\u9891\u7684FVD\u5e73\u5747\u964d\u4f4e28.3%\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15849", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u81ea\u56de\u5f52\u6a21\u578b", "\u6d4b\u8bd5\u65f6\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15849v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Test-Time Noise Guided Adaptation for Realistic Autoregressive Video Generation", "tldr": "\u9488\u5bf9\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u6a21\u578b\u4e2d\u8bef\u5dee\u7d2f\u79ef\u5bfc\u81f4\u751f\u6210\u8f68\u8ff9\u504f\u79bb\u771f\u5b9e\u5206\u5e03\u7684\u95ee\u9898\uff0c\u63d0\u51faTANGO\u65b9\u6cd5\uff1a\u5728\u6d4b\u8bd5\u65f6\u5229\u7528\u6269\u6563\u6a21\u578b\u81ea\u8eab\u4f5c\u4e3a\u8bc4\u5224\u5668\uff0c\u901a\u8fc7\u7ea6\u675f\u9884\u6d4b\u566a\u58f0\u7b26\u5408\u5404\u5411\u540c\u6027\u9ad8\u65af\u5206\u5e03\u6765\u907f\u514d\u751f\u6210\u9677\u5165\"\u7ec8\u6b62\u70b9\"\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728VBench\u4e0a\u7edd\u5bf9\u63d0\u53473.1%\uff0c15\u79d2\u89c6\u9891\u7684FVD\u5e73\u5747\u964d\u4f4e28.3%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Metaphor in Arabic is a culturally grounded mechanism for constructing meaning, encoding cultural knowledge that shapes interpretation. Yet current Arabic language models typically collapse lexical, cultural, and metaphorical information into a single representational space, a phenomenon we term \"semantic smearing\". We introduce CAMMAR (Culture-Aware Matryoshka for Metaphorical Arabic Representations), a representation learning framework that organizes meaning into nested lexical, cultural, and metaphorical embedding subspaces through a staged semantic curriculum. The design implements compositional principles of Al-Jurjani\u0027s theory of nazum, modeling figurative meaning as compositionally grounded in prior semantic relations, and yields a training-free geometric measure of metaphoricity based on the distance between lexical and metaphorical representations. Evaluated on a new span-annotated Arabic metaphor set as word-matched figurative/literal pairs, the geometric readout detects metaphor well above chance when the inter-layer geometry is shaped by paired supervision (AUC up to 0.84; figurative outscores its literal counterpart for the same word in 82.6\\% of pairs), but sits at chance under an unsupervised domain contrast alone, a clean separation between a legible-under-supervision regime and a non-emergent one. A controlled ablation shows that grounding the lexical layer in morphological roots gives a small but consistent gain, an effect absent from direct probing that reflects the layer\u0027s quality as a measurement anchor. We will release the datasets, cultural concept inventory, and code upon acceptance.", "arxiv_id": "2607.15847", "arxiv_url": "https://arxiv.org/abs/2607.15847", "authors": ["Suzan Awinat", "Alfonso Ortega del Puente"], "brief": "\u63d0\u51faCAMMAR\u6846\u67b6\uff0c\u901a\u8fc7\u5d4c\u5957\u7684\u8bcd\u6c47\u3001\u6587\u5316\u548c\u9690\u55bb\u5d4c\u5165\u5b50\u7a7a\u95f4\u6765\u89e3\u51b3\u963f\u62c9\u4f2f\u8bed\u6a21\u578b\u4e2d\u7684\"\u8bed\u4e49\u6a21\u7cca\"\u95ee\u9898\u3002\u57fa\u4e8eAl-Jurjani\u7684nazum\u7406\u8bba\uff0c\u8bbe\u8ba1\u4e86\u65e0\u9700\u8bad\u7ec3\u7684\u51e0\u4f55\u9690\u55bb\u5ea6\u91cf\u65b9\u6cd5\uff0c\u5728\u65b0\u6784\u5efa\u7684\u963f\u62c9\u4f2f\u8bed\u9690\u55bb\u6807\u6ce8\u6570\u636e\u96c6\u4e0aAUC\u8fbe0.84\uff0c82.6%\u7684\u5bf9\u6bd4\u5bf9\u4e2d\u9690\u55bb\u8868\u8fbe\u5f97\u5206\u9ad8\u4e8e\u5b57\u9762\u8868\u8fbe\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15847", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9690\u55bb\u7406\u89e3", "\u963f\u62c9\u4f2f\u8bed", "\u8868\u793a\u5b66\u4e60", "\u6587\u5316\u611f\u77e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15847v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CAMMAR: Culture-Aware Matryoshka for Metaphorical Arabic Representations", "tldr": "\u63d0\u51faCAMMAR\u6846\u67b6\uff0c\u901a\u8fc7\u5d4c\u5957\u7684\u8bcd\u6c47\u3001\u6587\u5316\u548c\u9690\u55bb\u5d4c\u5165\u5b50\u7a7a\u95f4\u6765\u89e3\u51b3\u963f\u62c9\u4f2f\u8bed\u6a21\u578b\u4e2d\u7684\"\u8bed\u4e49\u6a21\u7cca\"\u95ee\u9898\u3002\u57fa\u4e8eAl-Jurjani\u7684nazum\u7406\u8bba\uff0c\u8bbe\u8ba1\u4e86\u65e0\u9700\u8bad\u7ec3\u7684\u51e0\u4f55\u9690\u55bb\u5ea6\u91cf\u65b9\u6cd5\uff0c\u5728\u65b0\u6784\u5efa\u7684\u963f\u62c9\u4f2f\u8bed\u9690\u55bb\u6807\u6ce8\u6570\u636e\u96c6\u4e0aAUC\u8fbe0.84\uff0c82.6%\u7684\u5bf9\u6bd4\u5bf9\u4e2d\u9690\u55bb\u8868\u8fbe\u5f97\u5206\u9ad8\u4e8e\u5b57\u9762\u8868\u8fbe\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Accurate timing prediction at the register-transfer level (RTL) is a longstanding challenge in design automation. Existing graph-based methods struggle with limited receptive fields, high complexity, and a lack of signal directionality. We present RTL-Sequencer, a novel sequence-based paradigm that enables scalable RTL timing prediction via linearizing logic cones by breadth-first traversal and applying modern linear sequence models. Furthermore, sequence models are customized by four synergistic techniques, including sequence shuffling, bidirectional modeling, differentiable modeling, and a hybrid graph-sequence architecture. Extensive experiments demonstrate significant improvements of RTL-Sequencer over state-of-the-art baselines, advancing early-stage timing optimization.", "arxiv_id": "2607.15830", "arxiv_url": "https://arxiv.org/abs/2607.15830", "authors": ["Ziyan Guo", "Wenji Fang", "Wenkai Li", "Yuchao Wu", "Shang Liu", "Zhiyao Xie"], "brief": "\u63d0\u51faRTL-Sequencer\uff0c\u4e00\u79cd\u57fa\u4e8e\u5e8f\u5217\u7684RTL\u65f6\u5e8f\u9884\u6d4b\u65b0\u8303\u5f0f\uff0c\u901a\u8fc7\u5e7f\u5ea6\u4f18\u5148\u904d\u5386\u5c06\u903b\u8f91\u9525\u7ebf\u6027\u5316\u5e76\u7ed3\u5408\u73b0\u4ee3\u7ebf\u6027\u5e8f\u5217\u6a21\u578b\uff0c\u514b\u670d\u4e86\u73b0\u6709\u56fe\u65b9\u6cd5\u611f\u53d7\u91ce\u6709\u9650\u3001\u590d\u6742\u5ea6\u9ad8\u548c\u7f3a\u4e4f\u4fe1\u53f7\u65b9\u5411\u6027\u7684\u95ee\u9898\u3002\u5b9e\u9a8c\u8868\u660e\u5176\u5728\u65f6\u5e8f\u9884\u6d4b\u7cbe\u5ea6\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u65b9\u6cd5\uff0c\u6709\u52a9\u4e8e\u65e9\u671f\u9636\u6bb5\u7684\u65f6\u5e8f\u4f18\u5316\u3002", "categories": ["cs.AR", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15830", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["RTL\u65f6\u5e8f\u9884\u6d4b", "\u5e8f\u5217\u6a21\u578b", "\u8bbe\u8ba1\u81ea\u52a8\u5316", "\u56fe\u795e\u7ecf\u7f51\u7edc"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15830v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "RTL-Sequencer: Towards Scalable RTL Timing Prediction with the Sequence-based Paradigm", "tldr": "\u63d0\u51faRTL-Sequencer\uff0c\u4e00\u79cd\u57fa\u4e8e\u5e8f\u5217\u7684RTL\u65f6\u5e8f\u9884\u6d4b\u65b0\u8303\u5f0f\uff0c\u901a\u8fc7\u5e7f\u5ea6\u4f18\u5148\u904d\u5386\u5c06\u903b\u8f91\u9525\u7ebf\u6027\u5316\u5e76\u7ed3\u5408\u73b0\u4ee3\u7ebf\u6027\u5e8f\u5217\u6a21\u578b\uff0c\u514b\u670d\u4e86\u73b0\u6709\u56fe\u65b9\u6cd5\u611f\u53d7\u91ce\u6709\u9650\u3001\u590d\u6742\u5ea6\u9ad8\u548c\u7f3a\u4e4f\u4fe1\u53f7\u65b9\u5411\u6027\u7684\u95ee\u9898\u3002\u5b9e\u9a8c\u8868\u660e\u5176\u5728\u65f6\u5e8f\u9884\u6d4b\u7cbe\u5ea6\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\u65b9\u6cd5\uff0c\u6709\u52a9\u4e8e\u65e9\u671f\u9636\u6bb5\u7684\u65f6\u5e8f\u4f18\u5316\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In-context learning is a remarkable property of transformers and has recently received a lot of interest. In many studies of in-context learning, it has been shown that transformers are capable of implementing solver for linear and non-linear regression problems, in which the most of them implement gradient descent algorithm. However, it is still unclear whether those implementations have actually been acquired through training. In this paper, we construct a transformer with linear self-attention, which in-context learns the least squares estimate in a simple regression task. The point here is that the closed form (analytical) solution is approximately obtained by using layer normalization rather than an approximate solution based on gradient descent algorithm. Then, we show an experimental example, in which our implementation is mainly used in the transformer trained with l1 regularization when the target output is the least squares estimate.", "arxiv_id": "2607.15819", "arxiv_url": "https://arxiv.org/abs/2607.15819", "authors": ["Katsuyuki Hagiwara"], "brief": "\u672c\u6587\u6784\u9020\u4e86\u4e00\u4e2a\u5e26\u7ebf\u6027\u81ea\u6ce8\u610f\u529b\u7684Transformer\uff0c\u901a\u8fc7\u5c42\u5f52\u4e00\u5316\u5b9e\u73b0\u7ebf\u6027\u56de\u5f52\u7684\u6700\u5c0f\u4e8c\u4e58\u95ed\u5408\u89e3\uff0c\u800c\u975e\u4f20\u7edf\u7684\u68af\u5ea6\u4e0b\u964d\u8fd1\u4f3c\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728l1\u6b63\u5219\u5316\u8bad\u7ec3\u4e0b\uff0c\u8be5\u5b9e\u73b0\u673a\u5236\u5728Transformer\u4e2d\u88ab\u5b9e\u9645\u4e60\u5f97\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15819", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e0a\u4e0b\u6587\u5b66\u4e60", "Transformer", "\u7ebf\u6027\u56de\u5f52", "\u81ea\u6ce8\u610f\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15819v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "In-context learning of closed form solution to simple linear regression task using transformer with linear self-attention", "tldr": "\u672c\u6587\u6784\u9020\u4e86\u4e00\u4e2a\u5e26\u7ebf\u6027\u81ea\u6ce8\u610f\u529b\u7684Transformer\uff0c\u901a\u8fc7\u5c42\u5f52\u4e00\u5316\u5b9e\u73b0\u7ebf\u6027\u56de\u5f52\u7684\u6700\u5c0f\u4e8c\u4e58\u95ed\u5408\u89e3\uff0c\u800c\u975e\u4f20\u7edf\u7684\u68af\u5ea6\u4e0b\u964d\u8fd1\u4f3c\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728l1\u6b63\u5219\u5316\u8bad\u7ec3\u4e0b\uff0c\u8be5\u5b9e\u73b0\u673a\u5236\u5728Transformer\u4e2d\u88ab\u5b9e\u9645\u4e60\u5f97\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Industrial processes often generate complex, interdependent time-series data from multiple sensors across multiple stages, forming complex dependencies among variables and process stages. Effective monitoring and timely anomaly detection of these time series through multivariate time series anomaly detection (MTAD) is crucial for preventing failures and ensuring the reliability of automated systems. Graph neural networks (GNNs) have advanced MTAD by leveraging data-driven graphs to model complex dependencies among variables, effectively capturing relational structures within multivariate time series to enhance anomaly detection performance. However, existing GNN-based approaches often overlook critical process knowledge, and even when this knowledge is considered, seamlessly incorporating it into existing models remains inherently challenging, leading to suboptimal performance. To address this limitation, we propose a knowledge-assisted multi-graph framework for modeling sensor dependencies in multi-stage industrial processes for MTAD, which explicitly incorporates process knowledge into graph learning to enhance dependency modeling and improve anomaly detection performance. Our method constructs three complementary graphs: one purely data-driven and two refined by integrating structural constraints derived from process knowledge. To effectively leverage these graphs for anomaly detection, we employ a multi-graph attention network, enabling a more accurate and robust representation of complex dependencies. Comprehensive experiments on two real-world, multi-stage industrial datasets demonstrate that incorporating process knowledge substantially enhances anomaly detection performance.", "arxiv_id": "2607.15799", "arxiv_url": "https://arxiv.org/abs/2607.15799", "authors": ["Jaeyeong Lee", "Taeseong Yoon", "Wonmo Koo", "Heeyoung Kim"], "brief": "\u9488\u5bf9\u591a\u9636\u6bb5\u5de5\u4e1a\u8fc7\u7a0b\u7684\u591a\u53d8\u91cf\u65f6\u5e8f\u5f02\u5e38\u68c0\u6d4b\uff0c\u63d0\u51fa\u878d\u5408\u9886\u57df\u77e5\u8bc6\u7684\u591a\u56fe\u4f9d\u8d56\u5b66\u4e60\u6846\u67b6\uff0c\u6784\u5efa\u4e00\u4e2a\u7eaf\u6570\u636e\u9a71\u52a8\u56fe\u548c\u4e24\u4e2a\u77e5\u8bc6\u7ea6\u675f\u56fe\uff0c\u901a\u8fc7\u591a\u56fe\u6ce8\u610f\u529b\u7f51\u7edc\u5efa\u6a21\u4f20\u611f\u5668\u95f4\u590d\u6742\u4f9d\u8d56\u5173\u7cfb\uff0c\u5728\u771f\u5b9e\u5de5\u4e1a\u6570\u636e\u96c6\u4e0a\u663e\u8457\u63d0\u5347\u4e86\u5f02\u5e38\u68c0\u6d4b\u6027\u80fd\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15799", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u65f6\u5e8f\u5f02\u5e38\u68c0\u6d4b", "\u56fe\u795e\u7ecf\u7f51\u7edc", "\u5de5\u4e1a\u8fc7\u7a0b", "\u77e5\u8bc6\u878d\u5408"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15799v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Knowledge-Assisted Multi-Graph Dependency Learning for Multivariate Time Series Anomaly Detection in Multi-Stage Industrial Processes", "tldr": "\u9488\u5bf9\u591a\u9636\u6bb5\u5de5\u4e1a\u8fc7\u7a0b\u7684\u591a\u53d8\u91cf\u65f6\u5e8f\u5f02\u5e38\u68c0\u6d4b\uff0c\u63d0\u51fa\u878d\u5408\u9886\u57df\u77e5\u8bc6\u7684\u591a\u56fe\u4f9d\u8d56\u5b66\u4e60\u6846\u67b6\uff0c\u6784\u5efa\u4e00\u4e2a\u7eaf\u6570\u636e\u9a71\u52a8\u56fe\u548c\u4e24\u4e2a\u77e5\u8bc6\u7ea6\u675f\u56fe\uff0c\u901a\u8fc7\u591a\u56fe\u6ce8\u610f\u529b\u7f51\u7edc\u5efa\u6a21\u4f20\u611f\u5668\u95f4\u590d\u6742\u4f9d\u8d56\u5173\u7cfb\uff0c\u5728\u771f\u5b9e\u5de5\u4e1a\u6570\u636e\u96c6\u4e0a\u663e\u8457\u63d0\u5347\u4e86\u5f02\u5e38\u68c0\u6d4b\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Classical approaches to event-based egomotion estimation, including those adopted by the top-performing teams of the ELOPE challenge, rely on geometric optimization frameworks such as contrast maximization, homography estimation, or dense optical flow combined with analytic motion inversion. This work investigates the geometric structure that emerges inside a multi-modal network for egomotion estimation. Event tensors, inertial measurements, and range signals are fused through a cross-modal attention architecture and trained in a batch setting. We analyze the latent space geometry and attention dynamics, showing that (i) embeddings lie on low-dimensional manifolds aligned with motion variables, (ii) attention weights adapt with angular excitation and visual reliability, and (iii) the fused representation recovers classical observability cues. These results bridge analytical estimation theory and modern data-driven fusion.", "arxiv_id": "2607.15794", "arxiv_url": "https://arxiv.org/abs/2607.15794", "authors": ["Stefano Silvestrini", "Michele Ceresoli"], "brief": "\u672c\u6587\u7814\u7a76\u591a\u6a21\u6001\u81ea\u8fd0\u52a8\u4f30\u8ba1\u7f51\u7edc\u4e2d\u5b66\u4e60\u8868\u5f81\u7684\u51e0\u4f55\u7ed3\u6784\uff0c\u901a\u8fc7\u8de8\u6a21\u6001\u6ce8\u610f\u529b\u67b6\u6784\u878d\u5408\u4e8b\u4ef6\u5f20\u91cf\u3001\u60ef\u6027\u6d4b\u91cf\u548c\u8ddd\u79bb\u4fe1\u53f7\u3002\u5206\u6790\u8868\u660e\uff1a\u5d4c\u5165\u7a7a\u95f4\u4f4d\u4e8e\u4e0e\u8fd0\u52a8\u53d8\u91cf\u5bf9\u9f50\u7684\u4f4e\u7ef4\u6d41\u5f62\u4e0a\uff0c\u6ce8\u610f\u529b\u6743\u91cd\u968f\u89d2\u6fc0\u52b1\u548c\u89c6\u89c9\u53ef\u9760\u6027\u81ea\u9002\u5e94\u8c03\u6574\uff0c\u878d\u5408\u8868\u5f81\u80fd\u6062\u590d\u7ecf\u5178\u53ef\u89c2\u6d4b\u6027\u7ebf\u7d22\uff0c\u4ece\u800c\u5c06\u89e3\u6790\u4f30\u8ba1\u7406\u8bba\u4e0e\u73b0\u4ee3\u6570\u636e\u9a71\u52a8\u878d\u5408\u65b9\u6cd5\u76f8\u8fde\u63a5\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15794", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u878d\u5408", "\u81ea\u8fd0\u52a8\u4f30\u8ba1", "\u4e8b\u4ef6\u76f8\u673a", "\u8868\u5f81\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15794v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "On the Geometry of Learned Representations in Event-Based Multi-Modal Egomotion Estimation", "tldr": "\u672c\u6587\u7814\u7a76\u591a\u6a21\u6001\u81ea\u8fd0\u52a8\u4f30\u8ba1\u7f51\u7edc\u4e2d\u5b66\u4e60\u8868\u5f81\u7684\u51e0\u4f55\u7ed3\u6784\uff0c\u901a\u8fc7\u8de8\u6a21\u6001\u6ce8\u610f\u529b\u67b6\u6784\u878d\u5408\u4e8b\u4ef6\u5f20\u91cf\u3001\u60ef\u6027\u6d4b\u91cf\u548c\u8ddd\u79bb\u4fe1\u53f7\u3002\u5206\u6790\u8868\u660e\uff1a\u5d4c\u5165\u7a7a\u95f4\u4f4d\u4e8e\u4e0e\u8fd0\u52a8\u53d8\u91cf\u5bf9\u9f50\u7684\u4f4e\u7ef4\u6d41\u5f62\u4e0a\uff0c\u6ce8\u610f\u529b\u6743\u91cd\u968f\u89d2\u6fc0\u52b1\u548c\u89c6\u89c9\u53ef\u9760\u6027\u81ea\u9002\u5e94\u8c03\u6574\uff0c\u878d\u5408\u8868\u5f81\u80fd\u6062\u590d\u7ecf\u5178\u53ef\u89c2\u6d4b\u6027\u7ebf\u7d22\uff0c\u4ece\u800c\u5c06\u89e3\u6790\u4f30\u8ba1\u7406\u8bba\u4e0e\u73b0\u4ee3\u6570\u636e\u9a71\u52a8\u878d\u5408\u65b9\u6cd5\u76f8\u8fde\u63a5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Geospatial datasets support applications from urban planning to climate modeling, yet consistent assessment of FAIR compliance is difficult. Existing evaluators use different rubrics and evidence sources and may fail on JavaScript-rendered pages or repository-specific identifiers. For 50 datasets from 10 repositories, the standard deviation of normalized scores across available tools averages 15.0 percentage points and reaches 30.3 for one dataset. Because these outputs are not equivalent measurements, we use them to characterize disagreement and failure modes, not comparative accuracy. We present AgentFAIR, a multi-agent framework combining structured metadata extraction with 13 sub-principle-specific LLM evaluators. Each produces a 0-3 maturity score, cited evidence, and recommendations; a critic checks evidence and consistency and can request targeted re-evaluation. Mean Findability, Accessibility, Interoperability, and Reusability scores are 79.7%, 70.4%, 45.3%, and 72.0%. Rank correlations with four baseline tools range from 0.31 to 0.61; the FAIR-enough comparison is not statistically significant. On a 10-dataset repeated-run subset, sub-principle agreement averages 89% (standard deviation: 3 percentage points), versus 71% without the critic. A preliminary 15-dataset expert study yields Fleiss\u0027 kappa of 0.71 and 82% alignment with expert consensus. API cost is approximately USD 0.054 per dataset. These results support auditability and feasibility, while the limited benchmark, incomplete ablations, and single-model-family validation constrain claims about accuracy and generalization.", "arxiv_id": "2607.15781", "arxiv_url": "https://arxiv.org/abs/2607.15781", "authors": ["Ming Chen", "Pranav Pai"], "brief": "AgentFAIR\u662f\u4e00\u4e2a\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u7528\u4e8e\u8bc4\u4f30\u5730\u7406\u7a7a\u95f4\u6570\u636e\u96c6\u7684FAIR\u539f\u5219\uff08\u53ef\u53d1\u73b0\u6027\u3001\u53ef\u8bbf\u95ee\u6027\u3001\u4e92\u64cd\u4f5c\u6027\u3001\u53ef\u91cd\u7528\u6027\uff09\u5408\u89c4\u6027\u3002\u6846\u67b6\u7ed3\u5408\u7ed3\u6784\u5316\u5143\u6570\u636e\u63d0\u53d6\u4e0e13\u4e2a\u5b50\u539f\u5219\u4e13\u7528LLM\u8bc4\u4f30\u5668\uff0c\u5e76\u5f15\u5165\u6279\u8bc4\u8005\u667a\u80fd\u4f53\u8fdb\u884c\u4e00\u81f4\u6027\u6821\u9a8c\uff0c\u572815\u6570\u636e\u96c6\u4e13\u5bb6\u7814\u7a76\u4e2d\u8fbe\u5230Fleiss\u0027 kappa 0.71\u300182%\u4e13\u5bb6\u5171\u8bc6\u5bf9\u9f50\uff0c\u6bcf\u6570\u636e\u96c6API\u6210\u672c\u7ea60.054\u7f8e\u5143\u3002", "categories": ["cs.AI", "cs.ET", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15781", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u6570\u636e\u8d28\u91cf\u8bc4\u4f30", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5730\u7406\u7a7a\u95f4\u6570\u636e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15781v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AgentFAIR: A Multi-Agent Collaborative Framework for FAIRness Evaluation of Geospatial Datasets", "tldr": "AgentFAIR\u662f\u4e00\u4e2a\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u7528\u4e8e\u8bc4\u4f30\u5730\u7406\u7a7a\u95f4\u6570\u636e\u96c6\u7684FAIR\u539f\u5219\uff08\u53ef\u53d1\u73b0\u6027\u3001\u53ef\u8bbf\u95ee\u6027\u3001\u4e92\u64cd\u4f5c\u6027\u3001\u53ef\u91cd\u7528\u6027\uff09\u5408\u89c4\u6027\u3002\u6846\u67b6\u7ed3\u5408\u7ed3\u6784\u5316\u5143\u6570\u636e\u63d0\u53d6\u4e0e13\u4e2a\u5b50\u539f\u5219\u4e13\u7528LLM\u8bc4\u4f30\u5668\uff0c\u5e76\u5f15\u5165\u6279\u8bc4\u8005\u667a\u80fd\u4f53\u8fdb\u884c\u4e00\u81f4\u6027\u6821\u9a8c\uff0c\u572815\u6570\u636e\u96c6\u4e13\u5bb6\u7814\u7a76\u4e2d\u8fbe\u5230Fleiss\u0027 kappa 0.71\u300182%\u4e13\u5bb6\u5171\u8bc6\u5bf9\u9f50\uff0c\u6bcf\u6570\u636e\u96c6API\u6210\u672c\u7ea60.054\u7f8e\u5143\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Video Large Language Models (Video LLMs) have made significant advancements in various video understanding tasks. However, long-video scenarios remain challenging due to the tension between limited visual token budgets and the need to capture multiple key events. Existing approaches typically process long videos in two stages, i.e., i) select keyframes and ii) perform detailed perception, which exhibit limitations: they lack a modular mechanism for adaptive capacity allocation and self-correction, resulting in unreliable modeling. To tackle these challenges, we propose MoD-VLLM, a novel Modularized Dynamic-Granularity Video LLM framework for multi-event long video understanding, which unifies temporal grounding and semantic understanding iteratively and self-reflectively. Specifically, we propose a Positive-Negative Video Segments Grounding module and a Modularized Dynamic-Granularity Reflection module, which form a closed loop to progressively localize the question-related video segments. The grounding module instructs a Video LLM to distinguish relevant from irrelevant video segments based on the video question. The reflection module employs a modularized scheduler that dynamically selects fine-grained encoding for relevant positive segments to capture detailed perception and coarse-grained encoding for negative segments to maintain global context. We further propose a dynamic-granularity reinforcement learning strategy, allowing MoD-VLLM to learn optimal grounding policies and dynamic granularity visual representation jointly. Moreover, we propose MEventBench, a challenging Multi-Event Long Video Benchmark for complex long video reasoning. Extensive experiments on several long video understanding benchmarks and our MEventBench demonstrate that MoD-VLLM significantly outperforms state-of-the-art baselines.", "arxiv_id": "2607.15778", "arxiv_url": "https://arxiv.org/abs/2607.15778", "authors": ["Wei Feng", "Xin Wang", "Yu-Wei Zhan", "Yuwei Zhou", "Wenwu Zhu"], "brief": "\u63d0\u51faMoD-VLLM\u6846\u67b6\uff0c\u901a\u8fc7\u6b63\u8d1f\u89c6\u9891\u7247\u6bb5\u5b9a\u4f4d\u6a21\u5757\u4e0e\u6a21\u5757\u5316\u52a8\u6001\u7c92\u5ea6\u53cd\u601d\u6a21\u5757\u7684\u95ed\u73af\u8fed\u4ee3\uff0c\u81ea\u9002\u5e94\u5730\u5bf9\u957f\u89c6\u9891\u4e2d\u76f8\u5173\u7247\u6bb5\u8fdb\u884c\u7ec6\u7c92\u5ea6\u7f16\u7801\u3001\u65e0\u5173\u7247\u6bb5\u8fdb\u884c\u7c97\u7c92\u5ea6\u7f16\u7801\uff0c\u5e76\u7ed3\u5408\u5f3a\u5316\u5b66\u4e60\u8054\u5408\u4f18\u5316\u5b9a\u4f4d\u7b56\u7565\u4e0e\u89c6\u89c9\u8868\u793a\u3002\u5728\u591a\u4e2a\u957f\u89c6\u9891\u7406\u89e3\u57fa\u51c6\u53ca\u65b0\u63d0\u51fa\u7684MEventBench\u4e0a\u663e\u8457\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15778", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u5927\u8bed\u8a00\u6a21\u578b", "\u957f\u89c6\u9891\u7406\u89e3", "\u52a8\u6001\u7c92\u5ea6", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15778v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Modularized Dynamic-Granularity Video LLM for Multi-Event Long Video Understanding", "tldr": "\u63d0\u51faMoD-VLLM\u6846\u67b6\uff0c\u901a\u8fc7\u6b63\u8d1f\u89c6\u9891\u7247\u6bb5\u5b9a\u4f4d\u6a21\u5757\u4e0e\u6a21\u5757\u5316\u52a8\u6001\u7c92\u5ea6\u53cd\u601d\u6a21\u5757\u7684\u95ed\u73af\u8fed\u4ee3\uff0c\u81ea\u9002\u5e94\u5730\u5bf9\u957f\u89c6\u9891\u4e2d\u76f8\u5173\u7247\u6bb5\u8fdb\u884c\u7ec6\u7c92\u5ea6\u7f16\u7801\u3001\u65e0\u5173\u7247\u6bb5\u8fdb\u884c\u7c97\u7c92\u5ea6\u7f16\u7801\uff0c\u5e76\u7ed3\u5408\u5f3a\u5316\u5b66\u4e60\u8054\u5408\u4f18\u5316\u5b9a\u4f4d\u7b56\u7565\u4e0e\u89c6\u89c9\u8868\u793a\u3002\u5728\u591a\u4e2a\u957f\u89c6\u9891\u7406\u89e3\u57fa\u51c6\u53ca\u65b0\u63d0\u51fa\u7684MEventBench\u4e0a\u663e\u8457\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "OWL ontologies provide a formal knowledge representation framework that enables semantic reasoning, and have been widely adopted across domains such as healthcare and bioinformatics. In practice, however, real-world ontologies are often incomplete, which pose challenges for reasoning. In this work, we focus on a fundamental subsumption reasoning problem: given an incomplete ontology and a candidate (non-entailed) subsumption, determine whether the subsumption is semantically plausible and, if so, providing a logically sound explanation containing potential missing axioms. This task unifies subsumption verification with ontology abduction, and generalizes the latter by removing the need for a predefined candidate set of missing axioms. To address this subsumption reasoning problem, we propose NeurOWL, an end-to-end neuro-symbolic framework that jointly performs verification and abduction, leveraging both formally defined semantics and textual semantics through Large Language Models and ontology embeddings. We evaluate NeurOWL on real-world ontologies across multiple domains, demonstrating strong and robust performance across different domains.", "arxiv_id": "2607.15776", "arxiv_url": "https://arxiv.org/abs/2607.15776", "authors": ["Hui Yang", "Jiaoyan Chen", "Yiping Song", "Renate Schmidt", "Wen Zhang"], "brief": "\u9488\u5bf9\u73b0\u5b9e\u4e2d\u4e0d\u5b8c\u6574OWL\u672c\u4f53\u7684\u63a8\u7406\u95ee\u9898\uff0c\u63d0\u51faNeurOWL\u6846\u67b6\uff0c\u7ed3\u5408\u5927\u8bed\u8a00\u6a21\u578b\u4e0e\u672c\u4f53\u5d4c\u5165\uff0c\u540c\u65f6\u5b8c\u6210\u5305\u542b\u5173\u7cfb\u9a8c\u8bc1\u4e0e\u672c\u4f53\u6eaf\u56e0\u63a8\u7406\uff0c\u5e76\u80fd\u7ed9\u51fa\u7f3a\u5931\u516c\u7406\u7684\u903b\u8f91\u89e3\u91ca\u3002\u5728\u591a\u9886\u57df\u771f\u5b9e\u672c\u4f53\u4e0a\u9a8c\u8bc1\u4e86\u5176\u5f3a\u5065\u6027\u80fd\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15776", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u77e5\u8bc6\u56fe\u8c31", "\u795e\u7ecf\u7b26\u53f7\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u672c\u4f53\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15776v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "NeurOWL: An LLM-Based Neural-symbolic Framework for Incomplete OWL Ontology Reasoning", "tldr": "\u9488\u5bf9\u73b0\u5b9e\u4e2d\u4e0d\u5b8c\u6574OWL\u672c\u4f53\u7684\u63a8\u7406\u95ee\u9898\uff0c\u63d0\u51faNeurOWL\u6846\u67b6\uff0c\u7ed3\u5408\u5927\u8bed\u8a00\u6a21\u578b\u4e0e\u672c\u4f53\u5d4c\u5165\uff0c\u540c\u65f6\u5b8c\u6210\u5305\u542b\u5173\u7cfb\u9a8c\u8bc1\u4e0e\u672c\u4f53\u6eaf\u56e0\u63a8\u7406\uff0c\u5e76\u80fd\u7ed9\u51fa\u7f3a\u5931\u516c\u7406\u7684\u903b\u8f91\u89e3\u91ca\u3002\u5728\u591a\u9886\u57df\u771f\u5b9e\u672c\u4f53\u4e0a\u9a8c\u8bc1\u4e86\u5176\u5f3a\u5065\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Access to potable water is crucial for health, economic development, and sustainability. However, accurately classifying water quality remains a significant challenge due to the complexity and variability of water source data. This paper addresses the challenge of predicting water potability through machine learning and deep learning algorithms. It introduces a novel feature augmentation algorithm, AquaAugmentor, to enhance the predictive performance of these models for low-dimensional datasets. Utilizing a dataset that includes chemical attributes of water, such as pH, hardness, solids, chloramines, sulfate, and others. This study evaluates the performance of the models with and without AquaAugmentor. Each model applied to classify water as potable or non-potable and its performance is then evaluated and compared based on test accuracy and AUC score. The results highlight the strengths and limitations of our proposed algorithm, providing insights into the most effective techniques for improving the predictive performance of water quality classification. This study contributes to the broader efforts of ensuring safe water access and serves as a framework for employing machine learning in environmental quality assessments. The findings aim to assist researchers, policymakers, and public health officials in making informed decisions based on reliable machine learning predictions.", "arxiv_id": "2607.15775", "arxiv_url": "https://arxiv.org/abs/2607.15775", "authors": ["Muntasir Tabasum", "Al Zadid Sultan Bin Habib", "Tanpia Tasnim", "Md. Ekramul Islam", "Md Younus Ahamed", "Md Asif Bin Syed"], "brief": "\u63d0\u51faAquaAugmentor\u7279\u5f81\u589e\u5f3a\u7b97\u6cd5\uff0c\u7528\u4e8e\u63d0\u5347\u4f4e\u7ef4\u6570\u636e\u96c6\u4e0a\u6c34\u8d28\u53ef\u996e\u7528\u6027\u9884\u6d4b\u7684\u673a\u5668\u5b66\u4e60\u4e0e\u6df1\u5ea6\u5b66\u4e60\u6a21\u578b\u6027\u80fd\u3002\u901a\u8fc7\u5bf9pH\u3001\u786c\u5ea6\u3001\u6c2f\u80fa\u7b49\u5316\u5b66\u5c5e\u6027\u6570\u636e\u7684\u5b9e\u9a8c\uff0c\u9a8c\u8bc1\u4e86\u8be5\u7b97\u6cd5\u5728\u6d4b\u8bd5\u51c6\u786e\u7387\u548cAUC\u5206\u6570\u4e0a\u7684\u6539\u5584\u6548\u679c\u3002", "categories": ["cs.LG", "cs.AI", "cs.CE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15775", "impact_score": 4, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7279\u5f81\u589e\u5f3a", "\u6c34\u8d28\u9884\u6d4b", "\u673a\u5668\u5b66\u4e60", "\u5206\u7c7b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15775v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AquaAugmentor: A Novel Feature Augmentation Algorithm for Water Potability Prediction", "tldr": "\u63d0\u51faAquaAugmentor\u7279\u5f81\u589e\u5f3a\u7b97\u6cd5\uff0c\u7528\u4e8e\u63d0\u5347\u4f4e\u7ef4\u6570\u636e\u96c6\u4e0a\u6c34\u8d28\u53ef\u996e\u7528\u6027\u9884\u6d4b\u7684\u673a\u5668\u5b66\u4e60\u4e0e\u6df1\u5ea6\u5b66\u4e60\u6a21\u578b\u6027\u80fd\u3002\u901a\u8fc7\u5bf9pH\u3001\u786c\u5ea6\u3001\u6c2f\u80fa\u7b49\u5316\u5b66\u5c5e\u6027\u6570\u636e\u7684\u5b9e\u9a8c\uff0c\u9a8c\u8bc1\u4e86\u8be5\u7b97\u6cd5\u5728\u6d4b\u8bd5\u51c6\u786e\u7387\u548cAUC\u5206\u6570\u4e0a\u7684\u6539\u5584\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Explainable AI (XAI) for time series has seen significant algorithmic growth, but its utility in providing measurable performance gains for downstream tasks remains under-explored. This paper bridges this gap by introducing drXAI, a novel methodology that repurposes XAI attribution methods for effective data reduction in Time Series Classification (TSC). The core challenge in modern TSC is scalability; state-of-the-art models, such as Transformers, exhibit quadratic complexity relative to sequence length and linear complexity relative to the number of channels. This renders them computationally prohibitive for massive datasets. drXAI addresses this by using a fast, GPU-accelerated classifier (Hydra) to generate local attributions. We aggregate these into global feature importance scores and employ an automated elbow-cut heuristic to select the most salient features without requiring manual thresholds. We evaluate our approach on both synthetic and real-world univariate and multivariate datasets. On synthetic benchmarks, drXAI successfully recovers ground-truth features where traditional baselines fail. On real-world data, drXAI achieves between 80% and 90% data reduction while maintaining classification accuracy comparable to models trained on the full dataset. Most importantly, we show that drXAI allows resource-intensive models like ConvTran to scale to datasets that were previously inaccessible due to memory constraints. Our results show the benefits of using XAI not just for interpretability, but as a robust tool for feature selection and scalability in time series analysis. All our code and data are openly available.", "arxiv_id": "2607.15774", "arxiv_url": "https://arxiv.org/abs/2607.15774", "authors": ["Davide Italo Serramazza", "Thach Le Nguyen", "Georgiana Ifrim"], "brief": "\u63d0\u51fadrXAI\u65b9\u6cd5\uff0c\u5c06\u53ef\u89e3\u91caAI\uff08XAI\uff09\u5f52\u56e0\u6280\u672f\u7528\u4e8e\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b\u7684\u6570\u636e\u538b\u7f29\uff0c\u901a\u8fc7GPU\u52a0\u901f\u5206\u7c7b\u5668\u751f\u6210\u5168\u5c40\u7279\u5f81\u91cd\u8981\u6027\u5206\u6570\u5e76\u81ea\u52a8\u7b5b\u9009\u5173\u952e\u7279\u5f81\u3002\u5728\u771f\u5b9e\u6570\u636e\u96c6\u4e0a\u5b9e\u73b080%-90%\u7684\u6570\u636e\u91cf\u524a\u51cf\uff0c\u540c\u65f6\u4fdd\u6301\u5206\u7c7b\u7cbe\u5ea6\uff0c\u5e76\u4f7f\u539f\u672c\u56e0\u5185\u5b58\u9650\u5236\u65e0\u6cd5\u8fd0\u884c\u7684\u5927\u6a21\u578b\uff08\u5982ConvTran\uff09\u5f97\u4ee5\u6269\u5c55\u5e94\u7528\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15774", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b", "\u53ef\u89e3\u91caAI", "\u7279\u5f81\u9009\u62e9", "\u53ef\u6269\u5c55\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15774v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Scaling Time Series Classification via XAI-Driven Data Reduction", "tldr": "\u63d0\u51fadrXAI\u65b9\u6cd5\uff0c\u5c06\u53ef\u89e3\u91caAI\uff08XAI\uff09\u5f52\u56e0\u6280\u672f\u7528\u4e8e\u65f6\u95f4\u5e8f\u5217\u5206\u7c7b\u7684\u6570\u636e\u538b\u7f29\uff0c\u901a\u8fc7GPU\u52a0\u901f\u5206\u7c7b\u5668\u751f\u6210\u5168\u5c40\u7279\u5f81\u91cd\u8981\u6027\u5206\u6570\u5e76\u81ea\u52a8\u7b5b\u9009\u5173\u952e\u7279\u5f81\u3002\u5728\u771f\u5b9e\u6570\u636e\u96c6\u4e0a\u5b9e\u73b080%-90%\u7684\u6570\u636e\u91cf\u524a\u51cf\uff0c\u540c\u65f6\u4fdd\u6301\u5206\u7c7b\u7cbe\u5ea6\uff0c\u5e76\u4f7f\u539f\u672c\u56e0\u5185\u5b58\u9650\u5236\u65e0\u6cd5\u8fd0\u884c\u7684\u5927\u6a21\u578b\uff08\u5982ConvTran\uff09\u5f97\u4ee5\u6269\u5c55\u5e94\u7528\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Remote sensing offers an unparalleled vantage point for observing the Earth\u0027s long-term surface evolution, yet it demands that a model not only perceive land cover at isolated moments, but also track changes, memorize evolution histories, and reason across time and space. However, existing studies lack a systematic evaluation that dissects these distinct competencies. To fill this gap, we introduce ChronoBench, a multidimensional benchmark that decomposes this task into four progressive cognitive levels (i.e., Land Cover Perception, Temporal Recognition, Long-Term Memory, and Spatio-Temporal Reasoning). The ChronoBench comprises 12 sub-tasks and 17,689 rigorously validated QA (Question-Answer) pairs. Extensive evaluations reveal that mainstream MLLMs fall drastically behind human experts, with Long-Term Memory emerging as the most critical bottleneck. Motivated by this finding, we further propose GeoChrono, an MLLM with enhanced capabilities for tracing, memorizing, and reasoning about long-term geographic evolution. Leveraging the physical prior that geographic parcels remain spatially fixed while their semantics evolve, we design a Temporal Trajectory Encoder~(TempEnc) that constructs per-location temporal trajectories for dedicated land cover evolution modeling, and we introduce a Coarse-to-Fine Token Compressor~(C2FComp) that adaptively preserves dynamic regions while compressing the static background. To support training, we also construct ChronoInstruct, a 104K-sample instruction-tuning dataset spanning all competency levels for training. GeoChrono achieves state-of-the-art performance on ChronoBench, surpassing the leading commercial MLLMs by over 20%, while C2FComp reduces visual tokens by over 56% while retaining GeoChrono\u0027s 94.6% performance. The code and data will be available at https://github.com/IntelliSensing/GeoChrono", "arxiv_id": "2607.15768", "arxiv_url": "https://arxiv.org/abs/2607.15768", "authors": [
