const PAPERS = [{"abstract": "Despite strong capabilities in data understanding and decision-making, autonomous data science agents still heavily rely on trial-and-error workflows that involve expensive computation. This bottleneck motivates models that can anticipate the effects of data science operations before real execution. In this paper, we introduce the concept of Data Science World Model, which model the data science execution environment by predicting environment state transitions conditioned on current workflow states and candidate operations. We further propose DSWorld, a practical framework that combines structured state construction, cost-aware routing, lightweight real execution, and an LLM-based simulator for expensive operations. To support training, we construct an 8K-scale transition trajectory dataset and introduce Reflective World Model Optimization, an error-aware reinforcement learning strategy for improving transition prediction. Experiments show that DSWorld accelerates RL-based agent training by approximately $14\\times$ and search-based inference by approximately $3$-$6\\times$ while maintaining competitive performance, and outperforms the strongest LLM baseline by 35.6% on transition prediction tasks. The code is available at https://anonymous.4open.science/r/DSWorld.", "arxiv_id": "2607.15901", "arxiv_url": "https://arxiv.org/abs/2607.15901", "authors": ["Zherui Yang", "Fan Liu", "Hao Liu"], "brief": "\u63d0\u51fa\u6570\u636e\u79d1\u5b66\u4e16\u754c\u6a21\u578b\uff08DSWorld\uff09\uff0c\u901a\u8fc7\u9884\u6d4b\u6570\u636e\u79d1\u5b66\u64cd\u4f5c\u7684\u73af\u5883\u72b6\u6001\u8f6c\u79fb\uff0c\u66ff\u4ee3\u6602\u8d35\u7684\u771f\u5b9e\u6267\u884c\uff0c\u4ece\u800c\u5927\u5e45\u63d0\u5347\u81ea\u4e3b\u6570\u636e\u79d1\u5b66\u667a\u80fd\u4f53\u7684\u8bad\u7ec3\u4e0e\u63a8\u7406\u6548\u7387\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15901", "impact_score": 8, "is_agent d\u4f53\u9886\u57df\uff0c\u6709\u6548\u89e3\u51b3\u8bd5\u9519\u5f0f\u5de5\u4f5c\u6d41\u8ba1\u7b97\u5f00\u9500\u5927\u7684\u6838\u5fc3\u74f6\u9888\uff0c\u5bf9\u81ea\u52a8\u5316\u6570\u636e\u79d1\u5b66\u4e0eLLM\u667a\u80fd\u4f53\u6548\u7387\u63d0\u5347\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "While LLM agents demonstrate strong reasoning abilities in compact and well-defined scenarios, they struggle to maintain robustness and effectiveness when faced with large-scale, diverse, and dynamic real-world environments that demand seamless tool integration. To address this gap, we introduce ToolVerse, a comprehensive framework that scales up agentic RL environments and enables agents to perform complex long-horizon reasoning in Tool-Integrated Reasoning (TIR) tasks. First, ToolVerse automatically builds the massive executable agent training environments from nearly 400 real-world Model Context Protocols (MCPs) that contain about 4500 tools. Second, we propose a task design strategy based on a tool dependency graph, utilizing Dynamic Unlocking Sampling Algorithm to generate long-horizon tasks, and produce GUST (Graph Unlocking Sampling Tasks) dataset. Third, to alleviate the credit assigment problem in long-horizon agentic RL, we propose a fine-grained Turn-Aware Relative Advantage algorithm. We conduct extensive Agentic RL training using ToolVerse and evaluate our framework on serveral agentic benchmarks. Experimental results demonstrate that our framework significantly strengthens LLMs\u0027 capabilities in long-horizon tool use, achieving a marked performance boost and showcasing robust reasoning within dynamic environments.", "arxiv_id": "2607.15660", "arxiv_url": "https://arxiv.org/abs/2607.15660", "authors": ["Shuaiyu Zhou", "Fengpeng Yue", "Zengjie Hu", "Yuanzhe Shen", "Chenyang Zhang", "feng hong", "Cao Liu", "Ke Zeng"], "brief": "ToolVerse\u662f\u4e00\u4e2a\u9762\u5411\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u7684\u7efc\u5408\u6846\u67b6\uff0c\u901a\u8fc7\u8fd1400\u4e2a\u771f\u5b9eMCP\u534f\u8bae\uff08\u7ea64500\u4e2a\u5de5\u5177\uff09\u81ea\u52a8\u6784\u5efa\u5927\u89c4\u6a21\u53ef\u6267\u884c\u8bad\u7ec3\u73af\u5883\uff0c\u5e76\u63d0\u51fa\u57fa\u4e8e\u5de5\u5177\u4f9d\u8d56\u56fe\u7684\u957f\u7a0b\u4efb\u52a1\u751f\u6210\u7b56\u7565\uff0c\u663e\u8457\u589e\u5f3aLLM\u5728\u590d\u6742\u5de5\u5177\u96c6\u6210\u63a8\u7406\u4efb\u52a1\u4e2d\u7684\u8868\u73b0\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15660", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4ece\u8fd1400\u4e2a\u771f\u5b9eModel Context Protocols\uff08MCP\uff09\u4e2d\u81ea\u52a8\u6784\u5efa\u7ea64500\u4e2a\u5de5\u5177\u7684\u5927\u89c4\u6a21\u667a\u80fd\u4f53\u8bad\u7ec3\u73af\u5883", "\u57fa\u4e8e\u5de5\u5177\u4f9d\u8d56\u56fe\u8bbe\u8ba1\u52a8\u6001\u89e3\u9501\u91c7\u6837\u7b97\u6cd5\uff08DUSA\uff09\uff0c\u751f\u6210\u957f\u7a0b\u4efb\u52a1\u6570\u636e\u96c6GUST", "\u63d0\u51fa\u7ec6\u7c92\u5ea6Turn-Aware Relative Advantage\u7b97\u6cd5\uff0c\u7f13\u89e3\u957f\u7a0b\u667a\u80fd\u4f53RL\u4e2d\u7684\u4fe1\u7528\u5206\u914d\u95ee\u9898"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u5de5\u5177\u8c03\u7528", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15660v1", "published_at": "2026-07-17", "score": 0.5, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "ToolVerse: Unlocking Massive Environments and Long-Horizon Tasks for Agentic Reinforcement Learning", "tldr": "ToolVerse\u6846\u67b6\u5229\u7528400\u4e2aMCP\u534f\u8bae\u6784\u5efa\u5927\u89c4\u6a21\u5de5\u5177\u73af\u5883\uff0c\u63d0\u5347LLM\u667a\u80fd\u4f53\u957f\u7a0b\u5de5\u5177\u8c03\u7528\u80fd\u529b", "upvotes": 0, "what_it_is": "ToolVerse\u662f\u4e00\u4e2a\u9762\u5411\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u7684\u7efc\u5408\u6846\u67b6\uff0c\u901a\u8fc7\u8fd1400\u4e2a\u771f\u5b9eMCP\u534f\u8bae\uff08\u7ea64500\u4e2a\u5de5\u5177\uff09\u81ea\u52a8\u6784\u5efa\u5927\u89c4\u6a21\u53ef\u6267\u884c\u8bad\u7ec3\u73af\u5883\uff0c\u5e76\u63d0\u51fa\u57fa\u4e8e\u5de5\u5177\u4f9d\u8d56\u56fe\u7684\u957f\u7a0b\u4efb\u52a1\u751f\u6210\u7b56\u7565\uff0c\u663e\u8457\u589e\u5f3aLLM\u5728\u590d\u6742\u5de5\u5177\u96c6\u6210\u63a8\u7406\u4efb\u52a1\u4e2d\u7684\u8868\u73b0\u3002", "why_notable": "\u9996\u6b21\u5c06\u771f\u5b9e\u4e16\u754cMCP\u534f\u8bae\u5927\u89c4\u6a21\u5f15\u5165\u667a\u80fd\u4f53RL\u8bad\u7ec3\uff0c\u89e3\u51b3\u4e86\u957f\u7a0b\u5de5\u5177\u8c03\u7528\u573a\u666f\u4e0b\u73af\u5883\u89c4\u6a21\u4e0d\u8db3\u4e0e\u4fe1\u7528\u5206\u914d\u4e24\u5927\u6838\u5fc3\u96be\u9898\uff0c\u5bf9\u6784\u5efa\u5b9e\u7528\u5316\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning (RL) has become a key approach for training LLM agents, yet popular methods such as GRPO/RLOO rely on multiple independently sampled complete trajectories for advantage estimation. In long-horizon agentic tasks, such a uniform rollout strategy can waste budget on uninformative dead-end attempts, while promising intermediate states do not receive sufficient exploration. The multi-turn structure of agentic trajectories, with interleaved actions and observations, naturally supports organizing a trajectory group as a tree, where each turn serves as a decision point for exploration. This perspective reframes effective exploration as the problem of deciding where to branch. We propose Process-Scorer Guided Adaptive Tree Rollout (PATR), a quality-aware rollout framework for multi-turn agent RL. PATR uses task-appropriate process feedback to score partial trajectories, selectively branches from promising states, reuses shared prefixes, and conservatively stops degenerate paths to reduce wasted sampling. The resulting rollout groups remain compatible with standard policy optimization while providing more efficient exploration under the same training budget. We evaluate PATR on FrozenLake and the challenging SWE-Bench, which is largely unexplored by prior tree-rollout agent RL methods. Experiments show that PATR improves performance by up to +5.0 points on SWE-Bench and +9.3 points on FrozenLake, highlighting process-guided tree rollouts as an effective strategy for scalable multi-turn RL.", "arxiv_id": "2607.15610", "arxiv_url": "https://arxiv.org/abs/2607.15610", "authors": ["Xintong Li", "Sha Li", "Yuwei Zhang", "Changlong Yu", "Rongmei Lin", "Hongye Jin", "Shuyi Guan", "Xin Liu", "Linwei Li", "Qingyu Yin", "Jingbo Shang"], "brief": "\u63d0\u51faProcess-Scorer Guided Adaptive Tree Rollout\uff08PATR\uff09\uff0c\u4e00\u79cd\u9762\u5411\u591a\u8f6e\u667a\u80fd\u4f53RL\u7684\u8d28\u91cf\u611f\u77e5\u8f68\u8ff9\u5c55\u5f00\u6846\u67b6\uff0c\u901a\u8fc7\u8fc7\u7a0b\u8bc4\u5206\u5668\u5bf9\u90e8\u5206\u8f68\u8ff9\u6253\u5206\uff0c\u4ece\u6709\u6f5c\u529b\u7684\u4e2d\u95f4\u72b6\u6001\u9009\u62e9\u6027\u5206\u652f\uff0c\u5e76\u63d0\u524d\u7ec8\u6b62\u9000\u5316\u8def\u5f84\uff0c\u66ff\u4ee3\u4f20\u7edfGRPO/RLOO\u7684\u5747\u5300\u72ec\u7acb\u91c7\u6837\u7b56\u7565\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15610", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u591a\u8f6e\u667a\u80fd\u4f53\u8f68\u8ff9\u7ec4\u7ec7\u4e3a\u6811\u7ed3\u6784\uff0c\u6bcf\u4e2a\u5bf9\u8bdd\u8f6e\u6b21\u4f5c\u4e3a\u51b3\u7b56\u5206\u652f\u70b9\uff0c\u5b9e\u73b0\u66f4\u9ad8\u6548\u7684\u63a2\u7d22\u9884\u7b97\u5206\u914d", "\u5f15\u5165\u4efb\u52a1\u9002\u914d\u7684\u8fc7\u7a0b\u53cd\u9988\u8bc4\u5206\u5668\uff0c\u5bf9\u90e8\u5206\u8f68\u8ff9\u8bc4\u5206\u4ee5\u51b3\u5b9a\u5728\u54ea\u91cc\u5206\u652f\uff0c\u540c\u65f6\u590d\u7528\u5171\u4eab\u524d\u7f00\u964d\u4f4e\u8ba1\u7b97\u5f00\u9500", "\u5728SWE-Bench\u4e0a\u63d0\u5347+5.0\u5206\uff0c\u5728FrozenLake\u4e0a\u63d0\u5347+9.3\u5206\uff0c\u4e14\u4e0e\u6807\u51c6\u7b56\u7565\u4f18\u5316\u7b97\u6cd5\u517c\u5bb9"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15610v1", "published_at": "2026-07-17", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Process Reward Informed Tree Rollout for Effective Multi-Turn RL", "tldr": "\u63d0\u51faPATR\u6846\u67b6\uff0c\u7528\u8fc7\u7a0b\u8bc4\u5206\u5f15\u5bfc\u6811\u72b6\u5c55\u5f00\u63d0\u5347\u591a\u8f6e\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faProcess-Scorer Guided Adaptive Tree Rollout\uff08PATR\uff09\uff0c\u4e00\u79cd\u9762\u5411\u591a\u8f6e\u667a\u80fd\u4f53RL\u7684\u8d28\u91cf\u611f\u77e5\u8f68\u8ff9\u5c55\u5f00\u6846\u67b6\uff0c\u901a\u8fc7\u8fc7\u7a0b\u8bc4\u5206\u5668\u5bf9\u90e8\u5206\u8f68\u8ff9\u6253\u5206\uff0c\u4ece\u6709\u6f5c\u529b\u7684\u4e2d\u95f4\u72b6\u6001\u9009\u62e9\u6027\u5206\u652f\uff0c\u5e76\u63d0\u524d\u7ec8\u6b62\u9000\u5316\u8def\u5f84\uff0c\u66ff\u4ee3\u4f20\u7edfGRPO/RLOO\u7684\u5747\u5300\u72ec\u7acb\u91c7\u6837\u7b56\u7565\u3002", "why_notable": "\u9488\u5bf9\u957f\u7a0b\u667a\u80fd\u4f53\u4efb\u52a1\u4e2d\u5747\u5300\u91c7\u6837\u6d6a\u8d39\u9884\u7b97\u7684\u75db\u70b9\uff0c\u9996\u6b21\u5c06\u6811\u72b6\u5c55\u5f00\u4e0e\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\u7ed3\u5408\u5e94\u7528\u4e8eSWE-Bench\u7b49\u771f\u5b9e\u4ee3\u7801\u4efb\u52a1\uff0c\u4e3a\u591a\u8f6eRL\u8bad\u7ec3\u6548\u7387\u63d0\u5347\u63d0\u4f9b\u4e86\u5b9e\u7528\u4e14\u53ef\u6269\u5c55\u7684\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Agentic Artificial Intelligence (AI), enabled by Large Language Models, marks a shift from rule-based automation toward autonomous, goal-driven control of Next-Generation Networks (NGNs). Existing surveys treat the two domains in isolation, leaving protocol integration, evaluation, and standardization alignment underexplored. To address this gap, a two-part tutorial-and-survey is presented. Part I formalises the control, management, and AI-native planes of 5G and 6G. It then covers the foundations of agentic systems: reasoning, planning, tool use, multi-agent coordination, and evaluation. Part II maps agentic capabilities onto 5G/6G control surfaces, standardization, and major 6G initiatives. Finally, it identifies open challenges shaping autonomous telecommunications.", "arxiv_id": "2607.16066", "arxiv_url": "https://arxiv.org/abs/2607.16066", "authors": ["Mazene Ameur", "Abdelkader Mekrache", "Bouziane Brik", "Adlen Ksentini"], "brief": "\u672c\u6587\u4ee5\u6559\u7a0b+\u7efc\u8ff0\u53cc\u90e8\u5206\u5f62\u5f0f\uff0c\u7cfb\u7edf\u4ecb\u7ecd\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u7684\u667a\u80fd\u4f53AI\u5982\u4f55\u8d4b\u80fd\u4e0b\u4e00\u4ee3\u7f51\u7edc\uff085G/6G\uff09\uff0c\u6db5\u76d6\u63a7\u5236\u5e73\u9762\u5f62\u5f0f\u5316\u5efa\u6a21\u3001\u667a\u80fd\u4f53\u63a8\u7406\u89c4\u5212\u3001\u591a\u667a\u80fd\u4f53\u534f\u8c03\u53ca\u6807\u51c6\u5316\u5bf9\u9f50\u7b49\u5185\u5bb9\u3002", "categories": ["cs.NI", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16066", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c065G/6G\u7684\u63a7\u5236\u9762\u3001\u7ba1\u7406\u9762\u4e0eAI\u539f\u751f\u9762\u8fdb\u884c\u5f62\u5f0f\u5316\u5efa\u6a21\uff0c\u4e3a\u667a\u80fd\u4f53\u80fd\u529b\u6620\u5c04\u63d0\u4f9b\u7406\u8bba\u57fa\u7840", "\u7cfb\u7edf\u8986\u76d6\u667a\u80fd\u4f53\u6838\u5fc3\u80fd\u529b\uff1a\u63a8\u7406\u3001\u89c4\u5212\u3001\u5de5\u5177\u8c03\u7528\u3001\u591a\u667a\u80fd\u4f53\u534f\u8c03\u4e0e\u8bc4\u4f30\u65b9\u6cd5", "\u5c06\u667a\u80fd\u4f53\u80fd\u529b\u5bf9\u63a5\u81f35G/6G\u63a7\u5236\u63a5\u53e3\u3001\u4e3b\u6d41\u6807\u51c6\u5316\u7ec4\u7ec7\uff08\u59823GPP\u3001ETSI\uff09\u53ca6G\u91cd\u5927\u7814\u7a76\u8ba1\u5212"], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4e0b\u4e00\u4ee3\u7f51\u7edc", "\u6807\u51c6\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16066v1", "published_at": "2026-07-17", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "LLM-Powered Agentic AI for 5G/6G Networks: A Tutorial and Survey on Architectures, Protocols, and Standardization", "tldr": "\u7cfb\u7edf\u68b3\u7406LLM\u9a71\u52a8\u7684\u667a\u80fd\u4f53AI\u57285G/6G\u7f51\u7edc\u4e2d\u7684\u67b6\u6784\u3001\u534f\u8bae\u4e0e\u6807\u51c6\u5316\u8fdb\u5c55", "upvotes": 0, "what_it_is": "\u672c\u6587\u4ee5\u6559\u7a0b+\u7efc\u8ff0\u53cc\u90e8\u5206\u5f62\u5f0f\uff0c\u7cfb\u7edf\u4ecb\u7ecd\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u7684\u667a\u80fd\u4f53AI\u5982\u4f55\u8d4b\u80fd\u4e0b\u4e00\u4ee3\u7f51\u7edc\uff085G/6G\uff09\uff0c\u6db5\u76d6\u63a7\u5236\u5e73\u9762\u5f62\u5f0f\u5316\u5efa\u6a21\u3001\u667a\u80fd\u4f53\u63a8\u7406\u89c4\u5212\u3001\u591a\u667a\u80fd\u4f53\u534f\u8c03\u53ca\u6807\u51c6\u5316\u5bf9\u9f50\u7b49\u5185\u5bb9\u3002", "why_notable": "\u9996\u7bc7\u540c\u65f6\u8986\u76d6LLM\u667a\u80fd\u4f53\u4e0e5G/6G\u7f51\u7edc\u534f\u8bae/\u6807\u51c6\u5316\u7684\u7cfb\u7edf\u6027\u7efc\u8ff0\uff0c\u586b\u8865\u4e86\u4e24\u4e2a\u9886\u57df\u5272\u88c2\u7814\u7a76\u7684\u7a7a\u767d\uff0c\u5bf9\u7535\u4fe1AI\u843d\u5730\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Large language models (LLMs) are improving rapidly as reflected in benchmark scores, yet these AI benchmarks largely test capabilities such as factual recall, narrow question answering, mathematical problem-solving, and coding and agentic tool-use. What remains poorly measured is AI progress on the analytical knowledge work white-collar professionals perform daily, including synthesizing complex information, exercising judgment under uncertainty and incomplete information, applying strategic and adversarial thinking in multi-stakeholder settings, weighing trade-offs, and producing defensible, structured analyses. This gap is even more pronounced for subjective components of such work, where success can be challenging to define. The \"case method\" form of education practiced by top business schools provides a natural foundation for addressing this measurement gap, and we construct BusinessCaseBench, a benchmark spanning hundreds of questions drawn from business cases across eighteen disciplines, each paired with a grading rubric derived from the expert-written instructor case solution. On BusinessCaseBench, frontier AI models already score highly against instructor rubrics, and capability within one model family improves substantially over two years. These results provide strong evidence that AI performance on this class of work is already high and rapidly improving, with implications for business schools, where case pedagogy trains undergraduates and MBAs in this kind of analytical reasoning, and for entry-level professional roles, where such skills have historically anchored early-career work.", "arxiv_id": "2607.16057", "arxiv_url": "https://arxiv.org/abs/2607.16057", "authors": ["Ajay Patel", "Kartik Hosanagar", "Ramayya Krishnan", "Chris Callison-Burch", "Karim Lakhani", "Mitch Weiss"], "brief": "\u63d0\u51faBusinessCaseBench\u57fa\u51c6\uff0c\u6db5\u76d618\u4e2a\u5546\u4e1a\u5b66\u79d1\u6570\u767e\u9053\u9898\u76ee\uff0c\u6bcf\u9898\u914d\u6709\u4e13\u5bb6\u8bc4\u5206\u6807\u51c6\uff0c\u7528\u4e8e\u8861\u91cfAI\u5728\u7efc\u5408\u5206\u6790\u3001\u4e0d\u786e\u5b9a\u6027\u5224\u65ad\u3001\u591a\u65b9\u535a\u5f08\u7b49\u590d\u6742\u77e5\u8bc6\u5de5\u4f5c\u4e0a\u7684\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16057", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u73b0\u6709AI\u57fa\u51c6\u4e3b\u8981\u6d4b\u8bd5\u4e8b\u5b9e\u8bb0\u5fc6\u3001\u6570\u5b66\u89e3\u9898\u3001\u7f16\u7a0b\u7b49\uff0c\u7f3a\u4e4f\u5bf9\u767d\u9886\u5206\u6790\u6027\u77e5\u8bc6\u5de5\u4f5c\u7684\u8bc4\u4f30", "\u57fa\u4e8e\u9876\u7ea7\u5546\u5b66\u9662\u6848\u4f8b\u6559\u5b66\u6cd5\u6784\u5efa\uff0c\u9898\u76ee\u6765\u81ea18\u4e2a\u5546\u4e1a\u5b66\u79d1\uff0c\u914d\u6709\u4e13\u5bb6\u64b0\u5199\u7684\u8bc4\u5206\u6807\u51c6", "\u524d\u6cbfAI\u6a21\u578b\u5728\u8be5\u57fa\u51c6\u4e0a\u5df2\u5f97\u5206\u8f83\u9ad8\uff0c\u4e14\u540c\u4e00\u6a21\u578b\u5bb6\u65cf\u5728\u4e24\u5e74\u5185\u80fd\u529b\u5927\u5e45\u63d0\u5347"], "keywords": ["\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u5de5\u4f5c", "\u63a8\u7406\u80fd\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16057v1", "published_at": "2026-07-17", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Frontier AI performance across the business disciplines: a case-grounded benchmark of knowledge work and analytical reasoning", "tldr": "\u6784\u5efa\u5546\u4e1a\u6848\u4f8b\u57fa\u51c6\u6d4b\u8bd5BusinessCaseBench\uff0c\u8bc4\u4f30\u524d\u6cbfAI\u5728\u590d\u6742\u5206\u6790\u6027\u77e5\u8bc6\u5de5\u4f5c\u4e2d\u7684\u8868\u73b0", "upvotes": 0, "what_it_is": "\u63d0\u51faBusinessCaseBench\u57fa\u51c6\uff0c\u6db5\u76d618\u4e2a\u5546\u4e1a\u5b66\u79d1\u6570\u767e\u9053\u9898\u76ee\uff0c\u6bcf\u9898\u914d\u6709\u4e13\u5bb6\u8bc4\u5206\u6807\u51c6\uff0c\u7528\u4e8e\u8861\u91cfAI\u5728\u7efc\u5408\u5206\u6790\u3001\u4e0d\u786e\u5b9a\u6027\u5224\u65ad\u3001\u591a\u65b9\u535a\u5f08\u7b49\u590d\u6742\u77e5\u8bc6\u5de5\u4f5c\u4e0a\u7684\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u8bc4\u4f30AI\u5728\u590d\u6742\u5546\u4e1a\u5206\u6790\u63a8\u7406\u4e0a\u7684\u80fd\u529b\uff0c\u5bf9\u5546\u5b66\u9662\u6848\u4f8b\u6559\u5b66\u548c\u521d\u7ea7\u804c\u573a\u5c97\u4f4d\u7684\u672a\u6765\u5f71\u54cd\u5177\u6709\u91cd\u8981\u73b0\u5b9e\u610f\u4e49"}, {"abstract": "Multimodal Scientific Claim Verification (MSCV) requires models to verify scientific claims using visually grounded evidence from papers, including figures, tables, charts, and textual context. However, existing methods often fail because they struggle to locate decisive visual evidence, accurately read structured scientific visuals, and integrate multimodal observations into reliable reasoning. We introduce ToolSciVer, the first tool-augmented framework for MSCV to our knowledge. ToolSciVer equips a VLM with three type-aware visual tools, table row/column focus, chart-to-structure parsing, and high-resolution region zoom, which convert dense scientific visuals into explicit, claim-facing evidence, and trains the policy with Group Relative Policy Optimization (GRPO) under a composite reward of answer correctness, format validity, length control, tool-use efficiency, and tool-validity penalties. Experiments on SciVer and MuSciClaims datasets on five VLMs from three model families (Qwen, InternVL, Gemma) demonstrate that our method achieves superior performance compared to four competitive baselines including prompting-based and RL-based tool-use methods, highlighting the effectiveness of learned, type-aware tool use for scientific claim verification.", "arxiv_id": "2607.16131", "arxiv_url": "https://arxiv.org/abs/2607.16131", "authors": ["Binglin Zhou", "Peng Shi", "Ryo Kamoi", "Nan Zhang", "Rui Zhang"], "brief": "\u63d0\u51faToolSciVer\u6846\u67b6\uff0c\u4e3a\u591a\u6a21\u6001\u79d1\u5b66\u58f0\u660e\u9a8c\u8bc1\uff08MSCV\uff09\u4efb\u52a1\u914d\u5907\u4e09\u79cd\u7c7b\u578b\u611f\u77e5\u89c6\u89c9\u5de5\u5177\uff08\u8868\u683c\u884c\u5217\u805a\u7126\u3001\u56fe\u8868\u7ed3\u6784\u89e3\u6790\u3001\u9ad8\u5206\u8fa8\u7387\u533a\u57df\u7f29\u653e\uff09\uff0c\u5e76\u901a\u8fc7GRPO\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u7b56\u7565\uff0c\u5c06\u5bc6\u96c6\u79d1\u5b66\u56fe\u8868\u8f6c\u5316\u4e3a\u663e\u5f0f\u8bc1\u636e\u4ee5\u9a8c\u8bc1\u79d1\u5b66\u58f0\u660e\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16131", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u79cd\u7c7b\u578b\u611f\u77e5\u89c6\u89c9\u5de5\u5177\uff1a\u8868\u683c\u884c/\u5217\u805a\u7126\u3001\u56fe\u8868\u8f6c\u7ed3\u6784\u89e3\u6790\u3001\u9ad8\u5206\u8fa8\u7387\u533a\u57df\u7f29\u653e\uff0c\u4e13\u95e8\u5904\u7406\u79d1\u5b66\u56fe\u8868", "\u91c7\u7528GRPO\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u590d\u5408\u5956\u52b1\u51fd\u6570\u6db5\u76d6\u7b54\u6848\u6b63\u786e\u6027\u3001\u683c\u5f0f\u6709\u6548\u6027\u3001\u957f\u5ea6\u63a7\u5236\u3001\u5de5\u5177\u4f7f\u7528\u6548\u7387\u53ca\u5de5\u5177\u6709\u6548\u6027\u60e9\u7f5a", "\u5728SciVer\u548cMuSciClaims\u6570\u636e\u96c6\u4e0a\uff0c\u8de8Qwen/InternVL/Gemma\u4e09\u4e2a\u6a21\u578b\u5bb6\u65cf\u7684\u4e94\u4e2aVLM\u4e0a\u5747\u4f18\u4e8e\u56db\u4e2a\u7ade\u4e89\u57fa\u7ebf"], "keywords": ["\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60", "\u79d1\u5b66\u9a8c\u8bc1", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16131v1", "published_at": "2026-07-17", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ToolSciVer: Multimodal Scientific Claim Verification with Visual Tool Augmented Reinforcement Learning", "tldr": "\u9996\u4e2a\u5de5\u5177\u589e\u5f3a\u7684\u591a\u6a21\u6001\u79d1\u5b66\u58f0\u660e\u9a8c\u8bc1\u6846\u67b6\uff0c\u7ed3\u5408\u89c6\u89c9\u5de5\u5177\u4e0e\u5f3a\u5316\u5b66\u4e60\u63d0\u5347\u9a8c\u8bc1\u51c6\u786e\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51faToolSciVer\u6846\u67b6\uff0c\u4e3a\u591a\u6a21\u6001\u79d1\u5b66\u58f0\u660e\u9a8c\u8bc1\uff08MSCV\uff09\u4efb\u52a1\u914d\u5907\u4e09\u79cd\u7c7b\u578b\u611f\u77e5\u89c6\u89c9\u5de5\u5177\uff08\u8868\u683c\u884c\u5217\u805a\u7126\u3001\u56fe\u8868\u7ed3\u6784\u89e3\u6790\u3001\u9ad8\u5206\u8fa8\u7387\u533a\u57df\u7f29\u653e\uff09\uff0c\u5e76\u901a\u8fc7GRPO\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u7b56\u7565\uff0c\u5c06\u5bc6\u96c6\u79d1\u5b66\u56fe\u8868\u8f6c\u5316\u4e3a\u663e\u5f0f\u8bc1\u636e\u4ee5\u9a8c\u8bc1\u79d1\u5b66\u58f0\u660e\u3002", "why_notable": "\u9996\u6b21\u5c06\u5de5\u5177\u589e\u5f3a\u4e0e\u5f3a\u5316\u5b66\u4e60\u7ed3\u5408\u7528\u4e8e\u79d1\u5b66\u58f0\u660e\u9a8c\u8bc1\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u65b9\u6cd5\u5728\u5b9a\u4f4d\u89c6\u89c9\u8bc1\u636e\u3001\u89e3\u8bfb\u7ed3\u6784\u5316\u79d1\u5b66\u56fe\u8868\u65b9\u9762\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5bf9\u79d1\u5b66\u6587\u732e\u81ea\u52a8\u5ba1\u6838\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Scientific work increasingly spans heterogeneous artifacts -- papers, code, datasets, scientific file formats, model outputs, figures, manuscripts, and team decisions -- yet general-purpose AI assistants rarely preserve these objects as a coherent, auditable research state. We present SciForge, a multimodal research-native AI workbench that reserves the graphical interface for human judgment while search, parsing, model routing, workflow execution, plotting, writing, and presentation generation run as modular agent-accessible services. SciForge is built around five pillars: (i) \\emph{goal-scoped scientific decision governance} for \\textbf{goal-oriented} research, with review gates and shared review surfaces; (ii) \\emph{translate-then-reason} for \\textbf{multimodal} input, routing scientific objects through domain translators before the agent reasons; (iii) \\emph{evidence governance} for \\textbf{auditable} traceability, linking claims to provenance chains and audit findings; (iv) \\emph{collaborative team science} for \\textbf{collaborative} research, enabling multi-role decision governance, with shared team workspaces planned for future releases; and (v) \\emph{real-world application scenarios} for \\textbf{practical} impact, demonstrated through eight end-to-end user cases, with flagship demonstrations including multi-day agentic research sprints for gene discovery, AI-guided de novo protein design, molecular optimization, and genome-to-BGC discovery. The system combines a thin interaction layer, contextual research capability patterns, an Agent Runtime and Workflow Engine, an Evidence-DAG audit sidecar and a Scientific Model Router. SciForge currently runs as a desktop application, with mobile supervision support; future releases will deepen team collaboration. The system is open-source and available at https://github.com/AGI4Sci/SciForge", "arxiv_id": "2607.16038", "arxiv_url": "https://arxiv.org/abs/2607.16038", "authors": ["SciForge Team", "Zhangyang Gao", "Minghao Fang", "Yifei Liu", "Hanhui Yang", "Xinyu Gu", "Shixiang Tang", "Siqi Sun", "Lei Bai", "Cheng Tan", "Mengdi Liu", "Hao Wu", "Shuizhou Chen"], "brief": "SciForge\u662f\u4e00\u4e2a\u5f00\u6e90\u7684\u591a\u6a21\u6001\u79d1\u7814AI\u5de5\u4f5c\u53f0\uff0c\u5c06\u8bba\u6587\u3001\u4ee3\u7801\u3001\u6570\u636e\u96c6\u3001\u56fe\u8868\u7b49\u5f02\u6784\u79d1\u7814\u5bf9\u8c61\u7edf\u4e00\u7ba1\u7406\uff0c\u901a\u8fc7\u6a21\u5757\u5316\u667a\u80fd\u4f53\u670d\u52a1\u652f\u6301\u4ece\u6587\u732e\u68c0\u7d22\u5230\u86cb\u767d\u8d28\u8bbe\u8ba1\u7b49\u5b8c\u6574\u79d1\u7814\u6d41\u7a0b\uff0c\u540c\u65f6\u4fdd\u6301\u4eba\u7c7b\u5bf9\u5173\u952e\u51b3\u7b56\u7684\u638c\u63a7\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16038", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4e94\u5927\u6838\u5fc3\u652f\u67f1\uff1a\u76ee\u6807\u5bfc\u5411\u7684\u79d1\u5b66\u51b3\u7b56\u6cbb\u7406\u3001\u5148\u7ffb\u8bd1\u540e\u63a8\u7406\u7684\u591a\u6a21\u6001\u5904\u7406\u3001\u57fa\u4e8e\u8bc1\u636eDAG\u7684\u53ef\u5ba1\u8ba1\u6eaf\u6e90\u3001\u534f\u4f5c\u56e2\u961f\u79d1\u5b66\u652f\u6301\u3001\u4ee5\u53ca\u516b\u4e2a\u7aef\u5230\u7aef\u771f\u5b9e\u5e94\u7528\u573a\u666f\u9a8c\u8bc1", "\u7cfb\u7edf\u67b6\u6784\u5305\u542b\u8584\u4ea4\u4e92\u5c42\u3001Agent\u8fd0\u884c\u65f6\u4e0e\u5de5\u4f5c\u6d41\u5f15\u64ce\u3001Evidence-DAG\u5ba1\u8ba1\u65c1\u8def\u548c\u79d1\u5b66\u6a21\u578b\u8def\u7531\u5668\uff0c\u652f\u6301\u57fa\u56e0\u53d1\u73b0\u3001\u86cb\u767d\u8d28\u8bbe\u8ba1\u3001\u5206\u5b50\u4f18\u5316\u7b49\u591a\u65e5\u81ea\u4e3b\u7814\u7a76\u51b2\u523a", "\u5df2\u5f00\u6e90\uff08GitHub: AGI4Sci/SciForge\uff09\uff0c\u5f53\u524d\u4ee5\u684c\u9762\u5e94\u7528\u5f62\u5f0f\u8fd0\u884c\uff0c\u652f\u6301\u79fb\u52a8\u7aef\u76d1\u7763\uff0c\u672a\u6765\u5c06\u52a0\u5f3a\u56e2\u961f\u534f\u4f5c\u529f\u80fd"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u79d1\u5b66\u53d1\u73b0", "\u5de5\u4f5c\u6d41"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16038v1", "published_at": "2026-07-17", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SciForge: An AI-Native, Multimodal Workbench for Scientific Discovery", "tldr": "SciForge\uff1a\u9762\u5411\u79d1\u5b66\u53d1\u73b0\u7684\u591a\u6a21\u6001AI\u539f\u751f\u7814\u7a76\u5de5\u4f5c\u53f0\uff0c\u652f\u6301\u53ef\u5ba1\u8ba1\u7684\u7aef\u5230\u7aef\u79d1\u7814\u6d41\u7a0b", "upvotes": 0, "what_it_is": "SciForge\u662f\u4e00\u4e2a\u5f00\u6e90\u7684\u591a\u6a21\u6001\u79d1\u7814AI\u5de5\u4f5c\u53f0\uff0c\u5c06\u8bba\u6587\u3001\u4ee3\u7801\u3001\u6570\u636e\u96c6\u3001\u56fe\u8868\u7b49\u5f02\u6784\u79d1\u7814\u5bf9\u8c61\u7edf\u4e00\u7ba1\u7406\uff0c\u901a\u8fc7\u6a21\u5757\u5316\u667a\u80fd\u4f53\u670d\u52a1\u652f\u6301\u4ece\u6587\u732e\u68c0\u7d22\u5230\u86cb\u767d\u8d28\u8bbe\u8ba1\u7b49\u5b8c\u6574\u79d1\u7814\u6d41\u7a0b\uff0c\u540c\u65f6\u4fdd\u6301\u4eba\u7c7b\u5bf9\u5173\u952e\u51b3\u7b56\u7684\u638c\u63a7\u3002", "why_notable": "\u9996\u4e2a\u5c06\u79d1\u7814\u5168\u6d41\u7a0b\uff08\u641c\u7d22\u3001\u89e3\u6790\u3001\u5efa\u6a21\u3001\u7ed8\u56fe\u3001\u5199\u4f5c\u3001\u6c47\u62a5\uff09\u6574\u5408\u4e3a\u53ef\u5ba1\u8ba1\u667a\u80fd\u4f53\u5de5\u4f5c\u53f0\u7684\u5f00\u6e90\u7cfb\u7edf\uff0c\u5c24\u5176\u5728\u751f\u547d\u79d1\u5b66\u9886\u57df\u5c55\u793a\u4e86\u591a\u65e5\u81ea\u4e3b\u7814\u7a76\u80fd\u529b\uff0c\u5bf9\u52a0\u901f\u79d1\u5b66\u53d1\u73b0\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Workflow generation in visual creation systems such as ComfyUI demands not only syntactic accuracy but also expert-level reasoning over modular compositions. Existing large language model (LLM) approaches often treat this as a direct text-to-JSON generation task, struggling with structural brittleness and lacking the experiential knowledge required for effective design. We argue that successful workflow generation requires modeling knowledge itself, including its structure, hierarchy, and reasoning dynamics. To this end, we propose a knowledge-centric framework that learns to invert, inject, and infer with knowledge across multiple abstraction levels. We first perform knowledge inversion to distill hierarchical representations, ranging from full pseudo-codes and skeletons to high-level strategies, from large collections of real-world workflows. We then conduct knowledge injection through supervised fine-tuning, teaching the model to reason from task descriptions to strategies and from strategies to executable structures. During inference, the model performs reversible reasoning to synthesize executable workflows, augmented by self-refinement for structural coherence. Extensive experiments demonstrate that our method produces workflows with richer node diversity, more coherent structures, and higher execution success rates than existing systems, establishing a new foundation for knowledge-driven, agentic workflow generation.", "arxiv_id": "2607.15845", "arxiv_url": "https://arxiv.org/abs/2607.15845", "authors": ["Zhendong Li", "Lei Sun", "Ruibo Ming", "He Zhang", "Danda Pani Paudel", "Luc Van Gool", "Jinjin Gu"], "brief": "\u9488\u5bf9ComfyUI\u7b49\u89c6\u89c9\u521b\u4f5c\u7cfb\u7edf\u7684\u5de5\u4f5c\u6d41\u751f\u6210\u4efb\u52a1\uff0c\u63d0\u51fa\u4e00\u79cd\u77e5\u8bc6\u4e2d\u5fc3\u6846\u67b6\uff0c\u901a\u8fc7\u4ece\u771f\u5b9e\u5de5\u4f5c\u6d41\u4e2d\u63d0\u70bc\u5c42\u6b21\u5316\u77e5\u8bc6\u8868\u793a\uff08\u4f2a\u4ee3\u7801\u2192\u9aa8\u67b6\u2192\u7b56\u7565\uff09\uff0c\u5e76\u7ed3\u5408\u76d1\u7763\u5fae\u8c03\u4e0e\u53ef\u9006\u63a8\u7406\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u53ef\u6267\u884c\u5de5\u4f5c\u6d41\u7684\u81ea\u52a8\u751f\u6210\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15845", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u77e5\u8bc6\u9006\u8f6c\uff1a\u4ece\u5927\u91cf\u771f\u5b9e\u5de5\u4f5c\u6d41\u4e2d\u84b8\u998f\u51fa\u591a\u5c42\u6b21\u8868\u793a\uff0c\u5305\u62ec\u5b8c\u6574\u4f2a\u4ee3\u7801\u3001\u7ed3\u6784\u9aa8\u67b6\u548c\u9ad8\u5c42\u7b56\u7565", "\u77e5\u8bc6\u6ce8\u5165\uff1a\u901a\u8fc7\u76d1\u7763\u5fae\u8c03\u8bad\u7ec3\u6a21\u578b\u4ece\u4efb\u52a1\u63cf\u8ff0\u2192\u7b56\u7565\u2192\u53ef\u6267\u884c\u7ed3\u6784\u7684\u94fe\u5f0f\u63a8\u7406\u80fd\u529b", "\u63a8\u7406\u9636\u6bb5\u5f15\u5165\u53ef\u9006\u63a8\u7406\u4e0e\u81ea\u6211\u7cbe\u70bc\u673a\u5236\uff0c\u63d0\u5347\u7ed3\u6784\u4e00\u81f4\u6027\u4e0e\u6267\u884c\u6210\u529f\u7387"], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u4f5c\u6d41\u751f\u6210", "\u77e5\u8bc6\u8868\u793a", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15845v1", "published_at": "2026-07-17", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Knowledge-Centric Agents for Workflow Generation", "tldr": "\u63d0\u51fa\u77e5\u8bc6\u4e2d\u5fc3\u6846\u67b6\uff0c\u901a\u8fc7\u77e5\u8bc6\u9006\u8f6c\u3001\u6ce8\u5165\u4e0e\u63a8\u7406\u4e09\u9636\u6bb5\u751f\u6210\u9ad8\u8d28\u91cfComfyUI\u5de5\u4f5c\u6d41", "upvotes": 0, "what_it_is": "\u9488\u5bf9ComfyUI\u7b49\u89c6\u89c9\u521b\u4f5c\u7cfb\u7edf\u7684\u5de5\u4f5c\u6d41\u751f\u6210\u4efb\u52a1\uff0c\u63d0\u51fa\u4e00\u79cd\u77e5\u8bc6\u4e2d\u5fc3\u6846\u67b6\uff0c\u901a\u8fc7\u4ece\u771f\u5b9e\u5de5\u4f5c\u6d41\u4e2d\u63d0\u70bc\u5c42\u6b21\u5316\u77e5\u8bc6\u8868\u793a\uff08\u4f2a\u4ee3\u7801\u2192\u9aa8\u67b6\u2192\u7b56\u7565\uff09\uff0c\u5e76\u7ed3\u5408\u76d1\u7763\u5fae\u8c03\u4e0e\u53ef\u9006\u63a8\u7406\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u53ef\u6267\u884c\u5de5\u4f5c\u6d41\u7684\u81ea\u52a8\u751f\u6210\u3002", "why_notable": "\u9996\u6b21\u5c06\u5de5\u4f5c\u6d41\u751f\u6210\u95ee\u9898\u5efa\u6a21\u4e3a\u77e5\u8bc6\u7ed3\u6784\u5316\u95ee\u9898\u800c\u975e\u7b80\u5355\u6587\u672c\u8f6cJSON\u4efb\u52a1\uff0c\u5728\u8282\u70b9\u591a\u6837\u6027\u3001\u7ed3\u6784\u8fde\u8d2f\u6027\u548c\u6267\u884c\u6210\u529f\u7387\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\uff0c\u4e3a\u77e5\u8bc6\u9a71\u52a8\u7684\u667a\u80fd\u4f53\u5de5\u4f5c\u6d41\u751f\u6210\u63d0\u4f9b\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Humans combine reasoning and motor control to solve complex manipulation tasks under diverse constraints. They build an understanding of the physical world that helps them convert reasoning into actions and quickly adapt to new scenes, tasks, and rules. We refer to this capability as intuitive manipulation. Existing benchmarks fail to capture this integration: they evaluate physical reasoning in isolation from execution, or measure policy performance without requiring explicit reasoning. We introduce IMBENCH, a benchmark designed to evaluate intuitive manipulation as an integrated capability spanning perception, physical reasoning, action generation, and iterative execution. Our tasks require models to infer task-relevant physical structure and generate feasible action sequences under explicit constraints, including contact-rich manipulation, tool use, and multi-stage dependencies. We introduce a benchmark of 35 tasks, 14K filtered trajectories, and scalable tools for generating diverse scenarios. Experiments reveal a consistent gap: vision language models show partial physical reasoning ability but fail to produce executable plans, while state-of-the-art vision-language-action models struggle to satisfy task constraints and generalize across scenarios. These results identify intuitive manipulation as a missing axis in current foundation models and generalist robot policies, and position IMBENCH as a step toward evaluating and enabling more integrated, adaptive physical intelligence.", "arxiv_id": "2607.15641", "arxiv_url": "https://arxiv.org/abs/2607.15641", "authors": ["Anurag Maurya", "Sukhvansh Jain", "Prajwal Avhad", "Gautham Balachandran", "Ziyi Zhou", "Atharva Kshirsagar", "Satyam Singh", "Bowen Li. Rishabh Mukund", "Ritul Singh", "Jatin Vira", "Suvonil Chatterjee", "Devesh K. Jha"], "brief": "\u63d0\u51faIMBench\u57fa\u51c6\uff0c\u5c06\u611f\u77e5\u3001\u7269\u7406\u63a8\u7406\u3001\u52a8\u4f5c\u751f\u6210\u4e0e\u8fed\u4ee3\u6267\u884c\u6574\u5408\u8bc4\u4f30\uff0c\u6d4b\u8bd5\u673a\u5668\u4eba\u5728\u590d\u6742\u7ea6\u675f\u4e0b\u7684\"\u76f4\u89c9\u64cd\u4f5c\"\u80fd\u529b\uff0c\u5305\u542b35\u4e2a\u4efb\u52a1\u548c14K\u6761\u7b5b\u9009\u8f68\u8ff9\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15641", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u6db5\u76d6\u63a5\u89e6\u5bc6\u96c6\u578b\u64cd\u4f5c\u3001\u5de5\u5177\u4f7f\u7528\u3001\u591a\u9636\u6bb5\u4f9d\u8d56\u7b49\u4efb\u52a1\uff0c\u8981\u6c42\u6a21\u578b\u63a8\u65ad\u7269\u7406\u7ed3\u6784\u5e76\u751f\u6210\u53ef\u6267\u884c\u52a8\u4f5c\u5e8f\u5217", "\u5b9e\u9a8c\u53d1\u73b0VLM\u5177\u5907\u90e8\u5206\u7269\u7406\u63a8\u7406\u80fd\u529b\u4f46\u65e0\u6cd5\u751f\u6210\u53ef\u6267\u884c\u8ba1\u5212\uff0c\u800cSOTA\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u96be\u4ee5\u6ee1\u8db3\u4efb\u52a1\u7ea6\u675f\u5e76\u6cdb\u5316", "\u63d0\u4f9b\u53ef\u6269\u5c55\u7684\u573a\u666f\u751f\u6210\u5de5\u5177\uff0c\u652f\u6301\u591a\u6837\u5316\u573a\u666f\u6784\u5efa\uff0c\u8bc6\u522b\u51fa\u5f53\u524d\u57fa\u7840\u6a21\u578b\u7f3a\u5931\u7684\"\u76f4\u89c9\u64cd\u4f5c\"\u80fd\u529b\u7ef4\u5ea6"], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u57fa\u51c6\u6d4b\u8bd5", "\u7269\u7406\u63a8\u7406", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15641v1", "published_at": "2026-07-17", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "IMBench: A Benchmark for Intuitive Robotic Manipulation", "tldr": "IMBench\uff1a\u8bc4\u4f30\u673a\u5668\u4eba\u76f4\u89c9\u64cd\u4f5c\u80fd\u529b\u7684\u7efc\u5408\u57fa\u51c6\uff0c\u6db5\u76d6\u611f\u77e5\u3001\u7269\u7406\u63a8\u7406\u4e0e\u6267\u884c", "upvotes": 0, "what_it_is": "\u63d0\u51faIMBench\u57fa\u51c6\uff0c\u5c06\u611f\u77e5\u3001\u7269\u7406\u63a8\u7406\u3001\u52a8\u4f5c\u751f\u6210\u4e0e\u8fed\u4ee3\u6267\u884c\u6574\u5408\u8bc4\u4f30\uff0c\u6d4b\u8bd5\u673a\u5668\u4eba\u5728\u590d\u6742\u7ea6\u675f\u4e0b\u7684\"\u76f4\u89c9\u64cd\u4f5c\"\u80fd\u529b\uff0c\u5305\u542b35\u4e2a\u4efb\u52a1\u548c14K\u6761\u7b5b\u9009\u8f68\u8ff9\u3002", "why_notable": "\u73b0\u6709\u57fa\u51c6\u5c06\u7269\u7406\u63a8\u7406\u4e0e\u6267\u884c\u5272\u88c2\u8bc4\u4f30\uff0cIMBench\u9996\u6b21\u5c06\u4e24\u8005\u6574\u5408\uff0c\u63ed\u793a\u4e86\u5f53\u524dVLM\u548cVLA\u6a21\u578b\u7684\u5173\u952e\u77ed\u677f\uff0c\u4e3a\u901a\u7528\u673a\u5668\u4eba\u7b56\u7565\u7814\u7a76\u6307\u660e\u65b9\u5411\u3002"}, {"abstract": "LLM agents increasingly rely on tool calling to act on external systems, and the Model Context Protocol (MCP) has quickly become its de facto interface. Operating MCP at cloud scale, however, becomes difficult. On the tool provider side, legacy services are not directly callable through MCP; the rapid protocol development also creates ongoing compatibility cost. On the agent side, the number of accessible tool is limited by the LLM context window and inference overhead; mounting a large tool set increases token usage and inference latency and can reduce task success rate. Moreover, for stateful MCP backends with multiple replicas, preserving session affinity increases client-side complexity. We present a cloud-scale gateway system for MCP service. It breaks the direct-connect model on the data plane and offloads legacy service integration, consolidating incompatible MCP variants, access control, tool recommendation, and session-aware routing to the gateway. Hybrid retrieval sustains 98% Top-15 recall; it scales agent tool access to 3,000+ with high tool selection accuracy, and reduces tool selection time by $8.9\\times$ and token usage by $23.8\\times$, with low per-call overhead, stable under scale-out. Finally, we share the lessons learned from deploying the gateway system in production.", "arxiv_id": "2607.15593", "arxiv_url": "https://arxiv.org/abs/2607.15593", "authors": ["Mingxin Li", "Enge Song", "Yueshang Zuo", "Xiaodong Liu", "Rong Wen", "Qiang Fu", "Gianni Antichi", "Jian He", "Jing Tie", "Zhou Shao", "Xiaobo Xue", "Xiong Xiao", "Luyao Zhong", "Shaokai Zhang", "Jiangu Zhao", "Jianyuan Lu", "Shize Zhang", "Xiaoqing Sun", "Changgang Zheng", "Zihao Fan", "Haonan Li", "Tian Pan", "Xiaomin Wu", "Yang Song", "Xing Li", "Biao Lyu", "Meng Li", "Haipeng Dai", "Guihai Chen", "Shunmin Zhu"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u4e91\u89c4\u6a21\u7684MCP\uff08Model Context Protocol\uff09\u7f51\u5173\u7cfb\u7edf\uff0c\u901a\u8fc7\u6253\u7834\u76f4\u8fde\u6a21\u5f0f\uff0c\u5c06\u9057\u7559\u670d\u52a1\u96c6\u6210\u3001\u5de5\u5177\u63a8\u8350\u3001\u4f1a\u8bdd\u8def\u7531\u7b49\u529f\u80fd\u5378\u8f7d\u81f3\u7f51\u5173\u5c42\uff0c\u89e3\u51b3LLM\u667a\u80fd\u4f53\u5728\u4e91\u7aef\u5927\u89c4\u6a21\u5de5\u5177\u8c03\u7528\u7684\u6311\u6218\u3002", "categories": ["cs.DC", "cs.AI", "cs.NI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15593", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6df7\u5408\u68c0\u7d22\u65b9\u6848\u5b9e\u73b098% Top-15\u53ec\u56de\u7387\uff0c\u652f\u63013000+\u5de5\u5177\u7684\u9ad8\u7cbe\u5ea6\u9009\u62e9", "\u5de5\u5177\u9009\u62e9\u65f6\u95f4\u964d\u4f4e8.9\u500d\uff0cToken\u4f7f\u7528\u91cf\u51cf\u5c1123.8\u500d", "\u7f51\u5173\u7edf\u4e00\u5904\u7406MCP\u534f\u8bae\u517c\u5bb9\u6027\u3001\u8bbf\u95ee\u63a7\u5236\u3001\u4f1a\u8bdd\u4eb2\u548c\u8def\u7531\uff0c\u964d\u4f4e\u5ba2\u6237\u7aef\u590d\u6742\u5ea6"], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u4e91\u8ba1\u7b97", "LLM\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15593v1", "published_at": "2026-07-17", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Scalable LLM Agent Tool Access in the Cloud", "tldr": "\u4e91\u89c4\u6a21MCP\u7f51\u5173\u7cfb\u7edf\uff0c\u5c06LLM\u667a\u80fd\u4f53\u5de5\u5177\u8bbf\u95ee\u6269\u5c55\u81f33000+\uff0c\u5927\u5e45\u964d\u4f4e\u5ef6\u8fdf\u4e0eToken\u6d88\u8017", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u4e2a\u4e91\u89c4\u6a21\u7684MCP\uff08Model Context Protocol\uff09\u7f51\u5173\u7cfb\u7edf\uff0c\u901a\u8fc7\u6253\u7834\u76f4\u8fde\u6a21\u5f0f\uff0c\u5c06\u9057\u7559\u670d\u52a1\u96c6\u6210\u3001\u5de5\u5177\u63a8\u8350\u3001\u4f1a\u8bdd\u8def\u7531\u7b49\u529f\u80fd\u5378\u8f7d\u81f3\u7f51\u5173\u5c42\uff0c\u89e3\u51b3LLM\u667a\u80fd\u4f53\u5728\u4e91\u7aef\u5927\u89c4\u6a21\u5de5\u5177\u8c03\u7528\u7684\u6311\u6218\u3002", "why_notable": "MCP\u5df2\u6210\u4e3aLLM\u5de5\u5177\u8c03\u7528\u7684\u4e8b\u5b9e\u6807\u51c6\uff0c\u4f46\u4e91\u89c4\u6a21\u90e8\u7f72\u9762\u4e34\u4e0a\u4e0b\u6587\u7a97\u53e3\u74f6\u9888\u548c\u534f\u8bae\u788e\u7247\u5316\u95ee\u9898\uff1b\u672c\u6587\u63d0\u4f9b\u4e86\u7ecf\u751f\u4ea7\u9a8c\u8bc1\u7684\u5de5\u7a0b\u89e3\u51b3\u65b9\u6848\uff0c\u5bf9\u5927\u89c4\u6a21\u667a\u80fd\u4f53\u7cfb\u7edf\u843d\u5730\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Muon is competitive with AdamW in large-scale pre-training, but its value for reinforcement-learning (RL) post-training remains unclear. We study vanilla Muon in sparse-reward agentic RL through matched single-seed comparisons with AdamW on ALFWorld using Qwen2.5-0.5B-Instruct. Under Group-in-Group Policy Optimization (GiGPO), applying Muon only to hidden weight matrices raises final-window validation success from 0.290 to 0.546 (+88%); high-rate AdamW controls retain no post-update success. The effect depends on the advantage estimator and learning rate. At 3e-5, Muon improves GRPO from 0.161 to 0.268, whereas GraphGPO\u0027s late-window gap narrows near saturation. At 1e-5, GraphGPO Muon reaches 0.901, raises normalized validation AUC from 0.399 to 0.556, and reaches 0.5 and 0.75 success 30 and 60 updates earlier, respectively. These exploratory results show that Muon can benefit agentic RL and motivate studying the policy optimizer, advantage estimator, and learning rate jointly. Multi-seed and cross-task validation remain open.", "arxiv_id": "2607.16169", "arxiv_url": "https://arxiv.org/abs/2607.16169", "authors": ["Kai Ruan", "Jinghao Lin", "Zihe Huang", "Ziqi Zhou", "Qianshan Wei", "Xuan Wang", "Hao Sun"], "brief": "\u672c\u6587\u7814\u7a76\u4e86Muon\u4f18\u5316\u5668\u5728\u7a00\u758f\u5956\u52b1\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u4e2d\u7684\u6548\u679c\uff0c\u901a\u8fc7\u5728ALFWorld\u4efb\u52a1\u4e0a\u4e0eAdamW\u8fdb\u884c\u5bf9\u6bd4\u5b9e\u9a8c\uff0c\u53d1\u73b0Muon\u5728\u7279\u5b9a\u914d\u7f6e\u4e0b\u80fd\u5927\u5e45\u63d0\u5347\u7b56\u7565\u5b66\u4e60\u6548\u679c\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16169", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u5728GiGPO\u6846\u67b6\u4e0b\uff0c\u4ec5\u5bf9\u9690\u85cf\u6743\u91cd\u77e9\u9635\u5e94\u7528Muon\uff0c\u9a8c\u8bc1\u6210\u529f\u7387\u4ece0.290\u63d0\u5347\u81f30.546\uff08+88%\uff09\uff0c\u800c\u9ad8\u5b66\u4e60\u7387AdamW\u8bad\u7ec3\u540e\u6210\u529f\u7387\u5f52\u96f6", "\u5b66\u4e60\u73871e-5\u65f6\uff0cGraphGPO+Muon\u9a8c\u8bc1\u6210\u529f\u7387\u8fbe0.901\uff0c\u5f52\u4e00\u5316AUC\u4ece0.399\u63d0\u5347\u81f30.556\uff0c\u4e14\u5206\u522b\u63d0\u524d30\u548c60\u6b65\u8fbe\u52300.5\u548c0.75\u7684\u6210\u529f\u7387\u9608\u503c", "Muon\u7684\u6548\u679c\u9ad8\u5ea6\u4f9d\u8d56\u4f18\u52bf\u4f30\u8ba1\u5668\u7c7b\u578b\u4e0e\u5b66\u4e60\u7387\u7684\u8054\u5408\u914d\u7f6e\uff0c\u9700\u4e09\u8005\u534f\u540c\u8c03\u4f18"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u4f18\u5316\u5668", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16169v1", "published_at": "2026-07-17", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "When Does Muon Help Agentic Reinforcement Learning?", "tldr": "Muon\u4f18\u5316\u5668\u5728\u7a00\u758f\u5956\u52b1\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u4e2d\u663e\u8457\u4f18\u4e8eAdamW\uff0c\u6210\u529f\u7387\u6700\u9ad8\u63d0\u534788%", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u4e86Muon\u4f18\u5316\u5668\u5728\u7a00\u758f\u5956\u52b1\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u4e2d\u7684\u6548\u679c\uff0c\u901a\u8fc7\u5728ALFWorld\u4efb\u52a1\u4e0a\u4e0eAdamW\u8fdb\u884c\u5bf9\u6bd4\u5b9e\u9a8c\uff0c\u53d1\u73b0Muon\u5728\u7279\u5b9a\u914d\u7f6e\u4e0b\u80fd\u5927\u5e45\u63d0\u5347\u7b56\u7565\u5b66\u4e60\u6548\u679c\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63a2\u7d22Muon\u4f18\u5316\u5668\u5728LLM\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u4e2d\u7684\u4ef7\u503c\uff0c\u63ed\u793a\u4f18\u5316\u5668\u9009\u62e9\u5bf9\u7a00\u758f\u5956\u52b1RL\u7684\u5173\u952e\u5f71\u54cd\uff0c\u4e3a\u540e\u8bad\u7ec3\u4f18\u5316\u5668\u7814\u7a76\u5f00\u8f9f\u65b0\u65b9\u5411"}, {"abstract": "Coding agents can fix a failing example without preserving the domain rule that made it fail, so later generations can repeat the same plausible mistake. We present agentic synthesis against counterexample-supplemented sketches, a repository-native method for systems whose governing policy is discovered during implementation. A human starts with a partial, code-shaped sketch, and a coding agent generates the first implementation. When a concrete failure exposes missing or mistaken policy, an operator explicitly approves the corrected behavior and rule. The agent then revises the sketch and repairs or regenerates code and prompt surfaces for that one counterexample. The full archive preserves provenance; a selected regression set gates each revision before the next candidate is revealed; and periodic clean regeneration tests whether the evolved sketch, rather than prompt history or accumulated examples, carries the learned policy. We demonstrate the method with CatSynth, a synthetic browser application and captured coding-agent experiment. In one open-world run with GPT-5.4-mini, 8 of 14 frozen candidate cases became counterexamples. The rebuild controls inherited that promotion schedule, and all three paths passed the 8 accepted cases. Rebuilding from the evolved sketch passed 19 of 21 withheld cases, compared with 15 of 21 when rebuilding from the initial sketch and replaying all accepted examples. Retaining code across counterexamples required 9 Developer calls and 719 lines of cumulative artifact churn, versus 15 calls and 2,394 lines for replay-all, and passed 18 of 21 withheld cases. These results provide inspectable evidence that the evolved sketch carried reviewed policy and that retaining code reduced rework in this run; with one model and one reveal order, they do not establish general superiority or correctness beyond the encoded checks.", "arxiv_id": "2607.15854", "arxiv_url": "https://arxiv.org/abs/2607.15854", "authors": ["Muness Castle", "Eric Rubeck"], "brief": "\u63d0\u51fa\u4e00\u79cd\u4ed3\u5e93\u539f\u751f\u7684\u4ee3\u7801\u5408\u6210\u65b9\u6cd5\uff0c\u901a\u8fc7\u4eba\u5de5\u5ba1\u6838\u53cd\u4f8b\u5e76\u5c06\u4fee\u6b63\u540e\u7684\u884c\u4e3a\u89c4\u5219\u5199\u5165\u4ee3\u7801\u8349\u56fe\uff0c\u5f15\u5bfc\u7f16\u7801\u667a\u80fd\u4f53\u5728\u8fed\u4ee3\u4e2d\u4fdd\u7559\u9886\u57df\u7b56\u7565\u800c\u975e\u4ec5\u4fee\u590d\u5355\u4e2a\u5931\u8d25\u6848\u4f8b\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15854", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u4eba\u5de5\u4ece\u90e8\u5206\u4ee3\u7801\u8349\u56fe\u51fa\u53d1\uff0c\u7f16\u7801\u667a\u80fd\u4f53\u751f\u6210\u5b9e\u73b0\uff1b\u5f53\u51fa\u73b0\u5177\u4f53\u5931\u8d25\u65f6\uff0c\u64cd\u4f5c\u5458\u5ba1\u6279\u4fee\u6b63\u884c\u4e3a\u5e76\u66f4\u65b0\u8349\u56fe\uff0c\u786e\u4fdd\u7b56\u7565\u89c4\u5219\u88ab\u663e\u5f0f\u7f16\u7801", "\u5b9e\u9a8c\u4e2dGPT-4o-mini\u572814\u4e2a\u51bb\u7ed3\u5019\u9009\u6848\u4f8b\u4e2d\u67098\u4e2a\u6210\u4e3a\u53cd\u4f8b\uff1b\u4ece\u6f14\u5316\u8349\u56fe\u91cd\u5efa\u901a\u8fc721\u4e2a\u4fdd\u7559\u6848\u4f8b\u4e2d\u768419\u4e2a\u arge language model (LLM) agents are increasingly used for complex information-extraction tasks, yet it remains unclear whether agentic components such as reflection and memory lead to observable and controllable improvements over fixed LLM workflows. We study this question through conference-paper dataset extraction, where a system must identify datasets mentioned in scholarly PDFs and produce structured records. We compare a fixed workflow baseline with reflective agent variants and specify an optimized agent condition (S2) that extends the same task with richer PDF tools and dynamic tool selection. Our evaluation emphasizes process-level behavior--including tool execution, retries, reflection, memory use, runtime, and failure recovery--while treating extraction coverage and field completeness as secondary outcome measures. The paper characterizes when agentic mechanisms change system behavior, whether these changes improve task completion, and how the observed failure modes motivate an optimized agent design under the same evaluation harness.", "arxiv_id": "2607.15715", "arxiv_url": "https://arxiv.org/abs/2607.15715", "authors": ["Lujia Zhang", "Xingzhou Chen", "Hongwei Feng"], "brief": "\u901a\u8fc7\u5b66\u672fPDF\u6570\u636e\u96c6\u62bd\u53d6\u4efb\u52a1\uff0c\u7cfb\u7edf\u6bd4\u8f83\u56fa\u5b9a\u5de5\u4f5c\u6d41\u4e0e\u53cd\u601d\u578b\u667a\u80fd\u4f53\u53d8\u4f53\uff0c\u5206\u6790\u667a\u80fd\u4f53\u7ec4\u4ef6\uff08\u53cd\u601d\u3001\u8bb0\u5fc6\u3001\u52a8\u6001\u5de5\u5177\u9009\u62e9\uff09\u5bf9\u884c\u4e3a\u548c\u4efb\u52a1\u5b8c\u6210\u5ea6\u7684\u5b9e\u9645\u5f71\u54cd\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15715", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u4ee5\u8fc7\u7a0b\u7ea7\u884c\u4e3a\uff08\u5de5\u5177\u6267\u884c\u3001\u91cd\u8bd5\u3001\u53cd\u601d\u3001\u8bb0\u5fc6\u4f7f\u7528\u3001\u8fd0\u884c\u65f6\u95f4\u3001\u6545\u969c\u6062\u590d\uff09\u4e3a\u4e3b\u8981\u8bc4\u4f30\u7ef4\u5ea6\uff0c\u800c\u975e\u4ec5\u770b\u6700\u7ec8\u62bd\u53d6\u7ed3\u679c", "\u63d0\u51fa\u4f18\u5316\u667a\u80fd\u4f53\u6761\u4ef6S2\uff0c\u5f15\u5165\u66f4\u4e30\u5bcc\u7684PDF\u5de5\u5177\u96c6\u4e0e\u52a8\u6001\u5de5\u5177\u9009\u62e9\u673a\u5236", "\u63ed\u793a\u667a\u80fd\u4f53\u673a\u5236\u4f55\u65f6\u771f\u6b63\u6539\u53d8\u7cfb\u7edf\u884c\u4e3a\uff0c\u4ee5\u53ca\u89c2\u5bdf\u5230\u7684\u5931\u8d25\u6a21\u5f0f\u5982\u4f55\u9a71\u52a8\u4f18\u5316\u8bbe\u8ba1"], "keywords": ["\u667a\u80fd\u4f53", "\u4fe1\u606f\u62bd\u53d6", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5de5\u4f5c\u6d41"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15715v1", "published_at": "2026-07-17", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Behavioral Controllability of Agentic Models for Information Extraction: From Fixed Workflows to Reflective Agents", "tldr": "\u7814\u7a76LLM\u667a\u80fd\u4f53\u7684\u53cd\u601d\u4e0e\u8bb0\u5fc6\u673a\u5236\u662f\u5426\u5e26\u6765\u53ef\u63a7\u4e14\u53ef\u89c2\u6d4b\u7684\u4fe1\u606f\u62bd\u53d6\u6539\u8fdb", "upvotes": 0, "what_it_is": "\u901a\u8fc7\u5b66\u672fPDF\u6570\u636e\u96c6\u62bd\u53d6\u4efb\u52a1\uff0c\u7cfb\u7edf\u6bd4\u8f83\u56fa\u5b9a\u5de5\u4f5c\u6d41\u4e0e\u53cd\u601d\u578b\u667a\u80fd\u4f53\u53d8\u4f53\uff0c\u5206\u6790\u667a\u80fd\u4f53\u7ec4\u4ef6\uff08\u53cd\u601d\u3001\u8bb0\u5fc6\u3001\u52a8\u6001\u5de5\u5177\u9009\u62e9\uff09\u5bf9\u884c\u4e3a\u548c\u4efb\u52a1\u5b8c\u6210\u5ea6\u7684\u5b9e\u9645\u5f71\u54cd\u3002", "why_notable": "\u586b\u8865\u4e86LLM\u667a\u80fd\u4f53\u7ec4\u4ef6\uff08\u53cd\u601d/\u8bb0\u5fc6\uff09\u662f\u5426\u5e26\u6765\u53ef\u63a7\u6539\u8fdb\u7684\u5b9e\u8bc1\u7814\u7a76\u7a7a\u767d\uff0c\u5f3a\u8c03\u8fc7\u7a0b\u53ef\u89c2\u6d4b\u6027\uff0c\u5bf9\u6784\u5efa\u53ef\u9760\u4fe1\u606f\u62bd\u53d6\u667a\u80fd\u4f53\u5177\u6709\u5b9e\u8df5\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning (RL) has become central to improving large language models (LLMs) on complex reasoning tasks, yet RL post-training is largely studied in isolation from the pretraining that precedes it. As a result, two basic questions remain open: (1) how do pretraining choices (model size, data) shape the returns to RL compute, and (2) what does RL actually do to the model? These questions are difficult to study in the standard LLM setting: pretraining corpora are vast and uncontrolled, making it hard to attribute behaviors to pretraining versus RL, and systematic compute sweeps across both stages are prohibitively expensive. To address these challenges, we use chess as a controlled testbed for studying reasoning across the full pretraining-to-post-training pipeline. We follow the standard LLM training pipeline by pretraining language models from 5M to 1B parameters on human chess games, supervised fine-tuning on synthetic reasoning traces, and running RL on chess puzzles with verifiable rewards. Using this framework, we find that the post-RL performance at given RL compute level is well-predicted from the pretraining loss, and slope of the RL reward curves improves approximately linearly with the pretraining tokens. Beyond scaling, we find that RL does not simply sharpen the SFT policy: on easy puzzles it amplifies correct moves the SFT policy already preferred, while on hard puzzles it surfaces correct moves that were nearly absent under SFT. We further test whether our findings transfer beyond chess by training a 1B language model on math-domain text, where the same predictive pattern emerges: longer-pretrained checkpoints reach higher post-RL performance and improve faster under RL. In sum, we provide a quantitative account of the pretraining-to-RL interface and a controlled testbed for studying the science of reasoning across the full pretraining-to-post-training pipeline.", "arxiv_id": "2607.16097", "arxiv_url": "https://arxiv.org/abs/2607.16097", "authors": ["Jingyan Shen", "Ang Li", "Salman Rahman", "Yifan Sun", "Micah Goldblum", "Matus Telgarsky", "Pavel Izmailov"], "brief": "\u672c\u6587\u4ee5\u56fd\u9645\u8c61\u68cb\u4e3a\u53d7\u63a7\u5b9e\u9a8c\u73af\u5883\uff0c\u7cfb\u7edf\u7814\u7a76\u9884\u8bad\u7ec3\uff08\u6a21\u578b\u89c4\u6a21\u3001\u6570\u636e\u91cf\uff09\u5982\u4f55\u5f71\u54cdRL\u540e\u8bad\u7ec3\u7684\u6536\u76ca\uff0c\u5e76\u5206\u6790RL\u7a76\u7adf\u5bf9\u6a21\u578b\u505a\u4e86\u4ec0\u4e48\uff0c\u53d1\u73b0\u9884\u8bad\u7ec3\u635f\u5931\u53ef\u9884\u6d4bRL\u540e\u6027\u80fd\uff0c\u4e14\u8be5\u89c4\u5f8b\u5728\u6570\u5b66\u9886\u57df\u540c\u6837\u6210\u7acb\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": "https://github.com/pavelslab-nyu/pre2post-chess", "github_stars": 1, "hf_url": "https://huggingface.co/papers/2607.16097", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u9884\u8bad\u7ec3\u635f\u5931\u80fd\u826f\u597d\u9884\u6d4b\u7ed9\u5b9aRL\u8ba1\u7b97\u91cf\u4e0b\u7684\u540e\u8bad\u7ec3\u6027\u80fd\uff0cRL\u5956\u52b1\u66f2\u7ebf\u659c\u7387\u4e0e\u9884\u8bad\u7ec3token\u6570\u8fd1\u4f3c\u7ebf\u6027\u6b63\u76f8\u5173", "RL\u5bf9\u7b80\u5355\u9898\u76ee\u653e\u5927SFT\u5df2\u504f\u597d\u7684\u6b63\u786e\u52a8\u4f5c\uff0c\u5bf9\u96be\u9898\u5219\u6316\u6398\u51faSFT\u51e0\u4e4e\u672a\u51fa\u73b0\u7684\u6b63\u786e\u52a8\u4f5c\uff0c\u5e76\u975e\u7b80\u5355\u9510\u5316SFT\u7b56\u7565", "\u5728\u6570\u5b66\u9886\u57df1B\u6a21\u578b\u4e0a\u9a8c\u8bc1\u4e86\u76f8\u540c\u89c4\u5f8b\uff1a\u9884\u8bad\u7ec3\u66f4\u5145\u5206\u7684\u68c0\u67e5\u70b9\u5728RL\u540e\u8868\u73b0\u66f4\u9ad8\u4e14\u63d0\u5347\u66f4\u5feb"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406", "\u9884\u8bad\u7ec3"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16097v1", "published_at": "2026-07-17", "score": 0.257, "selected_reasons": ["HF trending (5\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16097.png", "title": "Understanding Reasoning from Pretraining to Post-Training", "tldr": "\u4ee5\u56fd\u9645\u8c61\u68cb\u4e3a\u53d7\u63a7\u5b9e\u9a8c\u53f0\uff0c\u63ed\u793a\u9884\u8bad\u7ec3\u4e0eRL\u540e\u8bad\u7ec3\u4e4b\u95f4\u7684\u5b9a\u91cf\u5173\u7cfb", "upvotes": 5, "what_it_is": "\u672c\u6587\u4ee5\u56fd\u9645\u8c61\u68cb\u4e3a\u53d7\u63a7\u5b9e\u9a8c\u73af\u5883\uff0c\u7cfb\u7edf\u7814\u7a76\u9884\u8bad\u7ec3\uff08\u6a21\u578b\u89c4\u6a21\u3001\u6570\u636e\u91cf\uff09\u5982\u4f55\u5f71\u54cdRL\u540e\u8bad\u7ec3\u7684\u6536\u76ca\uff0c\u5e76\u5206\u6790RL\u7a76\u7adf\u5bf9\u6a21\u578b\u505a\u4e86\u4ec0\u4e48\uff0c\u53d1\u73b0\u9884\u8bad\u7ec3\u635f\u5931\u53ef\u9884\u6d4bRL\u540e\u6027\u80fd\uff0c\u4e14\u8be5\u89c4\u5f8b\u5728\u6570\u5b66\u9886\u57df\u540c\u6837\u6210\u7acb\u3002", "why_notable": "\u9996\u6b21\u5728\u53d7\u63a7\u5b9e\u9a8c\u6846\u67b6\u4e0b\u5b9a\u91cf\u523b\u753b\u9884\u8bad\u7ec3\u4e0eRL\u540e\u8bad\u7ec3\u7684\u63a5\u53e3\u5173\u7cfb\uff0c\u4e3a\u7406\u89e3LLM\u63a8\u7406\u80fd\u529b\u6765\u6e90\u63d0\u4f9b\u79d1\u5b66\u4f9d\u636e\uff0c\u5bf9\u6a21\u578b\u8bad\u7ec3\u8d44\u6e90\u5206\u914d\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "We present Loopie, the most powerful looped Transformer to date. The Loopie series consists of two Mixture-of-Experts (MoE) models: a 20B-parameter model with 2B active parameters and a 6Bparameter model with 0.6B active parameters. Looped Transformers have long faced a challenge: given an N-fold increase in pre-training compute, increasing the parameter count by a factor of N usually outperforms looping a model N times. Loopie addresses this challenge. Extensive ablation studies, including comparisons with a vanilla 30B-A3B model, show that Loopie substantially outperforms vanilla Transformer baselines trained with the same compute budget. Our novel post-training pipeline equips Loopie with strong reasoning abilities. At the 2025 IMO and IPhO, Loopie achieves gold-medal performance without tools.", "arxiv_id": "2607.16051", "arxiv_url": "https://arxiv.org/abs/2607.16051", "authors": ["Zitian Gao", "Yilong Chen", "Yihao Xiao", "Xinyu Yang", "Ran Tao", "Joey Zhou", "Bryan Dai"], "brief": "\u63d0\u51faLoopie\u7cfb\u5217\u5faa\u73afTransformer\u6a21\u578b\uff0820B/6B\u53c2\u6570\uff0cMoE\u67b6\u6784\uff09\uff0c\u9996\u6b21\u8bc1\u660e\u5faa\u73afTransformer\u5728\u76f8\u540c\u9884\u8bad\u7ec3\u7b97\u529b\u4e0b\u53ef\u8d85\u8d8a\u7b49\u7b97\u529b\u7684\u666e\u901aTransformer\u57fa\u7ebf\uff0c\u5e76\u57282025\u5e74IMO\u548cIPhO\u7ade\u8d5b\u4e2d\u65e0\u5de5\u5177\u8fbe\u5230\u91d1\u724c\u6c34\u5e73\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16051", "impact_score": 9, "is_agent": false, "is_top": true, "key_points": ["\u91c7\u7528\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09\u67b6\u6784\uff1a20B\u603b\u53c2\u6570/2B\u6fc0\u6d3b\u53c2\u6570 \u548c 6B\u603b\u53c2\u6570/0.6B\u6fc0\u6d3b\u53c2\u6570\u4e24\u4e2a\u7248\u672c", "\u901a\u8fc7\u5927\u91cf\u6d88\u878d\u5b9e\u9a8c\uff08\u542b\u4e0e30B-A3B\u666e\u901a\u6a21\u578b\u5bf9\u6bd4\uff09\u8bc1\u660e\u5faa\u73afN\u6b21\u4f18\u4e8e\u53c2\u6570\u6269\u5927N\u500d", "\u65b0\u9896\u7684\u540e\u8bad\u7ec3\u6d41\u7a0b\u8d4b\u4e88\u5f3a\u63a8\u7406\u80fd\u529b\uff0c\u57282025\u5e74IMO\u548cIPhO\u4e2d\u65e0\u5de5\u5177\u8fbe\u5230\u91d1\u724c\u8868\u73b0"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406", "\u6df7\u5408\u4e13\u5bb6", "\u9ad8\u6548\u67b6\u6784"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16051v1", "published_at": "2026-07-17", "score": 0.243, "selected_reasons": ["HF trending (1\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.16051.png", "title": "Loop the Loopies!", "tldr": "Loopie\uff1a\u9996\u4e2a\u5728\u76f8\u540c\u7b97\u529b\u4e0b\u8d85\u8d8a\u666e\u901aTransformer\u7684\u5faa\u73afMoE\u5927\u6a21\u578b", "upvotes": 1, "what_it_is": "\u63d0\u51faLoopie\u7cfb\u5217\u5faa\u73afTransformer\u6a21\u578b\uff0820B/6B\u53c2\u6570\uff0cMoE\u67b6\u6784\uff09\uff0c\u9996\u6b21\u8bc1\u660e\u5faa\u73afTransformer\u5728\u76f8\u540c\u9884\u8bad\u7ec3\u7b97\u529b\u4e0b\u53ef\u8d85\u8d8a\u7b49\u7b97\u529b\u7684\u666e\u901aTransformer\u57fa\u7ebf\uff0c\u5e76\u57282025\u5e74IMO\u548cIPhO\u7ade\u8d5b\u4e2d\u65e0\u5de5\u5177\u8fbe\u5230\u91d1\u724c\u6c34\u5e73\u3002", "why_notable": "\u957f\u671f\u4ee5\u6765\u5faa\u73afTransformer\u88ab\u8ba4\u4e3a\u5728\u7b49\u7b97\u529b\u4e0b\u52a3\u4e8e\u76f4\u63a5\u6269\u5927\u53c2\u6570\u91cf\uff0cLoopie\u9996\u6b21\u6253\u7834\u8fd9\u4e00\u8ba4\u77e5\uff0c\u4e3a\u9ad8\u6548\u63a8\u7406\u6a21\u578b\u63d0\u4f9b\u65b0\u8303\u5f0f\uff0c\u4e14\u5728\u9876\u7ea7\u6570\u7406\u7ade\u8d5b\u4e2d\u8fbe\u5230\u91d1\u724c\u7ea7\u522b\u5177\u6709\u91cd\u8981\u91cc\u7a0b\u7891\u610f\u4e49\u3002"}, {"abstract": "Human vision is a closed loop: gaze is continuously redirected by intermediate hypotheses rather than a single snapshot. Decades of psychophysics and cognitive science have argued that this active observation is essential for a wide range of tasks. Whether today\u0027s multimodal large language models (MLLMs) exercise active observation is an empirical question that current vision-language benchmarks do not answer. We introduce ActiveVision, a benchmark that makes active observation measurable for MLLMs, comprising 17 tasks across 3 categories. Tasks are designed to force repeated visual perception rather than a single static description. Frontier MLLMs collapse on ActiveVision: the highest-scoring model we evaluate, GPT-5.5 at the highest exposed reasoning-effort tier, solves only 10.6% of items and scores zero on 11 of the 17 tasks, and even Claude Fable 5, despite topping most reasoning and coding leaderboards, solves just 3.5%, far behind three human participants who average 96.1%. Furthermore, much of the gap persists even when models write and run their own vision code: such code is unreliable on realistic imagery, and catching its failures itself requires the active perception the models lack. Together, these results indicate that current MLLMs lack robust active visual observation, motivating architectures and training objectives that close the perception-reasoning loop.", "arxiv_id": "2607.16165", "arxiv_url": "https://arxiv.org/abs/2607.16165", "authors": ["Jiarui Zhang", "Muzi Tao", "Shangshang Wang", "Ollie Liu", "Xuezhe Ma", "Willie Neiswanger"], "brief": "\u63d0\u51faActiveVision\u57fa\u51c6\uff0c\u5305\u542b3\u7c7b17\u9879\u4efb\u52a1\uff0c\u4e13\u95e8\u6d4b\u91cf\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08MLLM\uff09\u7684\u4e3b\u52a8\u89c6\u89c9\u89c2\u5bdf\u80fd\u529b\u2014\u2014\u5373\u6a21\u578b\u80fd\u5426\u50cf\u4eba\u7c7b\u4e00\u6837\u901a\u8fc7\u8fed\u4ee3\u5047\u8bbe\u53cd\u590d\u5f15\u5bfc\u89c6\u89c9\u611f\u77e5\uff0c\u800c\u975e\u4f9d\u8d56\u5355\u6b21\u9759\u6001\u56fe\u50cf\u63cf\u8ff0\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16165", "impact_score": 9, "is_agent": false, "is_top": true, "key_points": ["\u6700\u5f3a\u6a21\u578bGPT-5.5\u4ec5\u89e3\u51b310.6%\u7684\u9898\u76ee\uff0c17\u9879\u4efb\u52a1\u4e2d11\u9879\u5f97\u5206\u4e3a\u96f6\uff1bClaude Fable 5\u4ec5\u5f973.5%\uff0c\u800c\u4e09\u540d\u4eba\u7c7b\u53c2\u4e0e\u8005\u5e73\u5747\u5f97\u5206\u9ad8\u8fbe96.1%", "\u5373\u4f7f\u5141\u8bb8\u6a21\u578b\u81ea\u884c\u7f16\u5199\u5e76\u8fd0\u884c\u89c6\u89c9\u4ee3\u7801\uff0c\u5dee\u8ddd\u4f9d\u7136\u663e\u8457\u2014\u2014\u56e0\u4e3a\u6a21\u578b\u7f3a\u4e4f\u4e3b\u52a8\u611f\u77e5\u80fd\u529b\uff0c\u65e0\u6cd5\u53ef\u9760\u68c0\u6d4b\u81ea\u8eab\u4ee3\u7801\u5728\u771f\u5b9e\u56fe\u50cf\u4e0a\u7684\u5931\u8d25", "\u57fa\u51c6\u8bbe\u8ba1\u5f3a\u5236\u8981\u6c42\u53cd\u590d\u89c6\u89c9\u611f\u77e5\u800c\u975e\u4e00\u6b21\u6027\u63cf\u8ff0\uff0c\u8986\u76d6\u9700\u8981\u95ed\u73af\u611f\u77e5-\u63a8\u7406\u7684\u591a\u7c7b\u4efb\u52a1\uff0c\u63ed\u793a\u5f53\u524dMLLM\u67b6\u6784\u7684\u6839\u672c\u6027\u7f3a\u9677"], "keywords": ["\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u89c6\u89c9\u611f\u77e5", "\u57fa\u51c6\u8bc4\u6d4b", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16165v1", "published_at": "2026-07-17", "score": 0.225, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "An Exam for Active Observers", "tldr": "ActiveVision\u57fa\u51c6\u6d4b\u8bd5\u63ed\u793a\uff1a\u9876\u7ea7\u591a\u6a21\u6001\u5927\u6a21\u578b\u4e3b\u52a8\u89c6\u89c9\u89c2\u5bdf\u80fd\u529b\u6781\u5ea6\u532e\u4e4f\uff0cGPT-5.5\u4ec5\u5f9710.6%\uff0c\u4eba\u7c7b\u5747\u520696.1%", "upvotes": 0, "what_it_is": "\u63d0\u51faActiveVision\u57fa\u51c6\uff0c\u5305\u542b3\u7c7b17\u9879\u4efb\u52a1\uff0c\u4e13\u95e8\u6d4b\u91cf\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08MLLM\uff09\u7684\u4e3b\u52a8\u89c6\u89c9\u89c2\u5bdf\u80fd\u529b\u2014\u2014\u5373\u6a21\u578b\u80fd\u5426\u50cf\u4eba\u7c7b\u4e00\u6837\u901a\u8fc7\u8fed\u4ee3\u5047\u8bbe\u53cd\u590d\u5f15\u5bfc\u89c6\u89c9\u611f\u77e5\uff0c\u800c\u975e\u4f9d\u8d56\u5355\u6b21\u9759\u6001\u56fe\u50cf\u63cf\u8ff0\u3002", "why_notable": "\u9996\u6b21\u5c06\u4eba\u7c7b\u4e3b\u52a8\u89c6\u89c9\u89c2\u5bdf\u8fd9\u4e00\u8ba4\u77e5\u79d1\u5b66\u6838\u5fc3\u6982\u5ff5\u8f6c\u5316\u4e3a\u53ef\u91cf\u5316\u7684MLLM\u8bc4\u6d4b\uff0c\u66b4\u9732\u51fa\u5f53\u524d\u6700\u5148\u8fdb\u6a21\u578b\u4e0e\u4eba\u7c7b\u4e4b\u95f4\u8fd190\u4e2a\u767e\u5206\u70b9\u7684\u5de8\u5927\u9e3f\u6c9f\uff0c\u4e3a\u4e0b\u4e00\u4ee3\u611f\u77e5-\u63a8\u7406\u95ed\u73af\u67b6\u6784\u6307\u660e\u7814\u7a76\u65b9\u5411\u3002"}, {"abstract": "LLM powered multi-agent systems (MAS) have emerged as a promising paradigm for complex tasks. However, their advantages over single-agent systems (SAS) remain unclear, with performance varying inconsistently across settings. Here, we provide an information bottleneck perspective on elucidating the differences between MAS and SAS. Specifically, our key observation is that a SAS accumulates its full reasoning trace in one shared context, while a MAS uses isolated local contexts connected by bounded relay messages. We show that, under infinite relay bandwidth, any SAS can be simulated by a MAS that transmits the full upstream context. Thus, the nontrivial advantage of MAS arises under bounded relays, where compression introduces a fundamental trade-off: reducing redundant context can improve efficiency, but may also incur loss of task-relevant information. We formalize this trade-off as an information bottleneck controlled by an effective parameter $\u03b2$, which captures how the balance shifts with model capability, and shows that MAS gains arise when context reduction outweighs relay information loss. We conduct 18 controlled experiments across five benchmarks and three model scales to validate our theoretical studies. We observe that MAS consistently helps when relays are near-sufficient, especially for weaker models. In contrast, MAS gains shrink or reverse when relays incur information loss, especially for stronger models that can already extract useful information from redundant context and thus gain little from compression. Our study shows that multi-agent design is fundamentally an information-bottleneck optimization problem. This perspective explains when bounded inter-agent communication helps or hurts.", "arxiv_id": "2607.16133", "arxiv_url": "https://arxiv.org/abs/2607.16133", "authors": ["Wendi Yu", "Lianhao Zhou", "Xiangjue Dong", "Sai Sudarshan Barath", "Declan Staunton", "Byung-Jun Yoon", "Xiaoning Qian", "James Caverlee", "Shuiwang Ji"], "brief": "\u672c\u6587\u63d0\u51fa\u7528\u4fe1\u606f\u74f6\u9888\u7406\u8bba\u89e3\u91ca\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff08MAS\uff09\u4e0e\u5355\u667a\u80fd\u4f53\u7cfb\u7edf\uff08SAS\uff09\u7684\u672c\u8d28\u5dee\u5f02\uff1aMAS\u901a\u8fc7\u6709\u754c\u4e2d\u7ee7\u6d88\u606f\u538b\u7f29\u4e0a\u4e0b\u6587\uff0c\u5728\u538b\u7f29\u6536\u76ca\u5927\u4e8e\u4fe1\u606f\u635f\u5931\u65f6\u624d\u5177\u5907\u4f18\u52bf\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.16133", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7406\u8bba\u8bc1\u660e\uff1a\u65e0\u9650\u5e26\u5bbd\u4e0bMAS\u53ef\u5b8c\u5168\u6a21\u62dfSAS\uff1b\u6709\u754c\u4e2d\u7ee7\u5f15\u5165\u4fe1\u606f\u74f6\u9888\u53c2\u6570\u03b2\uff0c\u523b\u753b\u6a21\u578b\u80fd\u529b\u4e0e\u538b\u7f29\u6536\u76ca\u7684\u6743\u8861", "\u5b9e\u9a8c\u9a8c\u8bc1\uff1a\u8de85\u4e2a\u57fa\u51c6\u30013\u79cd\u6a21\u578b\u89c4\u6a21\u517118\u7ec4\u5bf9\u7167\u5b9e\u9a8c\uff0c\u53d1\u73b0\u4e2d\u7ee7\u4fe1\u606f\u5145\u5206\u65f6MAS\u5bf9\u5f31\u6a21\u578b\u5e2e\u52a9\u663e\u8457", "\u53cd\u5411\u6548\u5e94\uff1a\u5f3a\u6a21\u578b\u5df2\u80fd\u4ece\u5197\u4f59\u4e0a\u4e0b\u6587\u63d0\u53d6\u6709\u6548\u4fe1\u606f\uff0cMAS\u538b\u7f29\u53cd\u800c\u53ef\u80fd\u5bfc\u81f4\u6027\u80fd\u4e0b\u964d"], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4fe1\u606f\u74f6\u9888", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.16133v1", "published_at": "2026-07-17", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "When Do Multi-Agent Systems Help? An Information Bottleneck Perspective", "tldr": "\u4ece\u4fe1\u606f\u74f6\u9888\u89c6\u89d2\u63ed\u793a\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4f55\u65f6\u4f18\u4e8e\u5355\u667a\u80fd\u4f53\u7cfb\u7edf", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u7528\u4fe1\u606f\u74f6\u9888\u7406\u8bba\u89e3\u91ca\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff08MAS\uff09\u4e0e\u5355\u667a\u80fd\u4f53\u7cfb\u7edf\uff08SAS\uff09\u7684\u672c\u8d28\u5dee\u5f02\uff1aMAS\u901a\u8fc7\u6709\u754c\u4e2d\u7ee7\u6d88\u606f\u538b\u7f29\u4e0a\u4e0b\u6587\uff0c\u5728\u538b\u7f29\u6536\u76ca\u5927\u4e8e\u4fe1\u606f\u635f\u5931\u65f6\u624d\u5177\u5907\u4f18\u52bf\u3002", "why_notable": "\u9996\u6b21\u4e3aMAS vs SAS\u7684\u6027\u80fd\u4e0d\u4e00\u81f4\u73b0\u8c61\u63d0\u4f9b\u4e25\u683c\u7406\u8bba\u6846\u67b6\uff0c\u5c06\u591a\u667a\u80fd\u4f53\u8bbe\u8ba1\u5f52\u7ed3\u4e3a\u4fe1\u606f\u74f6\u9888\u4f18\u5316\u95ee\u9898\uff0c\u5bf9\u5b9e\u9645\u7cfb\u7edf\u8bbe\u8ba1\u5177\u6709\u76f4\u63a5\u6307\u5bfc\u610f\u4e49"}, {"abstract": "Current world models operate at a single level of abstraction, with most prioritizing perceptual fidelity while lacking the spatial reasoning and semantic understanding required for real-world downstream tasks. We present a hierarchical driving world model that factorizes future prediction across two levels operating at distinct temporal and abstraction scales: a high-level predictor that forecasts coarse scene structure over extended temporal horizons, and a low-level generator that produces detailed predictions conditioned on the high-level output. This decomposition yields high perceptual fidelity while also capturing strong spatial and semantic representations. We further show that pretraining with a diffusion forcing objective yields substantially richer internal representations than the standard teacher forcing objective, while teacher forcing -- predicting only the next frame from clean context -- produces more stable autoregressive rollouts. We therefore introduce a generic two-stage training paradigm that pretrains the model with diffusion forcing and fine-tunes with teacher forcing, combining the representational benefits of the former with the rollout stability of the latter. Our approach achieves state-of-the-art results across the standard suite of driving world model evaluations on established benchmarks, including long-horizon generation fidelity, steering responsiveness evaluated on counterfactual scenarios, and internal representation quality. Project page with code, demo, checkpoints and qualitative results: https://lmb-freiburg.github.io/orbis2.github.io/", "arxiv_id": "2607.15898", "arxiv_url": "https://arxiv.org/abs/2607.15898", "authors": ["Sudhanshu Mittal", "Arian Mousakhan", "Silvio Galesso", "Karim Farid", "Jonannes Dienert", "Rajat Sahay", "Thomas Brox"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u5206\u5c42\u9a7e\u9a76\u4e16\u754c\u6a21\u578b\uff0c\u5c06\u672a\u6765\u9884\u6d4b\u5206\u89e3\u4e3a\u9ad8\u5c42\u7c97\u7c92\u5ea6\u573a\u666f\u7ed3\u6784\u9884\u6d4b\u548c\u4f4e\u5c42\u7ec6\u7c92\u5ea6\u751f\u6210\u4e24\u4e2a\u5c42\u6b21\uff0c\u5e76\u5f15\u5165\u6269\u6563\u5f3a\u5236\u9884\u8bad\u7ec3+\u6559\u5e08\u5f3a\u5236\u5fae\u8c03\u7684\u4e24\u9636\u6bb5\u8bad\u7ec3\u8303\u5f0f\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15898", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5206\u5c42\u67b6\u6784\uff1a\u9ad8\u5c42\u9884\u6d4b\u5668\u8d1f\u8d23\u957f\u65f6\u5e8f\u7c97\u7c92\u5ea6\u573a\u666f\u7ed3\u6784\uff0c\u4f4e\u5c42\u751f\u6210\u5668\u57fa\u4e8e\u9ad8\u5c42\u8f93\u51fa\u4ea7\u751f\u7ec6\u8282\u9884\u6d4b\uff0c\u517c\u987e\u611f\u77e5\u4fdd\u771f\u5ea6\u4e0e\u7a7a\u95f4\u8bed\u4e49\u7406\u89e3", "\u4e24\u9636\u6bb5\u8bad\u7ec3\uff1a\u6269\u6563\u5f3a\u5236\uff08diffusion forcing\uff09\u9884\u8bad\u7ec3\u83b7\u5f97\u66f4\u4e30\u5bcc\u5185\u90e8\u8868\u5f81\uff0c\u6559\u5e08\u5f3a\u5236\uff08teacher forcing\uff09\u5fae\u8c03\u4fdd\u8bc1\u81ea\u56de\u5f52\u5c55\u5f00\u7a33\u5b9a\u6027", "\u5728\u9a7e\u9a76\u4e16\u754c\u6a21\u578b\u6807\u51c6\u8bc4\u6d4b\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u6db5\u76d6\u957f\u65f6\u5e8f\u751f\u6210\u4fdd\u771f\u5ea6\u3001\u53cd\u4e8b\u5b9e\u573a\u666f\u8f6c\u5411\u54cd\u5e94\u6027\u53ca\u5185\u90e8\u8868\u5f81\u8d28\u91cf"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u81ea\u52a8\u9a7e\u9a76", "\u6269\u6563\u6a21\u578b", "\u89c6\u9891\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15898v1", "published_at": "2026-07-17", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Orbis 2: A Hierarchical World Model for Driving", "tldr": "Orbis 2\uff1a\u5206\u5c42\u9a7e\u9a76\u4e16\u754c\u6a21\u578b\uff0c\u7ed3\u5408\u6269\u6563\u9884\u8bad\u7ec3\u4e0e\u6559\u5e08\u5f3a\u5236\u5fae\u8c03\uff0c\u5b9e\u73b0\u9ad8\u4fdd\u771f\u957f\u65f6\u5e8f\u9884\u6d4b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u5206\u5c42\u9a7e\u9a76\u4e16\u754c\u6a21\u578b\uff0c\u5c06\u672a\u6765\u9884\u6d4b\u5206\u89e3\u4e3a\u9ad8\u5c42\u7c97\u7c92\u5ea6\u573a\u666f\u7ed3\u6784\u9884\u6d4b\u548c\u4f4e\u5c42\u7ec6\u7c92\u5ea6\u751f\u6210\u4e24\u4e2a\u5c42\u6b21\uff0c\u5e76\u5f15\u5165\u6269\u6563\u5f3a\u5236\u9884\u8bad\u7ec3+\u6559\u5e08\u5f3a\u5236\u5fae\u8c03\u7684\u4e24\u9636\u6bb5\u8bad\u7ec3\u8303\u5f0f\u3002", "why_notable": "\u9996\u6b21\u5c06\u5206\u5c42\u62bd\u8c61\u4e0e\u6269\u6563\u5f3a\u5236\u9884\u8bad\u7ec3\u7ed3\u5408\u7528\u4e8e\u9a7e\u9a76\u4e16\u754c\u6a21\u578b\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u5355\u5c42\u6a21\u578b\u611f\u77e5\u4e0e\u8bed\u4e49\u63a8\u7406\u96be\u4ee5\u517c\u987e\u7684\u6838\u5fc3\u77db\u76fe\uff0c\u5e76\u5f00\u6e90\u4ee3\u7801\u4e0e\u6a21\u578b\u6743\u91cd\uff0c\u5b9e\u7528\u4ef7\u503c\u9ad8\u3002"}, {"abstract": "Large language models bring instruction following and scene reasoning to end-to-end driving, but their inference latency collides with the control rate a vehicle requires. Existing closed-loop agents hide this gap by invoking the model on alternate simulation ticks and replaying the previous command in between, so half of all control outputs ignore t
