"Yujie Li", "Jiancheng Pan", "Zhiwei Wei", "Jiuniu Wang", "Mugen Peng", "Wenjia Xu"], "brief": "\u63d0\u51faChronoBench\u57fa\u51c6\u6d4b\u8bd5\uff0c\u5c06\u9065\u611f\u957f\u65f6\u5e8f\u7406\u89e3\u5206\u89e3\u4e3a\u571f\u5730\u8986\u76d6\u611f\u77e5\u3001\u65f6\u5e8f\u8bc6\u522b\u3001\u957f\u671f\u8bb0\u5fc6\u548c\u65f6\u7a7a\u63a8\u7406\u56db\u4e2a\u8ba4\u77e5\u5c42\u6b21\uff0c\u517117,689\u4e2aQA\u5bf9\u3002\u53d1\u73b0\u4e3b\u6d41\u591a\u6a21\u6001\u5927\u6a21\u578b\u4e0e\u4eba\u7c7b\u4e13\u5bb6\u5dee\u8ddd\u663e\u8457\uff0c\u957f\u671f\u8bb0\u5fc6\u662f\u6700\u5927\u74f6\u9888\uff1b\u8fdb\u800c\u63d0\u51faGeoChrono\u6a21\u578b\uff0c\u901a\u8fc7\u65f6\u5e8f\u8f68\u8ff9\u7f16\u7801\u5668\u548c\u7c97\u5230\u7ec6Token\u538b\u7f29\u5668\uff0c\u5728ChronoBench\u4e0a\u8d85\u8d8a\u5546\u4e1aMLLM 20%\u4ee5\u4e0a\uff0c\u540c\u65f6\u51cf\u5c1156%\u89c6\u89c9Token\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15768", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9065\u611f", "\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u65f6\u5e8f\u7406\u89e3", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15768v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GeoChrono: Benchmarking and Rethinking Long-Term Temporal Understanding in Remote Sensing", "tldr": "\u63d0\u51faChronoBench\u57fa\u51c6\u6d4b\u8bd5\uff0c\u5c06\u9065\u611f\u957f\u65f6\u5e8f\u7406\u89e3\u5206\u89e3\u4e3a\u571f\u5730\u8986\u76d6\u611f\u77e5\u3001\u65f6\u5e8f\u8bc6\u522b\u3001\u957f\u671f\u8bb0\u5fc6\u548c\u65f6\u7a7a\u63a8\u7406\u56db\u4e2a\u8ba4\u77e5\u5c42\u6b21\uff0c\u517117,689\u4e2aQA\u5bf9\u3002\u53d1\u73b0\u4e3b\u6d41\u591a\u6a21\u6001\u5927\u6a21\u578b\u4e0e\u4eba\u7c7b\u4e13\u5bb6\u5dee\u8ddd\u663e\u8457\uff0c\u957f\u671f\u8bb0\u5fc6\u662f\u6700\u5927\u74f6\u9888\uff1b\u8fdb\u800c\u63d0\u51faGeoChrono\u6a21\u578b\uff0c\u901a\u8fc7\u65f6\u5e8f\u8f68\u8ff9\u7f16\u7801\u5668\u548c\u7c97\u5230\u7ec6Token\u538b\u7f29\u5668\uff0c\u5728ChronoBench\u4e0a\u8d85\u8d8a\u5546\u4e1aMLLM 20%\u4ee5\u4e0a\uff0c\u540c\u65f6\u51cf\u5c1156%\u89c6\u89c9Token\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Conversational Speech Synthesis (CSS) aims to synthesize speech with human-like emotional expression and contextual consistency in user-agent interactions. Existing CSS methods struggle to render authentic human emotions due to limited predefined emotion label spaces (e.g., seven emotion categories), while redundant multimodal tokens in multi-turn dialogue history interfere with context understanding. To address these issues, we propose AuEmoChat, a CSS framework for authentic emotion understanding and rendering. First, we develop AuEmoCodec, which learns a discrete authentic emotion token space from large-scale emotional speech via finite scalar quantization, enabling a more authentic emotion representation than limited basic emotion categories. We further propose AuEmoToMe, an authentic-emotion-guided token merging algorithm that merges redundant tokens in multimodal dialogue history while preserving emotion-relevant context. We integrate it into an autoregressive text-speech model to predict the target authentic emotion token and speech tokens. Finally, we propose Authentic Emotion Flow Matching, which renders speech by jointly conditioning on merged dialogue context, target authentic emotion, and acoustic priors. Extensive experiments on the NCSSD-EmCap dataset demonstrate that AuEmoChat outperforms state-of-the-art CSS baselines and generates more expressive and authentic emotional speech.", "arxiv_id": "2607.15755", "arxiv_url": "https://arxiv.org/abs/2607.15755", "authors": ["Zhenqi Jia", "Yuan Zhao", "Aruukhan", "Rui Liu", "Haizhou Li"], "brief": "\u63d0\u51faAuEmoChat\u6846\u67b6\uff0c\u901a\u8fc7\u6709\u9650\u6807\u91cf\u91cf\u5316\u5b66\u4e60\u79bb\u6563\u60c5\u611ftoken\u7a7a\u95f4\uff0c\u7a81\u7834\u4f20\u7edf\u4e03\u7c7b\u60c5\u611f\u6807\u7b7e\u9650\u5236\uff0c\u5e76\u8bbe\u8ba1\u60c5\u611f\u5f15\u5bfc\u7684token\u5408\u5e76\u7b97\u6cd5\u51cf\u5c11\u591a\u8f6e\u5bf9\u8bdd\u5197\u4f59\uff0c\u5b9e\u73b0\u66f4\u771f\u5b9e\u81ea\u7136\u7684\u5bf9\u8bdd\u8bed\u97f3\u5408\u6210\u3002", "categories": ["cs.SD", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15755", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u97f3\u5408\u6210", "\u60c5\u611f\u7406\u89e3", "\u591a\u6a21\u6001", "\u5bf9\u8bdd\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15755v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AuEmoChat: Authentic Emotion Understanding and Rendering for Conversational Speech Synthesis", "tldr": "\u63d0\u51faAuEmoChat\u6846\u67b6\uff0c\u901a\u8fc7\u6709\u9650\u6807\u91cf\u91cf\u5316\u5b66\u4e60\u79bb\u6563\u60c5\u611ftoken\u7a7a\u95f4\uff0c\u7a81\u7834\u4f20\u7edf\u4e03\u7c7b\u60c5\u611f\u6807\u7b7e\u9650\u5236\uff0c\u5e76\u8bbe\u8ba1\u60c5\u611f\u5f15\u5bfc\u7684token\u5408\u5e76\u7b97\u6cd5\u51cf\u5c11\u591a\u8f6e\u5bf9\u8bdd\u5197\u4f59\uff0c\u5b9e\u73b0\u66f4\u771f\u5b9e\u81ea\u7136\u7684\u5bf9\u8bdd\u8bed\u97f3\u5408\u6210\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "As Text-to-Image (T2I) systems rapidly advance, evaluating the cultural authenticity of synthesized content has become increasingly important for fair and trustworthy generative AI. Existing T2I evaluation metrics and multimodal judges often rely on visual-semantic representations that underrepresent implicit cultural norms, leading to biased preference judgments and the omission of fine-grained cultural cues. In addition, visual question answering (VQA)-based evaluators typically depend on autoregressive text generation, which limits their scalability for real-time reward modeling. To address these limitations, we introduce an Implicit Cultural Alignment Reward Model built upon a lightweight 4.2-billion-parameter Multimodal Large Language Model (MLLM). Our framework integrates an Implicit Cultural Probe with a Skip-connection Cross-Attention (SkipCA) mechanism, enabling late-stage semantic features to directly attend to early-stage visual representations and better preserve culturally salient details. Evaluations on 3,323 challenging and carefully curated image pairs from the CulturalFrames benchmark show that our approach achieves 80.54% pairwise accuracy, with Pearson and Kendall correlation coefficients of 0.546 and 0.377, respectively, outperforming representative vision-language metrics and MLLM-based evaluators. Moreover, by bypassing autoregressive text generation, our model processes each evaluation in 0.21 seconds under our local inference setup, achieving a $10\\times$ speedup over standard VQA-based evaluators. These results suggest that the proposed reward model can provide an efficient and culturally aware scalar signal for preference optimization pipelines such as Reinforcement Learning from Human Feedback and Direct Preference Optimization.", "arxiv_id": "2607.15740", "arxiv_url": "https://arxiv.org/abs/2607.15740", "authors": ["Bo-An Chang", "Yu-Chih Chen"], "brief": "\u9488\u5bf9\u6587\u672c\u751f\u6210\u56fe\u50cf\u7cfb\u7edf\u7684\u6587\u5316\u771f\u5b9e\u6027\u8bc4\u4f30\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u57fa\u4e8e42\u4ebf\u53c2\u6570\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u9690\u5f0f\u6587\u5316\u5bf9\u9f50\u5956\u52b1\u6a21\u578b\uff0c\u901a\u8fc7\u8df3\u8dc3\u8fde\u63a5\u4ea4\u53c9\u6ce8\u610f\u529b\u673a\u5236\u4fdd\u7559\u6587\u5316\u7ec6\u8282\u3002\u5728CulturalFrames\u57fa\u51c6\u4e0a\u8fbe\u523080.54%\u7684\u914d\u5bf9\u51c6\u786e\u7387\uff0c\u5e76\u901a\u8fc7\u8df3\u8fc7\u81ea\u56de\u5f52\u6587\u672c\u751f\u6210\u5b9e\u73b010\u500d\u63a8\u7406\u52a0\u901f\uff080.21\u79d2/\u6837\u672c\uff09\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15740", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u6587\u672c\u751f\u6210\u56fe\u50cf", "\u5956\u52b1\u6a21\u578b", "\u6587\u5316\u504f\u89c1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15740v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Debiasing Text-to-Image Evaluation via Implicit Cultural Alignment Reward Modeling", "tldr": "\u9488\u5bf9\u6587\u672c\u751f\u6210\u56fe\u50cf\u7cfb\u7edf\u7684\u6587\u5316\u771f\u5b9e\u6027\u8bc4\u4f30\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u57fa\u4e8e42\u4ebf\u53c2\u6570\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u9690\u5f0f\u6587\u5316\u5bf9\u9f50\u5956\u52b1\u6a21\u578b\uff0c\u901a\u8fc7\u8df3\u8dc3\u8fde\u63a5\u4ea4\u53c9\u6ce8\u610f\u529b\u673a\u5236\u4fdd\u7559\u6587\u5316\u7ec6\u8282\u3002\u5728CulturalFrames\u57fa\u51c6\u4e0a\u8fbe\u523080.54%\u7684\u914d\u5bf9\u51c6\u786e\u7387\uff0c\u5e76\u901a\u8fc7\u8df3\u8fc7\u81ea\u56de\u5f52\u6587\u672c\u751f\u6210\u5b9e\u73b010\u500d\u63a8\u7406\u52a0\u901f\uff080.21\u79d2/\u6837\u672c\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Accurate and robust wireless localization is a critical enabler for emerging 5G/6G applications, including autonomous driving, extended reality, and smart manufacturing. Despite its importance, achieving precise localization across diverse environments remains challenging due to the complex nature of wireless signals and their sensitivity to environmental changes. Existing data-driven approaches often suffer from limited generalization capability, requiring extensive labeled data and struggling to adapt to new scenarios. To address these limitations, we propose SigMap, a multimodal foundation model that introduces two key innovations: (1) A cycle-adaptive masking strategy that dynamically adjusts masking patterns based on channel periodicity characteristics to learn robust wireless representations; (2) A novel \"map-as-prompt\" framework that integrates 3D geographic information through lightweight soft prompts for effective cross-scenario adaptation. Extensive experiments demonstrate that our model achieves state-of-the-art performance across multiple localization tasks while exhibiting strong zero-shot generalization in unseen environments, significantly outperforming both supervised and self-supervised baselines by considerable margins.", "arxiv_id": "2607.15713", "arxiv_url": "https://arxiv.org/abs/2607.15713", "authors": ["Yong Chu", "Xun Zhou", "Zenglin Xu", "Hui Wang", "Yue Yu"], "brief": "\u63d0\u51faSigMap\uff0c\u4e00\u79cd\u591a\u6a21\u6001\u65e0\u7ebf\u5b9a\u4f4d\u57fa\u7840\u6a21\u578b\uff0c\u901a\u8fc7\u5468\u671f\u81ea\u9002\u5e94\u63a9\u7801\u7b56\u7565\u5b66\u4e60\u9c81\u68d2\u65e0\u7ebf\u4fe1\u53f7\u8868\u5f81\uff0c\u5e76\u5f15\u5165\"\u5730\u56fe\u5373\u63d0\u793a\"\u6846\u67b6\u5c063D\u5730\u7406\u4fe1\u606f\u878d\u5165\u8f7b\u91cf\u8f6f\u63d0\u793a\u4ee5\u5b9e\u73b0\u8de8\u573a\u666f\u8fc1\u79fb\u3002\u5728\u591a\u4e2a\u5b9a\u4f4d\u4efb\u52a1\u4e0a\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff0c\u5e76\u5728\u672a\u89c1\u73af\u5883\u4e2d\u5c55\u73b0\u51fa\u5f3a\u96f6\u6837\u672c\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["eess.SP", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15713", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u57fa\u7840\u6a21\u578b", "\u65e0\u7ebf\u5b9a\u4f4d", "\u96f6\u6837\u672c\u6cdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15713v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Map as a Prompt: Learning Multi-Modal Spatial-Signal Foundation Models for Cross-scenario Wireless Localization", "tldr": "\u63d0\u51faSigMap\uff0c\u4e00\u79cd\u591a\u6a21\u6001\u65e0\u7ebf\u5b9a\u4f4d\u57fa\u7840\u6a21\u578b\uff0c\u901a\u8fc7\u5468\u671f\u81ea\u9002\u5e94\u63a9\u7801\u7b56\u7565\u5b66\u4e60\u9c81\u68d2\u65e0\u7ebf\u4fe1\u53f7\u8868\u5f81\uff0c\u5e76\u5f15\u5165\"\u5730\u56fe\u5373\u63d0\u793a\"\u6846\u67b6\u5c063D\u5730\u7406\u4fe1\u606f\u878d\u5165\u8f7b\u91cf\u8f6f\u63d0\u793a\u4ee5\u5b9e\u73b0\u8de8\u573a\u666f\u8fc1\u79fb\u3002\u5728\u591a\u4e2a\u5b9a\u4f4d\u4efb\u52a1\u4e0a\u8fbe\u5230\u6700\u4f18\u6027\u80fd\uff0c\u5e76\u5728\u672a\u89c1\u73af\u5883\u4e2d\u5c55\u73b0\u51fa\u5f3a\u96f6\u6837\u672c\u6cdb\u5316\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Diffusion-based methods have achieved impressive performance in real-world image super-resolution (Real-ISR) by leveraging large pre-trained stable diffusion (SD) models as powerful generative priors. However, these methods still face two key limitations. First, existing SD-based one-step and multi-step Real-ISR approaches adopt a unified processing paradigm for all input samples, ignoring the varying restoration difficulty across images. Second, the aggressive resolution reduction of the VAE in SD models (e.g., 8x downsampling) leads to irreversible loss of fine-scale details, which cannot be recovered by the subsequent diffusion process. To address these limitations, we propose a Difficulty-aware Dynamic Routing (DDR) strategy that overcomes the rigid, one-size-fits-all processing paradigm. Specifically, we first design a difficulty estimator to predict the restoration cost of each input image, enabling automatic assignment to a network of appropriate capacity. Then, we construct a set of Real-ISR networks with varying model capacities by modulating the spatial downsampling ratio of the VAE in the SD backbone, thereby preserving more high-frequency information for challenging cases while maintaining efficiency for simpler inputs. Extensive experiments have demonstrated the superior efficiency and effectiveness of the proposed model compared to recent state-of-the-art methods.", "arxiv_id": "2607.15711", "arxiv_url": "https://arxiv.org/abs/2607.15711", "authors": ["Xue Wu", "Kang Zhao", "Kafeng Wang", "Jianfei Chen", "Jingwei Xin", "Nannan Wang", "Xinbo Gao"], "brief": "\u9488\u5bf9\u771f\u5b9e\u4e16\u754c\u56fe\u50cf\u8d85\u5206\u8fa8\u7387\u4efb\u52a1\uff0c\u63d0\u51fa\u96be\u5ea6\u611f\u77e5\u52a8\u6001\u8def\u7531\u7b56\u7565\uff08DDR\uff09\uff0c\u6839\u636e\u8f93\u5165\u56fe\u50cf\u7684\u6062\u590d\u96be\u5ea6\u81ea\u52a8\u5206\u914d\u4e0d\u540c\u5bb9\u91cf\u7684\u7f51\u7edc\u5904\u7406\uff0c\u540c\u65f6\u901a\u8fc7\u8c03\u6574VAE\u7684\u7a7a\u95f4\u4e0b\u91c7\u6837\u6bd4\u4f8b\u4fdd\u7559\u66f4\u591a\u9ad8\u9891\u7ec6\u8282\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u6548\u7387\u548c\u6548\u679c\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709\u6700\u5148\u8fdb\u65b9\u6cd5\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15711", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u56fe\u50cf\u8d85\u5206\u8fa8\u7387", "\u52a8\u6001\u8def\u7531", "\u771f\u5b9e\u4e16\u754c\u56fe\u50cf\u6062\u590d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15711v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Efficient Difficulty-Aware Dynamic Routing for Diffusion-Based Real-World Image Super-Resolution", "tldr": "\u9488\u5bf9\u771f\u5b9e\u4e16\u754c\u56fe\u50cf\u8d85\u5206\u8fa8\u7387\u4efb\u52a1\uff0c\u63d0\u51fa\u96be\u5ea6\u611f\u77e5\u52a8\u6001\u8def\u7531\u7b56\u7565\uff08DDR\uff09\uff0c\u6839\u636e\u8f93\u5165\u56fe\u50cf\u7684\u6062\u590d\u96be\u5ea6\u81ea\u52a8\u5206\u914d\u4e0d\u540c\u5bb9\u91cf\u7684\u7f51\u7edc\u5904\u7406\uff0c\u540c\u65f6\u901a\u8fc7\u8c03\u6574VAE\u7684\u7a7a\u95f4\u4e0b\u91c7\u6837\u6bd4\u4f8b\u4fdd\u7559\u66f4\u591a\u9ad8\u9891\u7ec6\u8282\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u6548\u7387\u548c\u6548\u679c\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709\u6700\u5148\u8fdb\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We describe a model of perceptual inference in primary visual cortex (V1) equivalent to a minimal diffusion model whose function can be readily understood from its parameters. The model is based on sparse coding with a non-factorial prior over latent variables in the form of an unconstrained, pairwise interaction matrix, extending standard sparse coding inference to a general recurrent dynamical system. We efficiently train these recurrent dynamics using a denoising score-matching objective and implicit differentiation. After training on natural images, the learned interaction matrix mirrors the structure of horizontal connections in superficial layers of V1 that link neurons of similar orientation tuning. This model exhibits exceptionally good denoising performance, restoring image features such as extended contours amid extreme visual ambiguity, nearly matching the behavior of standard, black-box diffusion architectures in generalization regime. Owing to the model\u0027s simplicity, the network\u0027s Jacobian can be decomposed directly in terms of the interaction matrix between latent variables, revealing mechanistically how the recurrent dynamics assign high probability over a continuous family of natural structural deformations. Intriguingly, within this circuit, a large fraction of latent variables learn to disconnect from visual input altogether, essentially forming a hierarchical representation that appears to enforce global consistency among image features. Together, the model and results bridge two distinct domains: for neuroscience, it generates concrete, testable hypotheses regarding functional connectivity in recurrent neural circuits during perceptual inference tasks; for machine learning, it elucidates the internal mechanisms learned by diffusion models that allow them to generate infinitely many novel images from a finite training set.", "arxiv_id": "2607.15693", "arxiv_url": "https://arxiv.org/abs/2607.15693", "authors": ["Zeyu Yun", "Alexander Belsten", "Dasheng Bi", "Zahra Kadkhodaie", "Yubei Chen", "Bruno A. Olshausen"], "brief": "\u63d0\u51fa\u4e00\u79cd\u7b49\u4ef7\u4e8e\u6700\u5c0f\u6269\u6563\u6a21\u578b\u7684\u521d\u7ea7\u89c6\u89c9\u76ae\u5c42\uff08V1\uff09\u611f\u77e5\u63a8\u65ad\u6a21\u578b\uff0c\u57fa\u4e8e\u7a00\u758f\u7f16\u7801\u4e0e\u6210\u5bf9\u4ea4\u4e92\u77e9\u9635\u7684\u5faa\u73af\u52a8\u529b\u7cfb\u7edf\u3002\u8bad\u7ec3\u540e\uff0c\u6a21\u578b\u5b66\u5230\u7684\u4ea4\u4e92\u77e9\u9635\u4e0eV1\u6c34\u5e73\u8fde\u63a5\u7ed3\u6784\u9ad8\u5ea6\u543b\u5408\uff0c\u53bb\u566a\u6027\u80fd\u63a5\u8fd1\u9ed1\u76d2\u6269\u6563\u67b6\u6784\uff0c\u540c\u65f6\u63ed\u793a\u4e86\u6269\u6563\u6a21\u578b\u5185\u90e8\u751f\u6210\u673a\u5236\uff0c\u5e76\u4e3a\u795e\u7ecf\u79d1\u5b66\u63d0\u4f9b\u53ef\u9a8c\u8bc1\u5047\u8bf4\u3002", "categories": ["q-bio.NC", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15693", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u89c6\u89c9\u76ae\u5c42", "\u7a00\u758f\u7f16\u7801", "\u795e\u7ecf\u79d1\u5b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15693v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Toward a mechanistic understanding of inference in visual cortex and diffusion models", "tldr": "\u63d0\u51fa\u4e00\u79cd\u7b49\u4ef7\u4e8e\u6700\u5c0f\u6269\u6563\u6a21\u578b\u7684\u521d\u7ea7\u89c6\u89c9\u76ae\u5c42\uff08V1\uff09\u611f\u77e5\u63a8\u65ad\u6a21\u578b\uff0c\u57fa\u4e8e\u7a00\u758f\u7f16\u7801\u4e0e\u6210\u5bf9\u4ea4\u4e92\u77e9\u9635\u7684\u5faa\u73af\u52a8\u529b\u7cfb\u7edf\u3002\u8bad\u7ec3\u540e\uff0c\u6a21\u578b\u5b66\u5230\u7684\u4ea4\u4e92\u77e9\u9635\u4e0eV1\u6c34\u5e73\u8fde\u63a5\u7ed3\u6784\u9ad8\u5ea6\u543b\u5408\uff0c\u53bb\u566a\u6027\u80fd\u63a5\u8fd1\u9ed1\u76d2\u6269\u6563\u67b6\u6784\uff0c\u540c\u65f6\u63ed\u793a\u4e86\u6269\u6563\u6a21\u578b\u5185\u90e8\u751f\u6210\u673a\u5236\uff0c\u5e76\u4e3a\u795e\u7ecf\u79d1\u5b66\u63d0\u4f9b\u53ef\u9a8c\u8bc1\u5047\u8bf4\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present S1-Omni, a unified multimodal reasoning model for scientific understanding, prediction, and generation. AI for Science (AI4S) has advanced significantly through domain-specific models, tool-augmented LLMs, and scientific language models. However, model capabilities remain highly fragmented, limiting the joint modeling of heterogeneous data, scientific laws, and expert knowledge. S1-Omni addresses this gap by consolidating these capabilities into a single, coherent scientific reasoning model. The architecture of S1-Omni is built upon three core components: unified representation of scientific data, natural-world knowledge alignment, and decoding for domain-specific tasks. First, S1-Omni maps natural-language instructions and scientific objects, including CIF, SMILES, protein sequences, spectra, and scientific images, into a shared representation space. Second, it incorporates scientific laws and expert knowledge into data construction and training, enabling the model to reason from scientific evidence. Third, it performs task-specific decoding to support a broad range of applications, including property prediction, spectrum-to-molecular generation, protein site and structure prediction, and scientific image generation and editing. S1-Omni is trained on S1-Omni-Corpus, which covers 200 scientific tasks and contains millions of reasoning samples, and is evaluated on over 60 scientific benchmarks. It outperforms GPT-5.5 and Gemini-3.1-Pro on most benchmarks and matches or surpasses domain-specific models on several benchmarks. Overall, S1-Omni provides a practical path toward unified scientific modeling.", "arxiv_id": "2607.15686", "arxiv_url": "https://arxiv.org/abs/2607.15686", "authors": ["Jiahao Zhao", "Junyi Liu", "Lifeng Xu", "Nan Xu", "Qingli Wang", "Qingxiao Li", "Tianle Chen", "Xiaoyu Wu", "Yawen Zheng", "Zikai Wang", "Guanming Liu", "Hequn Zhou", "Jingyi Wang", "Jingyuan Shu", "Keqi Wang", "Li He", "Songyang Diao", "Wenhui Xu", "Xinyu Ren", "Yaqin Fan", "Yujin Zhou", "Zhanao Yao"], "brief": "S1-Omni\u662f\u4e00\u4e2a\u7edf\u4e00\u7684\u591a\u6a21\u6001\u79d1\u5b66\u63a8\u7406\u6a21\u578b\uff0c\u80fd\u591f\u5904\u7406CIF\u3001SMILES\u3001\u86cb\u767d\u8d28\u5e8f\u5217\u3001\u5149\u8c31\u548c\u79d1\u5b66\u56fe\u50cf\u7b49\u5f02\u6784\u6570\u636e\uff0c\u652f\u6301\u6027\u8d28\u9884\u6d4b\u3001\u5206\u5b50\u751f\u6210\u3001\u86cb\u767d\u8d28\u7ed3\u6784\u9884\u6d4b\u7b49200\u4f59\u9879\u79d1\u5b66\u4efb\u52a1\u3002\u5728\u8d85\u8fc760\u4e2a\u79d1\u5b66\u57fa\u51c6\u6d4b\u8bd5\u4e0a\uff0cS1-Omni\u8d85\u8d8aGPT-5.5\u548cGemini-3.1-Pro\uff0c\u5e76\u5728\u591a\u4e2a\u4efb\u52a1\u4e0a\u5ab2\u7f8e\u9886\u57df\u4e13\u7528\u6a21\u578b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15686", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u79d1\u5b66\u667a\u80fd", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7edf\u4e00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15686v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "S1-Omni: A Unified Multimodal Reasoning Model for Scientific Understanding, Prediction, and Generation", "tldr": "S1-Omni\u662f\u4e00\u4e2a\u7edf\u4e00\u7684\u591a\u6a21\u6001\u79d1\u5b66\u63a8\u7406\u6a21\u578b\uff0c\u80fd\u591f\u5904\u7406CIF\u3001SMILES\u3001\u86cb\u767d\u8d28\u5e8f\u5217\u3001\u5149\u8c31\u548c\u79d1\u5b66\u56fe\u50cf\u7b49\u5f02\u6784\u6570\u636e\uff0c\u652f\u6301\u6027\u8d28\u9884\u6d4b\u3001\u5206\u5b50\u751f\u6210\u3001\u86cb\u767d\u8d28\u7ed3\u6784\u9884\u6d4b\u7b49200\u4f59\u9879\u79d1\u5b66\u4efb\u52a1\u3002\u5728\u8d85\u8fc760\u4e2a\u79d1\u5b66\u57fa\u51c6\u6d4b\u8bd5\u4e0a\uff0cS1-Omni\u8d85\u8d8aGPT-5.5\u548cGemini-3.1-Pro\uff0c\u5e76\u5728\u591a\u4e2a\u4efb\u52a1\u4e0a\u5ab2\u7f8e\u9886\u57df\u4e13\u7528\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In multi-party dialogues between a dialogue system and multiple users, identifying to whom an utterance is addressed is a key challenge. Prior work has typically treated addressee detection as a multi-class classification task, selecting a single label representing an individual participant or the group. This formulation assumes that address is inherently discrete and has primarily been used for predicting turn-taking. In this paper, we revisit this assumption by analyzing address as a continuous phenomenon. Using a multi-party human dialogue corpus annotated by multiple annotators, we construct both binary address labels derived from majority-vote addressee labels and continuous address levels inferred from annotator judgments using a latent-variable model. We then examine how these representations relate to turn-taking as well as listener behaviors, including gaze and backchannels. Our results show that, in addition to turn-taking, both gaze and backchannels are associated with address. Furthermore, models using continuous address levels achieve better predictive fit than those using discrete labels, suggesting that address may exhibit graded structure. Finally, we discuss the future directions of addressee detection research based on the findings of this study.", "arxiv_id": "2607.15648", "arxiv_url": "https://arxiv.org/abs/2607.15648", "authors": ["Taiga Mori", "Koji Inoue", "Divesh Lala", "Tatsuya Kawahara"], "brief": "\u672c\u6587\u91cd\u65b0\u5ba1\u89c6\u591a\u65b9\u5bf9\u8bdd\u4e2d\"\u88ab\u79f0\u547c\u8005\u68c0\u6d4b\"\u4efb\u52a1\uff0c\u5c06\u4f20\u7edf\u79bb\u6563\u6807\u7b7e\u6269\u5c55\u4e3a\u8fde\u7eed\u5730\u5740\u7ea7\u522b\uff0c\u5229\u7528\u6f5c\u53d8\u91cf\u6a21\u578b\u4ece\u591a\u6807\u6ce8\u8005\u5224\u65ad\u4e2d\u63a8\u65ad\u8fde\u7eed\u503c\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8fde\u7eed\u5730\u5740\u8868\u793a\u6bd4\u79bb\u6563\u6807\u7b7e\u66f4\u597d\u5730\u9884\u6d4b\u8bf4\u8bdd\u8f6e\u8f6c\u6362\u3001\u6ce8\u89c6\u548c\u53cd\u9988\u884c\u4e3a\uff0c\u63ed\u793a\u4e86\u79f0\u547c\u73b0\u8c61\u5177\u6709\u6e10\u53d8\u7ed3\u6784\u3002", "categories": ["cs.CL", "cs.AI", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15648", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u65b9\u5bf9\u8bdd", "\u5bf9\u8bdd\u7cfb\u7edf", "\u81ea\u7136\u8bed\u8a00\u5904\u7406", "\u4eba\u673a\u4ea4\u4e92"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15648v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "On the Structure of Address in Multi-Party Dialogue: From Discrete Labels to Continuous Levels", "tldr": "\u672c\u6587\u91cd\u65b0\u5ba1\u89c6\u591a\u65b9\u5bf9\u8bdd\u4e2d\"\u88ab\u79f0\u547c\u8005\u68c0\u6d4b\"\u4efb\u52a1\uff0c\u5c06\u4f20\u7edf\u79bb\u6563\u6807\u7b7e\u6269\u5c55\u4e3a\u8fde\u7eed\u5730\u5740\u7ea7\u522b\uff0c\u5229\u7528\u6f5c\u53d8\u91cf\u6a21\u578b\u4ece\u591a\u6807\u6ce8\u8005\u5224\u65ad\u4e2d\u63a8\u65ad\u8fde\u7eed\u503c\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8fde\u7eed\u5730\u5740\u8868\u793a\u6bd4\u79bb\u6563\u6807\u7b7e\u66f4\u597d\u5730\u9884\u6d4b\u8bf4\u8bdd\u8f6e\u8f6c\u6362\u3001\u6ce8\u89c6\u548c\u53cd\u9988\u884c\u4e3a\uff0c\u63ed\u793a\u4e86\u79f0\u547c\u73b0\u8c61\u5177\u6709\u6e10\u53d8\u7ed3\u6784\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LEED v4.1 BD+C certification remains a document-intensive process that requires reviewers to read hundreds of pages of project evidence and apply credit-specific threshold logic by hand. This paper investigates whether small, locally deployed language models can perform meaningful screening of LEED documentation and how deterministic symbolic components should share that work. A neuro-symbolic pipeline is introduced that aligns project PDFs to LEED credit sections, retrieves evidence with credit-aware keyword signatures, verifies compliance with a locally hosted 4-billion-parameter language model, and applies a LEED-specific numeric checker to quantitative thresholds. Experiments on four university buildings (484 PDFs, 153 credit-level decisions) show that a 4-billion-parameter model (gemma3:4b) is the strongest text-only core verifier, achieving 67.3% accuracy and outperforming a larger 8-billion-parameter model (llama3.1:8b) in this task. The deterministic numeric checker corrects arithmetic errors on key quantitative credits, moving EA-p2 from 50% to 100% accuracy and improving several other credits when required values are reliably extracted. At the same time, the full neuro-symbolic configuration achieves 61.6% overall accuracy, trailing the best text-only baseline due to extraction failures and conservative behavior on qualitative categories. Systematic ablations show that adding low-resolution drawing images (150-300 dpi) consistently reduces accuracy, and that prompt effectiveness depends on the building\u0027s ground-truth PASS rate: rubric prompts perform best on documentation-rich projects, while chain-of-thought prompts perform best on documentation-lean projects. Within the specific scope of LEED v4.1 BD+C compliance verification over raw project documentation, this pipeline and its baselines provide an initial reproducible reference point for both accuracy and failure modes.", "arxiv_id": "2607.15647", "arxiv_url": "https://arxiv.org/abs/2607.15647", "authors": ["Aritro De", "Juliana Felkner"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u795e\u7ecf\u7b26\u53f7AI\u6d41\u6c34\u7ebf\uff0c\u7528\u4e8e\u81ea\u52a8\u5316LEED v4.1\u5efa\u7b51\u8ba4\u8bc1\u6587\u6863\u5ba1\u67e5\uff0c\u7ed3\u5408\u672c\u5730\u90e8\u7f72\u768440\u4ebf\u53c2\u6570\u8bed\u8a00\u6a21\u578b\u4e0e\u786e\u5b9a\u6027\u6570\u503c\u68c0\u67e5\u5668\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5c0f\u6a21\u578b\uff08gemma3:4b\uff09\u5728\u7eaf\u6587\u672c\u6838\u9a8c\u4e2d\u8fbe\u523067.3%\u51c6\u786e\u7387\uff0c\u4f18\u4e8e\u66f4\u5927\u768480\u4ebf\u53c2\u6570\u6a21\u578b\uff1b\u786e\u5b9a\u6027\u6570\u503c\u68c0\u67e5\u5668\u5c06EA-p2\u4fe1\u7528\u70b9\u51c6\u786e\u7387\u4ece50%\u63d0\u5347\u81f3100%\uff0c\u4f46\u52a0\u5165\u4f4e\u5206\u8fa8\u7387\u56fe\u50cf\u53cd\u800c\u964d\u4f4e\u6574\u4f53\u6027\u80fd\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15647", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u795e\u7ecf\u7b26\u53f7AI", "\u6587\u6863\u7406\u89e3", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5408\u89c4\u6027\u9a8c\u8bc1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15647v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Neuro-Symbolic AI for LEED compliance: Document-Centric Benchmarking, Deterministic Numeric Checking, and When Multimodal Hurts", "tldr": "\u672c\u6587\u63d0\u51fa\u4e00\u79cd\u795e\u7ecf\u7b26\u53f7AI\u6d41\u6c34\u7ebf\uff0c\u7528\u4e8e\u81ea\u52a8\u5316LEED v4.1\u5efa\u7b51\u8ba4\u8bc1\u6587\u6863\u5ba1\u67e5\uff0c\u7ed3\u5408\u672c\u5730\u90e8\u7f72\u768440\u4ebf\u53c2\u6570\u8bed\u8a00\u6a21\u578b\u4e0e\u786e\u5b9a\u6027\u6570\u503c\u68c0\u67e5\u5668\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5c0f\u6a21\u578b\uff08gemma3:4b\uff09\u5728\u7eaf\u6587\u672c\u6838\u9a8c\u4e2d\u8fbe\u523067.3%\u51c6\u786e\u7387\uff0c\u4f18\u4e8e\u66f4\u5927\u768480\u4ebf\u53c2\u6570\u6a21\u578b\uff1b\u786e\u5b9a\u6027\u6570\u503c\u68c0\u67e5\u5668\u5c06EA-p2\u4fe1\u7528\u70b9\u51c6\u786e\u7387\u4ece50%\u63d0\u5347\u81f3100%\uff0c\u4f46\u52a0\u5165\u4f4e\u5206\u8fa8\u7387\u56fe\u50cf\u53cd\u800c\u964d\u4f4e\u6574\u4f53\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Topos causal models recast causal inference inside a topos: a causal world is a presheaf, an intervention is a characteristic map into the subobject classifier, and reasoning is carried out in the intuitionistic internal language. We give the first machine-checked account of this 1-topos core, in Cubical Agda, over a previously verified probability monad and do-calculus. We build the classifier of sieves and realise the intervention $\\mathrm{do}(X := x_0)$ as a characteristic map with its classification theorem; prove the sheaf gluing of independent mechanisms, which the source asserts but never proves; and machine-check the Kripke-Joyal forcing clauses of the internal language. In the modal layer we find and repair a gap: the three standard Lawvere-Tierney axioms do not force a closure operator. With the missing law restored, we exhibit the double-negation topology as a concrete instance and show that interventions and Pearl\u0027s rules are stable under every topology. Transportability of a counterfactual across a cover of regimes then coincides with this $j$-stability, understood as invariance across the cover. We further add a phenomenon the programme does not consider: a machine-checked contextuality obstruction, where pairwise-consistent local data admit no global model. The development assumes no axioms and typechecks under Agda\u0027s --safe flag, with the ordered field discharged concretely at $\\mathbb{Q}$; the scope is the presheaf (1-topos) fragment, with type-level sheafification and the directed lift left to future work.", "arxiv_id": "2607.15629", "arxiv_url": "https://arxiv.org/abs/2607.15629", "authors": ["Karen Sargsyan"], "brief": "\u672c\u6587\u5728Cubical Agda\u4e2d\u5bf9\u62d3\u6251\u65af\u56e0\u679c\u6a21\u578b\u8fdb\u884c\u9996\u6b21\u673a\u5668\u9a8c\u8bc1\uff0c\u5f62\u5f0f\u5316\u4e86\u5e72\u9884\u64cd\u4f5c\u7684\u7279\u5f81\u6620\u5c04\u3001\u72ec\u7acb\u673a\u5236\u7684\u5c42\u7c98\u5408\u5b9a\u7406\uff0c\u5e76\u4fee\u590d\u4e86Lawvere-Tierney\u516c\u7406\u4f53\u7cfb\u4e2d\u7684\u4e00\u4e2a\u7f3a\u53e3\uff1b\u540c\u65f6\u5f15\u5165\u4e86\u4e0a\u4e0b\u6587\u6027\u969c\u788d\u7684\u673a\u5668\u9a8c\u8bc1\uff0c\u8bc1\u660ePearl\u89c4\u5219\u5728\u6240\u6709\u62d3\u6251\u4e0b\u7a33\u5b9a\u3002\u6574\u4e2a\u5f00\u53d1\u65e0\u9700\u989d\u5916\u516c\u7406\uff0c\u901a\u8fc7Agda\u7684--safe\u6807\u5fd7\u7c7b\u578b\u68c0\u67e5\u3002", "categories": ["cs.LO", "cs.AI", "math.CT"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15629", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56e0\u679c\u63a8\u65ad", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "\u62d3\u6251\u65af\u7406\u8bba", "\u76f4\u89c9\u4e3b\u4e49\u903b\u8f91"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15629v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A cubical formalisation of topos causal models: intervention, sheaf gluing, and the intuitionistic do-calculus", "tldr": "\u672c\u6587\u5728Cubical Agda\u4e2d\u5bf9\u62d3\u6251\u65af\u56e0\u679c\u6a21\u578b\u8fdb\u884c\u9996\u6b21\u673a\u5668\u9a8c\u8bc1\uff0c\u5f62\u5f0f\u5316\u4e86\u5e72\u9884\u64cd\u4f5c\u7684\u7279\u5f81\u6620\u5c04\u3001\u72ec\u7acb\u673a\u5236\u7684\u5c42\u7c98\u5408\u5b9a\u7406\uff0c\u5e76\u4fee\u590d\u4e86Lawvere-Tierney\u516c\u7406\u4f53\u7cfb\u4e2d\u7684\u4e00\u4e2a\u7f3a\u53e3\uff1b\u540c\u65f6\u5f15\u5165\u4e86\u4e0a\u4e0b\u6587\u6027\u969c\u788d\u7684\u673a\u5668\u9a8c\u8bc1\uff0c\u8bc1\u660ePearl\u89c4\u5219\u5728\u6240\u6709\u62d3\u6251\u4e0b\u7a33\u5b9a\u3002\u6574\u4e2a\u5f00\u53d1\u65e0\u9700\u989d\u5916\u516c\u7406\uff0c\u901a\u8fc7Agda\u7684--safe\u6807\u5fd7\u7c7b\u578b\u68c0\u67e5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Self-driving laboratories increasingly rely on low-cost liquid handlers such as the Opentrons OT-2, which ship without the pressure-based aspiration monitoring of Hamilton or Tecan systems and are typically run open-loop. Two failure modes go undetected: protocols that are syntactically valid but violate assay-specific invariants (e.g., tip reuse between a PCR template and a no-template control), and physical execution failures (partial dispense, air bubbles, missing tips) at runtime. We present AEGIS, a two-layer guardian for both. Layer 1 pairs a curated machine-readable assay rule database with an LLM that reasons over OT-2 Python code, reaching an adjusted F1 of 0.97 on a 24-protocol benchmark across five assay families and beating rules-only and LLM-only ablations across five backends; a free open-weight model ties the best proprietary one, so no paid API is required. Layer 2 fits a PCA world model to YOLO-cropped four-frame pipette trajectories; under a leakage-free leave-one-plate-out evaluation it reaches average precision 0.89 and operating-point F1 0.71 (AUROC 0.80), a deployment-faithful number that matches the live demonstration, and we characterize the small-pipette (p20) resolution limit (F1 0.47). A live demonstration on a physical OT-2 (five replicates per condition) catches planted no-tip failures deterministically and partial dispense on coloured dyes, with an always-VLM self-vote gate lifting partial-dispense recall to 5/5; transparent water is a principled limit of any front-view-only monitor, which AEGIS surfaces as low-confidence VLM reasoning rather than a wrong verdict. Cascade triage holds VLM cost near $1.63 per plate versus $10.33 for an always-VLM baseline. AEGIS is open source and, to our knowledge, the first system to unify pre-flight assay-aware validation with runtime visual monitoring for an open-source liquid handler.", "arxiv_id": "2607.15620", "arxiv_url": "https://arxiv.org/abs/2607.15620", "authors": ["Priyanka V. Setty", "Arvind Ramanathan", "Ian Foster", "Rick Stevens"], "brief": "AEGIS\u662f\u4e00\u4e2a\u9762\u5411\u5f00\u6e90\u6db2\u4f53\u5904\u7406\u673a\u5668\u4eba\uff08Opentrons OT-2\uff09\u7684\u53cc\u5c42\u5b88\u62a4\u7cfb\u7edf\uff1a\u7b2c\u4e00\u5c42\u5229\u7528LLM\u7ed3\u5408\u673a\u5668\u53ef\u8bfb\u89c4\u5219\u5e93\u5bf9\u5b9e\u9a8c\u534f\u8bae\u8fdb\u884c\u9884\u68c0\u9a8c\uff0c\u572824\u4e2a\u534f\u8bae\u57fa\u51c6\u4e0a\u8fbe\u5230F1=0.97\uff1b\u7b2c\u4e8c\u5c42\u901a\u8fc7PCA\u4e16\u754c\u6a21\u578b\u548cYOLO\u89c6\u89c9\u68c0\u6d4b\u5b9e\u65f6\u76d1\u63a7\u79fb\u6db2\u6267\u884c\u6545\u969c\uff08\u5982\u6f0f\u6db2\u3001\u6c14\u6ce1\uff09\uff0c\u5e73\u5747\u7cbe\u5ea60.89\uff0c\u5e76\u4ee5\u7ea7\u8054\u5206\u8bca\u5c06VLM\u6210\u672c\u964d\u4f4e\u7ea684%\u3002\u8fd9\u662f\u9996\u4e2a\u5c06\u9884\u98de\u884c\u534f\u8bae\u9a8c\u8bc1\u4e0e\u8fd0\u884c\u65f6\u89c6\u89c9\u76d1\u63a7\u7edf\u4e00\u7684\u5f00\u6e90\u6db2\u4f53\u5904\u7406\u7cfb\u7edf\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15620", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u673a\u5668\u4eba\u5b9e\u9a8c\u5ba4", "\u5927\u8bed\u8a00\u6a21\u578b", "\u89c6\u89c9\u76d1\u63a7"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15620v1", "published_at": "2026-07-17", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AEGIS: Assay-Aware Protocol Validation and Runtime Monitoring for Open-Source Liquid Handling Robots", "tldr": "AEGIS\u662f\u4e00\u4e2a\u9762\u5411\u5f00\u6e90\u6db2\u4f53\u5904\u7406\u673a\u5668\u4eba\uff08Opentrons OT-2\uff09\u7684\u53cc\u5c42\u5b88\u62a4\u7cfb\u7edf\uff1a\u7b2c\u4e00\u5c42\u5229\u7528LLM\u7ed3\u5408\u673a\u5668\u53ef\u8bfb\u89c4\u5219\u5e93\u5bf9\u5b9e\u9a8c\u534f\u8bae\u8fdb\u884c\u9884\u68c0\u9a8c\uff0c\u572824\u4e2a\u534f\u8bae\u57fa\u51c6\u4e0a\u8fbe\u5230F1=0.97\uff1b\u7b2c\u4e8c\u5c42\u901a\u8fc7PCA\u4e16\u754c\u6a21\u578b\u548cYOLO\u89c6\u89c9\u68c0\u6d4b\u5b9e\u65f6\u76d1\u63a7\u79fb\u6db2\u6267\u884c\u6545\u969c\uff08\u5982\u6f0f\u6db2\u3001\u6c14\u6ce1\uff09\uff0c\u5e73\u5747\u7cbe\u5ea60.89\uff0c\u5e76\u4ee5\u7ea7\u8054\u5206\u8bca\u5c06VLM\u6210\u672c\u964d\u4f4e\u7ea684%\u3002\u8fd9\u662f\u9996\u4e2a\u5c06\u9884\u98de\u884c\u534f\u8bae\u9a8c\u8bc1\u4e0e\u8fd0\u884c\u65f6\u89c6\u89c9\u76d1\u63a7\u7edf\u4e00\u7684\u5f00\u6e90\u6db2\u4f53\u5904\u7406\u7cfb\u7edf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multimodal Knowledge Graph Completion (MKGC) requires inferring missing entities from structural, textual, and visual cues. Existing diffusion-based MKGC methods usually denoise directly on raw multimodal features. Such a design forces the denoiser to simultaneously perform relation-dependent cue selection, cross-modal semantic alignment, and structure-aware entity generation, which introduces noisy and semantically inconsistent conditions for diffusion and consequently leads to suboptimal completion performance. To address this limitation, we propose MGDT: MLLM-Guided Diffusion Transformer with Relation-Adaptive Mixture-of-Experts (MGDT), a novel MKGC framework built on an align-then-diffuse paradigm. MGDT first employs a Relation-Adaptive Semantic Routing Mixture-of-Experts (RASR-MoE) module to select relation-relevant multimodal semantic ion Transformer with Relation-Adaptive Mixture-of-Experts for Multimodal Knowledge Graph Completion", "tldr": "\u63d0\u51faMGDT\u6846\u67b6\uff0c\u7528\u4e8e\u591a\u6a21\u6001\u77e5\u8bc6\u56fe\u8c31\u8865\u5168\uff0c\u91c7\u7528\"\u5148\u5bf9\u9f50\u540e\u6269\u6563\"\u8303\u5f0f\uff1a\u901a\u8fc7\u5173\u7cfb\u81ea\u9002\u5e94\u6df7\u5408\u4e13\u5bb6\u6a21\u5757\u7b5b\u9009\u76f8\u5173\u6a21\u6001\u8bed\u4e49\u8def\u5f84\uff0c\u518d\u4ee5\u51bb\u7ed3\u7684\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u4f5c\u4e3a\u8bed\u4e49\u951a\u70b9\u7edf\u4e00\u8868\u793a\u7a7a\u95f4\uff0c\u6700\u540e\u7528\u6269\u6563Transformer\u751f\u6210\u7f3a\u5931\u5b9e\u4f53\u3002\u5728\u4e09\u4e2a\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\u6301\u7eed\u4f18\u4e8e\u5f3a\u57fa\u7ebf\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper presents our solution to the KDD Cup 2026 Tencent UNIREC Challenge. The task requires joint modeling of multi-domain user behavior sequences and non-sequential multi-field features for target-ad pCVR prediction. We develop a Field-Aware RankMixer (FA-RankMixer) with dual-stream bilinear fusion. The model first applies target-aware DIN modules to extract user interests from multiple behavior domains. It also models recent and earlier interests separately for the longest behavior sequence. The model then forms semantic tokens based on feature fields and behavior domains and uses RankMixer blocks for cross-token interaction. A shallow MLP stream complements the deep RankMixer stream, and a group-wise bilinear module fuses their representations. Our final solution ranks ninth on the official leaderboard. Our code is available at https://github.com/PixelCookie-zyf/TAAC-2026-SeRankMixer.", "arxiv_id": "2607.15590", "arxiv_url": "https://arxiv.org/abs/2607.15590", "authors": ["Yufeng Zhang", "Zhengqi Xu", "Jiajun Cui"], "brief": "\u9488\u5bf9KDD Cup 2026\u817e\u8bafUNIREC\u6311\u6218\u8d5b\uff0c\u63d0\u51faField-Aware Ran let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
