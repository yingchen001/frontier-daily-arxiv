that prioritizes domains whose updates broadly benefit the rest of the training suite. TAC repurposes signals already produced by RL training: per-domain advantages capture local learnability, and projected gradients, taken from the GRPO step being computed, estimate cross-domain transferability via gradient-geometry alignment, at negligible cost (\u003c1% wall-clock overhead). Across a six-domain reasoning suite, TAC achieves the best macro-averaged accuracy on both Qwen3-1.7B and Llama3.2-3B, outperforming proportional random sampling, a hand-designed schedule, and a learnability-only bandit, and improving over the last of these by up to 2.8 points (10% relative). Ablations show performance degrades sharply when the transferability term is removed, and TAC remains robust on imbalanced training mixtures where learnability-only curricula over-commit to dominant domains. Our findings establish cross-domain transferability as a key signal for curriculum design in multi-domain RLVR.", "arxiv_id": "2606.25178", "arxiv_url": "https://arxiv.org/abs/2606.25178", "authors": ["Yongjin Yang", "Jiarui Liu", "Yinghui He", "Lezhen Zhang", "Bernhard Sch\u00f6lkopf", "Zhijing Jin"], "brief": "\u63d0\u51faTransfer-Aware Curriculum\uff08TAC\uff09\uff0c\u4e00\u79cd\u57fa\u4e8e\u591a\u81c2\u8001\u864e\u673a\u7684\u5728\u7ebf\u8bfe\u7a0b\u5b66\u4e60\u65b9\u6cd5\uff0c\u5728\u591a\u57dfRLVR\u8bad\u7ec3\u4e2d\u540c\u65f6\u8003\u8651\u5c40\u90e8\u53ef\u5b66\u4e60\u6027\u548c\u8de8\u57df\u8fc1\u79fb\u6027\uff0c\u52a8\u6001\u8c03\u6574\u5404\u9886\u57df\u7684\u91c7\u6837\u9891\u7387\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25178", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5229\u7528GRPO\u8bad\u7ec3\u4e2d\u5df2\u6709\u7684per-domain\u4f18\u52bf\u503c\u548c\u6295\u5f71\u68af\u5ea6\uff0c\u901a\u8fc7\u68af\u5ea6\u51e0\u4f55\u5bf9\u9f50\u4f30\u8ba1\u8de8\u57df\u8fc1\u79fb\u6027\uff0c\u989d\u5916\u5f00\u9500\u4e0d\u8db31%", "\u5728\u6570\u5b66\u3001\u7f16\u7a0b\u3001\u79d1\u5b66\u7b49\u516d\u57df\u63a8\u7406\u5957\u4ef6\u4e0a\uff0cTAC\u5728Qwen3-1.7B\u548cLlama3.2-3B\u4e0a\u5747\u53d6\u5f97\u6700\u4f73\u5b8f\u5e73\u5747\u51c6\u786e\u7387\uff0c\u76f8\u6bd4\u4ec5\u53ef\u5b66\u4e60\u6027\u57fa\u7ebf\u63d0\u5347\u6700\u9ad82.8\u70b9\uff08\u76f8\u5bf910%\uff09", "\u6d88\u878d\u5b9e\u9a8c\u8868\u660e\u53bb\u9664\u8fc1\u79fb\u6027\u9879\u540e\u6027\u80fd\u5927\u5e45\u4e0b\u964d\uff0c\u4e14TAC\u5728\u4e0d\u5e73\u8861\u8bad\u7ec3\u6df7\u5408\u4e2d\u5bf9\u4e3b\u5bfc\u57df\u8fc7\u62df\u5408\u95ee\u9898\u5177\u6709\u9c81\u68d2\u6027"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8bfe\u7a0b\u5b66\u4e60", "\u591a\u57df\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25178v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Transferability for General Reasoning: An Automated Curriculum for Multi-Domain RLVR", "tldr": "\u63d0\u51fa\u8fc1\u79fb\u611f\u77e5\u8bfe\u7a0bTAC\uff0c\u901a\u8fc7\u68af\u5ea6\u51e0\u4f55\u5bf9\u9f50\u4f18\u5148\u9009\u62e9\u8de8\u57df\u53d7\u76ca\u6700\u5927\u7684\u8bad\u7ec3\u57df", "upvotes": 0, "what_it_is": "\u63d0\u51faTransfer-Aware Curriculum\uff08TAC\uff09\uff0c\u4e00\u79cd\u57fa\u4e8e\u591a\u81c2\u8001\u864e\u673a\u7684\u5728\u7ebf\u8bfe\u7a0b\u5b66\u4e60\u65b9\u6cd5\uff0c\u5728\u591a\u57dfRLVR\u8bad\u7ec3\u4e2d\u540c\u65f6\u8003\u8651\u5c40\u90e8\u53ef\u5b66\u4e60\u6027\u548c\u8de8\u57df\u8fc1\u79fb\u6027\uff0c\u52a8\u6001\u8c03\u6574\u5404\u9886\u57df\u7684\u91c7\u6837\u9891\u7387\u3002", "why_notable": "\u9996\u6b21\u5c06\u8de8\u57df\u68af\u5ea6\u8fc1\u79fb\u6027\u5f15\u5165RLVR\u8bfe\u7a0b\u8bbe\u8ba1\uff0c\u586b\u8865\u4e86\u73b0\u6709\u53ef\u5b66\u4e60\u6027\u8bfe\u7a0b\u5ffd\u89c6\u57df\u95f4\u534f\u540c\u7684\u7a7a\u767d\uff0c\u4e3a\u591a\u57dfLLM\u63a8\u7406\u8bad\u7ec3\u63d0\u4f9b\u4e86\u4f4e\u6210\u672c\u3001\u9ad8\u6548\u7684\u81ea\u52a8\u5316\u8bfe\u7a0b\u65b9\u6848\u3002"}, {"abstract": "In the big-world regime, agents cannot be universally capable and their ability is inevitably specialized across a world model in pieces. Consequently, standard uniform guarantees fail to distinguish between the understanding of critical bottlenecks and irrelevant failures. We first formalize this limitation by proving that general agents are not universal, rendering standard worst-case analysis uninformative. To overcome this, we introduce structural certification, a transition-local framework that maps bounded goal-conditioned performance to entry-wise guarantees on the agent\u0027s internal world model. Our main contribution is constructive. We provide algorithms that filter specific transitions using deep compositional goals and prove that a general agent on these goals has a structural world model with a $\\mathcal{O}(1/n) + \\mathcal{O}(\u03b4)$ error bound. Conversely, this bound is tight in the small-$\u03b4$ regime, whose existence is explicitly guaranteed by our certification. These results enable the certifiable deployment of general agents by localizing the specific transitions where long-horizon planning is reliable.", "arxiv_id": "2606.24842", "arxiv_url": "https://arxiv.org/abs/2606.24842", "authors": ["Yikai Lu", "Yifei Wu", "Xinyu Lu", "Tongxin Li"], "brief": "\u672c\u6587\u63d0\u51fa\"\u7ed3\u6784\u6027\u8ba4\u8bc1\"\uff08Structural Certification\uff09\u6846\u67b6\uff0c\u9488\u5bf9\u901a\u7528\u667a\u80fd\u4f53\u5728\u5927\u4e16\u754c\u573a\u666f\u4e0b\u80fd\u529b\u4e0d\u5747\u5300\u7684\u95ee\u9898\uff0c\u901a\u8fc7\u6df1\u5ea6\u7ec4\u5408\u76ee\u6807\u8fc7\u6ee4\u7279\u5b9a\u72b6\u6001\u8f6c\u79fb\uff0c\u4e3a\u667a\u80fd\u4f53\u5185\u90e8\u4e16\u754c\u6a21\u578b\u63d0\u4f9b\u9010\u6761\u76ee\u7684\u8bef\u5dee\u4fdd\u8bc1\uff08O(1/n)+O(\u03b4)\uff09\uff0c\u4ece\u800c\u5b9a\u4f4d\u957f\u7a0b\u89c4\u5212\u53ef\u9760\u7684\u5177\u4f53\u8f6c\u79fb\u533a\u57df\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24842", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u8bc1\u660e\u901a\u7528\u667a\u80fd\u4f53\u4e0d\u5177\u5907\u666e\u904d\u80fd\u529b\uff0c\u6807\u51c6\u6700\u574f\u60c5\u51b5\u5206\u6790\u5728\u5927\u4e16\u754c\u573a\u666f\u4e0b\u65e0\u6548", "\u63d0\u51fa\u8f6c\u79fb\u5c40\u90e8\u6846\u67b6\uff0c\u5c06\u6709\u754c\u76ee\u6807\u6761\u4ef6\u6027\u80fd\u6620\u5c04\u4e3a\u4e16\u754c\u6a21\u578b\u7684\u9010\u6761\u76ee\u4fdd\u8bc1", "\u7b97\u6cd5\u5229\u7528\u6df1\u5ea6\u7ec4\u5408\u76ee\u6807\u8fc7\u6ee4\u8f6c\u79fb\uff0c\u8bef\u5dee\u754c\u4e3a O(1/n)+O(\u03b4)\uff0c\u4e14\u5728\u5c0f\u03b4\u533a\u95f4\u7d27\u81f4"], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24842v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "World Models in Pieces: Structural Certification for General Agents", "tldr": "\u63d0\u51fa\u7ed3\u6784\u6027\u8ba4\u8bc1\u6846\u67b6\uff0c\u5c06\u901a\u7528\u667a\u80fd\u4f53\u7684\u4e16\u754c\u6a21\u578b\u80fd\u529b\u6620\u5c04\u4e3a\u9010\u8f6c\u79fb\u5c40\u90e8\u4fdd\u8bc1", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u7ed3\u6784\u6027\u8ba4\u8bc1\"\uff08Structural Certification\uff09\u6846\u67b6\uff0c\u9488\u5bf9\u901a\u7528\u667a\u80fd\u4f53\u5728\u5927\u4e16\u754c\u573a\u666f\u4e0b\u80fd\u529b\u4e0d\u5747\u5300\u7684\u95ee\u9898\uff0c\u901a\u8fc7\u6df1\u5ea6\u7ec4\u5408\u76ee\u6807\u8fc7\u6ee4\u7279\u5b9a\u72b6\u6001\u8f6c\u79fb\uff0c\u4e3a\u667a\u80fd\u4f53\u5185\u90e8\u4e16\u754c\u6a21\u578b\u63d0\u4f9b\u9010\u6761\u76ee\u7684\u8bef\u5dee\u4fdd\u8bc1\uff08O(1/n)+O(\u03b4)\uff09\uff0c\u4ece\u800c\u5b9a\u4f4d\u957f\u7a0b\u89c4\u5212\u53ef\u9760\u7684\u5177\u4f53\u8f6c\u79fb\u533a\u57df\u3002", "why_notable": "\u9996\u6b21\u4ece\u7406\u8bba\u4e0a\u5f62\u5f0f\u5316\u4e86\u901a\u7528\u667a\u80fd\u4f53\u80fd\u529b\u5c40\u9650\u6027\uff0c\u5e76\u7ed9\u51fa\u53ef\u6784\u9020\u7684\u8ba4\u8bc1\u7b97\u6cd5\uff0c\u4e3a\u901a\u7528\u667a\u80fd\u4f53\u7684\u53ef\u4fe1\u90e8\u7f72\u63d0\u4f9b\u4e86\u7406\u8bba\u57fa\u7840\uff0c\u5bf9\u5b89\u5168AI\u548c\u957f\u7a0b\u89c4\u5212\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Recent advances in Video Large Language Models (Video-LLMs) have yielded promising performance on video question answering (VideoQA). Nevertheless, existing benchmarks are predominantly evaluated through answer correctness, while the grounding of predictions in relevant video evidence remains largely unexamined. This disconnect between answer generation and evidence understanding motivates the construction of the Evidence-Grounded Video Question Answering Benchmark (EG-VQA), an open-ended evaluation protocol in which each QA pair is explicitly annotated with supporting temporal evidence, thereby requiring joint reasoning and precise evidence localization. EG-VQA is comprised of 2,067 videos and 11,838 QA pairs with fine-grained evidence annotations. To evaluate predicted evidence, Evidence-Grounded F1 (EG-F1) is introduced as a unified metric in which temporal alignment and semantic consistency against ground-truth evidence are jointly measured. Experimental evaluation reveals that even strong proprietary models struggle to accurately ground their predictions, exposing a fundamental discrepancy between answer correctness and faithful evidence localization. To bridge this gap, EG-Reasoner, an evidence-grounded reasoning model trained with explicit supervision, is proposed. State-of-the-art performance is achieved among open-source models, with results competitive against proprietary systems, particularly pronounced gains are observed on reasoning-intensive tasks such as counterfactual questions. These findings demonstrate that scaling alone is insufficient for robust video understanding and that structured evidence supervision is essential for the development of more reliable and interpretable VideoQA systems.", "arxiv_id": "2606.24797", "arxiv_url": "https://arxiv.org/abs/2606.24797", "authors": ["Linpeng Huang", "Weixing Chen", "Zexin Chen", "Yang Liu", "Liang Lin"], "brief": "\u6784\u5efa\u4e86\u9996\u4e2a\u4ee5\u65f6\u5e8f\u8bc1\u636e\u4e3a\u6838\u5fc3\u7684\u89c6\u9891\u95ee\u7b54\u8bc4\u6d4b\u57fa\u51c6EG-VQA\uff0c\u5305\u542b2067\u4e2a\u89c6\u9891\u548c11838\u4e2aQA\u5bf9\uff0c\u6bcf\u5bf9\u5747\u6807\u6ce8\u652f\u6491\u7b54\u6848\u7684\u65f6\u5e8f\u8bc1\u636e\u7247\u6bb5\uff0c\u5e76\u63d0\u51faEG-F1\u7edf\u4e00\u8bc4\u4f30\u6307\u6807\uff0c\u540c\u65f6\u8bad\u7ec3\u4e86\u8bc1\u636e\u5f15\u5bfc\u63a8\u7406\u6a21\u578bEG-Reasoner\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24797", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6570\u636e\u96c6\u89c4\u6a21\uff1a2067\u4e2a\u89c6\u9891\u300111838\u4e2aQA\u5bf9\uff0c\u914d\u6709\u7ec6\u7c92\u5ea6\u65f6\u5e8f\u8bc1\u636e\u6807\u6ce8", "\u63d0\u51faEG-F1\u6307\u6807\uff0c\u8054\u5408\u8861\u91cf\u65f6\u5e8f\u5bf9\u9f50\u4e0e\u8bed\u4e49\u4e00\u81f4\u6027\uff0c\u8bc4\u4f30\u9884\u6d4b\u8bc1\u636e\u8d28\u91cf", "\u5b9e\u9a8c\u53d1\u73b0\u5f3a\u5546\u4e1a\u6a21\u578b\u5728\u8bc1\u636e\u5b9a\u4f4d\u4e0a\u8868\u73b0\u6b20\u4f73\uff0c\u7b54\u6848\u6b63\u786e\u6027\u4e0e\u8bc1\u636e\u5fe0\u5b9e\u6027\u5b58\u5728\u6839\u672c\u6027\u5dee\u8ddd\uff1bEG-Reasoner\u5728\u53cd\u4e8b\u5b9e\u7b49\u63a8\u7406\u5bc6\u96c6\u4efb\u52a1\u4e0a\u53d6\u5f97\u663e\u8457\u63d0\u5347"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24797v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EG-VQA: Benchmarking Verifiable Video Question Answering with Grounded Temporal Evidence", "tldr": "\u63d0\u51faEG-VQA\u57fa\u51c6\uff0c\u8981\u6c42\u89c6\u9891\u95ee\u7b54\u6a21\u578b\u540c\u65f6\u7ed9\u51fa\u7b54\u6848\u4e0e\u65f6\u5e8f\u8bc1\u636e\u5b9a\u4f4d\uff0c\u63ed\u793a\u73b0\u6709\u6a21\u578b\u7684\u8bc1\u636e\u7406\u89e3\u7f3a\u9677", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u9996\u4e2a\u4ee5\u65f6\u5e8f\u8bc1\u636e\u4e3a\u6838\u5fc3\u7684\u89c6\u9891\u95ee\u7b54\u8bc4\u6d4b\u57fa\u51c6EG-VQA\uff0c\u5305\u542b2067\u4e2a\u89c6\u9891\u548c11838\u4e2aQA\u5bf9\uff0c\u6bcf\u5bf9\u5747\u6807\u6ce8\u652f\u6491\u7b54\u6848\u7684\u65f6\u5e8f\u8bc1\u636e\u7247\u6bb5\uff0c\u5e76\u63d0\u51faEG-F1\u7edf\u4e00\u8bc4\u4f30\u6307\u6807\uff0c\u540c\u65f6\u8bad\u7ec3\u4e86\u8bc1\u636e\u5f15\u5bfc\u63a8\u7406\u6a21\u578bEG-Reasoner\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u89c6\u9891\u95ee\u7b54\u7684\u53ef\u9a8c\u8bc1\u6027\uff08\u8bc1\u636e\u5b9a\u4f4d\uff09\u7eb3\u5165\u8bc4\u6d4b\u6846\u67b6\uff0c\u63ed\u793a\u4e86\u5355\u7eaf\u6269\u5927\u6a21\u578b\u89c4\u6a21\u4e0d\u8db3\u4ee5\u5b9e\u73b0\u53ef\u9760\u89c6\u9891\u7406\u89e3\u7684\u5173\u952e\u95ee\u9898\uff0c\u4e3a\u6784\u5efa\u53ef\u89e3\u91caVideoQA\u7cfb\u7edf\u63d0\u4f9b\u4e86\u65b0\u65b9\u5411\u3002"}, {"abstract": "The loss of plasticity - the ability of a network to learn new information after having already learned older information - is a fundamental challenge in creating artificial neural networks capable of continual learning. Although this phenomenon has been known for decades, it has mostly been studied in older, relatively small architectures and rarely in natural-language domains. To determine whether loss of plasticity remains a problem in the modern transformer-based LLM paradigm, we study plasticity loss in GPT-style Transformer models trained on a multilingual continual learning problem. Consistent with prior work, we find evidence of plasticity loss across models ranging from 5M to 314M non-embedding parameters, as measured by deterioration on a held-out Vietnamese probing task. We further find that the onset of plasticity loss follows a predictable scaling law, growing sublinearly with model size. These results suggest that larger models may delay the measurable effects of plasticity loss, but that increasing parameter count alone is likely to be insufficient to completely prevent it. We also find evidence of plasticity loss under stationary multilingual training, challenging the view that the phenomenon is exclusive to continual learning with abrupt task changes. Overall, our results suggest that even large Transformer language models trained on natural-language will eventually lose the ability to efficiently adapt to new data after sufficiently long training, in both continual and stationary settings.", "arxiv_id": "2606.24752", "arxiv_url": "https://arxiv.org/abs/2606.24752", "authors": ["J. Fernando Hernandez-Garcia", "Tom\u00e1s Figliolia", "Beren Millidge"], "brief": "\u672c\u6587\u7814\u7a76GPT\u98ce\u683cTransformer\u6a21\u578b\u5728\u591a\u8bed\u8a00\u6301\u7eed\u5b66\u4e60\u573a\u666f\u4e0b\u7684\u53ef\u5851\u6027\u4e27\u5931\u73b0\u8c61\uff0c\u53d1\u73b0\u5373\u4f7f\u53c2\u6570\u91cf\u4ece5M\u6269\u5c55\u5230314M\uff0c\u6a21\u578b\u4ecd\u4f1a\u968f\u8bad\u7ec3\u65f6\u95f4\u589e\u957f\u9010\u6e10\u5931\u53bb\u5b66\u4e60\u65b0\u4fe1\u606f\u7684\u80fd\u529b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24752", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53ef\u5851\u6027\u4e27\u5931\u9075\u5faa\u53ef\u9884\u6d4b\u7684\u5e42\u5f8b\u7f29\u653e\u89c4\u5f8b\uff0c\u968f\u6a21\u578b\u89c4\u6a21\u4e9a\u7ebf\u6027\u589e\u957f\uff0c\u66f4\u5927\u6a21\u578b\u4ec5\u80fd\u5ef6\u8fdf\u800c\u975e\u6d88\u9664\u8be5\u95ee\u9898", "\u5728\u9759\u6001\u591a\u8bed\u8a00\u8bad\u7ec3\uff08\u65e0\u4efb\u52a1\u5207\u6362\uff09\u573a\u666f\u4e0b\u540c\u6837\u89c2\u5bdf\u5230\u53ef\u5851\u6027\u4e27\u5931\uff0c\u6311\u6218\u4e86\u8be5\u73b0\u8c61\u4ec5\u53d1\u751f\u4e8e\u4efb\u52a1\u7a81\u53d8\u7684\u4f20\u7edf\u8ba4\u77e5", "\u4ee5\u8d8a\u5357\u8bed\u4fdd\u7559\u63a2\u6d4b\u4efb\u52a1\u4e3a\u6307\u6807\uff0c\u8de85M\u81f3314M\u975e\u5d4c\u5165\u53c2\u6570\u89c4\u6a21\u7684\u6a21\u578b\u5747\u68c0\u6d4b\u5230\u6027\u80fd\u9000\u5316\u8bc1\u636e"], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u5851\u6027", "\u7f29\u653e\u5b9a\u5f8b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24752v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Can Scale Save Us From Plasticity Loss in Large Language Models?", "tldr": "\u5927\u89c4\u6a21LLM\u540c\u6837\u5b58\u5728\u53ef\u5851\u6027\u4e27\u5931\u95ee\u9898\uff0c\u6269\u5927\u53c2\u6570\u91cf\u53ea\u80fd\u5ef6\u8fdf\u800c\u65e0\u6cd5\u6839\u672c\u89e3\u51b3", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76GPT\u98ce\u683cTransformer\u6a21\u578b\u5728\u591a\u8bed\u8a00\u6301\u7eed\u5b66\u4e60\u573a\u666f\u4e0b\u7684\u53ef\u5851\u6027\u4e27\u5931\u73b0\u8c61\uff0c\u53d1\u73b0\u5373\u4f7f\u53c2\u6570\u91cf\u4ece5M\u6269\u5c55\u5230314M\uff0c\u6a21\u578b\u4ecd\u4f1a\u968f\u8bad\u7ec3\u65f6\u95f4\u589e\u957f\u9010\u6e10\u5931\u53bb\u5b66\u4e60\u65b0\u4fe1\u606f\u7684\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u53ef\u5851\u6027\u4e27\u5931\u7814\u7a76\u6269\u5c55\u5230\u73b0\u4ee3\u5927\u89c4\u6a21Transformer\u8bed\u8a00\u6a21\u578b\uff0c\u63ed\u793a\u4e86\u6301\u7eed\u5b66\u4e60\u7684\u6839\u672c\u74f6\u9888\u4e0d\u80fd\u9760\u5355\u7eaf\u5806\u53e0\u53c2\u6570\u89e3\u51b3\uff0c\u5bf9LLM\u6301\u7eed\u8bad\u7ec3\u4e0e\u7ec8\u8eab\u5b66\u4e60\u7814\u7a76\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "Large Language Models (LLMs) achieve strong performance across a growing range of domains, yet their scale poses deployment challenges in applications where latency and cost constraints are critical. This paper derives empirical scaling laws for domain-specific LLM compression, quantifying how in-domain and general knowledge performance scale with dataset size, compression ratio, supervision format, and iterative pruning schedule. Using quantitative finance as our application domain, we compare logit-based and LoRA-based distillation under iterative structural pruning, introducing a blended chain-of-thought supervision loss that stabilizes KL-divergence distillation over reasoning traces. In-domain task quality degrades predictably under compression while general-knowledge benchmarks collapse well before the same point; supervision format is the key driver of this tradeoff, with chain-of-thought supervision actively recovering general knowledge that pruning erases. We release the headline dataset FinHeadlineMix, scaling law results, and practical recommendations to provide a reusable framework for domain-specific compression decisions.", "arxiv_id": "2606.24747", "arxiv_url": "https://arxiv.org/abs/2606.24747", "authors": ["Lavinia Ghita", "Dhruv Desai", "Ioana Boier"], "brief": "\u672c\u6587\u9488\u5bf9\u9886\u57df\u7279\u5b9aLLM\u538b\u7f29\uff08\u4ee5\u91cf\u5316\u91d1\u878d\u4e3a\u5e94\u7528\u573a\u666f\uff09\uff0c\u63a8\u5bfc\u4e86\u7ecf\u9a8c\u7f29\u653e\u5b9a\u5f8b\uff0c\u91cf\u5316\u4e86\u6570\u636e\u96c6\u5927\u5c0f\u3001\u538b\u7f29\u6bd4\u3001\u76d1\u7763\u683c\u5f0f\u548c\u8fed\u4ee3\u526a\u679d\u7b56\u7565\u5bf9\u9886\u57df\u5185\u53ca\u901a\u7528\u77e5\u8bc6\u6027\u80fd\u7684\u5f71\u54cd\u89c4\u5f8b\u3002", "categories": ["cs.AI", "cs.CE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24747", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5bf9\u6bd4\u4e86\u57fa\u4e8elogit\u548c\u57fa\u4e8eLoRA\u7684\u84b8\u998f\u65b9\u6cd5\uff0c\u7ed3\u5408\u8fed\u4ee3\u7ed3\u6784\u5316\u526a\u679d\uff0c\u63d0\u51fa\u6df7\u5408\u601d\u7ef4\u94fe\u76d1\u7763\u635f\u5931\u4ee5\u7a33\u5b9aKL\u6563\u5ea6\u84b8\u998f", "\u53d1\u73b0\u9886\u57df\u5185\u4efb\u52a1\u8d28\u91cf\u968f\u538b\u7f29\u53ef\u9884\u6d4b\u5730\u4e0b\u964d\uff0c\u800c\u901a\u7528\u77e5\u8bc6\u57fa\u51c6\u5728\u66f4\u65e9\u9636\u6bb5\u5c31\u5d29\u6e83\uff1b\u76d1\u7763\u683c\u5f0f\u662f\u8be5\u6743\u8861\u7684\u5173\u952e\u9a71\u52a8\u56e0\u7d20", "\u601d\u7ef4\u94fe\u76d1\u7763\u80fd\u4e3b\u52a8\u6062\u590d\u526a\u679d\u6240\u6d88\u9664\u7684\u901a\u7528\u77e5\u8bc6\uff0c\u5e76\u53d1\u5e03\u4e86FinHeadlineMix\u6570\u636e\u96c6\u53ca\u7f29\u653e\u5b9a\u5f8b\u7ed3\u679c"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u84b8\u998f", "\u6a21\u578b\u538b\u7f29", "\u7f29\u653e\u5b9a\u5f8b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24747v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Scaling Laws for Task-Specific LLM Distillation", "tldr": "\u63a8\u5bfc\u4efb\u52a1\u7279\u5b9aLLM\u84b8\u998f\u7684\u7ecf\u9a8c\u7f29\u653e\u5b9a\u5f8b\uff0c\u63ed\u793a\u538b\u7f29\u6bd4\u3001\u6570\u636e\u96c6\u5927\u5c0f\u4e0e\u6027\u80fd\u7684\u91cf\u5316\u5173\u7cfb", "upvotes": 0, "what_it_is": "\u672c\u6587\u9488\u5bf9\u9886\u57df\u7279\u5b9aLLM\u538b\u7f29\uff08\u4ee5\u91cf\u5316\u91d1\u878d\u4e3a\u5e94\u7528\u573a\u666f\uff09\uff0c\u63a8\u5bfc\u4e86\u7ecf\u9a8c\u7f29\u653e\u5b9a\u5f8b\uff0c\u91cf\u5316\u4e86\u6570\u636e\u96c6\u5927\u5c0f\u3001\u538b\u7f29\u6bd4\u3001\u76d1\u7763\u683c\u5f0f\u548c\u8fed\u4ee3\u526a\u679d\u7b56\u7565\u5bf9\u9886\u57df\u5185\u53ca\u901a\u7528\u77e5\u8bc6\u6027\u80fd\u7684\u5f71\u54cd\u89c4\u5f8b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316\u9886\u57df\u7279\u5b9aLLM\u538b\u7f29\u7684\u7f29\u653e\u5b9a\u5f8b\uff0c\u4e3a\u5b9e\u9645\u90e8\u7f72\u4e2d\u7684\u538b\u7f29\u51b3\u7b56\u63d0\u4f9b\u53ef\u590d\u7528\u6846\u67b6\uff0c\u63ed\u793a\u4e86\u76d1\u7763\u683c\u5f0f\u5bf9\u901a\u7528\u77e5\u8bc6\u4fdd\u7559\u7684\u5173\u952e\u4f5c\u7528\uff0c\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement Learning with Verifiable Rewards (RLVR) for language-model reasoning can fail at both extremes of task difficulty: easy prompts often produce all-correct, low-diversity rollout groups with little gradient signal, while hard prompts can produce all-incorrect groups with no positive reward. We introduce ExTra (Exploratory Trajectory Optimization), a GRPO-compatible framework that extracts exploration signals from the model\u0027s own rollouts. ExTra combines two mechanisms: (i) a novelty reward that adds embedding-based diversity bonuses after GRPO normalization, rewarding diverse correct solutions; and (ii) entropy-guided prefix regeneration, which scores partial trajectories using entropy signals and continues exploration from promising intermediate steps. Across six mathematical reasoning benchmarks, ExTra improves Qwen3-1.7B over GRPO by about +5 points on pass@1 and +7 points on pass@16, showing that trajectory-level exploration signals can improve both single-sample accuracy and inference-time coverage.", "arxiv_id": "2606.24994", "arxiv_url": "https://arxiv.org/abs/2606.24994", "authors": ["Wenyang Hu", "Junxiang Jia", "Zhen Shu", "Daniel Dahlmeier", "See-Kiong Ng", "Bryan Kian Hsiang Low"], "brief": "\u63d0\u51faExTra\uff08\u63a2\u7d22\u6027\u8f68\u8ff9\u4f18\u5316\uff09\u6846\u67b6\uff0c\u517c\u5bb9GRPO\uff0c\u901a\u8fc7\u4ece\u6a21\u578b\u81ea\u8eabrollout\u4e2d\u63d0\u53d6\u63a2\u7d22\u4fe1\u53f7\uff0c\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u7b80\u5355\u9898\u5168\u5bf9/\u96be\u9898\u5168\u9519\u5bfc\u81f4\u68af\u5ea6\u4fe1\u53f7\u6d88\u5931\u7684\u95ee\u9898\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24994", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u65b0\u9896\u6027\u5956\u52b1\uff1a\u5728GRPO\u5f52\u4e00\u5316\u540e\u6dfb\u52a0\u57fa\u4e8e\u5d4c\u5165\u7684\u591a\u6837\u6027\u5956\u52b1\uff0c\u9f13\u52b1\u751f\u6210\u591a\u6837\u5316\u7684\u6b63\u786e\u89e3\u6cd5", "\u71b5\u5f15\u5bfc\u524d\u7f00\u518d\u751f\uff1a\u5229\u7528\u71b5\u4fe1\u53f7\u5bf9\u90e8\u5206\u8f68\u8ff9\u6253\u5206\uff0c\u4ece\u6709\u6f5c\u529b\u7684\u4e2d\u95f4\u6b65\u9aa4\u7ee7\u7eed\u63a2\u7d22", "\u5728\u516d\u4e2a\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\uff0cQwen3-1.7B\u76f8\u6bd4GRPO\u63d0\u5347\u7ea6pass@1 +5\u5206\u3001pass@16 +7\u5206"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b", "\u6570\u5b66\u63a8\u7406", "\u63a2\u7d22\u7b56\u7565"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24994v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ExTra: Exploratory Trajectory Optimization for Language Model Reinforcement Learning", "tldr": "ExTra\u6846\u67b6\u901a\u8fc7\u65b0\u9896\u6027\u5956\u52b1\u548c\u71b5\u5f15\u5bfc\u524d\u7f00\u518d\u751f\uff0c\u89e3\u51b3RLVR\u5728\u96be\u6613\u9898\u4e0a\u7684\u68af\u5ea6\u4fe1\u53f7\u7f3a\u5931\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faExTra\uff08\u63a2\u7d22\u6027\u8f68\u8ff9\u4f18\u5316\uff09\u6846\u67b6\uff0c\u517c\u5bb9GRPO\uff0c\u901a\u8fc7\u4ece\u6a21\u578b\u81ea\u8eabrollout\u4e2d\u63d0\u53d6\u63a2\u7d22\u4fe1\u53f7\uff0c\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u7b80\u5355\u9898\u5168\u5bf9/\u96be\u9898\u5168\u9519\u5bfc\u81f4\u68af\u5ea6\u4fe1\u53f7\u6d88\u5931\u7684\u95ee\u9898\u3002", "why_notable": "\u7cbe\u51c6\u5b9a\u4f4dRLVR\u8bad\u7ec3\u7684\u4e24\u5927\u5931\u6548\u573a\u666f\uff08\u5168\u5bf9/\u5168\u9519\uff09\uff0c\u4ee5\u8f7b\u91cf\u7ea7\u63a2\u7d22\u673a\u5236\u540c\u65f6\u63d0\u5347\u5355\u6b21\u91c7\u6837\u51c6\u786e\u7387\u548c\u63a8\u7406\u65f6\u8986\u76d6\u7387\uff0c\u5bf9\u5c0f\u6a21\u578b\u6570\u5b66\u63a8\u7406\u8bad\u7ec3\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Effective online adaptation of vision-language-action (VLA) models remains challenging, as sparse rewards provide weak supervision for high-dimensional autoregressive action policies. Although self-distillation can in principle provide denser training signals, we find that text-based privileged teachers conditioned on demonstrations, retrieved experiences, or high-level plans are ineffective for VLA adaptation, exposing a modality gap between symbolic guidance and low-level robot actions. We propose ROAD-VLA, an advantage-guided self-distillation framework that constructs a proximal teacher directly in action space by perturbing action-token logits with calibrated advantage estimates. This converts sparse rewards into dense token-level supervision while keeping the teacher close to the current policy. We further derive a policy-improvement lower bound under calibrated advantages and accurate teacher matching. Across seven robotic manipulation environments with in-distribution and out-of-distribution shifts, ROADVLA outperforms PPO in nearly all settings, demonstrating robust online VLA adaptation.", "arxiv_id": "2606.25800", "arxiv_url": "https://arxiv.org/abs/2606.25800", "authors": ["Kejing Wang", "Toan Nguyen", "Minh Hoang Nguyen", "Simon Khan", "Flora D. Salim"], "brief": "\u63d0\u51faROAD-VLA\uff0c\u4e00\u79cd\u4f18\u52bf\u5f15\u5bfc\u7684\u81ea\u84b8\u998f\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u52a8\u4f5ctoken logits\u4e0a\u65bd\u52a0\u6821\u51c6\u4f18\u52bf\u4f30\u8ba1\u6765\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\uff0c\u5c06\u7a00\u758f\u5956\u52b1\u8f6c\u5316\u4e3a\u5bc6\u96c6\u7684token\u7ea7\u76d1\u7763\u4fe1\u53f7\uff0c\u89e3\u51b3VLA\u6a21\u578b\u5728\u7ebf\u9002\u5e94\u96be\u9898\u3002", "categories": ["cs.LG", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25800", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\u57fa\u4e8e\u6587\u672c\u7684\u7279\u6743\u6559\u5e08\uff08\u6f14\u793a/\u68c0\u7d22\u7ecf\u9a8c/\u9ad8\u5c42\u8ba1\u5212\uff09\u5bf9VLA\u9002\u5e94\u65e0\u6548\uff0c\u5b58\u5728\u7b26\u53f7\u6307\u5bfc\u4e0e\u4f4e\u7ea7\u673a\u5668\u4eba\u52a8\u4f5c\u4e4b\u95f4\u7684\u6a21\u6001\u9e3f\u6c9f", "\u5728\u52a8\u4f5c\u7a7a\u95f4\u76f4\u63a5\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\uff0c\u7528\u6821\u51c6\u4f18\u52bf\u4f30\u8ba1\u6270\u52a8\u52a8\u4f5ctoken logits\uff0c\u5b9e\u73b0\u7a00\u758f\u5956\u52b1\u5230\u5bc6\u96c6token\u7ea7\u76d1\u7763\u7684\u8f6c\u5316", "\u57287\u4e2a\u673a\u5668\u4eba\u64cd\u4f5c\u73af\u5883\uff08\u542b\u5206\u5e03\u5185\u548c\u5206\u5e03\u5916\u504f\u79fb\uff09\u4e2d\uff0cROAD-VLA\u5728\u51e0\u4e4e\u6240\u6709\u8bbe\u7f6e\u4e0b\u5747\u4f18\u4e8ePPO\u57fa\u7ebf"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u673a\u5668\u4eba\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25800v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ROAD-VLA: Robust Online Adaptation via Self-Distillation for Vision-Language-Action Models", "tldr": "\u63d0\u51faROAD-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u52a8\u4f5c\u7a7a\u95f4\u81ea\u84b8\u998f\u5b9e\u73b0VLA\u6a21\u578b\u7684\u9c81\u68d2\u5728\u7ebf\u9002\u5e94", "upvotes": 0, "what_it_is": "\u63d0\u51faROAD-VLA\uff0c\u4e00\u79cd\u4f18\u52bf\u5f15\u5bfc\u7684\u81ea\u84b8\u998f\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u52a8\u4f5ctoken logits\u4e0a\u65bd\u52a0\u6821\u51c6\u4f18\u52bf\u4f30\u8ba1\u6765\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\uff0c\u5c06\u7a00\u758f\u5956\u52b1\u8f6c\u5316\u4e3a\u5bc6\u96c6\u7684token\u7ea7\u76d1\u7763\u4fe1\u53f7\uff0c\u89e3\u51b3VLA\u6a21\u578b\u5728\u7ebf\u9002\u5e94\u96be\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u6587\u672c\u7279\u6743\u6559\u5e08\u5728VLA\u5728\u7ebf\u9002\u5e94\u4e2d\u7684\u5931\u6548\u539f\u56e0\uff0c\u5e76\u63d0\u51fa\u5728\u52a8\u4f5c\u7a7a\u95f4\u76f4\u63a5\u6784\u5efa\u6559\u5e08\u7684\u65b0\u8303\u5f0f\uff0c\u4e3aVLA\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u63d0\u4f9b\u4e86\u7406\u8bba\u4fdd\u8bc1\uff08\u7b56\u7565\u6539\u8fdb\u4e0b\u754c\uff09\u548c\u5b9e\u8df5\u65b9\u6848\u3002"}, {"abstract": "Safety evaluation of large language models (LLMs) is commonly performed by querying models with unsafe or jailbreak prompts and judging whether their outputs violate a safety policy. Although useful, output-level evaluation is expensive, sensitive to judge choice, and easily tied to fixed question banks. We propose **SafeVec**, a white-box evaluation procedure that measures safety from internal representations rather than generated answers. **SafeVec** first extracts layer-wise refusal directions from a safety-aligned reference model, then selects stable layer windows where safe and unsafe behaviors are separable, and finally scores a target model by measuring whether its hidden states align with these refusal directions under unsafe and jailbreak prompts. The resulting metric, **RAS** (**R**efusal **A**lignment **S**core), maps representation-level refusal alignment to a calibrated 0-100 safety score. Across `Llama`, `Gemma`, and `Qwen` model families, RAS separates aligned models from uncensored and abliterated variants, tracks output-level attack success rate, and is substantially faster than judge-based evaluation. These results suggest that refusal alignment provides a compact and efficient signal for white-box LLM safety evaluation.", "arxiv_id": "2606.25750", "arxiv_url": "https://arxiv.org/abs/2606.25750", "authors": ["Chang-Chieh Huang", "Yan-Lun Chen", "Chia-Mu Yu", "Wei-Bin Lee"], "brief": "\u63d0\u51faSafeVec\u767d\u76d2\u5b89\u5168\u8bc4\u4f30\u6846\u67b6\uff0c\u4ece\u5b89\u5168\u5bf9\u9f50\u53c2\u8003\u6a21\u578b\u4e2d\u63d0\u53d6\u9010\u5c42\u62d2\u7edd\u65b9\u5411\uff0c\u901a\u8fc7\u8861\u91cf\u76ee\u6807\u6a21\u578b\u9690\u85cf\u72b6\u6001\u4e0e\u62d2\u7edd\u65b9\u5411\u7684\u5bf9\u9f50\u7a0b\u5ea6\uff0c\u751f\u62100-100\u7684RAS\uff08\u62d2\u7edd\u5bf9\u9f50\u5206\u6570\uff09\u5b89\u5168\u8bc4\u5206\uff0c\u65e0\u9700\u4f9d\u8d56\u6a21\u578b\u8f93\u51fa\u5224\u65ad\u3002", "categories": ["cs.CR", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25750", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4ece\u53c2\u8003\u6a21\u578b\u63d0\u53d6\u5c42\u7ea7\u62d2\u7edd\u65b9\u5411\uff0c\u9009\u53d6\u5b89\u5168/\u4e0d\u5b89\u5168\u884c\u4e3a\u53ef\u5206\u79bb\u7684\u7a33\u5b9a\u5c42\u7a97\u53e3\u4f5c\u4e3a\u8bc4\u4f30\u4f9d\u636e", "RAS\u6307\u6807\u5728Llama\u3001Gemma\u3001Qwen\u4e09\u5927\u6a21\u578b\u5bb6\u65cf\u4e0a\u6709\u6548\u533a\u5206\u5bf9\u9f50\u6a21\u578b\u4e0e\u672a\u5ba1\u67e5/\u6d88\u878d\u53d8\u4f53", "\u76f8\u6bd4\u57fa\u4e8ejudge\u7684\u8f93\u51fa\u7ea7\u8bc4\u4f30\uff0c\u901f\u5ea6\u663e\u8457\u66f4\u5feb\uff0c\u4e14\u4e0d\u4f9d\u8d56\u56fa\u5b9a\u95ee\u9898\u5e93\u6216\u5916\u90e8\u8bc4\u5224\u6a21\u578b"], "keywords": ["LLM\u5b89\u5168", "\u767d\u76d2\u8bc4\u4f30", "\u5bf9\u9f50", "\u8d8a\u72f1\u653b\u51fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25750v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RAS: Measuring LLM Safety Through Refusal Alignment", "tldr": "\u63d0\u51faSafeVec\u767d\u76d2\u65b9\u6cd5\uff0c\u901a\u8fc7\u5185\u90e8\u8868\u793a\u7684\u62d2\u7edd\u65b9\u5411\u5bf9\u9f50\u6765\u8bc4\u4f30LLM\u5b89\u5168\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51faSafeVec\u767d\u76d2\u5b89\u5168\u8bc4\u4f30\u6846\u67b6\uff0c\u4ece\u5b89\u5168\u5bf9\u9f50\u53c2\u8003\u6a21\u578b\u4e2d\u63d0\u53d6\u9010\u5c42\u62d2\u7edd\u65b9\u5411\uff0c\u901a\u8fc7\u8861\u91cf\u76ee\u6807\u6a21\u578b\u9690\u85cf\u72b6\u6001\u4e0e\u62d2\u7edd\u65b9\u5411\u7684\u5bf9\u9f50\u7a0b\u5ea6\uff0c\u751f\u62100-100\u7684RAS\uff08\u62d2\u7edd\u5bf9\u9f50\u5206\u6570\uff09\u5b89\u5168\u8bc4\u5206\uff0c\u65e0\u9700\u4f9d\u8d56\u6a21\u578b\u8f93\u51fa\u5224\u65ad\u3002", "why_notable": "\u7a81\u7834\u4f20\u7edf\u8f93\u51fa\u7ea7\u5b89\u5168\u8bc4\u4f30\u7684\u5c40\u9650\uff0c\u9996\u6b21\u5c06\u5185\u90e8\u8868\u793a\u7684\u62d2\u7edd\u65b9\u5411\u5bf9\u9f50\u4f5c\u4e3a\u5b89\u5168\u5ea6\u91cf\u4fe1\u53f7\uff0c\u6210\u672c\u4f4e\u3001\u53ef\u6269\u5c55\u3001\u4e0d\u53d7judge\u9009\u62e9\u5f71\u54cd\uff0c\u4e3a\u767d\u76d2LLM\u5b89\u5168\u8bc4\u4f30\u63d0\u4f9b\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Long-term memory promises LLM agents that grow more capable across sessions, maintaining an accurate, evolving understanding of the user that interaction forms. In practice, however, this memory is evaluated mostly through downstream behavior, such as later answers, personalization quality, or task success, which tests that understanding only indirectly and leaves the memory artifact itself largely unaudited. We argue that long-term memory should instead be evaluated as an auditable post-interaction artifact: after ordinary assistance, what structured user state can be reconstructed from the memory the agent leaves behind? We instantiate this view in MEMPROBE, a benchmark in which a memory-equipped agent assists simulated users, each carrying a hidden, taxonomy-anchored user-state bank, across a trajectory of leak-controlled tasks, after which that bank is reconstructed from the agent\u0027s resulting memory under both full-store and top-k access. Built on synthetic ground truth for efficient, scalable measurement, MEMPROBE spans 50 simulated users with 31 hidden dimensions each (1,550 recovery targets) and tests 5 representative memory systems. Testing state-of-the-art memory agents, we find that successful assistance and recoverable memory behave as distinct capabilities. Task completion nearly saturates, even for a memoryless baseline, while category-balanced recovery stays moderate (about 0.6) and drops further under top-k retrieval. MEMPROBE is the first benchmark to study memory recovery directly, reconstructing the user state a system retains and scoring it against ground truth. We see recovery as a concrete objective for future memory agents to optimize, and MEMPROBE as a step toward an environment where agents are trained to remember their users, growing more faithful the longer they know them.", "arxiv_id": "2606.24595", "arxiv_url": "https://arxiv.org/abs/2606.24595", "authors": ["Enze Ma", "Yufan Zhou", "Wei-Chieh Huang", "Jie Yang", "Huanhuan Ma", "Zixuan Wang", "Chengze Li", "Chunyu Miao", "Philip S. Yu", "Zhen Wang"], "brief": "\u63d0\u51faMEMPROBE\u57fa\u51c6\uff0c\u901a\u8fc7\u4ece\u667a\u80fd\u4f53\u8bb0\u5fc6\u4e2d\u91cd\u5efa\u9690\u85cf\u7528\u6237\u72b6\u6001\u6765\u76f4\u63a5\u8bc4\u4f30\u957f\u671f\u8bb0\u5fc6\u8d28\u91cf\uff0c\u800c\u975e\u4f9d\u8d56\u4e0b\u6e38\u884c\u4e3a\u95f4\u63a5\u8861\u91cf\u3002\u5b9e\u9a8c\u53d1\u73b0\u4efb\u52a1\u5b8c\u6210\u7387\u4e0e\u8bb0\u5fc6\u53ef\u6062\u590d\u6027\u662f\u4e24\u79cd\u72ec\u7acb\u80fd\u529b\uff1a\u4efb\u52a1\u5b8c\u6210\u63a5\u8fd1\u9971\u548c\uff0c\u4f46\u7528\u6237\u72b6\u6001\u6062\u590d\u51c6\u786e\u7387\u4ec5\u7ea60.6\uff0c\u4e14\u5728top-k\u68c0\u7d22\u4e0b\u8fdb\u4e00\u6b65\u4e0b\u964d\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24595", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u957f\u671f\u8bb0\u5fc6", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 1, "on_hf": true, "organization": "University of California at San Diego", "pdf_url": "https://arxiv.org/pdf/2606.24595v1", "published_at": "2026-06-23", "score": 0.173, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (1\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.24595.png", "title": "MEMPROBE: Probing Long-Term Agent Memory via Hidden User-State Recovery", "tldr": "\u63d0\u51faMEMPROBE\u57fa\u51c6\uff0c\u901a\u8fc7\u4ece\u667a\u80fd\u4f53\u8bb0\u5fc6\u4e2d\u91cd\u5efa\u9690\u85cf\u7528\u6237\u72b6\u6001\u6765\u76f4\u63a5\u8bc4\u4f30\u957f\u671f\u8bb0\u5fc6\u8d28\u91cf\uff0c\u800c\u975e\u4f9d\u8d56\u4e0b\u6e38\u884c\u4e3a\u95f4\u63a5\u8861\u91cf\u3002\u5b9e\u9a8c\u53d1\u73b0\u4efb\u52a1\u5b8c\u6210\u7387\u4e0e\u8bb0\u5fc6\u53ef\u6062\u590d\u6027\u662f\u4e24\u79cd\u72ec\u7acb\u80fd\u529b\uff1a\u4efb\u52a1\u5b8c\u6210\u63a5\u8fd1\u9971\u548c\uff0c\u4f46\u7528\u6237\u72b6\u6001\u6062\u590d\u51c6\u786e\u7387\u4ec5\u7ea60.6\uff0c\u4e14\u5728top-k\u68c0\u7d22\u4e0b\u8fdb\u4e00\u6b65\u4e0b\u964d\u3002", "upvotes": 1, "what_it_is": null, "why_notable": null}, {"abstract": "A central goal of safety research is determining whether a model is misaligned. Prior work has largely focused on detecting concerning behavior. But behavior alone does not establish misalignment: a concerning action can arise from benign causes such as confusion. This motivates model forensics: investigating whether the action was driven by malign intent. In this paper, we propose a baseline protocol for model forensics consisting of two steps, iterated as needed. First, we read the chain of thought (CoT) to generate hypotheses about what drives model behavior. Second, we make edits to the prompt or environment to test these hypotheses. While the CoT is not always faithful, it is a rich source of unsupervised insight that can guide the collection of more rigorous evidence. To evaluate our protocol, we create a suite of six agentic environments where models exhibit concerning behavior, and apply it to each. We establish that Kimi K2 Thinking takes shortcuts due to a genuine disposition towards low-effort actions, by showing this hypothesis successfully predicts its behavior. Through counterfactual experiments, we show DeepSeek R1 deceives out of a desire to be consistent with a previous instance of itself. Our methods nonetheless leave significant room for refinement. For example, when we test whether Kimi K2 Thinking believes it is violating user intent, we find no evidence of such a belief, but without positive controls we cannot confirm our tests would detect it. Overall, we find our simple protocol provides a strong baseline that we hope future work will improve upon. More broadly, our work is a concrete step in developing the growing field of model forensics.", "arxiv_id": "2606.26071", "arxiv_url": "https://arxiv.org/abs/2606.26071", "authors": ["Aditya Singh", "Gerson Kroiz", "Senthooran Rajamanoharan", "Neel Nanda"], "brief": "\u63d0\u51fa\"\u6a21\u578b\u53d6\u8bc1\"\u6846\u67b6\uff0c\u901a\u8fc7\u8bfb\u53d6\u601d\u7ef4\u94fe\u751f\u6210\u5047\u8bbe\u3001\u518d\u901a\u8fc7\u63d0\u793a\u8bcd\u7f16\u8f91\u9a8c\u8bc1\u5047\u8bbe\uff0c\u533a\u5206\u6a21\u578b\u7684\u95ee\u9898\u884c\u4e3a\u662f\u6e90\u4e8e\u6076\u610f\u610f\u56fe\u8fd8\u662f\u826f\u6027\u6df7\u6dc6\u3002\u5b9e\u9a8c\u5728\u516d\u4e2a\u667a\u80fd\u4f53\u73af\u5883\u4e2d\u9a8c\u8bc1\uff0c\u53d1\u73b0Kimi K2 Thinking\u5b58\u5728\u771f\u5b9e\u7684\u4f4e\u52aa\u529b\u503e\u5411\uff0cDeepSeek R1\u5219\u51fa\u4e8e\u81ea\u6211\u4e00\u81f4\u6027\u6b32\u671b\u800c\u8fdb\u884c\u6b3a\u9a97\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26071", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u6a21\u578b\u5bf9\u9f50", "\u667a\u80fd\u4f53", "\u601d\u7ef4\u94fe", "AI\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26071v1", "published_at": "2026-06-24", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Model Forensics: Investigating Whether Concerning Behavior Reflects Misalignment", "tldr": "\u63d0\u51fa\"\u6a21\u578b\u53d6\u8bc1\"\u6846\u67b6\uff0c\u901a\u8fc7\u8bfb\u53d6\u601d\u7ef4\u94fe\u751f\u6210\u5047\u8bbe\u3001\u518d\u901a\u8fc7\u63d0\u793a\u8bcd\u7f16\u8f91\u9a8c\u8bc1\u5047\u8bbe\uff0c\u533a\u5206\u6a21\u578b\u7684\u95ee\u9898\u884c\u4e3a\u662f\u6e90\u4e8e\u6076\u610f\u610f\u56fe\u8fd8\u662f\u826f\u6027\u6df7\u6dc6\u3002\u5b9e\u9a8c\u5728\u516d\u4e2a\u667a\u80fd\u4f53\u73af\u5883\u4e2d\u9a8c\u8bc1\uff0c\u53d1\u73b0Kimi K2 Thinking\u5b58\u5728\u771f\u5b9e\u7684\u4f4e\u52aa\u529b\u503e\u5411\uff0cDeepSeek R1\u5219\u51fa\u4e8e\u81ea\u6211\u4e00\u81f4\u6027\u6b32\u671b\u800c\u8fdb\u884c\u6b3a\u9a97\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We introduce Autodata, a general method that enables AI agents to act as data scientists who build high quality training and evaluation data. We show how to train (meta-optimize) such a data scientist agent, so that it learns to create even stronger data. We describe the overall formulation, and a specific practical implementation, Agentic Self-Instruct. We conduct experiments on computer science research tasks, legal reasoning tasks and reasoning with mathematical objects, where we obtain improved results compared to classical synthetic dataset creation methods. Further, meta-optimizing the data scientist agent itself delivers an even larger performance uplift. Agentic data creation provides a way to convert increased inference compute into higher quality model training. Overall, we believe this direction has the potential to change the way we build AI data.", "arxiv_id": "2606.25996", "arxiv_url": "https://arxiv.org/abs/2606.25996", "authors": ["Ilia Kulikov", "Chenxi Whitehouse", "Tianhao Wu", "Yixin Nie", "Swarnadeep Saha", "Eryk Helenowski", "Weizhe Yuan", "Olga Golovneva", "Jack Lanchantin", "Yoram Bachrach", "Jakob Foerster", "Xian Li", "Han Fang", "Sainbayar Sukhbaatar", "Jason Weston"], "brief": "\u63d0\u51faAutodata\u6846\u67b6\uff0c\u8ba9AI\u667a\u80fd\u4f53\u626e\u6f14\u6570\u636e\u79d1\u5b66\u5bb6\u89d2\u8272\uff0c\u81ea\u52a8\u751f\u6210\u9ad8\u8d28\u91cf\u5408\u6210\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u6570\u636e\u3002\u901a\u8fc7\u5143\u4f18\u5316\uff08meta-optimize\uff09\u6570\u636e\u79d1\u5b66\u5bb6\u667a\u80fd\u4f53\u672c\u8eab\uff0c\u5728\u8ba1\u7b97\u673a\u79d1\u5b66\u7814\u7a76\u3001\u6cd5\u5f8b\u63a8\u7406\u548c\u6570\u5b66\u63a8\u7406\u4efb\u52a1\u4e0a\u5747\u4f18\u4e8e\u4f20\u7edf\u5408\u6210\u6570\u636e\u65b9\u6cd5\uff0c\u4e14\u5143\u4f18\u5316\u540e\u6548\u679c\u63d0\u5347\u66f4\u663e\u8457\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25996", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5408\u6210\u6570\u636e", "\u5143\u4f18\u5316", "\u6570\u636e\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25996v1", "published_at": "2026-06-24", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Autodata: An agentic data scientist to create high quality synthetic data", "tldr": "\u63d0\u51faAutodata\u6846\u67b6\uff0c\u8ba9AI\u667a\u80fd\u4f53\u626e\u6f14\u6570\u636e\u79d1\u5b66\u5bb6\u89d2\u8272\uff0c\u81ea\u52a8\u751f\u6210\u9ad8\u8d28\u91cf\u5408\u6210\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u6570\u636e\u3002\u901a\u8fc7\u5143\u4f18\u5316\uff08meta-optimize\uff09\u6570\u636e\u79d1\u5b66\u5bb6\u667a\u80fd\u4f53\u672c\u8eab\uff0c\u5728\u8ba1\u7b97\u673a\u79d1\u5b66\u7814\u7a76\u3001\u6cd5\u5f8b\u63a8\u7406\u548c\u6570\u5b66\u63a8\u7406\u4efb\u52a1\u4e0a\u5747\u4f18\u4e8e\u4f20\u7edf\u5408\u6210\u6570\u636e\u65b9\u6cd5\uff0c\u4e14\u5143\u4f18\u5316\u540e\u6548\u679c\u63d0\u5347\u66f4\u663e\u8457\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are turning from isolated predictors into agentic systems: they call tools, retrieve evidence, obey environment constraints, use verifiers, and complete tasks through search and multi-turn interaction. We adopts an analytical viewpoint based on \"compression is intelligence\": under a fixed task distribution, interface, and compute budget, a stronger agentic system lets a target object be reconstructed with fewer bits. We operationalize the measure with arithmetic coding, seed coding, and a fallback, and evaluate it in five settings: reversed text, chess moves, protein sequences, retrieval-augmented question answering, and semantic story compression; in all of them agentic components reduce codelength. These small, controlled experiments cover component types typical of real agentic systems, show that codelength can analyze how components, observers, and budgets change residual uncertainty, and offer guidance for evaluating real agent systems.", "arxiv_id": "2606.25960", "arxiv_url": "https://arxiv.org/abs/2606.25960", "authors": ["Zihan Qin", "Hongrui Zhang"], "brief": "\u63d0\u51fa\u4ee5\"\u538b\u7f29\u5373\u667a\u80fd\"\u4e3a\u6838\u5fc3\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u8bc4\u4f30\u6846\u67b6\uff1a\u5728\u56fa\u5b9a\u4efb\u52a1\u5206\u5e03\u548c\u8ba1\u7b97\u9884\u7b97\u4e0b\uff0c\u66f4\u5f3a\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u80fd\u7528\u66f4\u5c11\u6bd4\u7279\u91cd\u5efa\u76ee\u6807\u5bf9\u8c61\u3002\u901a\u8fc7\u7b97\u672f\u7f16\u7801\u7b49\u65b9\u6cd5\u5728\u4e94\u7c7b\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0c\u667a\u80fd\u4f53\u7ec4\u4ef6\uff08\u5de5\u5177\u8c03\u7528\u3001\u68c0\u7d22\u3001\u9a8c\u8bc1\u5668\u7b49\uff09\u5747\u80fd\u6709\u6548\u964d\u4f4e\u7f16\u7801\u957f\u5ea6\uff0c\u4e3a\u667a\u80fd\u4f53\u7cfb\u7edf\u8bc4\u4f30\u63d0\u4f9b\u4e86\u53ef\u91cf\u5316\u7684\u4fe1\u606f\u8bba\u89c6\u89d2\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25960", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4fe1\u606f\u8bba", "\u538b\u7f29", "\u7cfb\u7edf\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25960v1", "published_at": "2026-06-24", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Agentic System as Compressor: Quantifying System Intelligence in Bits", "tldr": "\u63d0\u51fa\u4ee5\"\u538b\u7f29\u5373\u667a\u80fd\"\u4e3a\u6838\u5fc3\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u8bc4\u4f30\u6846\u67b6\uff1a\u5728\u56fa\u5b9a\u4efb\u52a1\u5206\u5e03\u548c\u8ba1\u7b97\u9884\u7b97\u4e0b\uff0c\u66f4\u5f3a\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u80fd\u7528\u66f4\u5c11\u6bd4\u7279\u91cd\u5efa\u76ee\u6807\u5bf9\u8c61\u3002\u901a\u8fc7\u7b97\u672f\u7f16\u7801\u7b49\u65b9\u6cd5\u5728\u4e94\u7c7b\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0c\u667a\u80fd\u4f53\u7ec4\u4ef6\uff08\u5de5\u5177\u8c03\u7528\u3001\u68c0\u7d22\u3001\u9a8c\u8bc1\u5668\u7b49\uff09\u5747\u80fd\u6709\u6548\u964d\u4f4e\u7f16\u7801\u957f\u5ea6\uff0c\u4e3a\u667a\u80fd\u4f53\u7cfb\u7edf\u8bc4\u4f30\u63d0\u4f9b\u4e86\u53ef\u91cf\u5316\u7684\u4fe1\u606f\u8bba\u89c6\u89d2\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Neural scaling laws describe how pre-training loss decays as power laws with training time, model size, and compute. This position paper argues that the exponents of these power laws are fixed by generic mechanisms: a one-third time scaling due to the strong nonlinearity of Softmax, an inverse width scaling due to representational superposition, and an inverse depth scaling due to ensemble averaging of Transformer layers. These mechanisms are robust to a wide range of data structures and architectural details, placing current large language models in a universality class with fixed exponents. The coefficients, however, are expected to be sensitive to data and architecture details, and directly determine practical quantities such as the optimal model shape and the compute-optimal frontier. We therefore argue that understanding the coefficients is the key to near-term performance improvements, and that a closer examination of the current universality class may reveal pathways to better universality classes.", "arxiv_id": "2606.25008", "arxiv_url": "https://arxiv.org/abs/2606.25008", "authors": ["Yizhou Liu", "Jeff Gore"], "brief": "\u672c\u6587\u8ba4\u4e3a\u795e\u7ecf\u7f51\u7edc\u7f29\u653e\u5f8b\u4e2d\u7684\u5e42\u5f8b\u6307\u6570\u7531\u901a\u7528\u673a\u5236\u51b3\u5b9a\uff08Softmax\u975e\u7ebf\u6027\u3001\u8868\u793a\u53e0\u52a0\u3001Transformer\u5c42\u96c6\u6210\uff09\uff0c\u5177\u6709\u666e\u9002\u6027\uff1b\u800c\u7cfb\u6570\u5219\u5bf9\u6570\u636e\u548c\u67b6\u6784\u654f\u611f\uff0c\u76f4\u63a5\u51b3\u5b9a\u6700\u4f18\u6a21\u578b\u5f62\u72b6\u548c\u8ba1\u7b97\u6548\u7387\u524d\u6cbf\uff0c\u56e0\u6b64\u7406\u89e3\u7cfb\u6570\u624d\u662f\u8fd1\u671f\u6027\u80fd\u63d0\u5347\u7684\u5173\u952e\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25008", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7f29\u653e\u5f8b", "\u5927\u8bed\u8a00\u6a21\u578b", "Transformer", "\u666e\u9002\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25008v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Neural Scaling Universality: If Exponents Are Fixed, Time to Understand Coefficients", "tldr": "\u672c\u6587\u8ba4\u4e3a\u795e\u7ecf\u7f51\u7edc\u7f29\u653e\u5f8b\u4e2d\u7684\u5e42\u5f8b\u6307\u6570\u7531\u901a\u7528\u673a\u5236\u51b3\u5b9a\uff08Softmax\u975e\u7ebf\u6027\u3001\u8868\u793a\u53e0\u52a0\u3001Transformer\u5c42\u96c6\u6210\uff09\uff0c\u5177\u6709\u666e\u9002\u6027\uff1b\u800c\u7cfb\u6570\u5219\u5bf9\u6570\u636e\u548c\u67b6\u6784\u654f\u611f\uff0c\u76f4\u63a5\u51b3\u5b9a\u6700\u4f18\u6a21\u578b\u5f62\u72b6\u548c\u8ba1\u7b97\u6548\u7387\u524d\u6cbf\uff0c\u56e0\u6b64\u7406\u89e3\u7cfb\u6570\u624d\u662f\u8fd1\u671f\u6027\u80fd\u63d0\u5347\u7684\u5173\u952e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are increasingly deployed as agents that solve tasks by interacting with external tool environments. Although recent tool-use benchmarks increasingly cover complex task settings, they still largely assume clean, stable, and trustworthy tool environments, leaving tool-environment unreliability insufficiently examined. We introduce ToolBench-X, a benchmark for evaluating agents under recoverable reliability hazards. ToolBench-X contains executable multi-step tasks across diverse domains and sequential, parallel, and mixed workflows, each paired with deterministic tools and a canonical final answer for automatic evaluation. Starting from clean tool environments, ToolBench-X injects five structured hazard types: Specification Drift, Invocation Error, Execution Failure, Output Drift, and Cross-source Conflict. Crucially, each injected instance remains solvable through at least one valid recovery path, such as retrying, fallback, verification, or cross-checking. Experiments reveal a substantial reliability gap: agents that perform well with reliable tools often fail under recoverable hazards. Further analysis shows that failures are driven less by tool-use volume or inference budget than by limited hazard diagnosis and ineffective recovery. Targeted recovery hints recover many failed tasks, while test-time scaling yields more limited gains. These results suggest that tool-use evaluation should move beyond function-call accuracy toward task completion under unreliable tool environments. The code and data is available at https://github.com/Foreverskyou/ToolBench-X.", "arxiv_id": "2606.25819", "arxiv_url": "https://arxiv.org/abs/2606.25819", "authors": ["Yang Tian", "Zhengpeng Shi", "Bo Zhao"], "brief": "\u63d0\u51faToolBench-X\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u5de5\u5177\u73af\u5883\u4e0d\u53ef\u9760\u6761\u4ef6\u4e0b\u7684\u8868\u73b0\uff0c\u6db5\u76d6\u89c4\u8303\u6f02\u79fb\u3001\u8c03\u7528\u9519\u8bef\u7b49\u4e94\u7c7b\u6545\u969c\u6ce8\u5165\u3002\u5b9e\u9a8c\u53d1\u73b0\u73b0\u6709\u667a\u80fd\u4f53\u5728\u53ef\u6062\u590d\u6545\u969c\u4e0b\u8868\u73b0\u5927\u5e45\u4e0b\u964d\uff0c\u5931\u8d25\u6839\u6e90\u5728\u4e8e\u6545\u969c\u8bca\u65ad\u80fd\u529b\u4e0d\u8db3\u800c\u975e\u63a8\u7406\u9884\u7b97\u9650\u5236\uff0c\u547c\u5401\u5de5\u5177\u4f7f\u7528\u8bc4\u4f30\u8d85\u8d8a\u51fd\u6570\u8c03\u7528\u51c6\u786e\u7387\u3002", "categories": ["cs.CL", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25819", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25819v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Function Calling: Benchmarking Tool-Using Agents under Tool-Environment Unreliability", "tldr": "\u63d0\u51faToolBench-X\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u5de5\u5177\u73af\u5883\u4e0d\u53ef\u9760\u6761\u4ef6\u4e0b\u7684\u8868\u73b0\uff0c\u6db5\u76d6\u89c4\u8303\u6f02\u79fb\u3001\u8c03\u7528\u9519\u8bef\u7b49\u4e94\u7c7b\u6545\u969c\u6ce8\u5165\u3002\u5b9e\u9a8c\u53d1\u73b0\u73b0\u6709\u667a\u80fd\u4f53\u5728\u53ef\u6062\u590d\u6545\u969c\u4e0b\u8868\u73b0\u5927\u5e45\u4e0b\u964d\uff0c\u5931\u8d25\u6839\u6e90\u5728\u4e8e\u6545\u969c\u8bca\u65ad\u80fd\u529b\u4e0d\u8db3\u800c\u975e\u63a8\u7406\u9884\u7b97\u9650\u5236\uff0c\u547c\u5401\u5de5\u5177\u4f7f\u7528\u8bc4\u4f30\u8d85\u8d8a\u51fd\u6570\u8c03\u7528\u51c6\u786e\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement Learning (RL) has enabled LLMs to excel in objective reasoning tasks such as mathematics and code generation. However, applying RL to open-ended tasks, such as creative writing, remains challenging because LLM-as-a-judge reward models often exhibit stylistic biases and positional inconsistencies, leading to unstable supervision. To address this, we propose OPERA (Objective Perplexity-based Reflective Alignment), which replaces unreliable external judges with intrinsic rewards derived from perplexity dynamics. Specifically, we derive an intrinsic reward signal from perplexity dynamics, quantifying uncertainty reduction at critical reflective states. During the cold-start phase, we introduce a data synthesis method that leverages carefully designed guiding words to generate diverse reasoning traces, along with perplexity-prioritized rollouts that utilize internal log-probabilities to identify logically consistent reasoning branches. This pipeline yields a large-scale dataset comprising 20,000 high-quality reasoning trajectories. Empirical evaluations consistently demonstrate the scalability and efficacy of our approach in alignment for open-ended tasks. Implementing OPERA on Qwen3-8B establishes a new state-of-the-art among open-source models, achieving parity with or surpassing proprietary models like Gemini2.5 and MiniMax-M2.5 in some open-ended tasks. The code is available at https://github.com/pangpang-xuan/OPERA.", "arxiv_id": "2606.25757", "arxiv_url": "https://arxiv.org/abs/2606.25757", "authors": ["Wenxuan Jiang", "Zining Fan", "Zijian Zhang", "Xuecheng Wu", "Hongming Tan", "Haoyang Dai", "Xiaoyu Li", "Xuezhi Cao", "Ninghao Liu"], "brief": "\u63d0\u51faOPERA\u6846\u67b6\uff0c\u7528\u56f0\u60d1\u5ea6\u52a8\u6001\u53d8\u5316\u4f5c\u4e3a\u5185\u5728\u5956\u52b1\u4fe1\u53f7\u66ff\u4ee3\u4e0d\u7a33\u5b9a\u7684LLM-as-a-judge\u8bc4\u5224\uff0c\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u5728\u5f00\u653e\u5f0f\u4efb\u52a1\uff08\u5982\u521b\u610f\u5199\u4f5c\uff09\u4e2d\u7684\u5bf9\u9f50\u96be\u9898\u3002\u5728Qwen3-8B\u4e0a\u5b9e\u73b0\u5f00\u6e90\u6a21\u578b\u6700\u4f18\uff0c\u90e8\u5206\u4efb\u52a1\u5ab2\u7f8eGemini2.5\u7b49\u95ed\u6e90\u6a21\u578b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25757", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5f00\u653e\u5f0f\u63a8\u7406", "\u56f0\u60d1\u5ea6\u5956\u52b1", "\u5927\u8bed\u8a00\u6a21\u578b\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25757v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "OPERA: Aligning Open-Ended Reasoning via Objective Perplexity-based Reinforcement Learning", "tldr": "\u63d0\u51faOPERA\u6846\u67b6\uff0c\u7528\u56f0\u60d1\u5ea6\u52a8\u6001\u53d8\u5316\u4f5c\u4e3a\u5185\u5728\u5956\u52b1\u4fe1\u53f7\u66ff\u4ee3\u4e0d\u7a33\u5b9a\u7684LLM-as-a-judge\u8bc4\u5224\uff0c\u89e3\u51b3\u5f3a\u5316\u5b66\u4e60\u5728\u5f00\u653e\u5f0f\u4efb\u52a1\uff08\u5982\u521b\u610f\u5199\u4f5c\uff09\u4e2d\u7684\u5bf9\u9f50\u96be\u9898\u3002\u5728Qwen3-8B\u4e0a\u5b9e\u73b0\u5f00\u6e90\u6a21\u578b\u6700\u4f18\uff0c\u90e8\u5206\u4efb\u52a1\u5ab2\u7f8eGemini2.5\u7b49\u95ed\u6e90\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLM-based text embedders have substantially improved retrieval and semantic representation quality, but their deployment remains costly: large backbone models slow down embedding inference, while high-dimensional full-precision embeddings impose substantial storage and bandwidth overhead on large-scale indexes. In this paper, we present BITEMBED, an extreme low-bit framework for LLM-based text embedding that jointly targets encoding efficiency and vector storage. BITEMBED converts pretrained LLM backbones into BitNet-style embedding encoders with ternary weights, quantized activations, and lightweight normalization refinement. The converted model is adapted to representation learning through continual contrastive pre-training, followed by supervised contrastive fine-tuning with both similarity-distribution distillation and attention-relation distillation from a full-precision teacher. Beyond quantizing the backbone, BITEMBED further trains output embeddings to support multiple storage precisions meeting different storage needs in various scenarios. Experiments on MMTEB (eng, v2) with Qwen3-0.6B and Gemma3-270M show that BITEMBED is largely comparable to full precision teacher embedders. Moreover, BITEMBED flexibly obtains text embeddings of various precisions, achieving a trade-off between performance and storage cost.", "arxiv_id": "2606.25674", "arxiv_url": "https://arxiv.org/abs/2606.25674", "authors": ["Zhen Li", "Xin Huang", "Liang Wang", "Nan Yang", "Ting Song", "Yan Xia", "Xun Wu", "Shaohan Huang", "Huishuai Zhang", "Furu Wei", "Dongyan Zhao"], "brief": "\u63d0\u51faBITEMBED\u6846\u67b6\uff0c\u5c06\u57fa\u4e8eLLM\u7684\u6587\u672c\u5d4c\u5165\u6a21\u578b\u8f6c\u6362\u4e3aBitNet\u98ce\u683c\u7684\u4e09\u503c\u6743\u91cd\u7f16\u7801\u5668\uff0c\u901a\u8fc7\u6301\u7eed\u5bf9\u6bd4\u9884\u8bad\u7ec3\u548c\u77e5\u8bc6\u84b8\u998f\u5fae\u8c03\uff0c\u5728\u5927\u5e45\u964d\u4f4e\u5b58\u50a8\u4e0e\u63a8\u7406\u5f00\u9500\u7684\u540c\u65f6\uff0c\u6027\u80fd\u63a5\u8fd1\u5168\u7cbe\u5ea6\u6559\u5e08\u6a21\u578b\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u6846\u67b6\u652f\u6301\u591a\u79cd\u8f93\u51fa\u5d4c\u5165\u7cbe\u5ea6\uff0c\u7075\u6d3b\u5e73\u8861\u6027\u80fd\u4e0e\u5b58\u50a8\u6210\u672c\u3002", "categories": ["cs.CL", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25674", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u5d4c\u5165", "\u6a21\u578b\u91cf\u5316", "\u77e5\u8bc6\u84b8\u998f", "\u4fe1\u606f\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25674v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "BitNet Text Embeddings", "tldr": "\u63d0\u51faBITEMBED\u6846\u67b6\uff0c\u5c06\u57fa\u4e8eLLM\u7684\u6587\u672c\u5d4c\u5165\u6a21\u578b\u8f6c\u6362\u4e3aBitNet\u98ce\u683c\u7684\u4e09\u503c\u6743\u91cd\u7f16\u7801\u5668\uff0c\u901a\u8fc7\u6301\u7eed\u5bf9\u6bd4\u9884\u8bad\u7ec3\u548c\u77e5\u8bc6\u84b8\u998f\u5fae\u8c03\uff0c\u5728\u5927\u5e45\u964d\u4f4e\u5b58\u50a8\u4e0e\u63a8\u7406\u5f00\u9500\u7684\u540c\u65f6\uff0c\u6027\u80fd\u63a5\u8fd1\u5168\u7cbe\u5ea6\u6559\u5e08\u6a21\u578b\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u6846\u67b6\u652f\u6301\u591a\u79cd\u8f93\u51fa\u5d4c\u5165\u7cbe\u5ea6\uff0c\u7075\u6d3b\u5e73\u8861\u6027\u80fd\u4e0e\u5b58\u50a8\u6210\u672c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent studies on world modeling for Large Language Model (LLM) agents typically formulate the learning objective as next-observation prediction. However, this objective ties supervision to what a transition happens to reveal, which may omit the dynamics most relevant to the agent\u0027s current decision. To bridge this gap, we propose Agent-Authored World Modeling (AAWM), a training procedure that constructs supervision from the policy\u0027s own decision needs. Specifically, at each state, the agent identifies what it needs to understand about the environment before acting. These needs drive the retrieval of relevant transition evidence across trajectories, which is then synthesized into training targets that capture decision-oriented dynamics instead of reconstructing the next observation. This aligns the training objective with the dynamics the policy needs before acting, not with the contents of the next observation. Experimental results validate the effectiveness of AAWM across multiple environments and training settings. These results show that decision-aware world-model targets provide a more effective learning signal than next-observation prediction.", "arxiv_id": "2606.25421", "arxiv_url": "https://arxiv.org/abs/2606.25421", "authors": ["Guangfeng Cai", "Kaibing Yang", "Shuo He", "Yu Li", "Shengtian Yang", "Jiaqi Lv", "Lei Feng"], "brief": "\u63d0\u51fa\u667a\u80fd\u4f53\u81ea\u4e3b\u6784\u5efa\u4e16\u754c\u6a21\u578b\u7684\u8bad\u7ec3\u65b9\u6cd5AAWM\uff0c\u5c06\u76d1\u7763\u4fe1\u53f7\u4ece\"\u9884\u6d4b\u4e0b\u4e00\u89c2\u6d4b\"\u8f6c\u53d8\u4e3a\"\u51b3\u7b56\u5bfc\u5411\u7684\u52a8\u6001\u5efa\u6a21\"\u3002\u667a\u80fd\u4f53\u5728\u6bcf\u4e2a\u72b6\u6001\u4e3b\u52a8\u8bc6\u522b\u51b3\u7b56\u6240\u9700\u7684\u73af\u5883\u77e5\u8bc6\uff0c\u68c0\u7d22\u76f8\u5173\u8f68\u8ff9\u8bc1\u636e\u5e76\u5408\u6210\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u591a\u4e2a\u73af\u5883\u4e2d\u4f18\u4e8e\u4f20\u7edf\u4e0b\u4e00\u89c2\u6d4b\u9884\u6d4b\u65b9\u5f0f\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25421", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5e8f\u5217\u51b3\u7b56"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25421v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Next-Observation Prediction: Agent-Authored World Modeling for Sequential Decision Making", "tldr": "\u63d0\u51fa\u667a\u80fd\u4f53\u81ea\u4e3b\u6784\u5efa\u4e16\u754c\u6a21\u578b\u7684\u8bad\u7ec3\u65b9\u6cd5AAWM\uff0c\u5c06\u76d1\u7763\u4fe1\u53f7\u4ece\"\u9884\u6d4b\u4e0b\u4e00\u89c2\u6d4b\"\u8f6c\u53d8\u4e3a\"\u51b3\u7b56\u5bfc\u5411\u7684\u52a8\u6001\u5efa\u6a21\"\u3002\u667a\u80fd\u4f53\u5728\u6bcf\u4e2a\u72b6\u6001\u4e3b\u52a8\u8bc6\u522b\u51b3\u7b56\u6240\u9700\u7684\u73af\u5883\u77e5\u8bc6\uff0c\u68c0\u7d22\u76f8\u5173\u8f68\u8ff9\u8bc1\u636e\u5e76\u5408\u6210\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u591a\u4e2a\u73af\u5883\u4e2d\u4f18\u4e8e\u4f20\u7edf\u4e0b\u4e00\u89c2\u6d4b\u9884\u6d4b\u65b9\u5f0f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Test-time scaling improves language-model reasoning, but existing approaches often face a difficult trade-off: long chain-of-thought sampling remains single-threaded, while sentence- or solution-level search can be computationally expensive and hard to train end-to-end. We introduce Local Branch Routing (LBR), a token-level test-time scaling framework that expands a small local lookahead tree, forwards all sampled branches through the language model, and uses a lightweight router to select the depth-1 subtree to commit. By routing over the hidden states of candidate local futures, LBR allows each token decision to use evidence beyond the root next-token distribution while avoiding full solution-level search. The resulting prune-shift-grow decoding process preserves discrete branch identities and defines a tractable tree-trajectory likelihood: newly grown nodes are counted when first sampled, and router decisions are assigned explicit probabilities. This enables end-to-end reinforcement learning with verifiable rewards, jointly optimizing the base model and router under the same likelihood-ratio principle as discrete-token RLVR. On synthetic hierarchical-planning tasks, LBR shows that post-candidate hidden states provide useful routing evidence. On mathematical reasoning benchmarks, LBR improves both Pass@1 and Pass@32 over discrete chain-of-thought, vanilla discrete-token RLVR, and RL-compatible soft-token branching baselines. These results suggest that lightweight local branching offers an efficient, trainable, and discrete form of language-model test-time scaling.", "arxiv_id": "2606.25354", "arxiv_url": "https://arxiv.org/abs/2606.25354", "authors": ["Yutong Yin", "Mingyu Jin", "Jin Pan", "Changyi Yang", "Zijie Xia", "Dhruv Pai", "Shuming Hu", "Zhen Zhang", "Chenyang Zhao", "Jinman Zhao", "Wujiang Xu", "Raymond Li", "Xin Eric Wang", "Julian McAuley", "Zhaoran Wang"], "brief": "\u63d0\u51fa\u5c40\u90e8\u5206\u652f\u8def\u7531\uff08LBR\uff09\u6846\u67b6\uff0c\u5728\u63a8\u7406\u65f6\u6784\u5efa\u5c0f\u578b\u5c40\u90e8\u524d\u77bb\u6811\uff0c\u901a\u8fc7\u8f7b\u91cf\u8def\u7531\u5668\u57fa\u4e8e\u5019\u9009\u5206\u652f\u7684\u9690\u85cf\u72b6\u6001\u9009\u62e9\u6700\u4f18\u5b50\u6811\uff0c\u907f\u514d\u4e86\u5168\u89e3\u7ea7\u641c\u7d22\u7684\u9ad8\u4ee3\u4ef7\u3002\u8be5\u65b9\u6cd5\u652f\u6301\u7aef\u5230\u7aef\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u5728\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\u540c\u65f6\u63d0\u5347\u4e86Pass@1\u548cPass@32\u6307\u6807\uff0c\u4f18\u4e8e\u6807\u51c6\u601d\u7ef4\u94fe\u548c\u79bb\u6563token RLVR\u57fa\u7ebf\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25354", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6d4b\u8bd5\u65f6\u6269\u5c55", "\u5f3a\u5316\u5b66\u4e60", "\u63a8\u7406", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25354v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Efficient and Trainable Language Model Test-Time Scaling via Local Branch Routing", "tldr": "\u63d0\u51fa\u5c40\u90e8\u5206\u652f\u8def\u7531\uff08LBR\uff09\u6846\u67b6\uff0c\u5728\u63a8\u7406\u65f6\u6784\u5efa\u5c0f\u578b\u5c40\u90e8\u524d\u77bb\u6811\uff0c\u901a\u8fc7\u8f7b\u91cf\u8def\u7531\u5668\u57fa\u4e8e\u5019\u9009\u5206\u652f\u7684\u9690\u85cf\u72b6\u6001\u9009\u62e9\u6700\u4f18\u5b50\u6811\uff0c\u907f\u514d\u4e86\u5168\u89e3\u7ea7\u641c\u7d22\u7684\u9ad8\u4ee3\u4ef7\u3002\u8be5\u65b9\u6cd5\u652f\u6301\u7aef\u5230\u7aef\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u5728\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\u540c\u65f6\u63d0\u5347\u4e86Pass@1\u548cPass@32\u6307\u6807\uff0c\u4f18\u4e8e\u6807\u51c6\u601d\u7ef4\u94fe\u548c\u79bb\u6563token RLVR\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Memory for large language model (LLM) agents has rapidly evolved from simple retrieval-augmented mechanisms into a data management system that supports persistent information storage, retrieval, update, consolidation, and dynamic lifecycle governance throughout agent execution. Despite this evolution, existing evaluations still benchmark agent memory mainly through end-to-end task success metrics (e.g., F1, BLEU), while treating the underlying system as a monolithic black box. As a result, critical system-level concerns, including operational costs, architectural trade-offs across memory modules, and robustness under dynamic knowledge updates, remain insufficiently explored. In this paper, we present a systematic experimental study of agent memory from a data management perspective. We propose an analytical framework that decomposes agent memory into four core modules: memory representation and storage, extraction, retrieval and routing, and maintenance. Under this framework, we evaluate 12 representative memory systems and two reference baselines across five benchmark workloads spanning 11 datasets. Our extensive end-to-end evaluation shows that no single architecture dominates across all scenarios; instead, effectiveness depends heavily on how well the memory structure aligns with the workload bottleneck. Furthermore, through fine-grained ablation studies, we quantify their individual effects on representation fidelity, retrieval precision, update correctness, and long-horizon stability. Finally, we reveal cost-performance trade-offs under realistic workloads, showing localized maintenance is more cost-efficient than global reorganization. Based on these findings, we identify promising directions towards building truly agent-native memory systems. The code is publicly available at https://github.com/OpenDataBox/MemoryData.", "arxiv_id": "2606.24775", "arxiv_url": "https://arxiv.org/abs/2606.24775", "authors": ["Wei Zhou", "Xuanhe Zhou", "Shaokun Han", "Hongming Xu", "Guoliang Li", "Zhiyu Li", "Feiyu Xiong", "Fan Wu"], "brief": "\u672c\u6587\u4ece\u6570\u636e\u7ba1\u7406\u89c6\u89d2\u5bf9LLM\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\u8fdb\u884c\u7cfb\u7edf\u6027\u5b9e\u9a8c\u7814\u7a76\uff0c\u63d0\u51fa\u5c06\u667a\u80fd\u4f53\u8bb0\u5fc6\u5206\u89e3\u4e3a\u8868\u793a\u5b58\u50a8\u3001\u63d0\u53d6\u3001\u68c0\u7d22\u8def\u7531\u548c\u7ef4\u62a4\u56db\u4e2a\u6838\u5fc3\u6a21\u5757\u7684\u5206\u6790\u6846\u67b6\uff0c\u5bf912\u4e2a\u4ee3\u8868\u6027\u8bb0\u5fc6\u7cfb\u7edf\u572811\u4e2a\u6570\u636e\u96c6\u4e0a\u8fdb\u884c\u8bc4\u6d4b\uff0c\u53d1\u73b0\u6ca1\u6709\u5355\u4e00\u67b6\u6784\u80fd\u5728\u6240\u6709\u573a\u666f\u4e2d\u5360\u4f18\uff0c\u5e76\u63ed\u793a\u4e86\u5c40\u90e8\u7ef4\u62a4\u6bd4\u5168\u5c40\u91cd\u7ec4\u66f4\u5177\u6210\u672c\u6548\u76ca\u7b49\u5173\u952e\u89c4\u5f8b\u3002", "categories": ["cs.CL", "cs.DB", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24775", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u7cfb\u7edf", "\u5927\u8bed\u8a00\u6a21\u578b", "\u68c0\u7d22\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24775v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Are We Ready For An Agent-Native Memory System?", "tldr": "\u672c\u6587\u4ece\u6570\u636e\u7ba1\u7406\u89c6\u89d2\u5bf9LLM\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\u8fdb\u884c\u7cfb\u7edf\u6027\u5b9e\u9a8c\u7814\u7a76\uff0c\u63d0\u51fa\u5c06\u667a\u80fd\u4f53\u8bb0\u5fc6\u5206\u89e3\u4e3a\u8868\u793a\u5b58\u50a8\u3001\u63d0\u53d6\u3001\u68c0\u7d22\u8def\u7531\u548c\u7ef4\u62a4\u56db\u4e2a\u6838\u5fc3\u6a21\u5757\u7684\u5206\u6790\u6846\u67b6\uff0c\u5bf912\u4e2a\u4ee3\u8868\u6027\u8bb0\u5fc6\u7cfb\u7edf\u572811\u4e2a\u6570\u636e\u96c6\u4e0a\u8fdb\u884c\u8bc4\u6d4b\uff0c\u53d1\u73b0\u6ca1\u6709\u5355\u4e00\u67b6\u6784\u80fd\u5728\u6240\u6709\u573a\u666f\u4e2d\u5360\u4f18\uff0c\u5e76\u63ed\u793a\u4e86\u5c40\u90e8\u7ef4\u62a4\u6bd4\u5168\u5c40\u91cd\u7ec4\u66f4\u5177\u6210\u672c\u6548\u76ca\u7b49\u5173\u952e\u89c4\u5f8b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Non-autoregressive generation offers a powerful paradigm for iterative refinement, allowing models to recursively critique, erase and regenerate arbitrary subsets of tokens. However, existing non-autoregressive models fail to realize this potential. Masked Diffusion Models (MDMs) suffer from factorization error, causing sample quality to collapse when generating multiple tokens simultaneously. Flow Map Language Models (FMLMs) circumvent this bottleneck via joint sequence transport for excellent few-step generation, but sacrifice the inference-time flexibility of MDMs. We introduce FMLM+, a framework that bridges this gap by equipping FMLM with masking-style noise schedules. While generating the full sequence in a single step, FMLM+ simultaneously scores the global consistency of each token a posteriori. We leverage this to introduce Posterior Refinement, a novel inference-time refinement strategy that enables the model to adaptively self-correct its outputs, matching the performance of discrete baselines with 32x fewer NFEs. Across diverse benchmarks, we demonstrate that FMLM+ with Posterior Refinement improves the speed--quality tradeoff over both MDM and FMLM families, providing a scalable foundation for high-fidelity language modeling.", "arxiv_id": "2606.24773", "arxiv_url": "https://arxiv.org/abs/2606.24773", "authors": ["Manan Agarwal", "Sheel Shah", "Chanhyuk Lee", "Jaehoon Yoo", "Jerry Huang", "Seunghoon Hong", "Aditi Raghunathan", "Jinwoo Kim", "Nicholas M. Boffi"], "brief": "\u63d0\u51faFMLM+\u6846\u67b6\uff0c\u7ed3\u5408\u63a9\u7801\u566a\u58f0\u8c03\u5ea6\u4e0e\u6d41\u6620\u5c04\u8bed\u8a00\u6a21\u578b\uff0c\u5b9e\u73b0\u5355\u6b65\u751f\u6210\u5168\u5e8f\u5217\u5e76\u5bf9\u6bcf\u4e2atoken\u8fdb\u884c\u540e\u9a8c\u4e00\u81f4\u6027\u8bc4\u5206\u3002\u57fa\u4e8e\u6b64\u5f15\u5165\"\u540e\u9a8c\u7cbe\u70bc\"\u63a8\u7406\u7b56\u7565\uff0c\u4f7f\u6a21\u578b\u81ea\u9002\u5e94\u81ea\u6211\u7ea0\u9519\uff0c\u4ee5\u5c1132\u500d\u7684\u51fd\u6570\u8bc4\u4f30\u6b21\u6570\u5339\u914d\u79bb\u6563\u57fa\u7ebf\u6027\u80fd\uff0c\u663e\u8457\u6539\u5584\u901f\u5ea6-\u8d28\u91cf\u6743\u8861\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24773", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u975e\u81ea\u56de\u5f52\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24773v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Posterior Refinement: Fast Language Generation via Any-Order Flow Maps", "tldr": "\u63d0\u51faFMLM+\u6846\u67b6\uff0c\u7ed3\u5408\u63a9\u7801\u566a\u58f0\u8c03\u5ea6\u4e0e\u6d41\u6620\u5c04\u8bed\u8a00\u6a21\u578b\uff0c\u5b9e\u73b0\u5355\u6b65\u751f\u6210\u5168\u5e8f\u5217\u5e76\u5bf9\u6bcf\u4e2atoken\u8fdb\u884c\u540e\u9a8c\u4e00\u81f4\u6027\u8bc4\u5206\u3002\u57fa\u4e8e\u6b64\u5f15\u5165\"\u540e\u9a8c\u7cbe\u70bc\"\u63a8\u7406\u7b56\u7565\uff0c\u4f7f\u6a21\u578b\u81ea\u9002\u5e94\u81ea\u6211\u7ea0\u9519\uff0c\u4ee5\u5c1132\u500d\u7684\u51fd\u6570\u8bc4\u4f30\u6b21\u6570\u5339\u914d\u79bb\u6563\u57fa\u7ebf\u6027\u80fd\uff0c\u663e\u8457\u6539\u5584\u901f\u5ea6-\u8d28\u91cf\u6743\u8861\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern Vision-Language-Action (VLA) models often fail to generalize to novel setups, such as altered camera viewpoints or robot morphologies, because they are typically conditioned only on current observations and language instructions. By ignoring the underlying system configuration as a variable, these models implicitly assume a fixed execution context encountered during training, necessitating data-intensive fine-tuning for any new environment. In this work, we introduce In-Context World Modeling (ICWM), a framework that treats system identification as an in-context adaptation problem. ICWM enables robot policies to autonomously infer essential system variables from a short history of self-generated, task-agnostic interactions. Unlike traditional In-Context Learning that uses demonstrations to specify what task to perform, ICWM leverages the context window to understand how the system operates. By processing these interactions before task execution, the model implicitly captures the world dynamics of the current system, enabling adaptation to novel configurations without parameter updates. Extensive experiments in simulation and on real-world robot platforms demonstrate that ICWM significantly outperforms standard VLA baselines on novel camera viewpoints.", "arxiv_id": "2606.26025", "arxiv_url": "https://arxiv.org/abs/2606.26025", "authors": ["Siyin Wang", "Junhao Shi", "Senyu Fei", "Zhaoyang Fu", "Li Ji", "Jingjing Gong", "Xipeng Qiu"], "brief": "\u63d0\u51faIn-Context World Modeling\uff08ICWM\uff09\u6846\u67b6\uff0c\u8ba
