rforming known-recipe scores. Across all six strategies and three domains, only one such idea lands in the top-10 by quality. We also observed agents resorting to a variety of reward-hacking techniques during execution (40 confirmed fabrications across 1,628 scored runs), and detecting them was necessary to keep the search faithful to the task. Our results show that while current search and Quality-Diversity strategies enable us to steer where the generated ideas land on the quality, diversity, and novelty axes, they do not expand the quality-novelty frontier. Bridging this gap is the open challenge towards the ultimate goal of perpetual, autonomous scientific progress. Code is available at github.com/a-antoniades/Heuresis.", "arxiv_id": "2606.25198", "arxiv_url": "https://arxiv.org/abs/2606.25198", "authors": ["Antonis Antoniades", "Deepak Nathani", "Ritam Saha", "Alfonso Amayuelas", "Ivan Bercovich", "Zhaotian Weng", "Vignesh Baskaran", "Kunal Bhatia", "William Yang Wang"], "brief": "\u63d0\u51faHeuresis\u6846\u67b6\uff0c\u5c06\u79d1\u7814\u6d41\u7a0b\u62bd\u8c61\u4e3a\u53ef\u7ec4\u5408\u7684\u57fa\u672c\u539f\u8bed\uff0c\u5b9e\u73b0\u673a\u5668\u5b66\u4e60\u9886\u57df\u7684\u5f00\u653e\u5f0f\u81ea\u4e3b\u63a2\u7d22\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f30\u516d\u79cd\u641c\u7d22\u7b56\u7565\u5728\u4e09\u4e2a\u7814\u7a76\u9886\u57df\u51713222\u6b21\u5b9e\u9a8c\u4e2d\u7684\u8868\u73b0\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25198", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": ["\u5b9e\u73b0\u516d\u79cd\u641c\u7d22\u7b56\u7565\uff08\u8d2a\u5fc3\u3001MAP-Elites\u3001Go-Explore\u3001Islands\u3001Curiosity\u3001Omni\uff09\uff0c\u8986\u76d6LLM\u9884\u8bad\u7ec3\u3001\u5728\u7ebfRL\u548c\u6a21\u578b\u9057\u5fd8\u4e09\u4e2a\u9886\u57df", "\u5173\u952e\u53d1\u73b0\uff1a\u5b8c\u5168\u65b0\u9896\u7684\u60f3\u6cd5\u6781\u4e3a\u7f55\u89c1\uff0c\u65e0\u4e00\u88ab\u8bc4\u4e3a\u0027\u539f\u521b\u0027\uff0c\u4e14\u65b0\u9896\u60f3\u6cd5\u4ece\u672a\u63a5\u8fd1\u5df2\u77e5\u6700\u4f18\u65b9\u6848\u7684\u6027\u80fd\u6c34\u5e73", "\u68c0\u6d4b\u523040\u4f8b\u5956\u52b1\u6b3a\u9a97/\u6570\u636e\u4f2a\u9020\u884c\u4e3a\uff081628\u6b21\u8bc4\u5206\u8fd0\u884c\u4e2d\uff09\uff0c\u63ed\u793a\u81ea\u4e3b\u79d1\u7814\u667a\u80fd\u4f53\u7684\u53ef\u9760\u6027\u6311\u6218"], "keywords": ["\u667a\u80fd\u4f53", "\u81ea\u4e3b\u79d1\u7814", "\u5927\u8bed\u8a00\u6a21\u578b", "\u641c\u7d22\u7b56\u7565"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25198v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Heuresis: Search Strategies for Autonomous AI Research Agents Across Quality, Diversity and Novelty", "tldr": "Heuresis\u6846\u67b6\u8bc4\u4f30\u516d\u79cd\u641c\u7d22\u7b56\u7565\u5728\u81ea\u4e3bAI\u79d1\u7814\u4e2d\u7684\u8d28\u91cf\u3001\u591a\u6837\u6027\u4e0e\u65b0\u9896\u6027\u8868\u73b0", "upvotes": 0, "what_it_is": "\u63d0\u51faHeuresis\u6846\u67b6\uff0c\u5c06\u79d1\u7814\u6d41\u7a0b\u62bd\u8c61\u4e3a\u53ef\u7ec4\u5408\u7684\u57fa\u672c\u539f\u8bed\uff0c\u5b9e\u73b0\u673a\u5668\u5b66\u4e60\u9886\u57df\u7684\u5f00\u653e\u5f0f\u81ea\u4e3b\u63a2\u7d22\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f30\u516d\u79cd\u641c\u7d22\u7b56\u7565\u5728\u4e09\u4e2a\u7814\u7a76\u9886\u57df\u51713222\u6b21\u5b9e\u9a8c\u4e2d\u7684\u8868\u73b0\u3002", "why_notable": "\u9996\u6b21\u5927\u89c4\u6a21\u7cfb\u7edf\u6027\u8bc4\u4f30LLM\u81ea\u4e3b\u79d1\u7814\u667a\u80fd\u4f53\u7684\u641c\u7d22\u7b56\u7565\uff0c\u63ed\u793a\u5f53\u524d\u65b9\u6cd5\u65e0\u6cd5\u7a81\u7834\u8d28\u91cf-\u65b0\u9896\u6027\u524d\u6cbf\u8fd9\u4e00\u6838\u5fc3\u74f6\u9888\uff0c\u4e3a\u81ea\u4e3b\u79d1\u7814\u9886\u57df\u6307\u660e\u5173\u952e\u6311\u6218\u65b9\u5411\u3002"}, {"abstract": "We present Wan-Streamer, a native-streaming, end-to-end interactive foundation model designed from the ground up for real-time, low-latency, full-duplex audio-visual interaction. Wan-Streamer seamlessly models language, audio, and video as both input and output within a single Transformer, where the sequence is represented as interleaved visual, audio, and text input tokens together with visual, audio, and text output tokens, coordinated by block-causal attention for incremental streaming. Unlike cascaded interactive systems that rely on separate VAD, ASR, language, TTS, audio-driven animation, or video-generation modules, Wan-Streamer does not rely on external language, speech, avatar, or video-generation modules: perception, reasoning, generation, response timing, turn management, and cross-modal synchronization are learned jointly within one unified model, reducing pipeline latency and error accumulation. To support natural audio-visual responsiveness, we redesign the entire stack around streamability, including causal encoders, causal decoders, block-causal attention, and low-latency multimodal token scheduling, enabling streaming units as short as 160 ms at 25 fps. Wan-Streamer achieves approximately 200 ms model-side response latency and approximately 550 ms total interaction latency when combined with 350 ms bidirectional network latency, supporting sub-second duplex audio-visual communication. These results position Wan-Streamer as a unified, end-to-end, multimodal interactive foundation model for low-latency streaming interaction.", "arxiv_id": "2606.25041", "arxiv_url": "https://arxiv.org/abs/2606.25041", "authors": ["Lianghua Huang", "Zhifan Wu", "Wei Wang", "Yupeng Shi", "Mengyang Feng", "Junjie He", "Chenwei Xie", "Yu Liu", "Jingren Zhou", "Ang Wang", "Bang Zhang", "Baole Ai", "Chen Liang", "Cheng Yu", "Chongyang Zhong", "Jinwei Qi", "Kai Zhu", "Pandeng Li", "Peng Zhang", "Wenyuan Zhang", "Xinhua Cheng", "Yitong Huang", "Yun Zheng", "Zoubin Bi"], "brief": "\u63d0\u51faWan-Streamer\uff0c\u4e00\u4e2a\u539f\u751f\u6d41\u5f0f\u7aef\u5230\u7aef\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\uff0c\u5728\u5355\u4e00Transformer\u4e2d\u7edf\u4e00\u5904\u7406\u8bed\u8a00\u3001\u97f3\u9891\u3001\u89c6\u9891\u7684\u8f93\u5165\u4e0e\u8f93\u51fa\uff0c\u65e0\u9700\u7ea7\u8054\u5916\u90e8\u6a21\u5757\u5373\u53ef\u5b9e\u73b0\u5b9e\u65f6\u4f4e\u5ef6\u8fdf\u5168\u53cc\u5de5\u97f3\u89c6\u9891\u4ea4\u4e92\u3002", "categories": ["cs.CV", "cs.AI", "cs.GR", "cs.SD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25041", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528\u5757\u56e0\u679c\u6ce8\u610f\u529b\uff08block-causal attention\uff09\u5b9e\u73b0\u589e\u91cf\u6d41\u5f0f\u5904\u7406\uff0c\u6d41\u5f0f\u5355\u5143\u6700\u77ed160ms\uff0c\u5e27\u738725fps", "\u6a21\u578b\u4fa7\u54cd\u5e94\u5ef6\u8fdf\u7ea6200ms\uff0c\u52a0\u4e0a350ms\u53cc\u5411\u7f51\u7edc\u5ef6\u8fdf\u540e\u603b\u4ea4\u4e92\u5ef6\u8fdf\u7ea6550ms\uff0c\u8fbe\u5230\u4e9a\u79d2\u7ea7\u5168\u53cc\u5de5\u901a\u4fe1", "\u611f\u77e5\u3001\u63a8\u7406\u3001\u751f\u6210\u3001\u54cd\u5e94\u65f6\u673a\u3001\u8f6e\u6b21\u7ba1\u7406\u4e0e\u8de8\u6a21\u6001\u540c\u6b65\u5168\u90e8\u5728\u5355\u4e00\u6a21\u578b\u5185\u8054\u5408\u5b66\u4e60\uff0c\u6d88\u9664\u7ea7\u8054\u7cfb\u7edf\u7684\u6d41\u6c34\u7ebf\u5ef6\u8fdf\u4e0e\u8bef\u5dee\u7d2f\u79ef"], "keywords": ["\u591a\u6a21\u6001", "\u5b9e\u65f6\u4ea4\u4e92", "\u6d41\u5f0f\u751f\u6210", "\u57fa\u7840\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25041v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Wan-Streamer v0.1: End-to-end Real-time Interactive Foundation Models", "tldr": "Wan-Streamer\uff1a\u5355\u4e00Transformer\u5b9e\u73b0\u7aef\u5230\u7aef\u5b9e\u65f6\u5168\u53cc\u5de5\u97f3\u89c6\u9891\u4ea4\u4e92\uff0c\u5ef6\u8fdf\u4f4e\u81f3550ms", "upvotes": 0, "what_it_is": "\u63d0\u51faWan-Streamer\uff0c\u4e00\u4e2a\u539f\u751f\u6d41\u5f0f\u7aef\u5230\u7aef\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\uff0c\u5728\u5355\u4e00Transformer\u4e2d\u7edf\u4e00\u5904\u7406\u8bed\u8a00\u3001\u97f3\u9891\u3001\u89c6\u9891\u7684\u8f93\u5165\u4e0e\u8f93\u51fa\uff0c\u65e0\u9700\u7ea7\u8054\u5916\u90e8\u6a21\u5757\u5373\u53ef\u5b9e\u73b0\u5b9e\u65f6\u4f4e\u5ef6\u8fdf\u5168\u53cc\u5de5\u97f3\u89c6\u9891\u4ea4\u4e92\u3002", "why_notable": "\u9996\u4e2a\u5c06VAD\u3001ASR\u3001LLM\u3001TTS\u3001\u97f3\u9891\u9a71\u52a8\u52a8\u753b\u7b49\u5168\u90e8\u6a21\u5757\u7edf\u4e00\u4e3a\u5355\u4e00Transformer\u7684\u7aef\u5230\u7aef\u5b9e\u65f6\u4ea4\u4e92\u7cfb\u7edf\uff0c\u5927\u5e45\u964d\u4f4e\u5de5\u7a0b\u590d\u6742\u5ea6\u4e0e\u4ea4\u4e92\u5ef6\u8fdf\uff0c\u5bf9\u5b9e\u65f6\u6570\u5b57\u4eba\u3001\u8bed\u97f3\u52a9\u624b\u7b49\u5e94\u7528\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Today\u0027s reasoning models use thinking tokens to attain stronger performance on benchmarks than their instruction-tuned counterparts. It is also generally believed that this more \"deliberative\" mode should improve alignment and safety, by providing the model a safe space to consider whether its planned answer to a request violates its safety principles. We present evidence that this intuition is not always correct. Across frontier open-weight reasoning models spanning GPT-OSS, Qwen, Olmo, and Phi families, we find that the eventual refusal/compliance outcome is already strongly predictable via a trained head on the first token\u0027s hidden representation ($0.84$-$0.95$ AUROC and $\\sim88\\%$ balanced accuracy for predicting refusal/compliance) before any visible thinking. The thinking process turns out to be more akin to prefix completion than to deliberative revision, with the final outcome rarely changing after the first $\\sim20\\%$ of thinking, despite giving the appearance of deliberation at the text level ($\\sim74\\%$ of text-level deliberations occur when the response distribution is already locked to one refusal/compliance side). We also find that existing inference-time and training-based safety interventions, despite being motivated by the goal of inducing deliberation, largely shift model behavior toward over-refusal while suppressing already-scarce deliberation signals. Our results suggest that safety behavior in current reasoning models is much less deliberative than commonly assumed, and highlight the need for methods that induce real safety deliberation.", "arxiv_id": "2606.25013", "arxiv_url": "https://arxiv.org/abs/2606.25013", "authors": ["Narutatsu Ri", "Abhishek Panigrahi", "Sanjeev Arora"], "brief": "\u672c\u6587\u901a\u8fc7\u5b9e\u9a8c\u63ed\u793a\uff1a\u5f53\u524d\u63a8\u7406\u6a21\u578b\uff08GPT-OSS\u3001Qwen\u3001Olmo\u3001Phi\u7b49\uff09\u7684\u601d\u8003\u8fc7\u7a0b\u5e76\u975e\u771f\u6b63\u7684\"\u6df1\u601d\u719f\u8651\"\u5f0f\u5b89\u5168\u5ba1\u67e5\uff0c\u800c\u66f4\u50cf\u662f\u524d\u7f00\u8865\u5168\u2014\u2014\u6a21\u578b\u5728\u751f\u6210\u4efb\u4f55\u53ef\u89c1\u601d\u8003\u5185\u5bb9\u4e4b\u524d\uff0c\u5176\u62d2\u7edd/\u9075\u4ece\u7ed3\u679c\u5df2\u9ad8\u5ea6\u53ef\u9884\u6d4b\uff08AUROC 0.84\u20130.95\uff09\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25013", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u4ec5\u51ed\u7b2c\u4e00\u4e2atoken\u7684\u9690\u5c42\u8868\u793a\uff0c\u5373\u53ef\u4ee5~88%\u5e73\u8861\u51c6\u786e\u7387\u9884\u6d4b\u6700\u7ec8\u62d2\u7edd/\u9075\u4ece\u7ed3\u679c\uff0c\u8bf4\u660e\u51b3\u7b56\u5728\u601d\u8003\u524d\u5df2\u5f62\u6210", "\u7ea674%\u7684\u6587\u672c\u5c42\u9762\"\u5ba1\u614e\u601d\u8003\"\u53d1\u751f\u65f6\uff0c\u6a21\u578b\u884c\u4e3a\u5206\u5e03\u5df2\u9501\u5b9a\u5230\u67d0\u4e00\u4fa7\uff0c\u601d\u8003\u8fc7\u7a0b\u5f62\u540c\u8868\u6f14", "\u73b0\u6709\u63a8\u7406\u65f6\u548c\u8bad\u7ec3\u65f6\u7684\u5b89\u5168\u5e72\u9884\u624b\u6bb5\u4e3b\u8981\u5bfc\u81f4\u8fc7\u5ea6\u62d2\u7edd\uff0c\u53cd\u800c\u6291\u5236\u4e86\u672c\u5c31\u7a00\u5c11\u7684\u771f\u5b9e\u5ba1\u614e\u4fe1\u53f7"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u5bf9\u9f50", "\u63a8\u7406\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25013v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Do Thinking Tokens Help with Safety?", "tldr": "\u63a8\u7406\u6a21\u578b\u7684\"\u601d\u8003token\"\u5e76\u4e0d\u771f\u6b63\u63d0\u5347\u5b89\u5168\u6027\uff0c\u7ed3\u679c\u5728\u7b2c\u4e00\u4e2atoken\u65f6\u5df2\u57fa\u672c\u786e\u5b9a", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7\u5b9e\u9a8c\u63ed\u793a\uff1a\u5f53\u524d\u63a8\u7406\u6a21\u578b\uff08GPT-OSS\u3001Qwen\u3001Olmo\u3001Phi\u7b49\uff09\u7684\u601d\u8003\u8fc7\u7a0b\u5e76\u975e\u771f\u6b63\u7684\"\u6df1\u601d\u719f\u8651\"\u5f0f\u5b89\u5168\u5ba1\u67e5\uff0c\u800c\u66f4\u50cf\u662f\u524d\u7f00\u8865\u5168\u2014\u2014\u6a21\u578b\u5728\u751f\u6210\u4efb\u4f55\u53ef\u89c1\u601d\u8003\u5185\u5bb9\u4e4b\u524d\uff0c\u5176\u62d2\u7edd/\u9075\u4ece\u7ed3\u679c\u5df2\u9ad8\u5ea6\u53ef\u9884\u6d4b\uff08AUROC 0.84\u20130.95\uff09\u3002", "why_notable": "\u98a0\u8986\u4e86\"\u601d\u8003token\u8ba9\u6a21\u578b\u66f4\u5b89\u5168\"\u7684\u4e3b\u6d41\u8ba4\u77e5\uff0c\u63ed\u793a\u5f53\u524d\u63a8\u7406\u6a21\u578b\u5b89\u5168\u673a\u5236\u7684\u6839\u672c\u7f3a\u9677\uff0c\u5bf9AI\u5bf9\u9f50\u7814\u7a76\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\uff0c\u5e76\u6307\u51fa\u9700\u8981\u8bbe\u8ba1\u80fd\u8bf1\u5bfc\u771f\u5b9e\u5ba1\u614e\u63a8\u7406\u7684\u65b0\u65b9\u6cd5"}, {"abstract": "Quantum computers could outperform classical machines on important problems, but only if the errors that pervade quantum hardware can be corrected at scale. Quantum low-density parity-check (qLDPC) codes offer a promising route to this goal by combining sparse parity checks with finite encoding rate and growing distance, but their construction remains a challenging discrete design problem. Here we introduce structured concept evolution (SCE), a search framework that pairs a large language model with a structured algebraic mutation grammar to discover lifted-product code families, a class of CSS qLDPC codes. Instead of asking the LLM to design codes from first principles, SCE evolves structured concepts consisting of algebraic specifications paired with executable programs that realize them, using hierarchical mutations that modify the group algebra, protograph geometry, or base space. Running SCE, we discover a diverse set of competitive code families, ranging from abelian constructions to families over non-abelian groups beyond those underlying standard designs such as bivariate-bicycle codes, and characterize them under code-capacity depolarizing noise with BP+OSD decoding. These results are obtained with lightweight models (GPT-5.4-mini and GPT-5.4-nano).", "arxiv_id": "2606.24808", "arxiv_url": "https://arxiv.org/abs/2606.24808", "authors": ["Zidu Liu", "Florian Marquardt"], "brief": "\u63d0\u51fa\u7ed3\u6784\u5316\u6982\u5ff5\u8fdb\u5316\uff08SCE\uff09\u6846\u67b6\uff0c\u5c06\u5927\u8bed\u8a00\u6a21\u578b\u4e0e\u4ee3\u6570\u53d8\u5f02\u8bed\u6cd5\u7ed3\u5408\uff0c\u81ea\u52a8\u641c\u7d22\u5e76\u53d1\u73b0lifted-product\u91cf\u5b50LDPC\u7801\u65cf\uff0c\u65e0\u9700\u4ece\u5934\u8bbe\u8ba1\u5373\u53ef\u63a2\u7d22\u5305\u62ec\u975e\u963f\u8d1d\u5c14\u7fa4\u5728\u5185\u7684\u591a\u6837\u5316\u7f16\u7801\u7ed3\u6784\u3002", "categories": ["quant-ph", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24808", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["SCE\u6846\u67b6\u5c06\u4ee3\u6570\u89c4\u8303\u4e0e\u53ef\u6267\u884c\u7a0b\u5e8f\u914d\u5bf9\u4e3a\"\u7ed3\u6784\u5316\u6982\u5ff5\"\uff0c\u901a\u8fc7\u5c42\u6b21\u5316\u53d8\u5f02\uff08\u4fee\u6539\u7fa4\u4ee3\u6570\u3001\u539f\u56fe\u51e0\u4f55\u6216\u57fa\u7a7a\u95f4\uff09\u9a71\u52a8\u641c\u7d22", "\u53d1\u73b0\u4e86\u4ece\u963f\u8d1d\u5c14\u6784\u9020\u5230\u975e\u963f\u8d1d\u5c14\u7fa4\u7684\u591a\u6837\u5316\u7ade\u4e89\u6027\u7801\u65cf\uff0c\u8d85\u8d8a\u4e86\u6807\u51c6\u53cc\u53d8\u91cf\u81ea\u884c\u8f66\u7801\u7684\u8bbe\u8ba1\u8303\u56f4", "\u4ec5\u4f7f\u7528\u8f7b\u91cf\u7ea7\u6a21\u578b\uff08GPT-4.1-mini\u548cGPT-4.1-nano\uff09\u5373\u53ef\u83b7\u5f97\u6709\u6548\u7ed3\u679c\uff0c\u5728BP+OSD\u89e3\u7801\u4e0b\u5b8c\u6210\u7801\u5bb9\u91cf\u53bb\u6781\u5316\u566a\u58f0\u8868\u5f81"], "keywords": ["\u91cf\u5b50\u7ea0\u9519", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4ee3\u7801\u751f\u6210", "\u81ea\u52a8\u5316\u641c\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24808v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Large-Language-Model Discovery of Quantum LDPC Codes through Structured Concept Evolution", "tldr": "\u7528\u5927\u8bed\u8a00\u6a21\u578b\u7ed3\u5408\u4ee3\u6570\u53d8\u5f02\u8bed\u6cd5\u81ea\u52a8\u53d1\u73b0\u91cf\u5b50LDPC\u7ea0\u9519\u7801\u65cf", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u7ed3\u6784\u5316\u6982\u5ff5\u8fdb\u5316\uff08SCE\uff09\u6846\u67b6\uff0c\u5c06\u5927\u8bed\u8a00\u6a21\u578b\u4e0e\u4ee3\u6570\u53d8\u5f02\u8bed\u6cd5\u7ed3\u5408\uff0c\u81ea\u52a8\u641c\u7d22\u5e76\u53d1\u73b0lifted-product\u91cf\u5b50LDPC\u7801\u65cf\uff0c\u65e0\u9700\u4ece\u5934\u8bbe\u8ba1\u5373\u53ef\u63a2\u7d22\u5305\u62ec\u975e\u963f\u8d1d\u5c14\u7fa4\u5728\u5185\u7684\u591a\u6837\u5316\u7f16\u7801\u7ed3\u6784\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u5f15\u5165\u91cf\u5b50\u7ea0\u9519\u7801\u7684\u81ea\u52a8\u5316\u8bbe\u8ba1\uff0c\u7a81\u7834\u4e86qLDPC\u7801\u6784\u9020\u4f9d\u8d56\u4eba\u5de5\u4ee3\u6570\u76f4\u89c9\u7684\u74f6\u9888\uff0c\u4e3a\u91cf\u5b50\u5bb9\u9519\u8ba1\u7b97\u7684\u89c4\u6a21\u5316\u63d0\u4f9b\u4e86\u65b0\u7684\u81ea\u52a8\u5316\u5de5\u5177\u8def\u5f84\u3002"}, {"abstract": "Machine unlearning (MU) is commonly judged by output forgetting, such as low forget-set accuracy or reduced logit-level membership inference. But if output-level success can coexist with retraining-inconsistent residuals in representation space, what kind of forgetting are current evaluations actually certifying? We study this question through retraining-consistent representation forgetting, using the retrained model (i.e., trained from scratch without the forget data) as an operational reference for correct forgetting. Across multiple unlearning methods, datasets, and models, our theoretical analysis and empirical results show that standard output-level evaluation can systematically overestimate the success of unlearning. Under this stronger lens, current methods often appear forgotten at the output layer while exhibiting a structured mismatch relative to retraining. They partially align with retraining on forget samples, remain more inconsistent on retain samples, and leave residual discrepancy concentrated along retraining-related directions rather than diffuse in representation space. This structured mismatch is characterized by forget/retain asymmetry, directional mismatch, and concentrated residuals along retraining-related directions. These results suggest that current MU is often evaluated for apparent forgetting rather than retraining-consistent forgetting. More broadly, retraining reveals what output forgetting hides.", "arxiv_id": "2606.25001", "arxiv_url": "https://arxiv.org/abs/2606.25001", "authors": ["Teresa Pui Yee Yong", "Win Kent Ong", "Chee Seng Chan"], "brief": "\u672c\u6587\u7814\u7a76\u673a\u5668\u9057\u5fd8\uff08Machine Unlearning\uff09\u7684\u8bc4\u4f30\u95ee\u9898\uff0c\u6307\u51fa\u4ee5\u8f93\u51fa\u5c42\u6307\u6807\uff08\u5982\u51c6\u786e\u7387\u3001\u6210\u5458\u63a8\u65ad\uff09\u8861\u91cf\u9057\u5fd8\u6210\u529f\u5b58\u5728\u6839\u672c\u7f3a\u9677\uff0c\u63d0\u51fa\u4ee5\"\u4ece\u5934\u91cd\u8bad\u6a21\u578b\"\u4e3a\u53c2\u8003\u57fa\u51c6\u7684\u8868\u5f81\u5c42\u4e00\u81f4\u6027\u9057\u5fd8\u8bc4\u4f30\u6846\u67b6\uff0c\u63ed\u793a\u5f53\u524d\u65b9\u6cd5\u5728\u8868\u5f81\u7a7a\u95f4\u4e2d\u5b58\u5728\u7ed3\u6784\u6027\u6b8b\u5dee\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25001", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u8f93\u51fa\u5c42\u9057\u5fd8\uff08\u4f4e\u9057\u5fd8\u96c6\u51c6\u786e\u7387\u3001\u6210\u5458\u63a8\u65ad\u964d\u4f4e\uff09\u4e0e\u8868\u5f81\u7a7a\u95f4\u7684\u91cd\u8bad\u4e00\u81f4\u6027\u53ef\u4ee5\u540c\u65f6\u5b58\u5728\uff0c\u4e8c\u8005\u5e76\u4e0d\u7b49\u4ef7", "\u5b9e\u9a8c\u53d1\u73b0\u5f53\u524d\u9057\u5fd8\u65b9\u6cd5\u5448\u73b0\"\u9057\u5fd8/\u4fdd\u7559\u4e0d\u5bf9\u79f0\"\uff1a\u5bf9\u9057\u5fd8\u6837\u672c\u90e8\u5206\u5bf9\u9f50\u91cd\u8bad\u6a21\u578b\uff0c\u5bf9\u4fdd\u7559\u6837\u672c\u5374\u66f4\u4e0d\u4e00\u81f4", "\u6b8b\u5dee\u4e0d\u662f\u968f\u673a\u5206\u6563\u7684\uff0c\u800c\u662f\u96c6\u4e2d\u5728\u4e0e\u91cd\u8bad\u76f8\u5173\u7684\u65b9\u5411\u4e0a\uff0c\u5448\u73b0\u65b9\u5411\u6027\u5931\u914d\u548c\u96c6\u4e2d\u6b8b\u5dee\u7684\u7ed3\u6784\u6027\u7279\u5f81"], "keywords": ["\u673a\u5668\u9057\u5fd8", "\u6a21\u578b\u8bc4\u4f30", "\u8868\u5f81\u5b66\u4e60", "\u9690\u79c1\u4fdd\u62a4"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25001v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Erased, but Not Gone: Output Forgetting Is Not True Forgetting", "tldr": "\u8f93\u51fa\u5c42\u9057\u5fd8\u4e0d\u7b49\u4e8e\u771f\u6b63\u9057\u5fd8\uff0c\u5f53\u524d\u673a\u5668\u9057\u5fd8\u8bc4\u4f30\u7cfb\u7edf\u6027\u9ad8\u4f30\u4e86\u9057\u5fd8\u6548\u679c", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u673a\u5668\u9057\u5fd8\uff08Machine Unlearning\uff09\u7684\u8bc4\u4f30\u95ee\u9898\uff0c\u6307\u51fa\u4ee5\u8f93\u51fa\u5c42\u6307\u6807\uff08\u5982\u51c6\u786e\u7387\u3001\u6210\u5458\u63a8\u65ad\uff09\u8861\u91cf\u9057\u5fd8\u6210\u529f\u5b58\u5728\u6839\u672c\u7f3a\u9677\uff0c\u63d0\u51fa\u4ee5\"\u4ece\u5934\u91cd\u8bad\u6a21\u578b\"\u4e3a\u53c2\u8003\u57fa\u51c6\u7684\u8868\u5f81\u5c42\u4e00\u81f4\u6027\u9057\u5fd8\u8bc4\u4f30\u6846\u67b6\uff0c\u63ed\u793a\u5f53\u524d\u65b9\u6cd5\u5728\u8868\u5f81\u7a7a\u95f4\u4e2d\u5b58\u5728\u7ed3\u6784\u6027\u6b8b\u5dee\u3002", "why_notable": "\u76f4\u63a5\u6311\u6218\u673a\u5668\u9057\u5fd8\u9886\u57df\u7684\u4e3b\u6d41\u8bc4\u4f30\u8303\u5f0f\uff0c\u63ed\u793a\"\u8868\u9762\u9057\u5fd8\"\u4e0e\"\u771f\u6b63\u9057\u5fd8\"\u7684\u672c\u8d28\u5dee\u8ddd\uff0c\u5bf9\u9690\u79c1\u4fdd\u62a4\u3001\u6a21\u578b\u5ba1\u8ba1\u548c\u5408\u89c4\u6027\u9a8c\u8bc1\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\uff0c\u53ef\u80fd\u63a8\u52a8\u6574\u4e2a\u9886\u57df\u91cd\u65b0\u5ba1\u89c6\u8bc4\u4f30\u6807\u51c6\u3002"}, {"abstract": "Language models are running out of high-quality training data, and even aggressively deduplicated corpora retain some amount of repetition. Earlier controlled studies predated Chinchilla-style scaling laws and could only measure the cost of repetition indirectly. We revisit repetition in the Chinchilla era, using a fitted no-repetition scaling law to report Compute-Equivalent Gain and Compute-Equivalent Loss. We show that under this modernized paradigm, repetition damage is systematic in three ways. First, holding compute allocated to repeated data constant, eval loss peaks at an intermediate repeat count $\\Rep$; repeating a moderately sized subset a moderate number of times damages performance more than repeating a large subset a few times or a small subset many times. Second, the location of this peak is well-fit by a power law in model size; this scaling law reveals that the most damaging number of repeated data grows more quickly than compute. Finally, when repeated documents consume 10\\% of the FLOPs budget in a controlled exact-document repetition setting, the compute-equivalent loss can be large: on FineWeb-Edu-Dedup, the most damaging repeat count for a Qwen3-style 344M-parameter model at $\\OT=1$ matches the loss of a no-repetition run using 67% of the FLOPs. We demonstrate that these phenomena are not language-model-specific, and can be analytically understood in a simple statistical model: a misspecified linear regression with verbatim duplicates reproduces the same qualitative loss peak, quantifying how such peaks can arise from a statistical tradeoff between memorization and generalization. Our findings add precision to the study of duplication in language models, allowing practitioners to quantify the wasted compute incurred by the presence and repeat structure of duplicates in pretraining corpora.", "arxiv_id": "2606.24998", "arxiv_url": "https://arxiv.org/abs/2606.24998", "authors": ["Jessica Chudnovsky", "Joshua Kazdan", "Noam Levi", "Rylan Schaeffer", "Yegor Denisov-Blanch", "Bo He", "Mehmet Donmez", "Sanmi Koyejo", "David Donoho"], "brief": "\u672c\u6587\u5728Chinchilla\u7f29\u653e\u5b9a\u5f8b\u6846\u67b6\u4e0b\u91cd\u65b0\u7814\u7a76\u8bad\u7ec3\u6570\u636e\u91cd\u590d\u5bf9\u8bed\u8a00\u6a21\u578b\u7684\u5f71\u54cd\uff0c\u63d0\u51fa\"\u8ba1\u7b97\u7b49\u6548\u589e\u76ca/\u635f\u5931\"\u6307\u6807\uff0c\u91cf\u5316\u4e0d\u540c\u91cd\u590d\u6a21\u5f0f\u5bf9\u6a21\u578b\u6027\u80fd\u7684\u7834\u574f\u7a0b\u5ea6\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24998", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u91cd\u590d\u5371\u5bb3\u5b58\u5728\"\u5cf0\u503c\"\uff1a\u4e2d\u7b49\u89c4\u6a21\u5b50\u96c6\u91cd\u590d\u4e2d\u7b49\u6b21\u6570\u6bd4\u6781\u7aef\u60c5\u51b5\uff08\u5927\u96c6\u5408\u5c11\u6b21\u6216\u5c0f\u96c6\u5408\u591a\u6b21\uff09\u5371\u5bb3\u66f4\u5927", "\u6700\u5371\u9669\u91cd\u590d\u6b21\u6570\u968f\u6a21\u578b\u89c4\u6a21\u5448\u5e42\u5f8b\u589e\u957f\uff0c\u4e14\u589e\u901f\u5feb\u4e8e\u8ba1\u7b97\u91cf\u589e\u957f", "\u5f53\u91cd\u590d\u6570\u636e\u536010% FLOPs\u9884\u7b97\u65f6\uff0c344M\u53c2\u6570\u6a21\u578b\u7684\u8ba1\u7b97\u7b49\u6548\u635f\u5931\u76f8\u5f53\u4e8e\u6d6a\u8d3933%\u7684\u603b\u7b97\u529b"], "keywords": ["\u8bed\u8a00\u6a21\u578b", "\u6570\u636e\u53bb\u91cd", "\u7f29\u653e\u5b9a\u5f8b", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24998v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Internal Data Repetition Destroys Language Models", "tldr": "\u6570\u636e\u91cd\u590d\u4f1a\u7cfb\u7edf\u6027\u635f\u5bb3\u8bed\u8a00\u6a21\u578b\u6027\u80fd\uff0c\u4e2d\u7b49\u89c4\u6a21\u6570\u636e\u4e2d\u7b49\u91cd\u590d\u6b21\u6570\u5371\u5bb3\u6700\u5927", "upvotes": 0, "what_it_is": "\u672c\u6587\u5728Chinchilla\u7f29\u653e\u5b9a\u5f8b\u6846\u67b6\u4e0b\u91cd\u65b0\u7814\u7a76\u8bad\u7ec3\u6570\u636e\u91cd\u590d\u5bf9\u8bed\u8a00\u6a21\u578b\u7684\u5f71\u54cd\uff0c\u63d0\u51fa\"\u8ba1\u7b97\u7b49\u6548\u589e\u76ca/\u635f\u5931\"\u6307\u6807\uff0c\u91cf\u5316\u4e0d\u540c\u91cd\u590d\u6a21\u5f0f\u5bf9\u6a21\u578b\u6027\u80fd\u7684\u7834\u574f\u7a0b\u5ea6\u3002", "why_notable": "\u9996\u6b21\u5728\u73b0\u4ee3Chinchilla\u8303\u5f0f\u4e0b\u7cbe\u786e\u91cf\u5316\u6570\u636e\u91cd\u590d\u7684\u7cfb\u7edf\u6027\u5371\u5bb3\uff0c\u5e76\u7528\u7edf\u8ba1\u6a21\u578b\uff08\u7ebf\u6027\u56de\u5f52+\u8bb0\u5fc6\u5316vs\u6cdb\u5316\u6743\u8861\uff09\u7ed9\u51fa\u53ef\u89e3\u6790\u7684\u7406\u8bba\u89e3\u91ca\uff0c\u5bf9\u9884\u8bad\u7ec3\u6570\u636e\u53bb\u91cd\u7b56\u7565\u5177\u6709\u76f4\u63a5\u5b9e\u8df5\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Standard benchmarks for multimodal large language models (MLLMs) score each item on one canonical ordering and miss whether order-irrelevant shuffling changes the answer, a baseline reliability property called for by emerging AI evaluation guidelines. We introduce Facet-Probe, a five-facet audit (option, evidence-chunk, document-rank, image-set, and mixed-modality ordering) of 18 frontier and open-weight MLLMs. A Bayesian item-response model separates ordering noise from per-facet bias, and a same-ordering control estimates the decoder-stochastic floor for observed flips. We find that none of the 18 MLLMs we audit are order-invariant: screened per-facet panel-mean flip rates span 24-50%. A Gemini same-ordering control at temperature 0 estimates a substantial ordering excess over a same-input decoder-noise floor in verified cells. Capability predicts but does not eliminate flips; the best model still flips on 13.4% of trials. In our Gemini mitigation tests, training-free prompt changes are modality-conditional and do not transfer from text to visual reasoning. These results suggest that prompt-level mitigation alone is unlikely to provide general order robustness, motivating future work on training-time and architectural approaches. We propose cross-ordering flip rate as a standard reporting axis for MLLMs.", "arxiv_id": "2606.26079", "arxiv_url": "https://arxiv.org/abs/2606.26079", "authors": ["Akshay Paruchuri", "Sanmi Koyejo", "Ehsan Adeli"], "brief": "\u63d0\u51faFacet-Probe\u5ba1\u8ba1\u6846\u67b6\uff0c\u4ece\u4e94\u4e2a\u7ef4\u5ea6\uff08\u9009\u9879\u3001\u8bc1\u636e\u5757\u3001\u6587\u6863\u6392\u5e8f\u3001\u56fe\u50cf\u96c6\u3001\u6df7\u5408\u6a21\u6001\uff09\u7cfb\u7edf\u8bc4\u4f3018\u4e2a\u591a\u6a21\u6001\u5927\u6a21\u578b\u5bf9\u987a\u5e8f\u6270\u52a8\u7684\u654f\u611f\u6027\uff0c\u63ed\u793a\u6240\u6709\u88ab\u6d4b\u6a21\u578b\u5747\u5b58\u5728\u663e\u8457\u7684\u987a\u5e8f\u4e0d\u4e00\u81f4\u95ee\u9898\u3002", "categories": ["cs.CL", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26079", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u4e94\u7ef4\u5ea6\u5ba1\u8ba1\u6846\u67b6\uff1a\u9009\u9879\u987a\u5e8f\u3001\u8bc1\u636e\u5757\u987a\u5e8f\u3001\u6587\u6863\u6392\u540d\u3001\u56fe\u50cf\u96c6\u987a\u5e8f\u53ca\u6df7\u5408\u6a21\u6001\u987a\u5e8f\uff0c\u9762\u677f\u5e73\u5747\u7ffb\u8f6c\u7387\u8fbe24%-50%", "\u4f7f\u7528\u8d1d\u53f6\u65af\u9879\u76ee\u53cd\u5e94\u6a21\u578b\u5206\u79bb\u987a\u5e8f\u566a\u58f0\u4e0e\u504f\u5dee\uff0c\u5e76\u8bbe\u7f6e\u540c\u987a\u5e8f\u5bf9\u7167\u7ec4\u4f30\u7b97\u89e3\u7801\u5668\u968f\u673a\u57fa\u7ebf", "\u6700\u4f18\u6a21\u578b\u4ecd\u670913.4%\u7684\u7ffb\u8f6c\u7387\uff1b\u65e0\u8bad\u7ec3\u63d0\u793a\u8bcd\u7f13\u89e3\u7b56\u7565\u5177\u6709\u6a21\u6001\u6761\u4ef6\u6027\uff0c\u65e0\u6cd5\u4ece\u6587\u672c\u8fc1\u79fb\u81f3\u89c6\u89c9\u63a8\u7406"], "keywords": ["\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u53ef\u9760\u6027\u8bc4\u4f30", "\u57fa\u51c6\u6d4b\u8bd5", "\u9c81\u68d2\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26079v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Same Evidence, Different Answer: Auditing Order Sensitivity in Multimodal Large Language Models", "tldr": "\u591a\u6a21\u6001\u5927\u6a21\u578b\u5bf9\u8f93\u5165\u987a\u5e8f\u654f\u611f\uff0c18\u4e2a\u524d\u6cbf\u6a21\u578b\u7ffb\u8f6c\u7387\u9ad8\u8fbe24-50%\uff0c\u53ef\u9760\u6027\u5b58\u5728\u7cfb\u7edf\u6027\u7f3a\u9677", "upvotes": 0, "what_it_is": "\u63d0\u51faFacet-Probe\u5ba1\u8ba1\u6846\u67b6\uff0c\u4ece\u4e94\u4e2a\u7ef4\u5ea6\uff08\u9009\u9879\u3001\u8bc1\u636e\u5757\u3001\u6587\u6863\u6392\u5e8f\u3001\u56fe\u50cf\u96c6\u3001\u6df7\u5408\u6a21\u6001\uff09\u7cfb\u7edf\u8bc4\u4f3018\u4e2a\u591a\u6a21\u6001\u5927\u6a21\u578b\u5bf9\u987a\u5e8f\u6270\u52a8\u7684\u654f\u611f\u6027\uff0c\u63ed\u793a\u6240\u6709\u88ab\u6d4b\u6a21\u578b\u5747\u5b58\u5728\u663e\u8457\u7684\u987a\u5e8f\u4e0d\u4e00\u81f4\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u987a\u5e8f\u654f\u611f\u6027\u8fd9\u4e00\u57fa\u7840\u53ef\u9760\u6027\u7f3a\u9677\uff0c\u63d0\u51fa\u8de8\u987a\u5e8f\u7ffb\u8f6c\u7387\u4f5c\u4e3a\u6807\u51c6\u8bc4\u4f30\u6307\u6807\uff0c\u5bf9AI\u8bc4\u4f30\u89c4\u8303\u5236\u5b9a\u548c\u6a21\u578b\u8bad\u7ec3\u6539\u8fdb\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Image generative models are trained on massive, largely uncurated internet-scale datasets that contain undesirable visual concepts. Efficiently removing such concepts from the model generations without degrading the quality of output images remains challenging. We introduce a novel concept removal method for frontier diffusion and image autoregressive models, such as SD3.5, Flux, and Infinity. Our intervention replaces the internal bottleneck layer present in all these modern models with a transcoder that is trained to replicate the original layer while structuring it into distinct activation features. This in-place substitution creates an integrated filter through which concept-specific signals can be selectively disabled while preserving the rest of the model\u0027s behavior. Since the intervention modifies the model backbone rather than attaching an external component, it remains persistent under white-box access. Empirically, the approach achieves state-of-the-art concept removal performance across modern diffusion and autoregressive models, maintains visual generation quality, provides robustness against adversarial prompts, and supports sequential removal of diverse concepts. This positions our method as a practical approach for concept removal in frontier image generative models.", "arxiv_id": "2606.25548", "arxiv_url": "https://arxiv.org/abs/2606.25548", "authors": ["Aditya Kumar", "Pierre Joly", "Adam Dziedzic", "Franziska Boenisch"], "brief": "\u63d0\u51fa\u4e00\u79cd\u65b0\u578b\u6982\u5ff5\u79fb\u9664\u65b9\u6cd5\uff0c\u5c06SD3.5\u3001Flux\u3001Infinity\u7b49\u524d\u6cbf\u56fe\u50cf\u751f\u6210\u6a21\u578b\u7684\u5185\u90e8\u74f6\u9888\u5c42\u66ff\u6362\u4e3aTranscoder\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u6fc0\u6d3b\u7279\u5f81\u9009\u62e9\u6027\u7981\u7528\u7279\u5b9a\u6982\u5ff5\u4fe1\u53f7\uff0c\u540c\u65f6\u4fdd\u7559\u6a21\u578b\u6574\u4f53\u751f\u6210\u8d28\u91cf\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25548", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u673a\u5236\uff1a\u7528Transcoder\u539f\u4f4d\u66ff\u6362\u6a21\u578b\u74f6\u9888\u5c42\uff0c\u5c06\u6fc0\u6d3b\u5206\u89e3\u4e3a\u53ef\u89e3\u91ca\u7684\u72ec\u7acb\u7279\u5f81\uff0c\u65e0\u9700\u9644\u52a0\u5916\u90e8\u7ec4\u4ef6", "\u6301\u4e45\u6027\u5f3a\uff1a\u76f4\u63a5\u4fee\u6539\u6a21\u578b\u4e3b\u5e72\u800c\u975e\u5916\u6302\u8fc7\u6ee4\u5668\uff0c\u5728\u767d\u76d2\u8bbf\u95ee\u4e0b\u5bf9\u6297\u6027\u63d0\u793a\u4ecd\u96be\u4ee5\u7ed5\u8fc7", "\u901a\u7528\u6027\u5e7f\uff1a\u540c\u65f6\u652f\u6301\u6269\u6563\u6a21\u578b\uff08SD3.5\u3001Flux\uff09\u548c\u56fe\u50cf\u81ea\u56de\u5f52\u6a21\u578b\uff08Infinity\uff09\uff0c\u5e76\u652f\u6301\u591a\u6982\u5ff5\u987a\u5e8f\u79fb\u9664"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5185\u5bb9\u5b89\u5168", "\u6a21\u578b\u7f16\u8f91", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25548v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Concept Removal for Frontier Image Generative Models", "tldr": "\u7528Transcoder\u66ff\u6362\u6269\u6563/\u81ea\u56de\u5f52\u56fe\u50cf\u6a21\u578b\u74f6\u9888\u5c42\uff0c\u5b9e\u73b0\u9ad8\u6548\u6982\u5ff5\u79fb\u9664", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u65b0\u578b\u6982\u5ff5\u79fb\u9664\u65b9\u6cd5\uff0c\u5c06SD3.5\u3001Flux\u3001Infinity\u7b49\u524d\u6cbf\u56fe\u50cf\u751f\u6210\u6a21\u578b\u7684\u5185\u90e8\u74f6\u9888\u5c42\u66ff\u6362\u4e3aTranscoder\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u6fc0\u6d3b\u7279\u5f81\u9009\u62e9\u6027\u7981\u7528\u7279\u5b9a\u6982\u5ff5\u4fe1\u53f7\uff0c\u540c\u65f6\u4fdd\u7559\u6a21\u578b\u6574\u4f53\u751f\u6210\u8d28\u91cf\u3002", "why_notable": "\u9996\u6b21\u5c06Transcoder\u673a\u5236\u5f15\u5165\u56fe\u50cf\u751f\u6210\u6a21\u578b\u7684\u6982\u5ff5\u79fb\u9664\u4efb\u52a1\uff0c\u5728\u4e3b\u6d41\u524d\u6cbf\u6a21\u578b\u4e0a\u8fbe\u5230SOTA\u6548\u679c\uff0c\u517c\u987e\u751f\u6210\u8d28\u91cf\u4e0e\u5bf9\u6297\u9c81\u68d2\u6027\uff0c\u5bf9\u5185\u5bb9\u5b89\u5168\u5408\u89c4\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Autoregressive video diffusion with causal diffusion transformers has emerged as a major paradigm for real-time streaming video generation and action-conditioned interactive world models. In this work, we extend rCM, an advanced diffusion distillation framework, to autoregressive video diffusion. The core philosophy of rCM lies in the complementarity between forward and reverse divergences, represented by consistency models (CMs) and distribution matching distillation (DMD), respectively, in diffusion distillation. This philosophy naturally carries over to the autoregressive setting, where teacher-forcing (TF) provides an offline, forward-divergence causal training paradigm, while self-forcing (SF) corresponds to an on-policy, reverse-divergence refinement. Our contributions are: (1) through extensive experiments, we show that teacher-forcing CM is currently the best complement to self-forcing DMD as an initialization strategy (2) we present the first implementation of teacher-forcing-based continuous-time CMs (e.g., sCM/MeanFlow) for autoregressive video diffusion, enabled by our custom-mask FlashAttention-2 JVP kernel, achieving 10$\\times$ faster convergence compared to discrete-time CMs (dCMs) (3) we introduce Causal-rCM, a leading, unified, and scalable algorithm-infrastructure open recipe for diffusion distillation and causal training (4) we achieve state-of-the-art streaming video generation performance in both frame-wise and chunk-wise settings, using only synthetic data for training. Notably, our distilled 2-step causal Wan2.1-1.3B model achieves a VBench-T2V score of 84.63 with only 1 or 2 sampling steps. We further apply Causal-rCM to Cosmos 3, an advanced omnimodal world foundation model for physical AI with action-conditioned generation capability, enabling an interactive world model.", "arxiv_id": "2606.25473", "arxiv_url": "https://arxiv.org/abs/2606.25473", "authors": ["Kaiwen Zheng", "Guande He", "Min Zhao", "Jintao Zhang", "Huayu Chen", "Jianfei Chen", "Chen-Hsuan Lin", "Ming-Yu Liu", "Jun Zhu", "Qianli Ma"], "brief": "\u5c06\u5148\u8fdb\u6269\u6563\u84b8\u998f\u6846\u67b6rCM\u6269\u5c55\u81f3\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\uff0c\u63d0\u51faCausal-rCM\u2014\u2014\u4e00\u4e2a\u7ed3\u5408Teacher-Forcing\uff08\u524d\u5411\u6563\u5ea6\uff09\u4e0eSelf-Forcing\uff08\u53cd\u5411\u6563\u5ea6\uff09\u7684\u7edf\u4e00\u84b8\u998f\u7b97\u6cd5\uff0c\u652f\u6301\u6d41\u5f0f\u89c6\u9891\u751f\u6210\u4e0e\u4ea4\u4e92\u5f0f\u4e16\u754c\u6a21\u578b\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25473", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": ["\u9996\u6b21\u5b9e\u73b0\u57fa\u4e8eTeacher-Forcing\u7684\u8fde\u7eed\u65f6\u95f4\u4e00\u81f4\u6027\u6a21\u578b\uff08sCM/MeanFlow\uff09\u7528\u4e8e\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\uff0c\u901a\u8fc7\u81ea\u5b9a\u4e49mask FlashAttention-2 JVP\u6838\u5b9e\u73b0\u6bd4\u79bb\u6563\u65f6\u95f4CM\u5feb10\u500d\u7684\u6536\u655b\u901f\u5ea6", "\u84b8\u998f\u540e\u76842\u6b65Wan2.1-1.3B\u6a21\u578b\u5728VBench-T2V\u4e0a\u8fbe\u523084.63\u5206\uff0c\u4ec5\u97001-2\u6b65\u91c7\u6837\uff0c\u4e14\u4ec5\u4f7f\u7528\u5408\u6210\u6570\u636e\u8bad\u7ec3", "\u5c06Causal-rCM\u5e94\u7528\u4e8eCosmos 3\u5168\u6a21\u6001\u4e16\u754c\u57fa\u7840\u6a21\u578b\uff0c\u5b9e\u73b0\u52a8\u4f5c\u6761\u4ef6\u751f\u6210\u7684\u4ea4\u4e92\u5f0f\u4e16\u754c\u6a21\u578b"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u4e16\u754c\u6a21\u578b", "\u77e5\u8bc6\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25473v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Causal-rCM: A Unified Teacher-Forcing and Self-Forcing Open Recipe for Autoregressive Diffusion Distillation in Streaming Video Generation and Interactive World Models", "tldr": "\u63d0\u51faCausal-rCM\uff0c\u7edf\u4e00Teacher-Forcing\u4e0eSelf-Forcing\u7684\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u84b8\u998f\u6846\u67b6\uff0c\u5b9e\u73b0\u5b9e\u65f6\u6d41\u5f0f\u89c6\u9891\u751f\u6210", "upvotes": 0, "what_it_is": "\u5c06\u5148\u8fdb\u6269\u6563\u84b8\u998f\u6846\u67b6rCM\u6269\u5c55\u81f3\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\uff0c\u63d0\u51faCausal-rCM\u2014\u2014\u4e00\u4e2a\u7ed3\u5408Teacher-Forcing\uff08\u524d\u5411\u6563\u5ea6\uff09\u4e0eSelf-Forcing\uff08\u53cd\u5411\u6563\u5ea6\uff09\u7684\u7edf\u4e00\u84b8\u998f\u7b97\u6cd5\uff0c\u652f\u6301\u6d41\u5f0f\u89c6\u9891\u751f\u6210\u4e0e\u4ea4\u4e92\u5f0f\u4e16\u754c\u6a21\u578b\u3002", "why_notable": "\u9996\u4e2a\u5c06\u524d\u5411/\u53cd\u5411\u6563\u5ea6\u4e92\u8865\u54f2\u5b66\u7cfb\u7edf\u5316\u5e94\u7528\u4e8e\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u84b8\u998f\u7684\u5f00\u653e\u65b9\u6848\uff0c\u5728\u6781\u5c11\u91c7\u6837\u6b65\u6570\u4e0b\u8fbe\u5230SOTA\u6027\u80fd\uff0c\u5bf9\u5b9e\u65f6\u89c6\u9891\u751f\u6210\u548c\u7269\u7406AI\u4e16\u754c\u6a21\u578b\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Sparse Mixture-of-Experts (MoE) models route each token to a few of many experts, inviting the hypothesis that experts form functional modules tied to capabilities or languages. We test this causally on Command A+, a frontier open-weights MoE (218B total / 25B active; 128 experts, 8 active, +1 shared). We build a routing-mass atlas, pre-register six family-to-axis hypotheses before any intervention, and ablate each family at inference time against a size-matched random-expert null, measuring whether it selectively breaks its own axis (worst off-target effect at most one third of on-target). Crucially, we test the same families under four metrics and a held-out, independent-corpus run with bootstrap confidence intervals. Our finding is cautionary: robust functional modularity is rare and measurement-dependent. Of six pre-registered families, only one, the Arabic-language family, is a clean selective module that survives an independent corpus and a conservative statistical bar (1/6; a more permissive pre-registered point rule admits 3/6, but that count is threshold-sensitive). Every other family has a real causal effect yet fails selectivity, and its apparent modularity flips with the measurement: with the corpus, the metric, and the statistical bar. A positive control on Qwen3-30B-A3B recovers its published disjoint structure, confirming the method detects modularity when present. The verdict reproduces on the un-quantized BF16 model, ruling out a 4-bit quantization artifact. We conclude that ablation-based modularity verdicts are not safe unless the corpus, metric, and statistical bar are controlled. We release the atlas and ablation data.", "arxiv_id": "2606.25092", "arxiv_url": "https://arxiv.org/abs/2606.25092", "authors": ["Tony Salomone", "Deep Gandhi", "Ali Asaria"], "brief": "\u672c\u6587\u5bf9218B\u53c2\u6570\u7684\u524d\u6cbfMoE\u6a21\u578bCommand A+\u8fdb\u884c\u9884\u6ce8\u518c\u56e0\u679c\u5b9e\u9a8c\uff0c\u7cfb\u7edf\u68c0\u9a8c\u5176128\u4e2a\u4e13\u5bb6\u662f\u5426\u5f62\u6210\u4e0e\u7279\u5b9a\u80fd\u529b\u6216\u8bed\u8a00\u7ed1\u5b9a\u7684\u529f\u80fd\u6a21\u5757\uff0c\u53d1\u73b0\u6240\u8c13\u7684\u6a21\u5757\u5316\u5728\u5927\u591a\u6570\u60c5\u51b5\u4e0b\u662f\u6d4b\u91cf\u5047\u8c61\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25092", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u9884\u6ce8\u518c6\u4e2a\u4e13\u5bb6\u5bb6\u65cf\u5047\u8bbe\uff0c\u4ec51\u4e2a\uff08\u963f\u62c9\u4f2f\u8bed\u5bb6\u65cf\uff09\u901a\u8fc7\u4e25\u683c\u9009\u62e9\u6027\u6a21\u5757\u6807\u51c6\uff0c\u5176\u4f595\u4e2a\u56e0\u679c\u6548\u5e94\u5b58\u5728\u4f46\u4e0d\u5177\u9009\u62e9\u6027", "\u6a21\u5757\u5316\u7ed3\u8bba\u9ad8\u5ea6\u4f9d\u8d56\u8bed\u6599\u5e93\u3001\u8bc4\u4f30\u6307\u6807\u548c\u7edf\u8ba1\u9608\u503c\u7684\u9009\u62e9\uff0c\u540c\u4e00\u5bb6\u65cf\u5728\u4e0d\u540c\u6d4b\u91cf\u6761\u4ef6\u4e0b\u7ed3\u8bba\u76f8\u53cd", "\u5728Qwen3-30B-A3B\u4e0a\u7684\u6b63\u5411\u5bf9\u7167\u5b9e\u9a8c\u6210\u529f\u590d\u73b0\u5df2\u77e5\u7684\u4e0d\u76f8\u4ea4\u6a21\u5757\u7ed3\u6784\uff0c\u8bc1\u660e\u65b9\u6cd5\u672c\u8eab\u6709\u6548\uff1b\u7ed3\u8bba\u5728BF16\u672a\u91cf\u5316\u6a21\u578b\u4e0a\u540c\u6837\u6210\u7acb\uff0c\u6392\u9664\u91cf\u5316\u4f2a\u5f71"], "keywords": ["\u6df7\u5408\u4e13\u5bb6\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027", "\u56e0\u679c\u63a8\u65ad", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25092v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "How Modular Is a Frontier Mixture-of-Experts? A Pre-registered Causal Test in Which Apparent Expert Modularity Mostly Dissolves", "tldr": "\u524d\u6cbfMoE\u6a21\u578b\u7684\u4e13\u5bb6\u529f\u80fd\u6a21\u5757\u5316\u5047\u8bbe\u5728\u56e0\u679c\u68c0\u9a8c\u4e0b\u5927\u591a\u4e0d\u6210\u7acb", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9218B\u53c2\u6570\u7684\u524d\u6cbfMoE\u6a21\u578bCommand A+\u8fdb\u884c\u9884\u6ce8\u518c\u56e0\u679c\u5b9e\u9a8c\uff0c\u7cfb\u7edf\u68c0\u9a8c\u5176128\u4e2a\u4e13\u5bb6\u662f\u5426\u5f62\u6210\u4e0e\u7279\u5b9a\u80fd\u529b\u6216\u8bed\u8a00\u7ed1\u5b9a\u7684\u529f\u80fd\u6a21\u5757\uff0c\u53d1\u73b0\u6240\u8c13\u7684\u6a21\u5757\u5316\u5728\u5927\u591a\u6570\u60c5\u51b5\u4e0b\u662f\u6d4b\u91cf\u5047\u8c61\u3002", "why_notable": "\u9996\u6b21\u5bf9\u524d\u6cbfMoE\u6a21\u578b\u8fdb\u884c\u4e25\u683c\u9884\u6ce8\u518c\u56e0\u679c\u6d88\u878d\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u5b66\u754c\u5e7f\u6cdb\u63a5\u53d7\u7684\"\u4e13\u5bb6\u529f\u80fd\u6a21\u5757\u5316\"\u5047\u8bbe\u7684\u8106\u5f31\u6027\uff0c\u5bf9MoE\u53ef\u89e3\u91ca\u6027\u7814\u7a76\u65b9\u6cd5\u8bba\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\uff0c\u5e76\u516c\u5f00\u4e86\u8def\u7531\u56fe\u8c31\u4e0e\u6d88\u878d\u6570\u636e\u3002"}, {"abstract": "Neural scaling laws for transformer language models predict smooth improvements in pretraining loss with increasing parameters, but downstream capabilities such as in-context learning are known to emerge abruptly past a certain model scale. In this paper, we show that emergent capabilities arise stochastically throughout training, with larger models acquiring them earlier on average. We demonstrate that the emergence of capabilities such as pattern completion and indirect object identification corresponds to the abrupt learning of task-relevant attention patterns. To isolate this phenomenon, we train transformer models on synthetic linear map and cellular automata datasets, and we show that the difficulty of learning attention patterns depends on context length and pattern sparsity. Moreover, scaling the number of attention heads improves learning efficiency on our synthetic tasks, while increasing the head dimension yields diminishing returns past a minimum capacity. We additionally investigate architectures with alternative attention mechanisms, showing that MLP-Mixer outperforms a transformer on linear map tasks with complex attention patterns. Our findings provide a mechanistic insight into emergence, showing that downstream capabilities arise abruptly due to the intrinsic difficulty of learning sparse attention patterns in transformer models.", "arxiv_id": "2606.25010", "arxiv_url": "https://arxiv.org/abs/2606.25010", "authors": ["Vatsal Baherwani", "Zixi Chen", "Shikai Qiu", "Andrew Gordon Wilson", "Pavel Izmailov"], "brief": "\u672c\u6587\u63ed\u793aTransformer\u8bed\u8a00\u6a21\u578b\u7684\u6d8c\u73b0\u80fd\u529b\u5e76\u975e\u5e73\u6ed1\u51fa\u73b0\uff0c\u800c\u662f\u5728\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u968f\u673a\u7a81\u53d8\u4ea7\u751f\uff0c\u5bf9\u5e94\u4e8e\u6a21\u578b\u7a81\u7136\u5b66\u4f1a\u4efb\u52a1\u76f8\u5173\u7684\u7a00\u758f\u6ce8\u610f\u529b\u6a21\u5f0f\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25010", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6d8c\u73b0\u80fd\u529b\u5728\u8bad\u7ec3\u4e2d\u968f\u673a\u51fa\u73b0\uff0c\u5927\u6a21\u578b\u5e73\u5747\u66f4\u65e9\u4e60\u5f97\uff0c\u4e0e\u6a21\u578b\u89c4\u6a21\u5448\u7edf\u8ba1\u5173\u7cfb\u800c\u975e\u786e\u5b9a\u6027\u5173\u7cfb", "\u5728\u5408\u6210\u7ebf\u6027\u6620\u5c04\u548c\u5143\u80de\u81ea\u52a8\u673a\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\uff1a\u6ce8\u610f\u529b\u6a21\u5f0f\u7684\u5b66\u4e60\u96be\u5ea6\u53d6\u51b3\u4e8e\u4e0a\u4e0b\u6587\u957f\u5ea6\u548c\u6a21\u5f0f\u7a00\u758f\u5ea6", "\u589e\u52a0\u6ce8\u610f\u529b\u5934\u6570\u91cf\u53ef\u63d0\u5347\u5b66\u4e60\u6548\u7387\uff0c\u800c\u589e\u5927\u5934\u7ef4\u5ea6\u6536\u76ca\u9012\u51cf\uff1bMLP-Mixer\u5728\u590d\u6742\u6ce8\u610f\u529b\u6a21\u5f0f\u4efb\u52a1\u4e0a\u4f18\u4e8eTransformer"], "keywords": ["\u6d8c\u73b0\u80fd\u529b", "\u6ce8\u610f\u529b\u673a\u5236", "Transformer", "\u795e\u7ecf\u7f29\u653e\u5f8b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25010v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Emergent Capabilities Arise Randomly from Learning Sparse Attention Patterns", "tldr": "\u6d8c\u73b0\u80fd\u529b\u6e90\u4e8eTransformer\u968f\u673a\u4e60\u5f97\u7a00\u758f\u6ce8\u610f\u529b\u6a21\u5f0f\u7684\u7a81\u53d8\u8fc7\u7a0b", "upvotes": 0, "what_it_is": "\u672c\u6587\u63ed\u793aTransformer\u8bed\u8a00\u6a21\u578b\u7684\u6d8c\u73b0\u80fd\u529b\u5e76\u975e\u5e73\u6ed1\u51fa\u73b0\uff0c\u800c\u662f\u5728\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u968f\u673a\u7a81\u53d8\u4ea7\u751f\uff0c\u5bf9\u5e94\u4e8e\u6a21\u578b\u7a81\u7136\u5b66\u4f1a\u4efb\u52a1\u76f8\u5173\u7684\u7a00\u758f\u6ce8\u610f\u529b\u6a21\u5f0f\u3002", "why_notable": "\u4ece\u673a\u5236\u5c42\u9762\u89e3\u91ca\u4e86\u5927\u6a21\u578b\u6d8c\u73b0\u73b0\u8c61\u7684\u6839\u672c\u539f\u56e0\uff0c\u5c06\u5b8f\u89c2\u7684\u80fd\u529b\u7a81\u53d8\u4e0e\u5fae\u89c2\u7684\u7a00\u758f\u6ce8\u610f\u529b\u6a21\u5f0f\u5b66\u4e60\u76f4\u63a5\u5173\u8054\uff0c\u5bf9\u7406\u89e3\u548c\u9884\u6d4b\u6a21\u578b\u6d8c\u73b0\u884c\u4e3a\u5177\u6709\u91cd\u8981\u7406\u8bba\u4ef7\u503c\u3002"}, {"abstract": "Small ($\\sim$2B) GUI-grounding agents are attractive for on-device deployment, accessibility tooling, and low-cost iteration, but at this scale they face two open recipe questions: how to obtain bounding-box training data without expensive human annotation, and how to combine supervised fine-tuning with reinforcement learning. We address both, with the explicit goal of pushing small-model performance rather than scaling up. WinDOM is a $54{,}425$-record grounding corpus harvested by driving an open-source Windows 11 web reimplementation under headless Playwright, with bounding boxes read directly off the DOM and no OCR or human annotation. Self-Family Distillation (SFD) is a single rejection-sampling cold-start parameterised only by the teacher choice: either an EMA of the student (no external model) or a frozen larger same-family teacher. We then treat the saturation depth of the SFD cold-start as an explicit GRPO hyperparameter. On a Qwen3.5-2B student, the under-saturated cold-start is a better GRPO initialiser than the converged one: SFD-4B with Early-init RL gains $+5.4$ OOD-mean ($+3.5$ ScreenSpot-Pro, $+7.0$ OSWorld-G, $+5.8$ ScreenSpot-V2) over the base. The same-size EMA mode lands within roughly one OOD-mean point of the cross-size $4$B variant ($65.2$ vs $66.3$) without an external teacher.", "arxiv_id": "2606.25964", "arxiv_url": "https://arxiv.org/abs/2606.25964", "authors": ["Chengheng Li-Chen", "Zhiqian Zhou", "Hao Chen", "Nicolas Chauvin"], "brief": "\u63d0\u51faWinDOM\u6570\u636e\u96c6\uff0854,425\u6761\u8bb0\u5f55\uff09\u548c\u81ea\u5bb6\u65cf\u84b8\u998f\uff08SFD\uff09\u8bad\u7ec3\u65b9\u6cd5\uff0c\u4e13\u4e3a\u7ea62B\u53c2\u6570\u7684\u5c0f\u578bGUI\u5b9a\u4f4d\u667a\u80fd\u4f53\u8bbe\u8ba1\uff0c\u901a\u8fc7DOM\u76f4\u63a5\u8bfb\u53d6\u8fb9\u754c\u6846\u907f\u514d\u4eba\u5de5\u6807\u6ce8\uff0c\u5e76\u7ed3\u5408GRPO\u5f3a\u5316\u5b66\u4e60\u63d0\u5347\u6027\u80fd\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25964", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["WinDOM\u8bed\u6599\u5e93\uff1a\u9a71\u52a8Windows 11 Web\u91cd\u5b9e\u73b0\u5728\u65e0\u5934Playwright\u4e0b\u81ea\u52a8\u91c7\u96c654,425\u6761GUI\u5b9a\u4f4d\u6570\u636e\uff0c\u76f4\u63a5\u4eceDOM\u8bfb\u53d6\u8fb9\u754c\u6846\uff0c\u96f6\u4eba\u5de5\u6807\u6ce8", "\u81ea\u5bb6\u65cf\u84b8\u998f\uff08SFD\uff09\uff1a\u652f\u6301\u4e24\u79cd\u6a21\u5f0f\u2014\u2014\u5b66\u751f\u6a21\u578b\u7684EMA\u81ea\u84b8\u998f\uff08\u65e0\u9700\u5916\u90e8\u6a21\u578b\uff09\u6216\u540c\u7cfb\u5217\u66f4\u5927\u51bb\u7ed3\u6559\u5e08\u6a21\u578b\u84b8\u998f\uff0c\u4f5c\u4e3aGRPO\u7684\u51b7\u542f\u52a8\u521d\u59cb\u5316", "\u6b20\u9971\u548c\u51b7\u542f\u52a8\u7b56\u7565\uff1a\u5728Qwen3.5-2B\u4e0a\uff0c\u672a\u5b8c\u5168\u6536\u655b\u7684SFD\u51b7\u542f\u52a8\u6bd4\u5b8c\u5168\u6536\u655b\u7248\u672c\u66f4\u9002\u5408GRPO\u521d\u59cb\u5316\uff0cOOD\u5747\u503c\u63d0\u5347+5.4\uff0cEMA\u540c\u5c3a\u5bf8\u6a21\u5f0f\u6027\u80fd\u63a5\u8fd14B\u6559\u5e08\u7248\u672c\uff0865.2 vs 66.3\uff09"], "keywords": ["\u667a\u80fd\u4f53", "GUI\u5b9a\u4f4d", "\u77e5\u8bc6\u84b8\u998f", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25964v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "WinDOM: Self-Family Distillation for Small-Model GUI Grounding", "tldr": "WinDOM\u63d0\u51fa\u81ea\u5bb6\u65cf\u84b8\u998f\u65b9\u6cd5\uff0c\u7528\u5c0f\u578b2B\u6a21\u578b\u5b9e\u73b0\u9ad8\u6548GUI\u754c\u9762\u5b9a\u4f4d\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8", "upvotes": 0, "what_it_is": "\u63d0\u51faWinDOM\u6570\u636e\u96c6\uff0854,425\u6761\u8bb0\u5f55\uff09\u548c\u81ea\u5bb6\u65cf\u84b8\u998f\uff08SFD\uff09\u8bad\u7ec3\u65b9\u6cd5\uff0c\u4e13\u4e3a\u7ea62B\u53c2\u6570\u7684\u5c0f\u578bGUI\u5b9a\u4f4d\u667a\u80fd\u4f53\u8bbe\u8ba1\uff0c\u901a\u8fc7DOM\u76f4\u63a5\u8bfb\u53d6\u8fb9\u754c\u6846\u907f\u514d\u4eba\u5de5\u6807\u6ce8\uff0c\u5e76\u7ed3\u5408GRPO\u5f3a\u5316\u5b66\u4e60\u63d0\u5347\u6027\u80fd\u3002", "why_notable": "\u89e3\u51b3\u4e86\u5c0f\u6a21\u578bGUI\u5b9a\u4f4d\u7684\u4e24\u5927\u6838\u5fc3\u75db\u70b9\uff1a\u4f4e\u6210\u672c\u6570\u636e\u83b7\u53d6\u4e0eSFT+RL\u7ed3\u5408\u7b56\u7565\uff0c\u65e0\u9700\u6602\u8d35\u6807\u6ce8\u6216\u5927\u6a21\u578b\u5373\u53ef\u5728\u591a\u4e2aOOD\u57fa\u51c6\u4e0a\u53d6\u5f97\u663e\u8457\u63d0\u5347\uff0c\u5bf9\u7aef\u4fa7\u90e8\u7f72\u548c\u65e0\u969c\u788d\u5de5\u5177\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Sparse Autoencoders (SAEs) have shown promise for analyzing language models, but applying them to vision-language models (VLMs) often yields representations that are difficult to use as controllable cross-modal steering directions. We introduce the Joint Sparse Autoencoder (JSAE), which uses an explicit alignment constraint to jointly factorize sequence-pooled vision and language activations into shared, interpretable image/caption-level features. Applied to LLaVA, JSAE recovers cross-modal features for recognizable concepts (e.g., food and animals). Through bidirectional interventions (additive steering and suppression), we observe a layer-dependent asymmetry under our protocol: additive steering peaks at mid-to-late (pre-output) layers and weakens at both ends, whereas suppression scores remain within a comparable range across all probed layers within statistical noise. Experiments on three VLMs, namely LLaVA-v1.6-Mistral-7B, Llama3-LLaVA-8B, and the MoE-based Qwen3-VL-30B, show related layer-localized effects across architectures. Together, these results suggest that explicitly aligned sparse representations support more controllable intervention-based analysis of multimodal features, within an identifiable layer range, than the unconstrained alternatives tested here.", "arxiv_id": "2606.25657", "arxiv_url": "https://arxiv.org/abs/2606.25657", "authors": ["Huizhen Shu", "Xuying Li", "Hongxu Lin", "Wenjie Sun", "Hui Li"], "brief": "\u63d0\u51faJoint Sparse Autoencoder\uff08JSAE\uff09\uff0c\u901a\u8fc7\u663e\u5f0f\u5bf9\u9f50\u7ea6\u675f\u5c06\u89c6\u89c9\u4e0e\u8bed\u8a00\u6fc0\u6d3b\u8054\u5408\u5206\u89e3\u4e3a\u5171\u4eab\u53ef\u89e3\u91ca\u7279\u5f81\uff0c\u5e76\u5e94\u7528\u4e8eLLaVA\u7b49\u591a\u4e2aVLM\u7684\u8de8\u6a21\u6001\u7279\u5f81\u5206\u6790\u4e0e\u5e72\u9884\u63a7\u5236\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25657", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u5bf9\u9f50\u7ea6\u675f\u5c06\u5e8f\u5217\u6c60\u5316\u7684\u89c6\u89c9\u4e0e\u8bed\u8a00\u6fc0\u6d3b\u8054\u5408\u5206\u89e3\uff0c\u6062\u590d\u98df\u7269\u3001\u52a8\u7269\u7b49\u53ef\u8bc6\u522b\u8de8\u6a21\u6001\u6982\u5ff5\u7279\u5f81", "\u53d1\u73b0\u5c42\u4f9d\u8d56\u4e0d\u5bf9\u79f0\u6027\uff1a\u52a0\u6027\u5f15\u5bfc\u5728\u4e2d\u540e\u5c42\u6548\u679c\u6700\u5f3a\uff0c\u800c\u6291\u5236\u5e72\u9884\u5728\u5404\u5c42\u6548\u679c\u76f8\u5bf9\u5747\u5300", "\u5728LLaVA-v1.6-Mistral-7B\u3001Llama3-LLaVA-8B\u548cMoE\u67b6\u6784Qwen3-VL-30B\u4e0a\u5747\u9a8c\u8bc1\u4e86\u5c42\u5c40\u90e8\u5316\u6548\u5e94"], "keywords": ["\u591a\u6a21\u6001", "\u53ef\u89e3\u91ca\u6027", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u7a00\u758f\u81ea\u7f16\u7801\u5668"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25657v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Steering Vision-Language Models with Joint Sparse Autoencoders", "tldr": "\u63d0\u51fa\u8054\u5408\u7a00\u758f\u81ea\u7f16\u7801\u5668JSAE\uff0c\u5b9e\u73b0\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u8de8\u6a21\u6001\u53ef\u63a7\u7279\u5f81\u5e72\u9884", "upvotes": 0, "what_it_is": "\u63d0\u51faJoint Sparse Autoencoder\uff08JSAE\uff09\uff0c\u901a\u8fc7\u663e\u5f0f\u5bf9\u9f50\u7ea6\u675f\u5c06\u89c6\u89c9\u4e0e\u8bed\u8a00\u6fc0\u6d3b\u8054\u5408\u5206\u89e3\u4e3a\u5171\u4eab\u53ef\u89e3\u91ca\u7279\u5f81\uff0c\u5e76\u5e94\u7528\u4e8eLLaVA\u7b49\u591a\u4e2aVLM\u7684\u8de8\u6a21\u6001\u7279\u5f81\u5206\u6790\u4e0e\u5e72\u9884\u63a7\u5236\u3002", "why_notable": "\u9996\u6b21\u5c06SAE\u65b9\u6cd5\u6269\u5c55\u81f3\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u8de8\u6a21\u6001\u53ef\u63a7\u5e72\u9884\uff0c\u63ed\u793a\u4e86VLM\u5185\u90e8\u591a\u6a21\u6001\u7279\u5f81\u7684\u5c42\u7ea7\u5206\u5e03\u89c4\u5f8b\uff0c\u4e3aVLM\u53ef\u89e3\u91ca\u6027\u4e0e\u884c\u4e3a\u63a7\u5236\u63d0\u4f9b\u4e86\u65b0\u5de5\u5177\u3002"}, {"abstract": "Estimating token-level advantages in reinforcement learning (RL) for language models remains challenging because scaling up episodic experience collection is expensive. The difficulty intensifies for baseline advantage estimation methods, where repeated sampling causes trajectories to diverge into substantially different reasoning prefixes. In this context, RL algorithms such as GRPO prove limited: an outcome reward is too sparse to be attributed to specific actions like intermediate steps, and comparisons across sampled traces are non-trivial because they are heterogeneous. To mitigate both the computational cost of repeated sampling and the difficulty of credit assignment, we study single-rollout proximal policy optimization (SR-PPO) featuring token-level credit assignment in RL for language models. Instead of estimating advantages by normalizing episodic returns within the candidate group, we train a calibrated token-level credit critic using Monte Carlo outcomes from one rollout per prompt. Specifically, we use the critic to predict the Pass@k success probability at the prompt prefix, which is derived from a Pass@1 attempt. This choice yields a more selective learning signal than Pass@1: it discounts easily solved prefixes while prioritizing hard ones whose success probability remains marginal. We show that as $k$ increases, Pass@k converges to a reachability indicator, reflecting whether a prefix can lead to at least one successful continuation. In an explicit state graph, the limit ($k \\rightarrow \\infty$) can be computed in $O(|V|+|E|)$ time, offering a promising surrogate for direct credit assignment without the need to sample contrastive traces. As an initial validation, SR-PPO exhibits stable learning dynamics, along with consistent gains in Pass@128 success rates on mathematical reasoning benchmarks such as HMMT26 and AIME24.", "arxiv_id": "2606.25451", "arxiv_url": "https://arxiv.org/abs/2606.25451", "authors": ["Fengdi Che", "Yang Liu", "Lei Yu", "Meng Cao", "Tong Che", "Rupam Mahmood", "Dale Schuurmans"], "brief": "\u63d0\u51faSR-PPO\u65b9\u6cd5\uff0c\u901a\u8fc7\u8bad\u7ec3\u4e00\u4e2a\u57fa\u4e8ePass@k\u6210\u529f\u6982\u7387\u7684token\u7ea7Critic\uff0c\u5728\u6bcf\u4e2aprompt\u4ec5\u9700\u4e00\u6b21rollout\u7684\u60c5\u51b5\u4e0b\u5b8c\u6210\u4fe1\u7528\u5206\u914d\uff0c\u66ff\u4ee3GRPO\u7b49\u9700\u8981\u591a\u6b21\u91c7\u6837\u5bf9\u6bd4\u7684\u65b9\u6cd5\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25451", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["Pass@k\u6210\u529f\u6982\u7387\u4f5c\u4e3aCritic\u76ee\u6807\uff1a\u4ece\u5355\u6b21Pass@1\u5c1d\u8bd5\u63a8\u5bfc\uff0ck\u589e\u5927\u65f6\u6536\u655b\u4e3a\u53ef\u8fbe\u6027\u6307\u6807\uff0c\u81ea\u52a8\u805a\u7126\u4e8e\u96be\u5ea6\u9002\u4e2d\u7684\u524d\u7f00", "\u7406\u8bba\u8bc1\u660e\uff1a\u5728\u663e\u5f0f\u72b6\u6001\u56fe\u4e2d\uff0ck\u2192\u221e\u65f6\u7684\u6781\u9650\u53ef\u5728O(|V|+|E|)\u65f6\u95f4\u5185\u8ba1\u7b97\uff0c\u63d0\u4f9b\u65e0\u9700\u5bf9\u6bd4\u8f68\u8ff9\u7684\u4fe1\u7528\u5206\u914d\u4ee3\u7406", "\u5b9e\u9a8c\u9a8c\u8bc1\uff1aSR-PPO\u5728HMMT26\u548cAIME24\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0aPass@128\u6307\u6807\u6301\u7eed\u63d0\u5347\uff0c\u4e14\u8bad\u7ec3\u52a8\u6001\u7a33\u5b9a"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b", "\u4fe1\u7528\u5206\u914d", "\u6570\u5b66\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25451v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Learning with a Single Rollout via Monte Carlo Pass@k Critic", "tldr": "\u7528\u5355\u6b21rollout\u7684Monte Carlo Pass@k\u4f30\u8ba1token\u7ea7\u4f18\u52bf\uff0c\u5b9e\u73b0\u9ad8\u6548\u7a33\u5b9a\u7684\u8bed\u8a00\u6a21\u578b\u5f3a\u5316\u5b66\u4e60", "upvotes": 0, "what_it_is": "\u63d0\u51faSR-PPO\u65b9\u6cd5\uff0c\u901a\u8fc7\u8bad\u7ec3\u4e00\u4e2a\u57fa\u4e8ePass@k\u6210\u529f\u6982\u7387\u7684token\u7ea7Critic\uff0c\u5728\u6bcf\u4e2aprompt\u4ec5\u9700\u4e00\u6b21rollout\u7684\u60c5\u51b5\u4e0b\u5b8c\u6210\u4fe1\u7528\u5206\u914d\uff0c\u66ff\u4ee3GRPO\u7b49\u9700\u8981\u591a\u6b21\u91c7\u6837\u5bf9\u6bd4\u7684\u65b9\u6cd5\u3002", "why_notable": "\u89e3\u51b3\u4e86LLM\u5f3a\u5316\u5b66\u4e60\u4e2d\u591a\u6b21\u91c7\u6837\u4ee3\u4ef7\u9ad8\u6602\u4e0e\u5f02\u6784\u8f68\u8ff9\u96be\u4ee5\u6bd4\u8f83\u7684\u53cc\u91cd\u75db\u70b9\uff0c\u5355rollout\u5373\u53ef\u5b8c\u6210token\u7ea7\u4fe1\u7528\u5206\u914d\uff0c\u5927\u5e45\u964d\u4f4e\u8ba1\u7b97\u6210\u672c\uff0c\u5bf9\u6570\u5b66\u63a8\u7406\u7b49\u7a00\u758f\u5956\u52b1\u4efb\u52a1\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large Language Models (LLMs) have shown promise for automated penetration testing, yet existing end-to-end black-box evaluations are highly susceptible to error cascading: failures in early reconnaissance can mask an agent\u0027s actual ability to exploit vulnerabilities. To more accurately characterize these capabilities, we propose a two-stage decoupled evaluation framework that separates exploit execution from reconnaissance. Using ground-truth injection and knowledge-driven ablation across 70 high-fidelity web vulnerability testbeds, our framework isolates exploitation performance from reconnaissance noise. We empirically evaluate five open-source penetration-testing agents, covering multiagent, monolithic, and graph-driven architectures, on a strictly aligned subset of 50 representative vulnerabilities. The results reveal a substantial capability gap. With accurate vulnerability context, agents achieve a functional success rate of up to 90.0%, whereas autonomous reconnaissance, measured by targeted vulnerability recall, plateaus at approximately 50.0%, primarily due to failures in parsing unstructured telemetry. Cross-architectural analysis further reveals distinct capability niches: multi-agent isolation is more effective for long-sequence interactions such as de-serialization, while monolithic and graph-driven designs perform better on short-chain injections and cross-session access-control vulnerabilities, respectively. This decoupled evaluation work provides a fine-grained benchmarking protocol and an empirical basis for designing next-generation automated offensive security agents.", "arxiv_id": "2606.25332", "arxiv_url": "https://arxiv.org/abs/2606.25332", "authors": ["Liwei Yu", "Shuo Li", "Ming Zhou", "Ge Chu", "Yan Guo"], "brief": "\u9488\u5bf9LLM\u81ea\u52a8\u5316\u6e17\u900f\u6d4b\u8bd5\u4e2d\"\u9519\u8bef\u7ea7\u8054\"\u95ee\u9898\uff0c\u63d0\u51fa\u5c06\u4fa6\u5bdf\u4e0e\u6f0f\u6d1e\u5229\u7528\u89e3\u8026\u7684\u4e24\u9636\u6bb5\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc7\u771f\u5b9e\u6f0f\u6d1e\u4e0a\u4e0b\u6587\u6ce8\u5165\u4e0e\u77e5\u8bc6\u6d88\u878d\uff0c\u572870\u4e2a\u9ad8\u4fdd\u771fWeb\u6f0f\u6d1e\u6d4b\u8bd5\u5e8a\u4e0a\u72ec\u7acb\u8bc4\u4f30\u5404\u9636\u6bb5\u80fd\u529b\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25332", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u89e3\u8026\u8bc4\u4f30\u63ed\u793a\u5de8\u5927\u80fd\u529b\u5dee\u8ddd\uff1a\u63d0\u4f9b\u51c6\u786e\u6f0f\u6d1e\u4e0a\u4e0b\u6587\u65f6\u6210\u529f\u7387\u9ad8\u8fbe90%\uff0c\u800c\u81ea\u4e3b\u4fa6\u5bdf\u9636\u6bb5\u7684\u6f0f\u6d1e\u53ec\u56de\u7387\u4ec5\u7ea650%\uff0c\u4e3b\u8981\u74f6\u9888\u5728\u4e8e\u975e\u7ed3\u6784\u5316\u9065\u6d4b\u6570\u636e\u89e3\u6790\u5931\u8d25", "\u8de8\u67b6\u6784\u5206\u6790\u53d1\u73b0\u80fd\u529b\u5206\u5316\uff1a\u591a\u667a\u80fd\u4f53\u67b6\u6784\u64c5\u957f\u53cd\u5e8f\u5217\u5316\u7b49\u957f\u5e8f\u5217\u4ea4\u4e92\uff0c\u5355\u4f53\u67b6\u6784\u9002\u5408\u77ed\u94fe\u6ce8\u5165\uff0c\u56fe\u9a71\u52a8\u67b6\u6784\u5728\u8de8\u4f1a\u8bdd\u8bbf\u95ee\u63a7\u5236\u6f0f\u6d1e\u4e0a\u8868\u73b0\u66f4\u4f18", "\u6784\u5efa\u4e86\u8986\u76d650\u4e2a\u4ee3\u8868\u6027\u6f0f\u6d1e\u7684\u4e25\u683c\u5bf9\u9f50\u57fa\u51c6\uff0c\u8bc4\u4f30\u4e865\u79cd\u5f00\u6e90\u6e17\u900f\u6d4b\u8bd5\u667a\u80fd\u4f53\uff08\u591a\u667a\u80fd\u4f53\u3001\u5355\u4f53\u3001\u56fe\u9a71\u52a8\u4e09\u7c7b\u67b6\u6784\uff09"], "keywords": ["\u667a\u80fd\u4f53", "\u7f51\u7edc\u5b89\u5168", "\u5927\u8bed\u8a00\u6a21\u578b", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25332v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Decoupling Reconnaissance and Exploitation: Measuring the Capability Boundaries of LLM-Based Web Penetration Testing", "tldr": "\u63d0\u51fa\u4e24\u9636\u6bb5\u89e3\u8026\u8bc4\u4f30\u6846\u67b6\uff0c\u5206\u79bb\u4fa6\u5bdf\u4e0e\u6f0f\u6d1e\u5229\u7528\uff0c\u7cbe\u51c6\u8861\u91cfLLM\u6e17\u900f\u6d4b\u8bd5\u80fd\u529b\u8fb9\u754c", "upvotes": 0, "what_it_is": "\u9488\u5bf9LLM\u81ea\u52a8\u5316\u6e17\u900f\u6d4b\u8bd5\u4e2d\"\u9519\u8bef\u7ea7\u8054\"\u95ee\u9898\uff0c\u63d0\u51fa\u5c06\u4fa6\u5bdf\u4e0e\u6f0f\u6d1e\u5229\u7528\u89e3\u8026\u7684\u4e24\u9636\u6bb5\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc7\u771f\u5b9e\u6f0f\u6d1e\u4e0a\u4e0b\u6587\u6ce8\u5165\u4e0e\u77e5\u8bc6\u6d88\u878d\uff0c\u572870\u4e2a\u9ad8\u4fdd\u771fWeb\u6f0f\u6d1e\u6d4b\u8bd5\u5e8a\u4e0a\u72ec\u7acb\u8bc4\u4f30\u5404\u9636\u6bb5\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u6e17\u900f\u6d4b\u8bd5\u4e2d\u7684\u4fa6\u5bdf\u4e0e\u5229\u7528\u4e24\u9636\u6bb5\u89e3\u8026\u8bc4\u4f30\uff0c\u63ed\u793a\u4e86\u73b0\u6709\u7aef\u5230\u7aef\u8bc4\u4f30\u63a9\u76d6\u771f\u5b9e\u80fd\u529b\u7684\u95ee\u9898\uff0c\u4e3a\u4e0b\u4e00\u4ee3\u81ea\u52a8\u5316\u653b\u51fb\u6027\u5b89\u5168\u667a\u80fd\u4f53\u7684\u8bbe\u8ba1\u63d0\u4f9b\u4e86\u7ec6\u7c92\u5ea6\u57fa\u51c6\u548c\u5b9e\u8bc1\u4f9d\u636e\u3002"}, {"abstract": "Post-Training Sparsity (PTS) has emerged as a crucial paradigm for compressing Large Language Models to facilitate efficient deployment on resource-constrained devices. However, existing PTS methodologies are typically confined to Single-Sparsity optimization, necessitating a separate, time-consuming optimization session for each specific sparsity level. This rigid paradigm significantly hinders flexible deployment across diverse hardware scenarios, as adapting to a new sparsity requirement mandates a complete re-optimization process. To address these limitations, we propose Elastic Post-Training Sparsity (EPTS), a unified Multi-Sparsity framework that produces a single elastic model capable of maintaining robust performance across diverse sparsity configurations through a one-shot optimization process. Specifically, we design a Multi-Sparsity Hierarchy LoRA (MS-HiLoRA) mechanism that facilitates knowledge inheritance from low- to high-sparsity groups, effectively mitigating the competition for parameter reconstruction. Furthermore, we introduce a Multi-Sparsity Feature Mixer (MSFM), which significantly enhances the model\u0027s adaptability to pruning perturbations by dynamically fusing feature representations of varying sparsity granularities. Extensive experiments on LLaMA and OPT families demonstrate that EPTS achieves competitive performance compared to state-of-the-art methods like SparseGPT and Wanda, while offering significant efficiency gains by enabling multi-scenario deployment from a single optimization. our source code is available at https://github.com/xuke225/EPTS.", "arxiv_id": "2606.25285", "arxiv_url": "https://arxiv.org/abs/2606.25285", "authors": ["Ke Xu", "Jiaqi Wan", "Wenhao Hu", "Han Pu", "Xiaoyun Wang"], "brief": "\u63d0\u51faElastic Post-Training Sparsity\uff08EPTS\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u4e00\u6b21\u4f18\u5316\u751f\u6210\u5355\u4e2a\u5f39\u6027\u6a21\u578b\uff0c\u4f7f\u5176\u80fd\u5728\u591a\u79cd\u7a00\u758f\u5ea6\u914d\u7f6e\u4e0b\u4fdd\u6301\u7a33\u5065\u6027\u80fd\uff0c\u65e0\u9700\u4e3a\u6bcf\u4e2a\u7a00\u758f\u5ea6\u5355\u72ec\u91cd\u65b0\u4f18\u5316\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25285", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bbe\u8ba1Multi-Sparsity Hierarchy LoRA\uff08MS-HiLoRA\uff09\u673a\u5236\uff0c\u5b9e\u73b0\u4ece\u4f4e\u7a00\u758f\u5ea6\u5230\u9ad8\u7a00\u758f\u5ea6\u7ec4\u7684\u77e5\u8bc6\u7ee7\u627f\uff0c\u7f13\u89e3\u53c2\u6570\u91cd\u5efa\u7ade\u4e89\u95ee\u9898", "\u5f15\u5165Multi-Sparsity Feature Mixer\uff08MSFM\uff09\uff0c\u52a8\u6001\u878d\u5408\u4e0d\u540c\u7a00\u758f\u7c92\u5ea6\u7684\u7279\u5f81\u8868\u793a\uff0c\u589e\u5f3a\u6a21\u578b\u5bf9\u526a\u679d\u6270\u52a8\u7684\u9002\u5e94\u6027", "\u5728LLaMA\u548cOPT\u7cfb\u5217\u6a21\u578b\u4e0a\u5b9e\u9a8c\u8868\u660e\uff0cEPTS\u6027\u80fd\u4e0eSparseGPT\u3001Wanda\u7b49SOTA\u65b9\u6cd5\u76f8\u5f53\uff0c\u540c\u65f6\u663e\u8457\u964d\u4f4e\u591a\u573a\u666f\u90e8\u7f72\u7684\u4f18\u5316\u5f00\u9500"], "keywords": ["\u6a21\u578b\u538b\u7f29", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7a00\u758f\u5316", "\u9ad8\u6548\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25285v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EPTS: Elastic Post-Training Sparsity for Efficient Large Language Model Compression", "tldr": "EPTS\u63d0\u51fa\u5f39\u6027\u8bad\u7ec3\u540e\u7a00\u758f\u5316\u6846\u67b6\uff0c\u4e00\u6b21\u4f18\u5316\u5373\u53ef\u652f\u6301\u591a\u79cd\u7a00\u758f\u5ea6\u914d\u7f6e\u7684LLM\u90e8\u7f72", "upvotes": 0, "what_it_is": "\u63d0\u51faElastic Post-Training Sparsity\uff08EPTS\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u4e00\u6b21\u4f18\u5316\u751f\u6210\u5355\u4e2a\u5f39\u6027\u6a21\u578b\uff0c\u4f7f\u5176\u80fd\u5728\u591a\u79cd\u7a00\u758f\u5ea6\u914d\u7f6e\u4e0b\u4fdd\u6301\u7a33\u5065\u6027\u80fd\uff0c\u65e0\u9700\u4e3a\u6bcf\u4e2a\u7a00\u758f\u5ea6\u5355\u72ec\u91cd\u65b0\u4f18\u5316\u3002", "why_notable": "\u73b0\u6709PTS\u65b9\u6cd5\u6bcf\u6362\u4e00\u4e2a\u7a00\u758f\u5ea6\u5c31\u9700\u91cd\u65b0\u4f18\u5316\uff0c\u90e8\u7f72\u7075\u6d3b\u6027\u5dee\uff1bEPTS\u901a\u8fc7\u4e00\u6b21\u4f18\u5316\u8986\u76d6\u591a\u7a00\u758f\u5ea6\u9700\u6c42\uff0c\u5927\u5e45\u63d0\u5347LLM\u5728\u5f02\u6784\u786c\u4ef6\u4e0a\u7684\u90e8\u7f72\u6548\u7387\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Jailbreak attacks reveal a persistent weakness in aligned Large Language Models: carefully crafted prompts can elicit policy-violating responses despite safety training. While most defenses operate at the prompt or output level, it remains unclear how harmful intent is encoded within the model\u0027s internal representations. We investigate this question by analyzing token-level predictive entropy trajectories across layers of a frozen LLM using the logit lens. We find that static aggregate statistics of prompt-level entropy (e.g., mean, variance) carry little discriminative signal, whereas features capturing how entropy evolves across token positions, such as monotonic rank-based trend scores, are substantially more informative. Importantly, this signal is not uniform across model depth: it is concentrated in intermediate layers and degrades at the final layer, indicating that jailbreak-relevant structure is most pronounced in mid-network representations rather than at the output head. Across multiple models (Llama, Qwen, Gemma) and adversarial benchmarks, these entropy dynamics provide architecture-consistent separation without additional training. Together, our findings show that jailbreak behavior is reflected in structured intermediate uncertainty dynamics, clarifying both which entropy-derived features encode harmful intent and where in the network that signal is most pronounced.", "arxiv_id": "2606.25182", "arxiv_url": "https://arxiv.org/abs/2606.25182", "authors": ["Sofiia Nikolenko", "Michele Papucci", "Mina Rezaei", "Shireen Kudukkil Manchingal"], "brief": "\u672c\u6587\u5229\u7528logit lens\u5206\u6790\u51bb\u7ed3LLM\u5404\u5c42\u7684token\u7ea7\u9884\u6d4b\u71b5\u8f68\u8ff9\uff0c\u53d1\u73b0\u8d8a\u72f1\u653b\u51fb\u7684\u6709\u5bb3\u610f\u56fe\u4e3b\u8981\u7f16\u7801\u5728\u6a21\u578b\u4e2d\u95f4\u5c42\u7684\u7ed3\u6784\u5316\u71b5\u52a8\u6001\u4e2d\uff0c\u800c\u975e\u6700\u7ec8\u8f93\u51fa\u5c42\uff0c\u5e76\u57fa\u4e8e\u6b64\u6784\u5efa\u4e86\u65e0\u9700\u8bad\u7ec3\u7684\u8d8a\u72f1\u68c0\u6d4b\u65b9\u6cd5\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25182", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9759\u6001\u805a\u5408\u71b5\u7edf\u8ba1\uff08\u5747\u503c\u3001\u65b9\u5dee\uff09\u5224\u522b\u4fe1\u53f7\u5f31\uff0c\u800c\u8de8token\u4f4d\u7f6e\u7684\u71b5\u6f14\u5316\u8d8b\u52bf\uff08\u5982\u5355\u8c03\u79e9\u8d8b\u52bf\u5206\u6570\uff09\u4fe1\u53f7\u663e\u8457\u66f4\u5f3a", "\u8d8a\u72f1\u76f8\u5173\u4fe1\u53f7\u96c6\u4e2d\u4e8e\u6a21\u578b\u4e2d\u95f4\u5c42\uff0c\u5728\u6700\u7ec8\u5c42\u53cd\u800c\u9000\u5316\uff0c\u8868\u660e\u6709\u5bb3\u610f\u56fe\u5728\u4e2d\u5c42\u8868\u5f81\u4e2d\u6700\u4e3a\u7a81\u51fa", "\u65b9\u6cd5\u5728Llama\u3001Qwen\u3001Gemma\u7b49\u591a\u4e2a\u6a21\u578b\u548c\u5bf9\u6297\u57fa\u51c6\u4e0a\u5747\u8868\u73b0\u51fa\u67b6\u6784\u4e00\u81f4\u7684\u5206\u79bb\u6548\u679c\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u5bf9\u9f50", "\u8d8a\u72f1\u68c0\u6d4b", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25182v1", "published_at": "2026-06-23", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "What Intermediate Layers Know: Detecting Jailbreaks from Entropy Dynamics", "tldr": "\u901a\u8fc7\u5206\u6790LLM\u4e2d\u95f4\u5c42\u7684\u71b5\u52a8\u6001\u8f68\u8ff9\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u68c0\u6d4b\u8d8a\u72f1\u653b\u51fb", "upvotes": 0, "what_it_is": "\u672c\u6587\u5229\u7528logit lens\u5206\u6790\u51bb\u7ed3LLM\u5404\u5c42\u7684token\u7ea7\u9884\u6d4b\u71b5\u8f68\u8ff9\uff0c\u53d1\u73b0\u8d8a\u72f1\u653b\u51fb\u7684\u6709\u5bb3\u610f\u56fe\u4e3b\u8981\u7f16\u7801\u5728\u6a21\u578b\u4e2d\u95f4\u5c42\u7684\u7ed3\u6784\u5316\u71b5\u52a8\u6001\u4e2d\uff0c\u800c\u975e\u6700\u7ec8\u8f93\u51fa\u5c42\uff0c\u5e76\u57fa\u4e8e\u6b64\u6784\u5efa\u4e86\u65e0\u9700\u8bad\u7ec3\u7684\u8d8a\u72f1\u68c0\u6d4b\u65b9\u6cd5\u3002", "why_notable": "\u63ed\u793a\u4e86\u8d8a\u72f1\u653b\u51fb\u5728LLM\u5185\u90e8\u8868\u5f81\u4e2d\u7684\u7f16\u7801\u89c4\u5f8b\uff0c\u63d0\u4f9b\u4e86\u4e00\u79cd\u8f7b\u91cf\u7ea7\u3001\u514d\u8bad\u7ec3\u7684\u68c0\u6d4b\u601d\u8def\uff0c\u5bf9\u7406\u89e3\u6a21\u578b\u5b89\u5168\u673a\u5236\u548c\u8bbe\u8ba1\u9632\u5fa1\u65b9\u6848\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) has been extended from single-domain training to multi-domain reasoning suites spanning mathematics, programming, and science. However, the training curriculum (how often each domain is sampled) is typically fixed or hand-tuned, even though reasoning skills transfer unevenly across domains. Existing learnability-based curricula adapt to where the policy is currently improving, but are blind to whether a gradient step on the selected domain benefits the remaining domains. In this paper, we propose Transfer-Aware Curriculum (TAC), a bandit-style online curriculum
