RLOC (Structured Hypothesis-driven Exploration and Reasoning for Localization), a training-free framework pairing a reasoning LLM with compact repository tools and self-recovery, without fine-tuning or multi-agent orchestration. SHERLOC reaches state-of-the-art localization across model scales: 84.33% accuracy@1 on SWE-Bench Lite and 81.27% recall@1 on SWE-Bench Verified; at ~30B parameters, it matches or outperforms other agentic methods. Injecting our locations and diagnostic findings into repair agents yields, on average, +5.95 pp resolve rate on SWE-Bench Verified while cutting localization and total tokens by 36.7% and 23.1%.", "arxiv_id": "2606.24820", "arxiv_url": "https://arxiv.org/abs/2606.24820", "authors": ["Hovhannes Tamoyan", "Sean Narenthiran", "Erik Arakelyan", "Mira Mezini", "Boris Ginsburg"], "brief": "\u63d0\u51faSHERLOC\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u578bLLM\u4e0e\u7d27\u51d1\u4ed3\u5e93\u5de5\u5177\u7ed3\u5408\uff0c\u901a\u8fc7\u5047\u8bbe\u9a71\u52a8\u7684\u63a2\u7d22\u4e0e\u81ea\u6211\u6062\u590d\u673a\u5236\uff0c\u4e3a\u4ee3\u7801\u4fee\u590d\u667a\u80fd\u4f53\u63d0\u4f9b\u5e26\u8bca\u65ad\u4e0a\u4e0b\u6587\u7684\u7cbe\u51c6\u6545\u969c\u5b9a\u4f4d\uff0c\u65e0\u9700\u5fae\u8c03\u6216\u591a\u667a\u80fd\u4f53\u7f16\u6392\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24820", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5728SWE-Bench Lite\u4e0a\u8fbe\u523084.33% accuracy@1\uff0c\u5728SWE-Bench Verified\u4e0a\u8fbe\u523081.27% recall@1\uff0c\u5747\u4e3a\u5f53\u524d\u6700\u4f18", "\u7ea630B\u53c2\u6570\u89c4\u6a21\u4e0b\u5373\u53ef\u5339\u654c\u6216\u8d85\u8d8a\u5176\u4ed6\u667a\u80fd\u4f53\u65b9\u6cd5\uff0c\u5177\u5907\u826f\u597d\u7684\u6a21\u578b\u89c4\u6a21\u6269\u5c55\u6027", "\u5c06\u5b9a\u4f4d\u7ed3\u679c\u6ce8\u5165\u4fee\u590d\u667a\u80fd\u4f53\u540e\uff0c\u5e73\u5747\u63d0\u53475.95\u4e2a\u767e\u5206\u70b9\u89e3\u51b3\u7387\uff0c\u540c\u65f6\u51cf\u5c1136.7%\u5b9a\u4f4dtoken\u548c23.1%\u603btoken\u6d88\u8017"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "LLM\u63a8\u7406", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24820v1", "published_at": "2026-06-23", "score": 0.5, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SHERLOC: Structured Diagnostic Localization for Code Repair Agents", "tldr": "SHERLOC\uff1a\u65e0\u9700\u5fae\u8c03\u7684\u7ed3\u6784\u5316\u6545\u969c\u5b9a\u4f4d\u6846\u67b6\uff0c\u663e\u8457\u63d0\u5347\u4ee3\u7801\u4fee\u590d\u667a\u80fd\u4f53\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faSHERLOC\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u578bLLM\u4e0e\u7d27\u51d1\u4ed3\u5e93\u5de5\u5177\u7ed3\u5408\uff0c\u901a\u8fc7\u5047\u8bbe\u9a71\u52a8\u7684\u63a2\u7d22\u4e0e\u81ea\u6211\u6062\u590d\u673a\u5236\uff0c\u4e3a\u4ee3\u7801\u4fee\u590d\u667a\u80fd\u4f53\u63d0\u4f9b\u5e26\u8bca\u65ad\u4e0a\u4e0b\u6587\u7684\u7cbe\u51c6\u6545\u969c\u5b9a\u4f4d\uff0c\u65e0\u9700\u5fae\u8c03\u6216\u591a\u667a\u80fd\u4f53\u7f16\u6392\u3002", "why_notable": "\u73b0\u6709\u4ee3\u7801\u4fee\u590d\u667a\u80fd\u4f53\u5c06\u8fd1\u4e00\u534a\u9884\u7b97\u8017\u8d39\u5728\u6545\u969c\u5b9a\u4f4d\u4e0a\uff0cSHERLOC\u5728\u65e0\u9700\u8bad\u7ec3\u7684\u524d\u63d0\u4e0b\u540c\u65f6\u63d0\u5347\u5b9a\u4f4d\u7cbe\u5ea6\u548c\u4fee\u590d\u6210\u529f\u7387\uff0c\u5e76\u5927\u5e45\u964d\u4f4etoken\u5f00\u9500\uff0c\u5bf9\u5b9e\u9645\u5de5\u7a0b\u90e8\u7f72\u5177\u6709\u76f4\u63a5\u4ef7\u503c\u3002"}, {"abstract": "Vision-language-action (VLA) models can learn manipulation skills from demonstrations, but their capabilities are bounded by the skills in the training data. We present InSight, a framework that unlocks autonomous skill acquisition by rendering VLAs steerable at the primitive-action level (e.g., \"move gripper to the bowl\", \"lift upward\", \"pour the bottle\"). InSight consists of two primary stages: (1) an automated segmentation pipeline that partitions demonstrations into labeled primitives via VLM plan decomposition and end-effector poses to enable VLA primitive steerability, and (2) a VLM-guided data flywheel that identifies missing primitives required to accomplish a novel task, autonomously attempts demonstrations of the missing primitives with VLM-proposed low-level control, and automatically labels, stores, and integrates successful demonstrations into the VLA training set. We evaluate InSight across simulation and real-world manipulation tasks, including block flipping, drawer closing, sweeping, twisting, and pouring, without any human demonstrations of these target skills. Once learned, these primitives can be composed to execute novel, long-horizon tasks without additional human demonstrations. Our findings demonstrate that primitive steerability provides a practical foundation for continual skill acquisition in VLA policies. Project website: https://insight-vla.github.io.", "arxiv_id": "2606.24884", "arxiv_url": "https://arxiv.org/abs/2606.24884", "authors": ["Maggie Wang", "Lars Osterberg", "Stephen Tian", "Ola Shorinwa", "Jiajun Wu", "Mac Schwager"], "brief": "\u63d0\u51faInSight\u6846\u67b6\uff0c\u901a\u8fc7\u5c06VLA\u6a21\u578b\u5728\u539f\u8bed\u52a8\u4f5c\u7ea7\u522b\uff08\u5982\"\u79fb\u52a8\u5939\u722a\u5230\u7897\"\uff09\u53d8\u4e3a\u53ef\u5f15\u5bfc\u7684\uff0c\u5b9e\u73b0\u673a\u5668\u4eba\u81ea\u4e3b\u6280\u80fd\u4e60\u5f97\u3002\u6846\u67b6\u5305\u542b\u81ea\u52a8\u5206\u5272\u6f14\u793a\u4e3a\u5e26\u6807\u7b7e\u539f\u8bed\u7684\u6d41\u6c34\u7ebf\uff0c\u4ee5\u53caVLM\u5f15\u5bfc\u7684\u6570\u636e\u98de\u8f6e\uff0c\u53ef\u81ea\u4e3b\u5c1d\u8bd5\u3001\u6807\u6ce8\u5e76\u96c6\u6210\u65b0\u6280\u80fd\u6f14\u793a\u3002", "categories": ["cs.RO", "cs.AI", "cs.LG"], "github_repo": "https://github.com/insight-vla/insight", "github_stars": 9, "hf_url": "https://huggingface.co/papers/2606.24884", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4e24\u9636\u6bb5\u6846\u67b6\uff1a\u2460VLM\u8ba1\u5212\u5206\u89e3+\u672b\u7aef\u6267\u884c\u5668\u59ff\u6001\u81ea\u52a8\u5c06\u6f14\u793a\u5206\u5272\u4e3a\u5e26\u6807\u7b7e\u539f\u8bed\uff1b\u2461VLM\u5f15\u5bfc\u6570\u636e\u98de\u8f6e\u81ea\u52a8\u8bc6\u522b\u7f3a\u5931\u539f\u8bed\u5e76\u751f\u6210\u6f14\u793a", "\u65e0\u9700\u4efb\u4f55\u4eba\u5de5\u6f14\u793a\u5373\u53ef\u5b66\u4e60\u79ef\u6728\u7ffb\u8f6c\u3001\u62bd\u5c49\u5173\u95ed\u3001\u626b\u5730\u3001\u626d\u8f6c\u3001\u5012\u6c34\u7b49\u6280\u80fd", "\u4e60\u5f97\u7684\u539f\u8bed\u53ef\u7ec4\u5408\u6267\u884c\u65b0\u9896\u7684\u957f\u65f6\u57df\u4efb\u52a1\uff0c\u5728\u4eff\u771f\u548c\u771f\u5b9e\u4e16\u754c\u5747\u9a8c\u8bc1\u6709\u6548"], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u6280\u80fd\u4e60\u5f97", "\u667a\u80fd\u4f53"], "num_comments": 1, "on_hf": true, "organization": "Stanford University", "pdf_url": "https://arxiv.org/pdf/2606.24884v1", "published_at": "2026-06-23", "score": 0.45, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Stanford", "HF trending (0\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.24884.png", "title": "InSight: Self-Guided Skill Acquisition via Steerable VLAs", "tldr": "InSight\u6846\u67b6\u8ba9VLA\u6a21\u578b\u81ea\u4e3b\u4e60\u5f97\u65b0\u6280\u80fd\uff0c\u65e0\u9700\u4eba\u5de5\u6f14\u793a\u5373\u53ef\u5b8c\u6210\u65b0\u4efb\u52a1", "upvotes": 0, "what_it_is": "\u63d0\u51faInSight\u6846\u67b6\uff0c\u901a\u8fc7\u5c06VLA\u6a21\u578b\u5728\u539f\u8bed\u52a8\u4f5c\u7ea7\u522b\uff08\u5982\"\u79fb\u52a8\u5939\u722a\u5230\u7897\"\uff09\u53d8\u4e3a\u53ef\u5f15\u5bfc\u7684\uff0c\u5b9e\u73b0\u673a\u5668\u4eba\u81ea\u4e3b\u6280\u80fd\u4e60\u5f97\u3002\u6846\u67b6\u5305\u542b\u81ea\u52a8\u5206\u5272\u6f14\u793a\u4e3a\u5e26\u6807\u7b7e\u539f\u8bed\u7684\u6d41\u6c34\u7ebf\uff0c\u4ee5\u53caVLM\u5f15\u5bfc\u7684\u6570\u636e\u98de\u8f6e\uff0c\u53ef\u81ea\u4e3b\u5c1d\u8bd5\u3001\u6807\u6ce8\u5e76\u96c6\u6210\u65b0\u6280\u80fd\u6f14\u793a\u3002", "why_notable": "\u89e3\u51b3\u4e86VLA\u6a21\u578b\u80fd\u529b\u53d7\u9650\u4e8e\u8bad\u7ec3\u6570\u636e\u7684\u6838\u5fc3\u74f6\u9888\uff0c\u5b9e\u73b0\u4e86\u673a\u5668\u4eba\u6301\u7eed\u81ea\u4e3b\u6280\u80fd\u4e60\u5f97\uff0c\u5177\u6709\u91cd\u8981\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u6269\u5c55\u6027\uff0c\u4e3a\u901a\u7528\u673a\u5668\u4eba\u64cd\u4f5c\u63d0\u4f9b\u4e86\u53ef\u884c\u8def\u5f84"}, {"abstract": "Agentic language models dramatically expand the applications of AI yet little is publicly known about how to curate training data for broadly capable agents. Existing open efforts such as SWE-Smith, SERA, and Nemotron-Terminal typically target a single benchmark, leaving open the question of how to train models that generalize across diverse agentic tasks. The OpenThoughts-Agent (OT-Agent) project addresses this gap with a fully open data curation pipeline for training agentic models. We conduct more than 100 controlled ablation experiments to systematically investigate each stage of the pipeline, yielding insights on the importance of task sources and diversity. We then assemble a training set of 100K examples from our pipeline and fine-tune Qwen3-32B on this dataset, which yields an average accuracy of 44.8% across seven agentic benchmarks and a 3.9 percentage point improvement over the strongest existing open data agentic model (Nemotron-Terminal-32B, 40.9%). Moreover, our training data exhibits strong scaling properties, outperforming alternative open datasets at every training set size in compute-controlled comparisons. We publicly release our training sets, data pipeline, experimental data, and models at openthoughts.ai to support future open research on agentic model training.", "arxiv_id": "2606.24855", "arxiv_url": "https://arxiv.org/abs/2606.24855", "authors": ["Negin Raoof", "Richard Zhuang", "Marianna Nezhurina", "Etash Guha", "Atula Tejaswi", "Ryan Marten", "Charlie F. Ruan", "Tyler Griggs", "Alexander Glenn Shaw", "Hritik Bansal", "E. Kelly Buchanan", "Artem Gazizov", "Reinhard Heckel", "Chinmay Hegde", "Sankalp Jajee", "Daanish Khazi", "Emmanouil Koukoumidis", "Xiangyi Li", "Hange Liu", "Shlok Natarajan", "Harsh Raj", "Nicholas Roberts", "Ethan Shen", "Nishad Singhi", "Michael Siu", "Ashima Suvarna", "Hanwen Xing", "Patrick Yubeaton", "Robert Zhang", "Leon Liangyu Chen", "Xiaokun Chen", "Steven Dillmann", "Saadia Gabriel", "Xunyi Jiang", "Anurag Kashyap", "Boxuan Li", "Yein Park", "Minh Pham", "Sujay Sanghavi", "Lin Shi", "Ke Sun", "Yixin Wang", "Zhiwei Xu", "Erica Zhang", "Siyan Zhao", "Wanjia Zhao", "Jenia Jitsev", "Alex Dimakis", "Benjamin Feuer", "Ludwig Schmidt"], "brief": "OpenThoughts-Agent\u63d0\u51fa\u4e86\u4e00\u5957\u5b8c\u5168\u5f00\u6e90\u7684\u667a\u80fd\u4f53\u6a21\u578b\u8bad\u7ec3\u6570\u636e\u7b5b\u9009\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7100+\u6d88\u878d\u5b9e\u9a8c\u7cfb\u7edf\u7814\u7a76\u6570\u636e\u914d\u65b9\uff0c\u5e76\u6784\u5efa10\u4e07\u6761\u8bad\u7ec3\u6837\u672c\u5fae\u8c03Qwen3-32B\uff0c\u5728\u591a\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u6700\u5f3a\u5f00\u6e90\u6a21\u578b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24855", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u8fdb\u884c100+\u53d7\u63a7\u6d88\u878d\u5b9e\u9a8c\uff0c\u7cfb\u7edf\u7814\u7a76\u4efb\u52a1\u6765\u6e90\u591a\u6837\u6027\u5bf9\u667a\u80fd\u4f53\u6cdb\u5316\u80fd\u529b\u7684\u5f71\u54cd", "\u57287\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u5e73\u5747\u51c6\u786e\u738744.8%\uff0c\u6bd4\u6700\u5f3a\u5f00\u6e90\u5bf9\u624bNemotron-Terminal-32B\u9ad83.9\u4e2a\u767e\u5206\u70b9", "\u8bad\u7ec3\u6570\u636e\u5177\u6709\u5f3a\u6269\u5c55\u6027\uff08scaling properties\uff09\uff0c\u5728\u7b49\u7b97\u529b\u5bf9\u6bd4\u4e2d\u5404\u89c4\u6a21\u5747\u4f18\u4e8e\u5176\u4ed6\u5f00\u6e90\u6570\u636e\u96c6"], "keywords": ["\u667a\u80fd\u4f53", "\u6570\u636e\u5de5\u7a0b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f00\u6e90"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24855v1", "published_at": "2026-06-23", "score": 0.441, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (32\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.24855.png", "title": "OpenThoughts-Agent: Data Recipes for Agentic Models", "tldr": "\u5f00\u6e90\u667a\u80fd\u4f53\u6a21\u578b\u8bad\u7ec3\u6570\u636e\u914d\u65b9\uff0c100K\u6837\u672c\u5fae\u8c03\u540e\u8de87\u4e2a\u57fa\u51c6\u5e73\u574744.8%\u51c6\u786e\u7387", "upvotes": 32, "what_it_is": "OpenThoughts-Agent\u63d0\u51fa\u4e86\u4e00\u5957\u5b8c\u5168\u5f00\u6e90\u7684\u667a\u80fd\u4f53\u6a21\u578b\u8bad\u7ec3\u6570\u636e\u7b5b\u9009\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7100+\u6d88\u878d\u5b9e\u9a8c\u7cfb\u7edf\u7814\u7a76\u6570\u636e\u914d\u65b9\uff0c\u5e76\u6784\u5efa10\u4e07\u6761\u8bad\u7ec3\u6837\u672c\u5fae\u8c03Qwen3-32B\uff0c\u5728\u591a\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u6700\u5f3a\u5f00\u6e90\u6a21\u578b\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u7814\u7a76\u8de8\u4efb\u52a1\u6cdb\u5316\u667a\u80fd\u4f53\u8bad\u7ec3\u6570\u636e\u914d\u65b9\u7684\u5f00\u6e90\u9879\u76ee\uff0c\u586b\u8865\u4e86\u73b0\u6709\u5de5\u4f5c\u4ec5\u9488\u5bf9\u5355\u4e00\u57fa\u51c6\u7684\u7a7a\u767d\uff0c\u5b8c\u5168\u5f00\u653e\u6570\u636e\u96c6\u3001\u6d41\u6c34\u7ebf\u548c\u6a21\u578b\uff0c\u5bf9\u793e\u533a\u63a8\u8fdb\u667a\u80fd\u4f53\u8bad\u7ec3\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Process reward models enable fine-grained, step-level evaluation of LLMs, yet building them for agentic settings remains prohibitively difficult: long-horizon interactions, irreversible actions, and stochastic environment feedback make both human annotation and Monte Carlo estimation infeasible at scale. In this work, we show that reinforcement learning (RL) post-training already provides the ingredients for effective step-level scoring, eliminating the need for dedicated reward model training altogether. Concretely, we derive an implicit advantage under a general stochastic Markov decision process, which we term progress advantage -- log-probability ratio between the RL-trained policy and its reference policy exactly recovers the optimal advantage function. This formulation makes the resulting signal annotation-free, domain-agnostic, and available as a byproduct of the standard RL post-training pipeline. We validate the effectiveness of the progress advantage across three different applications: test-time scaling, uncertainty quantification, and failure attribution on five benchmarks and four model families. Across all settings, it consistently outperforms confidence-based baselines and, despite requiring no task-specific training, surpasses dedicated trained reward models. We complement these results with deeper analyses on characteristics of progress advantage, offering practical guidance for adoption in real-world agentic systems.", "arxiv_id": "2606.26080", "arxiv_url": "https://arxiv.org/abs/2606.26080", "authors": ["Changdae Oh", "Wendi Li", "Seongheon Park", "Samuel Yeh", "Tanwi Mallick", "Sharon Li"], "brief": "\u63d0\u51fa\"\u8fdb\u5ea6\u4f18\u52bf\"\uff08Progress Advantage\uff09\u6982\u5ff5\uff1aRL\u8bad\u7ec3\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684\u5bf9\u6570\u6982\u7387\u6bd4\uff0c\u53ef\u7cbe\u786e\u6062\u590d\u6700\u4f18\u4f18\u52bf\u51fd\u6570\uff0c\u4f5c\u4e3aLLM\u667a\u80fd\u4f53\u7684\u6b65\u9aa4\u7ea7\u8bc4\u5206\u4fe1\u53f7\uff0c\u65e0\u9700\u4efb\u4f55\u989d\u5916\u6807\u6ce8\u6216\u4e13\u7528\u5956\u52b1\u6a21\u578b\u8bad\u7ec3\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26080", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7406\u8bba\u63a8\u5bfc\uff1a\u5728\u968f\u673aMDP\u4e0b\uff0cRL\u8bad\u7ec3\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684log\u6982\u7387\u6bd4\u7b49\u4ef7\u4e8e\u6700\u4f18\u4f18\u52bf\u51fd\u6570", "\u96f6\u6210\u672c\u83b7\u53d6\uff1a\u8fdb\u5ea6\u4f18\u52bf\u662f\u6807\u51c6RL\u540e\u8bad\u7ec3\u7684\u526f\u4ea7\u54c1\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u6216\u8499\u7279\u5361\u6d1b\u4f30\u8ba1", "\u5728\u6d4b\u8bd5\u65f6\u6269\u5c55\u3001\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u3001\u5931\u8d25\u5f52\u56e0\u4e09\u7c7b\u4efb\u52a1\u4e0a\uff0c\u8de85\u4e2a\u57fa\u51c6\u548c4\u4e2a\u6a21\u578b\u65cf\u5747\u8d85\u8d8a\u7f6e\u4fe1\u5ea6\u57fa\u7ebf\u53ca\u4e13\u7528\u5956\u52b1\u6a21\u578b"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26080v1", "published_at": "2026-06-24", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Neglected Free Lunch from Post-training: Progress Advantage for LLM Agents", "tldr": "RL\u540e\u8bad\u7ec3\u9690\u542b\u514d\u8d39\u6b65\u9aa4\u7ea7\u5956\u52b1\u4fe1\u53f7\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u8d85\u8d8a\u4e13\u7528\u5956\u52b1\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u8fdb\u5ea6\u4f18\u52bf\"\uff08Progress Advantage\uff09\u6982\u5ff5\uff1aRL\u8bad\u7ec3\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684\u5bf9\u6570\u6982\u7387\u6bd4\uff0c\u53ef\u7cbe\u786e\u6062\u590d\u6700\u4f18\u4f18\u52bf\u51fd\u6570\uff0c\u4f5c\u4e3aLLM\u667a\u80fd\u4f53\u7684\u6b65\u9aa4\u7ea7\u8bc4\u5206\u4fe1\u53f7\uff0c\u65e0\u9700\u4efb\u4f55\u989d\u5916\u6807\u6ce8\u6216\u4e13\u7528\u5956\u52b1\u6a21\u578b\u8bad\u7ec3\u3002", "why_notable": "\u4e3a\u957f\u671f\u56f0\u6270\u667a\u80fd\u4f53\u573a\u666f\u7684\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\u6784\u5efa\u96be\u9898\u63d0\u4f9b\u4e86\u4f18\u96c5\u7684\u7406\u8bba\u89e3\u6cd5\uff0c\u5c06RL\u540e\u8bad\u7ec3\u7684\"\u514d\u8d39\u5348\u9910\"\u53d8\u4e3a\u5b9e\u7528\u5de5\u5177\uff0c\u5bf9\u5de5\u4e1a\u754c\u90e8\u7f72LLM\u667a\u80fd\u4f53\u5177\u6709\u76f4\u63a5\u4ef7\u503c\u3002"}, {"abstract": "As autonomous agents tackle increasingly complex multi-step, multi-agent tasks, their execution trajectories have scaled beyond the constraints of even the largest context windows. Current methods for effectively diagnosing agent failures load the full trajectory into an LLM\u0027s context window, which suffers from attention dilution and fails when agentic traces inevitably exceed context limits. To address this, we introduce SAFARI (Scaling long-horizon Agentic Fault AttRibution via active Investigation), a framework that replaces linear context loading with a tool-augmented diagnostic loop. By equipping LLMs with a specialized toolbox to read and search trajectory segments alongside a persistent Short-Term Memory (STM) for cross-turn reasoning, SAFARI effectively decouples diagnostic accuracy from architectural context limits. Our experiments demonstrate that SAFARI outperforms state-of-the-art results by 20% on the Who\u0026When dataset within a 1M token budget, and by 19% on TRAIL GAIA subset on a 25K token budget. Most significantly, SAFARI maintains a 0.58 precision even when the target fault resides 5x beyond the model\u0027s native context window, a scenario where traditional evaluators fail entirely.", "arxiv_id": "2606.24626", "arxiv_url": "https://arxiv.org/abs/2606.24626", "authors": ["Chenyang Zhu", "Jiayu Yao", "Kushal Chawla", "Youbing Yin", "Nathan Wolfe", "Pengshan Cai", "Jingyu Wu", "Spencer Hong", "Sangwoo Cho", "Shi-Xiong Zhang", "Daben Liu", "Sambit Sahu", "Erin Babinsky"], "brief": "\u63d0\u51faSAFARI\u6846\u67b6\uff0c\u901a\u8fc7\u5de5\u5177\u589e\u5f3a\u7684\u4e3b\u52a8\u8c03\u67e5\u5faa\u73af\uff08\u800c\u975e\u7ebf\u6027\u52a0\u8f7d\u5168\u8f68\u8ff9\uff09\u6765\u8bca\u65ad\u591a\u6b65\u591a\u667a\u80fd\u4f53\u4efb\u52a1\u7684\u6267\u884c\u6545\u969c\uff0c\u914d\u5907\u4e13\u7528\u5de5\u5177\u7bb1\u548c\u77ed\u671f\u8bb0\u5fc6\u6a21\u5757\uff0c\u4f7f\u8bca\u65ad\u7cbe\u5ea6\u4e0e\u4e0a\u4e0b\u6587\u7a97\u53e3\u9650\u5236\u89e3\u8026\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24626", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5728Who\u0026When\u6570\u636e\u96c6\u4e0a\u4ee5100\u4e07token\u9884\u7b97\u8d85\u8d8aSOTA 20%\uff0c\u5728TRAIL GAIA\u5b50\u96c6\u4e0a\u4ee52.5\u4e07token\u9884\u7b97\u8d85\u8d8a19%", "\u5f53\u76ee\u6807\u6545\u969c\u4f4d\u4e8e\u6a21\u578b\u539f\u751f\u4e0a\u4e0b\u6587\u7a97\u53e35\u500d\u4e4b\u5916\u65f6\uff0c\u4ecd\u4fdd\u63010.58\u7684\u7cbe\u786e\u7387\uff0c\u800c\u4f20\u7edf\u65b9\u6cd5\u5b8c\u5168\u5931\u6548", "\u6838\u5fc3\u8bbe\u8ba1\uff1a\u5de5\u5177\u589e\u5f3a\u8bca\u65ad\u5faa\u73af + \u6301\u4e45\u77ed\u671f\u8bb0\u5fc6\uff08STM\uff09\u652f\u6301\u8de8\u8f6e\u63a8\u7406\uff0c\u907f\u514d\u6ce8\u610f\u529b\u7a00\u91ca\u95ee\u9898"], "keywords": ["\u667a\u80fd\u4f53", "\u6545\u969c\u5f52\u56e0", "\u957f\u4e0a\u4e0b\u6587", "\u5de5\u5177\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24626v1", "published_at": "2026-06-23", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SAFARI: Scaling Long Horizon Agentic Fault Attribution via Active Investigation", "tldr": "SAFARI\u6846\u67b6\u7528\u5de5\u5177\u589e\u5f3a\u8bca\u65ad\u5faa\u73af\u66ff\u4ee3\u5168\u8f68\u8ff9\u52a0\u8f7d\uff0c\u89e3\u51b3\u8d85\u957f\u667a\u80fd\u4f53\u6267\u884c\u8f68\u8ff9\u7684\u6545\u969c\u5f52\u56e0\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faSAFARI\u6846\u67b6\uff0c\u901a\u8fc7\u5de5\u5177\u589e\u5f3a\u7684\u4e3b\u52a8\u8c03\u67e5\u5faa\u73af\uff08\u800c\u975e\u7ebf\u6027\u52a0\u8f7d\u5168\u8f68\u8ff9\uff09\u6765\u8bca\u65ad\u591a\u6b65\u591a\u667a\u80fd\u4f53\u4efb\u52a1\u7684\u6267\u884c\u6545\u969c\uff0c\u914d\u5907\u4e13\u7528\u5de5\u5177\u7bb1\u548c\u77ed\u671f\u8bb0\u5fc6\u6a21\u5757\uff0c\u4f7f\u8bca\u65ad\u7cbe\u5ea6\u4e0e\u4e0a\u4e0b\u6587\u7a97\u53e3\u9650\u5236\u89e3\u8026\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u89e3\u51b3\u8d85\u957f\u667a\u80fd\u4f53\u8f68\u8ff9\u7684\u6545\u969c\u5f52\u56e0\u95ee\u9898\uff0c\u7a81\u7834\u4e0a\u4e0b\u6587\u7a97\u53e3\u786c\u9650\u5236\uff0c\u5bf9\u6784\u5efa\u53ef\u9760\u81ea\u4e3b\u667a\u80fd\u4f53\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Tool use enables large language models (LLMs) to perform complex tasks, and recent agentic reinforcement learning (RL) methods show promise for enhancing model capabilities. However, RL alone often leads to instability or limited gains in tool-use tasks. In our experiments, some models exhibit catastrophic collapse, where performance abruptly drops and tool-invocation structures fail. The analysis reveals that these failures stem from unexpected probability spikes in specific control tokens, disrupting structured execution, yet the underlying tool-use capability remains intact, merely obscured by specific formats. To address this, we systematically investigate a diverse set of supervisory signals, including off-policy supervision, hint-based guidance, erroneous example supervision, and others, applied under both synchronous and interleaved training schemes. We find that interleaving supervised fine-tuning (SFT) with RL substantially improves stability, but exhibits degraded performance under format and content out-of-distribution (OOD) evaluation. We also analyze the impact of learning rates and generalization across settings. These results highlight the importance of understanding RL failures and demonstrate how diverse supervisory signals can guide exploratory learning, enabling robust training of LLMs for complex, multi-step tool-use tasks. Our Code is available at https://github.com/hypasd-art/Tool-RL-Box.", "arxiv_id": "2606.26027", "arxiv_url": "https://arxiv.org/abs/2606.26027", "authors": ["Yupu Hao", "Zhuoran Jin", "Huanxuan Liao", "Kang Liu", "Jun Zhao"], "brief": "\u672c\u6587\u5206\u6790\u4e86LLM\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u51fa\u73b0\u707e\u96be\u6027\u5d29\u6e83\u7684\u6839\u672c\u539f\u56e0\uff08\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u98d9\u5347\uff09\uff0c\u5e76\u7cfb\u7edf\u7814\u7a76\u4e86\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff08\u79bb\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\uff09\u5728\u540c\u6b65\u4e0e\u4ea4\u9519\u8bad\u7ec3\u65b9\u6848\u4e0b\u7684\u4fee\u590d\u6548\u679c\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26027", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5d29\u6e83\u6839\u6e90\uff1a\u7279\u5b9a\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u5c16\u5cf0\u7834\u574f\u7ed3\u6784\u5316\u6267\u884c\uff0c\u4f46\u5e95\u5c42\u5de5\u5177\u8c03\u7528\u80fd\u529b\u4ecd\u5b8c\u597d\uff0c\u4ec5\u88ab\u683c\u5f0f\u95ee\u9898\u63a9\u76d6", "\u4ea4\u9519SFT\u4e0eRL\u8bad\u7ec3\u53ef\u663e\u8457\u63d0\u5347\u7a33\u5b9a\u6027\uff0c\u4f46\u5728\u683c\u5f0f\u4e0e\u5185\u5bb9\u5206\u5e03\u5916\uff08OOD\uff09\u8bc4\u4f30\u4e2d\u6027\u80fd\u4e0b\u964d", "\u7cfb\u7edf\u5bf9\u6bd4\u4e86\u79bb\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff0c\u5e76\u5206\u6790\u4e86\u5b66\u4e60\u7387\u5f71\u54cd\u4e0e\u8de8\u573a\u666f\u6cdb\u5316\u80fd\u529b"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26027v1", "published_at": "2026-06-24", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Why Multi-Step Tool-Use Reinforcement Learning Collapses and How Supervisory Signals Fix It", "tldr": "\u63ed\u793a\u591a\u6b65\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u5d29\u6e83\u539f\u56e0\uff0c\u5e76\u63d0\u51fa\u76d1\u7763\u4fe1\u53f7\u4fee\u590d\u65b9\u6848", "upvotes": 0, "what_it_is": "\u672c\u6587\u5206\u6790\u4e86LLM\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u51fa\u73b0\u707e\u96be\u6027\u5d29\u6e83\u7684\u6839\u672c\u539f\u56e0\uff08\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u98d9\u5347\uff09\uff0c\u5e76\u7cfb\u7edf\u7814\u7a76\u4e86\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff08\u79bb\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\uff09\u5728\u540c\u6b65\u4e0e\u4ea4\u9519\u8bad\u7ec3\u65b9\u6848\u4e0b\u7684\u4fee\u590d\u6548\u679c\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u63ed\u793a\u5de5\u5177\u8c03\u7528RL\u8bad\u7ec3\u5d29\u6e83\u7684\u673a\u5236\uff0c\u5e76\u63d0\u4f9b\u53ef\u590d\u73b0\u7684\u4fee\u590d\u65b9\u6848\u4e0e\u5f00\u6e90\u4ee3\u7801\u5e93\uff0c\u5bf9\u6784\u5efa\u7a33\u5065\u7684LLM\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u6307\u5bfc\u4ef7\u503c"}, {"abstract": "Generating explorable 3D scenes from a single image requires strong generative priors and accurate geometric representations suitable for downstream use. Current video diffusion models offer high-quality generation and implicitly encode multi-view geometric structure in latent space. However, existing feedforward latent scene decoders typically output volumetric 3D Gaussians that lack a well-defined surface, limiting their use in simulation or standard graphics pipelines. This motivates decoding surface-aligned primitives that are not only renderable but also closer to explicit geometric assets. We ask whether compressed video diffusion latents can be mapped directly to explicit surface primitives in a single pass. To this end, we introduce FLAT and, for the first time, show that triangle splats can be decoded directly from video diffusion latents. Compared with decoding 3D Gaussians, predicting flat primitives is notoriously more challenging due to high sensitivity to primitive orientations, oftentimes leading to poor gradient flow. FLAT solves with two key ingredients: a ray-centered rotation parameterization for triangle regression and a novel product window function that improves gradient flow during differentiable triangle rendering. On standard benchmarks, FLAT achieves significantly better geometric accuracy while maintaining competitive visual quality compared to state-of-the-art feedforward baselines. We further show that a lightweight test-time refinement step converts the predicted triangle soup into a fully opaque, game-engine-ready representation that supports real-time rendering. By evaluating 3DGS, 2DGS, and triangle splatting variants under an identical training setup, we provide the first systematic analysis of representation tradeoffs in feedforward scene generation. The project page is available at https://flat-splat.github.io", "arxiv_id": "2606.24876", "arxiv_url": "https://arxiv.org/abs/2606.24876", "authors": ["Orest Kupyn", "Goutam Bhat", "Philipp Henzler", "Fabian Manhardt", "Christian Rupprecht", "Federico Tombari"], "brief": "", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24876", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 1, "on_hf": true, "organization": "Google", "pdf_url": "https://arxiv.org/pdf/2606.24876v1", "published_at": "2026-06-23", "score": 0.327, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Google", "HF trending (15\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.24876.png", "title": "FLAT: Feedforward Latent Triangle Splatting for Geometrically Accurate Scene Generation", "tldr": null, "upvotes": 15, "what_it_is": null, "why_notable": null}, {"abstract": "Computer-use agents turn vision-language model (VLM) predictions into executable GUI clicks, so reliable uncertainty estimates are essential for rejection, calibration, miss-severity ranking, and spatial safety regions. Yet evidence on post-hoc uncertainty quantification (UQ) for these agents is fragmented across isolated model and dataset pairs, leaving it unclear whether UQ rankings stay stable when the agent, benchmark, or observable interface changes. We present Argus, a cross-regime benchmark for post-hoc UQ in single-step executable GUI grounding: a 27-method open-weight matrix over 4 VLM agents and 4 datasets, plus an 8-method closed-source matrix across 3 frontier vendors where logits, hidden states, and attention maps are unavailable. Evaluated methods span logit-based scores, sampling and consistency measures, hidden-state and density estimators (Mahalanobis, SAPLMA), attention-based scores, P(True) and verbalised-confidence prompting, and split-conformal prediction. The main finding is selective transfer: UQ rankings are stable across datasets for a fixed model, but degrade across model classes and observable interfaces. Hidden-state and density methods are the most stable open-weight family, while CoCoA-1MCA, Focus, sampling-based scores, and verbalised self-assessment win in specific regimes. Within-model ranking transfer is strong (Spearman rho up to 0.969), but cross-tier transfer to closed-source vendors averages only +0.08, so closed-source UQ should be reranked on the target rather than extrapolated. Conformal click regions show score-level discrimination is not enough for deployment: locally weighted disks shrink radii by 40-60% when the plug-in UQ is calibrated, but coverage degrades under calibration-test or interface mismatch. We release per-item records, calibration/test splits, UQ scores, and analysis scripts for regime-aware UQ selection in GUI agents.", "arxiv_id": "2606.25760", "arxiv_url": "https://arxiv.org/abs/2606.25760", "authors": ["Divake Kumar", "Sina Tayebati", "Devashri Naik", "Amanda Sofie Rios", "Nilesh Ahuja", "Omesh Tickoo", "Ranganath Krishnan", "Amit Ranjan Trivedi"], "brief": "\u63d0\u51faArgus\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u4e2d\u540e\u9a8c\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\uff08UQ\uff09\u65b9\u6cd5\u7684\u8de8\u573a\u666f\u7a33\u5b9a\u6027\uff0c\u8986\u76d627\u79cd\u5f00\u6e90\u65b9\u6cd5\u00d74\u4e2aVLM\u00d74\u4e2a\u6570\u636e\u96c6\uff0c\u4ee5\u53ca8\u79cd\u95ed\u6e90\u65b9\u6cd5\u00d73\u4e2a\u524d\u6cbf\u5382\u5546\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25760", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u53d1\u73b0\u4e3a\"\u9009\u62e9\u6027\u8fc1\u79fb\"\uff1aUQ\u6392\u540d\u5728\u540c\u4e00\u6a21\u578b\u8de8\u6570\u636e\u96c6\u65f6\u7a33\u5b9a\uff08Spearman \u03c1\u6700\u9ad80.969\uff09\uff0c\u4f46\u8de8\u6a21\u578b\u7c7b\u522b\u6216\u53ef\u89c2\u6d4b\u63a5\u53e3\u65f6\u663e\u8457\u9000\u5316", "\u9690\u85cf\u72b6\u6001\u4e0e\u5bc6\u5ea6\u4f30\u8ba1\u65b9\u6cd5\uff08Mahalanobis\u3001SAPLMA\uff09\u662f\u5f00\u6e90\u6a21\u578b\u4e2d\u6700\u7a33\u5b9a\u7684UQ\u5bb6\u65cf\uff1b\u95ed\u6e90\u6a21\u578b\u8de8\u5c42\u8fc1\u79fb\u5e73\u5747\u4ec5+0.08\uff0c\u9700\u5728\u76ee\u6807\u6a21\u578b\u4e0a\u91cd\u65b0\u6392\u5e8f", "\u4fdd\u5f62\u9884\u6d4b\u70b9\u51fb\u533a\u57df\u5b9e\u9a8c\u663e\u793a\uff1a\u7ecf\u8fc7\u826f\u597d\u6821\u51c6\u7684UQ\u53ef\u5c06\u7f6e\u4fe1\u533a\u57df\u534a\u5f84\u7f29\u5c0f40-60%\uff0c\u4f46\u5728\u6821\u51c6-\u6d4b\u8bd5\u5206\u5e03\u4e0d\u5339\u914d\u65f6\u8986\u76d6\u7387\u4e0b\u964d"], "keywords": ["\u667a\u80fd\u4f53", "\u4e0d\u786e\u5b9a\u6027\u91cf\u5316", "\u591a\u6a21\u6001", "GUI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25760v1", "published_at": "2026-06-24", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Uncertainty Quantification for Computer-Use Agents: A Benchmark across Vision-Language Models and GUI Grounding Datasets", "tldr": "\u9996\u4e2a\u8de8\u6a21\u578b\u4e0e\u6570\u636e\u96c6\u7684GUI\u667a\u80fd\u4f53\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u57fa\u51c6\uff0c\u63ed\u793aUQ\u6392\u540d\u5728\u6a21\u578b\u5185\u7a33\u5b9a\u4f46\u8de8\u6a21\u578b\u7c7b\u522b\u8fc1\u79fb\u6027\u5dee", "upvotes": 0, "what_it_is": "\u63d0\u51faArgus\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u4e2d\u540e\u9a8c\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\uff08UQ\uff09\u65b9\u6cd5\u7684\u8de8\u573a\u666f\u7a33\u5b9a\u6027\uff0c\u8986\u76d627\u79cd\u5f00\u6e90\u65b9\u6cd5\u00d74\u4e2aVLM\u00d74\u4e2a\u6570\u636e\u96c6\uff0c\u4ee5\u53ca8\u79cd\u95ed\u6e90\u65b9\u6cd5\u00d73\u4e2a\u524d\u6cbf\u5382\u5546\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027GUI\u667a\u80fd\u4f53UQ\u57fa\u51c6\uff0c\u586b\u8865\u4e86\u8be5\u9886\u57df\u788e\u7247\u5316\u7814\u7a76\u7684\u7a7a\u767d\uff0c\u4e3a\u5b9e\u9645\u90e8\u7f72\u4e2d\u7684\u62d2\u7edd\u51b3\u7b56\u3001\u7a7a\u95f4\u5b89\u5168\u533a\u57df\u7b49\u63d0\u4f9b\u4e86\u5b9e\u8bc1\u6307\u5bfc\uff0c\u5e76\u5f00\u653e\u4e86\u5168\u5957\u6570\u636e\u4e0e\u4ee3\u7801"}, {"abstract": "Long-term robot deployment requires a compact and scalable memory that preserves fine-grained visual semantics, grounds observations in space and time, and enables efficient storage and retrieval. In this paper, we propose RAVEN, an agentic memory system for long-horizon robotic question answering and navigation. RAVEN stores visual embeddings with pose and time in a vector database, and grounds retrieval in a spatial map to answer queries and navigate to goals. By operating directly on visual embeddings, RAVEN avoids lossy image-to-text captioning and enables accurate semantic, spatial, and temporal retrieval at scale. Across several simulated and real-world video question-answering benchmarks, RAVEN consistently surpasses caption-based memory systems and matches frontier VLMs on long-horizon tasks at 10$\\times$ lower retrieval cost. Finally, we instantiate RAVEN on a Unitree Go1 robot for the task of long-horizon navigation for natural language goal-reaching, and show successful deployment over several large indoor environments.", "arxiv_id": "2606.25206", "arxiv_url": "https://arxiv.org/abs/2606.25206", "authors": ["Yixun Hu", "Zhicheng Zheng", "Lihan Zha", "Chunwei Xing", "Rajdeep Singh", "Omar Hossain", "Antonio Loquercio", "Dhruv Shah"], "brief": "\u63d0\u51faRAVEN\uff0c\u4e00\u79cd\u9762\u5411\u957f\u65f6\u7a0b\u673a\u5668\u4eba\u4efb\u52a1\u7684\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u5c06\u89c6\u89c9\u5d4c\u5165\u4e0e\u4f4d\u59ff\u3001\u65f6\u95f4\u4fe1\u606f\u5b58\u5165\u5411\u91cf\u6570\u636e\u5e93\uff0c\u5e76\u7ed3\u5408\u7a7a\u95f4\u5730\u56fe\u5b9e\u73b0\u9ad8\u6548\u68c0\u7d22\uff0c\u652f\u6301\u95ee\u7b54\u4e0e\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u5bfc\u822a\u3002", "categories": ["cs.RO", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25206", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u76f4\u63a5\u64cd\u4f5c\u89c6\u89c9\u5d4c\u5165\u800c\u975e\u56fe\u50cf\u8f6c\u6587\u5b57\u63cf\u8ff0\uff0c\u907f\u514d\u8bed\u4e49\u635f\u5931\uff0c\u652f\u6301\u8bed\u4e49\u3001\u7a7a\u95f4\u3001\u65f6\u95f4\u591a\u7ef4\u68c0\u7d22", "\u68c0\u7d22\u6210\u672c\u6bd4\u524d\u6cbfVLM\u4f4e10\u500d\uff0c\u540c\u65f6\u5728\u957f\u65f6\u7a0b\u4efb\u52a1\u4e0a\u6027\u80fd\u6301\u5e73\u6216\u8d85\u8d8a\u57fa\u4e8e\u63cf\u8ff0\u7684\u8bb0\u5fc6\u7cfb\u7edf", "\u5728Unitree Go1\u673a\u5668\u4eba\u4e0a\u5b8c\u6210\u771f\u5b9e\u5ba4\u5185\u5927\u73af\u5883\u7684\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u5bfc\u822a\u90e8\u7f72\u9a8c\u8bc1"], "keywords": ["\u667a\u80fd\u4f53", "\u673a\u5668\u4eba\u5bfc\u822a", "\u591a\u6a21\u6001", "\u8bb0\u5fc6\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25206v1", "published_at": "2026-06-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RAVEN: Long-Horizon Reasoning \u0026 Navigation with a Visuo-Spatio-Temporal Memory", "tldr": "RAVEN\uff1a\u57fa\u4e8e\u89c6\u89c9\u65f6\u7a7a\u8bb0\u5fc6\u7684\u957f\u65f6\u7a0b\u673a\u5668\u4eba\u95ee\u7b54\u4e0e\u5bfc\u822a\u7cfb\u7edf", "upvotes": 0, "what_it_is": "\u63d0\u51faRAVEN\uff0c\u4e00\u79cd\u9762\u5411\u957f\u65f6\u7a0b\u673a\u5668\u4eba\u4efb\u52a1\u7684\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u5c06\u89c6\u89c9\u5d4c\u5165\u4e0e\u4f4d\u59ff\u3001\u65f6\u95f4\u4fe1\u606f\u5b58\u5165\u5411\u91cf\u6570\u636e\u5e93\uff0c\u5e76\u7ed3\u5408\u7a7a\u95f4\u5730\u56fe\u5b9e\u73b0\u9ad8\u6548\u68c0\u7d22\uff0c\u652f\u6301\u95ee\u7b54\u4e0e\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u5bfc\u822a\u3002", "why_notable": "\u89e3\u51b3\u4e86\u957f\u671f\u673a\u5668\u4eba\u90e8\u7f72\u4e2d\u8bb0\u5fc6\u53ef\u6269\u5c55\u6027\u4e0e\u8bed\u4e49\u4fdd\u771f\u5ea6\u7684\u6838\u5fc3\u77db\u76fe\uff0c\u4ee5\u6781\u4f4e\u8ba1\u7b97\u6210\u672c\u5b9e\u73b0\u5ab2\u7f8e\u5927\u6a21\u578b\u7684\u957f\u65f6\u7a0b\u63a8\u7406\u80fd\u529b\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u4e0e\u843d\u5730\u6f5c\u529b\u3002"}, {"abstract": "Large language model (LLM) agents rely on long-term memory to support extended interactions and personalized assistance beyond finite context windows. Existing memory agents actively update external memory through generated write, revise, and delete operations, but these updates may omit important information, corrupt existing memory, or introduce unsupported hallucinated content. Once stored, such errors become persistent system-state failures that can affect future reasoning and generation. In this paper, we propose TrustMem, a framework designed to improve the trustworthiness of memory consolidation. TrustMem relies on a Memory Transition Verifier to evaluate the transition process of memory updates in terms of coverage, preservation, and faithfulness. It further constructs preference pairs among candidate updates under the same memory state, enabling preference-guided reinforcement learning to directly optimize memory updating behaviors. Extensive experiments demonstrate that TrustMem improves both memory utility and reliability: it achieves state-of-the-art results across MemoryAgentBench, HaluMem, and the Mem-alpha validation set, improves HaluMem memory extraction by 12.14 F1 points, and reduces transition-level omission, corruption, and hallucination by 40.1\\%, 79.1\\%, and 50.0\\%, respectively, compared with the strongest baseline for each error type.", "arxiv_id": "2606.25161", "arxiv_url": "https://arxiv.org/abs/2606.25161", "authors": ["Tianyu Yang", "Sudipta Paul", "Vijay Srinivasan", "Vivek Kulkarni", "Srinivas Chappidi"], "brief": "\u63d0\u51faTrustMem\u6846\u67b6\uff0c\u901a\u8fc7\u8bb0\u5fc6\u8f6c\u6362\u9a8c\u8bc1\u5668\u8bc4\u4f30\u8bb0\u5fc6\u66f4\u65b0\u7684\u8986\u76d6\u6027\u3001\u4fdd\u7559\u6027\u548c\u5fe0\u5b9e\u6027\uff0c\u5e76\u6784\u5efa\u504f\u597d\u5bf9\u8fdb\u884c\u5f3a\u5316\u5b66\u4e60\uff0c\u4f18\u5316LLM\u667a\u80fd\u4f53\u7684\u957f\u671f\u8bb0\u5fc6\u6574\u5408\u884c\u4e3a\uff0c\u51cf\u5c11\u9057\u6f0f\u3001\u635f\u574f\u548c\u5e7b\u89c9\u9519\u8bef\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25161", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u8bbe\u8ba1Memory Transition Verifier\u4ece\u8986\u76d6\u6027\u3001\u4fdd\u7559\u6027\u3001\u5fe0\u5b9e\u6027\u4e09\u4e2a\u7ef4\u5ea6\u8bc4\u4f30\u8bb0\u5fc6\u66f4\u65b0\u8d28\u91cf", "\u6784\u5efa\u540c\u4e00\u8bb0\u5fc6\u72b6\u6001\u4e0b\u5019\u9009\u66f4\u65b0\u7684\u504f\u597d\u5bf9\uff0c\u901a\u8fc7\u504f\u597d\u5f15\u5bfc\u5f3a\u5316\u5b66\u4e60\u76f4\u63a5\u4f18\u5316\u8bb0\u5fc6\u5199\u5165\u884c\u4e3a", "\u5728MemoryAgentBench\u3001HaluMem\u7b49\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u8bb0\u5fc6\u63d0\u53d6F1\u63d0\u534712.14\u5206\uff0c\u9057\u6f0f/\u635f\u574f/\u5e7b\u89c9\u5206\u522b\u964d\u4f4e40.1%/79.1%/50.0%"], "keywords": ["\u667a\u80fd\u4f53", "\u957f\u671f\u8bb0\u5fc6", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25161v1", "published_at": "2026-06-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "TRUSTMEM: Learning Trustworthy Memory Consolidation for LLM Agents with Long-Term Memory", "tldr": "TrustMem\u6846\u67b6\u901a\u8fc7\u504f\u597d\u5f3a\u5316\u5b66\u4e60\u63d0\u5347LLM\u667a\u80fd\u4f53\u957f\u671f\u8bb0\u5fc6\u66f4\u65b0\u7684\u53ef\u4fe1\u5ea6", "upvotes": 0, "what_it_is": "\u63d0\u51faTrustMem\u6846\u67b6\uff0c\u901a\u8fc7\u8bb0\u5fc6\u8f6c\u6362\u9a8c\u8bc1\u5668\u8bc4\u4f30\u8bb0\u5fc6\u66f4\u65b0\u7684\u8986\u76d6\u6027\u3001\u4fdd\u7559\u6027\u548c\u5fe0\u5b9e\u6027\uff0c\u5e76\u6784\u5efa\u504f\u597d\u5bf9\u8fdb\u884c\u5f3a\u5316\u5b66\u4e60\uff0c\u4f18\u5316LLM\u667a\u80fd\u4f53\u7684\u957f\u671f\u8bb0\u5fc6\u6574\u5408\u884c\u4e3a\uff0c\u51cf\u5c11\u9057\u6f0f\u3001\u635f\u574f\u548c\u5e7b\u89c9\u9519\u8bef\u3002", "why_notable": "\u957f\u671f\u8bb0\u5fc6\u4e2d\u7684\u6301\u4e45\u6027\u9519\u8bef\u662fLLM\u667a\u80fd\u4f53\u7684\u5173\u952e\u75db\u70b9\uff0cTrustMem\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u53ef\u4fe1\u5ea6\u9a8c\u8bc1\u4e0e\u5f3a\u5316\u5b66\u4e60\u7ed3\u5408\u7528\u4e8e\u8bb0\u5fc6\u6574\u5408\uff0c\u5927\u5e45\u964d\u4f4e\u4e09\u7c7b\u6838\u5fc3\u9519\u8bef\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u7684\u4e2a\u6027\u5316AI\u52a9\u624b\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Tool-integrated LLM agents are often wrapped within a harness: the scaffolding that determines which tools are exposed, how they are described, and what auxiliary information accompanies each per-step observation. While agents are routinely post-trained, this scaffolding is typically treated as a fixed engineering detail, with design effort limited to the training-free regime. Moreover, existing post-training algorithms assume a static environment, even though tool environments and tasks often shift upon deployment. To address this gap, we extend $\\texttt{ALFWorld}$ (i) to treat the harness as a controllable design dimension and (ii) to support evaluation under task and tool environment shifts. Building on this, we systematically analyze how the harness design influences post-training in both in-distribution and out-of-distribution (OOD) settings. We empirically show that harness-aware post-training not only improves in-distribution performance but also enables agents to robustly adapt to OOD settings. Under a harness with minimal design effort, post-training suffers a drastic performance drop under stronger tool environment shifts, further highlighting the importance of harness-aware post-training under such shifts.", "arxiv_id": "2606.25447", "arxiv_url": "https://arxiv.org/abs/2606.25447", "authors": ["Kyungmin Kim", "Youngbin Choi", "Seoyeon Lee", "Suhyeon Jun", "Dongwoo Kim", "Sangdon Park"], "brief": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86\u5de5\u5177\u96c6\u6210LLM\u667a\u80fd\u4f53\u4e2d\"\u811a\u624b\u67b6\"\uff08harness\uff09\u8bbe\u8ba1\u4e0e\u540e\u8bad\u7ec3\u7b97\u6cd5\u7684\u76f8\u4e92\u4f5c\u7528\uff0c\u6269\u5c55ALFWorld\u6846\u67b6\u5c06\u811a\u624b\u67b6\u4f5c\u4e3a\u53ef\u63a7\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u5e76\u5206\u6790\u5176\u5728\u5206\u5e03\u5185\u548c\u5206\u5e03\u5916\u573a\u666f\u4e0b\u5bf9\u540e\u8bad\u7ec3\u6548\u679c\u7684\u5f71\u54cd\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25447", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06ALFWorld\u6269\u5c55\u4e3a\u652f\u6301\u811a\u624b\u67b6\u8bbe\u8ba1\u7ef4\u5ea6\u53ef\u63a7\u3001\u4efb\u52a1\u4e0e\u5de5\u5177\u73af\u5883\u8fc1\u79fb\u8bc4\u4f30\u7684\u5b9e\u9a8c\u5e73\u53f0", "\u811a\u624b\u67b6\u611f\u77e5\u7684\u540e\u8bad\u7ec3\uff08harness-aware post-training\uff09\u4e0d\u4ec5\u63d0\u5347\u5206\u5e03\u5185\u6027\u80fd\uff0c\u8fd8\u80fd\u589e\u5f3a\u667a\u80fd\u4f53\u5bf9OOD\u8bbe\u7f6e\u7684\u9c81\u68d2\u9002\u5e94\u80fd\u529b", "\u5728\u8bbe\u8ba1\u7c97\u7cd9\u7684\u811a\u624b\u67b6\u4e0b\uff0c\u906d\u9047\u8f83\u5f3a\u5de5\u5177\u73af\u5883\u8fc1\u79fb\u65f6\u540e\u8bad\u7ec3\u6027\u80fd\u6025\u5267\u4e0b\u964d\uff0c\u51f8\u663e\u811a\u624b\u67b6\u8bbe\u8ba1\u7684\u91cd\u8981\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u540e\u8bad\u7ec3", "\u5de5\u5177\u4f7f\u7528", "\u6cdb\u5316\u80fd\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25447v1", "published_at": "2026-06-24", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Interplay of Harness Design and Post-Training in LLM Agents", "tldr": "\u7814\u7a76LLM\u667a\u80fd\u4f53\u811a\u624b\u67b6\u8bbe\u8ba1\u4e0e\u540e\u8bad\u7ec3\u7684\u4ea4\u4e92\u5f71\u54cd\uff0c\u63ed\u793a\u611f\u77e5\u811a\u624b\u67b6\u7684\u540e\u8bad\u7ec3\u53ef\u63d0\u5347\u5206\u5e03\u5916\u6cdb\u5316\u80fd\u529b", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86\u5de5\u5177\u96c6\u6210LLM\u667a\u80fd\u4f53\u4e2d\"\u811a\u624b\u67b6\"\uff08harness\uff09\u8bbe\u8ba1\u4e0e\u540e\u8bad\u7ec3\u7b97\u6cd5\u7684\u76f8\u4e92\u4f5c\u7528\uff0c\u6269\u5c55ALFWorld\u6846\u67b6\u5c06\u811a\u624b\u67b6\u4f5c\u4e3a\u53ef\u63a7\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u5e76\u5206\u6790\u5176\u5728\u5206\u5e03\u5185\u548c\u5206\u5e03\u5916\u573a\u666f\u4e0b\u5bf9\u540e\u8bad\u7ec3\u6548\u679c\u7684\u5f71\u54cd\u3002", "why_notable": "\u9996\u6b21\u5c06\u811a\u624b\u67b6\u8bbe\u8ba1\u7eb3\u5165\u540e\u8bad\u7ec3\u7814\u7a76\u6846\u67b6\uff0c\u586b\u8865\u4e86\u73b0\u6709\u540e\u8bad\u7ec3\u7b97\u6cd5\u5ffd\u89c6\u73af\u5883\u53d8\u5316\u7684\u7a7a\u767d\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u4e2dLLM\u667a\u80fd\u4f53\u7684\u9c81\u68d2\u6027\u63d0\u5347\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Sparse voxel representation has emerged as a scalable foundation for image-to-3D Gaussian Splatting (3DGS) generation, yet current methods struggle to preserve high-frequency visual details of input images due to two structural bottlenecks. First, they adopt discriminative 2D features optimized for semantic abstraction to construct sparse voxel latents, which suppress reconstructive cues and induce a representation bottleneck. Second, in the generation stage, standard diffusion transformers lack effective mechanisms to align dense 2D image tokens with sparse 3D voxel latents, resulting in a cross-modal correspondence bottleneck. To address these issues, we propose FLUX3D, a scalable image-to-3DGS framework that boosts both representation learning and cross-modal alignment during generation. We first revisit 2D feature selection for sparse-voxel-based 3D representation learning, propose Diffusion-Aligned Structured Latents (DA-SLAT) and couple it with a decoder-only architecture to improve 3DGS reconstruction fidelity. We also design a sparse-structure-aware diffusion framework, which integrates the Sparse-structure Multimodal Diffusion Transformer (SMDiT) and Modal-Aware Rotary Positional Embedding (MARoPE) to achieve geometry-agnostic 2D-3D alignment. Extensive benchmark experiments demonstrate that FLUX3D yields substantial improvements in appearance fidelity and significantly outperforms all state-of-the-art (SOTA) methods in generating high-quality 3DGS assets.", "arxiv_id": "2606.24874", "arxiv_url": "https://arxiv.org/abs/2606.24874", "authors": ["Haorui Ji", "Weizhe Liu", "Hongdong Li", "Hengkai Guo"], "brief": "", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24874", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": true, "organization": "ByteDance", "pdf_url": "https://arxiv.org/pdf/2606.24874v1", "published_at": "2026-06-23", "score": 0.256, "selected_reasons": ["\u77e5\u540d\u673a\u6784: ByteDance", "HF trending (1\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.24874.png", "title": "FLUX3D: High-Fidelity 3D Gaussian Generation with Diffusion-Aligned Sparse Representation", "tldr": null, "upvotes": 1, "what_it_is": null, "why_notable": null}, {"abstract": "LLM agents are increasingly being used to automate tasks for users within an open GUI environment. They inevitably encounter screens containing user-sensitive information, for which takeover of task execution by the user is highly desirable or even necessary. State-of-the-art LLM-driven agents are usually fine-tuned to complete tasks regardless of the safety implications of their actions. This makes their real-world deployment difficult and adversely affects the reliability. Therefore, it is crucial to identify and categorize user-sensitive states and define user-sensitive queries. This dataset would be to engineers to recognize and request handover to the user in critical scenarios. This short paper develops an explorer agent that systematically explores the query space starting from one demonstrated task to identify queries that, if executed, would lead to user-sensitive states in a GUI environment.", "arxiv_id": "2606.25705", "arxiv_url": "https://arxiv.org/abs/2606.25705", "authors": ["Aradhana Nayak", "Mussadiq Nazeer", "Wang Peng", "Feng Liu"], "brief": "", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25705", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25705v1", "published_at": "2026-06-24", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "GUI agent: Guided Exploration of User-Sensitive Screens", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Stepwise group-based RL is an attractive way to train long-horizon LLM agents without a learned critic: it reuses multiple sampled rollouts to estimate local advantages. Its weakness is less visible but more fundamental: every group-relative estimator assumes that the steps it compares are equivalent for credit assignment. We show that current agentic variants violate this assumption through a state-action credit mismatch. The observation-hash partition is overly fine on the state side, creating singleton groups with zero step-level signal, while a single within-group mean is too coarse on the action side, mixing state-value estimation with action-specific credit. We introduce BiPACE (Bisimulation-Guided Policy Optimization with Action Counterfactual Estimation), a drop-in advantage estimator that fixes both sides without adding a critic, auxiliary loss, or extra rollouts. BiGPO clusters steps by cosine distance in the actor\u0027s own hidden-state geometry, an empirical policy-induced proxy for bisimulation that substantially lowers the singleton rate left by observation hashing. PACE then recenters returns within each behavioral cluster using action-conditioned peer baselines; its Q-style instance estimates a local Q(s,a)-V(s) nonparametrically. On ALFWorld/Qwen2.5-7B, BiPACE_Q raises overall validation success from GiGPO\u0027s 90.8 to $97.1\\pm0.9$ over three seeds, and crosses the 95% threshold on every seed, which GiGPO never does within the same budget. On Qwen2.5-1.5B it reaches $93.5\\pm1.2$ versus GiGPO\u0027s 86.7, and on WebShop and TextCraft it improves over GRPO and GiGPO at both model scales. The measured BiPACE-specific overhead is 11.3% of a single training-step wall time. Yet it changes the estimator\u0027s comparison unit from surface identity to approximate behavioral equivalence plus action-side counterfactuals. The code is available at https://github.com/TianxiangZhao/BiPACE.", "arxiv_id": "2606.25556", "arxiv_url": "https://arxiv.org/abs/2606.25556", "authors": ["Hanyang Wang", "Weijieying Ren", "Yuxiang Zhang", "Ding Cao", "Zhizhao Zeng", "Ke Zeng", "Tianxiang Zhao"], "brief": "", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25556", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25556v1", "published_at": "2026-06-24", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "BiPACE: Bisimulation-Guided Policy Optimization with Action Counterfactual Estimation for LLM Agents", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Autonomous AI systems are transitioning from advisory to autonomous roles for medication prescriptions. Recent United States bill H.R. 238 and Utah\u0027s prescription-renewal pilot both authorize AI to prescribe medications in an agentic capacity. While some regulatory guidelines suggest aggregate model performance metrics for clearance, they do not require i) calibrated per-prediction confidence for action-gated thresholds, ii) differentiated communication of uncertainty arising from model ignorance (epistemic) versus genuine clinical ambiguity (aleatoric), and iii) inferential transparency at the moment of decision that allows for liability allocation. Here, we present a regulatory and technical argument (tested with a survey of 136 U.S. prescribing clinicians) positioning these as minimum architectural requirements for safe autonomous prescribing. Our results suggest prescribing clinicians i) would not permit autonomous prescribing without a calibrated confidence-based escalation mechanism, ii) preferred a competing-options summary when uncertainty was aleatoric but shifted to abstention when uncertainty was epistemic, and iii) were only willing to accept additional liability when inferential transparency enabled a substantive judgment under acknowledged uncertainty. These findings indicate our recommended architectural features would encourage higher rates of clinician adoption, largely through collapsing much of what \"autonomy\" conventionally means. A system meeting these requirements would function less as an autonomous agent and more as a heavily supervised decision-support tool. As legislation and state pilots proceed, our technical argument backed by clinician perspectives provides opportunities for regulation to constrain the degree of autonomy ethically granted to AI in prescribing while aligning liability with the institutional actors who control system design and deployment.", "arxiv_id": "2606.25108", "arxiv_url": "https://arxiv.org/abs/2606.25108", "authors": ["Eileanor LaRocco", "Sarah Tan", "Adarsh Subbaswamy", "Anne Andrews", "Andrew Taylor", "Cree Gaskin", "Chirag Agarwal"], "brief": "", "categories": ["cs.AI", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25108", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25108v1", "published_at": "2026-06-23", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "The Clinician\u0027s Veto: Navigating Trust, Liability, and Uncertainty in Autonomous AI Prescribing", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Commercial NLP treats the shopping chatbot as a recommender or a conversion tool: its job is to match a user to a catalogue entry and close a sale. We argue that the arrival of agent-native micro-payment rails (e.g., x402, AP2) changes what is scarce. When the buyer is an autonomous agent that can investigate exhaustively, the bottleneck is no longer matching products but acquiring trustworthy, decision-relevant information about them. We envision agentic e-commerce as a micro-transaction market for verified information: buyer agents spend fractions of a cent to progressively unlock seller- and reviewer-supplied data -- service histories, third-party test reports, bills of materials, audited sales and support metrics -- paid for a la carte under a freemium model, with reviewer trust scored reputationally. We sketch the architecture of such a market and argue that it rewards genuine product quality and yields truer competition than ranking-based storefronts. We then translate the vision into concrete NLP problems -- cost-optimal information acquisition, data pricing and negotiation, real-time entity resolution, grounded value exchange, and privacy-preserving persona modelling -- and argue that these, not chat fluency, deserve the field\u0027s attention.", "arxiv_id": "2606.24783", "arxiv_url": "https://arxiv.org/abs/2606.24783", "authors": ["Filippos Ventirozos", "Matthew Shardlow"], "brief": "", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24783", "impact_score": null, "is_agent": null, "is_top": true, "key_points": [], "keywords": [], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24783v1", "published_at": "2026-06-23", "score": 0.225, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Paying to Know: Micro-Transaction Markets for Verified Product Information in Agentic E-Commerce", "tldr": null, "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Software performance optimization is a notoriously complex and manual task. Despite the growing use of Large Language Models (LLMs) for code refinement, we still lack benchmarks that capture how optimization actually happens in real-world codebases. Existing frameworks often oversimplify the problem by focusing on isolated functions or a single performance metric, missing the critical trade-offs between execution time and memory footprint, the inherent noise of the measurement environment, and the variability introduced by different input data and execution conditions. We address this by introducing SWE-Pro, a repository-level benchmark derived from 102 expert-written optimizations from open-source projects. Unlike previous benchmarks, SWE-Pro pairs each task with parameterized tests to evaluate runtime, peak memory, and Time-Weighted Memory Usage (TWMU) across varying input data and execution conditions under noise-aware measurement conditions. Our evaluation shows that current LLMs struggle significantly: runtime gains are negligible, and memory optimizations are nearly non-existent. This stands in sharp contrast to expert implementations, which achieve an aggregate speedup of 15.5x and peak memory reduction of 171.3x over benchmark tasks. Expert-written improvements are observed in 91.2% of tasks for runtime and 65.7% for peak memory. Our findings expose a substantial gap between current LLM capabilities and the demands of expert-level engineering.", "arxiv_id": "2606.25530", "arxiv_url": "https://arxiv.org/abs/2606.25530", "authors": ["Ezgi Sar\u0131kayak", "Wenchao Gu", "Hesham Ghonim", "Chunyang Chen"], "brief": "\u63d0\u51faSWE-Pro\u2014\u2014\u4e00\u4e2a\u6765\u81ea102\u4e2a\u5f00\u6e90\u9879\u76ee\u4e13\u5bb6\u7ea7\u4f18\u5316\u6848\u4f8b\u7684\u4ed3\u5e93\u7ea7\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u5728\u771f\u5b9e\u8f6f\u4ef6\u6027\u80fd\u4f18\u5316\u4efb\u52a1\u4e2d\u7684\u80fd\u529b\uff0c\u540c\u65f6\u8003\u91cf\u8fd0\u884c\u65f6\u95f4\u3001\u5cf0\u503c\u5185\u5b58\u548c\u65f6\u95f4\u52a0\u6743\u5185\u5b58\u4f7f\u7528\u7387\u7b49\u591a\u7ef4\u6307\u6807\u3002", "categories": ["cs.SE", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25530", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4e13\u5bb6\u5b9e\u73b0\u76f8\u6bd4\u57fa\u51c6\u4efb\u52a1\u5e73\u5747\u52a0\u901f15.5\u500d\u3001\u5cf0\u503c\u5185\u5b58\u964d\u4f4e171.3\u500d\uff0c\u800c\u5f53\u524dLLM\u7684\u4f18\u5316\u6548\u679c\u51e0\u4e4e\u53ef\u5ffd\u7565\u4e0d\u8ba1", "\u4e13\u5bb6\u572891.2%\u7684\u4efb\u52a1\u4e2d\u6539\u5584\u4e86\u8fd0\u884c\u65f6\u95f4\uff0c65.7%\u7684\u4efb\u52a1\u4e2d\u6539\u5584\u4e86\u5cf0\u503c\u5185\u5b58\uff1bLLM\u8868\u73b0\u8fdc\u4e0d\u53ca\u6b64", "\u57fa\u51c6\u5f15\u5165\u566a\u58f0\u611f\u77e5\u6d4b\u91cf\u3001\u53c2\u6570\u5316\u6d4b\u8bd5\u548c\u591a\u79cd\u8f93\u5165\u6761\u4ef6\uff0c\u907f\u514d\u4e86\u73b0\u6709\u6846\u67b6\u8fc7\u5ea6\u7b80\u5316\u7684\u95ee\u9898"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8f6f\u4ef6\u5de5\u7a0b", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25530v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Evaluating LLMs on Real-World Software Performance Optimization", "tldr": "SWE-Pro\u57fa\u51c6\u6d4b\u8bd5\u63ed\u793aLLM\u5728\u771f\u5b9e\u4ee3\u7801\u5e93\u6027\u80fd\u4f18\u5316\u4e0a\u4e0e\u4e13\u5bb6\u6c34\u5e73\u5b58\u5728\u5de8\u5927\u5dee\u8ddd", "upvotes": 0, "what_it_is": "\u63d0\u51faSWE-Pro\u2014\u2014\u4e00\u4e2a\u6765\u81ea102\u4e2a\u5f00\u6e90\u9879\u76ee\u4e13\u5bb6\u7ea7\u4f18\u5316\u6848\u4f8b\u7684\u4ed3\u5e93\u7ea7\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u5728\u771f\u5b9e\u8f6f\u4ef6\u6027\u80fd\u4f18\u5316\u4efb\u52a1\u4e2d\u7684\u80fd\u529b\uff0c\u540c\u65f6\u8003\u91cf\u8fd0\u884c\u65f6\u95f4\u3001\u5cf0\u503c\u5185\u5b58\u548c\u65f6\u95f4\u52a0\u6743\u5185\u5b58\u4f7f\u7528\u7387\u7b49\u591a\u7ef4\u6307\u6807\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9\u771f\u5b9e\u4ee3\u7801\u5e93\u6027\u80fd\u4f18\u5316\u7684\u4ed3\u5e93\u7ea7\u591a\u7ef4\u57fa\u51c6\uff0c\u91cf\u5316\u63ed\u793a\u4e86LLM\u4e0e\u4e13\u5bb6\u5de5\u7a0b\u5e08\u4e4b\u95f4\u7684\u80fd\u529b\u9e3f\u6c9f\uff0c\u4e3a\u4ee3\u7801\u4f18\u5316\u9886\u57df\u7684LLM\u7814\u7a76\u6307\u660e\u4e86\u5173\u952e\u77ed\u677f\u3002"}, {"abstract": "Large language models (LLMs) reach high accuracy in mathematical reasoning, but individual traces on the same problem diverge; some arrive at the correct answer while others fail. Prior work analyzes failure at the step, chunk, or sentence level, or at tokens where failure has already occurred. Neither identifies the precise token that triggers the shift toward failure. We introduce the cliff token, a token where the token-wise potential drops significantly under an adaptive threshold that scales with the local token-wise potential, based on a one-sided two-proportion z-test. Across seven models and three mathematical reasoning benchmarks (GSM1K, MATH500, AIME 2025), cliff tokens act as failure triggers; deleting the first cliff token and resampling recovers pass@64 to 1.0, while keeping it limits recovery to between 0.71 and 1.00. We further introduce a cliff taxonomy of deterministic, uncertain, and sampled-off cliffs, defined by greedy choice and token entropy. Each type has distinct probabilistic characteristics, and the taxonomy generalizes across model scales. Finally, we validate the taxonomy via single-token preference optimization at cliff positions (Cliff-DPO). Trained on GSM8K, Cliff-DPO improves accuracy across benchmarks by up to +6.6. Optimizing at uncertain and sampled-off cliffs improves reasoning, while deterministic cliffs do not.", "arxiv_id": "2606.25524", "arxiv_url": "https://arxiv.org/abs/2606.25524", "authors": ["Jaeyong Ko", "Pilsung Kang", "Yukyung Lee"], "brief": "\u63d0\u51fa\"\u60ac\u5d16token\"\u6982\u5ff5\uff0c\u901a\u8fc7\u81ea\u9002\u5e94\u9608\u503c\u7684\u5355\u4fa7\u53cc\u6bd4\u4f8bz\u68c0\u9a8c\uff0c\u7cbe\u786e\u5b9a\u4f4dLLM\u6570\u5b66\u63a8\u7406\u94fe\u4e2d\u5bfc\u81f4\u5931\u8d25\u7684\u5355\u4e2a\u89e6\u53d1token\uff0c\u5e76\u6784\u5efa\u786e\u5b9a\u6027/\u4e0d\u786e\u5b9a/\u91c7\u6837\u504f\u79bb\u4e09\u7c7b\u5206\u7c7b\u4f53\u7cfb\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25524", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5220\u9664\u7b2c\u4e00\u4e2a\u60ac\u5d16token\u5e76\u91cd\u91c7\u6837\u53ef\u5c06pass@64\u6062\u590d\u81f31.0\uff0c\u4fdd\u7559\u5219\u4ec5\u80fd\u6062\u590d\u81f30.71~1.00\u4e4b\u95f4", "\u57287\u4e2a\u6a21\u578b\u548cGSM1K\u3001MATH500\u3001AIME 2025\u4e09\u4e2a\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u60ac\u5d16token\u666e\u904d\u5b58\u5728", "\u57fa\u4e8e\u60ac\u5d16\u4f4d\u7f6e\u7684\u5355token\u504f\u597d\u4f18\u5316\uff08Cliff-DPO\uff09\u5728GSM8K\u8bad\u7ec3\u540e\u8de8\u57fa\u51c6\u6700\u9ad8\u63d0\u5347+6.6\u51c6\u786e\u7387\uff0c\u4e0d\u786e\u5b9a\u578b\u548c\u91c7\u6837\u504f\u79bb\u578b\u60ac\u5d16\u6709\u6548\uff0c\u786e\u5b9a\u6027\u60ac\u5d16\u65e0\u6548"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u5b66\u63a8\u7406", "\u5931\u8d25\u5206\u6790", "\u504f\u597d\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25524v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Cliff Tokens: Identifying Single-Token Failure Triggers in LLM Mathematical Reasoning", "tldr": "\u53d1\u73b0LLM\u6570\u5b66\u63a8\u7406\u4e2d\u89e6\u53d1\u5931\u8d25\u7684\u5355\u4e2a\u5173\u952etoken\u2014\u2014\"\u60ac\u5d16token\"\uff0c\u5220\u9664\u540e\u91cd\u91c7\u6837\u53ef\u6062\u590d\u81f3\u6ee1\u5206", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u60ac\u5d16token\"\u6982\u5ff5\uff0c\u901a\u8fc7\u81ea\u9002\u5e94\u9608\u503c\u7684\u5355\u4fa7\u53cc\u6bd4\u4f8bz\u68c0\u9a8c\uff0c\u7cbe\u786e\u5b9a\u4f4dLLM\u6570\u5b66\u63a8\u7406\u94fe\u4e2d\u5bfc\u81f4\u5931\u8d25\u7684\u5355\u4e2a\u89e6\u53d1token\uff0c\u5e76\u6784\u5efa\u786e\u5b9a\u6027/\u4e0d\u786e\u5b9a/\u91c7\u6837\u504f\u79bb\u4e09\u7c7b\u5206\u7c7b\u4f53\u7cfb\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u63a8\u7406\u5931\u8d25\u7cbe\u786e\u5b9a\u4f4d\u5230\u5355\u4e2atoken\u7ea7\u522b\uff0c\u63ed\u793a\u5931\u8d25\u89e6\u53d1\u673a\u5236\uff0c\u5e76\u63d0\u4f9b\u53ef\u64cd\u4f5c\u7684\u8f7b\u91cf\u7ea7\u4f18\u5316\u65b9\u6cd5\uff08Cliff-DPO\uff09\uff0c\u5bf9\u7406\u89e3\u548c\u6539\u8fdbLLM\u63a8\u7406\u53ef\u9760\u6027\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Inference efficiency is typically pursued by shrinking the model: distillation, pruning, quantization, and sparse routing each lower per-token cost while treating token count as fixed. But output length has been inflating, and it is precisely the component the standard toolkit leaves untouched. Here, we argue that brevity is the missing inference-efficiency lever, and that pretraining data curation is a practical way to pull it: a model trained on concise, correct data learns to answer in fewer tokens; i.e. it has a lower Cost-of-Pass. We apply our VLM curation pipeline to the MAmmoTH-VL single-image subset, and compare models trained on our curated data, the standard MAmmoTH-VL data, and external open-weight frontier VLMs. On a controlled 20-evaluation set and 14 VLMs at 1B-4B activated parameters, we hold output length fixed with a per-model regression, separating brevity from quality, and price models in FLOPs per correct answer. Curation buys a 35x Cost-of-Pass advantage over the most verbose 4B comparator (Qwen3.5-4B) within $\\sim$1 pp of accuracy (0.41 vs 14.58 TFLOPs per correct answer; 0.691 vs 0.704 mean accuracy). Curation also buys a +17.55-percentage-point matched-length accuracy gain over the uncurated baseline that grows with model scale (from +16.7 pp at 1B to +21.2 pp at 4B). This brevity improvement concedes no quality: generic verbosity buys no accuracy at any capability or scale, and the window where reasoning-structured verbosity still earns its tokens shrinks from 4 of 8 capability groups at 2B to 1 of 8 at 4B. Per example, the concise model even reaches correct answers the verbose reasoning model misses, marking reasoning as a distinct curation target rather than something brevity gives up. Inference efficiency in this regime is a tokens-per-correct problem, and brevity is the lever that targets it directly.", "arxiv_id": "2606.25432", "arxiv_url": "https://arxiv.org/abs/2606.25432", "authors": ["DatologyAI", ":", "Matthew L. Leavitt", "Siddharth Joshi", "Haoli Yin", "Rishabh Adiga", "Haakon Mongstad", "Alvin Deng", "David Schwab", "Bogdan Gaza", "Ari Morcos"], "brief": "\u672c\u6587\u63d0\u51fa\u901a\u8fc7\u9884\u8bad\u7ec3\u6570\u636e\u7cbe\u9009\uff08\u800c\u975e\u6a21\u578b\u538b\u7f29\uff09\u6765\u964d\u4f4eVLM\u63a8\u7406\u6210\u672c\uff1a\u5728\u7b80\u6d01\u3001\u6b63\u786e\u7684\u6570\u636e\u4e0a\u8bad\u7ec3\u7684\u6a21\u578b\u80fd\u7528\u66f4\u5c11token\u7ed9\u51fa\u6b63\u786e\u7b54\u6848\uff0c\u4ece\u800c\u5927\u5e45\u964d\u4f4e\u6bcf\u4e2a\u6b63\u786e\u7b54\u6848\u7684FLOPs\u5f00\u9500\u3002", "categories": ["cs.LG", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25432", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51fa\"Cost-of-Pass\"\u6307\u6807\uff08\u6bcf\u4e2a\u6b63\u786e\u7b54\u6848\u7684FLOPs\uff09\uff0c\u5c06\u8f93\u51fa\u957f\u5ea6\u7eb3\u5165\u63a8\u7406\u6548\u7387\u8bc4\u4f30", "\u5bf9MAmmoTH-VL\u6570\u636e\u96c6\u8fdb\u884c\u7cbe\u9009\u540e\uff0c\u4e0e\u6700\u5197\u957f\u76844B\u5bf9\u6bd4\u6a21\u578b\u76f8\u6bd4\u5b9e\u73b035\u500dCost-of-Pass\u4f18\u52bf\uff080.41 vs 14.58 TFLOPs/\u6b63\u786e\u7b54\u6848\uff09\uff0c\u7cbe\u5ea6\u51e0\u4e4e\u6301\u5e73\uff0869.1% vs 70.4%\uff09", "\u7cbe\u9009\u6570\u636e\u5728\u7b49\u957f\u6761\u4ef6\u4e0b\u5e26\u6765+17.55\u4e2a\u767e\u5206\u70b9\u7684\u51c6\u786e\u7387\u63d0\u5347\uff0c\u4e14\u968f\u6a21\u578b\u89c4\u6a21\u589e\u5927\u6548\u679c\u66f4\u663e\u8457\uff081B\u65f6+16.7pp\uff0c4B\u65f6+21.2pp\uff09\uff1b\u5197\u957f\u63a8\u7406\u57284B\u6a21\u578b\u4e2d\u4ec51/8\u80fd\u529b\u7ec4\u4ecd\u6709\u6536\u76ca"], "keywords": ["\u591a\u6a21\u6001", "\u63a8\u7406\u6548\u7387", "\u6570\u636e\u7cbe\u9009", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25432v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Brevity is the Soul of Inference Efficiency: Inducing Concision in VLMs via Data Curation", "tldr": "\u901a\u8fc7\u9884\u8bad\u7ec3\u6570\u636e\u7cbe\u9009\u8ba9VLM\u5b66\u4f1a\u7b80\u6d01\u56de\u7b54\uff0c\u63a8\u7406\u6548\u7387\u63d0\u534735\u500d", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u901a\u8fc7\u9884\u8bad\u7ec3\u6570\u636e\u7cbe\u9009\uff08\u800c\u975e\u6a21\u578b\u538b\u7f29\uff09\u6765\u964d\u4f4eVLM\u63a8\u7406\u6210\u672c\uff1a\u5728\u7b80\u6d01\u3001\u6b63\u786e\u7684\u6570\u636e\u4e0a\u8bad\u7ec3\u7684\u6a21\u578b\u80fd\u7528\u66f4\u5c11token\u7ed9\u51fa\u6b63\u786e\u7b54\u6848\uff0c\u4ece\u800c\u5927\u5e45\u964d\u4f4e\u6bcf\u4e2a\u6b63\u786e\u7b54\u6848\u7684FLOPs\u5f00\u9500\u3002", "why_notable": "\u98a0\u8986\u4e86\"\u63a8\u7406\u6548\u7387=\u538b\u7f29\u6a21\u578b\"\u7684\u4f20\u7edf\u601d\u8def\uff0c\u6307\u51fa\u8f93\u51fa\u957f\u5ea6\u662f\u88ab\u5ffd\u89c6\u7684\u6548\u7387\u6760\u6746\uff0c\u5e76\u8bc1\u660e\u6570\u636e\u7cbe\u9009\u53ef\u5728\u4e0d\u635f\u5931\u7cbe\u5ea6\u7684\u524d\u63d0\u4e0b\u5927\u5e45\u51cf\u5c11token\u8f93\u51fa\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u6210\u672c\u6709\u76f4\u63a5\u5f71\u54cd\u3002"}, {"abstract": "Modern large language models are predominantly trained with autoregressive factorization and causal attention. We present \\emph{iLLaDA}, an 8B masked diffusion language model trained from scratch with fully bidirectional attention. iLLaDA keeps the masked diffusion objective throughout pre-training and supervised fine-tuning (SFT), scaling pre-training to 12T tokens and fine-tuning on a 25B-token instruction corpus for 12 epochs. We further use variable-length generation for efficiency and introduce confidence-based scoring for multiple-choice evaluation. Compared with LLaDA, iLLaDA improves broadly across general, mathematical, and code benchmarks; for example, iLLaDA-Base improves by 21.6 points on BBH and 14.9 points on ARC-Challenge, while iLLaDA-Instruct improves by 14.5 points on MATH and 16.5 points on HumanEval. Despite its non-autoregressive training, iLLaDA also remains competitive with Qwen2.5 7B on several benchmarks. These results show that fully bidirectional diffusion training from scratch is a competitive path toward strong language models. Model weights and codes: https://github.com/ML-GSAI/LLaDA.", "arxiv_id": "2606.25331", "arxiv_url": "https://arxiv.org/abs/2606.25331", "authors": ["Shen Nie", "Qiyang Min", "Shaoxuan Xu", "Zihao Huang", "Yuxuan Song", "Yong Shan", "Yankai Lin", "Wayne Xin Zhao", "Chongxuan Li", "Ji-Rong Wen"], "brief": "\u63d0\u51faiLLaDA\uff0c\u4e00\u4e2a\u4ece\u5934\u8bad\u7ec3\u768480\u4ebf\u53c2\u6570\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u91c7\u7528\u5b8c\u5168\u53cc\u5411\u6ce8\u610f\u529b\u673a\u5236\uff0c\u572812T token\u4e0a\u9884\u8bad\u7ec3\u5e76\u572825B token\u6307\u4ee4\u8bed\u6599\u4e0a\u5fae\u8c03\uff0c\u8bc1\u660e\u975e\u81ea\u56de\u5f52\u6269\u6563\u8bad\u7ec3\u662f\u6784\u5efa\u5f3a\u5927\u8bed\u8a00\u6a21\u578b\u7684\u53ef\u884c\u8def\u5f84\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25331", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u76f8\u6bd4LLaDA\uff0ciLLaDA-Base\u5728BBH\u63d0\u534721.6\u5206\u3001ARC-Challenge\u63d0\u534714.9\u5206\uff1biLLaDA-Instruct\u5728MATH\u63d0\u534714.5\u5206\u3001HumanEval\u63d0\u534716.5\u5206", "\u5f15\u5165\u53d8\u957f\u751f\u6210\u63d0\u5347\u63a8\u7406\u6548\u7387\uff0c\u5e76\u63d0\u51fa\u57fa\u4e8e\u7f6e\u4fe1\u5ea6\u7684\u591a\u9009\u9898\u8bc4\u4f30\u65b9\u6cd5", "\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u4e0eQwen2.5 7B\uff08\u81ea\u56de\u5f52\u6a21\u578b\uff09\u4fdd\u6301\u7ade\u4e89\u529b\uff0c\u9a8c\u8bc1\u6269\u6563LM\u7684\u6f5c\u529b"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u975e\u81ea\u56de\u5f52\u751f\u6210", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25331v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Improved Large Language Diffusion Models", "tldr": "iLLaDA\uff1a8B\u53c2\u6570\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u53cc\u5411\u6ce8\u610f\u529b\u8bad\u7ec3\uff0c\u591a\u9879\u57fa\u51c6\u5927\u5e45\u8d85\u8d8aLLaDA", "upvotes": 0, "what_it_is": "\u63d0\u51faiLLaDA\uff0c\u4e00\u4e2a\u4ece\u5934\u8bad\u7ec3\u768480\u4ebf\u53c2\u6570\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u91c7\u7528\u5b8c\u5168\u53cc\u5411\u6ce8\u610f\u529b\u673a\u5236\uff0c\u572812T token\u4e0a\u9884\u8bad\u7ec3\u5e76\u572825B token\u6307\u4ee4\u8bed\u6599\u4e0a\u5fae\u8c03\uff0c\u8bc1\u660e\u975e\u81ea\u56de\u5f52\u6269\u6563\u8bad\u7ec3\u662f\u6784\u5efa\u5f3a\u5927\u8bed\u8a00\u6a21\u578b\u7684\u53ef\u884c\u8def\u5f84\u3002", "why_notable": "\u9996\u6b21\u5c06\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\u6269\u5c55\u81f38B\u53c2\u6570\u5e76\u7cfb\u7edf\u9a8c\u8bc1\u5176\u7ade\u4e89\u529b\uff0c\u6311\u6218\u81ea\u56de\u5f52\u8303\u5f0f\u4e3b\u5bfc\u5730\u4f4d\uff0c\u4e3a\u975e\u81ea\u56de\u5f52\u5927\u8bed\u8a00\u6a21\u578b\u7814\u7a76\u63d0\u4f9b\u91cd\u8981\u57fa\u51c6\u4e0e\u5f00\u6e90\u8d44\u6e90\u3002"}, {"abstract": "Autonomous AI Research promises to accelerate the scientific progress of machine learning. To realise this goal, current Large Language Model (LLM)-based agents need to go beyond just writing code, to mastering the exploration of simultaneously performant, diverse and novel ideas. To this end, we introduce Heuresis, a framework that abstracts the research pipeline into a set of general and composable primitives, enabling open-ended scientific exploration in machine learning research. We implement six search strategies: a greedy baseline, two archive-based (MAP-Elites, Go-Explore), one evolutionary (Islands), and two divergent (Curiosity, Omni), and evaluate them across three axes (Quality, Diversity, and Novelty) on three domains (LLM Pretraining, On-Policy RL, and Model Unlearning), totalling 3,222 scored runs. We find that completely novel ideas are rare. No idea across our scored runs is rated as \"Original\", and only a few achieve only \"Minor Similarity\" to prior work. Moreover, novel ideas never approach the highest-pe
