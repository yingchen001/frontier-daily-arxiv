9\u673a\u5668\u4eba\u7b56\u7565\u901a\u8fc7\u5c11\u91cf\u81ea\u751f\u6210\u7684\u4efb\u52a1\u65e0\u5173\u4ea4\u4e92\u5386\u53f2\uff0c\u5728\u4e0a\u4e0b\u6587\u7a97\u53e3\u4e2d\u9690\u5f0f\u63a8\u65ad\u7cfb\u7edf\u914d\u7f6e\uff08\u5982\u6444\u50cf\u5934\u89c6\u89d2\u3001\u673a\u5668\u4eba\u5f62\u6001\uff09\uff0c\u65e0\u9700\u53c2\u6570\u66f4\u65b0\u5373\u53ef\u9002\u5e94\u65b0\u73af\u5883\u3002\u5b9e\u9a8c\u8868\u660eICWM\u5728\u65b0\u9896\u6444\u50cf\u5934\u89c6\u89d2\u4e0b\u663e\u8457\u4f18\u4e8e\u6807\u51c6VLA\u57fa\u7ebf\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26025", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u673a\u5668\u4eba\u63a7\u5236", "\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u7cfb\u7edf\u8bc6\u522b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26025v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "In-Context World Modeling for Robotic Control", "tldr": "\u63d0\u51faIn-Context World Modeling\uff08ICWM\uff09\u6846\u67b6\uff0c\u8ba9\u673a\u5668\u4eba\u7b56\u7565\u901a\u8fc7\u5c11\u91cf\u81ea\u751f\u6210\u7684\u4efb\u52a1\u65e0\u5173\u4ea4\u4e92\u5386\u53f2\uff0c\u5728\u4e0a\u4e0b\u6587\u7a97\u53e3\u4e2d\u9690\u5f0f\u63a8\u65ad\u7cfb\u7edf\u914d\u7f6e\uff08\u5982\u6444\u50cf\u5934\u89c6\u89d2\u3001\u673a\u5668\u4eba\u5f62\u6001\uff09\uff0c\u65e0\u9700\u53c2\u6570\u66f4\u65b0\u5373\u53ef\u9002\u5e94\u65b0\u73af\u5883\u3002\u5b9e\u9a8c\u8868\u660eICWM\u5728\u65b0\u9896\u6444\u50cf\u5934\u89c6\u89d2\u4e0b\u663e\u8457\u4f18\u4e8e\u6807\u51c6VLA\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Existing multi-modal large language models (MLLMs) face significant challenges in processing long video sequences due to strict input token limitations. As a result, current video understanding approaches, especially in egocentric settings characterized by complex dynamics, frequent state changes, and moving cameras, are forced to massively subsample frames. This leads to severe loss of temporal and contextual information, constraining their ability to perform fine-grained video reasoning. In this work, we introduce a framework for egocentric video question answering (VQA) that overcomes these input constraints through Egocentric Scene Graphs (EgoSGs), i.e., temporally grounded, structured representations that capture objects, attributes, spatial relations, and interactions over time. By representing videos as compact, text-based scene graphs, our method preserves the essential visual and temporal information of the original video in a symbolic form that drastically reduces input length while maintaining semantic richness. Crucially, this enables MLLMs to reason efficiently over entire video sequences within their token budget. On HD-EPIC VQA, our method achieves state-of-the-art results, outperforming strong video-based baselines on multiple models and suggesting that structured, temporally grounded representations like EgoSGs can bridge long-form egocentric video understanding and the context limitations of today\u0027s MLLMs.", "arxiv_id": "2606.25842", "arxiv_url": "https://arxiv.org/abs/2606.25842", "authors": ["Agnese Taluzzi", "Riccardo Santambrogio", "Simone Mentasti", "Chiara Plizzari", "Matteo Matteucci"], "brief": "\u9488\u5bf9\u957f\u89c6\u9891\u7406\u89e3\u4e2d\u8f93\u5165token\u9650\u5236\u5bfc\u81f4\u5e27\u5927\u91cf\u4e22\u5931\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4ee5\u81ea\u6211\u4e2d\u5fc3\u573a\u666f\u56fe\uff08EgoSGs\uff09\u5c06\u89c6\u9891\u538b\u7f29\u4e3a\u7ed3\u6784\u5316\u6587\u672c\u8868\u793a\uff0c\u4fdd\u7559\u65f6\u5e8f\u4e0e\u8bed\u4e49\u4fe1\u606f\u3002\u5728HD-EPIC VQA\u57fa\u51c6\u4e0a\u53d6\u5f97\u6700\u4f18\u7ed3\u679c\uff0c\u8bc1\u660e\u7ed3\u6784\u5316\u573a\u666f\u56fe\u80fd\u6709\u6548\u5f25\u5408\u957f\u89c6\u9891\u7406\u89e3\u4e0e\u5927\u6a21\u578b\u4e0a\u4e0b\u6587\u9650\u5236\u4e4b\u95f4\u7684\u9e3f\u6c9f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25842", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u89c6\u9891\u7406\u89e3", "\u573a\u666f\u56fe", "\u81ea\u6211\u4e2d\u5fc3\u89c6\u9891"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25842v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Graph it first! Enabling Reasoning on Long-form Egocentric Videos through Scene Graphs", "tldr": "\u9488\u5bf9\u957f\u89c6\u9891\u7406\u89e3\u4e2d\u8f93\u5165token\u9650\u5236\u5bfc\u81f4\u5e27\u5927\u91cf\u4e22\u5931\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u4ee5\u81ea\u6211\u4e2d\u5fc3\u573a\u666f\u56fe\uff08EgoSGs\uff09\u5c06\u89c6\u9891\u538b\u7f29\u4e3a\u7ed3\u6784\u5316\u6587\u672c\u8868\u793a\uff0c\u4fdd\u7559\u65f6\u5e8f\u4e0e\u8bed\u4e49\u4fe1\u606f\u3002\u5728HD-EPIC VQA\u57fa\u51c6\u4e0a\u53d6\u5f97\u6700\u4f18\u7ed3\u679c\uff0c\u8bc1\u660e\u7ed3\u6784\u5316\u573a\u666f\u56fe\u80fd\u6709\u6548\u5f25\u5408\u957f\u89c6\u9891\u7406\u89e3\u4e0e\u5927\u6a21\u578b\u4e0a\u4e0b\u6587\u9650\u5236\u4e4b\u95f4\u7684\u9e3f\u6c9f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Real-world photography requires capture-time guidance for both camera framing and subject pose. Yet existing aesthetic cropping benchmarks mainly evaluate post-hoc crop prediction and overlook subject-side recommendations, leaving the capture-time guidance capabilities of multimodal large language models (MLLMs) underexplored. To address this gap, we introduce CaptureGuide-Bench, a benchmark with two complementary tasks: photographer-side composition decision and refinement, and subject-side scene-conditioned pose recommendation. Our evaluation reveals limitations: general-purpose MLLMs can make composition decisions but lack precise refinement localization, while specialized aesthetic cropping models localize crops effectively but are limited to refinement; neither provides actionable pose guidance. To support model development, we further construct CaptureGuide-Dataset, comprising 130K samples with textual rationales and structured visual annotations, and develop ShutterMuse, a unified MLLM trained with supervised and reinforcement fine-tuning. Experiments on CaptureGuide-Bench show that ShutterMuse achieves the best overall photographer-side performance among evaluated baselines and competitive subject-side pose recommendation with substantially lower inference cost, demonstrating the potential of MLLMs as interactive assistants for photography during image capture.", "arxiv_id": "2606.25763", "arxiv_url": "https://arxiv.org/abs/2606.25763", "authors": ["Jiayu Li", "Yixiao Fang", "Tianyu Hu", "Wei Cheng", "Ping Huang", "Zheheng Fan", "Gang Yu", "Xingjun Ma"], "brief": "\u63d0\u51faCaptureGuide-Bench\u57fa\u51c6\uff0c\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u62cd\u6444\u65f6\u7684\u6784\u56fe\u51b3\u7b56\u4e0e\u59ff\u52bf\u63a8\u8350\u80fd\u529b\uff0c\u5e76\u6784\u5efa13\u4e07\u6837\u672c\u6570\u636e\u96c6\u8bad\u7ec3ShutterMuse\u6a21\u578b\uff0c\u901a\u8fc7\u76d1\u7763\u4e0e\u5f3a\u5316\u5fae\u8c03\u5b9e\u73b0\u7edf\u4e00\u7684\u62cd\u6444\u8f85\u52a9\uff0c\u5728\u6784\u56fe\u548c\u59ff\u52bf\u63a8\u8350\u4efb\u52a1\u4e0a\u5747\u8fbe\u5230\u6700\u4f18\u6216\u7ade\u4e89\u6027\u8868\u73b0\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25763", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u6444\u5f71\u8f85\u52a9", "\u6784\u56fe\u4f18\u5316", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25763v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ShutterMuse: Capture-Time Photography Guidance with MLLMs", "tldr": "\u63d0\u51faCaptureGuide-Bench\u57fa\u51c6\uff0c\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5728\u62cd\u6444\u65f6\u7684\u6784\u56fe\u51b3\u7b56\u4e0e\u59ff\u52bf\u63a8\u8350\u80fd\u529b\uff0c\u5e76\u6784\u5efa13\u4e07\u6837\u672c\u6570\u636e\u96c6\u8bad\u7ec3ShutterMuse\u6a21\u578b\uff0c\u901a\u8fc7\u76d1\u7763\u4e0e\u5f3a\u5316\u5fae\u8c03\u5b9e\u73b0\u7edf\u4e00\u7684\u62cd\u6444\u8f85\u52a9\uff0c\u5728\u6784\u56fe\u548c\u59ff\u52bf\u63a8\u8350\u4efb\u52a1\u4e0a\u5747\u8fbe\u5230\u6700\u4f18\u6216\u7ade\u4e89\u6027\u8868\u73b0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Conventional vision-language models are largely object-centric, focusing on detecting and describing individual entities. In safety-critical X-ray baggage screening, however, threat often emerges not from a single object but from the functional compatibility of spatially dispersed components, such as batteries, detonators, and explosive charges. We formalize this setting as \\emph{compositional threat reasoning}, where risk is modeled as a relational property of grounded regions rather than an independent detection outcome. We introduce \\textbf{Falcon}, a multimodal framework that abstracts segmentation-aware region features into a structured safety state capturing component presence, pairwise functional compatibility, and scene-level risk. This structured representation is injected into the language model as an explicit intermediate interface, encouraging relationally consistent and safety-aware reasoning. To evaluate this problem, we present \\textbf{Falcon-X}, a benchmark that unifies dense grounding with structured supervision over component completeness and risk inference in cluttered X-ray imagery. Experiments show that while existing multimodal models adapt to appearance, they struggle with compositional safety reasoning. Falcon improves functional grounding and produces more coherent threat assessments, establishing compositional safety reasoning as a distinct evaluation paradigm for multimodal systems.", "arxiv_id": "2606.25701", "arxiv_url": "https://arxiv.org/abs/2606.25701", "authors": ["Yonathan Michael", "Mohamad Alansari", "Natnael Takele", "Andreas Henschel", "Naoufel Werghi"], "brief": "\u9488\u5bf9X\u5149\u884c\u674e\u5b89\u68c0\u4e2d\u591a\u7ec4\u4ef6\u7ec4\u5408\u5a01\u80c1\u8bc6\u522b\u95ee\u9898\uff0c\u63d0\u51faFalcon\u6846\u67b6\uff0c\u5c06\u5206\u5272\u611f\u77e5\u7684\u533a\u57df\u7279\u5f81\u62bd\u8c61\u4e3a\u7ed3\u6784\u5316\u5b89\u5168\u72b6\u6001\uff08\u7ec4\u4ef6\u5b58\u5728\u6027\u3001\u529f\u80fd\u517c\u5bb9\u6027\u3001\u573a\u666f\u98ce\u9669\uff09\uff0c\u5e76\u6ce8\u5165\u8bed\u8a00\u6a21\u578b\u8fdb\u884c\u5173\u7cfb\u63a8\u7406\u3002\u540c\u65f6\u6784\u5efaFalcon-X\u57fa\u51c6\uff0c\u5b9e\u9a8c\u8868\u660e\u73b0\u6709\u591a\u6a21\u6001\u6a21\u578b\u96be\u4ee5\u5904\u7406\u7ec4\u5408\u5b89\u5168\u63a8\u7406\uff0cFalcon\u5728\u529f\u80fd\u5b9a\u4f4d\u548c\u5a01\u80c1\u8bc4\u4f30\u4e0a\u5747\u6709\u663e\u8457\u63d0\u5347\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25701", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u7ec4\u5408\u63a8\u7406", "\u5b89\u5168\u68c0\u6d4b", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25701v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Falcon: Functional Assembly and Language for Compositional Reasoning in X-ray", "tldr": "\u9488\u5bf9X\u5149\u884c\u674e\u5b89\u68c0\u4e2d\u591a\u7ec4\u4ef6\u7ec4\u5408\u5a01\u80c1\u8bc6\u522b\u95ee\u9898\uff0c\u63d0\u51faFalcon\u6846\u67b6\uff0c\u5c06\u5206\u5272\u611f\u77e5\u7684\u533a\u57df\u7279\u5f81\u62bd\u8c61\u4e3a\u7ed3\u6784\u5316\u5b89\u5168\u72b6\u6001\uff08\u7ec4\u4ef6\u5b58\u5728\u6027\u3001\u529f\u80fd\u517c\u5bb9\u6027\u3001\u573a\u666f\u98ce\u9669\uff09\uff0c\u5e76\u6ce8\u5165\u8bed\u8a00\u6a21\u578b\u8fdb\u884c\u5173\u7cfb\u63a8\u7406\u3002\u540c\u65f6\u6784\u5efaFalcon-X\u57fa\u51c6\uff0c\u5b9e\u9a8c\u8868\u660e\u73b0\u6709\u591a\u6a21\u6001\u6a21\u578b\u96be\u4ee5\u5904\u7406\u7ec4\u5408\u5b89\u5168\u63a8\u7406\uff0cFalcon\u5728\u529f\u80fd\u5b9a\u4f4d\u548c\u5a01\u80c1\u8bc4\u4f30\u4e0a\u5747\u6709\u663e\u8457\u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reconstructing 3D scenes from a single image is a fundamental challenge in computer vision, with broad applications in virtual reality, robotics, and content creation. Recent methods achieve outstanding performance by leveraging camera-controlled video diffusion models, but rely on iterative diffusion sampling, which greatly limits their practical deployment. We observe that geometric forward warping alone can cover the majority of a target view directly from the input image, with only a compact residual left for the encoder to correct. Motivated by this observation, we propose PRISM, a feed-forward framework that decomposes multi-view latent prediction into a parameter-free geometric prior and a learned residual correction, with no diffusion sampling required at inference. To enable generalization from purely synthetic training data, we devise a two-stage training strategy combining latents supervised distillation for geometric generalization and perceptual fine-tuning for appearance quality optimization. Extensive experiments on three benchmarks demonstrate that PRISM achieves competitive reconstruction quality compared with diffusion-based methods, while reducing inference time dramatically to only 36 seconds per scene.", "arxiv_id": "2606.25430", "arxiv_url": "https://arxiv.org/abs/2606.25430", "authors": ["Zhijie Zheng", "Xinhao Xiang", "Jiawei Zhang"], "brief": "PRISM\u63d0\u51fa\u4e00\u79cd\u524d\u9988\u5f0f\u5355\u56fe3D\u91cd\u5efa\u6846\u67b6\uff0c\u5c06\u591a\u89c6\u89d2\u9884\u6d4b\u5206\u89e3\u4e3a\u65e0\u53c2\u6570\u51e0\u4f55\u5148\u9a8c\uff08\u51e0\u4f55\u524d\u5411\u53d8\u5f62\uff09\u548c\u53ef\u5b66\u4e60\u6b8b\u5dee\u4fee\u6b63\uff0c\u65e0\u9700\u6269\u6563\u91c7\u6837\u3002\u901a\u8fc7\u4e24\u9636\u6bb5\u8bad\u7ec3\u7b56\u7565\uff08\u6f5c\u53d8\u91cf\u84b8\u998f+\u611f\u77e5\u5fae\u8c03\uff09\uff0c\u5728\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230\u4e0e\u6269\u6563\u65b9\u6cd5\u76f8\u5f53\u7684\u91cd\u5efa\u8d28\u91cf\uff0c\u63a8\u7406\u65f6\u95f4\u4ec5\u970036\u79d2\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25430", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["3D\u91cd\u5efa", "\u6269\u6563\u6a21\u578b", "\u591a\u89c6\u89d2\u5408\u6210", "\u524d\u9988\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25430v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PRISM: Feed-Forward Single-Image 3D Reconstruction via Geometric Warp-Residual Modeling", "tldr": "PRISM\u63d0\u51fa\u4e00\u79cd\u524d\u9988\u5f0f\u5355\u56fe3D\u91cd\u5efa\u6846\u67b6\uff0c\u5c06\u591a\u89c6\u89d2\u9884\u6d4b\u5206\u89e3\u4e3a\u65e0\u53c2\u6570\u51e0\u4f55\u5148\u9a8c\uff08\u51e0\u4f55\u524d\u5411\u53d8\u5f62\uff09\u548c\u53ef\u5b66\u4e60\u6b8b\u5dee\u4fee\u6b63\uff0c\u65e0\u9700\u6269\u6563\u91c7\u6837\u3002\u901a\u8fc7\u4e24\u9636\u6bb5\u8bad\u7ec3\u7b56\u7565\uff08\u6f5c\u53d8\u91cf\u84b8\u998f+\u611f\u77e5\u5fae\u8c03\uff09\uff0c\u5728\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230\u4e0e\u6269\u6563\u65b9\u6cd5\u76f8\u5f53\u7684\u91cd\u5efa\u8d28\u91cf\uff0c\u63a8\u7406\u65f6\u95f4\u4ec5\u970036\u79d2\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Chest X-ray visual question answering (CXR VQA) requires models not only to predict correct answers, but also to produce reliable medical reasoning. However, existing reinforcement-learning-based training typically relies on answer-level rewards, which are often too coarse to improve chain-of-thought (CoT) quality and can become ineffective when group-level advantages collapse to zero. We propose \\textbf{Teach-to-Reason (T2R)}, a framework that introduces comparison-based supervision into CoT optimization through a self-improving \\emph{Teacher} and a competition-guided \\emph{Reasoner}. As the Teacher is iteratively strengthened via self-competition, the Reasoner is optimized against progressively stronger Teacher-generated references. We further introduce a case-wise reward design that preserves the original reward-induced positive/negative partition when it is informative, and restores supervision from competition scores when the original reward signal degenerates. Experiments on multiple CXR open-ended VQA benchmarks show that T2R consistently outperforms strong baselines, indicating that comparison-based supervision, when integrated in a controlled and principled manner, provides a more effective training signal for reasoning optimization.", "arxiv_id": "2606.25407", "arxiv_url": "https://arxiv.org/abs/2606.25407", "authors": ["Xiao Han", "Hao Liu", "Zhimin Bao", "Jile Jiao", "Yue Wang", "Hui Guo", "Xiaofeng Mou", "Yi Xu"], "brief": "\u9488\u5bf9\u80f8\u90e8X\u5149\u89c6\u89c9\u95ee\u7b54\u4efb\u52a1\uff0c\u63d0\u51faTeach-to-Reason\uff08T2R\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u6211\u6539\u8fdb\u7684Teacher\u4e0e\u7ade\u4e89\u5f15\u5bfc\u7684Reasoner\u76f8\u4e92\u535a\u5f08\uff0c\u5c06\u57fa\u4e8e\u6bd4\u8f83\u7684\u76d1\u7763\u4fe1\u53f7\u5f15\u5165\u601d\u7ef4\u94fe\u4f18\u5316\uff0c\u89e3\u51b3\u4e86\u5f3a\u5316\u5b66\u4e60\u4e2d\u7ec4\u7ea7\u4f18\u52bf\u584c\u9677\u5bfc\u81f4\u5956\u52b1\u4fe1\u53f7\u9000\u5316\u7684\u95ee\u9898\u3002\u5b9e\u9a8c\u8868\u660eT2R\u5728\u591a\u4e2a\u5f00\u653e\u5f0fCXR VQA\u57fa\u51c6\u4e0a\u6301\u7eed\u4f18\u4e8e\u5f3a\u57fa\u7ebf\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25407", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u89c6\u89c9\u95ee\u7b54", "\u601d\u7ef4\u94fe\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60", "\u81ea\u6211\u6539\u8fdb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25407v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Teach-to-Reason: Competition-Guided Reasoning with a Self-Improving Teacher", "tldr": "\u9488\u5bf9\u80f8\u90e8X\u5149\u89c6\u89c9\u95ee\u7b54\u4efb\u52a1\uff0c\u63d0\u51faTeach-to-Reason\uff08T2R\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u6211\u6539\u8fdb\u7684Teacher\u4e0e\u7ade\u4e89\u5f15\u5bfc\u7684Reasoner\u76f8\u4e92\u535a\u5f08\uff0c\u5c06\u57fa\u4e8e\u6bd4\u8f83\u7684\u76d1\u7763\u4fe1\u53f7\u5f15\u5165\u601d\u7ef4\u94fe\u4f18\u5316\uff0c\u89e3\u51b3\u4e86\u5f3a\u5316\u5b66\u4e60\u4e2d\u7ec4\u7ea7\u4f18\u52bf\u584c\u9677\u5bfc\u81f4\u5956\u52b1\u4fe1\u53f7\u9000\u5316\u7684\u95ee\u9898\u3002\u5b9e\u9a8c\u8868\u660eT2R\u5728\u591a\u4e2a\u5f00\u653e\u5f0fCXR VQA\u57fa\u51c6\u4e0a\u6301\u7eed\u4f18\u4e8e\u5f3a\u57fa\u7ebf\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision Language Models have achieved near-human performance on single-document Visual Question Answering, yet their effectiveness degrades significantly when retrieving information from large collections of visually homogeneous documents. Existing multi-document benchmarks aggregate diverse document types, creating artificial separation in embedding space that does not reflect enterprise document repositories where thousands of records share identical visual templates. We identify this as embedding collapse and introduce Invoice Haystack, a benchmark with 1,500 anonymized invoice images paired with 200 discriminative question-answer pairs, specifically designed to stress-test retrieval under strong visual homogeneity. Invoice Haystack exhibits a mean pairwise cosine similarity of 0.73, compared to 0.38 (DocHaystack) and 0.31 (InfoHaystack) in existing benchmarks, posing a fundamentally more challenging retrieval problem. Addressing the identified challenge, we propose VL-RAG, a hybrid retrieval-augmented generation framework that jointly leverages text and visual embeddings to harness the complementary strengths of both modalities, followed by a VLM-based verification filter for precise document identification. VL-RAG achieves 60.0\\% Recall@1 on Invoice Haystack-500, outperforming existing state-of-the-art method by up to an absolute 13.5 percentage points. It further improves retrieval considerably on DocHaystack-1000 (77.1\\% vs.\\ 75.2\\%) and InfoHaystack-1000 (84.5\\% vs.\\ 80.0\\%), establishing the proposed dual-stream fusion as a consistently superior retrieval strategy across both homogeneous and heterogeneous document collections.", "arxiv_id": "2606.25343", "arxiv_url": "https://arxiv.org/abs/2606.25343", "authors": ["Heethanjan Kanagalingam", "Thenukan Pathmanathan", "Mokeeshan Vathanakumar", "Basim Azam", "Sarah Monazam Erfani"], "brief": "\u9488\u5bf9\u89c6\u89c9\u9ad8\u5ea6\u540c\u8d28\u5316\u6587\u6863\uff08\u5982\u5927\u91cf\u76f8\u540c\u6a21\u677f\u53d1\u7968\uff09\u7684\u68c0\u7d22\u96be\u9898\uff0c\u63d0\u51faInvoice Haystack\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u63ed\u793a\u73b0\u6709\u591a\u6587\u6863\u57fa\u51c6\u56e0\u6587\u6863\u591a\u6837\u6027\u5bfc\u81f4\u7684\"\u5d4c\u5165\u574d\u584c\"\u95ee\u9898\u3002\u540c\u65f6\u63d0\u51faVL-RAG\u6df7\u5408\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u6846\u67b6\uff0c\u878d\u5408\u6587\u672c\u4e0e\u89c6\u89c9\u5d4c\u5165\u5e76\u52a0\u5165VLM\u9a8c\u8bc1\u8fc7\u6ee4\uff0c\u5728Invoice Haystack-500\u4e0aRecall@1\u8fbe60%\uff0c\u8f83\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\u63d0\u534713.5\u4e2a\u767e\u5206\u70b9\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25343", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u6587\u6863\u68c0\u7d22", "\u89c6\u89c9\u95ee\u7b54", "RAG"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25343v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Invoice Haystack: Benchmarking Document Retrieval and Visual Question Answering Under Strong Visual Homogeneity", "tldr": "\u9488\u5bf9\u89c6\u89c9\u9ad8\u5ea6\u540c\u8d28\u5316\u6587\u6863\uff08\u5982\u5927\u91cf\u76f8\u540c\u6a21\u677f\u53d1\u7968\uff09\u7684\u68c0\u7d22\u96be\u9898\uff0c\u63d0\u51faInvoice Haystack\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u63ed\u793a\u73b0\u6709\u591a\u6587\u6863\u57fa\u51c6\u56e0\u6587\u6863\u591a\u6837\u6027\u5bfc\u81f4\u7684\"\u5d4c\u5165\u574d\u584c\"\u95ee\u9898\u3002\u540c\u65f6\u63d0\u51faVL-RAG\u6df7\u5408\u68c0\u7d22\u589e\u5f3a\u751f\u6210\u6846\u67b6\uff0c\u878d\u5408\u6587\u672c\u4e0e\u89c6\u89c9\u5d4c\u5165\u5e76\u52a0\u5165VLM\u9a8c\u8bc1\u8fc7\u6ee4\uff0c\u5728Invoice Haystack-500\u4e0aRecall@1\u8fbe60%\uff0c\u8f83\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\u63d0\u534713.5\u4e2a\u767e\u5206\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Most vision-language-action (VLA) models are reactive: they predict the next action from the current instruction and observation, implicitly assuming that the current observation fully specifies the action-relevant state. In embodied control, however, embodiment-specific factors such as camera-to-robot geometry, robot calibration, or systematic actuation bias are often hard to identify from a single observation. As a result, reactive policies cannot reliably disambiguate these factors in general, overfitting to training environments and generalizing poorly at deployment. We propose Reflective VLA, which conditions each decision on a context of observation-action-consequence triplets. Each triplet records not only what the robot observed and executed, but also how the scene changed afterward, exposing the deployment-specific mapping from actions to observed effects. Architecturally, Reflective VLA routes all observation modalities through the VLM under shared attention, so the action expert reasons directly over past triplets and the current observation. A block-causal mask enables parallel multi-frame training without leakage and supports KV-cached real-time inference. On standard LIBERO and SimplerEnv-Bridge, Reflective VLA preserves strong in-distribution performance. Under distribution shift on LIBERO-Plus and the harder LIBERO-Plus-Hard, it improves average success rate by 5.4 and 4.2 percentage points over a matched reactive baseline. Ablations with a matched history-only baseline further show that action consequences -- rather than additional context length alone -- are the key to cross-environment generalization. Project page: https://lianqing11.github.io/reflective-vla-page/", "arxiv_id": "2606.25215", "arxiv_url": "https://arxiv.org/abs/2606.25215", "authors": ["Qing Lian", "Kent Yu", "Lei Zhang"], "brief": "\u63d0\u51faReflective VLA\uff0c\u8ba9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u5728\u51b3\u7b56\u65f6\u53c2\u8003\u5386\u53f2\u300c\u89c2\u5bdf-\u52a8\u4f5c-\u7ed3\u679c\u300d\u4e09\u5143\u7ec4\uff0c\u4f7f\u673a\u5668\u4eba\u80fd\u611f\u77e5\u90e8\u7f72\u73af\u5883\u7279\u6709\u7684\u52a8\u4f5c\u6548\u679c\u6620\u5c04\u3002\u5728\u5206\u5e03\u504f\u79fb\u573a\u666f\u4e0b\uff0c\u76f8\u6bd4\u53cd\u5e94\u5f0f\u57fa\u7ebf\u5e73\u5747\u6210\u529f\u7387\u63d0\u53474-5\u4e2a\u767e\u5206\u70b9\uff0c\u6d88\u878d\u5b9e\u9a8c\u8bc1\u660e\u5173\u952e\u5728\u4e8e\u52a8\u4f5c\u540e\u679c\u4fe1\u606f\u800c\u975e\u5355\u7eaf\u589e\u52a0\u4e0a\u4e0b\u6587\u957f\u5ea6\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25215", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u5177\u8eab\u667a\u80fd", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u6cdb\u5316\u80fd\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25215v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Reflective VLA: In-Context Action Consequences Make VLAs Generalize", "tldr": "\u63d0\u51faReflective VLA\uff0c\u8ba9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u5728\u51b3\u7b56\u65f6\u53c2\u8003\u5386\u53f2\u300c\u89c2\u5bdf-\u52a8\u4f5c-\u7ed3\u679c\u300d\u4e09\u5143\u7ec4\uff0c\u4f7f\u673a\u5668\u4eba\u80fd\u611f\u77e5\u90e8\u7f72\u73af\u5883\u7279\u6709\u7684\u52a8\u4f5c\u6548\u679c\u6620\u5c04\u3002\u5728\u5206\u5e03\u504f\u79fb\u573a\u666f\u4e0b\uff0c\u76f8\u6bd4\u53cd\u5e94\u5f0f\u57fa\u7ebf\u5e73\u5747\u6210\u529f\u7387\u63d0\u53474-5\u4e2a\u767e\u5206\u70b9\uff0c\u6d88\u878d\u5b9e\u9a8c\u8bc1\u660e\u5173\u952e\u5728\u4e8e\u52a8\u4f5c\u540e\u679c\u4fe1\u606f\u800c\u975e\u5355\u7eaf\u589e\u52a0\u4e0a\u4e0b\u6587\u957f\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Visual storytelling aims to generate image sequences that are both aligned with narrative prompts and consistent in character appearance across images. Recent training-free methods improve character consistency by reusing attention features, but rely on structured prompts where full character descriptions are repeated in every prompt. This assumption simplifies the task but deviates from natural storytelling, where characters are typically introduced once and later referred to using pronouns or type-based expressions. We propose \\textbf{FreeStory}, a training-free framework that reformulates character consistency under free-form prompts as entity-grounded feature reuse. Our method associates reference mentions with their corresponding character descriptions and combines dynamic character masks, correspondence-aware feature matching, key-value injection, and query blending to preserve identity while retaining generation diversity. We also introduce \\textbf{FreeStoryBench}, a benchmark for this setting that includes both single- and multi-character stories. Experiments show that FreeStory achieves state-of-the-art performance among training-free methods on structured benchmarks and stronger overall consistency over baselines under free-form prompts.", "arxiv_id": "2606.25079", "arxiv_url": "https://arxiv.org/abs/2606.25079", "authors": ["Sibo Dong", "Ismail Shaheen", "Sarah Adel Bargal"], "brief": "FreeStory\u662f\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u89c6\u89c9\u6545\u4e8b\u751f\u6210\u6846\u67b6\uff0c\u89e3\u51b3\u4e86\u81ea\u7531\u5f62\u5f0f\u63d0\u793a\u8bcd\uff08\u89d2\u8272\u7528\u4ee3\u8bcd\u6216\u7c7b\u578b\u8868\u8fbe\u5f15\u7528\uff09\u4e0b\u7684\u89d2\u8272\u5916\u89c2\u4e00\u81f4\u6027\u95ee\u9898\u3002\u901a\u8fc7\u5b9e\u4f53\u5173\u8054\u7279\u5f81\u590d\u7528\u3001\u52a8\u6001\u89d2\u8272\u63a9\u7801\u548c\u952e\u503c\u6ce8\u5165\u7b49\u673a\u5236\uff0c\u5728\u4fdd\u6301\u89d2\u8272\u8eab\u4efd\u7684\u540c\u65f6\u4fdd\u7559\u751f\u6210\u591a\u6837\u6027\uff0c\u5728\u7ed3\u6784\u5316\u548c\u81ea\u7531\u5f62\u5f0f\u63d0\u793a\u8bcd\u57fa\u51c6\u4e0a\u5747\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25079", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u6545\u4e8b\u751f\u6210", "\u89d2\u8272\u4e00\u81f4\u6027", "\u65e0\u8bad\u7ec3\u65b9\u6cd5", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25079v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "FreeStory: Training-Free Character Consistency for Free-Form Visual Storytelling", "tldr": "FreeStory\u662f\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u89c6\u89c9\u6545\u4e8b\u751f\u6210\u6846\u67b6\uff0c\u89e3\u51b3\u4e86\u81ea\u7531\u5f62\u5f0f\u63d0\u793a\u8bcd\uff08\u89d2\u8272\u7528\u4ee3\u8bcd\u6216\u7c7b\u578b\u8868\u8fbe\u5f15\u7528\uff09\u4e0b\u7684\u89d2\u8272\u5916\u89c2\u4e00\u81f4\u6027\u95ee\u9898\u3002\u901a\u8fc7\u5b9e\u4f53\u5173\u8054\u7279\u5f81\u590d\u7528\u3001\u52a8\u6001\u89d2\u8272\u63a9\u7801\u548c\u952e\u503c\u6ce8\u5165\u7b49\u673a\u5236\uff0c\u5728\u4fdd\u6301\u89d2\u8272\u8eab\u4efd\u7684\u540c\u65f6\u4fdd\u7559\u751f\u6210\u591a\u6837\u6027\uff0c\u5728\u7ed3\u6784\u5316\u548c\u81ea\u7531\u5f62\u5f0f\u63d0\u793a\u8bcd\u57fa\u51c6\u4e0a\u5747\u8fbe\u5230\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Camera-prompted text-to-video (T2V) models are increasingly used to synthesize virtual camera captures, such as orbiting objects or moving through static scenes. For these outputs, visual plausibility is insufficient: the generated frames should also provide coherent multi-view evidence for a single static 3D scene. We introduce GeoT2V-Bench, a reconstruction-based diagnostic benchmark for evaluating whether camera-prompted T2V clips can support explicit rigid 3D reconstruction. Our pipeline estimates per-frame camera intrinsics and poses with VGGT-style geometry estimation, fits DeformableGS, derives a static MedianGS proxy by temporal-median aggregation, and renders this proxy along the estimated camera path. Instead of producing a pass/fail label or a single scalar score, GeoT2V-Bench reports a continuous reconstruction profile covering apparent image motion, estimated trajectory behavior, MedianGS static rendering error, static-render flow agreement, and the gap between flexible and static fits. On a fair-format four-seed evaluation with 3,840 completed reconstructions from 12 open-weight model configurations and 80 GeCo-Eval static-scene prompts, we find that visible motion, static rendering error, flow agreement, and flexible-vs-static behavior often disagree. GeoT2V-Bench therefore captures complementary failure modes that emerge when generated videos are tested as global static-scene acquisitions.", "arxiv_id": "2606.24829", "arxiv_url": "https://arxiv.org/abs/2606.24829", "authors": ["Chenrui Fan", "Paolo Favaro"], "brief": "\u63d0\u51faGeoT2V-Bench\u57fa\u51c6\uff0c\u901a\u8fc7\u4e09\u7ef4\u91cd\u5efa\u8bc4\u4f30\u6587\u672c\u751f\u6210\u89c6\u9891\u6a21\u578b\u76843D\u4e00\u81f4\u6027\u3002\u5229\u7528\u76f8\u673a\u59ff\u6001\u4f30\u8ba1\u3001\u53ef\u53d8\u5f62\u9ad8\u65af\u6e85\u5c04\u7b49\u6280\u672f\uff0c\u5bf912\u4e2a\u5f00\u6e90\u6a21\u578b\u914d\u7f6e\u8fdb\u884c3840\u6b21\u91cd\u5efa\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u89c6\u9891\u5e27\u4f5c\u4e3a\u9759\u6001\u573a\u666f\u591a\u89c6\u89d2\u8bc1\u636e\u65f6\u7684\u591a\u79cd\u5931\u6548\u6a21\u5f0f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24829", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u751f\u6210\u89c6\u9891", "\u4e09\u7ef4\u91cd\u5efa", "\u591a\u89c6\u89d2\u4e00\u81f4\u6027", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24829v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GeoT2V-Bench: Benchmarking 3D Consistency in Text-to-Video Models via 3D Reconstruction", "tldr": "\u63d0\u51faGeoT2V-Bench\u57fa\u51c6\uff0c\u901a\u8fc7\u4e09\u7ef4\u91cd\u5efa\u8bc4\u4f30\u6587\u672c\u751f\u6210\u89c6\u9891\u6a21\u578b\u76843D\u4e00\u81f4\u6027\u3002\u5229\u7528\u76f8\u673a\u59ff\u6001\u4f30\u8ba1\u3001\u53ef\u53d8\u5f62\u9ad8\u65af\u6e85\u5c04\u7b49\u6280\u672f\uff0c\u5bf912\u4e2a\u5f00\u6e90\u6a21\u578b\u914d\u7f6e\u8fdb\u884c3840\u6b21\u91cd\u5efa\u5b9e\u9a8c\uff0c\u63ed\u793a\u4e86\u89c6\u9891\u5e27\u4f5c\u4e3a\u9759\u6001\u573a\u666f\u591a\u89c6\u89d2\u8bc1\u636e\u65f6\u7684\u591a\u79cd\u5931\u6548\u6a21\u5f0f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-Language Large Models (VLLMs) trained on massive crawled corpora raise pressing copyright and data-provenance concerns. These concerns are particularly acute in healthcare, where patient medical images paired with clinical reports demand rigorous privacy safeguards. However, existing training data detection methods either fail in cross-modal scenarios or rely on superficial output signals with insufficient discriminative power. We introduce GradAudit, a gradient-based auditing framework that examines internal optimization dynamics rather than treating VLLMs as black boxes. Our approach builds on a key observation: model parameters converge to regions where gradients on training samples become stable and well-aligned, whereas gradients on non-training samples remain noisy and inconsistent. By analyzing these gradient signatures, GradAudit achieves strong separability and detects genuine image-text associations learned during training, not merely individual modality membership. Empirically, across both medical and general-domain datasets, GradAudit substantially outperforms state-of-the-art baselines in both pretraining and fine-tuning VLLMs. In a case study employing copyrighted content, we show that existing training data detection methods not only underestimate the extent of unauthorized data usage, but that this underestimation becomes more pronounced as models become more recent and more advanced.", "arxiv_id": "2606.24774", "arxiv_url": "https://arxiv.org/abs/2606.24774", "authors": ["Zhihao Zhu", "Hongyi Tang", "Yi Yang", "Ahmed Abbasi"], "brief": "\u63d0\u51faGradAudit\u6846\u67b6\uff0c\u901a\u8fc7\u5206\u6790\u89c6\u89c9\u8bed\u8a00\u5927\u6a21\u578b\u7684\u53c2\u6570\u68af\u5ea6\u6765\u68c0\u6d4b\u8bad\u7ec3\u6570\u636e\u662f\u5426\u88ab\u4f7f\u7528\u3002\u6838\u5fc3\u89c2\u5bdf\u662f\u8bad\u7ec3\u6837\u672c\u7684\u68af\u5ea6\u7a33\u5b9a\u4e14\u5bf9\u9f50\uff0c\u800c\u975e\u8bad\u7ec3\u6837\u672c\u7684\u68af\u5ea6\u5219\u566a\u58f0\u5927\u4e14\u4e0d\u4e00\u81f4\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u533b\u7597\u548c\u901a\u7528\u9886\u57df\u5747\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\uff0c\u5e76\u63ed\u793a\u73b0\u6709\u65b9\u6cd5\u4f4e\u4f30\u4e86\u672a\u6388\u6743\u6570\u636e\u7684\u4f7f\u7528\u7a0b\u5ea6\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24774", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u8bad\u7ec3\u6570\u636e\u68c0\u6d4b", "\u9690\u79c1\u4fdd\u62a4", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24774v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Revealing Training Data Exposure in Vision Language Large Models via Parameter Gradients", "tldr": "\u63d0\u51faGradAudit\u6846\u67b6\uff0c\u901a\u8fc7\u5206\u6790\u89c6\u89c9\u8bed\u8a00\u5927\u6a21\u578b\u7684\u53c2\u6570\u68af\u5ea6\u6765\u68c0\u6d4b\u8bad\u7ec3\u6570\u636e\u662f\u5426\u88ab\u4f7f\u7528\u3002\u6838\u5fc3\u89c2\u5bdf\u662f\u8bad\u7ec3\u6837\u672c\u7684\u68af\u5ea6\u7a33\u5b9a\u4e14\u5bf9\u9f50\uff0c\u800c\u975e\u8bad\u7ec3\u6837\u672c\u7684\u68af\u5ea6\u5219\u566a\u58f0\u5927\u4e14\u4e0d\u4e00\u81f4\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u533b\u7597\u548c\u901a\u7528\u9886\u57df\u5747\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u57fa\u7ebf\uff0c\u5e76\u63ed\u793a\u73b0\u6709\u65b9\u6cd5\u4f4e\u4f30\u4e86\u672a\u6388\u6743\u6570\u636e\u7684\u4f7f\u7528\u7a0b\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Pointing-based visual grounding requires models to precisely locate target objects by deciphering complex spatial relationships between the visual scene and pointing gestures. Traditional methods typically encode input images into static feature representations and perform reasoning primarily within the linguistic domain, often overlooking the rich perceptual cues and explicit spatial geometry inherent in images. In this study, we aim to mitigate the cognitive vulnerability of models in interpreting gestural spatial relations by proposing PointVG-R, a reasoning-guided Multi-modal Large Language Model (MLLM). PointVG-R introduces geometric-aware reasoning for pointing-based grounding, enabling the model to think with images through the strategic integration of Reinforcement Learning (RL) and cold-start data. Specifically, we design a novel geometric reasoning pipeline that simulates the iterative cognitive process humans employ when interpreting pointing gestures. Furthermore, we construct EgoPoint-CoT, a high-quality visual Chain-of-Thought (CoT) dataset featuring detailed reasoning trajectories to guide the model via Supervised Fine-Tuning (SFT) and RL. To address the varying quality of learning signals encountered during training, we further propose an Adaptive Importance Weighting strategy based on Group Variance, which dynamically adjusts reward signals to optimize the learning process. Experimental results demonstrate that PointVG-R achieves SOTA performance, outperforming the baseline by $\\textbf{15.86}$ points in mIoU. Extensive ablation studies further validate the efficacy of our proposed modules. Code: https://github.com/lingli1724/PointVG-R.", "arxiv_id": "2606.24539", "arxiv_url": "https://arxiv.org/abs/2606.24539", "authors": ["Ling Li", "Bowen Liu", "Zinuo Zhan", "Jianhui Zhong", "Ziyu Zhu", "Bingcai Wei", "Kenglun Chang", "Zhidong Deng"], "brief": "\u63d0\u51faPointVG-R\uff0c\u4e00\u79cd\u57fa\u4e8e\u51e0\u4f55\u611f\u77e5\u63a8\u7406\u7684\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u7528\u4e8e\u624b\u52bf\u6307\u5411\u89c6\u89c9\u5b9a\u4f4d\u4efb\u52a1\u3002\u901a\u8fc7\u6784\u5efa\u89c6\u89c9\u601d\u7ef4\u94fe\u6570\u636e\u96c6EgoPoint-CoT\uff0c\u7ed3\u5408\u76d1\u7763\u5fae\u8c03\u4e0e\u5f3a\u5316\u5b66\u4e60\uff0c\u5e76\u5f15\u5165\u57fa\u4e8e\u7ec4\u65b9\u5dee\u7684\u81ea\u9002\u5e94\u91cd\u8981\u6027\u52a0\u6743\u7b56\u7565\uff0c\u6a21\u578b\u5728mIoU\u4e0a\u8d85\u8d8a\u57fa\u7ebf15.86\u4e2a\u767e\u5206\u70b9\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24539", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u89c6\u89c9\u5b9a\u4f4d", "\u5f3a\u5316\u5b66\u4e60", "\u601d\u7ef4\u94fe\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24539v1", "published_at": "2026-06-23", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PointVG-R: Internalizing Geometric Reasoning in MLLMs for Precise Pointing Localization via Visual Chain of Thought", "tldr": "\u63d0\u51faPointVG-R\uff0c\u4e00\u79cd\u57fa\u4e8e\u51e0\u4f55\u611f\u77e5\u63a8\u7406\u7684\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u7528\u4e8e\u624b\u52bf\u6307\u5411\u89c6\u89c9\u5b9a\u4f4d\u4efb\u52a1\u3002\u901a\u8fc7\u6784\u5efa\u89c6\u89c9\u601d\u7ef4\u94fe\u6570\u636e\u96c6EgoPoint-CoT\uff0c\u7ed3\u5408\u76d1\u7763\u5fae\u8c03\u4e0e\u5f3a\u5316\u5b66\u4e60\uff0c\u5e76\u5f15\u5165\u57fa\u4e8e\u7ec4\u65b9\u5dee\u7684\u81ea\u9002\u5e94\u91cd\u8981\u6027\u52a0\u6743\u7b56\u7565\uff0c\u6a21\u578b\u5728mIoU\u4e0a\u8d85\u8d8a\u57fa\u7ebf15.86\u4e2a\u767e\u5206\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
