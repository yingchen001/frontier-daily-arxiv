ation), a training-free framework pairing a reasoning LLM with compact repository tools and self-recovery, without fine-tuning or multi-agent orchestration. SHERLOC reaches state-of-the-art localization across model scales: 84.33% accuracy@1 on SWE-Bench Lite and 81.27% recall@1 on SWE-Bench Verified; at ~30B parameters, it matches or outperforms other agentic methods. Injecting our locations and diagnostic findings into repair agents yields, on average, +5.95 pp resolve rate on SWE-Bench Verified while cutting localization and total tokens by 36.7% and 23.1%.", "arxiv_id": "2606.24820", "arxiv_url": "https://arxiv.org/abs/2606.24820", "authors": ["Hovhannes Tamoyan", "Sean Narenthiran", "Erik Arakelyan", "Mira Mezini", "Boris Ginsburg"], "brief": "SHERLOC\u662f\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u7ed3\u6784\u5316\u6545\u969c\u8bca\u65ad\u5b9a\u4f4d\u6846\u67b6\uff0c\u901a\u8fc7\u5047\u8bbe\u9a71\u52a8\u7684\u63a8\u7406\u4e0e\u7d27\u51d1\u4ed3\u5e93\u5de5\u5177\u914d\u5408\uff0c\u4e3a\u4ee3\u7801\u4fee\u590d\u667a\u80fd\u4f53\u63d0\u4f9b\u5e26\u8bca\u65ad\u4e0a\u4e0b\u6587\u7684\u7cbe\u51c6\u6545\u969c\u4f4d\u7f6e\uff0c\u800c\u975e\u4ec5\u8fd4\u56de\u6587\u4ef6\u8def\u5f84\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24820", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5728SWE-Bench Lite\u4e0a\u8fbe\u523084.33% accuracy@1\uff0cSWE-Bench Verified\u4e0a\u8fbe\u523081.27% recall@1\uff0c\u5237\u65b0\u5b9a\u4f4dSOTA", "\u7ea630B\u53c2\u6570\u89c4\u6a21\u4e0b\u5373\u53ef\u5339\u654c\u6216\u8d85\u8d8a\u5176\u4ed6\u667a\u80fd\u4f53\u65b9\u6cd5\uff0c\u65e0\u9700\u5fae\u8c03\u6216\u591a\u667a\u80fd\u4f53\u7f16\u6392", "\u5c06\u8bca\u65ad\u7ed3\u679c\u6ce8\u5165\u4fee\u590d\u667a\u80fd\u4f53\u540e\uff0c\u5e73\u5747\u89e3\u51b3\u7387\u63d0\u5347+5.95pp\uff0c\u5b9a\u4f4dtoken\u51cf\u5c1136.7%\uff0c\u603btoken\u51cf\u5c1123.1%"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "LLM\u63a8\u7406", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24820v1", "published_at": "2026-06-23", "score": 0.5, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SHERLOC: Structured Diagnostic Localization for Code Repair Agents", "upvotes": 0, "what_it_is": "SHERLOC\u662f\u4e00\u4e2a\u65e0\u9700\u8bad\u7ec3\u7684\u7ed3\u6784\u5316\u6545\u969c\u8bca\u65ad\u5b9a\u4f4d\u6846\u67b6\uff0c\u901a\u8fc7\u5047\u8bbe\u9a71\u52a8\u7684\u63a8\u7406\u4e0e\u7d27\u51d1\u4ed3\u5e93\u5de5\u5177\u914d\u5408\uff0c\u4e3a\u4ee3\u7801\u4fee\u590d\u667a\u80fd\u4f53\u63d0\u4f9b\u5e26\u8bca\u65ad\u4e0a\u4e0b\u6587\u7684\u7cbe\u51c6\u6545\u969c\u4f4d\u7f6e\uff0c\u800c\u975e\u4ec5\u8fd4\u56de\u6587\u4ef6\u8def\u5f84\u3002", "why_notable": "\u9996\u6b21\u5c06\u6545\u969c\u5b9a\u4f4d\u4ece\u6587\u4ef6\u68c0\u7d22\u5347\u7ea7\u4e3a\u5e26\u8bca\u65ad\u4e0a\u4e0b\u6587\u7684\u53ef\u64cd\u4f5c\u8bca\u65ad\uff0c\u663e\u8457\u63d0\u5347\u4e0b\u6e38\u4fee\u590d\u6548\u679c\u7684\u540c\u65f6\u5927\u5e45\u964d\u4f4e\u8ba1\u7b97\u5f00\u9500\uff0c\u5bf9\u4ee3\u7801\u667a\u80fd\u4f53\u5b9e\u7528\u5316\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Agentic language models dramatically expand the applications of AI yet little is publicly known about how to curate training data for broadly capable agents. Existing open efforts such as SWE-Smith, SERA, and Nemotron-Terminal typically target a single benchmark, leaving open the question of how to train models that generalize across diverse agentic tasks. The OpenThoughts-Agent (OT-Agent) project addresses this gap with a fully open data curation pipeline for training agentic models. We conduct more than 100 controlled ablation experiments to systematically investigate each stage of the pipeline, yielding insights on the importance of task sources and diversity. We then assemble a training set of 100K examples from our pipeline and fine-tune Qwen3-32B on this dataset, which yields an average accuracy of 44.8% across seven agentic benchmarks and a 3.9 percentage point improvement over the strongest existing open data agentic model (Nemotron-Terminal-32B, 40.9%). Moreover, our training data exhibits strong scaling properties, outperforming alternative open datasets at every training set size in compute-controlled comparisons. We publicly release our training sets, data pipeline, experimental data, and models at openthoughts.ai to support future open research on agentic model training.", "arxiv_id": "2606.24855", "arxiv_url": "https://arxiv.org/abs/2606.24855", "authors": ["Negin Raoof", "Richard Zhuang", "Marianna Nezhurina", "Etash Guha", "Atula Tejaswi", "Ryan Marten", "Charlie F. Ruan", "Tyler Griggs", "Alexander Glenn Shaw", "Hritik Bansal", "E. Kelly Buchanan", "Artem Gazizov", "Reinhard Heckel", "Chinmay Hegde", "Sankalp Jajee", "Daanish Khazi", "Emmanouil Koukoumidis", "Xiangyi Li", "Hange Liu", "Shlok Natarajan", "Harsh Raj", "Nicholas Roberts", "Ethan Shen", "Nishad Singhi", "Michael Siu", "Ashima Suvarna", "Hanwen Xing", "Patrick Yubeaton", "Robert Zhang", "Leon Liangyu Chen", "Xiaokun Chen", "Steven Dillmann", "Saadia Gabriel", "Xunyi Jiang", "Anurag Kashyap", "Boxuan Li", "Yein Park", "Minh Pham", "Sujay Sanghavi", "Lin Shi", "Ke Sun", "Yixin Wang", "Zhiwei Xu", "Erica Zhang", "Siyan Zhao", "Wanjia Zhao", "Jenia Jitsev", "Alex Dimakis", "Benjamin Feuer", "Ludwig Schmidt"], "brief": "\u672c\u6587\u63d0\u51faOT-Agent\u9879\u76ee\uff0c\u6784\u5efa\u4e86\u4e00\u5957\u5b8c\u5168\u5f00\u653e\u7684\u667a\u80fd\u4f53\u6a21\u578b\u8bad\u7ec3\u6570\u636e\u7b5b\u9009\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7100+\u6d88\u878d\u5b9e\u9a8c\u7cfb\u7edf\u7814\u7a76\u6570\u636e\u914d\u65b9\uff0c\u5e76\u57287\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u6700\u5f3a\u5f00\u6e90\u6570\u636e\u6a21\u578b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24855", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u8fdb\u884c100+\u53d7\u63a7\u6d88\u878d\u5b9e\u9a8c\uff0c\u7cfb\u7edf\u7814\u7a76\u4efb\u52a1\u6765\u6e90\u591a\u6837\u6027\u5bf9\u667a\u80fd\u4f53\u6cdb\u5316\u80fd\u529b\u7684\u5f71\u54cd", "\u57fa\u4e8e100K\u8bad\u7ec3\u6837\u672c\u5fae\u8c03Qwen3-32B\uff0c\u57287\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u5e73\u5747\u51c6\u786e\u738744.8%\uff0c\u6bd4Nemotron-Terminal-32B\u9ad83.9\u4e2a\u767e\u5206\u70b9", "\u8bad\u7ec3\u6570\u636e\u5177\u6709\u5f3a\u6269\u5c55\u6027\uff0c\u5728\u8ba1\u7b97\u91cf\u53d7\u63a7\u7684\u5bf9\u6bd4\u4e2d\uff0c\u5404\u8bad\u7ec3\u96c6\u89c4\u6a21\u4e0b\u5747\u4f18\u4e8e\u5176\u4ed6\u5f00\u6e90\u6570\u636e\u96c6"], "keywords": ["\u667a\u80fd\u4f53", "\u6570\u636e\u914d\u65b9", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f00\u6e90"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24855v1", "published_at": "2026-06-23", "score": 0.44, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (31\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.24855.png", "title": "OpenThoughts-Agent: Data Recipes for Agentic Models", "upvotes": 31, "what_it_is": "\u672c\u6587\u63d0\u51faOT-Agent\u9879\u76ee\uff0c\u6784\u5efa\u4e86\u4e00\u5957\u5b8c\u5168\u5f00\u653e\u7684\u667a\u80fd\u4f53\u6a21\u578b\u8bad\u7ec3\u6570\u636e\u7b5b\u9009\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7100+\u6d88\u878d\u5b9e\u9a8c\u7cfb\u7edf\u7814\u7a76\u6570\u636e\u914d\u65b9\uff0c\u5e76\u57287\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u4e0a\u8d85\u8d8a\u73b0\u6709\u6700\u5f3a\u5f00\u6e90\u6570\u636e\u6a21\u578b\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u7814\u7a76\u8de8\u4efb\u52a1\u901a\u7528\u667a\u80fd\u4f53\u8bad\u7ec3\u6570\u636e\u914d\u65b9\u7684\u5f00\u6e90\u9879\u76ee\uff0c\u586b\u8865\u4e86\u73b0\u6709\u5de5\u4f5c\u4ec5\u9488\u5bf9\u5355\u4e00\u57fa\u51c6\u7684\u7a7a\u767d\uff0c\u5b8c\u6574\u5f00\u653e\u6570\u636e\u96c6\u3001\u6d41\u6c34\u7ebf\u548c\u6a21\u578b\uff0c\u5bf9\u793e\u533a\u63a8\u8fdb\u667a\u80fd\u4f53\u8bad\u7ec3\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Process reward models enable fine-grained, step-level evaluation of LLMs, yet building them for agentic settings remains prohibitively difficult: long-horizon interactions, irreversible actions, and stochastic environment feedback make both human annotation and Monte Carlo estimation infeasible at scale. In this work, we show that reinforcement learning (RL) post-training already provides the ingredients for effective step-level scoring, eliminating the need for dedicated reward model training altogether. Concretely, we derive an implicit advantage under a general stochastic Markov decision process, which we term progress advantage -- log-probability ratio between the RL-trained policy and its reference policy exactly recovers the optimal advantage function. This formulation makes the resulting signal annotation-free, domain-agnostic, and available as a byproduct of the standard RL post-training pipeline. We validate the effectiveness of the progress advantage across three different applications: test-time scaling, uncertainty quantification, and failure attribution on five benchmarks and four model families. Across all settings, it consistently outperforms confidence-based baselines and, despite requiring no task-specific training, surpasses dedicated trained reward models. We complement these results with deeper analyses on characteristics of progress advantage, offering practical guidance for adoption in real-world agentic systems.", "arxiv_id": "2606.26080", "arxiv_url": "https://arxiv.org/abs/2606.26080", "authors": ["Changdae Oh", "Wendi Li", "Seongheon Park", "Samuel Yeh", "Tanwi Mallick", "Sharon Li"], "brief": "\u672c\u6587\u63d0\u51fa\"\u8fdb\u5ea6\u4f18\u52bf\"\uff08Progress Advantage\uff09\u6982\u5ff5\uff0c\u8bc1\u660eRL\u540e\u8bad\u7ec3\u4e2d\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684\u5bf9\u6570\u6982\u7387\u6bd4\u53ef\u7cbe\u786e\u6062\u590d\u6700\u4f18\u4f18\u52bf\u51fd\u6570\uff0c\u4ece\u800c\u65e0\u9700\u989d\u5916\u6807\u6ce8\u6216\u8bad\u7ec3\u5373\u53ef\u83b7\u5f97\u9ad8\u8d28\u91cf\u7684\u6b65\u9aa4\u7ea7\u8bc4\u5206\u4fe1\u53f7\uff0c\u7528\u4e8eLLM\u667a\u80fd\u4f53\u7684\u8bc4\u4f30\u4e0e\u4f18\u5316\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26080", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7406\u8bba\u63a8\u5bfc\uff1a\u5728\u968f\u673aMDP\u6846\u67b6\u4e0b\uff0cRL\u8bad\u7ec3\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684\u5bf9\u6570\u6982\u7387\u6bd4\u7b49\u4ef7\u4e8e\u6700\u4f18\u4f18\u52bf\u51fd\u6570", "\u96f6\u6210\u672c\u83b7\u53d6\uff1a\u8fdb\u5ea6\u4f18\u52bf\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u3001\u65e0\u9700\u8499\u7279\u5361\u6d1b\u4f30\u8ba1\uff0c\u662f\u6807\u51c6RL\u540e\u8bad\u7ec3\u7684\u526f\u4ea7\u54c1", "\u5728\u6d4b\u8bd5\u65f6\u6269\u5c55\u3001\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u3001\u5931\u8d25\u5f52\u56e0\u4e09\u7c7b\u4efb\u52a1\u4e0a\uff0c\u8de85\u4e2a\u57fa\u51c6\u548c4\u4e2a\u6a21\u578b\u65cf\u5747\u4f18\u4e8e\u7f6e\u4fe1\u5ea6\u57fa\u7ebf\u53ca\u4e13\u7528\u5956\u52b1\u6a21\u578b"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26080v1", "published_at": "2026-06-24", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Neglected Free Lunch from Post-training: Progress Advantage for LLM Agents", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u8fdb\u5ea6\u4f18\u52bf\"\uff08Progress Advantage\uff09\u6982\u5ff5\uff0c\u8bc1\u660eRL\u540e\u8bad\u7ec3\u4e2d\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684\u5bf9\u6570\u6982\u7387\u6bd4\u53ef\u7cbe\u786e\u6062\u590d\u6700\u4f18\u4f18\u52bf\u51fd\u6570\uff0c\u4ece\u800c\u65e0\u9700\u989d\u5916\u6807\u6ce8\u6216\u8bad\u7ec3\u5373\u53ef\u83b7\u5f97\u9ad8\u8d28\u91cf\u7684\u6b65\u9aa4\u7ea7\u8bc4\u5206\u4fe1\u53f7\uff0c\u7528\u4e8eLLM\u667a\u80fd\u4f53\u7684\u8bc4\u4f30\u4e0e\u4f18\u5316\u3002", "why_notable": "\u89e3\u51b3\u4e86\u667a\u80fd\u4f53\u573a\u666f\u4e0b\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\u96be\u4ee5\u6784\u5efa\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u63d0\u4f9b\u4e86\u4e00\u79cd\u7406\u8bba\u4e25\u8c28\u3001\u5b9e\u8df5\u96f6\u6210\u672c\u7684\u6b65\u9aa4\u7ea7\u8bc4\u5206\u65b9\u6848\uff0c\u5bf9LLM\u667a\u80fd\u4f53\u7684\u63a8\u7406\u3001\u8c03\u8bd5\u548c\u90e8\u7f72\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "As autonomous agents tackle increasingly complex multi-step, multi-agent tasks, their execution trajectories have scaled beyond the constraints of even the largest context windows. Current methods for effectively diagnosing agent failures load the full trajectory into an LLM\u0027s context window, which suffers from attention dilution and fails when agentic traces inevitably exceed context limits. To address this, we introduce SAFARI (Scaling long-horizon Agentic Fault AttRibution via active Investigation), a framework that replaces linear context loading with a tool-augmented diagnostic loop. By equipping LLMs with a specialized toolbox to read and search trajectory segments alongside a persistent Short-Term Memory (STM) for cross-turn reasoning, SAFARI effectively decouples diagnostic accuracy from architectural context limits. Our experiments demonstrate that SAFARI outperforms state-of-the-art results by 20% on the Who\u0026When dataset within a 1M token budget, and by 19% on TRAIL GAIA subset on a 25K token budget. Most significantly, SAFARI maintains a 0.58 precision even when the target fault resides 5x beyond the model\u0027s native context window, a scenario where traditional evaluators fail entirely.", "arxiv_id": "2606.24626", "arxiv_url": "https://arxiv.org/abs/2606.24626", "authors": ["Chenyang Zhu", "Jiayu Yao", "Kushal Chawla", "Youbing Yin", "Nathan Wolfe", "Pengshan Cai", "Jingyu Wu", "Spencer Hong", "Sangwoo Cho", "Shi-Xiong Zhang", "Daben Liu", "Sambit Sahu", "Erin Babinsky"], "brief": "SAFARI\u662f\u4e00\u4e2a\u9488\u5bf9\u591a\u6b65\u9aa4\u3001\u591a\u667a\u80fd\u4f53\u4efb\u52a1\u6545\u969c\u5f52\u56e0\u7684\u6846\u67b6\uff0c\u901a\u8fc7\u5de5\u5177\u589e\u5f3a\u7684\u8bca\u65ad\u5faa\u73af\u548c\u77ed\u671f\u8bb0\u5fc6\u673a\u5236\uff0c\u65e0\u9700\u5c06\u5b8c\u6574\u8f68\u8ff9\u52a0\u8f7d\u8fdb\u4e0a\u4e0b\u6587\u7a97\u53e3\u5373\u53ef\u5b9a\u4f4d\u6545\u969c\u6839\u56e0\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24626", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5f15\u5165\u4e13\u7528\u5de5\u5177\u7bb1\uff08\u8bfb\u53d6/\u641c\u7d22\u8f68\u8ff9\u7247\u6bb5\uff09+ \u77ed\u671f\u8bb0\u5fc6\uff08STM\uff09\u5b9e\u73b0\u8de8\u8f6e\u63a8\u7406\uff0c\u5c06\u8bca\u65ad\u7cbe\u5ea6\u4e0e\u4e0a\u4e0b\u6587\u7a97\u53e3\u5927\u5c0f\u89e3\u8026", "\u5728Who\u0026When\u6570\u636e\u96c6\u4e0a\u4ee51M token\u9884\u7b97\u8d85\u8d8aSOTA 20%\uff0c\u5728TRAIL GAIA\u5b50\u96c6\u4e0a\u4ee525K token\u9884\u7b97\u8d85\u8d8a19%", "\u5f53\u76ee\u6807\u6545\u969c\u4f4d\u4e8e\u6a21\u578b\u539f\u751f\u4e0a\u4e0b\u6587\u7a97\u53e35\u500d\u4e4b\u5916\u65f6\uff0c\u4ecd\u4fdd\u63010.58\u7cbe\u5ea6\uff0c\u800c\u4f20\u7edf\u65b9\u6cd5\u5b8c\u5168\u5931\u6548"], "keywords": ["\u667a\u80fd\u4f53", "\u6545\u969c\u5f52\u56e0", "\u957f\u4e0a\u4e0b\u6587", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24626v1", "published_at": "2026-06-23", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SAFARI: Scaling Long Horizon Agentic Fault Attribution via Active Investigation", "upvotes": 0, "what_it_is": "SAFARI\u662f\u4e00\u4e2a\u9488\u5bf9\u591a\u6b65\u9aa4\u3001\u591a\u667a\u80fd\u4f53\u4efb\u52a1\u6545\u969c\u5f52\u56e0\u7684\u6846\u67b6\uff0c\u901a\u8fc7\u5de5\u5177\u589e\u5f3a\u7684\u8bca\u65ad\u5faa\u73af\u548c\u77ed\u671f\u8bb0\u5fc6\u673a\u5236\uff0c\u65e0\u9700\u5c06\u5b8c\u6574\u8f68\u8ff9\u52a0\u8f7d\u8fdb\u4e0a\u4e0b\u6587\u7a97\u53e3\u5373\u53ef\u5b9a\u4f4d\u6545\u969c\u6839\u56e0\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u89e3\u51b3\u8d85\u957f\u667a\u80fd\u4f53\u8f68\u8ff9\u6545\u969c\u5f52\u56e0\u95ee\u9898\uff0c\u7a81\u7834\u4e0a\u4e0b\u6587\u7a97\u53e3\u786c\u9650\u5236\uff0c\u5bf9\u6784\u5efa\u53ef\u9760\u81ea\u4e3b\u667a\u80fd\u4f53\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Tool use enables large language models (LLMs) to perform complex tasks, and recent agentic reinforcement learning (RL) methods show promise for enhancing model capabilities. However, RL alone often leads to instability or limited gains in tool-use tasks. In our experiments, some models exhibit catastrophic collapse, where performance abruptly drops and tool-invocation structures fail. The analysis reveals that these failures stem from unexpected probability spikes in specific control tokens, disrupting structured execution, yet the underlying tool-use capability remains intact, merely obscured by specific formats. To address this, we systematically investigate a diverse set of supervisory signals, including off-policy supervision, hint-based guidance, erroneous example supervision, and others, applied under both synchronous and interleaved training schemes. We find that interleaving supervised fine-tuning (SFT) with RL substantially improves stability, but exhibits degraded performance under format and content out-of-distribution (OOD) evaluation. We also analyze the impact of learning rates and generalization across settings. These results highlight the importance of understanding RL failures and demonstrate how diverse supervisory signals can guide exploratory learning, enabling robust training of LLMs for complex, multi-step tool-use tasks. Our Code is available at https://github.com/hypasd-art/Tool-RL-Box.", "arxiv_id": "2606.26027", "arxiv_url": "https://arxiv.org/abs/2606.26027", "authors": ["Yupu Hao", "Zhuoran Jin", "Huanxuan Liao", "Kang Liu", "Jun Zhao"], "brief": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86LLM\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u51fa\u73b0\u7684\u707e\u96be\u6027\u5d29\u6e83\u73b0\u8c61\uff0c\u53d1\u73b0\u6839\u56e0\u662f\u7279\u5b9a\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u98d9\u5347\u5bfc\u81f4\u7ed3\u6784\u5316\u6267\u884c\u5931\u8d25\uff0c\u5e76\u63d0\u51fa\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff08\u79bb\u7ebf\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\uff09\u4e0eSFT\u4ea4\u66ff\u8bad\u7ec3\u6765\u7a33\u5b9a\u8bad\u7ec3\u8fc7\u7a0b\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26027", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5d29\u6e83\u6839\u56e0\uff1a\u7279\u5b9a\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u5c16\u5cf0\u7834\u574f\u5de5\u5177\u8c03\u7528\u683c\u5f0f\uff0c\u4f46\u5e95\u5c42\u5de5\u5177\u4f7f\u7528\u80fd\u529b\u4ecd\u5b8c\u597d", "SFT\u4e0eRL\u4ea4\u66ff\u8bad\u7ec3\uff08interleaved\uff09\u663e\u8457\u63d0\u5347\u7a33\u5b9a\u6027\uff0c\u4f46\u5728\u683c\u5f0f\u548c\u5185\u5bb9OOD\u8bc4\u4f30\u4e0b\u6027\u80fd\u4e0b\u964d", "\u7cfb\u7edf\u5bf9\u6bd4\u4e86\u79bb\u7ebf\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\u5728\u540c\u6b65/\u4ea4\u66ff\u8bad\u7ec3\u65b9\u6848\u4e0b\u7684\u6548\u679c"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26027v1", "published_at": "2026-06-24", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Why Multi-Step Tool-Use Reinforcement Learning Collapses and How Supervisory Signals Fix It", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u7814\u7a76\u4e86LLM\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u51fa\u73b0\u7684\u707e\u96be\u6027\u5d29\u6e83\u73b0\u8c61\uff0c\u53d1\u73b0\u6839\u56e0\u662f\u7279\u5b9a\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u98d9\u5347\u5bfc\u81f4\u7ed3\u6784\u5316\u6267\u884c\u5931\u8d25\uff0c\u5e76\u63d0\u51fa\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff08\u79bb\u7ebf\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\uff09\u4e0eSFT\u4ea4\u66ff\u8bad\u7ec3\u6765\u7a33\u5b9a\u8bad\u7ec3\u8fc7\u7a0b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5256\u6790\u5de5\u5177\u8c03\u7528RL\u8bad\u7ec3\u5d29\u6e83\u673a\u5236\uff0c\u5e76\u63d0\u4f9b\u53ef\u590d\u73b0\u7684\u4fee\u590d\u65b9\u6848\u4e0e\u4ee3\u7801\u5e93\uff0c\u5bf9\u6784\u5efa\u7a33\u5065\u7684LLM\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u6307\u5bfc\u4ef7\u503c"}, {"abstract": "Experience-driven self-evolution is critical for large language model (LLM) agents to improve through open-world interaction. However, existing experience learning methods mostly rely on single-agent loops, where the same agent executes tasks, summarizes outcomes, and determines memory content. This setup makes agents vulnerable to the Self-Confirmation Trap: wrong-but-self-consistent trajectories are misidentified as successful experience, leading to cumulative errors during retrieval and reuse. To address this issue, we propose EDV, an Execute-Distill-Verify framework for reliable experience learning. In the Execute stage, multiple heterogeneous agents explore the same task space in parallel to generate diverse candidate trajectories. In the Distill stage, a dedicated third-party agent comparatively analyzes these trajectories to produce candidate experiences, reducing executor-centric summarization bias. In the Verify stage, the execution group validates candidates via a consensus mechanism, and only approved experiences are written into shared or private memory. By decoupling the three stages, EDV transforms experience learning from isolated self-reflection into collaborative construction, filtering erroneous and noisy content before memory insertion. We evaluate EDV on three challenging long-horizon benchmarks: tau2-bench, Mind2Web and MMTB. Results show EDV consistently outperforms strong baselines, validating that reliable experience construction is essential for robust agent self-evolution. Our code is available at https://github.com/shidingz/EDV.", "arxiv_id": "2606.24428", "arxiv_url": "https://arxiv.org/abs/2606.24428", "authors": ["Shiding Zhu", "Yudi Qi", "Yajie Wang", "Jiaze Li", "Chao Song", "Yaorui Shi", "Yibo Miao", "Hanqi Gao", "Kai Zhang"], "brief": "EDV\u662f\u4e00\u4e2a\u9762\u5411LLM\u667a\u80fd\u4f53\u7ecf\u9a8c\u5b66\u4e60\u7684\u4e09\u9636\u6bb5\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u4e2a\u5f02\u6784\u667a\u80fd\u4f53\u5e76\u884c\u63a2\u7d22\u3001\u7b2c\u4e09\u65b9\u667a\u80fd\u4f53\u6bd4\u8f83\u63d0\u70bc\u3001\u5171\u8bc6\u673a\u5236\u9a8c\u8bc1\uff0c\u907f\u514d\u5355\u667a\u80fd\u4f53\u81ea\u6211\u786e\u8ba4\u5bfc\u81f4\u7684\u9519\u8bef\u7ecf\u9a8c\u79ef\u7d2f\u95ee\u9898\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24428", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u8bc6\u522b\u5e76\u5b9a\u4e49\u0027\u81ea\u6211\u786e\u8ba4\u9677\u9631\u0027\uff1a\u5355\u667a\u80fd\u4f53\u5faa\u73af\u4e2d\u9519\u8bef\u4f46\u81ea\u6d3d\u7684\u8f68\u8ff9\u88ab\u8bef\u5224\u4e3a\u6210\u529f\u7ecf\u9a8c\uff0c\u5bfc\u81f4\u7d2f\u79ef\u9519\u8bef", "\u4e09\u9636\u6bb5\u89e3\u8026\u8bbe\u8ba1\uff1aExecute\uff08\u591a\u5f02\u6784\u667a\u80fd\u4f53\u5e76\u884c\u63a2\u7d22\uff09\u2192 Distill\uff08\u7b2c\u4e09\u65b9\u667a\u80fd\u4f53\u6bd4\u8f83\u5206\u6790\uff09\u2192 Verify\uff08\u5171\u8bc6\u673a\u5236\u9a8c\u8bc1\u540e\u5199\u5165\u8bb0\u5fc6\uff09", "\u5728tau2-bench\u3001Mind2Web\u3001MMTB\u4e09\u4e2a\u957f\u65f6\u5e8f\u57fa\u51c6\u4e0a\u6301\u7eed\u4f18\u4e8e\u5f3a\u57fa\u7ebf\u65b9\u6cd5"], "keywords": ["\u667a\u80fd\u4f53", "\u7ecf\u9a8c\u5b66\u4e60", "\u591a\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 2, "on_hf": true, "organization": "Zhejiang University", "pdf_url": "https://arxiv.org/pdf/2606.24428v1", "published_at": "2026-06-23", "score": 0.389, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "HF trending (8\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.24428.png", "title": "Escaping the Self-Confirmation Trap: An Execute-Distill-Verify Paradigm for Agentic Experience Learning", "upvotes": 8, "what_it_is": "EDV\u662f\u4e00\u4e2a\u9762\u5411LLM\u667a\u80fd\u4f53\u7ecf\u9a8c\u5b66\u4e60\u7684\u4e09\u9636\u6bb5\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u4e2a\u5f02\u6784\u667a\u80fd\u4f53\u5e76\u884c\u63a2\u7d22\u3001\u7b2c\u4e09\u65b9\u667a\u80fd\u4f53\u6bd4\u8f83\u63d0\u70bc\u3001\u5171\u8bc6\u673a\u5236\u9a8c\u8bc1\uff0c\u907f\u514d\u5355\u667a\u80fd\u4f53\u81ea\u6211\u786e\u8ba4\u5bfc\u81f4\u7684\u9519\u8bef\u7ecf\u9a8c\u79ef\u7d2f\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u6307\u51fa\u5e76\u89e3\u51b3LLM\u667a\u80fd\u4f53\u7ecf\u9a8c\u5b66\u4e60\u4e2d\u7684\u81ea\u6211\u786e\u8ba4\u504f\u5dee\u95ee\u9898\uff0c\u5c06\u7ecf\u9a8c\u6784\u5efa\u4ece\u5b64\u7acb\u81ea\u7701\u8f6c\u53d8\u4e3a\u534f\u4f5c\u6784\u5efa\uff0c\u5bf9\u667a\u80fd\u4f53\u81ea\u6211\u8fdb\u5316\u7814\u7a76\u5177\u6709\u91cd\u8981\u65b9\u6cd5\u8bba\u4ef7\u503c"}, {"abstract": "Computer-use agents turn vision-language model (VLM) predictions into executable GUI clicks, so reliable uncertainty estimates are essential for rejection, calibration, miss-severity ranking, and spatial safety regions. Yet evidence on post-hoc uncertainty quantification (UQ) for these agents is fragmented across isolated model and dataset pairs, leaving it unclear whether UQ rankings stay stable when the agent, benchmark, or observable interface changes. We present Argus, a cross-regime benchmark for post-hoc UQ in single-step executable GUI grounding: a 27-method open-weight matrix over 4 VLM agents and 4 datasets, plus an 8-method closed-source matrix across 3 frontier vendors where logits, hidden states, and attention maps are unavailable. Evaluated methods span logit-based scores, sampling and consistency measures, hidden-state and density estimators (Mahalanobis, SAPLMA), attention-based scores, P(True) and verbalised-confidence prompting, and split-conformal prediction. The main finding is selective transfer: UQ rankings are stable across datasets for a fixed model, but degrade across model classes and observable interfaces. Hidden-state and density methods are the most stable open-weight family, while CoCoA-1MCA, Focus, sampling-based scores, and verbalised self-assessment win in specific regimes. Within-model ranking transfer is strong (Spearman rho up to 0.969), but cross-tier transfer to closed-source vendors averages only +0.08, so closed-source UQ should be reranked on the target rather than extrapolated. Conformal click regions show score-level discrimination is not enough for deployment: locally weighted disks shrink radii by 40-60% when the plug-in UQ is calibrated, but coverage degrades under calibration-test or interface mismatch. We release per-item records, calibration/test splits, UQ scores, and analysis scripts for regime-aware UQ selection in GUI agents.", "arxiv_id": "2606.25760", "arxiv_url": "https://arxiv.org/abs/2606.25760", "authors": ["Divake Kumar", "Sina Tayebati", "Devashri Naik", "Amanda Sofie Rios", "Nilesh Ahuja", "Omesh Tickoo", "Ranganath Krishnan", "Amit Ranjan Trivedi"], "brief": "\u8bba\u6587\u63d0\u51faArgus\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u4e2d\u540e\u9a8c\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\uff08UQ\uff09\u65b9\u6cd5\u7684\u8de8\u573a\u666f\u7a33\u5b9a\u6027\uff0c\u8986\u76d64\u4e2a\u5f00\u6e90VLM\u30014\u4e2aGUI\u6570\u636e\u96c6\u53ca3\u4e2a\u95ed\u6e90\u524d\u6cbf\u6a21\u578b\uff0c\u5171\u6d4b\u8bd527\u79cd\u5f00\u6e90\u548c8\u79cd\u95ed\u6e90UQ\u65b9\u6cd5\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25760", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u53d1\u73b0\u0027\u9009\u62e9\u6027\u8fc1\u79fb\u0027\u89c4\u5f8b\uff1aUQ\u6392\u540d\u5728\u540c\u4e00\u6a21\u578b\u8de8\u6570\u636e\u96c6\u65f6\u7a33\u5b9a\uff08Spearman \u03c1\u6700\u9ad80.969\uff09\uff0c\u4f46\u8de8\u6a21\u578b\u7c7b\u522b\u6216\u53ef\u89c2\u6d4b\u63a5\u53e3\u65f6\u663e\u8457\u9000\u5316", "\u9690\u72b6\u6001\u4e0e\u5bc6\u5ea6\u4f30\u8ba1\u65b9\u6cd5\uff08\u5982Mahalanobis\u3001SAPLMA\uff09\u662f\u5f00\u6e90\u6a21\u578b\u4e2d\u6700\u7a33\u5b9a\u7684UQ\u5bb6\u65cf\uff1b\u95ed\u6e90\u6a21\u578b\u8de8\u5c42\u8fc1\u79fb\u5e73\u5747\u4ec5+0.08\uff0c\u9700\u5728\u76ee\u6807\u6a21\u578b\u4e0a\u91cd\u65b0\u6392\u5e8f", "\u4fdd\u5f62\u9884\u6d4b\u70b9\u51fb\u533a\u57df\u5b9e\u9a8c\u663e\u793a\uff1a\u7ecf\u8fc7\u826f\u597d\u6821\u51c6\u7684UQ\u53ef\u5c06\u7f6e\u4fe1\u533a\u57df\u534a\u5f84\u7f29\u5c0f40-60%\uff0c\u4f46\u5728\u6821\u51c6-\u6d4b\u8bd5\u5206\u5e03\u4e0d\u5339\u914d\u65f6\u8986\u76d6\u7387\u4e0b\u964d"], "keywords": ["\u667a\u80fd\u4f53", "\u4e0d\u786e\u5b9a\u6027\u91cf\u5316", "\u591a\u6a21\u6001", "GUI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25760v1", "published_at": "2026-06-24", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Uncertainty Quantification for Computer-Use Agents: A Benchmark across Vision-Language Models and GUI Grounding Datasets", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51faArgus\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u4e2d\u540e\u9a8c\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\uff08UQ\uff09\u65b9\u6cd5\u7684\u8de8\u573a\u666f\u7a33\u5b9a\u6027\uff0c\u8986\u76d64\u4e2a\u5f00\u6e90VLM\u30014\u4e2aGUI\u6570\u636e\u96c6\u53ca3\u4e2a\u95ed\u6e90\u524d\u6cbf\u6a21\u578b\uff0c\u5171\u6d4b\u8bd527\u79cd\u5f00\u6e90\u548c8\u79cd\u95ed\u6e90UQ\u65b9\u6cd5\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u8de8\u6a21\u578b\u3001\u8de8\u6570\u636e\u96c6\u7684GUI\u667a\u80fd\u4f53UQ\u57fa\u51c6\uff0c\u586b\u8865\u4e86\u8be5\u9886\u57df\u788e\u7247\u5316\u7814\u7a76\u7684\u7a7a\u767d\uff0c\u4e3a\u5b9e\u9645\u90e8\u7f72\u4e2d\u7684\u62d2\u7edd\u51b3\u7b56\u3001\u7a7a\u95f4\u5b89\u5168\u533a\u57df\u7b49\u63d0\u4f9b\u4e86\u5b9e\u8bc1\u6307\u5bfc\uff0c\u5e76\u5f00\u653e\u4e86\u5168\u90e8\u6570\u636e\u4e0e\u4ee3\u7801"}, {"abstract": "Long-term robot deployment requires a compact and scalable memory that preserves fine-grained visual semantics, grounds observations in space and time, and enables efficient storage and retrieval. In this paper, we propose RAVEN, an agentic memory system for long-horizon robotic question answering and navigation. RAVEN stores visual embeddings with pose and time in a vector database, and grounds retrieval in a spatial map to answer queries and navigate to goals. By operating directly on visual embeddings, RAVEN avoids lossy image-to-text captioning and enables accurate semantic, spatial, and temporal retrieval at scale. Across several simulated and real-world video question-answering benchmarks, RAVEN consistently surpasses caption-based memory systems and matches frontier VLMs on long-horizon tasks at 10$\\times$ lower retrieval cost. Finally, we instantiate RAVEN on a Unitree Go1 robot for the task of long-horizon navigation for natural language goal-reaching, and show successful deployment over several large indoor environments.", "arxiv_id": "2606.25206", "arxiv_url": "https://arxiv.org/abs/2606.25206", "authors": ["Yixun Hu", "Zhicheng Zheng", "Lihan Zha", "Chunwei Xing", "Rajdeep Singh", "Omar Hossain", "Antonio Loquercio", "Dhruv Shah"], "brief": "RAVEN\u662f\u4e00\u4e2a\u9762\u5411\u957f\u65f6\u7a0b\u673a\u5668\u4eba\u4efb\u52a1\u7684\u667a\u80fd\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u5c06\u89c6\u89c9\u5d4c\u5165\u4e0e\u4f4d\u59ff\u3001\u65f6\u95f4\u4fe1\u606f\u5b58\u5165\u5411\u91cf\u6570\u636e\u5e93\uff0c\u5e76\u7ed3\u5408\u7a7a\u95f4\u5730\u56fe\u5b9e\u73b0\u9ad8\u6548\u68c0\u7d22\uff0c\u652f\u6301\u95ee\u7b54\u4e0e\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u5bfc\u822a\u3002", "categories": ["cs.RO", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25206", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u76f4\u63a5\u5b58\u50a8\u89c6\u89c9\u5d4c\u5165\uff08\u800c\u975e\u56fe\u50cf\u8f6c\u6587\u5b57\u63cf\u8ff0\uff09\uff0c\u907f\u514d\u8bed\u4e49\u635f\u5931\uff0c\u652f\u6301\u8bed\u4e49\u3001\u7a7a\u95f4\u3001\u65f6\u95f4\u591a\u7ef4\u68c0\u7d22", "\u68c0\u7d22\u6210\u672c\u6bd4\u524d\u6cbfVLM\u4f4e10\u500d\uff0c\u540c\u65f6\u5728\u957f\u65f6\u7a0b\u4efb\u52a1\u4e0a\u6027\u80fd\u6301\u5e73\u6216\u8d85\u8d8a\u57fa\u4e8e\u5b57\u5e55\u7684\u8bb0\u5fc6\u7cfb\u7edf", "\u5728Unitree Go1\u673a\u5668\u4eba\u4e0a\u5b8c\u6210\u771f\u5b9e\u5ba4\u5185\u5927\u573a\u666f\u7684\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u5bfc\u822a\u90e8\u7f72\u9a8c\u8bc1"], "keywords": ["\u667a\u80fd\u4f53", "\u5177\u8eab\u5bfc\u822a", "\u591a\u6a21\u6001", "\u8bb0\u5fc6\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25206v1", "published_at": "2026-06-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RAVEN: Long-Horizon Reasoning \u0026 Navigation with a Visuo-Spatio-Temporal Memory", "upvotes": 0, "what_it_is": "RAVEN\u662f\u4e00\u4e2a\u9762\u5411\u957f\u65f6\u7a0b\u673a\u5668\u4eba\u4efb\u52a1\u7684\u667a\u80fd\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u5c06\u89c6\u89c9\u5d4c\u5165\u4e0e\u4f4d\u59ff\u3001\u65f6\u95f4\u4fe1\u606f\u5b58\u5165\u5411\u91cf\u6570\u636e\u5e93\uff0c\u5e76\u7ed3\u5408\u7a7a\u95f4\u5730\u56fe\u5b9e\u73b0\u9ad8\u6548\u68c0\u7d22\uff0c\u652f\u6301\u95ee\u7b54\u4e0e\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u5bfc\u822a\u3002", "why_notable": "\u89e3\u51b3\u4e86\u957f\u671f\u673a\u5668\u4eba\u90e8\u7f72\u4e2d\u8bb0\u5fc6\u53ef\u6269\u5c55\u6027\u4e0e\u8bed\u4e49\u4fdd\u771f\u5ea6\u7684\u6838\u5fc3\u77db\u76fe\uff0c\u4ee5\u6781\u4f4e\u8ba1\u7b97\u6210\u672c\u5b9e\u73b0\u5ab2\u7f8e\u5927\u6a21\u578b\u7684\u957f\u65f6\u7a0b\u63a8\u7406\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u843d\u5730\u4ef7\u503c\u3002"}, {"abstract": "Computer-Use Agents (CUAs) execute high-level user goals by perceiving and acting directly within graphical user interfaces. However, reinforcement learning for CUAs remains difficult because open-ended desktop environments rarely provide scalable, machine-readable reward signals: task success is often visually grounded and hard to specify with handcrafted reward functions or dense manual labels. We propose an RL fine-tuning framework that uses autonomous vision-language evaluation as a scalable supervision signal for GUI agents. Given a final screenshot and the original instruction, a Vision-Language Model judges task completion and provides terminal feedback without task-specific heuristics or manual labels during policy optimization. Because autonomous evaluators are imperfect, we model their feedback as a noisy binary reward channel and derive a noise-corrected reward estimator for Proximal Policy Optimization. Experiments across macOSWorld, Windows Agent Arena, and OSWorld show that corrected evaluator rewards outperform both zero-shot baselines and raw evaluator rewards, improving success rates by an average of 12.6 percentage points over zero-shot performance and 5.1 points over raw evaluator fine-tuning. These results suggest that autonomous evaluation can serve as a practical reward signal for RL in GUI environments when evaluator noise is explicitly modeled and corrected.", "arxiv_id": "2606.24515", "arxiv_url": "https://arxiv.org/abs/2606.24515", "authors": ["Marta Sumyk", "Oleksandr Kosovan"], "brief": "\u63d0\u51fa\u4e00\u79cd\u9762\u5411\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u7684\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u6846\u67b6\uff0c\u5229\u7528\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u81ea\u4e3b\u8bc4\u4f30\u4efb\u52a1\u5b8c\u6210\u60c5\u51b5\u4f5c\u4e3a\u5956\u52b1\u4fe1\u53f7\uff0c\u5e76\u9488\u5bf9\u8bc4\u4f30\u5668\u566a\u58f0\u8bbe\u8ba1\u4e86\u566a\u58f0\u6821\u6b63\u5956\u52b1\u4f30\u8ba1\u5668\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u6216\u4efb\u52a1\u7279\u5b9a\u542f\u53d1\u5f0f\u89c4\u5219\u3002", "categories": ["cs.AI", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24515", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5c06VLM\u81ea\u4e3b\u8bc4\u4f30\u5efa\u6a21\u4e3a\u566a\u58f0\u4e8c\u5143\u5956\u52b1\u901a\u9053\uff0c\u63a8\u5bfc\u51fa\u566a\u58f0\u6821\u6b63\u5956\u52b1\u4f30\u8ba1\u5668\u7528\u4e8ePPO\u4f18\u5316", "\u5728macOSWorld\u3001Windows Agent Arena\u3001OSWorld\u4e09\u4e2a\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u5e73\u5747\u6210\u529f\u7387\u8f83\u96f6\u6837\u672c\u57fa\u7ebf\u63d0\u534712.6\u4e2a\u767e\u5206\u70b9", "\u76f8\u6bd4\u76f4\u63a5\u4f7f\u7528\u539f\u59cb\u8bc4\u4f30\u5668\u5956\u52b1\u5fae\u8c03\uff0c\u566a\u58f0\u6821\u6b63\u7248\u672c\u989d\u5916\u63d0\u53475.1\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "GUI", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24515v1", "published_at": "2026-06-23", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Reinforcement Learning for Computer-Use Agents with Autonomous Evaluation", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u9762\u5411\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u7684\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u6846\u67b6\uff0c\u5229\u7528\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u81ea\u4e3b\u8bc4\u4f30\u4efb\u52a1\u5b8c\u6210\u60c5\u51b5\u4f5c\u4e3a\u5956\u52b1\u4fe1\u53f7\uff0c\u5e76\u9488\u5bf9\u8bc4\u4f30\u5668\u566a\u58f0\u8bbe\u8ba1\u4e86\u566a\u58f0\u6821\u6b63\u5956\u52b1\u4f30\u8ba1\u5668\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u6216\u4efb\u52a1\u7279\u5b9a\u542f\u53d1\u5f0f\u89c4\u5219\u3002", "why_notable": "\u89e3\u51b3\u4e86GUI\u73af\u5883\u4e2dRL\u8bad\u7ec3\u7f3a\u4e4f\u53ef\u6269\u5c55\u5956\u52b1\u4fe1\u53f7\u7684\u6838\u5fc3\u96be\u9898\uff0c\u901a\u8fc7\u663e\u5f0f\u5efa\u6a21\u8bc4\u4f30\u5668\u566a\u58f0\u4f7f\u81ea\u4e3b\u8bc4\u4f30\u6210\u4e3a\u5b9e\u7528\u7684RL\u76d1\u7763\u4fe1\u53f7\uff0c\u5bf9\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u7684\u89c4\u6a21\u5316\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Tool-integrated LLM agents are often wrapped within a harness: the scaffolding that determines which tools are exposed, how they are described, and what auxiliary information accompanies each per-step observation. While agents are routinely post-trained, this scaffolding is typically treated as a fixed engineering detail, with design effort limited to the training-free regime. Moreover, existing post-training algorithms assume a static environment, even though tool environments and tasks often shift upon deployment. To address this gap, we extend $\\texttt{ALFWorld}$ (i) to treat the harness as a controllable design dimension and (ii) to support evaluation under task and tool environment shifts. Building on this, we systematically analyze how the harness design influences post-training in both in-distribution and out-of-distribution (OOD) settings. We empirically show that harness-aware post-training not only improves in-distribution performance but also enables agents to robustly adapt to OOD settings. Under a harness with minimal design effort, post-training suffers a drastic performance drop under stronger tool environment shifts, further highlighting the importance of harness-aware post-training under such shifts.", "arxiv_id": "2606.25447", "arxiv_url": "https://arxiv.org/abs/2606.25447", "authors": ["Kyungmin Kim", "Youngbin Choi", "Seoyeon Lee", "Suhyeon Jun", "Dongwoo Kim", "Sangdon Park"], "brief": "\u672c\u6587\u7814\u7a76\u5de5\u5177\u96c6\u6210LLM\u667a\u80fd\u4f53\u4e2d\"\u811a\u624b\u67b6\"\uff08harness\uff09\u8bbe\u8ba1\u4e0e\u540e\u8bad\u7ec3\u7b97\u6cd5\u7684\u76f8\u4e92\u4f5c\u7528\uff0c\u6269\u5c55ALFWorld\u6846\u67b6\u5c06\u811a\u624b\u67b6\u4f5c\u4e3a\u53ef\u63a7\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u7cfb\u7edf\u5206\u6790\u5176\u5bf9\u5206\u5e03\u5185\u53ca\u5206\u5e03\u5916\uff08OOD\uff09\u6027\u80fd\u7684\u5f71\u54cd\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25447", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u811a\u624b\u67b6\uff08\u5de5\u5177\u63cf\u8ff0\u3001\u8f85\u52a9\u4fe1\u606f\u7b49\uff09\u7eb3\u5165\u540e\u8bad\u7ec3\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u800c\u975e\u56fa\u5b9a\u5de5\u7a0b\u7ec6\u8282", "\u5b9e\u9a8c\u8868\u660e\u611f\u77e5\u811a\u624b\u67b6\u7684\u540e\u8bad\u7ec3\uff08harness-aware post-training\uff09\u5728OOD\u8bbe\u7f6e\u4e0b\u663e\u8457\u63d0\u5347\u9c81\u68d2\u6027", "\u6700\u5c0f\u8bbe\u8ba1\u811a\u624b\u67b6\u4e0b\uff0c\u5de5\u5177\u73af\u5883\u53d1\u751f\u8f83\u5927\u504f\u79fb\u65f6\u540e\u8bad\u7ec3\u6027\u80fd\u6025\u5267\u4e0b\u964d\uff0c\u51f8\u663e\u811a\u624b\u67b6\u8bbe\u8ba1\u7684\u91cd\u8981\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u540e\u8bad\u7ec3", "\u5de5\u5177\u4f7f\u7528", "\u6cdb\u5316\u80fd\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25447v1", "published_at": "2026-06-24", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Interplay of Harness Design and Post-Training in LLM Agents", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u5de5\u5177\u96c6\u6210LLM\u667a\u80fd\u4f53\u4e2d\"\u811a\u624b\u67b6\"\uff08harness\uff09\u8bbe\u8ba1\u4e0e\u540e\u8bad\u7ec3\u7b97\u6cd5\u7684\u76f8\u4e92\u4f5c\u7528\uff0c\u6269\u5c55ALFWorld\u6846\u67b6\u5c06\u811a\u624b\u67b6\u4f5c\u4e3a\u53ef\u63a7\u8bbe\u8ba1\u7ef4\u5ea6\uff0c\u7cfb\u7edf\u5206\u6790\u5176\u5bf9\u5206\u5e03\u5185\u53ca\u5206\u5e03\u5916\uff08OOD\uff09\u6027\u80fd\u7684\u5f71\u54cd\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u811a\u624b\u67b6\u8bbe\u8ba1\u4e0e\u540e\u8bad\u7ec3\u7684\u8026\u5408\u5173\u7cfb\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u4e2d\u5de5\u5177\u73af\u5883\u548c\u4efb\u52a1\u9891\u7e41\u53d8\u5316\u7684LLM\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\uff0c\u586b\u8865\u4e86\u73b0\u6709\u540e\u8bad\u7ec3\u7b97\u6cd5\u5ffd\u89c6\u73af\u5883\u52a8\u6001\u6027\u7684\u7a7a\u767d\u3002"}, {"abstract": "GUI agents powered by vision-language models show strong potential for automating digital tasks, yet frequently fail in long-horizon scenarios due to the absence of step-level verification. Existing process reward models verify actions through textual reasoning alone, missing the visual nature of GUI state changes. We introduce VisCritic, a visual process reward framework that verifies agent actions by directly comparing pre-action and post-action screenshots in visual feature space. VisCritic employs a Siamese vision transformer to extract change-aware representations, coupled with an Action-Aware Critic Head that jointly evaluates action success, task progress, and error type. A critic-training data construction pipeline generates weakly supervised samples from existing trajectories without additional human labels for critic training. Experiments and offline analyses across five benchmarks demonstrate that VisCritic serves as a plug-and-play enhancement for diverse GUI agents, generally improving benchmark metrics while providing visual diagnostic cues.", "arxiv_id": "2606.24525", "arxiv_url": "https://arxiv.org/abs/2606.24525", "authors": ["Jiachen Qian"], "brief": "VisCritic\u662f\u4e00\u4e2a\u89c6\u89c9\u8fc7\u7a0b\u5956\u52b1\u6846\u67b6\uff0c\u901a\u8fc7\u76f4\u63a5\u6bd4\u8f83\u64cd\u4f5c\u524d\u540e\u622a\u56fe\u7684\u89c6\u89c9\u7279\u5f81\u6765\u9a8c\u8bc1GUI\u667a\u80fd\u4f53\u7684\u6bcf\u6b65\u52a8\u4f5c\u662f\u5426\u6b63\u786e\uff0c\u5f25\u8865\u4e86\u73b0\u6709\u65b9\u6cd5\u4ec5\u4f9d\u8d56\u6587\u672c\u63a8\u7406\u7684\u4e0d\u8db3\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24525", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u91c7\u7528\u5b6a\u751f\u89c6\u89c9Transformer\u63d0\u53d6\u53d8\u5316\u611f\u77e5\u8868\u793a\uff0c\u914d\u5408Action-Aware Critic Head\u8054\u5408\u8bc4\u4f30\u52a8\u4f5c\u6210\u529f\u7387\u3001\u4efb\u52a1\u8fdb\u5ea6\u548c\u9519\u8bef\u7c7b\u578b", "\u8bbe\u8ba1\u5f31\u76d1\u7763\u8bad\u7ec3\u6570\u636e\u6784\u5efa\u6d41\u6c34\u7ebf\uff0c\u65e0\u9700\u989d\u5916\u4eba\u5de5\u6807\u6ce8\u5373\u53ef\u4ece\u5df2\u6709\u8f68\u8ff9\u751f\u6210\u8bad\u7ec3\u6837\u672c", "\u5728\u4e94\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u9a8c\u8bc1\u4e3a\u5373\u63d2\u5373\u7528\u6a21\u5757\uff0c\u53ef\u666e\u904d\u63d0\u5347\u591a\u79cdGUI\u667a\u80fd\u4f53\u7684\u6027\u80fd\u5e76\u63d0\u4f9b\u89c6\u89c9\u8bca\u65ad\u7ebf\u7d22"], "keywords": ["\u667a\u80fd\u4f53", "GUI", "\u591a\u6a21\u6001", "\u8fc7\u7a0b\u5956\u52b1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24525v1", "published_at": "2026-06-23", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "VisCritic: Visual State Comparison as Process Reward for GUI Agents", "upvotes": 0, "what_it_is": "VisCritic\u662f\u4e00\u4e2a\u89c6\u89c9\u8fc7\u7a0b\u5956\u52b1\u6846\u67b6\uff0c\u901a\u8fc7\u76f4\u63a5\u6bd4\u8f83\u64cd\u4f5c\u524d\u540e\u622a\u56fe\u7684\u89c6\u89c9\u7279\u5f81\u6765\u9a8c\u8bc1GUI\u667a\u80fd\u4f53\u7684\u6bcf\u6b65\u52a8\u4f5c\u662f\u5426\u6b63\u786e\uff0c\u5f25\u8865\u4e86\u73b0\u6709\u65b9\u6cd5\u4ec5\u4f9d\u8d56\u6587\u672c\u63a8\u7406\u7684\u4e0d\u8db3\u3002", "why_notable": "\u9996\u6b21\u5c06\u89c6\u89c9\u72b6\u6001\u5bf9\u6bd4\u5f15\u5165GUI\u667a\u80fd\u4f53\u7684\u8fc7\u7a0b\u5956\u52b1\u5efa\u6a21\uff0c\u89e3\u51b3\u4e86\u957f\u4efb\u52a1\u4e2d\u7f3a\u4e4f\u6b65\u9aa4\u7ea7\u9a8c\u8bc1\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u4e14\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u5373\u53ef\u8bad\u7ec3\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We introduce NatureBench, a cross-discipline benchmark of 90 tasks distilled from peer-reviewed Nature-family publications, designed to evaluate whether AI coding agents can move beyond reproduction toward discovery on real scientific problems. NatureBench is built on NatureGym, an automated pipeline that constructs a standardized, per-task containerized environment from a source paper, addressing the environment-fragmentation problem that has limited the credibility of prior agent-on-research benchmarks. Evaluating ten frontier agent configurations under a strict web-search-disabled protocol, we find that the strongest model surpasses SOTA on only 17.8% of tasks under the g\u003e0.1 criterion. Analysis of method pathways reveals that agents succeed primarily through methodological translation, converting scientific tasks into familiar supervised prediction problems, rather than through genuine scientific invention. Failures are dominated by wrong method choice and insufficient compute budget, not by task misunderstanding. We release the benchmark, the NatureGym pipeline, and a public leaderboard with maintainer-side reproduction. Code: https://github.com/FrontisAI/NatureBench", "arxiv_id": "2606.24530", "arxiv_url": "https://arxiv.org/abs/2606.24530", "authors": ["Yuru Wang", "Lejun Cheng", "Yuxin Zuo", "Sihang Zeng", "Bingxiang He", "Che Jiang", "Junlin Yang", "Yuchong Wang", "Kaikai Zhao", "Weifeng Huang", "Kai Tian", "Zhenzhao Yuan", "Jincheng Zhong", "Weizhi Wang", "Ning Ding", "Bowen Zhou", "Kaiyan Zhang"], "brief": "NatureBench\u662f\u4e00\u4e2a\u8de8\u5b66\u79d1\u57fa\u51c6\uff0c\u5305\u542b90\u4e2a\u4eceNature\u7cfb\u5217\u540c\u884c\u8bc4\u5ba1\u8bba\u6587\u4e2d\u63d0\u70bc\u7684\u4efb\u52a1\uff0c\u7528\u4e8e\u8bc4\u4f30AI\u7f16\u7a0b\u667a\u80fd\u4f53\u80fd\u5426\u5728\u771f\u5b9e\u79d1\u5b66\u95ee\u9898\u4e0a\u5b9e\u73b0\u8d85\u8d8a\u590d\u73b0\u7684\u53d1\u73b0\u3002\u914d\u5957\u7684NatureGym\u6d41\u6c34\u7ebf\u4e3a\u6bcf\u4e2a\u4efb\u52a1\u81ea\u52a8\u6784\u5efa\u6807\u51c6\u5316\u5bb9\u5668\u5316\u73af\u5883\uff0c\u89e3\u51b3\u4e86\u4ee5\u5f80\u7814\u7a76\u57fa\u51c6\u4e2d\u73af\u5883\u788e\u7247\u5316\u95ee\u9898\u3002", "categories": ["cs.CL"], "github_repo": "https://github.com/FrontisAI/NatureBench", "github_stars": 33, "hf_url": "https://huggingface.co/papers/2606.24530", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6d4b\u8bd510\u79cd\u524d\u6cbf\u667a\u80fd\u4f53\u914d\u7f6e\uff0c\u6700\u5f3a\u6a21\u578b\u5728g\u003e0.1\u6807\u51c6\u4e0b\u4ec5\u572817.8%\u4efb\u52a1\u4e0a\u8d85\u8d8aSOTA", "\u667a\u80fd\u4f53\u6210\u529f\u4e3b\u8981\u4f9d\u8d56\"\u65b9\u6cd5\u8bba\u7ffb\u8bd1\"\u2014\u2014\u5c06\u79d1\u5b66\u4efb\u52a1\u8f6c\u5316\u4e3a\u719f\u6089\u7684\u76d1\u7763\u9884\u6d4b\u95ee\u9898\uff0c\u800c\u975e\u771f\u6b63\u7684\u79d1\u5b66\u521b\u65b0", "\u5931\u8d25\u4e3b\u8981\u6e90\u4e8e\u65b9\u6cd5\u9009\u62e9\u9519\u8bef\u548c\u8ba1\u7b97\u9884\u7b97\u4e0d\u8db3\uff0c\u800c\u975e\u5bf9\u4efb\u52a1\u7684\u8bef\u89e3"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u79d1\u5b66\u53d1\u73b0", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 1, "on_hf": true, "organization": "Frontis AI", "pdf_url": "https://arxiv.org/pdf/2606.24530v1", "published_at": "2026-06-23", "score": 0.339, "selected_reasons": ["HF trending (53\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2606.24530.png", "title": "NatureBench: Can Coding Agents Match the Published SOTA of Nature-Family Papers?", "upvotes": 53, "what_it_is": "NatureBench\u662f\u4e00\u4e2a\u8de8\u5b66\u79d1\u57fa\u51c6\uff0c\u5305\u542b90\u4e2a\u4eceNature\u7cfb\u5217\u540c\u884c\u8bc4\u5ba1\u8bba\u6587\u4e2d\u63d0\u70bc\u7684\u4efb\u52a1\uff0c\u7528\u4e8e\u8bc4\u4f30AI\u7f16\u7a0b\u667a\u80fd\u4f53\u80fd\u5426\u5728\u771f\u5b9e\u79d1\u5b66\u95ee\u9898\u4e0a\u5b9e\u73b0\u8d85\u8d8a\u590d\u73b0\u7684\u53d1\u73b0\u3002\u914d\u5957\u7684NatureGym\u6d41\u6c34\u7ebf\u4e3a\u6bcf\u4e2a\u4efb\u52a1\u81ea\u52a8\u6784\u5efa\u6807\u51c6\u5316\u5bb9\u5668\u5316\u73af\u5883\uff0c\u89e3\u51b3\u4e86\u4ee5\u5f80\u7814\u7a76\u57fa\u51c6\u4e2d\u73af\u5883\u788e\u7247\u5316\u95ee\u9898\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u8bc4\u4f30AI\u667a\u80fd\u4f53\u80fd\u5426\u5728\u771f\u5b9e\u9876\u520a\u79d1\u5b66\u4efb\u52a1\u4e0a\u8d85\u8d8a\u4eba\u7c7bSOTA\u7684\u57fa\u51c6\uff0c\u63ed\u793a\u4e86\u5f53\u524dAI\u5728\u79d1\u5b66\u53d1\u73b0\u4e0a\u7684\u672c\u8d28\u5c40\u9650\uff0c\u5bf9AI for Science\u9886\u57df\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "Software performance optimization is a notoriously complex and manual task. Despite the growing use of Large Language Models (LLMs) for code refinement, we still lack benchmarks that capture how optimization actually happens in real-world codebases. Existing frameworks often oversimplify the problem by focusing on isolated functions or a single performance metric, missing the critical trade-offs between execution time and memory footprint, the inherent noise of the measurement environment, and the variability introduced by different input data and execution conditions. We address this by introducing SWE-Pro, a repository-level benchmark derived from 102 expert-written optimizations from open-source projects. Unlike previous benchmarks, SWE-Pro pairs each task with parameterized tests to evaluate runtime, peak memory, and Time-Weighted Memory Usage (TWMU) across varying input data and execution conditions under noise-aware measurement conditions. Our evaluation shows that current LLMs struggle significantly: runtime gains are negligible, and memory optimizations are nearly non-existent. This stands in sharp contrast to expert implementations, which achieve an aggregate speedup of 15.5x and peak memory reduction of 171.3x over benchmark tasks. Expert-written improvements are observed in 91.2% of tasks for runtime and 65.7% for peak memory. Our findings expose a substantial gap between current LLM capabilities and the demands of expert-level engineering.", "arxiv_id": "2606.25530", "arxiv_url": "https://arxiv.org/abs/2606.25530", "authors": ["Ezgi Sar\u0131kayak", "Wenchao Gu", "Hesham Ghonim", "Chunyang Chen"], "brief": "\u672c\u6587\u63d0\u51faSWE-Pro\uff0c\u4e00\u4e2a\u6765\u6e90\u4e8e102\u4e2a\u5f00\u6e90\u9879\u76ee\u4e13\u5bb6\u7ea7\u4f18\u5316\u6848\u4f8b\u7684\u4ed3\u5e93\u7ea7\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u5728\u771f\u5b9e\u8f6f\u4ef6\u6027\u80fd\u4f18\u5316\u4efb\u52a1\u4e2d\u7684\u80fd\u529b\uff0c\u6db5\u76d6\u8fd0\u884c\u65f6\u95f4\u3001\u5cf0\u503c\u5185\u5b58\u53ca\u65f6\u95f4\u52a0\u6743\u5185\u5b58\u4f7f\u7528\u7b49\u591a\u7ef4\u5ea6\u6307\u6807\u3002", "categories": ["cs.SE", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25530", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4e13\u5bb6\u5b9e\u73b0\u5e73\u5747\u8fbe\u523015.5\u500d\u52a0\u901f\u548c171.3\u500d\u5cf0\u503c\u5185\u5b58\u964d\u4f4e\uff0c\u800c\u5f53\u524dLLM\u7684\u4f18\u5316\u6548\u679c\u51e0\u4e4e\u53ef\u5ffd\u7565\u4e0d\u8ba1", "\u5f15\u5165Time-Weighted Memory Usage\uff08TWMU\uff09\u6307\u6807\uff0c\u5e76\u5728\u566a\u58f0\u611f\u77e5\u6d4b\u91cf\u6761\u4ef6\u4e0b\u8bc4\u4f30\u4e0d\u540c\u8f93\u5165\u6570\u636e\u548c\u6267\u884c\u6761\u4ef6\u4e0b\u7684\u6027\u80fd", "\u4e13\u5bb6\u4f18\u5316\u572891.2%\u4efb\u52a1\u4e2d\u6539\u5584\u8fd0\u884c\u65f6\u95f4\u300165.7%\u4efb\u52a1\u4e2d\u6539\u5584\u5cf0\u503c\u5185\u5b58\uff0cLLM\u4e0e\u4e4b\u5dee\u8ddd\u60ac\u6b8a"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25530v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Evaluating LLMs on Real-World Software Performance Optimization", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51faSWE-Pro\uff0c\u4e00\u4e2a\u6765\u6e90\u4e8e102\u4e2a\u5f00\u6e90\u9879\u76ee\u4e13\u5bb6\u7ea7\u4f18\u5316\u6848\u4f8b\u7684\u4ed3\u5e93\u7ea7\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u5728\u771f\u5b9e\u8f6f\u4ef6\u6027\u80fd\u4f18\u5316\u4efb\u52a1\u4e2d\u7684\u80fd\u529b\uff0c\u6db5\u76d6\u8fd0\u884c\u65f6\u95f4\u3001\u5cf0\u503c\u5185\u5b58\u53ca\u65f6\u95f4\u52a0\u6743\u5185\u5b58\u4f7f\u7528\u7b49\u591a\u7ef4\u5ea6\u6307\u6807\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9\u771f\u5b9e\u4ee3\u7801\u5e93\u6027\u80fd\u4f18\u5316\u7684\u4ed3\u5e93\u7ea7\u57fa\u51c6\uff0c\u586b\u8865\u4e86\u73b0\u6709\u8bc4\u4f30\u6846\u67b6\u8fc7\u5ea6\u7b80\u5316\u7684\u7a7a\u767d\uff0c\u6e05\u6670\u91cf\u5316\u4e86LLM\u4e0e\u4e13\u5bb6\u5de5\u7a0b\u5e08\u4e4b\u95f4\u7684\u80fd\u529b\u9e3f\u6c9f\uff0c\u5bf9\u63a8\u52a8LLM\u4ee3\u7801\u4f18\u5316\u7814\u7a76\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Large language models (LLMs) reach high accuracy in mathematical reasoning, but individual traces on the same problem diverge; some arrive at the correct answer while others fail. Prior work analyzes failure at the step, chunk, or sentence level, or at tokens where failure has already occurred. Neither identifies the precise token that triggers the shift toward failure. We introduce the cliff token, a token where the token-wise potential drops significantly under an adaptive threshold that scales with the local token-wise potential, based on a one-sided two-proportion z-test. Across seven models and three mathematical reasoning benchmarks (GSM1K, MATH500, AIME 2025), cliff tokens act as failure triggers; deleting the first cliff token and resampling recovers pass@64 to 1.0, while keeping it limits recovery to between 0.71 and 1.00. We further introduce a cliff taxonomy of deterministic, uncertain, and sampled-off cliffs, defined by greedy choice and token entropy. Each type has distinct probabilistic characteristics, and the taxonomy generalizes across model scales. Finally, we validate the taxonomy via single-token preference optimization at cliff positions (Cliff-DPO). Trained on GSM8K, Cliff-DPO improves accuracy across benchmarks by up to +6.6. Optimizing at uncertain and sampled-off cliffs improves reasoning, while deterministic cliffs do not.", "arxiv_id": "2606.25524", "arxiv_url": "https://arxiv.org/abs/2606.25524", "authors": ["Jaeyong Ko", "Pilsung Kang", "Yukyung Lee"], "brief": "\u672c\u6587\u63d0\u51fa\"\u60ac\u5d16token\"\uff08cliff token\uff09\u6982\u5ff5\uff0c\u5373LLM\u6570\u5b66\u63a8\u7406\u8fc7\u7a0b\u4e2d\u5bfc\u81f4\u89e3\u9898\u8f68\u8ff9\u4ece\u6b63\u786e\u8f6c\u5411\u5931\u8d25\u7684\u7cbe\u786e\u89e6\u53d1token\uff0c\u5e76\u57fa\u4e8e\u81ea\u9002\u5e94\u9608\u503c\u7684\u5355\u4fa7\u53cc\u6bd4\u4f8bz\u68c0\u9a8c\u8fdb\u884c\u8bc6\u522b\uff0c\u540c\u65f6\u6784\u5efa\u4e86\u786e\u5b9a\u6027\u3001\u4e0d\u786e\u5b9a\u6027\u548c\u91c7\u6837\u504f\u79bb\u4e09\u7c7b\u60ac\u5d16\u5206\u7c7b\u4f53\u7cfb\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25524", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u60ac\u5d16token\u5b9a\u4e49\uff1atoken\u7ea7\u6f5c\u529b\u5728\u81ea\u9002\u5e94\u9608\u503c\u4e0b\u663e\u8457\u4e0b\u964d\u7684\u4f4d\u7f6e\uff0c\u8de87\u4e2a\u6a21\u578b\u548c3\u4e2a\u6570\u5b66\u63a8\u7406\u57fa\u51c6\uff08GSM1K\u3001MATH500\u3001AIME 2025\uff09\u9a8c\u8bc1\u6709\u6548", "\u5220\u9664\u7b2c\u4e00\u4e2a\u60ac\u5d16token\u5e76\u91cd\u91c7\u6837\u53ef\u5c06pass@64\u6062\u590d\u81f31.0\uff0c\u4fdd\u7559\u5219\u6062\u590d\u7387\u4ec5\u57280.71~1.00\u4e4b\u95f4", "\u57fa\u4e8e\u60ac\u5d16\u4f4d\u7f6e\u7684\u5355token\u504f\u597d\u4f18\u5316\uff08Cliff-DPO\uff09\u5728GSM8K\u4e0a\u8bad\u7ec3\u540e\uff0c\u8de8\u57fa\u51c6\u51c6\u786e\u7387\u6700\u9ad8\u63d0\u5347+6.6\uff0c\u4e14\u4ec5\u4e0d\u786e\u5b9a\u6027\u548c\u91c7\u6837\u504f\u79bb\u7c7b\u60ac\u5d16\u6709\u6548"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u5b66\u63a8\u7406", "\u5931\u8d25\u5206\u6790", "\u504f\u597d\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25524v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Cliff Tokens: Identifying Single-Token Failure Triggers in LLM Mathematical Reasoning", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u60ac\u5d16token\"\uff08cliff token\uff09\u6982\u5ff5\uff0c\u5373LLM\u6570\u5b66\u63a8\u7406\u8fc7\u7a0b\u4e2d\u5bfc\u81f4\u89e3\u9898\u8f68\u8ff9\u4ece\u6b63\u786e\u8f6c\u5411\u5931\u8d25\u7684\u7cbe\u786e\u89e6\u53d1token\uff0c\u5e76\u57fa\u4e8e\u81ea\u9002\u5e94\u9608\u503c\u7684\u5355\u4fa7\u53cc\u6bd4\u4f8bz\u68c0\u9a8c\u8fdb\u884c\u8bc6\u522b\uff0c\u540c\u65f6\u6784\u5efa\u4e86\u786e\u5b9a\u6027\u3001\u4e0d\u786e\u5b9a\u6027\u548c\u91c7\u6837\u504f\u79bb\u4e09\u7c7b\u60ac\u5d16\u5206\u7c7b\u4f53\u7cfb\u3002", "why_notable": "\u9996\u6b21\u7cbe\u786e\u5b9a\u4f4d\u5230\u89e6\u53d1LLM\u63a8\u7406\u5931\u8d25\u7684\u5355\u4e2atoken\uff0c\u800c\u975e\u6b65\u9aa4\u6216\u53e5\u5b50\u7ea7\u522b\uff0c\u4e3a\u7406\u89e3\u548c\u4fee\u590dLLM\u63a8\u7406\u9519\u8bef\u63d0\u4f9b\u4e86\u7ec6\u7c92\u5ea6\u5de5\u5177\uff0cCliff-DPO\u4e5f\u5c55\u793a\u4e86\u5176\u5b9e\u9645\u8bad\u7ec3\u4ef7\u503c\u3002"}, {"abstract": "Modern large language models are predominantly trained with autoregressive factorization and causal attention. We present \\emph{iLLaDA}, an 8B masked diffusion language model trained from scratch with fully bidirectional attention. iLLaDA keeps the masked diffusion objective throughout pre-training and supervised fine-tuning (SFT), scaling pre-training to 12T tokens and fine-tuning on a 25B-token instruction corpus for 12 epochs. We further use variable-length generation for efficiency and introduce confidence-based scoring for multiple-choice evaluation. Compared with LLaDA, iLLaDA improves broadly across general, mathematical, and code benchmarks; for example, iLLaDA-Base improves by 21.6 points on BBH and 14.9 points on ARC-Challenge, while iLLaDA-Instruct improves by 14.5 points on MATH and 16.5 points on HumanEval. Despite its non-autoregressive training, iLLaDA also remains competitive with Qwen2.5 7B on several benchmarks. These results show that fully bidirectional diffusion training from scratch is a competitive path toward strong language models. Model weights and codes: https://github.com/ML-GSAI/LLaDA.", "arxiv_id": "2606.25331", "arxiv_url": "https://arxiv.org/abs/2606.25331", "authors": ["Shen Nie", "Qiyang Min", "Shaoxuan Xu", "Zihao Huang", "Yuxuan Song", "Yong Shan", "Yankai Lin", "Wayne Xin Zhao", "Chongxuan Li", "Ji-Rong Wen"], "brief": "iLLaDA\u662f\u4e00\u4e2a\u4ece\u5934\u8bad\u7ec3\u768480\u4ebf\u53c2\u6570\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u91c7\u7528\u5b8c\u5168\u53cc\u5411\u6ce8\u610f\u529b\u673a\u5236\u66ff\u4ee3\u4f20\u7edf\u81ea\u56de\u5f52\u65b9\u5f0f\uff0c\u572812T token\u4e0a\u9884\u8bad\u7ec3\u5e76\u572825B token\u6307\u4ee4\u6570\u636e\u4e0a\u5fae\u8c03\uff0c\u5c55\u793a\u4e86\u975e\u81ea\u56de\u5f52\u6269\u6563\u8def\u5f84\u6784\u5efa\u5f3a\u5927\u8bed\u8a00\u6a21\u578b\u7684\u53ef\u884c\u6027\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25331", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u76f8\u6bd4LLaDA\uff0ciLLaDA-Base\u5728BBH\u63d0\u534721.6\u5206\u3001ARC-Challenge\u63d0\u534714.9\u5206\uff1biLLaDA-Instruct\u5728MATH\u63d0\u534714.5\u5206\u3001HumanEval\u63d0\u534716.5\u5206", "\u9884\u8bad\u7ec3\u89c4\u6a21\u8fbe12T token\uff0cSFT\u4f7f\u752825B token\u6307\u4ee4\u8bed\u6599\u8bad\u7ec312\u4e2aepoch\uff0c\u5e76\u5f15\u5165\u53d8\u957f\u751f\u6210\u63d0\u5347\u6548\u7387", "\u5f15\u5165\u57fa\u4e8e\u7f6e\u4fe1\u5ea6\u7684\u591a\u9009\u9898\u8bc4\u4f30\u65b9\u6cd5\uff0c\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u4e0eQwen2.5 7B\u4fdd\u6301\u7ade\u4e89\u529b"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u975e\u81ea\u56de\u5f52\u751f\u6210", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25331v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Improved Large Language Diffusion Models", "upvotes": 0, "what_it_is": "iLLaDA\u662f\u4e00\u4e2a\u4ece\u5934\u8bad\u7ec3\u768480\u4ebf\u53c2\u6570\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff0c\u91c7\u7528\u5b8c\u5168\u53cc\u5411\u6ce8\u610f\u529b\u673a\u5236\u66ff\u4ee3\u4f20\u7edf\u81ea\u56de\u5f52\u65b9\u5f0f\uff0c\u572812T token\u4e0a\u9884\u8bad\u7ec3\u5e76\u572825B token\u6307\u4ee4\u6570\u636e\u4e0a\u5fae\u8c03\uff0c\u5c55\u793a\u4e86\u975e\u81ea\u56de\u5f52\u6269\u6563\u8def\u5f84\u6784\u5efa\u5f3a\u5927\u8bed\u8a00\u6a21\u578b\u7684\u53ef\u884c\u6027\u3002", "why_notable": "\u9996\u6b21\u8bc1\u660e\u7eaf\u53cc\u5411\u6ce8\u610f\u529b\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\u57288B\u89c4\u6a21\u4e0b\u53ef\u4e0e\u4e3b\u6d41\u81ea\u56de\u5f52\u6a21\u578b\uff08Qwen2.5 7B\uff09\u7ade\u4e89\uff0c\u4e3a\u5927\u8bed\u8a00\u6a21\u578b\u8bad\u7ec3\u8303\u5f0f\u63d0\u4f9b\u4e86\u6709\u529b\u7684\u975e\u81ea\u56de\u5f52\u66ff\u4ee3\u8def\u7ebf\uff0c\u6a21\u578b\u6743\u91cd\u5f00\u6e90\u3002"}, {"abstract": "We present Wan-Streamer, a native-streaming, end-to-end interactive foundation model designed from the ground up for real-time, low-latency, full-duplex audio-visual interaction. Wan-Streamer seamlessly models language, audio, and video as both input and output within a single Transformer, where the sequence is represented as interleaved visual, audio, and text input tokens together with visual, audio, and text output tokens, coordinated by block-causal attention for incremental streaming. Unlike cascaded interactive systems that rely on separate VAD, ASR, language, TTS, audio-driven animation, or video-generation modules, Wan-Streamer does not rely on external language, speech, avatar, or video-generation modules: perception, reasoning, generation, response timing, turn management, and cross-modal synchronization are learned jointly within one unified model, reducing pipeline latency and error accumulation. To support natural audio-visual responsiveness, we redesign the entire stack around streamability, including causal encoders, causal decoders, block-causal attention, and low-latency multimodal token scheduling, enabling streaming units as short as 160 ms at 25 fps. Wan-Streamer achieves approximately 200 ms model-side response latency and approximately 550 ms total interaction latency when combined with 350 ms bidirectional network latency, supporting sub-second duplex audio-visual communication. These results position Wan-Streamer as a unified, end-to-end, multimodal interactive foundation model for low-latency streaming interaction.", "arxiv_id": "2606.25041", "arxiv_url": "https://arxiv.org/abs/2606.25041", "authors": ["Lianghua Huang", "Zhifan Wu", "Wei Wang", "Yupeng Shi", "Mengyang Feng", "Junjie He", "Chenwei Xie", "Yu Liu", "Jingren Zhou", "Ang Wang", "Bang Zhang", "Baole Ai", "Chen Liang", "Cheng Yu", "Chongyang Zhong", "Jinwei Qi", "Kai Zhu", "Pandeng Li", "Peng Zhang", "Wenyuan Zhang", "Xinhua Cheng", "Yitong Huang", "Yun Zheng", "Zoubin Bi"], "brief": "Wan-Streamer\u662f\u4e00\u4e2a\u539f\u751f\u6d41\u5f0f\u3001\u7aef\u5230\u7aef\u7684\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\uff0c\u5728\u5355\u4e00Transformer\u4e2d\u7edf\u4e00\u5904\u7406\u8bed\u8a00\u3001\u97f3\u9891\u548c\u89c6\u9891\u7684\u8f93\u5165\u4e0e\u8f93\u51fa\uff0c\u65e0\u9700VAD\u3001ASR\u3001TTS\u3001\u89c6\u9891\u751f\u6210\u7b49\u72ec\u7acb\u7ea7\u8054\u6a21\u5757\uff0c\u5b9e\u73b0\u4f4e\u5ef6\u8fdf\u5168\u53cc\u5de5\u97f3\u89c6\u9891\u5b9e\u65f6\u4ea4\u4e92\u3002", "categories": ["cs.CV", "cs.AI", "cs.GR", "cs.SD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25041", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u91c7\u7528\u4ea4\u9519\u5f0f\u89c6\u89c9/\u97f3\u9891/\u6587\u672ctoken\u5e8f\u5217\u4e0e\u5757\u56e0\u679c\u6ce8\u610f\u529b\u673a\u5236\uff0c\u652f\u6301160ms\u7c92\u5ea6\u7684\u6d41\u5f0f\u5355\u5143\uff0c\u5e27\u738725fps", "\u6a21\u578b\u4fa7\u54cd\u5e94\u5ef6\u8fdf\u7ea6200ms\uff0c\u52a0\u4e0a350ms\u53cc\u5411\u7f51\u7edc\u5ef6\u8fdf\u540e\u603b\u4ea4\u4e92\u5ef6\u8fdf\u7ea6550ms\uff0c\u5b9e\u73b0\u4e9a\u79d2\u7ea7\u5168\u53cc\u5de5\u901a\u4fe1", "\u611f\u77e5\u3001\u63a8\u7406\u3001\u751f\u6210\u3001\u8f6e\u6b21\u7ba1\u7406\u4e0e\u8de8\u6a21\u6001\u540c\u6b65\u5168\u90e8\u5728\u5355\u4e00\u6a21\u578b\u5185\u8054\u5408\u5b66\u4e60\uff0c\u6d88\u9664\u7ea7\u8054\u7cfb\u7edf\u7684\u8bef\u5dee\u7d2f\u79ef"], "keywords": ["\u591a\u6a21\u6001", "\u5b9e\u65f6\u4ea4\u4e92", "\u6d41\u5f0f\u751f\u6210", "\u57fa\u7840\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25041v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Wan-Streamer v0.1: End-to-end Real-time Interactive Foundation Models", "upvotes": 0, "what_it_is": "Wan-Streamer\u662f\u4e00\u4e2a\u539f\u751f\u6d41\u5f0f\u3001\u7aef\u5230\u7aef\u7684\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\uff0c\u5728\u5355\u4e00Transformer\u4e2d\u7edf\u4e00\u5904\u7406\u8bed\u8a00\u3001\u97f3\u9891\u548c\u89c6\u9891\u7684\u8f93\u5165\u4e0e\u8f93\u51fa\uff0c\u65e0\u9700VAD\u3001ASR\u3001TTS\u3001\u89c6\u9891\u751f\u6210\u7b49\u72ec\u7acb\u7ea7\u8054\u6a21\u5757\uff0c\u5b9e\u73b0\u4f4e\u5ef6\u8fdf\u5168\u53cc\u5de5\u97f3\u89c6\u9891\u5b9e\u65f6\u4ea4\u4e92\u3002", "why_notable": "\u9996\u4e2a\u5c06\u8bed\u8a00/\u97f3\u9891/\u89c6\u9891\u611f\u77e5\u4e0e\u751f\u6210\u5b8c\u5168\u7edf\u4e00\u4e8e\u5355Transformer\u7684\u7aef\u5230\u7aef\u6d41\u5f0f\u4ea4\u4e92\u6a21\u578b\uff0c\u5f7b\u5e95\u6452\u5f03\u7ea7\u8054\u67b6\u6784\uff0c\u5927\u5e45\u964d\u4f4e\u5ef6\u8fdf\u4e0e\u5de5\u7a0b\u590d\u6742\u5ea6\uff0c\u5bf9\u5b9e\u65f6\u6570\u5b57\u4eba\u3001\u8bed\u97f3\u52a9\u624b\u7b49\u5e94\u7528\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Today\u0027s reasoning models use thinking tokens to attain stronger performance on benchmarks than their instruction-tuned counterparts. It is also generally believed that this more \"deliberative\" mode should improve alignment and safety, by providing the model a safe space to consider whether its planned answer to a request violates its safety principles. We present evidence that this intuition is not always correct. Across frontier open-weight reasoning models spanning GPT-OSS, Qwen, Olmo, and Phi families, we find that the eventual refusal/compliance outcome is already strongly predictable via a trained head on the first token\u0027s hidden representation ($0.84$-$0.95$ AUROC and $\\sim88\\%$ balanced accuracy for predicting refusal/compliance) before any visible thinking. The thinking process turns out to be more akin to prefix completion than to deliberative revision, with the final outcome rarely changing after the first $\\sim20\\%$ of thinking, despite giving the appearance of deliberation at the text level ($\\sim74\\%$ of text-level deliberations occur when the response distribution is already locked to one refusal/compliance side). We also find that existing inference-time and training-based safety interventions, despite being motivated by the goal of inducing deliberation, largely shift model behavior toward over-refusal while suppressing already-scarce deliberation signals. Our results suggest that safety behavior in current reasoning models is much less deliberative than commonly assumed, and highlight the need for methods that induce real safety deliberation.", "arxiv_id": "2606.25013", "arxiv_url": "https://arxiv.org/abs/2606.25013", "authors": ["Narutatsu Ri", "Abhishek Panigrahi", "Sanjeev Arora"], "brief": "\u672c\u6587\u7814\u7a76\u63a8\u7406\u6a21\u578b\u4e2d\"\u601d\u8003token\"\u662f\u5426\u771f\u6b63\u5e26\u6765\u5b89\u5168\u5ba1\u614e\u51b3\u7b56\uff0c\u53d1\u73b0\u8de8\u591a\u4e2a\u524d\u6cbf\u5f00\u6e90\u63a8\u7406\u6a21\u578b\uff08GPT-OSS\u3001Qwen\u3001Olmo\u3001Phi\uff09\uff0c\u6a21\u578b\u7684\u62d2\u7edd/\u9075\u4ece\u7ed3\u679c\u5728\u7b2c\u4e00\u4e2atoken\u7684\u9690\u5c42\u8868\u793a\u4e0a\u5df2\u9ad8\u5ea6\u53ef\u9884\u6d4b\uff0c\u601d\u8003\u8fc7\u7a0b\u66f4\u50cf\u524d\u7f00\u8865\u5168\u800c\u975e\u771f\u6b63\u7684\u5ba1\u614e\u63a8\u7406\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25013", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4ec5\u51ed\u7b2c\u4e00\u4e2atoken\u7684\u9690\u5c42\u8868\u793a\u5373\u53ef\u9884\u6d4b\u6700\u7ec8\u62d2\u7edd/\u9075\u4ece\u7ed3\u679c\uff0cAUROC\u8fbe0.84\u20130.95\uff0c\u5e73\u8861\u51c6\u786e\u7387\u7ea688%", "\u7ea680%\u7684\u601d\u8003\u5b8c\u6210\u540e\u7ed3\u679c\u5df2\u9501\u5b9a\uff0c\u7ea674%\u7684\u6587\u672c\u5c42\u9762\"\u5ba1\u614e\"\u53d1\u751f\u65f6\u6a21\u578b\u884c\u4e3a\u5df2\u7ecf\u786e\u5b9a", "\u73b0\u6709\u63a8\u7406\u65f6\u548c\u8bad\u7ec3\u65f6\u5b89\u5168\u5e72\u9884\u624b\u6bb5\u4e3b\u8981\u5bfc\u81f4\u8fc7\u5ea6\u62d2\u7edd\uff0c\u53cd\u800c\u6291\u5236\u4e86\u672c\u5df2\u7a00\u5c11\u7684\u771f\u6b63\u5ba1\u614e\u4fe1\u53f7"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u5bf9\u9f50", "\u63a8\u7406\u6a21\u578b", "\u601d\u7ef4\u94fe"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25013v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Do Thinking Tokens Help with Safety?", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u63a8\u7406\u6a21\u578b\u4e2d\"\u601d\u8003token\"\u662f\u5426\u771f\u6b63\u5e26\u6765\u5b89\u5168\u5ba1\u614e\u51b3\u7b56\uff0c\u53d1\u73b0\u8de8\u591a\u4e2a\u524d\u6cbf\u5f00\u6e90\u63a8\u7406\u6a21\u578b\uff08GPT-OSS\u3001Qwen\u3001Olmo\u3001Phi\uff09\uff0c\u6a21\u578b\u7684\u62d2\u7edd/\u9075\u4ece\u7ed3\u679c\u5728\u7b2c\u4e00\u4e2atoken\u7684\u9690\u5c42\u8868\u793a\u4e0a\u5df2\u9ad8\u5ea6\u53ef\u9884\u6d4b\uff0c\u601d\u8003\u8fc7\u7a0b\u66f4\u50cf\u524d\u7f00\u8865\u5168\u800c\u975e\u771f\u6b63\u7684\u5ba1\u614e\u63a8\u7406\u3002", "why_notable": "\u98a0\u8986\u4e86\"\u601d\u8003token\u4f7f\u6a21\u578b\u66f4\u5b89\u5168\u5ba1\u614e\"\u7684\u666e\u904d\u8ba4\u77e5\uff0c\u63ed\u793a\u5f53\u524d\u63a8\u7406\u6a21\u578b\u5b89\u5168\u673a\u5236\u7684\u6839\u672c\u7f3a\u9677\uff0c\u5bf9LLM\u5b89\u5168\u5bf9\u9f50\u7814\u7a76\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49"}, {"abstract": "Quantum computers could outperform classical machines on important problems, but only if the errors that pervade quantum hardware can be corrected at scale. Quantum low-density parity-check (qLDPC) codes offer a promising route to this goal by combining sparse parity checks with finite encoding rate and growing distance, but their construction remains a challenging discrete design problem. Here we introduce structured concept evolution (SCE), a search framework that pairs a large language model with a structured algebraic mutation grammar to discover lifted-product code families, a class of CSS qLDPC codes. Instead of asking the LLM to design codes from first principles, SCE evolves structured concepts consisting of algebraic specifications paired with executable programs that realize them, using hierarchical mutations that modify the group algebra, protograph geometry, or base space. Running SCE, we discover a diverse set of competitive code families, ranging from abelian constructions to families over non-abelian groups beyond those underlying standard designs such as bivariate-bicycle codes, and characterize them under code-capacity depolarizing noise with BP+OSD decoding. These results are obtained with lightweight models (GPT-5.4-mini and GPT-5.4-nano).", "arxiv_id": "2606.24808", "arxiv_url": "https://arxiv.org/abs/2606.24808", "authors": ["Zidu Liu", "Florian Marquardt"], "brief": "\u672c\u6587\u63d0\u51fa\u7ed3\u6784\u5316\u6982\u5ff5\u8fdb\u5316\uff08SCE\uff09\u6846\u67b6\uff0c\u5c06\u5927\u8bed\u8a00\u6a21\u578b\u4e0e\u4ee3\u6570\u53d8\u5f02\u8bed\u6cd5\u7ed3\u5408\uff0c\u81ea\u52a8\u641c\u7d22\u5e76\u53d1\u73b0lifted-product\u91cf\u5b50LDPC\u7801\u65cf\uff0c\u65e0\u9700\u4ece\u5934\u8bbe\u8ba1\uff0c\u800c\u662f\u901a\u8fc7\u5c42\u6b21\u5316\u53d8\u5f02\u6f14\u5316\u4ee3\u6570\u89c4\u8303\u4e0e\u53ef\u6267\u884c\u7a0b\u5e8f\u3002", "categories": ["quant-ph", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.24808", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["SCE\u6846\u67b6\u5c06LLM\u4e0e\u7ed3\u6784\u5316\u4ee3\u6570\u53d8\u5f02\u8bed\u6cd5\u914d\u5bf9\uff0c\u5bf9\u7fa4\u4ee3\u6570\u3001\u539f\u56fe\u51e0\u4f55\u6216\u57fa\u7a7a\u95f4\u8fdb\u884c\u5c42\u6b21\u5316\u53d8\u5f02", "\u53d1\u73b0\u4e86\u4ece\u963f\u8d1d\u5c14\u6784\u9020\u5230\u975e\u963f\u8d1d\u5c14\u7fa4\u4e0a\u7684\u591a\u6837\u5316\u7ade\u4e89\u6027\u7801\u65cf\uff0c\u8d85\u8d8a\u4e86\u6807\u51c6\u53cc\u53d8\u91cf\u81ea\u884c\u8f66\u7801\u7684\u8bbe\u8ba1\u8303\u56f4", "\u4ec5\u4f7f\u7528\u8f7b\u91cf\u7ea7\u6a21\u578b\uff08GPT-4.1-mini\u548cGPT-4.1-nano\uff09\u5373\u53ef\u83b7\u5f97\u7ed3\u679c\uff0c\u5e76\u5728BP+OSD\u89e3\u7801\u4e0b\u5b8c\u6210\u6027\u80fd\u8868\u5f81"], "keywords": ["\u91cf\u5b50\u7ea0\u9519", "\u5927\u8bed\u8a00\u6a21\u578b", "\u81ea\u52a8\u5316\u641c\u7d22", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.24808v1", "published_at": "2026-06-23", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Large-Language-Model Discovery of Quantum LDPC Codes through Structured Concept Evolution", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u7ed3\u6784\u5316\u6982\u5ff5\u8fdb\u5316\uff08SCE\uff09\u6846\u67b6\uff0c\u5c06\u5927\u8bed\u8a00\u6a21\u578b\u4e0e\u4ee3\u6570\u53d8\u5f02\u8bed\u6cd5\u7ed3\u5408\uff0c\u81ea\u52a8\u641c\u7d22\u5e76\u53d1\u73b0lifted-product\u91cf\u5b50LDPC\u7801\u65cf\uff0c\u65e0\u9700\u4ece\u5934\u8bbe\u8ba1\uff0c\u800c\u662f\u901a\u8fc7\u5c42\u6b21\u5316\u53d8\u5f02\u6f14\u5316\u4ee3\u6570\u89c4\u8303\u4e0e\u53ef\u6267\u884c\u7a0b\u5e8f\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u5f15\u5165\u91cf\u5b50\u7ea0\u9519\u7801\u7684\u81ea\u52a8\u5316\u8bbe\u8ba1\u641c\u7d22\uff0c\u4ee5\u4f4e\u8ba1\u7b97\u6210\u672c\u53d1\u73b0\u4e86\u8d85\u8d8a\u73b0\u6709\u6807\u51c6\u8bbe\u8ba1\u7684\u65b0\u7801\u65cf\uff0c\u4e3a\u91cf\u5b50\u5bb9\u9519\u8ba1\u7b97\u7684\u7801\u6784\u9020\u63d0\u4f9b\u4e86\u5168\u65b0\u7684AI\u9a71\u52a8\u8303\u5f0f\u3002"}, {"abstract": "Rare diseases affect millions of individuals worldwide, yet timely diagnosis remains a major public health challenge due to scarcity of specialized clinical expertise. While large language models (LLMs) show promise to support rare disease diagnosis, current models are constrained by insufficient clinical deployability, limited clinically grounded evidence, and scarcity of training data. Here we present RaDaR (Rare Disease navigatoR), an open-source, compact reasoning LLM (32B parameters) for rare disease diagnosis. RaDaR was trained with 49,170 publicly available free-text cases and 104,666 synthetic cases with reasoning-enhanced training. RaDaR showed the strongest performance among evaluated open-source models, including the 671B DeepSeek-R1, across public benchmarks and four external validation centers. In a retrospective cohort, RaDaR prioritized the final diagnosis before documented clinical suspicion in 61.06 percent of cases, corresponding to a potential lead time of 1.87 months and 50.18 percent of the within-cente
