<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frontier Daily arXiv</title>
<style>
  :root {
    --bg:#f7f8fa; --card:#fff; --fg:#1a1a1a; --muted:#6b7280;
    --border:#e5e7eb; --accent:#2563eb; --tag:#eef2ff; --tag-fg:#4338ca; --top:#fef3c7;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0f1115; --card:#1a1d24; --fg:#e5e7eb; --muted:#9ca3af;
            --border:#2a2e37; --accent:#60a5fa; --tag:#1e293b; --tag-fg:#93c5fd; --top:#3a2f10; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; }
  .container { max-width:920px; margin:0 auto; padding:20px 16px 60px; }
  header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  header h1 { margin:0; font-size:22px; }
  .controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  select, input[type=search] { background:var(--card); color:var(--fg); border:1px solid var(--border);
         border-radius:8px; padding:6px 10px; font-size:14px; }
  .tabs { display:flex; gap:8px; flex-wrap:wrap; margin:16px 0; }
  .tab { padding:6px 14px; border:1px solid var(--border); border-radius:20px; cursor:pointer;
         font-size:14px; background:var(--card); color:var(--fg); user-select:none; }
  .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .meta-line { color:var(--muted); font-size:13px; margin-bottom:10px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px;
          padding:14px 16px; margin:12px 0; display:flex; gap:14px; }
  .card.top { border-left:4px solid #f59e0b; }
  .card .thumb { width:160px; height:100px; object-fit:cover; border-radius:8px; flex:none;
                 border:1px solid var(--border); background:#0001; }
  .card .body { flex:1; min-width:0; }
  .card h3 { margin:0 0 6px; font-size:16px; line-height:1.35; }
  .card h3 .badge { font-size:11px; background:var(--top); color:#92660a; border-radius:5px;
                    padding:1px 6px; margin-right:6px; vertical-align:middle; }
  .brief { color:var(--fg); font-size:14px; margin:4px 0; }
  .sec { font-size:13px; margin:4px 0; line-height:1.55; }
  .sec b { color:var(--accent); margin-right:4px; }
  .sec ul { margin:2px 0 2px 18px; padding:0; }
  .row { color:var(--muted); font-size:12px; margin:4px 0; }
  .tags span { display:inline-block; background:var(--tag); color:var(--tag-fg);
               border-radius:5px; padding:1px 7px; font-size:11px; margin:2px 4px 2px 0; }
  .links a { color:var(--accent); text-decoration:none; margin-right:12px; font-size:13px; }
  .links a:hover { text-decoration:underline; }
  .reasons { color:var(--accent); font-size:12px; margin:4px 0; }
  .empty, .loading { text-align:center; color:var(--muted); padding:40px; }
  details.abs { margin-top:4px; }
  details.abs summary { cursor:pointer; color:var(--muted); font-size:12px; }
  details.abs p { font-size:13px; color:var(--fg); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🚀 Frontier Daily arXiv</h1>
    <div class="controls">
      <input type="search" id="search" placeholder="搜索标题/摘要..."/>
      <select id="dateSel"></select>
      <select id="sortSel">
        <option value="score">按综合分</option>
        <option value="upvotes">按热度</option>
        <option value="date">按发表时间</option>
      </select>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="meta-line" id="metaLine"></div>
  <div id="list"><div class="loading">Loading papers...</div></div>
</div>

<script>
const DATA_DIR = "data";
let state = { date:null, category:"ALL", papers:[], sort:"score", q:"" };

function qsParam(name){ return new URLSearchParams(location.search).get(name); }
function arxivLink(p,label){ return `<a href="${p.arxiv_url}" target="_blank">${label}</a>`; }

async function loadIndex(){
  const r = await fetch(`${DATA_DIR}/index.json`);
  const { dates } = await r.json();
  const sel = document.getElementById("dateSel");
  sel.innerHTML = dates.map(d=>`<option value="${d}">${d}</option>`).join("");
  const wanted = qsParam("date");
  state.date = (wanted && dates.includes(wanted)) ? wanted : dates[0];
  sel.value = state.date;
  return dates;
}

async function loadDate(date){
  document.getElementById("list").innerHTML = `<div class="loading">Loading papers...</div>`;
  const r = await fetch(`${DATA_DIR}/${date}.json`);
  const data = await r.json();
  state.papers = data.papers || [];
  state.cats = data.categories || [];
  renderTabs();
  render();
  document.getElementById("metaLine").textContent =
    `${data.date} ｜ 共 ${state.papers.length} 篇 ｜ 生成于 ${data.generated_at}`;
}

function renderTabs(){
  const cats = ["ALL", ...state.cats];
  const wanted = qsParam("category");
  if (wanted && cats.includes(wanted)) state.category = wanted;
  document.getElementById("tabs").innerHTML = cats.map(c=>{
    const n = c==="ALL" ? state.papers.length
      : state.papers.filter(p=>(p.categories||[]).includes(c)).length;
    return `<div class="tab ${c===state.category?'active':''}" data-cat="${c}">${c} (${n})</div>`;
  }).join("");
  document.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state.category = t.dataset.cat; renderTabs(); render(); };
  });
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    if (!((p.title||"").toLowerCase().includes(q) ||
          (p.brief||"").toLowerCase().includes(q) ||
          (p.abstract||"").toLowerCase().includes(q))) return false;
  }
  return true;
}

function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function card(p){
  const authors = (p.authors||[]).slice(0,5).join(", ") +
      ((p.authors||[]).length>5 ? ` 等 ${p.authors.length} 人` : "");
  const tags = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const reasons = (p.selected_reasons||[]).length ? `<div class="reasons">⭐ ${p.selected_reasons.join(" · ")}</div>` : "";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const badge = p.is_top ? `<span class="badge">TOP</span>` : "";
  const absBlock = p.abstract ? `<details class="abs"><summary>展开英文摘要</summary><p>${p.abstract}</p></details>` : "";
  let detail = `<div class="brief">${p.brief||""}</div>`;
  if (p.what_it_is || (p.key_points&&p.key_points.length) || p.why_notable){
    const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
    detail = `${p.what_it_is?`<div class="sec"><b>① 事件内容</b> ${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术点/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 值得关注</b> ${p.why_notable}</div>`:""}`;
  }
  return `<div class="card ${p.is_top?'top':''}">
    ${thumb}
    <div class="body">
      <h3>${badge}${p.title}</h3>
      ${detail}
      ${reasons}
      <div class="row">👤 ${authors}</div>
      <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ 👍 ${p.upvotes} ｜ ⭐ ${p.github_stars} ｜ 分 ${p.score}</div>
      <div class="tags">${tags}</div>
      ${absBlock}
      <div class="links">
        <a href="${p.arxiv_url}" target="_blank">arXiv</a>
        <a href="${p.hf_url}" target="_blank">HF</a>
        <a href="${p.pdf_url}" target="_blank">PDF</a>
        ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
      </div>
    </div>
  </div>`;
}

function render(){
  const filtered = sortPapers(state.papers.filter(matchFilter));
  const list = document.getElementById("list");
  list.innerHTML = filtered.length
    ? filtered.map(card).join("")
    : `<div class="empty">该分类下暂无论文</div>`;
}

document.getElementById("dateSel").onchange = e=>{ state.date=e.target.value; loadDate(state.date); };
document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

(async()=>{ await loadIndex(); await loadDate(state.date); })();
</script>
</body>
</html>
