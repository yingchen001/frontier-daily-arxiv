 to navigate from buildings to streets within a single continuous episode. Existing benchmarks usually evaluate indoor and outdoor navigation separately, and many abstract away robot execution, leaving exit finding, boundary traversal, adaptation, and kinodynamic failures underexplored. We introduce NavVerse, a physics-enabled benchmark for indoor-to-outdoor embodied navigation. NavVerse contains 100 indoor scenes, 50 urban outdoor scenes, and 50 indoor-to-outdoor scenes, and 10,000 episodes spanning Object Navigation, Vision-and-Language Navigation, and Place Navigation tasks, where agents search for semantic points of interest such as restaurants or banks. Agents are evaluated through executable robot interfaces using task-success, path-efficiency, and safety metrics. Zero-shot experiments with RL, VLA, and modular baselines show that current agents remain far from solving cross-context navigation: end-to-end VLAs obtain the highest zero-shot success, while the modular method provides the strongest safety profile. PlaceNav further reveals a clear drop from outdoor to indoor-to-outdoor scenes, indicating that adaptation remains major bottleneck.", "arxiv_id": "2607.19695", "arxiv_url": "https://arxiv.org/abs/2607.19695", "authors": ["Junzhe Wu", "Yue Hu", "Zeyu Han", "Po-Hsun Chang", "Yinan Dong", "Behrad Rabiei", "Maani Ghaffari"], "brief": "\u63d0\u51fa NavVerse\uff0c\u4e00\u4e2a\u5e26\u7269\u7406\u4eff\u771f\u7684\u5ba4\u5185\u5230\u5ba4\u5916\u5177\u8eab\u5bfc\u822a\u57fa\u51c6\uff0c\u8986\u76d6\u5ba4\u5185\u3001\u57ce\u5e02\u5ba4\u5916\u53ca\u8de8\u573a\u666f\u8fde\u7eed\u4efb\u52a1\u3002\u57fa\u51c6\u5305\u542b 200 \u4e2a\u573a\u666f\u30011 \u4e07\u4e2a\u4efb\u52a1 episode\uff0c\u8bc4\u4f30 ObjectNav\u3001VLN \u548c PlaceNav \u7b49\u4efb\u52a1\u4e2d\u7684\u771f\u5b9e\u673a\u5668\u4eba\u53ef\u6267\u884c\u5bfc\u822a\u80fd\u529b\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19695", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5305\u542b 100 \u4e2a\u5ba4\u5185\u573a\u666f\u300150 \u4e2a\u57ce\u5e02\u5ba4\u5916\u573a\u666f\u300150 \u4e2a\u5ba4\u5185\u5230\u5ba4\u5916\u8fde\u7eed\u573a\u666f", "\u901a\u8fc7\u4efb\u52a1\u6210\u529f\u7387\u3001\u8def\u5f84\u6548\u7387\u548c\u5b89\u5168\u6027\u8bc4\u4f30\u673a\u5668\u4eba\u6267\u884c\u63a5\u53e3\u4e0b\u7684\u5bfc\u822a\u8868\u73b0", "\u96f6\u6837\u672c\u5b9e\u9a8c\u663e\u793a\u73b0\u6709 RL\u3001VLA\u3001\u6a21\u5757\u5316\u65b9\u6cd5\u5728\u8de8\u5ba4\u5185\u5916\u5bfc\u822a\u4e0a\u4ecd\u8868\u73b0\u4e0d\u8db3"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u673a\u5668\u4eba\u5bfc\u822a", "\u4eff\u771f\u57fa\u51c6", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19695v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "NavVerse: Benchmarking Indoor-to-Outdoor Embodied Navigation in Continuous Robot Simulation", "tldr": "\u8fde\u7eed\u5ba4\u5185\u5916\u673a\u5668\u4eba\u5bfc\u822a\u65b0\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51fa NavVerse\uff0c\u4e00\u4e2a\u5e26\u7269\u7406\u4eff\u771f\u7684\u5ba4\u5185\u5230\u5ba4\u5916\u5177\u8eab\u5bfc\u822a\u57fa\u51c6\uff0c\u8986\u76d6\u5ba4\u5185\u3001\u57ce\u5e02\u5ba4\u5916\u53ca\u8de8\u573a\u666f\u8fde\u7eed\u4efb\u52a1\u3002\u57fa\u51c6\u5305\u542b 200 \u4e2a\u573a\u666f\u30011 \u4e07\u4e2a\u4efb\u52a1 episode\uff0c\u8bc4\u4f30 ObjectNav\u3001VLN \u548c PlaceNav \u7b49\u4efb\u52a1\u4e2d\u7684\u771f\u5b9e\u673a\u5668\u4eba\u53ef\u6267\u884c\u5bfc\u822a\u80fd\u529b\u3002", "why_notable": "\u8be5\u57fa\u51c6\u8865\u8db3\u4e86\u4ee5\u5f80\u5ba4\u5185\u5916\u5bfc\u822a\u5272\u88c2\u3001\u7f3a\u5c11\u7269\u7406\u6267\u884c\u7ea6\u675f\u7684\u95ee\u9898\uff0c\u7a81\u51fa\u51fa\u53e3\u5bfb\u627e\u3001\u8fb9\u754c\u7a7f\u8d8a\u548c\u52a8\u529b\u5b66\u5931\u8d25\u7b49\u771f\u5b9e\u90e8\u7f72\u96be\u70b9\uff0c\u5bf9\u914d\u9001\u3001\u6821\u56ed\u548c\u5e94\u6025\u673a\u5668\u4eba\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Optical Character Recognition (OCR) for Persian remains substantially less mature than for Latin-script languages despite Persian being spoken by more than 110 million people across multiple countries. This gap arises from two fundamental challenges: the intrinsic complexity of the Perso-Arabic writing system and the limited availability of large-scale, high-quality annotated datasets. Persian script exhibits obligatory cursive connectivity, context-dependent glyph shaping, extensive ligatures, diacritic placement, and stylistic variation across writing forms such as Naskh and Nastaliq, all of which significantly complicate text recognition. At the same time, the high cost and labor-intensive nature of manual annotation have created a persistent data bottleneck, limiting the development of robust OCR systems and slowing progress in Persian document digitization.In this paper, we introduce Persian Pixel, a comprehensive synthetic OCR dataset specifically designed to address these challenges. Comprising over 343,000 high-fidelity image text pairs, the dataset spans sentence, paragraph, and full-page document layouts generated from a carefully curated seven-million-word Persian corpus using the SynthOCR-Gen rendering framework. The generation pipeline faithfully models the typographic characteristics of Persian script, including contextual character joining, positional glyph variants, diacritic placement, and multiple representative Persian typefaces. To bridge the synthetic-to-real domain gap, the rendered images are further enriched with more than twenty-five stochastic degradation models that emulate realistic document acquisition artifacts, including ink bleed, paper aging, blur, illumination variation, scanner imperfections, compression artifacts, and multiple noise processes.By overcoming the long-standing scarcity of annotated Persian OCR data, Persian Pixel provides a scalable and openly available resource for training and fine-tuning modern OCR architectures, including transformer-based models such as TrOCR and Donut. The dataset establishes a strong foundation for research in Persian document analysis, historical manuscript digitization, and end-to-end document understanding, while demonstrating that programmatic synthetic data generation offers a practical, cost-effective, and scalable alternative to manual annotation for advancing OCR in low-resource and typographically complex scripts.", "arxiv_id": "2607.20385", "arxiv_url": "https://arxiv.org/abs/2607.20385", "authors": ["Pouria Mahdi", "Haq Nawaz Malik"], "brief": "\u8bba\u6587\u53d1\u5e03 Persian Pixel\uff0c\u4e00\u4e2a\u5305\u542b34.3\u4e07\u4f59\u7ec4\u9ad8\u4fdd\u771f\u56fe\u6587\u5bf9\u7684\u6ce2\u65af\u8bed\u5408\u6210OCR\u6570\u636e\u96c6\u3002\u5b83\u57fa\u4e8e700\u4e07\u8bcd\u6ce2\u65af\u8bed\u8bed\u6599\u751f\u6210\u53e5\u5b50\u3001\u6bb5\u843d\u548c\u6574\u9875\u6587\u6863\u5e03\u5c40\uff0c\u5e76\u6a21\u62df\u771f\u5b9e\u626b\u63cf\u4e0e\u6210\u50cf\u9000\u5316\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20385", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8986\u76d6\u6ce2\u65af\u6587\u5b57\u7684\u8fde\u5199\u3001\u4e0a\u4e0b\u6587\u76f8\u5173\u5b57\u5f62\u3001\u4f4d\u7f6e\u53d8\u4f53\u3001\u9644\u52a0\u7b26\u53f7\u548c\u591a\u79cd\u4ee3\u8868\u6027\u5b57\u4f53", "\u4f7f\u7528 SynthOCR-Gen \u6e32\u67d3\u6846\u67b6\u751f\u6210\u591a\u7c92\u5ea6\u7248\u9762\uff1a\u53e5\u5b50\u3001\u6bb5\u843d\u548c\u5b8c\u6574\u9875\u9762", "\u52a0\u516525\u79cd\u4ee5\u4e0a\u968f\u673a\u9000\u5316\u6a21\u578b\uff0c\u5982\u58a8\u6c34\u6e17\u900f\u3001\u7eb8\u5f20\u8001\u5316\u3001\u6a21\u7cca\u3001\u5149\u7167\u53d8\u5316\u3001\u538b\u7f29\u4f2a\u5f71\u548c\u566a\u58f0"], "keywords": ["OCR", "\u5408\u6210\u6570\u636e", "\u4f4e\u8d44\u6e90\u8bed\u8a00", "\u6587\u6863\u7406\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20385v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Persian Pixel: A large-scale synthetic OCR dataset for Persian language", "tldr": "\u9762\u5411\u6ce2\u65af\u8bedOCR\u7684\u5927\u89c4\u6a21\u5408\u6210\u6570\u636e\u96c6", "upvotes": 0, "what_it_is": "\u8bba\u6587\u53d1\u5e03 Persian Pixel\uff0c\u4e00\u4e2a\u5305\u542b34.3\u4e07\u4f59\u7ec4\u9ad8\u4fdd\u771f\u56fe\u6587\u5bf9\u7684\u6ce2\u65af\u8bed\u5408\u6210OCR\u6570\u636e\u96c6\u3002\u5b83\u57fa\u4e8e700\u4e07\u8bcd\u6ce2\u65af\u8bed\u8bed\u6599\u751f\u6210\u53e5\u5b50\u3001\u6bb5\u843d\u548c\u6574\u9875\u6587\u6863\u5e03\u5c40\uff0c\u5e76\u6a21\u62df\u771f\u5b9e\u626b\u63cf\u4e0e\u6210\u50cf\u9000\u5316\u3002", "why_notable": "\u8be5\u6570\u636e\u96c6\u7f13\u89e3\u4e86\u6ce2\u65af\u8bedOCR\u957f\u671f\u7f3a\u4e4f\u5927\u89c4\u6a21\u6807\u6ce8\u6570\u636e\u7684\u95ee\u9898\uff0c\u53ef\u652f\u6301 TrOCR\u3001Donut \u7b49\u73b0\u4ee3OCR\u6a21\u578b\u8bad\u7ec3\u4e0e\u5fae\u8c03\uff0c\u5e76\u4e3a\u4f4e\u8d44\u6e90\u590d\u6742\u6587\u5b57\u7684\u5408\u6210\u6570\u636e\u6784\u5efa\u63d0\u4f9b\u53ef\u6269\u5c55\u8303\u5f0f\u3002"}, {"abstract": "Full-sized humanoid robot capabilities have grown exponentially in recent years, aiming towards general-purpose deployment in human environments. A popular control method used by manufacturers utilizes Virtual Reality for upper-body teleoperation and Reinforcement Learning for lower-body balance and locomotion control. As a result, a single remote operator can see, manipulate, and navigate about a real, distant physical environment. This powerful control stack is often relegated to expensive full-sized robots, many of which are inaccessible to the research community. Miniature humanoids are more prevalent, but employ less biomimicry in their design (e.g. fewer sensors, Degrees of Freedom, etc) and lack similar developments. This paper describes a compliant full-body telepresence control stack developed from the ground up for miniature humanoids. Framework experimentation on ROBOTIS OP3 hardware showcases walking at speeds up to 0.45 m/s independent of arm motions. Tele-loco-manipulation is demonstrated via a cube relocation experiment with an expert human operator. On average, the teleoperated system moved 2 different 40 g cubes within 10 mins, walking a total distance of 5 m. Overall, the developed system shows potential for miniature humanoid tele-loco-manipulation.", "arxiv_id": "2607.20399", "arxiv_url": "https://arxiv.org/abs/2607.20399", "authors": ["Nicolas Kosanovic", "Jordan Dowdy", "Jean Chagas Vaz"], "brief": "\u672c\u6587\u4e3a\u5c0f\u578b\u4eba\u5f62\u673a\u5668\u4eba\u4ece\u96f6\u6784\u5efa\u4e86\u4e00\u5957\u5168\u8eab\u9065\u5728\u573a\u63a7\u5236\u6808\uff1a\u4e0a\u80a2\u901a\u8fc7\u865a\u62df\u73b0\u5b9e\u9065\u64cd\u4f5c\uff0c\u4e0b\u80a2\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u5b9e\u73b0\u5e73\u8861\u4e0e\u884c\u8d70\u3002\u7cfb\u7edf\u5728 ROBOTIS OP3 \u4e0a\u9a8c\u8bc1\uff0c\u53ef\u5728\u624b\u81c2\u8fd0\u52a8\u72ec\u7acb\u7684\u60c5\u51b5\u4e0b\u7a33\u5b9a\u884c\u8d70\u5e76\u5b8c\u6210\u8fdc\u7a0b\u642c\u8fd0\u4efb\u52a1\u3002", "categories": ["cs.RO", "cs.HC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20399", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u5168\u5c3a\u5bf8\u4eba\u5f62\u673a\u5668\u4eba\u5e38\u89c1\u7684\u201cVR\u4e0a\u80a2\u9065\u64cd\u4f5c + RL\u4e0b\u80a2\u8fd0\u52a8\u63a7\u5236\u201d\u6846\u67b6\u8fc1\u79fb\u5230\u66f4\u4f4e\u6210\u672c\u3001\u66f4\u5c11\u81ea\u7531\u5ea6\u548c\u4f20\u611f\u5668\u7684\u5c0f\u578b\u4eba\u5f62\u5e73\u53f0", "\u5728 ROBOTIS OP3 \u786c\u4ef6\u4e0a\u5b9e\u73b0\u6700\u9ad8 0.45 m/s \u7684\u884c\u8d70\u901f\u5ea6\uff0c\u4e14\u884c\u8d70\u63a7\u5236\u57fa\u672c\u4e0d\u53d7\u624b\u81c2\u52a8\u4f5c\u5f71\u54cd", "\u901a\u8fc7\u7acb\u65b9\u4f53\u642c\u8fd0\u5b9e\u9a8c\u5c55\u793a tele-loco-manipulation\uff1a\u64cd\u4f5c\u8005\u5e73\u5747\u572810\u5206\u949f\u5185\u79fb\u52a82\u4e2a40\u514b\u65b9\u5757\uff0c\u603b\u884c\u8d70\u8ddd\u79bb\u7ea65\u7c73"], "keywords": ["\u4eba\u5f62\u673a\u5668\u4eba", "\u9065\u64cd\u4f5c", "\u5f3a\u5316\u5b66\u4e60", "\u865a\u62df\u73b0\u5b9e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20399v1", "published_at": "2026-07-22", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Towards Miniature Humanoid Tele-Loco-Manipulation Using Virtual Reality and Reinforcement Learning", "tldr": "\u5c0f\u578b\u4eba\u5f62\u673a\u5668\u4eba\u5b9e\u73b0VR\u9065\u64cd\u4f5c\u4e0eRL\u884c\u8d70\u64cd\u63a7", "upvotes": 0, "what_it_is": "\u672c\u6587\u4e3a\u5c0f\u578b\u4eba\u5f62\u673a\u5668\u4eba\u4ece\u96f6\u6784\u5efa\u4e86\u4e00\u5957\u5168\u8eab\u9065\u5728\u573a\u63a7\u5236\u6808\uff1a\u4e0a\u80a2\u901a\u8fc7\u865a\u62df\u73b0\u5b9e\u9065\u64cd\u4f5c\uff0c\u4e0b\u80a2\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u5b9e\u73b0\u5e73\u8861\u4e0e\u884c\u8d70\u3002\u7cfb\u7edf\u5728 ROBOTIS OP3 \u4e0a\u9a8c\u8bc1\uff0c\u53ef\u5728\u624b\u81c2\u8fd0\u52a8\u72ec\u7acb\u7684\u60c5\u51b5\u4e0b\u7a33\u5b9a\u884c\u8d70\u5e76\u5b8c\u6210\u8fdc\u7a0b\u642c\u8fd0\u4efb\u52a1\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u964d\u4f4e\u4e86\u4eba\u5f62\u673a\u5668\u4eba\u9065\u64cd\u4f5c\u4e0e\u79fb\u52a8\u64cd\u4f5c\u7814\u7a76\u7684\u786c\u4ef6\u95e8\u69db\uff0c\u4f7f\u6602\u8d35\u5168\u5c3a\u5bf8\u673a\u5668\u4eba\u4e0a\u7684\u63a7\u5236\u8303\u5f0f\u6709\u671b\u5728\u66f4\u666e\u53ca\u7684\u5c0f\u578b\u5e73\u53f0\u4e0a\u590d\u73b0\uff0c\u5177\u5907\u6559\u80b2\u3001\u7814\u7a76\u548c\u4f4e\u6210\u672c\u8fdc\u7a0b\u64cd\u4f5c\u5e94\u7528\u4ef7\u503c\u3002"}, {"abstract": "Clinical biomarker workflows in translational research settings often rely on spreadsheet-driven tracking, manual quality control (QC) reconciliation, and loosely integrated systems, resulting in limited state visibility, delayed reporting, and increased operational risk. These challenges are particularly pronounced in multi-day assays such as Luminex-based quantification of Fragile X Messenger Ribonucleoprotein (FMRP), where HIPAA-compliant data governance, deterministic workflow progression, and coordinated communication across laboratory and clinical teams are required. This paper presents FMRP-LEAN, a HIPAA-compliant, AI-augmented Laboratory Information Management System (LIMS) architecture that formalizes biospecimen lifecycle management through a finite-state workflow model with explicit transition guards and dwell-time observability. The system integrates a self-hosted Supabase/PostgreSQL stack deployed within hospital-controlled infrastructure, hybrid edge-internal isolation with encrypted tunneling and loopback-only services, and bi-directional REDCap synchronization. A unified MRN-UUIDv7 identifier framework with QR-based tracking ensures traceable clinical-research linkage under PHI residency constraints. FMRP-LEAN incorporates automated statistical QC pre-screening and a governance-constrained AI operations module that operates exclusively on aggregate projections, with deterministic fallback guarantees. Deployment demonstrates improved workflow observability, reduced QC latency, and enhanced cross-role transparency between laboratory technicians, research coordinators, and patient-facing teams. The architecture provides a reproducible model for secure, state-explicit, and AI-augmented clinical research workflows in regulated healthcare environments.", "arxiv_id": "2607.20382", "arxiv_url": "https://arxiv.org/abs/2607.20382", "authors": ["Eva McCord", "Ernest Pedapati", "Zag ElSayed"], "brief": "\u8bba\u6587\u63d0\u51fa FMRP-LEAN\uff0c\u4e00\u4e2a\u7528\u4e8e FMRP \u4e34\u5e8a\u751f\u7269\u6807\u5fd7\u7269\u68c0\u6d4b\u6d41\u7a0b\u7684 HIPAA \u5408\u89c4\u3001AI \u589e\u5f3a LIMS \u67b6\u6784\u3002\u5b83\u7528\u6709\u9650\u72b6\u6001\u5de5\u4f5c\u6d41\u3001\u53ef\u89c2\u6d4b\u505c\u7559\u65f6\u95f4\u3001\u7edf\u4e00\u6807\u8bc6\u4e0e REDCap \u53cc\u5411\u540c\u6b65\uff0c\u66ff\u4ee3\u7535\u5b50\u8868\u683c\u5f0f\u8ffd\u8e2a\u548c\u4eba\u5de5 QC \u534f\u8c03\u3002", "categories": ["cs.HC", "cs.AI", "cs.ET", "physics.med-ph", "q-bio.NC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20382", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u91c7\u7528\u6709\u9650\u72b6\u6001\u673a\u5efa\u6a21\u6837\u672c\u751f\u547d\u5468\u671f\uff0c\u8bbe\u7f6e\u663e\u5f0f\u72b6\u6001\u8f6c\u6362\u5b88\u536b\u4e0e\u505c\u7559\u65f6\u95f4\u89c2\u6d4b\uff0c\u63d0\u5347\u591a\u65e5 Luminex \u68c0\u6d4b\u6d41\u7a0b\u7684\u53ef\u89c6\u6027\u4e0e\u53ef\u63a7\u6027\u3002", "\u5728\u533b\u9662\u81ea\u63a7\u57fa\u7840\u8bbe\u65bd\u4e2d\u90e8\u7f72\u81ea\u6258\u7ba1 Supabase/PostgreSQL\uff0c\u5e76\u901a\u8fc7\u52a0\u5bc6\u96a7\u9053\u3001\u4ec5\u56de\u73af\u670d\u52a1\u548c\u8fb9\u7f18-\u5185\u90e8\u9694\u79bb\u6ee1\u8db3 PHI \u6570\u636e\u9a7b\u7559\u4e0e HIPAA \u5408\u89c4\u8981\u6c42\u3002", "\u5f15\u5165 MRN-UUIDv7 \u7edf\u4e00\u6807\u8bc6\u548c\u4e8c\u7ef4\u7801\u8ffd\u8e2a\uff0c\u7ed3\u5408\u81ea\u52a8\u7edf\u8ba1 QC \u9884\u7b5b\u67e5\u4e0e\u4ec5\u57fa\u4e8e\u805a\u5408\u6570\u636e\u8fd0\u884c\u7684\u53d7\u6cbb\u7406 AI \u8fd0\u7ef4\u6a21\u5757\uff0c\u4fdd\u8bc1\u53ef\u8ffd\u6eaf\u4e0e\u786e\u5b9a\u6027\u56de\u9000\u3002"], "keywords": ["\u533b\u7597AI", "\u5b9e\u9a8c\u5ba4\u4fe1\u606f\u7cfb\u7edf", "\u6570\u636e\u6cbb\u7406", "\u4e34\u5e8a\u5de5\u4f5c\u6d41"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20382v1", "published_at": "2026-07-22", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "FMRP-LEAN: A HIPAA-Compliant AI-Augmented LIMS Architecture for End-to-End Clinical Assay Workflow Optimization", "tldr": "\u9762\u5411\u4e34\u5e8a\u68c0\u6d4b\u7684\u5408\u89c4AI\u589e\u5f3aLIMS\u67b6\u6784", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa FMRP-LEAN\uff0c\u4e00\u4e2a\u7528\u4e8e FMRP \u4e34\u5e8a\u751f\u7269\u6807\u5fd7\u7269\u68c0\u6d4b\u6d41\u7a0b\u7684 HIPAA \u5408\u89c4\u3001AI \u589e\u5f3a LIMS \u67b6\u6784\u3002\u5b83\u7528\u6709\u9650\u72b6\u6001\u5de5\u4f5c\u6d41\u3001\u53ef\u89c2\u6d4b\u505c\u7559\u65f6\u95f4\u3001\u7edf\u4e00\u6807\u8bc6\u4e0e REDCap \u53cc\u5411\u540c\u6b65\uff0c\u66ff\u4ee3\u7535\u5b50\u8868\u683c\u5f0f\u8ffd\u8e2a\u548c\u4eba\u5de5 QC \u534f\u8c03\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u5408\u89c4\u6570\u636e\u6cbb\u7406\u3001\u5b9e\u9a8c\u5ba4\u6d41\u7a0b\u72b6\u6001\u673a\u3001\u81ea\u52a8\u5316 QC \u548c\u53d7\u9650 AI \u8fd0\u7ef4\u6574\u5408\u5230\u4e34\u5e8a\u7814\u7a76 LIMS \u4e2d\uff0c\u4e3a\u53d7\u76d1\u7ba1\u533b\u7597\u73af\u5883\u4e2d\u7684\u7aef\u5230\u7aef\u68c0\u6d4b\u6d41\u7a0b\u4f18\u5316\u63d0\u4f9b\u4e86\u53ef\u590d\u7528\u67b6\u6784\u3002"}, {"abstract": "Natural-language autoencoders score explanations of hidden activations by reconstruction: an explanation is deemed faithful if the activation can be regenerated from it. The test is structurally insensitive to individual false claims: if flipping a claim does not change the reconstruction, the claim is never penalized. We show the test is passed in two ways, neither faithful. On a released Qwen-2.5-7B verbalizer, explanations reconstruct well above chance while ~2% of specific claims are reconstruction-dependent, so the score tracks gist, not specific facts. Under exact synthetic ground truth, the standard recipe develops co-adapted private codes (false wording the reconstruction depends on) in 5/5 runs, and fixes that leave the target model unchanged do not help. We contribute two audit protocols, the grounded-vs-true cross and the evaluator swap, and RECAP (Readable Encodings via Co-trained Auxiliary Predictors): linear heads trained alongside the target model to keep designated content decodable. On RECAP-trained sandbox models, fresh verbalizers state the designated content truly and the codes vanish, at a +0.001-nat cost. This replicates on a pretrained Pythia-160M: the content becomes reliably probe-decodable, though a fresh verbalizer conveys it only in part (truth 0.44-0.46 vs a near-zero control). For interpretability, high reconstruction does not certify individual claims. For AI safety, RECAP makes designated internal content independently checkable against probes rather than asserted by prose a model can game: an independent probe scores the verbalizer\u0027s true claims above its false ones (AUC 0.96, vs 0.82 without RECAP). Against an adversary that edits an explanation to maximize the reconstruction score while lying (suppressing ~87% of its lie penalty), the RECAP probe still flags the lies (AUC 0.95) while the control probe collapses to chance (0.51).", "arxiv_id": "2607.20379", "arxiv_url": "https://arxiv.org/abs/2607.20379", "authors": ["Hiskias Dingeto"], "brief": "\u8bba\u6587\u6307\u51fa\uff0c\u7528\u91cd\u6784\u5206\u6570\u8bc4\u4f30\u9690\u85cf\u6fc0\u6d3b\u7684\u81ea\u7136\u8bed\u8a00\u89e3\u91ca\u5e76\u4e0d\u80fd\u4fdd\u8bc1\u5177\u4f53\u9648\u8ff0\u4e3a\u771f\uff1a\u6a21\u578b\u53ef\u80fd\u53ea\u6355\u6349\u5927\u610f\uff0c\u751a\u81f3\u5b66\u51fa\u4e0e\u6587\u5b57\u5171\u9002\u5e94\u7684\u79c1\u6709\u7801\u3002\u4f5c\u8005\u63d0\u51fa\u4e24\u79cd\u5ba1\u8ba1\u534f\u8bae\u548c RECAP \u65b9\u6cd5\uff0c\u901a\u8fc7\u8054\u5408\u8bad\u7ec3\u7ebf\u6027\u8f85\u52a9\u9884\u6d4b\u5934\u8ba9\u6307\u5b9a\u5185\u90e8\u5185\u5bb9\u53ef\u88ab\u72ec\u7acb\u63a2\u9488\u89e3\u7801\uff1b\u5b9e\u9a8c\u663e\u793a\u5176\u80fd\u51cf\u5c11\u6b3a\u9a97\u6027\u7f16\u7801\uff0c\u5e76\u5728\u5bf9\u6297\u6027\u6492\u8c0e\u89e3\u91ca\u4e0b\u4ecd\u6709\u6548\u8bc6\u522b\u865a\u5047\u58f0\u660e\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20379", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u53ef\u89e3\u91ca\u6027", "\u8bed\u8a00\u6a21\u578b", "\u63a2\u9488", "AI\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20379v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Train the Model, Not the Reader: Decodability Supervision for Verifiable Activation Explanations", "tldr": "\u8bba\u6587\u6307\u51fa\uff0c\u7528\u91cd\u6784\u5206\u6570\u8bc4\u4f30\u9690\u85cf\u6fc0\u6d3b\u7684\u81ea\u7136\u8bed\u8a00\u89e3\u91ca\u5e76\u4e0d\u80fd\u4fdd\u8bc1\u5177\u4f53\u9648\u8ff0\u4e3a\u771f\uff1a\u6a21\u578b\u53ef\u80fd\u53ea\u6355\u6349\u5927\u610f\uff0c\u751a\u81f3\u5b66\u51fa\u4e0e\u6587\u5b57\u5171\u9002\u5e94\u7684\u79c1\u6709\u7801\u3002\u4f5c\u8005\u63d0\u51fa\u4e24\u79cd\u5ba1\u8ba1\u534f\u8bae\u548c RECAP \u65b9\u6cd5\uff0c\u901a\u8fc7\u8054\u5408\u8bad\u7ec3\u7ebf\u6027\u8f85\u52a9\u9884\u6d4b\u5934\u8ba9\u6307\u5b9a\u5185\u90e8\u5185\u5bb9\u53ef\u88ab\u72ec\u7acb\u63a2\u9488\u89e3\u7801\uff1b\u5b9e\u9a8c\u663e\u793a\u5176\u80fd\u51cf\u5c11\u6b3a\u9a97\u6027\u7f16\u7801\uff0c\u5e76\u5728\u5bf9\u6297\u6027\u6492\u8c0e\u89e3\u91ca\u4e0b\u4ecd\u6709\u6548\u8bc6\u522b\u865a\u5047\u58f0\u660e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Generative AI can produce book-length works of fiction at near-zero cost. These books are often dismissed as low-quality ``slop\u0027\u0027 that buyers will ignore, and are assumed to carry little commercial weight. We test that assumption with full-text AI detection across 14,419 self-published genre-fiction books sold on Amazon from 2023 to 2026, matched to daily sales records through June 2026. None of these books disclose whether or not they contain AI-produced content. We find that books for which we detected substantial AI text ($\u003e$ 25\\%) make up a large share of the catalog but a smaller share of sales. Even so, they reach commercial scale, winning a growing share of sales over time and taking more of the scarce top-rank positions once held by books with no detected AI text. Over this period, the number of books with observed sales in a quarter grew 19.2-fold, while quarterly revenue grew only 8.9-fold. The market therefore added selling books faster than it added revenue, and revenue per selling book fell across most genres. Books with no AI text lose the most ground in genres with high AI diffusion, and most of all where Kindle Unlimited availability is high. Among top-selling books, those with substantial AI text draw on more distinctive language from existing books than do books with no AI text; for these books overlap rises with revenue, a gradient we do not detect for books with no AI text. Generative AI can thus reshape a creative market through scale rather than quality. Our results bear directly on the market-effect question at the center of the fair use defense to copyright infringement.", "arxiv_id": "2607.20349", "arxiv_url": "https://arxiv.org/abs/2607.20349", "authors": ["Tuhin Chakrabarty", "Xinyue Liu", "Jane C. Ginsburg", "Paramveer Dhillon"], "brief": "\u8bba\u6587\u5bf9 2023-2026 \u5e74\u4e9a\u9a6c\u900a 14419 \u672c\u81ea\u51fa\u7248\u7c7b\u578b\u5c0f\u8bf4\u8fdb\u884c\u5168\u6587 AI \u68c0\u6d4b\u5e76\u5339\u914d\u6bcf\u65e5\u9500\u91cf\uff0c\u53d1\u73b0\u542b\u5927\u91cf AI \u6587\u672c\u7684\u4e66\u5360\u76ee\u5f55\u5f88\u5927\u6bd4\u4f8b\uff0c\u9500\u91cf\u5360\u6bd4\u867d\u8f83\u5c0f\u4f46\u6301\u7eed\u589e\u957f\uff0c\u5e76\u6324\u5360\u65e0 AI \u6587\u672c\u4e66\u7c4d\u7684\u5934\u90e8\u6392\u540d\u3002\u5e02\u573a\u4e2d\u5728\u552e\u4e66\u6570\u91cf\u589e\u957f\u8fdc\u5feb\u4e8e\u6536\u5165\u589e\u957f\uff0c\u5bfc\u81f4\u5355\u4e66\u6536\u5165\u4e0b\u964d\uff0c\u8bf4\u660e\u751f\u6210\u5f0f AI \u901a\u8fc7\u89c4\u6a21\u5316\u4f9b\u7ed9\u800c\u975e\u8d28\u91cf\u4f18\u52bf\u91cd\u5851\u56fe\u4e66\u5e02\u573a\uff0c\u5e76\u5bf9\u7248\u6743\u5408\u7406\u4f7f\u7528\u4e2d\u7684\u5e02\u573a\u5f71\u54cd\u95ee\u9898\u5177\u6709\u76f4\u63a5\u610f\u4e49\u3002", "categories": ["cs.CL", "cs.AI", "cs.CY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20349", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u751f\u6210\u5f0fAI", "\u7248\u6743", "\u6570\u5b57\u5e02\u573a", "\u6587\u672c\u68c0\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20349v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Generative AI floods and dilutes the market for books", "tldr": "\u8bba\u6587\u5bf9 2023-2026 \u5e74\u4e9a\u9a6c\u900a 14419 \u672c\u81ea\u51fa\u7248\u7c7b\u578b\u5c0f\u8bf4\u8fdb\u884c\u5168\u6587 AI \u68c0\u6d4b\u5e76\u5339\u914d\u6bcf\u65e5\u9500\u91cf\uff0c\u53d1\u73b0\u542b\u5927\u91cf AI \u6587\u672c\u7684\u4e66\u5360\u76ee\u5f55\u5f88\u5927\u6bd4\u4f8b\uff0c\u9500\u91cf\u5360\u6bd4\u867d\u8f83\u5c0f\u4f46\u6301\u7eed\u589e\u957f\uff0c\u5e76\u6324\u5360\u65e0 AI \u6587\u672c\u4e66\u7c4d\u7684\u5934\u90e8\u6392\u540d\u3002\u5e02\u573a\u4e2d\u5728\u552e\u4e66\u6570\u91cf\u589e\u957f\u8fdc\u5feb\u4e8e\u6536\u5165\u589e\u957f\uff0c\u5bfc\u81f4\u5355\u4e66\u6536\u5165\u4e0b\u964d\uff0c\u8bf4\u660e\u751f\u6210\u5f0f AI \u901a\u8fc7\u89c4\u6a21\u5316\u4f9b\u7ed9\u800c\u975e\u8d28\u91cf\u4f18\u52bf\u91cd\u5851\u56fe\u4e66\u5e02\u573a\uff0c\u5e76\u5bf9\u7248\u6743\u5408\u7406\u4f7f\u7528\u4e2d\u7684\u5e02\u573a\u5f71\u54cd\u95ee\u9898\u5177\u6709\u76f4\u63a5\u610f\u4e49\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Closing the gap between benchmark performance and reliable real-world operation remains a central challenge for Vision-Language-Action (VLA) humanoid robots, which must handle execution errors, distribution shifts, and environmental variability. This paper presents DEED (Data-Efficient Post-Training and Experience-Driven Learning), a systems-level approach evaluated on a supermarket chip-restocking task using a Unitree G1-Edu humanoid robot and the GR00T N1.6 foundation model. DEED comprises three key components: (1) a data-efficient post-training pipeline with control-frequency alignment, data curation, task-relevant visual highlighting, and reduced VLA dependence; (2) a real-world study of experience-driven refinement, adapted from RECAP via a text-based advantage prefix and a vision-language value function; and (3) a latent-space analysis tool for studying in- and out-of-distribution behavior. Our results suggest that bridging the lab-to-store gap is primarily a systems integration challenge rather than an architectural one: careful data design and targeted post-training can transform a policy that fails under naive fine-tuning into a competent real-world system using only a single GPU.", "arxiv_id": "2607.20345", "arxiv_url": "https://arxiv.org/abs/2607.20345", "authors": ["Roger Sala Sis\u00f3", "Tiago Silv\u00e9rio", "Jakob Sand", "Tran Nguyen Le"], "brief": "\u672c\u6587\u63d0\u51fa DEED\uff0c\u4e00\u4e2a\u9762\u5411\u96f6\u552e\u4eba\u5f62\u673a\u5668\u4eba\u7684\u6570\u636e\u9ad8\u6548\u540e\u8bad\u7ec3\u4e0e\u7ecf\u9a8c\u9a71\u52a8\u5b66\u4e60\u6846\u67b6\uff0c\u7528\u4e8e\u7f29\u5c0f VLA \u6a21\u578b\u4ece\u5b9e\u9a8c\u5ba4\u5230\u8d85\u5e02\u573a\u666f\u7684\u843d\u5730\u5dee\u8ddd\u3002\u5728 Unitree G1-Edu \u6267\u884c\u85af\u7247\u8865\u8d27\u4efb\u52a1\u4e2d\uff0c\u7ed3\u679c\u8868\u660e\u901a\u8fc7\u6570\u636e\u8bbe\u8ba1\u3001\u89c6\u89c9\u5f3a\u8c03\u3001\u63a7\u5236\u9891\u7387\u5bf9\u9f50\u548c\u5c11\u91cf\u540e\u8bad\u7ec3\uff0c\u53ef\u5728\u5355 GPU \u6761\u4ef6\u4e0b\u663e\u8457\u63d0\u5347\u771f\u5b9e\u73af\u5883\u8868\u73b0\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20345", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u4eba\u5f62\u673a\u5668\u4eba", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c", "\u540e\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20345v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Closing the Lab-to-Store Gap: A Data-Efficient Post-Training and Experience-Driven Learning VLA Framework for Retail Humanoids", "tldr": "\u672c\u6587\u63d0\u51fa DEED\uff0c\u4e00\u4e2a\u9762\u5411\u96f6\u552e\u4eba\u5f62\u673a\u5668\u4eba\u7684\u6570\u636e\u9ad8\u6548\u540e\u8bad\u7ec3\u4e0e\u7ecf\u9a8c\u9a71\u52a8\u5b66\u4e60\u6846\u67b6\uff0c\u7528\u4e8e\u7f29\u5c0f VLA \u6a21\u578b\u4ece\u5b9e\u9a8c\u5ba4\u5230\u8d85\u5e02\u573a\u666f\u7684\u843d\u5730\u5dee\u8ddd\u3002\u5728 Unitree G1-Edu \u6267\u884c\u85af\u7247\u8865\u8d27\u4efb\u52a1\u4e2d\uff0c\u7ed3\u679c\u8868\u660e\u901a\u8fc7\u6570\u636e\u8bbe\u8ba1\u3001\u89c6\u89c9\u5f3a\u8c03\u3001\u63a7\u5236\u9891\u7387\u5bf9\u9f50\u548c\u5c11\u91cf\u540e\u8bad\u7ec3\uff0c\u53ef\u5728\u5355 GPU \u6761\u4ef6\u4e0b\u663e\u8457\u63d0\u5347\u771f\u5b9e\u73af\u5883\u8868\u73b0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This study empirically analyzed generative AI as an emerging discovery pathway to academic library resources. Utilizing web analytics from August 2023 to October 2025, the research identifies a significant increase in AI-mediated traffic, particularly following the integration of linked citation features. Referral analysis identified ChatGPT, Perplexity, and Gemini as the primary platforms driving this traffic. A substantial portion of users reached the institutional repository, primarily accessing electronic theses and dissertations. This pattern suggests that AI retrieval mechanisms effectively surface resources with structured metadata and stable permalinks that are Open Access and freely available. The results illustrate how AI ecosystems currently expose library resources and underscore the need for continued analysis and a strategic response to the evolving AI landscape.", "arxiv_id": "2607.20328", "arxiv_url": "https://arxiv.org/abs/2607.20328", "authors": ["Hae Min Kim", "Stacy Stanislaw"], "brief": "\u8be5\u7814\u7a76\u57fa\u4e8e2023\u5e748\u6708\u81f32025\u5e7410\u6708\u7684\u7f51\u9875\u5206\u6790\u6570\u636e\uff0c\u5b9e\u8bc1\u8003\u5bdf\u751f\u6210\u5f0fAI\u5982\u4f55\u6210\u4e3a\u5b66\u672f\u56fe\u4e66\u9986\u8d44\u6e90\u7684\u65b0\u53d1\u73b0\u5165\u53e3\u3002\u7ed3\u679c\u663e\u793a\uff0cChatGPT\u3001Perplexity\u3001Gemini\u5e26\u6765\u7684\u8bbf\u95ee\u91cf\u663e\u8457\u589e\u957f\uff0c\u5c24\u5176\u504f\u5411\u5f00\u653e\u83b7\u53d6\u3001\u5143\u6570\u636e\u7ed3\u6784\u5316\u4e14\u6709\u7a33\u5b9a\u94fe\u63a5\u7684\u673a\u6784\u77e5\u8bc6\u5e93\u8d44\u6e90\u3002", "categories": ["cs.DL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20328", "impact_score": 4, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u751f\u6210\u5f0fAI", "\u4fe1\u606f\u68c0\u7d22", "\u5b66\u672f\u56fe\u4e66\u9986", "\u5f00\u653e\u83b7\u53d6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20328v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Understanding Generative AI-mediated User Engagement with Academic Library Resources", "tldr": "\u8be5\u7814\u7a76\u57fa\u4e8e2023\u5e748\u6708\u81f32025\u5e7410\u6708\u7684\u7f51\u9875\u5206\u6790\u6570\u636e\uff0c\u5b9e\u8bc1\u8003\u5bdf\u751f\u6210\u5f0fAI\u5982\u4f55\u6210\u4e3a\u5b66\u672f\u56fe\u4e66\u9986\u8d44\u6e90\u7684\u65b0\u53d1\u73b0\u5165\u53e3\u3002\u7ed3\u679c\u663e\u793a\uff0cChatGPT\u3001Perplexity\u3001Gemini\u5e26\u6765\u7684\u8bbf\u95ee\u91cf\u663e\u8457\u589e\u957f\uff0c\u5c24\u5176\u504f\u5411\u5f00\u653e\u83b7\u53d6\u3001\u5143\u6570\u636e\u7ed3\u6784\u5316\u4e14\u6709\u7a33\u5b9a\u94fe\u63a5\u7684\u673a\u6784\u77e5\u8bc6\u5e93\u8d44\u6e90\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "RGB-D semantic segmentation has achieved remarkable progress, yet most models assume that RGB and depth are always available. In practice, failures or occlusions of surveillance sensors often remove one modality. Although RGB or depth alone can contain sufficient cues, models trained only on full-modality inputs fail to exploit the remaining modality once one is missing, causing severe degradation. We tackle this issue with a simple continued-training paradigm, \\emph{Condition Dropout (ConD)}, which mitigates degradation while preserving full-modality accuracy. Starting from a pretrained RGB-D model, ConD adds a second stage that randomly simulates complete, RGB-missing, and depth-missing inputs, freezes the original encoders, and trains copied encoders with zero-initialized feature injection. Experiments on NYU-Depth V2 and SUN RGB-D show that ConD improves robustness under missing modalities and even yields slight gains when modalities are complete. Our code will be made publicly available upon acceptance.", "arxiv_id": "2607.20326", "arxiv_url": "https://arxiv.org/abs/2607.20326", "authors": ["Xuchen Zhu", "Yajuan Wei", "Shuang Hao", "Jiwei Jiang", "Guanxiang Mao", "Fang Ren"], "brief": "\u672c\u6587\u9488\u5bf9 RGB-D \u8bed\u4e49\u5206\u5272\u4e2d RGB \u6216\u6df1\u5ea6\u6a21\u6001\u7f3a\u5931\u5bfc\u81f4\u6027\u80fd\u5927\u5e45\u4e0b\u964d\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u7ee7\u7eed\u8bad\u7ec3\u65b9\u6cd5 Condition Dropout\u3002\u8be5\u65b9\u6cd5\u968f\u673a\u6a21\u62df\u5b8c\u6574\u3001\u7f3a RGB\u3001\u7f3a\u6df1\u5ea6\u8f93\u5165\uff0c\u5e76\u901a\u8fc7\u51bb\u7ed3\u539f\u7f16\u7801\u5668\u4e0e\u96f6\u521d\u59cb\u5316\u7279\u5f81\u6ce8\u5165\u8bad\u7ec3\u590d\u5236\u7f16\u7801\u5668\uff0c\u5728 NYU-Depth V2 \u548c SUN RGB-D \u4e0a\u63d0\u5347\u4e86\u7f3a\u5931\u6a21\u6001\u9c81\u68d2\u6027\uff0c\u540c\u65f6\u4fdd\u6301\u751a\u81f3\u7565\u5fae\u63d0\u5347\u5b8c\u6574\u6a21\u6001\u7cbe\u5ea6\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20326", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u4e49\u5206\u5272", "\u591a\u6a21\u6001", "\u9c81\u68d2\u6027", "RGB-D"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20326v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Toward Reliable RGB-D Semantic Segmentation: Handling Missing Modalities via Condition Dropout", "tldr": "\u672c\u6587\u9488\u5bf9 RGB-D \u8bed\u4e49\u5206\u5272\u4e2d RGB \u6216\u6df1\u5ea6\u6a21\u6001\u7f3a\u5931\u5bfc\u81f4\u6027\u80fd\u5927\u5e45\u4e0b\u964d\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u7ee7\u7eed\u8bad\u7ec3\u65b9\u6cd5 Condition Dropout\u3002\u8be5\u65b9\u6cd5\u968f\u673a\u6a21\u62df\u5b8c\u6574\u3001\u7f3a RGB\u3001\u7f3a\u6df1\u5ea6\u8f93\u5165\uff0c\u5e76\u901a\u8fc7\u51bb\u7ed3\u539f\u7f16\u7801\u5668\u4e0e\u96f6\u521d\u59cb\u5316\u7279\u5f81\u6ce8\u5165\u8bad\u7ec3\u590d\u5236\u7f16\u7801\u5668\uff0c\u5728 NYU-Depth V2 \u548c SUN RGB-D \u4e0a\u63d0\u5347\u4e86\u7f3a\u5931\u6a21\u6001\u9c81\u68d2\u6027\uff0c\u540c\u65f6\u4fdd\u6301\u751a\u81f3\u7565\u5fae\u63d0\u5347\u5b8c\u6574\u6a21\u6001\u7cbe\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "AI artifacts move through a multi-platform supply chain, spanning datasets and models on Hugging Face and applications on GitHub. While each artifact carries a license whose obligations should propagate through redistribution, no study has yet measured whether those obligations survive the chain or are stripped and replaced as artifacts move downstream. We trace 232,270 dataset$\\rightarrow$model$\\rightarrow$application chains and quantify two forms of license laundering: when artifacts with no declared license acquire definitive labels downstream, and when one declared license category replaces another during redistribution. We find that 62.3% of chains pass through at least one artifact with no declared license (concentrated in a small set of foundational datasets), and that every obligation-bearing license category falls below 7% end-to-end survival while the Permissive category reaches 95.1%. Based on these findings, we provide actionable recommendations for practitioners, model publishers, rights holders, and platform owners.", "arxiv_id": "2607.20300", "arxiv_url": "https://arxiv.org/abs/2607.20300", "authors": ["James Jewitt", "Hao Li", "Gopi Krishnan Rajbahadur", "Bram Adams", "Ahmed E. Hassan"], "brief": "\u8bba\u6587\u8ffd\u8e2a\u4e86 232,270 \u6761\u4ece\u6570\u636e\u96c6\u5230\u6a21\u578b\u518d\u5230\u5e94\u7528\u7684 AI \u4f9b\u5e94\u94fe\uff0c\u7cfb\u7edf\u6d4b\u91cf\u8bb8\u53ef\u8bc1\u4e49\u52a1\u5728\u8de8\u5e73\u53f0\u4f20\u64ad\u4e2d\u88ab\u9057\u6f0f\u6216\u66ff\u6362\u7684\u201c\u8bb8\u53ef\u8bc1\u6d17\u767d\u201d\u73b0\u8c61\u3002\u7ed3\u679c\u663e\u793a\uff0c62.3% \u7684\u94fe\u6761\u5305\u542b\u672a\u58f0\u660e\u8bb8\u53ef\u8bc1\u7684\u73af\u8282\uff0c\u5e26\u4e49\u52a1\u7684\u8bb8\u53ef\u8bc1\u7aef\u5230\u7aef\u4fdd\u7559\u7387\u5747\u4f4e\u4e8e 7%\uff0c\u800c\u5bbd\u677e\u8bb8\u53ef\u8bc1\u4fdd\u7559\u7387\u9ad8\u8fbe 95.1%\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20300", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["AI\u4f9b\u5e94\u94fe", "\u8bb8\u53ef\u8bc1\u5408\u89c4", "\u6570\u636e\u96c6", "\u6a21\u578b\u6cbb\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20300v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Don\u0027t Trust the Label: License Laundering in AI Supply Chains", "tldr": "\u8bba\u6587\u8ffd\u8e2a\u4e86 232,270 \u6761\u4ece\u6570\u636e\u96c6\u5230\u6a21\u578b\u518d\u5230\u5e94\u7528\u7684 AI \u4f9b\u5e94\u94fe\uff0c\u7cfb\u7edf\u6d4b\u91cf\u8bb8\u53ef\u8bc1\u4e49\u52a1\u5728\u8de8\u5e73\u53f0\u4f20\u64ad\u4e2d\u88ab\u9057\u6f0f\u6216\u66ff\u6362\u7684\u201c\u8bb8\u53ef\u8bc1\u6d17\u767d\u201d\u73b0\u8c61\u3002\u7ed3\u679c\u663e\u793a\uff0c62.3% \u7684\u94fe\u6761\u5305\u542b\u672a\u58f0\u660e\u8bb8\u53ef\u8bc1\u7684\u73af\u8282\uff0c\u5e26\u4e49\u52a1\u7684\u8bb8\u53ef\u8bc1\u7aef\u5230\u7aef\u4fdd\u7559\u7387\u5747\u4f4e\u4e8e 7%\uff0c\u800c\u5bbd\u677e\u8bb8\u53ef\u8bc1\u4fdd\u7559\u7387\u9ad8\u8fbe 95.1%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We consider a task planning scenario in which robots sharing a persistent environment are assigned tasks one at a time from a held-out sequence. Standard task planners, lacking foresight of future tasks and inconsiderate of others\u0027 constraints, solve each task in isolation, leaving terminal states that increase future cost for all, side effects that compound over lengthy task sequences. To reduce cost over the sequence, a robot must anticipate how its actions now may impact performance on future tasks for all robots sharing the environment. Therefore, we present courteous anticipatory planning, wherein a model-based planner proposes candidate plans and selects the one that jointly minimizes immediate cost and aggregated expected future cost across all robots, estimated via independent per-robot learned estimators. This factored formulation avoids combinatorial joint rollouts and supports modular deployment: adding a robot requires only training its own estimator. We evaluate in two persistent PDDL domains, a home environment with robots that have similar capabilities but different responsibilities, and a restaurant environment where robots\u0027 distinct capabilities create states that other robots lack the capability to resolve. During lengthy task sequences, our planner reduces total cost by 10.43% versus myopic and 4.03% versus selfish anticipatory planning in a two-robot home environment and by 17.41% and 13.24%, respectively, in a three-robot restaurant.", "arxiv_id": "2607.20289", "arxiv_url": "https://arxiv.org/abs/2607.20289", "authors": ["Md Ridwan Hossain Talukder", "Roshan Dhakal", "Elizabeth Phillips", "Gregory J. Stein"], "brief": "\u8bba\u6587\u63d0\u51fa\u201c\u793c\u8c8c\u5f0f\u9884\u671f\u89c4\u5212\u201d\uff0c\u8ba9\u673a\u5668\u4eba\u5728\u6301\u4e45\u5171\u4eab\u73af\u5883\u4e2d\u6267\u884c\u5f53\u524d\u4efb\u52a1\u65f6\uff0c\u540c\u65f6\u4f30\u8ba1\u5bf9\u672a\u6765\u4efb\u52a1\u53ca\u5176\u4ed6\u673a\u5668\u4eba\u7684\u5f71\u54cd\u3002\u65b9\u6cd5\u7528\u6a21\u578b\u89c4\u5212\u5668\u751f\u6210\u5019\u9009\u65b9\u6848\uff0c\u5e76\u7ed3\u5408\u5404\u673a\u5668\u4eba\u72ec\u7acb\u5b66\u4e60\u7684\u672a\u6765\u6210\u672c\u4f30\u8ba1\u5668\u8fdb\u884c\u9009\u62e9\uff0c\u907f\u514d\u8054\u5408 rollout \u7684\u7ec4\u5408\u7206\u70b8\uff1b\u5728\u5bb6\u5ead\u548c\u9910\u5385 PDDL \u573a\u666f\u4e2d\uff0c\u76f8\u6bd4\u77ed\u89c6\u89c4\u5212\u548c\u81ea\u5229\u9884\u671f\u89c4\u5212\u663e\u8457\u964d\u4f4e\u957f\u671f\u603b\u6210\u672c\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20289", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u673a\u5668\u4eba\u89c4\u5212", "\u667a\u80fd\u4f53", "\u4efb\u52a1\u89c4\u5212", "\u591a\u673a\u5668\u4eba\u534f\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20289v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Courteous Anticipation: Improving Long-Lived Task Planning in Persistent Shared Environments", "tldr": "\u8bba\u6587\u63d0\u51fa\u201c\u793c\u8c8c\u5f0f\u9884\u671f\u89c4\u5212\u201d\uff0c\u8ba9\u673a\u5668\u4eba\u5728\u6301\u4e45\u5171\u4eab\u73af\u5883\u4e2d\u6267\u884c\u5f53\u524d\u4efb\u52a1\u65f6\uff0c\u540c\u65f6\u4f30\u8ba1\u5bf9\u672a\u6765\u4efb\u52a1\u53ca\u5176\u4ed6\u673a\u5668\u4eba\u7684\u5f71\u54cd\u3002\u65b9\u6cd5\u7528\u6a21\u578b\u89c4\u5212\u5668\u751f\u6210\u5019\u9009\u65b9\u6848\uff0c\u5e76\u7ed3\u5408\u5404\u673a\u5668\u4eba\u72ec\u7acb\u5b66\u4e60\u7684\u672a\u6765\u6210\u672c\u4f30\u8ba1\u5668\u8fdb\u884c\u9009\u62e9\uff0c\u907f\u514d\u8054\u5408 rollout \u7684\u7ec4\u5408\u7206\u70b8\uff1b\u5728\u5bb6\u5ead\u548c\u9910\u5385 PDDL \u573a\u666f\u4e2d\uff0c\u76f8\u6bd4\u77ed\u89c6\u89c4\u5212\u548c\u81ea\u5229\u9884\u671f\u89c4\u5212\u663e\u8457\u964d\u4f4e\u957f\u671f\u603b\u6210\u672c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We propose a novel framework for computing rigorous bounds on the probability that a large language model (LLM) generates harmful output to a given prompt. We study a new application of the Clopper-Pearson confidence intervals to obtain probably approximately correct (PAC) bounds for this problem. As our main technical contribution, we propose an algorithm that leverages features in the latent space to prioritize exploring branches in the auto-regressive generation tree that are more likely to produce harmful outputs. Our approach in particular enables the efficient computation of useful lower bounds, even in scenarios where the true harm probability is extremely small, and crucially, the obtained lower bounds are sound, i.e., formally proven to be less than the actual harmfulness probability: our experimental results demonstrate the effectiveness of our method by computing non-trivial lower bounds on state-of-the-art LLMs. This study newly enables the evaluation and statistical certification of LLMs.", "arxiv_id": "2607.20286", "arxiv_url": "https://arxiv.org/abs/2607.20286", "authors": ["Mahdi Nazeri", "Anne-Kathrin Schmuck", "Sadegh Soudjani", "Alessandro Abate"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u7528\u4e8e\u4e25\u683c\u4f30\u8ba1\u5927\u8bed\u8a00\u6a21\u578b\u5bf9\u7ed9\u5b9a\u63d0\u793a\u751f\u6210\u6709\u5bb3\u8f93\u51fa\u6982\u7387\u7684\u6846\u67b6\uff0c\u7ed3\u5408 Clopper-Pearson \u7f6e\u4fe1\u533a\u95f4\u7ed9\u51fa PAC \u6982\u7387\u5b89\u5168\u754c\u3002\u6838\u5fc3\u7b97\u6cd5\u5229\u7528\u6f5c\u5728\u7a7a\u95f4\u7279\u5f81\u4f18\u5148\u63a2\u7d22\u66f4\u53ef\u80fd\u4ea7\u751f\u6709\u5bb3\u8f93\u51fa\u7684\u81ea\u56de\u5f52\u751f\u6210\u5206\u652f\uff0c\u5728\u771f\u5b9e\u5371\u5bb3\u6982\u7387\u5f88\u4f4e\u65f6\u4e5f\u80fd\u9ad8\u6548\u8ba1\u7b97\u6709\u610f\u4e49\u4e14\u5f62\u5f0f\u53ef\u9760\u7684\u4e0b\u754c\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20286", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168\u8bc4\u4f30", "\u6982\u7387\u754c", "\u7edf\u8ba1\u8ba4\u8bc1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20286v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Sound Probabilistic Safety Bounds for Large Language Models", "tldr": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u7528\u4e8e\u4e25\u683c\u4f30\u8ba1\u5927\u8bed\u8a00\u6a21\u578b\u5bf9\u7ed9\u5b9a\u63d0\u793a\u751f\u6210\u6709\u5bb3\u8f93\u51fa\u6982\u7387\u7684\u6846\u67b6\uff0c\u7ed3\u5408 Clopper-Pearson \u7f6e\u4fe1\u533a\u95f4\u7ed9\u51fa PAC \u6982\u7387\u5b89\u5168\u754c\u3002\u6838\u5fc3\u7b97\u6cd5\u5229\u7528\u6f5c\u5728\u7a7a\u95f4\u7279\u5f81\u4f18\u5148\u63a2\u7d22\u66f4\u53ef\u80fd\u4ea7\u751f\u6709\u5bb3\u8f93\u51fa\u7684\u81ea\u56de\u5f52\u751f\u6210\u5206\u652f\uff0c\u5728\u771f\u5b9e\u5371\u5bb3\u6982\u7387\u5f88\u4f4e\u65f6\u4e5f\u80fd\u9ad8\u6548\u8ba1\u7b97\u6709\u610f\u4e49\u4e14\u5f62\u5f0f\u53ef\u9760\u7684\u4e0b\u754c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Medical image encoders from different groups are increasingly treated as interchangeable, on the assumption that scale and clinical supervision concentrate their representations onto a shared structure. Whether this convergence is real, what produces it, and whether it is clinically usable are untested, and the similarity measures behind such claims are fragile. We present a controlled dissection across 18 image and 7 text encoders, all open-weight and run locally, spanning 7M to 27B parameters and five imaging modalities, including 650,982 chest radiographs from six datasets. To isolate cause, we train encoders that vary only the objective under fixed data, architecture, and scale, and reproduce the effect in a synthetic model. Convergence is modest but above a random floor, driven by the self-supervised objective, not clinical supervision: matched self-supervised encoders aligned most (40.4% on chest radiography), with label-supervised (21.1%) and image-text (3.3%) far lower, and did not grow with size (Spearman 0.302, p=0.223) or capability. It is within-modality, does not reach clinical language, and does not reproduce how radiologists judge case similarity. Yet a linear classifier transfers across encoders and to five held-out hospitals, retaining about 85% of within-encoder performance. Convergence in medical imaging is therefore set by the pretraining objective, not inherited from scale or clinical supervision. Interoperability is accordingly something to design for through that objective, and to validate where the shared geometry is weakest, across patient subgroups and against clinical judgment.", "arxiv_id": "2607.20274", "arxiv_url": "https://arxiv.org/abs/2607.20274", "authors": ["Soroosh Tayebi Arasteh", "Sebastian Ziegelmayer", "Mahshad Lotfinia", "Lisa Adams", "Sven Nebelung", "Jakob Nikolas Kather", "Daniel Truhn"], "brief": "\u672c\u6587\u7cfb\u7edf\u6bd4\u8f83\u4e8618\u4e2a\u533b\u5b66\u56fe\u50cf\u7f16\u7801\u5668\u548c7\u4e2a\u6587\u672c\u7f16\u7801\u5668\uff0c\u53d1\u73b0\u533b\u5b66\u57fa\u7840\u6a21\u578b\u7684\u8868\u5f81\u6536\u655b\u867d\u9ad8\u4e8e\u968f\u673a\u6c34\u5e73\uff0c\u4f46\u4e3b\u8981\u7531\u81ea\u76d1\u7763\u76ee\u6807\u9a71\u52a8\uff0c\u800c\u975e\u4e34\u5e8a\u76d1\u7763\u3001\u6a21\u578b\u89c4\u6a21\u6216\u80fd\u529b\u63d0\u5347\u3002\u6536\u655b\u4e3b\u8981\u53d1\u751f\u5728\u540c\u4e00\u5f71\u50cf\u6a21\u6001\u5185\uff0c\u4e0d\u80fd\u5f88\u597d\u5bf9\u9f50\u4e34\u5e8a\u8bed\u8a00\u6216\u653e\u5c04\u79d1\u533b\u751f\u7684\u76f8\u4f3c\u6027\u5224\u65ad\uff0c\u4f46\u7ebf\u6027\u5206\u7c7b\u5668\u8de8\u7f16\u7801\u5668\u548c\u8de8\u533b\u9662\u8fc1\u79fb\u4ecd\u80fd\u4fdd\u7559\u7ea685%\u7684\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20274", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u5f71\u50cf", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u57fa\u7840\u6a21\u578b", "\u8868\u5f81\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20274v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Self-supervision drives representational convergence in medical foundation models more than clinical supervision", "tldr": "\u672c\u6587\u7cfb\u7edf\u6bd4\u8f83\u4e8618\u4e2a\u533b\u5b66\u56fe\u50cf\u7f16\u7801\u5668\u548c7\u4e2a\u6587\u672c\u7f16\u7801\u5668\uff0c\u53d1\u73b0\u533b\u5b66\u57fa\u7840\u6a21\u578b\u7684\u8868\u5f81\u6536\u655b\u867d\u9ad8\u4e8e\u968f\u673a\u6c34\u5e73\uff0c\u4f46\u4e3b\u8981\u7531\u81ea\u76d1\u7763\u76ee\u6807\u9a71\u52a8\uff0c\u800c\u975e\u4e34\u5e8a\u76d1\u7763\u3001\u6a21\u578b\u89c4\u6a21\u6216\u80fd\u529b\u63d0\u5347\u3002\u6536\u655b\u4e3b\u8981\u53d1\u751f\u5728\u540c\u4e00\u5f71\u50cf\u6a21\u6001\u5185\uff0c\u4e0d\u80fd\u5f88\u597d\u5bf9\u9f50\u4e34\u5e8a\u8bed\u8a00\u6216\u653e\u5c04\u79d1\u533b\u751f\u7684\u76f8\u4f3c\u6027\u5224\u65ad\uff0c\u4f46\u7ebf\u6027\u5206\u7c7b\u5668\u8de8\u7f16\u7801\u5668\u548c\u8de8\u533b\u9662\u8fc1\u79fb\u4ecd\u80fd\u4fdd\u7559\u7ea685%\u7684\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "While Large Language Models (LLMs) excel at many tasks, they frequently struggle with complex reasoning that requires long-horizon planning and iterative error correction. Furthermore, standard single-stream prompting proves brittle when models encounter novel abstractions or rigorous domain constraints. We introduce PoTRE (Poly-Topological Reasoning Ensembles), a heterogeneous framework that decouples inference into four agents: (1) Adversarial Refinement Agent, (2) Hierarchical strategic Planning Agent, (3) Spectrum Search Agent, and (4) Direct Chain Agent. A final Task-Adaptive Aggregation Layer dynamically reconciles these perspectives -- via final candidate selection, semantic synthesis, or neuro-symbolic verification -- to produce a robust global solution. We evaluate PoTRE on three frontier benchmarks: ARC-AGI-2, Humanity\u0027s Last Exam (HLE), and PRBench Finance. PoTRE achieves state-of-the-art accuracy of 49.92% on HLE, surpassing the previous best official score. We demonstrate that this architectural heterogeneity achieves improved reasoning performance using similar or fewer inference tokens compared to heavily scaled homogeneous baselines.", "arxiv_id": "2607.20268", "arxiv_url": "https://arxiv.org/abs/2607.20268", "authors": ["Anmol Kankariya", "Sercan \u00d6. Ar\u0131k"], "brief": "PoTRE \u63d0\u51fa\u4e00\u79cd\u6d4b\u8bd5\u65f6\u5f02\u6784\u63a8\u7406\u96c6\u6210\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u62c6\u5206\u4e3a\u5bf9\u6297\u4fee\u6b63\u3001\u5c42\u7ea7\u89c4\u5212\u3001\u8c31\u641c\u7d22\u548c\u76f4\u63a5\u601d\u7ef4\u94fe\u56db\u7c7b\u667a\u80fd\u4f53\uff0c\u5e76\u901a\u8fc7\u4efb\u52a1\u81ea\u9002\u5e94\u805a\u5408\u5c42\u6574\u5408\u7b54\u6848\u3002\u5728 ARC-AGI-2\u3001HLE \u548c\u91d1\u878d\u63a8\u7406\u57fa\u51c6\u4e0a\u8868\u73b0\u5f3a\u52b2\uff0c\u5176\u4e2d HLE \u8fbe\u5230 49.92% \u7684\u6700\u65b0\u6700\u4f73\u51c6\u786e\u7387\uff0c\u4e14\u63a8\u7406 token \u4e0d\u9ad8\u4e8e\u5927\u89c4\u6a21\u540c\u8d28\u57fa\u7ebf\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20268", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6d4b\u8bd5\u65f6\u63a8\u7406", "\u96c6\u6210\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20268v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PoTRE: Test-Time Reasoning inspired by Cognitive Heterogeneity", "tldr": "PoTRE \u63d0\u51fa\u4e00\u79cd\u6d4b\u8bd5\u65f6\u5f02\u6784\u63a8\u7406\u96c6\u6210\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u62c6\u5206\u4e3a\u5bf9\u6297\u4fee\u6b63\u3001\u5c42\u7ea7\u89c4\u5212\u3001\u8c31\u641c\u7d22\u548c\u76f4\u63a5\u601d\u7ef4\u94fe\u56db\u7c7b\u667a\u80fd\u4f53\uff0c\u5e76\u901a\u8fc7\u4efb\u52a1\u81ea\u9002\u5e94\u805a\u5408\u5c42\u6574\u5408\u7b54\u6848\u3002\u5728 ARC-AGI-2\u3001HLE \u548c\u91d1\u878d\u63a8\u7406\u57fa\u51c6\u4e0a\u8868\u73b0\u5f3a\u52b2\uff0c\u5176\u4e2d HLE \u8fbe\u5230 49.92% \u7684\u6700\u65b0\u6700\u4f73\u51c6\u786e\u7387\uff0c\u4e14\u63a8\u7406 token \u4e0d\u9ad8\u4e8e\u5927\u89c4\u6a21\u540c\u8d28\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large-scale pretrained language models such as T5 and BERT have demonstrated strong capabilities for generating structured knowledge. However, their performance depends on how closely the prompting strategy matches the objectives used during pretraining. We introduce the Maskability Index (MI), a quantitative metric that estimates whether a knowledge relation is better suited to masked-style prompting or prefix-style prompting in few-shot generation. MI is computed from differences in DepthRank scores between masked and unmasked templates, providing a principled measure of objective-template alignment. We evaluate MI on a diverse set of relations from the ATOMIC2020 knowledge base completion benchmark and show that it is positively correlated with downstream generation performance. These results indicate that MI can help select appropriate prompting templates and adaptation strategies for extracting relational knowledge from pretrained language models, especially in low-resource settings.", "arxiv_id": "2607.20265", "arxiv_url": "https://arxiv.org/abs/2607.20265", "authors": ["Ahmad Pouramini", "Mahsa Afsharzadeh"], "brief": "\u8bba\u6587\u63d0\u51fa Maskability Index\uff08MI\uff09\uff0c\u7528\u4e8e\u91cf\u5316\u77e5\u8bc6\u5173\u7cfb\u66f4\u9002\u5408\u63a9\u7801\u5f0f\u63d0\u793a\u8fd8\u662f\u524d\u7f00\u5f0f\u63d0\u793a\uff0c\u4ece\u800c\u8bc4\u4f30\u63d0\u793a\u6a21\u677f\u4e0e\u9884\u8bad\u7ec3\u76ee\u6807\u7684\u4e00\u81f4\u6027\u3002\u4f5c\u8005\u5728 ATOMIC2020 \u77e5\u8bc6\u5e93\u8865\u5168\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0cMI \u4e0e\u4e0b\u6e38\u751f\u6210\u6548\u679c\u6b63\u76f8\u5173\uff0c\u53ef\u5e2e\u52a9\u4f4e\u8d44\u6e90\u573a\u666f\u4e0b\u9009\u62e9\u66f4\u5408\u9002\u7684\u63d0\u793a\u4e0e\u9002\u914d\u7b56\u7565\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20265", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9884\u8bad\u7ec3\u8bed\u8a00\u6a21\u578b", "\u63d0\u793a\u5b66\u4e60", "\u77e5\u8bc6\u62bd\u53d6", "\u4f4e\u8d44\u6e90\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20265v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Maskability Index: Predicting Task-Objective Alignment in Pretrained Language Models", "tldr": "\u8bba\u6587\u63d0\u51fa Maskability Index\uff08MI\uff09\uff0c\u7528\u4e8e\u91cf\u5316\u77e5\u8bc6\u5173\u7cfb\u66f4\u9002\u5408\u63a9\u7801\u5f0f\u63d0\u793a\u8fd8\u662f\u524d\u7f00\u5f0f\u63d0\u793a\uff0c\u4ece\u800c\u8bc4\u4f30\u63d0\u793a\u6a21\u677f\u4e0e\u9884\u8bad\u7ec3\u76ee\u6807\u7684\u4e00\u81f4\u6027\u3002\u4f5c\u8005\u5728 ATOMIC2020 \u77e5\u8bc6\u5e93\u8865\u5168\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0cMI \u4e0e\u4e0b\u6e38\u751f\u6210\u6548\u679c\u6b63\u76f8\u5173\uff0c\u53ef\u5e2e\u52a9\u4f4e\u8d44\u6e90\u573a\u666f\u4e0b\u9009\u62e9\u66f4\u5408\u9002\u7684\u63d0\u793a\u4e0e\u9002\u914d\u7b56\u7565\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In this report, we present a unified song generation framework capable of producing high-quality full-length music from lyrics, text descriptions, and musical attributes. The proposed framework supports three tasks: Lyrics-to-Song Generation, which generates complete songs from text descriptions, lyrics, and musical attributes; Instrumental Music Generation, which creates music without vocals; and Cover Song Generation, which reinterprets existing songs with different styles while preserving their melodic content. Architecturally, our system consists of four main components: a semantic-aware tokenizer, hybird-LM, FullDiT, and a two-level melody module. The tokenizer encodes audio into 8-codebook RVQ tokens for efficient discrete music representation. Based on these tokens, hybird-LM performs hierarchical autoregressive audio-token modeling for full-song generation. To improve audio fidelity, FullDiT performs full-song flow matching in a continuous VAE latent space conditioned on codec tokens, lyrics, and text captions. For cover song generation, the melody module extracts and discretizes melody cues from reference audio to guide generation while preserving the original melodic content. Finally, we investigate DPO, GRPO, and OPD as reward-based post-training strategies for hybird-LM and apply flow-based GRPO to FullDiT to improve musicality and rendering quality. Experimental results on a multilingual automatic benchmark, complemented by the Artificial Analysis Music with Vocals leaderboard, show that the proposed framework achieves competitive performance in the evaluated settings.", "arxiv_id": "2607.20253", "arxiv_url": "https://arxiv.org/abs/2607.20253", "authors": ["Junyu Dai", "Xinyue Fan", "Weiqin Li", "Xiangang Li", "Yunjia Li", "Bin Ma", "Yukun Ma", "Chongjia Ni", "Yufei Shi", "Haoxu Wang", "Menglin Wu", "Jianwei Yu", "Huaicheng Zhang", "Han Zhao", "Shengkui Zhao", "Haina Zhu"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u7edf\u4e00\u7684\u5168\u66f2\u751f\u6210\u6846\u67b6\uff0c\u53ef\u4ece\u6b4c\u8bcd\u3001\u6587\u672c\u63cf\u8ff0\u548c\u97f3\u4e50\u5c5e\u6027\u751f\u6210\u5e26\u4eba\u58f0\u6b4c\u66f2\u3001\u7eaf\u97f3\u4e50\uff0c\u5e76\u652f\u6301\u4fdd\u7559\u65cb\u5f8b\u7684\u7ffb\u5531\u751f\u6210\u3002\u65b9\u6cd5\u7ed3\u5408\u5c42\u6b21\u5316\u81ea\u56de\u5f52\u97f3\u9891 token \u89c4\u5212\u4e0e\u57fa\u4e8e flow matching \u7684\u8fde\u7eed\u6f5c\u7a7a\u95f4\u6e32\u67d3\uff0c\u5e76\u7528\u5956\u52b1\u540e\u8bad\u7ec3\u63d0\u5347\u97f3\u4e50\u6027\u548c\u97f3\u8d28\uff0c\u5728\u591a\u8bed\u79cd\u57fa\u51c6\u548c\u699c\u5355\u4e0a\u8868\u73b0\u6709\u7ade\u4e89\u529b\u3002", "categories": ["cs.SD", "cs.AI", "eess.AS"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20253", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u97f3\u4e50\u751f\u6210", "\u81ea\u56de\u5f52\u6a21\u578b", "Flow Matching", "\u5956\u52b1\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20253v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Pushing the Frontier of Full-Song Generation: Hierarchical Autoregressive Planning Meets Flow-Matching Rendering", "tldr": "\u672c\u6587\u63d0\u51fa\u4e00\u4e2a\u7edf\u4e00\u7684\u5168\u66f2\u751f\u6210\u6846\u67b6\uff0c\u53ef\u4ece\u6b4c\u8bcd\u3001\u6587\u672c\u63cf\u8ff0\u548c\u97f3\u4e50\u5c5e\u6027\u751f\u6210\u5e26\u4eba\u58f0\u6b4c\u66f2\u3001\u7eaf\u97f3\u4e50\uff0c\u5e76\u652f\u6301\u4fdd\u7559\u65cb\u5f8b\u7684\u7ffb\u5531\u751f\u6210\u3002\u65b9\u6cd5\u7ed3\u5408\u5c42\u6b21\u5316\u81ea\u56de\u5f52\u97f3\u9891 token \u89c4\u5212\u4e0e\u57fa\u4e8e flow matching \u7684\u8fde\u7eed\u6f5c\u7a7a\u95f4\u6e32\u67d3\uff0c\u5e76\u7528\u5956\u52b1\u540e\u8bad\u7ec3\u63d0\u5347\u97f3\u4e50\u6027\u548c\u97f3\u8d28\uff0c\u5728\u591a\u8bed\u79cd\u57fa\u51c6\u548c\u699c\u5355\u4e0a\u8868\u73b0\u6709\u7ade\u4e89\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Culturally loaded translation poses unique challenges for machine translation (MT), as meanings are deeply embedded in socio-cultural contexts beyond surface linguistic forms. Although large language models (LLMs) have enabled MT systems to achieve human-like quality in many scenarios, their ability to handle culturally loaded expressions remains underexplored. In this study, we systematically investigate the challenges posed by culturally loaded translation in LLM-based MT systems. We construct a Chinese-Japanese bilingual dataset from the culturally representative corpus Dream of the Red Chamber, containing 500 segments across diverse cultural categories. Using a comprehensive evaluation protocol, we reveal three main challenges: (1) task challenges, where frontier LLMs exhibit notable performance gaps and struggle with culturally loaded content; (2) human evaluation challenges, where evaluator backgrounds lead to substantial disagreement in translation judgments; and (3) automatic evaluation challenges, where widely used metrics fail to reliably assess translation quality for this task. These findings may offer valuable insights for culture-oriented translation research in both computational science and linguistics.", "arxiv_id": "2607.20241", "arxiv_url": "https://arxiv.org/abs/2607.20241", "authors": ["Yiming Wang", "Jiayuan Di"], "brief": "\u672c\u6587\u4ee5\u300a\u7ea2\u697c\u68a6\u300b\u4e3a\u6587\u5316\u8f7d\u4f53\uff0c\u6784\u5efa\u4e86\u5305\u542b500\u4e2a\u4e2d\u65e5\u53cc\u8bed\u7247\u6bb5\u7684\u6587\u5316\u8d1f\u8f7d\u7ffb\u8bd1\u6570\u636e\u96c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u5728\u76f8\u5173\u673a\u5668\u7ffb\u8bd1\u4efb\u52a1\u4e2d\u7684\u8868\u73b0\u3002\u7814\u7a76\u53d1\u73b0\u524d\u6cbf\u6a21\u578b\u4ecd\u96be\u5904\u7406\u6587\u5316\u9690\u542b\u610f\u4e49\uff0c\u4eba\u7c7b\u8bc4\u5ba1\u56e0\u80cc\u666f\u5dee\u5f02\u5206\u6b67\u8f83\u5927\uff0c\u5e38\u7528\u81ea\u52a8\u6307\u6807\u4e5f\u96be\u4ee5\u53ef\u9760\u8bc4\u4ef7\u6b64\u7c7b\u7ffb\u8bd1\u8d28\u91cf\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20241", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u673a\u5668\u7ffb\u8bd1", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6587\u5316\u8bed\u4e49", "\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20241v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "On the Systematic Challenges of Culturally Loaded Machine Translation: Dream of the Red Chamber as the Cultural Lens", "tldr": "\u672c\u6587\u4ee5\u300a\u7ea2\u697c\u68a6\u300b\u4e3a\u6587\u5316\u8f7d\u4f53\uff0c\u6784\u5efa\u4e86\u5305\u542b500\u4e2a\u4e2d\u65e5\u53cc\u8bed\u7247\u6bb5\u7684\u6587\u5316\u8d1f\u8f7d\u7ffb\u8bd1\u6570\u636e\u96c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u5728\u76f8\u5173\u673a\u5668\u7ffb\u8bd1\u4efb\u52a1\u4e2d\u7684\u8868\u73b0\u3002\u7814\u7a76\u53d1\u73b0\u524d\u6cbf\u6a21\u578b\u4ecd\u96be\u5904\u7406\u6587\u5316\u9690\u542b\u610f\u4e49\uff0c\u4eba\u7c7b\u8bc4\u5ba1\u56e0\u80cc\u666f\u5dee\u5f02\u5206\u6b67\u8f83\u5927\uff0c\u5e38\u7528\u81ea\u52a8\u6307\u6807\u4e5f\u96be\u4ee5\u53ef\u9760\u8bc4\u4ef7\u6b64\u7c7b\u7ffb\u8bd1\u8d28\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "While combinatorial optimization problems are central to many scientific and engineering applications, their solution remains challenging due to exponentially large search spaces. Variational quantum algorithms offer a promising route for tackling such problems, yet their practical performance is limited by repeated quantum circuit evaluations and classical parameter updates. In this work, we introduce DQAOA-GPT, a hybrid framework that integrates the distributed quantum approximate optimization algorithm (DQAOA), which decomposes a large optimization problem into smaller sub-problems, with GPT-based quantum circuit generation for solving those sub-problems. Rather than relying on iterative variational optimization, the proposed approach uses a trained generative model to directly generate high-quality quantum circuits for the decomposed sub-problems. As a benchmark, we evaluate DQAOA-GPT against conventional DQAOA on dense HUBO optimization problems with up to 100 decision variables. The results demonstrate that DQAOA-GPT significantly reduces computational cost while maintaining competitive solution quality, with larger acceleration observed for larger sub-problem sizes. Although this work focuses on benchmark-scale validation, the framework provides a promising foundation for larger-scale combinatorial optimization in hybrid HPC-QC environments through increased GPU resources and parallel computing capability.", "arxiv_id": "2607.20225", "arxiv_url": "https://arxiv.org/abs/2607.20225", "authors": ["Seongmin Kim", "Abhinav Rijal", "Yuri Alexeev", "Nora Bauer", "Martin Roetteler", "Mina Yoon", "George Siopsis", "In-Saeng Suh"], "brief": "\u672c\u6587\u63d0\u51fa DQAOA-GPT\uff0c\u5c06\u5206\u5e03\u5f0f\u91cf\u5b50\u8fd1\u4f3c\u4f18\u5316\u7b97\u6cd5\u4e0e GPT \u751f\u6210\u5f0f\u91cf\u5b50\u7ebf\u8def\u7ed3\u5408\uff0c\u7528\u751f\u6210\u6a21\u578b\u76f4\u63a5\u4e3a\u5206\u89e3\u540e\u7684\u5b50\u95ee\u9898\u751f\u6210\u9ad8\u8d28\u91cf\u91cf\u5b50\u7ebf\u8def\uff0c\u907f\u514d\u53cd\u590d\u53d8\u5206\u4f18\u5316\u3002\u5b9e\u9a8c\u5728\u6700\u591a 100 \u4e2a\u53d8\u91cf\u7684\u7a20\u5bc6 HUBO \u95ee\u9898\u4e0a\u663e\u793a\uff0c\u76f8\u6bd4\u4f20\u7edf DQAOA \u53ef\u663e\u8457\u964d\u4f4e\u8ba1\u7b97\u6210\u672c\uff0c\u540c\u65f6\u4fdd\u6301\u6709\u7ade\u4e89\u529b\u7684\u89e3\u8d28\u91cf\u3002", "categories": ["quant-ph", "cs.AI", "cs.DC", "math.OC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20225", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u91cf\u5b50\u4f18\u5316", "\u7ec4\u5408\u4f18\u5316", "\u751f\u6210\u6a21\u578b", "\u5206\u5e03\u5f0f\u8ba1\u7b97"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20225v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "DQAOA-GPT: AI-Accelerated Distributed Quantum Optimization for Combinatorial Problems", "tldr": "\u672c\u6587\u63d0\u51fa DQAOA-GPT\uff0c\u5c06\u5206\u5e03\u5f0f\u91cf\u5b50\u8fd1\u4f3c\u4f18\u5316\u7b97\u6cd5\u4e0e GPT \u751f\u6210\u5f0f\u91cf\u5b50\u7ebf\u8def\u7ed3\u5408\uff0c\u7528\u751f\u6210\u6a21\u578b\u76f4\u63a5\u4e3a\u5206\u89e3\u540e\u7684\u5b50\u95ee\u9898\u751f\u6210\u9ad8\u8d28\u91cf\u91cf\u5b50\u7ebf\u8def\uff0c\u907f\u514d\u53cd\u590d\u53d8\u5206\u4f18\u5316\u3002\u5b9e\u9a8c\u5728\u6700\u591a 100 \u4e2a\u53d8\u91cf\u7684\u7a20\u5bc6 HUBO \u95ee\u9898\u4e0a\u663e\u793a\uff0c\u76f8\u6bd4\u4f20\u7edf DQAOA \u53ef\u663e\u8457\u964d\u4f4e\u8ba1\u7b97\u6210\u672c\uff0c\u540c\u65f6\u4fdd\u6301\u6709\u7ade\u4e89\u529b\u7684\u89e3\u8d28\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Malware analysis demands rapid interpretation of complex detonation reports spanning filesystem, network, and process behaviours. While large language models (LLMs) demonstrate impressive capabilities for technical artifact interpretation, the opacity and escalating API costs of closed-weight frontier models motivate exploration of open-weight alternatives. However, many open-weight models are large, demanding significant compute resources and incurring non-trivial hosting costs that place them beyond reach for resource-constrained deployments. This paper investigates whether orchestrated ensembles of small language models (SLMs) can match or exceed single LLM performance on structured questions about malware detonation reports. We established baselines by testing eleven open-weight SLMs, three cyber security pre-trained models, and six frontier LLMs on Meta\u0027s CyberSecEval Malware Analysis benchmark. We then designed and evaluated four orchestration architectures: (i) a multi-agent pipeline that decomposes analysis into structured evidence-collection and reasoning stages, (ii) an adversarial debate framework in which two agents iteratively critique each other\u0027s reasoning, (iii) a hierarchical consultation system that pairs a general-purpose SLM with a cyber-specialised expert model, and (iv) a hybrid architecture that combines evidence-grounded pipelines with adversarial debate reasoning. The hybrid system (Qwen3-4B with Foundation-Sec-8B) achieved 35.30% overall accuracy, exceeding the strongest cyber-specialised baseline (22.54%) and the strongest ungrounded frontier baseline (34.77%); when given the same evidence pipeline, grounded Gemini remained the strongest configuration at 38.22%. These findings show that evidence-grounded orchestration can substantially improve the performance of collaborative SLMs for supporting interpretation of malware detonation reports.", "arxiv_id": "2607.20216", "arxiv_url": "https://arxiv.org/abs/2607.20216", "authors": ["Adel ElZemity", "Shujun Li", "Budi Arief"], "brief": "\u672c\u6587\u7814\u7a76\u7528\u591a\u4e2a\u5f00\u6e90\u5c0f\u8bed\u8a00\u6a21\u578b\u534f\u540c\u5206\u6790\u6076\u610f\u8f6f\u4ef6\u6c99\u7bb1\u5f15\u7206\u62a5\u544a\uff0c\u8bbe\u8ba1\u4e86\u8bc1\u636e\u6536\u96c6\u6d41\u6c34\u7ebf\u3001\u5bf9\u6297\u8fa9\u8bba\u3001\u5c42\u7ea7\u54a8\u8be2\u548c\u6df7\u5408\u67b6\u6784\u3002\u6df7\u5408\u7cfb\u7edf\u5728 CyberSecEval \u6076\u610f\u8f6f\u4ef6\u5206\u6790\u57fa\u51c6\u4e0a\u8fbe\u5230 35.30% \u51c6\u786e\u7387\uff0c\u8d85\u8fc7\u6700\u5f3a\u7f51\u7edc\u5b89\u5168\u4e13\u7528\u5c0f\u6a21\u578b\u548c\u672a\u63a5\u5730\u7684\u524d\u6cbf\u95ed\u6e90\u6a21\u578b\u57fa\u7ebf\uff0c\u663e\u793a\u8bc1\u636e\u9a71\u52a8\u7684\u591a\u667a\u80fd\u4f53\u7f16\u6392\u80fd\u663e\u8457\u63d0\u5347\u4f4e\u6210\u672c\u6a21\u578b\u6548\u679c\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20216", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5c0f\u8bed\u8a00\u6a21\u578b", "\u6076\u610f\u8f6f\u4ef6\u5206\u6790", "\u7f51\u7edc\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20216v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Small, Free, and Effective: Orchestrating Open-Weight Small Language Models to Outperform Single LLM for Malware Analysis", "tldr": "\u672c\u6587\u7814\u7a76\u7528\u591a\u4e2a\u5f00\u6e90\u5c0f\u8bed\u8a00\u6a21\u578b\u534f\u540c\u5206\u6790\u6076\u610f\u8f6f\u4ef6\u6c99\u7bb1\u5f15\u7206\u62a5\u544a\uff0c\u8bbe\u8ba1\u4e86\u8bc1\u636e\u6536\u96c6\u6d41\u6c34\u7ebf\u3001\u5bf9\u6297\u8fa9\u8bba\u3001\u5c42\u7ea7\u54a8\u8be2\u548c\u6df7\u5408\u67b6\u6784\u3002\u6df7\u5408\u7cfb\u7edf\u5728 CyberSecEval \u6076\u610f\u8f6f\u4ef6\u5206\u6790\u57fa\u51c6\u4e0a\u8fbe\u5230 35.30% \u51c6\u786e\u7387\uff0c\u8d85\u8fc7\u6700\u5f3a\u7f51\u7edc\u5b89\u5168\u4e13\u7528\u5c0f\u6a21\u578b\u548c\u672a\u63a5\u5730\u7684\u524d\u6cbf\u95ed\u6e90\u6a21\u578b\u57fa\u7ebf\uff0c\u663e\u793a\u8bc1\u636e\u9a71\u52a8\u7684\u591a\u667a\u80fd\u4f53\u7f16\u6392\u80fd\u663e\u8457\u63d0\u5347\u4f4e\u6210\u672c\u6a21\u578b\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The quadratic $N\\times N$ attention score matrix remains a central obstacle to extending Transformers to longer input lengths. Existing efficient attention methods usually reduce this bottleneck by either imposing sparsity, so that each query attends to only a small subset of keys, or by using low-rank/kernel sketches, so that global interactions are compressed into a lower-dimensional representation. We propose \\emph{ELSAA}, an efficient low-rank and sparse approximation of attention. Importantly, ELSAA does \\emph{not} decompose the learned projection or output matrices of the Transformer into sparse and low-rank factors. Instead, after dense projections produce $Q,K,V$, ELSAA approximates the induced attention score operator itself: a sparse branch captures selected high-similarity interactions, while a low-rank branch summarizes diffuse global interactions. Since the two branches can be normalized over supports with very different denominator mass, ELSAA introduces a denominator-aware fusion term that scales the sparse branch according to its estimated attention mass relative to the low-rank branch. This gives a practical framework for constructing low-rank and sparse attention outputs without materializing the full quadratic score matrix, aiming to enable longer-context training while preserving both sharp token-level interactions and broad contextual mixing.", "arxiv_id": "2607.20214", "arxiv_url": "https://arxiv.org/abs/2607.20214", "authors": ["Mahdi Heidari", "Mohammad Mahdi Rahimi", "Jaekyun Moon"], "brief": "\u672c\u6587\u63d0\u51fa ELSAA\uff0c\u4e00\u79cd\u7ed3\u5408\u7a00\u758f\u5206\u652f\u4e0e\u4f4e\u79e9\u5206\u652f\u7684\u9ad8\u6548\u6ce8\u610f\u529b\u8fd1\u4f3c\u65b9\u6cd5\uff0c\u76f4\u63a5\u8fd1\u4f3c Q\u3001K\u3001V \u4ea7\u751f\u540e\u7684\u6ce8\u610f\u529b\u5f97\u5206\u7b97\u5b50\uff0c\u800c\u4e0d\u662f\u5206\u89e3\u6a21\u578b\u6743\u91cd\u3002\u5b83\u7528\u7a00\u758f\u5206\u652f\u6355\u6349\u9ad8\u76f8\u4f3c\u5ea6\u5c40\u90e8\u4ea4\u4e92\u3001\u4f4e\u79e9\u5206\u652f\u6c47\u603b\u5168\u5c40\u4fe1\u606f\uff0c\u5e76\u901a\u8fc7\u5206\u6bcd\u611f\u77e5\u878d\u5408\u6821\u51c6\u4e24\u8005\u6743\u91cd\uff0c\u65e8\u5728\u964d\u4f4e\u957f\u4e0a\u4e0b\u6587 Transformer \u8bad\u7ec3\u7684\u4e8c\u6b21\u590d\u6742\u5ea6\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20214", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9ad8\u6548\u6ce8\u610f\u529b", "\u4f4e\u79e9\u8fd1\u4f3c", "\u7a00\u758f\u6ce8\u610f\u529b", "\u957f\u4e0a\u4e0b\u6587"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20214v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ELSAA: Efficient Low-Rank and Sparse Attention Approximation for Training Transformers", "tldr": "\u672c\u6587\u63d0\u51fa ELSAA\uff0c\u4e00\u79cd\u7ed3\u5408\u7a00\u758f\u5206\u652f\u4e0e\u4f4e\u79e9\u5206\u652f\u7684\u9ad8\u6548\u6ce8\u610f\u529b\u8fd1\u4f3c\u65b9\u6cd5\uff0c\u76f4\u63a5\u8fd1\u4f3c Q\u3001K\u3001V \u4ea7\u751f\u540e\u7684\u6ce8\u610f\u529b\u5f97\u5206\u7b97\u5b50\uff0c\u800c\u4e0d\u662f\u5206\u89e3\u6a21\u578b\u6743\u91cd\u3002\u5b83\u7528\u7a00\u758f\u5206\u652f\u6355\u6349\u9ad8\u76f8\u4f3c\u5ea6\u5c40\u90e8\u4ea4\u4e92\u3001\u4f4e\u79e9\u5206\u652f\u6c47\u603b\u5168\u5c40\u4fe1\u606f\uff0c\u5e76\u901a\u8fc7\u5206\u6bcd\u611f\u77e5\u878d\u5408\u6821\u51c6\u4e24\u8005\u6743\u91cd\uff0c\u65e8\u5728\u964d\u4f4e\u957f\u4e0a\u4e0b\u6587 Transformer \u8bad\u7ec3\u7684\u4e8c\u6b21\u590d\u6742\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Additive models buy interpretability by forbidding feature interactions, a constraint that neural instantiations enforce architecturally. We introduce the quadrilateral loss, a differentiable penalty that treats additivity as a measurable behavior instead: a second-order mixed difference on pairs of training points swapping one coordinate, which vanishes if and only if the coordinate carries no interaction, remains informative for piecewise-linear networks, and equals in expectation the per-coordinate interaction mass of the interventional Shapley-GAM. The loss turns additivity into a dial - most learned interactions prove removable almost for free, and on small datasets a moderate penalty improves accuracy and additivity simultaneously - and into an online observable: its per-feature surrender curves show, across seeds and datasets, that pre-regularization interaction magnitude barely predicts what a regularized model retains, undermining post-hoc interaction rankings. Against this instrument we compare routes to exact additivity, spanning structural masks, behavioral penalties (optionally crystallized into exact structure), weight decay, backfitting, the shared-section model, and bagged boosted stumps: constraining behavior before structure dominates weight-space constraints, rankings reverse between data regimes, and converging routes agree on the shape functions themselves. Three silent failure modes we document share one anatomy: guarantees imported into settings that quietly void their preconditions.", "arxiv_id": "2607.20201", "arxiv_url": "https://arxiv.org/abs/2607.20201", "authors": ["Antonio Di Cecco"], "brief": "\u8bba\u6587\u63d0\u51fa\u201c\u56db\u8fb9\u5f62\u635f\u5931\u201d\uff0c\u7528\u53ef\u5fae\u7684\u4e8c\u9636\u6df7\u5408\u5dee\u5206\u628
