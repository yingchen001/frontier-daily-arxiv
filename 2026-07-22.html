alse, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20368v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Self Gradient Forcing: Native Long Video Extrapolation", "tldr": "SGF\u63d0\u5347\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u7684\u957f\u89c6\u9891\u5916\u63a8\u80fd\u529b", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa Self Gradient Forcing\uff08SGF\uff09\uff0c\u4e00\u79cd\u4e24\u9636\u6bb5\u8bad\u7ec3\u7b56\u7565\uff0c\u7528\u4e8e\u5f25\u8865\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u4e2d\u5386\u53f2\u4e0a\u4e0b\u6587\u65e0\u6cd5\u88ab\u672a\u6765\u635f\u5931\u6709\u6548\u76d1\u7763\u7684\u201c\u4e0a\u4e0b\u6587\u68af\u5ea6\u7f3a\u53e3\u201d\u3002\u5b83\u901a\u8fc7\u65e0\u68af\u5ea6 rollout \u8bb0\u5f55\u4e0a\u4e0b\u6587\uff0c\u518d\u5e76\u884c\u91cd\u5efa\u5e76\u8ba9\u672a\u6765\u5e27\u635f\u5931\u76d1\u7763 KV \u8bb0\u5fc6\u5199\u5165\uff0c\u4ece\u800c\u63d0\u5347\u957f\u89c6\u9891\u751f\u6210\u4e00\u81f4\u6027\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u5728\u4e0d\u53cd\u5411\u4f20\u64ad\u5b8c\u6574\u4e32\u884c rollout \u7684\u60c5\u51b5\u4e0b\u6062\u590d\u4e86\u5173\u952e\u68af\u5ea6\u4fe1\u53f7\uff0c\u517c\u987e\u8bad\u7ec3\u53ef\u884c\u6027\u4e0e\u957f\u7a0b\u4e00\u81f4\u6027\uff0c\u5bf9\u539f\u751f\u81ea\u56de\u5f52\u957f\u89c6\u9891\u751f\u6210\u5177\u6709\u8f83\u9ad8\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Subject-to-video (S2V) generation has made substantial progress in preserving reference subjects across diverse categories, yet generic subject consistency remains insufficient for human-centric generation. A video may appear globally consistent while identity-critical human details still drift across frames, poses, and interactions. This issue becomes more severe in multi-person scenarios, where incorrect identity-role binding leads to subject confusion, attribute swapping, and excessive copying of reference-specific appearance cues. We propose Vera, a unified human-centric S2V framework for single- and multi-person generation. We first construct a million-pair identity-aligned human image-video dataset through person-level cross-clip retrieval, providing explicit identity correspondence and diverse references. Built on this dataset, Vera introduces two complementary designs. Identity-Focal Masked Supervision (IFMS) strengthens identity-aware learning with spatially focused supervision while reducing interference from irrelevant artifacts. Reference-Aware Layer-wise Attention (RALA) regulates how video tokens interact with reference identity cues in the DiT backbone, preserving stable identity anchors and enhancing layer-aware identity readout. Extensive experiments demonstrate that Vera improves human identity consistency, multi-person subject binding, and motion naturalness, while reducing identity confusion and excessive reference-image copying.", "arxiv_id": "2607.20247", "arxiv_url": "https://arxiv.org/abs/2607.20247", "authors": ["Yulong Xu", "Xinyue Liu", "Shujuan Li", "huafeng shi", "Yan Zhou", "Jiwen Liu", "Xintao Wang", "Yu Shen Liu", "Huaibo Huang"], "brief": "\u8bba\u6587\u63d0\u51fa Vera\uff0c\u4e00\u4e2a\u9762\u5411\u5355\u4eba\u548c\u591a\u4eba\u573a\u666f\u7684\u4eba\u7269\u4e3b\u4f53\u5230\u89c6\u9891\u751f\u6210\u6846\u67b6\uff0c\u91cd\u70b9\u89e3\u51b3\u8de8\u5e27\u3001\u59ff\u6001\u548c\u4ea4\u4e92\u4e2d\u7684\u8eab\u4efd\u6f02\u79fb\u95ee\u9898\u3002\u5b83\u6784\u5efa\u4e86\u767e\u4e07\u7ea7\u8eab\u4efd\u5bf9\u9f50\u7684\u4eba\u7269\u56fe\u50cf-\u89c6\u9891\u6570\u636e\u96c6\uff0c\u5e76\u7ed3\u5408\u8eab\u4efd\u805a\u7126\u76d1\u7763\u4e0e\u53c2\u8003\u611f\u77e5\u6ce8\u610f\u529b\u6765\u7a33\u5b9a\u8eab\u4efd\u4fdd\u6301\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20247", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u901a\u8fc7\u4eba\u7269\u7ea7\u8de8\u7247\u6bb5\u68c0\u7d22\u6784\u5efa\u767e\u4e07\u5bf9\u8eab\u4efd\u5bf9\u9f50\u56fe\u50cf-\u89c6\u9891\u6570\u636e\uff0c\u63d0\u4f9b\u660e\u786e\u8eab\u4efd\u5bf9\u5e94\u548c\u591a\u6837\u53c2\u8003\u6837\u672c", "\u63d0\u51fa Identity-Focal Masked Supervision\uff0c\u5728\u8eab\u4efd\u5173\u952e\u533a\u57df\u8fdb\u884c\u7a7a\u95f4\u805a\u7126\u76d1\u7763\uff0c\u51cf\u5c11\u65e0\u5173\u80cc\u666f\u6216\u4f2a\u5f71\u5e72\u6270", "\u63d0\u51fa Reference-Aware Layer-wise Attention\uff0c\u5728 DiT \u9aa8\u5e72\u4e2d\u8c03\u63a7\u89c6\u9891 token \u4e0e\u53c2\u8003\u8eab\u4efd\u7ebf\u7d22\u7684\u4ea4\u4e92\uff0c\u6539\u5584\u591a\u4eba\u8eab\u4efd\u7ed1\u5b9a\u5e76\u51cf\u5c11\u5c5e\u6027\u4ea4\u6362"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u4eba\u7269\u751f\u6210", "\u591a\u6a21\u6001", "\u6269\u6563\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20247v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Vera: Identity-Faithful Human Subject-to-Video Generation", "tldr": "Vera\u63d0\u5347\u4eba\u7269\u89c6\u9891\u751f\u6210\u8eab\u4efd\u4e00\u81f4\u6027", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa Vera\uff0c\u4e00\u4e2a\u9762\u5411\u5355\u4eba\u548c\u591a\u4eba\u573a\u666f\u7684\u4eba\u7269\u4e3b\u4f53\u5230\u89c6\u9891\u751f\u6210\u6846\u67b6\uff0c\u91cd\u70b9\u89e3\u51b3\u8de8\u5e27\u3001\u59ff\u6001\u548c\u4ea4\u4e92\u4e2d\u7684\u8eab\u4efd\u6f02\u79fb\u95ee\u9898\u3002\u5b83\u6784\u5efa\u4e86\u767e\u4e07\u7ea7\u8eab\u4efd\u5bf9\u9f50\u7684\u4eba\u7269\u56fe\u50cf-\u89c6\u9891\u6570\u636e\u96c6\uff0c\u5e76\u7ed3\u5408\u8eab\u4efd\u805a\u7126\u76d1\u7763\u4e0e\u53c2\u8003\u611f\u77e5\u6ce8\u610f\u529b\u6765\u7a33\u5b9a\u8eab\u4efd\u4fdd\u6301\u3002", "why_notable": "\u4eba\u7269\u89c6\u9891\u751f\u6210\u5bf9\u8eab\u4efd\u7ec6\u8282\u6781\u5176\u654f\u611f\uff0c\u5c24\u5176\u591a\u4eba\u573a\u666f\u5bb9\u6613\u51fa\u73b0\u8eab\u4efd\u6df7\u6dc6\u548c\u53c2\u8003\u56fe\u8fc7\u5ea6\u590d\u5236\u3002Vera\u540c\u65f6\u4ece\u6570\u636e\u6784\u5efa\u548c\u6a21\u578b\u6ce8\u610f\u529b\u673a\u5236\u5165\u624b\uff0c\u63d0\u5347\u8eab\u4efd\u4e00\u81f4\u6027\u3001\u4e3b\u4f53\u7ed1\u5b9a\u548c\u8fd0\u52a8\u81ea\u7136\u5ea6\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5b9e\u9645\u751f\u6210\u5e94\u7528\u4ef7\u503c\u3002"}, {"abstract": "Frozen perception foundation models encode rich geometric, semantic, and dynamic knowledge. Yet narrow conditioning interfaces may attenuate task-relevant cues, while static fusion cannot adjust expert contributions to each scene. We cast this challenge as the prior-to-plan transfer problem and introduce PerceptDrive, a perception prior world-action modeling framework with adaptive expert routing. PerceptDrive feeds teacher-distilled priors from a frozen, driving-adapted provider and dense observation latents from a frozen self-supervised video encoder into a trainable expert-routed world-action model. Expert-specific query branches process these signals, while a prior-retention objective anchors each branch to its prior. A router predicts soft gates from a shared scene representation and combines the expert conditions before trajectory generation. During training, privileged rule-based sub-metric estimates for branch-specific trajectory drafts provide soft-gate distillation targets. The predicted action-free future latent conditions a flow-matching actor. At inference, privileged components are absent; with one front-facing camera, PerceptDrive generates one trajectory per planning step without test-time scoring, reranking, or search. Experiments show that PerceptDrive achieves state-of-the-art performance with 90.4 PDMS on NAVSIM v1 and 90.2 EPDMS on NAVSIM v2, outperforming existing methods. Ablations confirm complementary gains from prior retention and scene-conditioned routing, alongside differential reliance on the three priors. These results demonstrate that preserving and adaptively routing perception priors improves direct planning without test-time candidate selection.", "arxiv_id": "2607.20175", "arxiv_url": "https://arxiv.org/abs/2607.20175", "authors": ["Yushan Liu", "Tianxiong Lv", "Bohua Wang", "Hangqi Fan", "Chenxu Zhao", "He Zheng", "Xuchang Zhong", "Yifan Xie", "Congyang Zhao", "Zhihao Liao", "Leigang Luo", "Yang Cai", "Xiao-Ping Zhang", "Wenbo Ding"], "brief": "\u8bba\u6587\u63d0\u51fa PerceptDrive\uff0c\u5c06\u51bb\u7ed3\u611f\u77e5\u57fa\u7840\u6a21\u578b\u7684\u51e0\u4f55\u3001\u8bed\u4e49\u548c\u52a8\u6001\u5148\u9a8c\u8fc1\u79fb\u5230\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\u89c4\u5212\u4e2d\u3002\u5b83\u901a\u8fc7\u4e13\u5bb6\u5206\u652f\u3001\u5148\u9a8c\u4fdd\u6301\u76ee\u6807\u548c\u573a\u666f\u6761\u4ef6\u8def\u7531\uff0c\u5c06\u4e0d\u540c\u611f\u77e5\u5148\u9a8c\u81ea\u9002\u5e94\u878d\u5408\u540e\u751f\u6210\u8f68\u8ff9\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20175", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u4f7f\u7528\u51bb\u7ed3\u7684\u9a7e\u9a76\u9002\u914d\u611f\u77e5\u6a21\u578b\u548c\u81ea\u76d1\u7763\u89c6\u9891\u7f16\u7801\u5668\uff0c\u63d0\u4f9b\u6559\u5e08\u84b8\u998f\u5148\u9a8c\u4e0e\u7a20\u5bc6\u89c2\u6d4b\u6f5c\u8868\u793a", "\u8bbe\u8ba1\u4e13\u5bb6\u7279\u5b9a\u67e5\u8be2\u5206\u652f\u4e0e\u5148\u9a8c\u4fdd\u6301\u635f\u5931\uff0c\u907f\u514d\u4efb\u52a1\u8bad\u7ec3\u8fc7\u7a0b\u4e2d\u4e22\u5931\u611f\u77e5\u5148\u9a8c\u4fe1\u606f", "\u8bad\u7ec3\u65f6\u7528\u89c4\u5219\u5b50\u6307\u6807\u4e3a\u5206\u652f\u8f68\u8ff9\u8349\u6848\u63d0\u4f9b\u8f6f\u95e8\u63a7\u84b8\u998f\uff0c\u63a8\u7406\u65f6\u4ec5\u5355\u524d\u89c6\u76f8\u673a\u3001\u65e0\u9700\u5019\u9009\u8f68\u8ff9\u91cd\u6392\u6216\u641c\u7d22"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u4e16\u754c\u6a21\u578b", "\u591a\u6a21\u6001", "\u8f68\u8ff9\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20175v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "PerceptDrive: Perception Prior World-Action Modeling with Adaptive Expert Routing for End-to-End Autonomous Driving", "tldr": "\u81ea\u9002\u5e94\u8def\u7531\u611f\u77e5\u5148\u9a8c\u63d0\u5347\u7aef\u5230\u7aef\u9a7e\u9a76\u89c4\u5212", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa PerceptDrive\uff0c\u5c06\u51bb\u7ed3\u611f\u77e5\u57fa\u7840\u6a21\u578b\u7684\u51e0\u4f55\u3001\u8bed\u4e49\u548c\u52a8\u6001\u5148\u9a8c\u8fc1\u79fb\u5230\u7aef\u5230\u7aef\u81ea\u52a8\u9a7e\u9a76\u89c4\u5212\u4e2d\u3002\u5b83\u901a\u8fc7\u4e13\u5bb6\u5206\u652f\u3001\u5148\u9a8c\u4fdd\u6301\u76ee\u6807\u548c\u573a\u666f\u6761\u4ef6\u8def\u7531\uff0c\u5c06\u4e0d\u540c\u611f\u77e5\u5148\u9a8c\u81ea\u9002\u5e94\u878d\u5408\u540e\u751f\u6210\u8f68\u8ff9\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u9488\u5bf9\u611f\u77e5\u5148\u9a8c\u5230\u89c4\u5212\u51b3\u7b56\u7684\u8fc1\u79fb\u74f6\u9888\uff0c\u8bc1\u660e\u4e86\u201c\u4fdd\u7559\u5148\u9a8c + \u573a\u666f\u81ea\u9002\u5e94\u4e13\u5bb6\u8def\u7531\u201d\u80fd\u663e\u8457\u63d0\u5347\u76f4\u63a5\u89c4\u5212\u6027\u80fd\uff0c\u5e76\u5728 NAVSIM v1/v2 \u4e0a\u8fbe\u5230 90.4 PDMS \u548c 90.2 EPDMS \u7684\u9886\u5148\u7ed3\u679c\u3002"}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) has substantially improved language-model reasoning, yet its extension to vision-language models remains constrained by the lack of training data that are simultaneously broad, exactly verifiable, and reproducible. We introduce Trace, a taxonomy-guided environment for multidomain visual reasoning. Trace factorizes task construction into a scene grammar and an executable task program, separating visual realization from answer computation. A shared semantic state determines the rendered image, prompt, typed answer, verifier state, and replayable instance trace. The resulting environment comprises 1,000 tasks over 277 scene grammars and 11 visual domains, with controlled semantic and visual variation. RLVR on 64,000 Trace instances improves the macro-average across 24 external benchmarks by 3.51 percentage points for Qwen2.5-VL-3B and 4.06 points for Qwen2.5-VL-7B, providing evidence that broad procedural training can transfer beyond the generated task distributions. Project page: https://maveryn.github.io/trace/.", "arxiv_id": "2607.19790", "arxiv_url": "https://arxiv.org/abs/2607.19790", "authors": ["Md Tanvirul Alam"], "brief": "\u8bba\u6587\u63d0\u51fa Trace\uff0c\u4e00\u4e2a\u7531\u5206\u7c7b\u4f53\u7cfb\u5f15\u5bfc\u7684\u591a\u57df\u89c6\u89c9\u63a8\u7406\u73af\u5883\uff0c\u901a\u8fc7\u573a\u666f\u8bed\u6cd5\u4e0e\u53ef\u6267\u884c\u4efb\u52a1\u7a0b\u5e8f\u89e3\u8026\u56fe\u50cf\u751f\u6210\u548c\u7b54\u6848\u8ba1\u7b97\uff0c\u751f\u6210\u53ef\u590d\u73b0\u3001\u53ef\u9a8c\u8bc1\u7684\u8bad\u7ec3\u5b9e\u4f8b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19790", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5305\u542b 11 \u4e2a\u89c6\u89c9\u9886\u57df\u3001277 \u4e2a\u573a\u666f\u8bed\u6cd5\u548c 1000 \u4e2a\u4efb\u52a1\uff0c\u652f\u6301\u53d7\u63a7\u7684\u8bed\u4e49\u4e0e\u89c6\u89c9\u53d8\u5316\u3002", "\u5171\u4eab\u8bed\u4e49\u72b6\u6001\u540c\u65f6\u51b3\u5b9a\u6e32\u67d3\u56fe\u50cf\u3001\u63d0\u793a\u3001\u7c7b\u578b\u5316\u7b54\u6848\u3001\u9a8c\u8bc1\u5668\u72b6\u6001\u548c\u53ef\u56de\u653e\u5b9e\u4f8b\u8f68\u8ff9\u3002", "\u5728 6.4 \u4e07\u4e2a Trace \u5b9e\u4f8b\u4e0a\u8fdb\u884c RLVR \u8bad\u7ec3\uff0c\u4f7f Qwen2.5-VL-3B/7B \u5728 24 \u4e2a\u5916\u90e8\u57fa\u51c6\u5b8f\u5e73\u5747\u5206\u522b\u63d0\u5347 3.51/4.06 \u4e2a\u767e\u5206\u70b9\u3002"], "keywords": ["\u89c6\u89c9\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u7a0b\u5e8f\u5316\u6570\u636e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19790v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Trace: A Taxonomy-Guided Environment for Multidomain Visual Reasoning", "tldr": "Trace\u7528\u53ef\u9a8c\u8bc1\u7a0b\u5e8f\u5316\u4efb\u52a1\u63d0\u5347\u591a\u57df\u89c6\u89c9\u63a8\u7406\u3002", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa Trace\uff0c\u4e00\u4e2a\u7531\u5206\u7c7b\u4f53\u7cfb\u5f15\u5bfc\u7684\u591a\u57df\u89c6\u89c9\u63a8\u7406\u73af\u5883\uff0c\u901a\u8fc7\u573a\u666f\u8bed\u6cd5\u4e0e\u53ef\u6267\u884c\u4efb\u52a1\u7a0b\u5e8f\u89e3\u8026\u56fe\u50cf\u751f\u6210\u548c\u7b54\u6848\u8ba1\u7b97\uff0c\u751f\u6210\u53ef\u590d\u73b0\u3001\u53ef\u9a8c\u8bc1\u7684\u8bad\u7ec3\u5b9e\u4f8b\u3002", "why_notable": "\u5b83\u4e3a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u53ef\u9a8c\u8bc1\u5f3a\u5316\u5b66\u4e60\u63d0\u4f9b\u4e86\u89c4\u6a21\u5316\u3001\u53ef\u590d\u73b0\u4e14\u8986\u76d6\u5e7f\u6cdb\u7684\u7a0b\u5e8f\u5316\u6570\u636e\u6765\u6e90\uff0c\u5e76\u8bc1\u660e\u8fd9\u79cd\u8bad\u7ec3\u80fd\u8fc1\u79fb\u5230\u751f\u6210\u5206\u5e03\u4e4b\u5916\u7684\u771f\u5b9e\u89c6\u89c9\u63a8\u7406\u57fa\u51c6\u3002"}, {"abstract": "VLMs are increasingly deployed in AD systems, creating an urgent need for rigorous safety evaluation under rare yet safety-critical scenarios. Among these, interactions with vulnerable road users represent a major source of real-world failures. However, existing safety-critical scenario generation methods predominantly rely on simulator-based pipelines, which suffer from a substantial sim-to-real gap and often fail to capture realistic, diverse, and unforeseen human-vehicle interaction dynamics. We present SafeGen, a goal-conditioned diffusion framework for safety-critical scenario generation in VLMADs. Our key insight is to formulate scenario generation as a goal-conditioned diffusion process, where a predefined catastrophic end-state serves as a strong supervisory signal, guiding the generation of temporally coherent video trajectories that naturally evolve toward safety-critical outcomes. Building on this formulation, we introduce Context Grounded End State Reasoning, which leverages VLMs to analyze benign driving contexts and infer latent vulnerabilities in human-vehicle interactions, producing structured end-state specifications that induce high-risk scenarios. Conditioned on these targets, we further propose End State Conditioned Video Evolution, which grounds semantic threats into physically plausible visual dynamics. Specifically, we instantiate high-risk agents within the scene via depth-aware geometric projection, followed by boundary-conditioned diffusion to generate intermediate frames with consistent motion patterns and temporal coherence. Extensive experiments across 3 VLMADs demonstrate that SafeGen increases the Judge Overall Score, a metric using a VLM judge to evaluate VLMADs\u0027 understanding and decision-making, by 24.25% on average compared to SoTA baselines. Furthermore, fine-tuning a VLMAD improves performance in real-world driving scenes by an average of 15.9%.", "arxiv_id": "2607.19701", "arxiv_url": "https://arxiv.org/abs/2607.19701", "authors": ["Jiangfan Liu", "Zexuan Cui", "Tianyuan Zhang", "Zonglei Jing", "Zonghao Ying", "Yaoyuan Zhang", "Jiakai Wang", "Xiaoqi Jiang", "Aishan Liu", "Xianglong Liu"], "brief": "SafeGen \u5c06\u5b89\u5168\u5173\u952e\u573a\u666f\u751f\u6210\u5efa\u6a21\u4e3a\u76ee\u6807\u6761\u4ef6\u89c6\u9891\u6269\u6563\u8fc7\u7a0b\uff0c\u4ee5\u9884\u8bbe\u707e\u96be\u6027\u7ec8\u6001\u5f15\u5bfc\u751f\u6210\u65f6\u95f4\u8fde\u8d2f\u3001\u7269\u7406\u5408\u7406\u7684\u9ad8\u98ce\u9669\u9a7e\u9a76\u89c6\u9891\u3002\u5b83\u8fd8\u5229\u7528 VLM \u4ece\u6b63\u5e38\u9a7e\u9a76\u4e0a\u4e0b\u6587\u4e2d\u63a8\u65ad\u6f5c\u5728\u98ce\u9669\u7ec8\u6001\uff0c\u5e76\u5c06\u5176\u8f6c\u5316\u4e3a\u53ef\u7528\u4e8e\u8bc4\u6d4b\u548c\u5fae\u8c03 VLM \u81ea\u52a8\u9a7e\u9a76\u7cfb\u7edf\u7684\u573a\u666f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19701", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51fa Context Grounded End State Reasoning\uff0c\u7528 VLM \u5206\u6790\u826f\u6027\u9a7e\u9a76\u573a\u666f\u4e2d\u7684\u884c\u4eba\u7b49\u5f31\u52bf\u4ea4\u901a\u53c2\u4e0e\u8005\u98ce\u9669\uff0c\u5e76\u751f\u6210\u7ed3\u6784\u5316\u707e\u96be\u7ec8\u6001\u3002", "\u63d0\u51fa End State Conditioned Video Evolution\uff0c\u901a\u8fc7\u6df1\u5ea6\u611f\u77e5\u51e0\u4f55\u6295\u5f71\u653e\u7f6e\u9ad8\u98ce\u9669\u4e3b\u4f53\uff0c\u518d\u7528\u8fb9\u754c\u6761\u4ef6\u6269\u6563\u751f\u6210\u8fde\u8d2f\u4e2d\u95f4\u5e27\u3002", "\u5728 3 \u4e2a VLM \u81ea\u52a8\u9a7e\u9a76\u7cfb\u7edf\u4e0a\uff0c\u76f8\u6bd4 SoTA \u57fa\u7ebf\u5c06 Judge Overall Score \u5e73\u5747\u63d0\u5347 24.25%\uff1b\u7528\u751f\u6210\u6570\u636e\u5fae\u8c03\u540e\u771f\u5b9e\u573a\u666f\u6027\u80fd\u5e73\u5747\u63d0\u5347 15.9%\u3002"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u89c6\u9891\u6269\u6563", "\u591a\u6a21\u6001", "\u5b89\u5168\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19701v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SafeGen: Goal-Conditioned Video Diffusion of Safety-Critical Scenarios for VLM-Based Autonomous Driving", "tldr": "\u7528\u89c6\u9891\u6269\u6563\u751f\u6210\u81ea\u52a8\u9a7e\u9a76\u9ad8\u5371\u573a\u666f", "upvotes": 0, "what_it_is": "SafeGen \u5c06\u5b89\u5168\u5173\u952e\u573a\u666f\u751f\u6210\u5efa\u6a21\u4e3a\u76ee\u6807\u6761\u4ef6\u89c6\u9891\u6269\u6563\u8fc7\u7a0b\uff0c\u4ee5\u9884\u8bbe\u707e\u96be\u6027\u7ec8\u6001\u5f15\u5bfc\u751f\u6210\u65f6\u95f4\u8fde\u8d2f\u3001\u7269\u7406\u5408\u7406\u7684\u9ad8\u98ce\u9669\u9a7e\u9a76\u89c6\u9891\u3002\u5b83\u8fd8\u5229\u7528 VLM \u4ece\u6b63\u5e38\u9a7e\u9a76\u4e0a\u4e0b\u6587\u4e2d\u63a8\u65ad\u6f5c\u5728\u98ce\u9669\u7ec8\u6001\uff0c\u5e76\u5c06\u5176\u8f6c\u5316\u4e3a\u53ef\u7528\u4e8e\u8bc4\u6d4b\u548c\u5fae\u8c03 VLM \u81ea\u52a8\u9a7e\u9a76\u7cfb\u7edf\u7684\u573a\u666f\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u7ed5\u5f00\u4f20\u7edf\u4eff\u771f\u7ba1\u7ebf\u7684 sim-to-real gap\uff0c\u7528\u771f\u5b9e\u611f\u89c6\u9891\u6269\u6563\u751f\u6210\u7f55\u89c1\u4f46\u5173\u952e\u7684\u5b89\u5168\u6d4b\u8bd5\u573a\u666f\uff0c\u4e3a VLM \u81ea\u52a8\u9a7e\u9a76\u7cfb\u7edf\u7684\u538b\u529b\u6d4b\u8bd5\u4e0e\u6570\u636e\u589e\u5f3a\u63d0\u4f9b\u4e86\u5b9e\u7528\u8def\u5f84\u3002"}, {"abstract": "Reinforcement learning with verifiable rewards has become the predominant recipe for eliciting test-time scaling in explicit Chain-of-Thought reasoners. Yet this scaling path remains computationally costly, since every intermediate step must be decoded as a language token. Latent reasoning instead carries intermediate computation as continuous vectors and already matches or surpasses explicit CoT at far shorter horizons. Despite this promise, latent reasoners remain largely imitation-bound, while explicit CoT has already moved past imitation via outcome-reward RL. Latent trajectories lack a tractable per-step likelihood and an adaptive stopping interface under fixed thinking budgets, so outcome rewards cannot elicit latent test-time scaling. We introduce Surrogate Latent Policy Optimization (SLPO) to bring outcome-reward RL to autoregressive latent reasoners: an empirical surrogate policy density over latent transitions for trajectory-level credit assignment, and a correctness-supervised stopping head that outcome-reward optimization refines into a variable-horizon policy. Across continuous and soft thinking settings, SLPO improves Pass@$k$ under parallel sampling and allocates longer latent computation to harder instances with higher deterministic accuracy.", "arxiv_id": "2607.19691", "arxiv_url": "https://arxiv.org/abs/2607.19691", "authors": ["Runyang You", "Zhiyuan Liu", "Yongqi Li", "Wenjie Li"], "brief": "\u672c\u6587\u63d0\u51fa SLPO\uff08Surrogate Latent Policy Optimization\uff09\uff0c\u7528\u4e8e\u8bad\u7ec3\u81ea\u56de\u5f52\u6f5c\u5728\u63a8\u7406\u6a21\u578b\uff0c\u4f7f\u5176\u4e0d\u518d\u5c40\u9650\u4e8e\u6a21\u4eff\u5b66\u4e60\uff0c\u800c\u80fd\u901a\u8fc7\u53ef\u9a8c\u8bc1\u7ed3\u679c\u5956\u52b1\u8fdb\u884c\u5f3a\u5316\u5b66\u4e60\u4f18\u5316\u3002\u65b9\u6cd5\u5f15\u5165\u6f5c\u5728\u8f6c\u79fb\u7684\u7ecf\u9a8c\u66ff\u4ee3\u7b56\u7565\u5bc6\u5ea6\u6765\u505a\u8f68\u8ff9\u7ea7\u4fe1\u7528\u5206\u914d\uff0c\u5e76\u8bad\u7ec3\u53ef\u81ea\u9002\u5e94\u505c\u6b62\u7684\u63a8\u7406\u5934\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": "https://github.com/ModalityDance/SLPO", "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19691", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9488\u5bf9\u6f5c\u5728\u63a8\u7406\u7f3a\u5c11\u9010\u6b65\u4f3c\u7136\u3001\u96be\u4ee5\u7528\u7ed3\u679c\u5956\u52b1\u8bad\u7ec3\u7684\u95ee\u9898\uff0c\u6784\u9020\u6f5c\u5728\u8f6c\u79fb\u7684\u66ff\u4ee3\u7b56\u7565\u5bc6\u5ea6", "\u52a0\u5165\u7531\u6b63\u786e\u6027\u76d1\u7763\u7684\u505c\u6b62\u5934\uff0c\u5e76\u901a\u8fc7\u7ed3\u679c\u5956\u52b1\u4f18\u5316\u5f62\u6210\u53ef\u53d8\u63a8\u7406\u957f\u5ea6\u7b56\u7565", "\u5728\u8fde\u7eed\u4e0e\u8f6f\u6f5c\u5728\u601d\u8003\u8bbe\u7f6e\u4e2d\uff0c\u63d0\u5347\u5e76\u884c\u91c7\u6837\u4e0b\u7684 Pass@k\uff0c\u5e76\u80fd\u4e3a\u66f4\u96be\u6837\u672c\u5206\u914d\u66f4\u957f\u6f5c\u5728\u8ba1\u7b97"], "keywords": ["\u6f5c\u5728\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60", "\u6d4b\u8bd5\u65f6\u8ba1\u7b97", "\u94fe\u5f0f\u601d\u7ef4"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19691v1", "published_at": "2026-07-22", "score": 0.193, "selected_reasons": ["HF trending (1\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.19691.png", "title": "SLPO: Scaling Latent Reasoning via a Surrogate Policy", "tldr": "\u7528\u66ff\u4ee3\u7b56\u7565\u628a\u7ed3\u679c\u5956\u52b1RL\u5f15\u5165\u6f5c\u5728\u63a8\u7406", "upvotes": 1, "what_it_is": "\u672c\u6587\u63d0\u51fa SLPO\uff08Surrogate Latent Policy Optimization\uff09\uff0c\u7528\u4e8e\u8bad\u7ec3\u81ea\u56de\u5f52\u6f5c\u5728\u63a8\u7406\u6a21\u578b\uff0c\u4f7f\u5176\u4e0d\u518d\u5c40\u9650\u4e8e\u6a21\u4eff\u5b66\u4e60\uff0c\u800c\u80fd\u901a\u8fc7\u53ef\u9a8c\u8bc1\u7ed3\u679c\u5956\u52b1\u8fdb\u884c\u5f3a\u5316\u5b66\u4e60\u4f18\u5316\u3002\u65b9\u6cd5\u5f15\u5165\u6f5c\u5728\u8f6c\u79fb\u7684\u7ecf\u9a8c\u66ff\u4ee3\u7b56\u7565\u5bc6\u5ea6\u6765\u505a\u8f68\u8ff9\u7ea7\u4fe1\u7528\u5206\u914d\uff0c\u5e76\u8bad\u7ec3\u53ef\u81ea\u9002\u5e94\u505c\u6b62\u7684\u63a8\u7406\u5934\u3002", "why_notable": "\u5b83\u5c06\u663e\u5f0f CoT \u4e2d\u6709\u6548\u7684\u7ed3\u679c\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\u6269\u5c55\u5230\u66f4\u9ad8\u6548\u7684\u8fde\u7eed\u6f5c\u5728\u63a8\u7406\uff0c\u6709\u671b\u964d\u4f4e\u957f\u94fe\u63a8\u7406\u7684\u89e3\u7801\u6210\u672c\uff0c\u540c\u65f6\u5b9e\u73b0\u6d4b\u8bd5\u65f6\u8ba1\u7b97\u81ea\u9002\u5e94\u6269\u5c55\u3002"}, {"abstract": "This work introduces G-MAD, an open-source framework that uses Arma3 to generate synchronized multi-view RGB-T data for aerial object detection. G-MAD addresses key limitations of real-world aerial dataset construction, including limited viewpoint control, imperfect RGB-T alignment and high annotation cost. The framework supports structured scenario specification, controllable multi-view camera placement, simultaneous visible/thermal capture, and automatic bounding box annotation using engine-level geometric metadata. These capabilities enable controlled studies of viewpoint variation, multi-modal fusion, and synthetic-to-real transfer in aerial object detection. Besides, using G-MAD, we construct and release AMOD, a new large-scale multi-view aerial RGB-T object detection benchmark. The source code and the dataset are available at https://unique-chan.github.io/G-MAD-Project.", "arxiv_id": "2607.19942", "arxiv_url": "https://arxiv.org/abs/2607.19942", "authors": ["Yechan Kim", "JongHyun Park", "Dongho Yoon", "Namhoon Jung", "Moongu Jeon"], "brief": "\u8bba\u6587\u63d0\u51fa\u5f00\u6e90\u6846\u67b6 G-MAD\uff0c\u57fa\u4e8e Arma3 \u751f\u6210\u540c\u6b65\u591a\u89c6\u89d2\u53ef\u89c1\u5149/\u70ed\u7ea2\u5916\u822a\u62cd\u76ee\u6807\u68c0\u6d4b\u6570\u636e\u3002\u5b83\u8fd8\u6784\u5efa\u5e76\u53d1\u5e03\u4e86\u5927\u89c4\u6a21\u57fa\u51c6 AMOD\uff0c\u7528\u4e8e\u7814\u7a76\u89c6\u89d2\u53d8\u5316\u3001\u591a\u6a21\u6001\u878d\u5408\u4e0e\u5408\u6210\u5230\u771f\u5b9e\u8fc1\u79fb\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": "https://github.com/unique-chan/G-MAD", "github_stars": 2, "hf_url": "https://huggingface.co/papers/2607.19942", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u652f\u6301\u7ed3\u6784\u5316\u573a\u666f\u5b9a\u4e49\u4e0e\u53ef\u63a7\u591a\u89c6\u89d2\u76f8\u673a\u5e03\u7f6e\uff0c\u4fbf\u4e8e\u7cfb\u7edf\u7814\u7a76\u822a\u62cd\u89c6\u89d2\u53d8\u5316", "\u540c\u65f6\u91c7\u96c6 RGB \u4e0e\u70ed\u7ea2\u5916\u56fe\u50cf\uff0c\u5e76\u901a\u8fc7\u5f15\u64ce\u7ea7\u51e0\u4f55\u5143\u6570\u636e\u81ea\u52a8\u751f\u6210\u8fb9\u754c\u6846\u6807\u6ce8", "\u7f13\u89e3\u771f\u5b9e\u822a\u62cd\u6570\u636e\u91c7\u96c6\u4e2d\u7684\u89c6\u89d2\u53d7\u9650\u3001RGB-T \u5bf9\u9f50\u4e0d\u51c6\u548c\u6807\u6ce8\u6210\u672c\u9ad8\u7b49\u95ee\u9898"], "keywords": ["\u76ee\u6807\u68c0\u6d4b", "\u591a\u6a21\u6001", "\u5408\u6210\u6570\u636e", "\u822a\u62cd\u89c6\u89c9"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19942v1", "published_at": "2026-07-22", "score": 0.185, "selected_reasons": ["HF trending (0\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.19942.png", "title": "G-MAD: A Game-Based Data Generation Framework for Multi-View RGB-T Aerial Object Detection", "tldr": "\u7528\u6e38\u620f\u5f15\u64ce\u751f\u6210\u591a\u89c6\u89d2\u822a\u62cdRGB-T\u68c0\u6d4b\u6570\u636e", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u5f00\u6e90\u6846\u67b6 G-MAD\uff0c\u57fa\u4e8e Arma3 \u751f\u6210\u540c\u6b65\u591a\u89c6\u89d2\u53ef\u89c1\u5149/\u70ed\u7ea2\u5916\u822a\u62cd\u76ee\u6807\u68c0\u6d4b\u6570\u636e\u3002\u5b83\u8fd8\u6784\u5efa\u5e76\u53d1\u5e03\u4e86\u5927\u89c4\u6a21\u57fa\u51c6 AMOD\uff0c\u7528\u4e8e\u7814\u7a76\u89c6\u89d2\u53d8\u5316\u3001\u591a\u6a21\u6001\u878d\u5408\u4e0e\u5408\u6210\u5230\u771f\u5b9e\u8fc1\u79fb\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u63d0\u4f9b\u4e86\u53ef\u63a7\u3001\u4f4e\u6210\u672c\u3001\u53ef\u590d\u73b0\u7684\u591a\u89c6\u89d2 RGB-T \u822a\u62cd\u6570\u636e\u751f\u6210\u65b9\u6848\uff0c\u5e76\u53d1\u5e03\u65b0\u57fa\u51c6\uff0c\u6709\u52a9\u4e8e\u63a8\u52a8\u591a\u6a21\u6001\u822a\u62cd\u76ee\u6807\u68c0\u6d4b\u548c\u5408\u6210\u6570\u636e\u8fc1\u79fb\u7814\u7a76\u3002"}, {"abstract": "Although large language models (LLMs) have recently gained traction in recommender systems due to their strong reasoning capabilities and extensive world knowledge, previous LLM-based agents suffer from hallucination and context-length limitations, and thus are not suitable for full-ranking recommendation tasks. To circumvent these limitations through architectural design rather than modifying the LLM itself, we propose an agent-based recommendation framework, memory-based $\\textbf{P}$ersonalized $\\textbf{R}$ecommendation $\\textbf{T}$ool learning via autonomous language $\\textbf{A}$gents (PRTA), in which an LLM acts as a central planner interacting with multiple recommendation models as tools. The LLM-based agent is responsible for high-level reasoning and personalized tool selection, while traditional recommendation models perform full-ranking scoring, leveraging their scalability in modeling behavioral patterns. To support personalized tool selection, we design reflection mechanisms that enable the agent to evaluate and compare tools for each user based on user profiles and candidate ranked lists. Extensive experiments across three public datasets demonstrate the superiority of \\modelname over traditional recommendation and LLM-based baselines in improving full-ranking recommendation performance.", "arxiv_id": "2607.19739", "arxiv_url": "https://arxiv.org/abs/2607.19739", "authors": ["Mingdai Yang", "Zhiwei Liu", "Weizhi Zhang", "Yibo Wang", "Hao Peng", "Philip Yu"], "brief": "\u8bba\u6587\u63d0\u51fa PRTA\uff0c\u4e00\u4e2a\u57fa\u4e8e\u8bb0\u5fc6\u7684\u4e2a\u6027\u5316\u63a8\u8350\u5de5\u5177\u5b66\u4e60\u6846\u67b6\uff1aLLM \u4f5c\u4e3a\u4e2d\u592e\u89c4\u5212\u5668\uff0c\u8c03\u7528\u591a\u4e2a\u4f20\u7edf\u63a8\u8350\u6a21\u578b\u4f5c\u4e3a\u5de5\u5177\u3002LLM \u8d1f\u8d23\u9ad8\u5c42\u63a8\u7406\u4e0e\u4e2a\u6027\u5316\u5de5\u5177\u9009\u62e9\uff0c\u63a8\u8350\u6a21\u578b\u8d1f\u8d23\u53ef\u6269\u5c55\u7684\u5168\u6392\u5e8f\u6253\u5206\u3002", "categories": ["cs.IR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19739", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u901a\u8fc7\u67b6\u6784\u8bbe\u8ba1\u89c4\u907f LLM \u5e7b\u89c9\u4e0e\u4e0a\u4e0b\u6587\u957f\u5ea6\u9650\u5236\uff0c\u800c\u975e\u5fae\u8c03\u6216\u6539\u9020 LLM \u672c\u8eab", "\u8bbe\u8ba1\u53cd\u601d\u673a\u5236\uff0c\u8ba9\u667a\u80fd\u4f53\u57fa\u4e8e\u7528\u6237\u753b\u50cf\u548c\u5019\u9009\u6392\u5e8f\u5217\u8868\u8bc4\u4f30\u3001\u6bd4\u8f83\u4e0d\u540c\u63a8\u8350\u5de5\u5177", "\u5728\u4e09\u4e2a\u516c\u5f00\u6570\u636e\u96c6\u4e0a\u4f18\u4e8e\u4f20\u7edf\u63a8\u8350\u65b9\u6cd5\u548c\u5df2\u6709 LLM \u63a8\u8350\u57fa\u7ebf\uff0c\u63d0\u5347\u5168\u6392\u5e8f\u63a8\u8350\u6027\u80fd"], "keywords": ["\u63a8\u8350\u7cfb\u7edf", "\u667a\u80fd\u4f53", "\u5de5\u5177\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19739v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Personalized Recommendation Tool Learning via Autonomous Language Agents", "tldr": "\u8ba9LLM\u667a\u80fd\u4f53\u6309\u7528\u6237\u9009\u62e9\u63a8\u8350\u5de5\u5177\u63d0\u5347\u5168\u6392\u5e8f\u6548\u679c", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa PRTA\uff0c\u4e00\u4e2a\u57fa\u4e8e\u8bb0\u5fc6\u7684\u4e2a\u6027\u5316\u63a8\u8350\u5de5\u5177\u5b66\u4e60\u6846\u67b6\uff1aLLM \u4f5c\u4e3a\u4e2d\u592e\u89c4\u5212\u5668\uff0c\u8c03\u7528\u591a\u4e2a\u4f20\u7edf\u63a8\u8350\u6a21\u578b\u4f5c\u4e3a\u5de5\u5177\u3002LLM \u8d1f\u8d23\u9ad8\u5c42\u63a8\u7406\u4e0e\u4e2a\u6027\u5316\u5de5\u5177\u9009\u62e9\uff0c\u63a8\u8350\u6a21\u578b\u8d1f\u8d23\u53ef\u6269\u5c55\u7684\u5168\u6392\u5e8f\u6253\u5206\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a LLM \u7684\u63a8\u7406\u80fd\u529b\u4e0e\u4f20\u7edf\u63a8\u8350\u6a21\u578b\u7684\u5168\u91cf\u6392\u5e8f\u80fd\u529b\u7ed3\u5408\uff0c\u4e3a\u5927\u89c4\u6a21\u63a8\u8350\u573a\u666f\u4e2d\u7684 LLM \u667a\u80fd\u4f53\u843d\u5730\u63d0\u4f9b\u4e86\u66f4\u5b9e\u7528\u7684\u5de5\u5177\u8c03\u7528\u8303\u5f0f\u3002"}, {"abstract": "Autoregressive (AR) video diffusion models have become a promising paradigm for long and streaming video synthesis, but the continuously growing Key-Value (KV) cache makes attention the dominant inference cost, especially at high resolution where each frame contributes many tokens. Existing remedies either evict the cache with coarse heuristics that cause inter-frame flickering, or require model re-training. We propose HeadCast, a training-free, plug-and-play acceleration framework built on the observation that a pre-trained AR model\u0027s attention heads exhibit stable, heterogeneous behaviors. After a short warm-up, HeadCast performs a one-time classification at the maximum-noise step that sorts every head into one of four archetypes: Sink, Dummy, Spatial, and Global, and restructures the monolithic KV cache into head-specific pathways. Crucially, it retains the Global heads that preserve the long-range temporal consistency aggressive eviction destroys. Because the Spatial pathway operates on a fixed-size grid, its savings grow with resolution: across state-of-the-art AR models, HeadCast accelerates inference by up to 1.62x at 720P and 1.95x at 1080P, while keeping VBench quality on par with full attention and largely flicker-free. Code is available at https://github.com/sjlgaga/HeadCast .", "arxiv_id": "2607.20125", "arxiv_url": "https://arxiv.org/abs/2607.20125", "authors": ["Jinliang Shen", "Lianghao Su", "Zheming Li", "Kang He", "ZiLiang Lai", "Yanbing Jiang", "Chengru Song"], "brief": "HeadCast \u662f\u4e00\u4e2a\u514d\u8bad\u7ec3\u3001\u5373\u63d2\u5373\u7528\u7684\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u63a8\u7406\u52a0\u901f\u6846\u67b6\u3002\u5b83\u5229\u7528\u9884\u8bad\u7ec3\u6a21\u578b\u4e2d\u6ce8\u610f\u529b\u5934\u884c\u4e3a\u7a33\u5b9a\u4e14\u5f02\u8d28\u7684\u7279\u70b9\uff0c\u5c06\u4e0d\u540c\u5934\u5206\u7c7b\u5e76\u91c7\u7528\u5dee\u5f02\u5316 KV cache \u8def\u5f84\u4ee5\u964d\u4f4e\u6ce8\u610f\u529b\u5f00\u9500\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20125", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u77ed\u6682 warm-up \u540e\uff0c\u5728\u6700\u5927\u566a\u58f0\u6b65\u5bf9\u6ce8\u610f\u529b\u5934\u4e00\u6b21\u6027\u5206\u7c7b\u4e3a Sink\u3001Dummy\u3001Spatial\u3001Global \u56db\u7c7b", "\u5c06\u539f\u672c\u7edf\u4e00\u589e\u957f\u7684 KV cache \u91cd\u6784\u4e3a\u6309\u5934\u5b9a\u5236\u7684\u7f13\u5b58\u8def\u5f84\uff0c\u4fdd\u7559 Global \u5934\u4ee5\u7ef4\u6301\u957f\u7a0b\u65f6\u95f4\u4e00\u81f4\u6027", "\u5728 720P \u548c 1080P \u4e0a\u5206\u522b\u6700\u9ad8\u5b9e\u73b0 1.62x \u4e0e 1.95x \u63a8\u7406\u52a0\u901f\uff0cVBench \u8d28\u91cf\u63a5\u8fd1\u5168\u6ce8\u610f\u529b\u4e14\u51cf\u5c11\u95ea\u70c1"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u6ce8\u610f\u529b\u673a\u5236", "\u63a8\u7406\u52a0\u901f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20125v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "HeadCast: Casting Attention Heads for Efficient Autoregressive Video Generation", "tldr": "\u514d\u8bad\u7ec3\u6309\u6ce8\u610f\u529b\u5934\u5206\u6d41\u52a0\u901fAR\u89c6\u9891\u751f\u6210", "upvotes": 0, "what_it_is": "HeadCast \u662f\u4e00\u4e2a\u514d\u8bad\u7ec3\u3001\u5373\u63d2\u5373\u7528\u7684\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u63a8\u7406\u52a0\u901f\u6846\u67b6\u3002\u5b83\u5229\u7528\u9884\u8bad\u7ec3\u6a21\u578b\u4e2d\u6ce8\u610f\u529b\u5934\u884c\u4e3a\u7a33\u5b9a\u4e14\u5f02\u8d28\u7684\u7279\u70b9\uff0c\u5c06\u4e0d\u540c\u5934\u5206\u7c7b\u5e76\u91c7\u7528\u5dee\u5f02\u5316 KV cache \u8def\u5f84\u4ee5\u964d\u4f4e\u6ce8\u610f\u529b\u5f00\u9500\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u65e0\u9700\u91cd\u8bad\u7ec3\u5373\u53ef\u7528\u4e8e\u73b0\u6709 AR \u89c6\u9891\u6269\u6563\u6a21\u578b\uff0c\u5c24\u5176\u9002\u5408\u9ad8\u5206\u8fa8\u7387\u548c\u957f\u89c6\u9891\u751f\u6210\u573a\u666f\uff0c\u5728\u52a0\u901f\u7684\u540c\u65f6\u907f\u514d\u7c97\u66b4\u7f13\u5b58\u9a71\u9010\u5bfc\u81f4\u7684\u5e27\u95f4\u95ea\u70c1\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Latent world models improve sample efficiency in continuous control by optimizing policies over imagined latent trajectories, but common neural transitions offer limited direct control over modal persistence and error accumulation in long rollouts. We propose Koopman Dreamer, a Dreamer-style world model with a spectrally constrained deterministic latent dynamics core. Its Koopman-inspired backbone uses two-dimensional rotation--scaling blocks with bounded radii to represent damping, rotation, and near-periodic modes. Linear and low-rank bilinear action terms capture global and state-dependent control effects, while stochastic-state modulation supplies local correction information. To reduce the mismatch between posterior-conditioned training and prior-only imagination, the model combines posterior-conditioned EMA teacher targets with one-step consistency, multi-step rollout, and open-loop observation-prediction objectives. We further derive a multi-step rollout-error bound that separates amplification by the spectral backbone and bilinear interaction from the additive effects of stochastic-state mismatch and modeling residuals, clarifying the trade-off between error attenuation and long-term information retention. Experimental results on proprioceptive continuous-control tasks from the DeepMind Control Suite and UAV-LiDAR autonomous navigation demonstrate that Koopman Dreamer improves the stability of long-horizon latent rollouts and achieves stronger closed-loop control performance on tasks that rely on high-quality multi-step imagination.", "arxiv_id": "2607.19719", "arxiv_url": "https://arxiv.org/abs/2607.19719", "authors": ["Jiaqi Li", "Xinglong Zhang", "Haibin Xie", "Yixing Lan", "Wei Pan", "Xin Xu"], "brief": "\u8bba\u6587\u63d0\u51fa Koopman Dreamer\uff1a\u4e00\u79cd Dreamer \u98ce\u683c\u6f5c\u5728\u4e16\u754c\u6a21\u578b\uff0c\u5728\u786e\u5b9a\u6027\u6f5c\u5728\u52a8\u529b\u5b66\u4e2d\u5f15\u5165\u8c31\u7ea6\u675f\u7684 Koopman \u542f\u53d1\u7ed3\u6784\uff0c\u7528\u4e8e\u66f4\u7a33\u5b9a\u5730\u751f\u6210\u957f\u65f6\u57df\u60f3\u8c61\u8f68\u8ff9\u3002\u6a21\u578b\u7ed3\u5408\u65cb\u8f6c-\u7f29\u653e\u5757\u3001\u7ebf\u6027\u4e0e\u4f4e\u79e9\u53cc\u7ebf\u6027\u52a8\u4f5c\u9879\uff0c\u5e76\u901a\u8fc7\u591a\u79cd\u8bad\u7ec3\u76ee\u6807\u51cf\u5c11\u540e\u9a8c\u8bad\u7ec3\u4e0e\u5148\u9a8c\u60f3\u8c61\u4e4b\u95f4\u7684\u504f\u5dee\u3002", "categories": ["cs.LG", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19719", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4f7f\u7528\u5e26\u6709\u6709\u754c\u534a\u5f84\u7684\u4e8c\u7ef4\u65cb\u8f6c-\u7f29\u653e\u5757\u8868\u793a\u963b\u5c3c\u3001\u65cb\u8f6c\u548c\u8fd1\u5468\u671f\u52a8\u529b\u5b66\uff0c\u4ece\u8c31\u5c42\u9762\u63a7\u5236\u8bef\u5dee\u653e\u5927\u4e0e\u6a21\u6001\u6301\u7eed\u6027", "\u5f15\u5165\u7ebf\u6027\u548c\u4f4e\u79e9\u53cc\u7ebf\u6027\u52a8\u4f5c\u9879\u5efa\u6a21\u5168\u5c40\u4e0e\u72b6\u6001\u4f9d\u8d56\u63a7\u5236\u6548\u5e94\uff0c\u5e76\u7528\u968f\u673a\u72b6\u6001\u8c03\u5236\u63d0\u4f9b\u5c40\u90e8\u6821\u6b63\u4fe1\u606f", "\u5728 DeepMind Control Suite \u548c UAV-LiDAR \u81ea\u4e3b\u5bfc\u822a\u4efb\u52a1\u4e0a\u63d0\u5347\u957f\u7a0b\u6f5c\u5728 rollout \u7a33\u5b9a\u6027\u4e0e\u95ed\u73af\u63a7\u5236\u6027\u80fd"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u8fde\u7eed\u63a7\u5236", "\u673a\u5668\u4eba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19719v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Koopman Dreamer: Spectrally Constrained Latent Dynamics for Stable World-Model Imagination", "tldr": "\u8c31\u7ea6\u675fKoopman\u4e16\u754c\u6a21\u578b\u63d0\u5347\u957f\u7a0b\u60f3\u8c61\u7a33\u5b9a\u6027", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa Koopman Dreamer\uff1a\u4e00\u79cd Dreamer \u98ce\u683c\u6f5c\u5728\u4e16\u754c\u6a21\u578b\uff0c\u5728\u786e\u5b9a\u6027\u6f5c\u5728\u52a8\u529b\u5b66\u4e2d\u5f15\u5165\u8c31\u7ea6\u675f\u7684 Koopman \u542f\u53d1\u7ed3\u6784\uff0c\u7528\u4e8e\u66f4\u7a33\u5b9a\u5730\u751f\u6210\u957f\u65f6\u57df\u60f3\u8c61\u8f68\u8ff9\u3002\u6a21\u578b\u7ed3\u5408\u65cb\u8f6c-\u7f29\u653e\u5757\u3001\u7ebf\u6027\u4e0e\u4f4e\u79e9\u53cc\u7ebf\u6027\u52a8\u4f5c\u9879\uff0c\u5e76\u901a\u8fc7\u591a\u79cd\u8bad\u7ec3\u76ee\u6807\u51cf\u5c11\u540e\u9a8c\u8bad\u7ec3\u4e0e\u5148\u9a8c\u60f3\u8c61\u4e4b\u95f4\u7684\u504f\u5dee\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c06 Koopman \u8c31\u7ed3\u6784\u663e\u5f0f\u5d4c\u5165 Dreamer \u4e16\u754c\u6a21\u578b\uff0c\u4e3a\u957f\u65f6\u57df\u60f3\u8c61\u4e2d\u7684\u8bef\u5dee\u7d2f\u79ef\u63d0\u4f9b\u53ef\u63a7\u673a\u5236\u548c\u7406\u8bba\u8bef\u5dee\u754c\uff0c\u5bf9\u4f9d\u8d56\u9ad8\u8d28\u91cf\u591a\u6b65\u9884\u6d4b\u7684\u8fde\u7eed\u63a7\u5236\u4e0e\u673a\u5668\u4eba\u5bfc\u822a\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Masked diffusion models (MDMs) are a promising family of language generators, but achieving high-quality few-step generation remains challenging. In MDMs, all forward trajectories collapse to a single fully masked state, leaving no terminal entropy for consistency-style few-step generation. While recent few-step alternatives based on uniform-state diffusion avoid this degeneracy, it becomes harder to distinguish clean tokens from noise than MDMs, which usually harms modeling quality and training efficiency. In this work, we propose a multi-mask diffusion model (MultiMDM) that preserves the masking structure towards few-step generation. In the forward process, each clean token is first pushed towards a designated mask and then gradually mixes over the mask set. As a result, the backward process has a drafting capability by predicting a designated mask before refining to a clean token. We derive a closed-form ELBO training objective for MultiMDM that supports continual training from pretrained MDMs. In addition, we formulate a purely discrete-state consistency distillation scheme, with a shared-Gumbel coupling to reduce pathwise entropy. Experiments on pretraining and distillation show that MultiMDM provides an effective foundation for principled few-step generation.", "arxiv_id": "2607.19686", "arxiv_url": "https://arxiv.org/abs/2607.19686", "authors": ["Sijin Chen", "Yinuo Ren", "Heyang Zhao", "Ziheng Cheng", "Quanquan Gu", "Lexing Ying"], "brief": "\u8bba\u6587\u63d0\u51fa MultiMDM\uff0c\u5c06\u4f20\u7edf\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\u6269\u5c55\u4e3a\u591a\u63a9\u7801\u72b6\u6001\uff0c\u4f7f\u524d\u5411\u8fc7\u7a0b\u5148\u628a\u5e72\u51c0 token \u63a8\u5411\u6307\u5b9a mask\uff0c\u518d\u5728 mask \u96c6\u5408\u4e2d\u6df7\u5408\u3002\u5b83\u652f\u6301\u4ece\u9884\u8bad\u7ec3 MDM \u6301\u7eed\u8bad\u7ec3\uff0c\u5e76\u7528\u4e8e\u79bb\u6563\u4e00\u81f4\u6027\u84b8\u998f\u4ee5\u5b9e\u73b0\u9ad8\u8d28\u91cf\u5c11\u6b65\u751f\u6210\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19686", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u901a\u8fc7\u591a\u63a9\u7801\u7ec8\u6001\u4fdd\u7559\u71b5\uff0c\u7f13\u89e3\u4f20\u7edf MDM \u6240\u6709\u8f68\u8ff9\u574d\u7f29\u5230\u5355\u4e00\u5168\u63a9\u7801\u72b6\u6001\u7684\u95ee\u9898", "\u53cd\u5411\u8fc7\u7a0b\u53ef\u5148\u9884\u6d4b\u6307\u5b9a mask \u8fdb\u884c\u8349\u7a3f\u751f\u6210\uff0c\u518d\u7ec6\u5316\u4e3a\u5e72\u51c0 token", "\u63a8\u5bfc\u95ed\u5f0f ELBO \u8bad\u7ec3\u76ee\u6807\uff0c\u5e76\u63d0\u51fa shared-Gumbel \u8026\u5408\u7684\u79bb\u6563\u4e00\u81f4\u6027\u84b8\u998f\u4ee5\u964d\u4f4e\u8def\u5f84\u71b5"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u8bed\u8a00\u6a21\u578b", "\u5c11\u6b65\u751f\u6210", "\u77e5\u8bc6\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19686v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Multi-Mask Diffusion Language Models for Few-Step Generation", "tldr": "\u591a\u63a9\u7801\u6269\u6563\u63d0\u5347\u5c11\u6b65\u6587\u672c\u751f\u6210\u8d28\u91cf", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa MultiMDM\uff0c\u5c06\u4f20\u7edf\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\u6269\u5c55\u4e3a\u591a\u63a9\u7801\u72b6\u6001\uff0c\u4f7f\u524d\u5411\u8fc7\u7a0b\u5148\u628a\u5e72\u51c0 token \u63a8\u5411\u6307\u5b9a mask\uff0c\u518d\u5728 mask \u96c6\u5408\u4e2d\u6df7\u5408\u3002\u5b83\u652f\u6301\u4ece\u9884\u8bad\u7ec3 MDM \u6301\u7eed\u8bad\u7ec3\uff0c\u5e76\u7528\u4e8e\u79bb\u6563\u4e00\u81f4\u6027\u84b8\u998f\u4ee5\u5b9e\u73b0\u9ad8\u8d28\u91cf\u5c11\u6b65\u751f\u6210\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u63a9\u7801\u6269\u6563\u5efa\u6a21\u4f18\u52bf\u7684\u540c\u65f6\uff0c\u4e3a\u5c11\u6b65\u6587\u672c\u751f\u6210\u63d0\u4f9b\u66f4\u539f\u5219\u5316\u7684\u8bad\u7ec3\u4e0e\u84b8\u998f\u6846\u67b6\uff0c\u6709\u671b\u63d0\u5347\u6269\u6563\u8bed\u8a00\u6a21\u578b\u7684\u63a8\u7406\u6548\u7387\u548c\u751f\u6210\u8d28\u91cf\u3002"}, {"abstract": "Humans distill experience into reusable abstractions, e.g., strategies and cautionary reminders, and apply them to gradually solve problems more effectively. We study whether Large Language Models (LLMs) can similarly benefit from such experiential abstractions. From LLMs\u0027 solution traces on the MATH training set, a stronger teacher or the LLMs themselves extract natural-language abstractions into a retrievable library. We explore two usage modes: (1) inference-time retrieval and (2) reinforcement learning (RL) with abstraction-augmented training prompts. Experiential abstractions improve LLM performance on mathematical and logical reasoning benchmarks. Self-extracted abstractions match teacher-extracted ones, and our abstraction usage framework can transfer to other datasets and models. These findings suggest LLMs can extract and apply experiential abstractions much as humans leverage distilled experience.", "arxiv_id": "2607.20372", "arxiv_url": "https://arxiv.org/abs/2607.20372", "authors": ["Chang Liu", "Xinyu Li", "Artur Dubrawski"], "brief": "\u8bba\u6587\u7814\u7a76LLM\u80fd\u5426\u50cf\u4eba\u7c7b\u4e00\u6837\u4ece\u89e3\u9898\u7ecf\u9a8c\u4e2d\u63d0\u70bc\u53ef\u590d\u7528\u7684\u81ea\u7136\u8bed\u8a00\u62bd\u8c61\uff08\u5982\u7b56\u7565\u4e0e\u63d0\u9192\uff09\uff0c\u5e76\u5728\u540e\u7eed\u4efb\u52a1\u4e2d\u8c03\u7528\u3002\u4f5c\u8005\u4eceMATH\u8bad\u7ec3\u96c6\u89e3\u9898\u8f68\u8ff9\u6784\u5efa\u53ef\u68c0\u7d22\u62bd\u8c61\u5e93\uff0c\u9a8c\u8bc1\u5176\u5728\u63a8\u7406\u65f6\u68c0\u7d22\u548c\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u63d0\u793a\u589e\u5f3a\u4e24\u79cd\u6a21\u5f0f\u4e0b\u7684\u6548\u679c\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20372", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4eceLLM\u89e3\u9898\u8f68\u8ff9\u4e2d\u7531\u5f3a\u6559\u5e08\u6a21\u578b\u6216\u6a21\u578b\u81ea\u8eab\u63d0\u53d6\u201c\u7ecf\u9a8c\u62bd\u8c61\u201d\uff0c\u5f62\u6210\u53ef\u68c0\u7d22\u7684\u81ea\u7136\u8bed\u8a00\u5e93", "\u63d0\u51fa\u4e24\u79cd\u4f7f\u7528\u65b9\u5f0f\uff1a\u63a8\u7406\u9636\u6bb5\u68c0\u7d22\u76f8\u5173\u62bd\u8c61\uff0c\u4ee5\u53ca\u5728\u5f3a\u5316\u5b66\u4e60\u4e2d\u4f7f\u7528\u62bd\u8c61\u589e\u5f3a\u8bad\u7ec3\u63d0\u793a", "\u5728\u6570\u5b66\u4e0e\u903b\u8f91\u63a8\u7406\u57fa\u51c6\u4e0a\u63d0\u5347\u6027\u80fd\uff0c\u4e14\u81ea\u63d0\u53d6\u62bd\u8c61\u53ef\u63a5\u8fd1\u6559\u5e08\u63d0\u53d6\u62bd\u8c61\uff0c\u5e76\u80fd\u8fc1\u79fb\u5230\u5176\u4ed6\u6570\u636e\u96c6\u548c\u6a21\u578b"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60", "\u68c0\u7d22\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20372v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Notes to Self: Can LLMs Benefit from Experiential Abstractions?", "tldr": "\u8ba9LLM\u4ece\u7ecf\u9a8c\u4e2d\u63d0\u70bc\u62bd\u8c61\u63d0\u5347\u63a8\u7406", "upvotes": 0, "what_it_is": "\u8bba\u6587\u7814\u7a76LLM\u80fd\u5426\u50cf\u4eba\u7c7b\u4e00\u6837\u4ece\u89e3\u9898\u7ecf\u9a8c\u4e2d\u63d0\u70bc\u53ef\u590d\u7528\u7684\u81ea\u7136\u8bed\u8a00\u62bd\u8c61\uff08\u5982\u7b56\u7565\u4e0e\u63d0\u9192\uff09\uff0c\u5e76\u5728\u540e\u7eed\u4efb\u52a1\u4e2d\u8c03\u7528\u3002\u4f5c\u8005\u4eceMATH\u8bad\u7ec3\u96c6\u89e3\u9898\u8f68\u8ff9\u6784\u5efa\u53ef\u68c0\u7d22\u62bd\u8c61\u5e93\uff0c\u9a8c\u8bc1\u5176\u5728\u63a8\u7406\u65f6\u68c0\u7d22\u548c\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u63d0\u793a\u589e\u5f3a\u4e24\u79cd\u6a21\u5f0f\u4e0b\u7684\u6548\u679c\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c55\u793a\u4e86LLM\u4e0d\u4ec5\u80fd\u5229\u7528\u5916\u90e8\u793a\u4f8b\u6216\u53cd\u9988\uff0c\u8fd8\u80fd\u5c06\u81ea\u8eab\u7ecf\u9a8c\u538b\u7f29\u4e3a\u53ef\u590d\u7528\u77e5\u8bc6\uff0c\u7c7b\u4f3c\u4eba\u7c7b\u7684\u201c\u53cd\u601d\u7b14\u8bb0\u201d\u3002\u8fd9\u4e3a\u63d0\u5347\u63a8\u7406\u80fd\u529b\u3001\u6837\u672c\u6548\u7387\u548c\u8de8\u4efb\u52a1\u6cdb\u5316\u63d0\u4f9b\u4e86\u7b80\u5355\u800c\u5b9e\u7528\u7684\u8def\u5f84\u3002"}, {"abstract": "Large language models often align with users\u0027 beliefs at the expense of factual accuracy, a behavior known as sycophancy. Prior mechanistic studies largely treat sycophancy as a single behavioral dimension that can be uniformly amplified or suppressed. We challenge this assumption by analyzing three hypothesized modes of sycophancy across 948 social pressure situations. Although the modes produce highly similar outputs, with a text-only classifier achieving just 57.8 percent accuracy, their internal representations are perfectly linearly separable from layer 14 onward. We further find the modes emerge at different processing stages, rely on distinct attention circuitry, and fire strongest on different inputs. These results show that sycophancy is not a monolithic tendency, but a structured family of representationally and computationally distinct modes, motivating more precise measurement and intervention.", "arxiv_id": "2607.20146", "arxiv_url": "https://arxiv.org/abs/2607.20146", "authors": ["Shreyans Jain", "Alexandra Yost", "Amirali Abdullah"], "brief": "\u8bba\u6587\u5206\u6790\u4e86\u5927\u8bed\u8a00\u6a21\u578b\u5728948\u4e2a\u793e\u4f1a\u538b\u529b\u60c5\u5883\u4e2d\u7684\u4e09\u7c7b\u5047\u8bbe\u6027\u8c04\u5a9a\u6a21\u5f0f\u3002\u7ed3\u679c\u8868\u660e\uff0c\u5c3d\u7ba1\u8fd9\u4e9b\u6a21\u5f0f\u7684\u8f93\u51fa\u6587\u672c\u9ad8\u5ea6\u76f8\u4f3c\uff0c\u4f46\u5176\u5185\u90e8\u8868\u5f81\u3001\u51fa\u73b0\u9636\u6bb5\u548c\u6ce8\u610f\u529b\u56de\u8def\u660e\u663e\u4e0d\u540c\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20146", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6587\u672c\u5c42\u9762\u96be\u4ee5\u533a\u5206\u4e0d\u540c\u8c04\u5a9a\u6a21\u5f0f\uff0c\u7eaf\u6587\u672c\u5206\u7c7b\u5668\u51c6\u786e\u7387\u4ec557.8%", "\u4ece\u7b2c14\u5c42\u5f00\u59cb\uff0c\u4e0d\u540c\u8c04\u5a9a\u6a21\u5f0f\u7684\u5185\u90e8\u8868\u5f81\u53ef\u88ab\u5b8c\u7f8e\u7ebf\u6027\u5206\u79bb", "\u4e0d\u540c\u6a21\u5f0f\u5728\u5904\u7406\u6d41\u7a0b\u4e2d\u51fa\u73b0\u65f6\u95f4\u4e0d\u540c\uff0c\u4f9d\u8d56\u4e0d\u540c\u6ce8\u610f\u529b\u7535\u8def\uff0c\u5e76\u5bf9\u4e0d\u540c\u8f93\u5165\u6700\u654f\u611f"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u5bf9\u9f50", "\u53ef\u89e3\u91ca\u6027", "\u5b89\u5168\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20146v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Gotta Catch them all: the modes of Sycophancy", "tldr": "\u63ed\u793aLLM\u8c04\u5a9a\u884c\u4e3a\u5b58\u5728\u591a\u79cd\u5185\u90e8\u6a21\u5f0f", "upvotes": 0, "what_it_is": "\u8bba\u6587\u5206\u6790\u4e86\u5927\u8bed\u8a00\u6a21\u578b\u5728948\u4e2a\u793e\u4f1a\u538b\u529b\u60c5\u5883\u4e2d\u7684\u4e09\u7c7b\u5047\u8bbe\u6027\u8c04\u5a9a\u6a21\u5f0f\u3002\u7ed3\u679c\u8868\u660e\uff0c\u5c3d\u7ba1\u8fd9\u4e9b\u6a21\u5f0f\u7684\u8f93\u51fa\u6587\u672c\u9ad8\u5ea6\u76f8\u4f3c\uff0c\u4f46\u5176\u5185\u90e8\u8868\u5f81\u3001\u51fa\u73b0\u9636\u6bb5\u548c\u6ce8\u610f\u529b\u56de\u8def\u660e\u663e\u4e0d\u540c\u3002", "why_notable": "\u8be5\u7814\u7a76\u6311\u6218\u4e86\u201c\u8c04\u5a9a\u662f\u5355\u4e00\u53ef\u8c03\u884c\u4e3a\u7ef4\u5ea6\u201d\u7684\u5e38\u89c1\u5047\u8bbe\uff0c\u4e3a\u66f4\u7cbe\u7ec6\u5730\u6d4b\u91cf\u3001\u8bca\u65ad\u548c\u5e72\u9884LLM\u5bf9\u7528\u6237\u89c2\u70b9\u7684\u76f2\u76ee\u8fce\u5408\u63d0\u4f9b\u4e86\u673a\u5236\u5c42\u9762\u7684\u8bc1\u636e\u3002"}, {"abstract": "Spoken language models (SLMs) enable natural human-computer interaction, but their reasoning ability still lags behind that of text-based large language models, especially on spoken mathematical question answering tasks. One important reason is that SLMs reason over purely verbalized mathematical expressions, which are harder to interpret than symbolic text. However, directly transferring text-based reasoning to SLMs is nontrivial due to architectural constraints and the additional computational requirements. To address this challenge, we propose Efficient Chain-of-Modality Reasoning (ECoM Reasoning), the first framework to introduce compressed reasoning into SLMs. By compressing the textual component so that it jointly serves as speech guidance and reasoning representation, ECoM Reasoning improves reasoning accuracy while using a smaller token budget than the standard Chain-of-Modality (CoM) architecture, which generates intermediate text before speech. To train this capability, we further propose Progressive Compression, a curriculum-based strategy that gradually trains the model from full-form reasoning to compressed reasoning. Experiments on spoken mathematical question answering benchmarks show that ECoM Reasoning improves accuracy by 21% over standard CoM without explicit reasoning, and by 3% over CoM with full reasoning traces while using only 40% of the text tokens, demonstrating that it enhances SLM reasoning while remaining inference-efficient.", "arxiv_id": "2607.19932", "arxiv_url": "https://arxiv.org/abs/2607.19932", "authors": ["Pengchao Feng", "Chao-Hong Tan", "Qian Chen", "Wen Wang", "Xiangang Li", "Xie Chen"], "brief": "\u8bba\u6587\u63d0\u51fa Efficient Chain-of-Modality Reasoning\uff08ECoM\uff09\uff0c\u5c06\u6587\u672c\u63a8\u7406\u538b\u7f29\u4e3a\u540c\u65f6\u670d\u52a1\u8bed\u97f3\u751f\u6210\u6307\u5bfc\u4e0e\u63a8\u7406\u8868\u793a\u7684\u4e2d\u95f4\u5f62\u5f0f\u3002\u5e76\u8bbe\u8ba1 Progressive Compression \u8bfe\u7a0b\u8bad\u7ec3\u7b56\u7565\uff0c\u4f7f\u8bed\u97f3\u8bed\u8a00\u6a21\u578b\u4ece\u5b8c\u6574\u63a8\u7406\u9010\u6b65\u8fc7\u6e21\u5230\u538b\u7f29\u63a8\u7406\u3002", "categories": ["cs.CL", "cs.SD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19932", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9762\u5411\u8bed\u97f3\u6570\u5b66\u95ee\u7b54\uff0c\u7f13\u89e3\u7eaf\u53e3\u8bed\u5316\u6570\u5b66\u8868\u8fbe\u96be\u4ee5\u63a8\u7406\u7684\u95ee\u9898", "\u76f8\u6bd4\u6807\u51c6 CoM\uff0c\u538b\u7f29\u6587\u672c\u4e2d\u95f4\u8868\u793a\u4ec5\u4f7f\u7528\u7ea6 40% \u6587\u672c token", "\u5b9e\u9a8c\u4e2d\u8f83\u65e0\u663e\u5f0f\u63a8\u7406\u7684 CoM \u51c6\u786e\u7387\u63d0\u5347 21%\uff0c\u8f83\u5b8c\u6574\u63a8\u7406\u8f68\u8ff9 CoM \u4ecd\u63d0\u5347 3%"], "keywords": ["\u8bed\u97f3\u6a21\u578b", "\u63a8\u7406", "\u591a\u6a21\u6001", "\u6570\u5b66\u95ee\u7b54"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19932v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Efficient Chain-of-Modality Reasoning via Progressive Compression for Spoken Language Models", "tldr": "\u7528\u538b\u7f29\u63a8\u7406\u63d0\u5347\u8bed\u97f3\u6a21\u578b\u6570\u5b66\u95ee\u7b54\u6548\u7387", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa Efficient Chain-of-Modality Reasoning\uff08ECoM\uff09\uff0c\u5c06\u6587\u672c\u63a8\u7406\u538b\u7f29\u4e3a\u540c\u65f6\u670d\u52a1\u8bed\u97f3\u751f\u6210\u6307\u5bfc\u4e0e\u63a8\u7406\u8868\u793a\u7684\u4e2d\u95f4\u5f62\u5f0f\u3002\u5e76\u8bbe\u8ba1 Progressive Compression \u8bfe\u7a0b\u8bad\u7ec3\u7b56\u7565\uff0c\u4f7f\u8bed\u97f3\u8bed\u8a00\u6a21\u578b\u4ece\u5b8c\u6574\u63a8\u7406\u9010\u6b65\u8fc7\u6e21\u5230\u538b\u7f29\u63a8\u7406\u3002", "why_notable": "\u8fd9\u662f\u9996\u4e2a\u5c06\u538b\u7f29\u63a8\u7406\u5f15\u5165\u8bed\u97f3\u8bed\u8a00\u6a21\u578b\u7684\u6846\u67b6\uff0c\u5728\u63d0\u5347\u63a8\u7406\u51c6\u786e\u7387\u7684\u540c\u65f6\u663e\u8457\u964d\u4f4e\u4e2d\u95f4\u6587\u672c token \u5f00\u9500\uff0c\u5bf9\u4f4e\u5ef6\u8fdf\u8bed\u97f3\u52a9\u624b\u548c\u8bed\u97f3\u6559\u80b2\u573a\u666f\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multimodal Large Language Models (MLLMs) have recently demonstrated strong performance across vision-language tasks. However, their high inference cost, arising from both the large number of input visual tokens and the heavy computation of the large language model (LLM), remains a key barrier to practical deployment. Recent work attempts to reduce the cost by adaptively optimizing individual dimensions, e.g., pruning redundant visual tokens or skipping LLM layers and heads. Nonetheless, prior approaches typically treat these dimensions independently and overlook a fundamental coupling: the available compute resources must be dynamically allocated across all dimensions based on the input content. To bridge the gap, we propose SmartVL, a unified adaptive inference framework that jointly controls vision token number and model compute capability in response to varying input contents and compute budgets. SmartVL introduces a vision-side token controller that dynamically selects informative visual tokens and an LLM-side compute controller that adaptively adjusts LLM computation. Importantly, these controllers are trained to coordinate with each other so that the overall inference cost satisfies a target budget. To allow this joint scheduling, we connect the controllers using a shared budget encoding and leverage a differentiable latency estimator for end-to-end training. This design enables SmartVL to learn cross-stage allocation strategies that adapt to both input complexity and runtime compute constraints. Experiments across multiple MLLM benchmarks demonstrate that, with joint scheduling, SmartVL consistently outperforms prior adaptive methods and achieves superior accuracy-efficiency Pareto frontiers. Project page: https://www.schaterji.io/publications/2026/jointtokencompute.", "arxiv_id": "2607.20357", "arxiv_url": "https://arxiv.org/abs/2607.20357", "authors": ["Pengcheng Wang", "Zhiquan Wang", "Jayoung Lee", "Zhuoyan Xu", "Ran Xu", "Saurabh Bagchi", "Yin Li", "Somali Chaterji"], "brief": "\u8bba\u6587\u63d0\u51fa SmartVL\uff0c\u4e00\u4e2a\u9762\u5411\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u7edf\u4e00\u81ea\u9002\u5e94\u63a8\u7406\u6846\u67b6\uff0c\u53ef\u6839\u636e\u8f93\u5165\u5185\u5bb9\u548c\u8ba1\u7b97\u9884\u7b97\u8054\u5408\u8c03\u5ea6\u89c6\u89c9 token \u6570\u91cf\u4e0e LLM \u4fa7\u8ba1\u7b97\u91cf\u3002\u5b83\u901a\u8fc7\u89c6\u89c9 token \u63a7\u5236\u5668\u548c LLM \u8ba1\u7b97\u63a7\u5236\u5668\u534f\u540c\u5de5\u4f5c\uff0c\u5728\u76ee\u6807\u5ef6\u8fdf/\u9884\u7b97\u4e0b\u63d0\u5347\u51c6\u786e\u7387-\u6548\u7387\u6743\u8861\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20357", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u89c6\u89c9\u4fa7 token \u63a7\u5236\u5668\uff0c\u52a8\u6001\u9009\u62e9\u66f4\u6709\u4fe1\u606f\u91cf\u7684\u89c6\u89c9 token\uff0c\u51cf\u5c11\u5197\u4f59\u89c6\u89c9\u8f93\u5165\u5f00\u9500\u3002", "\u5f15\u5165 LLM \u4fa7\u8ba1\u7b97\u63a7\u5236\u5668\uff0c\u81ea\u9002\u5e94\u8c03\u6574\u5927\u8bed\u8a00\u6a21\u578b\u5185\u90e8\u8ba1\u7b97\uff0c\u5982\u5c42\u6216\u6ce8\u610f\u529b\u5934\u7b49\u8ba1\u7b97\u8d44\u6e90\u3002", "\u4f7f\u7528\u5171\u4eab\u9884\u7b97\u7f16\u7801\u4e0e\u53ef\u5fae\u5ef6\u8fdf\u4f30\u8ba1\u5668\u8fdb\u884c\u7aef\u5230\u7aef\u8bad\u7ec3\uff0c\u4f7f\u4e24\u4e2a\u63a7\u5236\u5668\u80fd\u8de8\u9636\u6bb5\u8054\u5408\u5206\u914d\u8ba1\u7b97\u9884\u7b97\u3002"], "keywords": ["\u591a\u6a21\u6001", "\u9ad8\u6548\u63a8\u7406", "\u81ea\u9002\u5e94\u8ba1\u7b97", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20357v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Look Less, Think Faster: Joint Token-Compute Adaptation for Multimodal LLMs", "tldr": "SmartVL\u8054\u5408\u81ea\u9002\u5e94\u89c6\u89c9token\u4e0eLLM\u8ba1\u7b97", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa SmartVL\uff0c\u4e00\u4e2a\u9762\u5411\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u7edf\u4e00\u81ea\u9002\u5e94\u63a8\u7406\u6846\u67b6\uff0c\u53ef\u6839\u636e\u8f93\u5165\u5185\u5bb9\u548c\u8ba1\u7b97\u9884\u7b97\u8054\u5408\u8c03\u5ea6\u89c6\u89c9 token \u6570\u91cf\u4e0e LLM \u4fa7\u8ba1\u7b97\u91cf\u3002\u5b83\u901a\u8fc7\u89c6\u89c9 token \u63a7\u5236\u5668\u548c LLM \u8ba1\u7b97\u63a7\u5236\u5668\u534f\u540c\u5de5\u4f5c\uff0c\u5728\u76ee\u6807\u5ef6\u8fdf/\u9884\u7b97\u4e0b\u63d0\u5347\u51c6\u786e\u7387-\u6548\u7387\u6743\u8861\u3002", "why_notable": "\u76f8\u6bd4\u53ea\u5355\u72ec\u88c1\u526a\u89c6\u89c9 token \u6216\u8df3\u8fc7 LLM \u8ba1\u7b97\u7684\u65e2\u6709\u65b9\u6cd5\uff0cSmartVL\u663e\u5f0f\u5efa\u6a21\u89c6\u89c9\u8f93\u5165\u89c4\u6a21\u4e0e\u8bed\u8a00\u6a21\u578b\u8ba1\u7b97\u4e4b\u95f4\u7684\u8026\u5408\u5173\u7cfb\uff0c\u5728\u591a\u9879 MLLM \u57fa\u51c6\u4e0a\u53d6\u5f97\u66f4\u4f18\u7684\u51c6\u786e\u7387-\u6548\u7387 Pareto \u524d\u6cbf\uff0c\u5bf9\u964d\u4f4e\u591a\u6a21\u6001\u6a21\u578b\u90e8\u7f72\u6210\u672c\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Multimodal large language models (MLLMs) are increasingly expected to automate visualization development by generating code directly from visual designs. However, existing evaluations mainly focus on single-chart generation and overlook coordinated multi-view interface construction, which requires joint reasoning about data semantics, view coordination, and interaction logic. Consequently, MLLM capabilities in this setting remain underexplored, and the field lacks a dedicated benchmark for systematic assessment. We introduce MV-Bench, a benchmark for evaluating MLLMs on coordinated multi-view interface construction. Instead of relying on incomplete or inconsistent open-source implementations, we use Tableau workbook files as ground truth because they explicitly encode data bindings, visual mappings, and interactions. We develop a multi-stage pipeline that converts these specifications into executable web interfaces through structured intermediate representations. The benchmark contains 92 base interfaces and 1,048 verified instances created by recombining chart types, datasets, and interaction patterns. Each instance includes executable code, a rendered interface, a dataset, and interaction annotations. We evaluate five state-of-the-art MLLMs in a single-pass setting using metrics for visual fidelity, data binding correctness, and interaction completeness. The strongest model achieves 75.45 percent accuracy in visual layout reproduction, but only 21.71 percent in data binding and 11.68 percent in interaction completeness. These results show that current MLLMs can reproduce visual appearance but remain limited in generating the data semantics and interactive logic required by coordinated multi-view interfaces. Iterative refinement improves code executability but does not substantially reduce the gap in data binding and interaction generation.", "arxiv_id": "2607.19910", "arxiv_url": "https://arxiv.org/abs/2607.19910", "authors": ["Yue Zhao", "Hongxu Liu", "Feiyu Wang", "Xiaoyu Yang", "Tong Ge", "Zhen Yang", "Chao Wang", "Qiong Zeng"], "brief": "\u8bba\u6587\u63d0\u51fa MV-Bench\uff0c\u7528\u4e8e\u7cfb\u7edf\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u6a21\u578b\u4ece\u89c6\u89c9\u8bbe\u8ba1\u751f\u6210\u534f\u8c03\u591a\u89c6\u56fe\u53ef\u89c6\u5316\u754c\u9762\u7684\u80fd\u529b\u3002\u5b83\u4ee5 Tableau \u5de5\u4f5c\u7c3f\u4e3a\u771f\u503c\uff0c\u6784\u5efa\u5305\u542b\u4ee3\u7801\u3001\u6e32\u67d3\u754c\u9762\u3001\u6570\u636e\u96c6\u548c\u4ea4\u4e92\u6807\u6ce8\u7684\u53ef\u6267\u884c\u57fa\u51c6\u3002", "categories": ["cs.CV", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19910", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5305\u542b92\u4e2a\u57fa\u7840\u754c\u9762\u548c1048\u4e2a\u9a8c\u8bc1\u5b9e\u4f8b\uff0c\u8986\u76d6\u56fe\u8868\u7c7b\u578b\u3001\u6570\u636e\u96c6\u4e0e\u4ea4\u4e92\u6a21\u5f0f\u7684\u7ec4\u5408", "\u901a\u8fc7\u7ed3\u6784\u5316\u4e2d\u95f4\u8868\u793a\u5c06 Tableau \u4e2d\u7684\u6570\u636e\u7ed1\u5b9a\u3001\u89c6\u89c9\u6620\u5c04\u548c\u4ea4\u4e92\u89c4\u8303\u8f6c\u6362\u4e3a\u53ef\u6267\u884c Web \u754c\u9762", "\u4e94\u4e2a\u5148\u8fdbMLLM\u8bc4\u6d4b\u663e\u793a\uff1a\u89c6\u89c9\u5e03\u5c40\u6700\u9ad875.45%\uff0c\u4f46\u6570\u636e\u7ed1\u5b9a\u4ec521.71%\uff0c\u4ea4\u4e92\u5b8c\u6574\u6027\u4ec511.68%"], "keywords": ["\u591a\u6a21\u6001", "\u53ef\u89c6\u5316", "\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19910v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MV-Bench: Benchmarking Multimodal Large Language Models for Coordinated Multi-View Interface Construction", "tldr": "\u8bc4\u6d4bMLLM\u6784\u5efa\u591a\u89c6\u56fe\u4ea4\u4e92\u754c\u9762\u7684\u80fd\u529b", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa MV-Bench\uff0c\u7528\u4e8e\u7cfb\u7edf\u8bc4\u4f30\u591a\u6a21\u6001\u5927\u6a21\u578b\u4ece\u89c6\u89c9\u8bbe\u8ba1\u751f\u6210\u534f\u8c03\u591a\u89c6\u56fe\u53ef\u89c6\u5316\u754c\u9762\u7684\u80fd\u529b\u3002\u5b83\u4ee5 Tableau \u5de5\u4f5c\u7c3f\u4e3a\u771f\u503c\uff0c\u6784\u5efa\u5305\u542b\u4ee3\u7801\u3001\u6e32\u67d3\u754c\u9762\u3001\u6570\u636e\u96c6\u548c\u4ea4\u4e92\u6807\u6ce8\u7684\u53ef\u6267\u884c\u57fa\u51c6\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u6307\u51fa\u5f53\u524d\u591a\u6a21\u6001\u5927\u6a21\u578b\u867d\u80fd\u8f83\u597d\u590d\u73b0\u754c\u9762\u5916\u89c2\uff0c\u4f46\u5728\u6570\u636e\u8bed\u4e49\u7ed1\u5b9a\u548c\u4ea4\u4e92\u903b\u8f91\u751f\u6210\u4e0a\u4ecd\u5b58\u5728\u660e\u663e\u77ed\u677f\uff0c\u4e3a\u53ef\u89c6\u5316\u81ea\u52a8\u751f\u6210\u63d0\u4f9b\u4e86\u66f4\u8d34\u8fd1\u771f\u5b9e\u5e94\u7528\u7684\u8bc4\u6d4b\u6807\u51c6\u3002"}, {"abstract": "Evaluating the physical consistency of embodied world models(EWMs) is a critical open challenge. While closed-loop evaluation via simulator rollouts offers a more faithful assessment of physical plausibility than open-loop alternatives, existing frameworks almost exclusively rely on Inverse Dynamics Models(IDMs) for action extraction. Due to the intricate mapping from 2D pixel space to 3D kinematic space, the learned IDMs can be brittle to data outside their training distribution, resulting in unreliable action extraction from the generated videos with novel objects and scenarios. This creates an unavoidable attribution ambiguity between world model inaccuracies and extractor errors. To reduce this ambiguity, we present KineBench, an IDM-free closed-loop benchmark for EWMs, built upon an explicit kinematic grounding pipeline. Given a generated video, KineBench employs cascaded visual foundation models to directly extract 6D end-effector poses from individual frames, which are then executed in a physics simulator for closed-loop validation. Beyond execution-based task success, KineBench incorporates two classical 3D kinematic metrics--Spectral Arc Length (SPARC) and the Maruyama Manipulability Index--to characterize trajectory smoothness and kinematic feasibility from a robot-centric perspective. Built on 20 diverse manipulation tasks in ManiSkill3, KineBench evaluates EWMs across four progressive suites: basic execution, task transfer, visual out-of-distribution generalization, and complexity-conditioned scaling. Evaluation across frontier models reveals task-complexity-bounded nonlinear scaling in embodied video generation, providing empirical guidance for future data-scaling strategies.", "arxiv_id": "2607.19876", "arxiv_url": "https://arxiv.org/abs/2607.19876", "authors": ["Zeyu Liu", "Zhangzhe Zhu", "Yang Zhang", "Chenyou Fan", "Chenjia Bai", "Xuelong Li"], "brief": "\u8bba\u6587\u63d0\u51fa KineBench\uff0c\u4e00\u4e2a\u65e0\u9700\u9006\u52a8\u529b\u5b66\u6a21\u578b\uff08IDM\uff09\u7684\u95ed\u73af\u57fa\u51c6\uff0c\u7528\u663e\u5f0f\u8fd0\u52a8\u5b66 grounding \u8bc4\u4f30\u5177\u8eab\u4e16\u754c\u6a21\u578b\u751f\u6210\u89c6\u9891\u7684\u7269\u7406\u4e00\u81f4\u6027\u3002\u5b83\u4ece\u89c6\u9891\u5e27\u4e2d\u63d0\u53d6 6D \u672b\u7aef\u6267\u884c\u5668\u4f4d\u59ff\u5e76\u5728\u7269\u7406\u4eff\u771f\u5668\u4e2d\u6267\u884c\uff0c\u540c\u65f6\u8bc4\u4f30\u4efb\u52a1\u6210\u529f\u3001\u8f68\u8ff9\u5e73\u6ed1\u6027\u4e0e\u8fd0\u52a8\u5b66\u53ef\u884c\u6027\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19876", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u7528\u7ea7\u8054\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u76f4\u63a5\u4ece\u751f\u6210\u89c6\u9891\u4e2d\u63d0\u53d6 6D \u672b\u7aef\u6267\u884c\u5668\u4f4d\u59ff\uff0c\u907f\u514d IDM \u5e26\u6765\u7684\u52a8\u4f5c\u63d0\u53d6\u8bef\u5dee\u5f52\u56e0\u6b67\u4e49", "\u57fa\u4e8e ManiSkill3 \u6784\u5efa 20 \u4e2a\u591a\u6837\u5316\u64cd\u4f5c\u4efb\u52a1\uff0c\u8986\u76d6\u57fa\u7840\u6267\u884c\u3001\u4efb\u52a1\u8fc1\u79fb\u3001\u89c6\u89c9\u5206\u5e03\u5916\u6cdb\u5316\u548c\u590d\u6742\u5ea6\u6761\u4ef6\u7f29\u653e\u56db\u4e2a\u8bc4\u6d4b\u5957\u4ef6", "\u5f15\u5165 SPARC \u548c Maruyama Manipulability Index \u4e24\u4e2a\u7ecf\u5178 3D \u8fd0\u52a8\u5b66\u6307\u6807\uff0c\u91cf\u5316\u8f68\u8ff9\u5e73\u6ed1\u6027\u4e0e\u673a\u5668\u4eba\u53ef\u6267\u884c\u6027"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u4e16\u754c\u6a21\u578b", "\u673a\u5668\u4eba", "\u8bc4\u6d4b\u57fa\u51c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19876v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "KineBench: Benchmarking Embodied World Models via IDM-Free Kinematic Grounding", "tldr": "\u65e0IDM\u8bc4\u6d4b\u5177\u8eab\u4e16\u754c\u6a21\u578b\u8fd0\u52a8\u4e00\u81f4\u6027", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa KineBench\uff0c\u4e00\u4e2a\u65e0\u9700\u9006\u52a8\u529b\u5b66\u6a21\u578b\uff08IDM\uff09\u7684\u95ed\u73af\u57fa\u51c6\uff0c\u7528\u663e\u5f0f\u8fd0\u52a8\u5b66 grounding \u8bc4\u4f30\u5177\u8eab\u4e16\u754c\u6a21\u578b\u751f\u6210\u89c6\u9891\u7684\u7269\u7406\u4e00\u81f4\u6027\u3002\u5b83\u4ece\u89c6\u9891\u5e27\u4e2d\u63d0\u53d6 6D \u672b\u7aef\u6267\u884c\u5668\u4f4d\u59ff\u5e76\u5728\u7269\u7406\u4eff\u771f\u5668\u4e2d\u6267\u884c\uff0c\u540c\u65f6\u8bc4\u4f30\u4efb\u52a1\u6210\u529f\u3001\u8f68\u8ff9\u5e73\u6ed1\u6027\u4e0e\u8fd0\u52a8\u5b66\u53ef\u884c\u6027\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u9488\u5bf9\u5177\u8eab\u4e16\u754c\u6a21\u578b\u8bc4\u6d4b\u4e2d\u7684\u5173\u952e\u74f6\u9888\uff1a\u751f\u6210\u89c6\u9891\u662f\u5426\u771f\u6b63\u7269\u7406\u53ef\u6267\u884c\u3002\u901a\u8fc7\u53bb\u9664\u5bf9 IDM \u7684\u4f9d\u8d56\uff0cKineBench \u63d0\u4f9b\u4e86\u66f4\u53ef\u9760\u7684\u95ed\u73af\u8bc4\u4f30\u65b9\u5f0f\uff0c\u5e76\u63ed\u793a\u524d\u6cbf\u6a21\u578b\u5728\u4efb\u52a1\u590d\u6742\u5ea6\u4e0b\u7684\u975e\u7ebf\u6027\u7f29\u653e\u89c4\u5f8b\uff0c\u5bf9\u5177\u8eab\u89c6\u9891\u751f\u6210\u548c\u673a\u5668\u4eba\u6570\u636e\u6269\u5c55\u7b56\u7565\u6709\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Robust embodied robots should be able to recover from failures and retry tasks in order to operate reliably in unstructured and noisy real-world environments. Achieving this capability requires training policies on data that captures recovery behaviors. However, collecting such data through robot teleoperation is difficult to scale, as it is time-consuming to induce diverse failure states, perform corrective actions, and reset the environment. This challenge is further exacerbated by the high diversity of failure modes, which demands substantially more recovery data than success demonstrations. In this work, we show that egocentric human data capturing failure recovery processes provides a scalable alternative. By efficiently arranging task-level failure configurations and recording short recovery segments, human operators can generate more than 10x as much valid recovery data per hour compared to robot teleoperation under our protocol. To address the embodiment gap between human and robot, we propose EgoRecovery, a co-training framework for learning recovery behavior, where human recovery demonstrations are aligned to a compact corrective-intent space shared with robot data, which captures the timing and magnitude of correction. Only a small number of robot recovery demonstrations are required to connect this intent to executable robot actions. At deployment, a learned recovery gate predicts when correction is needed from robot observations and activates the corrective intent only in recovery states. Experiments on real-world recovery tasks show that EgoRecovery improves success from failure starts over robot-only recovery, direct co-training with human recovery data, and direct intent-transfer baselines.", "arxiv_id": "2607.19745", "arxiv_url": "https://arxiv.org/abs/2607.19745", "authors": ["Zuhao Ge", "Yuchen Zhou", "Weitao Zhou", "Minglei Li", "Xinyu Li", "Chao Wu", "Hanwen Zhao", "Haotian Wang", "Zuxuan Wu", "Xiaosong Jia", "Yu-Gang Jiang"], "brief": "\u8bba\u6587\u63d0\u51fa EgoRecovery\uff0c\u4e00\u79cd\u5229\u7528\u4eba\u7c7b\u7b2c\u4e00\u89c6\u89d2\u5931\u8d25\u6062\u590d\u793a\u8303\u6765\u8bad\u7ec3\u673a\u5668\u4eba\u6062\u590d\u80fd\u529b\u7684\u534f\u540c\u8bad\u7ec3\u6846\u67b6\u3002\u5b83\u5c06\u4eba\u7c7b\u6062\u590d\u884c\u4e3a\u5bf9\u9f50\u5230\u4e0e\u673a\u5668\u4eba\u5171\u4eab\u7684\u7d27\u51d1\u201c\u7ea0\u6b63\u610f\u56fe\u201d\u7a7a\u95f4\uff0c\u518d\u7528\u5c11\u91cf\u673a\u5668\u4eba\u6570\u636e\u6620\u5c04\u5230\u53ef\u6267\u884c\u52a8\u4f5c\u3002", "categories": ["cs.RO", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19745", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u901a\u8fc7\u5e03\u7f6e\u4efb\u52a1\u7ea7\u5931\u8d25\u72b6\u6001\u5e76\u5f55\u5236\u77ed\u6062\u590d\u7247\u6bb5\uff0c\u4eba\u7c7b\u64cd\u4f5c\u8005\u6bcf\u5c0f\u65f6\u53ef\u751f\u6210\u6bd4\u673a\u5668\u4eba\u9065\u64cd\u4f5c\u591a 10 \u500d\u4ee5\u4e0a\u7684\u6709\u6548\u6062\u590d\u6570\u636e\u3002", "\u5f15\u5165\u5171\u4eab\u7ea0\u6b63\u610f\u56fe\u7a7a\u95f4\uff0c\u523b\u753b\u7ea0\u6b63\u52a8\u4f5c\u7684\u65f6\u673a\u4e0e\u5e45\u5ea6\uff0c\u7f13\u89e3\u4eba\u7c7b\u4e0e\u673a\u5668\u4eba\u4e4b\u95f4\u7684\u5177\u8eab\u5dee\u5f02\u3002", "\u90e8\u7f72\u65f6\u4f7f\u7528\u6062\u590d\u95e8\u63a7\u6a21\u578b\u5224\u65ad\u4f55\u65f6\u9700\u8981\u7ea0\u6b63\uff0c\u4ec5\u5728\u5931\u8d25\u6062\u590d\u72b6\u6001\u6fc0\u6d3b\u7ea0\u6b63\u610f\u56fe\uff1b\u771f\u5b9e\u673a\u5668\u4eba\u5b9e\u9a8c\u4f18\u4e8e\u4ec5\u673a\u5668\u4eba\u6570\u636e\u3001\u76f4\u63a5\u6df7\u5408\u8bad\u7ec3\u548c\u76f4\u63a5\u610f\u56fe\u8fc1\u79fb\u57fa\u7ebf\u3002"], "keywords": ["\u673a\u5668\u4eba\u5b66\u4e60", "\u6a21\u4eff\u5b66\u4e60", "\u5931\u8d25\u6062\u590d", "\u5177\u8eab\u667a\u80fd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19745v1", "published_at": "2026-07-22", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EgoRecovery: Acquiring Failure Recovery Ability Through Human Recovery Demonstration", "tldr": "\u7528\u7b2c\u4e00\u89c6\u89d2\u4eba\u7c7b\u6570\u636e\u8bad\u7ec3\u673a\u5668\u4eba\u5931\u8d25\u6062\u590d", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa EgoRecovery\uff0c\u4e00\u79cd\u5229\u7528\u4eba\u7c7b\u7b2c\u4e00\u89c6\u89d2\u5931\u8d25\u6062\u590d\u793a\u8303\u6765\u8bad\u7ec3\u673a\u5668\u4eba\u6062\u590d\u80fd\u529b\u7684\u534f\u540c\u8bad\u7ec3\u6846\u67b6\u3002\u5b83\u5c06\u4eba\u7c7b\u6062\u590d\u884c\u4e3a\u5bf9\u9f50\u5230\u4e0e\u673a\u5668\u4eba\u5171\u4eab\u7684\u7d27\u51d1\u201c\u7ea0\u6b63\u610f\u56fe\u201d\u7a7a\u95f4\uff0c\u518d\u7528\u5c11\u91cf\u673a\u5668\u4eba\u6570\u636e\u6620\u5c04\u5230\u53ef\u6267\u884c\u52a8\u4f5c\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u63d0\u4f9b\u4e86\u4e00\u6761\u53ef\u6269\u5c55\u83b7\u53d6\u673a\u5668\u4eba\u5931\u8d25\u6062\u590d\u6570\u636e\u7684\u8def\u5f84\uff0c\u663e\u8457\u964d\u4f4e\u5bf9\u6602\u8d35\u673a\u5668\u4eba\u9065\u64cd\u4f5c\u6062\u590d\u793a\u8303\u7684\u4f9d\u8d56\uff0c\u5bf9\u63d0\u5347\u771f\u5b9e\u73af\u5883\u4e2d\u5177\u8eab\u673a\u5668\u4eba\u7684\u9c81\u68d2\u6027\u548c\u53ef\u90e8\u7f72\u6027\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Robots deployed in delivery, campus, and emergency-response settings often need
