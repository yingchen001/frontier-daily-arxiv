e resulting hidden-state movement followed the supplied constitutive law. These state transformations ordered direct, physically neutral and inverse laws across 60 frozen relations and correctly oriented 39 of 40 directional laws, whereas lexical controls were near chance. Bidirectional interventions shifted answer probabilities toward or away from the physically appropriate outcome across all 12 matched cases, while counterfactual state patches transferred opposing decision signals across mechanisms and answer formats. Physical relationships were therefore more visible in controlled state changes than in absolute states alone.", "arxiv_id": "2607.20058", "arxiv_url": "https://arxiv.org/abs/2607.20058", "authors": ["Markus J. Buehler"], "brief": "\u8bba\u6587\u7814\u7a76\u5f00\u653e\u6743\u91cd Gemma \u6a21\u578b\u662f\u5426\u771f\u6b63\u8868\u5f81\u5e76\u4f7f\u7528\u6750\u6599\u79d1\u5b66\u4e2d\u7684\u7269\u7406\u673a\u5236\u3002\u4f5c\u8005\u901a\u8fc7\u9690\u85cf\u72b6\u6001\u8bfb\u51fa\u3001\u53cd\u4e8b\u5b9e\u57fa\u51c6\u548c\u56e0\u679c\u5e72\u9884\u53d1\u73b0\uff0c\u6750\u6599\u673a\u7406\u4e0d\u4ec5\u53ef\u5728\u5355\u4e2a\u72b6\u6001\u4e2d\u88ab\u8bfb\u51fa\uff0c\u66f4\u6e05\u6670\u5730\u4f53\u73b0\u5728\u53d7\u63a7\u72b6\u6001\u53d8\u5316\u4e2d\uff0c\u5e76\u4f1a\u56e0\u679c\u5f71\u54cd\u5de5\u7a0b\u95ee\u7b54\u3002", "categories": ["cs.AI", "cond-mat.mes-hall", "cond-mat.mtrl-sci", "cs.CL"], "github_repo": "https://github.com/lamm-mit/Substrates", "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20058", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u7ed3\u5408\u76f4\u63a5\u8bcd\u8868\u8bfb\u51fa\u3001Jacobian lens\u3001\u65e0\u9009\u9879\u72b6\u6001\u51e0\u4f55\u300160\u6761\u7269\u7406\u5b9a\u5f8b\u53cd\u4e8b\u5b9e\u57fa\u51c6\u4e0e\u9690\u85cf\u72b6\u6001\u56e0\u679c\u5e72\u9884\u3002", "\u572850\u4e2a\u7559\u51fa\u6750\u6599\u63cf\u8ff0\u4e2d\uff0cJacobian lenses \u53ef\u590d\u73b0\u6982\u5ff5\u6392\u5e8f\uff1b\u u5230\u201c\u6a21\u578b\u5185\u90e8\u662f\u5426\u8868\u5f81\u5e76\u4f7f\u7528\u7269\u7406\u673a\u5236\u201d\uff0c\u5e76\u8868\u660e\u7269\u7406\u5173\u7cfb\u66f4\u591a\u4f53\u73b0\u5728\u9690\u85cf\u72b6\u6001\u7684\u53d7\u63a7\u53d8\u5316\u800c\u975e\u9759\u6001\u8868\u793a\u4e2d\uff0c\u5bf9\u79d1\u5b66\u9886\u57dfLLM\u53ef\u89e3\u91ca\u6027\u548c\u53ef\u4fe1\u5e94\u7528\u5177\u6709\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "LLM-driven autonomous agents are reshaping offensive security. Unlike traditional penetration-testing tooling -- deterministic, narrowly scoped, and operated by trained practitioners -- agentic security tools exhibit \\textit{indeterminacy} along three independent dimensions. First, their actions are drawn from a non-deterministic policy whose outputs resist both ex-ante and ex-post explanation, frustrating incident attribution and pre-deployment safety review. Second, their impact is open-ended due to the non-deterministic actions, agency of utilized models, and opaque LLM supply-chains. Third, their user population is indeterminate in both size and required skill: the operating skill floor for using or developing offensive capabilities has dropped sharply. These three properties are linked thematically, but are not derivable from one another. Combined with the structural cost asymmetry between offense and defense, they enable the industrialization of offensive capability. The net short-term effect favors attackers, even if the same technology may, in the long run, democratize access to defensive practice. Existing dual-use cybersecurity and AI-ethics frameworks were not designed for this combination. Our work analyzes how moral attribution becomes diffuse between users, tool-makers, and third parties when employing autonomous AI agents for offensive security. We also examine the stakeholder impact of this technology and provide stratified recommendations.", "arxiv_id": "2607.20255", "arxiv_url": "https://arxiv.org/abs/2607.20255", "authors": ["Andreas Happe", "J\u00fcrgen Cito", "Jasmin Wachter"], "brief": "\u672c\u6587\u5206\u6790LLM\u9a71\u52a8\u7684\u81ea\u4e3b\u667a\u80fd\u4f53\u5728\u8fdb\u653b\u6027\u7f51\u7edc\u5b89\u5168\u4e2d\u7684\u4f26\u7406\u4e0e\u6cbb\u7406\u95ee\u9898\uff0c\u6307\u51fa\u5176\u5728\u884c\u4e3a\u3001\u5f71\u54cd\u548c\u7528\u6237\u7fa4\u4f53\u4e0a\u7684\u4e0d\u786e\u5b9a\u6027\u4f1a\u653e\u5927\u653b\u51fb\u80fd\u529b\u3002\u8bba\u6587\u8fdb\u4e00\u6b65\u8ba8\u8bba\u8d23\u4efb\u5f52\u5c5e\u5982\u4f55\u5728\u7528\u6237\u3001\u5de5\u5177\u5f00\u53d1\u8005\u4e0e\u7b2c\u4e09\u65b9\u4e4b\u95f4\u6269\u6563\uff0c\u5e76\u63d0\u51fa\u5206\u5c42\u5efa\u8bae\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20255", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u4e09\u7c7b\u72ec\u7acb\u4e0d\u786e\u5b9a\u6027\uff1a\u975e\u786e\u5b9a\u6027\u884c\u4e3a\u7b56\u7565\u3001\u5f00\u653e\u5f0f\u5f71\u54cd\u8303\u56f4\u3001\u7528\u6237\u89c4\u6a21\u4e0e\u6280\u80fd\u95e8\u69db\u4e0d\u786e\u5b9a", "\u8ba4\u4e3a\u81ea\u4e3b\u8fdb\u653b\u5de5\u5177\u53e0\u52a0\u653b\u9632\u6210\u672c\u4e0d\u5bf9\u79f0\uff0c\u4f1a\u5728\u77ed\u671f\u5185\u66f4\u6709\u5229\u4e8e\u653b\u51fb\u8005\u5e76\u63a8\u52a8\u653b\u51fb\u80fd\u529b\u5de5\u4e1a\u5316", "\u6307\u51fa\u73b0\u6709\u53cc\u7528\u9014\u7f51\u7edc\u5b89\u5168\u4e0eAI\u4f26\u7406\u6846\u67b6\u96be\u4ee5\u8986\u76d6\u6b64\u7c7b\u667a\u80fd\u4f53\u5e26\u6765\u7684\u8d23\u4efb\u5f52\u5c5e\u548c\u5229\u76ca\u76f8\u5173\u65b9\u5f71\u54cd"], "keywords": ["\u667a\u80fd\u4f53", "\u7f51\u7edc\u5b89\u5168", "AI\u4f26\u7406", "\u6cbb\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20255v1", "published_at": "2026-07-22", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Ethics of Autonomous AI Agents for Offensive Security", "tldr": "\u5256\u6790\u8fdb\u653b\u578b\u5b89\u5168AI\u667a\u80fd\u4f53\u7684\u4f26\u7406\u98ce\u9669", "upvotes": 0, "what_it_is": "\u672c\u6587\u5206\u6790LLM\u9a71\u52a8\u7684\u81ea\u4e3b\u667a\u80fd\u4f53\u5728\u8fdb\u653b\u6027\u7f51\u7edc\u5b89\u5168\u4e2d\u7684\u4f26\u7406\u4e0e\u6cbb\u7406\u95ee\u9898\uff0c\u6307\u51fa\u5176\u5728\u884c\u4e3a\u3001\u5f71\u54cd\u548c\u7528\u6237\u7fa4\u4f53\u4e0a\u7684\u4e0d\u786e\u5b9a\u6027\u4f1a\u653e\u5927\u653b\u51fb\u80fd\u529b\u3002\u8bba\u6587\u8fdb\u4e00\u6b65\u8ba8\u8bba\u8d23\u4efb\u5f52\u5c5e\u5982\u4f55\u5728\u7528\u6237\u3001\u5de5\u5177\u5f00\u53d1\u8005\u4e0e\u7b2c\u4e09\u65b9\u4e4b\u95f4\u6269\u6563\uff0c\u5e76\u63d0\u51fa\u5206\u5c42\u5efa\u8bae\u3002", "why_notable": "\u8be5\u6587\u4e0d\u662f\u63d0\u51fa\u65b0\u5de5\u5177\uff0c\u800c\u662f\u7cfb\u7edf\u523b\u753b\u8fdb\u653b\u578bAI\u667a\u80fd\u4f53\u533a\u522b\u4e8e\u4f20\u7edf\u6e17\u900f\u6d4b\u8bd5\u5de5\u5177\u7684\u4f26\u7406\u98ce\u9669\uff0c\u4e3a\u5b89\u5168\u7814\u7a76\u3001\u5de5\u5177\u53d1\u5e03\u3001\u653f\u7b56\u76d1\u7ba1\u548c\u8d1f\u8d23\u4efb\u62ab\u9732\u63d0\u4f9b\u6982\u5ff5\u6846\u67b6\u3002"}, {"abstract": "Long-horizon tasks require sustained perception, reasoning, and exploration, and are a persistent challenge for large language model (LLM) agents. This gap is reflected in their limited performance on continual learning benchmarks such as ARC-AGI-3, especially when models are evaluated out of the box. Various agent harnesses have been proposed to close this gap, and each commits to a strategy for handling long sequences of observations, i.e., what information to save from the environment and how to load it into model context, a choice we argue is particularly consequential. Existing methods for context management face a significant tradeoff, as preserving more information makes retrieving relevant details less tractable. We propose PRO-LONG, a minimal context management framework built around programmatic memory for LLM agents in long-horizon, exploratory settings. PRO-LONG addresses the tradeoff by keeping a complete, structured interaction log and capitalizing on recent progress in coding agents to search this history efficiently. On the full ARC-AGI-3 public game set, PRO-LONG improves over a base coding agent by an average of 18.0 percentage points across frontier models, and matches or exceeds state-of-the-art specialized harnesses (up to 76.1% pass@1) while using 4.2-5.8x fewer tokens. With Fable 5, PRO-LONG achieves 97.4% best@2 at a total cost of \\$1,750. Relevant code and logs are available at https://github.com/alexisfox7/PRO-LONG.", "arxiv_id": "2607.20064", "arxiv_url": "https://arxiv.org/abs/2607.20064", "authors": ["Alexis Fox", "Junlin Wang", "Paul Rosu", "Bhuwan Dhingra"], "brief": "\u8bba\u6587\u63d0\u51fa PRO-LONG\uff0c\u4e00\u4e2a\u9762\u5411\u957f\u7a0b\u63a2\u7d22\u4efb\u52a1\u7684\u6781\u7b80\u4e0a\u4e0b\u6587\u7ba1\u7406\u6846\u67b6\u3002\u5b83\u4fdd\u7559\u5b8c\u6574\u7ed3\u6784\u5316\u4ea4\u4e92\u65e5\u5fd7\uff0c\u5e76\u8ba9\u7f16\u7801\u667a\u80fd\u4f53\u901a\u8fc7\u7a0b\u5e8f\u5316\u65b9\u5f0f\u9ad8\u6548\u68c0\u7d22\u5386\u53f2\u4fe1\u606f\uff0c\u4ece\u800c\u652f\u6491\u6301\u7eed\u611f\u77e5\u3001\u63a8\u7406\u4e0e\u63a2\u7d22\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20064", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u662f\u201c\u7a0b\u5e8f\u5316\u8bb0\u5fc6\u201d\uff1a\u4e0d\u628a\u5927\u91cf\u5386\u53f2\u76f4\u63a5\u585e\u5165\u4e0a\u4e0b\u6587\uff0c\u800c\u662f\u4fdd\u5b58\u5b8c\u6574\u7ed3\u6784\u5316\u65e5\u5fd7\uff0c\u5e76\u7528\u4ee3\u7801\u641c\u7d22\u3001\u8fc7\u6ee4\u548c\u63d0\u53d6\u76f8\u5173\u4fe1\u606f\u3002", "\u5728 ARC-AGI-3 \u5168\u91cf\u516c\u5f00\u6e38\u620f\u96c6\u4e0a\uff0c\u76f8\u6bd4\u57fa\u7840\u7f16\u7801\u667a\u80fd\u4f53\u5e73\u5747\u63d0\u5347 18.0 \u4e2a\u767e\u5206\u70b9\u3002", "\u8fbe\u5230\u6216\u8d85\u8fc7\u4e13\u7528\u667a\u80fd\u4f53\u6846\u67b6\u8868\u73b0\uff0c\u6700\u9ad8 76.1% pass@1\uff0c\u540c\u65f6\u51cf\u5c11 4.2-5.8 \u500d token \u4f7f\u7528\uff1b\u5728 Fable 5 \u4e0a best@2 \u8fbe 97.4%\u3002"], "keywords": ["\u667a\u80fd\u4f53", "\u957f\u7a0b\u63a8\u7406", "\u8bb0\u5fc6\u673a\u5236", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20064v1", "published_at": "2026-07-22", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "PRO-LONG: Programmatic Memory Enables Long-Horizon Reasoning", "tldr": "\u7528\u7a0b\u5e8f\u5316\u8bb0\u5fc6\u63d0\u5347\u957f\u7a0bLLM\u667a\u80fd\u4f53\u63a8\u7406", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa PRO-LONG\uff0c\u4e00\u4e2a\u9762\u5411\u957f\u7a0b\u63a2\u7d22\u4efb\u52a1\u7684\u6781\u7b80\u4e0a\u4e0b\u6587\u7ba1\u7406\u6846\u67b6\u3002\u5b83\u4fdd\u7559\u5b8c\u6574\u7ed3\u6784\u5316\u4ea4\u4e92\u65e5\u5fd7\uff0c\u5e76\u8ba9\u7f16\u7801\u667a\u80fd\u4f53\u901a\u8fc7\u7a0b\u5e8f\u5316\u65b9\u5f0f\u9ad8\u6548\u68c0\u7d22\u5386\u53f2\u4fe1\u606f\uff0c\u4ece\u800c\u652f\u6491\u6301\u7eed\u611f\u77e5\u3001\u63a8\u7406\u4e0e\u63a2\u7d22\u3002", "why_notable": "\u957f\u7a0b\u4efb\u52a1\u4e2d\uff0cLLM \u667a\u80fd\u4f53\u5e38\u53d7\u9650\u4e8e\u4e0a\u4e0b\u6587\u7a97\u53e3\u548c\u8bb0\u5fc6\u68c0\u7d22\u6548\u7387\u3002PRO-LONG \u7528\u7b80\u5355\u3001\u53ef\u590d\u73b0\u7684\u7a0b\u5e8f\u5316\u8bb0\u5fc6\u673a\u5236\u7f13\u89e3\u201c\u4fdd\u5b58\u66f4\u591a\u4fe1\u606f\u201d\u548c\u201c\u68c0\u7d22\u66f4\u56f0\u96be\u201d\u7684\u77db\u76fe\uff0c\u5728\u66f4\u4f4e token \u6210\u672c\u4e0b\u53d6\u5f97\u5f3a\u6027\u80fd\uff0c\u663e\u793a\u51fa\u5bf9\u901a\u7528\u957f\u7a0b\u667a\u80fd\u4f53\u6846\u67b6\u7684\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We present Solar Open 2, a 250B-A15B Mixture-of-Experts language model built for long-horizon agentic tasks, scaled up from Solar Open 1 (Solar Open 100B). To hold entire agent trajectories in a single context, Solar Open 2 reaches a 1M-token window through a hybrid attention stack that interleaves one softmax layer among every three linear-attention layers, using no positional encoding and a gated delta rule extended to negative eigenvalues. To train at this scale under a fixed compute budget, we make training efficient in two ways: a stronger starting point, and higher-value data. For the starting point, we initialize Solar Open 2 from Solar Open 1, transferring the 5.69B-parameter shared skeleton that survives the architectural change and learning everything else through full pre-training. For the data, we curate for value per token: quality- and rarity-aware data curation and mixture-ratio optimization refine a 20T pool into a 10T mixture that, at equal token budget, outperforms the Solar Open 1 recipe. To build its agent skills, we train twelve domain specialists across purpose-built scenarios, then consolidate them into a single model by Multi-teacher On-Policy Distillation (MOPD). Against comparably sized open-weight models on English benchmarks, Solar Open 2 leads on MMLU-Pro, LiveCodeBench, and the APEX-Agents agentic suite, and stays competitive with the strongest (DeepSeek-V4-Flash and MiMo-V2.5) elsewhere. On Korean benchmarks, Solar Open 2 records the highest average of any model compared, including fast-tier closed APIs, and on Ko-GDPval, an in-house Korean officework-agent benchmark, it is competitive with DeepSeek-V4-Pro (1.6T) at less than a sixth of its size.", "arxiv_id": "2607.20062", "arxiv_url": "https://arxiv.org/abs/2607.20062", "authors": ["Sungrae Park", "Sanghoon Kim", "Gyoungjin Gim", "Jungho Cho", "Hyunwoong Ko", "Minbyul Jeong", "Minjeong Kim", "Keunwoo Choi", "Chaehun Shin", "Chanwoong Yoon", "Dongjun Kim", "Eunwon Kim", "Gyungin Shin", "Hyeonju Lee", "Hyungkyu Kang", "Inseo Song", "Jisu Bae", "Jiyoon Han", "Jiyun Lee", "Joonkee Kim", "Junyeop Lee", "Mikyoung Cha", "Sangwon Yu", "Sehwan Joo", "Seokyoon Kang", "Seonghoon Yang", "Seung Shin", "Seunghyun Lee", "Seungseop Lim", "Seungyoun Shin", "Sukyung Lee", "Taegyeong Eo", "Taehwan Oh", "Taewhoo Lee", "Wonho Song", "Wonjun Oh", "Wonseok Hwang", "Yunsu Kim", "Yura Shim", "Hwalsuk Lee", "Sunghun Kim", "Du-Seong Chang", "Kyunghyun Cho", "Seungju Han", "Yejin Choi", "Junsuk Choe", "Hwaran Lee", "Minjeong Ban", "Yun Taewon", "Hwanjun Song", "Jae-Gil Lee", "KyungTae Lim", "Alice Oh"], "brief": "Solar Open 2 \u662f\u4e00\u4e2a 250B-A15B MoE \u8bed\u8a00\u6a21\u578b\uff0c\u9762\u5411\u957f\u7a0b\u667a\u80fd\u4f53\u4efb\u52a1\uff0c\u652f\u6301 100 \u4e07 token \u4e0a\u4e0b\u6587\u3002\u8bba\u6587\u4ecb\u7ecd\u4e86\u5176\u6df7\u5408\u6ce8\u610f\u529b\u67b6\u6784\u3001\u9ad8\u4ef7\u503c\u6570\u636e\u9884\u8bad\u7ec3\u3001\u4e13\u5bb6\u667a\u80fd\u4f53\u8bad\u7ec3\u4e0e\u591a\u6559\u5e08\u5728\u7b56\u7565\u84b8\u998f\u6574\u5408\u65b9\u6cd5\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20062", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u901a\u8fc7\u6bcf\u4e09\u5c42\u7ebf\u6027\u6ce8\u610f\u529b\u63d2\u5165\u4e00\u5c42 softmax \u6ce8\u610f\u529b\u7684\u6df7\u5408\u6808\uff0c\u5b9e\u73b0 1M token \u4e0a\u4e0b\u6587\uff0c\u5e76\u91c7\u7528\u65e0\u4f4d\u7f6e\u7f16\u7801\u4e0e\u6269\u5c55\u5230\u8d1f\u7279\u5f81\u503c\u7684 gated delta rule\u3002", "\u4ece Solar Open 1 \u8fc1\u79fb 56.9 \u4ebf\u53c2\u6570\u5171\u4eab\u9aa8\u67b6\uff0c\u5e76\u5c06 20T \u6570\u636e\u6c60\u6309\u8d28\u91cf\u3001\u7a00\u6709\u6027\u548c\u6df7\u5408\u6bd4\u4f8b\u4f18\u5316\u7b5b\u9009\u4e3a 10T \u9ad8\u4ef7\u503c\u8bad\u7ec3\u6570\u636e\u3002", "\u8bad\u7ec3 12 \u4e2a\u9886\u57df\u4e13\u5bb6\u6a21\u578b\uff0c\u518d\u7528 Multi-teacher On-Policy Distillation \u5c06\u667a\u80fd\u4f53\u80fd\u529b\u6574\u5408\u5230\u5355\u4e00\u6a21\u578b\uff0c\u5728 APEX-Agents\u3001MMLU-Pro\u3001LiveCodeBench \u548c\u97e9\u8bed\u57fa\u51c6\u4e0a\u8868\u73b0\u7a81\u51fa\u3002"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53", "\u957f\u4e0a\u4e0b\u6587", "\u6df7\u5408\u4e13\u5bb6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20062v1", "published_at": "2026-07-22", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Solar Open 2 Technical Report", "tldr": "250B MoE\u957f\u4e0a\u4e0b\u6587\u667a\u80fd\u4f53\u5927\u6a21\u578b", "upvotes": 0, "what_it_is": "Solar Open 2 \u662f\u4e00\u4e2a 250B-A15B MoE \u8bed\u8a00\u6a21\u578b\uff0c\u9762\u5411\u957f\u7a0b\u667a\u80fd\u4f53\u4efb\u52a1\uff0c\u652f\u6301 100 \u4e07 token \u4e0a\u4e0b\u6587\u3002\u8bba\u6587\u4ecb\u7ecd\u4e86\u5176\u6df7\u5408\u6ce8\u610f\u529b\u67b6\u6784\u3001\u9ad8\u4ef7\u503c\u6570\u636e\u9884\u8bad\u7ec3\u3001\u4e13\u5bb6\u667a\u80fd\u4f53\u8bad\u7ec3\u4e0e\u591a\u6559\u5e08\u5728\u7b56\u7565\u84b8\u998f\u6574\u5408\u65b9\u6cd5\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c06\u8d85\u957f\u4e0a\u4e0b\u6587\u3001MoE \u6269\u5c55\u548c\u667a\u80fd\u4f53\u80fd\u529b\u8bad\u7ec3\u7ed3\u5408\u8d77\u6765\uff0c\u5c55\u793a\u4e86\u5728\u56fa\u5b9a\u7b97\u529b\u9884\u7b97\u4e0b\u6784\u5efa\u5f00\u653e\u6743\u91cd\u957f\u7a0b\u667a\u80fd\u4f53\u6a21\u578b\u7684\u5b8c\u6574\u5de5\u7a0b\u8def\u7ebf\uff1b\u5c24\u5176\u5728\u97e9\u8bed\u4e0e\u529e\u516c\u667a\u80fd\u4f53\u4efb\u52a1\u4e0a\u5c55\u73b0\u51fa\u9ad8\u6027\u4ef7\u6bd4\u7ade\u4e89\u529b\u3002"}, {"abstract": "Design rule check (DRC) closure remains a major bottleneck in advanced-node physical design. Although detailed routers are rule-aware, residual design rule violations (DRVs) often require manual engineering change order iterations. Automating this process is challenging because repairs must account for complex geometric interactions, preserve circuit connectivity, and avoid introducing new violations. We present EvoDRC, a skill-evolution framework for agentic block-level DRC repair. EvoDRC initializes layer-specific repair skills using knowledge distilled from an unrelated reference design and continuously evolves these skills using traceable repair experience collected from the target design. EvoDRC decomposes the layout into bounded repair regions and assigns an LLM repair agent to each region. Local DRC analysis, connectivity-checking, and impact-preview tools provide feedback on proposed modifications. Repair operations and their resulting DRV changes are stored in a knowledge database and used to evolve the repair skills. Experiments on seven block-level designs from the DAC26 DRC Benchmark show that EvoDRC achieves a 73.5\\% overall reduction compared to the reported baseline.", "arxiv_id": "2607.20019", "arxiv_url": "https://arxiv.org/abs/2607.20019", "authors": ["Bing-Yue Wu", "Chia-Tung Ho", "Haoyu Yang", "Brucek Khailany", "Vidya A. Chhabria"], "brief": "EvoDRC\u63d0\u51fa\u4e00\u4e2a\u9762\u5411\u5757\u7ea7\u7269\u7406\u8bbe\u8ba1\u7684\u667a\u80fd\u4f53\u5f0fDRC\u8fdd\u89c4\u81ea\u52a8\u4fee\u590d\u6846\u67b6\u3002\u5b83\u4ece\u53c2\u8003\u8bbe\u8ba1\u84b8\u998f\u521d\u59cb\u4fee\u590d\u6280\u80fd\uff0c\u5e76\u5728\u76ee\u6807\u8bbe\u8ba1\u4e2d\u901a\u8fc7\u53ef\u8ffd\u8e2a\u4fee\u590d\u7ecf\u9a8c\u6301\u7eed\u8fdb\u5316\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20019", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u7248\u56fe\u5206\u89e3\u4e3a\u6709\u8fb9\u754c\u7684\u5c40\u90e8\u4fee\u590d\u533a\u57df\uff0c\u5e76\u4e3a\u6bcf\u4e2a\u533a\u57df\u5206\u914dLLM\u4fee\u590d\u667a\u80fd\u4f53", "\u7ed3\u5408\u672c\u5730DRC\u5206\u6790\u3001\u8fde\u901a\u6027\u68c0\u67e5\u548c\u5f71\u54cd\u9884\u89c8\u5de5\u5177\uff0c\u5bf9\u4fee\u6539\u5efa\u8bae\u8fdb\u884c\u95ed\u73af\u53cd\u9988", "\u5728DAC26 DRC Benchmark\u76847\u4e2a\u5757\u7ea7\u8bbe\u8ba1\u4e0a\uff0c\u76f8\u6bd4\u62a5\u544a\u57fa\u7ebf\u603b\u4f53\u51cf\u5c1173.5%\u7684DRC\u8fdd\u89c4"], "keywords": ["\u667a\u80fd\u4f53", "\u82af\u7247\u8bbe\u8ba1", "\u7269\u7406\u8bbe\u8ba1", "\u81ea\u52a8\u5316\u4fee\u590d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20019v1", "published_at": "2026-07-22", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "EvoDRC: A Self-Evolving Agentic Framework for Automated DRC Violation Repair", "tldr": "\u81ea\u8fdb\u5316LLM\u667a\u80fd\u4f53\u81ea\u52a8\u4fee\u590d\u82af\u7247DRC\u8fdd\u89c4", "upvotes": 0, "what_it_is": "EvoDRC\u63d0\u51fa\u4e00\u4e2a\u9762\u5411\u5757\u7ea7\u7269\u7406\u8bbe\u8ba1\u7684\u667a\u80fd\u4f53\u5f0fDRC\u8fdd\u89c4\u81ea\u52a8\u4fee\u590d\u6846\u67b6\u3002\u5b83\u4ece\u53c2\u8003\u8bbe\u8ba1\u84b8\u998f\u521d\u59cb\u4fee\u590d\u6280\u80fd\uff0c\u5e76\u5728\u76ee\u6807\u8bbe\u8ba1\u4e2d\u901a\u8fc7\u53ef\u8ffd\u8e2a\u4fee\u590d\u7ecf\u9a8c\u6301\u7eed\u8fdb\u5316\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c06LLM\u667a\u80fd\u4f53\u3001\u5de5\u5177\u53cd\u9988\u548c\u7ecf\u9a8c\u8bb0\u5fc6\u5f15\u5165\u5148\u8fdb\u5de5\u827a\u7269\u7406\u8bbe\u8ba1\u6536\u655b\u4e2d\u7684\u9ad8\u6210\u672c\u4eba\u5de5ECO\u73af\u8282\uff0c\u5c55\u793a\u4e86\u5728\u590d\u6742\u51e0\u4f55\u7ea6\u675f\u4e0e\u8fde\u901a\u6027\u4fdd\u6301\u573a\u666f\u4e0b\u81ea\u52a8\u5316\u4fee\u590d\u7684\u5b9e\u7528\u6f5c\u529b\u3002"}, {"abstract": "Multimodal agentic search systems increasingly rely on external tools to answer knowledge-intensive visual questions. However, existing evaluations mainly focus on final-answer accuracy and may miss failures in the search trajectory. In this work, we study such hidden reliability issues as silent failures. We introduce a six-category taxonomy covering modality shortcuts, phantom grounding, wrong-evidence-right-answer cases, over-retrieval laundering, cross-modal contradiction, and provenance hallucination. Based on this taxonomy, we build a trajectory-level diagnostic pipeline that evaluates both answer correctness and evidence-grounding quality under a unified ReAct-style scaffold. Experiments on MMSearch-Plus trajectories across four frontier multimodal models show that surface accuracy consistently overestimates true trajectory-level correctness. We further use cross-judge validation, blank-image stress tests, and tool ablations to show that silent failures are capability-dependent and often shift rather than disappear. Home-page: https://github.com/DingWu1021/silent-failures-multimodal-agentic-search", "arxiv_id": "2607.19793", "arxiv_url": "https://arxiv.org/abs/2607.19793", "authors": ["Zhengxian Wu", "Junjie Gao", "Kai Yang"], "brief": "\u8bba\u6587\u63d0\u51fa\u201c\u9759\u9ed8\u5931\u8d25\u201d\u8bca\u65ad\u6846\u67b6\uff0c\u7528\u4e8e\u5206\u6790\u591a\u6a21\u6001\u667a\u80fd\u4f53\u641c\u7d22\u5728\u7b54\u6848\u770b\u4f3c\u6b63\u786e\u65f6\u4ecd\u53ef\u80fd\u5b58\u5728\u7684\u8f68\u8ff9\u7ea7\u8bc1\u636e\u9519\u8bef\u3002\u4f5c\u8005\u6784\u5efa\u516d\u7c7b\u5931\u8d25 taxonomy\uff0c\u5e76\u5728\u7edf\u4e00 ReAct \u5f0f\u6d41\u7a0b\u4e0b\u8bc4\u4f30\u7b54\u6848\u6b63\u786e\u6027\u4e0e\u8bc1\u636e grounding \u8d28\u91cf\u3002", "categories": ["cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19793", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u516d\u7c7b\u9759\u9ed8\u5931\u8d25\uff1a\u6a21\u6001\u6377\u5f84\u3001\u5e7b\u89c9 grounding\u3001\u9519\u8bc1\u636e\u5bf9\u7b54\u6848\u3001\u8fc7\u5ea6\u68c0\u7d22\u6d17\u767d\u3001\u8de8\u6a21\u6001\u77db\u76fe\u3001\u6765\u6e90\u5e7b\u89c9", "\u5728 MMSearch-Plus \u8f68\u8ff9\u4e0a\u8bc4\u6d4b\u56db\u4e2a\u524d\u6cbf\u591a\u6a21\u6001\u6a21\u578b\uff0c\u53d1\u73b0\u8868\u9762\u51c6\u786e\u7387\u6301\u7eed\u9ad8\u4f30\u771f\u5b9e\u8f68\u8ff9\u7ea7\u6b63\u786e\u6027", "\u901a\u8fc7\u8de8\u8bc4\u5ba1\u5668\u9a8c\u8bc1\u3001\u7a7a\u767d\u56fe\u50cf\u538b\u529b\u6d4b\u8bd5\u548c\u5de5\u5177\u6d88\u878d\uff0c\u8bc1\u660e\u9759\u9ed8\u5931\u8d25\u4f9d\u8d56\u6a21\u578b\u80fd\u529b\u4e14\u5e38\u4f1a\u8fc1\u79fb\u800c\u975e\u6d88\u5931"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u68c0\u7d22\u589e\u5f3a", "\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19793v1", "published_at": "2026-07-22", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Silent Failures in Multimodal Agentic Search:A Diagnostic Taxonomy and Cross-Judge Evaluation", "tldr": "\u63ed\u793a\u591a\u6a21\u6001\u667a\u80fd\u4f53\u641c\u7d22\u4e2d\u7684\u9690\u6027\u5931\u8d25", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u201c\u9759\u9ed8\u5931\u8d25\u201d\u8bca\u65ad\u6846\u67b6\uff0c\u7528\u4e8e\u5206\u6790\u591a\u6a21\u6001\u667a\u80fd\u4f53\u641c\u7d22\u5728\u7b54\u6848\u770b\u4f3c\u6b63\u786e\u65f6\u4ecd\u53ef\u80fd\u5b58\u5728\u7684\u8f68\u8ff9\u7ea7\u8bc1\u636e\u9519\u8bef\u3002\u4f5c\u8005\u6784\u5efa\u516d\u7c7b\u5931\u8d25 taxonomy\uff0c\u5e76\u5728\u7edf\u4e00 ReAct \u5f0f\u6d41\u7a0b\u4e0b\u8bc4\u4f30\u7b54\u6848\u6b63\u786e\u6027\u4e0e\u8bc1\u636e grounding \u8d28\u91cf\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c06\u591a\u6a21\u6001\u667a\u80fd\u4f53\u641c\u7d22\u8bc4\u4f30\u4ece\u6700\u7ec8\u7b54\u6848\u6269\u5c55\u5230\u63a8\u7406\u4e0e\u68c0\u7d22\u8f68\u8ff9\uff0c\u63ed\u793a\u73b0\u6709\u6307\u6807\u63a9\u76d6\u7684\u53ef\u9760\u6027\u98ce\u9669\uff0c\u5bf9\u6784\u5efa\u53ef\u4fe1\u5de5\u5177\u589e\u5f3a\u591a\u6a21\u6001\u667a\u80fd\u4f53\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Disagreement-triggered escalation can create a structural blind spot in multi-agent arbitration: as base learners improve, they tend to converge, weakening safety monitoring where correlated failures concentrate. We term this correlated agreement blindness and present ARAT (Arbitrated Reasoning Agents for Alarm Triage), a directed-star system combining an inductive Random Forest (RF) agent, an analogical case-based k-nearest neighbour (k-NN) agent, and a calibrated meta-model to mitigate this effect. On 82,332 holdout samples from the UNSW-NB15 network intrusion detection dataset, 57.2% of errors occur under agreement and 90.6% of dangerous under-predictions evade disagreement-based monitoring even after conservative override; ablation shows that strengthening base learners increases error correlation while reducing disagreement. ARAT reduces under-prediction relative to soft voting from 4.80% to 1.70% via conservative override (-2.6pp) and a safety-flag gate (-0.5pp), demonstrating architectural gains. Cross-dataset validation on clinical readmission supports these indicators, suggesting that diversification improves safety only when it generates productive disagreement rather than convergence. These results indicate that disagreement-triggered escalation can be blind to correlated failure, a risk that may intensify as agentic pipelines deploy increasingly capable, correlated models.", "arxiv_id": "2607.19899", "arxiv_url": "https://arxiv.org/abs/2607.19899", "authors": ["Shay Seiya McDonnell", "Avantika Singh", "Quoc-Viet Pham", "Vratislav Havlik", "Gregory M. P. O\u0027Hare"], "brief": "\u8bba\u6587\u63d0\u51fa\u201c\u76f8\u5173\u4e00\u81f4\u6027\u76f2\u533a\u201d\u6982\u5ff5\uff1a\u5f53\u591a\u4e2a\u57fa\u7840\u6a21\u578b\u80fd\u529b\u63d0\u5347\u5e76\u8d8b\u540c\u540e\uff0c\u57fa\u4e8e\u5206\u6b67\u89e6\u53d1\u5347\u7ea7\u7684\u5b89\u5168\u673a\u5236\u53cd\u800c\u4f1a\u6f0f\u6389\u96c6\u4e2d\u53d1\u751f\u7684\u5171\u540c\u9519\u8bef\u3002\u4f5c\u8005\u6784\u5efa ARAT \u7cfb\u7edf\uff0c\u7ed3\u5408 Random Forest\u3001k-NN \u4e0e\u6821\u51c6\u5143\u6a21\u578b\uff0c\u5728\u7f51\u7edc\u5165\u4fb5\u68c0\u6d4b\u4e0e\u4e34\u5e8a\u518d\u5165\u9662\u4efb\u52a1\u4e2d\u9a8c\u8bc1\u8be5\u98ce\u9669\u4e0e\u7f13\u89e3\u65b9\u6cd5\u3002", "categories": ["cs.MA", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19899", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5728 UNSW-NB15 \u7684 82,332 \u4e2a\u7559\u51fa\u6837\u672c\u4e0a\uff0c57.2% \u7684\u9519\u8bef\u53d1\u751f\u5728\u6a21\u578b\u4e00\u81f4\u65f6\uff0c90.6% \u7684\u5371\u9669\u4f4e\u4f30\u4f1a\u7ed5\u8fc7\u57fa\u4e8e\u5206\u6b67\u7684\u76d1\u63a7\u3002", "\u6d88\u878d\u5b9e\u9a8c\u663e\u793a\uff0c\u589e\u5f3a\u57fa\u7840\u5b66\u4e60\u5668\u4f1a\u964d\u4f4e\u5206\u6b67\u7387\u3001\u63d0\u9ad8\u9519\u8bef\u76f8\u5173\u6027\uff0c\u4ece\u800c\u524a\u5f31\u5206\u6b67\u89e6\u53d1\u5f0f\u5b89\u5168\u5347\u7ea7\u3002", "ARAT \u901a\u8fc7\u4fdd\u5b88\u8986\u76d6\u4e0e\u5b89\u5168\u6807\u5fd7\u95e8\u63a7\uff0c\u5c06\u76f8\u5bf9\u8f6f\u6295\u7968\u7684\u4f4e\u4f30\u7387\u4ece 4.80% \u964d\u81f3 1.70%\u3002"], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u5b89\u5168\u76d1\u63a7", "\u6a21\u578b\u96c6\u6210", "\u5f02\u5e38\u68c0\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19899v1", "published_at": "2026-07-22", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Harnessing Disagreement: Detecting Correlated Agreement Blindness in Multi-Agent Triage", "tldr": "\u63ed\u793a\u591a\u667a\u80fd\u4f53\u5206\u6b67\u76d1\u63a7\u7684\u76f8\u5173\u5931\u6548\u76f2\u533a", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u201c\u76f8\u5173\u4e00\u81f4\u6027\u76f2\u533a\u201d\u6982\u5ff5\uff1a\u5f53\u591a\u4e2a\u57fa\u7840\u6a21\u578b\u80fd\u529b\u63d0\u5347\u5e76\u8d8b\u540c\u540e\uff0c\u57fa\u4e8e\u5206\u6b67\u89e6\u53d1\u5347\u7ea7\u7684\u5b89\u5168\u673a\u5236\u53cd\u800c\u4f1a\u6f0f\u6389\u96c6\u4e2d\u53d1\u751f\u7684\u5171\u540c\u9519\u8bef\u3002\u4f5c\u8005\u6784\u5efa ARAT \u7cfb\u7edf\uff0c\u7ed3\u5408 Random Forest\u3001k-NN \u4e0e\u6821\u51c6\u5143\u6a21\u578b\uff0c\u5728\u7f51\u7edc\u5165\u4fb5\u68c0\u6d4b\u4e0e\u4e34\u5e8a\u518d\u5165\u9662\u4efb\u52a1\u4e2d\u9a8c\u8bc1\u8be5\u98ce\u9669\u4e0e\u7f13\u89e3\u65b9\u6cd5\u3002", "why_notable": "\u8be5\u7814\u7a76\u6307\u51fa\u591a\u6a21\u578b\u6216\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u4e00\u4e2a\u5bb9\u6613\u88ab\u5ffd\u89c6\u7684\u5b89\u5168\u98ce\u9669\uff1a\u6a21\u578b\u8d8a\u5f3a\u3001\u8d8a\u4e00\u81f4\uff0c\u5206\u6b67\u76d1\u63a7\u8d8a\u53ef\u80fd\u5931\u6548\u3002\u5b83\u5bf9\u5b89\u5168\u5173\u952e\u573a\u666f\u4e2d\u7684\u6a21\u578b\u4ef2\u88c1\u3001\u544a\u8b66\u5206\u6d41\u548c\u667a\u80fd\u4f53\u6d41\u6c34\u7ebf\u8bbe\u8ba1\u5177\u6709\u76f4\u63a5\u542f\u53d1\u4ef7\u503c\u3002"}, {"abstract": "As AI agents become integral to business workflows, establishing guiding user experience (UX) principles is crucial for ensuring user trust and successful adoption. To address this, our study uses a multi-method approach - combining participatory design workshop, paper-and-pencil, expert review, meta-analysis, and in-depth interviews - to identify and validate a design framework of eight core UX principles for human-AI agent interaction in the workplace. Together with their underlying criteria, these principles provide actionable guardrails for designers and software engineers, creating a foundation for developing effective and human-centered AI agent interactions. This study contributes to a structured foundation for future empirical studies on agentic AI in enterprise settings.", "arxiv_id": "2607.19941", "arxiv_url": "https://arxiv.org/abs/2607.19941", "authors": ["Kathrin Paimann", "Elizangela Valarini", "Sebastian Juhl"], "brief": "\u672c\u6587\u901a\u8fc7\u53c2\u4e0e\u5f0f\u8bbe\u8ba1\u5de5\u4f5c\u574a\u3001\u4e13\u5bb6\u8bc4\u5ba1\u3001\u5143\u5206\u6790\u4e0e\u6df1\u5ea6 3a\u666f\u4e0b\u4eba\u7c7b\u4e0e AI \u667a\u80fd\u4f53\u4ea4\u4e92\u7684\u516b\u9879\u6838\u5fc3\u7528\u6237\u4f53\u9a8c\u539f\u5219\u3002\u8be5\u6846\u67b6\u914d\u5957\u5177\u4f53\u5224\u65ad\u6807\u51c6\uff0c\u4e3a\u4f01\u4e1a\u667a\u80fd\u4f53\u4ea7\u54c1\u7684\u8bbe\u8ba1\u4e0e\u5de5\u7a0b\u5b9e\u73b0\u63d0\u4f9b\u53ef\u64cd\u4f5c\u6307\u5f15\u3002", "why_notable": "\u968f\u7740 AI \u667a\u80fd\u4f53\u8fdb\u5165\u4f01\u4e1a\u5de5\u4f5c\u6d41\uff0c\u7f3a\u4e4f\u7cfb\u7edf\u5316 UX \u539f\u5219\u4f1a\u5f71\u54cd\u4fe1\u4efb\u4e0e\u91c7\u7528\u7387\uff1b\u8be5\u7814\u7a76\u4e3a\u540e\u7eed\u4f01\u4e1a\u667a\u80fd\u4f53\u8bbe\u8ba1\u3001\u8bc4\u4f30\u548c\u5b9e\u8bc1\u7814\u7a76\u63d0\u4f9b\u4e86\u7ed3\u6784\u5316\u57fa\u7840\u3002"}, {"abstract": "A rich and recognizable component library is the cornerstone of printed circuit board (PCB) design and generation. Traditionally, engineers manually create symbols and footprints and design PCB schematics, which is time-consuming and error-prone. Leveraging multimodal large language models (MLLMs), we develop SFgen, an agentic recognition and generation flow of symbol and footprint for electronic components. SFgen achieves 86% accuracy for symbol generation and 80% accuracy for footprint generation. We use the SFgen method to create SFnet, a database of symbols and footprints. It now has 1000 components and is expanding constantly, which lays the foundation for automatic generation of PCB designs.", "arxiv_id": "2607.19767", "arxiv_url": "https://arxiv.org/abs/2607.19767", "authors": ["Yichen Shi", "Yuzhi Liu", "Zhuofu Tao", "Li Huang", "Yuhao Gao", "Ting-Jung Lin", "Lei Hel"], "brief": "\u8bba\u6587\u63d0\u51fa SFgen\uff0c\u4e00\u5957\u57fa\u4e8e\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u7535\u5b50\u5143\u4ef6\u7b26\u53f7\u4e0e\u5c01\u88c5\u8bc6\u522b\u3001\u751f\u6210\u6d41\u7a0b\u3002\u4f5c\u8005\u8fdb\u4e00\u6b65\u7528\u8be5\u65b9\u6cd5\u6784\u5efa\u4e86 SFnet \u6570\u636e\u5e93\uff0c\u5f53\u524d\u5305\u542b 1000 \u4e2a\u5143\u4ef6\u7684\u7b26\u53f7\u4e0e\u5c01\u88c5\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19767", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u9762\u5411 PCB \u8bbe\u8ba1\u4e2d\u8017\u65f6\u4e14\u6613\u9519\u7684\u5143\u4ef6\u7b26\u53f7\u548c\u5c01\u88c5\u624b\u5de5\u521b\u5efa\u95ee\u9898", "SFgen \u5728\u7b26\u53f7\u751f\u6210\u4e0a\u8fbe\u5230 86% \u51c6\u786e\u7387\uff0c\u5728\u5c01\u88c5\u751f\u6210\u4e0a\u8fbe\u5230 80% \u51c6\u786e\u7387", "SFnet \u4f5c\u4e3a\u53ef\u6269\u5c55\u5143\u4ef6\u5e93\uff0c\u4e3a\u540e\u7eed\u81ea\u52a8\u5316 PCB \u539f\u7406\u56fe\u4e0e\u7248\u56fe\u751f\u6210\u63d0\u4f9b\u57fa\u7840"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u7535\u5b50\u8bbe\u8ba1\u81ea\u52a8\u5316", "\u6570\u636e\u5e93"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19767v1", "published_at": "2026-07-22", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Symbol and Footprint Database for Electronic Components by Agentic Recognition and Generation", "tldr": "\u7528\u591a\u6a21\u6001\u667a\u80fd\u4f53\u81ea\u52a8\u751f\u6210PCB\u5143\u4ef6\u5e93", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa SFgen\uff0c\u4e00\u5957\u57fa\u4e8e\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u7684\u7535\u5b50\u5143\u4ef6\u7b26\u53f7\u4e0e\u5c01\u88c5\u8bc6\u522b\u3001\u751f\u6210\u6d41\u7a0b\u3002\u4f5c\u8005\u8fdb\u4e00\u6b65\u7528\u8be5\u65b9\u6cd5\u6784\u5efa\u4e86 SFnet \u6570\u636e\u5e93\uff0c\u5f53\u524d\u5305\u542b 1000 \u4e2a\u5143\u4ef6\u7684\u7b26\u53f7\u4e0e\u5c01\u88c5\u3002", "why_notable": "\u5c06\u591a\u6a21\u6001\u5927\u6a21\u578b\u4e0e\u667a\u80fd\u4f53\u5f0f\u6d41\u7a0b\u7528\u4e8e\u7535\u5b50\u8bbe\u8ba1\u81ea\u52a8\u5316\u4e2d\u7684\u5143\u4ef6\u5e93\u6784\u5efa\uff0c\u964d\u4f4e PCB \u8bbe\u8ba1\u95e8\u69db\uff0c\u5e76\u6709\u671b\u63a8\u52a8\u4ece\u5143\u4ef6\u8bc6\u522b\u5230\u6574\u677f\u81ea\u52a8\u751f\u6210\u7684\u5de5\u4f5c\u6d41\u81ea\u52a8\u5316\u3002"}, {"abstract": "Full-parameter post-training of trillion-parameter-scale MoE models introduces substantial system-level challenges for large-scale distributed training, including severe memory pressure, non-overlapped communication overhead, and inefficient kernel execution. While most large-scale LLM training systems are built around GPU-based clusters, this report presents an end-to-end optimization practice on the Ascend NPU SuperPOD. Using the DeepSeek-V4 model family as the target workload, we develop a hierarchical optimization framework spanning model-level parallelism, computation-communication orchestration, and low-level kernel execution. The resulting system achieves 34.22% Model FLOPs Utilization (MFU) with a 2.93x improvement over the open-source baseline recipe while maintaining training stability. Building on this optimized infrastructure, we further establish a CPT and SFT workflow for complex Operations Research (OR) tasks. We refer to the integrated framework as SLAI T-Rex. Using DeepSeek-V4-Flash, we develop OR-oriented CPT and SFT data pipelines that combine collected domain resources with solver-verified synthetic optimization documents. The resulting dataset contains 10K high-quality SFT samples spanning four task categories and three problem representations. The specialized model achieves the highest average zero-shot Pass@1 score among the evaluated models, reaching 71.81% and outperforming GPT-5.4-Mini and the base DeepSeek-V4-Flash model by 3.98 and 11.27 percentage points, respectively. Overall, this work demonstrates a full-stack pathway from efficient trillion-parameter model post-training on Ascend infra to domain-specialized Flash models for solver-grounded mathematical modeling, advancing frontier-model systems for complex reasoning.", "arxiv_id": "2607.20145", "arxiv_url": "https://arxiv.org/abs/2607.20145", "authors": ["Dongfang Li", "Xiaodong Luo", "Ruoyu Sun", "Xuhui Chen", "Linyuan Qiu", "Jian Meng", "Zhengxuan Lu", "Yiting Wang", "Yucheng Xie", "Tao Guo", "Tianxiang Fang", "Jing Li", "Sihang Chen", "Shihao Hong", "Chang Liu", "Weihua Dai", "Zirong Zeng", "Ziwei Zhu", "Zhuohan Wang", "Zhengjun Yue", "Igor Vasilyev", "Min Liu", "Weijian Sun", "Xin Chen", "Yingmeng Gao", "Jinhua Zhou", "Taolue Chen", "Chenwei Wu", "Dong Zhang", "Wenlong Jin", "Jinmin Xiang", "Barkova Maria", "Ushakov Anton", "Xianfei Jin", "Tian Ding", "Zhihang Lin", "Qian Chen", "Linxin Yang", "Mingzhe Yang", "Bingwei Zhang", "Hongzhang Yang", "Fangxue Zhang", "Shijun Qin", "Jie Yu", "Cuihua Hu", "Tolstykh Vasiliy", "Nosov Ivan", "Abdullin Amir", "Zhichen Zhou", "Xin Zhang", "Zhixiong Ning", "Xutong Zhao", "Junjie Huang", "Jiajun Liu", "Weiyan Kong", "Zheng Zhang", "Wenhan Luo", "Lin Hu", "Yangbo Guo", "Li Zeng", "Shihao Zeng", "Baotian Hu", "Min Zhang", "Haizhou Li", "Zhiquan Luo"], "brief": "\u672c\u6587\u63d0\u51faSLAI T-Rex\uff0c\u4e00\u4e2a\u9762\u5411\u6607\u817eAscend SuperPOD\u7684\u4e07\u4ebf\u53c2\u6570MoE\u5168\u53c2\u6570\u540e\u8bad\u7ec3\u5168\u6808\u4f18\u5316\u6846\u67b6\uff0c\u5e76\u5c06\u5176\u7528\u4e8eDeepSeek-V4\u5bb6\u65cf\u3002\u7cfb\u7edf\u8fdb\u4e00\u6b65\u6784\u5efa\u9762\u5411\u8fd0\u7b79\u4f18\u5316\u4efb\u52a1\u7684CPT/SFT\u6d41\u7a0b\uff0c\u8bad\u7ec3\u51fa\u5177\u5907\u66f4\u5f3a\u6570\u5b66\u5efa\u6a21\u80fd\u529b\u7684\u9886\u57df\u4e13\u7528Flash\u6a21\u578b\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": "https://github.com/SLAI-AITP/SLAI-T-Rex", "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20145", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4ece\u6a21\u578b\u5e76\u884c\u3001\u8ba1\u7b97\u901a\u4fe1\u7f16\u6392\u5230\u5e95\u5c42kernel\u6267\u884c\u8fdb\u884c\u5206\u5c42\u4f18\u5316\uff0c\u5728Ascend NPU\u96c6\u7fa4\u4e0a\u5b9e\u73b034.22% MFU\uff0c\u76f8\u6bd4\u5f00\u6e90\u57fa\u7ebf\u63d0\u53472.93\u500d", "\u9488\u5bf9\u590d\u6742\u8fd0\u7b79\u4f18\u5316\u4efb\u52a1\u6784\u5efaCPT\u4e0eSFT\u6570\u636e\u7ba1\u7ebf\uff0c\u7ed3\u5408\u9886\u57df\u8d44\u6e90\u548c\u6c42\u89e3\u5668\u9a8c\u8bc1\u7684\u5408\u6210\u4f18\u5316\u6587\u6863", "\u4ea7\u51fa1\u4e07\u6761\u9ad8\u8d28\u91cfSFT\u6837\u672c\uff0c\u8986\u76d6\u56db\u7c7b\u4efb\u52a1\u548c\u4e09\u79cd\u95ee\u9898\u8868\u793a\uff1b\u4e13\u7528\u6a21\u578b\u96f6\u6837\u672cPass@1\u8fbe\u523071.81%\uff0c\u4f18\u4e8eGPT-5.4-Mini\u548c\u57fa\u5ea7\u6a21\u578b"], "keywords": ["\u5927\u6a21\u578b\u8bad\u7ec3", "\u7cfb\u7edf\u4f18\u5316", "\u9886\u57df\u5fae\u8c03", "\u6570\u5b66\u63a8\u7406"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20145v1", "published_at": "2026-07-22", "score": 0.255, "selected_reasons": ["HF trending (6\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.20145.png", "title": "SLAI T-Rex: Full-Parameter Post-training of the DeepSeek-V4 Family on Ascend SuperPOD", "tldr": "\u5728\u6607\u817e\u4e0a\u9ad8\u6548\u540e\u8bad\u7ec3DeepSeek-V4", "upvotes": 6, "what_it_is": "\u672c\u6587\u63d0\u51faSLAI T-Rex\uff0c\u4e00\u4e2a\u9762\u5411\u6607\u817eAscend SuperPOD\u7684\u4e07\u4ebf\u53c2\u6570MoE\u5168\u53c2\u6570\u540e\u8bad\u7ec3\u5168\u6808\u4f18\u5316\u6846\u67b6\uff0c\u5e76\u5c06\u5176\u7528\u4e8eDeepSeek-V4\u5bb6\u65cf\u3002\u7cfb\u7edf\u8fdb\u4e00\u6b65\u6784\u5efa\u9762\u5411\u8fd0\u7b79\u4f18\u5316\u4efb\u52a1\u7684CPT/SFT\u6d41\u7a0b\uff0c\u8bad\u7ec3\u51fa\u5177\u5907\u66f4\u5f3a\u6570\u5b66\u5efa\u6a21\u80fd\u529b\u7684\u9886\u57df\u4e13\u7528Flash\u6a21\u578b\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u5c55\u793a\u4e86\u975eGPU\u57fa\u7840\u8bbe\u65bd\u4e0a\u4e07\u4ebf\u53c2\u6570MoE\u6a21\u578b\u5168\u53c2\u6570\u540e\u8bad\u7ec3\u7684\u53ef\u884c\u5de5\u7a0b\u8def\u5f84\uff0c\u5e76\u628a\u7cfb\u7edf\u4f18\u5316\u4e0e\u9886\u57df\u6570\u636e\u95ed\u73af\u7ed3\u5408\u8d77\u6765\uff0c\u5bf9\u56fd\u4ea7AI\u7b97\u529b\u3001\u5927\u6a21\u578b\u540e\u8bad\u7ec3\u548c\u8fd0\u7b79\u4f18\u5316\u63a8\u7406\u5e94\u7528\u90fd\u6709\u8f83\u9ad8\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Model-based reinforcement-learning agents of the DreamerV3 family forget catastrophically when trained on task sequences, even when an unbounded replay buffer preserves every earlier experience. We ask a question the continual-RL literature has assumed an answer to but never measured: which component forgets? Under never-clear replay, pre-registered component-level probes (n=3 seeds throughout) show that the world model retains essentially everything measurable about old tasks -- reward discrimination (retention ratio ~1.0), value estimates, and termination structure -- while the actor\u0027s behavior collapses. Forgetting in this regime is a channel problem, not a memory problem. We demonstrate this by intervention: with the world model frozen and identical imagined rollouts, reinforcement learning in imagination fails to recover a lost skill (0/3 seeds), while supervised self-imitation on the world model\u0027s own graded dreams recovers it on 3/3 seeds with zero environment interaction. Interleaved during training, this graded dream rehearsal yields a task-label-free, parameter-constant continual learner: 3/3 four-task chains retained where plain replay passes 0/3, 3/3 eight-task chains, and consistent gains over matched real-episode cloning (paired difference +0.13, bootstrap 95% CI [0.07, 0.24], complete seed separation). The dream-grading step is load-bearing: we characterize two scoring failure modes, provide an offline selection gauge that caught both before they contaminated results, and give a realized-first grading rule that closes them. All experiments were pre-registered with committed protocols; every refuted hypothesis is reported.", "arxiv_id": "2607.19749", "arxiv_url": "https://arxiv.org/abs/2607.19749", "authors": ["Gurp Nijjer"], "brief": "\u8bba\u6587\u7cfb\u7edf\u6d4b\u91cf DreamerV3 \u7c7b\u6a21\u578b\u5728\u8fde\u7eed\u4efb\u52a1\u4e2d\u7684\u9057\u5fd8\u6765\u6e90\uff0c\u53d1\u73b0\u5373\u4f7f\u7528\u65e0\u9650\u56de\u653e\uff0c\u4e16\u754c\u6a21\u578b\u4ecd\u4fdd\u7559\u65e7\u4efb\u52a1\u4fe1\u606f\uff0c\u800c actor \u884c\u4e3a\u5d29\u6e83\u3002\u4f5c\u8005\u63d0\u51fa\u57fa\u4e8e\u4e16\u754c\u6a21\u578b\u201c\u5206\u7ea7\u68a6\u5883\u201d\u7684\u76d1\u7763\u81ea\u6a21\u4eff\u6392\u7ec3\uff0c\u5728\u65e0\u9700\u4efb\u52a1\u6807\u7b7e\u548c\u989d\u5916\u53c2\u6570\u7684\u60c5\u51b5\u4e0b\u7f13\u89e3\u8fde\u7eed\u5f3a\u5316\u5b66\u4e60\u9057\u5fd8\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19749", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u7ec4\u4ef6\u7ea7\u63a2\u9488\u663e\u793a\u4e16\u754c\u6a21\u578b\u5bf9\u65e7\u4efb\u52a1\u7684\u5956\u52b1\u3001\u4ef7\u503c\u548c\u7ec8\u6b62\u7ed3\u6784\u51e0\u4e4e\u4e0d\u9057\u5fd8\uff0c\u9057\u5fd8\u4e3b\u8981\u53d1\u751f\u5728 actor \u7684\u7b56\u7565\u901a\u9053\u3002", "\u51bb\u7ed3\u4e16\u754c\u6a21\u578b\u540e\uff0c\u4ec5\u7528\u60f3\u8c61\u4e2d\u7684\u5f3a\u5316\u5b66\u4e60\u65e0\u6cd5\u6062\u590d\u65e7\u6280\u80fd\uff0c\u4f46\u5bf9\u4e16\u754c\u6a21\u578b\u751f\u6210\u7684\u5206\u7ea7\u68a6\u5883\u505a\u76d1\u7763\u81ea\u6a21\u4eff\u53ef\u5728 3/3 \u4e2a\u79cd\u5b50\u4e2d\u6062\u590d\u3002", "\u8bad\u7ec3\u4e2d\u4ea4\u9519\u4f7f\u7528 graded dream rehearsal\uff0c\u5728\u56db\u4efb\u52a1\u94fe\u548c\u516b\u4efb\u52a1\u94fe\u4e0a\u663e\u8457\u4f18\u4e8e\u666e\u901a\u56de\u653e\uff0c\u5e76\u4f18\u4e8e\u5339\u914d\u7684\u771f\u5b9e\u8f68\u8ff9\u514b\u9686\u3002"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u4e16\u754c\u6a21\u578b", "\u6301\u7eed\u5b66\u4e60", "\u81ea\u6a21\u4eff\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19749v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "The World Model Remembers, the Actor Forgets: Dream Rehearsal for Continual Model-Based RL", "tldr": "Dreamer\u9057\u5fd8\u6e90\u4e8e\u6f14\u5458\u800c\u975e\u4e16\u754c\u6a21\u578b", "upvotes": 0, "what_it_is": "\u8bba\u6587\u7cfb\u7edf\u6d4b\u91cf DreamerV3 \u7c7b\u6a21\u578b\u5728\u8fde\u7eed\u4efb\u52a1\u4e2d\u7684\u9057\u5fd8\u6765\u6e90\uff0c\u53d1\u73b0\u5373\u4f7f\u7528\u65e0\u9650\u56de\u653e\uff0c\u4e16\u754c\u6a21\u578b\u4ecd\u4fdd\u7559\u65e7\u4efb\u52a1\u4fe1\u606f\uff0c\u800c actor \u884c\u4e3a\u5d29\u6e83\u3002\u4f5c\u8005\u63d0\u51fa\u57fa\u4e8e\u4e16\u754c\u6a21\u578b\u201c\u5206\u7ea7\u68a6\u5883\u201d\u7684\u76d1\u7763\u81ea\u6a21\u4eff\u6392\u7ec3\uff0c\u5728\u65e0\u9700\u4efb\u52a1\u6807\u7b7e\u548c\u989d\u5916\u53c2\u6570\u7684\u60c5\u51b5\u4e0b\u7f13\u89e3\u8fde\u7eed\u5f3a\u5316\u5b66\u4e60\u9057\u5fd8\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u6311\u6218\u4e86\u8fde\u7eed\u6a21\u578b\u5f0f\u5f3a\u5316\u5b66\u4e60\u4e2d\u201c\u8bb0\u5fc6\u4e0d\u8db3\u5bfc\u81f4\u9057\u5fd8\u201d\u7684\u5e38\u89c1\u5047\u8bbe\uff0c\u6307\u51fa\u5173\u952e\u74f6\u9888\u662f\u4e16\u754c\u6a21\u578b\u77e5\u8bc6\u5230 actor \u884c\u4e3a\u7684\u4f20\u9012\uff0c\u5e76\u7ed9\u51fa\u65e0\u9700\u73af\u5883\u4ea4\u4e92\u5373\u53ef\u6062\u590d\u6280\u80fd\u7684\u5b9e\u7528\u65b9\u6cd5\u3002"}, {"abstract": "Antibodies are essential proteins that play a central role in immune recognition by binding specific antigen molecules. Although recent protein language models have enabled progress in single-chain protein modeling and generation, they often fall short in antigen-specific antibody design, where effective modeling requires explicit pairing between antibody and antigen, particularly at the epitope level. To address these limitations, we introduce AAMFM, an Antigen-specific Antibody Multimodal Foundation Model that learns unified representations of antibody sequences and structures conditioned on antigen context. AAMFM incorporates rich antigen information including geometric interfaces and epitope annotations via a cross-modal adapter, enabling joint modeling of antibody-antigen interactions in a shared latent space. To further guide the model toward functional relevance, we fine-tune AAMFM using Calibrated Direct Preference Optimization (Cal-DPO), leveraging preference signals extracted from a strong structural prior to align learning with binding-specific objectives. Extensive experiments demonstrate that AAMFM achieves state-of-the-art performance in functional antibody design, revealing its potential for antigen-specific antibody engineering. Our code is available at https://github.com/XL-S224/AAMFM.", "arxiv_id": "2607.20057", "arxiv_url": "https://arxiv.org/abs/2607.20057", "authors": ["Xiaoliang Shi", "Zichen Wang", "Runze Ma", "Zhongyue Zhang", "Shuangjia Zheng"], "brief": "\u8bba\u6587\u63d0\u51fa AAMFM\uff0c\u5c06\u6297\u4f53\u5e8f\u5217\u3001\u7ed3\u6784\u4e0e\u6297\u539f\u4e0a\u4e0b\u6587\u7edf\u4e00\u5efa\u6a21\uff0c\u663e\u5f0f\u5229\u7528\u6297\u539f\u8868\u4f4d\u548c\u51e0\u4f55\u754c\u9762\u4fe1\u606f\u751f\u6210/\u4f18\u5316\u529f\u80fd\u6297\u4f53\u3002\u6a21\u578b\u8fd8\u901a\u8fc7 Cal-DPO \u5f15\u5165\u7ed3\u6784\u5148\u9a8c\u504f\u597d\u4fe1\u53f7\uff0c\u4f7f\u5b66\u4e60\u76ee\u6807\u66f4\u8d34\u8fd1\u6297\u539f\u7ed3\u5408\u529f\u80fd\u3002", "categories": ["q-bio.BM", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20057", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u901a\u8fc7\u8de8\u6a21\u6001\u9002\u914d\u5668\u878d\u5408\u6297\u4f53\u5e8f\u5217/\u7ed3\u6784\u4e0e\u6297\u539f\u51e0\u4f55\u754c\u9762\u3001\u8868\u4f4d\u6ce8\u91ca\u7b49\u4fe1\u606f", "\u5728\u5171\u4eab\u6f5c\u5728\u7a7a\u95f4\u4e2d\u8054\u5408\u5efa\u6a21\u6297\u4f53-\u6297\u539f\u76f8\u4e92\u4f5c\u7528\uff0c\u5f25\u8865\u4f20\u7edf\u86cb\u767d\u8bed\u8a00\u6a21\u578b\u7f3a\u4e4f\u6297\u539f\u6761\u4ef6\u7ea6\u675f\u7684\u95ee\u9898", "\u4f7f\u7528 Calibrated Direct Preference Optimization \u7ed3\u5408\u7ed3\u6784\u5148\u9a8c\u504f\u597d\u8fdb\u884c\u529f\u80fd\u5bf9\u9f50\uff0c\u5e76\u5728\u529f\u80fd\u6297\u4f53\u8bbe\u8ba1\u4efb\u52a1\u4e0a\u8fbe\u5230 SOTA"], "keywords": ["\u86cb\u767d\u8d28\u8bbe\u8ba1", "\u591a\u6a21\u6001", "\u6297\u4f53\u5de5\u7a0b", "\u504f\u597d\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20057v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Antigen-specific Antibody Multi-modal Foundation Model for Functional Antibody Design", "tldr": "\u9762\u5411\u6297\u539f\u7279\u5f02\u6027\u6297\u4f53\u8bbe\u8ba1\u7684\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa AAMFM\uff0c\u5c06\u6297\u4f53\u5e8f\u5217\u3001\u7ed3\u6784\u4e0e\u6297\u539f\u4e0a\u4e0b\u6587\u7edf\u4e00\u5efa\u6a21\uff0c\u663e\u5f0f\u5229\u7528\u6297\u539f\u8868\u4f4d\u548c\u51e0\u4f55\u754c\u9762\u4fe1\u606f\u751f\u6210/\u4f18\u5316\u529f\u80fd\u6297\u4f53\u3002\u6a21\u578b\u8fd8\u901a\u8fc7 Cal-DPO \u5f15\u5165\u7ed3\u6784\u5148\u9a8c\u504f\u597d\u4fe1\u53f7\uff0c\u4f7f\u5b66\u4e60\u76ee\u6807\u66f4\u8d34\u8fd1\u6297\u539f\u7ed3\u5408\u529f\u80fd\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u628a\u6297\u4f53\u8bbe\u8ba1\u4ece\u5355\u94fe\u86cb\u767d\u751f\u6210\u63a8\u8fdb\u5230\u6297\u539f\u7279\u5f02\u3001\u8868\u4f4d\u611f\u77e5\u7684\u591a\u6a21\u6001\u5efa\u6a21\uff0c\u5bf9\u6cbb\u7597\u6027\u6297\u4f53\u5de5\u7a0b\u548c\u5b9a\u5411\u4eb2\u548c\u529b\u4f18\u5316\u5177\u6709\u8f83\u9ad8\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We propose Diffusion ReRoll, a diffusion-based framework for robotic sequential prediction that enables revisable denoising over horizons. Existing diffusion-based sequence predictors typically perform a single monotonic denoising process. In contrast, Diffusion ReRoll selectively re-noises regions that have become locally stable while the remaining regions continue denoising, so the re-noised regions can be refined again using context from the rest of the horizon. This structured re-noising enables iterative cross-horizon revision, allowing earlier and later segments to revise one another, while maintaining local consistency. We evaluate Diffusion ReRoll against full-sequence diffusion and causal denoising based on Diffusion Forcing across long-horizon planning, policy learning, and unified video-action modeling. On OGBench PointMaze and AntMaze, Diffusion ReRoll achieves relative gains in average success rate of 21% over Diffusion Forcing in matched guidance-based planning and 23% over Diffuser in matched goal-inpainting. In diffusion-policy-style action prediction, Diffusion ReRoll improves average success by 56.5% relative to Diffusion Policy across different prediction horizons and history lengths on the LIBERO-10 multi-task benchmark. In unified video-action prediction, Diffusion ReRoll improves policy and inverse dynamics performance, especially under out-of-distribution evaluation, and achieves the best action-video consistency. These results support structured re-noising as an effective mechanism for revisable robotic sequence generation.", "arxiv_id": "2607.19919", "arxiv_url": "https://arxiv.org/abs/2607.19919", "authors": ["Seonsoo Kim", "Seongil Hong", "Jun-Gill Kang"], "brief": "\u8bba\u6587\u63d0\u51fa Diffusion ReRoll\uff0c\u4e00\u79cd\u7528\u4e8e\u673a\u5668\u4eba\u957f\u65f6\u5e8f\u9884\u6d4b\u7684\u6269\u6563\u6846\u67b6\u3002\u5b83\u5728\u53bb\u566a\u8fc7\u7a0b\u4e2d\u9009\u62e9\u6027\u5730\u91cd\u65b0\u52a0\u566a\u5df2\u5c40\u90e8\u7a33\u5b9a\u7684\u7247\u6bb5\uff0c\u4f7f\u5e8f\u5217\u524d\u540e\u6bb5\u80fd\u76f8\u4e92\u4fee\u8ba2\u5e76\u63d0\u5347\u6574\u4f53\u4e00\u81f4\u6027\u3002", "categories": ["cs.RO", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19919", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u533a\u522b\u4e8e\u5355\u6b21\u5355\u8c03\u53bb\u566a\uff0cDiffusion ReRoll \u901a\u8fc7\u7ed3\u6784\u5316 re-noising \u5b9e\u73b0\u8de8\u65f6\u95f4\u8de8\u5ea6\u7684\u8fed\u4ee3\u4fee\u8ba2", "\u5728 OGBench PointMaze \u548c AntMaze \u4e0a\uff0c\u76f8\u6bd4 Diffusion Forcing \u89c4\u5212\u6210\u529f\u7387\u5e73\u5747\u63d0\u5347 21%\uff0c\u76f8\u6bd4 Diffuser \u76ee\u6807\u8865\u5168\u63d0\u5347 23%", "\u5728 LIBERO-10 \u591a\u4efb\u52a1\u6269\u6563\u7b56\u7565\u52a8\u4f5c\u9884\u6d4b\u4e2d\uff0c\u76f8\u6bd4 Diffusion Policy \u5e73\u5747\u6210\u529f\u7387\u63d0\u5347 56.5%\uff0c\u5e76\u6539\u5584\u89c6\u9891-\u52a8\u4f5c\u4e00\u81f4\u6027"], "keywords": ["\u673a\u5668\u4eba\u5b66\u4e60", "\u6269\u6563\u6a21\u578b", "\u5e8f\u5217\u9884\u6d4b", "\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19919v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Diffusion ReRoll: Revisable Denoising for Robotic Sequential Prediction", "tldr": "\u53ef\u53cd\u590d\u4fee\u8ba2\u7684\u673a\u5668\u4eba\u5e8f\u5217\u6269\u6563\u9884\u6d4b\u6846\u67b6", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa Diffusion ReRoll\uff0c\u4e00\u79cd\u7528\u4e8e\u673a\u5668\u4eba\u957f\u65f6\u5e8f\u9884\u6d4b\u7684\u6269\u6563\u6846\u67b6\u3002\u5b83\u5728\u53bb\u566a\u8fc7\u7a0b\u4e2d\u9009\u62e9\u6027\u5730\u91cd\u65b0\u52a0\u566a\u5df2\u5c40\u90e8\u7a33\u5b9a\u7684\u7247\u6bb5\uff0c\u4f7f\u5e8f\u5217\u524d\u540e\u6bb5\u80fd\u76f8\u4e92\u4fee\u8ba2\u5e76\u63d0\u5347\u6574\u4f53\u4e00\u81f4\u6027\u3002", "why_notable": "\u8be5\u65b9\u6cd5\u4e3a\u673a\u5668\u4eba\u957f\u65f6\u5e8f\u751f\u6210\u63d0\u4f9b\u4e86\u65b0\u7684\u53ef\u4fee\u8ba2\u53bb\u566a\u673a\u5236\uff0c\u7f13\u89e3\u4e86\u65e9\u671f\u51b3\u7b56\u4e0e\u540e\u7eed\u4e0a\u4e0b\u6587\u5272\u88c2\u7684\u95ee\u9898\uff0c\u5728\u89c4\u5212\u3001\u7b56\u7565\u5b66\u4e60\u548c\u89c6\u9891-\u52a8\u4f5c\u5efa\u6a21\u4e2d\u5747\u8868\u73b0\u51fa\u663e\u8457\u6536\u76ca\u3002"}, {"abstract": "We study horizon-free regret minimization for finite-horizon time-homogeneous tabular Markov decision processes with $S$ states, $A$ actions, horizon $H$, and per-trajectory total reward bounded by $1$. We propose a new algorithm and prove a regret upper bound \\[\\tilde O(\\sqrt{SAK}+S^8A^3)\\] with failure probability $\u03b4$, where $K$ is the number of episodes and $\\tilde O(\\cdot)$ hides $\\mathsf{poly}\\log(S,A,K,1/\u03b4)$. Thus, the regret is $H$-free and asymptotically optimal, matching the contextual-bandit lower bound $\u03a9(\\sqrt{SAK})$ up to logarithmic factors. This completely removes the $\\log H$ dependence from the previous $\\tilde O(\\sqrt{SAK\\log H}+S^2A\\log H)$ guarantee of Zhang et al. (2021), and drastically improves the prior best horizon-free regret $\\tilde O(\\sqrt{S^9A^3K})$ of Zhang et al. (2022) asymptotically. The main technical difficulty is that the optimal value functions $\\{V_h^*\\}_{h=1}^H$ are time-inhomogeneous even though the transition kernel is time-homogeneous. A direct union bound over all value functions typically incurs an additional $\\min\\{\\log H,S\\}$ factor. We avoid this factor by (i) exploiting the monotonicity of $V_h^*$ in $h$ and (ii) non-trivially projecting the value functions onto an $S$-dimensional grid. Our analysis relies on three additional ingredients. First, we introduce a horizon-truncation argument that enables reward-based exploration and removes the cost of a separate reward-free exploration phase. Second, we design a cutting bonus that preserves both optimism and the monotonicity needed for planning. Third, we prove a new bound on total deviation for time-homogeneous MDPs, which controls the clipped variance terms in the cutting bonus with adjustable polynomial dependence on $S$ and without any dependence on $H$. Together, these tools yield an asymptotically optimal horizon-free regret guarantee.", "arxiv_id": "2607.19854", "arxiv_url": "https://arxiv.org/abs/2607.19854", "authors": ["Runlong Zhou", "Zihan Zhang", "Maryam Fazel", "Simon S. Du"], "brief": "\u672c\u6587\u7814\u7a76\u6709\u9650\u65f6\u57df\u3001\u65f6\u95f4\u9f50\u6b21\u8868\u683cMDP\u4e2d\u7684\u65e0\u65f6\u57df\u957f\u5ea6\u4f9d\u8d56\u9057\u61be\u6700\u5c0f\u5316\uff0c\u63d0\u51fa\u65b0\u7b97\u6cd5\u5e76\u8bc1\u660e\u9057\u61be\u4e0a\u754c\u4e3a \u00d5(\u221aSAK + S^8A^3)\u3002\u8be5\u7ed3\u679c\u5728\u5bf9\u6570\u56e0\u5b50\u5185\u5339\u914d\u4e0a\u4e0b\u6587\u8d4c\u535a\u673a\u4e0b\u754c\uff0c\u9996\u6b21\u5b8c\u5168\u53bb\u9664\u5bf9H\u7684\u4f9d\u8d56\u3002", "categories": ["cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19854", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u9057\u61be\u754c\u4e0d\u542bH\uff0c\u4e14\u6e10\u8fd1\u8fbe\u5230 \u03a9(\u221aSAK) \u4e0b\u754c\uff0c\u6539\u8fdb\u6b64\u524d\u542b log H \u6216\u66f4\u5dee\u591a\u9879\u5f0f\u56e0\u5b50\u7684\u7ed3\u679c", "\u5229\u7528\u6700\u4f18\u4ef7\u503c\u51fd\u6570\u968f\u65f6\u95f4\u7684\u5355\u8c03\u6027\uff0c\u5e76\u5c06\u4ef7\u503c\u51fd\u6570\u6295\u5f71\u5230S\u7ef4\u7f51\u683c\uff0c\u907f\u514d\u5bf9\u6240\u6709\u65f6\u95f4\u6b65\u505a\u5e76\u96c6\u754c\u5e26\u6765\u7684\u989d\u5916\u56e0\u5b50", "\u5f15\u5165\u65f6\u57df\u622a\u65ad\u3001\u4fdd\u6301\u4e50\u89c2\u6027\u4e0e\u5355\u8c03\u6027\u7684 cutting bonus\uff0c\u4ee5\u53ca\u65b0\u7684\u65f6\u95f4\u9f50\u6b21MDP\u603b\u504f\u5dee\u754c\u6765\u63a7\u5236\u65b9\u5dee\u9879"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u9057\u61be\u5206\u6790", "\u8868\u683cMDP", "\u7406\u8bba\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19854v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Asymptotically Optimal Regret for Reinforcement Learning without Horizon Dependence", "tldr": "\u8868\u683cMDP\u5b9e\u73b0\u65e0H\u6e10\u8fd1\u6700\u4f18\u9057\u61be", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u6709\u9650\u65f6\u57df\u3001\u65f6\u95f4\u9f50\u6b21\u8868\u683cMDP\u4e2d\u7684\u65e0\u65f6\u57df\u957f\u5ea6\u4f9d\u8d56\u9057\u61be\u6700\u5c0f\u5316\uff0c\u63d0\u51fa\u65b0\u7b97\u6cd5\u5e76\u8bc1\u660e\u9057\u61be\u4e0a\u754c\u4e3a \u00d5(\u221aSAK + S^8A^3)\u3002\u8be5\u7ed3\u679c\u5728\u5bf9\u6570\u56e0\u5b50\u5185\u5339\u914d\u4e0a\u4e0b\u6587\u8d4c\u535a\u673a\u4e0b\u754c\uff0c\u9996\u6b21\u5b8c\u5168\u53bb\u9664\u5bf9H\u7684\u4f9d\u8d56\u3002", "why_notable": "\u8be5\u5de5\u4f5c\u89e3\u51b3\u4e86\u8868\u683c\u5f3a\u5316\u5b66\u4e60\u7406\u8bba\u4e2d\u957f\u671f\u5b58\u5728\u7684\u65f6\u57df\u4f9d\u8d56\u95ee\u9898\uff0c\u5728\u65e0H\u9057\u61be\u4fdd\u8bc1\u4e0a\u8fbe\u5230\u6e10\u8fd1\u6700\u4f18\uff0c\u663e\u8457\u63a8\u8fdb\u4e86\u6709\u9650\u65f6\u57dfMDP\u7684\u6837\u672c\u6548\u7387\u7406\u8bba\u3002"}, {"abstract": "Scaling LLM-based applications to millions of users is bottlenecked by the inference cost and latency of modern foundation models. A natural fix is to cluster the inputs and call the LLM only on cluster representatives, letting other members inherit the output -- but this is only safe if each member is measurably close to its representative. Existing clustering methods do not offer such per-sample quality control at scale: none jointly guarantee a minimal within-cluster similarity, exact matching of categorical attributes, and scalability to tens of millions of samples. We propose a two-stage algorithm that generates initial clusters with Mini-batch K-Means, then greedily selects representatives within each initial cluster -- a step equivalent to the Johnson-Chvatal heuristic for Set Cover over alpha-balls in embedding space. The algorithm enforces the similarity and attribute guardrails exactly by construction, and runs in $O(nd + n^2 d/K)$ time and $O(nd + n^2/K^2)$ memory for $n$ samples, feature dimension $d$, and $K$ initial clusters -- linear in $n$ when $K$ grows proportionally with $n$. We provide benchmarks against common clustering methods on internal and public datasets: our method not only delivers per-sample guardrails but also runs 10-1000x faster and scales to data sizes where most standard methods become intractable. Deployed on 38 million customers for a persona-based recommender, the clustering method cut downstream cost and latency by 50-fold while preserving personalization and unblocked the production launch.", "arxiv_id": "2607.19704", "arxiv_url": "https://arxiv.org/abs/2607.19704", "authors": ["Longshaokan Wang", "Wai Tsang Keung", "Punit Ghodasara", "Roman Wang", "Ali Dashti", "Francesc Moreno-Noguer"], "brief": "\u8bba\u6587\u63d0\u51fa\u4e00\u79cd\u4e24\u9636\u6bb5\u805a\u7c7b\u7b97\u6cd5\uff0c\u7528\u4e8e\u5728\u5927\u89c4\u6a21LLM\u5e94\u7528\u4e2d\u53ea\u5bf9\u4ee3\u8868\u6837\u672c\u8c03\u7528\u6a21\u578b\u3001\u5176\u4ed6\u76f8\u4f3c\u6837\u672c\u590d\u7528\u8f93\u51fa\u3002\u65b9\u6cd5\u901a\u8fc7\u6784\u9020\u4fdd\u8bc1\u6bcf\u4e2a\u6837\u672c\u4e0e\u4ee3\u8868\u7684\u6700\u4f4e\u76f8\u4f3c\u5ea6\uff0c\u5e76\u7cbe\u786e\u5339\u914d\u7c7b\u522b\u5c5e\u6027\u3002", "categories": ["cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.19704", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5148\u7528 Mini-batch K-Means \u751f\u6210\u521d\u59cb\u7c07\uff0c\u518d\u5728\u7c07\u5185\u8d2a\u5fc3\u9009\u62e9\u4ee3\u8868\u70b9\uff0c\u7b49\u4ef7\u4e8e\u5728\u5d4c\u5165\u7a7a\u95f4 alpha-ball \u4e0a\u4f7f\u7528 Johnson-Chvatal Set Cover \u542f\u53d1\u5f0f", "\u540c\u65f6\u63d0\u4f9b\u9010\u6837\u672c\u76f8\u4f3c\u5ea6\u4e0b\u754c\u3001\u7c7b\u522b\u5c5e\u6027\u7cbe\u786e\u5339\u914d\u548c\u5343\u4e07\u7ea7\u6837\u672c\u53ef\u6269\u5c55\u6027", "\u57283800\u4e07\u5ba2\u6237\u7684\u4e2a\u6027\u5316\u63a8\u8350\u751f\u4ea7\u573a\u666f\u4e2d\uff0c\u5c06\u4e0b\u6e38LLM\u6210\u672c\u548c\u5ef6\u8fdf\u964d\u4f4e\u7ea650\u500d"], "keywords": ["\u5927\u6a21\u578b\u63a8\u7406", "\u805a\u7c7b", "\u6210\u672c\u4f18\u5316", "\u63a8\u8350\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.19704v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Efficient Clustering with Provable Guardrails for LLM Inference at Scale", "tldr": "\u5e26\u8d28\u91cf\u62a4\u680f\u7684\u8d85\u5927\u89c4\u6a21LLM\u63a8\u7406\u805a\u7c7b", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u4e00\u79cd\u4e24\u9636\u6bb5\u805a\u7c7b\u7b97\u6cd5\uff0c\u7528\u4e8e\u5728\u5927\u89c4\u6a21LLM\u5e94\u7528\u4e2d\u53ea\u5bf9\u4ee3\u8868\u6837\u672c\u8c03\u7528\u6a21\u578b\u3001\u5176\u4ed6\u76f8\u4f3c\u6837\u672c\u590d\u7528\u8f93\u51fa\u3002\u65b9\u6cd5\u901a\u8fc7\u6784\u9020\u4fdd\u8bc1\u6bcf\u4e2a\u6837\u672c\u4e0e\u4ee3\u8868\u7684\u6700\u4f4e\u76f8\u4f3c\u5ea6\uff0c\u5e76\u7cbe\u786e\u5339\u914d\u7c7b\u522b\u5c5e\u6027\u3002", "why_notable": "\u5b83\u628a\u201c\u805a\u7c7b\u590d\u7528LLM\u8f93\u51fa\u201d\u4ece\u7ecf\u9a8c\u6027\u964d\u672c\u624b\u6bb5\u53d8\u6210\u5e26\u53ef\u9a8c\u8bc1\u62a4\u680f\u7684\u5de5\u7a0b\u65b9\u6848\uff0c\u5e76\u5728\u771f\u5b9e\u5343\u4e07\u7ea7\u90e8\u7f72\u4e2d\u5c55\u793a\u4e86\u663e\u8457\u6210\u672c\u3001\u5ef6\u8fdf\u6536\u76ca\u3002"}, {"abstract": "Large language models (LLMs) provide strong reasoning capabilities but are expensive to serve at scale, whereas small language models (SLMs) are cheaper but less reliable on difficult problems. We introduce PyroDash, a cost-aware framework for token-level SLM-LLM collaborative inference. During generation, the SLM decides whether to request assistance by emitting a control token. A Collaborate Engine then sends the query and partial reasoning trace to a frozen LLM for completion through a single handoff. The policy is internalized in the SLM, requiring neither a separate router, LLM retraining, nor access to LLM logits. PyroDash trains the SLM in three stages: control-token embedding learning, offloading-oriented supervised fine-tuning, and cost-aware alignment with Group Relative Policy Optimization. Its reward balances answer accuracy against inference cost normalized by LLM-only inference. Across five mathematical reasoning benchmarks, PyroDash supports different accuracy-cost operating points. With $\u03bb=0.05$, it achieves 64.04 percent average accuracy, 6.36 percentage points above the LLM-only baseline, while reducing cost by 20.4 percent. With $\u03bb=0.6$, it achieves 54.55 percent accuracy with a 1.90 percent LLM token ratio and 0.012 LLM calls per example, reducing total cost from USD 49.36 to USD 1.78. These results show that learned token-level handoffs can reduce LLM use while preserving strong reasoning performance.", "arxiv_id": "2607.20327", "arxiv_url": "https://arxiv.org/abs/2607.20327", "authors": ["Niqi Lyu", "Pengtao Shi", "Wei Qiu", "Jianlin Zhong", "Sicong Xia", "Jianyao Ma", "Yicheng Ding"], "brief": "PyroDash \u662f\u4e00\u79cd\u9762\u5411 token \u7ea7\u522b\u7684\u5c0f-\u5927\u8bed\u8a00\u6a21\u578b\u534f\u540c\u63a8\u7406\u6846\u67b6\uff1a\u5c0f\u6a21\u578b\u5728\u751f\u6210\u8fc7\u7a0b\u4e2d\u901a\u8fc7\u63a7\u5236 token \u5224\u65ad\u662f\u5426\u5c06\u5f53\u524d\u95ee\u9898\u4e0e\u90e8\u5206\u63a8\u7406\u8f68\u8ff9\u4e00\u6b21\u6027\u4ea4\u7ed9\u51bb\u7ed3\u7684\u5927\u6a21\u578b\u5b8c\u6210\u3002\u5b83\u65e0\u9700\u989d\u5916\u8def\u7531\u5668\u3001\u65e0\u9700\u91cd\u8bad\u5927\u6a21\u578b\uff0c\u4e5f\u4e0d\u9700\u8981\u8bbf\u95ee\u5927\u6a21\u578b logits\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20327", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u8bad\u7ec3\u5206\u4e09\u9636\u6bb5\uff1a\u63a7\u5236 token \u5d4c\u5165\u5b66\u4e60\u3001\u9762\u5411\u5378\u8f7d\u7684\u76d1\u7763\u5fae\u8c03\u3001\u57fa\u4e8e Group Relative Policy Optimization \u7684\u6210\u672c\u611f\u77e5\u5bf9\u9f50\u3002", "\u5956\u52b1\u51fd\u6570\u540c\u65f6\u6743\u8861\u7b54\u6848\u51c6\u786e\u7387\u4e0e\u76f8\u5bf9 LLM-only \u63a8\u7406\u7684\u5f52\u4e00\u5316\u6210\u672c\uff0c\u53ef\u8c03\u8282\u4e0d\u540c\u51c6\u786e\u7387-\u6210\u672c\u6298\u4e2d\u70b9\u3002", "\u5728\u4e94\u4e2a\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\uff0c\u03bb=0.05 \u65f6\u5e73\u5747\u51c6\u786e\u7387 64.04%\uff0c\u6bd4 LLM-only \u9ad8 6.36 \u4e2a\u767e\u5206\u70b9\u4e14\u6210\u672c\u964d\u4f4e 20.4%\uff1b\u03bb=0.6 \u65f6\u4ec5\u7528 1.90% LLM token\u3001\u6bcf\u9898 0.012 \u6b21 LLM \u8c03\u7528\uff0c\u6210\u672c\u4ece 49.36 \u7f8e\u5143\u964d\u81f3 1.78 \u7f8e\u5143\u3002"], "keywords": ["\u6a21\u578b\u534f\u540c", "\u63a8\u7406\u52a0\u901f", "\u6210\u672c\u4f18\u5316", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20327v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "PyroDash: Cost-Efficient Token-Level Small-Large Language Model Collaborative Inference", "tldr": "\u5c0f\u6a21\u578b\u6309\u9700\u4ea4\u68d2\u5927\u6a21\u578b\uff0c\u663e\u8457\u964d\u63a8\u7406\u6210\u672c", "upvotes": 0, "what_it_is": "PyroDash \u662f\u4e00\u79cd\u9762\u5411 token \u7ea7\u522b\u7684\u5c0f-\u5927\u8bed\u8a00\u6a21\u578b\u534f\u540c\u63a8\u7406\u6846\u67b6\uff1a\u5c0f\u6a21\u578b\u5728\u751f\u6210\u8fc7\u7a0b\u4e2d\u901a\u8fc7\u63a7\u5236 token \u5224\u65ad\u662f\u5426\u5c06\u5f53\u524d\u95ee\u9898\u4e0e\u90e8\u5206\u63a8\u7406\u8f68\u8ff9\u4e00\u6b21\u6027\u4ea4\u7ed9\u51bb\u7ed3\u7684\u5927\u6a21\u578b\u5b8c\u6210\u3002\u5b83\u65e0\u9700\u989d\u5916\u8def\u7531\u5668\u3001\u65e0\u9700\u91cd\u8bad\u5927\u6a21\u578b\uff0c\u4e5f\u4e0d\u9700\u8981\u8bbf\u95ee\u5927\u6a21\u578b logits\u3002", "why_notable": "\u8bba\u6587\u5c55\u793a\u4e86\u5c06\u201c\u4f55\u65f6\u6c42\u52a9\u5927\u6a21\u578b\u201d\u7684\u7b56\u7565\u5185\u5316\u5230\u5c0f\u6a21\u578b\u4e2d\u7684\u53ef\u884c\u6027\uff0c\u5728\u4e0d\u6539\u52a8\u5927\u6a21\u578b\u7684\u524d\u63d0\u4e0b\u5b9e\u73b0\u7ec6\u7c92\u5ea6\u3001\u4f4e\u6210\u672c\u534f\u540c\u63a8\u7406\uff0c\u5bf9\u5927\u89c4\u6a21\u90e8\u7f72\u9ad8\u6027\u4ef7\u6bd4 LLM \u670d\u52a1\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "LLM-based agents leverage third-party skills to extend their capabilities in open-world scenarios. However, third-party skills can introduce extra security vulnerabilities, as seemingly harmless skills can contain latent safety risks that only emerge during actual execution. In this work, we conduct a systematic investigation into how well current agent systems recognize and avoid such risks. To support quantitative and qualitative evaluation, we construct OpenSkillRisk, a dedicated safety benchmark containing 263 risky skills collected from public skill marketplaces. We classify these skills into seven categories based on their threat types and pair each skill with a standardized user task and a corresponding sandbox for controlled evaluation. Distinct from prior benchmarks, OpenSkillRisk not only covers more realistic and diverse unsafe scenarios, but also provides a fine-grained analysis to diagnose the behavioral patterns of agents in such scenarios. We conduct comprehensive experiments covering three mainstream CLI agent frameworks and thirteen state-of-the-art LLMs. Experimental results show that no tested system handles risky skills reliably: even the safest configurations still execute unsafe actions in about 17% of cases. Context-dependent and system-level risks are especially difficult for current agent systems to avoid. Our behavioral analysis reveals three recurring failure patterns: agents may fail to recognize the risk, recognize it but fail to intervene before acting, or follow skill instructions beyond the user\u0027s intended scope. These findings highlight the need to improve both risk reasoning in LLMs and execution control in agent frameworks.", "arxiv_id": "2607.20121", "arxiv_url": "https://arxiv.org/abs/2607.20121", "authors": ["Qiyuan Liu", "Tingfeng Hui", "Kun Zhan", "Kaike Zhang", "Ning Miao"], "brief": "\u672c\u6587\u6784\u5efa\u4e86 OpenSkillRisk\uff0c\u4e00\u4e2a\u9762\u5411 LLM \u667a\u80fd\u4f53\u4f7f\u7528\u771f\u5b9e\u9ad8\u98ce\u9669\u7b2c\u4e09\u65b9\u6280\u80fd\u7684\u5b89\u5168\u8bc4\u6d4b\u57fa\u51c6\u3002\u57fa\u51c6\u5305\u542b\u6765\u81ea\u516c\u5f00\u6280\u80fd\u5e02\u573a\u7684 263 \u4e2a\u98ce\u9669\u6280\u80fd\uff0c\u5e76\u914d\u5957\u6807\u51c6\u4efb\u52a1\u4e0e\u6c99\u76d2\u73af\u5883\uff0c\u7528\u4e8e\u91cf\u5316\u548c\u8bca\u65ad\u667a\u80fd\u4f53\u5728\u6267\u884c\u524d\u540e\u7684\u98ce\u9669\u8bc6\u522b\u4e0e\u89c4\u907f\u80fd\u529b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20121", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u98ce\u9669\u6280\u80fd\u6309\u5a01\u80c1\u7c7b\u578b\u5212\u5206\u4e3a\u4e03\u7c7b\uff0c\u8986\u76d6\u66f4\u771f\u5b9e\u3001\u591a\u6837\u7684 unsafe \u573a\u666f\uff0c\u5c24\u5176\u5173\u6ce8\u6267\u884c\u65f6\u624d\u663e\u73b0\u7684\u6f5c\u5728\u98ce\u9669\u3002", "\u8bc4\u6d4b\u4e86\u4e09\u7c7b\u4e3b\u6d41 CLI \u667a\u80fd\u4f53\u6846\u67b6\u548c 13 \u4e2a\u524d\u6cbf LLM\uff0c\u53d1\u73b0\u5373\u4f7f\u6700\u5b89\u5168\u914d\u7f6e\u4ecd\u7ea6\u6709 17% \u60c5\u51b5\u4f1a\u6267\u884c\u4e0d\u5b89\u5168\u64cd\u4f5c\u3002", "\u8bc6\u522b\u51fa\u4e09\u7c7b\u5178\u578b\u5931\u8d25\u6a21\u5f0f\uff1a\u672a\u8bc6\u522b\u98ce\u9669\u3001\u8bc6\u522b\u98ce\u9669\u4f46\u672a\u53ca\u65f6\u963b\u6b62\u6267\u884c\u3001\u4ee5\u53ca\u8fc7\u5ea6\u9075\u5faa\u6280\u80fd\u6307\u4ee4\u8d85\u51fa\u7528\u6237\u610f\u56fe\u8303\u56f4\u3002"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u8bc4\u6d4b", "\u5de5\u5177\u4f7f\u7528", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20121v1", "published_at": "2026-07-22", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "OpenSkillRisk: Benchmarking Agent Safety When Using Real-World Risky Third-Party Skills", "tldr": "\u771f\u5b9e\u7b2c\u4e09\u65b9\u6280\u80fd\u66b4\u9732\u667a\u80fd\u4f53\u5b89\u5168\u77ed\u677f", "upvotes": 0, "what_it_is": "\u672c\u6587\u6784\u5efa\u4e86 OpenSkillRisk\uff0c\u4e00\u4e2a\u9762\u5411 LLM \u667a\u80fd\u4f53\u4f7f\u7528\u771f\u5b9e\u9ad8\u98ce\u9669\u7b2c\u4e09\u65b9\u6280\u80fd\u7684\u5b89\u5168\u8bc4\u6d4b\u57fa\u51c6\u3002\u57fa\u51c6\u5305\u542b\u6765\u81ea\u516c\u5f00\u6280\u80fd\u5e02\u573a\u7684 263 \u4e2a\u98ce\u9669\u6280\u80fd\uff0c\u5e76\u914d\u5957\u6807\u51c6\u4efb\u52a1\u4e0e\u6c99\u76d2\u73af\u5883\uff0c\u7528\u4e8e\u91cf\u5316\u548c\u8bca\u65ad\u667a\u80fd\u4f53\u5728\u6267\u884c\u524d\u540e\u7684\u98ce\u9669\u8bc6\u522b\u4e0e\u89c4\u907f\u80fd\u529b\u3002", "why_notable": "\u7b2c\u4e09\u65b9\u6280\u80fd\u662f\u5f00\u653e\u4e16\u754c\u667a\u80fd\u4f53\u6269\u5c55\u80fd\u529b\u7684\u5173\u952e\u5165\u53e3\uff0c\u4f46\u4e5f\u53ef\u80fd\u6210\u4e3a\u5b89\u5168\u653b\u51fb\u9762\u3002\u8be5\u5de5\u4f5c\u7528\u771f\u5b9e\u5e02\u573a\u6280\u80fd\u7cfb\u7edf\u6027\u63ed\u793a\u73b0\u6709\u667a\u80fd\u4f53\u6846\u67b6\u548c LLM \u5728\u98ce\u9669\u63a8\u7406\u4e0e\u6267\u884c\u63a7\u5236\u4e0a\u7684\u4e0d\u8db3\uff0c\u5bf9\u6784\u5efa\u53ef\u90e8\u7f72\u7684\u5b89\u5168\u667a\u80fd\u4f53\u5177\u6709\u76f4\u63a5\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Recent autoregressive video diffusion methods are increasingly built upon Self Forcing, where the student is trained on histories produced by its own rollout rather than ground-truth video contexts. This reduces exposure bias, but the historical key-value cache is still used by future frames only as frozen rollout state. As a result, future losses cannot supervise how earlier generated latents should be written into more useful keys and values for later video-latent generation. We call this the historical context-gradient gap. We propose Self Gradient Forcing (SGF), a two-pass training strategy that restores this missing supervision signal without backpropagating through the full serial rollout. Pass 1 performs a no-gradient autoregressive rollout matching inference and, at a sampled denoising exit step, records both the self-generated context and the noisy latents fed to the model. Pass 2 performs parallel context-gradient reconstruction for the recorded exit step. The generated context is used as stop-gradient clean-latent input, while the model recomputes the context KV representations and future-to-context causal attention. Thus, SGF provides the missing memory-writing supervision within the native autoregressive training objective, using losses on future video latents to train the model to encode context into more effective causal memory. Across extensive long-horizon frame-wise and chunk-wise experiments under different initializations, SGF achieves stronger native long-video extrapolation than Self Forcing, especially in subject identity, background/layout consistency, and temporal stability. Remarkably, using only a 5-second training window, SGF can extrapolate to videos lasting several minutes. Code and models will be released to advance research on autoregressive video generation.", "arxiv_id": "2607.20368", "arxiv_url": "https://arxiv.org/abs/2607.20368", "authors": ["Junhao Zhuang", "Shiyi Zhang", "Yuxuan Bian", "Yaowei Li", "Yawen Luo", "Yijun Liu", "Weiyang Jin", "Songchun Zhang", "Xianglong He", "Xuying Zhang", "Haoran Li", "Haoyang Huang", "Zeyue Xue", "Nan Duan"], "brief": "\u8bba\u6587\u63d0\u51fa Self Gradient Forcing\uff08SGF\uff09\uff0c\u4e00\u79cd\u4e24\u9636\u6bb5\u8bad\u7ec3\u7b56\u7565\uff0c\u7528\u4e8e\u5f25\u8865\u81ea\u56de\u5f52\u89c6\u9891\u6269\u6563\u4e2d\u5386\u53f2\u4e0a\u4e0b\u6587\u65e0\u6cd5\u88ab\u672a\u6765\u635f\u5931\u6709\u6548\u76d1\u7763\u7684\u201c\u4e0a\u4e0b\u6587\u68af\u5ea6\u7f3a\u53e3\u201d\u3002\u5b83\u901a\u8fc7\u65e0\u68af\u5ea6 rollout \u8bb0\u5f55\u4e0a\u4e0b\u6587\uff0c\u518d\u5e76\u884c\u91cd\u5efa\u5e76\u8ba9\u672a\u6765\u5e27\u635f\u5931\u76d1\u7763 KV \u8bb0\u5fc6\u5199\u5165\uff0c\u4ece\u800c\u63d0\u5347\u957f\u89c6\u9891\u751f\u6210\u4e00\u81f4\u6027\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20368", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u9488\u5bf9 Self Forcing \u4e2d\u5386\u53f2 KV cache \u4ec5\u4f5c\u4e3a\u51bb\u7ed3\u72b6\u6001\u3001\u65e0\u6cd5\u63a5\u6536\u672a\u6765\u5e27\u68af\u5ea6\u76d1\u7763\u7684\u95ee\u9898\uff0c\u63d0\u51fa\u201chistorical context-gradient gap\u201d\u5e76\u7ed9\u51fa\u89e3\u51b3\u65b9\u6848\u3002", "SGF \u91c7\u7528\u4e24\u9636\u6bb5\u8bad\u7ec3\uff1a\u7b2c\u4e00\u9636\u6bb5\u65e0\u68af\u5ea6\u81ea\u56de\u5f52 rollout \u6a21\u62df\u63a8\u7406\uff0c\u7b2c\u4e8c\u9636\u6bb5\u5728\u8bb0\u5f55\u7684\u53bb\u566a\u51fa\u53e3\u6b65\u91cd\u7b97\u4e0a\u4e0b\u6587 KV \u4e0e\u56e0\u679c\u6ce8\u610f\u529b\uff0c\u5b9e\u73b0\u672a\u6765\u635f\u5931\u5bf9\u4e0a\u4e0b\u6587\u8bb0\u5fc6\u5199\u5165\u7684\u76d1\u7763\u3002", "\u5b9e\u9a8c\u663e\u793a SGF \u5728\u4e3b\u4f53\u8eab\u4efd\u3001\u80cc\u666f\u5e03\u5c40\u4e00\u81f4\u6027\u548c\u65f6\u95f4\u7a33\u5b9a\u6027\u4e0a\u4f18\u4e8e Self Forcing\uff0c\u4ec5\u7528 5 \u79d2\u8bad\u7ec3\u7a97\u53e3\u5373\u53ef\u5916\u63a8\u5230\u6570\u5206\u949f\u89c6\u9891\u3002"], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "\u81ea\u56de\u5f52\u6a21\u578b", "\u957f\u89c6\u9891"], "num_comments": 0, "on_hf": f
