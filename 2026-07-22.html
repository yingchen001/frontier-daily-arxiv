a\u795e\u7ecf\u7f51\u7edc\u7684\u53ef\u52a0\u6027\u4ece\u7ed3\u6784\u7ea6\u675f\u8f6c\u4e3a\u53ef\u6d4b\u91cf\u3001\u53ef\u8c03\u8282\u7684\u884c\u4e3a\u6b63\u5219\u3002\u5b9e\u9a8c\u663e\u793a\u8bb8\u591a\u4ea4\u4e92\u53ef\u4f4e\u6210\u672c\u79fb\u9664\uff0c\u5c0f\u6570\u636e\u4e0a\u9002\u5ea6\u60e9\u7f5a\u8fd8\u80fd\u540c\u65f6\u63d0\u5347\u51c6\u786e\u7387\u4e0e\u53ef\u52a0\u6027\uff0c\u5e76\u63ed\u793a\u4e8b\u540e\u4ea4\u4e92\u6392\u5e8f\u5728\u6b63\u5219\u5316\u540e\u5e76\u4e0d\u53ef\u9760\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20201", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u53ef\u89e3\u91ca\u6027", "\u795e\u7ecf\u7f51\u7edc", "\u6b63\u5219\u5316", "\u7279\u5f81\u4ea4\u4e92"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20201v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Quadrilateral Loss: Additivity as a Measurable Behavior of Dense Neural Networks", "tldr": "\u8bba\u6587\u63d0\u51fa\u201c\u56db\u8fb9\u5f62\u635f\u5931\u201d\uff0c\u7528\u53ef\u5fae\u7684\u4e8c\u9636\u6df7\u5408\u5dee\u5206\u628a\u795e\u7ecf\u7f51\u7edc\u7684\u53ef\u52a0\u6027\u4ece\u7ed3\u6784\u7ea6\u675f\u8f6c\u4e3a\u53ef\u6d4b\u91cf\u3001\u53ef\u8c03\u8282\u7684\u884c\u4e3a\u6b63\u5219\u3002\u5b9e\u9a8c\u663e\u793a\u8bb8\u591a\u4ea4\u4e92\u53ef\u4f4e\u6210\u672c\u79fb\u9664\uff0c\u5c0f\u6570\u636e\u4e0a\u9002\u5ea6\u60e9\u7f5a\u8fd8\u80fd\u540c\u65f6\u63d0\u5347\u51c6\u786e\u7387\u4e0e\u53ef\u52a0\u6027\uff0c\u5e76\u63ed\u793a\u4e8b\u540e\u4ea4\u4e92\u6392\u5e8f\u5728\u6b63\u5219\u5316\u540e\u5e76\u4e0d\u53ef\u9760\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Existing human--object interaction (HOI) video generation methods are largely limited to offline short-video generation with complex driving conditions, making them unsuitable for real-time interactive applications. We present \\emph{StreamHOI}, a low-latency streaming framework for long-duration HOI video generation. Instead of converting heavily conditioned HOI pipelines into streaming systems, we study how an image-to-video streaming generator should organize historical memory to preserve interactions under bounded latency. We find that the standard sink-local memory design faces a trade-off in streaming HOI generation, and different transformer blocks show different historical-memory preferences for HOI regions and surrounding regions. To match memory composition with block behavior, StreamHOI performs offline HOI-aware block profiling and applies bias-guided memory-specialized training to adapt the generator to block-specific memory layouts. We further introduce a memory distance scaling module to strengthen long-range access to early interaction states. Extensive comparisons with both long-video baselines and recent HOI generation methods demonstrate that StreamHOI achieves strong interaction plausibility, object fidelity, human quality and efficiency, reaching 17.6 FPS with 0.75s first-chunk latency.", "arxiv_id": "2607.20174", "arxiv_url": "https://arxiv.org/abs/2607.20174", "authors": ["Zejing Rao", "Haoxian Zhang", "Xiaoqiang Liu", "Yiping Meng", "Guoxin Zhang", "Pengfei Wan", "Fan Tang", "Tong-Yee Lee"], "brief": "StreamHOI \u63d0\u51fa\u9762\u5411\u4eba-\u7269\u4ea4\u4e92\u89c6\u9891\u7684\u4f4e\u5ef6\u8fdf\u6d41\u5f0f\u751f\u6210\u6846\u67b6\uff0c\u91cd\u70b9\u7814\u7a76\u5982\u4f55\u5728\u6709\u9650\u5ef6\u8fdf\u4e0b\u7ec4\u7ec7\u5386\u53f2\u8bb0\u5fc6\u4ee5\u4fdd\u6301\u957f\u671f\u4ea4\u4e92\u4e00\u81f4\u6027\u3002\u65b9\u6cd5\u901a\u8fc7 HOI \u611f\u77e5\u7684 Transformer \u5757\u5206\u6790\u3001\u8bb0\u5fc6\u4e13\u95e8\u5316\u8bad\u7ec3\u548c\u8bb0\u5fc6\u8ddd\u79bb\u7f29\u653e\uff0c\u63d0\u5347\u4ea4\u4e92\u5408\u7406\u6027\u3001\u7269\u4f53\u4fdd\u771f\u5ea6\u4e0e\u4eba\u4f53\u8d28\u91cf\uff0c\u5e76\u8fbe\u5230 17.6 FPS\u3001\u9996\u5757\u5ef6\u8fdf 0.75 \u79d2\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20174", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u4eba\u673a\u4ea4\u4e92", "\u6d41\u5f0f\u751f\u6210", "\u8bb0\u5fc6\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20174v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "StreamHOI: Interaction-aware Temporal Memory Adaptation for Streaming HOI Video Generation", "tldr": "StreamHOI \u63d0\u51fa\u9762\u5411\u4eba-\u7269\u4ea4\u4e92\u89c6\u9891\u7684\u4f4e\u5ef6\u8fdf\u6d41\u5f0f\u751f\u6210\u6846\u67b6\uff0c\u91cd\u70b9\u7814\u7a76\u5982\u4f55\u5728\u6709\u9650\u5ef6\u8fdf\u4e0b\u7ec4\u7ec7\u5386\u53f2\u8bb0\u5fc6\u4ee5\u4fdd\u6301\u957f\u671f\u4ea4\u4e92\u4e00\u81f4\u6027\u3002\u65b9\u6cd5\u901a\u8fc7 HOI \u611f\u77e5\u7684 Transformer \u5757\u5206\u6790\u3001\u8bb0\u5fc6\u4e13\u95e8\u5316\u8bad\u7ec3\u548c\u8bb0\u5fc6\u8ddd\u79bb\u7f29\u653e\uff0c\u63d0\u5347\u4ea4\u4e92\u5408\u7406\u6027\u3001\u7269\u4f53\u4fdd\u771f\u5ea6\u4e0e\u4eba\u4f53\u8d28\u91cf\uff0c\u5e76\u8fbe\u5230 17.6 FPS\u3001\u9996\u5757\u5ef6\u8fdf 0.75 \u79d2\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large Audio Language models (LALMs) have made rapid progress on acoustic understanding, yet they still struggle with fine-grained audio reasoning (e.g., recognizing event order, repetitions and duration). Existing post-training methods heavily rely on expensive external labels or provide only coarse semantic signals. To bridge this gap, we introduce Audio-Zero, the first label-free self-evolution framework in the field of LALMs that improves fine-grained auditory perception and reasoning. Audio-Zero constructs an auditory self-play game from unlabeled audio contrast pairs: most players hear a reference audio, while one odd listener hears a subtle variant. The model first generates clues describing what it hears and then identifies the odd listener by reasoning over inconsistencies among clues. Since the odd listener is known by construction, the game provides verifiable rewards without any annotated answers. Experiments with Qwen2-Audio-7B-Instruct and Qwen2.5-Omni-7B on TREA, MMAU Test-mini and MMAR show that Audio-Zero improves fine-grained audio reasoning while preserving broad audio understanding. Evolutionary and diagnostic analyses further reveal that increasingly fine-grained auditory descriptions emerge naturally from game pressure.", "arxiv_id": "2607.20166", "arxiv_url": "https://arxiv.org/abs/2607.20166", "authors": ["Siqian Tong", "Xuan Li", "Chaozhuo Li", "Baolong Bi", "Yiwei Wang", "Yujun Cai", "Shenghua Liu", "Chengpeng Hao"], "brief": "Audio-Zero \u63d0\u51fa\u4e00\u79cd\u9762\u5411\u5927\u97f3\u9891\u8bed\u8a00\u6a21\u578b\u7684\u65e0\u6807\u7b7e\u81ea\u8fdb\u5316\u6846\u67b6\uff0c\u901a\u8fc7\u672a\u6807\u6ce8\u97f3\u9891\u5bf9\u6784\u9020\u201c\u627e\u51fa\u5f02\u5e38\u542c\u8005\u201d\u7684\u81ea\u535a\u5f08\u4efb\u52a1\uff0c\u5229\u7528\u53ef\u9a8c\u8bc1\u5956\u52b1\u63d0\u5347\u7ec6\u7c92\u5ea6\u97f3\u9891\u63a8\u7406\u80fd\u529b\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728\u4e8b\u4ef6\u987a\u5e8f\u3001\u91cd\u590d\u3001\u65f6\u957f\u7b49\u7ec6\u7c92\u5ea6\u542c\u89c9\u63a8\u7406\u4e0a\u5e26\u6765\u63d0\u5347\uff0c\u540c\u65f6\u4fdd\u6301\u901a\u7528\u97f3\u9891\u7406\u89e3\u80fd\u529b\u3002", "categories": ["cs.SD", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20166", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u97f3\u9891\u7406\u89e3", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20166v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Audio-Zero: Label-Free Self-Evolution for Fine-Grained Audio Reasoning", "tldr": "Audio-Zero \u63d0\u51fa\u4e00\u79cd\u9762\u5411\u5927\u97f3\u9891\u8bed\u8a00\u6a21\u578b\u7684\u65e0\u6807\u7b7e\u81ea\u8fdb\u5316\u6846\u67b6\uff0c\u901a\u8fc7\u672a\u6807\u6ce8\u97f3\u9891\u5bf9\u6784\u9020\u201c\u627e\u51fa\u5f02\u5e38\u542c\u8005\u201d\u7684\u81ea\u535a\u5f08\u4efb\u52a1\uff0c\u5229\u7528\u53ef\u9a8c\u8bc1\u5956\u52b1\u63d0\u5347\u7ec6\u7c92\u5ea6\u97f3\u9891\u63a8\u7406\u80fd\u529b\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728\u4e8b\u4ef6\u987a\u5e8f\u3001\u91cd\u590d\u3001\u65f6\u957f\u7b49\u7ec6\u7c92\u5ea6\u542c\u89c9\u63a8\u7406\u4e0a\u5e26\u6765\u63d0\u5347\uff0c\u540c\u65f6\u4fdd\u6301\u901a\u7528\u97f3\u9891\u7406\u89e3\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Active Inference (AIF) frames adaptive behavior as the minimization of expected free energy (EFE), combining epistemic and pragmatic objectives within a single variational principle. We frame AIF as policy optimization and show that, for closed-loop control policies, EFE minimization can be formulated as a convex Markov decision process (MDP). In this formulation, the pragmatic terms are linear in the predictive state marginals and therefore equivalent to reward maximization in a latent MDP, while the epistemic value introduces a nonlinear component that distinguishes EFE minimization from standard reinforcement learning. This perspective further reveals the epistemic drive of active inference as a policy-dependent (performative) reward. We analyze finite-horizon, discounted, and average-reward formulations of EFE and derive a mirror descent (MD) algorithm that locally linearizes the objective around the current state marginals, yielding a policy-dependent reward that is compatible with actor-critic methods and dynamic programming. Finally, we argue that coupling world-model learning with policy optimization gives active inference the structure of performative reinforcement learning, providing a route toward grounding active inference within modern reinforcement learning and optimization theory, including convergence analysis and principled policy improvement guarantees.", "arxiv_id": "2607.20152", "arxiv_url": "https://arxiv.org/abs/2607.20152", "authors": ["Nikola Milosevic", "Nicol\u00e1s Hinrichs", "Nico Scherf"], "brief": "\u8bba\u6587\u5c06\u4e3b\u52a8\u63a8\u65ad\u4e2d\u7684\u671f\u671b\u81ea\u7531\u80fd\u6700\u5c0f\u5316\u8868\u8ff0\u4e3a\u95ed\u73af\u7b56\u7565\u4f18\u5316\uff0c\u5e76\u8bc1\u660e\u5176\u53ef\u5199\u6210\u4e00\u79cd\u51f8\u9a6c\u5c14\u53ef\u592b\u51b3\u7b56\u8fc7\u7a0b\u3002\u8be5\u89c6\u89d2\u628a\u5b9e\u7528\u76ee\u6807\u5bf9\u5e94\u5230\u6f5c\u5728 MDP \u4e2d\u7684\u5956\u52b1\u6700\u5927\u5316\uff0c\u540c\u65f6\u5c06\u8ba4\u77e5\u63a2\u7d22\u9879\u89e3\u91ca\u4e3a\u4f9d\u8d56\u7b56\u7565\u7684\u5956\u52b1\uff0c\u5e76\u63d0\u51fa\u53ef\u7ed3\u5408 actor-critic \u4e0e\u52a8\u6001\u89c4\u5212\u7684\u955c\u50cf\u4e0b\u964d\u7b97\u6cd5\u3002", "categories": ["cs.LG", "cs.AI", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20152", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u4e3b\u52a8\u63a8\u65ad", "\u5f3a\u5316\u5b66\u4e60", "\u9a6c\u5c14\u53ef\u592b\u51b3\u7b56\u8fc7\u7a0b", "\u4f18\u5316\u7406\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20152v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Active Inference as a Convex Markov Decision Process", "tldr": "\u8bba\u6587\u5c06\u4e3b\u52a8\u63a8\u65ad\u4e2d\u7684\u671f\u671b\u81ea\u7531\u80fd\u6700\u5c0f\u5316\u8868\u8ff0\u4e3a\u95ed\u73af\u7b56\u7565\u4f18\u5316\uff0c\u5e76\u8bc1\u660e\u5176\u53ef\u5199\u6210\u4e00\u79cd\u51f8\u9a6c\u5c14\u53ef\u592b\u51b3\u7b56\u8fc7\u7a0b\u3002\u8be5\u89c6\u89d2\u628a\u5b9e\u7528\u76ee\u6807\u5bf9\u5e94\u5230\u6f5c\u5728 MDP \u4e2d\u7684\u5956\u52b1\u6700\u5927\u5316\uff0c\u540c\u65f6\u5c06\u8ba4\u77e5\u63a2\u7d22\u9879\u89e3\u91ca\u4e3a\u4f9d\u8d56\u7b56\u7565\u7684\u5956\u52b1\uff0c\u5e76\u63d0\u51fa\u53ef\u7ed3\u5408 actor-critic \u4e0e\u52a8\u6001\u89c4\u5212\u7684\u955c\u50cf\u4e0b\u964d\u7b97\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The rapid growth of chiplet-based artificial intelligence systems-on-chip (SoCs) has exposed a fundamental gap in semiconductor test methodology. Existing Known Good Die (KGD) screening guarantees pre-assembly functional correctness, yet it offers no probabilistic assurance of post-assembly reliability lifetime. To address this limitation, the present work formalizes the transition from KGD to Known Good Reliable Die (KGRD) screening as a constrained inference problem over incomplete pre-assembly observability. Building upon this formulation, four interlocking contributions are presented: (i) a Bayesian probabilistic risk model that maps pre-assembly telemetry to post-assembly failure likelihood with a quantified observability bias bound; (ii) a safety-gated decision architecture that provides a provable post-assembly failure probability guarantee; (iii) uncertainty-aware disposition boundaries derived from Bayes-optimal decision theory; and (iv) a constrained closed-loop feedback mechanism that delivers consistent model improvement without violating reliability constraints. A Monte Carlo simulation study on N = 4,000 synthetic dies verifies all four theoretical properties and confirms that the safety guarantee holds uniformly across the full range of tested gate threshold.", "arxiv_id": "2607.20141", "arxiv_url": "https://arxiv.org/abs/2607.20141", "authors": ["Prashanthi Metku", "Chandra Gandu"], "brief": "\u8bba\u6587\u5c06\u82af\u7c92\u5f0f AI SoC \u7684\u7b5b\u9009\u4ece\u201c\u5df2\u77e5\u826f\u54c1\u88f8\u7247\u201d\u6269\u5c55\u4e3a\u201c\u5df2\u77e5\u53ef\u9760\u826f\u54c1\u88f8\u7247\u201d\uff0c\u628a\u9884\u7ec4\u88c5\u53ef\u89c2\u6d4b\u4fe1\u606f\u4e0d\u8db3\u4e0b\u7684\u540e\u7ec4\u88c5\u5bff\u547d\u53ef\u9760\u6027\u5224\u65ad\u5f62\u5f0f\u5316\u4e3a\u53d7\u7ea6\u675f\u63a8\u65ad\u95ee\u9898\u3002\u63d0\u51fa\u8d1d\u53f6\u65af\u98ce\u9669\u6a21\u578b\u3001\u5b89\u5168\u95e8\u63a7\u51b3\u7b56\u3001 uncertainty-aware \u5904\u7f6e\u8fb9\u754c\u548c\u95ed\u73af\u53cd\u9988\u673a\u5236\uff0c\u5e76\u57284000\u4e2a\u5408\u6210\u88f8\u7247\u7684\u8499\u7279\u5361\u6d1b\u4eff\u771f\u4e2d\u9a8c\u8bc1\u4e86\u53ef\u9760\u6027\u6982\u7387\u4fdd\u8bc1\u3002", "categories": ["cs.AR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20141", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u82af\u7c92", "\u53ef\u9760\u6027\u5efa\u6a21", "\u8d1d\u53f6\u65af\u63a8\u65ad", "\u534a\u5bfc\u4f53\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20141v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Formal Foundations for Known Good Reliable Die Screening in Chiplet-Based AI Systems-on-Chip", "tldr": "\u8bba\u6587\u5c06\u82af\u7c92\u5f0f AI SoC \u7684\u7b5b\u9009\u4ece\u201c\u5df2\u77e5\u826f\u54c1\u88f8\u7247\u201d\u6269\u5c55\u4e3a\u201c\u5df2\u77e5\u53ef\u9760\u826f\u54c1\u88f8\u7247\u201d\uff0c\u628a\u9884\u7ec4\u88c5\u53ef\u89c2\u6d4b\u4fe1\u606f\u4e0d\u8db3\u4e0b\u7684\u540e\u7ec4\u88c5\u5bff\u547d\u53ef\u9760\u6027\u5224\u65ad\u5f62\u5f0f\u5316\u4e3a\u53d7\u7ea6\u675f\u63a8\u65ad\u95ee\u9898\u3002\u63d0\u51fa\u8d1d\u53f6\u65af\u98ce\u9669\u6a21\u578b\u3001\u5b89\u5168\u95e8\u63a7\u51b3\u7b56\u3001 uncertainty-aware \u5904\u7f6e\u8fb9\u754c\u548c\u95ed\u73af\u53cd\u9988\u673a\u5236\uff0c\u5e76\u57284000\u4e2a\u5408\u6210\u88f8\u7247\u7684\u8499\u7279\u5361\u6d1b\u4eff\u771f\u4e2d\u9a8c\u8bc1\u4e86\u53ef\u9760\u6027\u6982\u7387\u4fdd\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Slice-to-volume reconstruction (SVR) is the standard method for obtaining high-resolution (HR) 3D fetal brain volumes from motion-corrupted 2D MRI slice stacks acquired in multiple orientations. Existing SVR methods are optimized and validated only for clinical-range echo times (TEs), limiting their use at non-clinical TEs and making them incompatible with quantitative T2 mapping, a protocol- and center-independent biomarker of fetal brain maturation requiring HR reconstructions across multiple TEs. We present PRIME-SVR, the first implicit neural representation (INR) framework for joint HR reconstruction from multi-echo MRI. A single fully connected network models a continuous function from spatial coordinates to signal intensities across TEs, while a second network estimates slice-specific acquisition degradations. Cross-TE coherence is enforced via a Bloch equation-derived regularization penalizing deviations from expected T2 decay, with adaptive weighting that strengthens coupling for degraded stacks. The method is fully self-supervised. We validate PRIME-SVR on 39 in vivo fetal acquisitions (13 subjects x 3 TEs) from two centers, two vendors, and two field strengths (1.5 T and 0.55 T). Compared to state-of-the-art SVR, PRIME-SVR improves reconstruction sharpness by 47%, anatomical accuracy by 30%, and cross-TE structural consistency by 14%. It enables reconstruction at late TEs previously inaccessible to SVR, yielding the first 0.8 mm isotropic T2 maps at 0.55 T and the first T2 maps derived from INR-based SVR. PRIME-SVR also accelerates quantitative imaging by reducing the data needed for multi-TE reconstruction, cutting acquisition from 15 to 10 minutes while keeping T2 accuracy within 1.7% in white and deep gray matter, or to 5 minutes with a mean T2 error of 2.3% for high-quality acquisitions.", "arxiv_id": "2607.20136", "arxiv_url": "https://arxiv.org/abs/2607.20136", "authors": ["Busra Bulut", "Maik Dannecker", "Thomas Sanchez", "Sara Neves Silva", "Steven Jia", "Jean-Baptiste Ledoux", "Leo Pomar", "Joanna Sichitiu", "Yvan Gomez", "Meriam Koob", "Vincent Dunet", "Maria Deprez", "Guillaume Auzias", "Francois Rousseau", "Jana Hutter", "Daniel Rueckert", "Meritxell Bach Cuadra"], "brief": "PRIME-SVR \u63d0\u51fa\u4e00\u79cd\u7269\u7406\u4fe1\u606f\u7ea6\u675f\u7684\u9690\u5f0f\u795e\u7ecf\u8868\u793a\u6846\u67b6\uff0c\u7528\u4e8e\u591a\u56de\u6ce2\u80ce\u513f MRI \u7684\u8054\u5408\u9ad8\u5206\u8fa8\u7387\u5207\u7247\u5230\u4f53\u91cd\u5efa\uff0c\u5e76\u901a\u8fc7 Bloch \u65b9\u7a0b\u7ea6\u675f\u8de8\u56de\u6ce2 T2 \u8870\u51cf\u4e00\u81f4\u6027\u3002\u8be5\u65b9\u6cd5\u5728\u591a\u4e2d\u5fc3\u4f53\u5185\u6570\u636e\u4e0a\u663e\u8457\u63d0\u5347\u91cd\u5efa\u6e05\u6670\u5ea6\u3001\u89e3\u5256\u51c6\u786e\u6027\u548c\u8de8\u56de\u6ce2\u4e00\u81f4\u6027\uff0c\u5e76\u9996\u6b21\u5b9e\u73b0 0.55T \u4e0b 0.8 mm \u5404\u5411\u540c\u6027\u80ce\u513f T2 \u56fe\uff0c\u540c\u65f6\u53ef\u7f29\u77ed\u591a\u56de\u6ce2\u91c7\u96c6\u65f6\u95f4\u3002", "categories": ["physics.med-ph", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20136", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u5f71\u50cf", "\u9690\u5f0f\u795e\u7ecf\u8868\u793a", "\u7269\u7406\u7ea6\u675f", "\u80ce\u513fMRI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20136v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PRIME-SVR: Physics-infoRmed Implicit Multi-Echo Slice-to-Volume Reconstruction for Fetal T2 mapping", "tldr": "PRIME-SVR \u63d0\u51fa\u4e00\u79cd\u7269\u7406\u4fe1\u606f\u7ea6\u675f\u7684\u9690\u5f0f\u795e\u7ecf\u8868\u793a\u6846\u67b6\uff0c\u7528\u4e8e\u591a\u56de\u6ce2\u80ce\u513f MRI \u7684\u8054\u5408\u9ad8\u5206\u8fa8\u7387\u5207\u7247\u5230\u4f53\u91cd\u5efa\uff0c\u5e76\u901a\u8fc7 Bloch \u65b9\u7a0b\u7ea6\u675f\u8de8\u56de\u6ce2 T2 \u8870\u51cf\u4e00\u81f4\u6027\u3002\u8be5\u65b9\u6cd5\u5728\u591a\u4e2d\u5fc3\u4f53\u5185\u6570\u636e\u4e0a\u663e\u8457\u63d0\u5347\u91cd\u5efa\u6e05\u6670\u5ea6\u3001\u89e3\u5256\u51c6\u786e\u6027\u548c\u8de8\u56de\u6ce2\u4e00\u81f4\u6027\uff0c\u5e76\u9996\u6b21\u5b9e\u73b0 0.55T \u4e0b 0.8 mm \u5404\u5411\u540c\u6027\u80ce\u513f T2 \u56fe\uff0c\u540c\u65f6\u53ef\u7f29\u77ed\u591a\u56de\u6ce2\u91c7\u96c6\u65f6\u95f4\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Quantized small autoregressive reasoning models can enter long, repetitive, or unproductive trajectories, yet inference-time compute is usually allocated without observing how a trajectory develops. Building on an earlier token-level e-CUSUM controller, we develop MGT-B (Monitoring-Guided Test-time Backtracking), a revised external controller that maps overlapping windows of pre-sampling uncertainty and degeneration features to position-conditional empirical tail probabilities, accumulates mixture betting factors with a CUSUM-shaped reset, and responds to an alarm by estimating a rollback point, restoring token and key-value-cache state, and performing constrained re-decoding. To audit whether the effect persists on problem identities first observed after the manual choice of log threshold h = 10, we retrospectively exclude 260 IDs present in pre-threshold artifacts and retain the chronologically first post-threshold pair for each remaining ID, yielding a 240-pair chronology-audit set. On this set, accuracy changes from 82/240 to 88/240 (+2.50 percentage points; 13 corrections, 7 regressions; exact McNemar p = 0.2632; paired bootstrap 95% interval [-1.25, +6.25]). A broader 467-pair historical-coverage set of seed-matched pairs changes accuracy from 146/467 to 167/467 (+4.50 points; McNemar p = 0.000753), but includes 200 seed-1 IDs available before or during threshold selection and is reported only as an exploratory estimate. All 316 no-alarm outputs in the 467-pair set are identical to vanilla, while the 151 alarmed trajectories contain 29 corrections and 8 regressions. Neither analysis is confirmatory, and the empirical factors are not established as a valid e-process or e-detector. The results support a selective monitoring-and-repair mechanism for the studied MATH-500 setting, rather than a general or theoretically certified reasoning improvement.", "arxiv_id": "2607.20129", "arxiv_url": "https://arxiv.org/abs/2607.20129", "authors": ["El Hassane Ettifouri", "Ayoub Belfatmi", "Mahaman Sanoussi Yahaya Alassan", "Walid Dahhane"], "brief": "\u8bba\u6587\u63d0\u51fa MGT-B\uff0c\u4e00\u79cd\u7528\u4e8e\u91cf\u5316\u5c0f\u578b\u8bed\u8a00\u6a21\u578b\u63a8\u7406\u7684\u63a8\u7406\u65f6\u76d1\u63a7\u4e0e\u56de\u9000\u91cd\u89e3\u7801\u673a\u5236\uff1a\u68c0\u6d4b\u4e0d\u786e\u5b9a\u6027\u548c\u9000\u5316\u4fe1\u53f7\uff0c\u62a5\u8b66\u540e\u56de\u6eda\u5230\u4f30\u8ba1\u4f4d\u7f6e\u5e76\u53d7\u7ea6\u675f\u91cd\u65b0\u751f\u6210\u3002\u5728 MATH-500 \u76f8\u5173\u5ba1\u8ba1\u96c6\u4e0a\u51c6\u786e\u7387\u5c0f\u5e45\u63d0\u5347\u4f46\u7edf\u8ba1\u4e0d\u663e\u8457\uff0c\u5386\u53f2\u8986\u76d6\u96c6\u63d0\u5347\u66f4\u660e\u663e\uff1b\u4f5c\u8005\u5f3a\u8c03\u7ed3\u679c\u504f\u63a2\u7d22\u6027\uff0c\u5c1a\u65e0\u7406\u8bba\u4fdd\u8bc1\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20129", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5c0f\u8bed\u8a00\u6a21\u578b", "\u91cf\u5316", "\u63a8\u7406\u65f6\u76d1\u63a7", "\u91cd\u89e3\u7801"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20129v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CUSUM-Shaped Inference-Time Monitoring and Targeted Re-Decoding for Quantized Small Language Model Reasoning", "tldr": "\u8bba\u6587\u63d0\u51fa MGT-B\uff0c\u4e00\u79cd\u7528\u4e8e\u91cf\u5316\u5c0f\u578b\u8bed\u8a00\u6a21\u578b\u63a8\u7406\u7684\u63a8\u7406\u65f6\u76d1\u63a7\u4e0e\u56de\u9000\u91cd\u89e3\u7801\u673a\u5236\uff1a\u68c0\u6d4b\u4e0d\u786e\u5b9a\u6027\u548c\u9000\u5316\u4fe1\u53f7\uff0c\u62a5\u8b66\u540e\u56de\u6eda\u5230\u4f30\u8ba1\u4f4d\u7f6e\u5e76\u53d7\u7ea6\u675f\u91cd\u65b0\u751f\u6210\u3002\u5728 MATH-500 \u76f8\u5173\u5ba1\u8ba1\u96c6\u4e0a\u51c6\u786e\u7387\u5c0f\u5e45\u63d0\u5347\u4f46\u7edf\u8ba1\u4e0d\u663e\u8457\uff0c\u5386\u53f2\u8986\u76d6\u96c6\u63d0\u5347\u66f4\u660e\u663e\uff1b\u4f5c\u8005\u5f3a\u8c03\u7ed3\u679c\u504f\u63a2\u7d22\u6027\uff0c\u5c1a\u65e0\u7406\u8bba\u4fdd\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Contextual entrainment is the tendency of a model to let auxiliary context in its input pull its output, independently of whether that context is relevant, true, or even meaningful. Recently, it has been identified and given a mechanistic account in unimodal language models. Whether and how it manifests in vision-language models (VLMs) is, by contrast, largely unexamined, and the field lacks a purpose-built instrument with which to investigate it. We take the position that studying contextual entrainment in VLMs requires more than porting an existing text-only benchmark to the multimodal setting: it requires a taxonomically structured, dual-modality instrument whose conditions are constructed around the item at hand (the depicted image in the textual stream, the textual query in the visual stream). We argue that the move to VLMs is substantive rather than incremental. It makes entrainment a dual phenomenon, drivable independently by textual and by visual context, and it opens a veracity distinction (context that is false of the depicted scene yet possible in the world) that has no counterpart in the unimodal, world-knowledge-only formulation of prior work. To make this position concrete and actionable, we introduce ENTRAP-VL (ENTRainment Assessment Probe for Vision and Language), a manually curated dataset of 1,500 items across eight categories, organized by a taxonomy that spans two axes, i.e., the association of context with the item and its relationship to truth, and split into a textual-entrainment stream (eight context conditions) and a visual-entrainment stream (three context conditions). We do not claim to measure entrainment in any particular model; we provide the instrument, the taxonomy that motivates it, and the evaluation protocols it enables, so that the community can investigate the phenomenon rigorously. We will release the dataset and its documentation publicly.", "arxiv_id": "2607.20092", "arxiv_url": "https://arxiv.org/abs/2607.20092", "authors": ["Karan Goyal", "Afreen Hossain", "Debojyoti Das", "Vishal Bhutani"], "brief": "\u672c\u6587\u63d0\u51fa ENTRAP-VL\uff0c\u4e00\u4e2a\u7528\u4e8e\u7814\u7a76\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e2d\u201c\u4e0a\u4e0b\u6587\u7275\u5f15\u201d\u73b0\u8c61\u7684\u5206\u7c7b\u5b66\u63a2\u9488\u6570\u636e\u96c6\u3002\u6570\u636e\u96c6\u5305\u542b1500\u4e2a\u4eba\u5de5\u6784\u9020\u6837\u672c\uff0c\u533a\u5206\u6587\u672c\u4e0e\u89c6\u89c9\u4e24\u7c7b\u4e0a\u4e0b\u6587\u7275\u5f15\uff0c\u5e76\u6309\u4e0a\u4e0b\u6587\u5173\u8054\u6027\u4e0e\u771f\u5b9e\u6027\u7ec4\u7ec7\u6761\u4ef6\uff0c\u4e3a\u540e\u7eed\u7cfb\u7edf\u8bc4\u6d4b\u63d0\u4f9b\u5de5\u5177\u800c\u975e\u62a5\u544a\u5177\u4f53\u6a21\u578b\u7ed3\u679c\u3002", "categories": ["cs.CV", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20092", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001", "\u6570\u636e\u96c6", "\u6a21\u578b\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20092v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ENTRAP-VL: A Taxonomic Probe for Dual Contextual Entrainment in Vision-Language Models", "tldr": "\u672c\u6587\u63d0\u51fa ENTRAP-VL\uff0c\u4e00\u4e2a\u7528\u4e8e\u7814\u7a76\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e2d\u201c\u4e0a\u4e0b\u6587\u7275\u5f15\u201d\u73b0\u8c61\u7684\u5206\u7c7b\u5b66\u63a2\u9488\u6570\u636e\u96c6\u3002\u6570\u636e\u96c6\u5305\u542b1500\u4e2a\u4eba\u5de5\u6784\u9020\u6837\u672c\uff0c\u533a\u5206\u6587\u672c\u4e0e\u89c6\u89c9\u4e24\u7c7b\u4e0a\u4e0b\u6587\u7275\u5f15\uff0c\u5e76\u6309\u4e0a\u4e0b\u6587\u5173\u8054\u6027\u4e0e\u771f\u5b9e\u6027\u7ec4\u7ec7\u6761\u4ef6\uff0c\u4e3a\u540e\u7eed\u7cfb\u7edf\u8bc4\u6d4b\u63d0\u4f9b\u5de5\u5177\u800c\u975e\u62a5\u544a\u5177\u4f53\u6a21\u578b\u7ed3\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Retrieval-augmented large language models frequently face contexts that interleave useful evidence with misleading statements or instruction-like content. Blanket refusal discards valid evidence, whereas uncritical adoption yields incorrect or unsafe answers. The ability to selectively adopt relevant information while rejecting deceptive or harmful content is therefore critical for reliable deployment in real-world retrieval settings. We introduce SelectBench, a controlled benchmark and training set for selective evidence adoption, and post-train Qwen3.5-4B directly with DAPO using either deterministic rule rewards or a frozen semantic judge. On the corrected 325-example SelectBench-v2 test set, strict success rises from 22.46% for the original checkpoint to 25.54% with DAPO-Rule and 26.46% with DAPO-DeepSeek. Both trained policies reduce forbidden-content adoption and produce shorter, more focused responses, yet prompt-injection following does not improve. The paired gains are modest and fail to survive Holm correction, suggesting that stronger reward shaping or additional training iterations may be needed for more robust gains. DAPO-DeepSeek exhibits no material degradation on MMLU or clean HotpotQA, indicating that the post-training procedure preserves general capabilities. These results demonstrate a directional improvement in selective evidence use, while identifying injection resistance and statistical robustness as important remaining challenges for future work.", "arxiv_id": "2607.20090", "arxiv_url": "https://arxiv.org/abs/2607.20090", "authors": ["Yanyu Chen", "Yue Li", "Yongyi Cui", "Dongsheng Shi", "Lichang Dai"], "brief": "\u672c\u6587\u63d0\u51fa SelectBench\uff0c\u7528\u4e8e\u8bc4\u4f30\u548c\u8bad\u7ec3\u5927\u8bed\u8a00\u6a21\u578b\u5728\u542b\u6c61\u67d3\u68c0\u7d22\u7ed3\u679c\u4e2d\u9009\u62e9\u6027\u91c7\u7eb3\u6709\u7528\u8bc1\u636e\u3001\u62d2\u7edd\u8bef\u5bfc\u6216\u6709\u5bb3\u5185\u5bb9\u3002\u4f5c\u8005\u7528 DAPO \u5bf9 Qwen3.5-4B \u540e\u8bad\u7ec3\uff0c\u4e25\u683c\u6210\u529f\u7387\u4ece 22.46% \u5c0f\u5e45\u63d0\u5347\u5230\u7ea6 26%\uff0c\u5e76\u51cf\u5c11\u8fdd\u89c4\u5185\u5bb9\u91c7\u7eb3\uff0c\u4f46\u5bf9\u63d0\u793a\u6ce8\u5165\u62b5\u6297\u6539\u5584\u6709\u9650\u4e14\u7edf\u8ba1\u663e\u8457\u6027\u4e0d\u8db3\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20090", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63d0\u793a\u6ce8\u5165"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20090v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Reinforcement Learning for Large Language Model Selective Evidence Adoption from Contaminated Retrieval Results", "tldr": "\u672c\u6587\u63d0\u51fa SelectBench\uff0c\u7528\u4e8e\u8bc4\u4f30\u548c\u8bad\u7ec3\u5927\u8bed\u8a00\u6a21\u578b\u5728\u542b\u6c61\u67d3\u68c0\u7d22\u7ed3\u679c\u4e2d\u9009\u62e9\u6027\u91c7\u7eb3\u6709\u7528\u8bc1\u636e\u3001\u62d2\u7edd\u8bef\u5bfc\u6216\u6709\u5bb3\u5185\u5bb9\u3002\u4f5c\u8005\u7528 DAPO \u5bf9 Qwen3.5-4B \u540e\u8bad\u7ec3\uff0c\u4e25\u683c\u6210\u529f\u7387\u4ece 22.46% \u5c0f\u5e45\u63d0\u5347\u5230\u7ea6 26%\uff0c\u5e76\u51cf\u5c11\u8fdd\u89c4\u5185\u5bb9\u91c7\u7eb3\uff0c\u4f46\u5bf9\u63d0\u793a\u6ce8\u5165\u62b5\u6297\u6539\u5584\u6709\u9650\u4e14\u7edf\u8ba1\u663e\u8457\u6027\u4e0d\u8db3\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Post-training with evaluator feedback on policy-induced samples serves as a major mechanism for improving large language models. As policies improve, these sampled responses become close in quality. These close candidates create a bottleneck for policy optimization: collapsed relative evaluator score gaps yield weak or misleading policy supervision. We theoretically characterize why these gaps matter through a probability allocation view, showing that the directional gain of shifting probability mass from one response to another is exactly the evaluator score gap between them. This identifies relative score gaps as the policy optimization signals that guide updates. Motivated by this view, we propose DynamicRubric, a response-set-conditioned evaluator--policy co-evolution framework that generates weighted binary rubric items for each candidate set and aggregates the resulting judgments into response-level scores. In our experiments with 8B backbones, DynamicRubric improves evaluator performance and provides stronger policy supervision than baselines using a 70B reward model or a 235B static rubric generator. DynamicRubric-optimized policies also show gains on verifiable reasoning and coding tasks. A DynamicRubric-optimized model is fully deployed in WeChat Search\u0027s AI answering scenario, where it serves all online traffic across tens of millions of requests per day and improves key online metrics. These results suggest a principle for evaluator-guided post-training: evaluators should evolve with the policies they supervise.", "arxiv_id": "2607.20083", "arxiv_url": "https://arxiv.org/abs/2607.20083", "authors": ["Beining Wang", "Weihang Su", "Hongtao Tian", "Hao Kong", "Tao Yang", "Ting Yao", "Qingyi Pan", "Yueyue Wu", "Qingyao Ai", "Min Zhang", "Yiqun Liu"], "brief": "\u8bba\u6587\u6307\u51fa\u5728\u540e\u8bad\u7ec3\u4e2d\uff0c\u7b56\u7565\u6a21\u578b\u751f\u6210\u7684\u5019\u9009\u7b54\u6848\u8d28\u91cf\u63a5\u8fd1\u4f1a\u5bfc\u81f4\u8bc4\u4f30\u5668\u76f8\u5bf9\u5206\u5dee\u584c\u7f29\uff0c\u4ece\u800c\u524a\u5f31\u4f18\u5316\u4fe1\u53f7\u3002\u4f5c\u8005\u63d0\u51fa DynamicRubric\uff0c\u6839\u636e\u5019\u9009\u56de\u7b54\u52a8\u6001\u751f\u6210\u52a0\u6743\u4e8c\u5143\u8bc4\u5206\u7ec6\u5219\uff0c\u4f7f\u8bc4\u4f30\u5668\u4e0e\u7b56\u7565\u5171\u540c\u6f14\u5316\uff0c\u57288B\u6a21\u578b\u4e0a\u4f18\u4e8e\u66f4\u5927\u9759\u6001\u57fa\u7ebf\uff0c\u5e76\u5df2\u90e8\u7f72\u5230\u5fae\u4fe1\u641c\u7d22\u7ebf\u4e0a\u573a\u666f\u63d0\u5347\u6307\u6807\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20083", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u540e\u8bad\u7ec3", "\u5956\u52b1\u6a21\u578b", "\u8bc4\u4f30\u5668"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20083v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Co-Evolving LLM Evaluators and Policies via DynamicRubric", "tldr": "\u8bba\u6587\u6307\u51fa\u5728\u540e\u8bad\u7ec3\u4e2d\uff0c\u7b56\u7565\u6a21\u578b\u751f\u6210\u7684\u5019\u9009\u7b54\u6848\u8d28\u91cf\u63a5\u8fd1\u4f1a\u5bfc\u81f4\u8bc4\u4f30\u5668\u76f8\u5bf9\u5206\u5dee\u584c\u7f29\uff0c\u4ece\u800c\u524a\u5f31\u4f18\u5316\u4fe1\u53f7\u3002\u4f5c\u8005\u63d0\u51fa DynamicRubric\uff0c\u6839\u636e\u5019\u9009\u56de\u7b54\u52a8\u6001\u751f\u6210\u52a0\u6743\u4e8c\u5143\u8bc4\u5206\u7ec6\u5219\uff0c\u4f7f\u8bc4\u4f30\u5668\u4e0e\u7b56\u7565\u5171\u540c\u6f14\u5316\uff0c\u57288B\u6a21\u578b\u4e0a\u4f18\u4e8e\u66f4\u5927\u9759\u6001\u57fa\u7ebf\uff0c\u5e76\u5df2\u90e8\u7f72\u5230\u5fae\u4fe1\u641c\u7d22\u7ebf\u4e0a\u573a\u666f\u63d0\u5347\u6307\u6807\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Enterprise strategic decision support requires AI systems that are not only accurate, but also uncertainty-aware, risk-calibrated, explainable, and governance-compliant. This paper proposes TRUST-ESD, a risk-calibrated and governance-aware framework for enterprise decision support under uncertainty. TRUST-ESD evaluates feasible counterfactual strategies through predictive utility estimation, conformal uncertainty calibration, CVaR-based downside-risk scoring, risk-memory retrieval, policy-as-code governance, explainability, and human oversight. Unlike prediction-only methods that select actions by maximum expected utility, TRUST-ESD recommends strategies that balance value, reliability, risk exposure, and compliance. Experimental results show that TRUST-ESD improves risk-adjusted utility by 7.95%, reduces risk exposure by 23.22%, reduces CVaR by 23.78%, lowers calibration error by 13.89%, improves explanation fidelity by 10.90%, and increases governance compliance by 9.76% compared with strong uncertainty-aware baselines, while maintaining competitive predictive accuracy. Ablation and case-study analyses further confirm that uncertainty calibration, downside-risk scoring, risk memory, explainability, and governance validation jointly improve trustworthy enterprise decision-making.", "arxiv_id": "2607.20065", "arxiv_url": "https://arxiv.org/abs/2607.20065", "authors": ["Tian Qiu", "Li Yan", "Mahabubur Rahman Miraj", "Shanqin Yi", "Md Intekhab Rahman Galib", "Jahid Hasan"], "brief": "\u8bba\u6587\u63d0\u51fa TRUST-ESD\uff0c\u4e00\u4e2a\u9762\u5411\u4f01\u4e1a\u6218\u7565\u51b3\u7b56\u7684\u4e0d\u786e\u5b9a\u6027\u4e0e\u98ce\u9669\u6821\u51c6\u6846\u67b6\uff0c\u7ed3\u5408\u53cd\u4e8b\u5b9e\u7b56\u7565\u8bc4\u4f30\u3001\u4fdd\u5f62\u4e0d\u786e\u5b9a\u6027\u6821\u51c6\u3001CVaR \u4e0b\u884c\u98ce\u9669\u3001\u98ce\u9669\u8bb0\u5fc6\u3001\u6cbb\u7406\u89c4\u5219\u548c\u53ef\u89e3\u91ca\u6027\u3002\u5728\u5b9e\u9a8c\u4e2d\u76f8\u8f83\u5f3a\u57fa\u7ebf\u63d0\u5347\u98ce\u9669\u8c03\u6574\u6548\u7528\u3001\u964d\u4f4e\u98ce\u9669\u66b4\u9732\u4e0e\u6821\u51c6\u8bef\u5dee\uff0c\u5e76\u63d0\u9ad8\u89e3\u91ca\u4fdd\u771f\u5ea6\u548c\u6cbb\u7406\u5408\u89c4\u6027\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20065", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u51b3\u7b56\u652f\u6301", "\u4e0d\u786e\u5b9a\u6027\u6821\u51c6", "\u98ce\u9669\u7ba1\u7406", "\u53ef\u4fe1AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20065v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "TRUST-ESD: A Risk-Calibrated and Governance-Aware AI Framework for Enterprise Strategic Decision Support Under Uncertainty", "tldr": "\u8bba\u6587\u63d0\u51fa TRUST-ESD\uff0c\u4e00\u4e2a\u9762\u5411\u4f01\u4e1a\u6218\u7565\u51b3\u7b56\u7684\u4e0d\u786e\u5b9a\u6027\u4e0e\u98ce\u9669\u6821\u51c6\u6846\u67b6\uff0c\u7ed3\u5408\u53cd\u4e8b\u5b9e\u7b56\u7565\u8bc4\u4f30\u3001\u4fdd\u5f62\u4e0d\u786e\u5b9a\u6027\u6821\u51c6\u3001CVaR \u4e0b\u884c\u98ce\u9669\u3001\u98ce\u9669\u8bb0\u5fc6\u3001\u6cbb\u7406\u89c4\u5219\u548c\u53ef\u89e3\u91ca\u6027\u3002\u5728\u5b9e\u9a8c\u4e2d\u76f8\u8f83\u5f3a\u57fa\u7ebf\u63d0\u5347\u98ce\u9669\u8c03\u6574\u6548\u7528\u3001\u964d\u4f4e\u98ce\u9669\u66b4\u9732\u4e0e\u6821\u51c6\u8bef\u5dee\uff0c\u5e76\u63d0\u9ad8\u89e3\u91ca\u4fdd\u771f\u5ea6\u548c\u6cbb\u7406\u5408\u89c4\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Aspect-based sentiment analysis (ABSA) in Arabic must recover both explicitly stated aspects and implicit aspects that are never named in the text. Implicit identification typically relies on an auxiliary knowledge source (e.g., a knowledge graph (KG)) linking opinion cues to aspect categories, but for a lower-resource language the practitioner faces a design choice: reuse a mature English KG through multilingual embeddings, or build a smaller native Arabic KG. This paper reports a controlled comparison of the two strategies within a single hybrid pipeline, evaluated on three Arabic benchmarks (M-ABSA, SemEval-2016 Arabic, and HAAD). We further compare two adaptation strategies for the generative extractor that feeds the KG -- zero-shot prompting versus task-specific fine-tuning of an 8B-parameter large language model (LLM). The native Arabic KG (Strategy 2) outperforms the cross-lingual English KG (Strategy 1) by +0.199 micro-F1 on M-ABSA and +0.251 on SemEval-2016, gaining on both precision and recall. Task-specific fine-tuning raises explicit-extraction micro-F1 from \u003c= 0.13 (zero-shot) to 0.66-0.76 on M-ABSA and SemEval-2016 (0.45 on the smaller HAAD), confirming that task adaptation, rather than model scale, is decisive in a morphologically rich language.", "arxiv_id": "2607.20056", "arxiv_url": "https://arxiv.org/abs/2607.20056", "authors": ["Lujain A. Alawwad"], "brief": "\u672c\u6587\u6bd4\u8f83\u4e86\u963f\u62c9\u4f2f\u8bed\u9690\u5f0f\u65b9\u9762\u8bc6\u522b\u4e2d\u4f7f\u7528\u8de8\u8bed\u8a00\u82f1\u8bed\u77e5\u8bc6\u56fe\u8c31\u4e0e\u672c\u5730\u963f\u62c9\u4f2f\u8bed\u77e5\u8bc6\u56fe\u8c31\u7684\u6548\u679c\uff0c\u5e76\u5728\u7edf\u4e00\u6df7\u5408\u6d41\u7a0b\u4e2d\u8bc4\u4f30\u3002\u7ed3\u679c\u663e\u793a\uff0c\u672c\u5730\u963f\u62c9\u4f2f\u8bed\u77e5\u8bc6\u56fe\u8c31\u663e\u8457\u4f18\u4e8e\u8de8\u8bed\u8a00\u65b9\u6848\uff1b\u540c\u65f6\uff0c\u9488\u5bf9\u4efb\u52a1\u5fae\u8c03\u7684 8B \u5927\u6a21\u578b\u8fdc\u80dc\u96f6\u6837\u672c\u63d0\u793a\uff0c\u8bf4\u660e\u8bed\u8a00\u4e0e\u4efb\u52a1\u9002\u914d\u6bd4\u5355\u7eaf\u6a21\u578b\u89c4\u6a21\u66f4\u5173\u952e\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20056", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u77e5\u8bc6\u56fe\u8c31", "\u60c5\u611f\u5206\u6790", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8de8\u8bed\u8a00"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20056v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Language-Specific versus Cross-Lingual Knowledge Graphs for Implicit Aspect Identification in Arabic: A Comparative Study of Reasoning and Adaptation Strategies", "tldr": "\u672c\u6587\u6bd4\u8f83\u4e86\u963f\u62c9\u4f2f\u8bed\u9690\u5f0f\u65b9\u9762\u8bc6\u522b\u4e2d\u4f7f\u7528\u8de8\u8bed\u8a00\u82f1\u8bed\u77e5\u8bc6\u56fe\u8c31\u4e0e\u672c\u5730\u963f\u62c9\u4f2f\u8bed\u77e5\u8bc6\u56fe\u8c31\u7684\u6548\u679c\uff0c\u5e76\u5728\u7edf\u4e00\u6df7\u5408\u6d41\u7a0b\u4e2d\u8bc4\u4f30\u3002\u7ed3\u679c\u663e\u793a\uff0c\u672c\u5730\u963f\u62c9\u4f2f\u8bed\u77e5\u8bc6\u56fe\u8c31\u663e\u8457\u4f18\u4e8e\u8de8\u8bed\u8a00\u65b9\u6848\uff1b\u540c\u65f6\uff0c\u9488\u5bf9\u4efb\u52a1\u5fae\u8c03\u7684 8B \u5927\u6a21\u578b\u8fdc\u80dc\u96f6\u6837\u672c\u63d0\u793a\uff0c\u8bf4\u660e\u8bed\u8a00\u4e0e\u4efb\u52a1\u9002\u914d\u6bd4\u5355\u7eaf\u6a21\u578b\u89c4\u6a21\u66f4\u5173\u952e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "With the widespread deployment of deep neural networks (DNNs) in safety-critical domains, reducing the cost of model validation under limited testing budgets has become increasingly important. Existing test case prioritization techniques often rely on single-checkpoint confidence signals derived from output probabilities. However, DNNs can be confidently wrong, and the confidence margin between the predicted and competing classes is frequently small, which weakens early fault discovery. To address this limitation, we propose a Neural-Collapse-Inspired Prioritization (NCIP) framework that replaces absolute confidence with cross-checkpoint prediction variability in the terminal training regime, where model geometry becomes highly structured. NCIP introduces two key components. First, it selects an NC-guided representative subset of training checkpoints using an equiangularity score of classifier weights, quantified as the standard deviation of pairwise cosine similarities among class weight vectors. Second, it prioritizes test inputs by their prediction variability across the selected checkpoints, surfacing boundary-adjacent and failure-prone samples that are unstable under checkpoint-induced decision boundary shifts. Extensive experiments across multiple datasets and architectures show that NCIP achieves strong performance in early fault discovery compared with competitive baselines, with 1.5 to 16.6 percent RAUC-ALL gains and 4.9 to 20.6 percent RAUC-500 gains under the same testing budget. NCIP further attains the best average performance across all dataset-model pairs.", "arxiv_id": "2607.20046", "arxiv_url": "https://arxiv.org/abs/2607.20046", "authors": ["Chunyu Liu", "Mingyuan Li", "Yang Li", "Wenmin Li", "Fei Gao", "Tengfei Tu", "Su-Juan Qin"], "brief": "\u672c\u6587\u63d0\u51fa NCIP \u6d4b\u8bd5\u7528\u4f8b\u4f18\u5148\u7ea7\u6846\u67b6\uff0c\u5229\u7528\u8bad\u7ec3\u672b\u671f\u795e\u7ecf\u574d\u7f29\u7ed3\u6784\u9009\u62e9\u4ee3\u8868\u6027\u6a21\u578b\u68c0\u67e5\u70b9\uff0c\u5e76\u6839\u636e\u6d4b\u8bd5\u6837\u672c\u5728\u8fd9\u4e9b\u68c0\u67e5\u70b9\u95f4\u7684\u9884\u6d4b\u6ce2\u52a8\u6765\u6392\u5e8f\u3002\u5b9e\u9a8c\u663e\u793a\u8be5\u65b9\u6cd5\u80fd\u66f4\u65e9\u53d1\u73b0 DNN \u6545\u969c\uff0c\u5728\u591a\u4e2a\u6570\u636e\u96c6\u548c\u67b6\u6784\u4e0a\u76f8\u6bd4\u5f3a\u57fa\u7ebf\u53d6\u5f97 1.5% \u5230 16.6% \u7684 RAUC-ALL \u63d0\u5347\u548c 4.9% \u5230 20.6% \u7684 RAUC-500 \u63d0\u5347\u3002", "categories": ["cs.LG", "cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20046", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6df1\u5ea6\u5b66\u4e60", "\u8f6f\u4ef6\u6d4b\u8bd5", "\u795e\u7ecf\u574d\u7f29", "\u6a21\u578b\u9a8c\u8bc1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20046v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Test Case Prioritization for DNNs via Neural Collapse Instability", "tldr": "\u672c\u6587\u63d0\u51fa NCIP \u6d4b\u8bd5\u7528\u4f8b\u4f18\u5148\u7ea7\u6846\u67b6\uff0c\u5229\u7528\u8bad\u7ec3\u672b\u671f\u795e\u7ecf\u574d\u7f29\u7ed3\u6784\u9009\u62e9\u4ee3\u8868\u6027\u6a21\u578b\u68c0\u67e5\u70b9\uff0c\u5e76\u6839\u636e\u6d4b\u8bd5\u6837\u672c\u5728\u8fd9\u4e9b\u68c0\u67e5\u70b9\u95f4\u7684\u9884\u6d4b\u6ce2\u52a8\u6765\u6392\u5e8f\u3002\u5b9e\u9a8c\u663e\u793a\u8be5\u65b9\u6cd5\u80fd\u66f4\u65e9\u53d1\u73b0 DNN \u6545\u969c\uff0c\u5728\u591a\u4e2a\u6570\u636e\u96c6\u548c\u67b6\u6784\u4e0a\u76f8\u6bd4\u5f3a\u57fa\u7ebf\u53d6\u5f97 1.5% \u5230 16.6% \u7684 RAUC-ALL \u63d0\u5347\u548c 4.9% \u5230 20.6% \u7684 RAUC-500 \u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Robust out-of-the-box performance is essential for the clinical deployment of deep learning models in medical imaging. An important but underexplored factor affecting model generalisability is intensity normalisation, particularly for magnetic resonance imaging (MRI), where image intensities vary across scanners and protocols. In this study, we systematically compared seven normalisation methods and their impact on the performance of a 3D U-Net model for meniscus segmentation from knee MRI. The methods included standard scaling approaches, histogram-based techniques, and a Gaussian Mixture Model (GMM)-based method. Models were trained on the IWOAI 2019 dataset and evaluated on both internal and external test sets (SKM-TEA) to assess generalisability. Performance was similar internally but differences were significant on external data, with Z-score, Ny\u00fal histogram matching, and CLAHE showing greater robustness than other methods. However, these differences were small compared to the significant performance drop observed between datasets. Overall, while intensity normalisation had a measurable effect on model generalisability, its impact was limited relative to the effects of domain shift, highlighting the need for complementary strategies for robust deployment.", "arxiv_id": "2607.20028", "arxiv_url": "https://arxiv.org/abs/2607.20028", "authors": ["Oliver Mills", "Philip Conaghan", "Samuel Relton"], "brief": "\u672c\u6587\u7cfb\u7edf\u8bc4\u4f30\u4e867\u79cd\u5f3a\u5ea6\u5f52\u4e00\u5316\u65b9\u6cd5\u5bf93D U-Net\u819d\u5173\u8282MRI\u534a\u6708\u677f\u5206\u5272\u53ca\u8de8\u57df\u6cdb\u5316\u7684\u5f71\u54cd\u3002\u5728\u5185\u90e8\u6d4b\u8bd5\u96c6\u4e0a\u5dee\u5f02\u8f83\u5c0f\uff0c\u4f46\u5728\u5916\u90e8\u6570\u636e\u4e0aZ-score\u3001Ny\u00fal\u76f4\u65b9\u56fe\u5339\u914d\u548cCLAHE\u66f4\u7a33\u5065\uff1b\u4e0d\u8fc7\u5f52\u4e00\u5316\u5e26\u6765\u7684\u6539\u8fdb\u8fdc\u5c0f\u4e8e\u6570\u636e\u96c6\u57df\u504f\u79fb\u9020\u6210\u7684\u6027\u80fd\u4e0b\u964d\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.20028", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u5f71\u50cf", "\u56fe\u50cf\u5206\u5272", "\u57df\u6cdb\u5316", "\u5f52\u4e00\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.20028v1", "published_at": "2026-07-22", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A Systematic Benchmark of Intensity Normalisation Methods for 3D Knee MRI Segmentation and Cross-Domain Generalisability", "tldr": "\u672c\u6587\u7cfb\u7edf\u8bc4\u4f30\u4e867\u79cd\u5f3a\u5ea6\u5f52\u4e00\u5316\u65b9\u6cd5\u5bf93D U-Net\u819d\u5173\u8282MRI\u534a\u6708\u677f\u5206\u5272\u53ca\u8de8\u57df\u6cdb\u5316\u7684\u5f71\u54cd\u3002\u5728\u5185\u90e8\u6d4b\u8bd5\u96c6\u4e0a\u5dee\u5f02\u8f83\u5c0f\uff0c\u4f46\u5728\u5916\u90e8\u6570\u636e\u4e0aZ-score\u3001Ny\u00fal\u76f4\u65b9\u56fe\u5339\u914d\u548cCLAHE\u66f4\u7a33\u5065\uff1b\u4e0d\u8fc7\u5f52\u4e00\u5316\u5e26\u6765\u7684\u6539\u8fdb\u8fdc\u5c0f\u4e8e\u6570\u636e\u96c6\u57df\u504f\u79fb\u9020\u6210\u7684\u6027\u80fd\u4e0b\u964d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
