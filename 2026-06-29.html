u57df\u6ce8\u5165\u7ed3\u6784\u77e5\u8bc6\u53ef\u5e26\u6765\u663e\u8457\u63d0\u5347\uff0c\u4f46\u5728\u901a\u7528\u4efb\u52a1\u4e0a\u6536\u76ca\u6709\u9650\uff0c\u4e14\u6301\u7eed\u5fae\u8c03\u524d\u6cbf\u6a21\u578b\u53ef\u80fd\u5bfc\u81f4\u9884\u8bad\u7ec3\u77e5\u8bc6\u5d29\u6e83\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30258", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8868\u683c\u57fa\u7840\u6a21\u578b", "\u77e5\u8bc6\u56fe\u8c31", "\u5fae\u8c03", "\u5c0f\u6837\u672c\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30258v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "KnowsTFM: Knowledge-Informed Fine-Tuning of Small Tabular Foundation Models", "tldr": "\u9488\u5bf9\u5c0f\u578b\u8868\u683c\u57fa\u7840\u6a21\u578b\u5728\u5c0f\u4f17\u9886\u57df\uff08\u6570\u636e\u7a00\u7f3a\u3001\u9ad8\u7ef4\u3001\u5206\u5e03\u504f\u79fb\uff09\u8868\u73b0\u4e0d\u4f73\u7684\u95ee\u9898\uff0c\u63d0\u51faKnowsTFM\u65b9\u6cd5\uff0c\u901a\u8fc7\u77e5\u8bc6\u56fe\u8c31\u884d\u751f\u7684\u7ed3\u6784\u6ce8\u610f\u529b\u5148\u9a8c\u548c\u53c2\u6570\u9ad8\u6548\u4f4e\u79e9\u66f4\u65b0\u4e24\u79cd\u673a\u5236\u8fdb\u884c\u77e5\u8bc6\u5f15\u5bfc\u5fae\u8c03\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u4e13\u4e1a\u9886\u57df\u6ce8\u5165\u7ed3\u6784\u77e5\u8bc6\u53ef\u5e26\u6765\u663e\u8457\u63d0\u5347\uff0c\u4f46\u5728\u901a\u7528\u4efb\u52a1\u4e0a\u6536\u76ca\u6709\u9650\uff0c\u4e14\u6301\u7eed\u5fae\u8c03\u524d\u6cbf\u6a21\u578b\u53ef\u80fd\u5bfc\u81f4\u9884\u8bad\u7ec3\u77e5\u8bc6\u5d29\u6e83\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Safety benchmarks often buy scalability by fixing the prompt, the language, and the turn structure. For emotional-support chatbots, that bargain hides precisely where safety failures emerge: across a multilingual, multi-turn crisis conversation. We present EMPATH, a benchmark for safety evaluation of emotional-support chatbots. An auditor model role-plays help-seeking users, generating multi-turn conversations from 140 seed instructions and 34 personas. A judge model scores each full transcript against 19 metrics across five dimensions: crisis handling, therapeutic quality, conversational integrity, emotional safety, and cultural adaptation. EMPATH is built for Mexican Spanish and US English; the studies reported here run in Mexican Spanish. Auditor and judge are drawn from different model families, and the judge is treated as an instrument to be calibrated rather than trusted. A strict per-criterion rubric reveals material score inflation on 10 of the 19 metrics and restores discrimination. We study the measurement properties of the benchmark through judge calibration and cross-family inter-judge agreement. We also illustrate EMPATH on three frontier models, one of them open-weight. Aggregate scores sit within 0.74 points of one another, but per-metric profiles diverge by up to six points in model-specific places. Under the standard rubric, both the ranking and the weak spots are stable across a second, cross-family judge: 93% of scores fall within plus or minus 1. A five-run test-retest adds a second axis: even the steadiest model swings from 2 to 10 on a crisis metric across identical re-runs, and deepseek-v4-pro returns a different conversation on every run even at temperature 0. Run-to-run reliability is therefore a per-model safety property, not noise to average away. EMPATH is system-agnostic; the pipeline, seeds, personas, and rubrics are released for reuse.", "arxiv_id": "2606.30256", "arxiv_url": "https://arxiv.org/abs/2606.30256", "authors": ["Camilo Chac\u00f3n Sartori"], "brief": "\u63d0\u51faEMPATH\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u60c5\u611f\u652f\u6301\u804a\u5929\u673a\u5668\u4eba\u7684\u5b89\u5168\u6027\uff0c\u901a\u8fc7\u5ba1\u8ba1\u6a21\u578b\u6a21\u62df\u591a\u8f6e\u5371\u673a\u5bf9\u8bdd\uff0c\u518d\u7531\u8bc4\u5224\u6a21\u578b\u4ece19\u4e2a\u6307\u6807\u4e94\u4e2a\u7ef4\u5ea6\u6253\u5206\u3002\u7814\u7a76\u53d1\u73b0\u4e0d\u540c\u6a21\u578b\u603b\u5206\u76f8\u8fd1\u4f46\u7ec6\u7c92\u5ea6\u6307\u6807\u5dee\u5f02\u663e\u8457\uff0c\u4e14\u540c\u4e00\u6a21\u578b\u5728\u76f8\u540c\u8f93\u5165\u4e0b\u7684\u5371\u673a\u6307\u6807\u5f97\u5206\u6ce2\u52a8\u6781\u5927\uff082\u523010\u5206\uff09\uff0c\u63ed\u793a\u8fd0\u884c\u95f4\u53ef\u9760\u6027\u662f\u72ec\u7acb\u7684\u5b89\u5168\u5c5e\u6027\u3002", "categories": ["cs.AI", "cs.CY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30256", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5b89\u5168\u8bc4\u4f30", "\u60c5\u611f\u652f\u6301\u5bf9\u8bdd", "\u591a\u8bed\u8a00\u57fa\u51c6", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30256v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "EMPATH: A Multilingual Auditor-Judge Benchmark for Safety Evaluation of Emotional-Support Chatbots", "tldr": "\u63d0\u51faEMPATH\u57fa\u51c6\uff0c\u7528\u4e8e\u8bc4\u4f30\u60c5\u611f\u652f\u6301\u804a\u5929\u673a\u5668\u4eba\u7684\u5b89\u5168\u6027\uff0c\u901a\u8fc7\u5ba1\u8ba1\u6a21\u578b\u6a21\u62df\u591a\u8f6e\u5371\u673a\u5bf9\u8bdd\uff0c\u518d\u7531\u8bc4\u5224\u6a21\u578b\u4ece19\u4e2a\u6307\u6807\u4e94\u4e2a\u7ef4\u5ea6\u6253\u5206\u3002\u7814\u7a76\u53d1\u73b0\u4e0d\u540c\u6a21\u578b\u603b\u5206\u76f8\u8fd1\u4f46\u7ec6\u7c92\u5ea6\u6307\u6807\u5dee\u5f02\u663e\u8457\uff0c\u4e14\u540c\u4e00\u6a21\u578b\u5728\u76f8\u540c\u8f93\u5165\u4e0b\u7684\u5371\u673a\u6307\u6807\u5f97\u5206\u6ce2\u52a8\u6781\u5927\uff082\u523010\u5206\uff09\uff0c\u63ed\u793a\u8fd0\u884c\u95f4\u53ef\u9760\u6027\u662f\u72ec\u7acb\u7684\u5b89\u5168\u5c5e\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Inoculation prompting is a selective generalization technique used against Emergent Misalignment. We introduce inoculation adapters (IA), which similarly diminish the optimization pressure to learn undesired traits by strengthening the trait at train time. Inoculation adapters are LoRAs that are trained and used over three steps: 1) trained on undesired traits; 2) attached frozen while a separate task adapter is trained on data exhibiting both desired and undesired traits; 3) at deployment, the IA is discarded, and only the task adapter is kept. We show across six model families and several undesired traits including emergent misalignment, that inoculation adapters are more effective at suppressing undesired traits, while avoiding two drawbacks of inoculation prompting: inoculation adapters can suppress capabilities and traits that cannot be reliably elicited by a prompt, and they introduce fewer surprising backdoors than inoculation prompting under our probes. While undesired traits are better suppressed by inoculation adapters, the retention of desired traits is not consistently improved upon inoculation prompting and remains a challenge for both techniques.", "arxiv_id": "2606.30252", "arxiv_url": "https://arxiv.org/abs/2606.30252", "authors": ["Maxime Rich\u00e9", "Daniel Tan", "Vili Kohonen", "Niels Warncke"], "brief": "\u63d0\u51fa\"\u63a5\u79cd\u9002\u914d\u5668\"\uff08IA\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7LoRA\u5728\u8bad\u7ec3\u9636\u6bb5\u5f3a\u5316\u4e0d\u671f\u671b\u7279\u5f81\u6765\u964d\u4f4e\u6a21\u578b\u5b66\u4e60\u8fd9\u4e9b\u7279\u5f81\u7684\u4f18\u5316\u538b\u529b\uff0c\u4ece\u800c\u5728\u90e8\u7f72\u65f6\u4e22\u5f03\u9002\u914d\u5668\u540e\u6709\u6548\u6291\u5236\u6d8c\u73b0\u5f0f\u9519\u4f4d\u7b49\u4e0d\u826f\u884c\u4e3a\u3002\u5728\u516d\u4e2a\u6a21\u578b\u5bb6\u65cf\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u6bd4\u63a5\u79cd\u63d0\u793a\u66f4\u6709\u6548\u5730\u6291\u5236\u4e0d\u826f\u7279\u5f81\uff0c\u4e14\u5f15\u5165\u7684\u610f\u5916\u540e\u95e8\u66f4\u5c11\uff0c\u4f46\u5bf9\u671f\u671b\u7279\u5f81\u7684\u4fdd\u7559\u4ecd\u662f\u6311\u6218\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30252", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6a21\u578b\u5bf9\u9f50", "LoRA\u5fae\u8c03", "\u6d8c\u73b0\u5f0f\u9519\u4f4d", "\u5b89\u5168\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30252v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Inoculation Adapters: Improved Selective Generalization of Capabilities with Fewer Surprising Backdoors", "tldr": "\u63d0\u51fa\"\u63a5\u79cd\u9002\u914d\u5668\"\uff08IA\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7LoRA\u5728\u8bad\u7ec3\u9636\u6bb5\u5f3a\u5316\u4e0d\u671f\u671b\u7279\u5f81\u6765\u964d\u4f4e\u6a21\u578b\u5b66\u4e60\u8fd9\u4e9b\u7279\u5f81\u7684\u4f18\u5316\u538b\u529b\uff0c\u4ece\u800c\u5728\u90e8\u7f72\u65f6\u4e22\u5f03\u9002\u914d\u5668\u540e\u6709\u6548\u6291\u5236\u6d8c\u73b0\u5f0f\u9519\u4f4d\u7b49\u4e0d\u826f\u884c\u4e3a\u3002\u5728\u516d\u4e2a\u6a21\u578b\u5bb6\u65cf\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u6bd4\u63a5\u79cd\u63d0\u793a\u66f4\u6709\u6548\u5730\u6291\u5236\u4e0d\u826f\u7279\u5f81\uff0c\u4e14\u5f15\u5165\u7684\u610f\u5916\u540e\u95e8\u66f4\u5c11\uff0c\u4f46\u5bf9\u671f\u671b\u7279\u5f81\u7684\u4fdd\u7559\u4ecd\u662f\u6311\u6218\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Detecting communities in heterophilic graphs -- where connected nodes often belong to different classes -- is hard for unsupervised methods: classical modularity and spectral methods are feature agnostic, while deep graph-clustering methods rely on contrastive or generative machinery that is opaque. We propose Curvature-Guided Sheaf Diffusion (CGSD), a fully unsupervised community-detection algorithm that uses the discrete Forman--Ricci curvature of each edge as its single topological signal, propagated through every stage of an end-to-end pipeline. CGSD makes three concrete contributions: (i)~a curvature-gated sheaf-diffusion encoder that gates edge messages by $\u03c3(\u03ba_e)$ and is trained from three label-free structural losses (modularity, anti-collapse, curvature-weighted reconstruction); (ii)~a curvature-aware spectral clusterer (CSpec) that re-weights the $k$-NN affinity of the embedding by $\u03c3(\u03b1\u03ba_{e^*})$ before Ng--Jordan--Weiss; and (iii)~a unified label-free evaluation against nine truly-unsupervised baselines. On five heterophilic benchmarks (Cora, Cornell, Texas, Wisconsin, Chameleon), CGSD wins outright on Wisconsin and Chameleon and is competitive on the remaining three against nine unsupervised baselines. The gain over the strongest baseline is driven by the clusterer, not the encoder: on the same embedding, CSpec improves mean NMI from $0.091$ with $K$-Means to $0.107$ ($+15\\%$, paired $t$-test $p=0.008$). The mechanism is interpretable: intra-community and inter-community curvature distributions are visibly separated. Code is open-sourced at https://github.com/woodywff/cgsd.", "arxiv_id": "2606.30249", "arxiv_url": "https://arxiv.org/abs/2606.30249", "authors": ["Feifan Wang"], "brief": "\u63d0\u51fa\u66f2\u7387\u5f15\u5bfc\u5c42\u53e0\u6269\u6563\uff08CGSD\uff09\u7b97\u6cd5\uff0c\u5229\u7528\u79bb\u6563Forman-Ricci\u66f2\u7387\u4f5c\u4e3a\u62d3\u6251\u4fe1\u53f7\uff0c\u901a\u8fc7\u66f2\u7387\u95e8\u63a7\u7684sheaf\u6269\u6563\u7f16\u7801\u5668\u548c\u66f2\u7387\u611f\u77e5\u8c31\u805a\u7c7b\u5668\uff0c\u5b9e\u73b0\u5f02\u914d\u56fe\u4e0a\u7684\u65e0\u76d1\u7763\u793e\u533a\u68c0\u6d4b\u3002\u5728\u4e94\u4e2a\u5f02\u914d\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\u4e0e\u4e5d\u4e2a\u65e0\u76d1\u7763\u57fa\u7ebf\u5bf9\u6bd4\uff0cNMI\u76f8\u6bd4K-Means\u63d0\u534715%\uff0c\u4e14\u673a\u5236\u53ef\u89e3\u91ca\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30249", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u795e\u7ecf\u7f51\u7edc", "\u793e\u533a\u68c0\u6d4b", "\u65e0\u76d1\u7763\u5b66\u4e60", "\u56fe\u62d3\u6251"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30249v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Curvature-Guided Sheaf Diffusion for Unsupervised Community Detection on Heterophilic Graphs", "tldr": "\u63d0\u51fa\u66f2\u7387\u5f15\u5bfc\u5c42\u53e0\u6269\u6563\uff08CGSD\uff09\u7b97\u6cd5\uff0c\u5229\u7528\u79bb\u6563Forman-Ricci\u66f2\u7387\u4f5c\u4e3a\u62d3\u6251\u4fe1\u53f7\uff0c\u901a\u8fc7\u66f2\u7387\u95e8\u63a7\u7684sheaf\u6269\u6563\u7f16\u7801\u5668\u548c\u66f2\u7387\u611f\u77e5\u8c31\u805a\u7c7b\u5668\uff0c\u5b9e\u73b0\u5f02\u914d\u56fe\u4e0a\u7684\u65e0\u76d1\u7763\u793e\u533a\u68c0\u6d4b\u3002\u5728\u4e94\u4e2a\u5f02\u914d\u57fa\u51c6\u6570\u636e\u96c6\u4e0a\u4e0e\u4e5d\u4e2a\u65e0\u76d1\u7763\u57fa\u7ebf\u5bf9\u6bd4\uff0cNMI\u76f8\u6bd4K-Means\u63d0\u534715%\uff0c\u4e14\u673a\u5236\u53ef\u89e3\u91ca\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Existing autonomous research agents can support parts of the research process, but most systems still treat research as either an isolated assistant task or a closed workflow. Therefore, autonomous science needs a collaboration infrastructure that coordinates projects, agents, and digital and physical resources. We identify this as a shift from code-centered execution loops to research-oriented collaboration processes, where questions, evidence, participants, and resources must be coordinated under uncertainty. In this framing, an agent may be an AI system, a human researcher, a team, a laboratory, or an organization-backed participant. To this end, we present Clarus, a collaboration infrastructure for coordinating autonomous research agents toward web-scale scientific collaboration. Clarus reformulates research as an open, auditable, attributable, and resource-aware multi-phase collaboration process. It defines a minimal project-agent-resource object model and organizes scientific collaboration through four layers including Research Application, Digital Collaboration, Physical Substrate, and Physical World. Core modules are implemented as pluggable mechanisms, allowing Clarus to adapt to task risk, collaboration structure, and resource constraints. Through a controlled paper-generation case study, we show that Clarus can organize a research goal into a traceable, reviewable, attributable, and accumulative collaboration network across phases, tasks, and participants. Together, the object model, collaboration protocol, trust mechanisms, and prototype validation provide an initial foundation for open research networks. Clarus is now available at clarus.holosai.io.", "arxiv_id": "2606.30246", "arxiv_url": "https://arxiv.org/abs/2606.30246", "authors": ["Zihan Guo", "Zeyi Chen", "Zhiyu Chen", "Zicai Cui", "Shuai Shao", "Bo Huang", "Zhi Han", "Yuanyi Song", "Yuan Yuan", "Chenxi Zeng", "Xiaohang Nie", "Zhengxi Yu", "Hanwen Zhu", "Junwei Liao", "Ming Zhou", "Yang Li", "Yuanjian Zhou", "Weinan Zhang"], "brief": "Clarus\u662f\u4e00\u4e2a\u9762\u5411\u7f51\u7edc\u89c4\u6a21\u79d1\u5b66\u534f\u4f5c\u7684\u81ea\u4e3b\u7814\u7a76\u667a\u80fd\u4f53\u534f\u8c03\u57fa\u7840\u8bbe\u65bd\uff0c\u5c06\u79d1\u7814\u8fc7\u7a0b\u91cd\u6784\u4e3a\u5f00\u653e\u3001\u53ef\u5ba1\u8ba1\u3001\u53ef\u5f52\u56e0\u7684\u591a\u9636\u6bb5\u534f\u4f5c\u6d41\u7a0b\u3002\u5b83\u5b9a\u4e49\u4e86\u9879\u76ee-\u667a\u80fd\u4f53-\u8d44\u6e90\u5bf9\u8c61\u6a21\u578b\uff0c\u5e76\u901a\u8fc7\u56db\u5c42\u67b6\u6784\u534f\u8c03AI\u7cfb\u7edf\u3001\u4eba\u7c7b\u7814\u7a76\u8005\u53ca\u7269\u7406\u8d44\u6e90\uff0c\u5728\u8bba\u6587\u751f\u6210\u6848\u4f8b\u4e2d\u9a8c\u8bc1\u4e86\u5176\u53ef\u8ffd\u6eaf\u3001\u53ef\u7d2f\u79ef\u7684\u534f\u4f5c\u7f51\u7edc\u80fd\u529b\u3002", "categories": ["cs.AI", "cs.CY", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30246", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u534f\u4f5c", "\u591a\u667a\u80fd\u4f53", "\u7814\u7a76\u57fa\u7840\u8bbe\u65bd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30246v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Clarus: Coordinating Autonomous Research Agents toward Web-Scale Scientific Collaboration", "tldr": "Clarus\u662f\u4e00\u4e2a\u9762\u5411\u7f51\u7edc\u89c4\u6a21\u79d1\u5b66\u534f\u4f5c\u7684\u81ea\u4e3b\u7814\u7a76\u667a\u80fd\u4f53\u534f\u8c03\u57fa\u7840\u8bbe\u65bd\uff0c\u5c06\u79d1\u7814\u8fc7\u7a0b\u91cd\u6784\u4e3a\u5f00\u653e\u3001\u53ef\u5ba1\u8ba1\u3001\u53ef\u5f52\u56e0\u7684\u591a\u9636\u6bb5\u534f\u4f5c\u6d41\u7a0b\u3002\u5b83\u5b9a\u4e49\u4e86\u9879\u76ee-\u667a\u80fd\u4f53-\u8d44\u6e90\u5bf9\u8c61\u6a21\u578b\uff0c\u5e76\u901a\u8fc7\u56db\u5c42\u67b6\u6784\u534f\u8c03AI\u7cfb\u7edf\u3001\u4eba\u7c7b\u7814\u7a76\u8005\u53ca\u7269\u7406\u8d44\u6e90\uff0c\u5728\u8bba\u6587\u751f\u6210\u6848\u4f8b\u4e2d\u9a8c\u8bc1\u4e86\u5176\u53ef\u8ffd\u6eaf\u3001\u53ef\u7d2f\u79ef\u7684\u534f\u4f5c\u7f51\u7edc\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLM evaluation and AI safety face a shared measurement problem: benchmark scores, reward-model signals, and reported safety metrics can improve while the latent properties they are meant to represent remain difficult to verify. This paper combines a hybrid survey - a systematic search paired with narrative synthesis and separately tracked grey evidence - with a conceptual framework and a structured ten-model audit. The synthesis spans eight evidence streams: benchmark validity, dynamic evaluation, LLM-as-judge reliability, safety evaluation, jailbreak/refusal robustness, reward hacking, mechanistic interpretability, and governance/auditability, covering 2018-2026 evaluation-safety measurement work. We introduce EvalSafetyGap as an organizing hypothesis for comparing evaluation-side and alignment-side proxy failures under optimization pressure, using Goodhart\u0027s Law together with two constructs we develop here - an Instability Decomposition and an Alignment Trilemma - as tools for generating testable comparisons. The audit shows how conclusions shift when capability, behavioral safety, and governance are measured separately. In this sample (n = 10), the association between capability and sustained adversarial robustness is statistically indeterminate using the displayed Table 3 inputs (Pearson r = +0.232, p = 0.520), and the apparent open-closed safety gap is modest, driven mainly by governance and disclosure rather than behavioral robustness, and sensitive to how a single borderline model is classified; attempt-budget results are protocol dependent. Because the public evidence uses heterogeneous protocols, the audit is diagnostic rather than rank-generating. The contribution is a shared vocabulary and evidence map to support dynamic evaluation, transparent source reporting, multi-attempt safety measurement, and auditable alignment practice.", "arxiv_id": "2606.30219", "arxiv_url": "https://arxiv.org/abs/2606.30219", "authors": ["Bu\u011fra Alperen Ulu\u0131rmak", "Rifat Kurban"], "brief": "\u672c\u6587\u63d0\u51faEvalSafetyGap\u6846\u67b6\uff0c\u7cfb\u7edf\u68b3\u7406LLM\u8bc4\u4f30\u4e0eAI\u5b89\u5168\u4e2d\u7684\u4ee3\u7406\u6307\u6807\u5931\u6548\u95ee\u9898\uff0c\u63ed\u793a\u57fa\u51c6\u5206\u6570\u63d0\u5347\u800c\u771f\u5b9e\u80fd\u529b\u96be\u4ee5\u9a8c\u8bc1\u7684\u6838\u5fc3\u77db\u76fe\u3002\u901a\u8fc7\u5bf910\u4e2a\u6a21\u578b\u7684\u7ed3\u6784\u5316\u5ba1\u8ba1\u53d1\u73b0\uff0c\u80fd\u529b\u4e0e\u5bf9\u6297\u9c81\u68d2\u6027\u4e4b\u95f4\u7684\u5173\u8054\u7edf\u8ba1\u4e0a\u4e0d\u786e\u5b9a\uff0c\u5f00\u6e90\u4e0e\u95ed\u6e90\u6a21\u578b\u7684\u5b89\u5168\u5dee\u8ddd\u4e3b\u8981\u6e90\u4e8e\u6cbb\u7406\u900f\u660e\u5ea6\u800c\u975e\u884c\u4e3a\u9c81\u68d2\u6027\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30219", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "AI\u5b89\u5168", "\u8bc4\u4f30\u57fa\u51c6", "\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30219v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "EvalSafetyGap: A Hybrid Survey and Conceptual Framework for LLM Evaluation-Safety Failures", "tldr": "\u672c\u6587\u63d0\u51faEvalSafetyGap\u6846\u67b6\uff0c\u7cfb\u7edf\u68b3\u7406LLM\u8bc4\u4f30\u4e0eAI\u5b89\u5168\u4e2d\u7684\u4ee3\u7406\u6307\u6807\u5931\u6548\u95ee\u9898\uff0c\u63ed\u793a\u57fa\u51c6\u5206\u6570\u63d0\u5347\u800c\u771f\u5b9e\u80fd\u529b\u96be\u4ee5\u9a8c\u8bc1\u7684\u6838\u5fc3\u77db\u76fe\u3002\u901a\u8fc7\u5bf910\u4e2a\u6a21\u578b\u7684\u7ed3\u6784\u5316\u5ba1\u8ba1\u53d1\u73b0\uff0c\u80fd\u529b\u4e0e\u5bf9\u6297\u9c81\u68d2\u6027\u4e4b\u95f4\u7684\u5173\u8054\u7edf\u8ba1\u4e0a\u4e0d\u786e\u5b9a\uff0c\u5f00\u6e90\u4e0e\u95ed\u6e90\u6a21\u578b\u7684\u5b89\u5168\u5dee\u8ddd\u4e3b\u8981\u6e90\u4e8e\u6cbb\u7406\u900f\u660e\u5ea6\u800c\u975e\u884c\u4e3a\u9c81\u68d2\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "RGB-T detectors leverage the complementary strengths of visible and thermal infrared modalities, achieving robust performance under challenging conditions. Many of them resort to heavy dual backbones and exhaustive cross-modality fusion across the entire image, leading to impractically high computational costs. We observe that most image regions are smooth backgrounds (e.g., sky, ground) that can be easily handled by lightweight single-modality models. In light of this observation, we propose a sparse fusion mechanism for efficient RGB-T detection: first rapidly scanning the image to identify the proposals and then carefully examining the remaining sparse proposals via feature fusion. We propose a two-stage framework to instantiate this mechanism, which performs detection in two stages: 1) a lightweight and modality-specific detection stage that produces high-recall RoIs, and 2) a fusion-driven examination and refinement stage that filters out the false positives and refines the bounding boxes. This design enables the detector to adaptively allocate more computational resources to the potential foregrounds, improving the efficiency while ensuring detection accuracy. Extensive experiments show that our method achieves competitive performance with substantially fewer parameters and lower cost, while maintaining strong scalability to high-resolution images.", "arxiv_id": "2606.30215", "arxiv_url": "https://arxiv.org/abs/2606.30215", "authors": ["Chao Tian", "Zikun Zhou", "Chao Yang", "Guoqing Zhu", "Zhenyu He"], "brief": "\u63d0\u51fa\u4e00\u79cd\u7a00\u758f\u8de8\u6a21\u6001\u878d\u5408\u673a\u5236\u7528\u4e8eRGB-T\u76ee\u6807\u68c0\u6d4b\uff0c\u5148\u7528\u8f7b\u91cf\u5355\u6a21\u6001\u6a21\u578b\u5feb\u901f\u626b\u63cf\u751f\u6210\u9ad8\u53ec\u56de\u7387\u5019\u9009\u533a\u57df\uff0c\u518d\u5bf9\u7a00\u758f\u5019\u9009\u533a\u57df\u8fdb\u884c\u8de8\u6a21\u6001\u7279\u5f81\u878d\u5408\u7cbe\u70bc\uff0c\u907f\u514d\u5bf9\u5168\u56fe\u505a\u6602\u8d35\u7684\u53cc\u6a21\u6001\u878d\u5408\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u5927\u5e45\u51cf\u5c11\u53c2\u6570\u91cf\u548c\u8ba1\u7b97\u5f00\u9500\u7684\u540c\u65f6\u4fdd\u6301\u4e86\u7ade\u4e89\u6027\u68c0\u6d4b\u7cbe\ tsu NanoZoomer S360 at 40X magnification and 0.25 microns per pixel, and stored directly in NDPI format. Across the 470 WSIs, 446 WSIs contain annotated patch regions, yielding 7,398 PNG image patches with expert-verified C1 to C5 labels. The release includes NDPI WSIs, WSI-level GeoJSON annotation files, extracted patch images, deidentified metadata, a data dictionary, a validation summary, a manifest linking WSIs to Zenodo records, and code for dataset inspection and reuse. The complete dataset is approximately 950 GB and is available through Zenodo.", "arxiv_id": "2606.30209", "arxiv_url": "https://arxiv.org/abs/2606.30209", "authors": ["Garima Jain", "Abhijeet Patil", "Surabhi Jain", "Sanghamitra Pati", "Amit Sethi", "Sandeep Mathur", "Pulkit Verma", "Nishi Halduniya", "Jatin Kashyap", "Sharat Kumar", "Simmi Kharb", "Sunita Singh", "Sucheta Devi Khuraijam", "Sushma Khuraijam", "Ratan Konjengbam", "Arvind Kumar", "Deepali Tirkey", "Saurav Banerjee", "Shivani Kalhan", "Rakesh Kumar Gupta", "Ranjana Solanki", "Deepika Hemranjani", "Shashank Nath Singh", "Uma Handa", "Manveen Kaur", "B. G. Malathi", "Yogender P.", "Niraj Kumari", "Shruti Gupta", "Indu R. Nair", "Vidya C.", "Basumitra Das", "Sunil Kumar Komanapalli", "Ravindra Karle", "Tanaya Kulkarni", "Vandana Raphael", "Biswajit Dey", "Vaishali Gaikwad", "Nilam Adhav"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u591a\u4e2d\u5fc3\u4e73\u817a\u7ec6\u9488\u7a7f\u523a\u7ec6\u80de\u5b66\uff08FNAC\uff09\u5168\u5207\u7247\u56fe\u50cf\u6570\u636e\u96c6\uff0c\u5305\u542b470\u5f20WSI\u548c7398\u4e2a\u4e13\u5bb6\u6807\u6ce8\u7684\u56fe\u50cf\u5757\uff0c\u8986\u76d6C1\u81f3C5\u4e94\u7ea7\u62a5\u544a\u7c7b\u522b\uff0c\u7528\u4e8eAI\u8f85\u52a9\u7684\u75c5\u7406\u5206\u7c7b\u7814\u7a76\u3002\u6570\u636e\u96c6\u7ea6950GB\uff0c\u5df2\u516c\u5f00\u53d1\u5e03\u4e8eZenodo\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30209", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5206\u6790", "\u7ec6\u80de\u75c5\u7406\u5b66", "\u5168\u5207\u7247\u56fe\u50cf", "\u6570\u636e\u96c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30209v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A Multi Center Breast FNAC Whole-Slide Cytology Dataset for AI-Assisted Patch-Wise Classification Using C1 to C5 Reporting Categories", "tldr": "\u63d0\u51fa\u4e00\u4e2a\u591a\u4e2d\u5fc3\u4e73\u817a\u7ec6\u9488\u7a7f\u523a\u7ec6\u80de\u5b66\uff08FNAC\uff09\u5168\u5207\u7247\u56fe\u50cf\u6570\u636e\u96c6\uff0c\u5305\u542b470\u5f20WSI\u548c7398\u4e2a\u4e13\u5bb6\u6807\u6ce8\u7684\u56fe\u50cf\u5757\uff0c\u8986\u76d6C1\u81f3C5\u4e94\u7ea7\u62a5\u544a\u7c7b\u522b\uff0c\u7528\u4e8eAI\u8f85\u52a9\u7684\u75c5\u7406\u5206\u7c7b\u7814\u7a76\u3002\u6570\u636e\u96c6\u7ea6950GB\uff0c\u5df2\u516c\u5f00\u53d1\u5e03\u4e8eZenodo\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern Artificial Intelligence is often framed as limited by its own disembodiment, as if giving it a body would unlock its true potential. We argue to the contrary that it is the Data Centre that is, in many cases, the body of the AI. At the same time, the Data Centre is part of the labouring body of Capital and possesses staggering organismic qualities when seen through a biological lens. We elucidate the organic analogy and identify the many-body problem that stems from the Data Centre being a non-unique, universal form of embodiment. We identify the intimate connection between computation and human desires in how the Data Centre archives, serves, and computes on data born to the desires of humans. Strikingly, while the Data Centre echoes the ghosts of human desires, it acts without desire of its own. The organismic analogy begins to split at its seams, but Capital does not care. Automata and human labour are priced into the market much the same. We argue that through the pricing of artificial intelligence Capital distils most clearly the value of intelligence and allows for its comparison across the organism - mechanism divide.", "arxiv_id": "2606.30206", "arxiv_url": "https://arxiv.org/abs/2606.30206", "authors": ["Marcin Korecki", "Cesare Carissimo"], "brief": "\u672c\u6587\u53cd\u9a73AI\u56e0\u7f3a\u4e4f\u5b9e\u4f53\u800c\u53d7\u9650\u7684\u89c2\u70b9\uff0c\u8ba4\u4e3a\u6570\u636e\u4e2d\u5fc3\u672c\u8eab\u5c31\u662fAI\u7684\"\u8eab\u4f53\"\uff0c\u540c\u65f6\u4e5f\u662f\u8d44\u672c\u52b3\u52a8\u4f53\u7cfb\u7684\u4e00\u90e8\u5206\u3002\u901a\u8fc7\u751f\u7269\u6709\u673a\u4f53\u7c7b\u6bd4\uff0c\u63a2\u8ba8\u6570\u636e\u4e2d\u5fc3\u5982\u4f55\u5b58\u6863\u5e76\u670d\u52a1\u4e8e\u4eba\u7c7b\u6b32\u671b\uff0c\u5e76\u6307\u51fa\u8d44\u672c\u901a\u8fc7AI\u5b9a\u4ef7\u5c06\u667a\u80fd\u4ef7\u503c\u8de8\u8d8a\u6709\u673a\u4f53\u4e0e\u673a\u5236\u7684\u8fb9\u754c\u8fdb\u884c\u6bd4\u8f83\u3002", "categories": ["cs.AI", "cs.CY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30206", "impact_score": 4, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4eba\u5de5\u667a\u80fd", "\u6570\u636e\u4e2d\u5fc3", "\u8d44\u672c\u4e0e\u52b3\u52a8", "\u5177\u8eab\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30206v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Many-Body Problem of the Data Centre", "tldr": "\u672c\u6587\u53cd\u9a73AI\u56e0\u7f3a\u4e4f\u5b9e\u4f53\u800c\u53d7\u9650\u7684\u89c2\u70b9\uff0c\u8ba4\u4e3a\u6570\u636e\u4e2d\u5fc3\u672c\u8eab\u5c31\u662fAI\u7684\"\u8eab\u4f53\"\uff0c\u540c\u65f6\u4e5f\u662f\u8d44\u672c\u52b3\u52a8\u4f53\u7cfb\u7684\u4e00\u90e8\u5206\u3002\u901a\u8fc7\u751f\u7269\u6709\u673a\u4f53\u7c7b\u6bd4\uff0c\u63a2\u8ba8\u6570\u636e\u4e2d\u5fc3\u5982\u4f55\u5b58\u6863\u5e76\u670d\u52a1\u4e8e\u4eba\u7c7b\u6b32\u671b\uff0c\u5e76\u6307\u51fa\u8d44\u672c\u901a\u8fc7AI\u5b9a\u4ef7\u5c06\u667a\u80fd\u4ef7\u503c\u8de8\u8d8a\u6709\u673a\u4f53\u4e0e\u673a\u5236\u7684\u8fb9\u754c\u8fdb\u884c\u6bd4\u8f83\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper offers an in-depth analysis of non-sequential multimodal sentence-level embeddings, with a particular focus on the SONAR model. We demonstrate that certain embedding dimensions are sensitive to perturbations and can serve as indicators of decoding anomalies. By leveraging the consistency between successive encoding and decoding, we successfully build an accurate detector. Additionally, we explore modifying specific dimensions of interest to attempt to correct them. This work underscores the importance of understanding and analyzing the embeddings themselves to enhance the reliability of multimodal representations.", "arxiv_id": "2606.30196", "arxiv_url": "https://arxiv.org/abs/2606.30196", "authors": ["Elys Allesiardo", "Antoine Caubri\u00e8re", "Valentin Vielzeuf"], "brief": "\u672c\u6587\u6df1\u5165\u5206\u6790\u4e86\u975e\u987a\u5e8f\u591a\u6a21\u6001\u53e5\u5b50\u7ea7\u5d4c\u5165\uff08\u4ee5SONAR\u6a21\u578b\u4e3a\u91cd\u70b9\uff09\uff0c\u53d1\u73b0\u67d0\u4e9b\u5d4c\u5165\u7ef4\u5ea6\u5bf9\u6270\u52a8\u654f\u611f\uff0c\u53ef\u4f5c\u4e3a\u89e3\u7801\u5f02\u5e38\u7684\u6307\u793a\u5668\u3002\u901a\u8fc7\u5229\u7528\u8fde\u7eed\u7f16\u89e3\u7801\u4e4b\u95f4\u7684\u4e00\u81f4\u6027\uff0c\u6210\u529f\u6784\u5efa\u4e86\u9ad8\u7cbe\u5ea6\u5f02\u5e38\u68c0\u6d4b\u5668\uff0c\u5e76\u5c1d\u8bd5\u4fee\u6b63\u7279\u5b9a\u7ef4\u5ea6\u4ee5\u7ea0\u6b63\u5f02\u5e38\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG", "eess.AS"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30196", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u53e5\u5b50\u5d4c\u5165", "\u5f02\u5e38\u68c0\u6d4b", "\u8bed\u97f3\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30196v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Forewarned is Forearmed: When Non-Sequential Embedding Turns Into an Anomaly Detector", "tldr": "\u672c\u6587\u6df1\u5165\u5206\u6790\u4e86\u975e\u987a\u5e8f\u591a\u6a21\u6001\u53e5\u5b50\u7ea7\u5d4c\u5165\uff08\u4ee5SONAR\u6a21\u578b\u4e3a\u91cd\u70b9\uff09\uff0c\u53d1\u73b0\u67d0\u4e9b\u5d4c\u5165\u7ef4\u5ea6\u5bf9\u6270\u52a8\u654f\u611f\uff0c\u53ef\u4f5c\u4e3a\u89e3\u7801\u5f02\u5e38\u7684\u6307\u793a\u5668\u3002\u901a\u8fc7\u5229\u7528\u8fde\u7eed\u7f16\u89e3\u7801\u4e4b\u95f4\u7684\u4e00\u81f4\u6027\uff0c\u6210\u529f\u6784\u5efa\u4e86\u9ad8\u7cbe\u5ea6\u5f02\u5e38\u68c0\u6d4b\u5668\uff0c\u5e76\u5c1d\u8bd5\u4fee\u6b63\u7279\u5b9a\u7ef4\u5ea6\u4ee5\u7ea0\u6b63\u5f02\u5e38\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Sim-to-real transfer remains a major obstacle for reinforcement learning (RL), especially for vision-based control where image observations exacerbate the state-distribution shift between simulation and the real world. Domain adaptation (DA) is a promising remedy for this challenge. Prior sim-to-real DA works have demonstrated encouraging results, yet these approaches typically assume substantially more target data, which is not available in practice. Indeed, their performance degrades significantly when the target data budget is reduced. To address this challenge, we propose AIDA (Adaptive Imagination for Domain Adaptation), a domain adaptation framework for visual reinforcement learning that addresses sim-to-real transfer under scarce target data without requiring additional interaction with the target environment. Our key idea is adaptive imagination: generating reliable and semantic imagination rollouts to augment limited target data. Specifically, AIDA employs a distribution-shift-aware discriminator that truncates rollouts when imagined transitions drift into low-confidence regions, so that only reliable transitions contribute to the augmentation. On these reliable transitions, AIDA introduces a self-consistency loss that cycles through state -\u003e image observation -\u003e state, penalizing discrepancies between the original and reconstructed states. This provides additional adaptation signals beyond the scarce target data. Our experiments demonstrate that adaptive imagination effectively truncates unreliable rollouts. By enforcing a self-consistency loss on the resulting reliable transitions, AIDA learns semantically meaningful state representations and outperforms baselines across five MuJoCo tasks and two Gymnasium-Robotics tasks.", "arxiv_id": "2606.30192", "arxiv_url": "https://arxiv.org/abs/2606.30192", "authors": ["Hyunwoo Park", "Sang-Hyun Lee"], "brief": "\u63d0\u51faAIDA\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u9002\u5e94\u60f3\u8c61\u751f\u6210\u53ef\u9760\u7684\u865a\u62df\u8f68\u8ff9\u6765\u6269\u5145\u7a00\u7f3a\u76ee\u6807\u57df\u6570\u636e\uff0c\u89e3\u51b3\u89c6\u89c9\u5f3a\u5316\u5b66\u4e60\u4e2dsim-to-real\u8fc1\u79fb\u95ee\u9898\u3002\u5229\u7528\u5206\u5e03\u504f\u79fb\u611f\u77e5\u5224\u522b\u5668\u622a\u65ad\u4f4e\u7f6e\u4fe1\u5ea6\u8f6c\u6362\uff0c\u5e76\u5f15\u5165\u81ea\u4e00\u81f4\u6027\u635f\u5931\u63d0\u5347\u72b6\u6001\u8868\u793a\u8d28\u91cf\uff0c\u5728\u591a\u4e2aMuJoCo\u548c\u673a\u5668\u4eba\u4efb\u52a1\u4e0a\u8d85\u8d8a\u57fa\u7ebf\u65b9\u6cd5\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30192", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u57df\u9002\u5e94", "sim-to-real\u8fc1\u79fb", "\u89c6\u89c9\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30192v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Domain Adaptation with Adaptive Imagination for Visual Reinforcement Learning under Limited Target Data", "tldr": "\u63d0\u51faAIDA\u6846\u67b6\uff0c\u901a\u8fc7\u81ea\u9002\u5e94\u60f3\u8c61\u751f\u6210\u53ef\u9760\u7684\u865a\u62df\u8f68\u8ff9\u6765\u6269\u5145\u7a00\u7f3a\u76ee\u6807\u57df\u6570\u636e\uff0c\u89e3\u51b3\u89c6\u89c9\u5f3a\u5316\u5b66\u4e60\u4e2dsim-to-real\u8fc1\u79fb\u95ee\u9898\u3002\u5229\u7528\u5206\u5e03\u504f\u79fb\u611f\u77e5\u5224\u522b\u5668\u622a\u65ad\u4f4e\u7f6e\u4fe1\u5ea6\u8f6c\u6362\uff0c\u5e76\u5f15\u5165\u81ea\u4e00\u81f4\u6027\u635f\u5931\u63d0\u5347\u72b6\u6001\u8868\u793a\u8d28\u91cf\uff0c\u5728\u591a\u4e2aMuJoCo\u548c\u673a\u5668\u4eba\u4efb\u52a1\u4e0a\u8d85\u8d8a\u57fa\u7ebf\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "How does an agent that can tell self from world come to be durably shaped by that distinction? Recent work shows that a predictive system can detect its own agency (Ye, 2026), but detecting agency does not explain durable, self-shaped behavior. We show that agency-gated slow credit -- a conjunctive term Own*Agency*Salience driving a slow parameter update -- produces post-unload behavioral residue: on a spiking substrate (Nengo LIF/PES), a learned self-preserving choice survives episodic buffer removal (retained fraction 0.96, N=50) and collapses when the slow decoders are reset or the agency gate is removed. Reproducing the agency comparator and toggling only the slow-credit channel, we find a clean dissociation: at matched agency gain, durable behavior develops only when self-credit performs slow work (post-unload self-preservation 1.00 vs 0.00). The same dissociation holds in 24-dimensional partially-observed control (0.74 vs 0.00), and a plastic-work analysis shows that basin deformation equals net self-credit work. Across eight sequentially-learned tasks under exogenous interference, the multiplicative veto also prevents forgetting: it retains old tasks (final post-unload accuracy 0.88, forgetting 0.13) where additive pooling collapses to chance-level recall, the no-agency ablation falls below chance, and episodic/replay baselines stay near chance after unload -- all with no replay buffer and no task-boundary-dependent protection mechanism (N=50). We formalize the durable residue as an operational behavioral self and argue that self-caused credit doing slow work is a necessary building block for agents that develop a self. No claim of consciousness is made.", "arxiv_id": "2606.30191", "arxiv_url": "https://arxiv.org/abs/2606.30191", "authors": ["Haoliang Han"], "brief": "\u7814\u7a76\u63d0\u51fa\"\u81ea\u56e0\u4fe1\u7528\"\u673a\u5236\uff08Own\u00d7Agency\u00d7Salience\u9a71\u52a8\u6162\u901f\u53c2\u6570\u66f4\u65b0\uff09\uff0c\u5728\u8109\u51b2\u795e\u7ecf\u7f51\u7edc\u667a\u80fd\u4f53\u4e2d\u5b9e\u73b0\u6301\u4e45\u7684\u81ea\u6211\u4fdd\u62a4\u884c\u4e3a\uff1a\u5373\u4f7f\u6e05\u9664\u60c5\u8282\u7f13\u51b2\u533a\u540e\u884c\u4e3a\u4ecd\u9ad8\u5ea6\u4fdd\u7559\uff080.96\uff09\uff0c\u4e14\u57288\u4e2a\u5e8f\u5217\u4efb\u52a1\u4e2d\u6709\u6548\u9632\u6b62\u707e\u96be\u6027\u9057\u5fd8\uff08\u9057\u5fd8\u7387\u4ec50.13\uff09\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u68c0\u6d4b\u81ea\u6211\u80fd\u52a8\u6027\u4e0e\u5f62\u6210\u6301\u4e45\u81ea\u6211\u884c\u4e3a\u4e4b\u95f4\u5b58\u5728\u6e05\u6670\u89e3\u79bb\uff0c\u6162\u901f\u81ea\u56e0\u4fe1\u7528\u662f\u6784\u5efa\"\u884c\u4e3a\u81ea\u6211\"\u7684\u5fc5\u8981\u673a\u5236\u3002", "categories": ["cs.AI", "cs.LG", "cs.NE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30191", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8109\u51b2\u795e\u7ecf\u7f51\u7edc", "\u6301\u7eed\u5b66\u4e60", "\u81ea\u6211\u5efa\u6a21"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30191v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "From Detecting Agency to Doing Work: Self-Caused Credit Builds a Durable Behavioral Self in a Minimal Spiking Agent", "tldr": "\u7814\u7a76\u63d0\u51fa\"\u81ea\u56e0\u4fe1\u7528\"\u673a\u5236\uff08Own\u00d7Agency\u00d7Salience\u9a71\u52a8\u6162\u901f\u53c2\u6570\u66f4\u65b0\uff09\uff0c\u5728\u8109\u51b2\u795e\u7ecf\u7f51\u7edc\u667a\u80fd\u4f53\u4e2d\u5b9e\u73b0\u6301\u4e45\u7684\u81ea\u6211\u4fdd\u62a4\u884c\u4e3a\uff1a\u5373\u4f7f\u6e05\u9664\u60c5\u8282\u7f13\u51b2\u533a\u540e\u884c\u4e3a\u4ecd\u9ad8\u5ea6\u4fdd\u7559\uff080.96\uff09\uff0c\u4e14\u57288\u4e2a\u5e8f\u5217\u4efb\u52a1\u4e2d\u6709\u6548\u9632\u6b62\u707e\u96be\u6027\u9057\u5fd8\uff08\u9057\u5fd8\u7387\u4ec50.13\uff09\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u68c0\u6d4b\u81ea\u6211\u80fd\u52a8\u6027\u4e0e\u5f62\u6210\u6301\u4e45\u81ea\u6211\u884c\u4e3a\u4e4b\u95f4\u5b58\u5728\u6e05\u6670\u89e3\u79bb\uff0c\u6162\u901f\u81ea\u56e0\u4fe1\u7528\u662f\u6784\u5efa\"\u884c\u4e3a\u81ea\u6211\"\u7684\u5fc5\u8981\u673a\u5236\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Existing domain-incremental learning (DIL) strategies call for massive amounts of data to adapt to new domains and suffer from the overfitting problem in the case of data scarcity. This paper puts forward a relatively uncharted problem, namely, few-shot domain incremental learning (FSDIL), taking into account the problem of extreme data shortages in the realm of DIL. A novel algorithm, namely Continual Vision-Language Consolidation (CVLC), is proposed to address the FSDIL problem, where the key idea lies in the concept of latent space reservation in the base domain coupled with dual coalescent projection (DCP) as a parameter-efficient fine-tuning method. First, the vision prototype is calibrated while multiple templates and synonyms are generated via LLMs to induce the language prototype. The vision and language prototypes are fused. Adaptation to never-ending arrivals of new domains is done by the DCP technique, fine-tuned in such a way to prepare the model to unseen domains via latent-space reservations committed in the base domain. CVLC is structured under shared and domain-specific components to combine general knowledge and domain-specific details. The advantage of our approach is demonstrated through a range of benchmark problems and comparisons with prior arts, in which CVLC outperforms them by up to a 16% gap. Our codes are shared publicly in https://github.com/Naeem-Paeedeh/CVLC .", "arxiv_id": "2606.30190", "arxiv_url": "https://arxiv.org/abs/2606.30190", "authors": ["Naeem Paeedeh", "Mahardhika Pratama", "Wolfgang Mayer", "Mukesh Prasad", "Weiping Ding", "Yew-Soon Ong"], "brief": "\u63d0\u51fa\u5c11\u6837\u672c\u57df\u589e\u91cf\u5b66\u4e60\uff08FSDIL\uff09\u95ee\u9898\uff0c\u5e76\u8bbe\u8ba1\u4e86\u6301\u7eed\u89c6\u89c9-\u8bed\u8a00\u6574\u5408\u7b97\u6cd5\uff08CVLC\uff09\uff0c\u901a\u8fc7\u57fa\u57df\u6f5c\u7a7a\u95f4\u9884\u7559\u4e0e\u53cc\u805a\u5408\u6295\u5f71\uff08DCP\uff09\u5fae\u8c03\u6280\u672f\uff0c\u7ed3\u5408\u89c6\u89c9\u4e0e\u8bed\u8a00\u539f\u578b\u878d\u5408\uff0c\u5728\u6570\u636e\u6781\u5ea6\u7a00\u7f3a\u573a\u666f\u4e0b\u5b9e\u73b0\u6301\u7eed\u57df\u9002\u5e94\uff0c\u6027\u80fd\u6700\u9ad8\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd516%\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30190", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u57df\u589e\u91cf\u5b66\u4e60", "\u5c11\u6837\u672c\u5b66\u4e60", "\u591a\u6a21\u6001", "\u6301\u7eed\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30190v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Few-Shot Domain Incremental Learning via Continual Vision-Language Consolidation", "tldr": "\u63d0\u51fa\u5c11\u6837\u672c\u57df\u589e\u91cf\u5b66\u4e60\uff08FSDIL\uff09\u95ee\u9898\uff0c\u5e76\u8bbe\u8ba1\u4e86\u6301\u7eed\u89c6\u89c9-\u8bed\u8a00\u6574\u5408\u7b97\u6cd5\uff08CVLC\uff09\uff0c\u901a\u8fc7\u57fa\u57df\u6f5c\u7a7a\u95f4\u9884\u7559\u4e0e\u53cc\u805a\u5408\u6295\u5f71\uff08DCP\uff09\u5fae\u8c03\u6280\u672f\uff0c\u7ed3\u5408\u89c6\u89c9\u4e0e\u8bed\u8a00\u539f\u578b\u878d\u5408\uff0c\u5728\u6570\u636e\u6781\u5ea6\u7a00\u7f3a\u573a\u666f\u4e0b\u5b9e\u73b0\u6301\u7eed\u57df\u9002\u5e94\uff0c\u6027\u80fd\u6700\u9ad8\u8d85\u8d8a\u73b0\u6709\u65b9\u6cd516%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Generative molecular design is shaped by simple proxy benchmarks for drug-like properties and models pretrained on large pharmaceutical datasets. This combination yields strong benchmark metrics but limits transferability to domains structurally distinct from drug discovery. To overcome this limitation and drive discovery toward real, scientifically grounded targets, we introduce the Nanotechnology Molecular Optimization (NMO) Benchmark, which bridges machine learning (ML) and quantum materials science. NMO acts simultaneously as a rigorous testbed for the ML community and a discovery engine for nanotechnology research. The suite replaces proxy oracles with quantum simulations and introduces strict protocols that prioritize scientific utility over leaderboard-oriented overfitting. The physics-based NMO tasks impose hard structural constraints and rugged fitness landscapes, posing fundamentally new requirements on generative models. Notably, advanced molecular optimization methods underperform much simpler approaches on the NMO tasks. We develop a new baseline method identifying the critical components to solve the NMO tasks, including a novel representation for modeling structural constraints and a domain-agnostic pretraining strategy to eliminate pharmaceutical dataset bias. Our results surpass state-of-the-art physical properties and reveal previously unknown structural motifs, offering new insights for the nanotechnology community and demonstrating that ML can drive genuine scientific discovery.", "arxiv_id": "2606.30170", "arxiv_url": "https://arxiv.org/abs/2606.30170", "authors": ["Matthias Blaschke", "Daniel Kienzle", "Zsuzsanna Koczor-Benda", "Julian Lorenz", "Rainer Lienhart", "Fabian Pauly"], "brief": "\u63d0\u51fa\u7eb3\u7c73\u6280\u672f\u5206\u5b50\u4f18\u5316\uff08NMO\uff09\u57fa\u51c6\uff0c\u7528\u91cf\u5b50\u6a21\u62df\u66ff\u4ee3\u4f20\u7edf\u836f\u7269\u4ee3\u7406\u51fd\u6570\uff0c\u89e3\u51b3\u751f\u6210\u5f0f\u5206\u5b50\u8bbe\u8ba1\u8fc7\u5ea6\u4f9d\u8d56\u836f\u7269\u6570\u636e\u96c6\u7684\u5c40\u9650\u6027\u3002\u65b0\u57fa\u51c6\u5f15\u5165\u4e25\u683c\u7269\u7406\u7ea6\u675f\u548c\u5d0e\u5c96\u9002\u5e94\u5ea6\u666f\u89c2\uff0c\u53d1\u73b0\u73b0\u6709\u5148\u8fdb\u65b9\u6cd5\u53cd\u800c\u4e0d\u5982\u7b80\u5355\u65b9\u6cd5\uff0c\u5e76\u5f00\u53d1\u4e86\u65b0\u57fa\u7ebf\u65b9\u6cd5\uff0c\u63ed\u793a\u4e86\u672a\u77e5\u7ed3\u6784\u57fa\u5e8f\uff0c\u63a8\u52a8\u4e86\u771f\u5b9e\u79d1\u5b66\u53d1\u73b0\u3002", "categories": ["cs.LG", "cond-mat.mes-hall", "cond-mat.mtrl-sci", "cs.AI", "cs.CE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30170", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5206\u5b50\u4f18\u5316", "\u751f\u6210\u6a21\u578b", "\u91cf\u5b50\u6750\u6599", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30170v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Drug Discovery: The Nanotechnology Molecular Optimization (NMO) Benchmark", "tldr": "\u63d0\u51fa\u7eb3\u7c73\u6280\u672f\u5206\u5b50\u4f18\u5316\uff08NMO\uff09\u57fa\u51c6\uff0c\u7528\u91cf\u5b50\u6a21\u62df\u66ff\u4ee3\u4f20\u7edf\u836f\u7269\u4ee3\u7406\u51fd\u6570\uff0c\u89e3\u51b3\u751f\u6210\u5f0f\u5206\u5b50\u8bbe\u8ba1\u8fc7\u5ea6\u4f9d\u8d56\u836f\u7269\u6570\u636e\u96c6\u7684\u5c40\u9650\u6027\u3002\u65b0\u57fa\u51c6\u5f15\u5165\u4e25\u683c\u7269\u7406\u7ea6\u675f\u548c\u5d0e\u5c96\u9002\u5e94\u5ea6\u666f\u89c2\uff0c\u53d1\u73b0\u73b0\u6709\u5148\u8fdb\u65b9\u6cd5\u53cd\u800c\u4e0d\u5982\u7b80\u5355\u65b9\u6cd5\uff0c\u5e76\u5f00\u53d1\u4e86\u65b0\u57fa\u7ebf\u65b9\u6cd5\uff0c\u63ed\u793a\u4e86\u672a\u77e5\u7ed3\u6784\u57fa\u5e8f\uff0c\u63a8\u52a8\u4e86\u771f\u5b9e\u79d1\u5b66\u53d1\u73b0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Federated learning typically aggregates client updates using fixed or heuristic weighting rules, which can be suboptimal when clients have heterogeneous data and varying contributions to the global model. We propose a framework that refines client aggregation weights using Conditional Random Fields (CRFs). Our method defines unary potentials for individual clients and pairwise potentials for all client pairs, allowing the server to model both client-specific reliability and interactions between clients. The resulting CRF inference produces aggregation weights that enable better convergence of the global training objective. Experiments show that, under non-IID heterogeneity, our approach consistently improves performance over well-established federated learning baselines.", "arxiv_id": "2606.30161", "arxiv_url": "https://arxiv.org/abs/2606.30161", "authors": ["Dario Fenoglio", "Daniil Kirilenko", "Martin Gjoreski", "Marc Langheinrich"], "brief": "\u63d0\u51fa\u57fa\u4e8e\u6761\u4ef6\u968f\u673a\u573a\uff08CRF\uff09\u7684\u8054\u90a6\u5b66\u4e60\u805a\u5408\u6846\u67b6\uff0c\u901a\u8fc7\u5efa\u6a21\u5ba2\u6237\u7aef\u7684\u4e00\u5143\u52bf\u548c\u6210\u5bf9\u52bf\u6765\u63a8\u65ad\u6700\u4f18\u805a\u5408\u6743\u91cd\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u975e\u72ec\u7acb\u540c\u5206\u5e03\u7684\u5f02\u6784\u6570\u636e\u573a\u666f\u4e0b\uff0c\u8be5\u65b9\u6cd5\u76f8\u6bd4\u4e3b\u6d41\u8054\u90a6\u5b66\u4e60\u57fa\u7ebf\u6301\u7eed\u63d0\u5347\u5168\u5c40\u6a21\u578b\u6027\u80fd\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30161", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8054\u90a6\u5b66\u4e60", "\u6761\u4ef6\u968f\u673a\u573a", "\u5f02\u6784\u6570\u636e", "\u6982\u7387\u63a8\u65ad"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30161v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Federated Learning with Energy-Based Structured Probabilistic Inference", "tldr": "\u63d0\u51fa\u57fa\u4e8e\u6761\u4ef6\u968f\u673a\u573a\uff08CRF\uff09\u7684\u8054\u90a6\u5b66\u4e60\u805a\u5408\u6846\u67b6\uff0c\u901a\u8fc7\u5efa\u6a21\u5ba2\u6237\u7aef\u7684\u4e00\u5143\u52bf\u548c\u6210\u5bf9\u52bf\u6765\u63a8\u65ad\u6700\u4f18\u805a\u5408\u6743\u91cd\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u975e\u72ec\u7acb\u540c\u5206\u5e03\u7684\u5f02\u6784\u6570\u636e\u573a\u666f\u4e0b\uff0c\u8be5\u65b9\u6cd5\u76f8\u6bd4\u4e3b\u6d41\u8054\u90a6\u5b66\u4e60\u57fa\u7ebf\u6301\u7eed\u63d0\u5347\u5168\u5c40\u6a21\u578b\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Wrist-worn photoplethysmography (PPG) enables continuous monitoring of cardiopulmonary physiology, but reliable heart rate (HR) and respiratory rate (RR) estimation in free-living conditions remains challenging due to non-stationary motion artifacts that spectrally overlap with physiological dynamics. Existing signal-processing methods degrade under strong motion, while unconstrained deep learning approaches often lack physiological interpretability and identifiable structure. We propose a Physically-Constrained Harmonic Separation (PCHS) framework that formulates HR and RR estimation from wrist PPG as an analysis-by-synthesis problem, where accelerometer measurements condition artifact separation rather than directly regressing vital signs. A physics-guided harmonic generator decomposes the observed signal into quasi-periodic physiological components and a motion-related residual, enabling HR recovery from the fundamental frequency and RR prediction from respiratory-driven modulations of the harmonic parameters. Robust reconstruction objectives, separation constraints, and uncertainty-aware weighting stabilize the decomposition under motion. Experiments on the motion-intensive PPG-DaLiA dataset demonstrate that PCHS outperforms state-of-the-art methods while yielding interpretable signal decompositions that effectively disentangle physiological activity from motion artifacts.", "arxiv_id": "2606.30156", "arxiv_url": "https://arxiv.org/abs/2606.30156", "authors": ["Nouhaila Fraihi", "Ouassim Karrakchou", "Mounir Ghogho"], "brief": "\u63d0\u51fa\u7269\u7406\u7ea6\u675f\u8c10\u6ce2\u5206\u79bb\uff08PCHS\uff09\u6846\u67b6\uff0c\u5c06\u8155\u90e8PPG\u4fe1\u53f7\u7684\u5fc3\u7387\u548c\u547c\u5438\u7387\u4f30\u8ba1\u5efa\u6a21\u4e3a\u5206\u6790-\u5408\u6210\u95ee\u9898\uff0c\u5229\u7528\u52a0\u901f\u5ea6\u8ba1\u6761\u4ef6\u5316\u4f2a\u5f71\u5206\u79bb\u800c\u975e\u76f4\u63a5\u56de\u5f52\u751f\u547d\u4f53\u5f81\u3002\u5728\u8fd0\u52a8\u5bc6\u96c6\u578bPPG-DaLiA\u6570\u636e\u96c6\u4e0a\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\uff0c\u540c\u65f6\u63d0\u4f9b\u53ef\u89e3\u91ca\u7684\u4fe1\u53f7\u5206\u89e3\u7ed3\u679c\u3002", "categories": ["physics.med-ph", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30156", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u751f\u7406\u4fe1\u53f7\u5904\u7406", "\u6df1\u5ea6\u5b66\u4e60", "\u53ef\u7a7f\u6234\u8bbe\u5907", "\u7269\u7406\u7ea6\u675f\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30156v1",   const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
