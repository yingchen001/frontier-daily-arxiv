const PAPERS = [{"abstract": "While Large Language Models (LLMs) excel as static solvers, transforming them into autonomous agents remains challenging. This transition requires continuous environmental interaction, yet current agents lack the necessary persistent procedural memory. Existing approaches predominantly employ Retrieval-Augmented Generation (RAG) to inject explicit textual guidelines into model contexts. However, relying solely on symbolic instructions can introduce a text-action disconnect, frequently failing to activate the internal representations necessary for correct task execution. To address this, the paper introduces Neural Procedural Memory (NPM), a training-free framework that represents agent memory through implicit activation steering rather than explicit instructions. By distilling procedural skills from historical contrastive experiences into steering vectors in the activation space, NPM directly activates the task-relevant neural mechanisms to guide task execution. Evaluations across four agent benchmarks show that NPM performs comparably to baselines using explicit textual instructions. Furthermore, the results show that combining implicit steering with explicit workflows provides complementary advantages, leading to more robust task execution. Representational analyses indicate that these steering vectors encode consistent task logic, forming organized structures within the activation space. These findings suggest that implicit activation steering provides a promising approach for managing agent memory.", "arxiv_id": "2606.29824", "arxiv_url": "https://arxiv.org/abs/2606.29824", "authors": ["Chengfeng Zhao", "Yuqiao Tan", "Shizhu He", "Yequan Wang", "Jun Zhao", "Kang Liu"], "brief": "\u672c\u6587\u63d0\u51fa\u795e\u7ecf\u7a0b\u5e8f\u6027\u8bb0\u5fc6\uff08NPM\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u6846\u67b6\uff0c\u901a\u8fc7\u4ece\u5386\u53f2\u5bf9\u6bd4\u7ecf\u9a8c\u4e2d\u63d0\u70bc\u7a0b\u5e8f\u6280\u80fd\u5e76\u8f6c\u5316\u4e3a\u6fc0\u6d3b\u7a7a\u95f4\u4e2d\u7684\u5f15\u5bfc\u5411\u91cf\uff0c\u4ee5\u9690\u5f0f\u65b9\u5f0f\u6fc0\u6d3bLLM\u5185\u90e8\u76f8\u5173\u795e\u7ecf\u673a\u5236\u6765\u6307\u5bfc\u4efb\u52a1\u6267\u884c\uff0c\u800c\u975e\u4f9d\u8d56\u663e\u5f0f\u6587\u672c\u6307\u4ee4\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29824", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u65e0\u9700\u8bad\u7ec3\uff1a\u4ece\u5386\u53f2\u5bf9\u6bd4\u7ecf\u9a8c\u4e2d\u84b8\u998f\u7a0b\u5e8f\u6280\u80fd\uff0c\u751f\u6210\u6fc0\u6d3b\u7a7a\u95f4\u4e2d\u7684\u5f15\u5bfc\u5411\u91cf\uff08steering vectors\uff09", "\u5728\u56db\u4e2a\u667a\u80fd\u4f53\u57fa\u51c6\u6d4b\u8bd5\u4e0a\uff0cNPM\u6027\u80fd\u4e0e\u57fa\u4e8e\u663e\u5f0f\u6587\u672c\u6307\u4ee4\u7684\u57fa\u7ebf\u76f8\u5f53", "\u9690\u5f0f\u5f15\u5bfc\u4e0e\u663e\u5f0f\u5de5\u4f5c\u6d41\u7ed3\u5408\u53ef\u4ea7\u751f\u4e92\u8865\u4f18\u52bf\uff0c\u63d0\u5347\u4efb\u52a1\u6267\u884c\u9c81\u68d2\u6027\uff1b\u8868\u5f81\u5206\u6790\u8868\u660e\u5f15\u5bfc\u5411\u91cf\u5728\u6fc0\u6d3b\u7a7a\u95f4\u4e2d\u5f62\u6210\u6709\u7ec4\u7ec7\u7684\u7ed3\u6784"], "keywords": ["\u667a\u80fd\u4f53", "\u6fc0\u6d3b\u5f15\u5bfc", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8bb0\u5fc6\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29824v1", "published_at": "2026-06-29", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Neural Procedural Memory: Empowering LLM Agents with Implicit Activation Steering", "tldr": "\u63d0\u51faNPM\u6846\u67b6\uff0c\u7528\u9690\u5f0f\u6fc0\u6d3b\u5f15\u5bfc\u5411\u91cf\u66ff\u4ee3\u663e\u5f0f\u6587\u672c\u6307\u4ee4\u5b9e\u73b0LLM\u667a\u80fd\u4f53\u7684\u7a0b\u5e8f\u6027\u8bb0\u5fc6", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u795e\u7ecf\u7a0b\u5e8f\u6027\u8bb0\u5fc6\uff08NPM\uff09\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u6846\u67b6\uff0c\u901a\u8fc7\u4ece\u5386\u53f2\u5bf9\u6bd4\u7ecf\u9a8c\u4e2d\u63d0\u70bc\u7a0b\u5e8f\u6280\u80fd\u5e76\u8f6c\u5316\u4e3a\u6fc0\u6d3b\u7a7a\u95f4\u4e2d\u7684\u5f15\u5bfc\u5411\u91cf\uff0c\u4ee5\u9690\u5f0f\u65b9\u5f0f\u6fc0\u6d3bLLM\u5185\u90e8\u76f8\u5173\u795e\u7ecf\u673a\u5236\u6765\u6307\u5bfc\u4efb\u52a1\u6267\u884c\uff0c\u800c\u975e\u4f9d\u8d56\u663e\u5f0f\u6587\u672c\u6307\u4ee4\u3002", "why_notable": "\u9996\u6b21\u5c06\u6fc0\u6d3b\u5f15\u5bfc\uff08activation steering\uff09\u5f15\u5165LLM\u667a\u80fd\u4f53\u7684\u7a0b\u5e8f\u6027\u8bb0\u5fc6\u7ba1\u7406\uff0c\u7a81\u7834\u4e86RAG\u4f9d\u8d56\u7b26\u53f7\u6307\u4ee4\u5bfc\u81f4\u7684\u6587\u672c-\u884c\u52a8\u8131\u8282\u95ee\u9898\uff0c\u4e3a\u667a\u80fd\u4f53\u6301\u4e45\u8bb0\u5fc6\u63d0\u4f9b\u4e86\u5168\u65b0\u7684\u9690\u5f0f\u8868\u5f81\u8303\u5f0f\u3002"}, {"abstract": "AI models are rapidly improving at autonomous coding, as shown by benchmark progress and one-off demonstrations such as AI implementing a C compiler. However, existing coding benchmarks tend to focus on shorter tasks, and one-off demonstrations are hard to compare systematically because they often have some human guidance, and are not standardized or repeated across models. To address these challenges, we introduce MirrorCode, a long-horizon coding benchmark based on reimplementing entire software projects. In MirrorCode, AI agents must replicate the functionalities of an existing program, without access to its source code. AI solutions must match the original program\u0027s output exactly on end-to-end tests, including held-out tests. MirrorCode\u0027s 25 target programs span different areas of computing: Unix utilities, data serialization and query tools, bioinformatics, interpreters, static analysis, cryptography, and compression. Existing AI models can already reimplement complex software, with the strongest model scoring 56% across the benchmark. For example, AI can reimplement gotree, a 16,000-line bioinformatics toolkit - a task that we believe would take weeks for a human engineer. However, studying the frontier of performance requires a larger inference budget than typical benchmarks, for example, \\$2,600 over 19 days for a single attempt on a large task. We show that AI agents can already complete long-horizon software engineering tasks, especially when requirements are precisely specified. More broadly, our work suggests AI will have transformative effects on software engineering, as autonomous agents continue to improve.", "arxiv_id": "2606.30182", "arxiv_url": "https://arxiv.org/abs/2606.30182", "authors": ["Tom Adamczewski", "David Owen", "David Rein", "Florian Brand", "Giles Edkins", "Allen Hart", "Daniel O\u0027Connell"], "brief": "\u63d0\u51faMirrorCode\u2014\u2014\u4e00\u4e2a\u957f\u5468\u671f\u7f16\u7a0b\u57fa\u51c6\uff0c\u8981\u6c42AI\u667a\u80fd\u4f53\u5728\u4e0d\u8bbf\u95ee\u6e90\u4ee3\u7801\u7684\u60c5\u51b5\u4e0b\uff0c\u901a\u8fc7\u7aef\u5230\u7aef\u6d4b\u8bd5\u5b8c\u6574\u590d\u73b0\u73b0\u6709\u8f6f\u4ef6\u9879\u76ee\u7684\u529f\u80fd\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30182", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5305\u542b25\u4e2a\u76ee\u6807\u7a0b\u5e8f\uff0c\u6db5\u76d6Unix\u5de5\u5177\u3001\u751f\u7269\u4fe1\u606f\u5b66\u3001\u89e3\u91ca\u5668\u3001\u5bc6\u7801\u5b66\u3001\u538b\u7f29\u7b49\u591a\u4e2a\u9886\u57df", "\u6700\u5f3a\u6a21\u578b\u5f97\u520656%\uff0c\u53ef\u590d\u73b0\u5982gotree\uff0816000\u884c\u751f\u7269\u4fe1\u606f\u5b66\u5de5\u5177\u5305\uff09\u7b49\u590d\u6742\u8f6f\u4ef6", "\u5927\u578b\u4efb\u52a1\u5355\u6b21\u5c1d\u8bd5\u8017\u8d44\u7ea62600\u7f8e\u5143\u3001\u5386\u65f619\u5929\uff0c\u63a8\u7406\u6210\u672c\u8fdc\u8d85\u5e38\u89c4\u57fa\u51c6"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u6d4b\u8bd5", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30182v1", "published_at": "2026-06-29", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MirrorCode: AI can rebuild entire programs from behavior alone", "tldr": "MirrorCode\u57fa\u51c6\u6d4b\u8bd5\uff1aAI\u4ec5\u51ed\u884c\u4e3a\u8f93\u51fa\u5373\u53ef\u4ece\u96f6\u91cd\u5efa\u5b8c\u6574\u8f6f\u4ef6\u9879\u76ee", "upvotes": 0, "what_it_is": "\u63d0\u51faMirrorCode\u2014\u2014\u4e00\u4e2a\u957f\u5468\u671f\u7f16\u7a0b\u57fa\u51c6\uff0c\u8981\u6c42AI\u667a\u80fd\u4f53\u5728\u4e0d\u8bbf\u95ee\u6e90\u4ee3\u7801\u7684\u60c5\u51b5\u4e0b\uff0c\u901a\u8fc7\u7aef\u5230\u7aef\u6d4b\u8bd5\u5b8c\u6574\u590d\u73b0\u73b0\u6709\u8f6f\u4ef6\u9879\u76ee\u7684\u529f\u80fd\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u5316\u8bc4\u4f30AI\u957f\u5468\u671f\u81ea\u4e3b\u7f16\u7a0b\u80fd\u529b\u7684\u6807\u51c6\u5316\u57fa\u51c6\uff0c\u586b\u8865\u4e86\u73b0\u6709\u77ed\u4efb\u52a1\u57fa\u51c6\u4e0e\u975e\u6807\u51c6\u5316\u4e00\u6b21\u6027\u6f14\u793a\u4e4b\u95f4\u7684\u7a7a\u767d\uff0c\u5bf9\u8bc4\u4f30AI\u5bf9\u8f6f\u4ef6\u5de5\u7a0b\u7684\u53d8\u9769\u6027\u5f71\u54cd\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "The database community has repeatedly advanced the state of the art by recognizing that new workloads demand new system architectures. We argue that long-horizon agentic tasks -- code generation, scientific discovery, hardware design -- are such a workload. These agents explore: they generate artifacts, execute tools, observe failures, branch, and repair over hundreds of steps. This search produces a structured object we call an experience graph: executable artifacts, tool outputs, rewards, sibling comparisons, and causal lineage. Yet existing agent frameworks treat this experience as disposable state -- JSON checkpoints and session logs that cannot be recovered after a crash, queried across users, or materialized into training data. We propose Trellis: a data foundation that treats the experience graph as first-class, governed, queryable database state. The core insight is that search over experience graphs is a database access pattern. Frontier selection is a query, cross-session reuse is vector-seeded graph retrieval, training-data extraction is a materialized view, and reconstructing what an agent knew at any past step is a time-travel query. When the database owns the experience graph, agents become stateless compute, and crash recovery, horizontal scaling, and a closed-loop training flywheel emerge as architectural byproducts. We ground the design in KernelEvolve, a production accelerator-kernel optimizer at Meta, where cross-session reuse reaches a target speedup roughly 10x faster at 52% lower token cost. More broadly, Trellis turns inference-time search from disposable computation into a durable institutional asset: logs made databases reliable; experience graphs may make agents cumulative.", "arxiv_id": "2606.29823", "arxiv_url": "https://arxiv.org/abs/2606.29823", "authors": ["Gang Liao", "Yujia He", "Abdullah Ozturk", "Zhouyang Li", "Ying Wang", "Zhitong Guo", "Hongsen Qin", "Yaobin Qin", "Tao Yang", "Zewei Jiang", "Dianshi Li", "Jort Gemmeke", "Jiangyuan Li", "Liyuan Li", "Nathan Yan", "Masha Basmanova", "Uladzimir Pashkevich", "Matt Steiner", "Pedro Pedreira", "Rob Fergus", "Anirudh Goyal", "Carole-Jean Wu", "Gaoxiang Liu", "Andrew Witten", "Daniel J. Abadi"], "brief": "\u672c\u6587\u63d0\u51fa\"\u7ecf\u9a8c\u56fe\"\u6982\u5ff5\uff0c\u5c06\u957f\u5468\u671f\u667a\u80fd\u4f53\u4efb\u52a1\uff08\u4ee3\u7801\u751f\u6210\u3001\u79d1\u5b66\u53d1\u73b0\u7b49\uff09\u4ea7\u751f\u7684\u5236\u54c1\u3001\u5de5\u5177\u8f93\u51fa\u3001\u5956\u52b1\u4fe1\u53f7\u548c\u56e0\u679c\u94fe\u8def\u7ed3\u6784\u5316\u5b58\u50a8\uff0c\u5e76\u8bbe\u8ba1Trellis\u6570\u636e\u5e93\u7cfb\u7edf\u5c06\u5176\u4f5c\u4e3a\u4e00\u7b49\u516c\u6c11\u8fdb\u884c\u7ba1\u7406\u3001\u67e5\u8be2\u548c\u590d\u7528\u3002", "categories": ["cs.DB", "cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29823", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u667a\u80fd\u4f53\u641c\u7d22\u8fc7\u7a0b\u62bd\u8c61\u4e3a\u6570\u636e\u5e93\u8bbf\u95ee\u6a21\u5f0f\uff1a\u524d\u6cbf\u8282\u70b9\u9009\u62e9=\u67e5\u8be2\uff0c\u8de8\u4f1a\u8bdd\u590d\u7528=\u5411\u91cf\u79cd\u5b50\u56fe\u68c0\u7d22\uff0c\u8bad\u7ec3\u6570\u636e\u63d0\u53d6=\u7269\u5316\u89c6\u56fe\uff0c\u5386\u53f2\u72b6\u6001\u91cd\u5efa=\u65f6\u95f4\u65c5\u884c\u67e5\u8be2", "\u5728Meta\u751f\u4ea7\u73af\u5883KernelEvolve\uff08\u52a0\u901f\u5668\u5185\u6838\u4f18\u5316\u5668\uff09\u4e2d\u9a8c\u8bc1\uff1a\u8de8\u4f1a\u8bdd\u590d\u7528\u4f7f\u8fbe\u5230\u76ee\u6807\u52a0\u901f\u6bd4\u7684\u901f\u5ea6\u63d0\u5347\u7ea610\u500d\uff0ctoken\u6210\u672c\u964d\u4f4e52%", "\u667a\u80fd\u4f53\u53d8\u4e3a\u65e0\u72b6\u6001\u8ba1\u7b97\u5355\u5143\uff0c\u5d29\u6e83\u6062\u590d\u3001\u6c34\u5e73\u6269\u5c55\u548c\u95ed\u73af\u8bad\u7ec3\u98de\u8f6e\u4f5c\u4e3a\u67b6\u6784\u526f\u4ea7\u54c1\u81ea\u7136\u6d8c\u73b0"], "keywords": ["\u667a\u80fd\u4f53", "\u6570\u636e\u5e93\u7cfb\u7edf", "\u5f3a\u5316\u5b66\u4e60", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29823v1", "published_at": "2026-06-29", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Experience Graphs: The Data Foundation for Self-Improving Agents", "tldr": "\u63d0\u51faTrellis\u7cfb\u7edf\uff0c\u5c06AI\u667a\u80fd\u4f53\u7684\u63a2\u7d22\u8fc7\u7a0b\u7ed3\u6784\u5316\u4e3a\u53ef\u67e5\u8be2\u7684\"\u7ecf\u9a8c\u56fe\"\u6570\u636e\u5e93\uff0c\u5b9e\u73b0\u8de8\u4f1a\u8bdd\u590d\u7528\u4e0e\u6301\u7eed\u81ea\u6211\u6539\u8fdb\u3002", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u7ecf\u9a8c\u56fe\"\u6982\u5ff5\uff0c\u5c06\u957f\u5468\u671f\u667a\u80fd\u4f53\u4efb\u52a1\uff08\u4ee3\u7801\u751f\u6210\u3001\u79d1\u5b66\u53d1\u73b0\u7b49\uff09\u4ea7\u751f\u7684\u5236\u54c1\u3001\u5de5\u5177\u8f93\u51fa\u3001\u5956\u52b1\u4fe1\u53f7\u548c\u56e0\u679c\u94fe\u8def\u7ed3\u6784\u5316\u5b58\u50a8\uff0c\u5e76\u8bbe\u8ba1Trellis\u6570\u636e\u5e93\u7cfb\u7edf\u5c06\u5176\u4f5c\u4e3a\u4e00\u7b49\u516c\u6c11\u8fdb\u884c\u7ba1\u7406\u3001\u67e5\u8be2\u548c\u590d\u7528\u3002", "why_notable": "\u9996\u6b21\u5c06\u667a\u80fd\u4f53\u63a8\u7406\u65f6\u641c\u7d22\u4ea7\u751f\u7684\u7ecf\u9a8c\u4ece\"\u4e00\u6b21\u6027\u72b6\u6001\"\u63d0\u5347\u4e3a\"\u6301\u4e45\u673a\u6784\u8d44\u4ea7\"\uff0c\u7c7b\u6bd4\u65e5\u5fd7\u4f7f\u6570\u636e\u5e93\u53ef\u9760\uff0c\u7ecf\u9a8c\u56fe\u6709\u671b\u4f7f\u667a\u80fd\u4f53\u80fd\u529b\u6301\u7eed\u7d2f\u79ef\uff0c\u5bf9\u957f\u5468\u671fAgentic\u7cfb\u7edf\u7684\u5de5\u7a0b\u5316\u843d\u5730\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Long-horizon tool agents are bottlenecked by how their context grows toward the limits of the context window. Recent systems make context management agent- or system-controlled, but they either learn a compression policy that discards evidence or manage context in a layer the agent never sees. We argue both leave a more basic gap unaddressed. Frontier language models are proprioceptively blind to their own context. From the prompt alone they cannot see how large, how old, or how used each block is, the signals a keep-or-drop decision needs. We hypothesize that competent context management is already latent in capable models, and that what is missing is not a learned policy but an interface exposing this state. We introduce VISTA (Visible Internal State for Tool Agents), a training-free, model-agnostic layer that represents working memory as typed, addressable blocks, surfaces a runtime dashboard of per-block token usage, recency, and access history, and archives blocks as recoverable full-fidelity payloads. On LOCA-Bench, BrowseComp-Plus, and GAIA, the same untrained interface transfers across million-, 100K-, and 10K-scale trajectories. On LOCA-Bench it improves four backbones and lifts Gemini-3-Flash from 22.7 to 50.7%. The lift grows with context pressure and transfers across backbones. Ablations further confirm that the dashboard matters beyond archive and recovery tools.", "arxiv_id": "2606.30005", "arxiv_url": "https://arxiv.org/abs/2606.30005", "authors": ["Binyan Xu", "Haitao Li", "Kehuan Zhang"], "brief": "\u63d0\u51faVISTA\u6846\u67b6\uff0c\u901a\u8fc7\u4e3a\u5de5\u5177\u578bLLM\u667a\u80fd\u4f53\u63d0\u4f9b\u53ef\u89c6\u5316\u8fd0\u884c\u65f6\u4eea\u8868\u76d8\uff08\u663e\u793a\u6bcf\u4e2a\u8bb0\u5fc6\u5757\u7684token\u7528\u91cf\u3001\u65f6\u6548\u6027\u548c\u8bbf\u95ee\u5386\u53f2\uff09\uff0c\u4f7f\u6a21\u578b\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u81ea\u4e3b\u7ba1\u7406\u957f\u4e0a\u4e0b\u6587\uff0c\u5c06\u6f5c\u5728\u7684\u4e0a\u4e0b\u6587\u7ba1\u7406\u80fd\u529b\u663e\u5f0f\u6fc0\u6d3b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30005", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u6d1e\u5bdf\uff1a\u524d\u6cbfLLM\u5bf9\u81ea\u8eab\u4e0a\u4e0b\u6587\u72b6\u6001\u0027\u672c\u4f53\u611f\u89c9\u76f2\u0027\uff0c\u7f3a\u4e4f\u7684\u4e0d\u662f\u538b\u7f29\u7b56\u7565\u800c\u662f\u66b4\u9732\u5185\u90e8\u72b6\u6001\u7684\u63a5\u53e3", "VISTA\u5c06\u5de5\u4f5c\u8bb0\u5fc6\u8868\u793a\u4e3a\u5e26\u7c7b\u578b\u7684\u53ef\u5bfb\u5740\u5757\uff0c\u5e76\u63d0\u4f9bper-block\u7684token\u7528\u91cf/\u65f6\u6548/\u8bbf\u95ee\u5386\u53f2\u4eea\u8868\u76d8\uff0c\u652f\u6301\u5f52\u6863\u4e0e\u5168\u4fdd\u771f\u6062\u590d", "\u5728LOCA-Bench\u4e0a\u5c06Gemini-3-Flash\u4ece22.7%\u63d0\u5347\u81f350.7%\uff0c\u6548\u679c\u968f\u4e0a\u4e0b\u6587\u538b\u529b\u589e\u5927\u800c\u589e\u5f3a\uff0c\u4e14\u8de8\u6a21\u578b\u8fc1\u79fb"], "keywords": ["\u667a\u80fd\u4f53", "\u4e0a\u4e0b\u6587\u7ba1\u7406", "\u957f\u4e0a\u4e0b\u6587", "\u5de5\u5177\u8c03\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30005v1", "published_at": "2026-06-29", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "LLM Agents Are Latent Context Managers: Eliciting Self-Managed Context via a Proprioceptive Dashboard", "tldr": "\u65e0\u9700\u8bad\u7ec3\u7684\u4e0a\u4e0b\u6587\u7ba1\u7406\u63a5\u53e3VISTA\uff0c\u8ba9LLM\u667a\u80fd\u4f53\u81ea\u4e3b\u611f\u77e5\u5e76\u7ba1\u7406\u81ea\u8eab\u5de5\u4f5c\u8bb0\u5fc6", "upvotes": 0, "what_it_is": "\u63d0\u51faVISTA\u6846\u67b6\uff0c\u901a\u8fc7\u4e3a\u5de5\u5177\u578bLLM\u667a\u80fd\u4f53\u63d0\u4f9b\u53ef\u89c6\u5316\u8fd0\u884c\u65f6\u4eea\u8868\u76d8\uff08\u663e\u793a\u6bcf\u4e2a\u8bb0\u5fc6\u5757\u7684token\u7528\u91cf\u3001\u65f6\u6548\u6027\u548c\u8bbf\u95ee\u5386\u53f2\uff09\uff0c\u4f7f\u6a21\u578b\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u81ea\u4e3b\u7ba1\u7406\u957f\u4e0a\u4e0b\u6587\uff0c\u5c06\u6f5c\u5728\u7684\u4e0a\u4e0b\u6587\u7ba1\u7406\u80fd\u529b\u663e\u5f0f\u6fc0\u6d3b\u3002", "why_notable": "\u65e0\u9700\u8bad\u7ec3\u3001\u6a21\u578b\u65e0\u5173\uff0c\u4ec5\u901a\u8fc7\u63a5\u53e3\u8bbe\u8ba1\u5373\u5927\u5e45\u63d0\u5347\u957f\u7a0b\u667a\u80fd\u4f53\u6027\u80fd\uff0c\u63ed\u793a\u4e86LLM\u4e0a\u4e0b\u6587\u7ba1\u7406\u80fd\u529b\u5df2\u6f5c\u5728\u5b58\u5728\u53ea\u9700\u6b63\u786e\u6fc0\u6d3b\u7684\u91cd\u8981\u53d1\u73b0\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u957f\u4e0a\u4e0b\u6587\u667a\u80fd\u4f53\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "A key step toward artificial general intelligence is to train models that can perform multiple tasks. In this paper, we study how to build such models by first training separate RL experts for individual tasks and then consolidating them via distillation, as an alternative to directly training a single model on mixed tasks. We show that off-policy distillation degrades in multi-task settings due to the mode-covering nature of forward KL: aggregating data from multiple tasks introduces a large number of behavioral modes that can exceed the student\u0027s capacity, forcing it to average across behaviors and leading to degraded performance. In contrast, on-policy distillation is mode-seeking but requires strong initialization. Inspired by these observations, we propose a two-phase approach: off-policy distillation followed by on-policy refinement. Evaluation across conversational agents and text-based games confirms that this two-phase approach matches single-task RL expert performance for each individual task, whereas off-policy or on-policy distillation alone fails to match this performance.", "arxiv_id": "2606.30044", "arxiv_url": "https://arxiv.org/abs/2606.30044", "authors": ["Huaijie Wang", "Shusheng Xu", "Yi Wu", "Kaifeng Lyu"], "brief": "\u63d0\u51fa\u4e24\u9636\u6bb5\u84b8\u998f\u6846\u67b6\uff1a\u5148\u7528\u79bb\u7b56\u7565\u84b8\u998f\u805a\u5408\u591a\u4e2a\u5355\u4efb\u52a1RL\u4e13\u5bb6\u7684\u77e5\u8bc6\uff0c\u518d\u7528\u5728\u7b56\u7565\u7cbe\u8c03\u6d88\u9664\u6a21\u5f0f\u5e73\u5747\u95ee\u9898\uff0c\u4ece\u800c\u6784\u5efa\u80fd\u540c\u65f6\u80dc\u4efb\u591a\u4efb\u52a1\u7684\u667a\u80fd\u4f53LLM\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30044", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u79bb\u7b56\u7565\u84b8\u998f\uff08forward KL\uff09\u5728\u591a\u4efb\u52a1\u573a\u666f\u4e0b\u56e0\u6a21\u5f0f\u8986\u76d6\u5bfc\u81f4\u884c\u4e3a\u5e73\u5747\u5316\uff0c\u6027\u80fd\u4e0b\u964d", "\u5728\u7b56\u7565\u84b8\u998f\uff08mode-seeking\uff09\u6548\u679c\u597d\u4f46\u9700\u8981\u5f3a\u521d\u59cb\u5316\uff0c\u4e24\u8005\u5355\u72ec\u4f7f\u7528\u5747\u65e0\u6cd5\u5339\u914d\u5355\u4efb\u52a1\u4e13\u5bb6", "\u4e24\u9636\u6bb5\u7ec4\u5408\uff08off-policy \u2192 on-policy\uff09\u5728\u5bf9\u8bdd\u667a\u80fd\u4f53\u548c\u6587\u672c\u6e38\u620f\u4efb\u52a1\u4e0a\u5747\u8fbe\u5230\u5355\u4efb\u52a1RL\u4e13\u5bb6\u6c34\u5e73"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f", "\u591a\u4efb\u52a1\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30044v1", "published_at": "2026-06-29", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Building Multi-Task Agentic LLMs via Two-Phase Distillation", "tldr": "\u4e24\u9636\u6bb5\u84b8\u998f\u6cd5\u5c06\u591a\u4e2aRL\u4e13\u5bb6\u6a21\u578b\u5408\u5e76\u4e3a\u5355\u4e00\u591a\u4efb\u52a1LLM\uff0c\u6027\u80fd\u5ab2\u7f8e\u5355\u4efb\u52a1\u4e13\u5bb6", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e24\u9636\u6bb5\u84b8\u998f\u6846\u67b6\uff1a\u5148\u7528\u79bb\u7b56\u7565\u84b8\u998f\u805a\u5408\u591a\u4e2a\u5355\u4efb\u52a1RL\u4e13\u5bb6\u7684\u77e5\u8bc6\uff0c\u518d\u7528\u5728\u7b56\u7565\u7cbe\u8c03\u6d88\u9664\u6a21\u5f0f\u5e73\u5747\u95ee\u9898\uff0c\u4ece\u800c\u6784\u5efa\u80fd\u540c\u65f6\u80dc\u4efb\u591a\u4efb\u52a1\u7684\u667a\u80fd\u4f53LLM\u3002", "why_notable": "\u63ed\u793a\u4e86\u591a\u4efb\u52a1\u84b8\u998f\u5931\u8d25\u7684\u6839\u672c\u539f\u56e0\uff08KL\u65b9\u5411\u4e0e\u6a21\u5f0f\u6570\u91cf\u7684\u77db\u76fe\uff09\uff0c\u5e76\u7ed9\u51fa\u7b80\u6d01\u6709\u6548\u7684\u89e3\u51b3\u65b9\u6848\uff0c\u5bf9\u6784\u5efa\u901a\u7528\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Agentic search equips large language models with dynamic retrieval abilities, but existing reinforcement learning methods remain limited by reward sparsity in knowledge boundary calibration -- deciding when to trust parametric memory, when to rely on retrieved evidence, and when to abstain. Binary rewards can penalize undesirable outcomes, but provide little guidance on the reasoning process required to make calibrated decisions across different knowledge states. To address this, we propose KbSD (Knowledge boundary Self-Distillation), a framework that tackles this limitation through dense token-level supervision, outcome-level sparse rewards, and quadrant-adaptive optimization. KbSD constructs a hint-augmented teacher, architecturally identical to the student, that receives explicit knowledge boundary signals -- including parametric certainty, retrieval quality, and ground-truth answers -- to generate calibrated reasoning demonstrations. This information-asymmetric self-distillation enables dense supervision without requiring a larger external model. To further account for the heterogeneous reasoning distributions across knowledge states, we introduce a quadrant-adaptive distillation objective: reverse KL for concentrated integration, forward KL for diverse refusal, and Pareto-optimal bidirectional KL for asymmetric quadrants requiring both precision and coverage. Experiments on multiple benchmarks show that KbSD consistently improves both task accuracy and hallucination mitigation over strong baselines, with the largest gains appearing in the challenging quadrants where sparse rewards are least informative.", "arxiv_id": "2606.29863", "arxiv_url": "https://arxiv.org/abs/2606.29863", "authors": ["Tao Feng", "Xinke Jiang", "Chao Wu"], "brief": "\u63d0\u51faKbSD\u6846\u67b6\uff0c\u901a\u8fc7\u4fe1\u606f\u4e0d\u5bf9\u79f0\u81ea\u84b8\u998f\uff08\u6559\u5e08\u6a21\u578b\u83b7\u5f97\u77e5\u8bc6\u8fb9\u754c\u4fe1\u53f7\uff09\u7ed3\u5408\u5bc6\u96c6token\u7ea7\u76d1\u7763\u4e0e\u56db\u8c61\u9650\u81ea\u9002\u5e94\u4f18\u5316\u76ee\u6807\uff0c\u6821\u51c6LLM\u5728\u667a\u80fd\u4f53\u641c\u7d22\u4e2d\u4f55\u65f6\u4fe1\u4efb\u53c2\u6570\u8bb0\u5fc6\u3001\u4f55\u65f6\u4f9d\u8d56\u68c0\u7d22\u3001\u4f55\u65f6\u62d2\u7edd\u56de\u7b54\u7684\u51b3\u7b56\u884c\u4e3a\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29863", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6784\u5efa\u63d0\u793a\u589e\u5f3a\u6559\u5e08\u6a21\u578b\uff08\u4e0e\u5b66\u751f\u67b6\u6784\u76f8\u540c\uff09\uff0c\u6ce8\u5165\u53c2\u6570\u786e\u5b9a\u6027\u3001\u68c0\u7d22\u8d28\u91cf\u548c\u771f\u5b9e\u7b54\u6848\u7b49\u77e5\u8bc6\u8fb9\u754c\u4fe1\u53f7\uff0c\u5b9e\u73b0\u65e0\u9700\u5927\u578b\u5916\u90e8\u6a21\u578b\u7684\u5bc6\u96c6\u76d1\u7763", "\u63d0\u51fa\u56db\u8c61\u9650\u81ea\u9002\u5e94\u84b8\u998f\u76ee\u6807\uff1a\u96c6\u4e2d\u6574\u5408\u7528\u53cd\u5411KL\u3001\u591a\u6837\u62d2\u7edd\u7528\u6b63\u5411KL\u3001\u975e\u5bf9\u79f0\u8c61\u9650\u7528Pareto\u6700\u4f18\u53cc\u5411KL", "\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u76f8\u6bd4\u5f3a\u57fa\u7ebf\u6301\u7eed\u63d0\u5347\u4efb\u52a1\u51c6\u786e\u7387\u5e76\u51cf\u5c11\u5e7b\u89c9\uff0c\u5728\u7a00\u758f\u5956\u52b1\u6700\u4e0d\u5145\u5206\u7684\u56f0\u96be\u8c61\u9650\u6536\u76ca\u6700\u5927"], "keywords": ["\u667a\u80fd\u4f53", "\u77e5\u8bc6\u84b8\u998f", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u5e7b\u89c9\u7f13\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29863v1", "published_at": "2026-06-29", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "KbSD: Knowledge Boundary aware Self-Distillation for Behavioral Calibration in Agentic Search", "tldr": "KbSD\u901a\u8fc7\u77e5\u8bc6\u8fb9\u754c\u611f\u77e5\u81ea\u84b8\u998f\uff0c\u89e3\u51b3\u667a\u80fd\u4f53\u641c\u7d22\u4e2d\u7a00\u758f\u5956\u52b1\u5bfc\u81f4\u7684\u77e5\u8bc6\u8fb9\u754c\u6821\u51c6\u96be\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faKbSD\u6846\u67b6\uff0c\u901a\u8fc7\u4fe1\u606f\u4e0d\u5bf9\u79f0\u81ea\u84b8\u998f\uff08\u6559\u5e08\u6a21\u578b\u83b7\u5f97\u77e5\u8bc6\u8fb9\u754c\u4fe1\u53f7\uff09\u7ed3\u5408\u5bc6\u96c6token\u7ea7\u76d1\u7763\u4e0e\u56db\u8c61\u9650\u81ea\u9002\u5e94\u4f18\u5316\u76ee\u6807\uff0c\u6821\u51c6LLM\u5728\u667a\u80fd\u4f53\u641c\u7d22\u4e2d\u4f55\u65f6\u4fe1\u4efb\u53c2\u6570\u8bb0\u5fc6\u3001\u4f55\u65f6\u4f9d\u8d56\u68c0\u7d22\u3001\u4f55\u65f6\u62d2\u7edd\u56de\u7b54\u7684\u51b3\u7b56\u884c\u4e3a\u3002", "why_notable": "\u9996\u6b21\u5c06\u77e5\u8bc6\u8fb9\u754c\u6821\u51c6\u95ee\u9898\u5206\u89e3\u4e3a\u56db\u8c61\u9650\u5e76\u8bbe\u8ba1\u5dee\u5f02\u5316\u4f18\u5316\u76ee\u6807\uff0c\u7a81\u7834RL\u7a00\u758f\u5956\u52b1\u74f6\u9888\uff0c\u5bf9\u63d0\u5347RAG\u7cfb\u7edf\u53ef\u9760\u6027\u548c\u51cf\u5c11LLM\u5e7b\u89c9\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "As agentic AI systems tackle more complex mathematical tasks, they increasingly rely on information retrieval (IR) to search problem databases, theorem libraries, and educational resources. However, choosing the right retriever remains difficult, as it is infeasible to directly isolate its effect on downstream performance. On the other hand, existing retrieval-specific benchmarks often fail to capture fine-grained mathematical relevance, penalizing relevant documents. We address this gap by introducing SABER-Math, the first fully automated benchmark for evaluating mathematical IR without expert annotation. Starting from 283K high-school-level math problems with solutions, SABER-Math builds challenging reranking tasks in three steps: (i) first, LLMs extract concise solution summaries and mathematical topics for each problem; (ii) then, per-query relevant documents are discovered using ontology topic-based and lexical solutions-summary-based similarities, and (iii) finally, a Swiss-style LLM preference tournament produces fine-grained relevance ratings for the documents. We evaluate lexical retrievers, specialized mathematical retrieval systems, and recent embedding models. We find that while modern embedding models substantially outperform classical and math-specific baselines, even the strongest systems struggle in symbol-heavy domains like Algebra and Calculus. Importantly, we show that general-purpose IR benchmarks such as MTEB do not reliably predict mathematical performance, especially for recent embedding models, highlighting the need for math-specific retrieval benchmarks.", "arxiv_id": "2606.29894", "arxiv_url": "https://arxiv.org/abs/2606.29894", "authors": ["Nikolay Georgiev", "Maria Drencheva", "Kseniia Ibragimova", "Ivo Petrov", "Dimitar I. Dimitrov", "Martin Vechev"], "brief": "\u63d0\u51faSABER-Math\uff0c\u4e00\u4e2a\u57fa\u4e8e28.3\u4e07\u9053\u9ad8\u4e2d\u6570\u5b66\u9898\u7684\u5168\u81ea\u52a8\u4fe1\u606f\u68c0\u7d22\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7LLM\u63d0\u53d6\u6458\u8981\u3001\u672c\u4f53\u4e3b\u9898\u76f8\u4f3c\u5ea6\u53d1\u73b0\u76f8\u5173\u6587\u6863\u3001Swiss\u98ce\u683cLLM\u504f\u597d\u9526\u6807\u8d5b\u751f\u6210\u7ec6\u7c92\u5ea6\u76f8\u5173\u6027\u8bc4\u5206\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u3002", "categories": ["cs.IR", "cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29894", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4ece283K\u9053\u542b\u89e3\u7b54\u7684\u9ad8\u4e2d\u6570\u5b66\u9898\u51fa\u53d1\uff0c\u4e09\u6b65\u81ea\u52a8\u6784\u5efa\u91cd\u6392\u5e8f\u4efb\u52a1\uff1aLLM\u63d0\u53d6\u89e3\u9898\u6458\u8981\u4e0e\u4e3b\u9898\u3001\u57fa\u4e8e\u672c\u4f53\u548c\u8bcd\u6c47\u76f8\u4f3c\u5ea6\u53d1\u73b0\u76f8\u5173\u6587\u6863\u3001LLM\u504f\u597d\u9526\u6807\u8d5b\u751f\u6210\u76f8\u5173\u6027\u8bc4\u5206", "\u73b0\u4ee3\u5d4c\u5165\u6a21\u578b\u663e\u8457\u4f18\u4e8e\u7ecf\u5178\u8bcd\u6c47\u68c0\u7d22\u548c\u6570\u5b66\u4e13\u7528\u68c0\u7d22\u7cfb\u7edf\uff0c\u4f46\u5728\u4ee3\u6570\u548c\u5fae\u79ef\u5206\u7b49\u7b26\u53f7\u5bc6\u96c6\u9886\u57df\u4ecd\u8868\u73b0\u6b20\u4f73", "\u901a\u7528IR\u57fa\u51c6\uff08\u5982MTEB\uff09\u65e0\u6cd5\u53ef\u9760\u9884\u6d4b\u6570\u5b66\u68c0\u7d22\u6027\u80fd\uff0c\u5c24\u5176\u5bf9\u8fd1\u671f\u5d4c\u5165\u6a21\u578b\uff0c\u51f8\u663e\u6570\u5b66\u4e13\u7528\u57fa\u51c6\u7684\u5fc5\u8981\u6027"], "keywords": ["\u4fe1\u606f\u68c0\u7d22", "\u6570\u5b66\u63a8\u7406", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29894v1", "published_at": "2026-06-29", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SABER-Math: Automated Benchmark for Information Retrieval Evaluation in Mathematics", "tldr": "\u9996\u4e2a\u5168\u81ea\u52a8\u6570\u5b66\u4fe1\u606f\u68c0\u7d22\u57fa\u51c6SABER-Math\uff0c\u65e0\u9700\u4e13\u5bb6\u6807\u6ce8\u5373\u53ef\u8bc4\u4f30\u6570\u5b66IR\u7cfb\u7edf", "upvotes": 0, "what_it_is": "\u63d0\u51faSABER-Math\uff0c\u4e00\u4e2a\u57fa\u4e8e28.3\u4e07\u9053\u9ad8\u4e2d\u6570\u5b66\u9898\u7684\u5168\u81ea\u52a8\u4fe1\u606f\u68c0\u7d22\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7LLM\u63d0\u53d6\u6458\u8981\u3001\u672c\u4f53\u4e3b\u9898\u76f8\u4f3c\u5ea6\u53d1\u73b0\u76f8\u5173\u6587\u6863\u3001Swiss\u98ce\u683cLLM\u504f\u597d\u9526\u6807\u8d5b\u751f\u6210\u7ec6\u7c92\u5ea6\u76f8\u5173\u6027\u8bc4\u5206\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8\u3002", "why_notable": "\u586b\u8865\u4e86\u6570\u5b66\u9886\u57df\u4fe1\u606f\u68c0\u7d22\u8bc4\u6d4b\u7684\u7a7a\u767d\uff0c\u5168\u81ea\u52a8\u6784\u5efa\u6d41\u7a0b\u53ef\u6269\u5c55\uff0c\u5bf9\u667a\u80fd\u4f53AI\u7cfb\u7edf\u5728\u6570\u5b66\u4efb\u52a1\u4e2d\u9009\u62e9\u68c0\u7d22\u5668\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\uff0c\u540c\u65f6\u63ed\u793a\u4e86\u901a\u7528\u57fa\u51c6\u7684\u5c40\u9650\u6027\u3002"}, {"abstract": "LLM agents are increasingly cast as autonomous portfolio managers, and benchmarks have moved from financial question-answering to sequential trading. Yet most still rank agents by returns over a fixed window -- a weak proxy, since a period\u0027s return is dominated by the market path and apparent alpha can dissolve once look-ahead leakage is controlled. Such a ranking certifies neither sound reasoning, nor a consistent strategy, nor a durable edge. We introduce CLQT, which reframes closed-loop trading evaluation as diagnosis rather than ranking: an instrument that localizes where and why an agent\u0027s process succeeds or fails. CLQT is a fully closed-loop, cost-aware, strategy-consistent, temporally-gated environment whose agents run a five-stage cycle: gather, synthesize, allocate, execute, reflect. Each round emits a complete DecisionRound sealed into a recompute-verifiable hash chain, so every metric is reconstructable from the trail. Six pillars form the substrate: a hard TimeGate, institutional transaction- and financing-cost modeling, strategy-consistency scoring, three-tier memory, a Model-Context-Protocol tool layer, and mandate-aware synthesis. The same agent runs as a constrained committee of specialized roles or a single full-autonomy orchestrator, making process scaffolding an experimental variable. From the audit trail we compute a five-axis capability scorecard (APM-CS: Coherence, Acuity, Composure, Discipline, Reliability), with Coherence judged partly by a held-out, out-of-cohort LLM to curb self-preference bias. We validate it on a contamination-controlled multi-model backtest with an ablation grid and a live broker track on unseen, post-cutoff data, against a repeated-run noise floor. CLQT separates outcome from capability, yielding not a model ranking but a durable, extensible map of agent competencies and limitations.", "arxiv_id": "2606.29771", "arxiv_url": "https://arxiv.org/abs/2606.29771", "authors": ["Bo Qu", "Mingguang Chen"], "brief": "\u63d0\u51faCLQT\u57fa\u51c6\u6846\u67b6\uff0c\u5c06LLM\u6295\u8d44\u7ec4\u5408\u7ba1\u7406\u667a\u80fd\u4f53\u7684\u8bc4\u4f30\u4ece\u7b80\u5355\u6536\u76ca\u6392\u540d\u91cd\u6784\u4e3a\u80fd\u529b\u8bca\u65ad\uff0c\u901a\u8fc7\u4e94\u9636\u6bb5\u95ed\u73af\u4ea4\u6613\u5468\u671f\u548c\u4e94\u7ef4\u80fd\u529b\u8bc4\u5206\u5361\uff08APM-CS\uff09\u7cfb\u7edf\u6027\u5b9a\u4f4d\u667a\u80fd\u4f53\u7684\u63a8\u7406\u7f3a\u9677\u4e0e\u4f18\u52bf\u3002", "categories": ["cs.AI", "cs.LG", "q-fin.CP", "q-fin.PM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29771", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4e94\u9636\u6bb5\u667a\u80fd\u4f53\u5faa\u73af\uff1a\u6536\u96c6\u2192\u7efc\u5408\u2192\u5206\u914d\u2192\u6267\u884c\u2192\u53cd\u601d\uff0c\u6bcf\u8f6e\u51b3\u7b56\u5c01\u88c5\u4e3a\u53ef\u9a8c\u8bc1\u54c8\u5e0c\u94fe\uff0c\u786e\u4fdd\u5168\u7a0b\u53ef\u5ba1\u8ba1\u91cd\u73b0", "\u516d\u5927\u652f\u67f1\u8bbe\u8ba1\uff1a\u786c\u6027\u65f6\u95f4\u95e8\u63a7\uff08\u9632\u524d\u77bb\u6cc4\u6f0f\uff09\u3001\u673a\u6784\u7ea7\u4ea4\u6613\u6210\u672c\u5efa\u6a21\u3001\u7b56\u7565\u4e00\u81f4\u6027\u8bc4\u5206\u3001\u4e09\u5c42\u8bb0\u5fc6\u3001MCP\u5de5\u5177\u5c42\u3001\u6388\u6743\u611f\u77e5\u7efc\u5408", "\u4e94\u8f74\u80fd\u529b\u8bc4\u5206\u5361APM-CS\uff08\u8fde\u8d2f\u6027\u3001\u654f\u9510\u5ea6\u3001\u6c89\u7a33\u5ea6\u3001\u7eaa\u5f8b\u6027\u3001\u53ef\u9760\u6027\uff09\uff0c\u5176\u4e2d\u8fde\u8d2f\u6027\u7531\u72ec\u7acb\u5916\u90e8LLM\u8bc4\u5224\u4ee5\u6291\u5236\u81ea\u6211\u504f\u597d\u504f\u5dee"], "keywords": ["\u667a\u80fd\u4f53", "\u91d1\u878dAI", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29771v1", "published_at": "2026-06-29", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CLQT: A Closed-Loop, Cost-Aware, Strategy-Consistent Benchmark for Diagnostic Evaluation of LLM Portfolio-Management Agents", "tldr": "CLQT\uff1a\u9762\u5411LLM\u6295\u8d44\u7ec4\u5408\u7ba1\u7406\u667a\u80fd\u4f53\u7684\u95ed\u73af\u3001\u6210\u672c\u611f\u77e5\u3001\u7b56\u7565\u4e00\u81f4\u6027\u8bca\u65ad\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faCLQT\u57fa\u51c6\u6846\u67b6\uff0c\u5c06LLM\u6295\u8d44\u7ec4\u5408\u7ba1\u7406\u667a\u80fd\u4f53\u7684\u8bc4\u4f30\u4ece\u7b80\u5355\u6536\u76ca\u6392\u540d\u91cd\u6784\u4e3a\u80fd\u529b\u8bca\u65ad\uff0c\u901a\u8fc7\u4e94\u9636\u6bb5\u95ed\u73af\u4ea4\u6613\u5468\u671f\u548c\u4e94\u7ef4\u80fd\u529b\u8bc4\u5206\u5361\uff08APM-CS\uff09\u7cfb\u7edf\u6027\u5b9a\u4f4d\u667a\u80fd\u4f53\u7684\u63a8\u7406\u7f3a\u9677\u4e0e\u4f18\u52bf\u3002", "why_notable": "\u73b0\u6709\u57fa\u51c6\u4ee5\u56fa\u5b9a\u7a97\u53e3\u6536\u76ca\u6392\u540dLLM\u4ea4\u6613\u667a\u80fd\u4f53\uff0c\u65e0\u6cd5\u533a\u5206\u8fd0\u6c14\u4e0e\u771f\u5b9e\u80fd\u529b\uff1bCLQT\u9996\u6b21\u5c06\u8bc4\u4f30\u8303\u5f0f\u4ece\u7ed3\u679c\u6392\u540d\u8f6c\u5411\u8fc7\u7a0b\u8bca\u65ad\uff0c\u5e76\u901a\u8fc7\u6c61\u67d3\u63a7\u5236\u56de\u6d4b\u4e0e\u771f\u5b9e\u5238\u5546\u5b9e\u76d8\u53cc\u8f68\u9a8c\u8bc1\uff0c\u4e3aLLM\u91d1\u878d\u667a\u80fd\u4f53\u7814\u7a76\u63d0\u4f9b\u53ef\u6269\u5c55\u7684\u80fd\u529b\u56fe\u8c31\u5de5\u5177\u3002"}, {"abstract": "Topological data analysis (TDA), particularly persistent homology (PH), captures geometric structural properties in medical images (e.g., connected components, loops, shape characteristics), which conventional pixel-level deep learning approaches often neglect. While many topological descriptors are known for converting persistence diagrams (PDs) or raw images into topological feature vectors, existing methods mostly default to a single fixed descriptor (e.g., persistence images), leaving the diversity of topological representations largely unexplored. To the best of our knowledge, there is no known large language model (LLM)-based agentic framework that can automatically determine the most suitable topological descriptors for a given image dataset and produce the corresponding topological feature vectors for downstream tasks. To fill this gap, we propose \\textbf{TopoAgent}, an LLM-based agentic framework that automates topology learning for medical image analysis.TopoAgent operates through a Perception--Reasoning--Action--Reflection loop supported by 21 domain-specific tools and dual memory that accumulates experience across runs. Its skill set is distilled from systematic evaluation of 15 topological descriptors across 26 datasets with six classifiers. TopoAgent analyzes input images and their topological characteristics, reasons about which topological descriptors best suit the input, and determines the optimal descriptor and its configuration, all without task-specific training.", "arxiv_id": "2606.29763", "arxiv_url": "https://arxiv.org/abs/2606.29763", "authors": ["Guangyu Meng", "Pengfei Gu", "Xueyang Li", "Yiyu Shi", "Erin Wolf Chambers", "Danny Z. Chen"], "brief": "\u63d0\u51faTopoAgent\uff0c\u4e00\u4e2a\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u611f\u77e5-\u63a8\u7406-\u884c\u52a8-\u53cd\u601d\u5faa\u73af\uff0c\u81ea\u52a8\u4e3a\u533b\u5b66\u56fe\u50cf\u6570\u636e\u96c6\u9009\u62e9\u6700\u5408\u9002\u7684\u62d3\u6251\u63cf\u8ff0\u7b26\u5e76\u751f\u6210\u62d3\u6251\u7279\u5f81\u5411\u91cf\uff0c\u65e0\u9700\u4efb\u52a1\u7279\u5b9a\u8bad\u7ec3\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29763", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6784\u5efa\u5305\u542b21\u4e2a\u9886\u57df\u4e13\u7528\u5de5\u5177\u548c\u53cc\u8bb0\u5fc6\u673a\u5236\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u652f\u6301\u8de8\u4efb\u52a1\u7ecf\u9a8c\u79ef\u7d2f", "\u7cfb\u7edf\u8bc4\u4f30\u4e8615\u79cd\u62d3\u6251\u63cf\u8ff0\u7b26\u572826\u4e2a\u6570\u636e\u96c6\u00d76\u79cd\u5206\u7c7b\u5668\u4e0a\u7684\u8868\u73b0\uff0c\u5f62\u6210\u77e5\u8bc6\u84b8\u998f\u6280\u80fd\u5e93", "\u5229\u7528\u6301\u4e45\u540c\u8c03\uff08Persistent Homology\uff09\u6355\u6349\u533b\u5b66\u56fe\u50cf\u4e2d\u8fde\u901a\u5206\u91cf\u3001\u73af\u8def\u7b49\u51e0\u4f55\u7ed3\u6784\u7279\u5f81\uff0c\u7a81\u7834\u50cf\u7d20\u7ea7\u6df1\u5ea6\u5b66\u4e60\u7684\u5c40\u9650"], "keywords": ["\u667a\u80fd\u4f53", "\u533b\u5b66\u56fe\u50cf", "\u62d3\u6251\u6570\u636e\u5206\u6790", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29763v1", "published_at": "2026-06-29", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "TopoAgent: An Agentic Framework for Automated Topology Learning in Medical Imaging", "tldr": "TopoAgent\uff1a\u57fa\u4e8eLLM\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u81ea\u52a8\u4e3a\u533b\u5b66\u56fe\u50cf\u9009\u62e9\u6700\u4f18\u62d3\u6251\u63cf\u8ff0\u7b26", "upvotes": 0, "what_it_is": "\u63d0\u51faTopoAgent\uff0c\u4e00\u4e2a\u57fa\u4e8e\u5927\u8bed\u8a00\u6a21\u578b\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u611f\u77e5-\u63a8\u7406-\u884c\u52a8-\u53cd\u601d\u5faa\u73af\uff0c\u81ea\u52a8\u4e3a\u533b\u5b66\u56fe\u50cf\u6570\u636e\u96c6\u9009\u62e9\u6700\u5408\u9002\u7684\u62d3\u6251\u63cf\u8ff0\u7b26\u5e76\u751f\u6210\u62d3\u6251\u7279\u5f81\u5411\u91cf\uff0c\u65e0\u9700\u4efb\u52a1\u7279\u5b9a\u8bad\u7ec3\u3002", "why_notable": "\u9996\u4e2a\u5c06LLM\u667a\u80fd\u4f53\u4e0e\u62d3\u6251\u6570\u636e\u5206\u6790\u7ed3\u5408\u7684\u533b\u5b66\u56fe\u50cf\u6846\u67b6\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u65b9\u6cd5\u56fa\u5b9a\u4f7f\u7528\u5355\u4e00\u62d3\u6251\u63cf\u8ff0\u7b26\u7684\u5c40\u9650\uff0c\u5b9e\u73b0\u4e86\u62d3\u6251\u8868\u793a\u5b66\u4e60\u7684\u81ea\u52a8\u5316\u4e0e\u591a\u6837\u5316\u63a2\u7d22\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u901a\u7528\u6027\u548c\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Motion-language agents must possess the bidirectional capability to both understand human movement (motion-to-text, M2T) and generate it from natural language (text-to-motion, T2M). While foundational models have achieved strong performance in static settings, autonomous agents operating in dynamic environments must continuously incorporate new motion concepts -- such as novel athletic styles or specialized gestures -- without catastrophic forgetting of previously acquired skills. We investigate the stability-plasticity trade-off in bidirectional motion-language learning under sequential task exposure. Building on a frozen large language model backbone, we introduce low-rank adaptation (LoRA) variants designed to mitigate inter-task interference. We specifically propose mixture-of-experts architectures that utilize an autoencoder-based router to select task-specific experts at inference time, so that no task-label is needed. To evaluate these methods, we establish a reproducible five-task benchmark derived from HumanML3D through semantic clustering of motion descriptions. Our experimental results demonstrate near-zero forgetting across both M2T and T2M directions while maintaining high generation and captioning quality. Furthermore, we show that hard expert selection via routing significantly outperforms soft expert blending in quality metrics, indicating that preserving expert isolation is critical for maintaining performance in our continual learning setting. Finally, we observe that a divergence between token-level accuracy and downstream generation quality may occur, highlighting the need for more comprehensive evaluation protocols in future research on lifelong motion-language agents.", "arxiv_id": "2606.30266", "arxiv_url": "https://arxiv.org/abs/2606.30266", "authors": ["Bertram Taetz", "Hugo Albuquerque Cosme da Silva", "Gabriele Bleser-Taetz"], "brief": "\u672c\u6587\u7814\u7a76\u8fd0\u52a8-\u8bed\u8a00\u667a\u80fd\u4f53\u7684\u6301\u7eed\u5b66\u4e60\u95ee\u9898\uff0c\u63d0\u51fa\u57fa\u4e8e\u81ea\u7f16\u7801\u5668\u8def\u7531\u7684\u6df7\u5408\u4e13\u5bb6LoRA\u67b6\u6784\uff0c\u4f7f\u6a21\u578b\u5728\u987a\u5e8f\u5b66\u4e60\u65b0\u8fd0\u52a8\u6982\u5ff5\u65f6\uff0c\u540c\u65f6\u4fdd\u6301\u8fd0\u52a8\u7406\u89e3\uff08M2T\uff09\u548c\u8fd0\u52a8\u751f\u6210\uff08T2M\uff09\u80fd\u529b\u800c\u4e0d\u53d1\u751f\u707e\u96be\u6027\u9057\u5fd8\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30266", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u6784\u5efa\u57fa\u4e8eHumanML3D\u8bed\u4e49\u805a\u7c7b\u7684\u4e94\u4efb\u52a1\u6301\u7eed\u5b66\u4e60\u57fa\u51c6\uff0c\u7528\u4e8e\u53ef\u590d\u73b0\u8bc4\u4f30", "\u63d0\u51fa\u81ea\u7f16\u7801\u5668\u8def\u7531\u7684\u6df7\u5408\u4e13\u5bb6\u67b6\u6784\uff0c\u63a8\u7406\u65f6\u65e0\u9700\u4efb\u52a1\u6807\u7b7e\u5373\u53ef\u9009\u62e9\u7279\u5b9a\u4e13\u5bb6", "\u5b9e\u9a8c\u8868\u660e\u786c\u4e13\u5bb6\u9009\u62e9\uff08\u8def\u7531\uff09\u663e\u8457\u4f18\u4e8e\u8f6f\u4e13\u5bb6\u6df7\u5408\uff0c\u4e13\u5bb6\u9694\u79bb\u5bf9\u6301\u7eed\u5b66\u4e60\u81f3\u5173\u91cd\u8981", "\u5728M2T\u548cT2M\u4e24\u4e2a\u65b9\u5411\u5747\u5b9e\u73b0\u8fd1\u96f6\u9057\u5fd8\uff0c\u540c\u65f6\u4fdd\u6301\u9ad8\u8d28\u91cf\u751f\u6210\u4e0e\u63cf\u8ff0\u80fd\u529b"], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u8fd0\u52a8\u751f\u6210", "\u6df7\u5408\u4e13\u5bb6", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30266v1", "published_at": "2026-06-29", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Towards Continual Motion-Language Agents: LoRA Variants for Incremental Motion Understanding and Generation", "tldr": "\u63d0\u51faLoRA\u53d8\u4f53\u4e0e\u6df7\u5408\u4e13\u5bb6\u67b6\u6784\uff0c\u5b9e\u73b0\u8fd0\u52a8-\u8bed\u8a00\u53cc\u5411\u6301\u7eed\u5b66\u4e60\u4e14\u8fd1\u96f6\u9057\u5fd8", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76\u8fd0\u52a8-\u8bed\u8a00\u667a\u80fd\u4f53\u7684\u6301\u7eed\u5b66\u4e60\u95ee\u9898\uff0c\u63d0\u51fa\u57fa\u4e8e\u81ea\u7f16\u7801\u5668\u8def\u7531\u7684\u6df7\u5408\u4e13\u5bb6LoRA\u67b6\u6784\uff0c\u4f7f\u6a21\u578b\u5728\u987a\u5e8f\u5b66\u4e60\u65b0\u8fd0\u52a8\u6982\u5ff5\u65f6\uff0c\u540c\u65f6\u4fdd\u6301\u8fd0\u52a8\u7406\u89e3\uff08M2T\uff09\u548c\u8fd0\u52a8\u751f\u6210\uff08T2M\uff09\u80fd\u529b\u800c\u4e0d\u53d1\u751f\u707e\u96be\u6027\u9057\u5fd8\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u8fd0\u52a8-\u8bed\u8a00\u53cc\u5411\u6301\u7eed\u5b66\u4e60\u573a\u666f\uff0c\u63d0\u51fa\u65e0\u9700\u4efb\u52a1\u6807\u7b7e\u7684\u6df7\u5408\u4e13\u5bb6\u65b9\u6848\u5e76\u63ed\u793atoken\u7ea7\u51c6\u786e\u7387\u4e0e\u751f\u6210\u8d28\u91cf\u4e4b\u95f4\u7684\u8bc4\u4f30\u5dee\u5f02\uff0c\u5bf9\u6784\u5efa\u957f\u671f\u81ea\u4e3b\u8fd0\u52a8\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Improving vision-language models (VLMs) on visual reasoning typically requires retraining or hand-designed prompts and tools. We present Dynamo, a training-free framework that adapts a frozen VLM without any weight updates. On a small labeled training subset, the agent inspects its own correct and incorrect attempts and evolves two complementary capabilities: reusable reasoning skills for cognitive bottlenecks, and executable visual tools for perceptual ones. Each generated tool is paired with a skill that specifies when to invoke it, and both capability types accumulate in a persistent library. Across four visual reasoning benchmarks and five VLM backbones, Dynamo improves direct inference on all 20 model--benchmark settings (avg. +5.6 acc). When the tool set is given in advance, the framework learns when to call each tool, and per-step tool choice improves on every tested backbone. Against task-specific RL (VTool-R1, DeepEyes), Dynamo closes 65--99% of the RL gap at a fraction of the compute, and combines additively with RL when available.", "arxiv_id": "2606.30185", "arxiv_url": "https://arxiv.org/abs/2606.30185", "authors": ["Yutao Sun", "Yanting Miao", "Hao-Xuan Ma", "Mengyu Zhou", "Mingshuai Chen", "Tiancheng Zhao", "Dexin Wang", "Lei Lv", "Li Xu", "Xiaoxi Jiang", "Guanjun Jiang"], "brief": "\u63d0\u51faDynamo\u6846\u67b6\uff0c\u65e0\u9700\u66f4\u65b0\u6a21\u578b\u6743\u91cd\uff0c\u901a\u8fc7\u8ba9VLM\u81ea\u6211\u53cd\u601d\u6b63\u786e\u4e0e\u9519\u8bef\u5c1d\u8bd5\uff0c\u81ea\u52a8\u751f\u6210\u53ef\u590d\u7528\u7684\u63a8\u7406\u6280\u80fd\uff08\u5e94\u5bf9\u8ba4\u77e5\u74f6\u9888\uff09\u548c\u53ef\u6267\u884c\u89c6\u89c9\u5de5\u5177\uff08\u5e94\u5bf9\u611f\u77e5\u74f6\u9888\uff09\uff0c\u5e76\u79ef\u7d2f\u4e3a\u6301\u4e45\u5316\u6280\u80fd-\u5de5\u5177\u5e93\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30185", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5b8c\u5168\u514d\u8bad\u7ec3\uff08training-free\uff09\uff0c\u51bb\u7ed3VLM\u6743\u91cd\uff0c\u4ec5\u5728\u5c11\u91cf\u6807\u6ce8\u8bad\u7ec3\u5b50\u96c6\u4e0a\u81ea\u6211\u8fdb\u5316", "\u57284\u4e2a\u89c6\u89c9\u63a8\u7406\u57fa\u51c6\u30015\u79cdVLM\u9aa8\u5e72\u4e0a\u5168\u90e820\u4e2a\u8bbe\u7f6e\u5747\u6709\u63d0\u5347\uff0c\u5e73\u5747\u51c6\u786e\u7387+5.6%", "\u4e0e\u4efb\u52a1\u7279\u5b9aRL\u65b9\u6cd5\uff08VTool-R1\u3001DeepEyes\uff09\u76f8\u6bd4\uff0c\u4ee5\u6781\u5c11\u8ba1\u7b97\u91cf\u5f25\u540865\u201399%\u7684RL\u6027\u80fd\u5dee\u8ddd\uff0c\u4e14\u53ef\u4e0eRL\u53e0\u52a0\u4f7f\u7528"], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53", "\u5de5\u5177\u5b66\u4e60", "\u89c6\u89c9\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30185v1", "published_at": "2026-06-29", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Dynamo: Dynamic Skill-Tool Evolution for Vision-Language Agents", "tldr": "Dynamo\uff1a\u65e0\u9700\u8bad\u7ec3\uff0c\u8ba9\u51bb\u7ed3VLM\u81ea\u52a8\u8fdb\u5316\u53ef\u590d\u7528\u63a8\u7406\u6280\u80fd\u4e0e\u89c6\u89c9\u5de5\u5177\u5e93", "upvotes": 0, "what_it_is": "\u63d0\u51faDynamo\u6846\u67b6\uff0c\u65e0\u9700\u66f4\u65b0\u6a21\u578b\u6743\u91cd\uff0c\u901a\u8fc7\u8ba9VLM\u81ea\u6211\u53cd\u601d\u6b63\u786e\u4e0e\u9519\u8bef\u5c1d\u8bd5\uff0c\u81ea\u52a8\u751f\u6210\u53ef\u590d\u7528\u7684\u63a8\u7406\u6280\u80fd\uff08\u5e94\u5bf9\u8ba4\u77e5\u74f6\u9888\uff09\u548c\u53ef\u6267\u884c\u89c6\u89c9\u5de5\u5177\uff08\u5e94\u5bf9\u611f\u77e5\u74f6\u9888\uff09\uff0c\u5e76\u79ef\u7d2f\u4e3a\u6301\u4e45\u5316\u6280\u80fd-\u5de5\u5177\u5e93\u3002", "why_notable": "\u5728\u4e0d\u4fee\u6539\u6a21\u578b\u53c2\u6570\u7684\u524d\u63d0\u4e0b\u5b9e\u73b0\u5ab2\u7f8eRL\u5fae\u8c03\u7684\u6027\u80fd\u63d0\u5347\uff0c\u6781\u5927\u964d\u4f4e\u4e86VLM\u89c6\u89c9\u63a8\u7406\u589e\u5f3a\u7684\u8ba1\u7b97\u6210\u672c\uff0c\u4e14\u5177\u5907\u8de8\u6a21\u578b\u3001\u8de8\u4efb\u52a1\u7684\u901a\u7528\u6027\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u6781\u5177\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning (RL) has become indispensable for pushing Vision-Language-Action Models (VLAs) beyond static imitation learning. However, existing RL methods typically require external environmental feedback, relying on predefined success signals to guide policy updates. In this work, we show that VLA models possess useful internal evaluative capabilities: in discrete-action VLAs, trajectories with higher generation confidence are significantly more likely to succeed. Based on this observation, we introduce T^2VLA (Test-time VLA), an architecture-agnostic test-time RL framework that enables VLA models to achieve self-bootstrapping policy improvement. Instead of relying on external rewards, T^2VLA leverages trajectory-level similarity to high-confidence expert demonstrations as an intrinsic reward signal. In addition, we propose a Confidence-Driven Dual Expert Bootstrapping mechanism, which dynamically balances a Local Pseudo-Expert for exploration and a Global Expert Pool for training stability. Extensive experiments on the LIBERO and RoboTwin benchmarks show that T^2VLA consistently outperforms supervised baselines and approaches oracle RL performance with ground-truth rewards, achieving effective improvement without external reward feedback. Furthermore, T^2VLA adapts to distinct VLA paradigms, including both OpenVLA-OFT and the pi series.", "arxiv_id": "2606.29892", "arxiv_url": "https://arxiv.org/abs/2606.29892", "authors": ["Siyao Chen", "Jiakang Yuan", "Jiaxin Wang", "Tao Chen"], "brief": "\u63d0\u51faT\u00b2VLA\u6846\u67b6\uff0c\u53d1\u73b0\u79bb\u6563\u52a8\u4f5cVLA\u6a21\u578b\u4e2d\u9ad8\u751f\u6210\u7f6e\u4fe1\u5ea6\u7684\u8f68\u8ff9\u66f4\u6613\u6210\u529f\uff0c\u4ee5\u6b64\u4f5c\u4e3a\u5185\u5728\u5956\u52b1\u4fe1\u53f7\uff0c\u65e0\u9700\u5916\u90e8\u73af\u5883\u53cd\u9988\u5373\u53ef\u5728\u6d4b\u8bd5\u65f6\u5b9e\u73b0\u7b56\u7565\u81ea\u6211\u63d0\u5347\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29892", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6838\u5fc3\u6d1e\u5bdf\uff1aVLA\u6a21\u578b\u7684\u751f\u6210\u7f6e\u4fe1\u5ea6\u4e0e\u4efb\u52a1\u6210\u529f\u7387\u663e\u8457\u6b63\u76f8\u5173\uff0c\u53ef\u4f5c\u4e3a\u5185\u5728\u5956\u52b1", "\u63d0\u51fa\u7f6e\u4fe1\u5ea6\u9a71\u52a8\u7684\u53cc\u4e13\u5bb6\u81ea\u4e3e\u673a\u5236\uff08Confidence-Driven Dual Expert Bootstrapping\uff09\uff0c\u52a8\u6001\u5e73\u8861\u5c40\u90e8\u4f2a\u4e13\u5bb6\uff08\u63a2\u7d22\uff09\u4e0e\u5168\u5c40\u4e13\u5bb6\u6c60\uff08\u8bad\u7ec3\u7a33\u5b9a\u6027\uff09", "\u5728LIBERO\u548cRoboTwin\u57fa\u51c6\u4e0a\u8d85\u8d8a\u76d1\u7763\u5b66\u4e60\u57fa\u7ebf\uff0c\u63a5\u8fd1\u4f7f\u7528\u771f\u5b9e\u5956\u52b1\u7684Oracle RL\u6027\u80fd\uff0c\u4e14\u517c\u5bb9OpenVLA-OFT\u548cpi\u7cfb\u5217\u7b49\u591a\u79cdVLA\u8303\u5f0f"], "keywords": ["\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u673a\u5668\u4eba\u64cd\u4f5c", "\u6d4b\u8bd5\u65f6\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29892v1", "published_at": "2026-06-29", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Trust Your Instincts: Confidence-Driven Test-Time RL for Vision-Language-Action Models", "tldr": "\u65e0\u9700\u5916\u90e8\u5956\u52b1\uff0c\u5229\u7528VLA\u6a21\u578b\u5185\u90e8\u7f6e\u4fe1\u5ea6\u5b9e\u73b0\u6d4b\u8bd5\u65f6\u81ea\u4e3e\u5f3a\u5316\u5b66\u4e60", "upvotes": 0, "what_it_is": "\u63d0\u51faT\u00b2VLA\u6846\u67b6\uff0c\u53d1\u73b0\u79bb\u6563\u52a8\u4f5cVLA\u6a21\u578b\u4e2d\u9ad8\u751f\u6210\u7f6e\u4fe1\u5ea6\u7684\u8f68\u8ff9\u66f4\u6613\u6210\u529f\uff0c\u4ee5\u6b64\u4f5c\u4e3a\u5185\u5728\u5956\u52b1\u4fe1\u53f7\uff0c\u65e0\u9700\u5916\u90e8\u73af\u5883\u53cd\u9988\u5373\u53ef\u5728\u6d4b\u8bd5\u65f6\u5b9e\u73b0\u7b56\u7565\u81ea\u6211\u63d0\u5347\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u5229\u7528VLA\u6a21\u578b\u5185\u90e8\u7f6e\u4fe1\u5ea6\u4f5c\u4e3a\u5f3a\u5316\u5b66\u4e60\u5956\u52b1\u4fe1\u53f7\uff0c\u6446\u8131\u5bf9\u5916\u90e8\u73af\u5883\u53cd\u9988\u7684\u4f9d\u8d56\uff0c\u5927\u5e45\u964d\u4f4eVLA\u90e8\u7f72\u95e8\u69db\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u548c\u65b9\u6cd5\u521b\u65b0\u6027\u3002"}, {"abstract": "Vision-Language Models (VLMs) provide powerful semantic understanding and commonsense reasoning for End-to-End Autonomous Driving (E2E-AD) planning. However, trajectories directly generated by VLMs often encode only coarse driving intentions and remain insufficient for geometrically accurate, future-aware, and multi-view-grounded planning. To address these limitations, we develop the Layer-Wise World-Model-Guided Driving framework (LWDrive). LWDrive is a VLM planning framework that refines coarse trajectories through layer-wise world-model guidance. Instead of treating the VLM output as the final trajectory, LWDrive uses it as an intent-aware coarse plan, expands a diverse candidate space around it, and progressively refines the candidates through a Foresight Cascade Planner (FCP). Specifically, we introduce future-frame generation supervision to encourage the VLM to learn forward-looking scene representations, thereby injecting planning-relevant predictive dynamics into its internal hidden states. Built upon these world-model-supervised representations, FCP exploits VLM features across multiple layers and integrates historical temporal states, Action-Query representations, and current-frame multi-view Bird\u0027s-Eye-View (BEV) features to refine candidate trajectories in a coarse-to-fine manner. This design enables progressive correction of spatial positions and motion trends while grounding trajectory refinement with multi-view scene cues and preserving the high-level driving intention produced by the large model. Finally, a score head evaluates the refined candidates and selects the best trajectory as the final planning output. Experiments show that LWDrive achieves a score of 92.0 on the NAVSIM benchmark and 89.6 on NAVSIM-v2. Code and models will be made publicly available.", "arxiv_id": "2606.29879", "arxiv_url": "https://arxiv.org/abs/2606.29879", "authors": ["Chen Yang", "Yuhao Wei", "Ze Xu", "Ziheng Zou", "Shuang Liang", "Delin Ouyang", "Lingfeng Qi", "Jie Li", "Guofa Li"], "brief": "\u63d0\u51faLWDrive\u6846\u67b6\uff0c\u5229\u7528\u4e16\u754c\u6a21\u578b\u76d1\u7763VLM\u5185\u90e8\u9690\u72b6\u6001\u5b66\u4e60\u524d\u77bb\u6027\u573a\u666f\u8868\u793a\uff0c\u518d\u901a\u8fc7\u524d\u77bb\u7ea7\u8054\u89c4\u5212\u5668\uff08FCP\uff09\u9010\u5c42\u878d\u5408\u591a\u89c6\u89d2BEV\u7279\u5f81\u3001\u5386\u53f2\u65f6\u5e8f\u72b6\u6001\u548c\u52a8\u4f5c\u67e5\u8be2\uff0c\u5c06VLM\u8f93\u51fa\u7684\u7c97\u610f\u56fe\u8f68\u8ff9\u7531\u7c97\u5230\u7ec6\u5730\u7cbe\u7ec6\u5316\u4e3a\u6700\u7ec8\u9a7e\u9a76\u8f68\u8ff9\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29879", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5f15\u5165\u672a\u6765\u5e27\u751f\u6210\u76d1\u7763\uff0c\u4f7fVLM\u9690\u72b6\u6001\u5177\u5907\u9884\u6d4b\u52a8\u6001\uff0c\u6ce8\u5165\u89c4\u5212\u76f8\u5173\u7684\u4e16\u754c\u6a21\u578b\u77e5\u8bc6", "\u524d\u77bb\u7ea7\u8054\u89c4\u5212\u5668\uff08FCP\uff09\u8de8\u591a\u5c42\u63d0\u53d6VLM\u7279\u5f81\uff0c\u7ed3\u5408\u591a\u89c6\u89d2BEV\u3001\u5386\u53f2\u65f6\u5e8f\u548cAction-Query\u8fdb\u884c\u5019\u9009\u8f68\u8ff9\u7c97\u5230\u7ec6\u7cbe\u5316", "\u5728NAVSIM\u57fa\u51c6\u4e0a\u5f97\u520692.0\uff0cNAVSIM-v2\u4e0a\u5f97\u520689.6\uff0c\u8fbe\u5230\u9886\u5148\u6c34\u5e73"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u4e16\u754c\u6a21\u578b", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u8f68\u8ff9\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29879v1", "published_at": "2026-06-29", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "LWDrive: Layer-Wise World-Model-Guided Vision-Language Model Planning for Autonomous Driving", "tldr": "LWDrive\u901a\u8fc7\u9010\u5c42\u4e16\u754c\u6a21\u578b\u5f15\u5bfc\uff0c\u5c06VLM\u7c97\u8f68\u8ff9\u7cbe\u7ec6\u5316\u4e3a\u51e0\u4f55\u7cbe\u786e\u7684\u81ea\u52a8\u9a7e\u9a76\u89c4\u5212", "upvotes": 0, "what_it_is": "\u63d0\u51faLWDrive\u6846\u67b6\uff0c\u5229\u7528\u4e16\u754c\u6a21\u578b\u76d1\u7763VLM\u5185\u90e8\u9690\u72b6\u6001\u5b66\u4e60\u524d\u77bb\u6027\u573a\u666f\u8868\u793a\uff0c\u518d\u901a\u8fc7\u524d\u77bb\u7ea7\u8054\u89c4\u5212\u5668\uff08FCP\uff09\u9010\u5c42\u878d\u5408\u591a\u89c6\u89d2BEV\u7279\u5f81\u3001\u5386\u53f2\u65f6\u5e8f\u72b6\u6001\u548c\u52a8\u4f5c\u67e5\u8be2\uff0c\u5c06VLM\u8f93\u51fa\u7684\u7c97\u610f\u56fe\u8f68\u8ff9\u7531\u7c97\u5230\u7ec6\u5730\u7cbe\u7ec6\u5316\u4e3a\u6700\u7ec8\u9a7e\u9a76\u8f68\u8ff9\u3002", "why_notable": "\u9996\u6b21\u5c06\u9010\u5c42\u4e16\u754c\u6a21\u578b\u76d1\u7763\u4e0eVLM\u89c4\u5212\u6df1\u5ea6\u7ed3\u5408\uff0c\u89e3\u51b3\u4e86VLM\u8f68\u8ff9\u51e0\u4f55\u7cbe\u5ea6\u4e0d\u8db3\u548c\u7f3a\u4e4f\u672a\u6765\u611f\u77e5\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5728\u4e3b\u6d41\u81ea\u52a8\u9a7e\u9a76\u89c4\u5212\u57fa\u51c6\u4e0a\u53d6\u5f97SOTA\u6027\u80fd\uff0c\u4ee3\u7801\u5f00\u6e90\u3002"}, {"abstract": "Hallucination is the reliability bottleneck for LLM-based agents, and fact attribution verifiers are the last line of defense -- yet today\u0027s verifiers emit only opaque binary labels, leaving agents unable to self-correct and operators unable to audit. We present SEVA, a structured verification agent that emits evidence alignments, step-by-step reasoning chains, calibrated confidence, and a six-category error diagnosis with actionable fixes. Training such an agent with RL is non-trivial: standard binary reward on multi-component output triggers advantage collapse -- within-group reward variance vanishes and the GRPO gradient disappears. We resolve this with a process reward that decomposes verification quality into five independent components weighted 70/30 toward process signals, restoring the gradient and inducing an implicit curriculum -- the agent first masters verification behavior (alignment 0.917 -\u003e 0.997, format 72% -\u003e 100%), then outcomes (F1 64.9 -\u003e 69.0). Structured output further enables a Verify -\u003e Reflect -\u003e Probe -\u003e Refine self-evolution loop, which over four rounds on a 7B model surfaces an unexpected structural finding: each round produces a benchmark-specialist, not a generalist (+15 pp on HaluEval, -10 to -14 pp on TruthfulQA in the same model, persistent at 4x data). On ClearFacts, SEVA-3B matches GPT-4o-mini (69.0 vs. 69.8 F1) while producing substantially richer, auditable output -- confirming a principle that should generalize: for any RL task with multi-component generation, reward granularity must match output granularity.", "arxiv_id": "2606.29713", "arxiv_url": "https://arxiv.org/abs/2606.29713", "authors": ["Aojie Yuan", "Yi Nian", "Haiyue Zhang", "Zijian Su", "Yue Zhao"], "brief": "\u63d0\u51faSEVA\uff0c\u4e00\u4e2a\u7ed3\u6784\u5316\u9a8c\u8bc1\u667a\u80fd\u4f53\uff0c\u80fd\u8f93\u51fa\u8bc1\u636e\u5bf9\u9f50\u3001\u63a8\u7406\u94fe\u3001\u7f6e\u4fe1\u5ea6\u53ca\u516d\u7c7b\u9519\u8bef\u8bca\u65ad\uff0c\u901a\u8fc7\u5206\u89e3\u4e3a\u4e94\u7ef4\u8fc7\u7a0b\u5956\u52b1\u89e3\u51b3RL\u8bad\u7ec3\u4e2d\u7684\u4f18\u52bf\u5d29\u584c\u95ee\u9898\uff0c\u5e76\u8bbe\u8ba1Verify\u2192Reflect\u2192Probe\u2192Refine\u81ea\u8fdb\u5316\u5faa\u73af\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29713", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6807\u51c6\u4e8c\u5143\u5956\u52b1\u5bfc\u81f4\u591a\u7ec4\u4ef6\u8f93\u51fa\u7684\u7ec4\u5185\u5956\u52b1\u65b9\u5dee\u6d88\u5931\uff08\u4f18\u52bf\u5d29\u584c\uff09\uff0cGRPO\u68af\u5ea6\u6d88\u5931\uff1b\u4e94\u7ef4\u8fc7\u7a0b\u5956\u52b1\uff0870/30\u6743\u91cd\uff09\u6062\u590d\u68af\u5ea6\u5e76\u4ea7\u751f\u9690\u5f0f\u8bfe\u7a0b\u5b66\u4e60", "\u81ea\u8fdb\u53164\u8f6e\u540e\u51fa\u73b0\u610f\u5916\u53d1\u73b0\uff1a\u6bcf\u8f6e\u4ea7\u751f\u57fa\u51c6\u4e13\u5bb6\u800c\u975e\u901a\u624d\uff08HaluEval+15pp\uff0cTruthfulQA -10~-14pp\uff0c4\u500d\u6570\u636e\u540e\u4ecd\u6301\u7eed\uff09", "SEVA-3B\u5728ClearFacts\u4e0aF1\u8fbe69.0\uff0c\u5ab2\u7f8eGPT-4o-mini\uff0869.8\uff09\uff0c\u540c\u65f6\u8f93\u51fa\u53ef\u5ba1\u8ba1\u7684\u7ed3\u6784\u5316\u8bca\u65ad\u4fe1\u606f"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u5e7b\u89c9\u68c0\u6d4b", "\u8fc7\u7a0b\u5956\u52b1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29713v1", "published_at": "2026-06-29", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SEVA: Self-Evolving Verification Agent with Process Reward for Fact Attribution", "tldr": "SEVA\uff1a\u7528\u8fc7\u7a0b\u5956\u52b1\u8bad\u7ec3\u7684\u81ea\u8fdb\u5316\u4e8b\u5b9e\u5f52\u56e0\u9a8c\u8bc1\u667a\u80fd\u4f53\uff0c3B\u6a21\u578b\u5ab2\u7f8eGPT-4o-mini", "upvotes": 0, "what_it_is": "\u63d0\u51faSEVA\uff0c\u4e00\u4e2a\u7ed3\u6784\u5316\u9a8c\u8bc1\u667a\u80fd\u4f53\uff0c\u80fd\u8f93\u51fa\u8bc1\u636e\u5bf9\u9f50\u3001\u63a8\u7406\u94fe\u3001\u7f6e\u4fe1\u5ea6\u53ca\u516d\u7c7b\u9519\u8bef\u8bca\u65ad\uff0c\u901a\u8fc7\u5206\u89e3\u4e3a\u4e94\u7ef4\u8fc7\u7a0b\u5956\u52b1\u89e3\u51b3RL\u8bad\u7ec3\u4e2d\u7684\u4f18\u52bf\u5d29\u584c\u95ee\u9898\uff0c\u5e76\u8bbe\u8ba1Verify\u2192Reflect\u2192Probe\u2192Refine\u81ea\u8fdb\u5316\u5faa\u73af\u3002", "why_notable": "\u63ed\u793a\u4e86RL\u591a\u7ec4\u4ef6\u751f\u6210\u4efb\u52a1\u4e2d\u300c\u5956\u52b1\u7c92\u5ea6\u987b\u5339\u914d\u8f93\u51fa\u7c92\u5ea6\u300d\u7684\u666e\u9002\u539f\u5219\uff0c\u5e76\u53d1\u73b0\u81ea\u8fdb\u5316\u5bfc\u81f4\u57fa\u51c6\u4e13\u4e1a\u5316\u800c\u975e\u6cdb\u5316\u7684\u7ed3\u6784\u6027\u73b0\u8c61\uff0c\u5bf9\u5e7b\u89c9\u68c0\u6d4b\u4e0e\u53ef\u4fe1AI\u7cfb\u7edf\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "When a multimodal AI agent is asked to forget a fact, current memory systems usually delete the text entry and report success. We find that the fact can remain recoverable from retained user images, including images tagged to entirely different facts, because VLMs use implicit visual cues at inference time. We introduce the Information Provenance Graph (IPG), a taxonomy that classifies memory representations by deletion affordance. The IPG reveals that deletion fails through multiple channels. Our benchmark, MemLeak, measures this across a deletion cascade: direct probing of deletion-capable systems yields \u003c1%, but retained correlated text enables 18.3% recovery, and retained images enable 12.0% recovery (0.0% blind baseline, 0.3% FPR) -- with 47% of image leaks not text-recoverable. Content-aware semantic deletion reduces the image residual to 2.0%. The residual appears across multiple VLMs, a production memory system, and real Unsplash-licensed photographs. Dual-annotator human validation (kappa = 0.88) confirms judge reliability.", "arxiv_id": "2606.29788", "arxiv_url": "https://arxiv.org/abs/2606.29788", "authors": ["Kuan Wang", "Chao Zhang"], "brief": "\u63d0\u51fa\u4fe1\u606f\u6eaf\u6e90\u56fe\uff08IPG\uff09\u5206\u7c7b\u6846\u67b6\u4e0eMemLeak\u57fa\u51c6\uff0c\u7cfb\u7edf\u63ed\u793a\u591a\u6a21\u6001\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\u5728\u6267\u884c\u5220\u9664\u64cd\u4f5c\u540e\uff0c\u4e8b\u5b9e\u4fe1\u606f\u4ecd\u53ef\u901a\u8fc7\u4fdd\u7559\u7684\u56fe\u50cf\u6216\u76f8\u5173\u6587\u672c\u88ab\u6062\u590d\u7684\u5b89\u5168\u6f0f\u6d1e\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29788", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u76f4\u63a5\u63a2\u6d4b\u5220\u9664\u540e\u6cc4\u9732\u7387\u003c1%\uff0c\u4f46\u4fdd\u7559\u7684\u76f8\u5173\u6587\u672c\u53ef\u6062\u590d18.3%\uff0c\u4fdd\u7559\u56fe\u50cf\u53ef\u6062\u590d12.0%\uff0c\u4e1447%\u7684\u56fe\u50cf\u6cc4\u9732\u65e0\u6cd5\u901a\u8fc7\u6587\u672c\u9014\u5f84\u6062\u590d", "VLM\u5728\u63a8\u7406\u65f6\u5229\u7528\u9690\u5f0f\u89c6\u89c9\u7ebf\u7d22\uff0c\u5bfc\u81f4\u5373\u4f7f\u6807\u6ce8\u4e8e\u4e0d\u540c\u4e8b\u5b9e\u7684\u56fe\u50cf\u4e5f\u53ef\u80fd\u6cc4\u9732\u5df2\u5220\u9664\u4fe1\u606f", "\u5185\u5bb9\u611f\u77e5\u8bed\u4e49\u5220\u9664\u7b56\u7565\u53ef\u5c06\u56fe\u50cf\u6b8b\u7559\u6cc4\u9732\u7387\u4ece12.0%\u964d\u81f32.0%\uff0c\u4f46\u65e0\u6cd5\u5b8c\u5168\u6d88\u9664"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u9690\u79c1\u5b89\u5168", "\u8bb0\u5fc6\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29788v1", "published_at": "2026-06-29", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MemLeak: Diagnosing Information Leaks in Multimodal Agent Memory", "tldr": "\u591a\u6a21\u6001AI\u667a\u80fd\u4f53\"\u9057\u5fd8\"\u6307\u4ee4\u540e\uff0c\u4fe1\u606f\u4ecd\u53ef\u4ece\u4fdd\u7559\u56fe\u50cf\u4e2d\u6062\u590d\uff0c\u5b58\u5728\u9690\u6027\u8bb0\u5fc6\u6cc4\u9732\u98ce\u9669", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4fe1\u606f\u6eaf\u6e90\u56fe\uff08IPG\uff09\u5206\u7c7b\u6846\u67b6\u4e0eMemLeak\u57fa\u51c6\uff0c\u7cfb\u7edf\u63ed\u793a\u591a\u6a21\u6001\u667a\u80fd\u4f53\u8bb0\u5fc6\u7cfb\u7edf\u5728\u6267\u884c\u5220\u9664\u64cd\u4f5c\u540e\uff0c\u4e8b\u5b9e\u4fe1\u606f\u4ecd\u53ef\u901a\u8fc7\u4fdd\u7559\u7684\u56fe\u50cf\u6216\u76f8\u5173\u6587\u672c\u88ab\u6062\u590d\u7684\u5b89\u5168\u6f0f\u6d1e\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316\u591a\u6a21\u6001\u8bb0\u5fc6\u7cfb\u7edf\u7684\"\u9057\u5fd8\u5931\u6548\"\u95ee\u9898\uff0c\u5bf9AI\u9690\u79c1\u5408\u89c4\uff08\u5982GDPR\u9057\u5fd8\u6743\uff09\u5177\u6709\u91cd\u8981\u73b0\u5b9e\u610f\u4e49\uff0c\u53cc\u6807\u6ce8\u8005\u9a8c\u8bc1\uff08kappa=0.88\uff09\u4fdd\u8bc1\u4e86\u8bc4\u4f30\u53ef\u9760\u6027"}, {"abstract": "Language model loss follows remarkably regular scaling laws over model and data size, yet it remains unclear why the aggregate loss should exhibit a power-law form. Existing explanations often attribute this regularity to a heavy-tailed spectrum of pattern difficulty in natural language, but this view has not been directly validated at token-level granularity in large-scale real-data training. We present a token-level framework that decomposes scaling laws into localized learning events of individual contextualized tokens. By fitting token loss trajectories with sigmoids, we show that token learning is concentrated in localized transitions, giving rise to a learning-time spectrum that dominates the scaling-law shape. Across more than one hundred pre-training runs on large and diverse real-language corpora with modern LLM architectures, scaling up to 6B parameters and 300B training tokens, the measured learning-time spectrum quantitatively reconstructs the validation loss derivative along the training-step $T$, data-scale $D$, and model-scale $M$ axes. We further show that the same signal is actionable: by reshaping the training distribution according to when tokens become learnable, we alter the optimization trajectory and achieve 11\\% faster validation-loss reduction. These results provide direct empirical evidence that scaling laws are governed primarily by the distribution of token-level learning times, and that this distribution can be used not only to explain scaling behavior but also to improve training performance.", "arxiv_id": "2606.29858", "arxiv_url": "https://arxiv.org/abs/2606.29858", "authors": ["Pingjie Wang", "Zechen Hu", "Peiru Yang", "Fu Guo", "Debing Zhang"], "brief": "\u63d0\u51fatoken\u7ea7\u6846\u67b6\uff0c\u5c06\u7f29\u653e\u5b9a\u5f8b\u5206\u89e3\u4e3a\u5355\u4e2a\u4e0a\u4e0b\u6587token\u7684\u5c40\u90e8\u5b66\u4e60\u4e8b\u4ef6\uff0c\u901a\u8fc7sigmoid\u62df\u5408token\u635f\u5931\u8f68\u8ff9\uff0c\u63ed\u793a\u7f29\u653e\u5b9a\u5f8b\u7684\u5e42\u5f8b\u5f62\u6001\u7531token\u5b66\u4e60\u65f6\u95f4\u8c31\u51b3\u5b9a\uff0c\u5e76\u5229\u7528\u8be5\u4fe1\u53f7\u4f18\u5316\u8bad\u7ec3\u5206\u5e03\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29858", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u7528sigmoid\u51fd\u6570\u62df\u5408token\u635f\u5931\u8f68\u8ff9\uff0c\u53d1\u73b0token\u5b66\u4e60\u96c6\u4e2d\u4e8e\u5c40\u90e8\u8dc3\u8fc1\uff0c\u5f62\u6210\u5b66\u4e60\u65f6\u95f4\u8c31", "\u5728\u8d85\u8fc7100\u6b21\u9884\u8bad\u7ec3\u5b9e\u9a8c\u4e2d\uff08\u6700\u59276B\u53c2\u6570\u3001300B tokens\uff09\uff0c\u5b66\u4e60\u65f6\u95f4\u8c31\u53ef\u5b9a\u91cf\u91cd\u5efa\u8bad\u7ec3\u6b65T\u3001\u6570\u636e\u89c4\u6a21D\u3001\u6a21\u578b\u89c4\u6a21M\u4e09\u4e2a\u8f74\u4e0a\u7684\u9a8c\u8bc1\u635f\u5931\u5bfc\u6570", "\u6839\u636etoken\u53ef\u5b66\u4e60\u65f6\u95f4\u91cd\u5851\u8bad\u7ec3\u6570\u636e\u5206\u5e03\uff0c\u5b9e\u73b0\u9a8c\u8bc1\u635f\u5931\u4e0b\u964d\u901f\u5ea6\u63d0\u534711%"], "keywords": ["\u7f29\u653e\u5b9a\u5f8b", "\u8bed\u8a00\u6a21\u578b", "\u8bad\u7ec3\u4f18\u5316", "\u5927\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29858v1", "published_at": "2026-06-29", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Smooth Scaling Laws Hide Stepwise Token Learning", "tldr": "\u8bed\u8a00\u6a21\u578b\u7f29\u653e\u5b9a\u5f8b\u6e90\u4e8etoken\u7ea7\u5b66\u4e60\u65f6\u95f4\u5206\u5e03\uff0c\u53ef\u7528\u4e8e\u52a0\u901f\u8bad\u7ec311%", "upvotes": 0, "what_it_is": "\u63d0\u51fatoken\u7ea7\u6846\u67b6\uff0c\u5c06\u7f29\u653e\u5b9a\u5f8b\u5206\u89e3\u4e3a\u5355\u4e2a\u4e0a\u4e0b\u6587token\u7684\u5c40\u90e8\u5b66\u4e60\u4e8b\u4ef6\uff0c\u901a\u8fc7sigmoid\u62df\u5408token\u635f\u5931\u8f68\u8ff9\uff0c\u63ed\u793a\u7f29\u653e\u5b9a\u5f8b\u7684\u5e42\u5f8b\u5f62\u6001\u7531token\u5b66\u4e60\u65f6\u95f4\u8c31\u51b3\u5b9a\uff0c\u5e76\u5229\u7528\u8be5\u4fe1\u53f7\u4f18\u5316\u8bad\u7ec3\u5206\u5e03\u3002", "why_notable": "\u9996\u6b21\u5728\u5927\u89c4\u6a21\u771f\u5b9e\u6570\u636e\u8bad\u7ec3\u4e2d\u4ee5token\u7c92\u5ea6\u76f4\u63a5\u9a8c\u8bc1\u7f29\u653e\u5b9a\u5f8b\u7684\u6210\u56e0\uff0c\u5c06\u7406\u8bba\u89e3\u91ca\u8f6c\u5316\u4e3a\u53ef\u64cd\u4f5c\u7684\u8bad\u7ec3\u4f18\u5316\u7b56\u7565\uff0c\u5bf9\u7406\u89e3\u548c\u6539\u8fdbLLM\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Large language models achieve high reasoning performance via explicit chain-of-thought and reinforcement learning, but require long output sequences and extended inference time. Latent reasoning reduces this cost by shifting computation into a latent space; however, continuous latent methods are hard to train, suffering from unstable and uninterpretable reasoning trajectories. We argue these issues stem from a misalignment between continuous-space reasoning and discrete symbolic supervision, as continuous states lack explicit anchors for step-by-step alignment. To resolve this, we propose \\textbf{Discrete Latent Reasoning~(DLR)}, the first method that converts continuous latent states into explicit discrete tokens. Inspired by render-based compression, we render textual chains of thought into images, extract visual features, and construct a discrete latent vocabulary via clustering-based fine-tuning. Expanding the vocabulary and output head enables standard autoregressive modeling over both natural language and latent tokens, supporting pretraining alignment, SFT, and RL. Experiments on five reasoning benchmarks and two model series~(Qwen3-VL and LLaMA-3) confirm that \\textbf{DLR} outperforms prior latent reasoning baselines with up to \\textbf{20$\\times$ compression}. Furthermore, the learned latent trajectories retain an interpretable semantic structure. Overall, discrete latent tokens provide a controllable and interpretable basis for efficient latent reasoning.", "arxiv_id": "2606.29712", "arxiv_url": "https://arxiv.org/abs/2606.29712", "authors": ["Shuochen Chang", "Qingyang Liu", "Shaobo Wang", "Bingjie Gao", "Qianli Ma", "Haonan Zhao", "Yibo Miao", "Yulin Sun", "Zelin Peng", "Jiangtong Li", "Li Niu"], "brief": "\u63d0\u51fa\u79bb\u6563\u6f5c\u5728\u63a8\u7406\uff08DLR\uff09\u65b9\u6cd5\uff0c\u5c06\u8fde\u7eed\u6f5c\u5728\u72b6\u6001\u8f6c\u6362\u4e3a\u663e\u5f0f\u79bb\u6563token\uff1a\u628a\u6587\u672c\u601d\u7ef4\u94fe\u6e32\u67d3\u6210\u56fe\u50cf\uff0c\u63d0\u53d6\u89c6\u89c9\u7279\u5f81\u540e\u901a\u8fc7\u805a\u7c7b\u6784\u5efa\u79bb\u6563\u6f5c\u5728\u8bcd\u8868\uff0c\u4ece\u800c\u5728\u6807\u51c6\u81ea\u56de\u5f52\u6846\u67b6\u4e0b\u5b9e\u73b0\u9ad8\u6548\u4e14\u53ef\u89e3\u91ca\u7684\u6f5c\u5728\u7a7a\u95f4\u63a8\u7406\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29712", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u5c06CoT\u6587\u672c\u6e32\u67d3\u4e3a\u56fe\u50cf\u2192\u63d0\u53d6\u89c6\u89c9\u7279\u5f81\u2192\u805a\u7c7b\u79bb\u6563\u5316\uff0c\u6784\u5efa\u6f5c\u5728token\u8bcd\u8868\uff0c\u89e3\u51b3\u8fde\u7eed\u6f5c\u5728\u63a8\u7406\u8bad\u7ec3\u4e0d\u7a33\u5b9a\u95ee\u9898", "\u5b9e\u73b0\u6700\u9ad820\u00d7\u5e8f\u5217\u538b\u7f29\u6bd4\uff0c\u540c\u65f6\u652f\u6301\u9884\u8bad\u7ec3\u5bf9\u9f50\u3001SFT\u548c\u5f3a\u5316\u5b66\u4e60\u5168\u6d41\u7a0b", "\u57285\u4e2a\u63a8\u7406\u57fa\u51c6\u3001Qwen3-VL\u548cLLaMA-3\u4e24\u4e2a\u6a21\u578b\u7cfb\u5217\u4e0a\u5747\u4f18\u4e8e\u73b0\u6709\u6f5c\u5728\u63a8\u7406\u57fa\u7ebf\uff0c\u4e14\u79bb\u6563\u8f68\u8ff9\u4fdd\u7559\u53ef\u89e3\u91ca\u8bed\u4e49\u7ed3\u6784"], "keywords": ["\u6f5c\u5728\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u538b\u7f29", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29712v1", "published_at": "2026-06-29", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Why Struggle with Continuous Latents? Interpretable Discrete Latent Reasoning via Rendered Compression", "tldr": "\u5c06\u601d\u7ef4\u94fe\u6e32\u67d3\u4e3a\u56fe\u50cf\u5e76\u79bb\u6563\u5316\uff0c\u5b9e\u73b0\u53ef\u89e3\u91ca\u7684\u9ad8\u6548\u6f5c\u5728\u63a8\u7406\uff0c\u538b\u7f29\u6bd4\u8
