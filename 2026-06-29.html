_notable": "\u5c06\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u8303\u5f0f\u5f15\u5165\u591a\u6a21\u6001\u878d\u5408\uff0c\u517c\u987e\u6027\u80fd\u3001\u6548\u7387\u4e0e\u53ef\u89e3\u91ca\u6027\uff0c\u5bf9\u533b\u7597\u3001\u60c5\u611f\u5206\u6790\u7b49\u590d\u6742\u591a\u6a21\u6001\u573a\u666f\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u63d0\u4f9b\u4e86\u53ef\u89c2\u5bdf\u7684\u667a\u80fd\u4f53\u89d2\u8272\u4e0e\u534f\u4f5c\u6a21\u5f0f\u3002"}, {"abstract": "Retrieval-augmented generation (RAG) typically retrieves a fixed number of passages for every query. This is wasteful when the reader already knows the answer, and it can be harmful when irrelevant or partially relevant passages distract the reader. We formulate adaptive RAG as calibrated retrieval-budget allocation: given a query, decide whether to answer closed-book, retrieve a compact context (k=1), retrieve a full context (k=5), or abstain. The contribution is a probability interface rather than a new raw uncertainty signal. We calibrate sequence log-probability and prefix-logit uncertainty signals into probabilities of correctness, then use these probabilities for graded context selection, selective abstention, and explicit latency/token trade-offs. Across core QA experiments on TriviaQA, Natural Questions, and MS MARCO, with auxiliary PopQA motivation and Qwen/Llama family checks, diagnostic out-of-fold calibration improves probability quality dramatically: for sequence log-probability, ECE drops from 0.275 to 0.062 on TriviaQA, 0.643 to 0.009 on NQ, and 0.711 to 0.031 on MS MARCO. Graded retrieval improves full-context and passage-budget frontiers for both our signal and TARG-style prefix entropy/margin, while retrieval-call AUC remains essentially tied with binary gating because k=1 is still a retrieval call. Held-out train/validation/test threshold experiments report deployable operating points. At matched-accuracy frontier operating points, a measured cost model reveals that gating is not universally faster: it increases latency by about 27% on Qwen3-8B but saves about 8% on Qwen3-32B. These results support a nuanced view of adaptive RAG: calibrated confidence is best understood as a reusable interface for allocating retrieval budget under task and system constraints.", "arxiv_id": "2606.29959", "arxiv_url": "https://arxiv.org/abs/2606.29959", "authors": ["Zhe Dong", "Fang Qin", "Manish Shah", "Yicheng Wang"], "brief": "\u63d0\u51fa\u5c06\u81ea\u9002\u5e94RAG\u91cd\u65b0\u5b9a\u4e49\u4e3a\"\u6821\u51c6\u68c0\u7d22\u9884\u7b97\u5206\u914d\"\u95ee\u9898\uff1a\u6839\u636e\u67e5\u8be2\u7f6e\u4fe1\u5ea6\u51b3\u5b9a\u662f\u5426\u95ed\u5377\u56de\u7b54\u3001\u68c0\u7d22\u5c11\u91cf(k=1)\u6216\u5b8c\u6574(k=5)\u6bb5\u843d\uff0c\u6216\u5f03\u6743\u3002\u6838\u5fc3\u8d21\u732e\u662f\u5c06\u5e8f\u5217\u5bf9\u6570\u6982\u7387\u7b49\u4e0d\u786e\u5b9a\u6027\u4fe1\u53f7\u6821\u51c6\u4e3a\u6b63\u786e\u7387\u6982\u7387\uff0c\u4f5c\u4e3a\u53ef\u590d\u7528\u7684\u51b3\u7b56\u63a5\u53e3\u3002", "categories": ["cs.IR", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29959", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6821\u51c6\u540eECE\uff08\u671f\u671b\u6821\u51c6\u8bef\u5dee\uff09\u5927\u5e45\u4e0b\u964d\uff1aTriviaQA\u4ece0.275\u964d\u81f30.062\uff0cNQ\u4ece0.643\u964d\u81f30.009\uff0cMS MARCO\u4ece0.711\u964d\u81f30.031", "\u5206\u7ea7\u68c0\u7d22\uff08closed-book/k=1/k=5/abstain\uff09\u6539\u5584\u4e86\u5168\u4e0a\u4e0b\u6587\u4e0e\u6bb5\u843d\u9884\u7b97\u7684\u6548\u7387\u524d\u6cbf", "\u95e8\u63a7\u5e76\u975e\u666e\u904d\u52a0\u901f\uff1a\u5728Qwen3-8B\u4e0a\u5ef6\u8fdf\u589e\u52a0\u7ea627%\uff0c\u5728Qwen3-32B\u4e0a\u8282\u7701\u7ea68%\uff0c\u9700\u7ed3\u5408\u7cfb\u7edf\u7ea6\u675f\u6743\u8861"], "keywords": ["\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u4e0d\u786e\u5b9a\u6027\u6821\u51c6", "\u81ea\u9002\u5e94\u68c0\u7d22", "\u95ee\u7b54\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29959v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Know Before You Fetch: Calibrated Retrieval-Budget Allocation for Retrieval-Augmented Generation", "tldr": "\u5c06RAG\u68c0\u7d22\u9884\u7b97\u5206\u914d\u95ee\u9898\u8f6c\u5316\u4e3a\u6821\u51c6\u6982\u7387\u63a5\u53e3\uff0c\u5b9e\u73b0\u81ea\u9002\u5e94\u68c0\u7d22\u51b3\u7b56", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u5c06\u81ea\u9002\u5e94RAG\u91cd\u65b0\u5b9a\u4e49\u4e3a\"\u6821\u51c6\u68c0\u7d22\u9884\u7b97\u5206\u914d\"\u95ee\u9898\uff1a\u6839\u636e\u67e5\u8be2\u7f6e\u4fe1\u5ea6\u51b3\u5b9a\u662f\u5426\u95ed\u5377\u56de\u7b54\u3001\u68c0\u7d22\u5c11\u91cf(k=1)\u6216\u5b8c\u6574(k=5)\u6bb5\u843d\uff0c\u6216\u5f03\u6743\u3002\u6838\u5fc3\u8d21\u732e\u662f\u5c06\u5e8f\u5217\u5bf9\u6570\u6982\u7387\u7b49\u4e0d\u786e\u5b9a\u6027\u4fe1\u53f7\u6821\u51c6\u4e3a\u6b63\u786e\u7387\u6982\u7387\uff0c\u4f5c\u4e3a\u53ef\u590d\u7528\u7684\u51b3\u7b56\u63a5\u53e3\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06RAG\u81ea\u9002\u5e94\u68c0\u7d22\u95ee\u9898\u5efa\u6a21\u4e3a\u6821\u51c6\u6982\u7387\u5206\u914d\u6846\u67b6\uff0c\u63ed\u793a\u4e86\"\u95e8\u63a7\u4e0d\u4e00\u5b9a\u66f4\u5feb\"\u7684\u53cd\u76f4\u89c9\u7ed3\u8bba\uff0c\u4e3a\u5b9e\u9645\u90e8\u7f72\u63d0\u4f9b\u4e86\u53ef\u91cf\u5316\u7684\u5ef6\u8fdf/token\u6743\u8861\u5206\u6790\uff0c\u5177\u6709\u8f83\u5f3a\u5de5\u7a0b\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Automatic evaluation of image and video captioning is essential for benchmarking multimodal systems, although standard evaluation metrics show limited alignment with human judgments. Recent approaches using large language models (LLMs), commonly referred to as LLM-as-a-Judge, have improved alignment with human judgments but still suffer from a mismatch between large-vocabulary language modeling and evaluation over a small label set. To address this, we propose Rigel, an automatic evaluation metric for image and video captioning, based on self-distilled score adaptation. The metric employs an evaluation-specific scoring head distilled from a frozen LLM, which captures judgment signals in a task-aligned space without relying on large-vocabulary token sets. We then refine the LLM backbone with human judgment data. To train Rigel, we constructed the Vid-Lepus dataset, which contains 3,338 video clips, 33,380 reference captions, and 5,637 candidate captions. Experiments on multiple benchmarks show that Rigel outperforms state-of-the-art metrics, achieving over 10-point improvements on ActivityNet-Fact in the reference-free setting.", "arxiv_id": "2606.29997", "arxiv_url": "https://arxiv.org/abs/2606.29997", "authors": ["Shuitsu Koyama", "Kazuki Matsuda", "Yuiga Wada", "Shinnosuke Hirano", "Daichi Yashima", "Komei Sugiura"], "brief": "\u63d0\u51faRigel\uff0c\u4e00\u79cd\u7528\u4e8e\u56fe\u50cf\u548c\u89c6\u9891\u63cf\u8ff0\u8bc4\u4f30\u7684\u81ea\u52a8\u6307\u6807\uff0c\u901a\u8fc7\u4ece\u51bb\u7ed3LLM\u84b8\u998f\u51fa\u8bc4\u4f30\u4e13\u7528\u8bc4\u5206\u5934\uff0c\u5c06\u5224\u65ad\u4fe1\u53f7\u6620\u5c04\u5230\u4efb\u52a1\u5bf9\u9f50\u7a7a\u95f4\uff0c\u5e76\u7ed3\u5408\u4eba\u7c7b\u5224\u65ad\u6570\u636e\u5fae\u8c03\u4e3b\u5e72\u6a21\u578b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29997", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u81ea\u84b8\u998f\u5206\u6570\u9002\u914d\u2014\u2014\u4ece\u51bb\u7ed3LLM\u84b8\u998f\u8bc4\u4f30\u4e13\u7528\u8bc4\u5206\u5934\uff0c\u907f\u514d\u5927\u8bcd\u8868\u4e0e\u5c0f\u6807\u7b7e\u96c6\u4e4b\u95f4\u7684\u4e0d\u5339\u914d\u95ee\u9898", "\u6784\u5efaVid-Lepus\u6570\u636e\u96c6\uff1a\u5305\u542b3,338\u4e2a\u89c6\u9891\u7247\u6bb5\u300133,380\u6761\u53c2\u8003\u63cf\u8ff0\u548c5,637\u6761\u5019\u9009\u63cf\u8ff0\uff0c\u7528\u4e8e\u8bad\u7ec3", "\u5728ActivityNet-Fact\u65e0\u53c2\u8003\u8bbe\u7f6e\u4e0b\u8d85\u8d8aSOTA\u6307\u6807\u8d85\u8fc710\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u591a\u6a21\u6001", "\u8bc4\u4f30\u6307\u6807", "\u89c6\u9891\u7406\u89e3", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29997v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Rigel: Self-Distilled Score Adaptation for Image and Video Captioning Evaluation", "tldr": "Rigel\uff1a\u57fa\u4e8e\u81ea\u84b8\u998f\u5206\u6570\u9002\u914d\u7684\u56fe\u50cf\u4e0e\u89c6\u9891\u63cf\u8ff0\u81ea\u52a8\u8bc4\u4f30\u6307\u6807", "upvotes": 0, "what_it_is": "\u63d0\u51faRigel\uff0c\u4e00\u79cd\u7528\u4e8e\u56fe\u50cf\u548c\u89c6\u9891\u63cf\u8ff0\u8bc4\u4f30\u7684\u81ea\u52a8\u6307\u6807\uff0c\u901a\u8fc7\u4ece\u51bb\u7ed3LLM\u84b8\u998f\u51fa\u8bc4\u4f30\u4e13\u7528\u8bc4\u5206\u5934\uff0c\u5c06\u5224\u65ad\u4fe1\u53f7\u6620\u5c04\u5230\u4efb\u52a1\u5bf9\u9f50\u7a7a\u95f4\uff0c\u5e76\u7ed3\u5408\u4eba\u7c7b\u5224\u65ad\u6570\u636e\u5fae\u8c03\u4e3b\u5e72\u6a21\u578b\u3002", "why_notable": "\u89e3\u51b3\u4e86LLM-as-a-Judge\u65b9\u6cd5\u4e2d\u5927\u8bcd\u8868\u8bed\u8a00\u5efa\u6a21\u4e0e\u5c0f\u6807\u7b7e\u8bc4\u4f30\u96c6\u4e4b\u95f4\u7684\u6839\u672c\u6027\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u663e\u8457\u63d0\u5347\u4e86\u4e0e\u4eba\u7c7b\u5224\u65ad\u7684\u5bf9\u9f50\u5ea6\uff0c\u5bf9\u591a\u6a21\u6001\u7cfb\u7edf\u8bc4\u6d4b\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Vision-Language Models (VLMs) often achieve high performance on benchmarks while remaining \"black boxes\", yet they remain prone to hallucination or rely on superficial shortcuts. In this work, we propose a framework designed to enhance both performance and interpretability through De-compositional Evidence Grounding. Unlike monolithic inference approaches, our approach forces the model to decompose a global query into a sequence of atomic sub-questions, each requiring an explicit sub-answer and critically a localized evidence bounding box. By grounding intermediate logical steps (e.g. identifying a container, analyzing liquid properties, and assessing environmental context) in specific visual regions, we construct a structured reasoning path that mirrors human-like deduction. This allows the final answer to emerge as a logical consequence of verified visual facts rather than a statistical guess.", "arxiv_id": "2606.29915", "arxiv_url": "https://arxiv.org/abs/2606.29915", "authors": ["Eric Peh", "Debaditya Roy", "Basura Fernando"], "brief": "\u63d0\u51faH-GRPO\u6846\u67b6\uff0c\u5c06\u5168\u5c40\u67e5\u8be2\u5206\u89e3\u4e3a\u4e00\u7cfb\u5217\u539f\u5b50\u5b50\u95ee\u9898\uff0c\u6bcf\u4e2a\u5b50\u95ee\u9898\u9700\u7ed9\u51fa\u660e\u786e\u5b50\u7b54\u6848\u53ca\u5bf9\u5e94\u7684\u89c6\u89c9\u5b9a\u4f4d\u8fb9\u754c\u6846\uff0c\u6784\u5efa\u7ed3\u6784\u5316\u63a8\u7406\u8def\u5f84\u4ee5\u63d0\u5347VLM\u7684\u6027\u80fd\u4e0e\u53ef\u89e3\u91ca\u6027\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29915", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u5168\u5c40\u67e5\u8be2\u5206\u89e3\u4e3a\u539f\u5b50\u5b50\u95ee\u9898\u5e8f\u5217\uff0c\u6bcf\u6b65\u9700\u63d0\u4f9b\u5b50\u7b54\u6848\u4e0e\u5b9a\u4f4d\u8fb9\u754c\u6846\uff08bounding box\uff09", "\u4e2d\u95f4\u63a8\u7406\u6b65\u9aa4\uff08\u5982\u8bc6\u522b\u5bb9\u5668\u3001\u5206\u6790\u6db2\u4f53\u5c5e\u6027\u3001\u8bc4\u4f30\u73af\u5883\u4e0a\u4e0b\u6587\uff09\u5747\u951a\u5b9a\u4e8e\u5177\u4f53\u89c6\u89c9\u533a\u57df", "\u6700\u7ec8\u7b54\u6848\u7531\u7ecf\u8fc7\u9a8c\u8bc1\u7684\u89c6\u89c9\u4e8b\u5b9e\u903b\u8f91\u63a8\u5bfc\u5f97\u51fa\uff0c\u800c\u975e\u7edf\u8ba1\u731c\u6d4b\uff0c\u6709\u6548\u7f13\u89e3\u5e7b\u89c9\u95ee\u9898"], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29915v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "H-GRPO: Permutation-Invariant Reinforcement Learning for Grounded Visual Reasoning", "tldr": "\u63d0\u51faH-GRPO\u6846\u67b6\uff0c\u901a\u8fc7\u5206\u89e3\u5f0f\u8bc1\u636e\u5b9a\u4f4d\u589e\u5f3a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u63a8\u7406\u53ef\u89e3\u91ca\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51faH-GRPO\u6846\u67b6\uff0c\u5c06\u5168\u5c40\u67e5\u8be2\u5206\u89e3\u4e3a\u4e00\u7cfb\u5217\u539f\u5b50\u5b50\u95ee\u9898\uff0c\u6bcf\u4e2a\u5b50\u95ee\u9898\u9700\u7ed9\u51fa\u660e\u786e\u5b50\u7b54\u6848\u53ca\u5bf9\u5e94\u7684\u89c6\u89c9\u5b9a\u4f4d\u8fb9\u754c\u6846\uff0c\u6784\u5efa\u7ed3\u6784\u5316\u63a8\u7406\u8def\u5f84\u4ee5\u63d0\u5347VLM\u7684\u6027\u80fd\u4e0e\u53ef\u89e3\u91ca\u6027\u3002", "why_notable": "\u901a\u8fc7\u5f3a\u5236\u6a21\u578b\u8fdb\u884c\u53ef\u9a8c\u8bc1\u7684\u5206\u6b65\u89c6\u89c9\u5b9a\u4f4d\u63a8\u7406\uff0c\u540c\u65f6\u63d0\u5347\u4e86VLM\u7684\u6027\u80fd\u4e0e\u53ef\u89e3\u91ca\u6027\uff0c\u4e3a\u89e3\u51b3\u5e7b\u89c9\u548c\u6377\u5f84\u4f9d\u8d56\u95ee\u9898\u63d0\u4f9b\u4e86\u65b0\u601d\u8def\uff0c\u7ed3\u5408GRPO\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "This paper addresses the problem of monocular metric depth estimation in aerial UAV imagery. Although recent data-driven methods have achieved remarkable progress in ground-level scenarios, models trained primarily on street-view and indoor datasets exhibit significant domain gaps when applied to aerial viewpoints. To tackle these challenges, we introduce AerialMetric, a benchmark dataset designed to evaluate and facilitate the adaptation of monocular metric depth estimation under UAV aerial viewpoints. The dataset consists of four complementary subsets collected from different sources, jointly covering real-world photogrammetry data, controlled aerial acquisition settings, photorealistic synthetic scenes, and in-the-wild Internet imagery. Totally, AerialMetric provides 52K real-world and 16K synthetic image-depth pairs with reliable metric ground truth. Based on this dataset, we conduct systematic evaluations of existing state-of-the-art models under aerial settings and investigate the impact of viewpoint, altitude, and camera parameters on metric depth prediction. In addition, by fine-tuning representative metric depth model on our dataset, we establish a comprehensive aerial benchmark and achieve state-of-the-art performance across diverse aerial imagery. Our dataset, code, and model weight are publicly available at https://kuieless.github.io/AerialMetric-ECCV2026-page/.", "arxiv_id": "2606.29716", "arxiv_url": "https://arxiv.org/abs/2606.29716", "authors": ["Zhongqiang Song", "Guanying Chen", "Yuqi Zhang", "Yin Zou", "Chuanyu Fu", "Zhiyuan Yuan", "Chuan Huang", "Shuguang Cui", "Xiaochun Cao"], "brief": "\u63d0\u51faAerialMetric\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u5305\u542b52K\u771f\u5b9e+16K\u5408\u6210\u56fe\u50cf-\u6df1\u5ea6\u5bf9\uff0c\u8986\u76d6\u591a\u79cd\u65e0\u4eba\u673a\u822a\u62cd\u573a\u666f\uff0c\u7cfb\u7edf\u8bc4\u4f30\u5e76\u9002\u914d\u73b0\u6709\u5355\u76ee\u5ea6\u91cf\u6df1\u5ea6\u4f30\u8ba1\u6a21\u578b\u81f3\u822a\u62cd\u89c6\u89d2\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29716", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6570\u636e\u96c6\u7531\u56db\u4e2a\u4e92\u8865\u5b50\u96c6\u6784\u6210\uff0c\u6db5\u76d6\u771f\u5b9e\u6444\u5f71\u6d4b\u91cf\u3001\u53d7\u63a7\u822a\u62cd\u3001\u5149\u771f\u5b9e\u611f\u5408\u6210\u573a\u666f\u53ca\u4e92\u8054\u7f51\u91ce\u5916\u56fe\u50cf", "\u5171\u63d0\u4f9b68K\u56fe\u50cf-\u6df1\u5ea6\u5bf9\uff0852K\u771f\u5b9e+16K\u5408\u6210\uff09\uff0c\u9644\u5e26\u53ef\u9760\u7684\u5ea6\u91cf\u771f\u503c", "\u7cfb\u7edf\u5206\u6790\u4e86\u89c6\u89d2\u3001\u98de\u884c\u9ad8\u5ea6\u548c\u76f8\u673a\u53c2\u6570\u5bf9\u5ea6\u91cf\u6df1\u5ea6\u9884\u6d4b\u7684\u5f71\u54cd\uff0c\u5e76\u901a\u8fc7\u5fae\u8c03\u5efa\u7acb\u4e86\u822a\u62cdSOTA\u57fa\u7ebf"], "keywords": ["\u6df1\u5ea6\u4f30\u8ba1", "\u65e0\u4eba\u673a", "\u57fa\u51c6\u6570\u636e\u96c6", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29716v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "AerialMetric: Benchmarking and Adapting UAV Monocular Metric Depth Estimation in the Real World", "tldr": "AerialMetric\uff1a\u9996\u4e2a\u4e13\u4e3a\u65e0\u4eba\u673a\u89c6\u89d2\u5355\u76ee\u5ea6\u91cf\u6df1\u5ea6\u4f30\u8ba1\u8bbe\u8ba1\u7684\u57fa\u51c6\u6570\u636e\u96c6", "upvotes": 0, "what_it_is": "\u63d0\u51faAerialMetric\u57fa\u51c6\u6570\u636e\u96c6\uff0c\u5305\u542b52K\u771f\u5b9e+16K\u5408\u6210\u56fe\u50cf-\u6df1\u5ea6\u5bf9\uff0c\u8986\u76d6\u591a\u79cd\u65e0\u4eba\u673a\u822a\u62cd\u573a\u666f\uff0c\u7cfb\u7edf\u8bc4\u4f30\u5e76\u9002\u914d\u73b0\u6709\u5355\u76ee\u5ea6\u91cf\u6df1\u5ea6\u4f30\u8ba1\u6a21\u578b\u81f3\u822a\u62cd\u89c6\u89d2\u3002", "why_notable": "\u586b\u8865\u4e86\u5355\u76ee\u6df1\u5ea6\u4f30\u8ba1\u9886\u57df\u5728\u65e0\u4eba\u673a\u822a\u62cd\u89c6\u89d2\u4e0a\u7684\u6570\u636e\u4e0e\u8bc4\u6d4b\u7a7a\u767d\uff0c\u4e3a\u5730\u9762\u6a21\u578b\u5411\u822a\u62cd\u573a\u666f\u8fc1\u79fb\u63d0\u4f9b\u4e86\u6807\u51c6\u5316\u57fa\u51c6\uff0c\u5bf9\u65e0\u4eba\u673a\u5bfc\u822a\u3001\u4e09\u7ef4\u91cd\u5efa\u7b49\u5b9e\u9645\u5e94\u7528\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Unified visual anomaly detection seeks to train a single detector that can be deployed across categories, domains, and application scenarios. In the few-shot transfer regime, the key challenge is to estimate an episode-specific boundary for an unseen target category from a small support set. Existing approaches mainly infer this boundary from normal-side evidence and provide limited abnormal-side evidence for deployment-specific tolerance. Within the normal side, they often struggle to jointly capture local correspondences and global support-query relations, making their boundaries less reliable for unseen anomalies. To address these issues, we propose UniVAD v2, a two-sided support-conditioned boundary construction framework for unified visual anomaly detection. Built on the component-patch divide-and-conquer framework of UniVAD, UniVAD v2 strengthens the normal side with an Optimal Transport-based Relational Modeling module (OTRM), which complements retrieval with support-query matching through transport-style allocation, and an Adaptive Coordination mechanism for Retrieval and Relational Modeling (ACRRM), which estimates episode-conditioned reliabilities to fuse the two sources of evidence. On the abnormal side, a Few-Shot Abnormal Reference module (FAR) converts optional abnormal references into rejection-side evidence for boundary adjustment. Experiments on six datasets spanning industrial, logical, and medical anomaly detection demonstrate strong cross-domain generalization. Under the 1N-shot protocol, UniVAD v2 improves the mean image-level AUC over UniVAD from 83.0\\% to 84.5\\%, and further reaches 85.7\\% in the 1N+1A-shot setting. On the MVTec-AD Severity Split (MVTec-AD-SS), UniVAD v2 achieves 96.2\\% image-level AUC and 96.9\\% pixel-level AUC, showing that abnormal references enable controllable boundary customization without retraining.", "arxiv_id": "2606.29714", "arxiv_url": "https://arxiv.org/abs/2606.29714", "authors": ["Zhaopeng Gu", "Bingke Zhu", "Zhaowen Li", "Guibo Zhu", "Yingying Chen", "Ming Tang", "Peng Su", "Jinqiao Wang"], "brief": "\u63d0\u51faUniVAD v2\uff0c\u4e00\u4e2a\u7528\u4e8e\u7edf\u4e00\u89c6\u89c9\u5f02\u5e38\u68c0\u6d4b\u7684\u53cc\u4fa7\u652f\u6301\u6761\u4ef6\u8fb9\u754c\u6784\u5efa\u6846\u67b6\uff0c\u901a\u8fc7\u6700\u4f18\u4f20\u8f93\u5173\u7cfb\u5efa\u6a21\u548c\u5c11\u6837\u672c\u5f02\u5e38\u53c2\u8003\u6a21\u5757\uff0c\u540c\u65f6\u5229\u7528\u6b63\u5e38\u4fa7\u4e0e\u5f02\u5e38\u4fa7\u8bc1\u636e\u6765\u4f30\u8ba1\u7c7b\u522b\u7279\u5b9a\u7684\u68c0\u6d4b\u8fb9\u754c\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29714", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u57fa\u4e8e\u6700\u4f18\u4f20\u8f93\u7684\u5173\u7cfb\u5efa\u6a21\u6a21\u5757\uff08OTRM\uff09\uff0c\u901a\u8fc7\u4f20\u8f93\u5f0f\u5206\u914d\u5b9e\u73b0\u652f\u6301-\u67e5\u8be2\u5339\u914d\uff0c\u8865\u5145\u68c0\u7d22\u8bc1\u636e", "\u8bbe\u8ba1\u81ea\u9002\u5e94\u534f\u8c03\u673a\u5236\uff08ACRRM\uff09\uff0c\u4f30\u8ba1episode\u6761\u4ef6\u53ef\u9760\u6027\u4ee5\u878d\u5408\u68c0\u7d22\u4e0e\u5173\u7cfb\u5efa\u6a21\u4e24\u7c7b\u8bc1\u636e", "\u5c11\u6837\u672c\u5f02\u5e38\u53c2\u8003\u6a21\u5757\uff08FAR\uff09\u5c06\u53ef\u9009\u5f02\u5e38\u53c2\u8003\u8f6c\u5316\u4e3a\u62d2\u7edd\u4fa7\u8bc1\u636e\uff0c1N+1A-shot\u8bbe\u7f6e\u4e0b\u56fe\u50cf\u7ea7AUC\u8fbe85.7%\uff0cMVTec-AD-SS\u4e0a\u50cf\u7d20\u7ea7AUC\u8fbe96.9%"], "keywords": ["\u5f02\u5e38\u68c0\u6d4b", "\u5c11\u6837\u672c\u5b66\u4e60", "\u591a\u6a21\u6001", "\u8ba1\u7b97\u673a\u89c6\u89c9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29714v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "UniVAD v2: Unified Visual Anomaly Detection via Support-Conditioned Boundary Construction", "tldr": "UniVAD v2\u63d0\u51fa\u53cc\u4fa7\u652f\u6301\u6761\u4ef6\u8fb9\u754c\u6784\u5efa\u6846\u67b6\uff0c\u7edf\u4e00\u8de8\u57df\u89c6\u89c9\u5f02\u5e38\u68c0\u6d4b", "upvotes": 0, "what_it_is": "\u63d0\u51faUniVAD v2\uff0c\u4e00\u4e2a\u7528\u4e8e\u7edf\u4e00\u89c6\u89c9\u5f02\u5e38\u68c0\u6d4b\u7684\u53cc\u4fa7\u652f\u6301\u6761\u4ef6\u8fb9\u754c\u6784\u5efa\u6846\u67b6\uff0c\u901a\u8fc7\u6700\u4f18\u4f20\u8f93\u5173\u7cfb\u5efa\u6a21\u548c\u5c11\u6837\u672c\u5f02\u5e38\u53c2\u8003\u6a21\u5757\uff0c\u540c\u65f6\u5229\u7528\u6b63\u5e38\u4fa7\u4e0e\u5f02\u5e38\u4fa7\u8bc1\u636e\u6765\u4f30\u8ba1\u7c7b\u522b\u7279\u5b9a\u7684\u68c0\u6d4b\u8fb9\u754c\u3002", "why_notable": "\u9996\u6b21\u5728\u7edf\u4e00\u5f02\u5e38\u68c0\u6d4b\u6846\u67b6\u4e2d\u7cfb\u7edf\u5f15\u5165\u53cc\u4fa7\uff08\u6b63\u5e38+\u5f02\u5e38\uff09\u8fb9\u754c\u6784\u5efa\uff0c\u652f\u6301\u65e0\u9700\u91cd\u8bad\u7ec3\u7684\u53ef\u63a7\u8fb9\u754c\u5b9a\u5236\uff0c\u5728\u5de5\u4e1a\u3001\u903b\u8f91\u548c\u533b\u7597\u7b49\u516d\u4e2a\u8de8\u57df\u6570\u636e\u96c6\u4e0a\u5747\u5c55\u73b0\u5f3a\u6cdb\u5316\u80fd\u529b\u3002"}, {"abstract": "Industry-scale video and live-streaming moderation imposes requirements that are difficult to satisfy with generic pretrained public models or external APIs, including adaptation to platform-specific data distributions, policy-specific objectives, and product-level safety constraints. As a result, platforms must undertake internal model development, naturally turning to shared public research for guidance. However, existing multimodal foundation-model studies primarily report architectures, training recipes, data scaling strategies, and benchmark results, but provide less systematic guidance on how failures should be localized and translated into targeted model-development interventions. Interventions are essential because deployment failures are rarely self-explanatory. Similar failures can originate from different causes. Without targeted interventions, improvement reduces to heuristic trial-and-error, where benchmark improvements are weakly attributable, and failures are difficult to trace to their underlying causes. To address this gap, we present a diagnostic methodology for industry-scale Audio-Visual-Language Models AVLM development. The methodology maps model failures into a taxonomy of observable failure signatures and links each class of failure to an intervention space. We instantiate this methodology across the development and alignment lifecycle of an AVLM foundation model for a large-scale video and live-streaming platform. The resulting system supports over 100 regions and is designed for noisy, ambiguous, and highly diverse content drawn from global platform traffic.", "arxiv_id": "2606.30059", "arxiv_url": "https://arxiv.org/abs/2606.30059", "authors": ["Shuchang Ye", "Jinqiang Yu", "Zhujun Xiao", "Yajing Kong", "Yist Y. Lin", "Yang Ma", "Jiaxi Liu", "Xiaolei Xu", "Zheng Yu"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u5957\u9488\u5bf9\u5de5\u4e1a\u7ea7\u97f3\u89c6\u9891\u8bed\u8a00\u6a21\u578b\uff08AVLM\uff09\u7684\u8bca\u65ad\u65b9\u6cd5\u8bba\uff0c\u5c06\u6a21\u578b\u90e8\u7f72\u5931\u8d25\u7cfb\u7edf\u6027\u5730\u5f52\u7c7b\u4e3a\u53ef\u89c2\u6d4b\u7684\u5931\u8d25\u7279\u5f81\u5206\u7c7b\u4f53\u7cfb\uff0c\u5e76\u5c06\u6bcf\u7c7b\u5931\u8d25\u4e0e\u5177\u4f53\u7684\u6a21\u578b\u5f00\u53d1\u5e72\u9884\u63aa\u65bd\u76f8\u5173\u8054\uff0c\u5e94\u7528\u4e8e\u5927\u89c4\u6a21\u89c6\u9891\u4e0e\u76f4\u64ad\u5e73\u53f0\u7684\u5185\u5bb9\u5ba1\u6838\u7cfb\u7edf\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30059", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efa\u5931\u8d25\u5206\u7c7b\u4f53\u7cfb\uff08Failure Taxonomy\uff09\uff0c\u5c06\u6a21\u578b\u5931\u8d25\u6620\u5c04\u4e3a\u53ef\u89c2\u6d4b\u7684\u5931\u8d25\u7279\u5f81\u7c7b\u522b\uff0c\u907f\u514d\u542f\u53d1\u5f0f\u8bd5\u9519", "\u65b9\u6cd5\u8bba\u8986\u76d6AVLM\u57fa\u7840\u6a21\u578b\u7684\u5b8c\u6574\u5f00\u53d1\u4e0e\u5bf9\u9f50\u751f\u547d\u5468\u671f\uff0c\u652f\u6301\u8d85\u8fc7100\u4e2a\u5730\u533a\u7684\u5185\u5bb9\u5ba1\u6838", "\u9488\u5bf9\u5e73\u53f0\u7279\u5b9a\u6570\u636e\u5206\u5e03\u3001\u653f\u7b56\u76ee\u6807\u548c\u4ea7\u54c1\u5b89\u5168\u7ea6\u675f\uff0c\u63d0\u4f9b\u53ef\u8ffd\u6eaf\u7684\u5e72\u9884\u7a7a\u95f4\u8bbe\u8ba1"], "keywords": ["\u591a\u6a21\u6001", "\u5185\u5bb9\u5ba1\u6838", "\u5de5\u4e1a\u90e8\u7f72", "\u6a21\u578b\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30059v1", "published_at": "2026-06-29", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "From Failure Taxonomy to Intervention: A Diagnostic Methodology for Industry-Scale AVLM in Video and Live-Streaming Platform Moderation", "tldr": "\u63d0\u51fa\u9762\u5411\u5de5\u4e1a\u7ea7\u89c6\u9891/\u76f4\u64ad\u5e73\u53f0\u5185\u5bb9\u5ba1\u6838\u7684AVLM\u8bca\u65ad\u65b9\u6cd5\u8bba\uff0c\u5c06\u6a21\u578b\u5931\u8d25\u5206\u7c7b\u5e76\u6620\u5c04\u5230\u9488\u5bf9\u6027\u5e72\u9884\u63aa\u65bd", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e00\u5957\u9488\u5bf9\u5de5\u4e1a\u7ea7\u97f3\u89c6\u9891\u8bed\u8a00\u6a21\u578b\uff08AVLM\uff09\u7684\u8bca\u65ad\u65b9\u6cd5\u8bba\uff0c\u5c06\u6a21\u578b\u90e8\u7f72\u5931\u8d25\u7cfb\u7edf\u6027\u5730\u5f52\u7c7b\u4e3a\u53ef\u89c2\u6d4b\u7684\u5931\u8d25\u7279\u5f81\u5206\u7c7b\u4f53\u7cfb\uff0c\u5e76\u5c06\u6bcf\u7c7b\u5931\u8d25\u4e0e\u5177\u4f53\u7684\u6a21\u578b\u5f00\u53d1\u5e72\u9884\u63aa\u65bd\u76f8\u5173\u8054\uff0c\u5e94\u7528\u4e8e\u5927\u89c4\u6a21\u89c6\u9891\u4e0e\u76f4\u64ad\u5e73\u53f0\u7684\u5185\u5bb9\u5ba1\u6838\u7cfb\u7edf\u3002", "why_notable": "\u586b\u8865\u4e86\u5b66\u672f\u754c\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\u7814\u7a76\u4e0e\u5de5\u4e1a\u754c\u5b9e\u9645\u90e8\u7f72\u4e4b\u95f4\u7684\u65b9\u6cd5\u8bba\u7a7a\u767d\uff0c\u4e3a\u5e73\u53f0\u7ea7\u5185\u5bb9\u5ba1\u6838\u6a21\u578b\u5f00\u53d1\u63d0\u4f9b\u4e86\u7cfb\u7edf\u5316\u3001\u53ef\u590d\u73b0\u7684\u5931\u8d25\u8bca\u65ad\u4e0e\u6539\u8fdb\u6846\u67b6\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5de5\u7a0b\u5b9e\u8df5\u6307\u5bfc\u4ef7\u503c"}, {"abstract": "Navigating the deluge of heterogeneous medical data, from academic literature (PubMed) to clinical guidelines (Web) and private knowledge bases, remains a critical bottleneck for evidence-based medicine. While commercial black-box tools lack transparency, standard open-source RAG implementations frequently suffer from reasoning drift when handling complex, long-tail queries. We present DEEPMED Search, a fully open-source, agentic platform designed for transparent medical deep research. Built on a high-performance Next.js architecture, DEEPMED Search features a source-adaptive router that autonomously dispatches sub-queries to PubMed, web search, or local graph-based knowledge bases based on information density. Crucially, the platform integrates an introspective verification module, powered by a causal-consistent multi-agent debate framework, to validate retrieved evidence against diagnostic logic before synthesis. To demonstrate its robustness, we showcase DEEPMED Search\u0027s ability to autonomously decompose high-difficulty rare disease queries, filter out confounding noise, and generate structured, citation-backed research reports in minutes. By open-sourcing this software, we provide the community with a robust infrastructure to democratize access to trustworthy, glass-box medical reasoning in research and prototyping settings.", "arxiv_id": "2606.29746", "arxiv_url": "https://arxiv.org/abs/2606.29746", "authors": ["Maolin Liu", "Fanyu Xu", "Ruoqing Xu", "Jiahang Zhang", "Hao Wang", "Rui Wang"], "brief": "DEEPMED Search\u662f\u4e00\u4e2a\u5f00\u6e90\u667a\u80fd\u4f53\u5e73\u53f0\uff0c\u4e13\u4e3a\u533b\u5b66\u6df1\u5ea6\u7814\u7a76\u8bbe\u8ba1\uff0c\u80fd\u81ea\u9002\u5e94\u8def\u7531\u67e5\u8be2\u81f3PubMed\u3001\u7f51\u7edc\u641c\u7d22\u6216\u672c\u5730\u77e5\u8bc6\u5e93\uff0c\u5e76\u901a\u8fc7\u56e0\u679c\u4e00\u81f4\u7684\u591a\u667a\u80fd\u4f53\u8fa9\u8bba\u6846\u67b6\u8fdb\u884c\u5185\u7701\u9a8c\u8bc1\uff0c\u6709\u6548\u51cf\u5c11\u63a8\u7406\u6f02\u79fb\u3002\u8be5\u5e73\u53f0\u53ef\u81ea\u4e3b\u5206\u89e3\u7f55\u89c1\u75c5\u590d\u6742\u67e5\u8be2\uff0c\u8fc7\u6ee4\u5e72\u6270\u566a\u58f0\uff0c\u5728\u6570\u5206\u949f\u5185\u751f\u6210\u5e26\u5f15\u7528\u7684\u7ed3\u6784\u5316\u7814\u7a76\u62a5\u544a\uff0c\u4e3a\u5faa\u8bc1\u533b\u5b66\u63d0\u4f9b\u900f\u660e\u53ef\u4fe1\u7684\u63a8\u7406\u57fa\u7840\u8bbe\u65bd\u3002", "categories": ["cs.AI", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29746", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u533b\u7597AI", "\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29746v1", "published_at": "2026-06-29", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "DEEPMED Search: An Open-Source Agentic Platform for Medical Deep Research with Introspective Verification", "tldr": "DEEPMED Search\u662f\u4e00\u4e2a\u5f00\u6e90\u667a\u80fd\u4f53\u5e73\u53f0\uff0c\u4e13\u4e3a\u533b\u5b66\u6df1\u5ea6\u7814\u7a76\u8bbe\u8ba1\uff0c\u80fd\u81ea\u9002\u5e94\u8def\u7531\u67e5\u8be2\u81f3PubMed\u3001\u7f51\u7edc\u641c\u7d22\u6216\u672c\u5730\u77e5\u8bc6\u5e93\uff0c\u5e76\u901a\u8fc7\u56e0\u679c\u4e00\u81f4\u7684\u591a\u667a\u80fd\u4f53\u8fa9\u8bba\u6846\u67b6\u8fdb\u884c\u5185\u7701\u9a8c\u8bc1\uff0c\u6709\u6548\u51cf\u5c11\u63a8\u7406\u6f02\u79fb\u3002\u8be5\u5e73\u53f0\u53ef\u81ea\u4e3b\u5206\u89e3\u7f55\u89c1\u75c5\u590d\u6742\u67e5\u8be2\uff0c\u8fc7\u6ee4\u5e72\u6270\u566a\u58f0\uff0c\u5728\u6570\u5206\u949f\u5185\u751f\u6210\u5e26\u5f15\u7528\u7684\u7ed3\u6784\u5316\u7814\u7a76\u62a5\u544a\uff0c\u4e3a\u5faa\u8bc1\u533b\u5b66\u63d0\u4f9b\u900f\u660e\u53ef\u4fe1\u7684\u63a8\u7406\u57fa\u7840\u8bbe\u65bd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Professional translation is often a team-based process: translators, reviewers, and project managers must coordinate terminology, legal force, and accountability across documents. Yet many LLM-based translation tools treat human corrections as isolated edits. Expert decisions made in one segment or by one member are rarely captured as reusable knowledge for the rest of the team. We present DeepTrans Studio, a collaborative translation workspace that lets professionals intercept selected nodes in an agentic translation workflow, review evidence, revise AI outputs, and save approved decisions to a shared team memory. During the demo, attendees will role-play translators and reviewers, resolve preset terminology and legal-modal risks, and see how their decisions are propagated to downstream segments and surfaced in a teammate\u0027s workspace as reusable precedents. The demo illustrates how human interventions in AI-mediated work can become shared, traceable knowledge rather than one-off corrections.", "arxiv_id": "2606.29727", "arxiv_url": "https://arxiv.org/abs/2606.29727", "authors": ["Ziyang Lian", "Qingya Zhang", "Hao Wang", "Huiwen Xiong", "Qi Yang", "Lingyi Meng", "Xiaoyi Gu", "Rui Wang"], "brief": "DeepTrans Studio\u662f\u4e00\u4e2a\u534f\u4f5c\u7ffb\u8bd1\u5de5\u4f5c\u53f0\uff0c\u5141\u8bb8\u4e13\u4e1a\u4eba\u5458\u5728\u667a\u80fd\u4f53\u7ffb\u8bd1\u5de5\u4f5c\u6d41\u4e2d\u62e6\u622a\u8282\u70b9\u3001\u5ba1\u67e5AI\u8f93\u51fa\u5e76\u5c06\u51b3\u7b56\u4fdd\u5b58\u4e3a\u56e2\u961f\u5171\u4eab\u77e5\u8bc6\u5e93\u3002\u7cfb\u7edf\u5c06\u4e13\u5bb6\u7684\u4eba\u5de5\u5e72\u9884\u8f6c\u5316\u4e3a\u53ef\u590d\u7528\u7684\u5148\u4f8b\uff0c\u4f20\u64ad\u81f3\u4e0b\u6e38\u7247\u6bb5\u5e76\u5728\u56e2\u961f\u6210\u5458\u5de5\u4f5c\u533a\u4e2d\u5448\u73b0\uff0c\u89e3\u51b3\u4e86LLM\u7ffb\u8bd1\u5de5\u5177\u4e2d\u4eba\u5de5\u4fee\u6b63\u5b64\u7acb\u3001\u65e0\u6cd5\u5171\u4eab\u7684\u95ee\u9898\u3002", "categories": ["cs.AI", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29727", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4eba\u673a\u534f\u4f5c", "\u7ffb\u8bd1\u7cfb\u7edf", "\u77e5\u8bc6\u5171\u4eab"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29727v1", "published_at": "2026-06-29", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "DeepTrans Studio: Turning Expert Interventions into Shared Team Knowledge in Agentic Translation Workflows", "tldr": "DeepTrans Studio\u662f\u4e00\u4e2a\u534f\u4f5c\u7ffb\u8bd1\u5de5\u4f5c\u53f0\uff0c\u5141\u8bb8\u4e13\u4e1a\u4eba\u5458\u5728\u667a\u80fd\u4f53\u7ffb\u8bd1\u5de5\u4f5c\u6d41\u4e2d\u62e6\u622a\u8282\u70b9\u3001\u5ba1\u67e5AI\u8f93\u51fa\u5e76\u5c06\u51b3\u7b56\u4fdd\u5b58\u4e3a\u56e2\u961f\u5171\u4eab\u77e5\u8bc6\u5e93\u3002\u7cfb\u7edf\u5c06\u4e13\u5bb6\u7684\u4eba\u5de5\u5e72\u9884\u8f6c\u5316\u4e3a\u53ef\u590d\u7528\u7684\u5148\u4f8b\uff0c\u4f20\u64ad\u81f3\u4e0b\u6e38\u7247\u6bb5\u5e76\u5728\u56e2\u961f\u6210\u5458\u5de5\u4f5c\u533a\u4e2d\u5448\u73b0\uff0c\u89e3\u51b3\u4e86LLM\u7ffb\u8bd1\u5de5\u5177\u4e2d\u4eba\u5de5\u4fee\u6b63\u5b64\u7acb\u3001\u65e0\u6cd5\u5171\u4eab\u7684\u95ee\u9898\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Predicting a material\u0027s properties from its structure is a central, fast-advancing problem in computational materials science. A decade of work has produced standard public benchmarks and many published machine-learning models for the task (Dunn et al., 2020). The task\u0027s fixed metric and these baselines make it a natural setting for autonomous agent research (Karpathy, 2026). On the MatBench band-gap benchmark ($\u003e$100k crystals), a general-purpose coding agent autonomously built the most accurate model trained without external pretraining, ahead of all seventeen expert-designed models reported for the task. A closer analysis shows it reached this by implementing known methods: either already standard in crystal neural-network models, or borrowed from other areas of machine learning. The contributing implementations include element-pair features on each message-passing edge and a crystal space-group embedding. The work not only demonstrates that LLM-agent autonomous research can optimize an expert-designed machine learning model for material property prediction, but also investigates the limitations of such autonomous research.", "arxiv_id": "2606.29717", "arxiv_url": "https://arxiv.org/abs/2606.29717", "authors": ["Chenmu Zhang", "Boris I. Yakobson"], "brief": "\u5229\u7528\u81ea\u4e3bLLM\u667a\u80fd\u4f53\u5728MatBench\u80fd\u5e26\u9699\u9884\u6d4b\u57fa\u51c6\u4e0a\u4f18\u5316\u6676\u4f53\u56fe\u795e\u7ecf\u7f51\u7edc\uff0c\u65e0\u9700\u5916\u90e8\u9884\u8bad\u7ec3\u5373\u8d85\u8d8a\u6240\u670917\u4e2a\u4e13\u5bb6\u8bbe\u8ba1\u6a21\u578b\u3002\u667a\u80fd\u4f53\u901a\u8fc7\u5f15\u5165\u5143\u7d20\u5bf9\u7279\u5f81\u548c\u6676\u4f53\u7a7a\u95f4\u7fa4\u5d4c\u5165\u7b49\u5df2\u77e5\u65b9\u6cd5\u7684\u7ec4\u5408\u5b9e\u73b0\u4e86\u6027\u80fd\u63d0\u5347\uff0c\u540c\u65f6\u4e5f\u63ed\u793a\u4e86\u81ea\u4e3b\u7814\u7a76\u7684\u5c40\u9650\u6027\u3002", "categories": ["cond-mat.mtrl-sci", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29717", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u6750\u6599\u79d1\u5b66", "\u56fe\u795e\u7ecf\u7f51\u7edc", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29717v1", "published_at": "2026-06-29", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Optimizing Expert-Designed Crystal Graph Networks for Band-Gap Prediction with an Autonomous LLM Research Loop", "tldr": "\u5229\u7528\u81ea\u4e3bLLM\u667a\u80fd\u4f53\u5728MatBench\u80fd\u5e26\u9699\u9884\u6d4b\u57fa\u51c6\u4e0a\u4f18\u5316\u6676\u4f53\u56fe\u795e\u7ecf\u7f51\u7edc\uff0c\u65e0\u9700\u5916\u90e8\u9884\u8bad\u7ec3\u5373\u8d85\u8d8a\u6240\u670917\u4e2a\u4e13\u5bb6\u8bbe\u8ba1\u6a21\u578b\u3002\u667a\u80fd\u4f53\u901a\u8fc7\u5f15\u5165\u5143\u7d20\u5bf9\u7279\u5f81\u548c\u6676\u4f53\u7a7a\u95f4\u7fa4\u5d4c\u5165\u7b49\u5df2\u77e5\u65b9\u6cd5\u7684\u7ec4\u5408\u5b9e\u73b0\u4e86\u6027\u80fd\u63d0\u5347\uff0c\u540c\u65f6\u4e5f\u63ed\u793a\u4e86\u81ea\u4e3b\u7814\u7a76\u7684\u5c40\u9650\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Measurements of proprietary LLM evaluators can become invalid within weeks -- we document one case and provide the diagnostic framework to detect it. We introduce EPC -- comprising the Multimodal Preference Collapse Index (MPCI), evaluator-indexed coupling matrix, and Jensen-Shannon divergence (JSD) -- and apply it across eight experimental conditions (N=112 main + N=10 ablation = 122 unique repetitions, all reported). Coupling coefficients range from 0.00 to 1.18 across per-condition means (CV approx 0.9, n=8 conditions). Four conditions show strong coupling (N=36; GPT-4o May, GPT-4o-mini, Qwen3.7-plus, DashScope 30r); four collapse to near-zero (N=76; GPT-4o June, qwen-plus N=30, symmetric LR, DeepSeek self-eval). The May-to-June GPT-4o drift -- an N=8 re-replication inverting the study\u0027s conclusion -- is the most informative measurement: a diagnostic instrument detecting its own instability demonstrates the fragility it was designed to measure. Self-evaluation (97% zero, JSD=0.003) consistently collapses, though floor effects are possible. Output-format confound analysis finds per-strategy aggregate rho=0.89 but per-instance rho=0.219 (p=0.093); PCI reported as preference-convergence metric. We release EPC with all data. The finding is not any single coupling magnitude but the pattern of version-conditional instability that makes single-snapshot evaluator studies unreliable.", "arxiv_id": "2606.29719", "arxiv_url": "https://arxiv.org/abs/2606.29719", "authors": ["Liu Zewen"], "brief": "\u672c\u6587\u63d0\u51faEPC\u8bca\u65ad\u6846\u67b6\uff0c\u7528\u4e8e\u68c0\u6d4bLLM\u8bc4\u4f30\u5668\u9a71\u52a8\u7684\u504f\u597d\u52a8\u6001\u5931\u6548\u95ee\u9898\u3002\u7814\u7a76\u53d1\u73b0\u4e13\u6709LLM\u8bc4\u4f30\u5668\u7684\u6d4b\u91cf\u7ed3\u679c\u53ef\u80fd\u5728\u6570\u5468\u5185\u5931\u6548\uff0c\u4f8b\u5982GPT-4o\u4ece5\u6708\u52306\u6708\u7684\u7248\u672c\u6f02\u79fb\u76f4\u63a5\u9006\u8f6c\u4e86\u5b9e\u9a8c\u7ed3\u8bba\u3002\u6838\u5fc3\u53d1\u73b0\u662f\u7248\u672c\u6761\u4ef6\u6027\u4e0d\u7a33\u5b9a\u6a21\u5f0f\uff0c\u63ed\u793a\u4e86\u5355\u6b21\u5feb\u7167\u8bc4\u4f30\u7814\u7a76\u7684\u4e0d\u53ef\u9760\u6027\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29719", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8bc4\u4f30\u5668\u53ef\u9760\u6027", "\u504f\u597d\u5d29\u6e83", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29719v1", "published_at": "2026-06-29", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "A Diagnostic Framework and Multi-Evaluator Audit of Evaluator-Driven Preference Dynamics in Self-Adapting LLM Agents", "tldr": "\u672c\u6587\u63d0\u51faEPC\u8bca\u65ad\u6846\u67b6\uff0c\u7528\u4e8e\u68c0\u6d4bLLM\u8bc4\u4f30\u5668\u9a71\u52a8\u7684\u504f\u597d\u52a8\u6001\u5931\u6548\u95ee\u9898\u3002\u7814\u7a76\u53d1\u73b0\u4e13\u6709LLM\u8bc4\u4f30\u5668\u7684\u6d4b\u91cf\u7ed3\u679c\u53ef\u80fd\u5728\u6570\u5468\u5185\u5931\u6548\uff0c\u4f8b\u5982GPT-4o\u4ece5\u6708\u52306\u6708\u7684\u7248\u672c\u6f02\u79fb\u76f4\u63a5\u9006\u8f6c\u4e86\u5b9e\u9a8c\u7ed3\u8bba\u3002\u6838\u5fc3\u53d1\u73b0\u662f\u7248\u672c\u6761\u4ef6\u6027\u4e0d\u7a33\u5b9a\u6a21\u5f0f\uff0c\u63ed\u793a\u4e86\u5355\u6b21\u5feb\u7167\u8bc4\u4f30\u7814\u7a76\u7684\u4e0d\u53ef\u9760\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In contemporary societies, the threat of disinformation has reached alarming levels, exacerbated by the proliferation of electronic communication, social media, and advancements in artificial intelligence. As a result, there is an urgent need to develop effective countermeasures to mitigate this menace. However, the sheer scale of the problem renders manual fact-checking and human-based verification inadequate, underscoring the necessity for automated methods to detect and debunk disinformation. This article proposes a novel approach based on a multi-agent system that emulates the decision-making processes of human annotators engaged in disinformation detection tasks. By incorporating a consensus mechanism, diversity in cognition and diversity in knowledge, and also hierarchical structure, inspired by human annotators\u0027 behavior, the proposed method achieves superior results compared to individual Large Language Models (LLMs), including GPT 4 and GPT 3.5. The system leverages open models (e.g., LLaMA, Kimi, Qwen, Deepseek and LLaMA-Nemotron) to ensure greater transparency. The evaluation of the proposed method encompasses datasets in languages with varying resource availability, including English (high-resource), Polish (medium-resource), Slovak (low-resource) and Bulgarian (low-resource). Experiments were conducted on tasks such as direct disinformation detection, identification of texts worthy of verification, and detection of texts containing verifiable factual claims.", "arxiv_id": "2606.30259", "arxiv_url": "https://arxiv.org/abs/2606.30259", "authors": ["Sebastian Kula", "Martin Tamajka"], "brief": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u865a\u5047\u4fe1\u606f\u68c0\u6d4b\u65b9\u6cd5\uff0c\u901a\u8fc7\u5171\u8bc6\u673a\u5236\u3001\u8ba4\u77e5\u591a\u6837\u6027\u548c\u5c42\u7ea7\u7ed3\u6784\u6a21\u62df\u4eba\u7c7b\u6807\u6ce8\u8005\u51b3\u7b56\u8fc7\u7a0b\u3002\u4f7f\u7528\u5f00\u6e90LLM\uff08LLaMA\u3001Qwen\u3001DeepSeek\u7b49\uff09\uff0c\u5728\u82f1\u8bed\u3001\u6ce2\u5170\u8bed\u3001\u65af\u6d1b\u4f10\u514b\u8bed\u548c\u4fdd\u52a0\u5229\u4e9a\u8bed\u591a\u8bed\u8a00\u6570\u636e\u96c6\u4e0a\uff0c\u6027\u80fd\u8d85\u8d8aGPT-4\u7b49\u5355\u4e00\u5927\u6a21\u578b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30259", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u865a\u5047\u4fe1\u606f\u68c0\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4e8b\u5b9e\u6838\u67e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30259v1", "published_at": "2026-06-29", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Multi-Agentic System Leveraging Open-Source LLMs to Mitigate Disinformation Threats", "tldr": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u865a\u5047\u4fe1\u606f\u68c0\u6d4b\u65b9\u6cd5\uff0c\u901a\u8fc7\u5171\u8bc6\u673a\u5236\u3001\u8ba4\u77e5\u591a\u6837\u6027\u548c\u5c42\u7ea7\u7ed3\u6784\u6a21\u62df\u4eba\u7c7b\u6807\u6ce8\u8005\u51b3\u7b56\u8fc7\u7a0b\u3002\u4f7f\u7528\u5f00\u6e90LLM\uff08LLaMA\u3001Qwen\u3001DeepSeek\u7b49\uff09\uff0c\u5728\u82f1\u8bed\u3001\u6ce2\u5170\u8bed\u3001\u65af\u6d1b\u4f10\u514b\u8bed\u548c\u4fdd\u52a0\u5229\u4e9a\u8bed\u591a\u8bed\u8a00\u6570\u636e\u96c6\u4e0a\uff0c\u6027\u80fd\u8d85\u8d8aGPT-4\u7b49\u5355\u4e00\u5927\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Since intelligence fundamentally relies on efficient skill acquisition (Chollet, 2019), the ability to leverage skills is critical. For LLMs, skills, manually authored or extracted from task trajectories, are textual recipes encoding mature problem-solving experience and are critical to agentic capabilities. Despite widespread deployment, their utility is limited by the model\u0027s ability to comprehend and follow skill instructions, especially under complex and long-context scenarios, where key instructions are difficult to locate and adhere to. To address this limitation, we propose ParametricSkills, a framework that can convert free-form textual skills into parameters at test time, enabling context-free skill exploitation. Specifically, we first construct a large-scale, high-quality skill library, and synthesize single-turn and multi-turn skill exploitation trajectories built around these skills with OpenCode. Using these data, we then train a hypernetwork that parameterizes both the skill content and the test-time exploitation methodology by receiving textual skills and converting them into LoRA adapters. Experimental results on six complex software engineering (SWE) subtasks demonstrate that, the proposed ParametricSkills averagely outperforms in-context learning by 6.44 points as judged by DeepSeek-V4-Flash, while also achieving significantly higher BERT Score and F1 score, confirming its effectiveness. Beyond performance, we further find that parametric skills, being inherently accumulative, offer a preliminary yet promising avenue toward test-time continual learning.", "arxiv_id": "2606.30015", "arxiv_url": "https://arxiv.org/abs/2606.30015", "authors": ["Xuan Zhao", "Haonan He", "Qingyu Yang", "Minglei Li", "Jingqi Ye", "Zelin Tan", "Bo Wan", "Peng Ye"], "brief": "\u63d0\u51faParametricSkills\u6846\u67b6\uff0c\u5c06\u81ea\u7531\u6587\u672c\u5f62\u5f0f\u7684\u6280\u80fd\u5728\u6d4b\u8bd5\u65f6\u8f6c\u6362\u4e3aLoRA\u9002\u914d\u5668\u53c2\u6570\uff0c\u4f7fLLM\u65e0\u9700\u4f9d\u8d56\u4e0a\u4e0b\u6587\u5373\u53ef\u5229\u7528\u6280\u80fd\u3002\u5728\u516d\u4e2a\u8f6f\u4ef6\u5de5\u7a0b\u5b50\u4efb\u52a1\u4e0a\u5e73\u5747\u6bd4\u4e0a\u4e0b\u6587\u5b66\u4e60\u9ad8\u51fa6.44\u5206\uff0c\u5e76\u5c55\u793a\u4e86\u6d4b\u8bd5\u65f6\u6301\u7eed\u5b66\u4e60\u7684\u6f5c\u529b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30015", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53", "\u53c2\u6570\u5316\u6280\u80fd", "\u6301\u7eed\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30015v1", "published_at": "2026-06-29", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Parametric Skills", "tldr": "\u63d0\u51faParametricSkills\u6846\u67b6\uff0c\u5c06\u81ea\u7531\u6587\u672c\u5f62\u5f0f\u7684\u6280\u80fd\u5728\u6d4b\u8bd5\u65f6\u8f6c\u6362\u4e3aLoRA\u9002\u914d\u5668\u53c2\u6570\uff0c\u4f7fLLM\u65e0\u9700\u4f9d\u8d56\u4e0a\u4e0b\u6587\u5373\u53ef\u5229\u7528\u6280\u80fd\u3002\u5728\u516d\u4e2a\u8f6f\u4ef6\u5de5\u7a0b\u5b50\u4efb\u52a1\u4e0a\u5e73\u5747\u6bd4\u4e0a\u4e0b\u6587\u5b66\u4e60\u9ad8\u51fa6.44\u5206\uff0c\u5e76\u5c55\u793a\u4e86\u6d4b\u8bd5\u65f6\u6301\u7eed\u5b66\u4e60\u7684\u6f5c\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Rubric-based scoring has become a widely used paradigm in model evaluation, typically with LLM-as-a-Judge (LaaJ) for rubric scoring. However, the reliability of LaaJ for rubric scoring remains underexplored. This concern is especially pronounced in agentic scenarios, where long, complex outputs further challenge reliable scoring. To address this, we conduct a systematic meta-evaluation of LaaJ reliability for rubric verification. We introduce RuVerBench, the first benchmark for assessing LaaJ reliability in rubric verification for agentic scenarios. RuVerBench covers two prevalent agentic domains, deep research and agentic coding, with 2,458 instances, each containing a model-generated output, a rubric, and a human-annotated label indicating whether the output satisfies the rubric. Using RuVerBench, we evaluate numerous frontier LLMs and find that even the most advanced models achieve strong performance but still exhibit substantial noise. We further analyze the impact of key LaaJ strategies, including prompt design, batching, and majority voting, on rubric verification. We find that weaker models are more sensitive to prompt variations, batched verification presents a trade-off between accuracy and efficiency, and majority voting yields effective but diminishing returns. We have released our dataset and code to facilitate future research: https://github.com/THU-KEG/RuVerBench.", "arxiv_id": "2606.29920", "arxiv_url": "https://arxiv.org/abs/2606.29920", "authors": ["Yangda Peng", "Yunjia Qi", "Hao Peng", "Haotian Xia", "Guanzhong He", "Xintong Shi", "Richeng Xuan", "Songyuanyi Lu", "Yixian Liu", "Zhichao Hu", "Yuhong Liu", "Lei Hou", "Bin Xu", "Juanzi Li"], "brief": "\u672c\u6587\u9488\u5bf9\u667a\u80fd\u4f53\u573a\u666f\u4e2d\u57fa\u4e8e\u8bc4\u5206\u6807\u51c6\uff08Rubric\uff09\u7684LLM-as-a-Judge\u53ef\u9760\u6027\u95ee\u9898\uff0c\u6784\u5efa\u4e86\u9996\u4e2a\u4e13\u9879\u57fa\u51c6RuVerBench\uff08\u542b2458\u4e2a\u5b9e\u4f8b\uff0c\u8986\u76d6\u6df1\u5ea6\u7814\u7a76\u548c\u4ee3\u7801\u751f\u6210\u4e24\u7c7b\u4efb\u52a1\uff09\u3002\u8bc4\u4f30\u53d1\u73b0\u5373\u4f7f\u6700\u5148\u8fdb\u6a21\u578b\u4ecd\u5b58\u5728\u663e\u8457\u566a\u58f0\uff0c\u5e76\u5206\u6790\u4e86\u63d0\u793a\u8bbe\u8ba1\u3001\u6279\u91cf\u9a8c\u8bc1\u548c\u591a\u6570\u6295\u7968\u7b49\u7b56\u7565\u7684\u5f71\u54cd\u89c4\u5f8b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29920", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b\u8bc4\u4f30", "LLM-as-a-Judge", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29920v1", "published_at": "2026-06-29", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Can LLM-as-a-Judge Reliably Verify Rubrics in Agentic Scenarios?", "tldr": "\u672c\u6587\u9488\u5bf9\u667a\u80fd\u4f53\u573a\u666f\u4e2d\u57fa\u4e8e\u8bc4\u5206\u6807\u51c6\uff08Rubric\uff09\u7684LLM-as-a-Judge\u53ef\u9760\u6027\u95ee\u9898\uff0c\u6784\u5efa\u4e86\u9996\u4e2a\u4e13\u9879\u57fa\u51c6RuVerBench\uff08\u542b2458\u4e2a\u5b9e\u4f8b\uff0c\u8986\u76d6\u6df1\u5ea6\u7814\u7a76\u548c\u4ee3\u7801\u751f\u6210\u4e24\u7c7b\u4efb\u52a1\uff09\u3002\u8bc4\u4f30\u53d1\u73b0\u5373\u4f7f\u6700\u5148\u8fdb\u6a21\u578b\u4ecd\u5b58\u5728\u663e\u8457\u566a\u58f0\uff0c\u5e76\u5206\u6790\u4e86\u63d0\u793a\u8bbe\u8ba1\u3001\u6279\u91cf\u9a8c\u8bc1\u548c\u591a\u6570\u6295\u7968\u7b49\u7b56\u7565\u7684\u5f71\u54cd\u89c4\u5f8b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Demand for personalized financial advising is growing, but consistent advisor expertise is difficult to obtain, scale, and encode in LLM systems. Simple persona prompts rarely specify how a financial advisor should reason and often drift toward generic recommendations. We propose Fund2Persona, a framework that grounds financial-advisor personas in fund disclosures, holdings transitions, market context, and manager commentary, then refines them through an agentic actor--scorer--patcher loop. We evaluate the resulting personas on held-out holdings-transition reconstruction and manager-commentary alignment, where they better recover portfolio decisions and grounded manager interpretation than generic baselines. We further study two downstream diagnostics: market-scenario generation, where persona retrieval broadens plausible investment views beyond repeated generic rollouts, and advisory dialogues grounded in investor profiles, where matched personas give more specific and useful advice than a generic advisor. These results suggest that fund-data-grounded financial-advisor personas can make manager-specific investment expertise portable rather than merely changing an LLM\u0027s surface style.", "arxiv_id": "2606.29793", "arxiv_url": "https://arxiv.org/abs/2606.29793", "authors": ["Suhwan Park", "Hoyoung Lee", "Zhangyang Wang", "Alejandro Lopez-Lira", "Young Cha", "Chanyeol Choi", "Jaewon Choi", "Yongjae Lee"], "brief": "\u63d0\u51faFund2Persona\u6846\u67b6\uff0c\u4ece\u57fa\u91d1\u62ab\u9732\u6570\u636e\u3001\u6301\u4ed3\u53d8\u52a8\u548c\u7ecf\u7406\u8bc4\u8bba\u4e2d\u6784\u5efa\u91d1\u878d\u987e\u95ee\u4eba\u683c\uff0c\u5e76\u901a\u8fc7\u667a\u80fd\u4f53\"\u6f14\u5458-\u8bc4\u5206-\u4fee\u8865\"\u5faa\u73af\u8fed\u4ee3\u4f18\u5316\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u6846\u67b6\u751f\u6210\u7684\u4eba\u683c\u80fd\u66f4\u597d\u5730\u8fd8\u539f\u6295\u8d44\u7ec4\u5408\u51b3\u7b56\u548c\u7ecf\u7406\u89e3\u8bfb\uff0c\u5e76\u5728\u5e02\u573a\u60c5\u666f\u751f\u6210\u548c\u6295\u8d44\u8005\u5bf9\u8bdd\u4e2d\u63d0\u4f9b\u66f4\u5177\u9488\u5bf9\u6027\u7684\u5efa\u8bae\uff0c\u4f7f\u7279\u5b9a\u57fa\u91d1\u7ecf\u7406\u7684\u6295\u8d44\u4e13\u957f\u53ef\u79fb\u690d\u5316\u3002", "categories": ["cs.CL", "q-fin.GN"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29793", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u91d1\u878d\u987e\u95ee", "\u4eba\u683c\u6784\u5efa"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29793v1", "published_at": "2026-06-29", "score": 0.15, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Fund2Persona: A Framework for Building and Refining Financial Advisor Personas from Fund Disclosure Data", "tldr": "\u63d0\u51faFund2Persona\u6846\u67b6\uff0c\u4ece\u57fa\u91d1\u62ab\u9732\u6570\u636e\u3001\u6301\u4ed3\u53d8\u52a8\u548c\u7ecf\u7406\u8bc4\u8bba\u4e2d\u6784\u5efa\u91d1\u878d\u987e\u95ee\u4eba\u683c\uff0c\u5e76\u901a\u8fc7\u667a\u80fd\u4f53\"\u6f14\u5458-\u8bc4\u5206-\u4fee\u8865\"\u5faa\u73af\u8fed\u4ee3\u4f18\u5316\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u6846\u67b6\u751f\u6210\u7684\u4eba\u683c\u80fd\u66f4\u597d\u5730\u8fd8\u539f\u6295\u8d44\u7ec4\u5408\u51b3\u7b56\u548c\u7ecf\u7406\u89e3\u8bfb\uff0c\u5e76\u5728\u5e02\u573a\u60c5\u666f\u751f\u6210\u548c\u6295\u8d44\u8005\u5bf9\u8bdd\u4e2d\u63d0\u4f9b\u66f4\u5177\u9488\u5bf9\u6027\u7684\u5efa\u8bae\uff0c\u4f7f\u7279\u5b9a\u57fa\u91d1\u7ecf\u7406\u7684\u6295\u8d44\u4e13\u957f\u53ef\u79fb\u690d\u5316\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The Model Context Protocol (MCP), introduced by Anthropic in November 2024, defines a standardized interface for connecting large language models (LLMs) to external tools, data sources, and services. Within months of release, hundreds of community-built MCP servers appeared on GitHub, but no software-maintenance literature has yet described how the ecosystem is being structured in production. This industry experience paper catalogues five recurring MCP server architectural patterns observed across an enumerated corpus of fifteen independently developed servers (five production servers from the ANSYR voice AI platform plus ten public servers from the official MCP registry): Resource Gateway, Tool Orchestrator, Stateful Session Server, Proxy Aggregator, and Domain-Specific Adapter. Each pattern is described in the structured form of Gamma et al.: context, problem, solution, and consequences. We also document four anti-patterns and a set of cross-cutting concerns around authentication, versioning, and observability. The quantitative evaluation contributes three measurements: inter-rater reliability of the taxonomy across two independent LLM raters on 54 held-out servers (Cohen\u0027s kappa = 0.76), which also localizes three pattern-boundary ambiguities; transport overhead measured end-to-end on loopback and modeled for cross-host paths; and a tool-count study showing tool-selection accuracy drops below 90% between 10 and 15 tools per context for Claude Haiku 4.5 and between 20 and 30 tools for Sonnet 4. Code, corpus, and prompts are released as a replication package.", "arxiv_id": "2606.30317", "arxiv_url": "https://arxiv.org/abs/2606.30317", "authors": ["Carson Rodrigues", "Oysturn Vas"], "brief": "\u672c\u6587\u7cfb\u7edf\u6574\u7406\u4e86\u6a21\u578b\u4e0a\u4e0b\u6587\u534f\u8bae\uff08MCP\uff09\u670d\u52a1\u5668\u5728\u751f\u4ea7\u73af\u5883\u4e2d\u7684\u4e94\u79cd\u67b6\u6784\u6a21\u5f0f\uff08\u8d44\u6e90\u7f51\u5173\u3001\u5de5\u5177\u7f16\u6392\u5668\u3001\u6709\u72b6\u6001\u4f1a\u8bdd\u670d\u52a1\u5668\u3001\u4ee3\u7406\u805a\u5408\u5668\u3001\u9886\u57df\u9002\u914d\u5668\uff09\uff0c\u5e76\u8bb0\u5f55\u4e86\u56db\u79cd\u53cd\u6a21\u5f0f\u3002\u5b9a\u91cf\u8bc4\u4f30\u663e\u793a\u5206\u7c7b\u6cd5\u7684\u8bc4\u5206\u8005\u95f4\u4e00\u81f4\u6027\u03ba=0.76\uff0c\u540c\u65f6\u53d1\u73b0Claude\u6a21\u578b\u5728\u5de5\u5177\u6570\u91cf\u8d85\u8fc710-30\u4e2a\u65f6\u5de5\u5177\u9009\u62e9\u51c6\u786e\u7387\u663e\u8457\u4e0b\u964d\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30317", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53", "\u8f6f\u4ef6\u67b6\u6784", "MCP\u534f\u8bae"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30317v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MCP Server Architecture Patterns for LLM-Integrated Applications", "tldr": "\u672c\u6587\u7cfb\u7edf\u6574\u7406\u4e86\u6a21\u578b\u4e0a\u4e0b\u6587\u534f\u8bae\uff08MCP\uff09\u670d\u52a1\u5668\u5728\u751f\u4ea7\u73af\u5883\u4e2d\u7684\u4e94\u79cd\u67b6\u6784\u6a21\u5f0f\uff08\u8d44\u6e90\u7f51\u5173\u3001\u5de5\u5177\u7f16\u6392\u5668\u3001\u6709\u72b6\u6001\u4f1a\u8bdd\u670d\u52a1\u5668\u3001\u4ee3\u7406\u805a\u5408\u5668\u3001\u9886\u57df\u9002\u914d\u5668\uff09\uff0c\u5e76\u8bb0\u5f55\u4e86\u56db\u79cd\u53cd\u6a21\u5f0f\u3002\u5b9a\u91cf\u8bc4\u4f30\u663e\u793a\u5206\u7c7b\u6cd5\u7684\u8bc4\u5206\u8005\u95f4\u4e00\u81f4\u6027\u03ba=0.76\uff0c\u540c\u65f6\u53d1\u73b0Claude\u6a21\u578b\u5728\u5de5\u5177\u6570\u91cf\u8d85\u8fc710-30\u4e2a\u65f6\u5de5\u5177\u9009\u62e9\u51c6\u786e\u7387\u663e\u8457\u4e0b\u964d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper presents preliminary findings from a UKRI-funded Metascience project comparing three LLM-based approaches, GPT-4o, Mistral, and a bespoke algorithm, DSIT-Taxonomies, for extracting and classifying research entities from funding proposals. Our project \"Tracking Stars and Unicorns\" aims to identify early signals of emerging research areas to inform public investment. Our methodology employed a three-stage pipeline, leveraging Mistral for primary entity extraction and mapping against the OpenAlex Topics taxonomy. We evaluated our approach across 42 proposals\u0027 abstracts from different areas and observed that Mistral and GPT-4o produce comparable, high-quality entity sets with significant semantic overlap, outperforming the fragmented DSIT-Taxonomies approach. Crucially, the Mistral-based approach achieved superior topic classification accuracy (90.5%) compared to the full DSIT-Taxonomies pipeline (71.4%). We conclude that Mistral offers a high-performance, operationally efficient, and secure solution for large-scale analysis of sensitive grant data.", "arxiv_id": "2606.30304", "arxiv_url": "https://arxiv.org/abs/2606.30304", "authors": ["Xingran Ruan", "Angelo Salatino", "Rosa Filgueira", "Kara Moraw", "Alexandru Marcoci", "Gemma Derrick", "Sarah Callaghan"], "brief": "\u672c\u6587\u6bd4\u8f83\u4e86GPT-4o\u3001Mistral\u548c\u5b9a\u5236\u7b97\u6cd5DSIT-Taxonomies\u4e09\u79cd\u57fa\u4e8eLLM\u7684\u65b9\u6cd5\uff0c\u7528\u4e8e\u4ece\u82f1\u56fd\u7814\u7a76\u4e0e\u521b\u65b0\uff08UKRI\uff09\u8d44\u52a9\u63d0\u6848\u4e2d\u63d0\u53d6\u7814\u7a76\u5b9e\u4f53\u5e76\u8fdb\u884c\u4e3b\u9898\u5206\u7c7b\u3002\u7ed3\u679c\u663e\u793aMistral\u5728\u4e3b\u9898\u5206\u7c7b\u51c6\u786e\u7387\u4e0a\u8fbe\u523090.5%\uff0c\u4f18\u4e8eDSIT-Taxonomies\u768471.4%\uff0c\u4e14\u4e0eGPT-4o\u6548\u679c\u76f8\u5f53\uff0c\u540c\u65f6\u5177\u5907\u66f4\u9ad8\u7684\u64cd\u4f5c\u6548\u7387\u548c\u6570\u636e\u5b89\u5168\u6027\u3002", "categories": ["cs.DL", "cs.AI", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30304", "impact_score": 4, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u4fe1\u606f\u62bd\u53d6", "\u79d1\u5b66\u8ba1\u91cf\u5b66", "\u4e3b\u9898\u5206\u7c7b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30304v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Research Entity Extraction and Topic Detection from UKRI Grant Proposals", "tldr": "\u672c\u6587\u6bd4\u8f83\u4e86GPT-4o\u3001Mistral\u548c\u5b9a\u5236\u7b97\u6cd5DSIT-Taxonomies\u4e09\u79cd\u57fa\u4e8eLLM\u7684\u65b9\u6cd5\uff0c\u7528\u4e8e\u4ece\u82f1\u56fd\u7814\u7a76\u4e0e\u521b\u65b0\uff08UKRI\uff09\u8d44\u52a9\u63d0\u6848\u4e2d\u63d0\u53d6\u7814\u7a76\u5b9e\u4f53\u5e76\u8fdb\u884c\u4e3b\u9898\u5206\u7c7b\u3002\u7ed3\u679c\u663e\u793aMistral\u5728\u4e3b\u9898\u5206\u7c7b\u51c6\u786e\u7387\u4e0a\u8fbe\u523090.5%\uff0c\u4f18\u4e8eDSIT-Taxonomies\u768471.4%\uff0c\u4e14\u4e0eGPT-4o\u6548\u679c\u76f8\u5f53\uff0c\u540c\u65f6\u5177\u5907\u66f4\u9ad8\u7684\u64cd\u4f5c\u6548\u7387\u548c\u6570\u636e\u5b89\u5168\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multi-round reflection lets agents built on large language models recover from failures within a single task, but each task remains an isolated episode: lessons learned across many reflection rounds on one task are discarded before the next begins. We study this gap on a code-generation task: from a scientific paper section, the agent writes Python in the open-source Manim library to render a mathematical animation. We present ManimAgent, a self-evolving multimodal agent that carries reflection experience across tasks through a dual-channel Episodic Memory Bank grown entirely from its own task stream, with no weight updates and no human seeds. After each animation converges, a vision-language model scores the rendered keyframes; the resulting signals populate a positive channel M+ that stores success rationales as soft Reference Examples, and a negative channel M- that stores validated failure patterns as hard Known Pitfalls. On a fixed-probe evaluation against no-memory, matched-budget retrieval-augmented generation, and shuffled-memory baselines, blind human Pass@1 rises and reflection rounds fall as memory size grows. We will release the code, frozen memory snapshots, and the task stream.", "arxiv_id": "2606.30296", "arxiv_url": "https://arxiv.org/abs/2606.30296", "authors": ["Wenjia Jiang", "Zongyuan Cai", "Yuanhang Shao", "Chenru Wang", "Boyan Han", "Zhixue Song", "Keyu Chen", "Shengwei An", "Xu Yang", "Zhou Yang"], "brief": "ManimAgent\u662f\u4e00\u4e2a\u81ea\u8fdb\u5316\u591a\u6a21\u6001\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u53cc\u901a\u9053\u60c5\u8282\u8bb0\u5fc6\u5e93\uff08\u6b63\u5411\u5b58\u50a8\u6210\u529f\u7ecf\u9a8c\u3001\u8d1f\u5411\u5b58\u50a8\u5931\u8d25\u6a21\u5f0f\uff09\u8de8\u4efb\u52a1\u79ef\u7d2f\u53cd\u601d\u7ecf\u9a8c\uff0c\u65e0\u9700\u6743\u91cd\u66f4\u65b0\u6216\u4eba\u5de5\u6807\u6ce8\u3002\u8be5\u7cfb\u7edf\u7528\u4e8e\u4ece\u79d1\u5b66\u8bba\u6587\u81ea\u52a8\u751f\u6210Manim\u6570\u5b66\u52a8\u753b\uff0c\u968f\u8bb0\u5fc6\u5e93\u589e\u957f\uff0c\u4e00\u6b21\u901a\u8fc7\u7387\u63d0\u5347\u4e14\u6240\u9700\u53cd\u601d\u8f6e\u6570\u51cf\u5c11\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30296", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u4ee3\u7801\u751f\u6210", "\u8bb0\u5fc6\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30296v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ManimAgent: Self-Evolving Multimodal Agents for Visual Education", "tldr": "ManimAgent\u662f\u4e00\u4e2a\u81ea\u8fdb\u5316\u591a\u6a21\u6001\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u53cc\u901a\u9053\u60c5\u8282\u8bb0\u5fc6\u5e93\uff08\u6b63\u5411\u5b58\u50a8\u6210\u529f\u7ecf\u9a8c\u3001\u8d1f\u5411\u5b58\u50a8\u5931\u8d25\u6a21\u5f0f\uff09\u8de8\u4efb\u52a1\u79ef\u7d2f\u53cd\u601d\u7ecf\u9a8c\uff0c\u65e0\u9700\u6743\u91cd\u66f4\u65b0\u6216\u4eba\u5de5\u6807\u6ce8\u3002\u8be5\u7cfb\u7edf\u7528\u4e8e\u4ece\u79d1\u5b66\u8bba\u6587\u81ea\u52a8\u751f\u6210Manim\u6570\u5b66\u52a8\u753b\uff0c\u968f\u8bb0\u5fc6\u5e93\u589e\u957f\uff0c\u4e00\u6b21\u901a\u8fc7\u7387\u63d0\u5347\u4e14\u6240\u9700\u53cd\u601d\u8f6e\u6570\u51cf\u5c11\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Live product demonstrations are a recurring, high-cost activity in software organizations: a human presenter must select features, dispatch the corresponding interactions on a running application, narrate them coherently, and answer questions in real time. Existing automation addresses only fragments -- generalist browser agents target instruction-conditioned task completion, and demo-video tools produce fixed MP4 artifacts that cannot be questioned and silently break under interface drift. We propose Rhetor, a multi-agent system that takes a running web application and its source-code repository as input and produces a rehearsed live demonstration with segment-synchronized narration and real-time voice question answering. The architectural contributions are a cross-modal feature representation that merges UI exploration with source-code analysis into features tagged with discrete focus tiers, a grounded scripter constrained to UI elements observed during exploration and dispatched through multi-strategy semantic locators, a pre-presentation rehearsal loop with explicit convergence and graceful degradation to narration-only segments, and a runtime synchronization invariant that ties each browser action to the audio-end event of its narration segment. Across six pipeline sessions on four deployed applications -- including the public-domain whiteboard application Excalidraw -- the rehearser\u0027s internal locator-firing rate (sigma-bar) spans 0.31-1.00 over 147 scripted actions; on the substantial workload (53 actions, full tier differentiation), sigma-bar is approximately 0.92, and on the public-domain reference point the locator-repair step drives convergence to sigma-bar = 1.00 at iteration 2. We additionally define a benchmark protocol of ten metrics across six application categories that would establish, beyond the case study, whether each design choice contributes positively.", "arxiv_id": "2606.30294", "arxiv_url": "https://arxiv.org/abs/2606.30294", "authors": ["Rahul Khedar", "Mayank Malhotra", "Avinash Karn", "Mouli V", "Prakhar Mehrotra"], "brief": "\u63d0\u51faRhetor\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u80fd\u81ea\u52a8\u5c06\u8fd0\u884c\u4e2d\u7684Web\u5e94\u7528\u8f6c\u5316\u4e3a\u5e26\u540c\u6b65\u65c1\u767d\u7684\u5b9e\u65f6\u4ea7\u54c1\u6f14\u793a\uff0c\u5e76\u652f\u6301\u5b9e\u65f6\u8bed\u97f3\u95ee\u7b54\u3002\u7cfb\u7edf\u901a\u8fc7\u8de8\u6a21\u6001\u7279\u5f81\u8868\u793a\u878d\u5408UI\u63a2\u7d22\u4e0e\u6e90\u7801\u5206\u6790\uff0c\u7ed3\u5408\u9884\u6f14\u6392\u7ec3\u5faa\u73af\u548c\u8bed\u4e49\u5b9a\u4f4d\u5668\uff0c\u5728\u56db\u4e2a\u5e94\u7528\u7684\u6d4b\u8bd5\u4e2d\u5b9a\u4f4d\u6210\u529f\u7387\u6700\u9ad8\u8fbe100%\u3002", "categories": ["cs.AI", "cs.HC", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30294", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u667a\u80fd\u4f53", "\u4eba\u673a\u4ea4\u4e92", "\u81ea\u52a8\u5316\u6f14\u793a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30294v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Rehearsed Multi-Agent Live Product Demonstrations with Real-Time Voice Question Answering", "tldr": "\u63d0\u51faRhetor\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u80fd\u81ea\u52a8\u5c06\u8fd0\u884c\u4e2d\u7684Web\u5e94\u7528\u8f6c\u5316\u4e3a\u5e26\u540c\u6b65\u65c1\u767d\u7684\u5b9e\u65f6\u4ea7\u54c1\u6f14\u793a\uff0c\u5e76\u652f\u6301\u5b9e\u65f6\u8bed\u97f3\u95ee\u7b54\u3002\u7cfb\u7edf\u901a\u8fc7\u8de8\u6a21\u6001\u7279\u5f81\u8868\u793a\u878d\u5408UI\u63a2\u7d22\u4e0e\u6e90\u7801\u5206\u6790\uff0c\u7ed3\u5408\u9884\u6f14\u6392\u7ec3\u5faa\u73af\u548c\u8bed\u4e49\u5b9a\u4f4d\u5668\uff0c\u5728\u56db\u4e2a\u5e94\u7528\u7684\u6d4b\u8bd5\u4e2d\u5b9a\u4f4d\u6210\u529f\u7387\u6700\u9ad8\u8fbe100%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Text-Attributed Graphs (TAGs) combine textual semantics with graph structure and are central to many graph learning tasks. However, existing fusion methods often treat text and structure as separate inputs in a shallow, one-way pipeline, which limits deep interaction between modalities and weakens performance under sparse connectivity or cross-graph generalisation. To address this issue, we propose PromptGNN-sim, a bi-directional structure-semantic fusion framework for collaborative GNN-LLM learning. PromptGNN-sim uses a Graph Attention Network (GAT) for semantically aware neighborhood selection by combining structural attention with textual similarity. The selected structural context is then used to generate structure-aware prompts for an LLM, including the target node summary, label categories, and representative keywords from similar neighbors. During training, bi-directional cross-modal contrastive learning and cross-attention are introduced to jointly optimize the GNN and LLM components. Experiments on six public datasets, including Cora, Pubmed, and WikiCS, evaluate accuracy, generalisation, and robustness under cross-task transfer, cross-dataset generalisation, and sparse perturbations. Results show that PromptGNN-sim outperforms classical GNNs, LLMs, and recent GNN-LLM fusion methods, demonstrating the effectiveness of interactive structure-semantic collaboration for text-attributed graph learning.", "arxiv_id": "2606.30291", "arxiv_url": "https://arxiv.org/abs/2606.30291", "authors": ["Zhifei Hu", "Alexandra I. Cristea"], "brief": "\u63d0\u51faPromptGNN-sim\u6846\u67b6\uff0c\u901a\u8fc7\u53cc\u5411\u7ed3\u6784-\u8bed\u4e49\u878d\u5408\u5b9e\u73b0GNN\u4e0eLLM\u7684\u534f\u540c\u5b66\u4e60\uff1a\u5229\u7528\u56fe\u6ce8\u610f\u529b\u7f51\u7edc\u8fdb\u884c\u8bed\u4e49\u611f\u77e5\u90bb\u5c45\u9009\u62e9\uff0c\u5e76\u751f\u6210\u7ed3\u6784\u611f\u77e5\u63d0\u793a\u8f93\u5165LLM\uff0c\u7ed3\u5408\u53cc\u5411\u8de8\u6a21\u6001\u5bf9\u6bd4\u5b66\u4e60\u4e0e\u4ea4\u53c9\u6ce8\u610f\u529b\u8054\u5408\u4f18\u5316\u3002\u5728\u516d\u4e2a\u516c\u5f00\u6570\u636e\u96c6\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728\u8de8\u4efb\u52a1\u8fc1\u79fb\u3001\u8de8\u6570\u636e\u96c6\u6cdb\u5316\u53ca\u7a00\u758f\u6270\u52a8\u573a\u666f\u4e0b\u5747\u4f18\u4e8e\u73b0\u6709GNN\u3001LLM\u53ca\u878d\u5408\u65b9\u6cd5\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30291", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u795e\u7ecf\u7f51\u7edc", "\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u6a21\u6001\u878d\u5408", "\u6587\u672c\u5c5e\u6027\u56fe"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30291v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PromptGNN-sim: Deep Fusion and Alignment of GNN and LLMs for Text-Attributed Graph Learning", "tldr": "\u63d0\u51faPromptGNN-sim\u6846\u67b6\uff0c\u901a\u8fc7\u53cc\u5411\u7ed3\u6784-\u8bed\u4e49\u878d\u5408\u5b9e\u73b0GNN\u4e0eLLM\u7684\u534f\u540c\u5b66\u4e60\uff1a\u5229\u7528\u56fe\u6ce8\u610f\u529b\u7f51\u7edc\u8fdb\u884c\u8bed\u4e49\u611f\u77e5\u90bb\u5c45\u9009\u62e9\uff0c\u5e76\u751f\u6210\u7ed3\u6784\u611f\u77e5\u63d0\u793a\u8f93\u5165LLM\uff0c\u7ed3\u5408\u53cc\u5411\u8de8\u6a21\u6001\u5bf9\u6bd4\u5b66\u4e60\u4e0e\u4ea4\u53c9\u6ce8\u610f\u529b\u8054\u5408\u4f18\u5316\u3002\u5728\u516d\u4e2a\u516c\u5f00\u6570\u636e\u96c6\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0c\u8be5\u65b9\u6cd5\u5728\u8de8\u4efb\u52a1\u8fc1\u79fb\u3001\u8de8\u6570\u636e\u96c6\u6cdb\u5316\u53ca\u7a00\u758f\u6270\u52a8\u573a\u666f\u4e0b\u5747\u4f18\u4e8e\u73b0\u6709GNN\u3001LLM\u53ca\u878d\u5408\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Existing defenses are effective when harmful content is explicitly mixed into downstream fine-tuning data, but crafted samples can instead hide harmful supervision inside benign tasks. We propose Embedded Attack, where harmful QA pairs are embedded within benign training samples, and show that representative guardrails often fail to detect them at the example level. To address this, we propose Dual-Reference SFT (DR-SFT), which adapts DPO-style contrastive objective design to SFT through token-level regularization, mitigating harmful fine-tuning beyond coarse data filtering.", "arxiv_id": "2606.30263", "arxiv_url": "https://arxiv.org/abs/2606.30263", "authors": ["Bang An", "Yibo Yang", "Dandan Guo", "Ebtisam Alshehri", "Carlos Hinojosa", "Bernard Ghanem"], "brief": "\u63d0\u51fa\"\u5d4c\u5165\u5f0f\u653b\u51fb\"\u65b9\u6cd5\uff0c\u5c06\u6709\u5bb3QA\u5bf9\u9690\u85cf\u5728\u826f\u6027\u8bad\u7ec3\u6837\u672c\u4e2d\u7ed5\u8fc7\u73b0\u6709\u9632\u62a4\u673a\u5236\uff1b\u9488\u5bf9\u6b64\u5a01\u80c1\u63d0\u51faDR-SFT\u9632\u5fa1\u65b9\u6848\uff0c\u901a\u8fc7\u4ee4\u724c\u7ea7\u6b63\u5219\u5316\u5c06DPO\u5bf9\u6bd4\u76ee\u6807\u5f15\u5165SFT\uff0c\u6709\u6548\u7f13\u89e3\u9690\u853d\u6709\u5bb3\u5fae\u8c03\u653b\u51fb\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30263", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u5b89\u5168", "\u5bf9\u6297\u653b\u51fb", "\u5fae\u8c03\u9632\u5fa1", "\u6709\u5bb3\u5185\u5bb9"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30263v1", "published_at": "2026-06-29", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Defending Against Harmful Supervision Hidden in Benign Samples", "tldr": "\u63d0\u51fa\"\u5d4c\u5165\u5f0f\u653b\u51fb\"\u65b9\u6cd5\uff0c\u5c06\u6709\u5bb3QA\u5bf9\u9690\u85cf\u5728\u826f\u6027\u8bad\u7ec3\u6837\u672c\u4e2d\u7ed5\u8fc7\u73b0\u6709\u9632\u62a4\u673a\u5236\uff1b\u9488\u5bf9\u6b64\u5a01\u80c1\u63d0\u51faDR-SFT\u9632\u5fa1\u65b9\u6848\uff0c\u901a\u8fc7\u4ee4\u724c\u7ea7\u6b63\u5219\u5316\u5c06DPO\u5bf9\u6bd4\u76ee\u6807\u5f15\u5165SFT\uff0c\u6709\u6548\u7f13\u89e3\u9690\u853d\u6709\u5bb3\u5fae\u8c03\u653b\u51fb\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Tabular foundation models have advanced deep learning for tabular data by delivering strong default performance across many small and medium tasks. Yet in niche domains, where data is scarce, high-dimensional, and shifted from the pretraining distribution, they may still fail to outperform carefully designed domain-specific methods. Many such domains also provide curated relational knowledge in the form of knowledge graphs and knowledge banks, but how to use this knowledge to improve and steer \\textit{small} specialist tabular foundation models remains unclear. We address this problem through \\textbf{Know}ledge-informed fine-tuning of \\textbf{s}mall \\textbf{T}abular \\textbf{F}oundation \\textbf{M}odels (\\modelname). Specifically, we study nanoscale TabPFN- and TabICL-style variants, pretrained under controlled synthetic prior families and adapted using two complementary mechanisms: structural attention priors derived from knowledge graphs and parameter-efficient low-rank updates. We show that injecting domain-specific structural knowledge during fine-tuning yields meaningful gains over vanilla variants in specialist settings, whereas gains on general-domain tasks are marginal. We further observe that continual fine-tuning of frontier models can trigger collapse of pretrained knowledge and mechanisms.", "arxiv_id": "2606.30258", "arxiv_url": "https://arxiv.org/abs/2606.30258", "authors": ["Boshko Koloski", "Xiangjian Jiang", "Senja Pollak", "Bla\u017e \u0160krlj", "Mateja Jamnik", "Nikola Simidjievski"], "brief": "\u9488\u5bf9\u5c0f\u578b\u8868\u683c\u57fa\u7840\u6a21\u578b\u5728\u5c0f\u4f17\u9886\u57df\uff08\u6570\u636e\u7a00\u7f3a\u3001\u9ad8\u7ef4\u3001\u5206\u5e03\u504f\u79fb\uff09\u8868\u73b0\u4e0d\u4f73\u7684\u95ee\u9898\uff0c\u63d0\u51faKnowsTFM\u65b9\u6cd5\uff0c\u901a\u8fc7\u77e5\u8bc6\u56fe\u8c31\u884d\u751f\u7684\u7ed3\u6784\u6ce8\u610f\u529b\u5148\u9a8c\u548c\u53c2\u6570\u9ad8\u6548\u4f4e\u79e9\u66f4\u65b0\u4e24\u79cd\u673a\u5236\u8fdb\u884c\u77e5\u8bc6\u5f15\u5bfc\u5fae\u8c03\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u5728\u4e13\u4e1a\u9886\
