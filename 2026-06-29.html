fbe20\u500d", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u79bb\u6563\u6f5c\u5728\u63a8\u7406\uff08DLR\uff09\u65b9\u6cd5\uff0c\u5c06\u8fde\u7eed\u6f5c\u5728\u72b6\u6001\u8f6c\u6362\u4e3a\u663e\u5f0f\u79bb\u6563token\uff1a\u628a\u6587\u672c\u601d\u7ef4\u94fe\u6e32\u67d3\u6210\u56fe\u50cf\uff0c\u63d0\u53d6\u89c6\u89c9\u7279\u5f81\u540e\u901a\u8fc7\u805a\u7c7b\u6784\u5efa\u79bb\u6563\u6f5c\u5728\u8bcd\u8868\uff0c\u4ece\u800c\u5728\u6807\u51c6\u81ea\u56de\u5f52\u6846\u67b6\u4e0b\u5b9e\u73b0\u9ad8\u6548\u4e14\u53ef\u89e3\u91ca\u7684\u6f5c\u5728\u7a7a\u95f4\u63a8\u7406\u3002", "why_notable": "\u9996\u6b21\u5c06\u8fde\u7eed\u6f5c\u5728\u63a8\u7406\u79bb\u6563\u5316\uff0c\u4ece\u6839\u672c\u4e0a\u89e3\u51b3\u4e86\u8fde\u7eed\u7a7a\u95f4\u4e0e\u79bb\u6563\u7b26\u53f7\u76d1\u7763\u4e4b\u95f4\u7684\u5bf9\u9f50\u96be\u9898\uff0c\u517c\u987e\u63a8\u7406\u6548\u7387\uff0820\u00d7\u538b\u7f29\uff09\u4e0e\u53ef\u89e3\u91ca\u6027\uff0c\u4e3a\u5927\u6a21\u578b\u9ad8\u6548\u63a8\u7406\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002"}, {"abstract": "MLLM-based GUI grounding methods commonly formulate target localization as autoregressive coordinate generation, enabling models to leverage the strong instruction-following and semantic understanding capabilities of MLLMs. However, this formulation requires the model to retain region-level target evidence while decoding coordinate tokens with the spatial precision demanded by GUI clicking. Our diagnostic analysis reveals that target-region awareness emerges in intermediate decoder layers but is neither retained nor translated into the final coordinate prediction. Existing ZoomIn-style methods address this issue through an external crop-and-rerun pass, which improves localization but increases end-to-end latency and computational cost. To retain the accuracy benefits of two-pass zooming without this extra cost, we propose InnerZoom, a single-forward framework for cross-layer evidence bridging. InnerZoom transforms target-related cues from the original forward pass into a compact cross-layer evidence state, then preserves, refines, and reinjects this state throughout later decoding layers to guide coordinate prediction. Extensive experimental results suggest that InnerZoom-4B achieves state-of-the-art performance on all six GUI grounding benchmarks, obtaining 64.7 on OSWorld-G, 40.2 on UI-Vision, 73.1 on OSWorld-GR, and 87.6 on MMBench-GUI, surpassing the previous best results by 4.1, 3.2, 2.9, and 2.3 points, respectively. Under a controlled 4B setting, InnerZoom improves the same SFT+RL baseline by 5.3 points on average and outperforms two-pass ZoomIn by 1.3 points on average, while reducing end-to-end latency by up to 31.8% and TFLOPs by about 29%. Code and models will be publicly available.", "arxiv_id": "2606.30084", "arxiv_url": "https://arxiv.org/abs/2606.30084", "authors": ["Chen Liu", "Ling Chen", "Hanzhang Zhou", "Liangyu Chen", "Chenglin Cai", "Xin Yu", "Steven Hoi", "Yue Wang"], "brief": "\u63d0\u51faInnerZoom\u6846\u67b6\uff0c\u901a\u8fc7\u8de8\u5c42\u8bc1\u636e\u72b6\u6001\u673a\u5236\u5728\u5355\u6b21\u524d\u5411\u4f20\u64ad\u4e2d\u4fdd\u7559\u5e76\u4f20\u9012\u76ee\u6807\u533a\u57df\u611f\u77e5\u4fe1\u606f\uff0c\u65e0\u9700\u989d\u5916\u88c1\u526a\u91cd\u63a8\u7406\u5373\u53ef\u5b9e\u73b0\u7cbe\u51c6GUI\u5143\u7d20\u5b9a\u4f4d\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30084", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u8bca\u65ad\u53d1\u73b0\u76ee\u6807\u533a\u57df\u611f\u77e5\u5728\u4e2d\u95f4\u89e3\u7801\u5c42\u6d8c\u73b0\u4f46\u672a\u88ab\u4fdd\u7559\u81f3\u6700\u7ec8\u5750\u6807\u9884\u6d4b\uff0c\u63ed\u793a\u4e86\u73b0\u6709\u65b9\u6cd5\u7684\u6839\u672c\u7f3a\u9677", "InnerZoom\u5c06\u539f\u59cb\u524d\u5411\u4f20\u64ad\u4e2d\u7684\u76ee\u6807\u76f8\u5173\u7ebf\u7d22\u538b\u7f29\u4e3a\u8de8\u5c42\u8bc1\u636e\u72b6\u6001\uff0c\u5728\u540e\u7eed\u89e3\u7801\u5c42\u4e2d\u6301\u7eed\u6ce8\u5165\u4ee5\u5f15\u5bfc\u5750\u6807\u751f\u6210", "4B\u6a21\u578b\u5728OSWorld-G\u8fbe64.7\u3001UI-Vision\u8fbe40.2\uff0c\u5e73\u5747\u8d85\u8d8a\u53cc\u6b21ZoomIn 1.3\u5206\uff0c\u540c\u65f6\u964d\u4f4e\u5ef6\u8fdf31.8%\u548c\u8ba1\u7b97\u91cf\u7ea629%"], "keywords": ["\u667a\u80fd\u4f53", "GUI\u5b9a\u4f4d", "\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u9ad8\u6548\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30084v1", "published_at": "2026-06-29", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "One Forward Beats Two: InnerZoom for Accurate and Efficient GUI Grounding", "tldr": "InnerZoom\u7528\u5355\u6b21\u524d\u5411\u4f20\u64ad\u5b9e\u73b0\u8de8\u5c42\u8bc1\u636e\u6865\u63a5\uff0c\u8d85\u8d8a\u53cc\u6b21\u63a8\u7406\u7684GUI\u5b9a\u4f4d\u7cbe\u5ea6", "upvotes": 0, "what_it_is": "\u63d0\u51faInnerZoom\u6846\u67b6\uff0c\u901a\u8fc7\u8de8\u5c42\u8bc1\u636e\u72b6\u6001\u673a\u5236\u5728\u5355\u6b21\u524d\u5411\u4f20\u64ad\u4e2d\u4fdd\u7559\u5e76\u4f20\u9012\u76ee\u6807\u533a\u57df\u611f\u77e5\u4fe1\u606f\uff0c\u65e0\u9700\u989d\u5916\u88c1\u526a\u91cd\u63a8\u7406\u5373\u53ef\u5b9e\u73b0\u7cbe\u51c6GUI\u5143\u7d20\u5b9a\u4f4d\u3002", "why_notable": "\u9996\u6b21\u4ece\u673a\u5236\u5c42\u9762\u63ed\u793aMLLM GUI\u5b9a\u4f4d\u7684\u4fe1\u606f\u4e22\u5931\u95ee\u9898\uff0c\u5e76\u4ee5\u5355\u6b21\u63a8\u7406\u540c\u65f6\u8d85\u8d8a\u7cbe\u5ea6\u4e0e\u6548\u7387\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72GUI\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "We propose Nemotron-Labs-Diffusion-Image, a state-of-the-art masked discrete diffusion model (MDM) for high-resolution text-to-image synthesis. Compared with prior work on masked image generation, Nemotron-Labs-Diffusion-Image addresses two key challenges. First, unlike continuous diffusion models which progressively refine latent representations across the entire image, standard MDMs lack self-correcting capability because discrete tokens cannot be modified once they are unmasked. Second, although increasing the vocabulary size of discrete image tokenizers improves reconstruction fidelity, it introduces optimization difficulties for generative modeling as the per-token training signal becomes increasingly sparse. To address the first challenge, Nemotron-Labs-Diffusion-Image incorporates a token-editing mechanism that enables the model to dynamically revise already-unmasked tokens during inference, similar to how a sculptor iteratively refines their work. To tackle the second challenge, we propose a Grouped Cross-Entropy (GCE) objective that assigns positive learning signals to tokens neighboring the ground truth in embedding space, thereby alleviating signal sparsity. To further improve training efficiency, we implement a custom fused operator for GCE that significantly reduces VRAM usage in large-vocabulary settings. Experimental results demonstrate that these innovations substantially improve both training efficiency and image fidelity of masked discrete image generators, achieving a score of 0.90 on GenEval, 86.9 on DPG and 10.76 of HPSv3.", "arxiv_id": "2606.29814", "arxiv_url": "https://arxiv.org/abs/2606.29814", "authors": ["Shufan Li", "Greg Heinrich", "Hanrong Ye", "Yonggan Fu", "Aditya Grover", "Jan Kautz", "Pavlo Molchanov"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u5148\u8fdb\u7684\u63a9\u7801\u79bb\u6563\u6269\u6563\u6a21\u578b\uff08MDM\uff09\uff0c\u901a\u8fc7\u5f15\u5165token\u7f16\u8f91\u673a\u5236\u548c\u5206\u7ec4\u4ea4\u53c9\u71b5\uff08GCE\uff09\u635f\u5931\u51fd\u6570\uff0c\u89e3\u51b3\u4e86MDM\u7f3a\u4e4f\u81ea\u6821\u6b63\u80fd\u529b\u548c\u5927\u8bcd\u8868\u8bad\u7ec3\u4fe1\u53f7\u7a00\u758f\u4e24\u5927\u6838\u5fc3\u95ee\u9898\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u6587\u672c\u5230\u56fe\u50cf\u751f\u6210\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29814", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["Token\u7f16\u8f91\u673a\u5236\uff1a\u5141\u8bb8\u6a21\u578b\u5728\u63a8\u7406\u9636\u6bb5\u52a8\u6001\u4fee\u6539\u5df2\u89e3\u7801\u7684token\uff0c\u8d4b\u4e88MDM\u7c7b\u4f3c\u8fde\u7eed\u6269\u6563\u6a21\u578b\u7684\u81ea\u6821\u6b63\u80fd\u529b", "\u5206\u7ec4\u4ea4\u53c9\u71b5\uff08GCE\uff09\u76ee\u6807\uff1a\u5bf9\u5d4c\u5165\u7a7a\u95f4\u4e2d\u90bb\u8fd1ground truth\u7684token\u8d4b\u4e88\u6b63\u5411\u5b66\u4e60\u4fe1\u53f7\uff0c\u7f13\u89e3\u5927\u8bcd\u8868\u4e0b\u8bad\u7ec3\u4fe1\u53f7\u7a00\u758f\u95ee\u9898\uff0c\u5e76\u901a\u8fc7\u81ea\u5b9a\u4e49\u878d\u5408\u7b97\u5b50\u5927\u5e45\u964d\u4f4e\u663e\u5b58\u5360\u7528", "\u5728GenEval\u4e0a\u5f97\u52060.90\u3001DPG\u5f97\u520686.9\u3001HPSv3\u5f97\u520610.76\uff0c\u8fbe\u5230\u63a9\u7801\u79bb\u6563\u56fe\u50cf\u751f\u6210\u7684\u6700\u4f18\u6c34\u5e73"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u6587\u751f\u56fe", "\u79bb\u6563\u751f\u6210\u6a21\u578b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29814v1", "published_at": "2026-06-29", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Nemotron-Labs-Diffusion-Image: Advancing Masked Discrete Diffusion for High-Resolution Image Synthesis", "tldr": "\u63d0\u51faNemotron-Labs-Diffusion-Image\uff0c\u901a\u8fc7token\u7f16\u8f91\u673a\u5236\u548c\u5206\u7ec4\u4ea4\u53c9\u71b5\u76ee\u6807\u63d0\u5347\u63a9\u7801\u79bb\u6563\u6269\u6563\u6a21\u578b\u7684\u9ad8\u5206\u8fa8\u7387\u6587\u751f\u56fe\u8d28\u91cf", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u5148\u8fdb\u7684\u63a9\u7801\u79bb\u6563\u6269\u6563\u6a21\u578b\uff08MDM\uff09\uff0c\u901a\u8fc7\u5f15\u5165token\u7f16\u8f91\u673a\u5236\u548c\u5206\u7ec4\u4ea4\u53c9\u71b5\uff08GCE\uff09\u635f\u5931\u51fd\u6570\uff0c\u89e3\u51b3\u4e86MDM\u7f3a\u4e4f\u81ea\u6821\u6b63\u80fd\u529b\u548c\u5927\u8bcd\u8868\u8bad\u7ec3\u4fe1\u53f7\u7a00\u758f\u4e24\u5927\u6838\u5fc3\u95ee\u9898\uff0c\u5b9e\u73b0\u9ad8\u8d28\u91cf\u6587\u672c\u5230\u56fe\u50cf\u751f\u6210\u3002", "why_notable": "\u7cfb\u7edf\u6027\u89e3\u51b3\u4e86\u63a9\u7801\u79bb\u6563\u6269\u6563\u6a21\u578b\u7684\u4e24\u5927\u74f6\u9888\uff0c\u4f7fMDM\u5728\u751f\u6210\u8d28\u91cf\u4e0a\u53ef\u4e0e\u8fde\u7eed\u6269\u6563\u6a21\u578b\u7ade\u4e89\uff0c\u540c\u65f6\u63d0\u5347\u8bad\u7ec3\u6548\u7387\uff0c\u5bf9\u79bb\u6563\u751f\u6210\u6a21\u578b\u7684\u53d1\u5c55\u5177\u6709\u91cd\u8981\u63a8\u52a8\u610f\u4e49\u3002"}, {"abstract": "Always-on agents are systems whose future behavior depends on durable state accumulated across earlier interactions. We treat them as persistent-state systems: the operative system includes retrievable memories, but also task ledgers, permissions, credentials, commitments, provenance and audit records, shared state, trigger conditions, and externally committed effects linked to those records. The survey reads the literature through six diagnostic axes for each state item, authority, scope, mutability, provenance, recoverability, and actionability, and through a lifecycle in which state is written, validated, organized, retrieved, acted upon, updated, forgotten, audited, and sometimes rolled back. Across a 435-work coded corpus, treated as a scoped map rather than an exhaustive census, the literature concentrates more heavily on accumulating and retrieving state than on governing, recovering, or relinquishing it. We therefore introduce the Always-On Evaluation Protocol (AOEP-v0), a pilot evaluation contract that makes these governance requirements concrete by scoring state mutation and recovery obligations rather than answer quality alone. The resulting agenda connects always-on agents to databases, distributed systems, formal methods, capability security, and machine unlearning.", "arxiv_id": "2606.30306", "arxiv_url": "https://arxiv.org/abs/2606.30306", "authors": ["Tianyu Ding", "Aditya Nannapaneni", "Bingfan Liu", "Ling Zhang"], "brief": "\u672c\u6587\u5bf9\"\u5e38\u9a7b\u667a\u80fd\u4f53\"\uff08Always-On Agents\uff09\u8fdb\u884c\u7cfb\u7edf\u6027\u7efc\u8ff0\uff0c\u5c06\u5176\u5b9a\u4e49\u4e3a\u8de8\u4ea4\u4e92\u79ef\u7d2f\u6301\u4e45\u72b6\u6001\u7684\u7cfb\u7edf\uff0c\u6db5\u76d6\u8bb0\u5fc6\u3001\u4efb\u52a1\u8d26\u672c\u3001\u6743\u9650\u3001\u51ed\u8bc1\u3001\u5ba1\u8ba1\u8bb0\u5f55\u7b49\u591a\u7c7b\u72b6\u6001\uff0c\u5e76\u63d0\u51fa\u516d\u7ef4\u8bca\u65ad\u6846\u67b6\u4e0e\u8bc4\u4f30\u534f\u8baeAOEP-v0\u3002", "categories": ["cs.MA", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30306", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51fa\u516d\u7ef4\u8bca\u65ad\u8f74\uff08\u6743\u5a01\u6027\u3001\u8303\u56f4\u3001\u53ef\u53d8\u6027\u3001\u6eaf\u6e90\u3001\u53ef\u6062\u590d\u6027\u3001\u53ef\u64cd\u4f5c\u6027\uff09\u5bf9\u72b6\u6001\u9879\u8fdb\u884c\u7cfb\u7edf\u5206\u6790", "\u57fa\u4e8e435\u7bc7\u6587\u732e\u7684\u7f16\u7801\u8bed\u6599\u5e93\u53d1\u73b0\uff1a\u73b0\u6709\u7814\u7a76\u504f\u91cd\u72b6\u6001\u79ef\u7d2f\u4e0e\u68c0\u7d22\uff0c\u4e25\u91cd\u5ffd\u89c6\u72b6\u6001\u6cbb\u7406\u3001\u6062\u590d\u4e0e\u9057\u5fd8\u673a\u5236", "\u63d0\u51faAOEP-v0\u8bc4\u4f30\u534f\u8bae\uff0c\u5c06\u72b6\u6001\u53d8\u66f4\u4e0e\u6062\u590d\u4e49\u52a1\u7eb3\u5165\u8bc4\u5206\uff0c\u800c\u975e\u4ec5\u8bc4\u4f30\u7b54\u6848\u8d28\u91cf"], "keywords": ["\u667a\u80fd\u4f53", "\u6301\u4e45\u8bb0\u5fc6", "\u72b6\u6001\u6cbb\u7406", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30306v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Always-OnAgents:A Survey of Persistent Memory, State, and Governance in LLMAgents", "tldr": "\u7cfb\u7edf\u7efc\u8ff0\u6301\u4e45\u72b6\u6001LLM\u667a\u80fd\u4f53\u7684\u8bb0\u5fc6\u3001\u72b6\u6001\u4e0e\u6cbb\u7406\u673a\u5236\uff0c\u5e76\u63d0\u51fa\u8bc4\u4f30\u534f\u8baeAOEP-v0", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9\"\u5e38\u9a7b\u667a\u80fd\u4f53\"\uff08Always-On Agents\uff09\u8fdb\u884c\u7cfb\u7edf\u6027\u7efc\u8ff0\uff0c\u5c06\u5176\u5b9a\u4e49\u4e3a\u8de8\u4ea4\u4e92\u79ef\u7d2f\u6301\u4e45\u72b6\u6001\u7684\u7cfb\u7edf\uff0c\u6db5\u76d6\u8bb0\u5fc6\u3001\u4efb\u52a1\u8d26\u672c\u3001\u6743\u9650\u3001\u51ed\u8bc1\u3001\u5ba1\u8ba1\u8bb0\u5f55\u7b49\u591a\u7c7b\u72b6\u6001\uff0c\u5e76\u63d0\u51fa\u516d\u7ef4\u8bca\u65ad\u6846\u67b6\u4e0e\u8bc4\u4f30\u534f\u8baeAOEP-v0\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u667a\u80fd\u4f53\u7684\u6301\u4e45\u72b6\u6001\u95ee\u9898\u7cfb\u7edf\u5316\u4e3a\u7c7b\u6570\u636e\u5e93/\u5206\u5e03\u5f0f\u7cfb\u7edf\u95ee\u9898\uff0c\u586b\u8865\u4e86\u667a\u80fd\u4f53\u6cbb\u7406\u3001\u5ba1\u8ba1\u4e0e\u673a\u5668\u9057\u5fd8\u7814\u7a76\u7684\u7a7a\u767d\uff0c\u4e3a\u6784\u5efa\u53ef\u4fe1\u8d56\u957f\u671f\u8fd0\u884c\u667a\u80fd\u4f53\u63d0\u4f9b\u7406\u8bba\u6846\u67b6\u4e0e\u8bc4\u4f30\u57fa\u51c6\u3002"}, {"abstract": "Embodied agents are typically built as hand-designed compositions of perception, memory, planning, and action modules. This modularity exposes a large architectural design space, but current systems still rely on researcher intuition to choose where information is stored, how observations are processed, and how model calls are connected. Agent Architecture Search (AAS) automates such design for text-domain agents, but has not been systematically evaluated on perceptual embodied agents through simulator rollouts. We study this transfer. We introduce AgentCanvas, a typed-graph runtime that hosts embodied executors as editable node-and-wire programs with simulator-aware execution and episode-level logs, and KDLoop, a coding-agent search procedure that cycles through proposal, critique, experiment, and distillation, with triggered reflection after stalls. We evaluate three AAS variants across four embodied executors spanning vision-language navigation, embodied question answering, and language-conditioned manipulation. The resulting 3x4 matrix shows that architecture-level search can produce deployable and directional success-rate gains on embodied tasks, while one apparent high-scoring candidate is rejected as leak-bearing. At the same time, the experiments expose constraints that are muted in text-domain AAS: optimization signals can be masked by rollout noise, search can become trapped in local edit basins, and episode-level credit assignment only partially emerges even when detailed logs are available. These results characterize both the promise and the current limits of automated architecture search for embodied agents.", "arxiv_id": "2606.30111", "arxiv_url": "https://arxiv.org/abs/2606.30111", "authors": ["Jian Zhou", "Sihao Lin", "Jin Li", "Shuai Fu", "Gengze Zhou", "Qi Wu"], "brief": "\u672c\u6587\u5c06\u667a\u80fd\u4f53\u67b6\u6784\u641c\u7d22\uff08AAS\uff09\u6269\u5c55\u81f3\u5177\u8eab\u667a\u80fd\u4f53\u9886\u57df\uff0c\u63d0\u51faAgentCanvas\uff08\u7c7b\u578b\u5316\u56fe\u8fd0\u884c\u65f6\uff09\u548cKDLoop\uff08\u63d0\u6848-\u6279\u8bc4-\u5b9e\u9a8c-\u84b8\u998f\u5faa\u73af\u641c\u7d22\u6d41\u7a0b\uff09\uff0c\u5728\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u3001\u5177\u8eab\u95ee\u7b54\u548c\u8bed\u8a00\u6761\u4ef6\u64cd\u63a7\u7b49\u4efb\u52a1\u4e0a\u7cfb\u7edf\u8bc4\u4f30\u81ea\u52a8\u5316\u67b6\u6784\u641c\u7d22\u7684\u6548\u679c\u3002", "categories": ["cs.RO", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30111", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["AgentCanvas\u5c06\u5177\u8eab\u6267\u884c\u5668\u8868\u793a\u4e3a\u53ef\u7f16\u8f91\u7684\u8282\u70b9-\u8fde\u7ebf\u7a0b\u5e8f\uff0c\u652f\u6301\u4eff\u771f\u5668\u611f\u77e5\u6267\u884c\u4e0e\u56de\u5408\u7ea7\u65e5\u5fd7\u8bb0\u5f55", "KDLoop\u641c\u7d22\u6d41\u7a0b\u5305\u542b\u63d0\u6848\u3001\u6279\u8bc4\u3001\u5b9e\u9a8c\u3001\u84b8\u998f\u56db\u9636\u6bb5\uff0c\u5e76\u5728\u641c\u7d22\u505c\u6ede\u65f6\u89e6\u53d1\u53cd\u601d\u673a\u5236", "3\u00d74\u8bc4\u4f30\u77e9\u9635\u663e\u793a\u67b6\u6784\u641c\u7d22\u53ef\u5e26\u6765\u6210\u529f\u7387\u63d0\u5347\uff0c\u4f46\u540c\u65f6\u66b4\u9732\u51fa\u6eda\u52a8\u566a\u58f0\u63a9\u76d6\u4f18\u5316\u4fe1\u53f7\u3001\u5c40\u90e8\u7f16\u8f91\u76c6\u5730\u9677\u9631\u3001\u56de\u5408\u7ea7\u4fe1\u7528\u5206\u914d\u4e0d\u5b8c\u6574\u7b49\u5177\u8eab\u573a\u666f\u7279\u6709\u6311\u6218"], "keywords": ["\u5177\u8eab\u667a\u80fd\u4f53", "\u667a\u80fd\u4f53", "\u67b6\u6784\u641c\u7d22", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30111v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Automating the Design of Embodied AgentArchitectures", "tldr": "\u63d0\u51faAgentCanvas\u4e0eKDLoop\u6846\u67b6\uff0c\u81ea\u52a8\u5316\u641c\u7d22\u5177\u8eab\u667a\u80fd\u4f53\u67b6\u6784\u8bbe\u8ba1\uff0c\u63ed\u793a\u5176\u6f5c\u529b\u4e0e\u5c40\u9650", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06\u667a\u80fd\u4f53\u67b6\u6784\u641c\u7d22\uff08AAS\uff09\u6269\u5c55\u81f3\u5177\u8eab\u667a\u80fd\u4f53\u9886\u57df\uff0c\u63d0\u51faAgentCanvas\uff08\u7c7b\u578b\u5316\u56fe\u8fd0\u884c\u65f6\uff09\u548cKDLoop\uff08\u63d0\u6848-\u6279\u8bc4-\u5b9e\u9a8c-\u84b8\u998f\u5faa\u73af\u641c\u7d22\u6d41\u7a0b\uff09\uff0c\u5728\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u3001\u5177\u8eab\u95ee\u7b54\u548c\u8bed\u8a00\u6761\u4ef6\u64cd\u63a7\u7b49\u4efb\u52a1\u4e0a\u7cfb\u7edf\u8bc4\u4f30\u81ea\u52a8\u5316\u67b6\u6784\u641c\u7d22\u7684\u6548\u679c\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u67b6\u6784\u81ea\u52a8\u641c\u7d22\u5e94\u7528\u4e8e\u611f\u77e5\u578b\u5177\u8eab\u667a\u80fd\u4f53\uff0c\u586b\u8865\u4e86\u6587\u672c\u57dfAAS\u4e0e\u5177\u8eab\u573a\u666f\u4e4b\u95f4\u7684\u7814\u7a76\u7a7a\u767d\uff0c\u5e76\u8bda\u5b9e\u63ed\u793a\u4e86\u5f53\u524d\u65b9\u6cd5\u7684\u8fb9\u754c\u6761\u4ef6\uff0c\u5bf9\u5177\u8eabAI\u7cfb\u7edf\u8bbe\u8ba1\u81ea\u52a8\u5316\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Most coding-agent benchmarks are static: an agent receives a complete task description up front and is judged only by its final code. Real coding assistance is interactive, with users clarifying goals, adding constraints, and correcting mistakes over multiple turns. We introduce SWE-Together, a multi-turn benchmark reconstructed from real user-agent coding sessions. To make real interactions verifiable, we curate 109 repository-level tasks from 11,260 recorded sessions, selecting sessions with recoverable repository states, clear user goals, and observable outcomes. To replay these interactions across agents, we build a reactive LLM-based user simulator that preserves the original users\u0027 intents and provides feedback when the coding agent\u0027s progress requires it. To evaluate agents as collaborators, we measure both final repository correctness and the number of corrective feedback turns required during the interaction. Experiments with frontier coding agents show that stronger agents generally achieve higher final success rates while requiring fewer interventions, suggesting an improved user experience.", "arxiv_id": "2606.29957", "arxiv_url": "https://arxiv.org/abs/2606.29957", "authors": ["Yifan Wu", "Zhuokai Zhao", "Songlin Li", "Ho Hin Lee", "Jiacheng Zhu", "Shirley Wu", "Tianhe Yu", "Serena Li", "Lizhu Zhang", "Xiangjun Fan", "Shengzhi Li"], "brief": "\u63d0\u51faSWE-Together\uff0c\u4e00\u4e2a\u4ece11,260\u6761\u771f\u5b9e\u7528\u6237-\u667a\u80fd\u4f53\u7f16\u7a0b\u4f1a\u8bdd\u4e2d\u7cbe\u9009109\u4e2a\u4ed3\u5e93\u7ea7\u4efb\u52a1\u6784\u5efa\u7684\u591a\u8f6e\u4ea4\u4e92\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7LLM\u7528\u6237\u6a21\u62df\u5668\u590d\u73b0\u771f\u5b9e\u4ea4\u4e92\uff0c\u540c\u65f6\u8bc4\u4f30\u6700\u7ec8\u4ee3\u7801\u6b63\u786e\u6027\u4e0e\u6240\u9700\u7ea0\u9519\u8f6e\u6b21\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29957", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u4ece11,260\u6761\u771f\u5b9e\u5f55\u5236\u4f1a\u8bdd\u4e2d\u7b5b\u9009109\u4e2a\u5177\u6709\u53ef\u6062\u590d\u4ed3\u5e93\u72b6\u6001\u3001\u660e\u786e\u76ee\u6807\u548c\u53ef\u89c2\u6d4b\u7ed3\u679c\u7684\u4efb\u52a1", "\u6784\u5efa\u57fa\u4e8eLLM\u7684\u53cd\u5e94\u5f0f\u7528\u6237\u6a21\u62df\u5668\uff0c\u4fdd\u7559\u539f\u59cb\u7528\u6237\u610f\u56fe\u5e76\u5728\u5fc5\u8981\u65f6\u63d0\u4f9b\u53cd\u9988", "\u53cc\u7ef4\u5ea6\u8bc4\u4f30\uff1a\u6700\u7ec8\u4ed3\u5e93\u6b63\u786e\u6027 + \u4ea4\u4e92\u8fc7\u7a0b\u4e2d\u6240\u9700\u7ea0\u9519\u8f6e\u6b21\uff0c\u66f4\u5f3a\u7684\u667a\u80fd\u4f53\u6210\u529f\u7387\u66f4\u9ad8\u4e14\u5e72\u9884\u6b21\u6570\u66f4\u5c11"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u8bc4\u6d4b", "\u591a\u8f6e\u4ea4\u4e92"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29957v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SWE-Together: Evaluating Coding Agents in Interactive User Sessions", "tldr": "SWE-Together\uff1a\u9996\u4e2a\u57fa\u4e8e\u771f\u5b9e\u7528\u6237\u4f1a\u8bdd\u7684\u591a\u8f6e\u4ea4\u4e92\u7f16\u7a0b\u667a\u80fd\u4f53\u8bc4\u6d4b\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faSWE-Together\uff0c\u4e00\u4e2a\u4ece11,260\u6761\u771f\u5b9e\u7528\u6237-\u667a\u80fd\u4f53\u7f16\u7a0b\u4f1a\u8bdd\u4e2d\u7cbe\u9009109\u4e2a\u4ed3\u5e93\u7ea7\u4efb\u52a1\u6784\u5efa\u7684\u591a\u8f6e\u4ea4\u4e92\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7LLM\u7528\u6237\u6a21\u62df\u5668\u590d\u73b0\u771f\u5b9e\u4ea4\u4e92\uff0c\u540c\u65f6\u8bc4\u4f30\u6700\u7ec8\u4ee3\u7801\u6b63\u786e\u6027\u4e0e\u6240\u9700\u7ea0\u9519\u8f6e\u6b21\u3002", "why_notable": "\u73b0\u6709\u7f16\u7a0b\u667a\u80fd\u4f53\u57fa\u51c6\u5747\u4e3a\u9759\u6001\u5355\u8f6e\u8bc4\u6d4b\uff0c\u4e0e\u771f\u5b9e\u4f7f\u7528\u573a\u666f\u8131\u8282\uff1bSWE-Together\u9996\u6b21\u5c06\u591a\u8f6e\u4ea4\u4e92\u4f53\u9a8c\u7eb3\u5165\u8bc4\u6d4b\u7ef4\u5ea6\uff0c\u66f4\u8d34\u8fd1\u5b9e\u9645\u7f16\u7a0b\u52a9\u624b\u573a\u666f\uff0c\u5bf9\u667a\u80fd\u4f53\u5f00\u53d1\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Spreadsheets are widely used for business analysis, financial modeling, reporting, and decision-making. However, most existing spreadsheet benchmarks evaluate isolated operations such as single-formula generation or local cell edits, and therefore fail to capture end-to-end workflows in realistic business settings. We introduce \\textsc{SpreadsheetBench 2}, a workflow-level benchmark for spreadsheet agents that covers three task categories: generation, debugging, and visualization. The benchmark is constructed from authentic business data, including financial reports and corporate filings, and is annotated and validated by domain experts. The benchmark contains 321 tasks; each instance averages 11.8 worksheets and requires 593.5 cell modifications, reflecting large multi-sheet workbooks with cross-sheet dependencies. We evaluate eight frontier large language models under a unified multi-turn agent scaffold, and additionally include several LLM-based spreadsheet products as complementary baselines. Results show that current systems remain far from reliable on real-world workflows: the best model achieves 34.89\\% overall task accuracy, and debugging accuracy is as low as 12.00\\%. Trajectory analysis and a failure taxonomy further indicate that insufficient spreadsheet inspection and incorrect target-cell selection are the dominant bottlenecks. Together, these findings position \\textsc{SpreadsheetBench 2} as a challenging testbed for advancing reliable spreadsheet automation. Project page: https://spreadsheetbench.github.io/", "arxiv_id": "2606.29955", "arxiv_url": "https://arxiv.org/abs/2606.29955", "authors": ["Jian Zhu", "Yuzheng Zhang", "Zeyao Ma", "Bohan Zhang", "Armin Schoepf", "Daniel Woloch", "Peter Yiliu Wang", "Guangyu Robert Yang", "Samuel Jacob", "Siddharth Nagisetty", "Abhiram Chundru", "Jean Lin", "Spencer Mateega", "Jing Zhang"], "brief": "\u63d0\u51faSpreadsheetBench 2\uff0c\u4e00\u4e2a\u9762\u5411\u7535\u5b50\u8868\u683c\u667a\u80fd\u4f53\u7684\u5de5\u4f5c\u6d41\u7ea7\u57fa\u51c6\uff0c\u6db5\u76d6\u751f\u6210\u3001\u8c03\u8bd5\u548c\u53ef\u89c6\u5316\u4e09\u7c7b\u4efb\u52a1\uff0c\u57fa\u4e8e\u771f\u5b9e\u8d22\u52a1\u62a5\u544a\u6784\u5efa\uff0c\u5305\u542b321\u4e2a\u4efb\u52a1\uff0c\u5e73\u5747\u6bcf\u4e2a\u4efb\u52a1\u6d89\u53ca11.8\u4e2a\u5de5\u4f5c\u8868\u548c593.5\u4e2a\u5355\u5143\u683c\u4fee\u6539\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29955", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u6700\u4f18\u6a21\u578b\u6574\u4f53\u4efb\u52a1\u51c6\u786e\u7387\u4ec534.89%\uff0c\u8c03\u8bd5\u4efb\u52a1\u51c6\u786e\u7387\u4f4e\u81f312.00%\uff0c\u8868\u660e\u5f53\u524d\u7cfb\u7edf\u8ddd\u79bb\u53ef\u9760\u81ea\u52a8\u5316\u4ecd\u6709\u5f88\u5927\u5dee\u8ddd", "\u57fa\u51c6\u4efb\u52a1\u6765\u81ea\u771f\u5b9e\u5546\u4e1a\u6570\u636e\uff08\u8d22\u52a1\u62a5\u544a\u3001\u4f01\u4e1a\u6587\u4ef6\uff09\uff0c\u7531\u9886\u57df\u4e13\u5bb6\u6807\u6ce8\u9a8c\u8bc1\uff0c\u5177\u6709\u8de8\u8868\u4f9d\u8d56\u7684\u5927\u578b\u591a\u5de5\u4f5c\u8868\u573a\u666f", "\u5931\u8d25\u5206\u6790\u63ed\u793a\u4e24\u5927\u4e3b\u8981\u74f6\u9888\uff1a\u7535\u5b50\u8868\u683c\u68c0\u67e5\u4e0d\u8db3\u548c\u76ee\u6807\u5355\u5143\u683c\u9009\u62e9\u9519\u8bef"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "\u4ee3\u7801\u751f\u6210", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29955v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SpreadsheetBench 2: Evaluating Agents on End-to-End Business Spreadsheet Workflows", "tldr": "SpreadsheetBench 2\uff1a\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u5546\u4e1a\u7535\u5b50\u8868\u683c\u7aef\u5230\u7aef\u5de5\u4f5c\u6d41\u4e0a\u7684\u80fd\u529b\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faSpreadsheetBench 2\uff0c\u4e00\u4e2a\u9762\u5411\u7535\u5b50\u8868\u683c\u667a\u80fd\u4f53\u7684\u5de5\u4f5c\u6d41\u7ea7\u57fa\u51c6\uff0c\u6db5\u76d6\u751f\u6210\u3001\u8c03\u8bd5\u548c\u53ef\u89c6\u5316\u4e09\u7c7b\u4efb\u52a1\uff0c\u57fa\u4e8e\u771f\u5b9e\u8d22\u52a1\u62a5\u544a\u6784\u5efa\uff0c\u5305\u542b321\u4e2a\u4efb\u52a1\uff0c\u5e73\u5747\u6bcf\u4e2a\u4efb\u52a1\u6d89\u53ca11.8\u4e2a\u5de5\u4f5c\u8868\u548c593.5\u4e2a\u5355\u5143\u683c\u4fee\u6539\u3002", "why_notable": "\u586b\u8865\u4e86\u73b0\u6709\u7535\u5b50\u8868\u683c\u57fa\u51c6\u4ec5\u8bc4\u4f30\u5b64\u7acb\u64cd\u4f5c\u7684\u7a7a\u767d\uff0c\u9996\u6b21\u7cfb\u7edf\u8bc4\u4f30\u7aef\u5230\u7aef\u5546\u4e1a\u5de5\u4f5c\u6d41\uff0c\u4e3a\u63a8\u52a8\u7535\u5b50\u8868\u683c\u81ea\u52a8\u5316\u7814\u7a76\u63d0\u4f9b\u4e86\u5177\u6709\u6311\u6218\u6027\u7684\u771f\u5b9e\u6d4b\u8bd5\u5e73\u53f0\u3002"}, {"abstract": "Long-horizon strategic planning in complex strategy games demands concurrent reasoning across multiple decision domains under imperfect information and sparse reward. Existing LLM-based agents suffer from three systematic failures: scene blindness from raw tile coordinates, context overflow and domain coupling from monolithic state dumps, and shallow cross-game learning that treats each episode in isolation. We present SAGA, an LLM multi-agent framework with three mechanisms each directly targeting one class of failure: (i) a Map-Semantic Scene Graph that encodes typed spatial relations among game entities into per-unit natural-language context, resolving spatial blindness without global token inflation; (ii) a Tool-Augmented Planner that pulls fine-grained domain state on demand and dispatches per-domain directives to dedicated specialist controllers, eliminating context overflow, domain coupling, and mechanical constraint violations; and (iii) a Dual-Horizon Feedback Loop that combines periodic within-game goal generation with structured cross-game causal post-mortem, enabling principled strategic evolution without manual reward engineering. Evaluated on FreeCiv, SAGA attains the highest mean civilization score -- the environment\u0027s sole sparse objective reward -- with lower variance than the two strongest baselines, and is the only method that significantly surpasses every baseline on infrastructure construction, the resource axis most readily sacrificed under multi-objective conflict. It outscores the two strongest baselines in most head-to-head games while cutting output tokens (the dominant decoding cost) by 27%. Equipped with the cross-game evolution module, SAGA reaches the highest end-of-chain score across five successive episodes. Ablation studies confirm that each architectural component contributes independently to this advantage.", "arxiv_id": "2606.29932", "arxiv_url": "https://arxiv.org/abs/2606.29932", "authors": ["Tianyu Jin", "Shuo Chen", "Yida Wang", "Liuyu Xiang", "Yingzhuo Liu", "Zhiyao Jiang", "Yexin Li", "Zhaofeng He"], "brief": "\u63d0\u51faSAGA\u6846\u67b6\uff0c\u901a\u8fc7\u5730\u56fe\u8bed\u4e49\u573a\u666f\u56fe\u3001\u5de5\u5177\u589e\u5f3a\u89c4\u5212\u5668\u548c\u53cc\u65f6\u57df\u53cd\u9988\u5faa\u73af\u4e09\u5927\u673a\u5236\uff0c\u89e3\u51b3LLM\u667a\u80fd\u4f53\u5728\u590d\u6742\u7b56\u7565\u6e38\u620f\uff08FreeCiv\uff09\u4e2d\u957f\u7a0b\u89c4\u5212\u7684\u7cfb\u7edf\u6027\u5931\u8d25\u95ee\u9898\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29932", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5730\u56fe\u8bed\u4e49\u573a\u666f\u56fe\uff08Map-Semantic Scene Graph\uff09\u5c06\u6e38\u620f\u5b9e\u4f53\u7a7a\u95f4\u5173\u7cfb\u7f16\u7801\u4e3a\u81ea\u7136\u8bed\u8a00\u4e0a\u4e0b\u6587\uff0c\u89e3\u51b3\u7a7a\u95f4\u76f2\u76ee\u6027\u95ee\u9898", "\u5de5\u5177\u589e\u5f3a\u89c4\u5212\u5668\u6309\u9700\u62c9\u53d6\u9886\u57df\u72b6\u6001\u5e76\u5206\u53d1\u7ed9\u4e13\u5c5e\u63a7\u5236\u5668\uff0c\u6d88\u9664\u4e0a\u4e0b\u6587\u6ea2\u51fa\u548c\u9886\u57df\u8026\u5408\uff0ctoken\u8f93\u51fa\u51cf\u5c1127%", "\u53cc\u65f6\u57df\u53cd\u9988\u5faa\u73af\u7ed3\u5408\u6e38\u620f\u5185\u5468\u671f\u6027\u76ee\u6807\u751f\u6210\u4e0e\u8de8\u6e38\u620f\u56e0\u679c\u590d\u76d8\uff0c\u5b9e\u73b0\u65e0\u9700\u4eba\u5de5\u5956\u52b1\u5de5\u7a0b\u7684\u7b56\u7565\u6f14\u5316"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29932v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SAGA: Scene-Aware, Goal-Evolving Agents for Long-Horizon CivRealm Strategy Planning", "tldr": "SAGA\uff1a\u9488\u5bf9\u590d\u6742\u7b56\u7565\u6e38\u620f\u957f\u7a0b\u89c4\u5212\u7684\u573a\u666f\u611f\u77e5\u3001\u76ee\u6807\u6f14\u5316\u591a\u667a\u80fd\u4f53\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faSAGA\u6846\u67b6\uff0c\u901a\u8fc7\u5730\u56fe\u8bed\u4e49\u573a\u666f\u56fe\u3001\u5de5\u5177\u589e\u5f3a\u89c4\u5212\u5668\u548c\u53cc\u65f6\u57df\u53cd\u9988\u5faa\u73af\u4e09\u5927\u673a\u5236\uff0c\u89e3\u51b3LLM\u667a\u80fd\u4f53\u5728\u590d\u6742\u7b56\u7565\u6e38\u620f\uff08FreeCiv\uff09\u4e2d\u957f\u7a0b\u89c4\u5212\u7684\u7cfb\u7edf\u6027\u5931\u8d25\u95ee\u9898\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u89e3\u51b3\u7b56\u7565\u6e38\u620fLLM\u667a\u80fd\u4f53\u4e09\u7c7b\u6838\u5fc3\u5931\u8d25\u7684\u6846\u67b6\uff0c\u5728FreeCiv\u4e0a\u53d6\u5f97\u6700\u9ad8\u6587\u660e\u5f97\u5206\u4e14\u65b9\u5dee\u66f4\u4f4e\uff0c\u8de8\u6e38\u620f\u8fde\u7eed5\u5c40\u6301\u7eed\u63d0\u5347\uff0c\u5bf9\u957f\u7a0b\u591a\u76ee\u6807\u51b3\u7b56\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Existing world model-based planners for visual navigation typically follow a verification-centric paradigm, decoupling goal intent from trajectory synthesis. This approach suffers from candidate dependence, heavy computational overhead, and inconsistencies between sampled actions and predicted visuals. To address these issues, we propose SWAM (Spatial-perceiving World Action Model), a task-centric joint observation-action generation framework. Given start and goal RGB observations, SWAM performs single-pass inference to simultaneously generate intermediate RGB-D sequences and corresponding action trajectories, promoting goal-consistent trajectory generation and improved spatial feasibility. While SWAM leverages depth pseudo-labels during training to internalize spatial priors, it requires only monocular RGB input at inference time. We further introduce a visual-guided action refinement module and a trajectory-scale regularization loss to enforce fine-grained alignment between motion and visual cues while stabilizing predictions across varying distances. Extensive experiments show that SWAM significantly outperforms state-of-the-art two-stage planners in success rate, trajectory accuracy, and inference efficiency, while demonstrating robust zero-shot generalization to unseen environments.", "arxiv_id": "2606.29908", "arxiv_url": "https://arxiv.org/abs/2606.29908", "authors": ["Hong Chen", "Daqi Liu", "Zehan Zhang", "Haiguang Wang", "Tianhao Lu", "Longfei Yan", "Haiyang Sun", "Fangzhen Li", "Hongwei Xie", "Bing Wang", "Guang Chen", "Hangjun Ye", "Yihua Tan"], "brief": "\u63d0\u51faSWAM\uff08\u7a7a\u95f4\u611f\u77e5\u4e16\u754c\u52a8\u4f5c\u6a21\u578b\uff09\uff0c\u4e00\u79cd\u4ee5\u4efb\u52a1\u4e3a\u4e2d\u5fc3\u7684\u8054\u5408\u89c2\u6d4b-\u52a8\u4f5c\u751f\u6210\u6846\u67b6\uff0c\u7ed9\u5b9a\u8d77\u70b9\u548c\u76ee\u6807RGB\u56fe\u50cf\uff0c\u5355\u6b21\u63a8\u7406\u540c\u65f6\u751f\u6210\u4e2d\u95f4RGB-D\u5e8f\u5217\u548c\u5bf9\u5e94\u52a8\u4f5c\u8f68\u8ff9\uff0c\u89e3\u51b3\u4f20\u7edf\u4e24\u9636\u6bb5\u89c4\u5212\u5668\u7684\u5019\u9009\u4f9d\u8d56\u3001\u8ba1\u7b97\u5f00\u9500\u5927\u548c\u52a8\u4f5c-\u89c6\u89c9\u4e0d\u4e00\u81f4\u95ee\u9898\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29908", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5355\u6b21\u63a8\u7406\u8054\u5408\u751f\u6210RGB-D\u4e2d\u95f4\u5e27\u5e8f\u5217\u4e0e\u52a8\u4f5c\u8f68\u8ff9\uff0c\u907f\u514d\u4e24\u9636\u6bb5\u89e3\u8026\u5e26\u6765\u7684\u4e0d\u4e00\u81f4\u6027", "\u8bad\u7ec3\u65f6\u5229\u7528\u6df1\u5ea6\u4f2a\u6807\u7b7e\u5185\u5316\u7a7a\u95f4\u5148\u9a8c\uff0c\u63a8\u7406\u65f6\u4ec5\u9700\u5355\u76eeRGB\u8f93\u5165", "\u5f15\u5165\u89c6\u89c9\u5f15\u5bfc\u52a8\u4f5c\u7cbe\u5316\u6a21\u5757\u548c\u8f68\u8ff9\u5c3a\u5ea6\u6b63\u5219\u5316\u635f\u5931\uff0c\u63d0\u5347\u8fd0\u52a8\u4e0e\u89c6\u89c9\u7ebf\u7d22\u7684\u7ec6\u7c92\u5ea6\u5bf9\u9f50", "\u5728\u6210\u529f\u7387\u3001\u8f68\u8ff9\u7cbe\u5ea6\u548c\u63a8\u7406\u6548\u7387\u4e0a\u663e\u8457\u8d85\u8d8aSOTA\u4e24\u9636\u6bb5\u89c4\u5212\u5668\uff0c\u5e76\u5177\u5907\u96f6\u6837\u672c\u6cdb\u5316\u80fd\u529b"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u4e16\u754c\u6a21\u578b", "\u89c6\u89c9\u5bfc\u822a", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29908v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Pondering the Way: Spatial-perceiving World Action Model for Embodied Navigation", "tldr": "SWAM\uff1a\u5355\u6b21\u63a8\u7406\u540c\u6b65\u751f\u6210RGB-D\u5e8f\u5217\u4e0e\u52a8\u4f5c\u8f68\u8ff9\u7684\u5177\u8eab\u5bfc\u822a\u4e16\u754c\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faSWAM\uff08\u7a7a\u95f4\u611f\u77e5\u4e16\u754c\u52a8\u4f5c\u6a21\u578b\uff09\uff0c\u4e00\u79cd\u4ee5\u4efb\u52a1\u4e3a\u4e2d\u5fc3\u7684\u8054\u5408\u89c2\u6d4b-\u52a8\u4f5c\u751f\u6210\u6846\u67b6\uff0c\u7ed9\u5b9a\u8d77\u70b9\u548c\u76ee\u6807RGB\u56fe\u50cf\uff0c\u5355\u6b21\u63a8\u7406\u540c\u65f6\u751f\u6210\u4e2d\u95f4RGB-D\u5e8f\u5217\u548c\u5bf9\u5e94\u52a8\u4f5c\u8f68\u8ff9\uff0c\u89e3\u51b3\u4f20\u7edf\u4e24\u9636\u6bb5\u89c4\u5212\u5668\u7684\u5019\u9009\u4f9d\u8d56\u3001\u8ba1\u7b97\u5f00\u9500\u5927\u548c\u52a8\u4f5c-\u89c6\u89c9\u4e0d\u4e00\u81f4\u95ee\u9898\u3002", "why_notable": "\u5c06\u4e16\u754c\u6a21\u578b\u4ece\"\u9a8c\u8bc1\u4e2d\u5fc3\"\u8303\u5f0f\u8f6c\u5411\"\u4efb\u52a1\u4e2d\u5fc3\"\u8054\u5408\u751f\u6210\u8303\u5f0f\uff0c\u4ece\u6839\u672c\u4e0a\u89e3\u51b3\u4e86\u5177\u8eab\u5bfc\u822a\u4e2d\u52a8\u4f5c\u4e0e\u89c6\u89c9\u9884\u6d4b\u89e3\u8026\u7684\u6838\u5fc3\u77db\u76fe\uff0c\u540c\u65f6\u5b9e\u73b0\u63a8\u7406\u6548\u7387\u4e0e\u6cdb\u5316\u80fd\u529b\u7684\u53cc\u91cd\u63d0\u5347\uff0c\u5bf9\u5177\u8eab\u667a\u80fd\u5bfc\u822a\u7814\u7a76\u5177\u6709\u91cd\u8981\u65b9\u6cd5\u8bba\u4ef7\u503c\u3002"}, {"abstract": "In real-world applications, guardrails are often expected to identify unsafe user-model interactions according to application-specific safety policies, rather than relying on predefined risk taxonomies. In this work, we study this setting under the paradigm of in-context policy guardrailing, where guardrails predict safety violations based on policy specifications provided in context. To systematically evaluate this capability, we introduce SafePyramid, a safety benchmark comprising 1,000 multi-turn conversations across 10 domains and 3,000 corresponding application-specific policies, which together contain 61,699 distinct natural-language rules. SafePyramid organizes the evaluation into three difficulty levels: L0 evaluates individual-rule understanding, L1 evaluates reasoning over rule dependencies, and L2 evaluates adaptation of full novel policy frameworks defined in context. To ensure benchmark quality, we employ a rigorous multi-stage pipeline to construct and validate the benchmark. Using SafePyramid, we evaluate 10 frontier LLMs and 5 policy-configurable guardrails and find that in-context policy guardrailing remains highly challenging: even the best-performing model, GPT-5.5, exactly identifies the full set of violated rules in only 54.0%, 35.3%, and 12.9% cases on L0, L1, and L2, respectively. These results highlight the limitations of current guardrails and call for stronger in-context policy guardrails that can reliably execute policies, resolve rule dependencies, and adapt to novel policy frameworks.", "arxiv_id": "2606.29887", "arxiv_url": "https://arxiv.org/abs/2606.29887", "authors": ["Jiacheng Zhang", "Haoyu He", "Sen Zhang", "Shen Wang", "Xiaolei Xu", "Yuhao Sun", "Meng Shen", "Feng Liu"], "brief": "\u63d0\u51faSafePyramid\u57fa\u51c6\uff0c\u5305\u542b1000\u4e2a\u591a\u8f6e\u5bf9\u8bdd\u30013000\u6761\u5e94\u7528\u7279\u5b9a\u7b56\u7565\u548c61699\u6761\u81ea\u7136\u8bed\u8a00\u89c4\u5219\uff0c\u5206\u4e09\u4e2a\u96be\u5ea6\u5c42\u7ea7\u8bc4\u4f30LLM\u5728\u4e0a\u4e0b\u6587\u7b56\u7565\u62a4\u680f\uff08in-context policy guardrailing\uff09\u573a\u666f\u4e0b\u7684\u5b89\u5168\u8fdd\u89c4\u8bc6\u522b\u80fd\u529b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29887", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4e09\u7ea7\u96be\u5ea6\u8bbe\u8ba1\uff1aL0\u8bc4\u4f30\u5355\u6761\u89c4\u5219\u7406\u89e3\uff0cL1\u8bc4\u4f30\u89c4\u5219\u4f9d\u8d56\u63a8\u7406\uff0cL2\u8bc4\u4f30\u5168\u65b0\u7b56\u7565\u6846\u67b6\u9002\u5e94", "\u8bc4\u4f3010\u4e2a\u524d\u6cbfLLM\u548c5\u4e2a\u53ef\u914d\u7f6e\u62a4\u680f\u7cfb\u7edf\uff0c\u6700\u5f3a\u6a21\u578bGPT-4.5\u5728L0/L1/L2\u7684\u5b8c\u6574\u89c4\u5219\u8bc6\u522b\u51c6\u786e\u7387\u4ec5\u4e3a54.0%/35.3%/12.9%", "\u8986\u76d610\u4e2a\u5e94\u7528\u9886\u57df\uff0c\u91c7\u7528\u591a\u9636\u6bb5\u6d41\u6c34\u7ebf\u786e\u4fdd\u57fa\u51c6\u8d28\u91cf\uff0c\u5f3a\u8c03\u5e94\u7528\u7279\u5b9a\u7b56\u7565\u800c\u975e\u9884\u5b9a\u4e49\u98ce\u9669\u5206\u7c7b"], "keywords": ["\u5b89\u5168\u62a4\u680f", "\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29887v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SafePyramid: A Hierarchical Benchmark for In-context Policy Guardrailing", "tldr": "SafePyramid\uff1a\u8bc4\u4f30LLM\u57fa\u4e8e\u4e0a\u4e0b\u6587\u7b56\u7565\u8bc6\u522b\u5b89\u5168\u8fdd\u89c4\u7684\u5206\u5c42\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faSafePyramid\u57fa\u51c6\uff0c\u5305\u542b1000\u4e2a\u591a\u8f6e\u5bf9\u8bdd\u30013000\u6761\u5e94\u7528\u7279\u5b9a\u7b56\u7565\u548c61699\u6761\u81ea\u7136\u8bed\u8a00\u89c4\u5219\uff0c\u5206\u4e09\u4e2a\u96be\u5ea6\u5c42\u7ea7\u8bc4\u4f30LLM\u5728\u4e0a\u4e0b\u6587\u7b56\u7565\u62a4\u680f\uff08in-context policy guardrailing\uff09\u573a\u666f\u4e0b\u7684\u5b89\u5168\u8fdd\u89c4\u8bc6\u522b\u80fd\u529b\u3002", "why_notable": "\u63ed\u793a\u4e86\u5f53\u524d\u6700\u5148\u8fdbLLM\u5728\u52a8\u6001\u7b56\u7565\u6267\u884c\u573a\u666f\u4e0b\u7684\u663e\u8457\u5c40\u9650\u6027\uff0c\u4e3a\u6784\u5efa\u66f4\u53ef\u9760\u7684\u4e0a\u4e0b\u6587\u611f\u77e5\u5b89\u5168\u62a4\u680f\u63d0\u4f9b\u4e86\u7cfb\u7edf\u6027\u8bc4\u4f30\u6846\u67b6\uff0c\u5bf9\u5b9e\u9645AI\u90e8\u7f72\u5b89\u5168\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "The quadratic computational cost of traditional attention mechanisms poses a major bottleneck to the scalability and practical deployment of large language models (LLMs), particularly in long-context scenarios. To improve efficiency, existing approaches often enforce rigid structural constraints such as local attention windows. However, these strategies typically lead to substantial performance degradation on tasks requiring precise long-range recall. In this work, we propose MATCH, a scalable and efficient framework that augments sparsified attention mechanisms with dynamically integrated in-context information through an efficient retrieval system. Empirical results show that MATCH significantly improves the performance of sparse-attention models on both synthetic and real-world natural-language tasks. These findings highlight the versatility of MATCH as a general approach for enhancing in-context retrieval capabilities while maintaining the efficiency benefits of sparse attention architectures.", "arxiv_id": "2606.29844", "arxiv_url": "https://arxiv.org/abs/2606.29844", "authors": ["Linrui Ma", "Chun Hei Lo", "Xinyu Wang", "Peng Lu", "Xihao Yuan", "Hanting Chen", "Kai Han", "Xinghao Chen", "Chengjun Zhan", "Hanlin Xu", "Yichun Yin", "Lifeng Shang", "Feng Wen", "Boxing Chen", "Yufei Cui"], "brief": "\u63d0\u51faMATCH\u6846\u67b6\uff0c\u5c06\u9ad8\u6548\u68c0\u7d22\u7cfb\u7edf\u4e0e\u7a00\u758f\u6ce8\u610f\u529b\u673a\u5236\u7ed3\u5408\uff0c\u52a8\u6001\u6574\u5408\u4e0a\u4e0b\u6587\u76f8\u5173\u4fe1\u606f\uff0c\u5728\u4fdd\u6301\u8ba1\u7b97\u6548\u7387\u7684\u540c\u65f6\u663e\u8457\u63d0\u5347\u957f\u8ddd\u79bb\u4fe1\u606f\u53ec\u56de\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29844", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9488\u5bf9\u4f20\u7edf\u6ce8\u610f\u529b\u673a\u5236\u7684\u4e8c\u6b21\u65b9\u8ba1\u7b97\u590d\u6742\u5ea6\u74f6\u9888\uff0c\u5728\u7a00\u758f\u6ce8\u610f\u529b\u57fa\u7840\u4e0a\u5f15\u5165\u52a8\u6001\u4e0a\u4e0b\u6587\u68c0\u7d22\u6a21\u5757", "\u65e0\u9700\u5f3a\u5236\u5c40\u90e8\u7a97\u53e3\u7b49\u521a\u6027\u7ed3\u6784\u7ea6\u675f\uff0c\u901a\u8fc7\u68c0\u7d22\u673a\u5236\u7075\u6d3b\u8865\u5145\u5173\u952e\u8fdc\u7a0b\u4f9d\u8d56\u4fe1\u606f", "\u5728\u5408\u6210\u4efb\u52a1\u548c\u771f\u5b9e\u81ea\u7136\u8bed\u8a00\u4efb\u52a1\u4e0a\u5747\u663e\u8457\u4f18\u4e8e\u7eaf\u7a00\u758f\u6ce8\u610f\u529b\u6a21\u578b\uff0c\u9a8c\u8bc1\u4e86\u65b9\u6cd5\u7684\u901a\u7528\u6027"], "keywords": ["\u957f\u4e0a\u4e0b\u6587", "\u7a00\u758f\u6ce8\u610f\u529b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u68c0\u7d22\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29844v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MATCH: Modulating Attention via In-Context Retrieval for Long-Context Transformers", "tldr": "MATCH\u6846\u67b6\u901a\u8fc7\u52a8\u6001\u4e0a\u4e0b\u6587\u68c0\u7d22\u589e\u5f3a\u7a00\u758f\u6ce8\u610f\u529b\uff0c\u89e3\u51b3\u957f\u4e0a\u4e0b\u6587LLM\u6548\u7387\u4e0e\u6027\u80fd\u7684\u77db\u76fe", "upvotes": 0, "what_it_is": "\u63d0\u51faMATCH\u6846\u67b6\uff0c\u5c06\u9ad8\u6548\u68c0\u7d22\u7cfb\u7edf\u4e0e\u7a00\u758f\u6ce8\u610f\u529b\u673a\u5236\u7ed3\u5408\uff0c\u52a8\u6001\u6574\u5408\u4e0a\u4e0b\u6587\u76f8\u5173\u4fe1\u606f\uff0c\u5728\u4fdd\u6301\u8ba1\u7b97\u6548\u7387\u7684\u540c\u65f6\u663e\u8457\u63d0\u5347\u957f\u8ddd\u79bb\u4fe1\u606f\u53ec\u56de\u80fd\u529b\u3002", "why_notable": "\u6709\u6548\u5e73\u8861\u4e86\u957f\u4e0a\u4e0b\u6587LLM\u7684\u6548\u7387\u4e0e\u7cbe\u786e\u53ec\u56de\u80fd\u529b\uff0c\u4f5c\u4e3a\u5373\u63d2\u5373\u7528\u7684\u901a\u7528\u6846\u67b6\u53ef\u5e7f\u6cdb\u9002\u914d\u73b0\u6709\u7a00\u758f\u6ce8\u610f\u529b\u67b6\u6784\uff0c\u5bf9\u5927\u6a21\u578b\u957f\u6587\u672c\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Chart data extraction, which reverse-engineers data tables from chart images, is essential for reproducibility, analysis, retrieval, and redesign. Existing interactive tools are reliable but tedious, and mixed-initiative systems, while more efficient, lack generalizability. Recent multimodal large language models (MLLMs) offer a unified interface for chart interpretation, yet their ability to extract accurate data tables, especially without visible labels, remains unclear. We build a benchmark featuring diverse real-world charts without data labels to evaluate this capability. Results show that, while current MLLMs reliably reconstruct table structures, they struggle with precise value recovery. To address this, we revisit chart data extraction from a human-centered perspective and argue that extraction should follow a progressive learning process similar to how people read charts. Our training framework substantially improves numerical accuracy, achieving state-of-the-art performance with a 7B-parameter model. A user study further shows that our model effectively supports mixed-initiative workflows for reliable chart data extraction.", "arxiv_id": "2606.29808", "arxiv_url": "https://arxiv.org/abs/2606.29808", "authors": ["Yuchen He", "Peizhi Ying", "Liqi Cheng", "Kuilin Peng", "Yuan Tian", "Dazhen Deng", "Yingcai Wu"], "brief": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u9762\u5411\u771f\u5b9e\u4e16\u754c\u65e0\u6807\u7b7e\u56fe\u8868\u7684\u6570\u636e\u63d0\u53d6\u57fa\u51c6\uff0c\u5e76\u8bbe\u8ba1\u4e86\u6a21\u62df\u4eba\u7c7b\u6e10\u8fdb\u5f0f\u9605\u8bfb\u56fe\u8868\u7684\u8bad\u7ec3\u6846\u67b6\uff0c\u663e\u8457\u63d0\u5347\u591a\u6a21\u6001\u5927\u6a21\u578b\u5728\u56fe\u8868\u6570\u503c\u63d0\u53d6\u4e0a\u7684\u7cbe\u5ea6\u3002", "categories": ["cs.HC", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29808", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efa\u5305\u542b\u591a\u6837\u5316\u65e0\u6570\u636e\u6807\u7b7e\u771f\u5b9e\u56fe\u8868\u7684\u57fa\u51c6\uff0c\u63ed\u793a\u73b0\u6709MLLM\u80fd\u91cd\u5efa\u8868\u683c\u7ed3\u6784\u4f46\u6570\u503c\u7cbe\u5ea6\u4e0d\u8db3\u7684\u95ee\u9898", "\u63d0\u51fa\u4ee5\u4eba\u4e3a\u4e2d\u5fc3\u7684\u6e10\u8fdb\u5f0f\u5b66\u4e60\u8bad\u7ec3\u6846\u67b6\uff0c\u6a21\u62df\u4eba\u7c7b\u8bfb\u56fe\u8fc7\u7a0b\uff0c7B\u53c2\u6570\u6a21\u578b\u8fbe\u5230SOTA\u6027\u80fd", "\u7528\u6237\u7814\u7a76\u9a8c\u8bc1\u6a21\u578b\u6709\u6548\u652f\u6301\u6df7\u5408\u4e3b\u52a8\u5de5\u4f5c\u6d41\uff0c\u63d0\u5347\u56fe\u8868\u6570\u636e\u63d0\u53d6\u7684\u53ef\u9760\u6027\u4e0e\u6548\u7387"], "keywords": ["\u591a\u6a21\u6001", "\u56fe\u8868\u7406\u89e3", "\u57fa\u51c6\u8bc4\u6d4b", "\u6570\u636e\u63d0\u53d6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29808v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Making Multimodal LLMs Reliable Chart Data Extractors: A Benchmark and Training Framework", "tldr": "\u6784\u5efa\u57fa\u51c6\u5e76\u63d0\u51fa\u8bad\u7ec3\u6846\u67b6\uff0c\u8ba9\u591a\u6a21\u6001\u5927\u6a21\u578b\u53ef\u9760\u5730\u4ece\u56fe\u8868\u56fe\u50cf\u4e2d\u63d0\u53d6\u7cbe\u786e\u6570\u636e", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u4e2a\u9762\u5411\u771f\u5b9e\u4e16\u754c\u65e0\u6807\u7b7e\u56fe\u8868\u7684\u6570\u636e\u63d0\u53d6\u57fa\u51c6\uff0c\u5e76\u8bbe\u8ba1\u4e86\u6a21\u62df\u4eba\u7c7b\u6e10\u8fdb\u5f0f\u9605\u8bfb\u56fe\u8868\u7684\u8bad\u7ec3\u6846\u67b6\uff0c\u663e\u8457\u63d0\u5347\u591a\u6a21\u6001\u5927\u6a21\u578b\u5728\u56fe\u8868\u6570\u503c\u63d0\u53d6\u4e0a\u7684\u7cbe\u5ea6\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u8bc4\u4f30MLLM\u5728\u65e0\u6807\u7b7e\u56fe\u8868\u6570\u503c\u63d0\u53d6\u4e0a\u7684\u80fd\u529b\u8fb9\u754c\uff0c\u5e76\u63d0\u4f9b\u53ef\u843d\u5730\u7684\u8bad\u7ec3\u65b9\u6848\uff0c\u5bf9\u6570\u636e\u53ef\u590d\u73b0\u6027\u3001\u56fe\u8868\u5206\u6790\u7b49\u5b9e\u9645\u573a\u666f\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "Extensive context has become the norm as Large Language Models (LLMs) are increasingly deployed in long-horizon tasks. The concern that increasing context length degrades model capabilities, known as context rot, has become a central issue for these applications. In this paper, we focus on deep search scenarios, aiming to investigate the rot phenomenon and its mitigation strategies. By evaluating four flagship open-source models across three benchmarks, we reveal a prevalent but unnoticed rot phenomenon: extensive context causes models to directly give up or prematurely provide uncertain answers, and this issue is exacerbated as the context grows. Through pruning experiments, we demonstrate the relationship between the accumulated context and the rot phenomenon. Furthermore, we investigate mitigating this issue through context management and post-hoc rejection sampling. For context management, we systematically evaluate seven different methods across three categories, based on performance, cost, and impact on context rot, providing clear guidance for strategy selection and usage. For rejection sampling, we develop a rot-aware filtering strategy and demonstrate its effectiveness across three aggregation methods. Finally, we show that these two approaches can be combined for further performance improvements.", "arxiv_id": "2606.29718", "arxiv_url": "https://arxiv.org/abs/2606.29718", "authors": ["Shijie Xia", "Yikun Wang", "Zhen Huang", "Pengfei Liu"], "brief": "\u672c\u6587\u9488\u5bf9\u6df1\u5ea6\u641c\u7d22\u573a\u666f\u4e2dLLM\u968f\u4e0a\u4e0b\u6587\u589e\u957f\u800c\u6027\u80fd\u9000\u5316\u7684\"\u4e0a\u4e0b\u6587\u8150\u5316\"\uff08context rot\uff09\u73b0\u8c61\uff0c\u7cfb\u7edf\u8bca\u65ad\u5176\u6210\u56e0\uff0c\u5e76\u63d0\u51fa\u4e0a\u4e0b\u6587\u7ba1\u7406\u4e0e\u62d2\u7edd\u91c7\u6837\u4e24\u7c7b\u7f13\u89e3\u65b9\u6cd5\u3002", "categories": ["cs.IR", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29718", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u57284\u4e2a\u4e3b\u6d41\u5f00\u6e90\u6a21\u578b\u30013\u4e2a\u57fa\u51c6\u4e0a\u53d1\u73b0\uff1a\u4e0a\u4e0b\u6587\u8fc7\u957f\u5bfc\u81f4\u6a21\u578b\u76f4\u63a5\u653e\u5f03\u6216\u8fc7\u65e9\u7ed9\u51fa\u4e0d\u786e\u5b9a\u7b54\u6848\uff0c\u4e14\u968f\u4e0a\u4e0b\u6587\u589e\u957f\u52a0\u5267", "\u901a\u8fc7\u526a\u679d\u5b9e\u9a8c\u9a8c\u8bc1\u4e86\u7d2f\u79ef\u4e0a\u4e0b\u6587\u4e0e\u8150\u5316\u73b0\u8c61\u7684\u56e0\u679c\u5173\u7cfb\uff0c\u5e76\u7cfb\u7edf\u8bc4\u4f307\u79cd\u4e0a\u4e0b\u6587\u7ba1\u7406\u65b9\u6cd5\uff08\u8986\u76d6\u6027\u80fd\u3001\u6210\u672c\u3001\u8150\u5316\u5f71\u54cd\u4e09\u7ef4\u5ea6\uff09", "\u63d0\u51fa\u8150\u5316\u611f\u77e5\u7684\u62d2\u7edd\u91c7\u6837\u8fc7\u6ee4\u7b56\u7565\uff0c\u5728\u4e09\u79cd\u805a\u5408\u65b9\u6cd5\u4e0a\u5747\u6709\u6548\uff0c\u4e14\u4e0e\u4e0a\u4e0b\u6587\u7ba1\u7406\u7ed3\u5408\u53ef\u8fdb\u4e00\u6b65\u63d0\u5347\u6027\u80fd"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u957f\u4e0a\u4e0b\u6587", "\u4fe1\u606f\u68c0\u7d22", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29718v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Diagnosing and Mitigating Context Rot in Long-horizon Search", "tldr": "\u7814\u7a76LLM\u957f\u4e0a\u4e0b\u6587\u641c\u7d22\u4e2d\u7684\"\u4e0a\u4e0b\u6587\u8150\u5316\"\u73b0\u8c61\u5e76\u63d0\u51fa\u7f13\u89e3\u7b56\u7565", "upvotes": 0, "what_it_is": "\u672c\u6587\u9488\u5bf9\u6df1\u5ea6\u641c\u7d22\u573a\u666f\u4e2dLLM\u968f\u4e0a\u4e0b\u6587\u589e\u957f\u800c\u6027\u80fd\u9000\u5316\u7684\"\u4e0a\u4e0b\u6587\u8150\u5316\"\uff08context rot\uff09\u73b0\u8c61\uff0c\u7cfb\u7edf\u8bca\u65ad\u5176\u6210\u56e0\uff0c\u5e76\u63d0\u51fa\u4e0a\u4e0b\u6587\u7ba1\u7406\u4e0e\u62d2\u7edd\u91c7\u6837\u4e24\u7c7b\u7f13\u89e3\u65b9\u6cd5\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u5e76\u91cf\u5316\u957f\u4e0a\u4e0b\u6587\u641c\u7d22\u4e2d\u7684\u8150\u5316\u73b0\u8c61\uff0c\u63d0\u4f9b\u4e86\u53ef\u64cd\u4f5c\u7684\u8bca\u65ad\u6846\u67b6\u4e0e\u591a\u7b56\u7565\u7f13\u89e3\u65b9\u6848\uff0c\u5bf9RAG\u3001\u6df1\u5ea6\u641c\u7d22\u7b49\u5b9e\u9645\u5e94\u7528\u5177\u6709\u76f4\u63a5\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "We present DreamForge-World 0.1 Preview, a preview foundational world model for real-time interactive world simulation. The system adapts the LongLive 1 autoregressive video stack, itself derived from Wan2.1-T2V-1.3B, with a residual action pathway inspired by the Matrix-Game family. DreamForge-World 0.1 Preview focuses on a complementary axis to frontier-scale world simulators: low-compute adaptation, consumer-GPU runtime, and broad interactive capability coverage. It supports live keyboard and mouse control, multimodal initialization, mid-stream reprompting, dual-view operation, and minute-scale interactive rollouts at native 480p resolution, reaching up to 14 to 15 FPS FPS on a single RTX 4090 with a low memory footprint. By leveraging open video backbones and applying targeted adaptation runs, we build the preview system with high cost-efficiency. DF-World 0.1 Preview is not yet a memory-complete or frontier-quality world simulator, but demonstrates a practical low-compute route toward real-time controllable world-model previews on consumer GPUs.", "arxiv_id": "2606.30292", "arxiv_url": "https://arxiv.org/abs/2606.30292", "authors": ["Daniyel Ayupov", "Artur Markov-Tsoy"], "brief": "DreamForge-World 0.1\u662f\u4e00\u4e2a\u9762\u5411\u5b9e\u65f6\u4ea4\u4e92\u4e16\u754c\u6a21\u62df\u7684\u57fa\u7840\u4e16\u754c\u6a21\u578b\uff0c\u57fa\u4e8eLongLive 1\u81ea\u56de\u5f52\u89c6\u9891\u6846\u67b6\u6539\u9020\uff0c\u5728\u5355\u5f20RTX 4090\u4e0a\u4ee5480p\u5206\u8fa8\u7387\u5b9e\u73b014-15 FPS\u7684\u5b9e\u65f6\u53ef\u63a7\u4e16\u754c\u6a21\u62df\u3002", "categories": ["cs.LG", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30292", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u57fa\u4e8eWan2.1-T2V-1.3B\u884d\u751f\u7684LongLive 1\u89c6\u9891\u6808\uff0c\u5f15\u5165Matrix-Game\u98ce\u683c\u7684\u6b8b\u5dee\u52a8\u4f5c\u8def\u5f84\u5b9e\u73b0\u52a8\u4f5c\u63a7\u5236", "\u652f\u6301\u952e\u76d8\u9f20\u6807\u5b9e\u65f6\u63a7\u5236\u3001\u591a\u6a21\u6001\u521d\u59cb\u5316\u3001\u6d41\u4e2d\u91cd\u63d0\u793a\u3001\u53cc\u89c6\u89d2\u64cd\u4f5c\uff0c\u5206\u949f\u7ea7\u4ea4\u4e92\u5c55\u5f00", "\u5355RTX 4090\u4f4e\u663e\u5b58\u8fd0\u884c\uff0c\u6700\u9ad814-15 FPS\uff0c\u805a\u7126\u4f4e\u7b97\u529b\u6d88\u8d39\u7ea7GPU\u90e8\u7f72\u8def\u7ebf"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u89c6\u9891\u751f\u6210", "\u5b9e\u65f6\u4ea4\u4e92", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30292v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DreamForge-World 0.1 Preview: A Low-Compute Real-Time Controllable World Model", "tldr": "\u4f4e\u7b97\u529b\u6d88\u8d39\u7ea7GPU\u53ef\u5b9e\u65f6\u8fd0\u884c\u7684\u53ef\u63a7\u4e16\u754c\u6a21\u578b\uff0c\u652f\u6301\u952e\u9f20\u4ea4\u4e92\u4e0e\u591a\u6a21\u6001\u521d\u59cb\u5316", "upvotes": 0, "what_it_is": "DreamForge-World 0.1\u662f\u4e00\u4e2a\u9762\u5411\u5b9e\u65f6\u4ea4\u4e92\u4e16\u754c\u6a21\u62df\u7684\u57fa\u7840\u4e16\u754c\u6a21\u578b\uff0c\u57fa\u4e8eLongLive 1\u81ea\u56de\u5f52\u89c6\u9891\u6846\u67b6\u6539\u9020\uff0c\u5728\u5355\u5f20RTX 4090\u4e0a\u4ee5480p\u5206\u8fa8\u7387\u5b9e\u73b014-15 FPS\u7684\u5b9e\u65f6\u53ef\u63a7\u4e16\u754c\u6a21\u62df\u3002", "why_notable": "\u5f53\u524d\u4e3b\u6d41\u4e16\u754c\u6a21\u578b\u666e\u904d\u4f9d\u8d56\u5927\u89c4\u6a21\u7b97\u529b\uff0c\u8be5\u5de5\u4f5c\u63a2\u7d22\u4e86\u4f4e\u6210\u672c\u6d88\u8d39\u7ea7GPU\u4e0a\u7684\u5b9e\u65f6\u53ef\u63a7\u4e16\u754c\u6a21\u578b\u5b9e\u73b0\u8def\u5f84\uff0c\u5bf9\u6e38\u620fAI\u3001\u5177\u8eab\u667a\u80fd\u7b49\u5e94\u7528\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u5f00\u6e90\u89c6\u9891\u9aa8\u5e72\u7684\u9ad8\u6548\u9002\u914d\u65b9\u6cd5\u5177\u6709\u53c2\u8003\u610f\u4e49\u3002"}, {"abstract": "A growing body of work suggests that the reasoning capabilities of large language models are largely latent in their base form, with post-training primarily amplifying rather than introducing them. However, this evidence comes mainly from mathematical and coding benchmarks, leaving the boundary conditions of that claim largely unexplored, namely which cognitive tasks can be recovered through elicitation and where that recovery fails. To investigate this, we introduce NeuReasoner, a theory-grounded elicitation instrument. At each step, an orchestrator pairs a Neuro Lens, inspired by functional specificity, with a Cognitive Lens, drawn from the Erotetic Theory of Reasoning, and integrates their outputs through internal modularization of a single model, without external tools. We evaluate NeuReasoner on CogBench, a suite of behavioral tasks from cognitive psychology, alongside standard mathematical and coding benchmarks, measuring both its improvement over vanilla inference and its ability to match a model\u0027s post-trained thinking mode. At sufficient scale, NeuReasoner matches or exceeds thinking-mode baselines on arithmetic reasoning, code generation, Bayesian reasoning, and reward learning; these gains persist against self-consistency and iterative-refinement baselines matched to NeuReasoner\u0027s per-decision call budget. Using NeuReasoner allows us to find clear boundaries: risk-taking and decision making under uncertainty remains hard to recover through elicitation alone, and model scale interacts with elicitation in both directions: widening its advantage on some cognitive signatures while erasing it on others. Overall, through NeuReasoner as a modular, interpretable, theory-grounded elicitation instrument, we empirically map where reasoning elicitation succeeds and fails, beyond the mathematical and coding benchmarks where prior claims have rested.", "arxiv_id": "2606.29971", "arxiv_url": "https://arxiv.org/abs/2606.29971", "authors": ["Aydin Javadov", "Shyngys Aitkazinov", "Tobias Hoesli", "Florian von Wangenheim", "Bjoern Schuller", "Joseph Ollier"], "brief": "\u63d0\u51faNeuReasoner\u2014\u2014\u4e00\u79cd\u7ed3\u5408\u795e\u7ecf\u900f\u955c\uff08\u529f\u80fd\u7279\u5f02\u6027\uff09\u4e0e\u8ba4\u77e5\u900f\u955c\uff08\u95ee\u9898\u63a8\u7406\u7406\u8bba\uff09\u7684\u6a21\u5757\u5316\u63a8\u7406\u5f15\u5bfc\u6846\u67b6\uff0c\u65e0\u9700\u5916\u90e8\u5de5\u5177\u5373\u53ef\u5728\u5355\u6a21\u578b\u5185\u6fc0\u6d3b\u6f5c\u5728\u63a8\u7406\u80fd\u529b\uff0c\u5e76\u5728\u8ba4\u77e5\u5fc3\u7406\u5b66\u884c\u4e3a\u4efb\u52a1\u96c6CogBench\u4e0a\u7cfb\u7edf\u8bc4\u4f30\u63a8\u7406\u5f15\u5bfc\u7684\u6210\u529f\u4e0e\u5931\u8d25\u8fb9\u754c\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29971", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5728\u7b97\u672f\u63a8\u7406\u3001\u4ee3\u7801\u751f\u6210\u3001\u8d1d\u53f6\u65af\u63a8\u7406\u548c\u5956\u52b1\u5b66\u4e60\u4efb\u52a1\u4e0a\uff0cNeuReasoner\u5728\u8db3\u591f\u89c4\u6a21\u4e0b\u53ef\u5339\u914d\u6216\u8d85\u8d8a\u540e\u8bad\u7ec3\u601d\u7ef4\u6a21\u5f0f\u57fa\u7ebf", "\u53d1\u73b0\u660e\u786e\u7684\u5931\u8d25\u8fb9\u754c\uff1a\u98ce\u9669\u51b3\u7b56\u4e0e\u4e0d\u786e\u5b9a\u6027\u4e0b\u7684\u51b3\u7b56\u5236\u5b9a\u4ec5\u9760\u5f15\u5bfc\u96be\u4ee5\u6062\u590d", "\u6a21\u578b\u89c4\u6a21\u4e0e\u5f15\u5bfc\u6548\u679c\u5b58\u5728\u53cc\u5411\u4ea4\u4e92\uff1a\u5728\u67d0\u4e9b\u8ba4\u77e5\u7ef4\u5ea6\u6269\u5927\u4f18\u52bf\uff0c\u5728\u53e6\u4e00\u4e9b\u7ef4\u5ea6\u5219\u6d88\u9664\u4f18\u52bf"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u80fd\u529b", "\u8ba4\u77e5\u8bc4\u4f30", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29971v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "NeuReasoner: Theory-grounded Mapping of Reasoning Elicitation Boundaries", "tldr": "NeuReasoner\u901a\u8fc7\u7406\u8bba\u9a71\u52a8\u7684\u5f15\u5bfc\u6846\u67b6\uff0c\u7cfb\u7edf\u63a2\u7d22\u5927\u6a21\u578b\u63a8\u7406\u80fd\u529b\u7684\u8fb9\u754c\u6761\u4ef6", "upvotes": 0, "what_it_is": "\u63d0\u51faNeuReasoner\u2014\u2014\u4e00\u79cd\u7ed3\u5408\u795e\u7ecf\u900f\u955c\uff08\u529f\u80fd\u7279\u5f02\u6027\uff09\u4e0e\u8ba4\u77e5\u900f\u955c\uff08\u95ee\u9898\u63a8\u7406\u7406\u8bba\uff09\u7684\u6a21\u5757\u5316\u63a8\u7406\u5f15\u5bfc\u6846\u67b6\uff0c\u65e0\u9700\u5916\u90e8\u5de5\u5177\u5373\u53ef\u5728\u5355\u6a21\u578b\u5185\u6fc0\u6d3b\u6f5c\u5728\u63a8\u7406\u80fd\u529b\uff0c\u5e76\u5728\u8ba4\u77e5\u5fc3\u7406\u5b66\u884c\u4e3a\u4efb\u52a1\u96c6CogBench\u4e0a\u7cfb\u7edf\u8bc4\u4f30\u63a8\u7406\u5f15\u5bfc\u7684\u6210\u529f\u4e0e\u5931\u8d25\u8fb9\u754c\u3002", "why_notable": "\u9996\u6b21\u5c06\u8ba4\u77e5\u5fc3\u7406\u5b66\u884c\u4e3a\u4efb\u52a1\u5f15\u5165\u63a8\u7406\u5f15\u5bfc\u8bc4\u4f30\uff0c\u7a81\u7834\u6570\u5b66/\u4ee3\u7801\u57fa\u51c6\u7684\u5c40\u9650\uff0c\u7cfb\u7edf\u7ed8\u5236LLM\u63a8\u7406\u5f15\u5bfc\u7684\u80fd\u529b\u8fb9\u754c\u56fe\u8c31\uff0c\u5bf9\u7406\u89e3\u6a21\u578b\u63a8\u7406\u672c\u8d28\u5177\u6709\u91cd\u8981\u7406\u8bba\u4ef7\u503c"}, {"abstract": "Large language models (LLMs) are increasingly used as rerankers in recommender systems, with the expectation that semantic understanding will help in cold-start and long-tail regimes. We test this assumption with a five-domain benchmark that explicitly separates reranking quality from retrieval coverage. In a positive-controlled regime where the gold item is guaranteed present, calibrated LLM rerankers fail to consistently outperform strong collaborative and content baselines under natural traffic, and within-family scaling from Qwen3-8B to Qwen3-32B narrows but does not close the gap on most domains. In a retrieval-realistic regime where the gold item is not injected, the bottleneck is more severe: standard single retrievers place the gold item in a 200-item pool only 4.6-22.9% of the time, largely because 32-91% of cold-start targets are brand-new items with no training interactions. We introduce LHF, a validation-trained learned hybrid fusion layer over a multi-retriever union pool, as a retrieval-side realizability baseline. LHF is the only combiner we test that beats every single retriever on all five domains and recovers 17-61% of oracle coverage headroom on content-rich domains, but only 5-7% on collaboratively strong domains. End-to-end experiments reveal the remaining mismatch: learned non-LLM ranking exploits the LHF pool, while prompt-level LLM reranking often degrades it. LLMs exhibit pockets of semantic cold-start advantage, especially in text-rich domains when the item is already present, but this advantage is largely unreachable in current retrieve-then-rerank pipelines. We release the benchmark protocol, splits, prompts, evaluation tooling, and archived reproducibility artifacts: data at https://doi.org/10.5281/zenodo.20991039 and code at https://doi.org/10.5281/zenodo.20993306.", "arxiv_id": "2606.29947", "arxiv_url": "https://arxiv.org/abs/2606.29947", "authors": ["Zhe Dong", "Fang Qin", "Manish Shah", "Yicheng Wang"], "brief": "\u672c\u6587\u901a\u8fc7\u4e94\u9886\u57df\u57fa\u51c6\u6d4b\u8bd5\uff0c\u7cfb\u7edf\u8bca\u65ad\u4e86\u57fa\u4e8eLLM\u7684\u51b7\u542f\u52a8\u63a8\u8350\u7cfb\u7edf\u4e2d\u68c0\u7d22\u74f6\u9888\u95ee\u9898\uff0c\u5e76\u63d0\u51faLHF\uff08\u5b66\u4e60\u6df7\u5408\u878d\u5408\u5c42\uff09\u4f5c\u4e3a\u591a\u68c0\u7d22\u5668\u878d\u5408\u65b9\u6848\u6765\u63d0\u5347\u5019\u9009\u6c60\u8986\u76d6\u7387\u3002", "categories": ["cs.IR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.29947", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5728\u771f\u5b9e\u68c0\u7d22\u573a\u666f\u4e0b\uff0c\u6807\u51c6\u5355\u68c0\u7d22\u5668\u4ec5\u80fd\u5c06\u76ee\u6807\u7269\u54c1\u7eb3\u5165200\u5019\u9009\u6c60\u7684\u6982\u7387\u4e3a4.6%-22.9%\uff0c32%-91%\u7684\u51b7\u542f\u52a8\u76ee\u6807\u662f\u5168\u65b0\u7269\u54c1", "\u63d0\u51faLHF\uff08\u9a8c\u8bc1\u96c6\u8bad\u7ec3\u7684\u5b66\u4e60\u6df7\u5408\u878d\u5408\u5c42\uff09\uff0c\u662f\u552f\u4e00\u5728\u5168\u90e8\u4e94\u4e2a\u9886\u57df\u5747\u8d85\u8d8a\u5355\u68c0\u7d22\u5668\u7684\u65b9\u6848\uff0c\u5728\u5185\u5bb9\u4e30\u5bcc\u9886\u57df\u53ef\u6062\u590d17%-61%\u7684oracle\u8986\u76d6\u7387\u4e0a\u9650", "LLM\u91cd\u6392\u5668\uff08\u542bQwen3-8B\u523032B\u89c4\u6a21\u6269\u5c55\uff09\u5728\u81ea\u7136\u6d41\u91cf\u4e0b\u65e0\u6cd5\u7a33\u5b9a\u8d85\u8d8a\u534f\u540c\u8fc7\u6ee4\u548c\u5185\u5bb9\u57fa\u7ebf\uff0c\u4e14\u5728LHF\u5019\u9009\u6c60\u4e0a\u5f80\u5f80\u53cd\u800c\u964d\u4f4e\u6027\u80fd"], "keywords": ["\u63a8\u8350\u7cfb\u7edf", "\u5927\u8bed\u8a00\u6a21\u578b", "\u51b7\u542f\u52a8", "\u4fe1\u606f\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.29947v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Diagnosing and Mitigating Retrieval Bottlenecks in LLM-Based Cold-Start Recommendation", "tldr": "LLM\u91cd\u6392\u5668\u5728\u51b7\u542f\u52a8\u63a8\u8350\u4e2d\u7684\u74f6\u9888\u8bca\u65ad\uff1a\u68c0\u7d22\u8986\u76d6\u7387\u624d\u662f\u6838\u5fc3\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7\u4e94\u9886\u57df\u57fa\u51c6\u6d4b\u8bd5\uff0c\u7cfb\u7edf\u8bca\u65ad\u4e86\u57fa\u4e8eLLM\u7684\u51b7\u542f\u52a8\u63a8\u8350\u7cfb\u7edf\u4e2d\u68c0\u7d22\u74f6\u9888\u95ee\u9898\uff0c\u5e76\u63d0\u51faLHF\uff08\u5b66\u4e60\u6df7\u5408\u878d\u5408\u5c42\uff09\u4f5c\u4e3a\u591a\u68c0\u7d22\u5668\u878d\u5408\u65b9\u6848\u6765\u63d0\u5347\u5019\u9009\u6c60\u8986\u76d6\u7387\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u533a\u5206\u91cd\u6392\u8d28\u91cf\u4e0e\u68c0\u7d22\u8986\u76d6\u7387\u4e24\u4e2a\u74f6\u9888\uff0c\u63ed\u793aLLM\u8bed\u4e49\u4f18\u52bf\u5728\u5f53\u524d\u68c0\u7d22-\u91cd\u6392\u6d41\u6c34\u7ebf\u4e2d\u57fa\u672c\u65e0\u6cd5\u53d1\u6325\uff0c\u5e76\u5f00\u6e90\u5b8c\u6574\u57fa\u51c6\u534f\u8bae\u4e0e\u590d\u73b0\u5de5\u5177\uff0c\u5bf9\u63a8\u8350\u7cfb\u7edf\u5b9e\u8df5\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Large multimodal models have achieved strong reasoning on complex visual tasks, but their inference efficiency is often restricted by long chains of thought. A promising solution is to pair a small draft model with a large target model, enabling cooperative inference employing a routing signal that adaptively routes queries to either the draft or target model based on their difficulties for optimal efficiency and accuracy. Yet, the remaining bottleneck is to establish a reliable query difficulty signal under multimodal settings. Existing approaches designed for language models either rely on post-hoc token probabilities, which fall short in multimodal scenarios, or depend on supervised fine-tuning, which is a data-sensitive strategy. Both paradigms perform routing only after a complete output, and ignore whether the target model can actually solve the routed instances. To address this, we propose PRP, a Proactive Routing Paradigm that enables early decision-making by jointly evaluating the competence of both the draft and target models. Our Draft Rating Learning (DRL) equips the draft model with an internal confidence estimator, while Joint Rating Learning (JRL) predicts how well the target model can handle a given query, thereby prioritizing the allocation of samples it excels at rather than the hardest ones. These ratings enable fine-grained, instance-level \\textbf{Proactive Routing} and substantially accelerate inference without compromising overall performance. Extensive experiments across multiple multimodal reasoning benchmarks validate our effectiveness and efficiency.", "arxiv_id": "2606.30217", "arxiv_url": "https://arxiv.org/abs/2606.30217", "authors": ["Yinan Zhou", "Haokun Lin", "Yichen Wu", "Caifeng Shan", "Zhenan Sun", "Yuxin Chen", "Teng Wang", "Chen Ma", "Li Zhu", "Ying Shan"], "brief": "\u63d0\u51faPRP\uff08Proactive Routing Paradigm\uff09\uff0c\u901a\u8fc7\u8054\u5408\u8bc4\u4f30\u8349\u7a3f\u6a21\u578b\u548c\u76ee\u6807\u6a21\u578b\u7684\u80fd\u529b\uff0c\u5728\u751f\u6210\u5b8c\u6574\u8f93\u51fa\u4e4b\u524d\u5c31\u505a\u51fa\u8def\u7531\u51b3\u7b56\uff0c\u5c06\u89c6\u89c9\u63a8\u7406\u67e5\u8be2\u81ea\u9002\u5e94\u5206\u914d\u7ed9\u5c0f\u6a21\u578b\u6216\u5927\u6a21\u578b\uff0c\u517c\u987e\u6548\u7387\u4e0e\u51c6\u786e\u6027\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30217", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["Draft Rating Learning\uff08DRL\uff09\u4e3a\u5c0f\u6a21\u578b\u914d\u5907\u5185\u90e8\u7f6e\u4fe1\u5ea6\u4f30\u8ba1\u5668\uff0c\u8bc4\u4f30\u81ea\u8eab\u5904\u7406\u80fd\u529b", "Joint Rating Learning\uff08JRL\uff09\u9884\u6d4b\u5927\u6a21\u578b\u5bf9\u7ed9\u5b9a\u67e5\u8be2\u7684\u89e3\u51b3\u80fd\u529b\uff0c\u4f18\u5148\u5206\u914d\u5176\u64c5\u957f\u7684\u6837\u672c\u800c\u975e\u6700\u96be\u7684\u6837\u672c", "\u8def\u7531\u51b3\u7b56\u5728\u8f93\u51fa\u5b8c\u6210\u524d\u63d0\u524d\u505a\u51fa\uff0c\u907f\u514d\u4e86\u540e\u9a8ctoken\u6982\u7387\u65b9\u6cd5\u5728\u591a\u6a21\u6001\u573a\u666f\u4e0b\u7684\u5931\u6548\u95ee\u9898\uff0c\u65e0\u9700\u5927\u91cf\u76d1\u7763\u5fae\u8c03\u6570\u636e"], "keywords": ["\u591a\u6a21\u6001", "\u63a8\u7406\u52a0\u901f", "\u6a21\u578b\u8def\u7531", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30217v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Before Thinking, Learn to Decide: Proactive Routing for Efficient Visual Reasoning", "tldr": "\u63d0\u51faPRP\u4e3b\u52a8\u8def\u7531\u8303\u5f0f\uff0c\u5728\u63a8\u7406\u524d\u9884\u5224\u67e5\u8be2\u96be\u5ea6\uff0c\u9ad8\u6548\u5206\u914d\u89c6\u89c9\u63a8\u7406\u4efb\u52a1\u7ed9\u5927\u5c0f\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51faPRP\uff08Proactive Routing Paradigm\uff09\uff0c\u901a\u8fc7\u8054\u5408\u8bc4\u4f30\u8349\u7a3f\u6a21\u578b\u548c\u76ee\u6807\u6a21\u578b\u7684\u80fd\u529b\uff0c\u5728\u751f\u6210\u5b8c\u6574\u8f93\u51fa\u4e4b\u524d\u5c31\u505a\u51fa\u8def\u7531\u51b3\u7b56\uff0c\u5c06\u89c6\u89c9\u63a8\u7406\u67e5\u8be2\u81ea\u9002\u5e94\u5206\u914d\u7ed9\u5c0f\u6a21\u578b\u6216\u5927\u6a21\u578b\uff0c\u517c\u987e\u6548\u7387\u4e0e\u51c6\u786e\u6027\u3002", "why_notable": "\u73b0\u6709\u8def\u7531\u65b9\u6cd5\u5747\u5728\u5b8c\u6574\u8f93\u51fa\u540e\u624d\u505a\u51b3\u7b56\uff0c\u4e14\u591a\u6a21\u6001\u573a\u666f\u4e0b\u540e\u9a8c\u6982\u7387\u4fe1\u53f7\u4e0d\u53ef\u9760\uff1bPRP\u9996\u6b21\u5b9e\u73b0\u591a\u6a21\u6001\u63a8\u7406\u7684\u4e3b\u52a8\u5f0f\u3001\u5b9e\u4f8b\u7ea7\u65e9\u671f\u8def\u7531\uff0c\u5728\u591a\u4e2a\u591a\u6a21\u6001\u63a8\u7406\u57fa\u51c6\u4e0a\u663e\u8457\u52a0\u901f\u63a8\u7406\u540c\u65f6\u4fdd\u6301\u6027\u80fd\u3002"}, {"abstract": "Current multimodal fusion approaches, particularly those based on static Mixture-of-Experts (MoE) architectures, often struggle to provide the adaptive and efficient collaborative reasoning required by complex real-world applications. We introduce the Dynamic Agent-based Interaction Network (DAIN), which reconceptualizes multimodal fusion as a dynamic, multi-agent collaborative process. DAIN employs a context-aware Meta-Controller that dynamically schedules sparse activation of specialized interaction agents and orchestrates compressed inter-agent communication for consensus-building. The framework is guided by a multi-objective loss function that jointly optimizes task accuracy, agent specialization, and operational efficiency through sparse activation and communication regularization. Comprehensive evaluations across five diverse benchmarks -- ADNI, MIMIC-IV, MM-IMDB, CMU-MOSI, and ENRICO -- establish DAIN as a new state-of-the-art, delivering significant performance improvements including a 2.6\\% accuracy gain on ADNI. Ablation studies verify the critical roles of both dynamic scheduling and agent communication. Furthermore, DAIN offers enhanced interpretability by exposing context-dependent agent roles and collaboration patterns while maintaining computational efficiency through sample-wise sparse agent activation. Our work demonstrates the promise of dynamic, agent-based paradigms for multimodal reasoning.", "arxiv_id": "2606.30189", "arxiv_url": "https://arxiv.org/abs/2606.30189", "authors": ["Xinxin Chen", "Yuchen Li", "Zihan Wang", "Haoyu Zhang", "Ruixin Liu", "Mingyuan Zhao"], "brief": "\u63d0\u51fa\u52a8\u6001\u667a\u80fd\u4f53\u4ea4\u4e92\u7f51\u7edcDAIN\uff0c\u5c06\u591a\u6a21\u6001\u878d\u5408\u91cd\u6784\u4e3a\u52a8\u6001\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u8fc7\u7a0b\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u611f\u77e5\u7684\u5143\u63a7\u5236\u5668\u52a8\u6001\u8c03\u5ea6\u7a00\u758f\u6fc0\u6d3b\u7684\u4e13\u4e1a\u4ea4\u4e92\u667a\u80fd\u4f53\uff0c\u5e76\u534f\u8c03\u538b\u7f29\u7684\u667a\u80fd\u4f53\u95f4\u901a\u4fe1\u4ee5\u8fbe\u6210\u5171\u8bc6\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.30189", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["Meta-Controller\u52a8\u6001\u8c03\u5ea6\u7a00\u758f\u6fc0\u6d3b\uff0c\u907f\u514d\u9759\u6001MoE\u7684\u56fa\u5b9a\u8def\u7531\u5c40\u9650\uff0c\u5b9e\u73b0\u6837\u672c\u7ea7\u81ea\u9002\u5e94\u6fc0\u6d3b", "\u591a\u76ee\u6807\u635f\u5931\u51fd\u6570\u8054\u5408\u4f18\u5316\u4efb\u52a1\u7cbe\u5ea6\u3001\u667a\u80fd\u4f53\u4e13\u4e1a\u5316\u548c\u8fd0\u7b97\u6548\u7387\uff08\u7a00\u758f\u6fc0\u6d3b+\u901a\u4fe1\u6b63\u5219\u5316\uff09", "\u5728ADNI\u3001MIMIC-IV\u3001MM-IMDB\u7b495\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0cADNI\u51c6\u786e\u7387\u63d0\u53472.6%"], "keywords": ["\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u6df7\u5408\u4e13\u5bb6", "\u591a\u6a21\u6001\u878d\u5408"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.30189v1", "published_at": "2026-06-29", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DAIN: Dynamic Agent-Based Interaction Network for Efficient and Collaborative Multimodal Reasoning", "tldr": "DAIN\u7528\u52a8\u6001\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7f51\u7edc\u66ff\u4ee3\u9759\u6001MoE\uff0c\u5b9e\u73b0\u9ad8\u6548\u591a\u6a21\u6001\u878d\u5408\u63a8\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u52a8\u6001\u667a\u80fd\u4f53\u4ea4\u4e92\u7f51\u7edcDAIN\uff0c\u5c06\u591a\u6a21\u6001\u878d\u5408\u91cd\u6784\u4e3a\u52a8\u6001\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u8fc7\u7a0b\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u611f\u77e5\u7684\u5143\u63a7\u5236\u5668\u52a8\u6001\u8c03\u5ea6\u7a00\u758f\u6fc0\u6d3b\u7684\u4e13\u4e1a\u4ea4\u4e92\u667a\u80fd\u4f53\uff0c\u5e76\u534f\u8c03\u538b\u7f29\u7684\u667a\u80fd\u4f53\u95f4\u901a\u4fe1\u4ee5\u8fbe\u6210\u5171\u8bc6\u3002", "why
