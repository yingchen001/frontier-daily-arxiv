agents (Claude Code, OpenAI Codex CLI) so the comparison spans both regime and agent-design axes. Across the four resulting (regime, agent) cells, restricting the agent to a single execute_code MCP tool is cheaper than -- or statistically tied with -- its cheapest tool-rich rival in three cells (significantly on Artifact/Claude and SWE-bench/Codex; directionally on Artifact/Codex), with pass rates statistically tied within each cell. The lone exception is SWE-bench/Claude, where code_only is directionally costlier (+14.4%, not significant); a conditional-cost analysis localizes that gap to failure-cost on doomed-run trajectories, not a per-edit tax on successful runs. Two implications: the cheapest tool surface is jointly determined by task regime and agent design rather than by either axis alone, and the headline cost signal lives in cache-adjusted cost -- not pass rate, which is invariant across surfaces at the model sizes we evaluate. The benchmark harness, task suite, and analysis code are available at https://github.com/hyang0129/onlycodes.", "arxiv_id": "2607.10569", "arxiv_url": "https://arxiv.org/abs/2607.10569", "authors": ["Hong Yang", "Qi Yu", "Travis Desell"], "brief": "\u7814\u7a76\u5bf9\u6bd4\u4e86\u7f16\u7a0b\u667a\u80fd\u4f53\u4f7f\u7528\u4e0d\u540c\u5de5\u5177\uff08bash\u3001MCP\u4ee3\u7801\u6267\u884c\u7b49\uff09\u7684\u6548\u679c\uff0c\u53d1\u73b0\u9650\u5236\u667a\u80fd\u4f53\u4ec5\u4f7f\u7528\u5355\u4e00execute_code\u5de5\u5177\u5728\u5927\u591a\u6570\u573a\u666f\u4e0b\u6210\u672c\u66f4\u4f4e\u6216\u6301\u5e73\uff0c\u4f46\u6700\u4f18\u5de5\u5177\u9009\u62e9\u7531\u4efb\u52a1\u7c7b\u578b\u548c\u667a\u80fd\u4f53\u8bbe\u8ba1\u5171\u540c\u51b3\u5b9a\uff0c\u800c\u975e\u5355\u4e00\u56e0\u7d20\u3002", "categories": ["cs.SE", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10569", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u5de5\u5177\u8c03\u7528", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10569v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "When Does Restricting a Coding Agent to execute_code Help? A Regime $\\times$ Agent-Design Ablation", "tldr": "\u7814\u7a76\u5bf9\u6bd4\u4e86\u7f16\u7a0b\u667a\u80fd\u4f53\u4f7f\u7528\u4e0d\u540c\u5de5\u5177\uff08bash\u3001MCP\u4ee3\u7801\u6267\u884c\u7b49\uff09\u7684\u6548\u679c\uff0c\u53d1\u73b0\u9650\u5236\u667a\u80fd\u4f53\u4ec5\u4f7f\u7528\u5355\u4e00execute_code\u5de5\u5177\u5728\u5927\u591a\u6570\u573a\u666f\u4e0b\u6210\u672c\u66f4\u4f4e\u6216\u6301\u5e73\uff0c\u4f46\u6700\u4f18\u5de5\u5177\u9009\u62e9\u7531\u4efb\u52a1\u7c7b\u578b\u548c\u667a\u80fd\u4f53\u8bbe\u8ba1\u5171\u540c\u51b3\u5b9a\uff0c\u800c\u975e\u5355\u4e00\u56e0\u7d20\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "As multi-agent, tool-using LLM systems are deployed, a common safety net is a runtime monitor that checks each message, tool call, or step on its own. We show this net has a fundamental hole. A distributed backdoor splits a harmful payload across agents, so every local check passes while the assembled object is the attack. The monitor can be right on every step and still miss the attack. The problem is not splitting itself: split fragments can still leak suspicious tokens or provenance edges. The hard case is \\emph{local benignness}. No fragment carries the harm, and what is left looks like ordinary benign traffic. We formalize this as an \\emph{observability boundary}: a monitor catches only what its view can tell apart from benign traffic. We prove that once the fragments look benign in the monitored view, no detector on that view can catch them, however strong it is. Across a controlled testbed, an external benchmark, and end-to-end agent runs, local monitors lose the signal exactly as local evidence disappears, and it returns only when the monitor sees the assembled object. A monitor trained only on benign traffic recovers the attack\u0027s code structure across held-out encodings (0.874 mean AUROC). A decoded-view gate, given the encoding family, blocks every tested attack. But seeing more is not enough: full-trace monitors and decoders still fail unless they reach the representation where the payload is exposed. Local safety is not global safety when harm is compositional, and the open problem is finding that representation.", "arxiv_id": "2607.11751", "arxiv_url": "https://arxiv.org/abs/2607.11751", "authors": ["Yibo Hu", "Ren Wang"], "brief": "\u591a\u667a\u80fd\u4f53LLM\u7cfb\u7edf\u4e2d\uff0c\u5c06\u6709\u5bb3\u8f7d\u8377\u5206\u6563\u5230\u591a\u4e2a\u667a\u80fd\u4f53\u7247\u6bb5\u53ef\u7ed5\u8fc7\u9010\u6b65\u672c\u5730\u76d1\u63a7\uff0c\u56e0\u4e3a\u6bcf\u4e2a\u7247\u6bb5\u5355\u72ec\u770b\u90fd\u662f\u826f\u6027\u7684\u3002\u7814\u7a76\u5f62\u5f0f\u5316\u4e86\"\u53ef\u89c2\u6d4b\u6027\u8fb9\u754c\"\u6982\u5ff5\uff0c\u8bc1\u660e\u53ea\u8981\u7247\u6bb5\u5728\u76d1\u63a7\u89c6\u56fe\u4e2d\u770b\u8d77\u6765\u826f\u6027\uff0c\u4efb\u4f55\u672c\u5730\u68c0\u6d4b\u5668\u90fd\u65e0\u6cd5\u53d1\u73b0\u653b\u51fb\uff1b\u5b9e\u9a8c\u8868\u660e\u53ea\u6709\u5728\u7ec4\u88c5\u540e\u7684\u5bf9\u8c61\u5c42\u9762\u8fdb\u884c\u76d1\u63a7\u624d\u80fd\u6709\u6548\u68c0\u6d4b\uff0c\u5355\u72ec\u672c\u5730\u5b89\u5168\u4e0d\u7b49\u4e8e\u5168\u5c40\u5b89\u5168\u3002", "categories": ["cs.CR", "cs.LG", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11751", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u540e\u95e8\u653b\u51fb", "\u5b89\u5168\u76d1\u63a7", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11751v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "When Local Monitors Miss Compositional Harm: Diagnosing Distributed Backdoors in Multi-Agent Systems", "tldr": "\u591a\u667a\u80fd\u4f53LLM\u7cfb\u7edf\u4e2d\uff0c\u5c06\u6709\u5bb3\u8f7d\u8377\u5206\u6563\u5230\u591a\u4e2a\u667a\u80fd\u4f53\u7247\u6bb5\u53ef\u7ed5\u8fc7\u9010\u6b65\u672c\u5730\u76d1\u63a7\uff0c\u56e0\u4e3a\u6bcf\u4e2a\u7247\u6bb5\u5355\u72ec\u770b\u90fd\u662f\u826f\u6027\u7684\u3002\u7814\u7a76\u5f62\u5f0f\u5316\u4e86\"\u53ef\u89c2\u6d4b\u6027\u8fb9\u754c\"\u6982\u5ff5\uff0c\u8bc1\u660e\u53ea\u8981\u7247\u6bb5\u5728\u76d1\u63a7\u89c6\u56fe\u4e2d\u770b\u8d77\u6765\u826f\u6027\uff0c\u4efb\u4f55\u672c\u5730\u68c0\u6d4b\u5668\u90fd\u65e0\u6cd5\u53d1\u73b0\u653b\u51fb\uff1b\u5b9e\u9a8c\u8868\u660e\u53ea\u6709\u5728\u7ec4\u88c5\u540e\u7684\u5bf9\u8c61\u5c42\u9762\u8fdb\u884c\u76d1\u63a7\u624d\u80fd\u6709\u6548\u68c0\u6d4b\uff0c\u5355\u72ec\u672c\u5730\u5b89\u5168\u4e0d\u7b49\u4e8e\u5168\u5c40\u5b89\u5168\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) optimizes LLMs using sparse verifiable final-answer rewards. This sparse anchor reliably verifies whether a trajectory succeeds but provides no direct feedback on the reasoning path that produced it. Before success, prerequisite progress on hard problems receives no reward signal; after success, outcome rewards cannot distinguish well-organized correct trajectories from redundant or locally flawed ones. We introduce SCOPE-RL (Scaffolded Chain Optimization with Process Efficiency), a two-stage framework that densifies this anchor while retaining the GRPO update: Adaptive Scaffolded RL adds prefix-decomposed verifiable rewards on answer-hidden sub-question chains before success, and Quality-Aware Process RL applies correctness-gated process-shape rewards to refine correct trajectories after success. An expert-validated Step-Quality Evaluation Protocol evaluates useful-step density, error localization, and token efficiency beyond final-answer accuracy. On Qwen3-8B-Instruct trained on DAPO-Math and Big-Math, SCOPE-RL improves average accuracy by up to 11.2 pp and reduces reasoning tokens by up to 27.1% over outcome-only GRPO; the gains hold under GSPO and on Qwen3-0.6B-Instruct, indicating that reward-signal densification is complementary to policy-update-level RLVR advances. Code and data are available at https://github.com/tokencraft-lab/SCOPE-RL.", "arxiv_id": "2607.11506", "arxiv_url": "https://arxiv.org/abs/2607.11506", "authors": ["Xiaojian Liu", "Han Xu", "Jianqiang Xia", "Zhixuan Li", "Ke Xu", "Yiwei Dai", "Xinran Chen", "Changwo Wu", "Yuchen Li"], "brief": "\u63d0\u51faSCOPE-RL\u4e24\u9636\u6bb5\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u6210\u529f\u524d\u6dfb\u52a0\u5b50\u95ee\u9898\u5206\u89e3\u5956\u52b1\u3001\u6210\u529f\u540e\u65bd\u52a0\u8fc7\u7a0b\u8d28\u91cf\u5956\u52b1\uff0c\u89e3\u51b3RLVR\u4e2d\u7a00\u758f\u5956\u52b1\u65e0\u6cd5\u4f18\u5316\u63a8\u7406\u8def\u5f84\u7684\u95ee\u9898\u3002\u5728Qwen3-8B\u4e0a\u5e73\u5747\u51c6\u786e\u7387\u63d0\u534711.2\u4e2a\u767e\u5206\u70b9\uff0c\u63a8\u7406token\u6570\u51cf\u5c1127.1%\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11506", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u4f18\u5316", "\u8fc7\u7a0b\u5956\u52b1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11506v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SCOPE-RL: Optimizing Reasoning Paths Before and After Success", "tldr": "\u63d0\u51faSCOPE-RL\u4e24\u9636\u6bb5\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u6210\u529f\u524d\u6dfb\u52a0\u5b50\u95ee\u9898\u5206\u89e3\u5956\u52b1\u3001\u6210\u529f\u540e\u65bd\u52a0\u8fc7\u7a0b\u8d28\u91cf\u5956\u52b1\uff0c\u89e3\u51b3RLVR\u4e2d\u7a00\u758f\u5956\u52b1\u65e0\u6cd5\u4f18\u5316\u63a8\u7406\u8def\u5f84\u7684\u95ee\u9898\u3002\u5728Qwen3-8B\u4e0a\u5e73\u5747\u51c6\u786e\u7387\u63d0\u534711.2\u4e2a\u767e\u5206\u70b9\uff0c\u63a8\u7406token\u6570\u51cf\u5c1127.1%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Machine learning progress is often attributed to scaling model size and dataset volume, yet the composition of data can be just as consequential. Empirical findings repeatedly show that combining datasets from different domains yields nontrivial interactions. For instance, adding code improves mathematical reasoning, while certain mixtures introduce interference that reduces model performance. We refer to these effects collectively as data synergy, where the contribution of multiple domains exceeds or falls short of the sum of their isolated contributions. In this work, we formalize and quantify data synergy in language model pretraining. Leveraging observational variation across open-weight LLMs with diverse pretraining mixtures, we estimate both direct domain-to-benchmark synergy (how one domain contributes to performance on another) and a second-order domain-domain synergy (capabilities that require co-occurrence of multiple domains). Our framework improves predictive accuracy over domain-agnostic scaling laws and recovers stable synergy estimates. We validate these estimates by training models on predicted optimal and predicted anti-optimal mixtures and confirm that our synergy estimates correctly predict performance rankings.", "arxiv_id": "2607.11052", "arxiv_url": "https://arxiv.org/abs/2607.11052", "authors": ["Kimia Hamidieh", "Lester Mackey", "David Alvarez-Melis"], "brief": "\u672c\u6587\u63d0\u51fa\u9886\u57df\u611f\u77e5\u7684\u7f29\u653e\u5b9a\u5f8b\u6846\u67b6\uff0c\u7528\u4e8e\u91cf\u5316\u8bed\u8a00\u6a21\u578b\u9884\u8bad\u7ec3\u4e2d\u7684\u6570\u636e\u534f\u540c\u6548\u5e94\uff08\u5982\u4ee3\u7801\u6570\u636e\u63d0\u5347\u6570\u5b66\u63a8\u7406\uff09\u3002\u901a\u8fc7\u5206\u6790\u5f00\u6e90LLM\u7684\u591a\u6837\u5316\u9884\u8bad\u7ec3\u6570\u636e\u914d\u6bd4\uff0c\u4f30\u8ba1\u9886\u57df\u95f4\u7684\u76f4\u63a5\u4e0e\u4e8c\u9636\u534f\u540c\u6548\u5e94\uff0c\u5e76\u9a8c\u8bc1\u8be5\u6846\u67b6\u80fd\u51c6\u786e\u9884\u6d4b\u6700\u4f18\u4e0e\u6700\u5dee\u6570\u636e\u6df7\u5408\u65b9\u6848\u7684\u6027\u80fd\u6392\u540d\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11052", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u7f29\u653e\u5b9a\u5f8b", "\u6570\u636e\u6df7\u5408", "\u9884\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11052v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Domain-Aware Scaling Laws Uncover Data Synergy", "tldr": "\u672c\u6587\u63d0\u51fa\u9886\u57df\u611f\u77e5\u7684\u7f29\u653e\u5b9a\u5f8b\u6846\u67b6\uff0c\u7528\u4e8e\u91cf\u5316\u8bed\u8a00\u6a21\u578b\u9884\u8bad\u7ec3\u4e2d\u7684\u6570\u636e\u534f\u540c\u6548\u5e94\uff08\u5982\u4ee3\u7801\u6570\u636e\u63d0\u5347\u6570\u5b66\u63a8\u7406\uff09\u3002\u901a\u8fc7\u5206\u6790\u5f00\u6e90LLM\u7684\u591a\u6837\u5316\u9884\u8bad\u7ec3\u6570\u636e\u914d\u6bd4\uff0c\u4f30\u8ba1\u9886\u57df\u95f4\u7684\u76f4\u63a5\u4e0e\u4e8c\u9636\u534f\u540c\u6548\u5e94\uff0c\u5e76\u9a8c\u8bc1\u8be5\u6846\u67b6\u80fd\u51c6\u786e\u9884\u6d4b\u6700\u4f18\u4e0e\u6700\u5dee\u6570\u636e\u6df7\u5408\u65b9\u6848\u7684\u6027\u80fd\u6392\u540d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Continual learning promises a language model that keeps acquiring knowledge after training, with each new fact written into its weights. Whether weight writes can support accumulation remains undecided. We follow invented facts written into Qwen3 models from creation through sequences of twenty to one hundred later writes, using held-out questions of five types, with the original model given the fact in its prompt as the reference. Across these experiments, the breadth of the training data determines the kind of knowledge created. Bare-statement training produces recitation, while diverse restatements reduce the recitation-to-use gap from 27.4 to 5.4 points without showing the model a conclusion. This difference carries into later writes: after twenty sequential writes, bare-statement facts retain 1% accuracy while facts written from broad study data retain 46%. We also find that facts can be behaviourally forgotten without being erased. Forgotten facts keep most of the log-probability added by their write, and under bare-statement training 70% of wrong answers about them contain the most recently written fact. The same writes barely degrade the model\u0027s use of facts in context, and a forgotten study fact supplied in the prompt recovers to 77-80% on its questions. These results describe knowledge that is stored but question-keyed: later writes redirect the questions that reached it. Damage to unrelated abilities tracks KL divergence from the original model, and the later writes cause interference regardless of how the earlier fact was stored. Broad data can create usable knowledge, and a frozen reference can preserve capability, but no intervention we tested, including those built on accurate local measurements of each write, keeps earlier facts reachable. When facts must be composed or survive later writes, the reliable channel is context rather than the weights.", "arxiv_id": "2607.11020", "arxiv_url": "https://arxiv.org/abs/2607.11020", "authors": ["Charles O\u0027Neill"], "brief": "\u7814\u7a76\u6301\u7eed\u5b66\u4e60\u80fd\u5426\u5c06\u65b0\u77e5\u8bc6\u5199\u5165\u8bed\u8a00\u6a21\u578b\u6743\u91cd\u5e76\u957f\u671f\u4fdd\u7559\u3002\u5b9e\u9a8c\u53d1\u73b0\uff0c\u591a\u6837\u5316\u8bad\u7ec3\u6570\u636e\u53ef\u5c06\u77e5\u8bc6\"\u80cc\u8bf5-\u5e94\u7528\"\u5dee\u8ddd\u4ece27.4\u964d\u81f35.4\u5206\uff0c\u4f46\u7ecf\u8fc720\u6b21\u987a\u5e8f\u5199\u5165\u540e\uff0c\u7b80\u5355\u9648\u8ff0\u8bad\u7ec3\u7684\u4e8b\u5b9e\u51c6\u786e\u7387\u4ec5\u52691%\uff0c\u800c\u591a\u6837\u5316\u8bad\u7ec3\u4fdd\u755946%\u3002\u7ed3\u8bba\u662f\u6743\u91cd\u5b58\u50a8\u7684\u77e5\u8bc6\u4f1a\u88ab\u540e\u7eed\u5199\u5165\"\u91cd\u5b9a\u5411\"\uff0c\u4e0a\u4e0b\u6587\uff08prompt\uff09\u6bd4\u6743\u91cd\u66f4\u53ef\u9760\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11020", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u5b58\u50a8", "\u707e\u96be\u6027\u9057\u5fd8"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11020v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Can a Language Model Learn Facts Continually in Its Weights?", "tldr": "\u7814\u7a76\u6301\u7eed\u5b66\u4e60\u80fd\u5426\u5c06\u65b0\u77e5\u8bc6\u5199\u5165\u8bed\u8a00\u6a21\u578b\u6743\u91cd\u5e76\u957f\u671f\u4fdd\u7559\u3002\u5b9e\u9a8c\u53d1\u73b0\uff0c\u591a\u6837\u5316\u8bad\u7ec3\u6570\u636e\u53ef\u5c06\u77e5\u8bc6\"\u80cc\u8bf5-\u5e94\u7528\"\u5dee\u8ddd\u4ece27.4\u964d\u81f35.4\u5206\uff0c\u4f46\u7ecf\u8fc720\u6b21\u987a\u5e8f\u5199\u5165\u540e\uff0c\u7b80\u5355\u9648\u8ff0\u8bad\u7ec3\u7684\u4e8b\u5b9e\u51c6\u786e\u7387\u4ec5\u52691%\uff0c\u800c\u591a\u6837\u5316\u8bad\u7ec3\u4fdd\u755946%\u3002\u7ed3\u8bba\u662f\u6743\u91cd\u5b58\u50a8\u7684\u77e5\u8bc6\u4f1a\u88ab\u540e\u7eed\u5199\u5165\"\u91cd\u5b9a\u5411\"\uff0c\u4e0a\u4e0b\u6587\uff08prompt\uff09\u6bd4\u6743\u91cd\u66f4\u53ef\u9760\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We introduce Sticky Jump Diffusions (SJDs), continuous-time Markov processes on $\\mathbb R^d$ whose discrete anchors are token embeddings. In forward time, anchors release their mass at a hazard rate and the released mass diffuses in the continuous ambient space; time reversal couples a score-driven SDE with a sticky jump kernel whose rate and destination are fixed by flux balance with the forward law. We estimate the score and the per-anchor reverse hazards from a single denoising classifier via Denoising Hazard Matching, the hazard analogue of denoising score matching, with simulation-free cross-entropy training. SJD recovers masked diffusion, continuous diffusion, and hybrid diffusion as limits. Its reversal explains features that each family treats as given: the mask of masked diffusion carries no evidence about the source token because the unsticking kernel of every anchor collapses to the same absorbing point; the terminal projection of continuous diffusion is required due to the absence of atoms in its forward marginal, without which flux balance yields no reverse jumps; and the update rules of hybrid diffusion (commit rate, destination, and drift) all follow from flux balance rather than from separate design. Beyond these limits, the unsticking kernel becomes a design space: a cross-position blending corrupts each position toward a blend of its neighbors\u0027 clean values or embeddings, turning dependency structure such as spatial locality or a constraint graph into an inductive bias of the corruption itself, and improves over the identity-kernel hybrid on CIFAR-10, Text8, and Sudoku.", "arxiv_id": "2607.10951", "arxiv_url": "https://arxiv.org/abs/2607.10951", "authors": ["Pascal Jutras-Dub\u00e9", "Patrick Pynadath", "Jeremy Lu", "Yuan Gao", "Ruqi Zhang"], "brief": "\u63d0\u51fa\u7c98\u6027\u8df3\u8dc3\u6269\u6563\uff08SJD\uff09\u6846\u67b6\uff0c\u5c06\u63a9\u7801\u6269\u6563\u3001\u8fde\u7eed\u6269\u6563\u548c\u6df7\u5408\u6269\u6563\u7edf\u4e00\u4e3a\u540c\u4e00\u8fde\u7eed\u65f6\u95f4\u9a6c\u5c14\u53ef\u592b\u8fc7\u7a0b\u7684\u7279\u6b8a\u6781\u9650\u60c5\u5f62\u3002\u901a\u8fc7\"\u53bb\u566a\u5371\u9669\u5339\u914d\"\u65b9\u6cd5\u4ece\u5355\u4e00\u5206\u7c7b\u5668\u4f30\u8ba1\u9006\u5411\u8fc7\u7a0b\uff0c\u5e76\u63ed\u793a\u5404\u7c7b\u6269\u6563\u6a21\u578b\u8bbe\u8ba1\u9009\u62e9\u80cc\u540e\u7684\u7edf\u4e00\u539f\u7406\u3002\u5728CIFAR-10\u3001Text8\u548cSudoku\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u4e86\u6846\u67b6\u7684\u6709\u6548\u6027\u3002", "categories": ["cs.LG", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10951", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u751f\u6210\u6a21\u578b", "\u63a9\u7801\u6269\u6563", "\u7edf\u4e00\u6846\u67b6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10951v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Sticky Jump Diffusions: A Unifying View of Masked, Continuous, and Hybrid Diffusion", "tldr": "\u63d0\u51fa\u7c98\u6027\u8df3\u8dc3\u6269\u6563\uff08SJD\uff09\u6846\u67b6\uff0c\u5c06\u63a9\u7801\u6269\u6563\u3001\u8fde\u7eed\u6269\u6563\u548c\u6df7\u5408\u6269\u6563\u7edf\u4e00\u4e3a\u540c\u4e00\u8fde\u7eed\u65f6\u95f4\u9a6c\u5c14\u53ef\u592b\u8fc7\u7a0b\u7684\u7279\u6b8a\u6781\u9650\u60c5\u5f62\u3002\u901a\u8fc7\"\u53bb\u566a\u5371\u9669\u5339\u914d\"\u65b9\u6cd5\u4ece\u5355\u4e00\u5206\u7c7b\u5668\u4f30\u8ba1\u9006\u5411\u8fc7\u7a0b\uff0c\u5e76\u63ed\u793a\u5404\u7c7b\u6269\u6563\u6a21\u578b\u8bbe\u8ba1\u9009\u62e9\u80cc\u540e\u7684\u7edf\u4e00\u539f\u7406\u3002\u5728CIFAR-10\u3001Text8\u548cSudoku\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u4e86\u6846\u67b6\u7684\u6709\u6548\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Quantization is a powerful strategy to build capable and resource-efficient large language models (LLMs) by reducing the bitwidth of the parameters. While quantized LLMs achieve state-of-the-art performance on unperturbed inputs using standard predictive metrics, their performance on perturbed inputs, measured using reliability metrics, remains underexplored, despite its importance for reliable deployment. To address this gap, we first conduct a comprehensive reliability evaluation of quantized LLMs consisting of three key components: (1) Uncertainty: We assess the trustworthiness of LLMs quantized to 2, 3, 4, and 8 bits using six different quantization methods, employing established uncertainty metrics. (2) Calibration: We assess how well-calibrated the uncertainty estimates of quantized models are across model scales and bit precisions. (3) Robustness: We design character-level and word-level input perturbations to evaluate the reliability of quantized models under semantically-preserving variations in the inputs that arise in real-world applications. Second, we characterize how reliability scales with the total number of model bits. Our study reveals that while the performance scales monotonically with the total number of bits, the reliability scalings are nonlinear. A reliability peak occurs for 4-bit quantized models, indicating that quantizing moderately sized models offers the best reliability-efficiency trade-off. Additionally, our empirical findings reveal that quantization enhances the robustness of LLMs to natural input perturbations.", "arxiv_id": "2607.10855", "arxiv_url": "https://arxiv.org/abs/2607.10855", "authors": ["Sirine Ayadi", "S\u00e1ndor Dar\u00f3czi", "Stephan G\u00fcnnemann", "Bertrand Charpentier"], "brief": "\u7cfb\u7edf\u8bc4\u4f30\u4e86\u91cf\u5316\u5927\u8bed\u8a00\u6a21\u578b\u5728\u4e0d\u786e\u5b9a\u6027\u3001\u6821\u51c6\u6027\u548c\u9c81\u68d2\u6027\u4e09\u4e2a\u7ef4\u5ea6\u7684\u53ef\u9760\u6027\uff0c\u53d1\u73b0\u53ef\u9760\u6027\u968f\u6bd4\u7279\u6570\u5448\u975e\u7ebf\u6027\u53d8\u5316\uff0c4\u6bd4\u7279\u91cf\u5316\u6a21\u578b\u8fbe\u5230\u53ef\u9760\u6027\u5cf0\u503c\uff0c\u4e14\u91cf\u5316\u80fd\u589e\u5f3a\u6a21\u578b\u5bf9\u81ea\u7136\u8f93\u5165\u6270\u52a8\u7684\u9c81\u68d2\u6027\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10855", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u91cf\u5316", "\u53ef\u9760\u6027", "\u9c81\u68d2\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10855v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Reliability Scaling Laws for Quantized Large Language Models", "tldr": "\u7cfb\u7edf\u8bc4\u4f30\u4e86\u91cf\u5316\u5927\u8bed\u8a00\u6a21\u578b\u5728\u4e0d\u786e\u5b9a\u6027\u3001\u6821\u51c6\u6027\u548c\u9c81\u68d2\u6027\u4e09\u4e2a\u7ef4\u5ea6\u7684\u53ef\u9760\u6027\uff0c\u53d1\u73b0\u53ef\u9760\u6027\u968f\u6bd4\u7279\u6570\u5448\u975e\u7ebf\u6027\u53d8\u5316\uff0c4\u6bd4\u7279\u91cf\u5316\u6a21\u578b\u8fbe\u5230\u53ef\u9760\u6027\u5cf0\u503c\uff0c\u4e14\u91cf\u5316\u80fd\u589e\u5f3a\u6a21\u578b\u5bf9\u81ea\u7136\u8f93\u5165\u6270\u52a8\u7684\u9c81\u68d2\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning for large language models (LLMs) typically relies on trust-region masks to stabilize off-policy updates. The dominant PPO-style approach uses the sampled-token importance ratio for two criteria: a proximity criterion, which asks whether the policy has moved too far from the behavior policy, and a direction criterion, which asks whether the update pushes it farther away. Recent work DPPO improves the proximity criterion by replacing PPO\u0027s ratio-based test with a probability divergence between the behavior and training policies. However, its direction criterion is still inherited from PPO. A token can be masked only when the sampled-token importance ratio moves away from one. We observe that this ratio-based direction criterion is a single-sample proxy that can disagree in sign with the change of the divergence that defines the proximity criterion. We therefore propose the predictive divergence mask, which asks whether the next policy-gradient step will increase or decrease the same divergence used by the trust region. For the discrete softmax policies used in LLM RL, we derive this prediction in closed form. Because production rollout engines expose only a truncated (top-K) view of the vocabulary, we develop two lightweight top-$K$ estimators for this prediction. Detailed analysis shows the divergence-based direction is better aligned with the realized change of the divergence than the sampled ratio, and the resulting masks improve RL training across model scales and precision settings.", "arxiv_id": "2607.10848", "arxiv_url": "https://arxiv.org/abs/2607.10848", "authors": ["Xiangxin Zhou", "Jiarui Yao", "Penghui Qi", "Bowen Ping", "Jiaqi Tang", "Haonan Wang", "Tianyu Pang"], "brief": "\u9488\u5bf9\u5927\u8bed\u8a00\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u4e2dPPO\u98ce\u683c\u7684\u4fe1\u4efb\u57df\u63a9\u7801\u65b9\u6cd5\uff0c\u63d0\u51fa\"\u9884\u6d4b\u6563\u5ea6\u63a9\u7801\"\uff0c\u901a\u8fc7\u9884\u6d4b\u4e0b\u4e00\u6b65\u7b56\u7565\u68af\u5ea6\u66f4\u65b0\u662f\u5426\u4f1a\u589e\u5927\u6216\u51cf\u5c0f\u6563\u5ea6\u6765\u51b3\u5b9a\u662f\u5426\u5c4f\u853dtoken\uff0c\u66ff\u4ee3\u539f\u6709\u57fa\u4e8e\u91cd\u8981\u6027\u6bd4\u7387\u7684\u65b9\u5411\u5224\u636e\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u591a\u79cd\u6a21\u578b\u89c4\u6a21\u548c\u7cbe\u5ea6\u8bbe\u7f6e\u4e0b\u5747\u80fd\u6539\u5584RL\u8bad\u7ec3\u6548\u679c\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10848", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u4fe1\u4efb\u57df", "\u7b56\u7565\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10848v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Predictive Divergence Masks for LLM RL", "tldr": "\u9488\u5bf9\u5927\u8bed\u8a00\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u4e2dPPO\u98ce\u683c\u7684\u4fe1\u4efb\u57df\u63a9\u7801\u65b9\u6cd5\uff0c\u63d0\u51fa\"\u9884\u6d4b\u6563\u5ea6\u63a9\u7801\"\uff0c\u901a\u8fc7\u9884\u6d4b\u4e0b\u4e00\u6b65\u7b56\u7565\u68af\u5ea6\u66f4\u65b0\u662f\u5426\u4f1a\u589e\u5927\u6216\u51cf\u5c0f\u6563\u5ea6\u6765\u51b3\u5b9a\u662f\u5426\u5c4f\u853dtoken\uff0c\u66ff\u4ee3\u539f\u6709\u57fa\u4e8e\u91cd\u8981\u6027\u6bd4\u7387\u7684\u65b9\u5411\u5224\u636e\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u591a\u79cd\u6a21\u578b\u89c4\u6a21\u548c\u7cbe\u5ea6\u8bbe\u7f6e\u4e0b\u5747\u80fd\u6539\u5584RL\u8bad\u7ec3\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "On-Policy Self-Distillation (OPSD) has emerged as a crucial paradigm for enhancing and aligning Large Language Models (LLMs). However, in complex reasoning tasks, OPSD paradoxically degrades downstream performance. In this paper, we systematically investigate this pathology and identify a severe optimization trap we define as \\textbf{Thinking Collapse} -- a sharp decline in the model\u0027s native intermediate reasoning behavior, measured by epistemic-token density (ET per 1k). Through entropy-based gradient masking and token-level target analysis, we show that this collapse is triggered by aggressive teacher gradients at high-student-entropy decision forks, where student epistemic tokens are frequently suppressed into teacher non-epistemic targets and are highly concentrated in high pointwise student-teacher divergence regions. To resolve this optimization pathology, we propose \\textbf{Adaptive Dual-Perspective OPSD (AD-OPSD)}, a robust control framework that dynamically moderates the self-distillation objective. AD-OPSD selectively anchors high-suppression-risk sandboxed tokens to a reference prior derived from the frozen base model via an asymmetrical pointwise divergence gate, preserving native thinking capacity while retaining OPSD\u0027s error-correcting power. Extensive experiments across competitive mathematical benchmarks show that AD-OPSD improves over standard OPSD by up to \\textbf{+4.1\\%} absolute average accuracy across diverse model scales and datasets. Further analysis demonstrates that AD-OPSD mitigates thinking collapse and generalizes robustly to different post-training paradigms.", "arxiv_id": "2607.10805", "arxiv_url": "https://arxiv.org/abs/2607.10805", "authors": ["Keqin Peng", "Chen Li", "Yuanxin Ouyang", "Yancheng Yuan", "Liang Ding"], "brief": "\u7814\u7a76\u53d1\u73b0\u5728\u7ebf\u7b56\u7565\u81ea\u84b8\u998f\uff08OPSD\uff09\u5728\u590d\u6742\u63a8\u7406\u4efb\u52a1\u4e2d\u4f1a\u5bfc\u81f4\"\u601d\u7ef4\u5d29\u6e83\"\u2014\u2014\u6a21\u578b\u4e2d\u95f4\u63a8\u7406\u884c\u4e3a\u6025\u5267\u9000\u5316\u3002\u901a\u8fc7\u71b5\u57fa\u68af\u5ea6\u63a9\u7801\u5206\u6790\u63ed\u793a\u4e86\u5d29\u6e83\u673a\u5236\uff0c\u5e76\u63d0\u51faAD-OPSD\u6846\u67b6\uff0c\u5229\u7528\u975e\u5bf9\u79f0\u6563\u5ea6\u95e8\u63a7\u4fdd\u62a4\u9ad8\u98ce\u9669\u63a8\u7406token\uff0c\u5728\u6570\u5b66\u57fa\u51c6\u4e0a\u5e73\u5747\u63d0\u5347\u6700\u9ad84.1%\u51c6\u786e\u7387\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10805", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u84b8\u998f", "\u63a8\u7406\u80fd\u529b", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10805v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Diagnosing and Mitigating Thinking Collapse in On-Policy Self-Distillation", "tldr": "\u7814\u7a76\u53d1\u73b0\u5728\u7ebf\u7b56\u7565\u81ea\u84b8\u998f\uff08OPSD\uff09\u5728\u590d\u6742\u63a8\u7406\u4efb\u52a1\u4e2d\u4f1a\u5bfc\u81f4\"\u601d\u7ef4\u5d29\u6e83\"\u2014\u2014\u6a21\u578b\u4e2d\u95f4\u63a8\u7406\u884c\u4e3a\u6025\u5267\u9000\u5316\u3002\u901a\u8fc7\u71b5\u57fa\u68af\u5ea6\u63a9\u7801\u5206\u6790\u63ed\u793a\u4e86\u5d29\u6e83\u673a\u5236\uff0c\u5e76\u63d0\u51faAD-OPSD\u6846\u67b6\uff0c\u5229\u7528\u975e\u5bf9\u79f0\u6563\u5ea6\u95e8\u63a7\u4fdd\u62a4\u9ad8\u98ce\u9669\u63a8\u7406token\uff0c\u5728\u6570\u5b66\u57fa\u51c6\u4e0a\u5e73\u5747\u63d0\u5347\u6700\u9ad84.1%\u51c6\u786e\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Molecular property models are commonly evaluated by holding out Bemis--Murcko scaffolds, yet a scaffold identifier is only one notion of chemical unfamiliarity. We introduce a label-free structural-frontier split that reserves the sparsest and most physicochemically remote scaffold groups, and evaluate it on six public experimental or curated ADMET tasks. Against a 70/10/20 scaffold control with identical acyclic grouping, the frontier inflates equally weighted primary error with a taskwise median of 87.0\\% and a skew-sensitive mean of 130.3\\% (descriptive task/seed bootstrap interval, 52.1--246.0\\%). The mean falls to 75.9\\% once BBB is removed; that endpoint is the one whose score ranking inverts at the frontier. A message-passing graph-network control still shows a large gap (mean 82.8\\% over four tasks) and does not invert, so a low-capacity head does not explain the effect. We also test Multi-View Frontier Risk Extrapolation (\\method), a count-adjusted tail-risk penalty over four molecular views, and treat it as a falsifiable probe. It changes normalized frontier error by only 0.16\\% relative to empirical risk minimization for the perceptron head (interval, $-0.43$--0.84\\%) and by $-1.9$\\% for the graph network; three fixed robust-penalty controls are likewise inconclusive. Against the published Lo-Hi and DataSAIL splitters the frontier inflates error more on average, though no split is uniformly hardest. An audit of 31,561 marine natural products further shows that OOD status and agreement with legacy ADMET predictions depend on the molecular view, endpoint and teacher coverage. Split construction and label provenance are important evaluation constraints in their own right, and the tested training penalties do not resolve the frontier failures we observe.", "arxiv_id": "2607.10729", "arxiv_url": "https://arxiv.org/abs/2607.10729", "authors": ["Jiacheng Zheng", "Chang Guo", "Zixuan Wang", "Xinyu Liu"], "brief": "\u7814\u7a76\u53d1\u73b0\u5e38\u7528\u7684Bemis-Murcko\u9aa8\u67b6\u5212\u5206\u65b9\u6cd5\u4f1a\u4f4e\u4f30ADMET\u6a21\u578b\u5728\u7ed3\u6784\u524d\u6cbf\uff08\u7a00\u758f\u4e14\u7406\u5316\u6027\u8d28\u8fdc\u79bb\u8bad\u7ec3\u96c6\uff09\u5206\u5b50\u4e0a\u7684\u6cdb\u5316\u8bef\u5dee\uff0c\u63d0\u51fa\u7ed3\u6784\u524d\u6cbf\u5212\u5206\u65b9\u6cd5\u540e\u8bef\u5dee\u4e2d\u4f4d\u6570\u81a8\u80c087%\u3001\u5747\u503c\u81a8\u80c0130%\u3002\u6d4b\u8bd5\u7684\u591a\u89c6\u89d2\u5c3e\u90e8\u98ce\u9669\u60e9\u7f5a\u8bad\u7ec3\u7b56\u7565\uff08MVRE\uff09\u672a\u80fd\u6709\u6548\u7f13\u89e3\u8be5\u95ee\u9898\uff0c\u8868\u660e\u73b0\u6709\u8bad\u7ec3\u60e9\u7f5a\u65e0\u6cd5\u89e3\u51b3\u7ed3\u6784\u5916\u63a8\u5931\u8d25\u3002", "categories": ["cs.LG", "q-bio.QM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10729", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5206\u5b50\u6027\u8d28\u9884\u6d4b", "ADMET", "\u57df\u5916\u6cdb\u5316", "\u56fe\u795e\u7ecf\u7f51\u7edc"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10729v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Scaffold splits hide structural-frontier failures in ADMET models", "tldr": "\u7814\u7a76\u53d1\u73b0\u5e38\u7528\u7684Bemis-Murcko\u9aa8\u67b6\u5212\u5206\u65b9\u6cd5\u4f1a\u4f4e\u4f30ADMET\u6a21\u578b\u5728\u7ed3\u6784\u524d\u6cbf\uff08\u7a00\u758f\u4e14\u7406\u5316\u6027\u8d28\u8fdc\u79bb\u8bad\u7ec3\u96c6\uff09\u5206\u5b50\u4e0a\u7684\u6cdb\u5316\u8bef\u5dee\uff0c\u63d0\u51fa\u7ed3\u6784\u524d\u6cbf\u5212\u5206\u65b9\u6cd5\u540e\u8bef\u5dee\u4e2d\u4f4d\u6570\u81a8\u80c087%\u3001\u5747\u503c\u81a8\u80c0130%\u3002\u6d4b\u8bd5\u7684\u591a\u89c6\u89d2\u5c3e\u90e8\u98ce\u9669\u60e9\u7f5a\u8bad\u7ec3\u7b56\u7565\uff08MVRE\uff09\u672a\u80fd\u6709\u6548\u7f13\u89e3\u8be5\u95ee\u9898\uff0c\u8868\u660e\u73b0\u6709\u8bad\u7ec3\u60e9\u7f5a\u65e0\u6cd5\u89e3\u51b3\u7ed3\u6784\u5916\u63a8\u5931\u8d25\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The lineage graph of open-weight language models is self-reported: Hugging Face\u0027s base_model metadata field is optional and unverified, and over 60% of Hub models document no parentage at all. Methods for detecting lineage from weights exist in the research literature, but each ships as paper code tied to one signal and one experiment; when a provenance dispute breaks, the analysis is redone by hand. This report describes modelDNA, a tool that fingerprints a model from roughly 100-300 MB of ranged HTTP reads (instead of a full 15 GB download for a 7B model), compares the fingerprint against a reference database of foundation models across four published signal families, and returns one of eight verdict classes with a calibrated probability, preferring honest abstention to confident error. On a benchmark of 15 real Hub models with org-documented parentage, judged against 8 candidate bases (13 positives, 107 hard negatives), the system achieves AUROC 1.0, zero false positives at its reporting threshold, and 13/13 correct top-1 parent attribution. The report\u0027s second contribution is merge decomposition. Every mainstream weight-merging method is (near-)linear per tensor, and fingerprint sample positions are deterministic functions of tensor identity, so a merged model\u0027s fingerprint is the same linear combination of its parents\u0027 fingerprints. Mixture weights can therefore be recovered from fingerprints alone by sum-to-one constrained least squares. Against merges with published mergekit configurations as ground truth, the method recovers a slerp merge\u0027s layer-interpolation curves at r = 0.999 and a dare_ties merge\u0027s mixture weights to within 0.011 of the published values, without downloading any weights beyond the fingerprints. All fingerprints, benchmarks, and the inferred lineage graph of 55 models are public and reproducible offline.", "arxiv_id": "2607.10617", "arxiv_url": "https://arxiv.org/abs/2607.10617", "authors": ["Muhammad Awais Bin Adil", "Saad Aamir"], "brief": "modelDNA\u662f\u4e00\u4e2a\u6a21\u578b\u6eaf\u6e90\u5de5\u5177\uff0c\u901a\u8fc7\u4ec5\u4e0b\u8f7d\u7ea6100-300MB\u7684\u6743\u91cd\u6307\u7eb9\uff08\u800c\u975e\u5b8c\u6574\u6a21\u578b\uff09\u6765\u9a8c\u8bc1\u5f00\u6e90\u8bed\u8a00\u6a21\u578b\u7684\u8840\u7edf\u5173\u7cfb\u3002\u572815\u4e2a\u771f\u5b9e\u6a21\u578b\u7684\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u5b9e\u73b0AUROC 1.0\u3001\u96f6\u8bef\u62a5\uff0c\u5e76\u80fd\u4ece\u6307\u7eb9\u4e2d\u8fd8\u539f\u6a21\u578b\u5408\u5e76\u7684\u6df7\u5408\u6743\u91cd\uff08\u8bef\u5dee\u003c0.011\uff09\uff0c\u65e0\u9700\u4e0b\u8f7d\u5b8c\u6574\u6743\u91cd\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10617", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6a21\u578b\u6eaf\u6e90", "\u8bed\u8a00\u6a21\u578b", "\u6743\u91cd\u6307\u7eb9", "\u6a21\u578b\u5408\u5e76"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10617v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "modelDNA: Calibrated Lineage Verification and Merge Decomposition from Sampled Weight Fingerprints", "tldr": "modelDNA\u662f\u4e00\u4e2a\u6a21\u578b\u6eaf\u6e90\u5de5\u5177\uff0c\u901a\u8fc7\u4ec5\u4e0b\u8f7d\u7ea6100-300MB\u7684\u6743\u91cd\u6307\u7eb9\uff08\u800c\u975e\u5b8c\u6574\u6a21\u578b\uff09\u6765\u9a8c\u8bc1\u5f00\u6e90\u8bed\u8a00\u6a21\u578b\u7684\u8840\u7edf\u5173\u7cfb\u3002\u572815\u4e2a\u771f\u5b9e\u6a21\u578b\u7684\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u5b9e\u73b0AUROC 1.0\u3001\u96f6\u8bef\u62a5\uff0c\u5e76\u80fd\u4ece\u6307\u7eb9\u4e2d\u8fd8\u539f\u6a21\u578b\u5408\u5e76\u7684\u6df7\u5408\u6743\u91cd\uff08\u8bef\u5dee\u003c0.011\uff09\uff0c\u65e0\u9700\u4e0b\u8f7d\u5b8c\u6574\u6743\u91cd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Training with quantized weights can reduce costs but often results in degraded accuracy, especially when optimization is carried out in low precision, without storing high-precision copies. We identify a key failure mode: under low precision, standard optimizers can get stuck and not make progress, especially at large weight magnitudes due to coarse mantissa resolution. To overcome this, multiplicative updates have been previously proposed, in place of additive updates in standard optimizers. While successful under extremely low precision, such as under the logarithmic number system, they suffer from failures near zero and across sign changes. The failure modes of additive and multiplicative updates are therefore complementary. To exploit this, we propose M+Adam, which combines both update types: additive steps handle sign changes and small magnitudes, while multiplicative steps ensure progress at large magnitudes when additive updates are zeroed out under rounding. We prove monotone descent for M+Adam under standard smoothness assumptions. Across LLaMA-style pretraining with 60M-1B models, 1x-8x Chinchilla budgets, and using only BF16, FP8, and FP4 master weights, M+Adam consistently improves low-precision training.", "arxiv_id": "2607.10611", "arxiv_url": "https://arxiv.org/abs/2607.10611", "authors": ["Xiaoyuan Liang", "Sebastian Loeschcke", "Mads Toftrup", "Anima Anandkumar"], "brief": "\u63d0\u51faM+Adam\u4f18\u5316\u5668\uff0c\u7ed3\u5408\u52a0\u6cd5\u66f4\u65b0\u4e0e\u4e58\u6cd5\u66f4\u65b0\u7684\u4e92\u8865\u4f18\u52bf\uff1a\u52a0\u6cd5\u6b65\u9aa4\u5904\u7406\u7b26\u53f7\u53d8\u5316\u548c\u5c0f\u91cf\u7ea7\u6743\u91cd\uff0c\u4e58\u6cd5\u6b65\u9aa4\u786e\u4fdd\u5927\u91cf\u7ea7\u6743\u91cd\u5728\u4f4e\u7cbe\u5ea6\u820d\u5165\u65f6\u4ecd\u80fd\u53d6\u5f97\u8fdb\u5c55\u3002\u5728LLaMA\u98ce\u683c\u9884\u8bad\u7ec3\u5b9e\u9a8c\u4e2d\uff0c\u4f7f\u7528BF16/FP8/FP4\u4e3b\u6743\u91cd\uff0cM+Adam\u6301\u7eed\u63d0\u5347\u4f4e\u7cbe\u5ea6\u8bad\u7ec3\u6548\u679c\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10611", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4f4e\u7cbe\u5ea6\u8bad\u7ec3", "\u4f18\u5316\u5668", "\u5927\u8bed\u8a00\u6a21\u578b", "\u91cf\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10611v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "M+Adam: Low-Precision Training via Additive-Multiplicative Optimization", "tldr": "\u63d0\u51faM+Adam\u4f18\u5316\u5668\uff0c\u7ed3\u5408\u52a0\u6cd5\u66f4\u65b0\u4e0e\u4e58\u6cd5\u66f4\u65b0\u7684\u4e92\u8865\u4f18\u52bf\uff1a\u52a0\u6cd5\u6b65\u9aa4\u5904\u7406\u7b26\u53f7\u53d8\u5316\u548c\u5c0f\u91cf\u7ea7\u6743\u91cd\uff0c\u4e58\u6cd5\u6b65\u9aa4\u786e\u4fdd\u5927\u91cf\u7ea7\u6743\u91cd\u5728\u4f4e\u7cbe\u5ea6\u820d\u5165\u65f6\u4ecd\u80fd\u53d6\u5f97\u8fdb\u5c55\u3002\u5728LLaMA\u98ce\u683c\u9884\u8bad\u7ec3\u5b9e\u9a8c\u4e2d\uff0c\u4f7f\u7528BF16/FP8/FP4\u4e3b\u6743\u91cd\uff0cM+Adam\u6301\u7eed\u63d0\u5347\u4f4e\u7cbe\u5ea6\u8bad\u7ec3\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) have achieved remarkable performance on high-school and olympiad-style mathematics, yet their capabilities on advanced mathematics remain poorly understood. Existing benchmarks, however, fall short in both scope and evaluation granularity: they provide limited disciplinary coverage and often rely on final-answer correctness or coarse judgments, leaving the validity of the reasoning process inadequately assessed. To bridge this gap, we introduce AdvancedMathBench, a benchmark suite designed to evaluate advanced mathematical reasoning capabilities. Its core proof-generation benchmark, ProverBench, contains 296 problems spanning undergraduate and doctoral qualifying-exam levels. To provide reliable evaluation of the proofs, we develop a dedicated automatic verification pipeline trained on large-scale expert annotations to produce both correctness verdicts and fine-grained assessments of proof errors, which exhibits strong agreement with human experts on held-out proof trajectories. We further introduce VerifierBench, consisting of 888 model-generated proof trajectories paired with expert ground truth, to evaluate whether models can correctly judge proof validity and provide sound verification rationales. Experiments show that AdvancedMathBench remains challenging for frontier models. On proof generation, the best-performing model, GPT-5.5-xhigh, achieves only 75.8 and 66.1 on the UGD and QE splits, respectively, indicating substantial room for improvement on advanced mathematical proof construction. On proof verification, the best model attains a Balanced F1 of only 65.1, and models generally exhibit low true negative rates, suggesting that critical error detection remains a major bottleneck.", "arxiv_id": "2607.11849", "arxiv_url": "https://arxiv.org/abs/2607.11849", "authors": ["Lingkai Kong", "Zijian Wu", "Yuzhe Gu", "Haiteng Zhao", "Wenyong Huang", "Shuang Sun", "Zhicheng Xiong", "Xiaotian Zhang", "Shuya Zhao", "Yan Wang", "Disheng Xu", "Wenwei Zhang", "Kai Chen"], "brief": "\u63d0\u51faAdvancedMathBench\u57fa\u51c6\u5957\u4ef6\uff0c\u7528\u4e8e\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u5728\u9ad8\u7ea7\u6570\u5b66\u8bc1\u660e\u751f\u6210\u4e0e\u9a8c\u8bc1\u65b9\u9762\u7684\u80fd\u529b\uff0c\u5305\u542b296\u9053\u672c\u79d1\u53ca\u535a\u58eb\u8d44\u683c\u8003\u8bd5\u7ea7\u522b\u7684\u8bc1\u660e\u9898\uff08ProverBench\uff09\u548c888\u6761\u6a21\u578b\u751f\u6210\u8bc1\u660e\u8f68\u8ff9\uff08VerifierBench\uff09\u3002\u5b9e\u9a8c\u8868\u660e\u524d\u6cbf\u6a21\u578b\u8868\u73b0\u4ecd\u6709\u8f83\u5927\u63d0\u5347\u7a7a\u95f4\uff0c\u6700\u4f73\u6a21\u578bGPT-5.5\u5728\u8bc1\u660e\u751f\u6210\u4e0a\u6700\u9ad8\u4ec5\u8fbe75.8\u5206\uff0c\u8bc1\u660e\u9a8c\u8bc1F1\u4ec565.1\uff0c\u9519\u8bef\u68c0\u6d4b\u80fd\u529b\u5c24\u4e3a\u8584\u5f31\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11849", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6570\u5b66\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u57fa\u51c6\u6d4b\u8bd5", "\u8bc1\u660e\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11849v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "AdvancedMathBench: A Benchmark Suite for Advanced Mathematical Proof Generation and Verification", "tldr": "\u63d0\u51faAdvancedMathBench\u57fa\u51c6\u5957\u4ef6\uff0c\u7528\u4e8e\u8bc4\u4f30\u5927\u8bed\u8a00\u6a21\u578b\u5728\u9ad8\u7ea7\u6570\u5b66\u8bc1\u660e\u751f\u6210\u4e0e\u9a8c\u8bc1\u65b9\u9762\u7684\u80fd\u529b\uff0c\u5305\u542b296\u9053\u672c\u79d1\u53ca\u535a\u58eb\u8d44\u683c\u8003\u8bd5\u7ea7\u522b\u7684\u8bc1\u660e\u9898\uff08ProverBench\uff09\u548c888\u6761\u6a21\u578b\u751f\u6210\u8bc1\u660e\u8f68\u8ff9\uff08VerifierBench\uff09\u3002\u5b9e\u9a8c\u8868\u660e\u524d\u6cbf\u6a21\u578b\u8868\u73b0\u4ecd\u6709\u8f83\u5927\u63d0\u5347\u7a7a\u95f4\uff0c\u6700\u4f73\u6a21\u578bGPT-5.5\u5728\u8bc1\u660e\u751f\u6210\u4e0a\u6700\u9ad8\u4ec5\u8fbe75.8\u5206\uff0c\u8bc1\u660e\u9a8c\u8bc1F1\u4ec565.1\uff0c\u9519\u8bef\u68c0\u6d4b\u80fd\u529b\u5c24\u4e3a\u8584\u5f31\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Language models are increasingly used for moral decision-making across diverse linguistic and cultural contexts, yet existing work overlooks multilinguality on three aspects: 1) multilingual evaluation benchmarks use direct translation, failing to adapt culture-specific items; 2) inference-time methods for moral reasoning rely on static, English-centric scaffolds and lack grounding in moral theory; 3) training methods for moral decision-making typically require expensive supervision from stronger models or human annotators. We address these gaps with three contributions. First, we introduce MCLASH, a multilingual moral decision-making benchmark to capture culturally situated moral intuitions and social norms across languages. Second, we propose MET (Multilingual Ethics with Theory-grounded reasoning), a two-step prompting method built on expert-curated, theory-based grounds drawn from psychology and philosophy: the model first selects situation- and culture-specific grounds, then reasons over them in the native language of the user. Third, we introduce MET-D (MET-Distillation), which enhances the second step through a self-distillation training stage that requires no external supervision. MET-D improves macro-F1 over the base model on all three models of different sizes and families (Qwen3-4B, Qwen3-8B, Gemma3-4B), by an average of 3.71 points on MCLASH and 4.23 on MMoralExceptQA, with a peak MCLASH gain of 12.94 points for Malay on Qwen3-8B. We further reveal that MET-D increases native-language reasoning by 62.13 points on average, and that beneficial grounds differ systematically across cultures. Together, these contributions open the path for culture-aligned, theory-grounded multilingual moral reasoning.", "arxiv_id": "2607.11736", "arxiv_url": "https://arxiv.org/abs/2607.11736", "authors": ["Ayoung Lee", "Ryan Kwon", "Yunxiang Zhang", "Yuxuan Liu", "Peter Railton", "Lu Wang"], "brief": "\u63d0\u51faMET\u6846\u67b6\uff0c\u7ed3\u5408\u5fc3\u7406\u5b66\u4e0e\u54f2\u5b66\u7406\u8bba\uff0c\u901a\u8fc7\u4e24\u6b65\u63d0\u793a\u6cd5\u5b9e\u73b0\u591a\u8bed\u8a00\u9053\u5fb7\u63a8\u7406\uff0c\u5e76\u5f15\u5165\u65e0\u9700\u5916\u90e8\u76d1\u7763\u7684\u81ea\u84b8\u998f\u8bad\u7ec3\u65b9\u6cd5MET-D\u3002\u540c\u65f6\u6784\u5efa\u4e86\u591a\u8bed\u8a00\u6587\u5316\u611f\u77e5\u9053\u5fb7\u51b3\u7b56\u57fa\u51c6MCLASH\uff0c\u5728\u591a\u4e2a\u6a21\u578b\u4e0a\u5e73\u5747\u63d0\u5347macro-F1\u7ea64\u4e2a\u70b9\uff0c\u9a6c\u6765\u8bed\u6700\u9ad8\u63d0\u5347\u8fd113\u4e2a\u70b9\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11736", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u8bed\u8a00", "\u9053\u5fb7\u63a8\u7406", "\u6587\u5316\u611f\u77e5", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11736v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MET: Theory-Grounded and Culture-Aware Multilingual Moral Reasoning", "tldr": "\u63d0\u51faMET\u6846\u67b6\uff0c\u7ed3\u5408\u5fc3\u7406\u5b66\u4e0e\u54f2\u5b66\u7406\u8bba\uff0c\u901a\u8fc7\u4e24\u6b65\u63d0\u793a\u6cd5\u5b9e\u73b0\u591a\u8bed\u8a00\u9053\u5fb7\u63a8\u7406\uff0c\u5e76\u5f15\u5165\u65e0\u9700\u5916\u90e8\u76d1\u7763\u7684\u81ea\u84b8\u998f\u8bad\u7ec3\u65b9\u6cd5MET-D\u3002\u540c\u65f6\u6784\u5efa\u4e86\u591a\u8bed\u8a00\u6587\u5316\u611f\u77e5\u9053\u5fb7\u51b3\u7b56\u57fa\u51c6MCLASH\uff0c\u5728\u591a\u4e2a\u6a21\u578b\u4e0a\u5e73\u5747\u63d0\u5347macro-F1\u7ea64\u4e2a\u70b9\uff0c\u9a6c\u6765\u8bed\u6700\u9ad8\u63d0\u5347\u8fd113\u4e2a\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Speculative decoding accelerates autoregressive generation by letting a lightweight drafter propose multiple tokens that are verified by a larger target model. Although effective for text-only LLMs, speculative decoding yields limited gains in VLMs because drafters often diverge on vision-critical content, while existing multimodal acceleration methods do not directly address irrelevant visual evidence or optimize the verifier-accepted prefix length that governs speedup. We propose TIGER, a Text-conditioned vIsual GatEd Routing framework for multimodal speculative decoding. TIGER dynamically selects a sparse set of context-relevant visual tokens based on the drafter\u0027s current textual state, rather than expose the full visual token set or a fixed compressed interface. To better align training with inference-time efficiency, we optimize the drafter with acceptance-aligned group-based policy training using verifier-derived rewards based on accepted prefix length, built on top of distillation warm start with KL anchoring. This encourages the drafter not only to imitate the target model, but also to produce speculative continuations that survive verification for longer prefixes. Experiments show that TIGER yields consistent gains in accepted prefix length and speculative speedup under exact verifier-side speculative decoding, while achieving favorable quality-latency trade-offs with comparable downstream accuracy in visual-routing analyses.", "arxiv_id": "2607.11131", "arxiv_url": "https://arxiv.org/abs/2607.11131", "authors": ["Quynh Vo", "Cong-Duy Nguyen", "Ponhvoan Srey", "Luu Anh Tuan", "Thong Nguyen"], "brief": "TIGER\u662f\u4e00\u4e2a\u9762\u5411\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u63a8\u6d4b\u89e3\u7801\u52a0\u901f\u6846\u67b6\uff0c\u901a\u8fc7\u57fa\u4e8e\u5f53\u524d\u6587\u672c\u72b6\u6001\u52a8\u6001\u9009\u62e9\u76f8\u5173\u89c6\u89c9token\uff08\u7a00\u758f\u95e8\u63a7\u8def\u7531\uff09\uff0c\u5e76\u7528\u9a8c\u8bc1\u6a21\u578b\u63a5\u53d7\u524d\u7f00\u957f\u5ea6\u4f5c\u4e3a\u5956\u52b1\u8fdb\u884c\u7b56\u7565\u8bad\u7ec3\uff0c\u4f7f\u8349\u7a3f\u6a21\u578b\u751f\u6210\u66f4\u6613\u88ab\u9a8c\u8bc1\u901a\u8fc7\u7684\u7eed\u5199\u3002\u5b9e\u9a8c\u8868\u660eTIGER\u5728\u63a5\u53d7\u524d\u7f00\u957f\u5ea6\u548c\u63a8\u6d4b\u89e3\u7801\u52a0\u901f\u6bd4\u4e0a\u5747\u6709\u4e00\u81f4\u63d0\u5347\uff0c\u540c\u65f6\u4fdd\u6301\u4e0b\u6e38\u4efb\u52a1\u7cbe\u5ea6\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11131", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u63a8\u6d4b\u89e3\u7801", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11131v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "TIGER: Text-Conditioned Visual Gated Routing with Acceptance Alignment for Multimodal Speculative Decoding", "tldr": "TIGER\u662f\u4e00\u4e2a\u9762\u5411\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u63a8\u6d4b\u89e3\u7801\u52a0\u901f\u6846\u67b6\uff0c\u901a\u8fc7\u57fa\u4e8e\u5f53\u524d\u6587\u672c\u72b6\u6001\u52a8\u6001\u9009\u62e9\u76f8\u5173\u89c6\u89c9token\uff08\u7a00\u758f\u95e8\u63a7\u8def\u7531\uff09\uff0c\u5e76\u7528\u9a8c\u8bc1\u6a21\u578b\u63a5\u53d7\u524d\u7f00\u957f\u5ea6\u4f5c\u4e3a\u5956\u52b1\u8fdb\u884c\u7b56\u7565\u8bad\u7ec3\uff0c\u4f7f\u8349\u7a3f\u6a21\u578b\u751f\u6210\u66f4\u6613\u88ab\u9a8c\u8bc1\u901a\u8fc7\u7684\u7eed\u5199\u3002\u5b9e\u9a8c\u8868\u660eTIGER\u5728\u63a5\u53d7\u524d\u7f00\u957f\u5ea6\u548c\u63a8\u6d4b\u89e3\u7801\u52a0\u901f\u6bd4\u4e0a\u5747\u6709\u4e00\u81f4\u63d0\u5347\uff0c\u540c\u65f6\u4fdd\u6301\u4e0b\u6e38\u4efb\u52a1\u7cbe\u5ea6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern large language models (LLMs) operate in interactive multi-turn settings, making multi-turn jailbreaking a realistic threat model and an important setting for automated red teaming. A core challenge in learning multi-turn jailbreak attackers is credit assignment: different turns contribute differently to the final outcome, yet existing learning signals are often too coarse to identify their individual contributions. We propose decomposed credit GRPO (DC-GRPO), a unified turn-level credit assignment framework for Group Relative Policy Optimization in multi-turn jailbreak learning. DC-GRPO assigns a separate group-relative learning signal to each turn by combining immediate and future credit, avoiding the credit misassignment induced by broadcasting a single trajectory-level score across the dialogue. We instantiate this framework with static and dynamic weighting rules that differ in how the two credit sources are balanced while sharing the same turn-level structure. Across multiple victim LLMs and benchmarks, the dynamic- and static-weighted variants achieve average ASR5@3 scores of 98.26% and 97.88%, respectively, substantially outperforming the state-of-the-art methods, including SEMA (86.58%) and TROJail (86.23%). Their consistently strong performance indicates that the central empirical benefit comes from turn-level group-relative credit assignment rather than a particular weighting rule. Warning: This paper contains examples of harmful content.", "arxiv_id": "2607.11070", "arxiv_url": "https://arxiv.org/abs/2607.11070", "authors": ["Junyoung Park", "Namgyu Park", "Sechan Lee", "Yoon-Chan Jhi", "Jihoon Cho", "Sangdon Park"], "brief": "\u63d0\u51faDC-GRPO\u6846\u67b6\uff0c\u901a\u8fc7\u5206\u89e3\u4fe1\u7528\u5206\u914d\u89e3\u51b3\u591a\u8f6e\u8d8a\u72f1\u653b\u51fb\u4e2d\u7684\u4fe1\u7528\u8bef\u5206\u914d\u95ee\u9898\uff0c\u4e3a\u6bcf\u4e2a\u5bf9\u8bdd\u8f6e\u6b21\u5355\u72ec\u5206\u914d\u5373\u65f6\u4e0e\u672a\u6765\u4fe1\u7528\u7684\u7ec4\u76f8\u5bf9\u5b66\u4e60\u4fe1\u53f7\u3002\u5728\u591a\u4e2a\u53d7\u5bb3LLM\u548c\u57fa\u51c6\u6d4b\u8bd5\u4e0a\uff0c\u653b\u51fb\u6210\u529f\u7387\u8fbe98.26%\uff0c\u5927\u5e45\u8d85\u8d8a\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\uff08SEMA 86.58%\uff09\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11070", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8d8a\u72f1\u653b\u51fb", "\u5f3a\u5316\u5b66\u4e60", "\u7ea2\u961f\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11070v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MJ: Multi-turn LLM Jailbreaking via Decomposed Credit Assignment", "tldr": "\u63d0\u51faDC-GRPO\u6846\u67b6\uff0c\u901a\u8fc7\u5206\u89e3\u4fe1\u7528\u5206\u914d\u89e3\u51b3\u591a\u8f6e\u8d8a\u72f1\u653b\u51fb\u4e2d\u7684\u4fe1\u7528\u8bef\u5206\u914d\u95ee\u9898\uff0c\u4e3a\u6bcf\u4e2a\u5bf9\u8bdd\u8f6e\u6b21\u5355\u72ec\u5206\u914d\u5373\u65f6\u4e0e\u672a\u6765\u4fe1\u7528\u7684\u7ec4\u76f8\u5bf9\u5b66\u4e60\u4fe1\u53f7\u3002\u5728\u591a\u4e2a\u53d7\u5bb3LLM\u548c\u57fa\u51c6\u6d4b\u8bd5\u4e0a\uff0c\u653b\u51fb\u6210\u529f\u7387\u8fbe98.26%\uff0c\u5927\u5e45\u8d85\u8d8a\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\uff08SEMA 86.58%\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Frontier language models are increasingly evaluated on biomedical benchmarks, but two problems undermine most published evaluations: legacy benchmarks are near-saturated, and open-ended responses are graded by other language models. We evaluate Claude Fable 5, Anthropic\u0027s most capable publicly available model, across eight biomedical benchmarks, four text and four multimodal, using deterministic scoring against fixed answer keys throughout. We include two Claude predecessors and GPT-5 as baselines. Refusal is tracked as a distinct outcome in every result table. That decision produces the paper\u0027s central finding. Fable 5 refuses between 8.0% and 99.4% of questions depending on the benchmark, a pattern absent in both predecessors and in GPT-5. Once refused items are excluded from the denominator, Fable 5\u0027s accuracy exceeds or meets every other model on every benchmark in this study. We identify two distinguishable refusal patterns: one concentrating in basic-science and mechanism content across MedQA and MedXpertQA MM, confirmed independently on two benchmarks using each benchmark\u0027s own category labels; and a separate disease-domain pattern on RareBench, where inborn metabolic disease presentations are refused near-universally while adult-onset autoimmune presentations are not. The primary constraint on Fable 5\u0027s biomedical usefulness is willingness to engage, not capability once it does.", "arxiv_id": "2607.10849", "arxiv_url": "https://arxiv.org/abs/2607.10849", "authors": ["Dominic Okonkwo", "Magnus Hodgson", "Temitope I. David", "Susan Adanna Ihejirika"], "brief": "\u672c\u6587\u8bc4\u4f30\u4e86Claude Fable 5\u5728\u516b\u9879\u751f\u7269\u533b\u5b66\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u7684\u8868\u73b0\uff0c\u53d1\u73b0\u5176\u62d2\u7edd\u56de\u7b54\u7387\u9ad8\u8fbe8%\u81f399.4%\uff0c\u8fdc\u8d85\u524d\u4ee3\u6a21\u578b\u548cGPT-5\u3002\u6392\u9664\u62d2\u7edd\u9879\u540e\uff0cFable 5\u5728\u6240\u6709\u57fa\u51c6\u4e0a\u51c6\u786e\u7387\u5747\u9886\u5148\uff0c\u8bf4\u660e\u5176\u6838\u5fc3\u74f6\u9888\u5728\u4e8e\u53c2\u4e0e\u610f\u613f\u800c\u975e\u5b9e\u9645\u80fd\u529b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10849", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u751f\u7269\u533b\u5b66", "\u6a21\u578b\u8bc4\u4f30", "\u5b89\u5168\u62d2\u7edd"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10849v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Capabilities of Claude Fable 5 on Biomedical Challenge Problems", "tldr": "\u672c\u6587\u8bc4\u4f30\u4e86Claude Fable 5\u5728\u516b\u9879\u751f\u7269\u533b\u5b66\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u7684\u8868\u73b0\uff0c\u53d1\u73b0\u5176\u62d2\u7edd\u56de\u7b54\u7387\u9ad8\u8fbe8%\u81f399.4%\uff0c\u8fdc\u8d85\u524d\u4ee3\u6a21\u578b\u548cGPT-5\u3002\u6392\u9664\u62d2\u7edd\u9879\u540e\uff0cFable 5\u5728\u6240\u6709\u57fa\u51c6\u4e0a\u51c6\u786e\u7387\u5747\u9886\u5148\uff0c\u8bf4\u660e\u5176\u6838\u5fc3\u74f6\u9888\u5728\u4e8e\u53c2\u4e0e\u610f\u613f\u800c\u975e\u5b9e\u9645\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "In this paper, we propose SpectraReward, a training-free reward function that turns pretrained MLLMs into off-the-shelf reward models for image-generation reinforcement learning. Instead of asking the MLLM to judge a generated image or answer decomposed verification questions, SpectraReward measures how well the original prompt can be recovered from the generated image through a single image-conditioned, teacher-forced forward pass. We use the average image-conditioned prompt log-likelihood as the reward, directly reusing the MLLM\u0027s pretrained image-text alignment ability without preference labels, reward-model fine-tuning. We further introduce Self-SpectraReward, a special case for unified multimodal models where the policy\u0027s own understanding branch serves as the reward model for its generation branch, forming a closed-loop self-improving framework without external reward models or external knowledge. Extensive experiments validate SpectraReward through a broad image-generation RL study covering two diffusion models, three RL algorithms, nine reward MLLM backbones from four MLLM families spanning 4B to 235B parameters, and five out-of-distribution text-to-image benchmarks. Results show that both SpectraReward and Self-SpectraReward significantly and consistently improve generation performance and outperform prior MLLM-derived reward training methods. Further analysis reveals that larger reward MLLMs are not always better, while Self-SpectraReward can match or surpass much larger external reward models, suggesting that reward-policy alignment is a key factor for effective image-generation RL. Project Page: https://huangrh99.github.io/SpectraReward/", "arxiv_id": "2607.11886", "arxiv_url": "https://arxiv.org/abs/2607.11886", "authors": ["Runhui Huang", "Qihui Zhang", "Zhe Liu", "Yu Gao", "Jie Wu", "Hengshuang Zhao"], "brief": "\u63d0\u51faSpectraReward\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u5956\u52b1\u51fd\u6570\uff0c\u901a\u8fc7\u8861\u91cf\u751f\u6210\u56fe\u50cf\u80fd\u5426\u8fd8\u539f\u539f\u59cb\u63d0\u793a\u8bcd\uff08\u56fe\u50cf\u6761\u4ef6\u4e0b\u7684\u63d0\u793a\u8bcd\u5bf9\u6570\u4f3c\u7136\uff09\u6765\u5c06\u9884\u8bad\u7ec3\u591a\u6a21\u6001\u5927\u6a21\u578b\u8f6c\u5316\u4e3a\u6587\u751f\u56fe\u5f3a\u5316\u5b66\u4e60\u7684\u5956\u52b1\u6a21\u578b\u3002\u8fdb\u4e00\u6b65\u63d0\u51faSelf-SpectraReward\uff0c\u5229\u7528\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578b\u81ea\u8eab\u7684\u7406\u89e3\u5206\u652f\u4e3a\u751f\u6210\u5206\u652f\u63d0\u4f9b\u5956\u52b1\uff0c\u5f62\u6210\u95ed\u73af\u81ea\u6211\u6539\u8fdb\u6846\u67b6\uff0c\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11886", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u6587\u751f\u56fe", "\u5956\u52b1\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11886v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Read It Back: Pretrained MLLMs Are Zero-Shot Reward Models for Text-to-Image Generation", "tldr": "\u63d0\u51faSpectraReward\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u5956\u52b1\u51fd\u6570\uff0c\u901a\u8fc7\u8861\u91cf\u751f\u6210\u56fe\u50cf\u80fd\u5426\u8fd8\u539f\u539f\u59cb\u63d0\u793a\u8bcd\uff08\u56fe\u50cf\u6761\u4ef6\u4e0b\u7684\u63d0\u793a\u8bcd\u5bf9\u6570\u4f3c\u7136\uff09\u6765\u5c06\u9884\u8bad\u7ec3\u591a\u6a21\u6001\u5927\u6a21\u578b\u8f6c\u5316\u4e3a\u6587\u751f\u56fe\u5f3a\u5316\u5b66\u4e60\u7684\u5956\u52b1\u6a21\u578b\u3002\u8fdb\u4e00\u6b65\u63d0\u51faSelf-SpectraReward\uff0c\u5229\u7528\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578b\u81ea\u8eab\u7684\u7406\u89e3\u5206\u652f\u4e3a\u751f\u6210\u5206\u652f\u63d0\u4f9b\u5956\u52b1\uff0c\u5f62\u6210\u95ed\u73af\u81ea\u6211\u6539\u8fdb\u6846\u67b6\uff0c\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present ABot-3DWorld 0, a universal multimodal 3D world model that turns text, image, and video inputs into high-fidelity, explorable 3D worlds. At the heart of our framework is a unified Spatial Generative Primitive (SGP), a compact tuple of a high-quality panorama and a spatial point cloud that delivers an efficient description of any 3D space. Multimodal inputs are first lifted into this primitive; a 3D-consistent panoramic video generator then explores the primitive along a planned trajectory; finally, our panoramic video reconstruction engine converts the generated video into a clean, photorealistic 3D Gaussian Splatting (3DGS) world. This pipeline covers two regimes: rich inputs (multi-view sets, casual video) are lifted into the SGP through a geometry-rigorous recovery that mirrors the observed scene, while a single image or sentence is completed generatively into a creative world. The result is one low-barrier engine for general 3D content creation that further anchors generated worlds to geographic points of interest, enabling map-native spatial exploration at consumer scale. Experiments show that ABot-3DWorld 0 sets the state of the art among open-source methods and demonstrates stronger scene fidelity than Marble under rich multimodal inputs.", "arxiv_id": "2607.11673", "arxiv_url": "https://arxiv.org/abs/2607.11673", "authors": ["Mingchao Sun", "Luyang Tang", "Yu Liu", "Xu Yan", "Zhan Li", "Yunwei Zhang", "Fei Yu", "Zengye Ge", "Yumin Liu", "Jiacheng Zhang", "Yongchang Zhang", "Jiawei Zhang", "Zhicheng Liu", "Zhongxu Sun", "Tianjian Ouyang", "Wenzheng Chen", "Shixing Yang", "Nianfei Fan", "Guodong Sun", "Huan Li", "Zheng Zhou", "Yongze Li", "Yingliang Peng", "Mengmeng Du", "Yuan Liu", "Haozhe Shi", "Chunnuo Gong", "Chengzhen Yu", "Chunxue Jia", "Yang Liu", "Shiying Zeng", "Junnan Lai", "Hang Zhang", "Ning Guo", "Baoquan Chen", "Mu Xu", "Hongyu Pan"], "brief": "\u63d0\u51faABot-3DWorld 0\uff0c\u4e00\u4e2a\u901a\u7528\u591a\u6a21\u60013D\u4e16\u754c\u6a21\u578b\uff0c\u53ef\u5c06\u6587\u672c\u3001\u56fe\u50cf\u6216\u89c6\u9891\u8f93\u5165\u8f6c\u5316\u4e3a\u53ef\u63a2\u7d22\u7684\u9ad8\u4fdd\u771f3D\u4e16\u754c\u3002\u6838\u5fc3\u662f\u7edf\u4e00\u7684\u7a7a\u95f4\u751f\u6210\u539f\u8bed\uff08SGP\uff09\uff0c\u7ed3\u5408\u5168\u666f\u89c6\u9891\u751f\u6210\u4e0e3D\u9ad8\u65af\u6cfc\u6e85\u91cd\u5efa\uff0c\u5b9e\u73b0\u4ece\u5355\u5f20\u56fe\u7247\u5230\u591a\u89c6\u89d2\u8f93\u5165\u76843D\u5185\u5bb9\u521b\u4f5c\uff0c\u5e76\u652f\u6301\u5730\u7406\u4f4d\u7f6e\u951a\u5b9a\u7684\u5730\u56fe\u7ea7\u7a7a\u95f4\u63a2\u7d22\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11673", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "3D\u751f\u6210", "\u4e16\u754c\u6a21\u578b", "\u9ad8\u65af\u6cfc\u6e85"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11673v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ABot-3DWorld 0: A Universal World Model to Explore Any 3D Space", "tldr": "\u63d0\u51faABot-3DWorld 0\uff0c\u4e00\u4e2a\u901a\u7528\u591a\u6a21\u60013D\u4e16\u754c\u6a21\u578b\uff0c\u53ef\u5c06\u6587\u672c\u3001\u56fe\u50cf\u6216\u89c6\u9891\u8f93\u5165\u8f6c\u5316\u4e3a\u53ef\u63a2\u7d22\u7684\u9ad8\u4fdd\u771f3D\u4e16\u754c\u3002\u6838\u5fc3\u662f\u7edf\u4e00\u7684\u7a7a\u95f4\u751f\u6210\u539f\u8bed\uff08SGP\uff09\uff0c\u7ed3\u5408\u5168\u666f\u89c6\u9891\u751f\u6210\u4e0e3D\u9ad8\u65af\u6cfc\u6e85\u91cd\u5efa\uff0c\u5b9e\u73b0\u4ece\u5355\u5f20\u56fe\u7247\u5230\u591a\u89c6\u89d2\u8f93\u5165\u76843D\u5185\u5bb9\u521b\u4f5c\uff0c\u5e76\u652f\u6301\u5730\u7406\u4f4d\u7f6e\u951a\u5b9a\u7684\u5730\u56fe\u7ea7\u7a7a\u95f4\u63a2\u7d22\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper introduces Actor as Its Own Critic, a unified reinforcement learning framework, Cycle Group Relative Policy Optimization (CycleGRPO), that jointly optimizes region understanding and localization for Multimodal Large Language Models (MLLMs). Unlike existing separate pipelines, we leverage the inherent duality between the two tasks to construct a self-evaluating reinforcement learning paradigm: \"region $\\to$ text $\\to$ region\u0027\u0027. Specifically, a single MLLM first acts as the actor to generate region captions, then immediately transitions to a critic to ground its generated text back in the spatial domain. Therefore, CycleGRPO requires only region inputs, e.g., masks or bounding boxes, entirely bypassing the need for textual ground truths. A quality-aware token-level cycle-consistency reward is employed to assess the semantic discriminability of text captions via their physical localization accuracy. Empirically, built upon SAMTok, our CycleGRPO framework successfully bootstraps both capabilities simultaneously. Without any task-specific fine-tuning, the framework yields consistent performance gains across a wide range of benchmarks, including region captioning, region VQA, grounded dialogue, and referring segmentation. Overall, CycleGRPO offers a straightforward and scalable way to advance pixel-level capabilities in MLLMs. Code and models are released at https://github.com/devinxzhang/CycleGRPO.", "arxiv_id": "2607.11581", "arxiv_url": "https://arxiv.org/abs/2607.11581", "authors": ["Xin Zhang", "Haochen Wang", "Yikang Zhou", "Jason Li", "Robby T. Tan"], "brief": "\u63d0\u51faCycleGRPO\u6846\u67b6\uff0c\u8ba9\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u540c\u65f6\u5145\u5f53\u6f14\u5458\u548c\u8bc4\u8bba\u5bb6\uff0c\u901a\u8fc7\"\u533a\u57df\u2192\u6587\u672c\u2192\u533a\u57df\"\u7684\u5faa\u73af\u4e00\u81f4\u6027\u81ea\u6211\u8bc4\u4f30\u6765\u8054\u5408\u4f18\u5316\u533a\u57df\u7406\u89e3\u4e0e\u5b9a\u4f4d\u4efb\u52a1\u3002\u65e0\u9700\u6587\u672c\u6807\u6ce8\u771f\u503c\uff0c\u4ec5\u4f9d\u8d56\u533a\u57df\u8f93\u5165\uff08\u63a9\u7801\u6216\u8fb9\u754c\u6846\uff09\uff0c\u5728\u591a\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u53d6\u5f97\u4e00\u81f4\u6027\u80fd\u63d0\u5347\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11581", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u89c6\u89c9\u5b9a\u4f4d", "\u5faa\u73af\u4e00\u81f4\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11581v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Actor as Its Own Critic: Unifying Region Understanding and Localization via CycleGRPO", "tldr": "\u63d0\u51faCycleGRPO\u6846\u67b6\uff0c\u8ba9\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u540c\u65f6\u5145\u5f53\u6f14\u5458\u548c\u8bc4\u8bba\u5bb6\uff0c\u901a\u8fc7\"\u533a\u57df\u2192\u6587\u672c\u2192\u533a\u57df\"\u7684\u5faa\u73af\u4e00\u81f4\u6027\u81ea\u6211\u8bc4\u4f30\u6765\u8054\u5408\u4f18\u5316\u533a\u57df\u7406\u89e3\u4e0e\u5b9a\u4f4d\u4efb\u52a1\u3002\u65e0\u9700\u6587\u672c\u6807\u6ce8\u771f\u503c\uff0c\u4ec5\u4f9d\u8d56\u533a\u57df\u8f93\u5165\uff08\u63a9\u7801\u6216\u8fb9\u754c\u6846\uff09\uff0c\u5728\u591a\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u53d6\u5f97\u4e00\u81f4\u6027\u80fd\u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Mainstream visual encoders are pretrained on natural images and cannot be effectively applied to document images without document-oriented adaptation, as dense text and fine-grained character strokes demand character-level visual perception. We present MonkeyOCRv2, a visual-text pretrained model for document AI. First, we construct MonkeyDoc v2, to our knowledge the largest document-image pretraining corpus, comprising 113 million images spanning 17 languages. Second, we propose a pretraining strategy that jointly learns image-to-text generation and pixel-level document reconstruction: the former aligns visual representations with textual content, while the latter preserves character strokes and layout details. Extensive experiments are conducted on five representative document analysis tasks, including text recognition, formula recognition, text detection, document tampering detection, and overlapping text segmentation. Replacing the original encoders with MonkeyOCRv2 consistently improves performance across all five tasks. Finally, we validate its effectiveness as the vision encoder of multimodal large language models on the more challenging tasks of document parsing and document understanding. Kept frozen and paired with a lightweight language model, it yields a 0.7B document parsing model that sets a new open-source state-of-the-art on MDPBench, a recent benchmark spanning digital-born and photographed documents across 17 languages, surpassing the previous best 3B dots.mocr by 2.8% absolute with a vision encoder roughly 11$\\times$ smaller. The frozen encoder also powers a document understanding model that outperforms counterparts built on CLIP, DINO, and SAM across eight benchmarks under identical training settings. These results suggest that document-oriented visual pretraining can serve as a foundation for document intelligence in its own right.", "arxiv_id": "2607.11562", "arxiv_url": "https://arxiv.org/abs/2607.11562", "authors": ["Yuliang Liu", "Zhang Li", "Ziyang Zhang", "Shuo Zhang", "Qiang Liu", "Jiajun Song", "Zidun Guo", "Xinhan Wang", "Handong Zheng", "Yang Liu", "Dongliang Luo", "Zhiyin Ma", "Jiarui Zhang", "Xiang Bai"], "brief": "\u63d0\u51faMonkeyOCRv2\uff0c\u4e00\u4e2a\u9762\u5411\u6587\u6863AI\u7684\u89c6\u89c9-\u6587\u672c\u9884\u8bad\u7ec3\u57fa\u7840\u6a21\u578b\uff0c\u57fa\u4e8e1.13\u4ebf\u5f20\u8de817\u8bed\u8a00\u6587\u6863\u56fe\u50cf\u6784\u5efa\u7684\u9884\u8bad\u7ec3\u8bed\u6599\u5e93\uff0c\u8054\u5408\u5b66\u4e60\u56fe\u50cf\u5230\u6587\u672c\u751f\u6210\u4e0e\u50cf\u7d20\u7ea7\u6587\u6863\u91cd\u5efa\u3002\u4f5c\u4e3a\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u89c6\u89c9\u7f16\u7801\u5668\uff0c0.7B\u6587\u6863\u89e3\u6790\u6a21\u578b\u5728MDPBench\u4e0a\u8d85\u8d8a\u6b64\u524d\u6700\u4f183B\u6a21\u578b2.8%\uff0c\u5e76\u57288\u4e2a\u6587\u6863\u7406\u89e3\u57fa\u51c6\u4e0a\u5168\u9762\u4f18\u4e8eCLIP\u3001DINO\u548cSAM\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11562", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u6863AI", "\u89c6\u89c9\u9884\u8bad\u7ec3", "OCR", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11562v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MonkeyOCRv2: A Visual-Text Foundation Model for Document AI", "tldr": "\u63d0\u51faMonkeyOCRv2\uff0c\u4e00\u4e2a\u9762\u5411\u6587\u6863AI\u7684\u89c6\u89c9-\u6587\u672c\u9884\u8bad\u7ec3\u57fa\u7840\u6a21\u578b\uff0c\u57fa\u4e8e1.13\u4ebf\u5f20\u8de817\u8bed\u8a00\u6587\u6863\u56fe\u50cf\u6784\u5efa\u7684\u9884\u8bad\u7ec3\u8bed\u6599\u5e93\uff0c\u8054\u5408\u5b66\u4e60\u56fe\u50cf\u5230\u6587\u672c\u751f\u6210\u4e0e\u50cf\u7d20\u7ea7\u6587\u6863\u91cd\u5efa\u3002\u4f5c\u4e3a\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u89c6\u89c9\u7f16\u7801\u5668\uff0c0.7B\u6587\u6863\u89e3\u6790\u6a21\u578b\u5728MDPBench\u4e0a\u8d85\u8d8a\u6b64\u524d\u6700\u4f183B\u6a21\u578b2.8%\uff0c\u5e76\u57288\u4e2a\u6587\u6863\u7406\u89e3\u57fa\u51c6\u4e0a\u5168\u9762\u4f18\u4e8eCLIP\u3001DINO\u548cSAM\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Gaussian Splatting has emerged as an effective representation for video, but existing methods rely on per-video optimization. This leads to slow encoding and limits generalization across videos. To amortize this optimization, we propose HyperGS, a feedforward, optimization-free approach that directly predicts Gaussian representations from any video in a single forward pass, speeding up encoding and decoding by orders of magnitude while generalizing to out-of-distribution videos at higher resolutions. In HyperGS, we design a factorized spatiotemporal Transformer to extract tokens from video, and a learnable query-based Transformer to obtain 8-parameter Gaussian representations for each video frame. We find that naively predicting Gaussians across diverse videos induces a needle-like degeneration that collapses training, and address this with a rank-based geometric regularizer whose strength adapts dynamically to stabilize optimization. HyperGS achieves encoding at $10^4$--$10^5\\times$ the speed of per-video Gaussian optimization at matched reconstruction quality while generalizing zero-sho
