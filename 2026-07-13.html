e\u5f0f\u63a8\u7406\uff08CoT\uff09\u4e2d\u7684\"\u8fc7\u5ea6\u63a8\u7406\"\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u57fa\u4e8e\u4fe1\u606f\u8bba\u7684\u65e0\u8bad\u7ec3\u6307\u6807CAID\uff08\u4e0a\u4e0b\u6587\u611f\u77e5\u4fe1\u606f\u5bc6\u5ea6\uff09\uff0c\u7528\u4e8e\u8bc6\u522b\u6709\u6548\u4f46\u4f4e\u6548\u7684\u63a8\u7406\u6b65\u9aa4\uff0c\u5e76\u914d\u5957\u63d0\u51fa\u540e\u5904\u7406\u538b\u7f29\u7b56\u7565PACE\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11266", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efa\u8bca\u65ad\u57fa\u51c6RIV-GSM8K\uff0c\u6ce8\u51655\u7c7b\u63a8\u7406\u4f4e\u6548\u6a21\u5f0f\uff08\u5982\u5faa\u73af\u63a8\u7406\u3001\u8fc7\u5ea6\u5206\u89e3\uff09\uff0c\u63ed\u793a\u73b0\u6709\u8bc4\u4f30\u5668\u65e0\u6cd5\u60e9\u7f5a\"\u6709\u6548\u4f46\u5197\u4f59\"\u6b65\u9aa4\u7684\u76f2\u70b9", "CAID\u4e3a\u65e0\u9700\u8bad\u7ec3\u7684\u4fe1\u606f\u8bba\u6307\u6807\uff0c\u53ef\u91cf\u5316\u63a8\u7406\u6b65\u9aa4\u7684\u4fe1\u606f\u5bc6\u5ea6\uff0c\u533a\u5206\u5fc5\u8981\u63a8\u7406\u4e0e\u5197\u4f59\u586b\u5145", "\u5728GSM8K\u3001StrategyQA\u3001ARC-Challenge\u4e0a\uff0cPACE\u538b\u7f29\u7b56\u7565\u5c06token\u6d88\u8017\u964d\u4f4e31-53%\uff0c\u540c\u65f6\u4fdd\u6301\u51c6\u786e\u7387\uff0c\u663e\u8457\u4f18\u4e8e\u968f\u673a\u526a\u679d\u548cPRM\u538b\u7f29\u57fa\u7ebf"], "keywords": ["\u94fe\u5f0f\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u6548\u7387", "\u4fe1\u606f\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11266v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Valid $\\ne$ Necessary: Diagnosing Latent Inefficiency in Chain-of-Thought", "tldr": "\u63d0\u51faCAID\u6307\u6807\u8bc6\u522bCoT\u4e2d\u6709\u6548\u4f46\u5197\u4f59\u7684\u63a8\u7406\u6b65\u9aa4\uff0c\u538b\u7f29token\u7528\u91cf31-53%\u4e14\u4e0d\u635f\u7cbe\u5ea6", "upvotes": 0, "what_it_is": "\u672c\u6587\u9488\u5bf9\u5927\u8bed\u8a00\u6a21\u578b\u94fe\u5f0f\u63a8\u7406\uff08CoT\uff09\u4e2d\u7684\"\u8fc7\u5ea6\u63a8\u7406\"\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e00\u79cd\u57fa\u4e8e\u4fe1\u606f\u8bba\u7684\u65e0\u8bad\u7ec3\u6307\u6807CAID\uff08\u4e0a\u4e0b\u6587\u611f\u77e5\u4fe1\u606f\u5bc6\u5ea6\uff09\uff0c\u7528\u4e8e\u8bc6\u522b\u6709\u6548\u4f46\u4f4e\u6548\u7684\u63a8\u7406\u6b65\u9aa4\uff0c\u5e76\u914d\u5957\u63d0\u51fa\u540e\u5904\u7406\u538b\u7f29\u7b56\u7565PACE\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u533a\u5206\"\u903b\u8f91\u6709\u6548\"\u4e0e\"\u63a8\u7406\u5fc5\u8981\"\u4e24\u4e2a\u6982\u5ff5\uff0c\u586b\u8865\u4e86CoT\u8bc4\u4f30\u7684\u5173\u952e\u76f2\u533a\uff1b\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u90e8\u7f72\uff0c\u5bf9\u964d\u4f4eLLM\u63a8\u7406\u6210\u672c\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "When LLMs exhibit uneven performance across planning tasks, these gaps are often attributed to task difficulty. We argue that this explanation is incomplete, as task-level variation may reflect distinct latent planning competencies rather than differences along a single ability spectrum. We study this question on ACPBench-Hard by evaluating multiple LLM families under varying test-time reasoning budgets and applying a multidimensional item response theory model to uncover the latent competency structure underlying LLM planning. The analysis reveals two principal dimensions that shape planning performance: operational reasoning, the ability to evaluate local action applicability and immediate state transitions, and structural enumeration, the ability to reason about goal reachability and landmark structure. Operational reasoning improving under model scaling and longer reasoning traces, while structural enumeration remains comparatively insensitive. Our findings motivate competency-level evaluation of LLM planning, shifting the focus from whether models improve overall to which planning competencies improve, under what conditions, and why.", "arxiv_id": "2607.11197", "arxiv_url": "https://arxiv.org/abs/2607.11197", "authors": ["Sukai Huang", "Chenyuan Zhang", "Fucai Ke", "Zhixi Cai", "Naim Rastgoo", "Gholamreza Haffari", "Hamid Rezatofighi"], "brief": "\u672c\u6587\u901a\u8fc7\u591a\u7ef4\u9879\u76ee\u53cd\u5e94\u7406\u8bba\u6a21\u578b\u5206\u6790LLM\u5728ACPBench-Hard\u89c4\u5212\u57fa\u51c6\u4e0a\u7684\u8868\u73b0\uff0c\u63ed\u793aLLM\u89c4\u5212\u80fd\u529b\u7531\u4e24\u4e2a\u72ec\u7acb\u6f5c\u5728\u7ef4\u5ea6\u6784\u6210\uff1a\u64cd\u4f5c\u63a8\u7406\uff08\u5c40\u90e8\u52a8\u4f5c\u53ef\u884c\u6027\u5224\u65ad\uff09\u548c\u7ed3\u6784\u679a\u4e3e\uff08\u76ee\u6807\u53ef\u8fbe\u6027\u4e0e\u8def\u6807\u7ed3\u6784\u63a8\u7406\uff09\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11197", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4f7f\u7528\u591a\u7ef4\u9879\u76ee\u53cd\u5e94\u7406\u8bba\uff08IRT\uff09\u5bf9\u591a\u4e2aLLM\u5bb6\u65cf\u5728\u4e0d\u540c\u63a8\u7406\u9884\u7b97\u4e0b\u7684\u89c4\u5212\u8868\u73b0\u8fdb\u884c\u6f5c\u5728\u80fd\u529b\u7ed3\u6784\u5206\u6790", "\u64cd\u4f5c\u63a8\u7406\u80fd\u529b\u968f\u6a21\u578b\u89c4\u6a21\u6269\u5927\u548c\u63a8\u7406\u94fe\u52a0\u957f\u800c\u663e\u8457\u63d0\u5347\uff0c\u7ed3\u6784\u679a\u4e3e\u80fd\u529b\u5bf9\u8fd9\u4e9b\u56e0\u7d20\u4e0d\u654f\u611f", "\u63d0\u51fa\u4ece\u6574\u4f53\u89c4\u5212\u6027\u80fd\u8bc4\u4f30\u8f6c\u5411\u80fd\u529b\u7ef4\u5ea6\u7ea7\u522b\u8bc4\u4f30\u7684\u65b0\u8303\u5f0f\uff0c\u5173\u6ce8\u54ea\u7c7b\u89c4\u5212\u80fd\u529b\u5728\u4f55\u79cd\u6761\u4ef6\u4e0b\u63d0\u5347"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u89c4\u5212\u80fd\u529b", "\u8bc4\u4f30\u65b9\u6cd5", "\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11197v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "What We Talk About When We Talk About LLM Planning: Evidence for Two Distinct Planning Abilities", "tldr": "LLM\u89c4\u5212\u80fd\u529b\u5b58\u5728\u4e24\u79cd\u72ec\u7acb\u7ef4\u5ea6\uff1a\u64cd\u4f5c\u63a8\u7406\u4e0e\u7ed3\u6784\u679a\u4e3e\uff0c\u524d\u8005\u968f\u6a21\u578b\u6269\u5c55\u63d0\u5347\uff0c\u540e\u8005\u4e0d\u654f\u611f", "upvotes": 0, "what_it_is": "\u672c\u6587\u901a\u8fc7\u591a\u7ef4\u9879\u76ee\u53cd\u5e94\u7406\u8bba\u6a21\u578b\u5206\u6790LLM\u5728ACPBench-Hard\u89c4\u5212\u57fa\u51c6\u4e0a\u7684\u8868\u73b0\uff0c\u63ed\u793aLLM\u89c4\u5212\u80fd\u529b\u7531\u4e24\u4e2a\u72ec\u7acb\u6f5c\u5728\u7ef4\u5ea6\u6784\u6210\uff1a\u64cd\u4f5c\u63a8\u7406\uff08\u5c40\u90e8\u52a8\u4f5c\u53ef\u884c\u6027\u5224\u65ad\uff09\u548c\u7ed3\u6784\u679a\u4e3e\uff08\u76ee\u6807\u53ef\u8fbe\u6027\u4e0e\u8def\u6807\u7ed3\u6784\u63a8\u7406\uff09\u3002", "why_notable": "\u9996\u6b21\u7528\u5fc3\u7406\u6d4b\u91cf\u5b66\u65b9\u6cd5\uff08\u591a\u7ef4IRT\uff09\u7cfb\u7edf\u89e3\u6784LLM\u89c4\u5212\u80fd\u529b\u7684\u5185\u5728\u7ef4\u5ea6\uff0c\u6311\u6218\u4e86\"\u4efb\u52a1\u96be\u5ea6\"\u8fd9\u4e00\u5355\u4e00\u89e3\u91ca\u6846\u67b6\uff0c\u4e3a\u89c4\u5212\u80fd\u529b\u8bc4\u4f30\u548c\u6a21\u578b\u6539\u8fdb\u63d0\u4f9b\u4e86\u66f4\u7cbe\u7ec6\u7684\u7406\u8bba\u57fa\u7840"}, {"abstract": "Reinforcement learning for deep-search agents has largely focused on trajectory-level scoring -- outcome correctness, citation-aware rewards, and evidence coverage. Yet the actions that expose supporting documents receive no targeted credit, a gap we call the reward-credit mismatch. We propose STAMP, in which a reference-based verifier judges whether each cited document supports an entity or relation in a training-time evidence graph, and first-exposure attribution traces each supported citation back to the action that first surfaced it. This step credit is injected through sign-preserving advantage modulation, which redistributes advantage across steps without changing the trajectory-level reward or the relative ranking of trajectories within each group. On BrowseComp, BrowseComp-ZH, and xbench-DS, STAMP improves the GRPO baseline by +2.0/+5.5/+3.0 points under matched SFT initialization, training data, and search tools, and composes with both outcome-only and citation-rubric base rewards. Component ablations confirm that the provenance-based credit signal and the sign-preserving advantage modulation each contribute to the gains.", "arxiv_id": "2607.11172", "arxiv_url": "https://arxiv.org/abs/2607.11172", "authors": ["Ke Xu", "Han Xu", "Xinran Chen", "Yuqian Wang", "Zhixuan Li", "Xiaojian Liu", "Changwo Wu", "Jianqiang Xia", "Yuchen Li"], "brief": "\u63d0\u51faSTAMP\u6846\u67b6\uff0c\u901a\u8fc7\u6784\u5efa\u8bad\u7ec3\u65f6\u8bc1\u636e\u56fe\u5e76\u8ffd\u8e2a\u6bcf\u4e2a\u652f\u6301\u6027\u5f15\u7528\u7684\u9996\u6b21\u66b4\u9732\u52a8\u4f5c\uff0c\u5c06\u6b65\u9aa4\u7ea7\u4fe1\u7528\u6ce8\u5165\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u89e3\u51b3\u6df1\u5ea6\u641c\u7d22\u667a\u80fd\u4f53\u4e2d\u6709\u6548\u68c0\u7d22\u52a8\u4f5c\u5f97\u4e0d\u5230\u9488\u5bf9\u6027\u5956\u52b1\u7684\u95ee\u9898\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11172", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u57fa\u4e8e\u5f15\u7528\u6eaf\u6e90\u7684\u4fe1\u7528\u5206\u914d\u2014\u2014\u7528\u53c2\u8003\u9a8c\u8bc1\u5668\u5224\u65ad\u5f15\u7528\u6587\u6863\u662f\u5426\u652f\u6301\u8bc1\u636e\u56fe\u4e2d\u7684\u5b9e\u4f53/\u5173\u7cfb\uff0c\u5e76\u8ffd\u8e2a\u9996\u6b21\u66b4\u9732\u8be5\u5f15\u7528\u7684\u52a8\u4f5c", "\u6280\u672f\u624b\u6bb5\uff1a\u7b26\u53f7\u4fdd\u7559\u4f18\u52bf\u8c03\u5236\uff08sign-preserving advantage modulation\uff09\uff0c\u5728\u4e0d\u6539\u53d8\u8f68\u8ff9\u7ea7\u5956\u52b1\u6216\u7ec4\u5185\u6392\u540d\u7684\u524d\u63d0\u4e0b\u91cd\u65b0\u5206\u914d\u6b65\u9aa4\u4f18\u52bf", "\u5b9e\u9a8c\u7ed3\u679c\uff1a\u5728BrowseComp\u3001BrowseComp-ZH\u3001xbench-DS\u4e0a\u5206\u522b\u6bd4GRPO\u57fa\u7ebf\u63d0\u5347+2.0/+5.5/+3.0\u5206\uff0c\u4e14\u4e0e\u591a\u79cd\u57fa\u7840\u5956\u52b1\u51fd\u6570\u517c\u5bb9"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u4fe1\u606f\u68c0\u7d22", "\u4fe1\u7528\u5206\u914d"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11172v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "STAMP: Provenance-Guided Credit Assignment for Deep Search Agents", "tldr": "STAMP\u901a\u8fc7\u6eaf\u6e90\u5f15\u5bfc\u7684\u4fe1\u7528\u5206\u914d\u89e3\u51b3\u6df1\u5ea6\u641c\u7d22\u667a\u80fd\u4f53\u7684\u5956\u52b1-\u4fe1\u7528\u4e0d\u5339\u914d\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faSTAMP\u6846\u67b6\uff0c\u901a\u8fc7\u6784\u5efa\u8bad\u7ec3\u65f6\u8bc1\u636e\u56fe\u5e76\u8ffd\u8e2a\u6bcf\u4e2a\u652f\u6301\u6027\u5f15\u7528\u7684\u9996\u6b21\u66b4\u9732\u52a8\u4f5c\uff0c\u5c06\u6b65\u9aa4\u7ea7\u4fe1\u7528\u6ce8\u5165\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u89e3\u51b3\u6df1\u5ea6\u641c\u7d22\u667a\u80fd\u4f53\u4e2d\u6709\u6548\u68c0\u7d22\u52a8\u4f5c\u5f97\u4e0d\u5230\u9488\u5bf9\u6027\u5956\u52b1\u7684\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u660e\u786e\u63d0\u51fa\u5e76\u7cfb\u7edf\u89e3\u51b3\u6df1\u5ea6\u641c\u7d22RL\u4e2d\u7684\u300c\u5956\u52b1-\u4fe1\u7528\u4e0d\u5339\u914d\u300d\u95ee\u9898\uff0c\u65b9\u6cd5\u8f7b\u91cf\u4e14\u53ef\u7ec4\u5408\uff0c\u5728\u591a\u4e2a\u591a\u8bed\u8a00\u57fa\u51c6\u4e0a\u53d6\u5f97\u7a33\u5b9a\u63d0\u5347\uff0c\u5bf9\u641c\u7d22\u589e\u5f3a\u578bLLM\u667a\u80fd\u4f53\u8bad\u7ec3\u5177\u6709\u5b9e\u9645\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Representing manipulation actions as 2D trajectories in the camera plane provides a compact and interpretable basis for learning complex 3D manipulation policies. However, it also creates challenges from out-of-frame trajectories and limited precision. We propose Pix2Act, an imitation learning method that addresses these challenges by generating continuous image-space keypoint trajectories in each camera plane and losslessly recovering end-effector poses via triangulation. This reformulates high-dimensional 3D control as a simpler, more learnable 2D prediction problem. Crucially, it aligns observations and actions in the same coordinate space, enabling equivariant transformations to jointly rotate individual camera images together with their image-space actions. We analyze the symmetry properties of this augmentation and design a network architecture that can fuse multiple camera views while respecting their per-view rotations. As a result, Pix2Act implicitly enlarges the support of the data distribution and learns invariant action structures across transformations, yielding improved generalization and overall performance. Across diverse simulated and real-world manipulation tasks, Pix2Act outperforms state-of-the-art baselines and remains robust under camera perturbations.", "arxiv_id": "2607.11167", "arxiv_url": "https://arxiv.org/abs/2607.11167", "authors": ["Haojie Huang", "Linfeng Zhao", "Haotian Liu", "Zhang Ye", "Si-Yuan Huang", "Mingxi Jia", "Boce Hu", "Fangzhou Lin", "Yu Qi", "Dian Wang", "Robin Walters", "Robert Platt"], "brief": "Pix2Act\u662f\u4e00\u79cd\u6a21\u4eff\u5b66\u4e60\u65b9\u6cd5\uff0c\u5c063D\u64cd\u63a7\u52a8\u4f5c\u91cd\u65b0\u8868\u8ff0\u4e3a\u5404\u76f8\u673a\u5e73\u9762\u5185\u76842D\u5173\u952e\u70b9\u8f68\u8ff9\u9884\u6d4b\uff0c\u901a\u8fc7\u4e09\u89d2\u6d4b\u91cf\u65e0\u635f\u6062\u590d\u672b\u7aef\u6267\u884c\u5668\u4f4d\u59ff\uff0c\u5e76\u5229\u7528\u7b49\u53d8\u53d8\u6362\u5bf9\u56fe\u50cf\u4e0e\u52a8\u4f5c\u8fdb\u884c\u8054\u5408\u65cb\u8f6c\u589e\u5f3a\u3002", "categories": ["cs.RO", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11167", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u9ad8\u7ef43D\u63a7\u5236\u95ee\u9898\u8f6c\u5316\u4e3a\u66f4\u6613\u5b66\u4e60\u76842D\u56fe\u50cf\u7a7a\u95f4\u9884\u6d4b\u95ee\u9898\uff0c\u901a\u8fc7\u591a\u89c6\u89d2\u4e09\u89d2\u6d4b\u91cf\u6062\u590d\u7cbe\u786e3D\u4f4d\u59ff", "\u89c2\u6d4b\u4e0e\u52a8\u4f5c\u5171\u4eab\u540c\u4e00\u5750\u6807\u7a7a\u95f4\uff0c\u652f\u6301\u7b49\u53d8\u53d8\u6362\u5bf9\u76f8\u673a\u56fe\u50cf\u53ca\u5176\u5bf9\u5e94\u52a8\u4f5c\u8fdb\u884c\u8054\u5408\u65cb\u8f6c\u589e\u5f3a\uff0c\u9690\u5f0f\u6269\u5927\u6570\u636e\u5206\u5e03\u652f\u6491", "\u8bbe\u8ba1\u4e86\u80fd\u878d\u5408\u591a\u76f8\u673a\u89c6\u89d2\u540c\u65f6\u5c0a\u91cd\u5404\u89c6\u89d2\u72ec\u7acb\u65cb\u8f6c\u7684\u7f51\u7edc\u67b6\u6784\uff0c\u5728\u4eff\u771f\u548c\u771f\u5b9e\u64cd\u63a7\u4efb\u52a1\u4e2d\u5747\u4f18\u4e8eSOTA\u57fa\u7ebf\uff0c\u4e14\u5bf9\u76f8\u673a\u6270\u52a8\u5177\u6709\u9c81\u68d2\u6027"], "keywords": ["\u673a\u5668\u4eba\u64cd\u63a7", "\u6a21\u4eff\u5b66\u4e60", "\u7b49\u53d8\u589e\u5f3a", "\u591a\u89c6\u89d2\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11167v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Pix2Act: Image-Space Manipulation Policies with Equivariant Augmentation", "tldr": "\u5c06\u673a\u68b0\u81c2\u64cd\u4f5c\u52a8\u4f5c\u8868\u793a\u4e3a2D\u56fe\u50cf\u8f68\u8ff9\uff0c\u7ed3\u5408\u7b49\u53d8\u589e\u5f3a\u5b9e\u73b0\u9ad8\u65483D\u64cd\u63a7\u7b56\u7565\u5b66\u4e60", "upvotes": 0, "what_it_is": "Pix2Act\u662f\u4e00\u79cd\u6a21\u4eff\u5b66\u4e60\u65b9\u6cd5\uff0c\u5c063D\u64cd\u63a7\u52a8\u4f5c\u91cd\u65b0\u8868\u8ff0\u4e3a\u5404\u76f8\u673a\u5e73\u9762\u5185\u76842D\u5173\u952e\u70b9\u8f68\u8ff9\u9884\u6d4b\uff0c\u901a\u8fc7\u4e09\u89d2\u6d4b\u91cf\u65e0\u635f\u6062\u590d\u672b\u7aef\u6267\u884c\u5668\u4f4d\u59ff\uff0c\u5e76\u5229\u7528\u7b49\u53d8\u53d8\u6362\u5bf9\u56fe\u50cf\u4e0e\u52a8\u4f5c\u8fdb\u884c\u8054\u5408\u65cb\u8f6c\u589e\u5f3a\u3002", "why_notable": "\u901a\u8fc7\u5c06\u52a8\u4f5c\u7a7a\u95f4\u4e0e\u56fe\u50cf\u7a7a\u95f4\u5bf9\u9f50\uff0c\u5de7\u5999\u5730\u5c06\u7b49\u53d8\u6570\u636e\u589e\u5f3a\u5f15\u5165\u673a\u5668\u4eba\u64cd\u63a7\u7b56\u7565\u5b66\u4e60\uff0c\u5728\u4e0d\u589e\u52a0\u989d\u5916\u6807\u6ce8\u7684\u60c5\u51b5\u4e0b\u663e\u8457\u63d0\u5347\u6cdb\u5316\u80fd\u529b\u548c\u9c81\u68d2\u6027\uff0c\u4e3a\u591a\u89c6\u89d2\u673a\u5668\u4eba\u5b66\u4e60\u63d0\u4f9b\u4e86\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Large Language Models (LLMs) have achieved remarkable success in complex reasoning tasks through Chain-of-Thought (CoT) prompting. However, these models often exhibit \"computational overthinking,\" generating redundant reasoning steps that increase latency and cost without improving accuracy. Recent studies suggest that CoT trajectories can be significantly pruned, yet existing methods often rely on forcing a static thinking budget, heuristic filtering, sub-optimal early exit via classification, or expensive re-training. In this paper, we introduce OS-Pruner, a lightweight plug-in framework that formulates chain-of-thought pruning as an optimal stopping problem. Given a reasoning prefix, OS-Pruner learns whether further reasoning is worth its token cost by optimizing an explicit utility that trades off final-answer accuracy against generated length. Our novel formulation enables the model to dynamically assess the sufficient point of termination for a reasoning chain. OS-Pruner is designed to be lightweight during both training and inference, and to provide users with fine-grained control over the reasoning-effort vs. accuracy trade-off. On diverse reasoning benchmarks and base models, OS-Pruner achieves 20-60\\% reduction in generation length with minimal accuracy sacrifice.", "arxiv_id": "2607.11089", "arxiv_url": "https://arxiv.org/abs/2607.11089", "authors": ["Mohammed Ehab", "Aymane El Gadarri", "Vivek F. Farias", "Adam Jozefiak", "Ciamac C. Moallemi"], "brief": "\u63d0\u51faOS-Pruner\u6846\u67b6\uff0c\u5c06\u5927\u8bed\u8a00\u6a21\u578b\u7684\u601d\u7ef4\u94fe\u526a\u679d\u5f62\u5f0f\u5316\u4e3a\u6700\u4f18\u505c\u6b62\u95ee\u9898\uff0c\u901a\u8fc7\u4f18\u5316\u6743\u8861\u51c6\u786e\u7387\u4e0e\u751f\u6210\u957f\u5ea6\u7684\u6548\u7528\u51fd\u6570\uff0c\u52a8\u6001\u5224\u65ad\u63a8\u7406\u94fe\u7684\u6700\u4f73\u7ec8\u6b62\u65f6\u673a\uff0c\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u6a21\u578b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11089", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06CoT\u526a\u679d\u5efa\u6a21\u4e3a\u6700\u4f18\u505c\u6b62\u95ee\u9898\uff0c\u5b66\u4e60\u63a8\u7406\u524d\u7f00\u662f\u5426\u503c\u5f97\u7ee7\u7eed\u751f\u6210\u7684\u5224\u65ad\u673a\u5236", "\u8f7b\u91cf\u7ea7\u63d2\u4ef6\u6846\u67b6\uff0c\u8bad\u7ec3\u548c\u63a8\u7406\u9636\u6bb5\u5f00\u9500\u5747\u8f83\u4f4e\uff0c\u652f\u6301\u7528\u6237\u7ec6\u7c92\u5ea6\u63a7\u5236\u63a8\u7406\u6548\u7387\u4e0e\u51c6\u786e\u7387\u7684\u6743\u8861", "\u5728\u591a\u79cd\u63a8\u7406\u57fa\u51c6\u548c\u57fa\u7840\u6a21\u578b\u4e0a\u5b9e\u73b020%-60%\u7684\u751f\u6210\u957f\u5ea6\u7f29\u51cf\uff0c\u540c\u65f6\u51c6\u786e\u7387\u635f\u5931\u6781\u5c0f"], "keywords": ["\u63a8\u7406\u6a21\u578b", "\u601d\u7ef4\u94fe", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6548\u7387\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11089v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "OS-Pruner: Pruning Chains-of-Thought of Reasoning Models via Optimal Stopping", "tldr": "OS-Pruner\u5c06CoT\u63a8\u7406\u526a\u679d\u5efa\u6a21\u4e3a\u6700\u4f18\u505c\u6b62\u95ee\u9898\uff0c\u52a8\u6001\u51b3\u5b9a\u63a8\u7406\u94fe\u7ec8\u6b62\u70b9", "upvotes": 0, "what_it_is": "\u63d0\u51faOS-Pruner\u6846\u67b6\uff0c\u5c06\u5927\u8bed\u8a00\u6a21\u578b\u7684\u601d\u7ef4\u94fe\u526a\u679d\u5f62\u5f0f\u5316\u4e3a\u6700\u4f18\u505c\u6b62\u95ee\u9898\uff0c\u901a\u8fc7\u4f18\u5316\u6743\u8861\u51c6\u786e\u7387\u4e0e\u751f\u6210\u957f\u5ea6\u7684\u6548\u7528\u51fd\u6570\uff0c\u52a8\u6001\u5224\u65ad\u63a8\u7406\u94fe\u7684\u6700\u4f73\u7ec8\u6b62\u65f6\u673a\uff0c\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u6a21\u578b\u3002", "why_notable": "\u9488\u5bf9LLM\u63a8\u7406\u0027\u8fc7\u5ea6\u601d\u8003\u0027\u95ee\u9898\u63d0\u4f9b\u4e86\u7406\u8bba\u4f18\u96c5\u4e14\u5b9e\u7528\u7684\u89e3\u51b3\u65b9\u6848\uff0c\u65e0\u9700\u6602\u8d35\u7684\u91cd\u8bad\u7ec3\uff0c\u5373\u63d2\u5373\u7528\uff0c\u53ef\u663e\u8457\u964d\u4f4e\u63a8\u7406\u5ef6\u8fdf\u548c\u6210\u672c\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Existing benchmarks for scientific data analysis evaluate LLMs primarily on code execution or workflow completion, overlooking that scientific analysis serves to support distinct types of scientific claims: hypothesis exploration, statistical inference, mechanistic explanation, each with different assumptions and validity criteria. We introduce SDABench, a benchmark that reorganizes evaluation around six capabilities (descriptive, exploratory, inferential, predictive, causal, and mechanistic) across five domains (Biology, Chemistry, Environment, Geography, Physics). SDABench comprises 527 real-data instances (SDA-Real) and 6000 synthetic instances (SDA-Synth), each in both multiple-choice and open-ended formats, constructed through an automated pipeline. Evaluating 15 representative LLMs, we find that models handle descriptive analysis well but degrade sharply on tasks requiring assumption selection, latent-process modeling, or mechanistic reasoning. SDABench further provides a five-stage error analysis framework that locates where LLMs fail: more advanced models more reliably identify the relevant scope and variables, but still struggle to select appropriate analytical procedures, model variable relationships, and draw valid conclusions.", "arxiv_id": "2607.11079", "arxiv_url": "https://arxiv.org/abs/2607.11079", "authors": ["Chuhan Shi", "Xiaoquan Ren", "Sicheng Song", "Haobo Li", "Rui Sheng", "Yushi Sun"], "brief": "\u63d0\u51faSDABench\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5c06\u79d1\u5b66\u6570\u636e\u5206\u6790\u91cd\u7ec4\u4e3a\u516d\u79cd\u80fd\u529b\u7ef4\u5ea6\uff08\u63cf\u8ff0\u3001\u63a2\u7d22\u3001\u63a8\u65ad\u3001\u9884\u6d4b\u3001\u56e0\u679c\u3001\u673a\u5236\uff09\uff0c\u6db5\u76d6\u751f\u7269\u3001\u5316\u5b66\u3001\u73af\u5883\u3001\u5730\u7406\u3001\u7269\u7406\u4e94\u5927\u9886\u57df\uff0c\u5305\u542b527\u4e2a\u771f\u5b9e\u6570\u636e\u5b9e\u4f8b\u548c6000\u4e2a\u5408\u6210\u5b9e\u4f8b\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u7684\u79d1\u5b66\u53d1\u73b0\u80fd\u529b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11079", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u516d\u7ef4\u80fd\u529b\u6846\u67b6\uff1a\u63cf\u8ff0\u6027\u3001\u63a2\u7d22\u6027\u3001\u63a8\u65ad\u6027\u3001\u9884\u6d4b\u6027\u3001\u56e0\u679c\u6027\u3001\u673a\u5236\u6027\u5206\u6790\uff0c\u5404\u6709\u4e0d\u540c\u5047\u8bbe\u4e0e\u6709\u6548\u6027\u6807\u51c6", "\u8bc4\u6d4b15\u4e2a\u4e3b\u6d41LLM\uff0c\u53d1\u73b0\u6a21\u578b\u5728\u63cf\u8ff0\u6027\u5206\u6790\u8868\u73b0\u826f\u597d\uff0c\u4f46\u5728\u5047\u8bbe\u9009\u62e9\u3001\u6f5c\u5728\u8fc7\u7a0b\u5efa\u6a21\u548c\u673a\u5236\u63a8\u7406\u4e0a\u663e\u8457\u9000\u5316", "\u63d0\u4f9b\u4e94\u9636\u6bb5\u9519\u8bef\u5206\u6790\u6846\u67b6\uff0c\u5b9a\u4f4dLLM\u5931\u8d25\u73af\u8282\uff1a\u9ad8\u7ea7\u6a21\u578b\u80fd\u8bc6\u522b\u53d8\u91cf\u8303\u56f4\uff0c\u4f46\u4ecd\u96be\u4ee5\u9009\u62e9\u5408\u9002\u5206\u6790\u6d41\u7a0b\u548c\u5f97\u51fa\u6709\u6548\u7ed3\u8bba"], "keywords": ["\u79d1\u5b66\u53d1\u73b0", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u80fd\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11079v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Are LLMs Ready for Scientific Discovery? A Capability-Oriented Benchmark for AI Scientists", "tldr": "SDABench\uff1a\u9762\u5411\u79d1\u5b66\u53d1\u73b0\u7684LLM\u80fd\u529b\u8bc4\u6d4b\u57fa\u51c6\uff0c\u8986\u76d6\u516d\u7c7b\u5206\u6790\u80fd\u529b\u4e0e\u4e94\u5927\u9886\u57df", "upvotes": 0, "what_it_is": "\u63d0\u51faSDABench\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5c06\u79d1\u5b66\u6570\u636e\u5206\u6790\u91cd\u7ec4\u4e3a\u516d\u79cd\u80fd\u529b\u7ef4\u5ea6\uff08\u63cf\u8ff0\u3001\u63a2\u7d22\u3001\u63a8\u65ad\u3001\u9884\u6d4b\u3001\u56e0\u679c\u3001\u673a\u5236\uff09\uff0c\u6db5\u76d6\u751f\u7269\u3001\u5316\u5b66\u3001\u73af\u5883\u3001\u5730\u7406\u3001\u7269\u7406\u4e94\u5927\u9886\u57df\uff0c\u5305\u542b527\u4e2a\u771f\u5b9e\u6570\u636e\u5b9e\u4f8b\u548c6000\u4e2a\u5408\u6210\u5b9e\u4f8b\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u7684\u79d1\u5b66\u53d1\u73b0\u80fd\u529b\u3002", "why_notable": "\u73b0\u6709\u57fa\u51c6\u4ec5\u5173\u6ce8\u4ee3\u7801\u6267\u884c\u6216\u6d41\u7a0b\u5b8c\u6210\uff0c\u5ffd\u89c6\u79d1\u5b66\u4e3b\u5f20\u7684\u7c7b\u578b\u5dee\u5f02\uff1bSDABench\u9996\u6b21\u7cfb\u7edf\u63ed\u793aLLM\u5728\u79d1\u5b66\u63a8\u7406\u94fe\u6761\u4e2d\u7684\u5177\u4f53\u77ed\u677f\uff0c\u5bf9AI\u79d1\u5b66\u5bb6\u7814\u7a76\u8def\u7ebf\u56fe\u5177\u6709\u91cd\u8981\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Despite progress in Embodied AI, Vision-and-Language Navigation systems remain vulnerable to adversarial visual disturbances. Most existing methods rely on white-box access to target model gradients, which is often unrealistic for real-world deployed systems and computationally exhaustive due to recursive backpropagation for optimization, limiting their applicability. While previous black-box methods predominantly target single-step, instantaneous decision tasks, they struggle to handle the task complexities and temporal dependencies. This highlights the need for a gradient-free attack method that can effectively disrupt the multistep sequential perception-action loop using only observable inputs and outputs. Therefore, we propose AdvNav, a behavior-guided black-box adversarial attack framework that disturbs an agent\u0027s first-person views during navigation. To construct an informative surrogate objective for effective optimization guidance in gradient-free search under the black-box setting, we design a dual-granularity behavior-based feedback, aggregating a trajectory-level performance score representing overall navigation degradation, an action-level reward score considering the potential decision risk, and a deviation indicator, all of which are extracted from the agent\u0027s self-output behaviors. This feedback guides a hybrid optimization strategy that heuristically tunes perturbation strength via adaptive updates and evolves noise spatial structure genetically, to iteratively discover the most disruptive noise configuration. Evaluated against Transformer-based HAMT and LLM-based MapGPT with two types of backbones on R2R dataset, AdvNav achieves 49.70/65.96/87.30% Attack Success Rate. The result demonstrates the effectiveness and generality of AdvNav, reveals critical perception vulnerabilities and offers insights for the design of future resilient VLN models.", "arxiv_id": "2607.11063", "arxiv_url": "https://arxiv.org/abs/2607.11063", "authors": ["Chenyang Li", "Kaige Li", "Zeyu Jiang", "Changhao Chen"], "brief": "AdvNav\u662f\u4e00\u79cd\u57fa\u4e8e\u884c\u4e3a\u5f15\u5bfc\u7684\u9ed1\u76d2\u5bf9\u6297\u653b\u51fb\u6846\u67b6\uff0c\u901a\u8fc7\u6270\u52a8\u667a\u80fd\u4f53\u7b2c\u4e00\u4eba\u79f0\u89c6\u56fe\u6765\u653b\u51fb\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\uff08VLN\uff09\u7cfb\u7edf\uff0c\u65e0\u9700\u8bbf\u95ee\u76ee\u6807\u6a21\u578b\u68af\u5ea6\uff0c\u4ec5\u5229\u7528\u53ef\u89c2\u6d4b\u7684\u8f93\u5165\u8f93\u51fa\u884c\u4e3a\u4fe1\u606f\u6784\u5efa\u4ee3\u7406\u76ee\u6807\u51fd\u6570\u8fdb\u884c\u4f18\u5316\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11063", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u8bbe\u8ba1\u53cc\u7c92\u5ea6\u884c\u4e3a\u53cd\u9988\u673a\u5236\uff1a\u878d\u5408\u8f68\u8ff9\u7ea7\u6027\u80fd\u5206\u6570\u3001\u52a8\u4f5c\u7ea7\u5956\u52b1\u5206\u6570\u548c\u504f\u5dee\u6307\u6807\uff0c\u4ece\u667a\u80fd\u4f53\u81ea\u8eab\u8f93\u51fa\u884c\u4e3a\u4e2d\u63d0\u53d6\u4f18\u5316\u4fe1\u53f7", "\u91c7\u7528\u6df7\u5408\u4f18\u5316\u7b56\u7565\uff1a\u81ea\u9002\u5e94\u66f4\u65b0\u542f\u53d1\u5f0f\u8c03\u6574\u6270\u52a8\u5f3a\u5ea6\uff0c\u9057\u4f20\u7b97\u6cd5\u6f14\u5316\u566a\u58f0\u7a7a\u95f4\u7ed3\u6784\uff0c\u8fed\u4ee3\u53d1\u73b0\u6700\u5177\u7834\u574f\u6027\u7684\u566a\u58f0\u914d\u7f6e", "\u5728R2R\u6570\u636e\u96c6\u4e0a\u9488\u5bf9Transformer-based HAMT\u548cLLM-based MapGPT\u5b9e\u73b049.70/65.96/87.30%\u7684\u653b\u51fb\u6210\u529f\u7387"], "keywords": ["\u667a\u80fd\u4f53", "\u5bf9\u6297\u653b\u51fb", "\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a", "\u9ed1\u76d2\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11063v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "AdvNav: Behavior-Guided Black-Box Adversarial Attacks on Vision-Language Navigation", "tldr": "\u63d0\u51faAdvNav\u9ed1\u76d2\u5bf9\u6297\u653b\u51fb\u6846\u67b6\uff0c\u65e0\u9700\u68af\u5ea6\u5373\u53ef\u6709\u6548\u5e72\u6270\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u7cfb\u7edf", "upvotes": 0, "what_it_is": "AdvNav\u662f\u4e00\u79cd\u57fa\u4e8e\u884c\u4e3a\u5f15\u5bfc\u7684\u9ed1\u76d2\u5bf9\u6297\u653b\u51fb\u6846\u67b6\uff0c\u901a\u8fc7\u6270\u52a8\u667a\u80fd\u4f53\u7b2c\u4e00\u4eba\u79f0\u89c6\u56fe\u6765\u653b\u51fb\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\uff08VLN\uff09\u7cfb\u7edf\uff0c\u65e0\u9700\u8bbf\u95ee\u76ee\u6807\u6a21\u578b\u68af\u5ea6\uff0c\u4ec5\u5229\u7528\u53ef\u89c2\u6d4b\u7684\u8f93\u5165\u8f93\u51fa\u884c\u4e3a\u4fe1\u606f\u6784\u5efa\u4ee3\u7406\u76ee\u6807\u51fd\u6570\u8fdb\u884c\u4f18\u5316\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9\u591a\u6b65\u5e8f\u5217VLN\u4efb\u52a1\u7684\u9ed1\u76d2\u5bf9\u6297\u653b\u51fb\u65b9\u6cd5\uff0c\u89e3\u51b3\u4e86\u73b0\u5b9e\u90e8\u7f72\u573a\u666f\u4e2d\u65e0\u6cd5\u83b7\u53d6\u6a21\u578b\u68af\u5ea6\u7684\u5b9e\u9645\u9650\u5236\uff0c\u63ed\u793a\u4e86\u5f53\u524dVLN\u6a21\u578b\u7684\u611f\u77e5\u8106\u5f31\u6027\uff0c\u4e3a\u8bbe\u8ba1\u66f4\u9c81\u68d2\u7684\u5bfc\u822a\u6a21\u578b\u63d0\u4f9b\u91cd\u8981\u53c2\u8003\u3002"}, {"abstract": "As mobile robots become more integrated into everyday human environments, social robot navigation is becoming essential for ensuring human comfort, safety, and trust. While reinforcement learning (RL) navigation policies provide the fast inference and reactive behavior necessary for real-time deployment, they still lack flexible semantic reasoning capabilities and often fail to generalize to complex social scenarios. Recent approaches have increasingly turned to vision-language models (VLMs) in place of RL policies to improve semantic and social reasoning in robot navigation. Nevertheless, their high computational cost and slow inference remain major barriers to real-time deployment. To overcome these limitations, we introduce HUMA (Hybrid Understanding for Multi-modal social Navigation), a hybrid architecture that dynamically balances the computational efficiency of RL policies with the deep semantic understanding of VLMs. Our approach uses a reactive RL policy to handle low-density, routine navigation tasks, while conditioning it on a post-trained high-level VLM when a human enters sensitive situations, such as the robot\u0027s proximity zone. We evaluate HUMA on the Social-MP3D and Social-HM3D benchmarks, where it achieves task success improvements of 20% and 3%, respectively, while significantly reducing personal space violations and human collisions against state-of-the-art baselines. Extensive ablation studies validate each architectural component, and real-world deployment on the Miroka\u00ef mobile robot further demonstrates the practical viability of our approach.", "arxiv_id": "2607.10991", "arxiv_url": "https://arxiv.org/abs/2607.10991", "authors": ["Ali Ahmadi", "Hamed Rahimi", "Adrien Jacquet Cretides", "Marie Samson", "Mahdi Khoramshahi", "Mohamed Chetouani"], "brief": "\u63d0\u51faHUMA\u6df7\u5408\u67b6\u6784\uff0c\u5c06\u5f3a\u5316\u5b66\u4e60\u5bfc\u822a\u7b56\u7565\u4e0e\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7ed3\u5408\uff1a\u5e38\u89c4\u573a\u666f\u7531RL\u7b56\u7565\u5feb\u901f\u5904\u7406\uff0c\u5f53\u4eba\u7c7b\u8fdb\u5165\u673a\u5668\u4eba\u654f\u611f\u533a\u57df\u65f6\u52a8\u6001\u8c03\u7528VLM\u8fdb\u884c\u6df1\u5ea6\u8bed\u4e49\u63a8\u7406\uff0c\u5b9e\u73b0\u9ad8\u6548\u793e\u4ea4\u5bfc\u822a\u3002", "categories": ["cs.RO", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10991", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6761\u4ef6\u89e6\u53d1\u673a\u5236\uff1a\u4ec5\u5728\u4eba\u7c7b\u8fdb\u5165\u673a\u5668\u4eba\u8fd1\u8ddd\u79bb\u533a\u57df\u7b49\u654f\u611f\u60c5\u5883\u65f6\u6fc0\u6d3bVLM\u63a8\u7406\uff0c\u907f\u514d\u6301\u7eed\u9ad8\u8ba1\u7b97\u5f00\u9500", "\u5728Social-MP3D\u548cSocial-HM3D\u57fa\u51c6\u4e0a\u4efb\u52a1\u6210\u529f\u7387\u5206\u522b\u63d0\u534720%\u548c3%\uff0c\u540c\u65f6\u663e\u8457\u51cf\u5c11\u4e2a\u4eba\u7a7a\u95f4\u4fb5\u72af\u548c\u78b0\u649e", "\u5728Miroka\u00ef\u771f\u5b9e\u79fb\u52a8\u673a\u5668\u4eba\u4e0a\u5b8c\u6210\u90e8\u7f72\u9a8c\u8bc1\uff0c\u8bc1\u660e\u65b9\u6848\u5b9e\u9645\u53ef\u884c\u6027"], "keywords": ["\u793e\u4ea4\u5bfc\u822a", "\u5f3a\u5316\u5b66\u4e60", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10991v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Think When It Matters: Conditional VLM Reasoning for Social Navigation with RL Policies", "tldr": "\u6df7\u5408\u67b6\u6784HUMA\u7ed3\u5408RL\u7b56\u7565\u4e0eVLM\uff0c\u5b9e\u73b0\u9ad8\u6548\u793e\u4ea4\u673a\u5668\u4eba\u5bfc\u822a", "upvotes": 0, "what_it_is": "\u63d0\u51faHUMA\u6df7\u5408\u67b6\u6784\uff0c\u5c06\u5f3a\u5316\u5b66\u4e60\u5bfc\u822a\u7b56\u7565\u4e0e\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7ed3\u5408\uff1a\u5e38\u89c4\u573a\u666f\u7531RL\u7b56\u7565\u5feb\u901f\u5904\u7406\uff0c\u5f53\u4eba\u7c7b\u8fdb\u5165\u673a\u5668\u4eba\u654f\u611f\u533a\u57df\u65f6\u52a8\u6001\u8c03\u7528VLM\u8fdb\u884c\u6df1\u5ea6\u8bed\u4e49\u63a8\u7406\uff0c\u5b9e\u73b0\u9ad8\u6548\u793e\u4ea4\u5bfc\u822a\u3002", "why_notable": "\u9996\u6b21\u5c06VLM\u7684\u8bed\u4e49\u63a8\u7406\u80fd\u529b\u4ee5\u6761\u4ef6\u89e6\u53d1\u65b9\u5f0f\u5d4c\u5165RL\u5bfc\u822a\u6846\u67b6\uff0c\u517c\u987e\u5b9e\u65f6\u6027\u4e0e\u793e\u4ea4\u667a\u80fd\uff0c\u4e3a\u673a\u5668\u4eba\u5728\u4eba\u7c7b\u73af\u5883\u4e2d\u7684\u5b89\u5168\u90e8\u7f72\u63d0\u4f9b\u4e86\u5b9e\u7528\u89e3\u51b3\u65b9\u6848\u3002"}, {"abstract": "We introduce Self-Verified Reasoner (SVR-R1), a multi-turn RL framework that turns a model\u0027s own verification into a learning signal for multimodal reasoning. For each query, the model proposes an answer using the same weights, and issues a binary self-verdict (Yes/No). A \u0027No\u0027 triggers a second-chance rethink; a \u0027Yes,\u0027 or a turn cap, finalizes the output for computing the outcome-based reward. SVR-R1 is implemented with GRPO and an asynchronous multi-turn rollout framework and needs no external supervision or auxiliary critics. We evaluate SVR-R1 on vision-language reasoning benchmarks and show that it improves accuracy by a large margin over strong standard GRPO baselines. Training dynamics show decreasing reliance on verification-fewer verification turns, yet higher test accuracy-indicating that the gap between verification and generation narrows as the policy internalizes self-correction and chooses the most confident answer via our framework. SVR-R1 bridges the less explored intersection of inference-time self-refinement and RL training for VLMs, offering a simple yet effective recipe for bootstrapping multimodal reasoning. We will open-source \\textbf{SVR-R1} to facilitate future research in VLMs.", "arxiv_id": "2607.10966", "arxiv_url": "https://arxiv.org/abs/2607.10966", "authors": ["Mingyuan Wu", "Jingcheng Yang", "Shengyi Qian", "Xudong Wang", "Jize Jiang", "Qifan Wang", "Aashu Singh", "Khoi Pham", "Fei Liu", "Zhaolun Su", "Zhuokai Zhao", "Klara Nahrstedt", "Jianyu Wang", "Hanchao Yu"], "brief": "\u63d0\u51faSVR-R1\u6846\u67b6\uff0c\u8ba9\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u591a\u8f6eRL\u8bad\u7ec3\u4e2d\u81ea\u6211\u9a8c\u8bc1\u7b54\u6848\uff08Yes/No\u5224\u65ad\uff09\uff0c\"No\"\u89e6\u53d1\u91cd\u65b0\u601d\u8003\uff0c\u4ee5\u6b64\u4f5c\u4e3a\u5b66\u4e60\u4fe1\u53f7\uff0c\u65e0\u9700\u5916\u90e8\u76d1\u7763\u6216\u8f85\u52a9\u8bc4\u5224\u6a21\u578b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10966", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u57fa\u4e8eGRPO\u5b9e\u73b0\u5f02\u6b65\u591a\u8f6erollout\uff0c\u6a21\u578b\u7528\u540c\u4e00\u6743\u91cd\u5b8c\u6210\u7b54\u6848\u751f\u6210\u4e0e\u4e8c\u5143\u81ea\u6211\u9a8c\u8bc1", "\u9a8c\u8bc1\u5931\u8d25\uff08No\uff09\u89e6\u53d1\u7b2c\u4e8c\u6b21\u63a8\u7406\u673a\u4f1a\uff0c\u6700\u7ec8\u8f93\u51fa\u7528\u4e8e\u8ba1\u7b97\u57fa\u4e8e\u7ed3\u679c\u7684\u5956\u52b1", "\u8bad\u7ec3\u52a8\u6001\u663e\u793a\uff1a\u968f\u8bad\u7ec3\u63a8\u8fdb\uff0c\u9a8c\u8bc1\u8f6e\u6b21\u51cf\u5c11\u4f46\u51c6\u786e\u7387\u63d0\u5347\uff0c\u8bf4\u660e\u6a21\u578b\u9010\u6e10\u5185\u5316\u81ea\u6211\u7ea0\u9519\u80fd\u529b"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u81ea\u6211\u7ea0\u9519"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10966v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SVR-R1: Bootstrapping Multi-modal Reasoning with Self-verification in Reinforcement Learning", "tldr": "SVR-R1\uff1a\u7528\u81ea\u6211\u9a8c\u8bc1\u4f5c\u4e3a\u5f3a\u5316\u5b66\u4e60\u4fe1\u53f7\uff0c\u63d0\u5347\u591a\u6a21\u6001\u63a8\u7406\u80fd\u529b\u7684\u591a\u8f6eRL\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faSVR-R1\u6846\u67b6\uff0c\u8ba9\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u591a\u8f6eRL\u8bad\u7ec3\u4e2d\u81ea\u6211\u9a8c\u8bc1\u7b54\u6848\uff08Yes/No\u5224\u65ad\uff09\uff0c\"No\"\u89e6\u53d1\u91cd\u65b0\u601d\u8003\uff0c\u4ee5\u6b64\u4f5c\u4e3a\u5b66\u4e60\u4fe1\u53f7\uff0c\u65e0\u9700\u5916\u90e8\u76d1\u7763\u6216\u8f85\u52a9\u8bc4\u5224\u6a21\u578b\u3002", "why_notable": "\u5c06\u63a8\u7406\u65f6\u81ea\u6211\u7cbe\u70bc\u4e0eRL\u8bad\u7ec3\u7ed3\u5408\uff0c\u65e0\u9700\u989d\u5916\u76d1\u7763\u4fe1\u53f7\u5373\u53ef\u663e\u8457\u8d85\u8d8a\u6807\u51c6GRPO\u57fa\u7ebf\uff0c\u4e3aVLM\u591a\u6a21\u6001\u63a8\u7406\u63d0\u4f9b\u7b80\u6d01\u6709\u6548\u7684\u81ea\u4e3e\u65b9\u6848\uff0c\u5e76\u8ba1\u5212\u5f00\u6e90\u3002"}, {"abstract": "Large language models (LLMs) are rapidly shifting toward agents that solve tasks through diverse interfaces, including web and graphical user interfaces (GUIs). Among these, the terminal command line provides a text-based, general-purpose interface, covering tasks from system operations to data science and machine learning. However, scaling terminal-agent training remains challenging, as it requires diverse and coherent task instructions, executable environments, and reliable verification, while lacking naturally grounded supervision data. In this work, we propose SETA, a scalable framework for generating verifiable terminal environments for reinforcement learning (RL). The framework consists of two pipelines sharing a unified verification mechanism: SETA-Synth converts diverse sources into standardized RL environments, and SETA-Evol further expands from existing environments with adaptive control of difficulty and diversity. Together, we construct and release SETA-Env, the largest open-source verifiable terminal RL dataset to date, containing over 4,500 environments. We evaluate our dataset by training Qwen3-8B with GRPO on SETA-Env, achieving 12% pass rate on Terminal-Bench 2.0, the best reported result for an RL-trained model at the 8B scale. We further observe gains on DeepSeek-V4-Flash under the same terminal agent harness, with pass@1 on Terminal-Bench 2.0 improving from 40% to 43% and pass@5 improving from 54% to 58%. These results demonstrate that SETA- Env provides high-quality training environments for terminal agents and serves as a valuable resource for advancing research on terminal-based agent learning.", "arxiv_id": "2607.10891", "arxiv_url": "https://arxiv.org/abs/2607.10891", "authors": ["Qijia Shen", "Zhiqi Huang", "Vamsidhar Kamanuru", "Aznaur Aliev", "Jay Rainton", "Ahmed Awelkair", "Zhichen Zeng", "Jiajun Li", "Shi Dong", "Yueming Yuan", "Boyuan Ma", "Qizheng Zhang", "Jiwei Fu", "Yuzhen Mao", "Wendong Fan", "Ping Nie", "Philip Torr", "Bernard Ghanem", "Changran Hu", "Jonathan Lingjie Li", "Urmish Thakker", "Guohao Li"], "brief": "\u63d0\u51faSETA\u6846\u67b6\uff0c\u901a\u8fc7\u4e24\u6761\u6d41\u6c34\u7ebf\uff08SETA-Synth\u548cSETA-Evol\uff09\u81ea\u52a8\u751f\u6210\u591a\u6837\u5316\u3001\u53ef\u9a8c\u8bc1\u7684\u7ec8\u7aef\u547d\u4ee4\u884cRL\u8bad\u7ec3\u73af\u5883\uff0c\u5e76\u53d1\u5e03\u542b4500+\u73af\u5883\u7684\u5f00\u6e90\u6570\u636e\u96c6SETA-Env\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10891", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["SETA-Synth\u5c06\u591a\u79cd\u6765\u6e90\u8f6c\u5316\u4e3a\u6807\u51c6\u5316RL\u73af\u5883\uff0cSETA-Evol\u81ea\u9002\u5e94\u63a7\u5236\u96be\u5ea6\u4e0e\u591a\u6837\u6027\u8fdb\u884c\u6269\u5c55", "\u8bad\u7ec3Qwen3-8B\u5728Terminal-Bench 2.0\u4e0a\u8fbe\u523012%\u901a\u8fc7\u7387\uff0c\u4e3a8B\u89c4\u6a21RL\u8bad\u7ec3\u6a21\u578b\u6700\u4f18\u7ed3\u679c", "DeepSeek-V4-Flash\u7ecfSETA-Env\u8bad\u7ec3\u540epass@1\u4ece40%\u63d0\u5347\u81f343%\uff0cpass@5\u4ece54%\u63d0\u5347\u81f358%"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u4ee3\u7801\u751f\u6210", "\u6570\u636e\u5408\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10891v1", "published_at": "2026-07-12", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SETA: Scaling Environments for Terminal Agents", "tldr": "SETA\u6846\u67b6\u4e3a\u7ec8\u7aef\u547d\u4ee4\u884c\u667a\u80fd\u4f53\u751f\u6210\u53ef\u9a8c\u8bc1\u7684\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u73af\u5883\uff0c\u6784\u5efa\u4e86\u6700\u5927\u5f00\u6e90\u6570\u636e\u96c6", "upvotes": 0, "what_it_is": "\u63d0\u51faSETA\u6846\u67b6\uff0c\u901a\u8fc7\u4e24\u6761\u6d41\u6c34\u7ebf\uff08SETA-Synth\u548cSETA-Evol\uff09\u81ea\u52a8\u751f\u6210\u591a\u6837\u5316\u3001\u53ef\u9a8c\u8bc1\u7684\u7ec8\u7aef\u547d\u4ee4\u884cRL\u8bad\u7ec3\u73af\u5883\uff0c\u5e76\u53d1\u5e03\u542b4500+\u73af\u5883\u7684\u5f00\u6e90\u6570\u636e\u96c6SETA-Env\u3002", "why_notable": "\u586b\u8865\u4e86\u7ec8\u7aef\u667a\u80fd\u4f53RL\u8bad\u7ec3\u6570\u636e\u7a00\u7f3a\u7684\u7a7a\u767d\uff0c\u63d0\u4f9b\u8fc4\u4eca\u6700\u5927\u5f00\u6e90\u53ef\u9a8c\u8bc1\u7ec8\u7aef\u73af\u5883\u6570\u636e\u96c6\uff0c\u5bf9\u547d\u4ee4\u884c/\u7cfb\u7edf\u64cd\u4f5c/\u6570\u636e\u79d1\u5b66\u7b49\u573a\u666f\u7684\u667a\u80fd\u4f53\u7814\u7a76\u5177\u6709\u91cd\u8981\u63a8\u52a8\u4ef7\u503c\u3002"}, {"abstract": "The rise of Software Engineering (SE) agents, i.e., LLM-based agents that can understand large codebases and carry out engineering tasks with limited human intervention, has been marked by rapid advances and adoption, but little is known about how developers build these systems in practice: existing studies mine repositories or examine deployment, but few investigate how SE agents are constructed. Through semi-structured interviews with 20 practitioners from 12 organizations and an online survey of 80 practitioners, this paper is the first to study how SE processes are changing in the development of SE agents and what challenges developers face. We find that as implementation becomes cheaper, bottlenecks shift rather than disappear: long-standing non-coding work such as requirements, coordination, review, and deployment becomes more visible, while reviewing and evaluating agent output becomes new and central. We characterize a seven-stage workflow and a shift toward evaluation-driven development, in which evaluation steers iteration and specifications become versioned artifacts read by both humans and agents. We further identify six challenges that teams face, together with the practices they adopt to address them, including unreliable evaluation signals, comprehension debt as code outpaces understanding, and behavioral changes introduced by provider-side model updates.", "arxiv_id": "2607.10856", "arxiv_url": "https://arxiv.org/abs/2607.10856", "authors": ["Yunbo Lyu", "David Williams", "Jieke Shi", "Zhensu Sun", "Chao Peng", "Zhou Yang", "Federica Sarro", "David Lo"], "brief": "\u901a\u8fc7\u5bf920\u540d\u4ece\u4e1a\u8005\u7684\u534a\u7ed3\u6784\u5316\u8bbf\u8c08\u548c80\u4eba\u5728\u7ebf\u8c03\u67e5\uff0c\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u8f6f\u4ef6\u5de5\u7a0b\u667a\u80fd\u4f53\u7684\u5b9e\u9645\u6784\u5efa\u6d41\u7a0b\uff0c\u63d0\u51fa\u4e03\u9636\u6bb5\u5de5\u4f5c\u6d41\u548c\u8bc4\u4f30\u9a71\u52a8\u5f00\u53d1\u8303\u5f0f\u3002", "categories": ["cs.SE", "cs.AI", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10856", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5b9e\u73b0\u6210\u672c\u964d\u4f4e\u540e\u74f6\u9888\u8f6c\u79fb\u800c\u975e\u6d88\u5931\uff1a\u9700\u6c42\u3001\u534f\u8c03\u3001\u8bc4\u5ba1\u7b49\u975e\u7f16\u7801\u5de5\u4f5c\u66f4\u52a0\u51f8\u663e\uff0c\u667a\u80fd\u4f53\u8f93\u51fa\u7684\u8bc4\u4f30\u6210\u4e3a\u6838\u5fc3\u65b0\u4efb\u52a1", "\u63d0\u70bc\u51fa\u4e03\u9636\u6bb5\u5de5\u4f5c\u6d41\uff0c\u5f00\u53d1\u6a21\u5f0f\u5411\"\u8bc4\u4f30\u9a71\u52a8\u5f00\u53d1\"\u8f6c\u53d8\uff0c\u89c4\u683c\u8bf4\u660e\u6210\u4e3a\u4eba\u673a\u5171\u8bfb\u7684\u7248\u672c\u5316\u5236\u54c1", "\u8bc6\u522b\u516d\u5927\u6311\u6218\uff1a\u8bc4\u4f30\u4fe1\u53f7\u4e0d\u53ef\u9760\u3001\u4ee3\u7801\u589e\u901f\u8d85\u8fc7\u7406\u89e3\u80fd\u529b\u5bfc\u81f4\"\u7406\u89e3\u503a\"\u3001\u4f9b\u5e94\u5546\u4fa7\u6a21\u578b\u66f4\u65b0\u5f15\u5165\u884c\u4e3a\u53d8\u5316\u7b49"], "keywords": ["\u667a\u80fd\u4f53", "\u8f6f\u4ef6\u5de5\u7a0b", "\u5b9e\u8bc1\u7814\u7a76", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10856v1", "published_at": "2026-07-12", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "How Do Practitioners Build SE Agents? Insights from a Mixed-Methods Study", "tldr": "\u9996\u9879\u6df7\u5408\u65b9\u6cd5\u7814\u7a76\u63ed\u793a20\u540d\u4ece\u4e1a\u8005\u5982\u4f55\u6784\u5efaSE\u667a\u80fd\u4f53\u53ca\u5176\u9762\u4e34\u7684\u516d\u5927\u6311\u6218", "upvotes": 0, "what_it_is": "\u901a\u8fc7\u5bf920\u540d\u4ece\u4e1a\u8005\u7684\u534a\u7ed3\u6784\u5316\u8bbf\u8c08\u548c80\u4eba\u5728\u7ebf\u8c03\u67e5\uff0c\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u8f6f\u4ef6\u5de5\u7a0b\u667a\u80fd\u4f53\u7684\u5b9e\u9645\u6784\u5efa\u6d41\u7a0b\uff0c\u63d0\u51fa\u4e03\u9636\u6bb5\u5de5\u4f5c\u6d41\u548c\u8bc4\u4f30\u9a71\u52a8\u5f00\u53d1\u8303\u5f0f\u3002", "why_notable": "\u9996\u9879\u9488\u5bf9SE\u667a\u80fd\u4f53\u6784\u5efa\u5b9e\u8df5\u7684\u5b9e\u8bc1\u7814\u7a76\uff0c\u586b\u8865\u4e86\u73b0\u6709\u7814\u7a76\u4ec5\u5173\u6ce8\u4ed3\u5e93\u6316\u6398\u6216\u90e8\u7f72\u5206\u6790\u7684\u7a7a\u767d\uff0c\u5bf9\u5de5\u4e1a\u754c\u548c\u5b66\u672f\u754c\u5747\u6709\u76f4\u63a5\u6307\u5bfc\u4ef7\u503c"}, {"abstract": "Multi-agent ensembling multiplies active parameters and inference cost without answering three basic questions: which agents to consult, how deeply a query should traverse a hierarchy of agents, and when inter-agent communication is worth its cost. We present GRADE (Gated Routing and Adaptive Depth for Efficient Reasoning), a hierarchical multi-agent system in which four lightweight learned gates jointly govern agent selection, hierarchy depth, inter-agent communication, and branch pruning. Training uses CoGRPO (Collaborative Group-Relative Policy Optimization), a novel critic-free recipe that adapts GRPO to multi-agent hierarchies and assigns a shared advantage signal to every gate and agent that participated in a rollout. Agent models are drawn from a hot-swappable Expert Registry; per-agent calibration maps allow experts to be replaced at inference time without retraining. At $\\sim$17B average active parameters, GRADE outperforms all baselines on GSM8K, MMLUPro, and GPQA, surpassing the strongest baseline by 4.8 points on MMLUPro at half the active compute. On AIME-2025, where model depth dominates, GRADE remains competitive to existing frameworks. Ablations isolate the hierarchy and masked cross-attention as the largest contributors to accuracy, and show that per-agent calibration is necessary for safe hot-swapping.", "arxiv_id": "2607.10836", "arxiv_url": "https://arxiv.org/abs/2607.10836", "authors": ["Sudipto Ghosh", "Tanmoy Chakraborty"], "brief": "\u63d0\u51faGRADE\u6846\u67b6\uff0c\u901a\u8fc7\u56db\u4e2a\u8f7b\u91cf\u7ea7\u95e8\u63a7\u673a\u5236\u8054\u5408\u7ba1\u7406\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u7684\u667a\u80fd\u4f53\u9009\u62e9\u3001\u5c42\u6b21\u6df1\u5ea6\u3001\u8de8\u667a\u80fd\u4f53\u901a\u4fe1\u548c\u5206\u652f\u526a\u679d\uff0c\u5e76\u914d\u5957CoGRPO\u8bad\u7ec3\u7b97\u6cd5\uff0c\u5b9e\u73b0\u9ad8\u6548\u7684\u5c42\u6b21\u5316\u591a\u667a\u80fd\u4f53\u63a8\u7406\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10836", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u56db\u4e2a\u53ef\u5b66\u4e60\u95e8\u63a7\u8054\u5408\u63a7\u5236\uff1a\u667a\u80fd\u4f53\u9009\u62e9\u3001\u5c42\u6b21\u6df1\u5ea6\u3001\u8de8\u667a\u80fd\u4f53\u901a\u4fe1\u3001\u5206\u652f\u526a\u679d\uff0c\u89e3\u51b3\u591a\u667a\u80fd\u4f53\u96c6\u6210\u7684\u4e09\u5927\u6838\u5fc3\u95ee\u9898", "CoGRPO\uff08\u534f\u4f5c\u7fa4\u4f53\u76f8\u5bf9\u7b56\u7565\u4f18\u5316\uff09\uff1a\u65e0\u9700Critic\u7684\u8bad\u7ec3\u65b9\u6848\uff0c\u5c06\u5171\u4eab\u4f18\u52bf\u4fe1\u53f7\u5206\u914d\u7ed9\u53c2\u4e0erollout\u7684\u6240\u6709\u95e8\u63a7\u548c\u667a\u80fd\u4f53", "\u7ea617B\u5e73\u5747\u6fc0\u6d3b\u53c2\u6570\u4e0b\uff0cMMLUPro\u8d85\u8d8a\u6700\u5f3a\u57fa\u7ebf4.8\u5206\uff0c\u4ec5\u7528\u4e00\u534a\u6fc0\u6d3b\u7b97\u529b\uff1b\u652f\u6301\u63a8\u7406\u65f6\u70ed\u63d2\u62d4\u4e13\u5bb6\u6a21\u578b\u65e0\u9700\u91cd\u8bad\u7ec3"], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u63a8\u7406", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10836v1", "published_at": "2026-07-12", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Route, Communicate, and Reason: Gated Routing and Adaptive Depth for Efficient Multi-Agent Reasoning", "tldr": "GRADE\uff1a\u95e8\u63a7\u8def\u7531+\u81ea\u9002\u5e94\u6df1\u5ea6\u7684\u9ad8\u6548\u591a\u667a\u80fd\u4f53\u63a8\u7406\u6846\u67b6\uff0c\u4ee5\u4e00\u534a\u7b97\u529b\u8d85\u8d8a\u6700\u5f3a\u57fa\u7ebf4.8\u5206", "upvotes": 0, "what_it_is": "\u63d0\u51faGRADE\u6846\u67b6\uff0c\u901a\u8fc7\u56db\u4e2a\u8f7b\u91cf\u7ea7\u95e8\u63a7\u673a\u5236\u8054\u5408\u7ba1\u7406\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u7684\u667a\u80fd\u4f53\u9009\u62e9\u3001\u5c42\u6b21\u6df1\u5ea6\u3001\u8de8\u667a\u80fd\u4f53\u901a\u4fe1\u548c\u5206\u652f\u526a\u679d\uff0c\u5e76\u914d\u5957CoGRPO\u8bad\u7ec3\u7b97\u6cd5\uff0c\u5b9e\u73b0\u9ad8\u6548\u7684\u5c42\u6b21\u5316\u591a\u667a\u80fd\u4f53\u63a8\u7406\u3002", "why_notable": "\u76f4\u63a5\u89e3\u51b3\u591a\u667a\u80fd\u4f53\u96c6\u6210\u8ba1\u7b97\u6210\u672c\u9ad8\u3001\u8def\u7531\u76f2\u76ee\u7684\u75db\u70b9\uff0c\u4ee5\u66f4\u5c11\u7b97\u529b\u5b9e\u73b0\u66f4\u9ad8\u7cbe\u5ea6\uff0c\u70ed\u63d2\u62d4\u673a\u5236\u5927\u5e45\u63d0\u5347\u5de5\u7a0b\u5b9e\u7528\u6027\uff0cCoGRPO\u4e3a\u591a\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u63d0\u4f9b\u65b0\u8303\u5f0f\u3002"}, {"abstract": "In open-domain multi-hop question answering (QA), LLM-based search agents offer a promising approach to knowledge-intensive QA by combining retrieval with reasoning. Existing methods mainly improve open-domain multi-hop QA through reasoning paradigms, retrieval interaction, and search strategy optimization. However, using multiple search trajectories introduces a challenging final answer selection problem. Different trajectories may support different candidates, and the retrieved information can be heterogeneous, redundant, incomplete, or conflicting. Directly comparing raw trajectories exposes the verifier to noisy and unaligned content, while comparing answer strings ignores the evidence supporting each candidate, making reliable final selection difficult. To address this challenge, we propose STEC, an evidence compression framework for final answer selection in multi-hop QA. STEC selects the final answer from the existing candidate set through two mechanisms: (1) Answer-Level Evidence Compression, which groups trajectories by normalized answer identity and converts each answer group into a candidate-specific evidence representation; and (2) Evidence-Guided Answer Verification, which compares these representations and selects the final answer from the candidate set. The design shifts final selection from raw trajectory comparison to candidate-level evidence comparison. We evaluate STEC on four open-domain multi-hop QA benchmarks against representative baselines. Experimental results show that STEC performs best overall among the compared methods, and ablation results provide evidence that answer-level evidence compression contributes to final answer selection.", "arxiv_id": "2607.10795", "arxiv_url": "https://arxiv.org/abs/2607.10795", "authors": ["Xinkang Li", "Rong Jiang", "Xin Song", "Ye Wang", "Yue Han", "Changjian Li"], "brief": "\u63d0\u51faSTEC\u6846\u67b6\uff0c\u9488\u5bf9\u5f00\u653e\u57df\u591a\u8df3\u95ee\u7b54\u4e2d\u591a\u6761\u641c\u7d22\u8f68\u8ff9\u4ea7\u751f\u5f02\u6784\u3001\u5197\u4f59\u6216\u51b2\u7a81\u8bc1\u636e\u7684\u95ee\u9898\uff0c\u901a\u8fc7\u7b54\u6848\u7ea7\u8bc1\u636e\u538b\u7f29\u4e0e\u8bc1\u636e\u5f15\u5bfc\u9a8c\u8bc1\u4e24\u6b65\u673a\u5236\uff0c\u5c06\u539f\u59cb\u8f68\u8ff9\u6bd4\u8f83\u8f6c\u5316\u4e3a\u5019\u9009\u7b54\u6848\u7ea7\u522b\u7684\u8bc1\u636e\u6bd4\u8f83\uff0c\u4ece\u800c\u53ef\u9760\u5730\u9009\u51fa\u6700\u7ec8\u7b54\u6848\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10795", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": ["\u7b54\u6848\u7ea7\u8bc1\u636e\u538b\u7f29\uff08Answer-Level Evidence Compression\uff09\uff1a\u6309\u5f52\u4e00\u5316\u7b54\u6848\u8eab\u4efd\u5bf9\u8f68\u8ff9\u5206\u7ec4\uff0c\u5c06\u6bcf\u7ec4\u8f6c\u5316\u4e3a\u5019\u9009\u7279\u5b9a\u7684\u8bc1\u636e\u8868\u793a", "\u8bc1\u636e\u5f15\u5bfc\u7b54\u6848\u9a8c\u8bc1\uff08Evidence-Guided Answer Verification\uff09\uff1a\u5bf9\u6bd4\u5404\u5019\u9009\u7684\u8bc1\u636e\u8868\u793a\uff0c\u4ece\u5019\u9009\u96c6\u4e2d\u9009\u51fa\u6700\u7ec8\u7b54\u6848", "\u5728\u56db\u4e2a\u5f00\u653e\u57df\u591a\u8df3QA\u57fa\u51c6\u4e0a\u7efc\u5408\u8868\u73b0\u6700\u4f18\uff0c\u6d88\u878d\u5b9e\u9a8c\u9a8c\u8bc1\u4e86\u8bc1\u636e\u538b\u7f29\u6a21\u5757\u7684\u6709\u6548\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u8df3\u95ee\u7b54", "\u4fe1\u606f\u68c0\u7d22", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10795v1", "published_at": "2026-07-12", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "STEC: Evidence Compression for Deep Search in Open-domain Multi-Hop QA", "tldr": "STEC\u6846\u67b6\u901a\u8fc7\u8bc1\u636e\u538b\u7f29\u89e3\u51b3\u591a\u8df3\u95ee\u7b54\u4e2d\u591a\u641c\u7d22\u8f68\u8ff9\u7684\u6700\u7ec8\u7b54\u6848\u9009\u62e9\u96be\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faSTEC\u6846\u67b6\uff0c\u9488\u5bf9\u5f00\u653e\u57df\u591a\u8df3\u95ee\u7b54\u4e2d\u591a\u6761\u641c\u7d22\u8f68\u8ff9\u4ea7\u751f\u5f02\u6784\u3001\u5197\u4f59\u6216\u51b2\u7a81\u8bc1\u636e\u7684\u95ee\u9898\uff0c\u901a\u8fc7\u7b54\u6848\u7ea7\u8bc1\u636e\u538b\u7f29\u4e0e\u8bc1\u636e\u5f15\u5bfc\u9a8c\u8bc1\u4e24\u6b65\u673a\u5236\uff0c\u5c06\u539f\u59cb\u8f68\u8ff9\u6bd4\u8f83\u8f6c\u5316\u4e3a\u5019\u9009\u7b54\u6848\u7ea7\u522b\u7684\u8bc1\u636e\u6bd4\u8f83\uff0c\u4ece\u800c\u53ef\u9760\u5730\u9009\u51fa\u6700\u7ec8\u7b54\u6848\u3002", "why_notable": "\u591a\u641c\u7d22\u8f68\u8ff9\u7684\u6700\u7ec8\u7b54\u6848\u9009\u62e9\u662fLLM\u641c\u7d22\u667a\u80fd\u4f53\u4e2d\u88ab\u5ffd\u89c6\u7684\u5173\u952e\u74f6\u9888\uff0cSTEC\u4ee5\u8f7b\u91cf\u7684\u8bc1\u636e\u538b\u7f29\u601d\u8def\u6709\u6548\u7f13\u89e3\u566a\u58f0\u4e0e\u51b2\u7a81\u95ee\u9898\uff0c\u5bf9\u63d0\u5347\u77e5\u8bc6\u5bc6\u96c6\u578bQA\u7cfb\u7edf\u7684\u53ef\u9760\u6027\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Computational imaging, which recovers hidden signals from indirect, noisy measurements, underpins quantitative discovery across scientific disciplines, yet building a correct reconstruction pipeline demands deep domain expertise and remains laborious even for domain scientists. We introduce Imaging-101, a benchmark of 57 expert-verified computational imaging tasks spanning six scientific domains, each grounded in a peer-reviewed paper and canonicalized into a standardized four-stage pipeline (preprocessing, forward physics modeling, inverse solver, and visualization) Three evaluation tracks (planning, function-level unit tests, and end-to-end reconstruction) probe distinct agent capabilities across the full pipeline. Evaluating seven frontier LLMs uncovers systematic challenges in applying coding agents to computational imaging that go beyond those exposed by general coding benchmarks, spanning algorithm selection, physical convention handling, and pipeline integration. These findings highlight concrete capability gaps and point toward skill-augmented, domain-specialized agents as a practical path to reliable computational imaging assistance.", "arxiv_id": "2607.10789", "arxiv_url": "https://arxiv.org/abs/2607.10789", "authors": ["Siyi Chen", "Jiahe Ying", "Yixuan Jia", "Yuxuan Gu", "Enze Ye", "Weimin Bai", "Zhijun Zeng", "Shaochi Ren", "Binhong Gao", "Yubing Li", "Tianhan Zhang", "He Sun"], "brief": "\u63d0\u51faImaging-101\u57fa\u51c6\uff0c\u5305\u542b57\u4e2a\u4e13\u5bb6\u9a8c\u8bc1\u7684\u8ba1\u7b97\u6210\u50cf\u4efb\u52a1\uff0c\u8986\u76d6\u516d\u4e2a\u79d1\u5b66\u9886\u57df\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u7f16\u7801\u667a\u80fd\u4f53\u5728\u91cd\u5efa\u6d41\u7a0b\u4e2d\u7684\u80fd\u529b\u3002\u8bc4\u4f307\u4e2a\u524d\u6cbfLLM\u540e\u53d1\u73b0\uff0c\u73b0\u6709\u667a\u80fd\u4f53\u5728\u7b97\u6cd5\u9009\u62e9\u3001\u7269\u7406\u7ea6\u5b9a\u5904\u7406\u548c\u6d41\u7a0b\u96c6\u6210\u7b49\u65b9\u9762\u5b58\u5728\u7cfb\u7edf\u6027\u6311\u6218\uff0c\u6307\u51fa\u9700\u8981\u9886\u57df\u4e13\u4e1a\u5316\u667a\u80fd\u4f53\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10789", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u6d4b\u8bd5", "\u8ba1\u7b97\u6210\u50cf", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10789v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Imaging-101: Benchmarking LLM Coding Agents on Scientific Computational Imaging", "tldr": "\u63d0\u51faImaging-101\u57fa\u51c6\uff0c\u5305\u542b57\u4e2a\u4e13\u5bb6\u9a8c\u8bc1\u7684\u8ba1\u7b97\u6210\u50cf\u4efb\u52a1\uff0c\u8986\u76d6\u516d\u4e2a\u79d1\u5b66\u9886\u57df\uff0c\u7528\u4e8e\u8bc4\u4f30LLM\u7f16\u7801\u667a\u80fd\u4f53\u5728\u91cd\u5efa\u6d41\u7a0b\u4e2d\u7684\u80fd\u529b\u3002\u8bc4\u4f307\u4e2a\u524d\u6cbfLLM\u540e\u53d1\u73b0\uff0c\u73b0\u6709\u667a\u80fd\u4f53\u5728\u7b97\u6cd5\u9009\u62e9\u3001\u7269\u7406\u7ea6\u5b9a\u5904\u7406\u548c\u6d41\u7a0b\u96c6\u6210\u7b49\u65b9\u9762\u5b58\u5728\u7cfb\u7edf\u6027\u6311\u6218\uff0c\u6307\u51fa\u9700\u8981\u9886\u57df\u4e13\u4e1a\u5316\u667a\u80fd\u4f53\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLM-based agents are increasingly deployed to solve optimization problems, yet existing benchmarks evaluate them on pre-structured mathematical formulations that bypass the most critical challenge: translating complex business requirements into correct models and solve efficiently. We introduce Opti-Agent-Bench, an end-to-end benchmark that evaluates Large Language Models (LLMs) across the complete optimization R\u0026D pipeline, from understanding business-language descriptions through mathematical modeling, algorithm selection, and code implementation, to solution report generation. Our design rests on three pillars: (1) businesssemantic authenticity with anti-template traps that defeat pattern matching; (2) modular evaluation with cross-module consistency checking across Problem Understanding, Formal Modeling, Implementation, and Reporting; and (3) the ORAC bi-level validity framework that simultaneously ensures task quality and scoring integrity. Across several industrialscale tasks spanning integer programming, robust optimization, stochastic programming, and non-convex optimization, we expose critical failure modes of current models, including constraint omission, model-code inconsistency, and report-implementation divergence, that remain invisible under conventional single-metric evaluation.", "arxiv_id": "2607.10768", "arxiv_url": "https://arxiv.org/abs/2607.10768", "authors": ["Yongchang Fu", "Xinjie Huang", "Chengjun Dai", "Chengzhe Feng", "Junshao Zhang", "Hong Zhu"], "brief": "\u63d0\u51faOpti-Agent-Bench\uff0c\u4e00\u4e2a\u7aef\u5230\u7aef\u4f18\u5316\u7814\u53d1\u667a\u80fd\u4f53\u57fa\u51c6\uff0c\u8986\u76d6\u4ece\u4e1a\u52a1\u9700\u6c42\u7406\u89e3\u5230\u6570\u5b66\u5efa\u6a21\u3001\u7b97\u6cd5\u9009\u62e9\u3001\u4ee3\u7801\u5b9e\u73b0\u548c\u62a5\u544a\u751f\u6210\u7684\u5b8c\u6574\u6d41\u7a0b\u3002\u901a\u8fc7\u53cd\u6a21\u677f\u9677\u9631\u548c\u53cc\u5c42\u6709\u6548\u6027\u6846\u67b6\uff0c\u63ed\u793a\u4e86\u5f53\u524dLLM\u5728\u7ea6\u675f\u9057\u6f0f\u3001\u6a21\u578b-\u4ee3\u7801\u4e0d\u4e00\u81f4\u7b49\u5173\u952e\u5931\u8d25\u6a21\u5f0f\uff0c\u8fd9\u4e9b\u95ee\u9898\u5728\u4f20\u7edf\u5355\u6307\u6807\u8bc4\u4f30\u4e2d\u96be\u4ee5\u53d1\u73b0\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10768", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u6d4b\u8bd5", "\u4f18\u5316\u95ee\u9898", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10768v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Opti-Agent-Bench: Benchmarking End-to-End Optimization R\u0026D Agents on Real-World Business Problems", "tldr": "\u63d0\u51faOpti-Agent-Bench\uff0c\u4e00\u4e2a\u7aef\u5230\u7aef\u4f18\u5316\u7814\u53d1\u667a\u80fd\u4f53\u57fa\u51c6\uff0c\u8986\u76d6\u4ece\u4e1a\u52a1\u9700\u6c42\u7406\u89e3\u5230\u6570\u5b66\u5efa\u6a21\u3001\u7b97\u6cd5\u9009\u62e9\u3001\u4ee3\u7801\u5b9e\u73b0\u548c\u62a5\u544a\u751f\u6210\u7684\u5b8c\u6574\u6d41\u7a0b\u3002\u901a\u8fc7\u53cd\u6a21\u677f\u9677\u9631\u548c\u53cc\u5c42\u6709\u6548\u6027\u6846\u67b6\uff0c\u63ed\u793a\u4e86\u5f53\u524dLLM\u5728\u7ea6\u675f\u9057\u6f0f\u3001\u6a21\u578b-\u4ee3\u7801\u4e0d\u4e00\u81f4\u7b49\u5173\u952e\u5931\u8d25\u6a21\u5f0f\uff0c\u8fd9\u4e9b\u95ee\u9898\u5728\u4f20\u7edf\u5355\u6307\u6807\u8bc4\u4f30\u4e2d\u96be\u4ee5\u53d1\u73b0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent advances in equipping Large Language Models (LLMs) with search tools and outcome-reward reinforcement learning (RL) have achieved new state-of-the-art results on open-domain QA tasks. However, we argue that current training paradigms harbor a critical vulnerability: they predominantly reward correct answers but fail to penalize fabricated ones when retrieval fails, thereby implicitly exacerbating hallucinations. To address this, we propose Abstention-Aware Reinforcement Learning (AWA-RL), which dynamically shapes the abstention reward utilizing the model\u0027s query-specific prior capabilities and continuous on-policy training observations. We also introduce a novel metric, RA-F1, to measure the capability-reliability trade-off. Compared to non-abstaining baselines, AWA-RL boosts absolute precision by up to 10.3% and overall RA-F1 by 2.9%, with only marginal sacrifice in raw accuracy. These results confirm that AWA-RL successfully yields highly capable and reliable search agents. The code, data, and model weights are publicly available at https://github.com/zfj1998/AWA-RL.", "arxiv_id": "2607.10738", "arxiv_url": "https://arxiv.org/abs/2607.10738", "authors": ["Fengji Zhang", "Tianyu Fan", "Yuxiang Zheng", "Xinyao Niu", "Chengen Huang", "Jacky Keung", "Bei Chen"], "brief": "\u9488\u5bf9\u641c\u7d22\u589e\u5f3aLLM\u5728\u68c0\u7d22\u5931\u8d25\u65f6\u4ecd\u4f1a\u634f\u9020\u7b54\u6848\u7684\u5e7b\u89c9\u95ee\u9898\uff0c\u63d0\u51faAWA-RL\u65b9\u6cd5\uff0c\u901a\u8fc7\u52a8\u6001\u5851\u9020\"\u5f03\u7b54\"\u5956\u52b1\u6765\u60e9\u7f5a\u865a\u5047\u56de\u7b54\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u76f8\u6bd4\u4e0d\u5f03\u7b54\u57fa\u7ebf\uff0c\u7edd\u5bf9\u7cbe\u786e\u7387\u63d0\u5347\u6700\u9ad810.3%\uff0cRA-F1\u63d0\u53472.9%\uff0c\u540c\u65f6\u4ec5\u635f\u5931\u6781\u5c11\u539f\u59cb\u51c6\u786e\u7387\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10738", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u5e7b\u89c9\u7f13\u89e3", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10738v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "To Answer or to Abstain: Mitigating Search-Agent Hallucinations via Abstention-Aware Reinforcement Learning", "tldr": "\u9488\u5bf9\u641c\u7d22\u589e\u5f3aLLM\u5728\u68c0\u7d22\u5931\u8d25\u65f6\u4ecd\u4f1a\u634f\u9020\u7b54\u6848\u7684\u5e7b\u89c9\u95ee\u9898\uff0c\u63d0\u51faAWA-RL\u65b9\u6cd5\uff0c\u901a\u8fc7\u52a8\u6001\u5851\u9020\"\u5f03\u7b54\"\u5956\u52b1\u6765\u60e9\u7f5a\u865a\u5047\u56de\u7b54\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u76f8\u6bd4\u4e0d\u5f03\u7b54\u57fa\u7ebf\uff0c\u7edd\u5bf9\u7cbe\u786e\u7387\u63d0\u5347\u6700\u9ad810.3%\uff0cRA-F1\u63d0\u53472.9%\uff0c\u540c\u65f6\u4ec5\u635f\u5931\u6781\u5c11\u539f\u59cb\u51c6\u786e\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Scientific fraud is the instrument of doubt that malicious entities can use to establish controversy in science. Historically, it required the resources of a company: deep pockets, ghostwritten articles, and corrupt academics. Today, Artificial Intelligence (AI) is increasingly automating scientific research, so we ask: Can a remote adversary weaponize the honest use of AI in science to compromise scientific integrity? We envision and empirically evaluate a new attack, indirect data poisoning, in which an adversary corrupts an open dataset and uploads the poisoned variant to a public repository. Autonomous research agents may independently retrieve and process this data, turning honest scientists into the unpaid and unwitting distributors of fraud at scale. Across five socially-salient topics, from hiring discrimination to the safety of autonomous vehicles, three widely used frontier AI systems (Claude Code with Claude Opus 4.7, Codex with GPT-5.5, Gemini CLI with Gemini 3.1 Pro), and 450 ethically contained experimental runs, we find that poisoning succeeds in 49.56% of runs, while the rate of poisoning detection is only 6.0%. The attack requires no topic-specific trigger-words, agent access, indirect prompt injection, or fabricated papers, only the open data ecosystem and misleading metadata. To mitigate the attacks, we propose and evaluate two measures: a scientist persona and a data provenance audit with five checks (referencing papers, social markers, statistical anomalies, related datasets, poisoning caution). We find that the persona still leaves 16.67% of runs with a poisoned conclusion, but provenance auditing reduces attack success rate to zero. Our results suggest that indirect data poisoning may enable scientific fraud at unprecedented scale, but these attacks can be mitigated with suitable auditing by agents during data retrieval.", "arxiv_id": "2607.10712", "arxiv_url": "https://arxiv.org/abs/2607.10712", "authors": ["B\u00e1lint Gyevn\u00e1r", "Atoosa Kasirzadeh", "Nihar B. Shah"], "brief": "\u7814\u7a76\u8005\u63d0\u51fa\"\u95f4\u63a5\u6570\u636e\u6295\u6bd2\"\u653b\u51fb\uff1a\u653b\u51fb\u8005\u5c06\u6c61\u67d3\u6570\u636e\u4e0a\u4f20\u81f3\u516c\u5f00\u6570\u636e\u96c6\uff0c\u81ea\u4e3b\u79d1\u7814\u667a\u80fd\u4f53\u5728\u4f7f\u7528\u65f6\u65e0\u610f\u4e2d\u4f20\u64ad\u865a\u5047\u7ed3\u8bba\u3002\u5b9e\u9a8c\u8986\u76d65\u4e2a\u793e\u4f1a\u8bae\u9898\u30013\u5927\u524d\u6cbfAI\u7cfb\u7edf\u3001450\u6b21\u8fd0\u884c\uff0c\u653b\u51fb\u6210\u529f\u7387\u8fbe49.56%\uff0c\u68c0\u6d4b\u7387\u4ec56%\uff1b\u4f46\u5f15\u5165\u6570\u636e\u6eaf\u6e90\u5ba1\u8ba1\u540e\u53ef\u5c06\u653b\u51fb\u6210\u529f\u7387\u964d\u81f3\u96f6\u3002", "categories": ["cs.CR", "cs.AI", "cs.DL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10712", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u6570\u636e\u6295\u6bd2", "\u79d1\u5b66\u6b3a\u8bc8", "AI\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10712v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Distributed Denial of Science: How Indirect Data Poisoning of AI Systems Can Industrialize Scientific Fraud", "tldr": "\u7814\u7a76\u8005\u63d0\u51fa\"\u95f4\u63a5\u6570\u636e\u6295\u6bd2\"\u653b\u51fb\uff1a\u653b\u51fb\u8005\u5c06\u6c61\u67d3\u6570\u636e\u4e0a\u4f20\u81f3\u516c\u5f00\u6570\u636e\u96c6\uff0c\u81ea\u4e3b\u79d1\u7814\u667a\u80fd\u4f53\u5728\u4f7f\u7528\u65f6\u65e0\u610f\u4e2d\u4f20\u64ad\u865a\u5047\u7ed3\u8bba\u3002\u5b9e\u9a8c\u8986\u76d65\u4e2a\u793e\u4f1a\u8bae\u9898\u30013\u5927\u524d\u6cbfAI\u7cfb\u7edf\u3001450\u6b21\u8fd0\u884c\uff0c\u653b\u51fb\u6210\u529f\u7387\u8fbe49.56%\uff0c\u68c0\u6d4b\u7387\u4ec56%\uff1b\u4f46\u5f15\u5165\u6570\u636e\u6eaf\u6e90\u5ba1\u8ba1\u540e\u53ef\u5c06\u653b\u51fb\u6210\u529f\u7387\u964d\u81f3\u96f6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Speculative decoding has significantly accelerated Large Language Model (LLM) inference by alleviating memory-bound bottlenecks. However, traditional speculative decoding typically relies on auxiliary draft modules, incurring significant training and communication overhead. Although recent methods attempt to generate drafts within the target model itself, they often fail to fully exploit its latent parallel capacity due to a lack of structural coordination. In this paper, we propose \\textbf{Progressive Tree Drafting (PTD)}, which employs a structured, guided parallel drafting strategy to harness the model\u0027s parallel potential. By coupling a progressive tree structure with a stepwise pruning mechanism, PTD actively guides the LLM to explore multiple semantic paths in a single forward pass, ensuring both draft diversity and coherence. Experiments demonstrate that PTD achieves up to $2\\times$ decoding speedup across various benchmarks while remaining training-free and model-agnostic. Our code is available at: https://github.com/MINE-USTC/PTD.", "arxiv_id": "2607.10661", "arxiv_url": "https://arxiv.org/abs/2607.10661", "authors": ["Zipeng Gao", "Zhi Zheng", "Qingrong Xia", "Junda Lin", "Ziwei Zhao", "Tong Xu", "Zhefeng Wang", "Enhong Chen"], "brief": "\u63d0\u51fa\u6e10\u8fdb\u6811\u8349\u7a3f\uff08PTD\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u5e76\u884c\u8349\u7a3f\u7b56\u7565\u5145\u5206\u6316\u6398\u5927\u8bed\u8a00\u6a21\u578b\u81ea\u8eab\u7684\u5e76\u884c\u6f5c\u529b\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u6216\u8f85\u52a9\u6a21\u578b\u3002\u5b9e\u9a8c\u8868\u660ePTD\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u5b9e\u73b0\u6700\u9ad82\u500d\u7684\u89e3\u7801\u52a0\u901f\uff0c\u4e14\u4e0e\u6a21\u578b\u65e0\u5173\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10661", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u6d4b\u89e3\u7801", "\u63a8\u7406\u52a0\u901f", "\u5e76\u884c\u89e3\u7801"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10661v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Unlocking Parallelism in Autoregressive Language Models via Speculative Decoding with Progressive Tree Drafting", "tldr": "\u63d0\u51fa\u6e10\u8fdb\u6811\u8349\u7a3f\uff08PTD\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u5e76\u884c\u8349\u7a3f\u7b56\u7565\u5145\u5206\u6316\u6398\u5927\u8bed\u8a00\u6a21\u578b\u81ea\u8eab\u7684\u5e76\u884c\u6f5c\u529b\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u6216\u8f85\u52a9\u6a21\u578b\u3002\u5b9e\u9a8c\u8868\u660ePTD\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u5b9e\u73b0\u6700\u9ad82\u500d\u7684\u89e3\u7801\u52a0\u901f\uff0c\u4e14\u4e0e\u6a21\u578b\u65e0\u5173\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Memory is becoming a core component of long-horizon AI agents, allowing agents to reuse past experience when operating web browsers, software tools, and other interactive environments. Existing work mostly treats memory as a supply problem, asking what experience to write, how to store it, and which entry to retrieve for the next task. Yet we still lack a clear account of how models consume retrieved memory across a multi-step action trajectory. This consumption process matters because it determines not only what memories should be retrieved, but also what models and control policies are needed to use them safely. To diagnose this process, we propose Entry--Propagation--Recovery (E-P-R), a trajectory-level framework that asks where memory first changes an action, whether that change carries forward, and whether the agent can recover after leaving a correct path. We instantiate E-P-R on WebArena and on MemTrapBench, a controlled benchmark we build to isolate these phases. We find that the main failure often begins at entry: agents adopt conflicting memory at the first exposed decision point even when it is task-wrong. Repeated exposure then amplifies this early error, while recovery after divergence is weak. Together, these effects create a compliance trap: across models, conflicting memory induces similar compliance rates, but once agents comply, their success rates collapse to a low floor. Stronger agents therefore suffer larger absolute damage because each compliance event erases more baseline capability. These results suggest that memory-augmented agents should be evaluated not only by retrieval quality or final success rate, but by how they consume memory throughout the trajectory.", "arxiv_id": "2607.10608", "arxiv_url": "https://arxiv.org/abs/2607.10608", "authors": ["Yixiong Chen", "Xinyi Bai", "Alan Yuille"], "brief": "\u672c\u6587\u63d0\u51faE-P-R\u6846\u67b6\uff0c\u7cfb\u7edf\u8bca\u65adAI\u667a\u80fd\u4f53\u5728\u591a\u6b65\u9aa4\u8f68\u8ff9\u4e2d\u5982\u4f55\u6d88\u8d39\u68c0\u7d22\u5230\u7684\u8bb0\u5fc6\u3002\u7814\u7a76\u53d1\u73b0\u667a\u80fd\u4f53\u5b58\u5728\"\u5408\u89c4\u9677\u9631\"\uff1a\u5728\u9996\u6b21\u9047\u5230\u51b2\u7a81\u8bb0\u5fc6\u65f6\u4fbf\u503e\u5411\u4e8e\u91c7\u7eb3\u9519\u8bef\u4fe1\u606f\uff0c\u4e14\u8d8a\u5f3a\u7684\u6a21\u578b\u56e0\u5408\u89c4\u5bfc\u81f4\u7684\u80fd\u529b\u635f\u5931\u8d8a\u5927\uff0c\u63ed\u793a\u4e86\u8bb0\u5fc6\u589e\u5f3a\u667a\u80fd\u4f53\u8bc4\u4f30\u9700\u5173\u6ce8\u6574\u4e2a\u8f68\u8ff9\u7684\u8bb0\u5fc6\u6d88\u8d39\u8fc7\u7a0b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10608", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u589e\u5f3a", "\u8f68\u8ff9\u5206\u6790", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10608v1", "published_at": "2026-07-12", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Compliance Trap: Diagnosing How AI Agents Consume Conflicting Memory", "tldr": "\u672c\u6587\u63d0\u51faE-P-R\u6846\u67b6\uff0c\u7cfb\u7edf\u8bca\u65adAI\u667a\u80fd\u4f53\u5728\u591a\u6b65\u9aa4\u8f68\u8ff9\u4e2d\u5982\u4f55\u6d88\u8d39\u68c0\u7d22\u5230\u7684\u8bb0\u5fc6\u3002\u7814\u7a76\u53d1\u73b0\u667a\u80fd\u4f53\u5b58\u5728\"\u5408\u89c4\u9677\u9631\"\uff1a\u5728\u9996\u6b21\u9047\u5230\u51b2\u7a81\u8bb0\u5fc6\u65f6\u4fbf\u503e\u5411\u4e8e\u91c7\u7eb3\u9519\u8bef\u4fe1\u606f\uff0c\u4e14\u8d8a\u5f3a\u7684\u6a21\u578b\u56e0\u5408\u89c4\u5bfc\u81f4\u7684\u80fd\u529b\u635f\u5931\u8d8a\u5927\uff0c\u63ed\u793a\u4e86\u8bb0\u5fc6\u589e\u5f3a\u667a\u80fd\u4f53\u8bc4\u4f30\u9700\u5173\u6ce8\u6574\u4e2a\u8f68\u8ff9\u7684\u8bb0\u5fc6\u6d88\u8d39\u8fc7\u7a0b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Modern coding agents expose multiple tool surfaces -- IDE primitives, bash, and Model Context Protocol (MCP) code-execution -- and the field has shipped three contradictory claims about which one matters. We run the missing crossed comparison: an integrity-clean three-arm ablation (baseline / bash_only / code_only) on synthetic computation tasks and SWE-bench Mini modification tasks, holding model, harness, and prompts fixed, with two
