t to $720p$ video, enabling higher-resolution rendering without re-encoding. HyperGS improves PSNR by +2.9--3.1 dB over the prior video encoders on K400, SSv2, and UCF101 at a smaller video representation size. By predicting explicit 2D Gaussians in a single forward pass, HyperGS combines the fast, flexible rendering of Gaussian Splatting with the speed and generalization of feedforward prediction, advancing Gaussians as a practical direction for fast and generalizable video representation.", "arxiv_id": "2607.11500", "arxiv_url": "https://arxiv.org/abs/2607.11500", "authors": ["Fatimah Zohra", "Chen Zhao", "Shuming Liu", "Yahya Al Malallah", "Bernard Ghanem"], "brief": "HyperGS\u63d0\u51fa\u4e00\u79cd\u524d\u9988\u5f0f\u3001\u65e0\u9700\u9010\u89c6\u9891\u4f18\u5316\u7684\u9ad8\u65af\u89c6\u9891\u8868\u793a\u65b9\u6cd5\uff0c\u901a\u8fc7\u65f6\u7a7aTransformer\u76f4\u63a5\u9884\u6d4b\u6bcf\u5e27\u7684\u9ad8\u65af\u53c2\u6570\uff0c\u7f16\u89e3\u7801\u901f\u5ea6\u63d0\u534710^4~10^5\u500d\u3002\u5728K400\u3001SSv2\u3001UCF101\u7b49\u57fa\u51c6\u4e0aPSNR\u63d0\u53472.9~3.1 dB\uff0c\u5e76\u53ef\u96f6\u6837\u672c\u6cdb\u5316\u81f3720p\u9ad8\u5206\u8fa8\u7387\u89c6\u9891\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11500", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u9ad8\u65af\u6cfc\u6e85", "\u89c6\u9891\u8868\u793a", "\u524d\u9988\u9884\u6d4b", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11500v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "HyperGS: Fast and Generalizable Gaussian Video Representation", "tldr": "HyperGS\u63d0\u51fa\u4e00\u79cd\u524d\u9988\u5f0f\u3001\u65e0\u9700\u9010\u89c6\u9891\u4f18\u5316\u7684\u9ad8\u65af\u89c6\u9891\u8868\u793a\u65b9\u6cd5\uff0c\u901a\u8fc7\u65f6\u7a7aTransformer\u76f4\u63a5\u9884\u6d4b\u6bcf\u5e27\u7684\u9ad8\u65af\u53c2\u6570\uff0c\u7f16\u89e3\u7801\u901f\u5ea6\u63d0\u534710^4~10^5\u500d\u3002\u5728K400\u3001SSv2\u3001UCF101\u7b49\u57fa\u51c6\u4e0aPSNR\u63d0\u53472.9~3.1 dB\uff0c\u5e76\u53ef\u96f6\u6837\u672c\u6cdb\u5316\u81f3720p\u9ad8\u5206\u8fa8\u7387\u89c6\u9891\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent text-to-CAD approaches have shown promising results by leveraging large language models, but they often struggle with maintaining structural consistency in complex designs and accurately grounding geometric parameters. To address these issues, we propose HierCAD, a hierarchical text-to-CAD framework that improves both structural reasoning and parameter prediction. HierCAD reformulates CAD generation as progressive reasoning by decomposing CAD construction trees into object-level procedural reasoning and part-level topology reasoning trajectories. To further improve generation fidelity, we introduce a unified Structure Alignment and Parameter Grounding (SAPG) learning strategy. Structure alignment aligns topology reasoning trajectories with their corresponding parametric CAD spans, while parameter grounding mitigates shortcut learning through structure-preserving parameter perturbations and ranking-based supervision. Experiments demonstrate that HierCAD outperforms prior state-of-the-art methods on both CAD sequence generation and reconstructed CAD model evaluation. Our code is available at https://github.com/Collab-Gen/HierCAD.", "arxiv_id": "2607.11339", "arxiv_url": "https://arxiv.org/abs/2607.11339", "authors": ["Jimin Xu", "Tianbao Wang", "Tao Jin", "Zhou Zhao"], "brief": "\u63d0\u51faHierCAD\u6846\u67b6\uff0c\u5c06CAD\u751f\u6210\u5206\u89e3\u4e3a\u5bf9\u8c61\u7ea7\u7a0b\u5e8f\u63a8\u7406\u548c\u90e8\u4ef6\u7ea7\u62d3\u6251\u63a8\u7406\u7684\u5c42\u6b21\u5316\u6d41\u7a0b\uff0c\u5e76\u5f15\u5165\u7ed3\u6784\u5bf9\u9f50\u4e0e\u53c2\u6570\u63a5\u5730\uff08SAPG\uff09\u5b66\u4e60\u7b56\u7565\uff0c\u6709\u6548\u63d0\u5347\u4e86\u6587\u672c\u5230CAD\u751f\u6210\u7684\u7ed3\u6784\u4e00\u81f4\u6027\u548c\u51e0\u4f55\u53c2\u6570\u7cbe\u5ea6\uff0c\u5728CAD\u5e8f\u5217\u751f\u6210\u548c\u6a21\u578b\u91cd\u5efa\u8bc4\u4f30\u4e0a\u5747\u8d85\u8d8a\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11339", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u5230CAD", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5c42\u6b21\u5316\u63a8\u7406", "\u7ed3\u6784\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11339v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "HierCAD: Hierarchical Text-to-CAD Design via Structure Alignment and Parameter Grounding", "tldr": "\u63d0\u51faHierCAD\u6846\u67b6\uff0c\u5c06CAD\u751f\u6210\u5206\u89e3\u4e3a\u5bf9\u8c61\u7ea7\u7a0b\u5e8f\u63a8\u7406\u548c\u90e8\u4ef6\u7ea7\u62d3\u6251\u63a8\u7406\u7684\u5c42\u6b21\u5316\u6d41\u7a0b\uff0c\u5e76\u5f15\u5165\u7ed3\u6784\u5bf9\u9f50\u4e0e\u53c2\u6570\u63a5\u5730\uff08SAPG\uff09\u5b66\u4e60\u7b56\u7565\uff0c\u6709\u6548\u63d0\u5347\u4e86\u6587\u672c\u5230CAD\u751f\u6210\u7684\u7ed3\u6784\u4e00\u81f4\u6027\u548c\u51e0\u4f55\u53c2\u6570\u7cbe\u5ea6\uff0c\u5728CAD\u5e8f\u5217\u751f\u6210\u548c\u6a21\u578b\u91cd\u5efa\u8bc4\u4f30\u4e0a\u5747\u8d85\u8d8a\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "A large share of day-to-day work in professional domains happens inside PDF files: benefits packets, leases, datasheets, clinical guidelines, construction plans. Benchmarks for document AI have generally measured the required capabilities in isolation: OCR, layout analysis, chart reasoning, table QA, document VQA. A high score on any one of them does not necessarily reveal whether a model can answer a realistic question that someone in the field would actually ask about a specific PDF. GDP.pdf is a benchmark built to measure this directly. It consists of question-document pairs authored by working professionals in ten fields, and a candidate question was kept only when at least two frontier multimodal models failed it in a way that mattered: a wrong answer, missed decisive evidence, or a fabricated claim, rather than a superficial difference such as style. Each item comes with a rubric of atomic criteria, so we can report a graded rubric score as well as a strict task-level pass rate, and each item is tagged against a taxonomy of eleven capabilities in three tiers, spanning text extraction and grounding, table and chart comprehension, cross-referencing, spatial reasoning, and abstention on unsupported queries. We evaluated seven frontier models on the 100-item benchmark. The best model passed only 15% of the items and the worst passed 1%. Most errors trace back to a small set of recurring loss patterns: misaligned tables, misread charts, skipped footnotes and exclusions, miscounted floor-plan symbols, scan noise, and amendments that supersede earlier text. The full 100-item benchmark is publicly available at https://huggingface.co/datasets/surgeai/GDP.pdf", "arxiv_id": "2607.11192", "arxiv_url": "https://arxiv.org/abs/2607.11192", "authors": ["Suhaas Garre", "Emily Ritchie", "Sushant Mehta", "Edwin Chen"], "brief": "\u63d0\u51faGDP.pdf\u57fa\u51c6\u6d4b\u8bd5\uff0c\u4e13\u95e8\u8bc4\u4f30\u591a\u6a21\u6001\u6a21\u578b\u5728\u771f\u5b9e\u4e13\u4e1aPDF\u6587\u6863\u4e0a\u7684\u7efc\u5408\u63a8\u7406\u80fd\u529b\uff0c\u6db5\u76d610\u4e2a\u4e13\u4e1a\u9886\u57df\u7684100\u9053\u9898\u76ee\u3002\u6d4b\u8bd57\u4e2a\u524d\u6cbf\u6a21\u578b\uff0c\u6700\u4f73\u6a21\u578b\u901a\u8fc7\u7387\u4ec515%\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u6a21\u578b\u5728\u8868\u683c\u3001\u56fe\u8868\u3001\u8de8\u5f15\u7528\u548c\u7a7a\u95f4\u63a8\u7406\u7b49\u65b9\u9762\u7684\u4e25\u91cd\u4e0d\u8db3\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11192", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u6587\u6863\u7406\u89e3", "\u57fa\u51c6\u6d4b\u8bd5", "PDF\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11192v1", "published_at": "2026-07-13", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GDP.pdf: Benchmarking Grounded Multimodal Reasoning over Professional PDF Documents", "tldr": "\u63d0\u51faGDP.pdf\u57fa\u51c6\u6d4b\u8bd5\uff0c\u4e13\u95e8\u8bc4\u4f30\u591a\u6a21\u6001\u6a21\u578b\u5728\u771f\u5b9e\u4e13\u4e1aPDF\u6587\u6863\u4e0a\u7684\u7efc\u5408\u63a8\u7406\u80fd\u529b\uff0c\u6db5\u76d610\u4e2a\u4e13\u4e1a\u9886\u57df\u7684100\u9053\u9898\u76ee\u3002\u6d4b\u8bd57\u4e2a\u524d\u6cbf\u6a21\u578b\uff0c\u6700\u4f73\u6a21\u578b\u901a\u8fc7\u7387\u4ec515%\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u6a21\u578b\u5728\u8868\u683c\u3001\u56fe\u8868\u3001\u8de8\u5f15\u7528\u548c\u7a7a\u95f4\u63a8\u7406\u7b49\u65b9\u9762\u7684\u4e25\u91cd\u4e0d\u8db3\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
