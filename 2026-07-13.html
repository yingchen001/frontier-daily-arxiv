stract": "Post-training quantization (PTQ) is a widely adopted technique for compressing large language models (LLMs) without retraining. Existing second-order PTQ methods, including GPTQ, construct quantization objectives exclusively from input activation statistics, effectively assuming that all output channels contribute equally to the layer-wise reconstruction objective. We propose KronQ, a PTQ framework that challenges this assumption by introducing the gradient covariance into the quantization pipeline. Under the Kronecker-factored Hessian approximation, the quantization loss depends jointly on both the activation and gradient covariances, and KronQ exploits this at two complementary levels. (1) KronQ introduces bidirectional incoherence processing, extending the existing input-side random rotation to the output dimension using the gradient covariance, reducing weight magnitude variance across both input and output dimensions. (2) KronQ derives a new sensitivity metric for inter-layer mixed-precision allocation, driven by the gradient and activation Hessian traces. Notably, in the case of 2-bit weight-only quantization on LLaMA-3-70B, while GPTQ and GPTAQ diverge or produce degenerate quantizations (\u003e2000 perplexity on WikiText-2), KronQ achieves 7.93 perplexity.", "arxiv_id": "2607.07964", "arxiv_url": "https://arxiv.org/abs/2607.07964", "authors": ["Donghyun Lee", "Yuhang Li", "Ruokai Yin", "Priyadarshini Panda"], "brief": "\u63d0\u51faKronQ\u91cf\u5316\u6846\u67b6\uff0c\u901a\u8fc7Kronecker\u5206\u89e3Hessian\u8fd1\u4f3c\u5c06\u68af\u5ea6\u534f\u65b9\u5dee\u5f15\u5165\u91cf\u5316\u76ee\u6807\uff0c\u5b9e\u73b0\u53cc\u5411\u975e\u76f8\u5e72\u5904\u7406\u548c\u8de8\u5c42\u6df7\u5408\u7cbe\u5ea6\u5206\u914d\uff0c\u89e3\u51b3\u73b0\u6709\u65b9\u6cd5\u5ffd\u7565\u8f93\u51fa\u901a\u9053\u5dee\u5f02\u7684\u95ee\u9898\u3002", "categories": ["cs.LG"], "github_repo": "https://github.com/Intelligent-Computing-Lab-Panda/KronQ", "github_stars": 2, "hf_url": "https://huggingface.co/papers/2607.07964", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5f15\u5165\u68af\u5ea6\u534f\u65b9\u5dee\u6784\u5efaKronecker\u5206\u89e3Hessian\uff0c\u91cf\u5316\u635f\u5931\u540c\u65f6\u4f9d\u8d56\u6fc0\u6d3b\u4e0e\u68af\u5ea6\u534f\u65b9\u5dee", "\u53cc\u5411\u975e\u76f8\u5e72\u5904\u7406\uff1a\u5c06\u968f\u673a\u65cb\u8f6c\u4ece\u8f93\u5165\u4fa7\u6269\u5c55\u81f3\u8f93\u51fa\u7ef4\u5ea6\uff0c\u964d\u4f4e\u6743\u91cd\u5e45\u5ea6\u65b9\u5dee", "LLaMA-3-70B 2-bit\u91cf\u5316\uff1aGPTQ/GPTAQ\u56f0\u60d1\u5ea6\u003e2000\uff08\u53d1\u6563\uff09\uff0cKronQ\u4ec57.93"], "keywords": ["\u6a21\u578b\u91cf\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4e8c\u9636\u4f18\u5316", "\u6a21\u578b\u538b\u7f29"], "num_comments": 3, "on_hf": true, "organization": "University of Southern California", "pdf_url": "https://arxiv.org/pdf/2607.07964v1", "published_at": "2026-07-08", "score": 0.294, "selected_reasons": ["HF trending (17\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.07964.png", "title": "KronQ: LLM Quantization via Kronecker-Factored Hessian", "tldr": "KronQ\u5f15\u5165\u68af\u5ea6\u534f\u65b9\u5dee\u6539\u8fdbLLM\u8bad\u7ec3\u540e\u91cf\u5316\uff0c2-bit\u91cf\u5316\u6548\u679c\u5927\u5e45\u4f18\u4e8eGPTQ", "upvotes": 17, "what_it_is": "\u63d0\u51faKronQ\u91cf\u5316\u6846\u67b6\uff0c\u901a\u8fc7Kronecker\u5206\u89e3Hessian\u8fd1\u4f3c\u5c06\u68af\u5ea6\u534f\u65b9\u5dee\u5f15\u5165\u91cf\u5316\u76ee\u6807\uff0c\u5b9e\u73b0\u53cc\u5411\u975e\u76f8\u5e72\u5904\u7406\u548c\u8de8\u5c42\u6df7\u5408\u7cbe\u5ea6\u5206\u914d\uff0c\u89e3\u51b3\u73b0\u6709\u65b9\u6cd5\u5ffd\u7565\u8f93\u51fa\u901a\u9053\u5dee\u5f02\u7684\u95ee\u9898\u3002", "why_notable": "\u5728\u6781\u4f4e\u6bd4\u7279\uff082-bit\uff09\u91cf\u5316\u573a\u666f\u4e0b\uff0c\u73b0\u6709\u4e3b\u6d41\u65b9\u6cd5\u5b8c\u5168\u5931\u6548\uff0cKronQ\u4ecd\u80fd\u4fdd\u6301\u6b63\u5e38\u6027\u80fd\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff1b\u7406\u8bba\u4e0a\u586b\u8865\u4e86PTQ\u65b9\u6cd5\u5ffd\u7565\u8f93\u51fa\u901a\u9053\u68af\u5ea6\u4fe1\u606f\u7684\u7a7a\u767d\u3002"}, {"abstract": "Large-scale text-to-image models are attractive backbones for dense prediction because RGB generation pretraining learns rich semantic, structural, and geometric priors. Existing generative and editing approaches reuse these priors by casting dense prediction as target generation: annotations such as depth, normals, alpha mattes, masks, and heatmaps are encoded into an RGB-trained VAE latent space and decoded back as image-like targets. We argue this inherits more of the generative output interface than dense prediction requires: unlike RGB synthesis, dense prediction asks for pixel-correct, task-native fields on the same image plane, not new RGB content to be rendered. Our key observation is that a pretrained DiT already organizes RGB inputs through a patch-to-token-to-patch lattice on the image plane, so each token indexes a fixed output patch whose channels can carry task-native quantities instead of RGB appearance. We instantiate this as ReChannel: we keep the VAE encoder for the DiT\u0027s input distribution but drop the target-side decoder, adapt the frozen DiT with task LoRA, and map each token to its p x p x K_t pixel-space patch through a shared token-local linear head--about 33K parameters, no spatial mixing. Using FLUX-Klein, we evaluate on six dense prediction tasks and over a dozen benchmarks. This minimal interface sets new state-of-the-art on trimap-free matting, KITTI depth, and referring segmentation, and stays competitive on normals, saliency, and pose. In a matched 4B setting it is more accurate and 2.48x faster than an edit-plus-latent-decode counterpart--dense perception can benefit from generative pretraining without inheriting its output interface.", "arxiv_id": "2607.06553", "arxiv_url": "https://arxiv.org/abs/2607.06553", "authors": ["Zanyi Wang", "Xin Lin", "Haodong Li", "Dengyang Jiang", "Yijiang Li"], "brief": "\u63d0\u51faReChannel\u65b9\u6cd5\uff0c\u4fdd\u7559DiT\u7684VAE\u7f16\u7801\u5668\u5904\u7406\u8f93\u5165\uff0c\u4f46\u4e22\u5f03\u76ee\u6807\u4fa7\u89e3\u7801\u5668\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ebf\u6027\u5934\uff08\u7ea633K\u53c2\u6570\uff09\u5c06\u6bcf\u4e2atoken\u76f4\u63a5\u6620\u5c04\u5230\u4efb\u52a1\u539f\u751f\u7684\u50cf\u7d20\u7a7a\u95f4patch\uff0c\u5b9e\u73b0\u6df1\u5ea6\u3001\u6cd5\u7ebf\u3001\u5206\u5272\u7b49\u5bc6\u96c6\u9884\u6d4b\u4efb\u52a1\u3002", "categories": ["cs.CV"], "github_repo": "https://github.com/xmz111/ReChannel", "github_stars": 13, "hf_url": "https://huggingface.co/papers/2607.06553", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u4e0d\u5c06\u5bc6\u96c6\u9884\u6d4b\u6807\u6ce8\u7f16\u7801\u4e3aRGB\u76ee\u6807\u518d\u89e3\u7801\uff0c\u800c\u662f\u7528token-local\u7ebf\u6027\u5934\u76f4\u63a5\u8f93\u51fa\u4efb\u52a1\u539f\u751f\u5b57\u6bb5\uff0c\u907f\u514d\u7ee7\u627f\u751f\u6210\u5f0f\u8f93\u51fa\u63a5\u53e3", "\u4f7f\u7528FLUX-Klein\uff084B\u53c2\u6570DiT\uff09\u914d\u5408task LoRA\u5fae\u8c03\uff0c\u57286\u7c7b\u5bc6\u96c6\u9884\u6d4b\u4efb\u52a1\u3001\u5341\u4f59\u4e2a\u57fa\u51c6\u4e0a\u8bc4\u6d4b\uff0c\u5728\u65e0trimap\u62a0\u56fe\u3001KITTI\u6df1\u5ea6\u3001\u6307\u4ee3\u5206\u5272\u4e0a\u8fbe\u5230\u65b0SOTA", "\u4e0e\u7f16\u8f91+\u6f5c\u7a7a\u95f4\u89e3\u7801\u65b9\u6848\u76f8\u6bd4\uff0c\u7cbe\u5ea6\u66f4\u9ad8\u4e14\u63a8\u7406\u901f\u5ea6\u5feb2.48\u500d\uff0c\u7ebf\u6027\u5934\u53c2\u6570\u91cf\u4ec5\u7ea633K"], "keywords": ["\u5bc6\u96c6\u9884\u6d4b", "\u6269\u6563\u6a21\u578b", "\u591a\u4efb\u52a1\u5b66\u4e60", "\u89c6\u89c9\u611f\u77e5"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.06553v2", "published_at": "2026-07-07", "score": 0.29, "selected_reasons": ["HF trending (10\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.06553.png", "title": "From RGB Generation to Dense Field Readout: Pixel-Space Dense Prediction with Text-to-Image Models", "tldr": "\u5c06\u6587\u751f\u56feDiT\u6a21\u578b\u76f4\u63a5\u7528\u4e8e\u5bc6\u96c6\u9884\u6d4b\uff0c\u65e0\u9700\u751f\u6210RGB\u56fe\u50cf\uff0c\u901f\u5ea6\u63d0\u53472.48\u500d", "upvotes": 10, "what_it_is": "\u63d0\u51faReChannel\u65b9\u6cd5\uff0c\u4fdd\u7559DiT\u7684VAE\u7f16\u7801\u5668\u5904\u7406\u8f93\u5165\uff0c\u4f46\u4e22\u5f03\u76ee\u6807\u4fa7\u89e3\u7801\u5668\uff0c\u901a\u8fc7\u8f7b\u91cf\u7ebf\u6027\u5934\uff08\u7ea633K\u53c2\u6570\uff09\u5c06\u6bcf\u4e2atoken\u76f4\u63a5\u6620\u5c04\u5230\u4efb\u52a1\u539f\u751f\u7684\u50cf\u7d20\u7a7a\u95f4patch\uff0c\u5b9e\u73b0\u6df1\u5ea6\u3001\u6cd5\u7ebf\u3001\u5206\u5272\u7b49\u5bc6\u96c6\u9884\u6d4b\u4efb\u52a1\u3002", "why_notable": "\u63ed\u793a\u4e86\u73b0\u6709\u65b9\u6cd5\u8fc7\u5ea6\u7ee7\u627f\u751f\u6210\u5f0f\u8f93\u51fa\u63a5\u53e3\u7684\u95ee\u9898\uff0c\u4ee5\u6781\u5c11\u989d\u5916\u53c2\u6570\u89e3\u9501\u5927\u89c4\u6a21\u6587\u751f\u56fe\u9884\u8bad\u7ec3\u7528\u4e8e\u5bc6\u96c6\u611f\u77e5\uff0c\u517c\u987e\u7cbe\u5ea6\u4e0e\u6548\u7387\uff0c\u5bf9\u4e0b\u6e38\u89c6\u89c9\u611f\u77e5\u4efb\u52a1\u6709\u5e7f\u6cdb\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "In this work, we aim to address the challenge of long-range memory in panoramic world models by exploiting the rotation-equivariant property of omnidirectional representations, where rotation can be treated as an implicit geometric transformation.Building on this insight, we propose PanoWorld, which simplifies camera trajectories into translations via fixed headings for both current-action modeling and long-range memory through Dense Panoramic Ray-Conditioning (DPRC) and Geometry-aware Memory Augmentation (GMA).Then, a three-stage training pipeline is introduced to progressively optimize each component. To better evaluate physical consistency under large-scale spatial variations and diverse illumination conditions, where existing datasets are relatively stable, we construct World360, a large-scale dataset consisting of both real-world video clips collected via panoramic unmanned aerial vehicles and high-quality simulated clips generated by AirSim360.Extensive experiments on World360 demonstrate the effectiveness of PanoWorld, outperforming alternative methods by a large margin.Our models, training code, and dataset will be publicly available. More information can be found on our project page: https://lihaoy-ux.github.io/panoworld-page/.", "arxiv_id": "2607.09661", "arxiv_url": "https://arxiv.org/abs/2607.09661", "authors": ["Haoyuan Li", "Dizhe Zhang", "Yuemei Zhou", "Xiangkai Zhang", "Haoran Feng", "Xiaofan Lin", "Wenjie Jiang", "Bo Du", "Ming-Hsuan Yang", "Lu Qi"], "brief": "\u63d0\u51faPanoWorld\u6846\u67b6\uff0c\u901a\u8fc7\u5bc6\u96c6\u5168\u666f\u5c04\u7ebf\u6761\u4ef6\uff08DPRC\uff09\u548c\u51e0\u4f55\u611f\u77e5\u8bb0\u5fc6\u589e\u5f3a\uff08GMA\uff09\u5c06\u76f8\u673a\u8f68\u8ff9\u7b80\u5316\u4e3a\u5e73\u79fb\uff0c\u89e3\u51b3\u5168\u666f\u4e16\u754c\u6a21\u578b\u4e2d\u7684\u957f\u7a0b\u8bb0\u5fc6\u96be\u9898\uff0c\u5e76\u6784\u5efa\u4e86World360\u5927\u89c4\u6a21\u6570\u636e\u96c6\u3002", "categories": ["cs.CV"], "github_repo": "https://github.com/Insta360-Research-Team/PanoWorld", "github_stars": 12, "hf_url": "https://huggingface.co/papers/2607.09661", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u5229\u7528\u5168\u5411\u8868\u793a\u7684\u65cb\u8f6c\u7b49\u53d8\u6027\uff0c\u5c06\u590d\u6742\u76f8\u673a\u8f68\u8ff9\u7b80\u5316\u4e3a\u56fa\u5b9a\u671d\u5411\u7684\u5e73\u79fb\u64cd\u4f5c", "\u63d0\u51faDPRC\uff08\u5bc6\u96c6\u5168\u666f\u5c04\u7ebf\u6761\u4ef6\uff09\u548cGMA\uff08\u51e0\u4f55\u611f\u77e5\u8bb0\u5fc6\u589e\u5f3a\uff09\u4e24\u5927\u6838\u5fc3\u6a21\u5757\uff0c\u652f\u6301\u5f53\u524d\u52a8\u4f5c\u5efa\u6a21\u4e0e\u957f\u7a0b\u8bb0\u5fc6", "\u6784\u5efaWorld360\u6570\u636e\u96c6\uff0c\u5305\u542b\u65e0\u4eba\u673a\u91c7\u96c6\u7684\u771f\u5b9e\u5168\u666f\u89c6\u9891\u4e0eAirSim360\u751f\u6210\u7684\u9ad8\u8d28\u91cf\u4eff\u771f\u7247\u6bb5\uff0c\u8986\u76d6\u5927\u5c3a\u5ea6\u7a7a\u95f4\u53d8\u5316\u4e0e\u591a\u6837\u5149\u7167\u6761\u4ef6"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u5168\u666f\u751f\u6210", "\u591a\u6a21\u6001", "\u4e09\u7ef4\u89c6\u89c9"], "num_comments": 1, "on_hf": true, "organization": "Insta360", "pdf_url": "https://arxiv.org/pdf/2607.09661v1", "published_at": "2026-07-10", "score": 0.256, "selected_reasons": ["HF trending (7\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.09661.png", "title": "PanoWorld: Real-World Panoramic Generation", "tldr": "PanoWorld\u5229\u7528\u5168\u5411\u8868\u793a\u7684\u65cb\u8f6c\u7b49\u53d8\u6027\uff0c\u5b9e\u73b0\u957f\u7a0b\u8bb0\u5fc6\u7684\u5168\u666f\u4e16\u754c\u6a21\u578b\u751f\u6210", "upvotes": 7, "what_it_is": "\u63d0\u51faPanoWorld\u6846\u67b6\uff0c\u901a\u8fc7\u5bc6\u96c6\u5168\u666f\u5c04\u7ebf\u6761\u4ef6\uff08DPRC\uff09\u548c\u51e0\u4f55\u611f\u77e5\u8bb0\u5fc6\u589e\u5f3a\uff08GMA\uff09\u5c06\u76f8\u673a\u8f68\u8ff9\u7b80\u5316\u4e3a\u5e73\u79fb\uff0c\u89e3\u51b3\u5168\u666f\u4e16\u754c\u6a21\u578b\u4e2d\u7684\u957f\u7a0b\u8bb0\u5fc6\u96be\u9898\uff0c\u5e76\u6784\u5efa\u4e86World360\u5927\u89c4\u6a21\u6570\u636e\u96c6\u3002", "why_notable": "\u9996\u6b21\u5c06\u65cb\u8f6c\u7b49\u53d8\u6027\u5f15\u5165\u5168\u666f\u4e16\u754c\u6a21\u578b\u4ee5\u89e3\u51b3\u957f\u7a0b\u8bb0\u5fc6\u95ee\u9898\uff0c\u540c\u65f6\u5f00\u6e90\u6a21\u578b\u3001\u4ee3\u7801\u548c\u5927\u89c4\u6a21\u5168\u666f\u6570\u636e\u96c6\uff0c\u5bf9\u81ea\u52a8\u9a7e\u9a76\u3001\u5177\u8eab\u667a\u80fd\u7b49\u573a\u666f\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Medicine is inherently multimodal, requiring clinicians to synthesize information across diverse data streams. Yet the development of multimodal foundation models is constrained by limited access to large-scale, high-quality clinical data. Although PubMed Central (PMC) offers a complementary source of expert-authored image-text data, existing PMC-derived resources remain limited in fidelity, reproducibility, and clinical validation. We introduce MedPMC, an automated, continuously updatable framework that transforms permissively licensed literature into high-fidelity infrastructure for medical multimodal models. Applied to 6.1 million PMC articles, MedPMC curated 11 million medical image-text pairs. Component evaluations showed strong performance for initial screening (F1 = 93.2), multi-panel figure detection (F1 = 96.5), figure separation (mAP = 89.8), caption separation and alignment (F1 = 81.4; ROUGE-L = 85.3), and medical figure classification (F1 = 96.5). Manual review by five annotators, three with medical training, found 95.3% of MedPMC images medically relevant, versus 19.7% in a prior PMC-derived dataset. Across 26 benchmarks spanning 11 specialties, a MedPMC-trained CLIP-style model improved average zero-shot AUC by 7.1 percentage points over the strongest architecture-matched biomedical CLIP baseline despite using fewer than half as many image-text pairs. As the vision encoder in a multimodal large language model, it improved medical visual question-answering by 1.9 and 16.9 percentage points across two benchmarks. In 10,524 Yale New Haven Health System dermatology photographs, it improved morphology-to-image retrieval Recall@5 by 11.7 percentage points. These findings show that high-fidelity literature curation strengthens medical multimodal foundation models across benchmark and clinical settings. We publicly release the framework, corpus, benchmarks, and pretrained models.", "arxiv_id": "2607.07673", "arxiv_url": "https://arxiv.org/abs/2607.07673", "authors": ["Hyunjae Kim", "Dain Kim", "Pan Xiao", "Serina S. Applebaum", "Younjoon Chung", "Xuguang Ai", "Yu Yin", "Roy Jiang", "Yuexi Du", "Yawen Wei", "Yiming Kong", "Tuo Guo", "Zhiyuan Cao", "Mengmeng Du", "Yuelei Fu", "Yan Hu", "Rui Shi", "Gui Yang", "Kevin W. Jin", "Yuntian Liu", "Yuxuan Tian", "Jonathan Marquez", "Zhen Chen", "Sheng Zhang", "Hoifung Poon", "Hua Xu", "Jaewoo Kang", "Qingyu Chen"], "brief": "\u63d0\u51faMedPMC\uff0c\u4e00\u4e2a\u53ef\u6301\u7eed\u66f4\u65b0\u7684\u81ea\u52a8\u5316\u6846\u67b6\uff0c\u5c06PubMed Central\u5f00\u653e\u6388\u6743\u6587\u732e\u8f6c\u5316\u4e3a\u9ad8\u4fdd\u771f\u533b\u5b66\u56fe\u6587\u6570\u636e\u57fa\u7840\u8bbe\u65bd\uff0c\u5e76\u5728\u591a\u9879\u533b\u5b66\u591a\u6a21\u6001\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u5176\u6548\u679c\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": "https://github.com/Yale-BIDS-Chen-Lab/MedPMC", "github_stars": 1, "hf_url": "https://huggingface.co/papers/2607.07673", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5904\u7406610\u4e07\u7bc7PMC\u6587\u7ae0\uff0c\u751f\u62101100\u4e07\u533b\u5b66\u56fe\u6587\u5bf9\uff0c\u591a\u6a21\u5757\u6d41\u6c34\u7ebf\u5404\u73af\u8282F1/mAP\u5747\u8d8589%", "\u4eba\u5de5\u5ba1\u6838\u663e\u793a95.3%\u56fe\u50cf\u5177\u6709\u533b\u5b66\u76f8\u5173\u6027\uff0c\u8fdc\u8d85\u5df2\u6709PMC\u6570\u636e\u96c6\u768419.7%", "\u57fa\u4e8eMedPMC\u8bad\u7ec3\u7684CLIP\u6a21\u578b\u572826\u4e2a\u8de811\u4e2a\u4e13\u79d1\u7684\u57fa\u51c6\u4e0a\u96f6\u6837\u672cAUC\u5e73\u5747\u63d0\u53477.1\u4e2a\u767e\u5206\u70b9\uff0c\u4f7f\u7528\u56fe\u6587\u5bf9\u6570\u91cf\u4e0d\u8db3\u5bf9\u6bd4\u57fa\u7ebf\u7684\u4e00\u534a"], "keywords": ["\u591a\u6a21\u6001", "\u533b\u5b66AI", "\u6570\u636e\u6784\u5efa", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b"], "num_comments": 1, "on_hf": true, "organization": "Yale-BIDS-Chen-Lab", "pdf_url": "https://arxiv.org/pdf/2607.07673v1", "published_at": "2026-07-08", "score": 0.239, "selected_reasons": ["HF trending (2\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.07673.png", "title": "MedPMC: A Systematic Framework for Scaling High-Fidelity Medical Multimodal Data for Foundation Models", "tldr": "MedPMC\uff1a\u4ece610\u4e07\u7bc7PMC\u6587\u732e\u81ea\u52a8\u6784\u5efa1100\u4e07\u9ad8\u8d28\u91cf\u533b\u5b66\u591a\u6a21\u6001\u6570\u636e\u6846\u67b6", "upvotes": 2, "what_it_is": "\u63d0\u51faMedPMC\uff0c\u4e00\u4e2a\u53ef\u6301\u7eed\u66f4\u65b0\u7684\u81ea\u52a8\u5316\u6846\u67b6\uff0c\u5c06PubMed Central\u5f00\u653e\u6388\u6743\u6587\u732e\u8f6c\u5316\u4e3a\u9ad8\u4fdd\u771f\u533b\u5b66\u56fe\u6587\u6570\u636e\u57fa\u7840\u8bbe\u65bd\uff0c\u5e76\u5728\u591a\u9879\u533b\u5b66\u591a\u6a21\u6001\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u5176\u6548\u679c\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u3001\u53ef\u6301\u7eed\u66f4\u65b0\u7684\u9ad8\u4fdd\u771f\u533b\u5b66\u591a\u6a21\u6001\u6570\u636e\u6784\u5efa\u6846\u67b6\uff0c\u516c\u5f00\u53d1\u5e03\u6846\u67b6\u3001\u8bed\u6599\u3001\u57fa\u51c6\u53ca\u9884\u8bad\u7ec3\u6a21\u578b\uff0c\u663e\u8457\u63d0\u5347\u533b\u5b66\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u6027\u80fd\uff0c\u5bf9\u533b\u5b66AI\u57fa\u7840\u6a21\u578b\u7814\u7a76\u5177\u6709\u91cd\u8981\u63a8\u52a8\u4ef7\u503c\u3002"}, {"abstract": "Long-context processing has become increasingly important for large language models (LLMs), but simply extending the context window does not guarantee effective utilization of long inputs. As input length grows, accuracy often degrades, indicating that models still struggle to identify and use the evidence most relevant to a question. A promising way to improve long-context utilization is test-time training (TTT), which treats the test context as a training example for instance-specific parameter adaptation. However, applying TTT to the entire long context is prohibitively expensive, while adapting on randomly sampled spans introduces severe noise. Because most spans in a long context are irrelevant to the specific question, training on them may even degrade the base model\u0027s performance. Our preliminary study shows that TTT is highly sensitive to training-span quality: on LongBench-v2, TTT on randomly sampled spans hurts performance, whereas TTT on oracle spans substantially improves it. Motivated by this, we propose a simple method, Self-Guided TTT (S-TTT): before adaptation, the model identifies the evidence spans it should learn from, and the standard language-modeling training objective is applied only to those selected spans. On two challenging long-context reasoning benchmarks, LongBench-v2 and LongBench-Pro, S-TTT improves accuracy for both Qwen3-4B-Thinking-2507 and Llama-3.1-8B-Instruct, achieving up to a 15% relative improvement.", "arxiv_id": "2607.09415", "arxiv_url": "https://arxiv.org/abs/2607.09415", "authors": ["Xinyu Zhu", "Zhe Xu", "Xiaohan Wei", "Yunchen Pu", "Fei Tian", "Chonglin Sun", "Kaushik Rangadurai", "Hua Zhi", "Frank Shyu", "Sandeep Pandey", "Luke Simon", "Yu Meng", "Xi Liu"], "brief": "\u63d0\u51faSelf-Guided TTT\uff08S-TTT\uff09\u65b9\u6cd5\uff1a\u5728\u6d4b\u8bd5\u65f6\u8ba9\u6a21\u578b\u5148\u81ea\u4e3b\u5b9a\u4f4d\u4e0e\u95ee\u9898\u76f8\u5173\u7684\u8bc1\u636e\u7247\u6bb5\uff0c\u518d\u4ec5\u5bf9\u8fd9\u4e9b\u9ad8\u8d28\u91cf\u7247\u6bb5\u6267\u884c\u8bed\u8a00\u6a21\u578b\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u73b0\u5b9e\u4f8b\u7ea7\u53c2\u6570\u81ea\u9002\u5e94\uff0c\u6709\u6548\u63d0\u5347\u957f\u4e0a\u4e0b\u6587\u5229\u7528\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09415", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u968f\u673a\u91c7\u6837\u7247\u6bb5\u505aTTT\u4f1a\u635f\u5bb3\u6027\u80fd\uff0c\u800c\u4f7f\u7528oracle\u5173\u952e\u7247\u6bb5\u505aTTT\u53ef\u5927\u5e45\u63d0\u5347\u6027\u80fd\uff0c\u8bf4\u660e\u8bad\u7ec3\u7247\u6bb5\u8d28\u91cf\u81f3\u5173\u91cd\u8981", "S-TTT\u8ba9\u6a21\u578b\u5728\u9002\u5e94\u524d\u5148\u81ea\u6211\u8bc6\u522b\u76f8\u5173\u8bc1\u636e\u7247\u6bb5\uff0c\u65e0\u9700\u5916\u90e8\u6807\u6ce8\uff0c\u4ec5\u5bf9\u9009\u5b9a\u7247\u6bb5\u8ba1\u7b97\u8bad\u7ec3\u635f\u5931", "\u5728LongBench-v2\u548cLongBench-Pro\u4e0a\uff0c\u5bf9Qwen3-4B\u548cLlama-3.1-8B\u5747\u6709\u6548\uff0c\u6700\u9ad8\u5b9e\u73b015%\u76f8\u5bf9\u6027\u80fd\u63d0\u5347"], "keywords": ["\u957f\u4e0a\u4e0b\u6587", "\u6d4b\u8bd5\u65f6\u8bad\u7ec3", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09415v1", "published_at": "2026-07-10", "score": 0.229, "selected_reasons": ["HF trending (7\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.09415.png", "title": "Self-Guided Test-Time Training for Long-Context LLMs", "tldr": "\u81ea\u5f15\u5bfc\u6d4b\u8bd5\u65f6\u8bad\u7ec3\u8ba9\u957f\u4e0a\u4e0b\u6587LLM\u81ea\u4e3b\u8bc6\u522b\u5173\u952e\u8bc1\u636e\u7247\u6bb5\u5e76\u9488\u5bf9\u6027\u5fae\u8c03\uff0c\u63d0\u5347\u63a8\u7406\u51c6\u786e\u7387\u8fbe15%", "upvotes": 7, "what_it_is": "\u63d0\u51faSelf-Guided TTT\uff08S-TTT\uff09\u65b9\u6cd5\uff1a\u5728\u6d4b\u8bd5\u65f6\u8ba9\u6a21\u578b\u5148\u81ea\u4e3b\u5b9a\u4f4d\u4e0e\u95ee\u9898\u76f8\u5173\u7684\u8bc1\u636e\u7247\u6bb5\uff0c\u518d\u4ec5\u5bf9\u8fd9\u4e9b\u9ad8\u8d28\u91cf\u7247\u6bb5\u6267\u884c\u8bed\u8a00\u6a21\u578b\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u73b0\u5b9e\u4f8b\u7ea7\u53c2\u6570\u81ea\u9002\u5e94\uff0c\u6709\u6548\u63d0\u5347\u957f\u4e0a\u4e0b\u6587\u5229\u7528\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793aTTT\u5bf9\u8bad\u7ec3\u7247\u6bb5\u8d28\u91cf\u7684\u9ad8\u5ea6\u654f\u611f\u6027\uff0c\u5e76\u63d0\u51fa\u65e0\u9700\u989d\u5916\u6807\u6ce8\u7684\u81ea\u5f15\u5bfc\u89e3\u51b3\u65b9\u6848\uff0c\u4e3a\u957f\u4e0a\u4e0b\u6587\u63a8\u7406\u63d0\u4f9b\u4e86\u8f7b\u91cf\u7ea7\u3001\u5373\u63d2\u5373\u7528\u7684\u6d4b\u8bd5\u65f6\u589e\u5f3a\u8303\u5f0f\u3002"}, {"abstract": "Realistic and diverse traffic simulation is essential to autonomous driving development. Yet prevailing benchmarks predominantly reward realism, and recent methods have optimized accordingly, leaving diversity underexplored. We introduce \\textbf{Flow-ERD}, a multi-agent simulator that pursues realism and diversity jointly. Its backbone, \\textbf{Agent-Type Aware Flow Matching} (AFM), couples flow matching\u0027s multi-modal expressiveness with type-specific kinematic execution. It preserves fine-grained diversity while keeping motions consistent with each agent type. A second stage, \\textbf{Entropy-Regularized Distillation} (ERD), fine-tunes the closed-loop rollout distribution with an entropy-regularized reverse-KL objective. This mitigates covariate shift while explicitly preventing collapse onto high-density modes. We evaluate Flow-ERD with a log-free diversity metric alongside standard realism scores. Flow-ERD ranks first on the WOSAC test benchmark and dominates the realism--diversity Pareto front among reproducible baselines. Our project page is available \\href{https://seulbinhwang.github.io/flow-erd-project-page/}{here}.", "arxiv_id": "2607.06957", "arxiv_url": "https://arxiv.org/abs/2607.06957", "authors": ["Seulbin Hwang", "Kiyoung Om", "Daejung Kim", "Jinhan Lee"], "brief": "\u63d0\u51faFlow-ERD\u591a\u667a\u80fd\u4f53\u4ea4\u901a\u4eff\u771f\u5668\uff0c\u901a\u8fc7\u667a\u80fd\u4f53\u7c7b\u578b\u611f\u77e5\u6d41\u5339\u914d\uff08AFM\uff09\u548c\u71b5\u6b63\u5219\u5316\u84b8\u998f\uff08ERD\uff09\u4e24\u9636\u6bb5\u65b9\u6cd5\uff0c\u540c\u65f6\u4f18\u5316\u4eff\u771f\u7684\u771f\u5b9e\u6027\u4e0e\u591a\u6837\u6027\u3002", "categories": ["cs.RO", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.06957", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["AFM\u5c06\u6d41\u5339\u914d\u7684\u591a\u6a21\u6001\u8868\u8fbe\u80fd\u529b\u4e0e\u5404\u7c7b\u578b\u667a\u80fd\u4f53\u7684\u8fd0\u52a8\u5b66\u7ea6\u675f\u7ed3\u5408\uff0c\u4fdd\u6301\u7ec6\u7c92\u5ea6\u591a\u6837\u6027\u7684\u540c\u65f6\u786e\u4fdd\u8fd0\u52a8\u5408\u7406\u6027", "ERD\u9636\u6bb5\u91c7\u7528\u71b5\u6b63\u5219\u5316\u53cd\u5411KL\u76ee\u6807\u5fae\u8c03\u95ed\u73afrollout\u5206\u5e03\uff0c\u7f13\u89e3\u534f\u53d8\u91cf\u504f\u79fb\u5e76\u9632\u6b62\u6a21\u5f0f\u574d\u584c", "\u5728WOSAC\u6d4b\u8bd5\u57fa\u51c6\u4e0a\u6392\u540d\u7b2c\u4e00\uff0c\u5e76\u5728\u771f\u5b9e\u6027-\u591a\u6837\u6027Pareto\u524d\u6cbf\u4e0a\u4f18\u4e8e\u6240\u6709\u53ef\u590d\u73b0\u57fa\u7ebf"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u4ea4\u901a\u4eff\u771f", "\u6d41\u5339\u914d", "\u591a\u667a\u80fd\u4f53"], "num_comments": 2, "on_hf": true, "organization": "Navercorp", "pdf_url": "https://arxiv.org/pdf/2607.06957v1", "published_at": "2026-07-08", "score": 0.229, "selected_reasons": ["HF trending (5\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.06957.png", "title": "Flow-ERD: Agent-type Aware Flow Matching with Entropy-Regularized Distillation for Diverse Traffic Simulation", "tldr": "Flow-ERD\u8054\u5408\u4f18\u5316\u771f\u5b9e\u6027\u4e0e\u591a\u6837\u6027\uff0c\u5728\u81ea\u52a8\u9a7e\u9a76\u4ea4\u901a\u4eff\u771f\u4e2d\u8fbe\u5230WOSAC\u699c\u9996", "upvotes": 5, "what_it_is": "\u63d0\u51faFlow-ERD\u591a\u667a\u80fd\u4f53\u4ea4\u901a\u4eff\u771f\u5668\uff0c\u901a\u8fc7\u667a\u80fd\u4f53\u7c7b\u578b\u611f\u77e5\u6d41\u5339\u914d\uff08AFM\uff09\u548c\u71b5\u6b63\u5219\u5316\u84b8\u998f\uff08ERD\uff09\u4e24\u9636\u6bb5\u65b9\u6cd5\uff0c\u540c\u65f6\u4f18\u5316\u4eff\u771f\u7684\u771f\u5b9e\u6027\u4e0e\u591a\u6837\u6027\u3002", "why_notable": "\u73b0\u6709\u65b9\u6cd5\u8fc7\u5ea6\u4f18\u5316\u771f\u5b9e\u6027\u800c\u5ffd\u89c6\u591a\u6837\u6027\uff0cFlow-ERD\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u4e24\u8005\u8054\u5408\u4f18\u5316\uff0c\u5e76\u5f15\u5165\u65e0\u65e5\u5fd7\u4f9d\u8d56\u7684\u591a\u6837\u6027\u8bc4\u4f30\u6307\u6807\uff0c\u5bf9\u81ea\u52a8\u9a7e\u9a76\u4eff\u771f\u6d4b\u8bd5\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We present Soofi S 30B-A3B, a sovereign, open-source Mixture-of-Experts (MoE) hybrid Mamba Transformer foundation model for German and English. Its hybrid design activates only 3B of 30B parameters per token and keeps the inference cache near-constant as context grows, giving it a decisive throughput advantage over dense models for long-context, high-concurrency deployment. Pretrained on roughly 27 trillion tokens with deliberately up-weighted German, Soofi S matches dense 14 to 27B models on aggregate English and German benchmarks while achieving the best code aggregates in both languages among 17 open base models, and outperforms every European sovereign baseline in our comparison, including ones far larger in active parameters. Among fully open models, Soofi S obtains the highest English and German evaluation scores, ahead of Olmo 3 32B and Apertus 70B. Soofi S was built end-to-end on the German Industrial AI Cloud, a sovereign HPC scale AI infrastructure operated by Deutsche Telekom in Munich. Soofi S will be released under highly permissive, open-access terms: weights, selected intermediate checkpoints, full per-source data accounting, hyperparameters, and training and evaluation code. Where source licenses permit, data-construction artifacts are released under permissive licenses; commercially licensed sources are documented with aggregate statistics and exact mixture accounting.", "arxiv_id": "2607.09424", "arxiv_url": "https://arxiv.org/abs/2607.09424", "authors": ["The Soofi-Team", ":", "Benedikt Droste", "David Fitzek", "Ruben H\u00e4rle", "Lukas Helff", "Maximilian Idahl", "Alex Jude", "Abbas Goher Khan", "Maurice Kraus", "Timm Ruland", "Richard Rutmann", "Sebastian Sztwiertnia", "Markus Frey", "Daniil Gurgurov", "Jan Pfister", "Tom R\u00f6hr", "Sebastian von Rohrscheidt", "J\u00f6rg Bienert", "Nicolas Flores-Herr", "Simon Gottschalk", "Andreas Hotho", "Kristian Kersting", "Joachim K\u00f6hler", "Alexander L\u00f6ser", "Wolfgang Nejdl", "Simon Ostermann", "Jan Plogsties", "Patrick Putzky", "Mehdi Ali", "Michael Fromm", "Max L\u00fcbbering"], "brief": "\u63d0\u51faSoofi S 30B-A3B\uff0c\u4e00\u4e2a\u9762\u5411\u5fb7\u8bed\u548c\u82f1\u8bed\u7684\u4e3b\u6743\u5f00\u6e90\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09Mamba Transformer\u57fa\u7840\u6a21\u578b\uff0c\u5728\u7ea627\u4e07\u4ebftoken\u4e0a\u9884\u8bad\u7ec3\uff0c\u5fb7\u8bed\u6570\u636e\u523b\u610f\u4e0a\u91c7\u6837\uff0c\u63a8\u7406\u65f6\u6bcftoken\u4ec5\u6fc0\u6d3b3B\u53c2\u6570\u4e14\u4e0a\u4e0b\u6587\u7f13\u5b58\u8fd1\u4f3c\u6052\u5b9a\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09424", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["MoE\u67b6\u6784\uff1a\u603b\u53c2\u657030B\uff0c\u6bcftoken\u6fc0\u6d3b\u4ec53B\uff0c\u957f\u4e0a\u4e0b\u6587\u9ad8\u5e76\u53d1\u573a\u666f\u541e\u5410\u91cf\u663e\u8457\u4f18\u4e8e\u540c\u89c4\u6a21\u7a20\u5bc6\u6a21\u578b", "\u572817\u4e2a\u5f00\u6e90\u57fa\u7840\u6a21\u578b\u4e2d\uff0c\u82f1\u5fb7\u53cc\u8bed\u4ee3\u7801\u8bc4\u6d4b\u7efc\u5408\u5f97\u5206\u6700\u9ad8\uff1b\u5728\u5168\u5f00\u653e\u6a21\u578b\u4e2d\u82f1\u5fb7\u8bc4\u6d4b\u5747\u9886\u5148Olmo 3 32B\u548cApertus 70B", "\u5b8c\u5168\u5f00\u653e\uff1a\u6743\u91cd\u3001\u4e2d\u95f4\u68c0\u67e5\u70b9\u3001\u6570\u636e\u914d\u6bd4\u3001\u8d85\u53c2\u6570\u53ca\u8bad\u7ec3\u8bc4\u6d4b\u4ee3\u7801\u5168\u90e8\u516c\u5f00\uff0c\u90e8\u7f72\u4e8e\u5fb7\u56fd\u7535\u4fe1\u6155\u5c3c\u9ed1\u4e3b\u6743HPC\u57fa\u7840\u8bbe\u65bd"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6df7\u5408\u4e13\u5bb6", "\u591a\u8bed\u8a00", "\u5f00\u6e90"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09424v2", "published_at": "2026-07-10", "score": 0.218, "selected_reasons": ["HF trending (1\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.09424.png", "title": "A Sovereign, Open-Source Foundation Model for German and English", "tldr": "\u5fb7\u82f1\u53cc\u8bed\u4e3b\u6743\u5f00\u6e90MoE\u6df7\u5408Mamba Transformer\u57fa\u7840\u6a21\u578b\uff0c30B\u53c2\u6570\u4ec5\u6fc0\u6d3b3B", "upvotes": 1, "what_it_is": "\u63d0\u51faSoofi S 30B-A3B\uff0c\u4e00\u4e2a\u9762\u5411\u5fb7\u8bed\u548c\u82f1\u8bed\u7684\u4e3b\u6743\u5f00\u6e90\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09Mamba Transformer\u57fa\u7840\u6a21\u578b\uff0c\u5728\u7ea627\u4e07\u4ebftoken\u4e0a\u9884\u8bad\u7ec3\uff0c\u5fb7\u8bed\u6570\u636e\u523b\u610f\u4e0a\u91c7\u6837\uff0c\u63a8\u7406\u65f6\u6bcftoken\u4ec5\u6fc0\u6d3b3B\u53c2\u6570\u4e14\u4e0a\u4e0b\u6587\u7f13\u5b58\u8fd1\u4f3c\u6052\u5b9a\u3002", "why_notable": "\u9996\u4e2a\u5728\u6b27\u6d32\u4e3b\u6743\u7b97\u529b\u57fa\u7840\u8bbe\u65bd\u4e0a\u7aef\u5230\u7aef\u8bad\u7ec3\u7684\u9ad8\u6027\u80fd\u5fb7\u82f1\u53cc\u8bed\u5f00\u6e90\u5927\u6a21\u578b\uff0cMoE+Mamba\u6df7\u5408\u67b6\u6784\u517c\u987e\u6548\u7387\u4e0e\u6027\u80fd\uff0c\u5b8c\u5168\u5f00\u653e\u7684\u6570\u636e\u4e0e\u8bad\u7ec3\u7ec6\u8282\u5bf9\u5b66\u672f\u754c\u548c\u6b27\u6d32AI\u751f\u6001\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Phone segmentation and recognition are inherently related tasks, yet modern approaches typically model them separately. We argue that phonetic structure is already latent in the representations of self-supervised speech models (S3Ms), and one only needs to steer them to solve both tasks. We leverage S3M-based Phonological Activation Mapping (SPAM), which maps each S3M representation frame to a vector of phonological feature activations, such as voicing and nasality. On top of SPAM, we introduce two simple but effective lightweight, gradient-descent-free prediction heads: a recognition head and a segmentation head. Our method requires less than a minute of phonetic transcriptions, and generalizes to unseen phones during training. Across a diverse range of datasets, our approach attains strong segmentation and recognition performance.", "arxiv_id": "2607.09020", "arxiv_url": "https://arxiv.org/abs/2607.09020", "authors": ["Shikhar Bharadwaj", "Kwanghee Choi", "Stephen McIntosh", "Chin-Jou Li", "Eunjung Yeo", "Daisuke Saito", "Nobuaki Minematsu", "Shinji Watanabe", "Jian Zhu", "David Harwath", "David R. Mortensen"], "brief": "\u63d0\u51fa\u57fa\u4e8e\u97f3\u7cfb\u6fc0\u6d3b\u6620\u5c04\uff08SPAM\uff09\u7684\u8f7b\u91cf\u7ea7\u6846\u67b6\uff0c\u5c06\u81ea\u76d1\u7763\u8bed\u97f3\u6a21\u578b\uff08S3M\uff09\u7684\u8868\u793a\u6620\u5c04\u4e3a\u97f3\u7cfb\u7279\u5f81\u5411\u91cf\uff08\u5982\u6d4a\u97f3\u6027\u3001\u9f3b\u97f3\u6027\uff09\uff0c\u5e76\u5728\u6b64\u57fa\u7840\u4e0a\u8bbe\u8ba1\u65e0\u68af\u5ea6\u4e0b\u964d\u7684\u8bc6\u522b\u5934\u4e0e\u5206\u5272\u5934\uff0c\u540c\u65f6\u5b8c\u6210\u97f3\u7d20\u5206\u5272\u4e0e\u8bc6\u522b\u4e24\u9879\u4efb\u52a1\u3002", "categories": ["eess.AS", "cs.AI", "cs.CL", "cs.LG", "cs.SD"], "github_repo": "https://github.com/stephenmac7/phone-metrics", "github_stars": 1, "hf_url": "https://huggingface.co/papers/2607.09020", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u4ec5\u9700\u4e0d\u5230\u4e00\u5206\u949f\u7684\u97f3\u7d20\u6807\u6ce8\u6570\u636e\u5373\u53ef\u8bad\u7ec3\uff0c\u6781\u4f4e\u8d44\u6e90\u9700\u6c42", "\u9884\u6d4b\u5934\u65e0\u9700\u68af\u5ea6\u4e0b\u964d\uff0c\u8ba1\u7b97\u5f00\u9500\u6781\u5c0f\uff0c\u4e14\u53ef\u6cdb\u5316\u5230\u8bad\u7ec3\u4e2d\u672a\u89c1\u8fc7\u7684\u97f3\u7d20", "\u5728\u591a\u4e2a\u591a\u6837\u5316\u6570\u636e\u96c6\u4e0a\u540c\u65f6\u53d6\u5f97\u5f3a\u52b2\u7684\u97f3\u7d20\u5206\u5272\u4e0e\u8bc6\u522b\u6027\u80fd"], "keywords": ["\u8bed\u97f3\u8bc6\u522b", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u97f3\u7d20\u5206\u6790", "\u4f4e\u8d44\u6e90"], "num_comments": 2, "on_hf": true, "organization": "ChangeLing Lab", "pdf_url": "https://arxiv.org/pdf/2607.09020v1", "published_at": "2026-07-10", "score": 0.217, "selected_reasons": ["HF trending (2\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.09020.png", "title": "Phone Segmentation and Recognition through Phonological Activation Mapping", "tldr": "\u5229\u7528\u81ea\u76d1\u7763\u8bed\u97f3\u6a21\u578b\u7684\u6f5c\u5728\u97f3\u7cfb\u7279\u5f81\uff0c\u540c\u65f6\u5b9e\u73b0\u97f3\u7d20\u5206\u5272\u4e0e\u8bc6\u522b", "upvotes": 2, "what_it_is": "\u63d0\u51fa\u57fa\u4e8e\u97f3\u7cfb\u6fc0\u6d3b\u6620\u5c04\uff08SPAM\uff09\u7684\u8f7b\u91cf\u7ea7\u6846\u67b6\uff0c\u5c06\u81ea\u76d1\u7763\u8bed\u97f3\u6a21\u578b\uff08S3M\uff09\u7684\u8868\u793a\u6620\u5c04\u4e3a\u97f3\u7cfb\u7279\u5f81\u5411\u91cf\uff08\u5982\u6d4a\u97f3\u6027\u3001\u9f3b\u97f3\u6027\uff09\uff0c\u5e76\u5728\u6b64\u57fa\u7840\u4e0a\u8bbe\u8ba1\u65e0\u68af\u5ea6\u4e0b\u964d\u7684\u8bc6\u522b\u5934\u4e0e\u5206\u5272\u5934\uff0c\u540c\u65f6\u5b8c\u6210\u97f3\u7d20\u5206\u5272\u4e0e\u8bc6\u522b\u4e24\u9879\u4efb\u52a1\u3002", "why_notable": "\u5c06\u97f3\u7d20\u5206\u5272\u4e0e\u8bc6\u522b\u7edf\u4e00\u5728\u5355\u4e00\u8f7b\u91cf\u6846\u67b6\u4e2d\uff0c\u5145\u5206\u6316\u6398\u81ea\u76d1\u7763\u8bed\u97f3\u6a21\u578b\u7684\u6f5c\u5728\u97f3\u7cfb\u7ed3\u6784\uff0c\u4ee5\u6781\u4f4e\u6807\u6ce8\u6210\u672c\u5b9e\u73b0\u8de8\u6570\u636e\u96c6\u6cdb\u5316\uff0c\u5bf9\u4f4e\u8d44\u6e90\u8bed\u97f3\u5904\u7406\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "We introduce MM-ToolSandBox, a benchmark and evaluation framework for visually grounded tool-calling agents. The framework provides a stateful execution environment spanning 500+ tools across 16 application domains, supporting multi-image, multi-turn tasks where agents must ground progressively arriving visual inputs into executable tool calls while handling realistic conversational phenomena (goal revisions, error corrections, state mutations). An automated scenario generation pipeline produces diverse, visually grounded scenarios through information-flow-guided planning and multi-stage quality filtering, yielding 258 human-verified nominal scenarios and 50 variants targeting interactive UI applications. Evaluating 12 state-of-the-art models, from 4B open-weight to frontier proprietary systems, shows that current models still lack robust visual tool-calling capability: even the best model achieves below 50% success rate. Our failure analysis further reveals that visual precision, not only planning, is a primary bottleneck for capable models: 53% of failures stem from incorrect information extraction from images despite otherwise correct task workflows. A planning-to-precision crossover emerges with scale: smaller models fail at deciding what to do, while larger models fail at perceiving what they see, suggesting fundamentally different research directions for improving models at different capability levels. The framework and the benchmark are publicly available at https://github.com/apple/ml-mmtoolsandbox", "arxiv_id": "2607.11818", "arxiv_url": "https://arxiv.org/abs/2607.11818", "authors": ["Kaixin Ma", "Di Feng", "Alexander Metz", "Jiarui Lu", "Eshan Verma", "Afshin Dehghan"], "brief": "\u63d0\u51faMM-ToolSandBox\uff0c\u4e00\u4e2a\u7528\u4e8e\u8bc4\u4f30\u89c6\u89c9\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u7684\u57fa\u51c6\u4e0e\u6846\u67b6\uff0c\u8986\u76d616\u4e2a\u5e94\u7528\u9886\u57df500+\u5de5\u5177\uff0c\u652f\u6301\u591a\u56fe\u50cf\u3001\u591a\u8f6e\u5bf9\u8bdd\u4efb\u52a1\uff0c\u5e76\u901a\u8fc7\u81ea\u52a8\u5316\u573a\u666f\u751f\u6210\u6d41\u6c34\u7ebf\u6784\u5efa\u4e86258\u4e2a\u4eba\u5de5\u9a8c\u8bc1\u573a\u666f\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11818", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u8bc4\u4f3012\u4e2a\u4e3b\u6d41\u6a21\u578b\uff084B\u5f00\u6e90\u5230\u524d\u6cbf\u95ed\u6e90\uff09\uff0c\u6700\u4f73\u6a21\u578b\u6210\u529f\u7387\u4ecd\u4f4e\u4e8e50%\uff0c\u8868\u660e\u5f53\u524d\u6a21\u578b\u89c6\u89c9\u5de5\u5177\u8c03\u7528\u80fd\u529b\u4e0d\u8db3", "53%\u7684\u5931\u8d25\u6e90\u4e8e\u4ece\u56fe\u50cf\u4e2d\u9519\u8bef\u63d0\u53d6\u4fe1\u606f\uff0c\u89c6\u89c9\u7cbe\u5ea6\uff08\u800c\u975e\u89c4\u5212\u80fd\u529b\uff09\u662f\u5f3a\u6a21\u578b\u7684\u4e3b\u8981\u74f6\u9888", "\u53d1\u73b0\u89c4\u6a21\u5bfc\u81f4\u7684\u0027\u89c4\u5212-\u7cbe\u5ea6\u4ea4\u53c9\u0027\u73b0\u8c61\uff1a\u5c0f\u6a21\u578b\u5931\u8d25\u5728\u4e0d\u77e5\u9053\u505a\u4ec0\u4e48\uff0c\u5927\u6a21\u578b\u5931\u8d25\u5728\u770b\u4e0d\u51c6\u56fe\u50cf\u5185\u5bb9"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u5de5\u5177\u8c03\u7528", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11818v1", "published_at": "2026-07-13", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MM-ToolSandBox: A Unified Framework for Evaluating Visual Tool-Calling Agents", "tldr": "MM-ToolSandBox\uff1a\u9996\u4e2a\u8bc4\u4f30\u89c6\u89c9\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u7684\u7edf\u4e00\u57fa\u51c6\u6846\u67b6\uff0c\u63ed\u793a\u89c6\u89c9\u7cbe\u5ea6\u662f\u4e3b\u8981\u74f6\u9888", "upvotes": 0, "what_it_is": "\u63d0\u51faMM-ToolSandBox\uff0c\u4e00\u4e2a\u7528\u4e8e\u8bc4\u4f30\u89c6\u89c9\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u7684\u57fa\u51c6\u4e0e\u6846\u67b6\uff0c\u8986\u76d616\u4e2a\u5e94\u7528\u9886\u57df500+\u5de5\u5177\uff0c\u652f\u6301\u591a\u56fe\u50cf\u3001\u591a\u8f6e\u5bf9\u8bdd\u4efb\u52a1\uff0c\u5e76\u901a\u8fc7\u81ea\u52a8\u5316\u573a\u666f\u751f\u6210\u6d41\u6c34\u7ebf\u6784\u5efa\u4e86258\u4e2a\u4eba\u5de5\u9a8c\u8bc1\u573a\u666f\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027\u8bc4\u4f30\u89c6\u89c9\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u7684\u6846\u67b6\uff0c\u63ed\u793a\u4e86\u4e0d\u540c\u89c4\u6a21\u6a21\u578b\u7684\u5dee\u5f02\u5316\u74f6\u9888\uff0c\u4e3a\u591a\u6a21\u6001\u667a\u80fd\u4f53\u7814\u7a76\u6307\u660e\u4e86\u65b9\u5411\uff0c\u7531Apple\u5f00\u6e90\u53d1\u5e03\u3002"}, {"abstract": "There are two standard ways to spend more compute at test time: let a model reason longer, or sample more attempts and keep one. Both share a hidden limit: they are internal. Every extra token comes from the same frozen weights and the same prompt, so neither can tell the model anything it does not already know. We study a third way, interaction: the model proposes an artifact, an external instrument observes how it actually behaves, and the model revises. Each cycle imports a real observation, so interaction breaks through the ceiling the other two hit. We argue that a single variable governs this third axis, grounding, and that it must hold on both sides of the loop. The feedback that drives revision must come from an instrument that actually observes the flaw, and so must the metric that scores the result. On hard coding tasks at a fixed token budget, reasoning-only and best-of-N sampling both plateau (the latter even when an oracle picks the best sample), while every interaction strategy keeps improving; our proposer-reviewer harness reaches a perfect 100% pass rate with no run-to-run variance, and the gain holds across three model families. On rendered visual artifacts, the usual judge (a vision-language model, or VLM, reading a screenshot) rates 14 of 15 visibly broken figures \"perfect,\" because the screenshot hides the flaws before the judge can see them. A tool that measures the real layout instead shows the loop removing 40-74% of defects across four modalities; and that same VLM, used as the reviewer, makes slide layouts worse where the measuring tool repairs them. Interaction scaling is real and distinct from reasoning and sampling, but only visible when both the feedback and the metric are grounded.", "arxiv_id": "2607.11598", "arxiv_url": "https://arxiv.org/abs/2607.11598", "authors": ["Bojie Li", "Noah Shi"], "brief": "\u8bba\u6587\u63d0\u51fa\"\u4ea4\u4e92\u6269\u5c55\"\uff08Interaction Scaling\uff09\u6982\u5ff5\uff1a\u6a21\u578b\u751f\u6210\u4ea7\u7269\u2192\u5916\u90e8\u5de5\u5177\u771f\u5b9e\u89c2\u6d4b\u5176\u884c\u4e3a\u2192\u6a21\u578b\u57fa\u4e8e\u53cd\u9988\u4fee\u8ba2\uff0c\u5f62\u6210\u95ed\u73af\u3002\u4e0e\u4ec5\u9760\u5ef6\u957f\u63a8\u7406\u6216\u591a\u6b21\u91c7\u6837\u4e0d\u540c\uff0c\u6bcf\u8f6e\u4ea4\u4e92\u5f15\u5165\u771f\u5b9e\u5916\u90e8\u89c2\u6d4b\uff0c\u4ece\u800c\u7a81\u7834\u51bb\u7ed3\u6743\u91cd\u7684\u5185\u5728\u4e0a\u9650\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11598", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5728\u56fa\u5b9atoken\u9884\u7b97\u4e0b\uff0c\u63a8\u7406\u6269\u5c55\u4e0ebest-of-N\u91c7\u6837\uff08\u542boracle\u9009\u62e9\uff09\u5747\u51fa\u73b0\u6027\u80fd\u5e73\u53f0\u671f\uff0c\u800c\u4ea4\u4e92\u7b56\u7565\u6301\u7eed\u63d0\u5347\uff0cproposer-reviewer\u6846\u67b6\u5728\u96be\u7f16\u7a0b\u4efb\u52a1\u4e0a\u8fbe\u5230100%\u901a\u8fc7\u7387\u4e14\u65e0\u65b9\u5dee", "\u5173\u952e\u53d8\u91cf\u662f\"\u63a5\u5730\u6027\"\uff08grounding\uff09\uff1a\u53cd\u9988\u5fc5\u987b\u6765\u81ea\u771f\u5b9e\u89c2\u6d4b\u7f3a\u9677\u7684\u5de5\u5177\uff0c\u8bc4\u5206\u6307\u6807\u4e5f\u5fc5\u987b\u63a5\u5730\uff0c\u5426\u5219VLM\u89c6\u89c9\u8bc4\u5224\u5c0615\u4e2a\u660e\u663e\u9519\u8bef\u56fe\u8868\u4e2d\u768414\u4e2a\u8bef\u8bc4\u4e3a\"\u5b8c\u7f8e\"", "\u5728\u53ef\u89c6\u5316\u4ea7\u7269\u4efb\u52a1\u4e2d\uff0c\u4f7f\u7528\u771f\u5b9e\u5e03\u5c40\u6d4b\u91cf\u5de5\u5177\u53ef\u6d88\u966440-74%\u7684\u7f3a\u9677\uff0c\u800c\u7528VLM\u4f5c\u4e3a\u8bc4\u5ba1\u53cd\u800c\u4f7f\u5e7b\u706f\u7247\u5e03\u5c40\u53d8\u5dee"], "keywords": ["\u6d4b\u8bd5\u65f6\u8ba1\u7b97", "\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11598v1", "published_at": "2026-07-13", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Interaction Scaling: Grounding the Third Axis of Test-Time Compute", "tldr": "\u63d0\u51fa\"\u4ea4\u4e92\u6269\u5c55\"\u4f5c\u4e3a\u6d4b\u8bd5\u65f6\u8ba1\u7b97\u7684\u7b2c\u4e09\u8f74\uff0c\u901a\u8fc7\u5916\u90e8\u89c2\u6d4b\u53cd\u9988\u7a81\u7834\u63a8\u7406\u4e0e\u91c7\u6837\u7684\u5929\u82b1\u677f", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\"\u4ea4\u4e92\u6269\u5c55\"\uff08Interaction Scaling\uff09\u6982\u5ff5\uff1a\u6a21\u578b\u751f\u6210\u4ea7\u7269\u2192\u5916\u90e8\u5de5\u5177\u771f\u5b9e\u89c2\u6d4b\u5176\u884c\u4e3a\u2192\u6a21\u578b\u57fa\u4e8e\u53cd\u9988\u4fee\u8ba2\uff0c\u5f62\u6210\u95ed\u73af\u3002\u4e0e\u4ec5\u9760\u5ef6\u957f\u63a8\u7406\u6216\u591a\u6b21\u91c7\u6837\u4e0d\u540c\uff0c\u6bcf\u8f6e\u4ea4\u4e92\u5f15\u5165\u771f\u5b9e\u5916\u90e8\u89c2\u6d4b\uff0c\u4ece\u800c\u7a81\u7834\u51bb\u7ed3\u6743\u91cd\u7684\u5185\u5728\u4e0a\u9650\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\"\u4ea4\u4e92\"\u5b9a\u4e49\u4e3a\u72ec\u7acb\u4e8e\u63a8\u7406\u6df1\u5ea6\u548c\u91c7\u6837\u5e7f\u5ea6\u7684\u7b2c\u4e09\u6761\u6d4b\u8bd5\u65f6\u6269\u5c55\u8f74\uff0c\u5e76\u901a\u8fc7\u5b9e\u9a8c\u63ed\u793a\"\u63a5\u5730\u6027\"\u662f\u51b3\u5b9a\u4ea4\u4e92\u6269\u5c55\u662f\u5426\u6709\u6548\u7684\u6838\u5fc3\u6761\u4ef6\uff0c\u5bf9AI\u8bc4\u4f30\u4e0e\u667a\u80fd\u4f53\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49"}, {"abstract": "Causal discovery, the process of recovering underlying causal structures from observational data, is a fundamental pursuit across scientific disciplines. Over the past decades, numerous algorithms have been developed to tackle this challenge through workflows tailored to the specific causal mechanisms underlying each type of dataset, demonstrating effectiveness across a wide range of applications. However, as the volume and heterogeneity of real-world data continue to grow, this dataset-specific approach inevitably leads to a fragmented, test-driven paradigm that struggles to scale to the demands of modern scientific discovery. To address this, we formulate the Causal Discovery Foundation Model (CDFM) as a unified, general-purpose framework for zero-shot structural inference. To ensure reliable generalization across unknown domains, we first investigate the theoretical boundaries of causal identifiability, revealing the indispensable role of causal prior mechanisms in this process. Building on these insights, we formulate a principled variational framework that treats unknown causal mechanisms as latent variables and mathematically decomposes the intractable marginal likelihood into distinct, tractable learning modules. The variational decomposition provides a conceptual design principle for the architecture design of CDFM, while comprehensive causal knowledge guides the large-scale synthesis of our pretraining data. By pretraining on a massive, highly diverse space of synthetic structural causal models, CDFM successfully internalizes complex statistical asymmetries. Extensive experiments demonstrate that CDFM consistently outperforms traditional algorithms, driving a paradigm shift toward a general-purpose causal discovery foundation model.", "arxiv_id": "2607.11508", "arxiv_url": "https://arxiv.org/abs/2607.11508", "authors": ["Jie Qiao", "Ruichu Cai", "Zijian Li", "Weilin Chen", "Pengfei Hua", "Boyan Xu", "Zhengming Chen", "Zhifeng Hao", "Peng Cui"], "brief": "\u672c\u6587\u63d0\u51fa\u56e0\u679c\u53d1\u73b0\u57fa\u7840\u6a21\u578b\uff08CDFM\uff09\uff0c\u901a\u8fc7\u53d8\u5206\u6846\u67b6\u5c06\u672a\u77e5\u56e0\u679c\u673a\u5236\u5efa\u6a21\u4e3a\u6f5c\u53d8\u91cf\uff0c\u5728\u5927\u89c4\u6a21\u5408\u6210\u7ed3\u6784\u56e0\u679c\u6a21\u578b\u4e0a\u9884\u8b \u57df\u56e0\u679c\u7ed3\u6784\u63a8\u65ad\u3002", "why_notable": "\u9996\u6b21\u5c06\u57fa\u7840\u6a21\u578b\u8303\u5f0f\u5f15\u5165\u56e0\u679c\u53d1\u73b0\u9886\u57df\uff0c\u6253\u7834\u4e86\u4f20\u7edf\u7b97\u6cd5\u9488\u5bf9\u7279\u5b9a\u6570\u636e\u96c6\u5b9a\u5236\u7684\u788e\u7247\u5316\u8303\u5f0f\uff0c\u5177\u6709\u63a8\u52a8\u79d1\u5b66\u53d1\u73b0\u81ea\u52a8\u5316\u7684\u91cd\u8981\u6f5c\u529b\u3002"}, {"abstract": "Vision-language-action (VLA) models predict robot actions from visual observations and language instructions. These actions are defined in the robot\u0027s own 3D coordinate frame, yet most VLAs observe the scene in the camera frame, creating a frame mismatch between where the scene is observed and where actions are defined. The mismatch is benign under a fixed viewpoint, where the policy can memorize a single observation-to-action mapping, but grows harder as large-scale datasets aggregate demonstrations across diverse camera setups and the policy must generalize this mapping across viewpoints. We address this mismatch with robot-centric pointmaps, images whose pixels store the 3D coordinates of scene points in the robot frame. Pointmaps provide robot-frame 3D geometry while preserving the dense H x W grid expected by pretrained 2D VLAs, so they integrate into existing VLAs with minimal architectural change. On RoboCasa, pointmaps improve both pi0.5 and SmolVLA and outperform representative camera-viewpoint and 3D-aware baselines. In real-robot experiments, their advantage over an RGB-only policy widens when the camera is moved to a placement unseen during training.", "arxiv_id": "2607.11498", "arxiv_url": "https://arxiv.org/abs/2607.11498", "authors": ["Byungkun Lee", "Dongyoon Hwang", "Dongjin Kim", "Hojoon Lee", "Minho Park", "Jaegul Choo"], "brief": "\u63d0\u51fa\"\u673a\u5668\u4eba\u4e2d\u5fc3\u70b9\u56fe\"\uff08robot-centric pointmaps\uff09\u4f5c\u4e3aVLA\u6a21\u578b\u7684\u89c6\u89c9\u8f93\u5165\uff0c\u5c06\u573a\u666f\u50cf\u7d20\u76843D\u5750\u6807\u8f6c\u6362\u5230\u673a\u5668\u4eba\u81ea\u8eab\u5750\u6807\u7cfb\uff0c\u4ee5H\u00d7W\u56fe\u50cf\u683c\u5f0f\u65e0\u7f1d\u66ff\u6362RGB\u8f93\u5165\uff0c\u6d88\u9664\u76f8\u673a\u5e27\u4e0e\u52a8\u4f5c\u5e27\u4e4b\u95f4\u7684\u5750\u6807\u7cfb\u9519\u4f4d\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11498", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u70b9\u56fe\u4fdd\u75592D\u56fe\u50cf\u7684H\u00d7W\u7f51\u683c\u7ed3\u6784\uff0c\u53ef\u76f4\u63a5\u63d2\u5165\u73b0\u6709VLA\u67b6\u6784\uff0c\u51e0\u4e4e\u65e0\u9700\u4fee\u6539\u6a21\u578b", "\u5728RoboCasa\u57fa\u51c6\u4e0a\uff0c\u70b9\u56fe\u8f93\u5165\u663e\u8457\u63d0\u5347pi0.5\u548cSmolVLA\u7684\u6027\u80fd\uff0c\u4f18\u4e8e\u76f8\u673a\u89c6\u89d2\u611f\u77e5\u548c3D\u611f\u77e5\u57fa\u7ebf", "\u771f\u5b9e\u673a\u5668\u4eba\u5b9e\u9a8c\u4e2d\uff0c\u5f53\u76f8\u673a\u79fb\u81f3\u8bad\u7ec3\u65f6\u672a\u89c1\u8fc7\u7684\u4f4d\u7f6e\u65f6\uff0c\u70b9\u56fe\u76f8\u5bf9\u7eafRGB\u7b56\u7565\u7684\u4f18\u52bf\u8fdb\u4e00\u6b65\u6269\u5927\uff0c\u6cdb\u5316\u6027\u66f4\u5f3a"], "keywords": ["\u673a\u5668\u4eba\u64cd\u4f5c", "\u89c6\u89c9\u8bed\u8a00\u52a8\u4f5c\u6a21\u578b", "\u4e09\u7ef4\u611f\u77e5", "\u6cdb\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11498v1", "published_at": "2026-07-13", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "See like a Robot: Robot-Centric Pointmaps for Vision-Language-Action Models", "tldr": "\u7528\u673a\u5668\u4eba\u5750\u6807\u7cfb\u70b9\u56fe\u66ff\u4ee3\u76f8\u673a\u5e27RGB\u56fe\uff0c\u89e3\u51b3VLA\u6a21\u578b\u89c2\u6d4b\u4e0e\u52a8\u4f5c\u5750\u6807\u7cfb\u4e0d\u5339\u914d\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u673a\u5668\u4eba\u4e2d\u5fc3\u70b9\u56fe\"\uff08robot-centric pointmaps\uff09\u4f5c\u4e3aVLA\u6a21\u578b\u7684\u89c6\u89c9\u8f93\u5165\uff0c\u5c06\u573a\u666f\u50cf\u7d20\u76843D\u5750\u6807\u8f6c\u6362\u5230\u673a\u5668\u4eba\u81ea\u8eab\u5750\u6807\u7cfb\uff0c\u4ee5H\u00d7W\u56fe\u50cf\u683c\u5f0f\u65e0\u7f1d\u66ff\u6362RGB\u8f93\u5165\uff0c\u6d88\u9664\u76f8\u673a\u5e27\u4e0e\u52a8\u4f5c\u5e27\u4e4b\u95f4\u7684\u5750\u6807\u7cfb\u9519\u4f4d\u3002", "why_notable": "\u76f4\u51fbVLA\u6a21\u578b\u5728\u591a\u76f8\u673a\u89c6\u89d2\u4e0b\u6cdb\u5316\u96be\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u65b9\u6848\u8f7b\u91cf\uff08\u65e0\u9700\u6539\u67b6\u6784\uff09\u5374\u6548\u679c\u663e\u8457\uff0c\u5bf9\u5927\u89c4\u6a21\u8de8\u573a\u666f\u673a\u5668\u4eba\u6570\u636e\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Learning, at its core, extends beyond memorization to the ability to reason and solve novel problems by navigating a space of possibilities. We introduce Lumo-2, a latent world-action model that generates actions by reasoning over world dynamics in latent space. The learned latent world dynamics capture physically grounded visual transitions, naturally encoding future possibilities and providing a unified substrate for cross-modal alignment. This formulation enables predictive reasoning akin to world modelling while remaining lightweight and focused on physical dynamics relevant to control. Central to our approach is the hypothesis that action generation quality is governed by the geometry of the latent space. We observe that standard reconstruction-based action tokenization objectives induce representations biased toward low-level signal fidelity, leading to misalignment between reconstruction quality and downstream control performance. To address this limitation, we propose a multi-stage modality pre-alignment strategy in which action representations are progressively aligned with latent world dynamics, vision, and language. This process enforces cross-modal consistency, promotes abstraction, and induces a structured latent space for predictive reasoning. We provide a systematic empirical study of latent world modelling and modality alignment, analyzing their roles in scaling laws and out-of-distribution generalization. Results show that Lumo-2 consistently outperforms strong vision-language-action (VLA) and world-action model (WAM) baselines, with gains on challenging real-world tasks requiring temporal reasoning, physical understanding, or high control complexity, including long-horizon and dexterous manipulation. These findings suggest that structured multimodal alignment and predictive reasoning are fundamental principles for advancing embodied intelligence.", "arxiv_id": "2607.11270", "arxiv_url": "https://arxiv.org/abs/2607.11270", "authors": ["Peijun Tang", "Shangjin Xie", "Baifu Huang", "Binyan Sun", "Haotian Yang", "Kuncheng Luo", "Weiqi Jin", "Shilin Fang", "Jianan Wang"], "brief": "\u63d0\u51faLumo-2\uff0c\u4e00\u79cd\u5728\u6f5c\u7a7a\u95f4\u4e2d\u63a8\u7406\u4e16\u754c\u52a8\u529b\u5b66\u4ee5\u751f\u6210\u52a8\u4f5c\u7684\u6f5c\u5728\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\uff0c\u901a\u8fc7\u591a\u9636\u6bb5\u6a21\u6001\u9884\u5bf9\u9f50\u7b56\u7565\u5c06\u52a8\u4f5c\u8868\u793a\u4e0e\u89c6\u89c9\u3001\u8bed\u8a00\u548c\u4e16\u754c\u52a8\u529b\u5b66\u9010\u6b65\u5bf9\u9f50\uff0c\u89e3\u51b3\u91cd\u5efa\u76ee\u6807\u5bfc\u81f4\u7684\u8868\u793a\u504f\u5dee\u95ee\u9898\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11270", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u5047\u8bbe\uff1a\u52a8\u4f5c\u751f\u6210\u8d28\u91cf\u7531\u6f5c\u7a7a\u95f4\u51e0\u4f55\u7ed3\u6784\u51b3\u5b9a\uff0c\u6807\u51c6\u91cd\u5efa\u76ee\u6807\u4f1a\u5bfc\u81f4\u4f4e\u7ea7\u4fe1\u53f7\u504f\u5dee\uff0c\u4f7f\u91cd\u5efa\u8d28\u91cf\u4e0e\u63a7\u5236\u6027\u80fd\u8131\u8282", "\u63d0\u51fa\u591a\u9636\u6bb5\u6a21\u6001\u9884\u5bf9\u9f50\u7b56\u7565\uff0c\u5c06\u52a8\u4f5c\u8868\u793a\u4f9d\u6b21\u4e0e\u6f5c\u5728\u4e16\u754c\u52a8\u529b\u5b66\u3001\u89c6\u89c9\u548c\u8bed\u8a00\u5bf9\u9f50\uff0c\u6784\u5efa\u7ed3\u6784\u5316\u6f5c\u7a7a\u95f4", "\u5728\u957f\u65f6\u57df\u64cd\u4f5c\u3001\u7075\u5de7\u64cd\u4f5c\u7b49\u9ad8\u96be\u5ea6\u771f\u5b9e\u4efb\u52a1\u4e0a\u6301\u7eed\u8d85\u8d8aVLA\u548cWAM\u57fa\u7ebf\uff0c\u5e76\u7cfb\u7edf\u5206\u6790\u4e86\u6f5c\u5728\u4e16\u754c\u5efa\u6a21\u5bf9\u7f29\u653e\u5f8b\u548c\u5206\u5e03\u5916\u6cdb\u5316\u7684\u5f71\u54cd"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u4e16\u754c\u6a21\u578b", "\u591a\u6a21\u6001", "\u673a\u5668\u4eba\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11270v1", "published_at": "2026-07-13", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Towards Predictive, Aligned, and Scalable Robot Learning", "tldr": "Lumo-2\uff1a\u901a\u8fc7\u6f5c\u7a7a\u95f4\u4e16\u754c\u52a8\u529b\u5b66\u5efa\u6a21\u4e0e\u591a\u6a21\u6001\u5bf9\u9f50\u63d0\u5347\u673a\u5668\u4eba\u63a7\u5236\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faLumo-2\uff0c\u4e00\u79cd\u5728\u6f5c\u7a7a\u95f4\u4e2d\u63a8\u7406\u4e16\u754c\u52a8\u529b\u5b66\u4ee5\u751f\u6210\u52a8\u4f5c\u7684\u6f5c\u5728\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\uff0c\u901a\u8fc7\u591a\u9636\u6bb5\u6a21\u6001\u9884\u5bf9\u9f50\u7b56\u7565\u5c06\u52a8\u4f5c\u8868\u793a\u4e0e\u89c6\u89c9\u3001\u8bed\u8a00\u548c\u4e16\u754c\u52a8\u529b\u5b66\u9010\u6b65\u5bf9\u9f50\uff0c\u89e3\u51b3\u91cd\u5efa\u76ee\u6807\u5bfc\u81f4\u7684\u8868\u793a\u504f\u5dee\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793a\u6f5c\u7a7a\u95f4\u51e0\u4f55\u7ed3\u6784\u5bf9\u673a\u5668\u4eba\u52a8\u4f5c\u751f\u6210\u7684\u51b3\u5b9a\u6027\u4f5c\u7528\uff0c\u63d0\u51fa\u7684\u591a\u6a21\u6001\u5bf9\u9f50\u6846\u67b6\u4e3a\u5177\u8eab\u667a\u80fd\u7684\u53ef\u6269\u5c55\u5b66\u4e60\u63d0\u4f9b\u4e86\u65b0\u539f\u5219\uff0c\u5728\u771f\u5b9e\u590d\u6742\u4efb\u52a1\u4e0a\u9a8c\u8bc1\u4e86\u9884\u6d4b\u6027\u63a8\u7406\u7684\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Can a Video Large Language Model (Video-LLM) follow one person through a long video, keeping track of who they are well enough to report, in order, how their outfit changes across a full TV episode? Benchmarks increasingly score this kind of task, and the strongest open-source 7--8B models now reach 37--38% on InfiniBench\u0027s global appearance task, which asks exactly that. But does that score come from tracking the named character, or from something easier? We test this with a nine-condition diagnostic protocol applied to three architecturally distinct open-source Video-LLMs, with Gemini~2.5~Flash as a frontier reference, and find the accuracy does not come from character tracking. When we change the character named in the question to a different cast member, leaving the video and answer options untouched, the models change their answer only 4--31% of the time, so they are largely ignoring who the question asks about. Breaking that test down by the gender of the swapped name shows why: the models react more when the name is changed to a different-gender character than to a same-gender one (a 13--28 point gap), picking up coarse gender cues but unable to tell same-gender individuals apart. This shallow processing surfaces again when we drop the multiple-choice options and ask the same questions open-endedly: open-source accuracy drops 18--25 points, with none of 151 answers fully correct, versus a 12-point drop for Gemini. Further checks rule out the obvious innocent explanations, adding subtitles, using the most informative frames, or doubling the number of frames all leave character tracking unimproved, so the bottleneck is not how much video the model sees but how it ties that video to the person the question names. We release a diagnostic toolkit for auditing what such benchmark scores actually measure.", "arxiv_id": "2607.11078", "arxiv_url": "https://arxiv.org/abs/2607.11078", "authors": ["Mohammad Al-Ratrout", "Shayla Sharmin", "Aditya Raikwar", "Roghayeh Leila Barmaki"], "brief": "\u672c\u6587\u63d0\u51fa\u4e5d\u6761\u4ef6\u8bca\u65ad\u534f\u8bae\uff0c\u7cfb\u7edf\u63ed\u793aVideo-LLM\u5728\u957f\u89c6\u9891\u89d2\u8272\u8ffd\u8e2a\u4efb\u52a1\u4e0a\u7684\u865a\u5047\u9ad8\u5206\u95ee\u9898\u2014\u2014\u6a21\u578b\u5e76\u975e\u771f\u6b63\u8ffd\u8e2a\u89d2\u8272\uff0c\u800c\u662f\u4f9d\u8d56\u7c97\u7c92\u5ea6\u6027\u522b\u7ebf\u7d22\u7b49\u6377\u5f84\u4f5c\u7b54\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11078", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u95ee\u9898\u4e2d\u89d2\u8272\u540d\u66ff\u6362\u4e3a\u5176\u4ed6\u6f14\u5458\u540e\uff0c\u6a21\u578b\u4ec5\u67094\u201331%\u7684\u6982\u7387\u6539\u53d8\u7b54\u6848\uff0c\u8bf4\u660e\u6a21\u578b\u57fa\u672c\u5ffd\u7565\u95ee\u9898\u6240\u6307\u89d2\u8272", "\u6a21\u578b\u5bf9\u8de8\u6027\u522b\u540d\u79f0\u66ff\u6362\u7684\u53cd\u5e94\uff0813\u201328\u5206\u5dee\u8ddd\uff09\u8fdc\u5f3a\u4e8e\u540c\u6027\u522b\u66ff\u6362\uff0c\u66b4\u9732\u5176\u4ec5\u6355\u83b7\u7c97\u7c92\u5ea6\u6027\u522b\u7ebf\u7d22\u800c\u65e0\u6cd5\u533a\u5206\u540c\u6027\u522b\u4e2a\u4f53", "\u5f00\u653e\u5f0f\u95ee\u7b54\u76f8\u6bd4\u591a\u9009\u9898\u51c6\u786e\u7387\u4e0b\u964d18\u201325\u5206\uff0c151\u4e2a\u7b54\u6848\u65e0\u4e00\u5b8c\u5168\u6b63\u786e\uff1b\u589e\u52a0\u5b57\u5e55\u3001\u5173\u952e\u5e27\u6216\u5e27\u6570\u5747\u65e0\u6cd5\u6539\u5584\u89d2\u8272\u8ffd\u8e2a"], "keywords": ["\u89c6\u9891\u7406\u89e3", "\u591a\u6a21\u6001", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11078v1", "published_at": "2026-07-13", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Do Video-LLMs Actually Watch? Diagnosing Character-Tracking Failures in Long-Form Video", "tldr": "Video-LLM\u5728\u957f\u89c6\u9891\u89d2\u8272\u8ffd\u8e2a\u4efb\u52a1\u4e2d\u7684\u9ad8\u5206\u6e90\u4e8e\u6377\u5f84\u800c\u975e\u771f\u6b63\u7406\u89e3", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u4e5d\u6761\u4ef6\u8bca\u65ad\u534f\u8bae\uff0c\u7cfb\u7edf\u63ed\u793aVideo-LLM\u5728\u957f\u89c6\u9891\u89d2\u8272\u8ffd\u8e2a\u4efb\u52a1\u4e0a\u7684\u865a\u5047\u9ad8\u5206\u95ee\u9898\u2014\u2014\u6a21\u578b\u5e76\u975e\u771f\u6b63\u8ffd\u8e2a\u89d2\u8272\uff0c\u800c\u662f\u4f9d\u8d56\u7c97\u7c92\u5ea6\u6027\u522b\u7ebf\u7d22\u7b49\u6377\u5f84\u4f5c\u7b54\u3002", "why_notable": "\u63ed\u793a\u5f53\u524dVideo-LLM\u57fa\u51c6\u8bc4\u6d4b\uff08\u5982InfiniBench\uff09\u5b58\u5728\u4e25\u91cd\u7684\u8bc4\u4f30\u865a\u5047\u6027\uff0c\u9ad8\u5206\u5e76\u4e0d\u4ee3\u8868\u771f\u5b9e\u7684\u89c6\u9891\u7406\u89e3\u80fd\u529b\uff0c\u5e76\u53d1\u5e03\u8bca\u65ad\u5de5\u5177\u5305\u4f9b\u793e\u533a\u5ba1\u8ba1\u57fa\u51c6\u5206\u6570\u7684\u5b9e\u9645\u542b\u4e49\u3002"}, {"abstract": "When should an intelligent assistant speak up without being asked? Continuous egocentric video offers rich, evolving context that enables a new form of assistance: one that is proactive rather than merely reactive. Yet existing approaches either wait passively for user queries or treat every detected event as requiring a response, without considering the user\u0027s history, current activity, or whether assistance would actually be welcome. We reframe proactive assistance as a context-dependent decision problem: the agent must not only perceive what is happening, but reason over accumulated temporal context to determine when and whether to intervene. To this end, we present Vinci2, a proactive egocentric assistance system that advances the on-device assistant Vinci from reactive response toward proactivity. On the evaluation side, we present EgoServe, the first large-scale benchmark for proactive assistance in continuous egocentric video. EgoServe comprises over 3,000 service instances organized along 4 temporal memory horizons, ranging from immediate safety alerts to long-term habit coaching, across 10 service categories. On the modeling side, we propose EgoMemo, a training-free, memory-augmented agent that maintains three complementary memory representations: multi-scale temporal summaries, a semantic knowledge graph, and visual embedding archives. At each timestep, EgoMemo performs retrieval-augmented reasoning to determine whether assistance is warranted and, if so, produces contextually grounded responses. Experiments demonstrate that EgoMemo establishes strong baselines on EgoServe while remaining competitive on existing egocentric benchmarks. Our benchmark and code are publicly available at \\href{https://sitonggong.github.io/EgoServe-page/}{Vinci2}.", "arxiv_id": "2607.11523", "arxiv_url": "https://arxiv.org/abs/2607.11523", "authors": ["Gong Sitong", "Tianyu Yan", "Caixin Kang", "Bo Zheng", "Xiang Ruan", "Huchuan Lu", "Kaipeng Zhang", "Yoichi Sato", "Yifei Huang"], "brief": "\u63d0\u51faVinci2\u7cfb\u7edf\uff0c\u5c06\u7b2c\u4e00\u4eba\u79f0\u89c6\u9891\u52a9\u624b\u4ece\u88ab\u52a8\u54cd\u5e94\u5347\u7ea7\u4e3a\u4e3b\u52a8\u5e72\u9884\uff0c\u6838\u5fc3\u5305\u62ec\uff1a\u5927\u89c4\u6a21\u8bc4\u6d4b\u57fa\u51c6EgoServe\uff083000+\u670d\u52a1\u5b9e\u4f8b\u30014\u79cd\u65f6\u95f4\u8bb0\u5fc6\u8de8\u5ea6\u300110\u7c7b\u670d\u52a1\uff09\u548c\u514d\u8bad\u7ec3\u8bb0\u5fc6\u589e\u5f3a\u667a\u80fd\u4f53EgoMemo\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11523", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["EgoServe\u662f\u9996\u4e2a\u8fde\u7eed\u7b2c\u4e00\u4eba\u79f0\u89c6\u9891\u4e3b\u52a8\u8f85\u52a9\u5927\u89c4\u6a21\u57fa\u51c6\uff0c\u6db5\u76d6\u5373\u65f6\u5b89\u5168\u8b66\u62a5\u5230\u957f\u671f\u4e60\u60ef\u6307\u5bfc\u7b494\u79cd\u65f6\u95f4\u8bb0\u5fc6\u5c42\u6b21", "EgoMemo\u7ef4\u62a4\u4e09\u79cd\u4e92\u8865\u8bb0\u5fc6\u8868\u793a\uff1a\u591a\u5c3a\u5ea6\u65f6\u5e8f\u6458\u8981\u3001\u8bed\u4e49\u77e5\u8bc6\u56fe\u8c31\u548c\u89c6\u89c9\u5d4c\u5165\u6863\u6848\uff0c\u514d\u8bad\u7ec3\u5373\u53ef\u8fd0\u884c", "\u901a\u8fc7\u68c0\u7d22\u589e\u5f3a\u63a8\u7406\u5224\u65ad\u662f\u5426\u9700\u8981\u5e72\u9884\uff0c\u5e76\u751f\u6210\u6709\u4e0a\u4e0b\u6587\u4f9d\u636e\u7684\u54cd\u5e94\uff0c\u5728EgoServe\u4e0a\u5efa\u7acb\u5f3a\u57fa\u7ebf"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u8bb0\u5fc6\u589e\u5f3a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11523v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Vinci2: Providing Proactive Assistance in Continuous Egocentric Videos", "tldr": "Vinci2\uff1a\u57fa\u4e8e\u8fde\u7eed\u7b2c\u4e00\u4eba\u79f0\u89c6\u9891\u7684\u4e3b\u52a8\u5f0f\u667a\u80fd\u52a9\u624b\u7cfb\u7edf\uff0c\u542b\u65b0\u57fa\u51c6EgoServe", "upvotes": 0, "what_it_is": "\u63d0\u51faVinci2\u7cfb\u7edf\uff0c\u5c06\u7b2c\u4e00\u4eba\u79f0\u89c6\u9891\u52a9\u624b\u4ece\u88ab\u52a8\u54cd\u5e94\u5347\u7ea7\u4e3a\u4e3b\u52a8\u5e72\u9884\uff0c\u6838\u5fc3\u5305\u62ec\uff1a\u5927\u89c4\u6a21\u8bc4\u6d4b\u57fa\u51c6EgoServe\uff083000+\u670d\u52a1\u5b9e\u4f8b\u30014\u79cd\u65f6\u95f4\u8bb0\u5fc6\u8de8\u5ea6\u300110\u7c7b\u670d\u52a1\uff09\u548c\u514d\u8bad\u7ec3\u8bb0\u5fc6\u589e\u5f3a\u667a\u80fd\u4f53EgoMemo\u3002", "why_notable": "\u9996\u6b21\u5c06\u4e3b\u52a8\u8f85\u52a9\u5f62\u5f0f\u5316\u4e3a\u4e0a\u4e0b\u6587\u4f9d\u8d56\u51b3\u7b56\u95ee\u9898\uff0c\u586b\u8865\u4e86\u7b2c\u4e00\u4eba\u79f0\u89c6\u9891\u52a9\u624b\u4e3b\u52a8\u6027\u8bc4\u6d4b\u7684\u7a7a\u767d\uff0c\u514d\u8bad\u7ec3\u8bbe\u8ba1\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Personal AI assistants on mobile and wearable devices continuously perceive users\u0027 daily lives through visual and audio streams. However, answering queries about past experiences requires lightweight multimodal memory that can continuously accumulate, organize, and retrieve long-term experiences, which remains challenging. To address this challenge, we present LightMem-Ego, a lightweight streaming multimodal memory system for everyday-life assistance. The system continuously captures egocentric visual and audio streams, aligns them on a shared timeline, and organizes them into a hierarchical memory consisting of current, short-term, and long-term memory. Given a user query, LightMem-Ego dynamically routes retrieval to the appropriate memory level and generates answers grounded in multimodal evidence. The demonstration can be deployed on smartphones and AI glasses, supporting object finding, conversation recall, life summarization, routine discovery, and personalized assistance. Code is available at https://github.com/zjunlp/LightMem-Ego.", "arxiv_id": "2607.11487", "arxiv_url": "https://arxiv.org/abs/2607.11487", "authors": ["Yijun Chen", "Boyi Xiao", "Yixian Zhao", "Haoting Xia", "Buqiang Xu", "Jizhan Fang", "Yanya Li", "Yaqi Zheng", "Xuehai Wang", "Zirui Xue", "Liuxin Zhang", "Hui Li", "Ningyu Zhang"], "brief": "LightMem-Ego\u662f\u4e00\u4e2a\u8f7b\u91cf\u7ea7\u6d41\u5f0f\u591a\u6a21\u6001\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u6301\u7eed\u6355\u83b7\u7b2c\u4e00\u89c6\u89d2\u7684\u89c6\u89c9\u548c\u97f3\u9891\u6d41\uff0c\u6784\u5efa\u5c42\u7ea7\u8bb0\u5fc6\uff08\u5f53\u524d/\u77ed\u671f/\u957f\u671f\uff09\uff0c\u5e76\u6839\u636e\u7528\u6237\u67e5\u8be2\u52a8\u6001\u68c0\u7d22\u76f8\u5173\u8bb0\u5fc6\u751f\u6210\u7b54\u6848\u3002", "categories": ["cs.CL", "cs.AI", "cs.CV", "cs.HC", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11487", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u6784\u5efa\u4e09\u7ea7\u5c42\u7ea7\u8bb0\u5fc6\u7ed3\u6784\uff08\u5f53\u524d\u3001\u77ed\u671f\u3001\u957f\u671f\uff09\uff0c\u652f\u6301\u957f\u671f\u7ecf\u9a8c\u7684\u6301\u7eed\u79ef\u7d2f\u4e0e\u7ec4\u7ec7", "\u89c6\u89c9\u4e0e\u97f3\u9891\u6d41\u5728\u5171\u4eab\u65f6\u95f4\u8f74\u4e0a\u5bf9\u9f50\uff0c\u5b9e\u73b0\u771f\u6b63\u7684\u591a\u6a21\u6001\u8bb0\u5fc6\u878d\u5408", "\u53ef\u90e8\u7f72\u4e8e\u667a\u80fd\u624b\u673a\u548cAI\u773c\u955c\uff0c\u652f\u6301\u7269\u54c1\u67e5\u627e\u3001\u5bf9\u8bdd\u56de\u5fc6\u3001\u751f\u6d3b\u603b\u7ed3\u3001\u4e60\u60ef\u53d1\u73b0\u7b49\u573a\u666f"], "keywords": ["\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u8bb0\u5fc6\u7cfb\u7edf", "\u53ef\u7a7f\u6234\u8bbe\u5907"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11487v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "LightMem-Ego: Your AI Memory for Everyday Life", "tldr": "\u9762\u5411\u65e5\u5e38\u751f\u6d3b\u7684\u8f7b\u91cf\u7ea7\u6d41\u5f0f\u591a\u6a21\u6001\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u53ef\u90e8\u7f72\u4e8e\u624b\u673a\u548cAI\u773c\u955c", "upvotes": 0, "what_it_is": "LightMem-Ego\u662f\u4e00\u4e2a\u8f7b\u91cf\u7ea7\u6d41\u5f0f\u591a\u6a21\u6001\u8bb0\u5fc6\u7cfb\u7edf\uff0c\u6301\u7eed\u6355\u83b7\u7b2c\u4e00\u89c6\u89d2\u7684\u89c6\u89c9\u548c\u97f3\u9891\u6d41\uff0c\u6784\u5efa\u5c42\u7ea7\u8bb0\u5fc6\uff08\u5f53\u524d/\u77ed\u671f/\u957f\u671f\uff09\uff0c\u5e76\u6839\u636e\u7528\u6237\u67e5\u8be2\u52a8\u6001\u68c0\u7d22\u76f8\u5173\u8bb0\u5fc6\u751f\u6210\u7b54\u6848\u3002", "why_notable": "\u5c06\u591a\u6a21\u6001\u8bb0\u5fc6\u7cfb\u7edf\u843d\u5730\u5230\u79fb\u52a8\u7aef\u548c\u53ef\u7a7f\u6234\u8bbe\u5907\uff0c\u89e3\u51b3\u4e86\u4e2a\u4ebaAI\u52a9\u624b\u957f\u671f\u8bb0\u5fc6\u79ef\u7d2f\u4e0e\u68c0\u7d22\u7684\u5b9e\u9645\u96be\u9898\uff0c\u5177\u6709\u5f88\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u548c\u4ea7\u54c1\u5316\u6f5c\u529b\uff0c\u4ee3\u7801\u5df2\u5f00\u6e90\u3002"}, {"abstract": "Text-based evaluations of Theory of Mind (ToM) in Large Language Models (LLMs) often involve cognitive tests akin to the Sally-Anne task that can be gamed due to exposure to relevantly similar tasks in pre-training and do not obviously test models\u0027 functional ToM abilities in ways that generalize to naturalistic settings. To address these issues, we introduce the Epistemic Asymmetry Schelling Task (EAST), a two-player dialogue game designed to benchmark robust and generalizable ToM abilities. By requiring LLM-LLM dyads to independently converge on semantic Schelling points under varying states of epistemic transparency, we evaluate whether models can robustly apply ToM to achieve coordination. Our results reveal a significant capability gap in functional social reasoning, with only frontier models successfully navigating the varying epistemic demands of the tasks. Analysis of reasoning traces shows that coordination failures are primarily driven by epistemic tracking errors, such as conflating private knowledge with mutual knowledge. Despite high performance on traditional static benchmarks, our study shows that robust social reasoning and epistemic tracking remain a critical bottleneck, providing concrete targets for future LLM evaluation and development.", "arxiv_id": "2607.11363", "arxiv_url": "https://arxiv.org/abs/2607.11363", "authors": ["Roberta Rocca", "Sami Boukortt", "Geoff Keeling", "Winnie Street"], "brief": "\u63d0\u51fa\u300c\u8ba4\u77e5\u4e0d\u5bf9\u79f0\u8c22\u6797\u4efb\u52a1\uff08EAST\uff09\u300d\u2014\u2014\u4e00\u79cd\u53cc\u4eba\u5bf9\u8bdd\u535a\u5f08\uff0c\u8981\u6c42LLM\u5728\u4e0d\u540c\u8ba4\u77e5\u900f\u660e\u5ea6\u4e0b\u72ec\u7acb\u6536\u655b\u5230\u8bed\u4e49\u8c22\u6797\u70b9\uff0c\u4ee5\u8bc4\u4f30\u6a21\u578b\u662f\u5426\u5177\u5907\u53ef\u6cdb\u5316\u7684\u5fc3\u667a\u7406\u8bba\uff08ToM\uff09\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11363", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4f20\u7edfSally-Anne\u7c7b\u6d4b\u8bd5\u56e0\u9884\u8bad\u7ec3\u6570\u636e\u6c61\u67d3\u800c\u53ef\u88ab\u300c\u4f5c\u5f0a\u300d\uff0cEAST\u901a\u8fc7\u52a8\u6001\u535a\u5f08\u573a\u666f\u89c4\u907f\u6b64\u95ee\u9898", "\u4ec5\u524d\u6cbf\u5927\u6a21\u578b\u80fd\u6210\u529f\u5e94\u5bf9\u4efb\u52a1\u4e2d\u53d8\u5316\u7684\u8ba4\u77e5\u9700\u6c42\uff0c\u63ed\u793a\u663e\u8457\u7684\u80fd\u529b\u5dee\u8ddd", "\u5931\u8d25\u4e3b\u8981\u6e90\u4e8e\u300c\u8ba4\u77e5\u8ffd\u8e2a\u9519\u8bef\u300d\uff0c\u5982\u5c06\u79c1\u6709\u77e5\u8bc6\u4e0e\u5171\u540c\u77e5\u8bc6\u6df7\u6dc6"], "keywords": ["\u5fc3\u667a\u7406\u8bba", "\u5927\u8bed\u8a00\u6a21\u578b", "\u793e\u4f1a\u63a8\u7406", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11363v1", "published_at": "2026-07-13", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Beyond Sally-Anne: Evaluating Theory of Mind in LLMs using Epistemic Schelling Points", "tldr": "\u63d0\u51faEAST\u4efb\u52a1\u8bc4\u4f30LLM\u5fc3\u667a\u7406\u8bba\uff0c\u63ed\u793a\u5176\u793e\u4f1a\u63a8\u7406\u80fd\u529b\u7684\u5173\u952e\u74f6\u9888", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u300c\u8ba4\u77e5\u4e0d\u5bf9\u79f0\u8c22\u6797\u4efb\u52a1\uff08EAST\uff09\u300d\u2014\u2014\u4e00\u79cd\u53cc\u4eba\u5bf9\u8bdd\u535a\u5f08\uff0c\u8981\u6c42LLM\u5728\u4e0d\u540c\u8ba4\u77e5\u900f\u660e\u5ea6\u4e0b\u72ec\u7acb\u6536\u655b\u5230\u8bed\u4e49\u8c22\u6797\u70b9\uff0c\u4ee5\u8bc4\u4f30\u6a21\u578b\u662f\u5426\u5177\u5907\u53ef\u6cdb\u5316\u7684\u5fc3\u667a\u7406\u8bba\uff08ToM\uff09\u80fd\u529b\u3002", "why_notable": "\u7a81\u7834\u9759\u6001\u57fa\u51c6\u5c40\u9650\uff0c\u7528\u535a\u5f08\u8bba\u4e2d\u7684\u8c22\u6797\u70b9\u6784\u5efa\u52a8\u6001\u8bc4\u4f30\u6846\u67b6\uff0c\u66f4\u771f\u5b9e\u5730\u6d4b\u91cfLLM\u7684\u529f\u80fd\u6027\u793e\u4f1a\u63a8\u7406\u80fd\u529b\uff0c\u4e3a\u672a\u6765\u8bc4\u4f30\u4e0e\u6539\u8fdb\u63d0\u4f9b\u5177\u4f53\u65b9\u5411\u3002"}, {"abstract": "Chain-of-Thought (CoT) prompting has significantly advanced the reasoning capabilities of Large Language Models (LLMs), yet it often incurs substantial computational costs due to over-reasoning: the generation of redundant, verbose, or irrelevant steps. While existing reasoning step evaluators effectively detect logical fallacies and factual errors, our analysis reveals a critical blind spot: they fail to penalize valid but inefficient reasoning steps that inflate token usage without contributing to the solution. To systematically diagnose this limitation, we introduce RIV-GSM8K, a diagnostic benchmark injected with five distinct types of inefficiencies, including circular reasoning and excessive decomposition. Diagnostic experiments reveal that state-of-the-art evaluators struggle to distinguish these inefficiencies from necessary reasoning. To address this gap, we propose CAID (Context-Aware Information Density), a training-free metric grounded in information theory that identifies low-utility steps. To validate the metric\u0027s practical utility, we apply it within PACE, a post-hoc compression strategy. Additional control experiments show that the gains of PACE are not explained by trivial pruning: compared with random step removal and PRM-based compression baselines, it preserves accuracy at substantially higher compression rates. Empirical results on GSM8K, StrategyQA, and ARC-Challenge demonstrate that PACE reduces token consumption by 31-53% while maintaining accuracy, confirming that CAID successfully distills informational froth from reasoning chains without compromising deductive validity.", "arxiv_id": "2607.11266", "arxiv_url": "https://arxiv.org/abs/2607.11266", "authors": ["Daeyeop Lee", "Hwanjo Yu"], "brief": "\u672c\u6587\u9488\u5bf9\u5927\u8bed\u8a00\u6a21\u578b\u94f
