is, interactive games, and scientific computing. Each task follows a Terminal-Bench-style setup with a reference solution or simulation engine, but is further decomposed into fine-grained graded subtasks. This design enables dense intermediate rewards and partial credit, allowing evaluation to capture not only whether an agent reaches the final goal, but also how far it progresses on open-ended workflows. Tasks in Long-Horizon-Terminal-Bench typically require hundreds of episodes and minutes to hours of execution, stressing long-horizon planning, long-context management, and iterative debugging rather than one-shot problem solving. We evaluate 15 frontier models and find that agents consume on average 9.9M tokens per task, with roughly 231 episodes and 85.3 minutes of execution time per run, making Long-Horizon-Terminal-Bench more demanding than prior terminal-based benchmarks. Even the strongest tested model achieves 15.2% pass@1 at a partial-reward threshold of 0.95 and 10.9% at a perfect-reward threshold of 1.0, while the mean pass rate across models is 4.3% and 1.7% under the two thresholds, respectively. These results reveal headroom for improvement. We further analyze failure modes and error patterns, and release Long-Horizon-Terminal-Bench to support future progress on long-horizon terminal agents.", "arxiv_id": "2607.08964", "arxiv_url": "https://arxiv.org/abs/2607.08964", "authors": ["Zongxia Li", "Zhongzhi Li", "Yucheng Shi", "Ruhan Wang", "Junyao Yang", "Zhichao Liu", "Xiyang Wu", "Anhao Li", "Yue Yu", "Ninghao Liu", "Lichao Sun", "Haotao Mi", "Leowei Liang"], "brief": "\u6784\u5efa\u4e86\u4e00\u4e2a\u5305\u542b46\u4e2a\u957f\u65f6\u57df\u7ec8\u7aef\u4efb\u52a1\u7684\u57fa\u51c6\u6d4b\u8bd5\u96c6\uff0c\u8986\u76d6\u5b9e\u9a8c\u590d\u73b0\u3001\u8f6f\u4ef6\u5de5\u7a0b\u3001\u79d1\u5b66\u8ba1\u7b97\u7b499\u7c7b\u4efb\u52a1\uff0c\u91c7\u7528\u7ec6\u7c92\u5ea6\u5b50\u4efb\u52a1\u5206\u89e3\u5b9e\u73b0\u5bc6\u96c6\u5956\u52b1\u8bc4\u5206\uff0c\u5168\u9762\u8bc Ziyang Rao", "Yili Wang", "Hanqing Wang", "Hao Liu", "Hui Xiong"], "brief": "\u672c\u6587\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e86LLM\u5fae\u8c03\u4e2d\u7684\"Knowing-Using Gap\"\u73b0\u8c61\uff08\u8bb0\u5fc6\u4e0e\u6cdb\u5316\u4e4b\u95f4\u7684\u51c6\u786e\u7387\u5dee\u8ddd\u548c\u65f6\u95f4\u6ede\u540e\uff09\uff0c\u5e76\u63d0\u51fa\u81ea\u6211\u4fee\u8865\uff08self-patching\uff09\u5e72\u9884\u6280\u672f\uff0c\u63ed\u793a\u5176\u6839\u672c\u539f\u56e0\u662f\u77e5\u8bc6\u7535\u8def\u9519\u4f4d\u2014\u2014\u8bb0\u5fc6\u8868\u5f81\u5b58\u5728\u4f46\u672a\u88ab\u8def\u7531\u5230\u6709\u6548\u8ba1\u7b97\u5c42\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.08393", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51faself-patching\u5e72\u9884\u6280\u672f\uff0c\u901a\u8fc7\u91cd\u5b9a\u4f4d\u6fc0\u6d3b\u8868\u5f81\u5b9a\u4f4d\u5bfc\u81f4\u6cdb\u5316\u5931\u8d25\u7684\u5173\u952e\u4f4d\u7f6e", "\u63d0\u51fa\u77e5\u8bc6\u7535\u8def\u9519\u4f4d\u5047\u8bf4\uff1a\u5fae\u8c03\u540e\u77e5\u8bc6\u88ab\u8bb0\u5fc6\u4f46\u672a\u6b63\u786e\u8def\u7531\u81f3\u4e0b\u6e38\u63a8\u7406\u6240\u9700\u7684\u8ba1\u7b97\u5c42", "\u57fa\u4e8e\u8bca\u65ad\u53d1\u73b0\u8bbe\u8ba1\u7b80\u5355\u542f\u53d1\u5f0f\u7b56\u7565\uff0c\u53ef\u6062\u590d58\u201375%\u7684\u6cdb\u5316\u5931\u8d25\u4e0a\u9650\u7a7a\u95f4\uff0c\u8de8\u9886\u57df\u5b9e\u9a8c\u9a8c\u8bc1\u9c81\u68d2\u6027"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u77e5\u8bc6\u6ce8\u5165", "\u5fae\u8c03", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 1, "on_hf": true, "organization": "HKUST", "pdf_url": "https://arxiv.org/pdf/2607.08393v1", "published_at": "2026-07-09", "score": 0.462, "selected_reasons": ["\u77e5\u540d\u673a\u6784: HKU/HKUST", "HF trending (8\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.08393.png", "title": "Towards Mechanistically Understanding Why Memorized Knowledge Fails to Generalize in Large Language Model Finetuning", "tldr": "\u63ed\u793aLLM\u5fae\u8c03\u4e2d\"\u77e5\u800c\u4e0d\u7528\"\u73b0\u8c61\u7684\u673a\u5236\uff1a\u8bb0\u5fc6\u77e5\u8bc6\u672a\u88ab\u8def\u7531\u81f3\u6709\u6548\u8ba1\u7b97\u5c42", "upvotes": 8, "what_it_is": "\u672c\u6587\u5f62\u5f0f\u5316\u5b9a\u4e49\u4e86LLM\u5fae\u8c03\u4e2d\u7684\"Knowing-Using Gap\"\u73b0\u8c61\uff08\u8bb0\u5fc6\u4e0e\u6cdb\u5316\u4e4b\u95f4\u7684\u51c6\u786e\u7387\u5dee\u8ddd\u548c\u65f6\u95f4\u6ede\u540e\uff09\uff0c\u5e76\u63d0\u51fa\u81ea\u6211\u4fee\u8865\uff08self-patching\uff09\u5e72\u9884\u6280\u672f\uff0c\u63ed\u793a\u5176\u6839\u672c\u539f\u56e0\u662f\u77e5\u8bc6\u7535\u8def\u9519\u4f4d\u2014\u2014\u8bb0\u5fc6\u8868\u5f81\u5b58\u5728\u4f46\u672a\u88ab\u8def\u7531\u5230\u6709\u6548\u8ba1\u7b97\u5c42\u3002", "why_notable": "\u9996\u6b21\u4ece\u673a\u5236\u5c42\u9762\u7cfb\u7edf\u89e3\u91caLLM\u5fae\u8c03\u540e\"\u77e5\u800c\u4e0d\u7528\"\u7684\u5185\u5728\u539f\u56e0\uff0c\u63d0\u4f9b\u53ef\u64cd\u4f5c\u7684\u8bca\u65ad\u5de5\u5177\u548c\u6539\u8fdb\u7b56\u7565\uff0c\u5bf9\u77e5\u8bc6\u6ce8\u5165\u4e0e\u6301\u7eed\u5b66\u4e60\u7814\u7a76\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Visual Language Navigation foundation models aim to unify deep reasoning for grounded spatial decisions with broad versatility for diverse embodied tasks. Current approaches typically achieve this integration via monolithic policies that map observations directly to actions, yet they often suffer from coordinate drift and poor handling of long-tail semantics. Furthermore, these black-box mappings lack interpretability, hindering the simultaneous achievement of generality, robustness, and transparency. We present ABot-N1, a step toward a general Visual Language Navigation foundation model, that addresses these challenges by decoupling cognition from control via a slow-fast architecture guided by dual visual-language signals. More specifically, a slow vision-language reasoner performs explicit Chain-of-Thought reasoning while producing a pixel goal. This compact set of image-space anchor points serves as a universal interface for diverse tasks, including point-goal, object-goal, poi-goal, instruction-following, and person-following. Subsequently, a fast action expert leverages both the textual cues and the pixel guidance to generate continuous waypoints at the native control frequency. By bridging high-level intents and low-level control through pixel-grounded anchors paired with explicit linguistic traces, our approach ensures robust, generalizable, and interpretable navigation across simulation and real-world benchmarks. ABot-N1 establishes new state-of-the-art records, delivering massive gains specifically in urban-scale navigation: boosting POI arrival by 35.0% (to 77.3%) and achieving 95.4%/92.9% SR in complex indoor and outdoor scenes. It also maintains superior robustness across object-reaching, person-following, and instruction-following tasks. New Point-Goal/POI-Goal benchmarks are released as open source to advance the field of urban-scale navigation.", "arxiv_id": "2607.10383", "arxiv_url": "https://arxiv.org/abs/2607.10383", "authors": ["Ruiyan Gong", "Yingnan Guo", "Junjun Hu", "Jintao Kong", "Xiaoxu Leng", "Tianlun Li", "Weize Li", "Fei Liu", "Zhicheng Liu", "Jia Lu", "Minghua Luo", "Chenlin Ming", "Yanfen Shen", "Jiyue Tao", "Zhengbo Wang", "Mingyang Yin", "Minqi Gu", "Zihao Guan", "Wei Guo", "Guoqing Liu", "Huachong Pang", "Menglin Yang", "Zeqian Ye", "Xiaoxiao Geng", "Zhining Gu", "Honglin Han", "Di Jing", "Hongyu Pan", "Mingchao Sun", "Kuan Yang", "Jianfang Zhang", "Yanghong Chen", "Ye He", "Wei Mei", "Jiahao Shi", "Xiangpo Yang", "Yanqing Zhu", "Zedong Chu", "Xiaolong Wu", "Mu Xu"], "brief": "\u63d0\u51faABot-N1\uff0c\u4e00\u79cd\u901a\u7528\u89c6\u89c9\u8bed\u8a00\u5bfc\u822a\u57fa\u7840\u6a21\u578b\uff0c\u91c7\u7528\u6162\u5feb\u53cc\u67b6\u6784\u5c06\u9ad8\u5c42\u63a8\u promising alternative to the well-established OPD paradigm.", "arxiv_id": "2607.04751", "arxiv_url": "https://arxiv.org/abs/2607.04751", "authors": ["Zhengpeng Xie", "Li Lyna Zhang", "Zeke Xie", "Mao Yang"], "brief": "\u63d0\u51fa\u4fe1\u4efb\u57df\u7b56\u7565\u84b8\u998f\uff08TOPD\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u52a8\u6001\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\u6a21\u578b\uff0c\u5c06\u9ad8\u65b9\u5dee\u3001\u4e0d\u7a33\u5b9a\u7684\u5728\u7ebf\u7b56\u7565\u84b8\u998f\uff08OPD\uff09\u8f6c\u5316\u4e3a\u7a33\u5b9a\u7684\u8bad\u7ec3\u8303\u5f0f\uff0c\u5e76\u63d0\u4f9b\u5168\u5c40\u6536\u655b\u6027\u4e0e\u5355\u8c03\u6539\u8fdb\u7684\u7406\u8bba\u4fdd\u8bc1\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.04751", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u52a8\u6001\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\uff0c\u4ece\u7406\u8bba\u4e0a\u8bc1\u660eTOPD\u80fd\u5185\u5728\u63a7\u5236\u68af\u5ea6\u65b9\u5dee\uff0c\u5e76\u7ed9\u51fa\u5168\u5c40\u6536\u655b\u5206\u6790\u4e0e\u5355\u8c03\u6539\u8fdb\u754c", "\u5728\u6570\u5b66\u63a8\u7406\u4efb\u52a1\u4e0a\u663e\u8457\u63d0\u5347\u8bad\u7ec3\u7a33\u5b9a\u6027\u3001\u6837\u672c\u6548\u7387\u548c\u6700\u7ec8\u6027\u80fd", "\u5f15\u5165\u96f6\u989d\u5916\u8ba1\u7b97\u5f00\u9500\uff0c\u53ef\u76f4\u63a5\u66ff\u4ee3\u73b0\u6709OPD\u8303\u5f0f"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u77e5\u8bc6\u84b8\u998f", "\u7b56\u7565\u4f18\u5316", "\u6570\u5b66\u63a8\u7406"], "num_comments": 2, "on_hf": true, "organization": "HKUSTGZ", "pdf_url": "https://arxiv.org/pdf/2607.04751v1", "published_at": "2026-07-06", "score": 0.457, "selected_reasons": ["\u77e5\u540d\u673a\u6784: HKU/HKUST", "HF trending (17\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.04751.png", "title": "Trust Region Policy Distillation", "tldr": "TOPD\u901a\u8fc7\u52a8\u6001\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\u5c06\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u7a33\u5b9a\u5316\uff0c\u96f6\u989d\u5916\u8ba1\u7b97\u5f00\u9500\u63d0\u5347\u6570\u5b66\u63a8\u7406\u6027\u80fd", "upvotes": 17, "what_it_is": "\u63d0\u51fa\u4fe1\u4efb\u57df\u7b56\u7565\u84b8\u998f\uff08TOPD\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u52a8\u6001\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\u6a21\u578b\uff0c\u5c06\u9ad8\u65b9\u5dee\u3001\u4e0d\u7a33\u5b9a\u7684\u5728\u7ebf\u7b56\u7565\u84b8\u998f\uff08OPD\uff09\u8f6c\u5316\u4e3a\u7a33\u5b9a\u7684\u8bad\u7ec3\u8303\u5f0f\uff0c\u5e76\u63d0\u4f9b\u5168\u5c40\u6536\u655b\u6027\u4e0e\u5355\u8c03\u6539\u8fdb\u7684\u7406\u8bba\u4fdd\u8bc1\u3002", "why_notable": "\u5728LLM\u7b56\u7565\u84b8\u998f\u9886\u57df\uff0cOPD\u7684\u9ad8\u65b9\u5dee\u95ee\u9898\u957f\u671f\u5236\u7ea6\u8bad\u7ec3\u7a33\u5b9a\u6027\uff1bTOPD\u4ee5\u96f6\u5f00\u9500\u89e3\u51b3\u8be5\u95ee\u9898\u5e76\u9644\u5e26\u4e25\u683c\u7406\u8bba\u4fdd\u8bc1\uff0c\u5bf9\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u4e0e\u77e5\u8bc6\u84b8\u998f\u5b9e\u8df5\u5747\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Vision-language models (VLMs) have made interactive digital museums increasingly feasible by connecting 3D digitization with natural-language artifact exploration. However, in cultural heritage domains such as ancient Greek pottery, reliable VLM assistance is limited by two challenges. First, open-ended interpretation requires grounding fine-grained 2D/3D visual evidence in specialized curatorial knowledge, yet the retrieval process may introduce weak sources and unverifiable references. Second, when the available evidence is incomplete, noisy, or ambiguous, VLMs often produce confident but unsupported answers instead of calibrated uncertainty. To address these challenges, we propose VaseMuseum, a lightweight and modular multimodal agent framework for intelligent digital museums of ancient Greek pottery. VaseMuseum combines an interactive virtual museum with VaseAgent, which supports both 2D images and 3D artifacts through multimodal perception, 3D-aware reasoning, external knowledge retrieval, and inference-time reliability control. Specifically, VaseAgent retrieves evidence from authoritative web and museum knowledge sources, and source-level control selects diverse and verifiable evidence before generation. Meanwhile, response-level control checks generated claims against the evidence pool and encourages neutral, evidence-bounded answers when support is insufficient or conflicting. Moreover, a training-free GRPO-style selection mechanism favors responses with valid references and calibrated confidence without updating the VLM backbone. Experiments in a realistic digital museum simulation show that VaseMuseum improves citation validity, reduces hallucinations on knowledge-intensive queries, and produces more neutral answers under ambiguity compared with search-enabled VLM baselines.", "arxiv_id": "2607.06374", "arxiv_url": "https://arxiv.org/abs/2607.06374", "authors": ["Jiazi Wang", "Nonghai Zhang", "Qiushi Xie", "Zeyu Zhang", "Yufeng Chen", "Yang Zhao", "Ling Shao", "Hao Tang"], "brief": "\u63d0\u51faVaseMuseum\u6846\u67b6\uff0c\u7ed3\u5408\u4ea4\u4e92\u5f0f\u865a\u62df\u535a\u7269\u9986\u4e0eVaseAgent\u591a\u6a21\u6001\u667a\u80fd\u4f53\uff0c\u652f\u63012D\u56fe\u50cf\u548c3D\u6587\u7269\u7684\u611f\u77e5\u3001\u63a8\u7406\u4e0e\u77e5\u8bc6\u68c0\u7d22\uff0c\u5e76\u901a\u8fc7\u6765\u6e90\u7ea7\u548c\u54cd\u5e94\u7ea7\u53cc\u91cd\u53ef\u9760\u6027\u63a7\u5236\u673a\u5236\uff0c\u89e3\u51b3\u6587\u5316\u9057\u4ea7\u9886\u57dfVLM\u5e7b\u89c9\u4e0e\u4e0d\u53ef\u9a8c\u8bc1\u5f15\u7528\u95ee\u9898\u3002", "categories": ["cs.CV"], "github_repo": "https://github.com/AIGeeksGroup/VaseMuseum", "github_stars": 1, "hf_url": "https://huggingface.co/papers/2607.06374", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u53cc\u5c42\u53ef\u9760\u6027\u63a7\u5236\uff1a\u6765\u6e90\u7ea7\u63a7\u5236\u7b5b\u9009\u6743\u5a01\u53ef\u9a8c\u8bc1\u8bc1\u636e\uff0c\u54cd\u5e94\u7ea7\u63a7\u5236\u6838\u67e5\u751f\u6210\u5185\u5bb9\u4e0e\u8bc1\u636e\u6c60\u7684\u4e00\u81f4\u6027\uff0c\u8bc1\u636e\u4e0d\u8db3\u65f6\u8f93\u51fa\u4e2d\u7acb\u7b54\u6848", "\u8bad\u7ec3\u65e0\u5173\u7684GRPO\u98ce\u683c\u9009\u62e9\u673a\u5236\uff1a\u65e0\u9700\u66f4\u65b0VLM\u53c2\u6570\uff0c\u4f18\u5148\u9009\u62e9\u542b\u6709\u6548\u5f15\u7528\u548c\u6821\u51c6\u7f6e\u4fe1\u5ea6\u7684\u54cd\u5e94", "\u5b9e\u9a8c\u8868\u660e\u76f8\u6bd4\u641c\u7d22\u589e\u5f3aVLM\u57fa\u7ebf\uff0cVaseMuseum\u5728\u5f15\u7528\u6709\u6548\u6027\u3001\u5e7b\u89c9\u51cf\u5c11\u548c\u6b67\u4e49\u4e0b\u4e2d\u7acb\u6027\u4e09\u65b9\u9762\u5747\u6709\u63d0\u5347"], "keywords": ["\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u6587\u5316\u9057\u4ea7", "\u5e7b\u89c9\u6291\u5236"], "num_comments": 1, "on_hf": true, "organization": "Peking University", "pdf_url": "https://arxiv.org/pdf/2607.06374v1", "published_at": "2026-07-07", "score": 0.391, "selected_reasons": ["\u77e5\u540d\u673a\u6784: Peking", "HF trending (1\u8d5e)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.06374.png", "title": "VaseMuseum: Digital Intelligent Museum for Ancient Greek Pottery", "tldr": "VaseMuseum\uff1a\u9762\u5411\u53e4\u5e0c\u814a\u9676\u5668\u7684\u591a\u6a21\u6001\u667a\u80fd\u6570\u5b57\u535a\u7269\u9986\u6846\u67b6\uff0c\u6709\u6548\u51cf\u5c11\u5e7b\u89c9\u5e76\u63d0\u5347\u5f15\u7528\u53ef\u9760\u6027", "upvotes": 1, "what_it_is": "\u63d0\u51faVaseMuseum\u6846\u67b6\uff0c\u7ed3\u5408\u4ea4\u4e92\u5f0f\u865a\u62df\u535a\u7269\u9986\u4e0eVaseAgent\u591a\u6a21\u6001\u667a\u80fd\u4f53\uff0c\u652f\u63012D\u56fe\u50cf\u548c3D\u6587\u7269\u7684\u611f\u77e5\u3001\u63a8\u7406\u4e0e\u77e5\u8bc6\u68c0\u7d22\uff0c\u5e76\u901a\u8fc7\u6765\u6e90\u7ea7\u548c\u54cd\u5e94\u7ea7\u53cc\u91cd\u53ef\u9760\u6027\u63a7\u5236\u673a\u5236\uff0c\u89e3\u51b3\u6587\u5316\u9057\u4ea7\u9886\u57dfVLM\u5e7b\u89c9\u4e0e\u4e0d\u53ef\u9a8c\u8bc1\u5f15\u7528\u95ee\u9898\u3002", "why_notable": "\u5c06RAG\u53ef\u9760\u6027\u63a7\u5236\u4e0e3D\u6587\u5316\u9057\u4ea7\u6570\u5b57\u5316\u7ed3\u5408\uff0c\u63d0\u4f9b\u4e86\u4e00\u5957\u8f7b\u91cf\u6a21\u5757\u5316\u7684\u535a\u7269\u9986\u667a\u80fd\u4f53\u89e3\u51b3\u65b9\u6848\uff0c\u5bf9\u6587\u5316\u9057\u4ea7\u6570\u5b57\u5316\u4fdd\u62a4\u4e0e\u516c\u4f17\u6559\u80b2\u5177\u6709\u5b9e\u9645\u5e94\u7528\u4ef7\u503c\uff0c\u540c\u65f6\u4e3a\u77e5\u8bc6\u5bc6\u96c6\u578bVLM\u5e7b\u89c9\u6291\u5236\u63d0\u4f9b\u65b0\u601d\u8def\u3002"}, {"abstract": "Computer use agents (CUAs) are emerging as a powerful interface for automating complex digital workflows through visual perception and GUI execution. Online reinforcement learning with verifiable rewards (RLVR) has emerged as a key direction for scaling their capabilities. However, this paradigm is bottlenecked by verifiable data scarcity and online RL inefficiency. To break these barriers, we introduce ScaleCUA, a unified framework that scales online RL for CUAs via verifiable task synthesis and efficient training. At the data level, we design VeriGen, an end-to-end framework for generating verifiable RL tasks through iterative docker interactions and a multi-agent feedback loop. Scaled to 100+ concurrent agent workers via a shared docker interaction probe, this pipeline produces 24K+ verifiable tasks and nearly 3K high-quality RL tasks. To maximize sample efficiency, we propose Frontier Sampling, which tracks per-task capability and allocates rollouts to the current learning frontier. On the training side, we further design Visual Context Segmentation, a sliding window over recent visual context that balances rollout and training-engine pressure, yielding a 2.83x training speedup over step-wise decomposition. Together, ScaleCUA achieves 68.7% on OSWorld and 54.0% on ScienceBoard, establishing new state-of-the-art performance among open-source computer use agents. Code, models, and datasets are available at https://github.com/THUDM/SCALE-CUA.", "arxiv_id": "2607.11185", "arxiv_url": "https://arxiv.org/abs/2607.11185", "authors": ["Bowen Lv", "Xiao Liu", "Yanyu Ren", "Hanyu Lai", "Bohao Jing", "Hanchen Zhang", "Yanxiao Zhao", "Shuntian Yao", "Jie Tang", "Yuxiao Dong"], "brief": "\u63d0\u51faScaleCUA\u7edf\u4e00\u6846\u67b6\uff0c\u901a\u8fc7VeriGen\u81ea\u52a8\u751f\u62102.4\u4e07+\u53ef\u9a8c\u8bc1RL\u4efb\u52a1\uff0c\u7ed3\u5408Frontier Sampling\u548cVisual Context Segmentation\u6280\u672f\uff0c\u5b9e\u73b0\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u7684\u9ad8\u6548\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11185", "impact_score": 9, "is_agent": true, "is_top": true, "key_points": ["VeriGen\u6846\u67b6\u5229\u7528Docker\u4ea4\u4e92\u4e0e\u591a\u667a\u80fd\u4f53\u53cd\u9988\u5faa\u73af\u81ea\u52a8\u751f\u621024K+\u53ef\u9a8c\u8bc1\u4efb\u52a1\uff0c\u652f\u6301100+\u5e76\u53d1\u5de5\u4f5c\u8282\u70b9", "Frontier Sampling\u6309\u4efb\u52a1\u80fd\u529b\u8fb9\u754c\u52a8\u6001\u5206\u914d\u8bad\u7ec3\u6837\u672c\uff0cVisual Context Segmentation\u6ed1\u52a8\u7a97\u53e3\u5e26\u67652.83\u500d\u8bad\u7ec3\u52a0\u901f", "\u5728OSWorld\u8fbe\u523068.7%\u3001ScienceBoard\u8fbe\u523054.0%\uff0c\u5237\u65b0\u5f00\u6e90\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53SOTA"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "GUI", "\u6570\u636e\u5408\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11185v1", "published_at": "2026-07-13", "score": 0.375, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "SCALECUA: Scaling Computer Use Agents with Verifiable Task Synthesis and Efficient Online RL", "tldr": "ScaleCUA\u901a\u8fc7\u53ef\u9a8c\u8bc1\u4efb\u52a1\u5408\u6210\u4e0e\u9ad8\u6548\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\uff0c\u5927\u5e45\u63d0\u5347\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faScaleCUA\u7edf\u4e00\u6846\u67b6\uff0c\u901a\u8fc7VeriGen\u81ea\u52a8\u751f\u62102.4\u4e07+\u53ef\u9a8c\u8bc1RL\u4efb\u52a1\uff0c\u7ed3\u5408Frontier Sampling\u548cVisual Context Segmentation\u6280\u672f\uff0c\u5b9e\u73b0\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u7684\u9ad8\u6548\u5728\u7ebf\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u3002", "why_notable": "\u540c\u65f6\u89e3\u51b3\u4e86\u5728\u7ebfRLVR\u7684\u4e24\u5927\u74f6\u9888\u2014\u2014\u53ef\u9a8c\u8bc1\u6570\u636e\u7a00\u7f3a\u4e0e\u8bad\u7ec3\u6548\u7387\u4f4e\u4e0b\uff0c\u5f00\u6e90\u4ee3\u7801/\u6a21\u578b/\u6570\u636e\u96c6\uff0c\u5bf9GUI\u667a\u80fd\u4f53\u9886\u57df\u5177\u6709\u91cd\u8981\u63a8\u52a8\u4f5c\u7528"}, {"abstract": "Multimodal BrowseComp tasks require agents to combine perception, tool use, and long-horizon reasoning over dynamic web content, challenging their ability to handle compositional structure, open-world uncertainty, and multimodal integration across extended interactions. Crucially, real-world multimodal browsing involves three distinct information-flow patterns: text-only, image-to-text, and text-to-image, yet existing data construction methods cover only the text-only and image-to-text patterns, leaving text-to-image largely unaddressed and limiting agent generality and robustness. We introduce UNIBROWSE, a unified data pipeline that for the first time simultaneously generates training data covering all three patterns, augments curated knowledge graphs with live web retrieval for improved fidelity, and introduces a novel metric of exploration degree to filter low-signal instances for efficient reinforcement learning. Through this pipeline, we produce high-quality cold-start tool-use trajectories and exploration-rich QA pairs, and train a 35B-scale agent via supervised fine-tuning and exploration-aware RL.The resulting UNIBROWSE agent achieves state-of-the-art performance on multimodal BrowseComp benchmarks, attaining an average accuracy of 54.4 across five diverse benchmarks -- an improvement of 10.5 points over its base model Qwen3.5-35B-A3B -- and surpassing serveral closed-source agent workflows such as GPT-5 (42.9), Gemini-2.5 Pro (44.8), and Gemini-2.5 Flash (41.3).", "arxiv_id": "2607.10557", "arxiv_url": "https://arxiv.org/abs/2607.10557", "authors": ["Xiyu Wei", "Qingwei Zong", "Zhuocheng Yu", "Sujian Li"], "brief": "\u63d0\u51faUNIBROWSE\u7edf\u4e00\u6570\u636e\u6d41\u6c34\u7ebf\uff0c\u9996\u6b21\u540c\u65f6\u751f\u6210\u8986\u76d6\u7eaf\u6587\u672c\u3001\u56fe\u50cf\u8f6c\u6587\u672c\u3001\u6587\u672c\u8f6c\u56fe\u50cf\u4e09\u79cd\u4fe1\u606f\u6d41\u6a21\u5f0f\u7684\u8bad\u7ec3\u6570\u636e\uff0c\u5e76\u901a\u8fc7\u76d1\u7763\u5fae\u8c03\u4e0e\u63a2\u7d22\u611f\u77e5\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec335B\u89c4\u6a21\u7684\u7f51\u9875\u6d4f\u89c8\u667a\u80fd\u4f53\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.10557", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u9996\u6b21\u8986\u76d6text-to-image\u4fe1\u606f\u6d41\u6a21\u5f0f\uff0c\u5f25\u8865\u73b0\u6709\u6570\u636e\u6784\u5efa\u65b9\u6cd5\u7684\u7a7a\u767d", "\u5f15\u5165\"\u63a2\u7d22\u5ea6\"\u65b0\u6307\u6807\u8fc7\u6ee4\u4f4e\u4fe1\u53f7\u6837\u672c\uff0c\u63d0\u5347\u5f3a\u5316\u5b66\u4e60\u6548\u7387", "\u5728\u4e94\u4e2a\u591a\u6a21\u6001BrowseComp\u57fa\u51c6\u4e0a\u5e73\u5747\u51c6\u786e\u738754.4\uff0c\u8d85\u8d8aGPT-5(42.9)\u3001Gemini-2.5 Pro(44.8)\u7b49\u95ed\u6e90\u7cfb\u7edf\uff0c\u8f83\u57fa\u7840\u6a21\u578b\u63d0\u534710.5\u5206"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60", "\u7f51\u9875\u6d4f\u89c8"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.10557v1", "published_at": "2026-07-12", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "UNIBROWSE: A Data-to-Agent Framework for Multimodal BrowseComp", "tldr": "UNIBROWSE\uff1a\u9996\u4e2a\u8986\u76d6\u4e09\u79cd\u4fe1\u606f\u6d41\u6a21\u5f0f\u7684\u591a\u6a21\u6001\u7f51\u9875\u6d4f\u89c8\u667a\u80fd\u4f53\u8bad\u7ec3\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faUNIBROWSE\u7edf\u4e00\u6570\u636e\u6d41\u6c34\u7ebf\uff0c\u9996\u6b21\u540c\u65f6\u751f\u6210\u8986\u76d6\u7eaf\u6587\u672c\u3001\u56fe\u50cf\u8f6c\u6587\u672c\u3001\u6587\u672c\u8f6c\u56fe\u50cf\u4e09\u79cd\u4fe1\u606f\u6d41\u6a21\u5f0f\u7684\u8bad\u7ec3\u6570\u636e\uff0c\u5e76\u901a\u8fc7\u76d1\u7763\u5fae\u8c03\u4e0e\u63a2\u7d22\u611f\u77e5\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec335B\u89c4\u6a21\u7684\u7f51\u9875\u6d4f\u89c8\u667a\u80fd\u4f53\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u89e3\u51b3\u591a\u6a21\u6001\u7f51\u9875\u6d4f\u89c8\u4e09\u79cd\u4fe1\u606f\u6d41\u6a21\u5f0f\u7684\u5f00\u6e90\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u6027\u80fd\u8d85\u8d8aGPT-5\u7b49\u9876\u7ea7\u95ed\u6e90\u7cfb\u7edf\uff0c\u5bf9\u6784\u5efa\u901a\u7528\u7f51\u9875\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "LLM agent benchmarks measure task completion, reliability, and inference cost, but not the persistent data an agent run leaves on disk, including logs, context snapshots, checkpoints, and debug traces. We introduce AgentFootprint, a cross-framework benchmark of post-run agent storage footprint. Its serialization-aware metric suite measures total retention, channel composition, duplication, growth, compressibility, and conversation-history reconstructability. It addresses a measurement trap: naive byte-level measurement understates duplication by an order of magnitude because database paging and JSON escaping obscure repeated content. A fixed-trace control separates agent-generated logical volume from persistence-layer amplification: replaying the same trajectory through seven persisting frameworks yields a 6.7x spread. Under identical models, tools, and tasks, configurations with 100% accuracy differ by 15.7x in retained bytes, although their defaults support different recovery and audit capabilities. Three full-history configurations grow superlinearly on a repeated-observation stress task. Exported trajectories from 108 instance-normalized SWE-bench Verified submissions span three orders of magnitude per instance, with no detectable correlation with resolve rate. A content-addressed store reduces retention by 4.8x-32.7x while preserving every reconstructability score. These results establish persistent storage as a resource metric to report jointly with accuracy and reconstructability.", "arxiv_id": "2607.11149", "arxiv_url": "https://arxiv.org/abs/2607.11149", "authors": ["Chenglin Yu", "Hongquan Gui", "Ying Yu", "Hongxia Yang", "Ming Li"], "brief": "\u8bba\u6587\u63d0\u51faAgentFootprint\u8de8\u6846\u67b6\u57fa\u51c6\uff0c\u7cfb\u7edf\u8861\u91cfLLM\u667a\u80fd\u4f53\u8fd0\u884c\u540e\u4ea7\u751f\u7684\u6301\u4e45\u5316\u5b58\u50a8\u5360\u7528\uff08\u65e5\u5fd7\u3001\u5feb\u7167\u3001\u68c0\u67e5\u70b9\u7b49\uff09\uff0c\u586b\u8865\u73b0\u6709\u8bc4\u4f30\u4f53\u7cfb\u5ffd\u89c6\u5b58\u50a8\u5f00\u9500\u7684\u7a7a\u767d\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.11149", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6734\u7d20\u5b57\u8282\u7ea7\u6d4b\u91cf\u4f1a\u56e0\u6570\u636e\u5e93\u5206\u9875\u548cJSON\u8f6c\u4e49\u63a9\u76d6\u91cd\u590d\u5185\u5bb9\uff0c\u4f4e\u4f30\u91cd\u590d\u5ea6\u8fbe\u4e00\u4e2a\u6570\u91cf\u7ea7", "\u76f8\u540c\u8f68\u8ff9\u57287\u4e2a\u6301\u4e45\u5316\u6846\u67b6\u4e2d\u91cd\u653e\uff0c\u5b58\u50a8\u5360\u7528\u76f8\u5dee6.7\u500d\uff1b\u76f8\u540c\u7cbe\u5ea6\u914d\u7f6e\u95f4\u5b58\u50a8\u5dee\u5f02\u9ad8\u8fbe15.7\u500d", "\u5185\u5bb9\u5bfb\u5740\u5b58\u50a8\u53ef\u5728\u4fdd\u7559\u5168\u90e8\u53ef\u91cd\u5efa\u6027\u8bc4\u5206\u7684\u524d\u63d0\u4e0b\uff0c\u5c06\u5b58\u50a8\u91cf\u538b\u7f294.8x\u201332.7x"], "keywords": ["\u667a\u80fd\u4f53", "\u8bc4\u4f30\u57fa\u51c6", "\u5b58\u50a8\u6548\u7387", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.11149v1", "published_at": "2026-07-13", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Hidden Footprint: Making Storage a First-Class Metric for LLM Agent Evaluation", "tldr": "\u63d0\u51faAgentFootprint\u57fa\u51c6\uff0c\u5c06LLM\u667a\u80fd\u4f53\u8fd0\u884c\u540e\u7684\u78c1\u76d8\u5b58\u50a8\u5360\u7528\u7eb3\u5165\u8bc4\u4f30\u4f53\u7cfb", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51faAgentFootprint\u8de8\u6846\u67b6\u57fa\u51c6\uff0c\u7cfb\u7edf\u8861\u91cfLLM\u667a\u80fd\u4f53\u8fd0\u884c\u540e\u4ea7\u751f\u7684\u6301\u4e45\u5316\u5b58\u50a8\u5360\u7528\uff08\u65e5\u5fd7\u3001\u5feb\u7167\u3001\u68c0\u67e5\u70b9\u7b49\uff09\uff0c\u586b\u8865\u73b0\u6709\u8bc4\u4f30\u4f53\u7cfb\u5ffd\u89c6\u5b58\u50a8\u5f00\u9500\u7684\u7a7a\u767d\u3002", "why_notable": "\u9996\u6b21\u5c06\u5b58\u50a8\u5360\u7528\u4f5c\u4e3a\u4e00\u7b49\u8bc4\u4f30\u6307\u6807\u5f15\u5165LLM\u667a\u80fd\u4f53\u57fa\u51c6\uff0c\u63ed\u793a\u73b0\u6709\u6846\u67b6\u5b58\u50a8\u6548\u7387\u7684\u5de8\u5927\u5dee\u5f02\uff0c\u5bf9\u751f\u4ea7\u90e8\u7f72\u548c\u957f\u671f\u8fd0\u884c\u7684\u6210\u672c\u63a7\u5236\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "The rapid progress of large foundation models has been driven predominantly by pretraining on large-scale text corpora. However, many forms of knowledge are conveyed through visual representations, where figures, typeset equations, and page layouts carry rich information that cannot be faithfully or completely captured by text alone. Yet current pretraining approaches discard these visual cues by converting visually rich sources, such as documents and web pages, into plain text for learning language intelligence. This paper challenges the default assumption that language models must be trained on text-only representations and shows that Visual Pretraining is a scalable learner for foundation model intelligence. To this end, we conduct a systematic study of unsupervised visual pretraining paradigms that directly leverage visual documents without text extraction. Across multiple backbones and benchmarks, visual pretraining on the same underlying corpora consistently outperforms text-only pretraining, offering an efficient pathway to scalable language intelligence.", "arxiv_id": "2607.09657", "arxiv_url": "https://arxiv.org/abs/2607.09657", "authors": ["Yiming Zhang", "Zhonghan Zhao", "Wenwei Zhang", "Haiteng Zhao", "Tianyang Lin", "Yunhua Zhou", "Demin Song", "Kuikun Liu", "Haochen Ye", "Haian Huang", "Yuzhe Gu", "Haijun Lv", "Qipeng Guo", "Bin Liu", "Gaoang Wang", "Kai Chen"], "brief": "\u672c\u6587\u63d0\u51fa\"\u89c6\u89c9\u9884\u8bad\u7ec3\"\u8303\u5f0f\uff0c\u76f4\u63a5\u4ee5\u6587\u6863\u56fe\u50cf\uff08\u542b\u56fe\u8868\u3001\u516c\u5f0f\u3001\u6392\u7248\u7b49\u89c6\u89c9\u4fe1\u606f\uff09\u4f5c\u4e3a\u9884\u8bad\u7ec3\u8f93\u5165\uff0c\u65e0\u9700\u6587\u672c\u63d0\u53d6\uff0c\u7cfb\u7edf\u9a8c\u8bc1\u5176\u5728\u591a\u4e2a\u9aa8\u5e72\u7f51\u7edc\u548c\u57fa\u51c6\u4e0a\u5747\u4f18\u4e8e\u7eaf\u6587\u672c\u9884\u8bad\u7ec3\u3002", "categories": ["cs.CV", "cs.AI", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09657", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u6311\u6218\"\u8bed\u8a00\u6a21\u578b\u5fc5\u987b\u7528\u7eaf\u6587\u672c\u8bad\u7ec3\"\u7684\u9ed8\u8ba4\u5047\u8bbe\uff0c\u4fdd\u7559\u6587\u6863\u4e2d\u56fe\u8868\u3001\u516c\u5f0f\u3001\u6392\u7248\u7b49\u89c6\u89c9\u8bed\u4e49\u4fe1\u606f", "\u91c7\u7528\u65e0\u76d1\u7763\u89c6\u89c9\u9884\u8bad\u7ec3\u8303\u5f
