8\u5fc3\u74f6\u9888\uff0c\u5728\u4e0d\u5f15\u5165\u5f02\u6b65RL\u6570\u636e\u9648\u65e7\u95ee\u9898\u7684\u524d\u63d0\u4e0b\u663e\u8457\u63d0\u5347\u8d44\u6e90\u5229\u7528\u7387\uff0c\u5bf9\u5927\u89c4\u6a21LLM\u540e\u8bad\u7ec3\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u5de5\u7a0b\u4ef7\u503c\u3002"}, {"abstract": "Supervised fine-tuning (SFT) on a small, high-quality set of long reasoning traces is an effective approach for eliciting strong reasoning capabilities in Large Language Models (LLMs). However, existing methods for curating high-quality SFT data rely heavily on strong reasoning models to filter examples based on diversity and difficulty, making the curation process costly while often yielding suboptimal data quality. In this work, we show that diverse and challenging reasoning examples can be identified using only the initial reasoning tokens. Specifically, we demonstrate that difficult problems can be reliably detected based on the loss of the first 100 reasoning tokens evaluated at a randomly perturbed checkpoint of the pretrained model. We further show that examples exhibiting similar loss patterns over their first 1k reasoning tokens across a small number of perturbed checkpoints extrapolating along the fine-tuning trajectory provably induce similar gradients. We validate our approach through extensive experiments on fine-tuning Qwen2.5-7B and Llama3.1-8B models on the M23K medical reasoning and OpenThoughts-Math datasets. Our method outperforms existing baselines by up to 1.7% while being 91% more token efficient.", "arxiv_id": "2606.26797", "arxiv_url": "https://arxiv.org/abs/2606.26797", "authors": ["Hongyi Henry Jin", "Wenhan Yang", "Meysam Ghaffari", "Carlos Morato", "Baharan Mirzasoleiman"], "brief": "\u63d0\u51fa\u4e00\u79cd\u4f4e\u6210\u672c\u7684\u63a8\u7406\u6570\u636e\u7b5b\u9009\u65b9\u6cd5\uff1a\u901a\u8fc7\u5728\u9884\u8bad\u7ec3\u6a21\u578b\u7684\u968f\u673a\u6270\u52a8\u68c0\u67e5\u70b9\u4e0a\u8bc4\u4f30\u524d100\u4e2a\u63a8\u7406token\u7684\u635f\u5931\uff0c\u5373\u53ef\u53ef\u9760\u8bc6\u522b\u56f0\u96be\u4e14\u591a\u6837\u7684\u63a8\u7406\u6837\u672c\uff0c\u65e0\u9700\u4f9d\u8d56\u5f3a\u63a8\u7406\u6a21\u578b\u8fdb\u884c\u6570\u636e\u8fc7\u6ee4\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26797", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4ec5\u9700\u524d100\u4e2a\u63a8\u7406token\u7684\u635f\u5931\u5373\u53ef\u5224\u65ad\u95ee\u9898\u96be\u5ea6\uff0c\u5927\u5e45\u964d\u4f4e\u6570\u636e\u7b5b\u9009\u8ba1\u7b97\u6210\u672c", "\u5728\u5c11\u91cf\u6270\u52a8\u68c0\u67e5\u70b9\u4e0a\u5177\u6709\u76f8\u4f3c\u524d1k token\u635f\u5931\u6a21\u5f0f\u7684\u6837\u672c\uff0c\u53ef\u8bc1\u660e\u4f1a\u4ea7\u751f\u76f8\u4f3c\u68af\u5ea6\uff0c\u7406\u8bba\u4e0a\u4fdd\u8bc1\u6570\u636e\u8d28\u91cf", "\u5728Qwen2.5-7B\u548cLlama3.1-8B\u4e0a\u9a8c\u8bc1\uff0c\u6bd4\u73b0\u6709\u57fa\u7ebf\u9ad81.7%\uff0ctoken\u6548\u7387\u63d0\u534791%"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u636e\u7b5b\u9009", "\u63a8\u7406\u80fd\u529b", "\u76d1\u7763\u5fae\u8c03"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26797v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Reasoning Quality Emerges Early: Data Curation for Reasoning Models", "tldr": "\u4ec5\u7528\u524d100\u4e2a\u63a8\u7406token\u5373\u53ef\u8bc6\u522b\u9ad8\u8d28\u91cfSFT\u6570\u636e\uff0c\u6548\u7387\u63d0\u534791%", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u4f4e\u6210\u672c\u7684\u63a8\u7406\u6570\u636e\u7b5b\u9009\u65b9\u6cd5\uff1a\u901a\u8fc7\u5728\u9884\u8bad\u7ec3\u6a21\u578b\u7684\u968f\u673a\u6270\u52a8\u68c0\u67e5\u70b9\u4e0a\u8bc4\u4f30\u524d100\u4e2a\u63a8\u7406token\u7684\u635f\u5931\uff0c\u5373\u53ef\u53ef\u9760\u8bc6\u522b\u56f0\u96be\u4e14\u591a\u6837\u7684\u63a8\u7406\u6837\u672c\uff0c\u65e0\u9700\u4f9d\u8d56\u5f3a\u63a8\u7406\u6a21\u578b\u8fdb\u884c\u6570\u636e\u8fc7\u6ee4\u3002", "why_notable": "\u73b0\u6709\u9ad8\u8d28\u91cf\u63a8\u7406\u6570\u636e\u7b5b\u9009\u4e25\u91cd\u4f9d\u8d56\u5f3a\u63a8\u7406\u6a21\u578b\uff0c\u6210\u672c\u9ad8\u4e14\u8d28\u91cf\u4e0d\u7a33\u5b9a\uff1b\u672c\u65b9\u6cd5\u4ee5\u6781\u4f4e\u8ba1\u7b97\u4ee3\u4ef7\uff08\u4ec5\u770b\u5c11\u91cftoken\uff09\u5b9e\u73b0\u66f4\u4f18\u6570\u636e\u7b5b\u9009\uff0c\u5bf9\u8d44\u6e90\u53d7\u9650\u573a\u666f\u4e0b\u8bad\u7ec3\u63a8\u7406\u6a21\u578b\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Streaming video understanding (SVU) must answer queries that arrive asynchronously while visual tokens stream continuously under strict GPU-memory and query-time latency budgets. A key challenge is delayed query: decisive cues may appear briefly, yet many subsequent updates occur before the query arrives, increasing the risk that those cues are evicted or diluted under bounded memory. We propose ProtoKV, a constant-footprint SVU memory that represents far history as a fixed-capacity summary state rather than retaining token instances. ProtoKV keeps an exact near-window KV cache and aggregates older content into a semantic-spatial prototype bank with residual statistics. At query time, each prototype is exposed through a bounded pseudo-token interface that is drop-in compatible with standard attention. Under matched budgets and comparable query-time cost, ProtoKV improves accuracy by up to 12.5 points over token-retention baselines on SVU benchmarks in the long-delay regime, with gains that grow as query delay increases.", "arxiv_id": "2606.26762", "arxiv_url": "https://arxiv.org/abs/2606.26762", "authors": ["Le Tu Ngoc Minh", "Jinyeong Lim", "Dongsu Han"], "brief": "\u63d0\u51faProtoKV\uff0c\u4e00\u79cd\u7528\u4e8e\u6d41\u5f0f\u89c6\u9891\u7406\u89e3\u7684\u56fa\u5b9a\u5185\u5b58\u5360\u7528\u8bb0\u5fc6\u673a\u5236\uff0c\u5c06\u8fdc\u671f\u5386\u53f2\u5e27\u538b\u7f29\u4e3a\u8bed\u4e49-\u7a7a\u95f4\u539f\u578b\u5e93\uff08\u542b\u6b8b\u5dee\u7edf\u8ba1\uff09\uff0c\u8fd1\u671f\u5e27\u4fdd\u7559\u7cbe\u786eKV\u7f13\u5b58\uff0c\u67e5\u8be2\u65f6\u901a\u8fc7\u4f2atoken\u63a5\u53e3\u4e0e\u6807\u51c6\u6ce8\u610f\u529b\u517c\u5bb9\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26762", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u5c06\u5386\u53f2\u89c6\u9891\u5185\u5bb9\u805a\u5408\u4e3a\u56fa\u5b9a\u5bb9\u91cf\u7684\u8bed\u4e49-\u7a7a\u95f4\u539f\u578b\u5e93\uff08prototype bank\uff09+\u6b8b\u5dee\u7edf\u8ba1\uff0c\u800c\u975e\u4fdd\u7559\u539f\u59cbtoken\u5b9e\u4f8b", "\u5728\u5ef6\u8fdf\u67e5\u8be2\u573a\u666f\u4e0b\uff0c\u76f8\u6bd4token\u4fdd\u7559\u57fa\u7ebf\u65b9\u6cd5\u51c6\u786e\u7387\u6700\u9ad8\u63d0\u534712.5\u4e2a\u767e\u5206\u70b9\uff0c\u4e14\u63d0\u5347\u5e45\u5ea6\u968f\u67e5\u8be2\u5ef6\u8fdf\u589e\u5927\u800c\u589e\u52a0", "\u539f\u578b\u901a\u8fc7\u6709\u754c\u4f2atoken\u63a5\u53e3\u66b4\u9732\uff0c\u4e0e\u6807\u51c6\u6ce8\u610f\u529b\u673a\u5236\u5373\u63d2\u5373\u7528\u517c\u5bb9\uff0c\u65e0\u9700\u4fee\u6539\u6a21\u578b\u67b6\u6784"], "keywords": ["\u6d41\u5f0f\u89c6\u9891\u7406\u89e3", "KV\u7f13\u5b58", "\u591a\u6a21\u6001", "\u957f\u89c6\u9891"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26762v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ProtoKV: Streaming Video Understanding under Delayed Query with Summary-State Memory", "tldr": "ProtoKV\u7528\u539f\u578b\u5e93\u66ff\u4ee3\u5386\u53f2KV\u7f13\u5b58\uff0c\u89e3\u51b3\u6d41\u5f0f\u89c6\u9891\u7406\u89e3\u4e2d\u5ef6\u8fdf\u67e5\u8be2\u5bfc\u81f4\u5173\u952e\u4fe1\u606f\u4e22\u5931\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faProtoKV\uff0c\u4e00\u79cd\u7528\u4e8e\u6d41\u5f0f\u89c6\u9891\u7406\u89e3\u7684\u56fa\u5b9a\u5185\u5b58\u5360\u7528\u8bb0\u5fc6\u673a\u5236\uff0c\u5c06\u8fdc\u671f\u5386\u53f2\u5e27\u538b\u7f29\u4e3a\u8bed\u4e49-\u7a7a\u95f4\u539f\u578b\u5e93\uff08\u542b\u6b8b\u5dee\u7edf\u8ba1\uff09\uff0c\u8fd1\u671f\u5e27\u4fdd\u7559\u7cbe\u786eKV\u7f13\u5b58\uff0c\u67e5\u8be2\u65f6\u901a\u8fc7\u4f2atoken\u63a5\u53e3\u4e0e\u6807\u51c6\u6ce8\u610f\u529b\u517c\u5bb9\u3002", "why_notable": "\u6d41\u5f0f\u89c6\u9891\u7406\u89e3\u4e2d\u5ef6\u8fdf\u67e5\u8be2\u662f\u5b9e\u9645\u90e8\u7f72\u7684\u6838\u5fc3\u96be\u9898\uff0cProtoKV\u5728\u4e25\u683c\u5185\u5b58\u548c\u5ef6\u8fdf\u9884\u7b97\u4e0b\u663e\u8457\u63d0\u5347\u957f\u5ef6\u8fdf\u573a\u666f\u6027\u80fd\uff0c\u4e14\u4e0e\u73b0\u6709\u6ce8\u610f\u529b\u673a\u5236\u5b8c\u5168\u517c\u5bb9\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Muon-type optimizers construct update directions for dense neural-network weights by applying a finite Newton-Schulz map to momentum-gradient matrices. For an $H \\times W$ matrix, with $r=\\min\\{H,W\\}$ and $s=\\max\\{H,W\\}$, $K$ steps of the full-matrix Newton-Schulz update require $O(r^2 s K)$ work and couple all rows and columns through repeated Gram matrix products. We introduce Hierarchical Muon (HiMuon), a tiled Newton-Schulz scheme for Muon-type optimization. HiMuon partitions each momentum-gradient matrix into $T \\times T$ tiles, applies the same finite Newton-Schulz map independently to each tile, and reassembles the results. For finite $T$ below the matrix dimensions, HiMuon defines a local matrix-function map rather than a convergent approximation to the full-matrix update: spectral interactions are preserved within tiles and discarded across tile boundaries. For fixed finite $T$, the leading Newton-Schulz work decreases to $O(H W T K)$, and the computation decomposes into independent small dense matrix operations. This structure enables tile-size-dependent GPU kernels, cross-layer batching, memory-bounded chunking, and runtime tile-size schedules. Experiments on transformer training and controlled matrix-function diagnostics show that HiMuon improves optimizer-step efficiency while keeping training behavior close to full-matrix Muon in the tested regimes.", "arxiv_id": "2606.27216", "arxiv_url": "https://arxiv.org/abs/2606.27216", "authors": ["Ziyuan Tang", "Tianshi Xu", "Yousef Saad", "Yuanzhe Xi"], "brief": "\u63d0\u51faHiMuon\uff08\u5c42\u6b21\u5316Muon\uff09\uff0c\u5c06\u795e\u7ecf\u7f51\u7edc\u6743\u91cd\u77e9\u9635\u5206\u5272\u4e3aT\u00d7T\u5c0f\u5757\uff0c\u5bf9\u6bcf\u5757\u72ec\u7acb\u5e94\u7528Newton-Schulz\u6620\u5c04\uff0c\u4ece\u800c\u5c06\u4f18\u5316\u5668\u6b65\u9aa4\u7684\u8ba1\u7b97\u91cf\u4eceO(r\u00b2sK)\u964d\u81f3O(HWTK)\uff0c\u540c\u65f6\u4fdd\u6301\u4e0e\u5168\u77e9\u9635Muon\u76f8\u8fd1\u7684\u8bad\u7ec3\u6548\u679c\u3002", "categories": ["math.NA", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27216", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5206\u5757\u7b56\u7565\uff1a\u5c06\u52a8\u91cf\u68af\u5ea6\u77e9\u9635\u5212\u5206\u4e3aT\u00d7T\u74e6\u7247\uff0c\u5404\u5757\u72ec\u7acb\u8ba1\u7b97Newton-Schulz\u66f4\u65b0\uff0c\u5757\u5185\u4fdd\u7559\u8c31\u4ea4\u4e92\uff0c\u5757\u95f4\u820d\u5f03", "\u8ba1\u7b97\u590d\u6742\u5ea6\u4eceO(r\u00b2sK)\u964d\u81f3O(HWTK)\uff0c\u5206\u89e3\u4e3a\u72ec\u7acb\u7684\u5c0f\u578b\u7a20\u5bc6\u77e9\u9635\u8fd0\u7b97\uff0c\u4fbf\u4e8eGPU\u5e76\u884c\u4e0e\u5185\u5b58\u4f18\u5316", "\u652f\u6301\u8de8\u5c42\u6279\u5904\u7406\u3001\u5185\u5b58\u53d7\u9650\u5206\u5757\u53ca\u8fd0\u884c\u65f6\u74e6\u7247\u5c3a\u5bf8\u8c03\u5ea6\uff0c\u5728Transformer\u8bad\u7ec3\u5b9e\u9a8c\u4e2d\u9a8c\u8bc1\u4e86\u6548\u7387\u63d0\u5347"], "keywords": ["\u4f18\u5316\u5668", "\u795e\u7ecf\u7f51\u7edc\u8bad\u7ec3", "\u77e9\u9635\u8ba1\u7b97", "\u9ad8\u6548\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27216v1", "published_at": "2026-06-25", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Hierarchical Muon: Tiled Newton-Schulz Updates for Efficient Muon Optimization", "tldr": "\u5206\u5757Newton-Schulz\u66f4\u65b0\u7684\u9ad8\u6548Muon\u4f18\u5316\u5668\uff0c\u663e\u8457\u964d\u4f4e\u8ba1\u7b97\u590d\u6742\u5ea6", "upvotes": 0, "what_it_is": "\u63d0\u51faHiMuon\uff08\u5c42\u6b21\u5316Muon\uff09\uff0c\u5c06\u795e\u7ecf\u7f51\u7edc\u6743\u91cd\u77e9\u9635\u5206\u5272\u4e3aT\u00d7T\u5c0f\u5757\uff0c\u5bf9\u6bcf\u5757\u72ec\u7acb\u5e94\u7528Newton-Schulz\u6620\u5c04\uff0c\u4ece\u800c\u5c06\u4f18\u5316\u5668\u6b65\u9aa4\u7684\u8ba1\u7b97\u91cf\u4eceO(r\u00b2sK)\u964d\u81f3O(HWTK)\uff0c\u540c\u65f6\u4fdd\u6301\u4e0e\u5168\u77e9\u9635Muon\u76f8\u8fd1\u7684\u8bad\u7ec3\u6548\u679c\u3002", "why_notable": "Muon\u4f18\u5316\u5668\u8fd1\u671f\u5728\u5927\u6a21\u578b\u8bad\u7ec3\u4e2d\u53d7\u5230\u5173\u6ce8\uff0cHiMuon\u901a\u8fc7\u5206\u5757\u601d\u60f3\u5927\u5e45\u964d\u4f4e\u5176\u8ba1\u7b97\u5f00\u9500\uff0c\u4f7f\u5176\u66f4\u5177\u5b9e\u7528\u6027\uff0c\u4e14\u63d0\u4f9b\u4e86\u7075\u6d3b\u7684GPU\u5185\u6838\u9002\u914d\u65b9\u6848\uff0c\u5bf9\u5927\u89c4\u6a21\u6a21\u578b\u8bad\u7ec3\u5177\u6709\u76f4\u63a5\u5de5\u7a0b\u4ef7\u503c\u3002"}, {"abstract": "Autoregressive large language model (LLM) serving is increasingly limited by key-value (KV) cache movement rather than dense matrix multiplication. Modern paged-attention systems reduce KV-cache fragmentation and mature kernels such as FlashInfer provide highly optimized native-paged decode attention. However, the best single-kernel implementation is not always the best serving schedule: low-active long-context decode can under-utilize commodity GPUs, while mixed sequence lengths introduce a tension between many exact-length launches and coarse padded batches. We present PersistentKV, a native block-table decode attention engine and page-aware scheduling study for grouped-query attention (GQA). PersistentKV maps work by KV-head group, is designed to reuse K,V tiles across grouped query heads, supports native page tables, and adds a compact workqueue schedule that executes only non-empty row-KV-head-sequence-split tasks. On an RTX 3060 with FP16, page size 16, Hq=32, Hkv=8, d=128, and identical correctness tolerance against FlashInfer, a calibrated adaptive policy selects FlashInfer for small active batches, PersistentKV sequence splitting for B1 long-context steps, and PersistentKV workqueue scheduling for B8 long-context steps. With thresholds and split counts fixed on calibration traces, one held-out trace seed improves synchronized wall throughput by 1.063-1.265x on B8 bimodal, uniform, and Zipf-like workloads and by 1.399x on a B1 bucketed trace. On the B4 bimodal boundary case, the policy avoids the PersistentKV regression by selecting FlashInfer. These results identify a concrete systems niche for adaptive page-aware decode scheduling and show that work assignment, not only attention math, is a decisive serving-system variable.", "arxiv_id": "2606.26666", "arxiv_url": "https://arxiv.org/abs/2606.26666", "authors": ["Muhammad Ahmed"], "brief": "\u63d0\u51faPersistentKV\uff0c\u4e00\u79cd\u9762\u5411\u5206\u7ec4\u67e5\u8be2\u6ce8\u610f\u529b\uff08GQA\uff09\u7684\u539f\u751f\u5757\u8868\u89e3\u7801\u6ce8\u610f\u529b\u5f15\u64ce\uff0c\u901a\u8fc7\u81ea\u9002\u5e94\u9875\u611f\u77e5\u8c03\u5ea6\u7b56\u7565\uff0c\u5728\u4e0d\u540c\u6279\u6b21\u5927\u5c0f\u548c\u5e8f\u5217\u957f\u5ea6\u573a\u666f\u4e0b\u52a8\u6001\u9009\u62e9\u6700\u4f18\u6267\u884c\u65b9\u6848\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26666", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u8bbe\u8ba1\u6309KV-head\u7ec4\u5206\u914d\u5de5\u4f5c\u7684\u6301\u4e45\u5316\u5185\u6838\uff0c\u652f\u6301K/V tile\u8de8\u5206\u7ec4\u67e5\u8be2\u5934\u590d\u7528\u53ca\u539f\u751f\u9875\u8868\uff0c\u5e76\u5f15\u5165\u7d27\u51d1\u5de5\u4f5c\u961f\u5217\u4ec5\u6267\u884c\u975e\u7a7a\u4efb\u52a1", "\u81ea\u9002\u5e94\u7b56\u7565\u6839\u636e\u6279\u6b21\u89c4\u6a21\u52a8\u6001\u5207\u6362\uff1a\u5c0f\u6279\u6b21\u7528FlashInfer\uff0cB1\u957f\u4e0a\u4e0b\u6587\u7528\u5e8f\u5217\u5206\u5272\uff0cB8\u957f\u4e0a\u4e0b\u6587\u7528\u5de5\u4f5c\u961f\u5217\u8c03\u5ea6", "\u5728RTX 3060\uff08\u6d88\u8d39\u7ea7GPU\uff09\u4e0a\uff0cB8\u53cc\u5cf0/\u5747\u5300/Zipf\u8d1f\u8f7d\u541e\u5410\u63d0\u53471.063-1.265\u500d\uff0cB1\u5206\u6876\u573a\u666f\u63d0\u53471.399\u500d\uff0cB4\u8fb9\u754c\u60c5\u51b5\u81ea\u52a8\u56de\u9000FlashInfer\u907f\u514d\u6027\u80fd\u9000\u5316"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "KV\u7f13\u5b58", "\u6ce8\u610f\u529b\u673a\u5236", "\u7cfb\u7edf\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26666v1", "published_at": "2026-06-25", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "PersistentKV: Page-Aware Decode Scheduling for Long-Context LLM Serving on Commodity GPUs", "tldr": "PersistentKV\u901a\u8fc7\u9875\u611f\u77e5\u8c03\u5ea6\u7b56\u7565\u4f18\u5316\u957f\u4e0a\u4e0b\u6587LLM\u63a8\u7406\uff0c\u5728\u6d88\u8d39\u7ea7GPU\u4e0a\u5b9e\u73b0\u6700\u9ad81.4\u500d\u541e\u5410\u63d0\u5347", "upvotes": 0, "what_it_is": "\u63d0\u51faPersistentKV\uff0c\u4e00\u79cd\u9762\u5411\u5206\u7ec4\u67e5\u8be2\u6ce8\u610f\u529b\uff08GQA\uff09\u7684\u539f\u751f\u5757\u8868\u89e3\u7801\u6ce8\u610f\u529b\u5f15\u64ce\uff0c\u901a\u8fc7\u81ea\u9002\u5e94\u9875\u611f\u77e5\u8c03\u5ea6\u7b56\u7565\uff0c\u5728\u4e0d\u540c\u6279\u6b21\u5927\u5c0f\u548c\u5e8f\u5217\u957f\u5ea6\u573a\u666f\u4e0b\u52a8\u6001\u9009\u62e9\u6700\u4f18\u6267\u884c\u65b9\u6848\u3002", "why_notable": "\u63ed\u793a\u4e86LLM\u63a8\u7406\u4e2d\u5de5\u4f5c\u5206\u914d\u7b56\u7565\u4e0e\u6ce8\u610f\u529b\u8ba1\u7b97\u672c\u8eab\u540c\u7b49\u91cd\u8981\u7684\u7cfb\u7edf\u6027\u89c4\u5f8b\uff0c\u4e3a\u6d88\u8d39\u7ea7GPU\u4e0a\u7684\u957f\u4e0a\u4e0b\u6587\u670d\u52a1\u63d0\u4f9b\u4e86\u5b9e\u7528\u7684\u81ea\u9002\u5e94\u8c03\u5ea6\u6846\u67b6\uff0c\u586b\u8865\u4e86\u73b0\u6709paged-attention\u7cfb\u7edf\u5728\u4f4e\u6d3b\u8dc3\u957f\u4e0a\u4e0b\u6587\u573a\u666f\u4e0b\u7684\u6027\u80fd\u7a7a\u767d\u3002"}, {"abstract": "Weight-space regularization methods such as Elastic Weight Consolidation (EWC) are the standard approach to catastrophic forgetting in continual learning. However, those methods tend to underperform when applied to large language models. We argue that such underperformance can be partly explained by the ``polysemantic\u0027\u0027 nature of large language models: per-weight importance estimates utilized by EWC-style regularization are too coarse and cannot isolate the knowledge that needs protection. In this paper, we propose regularizing instead in the model\u0027s activation space, using pretrained Sparse Autoencoders (SAEs) as a monosemantic feature dictionary. From the perspective of constrained optimization, we derive a new loss function that uses the SAE feature dictionary to explicitly balance stability and plasticity, and show that EWC is a special case in the one-sided weight-space penalty setting. Unlike replay-based methods that store or revisit examples from earlier tasks, our method requires no previous-task data after mask construction: current-task data is used to compute a compact SAE feature mask, and only this mask is retained for later training. Further, since the feature space has significantly lower dimensionality than the parameter space, the proposed method is more memory efficient. On the TRACE and MedCL continual learning benchmarks, the method achieves the strongest result among approaches without introducing task-specific architectural components, also surpassing traditional weight-space regularization methods like EWC. Beyond performance comparisons, we provide empirical evidence for the polysemanticity thesis: task-relevant representations are linearly separable in the SAE feature basis but indistinguishable from chance in the weight basis, and weight-space protection is nearly non-selective at the concept level.", "arxiv_id": "2606.26629", "arxiv_url": "https://arxiv.org/abs/2606.26629", "authors": ["Evan Ning", "Wei Xue", "Dong Lou", "Yike Guo"], "brief": "\u9488\u5bf9\u5927\u8bed\u8a00\u6a21\u578b\u6301\u7eed\u5b66\u4e60\u4e2d\u7684\u707e\u96be\u6027\u9057\u5fd8\u95ee\u9898\uff0c\u63d0\u51fa\u7528\u7a00\u758f\u81ea\u7f16\u7801\u5668\uff08SAE\uff09\u5728\u6fc0\u6d3b\u7a7a\u95f4\u800c\u975e\u6743\u91cd\u7a7a\u95f4\u8fdb\u884c\u6b63\u5219\u5316\uff0c\u5229\u7528SAE\u7684\u5355\u4e49\u7279\u5f81\u5b57\u5178\u7cbe\u51c6\u4fdd\u62a4\u65e7\u77e5\u8bc6\u3002\u8be5\u65b9\u6cd5\u65e0\u9700\u5b58\u50a8\u5386\u53f2\u6570\u636e\uff0c\u5185\u5b58\u6548\u7387\u66f4\u9ad8\uff0c\u5728TRACE\u548cMedCL\u57fa\u51c6\u4e0a\u8d85\u8d8aEWC\u7b49\u4f20\u7edf\u6743\u91cd\u6b63\u5219\u5316\u65b9\u6cd5\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26629", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6301\u7eed\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7a00\u758f\u81ea\u7f16\u7801\u5668", "\u707e\u96be\u6027\u9057\u5fd8"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26629v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "From Weights to Features: SAE-Guided Activation Regularization for LLM Continual Learning", "tldr": "\u9488\u5bf9\u5927\u8bed\u8a00\u6a21\u578b\u6301\u7eed\u5b66\u4e60\u4e2d\u7684\u707e\u96be\u6027\u9057\u5fd8\u95ee\u9898\uff0c\u63d0\u51fa\u7528\u7a00\u758f\u81ea\u7f16\u7801\u5668\uff08SAE\uff09\u5728\u6fc0\u6d3b\u7a7a\u95f4\u800c\u975e\u6743\u91cd\u7a7a\u95f4\u8fdb\u884c\u6b63\u5219\u5316\uff0c\u5229\u7528SAE\u7684\u5355\u4e49\u7279\u5f81\u5b57\u5178\u7cbe\u51c6\u4fdd\u62a4\u65e7\u77e5\u8bc6\u3002\u8be5\u65b9\u6cd5\u65e0\u9700\u5b58\u50a8\u5386\u53f2\u6570\u636e\uff0c\u5185\u5b58\u6548\u7387\u66f4\u9ad8\uff0c\u5728TRACE\u548cMedCL\u57fa\u51c6\u4e0a\u8d85\u8d8aEWC\u7b49\u4f20\u7edf\u6743\u91cd\u6b63\u5219\u5316\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "As reasoning models emit chains of thought tens of thousands of tokens long, KV cache increasingly becomes a deployment bottleneck. Existing cache eviction methods rank tokens by attention weight, which is a noisy importance proxy in long reasoning traces, and prohibits the use of fused kernels in production inference by forcing the model to materialize the attention matrix. In this work, we instead score tokens with a metric we term the epiphany score: the change in the model\u0027s internal representation, read directly from the forward pass with no attention matrix and negligible extra state. Our resulting cache eviction method, EpiKV, requires no training, classifier, or custom kernel, and can be used directly in FlashAttention inference stacks unchanged -- scaling to a 16x longer feasible context than attention-based scoring. upper-mid layers negatively) and remove a positional trend with a causal rolling z-score. At a 4096-token cache EpiKV reaches 72% on MATH-500, matching the strongest attention-based baseline (ThinKV 71%, H2O 67%); a lag-normalized KV variant reaches 37% on AIME-2024 at 8192 tokens against the best of them (33%), at up to 2.8x the speed.", "arxiv_id": "2606.26472", "arxiv_url": "https://arxiv.org/abs/2606.26472", "authors": ["Steven Kolawole", "Virginia Smith"], "brief": "\u9488\u5bf9\u957f\u94fe\u5f0f\u63a8\u7406\u4e2dKV\u7f13\u5b58\u7684\u90e8\u7f72\u74f6\u9888\uff0c\u63d0\u51faEpiKV\u65b9\u6cd5\uff1a\u7528\"\u987f\u609f\u5206\u6570\"\uff08\u6a21\u578b\u5185\u90e8\u8868\u793a\u7684\u53d8\u5316\u91cf\uff09\u66ff\u4ee3\u6ce8\u610f\u529b\u6743\u91cd\u6765\u8bc4\u4f30token\u91cd\u8981\u6027\uff0c\u65e0\u9700\u6ce8\u610f\u529b\u77e9\u9635\u3001\u65e0\u9700\u8bad\u7ec3\uff0c\u53ef\u76f4\u63a5\u517c\u5bb9FlashAttention\u3002\u5728MATH-500\u548cAIME-2024\u4e0a\u8fbe\u5230\u6216\u8d85\u8d8a\u6700\u5f3a\u6ce8\u610f\u529b\u57fa\u7ebf\uff0c\u901f\u5ea6\u63d0\u5347\u6700\u9ad82.8\u500d\uff0c\u652f\u630116\u500d\u66f4\u957f\u7684\u4e0a\u4e0b\u6587\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26472", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["KV\u7f13\u5b58", "\u63a8\u7406\u6a21\u578b", "\u957f\u4e0a\u4e0b\u6587", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26472v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Epiphany-Aware KV Cache Eviction Without the Attention Matrix", "tldr": "\u9488\u5bf9\u957f\u94fe\u5f0f\u63a8\u7406\u4e2dKV\u7f13\u5b58\u7684\u90e8\u7f72\u74f6\u9888\uff0c\u63d0\u51faEpiKV\u65b9\u6cd5\uff1a\u7528\"\u987f\u609f\u5206\u6570\"\uff08\u6a21\u578b\u5185\u90e8\u8868\u793a\u7684\u53d8\u5316\u91cf\uff09\u66ff\u4ee3\u6ce8\u610f\u529b\u6743\u91cd\u6765\u8bc4\u4f30token\u91cd\u8981\u6027\uff0c\u65e0\u9700\u6ce8\u610f\u529b\u77e9\u9635\u3001\u65e0\u9700\u8bad\u7ec3\uff0c\u53ef\u76f4\u63a5\u517c\u5bb9FlashAttention\u3002\u5728MATH-500\u548cAIME-2024\u4e0a\u8fbe\u5230\u6216\u8d85\u8d8a\u6700\u5f3a\u6ce8\u610f\u529b\u57fa\u7ebf\uff0c\u901f\u5ea6\u63d0\u5347\u6700\u9ad82.8\u500d\uff0c\u652f\u630116\u500d\u66f4\u957f\u7684\u4e0a\u4e0b\u6587\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Deliberating takes time. In real-time settings, that time is not free. Standard reinforcement learning (RL) sidesteps this as the environment waits indefinitely for the agent\u0027s decision. Instead, we study real-time RL environments where the environment progresses while waiting for the agent\u0027s action. Building on prior real-time formalizations, we introduce variable-delay real-time RL, where the agent chooses how long to deliberate at each decision point since the environment progresses. For the planning agents we use, the right delay is state-dependent, and naively planning how long to plan can paralyze the agent. We instead approach this setting by training a lightweight gating policy on top of a planner to select state-dependent planning budgets. Across real-time Pac-Man, Tetris, Snake, Speed Hex, and Speed Go, our gating policy outperforms fixed-budget and heuristic baselines, and transfers to a real-time setup where the environment and agent run on two different GPUs.", "arxiv_id": "2606.26463", "arxiv_url": "https://arxiv.org/abs/2606.26463", "authors": ["Aneesh Muppidi", "Firas Darwish", "Dylan Cope", "Jo\u00e3o F. Henriques", "Jakob Nicolaus Foerster"], "brief": "\u7814\u7a76\u5b9e\u65f6\u5f3a\u5316\u5b66\u4e60\u4e2d\u667a\u80fd\u4f53\u601d\u8003\u65f6\u95f4\u7684\u5206\u914d\u95ee\u9898\uff1a\u73af\u5883\u4e0d\u7b49\u5f85\u667a\u80fd\u4f53\u51b3\u7b56\u800c\u6301\u7eed\u8fd0\u884c\u3002\u63d0\u51fa\"\u53ef\u53d8\u5ef6\u8fdf\u5b9e\u65f6RL\"\u6846\u67b6\uff0c\u8bad\u7ec3\u8f7b\u91cf\u7ea7\u95e8\u63a7\u7b56\u7565\u52a8\u6001\u9009\u62e9\u6bcf\u6b65\u89c4\u5212\u9884\u7b97\uff0c\u5728Pac-Man\u3001Tetris\u7b49\u591a\u4e2a\u5b9e\u65f6\u6e38\u620f\u4e2d\u4f18\u4e8e\u56fa\u5b9a\u9884\u7b97\u548c\u542f\u53d1\u5f0f\u57fa\u7ebf\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26463", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5b9e\u65f6\u51b3\u7b56", "\u89c4\u5212", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26463v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Finding the Time to Think: Learning Planning Budgets in Real-Time RL", "tldr": "\u7814\u7a76\u5b9e\u65f6\u5f3a\u5316\u5b66\u4e60\u4e2d\u667a\u80fd\u4f53\u601d\u8003\u65f6\u95f4\u7684\u5206\u914d\u95ee\u9898\uff1a\u73af\u5883\u4e0d\u7b49\u5f85\u667a\u80fd\u4f53\u51b3\u7b56\u800c\u6301\u7eed\u8fd0\u884c\u3002\u63d0\u51fa\"\u53ef\u53d8\u5ef6\u8fdf\u5b9e\u65f6RL\"\u6846\u67b6\uff0c\u8bad\u7ec3\u8f7b\u91cf\u7ea7\u95e8\u63a7\u7b56\u7565\u52a8\u6001\u9009\u62e9\u6bcf\u6b65\u89c4\u5212\u9884\u7b97\uff0c\u5728Pac-Man\u3001Tetris\u7b49\u591a\u4e2a\u5b9e\u65f6\u6e38\u620f\u4e2d\u4f18\u4e8e\u56fa\u5b9a\u9884\u7b97\u548c\u542f\u53d1\u5f0f\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present KernelPro, a closed-loop multi-agent system that automatically generates, profiles, and iteratively optimizes GPU kernel code by integrating large language model (LLM) code generation with hardware profiler feedback and pluggable bottleneck detection tools. KernelPro introduces four contributions: (1) a semantic feedback operator that encodes expert heuristics as pluggable micro-profiling tools, transforming raw hardware metrics into actionable natural language guidance; (2) a two-stage tool invocation architecture where roofline-based bottleneck classification filters which specialized analysis tools execute, combining kernel-level (ncu), instruction-level (SASS), and system-level (nsys) profiling; (3) a domain-adapted MCTS with progressive widening, asymmetric branching, log-reward calibration, dead-end pruning, and search memory for cross-iteration learning; and (4) direct CuTe source-level code generation via autonomous code search over the CUTLASS/CuTe codebase. On KernelBench, KernelPro achieves geometric mean speedups of 2.42x/4.69x/5.30x on Levels 1/2/3, establishing state-of-the-art performance across all difficulty levels. On VeOmni\u0027s expert-optimized MoE training kernels, KernelPro achieves 1.23x over hand-tuned Triton by generating a from-scratch raw-CUDA+CuTe Hopper WGMMA kernel. Ablation studies demonstrate that each design component independently and significantly improves optimization quality: micro-profiling tools (p \u003c 0.0001 vs raw metrics), MCTS search (26% higher geometric mean vs greedy, p = 0.004), and proactive tool orchestration (23% improvement, p = 0.035). Finally, KernelPro is the first CUDA kernel coding agent to optimize energy efficiency beyond the speed-only focus of prior systems, demonstrating an 11.6% measured energy reduction at matched speed.", "arxiv_id": "2606.26453", "arxiv_url": "https://arxiv.org/abs/2606.26453", "authors": ["Jiading Gai", "Shuai Zhang", "Kaj Bostrom", "Jin Huang", "Vihang Patil", "Haoyang Fang", "Bernie Wang", "Huzefa Rangwala", "George Karypis"], "brief": "\u63d0\u51faKernelPro\uff0c\u4e00\u4e2a\u95ed\u73af\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u901a\u8fc7\u5c06LLM\u4ee3\u7801\u751f\u6210\u4e0e\u786c\u4ef6\u6027\u80fd\u5206\u6790\u5668\u53cd\u9988\u548c\u53ef\u63d2\u62d4\u74f6\u9888\u68c0\u6d4b\u5de5\u5177\u76f8\u7ed3\u5408\uff0c\u81ea\u52a8\u751f\u6210\u5e76\u8fed\u4ee3\u4f18\u5316GPU\u5185\u6838\u4ee3\u7801\u3002\u5728KernelBench\u4e0a\u5b9e\u73b0\u4e862.42x/4.69x/5.30x\u7684\u51e0\u4f55\u5e73\u5747\u52a0\u901f\u6bd4\uff0c\u5e76\u5728\u4e13\u5bb6\u4f18\u5316\u7684MoE\u8bad\u7ec3\u5185\u6838\u4e0a\u8d85\u8d8a\u624b\u5de5\u8c03\u4f18Triton\u8fbe1.23x\uff0c\u540c\u65f6\u8fd8\u5b9e\u73b0\u4e8611.6%\u7684\u80fd\u8017\u964d\u4f4e\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26453", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "GPU\u5185\u6838\u4f18\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26453v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Optimizing CUDA like a Human: Micro-Profiling Tools as Expert Surrogates for LLM-Based GPU Kernel Optimization", "tldr": "\u63d0\u51faKernelPro\uff0c\u4e00\u4e2a\u95ed\u73af\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u901a\u8fc7\u5c06LLM\u4ee3\u7801\u751f\u6210\u4e0e\u786c\u4ef6\u6027\u80fd\u5206\u6790\u5668\u53cd\u9988\u548c\u53ef\u63d2\u62d4\u74f6\u9888\u68c0\u6d4b\u5de5\u5177\u76f8\u7ed3\u5408\uff0c\u81ea\u52a8\u751f\u6210\u5e76\u8fed\u4ee3\u4f18\u5316GPU\u5185\u6838\u4ee3\u7801\u3002\u5728KernelBench\u4e0a\u5b9e\u73b0\u4e862.42x/4.69x/5.30x\u7684\u51e0\u4f55\u5e73\u5747\u52a0\u901f\u6bd4\uff0c\u5e76\u5728\u4e13\u5bb6\u4f18\u5316\u7684MoE\u8bad\u7ec3\u5185\u6838\u4e0a\u8d85\u8d8a\u624b\u5de5\u8c03\u4f18Triton\u8fbe1.23x\uff0c\u540c\u65f6\u8fd8\u5b9e\u73b0\u4e8611.6%\u7684\u80fd\u8017\u964d\u4f4e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "State-of-the-art medium-range AI weather models can outperform traditional Numerical Weather Prediction (NWP) but require massive training budgets. This restricts usage for under-resourced groups and severely limits fast model iteration. Here we develop Otter Weather, a highly efficient spatiotemporal forecasting model designed to democratise high-performance weather prediction with AI. Evaluated on ERA5 reanalysis data at 1.5\u00b0 resolution using standard WeatherBench protocols, the Otter family significantly advances the skill-compute Pareto frontier. The deterministic version outperforms the best NWP baseline by 9.6% at a 24-hour lead time while requiring fewer than 3.5 A100-days for training. It provides a 2x efficiency gain over lightweight AI models and a 100-fold reduction in compute compared to resource-intensive frontier architectures. We extend these efficiency gains into probabilistic forecasting by training via the Continuous Ranked Probability Score (CRPS). Scaling to a larger architecture, Otter-XL achieves a 9.7% CRPS improvement over the IFS ENS baseline. This yields an almost two-fold increase in predictive skill over comparable lightweight models at similar compute budgets. Otter-XL also outperforms frontier architectures like GenCast by over 2%, while using an order of magnitude less compute. Finally, Otter is applied out-of-the-box to a complex acoustic scattering PDE task where it outperforms a state-of-the-art foundation modelling approach, suggesting that the advances made here might apply across a range of scientific domains.", "arxiv_id": "2606.26421", "arxiv_url": "https://arxiv.org/abs/2606.26421", "authors": ["Cristiana Diaconu", "Jonas Scholz", "Aliaksandra Shysheya", "Stratis Markou", "Payel Mukhopadhyay", "Miles Cranmer", "Richard E. Turner"], "brief": "\u63d0\u51faOtter Weather\uff0c\u4e00\u79cd\u9ad8\u6548\u7684\u65f6\u7a7a\u5929\u6c14\u9884\u62a5\u6a21\u578b\uff0c\u5728ERA5\u6570\u636e\u4e0a\u4ee5\u4e0d\u8db33.5\u4e2aA100\u5929\u7684\u8bad\u7ec3\u6210\u672c\u8d85\u8d8a\u6700\u4f73NWP\u57fa\u7ebf9.6%\uff0c\u76f8\u6bd4\u524d\u6cbf\u67b6\u6784\u8ba1\u7b97\u91cf\u51cf\u5c11100\u500d\u3002\u6982\u7387\u9884\u62a5\u7248\u672cOtter-XL\u5728CRPS\u6307\u6807\u4e0a\u8d85\u8d8aGenCast\u903e2%\uff0c\u540c\u65f6\u8ba1\u7b97\u91cf\u5c11\u4e00\u4e2a\u6570\u91cf\u7ea7\uff0c\u5e76\u53ef\u63a8\u5e7f\u81f3\u58f0\u5b66\u6563\u5c04PDE\u7b49\u79d1\u5b66\u9886\u57df\u3002", "categories": ["cs.LG", "cs.CE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26421", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5929\u6c14\u9884\u62a5", "\u65f6\u7a7a\u9884\u6d4b", "\u8ba1\u7b97\u6548\u7387", "\u6982\u7387\u9884\u62a5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26421v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Otter Weather: Skillful and Computationally Efficient Medium-Range Weather Forecasting", "tldr": "\u63d0\u51faOtter Weather\uff0c\u4e00\u79cd\u9ad8\u6548\u7684\u65f6\u7a7a\u5929\u6c14\u9884\u62a5\u6a21\u578b\uff0c\u5728ERA5\u6570\u636e\u4e0a\u4ee5\u4e0d\u8db33.5\u4e2aA100\u5929\u7684\u8bad\u7ec3\u6210\u672c\u8d85\u8d8a\u6700\u4f73NWP\u57fa\u7ebf9.6%\uff0c\u76f8\u6bd4\u524d\u6cbf\u67b6\u6784\u8ba1\u7b97\u91cf\u51cf\u5c11100\u500d\u3002\u6982\u7387\u9884\u62a5\u7248\u672cOtter-XL\u5728CRPS\u6307\u6807\u4e0a\u8d85\u8d8aGenCast\u903e2%\uff0c\u540c\u65f6\u8ba1\u7b97\u91cf\u5c11\u4e00\u4e2a\u6570\u91cf\u7ea7\uff0c\u5e76\u53ef\u63a8\u5e7f\u81f3\u58f0\u5b66\u6563\u5c04PDE\u7b49\u79d1\u5b66\u9886\u57df\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Pre-trained transformers have demonstrated remarkable generalization abilities, at times extending beyond the scope of their training data. Yet, real-world deployments often face unexpected or adversarial data that diverges from training data distributions. Without explicit mechanisms for handling such shifts, model reliability and safety degrade, urging more disciplined study of out-of-distribution (OOD) settings for transformers. By systematic experiments, we present a mechanistic framework for delineating the precise contours of transformer model robustness. We find that OOD inputs, including subtle typos and jailbreak prompts, drive language models to operate on an increased number of fallacious concepts in their internals. We leverage this device to quantify and understand the degree of distributional shift in prompts, enabling a mechanistically grounded fine-tuning strategy to robustify LLMs. Expanding the very notion of OOD from input data to a model\u0027s private computational processes, a new transformer diagnostic at inference time is a critical step toward making AI systems safe for deployment across science, business, and government.", "arxiv_id": "2606.26396", "arxiv_url": "https://arxiv.org/abs/2606.26396", "authors": ["Praneet Suresh", "Jack Stanley", "Sonia Joseph", "Luca Scimeca", "Danilo Bzdok"], "brief": "\u5229\u7528\u7a00\u758f\u81ea\u7f16\u7801\u5668\uff08SAE\uff09\u5206\u6790Transformer\u5185\u90e8\u6982\u5ff5\u6fc0\u6d3b\uff0c\u53d1\u73b0OOD\u8f93\u5165\uff08\u5982\u62fc\u5199\u9519\u8bef\u3001\u8d8a\u72f1\u63d0\u793a\uff09\u4f1a\u5bfc\u81f4\u6a21\u578b\u6fc0\u6d3b\u66f4\u591a\u9519\u8bef\u6982\u5ff5\u3002\u57fa\u4e8e\u6b64\u673a\u5236\u63d0\u51fa\u4e86\u91cf\u5316\u5206\u5e03\u504f\u79fb\u7684\u65b9\u6cd5\uff0c\u5e76\u8bbe\u8ba1\u4e86\u9488\u5bf9\u6027\u5fae\u8c03\u7b56\u7565\u4ee5\u589e\u5f3aLLM\u7684\u9c81\u68d2\u6027\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26396", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5206\u5e03\u5916\u6cdb\u5316", "\u7a00\u758f\u81ea\u7f16\u7801\u5668", "\u6a21\u578b\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26396v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "At the Edge of Understanding: Sparse Autoencoders Trace The Limits of Transformer Generalization", "tldr": "\u5229\u7528\u7a00\u758f\u81ea\u7f16\u7801\u5668\uff08SAE\uff09\u5206\u6790Transformer\u5185\u90e8\u6982\u5ff5\u6fc0\u6d3b\uff0c\u53d1\u73b0OOD\u8f93\u5165\uff08\u5982\u62fc\u5199\u9519\u8bef\u3001\u8d8a\u72f1\u63d0\u793a\uff09\u4f1a\u5bfc\u81f4\u6a21\u578b\u6fc0\u6d3b\u66f4\u591a\u9519\u8bef\u6982\u5ff5\u3002\u57fa\u4e8e\u6b64\u673a\u5236\u63d0\u51fa\u4e86\u91cf\u5316\u5206\u5e03\u504f\u79fb\u7684\u65b9\u6cd5\uff0c\u5e76\u8bbe\u8ba1\u4e86\u9488\u5bf9\u6027\u5fae\u8c03\u7b56\u7565\u4ee5\u589e\u5f3aLLM\u7684\u9c81\u68d2\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multimodal large language models (MLLMs) extend large language models (LLMs) with visual perception, enabling joint reasoning over images and text. Despite inheriting strong reasoning capabilities from LLMs, they remain prone to hallucinations that contradict their visual inputs. Mechanistic studies indicate that this weakness stems from visual laziness: MLLMs encode the correct visual evidence internally, but overly rely on strong language priors during response. Existing alignment methods, such as direct preference optimization, primarily optimize outcome-level rewards based on text. This introduces an optimization bias toward linguistic shortcuts, leading to responses that often contradict the visual evidence. To address this, we propose Visual Information Gain In aLignment (VIGIL), a reinforcement-learning (RL) post-training framework that shifts the focus from numerical reward fitting to causal visual grounding. VIGIL introduces a geometric constraint that explicitly maximizes the mutual information between the visual input and the generated response. We achieve this by penalizing \"blind confidence\" instances where the model remains improperly certain even when textual-visual attention is masked to create a counterfactual blind state. Extensive experiments show that VIGIL consistently outperforms recent alignment methods across hallucination and reasoning benchmarks without compromising text-only capabilities. Our approach matches the full-data performance of state-of-the-art methods using only 25% of the preference data and even demonstrates emergent spatial grounding capabilities without explicit bounding box supervision.", "arxiv_id": "2606.26387", "arxiv_url": "https://arxiv.org/abs/2606.26387", "authors": ["Xi Xiao", "Chen Liu", "Chih-Ting Liao", "Yunbei Zhang", "Qizhen Lan", "Yuxiang Wei", "Lin Zhao", "Janet Wang", "Jianyang Gu", "Muchao Ye", "Tianyang Wang", "Hao Xu"], "brief": "\u9488\u5bf9\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u4e2d\u7684\"\u89c6\u89c9\u61d2\u60f0\"\u95ee\u9898\uff08\u6a21\u578b\u5185\u90e8\u7f16\u7801\u4e86\u6b63\u786e\u89c6\u89c9\u4fe1\u606f\u5374\u4f9d\u8d56\u8bed\u8a00\u5148\u9a8c\u751f\u6210\u5e7b\u89c9\uff09\uff0c\u63d0\u51faVIGIL\u6846\u67b6\uff0c\u901a\u8fc7\u53cd\u4e8b\u5b9e\u89c6\u89c9\u5bf9\u9f50\uff08\u906e\u853d\u89c6\u89c9\u6ce8\u610f\u529b\u6784\u9020\u76f2\u6001\uff09\u60e9\u7f5a\u6a21\u578b\u7684\"\u76f2\u76ee\u81ea\u4fe1\"\uff0c\u6700\u5927\u5316\u89c6\u89c9\u8f93\u5165\u4e0e\u751f\u6210\u56de\u590d\u7684\u4e92\u4fe1\u606f\u3002\u5b9e\u9a8c\u8868\u660e\uff0cVIGIL\u4ec5\u752825%\u504f\u597d\u6570\u636e\u5373\u53ef\u5339\u914dSOTA\u5168\u91cf\u6570\u636e\u6027\u80fd\uff0c\u5e76\u5728\u5e7b\u89c9\u548c\u63a8\u7406\u57fa\u51c6\u4e0a\u5168\u9762\u8d85\u8d8a\u73b0\u6709\u5bf9\u9f50\u65b9\u6cd5\uff0c\u8fd8\u6d8c\u73b0\u51fa\u65e0\u76d1\u7763\u7a7a\u95f4\u5b9a\u4f4d\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26387", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u5e7b\u89c9\u7f13\u89e3", "\u5f3a\u5316\u5b66\u4e60", "\u89c6\u89c9\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26387v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Staying VIGILant: Mitigating Visual Laziness via Counterfactual Visual Alignment in MLLMs", "tldr": "\u9488\u5bf9\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u4e2d\u7684\"\u89c6\u89c9\u61d2\u60f0\"\u95ee\u9898\uff08\u6a21\u578b\u5185\u90e8\u7f16\u7801\u4e86\u6b63\u786e\u89c6\u89c9\u4fe1\u606f\u5374\u4f9d\u8d56\u8bed\u8a00\u5148\u9a8c\u751f\u6210\u5e7b\u89c9\uff09\uff0c\u63d0\u51faVIGIL\u6846\u67b6\uff0c\u901a\u8fc7\u53cd\u4e8b\u5b9e\u89c6\u89c9\u5bf9\u9f50\uff08\u906e\u853d\u89c6\u89c9\u6ce8\u610f\u529b\u6784\u9020\u76f2\u6001\uff09\u60e9\u7f5a\u6a21\u578b\u7684\"\u76f2\u76ee\u81ea\u4fe1\"\uff0c\u6700\u5927\u5316\u89c6\u89c9\u8f93\u5165\u4e0e\u751f\u6210\u56de\u590d\u7684\u4e92\u4fe1\u606f\u3002\u5b9e\u9a8c\u8868\u660e\uff0cVIGIL\u4ec5\u752825%\u504f\u597d\u6570\u636e\u5373\u53ef\u5339\u914dSOTA\u5168\u91cf\u6570\u636e\u6027\u80fd\uff0c\u5e76\u5728\u5e7b\u89c9\u548c\u63a8\u7406\u57fa\u51c6\u4e0a\u5168\u9762\u8d85\u8d8a\u73b0\u6709\u5bf9\u9f50\u65b9\u6cd5\uff0c\u8fd8\u6d8c\u73b0\u51fa\u65e0\u76d1\u7763\u7a7a\u95f4\u5b9a\u4f4d\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Standard benchmarks for multimodal large language models (MLLMs) score each item on one canonical ordering and miss whether order-irrelevant shuffling changes the answer, a baseline reliability property called for by emerging AI evaluation guidelines. We introduce Facet-Probe, a five-facet audit (option, evidence-chunk, document-rank, image-set, and mixed-modality ordering) of 18 frontier and open-weight MLLMs. A Bayesian item-response model separates ordering noise from per-facet bias, and a same-ordering control estimates the decoder-stochastic floor for observed flips. We find that none of the 18 MLLMs we audit are order-invariant: screened per-facet panel-mean flip rates span 24-50%. A Gemini same-ordering control at temperature 0 estimates a substantial ordering excess over a same-input decoder-noise floor in verified cells. Capability predicts but does not eliminate flips; the best model still flips on 13.4% of trials. In our Gemini mitigation tests, training-free prompt changes are modality-conditional and do not transfer from text to visual reasoning. These results suggest that prompt-level mitigation alone is unlikely to provide general order robustness, motivating future work on training-time and architectural approaches. We propose cross-ordering flip rate as a standard reporting axis for MLLMs.", "arxiv_id": "2606.26079", "arxiv_url": "https://arxiv.org/abs/2606.26079", "authors": ["Akshay Paruchuri", "Sanmi Koyejo", "Ehsan Adeli"], "brief": "\u672c\u6587\u63d0\u51faFacet-Probe\u5ba1\u8ba1\u6846\u67b6\uff0c\u5bf918\u4e2a\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u8fdb\u884c\u4e94\u7ef4\u5ea6\u987a\u5e8f\u654f\u611f\u6027\u6d4b\u8bd5\uff0c\u53d1\u73b0\u6240\u6709\u6a21\u578b\u5747\u5b58\u5728\u987a\u5e8f\u654f\u611f\u95ee\u9898\uff0c\u7ffb\u8f6c\u7387\u9ad8\u8fbe24-50%\uff0c\u5373\u4f7f\u6700\u4f18\u6a21\u578b\u4ecd\u670913.4%\u7684\u7ffb\u8f6c\u7387\uff1b\u63d0\u793a\u5c42\u9762\u7684\u7f13\u89e3\u63aa\u65bd\u65e0\u6cd5\u8de8\u6a21\u6001\u8fc1\u79fb\uff0c\u5efa\u8bae\u5c06\u8de8\u987a\u5e8f\u7ffb\u8f6c\u7387\u4f5c\u4e3a\u6a21\u578b\u8bc4\u4f30\u7684\u6807\u51c6\u6307\u6807\u3002", "categories": ["cs.CL", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26079", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u9760\u6027\u8bc4\u4f30", "\u987a\u5e8f\u654f\u611f\u6027", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26079v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Same Evidence, Different Answer: Auditing Order Sensitivity in Multimodal Large Language Models", "tldr": "\u672c\u6587\u63d0\u51faFacet-Probe\u5ba1\u8ba1\u6846\u67b6\uff0c\u5bf918\u4e2a\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u8fdb\u884c\u4e94\u7ef4\u5ea6\u987a\u5e8f\u654f\u611f\u6027\u6d4b\u8bd5\uff0c\u53d1\u73b0\u6240\u6709\u6a21\u578b\u5747\u5b58\u5728\u987a\u5e8f\u654f\u611f\u95ee\u9898\uff0c\u7ffb\u8f6c\u7387\u9ad8\u8fbe24-50%\uff0c\u5373\u4f7f\u6700\u4f18\u6a21\u578b\u4ecd\u670913.4%\u7684\u7ffb\u8f6c\u7387\uff1b\u63d0\u793a\u5c42\u9762\u7684\u7f13\u89e3\u63aa\u65bd\u65e0\u6cd5\u8de8\u6a21\u6001\u8fc1\u79fb\uff0c\u5efa\u8bae\u5c06\u8de8\u987a\u5e8f\u7ffb\u8f6c\u7387\u4f5c\u4e3a\u6a21\u578b\u8bc4\u4f30\u7684\u6807\u51c6\u6307\u6807\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Common first-order optimizers, such as Adam, implicitly treat each parameter block as an unstructured vector, which disregards the multilinear weight structure present in many modern machine learning models. Recent work has shown that exploiting matrix structure can improve optimization dynamics. A notable example is Muon, which performs steepest descent under the spectral norm constraint. We take the next step and introduce Tensorion, a tensor-aware optimizer that extends Muon\u0027s constrained optimization perspective from matrices to higher-order tensors. Tensorion is built around a linear minimization oracle (LMO) over a tensor norm ball. The norm is carefully chosen to balance two objectives: tightly bounding the tensor spectral norm, while still keeping the LMO tractable. This LMO becomes computable because it reduces to operations on adaptively selected unfolding matrices. Notably, when restricted to order-2 tensors (i.e., matrices), Tensorion recovers Muon exactly. Experiments on tensor-based computer vision problems suggest that Tensorion can offer improved convergence behavior and more stable gradient updates compared with Adam-based and existing tensor-aware baselines in the evaluated settings.", "arxiv_id": "2606.25975", "arxiv_url": "https://arxiv.org/abs/2606.25975", "authors": ["Vladimir Bogachev", "Vladimir Aletov", "Alexander Molozhavenko", "Sergei Kudriashov", "Maxim Rakhuba"], "brief": "\u63d0\u51faTensorion\u4f18\u5316\u5668\uff0c\u5c06Muon\u4f18\u5316\u5668\u4ece\u77e9\u9635\u63a8\u5e7f\u5230\u9ad8\u9636\u5f20\u91cf\uff0c\u901a\u8fc7\u5728\u5f20\u91cf\u8303\u6570\u7403\u4e0a\u7684\u7ebf\u6027\u6700\u5c0f\u5316\u9884\u8a00\u673a\uff08LMO\uff09\u5229\u7528\u591a\u7ebf\u6027\u6743\u91cd\u7ed3\u6784\u3002\u5728\u8ba1\u7b97\u673a\u89c6\u89c9\u4efb\u52a1\u4e0a\uff0c\u76f8\u6bd4Adam\u548c\u73b0\u6709\u5f20\u91cf\u611f\u77e5\u57fa\u7ebf\u5c55\u73b0\u51fa\u66f4\u597d\u7684\u6536\u655b\u6027\u548c\u66f4\u7a33\u5b9a\u7684\u68af\u5ea6\u66f4\u65b0\u3002", "categories": ["cs.LG", "cs.CV", "math.NA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25975", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4f18\u5316\u5668", "\u5f20\u91cf\u65b9\u6cd5", "\u6df1\u5ea6\u5b66\u4e60\u8bad\u7ec3", "\u8c31\u8303\u6570"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25975v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Tensorion: A Tensor-Aware Generalization of the Muon Optimizer", "tldr": "\u63d0\u51faTensorion\u4f18\u5316\u5668\uff0c\u5c06Muon\u4f18\u5316\u5668\u4ece\u77e9\u9635\u63a8\u5e7f\u5230\u9ad8\u9636\u5f20\u91cf\uff0c\u901a\u8fc7\u5728\u5f20\u91cf\u8303\u6570\u7403\u4e0a\u7684\u7ebf\u6027\u6700\u5c0f\u5316\u9884\u8a00\u673a\uff08LMO\uff09\u5229\u7528\u591a\u7ebf\u6027\u6743\u91cd\u7ed3\u6784\u3002\u5728\u8ba1\u7b97\u673a\u89c6\u89c9\u4efb\u52a1\u4e0a\uff0c\u76f8\u6bd4Adam\u548c\u73b0\u6709\u5f20\u91cf\u611f\u77e5\u57fa\u7ebf\u5c55\u73b0\u51fa\u66f4\u597d\u7684\u6536\u655b\u6027\u548c\u66f4\u7a33\u5b9a\u7684\u68af\u5ea6\u66f4\u65b0\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Effective online adaptation of vision-language-action (VLA) models remains challenging, as sparse rewards provide weak supervision for high-dimensional autoregressive action policies. Although self-distillation can in principle provide denser training signals, we find that text-based privileged teachers conditioned on demonstrations, retrieved experiences, or high-level plans are ineffective for VLA adaptation, exposing a modality gap between symbolic guidance and low-level robot actions. We propose ROAD-VLA, an advantage-guided self-distillation framework that constructs a proximal teacher directly in action space by perturbing action-token logits with calibrated advantage estimates. This converts sparse rewards into dense token-level supervision while keeping the teacher close to the current policy. We further derive a policy-improvement lower bound under calibrated advantages and accurate teacher matching. Across seven robotic manipulation environments with in-distribution and out-of-distribution shifts, ROADVLA outperforms PPO in nearly all settings, demonstrating robust online VLA adaptation.", "arxiv_id": "2606.25800", "arxiv_url": "https://arxiv.org/abs/2606.25800", "authors": ["Kejing Wang", "Toan Nguyen", "Minh Hoang Nguyen", "Simon Khan", "Flora D. Salim"], "brief": "\u9488\u5bf9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u5728\u7ebf\u9002\u5e94\u4e2d\u7a00\u758f\u5956\u52b1\u76d1\u7763\u4e0d\u8db3\u7684\u95ee\u9898\uff0c\u63d0\u51faROAD-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u52a8\u4f5c\u7a7a\u95f4\u4e2d\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\u6a21\u578b\uff08\u5229\u7528\u6821\u51c6\u4f18\u52bf\u4f30\u8ba1\u6270\u52a8\u52a8\u4f5ctoken logits\uff09\uff0c\u5c06\u7a00\u758f\u5956\u52b1\u8f6c\u5316\u4e3a\u5bc6\u96c6token\u7ea7\u76d1\u7763\u3002\u5728\u4e03\u4e2a\u673a\u5668\u4eba\u64cd\u4f5c\u73af\u5883\u4e2d\uff0cROAD-VLA\u5728\u5206\u5e03\u5185\u548c\u5206\u5e03\u5916\u573a\u666f\u4e0b\u5747\u4f18\u4e8ePPO\u57fa\u7ebf\u3002", "categories": ["cs.LG", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25800", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u81ea\u84b8\u998f", "\u673a\u5668\u4eba\u64cd\u4f5c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25800v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ROAD-VLA: Robust Online Adaptation via Self-Distillation for Vision-Language-Action Models", "tldr": "\u9488\u5bf9\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff08VLA\uff09\u6a21\u578b\u5728\u7ebf\u9002\u5e94\u4e2d\u7a00\u758f\u5956\u52b1\u76d1\u7763\u4e0d\u8db3\u7684\u95ee\u9898\uff0c\u63d0\u51faROAD-VLA\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u52a8\u4f5c\u7a7a\u95f4\u4e2d\u6784\u5efa\u8fd1\u7aef\u6559\u5e08\u6a21\u578b\uff08\u5229\u7528\u6821\u51c6\u4f18\u52bf\u4f30\u8ba1\u6270\u52a8\u52a8\u4f5ctoken logits\uff09\uff0c\u5c06\u7a00\u758f\u5956\u52b1\u8f6c\u5316\u4e3a\u5bc6\u96c6token\u7ea7\u76d1\u7763\u3002\u5728\u4e03\u4e2a\u673a\u5668\u4eba\u64cd\u4f5c\u73af\u5883\u4e2d\uff0cROAD-VLA\u5728\u5206\u5e03\u5185\u548c\u5206\u5e03\u5916\u573a\u666f\u4e0b\u5747\u4f18\u4e8ePPO\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large vision-language models (LVLMs) have recently shown immense potential in automated content moderation, sparking growing interest in developing harmful-video benchmarks. However, we identify two primary limitations in existing works: 1) The multi-layered characteristics of harmful videos are overlooked. Existing benchmarks predominantly formulate evaluation as a binary classification task, failing to capture implicit or deep contextual harms. 2) Explanatory rationales are completely absent. Current frameworks measure exclusively whether a model flags a video correctly rather than explaining why, turning evaluation into a black box where models can succeed through superficial shortcuts. To address these problems, we present HarmVideoBench, a multi-layered diagnostic benchmark comprising 1,379 videos paired with 4,137 multiple-choice questions. HarmVideoBench benchmarks three hierarchical dimensions: Observable Evidence, Clip-Internal Meaning, and Beyond-Clip Reasoning, aiming to evaluate models\u0027 deep understanding beyond surface cues with carefully balanced and curated samples. We evaluate 19 leading models on HarmVideoBench to assess their multidimensional understanding of harmful videos. Moreover, we introduce BCR, a benchmark-aligned method that predicts reasoning boundaries and dynamically retrieves context only when needed. Experimental results show that BCR substantially improves the base model\u0027s performance in harmful video understanding, raising the macro average from 61.7 percent to a state-of-the-art 84.4 percent.", "arxiv_id": "2606.27187", "arxiv_url": "https://arxiv.org/abs/2606.27187", "authors": ["Jiajun Wu", "Haoyu Kang", "Yining Sun", "Jiacheng Hou", "Heng Zhang", "Danyang Zhang", "Zhenjun Zhao", "Haochi Zhang", "Leixin Sun", "Eric Hanchen Jiang", "Yushan Li", "Ruiyu Li", "Mengkai Huang", "Yan Gao", "Xu Zhang", "Guancheng Wan"], "brief": "\u63d0\u51faHarmVideoBench\uff0c\u4e00\u4e2a\u591a\u5c42\u6b21\u6709\u5bb3\u89c6\u9891\u7406\u89e3\u57fa\u51c6\uff0c\u5305\u542b1379\u4e2a\u89c6\u9891\u548c4137\u9053\u591a\u9009\u9898\uff0c\u8986\u76d6\u53ef\u89c2\u5bdf\u8bc1\u636e\u3001\u7247\u6bb5\u5185\u542b\u4e49\u548c\u8de8\u7247\u6bb5\u63a8\u7406\u4e09\u4e2a\u7ef4\u5ea6\u3002\u540c\u65f6\u5f15\u5165BCR\u65b9\u6cd5\u52a8\u6001\u68c0\u7d22\u4e0a\u4e0b\u6587\uff0c\u5c06\u57fa\u7840\u6a21\u578b\u7684\u5b8f\u5e73\u5747\u51c6\u786e\u7387\u4ece61.7%\u63d0\u5347\u81f384.4%\u3002", "categories": ["cs.CV", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27187", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u6709\u5bb3\u5185\u5bb9\u68c0\u6d4b", "\u89c6\u9891\u7406\u89e3", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27187v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "HarmVideoBench: Benchmarking Harmful Video Understanding in Large Multimodal Models", "tldr": "\u63d0\u51faHarmVideoBench\uff0c\u4e00\u4e2a\u591a\u5c42\u6b21\u6709\u5bb3\u89c6\u9891\u7406\u89e3\u57fa\u51c6\uff0c\u5305\u542b1379\u4e2a\u89c6\u9891\u548c4137\u9053\u591a\u9009\u9898\uff0c\u8986\u76d6\u53ef\u89c2\u5bdf\u8bc1\u636e\u3001\u7247\u6bb5\u5185\u542b\u4e49\u548c\u8de8\u7247\u6bb5\u63a8\u7406\u4e09\u4e2a\u7ef4\u5ea6\u3002\u540c\u65f6\u5f15\u5165BCR\u65b9\u6cd5\u52a8\u6001\u68c0\u7d22\u4e0a\u4e0b\u6587\uff0c\u5c06\u57fa\u7840\u6a21\u578b\u7684\u5b8f\u5e73\u5747\u51c6\u786e\u7387\u4ece61.7%\u63d0\u5347\u81f384.4%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-language models (VLMs) often produce hallucinated or inconsistent outputs, where text and images are not properly aligned. Addressing this issue requires not only detecting misalignment but also explaining the discrepancy and localizing its visual evidence. We introduce GAVEL (Grounded Caption Error Verification and Localization), a task that jointly addresses verification, explanation, and localization for image-text pairs. To support systematic evaluation, we also present a corresponding dataset and benchmark. We further train a supervised baseline on the human-annotated training split to assess whether GAVEL provides learnable supervision for these abilities. Experiments show that even strong closed-source models struggle on GAVEL, while the supervised baseline yields consistent improvements across grounding and explanation metrics.", "arxiv_id": "2606.26923", "arxiv_url": "https://arxiv.org/abs/2606.26923", "authors": ["Zixian Gao", "Atsushi Hashimoto", "Kuniaki Saito"], "brief": "\u63d0\u51faGAVEL\u4efb\u52a1\uff0c\u8054\u5408\u89e3\u51b3\u56fe\u6587\u5bf9\u7684\u9519\u8bef\u9a8c\u8bc1\u3001\u89e3\u91ca\u548c\u89c6\u89c9\u5b9a\u4f4d\u95ee\u9898\u3002\u6784\u5efa\u4e86\u5bf9\u5e94\u6570\u636e\u96c6\u4e0e\u57fa\u51c6\uff0c\u5b9e\u9a8c\u8868\u660e\u5373\u4f7f\u5f3a\u95ed\u6e90\u6a21\u578b\u5728\u6b64\u4efb\u52a1\u4e0a\u4e5f\u8868\u73b0\u6b20\u4f73\uff0c\u800c\u76d1\u7763\u57fa\u7ebf\u5728\u5b9a\u4f4d\u548c\u89e3\u91ca\u6307\u6807\u4e0a\u53d6\u5f97\u4e00\u81f4\u63d0\u5347\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26923", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5e7b\u89c9\u68c0\u6d4b", "\u56fe\u6587\u5bf9\u9f50", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26923v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "GAVEL: Grounded Caption Error Verification and Localization", "tldr": "\u63d0\u51faGAVEL\u4efb\u52a1\uff0c\u8054\u5408\u89e3\u51b3\u56fe\u6587\u5bf9\u7684\u9519\u8bef\u9a8c\u8bc1\u3001\u89e3\u91ca\u548c\u89c6\u89c9\u5b9a\u4f4d\u95ee\u9898\u3002\u6784\u5efa\u4e86\u5bf9\u5e94\u6570\u636e\u96c6\u4e0e\u57fa\u51c6\uff0c\u5b9e\u9a8c\u8868\u660e\u5373\u4f7f\u5f3a\u95ed\u6e90\u6a21\u578b\u5728\u6b64\u4efb\u52a1\u4e0a\u4e5f\u8868\u73b0\u6b20\u4f73\uff0c\u800c\u76d1\u7763\u57fa\u7ebf\u5728\u5b9a\u4f4d\u548c\u89e3\u91ca\u6307\u6807\u4e0a\u53d6\u5f97\u4e00\u81f4\u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Diffusion language models offer a promising alternative to autoregressive models due to their potential for parallel and iterative generation. However, existing approaches use a single network for both context representation and iterative denoising, forcing one model to serve both roles and limiting its capacity for either role. We propose TwoTower, a block-wise autoregressive diffusion model that decouples these roles into two towers: a frozen AR context tower that causally processes clean tokens, and a trainable diffusion denoiser tower with bidirectional block attention that refines noisy blocks via cross-attention to the context. Built on Nemotron-3-Nano-30B-A3B, an open-weight 30B hybrid Mamba-Transformer MoE model, and trained on approximately 2.1T tokens, Nemotron-TwoTower retains 98.7% of the autoregressive baseline\u0027s quality while offering 2.42X higher wall-clock generation throughput. We release the code and model weights at https://huggingface.co/collections/nvidia/nemotron-twotower.", "arxiv_id": "2606.26493", "arxiv_url": "https://arxiv.org/abs/2606.26493", "authors": ["Fitsum Reda", "John Kamalu", "Roger Waleffe", "Mostofa Patwary", "Mohammad Shoeybi", "Bryan Catanzaro"], "brief": "\u63d0\u51faTwoTower\u67b6\u6784\uff0c\u5c06\u6269\u6563\u8bed\u8a00\u6a21\u578b\u7684\u4e0a\u4e0b\u6587\u8868\u793a\u4e0e\u8fed\u4ee3\u53bb\u566a\u89e3\u8026\u4e3a\u4e24\u4e2a\u72ec\u7acb\u6a21\u5757\uff1a\u51bb\u7ed3\u7684\u81ea\u56de\u5f52\u4e0a\u4e0b\u6587\u5854\u548c\u53ef\u8bad\u7ec3\u7684\u6269\u6563\u53bb\u566a\u5854\u3002\u57fa\u4e8e30B\u6df7\u5408Mamba-Transformer MoE\u6a21\u578b\u8bad\u7ec3\uff0c\u5728\u4fdd\u755998.7%\u81ea\u56de\u5f52\u57fa\u7ebf\u8d28\u91cf\u7684\u540c\u65f6\uff0c\u5b9e\u73b02.42\u500d\u751f\u6210\u541e\u5410\u91cf\u63d0\u5347\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26493", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u8bed\u8a00\u6a21\u578b", "\u81ea\u56de\u5f52\u6a21\u578b", "\u751f\u6210\u6548\u7387"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26493v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Nemotron-TwoTower: Diffusion Language Modeling with Pretrained Autoregressive Context", "tldr": "\u63d0\u51faTwoTower\u67b6\u6784\uff0c\u5c06\u6269\u6563\u8bed\u8a00\u6a21\u578b\u7684\u4e0a\u4e0b\u6587\u8868\u793a\u4e0e\u8fed\u4ee3\u53bb\u566a\u89e3\u8026\u4e3a\u4e24\u4e2a\u72ec\u7acb\u6a21\u5757\uff1a\u51bb\u7ed3\u7684\u81ea\u56de\u5f52\u4e0a\u4e0b\u6587\u5854\u548c\u53ef\u8bad\u7ec3\u7684\u6269\u6563\u53bb\u566a\u5854\u3002\u57fa\u4e8e30B\u6df7\u5408Mamba-Transformer MoE\u6a21\u578b\u8bad\u7ec3\uff0c\u5728\u4fdd\u755998.7%\u81ea\u56de\u5f52\u57fa\u7ebf\u8d28\u91cf\u7684\u540c\u65f6\uff0c\u5b9e\u73b02.42\u500d\u751f\u6210\u541e\u5410\u91cf\u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-language models (VLMs) have achieved strong performance on OCR-based benchmarks and increasingly focused on text-rich understanding, but their robustness under controlled visual degradation remains insufficiently understood. This gap is critical for OCR reasoning, where visual corruption can induce OCR errors and structural distortions, thereby introducing uncertainty into the reasoning task. To systematically study this problem, we introduce OCR-Robust, a benchmark designed for evaluating OCR reasoning robustness under visual perturbations. It contains 812 samples across two complementary subsets: OCR1.0, covering documents, scene text, receipts, handwriting, and mathematical content, and OCR2.0, focusing on charts, geometry diagrams, and tables. To enable efficient yet informative evaluation, we conduct a pilot study over 18 candidate perturbations and select 5 representative types at 3 severity levels each based on their impact and cross-model discriminability. We evaluate robustness using clean accuracy, Relative Corruption Retention (RCR), Worst-Case Retention (WCR), and a composite Corruption Robustness Index (CRI), and benchmark 18 models spanning proprietary systems, open-source VLMs, and OCR+LLM pipelines. Our results show that higher clean accuracy does not necessarily imply stronger robustness, and that models can suffer pronounced degradation in the worst case on OCR tasks that are sensitive to structure, and charts and tables are substantially more fragile than document-like inputs under perturbation.", "arxiv_id": "2606.26041", "arxiv_url": "https://arxiv.org/abs/2606.26041", "authors": ["Yuxing Cheng", "Yuan Wu", "Yi Chang"], "brief": "\u63d0\u51faOCR-Robust\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u56fe\u50cf\u6270\u52a8\u4e0b\u7684OCR\u63a8\u7406\u9c81\u68d2\u6027\u3002\u7814\u7a76\u53d1\u73b0\u9ad8\u6e05\u6670\u5ea6\u51c6\u786e\u7387\u4e0d\u7b49\u4e8e\u5f3a\u9c81\u68d2\u6027\uff0c\u56fe\u8868\u548c\u8868\u683c\u7c7b\u8f93\u5165\u6bd4\u6587\u6863\u7c7b\u8f93\u5165\u66f4\u8106\u5f31\uff0c\u7ed3\u6784\u654f\u611f\u578bOCR\u4efb\u52a1\u5728\u6700\u574f\u60c5\u51b5\u4e0b\u4f1a\u51fa\u73b0\u663e\u8457\u6027\u80fd\u4e0b\u964d\u3002", "categories": ["cs.CV", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26041", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "OCR", "\u9c81\u68d2\u6027\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26041v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "How Robust is OCR-Reasoning? Evaluating OCR-Reasoning Robustness of Vision-Language Models under Visual Perturbations", "tldr": "\u63d0\u51faOCR-Robust\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5728\u56fe\u50cf\u6270\u52a8\u4e0b\u7684OCR\u63a8\u7406\u9c81\u68d2\u6027\u3002\u7814\u7a76\u53d1\u73b0\u9ad8\u6e05\u6670\u5ea6\u51c6\u786e\u7387\u4e0d\u7b49\u4e8e\u5f3a\u9c81\u68d2\u6027\uff0c\u56fe\u8868\u548c\u8868\u683c\u7c7b\u8f93\u5165\u6bd4\u6587\u6863\u7c7b\u8f93\u5165\u66f4\u8106\u5f31\uff0c\u7ed3\u6784\u654f\u611f\u578bOCR\u4efb\u52a1\u5728\u6700\u574f\u60c5\u51b5\u4e0b\u4f1a\u51fa\u73b0\u663e\u8457\u6027\u80fd\u4e0b\u964d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models are increasingly deployed as agents that solve tasks by interacting with external tool environments. Although recent tool-use benchmarks increasingly cover complex task settings, they still largely assume clean, stable, and trustworthy tool environments, leaving tool-environment unreliability insufficiently examined. We introduce ToolBench-X, a benchmark for evaluating agents under recoverable reliability hazards. ToolBench-X contains executable multi-step tasks across diverse domains and sequential, parallel, and mixed workflows, each paired with deterministic tools and a canonical final answer for automatic evaluation. Starting from clean tool environments, ToolBench-X injects five structured hazard types: Specification Drift, Invocation Error, Execution Failure, Output Drift, and Cross-source Conflict. Crucially, each injected instance remains solvable through at least one valid recovery path, such as retrying, fallback, verification, or cross-checking. Experiments reveal a substantial reliability gap: agents that perform well with reliable tools often fail under recoverable hazards. Further analysis shows that failures are driven less by tool-use volume or inference budget than by limited hazard diagnosis and ineffective recovery. Targeted recovery hints recover many failed tasks, while test-time scaling yields more limited gains. These results suggest that tool-use evaluation should move beyond function-call accuracy toward task completion under unreliable tool environments. The code and data is available at https://github.com/Foreverskyou/ToolBench-X.", "arxiv_id": "2606.25819", "arxiv_url": "https://arxiv.org/abs/2606.25819", "authors": ["Yang Tian", "Zhengpeng Shi", "Bo Zhao"], "brief": "\u63d0\u51faToolBench-X\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u5de5\u5177\u73af\u5883\u4e0d\u53ef\u9760\u6761\u4ef6\u4e0b\u7684\u8868\u73b0\uff0c\u6db5\u76d6\u89c4\u8303\u6f02\u79fb\u3001\u8c03\u7528\u9519\u8bef\u3001\u6267\u884c\u5931\u8d25\u7b49\u4e94\u7c7b\u6545\u969c\u6ce8\u5165\u3002\u5b9e\u9a8c\u53d1\u73b0\u73b0\u6709\u667a\u80fd\u4f53\u5728\u53ef\u6062\u590d\u6545\u969c\u4e0b\u8868\u73b0\u5927\u5e45\u4e0b\u964d\uff0c\u6839\u672c\u539f\u56e0\u5728\u4e8e\u6545\u969c\u8bca\u65ad\u80fd\u529b\u4e0d\u8db3\u800c\u975e\u63a8\u7406\u9884\u7b97\u9650\u5236\uff0c\u547c\u5401\u5de5\u5177\u4f7f\u7528\u8bc4\u4f30\u8d85\u8d8a\u51fd\u6570\u8c03\u7528\u51c6\u786e\u7387\u3002", "categories": ["cs.CL", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25819", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25819v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Function Calling: Benchmarking Tool-Using Agents under Tool-Environment Unreliability", "tldr": "\u63d0\u51faToolBench-X\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u667a\u80fd\u4f53\u5728\u5de5\u5177\u73af\u5883\u4e0d\u53ef\u9760\u6761\u4ef6\u4e0b\u7684\u8868\u73b0\uff0c\u6db5\u76d6\u89c4\u8303\u6f02\u79fb\u3001\u8c03\u7528\u9519\u8bef\u3001\u6267\u884c\u5931\u8d25\u7b49\u4e94\u7c7b\u6545\u969c\u6ce8\u5165\u3002\u5b9e\u9a8c\u53d1\u73b0\u73b0\u6709\u667a\u80fd\u4f53\u5728\u53ef\u6062\u590d\u6545\u969c\u4e0b\u8868\u73b0\u5927\u5e45\u4e0b\u964d\uff0c\u6839\u672c\u539f\u56e0\u5728\u4e8e\u6545\u969c\u8bca\u65ad\u80fd\u529b\u4e0d\u8db3\u800c\u975e\u63a8\u7406\u9884\u7b97\u9650\u5236\uff0c\u547c\u5401\u5de5\u5177\u4f7f\u7528\u8bc4\u4f30\u8d85\u8d8a\u51fd\u6570\u8c03\u7528\u51c6\u786e\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement Learning (RL) has enabled LLMs to excel in objective reasoning tasks such as mathematics and code generation. However, applying RL to open-ended tasks, such as creative writing, remains challenging because LLM-as-a-judge reward models often exhibit stylistic biases and positional inconsistencies, leading to unstable supervision. To address this, we propose OPERA (Objective Perplexity-based Reflective Alignment), which replaces unreliable external judges with intrinsic rewards derived from perplexity dynamics. Specifically, we derive an intrinsic reward signal from perplexity dynamics, quantifying uncertainty reduction at critical reflective states. During the cold-start phase, we introduce a data synthesis method that leverages carefully designed guiding words to generate diverse reasoning traces, along with perplexity-prioritized rollouts that utilize internal log-probabilities to identify logically consistent reasoning branches. This pipeline yields a large-scale dataset comprising 20,000 high-quality reasoning trajectories. Empirical evaluations consistently demonstrate the scalability and efficacy of our approach in alignment for open-ended tasks. Implementing OPERA on Qwen3-8B establishes a new state-of-the-art among open-source models, achieving parity with or surpassing proprietary models like Gemini2.5 and MiniMax-M2.5 in some open-ended tasks. The code is available at https://github.com/pangpang-xuan/OPERA.", "arxiv_id": "2606.25757", "arxiv_url": "https://arxiv.org/abs/2606.25757", "authors": ["Wenxuan Jiang", "Zining Fan", "Zijian Zhang", "Xuecheng Wu", "Hongming Tan", "Haoyang Dai", "Xiaoyu Li", "Xuezhi Cao", "Ninghao Liu"], "brief": "\u9488\u5bf9\u5f00\u653e\u5f0f\u4efb\u52a1\uff08\u5982\u521b\u610f\u5199\u4f5c\uff09\u4e2d\u5f3a\u5316\u5b66\u4e60\u5956\u52b1\u4fe1\u53f7\u4e0d\u7a33\u5b9a\u7684\u95ee\u9898\uff0c\u63d0\u51faOPERA\u65b9\u6cd5\uff0c\u7528\u56f0\u60d1\u5ea6\u52a8\u6001\u53d8\u5316\u4f5c\u4e3a\u5185\u5728\u5956\u52b1\u66ff\u4ee3\u4e0d\u53ef\u9760\u7684LLM\u8bc4\u5224\u5668\u3002\u5728Qwen3-8B\u4e0a\u5b9e\u73b0\u5f00\u6e90\u6700\u4f18\uff0c\u90e8\u5206\u4efb\u52a1\u5ab2\u7f8eGemini2.5\u7b49\u95ed\u6e90\u6a21\u578b\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25757", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f00\u653e\u5f0f\u63a8\u7406", "\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25757v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "OPERA: Aligning Open-Ended Reasoning via Objective Perplexity-based Reinforcement Learning", "tldr": "\u9488\u5bf9\u5f00\u653e\u5f0f\u4efb\u52a1\uff08\u5982\u521b\u610f\u5199\u4f5c\uff09\u4e2d\u5f3a\u5316\u5b66\u4e60\u5956\u52b1\u4fe1\u53f7\u4e0d\u7a33\u5b9a\u7684\u95ee\u9898\uff0c\u63d0\u51faOPERA\u65b9\u6cd5\uff0c\u7528\u56f0\u60d1\u5ea6\u52a8\u6001\u53d8\u5316\u4f5c\u4e3a\u5185\u5728\u5956\u52b1\u66ff\u4ee3\u4e0d\u53ef\u9760\u7684LLM\u8bc4\u5224\u5668\u3002\u5728Qwen3-8B\u4e0a\u5b9e\u73b0\u5f00\u6e90\u6700\u4f18\uff0c\u90e8\u5206\u4efb\u52a1\u5ab2\u7f8eGemini2.5\u7b49\u95ed\u6e90\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "LLM-based text embedders have substantially improved retrieval and semantic representation quality, but their deployment remains costly: large backbone models slow down embedding inference, while high-dimensional full-precision embeddings impose substantial storage and bandwidth overhead on large-scale indexes. In this paper, we present BITEMBED, an extreme low-bit framework for LLM-based text embedding that jointly targets encoding efficiency and vector storage. BITEMBED converts pretrained LLM backbones into BitNet-style embedding encoders with ternary weights, quantized activations, and lightweight normalization refinement. The converted model is adapted to representation learning through continual contrastive pre-training, followed by supervised contrastive fine-tuning with both similarity-distribution distillation and attention-relation distillation from a full-precision teacher. Beyond quantizing the backbone, BITEMBED further trains output embeddings to support multiple storage precisions meeting different storage needs in various scenarios. Experiments on MMTEB (eng, v2) with Qwen3-0.6B and Gemma3-270M show that BITEMBED is largely comparable to full precision teacher embedders. Moreover, BITEMBED flexibly obtains text embeddings of various precisions, achieving a trade-off between performance and storage cost.", "arxiv_id": "2606.25674", "arxiv_url": "https://arxiv.org/abs/2606.25674", "authors": ["Zhen Li", "Xin Huang", "Liang Wang", "Nan Yang", "Ting Song", "Yan Xia", "Xun Wu", "Shaohan Huang", "Huishuai Zhang", "Furu Wei", "Dongyan Zhao"], "brief": "\u63d0\u51faBITEMBED\u6846\u67b6\uff0c\u5c06\u57fa\u4e8eLLM\u7684\u6587\u672c\u5d4c\u5165\u6a21\u578b\u8f6c\u6362\u4e3aBitNet\u98ce\u683c\u7684\u4e09\u503c\u6743\u91cd\u7f16\u7801\u5668\uff0c\u901a\u8fc7\u6301\u7eed\u5bf9\u6bd4\u9884\u8bad\u7ec3\u548c\u77e5\u8bc6\u84b8\u998f\u5fae\u8c03\uff0c\u5728\u5927\u5e45\u964d\u4f4e\u5b58\u50a8\u548c\u63a8\u7406\u5f00\u9500\u7684\u540c\u65f6\uff0c\u6027\u80fd\u63a5\u8fd1\u5168\u7cbe\u5ea6\u6559\u5e08\u6a21\u578b\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u6846\u67b6\u652f\u6301\u591a\u79cd\u8f93\u51fa\u5d4c\u5165\u7cbe\u5ea6\uff0c\u7075\u6d3b\u5e73\u8861\u6027\u80fd\u4e0e\u5b58\u50a8\u6210\u672c\u3002", "categories": ["cs.CL", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25674", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u5d4c\u5165", "\u6a21\u578b\u91cf\u5316", "\u77e5\u8bc6\u84b8\u998f", "\u4fe1\u606f\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25674v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "BitNet Text Embeddings", "tldr": "\u63d0\u51faBITEMBED\u6846\u67b6\uff0c\u5c06\u57fa\u4e8eLLM\u7684\u6587\u672c\u5d4c\u5165\u6a21\u578b\u8f6c\u6362\u4e3aBitNet\u98ce\u683c\u7684\u4e09\u503c\u6743\u91cd\u7f16\u7801\u5668\uff0c\u901a\u8fc7\u6301\u7eed\u5bf9\u6bd4\u9884\u8bad\u7ec3\u548c\u77e5\u8bc6\u84b8\u998f\u5fae\u8c03\uff0c\u5728\u5927\u5e45\u964d\u4f4e\u5b58\u50a8\u548c\u63a8\u7406\u5f00\u9500\u7684\u540c\u65f6\uff0c\u6027\u80fd\u63a5\u8fd1\u5168\u7cbe\u5ea6\u6559\u5e08\u6a21\u578b\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u6846\u67b6\u652f\u6301\u591a\u79cd\u8f93\u51fa\u5d4c\u5165\u7cbe\u5ea6\uff0c\u7075\u6d3b\u5e73\u8861\u6027\u80fd\u4e0e\u5b58\u50a8\u6210\u672c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Software performance optimization is a notoriously complex and manual task. Despite the growing use of Large Language Models (LLMs) for code refinement, we still lack benchmarks that capture how optimization actually happens in real-world codebases. Existing frameworks often oversimplify the problem by focusing on isolated functions or a single performance metric, missing the critical trade-offs between execution time and memory footprint, the inherent noise of the measurement environment, and the variability introduced by different input data and execution conditions. We address this by introducing SWE-Pro, a repository-level benchmark derived from 102 expert-written optimizations from open-source projects. Unlike previous benchmarks, SWE-Pro pairs each task with parameterized tests to evaluate runtime, peak memory, and Time-Weighted Memory Usage (TWMU) across varying input data and execution conditions under noise-aware measurement conditions. Our evaluation shows that current LLMs struggle significantly: runtime gains are negligible, and memory optimizations are nearly non-existent. This stands in sharp contrast to expert implementations, which achieve an aggregate speedup of 15.5x and peak memory reduction of 171.3x over benchmark tasks. Expert-written improvements are observed in 91.2% of tasks for runtime and 65.7% for peak memory. Our findings expose a substantial gap between current LLM capabilities and the demands of expert-level engineering.", "arxiv_id": "2606.25530", "arxiv_url": "https://arxiv.org/abs/2606.25530", "authors": ["Ezgi Sar\u0131kayak", "Wenchao Gu", "Hesham Ghonim", "Chunyang Chen"], "brief": "\u63d0\u51faSWE-Pro\u57fa\u51c6\u6d4b\u8bd5\uff0c\u5305\u542b102\
