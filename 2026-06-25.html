erformance, we propose the task decomposition hierarchical analysis framework (TDHAF) to systematically study compositional generalization across three task granularities: low, middle and high levels. Our analysis reveals that mastering low level atomic skills does not guarantee high level planning competence, while high level task training yields stronger OOD generalization. Experiments on real world benchmarks demonstrate PEEU\u0027s superior effectiveness: our 7B model achieves 30.6% accuracy, outperforming the much larger Qwen2.5-VL-32B model. These demonstrate constructing hindsight high level tasks and leveraging experiences is crucial for OOD planning abilities of small MLLMs.", "arxiv_id": "2606.27330", "arxiv_url": "https://arxiv.org/abs/2606.27330", "authors": ["Tianyi Men", "Zhuoran Jin", "Pengfei Cao", "Yubo Chen", "Kang Liu", "Jun Zhao"], "brief": "\u63d0\u51fa\u89c4\u5212\u7ecf\u9a8c\u63a2\u7d22\u4e0e\u5229\u7528\uff08PEEU\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u81ea\u4e3b\u73af\u5883\u63a2\u7d22\u548c\u540e\u89c1\u7ecf\u9a8c\u5408\u6210\u9ad8\u8d28\u91cf\u8bad\u7ec3\u6570\u636e\uff0c\u663e\u8457\u63d0\u5347\u5c0f\u578b\u5f00\u6e90MLLM\u5728GUI\u4efb\u52a1\u89c4\u5212\u4e2d\u7684\u8de8\u7f51\u7ad9\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI", "cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27330", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["PEEU\u65b9\u6cd5\u81ea\u4e3b\u63a2\u7d22\u73af\u5883\u53d1\u73b0\u7ecf\u9a8c\uff0c\u5e76\u5229\u7528\u540e\u89c1\u7ecf\u9a8c\uff08hindsight experience\uff09\u5408\u6210\u4e25\u683c\u5bf9\u9f50\u7684\u9ad8\u5c42\u6b21\u8bad\u7ec3\u6570\u636e", "\u63d0\u51fa\u4efb\u52a1\u5206\u89e3\u5c42\u6b21\u5206\u6790\u6846\u67b6\uff08TDHAF\uff09\uff0c\u63ed\u793a\u4f4e\u5c42\u539f\u5b50\u6280\u80fd\u638c\u63e1\u4e0d\u7b49\u4e8e\u9ad8\u5c42\u89c4\u5212\u80fd\u529b\uff0c\u9ad8\u5c42\u4efb\u52a1\u8bad\u7ec3\u5e26\u6765\u66f4\u5f3aOOD\u6cdb\u5316", "7B\u6a21\u578b\u5728\u771f\u5b9e\u57fa\u51c6\u4e0a\u8fbe\u523030.6%\u51c6\u786e\u7387\uff0c\u8d85\u8d8aQwen2.5-VL-32B\u7b49\u66f4\u5927\u89c4\u6a21\u6a21\u578b"], "keywords": ["\u667a\u80fd\u4f53", "GUI\u81ea\u52a8\u5316", "\u591a\u6a21\u6001", "\u4efb\u52a1\u89c4\u5212"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27330v1", "published_at": "2026-06-25", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Empowering GUI Agents via Autonomous Experience Exploration and Hindsight Experience Utilization for Task Planning", "tldr": "\u63d0\u51faPEEU\u65b9\u6cd5\u8ba9\u5c0f\u578b\u591a\u6a21\u6001\u6a21\u578b\u81ea\u4e3b\u63a2\u7d22GUI\u7ecf\u9a8c\uff0c7B\u6a21\u578b\u89c4\u5212\u80fd\u529b\u8d85\u8d8a32B\u5927\u6a21\u578b", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u89c4\u5212\u7ecf\u9a8c\u63a2\u7d22\u4e0e\u5229\u7528\uff08PEEU\uff09\u65b9\u6cd5\uff0c\u901a\u8fc7\u81ea\u4e3b\u73af\u5883\u63a2\u7d22\u548c\u540e\u89c1\u7ecf\u9a8c\u5408\u6210\u9ad8\u8d28\u91cf\u8bad\u7ec3\u6570\u636e\uff0c\u663e\u8457\u63d0\u5347\u5c0f\u578b\u5f00\u6e90MLLM\u5728GUI\u4efb\u52a1\u89c4\u5212\u4e2d\u7684\u8de8\u7f51\u7ad9\u6cdb\u5316\u80fd\u529b\u3002", "why_notable": "\u4ee5\u6781\u4f4e\u53c2\u6570\u91cf\uff087B\uff09\u8d85\u8d8a32B\u5546\u4e1a\u7ea7\u5927\u6a21\u578b\uff0c\u4e3a\u9690\u79c1\u4fdd\u62a4\u548c\u4f4e\u6210\u672cGUI\u81ea\u52a8\u5316\u63d0\u4f9b\u53ef\u884c\u8def\u5f84\uff0c\u540c\u65f6\u63d0\u51fa\u7684\u5c42\u6b21\u5206\u6790\u6846\u67b6\u5bf9\u7406\u89e3\u89c4\u5212\u6cdb\u5316\u673a\u5236\u5177\u6709\u7406\u8bba\u4ef7\u503c\u3002"}, {"abstract": "Process reward models enable fine-grained, step-level evaluation of LLMs, yet building them for agentic settings remains prohibitively difficult: long-horizon interactions, irreversible actions, and stochastic environment feedback make both human annotation and Monte Carlo estimation infeasible at scale. In this work, we show that reinforcement learning (RL) post-training already provides the ingredients for effective step-level scoring, eliminating the need for dedicated reward model training altogether. Concretely, we derive an implicit advantage under a general stochastic Markov decision process, which we term progress advantage -- log-probability ratio between the RL-trained policy and its reference policy exactly recovers the optimal advantage function. This formulation makes the resulting signal annotation-free, domain-agnostic, and available as a byproduct of the standard RL post-training pipeline. We validate the effectiveness of the progress advantage across three different applications: test-time scaling, uncertainty quantification, and failure attribution on five benchmarks and four model families. Across all settings, it consistently outperforms confidence-based baselines and, despite requiring no task-specific training, surpasses dedicated trained reward models. We complement these results with deeper analyses on characteristics of progress advantage, offering practical guidance for adoption in real-world agentic systems.", "arxiv_id": "2606.26080", "arxiv_url": "https://arxiv.org/abs/2606.26080", "authors": ["Changdae Oh", "Wendi Li", "Seongheon Park", "Samuel Yeh", "Tanwi Mallick", "Sharon Li"], "brief": "\u672c\u6587\u63d0\u51fa\"\u8fdb\u5ea6\u4f18\u52bf\"\uff08Progress Advantage\uff09\u6982\u5ff5\uff0c\u8bc1\u660eRL\u540e\u8bad\u7ec3\u7684\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u4e4b\u95f4\u7684\u5bf9\u6570\u6982\u7387\u6bd4\uff0c\u6070\u597d\u7b49\u4ef7\u4e8e\u6700\u4f18\u4f18\u52bf\u51fd\u6570\uff0c\u53ef\u4f5c\u4e3a\u514d\u6807\u6ce8\u7684\u6b65\u9aa4\u7ea7\u8bc4\u5206\u4fe1\u53f7\u7528\u4e8eLLM\u667a\u80fd\u4f53\u8bc4\u4f30\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26080", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7406\u8bba\u63a8\u5bfc\uff1a\u5728\u968f\u673aMDP\u6846\u67b6\u4e0b\uff0cRL\u8bad\u7ec3\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u7684\u5bf9\u6570\u6982\u7387\u6bd4\u7cbe\u786e\u6062\u590d\u6700\u4f18\u4f18\u52bf\u51fd\u6570\uff0c\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b", "\u4e09\u7c7b\u5e94\u7528\u9a8c\u8bc1\uff1a\u6d4b\u8bd5\u65f6\u6269\u5c55\u3001\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u3001\u5931\u8d25\u5f52\u56e0\uff0c\u57285\u4e2a\u57fa\u51c6\u548c4\u4e2a\u6a21\u578b\u5bb6\u65cf\u4e0a\u5747\u4f18\u4e8e\u57fa\u4e8e\u7f6e\u4fe1\u5ea6\u7684\u57fa\u7ebf", "\u65e0\u9700\u4efb\u52a1\u7279\u5b9a\u8bad\u7ec3\uff0c\u5374\u8d85\u8d8a\u4e13\u95e8\u8bad\u7ec3\u7684\u5956\u52b1\u6a21\u578b\uff0c\u662fRL\u540e\u8bad\u7ec3\u6d41\u7a0b\u7684\"\u514d\u8d39\u5348\u9910\""], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26080v1", "published_at": "2026-06-24", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Neglected Free Lunch from Post-training: Progress Advantage for LLM Agents", "tldr": "RL\u540e\u8bad\u7ec3\u9690\u542b\u514d\u8d39\u6b65\u9aa4\u7ea7\u5956\u52b1\u4fe1\u53f7\uff0c\u65e0\u9700\u989d\u5916\u6807\u6ce8\u5373\u53ef\u8bc4\u4f30LLM\u667a\u80fd\u4f53", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u8fdb\u5ea6\u4f18\u52bf\"\uff08Progress Advantage\uff09\u6982\u5ff5\uff0c\u8bc1\u660eRL\u540e\u8bad\u7ec3\u7684\u7b56\u7565\u4e0e\u53c2\u8003\u7b56\u7565\u4e4b\u95f4\u7684\u5bf9\u6570\u6982\u7387\u6bd4\uff0c\u6070\u597d\u7b49\u4ef7\u4e8e\u6700\u4f18\u4f18\u52bf\u51fd\u6570\uff0c\u53ef\u4f5c\u4e3a\u514d\u6807\u6ce8\u7684\u6b65\u9aa4\u7ea7\u8bc4\u5206\u4fe1\u53f7\u7528\u4e8eLLM\u667a\u80fd\u4f53\u8bc4\u4f30\u3002", "why_notable": "\u89e3\u51b3\u4e86\u667a\u80fd\u4f53\u573a\u666f\u4e0b\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\u96be\u4ee5\u6784\u5efa\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5c06\u5df2\u6709RL\u540e\u8bad\u7ec3\u7684\u526f\u4ea7\u54c1\u8f6c\u5316\u4e3a\u9ad8\u8d28\u91cf\u6b65\u9aa4\u7ea7\u4fe1\u53f7\uff0c\u96f6\u989d\u5916\u6210\u672c\u4e14\u8de8\u57df\u901a\u7528\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72LLM\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Fine-tuning through RL reshapes the internal representations of language models to enable agentic behaviors such as tool use, yet the mechanistic basis of these changes remains poorly understood. While RL substantially improves structured tool-call generation, it is unclear which features emerge, which are preserved, and whether identified features can be leveraged for retraining-free behavioral control. In this work, we show that $\\textit{Dedicated Feature Crosscoders (DFC)}$ isolate a compact set of RL-specific features that mediate tool-calling capability in $\\texttt{Qwen2.5-3B}$. Across a $48$-crosscoder hyperparameter sweep, encode-decode reconstruction improves the RL model\u0027s tool correctness by $+31.1 \\pm {9.7}$ pp and passively transfers tool-calling ability to the frozen base model by $+6.8 \\pm 5.0$ pp which we call a $\\textit{capability spillover}$. Our findings show that DFC partitioning concentrates RL-introduced capability into a minimal, steerable feature set that enables runtime behavioral control of agentic LLMs.", "arxiv_id": "2606.26474", "arxiv_url": "https://arxiv.org/abs/2606.26474", "authors": ["Andrii Shportko", "Shubham Bhokare", "Ahmed Zeyad A Alzahrani", "Bowen Cheng", "Gustavo Mercier", "Jessica Hullman"], "brief": "\u63d0\u51fa\u4e13\u7528\u7279\u5f81\u4ea4\u53c9\u7f16\u7801\u5668\uff08DFC\uff09\uff0c\u80fd\u591f\u4eceRL\u5fae\u8c03\u540e\u7684\u8bed\u8a00\u6a21\u578b\u4e2d\u7cbe\u786e\u5206\u79bb\u51fa\u8d1f\u8d23\u5de5\u5177\u8c03\u7528\u80fd\u529b\u7684\u5c11\u91cf\u7279\u5f81\uff0c\u5e76\u5b9e\u73b0\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u7684\u884c\u4e3a\u63a7\u5236\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26474", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["DFC\u572848\u7ec4\u8d85\u53c2\u6570\u626b\u63cf\u4e2d\uff0c\u7f16\u89e3\u7801\u91cd\u5efa\u4f7fRL\u6a21\u578b\u5de5\u5177\u8c03\u7528\u6b63\u786e\u7387\u5e73\u5747\u63d0\u5347+31.1\u00b19.7\u4e2a\u767e\u5206\u70b9", "\u53d1\u73b0\"\u80fd\u529b\u6ea2\u51fa\"\u73b0\u8c61\uff1a\u5c06RL\u7279\u5f81\u8fc1\u79fb\u5230\u51bb\u7ed3\u57fa\u7840\u6a21\u578b\u540e\uff0c\u5de5\u5177\u8c03\u7528\u80fd\u529b\u63d0\u5347+6.8\u00b15.0\u4e2a\u767e\u5206\u70b9", "RL\u5f15\u5165\u7684\u5de5\u5177\u8c03\u7528\u80fd\u529b\u88ab\u96c6\u4e2d\u538b\u7f29\u5230\u6781\u5c11\u6570\u53ef\u64cd\u63a7\u7279\u5f81\u4e2d\uff0c\u652f\u6301\u8fd0\u884c\u65f6\u884c\u4e3a\u63a7\u5236"], "keywords": ["\u53ef\u89e3\u91ca\u6027", "\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26474v1", "published_at": "2026-06-25", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Localizing RL-Induced Tool Use to a Single Crosscoder Feature", "tldr": "\u7528\u4e13\u7528\u7279\u5f81\u4ea4\u53c9\u7f16\u7801\u5668\u5c06RL\u5fae\u8c03\u5f15\u5165\u7684\u5de5\u5177\u8c03\u7528\u80fd\u529b\u5b9a\u4f4d\u5230\u6781\u5c11\u6570\u53ef\u63a7\u7279\u5f81\u4e0a", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e13\u7528\u7279\u5f81\u4ea4\u53c9\u7f16\u7801\u5668\uff08DFC\uff09\uff0c\u80fd\u591f\u4eceRL\u5fae\u8c03\u540e\u7684\u8bed\u8a00\u6a21\u578b\u4e2d\u7cbe\u786e\u5206\u79bb\u51fa\u8d1f\u8d23\u5de5\u5177\u8c03\u7528\u80fd\u529b\u7684\u5c11\u91cf\u7279\u5f81\uff0c\u5e76\u5b9e\u73b0\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u7684\u884c\u4e3a\u63a7\u5236\u3002", "why_notable": "\u9996\u6b21\u5c06RL\u5fae\u8c03\u5bf9LLM\u5185\u90e8\u8868\u5f81\u7684\u5f71\u54cd\u7cbe\u786e\u5b9a\u4f4d\u5230\u5355\u4e00/\u5c11\u91cf\u53ef\u89e3\u91ca\u7279\u5f81\uff0c\u4e3a\u514d\u8bad\u7ec3\u7684\u667a\u80fd\u4f53\u884c\u4e3a\u63a7\u5236\u63d0\u4f9b\u4e86\u673a\u5236\u6027\u7406\u89e3\u4e0e\u5b9e\u7528\u5de5\u5177\u3002"}, {"abstract": "Tool use enables large language models (LLMs) to perform complex tasks, and recent agentic reinforcement learning (RL) methods show promise for enhancing model capabilities. However, RL alone often leads to instability or limited gains in tool-use tasks. In our experiments, some models exhibit catastrophic collapse, where performance abruptly drops and tool-invocation structures fail. The analysis reveals that these failures stem from unexpected probability spikes in specific control tokens, disrupting structured execution, yet the underlying tool-use capability remains intact, merely obscured by specific formats. To address this, we systematically investigate a diverse set of supervisory signals, including off-policy supervision, hint-based guidance, erroneous example supervision, and others, applied under both synchronous and interleaved training schemes. We find that interleaving supervised fine-tuning (SFT) with RL substantially improves stability, but exhibits degraded performance under format and content out-of-distribution (OOD) evaluation. We also analyze the impact of learning rates and generalization across settings. These results highlight the importance of understanding RL failures and demonstrate how diverse supervisory signals can guide exploratory learning, enabling robust training of LLMs for complex, multi-step tool-use tasks. Our Code is available at https://github.com/hypasd-art/Tool-RL-Box.", "arxiv_id": "2606.26027", "arxiv_url": "https://arxiv.org/abs/2606.26027", "authors": ["Yupu Hao", "Zhuoran Jin", "Huanxuan Liao", "Kang Liu", "Jun Zhao"], "brief": "\u672c\u6587\u5206\u6790\u4e86LLM\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u51fa\u73b0\u707e\u96be\u6027\u5d29\u6e83\u7684\u6839\u672c\u539f\u56e0\uff08\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u98d9\u5347\uff09\uff0c\u5e76\u7cfb\u7edf\u7814\u7a76\u4e86\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff08\u79bb\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\uff09\u5728\u540c\u6b65\u4e0e\u4ea4\u9519\u8bad\u7ec3\u65b9\u6848\u4e0b\u7684\u4fee\u590d\u6548\u679c\u3002", "categories": ["cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26027", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5d29\u6e83\u6839\u6e90\uff1a\u7279\u5b9a\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u5c16\u5cf0\u7834\u574f\u7ed3\u6784\u5316\u6267\u884c\uff0c\u4f46\u5e95\u5c42\u5de5\u5177\u8c03\u7528\u80fd\u529b\u4ecd\u5b8c\u597d\uff0c\u4ec5\u88ab\u683c\u5f0f\u95ee\u9898\u63a9\u76d6", "\u4ea4\u9519SFT\u4e0eRL\u8bad\u7ec3\u53ef\u663e\u8457\u63d0\u5347\u7a33\u5b9a\u6027\uff0c\u4f46\u5728\u683c\u5f0f\u4e0e\u5185\u5bb9\u5206\u5e03\u5916\uff08OOD\uff09\u8bc4\u4f30\u4e2d\u6027\u80fd\u4e0b\u964d", "\u7cfb\u7edf\u5bf9\u6bd4\u4e86\u79bb\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff0c\u5e76\u5206\u6790\u4e86\u5b66\u4e60\u7387\u5f71\u54cd\u4e0e\u8de8\u573a\u666f\u6cdb\u5316\u80fd\u529b"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u5de5\u5177\u8c03\u7528", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26027v1", "published_at": "2026-06-24", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Why Multi-Step Tool-Use Reinforcement Learning Collapses and How Supervisory Signals Fix It", "tldr": "\u63ed\u793a\u591a\u6b65\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u5d29\u6e83\u539f\u56e0\uff0c\u5e76\u63d0\u51fa\u76d1\u7763\u4fe1\u53f7\u4fee\u590d\u65b9\u6848", "upvotes": 0, "what_it_is": "\u672c\u6587\u5206\u6790\u4e86LLM\u5de5\u5177\u8c03\u7528\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u4e2d\u51fa\u73b0\u707e\u96be\u6027\u5d29\u6e83\u7684\u6839\u672c\u539f\u56e0\uff08\u63a7\u5236token\u6982\u7387\u5f02\u5e38\u98d9\u5347\uff09\uff0c\u5e76\u7cfb\u7edf\u7814\u7a76\u4e86\u591a\u79cd\u76d1\u7763\u4fe1\u53f7\uff08\u79bb\u7b56\u7565\u76d1\u7763\u3001\u63d0\u793a\u5f15\u5bfc\u3001\u9519\u8bef\u6837\u672c\u76d1\u7763\u7b49\uff09\u5728\u540c\u6b65\u4e0e\u4ea4\u9519\u8bad\u7ec3\u65b9\u6848\u4e0b\u7684\u4fee\u590d\u6548\u679c\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u63ed\u793a\u5de5\u5177\u8c03\u7528RL\u8bad\u7ec3\u5d29\u6e83\u7684\u673a\u5236\uff0c\u5e76\u63d0\u4f9b\u53ef\u590d\u73b0\u7684\u4fee\u590d\u65b9\u6848\u4e0e\u5f00\u6e90\u4ee3\u7801\u5e93\uff0c\u5bf9\u6784\u5efa\u7a33\u5065\u7684LLM\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u6307\u5bfc\u4ef7\u503c"}, {"abstract": "Existing benchmarks typically report accuracy for a single model on a single run. This systematically understates real-world LLM capabilities, particularly under heterogeneous data distributions: (i) different models get different questions correct according to their specializations, and (ii) given a budget, multiple generations can be sampled and selectively retained. To quantify this gap, we introduce the Capability Frontier: a Pareto frontier over a set of models that characterizes the best achievable performance at each cost level under optimal selection across models and generations (i.e., via an oracle). Our construction corrects for two opposing biases: underestimation from single-model evaluation and overestimation from taking maxima over noisy samples. We study 21 LLMs across 16 widely used benchmarks spanning coding, reasoning, medicine, factuality, instruction following, and agentic tasks, comparing Capability Frontier performance at matched cost to each benchmark\u0027s top-performing model. Correcting for single-model evaluation yields a 54% error rate reduction; additionally correcting for single runs yields an 82% improvement, with SOTA accuracy matched at 85% cost reduction. Complementing these empirical results, we use controlled probabilistic simulations to show that higher query topic entropy produces a near-monotonic increase in the performance gap between oracle routing and the best single model. Our findings suggest collective LLM capabilities are substantially underestimated, with implications for evaluation and deployment in data-heterogeneous, multi-domain settings.", "arxiv_id": "2606.26836", "arxiv_url": "https://arxiv.org/abs/2606.26836", "authors": ["Bradley Fowler", "Ryan Smith", "Daniel Thi Graviet", "William Myers", "Joshua Greaves", "Narmeen Fatimah Oozeer", "Ant\u00eda Garc\u00eda", "Philip Quirke", "Amirali Abdullah", "Fazl Barez", "Shriyash Kaustubh Upadhyay"], "brief": "\u63d0\u51fa\"\u80fd\u529b\u524d\u6cbf\"\uff08Capability Frontier\uff09\u6982\u5ff5\uff0c\u901a\u8fc7\u6784\u5efa\u591a\u6a21\u578bPareto\u6700\u4f18\u8fb9\u754c\uff0c\u5728\u7ed9\u5b9a\u6210\u672c\u4e0b\u91cf\u5316\u6a21\u578b\u96c6\u5408\u7684\u6700\u4f73\u53ef\u8fbe\u6027\u80fd\uff0c\u63ed\u793a\u5355\u6a21\u578b\u5355\u6b21\u8bc4\u4f30\u4e25\u91cd\u4f4e\u4f30LLM\u771f\u5b9e\u80fd\u529b\u7684\u95ee\u9898\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26836", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4ec5\u7ea0\u6b63\u5355\u6a21\u578b\u8bc4\u4f30\u504f\u5dee\u53ef\u964d\u4f4e54%\u9519\u8bef\u7387\uff0c\u8fdb\u4e00\u6b65\u7ea0\u6b63\u5355\u6b21\u8fd0\u884c\u504f\u5dee\u53ef\u5b9e\u73b082%\u6027\u80fd\u63d0\u5347", "\u5728\u6210\u672c\u964d\u4f4e85%\u7684\u60c5\u51b5\u4e0b\uff0c\u80fd\u529b\u524d\u6cbf\u53ef\u5339\u914d\u5f53\u524dSOTA\u51c6\u786e\u7387", "\u7814\u7a76\u8986\u76d621\u4e2aLLM\u300116\u4e2a\u4e3b\u6d41\u57fa\u51c6\uff08\u542b\u7f16\u7a0b\u3001\u63a8\u7406\u3001\u533b\u7597\u3001\u4e8b\u5b9e\u6027\u7b49\uff09\uff0c\u5e76\u7528\u6982\u7387\u6a21\u62df\u9a8c\u8bc1\uff1a\u67e5\u8be2\u4e3b\u9898\u71b5\u8d8a\u9ad8\uff0coracle\u8def\u7531\u4e0e\u6700\u4f18\u5355\u6a21\u578b\u7684\u6027\u80fd\u5dee\u8ddd\u8d8a\u5927"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8bc4\u4f30\u57fa\u51c6", "\u6a21\u578b\u8def\u7531", "\u591a\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26836v1", "published_at": "2026-06-25", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "The Capability Frontier: Benchmarks Miss 82% of Model Performance", "tldr": "\u73b0\u6709\u57fa\u51c6\u6d4b\u8bd5\u4f4e\u4f30\u4e86LLM\u771f\u5b9e\u80fd\u529b82%\uff0c\u63d0\u51fa\u80fd\u529b\u524d\u6cbf\u6846\u67b6\u91cf\u5316\u6700\u4f18\u6a21\u578b\u7ec4\u5408\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51fa\"\u80fd\u529b\u524d\u6cbf\"\uff08Capability Frontier\uff09\u6982\u5ff5\uff0c\u901a\u8fc7\u6784\u5efa\u591a\u6a21\u578bPareto\u6700\u4f18\u8fb9\u754c\uff0c\u5728\u7ed9\u5b9a\u6210\u672c\u4e0b\u91cf\u5316\u6a21\u578b\u96c6\u5408\u7684\u6700\u4f73\u53ef\u8fbe\u6027\u80fd\uff0c\u63ed\u793a\u5355\u6a21\u578b\u5355\u6b21\u8bc4\u4f30\u4e25\u91cd\u4f4e\u4f30LLM\u771f\u5b9e\u80fd\u529b\u7684\u95ee\u9898\u3002", "why_notable": "\u6311\u6218\u4e86AI\u8bc4\u4f30\u9886\u57df\u7684\u6838\u5fc3\u5047\u8bbe\uff0c\u8868\u660e\u96c6\u4f53LLM\u80fd\u529b\u88ab\u7cfb\u7edf\u6027\u4f4e\u4f30\uff0c\u5bf9\u591a\u6a21\u578b\u90e8\u7f72\u7b56\u7565\u3001\u57fa\u51c6\u8bbe\u8ba1\u53ca\u6210\u672c\u4f18\u5316\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u610f\u4e49"}, {"abstract": "Multimodal agentic retrieval-augmented generation (RAG) systems expand the attack surface beyond prompt injection to include text poisoning, image injection, direct-query attacks, and orchestrator-level tool manipulation. Existing red-teaming approaches are typically surface-specific and often recycle known attack templates; on text-poisoning benchmarks we measure 73-84% exact duplication. We present MIRROR, a unified cross-surface framework that performs memory-guided Monte Carlo tree search while conditioning candidate generation on retrieved context under an explicit novelty constraint. A deterministic Novelty Gate rejects any candidate matching the retrieval set under normalized comparison, allowing retrieval to inform search priors without enabling prompt copying. Across four attack surfaces on a multimodal agentic RAG target, MIRROR attains 76% ASR on image poisoning compared with 52% for baselines, 97% ASR on orchestrator attacks at half the query cost, and the lowest cross-surface variance (coefficient of variation 0.47). In contrast, specialized baselines collapse across surfaces: suffix optimization reaches 79% ASR on text poisoning but 1% on direct queries. We release ART-SafeBench with 41,815 in-package records and runtime adapters yielding 41,991+ total records across four surfaces.", "arxiv_id": "2606.26793", "arxiv_url": "https://arxiv.org/abs/2606.26793", "authors": ["Inderjeet Singh", "Andr\u00e9s Murillo", "Motoyoshi Sekiya", "Yuki Unno", "Junichi Suga"], "brief": "\u63d0\u51faMIRROR\u6846\u67b6\uff0c\u901a\u8fc7\u8bb0\u5fc6\u5f15\u5bfc\u7684\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22\uff08MCTS\uff09\u7ed3\u5408\u65b0\u9896\u6027\u7ea6\u675f\uff0c\u5bf9\u591a\u6a21\u6001\u667a\u80fd\u4f53RAG\u7cfb\u7edf\u7684\u56db\u7c7b\u653b\u51fb\u9762\uff08\u6587\u672c\u6295\u6bd2\u3001\u56fe\u50cf\u6ce8\u5165\u3001\u76f4\u63a5\u67e5\u8be2\u3001\u7f16\u6392\u5668\u64cd\u63a7\uff09\u8fdb\u884c\u7edf\u4e00\u7ea2\u961f\u6d4b\u8bd5\uff0c\u5e76\u53d1\u5e03ART-SafeBench\u57fa\u51c6\u6570\u636e\u96c6\u3002", "categories": ["cs.CR", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26793", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5f15\u5165\u786e\u5b9a\u6027\u65b0\u9896\u6027\u95e8\u63a7\uff08Novelty Gate\uff09\uff0c\u62d2\u7edd\u4e0e\u68c0\u7d22\u96c6\u91cd\u590d\u7684\u653b\u51fb\u5019\u9009\uff0c\u89e3\u51b3\u73b0\u6709\u65b9\u6cd573-84%\u653b\u51fb\u6a21\u677f\u91cd\u590d\u95ee\u9898", "\u56fe\u50cf\u6295\u6bd2\u653b\u51fb\u6210\u529f\u738776%\uff08\u57fa\u7ebf52%\uff09\uff0c\u7f16\u6392\u5668\u653b\u51fb\u6210\u529f\u738797%\u4e14\u67e5\u8be2\u6210\u672c\u51cf\u534a\uff0c\u8de8\u653b\u51fb\u9762\u65b9\u5dee\u6700\u4f4e\uff08CV=0.47\uff09", "\u53d1\u5e03ART-SafeBench\u57fa\u51c6\uff0c\u542b41,815\u6761\u8bb0\u5f55\u53ca\u8fd0\u884c\u65f6\u9002\u914d\u5668\uff0c\u8986\u76d6\u56db\u7c7b\u653b\u51fb\u9762\u517141,991+\u6761\u8bb0\u5f55"], "keywords": ["\u667a\u80fd\u4f53", "RAG", "\u7ea2\u961f\u6d4b\u8bd5", "\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26793v1", "published_at": "2026-06-25", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MIRROR: Novelty-Constrained Memory-Guided MCTS Red-Teaming for Agentic RAG", "tldr": "MIRROR\uff1a\u57fa\u4e8e\u8bb0\u5fc6\u5f15\u5bfcMCTS\u7684\u7edf\u4e00\u8de8\u653b\u51fb\u9762\u7ea2\u961f\u6d4b\u8bd5\u6846\u67b6\uff0c\u4e13\u653b\u591a\u6a21\u6001\u667a\u80fd\u4f53RAG\u7cfb\u7edf", "upvotes": 0, "what_it_is": "\u63d0\u51faMIRROR\u6846\u67b6\uff0c\u901a\u8fc7\u8bb0\u5fc6\u5f15\u5bfc\u7684\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22\uff08MCTS\uff09\u7ed3\u5408\u65b0\u9896\u6027\u7ea6\u675f\uff0c\u5bf9\u591a\u6a21\u6001\u667a\u80fd\u4f53RAG\u7cfb\u7edf\u7684\u56db\u7c7b\u653b\u51fb\u9762\uff08\u6587\u672c\u6295\u6bd2\u3001\u56fe\u50cf\u6ce8\u5165\u3001\u76f4\u63a5\u67e5\u8be2\u3001\u7f16\u6392\u5668\u64cd\u63a7\uff09\u8fdb\u884c\u7edf\u4e00\u7ea2\u961f\u6d4b\u8bd5\uff0c\u5e76\u53d1\u5e03ART-SafeBench\u57fa\u51c6\u6570\u636e\u96c6\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9\u591a\u6a21\u6001\u667a\u80fd\u4f53RAG\u7cfb\u7edf\u7684\u8de8\u653b\u51fb\u9762\u7edf\u4e00\u7ea2\u961f\u6846\u67b6\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u4e13\u9879\u65b9\u6cd5\u6cdb\u5316\u6027\u5dee\uff08\u5982\u540e\u7f00\u4f18\u5316\u5728\u6587\u672c\u6295\u6bd279% ASR\u4f46\u76f4\u63a5\u67e5\u8be2\u4ec51%\uff09\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u5e76\u63d0\u4f9b\u5927\u89c4\u6a21\u516c\u5f00\u57fa\u51c6\uff0c\u5bf9RAG\u5b89\u5168\u7814\u7a76\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Recent work (2024 to 2026) has converged on a strategy for defending tool-using LLM agents against indirect prompt injection: rather than training the model to refuse malicious instructions, enforce security outside the model with a deterministic policy that mediates the agent\u0027s actions. Systems such as CaMeL, FIDES, Progent, RTBAS, and FORGE realize this with capabilities, information-flow labels, and reference monitors, and several report near-elimination of attacks on the AgentDojo benchmark. We make two contributions. First, we organize these out-of-band defenses as instances of classical integrity protection (Biba), reference monitoring, and least privilege, yielding a structured comparison of what they do and do not cover. Second, we warn that every one of them is validated only on static benchmarks (a fixed set of injection attempts), the same methodology that made in-band defenses look strong until adaptive, defense-aware attacks broke twelve of them at over 90% success; we specify the threat model and protocol an adaptive evaluation requires. We then run that protocol as an independent reproduction and extension of Progent\u0027s own adaptive-attack analysis, on AgentDojo, with an open-weight agent (Qwen2.5-7B) self-hosted on a single H200, a setting its authors did not test. Averaged over three runs, the defense held: Progent cut mean attack success roughly sixfold (25.8% to 4.2%), and a hand-crafted adaptive attack did not raise it (2.6%). This is one small-scale data point on a weak model with a single black-box attack template; a stronger optimized (white-box GCG) attack remains open. The result is consistent with, but does not establish, the hypothesis that deterministic out-of-band enforcement is a harder target for an adaptive attacker than in-band detection.", "arxiv_id": "2606.26479", "arxiv_url": "https://arxiv.org/abs/2606.26479", "authors": ["Praneeth Narisetty", "Shiva Nagendra Babu Kore", "Uday Kumar Reddy Kattamanchi", "Jayaram Kumarapu"], "brief": "\u672c\u6587\u7cfb\u7edf\u68b3\u7406\u4e86CaMeL\u3001FIDES\u3001Progent\u7b49\u57fa\u4e8e\u7ecf\u5178\u5b8c\u6574\u6027\u4fdd\u62a4\uff08Biba\u6a21\u578b\uff09\u7684\u5e26\u5916\u9632\u5fa1\u65b9\u6848\uff0c\u5e76\u8b66\u544a\u8fd9\u4e9b\u65b9\u6848\u4ec5\u5728\u9759\u6001\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u5b58\u5728\u88ab\u81ea\u9002\u5e94\u653b\u51fb\u7a81\u7834\u7684\u98ce\u9669\uff1b\u540c\u65f6\u5bf9Progent\u8fdb\u884c\u4e86\u72ec\u7acb\u590d\u73b0\u4e0e\u6269\u5c55\u8bc4\u4f30\u3002", "categories": ["cs.CR", "cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26479", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u73b0\u6709\u5e26\u5916\u9632\u5fa1\u7edf\u4e00\u5f52\u7eb3\u4e3aBiba\u5b8c\u6574\u6027\u4fdd\u62a4\u3001\u5f15\u7528\u76d1\u63a7\u548c\u6700\u5c0f\u6743\u9650\u4e09\u7c7b\u7ecf\u5178\u5b89\u5168\u673a\u5236\uff0c\u5f62\u6210\u7ed3\u6784\u5316\u5bf9\u6bd4", "\u6307\u51fa\u9759\u6001\u57fa\u51c6\u9a8c\u8bc1\u7684\u5c40\u9650\u6027\uff1a\u5386\u53f2\u4e0a12\u4e2a\u5e26\u5185\u9632\u5fa1\u5728\u81ea\u9002\u5e94\u653b\u51fb\u4e0b\u6210\u529f\u7387\u8d8590%\u88ab\u7a81\u7834", "\u5728Qwen2.5-7B\u4e0a\u590d\u73b0Progent\uff1a\u653b\u51fb\u6210\u529f\u7387\u4ece25.8%\u964d\u81f34.2%\uff0c\u624b\u5de5\u81ea\u9002\u5e94\u653b\u51fb\u672a\u80fd\u63d0\u5347\uff082.6%\uff09\uff0c\u4f46\u767d\u76d2GCG\u653b\u51fb\u4ecd\u5f85\u9a8c\u8bc1"], "keywords": ["\u667a\u80fd\u4f53", "\u63d0\u793a\u6ce8\u5165", "LLM\u5b89\u5168", "\u5bf9\u6297\u653b\u51fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26479v1", "published_at": "2026-06-25", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Adaptive Evaluation of Out-of-Band Defenses Against Prompt Injection in LLM Agents", "tldr": "\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5e26\u5916\u9632\u5fa1\u673a\u5236\u5bf9\u6297\u81ea\u9002\u5e94\u63d0\u793a\u6ce8\u5165\u653b\u51fb\u7684\u6709\u6548\u6027", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u68b3\u7406\u4e86CaMeL\u3001FIDES\u3001Progent\u7b49\u57fa\u4e8e\u7ecf\u5178\u5b8c\u6574\u6027\u4fdd\u62a4\uff08Biba\u6a21\u578b\uff09\u7684\u5e26\u5916\u9632\u5fa1\u65b9\u6848\uff0c\u5e76\u8b66\u544a\u8fd9\u4e9b\u65b9\u6848\u4ec5\u5728\u9759\u6001\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u5b58\u5728\u88ab\u81ea\u9002\u5e94\u653b\u51fb\u7a81\u7834\u7684\u98ce\u9669\uff1b\u540c\u65f6\u5bf9Progent\u8fdb\u884c\u4e86\u72ec\u7acb\u590d\u73b0\u4e0e\u6269\u5c55\u8bc4\u4f30\u3002", "why_notable": "\u9996\u6b21\u5bf9\u5e26\u5916\u9632\u5fa1\u65b9\u6848\u63d0\u51fa\u7cfb\u7edf\u6027\u81ea\u9002\u5e94\u8bc4\u4f30\u6846\u67b6\uff0c\u586b\u8865\u4e86\u8be5\u9886\u57df\u8bc4\u4f30\u65b9\u6cd5\u8bba\u7684\u7a7a\u767d\uff0c\u5bf9\u672a\u6765\u5b89\u5168\u57fa\u51c6\u8bbe\u8ba1\u548c\u9632\u5fa1\u9a8c\u8bc1\u6807\u51c6\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49"}, {"abstract": "Practitioners of prompt-composed agentic systems report a recurring failure mode: editing one prompt module silently shifts the behavior of others despite no shared variable or executable dependency. We formalize this as compositional behavioral leakage (CBL): interference between modules sharing a context window. CBL is enabled by architectural non-isolation: transformer self-attention provides no formal boundary between concatenated modules. We probe CBL on a deployed job-evaluation agent (Claude Sonnet 4.6, 144 trials) through a reusable three-channel protocol that perturbs non-focal modules along volume, content, and form. Only the content channel produces a detectable paired effect (Cohen\u0027s d = 0.63, bootstrap 95% CI excluding zero); no recommendation flipped -- a sub-threshold regime invisible to standard QA but compounding across the thousands of decisions a deployed agent makes. CBL is orthogonal to known agent-failure axes (adversarial injection, cognitive degradation, multi-agent fault propagation, privacy leakage). We contribute an operational definition, a reusable protocol, a falsifiable prediction set, and a system-class characterization, establishing cross-module interference measurement as a requirement for prompt-composed agent evaluation.", "arxiv_id": "2606.26356", "arxiv_url": "https://arxiv.org/abs/2606.26356", "authors": ["Ching-Yu Lin", "Yifan Liu"], "brief": "\u672c\u6587\u6b63\u5f0f\u5b9a\u4e49\u4e86\"\u7ec4\u5408\u884c\u4e3a\u6cc4\u6f0f\"\uff08CBL\uff09\u73b0\u8c61\uff1a\u5728\u63d0\u793a\u8bcd\u62fc\u63a5\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\uff0c\u5171\u4eab\u4e0a\u4e0b\u6587\u7a97\u53e3\u7684\u4e0d\u540c\u63d0\u793a\u6a21\u5757\u4e4b\u95f4\u5b58\u5728\u8de8\u6a21\u5757\u5e72\u6270\uff0c\u5373\u4fee\u6539\u67d0\u4e00\u6a21\u5757\u4f1a\u5728\u65e0\u663e\u5f0f\u4f9d\u8d56\u7684\u60c5\u51b5\u4e0b\u6539\u53d8\u5176\u4ed6\u6a21\u5757\u7684\u884c\u4e3a\u3002", "categories": ["cs.AI", "cs.IR", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26356", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6839\u672c\u539f\u56e0\u662fTransformer\u81ea\u6ce8\u610f\u529b\u673a\u5236\u5bf9\u62fc\u63a5\u6a21\u5757\u95f4\u65e0\u5f62\u5f0f\u5316\u9694\u79bb\u8fb9\u754c\uff0c\u5bfc\u81f4\u67b6\u6784\u5c42\u9762\u7684\u975e\u9694\u79bb\u6027", "\u5728Claude Sonnet 4.6\u90e8\u7f72\u7684\u62db\u8058\u8bc4\u4f30\u667a\u80fd\u4f53\u4e0a\u8fdb\u884c144\u6b21\u5b9e\u9a8c\uff0c\u4ec5\u5185\u5bb9\u901a\u9053\u4ea7\u751f\u53ef\u68c0\u6d4b\u6548\u5e94\uff08Cohen\u0027s d=0.63\uff09\uff0c\u4f46\u672a\u89e6\u53d1\u63a8\u8350\u7ffb\u8f6c\uff0c\u5c5e\u4e8e\u6807\u51c6QA\u4e0d\u53ef\u89c1\u7684\u4e9a\u9608\u503c\u5e72\u6270", "CBL\u4e0e\u5df2\u77e5\u5931\u6548\u6a21\u5f0f\uff08\u5bf9\u6297\u6ce8\u5165\u3001\u8ba4\u77e5\u9000\u5316\u3001\u591a\u667a\u80fd\u4f53\u6545\u969c\u4f20\u64ad\u3001\u9690\u79c1\u6cc4\u6f0f\uff09\u6b63\u4ea4\uff0c\u662f\u72ec\u7acb\u7684\u65b0\u578b\u5931\u6548\u8f74\uff0c\u5e76\u63d0\u51fa\u53ef\u590d\u7528\u7684\u4e09\u901a\u9053\u6d4b\u91cf\u534f\u8bae"], "keywords": ["\u667a\u80fd\u4f53", "\u63d0\u793a\u8bcd\u5de5\u7a0b", "LLM\u53ef\u9760\u6027", "\u591a\u6a21\u5757\u7cfb\u7edf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26356v1", "published_at": "2026-06-24", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Instruction Bleed: Cross-Module Interference in Prompt-Composed Agentic Systems", "tldr": "\u63d0\u793a\u8bcd\u6a21\u5757\u95f4\u5b58\u5728\u9690\u6027\u884c\u4e3a\u5e72\u6270\uff0c\u4fee\u6539\u4e00\u4e2a\u6a21\u5757\u4f1a\u6084\u7136\u5f71\u54cd\u5176\u4ed6\u6a21\u5757\u8f93\u51fa", "upvotes": 0, "what_it_is": "\u672c\u6587\u6b63\u5f0f\u5b9a\u4e49\u4e86\"\u7ec4\u5408\u884c\u4e3a\u6cc4\u6f0f\"\uff08CBL\uff09\u73b0\u8c61\uff1a\u5728\u63d0\u793a\u8bcd\u62fc\u63a5\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\uff0c\u5171\u4eab\u4e0a\u4e0b\u6587\u7a97\u53e3\u7684\u4e0d\u540c\u63d0\u793a\u6a21\u5757\u4e4b\u95f4\u5b58\u5728\u8de8\u6a21\u5757\u5e72\u6270\uff0c\u5373\u4fee\u6539\u67d0\u4e00\u6a21\u5757\u4f1a\u5728\u65e0\u663e\u5f0f\u4f9d\u8d56\u7684\u60c5\u51b5\u4e0b\u6539\u53d8\u5176\u4ed6\u6a21\u5757\u7684\u884c\u4e3a\u3002", "why_notable": "\u63ed\u793a\u4e86\u63d0\u793a\u8bcd\u5de5\u7a0b\u4e2d\u4e00\u4e2a\u88ab\u5ffd\u89c6\u4f46\u666e\u904d\u5b58\u5728\u7684\u7cfb\u7edf\u6027\u98ce\u9669\uff1a\u5355\u6b21\u51b3\u7b56\u5f71\u54cd\u5fae\u5c0f\u4f46\u5728\u5927\u89c4\u6a21\u90e8\u7f72\u4e2d\u7d2f\u79ef\u6548\u5e94\u663e\u8457\uff0c\u4e3a\u667a\u80fd\u4f53\u8bc4\u4f30\u4f53\u7cfb\u8865\u5145\u4e86\u8de8\u6a21\u5757\u5e72\u6270\u8fd9\u4e00\u5fc5\u8981\u7ef4\u5ea6\u3002"}, {"abstract": "Computer-use agents turn vision-language model (VLM) predictions into executable GUI clicks, so reliable uncertainty estimates are essential for rejection, calibration, miss-severity ranking, and spatial safety regions. Yet evidence on post-hoc uncertainty quantification (UQ) for these agents is fragmented across isolated model and dataset pairs, leaving it unclear whether UQ rankings stay stable when the agent, benchmark, or observable interface changes. We present Argus, a cross-regime benchmark for post-hoc UQ in single-step executable GUI grounding: a 27-method open-weight matrix over 4 VLM agents and 4 datasets, plus an 8-method closed-source matrix across 3 frontier vendors where logits, hidden states, and attention maps are unavailable. Evaluated methods span logit-based scores, sampling and consistency measures, hidden-state and density estimators (Mahalanobis, SAPLMA), attention-based scores, P(True) and verbalised-confidence prompting, and split-conformal prediction. The main finding is selective transfer: UQ rankings are stable across datasets for a fixed model, but degrade across model classes and observable interfaces. Hidden-state and density methods are the most stable open-weight family, while CoCoA-1MCA, Focus, sampling-based scores, and verbalised self-assessment win in specific regimes. Within-model ranking transfer is strong (Spearman rho up to 0.969), but cross-tier transfer to closed-source vendors averages only +0.08, so closed-source UQ should be reranked on the target rather than extrapolated. Conformal click regions show score-level discrimination is not enough for deployment: locally weighted disks shrink radii by 40-60% when the plug-in UQ is calibrated, but coverage degrades under calibration-test or interface mismatch. We release per-item records, calibration/test splits, UQ scores, and analysis scripts for regime-aware UQ selection in GUI agents.", "arxiv_id": "2606.25760", "arxiv_url": "https://arxiv.org/abs/2606.25760", "authors": ["Divake Kumar", "Sina Tayebati", "Devashri Naik", "Amanda Sofie Rios", "Nilesh Ahuja", "Omesh Tickoo", "Ranganath Krishnan", "Amit Ranjan Trivedi"], "brief": "\u63d0\u51faArgus\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u4e2d\u540e\u9a8c\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\uff08UQ\uff09\u65b9\u6cd5\u7684\u8de8\u573a\u666f\u7a33\u5b9a\u6027\uff0c\u8986\u76d627\u79cd\u5f00\u6e90\u65b9\u6cd5\u00d74\u4e2aVLM\u00d74\u4e2a\u6570\u636e\u96c6\uff0c\u4ee5\u53ca8\u79cd\u95ed\u6e90\u65b9\u6cd5\u00d73\u4e2a\u524d\u6cbf\u5382\u5546\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25760", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u53d1\u73b0\u4e3a\"\u9009\u62e9\u6027\u8fc1\u79fb\"\uff1aUQ\u6392\u540d\u5728\u540c\u4e00\u6a21\u578b\u8de8\u6570\u636e\u96c6\u65f6\u7a33\u5b9a\uff08Spearman \u03c1\u6700\u9ad80.969\uff09\uff0c\u4f46\u8de8\u6a21\u578b\u7c7b\u522b\u6216\u53ef\u89c2\u6d4b\u63a5\u53e3\u65f6\u663e\u8457\u9000\u5316", "\u9690\u85cf\u72b6\u6001\u4e0e\u5bc6\u5ea6\u4f30\u8ba1\u65b9\u6cd5\uff08Mahalanobis\u3001SAPLMA\uff09\u662f\u5f00\u6e90\u6a21\u578b\u4e2d\u6700\u7a33\u5b9a\u7684UQ\u5bb6\u65cf\uff1b\u95ed\u6e90\u6a21\u578b\u8de8\u5c42\u8fc1\u79fb\u5e73\u5747\u4ec5+0.08\uff0c\u9700\u5728\u76ee\u6807\u6a21\u578b\u4e0a\u91cd\u65b0\u6392\u5e8f", "\u4fdd\u5f62\u9884\u6d4b\u70b9\u51fb\u533a\u57df\u5b9e\u9a8c\u663e\u793a\uff1a\u7ecf\u8fc7\u826f\u597d\u6821\u51c6\u7684UQ\u53ef\u5c06\u534a\u5f84\u7f29\u5c0f40-60%\uff0c\u4f46\u5728\u6821\u51c6-\u6d4b\u8bd5\u5206\u5e03\u4e0d\u5339\u914d\u6216\u63a5\u53e3\u53d8\u5316\u65f6\u8986\u76d6\u7387\u4e0b\u964d"], "keywords": ["\u667a\u80fd\u4f53", "\u4e0d\u786e\u5b9a\u6027\u91cf\u5316", "\u591a\u6a21\u6001", "GUI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25760v1", "published_at": "2026-06-24", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Uncertainty Quantification for Computer-Use Agents: A Benchmark across Vision-Language Models and GUI Grounding Datasets", "tldr": "\u9996\u4e2a\u8de8\u6a21\u578b\u4e0e\u6570\u636e\u96c6\u7684GUI\u667a\u80fd\u4f53\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u57fa\u51c6Argus\uff0c\u63ed\u793aUQ\u6392\u540d\u5728\u6a21\u578b\u5185\u7a33\u5b9a\u4f46\u8de8\u6a21\u578b\u7c7b\u522b\u8fc1\u79fb\u6027\u5dee", "upvotes": 0, "what_it_is": "\u63d0\u51faArgus\u57fa\u51c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u8ba1\u7b97\u673a\u64cd\u4f5c\u667a\u80fd\u4f53\u4e2d\u540e\u9a8c\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\uff08UQ\uff09\u65b9\u6cd5\u7684\u8de8\u573a\u666f\u7a33\u5b9a\u6027\uff0c\u8986\u76d627\u79cd\u5f00\u6e90\u65b9\u6cd5\u00d74\u4e2aVLM\u00d74\u4e2a\u6570\u636e\u96c6\uff0c\u4ee5\u53ca8\u79cd\u95ed\u6e90\u65b9\u6cd5\u00d73\u4e2a\u524d\u6cbf\u5382\u5546\u3002", "why_notable": "\u9996\u4e2a\u7cfb\u7edf\u6027GUI\u667a\u80fd\u4f53UQ\u57fa\u51c6\uff0c\u586b\u8865\u4e86\u8be5\u9886\u57df\u788e\u7247\u5316\u7814\u7a76\u7684\u7a7a\u767d\uff0c\u4e3a\u5b9e\u9645\u90e8\u7f72\u4e2d\u7684\u62d2\u7edd\u51b3\u7b56\u3001\u7a7a\u95f4\u5b89\u5168\u533a\u57df\u7b49\u63d0\u4f9b\u4e86\u5b9e\u8bc1\u6307\u5bfc\uff0c\u5e76\u5f00\u653e\u4e86\u5168\u5957\u6570\u636e\u4e0e\u4ee3\u7801"}, {"abstract": "Outcome-based reinforcement learning provides a stable optimization backbone for language agents, but its sparse trajectory-level rewards provide little guidance on which intermediate decisions should be reinforced or suppressed. On-policy self-distillation offers dense token-level supervision, yet existing skill-conditioned variants often rely on external skill memories or retrieved privileged context, which are costly to maintain and can be mismatched with the state distribution induced by the current policy in multi-turn interaction. We propose \\textbf{OPID} (\\textbf{O}n-\\textbf{P}olicy Sk\\textbf{i}ll \\textbf{D}istillation), a framework that extracts skill supervision directly from completed on-policy trajectories. OPID represents trajectory hindsight as hierarchical skills: episode-level skills capture global workflows or failure-avoidance rules, while step-level skills capture local decision knowledge at critical timesteps. A critical-first routing mechanism uses step-level skills when critical decisions are identified and falls back to episode-level skills as default guidance otherwise. The selected skill is injected into the interaction history, allowing the old policy to re-score the same sampled response under both original and skill-augmented contexts. The resulting log-probability shift yields a token-level self-distillation advantage, which is combined with the outcome advantage for policy optimization. OPID thus preserves RL as the primary training objective while introducing dense, distribution-matched hindsight supervision. Experiments on ALFWorld, WebShop and Search-based QA demonstrate that OPID generally improves agent performance, sample efficiency, and robustness over outcome-only RL and existing skill-distillation baselines. Our code is available at https://github.com/jinyangwu/OPID/tree/main.", "arxiv_id": "2606.26790", "arxiv_url": "https://arxiv.org/abs/2606.26790", "authors": ["Shuo Yang", "Jinyang Wu", "Zhengxi Lu", "Yuhao Shen", "Fan Zhang", "Lang Feng", "Shuai Zhang", "Haoran Luo", "Zheng Lian", "Zhengqi Wen", "Jianhua Tao"], "brief": "\u63d0\u51faOPID\uff08\u5728\u7ebf\u7b56\u7565\u6280\u80fd\u84b8\u998f\uff09\u6846\u67b6\uff0c\u4ece\u5df2\u5b8c\u6210\u7684\u5728\u7ebf\u8f68\u8ff9\u4e2d\u81ea\u52a8\u63d0\u53d6\u5c42\u6b21\u5316\u6280\u80fd\uff08\u56de\u5408\u7ea7+\u6b65\u9aa4\u7ea7\uff09\uff0c\u901a\u8fc7\u5173\u952e\u51b3\u7b56\u8def\u7531\u673a\u5236\u751f\u6210\u5bc6\u96c6\u7684token\u7ea7\u81ea\u84b8\u998f\u4f18\u52bf\u4fe1\u53f7\uff0c\u4e0e\u7ed3\u679c\u5956\u52b1\u8054\u5408\u4f18\u5316\u8bed\u8a00\u667a\u80fd\u4f53\u7b56\u7565\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26790", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c42\u6b21\u5316\u6280\u80fd\u8868\u793a\uff1a\u56de\u5408\u7ea7\u6280\u80fd\u6355\u83b7\u5168\u5c40\u5de5\u4f5c\u6d41/\u5931\u8d25\u89c4\u907f\u89c4\u5219\uff0c\u6b65\u9aa4\u7ea7\u6280\u80fd\u6355\u83b7\u5173\u952e\u65f6\u95f4\u6b65\u7684\u5c40\u90e8\u51b3\u7b56\u77e5\u8bc6", "\u5173\u952e\u4f18\u5148\u8def\u7531\u673a\u5236\uff1a\u68c0\u6d4b\u5230\u5173\u952e\u51b3\u7b56\u65f6\u4f7f\u7528\u6b65\u9aa4\u7ea7\u6280\u80fd\uff0c\u5426\u5219\u56de\u9000\u5230\u56de\u5408\u7ea7\u6280\u80fd\u4f5c\u4e3a\u9ed8\u8ba4\u6307\u5bfc", "\u5728ALFWorld\u3001WebShop\u548cSearch-based QA\u4e09\u4e2a\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u76f8\u6bd4\u7eaf\u7ed3\u679cRL\u548c\u73b0\u6709\u6280\u80fd\u84b8\u998f\u57fa\u7ebf\u5728\u6027\u80fd\u3001\u6837\u672c\u6548\u7387\u548c\u9c81\u68d2\u6027\u4e0a\u5747\u6709\u63d0\u5347"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u6280\u80fd\u84b8\u998f", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26790v1", "published_at": "2026-06-25", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "OPID: On-Policy Skill Distillation for Agentic Reinforcement Learning", "tldr": "OPID\u6846\u67b6\u4ece\u5728\u7ebf\u8f68\u8ff9\u4e2d\u63d0\u53d6\u5c42\u6b21\u5316\u6280\u80fd\u76d1\u7763\uff0c\u7ed3\u5408\u7ed3\u679c\u5956\u52b1\u63d0\u5347\u8bed\u8a00\u667a\u80fd\u4f53\u5f3a\u5316\u5b66\u4e60\u6548\u679c", "upvotes": 0, "what_it_is": "\u63d0\u51faOPID\uff08\u5728\u7ebf\u7b56\u7565\u6280\u80fd\u84b8\u998f\uff09\u6846\u67b6\uff0c\u4ece\u5df2\u5b8c\u6210\u7684\u5728\u7ebf\u8f68\u8ff9\u4e2d\u81ea\u52a8\u63d0\u53d6\u5c42\u6b21\u5316\u6280\u80fd\uff08\u56de\u5408\u7ea7+\u6b65\u9aa4\u7ea7\uff09\uff0c\u901a\u8fc7\u5173\u952e\u51b3\u7b56\u8def\u7531\u673a\u5236\u751f\u6210\u5bc6\u96c6\u7684token\u7ea7\u81ea\u84b8\u998f\u4f18\u52bf\u4fe1\u53f7\uff0c\u4e0e\u7ed3\u679c\u5956\u52b1\u8054\u5408\u4f18\u5316\u8bed\u8a00\u667a\u80fd\u4f53\u7b56\u7565\u3002", "why_notable": "\u89e3\u51b3\u4e86\u7a00\u758f\u5956\u52b1RL\u4e2d\u4e2d\u95f4\u51b3\u7b56\u76d1\u7763\u4e0d\u8db3\u7684\u6838\u5fc3\u95ee\u9898\uff0c\u65e0\u9700\u5916\u90e8\u6280\u80fd\u8bb0\u5fc6\u5e93\uff0c\u76f4\u63a5\u4ece\u5728\u7ebf\u8f68\u8ff9\u63d0\u53d6\u5206\u5e03\u5339\u914d\u7684\u5bc6\u96c6\u76d1\u7763\u4fe1\u53f7\uff0c\u517c\u987eRL\u7a33\u5b9a\u6027\u4e0e\u84b8\u998f\u7684\u7ec6\u7c92\u5ea6\u6307\u5bfc\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "While text-to-image (T2I) models have achieved remarkable progress, they struggle with real-world requests that are often underspecified, implicit, or dependent on up-to-date knowledge. We identify this challenge as the Context Gap: the mismatch between the user context and the sufficient generation context for T2I models. To bridge this gap, we propose Qwen-Image-Agent, a unified agentic framework that integrates plan, reason, search, memory and feedback in a context-centric manner. Qwen-Image-Agent treats user input as partial context and progressively constructs the generation context through Context-Aware Planning and Context Grounding. Specifically, Context-Aware Planning identifies missing context and plans how it should be acquired and used, while Context Grounding gathers this context from reason, search, memory, and feedback. To evaluate agentic image generation, we further introduce Image Agent Bench (IA-Bench), a benchmark covering four core image agent capabilities: Plan, Reason, Search, and Memory. Experiments on IA-Bench, Mindbench and WISE-Verified show that Qwen-Image-Agent outperforms strong baselines and achieves state-of-the-art performance.", "arxiv_id": "2606.26907", "arxiv_url": "https://arxiv.org/abs/2606.26907", "authors": ["Zekai Zhang", "Jiahao Li", "Jie Zhang", "Kaiyuan Gao", "Kun Yan", "Lihan Jiang", "Ningyuan Tang", "Shengming Yin", "Tianhe Wu", "Xiaoyue Chen", "Xiao Xu", "Yan Shu", "Yanran Zhang", "Yixian Xu", "Yuxiang Chen", "Zhendong Wang", "Zihao Liu", "Zikai Zhou", "Huishuai Zhang", "Dongyan Zhao", "Chenfei Wu"], "brief": "\u63d0\u51faQwen-Image-Agent\uff0c\u4e00\u4e2a\u7edf\u4e00\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u611f\u77e5\u89c4\u5212\uff08Context-Aware Planning\uff09\u548c\u4e0a\u4e0b\u6587\u63a5\u5730\uff08Context Grounding\uff09\u5c06\u7528\u6237\u6a21\u7cca\u8f93\u5165\u8f6c\u5316\u4e3a\u5145\u5206\u7684\u56fe\u50cf\u751f\u6210\u4e0a\u4e0b\u6587\uff0c\u540c\u65f6\u6784\u5efa\u4e86\u8bc4\u6d4b\u57fa\u51c6IA-Bench\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26907", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5b9a\u4e49\"\u4e0a\u4e0b\u6587\u9e3f\u6c9f\"\uff08Context Gap\uff09\u95ee\u9898\uff1a\u7528\u6237\u8f93\u5165\u5f80\u5f80\u4e0d\u5b8c\u6574\u3001\u9690\u542b\u6216\u4f9d\u8d56\u6700\u65b0\u77e5\u8bc6\uff0c\u4e0eT2I\u6a21\u578b\u6240\u9700\u7684\u5145\u5206\u4e0a\u4e0b\u6587\u4e0d\u5339\u914d", "\u6846\u67b6\u96c6\u6210\u89c4\u5212\u3001\u63a8\u7406\u3001\u641c\u7d22\u3001\u8bb0\u5fc6\u548c\u53cd\u9988\u4e94\u5927\u6a21\u5757\uff0c\u4ee5\u4e0a\u4e0b\u6587\u4e3a\u6838\u5fc3\u6e10\u8fdb\u5f0f\u6784\u5efa\u751f\u6210\u4e0a\u4e0b\u6587", "\u63d0\u51faIA-Bench\u8bc4\u6d4b\u57fa\u51c6\uff0c\u8986\u76d6Plan/Reason/Search/Memory\u56db\u9879\u6838\u5fc3\u80fd\u529b\uff0c\u5728IA-Bench\u3001Mindbench\u548cWISE-Verified\u4e0a\u8fbe\u5230SOTA"], "keywords": ["\u667a\u80fd\u4f53", "\u56fe\u50cf\u751f\u6210", "\u591a\u6a21\u6001", "\u4e0a\u4e0b\u6587\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26907v1", "published_at": "2026-06-25", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Qwen-Image-Agent: Bridging the Context Gap in Real-World Image Generation", "tldr": "\u63d0\u51faQwen-Image-Agent\u6846\u67b6\uff0c\u901a\u8fc7\u89c4\u5212\u3001\u63a8\u7406\u3001\u641c\u7d22\u548c\u8bb0\u5fc6\u5f25\u5408\u7528\u6237\u610f\u56fe\u4e0e\u56fe\u50cf\u751f\u6210\u6240\u9700\u4e0a\u4e0b\u6587\u7684\u5dee\u8ddd", "upvotes": 0, "what_it_is": "\u63d0\u51faQwen-Image-Agent\uff0c\u4e00\u4e2a\u7edf\u4e00\u7684\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7\u4e0a\u4e0b\u6587\u611f\u77e5\u89c4\u5212\uff08Context-Aware Planning\uff09\u548c\u4e0a\u4e0b\u6587\u63a5\u5730\uff08Context Grounding\uff09\u5c06\u7528\u6237\u6a21\u7cca\u8f93\u5165\u8f6c\u5316\u4e3a\u5145\u5206\u7684\u56fe\u50cf\u751f\u6210\u4e0a\u4e0b\u6587\uff0c\u540c\u65f6\u6784\u5efa\u4e86\u8bc4\u6d4b\u57fa\u51c6IA-Bench\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u667a\u80fd\u4f53\u80fd\u529b\uff08\u641c\u7d22\u3001\u8bb0\u5fc6\u3001\u53cd\u9988\u7b49\uff09\u5f15\u5165\u6587\u672c\u751f\u6210\u56fe\u50cf\u6d41\u7a0b\u4ee5\u89e3\u51b3\u771f\u5b9e\u573a\u666f\u4e0b\u7684\u4e0a\u4e0b\u6587\u4e0d\u8db3\u95ee\u9898\uff0c\u5e76\u914d\u5957\u63d0\u51fa\u4e13\u7528\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5bf9\u5b9e\u7528\u5316T2I\u7cfb\u7edf\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "AI safety is evaluated by how reliably a model detects the hazards it is told to find, yet accidents often arise from the hazard no one specified. We show that conditioning a language or vision model on a narrow task suppresses its reporting of co-present, safety-critical signals it can otherwise report, a machine analogue of human inattentional blindness arising from a different mechanism. Across radiology and driving text scenarios and chest-radiograph vision tasks, suppression appeared in every model tested, did not diminish with scale, persisted in a reasoning model, and varied more by model family than by size, while the same models reported these signals at substantially higher rates when unconstrained. We name this dissociation the Inattentional Gap and argue that it decouples measured benchmark safety from real-world safety: a system can score near-perfectly on the hazards an evaluation specifies while remaining blind to those that cause harm.", "arxiv_id": "2606.26529", "arxiv_url": "https://arxiv.org/abs/2606.26529", "authors": ["Kwan Soo Shin"], "brief": "\u672c\u6587\u53d1\u73b0\u8bed\u8a00\u548c\u89c6\u89c9\u6a21\u578b\u5728\u6267\u884c\u7279\u5b9a\u4efb\u52a1\u65f6\uff0c\u4f1a\u7cfb\u7edf\u6027\u5730\u5ffd\u7565\u540c\u65f6\u5b58\u5728\u7684\u5b89\u5168\u5173\u952e\u4fe1\u53f7\u2014\u2014\u5373\u4f7f\u8fd9\u4e9b\u6a21\u578b\u5728\u65e0\u7ea6\u675f\u72b6\u6001\u4e0b\u80fd\u591f\u6b63\u5e38\u62a5\u544a\u8fd9\u4e9b\u4fe1\u53f7\u3002\u4f5c\u8005\u5c06\u8fd9\u4e00\u73b0\u8c61\u547d\u540d\u4e3a\"\u6ce8\u610f\u529b\u7f3a\u53e3\"\uff08Inattentional Gap\uff09\uff0c\u7c7b\u6bd4\u4eba\u7c7b\u7684\u975e\u6ce8\u610f\u76f2\u89c6\u73b0\u8c61\u3002", "categories": ["cs.CL", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26529", "impact_score": 9, "is_agent": false, "is_top": true, "key_points": ["\u5728\u653e\u5c04\u5b66\u3001\u9a7e\u9a76\u6587\u672c\u573a\u666f\u548c\u80f8\u90e8X\u5149\u89c6\u89c9\u4efb\u52a1\u4e2d\uff0c\u6240\u6709\u88ab\u6d4b\u6a21\u578b\u5747\u51fa\u73b0\u8be5\u6291\u5236\u73b0\u8c61", "\u8be5\u73b0\u8c61\u4e0d\u968f\u6a21\u578b\u89c4\u6a21\u589e\u5927\u800c\u51cf\u5f31\uff0c\u5728\u63a8\u7406\u6a21\u578b\u4e2d\u4f9d\u7136\u5b58\u5728\uff0c\u4e14\u5dee\u5f02\u66f4\u591a\u4f53\u73b0\u5728\u6a21\u578b\u5bb6\u65cf\u800c\u975e\u6a21\u578b\u5927\u5c0f\u4e0a", "\u65e0\u7ea6\u675f\u72b6\u6001\u4e0b\u540c\u4e00\u6a21\u578b\u5bf9\u8fd9\u4e9b\u5b89\u5168\u4fe1\u53f7\u7684\u62a5\u544a\u7387\u663e\u8457\u66f4\u9ad8\uff0c\u63ed\u793a\u57fa\u51c6\u6d4b\u8bd5\u5b89\u5168\u4e0e\u771f\u5b9e\u4e16\u754c\u5b89\u5168\u4e4b\u95f4\u7684\u89e3\u8026"], "keywords": ["AI\u5b89\u5168", "\u591a\u6a21\u6001", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u9760\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26529v1", "published_at": "2026-06-25", "score": 0.225, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "The Inattentional Gap: Task-Conditioned Language and Vision Models Omit the Safety-Critical Signals They Can Otherwise Report", "tldr": "\u4efb\u52a1\u6761\u4ef6\u5316\u4f1a\u6291\u5236AI\u6a21\u578b\u62a5\u544a\u5171\u5b58\u5b89\u5168\u5173\u952e\u4fe1\u53f7\uff0c\u5f62\u6210\"\u6ce8\u610f\u529b\u76f2\u533a\"", "upvotes": 0, "what_it_is": "\u672c\u6587\u53d1\u73b0\u8bed\u8a00\u548c\u89c6\u89c9\u6a21\u578b\u5728\u6267\u884c\u7279\u5b9a\u4efb\u52a1\u65f6\uff0c\u4f1a\u7cfb\u7edf\u6027\u5730\u5ffd\u7565\u540c\u65f6\u5b58\u5728\u7684\u5b89\u5168\u5173\u952e\u4fe1\u53f7\u2014\u2014\u5373\u4f7f\u8fd9\u4e9b\u6a21\u578b\u5728\u65e0\u7ea6\u675f\u72b6\u6001\u4e0b\u80fd\u591f\u6b63\u5e38\u62a5\u544a\u8fd9\u4e9b\u4fe1\u53f7\u3002\u4f5c\u8005\u5c06\u8fd9\u4e00\u73b0\u8c61\u547d\u540d\u4e3a\"\u6ce8\u610f\u529b\u7f3a\u53e3\"\uff08Inattentional Gap\uff09\uff0c\u7c7b\u6bd4\u4eba\u7c7b\u7684\u975e\u6ce8\u610f\u76f2\u89c6\u73b0\u8c61\u3002", "why_notable": "\u8be5\u53d1\u73b0\u5bf9AI\u5b89\u5168\u8bc4\u4f30\u4f53\u7cfb\u5177\u6709\u6839\u672c\u6027\u6311\u6218\uff1a\u6a21\u578b\u53ef\u4ee5\u5728\u6307\u5b9a\u5371\u5bb3\u68c0\u6d4b\u57fa\u51c6\u4e0a\u63a5\u8fd1\u6ee1\u5206\uff0c\u5374\u5bf9\u771f\u6b63\u9020\u6210\u4f24\u5bb3\u7684\u672a\u6307\u5b9a\u5371\u5bb3\u89c6\u800c\u4e0d\u89c1\uff0c\u5bf9\u533b\u7597AI\u3001\u81ea\u52a8\u9a7e\u9a76\u7b49\u9ad8\u98ce\u9669\u573a\u666f\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "Multi-model LLM systems such as routing, voting, cascades, fusion, and mixture-of-agents are used to beat single-model accuracy. We show that their gain is capped by a quantity the field rarely reports. For any policy whose output is one member model answer, accuracy cannot exceed one minus beta, where beta is the rate at which every model is wrong on the same query. In contrast, the usual diagnostic, average pairwise error correlation rho, cannot identify beta: error laws with identical marginals and pairwise correlations can have different all-wrong rates. A Clopper-Pearson bound on beta gives a finite-sample certificate on the largest gain any router, vote, or cascade could deliver before training a router. Across 67 models from 21 providers, a tetrachoric-calibrated single-factor model still underprices the all-wrong tail: on open-ended mathematics, observed beta is 0.052 versus 0.023 under the full 67-model Gaussian copula, about 2.5 times underpricing, with 90 percent CI 1.7 to 3.4 and k equals 17. The effect recurs on execution-graded code, where beta is 0.079. Re-asking the same GPQA-Diamond questions in free-response rather than multiple-choice form reopens the tail, with beta 0.127 and a five-judge panel with kappa 0.73 to 0.92, locating co-failure in answer format rather than subject. At matched quality, low-rho heterogeneous ensembles beat high-rho Self-MoA, but on checkable tasks in our pool, combining models rarely beats the single best model without a strong query-level routing signal. Gains come from models failing on different questions, not from adding more models.", "arxiv_id": "2606.27288", "arxiv_url": "https://arxiv.org/abs/2606.27288", "authors": ["Josef Chen"], "brief": "\u672c\u6587\u63d0\u51fa\"\u5171\u540c\u5931\u8d25\u4e0a\u9650\"\uff08co-failure ceiling\uff09\u7406\u8bba\uff1a\u4efb\u4f55\u8def\u7531\u3001\u6295\u7968\u6216\u6df7\u5408\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u51c6\u786e\u7387\u4e0a\u9650\u4e3a1\u51cf\u53bb\u6240\u6709\u6a21\u578b\u540c\u65f6\u7b54\u9519\u7684\u6982\u7387\u03b2\uff0c\u5e76\u901a\u8fc767\u4e2a\u524d\u6cbf\u6a21\u578b\u7684\u5b9e\u9a8c\u9a8c\u8bc1\u8be5\u4e0a\u9650\u7684\u5b9e\u9645\u610f\u4e49\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27288", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u4f20\u7edf\u8bca\u65ad\u6307\u6807\uff08\u5e73\u5747\u6210\u5bf9\u9519\u8bef\u76f8\u5173\u6027\u03c1\uff09\u65e0\u6cd5\u8bc6\u522b\u03b2\uff0c\u76f8\u540c\u8fb9\u9645\u5206\u5e03\u548c\u6210\u5bf9\u76f8\u5173\u6027\u53ef\u5bf9\u5e94\u4e0d\u540c\u7684\u5168\u9519\u7387", "\u5728\u5f00\u653e\u5f0f\u6570\u5b66\u9898\u4e0a\uff0c67\u6a21\u578b\u9ad8\u65afCopula\u6a21\u578b\u5bf9\u03b2\u7684\u4f30\u8ba1\u4ec5\u4e3a\u5b9e\u6d4b\u503c\u768440%\uff080.023 vs 0.052\uff09\uff0c\u5b58\u5728\u7ea62.5\u500d\u4f4e\u4f30", "\u5728\u53ef\u9a8c\u8bc1\u4efb\u52a1\u4e2d\uff0c\u591a\u6a21\u578b\u7ec4\u5408\u51e0\u4e4e\u65e0\u6cd5\u8d85\u8d8a\u5355\u4e00\u6700\u4f18\u6a21\u578b\uff0c\u6027\u80fd\u63d0\u5347\u6765\u81ea\u6a21\u578b\u5728\u4e0d\u540c\u95ee\u9898\u4e0a\u5931\u8d25\uff0c\u800c\u975e\u5806\u53e0\u66f4\u591a\u6a21\u578b"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6a21\u578b\u96c6\u6210", "\u667a\u80fd\u4f53", "\u8bc4\u4f30\u57fa\u51c6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27288v1", "published_at": "2026-06-25", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "When Does Combining Language Models Help? A Co-Failure Ceiling on Routing, Voting, and Mixture-of-Agents Across 67 Frontier Models", "tldr": "\u591a\u6a21\u578bLLM\u7cfb\u7edf\u7684\u6027\u80fd\u4e0a\u9650\u7531\"\u5171\u540c\u5931\u8d25\u7387\"\u51b3\u5b9a\uff0c\u800c\u975e\u5e38\u7528\u7684\u9519\u8bef\u76f8\u5173\u6027\u6307\u6807", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u5171\u540c\u5931\u8d25\u4e0a\u9650\"\uff08co-failure ceiling\uff09\u7406\u8bba\uff1a\u4efb\u4f55\u8def\u7531\u3001\u6295\u7968\u6216\u6df7\u5408\u667a\u80fd\u4f53\u7cfb\u7edf\u7684\u51c6\u786e\u7387\u4e0a\u9650\u4e3a1\u51cf\u53bb\u6240\u6709\u6a21\u578b\u540c\u65f6\u7b54\u9519\u7684\u6982\u7387\u03b2\uff0c\u5e76\u901a\u8fc767\u4e2a\u524d\u6cbf\u6a21\u578b\u7684\u5b9e\u9a8c\u9a8c\u8bc1\u8be5\u4e0a\u9650\u7684\u5b9e\u9645\u610f\u4e49\u3002", "why_notable": "\u9996\u6b21\u4ece\u7406\u8bba\u548c\u5927\u89c4\u6a21\u5b9e\u9a8c\uff0867\u6a21\u578b\u300121\u5bb6\u63d0\u4f9b\u5546\uff09\u53cc\u91cd\u89d2\u5ea6\u63ed\u793a\u591a\u6a21\u578b\u7cfb\u7edf\u7684\u6027\u80fd\u5929\u82b1\u677f\uff0c\u4e3a\u8def\u7531/\u96c6\u6210\u7cfb\u7edf\u7684\u8bbe\u8ba1\u63d0\u4f9b\u4e86\u53ef\u8ba1\u7b97\u7684\u6709\u9650\u6837\u672c\u8bc1\u4e66\uff0c\u5bf9\u5de5\u4e1a\u754c\u591a\u6a21\u578b\u90e8\u7f72\u51b3\u7b56\u5177\u6709\u76f4\u63a5\u6307\u5bfc\u4ef7\u503c"}, {"abstract": "With the rapid evolution of LLM-driven agents, Model Context Protocol (MCP), an open protocol bridging LLMs with external tools, has quickly become foundational to modern agent ecosystems. However, the expanding adoption of MCP has also introduced novel security concerns such as Tool Poisoning Attack (TPA), which exploit LLM-server interactions to inject malicious prompts. Existing poisoning schemes typically adopt a monolithic plaintext embedding paradigm, which fails to withstand manual inspection or automated detectors. Current research still lacks a systematic analysis on multi-tool poisoning, where multiple tools can be exploited cooperatively to disperse detection risk. In this paper, we introduce ShareLock, a multi-tool threshold poisoning framework that utilizes Shamir\u0027s threshold scheme to ensure exceptional stealth and fault tolerance. ShareLock distributes the malicious instruction as benign-looking secret shares across multiple tool descriptions, achieving both information-theoretic secrecy and attack robustness against moderate auditing. After a covert reconstruction trigger is planted during server update, the aggregated shares reconstruct the hidden instruction, resulting in critical breaches of system assets or private data. To evaluate the realistic threat of ShareLock, we constructed a comprehensive benchmark encompassing four multi-tool scenarios and conducted extensive experiments across mainstream LLMs on two distinct MCP clients. Our results demonstrate that ShareLock significantly outperforms existing single-tool poisoning strategies in tool description-based detection while maintaining an average attack success rate exceeding 90%.", "arxiv_id": "2606.27027", "arxiv_url": "https://arxiv.org/abs/2606.27027", "authors": ["Liwei Liu", "Tianzhu Han", "Zijian Liu", "Zishu Dong", "Na Ruan"], "brief": "\u63d0\u51faShareLock\u6846\u67b6\uff0c\u5c06\u6076\u610f\u6307\u4ee4\u901a\u8fc7Shamir\u9608\u503c\u65b9\u6848\u62c6\u5206\u4e3a\u770b\u4f3c\u65e0\u5bb3\u7684\u79d8\u5bc6\u4efd\u989d\uff0c\u5206\u6563\u5d4c\u5165\u591a\u4e2aMCP\u5de5\u5177\u63cf\u8ff0\u4e2d\uff0c\u5728\u89e6\u53d1\u6761\u4ef6\u6ee1\u8db3\u65f6\u91cd\u6784\u5e76\u6267\u884c\u653b\u51fb\uff0c\u7a81\u7834\u73b0\u6709\u5355\u5de5\u5177\u6295\u6bd2\u68c0\u6d4b\u673a\u5236\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27027", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5229\u7528Shamir\u79d8\u5bc6\u5171\u4eab\u5c06\u6076\u610f\u6307\u4ee4\u5206\u6563\u81f3\u591a\u4e2a\u5de5\u5177\u63cf\u8ff0\uff0c\u5355\u4e2a\u4efd\u989d\u65e0\u6cd5\u88ab\u8bc6\u522b\u4e3a\u6076\u610f\u5185\u5bb9\uff0c\u5177\u5907\u4fe1\u606f\u8bba\u7ea7\u522b\u7684\u9690\u853d\u6027", "\u901a\u8fc7\u670d\u52a1\u5668\u66f4\u65b0\u690d\u5165\u9690\u853d\u91cd\u6784\u89e6\u53d1\u5668\uff0c\u805a\u5408\u4efd\u989d\u540e\u53ef\u7a83\u53d6\u7cfb\u7edf\u8d44\u4ea7\u6216\u79c1\u6709\u6570\u636e", "\u5728\u56db\u7c7b\u591a\u5de5\u5177\u573a\u666f\u548c\u4e3b\u6d41LLM\u4e0a\u6d4b\u8bd5\uff0c\u5e73\u5747\u653b\u51fb\u6210\u529f\u7387\u8d85\u8fc790%\uff0c\u4e14\u663e\u8457\u4f18\u4e8e\u73b0\u6709\u5355\u5de5\u5177\u6295\u6bd2\u7b56\u7565\u7684\u6297\u68c0\u6d4b\u80fd\u529b"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u653b\u51fb", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63d0\u793a\u6ce8\u5165"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27027v1", "published_at": "2026-06-25", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "ShareLock: A Stealthy Multi-Tool Threshold Poisoning Attack Against MCP", "tldr": "ShareLock\u5229\u7528Shamir\u79d8\u5bc6\u5171\u4eab\u5c06\u6076\u610f\u6307\u4ee4\u5206\u6563\u5230\u591a\u4e2aMCP\u5de5\u5177\u63cf\u8ff0\u4e2d\uff0c\u5b9e\u73b0\u9690\u853d\u7684\u9608\u503c\u6295\u6bd2\u653b\u51fb", "upvotes": 0, "what_it_is": "\u63d0\u51faShareLock\u6846\u67b6\uff0c\u5c06\u6076\u610f\u6307\u4ee4\u901a\u8fc7Shamir\u9608\u503c\u65b9\u6848\u62c6\u5206\u4e3a\u770b\u4f3c\u65e0\u5bb3\u7684\u79d8\u5bc6\u4efd\u989d\uff0c\u5206\u6563\u5d4c\u5165\u591a\u4e2aMCP\u5de5\u5177\u63cf\u8ff0\u4e2d\uff0c\u5728\u89e6\u53d1\u6761\u4ef6\u6ee1\u8db3\u65f6\u91cd\u6784\u5e76\u6267\u884c\u653b\u51fb\uff0c\u7a81\u7834\u73b0\u6709\u5355\u5de5\u5177\u6295\u6bd2\u68c0\u6d4b\u673a\u5236\u3002", "why_notable": "MCP\u6b63\u6210\u4e3aLLM\u667a\u80fd\u4f53\u751f\u6001\u7684\u57fa\u7840\u534f\u8bae\uff0cShareLock\u63ed\u793a\u4e86\u591a\u5de5\u5177\u534f\u540c\u6295\u6bd2\u8fd9\u4e00\u65b0\u578b\u653b\u51fb\u9762\uff0c\u73b0\u6709\u68c0\u6d4b\u65b9\u6848\u5bf9\u5176\u51e0\u4e4e\u65e0\u6548\uff0c\u5bf9MCP\u5b89\u5168\u9632\u5fa1\u7814\u7a76\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "Low-bit floating-point formats and semi-structured sparsity are increasingly supported by modern accelerators, yet combining them for LLM activation compression remains challenging: activations contain input-dependent outliers that dominate block scales in FP4 quantization, and directly applying N:M sparsity masks discards moderate values, coupling sparsification loss with quantization error. We introduce SharQ, a training-free inference method that bridges activation sparsity and FP4 quantization through an online sparse--dense decomposition. For each activation tensor, SharQ generates an input-adaptive N:M mask to extract an outlier-dominated sparse backbone, quantizes it to FP4, and defines a dense residual relative to the quantized sparse backbone rather than the unquantized sparse values. A sparse FP4 GEMM processes the backbone while a dense FP4 GEMM compensates for both mask-induced activation loss and sparse-path quantization error. The two paths share a single FP4 weight payload with path-specific scale views, and a fused preparation kernel absorbs mask generation, residual construction, and layer normalization into one operator. SharQ requires no calibration data, retraining, or model-specific tuning. Evaluated on Llama-3.1-8B, Qwen2.5-7B, Qwen3-30B-A3B, and Qwen3-VL-8B, SharQ recovers 43--63% of the NVFP4-to-FP16 accuracy gap across language and vision-language tasks, and generalizes across NVFP4, HiF4, and MXFP4 formats. On an RTX 5090, SharQ delivers 2.2--2.4$\\times$ latency reduction over FP16 and 1.2--1.4$\\times$ throughput improvement over FP8 in language model serving, and up to 1.58$\\times$ speedup on Wan2.2-T2V-A14B video generation when combined with SageAttention. Our code is available at https://github.com/actypedef/SharQ.", "arxiv_id": "2606.26587", "arxiv_url": "https://arxiv.org/abs/2606.26587", "authors": ["Haoqian Meng", "Yilun Luo", "Yafei Zhao", "Wenyuan Liu", "Huaqing Zheng", "Xindian Ma", "Peng Zhang"], "brief": "SharQ\u662f\u4e00\u79cd\u514d\u8bad\u7ec3\u7684LLM\u63a8\u7406\u65b9\u6cd5\uff0c\u901a\u8fc7\u5728\u7ebf\u7a00\u758f-\u7a20\u5bc6\u5206\u89e3\uff0c\u5c06\u6fc0\u6d3b\u5f20\u91cf\u7684\u5f02\u5e38\u503c\u63d0\u53d6\u4e3a\u7a00\u758f\u9aa8\u5e72\u5e76FP4\u91cf\u5316\uff0c\u540c\u65f6\u7528\u7a20\u5bc6\u6b8b\u5dee\u8865\u507f\u91cf\u5316\u8bef\u5dee\uff0c\u5b9e\u73b0\u6fc0\u6d3b\u7a00\u758f\u6027\u4e0eFP4\u91cf\u5316\u7684\u534f\u540c\u538b\u7f29\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26587", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u51fa\u8f93\u5165\u81ea\u9002\u5e94\u7684N:M\u63a9\u7801\u751f\u6210\u673a\u5236\uff0c\u5c06\u5f02\u5e38\u503c\u4e3b\u5bfc\u7684\u7a00\u758f\u9aa8\u5e72\u4e0e\u7a20\u5bc6\u6b8b\u5dee\u5206\u79bb\u5904\u7406\uff0c\u907f\u514d\u7a00\u758f\u5316\u635f\u5931\u4e0e\u91cf\u5316\u8bef\u5dee\u8026\u5408", "\u4e24\u8def\u5f84\u5171\u4eab\u5355\u4e00FP4\u6743\u91cd\u8f7d\u8377\uff0c\u878d\u5408\u51c6\u5907\u6838\u5c06\u63a9\u7801\u751f\u6210\u3001\u6b8b\u5dee\u6784\u5efa\u548c\u5c42\u5f52\u4e00\u5316\u5408\u5e76\u4e3a\u5355\u7b97\u5b50\uff0c\u65e0\u9700\u6821\u51c6\u6570\u636e\u6216\u91cd\u8bad\u7ec3", "\u5728RTX 5090\u4e0a\u76f8\u6bd4FP16\u5b9e\u73b02.2\u20132.4\u00d7\u5ef6\u8fdf\u964d\u4f4e\uff0c\u76f8\u6bd4FP8\u5b9e\u73b01.2\u20131.4\u00d7\u541e\u5410\u63d0\u5347\uff0c\u5728Wan2.2\u89c6\u9891\u751f\u6210\u4efb\u52a1\u4e0a\u6700\u9ad8\u52a0\u901f1.58\u00d7"], "keywords": ["\u6a21\u578b\u91cf\u5316", "\u63a8\u7406\u52a0\u901f", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7a00\u758f\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26587v1", "published_at": "2026-06-25", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "SharQ: Bridging Activation Sparsity and FP4 Quantization for LLM Inference", "tldr": "SharQ\u5c06\u6fc0\u6d3b\u7a00\u758f\u6027\u4e0eFP4\u91cf\u5316\u7ed3\u5408\uff0c\u65e0\u9700\u8bad\u7ec3\u5373\u53ef\u5927\u5e45\u63d0\u5347LLM\u63a8\u7406\u6548\u7387", "upvotes": 0, "what_it_is": "SharQ\u662f\u4e00\u79cd\u514d\u8bad\u7ec3\u7684LLM\u63a8\u7406\u65b9\u6cd5\uff0c\u901a\u8fc7\u5728\u7ebf\u7a00\u758f-\u7a20\u5bc6\u5206\u89e3\uff0c\u5c06\u6fc0\u6d3b\u5f20\u91cf\u7684\u5f02\u5e38\u503c\u63d0\u53d6\u4e3a\u7a00\u758f\u9aa8\u5e72\u5e76FP4\u91cf\u5316\uff0c\u540c\u65f6\u7528\u7a20\u5bc6\u6b8b\u5dee\u8865\u507f\u91cf\u5316\u8bef\u5dee\uff0c\u5b9e\u73b0\u6fc0\u6d3b\u7a00\u758f\u6027\u4e0eFP4\u91cf\u5316\u7684\u534f\u540c\u538b\u7f29\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u534a\u7ed3\u6784\u5316\u7a00\u758f\u4e0eFP4\u91cf\u5316\u7ed3\u5408\u7528\u4e8eLLM\u6fc0\u6d3b\u538b\u7f29\uff0c\u65e0\u9700\u4efb\u4f55\u8bad\u7ec3\u6216\u6821\u51c6\u5373\u53ef\u6062\u590d43\u201363%\u7684\u7cbe\u5ea6\u635f\u5931\uff0c\u5e76\u5728\u591a\u79cdFP4\u683c\u5f0f\u548c\u6a21\u578b\u4e0a\u9a8c\u8bc1\u4e86\u901a\u7528\u6027\uff0c\u5177\u6709\u5f88\u5f3a\u7684\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "AI-based scientific automation is increasingly possible by using agents to generate hypotheses, design experiments, and analyze data. Data collection is a major bottleneck in this pipeline, however. Psychology, and computational cognitive science in particular, is well-positioned to benefit from AI experimentation because theories are often represented as code and crowdsourcing platforms enable programmatic human data collection at scale. Here, we apply automated discovery techniques to the project of generating theories in computational cognitive science, with an agent-based system collecting human data independently through crowdsourced survey experiments. As a testbed, we use a classic case study from cognitive psychology: judging which sequences of coin flips seem subjectively more random. Our system, auto-psych, uses nested agent-based discovery loops to generate explanatory theories of human behavior. The inner loop conjectures, fits, and critiques probabilistic cognitive models; the outer loop designs experiments to test these models, launches them online, and analyzes the data. This system can quickly and reliably recover ground-truth theories from synthetic data via systematic experimentation, but the nested structure is critical to model performance. Further, in three independent sequences of human experiments, the system finds theories that fit the data better than theories generated from the scientific literature. This work thus demonstrates the feasibility of automated data collection and theory discovery in computational cognitive science.", "arxiv_id": "2606.26460", "arxiv_url": "https://arxiv.org/abs/2606.26460", "authors": ["Ben Prystawski", "Kushin Mukherjee", "Daniel Wurgaft", "Linas Nasvytis", "Michael Y. Li", "Noah D. Goodman", "Michael C. Frank"], "brief": "\u63d0\u51faauto-psych\u7cfb\u7edf\uff0c\u5229\u7528\u5d4c\u5957\u667a\u80fd\u4f53\u5faa\u73af\u81ea\u52a8\u5b8c\u6210\u8ba1\u7b97\u8ba4\u77e5\u79d1\u5b66\u4e2d\u7684\u5047\u8bbe\u751f\u6210\u3001\u5b9e\u9a8c\u8bbe\u8ba1\u3001\u5728\u7ebf\u4f17\u5305\u6570\u636e\u6536\u96c6\u4e0e\u7406\u8bba\u53d1\u73b0\u5168\u6d41\u7a0b\uff0c\u4ee5\u786c\u5e01\u5e8f\u5217\u968f\u673a\u6027\u5224\u65ad\u4e3a\u6d4b\u8bd5\u6848\u4f8b\u9a8c\u8bc1\u5176\u6709\u6548\u6027\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26460", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u53cc\u5c42\u5d4c\u5957\u667a\u80fd\u4f53\u67b6\u6784\uff1a\u5185\u5c42\u5faa\u73af\u63a8\u6d4b\u3001\u62df\u5408\u5e76\u6279\u8bc4\u6982\u7387\u8ba4\u77e5\u6a21\u578b\uff0c\u5916\u5c42\u5faa\u73af\u8bbe\u8ba1\u5b9e\u9a8c\u3001\u5728\u7ebf\u53d1\u5e03\u5e76\u5206\u6790\u6570\u636e", "\u7cfb\u7edf\u80fd\u4ece\u5408\u6210\u6570\u636e\u4e2d\u5feb\u901f\u53ef\u9760\u5730\u6062\u590d\u771f\u5b9e\u7406\u8bba\uff0c\u4e14\u5d4c\u5957\u7ed3\u6784\u5bf9\u6a21\u578b\u6027\u80fd\u81f3\u5173\u91cd\u8981", "\u5728\u4e09\u7ec4\u72ec\u7acb\u4eba\u7c7b\u5b9e\u9a8c\u5e8f\u5217\u4e2d\uff0c\u7cfb\u7edf\u53d1\u73b0\u7684\u7406\u8bba\u62df\u5408\u6548\u679c\u4f18\u4e8e\u73b0\u6709\u6587\u732e\u4e2d\u7684\u4eba\u5de5\u7406\u8bba"], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u81ea\u52a8\u5316", "\u8ba4\u77e5\u79d1\u5b66", "\u591a\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26460v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "auto-psych: Automating the science of mind using agent-driven theory discovery and experimentation", "tldr": "auto-psych\u7cfb\u7edf\u901a\u8fc7\u5d4c\u5957\u667a\u80fd\u4f53\u81ea\u52a8\u751f\u6210\u8ba4\u77e5\u79d1\u5b66\u7406\u8bba\u5e76\u5728\u7ebf\u6536\u96c6\u4eba\u7c7b\u5b9e\u9a8c\u6570\u636e", "upvotes": 0, "what_it_is": "\u63d0\u51faauto-psych\u7cfb\u7edf\uff0c\u5229\u7528\u5d4c\u5957\u667a\u80fd\u4f53\u5faa\u73af\u81ea\u52a8\u5b8c\u6210\u8ba1\u7b97\u8ba4\u77e5\u79d1\u5b66\u4e2d\u7684\u5047\u8bbe\u751f\u6210\u3001\u5b9e\u9a8c\u8bbe\u8ba1\u3001\u5728\u7ebf\u4f17\u5305\u6570\u636e\u6536\u96c6\u4e0e\u7406\u8bba\u53d1\u73b0\u5168\u6d41\u7a0b\uff0c\u4ee5\u786c\u5e01\u5e8f\u5217\u968f\u673a\u6027\u5224\u65ad\u4e3a\u6d4b\u8bd5\u6848\u4f8b\u9a8c\u8bc1\u5176\u6709\u6548\u6027\u3002", "why_notable": "\u9996\u6b21\u5c06AI\u667a\u80fd\u4f53\u9a71\u52a8\u7684\u79d1\u5b66\u81ea\u52a8\u5316\u95ed\u73af\uff08\u542b\u771f\u5b9e\u4eba\u7c7b\u6570\u636e\u4f17\u5305\u6536\u96c6\uff09\u5e94\u7528\u4e8e\u8ba1\u7b97\u8ba4\u77e5\u79d1\u5b66\uff0c\u7a81\u7834\u4e86\u6570\u636e\u6536\u96c6\u74f6\u9888\uff0c\u5c55\u793a\u4e86AI\u81ea\u4e3b\u63a8\u8fdb\u5fc3\u7406\u5b66\u7814\u7a76\u7684\u53ef\u884c\u6027\u3002"}, {"abstract": "A classical intuition holds that verifying a solution is easier than producing one. For today\u0027s coding agents, this intuition is being inverted: as foundation models develop stronger reasoning capabilities and engineering harnesses grow more sophisticated, generating complex candidate solutions is no longer difficult -- reliably verifying them has become the harder problem. Every verifier we can build is only a proxy for human intent, never the intent itself. This makes verification subject to a twofold difficulty: first, intent is underspecified by nature, making it inherently hard to faithfully check whether it has been fulfilled; second, during model training, optimization widens the gap between proxy and intent -- manifesting as reward hacking or signal saturation. To address this, we characterize the quality of verification signals along three dimensions -- scalability, faithfulness, and robustness -- and argue that achieving all three simultaneously is the central challenge. We further study four reward constructions: a test verifier for general coding tasks, a rubric verifier for frontend tasks, the user as verifier for real-world agent tasks, and an automated agent verifier for long-horizon tasks. Across different task types and policy capability levels, we conduct in-depth analysis and experiments on the core challenges of reward design and how to more effectively leverage reward signals. Experiments show that targeted verification design can effectively suppress reward hacking, improve task completion quality, and achieve significant gains across multiple internal and public benchmarks. These experiences collectively point to a core observation: no fixed reward function can remain effective as policy capability continues to grow; and verification must co-evolve with the generator.", "arxiv_id": "2606.26300", "arxiv_url": "https://arxiv.org/abs/2606.26300", "authors": ["Binghai Wang", "Chenlong Zhang", "Dayiheng Liu", "Jiajun Zhang", "Jiawei Chen", "Mouxiang Chen", "Rongyao Fang", "Siyuan Zhang", "Xuwu Wang", "Yuheng Jing", "Zeyao Ma", "Zeyu Cui"], "brief": "\u672c\u6587\u7cfb\u7edf\u5206\u6790\u7f16\u7801\u667a\u80fd\u4f53\u8bad\u7ec3\u4e2d\u9a8c\u8bc1\u4fe1\u53f7\u7684\u6838\u5fc3\u6311\u6218\uff0c\u63d0\u51fa\u4ece\u53ef\u6269\u5c55\u6027\u3001\u5fe0\u5b9e\u6027\u3001\u9c81\u68d2\u6027\u4e09\u7ef4\u5ea6\u8bc4\u4f30\u9a8c\u8bc1\u8d28\u91cf\uff0c\u5e76\u7814\u7a76\u56db\u7c7b\u5956\u52b1\u6784\u5efa\u65b9\u6848\uff08\u6d4b\u8bd5\u9a8c\u8bc1\u5668\u3001\u8bc4\u5206\u6807\u51c6\u9a8c\u8bc1\u5668\u3001\u7528\u6237\u9a8c\u8bc1\u3001\u81ea\u52a8\u5316\u667a\u80fd\u4f53\u9a8c\u8bc1\u5668\uff09\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26300", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u9a8c\u8bc1\u96be\u9898\u7684\u53cc\u91cd\u56f0\u5883\uff1a\u610f\u56fe\u5929\u7136\u6b20\u89c4\u8303\uff08\u96be\u4ee5\u5fe0\u5b9e\u68c0\u9a8c\uff09+ \u8bad\u7ec3\u4f18\u5316\u52a0\u5267\u4ee3\u7406\u4e0e\u771f\u5b9e\u610f\u56fe\u7684\u504f\u5dee\uff08\u5956\u52b1\u9ed1\u5ba2/\u4fe1\u53f7\u9971\u548c\uff09", "\u63d0\u51fa\u4e09\u7ef4\u9a8c\u8bc1\u8d28\u91cf\u6846\u67b6\uff1a\u53ef\u6269\u5c55\u6027\u3001\u5fe0\u5b9e\u6027\u3001\u9c81\u68d2\u6027\uff0c\u4e09\u8005\u540c\u65f6\u6ee1\u8db3\u662f\u6838\u5fc3\u6311\u6218", "\u5b9e\u9a8c\u8868\u660e\u9488\u5bf9\u6027\u9a8c\u8bc1\u8bbe\u8ba1\u53ef\u6709\u6548\u6291\u5236\u5956\u52b1\u9ed1\u5ba2\u884c\u4e3a\uff0c\u5728\u591a\u4e2a\u5185\u90e8\u53ca\u516c\u5f00\u57fa\u51c6\u4e0a\u53d6\u5f97\u663e\u8457\u63d0\u5347\uff0c\u5e76\u5f97\u51fa\u6838\u5fc3\u7ed3\u8bba\uff1a\u9a8c\u8bc1\u5fc5\u987b\u4e0e\u751f\u6210\u5668\u80fd\u529b\u534f\u540c\u8fdb\u5316"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u5f3a\u5316\u5b66\u4e60", "\u5956\u52b1\u8bbe\u8ba1"], "num_comments"
