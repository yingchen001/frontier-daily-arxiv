u4e2a\u6765\u81ea\u5f00\u6e90\u9879\u76ee\u7684\u4e13\u5bb6\u7ea7\u6027\u80fd\u4f18\u5316\u4efb\u52a1\uff0c\u8bc4\u4f30LLM\u5728\u771f\u5b9e\u4ee3\u7801\u5e93\u4e2d\u7684\u8fd0\u884c\u65f6\u95f4\u4e0e\u5185\u5b58\u4f18\u5316\u80fd\u529b\u3002\u5b9e\u9a8c\u8868\u660e\u5f53\u524dLLM\u8868\u73b0\u6781\u5dee\uff0c\u800c\u4e13\u5bb6\u5b9e\u73b0\u5e73\u5747\u52a0\u901f15.5\u500d\u3001\u5185\u5b58\u5cf0\u503c\u964d\u4f4e171.3\u500d\uff0c\u63ed\u793a\u4e86LLM\u4e0e\u4e13\u5bb6\u5de5\u7a0b\u80fd\u529b\u4e4b\u95f4\u7684\u5de8\u5927\u5dee\u8ddd\u3002", "categories": ["cs.SE", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25530", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4ee3\u7801\u4f18\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "\u57fa\u51c6\u6d4b\u8bd5", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25530v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Evaluating LLMs on Real-World Software Performance Optimization", "tldr": "\u63d0\u51faSWE-Pro\u57fa\u51c6\u6d4b\u8bd5\uff0c\u5305\u542b102\u4e2a\u6765\u81ea\u5f00\u6e90\u9879\u76ee\u7684\u4e13\u5bb6\u7ea7\u6027\u80fd\u4f18\u5316\u4efb\u52a1\uff0c\u8bc4\u4f30LLM\u5728\u771f\u5b9e\u4ee3\u7801\u5e93\u4e2d\u7684\u8fd0\u884c\u65f6\u95f4\u4e0e\u5185\u5b58\u4f18\u5316\u80fd\u529b\u3002\u5b9e\u9a8c\u8868\u660e\u5f53\u524dLLM\u8868\u73b0\u6781\u5dee\uff0c\u800c\u4e13\u5bb6\u5b9e\u73b0\u5e73\u5747\u52a0\u901f15.5\u500d\u3001\u5185\u5b58\u5cf0\u503c\u964d\u4f4e171.3\u500d\uff0c\u63ed\u793a\u4e86LLM\u4e0e\u4e13\u5bb6\u5de5\u7a0b\u80fd\u529b\u4e4b\u95f4\u7684\u5de8\u5927\u5dee\u8ddd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Large language models (LLMs) reach high accuracy in mathematical reasoning, but individual traces on the same problem diverge; some arrive at the correct answer while others fail. Prior work analyzes failure at the step, chunk, or sentence level, or at tokens where failure has already occurred. Neither identifies the precise token that triggers the shift toward failure. We introduce the cliff token, a token where the token-wise potential drops significantly under an adaptive threshold that scales with the local token-wise potential, based on a one-sided two-proportion z-test. Across seven models and three mathematical reasoning benchmarks (GSM1K, MATH500, AIME 2025), cliff tokens act as failure triggers; deleting the first cliff token and resampling recovers pass@64 to 1.0, while keeping it limits recovery to between 0.71 and 1.00. We further introduce a cliff taxonomy of deterministic, uncertain, and sampled-off cliffs, defined by greedy choice and token entropy. Each type has distinct probabilistic characteristics, and the taxonomy generalizes across model scales. Finally, we validate the taxonomy via single-token preference optimization at cliff positions (Cliff-DPO). Trained on GSM8K, Cliff-DPO improves accuracy across benchmarks by up to +6.6. Optimizing at uncertain and sampled-off cliffs improves reasoning, while deterministic cliffs do not.", "arxiv_id": "2606.25524", "arxiv_url": "https://arxiv.org/abs/2606.25524", "authors": ["Jaeyong Ko", "Pilsung Kang", "Yukyung Lee"], "brief": "\u63d0\u51fa\"\u60ac\u5d16token\"\u6982\u5ff5\uff0c\u7528\u81ea\u9002\u5e94\u9608\u503c\u7684z\u68c0\u9a8c\u7cbe\u786e\u5b9a\u4f4dLLM\u6570\u5b66\u63a8\u7406\u4e2d\u89e6\u53d1\u5931\u8d25\u7684\u5355\u4e2atoken\u3002\u5220\u9664\u9996\u4e2a\u60ac\u5d16token\u5e76\u91cd\u91c7\u6837\u53ef\u5c06pass@64\u6062\u590d\u81f31.0\uff1b\u57fa\u4e8e\u60ac\u5d16\u5206\u7c7b\u6cd5\u7684\u5355token\u504f\u597d\u4f18\u5316\uff08Cliff-DPO\uff09\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u63d0\u5347\u51c6\u786e\u7387\u6700\u9ad8\u8fbe+6.6\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25524", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6570\u5b66\u63a8\u7406", "\u5931\u8d25\u5206\u6790", "\u504f\u597d\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25524v2", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Cliff Tokens: Identifying Single-Token Failure Triggers in LLM Mathematical Reasoning", "tldr": "\u63d0\u51fa\"\u60ac\u5d16token\"\u6982\u5ff5\uff0c\u7528\u81ea\u9002\u5e94\u9608\u503c\u7684z\u68c0\u9a8c\u7cbe\u786e\u5b9a\u4f4dLLM\u6570\u5b66\u63a8\u7406\u4e2d\u89e6\u53d1\u5931\u8d25\u7684\u5355\u4e2atoken\u3002\u5220\u9664\u9996\u4e2a\u60ac\u5d16token\u5e76\u91cd\u91c7\u6837\u53ef\u5c06pass@64\u6062\u590d\u81f31.0\uff1b\u57fa\u4e8e\u60ac\u5d16\u5206\u7c7b\u6cd5\u7684\u5355token\u504f\u597d\u4f18\u5316\uff08Cliff-DPO\uff09\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u63d0\u5347\u51c6\u786e\u7387\u6700\u9ad8\u8fbe+6.6\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Almost every paper on LLM jailbreaks and prompt injection reports an attack-success rate (ASR), and that number is assigned not by people but by an automated judge: either a safety classifier trained for the task, or a general chat model prompted to grade. The judge is rarely checked. We check it. Using 596 human-labeled completions from the HarmBench classifier validation set, we compare the two judge families against human majority votes and then attack them. The two families fail in opposite ways. The dedicated classifier over-flags (precision 0.835, recall 0.974); three different LLM-as-judges keep high precision (0.81 to 0.94) but show erratic recall (0.06 to 0.65), so the same responses produce very different ASR depending on which judge scores them. The two families also differ sharply in robustness. Wrappers that leave the harmful text untouched and only add benign framing flip every LLM-judge between 57% and 100% of the time, and a single prepended refusal sentence accounts for much of this (39% to 88%). The dedicated classifier resists these surface attacks (at most 6.7%), but a white-box GCG attack on its open weights flips 70% of confident true positives (21 of 30; 95% CI 54 to 86%) even at a small optimization budget. A two-annotator audit confirms the attacks leave the harm intact: every one of 80 sampled flips still contained the harmful content. Because a large and growing share of reported ASR comes from LLM-judges, many such numbers are unreliable both on average and under deliberate pressure. We recommend that papers report judge precision and recall on a human-labeled slice, report ASR corrected for judge precision, and include an adversarial check of the judge. Our code is released.", "arxiv_id": "2606.25487", "arxiv_url": "https://arxiv.org/abs/2606.25487", "authors": ["Yang Gao"], "brief": "\u672c\u6587\u7cfb\u7edf\u8bc4\u4f30\u4e86LLM\u8d8a\u72f1\u7814\u7a76\u4e2d\u5e7f\u6cdb\u4f7f\u7528\u7684\u81ea\u52a8\u5316\u653b\u51fb\u6210\u529f\u7387\uff08ASR\uff09\u8bc4\u5224\u5668\u7684\u53ef\u9760\u6027\uff0c\u53d1\u73b0\u4e13\u7528\u5206\u7c7b\u5668\u4e0eLLM\u8bc4\u5224\u5668\u5728\u7cbe\u786e\u7387\u548c\u53ec\u56de\u7387\u4e0a\u5b58\u5728\u76f8\u53cd\u7684\u5931\u6548\u6a21\u5f0f\u3002\u5b9e\u9a8c\u8868\u660eLLM\u8bc4\u5224\u5668\u6781\u6613\u88ab\u7b80\u5355\u7684\u826f\u6027\u5305\u88c5\u6587\u672c\u6b3a\u9a97\uff08\u7ffb\u8f6c\u738757%-100%\uff09\uff0c\u800c\u4e13\u7528\u5206\u7c7b\u5668\u867d\u62b5\u6297\u8868\u9762\u653b\u51fb\uff0c\u5374\u5728\u767d\u76d2GCG\u653b\u51fb\u4e0b\u670970%\u7684\u7f6e\u4fe1\u6b63\u4f8b\u88ab\u7ffb\u8f6c\uff0c\u4e14\u6709\u5bb3\u5185\u5bb9\u59cb\u7ec8\u4fdd\u7559\u3002\u4f5c\u8005\u5efa\u8bae\u8bba\u6587\u62a5\u544a\u8bc4\u5224\u5668\u7684\u7cbe\u786e\u7387/\u53ec\u56de\u7387\u5e76\u8fdb\u884c\u5bf9\u6297\u6027\u9a8c\u8bc1\u3002", "categories": ["cs.CL", "cs.CR", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25487", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b\u5b89\u5168", "\u8d8a\u72f1\u653b\u51fb", "\u81ea\u52a8\u8bc4\u4f30", "\u5bf9\u6297\u9c81\u68d2\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25487v2", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "How Reliable Is Your Jailbreak Judge? Calibration and Adversarial Robustness of Automated ASR Scoring", "tldr": "\u672c\u6587\u7cfb\u7edf\u8bc4\u4f30\u4e86LLM\u8d8a\u72f1\u7814\u7a76\u4e2d\u5e7f\u6cdb\u4f7f\u7528\u7684\u81ea\u52a8\u5316\u653b\u51fb\u6210\u529f\u7387\uff08ASR\uff09\u8bc4\u5224\u5668\u7684\u53ef\u9760\u6027\uff0c\u53d1\u73b0\u4e13\u7528\u5206\u7c7b\u5668\u4e0eLLM\u8bc4\u5224\u5668\u5728\u7cbe\u786e\u7387\u548c\u53ec\u56de\u7387\u4e0a\u5b58\u5728\u76f8\u53cd\u7684\u5931\u6548\u6a21\u5f0f\u3002\u5b9e\u9a8c\u8868\u660eLLM\u8bc4\u5224\u5668\u6781\u6613\u88ab\u7b80\u5355\u7684\u826f\u6027\u5305\u88c5\u6587\u672c\u6b3a\u9a97\uff08\u7ffb\u8f6c\u738757%-100%\uff09\uff0c\u800c\u4e13\u7528\u5206\u7c7b\u5668\u867d\u62b5\u6297\u8868\u9762\u653b\u51fb\uff0c\u5374\u5728\u767d\u76d2GCG\u653b\u51fb\u4e0b\u670970%\u7684\u7f6e\u4fe1\u6b63\u4f8b\u88ab\u7ffb\u8f6c\uff0c\u4e14\u6709\u5bb3\u5185\u5bb9\u59cb\u7ec8\u4fdd\u7559\u3002\u4f5c\u8005\u5efa\u8bae\u8bba\u6587\u62a5\u544a\u8bc4\u5224\u5668\u7684\u7cbe\u786e\u7387/\u53ec\u56de\u7387\u5e76\u8fdb\u884c\u5bf9\u6297\u6027\u9a8c\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent studies on world modeling for Large Language Model (LLM) agents typically formulate the learning objective as next-observation prediction. However, this objective ties supervision to what a transition happens to reveal, which may omit the dynamics most relevant to the agent\u0027s current decision. To bridge this gap, we propose Agent-Authored World Modeling (AAWM), a training procedure that constructs supervision from the policy\u0027s own decision needs. Specifically, at each state, the agent identifies what it needs to understand about the environment before acting. These needs drive the retrieval of relevant transition evidence across trajectories, which is then synthesized into training targets that capture decision-oriented dynamics instead of reconstructing the next observation. This aligns the training objective with the dynamics the policy needs before acting, not with the contents of the next observation. Experimental results validate the effectiveness of AAWM across multiple environments and training settings. These results show that decision-aware world-model targets provide a more effective learning signal than next-observation prediction.", "arxiv_id": "2606.25421", "arxiv_url": "https://arxiv.org/abs/2606.25421", "authors": ["Guangfeng Cai", "Kaibing Yang", "Shuo He", "Yu Li", "Shengtian Yang", "Jiaqi Lv", "Lei Feng"], "brief": "\u63d0\u51fa\u667a\u80fd\u4f53\u81ea\u4e3b\u6784\u5efa\u4e16\u754c\u6a21\u578b\u7684\u8bad\u7ec3\u65b9\u6cd5AAWM\uff0c\u5c06\u76d1\u7763\u4fe1\u53f7\u4ece\"\u9884\u6d4b\u4e0b\u4e00\u89c2\u6d4b\"\u8f6c\u53d8\u4e3a\"\u51b3\u7b56\u5bfc\u5411\u7684\u52a8\u6001\u5efa\u6a21\"\u3002\u667a\u80fd\u4f53\u5728\u6bcf\u4e2a\u72b6\u6001\u4e3b\u52a8\u8bc6\u522b\u51b3\u7b56\u6240\u9700\u7684\u73af\u5883\u77e5\u8bc6\uff0c\u68c0\u7d22\u76f8\u5173\u8f68\u8ff9\u8bc1\u636e\u5e76\u5408\u6210\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u591a\u4e2a\u73af\u5883\u4e2d\u4f18\u4e8e\u4f20\u7edf\u4e0b\u4e00\u89c2\u6d4b\u9884\u6d4b\u65b9\u5f0f\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25421", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u4e16\u754c\u6a21\u578b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5e8f\u5217\u51b3\u7b56"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25421v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Beyond Next-Observation Prediction: Agent-Authored World Modeling for Sequential Decision Making", "tldr": "\u63d0\u51fa\u667a\u80fd\u4f53\u81ea\u4e3b\u6784\u5efa\u4e16\u754c\u6a21\u578b\u7684\u8bad\u7ec3\u65b9\u6cd5AAWM\uff0c\u5c06\u76d1\u7763\u4fe1\u53f7\u4ece\"\u9884\u6d4b\u4e0b\u4e00\u89c2\u6d4b\"\u8f6c\u53d8\u4e3a\"\u51b3\u7b56\u5bfc\u5411\u7684\u52a8\u6001\u5efa\u6a21\"\u3002\u667a\u80fd\u4f53\u5728\u6bcf\u4e2a\u72b6\u6001\u4e3b\u52a8\u8bc6\u522b\u51b3\u7b56\u6240\u9700\u7684\u73af\u5883\u77e5\u8bc6\uff0c\u68c0\u7d22\u76f8\u5173\u8f68\u8ff9\u8bc1\u636e\u5e76\u5408\u6210\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u591a\u4e2a\u73af\u5883\u4e2d\u4f18\u4e8e\u4f20\u7edf\u4e0b\u4e00\u89c2\u6d4b\u9884\u6d4b\u65b9\u5f0f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Test-time scaling improves language-model reasoning, but existing approaches often face a difficult trade-off: long chain-of-thought sampling remains single-threaded, while sentence- or solution-level search can be computationally expensive and hard to train end-to-end. We introduce Local Branch Routing (LBR), a token-level test-time scaling framework that expands a small local lookahead tree, forwards all sampled branches through the language model, and uses a lightweight router to select the depth-1 subtree to commit. By routing over the hidden states of candidate local futures, LBR allows each token decision to use evidence beyond the root next-token distribution while avoiding full solution-level search. The resulting prune-shift-grow decoding process preserves discrete branch identities and defines a tractable tree-trajectory likelihood: newly grown nodes are counted when first sampled, and router decisions are assigned explicit probabilities. This enables end-to-end reinforcement learning with verifiable rewards, jointly optimizing the base model and router under the same likelihood-ratio principle as discrete-token RLVR. On synthetic hierarchical-planning tasks, LBR shows that post-candidate hidden states provide useful routing evidence. On mathematical reasoning benchmarks, LBR improves both Pass@1 and Pass@32 over discrete chain-of-thought, vanilla discrete-token RLVR, and RL-compatible soft-token branching baselines. These results suggest that lightweight local branching offers an efficient, trainable, and discrete form of language-model test-time scaling.", "arxiv_id": "2606.25354", "arxiv_url": "https://arxiv.org/abs/2606.25354", "authors": ["Yutong Yin", "Mingyu Jin", "Jin Pan", "Changyi Yang", "Zijie Xia", "Dhruv Pai", "Shuming Hu", "Zhen Zhang", "Chenyang Zhao", "Jinman Zhao", "Wujiang Xu", "Raymond Li", "Xin Eric Wang", "Julian McAuley", "Zhaoran Wang"], "brief": "\u63d0\u51fa\u5c40\u90e8\u5206\u652f\u8def\u7531\uff08LBR\uff09\u6846\u67b6\uff0c\u5728\u63a8\u7406\u65f6\u6784\u5efa\u5c0f\u578b\u5c40\u90e8\u524d\u77bb\u6811\uff0c\u901a\u8fc7\u8f7b\u91cf\u8def\u7531\u5668\u57fa\u4e8e\u5019\u9009\u5206\u652f\u7684\u9690\u85cf\u72b6\u6001\u9009\u62e9\u6700\u4f18\u5b50\u6811\uff0c\u907f\u514d\u4e86\u5168\u89e3\u641c\u7d22\u7684\u9ad8\u4ee3\u4ef7\u3002\u8be5\u65b9\u6cd5\u652f\u6301\u7aef\u5230\u7aef\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u5728\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\u76f8\u6bd4\u94fe\u5f0f\u601d\u7ef4\u548c\u79bb\u6563token RLVR\u5747\u6709\u63d0\u5347\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25354", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6d4b\u8bd5\u65f6\u6269\u5c55", "\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b\u63a8\u7406", "\u6811\u641c\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25354v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Efficient and Trainable Language Model Test-Time Scaling via Local Branch Routing", "tldr": "\u63d0\u51fa\u5c40\u90e8\u5206\u652f\u8def\u7531\uff08LBR\uff09\u6846\u67b6\uff0c\u5728\u63a8\u7406\u65f6\u6784\u5efa\u5c0f\u578b\u5c40\u90e8\u524d\u77bb\u6811\uff0c\u901a\u8fc7\u8f7b\u91cf\u8def\u7531\u5668\u57fa\u4e8e\u5019\u9009\u5206\u652f\u7684\u9690\u85cf\u72b6\u6001\u9009\u62e9\u6700\u4f18\u5b50\u6811\uff0c\u907f\u514d\u4e86\u5168\u89e3\u641c\u7d22\u7684\u9ad8\u4ee3\u4ef7\u3002\u8be5\u65b9\u6cd5\u652f\u6301\u7aef\u5230\u7aef\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\uff0c\u5728\u6570\u5b66\u63a8\u7406\u57fa\u51c6\u4e0a\u76f8\u6bd4\u94fe\u5f0f\u601d\u7ef4\u548c\u79bb\u6563token RLVR\u5747\u6709\u63d0\u5347\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Most unified large multimodal models (LMMs) that support both visual understanding and image generation still rely on curated post-training supervision, such as human annotations, preference labels, or external reward models. We ask whether a unified LMM can improve both abilities autonomously using only unlabeled images. We propose a self-evolving training framework with three internal roles: a Proposer that generates visual questions, a Solver that answers and evaluates them, and a Generator that synthesizes images. Training uses only self-derived consistency signals, without human annotations, preference labels, or task-trained external reward/judge models. To stabilize learning, we introduce Solver Token Entropy (STE), a continuous difficulty signal based on token-level prediction uncertainty that remains useful even when sample-level consistency becomes unreliable. For image generation, we design a multi-scale internal evaluation scheme that combines question-answer fidelity scoring with cycle-consistent captioning. This creates a solver-mediated coupling, where better visual understanding enables more reliable generation assessment and stronger internal training signals. The framework preserves the same role decomposition, reward logic, and training schedule across diffusion-based BLIP3o, rectified-flow BAGEL, and autoregressive VARGPT-v1.1 architectures, requiring only each backbone\u0027s native prompting and generation interface. Across eight understanding metrics, our method consistently improves over the corresponding base models. On BAGEL, it achieves a $+3.5\\%$ absolute gain on MMMU and improves GenEval image generation performance from $82\\%$ to $85\\%$. Code and models are publicly released.", "arxiv_id": "2606.27376", "arxiv_url": "https://arxiv.org/abs/2606.27376", "authors": ["Ritesh Thawkar", "Shravan Venkatraman", "Omkar Thawakar", "Abdelrahman Shaker", "Fahad Khan", "Hisham Cholakkal", "Salman Khan", "Rao Muhammad Anwer"], "brief": "\u63d0\u51fa\u4e00\u79cd\u81ea\u8fdb\u5316\u8bad\u7ec3\u6846\u67b6\uff0c\u8ba9\u7edf\u4e00\u591a\u6a21\u6001\u5927\u6a21\u578b\uff08\u540c\u65f6\u652f\u6301\u89c6\u89c9\u7406\u89e3\u548c\u56fe\u50cf\u751f\u6210\uff09\u4ec5\u51ed\u65e0\u6807\u6ce8\u56fe\u50cf\u81ea\u4e3b\u63d0\u5347\u4e24\u9879\u80fd\u529b\u3002\u6846\u67b6\u8bbe\u8ba1\u63d0\u95ee\u8005\u3001\u6c42\u89e3\u8005\u3001\u751f\u6210\u8005\u4e09\u4e2a\u5185\u90e8\u89d2\u8272\uff0c\u5229\u7528\u81ea\u6d3d\u6027\u5956\u52b1\u4fe1\u53f7\u66ff\u4ee3\u4eba\u5de5\u6807\u6ce8\u6216\u5916\u90e8\u5956\u52b1\u6a21\u578b\uff0c\u5728\u591a\u4e2a\u67b6\u6784\u4e0a\u5747\u53d6\u5f97\u7a33\u5b9a\u63d0\u5347\uff0cBAGEL\u5728MMMU\u4e0a\u7edd\u5bf9\u63d0\u53473.5%\uff0cGenEval\u4ece82%\u5347\u81f385%\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27376", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u56fe\u50cf\u751f\u6210", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27376v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Ask, Solve, Generate: Self-Evolving Unified Multimodal Understanding and Generation via Self-Consistency Rewards", "tldr": "\u63d0\u51fa\u4e00\u79cd\u81ea\u8fdb\u5316\u8bad\u7ec3\u6846\u67b6\uff0c\u8ba9\u7edf\u4e00\u591a\u6a21\u6001\u5927\u6a21\u578b\uff08\u540c\u65f6\u652f\u6301\u89c6\u89c9\u7406\u89e3\u548c\u56fe\u50cf\u751f\u6210\uff09\u4ec5\u51ed\u65e0\u6807\u6ce8\u56fe\u50cf\u81ea\u4e3b\u63d0\u5347\u4e24\u9879\u80fd\u529b\u3002\u6846\u67b6\u8bbe\u8ba1\u63d0\u95ee\u8005\u3001\u6c42\u89e3\u8005\u3001\u751f\u6210\u8005\u4e09\u4e2a\u5185\u90e8\u89d2\u8272\uff0c\u5229\u7528\u81ea\u6d3d\u6027\u5956\u52b1\u4fe1\u53f7\u66ff\u4ee3\u4eba\u5de5\u6807\u6ce8\u6216\u5916\u90e8\u5956\u52b1\u6a21\u578b\uff0c\u5728\u591a\u4e2a\u67b6\u6784\u4e0a\u5747\u53d6\u5f97\u7a33\u5b9a\u63d0\u5347\uff0cBAGEL\u5728MMMU\u4e0a\u7edd\u5bf9\u63d0\u53473.5%\uff0cGenEval\u4ece82%\u5347\u81f385%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recently, self-evolving large multimodal models (LMMs) have received attention for improving visual reasoning in a purely unsupervised setting. However, multi-role self-play and self-consistency reward schemes in existing self-evolving LMMs optimize answer agreement without ensuring the decoder attends to visual content, relying instead on statistical language priors to produce self consistent outputs. This leads to a persistent failure mode we term visual under-conditioning, where the decoder relies on language priors rather than the image during generation, manifesting as insufficient attention to visual tokens. As a result, current self-evolving LMMs struggle on vision--language understanding tasks such as image captioning and visual question answering. To address this, we propose VISE (Visual Invariance Self-Evolution), a purely unsupervised self-evolving framework that directly regularizes the model\u0027s visual conditioning policy through two complementary invariance-based rewards: a geometric invariance reward that enforces spatial consistency under known transformations, and a semantic invariance reward that penalizes evidence-agnostic generation by requiring the model to recognize the absence of evidence when predicted regions are perturbed. VISE operates within a single model without specialist roles, external reward models, or annotations, and is trained on raw unlabeled images. Experiments on 18 benchmarks demonstrate the efficacy of our approach. Using Qwen3-VL-2B as the base model, VISE achieves gains of $+16.85$ CIDEr on COCO and $+19.66$ CIDEr on TextCaps, reduces object hallucination by $5.0$ Chair-I points, and generalizes across four model families and scales. Our code and models are available at https://mbzuai-oryx.github.io/VISE", "arxiv_id": "2606.27373", "arxiv_url": "https://arxiv.org/abs/2606.27373", "authors": ["Shravan Venkatraman", "Ritesh Thawkar", "Omkar Thawakar", "Rao Muhammad Anwer", "Hisham Cholakkal", "Salman Khan", "Fahad Khan"], "brief": "\u9488\u5bf9\u81ea\u8fdb\u5316\u591a\u6a21\u6001\u5927\u6a21\u578b\u4e2d\u89c6\u89c9\u6b20\u6761\u4ef6\u5316\u95ee\u9898\uff0c\u63d0\u51faVISE\u6846\u67b6\uff0c\u901a\u8fc7\u51e0\u4f55\u4e0d\u53d8\u6027\u5956\u52b1\u548c\u8bed\u4e49\u4e0d\u53d8\u6027\u5956\u52b1\u4e24\u79cd\u65e0\u76d1\u7763\u673a\u5236\u5f3a\u5316\u6a21\u578b\u5bf9\u89c6\u89c9\u5185\u5bb9\u7684\u5173\u6ce8\u3002\u572818\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u9a8c\u8bc1\u6709\u6548\u6027\uff0c\u56fe\u50cf\u63cf\u8ff0CIDEr\u63d0\u5347\u6700\u9ad819.66\u5206\uff0c\u5e7b\u89c9\u7387\u964d\u4f4e5.0\u4e2a\u767e\u5206\u70b9\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27373", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u81ea\u8fdb\u5316", "\u89c6\u89c9\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27373v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Paying More Attention to Visual Tokens in Self-Evolving Large Multimodal Models", "tldr": "\u9488\u5bf9\u81ea\u8fdb\u5316\u591a\u6a21\u6001\u5927\u6a21\u578b\u4e2d\u89c6\u89c9\u6b20\u6761\u4ef6\u5316\u95ee\u9898\uff0c\u63d0\u51faVISE\u6846\u67b6\uff0c\u901a\u8fc7\u51e0\u4f55\u4e0d\u53d8\u6027\u5956\u52b1\u548c\u8bed\u4e49\u4e0d\u53d8\u6027\u5956\u52b1\u4e24\u79cd\u65e0\u76d1\u7763\u673a\u5236\u5f3a\u5316\u6a21\u578b\u5bf9\u89c6\u89c9\u5185\u5bb9\u7684\u5173\u6ce8\u3002\u572818\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u9a8c\u8bc1\u6709\u6548\u6027\uff0c\u56fe\u50cf\u63cf\u8ff0CIDEr\u63d0\u5347\u6700\u9ad819.66\u5206\uff0c\u5e7b\u89c9\u7387\u964d\u4f4e5.0\u4e2a\u767e\u5206\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reasoning in multimodal large language models (MLLMs) has shown strong promise in medical imaging. However, this reasoning is usually free-form text judged only by its final answer, making it hard to interpret and verify, especially in 3D radiology, where a diagnosis should be traceable to evidence in the scan. Existing chest CT question-answering datasets compound this by reducing expert radiology reports to answer-only pairs, dropping the reasoning that links findings to conclusions and omitting the patient history clinicians rely on. As a result, reasoning-capable 3D chest CT MLLMs remain out of reach, as neither the structured supervision needed to train them nor the protocol needed to verify their reasoning yet exists. We introduce CORTEX (Clinically Organized Reasoning and sTructured EXplanation), a structured reasoning benchmark for 3D chest CT. For each question, CORTEX restores the missing reasoning as a four-stage diagnostic trace mirroring a radiologist\u0027s workflow: task understanding, visual observation, diagnostic reasoning, and answer synthesis. We generate these traces using frontier large language models with broad medical and general-domain knowledge, then filter and verify them with a stage-level evaluation protocol combining automated rubric scoring with expert radiologist review. Crucially, both the reasoning structure and evaluation rubrics are designed in close collaboration with clinicians. Built on CT-RATE, a large, publicly available chest CT dataset without reasoning annotations, CORTEX comprises 76,177 validated reasoning traces across open-ended VQA, closed-ended VQA, and report generation, providing both the structured supervision and the stage-level evaluation protocol needed to build and evaluate trustworthy reasoning models for 3D chest CT. Our dataset and evaluation code will be made publicly available upon acceptance.", "arxiv_id": "2606.27264", "arxiv_url": "https://arxiv.org/abs/2606.27264", "authors": ["Hashmat Shadab Malik", "Anees Ur Rehman Hashmi", "Numan Saeed", "Muzammal Naseer", "Salman Khan", "Christoph Lippert"], "brief": "\u63d0\u51faCORTEX\u57fa\u51c6\uff0c\u4e3a3D\u80f8\u90e8CT\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u63d0\u4f9b\u7ed3\u6784\u5316\u63a8\u7406\u6807\u6ce8\uff0c\u5c06\u8bca\u65ad\u8fc7\u7a0b\u5206\u89e3\u4e3a\u4efb\u52a1\u7406\u89e3\u3001\u89c6\u89c9\u89c2\u5bdf\u3001\u8bca\u65ad\u63a8\u7406\u548c\u7b54\u6848\u7efc\u5408\u56db\u9636\u6bb5\u3002\u57fa\u4e8eCT-RATE\u6570\u636e\u96c6\u751f\u621076,177\u6761\u7ecf\u4e13\u4e1a\u653e\u5c04\u79d1\u533b\u751f\u9a8c\u8bc1\u7684\u63a8\u7406\u8f68\u8ff9\uff0c\u586b\u8865\u4e86\u53ef\u4fe13D\u653e\u5c04\u5f71\u50cf\u63a8\u7406\u6a21\u578b\u5728\u8bad\u7ec3\u76d1\u7763\u548c\u8bc4\u4f30\u534f\u8bae\u4e0a\u7684\u7a7a\u767d\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27264", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u533b\u5b66\u5f71\u50cf", "\u7ed3\u6784\u5316\u63a8\u7406", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27264v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CORTEX: A Structured Reasoning Benchmark for Trustworthy 3D Chest CT MLLMs", "tldr": "\u63d0\u51faCORTEX\u57fa\u51c6\uff0c\u4e3a3D\u80f8\u90e8CT\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u63d0\u4f9b\u7ed3\u6784\u5316\u63a8\u7406\u6807\u6ce8\uff0c\u5c06\u8bca\u65ad\u8fc7\u7a0b\u5206\u89e3\u4e3a\u4efb\u52a1\u7406\u89e3\u3001\u89c6\u89c9\u89c2\u5bdf\u3001\u8bca\u65ad\u63a8\u7406\u548c\u7b54\u6848\u7efc\u5408\u56db\u9636\u6bb5\u3002\u57fa\u4e8eCT-RATE\u6570\u636e\u96c6\u751f\u621076,177\u6761\u7ecf\u4e13\u4e1a\u653e\u5c04\u79d1\u533b\u751f\u9a8c\u8bc1\u7684\u63a8\u7406\u8f68\u8ff9\uff0c\u586b\u8865\u4e86\u53ef\u4fe13D\u653e\u5c04\u5f71\u50cf\u63a8\u7406\u6a21\u578b\u5728\u8bad\u7ec3\u76d1\u7763\u548c\u8bc4\u4f30\u534f\u8bae\u4e0a\u7684\u7a7a\u767d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Unified multimodal models capable of both understanding and generation have achieved remarkable strides. However, despite their unified designs, existing evaluations typically assess understanding and generation capabilities in isolation, overlooking the synergy between comprehension and generation. To bridge this gap, we introduce Unison, a comprehensive benchmark comprising 2,169 high-quality unified task samples, designed to evaluate joint understanding and generation in unified multimodal models. Unison offers three key strengths: 1) Comprehensive Dimensions: Unison encompasses internal consistency, understanding-guided generation, generation-guided understanding, and mutual enhancement to enable holistic evaluation. 2) Diagnostic Evaluation: it provides both unified and decoupled tracks for understanding and generation, allowing fine-grained attribution of failure modes and quantitative analysis of the gains from unified modeling. 3) Human Alignment: we also introduce Unison-Judge, an evaluation model well aligned with human judgments to ensure reliable assessment. Based on systematic evaluations of state-of-the-art models on Unison, we uncover critical limitations in current unified multimodal systems and highlight promising directions for future research. Codes, Unison and Unison-Judge are publicly available at https://github.com/FudanCVL/Unison.", "arxiv_id": "2606.26984", "arxiv_url": "https://arxiv.org/abs/2606.26984", "authors": ["Jinyu Liu", "Xincheng Shuai", "Henghui Ding", "Yu-Gang Jiang"], "brief": "\u63d0\u51faUnison\u57fa\u51c6\u6d4b\u8bd5\uff0c\u5305\u542b2169\u4e2a\u9ad8\u8d28\u91cf\u6837\u672c\uff0c\u4e13\u95e8\u8bc4\u4f30\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578b\u4e2d\u7406\u89e3\u4e0e\u751f\u6210\u7684\u534f\u540c\u80fd\u529b\u3002\u901a\u8fc7\u5185\u90e8\u4e00\u81f4\u6027\u3001\u7406\u89e3\u5f15\u5bfc\u751f\u6210\u7b49\u56db\u4e2a\u7ef4\u5ea6\uff0c\u914d\u5408\u4eba\u7c7b\u5bf9\u9f50\u7684\u8bc4\u4f30\u6a21\u578bUnison-Judge\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u7edf\u4e00\u591a\u6a21\u6001\u7cfb\u7edf\u7684\u5173\u952e\u5c40\u9650\u6027\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26984", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u57fa\u51c6\u6d4b\u8bd5", "\u7edf\u4e00\u6a21\u578b", "\u56fe\u50cf\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26984v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Unison: Benchmarking Unified Multimodal Models via Synergistic Understanding and Generation", "tldr": "\u63d0\u51faUnison\u57fa\u51c6\u6d4b\u8bd5\uff0c\u5305\u542b2169\u4e2a\u9ad8\u8d28\u91cf\u6837\u672c\uff0c\u4e13\u95e8\u8bc4\u4f30\u7edf\u4e00\u591a\u6a21\u6001\u6a21\u578b\u4e2d\u7406\u89e3\u4e0e\u751f\u6210\u7684\u534f\u540c\u80fd\u529b\u3002\u901a\u8fc7\u5185\u90e8\u4e00\u81f4\u6027\u3001\u7406\u89e3\u5f15\u5bfc\u751f\u6210\u7b49\u56db\u4e2a\u7ef4\u5ea6\uff0c\u914d\u5408\u4eba\u7c7b\u5bf9\u9f50\u7684\u8bc4\u4f30\u6a21\u578bUnison-Judge\uff0c\u63ed\u793a\u4e86\u5f53\u524d\u7edf\u4e00\u591a\u6a21\u6001\u7cfb\u7edf\u7684\u5173\u952e\u5c40\u9650\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent game world models can synthesize visually plausible, action-conditioned rollouts. However, their interaction behaviors often remain limited to exploratory or wandering trajectories, and physical dynamics are typically learned as implicit correlations from data rather than as controllable variables. This limitation hinders their applicability to authored game environments, where physical rules are deliberately designed and require explicit manipulation. We introduce PhysEditWorld, a multimodal dataset with physical parameters, with a primary focus on gravity in this initial version. At its core, PhysEditWorld is built upon a replay paradigm implemented with a UE5 replay-and-rendering pipeline. Each scenario records a normalized action trace and replays the same initial state, character controller, action sequence, and camera policy under multiple gravity configurations, enabling controlled and attributable physical variation. PhysEditWorld contains 12 cinematic UE5 scenes, over 100 hours of gameplay interactions, and more than 60 million rendered rollout frames. Each sample provides synchronized multimodal signals, including RGB, depth, normals, audio, action traces, camera trajectory, engine states, semantic annotations, and explicit gravity labels. We further conduct initial utility studies on both generative video models and world understanding models, demonstrating that PhysEditWorld enables improved gravity-faithful dynamics modeling, enhances consistency under physical edits, and provides a scalable foundation for controllable world modeling research.", "arxiv_id": "2606.26694", "arxiv_url": "https://arxiv.org/abs/2606.26694", "authors": ["Bin Hu", "Yanwen Ma", "Jiehui Huang", "Ziliang Zhang", "Haoning Wu", "Ruicheng Zhang", "Yaokun Li", "Zijun Wang", "Yuechen Zhang", "Chun-Mei Tseng", "Hanhui Li", "Shengju Qian", "Jun Zhou", "Kaipeng Zhang", "Xiaodan Liang", "Jiaya Jia", "Xiu Li"], "brief": "\u63d0\u51faPhysEditWorld\uff0c\u4e00\u4e2a\u57fa\u4e8eUE5\u91cd\u653e\u6e32\u67d3\u7ba1\u7ebf\u6784\u5efa\u7684\u5927\u89c4\u6a21\u591a\u6a21\u6001\u6570\u636e\u96c6\uff0c\u4e13\u6ce8\u4e8e\u7269\u7406\u53c2\u6570\uff08\u5c24\u5176\u662f\u91cd\u529b\uff09\u53ef\u7f16\u8f91\u7684\u4e16\u754c\u6a21\u578b\u7814\u7a76\u3002\u6570\u636e\u96c6\u5305\u542b12\u4e2a\u573a\u666f\u3001\u8d85100\u5c0f\u65f6\u6e38\u620f\u4ea4\u4e92\u548c6000\u4e07\u5e27\u6e32\u67d3\u753b\u9762\uff0c\u901a\u8fc7\u5728\u76f8\u540c\u521d\u59cb\u72b6\u6001\u4e0b\u4ee5\u4e0d\u540c\u91cd\u529b\u914d\u7f6e\u91cd\u653e\u52a8\u4f5c\u5e8f\u5217\u5b9e\u73b0\u53d7\u63a7\u7269\u7406\u53d8\u91cf\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u6570\u636e\u96c6\u80fd\u63d0\u5347\u751f\u6210\u89c6\u9891\u6a21\u578b\u7684\u91cd\u529b\u52a8\u6001\u5efa\u6a21\u4fdd\u771f\u5ea6\uff0c\u4e3a\u53ef\u63a7\u4e16\u754c\u6a21\u578b\u7814\u7a76\u63d0\u4f9b\u53ef\u6269\u5c55\u57fa\u7840\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26694", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u591a\u6a21\u6001\u6570\u636e\u96c6", "\u7269\u7406\u4eff\u771f", "\u89c6\u9891\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26694v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PhysEditWorld: A Large-Scale Dataset Toward Physics-Editable World Models", "tldr": "\u63d0\u51faPhysEditWorld\uff0c\u4e00\u4e2a\u57fa\u4e8eUE5\u91cd\u653e\u6e32\u67d3\u7ba1\u7ebf\u6784\u5efa\u7684\u5927\u89c4\u6a21\u591a\u6a21\u6001\u6570\u636e\u96c6\uff0c\u4e13\u6ce8\u4e8e\u7269\u7406\u53c2\u6570\uff08\u5c24\u5176\u662f\u91cd\u529b\uff09\u53ef\u7f16\u8f91\u7684\u4e16\u754c\u6a21\u578b\u7814\u7a76\u3002\u6570\u636e\u96c6\u5305\u542b12\u4e2a\u573a\u666f\u3001\u8d85100\u5c0f\u65f6\u6e38\u620f\u4ea4\u4e92\u548c6000\u4e07\u5e27\u6e32\u67d3\u753b\u9762\uff0c\u901a\u8fc7\u5728\u76f8\u540c\u521d\u59cb\u72b6\u6001\u4e0b\u4ee5\u4e0d\u540c\u91cd\u529b\u914d\u7f6e\u91cd\u653e\u52a8\u4f5c\u5e8f\u5217\u5b9e\u73b0\u53d7\u63a7\u7269\u7406\u53d8\u91cf\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u6570\u636e\u96c6\u80fd\u63d0\u5347\u751f\u6210\u89c6\u9891\u6a21\u578b\u7684\u91cd\u529b\u52a8\u6001\u5efa\u6a21\u4fdd\u771f\u5ea6\uff0c\u4e3a\u53ef\u63a7\u4e16\u754c\u6a21\u578b\u7814\u7a76\u63d0\u4f9b\u53ef\u6269\u5c55\u57fa\u7840\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Interleaved multimodal reasoning improves visual grounding by revisiting visual evidence during multi-step generation, yet existing methods typically rely on token replay, repeatedly forwarding selected visual tokens. A natural shortcut is to reuse the historical visual key-value (KV) cache directly. However, we identify a critical failure mode of this strategy: cached visual keys are already bound to their original positional context. Such stale positional binding distorts attention under later decoding contexts and can trigger severe autoregressive decoding collapse. This failure suggests that effective cache reuse requires reconstructing visual evidence under positions compatible with the current decoding state, rather than directly copying position-bound historical cache entries. To this end, we propose Position Rebinding Cache Reuse (PRCR), a cache-level framework for replay-free visual revisiting. PRCR stores raw visual KV cache together with their original spatial coordinates, then reassigns position-compatible coordinates to select entries and rebinds their keys before injecting the reconstructed cache into the active decoder cache. This design reuses historical visual evidence while preserving textual positional continuity and relative visual structure. Experiments across multiple multimodal reasoning benchmarks show that PRCR achieves replay-level or better performance, improving average accuracy by 5 percent and reducing visual-revisiting computation by up to tens of thousands of times.", "arxiv_id": "2606.26631", "arxiv_url": "https://arxiv.org/abs/2606.26631", "authors": ["Mengzhao Wang", "Yanli Ji", "Wangmeng Zuo", "Peng Ye", "Chongjun Tu"], "brief": "\u591a\u6b65\u591a\u6a21\u6001\u63a8\u7406\u4e2d\u53cd\u590d\u91cd\u653e\u89c6\u89c9token\u8ba1\u7b97\u5f00\u9500\u5927\uff0c\u672c\u6587\u63d0\u51faPRCR\u6846\u67b6\uff0c\u901a\u8fc7\u5bf9\u5386\u53f2KV\u7f13\u5b58\u91cd\u65b0\u7ed1\u5b9a\u4f4d\u7f6e\u5750\u6807\u6765\u590d\u7528\u89c6\u89c9\u8bc1\u636e\uff0c\u907f\u514dtoken\u91cd\u653e\u3002\u5b9e\u9a8c\u8868\u660ePRCR\u5728\u591a\u4e2a\u591a\u6a21\u6001\u63a8\u7406\u57fa\u51c6\u4e0a\u5e73\u5747\u51c6\u786e\u7387\u63d0\u53475%\uff0c\u540c\u65f6\u5c06\u89c6\u89c9\u91cd\u8bbf\u8ba1\u7b97\u91cf\u964d\u4f4e\u6570\u4e07\u500d\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26631", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "KV\u7f13\u5b58", "\u89c6\u89c9\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26631v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Position Rebinding Cache Reuse: Replay-Free Visual Revisiting for Interleaved Multimodal Reasoning", "tldr": "\u591a\u6b65\u591a\u6a21\u6001\u63a8\u7406\u4e2d\u53cd\u590d\u91cd\u653e\u89c6\u89c9token\u8ba1\u7b97\u5f00\u9500\u5927\uff0c\u672c\u6587\u63d0\u51faPRCR\u6846\u67b6\uff0c\u901a\u8fc7\u5bf9\u5386\u53f2KV\u7f13\u5b58\u91cd\u65b0\u7ed1\u5b9a\u4f4d\u7f6e\u5750\u6807\u6765\u590d\u7528\u89c6\u89c9\u8bc1\u636e\uff0c\u907f\u514dtoken\u91cd\u653e\u3002\u5b9e\u9a8c\u8868\u660ePRCR\u5728\u591a\u4e2a\u591a\u6a21\u6001\u63a8\u7406\u57fa\u51c6\u4e0a\u5e73\u5747\u51c6\u786e\u7387\u63d0\u53475%\uff0c\u540c\u65f6\u5c06\u89c6\u89c9\u91cd\u8bbf\u8ba1\u7b97\u91cf\u964d\u4f4e\u6570\u4e07\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "While instruction-based image editing, enabled by multi-modal generative models, has advanced significantly, existing benchmarks lack a comprehensive evaluation of physics-based reasoning, a critical capability for handling real-world scenarios. To address this, we introduce PhyEditBench, a benchmark designed to assess the physical understanding of editing models. Guided by a hierarchical taxonomy, we establish 4 primary classes and 12 subclasses. It comprises 238 high-quality, high-resolution, real-world instances meticulously extracted from videos to capture authentic physical dynamics, alongside 35 synthetic Anti-Physics instances. Our empirical analysis of current SOTA editing methods exposes substantial limitations in their physics-based reasoning. We further propose a training-free baseline named PhyWorld that uses test-time scaling and a latent reduction strategy. PhyWorld outperforms comparable models and suggests that the video generation process can effectively serve as a reasoning mechanism for image editing. The project page is available at https://github.com/Previsior/PhyEditBench.", "arxiv_id": "2606.26551", "arxiv_url": "https://arxiv.org/abs/2606.26551", "authors": ["Shengbin Guo", "Shaokang He", "Chaoyue Meng", "Shengpeng Xiao", "Xunzhi Xiang", "Shaofeng Zhang", "Qi Fan"], "brief": "\u63d0\u51faPhyEditBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u56fe\u50cf\u7f16\u8f91\u6a21\u578b\u7684\u7269\u7406\u63a8\u7406\u80fd\u529b\uff0c\u5305\u542b238\u4e2a\u771f\u5b9e\u4e16\u754c\u5b9e\u4f8b\u548c35\u4e2a\u53cd\u7269\u7406\u5408\u6210\u5b9e\u4f8b\uff1b\u540c\u65f6\u63d0\u51fa\u65e0\u9700\u8bad\u7ec3\u7684\u57fa\u7ebf\u65b9\u6cd5PhyWorld\uff0c\u5229\u7528\u6d4b\u8bd5\u65f6\u7f29\u653e\u548c\u6f5c\u5728\u538b\u7f29\u7b56\u7565\uff0c\u501f\u52a9\u89c6\u9891\u751f\u6210\u8fc7\u7a0b\u5b9e\u73b0\u7269\u7406\u611f\u77e5\u56fe\u50cf\u7f16\u8f91\uff0c\u6027\u80fd\u4f18\u4e8e\u540c\u7c7b\u6a21\u578b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26551", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u56fe\u50cf\u7f16\u8f91", "\u7269\u7406\u63a8\u7406", "\u591a\u6a21\u6001", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26551v1", "published_at": "2026-06-25", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PhyEditBench: A Real-World Multi-Stage Benchmark for Physics-Aware Image Editing", "tldr": "\u63d0\u51faPhyEditBench\u57fa\u51c6\uff0c\u4e13\u95e8\u8bc4\u4f30\u56fe\u50cf\u7f16\u8f91\u6a21\u578b\u7684\u7269\u7406\u63a8\u7406\u80fd\u529b\uff0c\u5305\u542b238\u4e2a\u771f\u5b9e\u4e16\u754c\u5b9e\u4f8b\u548c35\u4e2a\u53cd\u7269\u7406\u5408\u6210\u5b9e\u4f8b\uff1b\u540c\u65f6\u63d0\u51fa\u65e0\u9700\u8bad\u7ec3\u7684\u57fa\u7ebf\u65b9\u6cd5PhyWorld\uff0c\u5229\u7528\u6d4b\u8bd5\u65f6\u7f29\u653e\u548c\u6f5c\u5728\u538b\u7f29\u7b56\u7565\uff0c\u501f\u52a9\u89c6\u9891\u751f\u6210\u8fc7\u7a0b\u5b9e\u73b0\u7269\u7406\u611f\u77e5\u56fe\u50cf\u7f16\u8f91\uff0c\u6027\u80fd\u4f18\u4e8e\u540c\u7c7b\u6a21\u578b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present a self-supervised framework for learning implicit 3D physical dynamics directly from video-derived supervisory signals. While current generative video models achieve high visual fidelity, they lack a 3D geometric foundation, often resulting in physical inconsistencies and a failure to maintain object permanence. We address this by shifting the predictive bottleneck from 2D image space to a `lifted\u0027 3D Volumetric Latent Space. Our method unprojects semantic features from a Video Joint-Embedding Predictive Architecture (V-JEPA) into a voxelized grid, grounded by monocular depth priors. This lifting enables a Volumetric Feature Advection to learn an action-conditioned transition operator that treats physics as a spatio-temporal state advection problem, i.e., learn implicit 3D physics. Unlike state-of-the-art hybrid models that rely on explicit classical simulators for training and/or inference, our architecture tracks material states implicitly within high-dimensional V-JEPA features. This allows for the emergent simulation of heterogeneous phenomena (e.g., rigid body motion in fluid flow) within a single, unified pipeline. Supervised solely via end-to-end video-derived signal plus action conditions, without access to physics engine internal states, labels, or surrogate models, our model demonstrates good long-term structural stability and physical plausibility on multiple benchmarks (CLEVERER, PhysInOne, PhysGaia). We believe that this work opens a scalable pathway toward general-purpose dynamic world models that internalize the 3D invariants of the physical world solely through passive observation of monocular videos.", "arxiv_id": "2606.26410", "arxiv_url": "https://arxiv.org/abs/2606.26410", "authors": ["Zican Wang", "Niloy Mitra"], "brief": "\u63d0\u51fa\u4e00\u79cd\u81ea\u76d1\u7763\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u8bed\u4e49\u7279\u5f81\u53cd\u6295\u5f71\u5230\u4f53\u7d20\u53163D\u6f5c\u7a7a\u95f4\uff0c\u901a\u8fc7\u4f53\u79ef\u7279\u5f81\u5e73\u6d41\u5b66\u4e60\u9690\u5f0f3D\u7269\u7406\u52a8\u529b\u5b66\u3002\u65e0\u9700\u7269\u7406\u5f15\u64ce\u6807\u6ce8\uff0c\u4ec5\u51ed\u5355\u76ee\u89c6\u9891\u76d1\u7763\u4fe1\u53f7\u5373\u53ef\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u5b9e\u73b0\u826f\u597d\u7684\u957f\u671f\u7ed3\u6784\u7a33\u5b9a\u6027\u548c\u7269\u7406\u5408\u7406\u6027\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26410", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "3D\u7269\u7406\u6a21\u62df", "\u81ea\u76d1\u7763\u5b66\u4e60", "\u89c6\u9891\u7406\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26410v1", "published_at": "2026-06-24", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Neural Voxel Dynamics: Learning Implicit 3D Physics via Volumetric Feature Advection", "tldr": "\u63d0\u51fa\u4e00\u79cd\u81ea\u76d1\u7763\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u8bed\u4e49\u7279\u5f81\u53cd\u6295\u5f71\u5230\u4f53\u7d20\u53163D\u6f5c\u7a7a\u95f4\uff0c\u901a\u8fc7\u4f53\u79ef\u7279\u5f81\u5e73\u6d41\u5b66\u4e60\u9690\u5f0f3D\u7269\u7406\u52a8\u529b\u5b66\u3002\u65e0\u9700\u7269\u7406\u5f15\u64ce\u6807\u6ce8\uff0c\u4ec5\u51ed\u5355\u76ee\u89c6\u9891\u76d1\u7763\u4fe1\u53f7\u5373\u53ef\u5728\u591a\u4e2a\u57fa\u51c6\u4e0a\u5b9e\u73b0\u826f\u597d\u7684\u957f\u671f\u7ed3\u6784\u7a33\u5b9a\u6027\u548c\u7269\u7406\u5408\u7406\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
