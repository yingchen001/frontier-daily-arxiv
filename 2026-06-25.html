: 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26300v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "The Verification Horizon: No Silver Bullet for Coding Agent Rewards", "tldr": "\u7f16\u7801\u667a\u80fd\u4f53\u7684\u9a8c\u8bc1\u6bd4\u751f\u6210\u66f4\u96be\uff0c\u65e0\u5355\u4e00\u5956\u52b1\u51fd\u6570\u80fd\u6301\u7eed\u6709\u6548", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u5206\u6790\u7f16\u7801\u667a\u80fd\u4f53\u8bad\u7ec3\u4e2d\u9a8c\u8bc1\u4fe1\u53f7\u7684\u6838\u5fc3\u6311\u6218\uff0c\u63d0\u51fa\u4ece\u53ef\u6269\u5c55\u6027\u3001\u5fe0\u5b9e\u6027\u3001\u9c81\u68d2\u6027\u4e09\u7ef4\u5ea6\u8bc4\u4f30\u9a8c\u8bc1\u8d28\u91cf\uff0c\u5e76\u7814\u7a76\u56db\u7c7b\u5956\u52b1\u6784\u5efa\u65b9\u6848\uff08\u6d4b\u8bd5\u9a8c\u8bc1\u5668\u3001\u8bc4\u5206\u6807\u51c6\u9a8c\u8bc1\u5668\u3001\u7528\u6237\u9a8c\u8bc1\u3001\u81ea\u52a8\u5316\u667a\u80fd\u4f53\u9a8c\u8bc1\u5668\uff09\u3002", "why_notable": "\u968f\u7740LLM\u63a8\u7406\u80fd\u529b\u589e\u5f3a\uff0c\u9a8c\u8bc1\u74f6\u9888\u6b63\u53d6\u4ee3\u751f\u6210\u74f6\u9888\u6210\u4e3a\u7f16\u7801\u667a\u80fd\u4f53\u7684\u6838\u5fc3\u96be\u9898\uff1b\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u8be5\u95ee\u9898\u6846\u67b6\u5316\u5e76\u63d0\u4f9b\u591a\u573a\u666f\u5b9e\u8bc1\u5206\u6790\uff0c\u5bf9RL\u8bad\u7ec3\u5956\u52b1\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "Vision-Language-Action (VLA) models are often constrained by the imitation ceiling imposed by sub-optimal data. While Reinforcement Learning (RL) fine-tuning can surpass this limit, it is notoriously sample inefficient. This challenge arises from two core issues: (1) catastrophic initial unlearning due to an unstable Q-function and (2) inefficient policy updates caused by low-quality exploration data, often forcing a reliance on costly human interventions. We introduce FORCE, a 3-stage framework that stabilizes fine-tuning by tackling both issues. FORCE first incorporates a Value-Calibrated Warm-Up phase, utilizing on-policy rollouts to mitigate the distributional shift of the Q-function. Subsequently, during the online stage, this calibrated Q-function acts as a filter for both the policy\u0027s own action proposals and expert data, ensuring only high-value actions are used for the policy update. We evaluate FORCE on various simulation and real-world tasks, and the result shows that FORCE achieves a 79% absolute improvement in success rates and outperform prior RL methods by 10%, while accelerating training by 32.5%. Critically, it mitigates the common success rate drop and achieves this robust performance without human intervention, marking a significant step towards deploying capable and autonomous robotic agents.", "arxiv_id": "2606.26006", "arxiv_url": "https://arxiv.org/abs/2606.26006", "authors": ["Shuyi Zhang", "Yunfan Lou", "Hongyang Cheng", "Yichen Guo", "Chuyao Fu", "Yaoxu Lyu", "Xiaojie Zhang", "Haoran Li", "Pengwei Wang", "Zhongyuan Wang", "Shanghang Zhang"], "brief": "\u63d0\u51faFORCE\u4e09\u9636\u6bb5\u6846\u67b6\uff0c\u901a\u8fc7\u4ef7\u503c\u6821\u51c6\u9884\u70ed\uff08Value-Calibrated Warm-Up\uff09\u548cQ\u51fd\u6570\u8fc7\u6ee4\u673a\u5236\uff0c\u89e3\u51b3VLA\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u4e2d\u7684\u707e\u96be\u6027\u9057\u5fd8\u548c\u4f4e\u8d28\u91cf\u63a2\u7d22\u95ee\u9898\uff0c\u65e0\u9700\u4eba\u5de5\u5e72\u9884\u5373\u53ef\u9ad8\u6548\u63d0\u5347\u673a\u5668\u4eba\u64cd\u4f5c\u7b56\u7565\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26006", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u9636\u6bb5\u6846\u67b6\uff1a\u4ef7\u503c\u6821\u51c6\u9884\u70ed\u2192\u5728\u7ebfRL\u5fae\u8c03\u2192\u81ea\u84b8\u998f\uff0c\u5229\u7528on-policy rollout\u7f13\u89e3Q\u51fd\u6570\u5206\u5e03\u504f\u79fb", "\u6821\u51c6\u540e\u7684Q\u51fd\u6570\u540c\u65f6\u8fc7\u6ee4\u7b56\u7565\u81ea\u8eab\u52a8\u4f5c\u63d0\u6848\u548c\u4e13\u5bb6\u6570\u636e\uff0c\u4ec5\u4fdd\u7559\u9ad8\u4ef7\u503c\u52a8\u4f5c\u7528\u4e8e\u7b56\u7565\u66f4\u65b0", "\u5728\u4eff\u771f\u548c\u771f\u5b9e\u4efb\u52a1\u4e0a\u6210\u529f\u7387\u7edd\u5bf9\u63d0\u534779%\uff0c\u8d85\u8d8a\u5148\u524dRL\u65b9\u6cd510%\uff0c\u8bad\u7ec3\u901f\u5ea6\u52a0\u5feb32.5%\uff0c\u4e14\u65e0\u9700\u4eba\u5de5\u5e72\u9884"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u673a\u5668\u4eba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26006v1", "published_at": "2026-06-24", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "FORCE: Efficient VLA Reinforcement Fine-Tuning via Value-Calibrated Warm-up and Self-Distillation", "tldr": "FORCE\u6846\u67b6\u901a\u8fc7\u4ef7\u503c\u6821\u51c6\u9884\u70ed\u4e0e\u81ea\u84b8\u998f\uff0c\u5927\u5e45\u63d0\u5347VLA\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faFORCE\u4e09\u9636\u6bb5\u6846\u67b6\uff0c\u901a\u8fc7\u4ef7\u503c\u6821\u51c6\u9884\u70ed\uff08Value-Calibrated Warm-Up\uff09\u548cQ\u51fd\u6570\u8fc7\u6ee4\u673a\u5236\uff0c\u89e3\u51b3VLA\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u4e2d\u7684\u707e\u96be\u6027\u9057\u5fd8\u548c\u4f4e\u8d28\u91cf\u63a2\u7d22\u95ee\u9898\uff0c\u65e0\u9700\u4eba\u5de5\u5e72\u9884\u5373\u53ef\u9ad8\u6548\u63d0\u5347\u673a\u5668\u4eba\u64cd\u4f5c\u7b56\u7565\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u89e3\u51b3VLA\u5f3a\u5316\u5b66\u4e60\u5fae\u8c03\u7684\u4e24\u5927\u6838\u5fc3\u74f6\u9888\uff08Q\u51fd\u6570\u4e0d\u7a33\u5b9a+\u63a2\u7d22\u6570\u636e\u4f4e\u8d28\u91cf\uff09\uff0c\u5728\u65e0\u4eba\u5de5\u5e72\u9884\u6761\u4ef6\u4e0b\u5b9e\u73b0\u663e\u8457\u6027\u80fd\u63d0\u5347\uff0c\u5bf9\u81ea\u4e3b\u673a\u5668\u4eba\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) for training LLMs typically rely on ground-truth answers to assign rewards, limiting their applicability to tasks where the ground-truth solution is unknown. We introduce a \\textbf{R}anking-\\textbf{i}nduced \\textbf{VER}ifiable framework (RiVER) that trains LLMs on score-based optimization tasks without ground-truth solutions, using deterministic execution feedback as continuous-valued supervision. When applying group-relative RL to such continuous rewards, we identify two key challenges: \\emph{scale dominance}, where uncalibrated score magnitudes across test instances distort policy updates, and \\emph{frequency dominance}, where repeatedly sampled suboptimal solutions can outweigh rare but stronger candidates. RiVER addresses these challenges with calibrated reward shaping that uses instance-wise comparisons and emphasizes top-ranked solvers while retaining bounded feedback for other valid solutions. We train on 12 AtCoder Heuristic Contest tasks and evaluate on Algorithm Engineering Benchmark (ALE-Bench), LiveCodeBench, and USACO. RiVER advances Qwen3-8B and GLM-Z1-9B-0414 by 8.9\\% and 9.4\\% in ALE rating rank. More importantly, despite training exclusively on score-based tasks without any ground-truth solutions, RiVER also improves the backbones across exact-solution benchmarks such as LiveCodeBench and USACO by an absolute average improvement of 2.4\\% and 3.5\\%. By contrast, baselines trained with raw execution scores improve ALE rating but fail to transfer to exact-solution benchmarks. These results suggest that score-based optimization tasks, combined with proper reward calibration, can serve as effective training environments for general coding ability without ground-truth solutions.", "arxiv_id": "2606.27369", "arxiv_url": "https://arxiv.org/abs/2606.27369", "authors": ["Yingyu Lin", "Qiyue Gao", "Nikki Lijing Kuang", "Xunpeng Huang", "Kun Zhou", "Tongtong Liang", "Zhewei Yao", "Yi-An Ma", "Yuxiong He"], "brief": "\u63d0\u51faRiVER\u6846\u67b6\uff0c\u5229\u7528\u57fa\u4e8e\u5206\u6570\u7684\u4f18\u5316\u4efb\u52a1\uff08\u65e0\u9700\u6807\u51c6\u7b54\u6848\uff09\u8bad\u7ec3LLM\uff0c\u901a\u8fc7\u786e\u5b9a\u6027\u6267\u884c\u53cd\u9988\u4f5c\u4e3a\u8fde\u7eed\u5956\u52b1\u4fe1\u53f7\uff0c\u89e3\u51b3\u7fa4\u4f53\u76f8\u5bf9\u5f3a\u5316\u5b66\u4e60\u4e2d\u7684\u5c3a\u5ea6\u4e3b\u5bfc\u548c\u9891\u7387\u4e3b\u5bfc\u4e24\u5927\u6311\u6218\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27369", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u8bc6\u522b\u8fde\u7eed\u5956\u52b1\u4e0b\u7fa4\u4f53\u76f8\u5bf9RL\u7684\u4e24\u5927\u95ee\u9898\uff1a\u5c3a\u5ea6\u4e3b\u5bfc\uff08\u8de8\u5b9e\u4f8b\u5206\u6570\u672a\u6821\u51c6\uff09\u548c\u9891\u7387\u4e3b\u5bfc\uff08\u6b21\u4f18\u89e3\u9891\u7e41\u91c7\u6837\u538b\u5236\u4f18\u8d28\u89e3\uff09", "RiVER\u91c7\u7528\u5b9e\u4f8b\u7ea7\u6bd4\u8f83\u7684\u6821\u51c6\u5956\u52b1\u5851\u5f62\uff0c\u5f3a\u8c03\u6392\u540d\u9760\u524d\u7684\u89e3\u540c\u65f6\u4fdd\u7559\u5176\u4ed6\u6709\u6548\u89e3\u7684\u6709\u754c\u53cd\u9988", "\u5728ALE-Bench\u4e0aQwen3-8B\u548cGLM-Z1-9B\u5206\u522b\u63d0\u53478.9%\u548c9.4%\uff0c\u4e14\u5728LiveCodeBench\u548cUSACO\u7b49\u7cbe\u786e\u89e3\u57fa\u51c6\u4e0a\u5e73\u5747\u63d0\u53472.4%\u548c3.5%\uff0c\u5177\u5907\u8de8\u4efb\u52a1\u8fc1\u79fb\u80fd\u529b"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u4ee3\u7801\u751f\u6210", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5956\u52b1\u5851\u5f62"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27369v1", "published_at": "2026-06-25", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Reinforcement Learning without Ground-Truth Solutions can Improve LLMs", "tldr": "\u65e0\u9700\u6807\u51c6\u7b54\u6848\u7684\u5f3a\u5316\u5b66\u4e60\u6846\u67b6RiVER\uff0c\u901a\u8fc7\u6392\u540d\u6821\u51c6\u5956\u52b1\u63d0\u5347LLM\u7f16\u7a0b\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faRiVER\u6846\u67b6\uff0c\u5229\u7528\u57fa\u4e8e\u5206\u6570\u7684\u4f18\u5316\u4efb\u52a1\uff08\u65e0\u9700\u6807\u51c6\u7b54\u6848\uff09\u8bad\u7ec3LLM\uff0c\u901a\u8fc7\u786e\u5b9a\u6027\u6267\u884c\u53cd\u9988\u4f5c\u4e3a\u8fde\u7eed\u5956\u52b1\u4fe1\u53f7\uff0c\u89e3\u51b3\u7fa4\u4f53\u76f8\u5bf9\u5f3a\u5316\u5b66\u4e60\u4e2d\u7684\u5c3a\u5ea6\u4e3b\u5bfc\u548c\u9891\u7387\u4e3b\u5bfc\u4e24\u5927\u6311\u6218\u3002", "why_notable": "\u9996\u6b21\u8bc1\u660e\u65e0\u6807\u51c6\u7b54\u6848\u7684\u5206\u6570\u4f18\u5316\u4efb\u52a1\u914d\u5408\u9002\u5f53\u5956\u52b1\u6821\u51c6\u53ef\u6709\u6548\u63d0\u5347LLM\u901a\u7528\u7f16\u7a0b\u80fd\u529b\uff0c\u7a81\u7834RLVR\u5bf9\u6807\u51c6\u7b54\u6848\u7684\u4f9d\u8d56\uff0c\u5f00\u8f9f\u4e86\u66f4\u5e7f\u6cdb\u4efb\u52a1\u573a\u666f\u4e0b\u7684RL\u8bad\u7ec3\u65b0\u8def\u5f84\u3002"}, {"abstract": "Modern generative world models render increasingly realistic action-controllable futures, yet they frequently hallucinate: rollouts remain visually fluent while drifting from the ground-truth dynamics. We hypothesize that hallucination concentrates in low-coverage regions of the state-action space, where lightweight data-centric signals can both detect it and guide mitigation. To test this, we introduce MMBench2, a 427-hour, 210-task dataset for visual world modeling with ground-truth actions, rewards, and live simulators, and train a 350M-parameter world model on it. We identify three distinct hallucination modes: perceptual, action-marginalized, and scene-diverging -- each anchored to a different stage of the pipeline, and develop three signals that accurately predict where the model will fail. To close coverage gaps at training time, we develop a coverage-aware sampling technique; to close them online, our hallucination predictors serve as curiosity rewards for targeted data collection, yielding a data-efficient finetuning recipe that adapts the pretrained world model to entirely unseen environments with as few as 50 real environment trajectories. Overall, our findings reveal that hallucination in world models is inherently a data coverage issue, and that the same signals used to detect it can also be used for mitigation. An interactive web version of our paper is available at https://www.nicklashansen.com/mmbench2", "arxiv_id": "2606.27326", "arxiv_url": "https://arxiv.org/abs/2606.27326", "authors": ["Nicklas Hansen", "Xiaolong Wang"], "brief": "\u63d0\u51faMMBench2\u6570\u636e\u96c6\uff08427\u5c0f\u65f6\u3001210\u4efb\u52a1\uff09\u5e76\u8bad\u7ec3350M\u53c2\u6570\u89c6\u89c9\u4e16\u754c\u6a21\u578b\uff0c\u7cfb\u7edf\u6027\u5730\u8bc6\u522b\u4e09\u7c7b\u5e7b\u89c9\u6a21\u5f0f\uff0c\u5f00\u53d1\u53ef\u9884\u6d4b\u5931\u8d25\u4f4d\u7f6e\u7684\u4fe1\u53f7\uff0c\u5e76\u5229\u7528\u8fd9\u4e9b\u4fe1\u53f7\u6307\u5bfc\u9ad8\u6548\u5fae\u8c03\u3002", "categories": ["cs.LG", "cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27326", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5b9a\u4e49\u4e09\u7c7b\u5e7b\u89c9\u6a21\u5f0f\uff1a\u611f\u77e5\u5e7b\u89c9\u3001\u52a8\u4f5c\u8fb9\u7f18\u5316\u5e7b\u89c9\u3001\u573a\u666f\u53d1\u6563\u5e7b\u89c9\uff0c\u5206\u522b\u5bf9\u5e94\u6d41\u6c34\u7ebf\u4e0d\u540c\u9636\u6bb5", "\u5f00\u53d1\u8986\u76d6\u611f\u77e5\u91c7\u6837\u6280\u672f\uff08\u8bad\u7ec3\u65f6\uff09\u548c\u597d\u5947\u5fc3\u5956\u52b1\u9a71\u52a8\u7684\u6570\u636e\u6536\u96c6\u7b56\u7565\uff08\u5728\u7ebf\u65f6\uff09\uff0c\u4ec5\u970050\u6761\u771f\u5b9e\u8f68\u8ff9\u5373\u53ef\u9002\u914d\u5168\u65b0\u73af\u5883", "MMBench2\u5305\u542b427\u5c0f\u65f6\u3001210\u4efb\u52a1\uff0c\u914d\u5907\u771f\u5b9e\u52a8\u4f5c\u3001\u5956\u52b1\u548c\u5728\u7ebf\u6a21\u62df\u5668\uff0c\u662f\u5927\u89c4\u6a21\u89c6\u89c9\u4e16\u754c\u6a21\u578b\u57fa\u51c6"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u5e7b\u89c9\u68c0\u6d4b", "\u6570\u636e\u8986\u76d6", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27326v1", "published_at": "2026-06-25", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Hallucination in World Models is Predictable and Preventable", "tldr": "\u4e16\u754c\u6a21\u578b\u5e7b\u89c9\u672c\u8d28\u662f\u6570\u636e\u8986\u76d6\u95ee\u9898\uff0c\u53ef\u9884\u6d4b\u4e14\u53ef\u901a\u8fc7\u8986\u76d6\u611f\u77e5\u91c7\u6837\u7f13\u89e3", "upvotes": 0, "what_it_is": "\u63d0\u51faMMBench2\u6570\u636e\u96c6\uff08427\u5c0f\u65f6\u3001210\u4efb\u52a1\uff09\u5e76\u8bad\u7ec3350M\u53c2\u6570\u89c6\u89c9\u4e16\u754c\u6a21\u578b\uff0c\u7cfb\u7edf\u6027\u5730\u8bc6\u522b\u4e09\u7c7b\u5e7b\u89c9\u6a21\u5f0f\uff0c\u5f00\u53d1\u53ef\u9884\u6d4b\u5931\u8d25\u4f4d\u7f6e\u7684\u4fe1\u53f7\uff0c\u5e76\u5229\u7528\u8fd9\u4e9b\u4fe1\u53f7\u6307\u5bfc\u9ad8\u6548\u5fae\u8c03\u3002", "why_notable": "\u9996\u6b21\u5c06\u4e16\u754c\u6a21\u578b\u5e7b\u89c9\u95ee\u9898\u7cfb\u7edf\u5f52\u56e0\u4e3a\u6570\u636e\u8986\u76d6\u4e0d\u8db3\uff0c\u5e76\u63d0\u4f9b\u53ef\u843d\u5730\u7684\u68c0\u6d4b\u4e0e\u7f13\u89e3\u95ed\u73af\u65b9\u6848\uff0c\u5bf9\u673a\u5668\u4eba\u3001\u81ea\u52a8\u9a7e\u9a76\u7b49\u9700\u8981\u53ef\u9760\u4e16\u754c\u6a21\u578b\u7684\u9886\u57df\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Chain-of-thought (CoT) reasoning is widely used in language-model agents, but prior work has shown that verbalized CoT is not always faithful and may instead reflect post-hoc reasoning, which means the model already knows the answer before reasoning. We therefore ask what CoT training is actually improving: is the model getting better at changing its action through generated reasoning, or is it getting better at predicting the action directly from the prompt? We study this question by comparing \\emph{prompt actions} (predicting action without CoT) with CoT actions (predicting action with CoT). Across checkpoints, prompt-action quality improves substantially. While interacting with the environment, the relative advantage of CoT actions over prompt actions remains similar, showing that CoT training does not widen the advantage of CoT reasoning, and it helps to improve the quality of prompt actions. We further find that later checkpoints are less likely to revise the action in response to CoT, suggesting greater reliance on the prompt. Motivated by these patterns, we selectively mask action-token supervision on a fraction of training examples. This intervention improves out-of-domain generalization.", "arxiv_id": "2606.26935", "arxiv_url": "https://arxiv.org/abs/2606.26935", "authors": ["Jingyu Liu", "Zhiwen Wang", "Yuxin Jing", "Huanyu Zhou", "Yong Liu"], "brief": "\u672c\u6587\u7814\u7a76CoT\u8bad\u7ec3\u5728LLM\u667a\u80fd\u4f53\u4e2d\u7684\u5b9e\u9645\u4f5c\u7528\u673a\u5236\uff0c\u901a\u8fc7\u5bf9\u6bd4\"\u6709CoT\"\u4e0e\"\u65e0CoT\"\u7684\u52a8\u4f5c\u9884\u6d4b\u8d28\u91cf\uff0c\u53d1\u73b0CoT\u8bad\u7ec3\u7684\u6536\u76ca\u4e3b\u8981\u843d\u5728\u63d0\u5347\u6a21\u578b\u76f4\u63a5\u4ece\u63d0\u793a\u9884\u6d4b\u52a8\u4f5c\u7684\u80fd\u529b\u4e0a\uff0c\u800c\u975e\u589e\u5f3a\u63a8\u7406\u8fc7\u7a0b\u5bf9\u52a8\u4f5c\u7684\u4fee\u6b63\u80fd\u529b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26935", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u968f\u7740\u8bad\u7ec3\u63a8\u8fdb\uff0c\u65e0CoT\u7684prompt\u52a8\u4f5c\u8d28\u91cf\u5927\u5e45\u63d0\u5347\uff0c\u800cCoT\u76f8\u5bf9\u4e8eprompt\u7684\u4f18\u52bf\u5e76\u672a\u6269\u5927", "\u540e\u671f\u68c0\u67e5\u70b9\u6a21\u578b\u66f4\u5c11\u4f9d\u8d56CoT\u6765\u4fee\u6b63\u52a8\u4f5c\uff0c\u8868\u660e\u6a21\u578b\u8d8a\u6765\u8d8a\u4f9d\u8d56\u63d0\u793a\u672c\u8eab\u800c\u975e\u63a8\u7406\u94fe", "\u9009\u62e9\u6027\u5c4f\u853d\u90e8\u5206\u8bad\u7ec3\u6837\u672c\u7684\u52a8\u4f5ctoken\u76d1\u7763\u4fe1\u53f7\uff0c\u53ef\u6539\u5584\u6a21\u578b\u7684\u8de8\u57df\u6cdb\u5316\u80fd\u529b"], "keywords": ["\u667a\u80fd\u4f53", "\u601d\u7ef4\u94fe", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26935v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Where Do CoT Training Gains Land in LLM based Agents?", "tldr": "CoT\u8bad\u7ec3\u4e3b\u8981\u63d0\u5347LLM\u7684\u76f4\u63a5\u9884\u6d4b\u80fd\u529b\uff0c\u800c\u975e\u63a8\u7406\u4fee\u6b63\u80fd\u529b", "upvotes": 0, "what_it_is": "\u672c\u6587\u7814\u7a76CoT\u8bad\u7ec3\u5728LLM\u667a\u80fd\u4f53\u4e2d\u7684\u5b9e\u9645\u4f5c\u7528\u673a\u5236\uff0c\u901a\u8fc7\u5bf9\u6bd4\"\u6709CoT\"\u4e0e\"\u65e0CoT\"\u7684\u52a8\u4f5c\u9884\u6d4b\u8d28\u91cf\uff0c\u53d1\u73b0CoT\u8bad\u7ec3\u7684\u6536\u76ca\u4e3b\u8981\u843d\u5728\u63d0\u5347\u6a21\u578b\u76f4\u63a5\u4ece\u63d0\u793a\u9884\u6d4b\u52a8\u4f5c\u7684\u80fd\u529b\u4e0a\uff0c\u800c\u975e\u589e\u5f3a\u63a8\u7406\u8fc7\u7a0b\u5bf9\u52a8\u4f5c\u7684\u4fee\u6b63\u80fd\u529b\u3002", "why_notable": "\u63ed\u793a\u4e86CoT\u8bad\u7ec3\u7684\u771f\u5b9e\u4f5c\u7528\u673a\u5236\u2014\u2014\u53ef\u80fd\u4e3b\u8981\u5728\u5f3a\u5316\u8bb0\u5fc6\u800c\u975e\u63a8\u7406\u80fd\u529b\uff0c\u5bf9\u7406\u89e3\u548c\u6539\u8fdbLLM\u667a\u80fd\u4f53\u8bad\u7ec3\u8303\u5f0f\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49\uff0c\u5e76\u63d0\u51fa\u4e86\u7b80\u5355\u6709\u6548\u7684\u8bad\u7ec3\u6539\u8fdb\u65b9\u6cd5\u3002"}, {"abstract": "LLM coding harnesses grant agents broad file and shell access, yet the configuration layer that steers them -- rules files, agent definitions, IDE-specific markdown -- is largely unmanaged. A prevalence study of 10,008 public GitHub repositories (n=6,145 agent config files) finds that agent configurations propagate as undeclared shared components: 10.1% of tracked paths are SHA-256 exact duplicates across independent repositories (fork-adjusted, threshold-independent), with 75.5% of clone pairs crossing organisational boundaries. Two further patterns are indicative: configurations are rarely revised (58% single-commit; 0.4 vs 0.6 commits/month age-normalised against CI/CD workflows), and rarely declare permission boundaries (\u003c1% of agent configs vs 33% of Actions workflows, n=31 true positives). We propose a deterministic control plane above the harness that maps one-to-one to these gaps. Rel(AI)Build treats agent definitions as a managed supply chain (SHA-256 content addressing, HMAC-stamped lockfiles, hash-chained audit logs); enforces tiered permissions and attack-derived blocklists before LLM invocation; gates feature work through a phase state machine with requirement-to-file-to-test traceability; compiles a single canonical definition to seven IDE targets; and detects prompt drift via Jaccard similarity. Conformance tests on injected violations confirm each mechanism enforces its stated invariant; developer outcomes remain future work. Governance of this layer must be deterministic and tool-agnostic -- not delegated to further LLM orchestration.", "arxiv_id": "2606.26924", "arxiv_url": "https://arxiv.org/abs/2606.26924", "authors": ["Padmaraj Madatha"], "brief": "\u901a\u8fc7\u5bf910,008\u4e2aGitHub\u516c\u5f00\u4ed3\u5e93\u7684\u5b9e\u8bc1\u7814\u7a76\uff0c\u53d1\u73b0LLM\u7f16\u7a0b\u667a\u80fd\u4f53\u914d\u7f6e\u6587\u4ef6\u5b58\u5728\u5927\u91cf\u672a\u53d7\u7ba1\u7406\u7684\u8de8\u7ec4\u7ec7\u590d\u5236\u548c\u6743\u9650\u7f3a\u5931\u95ee\u9898\uff0c\u5e76\u63d0\u51faRel(AI)Build\u786e\u5b9a\u6027\u63a7\u5236\u5e73\u9762\uff0c\u5c06\u667a\u80fd\u4f53\u5b9a\u4e49\u7eb3\u5165\u4f9b\u5e94\u94fe\u7ba1\u7406\uff0c\u5b9e\u73b0\u6743\u9650\u5206\u7ea7\u3001\u5ba1\u8ba1\u8ffd\u8e2a\u548c\u591aIDE\u7edf\u4e00\u7f16\u8bd1\u3002", "categories": ["cs.SE", "cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26924", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5b9e\u8bc1\u7814\u7a76\uff1a10.1%\u7684\u667a\u80fd\u4f53\u914d\u7f6e\u6587\u4ef6\u5728\u72ec\u7acb\u4ed3\u5e93\u95f4\u5b58\u5728SHA-256\u7cbe\u786e\u91cd\u590d\uff0c75.5%\u7684\u514b\u9686\u5bf9\u8de8\u8d8a\u7ec4\u7ec7\u8fb9\u754c", "\u914d\u7f6e\u6587\u4ef6\u6781\u5c11\u88ab\u4fee\u8ba2\uff0858%\u4ec5\u6709\u5355\u6b21\u63d0\u4ea4\uff09\uff0c\u4e14\u51e0\u4e4e\u4e0d\u58f0\u660e\u6743\u9650\u8fb9\u754c\uff08\u003c1% vs Actions\u5de5\u4f5c\u6d41\u768433%\uff09", "Rel(AI)Build\u91c7\u7528SHA-256\u5185\u5bb9\u5bfb\u5740\u3001HMAC\u9501\u6587\u4ef6\u3001\u54c8\u5e0c\u94fe\u5ba1\u8ba1\u65e5\u5fd7\u3001Jaccard\u76f8\u4f3c\u5ea6\u68c0\u6d4b\u63d0\u793a\u6f02\u79fb\uff0c\u5e76\u5c06\u5355\u4e00\u5b9a\u4e49\u7f16\u8bd1\u81f37\u4e2aIDE\u76ee\u6807"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u4f9b\u5e94\u94fe\u5b89\u5168", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26924v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "A Deterministic Control Plane for LLM Coding Agents", "tldr": "\u63d0\u51fa\u786e\u5b9a\u6027\u63a7\u5236\u5e73\u9762Rel(AI)Build\uff0c\u7cfb\u7edf\u7ba1\u7406LLM\u7f16\u7a0b\u667a\u80fd\u4f53\u914d\u7f6e\u7684\u5b89\u5168\u4e0e\u53ef\u8ffd\u6eaf\u6027", "upvotes": 0, "what_it_is": "\u901a\u8fc7\u5bf910,008\u4e2aGitHub\u516c\u5f00\u4ed3\u5e93\u7684\u5b9e\u8bc1\u7814\u7a76\uff0c\u53d1\u73b0LLM\u7f16\u7a0b\u667a\u80fd\u4f53\u914d\u7f6e\u6587\u4ef6\u5b58\u5728\u5927\u91cf\u672a\u53d7\u7ba1\u7406\u7684\u8de8\u7ec4\u7ec7\u590d\u5236\u548c\u6743\u9650\u7f3a\u5931\u95ee\u9898\uff0c\u5e76\u63d0\u51faRel(AI)Build\u786e\u5b9a\u6027\u63a7\u5236\u5e73\u9762\uff0c\u5c06\u667a\u80fd\u4f53\u5b9a\u4e49\u7eb3\u5165\u4f9b\u5e94\u94fe\u7ba1\u7406\uff0c\u5b9e\u73b0\u6743\u9650\u5206\u7ea7\u3001\u5ba1\u8ba1\u8ffd\u8e2a\u548c\u591aIDE\u7edf\u4e00\u7f16\u8bd1\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u91cf\u5316LLM\u7f16\u7a0b\u667a\u80fd\u4f53\u914d\u7f6e\u5c42\u7684\u5b89\u5168\u6cbb\u7406\u76f2\u533a\uff0c\u5e76\u63d0\u51fa\u5de5\u5177\u65e0\u5173\u7684\u786e\u5b9a\u6027\u89e3\u51b3\u65b9\u6848\uff0c\u5bf9AI\u7f16\u7a0b\u5de5\u5177\u7684\u4f9b\u5e94\u94fe\u5b89\u5168\u548c\u4f01\u4e1a\u5408\u89c4\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c"}, {"abstract": "Large language models can serve as capable long-horizon agents, but their out-of-distribution (OOD) generalization remains weak. We identify a key source of this failure as task insensitivity: when faced with similar but distinct tasks, models might apply patterns learned during training and fail to solve the task at hand. We show that models often continue with actions aligned with the original task even when the instruction is semantically corrupted and cannot be directly answered. We further find that, when we replace the task description in a trained prompt with another similar but distinct task, the model may still output the same action. This behavior is accompanied by a consistent training-time attention drift away from task tokens and toward local observations, suggesting an optimization bias toward shortcuts. To mitigate this problem, we propose Task-Perturbed NLL Optimization, a lightweight contrastive regularizer that explicitly encourages action dependence on the task instruction. Extensive evaluations show that our intervention improves task sensitivity and OOD generalization while preserving more stable attention to task tokens.", "arxiv_id": "2606.26918", "arxiv_url": "https://arxiv.org/abs/2606.26918", "authors": ["Jingyu Liu", "Xiaopeng Wu", "Kehan Chen", "Chuan Yu", "Yong Liu"], "brief": "\u672c\u6587\u8bc6\u522b\u4e86LLM\u957f\u7a0b\u667a\u80fd\u4f53\u7684\u5173\u952e\u5931\u6548\u6a21\u5f0f\u2014\u2014\u4efb\u52a1\u4e0d\u654f\u611f\u6027\uff1a\u6a21\u578b\u5728\u9762\u5bf9\u76f8\u4f3c\u4f46\u4e0d\u540c\u7684\u4efb\u52a1\u65f6\uff0c\u503e\u5411\u4e8e\u5957\u7528\u8bad\u7ec3\u65f6\u7684\u6a21\u5f0f\u800c\u5ffd\u89c6\u5b9e\u9645\u6307\u4ee4\u3002\u4f5c\u8005\u63d0\u51faTask-Perturbed NLL Optimization\uff08\u4efb\u52a1\u6270\u52a8\u8d1f\u5bf9\u6570\u4f3c\u7136\u4f18\u5316\uff09\u4f5c\u4e3a\u8f7b\u91cf\u7ea7\u5bf9\u6bd4\u6b63\u5219\u5316\u65b9\u6cd5\u6765\u7f13\u89e3\u8be5\u95ee\u9898\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26918", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u4efb\u52a1\u4e0d\u654f\u611f\u73b0\u8c61\uff1a\u5373\u4f7f\u5c06\u4efb\u52a1\u6307\u4ee4\u8bed\u4e49\u7834\u574f\u6216\u66ff\u6362\u4e3a\u76f8\u4f3c\u4f46\u4e0d\u540c\u7684\u4efb\u52a1\uff0c\u6a21\u578b\u4ecd\u8f93\u51fa\u76f8\u540c\u52a8\u4f5c", "\u8bad\u7ec3\u65f6\u6ce8\u610f\u529b\u6f02\u79fb\uff1a\u6a21\u578b\u6ce8\u610f\u529b\u4ece\u4efb\u52a1token\u8f6c\u5411\u5c40\u90e8\u89c2\u5bdf\uff0c\u63ed\u793a\u4e86\u4f18\u5316\u8fc7\u7a0b\u4e2d\u7684\u6377\u5f84\u504f\u5dee", "Task-Perturbed NLL Optimization\uff1a\u901a\u8fc7\u5bf9\u6bd4\u6b63\u5219\u5316\u663e\u5f0f\u9f13\u52b1\u52a8\u4f5c\u5bf9\u4efb\u52a1\u6307\u4ee4\u7684\u4f9d\u8d56\uff0c\u63d0\u5347\u4efb\u52a1\u654f\u611f\u6027\u548cOOD\u6cdb\u5316\u80fd\u529b"], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "OOD\u6cdb\u5316", "\u6ce8\u610f\u529b\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26918v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Diagnosing Task Insensitivity in Language Agents", "tldr": "\u53d1\u73b0\u8bed\u8a00\u667a\u80fd\u4f53\u5b58\u5728\"\u4efb\u52a1\u4e0d\u654f\u611f\"\u95ee\u9898\uff0c\u5e76\u63d0\u51fa\u5bf9\u6bd4\u6b63\u5219\u5316\u65b9\u6cd5\u6539\u5584OOD\u6cdb\u5316", "upvotes": 0, "what_it_is": "\u672c\u6587\u8bc6\u522b\u4e86LLM\u957f\u7a0b\u667a\u80fd\u4f53\u7684\u5173\u952e\u5931\u6548\u6a21\u5f0f\u2014\u2014\u4efb\u52a1\u4e0d\u654f\u611f\u6027\uff1a\u6a21\u578b\u5728\u9762\u5bf9\u76f8\u4f3c\u4f46\u4e0d\u540c\u7684\u4efb\u52a1\u65f6\uff0c\u503e\u5411\u4e8e\u5957\u7528\u8bad\u7ec3\u65f6\u7684\u6a21\u5f0f\u800c\u5ffd\u89c6\u5b9e\u9645\u6307\u4ee4\u3002\u4f5c\u8005\u63d0\u51faTask-Perturbed NLL Optimization\uff08\u4efb\u52a1\u6270\u52a8\u8d1f\u5bf9\u6570\u4f3c\u7136\u4f18\u5316\uff09\u4f5c\u4e3a\u8f7b\u91cf\u7ea7\u5bf9\u6bd4\u6b63\u5219\u5316\u65b9\u6cd5\u6765\u7f13\u89e3\u8be5\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u8bca\u65adLLM\u667a\u80fd\u4f53\u7684\u4efb\u52a1\u4e0d\u654f\u611f\u95ee\u9898\u5e76\u7ed9\u51fa\u53ef\u89e3\u91ca\u7684\u6ce8\u610f\u529b\u673a\u5236\u8bc1\u636e\uff0c\u63d0\u51fa\u7684\u8f7b\u91cf\u7ea7\u6b63\u5219\u5316\u65b9\u6cd5\u65e0\u9700\u5927\u89c4\u6a21\u6539\u52a8\u8bad\u7ec3\u6d41\u7a0b\u5373\u53ef\u6539\u5584OOD\u6cdb\u5316\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72LLM\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Reasoning capability has advanced rapidly in large language models (LLMs), leading to an increasing size of key-value (KV) cache in both prefilling and decoding stages. Existing KV cache compression methods mainly rely on attention weights to estimate token importance. While attention effectively captures contextual relevance, it overlooks complementary information-theoretic signals related to predictive uncertainty and token informativeness. In this paper, we revisit token importance from a forward-looking perspective and introduce \\textit{Forward Influence}, a metric that measures how compressed tokens affect future contexts. Our analysis reveals that tokens selected by attention scores mainly influence nearby contexts, whereas tokens associated with high predictive uncertainty exhibit substantially stronger influence on distant future contexts. Based on the observation, we propose \\textbf{InfoKV}, an entropy-aware KV cache compression framework that incorporates information-theoretic signals. It combines token-level predictive uncertainty with layer-wise representation evolution and integrates the resulting entropy scores with attention scores during reasoning. Experiments on long-context reasoning benchmarks with Llama-3.1, Llama-3.2, and DeepSeek-R1 demonstrate that InfoKV consistently outperforms existing attention-based KV compression methods in both long prefilling and decoding scenarios.", "arxiv_id": "2606.26875", "arxiv_url": "https://arxiv.org/abs/2606.26875", "authors": ["Jushi Kai", "Zhuiri Xiao", "Alexandra Birch", "Zhouhan Lin"], "brief": "\u63d0\u51faInfoKV\u6846\u67b6\uff0c\u901a\u8fc7\u7ed3\u5408\u9884\u6d4b\u4e0d\u786e\u5b9a\u6027\uff08\u71b5\uff09\u4e0e\u6ce8\u610f\u529b\u5206\u6570\u6765\u8bc4\u4f30token\u91cd\u8981\u6027\uff0c\u89e3\u51b3\u73b0\u6709KV\u7f13\u5b58\u538b\u7f29\u65b9\u6cd5\u4ec5\u4f9d\u8d56\u6ce8\u610f\u529b\u6743\u91cd\u800c\u5ffd\u7565\u4fe1\u606f\u8bba\u4fe1\u53f7\u7684\u95ee\u9898\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26875", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51fa\"\u524d\u5411\u5f71\u54cd\u529b\"\uff08Forward Influence\uff09\u6307\u6807\uff0c\u8861\u91cf\u88ab\u538b\u7f29token\u5bf9\u672a\u6765\u4e0a\u4e0b\u6587\u7684\u5f71\u54cd\u7a0b\u5ea6", "\u53d1\u73b0\u9ad8\u9884\u6d4b\u4e0d\u786e\u5b9a\u6027\u7684token\u5bf9\u8fdc\u8ddd\u79bb\u672a\u6765\u4e0a\u4e0b\u6587\u5f71\u54cd\u66f4\u5f3a\uff0c\u800c\u6ce8\u610f\u529b\u9ad8\u5206token\u4e3b\u8981\u5f71\u54cd\u8fd1\u90bb\u4e0a\u4e0b\u6587", "\u5728Llama-3.1\u3001Llama-3.2\u548cDeepSeek-R1\u4e0a\u9a8c\u8bc1\uff0cInfoKV\u5728\u957f\u4e0a\u4e0b\u6587\u63a8\u7406\u57fa\u51c6\u4e2d\u6301\u7eed\u4f18\u4e8e\u73b0\u6709\u6ce8\u610f\u529b\u538b\u7f29\u65b9\u6cd5"], "keywords": ["KV\u7f13\u5b58\u538b\u7f29", "\u957f\u4e0a\u4e0b\u6587\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4fe1\u606f\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26875v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Information-Aware KV Cache Compression for Long Reasoning", "tldr": "\u5f15\u5165\u4fe1\u606f\u8bba\u4fe1\u53f7\u7684KV\u7f13\u5b58\u538b\u7f29\u6846\u67b6InfoKV\uff0c\u63d0\u5347\u957f\u63a8\u7406\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faInfoKV\u6846\u67b6\uff0c\u901a\u8fc7\u7ed3\u5408\u9884\u6d4b\u4e0d\u786e\u5b9a\u6027\uff08\u71b5\uff09\u4e0e\u6ce8\u610f\u529b\u5206\u6570\u6765\u8bc4\u4f30token\u91cd\u8981\u6027\uff0c\u89e3\u51b3\u73b0\u6709KV\u7f13\u5b58\u538b\u7f29\u65b9\u6cd5\u4ec5\u4f9d\u8d56\u6ce8\u610f\u529b\u6743\u91cd\u800c\u5ffd\u7565\u4fe1\u606f\u8bba\u4fe1\u53f7\u7684\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u5c06\u4fe1\u606f\u8bba\u89c6\u89d2\uff08\u71b5/\u9884\u6d4b\u4e0d\u786e\u5b9a\u6027\uff09\u7cfb\u7edf\u5f15\u5165KV\u7f13\u5b58\u538b\u7f29\uff0c\u5f25\u8865\u4e86\u7eaf\u6ce8\u610f\u529b\u65b9\u6cd5\u7684\u76f2\u533a\uff0c\u5bf9\u957f\u94fe\u5f0f\u63a8\u7406\u573a\u666f\uff08CoT/R1\u7c7b\u6a21\u578b\uff09\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Agents often repeatedly solve similar task instances from scratch, leading to unnecessary reasoning cost and long execution traces. Prior work has explored workflow reuse and executable skill induction, but it remains unclear which task scenarios admit procedural skills and how the shared procedural structure should be represented across successful traces. We study this problem in FSM-defined scenarios, where successful traces can be viewed as paths in an unknown transition graph, and formulate procedural skills as reusable parameterized control-flow subgraphs. Based on this view, we introduce SkillDisCo, a distillation-and-compilation framework that distills reusable PFSM subgraphs from successful traces and compiles them into callable, executable, and verifiable procedural skills. Experiments on ALFWorld and WebArena show that SkillDisCo improves success rates and reduces agent turns across benchmarks and model scales, demonstrating the benefits of representing shared experience as reusable execution structures.", "arxiv_id": "2606.26669", "arxiv_url": "https://arxiv.org/abs/2606.26669", "authors": ["Zhongxin Guo", "Danrui Qi", "Hanwen Gu", "Peng Cheng", "Yongqiang Xiong"], "brief": "\u63d0\u51faSkillDisCo\u6846\u67b6\uff0c\u5c06\u667a\u80fd\u4f53\u5728\u76f8\u4f3c\u4efb\u52a1\u4e2d\u7684\u6210\u529f\u6267\u884c\u8f68\u8ff9\u63d0\u70bc\u4e3a\u53c2\u6570\u5316\u6709\u9650\u72b6\u6001\u673a\uff08PFSM\uff09\u5b50\u56fe\uff0c\u5e76\u7f16\u8bd1\u6210\u53ef\u8c03\u7528\u3001\u53ef\u6267\u884c\u3001\u53ef\u9a8c\u8bc1\u7684\u8fc7\u7a0b\u6280\u80fd\uff0c\u4f9b\u540e\u7eed\u4efb\u52a1\u590d\u7528\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26669", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5c06\u6210\u529f\u8f68\u8ff9\u5efa\u6a21\u4e3a\u672a\u77e5\u8f6c\u79fb\u56fe\u4e2d\u7684\u8def\u5f84\uff0c\u8fc7\u7a0b\u6280\u80fd\u8868\u793a\u4e3a\u53ef\u590d\u7528\u7684\u53c2\u6570\u5316\u63a7\u5236\u6d41\u5b50\u56fe\uff08PFSM\uff09", "SkillDisCo\u5305\u542b\u84b8\u998f\u4e0e\u7f16\u8bd1\u4e24\u9636\u6bb5\uff1a\u4ece\u8f68\u8ff9\u4e2d\u63d0\u53d6\u5171\u4eab\u7ed3\u6784\uff0c\u518d\u7f16\u8bd1\u4e3a\u53ef\u76f4\u63a5\u8c03\u7528\u7684\u6280\u80fd\u6a21\u5757", "\u5728ALFWorld\u548cWebArena\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u6210\u529f\u7387\u63d0\u5347\u4e14\u667a\u80fd\u4f53\u4ea4\u4e92\u8f6e\u6b21\u51cf\u5c11\uff0c\u8de8\u6a21\u578b\u89c4\u6a21\u5747\u6709\u6548"], "keywords": ["\u667a\u80fd\u4f53", "\u6280\u80fd\u590d\u7528", "LLM\u63a8\u7406", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26669v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SKILL-DISCO: Distilling and Compiling Agent Traces into Reusable Procedural Skills", "tldr": "\u5c06\u667a\u80fd\u4f53\u6210\u529f\u8f68\u8ff9\u63d0\u70bc\u7f16\u8bd1\u4e3a\u53ef\u590d\u7528\u53c2\u6570\u5316\u8fc7\u7a0b\u6280\u80fd\uff0c\u51cf\u5c11\u91cd\u590d\u63a8\u7406\u5f00\u9500", "upvotes": 0, "what_it_is": "\u63d0\u51faSkillDisCo\u6846\u67b6\uff0c\u5c06\u667a\u80fd\u4f53\u5728\u76f8\u4f3c\u4efb\u52a1\u4e2d\u7684\u6210\u529f\u6267\u884c\u8f68\u8ff9\u63d0\u70bc\u4e3a\u53c2\u6570\u5316\u6709\u9650\u72b6\u6001\u673a\uff08PFSM\uff09\u5b50\u56fe\uff0c\u5e76\u7f16\u8bd1\u6210\u53ef\u8c03\u7528\u3001\u53ef\u6267\u884c\u3001\u53ef\u9a8c\u8bc1\u7684\u8fc7\u7a0b\u6280\u80fd\uff0c\u4f9b\u540e\u7eed\u4efb\u52a1\u590d\u7528\u3002", "why_notable": "\u9996\u6b21\u660e\u786e\u754c\u5b9a\u54ea\u7c7b\u4efb\u52a1\u573a\u666f\u9002\u5408\u8fc7\u7a0b\u6280\u80fd\u590d\u7528\uff0c\u5e76\u63d0\u4f9b\u5f62\u5f0f\u5316\u7684FSM\u89c6\u89d2\uff1b\u76f8\u6bd4\u5df2\u6709\u5de5\u4f5c\u6d41\u590d\u7528\u65b9\u6cd5\uff0c\u6280\u80fd\u5177\u5907\u53ef\u9a8c\u8bc1\u6027\uff0c\u6709\u671b\u5927\u5e45\u964d\u4f4eLLM\u667a\u80fd\u4f53\u7684\u63a8\u7406\u6210\u672c\u4e0e\u5ef6\u8fdf\u3002"}, {"abstract": "Agent safety in high-stakes domains requires formal policy enforcement, but most existing approaches either rely on probabilistic guardrails (fine-tuned classifiers, prompt-based steering) that offer no formal guarantees, or on hand-coded symbolic enforcement that does not scale to the breadth of real policy specifications. We present an autoformalization pipeline that translates agent prompts, MCP tool descriptions, and natural language policy documents into formally verified policies using an LLM-based generator-critic loop. The resulting policies are written in the Cedar Policy Language. On the MedAgentBench benchmark, our autoformalized policies cover substantially more of the source natural-language specification than the hand-coded symbolic enforcement in prior work.", "arxiv_id": "2606.26649", "arxiv_url": "https://arxiv.org/abs/2606.26649", "authors": ["Adam Mondl", "Matthew Maisel", "John H. Brock"], "brief": "\u63d0\u51fa\u4e00\u79cd\u81ea\u52a8\u5f62\u5f0f\u5316\u6d41\u6c34\u7ebf\uff0c\u5229\u7528LLM\u751f\u6210\u5668-\u6279\u8bc4\u5668\u5faa\u73af\uff0c\u5c06\u667a\u80fd\u4f53\u63d0\u793a\u3001MCP\u5de5\u5177\u63cf\u8ff0\u548c\u81ea\u7136\u8bed\u8a00\u7b56\u7565\u6587\u6863\u8f6c\u5316\u4e3a\u57fa\u4e8eCedar\u7b56\u7565\u8bed\u8a00\u7684\u53ef\u5f62\u5f0f\u9a8c\u8bc1\u7b56\u7565\u3002", "categories": ["cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26649", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u91c7\u7528LLM\u751f\u6210\u5668-\u6279\u8bc4\u5668\uff08generator-critic\uff09\u5faa\u73af\u5b9e\u73b0\u81ea\u7136\u8bed\u8a00\u5230Cedar\u7b56\u7565\u8bed\u8a00\u7684\u81ea\u52a8\u8f6c\u6362", "\u5728MedAgentBench\u57fa\u51c6\u4e0a\uff0c\u81ea\u52a8\u5f62\u5f0f\u5316\u7b56\u7565\u5bf9\u539f\u59cb\u81ea\u7136\u8bed\u8a00\u89c4\u8303\u7684\u8986\u76d6\u7387\u663e\u8457\u4f18\u4e8e\u4eba\u5de5\u7f16\u5199\u7684\u7b26\u53f7\u6267\u884c\u65b9\u6848", "\u540c\u65f6\u652f\u6301\u667a\u80fd\u4f53\u63d0\u793a\u3001MCP\u5de5\u5177\u63cf\u8ff0\u548c\u7b56\u7565\u6587\u6863\u4e09\u7c7b\u8f93\u5165\u6e90\uff0c\u5177\u5907\u8f83\u5f3a\u7684\u901a\u7528\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "AI\u5b89\u5168", "\u7b56\u7565\u6267\u884c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26649v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Autoformalization of Agent Instructions into Policy-as-Code", "tldr": "\u5c06\u81ea\u7136\u8bed\u8a00\u667a\u80fd\u4f53\u6307\u4ee4\u81ea\u52a8\u5f62\u5f0f\u5316\u4e3a\u53ef\u9a8c\u8bc1\u7684Cedar\u7b56\u7565\u4ee3\u7801\uff0c\u63d0\u5347\u9ad8\u98ce\u9669\u573a\u666f\u4e0b\u7684\u5b89\u5168\u4fdd\u969c", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u81ea\u52a8\u5f62\u5f0f\u5316\u6d41\u6c34\u7ebf\uff0c\u5229\u7528LLM\u751f\u6210\u5668-\u6279\u8bc4\u5668\u5faa\u73af\uff0c\u5c06\u667a\u80fd\u4f53\u63d0\u793a\u3001MCP\u5de5\u5177\u63cf\u8ff0\u548c\u81ea\u7136\u8bed\u8a00\u7b56\u7565\u6587\u6863\u8f6c\u5316\u4e3a\u57fa\u4e8eCedar\u7b56\u7565\u8bed\u8a00\u7684\u53ef\u5f62\u5f0f\u9a8c\u8bc1\u7b56\u7565\u3002", "why_notable": "\u73b0\u6709\u65b9\u6cd5\u8981\u4e48\u4f9d\u8d56\u65e0\u6cd5\u63d0\u4f9b\u5f62\u5f0f\u4fdd\u8bc1\u7684\u6982\u7387\u6027\u62a4\u680f\uff0c\u8981\u4e48\u4f9d\u8d56\u96be\u4ee5\u6269\u5c55\u7684\u624b\u5de5\u7b26\u53f7\u89c4\u5219\uff1b\u672c\u6587\u9996\u6b21\u5c06\u81ea\u52a8\u5f62\u5f0f\u5316\u6280\u672f\u5f15\u5165\u667a\u80fd\u4f53\u7b56\u7565\u6267\u884c\uff0c\u517c\u987e\u53ef\u6269\u5c55\u6027\u4e0e\u5f62\u5f0f\u5b89\u5168\u4fdd\u8bc1\uff0c\u5bf9\u9ad8\u98ce\u9669\u9886\u57df\uff08\u5982\u533b\u7597\uff09\u7684AI\u5b89\u5168\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Sparse autoencoders (SAEs) have emerged as a powerful tool for decomposing superposed language model representations into sparse and interpretable features. However, training SAEs is computationally expensive, and available open-source SAE models remain limited. In this work, we introduce \\textbf{Qwen3-Instruct SAE}, a comprehensive suite of SAEs trained on the Qwen3 instruction-tuned model family, covering Qwen3-1.7B, Qwen3-4B, and Qwen3-8B. For Qwen3-1.7B and Qwen3-4B, we train layer-wise SAEs at three key activation sites: residual streams, MLP outputs, and attention outputs. For Qwen3-8B, we train SAEs on a subset of residual stream layers. We systematically evaluate these SAEs using both activation-level reconstruction metrics and model-level recovery metrics, revealing distinct sparsity--fidelity trade-offs across layers and components. Finally, we demonstrate the utility of Qwen3-Instruct SAE through a refusal-steering case study, showing that selected SAE features can causally steer instruction-tuned Qwen3 models toward refusal behavior. Our release provides a practical resource for studying sparse representations, feature-level mechanisms, and behavioral interventions in instruction-tuned language models", "arxiv_id": "2606.26620", "arxiv_url": "https://arxiv.org/abs/2606.26620", "authors": ["XinYang He", "Wei Wang", "Bing Zhao", "Xuan Ren", "WenBo Li", "WeiXu Qiao", "Hu Wei", "Lin Qu"], "brief": "\u672c\u6587\u53d1\u5e03Qwen3-Instruct SAE\uff0c\u4e00\u5957\u9488\u5bf9Qwen3\u6307\u4ee4\u5fae\u8c03\u6a21\u578b\uff081.7B/4B/8B\uff09\u7684\u7a00\u758f\u81ea\u7f16\u7801\u5668\u5957\u4ef6\uff0c\u8986\u76d6\u6b8b\u5dee\u6d41\u3001MLP\u8f93\u51fa\u548c\u6ce8\u610f\u529b\u8f93\u51fa\u7b49\u5173\u952e\u6fc0\u6d3b\u4f4d\u7f6e\uff0c\u7cfb\u7edf\u8bc4\u4f30\u91cd\u5efa\u8d28\u91cf\u5e76\u6f14\u793a\u7279\u5f81\u7ea7\u884c\u4e3a\u5e72\u9884\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26620", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8986\u76d6Qwen3-1.7B\u30014B\u30018B\u4e09\u4e2a\u89c4\u6a21\uff0c\u5bf9\u524d\u4e24\u8005\u8fdb\u884c\u9010\u5c42\u5168\u7ec4\u4ef6SAE\u8bad\u7ec3\uff08\u6b8b\u5dee\u6d41\u3001MLP\u3001\u6ce8\u610f\u529b\u8f93\u51fa\uff09", "\u540c\u65f6\u4f7f\u7528\u6fc0\u6d3b\u7ea7\u91cd\u5efa\u6307\u6807\u548c\u6a21\u578b\u7ea7\u6062\u590d\u6307\u6807\u8bc4\u4f30\uff0c\u63ed\u793a\u4e0d\u540c\u5c42\u548c\u7ec4\u4ef6\u7684\u7a00\u758f\u6027-\u4fdd\u771f\u5ea6\u6743\u8861", "\u901a\u8fc7\u62d2\u7edd\u5f15\u5bfc\u6848\u4f8b\u7814\u7a76\u8bc1\u660e\uff0c\u9009\u5b9a\u7684SAE\u7279\u5f81\u53ef\u56e0\u679c\u6027\u5730\u64cd\u63a7Qwen3\u6a21\u578b\u4ea7\u751f\u62d2\u7edd\u884c\u4e3a"], "keywords": ["\u673a\u68b0\u53ef\u89e3\u91ca\u6027", "\u7a00\u758f\u81ea\u7f16\u7801\u5668", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7279\u5f81\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26620v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Discovering Millions of Interpretable Features with Sparse Autoencoders", "tldr": "\u4e3aQwen3\u7cfb\u5217\u6a21\u578b\u8bad\u7ec3\u7a00\u758f\u81ea\u7f16\u7801\u5668\uff0c\u53d1\u73b0\u6570\u767e\u4e07\u53ef\u89e3\u91ca\u7279\u5f81\u5e76\u9a8c\u8bc1\u884c\u4e3a\u5e72\u9884\u80fd\u529b", "upvotes": 0, "what_it_is": "\u672c\u6587\u53d1\u5e03Qwen3-Instruct SAE\uff0c\u4e00\u5957\u9488\u5bf9Qwen3\u6307\u4ee4\u5fae\u8c03\u6a21\u578b\uff081.7B/4B/8B\uff09\u7684\u7a00\u758f\u81ea\u7f16\u7801\u5668\u5957\u4ef6\uff0c\u8986\u76d6\u6b8b\u5dee\u6d41\u3001MLP\u8f93\u51fa\u548c\u6ce8\u610f\u529b\u8f93\u51fa\u7b49\u5173\u952e\u6fc0\u6d3b\u4f4d\u7f6e\uff0c\u7cfb\u7edf\u8bc4\u4f30\u91cd\u5efa\u8d28\u91cf\u5e76\u6f14\u793a\u7279\u5f81\u7ea7\u884c\u4e3a\u5e72\u9884\u3002", "why_notable": "\u5f00\u6e90\u5927\u89c4\u6a21\u53ef\u89e3\u91ca\u7279\u5f81\u5e93\u586b\u8865\u4e86Qwen3\u7cfb\u5217\u673a\u68b0\u53ef\u89e3\u91ca\u6027\u5de5\u5177\u7684\u7a7a\u767d\uff0c\u4e3a\u7279\u5f81\u7ea7\u673a\u5236\u7814\u7a76\u548c\u6a21\u578b\u884c\u4e3a\u5e72\u9884\uff08\u5982\u5b89\u5168\u5bf9\u9f50\uff09\u63d0\u4f9b\u4e86\u5b9e\u7528\u57fa\u7840\u8bbe\u65bd\u3002"}, {"abstract": "Large reasoning models (LRMs) take longer on harder problems, just as humans do. This surface similarity hides an opposite pattern within items. When an LRM gets a problem wrong, it spends more tokens than when it gets the same problem right; humans do the reverse, spending less time on the trials they get wrong. We separate two levels of deliberation: how response time tracks difficulty across items (registration), and, with item identity held fixed, whether an agent spends more on its own failures or successes (allocation). On a public matched human-LRM corpus, humans and all five thinking LRMs reproduce the known cross-item alignment (registration) but diverge within items (allocation): every LRM shows a large wrong-vs-right effect (Cohen\u0027s d = 1.47-3.13 on H-ARC) while humans show the opposite sign. The comparison stays inside each agent\u0027s own scale; we never put seconds and tokens on one axis. The dissociation holds under item fixed effects, replicates across datasets, and is absent in a non-thinking baseline. We read the human pattern as engagement versus abandonment: people stay on items they expect to solve and give up on the rest. We read the LRM pattern as length driven by uncertainty: chains grow when the model is unsure, which is exactly when it tends to fail. Both policies produce the same cross-item correlation with difficulty, so they look aligned on the measure prior work has used; the divergence shows up only once item identity is fixed. Under resource-rational metareasoning, the split is between two stopping policies that share a difficulty signal but implement opposite control; trace length captures the signal and misses the control.", "arxiv_id": "2606.26502", "arxiv_url": "https://arxiv.org/abs/2606.26502", "authors": ["Han-yu Wang"], "brief": "\u672c\u6587\u533a\u5206\u4e86\u300c\u96be\u5ea6\u611f\u77e5\u300d\uff08\u8de8\u9898\u76ee\u7684\u54cd\u5e94\u65f6\u95f4\u4e0e\u96be\u5ea6\u7684\u76f8\u5173\u6027\uff09\u548c\u300c\u8d44\u6e90\u5206\u914d\u300d\uff08\u540c\u4e00\u9898\u76ee\u7b54\u9519vs\u7b54\u5bf9\u65f6\u7684\u601d\u8003\u91cf\u5dee\u5f02\uff09\u4e24\u4e2a\u5c42\u9762\uff0c\u53d1\u73b0\u5927\u578b\u63a8\u7406\u6a21\u578b\uff08LRM\uff0 8b\u63a8\u7406\u6a21\u578b\u4e0e\u4eba\u7c7b\u5728\u9898\u76ee\u96be\u5ea6\u611f\u77e5\u4e0a\u76f8\u4f3c\uff0c\u4f46\u5728\u5931\u8d25\u65f6\u7684\u601d\u8003\u5206\u914d\u7b56\u7565\u4e0a\u622a\u7136\u76f8\u53cd", "upvotes": 0, "what_it_is": "\u672c\u6587\u533a\u5206\u4e86\u300c\u96be\u5ea6\u611f\u77e5\u300d\uff08\u8de8\u9898\u76ee\u7684\u54cd\u5e94\u65f6\u95f4\u4e0e\u96be\u5ea6\u7684\u76f8\u5173\u6027\uff09\u548c\u300c\u8d44\u6e90\u5206\u914d\u300d\uff08\u540c\u4e00\u9898\u76ee\u7b54\u9519vs\u7b54\u5bf9\u65f6\u7684\u601d\u8003\u91cf\u5dee\u5f02\uff09\u4e24\u4e2a\u5c42\u9762\uff0c\u53d1\u73b0\u5927\u578b\u63a8\u7406\u6a21\u578b\uff08LRM\uff09\u7b54\u9519\u65f6\u6bd4\u7b54\u5bf9\u65f6\u82b1\u8d39\u66f4\u591atoken\uff0c\u800c\u4eba\u7c7b\u6070\u597d\u76f8\u53cd\u2014\u2014\u4eba\u7c7b\u5728\u9884\u671f\u80fd\u89e3\u51b3\u7684\u9898\u76ee\u4e0a\u6295\u5165\u66f4\u591a\uff0c\u653e\u5f03\u56f0\u96be\u9898\u76ee\uff1bLRM\u5219\u5728\u4e0d\u786e\u5b9a\u65f6\u751f\u6210\u66f4\u957f\u7684\u63a8\u7406\u94fe\uff0c\u800c\u4e0d\u786e\u5b9a\u5f80\u5f80\u610f\u5473\u7740\u5931\u8d25\u3002", "why_notable": "\u63ed\u793a\u4e86LRM\u4e0e\u4eba\u7c7b\u5143\u63a8\u7406\u7b56\u7565\u7684\u6839\u672c\u5dee\u5f02\uff1aLRM\u7684\u63a8\u7406\u94fe\u957f\u5ea6\u53cd\u6620\u7684\u662f\u4e0d\u786e\u5b9a\u6027\u4fe1\u53f7\u800c\u975e\u6709\u6548\u7684\u8d44\u6e90\u63a7\u5236\uff0c\u8fd9\u5bf9\u8bc4\u4f30\u63a8\u7406\u6a21\u578b\u7684\u300c\u601d\u8003\u300d\u8d28\u91cf\u548c\u8bbe\u8ba1\u66f4\u5408\u7406\u7684\u505c\u6b62\u7b56\u7565\u5177\u6709\u91cd\u8981\u610f\u4e49"}, {"abstract": "Sphere neural networks have achieved symbolic level syllogistic reasoning without training data, raising the question of where the limit of the scaling law for logical reasoning lies, i.e., whether data-driven machine learning systems can achieve the same level by increasing training data and training time. We show two methodological limitations that prevent supervised deep learning from reaching the symbolic-level syllogistic reasoning: (1) training data can not distinguish all 24 types of valid syllogistic reasoning; (2) end-to-end mapping from premises to conclusion introduces contradictory training targets between neural components for pattern recognition and logical reasoning. Beside theoretical analysis, we experimentally illustrate that Euler Net cannot achieve rigorous syllogistic reasoning. We further challenge the most recent ChatGPTs (GPT-5-nano and GPT-5) to determine the satisfiability of syllogistic statements in four surface forms (patterns): words, double words, simple symbols, and long random symbols, showing that surface forms affect the reasoning performance and that ChatGPT GPT-5 may reach 100% accuracy but still provide incorrect explanations. As empirical training processes are stopped after achieving 100% accuracy, we conclude that supervised machine learning systems will not attain the rigour of symbolic logical reasoning.", "arxiv_id": "2606.26454", "arxiv_url": "https://arxiv.org/abs/2606.26454", "authors": ["Tiansi Dong", "Mateja Jamnik", "Pietro Li\u00f2"], "brief": "\u672c\u6587\u4ece\u7406\u8bba\u548c\u5b9e\u9a8c\u4e24\u65b9\u9762\u8bba\u8bc1\u4e86\u76d1\u7763\u6df1\u5ea6\u5b66\u4e60\u5728\u4e09\u6bb5\u8bba\u63a8\u7406\u4e0a\u7684\u6839\u672c\u5c40\u9650\uff1a\u8bad\u7ec3\u6570\u636e\u65e0\u6cd5\u533a\u5206\u5168\u90e824\u79cd\u6709\u6548\u4e09\u6bb5\u8bba\u7c7b\u578b\uff0c\u4e14\u7aef\u5230\u7aef\u6620\u5c04\u4f1a\u5728\u6a21\u5f0f\u8bc6\u522b\u4e0e\u903b\u8f91\u63a8\u7406\u795e\u7ecf\u7ec4\u4ef6\u95f4\u5f15\u5165\u77db\u76fe\u8bad\u7ec3\u76ee\u6807\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26454", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bad\u7ec3\u6570\u636e\u65e0\u6cd5\u533a\u520624\u79cd\u6709\u6548\u4e09\u6bb5\u8bba\u63a8\u7406\u7c7b\u578b\uff0c\u5bfc\u81f4\u76d1\u7763\u5b66\u4e60\u5b58\u5728\u65b9\u6cd5\u8bba\u74f6\u9888", "\u7aef\u5230\u7aef\u524d\u63d0\u5230\u7ed3\u8bba\u7684\u6620\u5c04\u5728\u6a21\u5f0f\u8bc6\u522b\u4e0e\u903b\u8f91\u63a8\u7406\u7ec4\u4ef6\u95f4\u4ea7\u751f\u77db\u76fe\u8bad\u7ec3\u76ee\u6807", "GPT-5\u5728\u4e0d\u540c\u8868\u9762\u5f62\u5f0f\uff08\u8bcd\u8bed/\u7b26\u53f7\uff09\u4e0b\u63a8\u7406\u51c6\u786e\u7387\u53d7\u5f71\u54cd\uff0c\u5373\u4f7f\u8fbe\u5230100%\u51c6\u786e\u7387\u4ecd\u7ed9\u51fa\u9519\u8bef\u89e3\u91ca"], "keywords": ["\u903b\u8f91\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b", "Scaling Law", "\u7b26\u53f7AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26454v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Data-driven Machine Learning Cannot Reach Symbolic-level Logical Reasoning -- The Limit of the Scaling Law", "tldr": "\u6570\u636e\u9a71\u52a8\u7684\u6df1\u5ea6\u5b66\u4e60\u5b58\u5728\u65b9\u6cd5\u8bba\u5c40\u9650\uff0c\u65e0\u6cd5\u8fbe\u5230\u7b26\u53f7\u7ea7\u4e09\u6bb5\u8bba\u903b\u8f91\u63a8\u7406\u7684\u4e25\u683c\u6027", "upvotes": 0, "what_it_is": "\u672c\u6587\u4ece\u7406\u8bba\u548c\u5b9e\u9a8c\u4e24\u65b9\u9762\u8bba\u8bc1\u4e86\u76d1\u7763\u6df1\u5ea6\u5b66\u4e60\u5728\u4e09\u6bb5\u8bba\u63a8\u7406\u4e0a\u7684\u6839\u672c\u5c40\u9650\uff1a\u8bad\u7ec3\u6570\u636e\u65e0\u6cd5\u533a\u5206\u5168\u90e824\u79cd\u6709\u6548\u4e09\u6bb5\u8bba\u7c7b\u578b\uff0c\u4e14\u7aef\u5230\u7aef\u6620\u5c04\u4f1a\u5728\u6a21\u5f0f\u8bc6\u522b\u4e0e\u903b\u8f91\u63a8\u7406\u795e\u7ecf\u7ec4\u4ef6\u95f4\u5f15\u5165\u77db\u76fe\u8bad\u7ec3\u76ee\u6807\u3002", "why_notable": "\u76f4\u63a5\u6311\u6218Scaling Law\u7684\u8fb9\u754c\uff0c\u4ece\u7406\u8bba\u5c42\u9762\u6307\u51fa\u6570\u636e\u9a71\u52a8ML\u65e0\u6cd5\u5b9e\u73b0\u4e25\u683c\u7b26\u53f7\u903b\u8f91\u63a8\u7406\uff0c\u5bf9LLM\u80fd\u529b\u8bc4\u4f30\u4e0eAI\u53d1\u5c55\u8def\u7ebf\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49"}, {"abstract": "We study certain extremal problems in combinatorial geometry that ask about configurations of points in an $n \\times n$ grid that satisfy strict, global geometric constraints. Classical exact solvers suffer from combinatorial explosion for these types of problems, and standard reinforcement learning and transformer-based models struggle with the sparse reward \"validity cliff\" and quadratic token-consumption limits. To overcome these bottlenecks, we propose a Geometry-Aware Monte Carlo Tree Search (MCTS) framework. Our approach strictly enforces geometric constraints through incremental updates to the feasible action space. For constraints about collections of collinear points, like those that occur in the classic No-Three-in-Line problem (Max-N3IL), this mechanism reduces the constraint checking complexity from $O(n^3)$ to $O(n^2)$. To improve search efficiency, we exploit geometric symmetries in two ways: canonical pruning during node expansion to reduce the branching factor, and symmetric batch transitions to accelerate the discovery of promising configurations. We perform extensive experiments and establish new best-known computational results on five out of six of the problems that we considered. Notably, for Max-N3IL we find configurations of size roughly $1.8 n$ for grids of size $82 \\le n \\le 119$. For the Smallest Complete Set problem, we find configurations of size roughly $0.95 n$, providing new upper bounds within the tested grids. This work establishes Geometry-Aware MCTS as a highly adaptable framework for discovering novel configurations in combinatorial geometry.", "arxiv_id": "2606.26399", "arxiv_url": "https://arxiv.org/abs/2606.26399", "authors": ["Luoning Zhang", "Xu Zhuang", "Tianhao Wang", "Nathan Kaplan"], "brief": "\u63d0\u51fa\u51e0\u4f55\u611f\u77e5\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22\uff08GA-MCTS\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u589e\u91cf\u7ea6\u675f\u66f4\u65b0\u548c\u51e0\u4f55\u5bf9\u79f0\u6027\u526a\u679d\uff0c\u9ad8\u6548\u6c42\u89e3n\u00d7n\u7f51\u683c\u4e0a\u7684\u7ec4\u5408\u51e0\u4f55\u6781\u503c\u95ee\u9898\uff08\u5982\u7ecf\u5178No-Three-in-Line\u95ee\u9898\uff09\u3002", "categories": ["cs.AI", "cs.CG", "cs.LG", "math.CO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26399", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u589e\u91cf\u66f4\u65b0\u53ef\u884c\u52a8\u4f5c\u7a7a\u95f4\uff0c\u5c06\u5171\u7ebf\u7ea6\u675f\u68c0\u67e5\u590d\u6742\u5ea6\u4eceO(n\u00b3)\u964d\u81f3O(n\u00b2)", "\u5229\u7528\u51e0\u4f55\u5bf9\u79f0\u6027\u8fdb\u884c\u89c4\u8303\u526a\u679d\u548c\u5bf9\u79f0\u6279\u91cf\u8f6c\u79fb\uff0c\u964d\u4f4e\u5206\u652f\u56e0\u5b50\u5e76\u52a0\u901f\u641c\u7d22", "\u5728\u516d\u4e2a\u6d4b\u8bd5\u95ee\u9898\u4e2d\u4e94\u4e2a\u5efa\u7acb\u65b0\u7684\u6700\u4f18\u8ba1\u7b97\u7ed3\u679c\uff0cMax-N3IL\u572882\u2264n\u2264119\u7684\u7f51\u683c\u4e0a\u627e\u5230\u7ea61.8n\u89c4\u6a21\u7684\u914d\u7f6e"], "keywords": ["\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22", "\u7ec4\u5408\u4f18\u5316", "\u5f3a\u5316\u5b66\u4e60", "\u6570\u5b66\u53d1\u73b0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26399v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Geometry-Aware MCTS for Extremal Problems in Combinatorial Geometry", "tldr": "\u51e0\u4f55\u611f\u77e5MCTS\u6846\u67b6\u6c42\u89e3\u7ec4\u5408\u51e0\u4f55\u6781\u503c\u95ee\u9898\uff0c\u5728\u516d\u4e2a\u95ee\u9898\u4e2d\u4e94\u4e2a\u5237\u65b0\u6700\u4f18\u8bb0\u5f55", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u51e0\u4f55\u611f\u77e5\u8499\u7279\u5361\u6d1b\u6811\u641c\u7d22\uff08GA-MCTS\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u589e\u91cf\u7ea6\u675f\u66f4\u65b0\u548c\u51e0\u4f55\u5bf9\u79f0\u6027\u526a\u679d\uff0c\u9ad8\u6548\u6c42\u89e3n\u00d7n\u7f51\u683c\u4e0a\u7684\u7ec4\u5408\u51e0\u4f55\u6781\u503c\u95ee\u9898\uff08\u5982\u7ecf\u5178No-Three-in-Line\u95ee\u9898\uff09\u3002", "why_notable": "\u5c06AI\u641c\u7d22\u65b9\u6cd5\u4e0e\u7ec4\u5408\u6570\u5b66\u6df1\u5ea6\u7ed3\u5408\uff0c\u7a81\u7834\u4e86\u7ecf\u5178\u7cbe\u786e\u6c42\u89e3\u5668\u7684\u7ec4\u5408\u7206\u70b8\u74f6\u9888\u548cRL\u7a00\u758f\u5956\u52b1\u56f0\u5883\uff0c\u4e3a\u6570\u5b66\u53d1\u73b0\u63d0\u4f9b\u4e86\u53ef\u6269\u5c55\u7684\u901a\u7528\u6846\u67b6"}, {"abstract": "Multimodal large language models (MLLMs) can process diverse inputs, e.g., text, images, audio, and video, and generate textual responses. While their capabilities have advanced rapidly, evaluation of such models has not kept pace. Most existing evaluation benchmarks are limited to isolated tasks and reveal little about whether a model integrates information across modalities. We examine current means for evaluating MLLMs and review the existing benchmark taxonomy to identify gaps, including temporal-spatial coherence, physical world understanding, multimodal consistency, and selective attention. Addressing these gaps is essential for measuring real progress in multimodal intelligence and exposing capability boundaries.", "arxiv_id": "2606.26348", "arxiv_url": "https://arxiv.org/abs/2606.26348", "authors": ["Po-han Li", "Shenghui Chen", "Sandeep Chinchali", "Ufuk Topcu"], "brief": "\u672c\u6587\u5bf9\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08MLLM\uff09\u7684\u73b0\u6709\u8bc4\u6d4b\u57fa\u51c6\u8fdb\u884c\u5168\u9762\u5ba1\u89c6\u4e0e\u5206\u7c7b\u68b3\u7406\uff0c\u8bc6\u522b\u51fa\u5f53\u524d\u8bc4\u6d4b\u4f53\u7cfb\u4e2d\u5b58\u5728\u7684\u5173\u952e\u7a7a\u767d\uff0c\u5305\u62ec\u65f6\u7a7a\u8fde\u8d2f\u6027\u3001\u7269\u7406\u4e16\u754c\u7406\u89e3\u3001\u8de8\u6a21\u6001\u4e00\u81f4\u6027\u548c\u9009\u62e9\u6027\u6ce8\u610f\u529b\u56db\u5927\u7ef4\u5ea6\u7684\u7f3a\u5931\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26348", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u73b0\u6709\u8bc4\u6d4b\u57fa\u51c6\u591a\u5c40\u9650\u4e8e\u5b64\u7acb\u4efb\u52a1\uff0c\u65e0\u6cd5\u8861\u91cf\u6a21\u578b\u8de8\u6a21\u6001\u4fe1\u606f\u6574\u5408\u80fd\u529b", "\u8bc6\u522b\u51fa\u56db\u5927\u8bc4\u6d4b\u76f2\u533a\uff1a\u65f6\u7a7a\u8fde\u8d2f\u6027\u3001\u7269\u7406\u4e16\u754c\u7406\u89e3\u3001\u591a\u6a21\u6001\u4e00\u81f4\u6027\u3001\u9009\u62e9\u6027\u6ce8\u610f\u529b", "\u547c\u5401\u6784\u5efa\u66f4\u5168\u9762\u7684\u8bc4\u6d4b\u4f53\u7cfb\u4ee5\u771f\u5b9e\u53cd\u6620\u591a\u6a21\u6001\u667a\u80fd\u7684\u80fd\u529b\u8fb9\u754c"], "keywords": ["\u591a\u6a21\u6001", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8bc4\u6d4b\u57fa\u51c6", "\u80fd\u529b\u8bc4\u4f30"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26348v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "What We are Missing in Multimodal LLM Evaluation?", "tldr": "\u7cfb\u7edf\u68b3\u7406\u591a\u6a21\u6001\u5927\u6a21\u578b\u8bc4\u6d4b\u4f53\u7cfb\u7684\u7f3a\u53e3\uff0c\u6307\u51fa\u73b0\u6709\u57fa\u51c6\u7684\u56db\u5927\u76f2\u533a", "upvotes": 0, "what_it_is": "\u672c\u6587\u5bf9\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08MLLM\uff09\u7684\u73b0\u6709\u8bc4\u6d4b\u57fa\u51c6\u8fdb\u884c\u5168\u9762\u5ba1\u89c6\u4e0e\u5206\u7c7b\u68b3\u7406\uff0c\u8bc6\u522b\u51fa\u5f53\u524d\u8bc4\u6d4b\u4f53\u7cfb\u4e2d\u5b58\u5728\u7684\u5173\u952e\u7a7a\u767d\uff0c\u5305\u62ec\u65f6\u7a7a\u8fde\u8d2f\u6027\u3001\u7269\u7406\u4e16\u754c\u7406\u89e3\u3001\u8de8\u6a21\u6001\u4e00\u81f4\u6027\u548c\u9009\u62e9\u6027\u6ce8\u610f\u529b\u56db\u5927\u7ef4\u5ea6\u7684\u7f3a\u5931\u3002", "why_notable": "\u968f\u7740MLLM\u80fd\u529b\u5feb\u901f\u63d0\u5347\uff0c\u8bc4\u6d4b\u6ede\u540e\u95ee\u9898\u65e5\u76ca\u7a81\u51fa\uff1b\u672c\u6587\u7cfb\u7edf\u6027\u5730\u68b3\u7406\u8bc4\u6d4b\u76f2\u533a\uff0c\u4e3a\u793e\u533a\u6784\u5efa\u4e0b\u4e00\u4ee3\u8bc4\u6d4b\u57fa\u51c6\u63d0\u4f9b\u4e86\u660e\u786e\u7684\u7814\u7a76\u65b9\u5411\uff0c\u5177\u6709\u91cd\u8981\u7684\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "We present CyberChainBench, a benchmark for evaluating LLM-based agents on smart contract security across three complementary tasks: vulnerability detection, exploit generation, and patch synthesis. Built from 541 real-world exploit incidents from DeFiHackLabs spanning 9 EVM chains, the benchmark provides end-to-end on-chain evaluation where agents interact with historical blockchain state through isolated evaluation environments orchestrated by Harbor, using tools to read code, trace transactions, and validate exploits on mainnet forks. Each case is anchored to a specific block and includes structured ground truth covering vulnerability type, localization, and attacker profit. Exploits are graded by economic impact on historical forks; patches are validated by replaying historical attacks and legitimate transactions as fail-to-pass test oracles on a proxy-upgradeable subset. We define a five-type vulnerability taxonomy and evaluate multiple agent--model configurations. Results reveal a clear difficulty gradient: the best configuration scores 37.5% on detection, 43.7% on exploitation, but only 23.4% on patching, with the top agent (Codex with GPT-5.5) realizing \\$57.4M in total exploit profit across the 200-case exploit set at a cost of $2.39 per case.", "arxiv_id": "2606.26216", "arxiv_url": "https://arxiv.org/abs/2606.26216", "authors": ["Jintao Huang", "Fengqing Jiang", "Radha Poovendran", "Zhiqiang Lin"], "brief": "\u63d0\u51faCyberChainBench\u57fa\u51c6\uff0c\u57fa\u4e8e541\u4e2a\u771f\u5b9eDeFi\u6f0f\u6d1e\u4e8b\u4ef6\uff0c\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u667a\u80fd\u5408\u7ea6\u6f0f\u6d1e\u68c0\u6d4b\u3001\u6f0f\u6d1e\u5229\u7528\u751f\u6210\u548c\u8865\u4e01\u5408\u6210\u4e09\u9879\u4efb\u52a1\u4e0a\u7684\u80fd\u529b\uff0c\u652f\u6301\u5728\u5386\u53f2\u533a\u5757\u94fe\u72b6\u6001\u7684\u9694\u79bb\u73af\u5883\u4e2d\u8fdb\u884c\u7aef\u5230\u7aef\u94fe\u4e0a\u8bc4\u4f30\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26216", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u6570\u636e\u96c6\u6765\u81eaDeFiHackLabs\u7684541\u4e2a\u771f\u5b9e\u94fe\u4e0a\u6f0f\u6d1e\u4e8b\u4ef6\uff0c\u8986\u76d69\u6761EVM\u94fe\uff0c\u5b9a\u4e49\u4e94\u7c7b\u6f0f\u6d1e\u5206\u7c7b\u4f53\u7cfb", "\u6700\u4f73\u914d\u7f6e\uff08Codex+GPT-5.5\uff09\u5728\u68c0\u6d4b/\u5229\u7528/\u4fee\u8865\u4e09\u9879\u4efb\u52a1\u5f97\u5206\u5206\u522b\u4e3a37.5%/43.7%/23.4%\uff0c\u4fee\u8865\u4efb\u52a1\u6700\u96be", "\u9876\u7ea7\u667a\u80fd\u4f53\u5728200\u4e2a\u6f0f\u6d1e\u5229\u7528\u6848\u4f8b\u4e2d\u7d2f\u8ba1\u5b9e\u73b05740\u4e07\u7f8e\u5143\u6a21\u62df\u6536\u76ca\uff0c\u6bcf\u4e2a\u6848\u4f8b\u6210\u672c\u4ec52.39\u7f8e\u5143"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u5b89\u5168", "\u57fa\u51c6\u6d4b\u8bd5", "\u533a\u5757\u94fe"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26216v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "CyberChainBench: Can AI Agents Secure Smart Contracts Against Real-World On-Chain Vulnerabilities?", "tldr": "CyberChainBench\uff1a\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u94fe\u4e0a\u667a\u80fd\u5408\u7ea6\u5b89\u5168\u4efb\u52a1\u4e2d\u8868\u73b0\u7684\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faCyberChainBench\u57fa\u51c6\uff0c\u57fa\u4e8e541\u4e2a\u771f\u5b9eDeFi\u6f0f\u6d1e\u4e8b\u4ef6\uff0c\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5728\u667a\u80fd\u5408\u7ea6\u6f0f\u6d1e\u68c0\u6d4b\u3001\u6f0f\u6d1e\u5229\u7528\u751f\u6210\u548c\u8865\u4e01\u5408\u6210\u4e09\u9879\u4efb\u52a1\u4e0a\u7684\u80fd\u529b\uff0c\u652f\u6301\u5728\u5386\u53f2\u533a\u5757\u94fe\u72b6\u6001\u7684\u9694\u79bb\u73af\u5883\u4e2d\u8fdb\u884c\u7aef\u5230\u7aef\u94fe\u4e0a\u8bc4\u4f30\u3002", "why_notable": "\u9996\u4e2a\u57fa\u4e8e\u771f\u5b9e\u94fe\u4e0a\u6f0f\u6d1e\u4e8b\u4ef6\u3001\u652f\u6301\u7ecf\u6d4e\u5f71\u54cd\u91cf\u5316\u8bc4\u4f30\u7684\u667a\u80fd\u5408\u7ea6\u5b89\u5168\u57fa\u51c6\uff0c\u63ed\u793a\u4e86\u5f53\u524dLLM\u667a\u80fd\u4f53\u5728\u81ea\u52a8\u5316\u5b89\u5168\u4fee\u590d\u4e0a\u7684\u663e\u8457\u77ed\u677f\uff0c\u5bf9DeFi\u5b89\u5168\u7814\u7a76\u548cAI\u667a\u80fd\u4f53\u80fd\u529b\u8bc4\u4f30\u5747\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Small ($\\sim$2B) GUI-grounding agents are attractive for on-device deployment, accessibility tooling, and low-cost iteration, but at this scale they face two open recipe questions: how to obtain bounding-box training data without expensive human annotation, and how to combine supervised fine-tuning with reinforcement learning. We address both, with the explicit goal of pushing small-model performance rather than scaling up. WinDOM is a $54{,}425$-record grounding corpus harvested by driving an open-source Windows 11 web reimplementation under headless Playwright, with bounding boxes read directly off the DOM and no OCR or human annotation. Self-Family Distillation (SFD) is a single rejection-sampling cold-start parameterised only by the teacher choice: either an EMA of the student (no external model) or a frozen larger same-family teacher. We then treat the saturation depth of the SFD cold-start as an explicit GRPO hyperparameter. On a Qwen3.5-2B student, the under-saturated cold-start is a better GRPO initialiser than the converged one: SFD-4B with Early-init RL gains $+5.4$ OOD-mean ($+3.5$ ScreenSpot-Pro, $+7.0$ OSWorld-G, $+5.8$ ScreenSpot-V2) over the base. The same-size EMA mode lands within roughly one OOD-mean point of the cross-size $4$B variant ($65.2$ vs $66.3$) without an external teacher.", "arxiv_id": "2606.25964", "arxiv_url": "https://arxiv.org/abs/2606.25964", "authors": ["Chengheng Li-Chen", "Zhiqian Zhou", "Hao Chen", "Nicolas Chauvin"], "brief": "\u63d0\u51faWinDOM\u6570\u636e\u96c6\uff0854,425\u6761\u8bb0\u5f55\uff09\u548c\u81ea\u5bb6\u65cf\u84b8\u998f\uff08SFD\uff09\u8bad\u7ec3\u65b9\u6cd5\uff0c\u4e13\u4e3a2B\u53c2\u6570\u5c0f\u6a21\u578bGUI\u754c\u9762\u5143\u7d20\u5b9a\u4f4d\u4efb\u52a1\u8bbe\u8ba1\uff0c\u901a\u8fc7Playwright\u81ea\u52a8\u4eceDOM\u8bfb\u53d6\u8fb9\u754c\u6846\uff0c\u7ed3\u5408\u62d2\u7edd\u91c7\u6837\u51b7\u542f\u52a8\u4e0eGRPO\u5f3a\u5316\u5b66\u4e60\u5b9e\u73b0\u9ad8\u6548\u8bad\u7ec3\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.25964", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["WinDOM\u8bed\u6599\u5e93\uff1a\u9a71\u52a8Windows 11 Web\u91cd\u5b9e\u73b0\u5728\u65e0\u5934Playwright\u4e0b\u81ea\u52a8\u91c7\u96c654,425\u6761\u8bb0\u5f55\uff0c\u76f4\u63a5\u4eceDOM\u8bfb\u53d6\u8fb9\u754c\u6846\uff0c\u65e0\u9700OCR\u6216\u4eba\u5de5\u6807\u6ce8", "\u81ea\u5bb6\u65cf\u84b8\u998f\uff08SFD\uff09\uff1a\u652f\u6301\u4e24\u79cd\u6a21\u5f0f\u2014\u2014\u5b66\u751f\u6a21\u578b\u7684EMA\u81ea\u84b8\u998f\uff08\u65e0\u9700\u5916\u90e8\u6a21\u578b\uff09\u6216\u540c\u5bb6\u65cf\u66f4\u5927\u51bb\u7ed3\u6559\u5e08\u84b8\u998f\uff0c\u4f5c\u4e3aGRPO\u7684\u51b7\u542f\u52a8\u521d\u59cb\u5316", "\u6b20\u9971\u548c\u51b7\u542f\u52a8\u7b56\u7565\uff1a\u5728Qwen3.5-2B\u4e0a\uff0c\u672a\u5b8c\u5168\u6536\u655b\u7684SFD\u51b7\u542f\u52a8\u6bd4\u5b8c\u5168\u6536\u655b\u7248\u672c\u66f4\u9002\u5408GRPO\u521d\u59cb\u5316\uff0cOOD\u5747\u503c\u63d0\u5347+5.4\uff08ScreenSpot-Pro +3.5\uff0cOSWorld-G +7.0\uff09"], "keywords": ["\u667a\u80fd\u4f53", "GUI\u5b9a\u4f4d", "\u77e5\u8bc6\u84b8\u998f", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.25964v1", "published_at": "2026-06-24", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "WinDOM: Self-Family Distillation for Small-Model GUI Grounding", "tldr": "WinDOM\u63d0\u51fa\u81ea\u5bb6\u65cf\u84b8\u998f\u65b9\u6cd5\uff0c\u7528DOM\u81ea\u52a8\u6807\u6ce8\u6570\u636e\u8bad\u7ec3\u5c0f\u578bGUI\u5b9a\u4f4d\u667a\u80fd\u4f53\uff0c\u65e0\u9700\u4eba\u5de5\u6807\u6ce8", "upvotes": 0, "what_it_is": "\u63d0\u51faWinDOM\u6570\u636e\u96c6\uff0854,425\u6761\u8bb0\u5f55\uff09\u548c\u81ea\u5bb6\u65cf\u84b8\u998f\uff08SFD\uff09\u8bad\u7ec3\u65b9\u6cd5\uff0c\u4e13\u4e3a2B\u53c2\u6570\u5c0f\u6a21\u578bGUI\u754c\u9762\u5143\u7d20\u5b9a\u4f4d\u4efb\u52a1\u8bbe\u8ba1\uff0c\u901a\u8fc7Playwright\u81ea\u52a8\u4eceDOM\u8bfb\u53d6\u8fb9\u754c\u6846\uff0c\u7ed3\u5408\u62d2\u7edd\u91c7\u6837\u51b7\u542f\u52a8\u4e0eGRPO\u5f3a\u5316\u5b66\u4e60\u5b9e\u73b0\u9ad8\u6548\u8bad\u7ec3\u3002", "why_notable": "\u89e3\u51b3\u4e86\u5c0f\u6a21\u578bGUI\u5b9a\u4f4d\u7684\u4e24\u5927\u6838\u5fc3\u96be\u9898\uff1a\u65e0\u6807\u6ce8\u6570\u636e\u83b7\u53d6\u4e0eSFT+RL\u7ed3\u5408\u7b56\u7565\uff1bEMA\u81ea\u84b8\u998f\u6a21\u5f0f\u65e0\u9700\u5916\u90e8\u6559\u5e08\u5373\u53ef\u8fbe\u5230\u63a5\u8fd14B\u6559\u5e08\u84b8\u998f\u7684\u6548\u679c\uff0865.2 vs 66.3\uff09\uff0c\u5bf9\u7aef\u4fa7\u90e8\u7f72\u6781\u5177\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Matrix-orthogonalization-based optimizers, exemplified by Muon, have demonstrated strong convergence behavior across a wide range of modern deep learning workloads. The matrix-aware updates offer a compelling alternative to conventional element-wise optimization, particularly as model architectures continue to grow in scale and heterogeneity. Yet contemporary distributed training infrastructure built around the assumption of element-wise optimizers is poorly matched to matrix-level optimizers such as Muon, whose updates couple entire weight matrices and require costly Newton-Schulz iterations. Vanilla Muon implementations incur more than 2x the cost of forward and backward passes. To close this gap, we present DMuon, an open-source distributed Muon implementation that integrates into existing training pipelines as a drop-in module, with no framework-level modifications. Across both embodied foundation model and large language model (LLM) training workloads, DMuon achieves a 1.48x-3.01x speedup in end-to-end step time and a 6.85x-163.00x speedup in optimizer-step time, bringing per-step latency to near-AdamW levels and enabling efficient scaling in our model training.", "arxiv_id": "2606.27153", "arxiv_url": "https://arxiv.org/abs/2606.27153", "authors": ["Vincent Chen", "Starrick Liu", "Regis Cheng", "Dance Yang", "Shalfun Li", "Ryan Yu", "Lucy Liang", "Hang Su", "Roy Gan", "Hao Wang", "Qian Wang"], "brief": "\u63d0\u51faDMuon\uff0c\u4e00\u4e2a\u5f00\u6e90\u7684\u5206\u5e03\u5f0fMuon\u4f18\u5316\u5668\u5b9e\u73b0\uff0c\u901a\u8fc7\u7cfb\u7edf\u7ea7\u4f18\u5316\u5c06\u77e9\u9635\u6b63\u4ea4\u5316\u4f18\u5316\u5668\u7684\u8bad\u7ec3\u5f00\u9500\u5927\u5e45\u964d\u4f4e\uff0c\u53ef\u4f5c\u4e3a\u5373\u63d2\u5373\u7528\u6a21\u5757\u96c6\u6210\u5230\u73b0\u6709\u8bad\u7ec3\u6d41\u6c34\u7ebf\u4e2d\uff0c\u65e0\u9700\u4fee\u6539\u6846\u67b6\u5e95\u5c42\u3002", "categories": ["cs.DC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.27153", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u539f\u59cbMuon\u5b9e\u73b0\u56e0Newton-Schulz\u8fed\u4ee3\u5bfc\u81f4\u4f18\u5316\u5668\u6b65\u9aa4\u5f00\u9500\u8d85\u8fc7\u524d\u5411+\u53cd\u5411\u4f20\u64ad\u76842\u500d\u4ee5\u4e0a", "DMuon\u5728\u7aef\u5230\u7aef\u6b65\u9aa4\u65f6\u95f4\u4e0a\u5b9e\u73b01.48x-3.01x\u52a0\u901f\uff0c\u4f18\u5316\u5668\u6b65\u9aa4\u65f6\u95f4\u52a0\u901f\u9ad8\u8fbe6.85x-163.00x", "\u5728\u5177\u8eab\u57fa\u7840\u6a21\u578b\u548cLLM\u8bad\u7ec3\u4efb\u52a1\u4e0a\u5747\u9a8c\u8bc1\u6709\u6548\uff0c\u6bcf\u6b65\u5ef6\u8fdf\u63a5\u8fd1AdamW\u6c34\u5e73"], "keywords": ["\u5206\u5e03\u5f0f\u8bad\u7ec3", "\u4f18\u5316\u5668", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7cfb\u7edf\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.27153v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "DMuon: Efficient Distributed Muon Training with Near-Adam Overhead", "tldr": "DMuon\u5c06\u77e9\u9635\u6b63\u4ea4\u5316\u4f18\u5316\u5668Muon\u7684\u5206\u5e03\u5f0f\u8bad\u7ec3\u5f00\u9500\u964d\u81f3\u63a5\u8fd1AdamW\u6c34\u5e73", "upvotes": 0, "what_it_is": "\u63d0\u51faDMuon\uff0c\u4e00\u4e2a\u5f00\u6e90\u7684\u5206\u5e03\u5f0fMuon\u4f18\u5316\u5668\u5b9e\u73b0\uff0c\u901a\u8fc7\u7cfb\u7edf\u7ea7\u4f18\u5316\u5c06\u77e9\u9635\u6b63\u4ea4\u5316\u4f18\u5316\u5668\u7684\u8bad\u7ec3\u5f00\u9500\u5927\u5e45\u964d\u4f4e\uff0c\u53ef\u4f5c\u4e3a\u5373\u63d2\u5373\u7528\u6a21\u5757\u96c6\u6210\u5230\u73b0\u6709\u8bad\u7ec3\u6d41\u6c34\u7ebf\u4e2d\uff0c\u65e0\u9700\u4fee\u6539\u6846\u67b6\u5e95\u5c42\u3002", "why_notable": "Muon\u4f18\u5316\u5668\u6536\u655b\u6027\u4f18\u4e8eAdam\u7cfb\u5217\uff0c\u4f46\u9ad8\u6602\u7684\u8ba1\u7b97\u5f00\u9500\u963b\u788d\u4e86\u5176\u5728\u5927\u89c4\u6a21\u5206\u5e03\u5f0f\u8bad\u7ec3\u4e2d\u7684\u5e94\u7528\uff1bDMuon\u586b\u8865\u4e86\u8fd9\u4e00\u5de5\u7a0b\u9e3f\u6c9f\uff0c\u4f7f\u77e9\u9635\u611f\u77e5\u4f18\u5316\u5668\u771f\u6b63\u5177\u5907\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language model (LLM) post-training for reasoning increasingly relies on reinforcement learning with verifiable rewards (RLVR), where models learn from ground-truth feedback on mathematical, logical, and scientific tasks. To enable flexible resource allocation and support heterogeneous training setups, modern RLVR systems adopt disaggregated architectures that decouple rollout generation and policy training across independent GPU pools. However, existing synchronous on-policy GRPO (Group Relative Policy Optimization) RLVR systems finish an entire rollout before starting training, leaving the trainer GPU pool idle while rollout is still ongoing. Asynchronous RL pipelines overlap the two stages, but at the cost of training on stale data. To address these challenges, we propose RolloutPipe, a post-training framework for disaggregated RLVR systems, which turns the fixed-weight rollout into a complete-group pipeline where trainable groups move to the trainer while later groups are still being generated. RolloutPipe achieves this through two techniques including complete-group pipelining (CGP) and frontier-group dispatch (FGD). CGP dispatches each trainable complete group to the trainer FIFO as soon as group materialization finishes, and FGD is an admission policy on the Rollout node that first admits requests for the frontier groups needed to form the next training batch, so that trainer-ready groups arrive earlier and more steadily. The design starts training before the rollout completes while maintaining on-policy correctness. Evaluated on Qwen3-1.7B across four reasoning and science benchmarks and twelve rollout settings, RolloutPipe shortens the rollout-to-train-end time by 30.7%-42.3%, and lowers the trainer waiting ratio by 37%-76% compared to Slime, a state-of-the-art rollout and training system.", "arxiv_id": "2606.26997", "arxiv_url": "https://arxiv.org/abs/2606.26997", "authors": ["Rongjian Chen", "Jianmin Hu", "Kejiang Ye", "Minxian Xu"], "brief": "\u63d0\u51faRolloutPipe\u6846\u67b6\uff0c\u9488\u5bf9\u5206\u79bb\u5f0fRLVR\u7cfb\u7edf\uff0c\u901a\u8fc7\u5b8c\u6574\u7ec4\u6d41\u6c34\u7ebf\uff08CGP\uff09\u548c\u524d\u6cbf\u7ec4\u8c03\u5ea6\uff08FGD\uff09\u4e24\u9879\u6280\u672f\uff0c\u5728rollout\u672a\u5b8c\u6210\u65f6\u5373\u5f00\u59cb\u8bad\u7ec3\uff0c\u540c\u65f6\u4fdd\u6301on-policy\u6b63\u786e\u6027\u3002", "categories": ["cs.DC", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2606.26997", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5b8c\u6574\u7ec4\u6d41\u6c34\u7ebf\uff08CGP\uff09\uff1a\u6bcf\u4e2a\u53ef\u8bad\u7ec3\u5b8c\u6574\u7ec4\u4e00\u65e6\u751f\u6210\u5b8c\u6bd5\u5373FIFO\u5206\u53d1\u7ed9\u8bad\u7ec3\u8282\u70b9\uff0c\u65e0\u9700\u7b49\u5f85\u6574\u8f6erollout\u7ed3\u675f", "\u524d\u6cbf\u7ec4\u8c03\u5ea6\uff08FGD\uff09\uff1a\u5728Rollout\u8282\u70b9\u4f18\u5148\u63a5\u7eb3\u6784\u6210\u4e0b\u4e00\u8bad\u7ec3\u6279\u6b21\u6240\u9700\u7684\u524d\u6cbf\u7ec4\u8bf7\u6c42\uff0c\u4f7f\u8bad\u7ec3\u5c31\u7eea\u7ec4\u66f4\u65e9\u3001\u66f4\u5e73\u7a33\u5730\u5230\u8fbe", "\u5728Qwen3-1.7B\u4e0a\u8bc4\u4f30\uff0c\u76f8\u6bd4SOTA\u7cfb\u7edfSlime\uff0crollout\u5230\u8bad\u7ec3\u7ed3\u675f\u65f6\u95f4\u7f29\u77ed30.7%-42.3%\uff0c\u8bad\u7ec3\u7b49\u5f85\u6bd4\u4f8b\u964d\u4f4e37%-76%"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5206\u5e03\u5f0f\u8bad\u7ec3", "\u7cfb\u7edf\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2606.26997v1", "published_at": "2026-06-25", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RolloutPipe: Overlapping Pipelined Rollout and Training in Disaggregated On-Policy LLM Reinforcement Learning", "tldr": "RolloutPipe\u901a\u8fc7\u6d41\u6c34\u7ebf\u91cd\u53e0rollout\u4e0e\u8bad\u7ec3\uff0c\u63d0\u5347LLM\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u6548\u738730-42%", "upvotes": 0, "what_it_is": "\u63d0\u51faRolloutPipe\u6846\u67b6\uff0c\u9488\u5bf9\u5206\u79bb\u5f0fRLVR\u7cfb\u7edf\uff0c\u901a\u8fc7\u5b8c\u6574\u7ec4\u6d41\u6c34\u7ebf\uff08CGP\uff09\u548c\u524d\u6cbf\u7ec4\u8c03\u5ea6\uff08FGD\uff09\u4e24\u9879\u6280\u672f\uff0c\u5728rollout\u672a\u5b8c\u6210\u65f6\u5373\u5f00\u59cb\u8bad\u7ec3\uff0c\u540c\u65f6\u4fdd\u6301on-policy\u6b63\u786e\u6027\u3002", "why_notable": "\u89e3\u51b3\u4e86\u5206\u79bb\u5f0fRLVR\u7cfb\u7edf\u4e2d\u8bad\u7ec3GPU\u7a7a\u95f2\u7b49\u5f85rollout\u7684\u683
