const PAPERS = [{"abstract": "Agentic LLM systems that generate code through multi-turn tool use face a fundamental context problem: each session starts from zero, discarding the configuration choices, domain constraints, data schemas, and tool-use patterns that made previous sessions productive. Naively persisting entire conversation histories is token-inefficient and counterproductive: irrelevant context degrades generation quality. We introduce shared selective persistent memory, an architecture that identifies and retains four categories of reusable context (task specifications, data schemas, tool configurations, and output constraints) while discarding session-specific reasoning traces. Crucially, this memory is shared: workspaces encapsulating selective memory can be transferred across users with role-based access control, enabling collaborative reuse without redundant specification. We implement it in a deployed collaborative workspace platform where LLM agents produce, edit, and maintain git-versioned artifacts (dashboards, reports, and data-driven documents) from heterogeneous sources (CSV, SQL, REST APIs, and MCP servers). A complementary zero-token data refresh mechanism decouples generated programs from runtime data, enabling artifact reuse without re-invocation. Across three enterprise scenarios, shared selective persistent memory achieves 96% task completion (vs. 79% without memory and 71% with full history). Zero-token refresh eliminates LLM re-invocation for recurring updates (14x task-time reduction), while summary-driven generation cuts per-invocation token cost by 97x versus raw data injection. A replication on four public datasets confirms generalizability, with zero-token refresh succeeding in 12/12 trials. Notably, naive full-history persistence actively degrades completion by biasing the agent with stale traces, while selective memory outperforms both extremes.", "arxiv_id": "2607.09493", "arxiv_url": "https://arxiv.org/abs/2607.09493", "autho om mathematical researchers. Among the 21 solutions that received human feedback, 5 were judged completely correct, 2 more were judged promising pending final verification, and a further 8 contained useful partial progress. In this short paper, we describe the development of ProofCouncil and the agent-building library used to create it, which we release as open source to the community.", "arxiv_id": "2607.09474", "arxiv_url": "https://arxiv.org/abs/2607.09474", "authors": ["Johannes Schmitt", "Tim Gehrunger", "Jasper Dekoninck", "Gergely B\u00e9rczi", "Uri Kreitner", "Liam Price", "David Holmes"], "brief": "\u63d0\u51faProofCouncil\uff0c\u4e00\u4e2a\u91c7\u7528\u4f5c\u8005-\u8bc4\u5ba1\uff08author-critic\uff09\u67b6\u6784\u7684\u6570\u5b66\u8bc1\u660e\u667a\u80fd\u4f53\uff0c\u4e13\u4e3a\u89e3\u51b3\u771f\u5b9e\u4e16\u754c\u5f00\u653e\u6570\u5b66\u95ee\u9898\u800c\u8bbe\u8ba1\uff0c\u5e76\u5728FirstProof\u7ade\u8d5b\u4e2d\u53d6\u5f97\u6700\u4f73\u6210\u7ee9\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09474", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5728FirstProof\u7ade\u8d5b10\u9053\u771f\u5b9e\u6570\u5b66\u9898\u4e2d\uff0c6\u9053\u88ab\u88c1\u5224\u8bc4\u5b9a\u4e3a\u6b63\u786e\uff08\u81f3\u591a\u9700\u5c0f\u4fee\uff09\uff0c\u4f4d\u5217\u53c2\u8d5b\u961f\u4f0d\u7b2c\u4e00", "\u572830\u9053\u6765\u81ea\u6570\u5b66\u7814\u7a76\u8005\u7684\u5f00\u653e\u95ee\u9898\u4e2d\uff0c21\u9053\u83b7\u5f97\u4eba\u5de5\u53cd\u9988\uff0c\u5176\u4e2d5\u9053\u5b8c\u5168\u6b63\u786e\u30012\u9053\u6709\u671b\u9a8c\u8bc1\u901a\u8fc7\u30018\u9053\u6709\u5b9e\u8d28\u6027\u8fdb\u5c55", "\u5f00\u6e90\u4e86\u6784\u5efa\u8be5\u667a\u80fd\u4f53\u6240\u7528\u7684agent\u6784\u5efa\u5e93\uff0c\u4f9b\u793e\u533a\u4f7f\u7528"], "keywords": ["\u667a\u80fd\u4f53", "\u6570\u5b66\u63a8\u7406", "LLM", "\u81ea\u52a8\u5b9a\u7406\u8bc1\u660e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09474v1", "published_at": "2026-07-10", "score": 0.425, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "ProofCouncil: An LLM Agent for Solving Open Mathematical Problems", "tldr": "ProofCouncil\uff1a\u57fa\u4e8e\u4f5c\u8005-\u8bc4\u5ba1\u67b6\u6784\u7684LLM\u6570\u5b66\u667a\u80fd\u4f53\uff0c\u5728\u771f\u5b9e\u5f00\u653e\u6570\u5b66\u95ee\u9898\u4e0a\u8868\u73b0\u6700\u4f18", "upvotes": 0, "what_it_is": "\u63d0\u51faProofCouncil\uff0c\u4e00\u4e2a\u91c7\u7528\u4f5c\u8005-\u8bc4\u5ba1\uff08author-critic\uff09\u67b6\u6784\u7684\u6570\u5b66\u8bc1\u660e\u667a\u80fd\u4f53\uff0c\u4e13\u4e3a\u89e3\u51b3\u771f\u5b9e\u4e16\u754c\u5f00\u653e\u6570\u5b66\u95ee\u9898\u800c\u8bbe\u8ba1\uff0c\u5e76\u5728FirstProof\u7ade\u8d5b\u4e2d\u53d6\u5f97\u6700\u4f73\u6210\u7ee9\u3002", "why_notable": "\u9996\u6b21\u5728\u771f\u5b9e\u5f00\u653e\u6570\u5b66\u7814\u7a76\u95ee\u9898\uff08\u975e\u7ade\u8d5b\u9898\u5e93\uff09\u4e0a\u5c55\u793aLLM\u667a\u80fd\u4f53\u7684\u5b9e\u7528\u4ef7\u503c\uff0c\u4f5c\u8005-\u8bc4\u5ba1\u67b6\u6784\u6709\u6548\u63d0\u5347\u8bc1\u660e\u8d28\u91cf\uff0c\u4e14\u5f00\u6e90\u5de5\u5177\u94fe\u5177\u6709\u8f83\u9ad8\u590d\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language model (LLM) agents are increasingly expected to play a central role in AI-driven scientific discovery. Equipped with broad knowledge, flexible reasoning, and tool use, they have the potential to autonomously explore and solve scientific problems by repeatedly proposing hypotheses, testing them, and revising their beliefs in the light of the evidence. In current agents, however, these hypotheses, tests, and belief updates are buried in unstructured logs, and no mechanism lets the agent or the human researcher audit that process. Here we propose the Hypothesis Evolution Protocol (HEP), an agent harness that provides hypothesis generation, evaluation, and evolution as explicit, auditable operations. On materials-science research tasks, a HEP-equipped agent operates the hypothesis--test--evidence--belief cycle that planning-style agents lack, generalizes across research questions, and exploits the protocol more fully as the base LLM becomes more capable. These results mark a step toward auditable AI scientists, whose scientific reasoning can be inspected, verified, and built upon.", "arxiv_id": "2607.09195", "arxiv_url": "https://arxiv.org/abs/2607.09195", "authors": ["Izumi Takahara", "Teruyasu Mizoguchi"], "brief": "\u672c\u6587\u63d0\u51fa\u5047\u8bbe\u6f14\u5316\u534f\u8bae\uff08HEP\uff09\uff0c\u4e00\u79cd\u4e3aLLM\u667a\u80fd\u4f53\u63d0\u4f9b\u663e\u5f0f\u3001\u53ef\u5ba1\u8ba1\u7684\u5047\u8bbe\u751f\u6210-\u8bc4\u4f30-\u6f14\u5316\u64cd\u4f5c\u6846\u67b6\uff0c\u4f7fAI\u79d1\u5b66\u5bb6\u7684\u79d1\u5b66\u63a8\u7406\u8fc7\u7a0b\u53ef\u88ab\u68c0\u67e5\u548c\u9a8c\u8bc1\u3002", "categories": ["cs.AI", "cond-mat.mtrl-sci"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09195", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["HEP\u5c06\u5047\u8bbe\u751f\u6210\u3001\u8bc4\u4f30\u4e0e\u6f14\u5316\u4f5c\u4e3a\u663e\u5f0f\u64cd\u4f5c\uff0c\u89e3\u51b3\u5f53\u524d\u667a\u80fd\u4f53\u63a8\u7406\u8fc7\u7a0b\u57cb\u85cf\u4e8e\u975e\u7ed3\u6784\u5316\u65e5\u5fd7\u7684\u95ee\u9898", "\u5728\u6750\u6599\u79d1\u5b66\u7814\u7a76\u4efb\u52a1\u4e0a\u9a8c\u8bc1\uff0cHEP\u667a\u80fd\u4f53\u80fd\u5b8c\u6574\u6267\u884c\u5047\u8bbe-\u6d4b\u8bd5-\u8bc1\u636e-\u4fe1\u5ff5\u66f4\u65b0\u5faa\u73af", "\u57fa\u7840LLM\u80fd\u529b\u8d8a\u5f3a\uff0c\u667a\u80fd\u4f53\u5bf9HEP\u534f\u8bae\u7684\u5229\u7528\u8d8a\u5145\u5206\uff0c\u5177\u6709\u826f\u597d\u7684\u53ef\u6269\u5c55\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u53d1\u73b0", "\u5927\u8bed\u8a00\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09195v1", "published_at": "2026-07-10", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Toward Auditable AI Scientists: A Hypothesis Evolution Protocol for LLM Agents", "tldr": "\u63d0\u51fa\u5047\u8bbe\u6f14\u5316\u534f\u8baeHEP\uff0c\u8ba9LLM\u79d1\u5b66\u667a\u80fd\u4f53\u7684\u63a8\u7406\u8fc7\u7a0b\u53ef\u5ba1\u8ba1\u3001\u53ef\u8ffd\u6eaf", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\u5047\u8bbe\u6f14\u5316\u534f\u8bae\uff08HEP\uff09\uff0c\u4e00\u79cd\u4e3aLLM\u667a\u80fd\u4f53\u63d0\u4f9b\u663e\u5f0f\u3001\u53ef\u5ba1\u8ba1\u7684\u5047\u8bbe\u751f\u6210-\u8bc4\u4f30-\u6f14\u5316\u64cd\u4f5c\u6846\u67b6\uff0c\u4f7fAI\u79d1\u5b66\u5bb6\u7684\u79d1\u5b66\u63a8\u7406\u8fc7\u7a0b\u53ef\u88ab\u68c0\u67e5\u548c\u9a8c\u8bc1\u3002", "why_notable": "AI\u79d1\u5b66\u53d1\u73b0\u7684\u53ef\u5ba1\u8ba1\u6027\u662f\u5f53\u524d\u91cd\u5927\u6311\u6218\uff0cHEP\u9996\u6b21\u5c06\u79d1\u5b66\u63a8\u7406\u8fc7\u7a0b\u7ed3\u6784\u5316\u5e76\u8d4b\u4e88\u53ef\u8ffd\u6eaf\u6027\uff0c\u5bf9\u63a8\u52a8\u53ef\u4fe1AI\u79d1\u5b66\u5bb6\u7814\u7a76\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002"}, {"abstract": "Deployed LLM agents rely on agentic context, the model-external textual control content assembled by an operational harness. In this work, the mutable component of that context is a persistent system-level instruction that is updated from operational experience while the model, tools, and harness remain fixed. Over long evolution horizons, flat-text maintenance makes verification increasingly difficult as accumulated instructions grow and interact. We propose Graph-Regularized Agentic Context Evolution (GRACE), which maintains the persistent instruction component as a typed semantic graph and validates proposed updates within the local typed neighborhoods of modified nodes. Accepted graph updates are reconstructed as incremental edits to the textual instruction checkpoint used at deployment. We evaluate GRACE within a fixed telecom agent harness derived from $\u03c4^2$-bench under a controlled distribution-shift protocol. Across five independent replications, GRACE improves strict reliability, measured by pass^3, from the Gemini 2.5 Flash zero-shot value of 0.091 to 0.673$\\pm$0.136 at the final checkpoint. This exceeds a Gemini 3.1 Pro zero-shot reference of 0.242 on the same held-out set, while the flat-text HCE baseline finishes at 0.191$\\pm$0.051. These results identify two requirements for reliable long-horizon context evolution, a structural substrate that makes verification local and a consolidation mechanism that keeps accumulated instruction content usable.", "arxiv_id": "2607.09175", "arxiv_url": "https://arxiv.org/abs/2607.09175", "authors": ["Dan C. Hsu", "Luke Lu"], "brief": "\u63d0\u51faGraph-Regularized Agentic Context Evolution\uff08GRACE\uff09\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7684\u6301\u4e45\u5316\u7cfb\u7edf\u6307\u4ee4\u7ef4\u62a4\u4e3a\u7c7b\u578b\u5316\u8bed\u4e49\u56fe\uff0c\u901a\u8fc7\u5c40\u90e8\u90bb\u57df\u9a8c\u8bc1\u6765\u7ba1\u7406\u5206\u5e03\u504f\u79fb\u4e0b\u7684\u957f\u671f\u4e0a\u4e0b\u6587\u6f14\u5316\uff0c\u5e76\u5c06\u56fe\u66f4\u65b0\u91cd\u5efa\u4e3a\u53ef\u90e8\u7f72\u7684\u6587\u672c\u6307\u4ee4\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09175", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5c06\u667a\u80fd\u4f53\u4e0a\u4e0b\u6587\u8868\u793a\u4e3a\u7c7b\u578b\u5316\u8bed\u4e49\u56fe\uff0c\u4ec5\u5728\u4fee\u6539\u8282\u70b9\u7684\u5c40\u90e8\u90bb\u57df\u5185\u9a8c\u8bc1\u66f4\u65b0\uff0c\u4f7f\u9a8c\u8bc1\u590d\u6742\u5ea6\u53ef\u63a7", "\u5728\u7535\u4fe1\u9886\u57df\u03c4\u00b2-bench\u57fa\u51c6\u4e0a\uff0cpass\u00b3\u6307\u6807\u4eceGemini 2.5 Flash\u96f6\u6837\u672c\u76840.091\u63d0\u5347\u81f30.673\u00b10.136\uff0c\u8d85\u8d8aGemini 3.1 Pro\u76840.242", "\u5e73\u5766\u6587\u672c\u57fa\u7ebfHCE\u4ec5\u8fbe0.191\u00b10.051\uff0c\u8bc1\u660e\u7ed3\u6784\u5316\u57fa\u5e95\u4e0e\u6574\u5408\u673a\u5236\u662f\u957f\u671f\u53ef\u9760\u6f14\u5316\u7684\u4e24\u4e2a\u5173\u952e\u8981\u7d20"], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4e0a\u4e0b\u6587\u7ba1\u7406", "\u53ef\u9760\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09175v1", "published_at": "2026-07-10", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Scoped Verification for Reliable Long-Horizon Agentic Context Evolution under Distribution Shift", "tldr": "\u63d0\u51faGRACE\u6846\u67b6\uff0c\u7528\u8bed\u4e49\u56fe\u7ed3\u6784\u7ba1\u7406LLM\u667a\u80fd\u4f53\u7684\u957f\u671f\u4e0a\u4e0b\u6587\u6f14\u5316\uff0c\u5927\u5e45\u63d0\u5347\u53ef\u9760\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51faGraph-Regularized Agentic Context Evolution\uff08GRACE\uff09\uff0c\u5c06LLM\u667a\u80fd\u4f53\u7684\u6301\u4e45\u5316\u7cfb\u7edf\u6307\u4ee4\u7ef4\u62a4\u4e3a\u7c7b\u578b\u5316\u8bed\u4e49\u56fe\uff0c\u901a\u8fc7\u5c40\u90e8\u90bb\u57df\u9a8c\u8bc1\u6765\u7ba1\u7406\u5206\u5e03\u504f\u79fb\u4e0b\u7684\u957f\u671f\u4e0a\u4e0b\u6587\u6f14\u5316\uff0c\u5e76\u5c06\u56fe\u66f4\u65b0\u91cd\u5efa\u4e3a\u53ef\u90e8\u7f72\u7684\u6587\u672c\u6307\u4ee4\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u56fe\u7ed3\u6784\u5f15\u5165LLM\u667a\u80fd\u4f53\u4e0a\u4e0b\u6587\u7684\u957f\u671f\u6f14\u5316\u7ba1\u7406\uff0c\u5728\u5206\u5e03\u504f\u79fb\u573a\u666f\u4e0b\u5b9e\u73b0\u4e86\u663e\u8457\u7684\u53ef\u9760\u6027\u63d0\u5347\uff0c\u4e3a\u751f\u4ea7\u73af\u5883\u4e2d\u667a\u80fd\u4f53\u81ea\u6211\u6539\u8fdb\u63d0\u4f9b\u4e86\u53ef\u9a8c\u8bc1\u7684\u5de5\u7a0b\u8def\u5f84\u3002"}, {"abstract": "As chip complexity increases and time-to-market pressures grow, front-end design has become a critical bottleneck in chip development. Recently, Large Language Models (LLMs) have shown great potential in Electronic Design Automation (EDA). Beyond specification understanding, LLMs show the potential to serve as a unified intelligent interface for hardware description language (HDL) generation, testbench construction, and design space exploration. The rise of agentic AI, represented by pioneering systems such as OpenClaw, offers a strategic roadmap for the next generation EDA. From this perspective, this paper discusses the evolution of EDA from localized assistance to autonomous agentic execution. Then, we review representative advances of LLMs in front-end design, focusing on key tasks such as circuit and testbench generation from a shared specification, as well as design quality improvement in established workflows such as high-level synthesis. Finally, we discuss the key challenges and limitations of integrating LLMs into EDA, and outline future opportunities for advancing LLM-enabled front-end design, offering a systematic perspective for researchers interested in leveraging agentic AI technologies for EDA.", "arxiv_id": "2607.09616", "arxiv_url": "https://arxiv.org/abs/2607.09616", "authors": ["Kangwei Xu", "Bing Li", "Ulf Schlichtmann"], "brief": "\u672c\u6587\u7cfb\u7edf\u7efc\u8ff0\u4e86\u5927\u8bed\u8a00\u6a21\u578b\uff08LLM\uff09\u5728\u7535\u5b50\u8bbe\u8ba1\u81ea\u52a8\u5316\uff08EDA\uff09\u524d\u7aef\u8bbe\u8ba1\u4e2d\u7684\u5e94\u7528\uff0c\u6db5\u76d6HDL\u751f\u6210\u3001\u6d4b\u8bd5\u53f0\u6784\u5efa\u3001\u8bbe\u8ba1\u7a7a\u95f4\u63a2\u7d22\u53ca\u9ad8\u5c42\u6b21\u7efc\u5408\u7b49\u5173\u952e\u4efb\u52a1\uff0c\u5e76\u63a2\u8ba8\u4e86\u4ece\u5c40\u90e8\u8f85\u52a9\u5230\u81ea\u4e3b\u667a\u80fd\u4f53\u6267\u884c\u7684\u6f14\u8fdb\u8def\u5f84\u3002", "categories": ["cs.ET", "cs.AR", "cs.LG", "eess.SY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09616", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["LLM\u53ef\u4f5c\u4e3a\u7edf\u4e00\u667a\u80fd\u63a5\u53e3\uff0c\u652f\u6301HDL\u4ee3\u7801\u751f\u6210\u3001\u6d4b\u8bd5\u53f0\u6784\u5efa\u548c\u8bbe\u8ba1\u7a7a\u95f4\u63a2\u7d22\u7b49\u591a\u9879\u524d\u7aef\u8bbe\u8ba1\u4efb\u52a1", "\u4ee5OpenClaw\u4e3a\u4ee3\u8868\u7684\u667a\u80fd\u4f53AI\u7cfb\u7edf\u4e3a\u4e0b\u4e00\u4ee3EDA\u63d0\u4f9b\u4e86\u6218\u7565\u8def\u7ebf\u56fe\uff0c\u63a8\u52a8EDA\u5411\u81ea\u4e3b\u6267\u884c\u6f14\u8fdb", "\u91cd\u70b9\u8ba8\u8bba\u4e86LLM\u96c6\u6210\u5230EDA\u4e2d\u7684\u5173\u952e\u6311\u6218\uff08\u5982\u89c4\u8303\u7406\u89e3\u3001\u8bbe\u8ba1\u8d28\u91cf\u4fdd\u8bc1\uff09\u53ca\u672a\u6765\u7814\u7a76\u673a\u9047"], "keywords": ["\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "EDA", "\u82af\u7247\u8bbe\u8ba1"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09616v1", "published_at": "2026-07-10", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "LLM for EDA in Front-End Design: Challenges and Opportunities", "tldr": "\u7efc\u8ff0LLM\u5728\u82af\u7247\u524d\u7aef\u8bbe\u8ba1EDA\u4e2d\u7684\u5e94\u7528\u8fdb\u5c55\u3001\u6311\u6218\u4e0e\u672a\u6765\u673a\u9047", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u7efc\u8ff0\u4e86\u5927\u8bed\u8a00\u6a21\u578b\uff08LLM\uff09\u5728\u7535\u5b50\u8bbe\u8ba1\u81ea\u52a8\u5316\uff08EDA\uff09\u524d\u7aef\u8bbe\u8ba1\u4e2d\u7684\u5e94\u7528\uff0c\u6db5\u76d6HDL\u751f\u6210\u3001\u6d4b\u8bd5\u53f0\u6784\u5efa\u3001\u8bbe\u8ba1\u7a7a\u95f4\u63a2\u7d22\u53ca\u9ad8\u5c42\u6b21\u7efc\u5408\u7b49\u5173\u952e\u4efb\u52a1\uff0c\u5e76\u63a2\u8ba8\u4e86\u4ece\u5c40\u90e8\u8f85\u52a9\u5230\u81ea\u4e3b\u667a\u80fd\u4f53\u6267\u884c\u7684\u6f14\u8fdb\u8def\u5f84\u3002", "why_notable": "\u968f\u7740\u82af\u7247\u590d\u6742\u5ea6\u6301\u7eed\u6500\u5347\uff0c\u524d\u7aef\u8bbe\u8ba1\u5df2\u6210\u4e3a\u5f00\u53d1\u74f6\u9888\uff0c\u672c\u6587\u4e3a\u7814\u7a76\u8005\u63d0\u4f9b\u4e86LLM\u8d4b\u80fdEDA\u7684\u7cfb\u7edf\u6027\u89c6\u89d2\uff0c\u5bf9\u5b66\u672f\u754c\u548c\u5de5\u4e1a\u754c\u5747\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Explaining machine-learning models is increasingly important for decision-making and consumer trust, yet it is widely believed to come at a cost: existing Explainable AI (XAI) methods suffer from a persistent accuracy-explainability trade-off. We argue that this trade-off is not fundamental, but an artifact of treating explanation and prediction as separate objectives; when properly coupled, they become complementary, so that equipping a model to explain itself improves, rather than degrades, its accuracy. We introduce the Rashomon Explanation paradigm, which builds a set of faithful, prediction-guiding explanations rather than a single one, and prove that this set is generally non-empty and that explanation fidelity bounds the performance of the models it guides. To explore this set, we propose RashomonLLM, an Explanation-Prediction-Reflection agentic workflow that generates explanations in natural language by iteratively aligning them with predictions, and we prove it converges and recovers the full set. Across customer-churn classification, clinical survival regression, and industrial click-through prediction on large-scale live-streaming logs, RashomonLLM significantly outperforms state-of-the-art prediction and XAI baselines on both accuracy and explanation quality, with gains driven by explanation fidelity and robust to distribution shifts, temporal splits, and seeds. Our framework thus advances business performance while laying the groundwork for consumer trust.", "arxiv_id": "2607.09502", "arxiv_url": "https://arxiv.org/abs/2607.09502", "authors": ["Pan Li"], "brief": "\u672c\u6587\u63d0\u51faRashomon Explanation\u8303\u5f0f\uff0c\u6784\u5efa\u4e00\u7ec4\u5fe0\u5b9e\u7684\u9884\u6d4b\u5f15\u5bfc\u89e3\u91ca\u96c6\u5408\uff08\u800c\u975e\u5355\u4e00\u89e3\u91ca\uff09\uff0c\u5e76\u8bbe\u8ba1RashomonLLM\u667a\u80fd\u4f53\u5de5\u4f5c\u6d41\uff0c\u901a\u8fc7\u8fed\u4ee3\u5bf9\u9f50\u89e3\u91ca\u4e0e\u9884\u6d4b\u6765\u751f\u6210\u81ea\u7136\u8bed\u8a00\u89e3\u91ca\uff0c\u4ece\u7406\u8bba\u4e0a\u8bc1\u660e\u89e3\u91ca\u4fdd\u771f\u5ea6\u53ef\u7ea6\u675f\u6a21\u578b\u6027\u80fd\u4e0a\u754c\u3002", "categories": ["cs.LG", "cs.AI", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09502", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7406\u8bba\u8bc1\u660e\uff1a\u89e3\u91ca\u96c6\u5408\u901a\u5e38\u975e\u7a7a\uff0c\u4e14\u89e3\u91ca\u4fdd\u771f\u5ea6\u76f4\u63a5\u7ea6\u675f\u88ab\u5f15\u5bfc\u6a21\u578b\u7684\u6027\u80fd\uff0c\u6253\u7834\u51c6\u786e\u6027-\u53ef\u89e3\u91ca\u6027\u6743\u8861\u7684\u56fa\u6709\u8ba4\u77e5", "RashomonLLM\u91c7\u7528\u89e3\u91ca-\u9884\u6d4b-\u53cd\u601d\uff08EPR\uff09\u667a\u80fd\u4f53\u5faa\u73af\u5de5\u4f5c\u6d41\uff0c\u53ef\u6536\u655b\u5e76\u6062\u590d\u5b8c\u6574\u89e3\u91ca\u96c6", "\u5728\u5ba2\u6237\u6d41\u5931\u5206\u7c7b\u3001\u4e34\u5e8a\u751f\u5b58\u56de\u5f52\u3001\u5de5\u4e1a\u76f4\u64ad\u70b9\u51fb\u7387\u9884\u6d4b\u4e09\u7c7b\u4efb\u52a1\u4e0a\u663e\u8457\u4f18\u4e8eSOTA\u57fa\u7ebf\uff0c\u4e14\u5bf9\u5206\u5e03\u504f\u79fb\u548c\u65f6\u95f4\u5206\u5272\u5177\u6709\u9c81\u68d2\u6027"], "keywords": ["\u53ef\u89e3\u91caAI", "\u5927\u8bed\u8a00\u6a21\u578b", "\u667a\u80fd\u4f53", "\u673a\u5668\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09502v1", "published_at": "2026-07-10", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "All Explanations are Wrong, But Many Are Useful: Exploring the Rashomon Explanation Set with Large Language Models", "tldr": "\u63d0\u51faRashomon\u89e3\u91ca\u8303\u5f0f\uff0c\u7528LLM\u751f\u6210\u591a\u6837\u5316\u5fe0\u5b9e\u89e3\u91ca\u96c6\uff0c\u540c\u65f6\u63d0\u5347\u6a21\u578b\u51c6\u786e\u6027\u4e0e\u53ef\u89e3\u91ca\u6027", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51faRashomon Explanation\u8303\u5f0f\uff0c\u6784\u5efa\u4e00\u7ec4\u5fe0\u5b9e\u7684\u9884\u6d4b\u5f15\u5bfc\u89e3\u91ca\u96c6\u5408\uff08\u800c\u975e\u5355\u4e00\u89e3\u91ca\uff09\uff0c\u5e76\u8bbe\u8ba1RashomonLLM\u667a\u80fd\u4f53\u5de5\u4f5c\u6d41\uff0c\u901a\u8fc7\u8fed\u4ee3\u5bf9\u9f50\u89e3\u91ca\u4e0e\u9884\u6d4b\u6765\u751f\u6210\u81ea\u7136\u8bed\u8a00\u89e3\u91ca\uff0c\u4ece\u7406\u8bba\u4e0a\u8bc1\u660e\u89e3\u91ca\u4fdd\u771f\u5ea6\u53ef\u7ea6\u675f\u6a21\u578b\u6027\u80fd\u4e0a\u754c\u3002", "why_notable": "\u9996\u6b21\u4ece\u7406\u8bba\u5c42\u9762\u8bc1\u660e\u89e3\u91ca\u4e0e\u9884\u6d4b\u53ef\u76f8\u4e92\u4fc3\u8fdb\u800c\u975e\u5bf9\u7acb\uff0c\u5e76\u7ed3\u5408LLM\u667a\u80fd\u4f53\u5b9e\u73b0\u5de5\u4e1a\u7ea7\u843d\u5730\u9a8c\u8bc1\uff0c\u5bf9XAI\u9886\u57df\u5177\u6709\u8303\u5f0f\u8f6c\u53d8\u610f\u4e49\uff0c\u517c\u987e\u4e1a\u52a1\u6027\u80fd\u4e0e\u7528\u6237\u4fe1\u4efb\u3002"}, {"abstract": "We present Mach-Mind-4-Flash, a 35B-parameter Mixture-of-Experts (MoE) agentic model with 3B activated parameters. Through post-training optimization alone without scaling pre-training compute, the model achieves performance on par with or surpassing that of 100B-parameter-class models. By introducing scalable agentic interaction environments for large-scale reinforcement learning, the model attains significant performance gains on real-world application tasks. Our pipeline comprises three stages: (1) a unified RL/OPD training infrastructure with dynamic multi-teacher scheduling and operator-level acceleration, delivering 17\\% end-to-end training speedup; (2) multiple domain-specific RL experts trained in parallel across Reasoning, General, and Agent tracks, then fused into a single generalist via Multi-Teacher On-Policy Distillation (MOPD) -- a routed reverse-KL objective that eliminates the see-saw degradation of mixed-reward RL; (3) Hybrid Median-length Policy Optimization (HMPO), a single-stage token-efficiency method that compresses reasoning chains by 19--46\\% with $\\le$0.7 percentage-point accuracy loss. Mach-Mind-4-Flash scores 92.70 on AIME\u002726, 82.82 on IFBench, 80.74 on Behavioral-SafetyBench, 75.80 on BFCL-v4, 72.31 on BrowseComp-zh, and 84.20 on ClawBench -- leading or matching models with 10--30$\\times$ its activated size at a fraction of the inference cost.", "arxiv_id": "2607.09375", "arxiv_url": "https://arxiv.org/abs/2607.09375", "authors": ["Foundation Model Team"], "brief": "Mach-Mind-4-Flash\u662f\u4e00\u4e2a35B\u53c2\u6570\uff08\u6fc0\u6d3b3B\uff09\u7684MoE\u667a\u80fd\u4f53\u6a21\u578b\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u540e\u8bad\u7ec3\u6d41\u7a0b\uff08\u7edf\u4e00RL\u57fa\u7840\u8bbe\u65bd\u3001\u591a\u4e13\u5bb6\u5e76\u884c\u8bad\u7ec3+\u84b8\u998f\u878d\u5408\u3001\u6df7\u5408\u4e2d\u957f\u5ea6\u7b56\u7565\u4f18\u5316\uff09\uff0c\u5728\u4e0d\u589e\u52a0\u9884\u8bad\u7ec3\u7b97\u529b\u7684\u524d\u63d0\u4e0b\u8fbe\u5230100B\u7ea7\u6a21\u578b\u7684\u6027\u80fd\u6c34\u5e73\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09375", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u63d0\u51faMulti-Teacher On-Policy Distillation\uff08MOPD\uff09\uff0c\u5c06\u63a8\u7406\u3001\u901a\u7528\u3001\u667a\u80fd\u4f53\u4e09\u6761\u8d5b\u9053\u7684RL\u4e13\u5bb6\u878d\u5408\u4e3a\u5355\u4e00\u901a\u624d\u6a21\u578b\uff0c\u6d88\u9664\u6df7\u5408\u5956\u52b1RL\u7684\u8df7\u8df7\u677f\u9000\u5316\u95ee\u9898", "Hybrid Median-length Policy Optimization\uff08HMPO\uff09\u5c06\u63a8\u7406\u94fe\u538b\u7f2919\u201346%\uff0c\u7cbe\u5ea6\u635f\u5931\u22640.7\u4e2a\u767e\u5206\u70b9\uff0c\u663e\u8457\u63d0\u5347token\u6548\u7387", "\u5728AIME\u002726\u5f9792.70\u3001IFBench\u5f9782.82\u3001BFCL-v4\u5f9775.80\uff0c\u4ee5\u6fc0\u6d3b\u53c2\u6570\u91cf\u4ec5\u4e3a\u5bf9\u6807\u6a21\u578b1/10\u20131/30\u7684\u4ee3\u4ef7\u8fbe\u5230\u540c\u7b49\u6216\u66f4\u4f18\u6027\u80fd"], "keywords": ["\u6df7\u5408\u4e13\u5bb6\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u667a\u80fd\u4f53", "\u77e5\u8bc6\u84b8\u998f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09375v1", "published_at": "2026-07-10", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Mach-Mind-4-Flash Technical Report", "tldr": "35B MoE\u6a21\u578b\u4ec5\u9760\u540e\u8bad\u7ec3\u4f18\u5316\u5373\u8fbe\u5230100B\u7ea7\u6a21\u578b\u6027\u80fd\uff0c\u63a8\u7406\u6210\u672c\u5927\u5e45\u964d\u4f4e", "upvotes": 0, "what_it_is": "Mach-Mind-4-Flash\u662f\u4e00\u4e2a35B\u53c2\u6570\uff08\u6fc0\u6d3b3B\uff09\u7684MoE\u667a\u80fd\u4f53\u6a21\u578b\uff0c\u901a\u8fc7\u4e09\u9636\u6bb5\u540e\u8bad\u7ec3\u6d41\u7a0b\uff08\u7edf\u4e00RL\u57fa\u7840\u8bbe\u65bd\u3001\u591a\u4e13\u5bb6\u5e76\u884c\u8bad\u7ec3+\u84b8\u998f\u878d\u5408\u3001\u6df7\u5408\u4e2d\u957f\u5ea6\u7b56\u7565\u4f18\u5316\uff09\uff0c\u5728\u4e0d\u589e\u52a0\u9884\u8bad\u7ec3\u7b97\u529b\u7684\u524d\u63d0\u4e0b\u8fbe\u5230100B\u7ea7\u6a21\u578b\u7684\u6027\u80fd\u6c34\u5e73\u3002", "why_notable": "\u7eaf\u9760\u540e\u8bad\u7ec3\u4f18\u5316\uff08\u65e0\u9700\u6269\u5927\u9884\u8bad\u7ec3\u89c4\u6a21\uff09\u5b9e\u73b0\u8de8\u8d8a\u5f0f\u6027\u80fd\u63d0\u5347\uff0c\u4e3a\u4f4e\u63a8\u7406\u6210\u672c\u90e8\u7f72\u5927\u6a21\u578b\u63d0\u4f9b\u4e86\u53ef\u590d\u73b0\u7684\u5de5\u7a0b\u8def\u5f84\uff0c\u5bf9\u5de5\u4e1a\u754c\u964d\u672c\u589e\u6548\u5177\u6709\u76f4\u63a5\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Additive activation steering (injecting a scaled residual-stream direction during generation) is calibrated almost entirely in single-turn chat, yet the models it targets are increasingly deployed as tool-using ReAct agents. We present the first systematic chat-to-agent transfer study of additive steering, coupling behavioral measurement with a representation read-out in a matched-information design: the same items rendered as plain chat or as a ReAct tool-use episode, with matched-norm random-direction controls and the transcript re-encoded every turn to exclude KV-cache contamination. Transfer is real but rescaled, and the right description is a dissociation: the injected direction reaches the late layers at near-full strength in every setting and model tested (install-site agent-over-chat ratios 0.83-1.16 across three families), while the behavioral coupling is reset per model and context. On Qwen2.5-7B a refusal bypass vector amplifies in the agent (T = 1.45, CI [1.20, 1.78], N = 300); across a powered uniform-protocol distribution the coupling spans amplification (Gemma-2-9B T = 2.00) to attenuation (Yi-1.5-9B T = 0.43, CI [0.29, 0.60]), with no universal constant and a single clean attenuator against a universal sign. Directional ablation of the same axis does not amplify (T = 0.93, CI including 1) while additive injection amplifies (T = 1.50), a 20.1-point gain difference (CI [13.4, 26.8]) that identifies an additive-specific mechanism. Two pre-registered instruments converge to localize the rescaling to the ReAct format scaffold, before any tool observation, rather than to the observation boundary where a dilution account would predict it. The safety implication is immediate and unpredictable: agentic deployment amplifies steering-based refusal bypass by up to 2.00x on some models while others attenuate, so a deployment cannot assume a given model is safe under additive steering.", "arxiv_id": "2607.09156", "arxiv_url": "https://arxiv.org/abs/2607.09156", "authors": ["Lucas Pinto"], "brief": "\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u52a0\u6027\u6fc0\u6d3b\u5f15\u5bfc\uff08additive activation steering\uff09\u4ece\u5355\u8f6e\u5bf9\u8bdd\u8fc1\u79fb\u5230ReAct\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u7684\u6548\u679c\uff0c\u53d1\u73b0\u6ce8\u5165\u65b9\u5411\u5728\u6b8b\u5dee\u6d41\u4e2d\u51e0\u4e4e\u5b8c\u6574\u4fdd\u7559\uff0c\u4f46\u884c\u4e3a\u5c42\u9762\u7684\u8026\u5408\u5f3a\u5ea6\u56e0\u6a21\u578b\u548c\u4e0a\u4e0b\u6587\u800c\u5f02\uff0c\u65e0\u6cd5\u9884\u6d4b\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09156", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u6ce8\u5165\u65b9\u5411\u5728\u5404\u6a21\u578b\u548c\u573a\u666f\u4e2d\u5747\u4ee5\u63a5\u8fd1\u539f\u5f3a\u5ea6\u5230\u8fbe\u6df1\u5c42\uff08agent/chat\u6bd4\u503c0.83-1.16\uff09\uff0c\u8bf4\u660e\u8868\u793a\u5c42\u8fc1\u79fb\u826f\u597d", "\u884c\u4e3a\u6548\u679c\u5dee\u5f02\u5de8\u5927\uff1a\u62d2\u7edd\u7ed5\u8fc7\u5411\u91cf\u5728Gemma-2-9B\u4e0a\u653e\u59272.00\u500d\uff0c\u5728Yi-1.5-9B\u4e0a\u8870\u51cf\u81f30.43\u500d\uff0c\u65e0\u666e\u9002\u5e38\u6570", "\u91cd\u7f29\u653e\u5b9a\u4f4d\u4e8eReAct\u683c\u5f0f\u811a\u624b\u67b6\u672c\u8eab\uff08\u5de5\u5177\u89c2\u6d4b\u524d\uff09\uff0c\u800c\u975e\u5de5\u5177\u89c2\u6d4b\u8fb9\u754c\uff0c\u6392\u9664\u4e86\u7b80\u5355\u7a00\u91ca\u89e3\u91ca\uff1b\u52a0\u6027\u6ce8\u5165\u4e0e\u65b9\u5411\u6d88\u878d\u5b58\u572820.1\u5206\u7684\u884c\u4e3a\u5dee\u5f02\uff0c\u63ed\u793a\u52a0\u6027\u7279\u6709\u673a\u5236"], "keywords": ["\u6fc0\u6d3b\u5f15\u5bfc", "\u667a\u80fd\u4f53", "\u5b89\u5168\u5bf9\u9f50", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09156v1", "published_at": "2026-07-10", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Present but Rescaled: Chat-to-Agent Transfer of Additive Activation Steering", "tldr": "\u6fc0\u6d3b\u5f15\u5bfc\u4ece\u5bf9\u8bdd\u8fc1\u79fb\u5230\u667a\u80fd\u4f53\u573a\u666f\u65f6\uff0c\u65b9\u5411\u4fdd\u7559\u4f46\u884c\u4e3a\u6548\u679c\u88ab\u91cd\u65b0\u7f29\u653e\uff0c\u5b89\u5168\u98ce\u9669\u4e0d\u53ef\u9884\u6d4b", "upvotes": 0, "what_it_is": "\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u52a0\u6027\u6fc0\u6d3b\u5f15\u5bfc\uff08additive activation steering\uff09\u4ece\u5355\u8f6e\u5bf9\u8bdd\u8fc1\u79fb\u5230ReAct\u5de5\u5177\u8c03\u7528\u667a\u80fd\u4f53\u7684\u6548\u679c\uff0c\u53d1\u73b0\u6ce8\u5165\u65b9\u5411\u5728\u6b8b\u5dee\u6d41\u4e2d\u51e0\u4e4e\u5b8c\u6574\u4fdd\u7559\uff0c\u4f46\u884c\u4e3a\u5c42\u9762\u7684\u8026\u5408\u5f3a\u5ea6\u56e0\u6a21\u578b\u548c\u4e0a\u4e0b\u6587\u800c\u5f02\uff0c\u65e0\u6cd5\u9884\u6d4b\u3002", "why_notable": "\u76f4\u63a5\u63ed\u793a\u4e86\u6fc0\u6d3b\u5f15\u5bfc\u5b89\u5168\u8bc4\u4f30\u5728\u5bf9\u8bdd\u573a\u666f\u4e0b\u7684\u7ed3\u8bba\u65e0\u6cd5\u76f4\u63a5\u63a8\u5e7f\u5230\u667a\u80fd\u4f53\u90e8\u7f72\uff0c\u67d0\u4e9b\u6a21\u578b\u7684\u62d2\u7edd\u7ed5\u8fc7\u6548\u679c\u5728\u667a\u80fd\u4f53\u4e2d\u88ab\u653e\u59272\u500d\uff0c\u5bf9LLM\u5b89\u5168\u5bf9\u9f50\u7814\u7a76\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "In this work, we introduce LongMedBench, a real-world EHR-based benchmark for long-horizon clinical decision-making. Prior evaluations of LLM-based medical agents have largely emphasized short-context knowledge QA and tool use. However, real-world medical care is inherently longitudinal, and clinicians must aggregate evidence across repeated visits, tests, and evolving treatments. Therefore, long-horizon interaction is essential for realistic assessment. LongMedBench is constructed via a reproducible pipeline that integrates MIMIC-IV admission records and clinical notes into time-series event streams and long-context memory datasets, enabling long-horizon, multi-session interactions between agents and a clinical environment. It comprises 335 patients, with 19.72 inpatient visits per patient on average and 44.91 medical events per visit. Guided by the long-horizon decision process, we propose an evaluation taxonomy with three suites: fact-based QA, temporal reasoning, and long-horizon decision-making. This taxonomy measures how agents understand and leverage historical patient information over extended horizons. Our experiments show that while recent LLMs can make good use of explicit timestamps, they have challenges in implicit time inference; The RAG and agent memory system can improve the performance of information retrieval tasks, but the performance of decision-making tasks is highly dependent on the model\u0027s immediate context.", "arxiv_id": "2607.09322", "arxiv_url": "https://arxiv.org/abs/2607.09322", "authors": ["Yanzhen Chen", "Zihan Xu", "Xiaocheng Zhang", "Zhiting Fan", "Weiqi Zhai", "Hongxia Xu", "Zuozhu Liu"], "brief": "\u63d0\u51faLongMedBench\uff0c\u4e00\u4e2a\u57fa\u4e8eMIMIC-IV\u771f\u5b9e\u7535\u5b50\u5065\u5eb7\u8bb0\u5f55\u7684\u957f\u65f6\u5e8f\u4e34\u5e8a\u51b3\u7b56\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5c06\u4f4f\u9662\u8bb0\u5f55\u548c\u4e34\u5e8a\u7b14\u8bb0\u6784\u5efa\u4e3a\u65f6\u95f4\u5e8f\u5217\u4e8b\u4ef6\u6d41\uff0c\u652f\u6301\u591a\u4f1a\u8bdd\u957f\u65f6\u5e8f\u4eba\u673a\u4ea4\u4e92\u8bc4\u4f30\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09322", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u8986\u76d6335\u540d\u60a3\u8005\uff0c\u5e73\u5747\u6bcf\u60a3\u800519.72\u6b21\u4f4f\u9662\u3001\u6bcf\u6b2144.91\u4e2a\u533b\u7597\u4e8b\u4ef6\uff0c\u89c4\u6a21\u771f\u5b9e\u4e14\u4e30\u5bcc", "\u63d0\u51fa\u4e09\u5c42\u8bc4\u6d4b\u5206\u7c7b\u4f53\u7cfb\uff1a\u4e8b\u5b9e\u578bQA\u3001\u65f6\u5e8f\u63a8\u7406\u3001\u957f\u65f6\u5e8f\u51b3\u7b56\uff0c\u5168\u9762\u8861\u91cf\u667a\u80fd\u4f53\u5bf9\u5386\u53f2\u60a3\u8005\u4fe1\u606f\u7684\u7406\u89e3\u4e0e\u5229\u7528", "\u5b9e\u9a8c\u53d1\u73b0\uff1aLLM\u80fd\u5229\u7528\u663e\u5f0f\u65f6\u95f4\u6233\u4f46\u96be\u4ee5\u8fdb\u884c\u9690\u5f0f\u65f6\u95f4\u63a8\u65ad\uff1bRAG\u548c\u8bb0\u5fc6\u7cfb\u7edf\u63d0\u5347\u4fe1\u606f\u68c0\u7d22\u4f46\u51b3\u7b56\u4efb\u52a1\u9ad8\u5ea6\u4f9d\u8d56\u5373\u65f6\u4e0a\u4e0b\u6587"], "keywords": ["\u667a\u80fd\u4f53", "\u533b\u7597AI", "\u57fa\u51c6\u8bc4\u6d4b", "\u957f\u4e0a\u4e0b\u6587"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09322v1", "published_at": "2026-07-10", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "LongMedBench: Benchmarking Medical Agents for Long-Horizon Clinical Decision-Making", "tldr": "LongMedBench\uff1a\u57fa\u4e8e\u771f\u5b9eEHR\u7684\u957f\u65f6\u5e8f\u4e34\u5e8a\u51b3\u7b56\u533b\u7597\u667a\u80fd\u4f53\u8bc4\u6d4b\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faLongMedBench\uff0c\u4e00\u4e2a\u57fa\u4e8eMIMIC-IV\u771f\u5b9e\u7535\u5b50\u5065\u5eb7\u8bb0\u5f55\u7684\u957f\u65f6\u5e8f\u4e34\u5e8a\u51b3\u7b56\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5c06\u4f4f\u9662\u8bb0\u5f55\u548c\u4e34\u5e8a\u7b14\u8bb0\u6784\u5efa\u4e3a\u65f6\u95f4\u5e8f\u5217\u4e8b\u4ef6\u6d41\uff0c\u652f\u6301\u591a\u4f1a\u8bdd\u957f\u65f6\u5e8f\u4eba\u673a\u4ea4\u4e92\u8bc4\u4f30\u3002", "why_notable": "\u586b\u8865\u4e86\u533b\u7597AI\u8bc4\u6d4b\u4e2d\u957f\u65f6\u5e8f\u3001\u591a\u4f1a\u8bdd\u4e34\u5e8a\u51b3\u7b56\u573a\u666f\u7684\u7a7a\u767d\uff0c\u63ed\u793a\u4e86\u5f53\u524dLLM\u5728\u771f\u5b9e\u7eb5\u5411\u533b\u7597\u573a\u666f\u4e2d\u7684\u5173\u952e\u5c40\u9650\uff0c\u4e3a\u533b\u7597\u667a\u80fd\u4f53\u7814\u7a76\u63d0\u4f9b\u4e86\u66f4\u8d34\u8fd1\u4e34\u5e8a\u5b9e\u9645\u7684\u8bc4\u6d4b\u6846\u67b6\u3002"}, {"abstract": "Quantum information theory (QIT) characterizes the capabilities and fundamental limits of quantum information processing, underpinning quantum communication, computation, and error correction. Formalizing its coding theorems requires connecting finite-block protocols, analytic inequalities, and asymptotic limits within a unified machine-checked framework. Existing developments, however, lack a reusable operational layer that defines codes, error criteria, achievable rates, and capacities independently of their information-theoretic characterizations. In this work, we present LeanQIT, a Lean 4 library for finite-dimensional QIT. It provides composable, kernel-checked interfaces for quantum states and channels, source and channel codes, finite-block performance criteria, hypothesis testing, one-shot quantities, and asymptotic rate constructions. Using this infrastructure, we formalize Schumacher\u0027s quantum source-coding theorem, the Holevo--Schumacher--Westmoreland classical-capacity theorem, and the entanglement-assisted classical-capacity theorem together with its strong converse. By separating operational definitions from analytic characterizations and exposing reusable achievability, converse, and asymptotic components, Lean-QIT provides a machine-readable foundation for formal QIT and a compositional knowledge substrate for emerging AI-assisted formalization, automated proof search, and agentic reasoning in quantum information and computation.", "arxiv_id": "2607.09632", "arxiv_url": "https://arxiv.org/abs/2607.09632", "authors": ["Chengkai Zhu", "Ziao Tang", "Guocheng Zhen", "Yimeng Cao", "Yusheng Zhao", "Ranyiliu Chen", "Xuanqiang Zhao", "Lei Zhang", "Xin Wang"], "brief": "\u672c\u6587\u63d0\u51faLeanQIT\uff0c\u4e00\u4e2a\u57fa\u4e8eLean 4\u7684\u6709\u9650\u7ef4\u91cf\u5b50\u4fe1\u606f\u8bba\u5f62\u5f0f\u5316\u5e93\uff0c\u5c06\u91cf\u5b50\u6001\u3001\u4fe1\u9053\u3001\u7f16\u7801\u65b9\u6848\u3001\u5047\u8bbe\u68c0\u9a8c\u7b49\u6a21\u5757\u5316\u5c01\u88c5\uff0c\u5e76\u5f62\u5f0f\u5316\u8bc1\u660e\u4e86Schumacher\u91cf\u5b50\u6e90\u7f16\u7801\u5b9a\u7406\u3001HSW\u7ecf\u5178\u5bb9\u91cf\u5b9a\u7406\u53ca\u7ea0\u7f20\u8f85\u52a9\u7ecf\u5178\u5bb9\u91cf\u5b9a\u7406\uff08\u542b\u5f3a\u9006\uff09\u3002", "categories": ["quant-ph", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09632", "impact_score": 7, "is_agent": false, "is_top": true, "key_points": ["\u63d0\u4f9b\u53ef\u7ec4\u5408\u7684\u5185\u6838\u7ea7\u9a8c\u8bc1\u63a5\u53e3\uff0c\u6db5\u76d6\u91cf\u5b50\u6001/\u4fe1\u9053\u3001\u6e90\u7801/\u4fe1\u9053\u7801\u3001\u6709\u9650\u5757\u6027\u80fd\u51c6\u5219\u3001\u5355\u6b21\u91cf\u548c\u6e10\u8fd1\u901f\u7387\u6784\u9020", "\u5c06\u64cd\u4f5c\u5b9a\u4e49\u4e0e\u89e3\u6790\u523b\u753b\u5206\u79bb\uff0c\u66b4\u9732\u53ef\u590d\u7528\u7684\u53ef\u8fbe\u6027\u3001\u9006\u5b9a\u7406\u548c\u6e10\u8fd1\u7ec4\u4ef6\uff0c\u652f\u6301\u6a21\u5757\u5316\u8bc1\u660e\u6784\u5efa", "\u4e3aAI\u8f85\u52a9\u5f62\u5f0f\u5316\u3001\u81ea\u52a8\u8bc1\u660e\u641c\u7d22\u548c\u91cf\u5b50\u4fe1\u606f\u9886\u57df\u7684\u667a\u80fd\u4f53\u63a8\u7406\u63d0\u4f9b\u673a\u5668\u53ef\u8bfb\u7684\u77e5\u8bc6\u57fa\u7840"], "keywords": ["\u5f62\u5f0f\u5316\u9a8c\u8bc1", "\u91cf\u5b50\u4fe1\u606f", "\u5b9a\u7406\u8bc1\u660e", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09632v1", "published_at": "2026-07-10", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Lean-QIT: Towards a Formal Infrastructure for Quantum Information Theory", "tldr": "LeanQIT\uff1a\u9996\u4e2a\u7528Lean 4\u5f62\u5f0f\u5316\u9a8c\u8bc1\u91cf\u5b50\u4fe1\u606f\u8bba\u6838\u5fc3\u7f16\u7801\u5b9a\u7406\u7684\u673a\u5668\u53ef\u68c0\u9a8c\u5e93", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51faLeanQIT\uff0c\u4e00\u4e2a\u57fa\u4e8eLean 4\u7684\u6709\u9650\u7ef4\u91cf\u5b50\u4fe1\u606f\u8bba\u5f62\u5f0f\u5316\u5e93\uff0c\u5c06\u91cf\u5b50\u6001\u3001\u4fe1\u9053\u3001\u7f16\u7801\u65b9\u6848\u3001\u5047\u8bbe\u68c0\u9a8c\u7b49\u6a21\u5757\u5316\u5c01\u88c5\uff0c\u5e76\u5f62\u5f0f\u5316\u8bc1\u660e\u4e86Schumacher\u91cf\u5b50\u6e90\u7f16\u7801\u5b9a\u7406\u3001HSW\u7ecf\u5178\u5bb9\u91cf\u5b9a\u7406\u53ca\u7ea0\u7f20\u8f85\u52a9\u7ecf\u5178\u5bb9\u91cf\u5b9a\u7406\uff08\u542b\u5f3a\u9006\uff09\u3002", "why_notable": "\u9996\u6b21\u5728\u7edf\u4e00\u5f62\u5f0f\u5316\u6846\u67b6\u5185\u673a\u5668\u9a8c\u8bc1\u91cf\u5b50\u4fe1\u606f\u8bba\u591a\u4e2a\u6838\u5fc3\u5b9a\u7406\uff0c\u586b\u8865\u4e86\u53ef\u590d\u7528\u64cd\u4f5c\u5c42\u7684\u7a7a\u767d\uff0c\u540c\u65f6\u4e3aAI\u9a71\u52a8\u7684\u6570\u5b66\u5f62\u5f0f\u5316\u63d0\u4f9b\u91cf\u5b50\u4fe1\u606f\u9886\u57df\u7684\u7ed3\u6784\u5316\u77e5\u8bc6\u5e95\u5ea7\uff0c\u5177\u6709\u91cd\u8981\u7684\u57fa\u7840\u8bbe\u65bd\u4ef7\u503c\u3002"}, {"abstract": "Enhancing the reasoning capabilities of large language model (LLM) agents requires effective orchestration of diverse expert models and tools. However, existing frameworks typically call APIs based on coarse-grained matching between tasks and the functions of expert models or tools, while overlooking critical factors such as performance variability and cost efficiency among functionally similar alternatives. To address this, we propose Agora, a framework that introduces an incentive-compatible auction mechanism for dynamically allocating tasks to expert models and tools. By treating reasoning steps as tradeable items, Agora enables agents to bid based on their rectified competence-ensuring that critical logic is routed to the most capable solver rather than the most overconfident one. Evaluations across five benchmarks show that Agora improves over matched single-model, routing, and cascade baselines under comparable candidate pools, while exposing a controllable cost-quality trade-off through a single auction parameter.", "arxiv_id": "2607.09600", "arxiv_url": "https://arxiv.org/abs/2607.09600", "authors": ["Kaiji Zhou", "Ales Leonardis", "Yue Feng"], "brief": "Agora\u662f\u4e00\u4e2a\u57fa\u4e8e\u6fc0\u52b1\u76f8\u5bb9\u62cd\u5356\u673a\u5236\u7684LLM\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u6b65\u9aa4\u89c6\u4e3a\u53ef\u4ea4\u6613\u7269\u54c1\uff0c\u8ba9\u4e13\u5bb6\u6a21\u578b\u6839\u636e\u6821\u6b63\u540e\u7684\u80fd\u529b\u8fdb\u884c\u7ade\u4ef7\uff0c\u4ece\u800c\u5c06\u5173\u952e\u903b\u8f91\u8def\u7531\u5230\u6700\u5408\u9002\u7684\u6c42\u89e3\u5668\u800c\u975e\u6700\u8fc7\u5ea6\u81ea\u4fe1\u7684\u6a21\u578b\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09600", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5f15\u5165\u6fc0\u52b1\u76f8\u5bb9\u62cd\u5356\u673a\u5236\u52a8\u6001\u5206\u914d\u63a8\u7406\u4efb\u52a1\uff0c\u89e3\u51b3\u73b0\u6709\u6846\u67b6\u7c97\u7c92\u5ea6\u5339\u914d\u95ee\u9898", "\u901a\u8fc7\"\u6821\u6b63\u80fd\u529b\u7ade\u4ef7\"\u673a\u5236\uff0c\u907f\u514d\u8fc7\u5ea6\u81ea\u4fe1\u6a21\u578b\u62a2\u5360\u5173\u952e\u63a8\u7406\u6b65\u9aa4", "\u5728\u4e94\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u4f18\u4e8e\u5355\u6a21\u578b\u5339\u914d\u3001\u8def\u7531\u548c\u7ea7\u8054\u57fa\u7ebf\uff0c\u4e14\u53ef\u901a\u8fc7\u5355\u4e00\u62cd\u5356\u53c2\u6570\u63a7\u5236\u6210\u672c-\u8d28\u91cf\u6743\u8861"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u578b\u534f\u4f5c", "\u63a8\u7406\u589e\u5f3a", "\u4efb\u52a1\u8def\u7531"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09600v1", "published_at": "2026-07-10", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Agora: Enhancing LLM Agent Reasoning Via Auction-Based Task Allocation", "tldr": "\u63d0\u51faAgora\u6846\u67b6\uff0c\u7528\u62cd\u5356\u673a\u5236\u52a8\u6001\u5206\u914d\u63a8\u7406\u4efb\u52a1\u7ed9\u6700\u4f18\u4e13\u5bb6\u6a21\u578b\uff0c\u63d0\u5347LLM\u667a\u80fd\u4f53\u63a8\u7406\u80fd\u529b", "upvotes": 0, "what_it_is": "Agora\u662f\u4e00\u4e2a\u57fa\u4e8e\u6fc0\u52b1\u76f8\u5bb9\u62cd\u5356\u673a\u5236\u7684LLM\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5c06\u63a8\u7406\u6b65\u9aa4\u89c6\u4e3a\u53ef\u4ea4\u6613\u7269\u54c1\uff0c\u8ba9\u4e13\u5bb6\u6a21\u578b\u6839\u636e\u6821\u6b63\u540e\u7684\u80fd\u529b\u8fdb\u884c\u7ade\u4ef7\uff0c\u4ece\u800c\u5c06\u5173\u952e\u903b\u8f91\u8def\u7531\u5230\u6700\u5408\u9002\u7684\u6c42\u89e3\u5668\u800c\u975e\u6700\u8fc7\u5ea6\u81ea\u4fe1\u7684\u6a21\u578b\u3002", "why_notable": "\u9996\u6b21\u5c06\u62cd\u5356\u7406\u8bba\u5f15\u5165LLM\u591a\u4e13\u5bb6\u6a21\u578b\u534f\u4f5c\u6846\u67b6\uff0c\u540c\u65f6\u517c\u987e\u6027\u80fd\u5dee\u5f02\u4e0e\u6210\u672c\u6548\u7387\uff0c\u63d0\u4f9b\u53ef\u63a7\u7684\u6210\u672c-\u8d28\u91cf\u6743\u8861\uff0c\u5bf9\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\u7f16\u6392\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "The growing adoption of large language model-based agents within operating system workflows has increased the importance of energy-efficient inference on laptop-class systems-on-chip (SoCs). While cloud offloading remains common, it introduces reliability and privacy concerns that are particularly problematic for agentic workloads. Recent laptop SoCs, therefore, incorporate neural processing engines (NPUs) optimized for energy efficiency; however, effectively mapping attention mechanisms onto NPUs remains challenging due to architectural diversity and explicit data-movement programming models. In this work, we present STEEL, the first open-source implementation of FlashAttention targeting XDNA-like NPUs. STEEL introduces a dataflow formulation of prefill attention, enabling efficient exploitation of spatial parallelism and on-chip memory. Furthermore, STEEL addresses the load imbalance induced by the causal mask by leveraging a sparsity-aware pipeline placement onto the NPU array, reducing synchronization overhead and improving utilization. We evaluate STEEL on the AMD Ryzen AI 9 HX 370 SoC and compare its performance against optimized CPU and GPU implementations. Experimental results show that STEEL reduces energy consumption by an average of 9.17x and 1.75x relative to CPU and GPU baselines, respectively. On XDNA 1, STEEL achieves an average 9.6x latency reduction over the prior state of the art, and delivers a 22.8x speedup on average compared to a layer-by-layer attention implementation on XDNA 2.", "arxiv_id": "2607.09385", "arxiv_url": "https://arxiv.org/abs/2607.09385", "authors": ["Victor J. B. Jung", "Gagandeep Singh", "Joseph Melber", "Kristof Denolf", "Francesco Conti", "Luca Benini"], "brief": "\u63d0\u51faSTEEL\uff0c\u9996\u4e2a\u9488\u5bf9XDNA\u67b6\u6784NPU\u7684\u5f00\u6e90FlashAttention\u5b9e\u73b0\uff0c\u901a\u8fc7\u7a00\u758f\u611f\u77e5\u6d41\u6c34\u7ebf\u548c\u6570\u636e\u6d41\u91cd\u6784\uff0c\u5b9e\u73b0\u7b14\u8bb0\u672cSoC\u4e0a\u5927\u8bed\u8a00\u6a21\u578b\u6ce8\u610f\u529b\u673a\u5236\u7684\u9ad8\u6548\u8282\u80fd\u63a8\u7406\u3002", "categories": ["cs.DC", "cs.AI", "cs.PF"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09385", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5f15\u5165\u6ce8\u610f\u529b\u9884\u586b\u5145\u7684\u6570\u636e\u6d41\u516c\u5f0f\u5316\u8868\u8fbe\uff0c\u5145\u5206\u5229\u7528NPU\u7684\u7a7a\u95f4\u5e76\u884c\u6027\u548c\u7247\u4e0a\u5185\u5b58", "\u901a\u8fc7\u7a00\u758f\u611f\u77e5\u6d41\u6c34\u7ebf\u5e03\u5c40\u89e3\u51b3\u56e0\u679c\u63a9\u7801\u5bfc\u81f4\u7684\u8d1f\u8f7d\u4e0d\u5747\u8861\u95ee\u9898\uff0c\u964d\u4f4e\u540c\u6b65\u5f00\u9500", "\u5728AMD Ryzen AI 9 HX 370\u4e0a\uff0c\u76f8\u6bd4CPU\u548cGPU\u5206\u522b\u964d\u4f4e9.17x\u548c1.75x\u80fd\u8017\uff1b\u5728XDNA 2\u4e0a\u6bd4\u9010\u5c42\u5b9e\u73b0\u5feb22.8x"], "keywords": ["\u667a\u80fd\u4f53", "\u9ad8\u6548\u63a8\u7406", "NPU", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09385v1", "published_at": "2026-07-10", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "STEEL: Sparsity-Aware Fused Attention for Energy-Efficient Long-Sequence Inference on AMD\u0027s XDNA NPU", "tldr": "\u9996\u4e2a\u9762\u5411AMD XDNA NPU\u7684\u5f00\u6e90FlashAttention\u5b9e\u73b0\uff0c\u5927\u5e45\u964d\u4f4e\u957f\u5e8f\u5217\u63a8\u7406\u80fd\u8017", "upvotes": 0, "what_it_is": "\u63d0\u51faSTEEL\uff0c\u9996\u4e2a\u9488\u5bf9XDNA\u67b6\u6784NPU\u7684\u5f00\u6e90FlashAttention\u5b9e\u73b0\uff0c\u901a\u8fc7\u7a00\u758f\u611f\u77e5\u6d41\u6c34\u7ebf\u548c\u6570\u636e\u6d41\u91cd\u6784\uff0c\u5b9e\u73b0\u7b14\u8bb0\u672cSoC\u4e0a\u5927\u8bed\u8a00\u6a21\u578b\u6ce8\u610f\u529b\u673a\u5236\u7684\u9ad8\u6548\u8282\u80fd\u63a8\u7406\u3002", "why_notable": "\u9996\u4e2a\u5f00\u6e90NPU FlashAttention\u5b9e\u73b0\uff0c\u89e3\u51b3\u4e86\u7aef\u4fa7LLM\u63a8\u7406\u7684\u80fd\u6548\u74f6\u9888\uff0c\u5bf9\u9690\u79c1\u654f\u611f\u7684\u667a\u80fd\u4f53\u672c\u5730\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Cyberattacks on operational technology are increasingly causing costly downtime and physical damage, exposing the limitations of traditional rule-based monitoring in industrial IoT environments. While Large Language Models (LLMs) have strong semantic reasoning abilities to assist in decision support, their hallucinatory nature presents unacceptable safety liabilities for closed-loop control. This paper introduces a neuro-agentic control framework, a novel architecture that couples an LLM-based planner (i.e., such as Gemini 2.5 Flash-Lite) with a pre-trained Time-Series Foundation Model (TimesFM), to achieve physics-grounded autonomous defense. The paper introduces a ``Counterfactual Physics Injection\u0027\u0027 mechanism that simulates the impact of LLM-proposed interventions within the numerical latent space of the foundation model before actuation, while allowing the system to reject hallucinatory or unsafe actions. Evaluated on an industrial dataset (e.g., the Secure Water Treatment (SWaT)) in the context of stochastic attack scenarios, the framework exhibited better performance compared to LSTM and TCN baselines. The Neuro-Agentic Loop prevented five breaches (33.3%) below the threshold versus LSTM (26.7%) and TCN (13.3%), with zero physically invalid (hallucinated) actions executed. These results demonstrate the efficacy of using foundation models as deterministic ``Sentinels\u0027\u0027 to safeguard agentic AI in critical infrastructure.", "arxiv_id": "2607.09076", "arxiv_url": "https://arxiv.org/abs/2607.09076", "authors": ["Saroj Gopali", "Bipin Chhetri", "Deepika Giri", "Sima Siami-Namini", "Akbar Siami Namin"], "brief": "\u63d0\u51faNeuro-Agentic Control\u6846\u67b6\uff0c\u5c06LLM\uff08Gemini 2.5 Flash-Lite\uff09\u4e0e\u9884\u8bad\u7ec3\u65f6\u5e8f\u57fa\u7840\u6a21\u578b\uff08TimesFM\uff09\u8026\u5408\uff0c\u901a\u8fc7\"\u53cd\u4e8b\u5b9e\u7269\u7406\u6ce8\u5165\"\u673a\u5236\u5728\u6267\u884c\u524d\u6a21\u62dfLLM\u63d0\u8bae\u7684\u5e72\u9884\u6548\u679c\uff0c\u8fc7\u6ee4\u5e7b\u89c9\u6216\u4e0d\u5b89\u5168\u52a8\u4f5c\uff0c\u5b9e\u73b0\u5de5\u4e1aIoT\u73af\u5883\u4e2d\u7684\u81ea\u4e3b\u7f51\u7edc\u9632\u5fa1\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09076", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5f15\u5165\"\u53cd\u4e8b\u5b9e\u7269\u7406\u6ce8\u5165\"\u673a\u5236\uff1a\u5728\u57fa\u7840\u6a21\u578b\u7684\u6570\u503c\u6f5c\u7a7a\u95f4\u4e2d\u9884\u6f14LLM\u63d0\u8bae\u7684\u64cd\u4f5c\uff0c\u62d2\u7edd\u7269\u7406\u4e0a\u65e0\u6548\u6216\u5371\u9669\u7684\u52a8\u4f5c", "\u5728SWaT\u5de5\u4e1a\u6570\u636e\u96c6\u7684\u968f\u673a\u653b\u51fb\u573a\u666f\u4e0b\uff0c\u6846\u67b6\u6210\u529f\u963b\u6b6233.3%\u7684\u5b89\u5168\u9608\u503c\u7a81\u7834\uff0c\u4f18\u4e8eLSTM\uff0826.7%\uff09\u548cTCN\uff0813.3%\uff09", "\u5b9e\u73b0\u96f6\u5e7b\u89c9\u52a8\u4f5c\u6267\u884c\uff0c\u65f6\u5e8f\u57fa\u7840\u6a21\u578b\u4f5c\u4e3a\u786e\u5b9a\u6027\"\u54e8\u5175\"\u4fdd\u969c\u95ed\u73af\u63a7\u5236\u5b89\u5168\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u5de5\u4e1a\u5b89\u5168", "\u5927\u8bed\u8a00\u6a21\u578b", "\u65f6\u5e8f\u57fa\u7840\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09076v1", "published_at": "2026-07-10", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Neuro-Agentic Control: A Deep Learning-based LLM-Powered Agentic AI Framework for Controlling Security Controls", "tldr": "\u7ed3\u5408LLM\u89c4\u5212\u5668\u4e0e\u65f6\u5e8f\u57fa\u7840\u6a21\u578b\uff0c\u6784\u5efa\u5de5\u4e1aIoT\u5b89\u5168\u63a7\u5236\u7684\u795e\u7ecf\u667a\u80fd\u4f53\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faNeuro-Agentic Control\u6846\u67b6\uff0c\u5c06LLM\uff08Gemini 2.5 Flash-Lite\uff09\u4e0e\u9884\u8bad\u7ec3\u65f6\u5e8f\u57fa\u7840\u6a21\u578b\uff08TimesFM\uff09\u8026\u5408\uff0c\u901a\u8fc7\"\u53cd\u4e8b\u5b9e\u7269\u7406\u6ce8\u5165\"\u673a\u5236\u5728\u6267\u884c\u524d\u6a21\u62dfLLM\u63d0\u8bae\u7684\u5e72\u9884\u6548\u679c\uff0c\u8fc7\u6ee4\u5e7b\u89c9\u6216\u4e0d\u5b89\u5168\u52a8\u4f5c\uff0c\u5b9e\u73b0\u5de5\u4e1aIoT\u73af\u5883\u4e2d\u7684\u81ea\u4e3b\u7f51\u7edc\u9632\u5fa1\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u8bed\u4e49\u63a8\u7406\u4e0e\u65f6\u5e8f\u57fa\u7840\u6a21\u578b\u7684\u7269\u7406\u7ea6\u675f\u9a8c\u8bc1\u7ed3\u5408\u7528\u4e8e\u5de5\u4e1a\u63a7\u5236\u5b89\u5168\uff0c\u6709\u6548\u89e3\u51b3LLM\u5e7b\u89c9\u5728\u95ed\u73af\u63a7\u5236\u4e2d\u7684\u5b89\u5168\u9690\u60a3\uff0c\u5bf9\u5173\u952e\u57fa\u7840\u8bbe\u65bd\u9632\u62a4\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Knowledge graphs (KGs) are often automatically constructed from large-scale corpora, but they inevitably contain factual errors due to noisy sources and extraction failures, and verifying them reliably at industrial scale remains a critical challenge. To address this, we propose AgentKGV, the Agentic LLM-RAG framework for KG fact Verification, that integrates dynamic routing and iterative query rewriting, which handles surface-form mismatch in document-level retrieval. To make this framework more accurate and cost-efficient for industrial deployment, we further introduce a two-stage training strategy: turn-level distillation-based SFT that transfers reasoning ability from a large teacher model into a small model for stable query rewriting and reasoning, and trajectory-level GRPO that optimizes the search policy to reduce unnecessary retrieval at scale. On the long-tail-predicate split of the open-domain T-REx benchmark, our framework improves macro-F1 over single-turn RAG by 5.5 \\%p, and two-stage training does it further by 9.4 \\%p. GRPO also cuts the average number of search calls from 3.24 to 1.63 without lowering accuracy.", "arxiv_id": "2607.09092", "arxiv_url": "https://arxiv.org/abs/2607.09092", "authors": ["Yumin Heo", "Hyeon-gu Lee", "Sumin Seo", "Youngjoong Ko"], "brief": "\u63d0\u51faAgentKGV\u6846\u67b6\uff0c\u901a\u8fc7\u52a8\u6001\u8def\u7531\u548c\u8fed\u4ee3\u67e5\u8be2\u91cd\u5199\u89e3\u51b3\u77e5\u8bc6\u56fe\u8c31\u4e8b\u5b9e\u9a8c\u8bc1\u4e2d\u7684\u6587\u6863\u68c0\u7d22\u8868\u9762\u5f62\u5f0f\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u5e76\u5f15\u5165\u4e24\u9636\u6bb5\u8bad\u7ec3\u7b56\u7565\uff08\u84b8\u998fSFT + \u8f68\u8ff9\u7ea7GRPO\uff09\u63d0\u5347\u51c6\u786e\u6027\u4e0e\u5de5\u4e1a\u90e8\u7f72\u6548\u7387\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09092", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4e24\u9636\u6bb5\u8bad\u7ec3\uff1a\u8f6e\u6b21\u7ea7\u84b8\u998fSFT\u5c06\u5927\u6a21\u578b\u63a8\u7406\u80fd\u529b\u8fc1\u79fb\u81f3\u5c0f\u6a21\u578b\uff0c\u8f68\u8ff9\u7ea7GRPO\u4f18\u5316\u68c0\u7d22\u7b56\u7565\u51cf\u5c11\u5197\u4f59\u641c\u7d22", "\u5728T-REx\u957f\u5c3e\u8c13\u8bcd\u6d4b\u8bd5\u96c6\u4e0a\uff0c\u76f8\u6bd4\u5355\u8f6eRAG\u5b8fF1\u63d0\u53475.5%p\uff0c\u52a0\u5165\u4e24\u9636\u6bb5\u8bad\u7ec3\u540e\u8fdb\u4e00\u6b65\u63d0\u53479.4%p", "GRPO\u5c06\u5e73\u5747\u641c\u7d22\u8c03\u7528\u6b21\u6570\u4ece3.24\u6b21\u964d\u81f31.63\u6b21\uff0c\u7cbe\u5ea6\u4e0d\u964d\u4f4e\uff0c\u663e\u8457\u63d0\u5347\u5de5\u4e1a\u90e8\u7f72\u6210\u672c\u6548\u7387"], "keywords": ["\u77e5\u8bc6\u56fe\u8c31", "RAG", "\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09092v1", "published_at": "2026-07-10", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "AgentKGV: Agentic LLM-RAG Framework with Two-Stage Training for the Fact Verification of Knowledge Graphs", "tldr": "AgentKGV\uff1a\u7ed3\u5408\u52a8\u6001\u8def\u7531\u4e0e\u4e24\u9636\u6bb5\u8bad\u7ec3\u7684\u77e5\u8bc6\u56fe\u8c31\u4e8b\u5b9e\u9a8c\u8bc1LLM-RAG\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faAgentKGV\u6846\u67b6\uff0c\u901a\u8fc7\u52a8\u6001\u8def\u7531\u548c\u8fed\u4ee3\u67e5\u8be2\u91cd\u5199\u89e3\u51b3\u77e5\u8bc6\u56fe\u8c31\u4e8b\u5b9e\u9a8c\u8bc1\u4e2d\u7684\u6587\u6863\u68c0\u7d22\u8868\u9762\u5f62\u5f0f\u4e0d\u5339\u914d\u95ee\u9898\uff0c\u5e76\u5f15\u5165\u4e24\u9636\u6bb5\u8bad\u7ec3\u7b56\u7565\uff08\u84b8\u998fSFT + \u8f68\u8ff9\u7ea7GRPO\uff09\u63d0\u5347\u51c6\u786e\u6027\u4e0e\u5de5\u4e1a\u90e8\u7f72\u6548\u7387\u3002", "why_notable": "\u9996\u6b21\u5c06Agentic RAG\u4e0e\u4e24\u9636\u6bb5\u8bad\u7ec3\uff08\u84b8\u998f+GRPO\uff09\u7ed3\u5408\u7528\u4e8e\u77e5\u8bc6\u56fe\u8c31\u4e8b\u5b9e\u9a8c\u8bc1\uff0c\u5728\u51c6\u786e\u7387\u548c\u63a8\u7406\u6548\u7387\u4e0a\u5747\u53d6\u5f97\u663e\u8457\u63d0\u5347\uff0c\u5177\u6709\u8f83\u5f3a\u7684\u5de5\u4e1a\u843d\u5730\u4ef7\u503c\u3002"}, {"abstract": "In this system paper, we present OpenProver, an open-source system for LLM-driven automated theorem proving (ATP) with integrated Lean 4 formal verification. OpenProver integrates a Planner-Worker-Verifier architecture inspired by recent ATP agentic systems such as Aletheia. A Planner agent maintains a compact Whiteboard scratchpad and an unbounded Repository of intermediate findings, and decomposes mathematical work into parallel Workers. OpenProver is fully open-source, offers reproducible evaluation through automatic formal verification of generated proofs, and provides an interactive terminal interface for human-guided proof search. In interactive mode, OpenProver allows the human operator to monitor and steer the proof search process, motivated by the established human-AI synergy in interactive code generation. To showcase the potential for quantitative ablation experiments enabled by automatic formal verification, we evaluate OpenProver on ProofNet and compare it with a simple baseline. OpenProver is publicly available at https://github.com/kripner/OpenProver.", "arxiv_id": "2607.09217", "arxiv_url": "https://arxiv.org/abs/2607.09217", "authors": ["Mat\u011bj Kripner", "Milan Straka"], "brief": "\u63d0\u51faOpenProver\uff0c\u4e00\u4e2a\u96c6\u6210Lean 4\u5f62\u5f0f\u5316\u9a8c\u8bc1\u7684\u5f00\u6e90LLM\u9a71\u52a8\u81ea\u52a8\u5b9a\u7406\u8bc1\u660e\u7cfb\u7edf\uff0c\u91c7\u7528Planner-Worker-Verifier\u67b6\u6784\uff0c\u652f\u6301\u5e76\u884c\u8bc1\u660e\u5206\u89e3\u4e0e\u4eba\u673a\u4ea4\u4e92\u5f15\u5bfc\u3002", "categories": ["cs.AI", "cs.MS"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09217", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u91c7\u7528Planner-Worker-Verifier\u4e09\u5c42\u67b6\u6784\uff1aPlanner\u7ef4\u62a4\u767d\u677f\u8349\u7a3f\u548c\u4e2d\u95f4\u7ed3\u8bba\u4ed3\u5e93\uff0c\u5e76\u5c06\u6570\u5b66\u4efb\u52a1\u5206\u89e3\u7ed9\u5e76\u884cWorker\u6267\u884c", "\u63d0\u4f9b\u4ea4\u4e92\u5f0f\u7ec8\u7aef\u754c\u9762\uff0c\u5141\u8bb8\u4eba\u7c7b\u64cd\u4f5c\u5458\u5b9e\u65f6\u76d1\u63a7\u5e76\u5e72\u9884\u8bc1\u660e\u641c\u7d22\u8fc7\u7a0b\uff0c\u5b9e\u73b0\u4eba\u673a\u534f\u540c", "\u5b8c\u5168\u5f00\u6e90\uff0c\u901a\u8fc7Lean 4\u81ea\u52a8\u5f62\u5f0f\u5316\u9a8c\u8bc1\u751f\u6210\u7684\u8bc1\u660e\uff0c\u5728ProofNet\u57fa\u51c6\u4e0a\u8fdb\u884c\u53ef\u590d\u73b0\u8bc4\u4f30"], "keywords": ["\u5b9a\u7406\u8bc1\u660e", "\u667a\u80fd\u4f53", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "LLM"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09217v1", "published_at": "2026-07-10", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "OpenProver: Agentic and Interactive Theorem Proving with Lean 4", "tldr": "OpenProver\uff1a\u57fa\u4e8eLean 4\u7684\u5f00\u6e90LLM\u81ea\u52a8\u5b9a\u7406\u8bc1\u660e\u7cfb\u7edf\uff0c\u652f\u6301\u4eba\u673a\u4ea4\u4e92\u5f15\u5bfc\u8bc1\u660e\u641c\u7d22", "upvotes": 0, "what_it_is": "\u63d0\u51faOpenProver\uff0c\u4e00\u4e2a\u96c6\u6210Lean 4\u5f62\u5f0f\u5316\u9a8c\u8bc1\u7684\u5f00\u6e90LLM\u9a71\u52a8\u81ea\u52a8\u5b9a\u7406\u8bc1\u660e\u7cfb\u7edf\uff0c\u91c7\u7528Planner-Worker-Verifier\u67b6\u6784\uff0c\u652f\u6301\u5e76\u884c\u8bc1\u660e\u5206\u89e3\u4e0e\u4eba\u673a\u4ea4\u4e92\u5f15\u5bfc\u3002", "why_notable": "\u5c06LLM\u667a\u80fd\u4f53\u4e0eLean 4\u5f62\u5f0f\u5316\u9a8c\u8bc1\u6df1\u5ea6\u7ed3\u5408\uff0c\u540c\u65f6\u652f\u6301\u5168\u81ea\u52a8\u4e0e\u4eba\u673a\u4ea4\u4e92\u4e24\u79cd\u6a21\u5f0f\uff0c\u5f00\u6e90\u53ef\u590d\u73b0\uff0c\u4e3a\u6570\u5b66\u5b9a\u7406\u81ea\u52a8\u8bc1\u660e\u9886\u57df\u63d0\u4f9b\u4e86\u5b9e\u7528\u7684\u57fa\u7840\u8bbe\u65bd\u5e73\u53f0\u3002"}, {"abstract": "The proliferation of agentic AI systems across enterprise and public-sector contexts has outpaced the capacity of general-purpose AI risk frameworks to classify and govern them. In this paper, we introduce the TrustX Agent Risk Classification Framework, a structured, repeatable instrument that can be applied to seven types of agentic AI systems and is grounded in foundational pre-existing AI governance frameworks. At the core of the framework is a twelve-dimension scoring rubric that robustly quantifies the risk. This rubric is combined with other components, such as the GPA + IAT classification model and the five-level autonomy framework derived from existing literature. These inputs produce a three-tier governance output with mapped control recommendations. A specialised Coding Assistant extension is also included to account for nuances specific to this type of agentic AI system. We then use an illustrative example to show our framework in practice. ARC is intended for AI governance practitioners, risk officers, developers, and regulators, and it will regularly undergo iteration as we continue to expand it and make it more robust. The community can access the interactive framework here: https://arc.responsible.ai/", "arxiv_id": "2607.09586", "arxiv_url": "https://arxiv.org/abs/2607.09586", "authors": ["Hannah M. Liu", "Rhea Saxena", "Shiv Asthana"], "brief": "\u672c\u6587\u63d0\u51faTrustX\u667a\u80fd\u4f53\u98ce\u9669\u5206\u7c7b\u6846\u67b6\uff08ARC\uff09\uff0c\u9488\u5bf97\u7c7b\u667a\u80fd\u4f53AI\u7cfb\u7edf\uff0c\u901a\u8fc712\u7ef4\u5ea6\u8bc4\u5206\u91cf\u8868\u3001GPA+IAT\u5206\u7c7b\u6a21\u578b\u548c\u4e94\u7ea7\u81ea\u4e3b\u6027\u6846\u67b6\uff0c\u8f93\u51fa\u4e09\u5c42\u6cbb\u7406\u7ed3\u8bba\u53ca\u63a7\u5236\u5efa\u8bae\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09586", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["12\u7ef4\u5ea6\u8bc4\u5206\u91cf\u8868\u91cf\u5316\u667a\u80fd\u4f53AI\u98ce\u9669\uff0c\u8986\u76d67\u79cd\u667a\u80fd\u4f53\u7c7b\u578b", "\u7ed3\u5408GPA+IAT\u5206\u7c7b\u6a21\u578b\u4e0e\u4e94\u7ea7\u81ea\u4e3b\u6027\u6846\u67b6\uff0c\u751f\u6210\u4e09\u5c42\u6cbb\u7406\u8f93\u51fa\u53ca\u63a7\u5236\u5efa\u8bae", "\u5305\u542b\u4e13\u95e8\u9488\u5bf9\u7f16\u7801\u52a9\u624b\u7684\u6269\u5c55\u6a21\u5757\uff0c\u5e76\u63d0\u4f9b\u53ef\u4ea4\u4e92\u5728\u7ebf\u6846\u67b6\u5de5\u5177"], "keywords": ["\u667a\u80fd\u4f53", "AI\u6cbb\u7406", "\u98ce\u9669\u5206\u7c7b", "\u8d1f\u8d23\u4efbAI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09586v1", "published_at": "2026-07-10", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "TrustX Agent Risk Classification Framework (ARC): Risk-Tiering Internally Created Agentic AI Systems", "tldr": "\u63d0\u51faTrustX ARC\u6846\u67b6\uff0c\u5bf9\u4f01\u4e1a\u7ea7\u667a\u80fd\u4f53AI\u7cfb\u7edf\u8fdb\u884c\u7ed3\u6784\u5316\u98ce\u9669\u5206\u7ea7\u4e0e\u6cbb\u7406", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51faTrustX\u667a\u80fd\u4f53\u98ce\u9669\u5206\u7c7b\u6846\u67b6\uff08ARC\uff09\uff0c\u9488\u5bf97\u7c7b\u667a\u80fd\u4f53AI\u7cfb\u7edf\uff0c\u901a\u8fc712\u7ef4\u5ea6\u8bc4\u5206\u91cf\u8868\u3001GPA+IAT\u5206\u7c7b\u6a21\u578b\u548c\u4e94\u7ea7\u81ea\u4e3b\u6027\u6846\u67b6\uff0c\u8f93\u51fa\u4e09\u5c42\u6cbb\u7406\u7ed3\u8bba\u53ca\u63a7\u5236\u5efa\u8bae\u3002", "why_notable": "\u73b0\u6709\u901a\u7528AI\u98ce\u9669\u6846\u67b6\u96be\u4ee5\u5e94\u5bf9\u667a\u80fd\u4f53AI\u7684\u5feb\u901f\u6269\u5f20\uff0cARC\u586b\u8865\u4e86\u4f01\u4e1a\u548c\u516c\u5171\u90e8\u95e8\u5728\u667a\u80fd\u4f53\u6cbb\u7406\u5de5\u5177\u4e0a\u7684\u7a7a\u767d\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u9762\u5411\u793e\u533a\u5f00\u653e\u8fed\u4ee3\u3002"}, {"abstract": "We show how an adversarial model trainer can plant backdoors in a large class of deep, feedforward neural networks. These backdoors are statistically undetectable in the white-box setting, meaning that the backdoored and honestly trained models are close in total variation distance, even given the full descriptions of the models (e.g., all of the weights). The backdoor provides access to invariance-based adversarial examples for every input, mapping distant inputs to unusually close outputs. However, without the backdoor, it is provably impossible (under standard cryptographic assumptions) to generate any such adversarial examples in polynomial time. Our theoretical and preliminary empirical findings demonstrate a fundamental power asymmetry between model trainers and model users.", "arxiv_id": "2607.09532", "arxiv_url": "https://arxiv.org/abs/2607.09532", "authors": ["Andrej Bogdanov", "Alon Rosen", "Neekon Vafa"], "brief": "\u8bba\u6587\u63d0\u51fa\u4e00\u79cd\u5728\u5927\u7c7b\u524d\u9988\u6df1\u5ea6\u795e\u7ecf\u7f51\u7edc\u4e2d\u690d\u5165\u540e\u95e8\u7684\u65b9\u6cd5\uff0c\u8be5\u540e\u95e8\u5728\u767d\u76d2\u8bbe\u7f6e\u4e0b\u7edf\u8ba1\u4e0d\u53ef\u68c0\u6d4b\u2014\u2014\u540e\u95e8\u6a21\u578b\u4e0e\u6b63\u5e38\u8bad\u7ec3\u6a21\u578b\u5728\u5168\u53d8\u5dee\u8ddd\u79bb\u4e0a\u6781\u4e3a\u63a5\u8fd1\uff0c\u5373\u4f7f\u653b\u51fb\u8005\u62e5\u6709\u5b8c\u6574\u6a21\u578b\u6743\u91cd\u4e5f\u65e0\u6cd5\u533a\u5206\u3002", "categories": ["cs.LG", "cs.CR", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09532", "impact_score": 9, "is_agent": false, "is_top": true, "key_points": ["\u540e\u95e8\u5728\u767d\u76d2\u8bbe\u7f6e\u4e0b\u7edf\u8ba1\u4e0d\u53ef\u68c0\u6d4b\uff1a\u540e\u95e8\u6a21\u578b\u4e0e\u6b63\u5e38\u6a21\u578b\u7684\u5168\u53d8\u5dee\u8ddd\u79bb\u6781\u5c0f\uff0c\u5373\u4f7f\u83b7\u5f97\u5168\u90e8\u6743\u91cd\u4e5f\u96be\u4ee5\u53d1\u73b0", "\u540e\u95e8\u4e3a\u6bcf\u4e2a\u8f93\u5165\u63d0\u4f9b\u57fa\u4e8e\u4e0d\u53d8\u6027\u7684\u5bf9\u6297\u6837\u672c\uff0c\u4f7f\u8ddd\u79bb\u5f88\u8fdc\u7684\u8f93\u5165\u6620\u5c04\u5230\u5f02\u5e38\u63a5\u8fd1\u7684\u8f93\u51fa", "\u5728\u6807\u51c6\u5bc6\u7801\u5b66\u5047\u8bbe\u4e0b\uff0c\u6ca1\u6709\u540e\u95e8\u65f6\u591a\u9879\u5f0f\u65f6\u95f4\u5185\u4e0d\u53ef\u80fd\u751f\u6210\u6b64\u7c7b\u5bf9\u6297\u6837\u672c\uff0c\u63ed\u793a\u4e86\u6a21\u578b\u8bad\u7ec3\u8005\u4e0e\u7528\u6237\u4e4b\u95f4\u7684\u6839\u672c\u6027\u6743\u529b\u4e0d\u5bf9\u79f0"], "keywords": ["\u540e\u95e8\u653b\u51fb", "\u6df1\u5ea6\u5b66\u4e60\u5b89\u5168", "\u5bf9\u6297\u6837\u672c", "\u5bc6\u7801\u5b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09532v1", "published_at": "2026-07-10", "score": 0.225, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 9/10)"], "thumbnail": null, "title": "Statistically Undetectable Backdoors in Deep Neural Networks", "tldr": "\u6df1\u5ea6\u795e\u7ecf\u7f51\u7edc\u4e2d\u53ef\u690d\u5165\u7edf\u8ba1\u4e0a\u4e0d\u53ef\u68c0\u6d4b\u7684\u540e\u95e8\uff0c\u5373\u4f7f\u767d\u76d2\u8bbf\u95ee\u4e5f\u65e0\u6cd5\u53d1\u73b0", "upvotes": 0, "what_it_is": "\u8bba\u6587\u63d0\u51fa\u4e00\u79cd\u5728\u5927\u7c7b\u524d\u9988\u6df1\u5ea6\u795e\u7ecf\u7f51\u7edc\u4e2d\u690d\u5165\u540e\u95e8\u7684\u65b9\u6cd5\uff0c\u8be5\u540e\u95e8\u5728\u767d\u76d2\u8bbe\u7f6e\u4e0b\u7edf\u8ba1\u4e0d\u53ef\u68c0\u6d4b\u2014\u2014\u540e\u95e8\u6a21\u578b\u4e0e\u6b63\u5e38\u8bad\u7ec3\u6a21\u578b\u5728\u5168\u53d8\u5dee\u8ddd\u79bb\u4e0a\u6781\u4e3a\u63a5\u8fd1\uff0c\u5373\u4f7f\u653b\u51fb\u8005\u62e5\u6709\u5b8c\u6574\u6a21\u578b\u6743\u91cd\u4e5f\u65e0\u6cd5\u533a\u5206\u3002", "why_notable": "\u9996\u6b21\u4ece\u7406\u8bba\u4e0a\u8bc1\u660e\u4e86\u7edf\u8ba1\u4e0d\u53ef\u68c0\u6d4b\u540e\u95e8\u7684\u5b58\u5728\u6027\uff0c\u6311\u6218\u4e86\u73b0\u6709\u6240\u6709\u57fa\u4e8e\u7edf\u8ba1\u68c0\u6d4b\u7684\u6a21\u578b\u5b89\u5168\u5ba1\u8ba1\u65b9\u6cd5\uff0c\u5bf9AI\u4f9b\u5e94\u94fe\u5b89\u5168\u5177\u6709\u6df1\u8fdc\u5f71\u54cd\uff0c\u63ed\u793a\u4e86\u6a21\u578b\u8bad\u7ec3\u8005\u76f8\u5bf9\u4e8e\u7528\u6237\u7684\u6839\u672c\u6027\u5b89\u5168\u4f18\u52bf\u3002"}, {"abstract": "Process Reward Models (PRMs) have been proven to be highly effective in guiding test-time scaling (TTS) methods, which significantly boost the capabilities of LLM-based multi-agent systems. However, existing PRMs are text-based: they re-encode the entire trajectory text from scratch. In long multi-agent rollouts, the scoring cost, growing quadratically with respect to sequence length L, creates a severe computational bottleneck, severely limiting PRMs\u0027 application in long-context scenarios. To resolve this, we introduce KV-PRM, a highly efficient process reward model that eliminates the heavy text re-encoding by directly reading the KV cache produced naturally during the LLM\u0027s generation phase. By processing a single \"verify token\" against the pre-existing KV cache, KV-PRM reduces the scoring cost from O(L^2) to O(L). We formally prove that the KV cache contains strictly greater information capacity than text, and is more efficient for downstream reward modeling. Empirically, across the MATH, GSM8K, and AIME benchmarks, KV-PRM matches or strictly outperforms text-PRMs under various TTS methods such as Beam Search, MCTS, and Weighted Voting, with up to a 5,000x reduction in scoring FLOPs, a 37x reduction in latency, and a 34x reduction in per-sequence memory footprint compared to text-based PRMs.", "arxiv_id": "2607.09153", "arxiv_url": "https://arxiv.org/abs/2607.09153", "authors": ["Peng Kuang", "Haibo Jin", "Xiaoyu Han", "Yanli Wang", "Xiaopeng Yuan", "Ye Yu", "Kaidi Xu", "Haohan Wang"], "brief": "\u63d0\u51faKV-PRM\uff0c\u4e00\u79cd\u9ad8\u6548\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\uff0c\u76f4\u63a5\u8bfb\u53d6LLM\u751f\u6210\u9636\u6bb5\u81ea\u7136\u4ea7\u751f\u7684KV\u7f13\u5b58\u8fdb\u884c\u8bc4\u5206\uff0c\u65e0\u9700\u5bf9\u5b8c\u6574\u8f68\u8ff9\u6587\u672c\u91cd\u65b0\u7f16\u7801\uff0c\u5927\u5e45\u964d\u4f4e\u591a\u667a\u80fd\u4f53\u6d4b\u8bd5\u65f6\u6269\u5c55\u7684\u8ba1\u7b97\u5f00\u9500\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09153", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u8bc4\u5206\u8ba1\u7b97\u590d\u6742\u5ea6\u4eceO(L\u00b2)\u964d\u81f3O(L)\uff0c\u4ec5\u9700\u5bf9\u9884\u5b58KV\u7f13\u5b58\u5904\u7406\u5355\u4e2a\u0027\u9a8c\u8bc1token\u0027", "\u7406\u8bba\u8bc1\u660eKV\u7f13\u5b58\u5305\u542b\u6bd4\u6587\u672c\u66f4\u5927\u7684\u4fe1\u606f\u5bb9\u91cf\uff0c\u66f4\u9002\u5408\u4e0b\u6e38\u5956\u52b1\u5efa\u6a21", "\u5728MATH\u3001GSM8K\u3001AIME\u57fa\u51c6\u4e0a\uff0c\u8bc4\u5206FLOPs\u6700\u9ad8\u51cf\u5c115000\u500d\uff0c\u5ef6\u8fdf\u964d\u4f4e37\u500d\uff0c\u5185\u5b58\u5360\u7528\u51cf\u5c1134\u500d\uff0c\u6027\u80fd\u6301\u5e73\u6216\u8d85\u8d8a\u6587\u672cPRM"], "keywords": ["\u667a\u80fd\u4f53", "\u5f3a\u5316\u5b66\u4e60", "\u6d4b\u8bd5\u65f6\u6269\u5c55", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09153v1", "published_at": "2026-07-10", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "KV-PRM: Efficient Process Reward Modeling via KV-Cache Transfer for Multi-Agent Test-Time Scaling", "tldr": "KV-PRM\u901a\u8fc7\u590d\u7528KV\u7f13\u5b58\u66ff\u4ee3\u6587\u672c\u91cd\u7f16\u7801\uff0c\u5c06\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\u8bc4\u5206\u590d\u6742\u5ea6\u4eceO(L\u00b2)\u964d\u81f3O(L)", "upvotes": 0, "what_it_is": "\u63d0\u51faKV-PRM\uff0c\u4e00\u79cd\u9ad8\u6548\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\uff0c\u76f4\u63a5\u8bfb\u53d6LLM\u751f\u6210\u9636\u6bb5\u81ea\u7136\u4ea7\u751f\u7684KV\u7f13\u5b58\u8fdb\u884c\u8bc4\u5206\uff0c\u65e0\u9700\u5bf9\u5b8c\u6574\u8f68\u8ff9\u6587\u672c\u91cd\u65b0\u7f16\u7801\uff0c\u5927\u5e45\u964d\u4f4e\u591a\u667a\u80fd\u4f53\u6d4b\u8bd5\u65f6\u6269\u5c55\u7684\u8ba1\u7b97\u5f00\u9500\u3002", "why_notable": "\u89e3\u51b3\u4e86\u957f\u4e0a\u4e0b\u6587\u591a\u667a\u80fd\u4f53\u63a8\u7406\u4e2d\u8fc7\u7a0b\u5956\u52b1\u6a21\u578b\u7684\u6838\u5fc3\u8ba1\u7b97\u74f6\u9888\uff0c\u517c\u5177\u7406\u8bba\u8bc1\u660e\u4e0e\u5927\u89c4\u6a21\u5b9e\u9a8c\u9a8c\u8bc1\uff0c\u5bf9Beam Search\u3001MCTS\u3001\u52a0\u6743\u6295\u7968\u7b49\u4e3b\u6d41TTS\u65b9\u6cd5\u5747\u6709\u6548\uff0c\u5177\u6709\u6781\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Scaling robust driving policies is fundamentally bottlenecked by the scarcity of edge cases in curated datasets. While the real world continuously captures these critical events, such long-tail events remain underutilized when collected from heterogeneous sources. Specifically, diverse but valuable in-the-wild long-tail videos lack the full view coverage required for training policy models, often missing multi-view poses or originating solely from monocular dash cameras. This modality gap prevents these ubiquitous observations from being converted into scalable training data for long-tail generalization. We introduce OpenLongTail, an open-source generative data engine for scaling autonomous driving policies under long-tail events. To transform heterogeneous data sources into view-aligned and temporally coherent multi-view assets that are useful for policy learning, we develop a pose-informed extrapolative view synthesis pipeline that generates the missing views. We further enhance cross-view consistency and the temporal alignment for the newly generated views by injecting Pl\u00fccker ray geometry into the scalable generation engine. By synthesizing heterogeneous long-tail data, we observe a significant improvement in closed-loop driving robustness in handling long-tail events. By measuring the extrapolative view synthesis and pose metrics, we validate the effectiveness of OpenLongTail in visual fidelity, cross-view consistency, and ego-trajectory recovery.", "arxiv_id": "2607.09655", "arxiv_url": "https://arxiv.org/abs/2607.09655", "authors": ["Lulin Liu", "Nuo Chen", "Yan Wang", "Bangya Liu", "Wenyan Cong", "Hezhen Hu", "Boris Ivanovic", "Hao Wang", "Ziyao Zeng", "Xinyu Gong", "Yang Zhou", "Zixiang Xiong", "Dilin Wang", "Zhangyang Wang", "Weisong Shi", "Ruohan Zhang", "Marco Pavone", "Zhiwen Fan"], "brief": "\u63d0\u51faOpenLongTail\u5f00\u6e90\u751f\u6210\u5f0f\u6570\u636e\u5f15\u64ce\uff0c\u901a\u8fc7\u59ff\u6001\u611f\u77e5\u7684\u5916\u63a8\u89c6\u89d2\u5408\u6210\u6d41\u6c34\u7ebf\uff0c\u5c06\u5355\u76ee\u884c\u8f66\u8bb0\u5f55\u4eea\u7b49\u5f02\u6784\u957f\u5c3e\u9a7e\u9a76\u89c6\u9891\u8f6c\u5316\u4e3a\u591a\u89c6\u89d2\u3001\u65f6\u5e8f\u4e00\u81f4\u7684\u8bad\u7ec3\u6570\u636e\uff0c\u4ee5\u63d0\u5347\u81ea\u52a8\u9a7e\u9a76\u7b56\u7565\u5bf9\u957f\u5c3e\u573a\u666f\u7684\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09655", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u8bbe\u8ba1\u59ff\u6001\u5f15\u5bfc\u7684\u5916\u63a8\u89c6\u89d2\u5408\u6210\u6d41\u6c34\u7ebf\uff0c\u4e3a\u7f3a\u5931\u591a\u89c6\u89d2\u7684\u5355\u76ee\u89c6\u9891\u751f\u6210\u8865\u5168\u89c6\u89d2", "\u5c06Pl\u00fccker\u5c04\u7ebf\u51e0\u4f55\u6ce8\u5165\u751f\u6210\u5f15\u64ce\uff0c\u589e\u5f3a\u8de8\u89c6\u89d2\u4e00\u81f4\u6027\u4e0e\u65f6\u5e8f\u5bf9\u9f50", "\u5728\u95ed\u73af\u9a7e\u9a76\u8bc4\u6d4b\u4e2d\uff0c\u5408\u6210\u957f\u5c3e\u6570\u636e\u663e\u8457\u63d0\u5347\u4e86\u8fb9\u7f18\u573a\u666f\u4e0b\u7684\u9a7e\u9a76\u9c81\u68d2\u6027"], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u6570\u636e\u751f\u6210", "\u591a\u89c6\u89d2\u5408\u6210", "\u957f\u5c3e\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09655v1", "published_at": "2026-07-10", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "OpenLongTail: Generative Scaling of Long-Tail Driving Data", "tldr": "OpenLongTail\uff1a\u7528\u751f\u6210\u5f0f\u5f15\u64ce\u5c06\u5f02\u6784\u957f\u5c3e\u9a7e\u9a76\u89c6\u9891\u6269\u5c55\u4e3a\u591a\u
