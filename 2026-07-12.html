4ece\u9aa8\u5e72\u7f51\u7edc\u4e2d\u89e3\u8026\uff0c\u901a\u8fc7\u5c42\u6b21\u5316\u7c97\u5230\u7ec6\u76d1\u7763\u7b56\u7565\u548c\u5c3a\u5ea6\u81ea\u9002\u5e94\u95e8\u63a7\u8bed\u4e49\u5f15\u5bfc\u9002\u914d\u5668\uff0c\u5b9e\u73b0\u8de8\u5f02\u6784\u89c6\u89c9\u4e0e\u6587\u672c\u9aa8\u5e72\u7684\u53ef\u8fc1\u79fb\u533b\u5b66\u56fe\u50cf\u5206\u5272\uff0c\u5728\u56db\u4e2a\u516c\u5f00\u6570\u636e\u96c6\u4e0a\u4ee5\u8f83\u5c0f\u8ba1\u7b97\u5f00\u9500\u63d0\u5347\u4e86\u57fa\u7ebf\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09481", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u56fe\u50cf\u5206\u5272", "\u591a\u6a21\u6001", "\u6587\u672c\u5f15\u5bfc", "\u9002\u914d\u5668"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09481v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Decoupling Language Guidance from Backbones for Text-Guided Medical Segmentation", "tldr": "\u63d0\u51faBTHA\u6846\u67b6\uff0c\u5c06\u8bed\u8a00\u5f15\u5bfc\u6a21\u5757\u4ece\u9aa8\u5e72\u7f51\u7edc\u4e2d\u89e3\u8026\uff0c\u901a\u8fc7\u5c42\u6b21\u5316\u7c97\u5230\u7ec6\u76d1\u7763\u7b56\u7565\u548c\u5c3a\u5ea6\u81ea\u9002\u5e94\u95e8\u63a7\u8bed\u4e49\u5f15\u5bfc\u9002\u914d\u5668\uff0c\u5b9e\u73b0\u8de8\u5f02\u6784\u89c6\u89c9\u4e0e\u6587\u672c\u9aa8\u5e72\u7684\u53ef\u8fc1\u79fb\u533b\u5b66\u56fe\u50cf\u5206\u5272\uff0c\u5728\u56db\u4e2a\u516c\u5f00\u6570\u636e\u96c6\u4e0a\u4ee5\u8f83\u5c0f\u8ba1\u7b97\u5f00\u9500\u63d0\u5347\u4e86\u57fa\u7ebf\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present a practical pipeline for recovering source code from stripped binary functions by combining reverse engineering, anchor-based source code retrieval, and large language model reasoning. Our binary-to-source-code retrieval method attempts to identify the source function from a source code database, rather than generating approximate decompiled pseudocode. It extracts anchors such as strings, constants, external calls, and available function names using Ghidra, retrieves candidate files via an inverted-index search database, narrows candidates to likely function snippets, and re-ranks them with a large language model (LLM) based on disassembly, decompiled code, and source metadata. Confident matches can also serve as anchors in later passes. In an evaluation backed by our high-fidelity source code database on a stripped, optimized tcpdump binary, our proposed binary-to-source matching method achieves 95.2% assembly instruction coverage. Experiments on a GitHub-based retrieval database showed lower performance with 35.5% instruction coverage on average, mainly due to retrieval misses. These results show that source-level binary recovery excels with high-quality databases and remains a useful tool in noisy environments.", "arxiv_id": "2607.09452", "arxiv_url": "https://arxiv.org/abs/2607.09452", "authors": ["Charles Edward Gagnon", "Steven H. H. Ding", "Philippe Charland", "Benjamin C. M. Fung"], "brief": "\u63d0\u51fa\u4e00\u79cd\u4ece\u5265\u79bb\u7b26\u53f7\u7684\u4e8c\u8fdb\u5236\u51fd\u6570\u4e2d\u6062\u590d\u6e90\u4ee3\u7801\u7684\u5b9e\u7528\u6d41\u6c34\u7ebf\uff0c\u7ed3\u5408\u9006\u5411\u5de5\u7a0b\u3001\u57fa\u4e8e\u951a\u70b9\u7684\u6e90\u7801\u68c0\u7d22\u548c\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406\u3002\u5728tcpdump\u4e8c\u8fdb\u5236\u6d4b\u8bd5\u4e2d\uff0c\u9ad8\u8d28\u91cf\u6570\u636e\u5e93\u4e0b\u8fbe\u523095.2%\u7684\u6c47\u7f16\u6307\u4ee4\u8986\u76d6\u7387\uff0cGitHub\u6570\u636e\u5e93\u4e0b\u5e73\u574735.5%\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09452", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e8c\u8fdb\u5236\u9006\u5411", "\u6e90\u7801\u6062\u590d", "\u5927\u8bed\u8a00\u6a21\u578b", "\u4ee3\u7801\u68c0\u7d22"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09452v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Practical Source Code Recovery from Binary Functions Using Anchor-Based Retrieval and LLM Reasoning", "tldr": "\u63d0\u51fa\u4e00\u79cd\u4ece\u5265\u79bb\u7b26\u53f7\u7684\u4e8c\u8fdb\u5236\u51fd\u6570\u4e2d\u6062\u590d\u6e90\u4ee3\u7801\u7684\u5b9e\u7528\u6d41\u6c34\u7ebf\uff0c\u7ed3\u5408\u9006\u5411\u5de5\u7a0b\u3001\u57fa\u4e8e\u951a\u70b9\u7684\u6e90\u7801\u68c0\u7d22\u548c\u5927\u8bed\u8a00\u6a21\u578b\u63a8\u7406\u3002\u5728tcpdump\u4e8c\u8fdb\u5236\u6d4b\u8bd5\u4e2d\uff0c\u9ad8\u8d28\u91cf\u6570\u636e\u5e93\u4e0b\u8fbe\u523095.2%\u7684\u6c47\u7f16\u6307\u4ee4\u8986\u76d6\u7387\uff0cGitHub\u6570\u636e\u5e93\u4e0b\u5e73\u574735.5%\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Bayesian causal discovery is widely used for its ability to quantify epistemic uncertainty over directed acyclic graphs (DAGs) through posterior inference. However, its behaviour under latent confounding remains poorly understood, as existing work typically notes that confounding breaks identifiability without characterising how the posterior distribution over DAGs responds. In this work, we analyse posterior behaviour under latent confounding in linear Gaussian causal models, focusing on additive latent confounding between exactly two observed variables. We derive a critical correlation threshold above which the score function favours graphs with a spurious edge between the confounded variables, and show that this threshold decreases with sample size -- more data lowers the correlation required for the spurious edge to be favoured. Beyond this threshold, we characterize two distinct posterior failure regimes determined by the local structure around the confounded variables. Our findings are supported by exact posterior computations on multiple graph structures, demonstrating both the predicted failure regimes.", "arxiv_id": "2607.09449", "arxiv_url": "https://arxiv.org/abs/2607.09449", "authors": ["Debargha Ghosh", "Silja Renooij", "Anna Kononova"], "brief": "\u672c\u6587\u5206\u6790\u4e86\u8d1d\u53f6\u65af\u56e0\u679c\u53d1\u73b0\u5728\u6f5c\u5728\u6df7\u6dc6\u53d8\u91cf\u4e0b\u7684\u5931\u6548\u884c\u4e3a\uff0c\u9488\u5bf9\u7ebf\u6027\u9ad8\u65af\u56e0\u679c\u6a21\u578b\u63a8\u5bfc\u51fa\u4e00\u4e2a\u5173\u952e\u76f8\u5173\u6027\u9608\u503c\u2014\u2014\u8d85\u8fc7\u8be5\u9608\u503c\u65f6\uff0c\u540e\u9a8c\u5206\u5e03\u4f1a\u503e\u5411\u4e8e\u5728\u6df7\u6dc6\u53d8\u91cf\u95f4\u5f15\u5165\u865a\u5047\u8fb9\uff1b\u4e14\u6837\u672c\u91cf\u8d8a\u5927\uff0c\u8be5\u9608\u503c\u8d8a\u4f4e\uff0c\u5373\u66f4\u591a\u6570\u636e\u53cd\u800c\u66f4\u5bb9\u6613\u5bfc\u81f4\u865a\u5047\u8fb9\u88ab\u504f\u597d\u3002\u7814\u7a76\u8fdb\u4e00\u6b65\u8bc6\u522b\u51fa\u4e24\u79cd\u4e0d\u540c\u7684\u540e\u9a8c\u5931\u6548\u6a21\u5f0f\uff0c\u5e76\u901a\u8fc7\u7cbe\u786e\u540e\u9a8c\u8ba1\u7b97\u52a0\u4ee5\u9a8c\u8bc1\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09449", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8d1d\u53f6\u65af\u56e0\u679c\u53d1\u73b0", "\u6f5c\u5728\u6df7\u6dc6", "\u6709\u5411\u65e0\u73af\u56fe", "\u7ebf\u6027\u9ad8\u65af\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09449v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "How Does Bayesian Causal Discovery Fail? Characterising Structural Consequences in Linear Gaussian Networks under Latent Confounding", "tldr": "\u672c\u6587\u5206\u6790\u4e86\u8d1d\u53f6\u65af\u56e0\u679c\u53d1\u73b0\u5728\u6f5c\u5728\u6df7\u6dc6\u53d8\u91cf\u4e0b\u7684\u5931\u6548\u884c\u4e3a\uff0c\u9488\u5bf9\u7ebf\u6027\u9ad8\u65af\u56e0\u679c\u6a21\u578b\u63a8\u5bfc\u51fa\u4e00\u4e2a\u5173\u952e\u76f8\u5173\u6027\u9608\u503c\u2014\u2014\u8d85\u8fc7\u8be5\u9608\u503c\u65f6\uff0c\u540e\u9a8c\u5206\u5e03\u4f1a\u503e\u5411\u4e8e\u5728\u6df7\u6dc6\u53d8\u91cf\u95f4\u5f15\u5165\u865a\u5047\u8fb9\uff1b\u4e14\u6837\u672c\u91cf\u8d8a\u5927\uff0c\u8be5\u9608\u503c\u8d8a\u4f4e\uff0c\u5373\u66f4\u591a\u6570\u636e\u53cd\u800c\u66f4\u5bb9\u6613\u5bfc\u81f4\u865a\u5047\u8fb9\u88ab\u504f\u597d\u3002\u7814\u7a76\u8fdb\u4e00\u6b65\u8bc6\u522b\u51fa\u4e24\u79cd\u4e0d\u540c\u7684\u540e\u9a8c\u5931\u6548\u6a21\u5f0f\uff0c\u5e76\u901a\u8fc7\u7cbe\u786e\u540e\u9a8c\u8ba1\u7b97\u52a0\u4ee5\u9a8c\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Long-term animal re-identification (ReID) must remain robust to gradual morphological evolution and seasonal appearance shifts. Although recent vision-language models provide strong pretrained visual representations, adapting them to longitudinal ecological settings remains challenging, particularly under identity and temporal distribution shifts. We present a parameter-efficient CLIP adaptation framework for animal ReID and introduce a continuous metadata-conditioning mechanism that incorporates numerical attributes directly into the prompt representation during training. While low-rank visual adaptation, prompt-based supervision, and cross-modal alignment provide the adaptation framework, the proposed metadata-conditioning strategy constitutes the primary methodological contribution. By preserving the continuous structure of numerical metadata rather than discretizing it into textual categories, the proposed approach enables smooth modulation of the embedding space during training while maintaining a purely visual inference pipeline. Experiments on a seven-year longitudinal fish dataset and multiple wildlife benchmarks demonstrate improved performance under closed-set, open-set, and time-aware evaluation protocols. The results demonstrate that continuous metadata conditioning improves robustness to longitudinal appearance variation and temporal distribution shifts, while parameter-efficient adaptation enables a purely visual inference pipeline without requiring metadata at test time. Code and evaluation splits can be found at: https://github.com/AnilOsmanTur/MetaPrompt-ReID.", "arxiv_id": "2607.09443", "arxiv_url": "https://arxiv.org/abs/2607.09443", "authors": ["Anil Osman Tur", "Tonje Knutsen Sordalen", "Kim Tallaksen Halvorsen", "Cigdem Beyan"], "brief": "\u63d0\u51fa\u4e00\u79cd\u53c2\u6570\u9ad8\u6548\u7684CLIP\u9002\u914d\u6846\u67b6\u7528\u4e8e\u52a8\u7269\u91cd\u8bc6\u522b\uff0c\u6838\u5fc3\u521b\u65b0\u662f\u8fde\u7eed\u5143\u6570\u636e\u6761\u4ef6\u673a\u5236\uff0c\u5c06\u6570\u503c\u5c5e\u6027\uff08\u5982\u65f6\u95f4\u4fe1\u606f\uff09\u76f4\u63a5\u7f16\u7801\u8fdb\u63d0\u793a\u8868\u793a\u800c\u975e\u79bb\u6563\u5316\u4e3a\u6587\u672c\u7c7b\u522b\uff0c\u4ece\u800c\u5e73\u6ed1\u8c03\u5236\u5d4c\u5165\u7a7a\u95f4\u3002\u5728\u4e03\u5e74\u7eb5\u5411\u9c7c\u7c7b\u6570\u636e\u96c6\u548c\u591a\u4e2a\u91ce\u751f\u52a8\u7269\u57fa\u51c6\u4e0a\uff0c\u8be5\u65b9\u6cd5\u5728\u5c01\u95ed\u96c6\u3001\u5f00\u653e\u96c6\u548c\u65f6\u95f4\u611f\u77e5\u8bc4\u4f30\u534f\u8bae\u4e0b\u5747\u8868\u73b0\u66f4\u4f18\uff0c\u4e14\u63a8\u7406\u65f6\u65e0\u9700\u5143\u6570\u636e\u8f93\u5165\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09443", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u52a8\u7269\u91cd\u8bc6\u522b", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u53c2\u6570\u9ad8\u6548\u5fae\u8c03", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09443v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Parameter-Efficient Vision-Language Adaptation with Continuous Metadata Conditioning for Animal Re-Identification", "tldr": "\u63d0\u51fa\u4e00\u79cd\u53c2\u6570\u9ad8\u6548\u7684CLIP\u9002\u914d\u6846\u67b6\u7528\u4e8e\u52a8\u7269\u91cd\u8bc6\u522b\uff0c\u6838\u5fc3\u521b\u65b0\u662f\u8fde\u7eed\u5143\u6570\u636e\u6761\u4ef6\u673a\u5236\uff0c\u5c06\u6570\u503c\u5c5e\u6027\uff08\u5982\u65f6\u95f4\u4fe1\u606f\uff09\u76f4\u63a5\u7f16\u7801\u8fdb\u63d0\u793a\u8868\u793a\u800c\u975e\u79bb\u6563\u5316\u4e3a\u6587\u672c\u7c7b\u522b\uff0c\u4ece\u800c\u5e73\u6ed1\u8c03\u5236\u5d4c\u5165\u7a7a\u95f4\u3002\u5728\u4e03\u5e74\u7eb5\u5411\u9c7c\u7c7b\u6570\u636e\u96c6\u548c\u591a\u4e2a\u91ce\u751f\u52a8\u7269\u57fa\u51c6\u4e0a\uff0c\u8be5\u65b9\u6cd5\u5728\u5c01\u95ed\u96c6\u3001\u5f00\u653e\u96c6\u548c\u65f6\u95f4\u611f\u77e5\u8bc4\u4f30\u534f\u8bae\u4e0b\u5747\u8868\u73b0\u66f4\u4f18\uff0c\u4e14\u63a8\u7406\u65f6\u65e0\u9700\u5143\u6570\u636e\u8f93\u5165\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Test-time scaling (TTS) reliably improves reasoning in large language models, but whether it transfers to small open vision-language models remains unclear. We examine this on EXAMS-V, a multilingual visual multiple-choice benchmark, comparing self-consistency, describe-then-reason with PRM-guided beam search, and two post-hoc selectors across Qwen2.5-VL-7B-Instruct and Qwen3.5-4B. What matters is the conditions under which TTS runs, not the search or verification machinery. The largest factor is parseability: an early prompt format left many chains reasoning correctly yet never committing to an answer letter, which a standard answer cue and a guided repair step largely remove. A larger decoding budget removes the rest: raising the per-chain token limit from 1k to 2k recovers 3.7 pp, whereas sampling more chains (8 to 16) adds only 0.15 pp. Once chains have room to finish, elaborate methods contribute little: PRM-guided beam search trails plain self-consistency by 0.39 pp at over eight times the cost, and neither a training-free generative critic nor a trained multimodal PRM beats majority vote across both policies. The largest gain comes instead from the policy model itself (+11.4 pp). Our best configuration reaches 84.1% on the held-out ImageCLEF 2026 test split, ranking first on the Visual MCQ leaderboard.", "arxiv_id": "2607.09438", "arxiv_url": "https://arxiv.org/abs/2607.09438", "authors": ["Spiros Baxevanakis", "Peng-Jian Yang"], "brief": "\u7814\u7a76\u4e86\u6d4b\u8bd5\u65f6\u6269\u5c55\uff08TTS\uff09\u5728\u5c0f\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0a\u7684\u6548\u679c\uff0c\u53d1\u73b0\u5f71\u54cd\u6027\u80fd\u7684\u5173\u952e\u56e0\u7d20\u662f\u8f93\u51fa\u53ef\u89e3\u6790\u6027\u548c\u89e3\u7801\u9884\u7b97\uff0c\u800c\u975e\u590d\u6742\u7684\u641c\u7d22\u6216\u9a8c\u8bc1\u673a\u5236\u3002\u5c06\u6bcf\u94fetoken\u4e0a\u9650\u4ece1k\u63d0\u5347\u81f32k\u53ef\u5e26\u67653.7\u4e2a\u767e\u5206\u70b9\u7684\u63d0\u5347\uff0c\u6700\u7ec8\u5728ImageCLEF 2026\u591a\u8bed\u8a00\u89c6\u89c9\u9009\u62e9\u9898\u6392\u884c\u699c\u4e0a\u4ee584.1%\u51c6\u786e\u7387\u6392\u540d\u7b2c\u4e00\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09438", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u6d4b\u8bd5\u65f6\u6269\u5c55", "\u591a\u6a21\u6001", "\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09438v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Test-Time Scaling for Small VLMs on Multilingual Visual MCQ", "tldr": "\u7814\u7a76\u4e86\u6d4b\u8bd5\u65f6\u6269\u5c55\uff08TTS\uff09\u5728\u5c0f\u578b\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0a\u7684\u6548\u679c\uff0c\u53d1\u73b0\u5f71\u54cd\u6027\u80fd\u7684\u5173\u952e\u56e0\u7d20\u662f\u8f93\u51fa\u53ef\u89e3\u6790\u6027\u548c\u89e3\u7801\u9884\u7b97\uff0c\u800c\u975e\u590d\u6742\u7684\u641c\u7d22\u6216\u9a8c\u8bc1\u673a\u5236\u3002\u5c06\u6bcf\u94fetoken\u4e0a\u9650\u4ece1k\u63d0\u5347\u81f32k\u53ef\u5e26\u67653.7\u4e2a\u767e\u5206\u70b9\u7684\u63d0\u5347\uff0c\u6700\u7ec8\u5728ImageCLEF 2026\u591a\u8bed\u8a00\u89c6\u89c9\u9009\u62e9\u9898\u6392\u884c\u699c\u4e0a\u4ee584.1%\u51c6\u786e\u7387\u6392\u540d\u7b2c\u4e00\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Ambivalence and hesitancy are subtle behavioral states that are expressed through a combination of verbal content, facial behavior, visual context, and acoustic cues. Effective recognition therefore requires not only extracting informative unimodal representations, but also modeling how temporally aligned behavioral evidence interacts across modalities. In this paper, we propose a synchronized visual-facial cross-refinement framework (SVF-CR) with pairwise multimodal evidence fusion for ambivalence and hesitancy recognition. The proposed method first extracts whole-video segment tokens and cropped-face segment tokens using the same temporal partition. The synchronized visual and facial tokens are refined through intra-modal self-attention and bidirectional visual-facial cross-attention, allowing whole-video context and local facial behavior to mutually refine each other before evidence construction. We then construct segment-level visual-facial evidence using consistency and discrepancy modeling, followed by temporal self-attention and attention pooling. Textual and acoustic features are lightly refined through context self-attention and are fused with the enhanced visual-facial evidence at the final decision stage using pairwise evidence fusion. Experiments on the BAH (Behavioral Ambivalence/Hesitancy) public evaluation split show that the proposed synchronized visual-facial cross-refinement improves public macro-F1 over both global visual-face token fusion and synchronized evidence baselines, achieving a public macro-F1 of 0.7156. Code is available at : https://github.com/hiinnnii/BAH-Challenge-ECCV2026\\_SVF-CR.", "arxiv_id": "2607.09417", "arxiv_url": "https://arxiv.org/abs/2607.09417", "authors": ["Hyein Park", "Namho Kim", "Junhwa Kim"], "brief": "\u63d0\u51faSVF-CR\u6846\u67b6\uff0c\u901a\u8fc7\u540c\u6b65\u89c6\u89c9-\u9762\u90e8\u4ea4\u53c9\u7cbe\u70bc\u4e0e\u6210\u5bf9\u591a\u6a21\u6001\u8bc1\u636e\u878d\u5408\u6765\u8bc6\u522b\u6a21\u7cca\u6027\u4e0e\u72b9\u8c6b\u884c\u4e3a\u3002\u5229\u7528\u53cc\u5411\u4ea4\u53c9\u6ce8\u610f\u529b\u673a\u5236\u8ba9\u5168\u5c40\u89c6\u9891\u4e0a\u4e0b\u6587\u4e0e\u5c40\u90e8\u9762\u90e8\u884c\u4e3a\u76f8\u4e92\u589e\u5f3a\uff0c\u5e76\u7ed3\u5408\u6587\u672c\u548c\u58f0\u5b66\u7279\u5f81\u8fdb\u884c\u6700\u7ec8\u51b3\u7b56\uff0c\u5728BAH\u6570\u636e\u96c6\u4e0a\u53d6\u5f970.7156\u7684\u5b8fF1\u5206\u6570\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09417", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u60c5\u611f\u8bc6\u522b", "\u6ce8\u610f\u529b\u673a\u5236", "\u884c\u4e3a\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09417v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SVF-CR: Synchronized Visual-Facial Cross-Refinement for Multimodal Ambivalence and Hesitancy Recognition", "tldr": "\u63d0\u51faSVF-CR\u6846\u67b6\uff0c\u901a\u8fc7\u540c\u6b65\u89c6\u89c9-\u9762\u90e8\u4ea4\u53c9\u7cbe\u70bc\u4e0e\u6210\u5bf9\u591a\u6a21\u6001\u8bc1\u636e\u878d\u5408\u6765\u8bc6\u522b\u6a21\u7cca\u6027\u4e0e\u72b9\u8c6b\u884c\u4e3a\u3002\u5229\u7528\u53cc\u5411\u4ea4\u53c9\u6ce8\u610f\u529b\u673a\u5236\u8ba9\u5168\u5c40\u89c6\u9891\u4e0a\u4e0b\u6587\u4e0e\u5c40\u90e8\u9762\u90e8\u884c\u4e3a\u76f8\u4e92\u589e\u5f3a\uff0c\u5e76\u7ed3\u5408\u6587\u672c\u548c\u58f0\u5b66\u7279\u5f81\u8fdb\u884c\u6700\u7ec8\u51b3\u7b56\uff0c\u5728BAH\u6570\u636e\u96c6\u4e0a\u53d6\u5f970.7156\u7684\u5b8fF1\u5206\u6570\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Worldbuilding, the construction of coherent fictional worlds, is a foundational task in game design and literary creation. Large Language Models (LLMs) offer new possibilities for automated content generation, but their application to worldbuilding faces three challenges: context explosion that grows linearly with the building process, the tension between creative diversity and content consistency, and the absence of automated quality assurance. This paper presents AutoWorldBuilder, a multi-agent collaborative system that addresses these challenges through five integrated components: a structured concept network with conflict detection; a DAG-based hybrid batch scheduler that groups tasks by semantic locality; a four-layer context compression mechanism achieving approximately 90% token reduction; an iterative review system with specialized Auditor agents that improves proposal pass rates from 42% to over 85%; and a skill-driven agent architecture supporting zero-code extension with differentiated temperature configuration. Two experiments across 20 diverse worldbuilding tasks, using GPT-OSS 120B and DeepSeek v3.2 as LLM backends, demonstrate a 95.0% success rate. The system generated 56-103 self-consistent concepts per world in 18-31 minutes with zero-conflict delivery. The architectural patterns validated here, including layer-as-budget compression, semantic-locality scheduling, and separation of generation and review, transfer to the broader class of knowledge-intensive, multi-agent LLM applications.", "arxiv_id": "2607.09403", "arxiv_url": "https://arxiv.org/abs/2607.09403", "authors": ["Jingbo Chen", "He Wang", "Wei Yuan", "Yuqiao Lai", "Zhenyan Lu"], "brief": "\u63d0\u51faAutoWorldBuilder\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7cfb\u7edf\uff0c\u4e13\u4e3a\u865a\u6784\u4e16\u754c\u6784\u5efa\u8bbe\u8ba1\uff0c\u901a\u8fc7\u56db\u5c42\u4e0a\u4e0b\u6587\u538b\u7f29\uff08\u51cf\u5c11\u7ea690% token\uff09\u3001DAG\u6279\u8c03\u5ea6\u548c\u4e13\u804c\u5ba1\u6838\u667a\u80fd\u4f53\u8fed\u4ee3\u8bc4\u5ba1\uff0c\u5c06\u63d0\u6848\u901a\u8fc7\u7387\u4ece42%\u63d0\u5347\u81f385%\u4ee5\u4e0a\u3002\u572820\u4e2a\u591a\u6837\u5316\u4e16\u754c\u6784\u5efa\u4efb\u52a1\u4e2d\u5b9e\u73b095%\u6210\u529f\u7387\uff0c\u6bcf\u4e2a\u4e16\u754c\u751f\u621056-103\u4e2a\u81ea\u6d3d\u6982\u5ff5\uff0c\u8017\u65f618-31\u5206\u949f\u4e14\u96f6\u51b2\u7a81\u4ea4\u4ed8\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09403", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u591a\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5185\u5bb9\u751f\u6210", "\u4e0a\u4e0b\u6587\u538b\u7f29"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09403v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Fictional Worldbuilding: Multi-Agent LLM Collaboration with Hierarchical Context Compression and Iterative Review", "tldr": "\u63d0\u51faAutoWorldBuilder\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7cfb\u7edf\uff0c\u4e13\u4e3a\u865a\u6784\u4e16\u754c\u6784\u5efa\u8bbe\u8ba1\uff0c\u901a\u8fc7\u56db\u5c42\u4e0a\u4e0b\u6587\u538b\u7f29\uff08\u51cf\u5c11\u7ea690% token\uff09\u3001DAG\u6279\u8c03\u5ea6\u548c\u4e13\u804c\u5ba1\u6838\u667a\u80fd\u4f53\u8fed\u4ee3\u8bc4\u5ba1\uff0c\u5c06\u63d0\u6848\u901a\u8fc7\u7387\u4ece42%\u63d0\u5347\u81f385%\u4ee5\u4e0a\u3002\u572820\u4e2a\u591a\u6837\u5316\u4e16\u754c\u6784\u5efa\u4efb\u52a1\u4e2d\u5b9e\u73b095%\u6210\u529f\u7387\uff0c\u6bcf\u4e2a\u4e16\u754c\u751f\u621056-103\u4e2a\u81ea\u6d3d\u6982\u5ff5\uff0c\u8017\u65f618-31\u5206\u949f\u4e14\u96f6\u51b2\u7a81\u4ea4\u4ed8\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Adaptive power management in Electric Vehicles (EVs) requires accurate power prediction. Although deep learning models have emerged as highly effective for time-series forecasting in this domain, their performance is prone to degradation when exposed to data with distributions different from the training data. We introduce a novel approach that enables on-device learning in resource-constrained EV systems to continuously adapt pretrained battery prediction models to new, unseen data. We leverage existing pretrained models by transforming them into adaptable versions that retain critical hyperparameter knowledge from their initial training. We comprehensively investigate both online and offline model adaptation strategies. Our results demonstrate significant improvements in forecasting performance across various models and time horizons, achieving mean absolute error reductions of up to 7.49\\% and 14.88\\% with online and offline adaptation techniques, respectively. This study highlights the substantial benefit of on-device adaptation, resulting in enhanced battery power predictions than unadapted model deployments in real-world EV scenarios.", "arxiv_id": "2607.09400", "arxiv_url": "https://arxiv.org/abs/2607.09400", "authors": ["Avik Bhatnagar", "Anton Paule", "Tobias Schuermann", "Sebastian Reiter", "Oliver Bringmann"], "brief": "\u9488\u5bf9\u7535\u52a8\u6c7d\u8f66\u7535\u6c60\u529f\u7387\u9884\u6d4b\u4e2d\u8bad\u7ec3\u6570\u636e\u4e0e\u5b9e\u9645\u6570\u636e\u5206\u5e03\u504f\u79fb\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u79cd\u8bbe\u5907\u7aef\u81ea\u9002\u5e94\u5b66\u4e60\u65b9\u6cd5\uff0c\u5c06\u9884\u8bad\u7ec3\u6a21\u578b\u8f6c\u5316\u4e3a\u53ef\u6301\u7eed\u9002\u5e94\u65b0\u6570\u636e\u7684\u7248\u672c\u3002\u5728\u7ebf\u548c\u79bb\u7ebf\u9002\u5e94\u7b56\u7565\u5206\u522b\u5b9e\u73b0\u4e86\u6700\u9ad87.49%\u548c14.88%\u7684\u5e73\u5747\u7edd\u5bf9\u8bef\u5dee\u964d\u4f4e\u3002", "categories": ["cs.LG", "cs.AI", "cs.AR", "cs.PF"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09400", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7535\u52a8\u6c7d\u8f66", "\u65f6\u5e8f\u9884\u6d4b", "\u8bbe\u5907\u7aef\u5b66\u4e60", "\u6a21\u578b\u9002\u5e94"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09400v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "On-Device Adaptive Battery Power Prediction for Electric Vehicles", "tldr": "\u9488\u5bf9\u7535\u52a8\u6c7d\u8f66\u7535\u6c60\u529f\u7387\u9884\u6d4b\u4e2d\u8bad\u7ec3\u6570\u636e\u4e0e\u5b9e\u9645\u6570\u636e\u5206\u5e03\u504f\u79fb\u95ee\u9898\uff0c\u63d0\u51fa\u4e00\u79cd\u8bbe\u5907\u7aef\u81ea\u9002\u5e94\u5b66\u4e60\u65b9\u6cd5\uff0c\u5c06\u9884\u8bad\u7ec3\u6a21\u578b\u8f6c\u5316\u4e3a\u53ef\u6301\u7eed\u9002\u5e94\u65b0\u6570\u636e\u7684\u7248\u672c\u3002\u5728\u7ebf\u548c\u79bb\u7ebf\u9002\u5e94\u7b56\u7565\u5206\u522b\u5b9e\u73b0\u4e86\u6700\u9ad87.49%\u548c14.88%\u7684\u5e73\u5747\u7edd\u5bf9\u8bef\u5dee\u964d\u4f4e\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We introduce a novel method for both partial and full optimization of the connections in deep differentiable logic gate networks (LGNs) and lookup table networks (LUTNs). Our training method utilizes a probability distribution over a set of connections per gate/lookup table (LUT) input pin, selecting the connection with highest merit, all whilst the optimal gate types or LUT-entries are learned in parallel. We show that the connection-optimized LGNs outperform standard fixed-connection LGNs on the Yin-Yang, MNIST Handwritten Digits and Fashion-MNIST benchmarks, while requiring only a fraction of the number of logic gates. We achieve 98.92% on the MNIST dataset with two layers of 8000 gates. With only one layer of 8000 gates, we obtain 98.45%, showing that our method requires almost 50 times fewer gates compared to fixed-connection LGNs. Training stability up to ten layers has been ensured by employing a high learning rate, straight-through estimators and trimming constant-output gate types. Additionally, we present a LUT neuron description that enables stable training with backpropagation, tested up to 6-layer deep networks. The model requires four times fewer trainable parameters and still achieves a higher accuracy compared to the fixed-connection LGN training algorithm. Our connection-training algorithm also works well for the LUTNs, achieving an accuracy of 98.88% for two layers of 2000 6-input LUTs.", "arxiv_id": "2607.09399", "arxiv_url": "https://arxiv.org/abs/2607.09399", "authors": ["Wout Mommen", "Lars Keuninckx", "Matthias Hartmann", "Werner Van Leekwijck", "Piet Wambacq"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u53ef\u5b8c\u5168\u8bad\u7ec3\u903b\u8f91\u95e8\u7f51\u7edc\uff08LGN\uff09\u548c\u67e5\u627e\u8868\u7f51\u7edc\uff08LUTN\uff09\u8fde\u63a5\u7684\u65b0\u65b9\u6cd5\uff0c\u901a\u8fc7\u6982\u7387\u5206\u5e03\u4f18\u5316\u8fde\u63a5\u9009\u62e9\u5e76\u5e76\u884c\u5b66\u4e60\u95e8\u7c7b\u578b\u3002\u5728MNIST\u4e0a\u4ec5\u7528\u4e24\u5c428000\u4e2a\u903b\u8f91\u95e8\u8fbe\u523098.92%\u7cbe\u5ea6\uff0c\u76f8\u6bd4\u56fa\u5b9a\u8fde\u63a5LGN\u51cf\u5c11\u7ea650\u500d\u95e8\u6570\u91cf\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09399", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u903b\u8f91\u95e8\u7f51\u7edc", "\u67e5\u627e\u8868\u7f51\u7edc", "\u53ef\u5fae\u5206\u8bad\u7ec3", "\u795e\u7ecf\u7f51\u7edc\u538b\u7f29"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09399v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Fully Trainable Deep Differentiable Logic Gate Networks and Lookup Table Networks", "tldr": "\u63d0\u51fa\u4e86\u4e00\u79cd\u53ef\u5b8c\u5168\u8bad\u7ec3\u903b\u8f91\u95e8\u7f51\u7edc\uff08LGN\uff09\u548c\u67e5\u627e\u8868\u7f51\u7edc\uff08LUTN\uff09\u8fde\u63a5\u7684\u65b0\u65b9\u6cd5\uff0c\u901a\u8fc7\u6982\u7387\u5206\u5e03\u4f18\u5316\u8fde\u63a5\u9009\u62e9\u5e76\u5e76\u884c\u5b66\u4e60\u95e8\u7c7b\u578b\u3002\u5728MNIST\u4e0a\u4ec5\u7528\u4e24\u5c428000\u4e2a\u903b\u8f91\u95e8\u8fbe\u523098.92%\u7cbe\u5ea6\uff0c\u76f8\u6bd4\u56fa\u5b9a\u8fde\u63a5LGN\u51cf\u5c11\u7ea650\u500d\u95e8\u6570\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We study an adversarial bandit problem for entanglement-based quantum-network routing over a modest graph corpus. Alice selects an end-to-end repeater route for an Ekert-91 protocol (E91) representing her move, while Eve selects an attack surface, either edge intercept--resend or repeater memory degradation. Payoffs are drawn from cached SeQUeNCe-simulated E91 transcripts, and Alice accepts a turn when the finite-sample statistic violates the Clauser-Horne-Shimony-Holt (CHSH) bound. Performing adversarial co-learning across 50 structured topologies, we find that learned retention tracks a full-matrix minimax reference closely (Pearson $r=0.99$): under a one-surface Eve action model, bottleneck families have zero retention, while non-bottleneck families follow a $1-1/N$ coverage principle. We then fit decision-tree explanation models to graph-, attack-, and route-level topology-corpus targets and report their faithfulness. Finally, we construct prompt records for local language models to summarize the tree evidence, resulting in an open-source explanation workflow for quantum-repeater network games.", "arxiv_id": "2607.09378", "arxiv_url": "https://arxiv.org/abs/2607.09378", "authors": ["Brennan Bell", "Inti Gabriel Mendoza Estrada", "Andreas Tr\u00fcgler", "Paul Erker"], "brief": "\u7814\u7a76\u91cf\u5b50\u4e2d\u7ee7\u7f51\u7edc\u4e2d\u7684\u5bf9\u6297\u6027\u591a\u81c2\u8001\u864e\u673a\u95ee\u9898\uff1aAlice\u9009\u62e9E91\u534f\u8bae\u8def\u7531\uff0cEve\u9009\u62e9\u653b\u51fb\u65b9\u5f0f\uff08\u622a\u83b7\u91cd\u53d1\u6216\u5185\u5b58\u9000\u5316\uff09\uff0c\u901a\u8fc750\u79cd\u62d3\u6251\u7ed3\u6784\u7684\u5bf9\u6297\u534f\u540c\u5b66\u4e60\u53d1\u73b0\u5b66\u4e60\u4fdd\u7559\u7387\u4e0e\u6781\u5c0f\u6781\u5927\u53c2\u8003\u9ad8\u5ea6\u543b\u5408\uff08r=0.99\uff09\uff0c\u5e76\u6784\u5efa\u51b3\u7b56\u6811\u89e3\u91ca\u6a21\u578b\u4e0e\u672c\u5730\u8bed\u8a00\u6a21\u578b\u6458\u8981\u5de5\u4f5c\u6d41\uff0c\u5b9e\u73b0\u91cf\u5b50\u7f51\u7edc\u535a\u5f08\u7684\u53ef\u89e3\u91ca\u9c81\u68d2\u6027\u5206\u6790\u3002", "categories": ["quant-ph", "cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09378", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u91cf\u5b50\u7f51\u7edc", "\u5bf9\u6297\u5b66\u4e60", "\u53ef\u89e3\u91caAI", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09378v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "When Routes Run Out: Adversarial Co-Learning and Explainable Robustness in Quantum Repeater Networks", "tldr": "\u7814\u7a76\u91cf\u5b50\u4e2d\u7ee7\u7f51\u7edc\u4e2d\u7684\u5bf9\u6297\u6027\u591a\u81c2\u8001\u864e\u673a\u95ee\u9898\uff1aAlice\u9009\u62e9E91\u534f\u8bae\u8def\u7531\uff0cEve\u9009\u62e9\u653b\u51fb\u65b9\u5f0f\uff08\u622a\u83b7\u91cd\u53d1\u6216\u5185\u5b58\u9000\u5316\uff09\uff0c\u901a\u8fc750\u79cd\u62d3\u6251\u7ed3\u6784\u7684\u5bf9\u6297\u534f\u540c\u5b66\u4e60\u53d1\u73b0\u5b66\u4e60\u4fdd\u7559\u7387\u4e0e\u6781\u5c0f\u6781\u5927\u53c2\u8003\u9ad8\u5ea6\u543b\u5408\uff08r=0.99\uff09\uff0c\u5e76\u6784\u5efa\u51b3\u7b56\u6811\u89e3\u91ca\u6a21\u578b\u4e0e\u672c\u5730\u8bed\u8a00\u6a21\u578b\u6458\u8981\u5de5\u4f5c\u6d41\uff0c\u5b9e\u73b0\u91cf\u5b50\u7f51\u7edc\u535a\u5f08\u7684\u53ef\u89e3\u91ca\u9c81\u68d2\u6027\u5206\u6790\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Program verification is crucial for software correctness, but producing fully verified programs remains difficult in practice. This paper studies whether implementation structure affects automated verifiability when multiple generated programs are intended to satisfy the same task-level semantics. We present Diversify2Verify, a staged LLM-based pipeline for Why3 that infers representation-specific contracts, generates and tests diverse recursive and imperative array/list implementations, and attempts verification with bounded verifier-guided annotation repair. We also construct a verification-oriented benchmark of 73 tasks over integers, arrays, and lists, yielding 292 implementation variants. Diversify2Verify verifies 96 artifacts initially and 154 after two repair passes, improving artifact-level verification from 32.9% to 52.7%. At the task level, at least one variant verifies for 49 of 73 tasks, a 67.1% success rate. These results show that task-equivalent implementations can differ substantially in verifiability and that implementation diversity helps find verification-friendly artifacts.", "arxiv_id": "2607.09366", "arxiv_url": "https://arxiv.org/abs/2607.09366", "authors": ["Shirley Yu", "Ruben Martins"], "brief": "\u7814\u7a76\u53d1\u73b0\uff0c\u5b9e\u73b0\u76f8\u540c\u529f\u80fd\u7684\u4e0d\u540c\u7a0b\u5e8f\u5728\u81ea\u52a8\u5316\u5f62\u5f0f\u9a8c\u8bc1\u96be\u5ea6\u4e0a\u5b58\u5728\u663e\u8457\u5dee\u5f02\u3002\u63d0\u51faDiversify2Verify\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7\u751f\u6210\u591a\u6837\u5316\u9012\u5f52\u4e0e\u547d\u4ee4\u5f0f\u5b9e\u73b0\u5e76\u7ed3\u5408\u6709\u754c\u9a8c\u8bc1\u5668\u5f15\u5bfc\u7684\u6ce8\u89e3\u4fee\u590d\uff0c\u5c06Why3\u7a0b\u5e8f\u9a8c\u8bc1\u6210\u529f\u7387\u4ece32.9%\u63d0\u5347\u81f352.7%\uff0c73\u4e2a\u4efb\u52a1\u4e2d\u670949\u4e2a\u81f3\u5c11\u6709\u4e00\u79cd\u5b9e\u73b0\u53ef\u88ab\u9a8c\u8bc1\u3002", "categories": ["cs.SE", "cs.AI", "cs.LO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09366", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u7a0b\u5e8f\u9a8c\u8bc1", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f62\u5f0f\u5316\u65b9\u6cd5", "\u4ee3\u7801\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09366v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Diversifying to Verify: When Task-Equivalent Programs Differ in Verifiability", "tldr": "\u7814\u7a76\u53d1\u73b0\uff0c\u5b9e\u73b0\u76f8\u540c\u529f\u80fd\u7684\u4e0d\u540c\u7a0b\u5e8f\u5728\u81ea\u52a8\u5316\u5f62\u5f0f\u9a8c\u8bc1\u96be\u5ea6\u4e0a\u5b58\u5728\u663e\u8457\u5dee\u5f02\u3002\u63d0\u51faDiversify2Verify\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7\u751f\u6210\u591a\u6837\u5316\u9012\u5f52\u4e0e\u547d\u4ee4\u5f0f\u5b9e\u73b0\u5e76\u7ed3\u5408\u6709\u754c\u9a8c\u8bc1\u5668\u5f15\u5bfc\u7684\u6ce8\u89e3\u4fee\u590d\uff0c\u5c06Why3\u7a0b\u5e8f\u9a8c\u8bc1\u6210\u529f\u7387\u4ece32.9%\u63d0\u5347\u81f352.7%\uff0c73\u4e2a\u4efb\u52a1\u4e2d\u670949\u4e2a\u81f3\u5c11\u6709\u4e00\u79cd\u5b9e\u73b0\u53ef\u88ab\u9a8c\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Virtual try-on (VTO) has made significant progress in realistically transferring garments onto a target person. Yet most systems give the user little control over how a garment should be worn -- its size (loose or fitted), style (e.g., tucked in or untucked, open or closed), and spatial placement on the body. We address this gap with two complementary contributions. First, we define and solve Visual-Instance-Prompt Segmentation via VIP-SAM: given a flatlay image of a garment, segment that specific instance in a photograph of a person wearing it. This is an instance-level task, distinct from the typically studied category-level segmentation. Second, we introduce CtrlVTON, a controllable VTO framework that recasts try-on as an image editing problem and adds segmentation masks as pixel-level control over garment layout, including style, size, and spatial placement on the body. VIP-SAM and CtrlVTON each achieve state-of-the-art results on their respective tasks. In particular, CtrlVTON generates images that follow user-provided layouts far more faithfully than the strongest proprietary editing systems while matching them on garment fidelity.", "arxiv_id": "2607.09362", "arxiv_url": "https://arxiv.org/abs/2607.09362", "authors": ["Seungyong Lee", "Hyun Jun Jang", "Sangoh Kim", "Sungjoon Park"], "brief": "\u63d0\u51faCtrlVTON\u6846\u67b6\uff0c\u5c06\u865a\u62df\u8bd5\u7a7f\u91cd\u6784\u4e3a\u56fe\u50cf\u7f16\u8f91\u95ee\u9898\uff0c\u901a\u8fc7\u5206\u5272\u63a9\u7801\u5b9e\u73b0\u5bf9\u670d\u88c5\u5c3a\u5bf8\u3001\u98ce\u683c\u548c\u4f4d\u7f6e\u7684\u50cf\u7d20\u7ea7\u7cbe\u786e\u63a7\u5236\u3002\u540c\u65f6\u63d0\u51faVIP-SAM\u89e3\u51b3\u89c6\u89c9\u5b9e\u4f8b\u63d0\u793a\u5206\u5272\u4efb\u52a1\uff0c\u4e24\u8005\u5747\u8fbe\u5230\u5404\u81ea\u4efb\u52a1\u7684\u6700\u4f18\u6027\u80fd\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09362", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u865a\u62df\u8bd5\u7a7f", "\u56fe\u50cf\u7f16\u8f91", "\u5b9e\u4f8b\u5206\u5272", "\u53ef\u63a7\u751f\u6210"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09362v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CtrlVTON: Controllable Virtual Try-On via Visual-Instance-Prompt Segmentation", "tldr": "\u63d0\u51faCtrlVTON\u6846\u67b6\uff0c\u5c06\u865a\u62df\u8bd5\u7a7f\u91cd\u6784\u4e3a\u56fe\u50cf\u7f16\u8f91\u95ee\u9898\uff0c\u901a\u8fc7\u5206\u5272\u63a9\u7801\u5b9e\u73b0\u5bf9\u670d\u88c5\u5c3a\u5bf8\u3001\u98ce\u683c\u548c\u4f4d\u7f6e\u7684\u50cf\u7d20\u7ea7\u7cbe\u786e\u63a7\u5236\u3002\u540c\u65f6\u63d0\u51faVIP-SAM\u89e3\u51b3\u89c6\u89c9\u5b9e\u4f8b\u63d0\u793a\u5206\u5272\u4efb\u52a1\uff0c\u4e24\u8005\u5747\u8fbe\u5230\u5404\u81ea\u4efb\u52a1\u7684\u6700\u4f18\u6027\u80fd\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Retrieval-augmented generation evaluation checks whether model claims are factually grounded in retrieved documents. It does not check whether retrieved evidence is attributed to the correct entity. A clinical RAG response can pass every automated check (zero hallucinations, near-perfect faithfulness, real citations) while presenting drug Y\u0027s clinical evidence as evidence about queried drug X. We term this deceptive grounding (DG): a failure invisible to faithfulness, hallucination, and citation checks because every claim is sourced from a real document, about the wrong entity. Using a controlled factorial benchmark across 13 models, we find DG rates spanning 8-87% at peak adversarial conditions. Medical and biomedical fine-tuned models reach up to 86.7%; domain specialization amplifies the failure rather than mitigating it. A controlled ablation identifies the mechanism: removing entity-specific clinical evidence from retrieved documents eliminates entity-attribution failure entirely, shifting all failures to confabulation. The two failure modes respond to the same trigger, taking different paths. Production measurement across 740 drug-disease pairs finds 7.8% overall DG in a deployed RAG system, rising to 13.6% for recently approved drugs. Entity-attribution verification (checking that cited evidence applies to the queried entity) detects DG at 97.0% precision and 98.7% DG recall (IPW-adjusted human gold standard); no existing framework implements it.", "arxiv_id": "2607.09349", "arxiv_url": "https://arxiv.org/abs/2607.09349", "authors": ["Cedric Caruzzo", "Donggeun Yoo", "Tae Soo Kim"], "brief": "\u4e34\u5e8aRAG\u7cfb\u7edf\u5b58\u5728\u4e00\u79cd\u65b0\u578b\u5931\u8d25\u6a21\u5f0f\u2014\u2014\"\u6b3a\u9a97\u6027\u63a5\u5730\"\uff08Deceptive Grounding\uff09\uff1a\u6a21\u578b\u5c06\u836f\u7269Y\u7684\u4e34\u5e8a\u8bc1\u636e\u4f5c\u4e3a\u836f\u7269X\u7684\u8bc1\u636e\u5448\u73b0\uff0c\u5374\u80fd\u901a\u8fc7\u6240\u6709\u73b0\u6709\u7684\u5e7b\u89c9\u68c0\u6d4b\u548c\u5fe0\u5b9e\u5ea6\u8bc4\u4f30\u3002\u7814\u7a76\u53d1\u73b0\u8be5\u9519\u8bef\u7387\u5728\u5bf9\u6297\u6761\u4ef6\u4e0b\u9ad8\u8fbe87%\uff0c\u533b\u5b66\u5fae\u8c03\u6a21\u578b\u53cd\u800c\u66f4\u4e25\u91cd\uff1b\u63d0\u51fa\u7684\u5b9e\u4f53\u5f52\u56e0\u9a8c\u8bc1\u65b9\u6cd5\u53ef\u4ee597%\u7cbe\u5ea6\u68c0\u6d4b\u6b64\u7c7b\u9519\u8bef\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09349", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u68c0\u7d22\u589e\u5f3a\u751f\u6210", "\u4e34\u5e8aNLP", "\u5e7b\u89c9\u68c0\u6d4b", "\u5b9e\u4f53\u5f52\u56e0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09349v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Deceptive Grounding: Entity Attribution Failure in Clinical Retrieval-Augmented Generation", "tldr": "\u4e34\u5e8aRAG\u7cfb\u7edf\u5b58\u5728\u4e00\u79cd\u65b0\u578b\u5931\u8d25\u6a21\u5f0f\u2014\u2014\"\u6b3a\u9a97\u6027\u63a5\u5730\"\uff08Deceptive Grounding\uff09\uff1a\u6a21\u578b\u5c06\u836f\u7269Y\u7684\u4e34\u5e8a\u8bc1\u636e\u4f5c\u4e3a\u836f\u7269X\u7684\u8bc1\u636e\u5448\u73b0\uff0c\u5374\u80fd\u901a\u8fc7\u6240\u6709\u73b0\u6709\u7684\u5e7b\u89c9\u68c0\u6d4b\u548c\u5fe0\u5b9e\u5ea6\u8bc4\u4f30\u3002\u7814\u7a76\u53d1\u73b0\u8be5\u9519\u8bef\u7387\u5728\u5bf9\u6297\u6761\u4ef6\u4e0b\u9ad8\u8fbe87%\uff0c\u533b\u5b66\u5fae\u8c03\u6a21\u578b\u53cd\u800c\u66f4\u4e25\u91cd\uff1b\u63d0\u51fa\u7684\u5b9e\u4f53\u5f52\u56e0\u9a8c\u8bc1\u65b9\u6cd5\u53ef\u4ee597%\u7cbe\u5ea6\u68c0\u6d4b\u6b64\u7c7b\u9519\u8bef\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
