u548c\u8de8\u57df\u573a\u666f\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Although Video Large Language Models (Video LLMs) have shown strong performance in video understanding, their efficiency is still limited by the large number of visual tokens. Existing video token compression methods typically rely on frame-wise saliency or heuristic token merging, which can over-focus on locally salient regions and produce ambiguous fused features. To address these issues, we propose GeoTrace, a training-free spatiotemporal token compression framework that decomposes video evidence into exact skeleton tokens and traceable residual event tokens. Specifically, Contextual Farthest-Point Anchoring (CFPA) preserves salient, context-consistent, and high-coverage skeleton tokens, while Trajectory-Constrained Residual Condensation (TCRC) compresses residual tokens through one-to-one temporal trajectories and constrained near-manifold condensation, producing traceable event tokens with reduced ambiguity. We evaluate GeoTrace on four Video LLMs across four video understanding benchmarks, and the results demonstrate its effectiveness and generalization across different model architectures and scenarios. On LLaVA-OneVision, with only 10\\% visual tokens retained, GeoTrace achieves a \\(12.99\\times\\) TFLOPs reduction while preserving 99.1\\% of the vanilla performance. Overall, GeoTrace offers a compact and traceable token representation for efficient and robust Video LLM inference. Code is available at \\href{https://github.com/guohuan-xie/GeoTrace.git}{\\texttt{Code}}.", "arxiv_id": "2607.09080", "arxiv_url": "https://arxiv.org/abs/2607.09080", "authors": ["Guohuan Xie", "Mengqi Lei", "Chuan Shi", "Wei Bao", "Yue Gao", "Siqi Li"], "brief": "\u63d0\u51faGeoTrace\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u65f6\u7a7atoken\u538b\u7f29\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u89c6\u89c9\u8bc1\u636e\u5206\u89e3\u4e3a\u9aa8\u67b6token\u548c\u53ef\u8ffd\u8e2a\u6b8b\u5dee\u4e8b\u4ef6token\uff0c\u5927\u5e45\u964d\u4f4eVideo LLM\u63a8\u7406\u8ba1\u7b97\u91cf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09080", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["CFPA\uff08\u4e0a\u4e0b\u6587\u6700\u8fdc\u70b9\u951a\u5b9a\uff09\u4fdd\u7559\u663e\u8457\u3001\u4e0a\u4e0b\u6587\u4e00\u81f4\u4e14\u9ad8\u8986\u76d6\u7387\u7684\u9aa8\u67b6token", "TCRC\uff08\u8f68\u8ff9\u7ea6\u675f\u6b8b\u5dee\u538b\u7f29\uff09\u901a\u8fc7\u4e00\u5bf9\u4e00\u65f6\u5e8f\u8f68\u8ff9\u548c\u8fd1\u6d41\u5f62\u538b\u7f29\u751f\u6210\u53ef\u8ffd\u8e2a\u4e8b\u4ef6token\uff0c\u51cf\u5c11\u6b67\u4e49", "\u5728LLaVA-OneVision\u4e0a\u4ec5\u4fdd\u755910%\u89c6\u89c9token\uff0c\u5b9e\u73b012.99\u500dTFLOPs\u964d\u4f4e\uff0c\u540c\u65f6\u4fdd\u755999.1%\u539f\u59cb\u6027\u80fd"], "keywords": ["\u89c6\u9891\u7406\u89e3", "\u591a\u6a21\u6001", "token\u538b\u7f29", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09080v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "GeoTrace: Geometry-Aware Trajectory Token Compression for Video Large Language Models", "tldr": "GeoTrace\uff1a\u65e0\u9700\u8bad\u7ec3\u7684\u51e0\u4f55\u611f\u77e5\u89c6\u9891token\u538b\u7f29\u6846\u67b6\uff0c\u4fdd\u755910%token\u4ecd\u7ef4\u630199.1%\u6027\u80fd", "upvotes": 0, "what_it_is": "\u63d0\u51faGeoTrace\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u65f6\u7a7atoken\u538b\u7f29\u6846\u67b6\uff0c\u5c06\u89c6\u9891\u89c6\u89c9\u8bc1\u636e\u5206\u89e3\u4e3a\u9aa8\u67b6token\u548c\u53ef\u8ffd\u8e2a\u6b8b\u5dee\u4e8b\u4ef6token\uff0c\u5927\u5e45\u964d\u4f4eVideo LLM\u63a8\u7406\u8ba1\u7b97\u91cf\u3002", "why_notable": "\u65e0\u9700\u989d\u5916\u8bad\u7ec3\u5373\u53ef\u5927\u5e45\u538b\u7f29\u89c6\u9891token\uff0c\u517c\u987e\u6548\u7387\u4e0e\u6027\u80fd\uff0c\u57284\u4e2a\u6a21\u578b\u548c4\u4e2a\u57fa\u51c6\u4e0a\u9a8c\u8bc1\u4e86\u6cdb\u5316\u6027\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Object detection is a fundamental component in numerous Unmanned Aerial Vehicle (UAV) applications, yet it has long been plagued by hindrances like occlusion or target pixel scarcity. Active Object Detection (AOD) provides a novel paradigm to address these challenges via active vision, while UAV-based AOD research remains scarce due to the lack of high-quality datasets and benchmarks for algorithm development and evaluation. To fill this gap, this paper presents ATRNet-LUDO, the first large-scale real-world dataset for UAV-Ground Active Object Detection (UGAOD). It contains 121,000 multi-view panoramic multi-target aerial images and 1.21 million local single-target slices, covering 10 vehicle targets across 40 scenarios. It enables the construction of diverse training and testing environments for UAV agent interaction and active observation policy learning. Based on this dataset, we establish a comprehensive evaluation benchmark for AOD policy learning methods. Most existing AOD policies rely on Deep Reinforcement Learning (DRL) but suffer from poor generalization. Evaluations on our benchmark reveal a significant generalization gap between training and testing performance, highlighting an urgent need for solutions. To this end, we leverage the Joint Embedding Predictive Architecture (JEPA) to construct a world model that enhances state representation learning, and propose AOD-JEPA by incorporating AOD-specific prior knowledge. Extensive experiments validate its effectiveness and superiority. We hope ATRNet-LUDO and the benchmark will advance research in the UGAOD field. The dataset and code are soon available at https://github.com/Leo000ooo/LUDO_dataset.", "arxiv_id": "2607.09078", "arxiv_url": "https://arxiv.org/abs/2607.09078", "authors": ["Tianpeng Liu", "Xinhua Jiang", "Li Liu", "Qinmu Shen", "Siwei Tang", "Zhen Liu", "Yongxiang Liu"], "brief": "\u63d0\u51faATRNet-LUDO\u6570\u636e\u96c6\uff0812.1\u4e07\u5f20\u591a\u89c6\u89d2\u822a\u62cd\u56fe\u50cf\uff09\u548c\u65e0\u4eba\u673a\u5730\u9762\u4e3b\u52a8\u76ee\u6807\u68c0\u6d4b\u57fa\u51c6\uff0c\u5e76\u57fa\u4e8eJEPA\u4e16\u754c\u6a21\u578b\u63d0\u51faAOD-JEPA\u65b9\u6cd5\u4ee5\u63d0\u5347\u4e3b\u52a8\u89c2\u6d4b\u7b56\u7565\u7684\u6cdb\u5316\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09078", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u6570\u636e\u96c6\u5305\u542b121,000\u5f20\u591a\u89c6\u89d2\u5168\u666f\u591a\u76ee\u6807\u822a\u62cd\u56fe\u50cf\u53ca121\u4e07\u5f20\u5c40\u90e8\u5355\u76ee\u6807\u5207\u7247\uff0c\u8986\u76d610\u7c7b\u8f66\u8f86\u76ee\u6807\u300140\u79cd\u573a\u666f", "\u57fa\u51c6\u8bc4\u6d4b\u63ed\u793a\u73b0\u6709\u6df1\u5ea6\u5f3a\u5316\u5b66\u4e60AOD\u7b56\u7565\u5b58\u5728\u663e\u8457\u7684\u8bad\u7ec3-\u6d4b\u8bd5\u6cdb\u5316\u5dee\u8ddd", "\u5f15\u5165\u8054\u5408\u5d4c\u5165\u9884\u6d4b\u67b6\u6784\uff08JEPA\uff09\u6784\u5efa\u4e16\u754c\u6a21\u578b\uff0c\u7ed3\u5408AOD\u9886\u57df\u5148\u9a8c\u77e5\u8bc6\u63d0\u5347\u72b6\u6001\u8868\u5f81\u5b66\u4e60\u6548\u679c"], "keywords": ["\u76ee\u6807\u68c0\u6d4b", "\u65e0\u4eba\u673a", "\u5f3a\u5316\u5b66\u4e60", "\u4e16\u754c\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09078v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Toward Active Object Detection for UAVs in the Wild: A Large-Scale Dataset, Benchmark and Method", "tldr": "\u9996\u4e2a\u5927\u89c4\u6a21\u65e0\u4eba\u673a\u4e3b\u52a8\u76ee\u6807\u68c0\u6d4b\u6570\u636e\u96c6\u53ca\u57fa\u4e8eJEPA\u4e16\u754c\u6a21\u578b\u7684\u65b0\u65b9\u6cd5", "upvotes": 0, "what_it_is": "\u63d0\u51faATRNet-LUDO\u6570\u636e\u96c6\uff0812.1\u4e07\u5f20\u591a\u89c6\u89d2\u822a\u62cd\u56fe\u50cf\uff09\u548c\u65e0\u4eba\u673a\u5730\u9762\u4e3b\u52a8\u76ee\u6807\u68c0\u6d4b\u57fa\u51c6\uff0c\u5e76\u57fa\u4e8eJEPA\u4e16\u754c\u6a21\u578b\u63d0\u51faAOD-JEPA\u65b9\u6cd5\u4ee5\u63d0\u5347\u4e3b\u52a8\u89c2\u6d4b\u7b56\u7565\u7684\u6cdb\u5316\u80fd\u529b\u3002", "why_notable": "\u586b\u8865\u4e86\u65e0\u4eba\u673a\u4e3b\u52a8\u76ee\u6807\u68c0\u6d4b\u9886\u57df\u7f3a\u4e4f\u5927\u89c4\u6a21\u771f\u5b9e\u6570\u636e\u96c6\u7684\u7a7a\u767d\uff0c\u540c\u65f6\u6307\u51fa\u5e76\u5c1d\u8bd5\u89e3\u51b3\u73b0\u6709DRL\u7b56\u7565\u6cdb\u5316\u6027\u5dee\u7684\u6838\u5fc3\u95ee\u9898\uff0c\u5bf9\u65e0\u4eba\u673a\u81ea\u4e3b\u611f\u77e5\u7814\u7a76\u5177\u6709\u91cd\u8981\u63a8\u52a8\u4ef7\u503c\u3002"}, {"abstract": "While multi-agent debate (MAD) frameworks have shown significant potential in general reasoning, their effectiveness in highly structured, knowledge-heavy legal domains remains under-explored. In this work, we introduce the Legal Multi-Agent Debate (L-MAD) framework to systematically evaluate different debate structures and aggregation methods within Legal Textual Entailment. By assigning distinct expert personas to multiple agents, L-MAD improves upon strong single-agent baselines by up to 8\\%. Furthermore, analyzing how debate scales reveals a clear trade-off: increasing the agent population reduces inconsistency and improves accuracy, whereas extending discussion rounds induces a detrimental \\textit{over-deliberation drift} where agents reinforce each other\u0027s mistakes. Ultimately, our findings outline the practical boundaries and safety margins of deploying collaborative multi-agent systems in high-stakes legal reasoning environments.", "arxiv_id": "2607.09099", "arxiv_url": "https://arxiv.org/abs/2607.09099", "authors": ["Tan-Minh Nguyen", "Hoang-Trung Nguyen", "Huu-Dong Nguyen", "Dinh-Truong Do", "Thi-Hai-Yen Vuong", "Le-Minh Nguyen"], "brief": "\u6784\u5efa\u4e86\u6cd5\u5f8b\u591a\u667a\u80fd\u4f53\u8fa9\u8bba\uff08L-MAD\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u4e3a\u591a\u4e2a\u667a\u80fd\u4f53\u5206\u914d\u4e0d\u540c\u6cd5\u5f8b\u4e13\u5bb6\u89d2\u8272\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4e0d\u540c\u8fa9\u8bba\u7ed3\u6784\u548c\u805a\u5408\u65b9\u6cd5\u5728\u6cd5\u5f8b\u6587\u672c\u8574\u542b\u4efb\u52a1\u4e2d\u7684\u8868\u73b0\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09099", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": ["L-MAD\u76f8\u6bd4\u5f3a\u5355\u667a\u80fd\u4f53\u57fa\u7ebf\u6700\u9ad8\u63d0\u53478%\u51c6\u786e\u7387", "\u589e\u52a0\u667a\u80fd\u4f53\u6570\u91cf\u53ef\u964d\u4f4e\u4e0d\u4e00\u81f4\u6027\u5e76\u63d0\u5347\u51c6\u786e\u7387\uff0c\u4f46\u5ef6\u957f\u8fa9\u8bba\u8f6e\u6b21\u4f1a\u5bfc\u81f4\u0027\u8fc7\u5ea6\u5ba1\u8bae\u6f02\u79fb\u0027\u2014\u2014\u667a\u80fd\u4f53\u76f8\u4e92\u5f3a\u5316\u9519\u8bef", "\u7814\u7a76\u660e\u786e\u4e86\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7cfb\u7edf\u5728\u9ad8\u98ce\u9669\u6cd5\u5f8b\u63a8\u7406\u573a\u666f\u4e2d\u7684\u5b9e\u9645\u8fb9\u754c\u4e0e\u5b89\u5168\u4f59\u91cf"], "keywords": ["\u667a\u80fd\u4f53", "\u6cd5\u5f8b\u63a8\u7406", "\u591a\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09099v1", "published_at": "2026-07-10", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "L-MAD: A Systematic Evaluation of Multi-Agent Debate Structures in Legal Reasoning", "tldr": "\u63d0\u51faL-MAD\u6846\u67b6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u591a\u667a\u80fd\u4f53\u8fa9\u8bba\u7ed3\u6784\u5728\u6cd5\u5f8b\u63a8\u7406\u4e2d\u7684\u6548\u679c\u4e0e\u8fb9\u754c", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u6cd5\u5f8b\u591a\u667a\u80fd\u4f53\u8fa9\u8bba\uff08L-MAD\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u4e3a\u591a\u4e2a\u667a\u80fd\u4f53\u5206\u914d\u4e0d\u540c\u6cd5\u5f8b\u4e13\u5bb6\u89d2\u8272\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4e0d\u540c\u8fa9\u8bba\u7ed3\u6784\u548c\u805a\u5408\u65b9\u6cd5\u5728\u6cd5\u5f8b\u6587\u672c\u8574\u542b\u4efb\u52a1\u4e2d\u7684\u8868\u73b0\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793aMAD\u6846\u67b6\u5728\u6cd5\u5f8b\u9886\u57df\u7684\u89c4\u6a21\u5316\u89c4\u5f8b\uff0c\u7279\u522b\u662f\u0027\u8fc7\u5ea6\u5ba1\u8bae\u6f02\u79fb\u0027\u73b0\u8c61\uff0c\u5bf9\u9ad8\u98ce\u9669AI\u5e94\u7528\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b89\u5168\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Current electroencephalography (EEG)-based dream detection relies on power spectral density (PSD) and statistical moment features, achieving a state-of-the-art area under the receiver operating characteristic curve (AUC) of approximately 0.70 on the DREAM database (Wong et al., 2025, Nature Communications). We introduce PHINN-EEG (Persistent Homology Inspired Neural Network for EEG), the first topological time-series framework for dream mentation analysis. Using sliding-window Takens delay embeddings and Vietoris-Rips filtrations on multichannel pre-awakening EEG epochs, we extract Dynamic Betti Curves that characterize the geometric architecture of neural activity, not merely its energy. These topological invariants, combined with topology-conditioned flow matching, are analytically projected to outperform existing PSD and catch22 benchmarks, targeting AUC = 0.82-0.90 on the 1,462-awakening open-access subset of the DREAM database (drawn from a full registry of 3,191 total awakenings from 263 participants across 20 independent laboratories). We further introduce a topology-conditioned rectified flow model for dream-state EEG synthesis-with a spectral-conditioned flow model of comparable feature dimensionality as an additional ablation baseline to isolate the value of topological conditioning specifically-and propose a set of candidate Betti transition archetypes linking topology to phenomenological dream report categories, presented as an exploratory hypothesis space pending empirical validation. If validated, this work represents a paradigm shift from spectral energy to phase-space geometry in neural rare-event detection, with potential future implications for wearable BCI dream monitoring.", "arxiv_id": "2607.09662", "arxiv_url": "https://arxiv.org/abs/2607.09662", "authors": ["Ren Takahashi", "Emre Yusuf", "Jayabrata Bhaduri"], "brief": "\u63d0\u51faPHINN-EEG\u6846\u67b6\uff0c\u5229\u7528\u6ed1\u52a8\u7a97\u53e3Takens\u5ef6\u8fdf\u5d4c\u5165\u548cVietoris-Rips\u6ee4\u6ce2\u4ece\u591a\u901a\u9053EEG\u4e2d\u63d0\u53d6\u52a8\u6001Betti\u66f2\u7ebf\uff0c\u4ee5\u76f8\u7a7a\u95f4\u51e0\u4f55\u62d3\u6251\u7279\u5f81\u66ff\u4ee3\u4f20\u7edf\u529f\u7387\u8c31\u5bc6\u5ea6\u7279\u5f81\u8fdb\u884c\u68a6\u5883\u5185\u5bb9\u5206\u7c7b\uff0c\u5e76\u7ed3\u5408\u62d3\u6251\u6761\u4ef6\u6d41\u5339\u914d\u6a21\u578b\u5b9e\u73b0\u68a6\u5883EEG\u4fe1\u53f7\u5408\u6210\u3002", "categories": ["q-bio.NC", "cs.AI", "cs.LG", "eess.SP", "math.AT"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09662", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u52a8\u6001Betti\u66f2\u7ebf\u4f5c\u4e3a\u795e\u7ecf\u6d3b\u52a8\u7684\u62d3\u6251\u4e0d\u53d8\u91cf\uff0c\u6355\u6349\u76f8\u7a7a\u95f4\u51e0\u4f55\u7ed3\u6784\u800c\u975e\u4ec5\u80fd\u91cf\u4fe1\u606f", "\u76ee\u6807AUC\u8fbe0.82-0.90\uff0c\u663e\u8457\u8d85\u8d8a\u73b0\u6709PSD\u548ccatch22\u57fa\u51c6\uff08\u5f53\u524dSOTA\u7ea60.70\uff09", "\u63d0\u51fa\u62d3\u6251\u6761\u4ef6\u6574\u6d41\u6d41\u6a21\u578b\u7528\u4e8e\u68a6\u5883EEG\u5408\u6210\uff0c\u5e76\u8bbe\u8ba1Betti\u8f6c\u6362\u539f\u578b\u5047\u8bf4\u8fde\u63a5\u62d3\u6251\u7279\u5f81\u4e0e\u68a6\u5883\u73b0\u8c61\u5b66\u7c7b\u522b"], "keywords": ["\u8111\u673a\u63a5\u53e3", "\u62d3\u6251\u6570\u636e\u5206\u6790", "\u65f6\u5e8f\u5206\u6790", "\u795e\u7ecf\u4fe1\u53f7"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09662v1", "published_at": "2026-07-10", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "PHINN-EEG: Topological Time-Series Analysis of Dream-State EEG -- Dynamic Betti Curves for Dream Content Classification and Topology-Conditioned Neural Signal Synthesis", "tldr": "\u9996\u4e2a\u57fa\u4e8e\u6301\u4e45\u540c\u8c03\u7684\u62d3\u6251\u65f6\u5e8f\u6846\u67b6\u7528\u4e8e\u68a6\u5883EEG\u5206\u7c7b\u4e0e\u795e\u7ecf\u4fe1\u53f7\u5408\u6210", "upvotes": 0, "what_it_is": "\u63d0\u51faPHINN-EEG\u6846\u67b6\uff0c\u5229\u7528\u6ed1\u52a8\u7a97\u53e3Takens\u5ef6\u8fdf\u5d4c\u5165\u548cVietoris-Rips\u6ee4\u6ce2\u4ece\u591a\u901a\u9053EEG\u4e2d\u63d0\u53d6\u52a8\u6001Betti\u66f2\u7ebf\uff0c\u4ee5\u76f8\u7a7a\u95f4\u51e0\u4f55\u62d3\u6251\u7279\u5f81\u66ff\u4ee3\u4f20\u7edf\u529f\u7387\u8c31\u5bc6\u5ea6\u7279\u5f81\u8fdb\u884c\u68a6\u5883\u5185\u5bb9\u5206\u7c7b\uff0c\u5e76\u7ed3\u5408\u62d3\u6251\u6761\u4ef6\u6d41\u5339\u914d\u6a21\u578b\u5b9e\u73b0\u68a6\u5883EEG\u4fe1\u53f7\u5408\u6210\u3002", "why_notable": "\u9996\u6b21\u5c06\u4ee3\u6570\u62d3\u6251\uff08\u6301\u4e45\u540c\u8c03\uff09\u5f15\u5165\u68a6\u5883EEG\u5206\u6790\uff0c\u5f00\u521b\u4ece\u9891\u8c31\u80fd\u91cf\u5230\u76f8\u7a7a\u95f4\u51e0\u4f55\u7684\u8303\u5f0f\u8f6c\u53d8\uff0c\u5bf9\u53ef\u7a7f\u6234BCI\u68a6\u5883\u76d1\u6d4b\u5177\u6709\u6f5c\u5728\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Vision language models (VLMs) have made remarkable progress in visual reasoning during the last decade. Most evaluations have used simple scenes (MS-COCO) that do not showcase complex human interactions or behaviors, only a handful of non-curated human descriptions as a benchmark, and have not focused on understanding the model\u0027s error types. Here, we introduce the Complex Social Behavior (CSB) dataset, containing 100 images depicting complex social interactions/behaviors. We analyze the progression of scene descriptions over a decade (2017-2025) of VLMs (four pre-Multimodal Large Language Models, MLLMs, and five MLLMs). We evaluate the accuracy of the models and 20 human descriptions relative to a gold standard on the CSB dataset and on a sample from MS-COCO. We analyzed five visual-cognitive error types: object detection, recognition, hallucination, scene understanding, and spatial dependence. The CSB dataset showed a more pronounced improvement than MS-COCO in scene description accuracy, with pre-MLLMs achieving much lower accuracy than the bottom-ranked human descriptions and MLLMs attaining accuracies similar to the top-ranked human descriptions. We show that MLLMs have eliminated the gap in scene description accuracy between simpler MS-COCO scenes and scenes depicting complex behaviors (CSB). MLLMs have almost eliminated all error types in our tested datasets, except for occasionally relying on different image regions for scene descriptions than humans do (spatial dependence error). We also show that detection, recognition, and hallucination errors have the highest impact on scene description accuracy. Together, our findings provide a more thorough evaluation of how visual language models have advanced over the last decade.", "arxiv_id": "2607.09654", "arxiv_url": "https://arxiv.org/abs/2607.09654", "authors": ["Shravan Murlidaran", "Miguel P. Eckstein"], "brief": "\u7814\u7a76\u8005\u6784\u5efa\u4e86\u5305\u542b100\u5f20\u590d\u6742\u793e\u4ea4\u884c\u4e3a\u56fe\u50cf\u7684CSB\u6570\u636e\u96c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4e862017-2025\u5e74\u95f49\u4e2a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u573a\u666f\u63cf\u8ff0\u80fd\u529b\u53ca\u4e94\u7c7b\u89c6\u89c9\u8ba4\u77e5\u9519\u8bef\u3002\u7ed3\u679c\u663e\u793a\uff0c\u73b0\u4ee3\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5df2\u57fa\u672c\u6d88\u9664\u4e0e\u4eba\u7c7b\u63cf\u8ff0\u7684\u51c6\u786e\u6027\u5dee\u8ddd\uff0c\u5e76\u51e0\u4e4e\u6d88\u9664\u4e86\u6240\u6709\u9519\u8bef\u7c7b\u578b\uff0c\u4ec5\u5728\u7a7a\u95f4\u4f9d\u8d56\u9519\u8bef\u4e0a\u4ecd\u6709\u6b8b\u7559\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09654", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u89c6\u89c9\u63a8\u7406", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09654v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Evolution of Accuracy and Visual-Cognitive Errors in a Decade of Vision-Language AI Models", "tldr": "\u7814\u7a76\u8005\u6784\u5efa\u4e86\u5305\u542b100\u5f20\u590d\u6742\u793e\u4ea4\u884c\u4e3a\u56fe\u50cf\u7684CSB\u6570\u636e\u96c6\uff0c\u7cfb\u7edf\u8bc4\u4f30\u4e862017-2025\u5e74\u95f49\u4e2a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u7684\u573a\u666f\u63cf\u8ff0\u80fd\u529b\u53ca\u4e94\u7c7b\u89c6\u89c9\u8ba4\u77e5\u9519\u8bef\u3002\u7ed3\u679c\u663e\u793a\uff0c\u73b0\u4ee3\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5df2\u57fa\u672c\u6d88\u9664\u4e0e\u4eba\u7c7b\u63cf\u8ff0\u7684\u51c6\u786e\u6027\u5dee\u8ddd\uff0c\u5e76\u51e0\u4e4e\u6d88\u9664\u4e86\u6240\u6709\u9519\u8bef\u7c7b\u578b\uff0c\u4ec5\u5728\u7a7a\u95f4\u4f9d\u8d56\u9519\u8bef\u4e0a\u4ecd\u6709\u6b8b\u7559\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Internet of Things (IoT) systems are inherently vulnerable due to constrained hardware, outdated firmware, and insecure default configurations, creating a need for scalable and adaptive security testing approaches. While recent adoptions of Large Language Model (LLM) agents have demonstrated promise in penetration testing and Capture-the-Flag (CTF) environments, their application to IoT specific vulnerabilities remains unexplored. This paper presents an autonomous multi-agent framework, referred to as Vulnerability EXploitation using AI Agents (VEXAIoT), for vulnerability discovery and exploitation in IoT environments using LLM-based reasoning and offensive security tools. The framework combines a vulnerability detection agent and an attack execution agent to perform reconnaissance, plan attack sequences, and execute exploits against vulnerable IoT services. The system is evaluated in IoTGoat and Metasploitable environments across ten attack scenarios mapped to OWASP IoT vulnerabilities. Experimental results show attack success rate of up to 100% with low token overhead and average execution times under two minutes for most attacks. Across 260 attack executions, VEXAIoT achieves a 95.0% overall success rate, including 94.5% success in IoTGoat and 96.7% success in Metasploitable2. These results demonstrate the potential for LLM-driven agents to automate IoT vulnerability assessment and offensive security workflows in controlled environments", "arxiv_id": "2607.09653", "arxiv_url": "https://arxiv.org/abs/2607.09653", "authors": ["Katherine Swinea", "Kshitiz Aryal", "Lopamudra Praharaj", "Maanak Gupta"], "brief": "\u63d0\u51faVEXAIoT\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5229\u7528\u5927\u8bed\u8a00\u6a21\u578b\u81ea\u52a8\u5316IoT\u8bbe\u5907\u7684\u6f0f\u6d1e\u53d1\u73b0\u4e0e\u5229\u7528\u3002\u5728IoTGoat\u548cMetasploitable\u73af\u5883\u4e2d\u6d4b\u8bd5260\u6b21\u653b\u51fb\uff0c\u6574\u4f53\u6210\u529f\u7387\u8fbe95%\uff0c\u5e73\u5747\u6267\u884c\u65f6\u95f4\u4e0d\u8db3\u4e24\u5206\u949f\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09653", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u7269\u8054\u7f51\u5b89\u5168", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6f0f\u6d1e\u5229\u7528"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09653v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "VEXAIoT: Autonomous IoT Vulnerability EXploitation using AI Agents", "tldr": "\u63d0\u51faVEXAIoT\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u5229\u7528\u5927\u8bed\u8a00\u6a21\u578b\u81ea\u52a8\u5316IoT\u8bbe\u5907\u7684\u6f0f\u6d1e\u53d1\u73b0\u4e0e\u5229\u7528\u3002\u5728IoTGoat\u548cMetasploitable\u73af\u5883\u4e2d\u6d4b\u8bd5260\u6b21\u653b\u51fb\uff0c\u6574\u4f53\u6210\u529f\u7387\u8fbe95%\uff0c\u5e73\u5747\u6267\u884c\u65f6\u95f4\u4e0d\u8db3\u4e24\u5206\u949f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Concept-based explainable artificial intelligence (AI) can make model reasoning more human-understandable, but concept-level outputs are not automatically trustworthy. We introduce ConceptSMILE, a model-agnostic perturbation-based auditing framework for evaluating the reliability of concept-based explanations. Rather than replacing SMILE, ConceptSMILE extends its perturbation-based logic from feature- or region-level attribution to the auditing of human-understandable concept explanations. The framework perturbs input regions, measures concept-response shifts, applies locality weighting, and fits an XGBoost surrogate to approximate local concept behaviour. Reliability is assessed through attribution accuracy, surrogate fidelity, faithfulness, stability, and consistency. We evaluate ConceptSMILE on retinal fundus images by comparing MedSAM-derived visual concepts with VLM-based semantic concepts. Results show that reliability varies across concepts and pathways: MedSAM achieves stronger spatial attribution and the highest surrogate fidelity ($R^2 = 0.8503$, $R_w^2 = 0.8465$), while the VLM pathway shows stronger vessel faithfulness and stronger stability under selected artefact conditions. ConceptSMILE provides an independent audit layer for evaluating the trustworthiness of concept-based XAI.", "arxiv_id": "2607.09649", "arxiv_url": "https://arxiv.org/abs/2607.09649", "authors": ["Mohadeseh Mollapour", "Koorosh Aslansefat", "Zeinab Dehghani", "Bhupesh Kumar Mishra", "Tejal Shah", "Zhibao Mian"], "brief": "\u63d0\u51faConceptSMILE\u6846\u67b6\uff0c\u901a\u8fc7\u6270\u52a8\u8f93\u5165\u533a\u57df\u3001\u6d4b\u91cf\u6982\u5ff5\u54cd\u5e94\u53d8\u5316\u5e76\u62df\u5408\u4ee3\u7406\u6a21\u578b\uff0c\u5bf9\u57fa\u4e8e\u6982\u5ff5\u7684\u53ef\u89e3\u91caAI\u8fdb\u884c\u53ef\u4fe1\u5ea6\u5ba1\u8ba1\u3002\u5728\u89c6\u7f51\u819c\u773c\u5e95\u56fe\u50cf\u4e0a\u5bf9\u6bd4MedSAM\u89c6\u89c9\u6982\u5ff5\u4e0eVLM\u8bed\u4e49\u6982\u5ff5\uff0c\u53d1\u73b0\u4e24\u8005\u5728\u7a7a\u95f4\u5f52\u56e0\u3001\u4ee3\u7406\u4fdd\u771f\u5ea6\u548c\u7a33\u5b9a\u6027\u7b49\u7ef4\u5ea6\u5404\u6709\u4f18\u52a3\uff0c\u4e3a\u6982\u5ff5\u7ea7XAI\u63d0\u4f9b\u72ec\u7acb\u5ba1\u8ba1\u5c42\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09649", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u53ef\u89e3\u91caAI", "\u6982\u5ff5\u89e3\u91ca", "\u6a21\u578b\u5ba1\u8ba1", "\u533b\u5b66\u56fe\u50cf"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09649v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ConceptSMILE: Auditing the Trustworthiness of Concept-Based Explainable AI", "tldr": "\u63d0\u51faConceptSMILE\u6846\u67b6\uff0c\u901a\u8fc7\u6270\u52a8\u8f93\u5165\u533a\u57df\u3001\u6d4b\u91cf\u6982\u5ff5\u54cd\u5e94\u53d8\u5316\u5e76\u62df\u5408\u4ee3\u7406\u6a21\u578b\uff0c\u5bf9\u57fa\u4e8e\u6982\u5ff5\u7684\u53ef\u89e3\u91caAI\u8fdb\u884c\u53ef\u4fe1\u5ea6\u5ba1\u8ba1\u3002\u5728\u89c6\u7f51\u819c\u773c\u5e95\u56fe\u50cf\u4e0a\u5bf9\u6bd4MedSAM\u89c6\u89c9\u6982\u5ff5\u4e0eVLM\u8bed\u4e49\u6982\u5ff5\uff0c\u53d1\u73b0\u4e24\u8005\u5728\u7a7a\u95f4\u5f52\u56e0\u3001\u4ee3\u7406\u4fdd\u771f\u5ea6\u548c\u7a33\u5b9a\u6027\u7b49\u7ef4\u5ea6\u5404\u6709\u4f18\u52a3\uff0c\u4e3a\u6982\u5ff5\u7ea7XAI\u63d0\u4f9b\u72ec\u7acb\u5ba1\u8ba1\u5c42\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Financial anomaly detection suffers from extreme class imbalance, causing traditional single-objective algorithms to exhibit ``fraud collapse\u0027\u0027, defaulting to the majority class and failing to balance anomaly interdiction with customer friction. To overcome this without distortive data resampling, we propose the Semantic Pareto-DQN, a multi-objective reinforcement learning framework. Our approach synthesizes heterogeneous transaction features into cohesive natural-language narratives, encoded by large language models, thereby producing a robust, scale-invariant state representation. The agent optimizes a vectorial reward that explicitly decouples financial efficacy, operational friction, and semantic discovery. By mapping the continuous Pareto frontier, the system dynamically navigates the asymmetric costs of missed anomalies versus false positives. Empirical evaluations across E-Commerce fraud and UCI Credit datasets show that semantic Pareto-DQN successfully shatters the zero-recall trap. It achieves superior minority-class recall compared to scalarized baselines, providing an alternative to trade bounded operational friction for financial anomaly discovery.", "arxiv_id": "2607.09641", "arxiv_url": "https://arxiv.org/abs/2607.09641", "authors": ["Cl\u00e1udio L\u00facio do Val Lopes", "Lucca Machado da Silva"], "brief": "\u9488\u5bf9\u91d1\u878d\u5f02\u5e38\u68c0\u6d4b\u4e2d\u6781\u7aef\u7c7b\u522b\u4e0d\u5e73\u8861\u5bfc\u81f4\u7684\"\u6b3a\u8bc8\u5d29\u6e83\"\u95ee\u9898\uff0c\u63d0\u51faSemantic Pareto-DQN\u6846\u67b6\uff1a\u5c06\u4ea4\u6613\u7279\u5f81\u8f6c\u5316\u4e3a\u81ea\u7136\u8bed\u8a00\u53d9\u8ff0\u5e76\u7528\u5927\u8bed\u8a00\u6a21\u578b\u7f16\u7801\u4e3a\u72b6\u6001\u8868\u793a\uff0c\u901a\u8fc7\u591a\u76ee\u6807\u5f3a\u5316\u5b66\u4e60\u5728Pareto\u524d\u6cbf\u4e0a\u52a8\u6001\u5e73\u8861\u6f0f\u68c0\u4e0e\u8bef\u62a5\u4ee3\u4ef7\u3002\u5728\u7535\u5546\u6b3a\u8bc8\u548cUCI\u4fe1\u7528\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\uff0c\u6210\u529f\u7a81\u7834\u96f6\u53ec\u56de\u9677\u9631\uff0c\u663e\u8457\u63d0\u5347\u5c11\u6570\u7c7b\u53ec\u56de\u7387\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09641", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u91d1\u878d\u5f02\u5e38\u68c0\u6d4b", "\u591a\u76ee\u6807\u4f18\u5316", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09641v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Semantic Pareto-DQN: A Multi-Objective Reinforcement Learning Framework for Financial Anomaly Detection", "tldr": "\u9488\u5bf9\u91d1\u878d\u5f02\u5e38\u68c0\u6d4b\u4e2d\u6781\u7aef\u7c7b\u522b\u4e0d\u5e73\u8861\u5bfc\u81f4\u7684\"\u6b3a\u8bc8\u5d29\u6e83\"\u95ee\u9898\uff0c\u63d0\u51faSemantic Pareto-DQN\u6846\u67b6\uff1a\u5c06\u4ea4\u6613\u7279\u5f81\u8f6c\u5316\u4e3a\u81ea\u7136\u8bed\u8a00\u53d9\u8ff0\u5e76\u7528\u5927\u8bed\u8a00\u6a21\u578b\u7f16\u7801\u4e3a\u72b6\u6001\u8868\u793a\uff0c\u901a\u8fc7\u591a\u76ee\u6807\u5f3a\u5316\u5b66\u4e60\u5728Pareto\u524d\u6cbf\u4e0a\u52a8\u6001\u5e73\u8861\u6f0f\u68c0\u4e0e\u8bef\u62a5\u4ee3\u4ef7\u3002\u5728\u7535\u5546\u6b3a\u8bc8\u548cUCI\u4fe1\u7528\u6570\u636e\u96c6\u4e0a\u9a8c\u8bc1\uff0c\u6210\u529f\u7a81\u7834\u96f6\u53ec\u56de\u9677\u9631\uff0c\u663e\u8457\u63d0\u5347\u5c11\u6570\u7c7b\u53ec\u56de\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reliable autonomous driving requires full-scene perception that couples foreground objects with dense semantic layout. Recently, 4D millimeter-wave radar has emerged as a robust and affordable sensor, yet its sparse returns make radar-camera fusion necessary for comprehensive scene understanding. Existing radar-camera methods mainly optimize detection, while dual-task systems usually decode boxes and occupancy with limited interaction. To address this gap and advance radar-based multi-task learning, we propose \\method, a 4D radar-camera framework for 360$^\\circ$ full-scene perception, which models semantic occupancy as a persistent scene state rather than a terminal output. \\method{} follows a cross-modal state reasoning paradigm, where the occupancy state is modeled and propagated through stages for coarse-to-fine feature aggregation. Specifically, State-guided BEV Enhancement (SBE) strengthens intra-frame BEV representation, while Doppler-guided Temporal Fusion (DTF) preserves state evidence over longer temporal horizons. Beyond the model, we further extend ManTruckScenes with satellite-map-based generated occupancy labels and pair it with OmniHD-Scenes in a unified cross-dataset detection-and-occupancy protocol. The resulting experiments cover accuracy, robustness, ablation, and efficiency under one radar-camera multi-task evaluation framework. Code and labels will be released upon acceptance.", "arxiv_id": "2607.09629", "arxiv_url": "https://arxiv.org/abs/2607.09629", "authors": ["Xiaokai Bai", "Lianqing Zheng", "Runwei Guan", "Songkai Wang", "Siyuan Cao", "Hui-liang Shen"], "brief": "\u63d0\u51fa4DR360\u6846\u67b6\uff0c\u5c06\u8bed\u4e49\u5360\u7528\u5efa\u6a21\u4e3a\u6301\u4e45\u573a\u666f\u72b6\u6001\u800c\u975e\u7ec8\u7aef\u8f93\u51fa\uff0c\u901a\u8fc7\u8de8\u6a21\u6001\u72b6\u6001\u63a8\u7406\u8303\u5f0f\u5b9e\u73b04D\u6beb\u7c73\u6ce2\u96f7\u8fbe\u4e0e\u76f8\u673a\u7684360\u00b0\u5168\u573a\u666f\u611f\u77e5\uff0c\u540c\u65f6\u5b8c\u62103D\u76ee\u6807\u68c0\u6d4b\u4e0e\u5360\u7528\u9884\u6d4b\u53cc\u4efb\u52a1\u3002\u5f15\u5165\u72b6\u6001\u5f15\u5bfcBEV\u589e\u5f3a\u548c\u591a\u666e\u52d2\u5f15\u5bfc\u65f6\u5e8f\u878d\u5408\u6a21\u5757\uff0c\u5e76\u6269\u5c55\u4e86\u5e26\u5360\u7528\u6807\u7b7e\u7684\u6570\u636e\u96c6\uff0c\u5728\u7edf\u4e00\u8bc4\u6d4b\u534f\u8bae\u4e0b\u9a8c\u8bc1\u4e86\u7cbe\u5ea6\u4e0e\u6548\u7387\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09629", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u81ea\u52a8\u9a7e\u9a76", "\u591a\u6a21\u6001", "3D\u76ee\u6807\u68c0\u6d4b", "\u573a\u666f\u611f\u77e5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09629v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "4DR360: State Reasoning for Joint 3D Detection and Occupancy Prediction in 4D Radar-Camera Full-Scene Perception", "tldr": "\u63d0\u51fa4DR360\u6846\u67b6\uff0c\u5c06\u8bed\u4e49\u5360\u7528\u5efa\u6a21\u4e3a\u6301\u4e45\u573a\u666f\u72b6\u6001\u800c\u975e\u7ec8\u7aef\u8f93\u51fa\uff0c\u901a\u8fc7\u8de8\u6a21\u6001\u72b6\u6001\u63a8\u7406\u8303\u5f0f\u5b9e\u73b04D\u6beb\u7c73\u6ce2\u96f7\u8fbe\u4e0e\u76f8\u673a\u7684360\u00b0\u5168\u573a\u666f\u611f\u77e5\uff0c\u540c\u65f6\u5b8c\u62103D\u76ee\u6807\u68c0\u6d4b\u4e0e\u5360\u7528\u9884\u6d4b\u53cc\u4efb\u52a1\u3002\u5f15\u5165\u72b6\u6001\u5f15\u5bfcBEV\u589e\u5f3a\u548c\u591a\u666e\u52d2\u5f15\u5bfc\u65f6\u5e8f\u878d\u5408\u6a21\u5757\uff0c\u5e76\u6269\u5c55\u4e86\u5e26\u5360\u7528\u6807\u7b7e\u7684\u6570\u636e\u96c6\uff0c\u5728\u7edf\u4e00\u8bc4\u6d4b\u534f\u8bae\u4e0b\u9a8c\u8bc1\u4e86\u7cbe\u5ea6\u4e0e\u6548\u7387\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present our submission to the QANTA 2026 shared challenge at the ICML 2026 Workshop on Efficient Multimodal Question Answering (EMM-QA). Quanta evaluates multimodal quizbowl systems that answer pyramid-style questions from incrementally revealed text and accompanying images while operating under realistic efficiency constraints. The challenge consists of two distinct tasks: Tossup questions, which require deciding when to answer under uncertainty, and Bonus questions, which emphasize accurate answer selection and human adoption. To address these differing objectives, we develop a task-specific two-agent architecture. Our Tossup agent utilizes a GPT-4o-mini-class model (referred to as GPT-4.1-mini in the competition logs) with confidence-calibrated answering and a domain-specific numeric reasoning policy that reduces overconfident predictions from isolated quantitative clues. Our Bonus agent uses GPT-4o-class model (referred to as GPT-4.1) with leadin-aware reasoning, structured relational reasoning, and multimodal evidence integration to improve exact answer selection. Rather than relying on a retrieval pipeline or model ensembles, our approach emphasizes efficient reasoning policies and confidence calibration within a hosted-only environment. Our system achieved the highest overall leaderboard score of 0.402, including a Tossup score of 0.238 and a Bonus Effect score of 0.164. The results demonstrate that lightweight, task-specific reasoning strategies can provide strong performance on resource-constrained multimodal question answering benchmarks.", "arxiv_id": "2607.09623", "arxiv_url": "https://arxiv.org/abs/2607.09623", "authors": ["Nirjhar Das", "Md. Al-Mamun Provath"], "brief": "\u9488\u5bf9QANTA 2026\u591a\u6a21\u6001\u95ee\u7b54\u6311\u6218\uff0c\u63d0\u51fa\u53cc\u667a\u80fd\u4f53\u67b6\u6784\uff1aTossup\u667a\u80fd\u4f53\u4f7f\u7528GPT-4.1-mini\u7ed3\u5408\u7f6e\u4fe1\u5ea6\u6821\u51c6\u548c\u9886\u57df\u6570\u503c\u63a8\u7406\u7b56\u7565\uff0cBonus\u667a\u80fd\u4f53\u4f7f\u7528GPT-4.1\u7ed3\u5408\u7ed3\u6784\u5316\u5173\u7cfb\u63a8\u7406\u548c\u591a\u6a21\u6001\u8bc1\u636e\u878d\u5408\u3002\u65e0\u9700\u68c0\u7d22\u7ba1\u9053\u6216\u6a21\u578b\u96c6\u6210\uff0c\u7cfb\u7edf\u4ee5\u8f7b\u91cf\u7ea7\u4efb\u52a1\u7279\u5b9a\u63a8\u7406\u7b56\u7565\u53d6\u5f97\u6392\u884c\u699c\u6700\u9ad8\u52060.402\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09623", "impact_score": 5, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001\u95ee\u7b54", "\u7f6e\u4fe1\u5ea6\u6821\u51c6", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09623v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Task-Specific Multimodal Question Answering Agents via Confidence Calibration and Incremental Reasoning for QANTA 2026", "tldr": "\u9488\u5bf9QANTA 2026\u591a\u6a21\u6001\u95ee\u7b54\u6311\u6218\uff0c\u63d0\u51fa\u53cc\u667a\u80fd\u4f53\u67b6\u6784\uff1aTossup\u667a\u80fd\u4f53\u4f7f\u7528GPT-4.1-mini\u7ed3\u5408\u7f6e\u4fe1\u5ea6\u6821\u51c6\u548c\u9886\u57df\u6570\u503c\u63a8\u7406\u7b56\u7565\uff0cBonus\u667a\u80fd\u4f53\u4f7f\u7528GPT-4.1\u7ed3\u5408\u7ed3\u6784\u5316\u5173\u7cfb\u63a8\u7406\u548c\u591a\u6a21\u6001\u8bc1\u636e\u878d\u5408\u3002\u65e0\u9700\u68c0\u7d22\u7ba1\u9053\u6216\u6a21\u578b\u96c6\u6210\uff0c\u7cfb\u7edf\u4ee5\u8f7b\u91cf\u7ea7\u4efb\u52a1\u7279\u5b9a\u63a8\u7406\u7b56\u7565\u53d6\u5f97\u6392\u884c\u699c\u6700\u9ad8\u52060.402\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Precision industrial contact manipulation requires reliable robot policies under pose perturbations and contact-force constraints. Vision-language-action models offer broad generalization but often introduce high inference latency and GPU-memory cost, while vision-action chunking policies are more suitable for real-time industrial control. However, these policies are usually trained by behavior cloning and suffer from distribution shift in contact-rich tasks. This paper proposes PAC-ACT, a reinforcement-learning post-training framework for pretrained Action Chunking Transformer policies. PAC-ACT reformulates policy optimization at the chunk level, constructs an ACT-transferred actor-critic architecture, and introduces a hybrid behavior-prior constraint to preserve the pretrained action distribution during online fine-tuning. Experiments on industrial precision-contact benchmarks show that PAC-ACT improves task success, contact stability, and force safety while retaining low latency and low GPU-memory usage. On the Contour task, PAC-ACT significantly reduces peak contact force and decreases the proportion of force readings above 60 N by 46 times. Sparse-reward ablations further show that the proposed behavior-prior constraint enables effective exploration under randomized initial poses.", "arxiv_id": "2607.09590", "arxiv_url": "https://arxiv.org/abs/2607.09590", "authors": ["Yujie Pang", "Zudong Li"], "brief": "\u63d0\u51faPAC-ACT\u6846\u67b6\uff0c\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u5bf9\u9884\u8bad\u7ec3\u7684\u52a8\u4f5c\u5206\u5757Transformer\u7b56\u7565\u8fdb\u884c\u540e\u8bad\u7ec3\u5fae\u8c03\uff0c\u89e3\u51b3\u63a5\u89e6\u4e30\u5bcc\u4efb\u52a1\u4e2d\u7684\u5206\u5e03\u504f\u79fb\u95ee\u9898\u3002\u5728\u5de5\u4e1a\u7cbe\u5bc6\u63a5\u89e6\u64cd\u4f5c\u57fa\u51c6\u4e0a\uff0c\u663e\u8457\u63d0\u5347\u4efb\u52a1\u6210\u529f\u7387\u548c\u63a5\u89e6\u7a33\u5b9a\u6027\uff0c\u5cf0\u503c\u63a5\u89e6\u529b\u5927\u5e45\u964d\u4f4e\uff0c\u8d85\u8fc760N\u7684\u529b\u8bfb\u6570\u6bd4\u4f8b\u51cf\u5c1146\u500d\uff0c\u540c\u65f6\u4fdd\u6301\u4f4e\u5ef6\u8fdf\u548c\u4f4e\u663e\u5b58\u5360\u7528\u3002", "categories": ["cs.RO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09590", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u673a\u5668\u4eba\u64cd\u4f5c", "\u884c\u4e3a\u514b\u9686", "\u5de5\u4e1a\u63a7\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09590v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "PAC-ACT: Post-training Actor-Critic for Action Chunking Transformers", "tldr": "\u63d0\u51faPAC-ACT\u6846\u67b6\uff0c\u901a\u8fc7\u5f3a\u5316\u5b66\u4e60\u5bf9\u9884\u8bad\u7ec3\u7684\u52a8\u4f5c\u5206\u5757Transformer\u7b56\u7565\u8fdb\u884c\u540e\u8bad\u7ec3\u5fae\u8c03\uff0c\u89e3\u51b3\u63a5\u89e6\u4e30\u5bcc\u4efb\u52a1\u4e2d\u7684\u5206\u5e03\u504f\u79fb\u95ee\u9898\u3002\u5728\u5de5\u4e1a\u7cbe\u5bc6\u63a5\u89e6\u64cd\u4f5c\u57fa\u51c6\u4e0a\uff0c\u663e\u8457\u63d0\u5347\u4efb\u52a1\u6210\u529f\u7387\u548c\u63a5\u89e6\u7a33\u5b9a\u6027\uff0c\u5cf0\u503c\u63a5\u89e6\u529b\u5927\u5e45\u964d\u4f4e\uff0c\u8d85\u8fc760N\u7684\u529b\u8bfb\u6570\u6bd4\u4f8b\u51cf\u5c1146\u500d\uff0c\u540c\u65f6\u4fdd\u6301\u4f4e\u5ef6\u8fdf\u548c\u4f4e\u663e\u5b58\u5360\u7528\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Pre-demolition assessment, the regulated audit process at the heart of urban mining, is an information process in which AI support must serve qualified auditors who remain accountable for the decisions taken. The relevant unit of value is not prediction accuracy alone, but the defensibility of the supported decisions: their legibility, plausibility, sourcing, and contestability. Explainable AI techniques and domain knowledge graphs each address parts of this requirement, and existing taxonomies have catalogued their integration. The literature is descriptively rich but structurally under-specified: what remains less developed is a structural account of why specific integrations produce artefacts neither resource can provide alone. This paper offers a complementarity-theoretic interpretation grounded in the IS resource-based tradition. We propose four consolidated KG-XAI integration modes (Lifting, Constraining, Typing, and Revising), each defined as a typed operation over XAI artefacts and knowledge-graph substrate structures. Each mode unlocks a distinct property of defensibility and contributes to the kind of regulatory artefact pre-demolition assessment demands. A fire-door example from the urban-mining process illustrates the modes using the W3C Linked Building Data stack and valuation extensions.", "arxiv_id": "2607.09578", "arxiv_url": "https://arxiv.org/abs/2607.09578", "authors": ["Jan Gronewald", "Andreas Emrich", "Nijat Mehdiyev"], "brief": "\u672c\u6587\u9488\u5bf9\u57ce\u5e02\u91c7\u77ff\u4e2d\u7684\u62c6\u524d\u8bc4\u4f30\u6d41\u7a0b\uff0c\u63d0\u51fa\u77e5\u8bc6\u56fe\u8c31\u4e0e\u53ef\u89e3\u91caAI\u7684\u4e92\u8865\u6027\u7406\u8bba\u6846\u67b6\uff0c\u5b9a\u4e49\u4e86\u56db\u79cd\u96c6\u6210\u6a21\u5f0f\uff08\u63d0\u5347\u3001\u7ea6\u675f\u3001\u7c7b\u578b\u5316\u3001\u4fee\u8ba2\uff09\uff0c\u6bcf\u79cd\u6a21\u5f0f\u80fd\u4ea7\u751f\u5355\u4e00\u8d44\u6e90\u65e0\u6cd5\u72ec\u7acb\u751f\u6210\u7684\u53ef\u8fa9\u62a4\u6027\u51b3\u7b56\u5236\u54c1\uff0c\u5e76\u4ee5\u9632\u706b\u95e8\u6848\u4f8b\u52a0\u4ee5\u9a8c\u8bc1\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09578", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u77e5\u8bc6\u56fe\u8c31", "\u53ef\u89e3\u91caAI", "\u57ce\u5e02\u91c7\u77ff", "\u51b3\u7b56\u652f\u6301"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09578v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Knowledge Graphs and Explainable AI as Complementary Resources for Urban Mining", "tldr": "\u672c\u6587\u9488\u5bf9\u57ce\u5e02\u91c7\u77ff\u4e2d\u7684\u62c6\u524d\u8bc4\u4f30\u6d41\u7a0b\uff0c\u63d0\u51fa\u77e5\u8bc6\u56fe\u8c31\u4e0e\u53ef\u89e3\u91caAI\u7684\u4e92\u8865\u6027\u7406\u8bba\u6846\u67b6\uff0c\u5b9a\u4e49\u4e86\u56db\u79cd\u96c6\u6210\u6a21\u5f0f\uff08\u63d0\u5347\u3001\u7ea6\u675f\u3001\u7c7b\u578b\u5316\u3001\u4fee\u8ba2\uff09\uff0c\u6bcf\u79cd\u6a21\u5f0f\u80fd\u4ea7\u751f\u5355\u4e00\u8d44\u6e90\u65e0\u6cd5\u72ec\u7acb\u751f\u6210\u7684\u53ef\u8fa9\u62a4\u6027\u51b3\u7b56\u5236\u54c1\uff0c\u5e76\u4ee5\u9632\u706b\u95e8\u6848\u4f8b\u52a0\u4ee5\u9a8c\u8bc1\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present an interpretable network-based framework for representing idiomatic and figurative meaning across eight typologically diverse languages, totaling 160 conventional expressions, the large majority of which are idiomatic. Each expression is annotated with binary conceptual features (containment, concealment, emotional, social, etc.) derived from cognitive-linguistic theory, and pairwise Jaccard similarities define a weighted graph. Community detection reveals that idioms cluster by conceptual schema rather than by language, producing a structure consistent with cognitive-linguistic predictions. The conceptual network captures unique semantic information not present in distributional embeddings, can be scaled via automatic annotation with LLMs, improves downstream idiom detection, and remains robust when enriched with corpus frequencies. Cross-lingual transfer experiments show that conceptual proximity alone can identify acceptable translation equivalents across five language families, with substantial gains over embedding-based baselines. Ablation studies demonstrate that all three feature dimensions -- schemas, roles, and valence -- contribute non-redundantly to both the network\u0027s organizational properties and its performance on idiom detection, and that specific graph-derived signals (community membership, neighbor similarity) are particularly informative. The framework offers an interpretable, cross-linguistically stable representation of idiomatic meaning, combining theoretical grounding with practical utility.", "arxiv_id": "2607.09576", "arxiv_url": "https://arxiv.org/abs/2607.09576", "authors": ["Kiran Pala", "Punam Silu", "Lixun Yu"], "brief": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u6982\u5ff5\u7279\u5f81\u56fe\u7684\u8de8\u8bed\u8a00\u4e60\u8bed\u8868\u793a\u6846\u67b6\uff0c\u5bf98\u79cd\u8bed\u8a00\u5171160\u4e2a\u4e60\u8bed\u8fdb\u884c\u4e8c\u5143\u6982\u5ff5\u7279\u5f81\u6807\u6ce8\u5e76\u6784\u5efa\u52a0\u6743\u56fe\u7f51\u7edc\u3002\u5b9e\u9a8c\u8868\u660e\u4e60\u8bed\u6309\u6982\u5ff5\u56fe\u5f0f\u800c\u975e\u8bed\u8a00\u805a\u7c7b\uff0c\u8be5\u6846\u67b6\u5728\u8de8\u8bed\u8a00\u7ffb\u8bd1\u7b49\u4ef7\u8bc6\u522b\u548c\u4e60\u8bed\u68c0\u6d4b\u4efb\u52a1\u4e0a\u663e\u8457\u4f18\u4e8e\u57fa\u4e8e\u5d4c\u5165\u7684\u57fa\u7ebf\u65b9\u6cd5\u3002", "categories": ["cs.CL", "cs.AI", "cs.ET"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09576", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8de8\u8bed\u8a00", "\u4e60\u8bed\u7406\u89e3", "\u77e5\u8bc6\u56fe\u8c31", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09576v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Conceptual Networks for Cross-Linguistic Idiomatic Expressions:A Feature-Based Graph Approach", "tldr": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8e\u6982\u5ff5\u7279\u5f81\u56fe\u7684\u8de8\u8bed\u8a00\u4e60\u8bed\u8868\u793a\u6846\u67b6\uff0c\u5bf98\u79cd\u8bed\u8a00\u5171160\u4e2a\u4e60\u8bed\u8fdb\u884c\u4e8c\u5143\u6982\u5ff5\u7279\u5f81\u6807\u6ce8\u5e76\u6784\u5efa\u52a0\u6743\u56fe\u7f51\u7edc\u3002\u5b9e\u9a8c\u8868\u660e\u4e60\u8bed\u6309\u6982\u5ff5\u56fe\u5f0f\u800c\u975e\u8bed\u8a00\u805a\u7c7b\uff0c\u8be5\u6846\u67b6\u5728\u8de8\u8bed\u8a00\u7ffb\u8bd1\u7b49\u4ef7\u8bc6\u522b\u548c\u4e60\u8bed\u68c0\u6d4b\u4efb\u52a1\u4e0a\u663e\u8457\u4f18\u4e8e\u57fa\u4e8e\u5d4c\u5165\u7684\u57fa\u7ebf\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Decision-making is posing an increasingly formidable challenge to investors because of the growing number of alternatives available in financial markets. A hot area of research over the past few decades has been portfolio optimization that seeks to determine how much an investor should invest in which asset. Introducing real-world conditions to the optimization model turns the problem into an NP-hard one for whose solution exact methods become inefficient; hence, researchers have turned to evolutionary algorithms to approximate solutions. In this paper, strengthening strategies are presented for multi-objective evolutionary algorithms that can provide a faster convergence rate and extensive search ability in the portfolio optimization problem under the cardinality constraint. To implement those features, a unique solution representation, a novel operator, and new repair mechanisms are introduced for solving the aforementioned problem in which lower and upper limits are set on the number of assets in the portfolio. For this purpose, new mating strategies along with the aforesaid package are implemented in well-known multi-objective evolutionary algorithms to solve the problem. The customized algorithms are subsequently tested against traditional ones using well-known market indices as benchmarks. Results indicate that the proposed strategy not only provides better approximations but also converges faster as well at no loss of performance with an increasing number of assets in the market.", "arxiv_id": "2607.09566", "arxiv_url": "https://arxiv.org/abs/2607.09566", "authors": ["Danial Ramezani", "Mostafa Abouei Ardakan"], "brief": "\u9488\u5bf9\u5e26\u57fa\u6570\u7ea6\u675f\u7684\u5927\u89c4\u6a21\u6295\u8d44\u7ec4\u5408\u4f18\u5316\u95ee\u9898\uff08NP\u96be\uff09\uff0c\u63d0\u51fa\u4e86\u589e\u5f3a\u578b\u591a\u76ee\u6807\u8fdb\u5316\u7b97\u6cd5\uff0c\u5f15\u5165\u72ec\u7279\u89e3\u8868\u793a\u3001\u65b0\u7b97\u5b50\u548c\u4fee\u590d\u673a\u5236\uff0c\u5b9e\u9a8c\u8868\u660e\u5728\u591a\u4e2a\u5e02\u573a\u6307\u6570\u57fa\u51c6\u4e0a\u6536\u655b\u66f4\u5feb\u3001\u8fd1\u4f3c\u8d28\u91cf\u66f4\u4f18\u3002", "categories": ["cs.CE", "cs.AI", "math.OC", "q-fin.PM", "q-fin.RM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09566", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6295\u8d44\u7ec4\u5408\u4f18\u5316", "\u591a\u76ee\u6807\u8fdb\u5316\u7b97\u6cd5", "\u57fa\u6570\u7ea6\u675f", "\u91d1\u878d\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09566v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Large-Scale Portfolio Optimization Problem Under Cardinality Constraint With Enhanced Multi-Objective Evolutionary Algorithms", "tldr": "\u9488\u5bf9\u5e26\u57fa\u6570\u7ea6\u675f\u7684\u5927\u89c4\u6a21\u6295\u8d44\u7ec4\u5408\u4f18\u5316\u95ee\u9898\uff08NP\u96be\uff09\uff0c\u63d0\u51fa\u4e86\u589e\u5f3a\u578b\u591a\u76ee\u6807\u8fdb\u5316\u7b97\u6cd5\uff0c\u5f15\u5165\u72ec\u7279\u89e3\u8868\u793a\u3001\u65b0\u7b97\u5b50\u548c\u4fee\u590d\u673a\u5236\uff0c\u5b9e\u9a8c\u8868\u660e\u5728\u591a\u4e2a\u5e02\u573a\u6307\u6570\u57fa\u51c6\u4e0a\u6536\u655b\u66f4\u5feb\u3001\u8fd1\u4f3c\u8d28\u91cf\u66f4\u4f18\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Medical Vision-Language Models (VLMs) exhibit strong zero-shot performance, yet their effectiveness still declines on out-of-distribution (OOD) data due to domain shifts and class bias inherited from large-scale pretraining. Existing few-shot adaptation methods typically introduce additional trainable components, which can be unstable in extremely low-data regimes (e.g., 1-shot), and lack robustness on different medical data. We present TCLA, a purely training-free few-shot adaptation method for Medical VLMs, which is fast and model-agnostic. TCLA corrects inference logits based on a small set of support samples, boosting pretrained VLMs performance by improving inter-class deconfusion and reducing domain shift. Extensive experiments on nine datasets across multiple medical imaging modalities including X-ray, Ultrasound, MRI, CT, Histopathology, demonstrate that TCLA consistently improves OOD performance of Medical VLMs and, in most of cases, outperforms existing training-based adaptation methods.", "arxiv_id": "2607.09562", "arxiv_url": "https://arxiv.org/abs/2607.09562", "authors": ["Tianyou Jiang", "Ziyu Zhou"], "brief": "\u63d0\u51faTCLA\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u533b\u5b66\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5c11\u6837\u672c\u9002\u914d\u65b9\u6cd5\uff0c\u901a\u8fc7\u57fa\u4e8e\u5c11\u91cf\u652f\u6301\u6837\u672c\u6821\u6b63\u63a8\u7406logits\u6765\u7f13\u89e3\u7c7b\u522b\u504f\u5dee\u548c\u57df\u504f\u79fb\u3002\u57289\u4e2a\u533b\u5b66\u5f71\u50cf\u6570\u636e\u96c6\uff08X\u5149\u3001\u8d85\u58f0\u3001MRI\u3001CT\u3001\u75c5\u7406\u7b49\uff09\u4e0a\u9a8c\u8bc1\uff0c\u591a\u6570\u60c5\u51b5\u4e0b\u8d85\u8d8a\u73b0\u6709\u9700\u8bad\u7ec3\u7684\u9002\u914d\u65b9\u6cd5\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09562", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u5f71\u50cf", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5c11\u6837\u672c\u9002\u914d", "\u96f6\u6837\u672c\u8fc1\u79fb"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09562v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "TCLA: Training-Free Class-wise Logit Adaptation for Medical Vision-Language Models", "tldr": "\u63d0\u51faTCLA\uff0c\u4e00\u79cd\u65e0\u9700\u8bad\u7ec3\u7684\u533b\u5b66\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u5c11\u6837\u672c\u9002\u914d\u65b9\u6cd5\uff0c\u901a\u8fc7\u57fa\u4e8e\u5c11\u91cf\u652f\u6301\u6837\u672c\u6821\u6b63\u63a8\u7406logits\u6765\u7f13\u89e3\u7c7b\u522b\u504f\u5dee\u548c\u57df\u504f\u79fb\u3002\u57289\u4e2a\u533b\u5b66\u5f71\u50cf\u6570\u636e\u96c6\uff08X\u5149\u3001\u8d85\u58f0\u3001MRI\u3001CT\u3001\u75c5\u7406\u7b49\uff09\u4e0a\u9a8c\u8bc1\uff0c\u591a\u6570\u60c5\u51b5\u4e0b\u8d85\u8d8a\u73b0\u6709\u9700\u8bad\u7ec3\u7684\u9002\u914d\u65b9\u6cd5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Foundation models are reshaping computational pathology, yet their capabilities remain shaped by pretraining objectives, data sources, and spatial scales, fragmenting complementary expertise across separate backbones. Here we present ALICE, a unified foundation model trained through multi-stage agglomerative distillation that sequentially distills eight vision-only, vision-language, and slide-level teacher models into dedicated modules of a single backbone. ALICE is pretrained on 24,985,184 tile-level pathology images and 155,604 high-resolution images, and evaluated across 21 task scenarios, 96 downstream tasks, and 48 data sources, spanning region-of-interest tissue analysis, vision-language multimodal evaluation, and whole-slide clinical assessment. In all three evaluation settings, ALICE achieved the best average rank among task-matched pathology foundation models. These results demonstrate that agglomerative distillation can consolidate complementary capabilities from specialized models into a unified backbone for broad computational pathology applications. The model is available at https://github.com/WonderLandxD/ALICE.", "arxiv_id": "2607.09526", "arxiv_url": "https://arxiv.org/abs/2607.09526", "authors": ["Jiawen Li", "Tian Guan", "Huijuan Shi", "Xitong Ling", "Mingxi Fu", "Anjia Han", "Chao He", "Yonghong He"], "brief": "ALICE\u662f\u4e00\u4e2a\u7edf\u4e00\u7684\u75c5\u7406\u5b66\u57fa\u7840\u6a21\u578b\uff0c\u901a\u8fc7\u591a\u9636\u6bb5\u805a\u5408\u84b8\u998f\u5c068\u4e2a\u89c6\u89c9\u3001\u89c6\u89c9\u8bed\u8a00\u548c\u5207\u7247\u7ea7\u6559\u5e08\u6a21\u578b\u7684\u77e5\u8bc6\u6574\u5408\u5230\u5355\u4e00\u9aa8\u5e72\u7f51\u7edc\u4e2d\u3002\u57282400\u4e07\u5f20\u75c5\u7406\u56fe\u50cf\u4e0a\u9884\u8bad\u7ec3\uff0c\u8986\u76d621\u4e2a\u4efb\u52a1\u573a\u666f\u300196\u4e2a\u4e0b\u6e38\u4efb\u52a1\uff0c\u5728\u6240\u6709\u4e09\u7c7b\u8bc4\u4f30\u8bbe\u7f6e\u4e2d\u5747\u53d6\u5f97\u6700\u4f73\u5e73\u5747\u6392\u540d\uff0c\u8bc1\u660e\u805a\u5408\u84b8\u998f\u80fd\u6709\u6548\u6574\u5408\u4e92\u8865\u80fd\u529b\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09526", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u75c5\u7406\u5b66\u57fa\u7840\u6a21\u578b", "\u77e5\u8bc6\u84b8\u998f", "\u591a\u6a21\u6001", "\u8ba1\u7b97\u75c5\u7406\u5b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09526v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ALICE: Learning a General-Purpose Pathology Foundation Model from Vision, Vision-Language, and Slide-Level Experts", "tldr": "ALICE\u662f\u4e00\u4e2a\u7edf\u4e00\u7684\u75c5\u7406\u5b66\u57fa\u7840\u6a21\u578b\uff0c\u901a\u8fc7\u591a\u9636\u6bb5\u805a\u5408\u84b8\u998f\u5c068\u4e2a\u89c6\u89c9\u3001\u89c6\u89c9\u8bed\u8a00\u548c\u5207\u7247\u7ea7\u6559\u5e08\u6a21\u578b\u7684\u77e5\u8bc6\u6574\u5408\u5230\u5355\u4e00\u9aa8\u5e72\u7f51\u7edc\u4e2d\u3002\u57282400\u4e07\u5f20\u75c5\u7406\u56fe\u50cf\u4e0a\u9884\u8bad\u7ec3\uff0c\u8986\u76d621\u4e2a\u4efb\u52a1\u573a\u666f\u300196\u4e2a\u4e0b\u6e38\u4efb\u52a1\uff0c\u5728\u6240\u6709\u4e09\u7c7b\u8bc4\u4f30\u8bbe\u7f6e\u4e2d\u5747\u53d6\u5f97\u6700\u4f73\u5e73\u5747\u6392\u540d\uff0c\u8bc1\u660e\u805a\u5408\u84b8\u998f\u80fd\u6709\u6548\u6574\u5408\u4e92\u8865\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Does every cancer patient truly need a complete diagnostic workup for accurate survival prediction? In multimodal clinical oncology, diagnostic modalities follow a clinically mandated order of escalating burden -- from demographics collected at intake to genomic profiling requiring specialized tissue analysis. Current multimodal survival methods either assume all modalities are available or passively handle missing data, but none actively reason about whether acquiring the next modality is justified for a given patient along this ordered workflow. We formulate this as a sequential decision problem and propose SAGEAgent (Sequential Acquisition Guided by Experience), a self-evolving LLM-based clinical agent that decides which diagnostic modalities to acquire for each patient, balancing predictive accuracy against clinical invasiveness. SAGEAgent reasons about each patient\u0027s evolving diagnostic state through clinical tools that translate numerical predictions into text, an episodic memory that retrieves similar past cases, and a semantic memory that accumulates reusable decision patterns from experience. Experiments on a glioma cohort combining TCGA-LGG, TCGA-GBM, and BraTS with four diagnostic modalities demonstrate that SAGEAgent achieves competitive survival prediction accuracy while reducing average acquisition burden by 55%.", "arxiv_id": "2607.09521", "arxiv_url": "https://arxiv.org/abs/2607.09521", "authors": ["Chongyu Qu", "Can Cui", "Zhengyi Lu", "Junchao Zhu", "Tianyuan Yao", "Junlin Guo", "Juming Xiong", "Yanfan Zhu", "Yuechen Yang", "Bennett A. Landman", "Yuankai Huo"], "brief": "\u63d0\u51faSAGEAgent\uff0c\u4e00\u4e2a\u57fa\u4e8eLLM\u7684\u81ea\u8fdb\u5316\u4e34\u5e8a\u667a\u80fd\u4f53\uff0c\u9488\u5bf9\u764c\u75c7\u60a3\u8005\u751f\u5b58\u9884\u6d4b\uff0c\u901a\u8fc7\u5e8f\u5217\u51b3\u7b56\u4e3b\u52a8\u5224\u65ad\u662f\u5426\u9700\u8981\u83b7\u53d6\u4e0b\u4e00\u79cd\u8bca\u65ad\u6a21\u6001\uff08\u5982\u57fa\u56e0\u7ec4\u6570\u636e\uff09\uff0c\u5728\u4fdd\u6301\u9884\u6d4b\u7cbe\u5ea6\u7684\u540c\u65f6\u5c06\u5e73\u5747\u8bca\u65ad\u8d1f\u62c5\u964d\u4f4e55%\u3002\u8be5\u667a\u80fd\u4f53\u7ed3\u5408\u60c5\u8282\u8bb0\u5fc6\u4e0e\u8bed\u4e49\u8bb0\u5fc6\uff0c\u4ece\u5386\u53f2\u75c5\u4f8b\u4e2d\u79ef\u7d2f\u53ef\u590d\u7528\u7684\u51b3\u7b56\u6a21\u5f0f\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09521", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u533b\u7597AI", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09521v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SAGEAgent: A Self-Evolving Agent for Cost-Aware Modality Acquisition in Multimodal Survival Prediction", "tldr": "\u63d0\u51faSAGEAgent\uff0c\u4e00\u4e2a\u57fa\u4e8eLLM\u7684\u81ea\u8fdb\u5316\u4e34\u5e8a\u667a\u80fd\u4f53\uff0c\u9488\u5bf9\u764c\u75c7\u60a3\u8005\u751f\u5b58\u9884\u6d4b\uff0c\u901a\u8fc7\u5e8f\u5217\u51b3\u7b56\u4e3b\u52a8\u5224\u65ad\u662f\u5426\u9700\u8981\u83b7\u53d6\u4e0b\u4e00\u79cd\u8bca\u65ad\u6a21\u6001\uff08\u5982\u57fa\u56e0\u7ec4\u6570\u636e\uff09\uff0c\u5728\u4fdd\u6301\u9884\u6d4b\u7cbe\u5ea6\u7684\u540c\u65f6\u5c06\u5e73\u5747\u8bca\u65ad\u8d1f\u62c5\u964d\u4f4e55%\u3002\u8be5\u667a\u80fd\u4f53\u7ed3\u5408\u60c5\u8282\u8bb0\u5fc6\u4e0e\u8bed\u4e49\u8bb0\u5fc6\uff0c\u4ece\u5386\u53f2\u75c5\u4f8b\u4e2d\u79ef\u7d2f\u53ef\u590d\u7528\u7684\u51b3\u7b56\u6a21\u5f0f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Vision-Language Models (VLMs) are the perceptual backbone of embodied AI, but their energy footprint on edge hardware remains poorly understood. Existing efficiency efforts focus predominantly on reducing visual tokens, implicitly treating visual processing as the dominant energy cost. We overturn this implicit assumption through the first systematic energy profiling of on-device VLM inference, spanning five models across three architecture families, four input resolutions, and two hardware platforms (NVIDIA RTX 3070 and Jetson Orin NX). Our analysis yields three findings. First, average inference power is a model-intrinsic constant, invariant to input resolution, image complexity, and prompt type, with less than 5% variation across all conditions. This means that all energy variation across inputs must arise from variation in inference time, not from variation in power draw. Second, each output token costs 11 to 39x more wall-clock time than each input token due to the compute-bound and memory-bound asymmetry between prefill and decode, making output token count the dominant driver of both latency and energy. Third, image complexity, measured by the number of objects in an image, induces up to 4.1x energy differences at identical resolution. This variation arises not from increased visual processing cost, but from differences in output length. These findings expose a fundamental limitation of visual token pruning: even removing all visual tokens saves at most 10% of total energy for fixed-token models. Across models spanning 1 billion to 8 billion parameters, controlling output length saves up to 97% of total energy, with the energy dominance of decoding growing stronger at larger model scale. In short, the true energy bottleneck in edge VLM inference is not what the model sees, but how much it says.", "arxiv_id": "2607.09520", "arxiv_url": "https://arxiv.org/abs/2607.09520", "authors": ["Junfei Zhan", "Haoxun Shen", "Mingang Guo", "Zixuan Huang", "Tengjiao He"], "brief": "\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u5206\u6790\u4e86\u8fb9\u7f18\u8bbe\u5907\u4e0a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u63a8\u7406\u7684\u80fd\u8017\u7279\u5f81\uff0c\u53d1\u73b0\u63a8\u7406\u529f\u7387\u51e0\u4e4e\u6052\u5b9a\uff0c\u80fd\u8017\u5dee\u5f02\u4e3b\u8981\u6765\u81ea\u63a8\u7406\u65f6\u95f4\u800c\u975e\u529f\u7387\u53d8\u5316\u3002\u7814\u7a76\u63ed\u793a\u8f93\u51fatoken\u6570\u91cf\u624d\u662f\u5ef6\u8fdf\u548c\u80fd\u8017\u7684\u4e3b\u5bfc\u56e0\u7d20\u2014\u2014\u63a7\u5236\u8f93\u51fa\u957f\u5ea6\u53ef\u8282\u7701\u9ad8\u8fbe97%\u7684\u80fd\u8017\uff0c\u800c\u89c6\u89c9token\u526a\u679d\u6700\u591a\u4ec5\u8282\u770110%\uff0c\u5f7b\u5e95\u98a0\u8986\u4e86\"\u89c6\u89c9\u5904\u7406\u662f\u4e3b\u8981\u80fd\u8017\u74f6\u9888\"\u7684\u4f20\u7edf\u8ba4\u77e5\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09520", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u8fb9\u7f18\u63a8\u7406", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u80fd\u8017\u5206\u6790"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09520v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Seeing is Free, Speaking is Not: Uncovering the True Energy Bottleneck in Edge VLM Inference", "tldr": "\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u5206\u6790\u4e86\u8fb9\u7f18\u8bbe\u5907\u4e0a\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u63a8\u7406\u7684\u80fd\u8017\u7279\u5f81\uff0c\u53d1\u73b0\u63a8\u7406\u529f\u7387\u51e0\u4e4e\u6052\u5b9a\uff0c\u80fd\u8017\u5dee\u5f02\u4e3b\u8981\u6765\u81ea\u63a8\u7406\u65f6\u95f4\u800c\u975e\u529f\u7387\u53d8\u5316\u3002\u7814\u7a76\u63ed\u793a\u8f93\u51fatoken\u6570\u91cf\u624d\u662f\u5ef6\u8fdf\u548c\u80fd\u8017\u7684\u4e3b\u5bfc\u56e0\u7d20\u2014\u2014\u63a7\u5236\u8f93\u51fa\u957f\u5ea6\u53ef\u8282\u7701\u9ad8\u8fbe97%\u7684\u80fd\u8017\uff0c\u800c\u89c6\u89c9token\u526a\u679d\u6700\u591a\u4ec5\u8282\u770110%\uff0c\u5f7b\u5e95\u98a0\u8986\u4e86\"\u89c6\u89c9\u5904\u7406\u662f\u4e3b\u8981\u80fd\u8017\u74f6\u9888\"\u7684\u4f20\u7edf\u8ba4\u77e5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "A fundamental challenge in 3D reconstruction and robotic localization is co-visibility: determining which image pairs share overlapping visible surfaces, particularly in scenarios with minimal overlap. We demonstrate that VGGT implicitly encodes co-visibility as an emergent behavior: without any supervision for this task, its internal representations exhibit a clear hierarchical structure mirroring that of large language models, i.e. early layers build a 3D-aware scene representation, while late layers act as dedicated co-visibility reasoners. In particular, we identify layer L17 as a negative anchor that consistently routes non-co-visible pairs for this backbone, regardless of the evaluation setting, providing task-grounded evidence of layer specialization in a geometry-grounded foundation model. Building on this, we introduce Co-VGGT, which freezes VGGT and trains only a lightweight layer-wise mixture-of-experts head (less than 7.5M parameters) to classify co-visibility from RGB alone, treating each layer as a specialized expert whose geometric abstraction is adaptively weighted per input pair. On the Co-VisiON benchmark, Co-VGGT surpasses the human annotation baseline and improves over prior work by more than 25% pairwise and 10% multiview. Pairwise predictions are well-calibrated (ECE=0.030), enabling direct use as edge weights in visibility graphs for downstream SfM and SLAM pipelines without post-hoc correction. Code and data are available.", "arxiv_id": "2607.09503", "arxiv_url": "https://arxiv.org/abs/2607.09503", "authors": ["Filippo Ziliotto", "Luciano Serafini", "Lamberto Ballan", "Tommaso Campari"], "brief": "\u7814\u7a76\u53d1\u73b0VGGT\u51e0\u4f55\u57fa\u7840\u6a21\u578b\u9690\u5f0f\u7f16\u7801\u4e86\u56fe\u50cf\u5bf9\u7684\u5171\u53ef\u89c1\u6027\u4fe1\u606f\uff0c\u5176\u5185\u90e8\u5c42\u6b21\u7ed3\u6784\u7c7b\u4f3c\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u65e9\u671f\u5c42\u6784\u5efa3D\u573a\u666f\u8868\u793a\uff0c\u540e\u671f\u5c42\u4e13\u95e8\u63a8\u7406\u5171\u53ef\u89c1\u6027\u3002\u57fa\u4e8e\u6b64\u63d0\u51faCo-VGGT\uff0c\u51bb\u7ed3VGGT\u4e3b\u5e72\u5e76\u8bad\u7ec3\u8f7b\u91cf\u7ea7\u6df7\u5408\u4e13\u5bb6\u5934\uff08\u003c7.5M\u53c2\u6570\uff09\uff0c\u5728Co-VisiON\u57fa\u51c6\u4e0a\u8d85\u8d8a\u4eba\u7c7b\u6807\u6ce8\u57fa\u7ebf\uff0c\u6210\u5bf9\u7cbe\u5ea6\u63d0\u534725%\u4ee5\u4e0a\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09503", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u51e0\u4f55\u57fa\u7840\u6a21\u578b", "\u4e09\u7ef4\u91cd\u5efa", "\u5171\u53ef\u89c1\u6027", "\u6df7\u5408\u4e13\u5bb6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09503v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "What VGGT Knows About Overlap: Probing Geometric Foundation Models for Co-Visibility", "tldr": "\u7814\u7a76\u53d1\u73b0VGGT\u51e0\u4f55\u57fa\u7840\u6a21\u578b\u9690\u5f0f\u7f16\u7801\u4e86\u56fe\u50cf\u5bf9\u7684\u5171\u53ef\u89c1\u6027\u4fe1\u606f\uff0c\u5176\u5185\u90e8\u5c42\u6b21\u7ed3\u6784\u7c7b\u4f3c\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u65e9\u671f\u5c42\u6784\u5efa3D\u573a\u666f\u8868\u793a\uff0c\u540e\u671f\u5c42\u4e13\u95e8\u63a8\u7406\u5171\u53ef\u89c1\u6027\u3002\u57fa\u4e8e\u6b64\u63d0\u51faCo-VGGT\uff0c\u51bb\u7ed3VGGT\u4e3b\u5e72\u5e76\u8bad\u7ec3\u8f7b\u91cf\u7ea7\u6df7\u5408\u4e13\u5bb6\u5934\uff08\u003c7.5M\u53c2\u6570\uff09\uff0c\u5728Co-VisiON\u57fa\u51c6\u4e0a\u8d85\u8d8a\u4eba\u7c7b\u6807\u6ce8\u57fa\u7ebf\uff0c\u6210\u5bf9\u7cbe\u5ea6\u63d0\u534725%\u4ee5\u4e0a\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning (RL) is increasingly used to align multimodal large language models (MLLMs), but higher rewards do not always imply better task performance. This risk is amplified when visual evidence is evaluated by text-only or weakly grounded rewards. We study reward hacking in MLLM RL across safety VQA, chart VQA, and stress-test settings, varying reward design, data ambiguity, model scale (2B-32B), and RL algorithm (GRPO, RLOO, DAPO). We introduce Newly Rewarded Failure Rate (NRFR), which measures failures among samples whose proxy reward improves over the SFT baseline. Outcome-only rewards cause severe hacking, reaching 48.1% Reward Hacking Rate (RHR), while NRFR exceeding RHR shows that RL creates new failures rather than merely inheriting them. Scaling reduces but does not eliminate hacking: even the 32B model retains a 54.9% worse rate under outcome-only rewards, whereas answer-aware rewards improve the oracle trend at every scale. Robustness is also algorithm- and scale-dependent: GRPO is consistently most resistant, RLOO remains vulnerable, and DAPO improves substantially from 2B to 8B. Visual-evidence rewards help only with reliable verification: keyword-based checks increase hacking, while VLM-as-judge semantic verification reduces it. Overall, multimodal reward hacking is a systematic result of optimizing imperfect rewards, and robust alignment requires rewards and verifiers that remain reliable under optimization pressure.", "arxiv_id": "2607.09492", "arxiv_url": "https://arxiv.org/abs/2607.09492", "authors": ["Jiayu Yao", "Yiwei Wang", "Anmeng Zhang", "Zhe Sun", "Songsong Wang", "Lingrui Mei", "Yuyao Ge", "Shenghua Liu"], "brief": "\u7814\u7a76\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u4e2d\u7684\u5956\u52b1\u6b3a\u9a97\u95ee\u9898\uff0c\u63d0\u51faNRFR\u6307\u6807\u8861\u91cfRL\u8bad\u7ec3\u4ea7\u751f\u7684\u65b0\u5931\u8d25\u6848\u4f8b\u3002\u5b9e\u9a8c\u53d1\u73b0\u4ec5\u4f9d\u8d56\u7ed3\u679c\u5956\u52b1\u4f1a\u5bfc\u81f4\u9ad8\u8fbe48.1%\u7684\u5956\u52b1\u6b3a\u9a97\u7387\uff0c\u800c\u7b54\u6848\u611f\u77e5\u5956\u52b1\u548cGRPO\u7b97\u6cd5\u66f4\u5177\u9c81\u68d2\u6027\uff0cVLM\u8bed\u4e49\u9a8c\u8bc1\u6bd4\u5173\u952e\u8bcd\u68c0\u67e5\u66f4\u80fd\u6291\u5236\u6b3a\u9a97\u884c\u4e3a\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09492", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60", "\u5956\u52b1\u6b3a\u9a97", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09492v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Multimodal Reward Hacking in Reinforcement Learning", "tldr": "\u7814\u7a76\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u5f3a\u5316\u5b66\u4e60\u4e2d\u7684\u5956\u52b1\u6b3a\u9a97\u95ee\u9898\uff0c\u63d0\u51faNRFR\u6307\u6807\u8861\u91cfRL\u8bad\u7ec3\u4ea7\u751f\u7684\u65b0\u5931\u8d25\u6848\u4f8b\u3002\u5b9e\u9a8c\u53d1\u73b0\u4ec5\u4f9d\u8d56\u7ed3\u679c\u5956\u52b1\u4f1a\u5bfc\u81f4\u9ad8\u8fbe48.1%\u7684\u5956\u52b1\u6b3a\u9a97\u7387\uff0c\u800c\u7b54\u6848\u611f\u77e5\u5956\u52b1\u548cGRPO\u7b97\u6cd5\u66f4\u5177\u9c81\u68d2\u6027\uff0cVLM\u8bed\u4e49\u9a8c\u8bc1\u6bd4\u5173\u952e\u8bcd\u68c0\u67e5\u66f4\u80fd\u6291\u5236\u6b3a\u9a97\u884c\u4e3a\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "An AI system\u0027s output is not the fact or world state it appears to describe, but rather an engineered representation. We propose a semantic framework to describe AI systems, to be able to examine the correctness of such representations. To do so, we distinguish what is justified by accepted domain knowledge, what reference sources say, and what the system can currently use. This allows us to give precise definitions to common failures: extrapolation, refuted or unsupported assertion, sources versus knowledge mismatch, stale or refuted source, added hypotheses, unsupported use... We hope our framework gives a useful vocabulary for specifying and checking AI systems whose outputs, citations, tool calls, and world-changing actions must be justified by reliable claims and explicit authority rather than apparent fluency.", "arxiv_id": "2607.09489", "arxiv_url": "https://arxiv.org/abs/2607.09489", "authors": ["Jade Alglave", "Patrick Cousot"], "brief": "\u63d0\u51fa\u4e00\u4e2a\u8bed\u4e49\u6846\u67b6\u6765\u63cf\u8ff0AI\u7cfb\u7edf\u7684\u8f93\u51fa\uff0c\u5c06\u5176\u89c6\u4e3a\u5de5\u7a0b\u5316\u7684\u8bed\u4e49\u62bd\u8c61\u800c\u975e\u4e8b\u5b9e\u672c\u8eab\u3002\u8be5\u6846\u67b6\u533a\u5206\u9886\u57df\u77e5\u8bc6\u3001\u53c2\u8003\u6765\u6e90\u548c\u7cfb\u7edf\u53ef\u7528\u4fe1\u606f\u4e09\u4e2a\u5c42\u6b21\uff0c\u4ece\u800c\u7cbe\u786e\u5b9a\u4e49\u5916\u63a8\u3001\u65e0\u4f9d\u636e\u65ad\u8a00\u3001\u6765\u6e90\u4e0e\u77e5\u8bc6\u4e0d\u5339\u914d\u7b49\u5e38\u89c1\u5931\u8d25\u6a21\u5f0f\uff0c\u4e3aAI\u7cfb\u7edf\u7684\u89c4\u8303\u4e0e\u9a8c\u8bc1\u63d0\u4f9b\u7edf\u4e00\u8bcd\u6c47\u3002", "categories": ["cs.AI", "cs.PL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09489", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8bed\u4e49\u6846\u67b6", "AI\u53ef\u9760\u6027", "\u5e7b\u89c9", "\u77e5\u8bc6\u8868\u793a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09489v1", "published_at": "2026-07-10", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Ceci n\u0027est pas une pipe: AI systems as semantic abstractions", "tldr": "\u63d0\u51fa\u4e00\u4e2a\u8bed\u4e49\u6846\u67b6\u6765\u63cf\u8ff0AI\u7cfb\u7edf\u7684\u8f93\u51fa\uff0c\u5c06\u5176\u89c6\u4e3a\u5de5\u7a0b\u5316\u7684\u8bed\u4e49\u62bd\u8c61\u800c\u975e\u4e8b\u5b9e\u672c\u8eab\u3002\u8be5\u6846\u67b6\u533a\u5206\u9886\u57df\u77e5\u8bc6\u3001\u53c2\u8003\u6765\u6e90\u548c\u7cfb\u7edf\u53ef\u7528\u4fe1\u606f\u4e09\u4e2a\u5c42\u6b21\uff0c\u4ece\u800c\u7cbe\u786e\u5b9a\u4e49\u5916\u63a8\u3001\u65e0\u4f9d\u636e\u65ad\u8a00\u3001\u6765\u6e90\u4e0e\u77e5\u8bc6\u4e0d\u5339\u914d\u7b49\u5e38\u89c1\u5931\u8d25\u6a21\u5f0f\uff0c\u4e3aAI\u7cfb\u7edf\u7684\u89c4\u8303\u4e0e\u9a8c\u8bc1\u63d0\u4f9b\u7edf\u4e00\u8bcd\u6c47\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Text-guided medical image segmentation leverages clinical semantics to improve lesion delineation, yet many existing models bind cross-modal fusion, supervision, and decoder design into a task-specific architecture. Such tight coupling makes it difficult to reuse language guidance modules across heterogeneous vision and text backbones, and often requires redesigning the network when the encoder pair changes. This paper presents BTHA, a backbone-transferable hierarchical adapter framework for text-guided medical image segmentation. BTHA is built around a stable feature-level interface: given multi-scale visual features and a text representation, it injects semantic guidance through shape-preserving adapters while maintaining the decoder-side tensor contract. To make this interface effective, we introduce a Hierarchical Coarse-to-Fine Supervision Strategy that decomposes learning into global image-text alignment, multi-scale auxiliary localization, and boundary-aware final mask refinement. We further design a Scale-Adaptive Gated Semantic Guidance (SAGSG) adapter, where resolution-specific gates adaptively control textual injection and channel recalibration suppresses redundant cross-modal responses. Evaluations across diverse vision and text backbones show that the same adapter and supervision design remains effective across convolutional and transformer-based visual encoders as well as different language encoders. Experiments on four public datasets further demonstrate that BTHA improves strong text-guided baselines with modest computational overhead.", "arxiv_id": "2607.09481", "arxiv_url": "https://arxiv.org/abs/2607.09481", "authors": ["Yungeng Liu", "Xuanzi Fang", "Haijin Zeng", "Qi Dai", "Yongyong Chen"], "brief": "\u63d0\u51faBTHA\u6846\u67b6\uff0c\u5c06\u8bed\u8a00\u5f15\u5bfc\u6a21\u5757\u
