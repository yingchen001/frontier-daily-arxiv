89c6\u89d2\u8bad\u7ec3\u6570\u636e", "upvotes": 0, "what_it_is": "\u63d0\u51faOpenLongTail\u5f00\u6e90\u751f\u6210\u5f0f\u6570\u636e\u5f15\u64ce\uff0c\u901a\u8fc7\u59ff\u6001\u611f\u77e5\u7684\u5916\u63a8\u89c6\u89d2\u5408\u6210\u6d41\u6c34\u7ebf\uff0c\u5c06\u5355\u76ee\u884c\u8f66\u8bb0\u5f55\u4eea\u7b49\u5f02\u6784\u957f\u5c3e\u9a7e\u9a76\u89c6\u9891\u8f6c\u5316\u4e3a\u591a\u89c6\u89d2\u3001\u65f6\u5e8f\u4e00\u81f4\u7684\u8bad\u7ec3\u6570\u636e\uff0c\u4ee5\u63d0\u5347\u81ea\u52a8\u9a7e\u9a76\u7b56\u7565\u5bf9\u957f\u5c3e\u573a\u666f\u7684\u6cdb\u5316\u80fd\u529b\u3002", "why_notable": "\u957f\u5c3e\u573a\u666f\u6570\u636e\u7a00\u7f3a\u662f\u81ea\u52a8\u9a7e\u9a76\u89c4\u6a21\u5316\u7684\u6838\u5fc3\u74f6\u9888\uff0cOpenLongTail\u4ee5\u5f00\u6e90\u65b9\u5f0f\u5c06\u6d77\u91cf\u91ce\u5916\u5355\u76ee\u89c6\u9891\u8f6c\u5316\u4e3a\u53ef\u7528\u8bad\u7ec3\u6570\u636e\uff0c\u4e3a\u89e3\u51b3\u6570\u636e\u6a21\u6001\u9e3f\u6c9f\u63d0\u4f9b\u4e86\u5b9e\u7528\u4e14\u53ef\u6269\u5c55\u7684\u65b9\u6848\u3002"}, {"abstract": "Recent 3D geometric foundation models, such as VGGT, provide robust feed-forward 3D reconstruction by directly predicting camera poses and 3D scene points from input images. However, their results remain inaccurate, and scaling them to long sequences or large unordered image sets typically requires chunk-wise processing, which can introduce drift and inconsistency. We present Glob3R, a global SfM-style reconstruction built on 3D foundation models. Our key idea is to explicitly optimize feed-forward geometric predictions. To this end, we augment a frozen Pi3X backbone with a lightweight dense matching head that predicts image warps between selected reference frames and neighboring views. These dense warps are converted into sparse but reliable multi-view feature tracks, which provide correspondence constraints for global optimization. We further introduce a keyframe-based sliding-window association strategy that propagates tracks and relative poses across overlapping windows, enabling scalable reconstruction. Finally, we perform global motion averaging and bundle adjustment to refine camera poses, reduce scale inconsistencies, and recover dense scene geometry. Extensive experiments on indoor, outdoor, large-scale driving, and unordered SfM benchmarks demonstrate that Glob3R achieves robust and accurate reconstruction. It consistently improves over feed-forward foundation-model baselines and recent scalable reconstruction methods, while being more robust than classical SfM pipelines. The refined poses also lead to higher-quality neural rendering, validating the benefit of combining foundation-model priors with global geometric optimization. Project page: https://junyuandeng.github.io/Glob3r", "arxiv_id": "2607.09225", "arxiv_url": "https://arxiv.org/abs/2607.09225", "authors": ["Junyuan Deng", "Heng Li", "Kejie Qiu", "Lingteng Qiu", "Rui Peng", "Weichao Shen", "Weihao Yuan", "Siyu Zhu", "Zilong Dong", "Ping Tan"], "brief": "\u63d0\u51faGlob3R\u6846\u67b6\uff0c\u5728\u51bb\u7ed3\u76843D\u57fa\u7840\u6a21\u578b\uff08Pi3X\uff09\u57fa\u7840\u4e0a\u589e\u52a0\u8f7b\u91cf\u7ea7\u5bc6\u96c6\u5339\u914d\u5934\uff0c\u5c06\u524d\u9988\u9884\u6d4b\u8f6c\u5316\u4e3a\u7a00\u758f\u591a\u89c6\u56fe\u7279\u5f81\u8f68\u8ff9\uff0c\u5e76\u901a\u8fc7\u5168\u5c40\u8fd0\u52a8\u5e73\u5747\u548c\u5149\u675f\u6cd5\u5e73\u5dee\u4f18\u5316\u76f8\u673a\u4f4d\u59ff\u4e0e\u573a\u666f\u51e0\u4f55\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09225", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u5728\u51bb\u7ed3Pi3X\u9aa8\u5e72\u7f51\u7edc\u4e0a\u6dfb\u52a0\u8f7b\u91cf\u7ea7\u5bc6\u96c6\u5339\u914d\u5934\uff0c\u9884\u6d4b\u53c2\u8003\u5e27\u4e0e\u90bb\u8fd1\u89c6\u56fe\u95f4\u7684\u56fe\u50cf\u53d8\u5f62\uff08warp\uff09\uff0c\u8f6c\u5316\u4e3a\u53ef\u9760\u7684\u7a00\u758f\u591a\u89c6\u56fe\u7279\u5f81\u8f68\u8ff9", "\u5f15\u5165\u57fa\u4e8e\u5173\u952e\u5e27\u7684\u6ed1\u52a8\u7a97\u53e3\u5173\u8054\u7b56\u7565\uff0c\u8de8\u91cd\u53e0\u7a97\u53e3\u4f20\u64ad\u8f68\u8ff9\u548c\u76f8\u5bf9\u4f4d\u59ff\uff0c\u652f\u6301\u957f\u5e8f\u5217\u548c\u5927\u89c4\u6a21\u65e0\u5e8f\u56fe\u50cf\u96c6\u7684\u53ef\u6269\u5c55\u91cd\u5efa", "\u5728\u5ba4\u5185\u3001\u5ba4\u5916\u3001\u5927\u89c4\u6a21\u9a7e\u9a76\u53ca\u65e0\u5e8fSfM\u57fa\u51c6\u4e0a\u5747\u4f18\u4e8e\u524d\u9988\u57fa\u7840\u6a21\u578b\u57fa\u7ebf\u548c\u8fd1\u671f\u53ef\u6269\u5c55\u91cd\u5efa\u65b9\u6cd5\uff0c\u7cbe\u5316\u4f4d\u59ff\u8fd8\u63d0\u5347\u4e86\u795e\u7ecf\u6e32\u67d3\u8d28\u91cf"], "keywords": ["\u4e09\u7ef4\u91cd\u5efa", "\u57fa\u7840\u6a21\u578b", "SfM", "\u591a\u89c6\u56fe\u51e0\u4f55"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09225v1", "published_at": "2026-07-10", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Glob3R: Global Structure-from-Motion with 3D Foundation Models", "tldr": "Glob3R\u5c063D\u57fa\u7840\u6a21\u578b\u4e0e\u5168\u5c40SfM\u4f18\u5316\u7ed3\u5408\uff0c\u5b9e\u73b0\u9c81\u68d2\u4e14\u7cbe\u786e\u7684\u5927\u89c4\u6a21\u4e09\u7ef4\u91cd\u5efa", "upvotes": 0, "what_it_is": "\u63d0\u51faGlob3R\u6846\u67b6\uff0c\u5728\u51bb\u7ed3\u76843D\u57fa\u7840\u6a21\u578b\uff08Pi3X\uff09\u57fa\u7840\u4e0a\u589e\u52a0\u8f7b\u91cf\u7ea7\u5bc6\u96c6\u5339\u914d\u5934\uff0c\u5c06\u524d\u9988\u9884\u6d4b\u8f6c\u5316\u4e3a\u7a00\u758f\u591a\u89c6\u56fe\u7279\u5f81\u8f68\u8ff9\uff0c\u5e76\u901a\u8fc7\u5168\u5c40\u8fd0\u52a8\u5e73\u5747\u548c\u5149\u675f\u6cd5\u5e73\u5dee\u4f18\u5316\u76f8\u673a\u4f4d\u59ff\u4e0e\u573a\u666f\u51e0\u4f55\u3002", "why_notable": "\u9996\u6b21\u5c063D\u51e0\u4f55\u57fa\u7840\u6a21\u578b\u7684\u524d\u9988\u9884\u6d4b\u4e0e\u7ecf\u5178\u5168\u5c40SfM\u4f18\u5316\u6846\u67b6\u7cfb\u7edf\u7ed3\u5408\uff0c\u517c\u987e\u57fa\u7840\u6a21\u578b\u7684\u9c81\u68d2\u6027\u4e0e\u5168\u5c40\u4e00\u81f4\u6027\uff0c\u89e3\u51b3\u4e86\u5927\u89c4\u6a21\u573a\u666f\u4e0b\u6f02\u79fb\u548c\u5c3a\u5ea6\u4e0d\u4e00\u81f4\u95ee\u9898\uff0c\u5bf9\u4e09\u7ef4\u91cd\u5efa\u548c\u795e\u7ecf\u6e32\u67d3\u5747\u6709\u5b9e\u9645\u4ef7\u503c\u3002"}, {"abstract": "Medical images require comprehensive and accurate interpretation to support the diagnosis of diverse clincial conditions. Recent vision-language generalist models offer broad task coverage and promising zero-shot capabilities, yet often lack fine-grained anatomical and lesion awareness for reliable diagnosis and spatial interpretability. In contrast, supervised specialist models achieve strong performance on specific tasks but typically lack generalization across diseases and anatomies. In this work, we present SuG, a Super-Generalist framework that unifies generalist vision-language learning with specialist objectives, enabling both broad generalization and specialist-level diagnostic capability. We perform specialist-enhanced vision-language alignment in SuG by incorporating spatial priors from multiple segmentation experts, including anatomy, class-specific lesion and class-agnostic lesion segmentors that captures lesions beyond anatomies annotated during training. To improve lesion grounding capability, we leverage lesion masks as spatial priors to calibrate text-conditioned visual attention, encouraging disease-related semantics to focus on clinically relevant regions. We evaluate SuG on extensive chest and abdominal CT benchmarks, including CT-RATE, Merlin, MedVL-CT69K, and several in-house tumor datasets. SuG achieves state-of-the-art performance across a wide range of disease diagnosis tasks and surpasses specialist models on several critical tumor diagnosis benchmarks. Furthermore, SuG demonstrates strong lesion grounding capability, including robust generalization to lesion types lacking class-specific supervision.", "arxiv_id": "2607.09135", "arxiv_url": "https://arxiv.org/abs/2607.09135", "authors": ["Shaoteng Zhang", "Weiwei Cao", "Wanxing Chang", "Yutong Xie", "Kai Cao", "Zaiyi Liu", "Yu Shi", "Tingbo Liang", "Qi Zhang", "Ling Zhang", "Yong Xia", "Jianpeng Zhang"], "brief": "\u63d0\u51faSuG\uff08Super-Generalist\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u6574\u5408\u89e3\u5256\u3001\u75c5\u7076\u7b49\u591a\u4e2a\u5206\u5272\u4e13\u5bb6\u7684\u7a7a\u95f4\u5148\u9a8c\uff0c\u5c06\u901a\u624d\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0e\u4e13\u79d1\u76ee\u6807\u7edf\u4e00\u8bad\u7ec3\uff0c\u5728CT\u5f71\u50cf\u8bca\u65ad\u4e2d\u540c\u65f6\u5177\u5907\u5e7f\u6cdb\u6cdb\u5316\u80fd\u529b\u548c\u4e13\u79d1\u7ea7\u8bca\u65ad\u7cbe\u5ea6\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09135", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u4e09\u7c7b\u5206\u5272\u4e13\u5bb6\uff08\u89e3\u5256\u5206\u5272\u3001\u7c7b\u522b\u7279\u5b9a\u75c5\u7076\u5206\u5272\u3001\u7c7b\u522b\u65e0\u5173\u75c5\u7076\u5206\u5272\uff09\u63d0\u4f9b\u7a7a\u95f4\u5148\u9a8c\uff0c\u589e\u5f3a\u89c6\u89c9\u8bed\u8a00\u5bf9\u9f50", "\u5229\u7528\u75c5\u7076\u63a9\u7801\u6821\u51c6\u6587\u672c\u6761\u4ef6\u89c6\u89c9\u6ce8\u610f\u529b\uff0c\u4f7f\u75be\u75c5\u76f8\u5173\u8bed\u4e49\u805a\u7126\u4e8e\u4e34\u5e8a\u76f8\u5173\u533a\u57df\uff0c\u63d0\u5347\u75c5\u7076\u5b9a\u4f4d\u80fd\u529b", "\u5728CT-RATE\u3001Merlin\u3001MedVL-CT69K\u7b49\u591a\u4e2a\u80f8\u8179\u90e8CT\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u5e76\u5728\u591a\u4e2a\u80bf\u7624\u8bca\u65ad\u4efb\u52a1\u4e0a\u8d85\u8d8a\u4e13\u79d1\u6a21\u578b"], "keywords": ["\u533b\u5b66\u5f71\u50cf", "\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u5206\u5272"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09135v1", "published_at": "2026-07-10", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Super-Generalist: Towards Comprehensive and Accurate Medical Image Understanding via Generalist-Specialist Synergy", "tldr": "SuG\u6846\u67b6\u878d\u5408\u901a\u624d\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0e\u4e13\u79d1\u5206\u5272\u4e13\u5bb6\uff0c\u5b9e\u73b0\u5168\u9762\u7cbe\u51c6\u7684\u533b\u5b66\u5f71\u50cf\u7406\u89e3", "upvotes": 0, "what_it_is": "\u63d0\u51faSuG\uff08Super-Generalist\uff09\u6846\u67b6\uff0c\u901a\u8fc7\u6574\u5408\u89e3\u5256\u3001\u75c5\u7076\u7b49\u591a\u4e2a\u5206\u5272\u4e13\u5bb6\u7684\u7a7a\u95f4\u5148\u9a8c\uff0c\u5c06\u901a\u624d\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0e\u4e13\u79d1\u76ee\u6807\u7edf\u4e00\u8bad\u7ec3\uff0c\u5728CT\u5f71\u50cf\u8bca\u65ad\u4e2d\u540c\u65f6\u5177\u5907\u5e7f\u6cdb\u6cdb\u5316\u80fd\u529b\u548c\u4e13\u79d1\u7ea7\u8bca\u65ad\u7cbe\u5ea6\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u901a\u624d\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\u4e0e\u591a\u7c7b\u4e13\u79d1\u5206\u5272\u4e13\u5bb6\u534f\u540c\u8bad\u7ec3\uff0c\u7a81\u7834\u4e86\u901a\u624d\u6a21\u578b\u7ec6\u7c92\u5ea6\u611f\u77e5\u4e0d\u8db3\u7684\u74f6\u9888\uff0c\u4e14\u5bf9\u8bad\u7ec3\u4e2d\u672a\u89c1\u75c5\u7076\u7c7b\u578b\u5177\u6709\u5f3a\u6cdb\u5316\u80fd\u529b\uff0c\u5bf9\u4e34\u5e8aAI\u843d\u5730\u5177\u6709\u91cd\u8981\u4ef7\u503c\u3002"}, {"abstract": "The rapid progress of large foundation models has been driven predominantly by pretraining on large-scale text corpora. However, many forms of knowledge are conveyed through visual representations, where figures, typeset equations, and page layouts carry rich information that cannot be faithfully or completely captured by text alone. Yet current pretraining approaches discard these visual cues by converting visually rich sources, such as documents and web pages, into plain text for learning language intelligence. This paper challenges the default assumption that language models must be trained on text-only representations and shows that Visual Pretraining is a scalable learner for foundation model intelligence. To this end, we conduct a systematic study of unsupervised visual pretraining paradigms that directly leverage visual documents without text extraction. Across multiple backbones and benchmarks, visual pretraining on the same underlying corpora consistently outperforms text-only pretraining, offering an efficient pathway to scalable language intelligence.", "arxiv_id": "2607.09657", "arxiv_url": "https://arxiv.org/abs/2607.09657", "authors": ["Yiming Zhang", "Zhonghan Zhao", "Wenwei Zhang", "Haiteng Zhao", "Tianyang Lin", "Yunhua Zhou", "Demin Song", "Kuikun Liu", "Haochen Ye", "Haian Huang", "Yuzhe Gu", "Haijun Lv", "Qipeng Guo", "Bin Liu", "Gaoang Wang", "Kai Chen"], "brief": "\u672c\u6587\u63d0\u51fa\"\u89c6\u89c9\u9884\u8bad\u7ec3\"\u8303\u5f0f\uff0c\u76f4\u63a5\u4ee5\u56fe\u50cf\u5f62\u5f0f\uff08\u542b\u56fe\u8868\u3001\u516c\u5f0f\u3001\u9875\u9762\u5e03\u5c40\uff09\u5bf9\u8bed\u8a00\u6a21\u578b\u8fdb\u884c\u65e0\u76d1\u7763\u9884\u8bad\u7ec3\uff0c\u65e0\u9700\u5c06\u6587\u6863\u8f6c\u6362\u4e3a\u7eaf\u6587\u672c\uff0c\u7cfb\u7edf\u9a8c\u8bc1\u5176\u5728\u591a\u79cd\u9aa8\u5e72\u7f51\u7edc\u548c\u57fa\u51c6\u4e0a\u7684\u53ef\u6269\u5c55\u6027\u3002", "categories": ["cs.CV", "cs.AI", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09657", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u6311\u6218\"\u8bed\u8a00\u6a21\u578b\u5fc5\u987b\u7528\u7eaf\u6587\u672c\u8bad\u7ec3\"\u7684\u9ed8\u8ba4\u5047\u8bbe\uff0c\u4fdd\u7559\u6587\u6863\u4e2d\u7684\u89c6\u89c9\u4fe1\u606f\uff08\u6392\u7248\u3001\u516c\u5f0f\u3001\u56fe\u8868\uff09", "\u5728\u76f8\u540c\u8bed\u6599\u4e0a\uff0c\u89c6\u89c9\u9884\u8bad\u7ec3\u5728\u591a\u4e2a\u9aa8\u5e72\u7f51\u7edc\u548c\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u4e00\u81f4\u4f18\u4e8e\u7eaf\u6587\u672c\u9884\u8bad\u7ec3", "\u65e0\u9700OCR\u7b49\u6587\u672c\u62bd\u53d6\u6b65\u9aa4\uff0c\u63d0\u4f9b\u66f4\u9ad8\u6548\u7684\u53ef\u6269\u5c55\u9884\u8bad\u7ec3\u8def\u5f84"], "keywords": ["\u591a\u6a21\u6001", "\u9884\u8bad\u7ec3", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u57fa\u7840\u6a21\u578b"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09657v1", "published_at": "2026-07-10", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.09657.png", "title": "Scalable Visual Pretraining for Language Intelligence", "tldr": "\u76f4\u63a5\u7528\u89c6\u89c9\u6587\u6863\u9884\u8bad\u7ec3\u8bed\u8a00\u6a21\u578b\uff0c\u6548\u679c\u4f18\u4e8e\u7eaf\u6587\u672c\u9884\u8bad\u7ec3", "upvotes": 0, "what_it_is": "\u672c\u6587\u63d0\u51fa\"\u89c6\u89c9\u9884\u8bad\u7ec3\"\u8303\u5f0f\uff0c\u76f4\u63a5\u4ee5\u56fe\u50cf\u5f62\u5f0f\uff08\u542b\u56fe\u8868\u3001\u516c\u5f0f\u3001\u9875\u9762\u5e03\u5c40\uff09\u5bf9\u8bed\u8a00\u6a21\u578b\u8fdb\u884c\u65e0\u76d1\u7763\u9884\u8bad\u7ec3\uff0c\u65e0\u9700\u5c06\u6587\u6863\u8f6c\u6362\u4e3a\u7eaf\u6587\u672c\uff0c\u7cfb\u7edf\u9a8c\u8bc1\u5176\u5728\u591a\u79cd\u9aa8\u5e72\u7f51\u7edc\u548c\u57fa\u51c6\u4e0a\u7684\u53ef\u6269\u5c55\u6027\u3002", "why_notable": "\u98a0\u8986\u4e86\u5927\u6a21\u578b\u9884\u8bad\u7ec3\u5fc5\u987b\u4f9d\u8d56\u7eaf\u6587\u672c\u7684\u4e3b\u6d41\u8303\u5f0f\uff0c\u8bc1\u660e\u89c6\u89c9\u6587\u6863\u672c\u8eab\u5373\u53ef\u4f5c\u4e3a\u8bed\u8a00\u667a\u80fd\u7684\u9ad8\u8d28\u91cf\u8bad\u7ec3\u4fe1\u53f7\uff0c\u5bf9\u591a\u6a21\u6001\u57fa\u7840\u6a21\u578b\u7684\u6570\u636e\u5229\u7528\u65b9\u5f0f\u5177\u6709\u91cd\u8981\u542f\u793a\u3002"}, {"abstract": "Modern AI systems are increasingly being evaluated for their ability to reason, code, prove theorems, use tools, and long-horizon research tasks. These are powerful capabilities, but they share a structural limitation: the representational frame within which the model operates, including its conceptual vocabulary, the space of admissible solutions it can search, and the criteria by which success is evaluated, is typically fixed and supplied in advance. This paper argues that building stronger intelligent systems capable of open-ended innovation requires additional classes of operations: the creation, stabilization, and reuse of new representational primitives, which alter the space being searched rather than simply searching within it. We characterize the distance between current AI systems and genuinely open-ended intelligence through two gaps. The first is the vocabulary gap, the difficulty of inventing and stabilizing new representational primitives rather than merely recombining existing ones. The second is the verifier gap, the difficulty of judging the value of a new primitive when its full payoff may be visible only after future reuse. We interpret both gaps through a unified framework of intelligence as cognitive discrepancy reduction. By viewing intelligent behaviors as a sequence of cognitive transformations, we distinguish intra-space transformations which operate within a fixed representational frame, from generative transformations which may modify the frame itself. On this basis, we propose a ladder of innovation autonomy and outline several directions for advancing open-ended AI, including objectives that reward useful representational change, persistent memory architectures for invented primitives, and adaptive verification mechanisms capable of evolving alongside the representations they evaluate.", "arxiv_id": "2607.09560", "arxiv_url": "https://arxiv.org/abs/2607.09560", "authors": ["Yuan Cao", "Haiqian Yang"], "brief": "\u672c\u6587\u4ece\u7406\u8bba\u5c42\u9762\u5256\u6790\u73b0\u6709AI\u7cfb\u7edf\u7684\u6838\u5fc3\u5c40\u9650\uff1a\u5176\u8868\u5f81\u6846\u67b6\uff08\u6982\u5ff5\u8bcd\u6c47\u3001\u89e3\u7a7a\u95f4\u3001\u8bc4\u4f30\u6807\u51c6\uff09\u5747\u9884\u5148\u56fa\u5b9a\uff0c\u65e0\u6cd5\u81ea\u4e3b\u521b\u9020\u65b0\u7684\u8868\u5f81\u539f\u8bed\u3002\u4f5c\u8005\u63d0\u51fa\"\u8ba4\u77e5\u5dee\u5f02\u6d88\u51cf\"\u7edf\u4e00\u6846\u67b6\uff0c\u533a\u5206\u6846\u67b6\u5185\u53d8\u6362\u4e0e\u751f\u6210\u6027\u53d8\u6362\uff0c\u5e76\u6784\u5efa\"\u521b\u65b0\u81ea\u4e3b\u6027\u9636\u68af\"\u8def\u7ebf\u56fe\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09560", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bcd\u6c47\u9e3f\u6c9f\uff1aAI\u96be\u4ee5\u53d1\u660e\u5e76\u7a33\u5b9a\u65b0\u7684\u8868\u5f81\u539f\u8bed\uff0c\u53ea\u80fd\u5728\u5df2\u6709\u6982\u5ff5\u7a7a\u95f4\u5185\u91cd\u7ec4", "\u9a8c\u8bc1\u9e3f\u6c9f\uff1a\u65b0\u539f\u8bed\u7684\u4ef7\u503c\u5f80\u5f80\u53ea\u5728\u672a\u6765\u590d\u7528\u540e\u624d\u663e\u73b0\uff0c\u5f53\u524d\u9a8c\u8bc1\u673a\u5236\u65e0\u6cd5\u8bc4\u4f30", "\u63d0\u51fa\u4e09\u7c7b\u6539\u8fdb\u65b9\u5411\uff1a\u5956\u52b1\u8868\u5f81\u53d8\u5316\u7684\u76ee\u6807\u51fd\u6570\u3001\u6301\u4e45\u5316\u8bb0\u5fc6\u67b6\u6784\u3001\u968f\u8868\u5f81\u6f14\u5316\u7684\u81ea\u9002\u5e94\u9a8c\u8bc1\u673a\u5236"], "keywords": ["\u5f00\u653e\u5f0f\u667a\u80fd", "\u8868\u5f81\u5b66\u4e60", "\u5143\u8ba4\u77e5", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09560v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Beyond Fixed Representations: The Vocabulary and Verifier Gaps in Open-Ended AI", "tldr": "\u63d0\u51fa\"\u8bcd\u6c47\u9e3f\u6c9f\"\u4e0e\"\u9a8c\u8bc1\u9e3f\u6c9f\"\u4e24\u5927\u6982\u5ff5\uff0c\u5206\u6790\u5f53\u524dAI\u7f3a\u4e4f\u5f00\u653e\u5f0f\u521b\u65b0\u80fd\u529b\u7684\u7ed3\u6784\u6027\u6839\u6e90", "upvotes": 0, "what_it_is": "\u672c\u6587\u4ece\u7406\u8bba\u5c42\u9762\u5256\u6790\u73b0\u6709AI\u7cfb\u7edf\u7684\u6838\u5fc3\u5c40\u9650\uff1a\u5176\u8868\u5f81\u6846\u67b6\uff08\u6982\u5ff5\u8bcd\u6c47\u3001\u89e3\u7a7a\u95f4\u3001\u8bc4\u4f30\u6807\u51c6\uff09\u5747\u9884\u5148\u56fa\u5b9a\uff0c\u65e0\u6cd5\u81ea\u4e3b\u521b\u9020\u65b0\u7684\u8868\u5f81\u539f\u8bed\u3002\u4f5c\u8005\u63d0\u51fa\"\u8ba4\u77e5\u5dee\u5f02\u6d88\u51cf\"\u7edf\u4e00\u6846\u67b6\uff0c\u533a\u5206\u6846\u67b6\u5185\u53d8\u6362\u4e0e\u751f\u6210\u6027\u53d8\u6362\uff0c\u5e76\u6784\u5efa\"\u521b\u65b0\u81ea\u4e3b\u6027\u9636\u68af\"\u8def\u7ebf\u56fe\u3002", "why_notable": "\u7cfb\u7edf\u6027\u5730\u5c06\"\u5f00\u653e\u5f0f\u521b\u65b0\"\u80fd\u529b\u7f3a\u53e3\u5f62\u5f0f\u5316\uff0c\u4e3a\u8d85\u8d8a\u5f53\u524dLLM\u8303\u5f0f\u63d0\u4f9b\u7406\u8bba\u6846\u67b6\uff0c\u5bf9AGI\u8def\u7ebf\u56fe\u548c\u5143\u5b66\u4e60\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "Large language model (LLM) coding agents are increasingly deployed to autonomously perform software engineering tasks in terminal-based environments, making their reliability a growing concern. Existing empirical studies investigate why coding agents fail, yet they largely treat failure as a final outcome rather than a temporal process, providing limited insight into how failures emerge, evolve, and become unrecoverable. We present the first large-scale empirical study of CLI coding-agent failure trajectories, introducing a process-oriented framework that analyzes failure through its onset, evolution, and recovery across execution trajectories. We first collect 3,843 execution trajectories generated by seven frontier models across three coding-agent scaffolds (OpenHands, MiniSWE, and Terminus2) on Terminal-Bench, then carefully filter them to obtain 1,794 complete and valid trajectories for manual annotation (over 63,000 execution steps), from which we derive 14 findings spanning failure occurrence, root causes, recovery, and cross-system consistency. Our findings show that coding-agent failures are predominantly driven by epistemic errors, typically begin within the first few execution steps, and often remain hidden until recovery is no longer possible, suggesting that improving coding-agent reliability requires earlier validation and intervention rather than relying solely on final-outcome evaluation.", "arxiv_id": "2607.09510", "arxiv_url": "https://arxiv.org/abs/2607.09510", "authors": ["Xiangxin Zhao", "Han Li", "Shuaiting Li", "Tianyi Zhao", "Earl T. Barr", "Federica Sarro", "He Ye"], "brief": "\u63d0\u51fa\u9762\u5411\u8fc7\u7a0b\u7684\u6846\u67b6\uff0c\u5206\u6790CLI\u7f16\u7a0b\u667a\u80fd\u4f53\u5728\u6267\u884c\u8f68\u8ff9\u4e2d\u5931\u8d25\u7684\u53d1\u751f\u3001\u6f14\u5316\u4e0e\u6062\u590d\u673a\u5236\uff0c\u57fa\u4e8e7\u4e2a\u524d\u6cbf\u6a21\u578b\u57283\u4e2a\u811a\u624b\u67b6\u4e0a\u751f\u6210\u76841,794\u6761\u5b8c\u6574\u8f68\u8ff9\uff08\u8d856.3\u4e07\u6267\u884c\u6b65\u9aa4\uff09\u8fdb\u884c\u4eba\u5de5\u6807\u6ce8\uff0c\u5f97\u51fa14\u9879\u53d1\u73b0\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09510", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u5931\u8d25\u4e3b\u8981\u7531\u8ba4\u77e5\u6027\u9519\u8bef\uff08epistemic errors\uff09\u9a71\u52a8\uff0c\u901a\u5e38\u5728\u524d\u51e0\u6b65\u6267\u884c\u4e2d\u5c31\u5df2\u51fa\u73b0", "\u5931\u8d25\u5f80\u5f80\u9690\u85cf\u81f3\u65e0\u6cd5\u6062\u590d\u65f6\u624d\u663e\u73b0\uff0c\u4f9d\u8d56\u6700\u7ec8\u7ed3\u679c\u8bc4\u4f30\u96be\u4ee5\u53ca\u65f6\u5e72\u9884", "\u8de8\u6a21\u578b\u3001\u8de8\u811a\u624b\u67b6\uff08OpenHands\u3001MiniSWE\u3001Terminus2\uff09\u7684\u5931\u8d25\u6a21\u5f0f\u5177\u6709\u4e00\u81f4\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u53ef\u9760\u6027", "\u5b9e\u8bc1\u7814\u7a76"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09510v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Failure as a Process: An Anatomy of CLI Coding Agent Trajectories", "tldr": "\u9996\u4e2a\u5927\u89c4\u6a21CLI\u7f16\u7a0b\u667a\u80fd\u4f53\u5931\u8d25\u8f68\u8ff9\u5b9e\u8bc1\u7814\u7a76\uff0c\u63ed\u793a\u5931\u8d25\u5982\u4f55\u840c\u53d1\u3001\u6f14\u5316\u5e76\u53d8\u5f97\u4e0d\u53ef\u6062\u590d", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u9762\u5411\u8fc7\u7a0b\u7684\u6846\u67b6\uff0c\u5206\u6790CLI\u7f16\u7a0b\u667a\u80fd\u4f53\u5728\u6267\u884c\u8f68\u8ff9\u4e2d\u5931\u8d25\u7684\u53d1\u751f\u3001\u6f14\u5316\u4e0e\u6062\u590d\u673a\u5236\uff0c\u57fa\u4e8e7\u4e2a\u524d\u6cbf\u6a21\u578b\u57283\u4e2a\u811a\u624b\u67b6\u4e0a\u751f\u6210\u76841,794\u6761\u5b8c\u6574\u8f68\u8ff9\uff08\u8d856.3\u4e07\u6267\u884c\u6b65\u9aa4\uff09\u8fdb\u884c\u4eba\u5de5\u6807\u6ce8\uff0c\u5f97\u51fa14\u9879\u53d1\u73b0\u3002", "why_notable": "\u9996\u6b21\u5c06\u7f16\u7a0b\u667a\u80fd\u4f53\u5931\u8d25\u89c6\u4e3a\u65f6\u5e8f\u8fc7\u7a0b\u800c\u975e\u5355\u4e00\u7ed3\u679c\u8fdb\u884c\u7cfb\u7edf\u7814\u7a76\uff0c\u4e3a\u63d0\u5347\u667a\u80fd\u4f53\u53ef\u9760\u6027\u63d0\u4f9b\u4e86\u65e9\u671f\u9a8c\u8bc1\u4e0e\u5e72\u9884\u7684\u65b0\u65b9\u5411\uff0c\u5bf9\u5de5\u4e1a\u754c\u90e8\u7f72LLM\u7f16\u7a0b\u667a\u80fd\u4f53\u5177\u6709\u76f4\u63a5\u6307\u5bfc\u4ef7\u503c\u3002"}, {"abstract": "We present Soofi S 30B-A3B, a sovereign, open-source Mixture-of-Experts (MoE) hybrid Mamba Transformer foundation model for German and English. Its hybrid design activates only 3B of 30B parameters per token and keeps the inference cache near-constant as context grows, giving it a decisive throughput advantage over dense models for long-context, high-concurrency deployment. Pretrained on roughly 27 trillion tokens with deliberately up-weighted German, Soofi S matches dense 14 to 27B models on aggregate English and German benchmarks while achieving the best code aggregates in both languages among 17 open base models, and outperforms every European sovereign baseline in our comparison, including ones far larger in active parameters. Among fully open models, Soofi S obtains the highest English and German evaluation scores, ahead of Olmo 3 32B and Apertus 70B. Soofi S was built end-to-end on the German Industrial AI Cloud, a sovereign HPC scale AI infrastructure operated by Deutsche Telekom in Munich. Soofi S will be released under highly permissive, open-access terms: weights, selected intermediate checkpoints, full per-source data accounting, hyperparameters, and training and evaluation code. Where source licenses permit, data-construction artifacts are released under permissive licenses; commercially licensed sources are documented with aggregate statistics and exact mixture accounting.", "arxiv_id": "2607.09424", "arxiv_url": "https://arxiv.org/abs/2607.09424", "authors": ["The Soofi-Team", ":", "Benedikt Droste", "David Fitzek", "Ruben H\u00e4rle", "Lukas Helff", "Maximilian Idahl", "Alex Jude", "Abbas Goher Khan", "Maurice Kraus", "Timm Ruland", "Richard Rutmann", "Sebastian Sztwiertnia", "Markus Frey", "Daniil Gurgurov", "Jan Pfister", "Tom R\u00f6hr", "Sebastian von Rohrscheidt", "J\u00f6rg Bienert", "Nicolas Flores-Herr", "Simon Gottschalk", "Andreas Hotho", "Kristian Kersting", "Joachim K\u00f6hler", "Alexander L\u00f6ser", "Wolfgang Nejdl", "Simon Ostermann", "Jan Plogsties", "Patrick Putzky", "Mehdi Ali", "Michael Fromm", "Max L\u00fcbbering"], "brief": "\u63d0\u51faSoofi S 30B-A3B\uff0c\u4e00\u4e2a\u9762\u5411\u5fb7\u8bed\u548c\u82f1\u8bed\u7684\u4e3b\u6743\u5f00\u6e90\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09Mamba Transformer\u57fa\u7840\u6a21\u578b\uff0c\u5728\u7ea627\u4e07\u4ebftoken\u4e0a\u9884\u8bad\u7ec3\uff0c\u5fb7\u8bed\u6570\u636e\u523b\u610f\u4e0a\u91c7\u6837\uff0c\u63a8\u7406\u65f6\u6bcftoken\u4ec5\u6fc0\u6d3b3B\u53c2\u6570\u4e14\u4e0a\u4e0b\u6587\u589e\u957f\u65f6\u7f13\u5b58\u8fd1\u4f3c\u6052\u5b9a\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09424", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["MoE\u67b6\u6784\uff1a\u603b\u53c2\u657030B\uff0c\u6bcftoken\u4ec5\u6fc0\u6d3b3B\uff0c\u957f\u4e0a\u4e0b\u6587\u9ad8\u5e76\u53d1\u573a\u666f\u541e\u5410\u91cf\u663e\u8457\u4f18\u4e8e\u7a20\u5bc6\u6a21\u578b", "\u572817\u4e2a\u5f00\u6e90\u57fa\u7840\u6a21\u578b\u4e2d\u82f1\u5fb7\u53cc\u8bed\u4ee3\u7801\u7efc\u5408\u8bc4\u5206\u6700\u9ad8\uff0c\u8d85\u8d8a\u6240\u6709\u6b27\u6d32\u4e3b\u6743\u57fa\u7ebf\u6a21\u578b\uff08\u542b\u66f4\u5927\u6d3b\u8dc3\u53c2\u6570\u91cf\u7684\u6a21\u578b\uff09", "\u5b8c\u5168\u5f00\u653e\uff1a\u6743\u91cd\u3001\u4e2d\u95f4\u68c0\u67e5\u70b9\u3001\u6570\u636e\u914d\u6bd4\u3001\u8d85\u53c2\u6570\u53ca\u8bad\u7ec3\u8bc4\u4f30\u4ee3\u7801\u5168\u90e8\u516c\u5f00\uff0c\u6784\u5efa\u4e8e\u5fb7\u56fd\u7535\u4fe1\u6155\u5c3c\u9ed1\u4e3b\u6743HPC\u57fa\u7840\u8bbe\u65bd"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u6df7\u5408\u4e13\u5bb6", "\u591a\u8bed\u8a00", "\u5f00\u6e90"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09424v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.09424.png", "title": "A Sovereign, Open-Source Foundation Model for German and English", "tldr": "\u5fb7\u82f1\u53cc\u8bed\u4e3b\u6743\u5f00\u6e90MoE\u6df7\u5408Mamba Transformer\u57fa\u7840\u6a21\u578b\uff0c30B\u53c2\u6570\u4ec5\u6fc0\u6d3b3B", "upvotes": 0, "what_it_is": "\u63d0\u51faSoofi S 30B-A3B\uff0c\u4e00\u4e2a\u9762\u5411\u5fb7\u8bed\u548c\u82f1\u8bed\u7684\u4e3b\u6743\u5f00\u6e90\u6df7\u5408\u4e13\u5bb6\uff08MoE\uff09Mamba Transformer\u57fa\u7840\u6a21\u578b\uff0c\u5728\u7ea627\u4e07\u4ebftoken\u4e0a\u9884\u8bad\u7ec3\uff0c\u5fb7\u8bed\u6570\u636e\u523b\u610f\u4e0a\u91c7\u6837\uff0c\u63a8\u7406\u65f6\u6bcftoken\u4ec5\u6fc0\u6d3b3B\u53c2\u6570\u4e14\u4e0a\u4e0b\u6587\u589e\u957f\u65f6\u7f13\u5b58\u8fd1\u4f3c\u6052\u5b9a\u3002", "why_notable": "\u9996\u4e2a\u5728\u5fb7\u82f1\u53cc\u8bed\u4e0a\u8fbe\u5230\u540c\u7ea7\u7a20\u5bc614-27B\u6a21\u578b\u6027\u80fd\u7684\u6b27\u6d32\u4e3b\u6743\u5f00\u6e90MoE\u6a21\u578b\uff0c\u517c\u5177\u9ad8\u6548\u63a8\u7406\u67b6\u6784\u4e0e\u5b8c\u5168\u900f\u660e\u7684\u5f00\u653e\u534f\u8bae\uff0c\u5bf9\u6b27\u6d32AI\u4e3b\u6743\u6218\u7565\u5177\u6709\u91cd\u8981\u793a\u8303\u610f\u4e49"}, {"abstract": "Long-context processing has become increasingly important for large language models (LLMs), but simply extending the context window does not guarantee effective utilization of long inputs. As input length grows, accuracy often degrades, indicating that models still struggle to identify and use the evidence most relevant to a question. A promising way to improve long-context utilization is test-time training (TTT), which treats the test context as a training example for instance-specific parameter adaptation. However, applying TTT to the entire long context is prohibitively expensive, while adapting on randomly sampled spans introduces severe noise. Because most spans in a long context are irrelevant to the specific question, training on them may even degrade the base model\u0027s performance. Our preliminary study shows that TTT is highly sensitive to training-span quality: on LongBench-v2, TTT on randomly sampled spans hurts performance, whereas TTT on oracle spans substantially improves it. Motivated by this, we propose a simple method, Self-Guided TTT (S-TTT): before adaptation, the model identifies the evidence spans it should learn from, and the standard language-modeling training objective is applied only to those selected spans. On two challenging long-context reasoning benchmarks, LongBench-v2 and LongBench-Pro, S-TTT improves accuracy for both Qwen3-4B-Thinking-2507 and Llama-3.1-8B-Instruct, achieving up to a 15% relative improvement.", "arxiv_id": "2607.09415", "arxiv_url": "https://arxiv.org/abs/2607.09415", "authors": ["Xinyu Zhu", "Zhe Xu", "Xiaohan Wei", "Yunchen Pu", "Fei Tian", "Chonglin Sun", "Kaushik Rangadurai", "Hua Zhi", "Frank Shyu", "Sandeep Pandey", "Luke Simon", "Yu Meng", "Xi Liu"], "brief": "\u63d0\u51faSelf-Guided TTT\uff08S-TTT\uff09\u65b9\u6cd5\uff1a\u5728\u6d4b\u8bd5\u65f6\u8ba9\u6a21\u578b\u5148\u81ea\u4e3b\u8bc6\u522b\u4e0e\u95ee\u9898\u76f8\u5173\u7684\u8bc1\u636e\u7247\u6bb5\uff0c\u518d\u4ec5\u5bf9\u8fd9\u4e9b\u9ad8\u8d28\u91cf\u7247\u6bb5\u6267\u884c\u8bed\u8a00\u6a21\u578b\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u73b0\u5b9e\u4f8b\u7ea7\u53c2\u6570\u9002\u5e94\uff0c\u6709\u6548\u63d0\u5347\u957f\u4e0a\u4e0b\u6587\u5229\u7528\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09415", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u968f\u673a\u91c7\u6837\u7247\u6bb5\u505aTTT\u4f1a\u635f\u5bb3\u6027\u80fd\uff0c\u800c\u4f7f\u7528oracle\u5173\u952e\u7247\u6bb5\u505aTTT\u53ef\u5927\u5e45\u63d0\u5347\u6027\u80fd\uff0c\u8bf4\u660e\u8bad\u7ec3\u7247\u6bb5\u8d28\u91cf\u81f3\u5173\u91cd\u8981", "S-TTT\u8ba9\u6a21\u578b\u5728\u9002\u5e94\u524d\u5148\u81ea\u6211\u5b9a\u4f4d\u76f8\u5173\u8bc1\u636e\u7247\u6bb5\uff0c\u907f\u514d\u5728\u65e0\u5173\u5185\u5bb9\u4e0a\u8bad\u7ec3\u5f15\u5165\u566a\u58f0", "\u5728LongBench-v2\u548cLongBench-Pro\u4e0a\uff0c\u5bf9Qwen3-4B\u548cLlama-3.1-8B\u5747\u6709\u6548\uff0c\u6700\u9ad8\u5b9e\u73b015%\u76f8\u5bf9\u63d0\u5347"], "keywords": ["\u957f\u4e0a\u4e0b\u6587", "\u6d4b\u8bd5\u65f6\u8bad\u7ec3", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406"], "num_comments": 0, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09415v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.09415.png", "title": "Self-Guided Test-Time Training for Long-Context LLMs", "tldr": "\u81ea\u5f15\u5bfc\u6d4b\u8bd5\u65f6\u8bad\u7ec3\u8ba9\u957f\u4e0a\u4e0b\u6587LLM\u81ea\u4e3b\u7b5b\u9009\u5173\u952e\u8bc1\u636e\u7247\u6bb5\u8fdb\u884c\u9002\u5e94\uff0c\u63d0\u5347\u63a8\u7406\u51c6\u786e\u7387\u8fbe15%", "upvotes": 0, "what_it_is": "\u63d0\u51faSelf-Guided TTT\uff08S-TTT\uff09\u65b9\u6cd5\uff1a\u5728\u6d4b\u8bd5\u65f6\u8ba9\u6a21\u578b\u5148\u81ea\u4e3b\u8bc6\u522b\u4e0e\u95ee\u9898\u76f8\u5173\u7684\u8bc1\u636e\u7247\u6bb5\uff0c\u518d\u4ec5\u5bf9\u8fd9\u4e9b\u9ad8\u8d28\u91cf\u7247\u6bb5\u6267\u884c\u8bed\u8a00\u6a21\u578b\u8bad\u7ec3\u76ee\u6807\uff0c\u5b9e\u73b0\u5b9e\u4f8b\u7ea7\u53c2\u6570\u9002\u5e94\uff0c\u6709\u6548\u63d0\u5347\u957f\u4e0a\u4e0b\u6587\u5229\u7528\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63ed\u793aTTT\u5bf9\u8bad\u7ec3\u7247\u6bb5\u8d28\u91cf\u7684\u9ad8\u5ea6\u654f\u611f\u6027\uff0c\u5e76\u63d0\u51fa\u65e0\u9700\u989d\u5916\u6807\u6ce8\u7684\u81ea\u5f15\u5bfc\u89e3\u51b3\u65b9\u6848\uff0c\u4e3a\u957f\u4e0a\u4e0b\u6587\u63a8\u7406\u63d0\u4f9b\u4e86\u8f7b\u91cf\u7ea7\u3001\u5373\u63d2\u5373\u7528\u7684\u6d4b\u8bd5\u65f6\u589e\u5f3a\u8303\u5f0f\u3002"}, {"abstract": "Answering complex questions over long documents frequently requires integrating evidence that the source itself disperses naturally across distant passages. In an incident report, the operating condition, design flaw, and missed safety check that jointly explain a disaster may appear dozens of sections apart; in a novel, a character\u0027s true motive may surface only through scenes far removed from the moment it becomes relevant. This source-internal evidence integration is central to real-world long-document analysis, yet existing benchmarks largely sidestep it. Needle probes, planted facts, and reverse-engineered multi-hop chains embed evidence that may differ from the host text in distribution, placement, or register, making it unclear whether strong performance reflects genuine source reasoning or distributional artifacts. We introduce WILDTRACE, a benchmark of 481 tasks over 214 naturally occurring long-form sources such as technical incident reports and lesser-known literary narratives, where all evidence trails arise from the document\u0027s own causal, temporal, and narrative logic. Drawing on Pearl\u0027s causal hierarchy and prior multi-hop reasoning typologies, we define seven source-internal evidence geometries that characterize the distinct relational demands of analytical reading in long documents. A source-first construction pipeline mines candidate trails from document structure before writing questions; each item then undergoes multi-stage validation covering clue necessity, answer groundedness, rubric fidelity, contamination resistance and answerability. As models are increasingly entrusted with real-world high-stakes analytical tasks, this gap between accessing information and reasoning over naturally dispersed evidence emerges as a defining challenge for the next stage of long-context research.", "arxiv_id": "2607.09328", "arxiv_url": "https://arxiv.org/abs/2607.09328", "authors": ["Zixin Chen", "Peng Liu", "Haobo Li", "Rui Sheng", "Jianhong Tu", "Xiaodong Deng", "Fei Huang", "Kashun Shum", "Dayiheng Liu", "Huamin Qu"], "brief": "\u63d0\u51faWILDTRACE\u57fa\u51c6\uff0c\u5305\u542b214\u7bc7\u771f\u5b9e\u957f\u6587\u6863\uff08\u6280\u672f\u4e8b\u6545\u62a5\u544a\u3001\u6587\u5b66\u53d9\u4e8b\u7b49\uff09\u4e0a\u7684481\u4e2a\u4efb\u52a1\uff0c\u6240\u6709\u8bc1\u636e\u94fe\u5747\u6e90\u81ea\u6587\u6863\u81ea\u8eab\u7684\u56e0\u679c\u3001\u65f6\u5e8f\u548c\u53d9\u4e8b\u903b\u8f91\uff0c\u800c\u975e\u4eba\u5de5\u690d\u5165\uff0c\u7528\u4e8e\u8bc4\u4f30\u6a21\u578b\u5728\u957f\u6587\u6863\u4e2d\u6574\u5408\u81ea\u7136\u5206\u6563\u8bc1\u636e\u7684\u63a8\u7406\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09328", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5b9a\u4e497\u79cd\u6e90\u5185\u8bc1\u636e\u51e0\u4f55\u7ed3\u6784\uff0c\u57fa\u4e8ePearl\u56e0\u679c\u5c42\u6b21\u548c\u591a\u8df3\u63a8\u7406\u7c7b\u578b\u5b66\uff0c\u523b\u753b\u5206\u6790\u6027\u9605\u8bfb\u7684\u4e0d\u540c\u5173\u7cfb\u9700\u6c42", "\u91c7\u7528\"\u6587\u6863\u4f18\u5148\"\u6784\u5efa\u6d41\u7a0b\uff1a\u5148\u4ece\u6587\u6863\u7ed3\u6784\u4e2d\u6316\u6398\u5019\u9009\u8bc1\u636e\u94fe\uff0c\u518d\u64b0\u5199\u95ee\u9898\uff0c\u5e76\u7ecf\u591a\u9636\u6bb5\u9a8c\u8bc1\uff08\u7ebf\u7d22\u5fc5\u8981\u6027\u3001\u7b54\u6848\u53ef\u6eaf\u6e90\u6027\u3001\u6c61\u67d3\u6297\u6027\u7b49\uff09", "\u73b0\u6709\u57fa\u51c6\uff08\u9488\u523a\u63a2\u6d4b\u3001\u690d\u5165\u4e8b\u5b9e\u3001\u9006\u5411\u5de5\u7a0b\u591a\u8df3\u94fe\uff09\u5b58\u5728\u5206\u5e03\u504f\u5dee\uff0c\u65e0\u6cd5\u771f\u5b9e\u53cd\u6620\u6a21\u578b\u5bf9\u6e90\u6587\u6863\u7684\u63a8\u7406\u80fd\u529b"], "keywords": ["\u957f\u4e0a\u4e0b\u6587\u63a8\u7406", "\u57fa\u51c6\u6d4b\u8bd5", "\u591a\u8df3\u63a8\u7406", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09328v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "WILDTRACE: Benchmarking Natural Evidence Trails in Long-Context Reasoning", "tldr": "WILDTRACE\uff1a\u57fa\u4e8e\u771f\u5b9e\u957f\u6587\u6863\u81ea\u7136\u8bc1\u636e\u94fe\u7684\u957f\u4e0a\u4e0b\u6587\u63a8\u7406\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faWILDTRACE\u57fa\u51c6\uff0c\u5305\u542b214\u7bc7\u771f\u5b9e\u957f\u6587\u6863\uff08\u6280\u672f\u4e8b\u6545\u62a5\u544a\u3001\u6587\u5b66\u53d9\u4e8b\u7b49\uff09\u4e0a\u7684481\u4e2a\u4efb\u52a1\uff0c\u6240\u6709\u8bc1\u636e\u94fe\u5747\u6e90\u81ea\u6587\u6863\u81ea\u8eab\u7684\u56e0\u679c\u3001\u65f6\u5e8f\u548c\u53d9\u4e8b\u903b\u8f91\uff0c\u800c\u975e\u4eba\u5de5\u690d\u5165\uff0c\u7528\u4e8e\u8bc4\u4f30\u6a21\u578b\u5728\u957f\u6587\u6863\u4e2d\u6574\u5408\u81ea\u7136\u5206\u6563\u8bc1\u636e\u7684\u63a8\u7406\u80fd\u529b\u3002", "why_notable": "\u586b\u8865\u4e86\u957f\u4e0a\u4e0b\u6587\u57fa\u51c6\u6d4b\u8bd5\u4e2d\"\u81ea\u7136\u8bc1\u636e\u6574\u5408\"\u7684\u7a7a\u767d\uff0c\u907f\u514d\u4e86\u4eba\u5de5\u690d\u5165\u8bc1\u636e\u5e26\u6765\u7684\u5206\u5e03\u4f2a\u5f71\uff0c\u66f4\u8d34\u8fd1\u771f\u5b9e\u9ad8\u98ce\u9669\u5206\u6790\u573a\u666f\uff0c\u4e3a\u4e0b\u4e00\u9636\u6bb5\u957f\u4e0a\u4e0b\u6587\u7814\u7a76\u63d0\u4f9b\u66f4\u53ef\u9760\u7684\u8bc4\u4f30\u5de5\u5177\u3002"}, {"abstract": "We present ARCANA, a collaborative multi agent framework for solving ARC AGI 2 tasks under strict test time and hardware constraints. ARCANA decomposes each task into iterative perception, hypothesis generation, symbolic execution, and reflective refinement. A perceptual grounding agent builds object centric scene graphs from raw grids, a latent program policy proposes diverse DSL programs, a symbolic executor verifies candidates on demonstrations, and a reflective agent synthesizes failure driven feedback for the next turn. These agents communicate through a shared differentiable blackboard and are scheduled by a learned meta controller. The design combines structured program search with adaptive multi turn correction, improving reasoning efficiency and solution quality on challenging abstract transformation tasks.", "arxiv_id": "2607.09059", "arxiv_url": "https://arxiv.org/abs/2607.09059", "authors": ["Kunbo Zhang", "Lei Fu", "Zeyu Wang", "Zijing Liu", "Kejian Tong"], "brief": "\u63d0\u51faARCANA\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u89e3\u51b3ARC-AGI-2\u62bd\u8c61\u63a8\u7406\u4efb\u52a1\uff0c\u5c06\u4efb\u52a1\u5206\u89e3\u4e3a\u611f\u77e5\u5efa\u56fe\u3001DSL\u7a0b\u5e8f\u751f\u6210\u3001\u7b26\u53f7\u6267\u884c\u9a8c\u8bc1\u548c\u53cd\u601d\u4fee\u6b63\u56db\u4e2a\u8fed\u4ee3\u9636\u6bb5\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09059", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u611f\u77e5\u63a5\u5730\u667a\u80fd\u4f53\u4ece\u539f\u59cb\u7f51\u683c\u6784\u5efa\u4ee5\u5bf9\u8c61\u4e3a\u4e2d\u5fc3\u7684\u573a\u666f\u56fe\uff0c\u652f\u6301\u7ed3\u6784\u5316\u7406\u89e3", "\u6f5c\u5728\u7a0b\u5e8f\u7b56\u7565\u751f\u6210\u591a\u6837\u5316DSL\u5019\u9009\u7a0b\u5e8f\uff0c\u7b26\u53f7\u6267\u884c\u5668\u5728\u793a\u4f8b\u4e0a\u9a8c\u8bc1\u6b63\u786e\u6027", "\u53cd\u601d\u667a\u80fd\u4f53\u57fa\u4e8e\u5931\u8d25\u53cd\u9988\u9a71\u52a8\u4e0b\u4e00\u8f6e\u4fee\u6b63\uff0c\u5404\u667a\u80fd\u4f53\u901a\u8fc7\u5171\u4eab\u53ef\u5fae\u9ed1\u677f\u901a\u4fe1\u5e76\u7531\u5143\u63a7\u5236\u5668\u8c03\u5ea6"], "keywords": ["\u667a\u80fd\u4f53", "\u7a0b\u5e8f\u5408\u6210", "\u62bd\u8c61\u63a8\u7406", "\u7b26\u53f7\u6267\u884c"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09059v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ARCANA: A Reflective Multi-Agent Program Synthesis Framework for ARC-AGI-2 Reasoning", "tldr": "ARCANA\uff1a\u9762\u5411ARC-AGI-2\u7684\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u7a0b\u5e8f\u5408\u6210\u6846\u67b6\uff0c\u878d\u5408\u611f\u77e5\u3001\u5047\u8bbe\u751f\u6210\u4e0e\u53cd\u601d\u4fee\u6b63", "upvotes": 0, "what_it_is": "\u63d0\u51faARCANA\u6846\u67b6\uff0c\u901a\u8fc7\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u89e3\u51b3ARC-AGI-2\u62bd\u8c61\u63a8\u7406\u4efb\u52a1\uff0c\u5c06\u4efb\u52a1\u5206\u89e3\u4e3a\u611f\u77e5\u5efa\u56fe\u3001DSL\u7a0b\u5e8f\u751f\u6210\u3001\u7b26\u53f7\u6267\u884c\u9a8c\u8bc1\u548c\u53cd\u601d\u4fee\u6b63\u56db\u4e2a\u8fed\u4ee3\u9636\u6bb5\u3002", "why_notable": "ARC-AGI-2\u662f\u5f53\u524d\u6700\u5177\u6311\u6218\u6027\u7684\u62bd\u8c61\u63a8\u7406\u57fa\u51c6\u4e4b\u4e00\uff0cARCANA\u5c06\u795e\u7ecf\u611f\u77e5\u3001\u7b26\u53f7\u6267\u884c\u4e0e\u591a\u8f6e\u53cd\u601d\u4fee\u6b63\u7ed3\u5408\uff0c\u5728\u4e25\u683c\u8d44\u6e90\u7ea6\u675f\u4e0b\u63d0\u5347\u63a8\u7406\u6548\u7387\uff0c\u4e3a\u7a0b\u5e8f\u5408\u6210\u4e0eAGI\u63a8\u7406\u7814\u7a76\u63d0\u4f9b\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Despite strong performance on many multimodal tasks, vision-language models (VLMs) still struggle with basic object counting. We investigate whether this reflects missing internal knowledge or a gap between internal representations and verbalized outputs. Training simple probes on activations from four VLMs across five counting datasets reveals that nonlinear probes can reliably detect counting errors, suggesting that VLMs often encode the correct count even when they output the wrong answer. SVCCA analysis shows that probes trained on ground-truth counts and probes trained on model outputs occupy a partially shared activation subspace but read out along misaligned directions. We further validate our findings using a causal steering intervention, proving that strengthening the direction of count-identified probes does improve model counting performance. Motivated by this result, we propose a detector-guided self-correction method that selectively re-prompts the model only when an internal error detector predicts failure. This simple inference-time intervention improves counting accuracy by up to 15.6 absolute percentage points, without any parameter updates. Our results establish activation-based error probing as both a practical tool for improving VLM counting and a mechanistic lens on the gap between internal knowledge and model outputs.", "arxiv_id": "2607.09544", "arxiv_url": "https://arxiv.org/abs/2607.09544", "authors": ["Ahmed Oumar El-Shangiti", "Abzal Nurgazy", "Hilal AlQuabeh", "Nikolai Rozanov", "Kentaro Inui"], "brief": "\u7814\u7a76\u53d1\u73b0\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u5728\u8ba1\u6570\u4efb\u52a1\u4e0a\u7684\u5931\u8d25\u5e76\u975e\u6e90\u4e8e\u5185\u90e8\u77e5\u8bc6\u7f3a\u5931\uff0c\u800c\u662f\u5185\u90e8\u8868\u793a\u4e0e\u8f93\u51fa\u4e4b\u95f4\u7684\u5bf9\u9f50\u504f\u5dee\uff1b\u63d0\u51fa\u57fa\u4e8e\u6fc0\u6d3b\u63a2\u9488\u7684\u68c0\u6d4b\u5668\u5f15\u5bfc\u81ea\u6821\u6b63\u65b9\u6cd5\uff0c\u5728\u63a8\u7406\u65f6\u9009\u62e9\u6027\u91cd\u63d0\u793a\u4ee5\u4fee\u6b63\u8ba1\u6570\u9519\u8bef\u3002", "categories": ["cs.CV", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09544", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u57284\u4e2aVLM\u30015\u4e2a\u8ba1\u6570\u6570\u636e\u96c6\u4e0a\u8bad\u7ec3\u975e\u7ebf\u6027\u63a2\u9488\uff0c\u53d1\u73b0\u6a21\u578b\u5185\u90e8\u6fc0\u6d3b\u901a\u5e38\u5df2\u7f16\u7801\u6b63\u786e\u8ba1\u6570\uff0c\u4f46\u8f93\u51fa\u65b9\u5411\u5b58\u5728\u504f\u5dee", "SVCCA\u5206\u6790\u63ed\u793a\u771f\u5b9e\u8ba1\u6570\u63a2\u9488\u4e0e\u6a21\u578b\u8f93\u51fa\u63a2\u9488\u5171\u4eab\u90e8\u5206\u6fc0\u6d3b\u5b50\u7a7a\u95f4\uff0c\u4f46\u8bfb\u51fa\u65b9\u5411\u4e0d\u5bf9\u9f50", "\u56e0\u679c\u5f15\u5bfc\u5e72\u9884\u9a8c\u8bc1\u4e86\u63a2\u9488\u65b9\u5411\u7684\u6709\u6548\u6027\uff1b\u68c0\u6d4b\u5668\u5f15\u5bfc\u81ea\u6821\u6b63\u65b9\u6cd5\u65e0\u9700\u53c2\u6570\u66f4\u65b0\uff0c\u8ba1\u6570\u51c6\u786e\u7387\u6700\u9ad8\u63d0\u534715.6\u4e2a\u767e\u5206\u70b9"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8bed\u8a00\u6a21\u578b", "\u6fc0\u6d3b\u63a2\u9488", "\u6a21\u578b\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09544v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "The Count Is There, but Misaligned: Understanding and Correcting Counting Failures in VLMs", "tldr": "VLM\u5185\u90e8\u5df2\u7f16\u7801\u6b63\u786e\u8ba1\u6570\u4f46\u8f93\u51fa\u9519\u8bef\uff0c\u63a2\u9488\u5f15\u5bfc\u81ea\u6821\u6b63\u53ef\u63d0\u534715.6%\u51c6\u786e\u7387", "upvotes": 0, "what_it_is": "\u7814\u7a76\u53d1\u73b0\u89c6\u89c9\u8bed\u8a00\u6a21\u578b\uff08VLM\uff09\u5728\u8ba1\u6570\u4efb\u52a1\u4e0a\u7684\u5931\u8d25\u5e76\u975e\u6e90\u4e8e\u5185\u90e8\u77e5\u8bc6\u7f3a\u5931\uff0c\u800c\u662f\u5185\u90e8\u8868\u793a\u4e0e\u8f93\u51fa\u4e4b\u95f4\u7684\u5bf9\u9f50\u504f\u5dee\uff1b\u63d0\u51fa\u57fa\u4e8e\u6fc0\u6d3b\u63a2\u9488\u7684\u68c0\u6d4b\u5668\u5f15\u5bfc\u81ea\u6821\u6b63\u65b9\u6cd5\uff0c\u5728\u63a8\u7406\u65f6\u9009\u62e9\u6027\u91cd\u63d0\u793a\u4ee5\u4fee\u6b63\u8ba1\u6570\u9519\u8bef\u3002", "why_notable": "\u9996\u6b21\u4ece\u673a\u5236\u5c42\u9762\u533a\u5206VLM\u8ba1\u6570\u5931\u8d25\u7684\u4e24\u79cd\u539f\u56e0\uff08\u77e5\u8bc6\u7f3a\u5931 vs \u5bf9\u9f50\u504f\u5dee\uff09\uff0c\u5e76\u63d0\u51fa\u65e0\u9700\u8bad\u7ec3\u7684\u63a8\u7406\u65f6\u4fee\u6b63\u65b9\u6848\uff0c\u5bf9\u7406\u89e3\u548c\u6539\u8fdbVLM\u5185\u90e8\u8868\u793a\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Within-class variance in language-model representations is commonly read as incomplete neural collapse. We argue it is allocated information storage, and that the allocation obeys a law. A one-line centering identity voids a family of simplex equiangular-tight-frame claims, including our own earlier ones; in dimensionless variance shares across 14 models, macro-category structure carries only 4-12% of representational variance and within-token context carries 79-91%, stable across a 100x parameter range. On the theory side, token-level weight decay penalizes a category in proportion to its type count, not its occurrence mass, reducing next-token prediction to an imbalanced K-class problem whose optimum orders category norms by type count. A converse floor, proved for binary categories, forces within-category dispersion to be at least proportional to the conditional mutual information I(token; context | category). The law holds: identity dispersion, not total variance, tracks this information across every tested model and partition, under a model-free estimate and even across models, where one model\u0027s information predicts another\u0027s dispersion; and over pretraining the category share overshoots, decays, and partially recovers, because the information it must carry never left.", "arxiv_id": "2607.09487", "arxiv_url": "https://arxiv.org/abs/2607.09487", "authors": ["Bruno Abrahao"], "brief": "\u672c\u6587\u8bba\u8bc1\u8bed\u8a00\u6a21\u578b\u8868\u793a\u4e2d\u7684\u7c7b\u5185\u65b9\u5dee\u5e76\u975e\"\u4e0d\u5b8c\u5168\u795e\u7ecf\u574d\u7f29\"\uff0c\u800c\u662f\u6709\u610f\u4e49\u7684\u4fe1\u606f\u5206\u914d\uff0c\u5e76\u4ece\u7406\u8bba\u4e0a\u8bc1\u660e\u7c7b\u5185\u79bb\u6563\u5ea6\u5b58\u5728\u4e0e\u6761\u4ef6\u4e92\u4fe1\u606f\u6210\u6b63\u6bd4\u7684\u4e0b\u754c\u5b9a\u5f8b\u3002", "categories": ["cs.LG", "cs.CL", "stat.ML"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09487", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8de814\u4e2a\u6a21\u578b\u7684\u5b9e\u9a8c\u663e\u793a\uff1a\u5b8f\u7c7b\u522b\u7ed3\u6784\u4ec5\u643a\u5e264-12%\u7684\u8868\u793a\u65b9\u5dee\uff0c\u800c\u8bcd\u5185\u4e0a\u4e0b\u6587\u643a\u5e2679-91%\uff0c\u5728100\u500d\u53c2\u6570\u89c4\u6a21\u8303\u56f4\u5185\u7a33\u5b9a", "\u7406\u8bba\u8bc1\u660e\uff1atoken\u7ea7\u6743\u91cd\u8870\u51cf\u6309\u7c7b\u578b\u6570\u800c\u975e\u51fa\u73b0\u9891\u6b21\u60e9\u7f5a\u7c7b\u522b\uff0c\u5bfc\u81f4\u7c7b\u522b\u8303\u6570\u6309\u7c7b\u578b\u6570\u6392\u5e8f\uff0c\u5c06\u4e0b\u4e00token\u9884\u6d4b\u7b80\u5316\u4e3a\u4e0d\u5e73\u8861K\u7c7b\u95ee\u9898", "\u8bc1\u660e\u4e86\u4e8c\u5143\u7c7b\u522b\u7684\u65b9\u5dee\u4e0b\u754c\uff1a\u7c7b\u5185\u79bb\u6563\u5ea6\u81f3\u5c11\u4e0e\u6761\u4ef6\u4e92\u4fe1\u606fI(token; context | category)\u6210\u6b63\u6bd4\uff0c\u4e14\u8de8\u6a21\u578b\u9884\u6d4b\u6210\u7acb"], "keywords": ["\u8868\u793a\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b", "\u4fe1\u606f\u8bba", "\u795e\u7ecf\u574d\u7f29"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09487v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Neural Collapse Is Forbidden: Information Floors in Language Models", "tldr": "\u8bed\u8a00\u6a21\u578b\u8868\u793a\u4e2d\u7684\u7c7b\u5185\u65b9\u5dee\u662f\u4fe1\u606f\u5b58\u50a8\u800c\u975e\u795e\u7ecf\u574d\u7f29\uff0c\u4e14\u9075\u5faa\u53ef\u8bc1\u660e\u7684\u4fe1\u606f\u4e0b\u754c\u5b9a\u5f8b", "upvotes": 0, "what_it_is": "\u672c\u6587\u8bba\u8bc1\u8bed\u8a00\u6a21\u578b\u8868\u793a\u4e2d\u7684\u7c7b\u5185\u65b9\u5dee\u5e76\u975e\"\u4e0d\u5b8c\u5168\u795e\u7ecf\u574d\u7f29\"\uff0c\u800c\u662f\u6709\u610f\u4e49\u7684\u4fe1\u606f\u5206\u914d\uff0c\u5e76\u4ece\u7406\u8bba\u4e0a\u8bc1\u660e\u7c7b\u5185\u79bb\u6563\u5ea6\u5b58\u5728\u4e0e\u6761\u4ef6\u4e92\u4fe1\u606f\u6210\u6b63\u6bd4\u7684\u4e0b\u754c\u5b9a\u5f8b\u3002", "why_notable": "\u63a8\u7ffb\u4e86\u8bed\u8a00\u6a21\u578b\u4e2d\u795e\u7ecf\u574d\u7f29\u7684\u4e3b\u6d41\u89e3\u8bfb\uff0c\u63d0\u4f9b\u4e86\u4e25\u683c\u7684\u4fe1\u606f\u8bba\u4e0b\u754c\u8bc1\u660e\uff0c\u63ed\u793a\u4e86\u8868\u793a\u5b66\u4e60\u4e2d\u65b9\u5dee\u5206\u914d\u7684\u666e\u904d\u89c4\u5f8b\uff0c\u5bf9\u7406\u89e3\u5927\u6a21\u578b\u8868\u793a\u7ed3\u6784\u5177\u6709\u91cd\u8981\u7406\u8bba\u610f\u4e49"}, {"abstract": "Machine unlearning in LLMs is the targeted removal of specific knowledge while preserving all other capabilities, critical for privacy and safety. Yet existing benchmarks measure it unreliably. They miss knowledge that resurfaces under paraphrased or indirect queries, a failure we call under-forgetting, and lack the semantic, syntactic, and lexical probes needed to verify that unrelated knowledge is preserved, a failure we call over-forgetting. Both failures reflect an asymmetric generalization problem. Forget evaluation must cover diverse query formulations of the same target facts, testing whether forgetting holds beyond exact training prompts. Retain evaluation must probe a far larger and implicitly defined set, namely every fact disjoint from the forget target. The retain set thus defines the effective forget set, yet current datasets provide no fine-grained annotation of this forget-retain boundary. We address this with SUITE, an evaluation protocol and training corpus that captures forget-retain structure for real-world factual domains. Methods trained on SUITE improve substantially, showing that training data is as important as algorithmic design. Building on the obtained insights, we introduce JensUn++, an unlearning algorithm that achieves the best forget-retain utility trade-off across three LLMs, in both sequential and joint unlearning settings. Code and datasets are available at https://amitpeleg.github.io/forget-narrowly-retain-broadly", "arxiv_id": "2607.09236", "arxiv_url": "https://arxiv.org/abs/2607.09236", "authors": ["Amit Peleg", "Naman Deep Singh", "Naama Pearl", "Bibhabasu Mohapatra", "Matthias Hein"], "brief": "\u672c\u6587\u5c06LLM\u673a\u5668\u9057\u5fd8\u91cd\u65b0\u5b9a\u4e49\u4e3a\u975e\u5bf9\u79f0\u6cdb\u5316\u95ee\u9898\uff0c\u63d0\u51faSUITE\u8bc4\u4f30\u534f\u8bae\uff08\u542b\u8bad\u7ec3\u8bed\u6599\uff09\u4ee5\u7cbe\u7ec6\u523b\u753b\u9057\u5fd8-\u4fdd\u7559\u8fb9\u754c\uff0c\u5e76\u57fa\u4e8e\u6b64\u8bbe\u8ba1JensUn++\u7b97\u6cd5\uff0c\u5728\u4e09\u79cdLLM\u4e0a\u5b9e\u73b0\u6700\u4f18\u9057\u5fd8-\u4fdd\u7559\u6743\u8861\u3002", "categories": ["cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09236", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u8bc6\u522b\u73b0\u6709\u57fa\u51c6\u7684\u4e24\u7c7b\u7f3a\u9677\uff1a\u6b20\u9057\u5fd8\uff08\u6539\u5199\u67e5\u8be2\u540e\u77e5\u8bc6\u590d\u73b0\uff09\u4e0e\u8fc7\u9057\u5fd8\uff08\u65e0\u5173\u77e5\u8bc6\u88ab\u8bef\u5220\uff09\uff0c\u7edf\u4e00\u5f52\u56e0\u4e3a\u975e\u5bf9\u79f0\u6cdb\u5316\u95ee\u9898", "SUITE\u63d0\u4f9b\u7ec6\u7c92\u5ea6\u9057\u5fd8-\u4fdd\u7559\u8fb9\u754c\u6807\u6ce8\uff0c\u8986\u76d6\u8bed\u4e49\u3001\u53e5\u6cd5\u3001\u8bcd\u6c47\u591a\u7ef4\u5ea6\u63a2\u9488\uff0c\u5b9e\u9a8c\u8868\u660e\u8bad\u7ec3\u6570\u636e\u8d28\u91cf\u4e0e\u7b97\u6cd5\u8bbe\u8ba1\u540c\u7b49\u91cd\u8981", "JensUn++\u7b97\u6cd5\u5728\u987a\u5e8f\u4e0e\u8054\u5408\u9057\u5fd8\u4e24\u79cd\u8bbe\u7f6e\u4e0b\u5747\u4f18\u4e8e\u73b0\u6709\u65b9\u6cd5\uff0c\u5728\u4e09\u4e2aLLM\u4e0a\u53d6\u5f97\u6700\u4f73\u9057\u5fd8-\u4fdd\u7559\u6548\u7528\u6743\u8861"], "keywords": ["\u673a\u5668\u9057\u5fd8", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8bc4\u4f30\u57fa\u51c6", "\u9690\u79c1\u5b89\u5168"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09236v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Forget Narrowly, Retain Broadly: Unlearning as an Asymmetric Generalization Problem", "tldr": "\u63d0\u51faSUITE\u8bc4\u4f30\u534f\u8bae\u4e0eJensUn++\u7b97\u6cd5\uff0c\u7cfb\u7edf\u89e3\u51b3LLM\u673a\u5668\u9057\u5fd8\u4e2d\u7684\u6b20\u9057\u5fd8\u4e0e\u8fc7\u9057\u5fd8\u95ee\u9898", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06LLM\u673a\u5668\u9057\u5fd8\u91cd\u65b0\u5b9a\u4e49\u4e3a\u975e\u5bf9\u79f0\u6cdb\u5316\u95ee\u9898\uff0c\u63d0\u51faSUITE\u8bc4\u4f30\u534f\u8bae\uff08\u542b\u8bad\u7ec3\u8bed\u6599\uff09\u4ee5\u7cbe\u7ec6\u523b\u753b\u9057\u5fd8-\u4fdd\u7559\u8fb9\u754c\uff0c\u5e76\u57fa\u4e8e\u6b64\u8bbe\u8ba1JensUn++\u7b97\u6cd5\uff0c\u5728\u4e09\u79cdLLM\u4e0a\u5b9e\u73b0\u6700\u4f18\u9057\u5fd8-\u4fdd\u7559\u6743\u8861\u3002", "why_notable": "\u9996\u6b21\u5c06\u673a\u5668\u9057\u5fd8\u7684\u8bc4\u4f30\u5931\u6548\u7cfb\u7edf\u5316\u4e3a\u975e\u5bf9\u79f0\u6cdb\u5316\u89c6\u89d2\uff0c\u63d0\u4f9b\u53ef\u590d\u7528\u7684\u8bc4\u4f30\u534f\u8bae\u4e0e\u6570\u636e\u96c6\uff0c\u5bf9\u9690\u79c1\u5408\u89c4\u548c\u5b89\u5168\u5bf9\u9f50\u5177\u6709\u76f4\u63a5\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Recent work has reported Emergent Misalignment (EM), where language models fine-tuned on narrow, domain-specific misaligned datasets abruptly acquire broadly misaligned behavior, alongside evidence that this behavior can be reversed through limited realignment. We systematically study repeated alignment and misalignment cycles using controlled fine-tuning loops while tracking behavioral performance, and LoRA representations throughout training. Although we reproduce EM, we find that both misalignment and realignment are highly sensitive to superficial dataset characteristics, with apparent rapid realignment largely disappearing after controlling for response-length differences. We further find that previously reported mechanistic signatures, including representational phase transitions in LoRA space, do not consistently correlate with behavioral misalignment across training. Our results suggest that current evidence for EM is less robust than previously claimed and highlight the need for evaluation protocols that carefully control for these surface level dataset artifacts to identify the robustness of the EM phenomenon.", "arxiv_id": "2607.09053", "arxiv_url": "https://arxiv.org/abs/2607.09053", "authors": ["Abhinav Rao", "Liancheng Gong", "Bin Hu", "Atharva Naik"], "brief": "\u672c\u6587\u7cfb\u7edf\u6027\u5730\u91cd\u590d\u7814\u7a76\u4e86\u8bed\u8a00\u6a21\u578b\u7684\"\u6d8c\u73b0\u6027\u9519\u4f4d\"\uff08EM\uff09\u4e0e\u91cd\u5bf9\u9f50\u73b0\u8c61\uff0c\u901a\u8fc7\u63a7\u5236\u53d8\u91cf\u5b9e\u9a8c\u53d1\u73b0\u8be5\u73b0\u8c61\u5bf9\u6570\u636e\u96c6\u8868\u9762\u7279\u5f81\uff08\u5982\u56de\u590d\u957f\u5ea6\uff09\u9ad8\u5ea6\u654f\u611f\uff0c\u6b64\u524d\u62a5\u544a\u7684\u5feb\u901f\u91cd\u5bf9\u9f50\u6548\u679c\u5728\u63a7\u5236\u957f\u5ea6\u5dee\u5f02\u540e\u57fa\u672c\u6d88\u5931\u3002", "categories": ["cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09053", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6210\u529f\u590d\u73b0\u4e86EM\u73b0\u8c61\uff0c\u4f46\u53d1\u73b0\u9519\u4f4d\u4e0e\u91cd\u5bf9\u9f50\u5747\u5bf9\u6570\u636e\u96c6\u8868\u9762\u7279\u5f81\uff08\u5982\u56de\u590d\u957f\u5ea6\uff09\u6781\u4e3a\u654f\u611f", "\u63a7\u5236\u56de\u590d\u957f\u5ea6\u5dee\u5f02\u540e\uff0c\u6b64\u524d\u62a5\u544a\u7684\"\u5feb\u901f\u91cd\u5bf9\u9f50\"\u6548\u679c\u57fa\u672c\u6d88\u5931", "LoRA\u7a7a\u95f4\u4e2d\u7684\u8868\u5f81\u76f8\u53d8\u7b49\u673a\u5236\u6027\u7279\u5f81\u4e0e\u884c\u4e3a\u9519\u4f4d\u5e76\u4e0d\u4e00\u81f4\u76f8\u5173\uff0c\u65e0\u6cd5\u4f5c\u4e3a\u53ef\u9760\u6307\u6807"], "keywords": ["\u5bf9\u9f50", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5b89\u5168", "\u5fae\u8c03"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09053v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "An Emergent Mirage: Is Emergent Misalignment and Realignment Indeed a Robust Phenomenon?", "tldr": "\u7cfb\u7edf\u7814\u7a76\u53d1\u73b0\"\u6d8c\u73b0\u6027\u9519\u4f4d\"\u73b0\u8c61\u5bf9\u6570\u636e\u96c6\u8868\u9762\u7279\u5f81\u9ad8\u5ea6\u654f\u611f\uff0c\u9c81\u68d2\u6027\u5b58\u7591", "upvotes": 0, "what_it_is": "\u672c\u6587\u7cfb\u7edf\u6027\u5730\u91cd\u590d\u7814\u7a76\u4e86\u8bed\u8a00\u6a21\u578b\u7684\"\u6d8c\u73b0\u6027\u9519\u4f4d\"\uff08EM\uff09\u4e0e\u91cd\u5bf9\u9f50\u73b0\u8c61\uff0c\u901a\u8fc7\u63a7\u5236\u53d8\u91cf\u5b9e\u9a8c\u53d1\u73b0\u8be5\u73b0\u8c61\u5bf9\u6570\u636e\u96c6\u8868\u9762\u7279\u5f81\uff08\u5982\u56de\u590d\u957f\u5ea6\uff09\u9ad8\u5ea6\u654f\u611f\uff0c\u6b64\u524d\u62a5\u544a\u7684\u5feb\u901f\u91cd\u5bf9\u9f50\u6548\u679c\u5728\u63a7\u5236\u957f\u5ea6\u5dee\u5f02\u540e\u57fa\u672c\u6d88\u5931\u3002", "why_notable": "\u5bf9\u8fd1\u671f\u5f15\u53d1\u5e7f\u6cdb\u5173\u6ce8\u7684EM\u73b0\u8c61\u63d0\u51fa\u4e25\u8083\u8d28\u7591\uff0c\u63ed\u793a\u5176\u53ef\u80fd\u662f\u6570\u636e\u96c6\u4eba\u5de5\u5236\u54c1\u5bfc\u81f4\u7684\u5047\u8c61\uff0c\u5bf9AI\u5b89\u5168\u5bf9\u9f50\u7814\u7a76\u7684\u8bc4\u4f30\u65b9\u6cd5\u8bba\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49"}, {"abstract": "High-quality visual representation is a long-standing pursuit in computer vision. In the context of multimodal LLMs (MLLMs), feeding higher-resolution images can produce more fine-grained visual tokens. However, it introduces additional computational and design complexity, due to multiple forward passes and post-processing of increased tokens. Before simply adopting a higher resolution, have we truly unlocked the model\u0027s full perception capability at a standard resolution? Therefore, we study an interesting problem: how to achieve fine visual perception under lower cost without larger images. We present SigLIP-HD in this work. The core is a highly simple fine-to-coarse supervision design. We enforce the coarse feature of a mid-resolution image to mimic the fine-grained feature of its high-resolution version. We build this framework on the advanced SigLIP 2 model. Our final model produces better visual tokens at exactly the same inference budget. It is validated on extensive MLLM benchmarks and consistently delivers stronger results than our baseline model, especially on OCR-related tasks.", "arxiv_id": "2607.09488", "arxiv_url": "https://arxiv.org/abs/2607.09488", "authors": ["Lihe Yang", "Zhen Zhao", "Hengshuang Zhao"], "brief": "\u63d0\u51faSigLIP-HD\uff0c\u4e00\u79cd\u7ec6\u5230\u7c97\u76d1\u7763\u8bad\u7ec3\u6846\u67b6\uff0c\u8ba9\u4e2d\u7b49\u5206\u8fa8\u7387\u56fe\u50cf\u7684\u7c97\u7c92\u5ea6\u7279\u5f81\u6a21\u4eff\u9ad8\u5206\u8fa8\u7387\u7248\u672c\u7684\u7ec6\u7c92\u5ea6\u7279\u5f81\uff0c\u5728\u4e0d\u589e\u52a0\u63a8\u7406\u6210\u672c\u7684\u524d\u63d0\u4e0b\u63d0\u5347\u89c6\u89c9\u8868\u793a\u8d28\u91cf\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09488", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u8bbe\u8ba1\uff1a\u5f3a\u5236\u4e2d\u7b49\u5206\u8fa8\u7387\u56fe\u50cf\u7684\u7c97\u7c92\u5ea6\u7279\u5f81\u5bf9\u9f50\u5176\u9ad8\u5206\u8fa8\u7387\u7248\u672c\u7684\u7ec6\u7c92\u5ea6\u7279\u5f81\uff0c\u8bad\u7ec3\u65f6\u5f15\u5165\u9ad8\u5206\u8fa8\u7387\u76d1\u7763\u4fe1\u53f7", "\u57fa\u4e8eSigLIP 2\u6a21\u578b\u6784\u5efa\uff0c\u63a8\u7406\u9636\u6bb5\u4e0e\u539f\u6a21\u578b\u5b8c\u5168\u76f8\u540c\uff0c\u65e0\u989d\u5916\u8ba1\u7b97\u5f00\u9500", "\u5728\u591a\u6a21\u6001LLM\u57fa\u51c6\u6d4b\u8bd5\u4e2d\u5168\u9762\u8d85\u8d8a\u57fa\u7ebf\uff0c\u5c24\u5176\u5728OCR\u76f8\u5173\u4efb\u52a1\u4e0a\u63d0\u5347\u663e\u8457"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u89c9\u8868\u793a", "\u77e5\u8bc6\u84b8\u998f", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09488v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "SigLIP-HD by Fine-to-Coarse Supervision", "tldr": "\u901a\u8fc7\u7ec6\u5230\u7c97\u76d1\u7763\u63d0\u5347\u89c6\u89c9\u7f16\u7801\u5668\u611f\u77e5\u80fd\u529b\uff0c\u65e0\u9700\u66f4\u9ad8\u5206\u8fa8\u7387\u8f93\u5165", "upvotes": 0, "what_it_is": "\u63d0\u51faSigLIP-HD\uff0c\u4e00\u79cd\u7ec6\u5230\u7c97\u76d1\u7763\u8bad\u7ec3\u6846\u67b6\uff0c\u8ba9\u4e2d\u7b49\u5206\u8fa8\u7387\u56fe\u50cf\u7684\u7c97\u7c92\u5ea6\u7279\u5f81\u6a21\u4eff\u9ad8\u5206\u8fa8\u7387\u7248\u672c\u7684\u7ec6\u7c92\u5ea6\u7279\u5f81\uff0c\u5728\u4e0d\u589e\u52a0\u63a8\u7406\u6210\u672c\u7684\u524d\u63d0\u4e0b\u63d0\u5347\u89c6\u89c9\u8868\u793a\u8d28\u91cf\u3002", "why_notable": "\u5728\u4e0d\u6539\u53d8\u63a8\u7406\u5206\u8fa8\u7387\u548c\u8ba1\u7b97\u9884\u7b97\u7684\u524d\u63d0\u4e0b\u63d0\u5347\u89c6\u89c9\u611f\u77e5\u80fd\u529b\uff0c\u65b9\u6cd5\u6781\u7b80\u5374\u6709\u6548\uff0c\u4e3a\u591a\u6a21\u6001LLM\u7684\u89c6\u89c9\u7f16\u7801\u5668\u4f18\u5316\u63d0\u4f9b\u4e86\u65b0\u601d\u8def\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Existing volumetric capture of dynamic human performance achieves high fidelity with dense camera arrays. However, in real-world scenarios, only a handful of low-overlap cameras are available, which degrades the output quality and leaves large areas unobserved. Recent 4D reconstruction methods have focused on low-overlap settings, yet they still produce noticeable artifacts in under-observed regions. Video diffusion models have emerged as another option, but they show geometrically inconsistent results for humans. To address these limitations, we propose StudioRecon, a pipeline that reconstructs 4D human scenes from sparse, low-overlap cameras by decoupling background and humans. We densify background supervision by synthesizing hundreds of camera-controlled novel views with a video diffusion model. We also robustly initialize deformable Gaussian humans with cross-view identity association and triangulated multi-view keypoint fitting. Finally, our recursive enhancement module with motion-adaptive consistency injection harmonizes the composed output, thereby further avoiding remaining artifacts. We achieve state-of-the-art novel view synthesis across four real-world datasets and demonstrate applications such as novel trajectory rendering and human replacement.", "arxiv_id": "2607.09125", "arxiv_url": "https://arxiv.org/abs/2607.09125", "authors": ["Minhyuk Hwang", "Sangmin Kim", "Seunguk Do", "Daneul Kim", "Jaesik Park"], "brief": "\u63d0\u51faStudioRecon\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7\u89e3\u8026\u80cc\u666f\u4e0e\u4eba\u4f53\uff0c\u7ed3\u5408\u89c6\u9891\u6269\u6563\u6a21\u578b\u5408\u6210\u65b0\u89c6\u89d2\u6765\u7a20\u5bc6\u5316\u80cc\u666f\u76d1\u7763\uff0c\u5e76\u7528\u53ef\u53d8\u5f62\u9ad8\u65af\u8868\u793a\u4eba\u4f53\uff0c\u5b9e\u73b0\u7a00\u758f\u4f4e\u91cd\u53e0\u76f8\u673a\u4e0b\u7684\u9ad8\u8d28\u91cf4D\u4eba\u4f53\u573a\u666f\u91cd\u5efa\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09125", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u80cc\u666f\u4e0e\u4eba\u4f53\u89e3\u8026\u5904\u7406\uff1a\u7528\u89c6\u9891\u6269\u6563\u6a21\u578b\u5408\u6210\u6570\u767e\u4e2a\u76f8\u673a\u63a7\u5236\u7684\u65b0\u89c6\u89d2\u6765\u7a20\u5bc6\u5316\u80cc\u666f\u76d1\u7763", "\u901a\u8fc7\u8de8\u89c6\u89d2\u8eab\u4efd\u5173\u8054\u4e0e\u4e09\u89d2\u5316\u591a\u89c6\u89d2\u5173\u952e\u70b9\u62df\u5408\uff0c\u9c81\u68d2\u521d\u59cb\u5316\u53ef\u53d8\u5f62\u9ad8\u65af\u4eba\u4f53\u6a21\u578b", "\u9012\u5f52\u589e\u5f3a\u6a21\u5757\u7ed3\u5408\u8fd0\u52a8\u81ea\u9002\u5e94\u4e00\u81f4\u6027\u6ce8\u5165\uff0c\u6d88\u9664\u5408\u6210\u533a\u57df\u7684\u4f2a\u5f71\uff0c\u5728\u56db\u4e2a\u771f\u5b9e\u6570\u636e\u96c6\u4e0a\u8fbe\u5230SOTA"], "keywords": ["4D\u91cd\u5efa", "\u6269\u6563\u6a21\u578b", "\u65b0\u89c6\u89d2\u5408\u6210", "\u9ad8\u65af\u8868\u793a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09125v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "4D Human-Scene Reconstruction from Low-Overlap Captures", "tldr": "StudioRecon\u5229\u7528\u89c6\u9891\u6269\u6563\u6a21\u578b\u4ece\u7a00\u758f\u4f4e\u91cd\u53e0\u76f8\u673a\u91cd\u5efa\u9ad8\u8d28\u91cf4D\u4eba\u4f53\u573a\u666f", "upvotes": 0, "what_it_is": "\u63d0\u51faStudioRecon\u6d41\u6c34\u7ebf\uff0c\u901a\u8fc7\u89e3\u8026\u80cc\u666f\u4e0e\u4eba\u4f53\uff0c\u7ed3\u5408\u89c6\u9891\u6269\u6563\u6a21\u578b\u5408\u6210\u65b0\u89c6\u89d2\u6765\u7a20\u5bc6\u5316\u80cc\u666f\u76d1\u7763\uff0c\u5e76\u7528\u53ef\u53d8\u5f62\u9ad8\u65af\u8868\u793a\u4eba\u4f53\uff0c\u5b9e\u73b0\u7a00\u758f\u4f4e\u91cd\u53e0\u76f8\u673a\u4e0b\u7684\u9ad8\u8d28\u91cf4D\u4eba\u4f53\u573a\u666f\u91cd\u5efa\u3002", "why_notable": "\u89e3\u51b3\u4e86\u771f\u5b9e\u573a\u666f\u4e2d\u4ec5\u6709\u5c11\u91cf\u4f4e\u91cd\u53e0\u76f8\u673a\u65f64D\u4eba\u4f53\u91cd\u5efa\u8d28\u91cf\u5dee\u7684\u75db\u70b9\uff0c\u521b\u65b0\u6027\u5730\u5c06\u89c6\u9891\u6269\u6563\u6a21\u578b\u4e0e\u663e\u5f0f\u9ad8\u65af\u8868\u793a\u7ed3\u5408\uff0c\u652f\u6301\u65b0\u8f68\u8ff9\u6e32\u67d3\u548c\u4eba\u4f53\u66ff\u6362\u7b49\u5b9e\u7528\u5e94\u7528\u3002"}, {"abstract": "As audio-visual generative models evolve into world simulators, cross-modal synchronization stands as a critical proxy for assessing the consistency of world dynamics and causality in generated content. However, existing evaluation metrics presume structural correctness, reducing synchronization to mere temporal alignment. Consequently, they fail on generative outputs, especially when exhibiting structural hallucinations and asymmetric cross-modal relations, which currently \\textbf{mandate expert human annotation to assess synchronization.} This dependency introduces a critical paradox: \\emph{human evaluators rely on relative, reference-dependent comparisons, whereas automated metrics require reference-free, absolute scalars.} We resolve this paradox by proposing a framework that distills relative human perception into a continuous, globally consistent metric. First, we introduce SynthSync, a dataset of generative failures ranked via pairwise human annotations. Second, we adapt the Omni-LLM equipped with a continuous latent projection to translate relative human rankings into continuous absolute values. Third, we propose Real-Valued Group Relative Policy Optimization ($\\mathbb{R}$-GRPO) to internalize the global causal structure of synchronization via listwise score distributions. Empirically, our metric achieves state-of-the-art human preference alignment. We leverage this estimator to establish a standardized benchmark, advancing AV-Gen assessment from low-level signal correlation to visually grounded causality.", "arxiv_id": "2607.09091", "arxiv_url": "https://arxiv.org/abs/2607.09091", "authors": ["Yijie Qian", "Juncheng Wang", "Chao Xu", "Huihan Wang", "Yuxiang Feng", "Yang Liu", "Baigui Sun", "Yong Liu", "Shujun Wang"], "brief": "\u63d0\u51fa\u4e00\u5957\u5c06\u4eba\u7c7b\u76f8\u5bf9\u611f\u77e5\u8f6c\u5316\u4e3a\u7edd\u5bf9\u8fde\u7eed\u8bc4\u5206\u7684\u97f3\u89c6\u9891\u751f\u6210\u8d28\u91cf\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc7SynthSync\u6570\u636e\u96c6\u3001Omni-LLM\u8fde\u7eed\u6f5c\u7a7a\u95f4\u6295\u5f71\u548cR-GRPO\u4f18\u5316\uff0c\u5b9e\u73b0\u65e0\u9700\u53c2\u8003\u7684\u8de8\u6a21\u6001\u540c\u6b65\u8bc4\u4f30\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09091", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6784\u5efaSynthSync\u6570\u636e\u96c6\uff1a\u6536\u96c6\u751f\u6210\u6a21\u578b\u5931\u8d25\u6848\u4f8b\u5e76\u901a\u8fc7\u6210\u5bf9\u4eba\u7c7b\u6807\u6ce8\u8fdb\u884c\u6392\u5e8f", "\u9002\u914dOmni-LLM\u52a0\u5165\u8fde\u7eed\u6f5c\u7a7a\u95f4\u6295\u5f71\uff0c\u5c06\u76f8\u5bf9\u4eba\u7c7b\u6392\u540d\u8f6c\u6362\u4e3a\u7edd\u5bf9\u8fde\u7eed\u8bc4\u5206\u503c", "\u63d0\u51faReal-Valued Group Relative Policy Optimization\uff08R-GRPO\uff09\uff0c\u901a\u8fc7\u5217\u8868\u5f0f\u5206\u6570\u5206\u5e03\u5185\u5316\u540c\u6b65\u7684\u5168\u5c40\u56e0\u679c\u7ed3\u6784", "\u5b9e\u9a8c\u8fbe\u5230SOTA\u4eba\u7c7b\u504f\u597d\u5bf9\u9f50\u6548\u679c\uff0c\u5c06AV\u751f\u6210\u8bc4\u4f30\u4ece\u4f4e\u7ea7\u4fe1\u53f7\u76f8\u5173\u6027\u63d0\u5347\u81f3\u89c6\u89c9\u56e0\u679c\u63a8\u7406\u5c42\u9762"], "keywords": ["\u591a\u6a21\u6001", "\u751f\u6210\u6a21\u578b\u8bc4\u4f30", "\u97f3\u89c6\u9891\u540c\u6b65", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09091v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Beyond Time Shifts: Adapting Omni-LLM as a Reference-Free Evaluator for Generative Audio-Visual Models", "tldr": "\u63d0\u51fa\u65e0\u53c2\u8003\u97f3\u89c6\u9891\u540c\u6b65\u8bc4\u4f30\u6846\u67b6\uff0c\u5c06\u4eba\u7c7b\u76f8\u5bf9\u611f\u77e5\u84b8\u998f\u4e3a\u5168\u5c40\u4e00\u81f4\u7684\u8fde\u7eed\u6307\u6807", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u5957\u5c06\u4eba\u7c7b\u76f8\u5bf9\u611f\u77e5\u8f6c\u5316\u4e3a\u7edd\u5bf9\u8fde\u7eed\u8bc4\u5206\u7684\u97f3\u89c6\u9891\u751f\u6210\u8d28\u91cf\u8bc4\u4f30\u6846\u67b6\uff0c\u901a\u8fc7SynthSync\u6570\u636e\u96c6\u3001Omni-LLM\u8fde\u7eed\u6f5c\u7a7a\u95f4\u6295\u5f71\u548cR-GRPO\u4f18\u5316\uff0c\u5b9e\u73b0\u65e0\u9700\u53c2\u8003\u7684\u8de8\u6a21\u6001\u540c\u6b65\u8bc4\u4f30\u3002", "why_notable": "\u73b0\u6709\u97f3\u89c6\u9891\u8bc4\u4f30\u6307\u6807\u4f9d\u8d56\u53c2\u8003\u6216\u4ec5\u505a\u65f6\u95f4\u5bf9\u9f50\uff0c\u65e0\u6cd5\u5904\u7406\u751f\u6210\u6a21\u578b\u7684\u7ed3\u6784\u6027\u5e7b\u89c9\u95ee\u9898\uff1b\u672c\u6587\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u4eba\u7c7b\u76f8\u5bf9\u5224\u65ad\u84b8\u998f\u4e3a\u53ef\u6269\u5c55\u7684\u65e0\u53c2\u8003\u7edd\u5bf9\u6307\u6807\uff0c\u5bf9\u4e16\u754c\u6a21\u62df\u5668\u8bc4\u4f30\u4f53\u7cfb\u5177\u6709\u91cd\u8981\u63a8\u52a8\u4f5c\u7528\u3002"}, {"abstract": "Training-free in-context segmentation enables new object categories to be introduced at inference time from a single annotated reference image, eliminating the retraining and memory overhead of class-incremental learning. Recent approaches achieve this by combining vision foundation models for semantic correspondence with promptable segmentation networks like SAM. However, their performance is fundamentally limited by the quality of the cross-image similarity map; shared contextual backgrounds between the reference and query systematically elevate similarity in non-target regions, degrading prompt localization. We present REBASE, a training-free framework that explicitly suppresses these spurious contextual correspondences. Our method identifies the low-rank background feature subspace from the reference image and project the reference and query features onto its orthogonal complement in closed form, yielding cleaner semantic matching. We then generate positive point prompts using similarity-weighted farthest-point sampling, paired with a refined dense similarity prior. Without any training or parameter updates, our approach establishes a new state of the art among training-free methods on PACO-Part, FSS-1000, and cross-domain datasets such as ISIC2018, demonstrating that explicit background subspace removal is a highly effective principle for one-shot localization.", "arxiv_id": "2607.09082", "arxiv_url": "https://arxiv.org/abs/2607.09082", "authors": ["Mantha Sai Gopal", "Jaison Saji Chacko", "Harsh Nandwana", "Sandesh Hegde", "Debarshi Banerjee", "Uma Mahesh"], "brief": "\u63d0\u51faREBASE\u6846\u67b6\uff0c\u901a\u8fc7\u8bc6\u522b\u53c2\u8003\u56fe\u50cf\u7684\u4f4e\u79e9\u80cc\u666f\u7279\u5f81\u5b50\u7a7a\u95f4\u5e76\u5c06\u7279\u5f81\u6295\u5f71\u5230\u5176\u6b63\u4ea4\u8865\u7a7a\u95f4\uff0c\u6d88\u9664\u53c2\u8003\u56fe\u4e0e\u67e5\u8be2\u56fe\u4e4b\u95f4\u5171\u4eab\u80cc\u666f\u5e26\u6765\u7684\u865a\u5047\u8bed\u4e49\u5bf9\u5e94\uff0c\u5b9e\u73b0\u65e0\u8bad\u7ec3\u7684\u5355\u6837\u672c\u76ee\u6807\u5206\u5272\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.09082", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4f4e\u79e9\u80cc\u666f\u5b50\u7a7a\u95f4\u6d88\u9664\uff1a\u4ee5\u95ed\u5408\u5f62\u5f0f\u5c06\u53c2\u8003\u4e0e\u67e5\u8be2\u7279\u5f81\u6295\u5f71\u5230\u80cc\u666f\u5b50\u7a7a\u95f4\u7684\u6b63\u4ea4\u8865\uff0c\u6291\u5236\u975e\u76ee\u6807\u533a\u57df\u7684\u76f8\u4f3c\u5ea6\u5e72\u6270", "\u76f8\u4f3c\u5ea6\u52a0\u6743\u6700\u8fdc\u70b9\u91c7\u6837\uff08similarity-weighted FPS\uff09\u751f\u6210\u6b63\u5411\u70b9\u63d0\u793a\uff0c\u914d\u5408\u7cbe\u7ec6\u5316\u5bc6\u96c6\u76f8\u4f3c\u5ea6\u5148\u9a8c\u8f93\u5165SAM", "\u65e0\u9700\u4efb\u4f55\u8bad\u7ec3\u6216\u53c2\u6570\u66f4\u65b0\uff0c\u5728PACO-Part\u3001FSS-1000\u53ca\u8de8\u57df\u6570\u636e\u96c6ISIC2018\u4e0a\u8fbe\u5230\u65e0\u8bad\u7ec3\u65b9\u6cd5\u65b0SOTA"], "keywords": ["\u56fe\u50cf\u5206\u5272", "\u5c11\u6837\u672c\u5b66\u4e60", "\u89c6\u89c9\u57fa\u7840\u6a21\u578b", "\u8bed\u4e49\u5bf9\u5e94"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.09082v1", "published_at": "2026-07-10", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "REBASE: Reference-Background Subspace Elimination for Training-Free In-Context Segmentation", "tldr": "\u65e0\u9700\u8bad\u7ec3\u7684\u4e0a\u4e0b\u6587\u5206\u5272\u6846\u67b6\uff0c\u901a\u8fc7\u6d88\u9664\u80cc\u666f\u5b50\u7a7a\u95f4\u63d0\u5347\u8de8\u56fe\u50cf\u8bed\u4e49\u5339\u914d\u7cbe\u5ea6", "upvotes": 0, "what_it_is": "\u63d0\u51faREBASE\u6846\u67b6\uff0c\u901a\u8fc7\u8bc6\u522b\u53c2\u8003\u56fe\u50cf\u7684\u4f4e\u79e9\u80cc\u666f\u7279\u5f81\u5b50\u7a7a\u95f4\u5e76\u5c06\u7279\u5f81\u6295\u5f71\u5230\u5176\u6b63\u4ea4\u8865\u7a7a\u95f4\uff0c\u6d88\u9664\u53c2\u8003\u56fe\u4e0e\u67e5\u8be2\u56fe\u4e4b\u95f4\u5171\u4eab\u80cc\u666f\u5e26\u6765\u7684\u865a\u5047\u8bed\u4e49\u5bf9\u5e94\uff0c\u5b9e\u73b0\u65e0\u8bad\u7ec3\u7684\u5355\u6837\u672c\u76ee\u6807\u5206\u5272\u3002", "why_notable": "\u63ed\u793a\u4e86\u73b0\u6709\u65e0\u8bad\u7ec3\u5206\u5272\u65b9\u6cd5\u7684\u6838\u5fc3\u74f6\u9888\uff08\u80cc\u666f\u5e72\u6270\u5bfc\u81f4\u76f8\u4f3c\u5ea6\u56fe\u8d28\u91cf\u5dee\uff09\uff0c\u5e76\u63d0\u4f9b\u4e86\u4e00\u4e2a\u6570\u5b66\u4e0a\u4f18\u96c5\u3001\u8ba1\u7b97\u9ad8\u6548\u7684\u89e3\u51b3\u65b9\u6848\uff0c\u65e0\u9700\u91cd\u8bad\u7ec3\u5373\u53ef\u6cdb\u5316\u5230\u65b0\u7c7b\u522b\
