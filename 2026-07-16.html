7\u9a8c\u8bc1\u4e86\u5355/\u591a\u6982\u5ff5\u64e6\u9664\u6548\u679c\uff0c\u540c\u65f6\u4fdd\u7559\u975e\u76ee\u6807\u5185\u5bb9\u751f\u6210\u8d28\u91cf"], "keywords": ["\u5185\u5bb9\u5b89\u5168", "\u89c6\u89c9\u751f\u6210", "\u6982\u5ff5\u64e6\u9664", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14521v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Uni-AdaVD: Universal Concept Erasure for Visual Generation via Orthogonal Value Decomposition", "tldr": "\u901a\u7528\u63a8\u7406\u65f6\u6982\u5ff5\u64e6\u9664\u6846\u67b6\uff0c\u901a\u8fc7\u6b63\u4ea4\u503c\u5206\u89e3\u5b89\u5168\u79fb\u9664\u89c6\u89c9\u751f\u6210\u6a21\u578b\u4e2d\u7684\u4e0d\u826f\u6982\u5ff5", "upvotes": 0, "what_it_is": "\u63d0\u51faUni-AdaVD\uff0c\u4e00\u4e2a\u65e0\u9700\u66f4\u65b0\u6a21\u578b\u6743\u91cd\u3001\u9002\u7528\u4e8e\u591a\u79cd\u67b6\u6784\uff08U-Net\u3001DiT\u3001\u81ea\u56de\u5f52\u3001\u6587\u751f\u89c6\u9891\uff09\u7684\u63a8\u7406\u65f6\u6982\u5ff5\u64e6\u9664\u6846\u67b6\uff0c\u901a\u8fc7\u5bf9\u591a\u6a21\u6001\u6ce8\u610f\u529b\u503c\u7a7a\u95f4\u8fdb\u884c\u6b63\u4ea4\u5206\u89e3\u6765\u5b9a\u5411\u6291\u5236\u76ee\u6807\u8bed\u4e49\u65b9\u5411\u3002", "why_notable": "\u9996\u4e2a\u771f\u6b63\u8de8\u67b6\u6784\u901a\u7528\u7684\u63a8\u7406\u65f6\u6982\u5ff5\u64e6\u9664\u65b9\u6848\uff0c\u65e0\u9700\u5fae\u8c03\u6a21\u578b\u6743\u91cd\u5373\u53ef\u90e8\u7f72\uff0c\u5bf9\u5927\u6a21\u578b\u5b89\u5168\u5408\u89c4\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Real repository issues routinely include visual evidence such as screenshots, error dialogs, rendered UI states, and logs, yet repository-level issue localization is evaluated mostly as a text-only task. Existing multimodal SE benchmarks evaluate end-to-end repair, entangling localization with patch synthesis and obscuring whether visual input helped, hurt, or was ignored. We introduce \\textbf{MM-IssueLoc}, a controlled benchmark and evaluation protocol for repository-level localization with visual evidence. MM-IssueLoc contains 652 issue-PR instances across 23 languages, with annotations for 7 image categories and 4 relevance levels. It provides file-level and function-level gold labels, paired text-only and with-image evaluation, and VCE-based diagnostics that convert images into structured textual evidence. We evaluate LLM-based and retrieval-based systems, including MM-IssueLoc-VL-Emb as a controlled multimodal retriever. Results show that existing systems remain far from reliable multimodal repository localization: the strongest agent reaches 38.96 file Acc@5 and 22.45 function Acc@10, while the strongest retriever reaches 33.86 function Acc@10. Cross-benchmark comparisons show that high localization scores on text-dominant SWE benchmarks do not transfer cleanly to multimodal issue localization. MM-IssueLoc turns visual evidence into an explicit evaluation variable, enabling future work to test whether systems improve by using visual evidence for localization, rather than by relying on text-only cues or downstream patch-generation effects.", "arxiv_id": "2607.15205", "arxiv_url": "https://arxiv.org/abs/2607.15205", "authors": ["Shaoxiong Zhan", "Shi Hu", "Boyu Feng", "Hai Lin", "Andrew Gong", "Zhengda Zhou", "Jiaying Zhou", "Yunyun Hou", "Hao Su", "Hai-Tao Zheng"], "brief": "\u63d0\u51faMM-IssueLoc\u57fa\u51c6\uff0c\u5305\u542b652\u4e2aissue-PR\u5b9e\u4f8b\u300123\u79cd\u7f16\u7a0b\u8bed\u8a00\uff0c\u4e13\u95e8\u8bc4\u4f30LLM\u7cfb\u7edf\u80fd\u5426\u5229\u7528\u622a\u56fe\u3001\u9519\u8bef\u5bf9\u8bdd\u6846\u7b49\u89c6\u89c9\u8bc1\u636e\u8fdb\u884c\u4ee3\u7801\u4ed3\u5e93\u7ea7\u522b\u7684\u95ee\u9898\u5b9a\u4f4d\uff0c\u586b\u8865\u73b0\u6709\u57fa\u51c6\u5ffd\u89c6\u89c6\u89c9\u8f93\u5165\u7684\u7a7a\u767d\u3002", "categories": ["cs.SE", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15205", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["652\u4e2aissue-PR\u5b9e\u4f8b\uff0c\u8986\u76d623\u79cd\u7f16\u7a0b\u8bed\u8a00\uff0c\u6807\u6ce87\u7c7b\u56fe\u50cf\u7c7b\u522b\u548c4\u7ea7\u76f8\u5173\u6027\uff0c\u63d0\u4f9b\u6587\u4ef6\u7ea7\u4e0e\u51fd\u6570\u7ea7\u91d1\u6807\u51c6", "\u8bbe\u8ba1\u914d\u5bf9\u7684\u7eaf\u6587\u672c\u4e0e\u542b\u56fe\u50cf\u8bc4\u4f30\u534f\u8bae\uff0c\u5e76\u5f15\u5165VCE\u8bca\u65ad\u5c06\u56fe\u50cf\u8f6c\u4e3a\u7ed3\u6784\u5316\u6587\u672c\u8bc1\u636e\uff0c\u9694\u79bb\u89c6\u89c9\u8f93\u5165\u7684\u5b9e\u9645\u8d21\u732e", "\u6700\u5f3aagent\u4ec5\u8fbe38.96\u6587\u4ef6Acc@5\u548c22.45\u51fd\u6570Acc@10\uff0c\u8868\u660e\u73b0\u6709\u7cfb\u7edf\u5728\u591a\u6a21\u6001\u95ee\u9898\u5b9a\u4f4d\u4e0a\u4ecd\u8fdc\u4e0d\u53ef\u9760\uff0c\u4e14\u6587\u672c\u4e3b\u5bfc\u57fa\u51c6\u7684\u9ad8\u5206\u4e0d\u53ef\u8fc1\u79fb"], "keywords": ["\u591a\u6a21\u6001", "\u8f6f\u4ef6\u5de5\u7a0b", "\u4ee3\u7801\u667a\u80fd", "\u57fa\u51c6\u8bc4\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15205v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MM-IssueLoc: A Controlled Benchmark for Evaluating Visual Evidence in Multimodal Repository-Level Issue Localization", "tldr": "\u9996\u4e2a\u542b\u89c6\u89c9\u8bc1\u636e\u7684\u591a\u6a21\u6001\u4ee3\u7801\u4ed3\u5e93\u95ee\u9898\u5b9a\u4f4d\u53d7\u63a7\u57fa\u51c6MM-IssueLoc", "upvotes": 0, "what_it_is": "\u63d0\u51faMM-IssueLoc\u57fa\u51c6\uff0c\u5305\u542b652\u4e2aissue-PR\u5b9e\u4f8b\u300123\u79cd\u7f16\u7a0b\u8bed\u8a00\uff0c\u4e13\u95e8\u8bc4\u4f30LLM\u7cfb\u7edf\u80fd\u5426\u5229\u7528\u622a\u56fe\u3001\u9519\u8bef\u5bf9\u8bdd\u6846\u7b49\u89c6\u89c9\u8bc1\u636e\u8fdb\u884c\u4ee3\u7801\u4ed3\u5e93\u7ea7\u522b\u7684\u95ee\u9898\u5b9a\u4f4d\uff0c\u586b\u8865\u73b0\u6709\u57fa\u51c6\u5ffd\u89c6\u89c6\u89c9\u8f93\u5165\u7684\u7a7a\u767d\u3002", "why_notable": "\u9996\u6b21\u5c06\u89c6\u89c9\u8bc1\u636e\u4f5c\u4e3a\u663e\u5f0f\u8bc4\u4f30\u53d8\u91cf\u5f15\u5165\u4ee3\u7801\u4ed3\u5e93\u95ee\u9898\u5b9a\u4f4d\u4efb\u52a1\uff0c\u63ed\u793a\u73b0\u6709\u7cfb\u7edf\u5b9e\u9645\u4e0a\u5ffd\u89c6\u89c6\u89c9\u8f93\u5165\u7684\u95ee\u9898\uff0c\u4e3a\u591a\u6a21\u6001\u8f6f\u4ef6\u5de5\u7a0b\u667a\u80fd\u4f53\u7684\u7814\u7a76\u63d0\u4f9b\u4e25\u683c\u53ef\u63a7\u7684\u8bc4\u6d4b\u5e73\u53f0\u3002"}, {"abstract": "We report on CoreForge, an experience in using large language models (LLMs) to build an unweighted MaxSAT solver from research papers rather than from an existing solver codebase. The project focuses on unsatisfiability-based MaxSAT algorithms and follows an iterative workflow that combines paper discussions with ChatGPT, implementation through Codex prompts, and repeated LLM-assisted code audits and revisions. Although the codebase implements several algorithms and solver components, our evaluation focuses on configurations that combine core-guided optimization, lightweight preprocessing, core minimization, integration with integer linear optimization backends, and a new core-sequence lookahead approach. Our experience suggests that LLMs can support solver implementation from papers, while requiring external validation, benchmarking, and human guidance. In our experiments, fuzzing and MaxSAT Evaluation instances did not reveal wrong answers in the tested configurations, although performance remains below the best hand-engineered MaxSAT solvers. We summarize what worked, what remained difficult, and the lessons for future LLM-assisted solver development.", "arxiv_id": "2607.14818", "arxiv_url": "https://arxiv.org/abs/2607.14818", "authors": ["Ruben Martins"], "brief": "\u672c\u6587\u62a5\u544a\u4e86CoreForge\u9879\u76ee\u7684\u7ecf\u9a8c\uff1a\u5229\u7528LLM\uff08ChatGPT+Codex\uff09\u76f4\u63a5\u9605\u8bfb\u7814\u7a76\u8bba\u6587\u5e76\u5b9e\u73b0\u4e00\u4e2a\u65e0\u6743\u91cdMaxSAT\u6c42\u89e3\u5668\uff0c\u800c\u975e\u57fa\u4e8e\u5df2\u6709\u6c42\u89e3\u5668\u4ee3\u7801\u5e93\u8fdb\u884c\u5f00\u53d1\uff0c\u91c7\u7528\u8bba\u6587\u8ba8\u8bba\u3001\u4ee3\u7801\u751f\u6210\u4e0eLLM\u8f85\u52a9\u5ba1\u67e5\u7684\u8fed\u4ee3\u5de5\u4f5c\u6d41\u3002", "categories": ["cs.LO", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14818", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5b9e\u73b0\u4e86\u6838\u5fc3\u5f15\u5bfc\u4f18\u5316\u3001\u8f7b\u91cf\u9884\u5904\u7406\u3001\u6838\u6700\u5c0f\u5316\u3001\u6574\u6570\u7ebf\u6027\u89c4\u5212\u540e\u7aef\u96c6\u6210\u53ca\u65b0\u7684\u6838\u5e8f\u5217\u524d\u77bb\uff08core-sequence lookahead\uff09\u7b49\u591a\u4e2a\u7b97\u6cd5\u7ec4\u4ef6", "\u6a21\u7cca\u6d4b\u8bd5\u4e0eMaxSAT Evaluation\u57fa\u51c6\u6d4b\u8bd5\u672a\u53d1\u73b0\u7b54\u6848\u9519\u8bef\uff0c\u4f46\u6027\u80fd\u4ecd\u4f4e\u4e8e\u9876\u7ea7\u624b\u5de5\u4f18\u5316\u6c42\u89e3\u5668", "\u603b\u7ed3\u4e86LLM\u8f85\u52a9\u6c42\u89e3\u5668\u5f00\u53d1\u7684\u7ecf\u9a8c\u6559\u8bad\uff1aLLM\u53ef\u652f\u6301\u4ece\u8bba\u6587\u5230\u5b9e\u73b0\u7684\u8fc7\u7a0b\uff0c\u4f46\u4ecd\u9700\u5916\u90e8\u9a8c\u8bc1\u3001\u57fa\u51c6\u6d4b\u8bd5\u548c\u4eba\u5de5\u6307\u5bfc"], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u4ee3\u7801\u751f\u6210", "\u7ec4\u5408\u4f18\u5316", "\u81ea\u52a8\u5316\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14818v1", "published_at": "2026-07-16", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Can LLMs Build a MaxSAT Solver from Papers? The CoreForge Experience", "tldr": "\u7528LLM\u4ece\u8bba\u6587\u51fa\u53d1\u6784\u5efaMaxSAT\u6c42\u89e3\u5668CoreForge\u7684\u5b9e\u8df5\u7ecf\u9a8c\u62a5\u544a", "upvotes": 0, "what_it_is": "\u672c\u6587\u62a5\u544a\u4e86CoreForge\u9879\u76ee\u7684\u7ecf\u9a8c\uff1a\u5229\u7528LLM\uff08ChatGPT+Codex\uff09\u76f4\u63a5\u9605\u8bfb\u7814\u7a76\u8bba\u6587\u5e76\u5b9e\u73b0\u4e00\u4e2a\u65e0\u6743\u91cdMaxSAT\u6c42\u89e3\u5668\uff0c\u800c\u975e\u57fa\u4e8e\u5df2\u6709\u6c42\u89e3\u5668\u4ee3\u7801\u5e93\u8fdb\u884c\u5f00\u53d1\uff0c\u91c7\u7528\u8bba\u6587\u8ba8\u8bba\u3001\u4ee3\u7801\u751f\u6210\u4e0eLLM\u8f85\u52a9\u5ba1\u67e5\u7684\u8fed\u4ee3\u5de5\u4f5c\u6d41\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u63a2\u7d22LLM\u80fd\u5426\u4ece\u5b66\u672f\u8bba\u6587\u76f4\u63a5\u6784\u5efa\u7ade\u4e89\u6027\u7ec4\u5408\u4f18\u5316\u6c42\u89e3\u5668\uff0c\u4e3aLLM\u8f85\u52a9\u79d1\u5b66\u8f6f\u4ef6\u5f00\u53d1\u63d0\u4f9b\u4e86\u771f\u5b9e\u6848\u4f8b\u4e0e\u65b9\u6cd5\u8bba\u53c2\u8003\uff0c\u5bf9AI\u8f85\u52a9\u7f16\u7a0b\u548c\u81ea\u52a8\u5316\u7b97\u6cd5\u5b9e\u73b0\u7814\u7a76\u5177\u6709\u91cd\u8981\u542f\u793a\u3002"}, {"abstract": "Payment integration is a demanding repository-level software task: agents must select a suitable product, implement coordinated client-server flows, verify payment outcomes, and preserve consistency between transaction and business states. We introduce Alipay-PIBench, a benchmark for evaluating coding agents on realistic Alipay payment integration. It contains nine product-specific projects and 18 task instances, each organized into Basic functional-completion and Advanced risk-aware hardening scenarios. Scenario-specific rubrics support deterministic static, unit, integration, and end-to-end checks, supplemented by LLM-assisted assessment for semantic requirements. We evaluate six coding-agent models and report rubric pass rate (RPR). Under the with-skill condition, mean RPR ranges from 68.58% to 91.37%. Access to the alipay-payment-integration skill improves mean RPR by 10.31 percentage points on average relative to the without-skill condition, with gains varying across models, products, and scenarios. Method-level results distinguish source-level completion, executable payment behavior, and payment-domain requirements. Alipay-PIBench provides a controlled setting for diagnosing model capability and evaluating structured guidance in payment integration.", "arxiv_id": "2607.14573", "arxiv_url": "https://arxiv.org/abs/2607.14573", "authors": ["Shiyu Ying", "Xuejie Cao", "Yingfan Ma", "Yuanhao Dong", "Wenyu Chen", "Bowen Song", "Lin Zhu"], "brief": "\u63d0\u51faAlipay-PIBench\uff0c\u4e00\u4e2a\u9762\u5411\u652f\u4ed8\u5b9d\u652f\u4ed8\u96c6\u6210\u4efb\u52a1\u7684\u4ee3\u7801\u667a\u80fd\u4f53\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5305\u542b9\u4e2a\u4ea7\u54c1\u4e13\u9879\u9879\u76ee\u548c18\u4e2a\u4efb\u52a1\u5b9e\u4f8b\uff0c\u8986\u76d6\u57fa\u7840\u529f\u80fd\u5b8c\u6210\u4e0e\u9ad8\u7ea7\u98ce\u9669\u52a0\u56fa\u4e24\u7c7b\u573a\u666f\uff0c\u652f\u6301\u9759\u6001\u3001\u5355\u5143\u3001\u96c6\u6210\u53ca\u7aef\u5230\u7aef\u591a\u7ef4\u5ea6\u8bc4\u6d4b\u3002", "categories": ["cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14573", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": ["\u57fa\u51c6\u5305\u542b18\u4e2a\u4efb\u52a1\u5b9e\u4f8b\uff0c\u5206\u4e3aBasic\uff08\u529f\u80fd\u5b8c\u6210\uff09\u548cAdvanced\uff08\u98ce\u9669\u52a0\u56fa\uff09\u4e24\u7c7b\u573a\u666f\uff0c\u914d\u5907\u786e\u5b9a\u6027\u8bc4\u5206\u89c4\u5219\u4e0eLLM\u8f85\u52a9\u8bed\u4e49\u8bc4\u4f30", "\u8bc4\u6d4b6\u4e2a\u4e3b\u6d41\u4ee3\u7801\u667a\u80fd\u4f53\u6a21\u578b\uff0c\u6709\u6280\u80fd\u6761\u4ef6\u4e0b\u5e73\u5747RPR\u4e3a68.58%~91.37%\uff0c\u5f15\u5165\u652f\u4ed8\u96c6\u6210\u6280\u80fd\u5e73\u5747\u63d0\u534710.31\u4e2a\u767e\u5206\u70b9", "\u65b9\u6cd5\u7ea7\u7ed3\u679c\u533a\u5206\u6e90\u7801\u5b8c\u6210\u5ea6\u3001\u53ef\u6267\u884c\u652f\u4ed8\u884c\u4e3a\u548c\u652f\u4ed8\u9886\u57df\u9700\u6c42\u4e09\u4e2a\u7ef4\u5ea6\uff0c\u652f\u6301\u7ec6\u7c92\u5ea6\u80fd\u529b\u8bca\u65ad"], "keywords": ["\u4ee3\u7801\u751f\u6210", "\u667a\u80fd\u4f53", "\u57fa\u51c6\u6d4b\u8bd5", "\u8f6f\u4ef6\u5de5\u7a0b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14573v1", "published_at": "2026-07-16", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Alipay-PIBench: A Realistic Payment Integration Benchmark for Coding Agents", "tldr": "\u652f\u4ed8\u5b9d\u63a8\u51fa\u652f\u4ed8\u96c6\u6210\u7f16\u7a0b\u667a\u80fd\u4f53\u57fa\u51c6\u6d4b\u8bd5\uff0c\u8bc4\u4f30\u4ee3\u7801\u667a\u80fd\u4f53\u5728\u771f\u5b9e\u652f\u4ed8\u573a\u666f\u4e2d\u7684\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faAlipay-PIBench\uff0c\u4e00\u4e2a\u9762\u5411\u652f\u4ed8\u5b9d\u652f\u4ed8\u96c6\u6210\u4efb\u52a1\u7684\u4ee3\u7801\u667a\u80fd\u4f53\u8bc4\u6d4b\u57fa\u51c6\uff0c\u5305\u542b9\u4e2a\u4ea7\u54c1\u4e13\u9879\u9879\u76ee\u548c18\u4e2a\u4efb\u52a1\u5b9e\u4f8b\uff0c\u8986\u76d6\u57fa\u7840\u529f\u80fd\u5b8c\u6210\u4e0e\u9ad8\u7ea7\u98ce\u9669\u52a0\u56fa\u4e24\u7c7b\u573a\u666f\uff0c\u652f\u6301\u9759\u6001\u3001\u5355\u5143\u3001\u96c6\u6210\u53ca\u7aef\u5230\u7aef\u591a\u7ef4\u5ea6\u8bc4\u6d4b\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9\u771f\u5b9e\u652f\u4ed8\u96c6\u6210\u573a\u666f\u7684\u4ed3\u5e93\u7ea7\u4ee3\u7801\u667a\u80fd\u4f53\u57fa\u51c6\uff0c\u586b\u8865\u4e86\u91d1\u878d\u9886\u57df\u8f6f\u4ef6\u5de5\u7a0b\u8bc4\u6d4b\u7a7a\u767d\uff0c\u5bf9\u8bc4\u4f30LLM\u5728\u590d\u6742\u4e1a\u52a1\u903b\u8f91\uff08\u5ba2\u6237\u7aef-\u670d\u52a1\u7aef\u534f\u540c\u3001\u4e8b\u52a1\u4e00\u81f4\u6027\uff09\u4e2d\u7684\u5b9e\u9645\u80fd\u529b\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "Techniques for modeling 3D scenes from image collections, such as 3D Gaussian Splatting (3DGS), are capable of generating high-quality novel views by leveraging graphics primitives with view-dependent appearance. In 3DGS, spherical harmonic (SH) are employed to model view-dependent color, resulting in a large number of SH coefficients per primitive and large memory requirements. While compression approaches have been proposed to mitigate this problem, they do not exploit the capabilities of modern Graphics Processing Units (GPUs) for parallel decoding and rendering. In this paper, we propose a method for compressing SH color coefficients using texture compression schemes specifically designed for efficient parallel GPU decoding and supported by dedicated hardware acceleration. It is shown that those methods can compress color coefficients more effectively than 2D textures by exploiting the fact that primitives can be locally grouped and reordered according to color. Furthermore, we introduce a bit-rate control strategy that preserves random access, enabling large-scale parallelization without compromising rendering performance. Experimental results using BC1 and BC7 texture compression formats show that GPU-based decompression can be achieved with negligible or imperceptible degradation in the visual quality of rendered 3DGS scenes.", "arxiv_id": "2607.14513", "arxiv_url": "https://arxiv.org/abs/2607.14513", "authors": ["Amir Said", "Randall Rauwendaal"], "brief": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8eGPU\u53cb\u597d\u7eb9\u7406\u538b\u7f29\uff08BC1/BC7\u683c\u5f0f\uff09\u76843DGS\u7403\u8c10\u7cfb\u6570\u538b\u7f29\u65b9\u6cd5\uff0c\u901a\u8fc7\u5bf9\u9ad8\u65af\u57fa\u5143\u6309\u989c\u8272\u5c40\u90e8\u5206\u7ec4\u91cd\u6392\uff0c\u5b9e\u73b0\u786c\u4ef6\u52a0\u901f\u5e76\u884c\u89e3\u7801\u4e0e\u6e32\u67d3\u3002", "categories": ["cs.CV", "eess.IV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14513", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": ["\u5229\u7528BC1\u548cBC7\u7eb9\u7406\u538b\u7f29\u683c\u5f0f\u538b\u7f29\u7403\u8c10\u7cfb\u6570\uff0c\u652f\u6301GPU\u786c\u4ef6\u52a0\u901f\u5e76\u884c\u89e3\u7801", "\u901a\u8fc7\u5bf9\u9ad8\u65af\u57fa\u5143\u6309\u989c\u8272\u5c40\u90e8\u5206\u7ec4\u91cd\u6392\uff0c\u6bd4\u76f4\u63a52D\u7eb9\u7406\u538b\u7f29\u66f4\u6709\u6548\u5730\u538b\u7f29\u989c\u8272\u7cfb\u6570", "\u5f15\u5165\u4fdd\u7559\u968f\u673a\u8bbf\u95ee\u7684\u7801\u7387\u63a7\u5236\u7b56\u7565\uff0c\u652f\u6301\u5927\u89c4\u6a21\u5e76\u884c\u5316\u4e14\u4e0d\u635f\u5931\u6e32\u67d3\u6027\u80fd\uff0c\u89c6\u89c9\u8d28\u91cf\u635f\u5931\u53ef\u5ffd\u7565\u4e0d\u8ba1"], "keywords": ["3D\u9ad8\u65af\u6cfc\u6e85", "\u7eb9\u7406\u538b\u7f29", "GPU\u6e32\u67d3", "\u4e09\u7ef4\u91cd\u5efa"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14513v1", "published_at": "2026-07-16", "score": 0.15, "selected_reasons": [], "thumbnail": null, "title": "Compression of 3D Gaussian Splatting Data Using GPU-friendly Graphics Texture Coding", "tldr": "\u5229\u7528GPU\u7eb9\u7406\u538b\u7f29\u65b9\u6848\u9ad8\u6548\u538b\u7f293D\u9ad8\u65af\u6cfc\u6e85\u7684\u7403\u8c10\u7cfb\u6570", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e00\u79cd\u57fa\u4e8eGPU\u53cb\u597d\u7eb9\u7406\u538b\u7f29\uff08BC1/BC7\u683c\u5f0f\uff09\u76843DGS\u7403\u8c10\u7cfb\u6570\u538b\u7f29\u65b9\u6cd5\uff0c\u901a\u8fc7\u5bf9\u9ad8\u65af\u57fa\u5143\u6309\u989c\u8272\u5c40\u90e8\u5206\u7ec4\u91cd\u6392\uff0c\u5b9e\u73b0\u786c\u4ef6\u52a0\u901f\u5e76\u884c\u89e3\u7801\u4e0e\u6e32\u67d3\u3002", "why_notable": "\u73b0\u67093DGS\u538b\u7f29\u65b9\u6cd5\u666e\u904d\u5ffd\u89c6GPU\u5e76\u884c\u89e3\u7801\u80fd\u529b\uff0c\u672c\u6587\u9996\u6b21\u5c06GPU\u7eb9\u7406\u538b\u7f29\u786c\u4ef6\u52a0\u901f\u5f15\u51653DGS\u538b\u7f29\u6d41\u7a0b\uff0c\u517c\u987e\u538b\u7f29\u7387\u4e0e\u5b9e\u65f6\u6e32\u67d3\u6548\u7387\uff0c\u5177\u6709\u8f83\u5f3a\u5de5\u7a0b\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Annotation quality is a major bottleneck in building reliable and explainable artificial intelligence (XAI) systems for mental health research. In depression-related datasets, labels are often assigned without structured evidence, symptom-level justification, or traceable alignment with the criteria of the Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition, Text Revision (DSM-5-TR), limiting both transparency and downstream model interpretability. We propose a self-evolving, expert-in-the-loop annotation framework for Major Depressive Disorder (MDD) that combines large language model (LLM)-assisted labeling with expert verification. The framework is intended to support the construction of explainable, DSM-5-TR-aligned datasets rather than to perform clinical diagnosis. It operates in three stages: candidate evidence selection from textual records, criterion-level DSM-5-TR analysis, and case-level synthesis that produces label-level diagnostic and severity annotations. A dual-memory architecture, composed of Example Memory and Reflection Memory, is designed to internalize expert feedback and iteratively improve future annotations without retraining. We describe this mechanism and leave its evaluation across multiple feedback cycles to future work. In addition to final labels, the framework exports clinical evidence, reasoning traces, and edit histories, enabling comprehensive auditability. In a pilot study using expert-reviewed samples, the proposed approach improves annotation consistency and explainability while reducing manual revision effort.", "arxiv_id": "2607.15202", "arxiv_url": "https://arxiv.org/abs/2607.15202", "authors": ["Hoang-Loc Cao", "Van Pham", "Truong Thanh Hung Nguyen", "Phuc Truong Loc Nguyen", "Phuc Ho", "Veronica Whitford", "Hung Cao"], "brief": "\u63d0\u51fa\u4e00\u79cd\u81ea\u8fdb\u5316\u7684\u4eba\u673a\u534f\u4f5c\u6807\u6ce8\u6846\u67b6\uff0c\u7528\u4e8e\u6291\u90c1\u75c7\u75c7\u72b6\u7684\u53ef\u89e3\u91ca\u6807\u6ce8\uff0c\u7ed3\u5408\u5927\u8bed\u8a00\u6a21\u578b\u8f85\u52a9\u6807\u6ce8\u4e0e\u4e13\u5bb6\u9a8c\u8bc1\uff0c\u5e76\u901a\u8fc7\u53cc\u8bb0\u5fc6\u67b6\u6784\uff08\u793a\u4f8b\u8bb0\u5fc6+\u53cd\u601d\u8bb0\u5fc6\uff09\u8fed\u4ee3\u6539\u8fdb\u6807\u6ce8\u8d28\u91cf\uff0c\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u6a21\u578b\u3002\u6846\u67b6\u8f93\u51fa\u4e0eDSM-5-TR\u5bf9\u9f50\u7684\u6807\u7b7e\u3001\u4e34\u5e8a\u8bc1\u636e\u548c\u63a8\u7406\u8f68\u8ff9\uff0c\u5728\u8bd5\u70b9\u7814\u7a76\u4e2d\u63d0\u5347\u4e86\u6807\u6ce8\u4e00\u81f4\u6027\u5e76\u51cf\u5c11\u4e86\u4eba\u5de5\u4fee\u8ba2\u5de5\u4f5c\u91cf\u3002", "categories": ["cs.AI", "cs.HC", "cs.MA", "cs.MM"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15202", "impact_score": 6, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u53ef\u89e3\u91caAI", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5fc3\u7406\u5065\u5eb7", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15202v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Self-Evolving Human-Centered Framework for Explainable Depression Symptom Annotation", "tldr": "\u63d0\u51fa\u4e00\u79cd\u81ea\u8fdb\u5316\u7684\u4eba\u673a\u534f\u4f5c\u6807\u6ce8\u6846\u67b6\uff0c\u7528\u4e8e\u6291\u90c1\u75c7\u75c7\u72b6\u7684\u53ef\u89e3\u91ca\u6807\u6ce8\uff0c\u7ed3\u5408\u5927\u8bed\u8a00\u6a21\u578b\u8f85\u52a9\u6807\u6ce8\u4e0e\u4e13\u5bb6\u9a8c\u8bc1\uff0c\u5e76\u901a\u8fc7\u53cc\u8bb0\u5fc6\u67b6\u6784\uff08\u793a\u4f8b\u8bb0\u5fc6+\u53cd\u601d\u8bb0\u5fc6\uff09\u8fed\u4ee3\u6539\u8fdb\u6807\u6ce8\u8d28\u91cf\uff0c\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u6a21\u578b\u3002\u6846\u67b6\u8f93\u51fa\u4e0eDSM-5-TR\u5bf9\u9f50\u7684\u6807\u7b7e\u3001\u4e34\u5e8a\u8bc1\u636e\u548c\u63a8\u7406\u8f68\u8ff9\uff0c\u5728\u8bd5\u70b9\u7814\u7a76\u4e2d\u63d0\u5347\u4e86\u6807\u6ce8\u4e00\u81f4\u6027\u5e76\u51cf\u5c11\u4e86\u4eba\u5de5\u4fee\u8ba2\u5de5\u4f5c\u91cf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Reinforcement learning has proven effective for improving reasoning in large language models, but extending it to Masked Diffusion Language Models (MDLMs) remains challenging due to the intractability of the log-likelihood estimation. Existing approaches approximate this log-likelihood by modeling only the token predictions, ignoring the order in which positions are unmasked during generation. We observe that MDLM generation involves two decisions at each step: what tokens to place at each masked position and which positions to remask. We formalize this as a two-stage action MDP, showing that the policy gradient naturally decomposes into a token term and a masking term. Combining optimization of both terms leads to state-of-the-art outcomes on mathematical reasoning and coding benchmarks, with scores of 87.1% on GSM8K and 53.4% on MBPP.", "arxiv_id": "2607.15200", "arxiv_url": "https://arxiv.org/abs/2607.15200", "authors": ["Haran Raajesh", "Kulin Shah", "Adam Klivans", "Philipp Kr\u00e4henb\u00fchl"], "brief": "\u9488\u5bf9\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff08MDLM\uff09\u7684\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u96be\u9898\uff0c\u63d0\u51fa\u5c06\u751f\u6210\u8fc7\u7a0b\u5efa\u6a21\u4e3a\u4e24\u9636\u6bb5\u52a8\u4f5cMDP\uff0c\u7b56\u7565\u68af\u5ea6\u81ea\u7136\u5206\u89e3\u4e3atoken\u9884\u6d4b\u9879\u548c\u63a9\u7801\u4f4d\u7f6e\u9879\uff0c\u540c\u65f6\u4f18\u5316\u4e24\u9879\u540e\u5728\u6570\u5b66\u63a8\u7406\uff08GSM8K 87.1%\uff09\u548c\u4ee3\u7801\u751f\u6210\uff08MBPP 53.4%\uff09\u57fa\u51c6\u4e0a\u8fbe\u5230\u6700\u4f18\u6548\u679c\u3002", "categories": ["cs.CL", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15200", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6269\u6563\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u8bed\u8a00\u6a21\u578b", "\u7b56\u7565\u68af\u5ea6"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15200v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Mask-Aware Policy Gradients for Diffusion Language Models", "tldr": "\u9488\u5bf9\u63a9\u7801\u6269\u6563\u8bed\u8a00\u6a21\u578b\uff08MDLM\uff09\u7684\u5f3a\u5316\u5b66\u4e60\u8bad\u7ec3\u96be\u9898\uff0c\u63d0\u51fa\u5c06\u751f\u6210\u8fc7\u7a0b\u5efa\u6a21\u4e3a\u4e24\u9636\u6bb5\u52a8\u4f5cMDP\uff0c\u7b56\u7565\u68af\u5ea6\u81ea\u7136\u5206\u89e3\u4e3atoken\u9884\u6d4b\u9879\u548c\u63a9\u7801\u4f4d\u7f6e\u9879\uff0c\u540c\u65f6\u4f18\u5316\u4e24\u9879\u540e\u5728\u6570\u5b66\u63a8\u7406\uff08GSM8K 87.1%\uff09\u548c\u4ee3\u7801\u751f\u6210\uff08MBPP 53.4%\uff09\u57fa\u51c6\u4e0a\u8fbe\u5230\u6700\u4f18\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "We present a novel viewpoint for uncertainty quantification. Uncertainty measures are not primitives, in need of axioms and argumentation, but instead consequences, of higher-level modelling decisions. We show how epistemic and aleatoric uncertainty measures can be derived via decomposition of a subjective risk, based on a strictly proper loss. Reverse cross-entropy provides a prominent example, where decomposition recovers the classic information-theoretic uncertainty terms. The same approach recovers numerous measures previously proposed across the UQ literature, providing them a common theoretical foundation. From a practical point of view, this suggests a new approach to UQ: given a modelling scenario and strictly proper loss, the corresponding epistemic and aleatoric terms are induced by the subjective-risk decomposition. We then extend our view to learning theory: we introduce and analyse subjective risk analogues of excess risk, approximation error, and estimation error, and identify the connections to UQ. We consider this a first step towards a full learning-theoretic framework for uncertainty quantification.", "arxiv_id": "2607.15196", "arxiv_url": "https://arxiv.org/abs/2607.15196", "authors": ["Raghad Alamri", "Michele Caprio", "Gavin Brown"], "brief": "\u63d0\u51fa\u4e00\u79cd\u65b0\u7684\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u89c6\u89d2\uff1a\u5c06\u8ba4\u77e5\u4e0d\u786e\u5b9a\u6027\u548c\u5076\u7136\u4e0d\u786e\u5b9a\u6027\u89c6\u4e3a\u4e3b\u89c2\u98ce\u9669\u5206\u89e3\u7684\u7ed3\u679c\uff0c\u800c\u975e\u9700\u8981\u516c\u7406\u5316\u7684\u539f\u59cb\u6982\u5ff5\u3002\u57fa\u4e8e\u4e25\u683c\u9002\u5f53\u635f\u5931\u51fd\u6570\u7684\u5206\u89e3\u6846\u67b6\u7edf\u4e00\u4e86\u6587\u732e\u4e2d\u4f17\u591a\u5df2\u6709\u7684\u4e0d\u786e\u5b9a\u6027\u5ea6\u91cf\uff0c\u5e76\u5c06\u8be5\u6846\u67b6\u5ef6\u4f38\u81f3\u5b66\u4e60\u7406\u8bba\uff0c\u4e3a\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u5efa\u7acb\u7edf\u4e00\u7684\u7406\u8bba\u57fa\u7840\u3002", "categories": ["stat.ML", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15196", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e0d\u786e\u5b9a\u6027\u91cf\u5316", "\u8ba4\u77e5\u4e0d\u786e\u5b9a\u6027", "\u5b66\u4e60\u7406\u8bba", "\u4fe1\u606f\u8bba"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15196v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Subjective Risk Decomposition: A New View for Uncertainty Quantification", "tldr": "\u63d0\u51fa\u4e00\u79cd\u65b0\u7684\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u89c6\u89d2\uff1a\u5c06\u8ba4\u77e5\u4e0d\u786e\u5b9a\u6027\u548c\u5076\u7136\u4e0d\u786e\u5b9a\u6027\u89c6\u4e3a\u4e3b\u89c2\u98ce\u9669\u5206\u89e3\u7684\u7ed3\u679c\uff0c\u800c\u975e\u9700\u8981\u516c\u7406\u5316\u7684\u539f\u59cb\u6982\u5ff5\u3002\u57fa\u4e8e\u4e25\u683c\u9002\u5f53\u635f\u5931\u51fd\u6570\u7684\u5206\u89e3\u6846\u67b6\u7edf\u4e00\u4e86\u6587\u732e\u4e2d\u4f17\u591a\u5df2\u6709\u7684\u4e0d\u786e\u5b9a\u6027\u5ea6\u91cf\uff0c\u5e76\u5c06\u8be5\u6846\u67b6\u5ef6\u4f38\u81f3\u5b66\u4e60\u7406\u8bba\uff0c\u4e3a\u4e0d\u786e\u5b9a\u6027\u91cf\u5316\u5efa\u7acb\u7edf\u4e00\u7684\u7406\u8bba\u57fa\u7840\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "AI benchmarks increasingly leverage item-level statistical models, particularly item response theory (IRT), to estimate model capabilities, rank systems, select informative examples, and diagnose benchmark quality. However, AI benchmark data often departs from the data regime of human testing, for which standard IRT estimation tools were originally developed: benchmarks typically involve fewer evaluated models, far more items, and capability distributions that may be skewed, clustered, or multimodal. We examine how these regime mismatches challenge the reliability of IRT modeling for AI evaluation. Using item parameters and capability distributions derived from six widely used LLM benchmarks, we simulate response matrices under three common IRT models and compare four estimation tools used in recent benchmark studies: marginal maximum likelihood, Markov chain Monte Carlo, variational inference, and a neural pseudo-Siamese estimator. Across 18,000 simulation conditions, we systematically evaluate computational feasibility, scalability, and the reliability of IRT inferences about model rankings, predicted performance, and item characteristics. Results show that classical estimators can become infeasible in large benchmark settings, whereas scalable estimators can produce unreliable item-level and ranking inferences with small or nonnormally distributed model sets. This study identifies when latent trait models reliably support or risk distorting AI benchmarking claims, and what sample sizes and diagnostics are needed for trustworthy use.", "arxiv_id": "2607.15190", "arxiv_url": "https://arxiv.org/abs/2607.15190", "authors": ["Han Jiang", "Sunbeom Kwon", "Jinwen Luo", "Ziang Xiao", "Susu Zhang"], "brief": "\u7814\u7a76\u8003\u5bdf\u4e86\u9879\u76ee\u53cd\u5e94\u7406\u8bba\uff08IRT\uff09\u5728AI\u57fa\u51c6\u8bc4\u6d4b\u4e2d\u7684\u53ef\u9760\u6027\u95ee\u9898\u3002\u7531\u4e8eAI\u8bc4\u6d4b\u6570\u636e\u4e0eIRT\u6700\u521d\u8bbe\u8ba1\u7684\u4eba\u7c7b\u6d4b\u8bd5\u573a\u666f\u5b58\u5728\u663e\u8457\u5dee\u5f02\uff08\u6a21\u578b\u6570\u91cf\u5c11\u3001\u9898\u76ee\u591a\u3001\u80fd\u529b\u5206\u5e03\u975e\u6b63\u6001\uff09\uff0c\u901a\u8fc718000\u79cd\u6a21\u62df\u6761\u4ef6\u7cfb\u7edf\u8bc4\u4f30\u4e86\u56db\u79cdIRT\u4f30\u8ba1\u5de5\u5177\uff0c\u53d1\u73b0\u7ecf\u5178\u4f30\u8ba1\u5668\u5728\u5927\u89c4\u6a21\u57fa\u51c6\u4e2d\u4e0d\u53ef\u884c\uff0c\u800c\u53ef\u6269\u5c55\u4f30\u8ba1\u5668\u5728\u5c0f\u6837\u672c\u6216\u975e\u6b63\u6001\u5206\u5e03\u4e0b\u4f1a\u4ea7\u751f\u4e0d\u53ef\u9760\u7684\u63a8\u65ad\u7ed3\u679c\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15190", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["AI\u8bc4\u6d4b", "\u57fa\u51c6\u6d4b\u8bd5", "\u9879\u76ee\u53cd\u5e94\u7406\u8bba", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15190v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Can We Trust Item Response Theory for AI Evaluation?", "tldr": "\u7814\u7a76\u8003\u5bdf\u4e86\u9879\u76ee\u53cd\u5e94\u7406\u8bba\uff08IRT\uff09\u5728AI\u57fa\u51c6\u8bc4\u6d4b\u4e2d\u7684\u53ef\u9760\u6027\u95ee\u9898\u3002\u7531\u4e8eAI\u8bc4\u6d4b\u6570\u636e\u4e0eIRT\u6700\u521d\u8bbe\u8ba1\u7684\u4eba\u7c7b\u6d4b\u8bd5\u573a\u666f\u5b58\u5728\u663e\u8457\u5dee\u5f02\uff08\u6a21\u578b\u6570\u91cf\u5c11\u3001\u9898\u76ee\u591a\u3001\u80fd\u529b\u5206\u5e03\u975e\u6b63\u6001\uff09\uff0c\u901a\u8fc718000\u79cd\u6a21\u62df\u6761\u4ef6\u7cfb\u7edf\u8bc4\u4f30\u4e86\u56db\u79cdIRT\u4f30\u8ba1\u5de5\u5177\uff0c\u53d1\u73b0\u7ecf\u5178\u4f30\u8ba1\u5668\u5728\u5927\u89c4\u6a21\u57fa\u51c6\u4e2d\u4e0d\u53ef\u884c\uff0c\u800c\u53ef\u6269\u5c55\u4f30\u8ba1\u5668\u5728\u5c0f\u6837\u672c\u6216\u975e\u6b63\u6001\u5206\u5e03\u4e0b\u4f1a\u4ea7\u751f\u4e0d\u53ef\u9760\u7684\u63a8\u65ad\u7ed3\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Transformer reasoning is limited by autoregressive decoding, which repeat edly compresses rich hidden computation through token space and makes it difficult for intermediate reasoning states to persist across time. We in troduce Transformers with Temporal Middle-Layer Recurrence (T2MLR), a transformers-based latent reasoning architecture that fuses a cached middle layer representation from the previous token directly into an earlier layer of the current token position, enabling abstract intermediate computation to persist across decoding steps with little inference overhead. Across natural-language pretraining and multi-hop reasoning finetuning, T2MLR consistently outperforms data- and parameter-matched Transformer base lines. Moreover, applying recurrence to only a localized middle-layer block (as little as 20% of the network) often outperforms full-layer recurrence. Im portantly, T2MLR does not require pretraining from scratch: retrofitting the recurrent pathway into an existing pretrained 1.7B Transformer and briefly finetuning substantially improves math reasoning, lowering the barrier to practical adoption. These results suggest that effective latent reasoning in Transformers does not require looping over all layers as in previous works, but can instead emerge more strongly from targeted middle-layer recurrence.", "arxiv_id": "2607.15178", "arxiv_url": "https://arxiv.org/abs/2607.15178", "authors": ["Ziyang Cai", "Xingyu Zhu", "Yihe Dong", "Yinghui He", "Sanjeev Arora"], "brief": "\u63d0\u51faT2MLR\u67b6\u6784\uff0c\u5c06\u524d\u4e00\u4e2atoken\u7684\u4e2d\u95f4\u5c42\u8868\u793a\u76f4\u63a5\u6ce8\u5165\u5f53\u524dtoken\u7684\u66f4\u65e9\u5c42\uff0c\u4f7f\u62bd\u8c61\u63a8\u7406\u72b6\u6001\u5728\u81ea\u56de\u5f52\u89e3\u7801\u8fc7\u7a0b\u4e2d\u6301\u7eed\u4f20\u9012\u3002\u8be5\u65b9\u6cd5\u4ec5\u9700\u5bf9\u7f51\u7edc20%\u7684\u4e2d\u95f4\u5c42\u65bd\u52a0\u5faa\u73af\u5373\u53ef\u8d85\u8d8a\u5168\u5c42\u5faa\u73af\u57fa\u7ebf\uff0c\u4e14\u53ef\u76f4\u63a5\u5fae\u8c03\u5df2\u6709\u9884\u8bad\u7ec3\u6a21\u578b\uff081.7B\u53c2\u6570\uff09\uff0c\u663e\u8457\u63d0\u5347\u6570\u5b66\u63a8\u7406\u80fd\u529b\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15178", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["Transformer", "\u6f5c\u5728\u63a8\u7406", "\u5faa\u73af\u795e\u7ecf\u7f51\u7edc", "\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15178v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "T^2MLR: Transformer with Temporal Middle-Layer Recurrence", "tldr": "\u63d0\u51faT2MLR\u67b6\u6784\uff0c\u5c06\u524d\u4e00\u4e2atoken\u7684\u4e2d\u95f4\u5c42\u8868\u793a\u76f4\u63a5\u6ce8\u5165\u5f53\u524dtoken\u7684\u66f4\u65e9\u5c42\uff0c\u4f7f\u62bd\u8c61\u63a8\u7406\u72b6\u6001\u5728\u81ea\u56de\u5f52\u89e3\u7801\u8fc7\u7a0b\u4e2d\u6301\u7eed\u4f20\u9012\u3002\u8be5\u65b9\u6cd5\u4ec5\u9700\u5bf9\u7f51\u7edc20%\u7684\u4e2d\u95f4\u5c42\u65bd\u52a0\u5faa\u73af\u5373\u53ef\u8d85\u8d8a\u5168\u5c42\u5faa\u73af\u57fa\u7ebf\uff0c\u4e14\u53ef\u76f4\u63a5\u5fae\u8c03\u5df2\u6709\u9884\u8bad\u7ec3\u6a21\u578b\uff081.7B\u53c2\u6570\uff09\uff0c\u663e\u8457\u63d0\u5347\u6570\u5b66\u63a8\u7406\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Multimodal large language models (MLLMs) are increasingly used to interpret visualizations, yet current evaluations remain largely chart-centric and provide limited evidence of understanding of scientific visualization (SciVis). We benchmark six MLLMs on the scientific visualization literacy assessment test, a standardized SciVis literacy assessment comprising 49 items based on 18 scientific visualizations and illustrations, spanning 8 techniques and 11 task types. We evaluate three closed-source and three open-source models under a closed-world protocol and compare their performance using data from 485 human participants. Results show that current MLLMs do not exhibit uniform SciVis literacy. Gemini is the strongest model overall, exceeding the human mean across the evaluated subsets, whereas the open-source models remain below the human baseline. Performance is highly uneven across techniques and tasks: models perform best on scientific illustration, search, and spatial understanding, but struggle on texture-based and integration-based visualizations and on quantitative estimation. Error analysis reveals recurring failures in fine-grained quantitative estimation, flow-direction interpretation, and grounded encoding interpretation. These findings position SciVis literacy as a necessary benchmark dimension for evaluating multimodal AI systems. Our code and model outputs are publicly available at https://github.com/patdmp/mllm-scivis-lit-benchmark.", "arxiv_id": "2607.15176", "arxiv_url": "https://arxiv.org/abs/2607.15176", "authors": ["Patrick Phuoc Do", "Chau M. Ta", "Chaoli Wang"], "brief": "\u5bf9\u516d\u4e2a\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08\u542b\u95ed\u6e90\u548c\u5f00\u6e90\uff09\u8fdb\u884c\u79d1\u5b66\u53ef\u89c6\u5316\u7d20\u517b\u57fa\u51c6\u6d4b\u8bd5\uff0c\u53d1\u73b0Gemini\u6574\u4f53\u6700\u5f3a\u4e14\u8d85\u8fc7\u4eba\u7c7b\u5747\u503c\uff0c\u4f46\u5f00\u6e90\u6a21\u578b\u4ecd\u4f4e\u4e8e\u4eba\u7c7b\u57fa\u7ebf\uff1b\u6240\u6709\u6a21\u578b\u5728\u7eb9\u7406/\u79ef\u5206\u7c7b\u53ef\u89c6\u5316\u53ca\u5b9a\u91cf\u4f30\u8ba1\u4efb\u52a1\u4e0a\u8868\u73b0\u8f83\u5dee\uff0c\u63ed\u793a\u4e86\u5f53\u524dMLLM\u5728\u79d1\u5b66\u53ef\u89c6\u5316\u7406\u89e3\u65b9\u9762\u7684\u7cfb\u7edf\u6027\u77ed\u677f\u3002", "categories": ["cs.AI", "cs.CL", "cs.HC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15176", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b", "\u79d1\u5b66\u53ef\u89c6\u5316", "\u57fa\u51c6\u6d4b\u8bd5", "\u53ef\u89c6\u5316\u7406\u89e3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15176v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Benchmarking Multimodal Large Language Models for Scientific Visualization Literacy", "tldr": "\u5bf9\u516d\u4e2a\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08\u542b\u95ed\u6e90\u548c\u5f00\u6e90\uff09\u8fdb\u884c\u79d1\u5b66\u53ef\u89c6\u5316\u7d20\u517b\u57fa\u51c6\u6d4b\u8bd5\uff0c\u53d1\u73b0Gemini\u6574\u4f53\u6700\u5f3a\u4e14\u8d85\u8fc7\u4eba\u7c7b\u5747\u503c\uff0c\u4f46\u5f00\u6e90\u6a21\u578b\u4ecd\u4f4e\u4e8e\u4eba\u7c7b\u57fa\u7ebf\uff1b\u6240\u6709\u6a21\u578b\u5728\u7eb9\u7406/\u79ef\u5206\u7c7b\u53ef\u89c6\u5316\u53ca\u5b9a\u91cf\u4f30\u8ba1\u4efb\u52a1\u4e0a\u8868\u73b0\u8f83\u5dee\uff0c\u63ed\u793a\u4e86\u5f53\u524dMLLM\u5728\u79d1\u5b66\u53ef\u89c6\u5316\u7406\u89e3\u65b9\u9762\u7684\u7cfb\u7edf\u6027\u77ed\u677f\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Most medical AI benchmarks measure whether a model knows the correct answer. MedFailBench asks a different question: which safety boundary failed? We present a clinician-built synthetic benchmark and failure atlas that labels medical AI errors by severity (1--5) and safety gate type (missed urgent escalation, unsafe remote dosing, unsafe discharge reassurance, evidence fabrication, unsafe protocol execution, source support gap). The current public release (v0.2.1) contains 44 clinician-reviewed synthetic cases with severity annotations, a live HuggingFace leaderboard preview, a safety gate taxonomy, a clinical severity rubric, and an automated pipeline for archiving model-response screening runs. No patient data, clinical validation claims, or model rankings are included. MedFailBench is released under Apache-2.0 and CC-BY-4.0 and carries the Zenodo DOI 10.5281/zenodo.21205535.", "arxiv_id": "2607.15166", "arxiv_url": "https://arxiv.org/abs/2607.15166", "authors": ["Goktug Ozkan"], "brief": "MedFailBench\u662f\u4e00\u4e2a\u7531\u4e34\u5e8a\u533b\u751f\u6784\u5efa\u7684\u533b\u7597AI\u5b89\u5168\u8fb9\u754c\u68c0\u6d4b\u57fa\u51c6\uff0c\u4e13\u6ce8\u4e8e\u8bc6\u522bAI\u5931\u8d25\u7684\u7c7b\u578b\u800c\u975e\u6b63\u786e\u7387\u3002\u8be5\u57fa\u51c6\u5305\u542b44\u4e2a\u5408\u6210\u6848\u4f8b\uff0c\u6309\u4e25\u91cd\u7a0b\u5ea6\uff081-5\u7ea7\uff09\u548c\u5b89\u5168\u95e8\u7c7b\u578b\uff08\u5982\u9519\u8bef\u5347\u7ea7\u3001\u4e0d\u5b89\u5168\u5242\u91cf\u5efa\u8bae\u3001\u8bc1\u636e\u634f\u9020\u7b49\uff09\u6807\u6ce8\uff0c\u5e76\u63d0\u4f9b\u81ea\u52a8\u5316\u8bc4\u4f30\u6d41\u6c34\u7ebf\u548c\u516c\u5f00\u6392\u884c\u699c\u3002", "categories": ["cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15166", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u7597AI", "\u5b89\u5168\u8bc4\u6d4b", "\u57fa\u51c6\u6d4b\u8bd5", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15166v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "MedFailBench: A Clinician-Built Open-Source Benchmark for Medical AI Safety Boundary Inspection", "tldr": "MedFailBench\u662f\u4e00\u4e2a\u7531\u4e34\u5e8a\u533b\u751f\u6784\u5efa\u7684\u533b\u7597AI\u5b89\u5168\u8fb9\u754c\u68c0\u6d4b\u57fa\u51c6\uff0c\u4e13\u6ce8\u4e8e\u8bc6\u522bAI\u5931\u8d25\u7684\u7c7b\u578b\u800c\u975e\u6b63\u786e\u7387\u3002\u8be5\u57fa\u51c6\u5305\u542b44\u4e2a\u5408\u6210\u6848\u4f8b\uff0c\u6309\u4e25\u91cd\u7a0b\u5ea6\uff081-5\u7ea7\uff09\u548c\u5b89\u5168\u95e8\u7c7b\u578b\uff08\u5982\u9519\u8bef\u5347\u7ea7\u3001\u4e0d\u5b89\u5168\u5242\u91cf\u5efa\u8bae\u3001\u8bc1\u636e\u634f\u9020\u7b49\uff09\u6807\u6ce8\uff0c\u5e76\u63d0\u4f9b\u81ea\u52a8\u5316\u8bc4\u4f30\u6d41\u6c34\u7ebf\u548c\u516c\u5f00\u6392\u884c\u699c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Artificial intelligence is transforming scientific research - not merely as a more powerful instrument, but as an autonomous participant in the research cycle itself. This transition constitutes, in the most precise sense of the term, the industrialization of research: a shift from a craft model, in which knowledge, method, and judgment are embedded in the researcher, to a pipeline model, in which these steps are decomposed, automated, and supervised. The US Department of Energy\u0027s Genesis Mission is the most ambitious current instantiation of this shift, but the fundamental questions it raises extend far beyond any single program. This essay examines seven such questions: the erosion of the intergenerational transmission of scientific competence; the growing opacity of AI-generated theories; the collapse of peer evaluation under a flood of machine-generated output; the unproven capacity of AI for paradigm-shifting discovery; the capture of the scientific agenda by political and industrial actors; the compounding of systematic errors in closed-loop pipelines; and the structural bifurcation of the global research community into incommensurable tiers. These concerns do not constitute an argument against AI-driven science - whose demonstrated potential is real and significant. They constitute the conditions under which that potential can be responsibly pursued.", "arxiv_id": "2607.15164", "arxiv_url": "https://arxiv.org/abs/2607.15164", "authors": ["Emmanuel Jeannot"], "brief": "\u672c\u6587\u5c06AI\u9a71\u52a8\u7684\u79d1\u5b66\u7814\u7a76\u5b9a\u6027\u4e3a\"\u7814\u7a76\u5de5\u4e1a\u5316\"\u2014\u2014\u4ece\u4ee5\u7814\u7a76\u8005\u4e3a\u6838\u5fc3\u7684\u624b\u5de5\u6a21\u5f0f\u8f6c\u5411\u81ea\u52a8\u5316\u6d41\u6c34\u7ebf\u6a21\u5f0f\u3002\u6587\u7ae0\u7cfb\u7edf\u68b3\u7406\u4e86\u4e03\u5927\u9690\u60a3\uff0c\u5305\u62ec\u79d1\u5b66\u80fd\u529b\u4ee3\u9645\u4f20\u627f\u65ad\u88c2\u3001AI\u7406\u8bba\u4e0d\u900f\u660e\u3001\u540c\u884c\u8bc4\u5ba1\u5d29\u6e83\u3001\u8303\u5f0f\u7a81\u7834\u80fd\u529b\u5b58\u7591\u3001\u8bae\u7a0b\u88ab\u653f\u6cbb/\u4ea7\u4e1a\u6355\u83b7\u3001\u95ed\u73af\u8bef\u5dee\u7d2f\u79ef\u53ca\u5168\u7403\u7814\u7a76\u793e\u533a\u5206\u5c42\uff0c\u5e76\u547c\u5401\u5728\u627f\u8ba4AI\u6f5c\u529b\u7684\u540c\u65f6\u8d1f\u8d23\u4efb\u5730\u63a8\u8fdb\u3002", "categories": ["cs.AI", "cs.CY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15164", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["AI\u79d1\u5b66\u7814\u7a76", "\u79d1\u7814\u81ea\u52a8\u5316", "\u79d1\u6280\u653f\u7b56", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15164v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "The Industrialization of Research ; On AI-Driven Science and Its Consequences", "tldr": "\u672c\u6587\u5c06AI\u9a71\u52a8\u7684\u79d1\u5b66\u7814\u7a76\u5b9a\u6027\u4e3a\"\u7814\u7a76\u5de5\u4e1a\u5316\"\u2014\u2014\u4ece\u4ee5\u7814\u7a76\u8005\u4e3a\u6838\u5fc3\u7684\u624b\u5de5\u6a21\u5f0f\u8f6c\u5411\u81ea\u52a8\u5316\u6d41\u6c34\u7ebf\u6a21\u5f0f\u3002\u6587\u7ae0\u7cfb\u7edf\u68b3\u7406\u4e86\u4e03\u5927\u9690\u60a3\uff0c\u5305\u62ec\u79d1\u5b66\u80fd\u529b\u4ee3\u9645\u4f20\u627f\u65ad\u88c2\u3001AI\u7406\u8bba\u4e0d\u900f\u660e\u3001\u540c\u884c\u8bc4\u5ba1\u5d29\u6e83\u3001\u8303\u5f0f\u7a81\u7834\u80fd\u529b\u5b58\u7591\u3001\u8bae\u7a0b\u88ab\u653f\u6cbb/\u4ea7\u4e1a\u6355\u83b7\u3001\u95ed\u73af\u8bef\u5dee\u7d2f\u79ef\u53ca\u5168\u7403\u7814\u7a76\u793e\u533a\u5206\u5c42\uff0c\u5e76\u547c\u5401\u5728\u627f\u8ba4AI\u6f5c\u529b\u7684\u540c\u65f6\u8d1f\u8d23\u4efb\u5730\u63a8\u8fdb\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "World models are usually evaluated as components of model-based reinforcement learning (MBRL) systems, while the world models themselves are rarely studied in isolation. We examine five representative visual world-model agents in Atari Pong: DreamerV3, DIAMOND, TWISTER, Simulus, and STORM. After reproducing their training pipelines and matching the reported agent performance, we freeze the learned world models and evaluate them with a closed-loop rollout diagnostic: a policy trained separately from the corresponding MBRL agent interacts with each frozen model, and the generated video trajectories are inspected for visual and dynamical errors. Across all five models, the rollouts contain clear failures, including ball disappearance, incorrect ball motion, and invalid ball-paddle interactions. Beyond visual trajectories, we further evaluate them with pixel-space zero-shot MBRL, where a new policy is trained entirely inside a frozen world model and then evaluated in the real environment. Across all five models, the resulting policies substantially underperform those produced by the corresponding original MBRL training pipelines. The gap is particularly large for DreamerV3, whose mean return drops from -5.5 to -20.9, near the minimum Pong return of -21. We hypothesize that insufficient modeling of task-critical concepts, such as the ball in Pong, may contribute to these failures. We therefore propose Concept-Guided Spatial Regularization (CGSReg), an auxiliary pixel reconstruction loss applied to segmented concept regions. Experiments show that CGSReg improves both closed-loop rollouts and pixel-space zero-shot MBRL in DreamerV3, DIAMOND, and TWISTER. Its effects vary across the remaining models and evaluation metrics, indicating that CGSReg alone does not address all world-model bottlenecks.", "arxiv_id": "2607.15142", "arxiv_url": "https://arxiv.org/abs/2607.15142", "authors": ["Yukuan Lu", "Zaishuo Xia", "Weyl Lu", "Yubei Chen"], "brief": "\u7814\u7a76\u8005\u7cfb\u7edf\u8bc4\u4f30\u4e86\u4e94\u79cd\u89c6\u89c9\u4e16\u754c\u6a21\u578b\u5728Atari Pong\u4e2d\u7684\u72ec\u7acb\u8868\u73b0\uff0c\u53d1\u73b0\u6240\u6709\u6a21\u578b\u5728\u95ed\u73af\u63a8\u6f14\u4e2d\u5747\u5b58\u5728\u7403\u6d88\u5931\u3001\u8fd0\u52a8\u9519\u8bef\u7b49\u660e\u663e\u7f3a\u9677\uff0c\u96f6\u6837\u672c\u7b56\u7565\u8fc1\u79fb\u6027\u80fd\u5927\u5e45\u4e0b\u964d\u3002\u4e3a\u6b64\u63d0\u51fa\u6982\u5ff5\u5f15\u5bfc\u7a7a\u95f4\u6b63\u5219\u5316\uff08CGSReg\uff09\uff0c\u901a\u8fc7\u5bf9\u5173\u952e\u6982\u5ff5\u533a\u57df\u65bd\u52a0\u8f85\u52a9\u50cf\u7d20\u91cd\u5efa\u635f\u5931\uff0c\u5728\u591a\u4e2a\u6a21\u578b\u4e0a\u6539\u5584\u4e86\u4e16\u754c\u6a21\u578b\u8d28\u91cf\uff0c\u4f46\u5e76\u4e0d\u80fd\u89e3\u51b3\u6240\u6709\u74f6\u9888\u95ee\u9898\u3002", "categories": ["cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15142", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60", "\u6a21\u578b\u8bc4\u4f30", "\u7a7a\u95f4\u6b63\u5219\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15142v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Concept-Guided Spatial Regularization for World Models in Atari Pong", "tldr": "\u7814\u7a76\u8005\u7cfb\u7edf\u8bc4\u4f30\u4e86\u4e94\u79cd\u89c6\u89c9\u4e16\u754c\u6a21\u578b\u5728Atari Pong\u4e2d\u7684\u72ec\u7acb\u8868\u73b0\uff0c\u53d1\u73b0\u6240\u6709\u6a21\u578b\u5728\u95ed\u73af\u63a8\u6f14\u4e2d\u5747\u5b58\u5728\u7403\u6d88\u5931\u3001\u8fd0\u52a8\u9519\u8bef\u7b49\u660e\u663e\u7f3a\u9677\uff0c\u96f6\u6837\u672c\u7b56\u7565\u8fc1\u79fb\u6027\u80fd\u5927\u5e45\u4e0b\u964d\u3002\u4e3a\u6b64\u63d0\u51fa\u6982\u5ff5\u5f15\u5bfc\u7a7a\u95f4\u6b63\u5219\u5316\uff08CGSReg\uff09\uff0c\u901a\u8fc7\u5bf9\u5173\u952e\u6982\u5ff5\u533a\u57df\u65bd\u52a0\u8f85\u52a9\u50cf\u7d20\u91cd\u5efa\u635f\u5931\uff0c\u5728\u591a\u4e2a\u6a21\u578b\u4e0a\u6539\u5584\u4e86\u4e16\u754c\u6a21\u578b\u8d28\u91cf\uff0c\u4f46\u5e76\u4e0d\u80fd\u89e3\u51b3\u6240\u6709\u74f6\u9888\u95ee\u9898\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent FPGAs have improved deep learning (DL) inference efficiency through dedicated tensor blocks and in-BRAM computation. ReRAM-based analog in-memory computing (IMC) pushes efficiency further, offering an order-of-magnitude improvement in compute density and energy efficiency over conventional digital logic by performing vector-matrix multiplication (VMM) directly within the ReRAM crossbar; prior work has integrated such IMC blocks into FPGAs for DL inference. However, conventional IMC designs support only static-weight VMM, leaving nonlinear operations and dynamic matrix-matrix multiplication (DIMM) to the FPGA fabric. As a result, the benefits of IMC are largely confined to static-weight models, whereas Transformer-based models, which rely on frequent nonlinear and DIMM operations, gain only limited improvement. Moreover, the ADCs within each IMC block consume more than 70% of its area and power, further limiting system efficiency and scalability. To address these limitations, we propose a novel FPGA architecture that integrates an ADC-free IMC block, replacing the conventional ADC with analog content-addressable memories (ACAMs) that natively perform nonlinear operations inside the block. To fully exploit this block, we conduct an FPGA-aware design-space exploration that determines optimal crossbar dimensions while balancing FPGA area, flexibility, and DL performance, and we develop an efficient mapping that leverages ACAMs to carry out DIMM operations, extending the applicability of IMC to attention computation. On CNN and Transformer-based benchmarks, the proposed architecture achieves up to 40x and 1.9x higher energy efficiency and 4.1x and 2.5x higher area efficiency, respectively. Overall, it significantly improves FPGA DL inference efficiency and sustains robust gains on Transformer-based workloads across long input sequences, advancing domain-specialized FPGA design.", "arxiv_id": "2607.15123", "arxiv_url": "https://arxiv.org/abs/2607.15123", "authors": ["Jiajun Hu", "Ruthwik Reddy Sunketa", "Lei Zhao", "Archit Gajjar", "Luca Buonanno", "Aman Arora"], "brief": "\u63d0\u51faNIFA\u67b6\u6784\uff0c\u5c06\u65e0ADC\u7684\u6a21\u62df\u5185\u5b58\u8ba1\u7b97\uff08IMC\uff09\u5757\u96c6\u6210\u5230FPGA\u4e2d\uff0c\u7528\u6a21\u62df\u5185\u5bb9\u5bfb\u5740\u5b58\u50a8\u5668\uff08ACAM\uff09\u66ff\u4ee3\u4f20\u7edfADC\u5e76\u539f\u751f\u652f\u6301\u975e\u7ebf\u6027\u8fd0\u7b97\uff0c\u540c\u65f6\u6269\u5c55\u81f3Transformer\u7684\u52a8\u6001\u77e9\u9635\u4e58\u6cd5\u3002\u5728CNN\u548cTransformer\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c\u80fd\u6548\u5206\u522b\u63d0\u5347\u6700\u9ad840\u500d\u548c1.9\u500d\uff0c\u9762\u79ef\u6548\u7387\u5206\u522b\u63d0\u53474.1\u500d\u548c2.5\u500d\u3002", "categories": ["cs.AR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15123", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["FPGA", "\u5185\u5b58\u8ba1\u7b97", "\u6df1\u5ea6\u5b66\u4e60\u63a8\u7406", "Transformer"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15123v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "NIFA: Nonlinear IMC enhanced FPGA for efficient ML inference", "tldr": "\u63d0\u51faNIFA\u67b6\u6784\uff0c\u5c06\u65e0ADC\u7684\u6a21\u62df\u5185\u5b58\u8ba1\u7b97\uff08IMC\uff09\u5757\u96c6\u6210\u5230FPGA\u4e2d\uff0c\u7528\u6a21\u62df\u5185\u5bb9\u5bfb\u5740\u5b58\u50a8\u5668\uff08ACAM\uff09\u66ff\u4ee3\u4f20\u7edfADC\u5e76\u539f\u751f\u652f\u6301\u975e\u7ebf\u6027\u8fd0\u7b97\uff0c\u540c\u65f6\u6269\u5c55\u81f3Transformer\u7684\u52a8\u6001\u77e9\u9635\u4e58\u6cd5\u3002\u5728CNN\u548cTransformer\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c\u80fd\u6548\u5206\u522b\u63d0\u5347\u6700\u9ad840\u500d\u548c1.9\u500d\uff0c\u9762\u79ef\u6548\u7387\u5206\u522b\u63d0\u53474.1\u500d\u548c2.5\u500d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Parameter-efficient fine-tuning reduces model and optimizer memory, but dense attention still makes long training sequences expensive. We combine Hierarchical Global Attention (HGA) with segment-wise backpropagation and tiered KV storage. Only the active segment remains differentiable in VRAM; older KV is detached into RAM or NVMe, and HGA loads a bounded set of exact historical tokens for each query block. On Qwen3-8B with 4-bit QLoRA and PG19, dense training on a 16 GB Quadro RTX 5000 fits 2,048 tokens but fails at 4,096, whereas HGA reaches 16,384 tokens with 15.28 GB peak VRAM. Under evaluation the same adapter runs through 131,072 tokens on this card; VRAM is not constant but grows gently with the resident chunk summaries, so RAM and NVMe capacity set the practical limit beyond these lengths. At the shared 2K training length, HGA-trained and dense-trained adapters obtain 2.7405 and 2.7383 nat under the same dense-attention readout, while the stock model obtains 2.9541. At this boundary HGA training is already marginally faster (217.75 vs. 207.02 tokens/s), and the HGA-to-dense throughput ratio improves from 1K to 2K; because HGA keeps the attended historical set per token approximately constant while dense work per token grows, we expect this lead to widen as context grows. Dense attention is used for the main quality and retrieval comparisons so that they measure the learned weights and remain compatible with standard generation frameworks. HGA can also be used for retrieval and generation; an optimized production-grade serving implementation is under development.", "arxiv_id": "2607.15105", "arxiv_url": "https://arxiv.org/abs/2607.15105", "authors": ["Vladimir Fedosov", "Aleksandr Sazhin", "Artemiy Grinenko", "Frank Woernle"], "brief": "\u63d0\u51fa\u5c06\u5c42\u6b21\u5316\u5168\u5c40\u6ce8\u610f\u529b\uff08HGA\uff09\u4e0e\u5206\u6bb5\u53cd\u5411\u4f20\u64ad\u548c\u5206\u5c42KV\u5b58\u50a8\u7ed3\u5408\uff0c\u89e3\u51b3\u957f\u4e0a\u4e0b\u6587\u5fae\u8c03\u663e\u5b58\u4e0d\u8db3\u95ee\u9898\u3002\u572816GB\u663e\u5361\u4e0a\uff0c\u6807\u51c6\u8bad\u7ec3\u6700\u591a\u652f\u63012048 token\uff0c\u800cHGA\u53ef\u6269\u5c55\u81f316384 token\u8bad\u7ec3\u3001131072 token\u63a8\u7406\uff0c\u4e14\u8bad\u7ec3\u8d28\u91cf\u4e0e\u5bc6\u96c6\u6ce8\u610f\u529b\u76f8\u5f53\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15105", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u957f\u4e0a\u4e0b\u6587", "\u53c2\u6570\u9ad8\u6548\u5fae\u8c03", "\u6ce8\u610f\u529b\u673a\u5236", "\u663e\u5b58\u4f18\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15105v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Long-Context Fine-Tuning with Limited VRAM", "tldr": "\u63d0\u51fa\u5c06\u5c42\u6b21\u5316\u5168\u5c40\u6ce8\u610f\u529b\uff08HGA\uff09\u4e0e\u5206\u6bb5\u53cd\u5411\u4f20\u64ad\u548c\u5206\u5c42KV\u5b58\u50a8\u7ed3\u5408\uff0c\u89e3\u51b3\u957f\u4e0a\u4e0b\u6587\u5fae\u8c03\u663e\u5b58\u4e0d\u8db3\u95ee\u9898\u3002\u572816GB\u663e\u5361\u4e0a\uff0c\u6807\u51c6\u8bad\u7ec3\u6700\u591a\u652f\u63012048 token\uff0c\u800cHGA\u53ef\u6269\u5c55\u81f316384 token\u8bad\u7ec3\u3001131072 token\u63a8\u7406\uff0c\u4e14\u8bad\u7ec3\u8d28\u91cf\u4e0e\u5bc6\u96c6\u6ce8\u610f\u529b\u76f8\u5f53\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Understanding newspaper images remains a challenging task due to their complex, nested hierarchical structures and dense, heterogeneous layouts. In this paper, we explore two complementary approaches for newspaper structure understanding. First, we present a modular bottom-up pipeline that combines state-of-the-art open-source models: YOLO for layout detection, LayoutReader for reading order prediction, and a custom algorithm for article segmentation. This approach leverages existing robust components while maintaining flexibility and interpretability. Second, we introduce Tiramisu (Tiered Transformers for Hierarchical Structure Understanding), a novel end-to-end transformer-based architecture that explicitly models document hierarchy through an iterative tiered process. Tiramisu performs section and article separation, block localization, semantic categorization, and reading order prediction using highly parallelized attention mechanisms. Finally, we release Finlam La Libert\u00e9, a new dataset designed specifically for evaluating hierarchical information retrieval in historical newspapers. Experimental results demonstrate the effectiveness of both approaches in reconstructing complex newspaper hierarchies, with comparative analysis highlighting their respective strengths for scalable document digitization. The Tiramisu training code, including the synthetic newspaper generator, is available at https://git.litislab.fr/tiramisu/tiramisu-newspaper-articles-extractor.", "arxiv_id": "2607.15082", "arxiv_url": "https://arxiv.org/abs/2607.15082", "authors": ["William Moca\u00ebr", "Sol\u00e8ne Tarride", "Thomas Constum", "Merveilles Agbeti-Messan", "Tom Simon", "Cl\u00e9ment Chatelain", "St\u00e9phane Nicolas", "Pierrick Tranouez", "S\u00e9bastien Cretin", "Thierry Paquet"], "brief": "\u9488\u5bf9\u62a5\u7eb8\u56fe\u50cf\u590d\u6742\u5d4c\u5957\u5c42\u7ea7\u7ed3\u6784\u7684\u7406\u89e3\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e24\u79cd\u4e92\u8865\u65b9\u6848\uff1a\u4e00\u662f\u57fa\u4e8eYOLO\u3001LayoutReader\u7b49\u6a21\u5757\u5316\u81ea\u5e95\u5411\u4e0a\u6d41\u6c34\u7ebf\uff1b\u4e8c\u662f\u540d\u4e3aTiramisu\u7684\u7aef\u5230\u7aef\u5206\u5c42Transformer\u67b6\u6784\uff0c\u53ef\u540c\u65f6\u5b8c\u6210\u7248\u5757\u5206\u5272\u3001\u533a\u5757\u5b9a\u4f4d\u3001\u8bed\u4e49\u5206\u7c7b\u548c\u9605\u8bfb\u987a\u5e8f\u9884\u6d4b\u3002\u540c\u65f6\u53d1\u5e03\u4e86\u4e13\u7528\u4e8e\u5386\u53f2\u62a5\u7eb8\u5c42\u7ea7\u4fe1\u606f\u68c0\u7d22\u8bc4\u4f30\u7684\u65b0\u6570\u636e\u96c6Finlam La Libert\u00e9\u3002", "categories": ["cs.CV", "cs.AI", "cs.IR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15082", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u6863\u7406\u89e3", "\u7248\u9762\u5206\u6790", "Transformer", "\u5386\u53f2\u6587\u6863\u6570\u5b57\u5316"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15082v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Towards Hierarchical Structure Understanding of Newspaper Images", "tldr": "\u9488\u5bf9\u62a5\u7eb8\u56fe\u50cf\u590d\u6742\u5d4c\u5957\u5c42\u7ea7\u7ed3\u6784\u7684\u7406\u89e3\u95ee\u9898\uff0c\u63d0\u51fa\u4e86\u4e24\u79cd\u4e92\u8865\u65b9\u6848\uff1a\u4e00\u662f\u57fa\u4e8eYOLO\u3001LayoutReader\u7b49\u6a21\u5757\u5316\u81ea\u5e95\u5411\u4e0a\u6d41\u6c34\u7ebf\uff1b\u4e8c\u662f\u540d\u4e3aTiramisu\u7684\u7aef\u5230\u7aef\u5206\u5c42Transformer\u67b6\u6784\uff0c\u53ef\u540c\u65f6\u5b8c\u6210\u7248\u5757\u5206\u5272\u3001\u533a\u5757\u5b9a\u4f4d\u3001\u8bed\u4e49\u5206\u7c7b\u548c\u9605\u8bfb\u987a\u5e8f\u9884\u6d4b\u3002\u540c\u65f6\u53d1\u5e03\u4e86\u4e13\u7528\u4e8e\u5386\u53f2\u62a5\u7eb8\u5c42\u7ea7\u4fe1\u606f\u68c0\u7d22\u8bc4\u4f30\u7684\u65b0\u6570\u636e\u96c6Finlam La Libert\u00e9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The Internet taught us that the value of a network depends on \\emph{how} its nodes connect: broadcast stars scale as $V\\!\\propto\\!N$ (Sarnoff), fully-connected meshes as $N^2$ (Metcalfe), and group-forming networks as $2^{N}$ (Reed). We ask the analogous question for networks of AI agents. We model the net value of connection as a function of coordination-group size, derive from it the properties an optimal collaboration protocol must have, and introduce ANet Patu-1 -- a self-organizing consensus protocol in which the network continuously re-forms its own coalitions, adaptively riding the upper envelope of all three regimes at $O(1)$ parallel consensus rounds. To measure value without opinion-grading, we score an emergent protocol by formally specifying it and deriving its complexity, the way distributed algorithms are analyzed. Two results follow. (i)~Emergence -- a crowd of the \\emph{cheapest} model, when heterogeneous, starts weak but its collective value compounds with $N$ and \\emph{overtakes} a crowd of a far \\emph{stronger} model that is homogeneous: a crossover that marks a scaling law for collaboration rather than for scale. (ii)~Reflexivity -- a heterogeneous network, given only its own problem and no design hints, converges on ANet Patu-1 itself, reconstructing the high-dimensional law that governs its own connective value.", "arxiv_id": "2607.15053", "arxiv_url": "https://arxiv.org/abs/2607.15053", "authors": ["Mu Yuan", "Jinke Song", "Zhaomeng Zhou", "Lan Zhang"], "brief": "\u672c\u6587\u7814\u7a76AI\u667a\u80fd\u4f53\u7f51\u7edc\u4e2d\u8fde\u63a5\u4ef7\u503c\u7684\u89c4\u5f8b\uff0c\u7c7b\u6bd4Sarnoff/Metcalfe/Reed\u5b9a\u5f8b\uff0c\u63d0\u51fa\u81ea\u7ec4\u7ec7\u5171\u8bc6\u534f\u8baeANet Patu-1\uff0c\u4f7f\u667a\u80fd\u4f53\u7f51\u7edc\u80fd\u52a8\u6001\u91cd\u7ec4\u8054\u76df\u5e76\u5728O(1)\u5e76\u884c\u8f6e\u6b21\u5185\u8fbe\u6210\u5171\u8bc6\u3002\u5b9e\u9a8c\u8868\u660e\u5f02\u6784\u5ec9\u4ef7\u6a21\u578b\u7684\u96c6\u4f53\u4ef7\u503c\u968fN\u589e\u957f\u53ef\u8d85\u8d8a\u540c\u6784\u5f3a\u6a21\u578b\uff0c\u4e14\u5f02\u6784\u7f51\u7edc\u80fd\u81ea\u53d1\u91cd\u6784\u51fa\u8be5\u534f\u8bae\u672c\u8eab\u3002", "categories": ["cs.NI", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15053", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": [], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u667a\u80fd\u4f53\u534f\u4f5c", "\u7f51\u7edc\u534f\u8bae", "\u6d8c\u73b0"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15053v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "ANet Patu-1: The Value of Connection in the Agent Network", "tldr": "\u672c\u6587\u7814\u7a76AI\u667a\u80fd\u4f53\u7f51\u7edc\u4e2d\u8fde\u63a5\u4ef7\u503c\u7684\u89c4\u5f8b\uff0c\u7c7b\u6bd4Sarnoff/Metcalfe/Reed\u5b9a\u5f8b\uff0c\u63d0\u51fa\u81ea\u7ec4\u7ec7\u5171\u8bc6\u534f\u8baeANet Patu-1\uff0c\u4f7f\u667a\u80fd\u4f53\u7f51\u7edc\u80fd\u52a8\u6001\u91cd\u7ec4\u8054\u76df\u5e76\u5728O(1)\u5e76\u884c\u8f6e\u6b21\u5185\u8fbe\u6210\u5171\u8bc6\u3002\u5b9e\u9a8c\u8868\u660e\u5f02\u6784\u5ec9\u4ef7\u6a21\u578b\u7684\u96c6\u4f53\u4ef7\u503c\u968fN\u589e\u957f\u53ef\u8d85\u8d8a\u540c\u6784\u5f3a\u6a21\u578b\uff0c\u4e14\u5f02\u6784\u7f51\u7edc\u80fd\u81ea\u53d1\u91cd\u6784\u51fa\u8be5\u534f\u8bae\u672c\u8eab\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Mild Cognitive Impairment is a critical early stage of cognitive decline that frequently precedes Alzheimer\u0027s disease, yet its automated detection from neuropsychological drawing tests remains fundamentally constrained by data scarcity, class imbalance, and diagnostic ambiguity near clinical boundaries. Existing methodologies attempt to bypass these constraints using computationally expensive, fully fine-tuned hybrid architectures that relegate spatial explainability to a post-hoc approximation rather than an intrinsic model property. We propose a parameter-efficient framework utilizing frozen DINOv2-Small model adapted via three modality-specific learnable prompt tokens while Operating with 1.19 million trainable parameters, each token serves as a query in a shared cross-attention layer over the source image patch tokens. Crucially, spatial explainability is achieved directly through these attention maps; as a structural consequence of the architecture. Then task-conditioned embeddings fused via an attention module to quantify modality-level importance per subject. To handle boundary ambiguity, a MoCA-adapted focal loss introduced that integrates continuous cognitive scores into the training target, loss modulation, and adaptive sample weighting, strictly generalizing standard soft-label approaches. Under stratified five-fold cross-validation, the proposed architecture yields an MCI-class F1 of 0.641 and an AUC of 0.795, outperforming the computationally heavier ResViT baseline by 0.110 in MCI-class F1.", "arxiv_id": "2607.15047", "arxiv_url": "https://arxiv.org/abs/2607.15047", "authors": ["Javad Khoramdel", "Farhad Hoseyni", "Amirhossein Nikoofard"], "brief": "\u63d0\u51fa\u4e00\u79cd\u53c2\u6570\u9ad8\u6548\u7684\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u5fae\u8c03\u6846\u67b6\uff0c\u7528\u4e8e\u8f7b\u5ea6\u8ba4\u77e5\u969c\u788d\uff08MCI\uff09\u7684\u65e9\u671f\u7b5b\u67e5\u3002\u901a\u8fc7\u51bb\u7ed3DINOv2-Small\u5e76\u5f15\u5165\u4e09\u4e2a\u6a21\u6001\u7279\u5b9a\u53ef\u5b66\u4e60\u63d0\u793a\u4ee4\u724c\uff08\u4ec5119\u4e07\u53ef\u8bad\u7ec3\u53c2\u6570\uff09\uff0c\u7ed3\u5408MoCA\u8ba4\u77e5\u8bc4\u5206\u81ea\u9002\u5e94\u7126\u70b9\u635f\u5931\u5904\u7406\u7c7b\u522b\u4e0d\u5e73\u8861\u95ee\u9898\uff0c\u5728\u4e94\u6298\u4ea4\u53c9\u9a8c\u8bc1\u4e2dMCI\u7c7bF1\u8fbe0.641\u3001AUC\u8fbe0.795\uff0c\u4f18\u4e8e\u66f4\u91cd\u7684ResViT\u57fa\u7ebf\u3002", "categories": ["cs.CV", "cs.AI", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15047", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u8f7b\u5ea6\u8ba4\u77e5\u969c\u788d", "\u63d0\u793a\u8c03\u4f18", "\u89c6\u89c9\u57fa\u7840\u6a21\u578b", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15047v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Parameter-efficient Prompt Tuning of Vision Foundation Model With Adaptive Focal Loss for Interpretable MCI Screening", "tldr": "\u63d0\u51fa\u4e00\u79cd\u53c2\u6570\u9ad8\u6548\u7684\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u5fae\u8c03\u6846\u67b6\uff0c\u7528\u4e8e\u8f7b\u5ea6\u8ba4\u77e5\u969c\u788d\uff08MCI\uff09\u7684\u65e9\u671f\u7b5b\u67e5\u3002\u901a\u8fc7\u51bb\u7ed3DINOv2-Small\u5e76\u5f15\u5165\u4e09\u4e2a\u6a21\u6001\u7279\u5b9a\u53ef\u5b66\u4e60\u63d0\u793a\u4ee4\u724c\uff08\u4ec5119\u4e07\u53ef\u8bad\u7ec3\u53c2\u6570\uff09\uff0c\u7ed3\u5408MoCA\u8ba4\u77e5\u8bc4\u5206\u81ea\u9002\u5e94\u7126\u70b9\u635f\u5931\u5904\u7406\u7c7b\u522b\u4e0d\u5e73\u8861\u95ee\u9898\uff0c\u5728\u4e94\u6298\u4ea4\u53c9\u9a8c\u8bc1\u4e2dMCI\u7c7bF1\u8fbe0.641\u3001AUC\u8fbe0.795\uff0c\u4f18\u4e8e\u66f4\u91cd\u7684ResViT\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The integration of AI-driven systems in creative work has sparked debates among artists and legal communities about notions of ownership. Yet there remains little consensus on how ownership should be defined and attributed when human and AI contributions are intertwined. To provoke critical reflection on these tensions, we designed ArtSplit, a provotype that explicitly quantifies human and AI contributions across different stages of creative work. Rather than aiming to resolve ownership, the provotype was used to elicit artists\u0027 responses to the idea of attributing ownership through measurable actions in the creative workflow. We argue that quantification fails to align with artists\u0027 understandings of creative intent and agency, and that efforts to measure ownership risk diluting long-standing assumptions through which artists understand and practice creative work. This critique challenges the impulse to transform a historically and socially situated relation into a technical problem.", "arxiv_id": "2607.15027", "arxiv_url": "https://arxiv.org/abs/2607.15027", "authors": ["Sofi Gjing Jovanovska", "Kuntal Ghosh", "Daniel Muhu Njenga", "Ahmed Mufassir", "Shadan Sadeghian"], "brief": "\u7814\u7a76\u8005\u8bbe\u8ba1\u4e86ArtSplit\u539f\u578b\u5de5\u5177\uff0c\u5c1d\u8bd5\u91cf\u5316\u4eba\u7c7b\u4e0eAI\u5728\u521b\u4f5c\u8fc7\u7a0b\u4e2d\u7684\u8d21\u732e\u6bd4\u4f8b\uff0c\u4ee5\u63a2\u8ba8\u827a\u672f\u6240\u6709\u6743\u5f52\u5c5e\u95ee\u9898\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u91cf\u5316\u65b9\u5f0f\u4e0e\u827a\u672f\u5bb6\u5bf9\u521b\u4f5c\u610f\u56fe\u548c\u4e3b\u4f53\u6027\u7684\u7406\u89e3\u76f8\u6096\uff0c\u5c06\u6240\u6709\u6743\u8f6c\u5316\u4e3a\u6280\u672f\u95ee\u9898\u7684\u505a\u6cd5\u53cd\u800c\u4f1a\u7a00\u91ca\u827a\u672f\u521b\u4f5c\u7684\u5386\u53f2\u4e0e\u793e\u4f1a\u5185\u6db5\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15027", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4eba\u5de5\u667a\u80fd\u521b\u4f5c", "\u827a\u672f\u6240\u6709\u6743", "\u4eba\u673a\u534f\u4f5c", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15027v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Man, Machine, and Masterpiece: Artistic Ownership in the AI Era", "tldr": "\u7814\u7a76\u8005\u8bbe\u8ba1\u4e86ArtSplit\u539f\u578b\u5de5\u5177\uff0c\u5c1d\u8bd5\u91cf\u5316\u4eba\u7c7b\u4e0eAI\u5728\u521b\u4f5c\u8fc7\u7a0b\u4e2d\u7684\u8d21\u732e\u6bd4\u4f8b\uff0c\u4ee5\u63a2\u8ba8\u827a\u672f\u6240\u6709\u6743\u5f52\u5c5e\u95ee\u9898\u3002\u7814\u7a76\u53d1\u73b0\uff0c\u91cf\u5316\u65b9\u5f0f\u4e0e\u827a\u672f\u5bb6\u5bf9\u521b\u4f5c\u610f\u56fe\u548c\u4e3b\u4f53\u6027\u7684\u7406\u89e3\u76f8\u6096\uff0c\u5c06\u6240\u6709\u6743\u8f6c\u5316\u4e3a\u6280\u672f\u95ee\u9898\u7684\u505a\u6cd5\u53cd\u800c\u4f1a\u7a00\u91ca\u827a\u672f\u521b\u4f5c\u7684\u5386\u53f2\u4e0e\u793e\u4f1a\u5185\u6db5\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The broad adoption of Artificial Intelligence (AI), especially Generative AI, raises pressing questions about how users interact with these systems to produce new content. In this paper, we introduce the concept of authorship calibration, defined as users awareness of their actual authorship when interacting with AI. Using the CoAuthor dataset, we empirically examine how authorship calibration varies across users and how it relates to their frequency of AI use. Our results reveal high variability: users relying heavily on AI tend to misjudge their authorship, whereas those using AI less frequently exhibit more accurate authorship calibration. These findings suggest that AI can obscure users perception of their own authorship. In learning contexts, miscalibration can affect metacognitive monitoring and learning strategies, ultimately impacting learning outcomes. Fostering authorship calibration then appears essential for promoting responsible and educationally meaningful AI integration.", "arxiv_id": "2607.15006", "arxiv_url": "https://arxiv.org/abs/2607.15006", "authors": ["C\u00e9lina Treuillier", "Denis Lalanne"], "brief": "\u7814\u7a76\u5f15\u5165\"\u4f5c\u8005\u6743\u6821\u51c6\"\u6982\u5ff5\uff0c\u5373\u7528\u6237\u5728\u4e0eAI\u534f\u4f5c\u521b\u4f5c\u65f6\u5bf9\u81ea\u8eab\u5b9e\u9645\u8d21\u732e\u7684\u611f\u77e5\u51c6\u786e\u5ea6\u3002\u57fa\u4e8eCoAuthor\u6570\u636e\u96c6\u7684\u5b9e\u8bc1\u5206\u6790\u53d1\u73b0\uff0c\u9891\u7e41\u4f7f\u7528AI\u7684\u7528\u6237\u5f80\u5f80\u9ad8\u4f30\u81ea\u8eab\u8d21\u732e\uff0c\u800c\u4f4e\u9891\u4f7f\u7528\u8005\u7684\u611f\u77e5\u66f4\u4e3a\u51c6\u786e\uff0c\u8868\u660eAI\u4f1a\u6a21\u7cca\u7528\u6237\u5bf9\u81ea\u8eab\u521b\u4f5c\u89d2\u8272\u7684\u8ba4\u77e5\uff0c\u8fdb\u800c\u5f71\u54cd\u5b66\u4e60\u60c5\u5883\u4e2d\u7684\u5143\u8ba4\u77e5\u76d1\u63a7\u4e0e\u5b66\u4e60\u6548\u679c\u3002", "categories": ["cs.HC", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15006", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u751f\u6210\u5f0fAI", "\u4eba\u673a\u534f\u4f5c", "\u5143\u8ba4\u77e5", "\u6559\u80b2\u6280\u672f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15006v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "When AI Blurs the Boundaries of Contribution: An Empirical Study of Authorship Calibration", "tldr": "\u7814\u7a76\u5f15\u5165\"\u4f5c\u8005\u6743\u6821\u51c6\"\u6982\u5ff5\uff0c\u5373\u7528\u6237\u5728\u4e0eAI\u534f\u4f5c\u521b\u4f5c\u65f6\u5bf9\u81ea\u8eab\u5b9e\u9645\u8d21\u732e\u7684\u611f\u77e5\u51c6\u786e\u5ea6\u3002\u57fa\u4e8eCoAuthor\u6570\u636e\u96c6\u7684\u5b9e\u8bc1\u5206\u6790\u53d1\u73b0\uff0c\u9891\u7e41\u4f7f\u7528AI\u7684\u7528\u6237\u5f80\u5f80\u9ad8\u4f30\u81ea\u8eab\u8d21\u732e\uff0c\u800c\u4f4e\u9891\u4f7f\u7528\u8005\u7684\u611f\u77e5\u66f4\u4e3a\u51c6\u786e\uff0c\u8868\u660eAI\u4f1a\u6a21\u7cca\u7528\u6237\u5bf9\u81ea\u8eab\u521b\u4f5c\u89d2\u8272\u7684\u8ba4\u77e5\uff0c\u8fdb\u800c\u5f71\u54cd\u5b66\u4e60\u60c5\u5883\u4e2d\u7684\u5143\u8ba4\u77e5\u76d1\u63a7\u4e0e\u5b66\u4e60\u6548\u679c\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "The deployment of autonomous cyber-physical systems in safety-critical environments requires closed-loop control strategies (i.e., policies) that are not only performant but also provably safe and robust. While learning-based methodologies such as Reinforcement Learning offer flexible and scalable approaches to automatically synthesize such controllers, they typically lack the formal guarantees necessary for safe deployment. To bridge this gap, we propose a novel simulation-based methodology to automatically synthesize policies with formal guarantees regarding performance, safety, and robustness specifications. Specifically, given a set of properties to verify, a confidence parameter $\u03b4$ and an allowable failure probability $\\varepsilon$, our method guarantees that the synthesized policy comes with a certificate: with confidence at least $1 - \u03b4$, the probability of encountering a scenario where the given properties are violated is at most $\\varepsilon$. We demonstrate the feasibility of our approach by developing SMC-ES, an algorithm that integrates Evolutionary Strategies with Statistical Model Checking-based verification. We evaluate SMC-ES on a suite of continuous control tasks using Gymnasium and Safety Gymnasium testbeds. Results show that, at the price of a sustainable increase in computational cost, our algorithm provides formal guarantees regarding performance, safety, and robustness specifications, while performing competitively against leading model-free Deep Reinforcement Learning (DRL) and Safe-DRL baselines.", "arxiv_id": "2607.15003", "arxiv_url": "https://arxiv.org/abs/2607.15003", "authors": ["Riccardo Curcio", "Toni Mancini", "Enrico Tronci"], "brief": "\u63d0\u51faSMC-ES\u7b97\u6cd5\uff0c\u5c06\u8fdb\u5316\u7b56\u7565\u4e0e\u7edf\u8ba1\u6a21\u578b\u68c0\u9a8c\u76f8\u7ed3\u5408\uff0c\u81ea\u52a8\u5408\u6210\u5177\u6709\u5f62\u5f0f\u5316\u4fdd\u8bc1\u7684\u63a7\u5236\u7b56\u7565\u3002\u8be5\u65b9\u6cd5\u80fd\u4ee5\u7f6e\u4fe1\u5ea61-\u03b4\u4fdd\u8bc1\u7b56\u7565\u8fdd\u53cd\u5b89\u5168/\u6027\u80fd\u89c4\u8303\u7684\u6982\u7387\u4e0d\u8d85\u8fc7\u03b5\uff0c\u5728\u8fde\u7eed\u63a7\u5236\u4efb\u52a1\u4e0a\u4e0e\u4e3b\u6d41\u6df1\u5ea6\u5f3a\u5316\u5b66\u4e60\u57fa\u7ebf\u6027\u80fd\u76f8\u5f53\uff0c\u540c\u65f6\u63d0\u4f9b\u6b63\u5f0f\u5b89\u5168\u8bc1
