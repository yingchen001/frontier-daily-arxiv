const PAPERS = [{"abstract": "Graphical user interface (GUI) automation remains challenging in real-world environments, where dynamic layouts, unexpected dialogs, and evolving interface states can cause autonomous agents to drift from user intent. Recent vision-based multimodal agents improve flexibility by operating directly over screenshots and natural language instructions, but planning and adaptation often remain internal, limiting users\u0027 ability to inspect, supervise, or correct system behavior. We present Plover, a plan-centric vision-based GUI automation system that externalizes task plans and replanning as persistent, inspectable, and revisable artifacts. Through a planner--executor architecture, Plover supports explicit supervision of evolving execution, localized correction through editable plans, natural-language guidance, and screenshot-grounded interventions, while preserving prior progress during repair. A formative study with six participants informed the interaction design. We then evaluate Plover through benchmark failure-case repair and scenario-based workflow analyses. Our results show that many autonomous GUI-agent failures are structurally repairable when plans remain visible and interventions are localized, and that explicit replanning helps make GUI automation more transparent, controllable, and adaptable.", "arxiv_id": "2607.15193", "arxiv_url": "https://arxiv.org/abs/2607.15193", "authors": ["Madhumitha Venkatesan", "Shicheng Wen", "Jiajing Guo", "Jorge Piazentin Ono", "Liu Ren", "Dongyu Liu"], "brief": "\u63d0\u51faPlover\u7cfb\u7edf\uff0c\u4e00\u79cd\u4ee5\"\u8ba1\u5212\"\u4e3a\u4e2d\u5fc3\u7684\u89c6\u89c9GUI\u81ea\u52a8\u5316\u6846\u67b6\uff0c\u5c06\u667a\u80fd\u4f53\u7684\u4efb\u52a1\u89c4\u5212\u5916\u5316\u4e3a\u53ef\u68c0\u67e5\u3001\u53ef\u7f16\u8f91\u7684\u6301\u4e45\u5316\u5236\u54c1\uff0c\u652f\u6301\u7528\u6237\u5b9e\u65f6\u76d1\u7763\u548c\u5c40\u90e8\u7ea0\u9519\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15193", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u91c7\u7528\u89c4\u5212\u5668-\u6267\u884c\u5668\u67b6\u6784\uff0c\u5c06\u4efb\u52a1\u8ba1\u5212\u663e\u5f0f\u66b4\u9732\u7ed9\u7528\u6237\uff0c\u652f\u6301\u81ea\u7136\u8bed\u8a00\u5f15\u5bfc\u548c\u622a\u56fe\u5b9a\u4f4d\u5e72\u9884", "\u652f\u6301\u5c40\u90e8\u4fee\u6b63\uff08editable plans\uff09\u800c\u4e0d\u4e22\u5931\u5df2\u5b8c\u6210\u8fdb\u5ea6\uff0c\u964d\u4f4e\u7ea0\u9519\u6210\u672c", "\u901a\u8fc76\u4eba\u5f62\u6210\u6027\u7814\u7a76\u6307\u5bfc\u4ea4\u4e92\u8bbe\u8ba1\uff0c\u5e76\u5728\u57fa\u51c6\u5931\u8d25\u6848\u4f8b\u4fee\u590d\u548c\u573a\u666f\u5de5\u4f5c\u6d41\u5206\u6790\u4e2d\u9a8c\u8bc1\u6709\u6548\u6027"], "keywords": ["\u667a\u80fd\u4f53", "GUI\u81ea\u52a8\u5316", "\u4eba\u673a\u4ea4\u4e92", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15193v1", "published_at": "2026-07-16", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Plover: Steering GUI Agents through Plan-Centric Interaction", "tldr": "Plover\uff1a\u4ee5\u53ef\u89c6\u5316\u4efb\u52a1\u8ba1\u5212\u4e3a\u6838\u5fc3\uff0c\u8ba9\u7528\u6237\u80fd\u76d1\u7763\u3001\u7ea0\u6b63GUI\u81ea\u52a8\u5316\u667a\u80fd\u4f53\u7684\u884c\u4e3a", "upvotes": 0, "what_it_is": "\u63d0\u51faPlover\u7cfb\u7edf\uff0c\u4e00\u79cd\u4ee5\"\u8ba1\u5212\"\u4e3a\u4e2d\u5fc3\u7684\u89c6\u89c9GUI\u81ea\u52a8\u5316\u6846\u67b6\uff0c\u5c06\u667a\u80fd\u4f53\u7684\u4efb\u52a1\u89c4\u5212\u5916\u5316\u4e3a\u53ef\u68c0\u67e5\u3001\u53ef\u7f16\u8f91\u7684\u6301\u4e45\u5316\u5236\u54c1\uff0c\u652f\u6301\u7528\u6237\u5b9e\u65f6\u76d1\u7763\u548c\u5c40\u90e8\u7ea0\u9519\u3002", "why_notable": "\u5c06GUI\u667a\u80fd\u4f53\u7684\"\u9ed1\u76d2\"\u89c4\u5212\u8fc7\u7a0b\u900f\u660e\u5316\uff0c\u4f7f\u4eba\u673a\u534f\u4f5c\u7ea0\u9519\u6210\u4e3a\u53ef\u80fd\uff0c\u5bf9\u63d0\u5347GUI\u81ea\u52a8\u5316\u7684\u53ef\u63a7\u6027\u548c\u53ef\u4fe1\u5ea6\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "As large multimodal models move from understanding content to operating on digital environments, mobile GUI has emerged as a challenging and consequential testbed for digital embodied intelligence. Mobile agents operate under three coupled constraints: precise perception of complex interfaces, scalable acquisition of high-quality interaction data, and robust long-horizon decision making under compounding execution errors. This report presents HyMobileAgent, a mobile GUI agent built on Hy3.0-VL-A3B, a vision-native foundation model featuring native any-resolution input, an A3B-scale deployment budget, and a 32K context window to model extended interaction histories. Rather than relying solely on model scaling, we develop a joint data and environment centric scaling framework to address the key bottlenecks of mobile interaction. Our framework integrates a GUI perception flywheel combining mock-interface synthesis, rejection sampling, and icon-specific augmentation; a knowledge pipeline that transforms tutorial videos into structured interaction data; a million-scale action data pipeline deployed across more than 2000 sandbox and real-device instances with automated failure attribution; the PhoneWorld Mock App Factory, providing a resettable training environment with 34 mock applications and over 34000 tasks; and a structured Planning-and-Reflection mechanism with explicit dead-loop detection for reliable long-horizon execution. We also introduce a progressive training recipe consisting of mid-training, supervised fine-tuning, and reinforcement learning with task-specific reward designs.", "arxiv_id": "2607.14548", "arxiv_url": "https://arxiv.org/abs/2607.14548", "authors": ["Hy Vision Team", "Huawen Shen", "Zhengyang Tang", "Shangpin Peng", "Liang Wu", "Anran Zhang", "Weinong Wang", "Yiduo Guo", "Chenxin Li", "Zhengyao Fang", "Yang Ding", "Junyi Li", "Fei Tang", "Zheng Ruan", "Yi Zhang", "Xingran Zhou", "Dingchen Yang", "Sunqi Fan", "Zhiyi Wan", "Han Hu", "Xin Lai", "Pengyuan Lyu", "Chengquan Zhang"], "brief": "\u63d0\u51faHyMobileAgent\uff0c\u4e00\u4e2a\u57fa\u4e8eHy3.0-VL-A3B\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u7684\u79fb\u52a8\u7aefGUI\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u6570\u636e\u4e0e\u73af\u5883\u8054\u5408\u6269\u5c55\u6846\u67b6\uff08\u800c\u975e\u5355\u7eaf\u6a21\u578b\u6269\u5c55\uff09\u89e3\u51b3\u79fb\u52a8\u4ea4\u4e92\u7684\u611f\u77e5\u3001\u6570\u636e\u91c7\u96c6\u548c\u957f\u7a0b\u51b3\u7b56\u4e09\u5927\u74f6\u9888\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14548", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6784\u5efaGUI\u611f\u77e5\u98de\u8f6e\uff1a\u7ed3\u5408\u6a21\u62df\u754c\u9762\u5408\u6210\u3001\u62d2\u7edd\u91c7\u6837\u548c\u56fe\u6807\u4e13\u9879\u589e\u5f3a\uff0c\u63d0\u5347\u754c\u9762\u611f\u77e5\u7cbe\u5ea6", "\u767e\u4e07\u7ea7\u52a8\u4f5c\u6570\u636e\u6d41\u6c34\u7ebf\uff1a\u90e8\u7f72\u8d852000\u4e2a\u6c99\u76d2\u4e0e\u771f\u5b9e\u8bbe\u5907\u5b9e\u4f8b\uff0c\u5e76\u914d\u5957PhoneWorld Mock App Factory\uff0834\u4e2a\u6a21\u62df\u5e94\u7528\u300134000+\u4efb\u52a1\uff09\u63d0\u4f9b\u53ef\u91cd\u7f6e\u8bad\u7ec3\u73af\u5883", "\u91c7\u7528\u89c4\u5212-\u53cd\u601d\u673a\u5236\uff08\u542b\u6b7b\u5faa\u73af\u68c0\u6d4b\uff09+ \u4e2d\u8bad\u7ec3\u2192SFT\u2192\u5f3a\u5316\u5b66\u4e60\u7684\u6e10\u8fdb\u5f0f\u8bad\u7ec3\u65b9\u6848\uff0c\u652f\u630132K\u4e0a\u4e0b\u6587\u7684\u957f\u7a0b\u53ef\u9760\u6267\u884c"], "keywords": ["\u667a\u80fd\u4f53", "GUI", "\u591a\u6a21\u6001", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14548v1", "published_at": "2026-07-16", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "HyMobileAgent: Data-Environment Co-Scaling for Efficient GUI Agents", "tldr": "HyMobileAgent\uff1a\u901a\u8fc7\u6570\u636e\u4e0e\u73af\u5883\u534f\u540c\u6269\u5c55\u6784\u5efa\u9ad8\u6548\u79fb\u52a8\u7aefGUI\u667a\u80fd\u4f53", "upvotes": 0, "what_it_is": "\u63d0\u51faHyMobileAgent\uff0c\u4e00\u4e2a\u57fa\u4e8eHy3.0-VL-A3B\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u7684\u79fb\u52a8\u7aefGUI\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u6570\u636e\u4e0e\u73af\u5883\u8054\u5408\u6269\u5c55\u6846\u67b6\uff08\u800c\u975e\u5355\u7eaf\u6a21\u578b\u6269\u5c55\uff09\u89e3\u51b3\u79fb\u52a8\u4ea4\u4e92\u7684\u611f\u77e5\u3001\u6570\u636e\u91c7\u96c6\u548c\u957f\u7a0b\u51b3\u7b56\u4e09\u5927\u74f6\u9888\u3002", "why_notable": "\u5728\u4ec53B\u53c2\u6570\u9884\u7b97\u4e0b\uff0c\u901a\u8fc7\u6570\u636e\u5de5\u7a0b\u4e0e\u73af\u5883\u57fa\u7840\u8bbe\u65bd\u7684\u7cfb\u7edf\u6027\u6269\u5c55\u66ff\u4ee3\u6a21\u578b\u89c4\u6a21\u6269\u5c55\uff0c\u4e3a\u79fb\u52a8GUI\u667a\u80fd\u4f53\u63d0\u4f9b\u4e86\u9ad8\u6548\u53ef\u843d\u5730\u7684\u5de5\u7a0b\u8303\u5f0f\uff0c\u5177\u6709\u8f83\u5f3a\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Understanding the brain increasingly depends on integrating evidence across scales, modalities, and disciplines. Addressing a single research question therefore requires a coordinated sequence of operations, from surveying prior work to executing analyses and interpreting results in light of domain knowledge. AI agents promise to accelerate this process, but current agents lack domain expertise in brain science, may fabricate claims, drift during multi-step reasoning, and offer few defined points for expert intervention. These failures are especially costly in brain science, where conclusions feed into downstream scientific claims and depend on laboratory-specific expertise and careful human judgment. We present \\textbf{BrainPilot} a \\textbf{fully open-source} multi-agent system that accelerates brain science research with traceable logs and agent-verified results. A principal investigator (PI) agent coordinates specialist agents grounded in curated domain knowledge: a unified brain science knowledge base containing 7{,}233 indexed items and a skill library of 72 reusable methodology units across seven research domains. Every major step is recorded in the Graph of Trace, an auditable record that links subgoals, tool use, evidence, and claims and allows researchers to follow and inspect the workflow. An Auditor agent further integrates fabrication checking into the workflow. For evaluation, we run three brain science tasks from Agents\u0027 Last Exam, introduce our own benchmark, \\textbf{BrainPilotBench-v0}, and present additional end-to-end case studies. Across these evaluations, BrainPilot with an open-source backbone model attains performance comparable to state-of-the-art agent framework with less costs.", "arxiv_id": "2607.15079", "arxiv_url": "https://arxiv.org/abs/2607.15079", "authors": ["Haoxuan Li", "Tianci Gao", "Jianhe Li", "Yang Fan", "Runze Shi", "Weiran Wang", "Tianxiang Zhao", "Zezhao Wu", "Xiaoyang Jiang", "Qihui Zhang", "Jia Li", "Xiao Xiao", "Kai Du", "Xiaoxuan Jia", "Chao Xie", "Lu Mi"], "brief": "\u63d0\u51faBrainPilot\uff0c\u4e00\u4e2a\u4e13\u4e3a\u8111\u79d1\u5b66\u7814\u7a76\u8bbe\u8ba1\u7684\u5168\u5f00\u6e90\u591a\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u7531PI\u667a\u80fd\u4f53\u534f\u8c03\u591a\u4e2a\u4e13\u5bb6\u667a\u80fd\u4f53\uff0c\u6574\u54087233\u6761\u77e5\u8bc6\u5e93\u6761\u76ee\u548c72\u4e2a\u53ef\u590d\u7528\u65b9\u6cd5\u5355\u5143\uff0c\u5b9e\u73b0\u4ece\u6587\u732e\u8c03\u7814\u5230\u5206\u6790\u6267\u884c\u7684\u5168\u6d41\u7a0b\u81ea\u52a8\u5316\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15079", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6784\u5efa\u5305\u542b7233\u6761\u7d22\u5f15\u6761\u76ee\ u9ad8\uff0cBrainPilot\u901a\u8fc7\u53ef\u5ba1\u8ba1\u8ffd\u8e2a\u56fe\u548c\u5e7b\u89c9\u68c0\u6d4b\u89e3\u51b3\u4e86AI\u667a\u80fd\u4f53\u5728\u79d1\u5b66\u7814\u7a76\u4e2d\u7684\u6838\u5fc3\u75db\u70b9\uff0c\u540c\u65f6\u5168\u5f00\u6e90\u964d\u4f4e\u4e86\u4f7f\u7528\u95e8\u69db\uff0c\u5177\u6709\u91cd\u8981\u7684\u79d1\u7814\u52a0\u901f\u4ef7\u503c\u3002"}, {"abstract": "Multi-step retrosynthesis planning seeks to decompose a target molecule into commercially available building blocks through a sequence of feasible reactions. The vast combinatorial search space makes this task challenging even for expert chemists. Traditional methods combine tree search with offline-trained value networks that score candidates in isolation, without reasoning about complete multi-step routes. Recent work leverages Large Language Models (LLMs) for this task, but relies on simple interfaces that limit exploration of the full search space. We introduce RetroAgent, an LLM agent that bridges symbolic search and neural reasoning through a harness with structured memory. Through memory and chemistry tools, the agent observes the full search state, including explored routes, available alternatives, and properties of intermediates, enabling informed decisions grounded in both global progress and domain knowledge. Experiments on in-distribution and out-of-distribution benchmarks demonstrate that RetroAgent delivers strong performance and generalization.", "arxiv_id": "2607.14512", "arxiv_url": "https://arxiv.org/abs/2607.14512", "authors": ["Yanqiao Zhu", "Jingru Gan", "Xiaoqi Sun", "Fang Sun", "Yidan Shi", "Md Mofijul Islam", "Chao Shang", "Wenhao Gao", "Connor W. Coley", "Yizhou Sun", "Wei Wang"], "brief": "\u63d0\u51faRetroAgent\uff0c\u4e00\u4e2a\u5c06\u7b26\u53f7\u641c\u7d22\u4e0e\u795e\u7ecf\u63a8\u7406\u76f8\u7ed3\u5408\u7684LLM\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u8bb0\u5fc6\u673a\u5236\u8ba9\u6a21\u578b\u611f\u77e5\u5b8c\u6574\u641c\u7d22\u72b6\u6001\uff0c\u4ece\u800c\u89c4\u5212\u591a\u6b65\u9006\u5408\u6210\u8def\u7ebf\uff0c\u5c06\u76ee\u6807\u5206\u5b50\u5206\u89e3\u4e3a\u53ef\u5546\u8d2d\u7684\u6784\u5efa\u5757\u3002", "categories": ["cs.AI", "cs.CL", "cs.LG"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14512", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u5f15\u5165\u7ed3\u6784\u5316\u8bb0\u5fc6\u673a\u5236\uff0c\u4f7fLLM\u80fd\u89c2\u5bdf\u5df2\u63a2\u7d22\u8def\u7ebf\u3001\u53ef\u7528\u66ff\u4ee3\u65b9\u6848\u53ca\u4e2d\u95f4\u4f53\u5c5e\u6027\u7b49\u5168\u5c40\u641c\u7d22\u72b6\u6001", "\u901a\u8fc7\u8bb0\u5fc6\u4e0e\u5316\u5b66\u5de5\u5177\u7684\u534f\u540c\uff0c\u5b9e\u73b0\u7b26\u53f7\u6811\u641c\u7d22\u4e0eLLM\u795e\u7ecf\u63a8\u7406\u7684\u6709\u673a\u878d\u5408", "\u5728\u5206\u5e03\u5185\u548c\u5206\u5e03\u5916\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u5747\u5c55\u73b0\u51fa\u5f3a\u6cdb\u5316\u6027\u80fd\uff0c\u4f18\u4e8e\u4f9d\u8d56\u7b80\u5355\u63a5\u53e3\u7684\u73b0\u6709LLM\u65b9\u6cd5"], "keywords": ["\u667a\u80fd\u4f53", "\u9006\u5408\u6210\u89c4\u5212", "LLM", "\u5316\u5b66AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14512v1", "published_at": "2026-07-16", "score": 0.4, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "RetroAgent: Harnessing LLMs to Search Over Structured Memory for Agentic Retrosynthesis Planning", "tldr": "RetroAgent\u5229\u7528LLM\u7ed3\u5408\u7ed3\u6784\u5316\u8bb0\u5fc6\u5b9e\u73b0\u591a\u6b65\u9006\u5408\u6210\u8def\u7ebf\u89c4\u5212", "upvotes": 0, "what_it_is": "\u63d0\u51faRetroAgent\uff0c\u4e00\u4e2a\u5c06\u7b26\u53f7\u641c\u7d22\u4e0e\u795e\u7ecf\u63a8\u7406\u76f8\u7ed3\u5408\u7684LLM\u667a\u80fd\u4f53\uff0c\u901a\u8fc7\u7ed3\u6784\u5316\u8bb0\u5fc6\u673a\u5236\u8ba9\u6a21\u578b\u611f\u77e5\u5b8c\u6574\u641c\u7d22\u72b6\u6001\uff0c\u4ece\u800c\u89c4\u5212\u591a\u6b65\u9006\u5408\u6210\u8def\u7ebf\uff0c\u5c06\u76ee\u6807\u5206\u5b50\u5206\u89e3\u4e3a\u53ef\u5546\u8d2d\u7684\u6784\u5efa\u5757\u3002", "why_notable": "\u4f20\u7edf\u9006\u5408\u6210\u65b9\u6cd5\u4ec5\u5bf9\u5019\u9009\u6b65\u9aa4\u5b64\u7acb\u8bc4\u5206\uff0c\u65e0\u6cd5\u63a8\u7406\u5b8c\u6574\u591a\u6b65\u8def\u7ebf\uff1bRetroAgent\u901a\u8fc7\u7ed3\u6784\u5316\u8bb0\u5fc6\u8d4b\u4e88LLM\u5168\u5c40\u89c6\u91ce\uff0c\u662f\u5c06LLM\u667a\u80fd\u4f53\u5f15\u5165\u5316\u5b66\u5408\u6210\u89c4\u5212\u7684\u91cd\u8981\u63a2\u7d22\uff0c\u5bf9AI\u8f85\u52a9\u836f\u7269\u53d1\u73b0\u5177\u6709\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Persistent external memory enhances agent continuity but introduces persistent security vulnerabilities: adversarial content can be injected via standard interaction channels, retained across turns, and later distort downstream behavior. To address this challenge, we propose MemPoison, a comprehensive benchmark and analysis framework featuring 1227 hand-validated cases across four attack types, three injection channels, and three representative memory substrates, evaluated on seven open-weight and three closed-weight model families. We introduce a three-tier taxonomy: (L1) direct single-record corruption, (L2) compositional multi-record corruption and (L3) context-triggered dormant corruption. Our evaluations reveal a distinct defense frontier: while baseline write-time defenses, such as consistency checks, substantially suppress direct L1 attacks, they fail to reliably suppress L2 and L3 attacks. Through mechanistic influence decomposition (MID), we demonstrate structural blind spots in write-time defenses, which admit seemingly benign records that later become harmful through joint retrieval composition or trigger-conditioned activation. Our findings advocate for shifting from static filtering to adaptive, context-sensitive memory defense strategies.", "arxiv_id": "2607.14651", "arxiv_url": "https://arxiv.org/abs/2607.14651", "authors": ["Jifeng Gao", "Kang Xia", "Yi Zhang", "Xiaobin Hong", "Mingkai Lin", "Xingshen Wei", "Wenzhong Li", "Sanglu Lu"], "brief": "\u63d0\u51faMemPoison\u57fa\u51c6\u6846\u67b6\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5916\u90e8\u6301\u4e45\u8bb0\u5fc6\u9762\u4e34\u7684\u5bf9\u6297\u6027\u6ce8\u5165\u653b\u51fb\uff0c\u6db5\u76d61227\u4e2a\u624b\u5de5\u9a8c\u8bc1\u6848\u4f8b\uff0c\u5e76\u901a\u8fc7\u673a\u5236\u5f71\u54cd\u5206\u89e3\uff08MID\uff09\u63ed\u793a\u73b0\u6709\u9632\u5fa1\u7684\u7ed3\u6784\u6027\u76f2\u70b9\u3002", "categories": ["cs.CR", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14651", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u4e09\u5c42\u653b\u51fb\u5206\u7c7b\uff1aL1\u76f4\u63a5\u5355\u8bb0\u5f55\u6c61\u67d3\u3001L2\u7ec4\u5408\u591a\u8bb0\u5f55\u6c61\u67d3\u3001L3\u4e0a\u4e0b\u6587\u89e6\u53d1\u4f11\u7720\u6c61\u67d3", "\u57fa\u7ebf\u5199\u5165\u65f6\u9632\u5fa1\uff08\u5982\u4e00\u81f4\u6027\u68c0\u67e5\uff09\u80fd\u6709\u6548\u6291\u5236L1\u653b\u51fb\uff0c\u4f46\u5bf9L2/L3\u653b\u51fb\u5931\u6548", "\u8bc4\u6d4b\u8986\u76d67\u4e2a\u5f00\u6e90+3\u4e2a\u95ed\u6e90\u6a21\u578b\u5bb6\u65cf\u30014\u79cd\u653b\u51fb\u7c7b\u578b\u30013\u79cd\u6ce8\u5165\u6e20\u9053\u548c3\u79cd\u8bb0\u5fc6\u5e95\u5c42"], "keywords": ["\u667a\u80fd\u4f53", "\u5b89\u5168\u653b\u51fb", "\u5927\u8bed\u8a00\u6a21\u578b", "\u8bb0\u5fc6\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14651v1", "published_at": "2026-07-16", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "MemPoison: Uncovering Persistent Memory Threats and Structural Blind Spots in LLM Agents", "tldr": "MemPoison\u63ed\u793aLLM\u667a\u80fd\u4f53\u6301\u4e45\u8bb0\u5fc6\u4e2d\u7684\u5b89\u5168\u6f0f\u6d1e\uff0c\u63d0\u51fa\u4e09\u5c42\u653b\u51fb\u5206\u7c7b\u4e0e\u8bc4\u6d4b\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faMemPoison\u57fa\u51c6\u6846\u67b6\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u667a\u80fd\u4f53\u5916\u90e8\u6301\u4e45\u8bb0\u5fc6\u9762\u4e34\u7684\u5bf9\u6297\u6027\u6ce8\u5165\u653b\u51fb\uff0c\u6db5\u76d61227\u4e2a\u624b\u5de5\u9a8c\u8bc1\u6848\u4f8b\uff0c\u5e76\u901a\u8fc7\u673a\u5236\u5f71\u54cd\u5206\u89e3\uff08MID\uff09\u63ed\u793a\u73b0\u6709\u9632\u5fa1\u7684\u7ed3\u6784\u6027\u76f2\u70b9\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u63ed\u793aLLM\u667a\u80fd\u4f53\u6301\u4e45\u8bb0\u5fc6\u7684\u591a\u5c42\u6b21\u5b89\u5168\u5a01\u80c1\uff0c\u6307\u51fa\u9759\u6001\u8fc7\u6ee4\u9632\u5fa1\u7684\u6839\u672c\u5c40\u9650\uff0c\u63a8\u52a8\u9632\u5fa1\u7b56\u7565\u4ece\u9759\u6001\u8fc7\u6ee4\u8f6c\u5411\u81ea\u9002\u5e94\u4e0a\u4e0b\u6587\u611f\u77e5\uff0c\u5bf9\u667a\u80fd\u4f53\u5b89\u5168\u90e8\u7f72\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u610f\u4e49\u3002"}, {"abstract": "A growing class of agentic systems maintain persistent state across sessions through memory files, behavioral preferences, and knowledge bases. While this makes agents more useful and self-improving, it also creates a new attack surface for prompt injections in which malicious instructions can be embedded within persistent files and influence future behavior. In this work, we study prompt injection attacks in memory-based agentic systems using a sandboxed synthetic workspace. We evaluate two agentic systems, Anthropic Claude Code and OpenAI Codex, across four models: Claude Haiku 4.5, Claude Opus 4.7, GPT-5.2, and GPT-5.5. Our results show that although it is difficult to make an agent overwrite its own memory files using untrusted external content, payloads already planted in those files can successfully attack current and future sessions. Attack success and payload persistence vary substantially across systems, models, adversarial goals, and multi-session attack sequences. These findings show that persistent memory changes the threat model for prompt injection and motivate defenses that protect memory updates without removing useful agent adaptation.", "arxiv_id": "2607.14611", "arxiv_url": "https://arxiv.org/abs/2607.14611", "authors": ["Soham Gadgil", "David Alexander", "Sai Sunku", "Franziska Roesner"], "brief": "\u7814\u7a76\u57fa\u4e8e\u8bb0\u5fc6\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u7684\u63d0\u793a\u6ce8\u5165\u653b\u51fb\uff0c\u5728\u6c99\u76d2\u5408\u6210\u5de5\u4f5c\u533a\u4e2d\u8bc4\u4f30Claude Code\u548cOpenAI Codex\u4e24\u5957\u7cfb\u7edf\u5728\u56db\u4e2a\u6a21\u578b\u4e0a\u7684\u653b\u51fb\u6210\u529f\u7387\u4e0e\u8f7d\u8377\u6301\u4e45\u6027\u3002", "categories": ["cs.CR", "cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14611", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u8ba9\u667a\u80fd\u4f53\u7528\u4e0d\u53ef\u4fe1\u5916\u90e8\u5185\u5bb9\u8986\u5199\u81ea\u8eab\u8bb0\u5fc6\u6587\u4ef6\u8f83\u96be\uff0c\u4f46\u5df2\u690d\u5165\u8bb0\u5fc6\u4e2d\u7684\u6076\u610f\u8f7d\u8377\u53ef\u6210\u529f\u653b\u51fb\u5f53\u524d\u53ca\u672a\u6765\u4f1a\u8bdd", "\u653b\u51fb\u6210\u529f\u7387\u548c\u8f7d\u8377\u6301\u4e45\u6027\u56e0\u7cfb\u7edf\u3001\u6a21\u578b\u3001\u5bf9\u6297\u76ee\u6807\u53ca\u591a\u4f1a\u8bdd\u653b\u51fb\u5e8f\u5217\u4e0d\u540c\u800c\u5b58\u5728\u663e\u8457\u5dee\u5f02", "\u6301\u4e45\u5316\u8bb0\u5fc6\u6539\u53d8\u4e86\u63d0\u793a\u6ce8\u5165\u7684\u5a01\u80c1\u6a21\u578b\uff0c\u9700\u8981\u5728\u4fdd\u7559\u667a\u80fd\u4f53\u81ea\u9002\u5e94\u80fd\u529b\u7684\u540c\u65f6\u4fdd\u62a4\u8bb0\u5fc6\u66f4\u65b0\u673a\u5236"], "keywords": ["\u667a\u80fd\u4f53", "\u63d0\u793a\u6ce8\u5165", "\u5b89\u5168", "\u8bb0\u5fc6\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14611v1", "published_at": "2026-07-16", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Bad Memory: Evaluating Prompt Injection Risks from Memory in Agentic Systems", "tldr": "\u6301\u4e45\u5316\u8bb0\u5fc6\u6587\u4ef6\u4e3a\u667a\u80fd\u4f53\u5f15\u5165\u65b0\u578b\u63d0\u793a\u6ce8\u5165\u653b\u51fb\u9762\uff0c\u5df2\u690d\u5165\u8f7d\u8377\u53ef\u8de8\u4f1a\u8bdd\u6301\u7eed\u653b\u51fb", "upvotes": 0, "what_it_is": "\u7814\u7a76\u57fa\u4e8e\u8bb0\u5fc6\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\u4e2d\u7684\u63d0\u793a\u6ce8\u5165\u653b\u51fb\uff0c\u5728\u6c99\u76d2\u5408\u6210\u5de5\u4f5c\u533a\u4e2d\u8bc4\u4f30Claude Code\u548cOpenAI Codex\u4e24\u5957\u7cfb\u7edf\u5728\u56db\u4e2a\u6a21\u578b\u4e0a\u7684\u653b\u51fb\u6210\u529f\u7387\u4e0e\u8f7d\u8377\u6301\u4e45\u6027\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u63ed\u793a\u6301\u4e45\u5316\u8bb0\u5fc6\u5bf9\u667a\u80fd\u4f53\u5b89\u5168\u7684\u65b0\u578b\u5a01\u80c1\uff0c\u8986\u76d6\u4e3b\u6d41\u5546\u4e1a\u6a21\u578b\uff08GPT-5\u3001Claude 4\u7cfb\u5217\uff09\uff0c\u5bf9\u5b9e\u9645\u90e8\u7f72\u7684\u8bb0\u5fc6\u589e\u5f3a\u667a\u80fd\u4f53\u7cfb\u7edf\u5177\u6709\u76f4\u63a5\u5b89\u5168\u8b66\u793a\u610f\u4e49\u3002"}, {"abstract": "Lattice quantum chromodynamics (LQCD) provides a first-principles framework for computing hadronic observables, but its practical use remains limited by the substantial expertise required to turn research motivation into reliable computing workflows. Here we present \\textsc{LQCDMaster}, a tool-augmented, skill-guided and domain-specialized scientific computing agent that converts natural-language LQCD research tasks into executable PyQUDA computing workflows, including measurement scripts, job-submission artifacts, execution logs and numerical outputs. The system combines agentic planning, expert-annotated LQCD skills and a deterministic Wick-contraction tool to constrain the algebraically fragile components of code generation. We evaluate \\textsc{LQCDMaster} on a benchmark at the forefront of scientific research, comprising 70 LQCD computing tasks, with observables covering local and nonlocal two-point functions, Wilson loops, meson and baryon three-point functions. The generated workflows exactly reproduce expert-written implementations in 63 of 70 tasks at machine precision, with three additional discrepancies attributable to convention mismatches. Across representative observables, the agent reduces implementation time from hours to minutes while preserving end-to-end numerical validation. Further, we present a typical case of \\textsc{LQCDMaster}-driven exploration: a lattice computation of light-cone distribution amplitudes with diagonal Wilson-line, a quantity accessible with standard methods but never before computed, and computation of the spectrum of proton, deuteron, triton, hyperon, hyperdeuteron and hypertriton. This work pioneers the paradigm of agentic scientific computing by automating the end-to-end scientific computing workflows in lattice QCD research, lowering its barrier and facilitating the exploration and verification of non-standard scientific ideas.", "arxiv_id": "2607.15001", "arxiv_url": "https://arxiv.org/abs/2607.15001", "authors": ["Haofei Gao", "Tingjia Miao", "Wenkai Jin", "Muhua Zhang", "Hanzhang Wang", "Jie Ran", "Jinxin Tan", "Zhentao Zhang", "Bo Tang", "Leiyi Li", "Jun Hua", "Xiangyu Jiang", "Qi-An Zhang", "Siheng Chen", "Wei Wang"], "brief": "\u63d0\u51faLQCDMaster\uff0c\u4e00\u4e2a\u9762\u5411\u683c\u70b9\u91cf\u5b50\u8272\u52a8\u529b\u5b66\uff08LQCD\uff09\u7684\u9886\u57df\u4e13\u7528\u79d1\u5b66\u8ba1\u7b97\u667a\u80fd\u4f53\uff0c\u80fd\u5c06\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u7684\u7814\u7a76\u4efb\u52a1\u81ea\u52a8\u751f\u6210\u5b8c\u6574\u7684PyQUDA\u8ba1\u7b97\u5de5\u4f5c\u6d41\uff0c\u5305\u62ec\u6d4b\u91cf\u811a\u672c\u3001\u4f5c\u4e1a\u63d0\u4ea4\u6587\u4ef6\u548c\u6570\u503c\u8f93\u51fa\u3002", "categories": ["hep-lat", "cs.AI", "hep-ph"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15001", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u7ed3\u5408\u667a\u80fd\u4f53\u89c4\u5212\u3001\u4e13\u5bb6\u6807\u6ce8\u7684LQCD\u6280\u80fd\u5e93\u548c\u786e\u5b9a\u6027Wick\u6536\u7f29\u5de5\u5177\uff0c\u7ea6\u675f\u4ee3\u7801\u751f\u6210\u4e2d\u4ee3\u6570\u654f\u611f\u7684\u90e8\u5206", "\u572870\u4e2aLQCD\u8ba1\u7b97\u4efb\u52a1\u57fa\u51c6\u6d4b\u8bd5\u4e2d\uff0c63\u4e2a\u4efb\u52a1\u8fbe\u5230\u673a\u5668\u7cbe\u5ea6\u5b8c\u5168\u590d\u73b0\u4e13\u5bb6\u5b9e\u73b0\uff0c\u53e6\u67093\u4e2a\u5dee\u5f02\u6e90\u4e8e\u7ea6\u5b9a\u4e0d\u4e00\u81f4", "\u5c06\u5b9e\u73b0\u65f6\u95f4\u4ece\u6570\u5c0f\u65f6\u538b\u7f29\u81f3\u6570\u5206\u949f\uff0c\u5e76\u9996\u6b21\u8ba1\u7b97\u4e86\u5e26\u5bf9\u89d2Wilson\u7ebf\u7684\u5149\u9525\u5206\u5e03\u632f\u5e45\u53ca\u591a\u79cd\u91cd\u5b50\u8c31\uff08\u8d28\u5b50\u3001\u6c18\u6838\u3001\u6c1a\u6838\u7b49\uff09"], "keywords": ["\u667a\u80fd\u4f53", "\u79d1\u5b66\u8ba1\u7b97", "\u4ee3\u7801\u751f\u6210", "\u7269\u7406AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15001v1", "published_at": "2026-07-16", "score": 0.35, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "LQCDMaster: Agentic Scientific Computing for Lattice Quantum Chromodynamics Research", "tldr": "LQCDMaster\uff1a\u5c06\u81ea\u7136\u8bed\u8a00LQCD\u7814\u7a76\u4efb\u52a1\u81ea\u52a8\u8f6c\u5316\u4e3a\u53ef\u6267\u884c\u8ba1\u7b97\u5de5\u4f5c\u6d41\u7684AI\u667a\u80fd\u4f53", "upvotes": 0, "what_it_is": "\u63d0\u51faLQCDMaster\uff0c\u4e00\u4e2a\u9762\u5411\u683c\u70b9\u91cf\u5b50\u8272\u52a8\u529b\u5b66\uff08LQCD\uff09\u7684\u9886\u57df\u4e13\u7528\u79d1\u5b66\u8ba1\u7b97\u667a\u80fd\u4f53\uff0c\u80fd\u5c06\u81ea\u7136\u8bed\u8a00\u63cf\u8ff0\u7684\u7814\u7a76\u4efb\u52a1\u81ea\u52a8\u751f\u6210\u5b8c\u6574\u7684PyQUDA\u8ba1\u7b97\u5de5\u4f5c\u6d41\uff0c\u5305\u62ec\u6d4b\u91cf\u811a\u672c\u3001\u4f5c\u4e1a\u63d0\u4ea4\u6587\u4ef6\u548c\u6570\u503c\u8f93\u51fa\u3002", "why_notable": "\u9996\u4e2a\u5c06\u7aef\u5230\u7aefLQCD\u79d1\u5b66\u8ba1\u7b97\u5de5\u4f5c\u6d41\u5b8c\u5168\u81ea\u52a8\u5316\u7684\u667a\u80fd\u4f53\u7cfb\u7edf\uff0c\u5927\u5e45\u964d\u4f4e\u9886\u57df\u95e8\u69db\uff0c\u5e76\u5b9e\u73b0\u4e86\u6b64\u524d\u4ece\u672a\u88ab\u8ba1\u7b97\u8fc7\u7684\u7269\u7406\u91cf\uff0c\u4e3aAI\u9a71\u52a8\u7684\u57fa\u7840\u7269\u7406\u7814\u7a76\u63d0\u4f9b\u4e86\u8303\u5f0f\u793a\u8303\u3002"}, {"abstract": "Active visual agents solve fine-grained image tasks by interleaving reasoning with image-grounding actions across multiple turns. However, deployment-time rollout budgets are rarely fixed: some requests permit long rollouts, while others require the agent to act under a tight turn limit. Existing methods train the policy as if the rollout budget were hidden, so when the available budget is smaller than the trajectory the agent prefers, the interaction is often truncated before any valid answer is produced; we term this failure \\emph{catastrophic truncation}. To overcome this challenge, we present AdaTurn, a budget-aware framework that conditions the agent on the allowed number of turns and explicitly trains the boundary behavior induced by the budget. Our key component, Forced-Answer DAPO (FA-DAPO), converts the over-budget event from a masked or penalized failure into a trainable final-decision step, teaching the model to synthesize partial evidence when further tool use is no longer possible. We further randomize rollout budgets during both training and inference and introduce a load-balanced scheduler that makes such operations practical. AdaTurn substantially improves low-budget accuracy, for example raising VisualProbe-Medium from 36.7% to 47.6% at four turns, while preserving strong scaling at larger budgets and transferring effectively to multiple backbones and general multimodal benchmarks.", "arxiv_id": "2607.14547", "arxiv_url": "https://arxiv.org/abs/2607.14547", "authors": ["Susan Liang", "Chao Huang", "Filippos Bellos", "Jing Bi", "Jason J Corso", "Chenliang Xu"], "brief": "\u63d0\u51faAdaTurn\u6846\u67b6\uff0c\u4f7f\u4e3b\u52a8\u89c6\u89c9\u611f\u77e5\u667a\u80fd\u4f53\u80fd\u591f\u611f\u77e5\u5e76\u9002\u5e94\u4e0d\u540c\u7684\u63a8\u7406\u8f6e\u6b21\u9884\u7b97\uff0c\u901a\u8fc7Forced-Answer DAPO\u8bad\u7ec3\u65b9\u6cd5\u5c06\u8d85\u9884\u7b97\u4e8b\u4ef6\u8f6c\u5316\u4e3a\u53ef\u8bad\u7ec3\u7684\u6700\u7ec8\u51b3\u7b56\u6b65\u9aa4\uff0c\u89e3\u51b3\u9884\u7b97\u53d7\u9650\u65f6\u667a\u80fd\u4f53\u65e0\u6cd5\u7ed9\u51fa\u6709\u6548\u7b54\u6848\u7684\u95ee\u9898\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14547", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u6838\u5fc3\u95ee\u9898\uff1a\u73b0\u6709\u65b9\u6cd5\u8bad\u7ec3\u65f6\u5ffd\u7565\u63a8\u7406\u9884\u7b97\uff0c\u5bfc\u81f4\u9884\u7b97\u4e0d\u8db3\u65f6\u4ea4\u4e92\u88ab\u622a\u65ad\u800c\u65e0\u6cd5\u4ea7\u751f\u6709\u6548\u7b54\u6848\uff08\u707e\u96be\u6027\u622a\u65ad\uff09", "\u5173\u952e\u6280\u672fFA-DAPO\uff1a\u5c06\u8d85\u9884\u7b97\u4e8b\u4ef6\u4ece\u60e9\u7f5a\u6027\u5931\u8d25\u8f6c\u5316\u4e3a\u53ef\u8bad\u7ec3\u7684\u6700\u7ec8\u51b3\u7b56\u6b65\u9aa4\uff0c\u6559\u6a21\u578b\u5728\u65e0\u6cd5\u7ee7\u7eed\u4f7f\u7528\u5de5\u5177\u65f6\u7efc\u5408\u5df2\u6709\u90e8\u5206\u8bc1\u636e\u4f5c\u7b54", "\u5b9e\u9a8c\u6548\u679c\uff1a\u57284\u8f6e\u9884\u7b97\u9650\u5236\u4e0b\uff0cVisualProbe-Medium\u51c6\u786e\u7387\u4ece36.7%\u63d0\u5347\u81f347.6%\uff0c\u540c\u65f6\u5728\u5927\u9884\u7b97\u4e0b\u4fdd\u6301\u5f3a\u6269\u5c55\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u6d4b\u8bd5\u65f6\u6269\u5c55", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14547v1", "published_at": "2026-07-16", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "AdaTurn: Budget-Aware Test-Time Scaling for Active Visual Perception Agents", "tldr": "AdaTurn\u8ba9\u89c6\u89c9\u611f\u77e5\u667a\u80fd\u4f53\u611f\u77e5\u63a8\u7406\u9884\u7b97\uff0c\u907f\u514d\u9884\u7b97\u4e0d\u8db3\u65f6\u7684\u707e\u96be\u6027\u622a\u65ad", "upvotes": 0, "what_it_is": "\u63d0\u51faAdaTurn\u6846\u67b6\uff0c\u4f7f\u4e3b\u52a8\u89c6\u89c9\u611f\u77e5\u667a\u80fd\u4f53\u80fd\u591f\u611f\u77e5\u5e76\u9002\u5e94\u4e0d\u540c\u7684\u63a8\u7406\u8f6e\u6b21\u9884\u7b97\uff0c\u901a\u8fc7Forced-Answer DAPO\u8bad\u7ec3\u65b9\u6cd5\u5c06\u8d85\u9884\u7b97\u4e8b\u4ef6\u8f6c\u5316\u4e3a\u53ef\u8bad\u7ec3\u7684\u6700\u7ec8\u51b3\u7b56\u6b65\u9aa4\uff0c\u89e3\u51b3\u9884\u7b97\u53d7\u9650\u65f6\u667a\u80fd\u4f53\u65e0\u6cd5\u7ed9\u51fa\u6709\u6548\u7b54\u6848\u7684\u95ee\u9898\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u89e3\u51b3\u4e3b\u52a8\u89c6\u89c9\u667a\u80fd\u4f53\u7684\u9884\u7b97\u81ea\u9002\u5e94\u95ee\u9898\uff0c\u5c06\u90e8\u7f72\u65f6\u7684\u9884\u7b97\u7ea6\u675f\u7eb3\u5165\u8bad\u7ec3\u6846\u67b6\uff0c\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff1b\u65b9\u6cd5\u53ef\u8fc1\u79fb\u81f3\u591a\u79cd\u9aa8\u5e72\u7f51\u7edc\u548c\u901a\u7528\u591a\u6a21\u6001\u57fa\u51c6\uff0c\u6cdb\u5316\u6027\u5f3a\u3002"}, {"abstract": "The formation of political coalitions is a complex negotiation driven by both concrete policy objectives and deep-seated ideological convictions. While Large Language Models (LLMs) open new avenues for computational political science, the neutrality and helpfulness biases instilled by Reinforcement Learning from Human Feedback (RLHF) prevent them from sustaining steadfast partisan behaviour. We present a multi-agent framework that reconciles factual grounding with ideological alignment by combining Supervised Fine-Tuning (SFT), Direct Preference Optimization (DPO), and Retrieval-Augmented Generation (RAG): DPO instils aggressive party-specific personas, while a per-party RAG pipeline keeps each agent bounded to its official manifesto. We operationalize the framework on the 2019 Flemish election, deploying the partisan agents in a hub-and-spoke negotiation arbitrated by a formateur. To make the emergent negotiation interpretable, we introduce a Multi-Layered Information Lineage Topology (MILT) that traces every clause in the final agreement back to its manifesto origin and classifies it into five provenance states, a Coalition Influence Score (CIS) that aggregates these traceable contributions to identify which party shaped the agreement, and a real-world grounding pass that benchmarks each simulated provision against the historically adopted coalition agreement. Across three independent simulations the framework yields a stable winner and ranking (N-VA ahead of CD\\\u0026V and Open Vld), and manifesto-anchored lineage reliably predicts real-world materialization whereas hallucinated content does not. The result is a transparent, scalable testbed for the ex-ante exploration of party compatibility and formateur-mediated compromise.", "arxiv_id": "2607.15095", "arxiv_url": "https://arxiv.org/abs/2607.15095", "authors": ["Dylan Van Mulders", "Matthias Bogaert", "Dirk Van den Poel"], "brief": "\u63d0\u51faDigital Pantheon\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7SFT+DPO+RAG\u4f7fLLM\u626e\u6f14\u5177\u6709\u9c9c\u660e\u515a\u6d3e\u7acb\u573a\u7684\u653f\u6cbb\u8c08\u5224\u4ee3\u7406\uff0c\u6a21\u62df2019\u5e74\u6bd4\u5229\u65f6\u5f17\u62c9\u8292\u9009\u4e3e\u7684\u8054\u5408\u653f\u5e9c\u7ec4\u5efa\u8fc7\u7a0b\uff0c\u5e76\u5f15\u5165MILT\u6eaf\u6e90\u62d3\u6251\u548c\u8054\u5408\u5f71\u54cd\u529b\u8bc4\u5206\uff08CIS\uff09\u5bf9\u8c08\u5224\u7ed3\u679c\u8fdb\u884c\u53ef\u89e3\u91ca\u6027\u5ba1\u8ba1\u3002", "categories": ["cs.CL", "cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15095", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u7528DPO\u6ce8\u5165\u6fc0\u8fdb\u515a\u6d3e\u4eba\u683c\uff0c\u7528RAG\u5c06\u6bcf\u4e2a\u667a\u80fd\u4f53\u951a\u5b9a\u4e8e\u5176\u5b98\u65b9\u653f\u515a\u7eb2\u9886\uff0c\u89e3\u51b3RLHF\u5bfc\u81f4\u7684\u4e2d\u7acb\u504f\u5dee\u95ee\u9898", "\u5f15\u5165\u591a\u5c42\u4fe1\u606f\u6eaf\u6e90\u62d3\u6251\uff08MILT\uff09\u5c06\u6700\u7ec8\u534f\u8bae\u6bcf\u6761\u6b3e\u8ffd\u6eaf\u81f3\u7eb2\u9886\u6765\u6e90\uff0c\u5206\u4e3a\u4e94\u79cd\u51fa\u5904\u72b6\u6001\uff1b\u8054\u5408\u5f71\u54cd\u529b\u8bc4\u5206\uff08CIS\uff09\u91cf\u5316\u5404\u515a\u8d21\u732e", "\u4e09\u6b21\u72ec\u7acb\u6a21\u62df\u5747\u4ea7\u751f\u7a33\u5b9a\u6392\u540d\uff08N-VA\u9886\u5148CD\u0026V\u548cOpen Vld\uff09\uff0c\u4e14\u7eb2\u9886\u951a\u5b9a\u5185\u5bb9\u80fd\u53ef\u9760\u9884\u6d4b\u73b0\u5b9e\u843d\u5730\uff0c\u5e7b\u89c9\u5185\u5bb9\u5219\u4e0d\u80fd"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u667a\u80fd\u4f53", "\u5927\u8bed\u8a00\u6a21\u578b", "\u653f\u6cbb\u6a21\u62df"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15095v1", "published_at": "2026-07-16", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Digital Pantheon: Simulating and Auditing Coalition Formation with LLM Agents", "tldr": "\u7528LLM\u591a\u667a\u80fd\u4f53\u6a21\u62df\u653f\u6cbb\u8054\u5408\u653f\u5e9c\u8c08\u5224\uff0c\u5e76\u63d0\u4f9b\u53ef\u8ffd\u6eaf\u7684\u6761\u6b3e\u6eaf\u6e90\u5ba1\u8ba1\u6846\u67b6", "upvotes": 0, "what_it_is": "\u63d0\u51faDigital Pantheon\u591a\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u901a\u8fc7SFT+DPO+RAG\u4f7fLLM\u626e\u6f14\u5177\u6709\u9c9c\u660e\u515a\u6d3e\u7acb\u573a\u7684\u653f\u6cbb\u8c08\u5224\u4ee3\u7406\uff0c\u6a21\u62df2019\u5e74\u6bd4\u5229\u65f6\u5f17\u62c9\u8292\u9009\u4e3e\u7684\u8054\u5408\u653f\u5e9c\u7ec4\u5efa\u8fc7\u7a0b\uff0c\u5e76\u5f15\u5165MILT\u6eaf\u6e90\u62d3\u6251\u548c\u8054\u5408\u5f71\u54cd\u529b\u8bc4\u5206\uff08CIS\uff09\u5bf9\u8c08\u5224\u7ed3\u679c\u8fdb\u884c\u53ef\u89e3\u91ca\u6027\u5ba1\u8ba1\u3002", "why_notable": "\u9996\u6b21\u5c06LLM\u591a\u667a\u80fd\u4f53\u4e0e\u653f\u6cbb\u8054\u5408\u8c08\u5224\u7ed3\u5408\uff0c\u5e76\u63d0\u4f9b\u7aef\u5230\u7aef\u53ef\u5ba1\u8ba1\u7684\u6eaf\u6e90\u673a\u5236\uff0c\u4e3a\u8ba1\u7b97\u653f\u6cbb\u79d1\u5b66\u63d0\u4f9b\u53ef\u6269\u5c55\u3001\u900f\u660e\u7684\u5b9e\u9a8c\u5e73\u53f0\uff0c\u5bf9\u9009\u4e3e\u524d\u653f\u515a\u517c\u5bb9\u6027\u5206\u6790\u5177\u6709\u5b9e\u9645\u5e94\u7528\u4ef7\u503c"}, {"abstract": "Addressing a structural-engineering request requires more than a single answer; it requires a chain of interdependent artifacts: interpreted requirements, a computable model, validation records, solver outputs, code-check records, and a final report. Evaluations centered on question answering or script generation rarely verify this complete evidence chain and may therefore reward fluent outputs even when the underlying engineering workflow is incomplete, internally inconsistent, or non-executable. To address this limitation, we present StructureClaw, an artifact-centered workbench in which LLM agents operate through governed engineering skills, typed tools, shared artifact state, and local analysis backends. We also introduce StructureClaw-Bench, an executable benchmark of 150 controlled scenarios spanning standard workflow execution, interactive robustness, and multimodal structural-model reconstruction. A scenario succeeds only when all required artifact- and execution-level assertions pass in a single run. Across ten agent-model configurations, each evaluated on the same 50 standard cases, the average Success Rate rises from 56.8% with the generic-skill baseline to 88.6% with the full automatic workflow. The interactive and multimodal evaluations identify two prominent remaining challenges: safe handling of invalid numerical inputs and fixture-consistent reconstruction of structural models. These findings show that artifact-centered evaluation can expose workflow-level failures that are difficult to identify from final responses alone, providing a more rigorous basis for evaluating and improving structural-engineering agents. The code and benchmark are available at https://github.com/structureclaw/structureclaw.", "arxiv_id": "2607.14896", "arxiv_url": "https://arxiv.org/abs/2607.14896", "authors": ["Sizhong Qin", "Yi Gu", "Yao Jiang", "Ao Cai", "Changjian Zhou", "Shaoxuan Shuai", "Jiachang Wang", "Tianhao Shen", "Yueqiang Li", "Xinhao Li", "Li Zeng", "Yueshi Chen", "Dachen Gao", "Genrong Xu", "Wenjie Liao", "Xinzheng Lu"], "brief": "\u63d0\u51faStructureClaw\u5de5\u4f5c\u53f0\uff0c\u8ba9LLM\u667a\u80fd\u4f53\u901a\u8fc7\u53d7\u63a7\u5de5\u7a0b\u6280\u80fd\u3001\u7c7b\u578b\u5316\u5de5\u5177\u548c\u5171\u4eab\u5236\u54c1\u72b6\u6001\u5b8c\u6210\u7ed3\u6784\u5de5\u7a0b\u5168\u6d41\u7a0b\uff1b\u540c\u65f6\u53d1\u5e03\u5305\u542b150\u4e2a\u573a\u666f\u7684\u53ef\u6267\u884c\u57fa\u51c6StructureClaw-Bench\uff0c\u9a8c\u8bc1\u4ece\u9700\u6c42\u89e3\u6790\u5230\u6700\u7ec8\u62a5\u544a\u7684\u5b8c\u6574\u8bc1\u636e\u94fe\u3002", "categories": ["cs.SE", "cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14896", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u57fa\u51c6\u6db5\u76d6150\u4e2a\u53d7\u63a7\u573a\u666f\uff0c\u5206\u6807\u51c6\u5de5\u4f5c\u6d41\u6267\u884c\u3001\u4ea4\u4e92\u9c81\u68d2\u6027\u548c\u591a\u6a21\u6001\u7ed3\u6784\u6a21\u578b\u91cd\u5efa\u4e09\u7c7b\uff0c\u573a\u666f\u6210\u529f\u9700\u6240\u6709\u5236\u54c1\u7ea7\u4e0e\u6267\u884c\u7ea7\u65ad\u8a00\u5168\u90e8\u901a\u8fc7", "10\u79cd\u667a\u80fd\u4f53-\u6a21\u578b\u914d\u7f6e\u572850\u4e2a\u6807\u51c6\u6848\u4f8b\u4e0a\u6d4b\u8bd5\uff0c\u6210\u529f\u7387\u4ece\u901a\u7528\u6280\u80fd\u57fa\u7ebf\u768456.8%\u63d0\u5347\u81f3\u5b8c\u6574\u81ea\u52a8\u5de5\u4f5c\u6d41\u768488.6%", "\u8bc6\u522b\u51fa\u4e24\u5927\u4e3b\u8981\u6311\u6218\uff1a\u65e0\u6548\u6570\u503c\u8f93\u5165\u7684\u5b89\u5168\u5904\u7406\uff0c\u4ee5\u53ca\u7ed3\u6784\u6a21\u578b\u7684\u5939\u5177\u4e00\u81f4\u6027\u91cd\u5efa"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u57fa\u51c6\u6d4b\u8bd5", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14896v1", "published_at": "2026-07-16", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "StructureClaw: Traceable LLM Agents and an Executable Benchmark for Structural Engineering Workflows", "tldr": "StructureClaw\uff1a\u9762\u5411\u7ed3\u6784\u5de5\u7a0b\u5de5\u4f5c\u6d41\u7684\u53ef\u8ffd\u6eafLLM\u667a\u80fd\u4f53\u4e0e\u53ef\u6267\u884c\u57fa\u51c6\u6d4b\u8bd5", "upvotes": 0, "what_it_is": "\u63d0\u51faStructureClaw\u5de5\u4f5c\u53f0\uff0c\u8ba9LLM\u667a\u80fd\u4f53\u901a\u8fc7\u53d7\u63a7\u5de5\u7a0b\u6280\u80fd\u3001\u7c7b\u578b\u5316\u5de5\u5177\u548c\u5171\u4eab\u5236\u54c1\u72b6\u6001\u5b8c\u6210\u7ed3\u6784\u5de5\u7a0b\u5168\u6d41\u7a0b\uff1b\u540c\u65f6\u53d1\u5e03\u5305\u542b150\u4e2a\u573a\u666f\u7684\u53ef\u6267\u884c\u57fa\u51c6StructureClaw-Bench\uff0c\u9a8c\u8bc1\u4ece\u9700\u6c42\u89e3\u6790\u5230\u6700\u7ec8\u62a5\u544a\u7684\u5b8c\u6574\u8bc1\u636e\u94fe\u3002", "why_notable": "\u9996\u4e2a\u4ee5\u5236\u54c1\u4e3a\u4e2d\u5fc3\u7684\u7ed3\u6784\u5de5\u7a0bLLM\u667a\u80fd\u4f53\u8bc4\u4f30\u6846\u67b6\uff0c\u5f25\u8865\u4e86\u73b0\u6709QA/\u811a\u672c\u751f\u6210\u8bc4\u4f30\u65e0\u6cd5\u9a8c\u8bc1\u5b8c\u6574\u5de5\u7a0b\u5de5\u4f5c\u6d41\u7684\u7f3a\u9677\uff0c\u4e3a\u9886\u57df\u4e13\u4e1a\u667a\u80fd\u4f53\u7684\u4e25\u683c\u8bc4\u6d4b\u63d0\u4f9b\u65b0\u8303\u5f0f"}, {"abstract": "As Model Context Protocol (MCP) servers emerge as the core infrastructure for connecting LLMs with external tools, existing benchmarks leverage real-world MCP servers to evaluate LLM agents\u0027 tool-using capabilities. However, these benchmarks overlook the continuous evolution of tool interfaces and functionalities within MCP servers, resulting in flawed assessments that fail to capture the agent\u0027s adaptability in changing tool landscapes. To bridge this gap, we introduce \\textbf{MCPEvol-Bench}, a novel benchmark for evaluating the task-solving capabilities of LLM agents under dynamic toolset evolution. Inspired by large-scale empirical study, we propose 11 mutation operators to simulate realistic tool evolution within 123 MCP servers. We benchmark 12 state-of-the-art LLMs on multiple versions of MCP servers, revealing that even frontier models struggle to adapt to evolving tools. For instance, GPT-5.4 and Claude-Sonnet-4-6 exhibit performance declines of 13.7\\% and 14.4\\% in evolved MCP servers, respectively, accompanied by substantial increases in planning and reasoning errors. These findings highlight the vulnerability of LLM-driven workflows, establishing MCPEvol-Bench as a standard for evaluating agent adaptability in dynamic tool environments.", "arxiv_id": "2607.14642", "arxiv_url": "https://arxiv.org/abs/2607.14642", "authors": ["Huanxi Liu", "Kun Hu", "Jiaqi Liao", "Qiang Wang", "Pengfei Qian", "YuanZhao Zhai", "Dawei Feng", "Bo Ding", "Huaimin Wang"], "brief": "\u63d0\u51faMCPEvol-Bench\u57fa\u51c6\uff0c\u901a\u8fc711\u79cd\u53d8\u5f02\u7b97\u5b50\u6a21\u62df123\u4e2aMCP\u670d\u52a1\u5668\u7684\u771f\u5b9e\u5de5\u5177\u6f14\u5316\u573a\u666f\uff0c\u7cfb\u7edf\u8bc4\u6d4b12\u4e2a\u4e3b\u6d41LLM\u5728\u52a8\u6001\u5de5\u5177\u73af\u5883\u4e0b\u7684\u4efb\u52a1\u6c42\u89e3\u80fd\u529b\u3002", "categories": ["cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14642", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u8bbe\u8ba111\u79cd\u53d8\u5f02\u7b97\u5b50\u6a21\u62dfMCP\u670d\u52a1\u5668\u5de5\u5177\u63a5\u53e3\u4e0e\u529f\u80fd\u7684\u771f\u5b9e\u6f14\u5316\uff0c\u8986\u76d6123\u4e2aMCP\u670d\u52a1\u5668", "GPT-4.5\u548cClaude-Sonnet-4-6\u5728\u6f14\u5316\u540e\u7684MCP\u670d\u52a1\u5668\u4e0a\u6027\u80fd\u5206\u522b\u4e0b\u964d13.7%\u548c14.4%", "\u6027\u80fd\u4e0b\u964d\u4f34\u968f\u89c4\u5212\u4e0e\u63a8\u7406\u9519\u8bef\u663e\u8457\u589e\u52a0\uff0c\u63ed\u793a\u524d\u6cbf\u6a21\u578b\u5bf9\u5de5\u5177\u53d8\u5316\u7684\u8106\u5f31\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "\u5de5\u5177\u4f7f\u7528", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14642v1", "published_at": "2026-07-16", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MCPEvol-Bench: Benchmarking LLM Agent Performance Across Dynamic Evolutions of MCP Servers", "tldr": "MCPEvol-Bench\u8bc4\u6d4bLLM\u667a\u80fd\u4f53\u5728MCP\u670d\u52a1\u5668\u52a8\u6001\u6f14\u5316\u4e0b\u7684\u5de5\u5177\u4f7f\u7528\u9002\u5e94\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faMCPEvol-Bench\u57fa\u51c6\uff0c\u901a\u8fc711\u79cd\u53d8\u5f02\u7b97\u5b50\u6a21\u62df123\u4e2aMCP\u670d\u52a1\u5668\u7684\u771f\u5b9e\u5de5\u5177\u6f14\u5316\u573a\u666f\uff0c\u7cfb\u7edf\u8bc4\u6d4b12\u4e2a\u4e3b\u6d41LLM\u5728\u52a8\u6001\u5de5\u5177\u73af\u5883\u4e0b\u7684\u4efb\u52a1\u6c42\u89e3\u80fd\u529b\u3002", "why_notable": "\u9996\u4e2a\u9488\u5bf9MCP\u670d\u52a1\u5668\u52a8\u6001\u6f14\u5316\u573a\u666f\u7684\u8bc4\u6d4b\u57fa\u51c6\uff0c\u586b\u8865\u73b0\u6709\u57fa\u51c6\u5ffd\u89c6\u5de5\u5177\u63a5\u53e3\u53d8\u5316\u7684\u7a7a\u767d\uff0c\u5bf9\u6784\u5efa\u9c81\u68d2LLM\u667a\u80fd\u4f53\u5de5\u4f5c\u6d41\u5177\u6709\u91cd\u8981\u6307\u5bfc\u610f\u4e49"}, {"abstract": "Existing LLM-based theorem provers have achieved impressive results on formal mathematics benchmarks, yet they remain confined to acting as autonomous agents that prove a stated proposition. In this paper, we propose MathCoPilot, a human-in-the-loop system that embodies a new human--AI symbiotic paradigm for mathematical research, in which the mathematician steers the high-level mathematical direction while AI agents carry out the detailed formalization and proof work under continuous human guidance. MathCoPilot unifies three core capabilities: (1) an interactive workbench where the mathematician and AI agents collaborate through a living proof blueprint that decomposes a proof into navigable steps the human can directly inspect, direct, and refine; (2) automated proving skill orchestration with adaptive knowledge base search and Lean-integrated iterative verification; and (3) topic-driven paper retrieval and automated formalization into a verified Lean knowledge base. Using MathCoPilot, we systematically compare four state-of-the-art LLMs, including Gemini~3.1~Pro, GPT-5.4, and Claude~Opus~4.7, on a FormalMATH subset and on two real PDE theorems requiring deep domain expertise, evaluating their ability to produce verified Lean~4 proofs and to identify errors in deliberately incorrect proofs. Our results show that while current models can handle undergraduate-level problems with high success rates under favorable autoformalization conditions, substantial challenges remain for domain-specific theorems requiring genuine mathematical understanding.", "arxiv_id": "2607.14582", "arxiv_url": "https://arxiv.org/abs/2607.14582", "authors": ["Junjie Zhang", "Jiayu Liu", "Wenbin Liu", "Zhenya Huang", "Doudou Wang", "Yan Jiang", "Leiye Xu", "Tao Xiong", "Wen Huang", "Qi Liu", "Guoping Hu", "Enhong Chen", "Mengping Zhang", "Xiangdong Ye"], "brief": "\u63d0\u51faMathCoPilot\uff0c\u4e00\u4e2a\u4eba\u5728\u56de\u8def\u4e2d\u7684\u6570\u5b66\u7814\u7a76\u7cfb\u7edf\uff0c\u5c06\u6570\u5b66\u5bb6\u7684\u9ad8\u5c42\u6307\u5bfc\u4e0eAI\u7684\u5f62\u5f0f\u5316\u8bc1\u660e\u80fd\u529b\u7ed3\u5408\uff0c\u901a\u8fc7\u4ea4\u4e92\u5f0f\u5de5\u4f5c\u53f0\u3001\u81ea\u52a8\u8bc1\u660e\u7f16\u6392\u548c\u8bba\u6587\u5f62\u5f0f\u5316\u4e09\u5927\u6838\u5fc3\u529f\u80fd\u5b9e\u73b0\u4eba\u673a\u5171\u751f\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14582", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u4ea4\u4e92\u5f0f\u8bc1\u660e\u84dd\u56fe\uff1a\u5c06\u8bc1\u660e\u5206\u89e3\u4e3a\u53ef\u5bfc\u822a\u6b65\u9aa4\uff0c\u6570\u5b66\u5bb6\u53ef\u76f4\u63a5\u68c0\u67e5\u3001\u6307\u5bfc\u548c\u4fee\u6539", "\u96c6\u6210Lean 4\u9a8c\u8bc1\u5668\uff0c\u652f\u6301\u81ea\u9002\u5e94\u77e5\u8bc6\u5e93\u68c0\u7d22\u4e0e\u8fed\u4ee3\u9a8c\u8bc1", "\u5bf9\u6bd4\u6d4b\u8bd5Gemini 3.1 Pro\u3001GPT-5.4\u3001Claude Opus 4.7\u7b49\u56db\u6b3e\u9876\u7ea7LLM\uff0c\u53d1\u73b0\u5f53\u524d\u6a21\u578b\u5728\u672c\u79d1\u7ea7\u95ee\u9898\u8868\u73b0\u826f\u597d\uff0c\u4f46\u5728\u9700\u8981\u6df1\u5ea6\u9886\u57df\u7406\u89e3\u7684PDE\u5b9a\u7406\u4e0a\u4ecd\u9762\u4e34\u91cd\u5927\u6311\u6218"], "keywords": ["\u667a\u80fd\u4f53", "\u5b9a\u7406\u8bc1\u660e", "\u4eba\u673a\u534f\u540c", "\u5f62\u5f0f\u5316\u6570\u5b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14582v1", "published_at": "2026-07-16", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MathCoPilot: An Interactive System for Human-AI Symbiotic Paradigm of Mathematical Research", "tldr": "MathCoPilot\uff1a\u4eba\u673a\u534f\u540c\u7684\u6570\u5b66\u7814\u7a76\u7cfb\u7edf\uff0c\u6570\u5b66\u5bb6\u4e3b\u5bfc\u65b9\u5411\uff0cAI\u8d1f\u8d23\u5f62\u5f0f\u5316\u8bc1\u660e", "upvotes": 0, "what_it_is": "\u63d0\u51faMathCoPilot\uff0c\u4e00\u4e2a\u4eba\u5728\u56de\u8def\u4e2d\u7684\u6570\u5b66\u7814\u7a76\u7cfb\u7edf\uff0c\u5c06\u6570\u5b66\u5bb6\u7684\u9ad8\u5c42\u6307\u5bfc\u4e0eAI\u7684\u5f62\u5f0f\u5316\u8bc1\u660e\u80fd\u529b\u7ed3\u5408\uff0c\u901a\u8fc7\u4ea4\u4e92\u5f0f\u5de5\u4f5c\u53f0\u3001\u81ea\u52a8\u8bc1\u660e\u7f16\u6392\u548c\u8bba\u6587\u5f62\u5f0f\u5316\u4e09\u5927\u6838\u5fc3\u529f\u80fd\u5b9e\u73b0\u4eba\u673a\u5171\u751f\u3002", "why_notable": "\u9996\u4e2a\u5c06\u4eba\u673a\u534f\u540c\u8303\u5f0f\u7cfb\u7edf\u5316\u5e94\u7528\u4e8e\u6570\u5b66\u7814\u7a76\u7684\u5b8c\u6574\u5e73\u53f0\uff0c\u7a81\u7834\u73b0\u6709\u5b9a\u7406\u8bc1\u660e\u5668\u7eaf\u81ea\u4e3b\u6a21\u5f0f\u7684\u5c40\u9650\uff0c\u5e76\u63d0\u4f9b\u4e86\u5bf9\u4e3b\u6d41\u9876\u7ea7LLM\u5728\u5f62\u5f0f\u5316\u6570\u5b66\u80fd\u529b\u4e0a\u7684\u7cfb\u7edf\u6027\u6a2a\u5411\u8bc4\u6d4b\u3002"}, {"abstract": "Collective problem solving often requires that group members consider the tradeoff between exploitation of known solutions and exploration for new ones, where information of known solutions can be disseminated among individual members through communication networks. The Mason--Watts experiment (PNAS 2012) showed that human groups in shorter-path networks outperform those in longer-path networks on a two-dimensional search task. In this work, we focus on the investigation of such network-efficiency effects in the setting of a group of large language model (LLM) agents. Specifically, we consider groups of sixteen LLM agents playing the Mason--Watts experiment on the eight Mason--Watts network topologies. Moreover, we develop mechanistic Bayesian optimization agents such that the performance of LLM agents can be compared with both the mechanistic agents and the human experimental data. Our computational experiments indicate that the LLM agents show a significant network-efficiency effect when instructed to randomize their first-round choices, but not under the default initialization. In this experiment, adding a one-sentence first-round randomization instruction improves collective payoff by more than three times the estimated payoff difference across the eight network topologies. Also, the Bayesian optimization agents obtain higher payoffs than the evaluated LLM agents on this spatial search task. We further compare the agents\u0027 exploration--exploitation behavior, copying, and spatial diversity.", "arxiv_id": "2607.14574", "arxiv_url": "https://arxiv.org/abs/2607.14574", "authors": ["Hao He", "Chris J. Kuhlman", "Xinwei Deng"], "brief": "\u672c\u6587\u5c06\u7ecf\u5178Mason-Watts\u4eba\u7c7b\u7fa4\u4f53\u5b9e\u9a8c\u79fb\u690d\u5230LLM\u667a\u80fd\u4f53\u7fa4\u7ec4\u4e2d\uff0c\u7814\u7a7616\u4e2aLLM\u667a\u80fd\u4f53\u57288\u79cd\u7f51\u7edc\u62d3\u6251\u4e0b\u7684\u4e8c\u7ef4\u7a7a\u95f4\u641c\u7d22\u4efb\u52a1\uff0c\u5e76\u5f00\u53d1\u8d1d\u53f6\u65af\u4f18\u5316\u667a\u80fd\u4f53\u4f5c\u4e3a\u5bf9\u7167\u57fa\u51c6\u3002", "categories": ["cs.AI", "cs.SI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14574", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["LLM\u667a\u80fd\u4f53\u5728\u88ab\u6307\u793a\u968f\u673a\u5316\u9996\u8f6e\u9009\u62e9\u65f6\u8868\u73b0\u51fa\u663e\u8457\u7684\u7f51\u7edc\u6548\u7387\u6548\u5e94\uff0c\u4f46\u9ed8\u8ba4\u521d\u59cb\u5316\u4e0b\u5219\u4e0d\u7136", "\u4ec5\u6dfb\u52a0\u4e00\u53e5\u9996\u8f6e\u968f\u673a\u5316\u6307\u4ee4\uff0c\u5373\u53ef\u4f7f\u96c6\u4f53\u6536\u76ca\u63d0\u5347\u8d85\u8fc7\u516b\u79cd\u7f51\u7edc\u62d3\u6251\u95f4\u4f30\u8ba1\u6536\u76ca\u5dee\u5f02\u7684\u4e09\u500d", "\u8d1d\u53f6\u65af\u4f18\u5316\u667a\u80fd\u4f53\u5728\u7a7a\u95f4\u641c\u7d22\u4efb\u52a1\u4e0a\u7684\u6536\u76ca\u9ad8\u4e8e\u6240\u6709\u6d4b\u8bd5\u7684LLM\u667a\u80fd\u4f53\uff0c\u4e14\u6587\u7ae0\u8fdb\u4e00\u6b65\u5206\u6790\u4e86\u63a2\u7d22-\u5229\u7528\u6743\u8861\u3001\u6a21\u4eff\u884c\u4e3a\u548c\u7a7a\u95f4\u591a\u6837\u6027"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u667a\u80fd\u4f53\u534f\u4f5c", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14574v1", "published_at": "2026-07-16", "score": 0.325, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Collaborative Spatial Learning with Multi-LLM Agents in Networked Social Experiments", "tldr": "\u591aLLM\u667a\u80fd\u4f53\u5728\u7f51\u7edc\u5316\u793e\u4f1a\u5b9e\u9a8c\u4e2d\u7684\u534f\u4f5c\u7a7a\u95f4\u5b66\u4e60\u4e0e\u7f51\u7edc\u6548\u7387\u7814\u7a76", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06\u7ecf\u5178Mason-Watts\u4eba\u7c7b\u7fa4\u4f53\u5b9e\u9a8c\u79fb\u690d\u5230LLM\u667a\u80fd\u4f53\u7fa4\u7ec4\u4e2d\uff0c\u7814\u7a7616\u4e2aLLM\u667a\u80fd\u4f53\u57288\u79cd\u7f51\u7edc\u62d3\u6251\u4e0b\u7684\u4e8c\u7ef4\u7a7a\u95f4\u641c\u7d22\u4efb\u52a1\uff0c\u5e76\u5f00\u53d1\u8d1d\u53f6\u65af\u4f18\u5316\u667a\u80fd\u4f53\u4f5c\u4e3a\u5bf9\u7167\u57fa\u51c6\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u7ecf\u5178\u4eba\u7c7b\u96c6\u4f53\u667a\u6167\u5b9e\u9a8c\u8fc1\u79fb\u81f3LLM\u591a\u667a\u80fd\u4f53\u573a\u666f\uff0c\u63ed\u793a\u4e86\u7b80\u5355\u63d0\u793a\u5de5\u7a0b\u5bf9\u7fa4\u4f53\u534f\u4f5c\u6548\u7387\u7684\u5de8\u5927\u5f71\u54cd\uff0c\u5bf9LLM\u667a\u80fd\u4f53\u534f\u4f5c\u8bbe\u8ba1\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u6307\u5bfc\u610f\u4e49\u3002"}, {"abstract": "Modern industrial environments increasingly run many autonomous subsystems at once - schedulers, energy managers, vehicle fleets - each pursuing its own goals while sharing the same physical resources. Because high-level human intentions are translated into low-level control logic and then discarded, no running component can tell whether it is still doing what was actually intended, and goal conflicts surface only after they have caused a missed target or a shutdown. We propose the Intention Abstraction Layer (IAL), a domainagnostic middleware that represents intentions as first-class, persistent, and explainable runtime objects: a large language model grounded in a formal OWL ontology parses naturallanguage goals into structured intentions, a consistency monitor detects conflicts at registration time, before execution, and a transparency module explains them in natural language. We report a first proof of concept in which two autonomous agents register conflicting production and energy intentions, and the IAL flags and explains the conflict before it reaches the execution layer. The result is a mechanism that shifts behavioral assurance for cooperating autonomous systems from post-hoc failure analysis to pre-execution, intention-level checking.", "arxiv_id": "2607.14553", "arxiv_url": "https://arxiv.org/abs/2607.14553", "authors": ["Artan Markaj", "Raphael H\u00f6fer", "Felix Gehlhoff"], "brief": "\u63d0\u51fa\u610f\u56fe\u62bd\u8c61\u5c42\uff08IAL\uff09\u4e2d\u95f4\u4ef6\uff0c\u5c06\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u89e3\u6790\u4e3a\u6301\u4e45\u5316\u3001\u53ef\u89e3\u91ca\u7684\u8fd0\u884c\u65f6\u610f\u56fe\u5bf9\u8c61\uff0c\u5e76\u5728\u6267\u884c\u524d\u68c0\u6d4b\u591a\u81ea\u4e3b\u7cfb\u7edf\u95f4\u7684\u76ee\u6807\u51b2\u7a81\uff0c\u907f\u514d\u51b2\u7a81\u5728\u6267\u884c\u5c42\u624d\u66b4\u9732\u3002", "categories": ["cs.AI", "cs.MA"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14553", "impact_score": 6, "is_agent": true, "is_top": true, "key_points": ["\u4f7f\u7528LLM\u7ed3\u5408OWL\u672c\u4f53\u5c06\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u89e3\u6790\u4e3a\u7ed3\u6784\u5316\u610f\u56fe\u5bf9\u8c61\uff0c\u610f\u56fe\u4f5c\u4e3a\u4e00\u7b49\u516c\u6c11\u6301\u4e45\u5b58\u5728\u4e8e\u8fd0\u884c\u65f6", "\u4e00\u81f4\u6027\u76d1\u63a7\u6a21\u5757\u5728\u6ce8\u518c\u65f6\u3001\u6267\u884c\u524d\u4e09\u4e2a\u9636\u6bb5\u68c0\u6d4b\u610f\u56fe\u51b2\u7a81\uff0c\u900f\u660e\u5ea6\u6a21\u5757\u7528\u81ea\u7136\u8bed\u8a00\u89e3\u91ca\u51b2\u7a81\u539f\u56e0", "\u6982\u5ff5\u9a8c\u8bc1\u4e2d\u4e24\u4e2a\u81ea\u4e3b\u4ee3\u7406\u6ce8\u518c\u76f8\u4e92\u51b2\u7a81\u7684\u751f\u4ea7\u4e0e\u80fd\u6e90\u610f\u56fe\uff0cIAL\u6210\u529f\u5728\u6267\u884c\u524d\u6807\u8bb0\u5e76\u89e3\u91ca\u51b2\u7a81"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u667a\u80fd\u4f53", "\u5de5\u4e1aAI", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14553v1", "published_at": "2026-07-16", "score": 0.3, "selected_reasons": ["\u4e0e computer use / agent \u76f8\u5173"], "thumbnail": null, "title": "Towards an Intention Abstraction Layer for Autonomous Industrial Systems", "tldr": "\u63d0\u51fa\u610f\u56fe\u62bd\u8c61\u5c42IAL\uff0c\u8ba9\u5de5\u4e1a\u81ea\u4e3b\u7cfb\u7edf\u5728\u6267\u884c\u524d\u68c0\u6d4b\u5e76\u89e3\u91ca\u610f\u56fe\u51b2\u7a81", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u610f\u56fe\u62bd\u8c61\u5c42\uff08IAL\uff09\u4e2d\u95f4\u4ef6\uff0c\u5c06\u81ea\u7136\u8bed\u8a00\u76ee\u6807\u89e3\u6790\u4e3a\u6301\u4e45\u5316\u3001\u53ef\u89e3\u91ca\u7684\u8fd0\u884c\u65f6\u610f\u56fe\u5bf9\u8c61\uff0c\u5e76\u5728\u6267\u884c\u524d\u68c0\u6d4b\u591a\u81ea\u4e3b\u7cfb\u7edf\u95f4\u7684\u76ee\u6807\u51b2\u7a81\uff0c\u907f\u514d\u51b2\u7a81\u5728\u6267\u884c\u5c42\u624d\u66b4\u9732\u3002", "why_notable": "\u5c06\u5de5\u4e1a\u81ea\u4e3b\u7cfb\u7edf\u7684\u884c\u4e3a\u4fdd\u969c\u4ece\u4e8b\u540e\u6545\u969c\u5206\u6790\u524d\u79fb\u81f3\u6267\u884c\u524d\u610f\u56fe\u7ea7\u68c0\u67e5\uff0c\u5bf9\u591a\u667a\u80fd\u4f53\u534f\u4f5c\u5b89\u5168\u6027\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\uff0c\u4e14\u65b9\u6848\u9886\u57df\u65e0\u5173\u53ef\u5e7f\u6cdb\u9002\u7528\u3002"}, {"abstract": "We present Wan-Streamer v0.3, which reframes our native-streaming interaction model under a single organizing view: a video is a world plus an event stream. The world is the persistent context in which a video unfolds, including the environment, scene, subjects, ambient acoustic conditions, voice characteristics, and other relatively stable conditions. The event stream is everything that changes over time within that world, including scene or environmental changes, subject behavior, speech, and other sounds. This yields a general-purpose pretraining task over large amounts of real video: given a world and incoming input, predict how the world moves, changes, and responds in real time. The resulting competence can be specialized to a broad family of real-time downstream tasks. We instantiate it on real-time full-duplex audio-visual interaction, where the event stream is the agent\u0027s speech together with free-form behavior. Functionally, the model\u0027s multimodal understanding process is vision-language-action-like: it maps multimodal user input to language-form speech and behavior actions. Wan-Streamer v0.3 preserves the v0.2 operating point: 640x368 video at 25 FPS, a 160 ms streaming unit, approximately 200 ms model-side response latency, and approximately 550 ms total interaction latency under a 350 ms bidirectional network budget.", "arxiv_id": "2607.15038", "arxiv_url": "https://arxiv.org/abs/2607.15038", "authors": ["Lianghua Huang", "Zhi-Fan Wu", "Yupeng Shi", "Wei Wang", "Mengyang Feng", "Cheng Yu", "Chen Liang", "Junjie He", "Chen-Wei Xie", "Yu Liu", "Jingren Zhou", "Ang Wang", "Bang Zhang", "Baole Ai", "Chongyang Zhong", "Jinwei Qi", "Kai Zhu", "Pandeng Li", "Peng Zhang", "Wenyuan Zhang", "Xinhua Cheng", "Yitong Huang", "Yun Zheng", "Yuxiang Bao", "Yuzheng Wang", "Zhiwei Lin", "Zoubin Bi"], "brief": "\u63d0\u51faWan-Streamer v0.3\uff0c\u5c06\u89c6\u9891\u5efa\u6a21\u4e3a\"\u6301\u4e45\u4e16\u754c\u80cc\u666f\"\u4e0e\"\u968f\u65f6\u95f4\u53d8\u5316\u7684\u4e8b\u4ef6\u6d41\"\u7684\u7ec4\u5408\uff0c\u4ee5\u6b64\u4e3a\u7edf\u4e00\u6846\u67b6\u8bbe\u8ba1\u5927\u89c4\u6a21\u89c6\u9891\u9884\u8bad\u7ec3\u4efb\u52a1\uff0c\u5e76\u843d\u5730\u4e8e\u5b9e\u65f6\u5168\u53cc\u5de5\u97f3\u89c6\u9891\u4ea4\u4e92\u573a\u666f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15038", "impact_score": 7, "is_agent": true, "is_top": true, "key_points": ["\u89c6\u9891=\u4e16\u754c\uff08\u7a33\u5b9a\u73af\u5883/\u573a\u666f/\u58f0\u5b66\u6761\u4ef6\uff09+\u4e8b\u4ef6\u6d41\uff08\u884c\u4e3a/\u8bed\u97f3/\u52a8\u6001\u53d8\u5316\uff09\uff0c\u5f62\u6210\u7edf\u4e00\u9884\u8bad\u7ec3\u8303\u5f0f", "\u6a21\u578b\u5177\u5907\u7c7bVLA\uff08\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\uff09\u7684\u591a\u6a21\u6001\u7406\u89e3\u80fd\u529b\uff0c\u5c06\u7528\u6237\u8f93\u5165\u6620\u5c04\u4e3a\u8bed\u97f3\u4e0e\u884c\u4e3a\u52a8\u4f5c\u8f93\u51fa", "\u4fdd\u6301v0.2\u6027\u80fd\u6307\u6807\uff1a640\u00d7368@25FPS\uff0c160ms\u6d41\u5f0f\u5355\u5143\uff0c\u6a21\u578b\u4fa7\u54cd\u5e94\u5ef6\u8fdf\u7ea6200ms\uff0c\u603b\u4ea4\u4e92\u5ef6\u8fdf\u7ea6550ms"], "keywords": ["\u591a\u6a21\u6001", "\u667a\u80fd\u4f53", "\u89c6\u9891\u7406\u89e3", "\u6d41\u5f0f\u4ea4\u4e92"], "num_comments": 2, "on_hf": true, "organization": "Wan-AI", "pdf_url": "https://arxiv.org/pdf/2607.15038v1", "published_at": "2026-07-16", "score": 0.224, "selected_reasons": ["HF trending (4\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.15038.png", "title": "Video = World + Event Stream", "tldr": "\u5c06\u89c6\u9891\u91cd\u65b0\u5b9a\u4e49\u4e3a\"\u4e16\u754c+\u4e8b\u4ef6\u6d41\"\uff0c\u6784\u5efa\u901a\u7528\u5b9e\u65f6\u6d41\u5f0f\u89c6\u9891\u4ea4\u4e92\u6a21\u578bWan-Streamer v0.3", "upvotes": 4, "what_it_is": "\u63d0\u51faWan-Streamer v0.3\uff0c\u5c06\u89c6\u9891\u5efa\u6a21\u4e3a\"\u6301\u4e45\u4e16\u754c\u80cc\u666f\"\u4e0e\"\u968f\u65f6\u95f4\u53d8\u5316\u7684\u4e8b\u4ef6\u6d41\"\u7684\u7ec4\u5408\uff0c\u4ee5\u6b64\u4e3a\u7edf\u4e00\u6846\u67b6\u8bbe\u8ba1\u5927\u89c4\u6a21\u89c6\u9891\u9884\u8bad\u7ec3\u4efb\u52a1\uff0c\u5e76\u843d\u5730\u4e8e\u5b9e\u65f6\u5168\u53cc\u5de5\u97f3\u89c6\u9891\u4ea4\u4e92\u573a\u666f\u3002", "why_notable": "\u63d0\u51fa\u4e86\u4e00\u79cd\u7b80\u6d01\u800c\u901a\u7528\u7684\u89c6\u9891\u7406\u89e3\u65b0\u8303\u5f0f\uff0c\u5c06\u5b9e\u65f6\u6d41\u5f0f\u4ea4\u4e92\u4e0e\u5927\u89c4\u6a21\u89c6\u9891\u9884\u8bad\u7ec3\u7edf\u4e00\u5728\u540c\u4e00\u6846\u67b6\u4e0b\uff0c\u5bf9\u6784\u5efa\u4f4e\u5ef6\u8fdf\u3001\u5168\u53cc\u5de5\u7684\u5177\u8eab/\u5bf9\u8bdd\u667a\u80fd\u4f53\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "World-action models (WAMs) are emerging as a promising foundation for embodied control: rather than predicting actions alone, they learn representations that couple action generation with future world prediction. This coupling is often viewed as a source of robustness, interpretability, and safety, as a robot\u0027s action can in principle be checked against its imagined future. In this paper, we show that this assumption is fragile. We introduce BadWAM, a unified framework for modeling and evaluating World-Action Drift Attacks: a new class of WAM-specific adversarial attacks that use small visual perturbations to break the alignment between what a WAM imagines and what it executes. BadWAM characterizes this attack surface along two natural criteria: attack strength and stealthiness. When the adversary prioritizes disruption, BadWAM instantiates an action-only adversarial attack, which directly drives the model toward task-failing actions. When the adversary additionally prioritizes stealth, BadWAM instantiates an imagination-preserving adversarial attack, which seeks to induce harmful action shifts while keeping the model\u0027s predicted future close to its clean imagination. Together, these two attacks capture a spectrum of WAM-specific failures: from overt action hijacking to stealthier cases where the model appears to imagine a plausible future but executes a desynchronized action. We evaluate BadWAM across different variants of WAMs. Results show that our attacks substantially reduce task success rates under closed-loop execution. For example, our action-only attack reduces the model performance from 96.5% to 43.1% success. The results of our imagination-preserving attack further exposes a WAM-specific vulnerability: moderate future-preserving regularization can maintain strong attack performance while reducing future imagination drift.", "arxiv_id": "2607.15207", "arxiv_url": "https://arxiv.org/abs/2607.15207", "authors": ["Qi Li", "Xingyi Yang", "Xinchao Wang"], "brief": "\u63d0\u51faBadWAM\u6846\u67b6\uff0c\u9488\u5bf9\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\uff08WAMs\uff09\u8bbe\u8ba1\"\u4e16\u754c-\u52a8\u4f5c\u6f02\u79fb\u653b\u51fb\"\uff0c\u901a\u8fc7\u5fae\u5c0f\u89c6\u89c9\u6270\u52a8\u7834\u574f\u6a21\u578b\u60f3\u8c61\u672a\u6765\u4e0e\u5b9e\u9645\u6267\u884c\u52a8\u4f5c\u4e4b\u95f4\u7684\u5bf9\u9f50\uff0c\u63ed\u793aWAMs\u5b89\u5168\u5047\u8bbe\u7684\u8106\u5f31\u6027\u3002", "categories": ["cs.LG", "cs.RO"], "github_repo": "https://github.com/LiQiiiii/BadWAM", "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15207", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5b9a\u4e49\u4e24\u7c7b\u653b\u51fb\uff1a\u7eaf\u52a8\u4f5c\u653b\u51fb\uff08\u76f4\u63a5\u52ab\u6301\u52a8\u4f5c\uff09\u548c\u4fdd\u7559\u60f3\u8c61\u653b\u51fb\uff08\u7ef4\u6301\u6b63\u5e38\u60f3\u8c61\u7684\u540c\u65f6\u8bf1\u5bfc\u6709\u5bb3\u52a8\u4f5c\u504f\u79fb\uff09", "\u7eaf\u52a8\u4f5c\u653b\u51fb\u5c06\u4efb\u52a1\u6210\u529f\u7387\u4ece96.5%\u5927\u5e45\u964d\u81f343.1%\uff0c\u6548\u679c\u663e\u8457", "\u4fdd\u7559\u60f3\u8c61\u653b\u51fb\u66b4\u9732WAM\u7279\u6709\u6f0f\u6d1e\uff1a\u9002\u5ea6\u7684\u672a\u6765\u4fdd\u7559\u6b63\u5219\u5316\u53ef\u5728\u7ef4\u6301\u653b\u51fb\u6548\u679c\u7684\u540c\u65f6\u51cf\u5c11\u60f3\u8c61\u6f02\u79fb\uff0c\u5b9e\u73b0\u66f4\u9690\u853d\u7684\u653b\u51fb"], "keywords": ["\u5177\u8eab\u667a\u80fd", "\u5bf9\u6297\u653b\u51fb", "\u4e16\u754c\u6a21\u578b", "\u673a\u5668\u4eba\u5b89\u5168"], "num_comments": 1, "on_hf": true, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15207v1", "published_at": "2026-07-16", "score": 0.223, "selected_reasons": ["HF trending (1\u8d5e)", "\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": "https://cdn-thumbnails.huggingface.co/social-thumbnails/papers/2607.15207.png", "title": "BadWAM: When World-Action Models Dream Right but Act Wrong", "tldr": "BadWAM\u63ed\u793a\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\u7684\u65b0\u578b\u5bf9\u6297\u653b\u51fb\uff1a\u89c6\u89c9\u6270\u52a8\u53ef\u4f7f\u6a21\u578b\"\u60f3\u8c61\u6b63\u786e\u5374\u6267\u884c\u9519\u8bef\"", "upvotes": 1, "what_it_is": "\u63d0\u51faBadWAM\u6846\u67b6\uff0c\u9488\u5bf9\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\uff08WAMs\uff09\u8bbe\u8ba1\"\u4e16\u754c-\u52a8\u4f5c\u6f02\u79fb\u653b\u51fb\"\uff0c\u901a\u8fc7\u5fae\u5c0f\u89c6\u89c9\u6270\u52a8\u7834\u574f\u6a21\u578b\u60f3\u8c61\u672a\u6765\u4e0e\u5b9e\u9645\u6267\u884c\u52a8\u4f5c\u4e4b\u95f4\u7684\u5bf9\u9f50\uff0c\u63ed\u793aWAMs\u5b89\u5168\u5047\u8bbe\u7684\u8106\u5f31\u6027\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u63ed\u793a\u4e16\u754c-\u52a8\u4f5c\u6a21\u578b\"\u60f3\u8c61-\u6267\u884c\u89e3\u8026\"\u8fd9\u4e00\u5b89\u5168\u76f2\u533a\uff0c\u5bf9\u5177\u8eab\u667a\u80fd\u5b89\u5168\u7814\u7a76\u5177\u6709\u91cd\u8981\u8b66\u793a\u610f\u4e49\uff0c\u6311\u6218\u4e86WAMs\u5929\u7136\u5177\u5907\u53ef\u89e3\u91ca\u6027\u4e0e\u5b89\u5168\u6027\u7684\u666e\u904d\u5047\u8bbe\u3002"}, {"abstract": "Humanoid control requires natural whole-body coordination, precise real-time responses to control signals, and robust generalization across diverse environmental contexts, making it a cornerstone for generalist embodied agents. Behavior Foundation Models (BFMs) have recently emerged as a promising solution to address these challenges by leveraging large-scale behavioral data to achieve superior expressiveness, versatility and generalization. However, despite growing interest in scaling BFMs to further improve their capabilities, it remains unclear how key factors, including the learning paradigm, behavioral data and model architecture should be coordinated to enable effective scaling. In this work, we revisit the scaling recipe for BFMs and demonstrate that substantial performance gains can be achieved through the coordination of three core components: 1) the learning paradigm of motion tracking that reformulates diverse humanoid control problems as the reproduction of integrated whole-body behaviors in the global frame; 2) the strategic synergy between on-policy rollout quantity and reference motion diversity; and 3) the expressive and scalable model architecture termed Humanoid Transformer that facilitates the natural emergence of structured behavioral representations. Through extensive experiments in both simulation and real-world deployment, we demonstrate that our approach yields significant improvements in control fidelity and task generalization, reducing Mean Per-Keypoint Position Error (MPKPE) on the test set by over 10% in local mode and 82% in global mode compared with existing humanoid controllers. These results establish BFM as a principled and effective foundation for scalable and general-purpose humanoid control.", "arxiv_id": "2607.15163", "arxiv_url": "https://arxiv.org/abs/2607.15163", "authors": ["Weishuai Zeng", "Kangning Yin", "Xiaojie Niu", "Shunlin Lu", "Weixiang Zhong", "Jiahe Chen", "Feiyu Jia", "Xiao Chen", "Zirui Wang", "Furui Xu", "Ming Zhou", "Kailin Li", "Weinan Zhang", "He Wang", "Li Yi", "Dahua Lin", "Jiangmiao Pang", "Jingbo Wang"], "brief": "\u672c\u6587\u91cd\u65b0\u5ba1\u89c6\u4eba\u5f62\u673a\u5668\u4eba\u884c\u4e3a\u57fa\u7840\u6a21\u578b\uff08BFM\uff09\u7684\u6269\u5c55\u65b9\u6cd5\uff0c\u63d0\u51fa\u901a\u8fc7\u8fd0\u52a8\u8ffd\u8e2a\u5b66\u4e60\u8303\u5f0f\u3001\u5728\u7ebf\u7b56\u7565\u6570\u636e\u4e0e\u53c2\u8003\u52a8\u4f5c\u591a\u6837\u6027\u534f\u540c\u3001\u4ee5\u53caHumanoid Transformer\u67b6\u6784\u4e09\u8005\u534f\u8c03\u914d\u5408\uff0c\u5b9e\u73b0\u5168\u8eab\u63a7\u5236\u80fd\u529b\u7684\u663e\u8457\u63d0\u5347\ 9e\u73b0\u5168\u8eab\u63a7\u5236\u80fd\u529b\u7684\u663e\u8457\u63d0\u5347\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u63ed\u793aBFM\u6269\u5c55\u7684\u5173\u952e\u914d\u65b9\uff0c\u5728\u4eff\u771f\u548c\u771f\u5b9e\u90e8\u7f72\u4e2d\u5747\u9a8c\u8bc1\u6709\u6548\uff0c\u4e3a\u901a\u7528\u4eba\u5f62\u673a\u5668\u4eba\u63a7\u5236\u63d0\u4f9b\u4e86\u53ef\u6269\u5c55\u7684\u57fa\u7840\u6846\u67b6\uff0c\u5168\u5c40\u6a21\u5f0f\u8bef\u5dee\u964d\u5e45\u9ad8\u8fbe82%\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Large language models are increasingly evolving from text generators into general agents capable of understanding user requests, invoking external tools, and completing complex tasks through interaction. However, existing agent benchmarks often focus on limited scenarios, tool ecosystems, or interaction formats, making it difficult to systematically characterize model capabilities across heterogeneous application settings. We introduce OmniaBench, a benchmark for evaluating general agents across diverse scenarios with explicit state spaces. We derive application-oriented scenario knowledge from app stores, product documents, industry resources, Web retrieval, and human refinement, forming a hierarchical taxonomy that spans ToC, ToB and ToE with 90 level-1 and 354 level-2 domains. Based on this taxonomy, we construct executable environments and synthesize single-turn and multi-turn tasks through four complementary routes: DAG, DAG-S, Solver, and Program. OmniaBench further introduces a ten-dimensional capability taxonomy and eight compositional atomic difficulty factors to support fine-grained evaluation and analysis. The resulting dataset contains 1,431 tasks, together with a challenging subset of 644 tasks designed to reduce evaluation cost and mitigate potential contamination of the full set after public release. The bench presents substantial challenges to current frontier models, with even Claude-Sonnet-5 and GPT-5.6-Sol achieving Overall Pass@1 scores of only 58.54 and 57.14, respectively. Further analyses reveal clear differences across domains and capabilities, as well as persistent limitations in planning, constraint maintenance, and adaptive correction. OmniaBench provides a broad and diagnostic benchmark for characterizing the capability boundaries of general agents.", "arxiv_id": "2607.14989", "arxiv_url": "https://arxiv.org/abs/2607.14989", "authors": ["Chengyu Shen", "Yujie Fu", "Gangtao Xin", "Yanheng Hou", "Wenlong Fei", "Guojie Zhu", "Jiawei Li", "Hongcheng Gao", "Runming He", "Zhen Hao Wong", "Meiyi Qiang", "Hao Liang", "Zhao Cao", "Hao Jiang", "Chong Chen", "Wentao Zhang"], "brief": "\u63d0\u51faOmniaBench\uff0c\u4e00\u4e2a\u9762\u5411\u901a\u7528AI\u667a\u80fd\u4f53\u7684\u591a\u573a\u666f\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7\u5e94\u7528\u5546\u5e97\u3001\u4ea7\u54c1\u6587\u6863\u7b49\u6765\u6e90\u6784\u5efa\u5c42\u7ea7\u5206\u7c7b\u4f53\u7cfb\uff0c\u6db5\u76d6ToC/ToB/ToE\u5171354\u4e2a\u4e8c\u7ea7\u9886\u57df\uff0c\u5305\u542b1431\u4e2a\u53ef\u6267\u884c\u4efb\u52a1\uff0c\u652f\u6301\u7ec6\u7c92\u5ea6\u80fd\u529b\u5206\u6790\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14989", "impact_score": 8, "is_agent": true, "is_top": true, "key_points": ["\u5c42\u7ea7\u5206\u7c7b\u4f53\u7cfb\u8986\u76d690\u4e2a\u4e00\u7ea7\u3001354\u4e2a\u4e8c\u7ea7\u9886\u57df\uff0c\u901a\u8fc7DAG\u3001DAG-S\u3001Solver\u3001Program\u56db\u79cd\u8def\u5f84\u5408\u6210\u5355\u8f6e\u4e0e\u591a\u8f6e\u4efb\u52a1", "\u5f15\u5165\u5341\u7ef4\u80fd\u529b\u5206\u7c7b\u6cd5\u4e0e\u516b\u79cd\u539f\u5b50\u96be\u5ea6\u56e0\u5b50\uff0c\u652f\u6301\u7ec6\u7c92\u5ea6\u8bca\u65ad\u8bc4\u4f30", "\u5f53\u524d\u6700\u5f3a\u6a21\u578bClaude-Sonnet-5\u548cGPT-5.6-Sol\u7684Overall Pass@1\u4ec5\u4e3a58.54\u548c57.14\uff0c\u89c4\u5212\u3001\u7ea6\u675f\u7ef4\u62a4\u548c\u81ea\u9002\u5e94\u7ea0\u9519\u80fd\u529b\u5b58\u5728\u660e\u
