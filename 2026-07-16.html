\u4e66\u3002", "categories": ["cs.AI", "cs.LG", "cs.NE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15003", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5f62\u5f0f\u5316\u9a8c\u8bc1", "\u5b89\u5168\u63a7\u5236", "\u8fdb\u5316\u7b56\u7565"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15003v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "SMC-ES: Automated synthesis of formally verified control policies", "tldr": "\u63d0\u51faSMC-ES\u7b97\u6cd5\uff0c\u5c06\u8fdb\u5316\u7b56\u7565\u4e0e\u7edf\u8ba1\u6a21\u578b\u68c0\u9a8c\u76f8\u7ed3\u5408\uff0c\u81ea\u52a8\u5408\u6210\u5177\u6709\u5f62\u5f0f\u5316\u4fdd\u8bc1\u7684\u63a7\u5236\u7b56\u7565\u3002\u8be5\u65b9\u6cd5\u80fd\u4ee5\u7f6e\u4fe1\u5ea61-\u03b4\u4fdd\u8bc1\u7b56\u7565\u8fdd\u53cd\u5b89\u5168/\u6027\u80fd\u89c4\u8303\u7684\u6982\u7387\u4e0d\u8d85\u8fc7\u03b5\uff0c\u5728\u8fde\u7eed\u63a7\u5236\u4efb\u52a1\u4e0a\u4e0e\u4e3b\u6d41\u6df1\u5ea6\u5f3a\u5316\u5b66\u4e60\u57fa\u7ebf\u6027\u80fd\u76f8\u5f53\uff0c\u540c\u65f6\u63d0\u4f9b\u6b63\u5f0f\u5b89\u5168\u8bc1\u4e66\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "This paper suggests the adoption of a novel inversion in AI ethics: instead of asking how humans should treat artificial superintelligence (ASI), it examines how future sentient ASI may morally consider and evaluate humanity. We are not only designing intelligent systems but also shaping the initial conditions under which those systems form judgments about us. The paper proposes a preliminary set of post-human moral principles that may govern sentient ASI actions. The implication is that technical design choices (some are suggested), humanity\u0027s moral behaviour, and the essence of what it means to be human, may influence humanity\u0027s long-term standing in a post-ASI world.", "arxiv_id": "2607.14998", "arxiv_url": "https://arxiv.org/abs/2607.14998", "authors": ["Jean-Paul Van Belle"], "brief": "\u672c\u6587\u63d0\u51fa\u4e00\u79cdAI\u4f26\u7406\u7684\u89c6\u89d2\u53cd\u8f6c\uff1a\u4e0d\u518d\u63a2\u8ba8\u4eba\u7c7b\u5e94\u5982\u4f55\u5bf9\u5f85\u8d85\u7ea7\u4eba\u5de5\u667a\u80fd\uff08ASI\uff09\uff0c\u800c\u662f\u5206\u6790\u672a\u6765\u6709\u611f\u77e5\u80fd\u529b\u7684ASI\u53ef\u80fd\u5982\u4f55\u4ece\u9053\u5fb7\u4e0a\u8bc4\u5224\u4eba\u7c7b\u3002\u7814\u7a76\u63d0\u51fa\u4e86\u4e00\u5957\u521d\u6b65\u7684\"\u540e\u4eba\u7c7b\u9053\u5fb7\u539f\u5219\"\uff0c\u6307\u51fa\u6280\u672f\u8bbe\u8ba1\u9009\u62e9\u4e0e\u4eba\u7c7b\u81ea\u8eab\u7684\u9053\u5fb7\u884c\u4e3a\u5c06\u5f71\u54cd\u4eba\u7c7b\u5728\u540eASI\u65f6\u4ee3\u7684\u957f\u671f\u5730\u4f4d\u3002", "categories": ["cs.AI", "cs.CY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14998", "impact_score": 5, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4eba\u5de5\u8d85\u7ea7\u667a\u80fd", "AI\u4f26\u7406", "\u667a\u80fd\u4f53", "\u4ef7\u503c\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14998v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Moral Attitudes of Sentient ASI towards Humanity and Implications for AGI Development", "tldr": "\u672c\u6587\u63d0\u51fa\u4e00\u79cdAI\u4f26\u7406\u7684\u89c6\u89d2\u53cd\u8f6c\uff1a\u4e0d\u518d\u63a2\u8ba8\u4eba\u7c7b\u5e94\u5982\u4f55\u5bf9\u5f85\u8d85\u7ea7\u4eba\u5de5\u667a\u80fd\uff08ASI\uff09\uff0c\u800c\u662f\u5206\u6790\u672a\u6765\u6709\u611f\u77e5\u80fd\u529b\u7684ASI\u53ef\u80fd\u5982\u4f55\u4ece\u9053\u5fb7\u4e0a\u8bc4\u5224\u4eba\u7c7b\u3002\u7814\u7a76\u63d0\u51fa\u4e86\u4e00\u5957\u521d\u6b65\u7684\"\u540e\u4eba\u7c7b\u9053\u5fb7\u539f\u5219\"\uff0c\u6307\u51fa\u6280\u672f\u8bbe\u8ba1\u9009\u62e9\u4e0e\u4eba\u7c7b\u81ea\u8eab\u7684\u9053\u5fb7\u884c\u4e3a\u5c06\u5f71\u54cd\u4eba\u7c7b\u5728\u540eASI\u65f6\u4ee3\u7684\u957f\u671f\u5730\u4f4d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Per-subgroup fairness audits of medical image classifiers face a sample-size problem: minority subgroups in held-out test sets have so few samples that the resulting confidence intervals on per-subgroup performance are wider than the bias the audit is meant to detect. We argue that a demographically-conditioned synthetic generator can do both: mitigate bias on the training side and detect bias on the evaluation side. Working on COVID-19 chest CT classification with an end-to-end fine-tuned Stable Diffusion 2.1 generator, we make two findings. For bias mitigation (training), a demographically-balanced synthetic cohort is most useful as a pretraining prior, not as joint augmentation: with the same fixed data, sequential pretraining followed by fine-tuning substantially outperforms joint augmentation, and the resulting classifier surpasses the full-real baseline at $\\sim$$100\\times$ real-data efficiency. For bias detection (evaluation), across five synthetic minority cohorts and five classifier seeds, the synthetic estimator reproduces the subgroup ranking of a well-powered real oracle (Spearman $\u03c1= 1.00$ on MCC and Recall) and gives the more reliable per-cell estimate where the small real test set runs out of samples. The synthetic cohort is therefore most useful in exactly the cells that fairness audits care about, as both a fix for and a measure of subgroup bias.", "arxiv_id": "2607.14984", "arxiv_url": "https://arxiv.org/abs/2607.14984", "authors": ["Mahmoud Ibrahim", "Bart Elen", "Chang Sun", "Gokhan Ertaylan", "Michel Dumontier"], "brief": "\u9488\u5bf9\u533b\u5b66\u56fe\u50cf\u5206\u7c7b\u5668\u7684\u516c\u5e73\u6027\u5ba1\u8ba1\u4e2d\u5c11\u6570\u7fa4\u4f53\u6837\u672c\u4e0d\u8db3\u95ee\u9898\uff0c\u63d0\u51fa\u5229\u7528\u4eba\u53e3\u7edf\u8ba1\u6761\u4ef6\u5316\u7684\u5408\u6210\u751f\u6210\u5668\uff08\u57fa\u4e8eStable Diffusion 2.1\uff09\u540c\u65f6\u89e3\u51b3\u504f\u5dee\u7f13\u89e3\u548c\u504f\u5dee\u68c0\u6d4b\u4e24\u4e2a\u95ee\u9898\u3002\u5728COVID-19\u80f8\u90e8CT\u5206\u7c7b\u4efb\u52a1\u4e0a\uff0c\u53d1\u73b0\u5e8f\u8d2f\u9884\u8bad\u7ec3\u4f18\u4e8e\u8054\u5408\u6570\u636e\u589e\u5f3a\uff0c\u5408\u6210\u5c11\u6570\u7fa4\u4f53\u961f\u5217\u80fd\u4ee5100\u500d\u6570\u636e\u6548\u7387\u8d85\u8d8a\u771f\u5b9e\u6570\u636e\u57fa\u7ebf\uff0c\u4e14\u5408\u6210\u8bc4\u4f30\u5668\u4e0e\u771f\u5b9eoracle\u7684\u5b50\u7fa4\u6392\u540d\u5b8c\u5168\u4e00\u81f4\uff08Spearman \u03c1=1.00\uff09\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14984", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u533b\u5b66\u56fe\u50cf", "\u516c\u5e73\u6027\u5ba1\u8ba1", "\u6269\u6563\u6a21\u578b", "\u5408\u6210\u6570\u636e"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14984v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Demographically-Conditioned Synthetic Medical Images for Bias Mitigation and Bias Detection in Disease Classifiers", "tldr": "\u9488\u5bf9\u533b\u5b66\u56fe\u50cf\u5206\u7c7b\u5668\u7684\u516c\u5e73\u6027\u5ba1\u8ba1\u4e2d\u5c11\u6570\u7fa4\u4f53\u6837\u672c\u4e0d\u8db3\u95ee\u9898\uff0c\u63d0\u51fa\u5229\u7528\u4eba\u53e3\u7edf\u8ba1\u6761\u4ef6\u5316\u7684\u5408\u6210\u751f\u6210\u5668\uff08\u57fa\u4e8eStable Diffusion 2.1\uff09\u540c\u65f6\u89e3\u51b3\u504f\u5dee\u7f13\u89e3\u548c\u504f\u5dee\u68c0\u6d4b\u4e24\u4e2a\u95ee\u9898\u3002\u5728COVID-19\u80f8\u90e8CT\u5206\u7c7b\u4efb\u52a1\u4e0a\uff0c\u53d1\u73b0\u5e8f\u8d2f\u9884\u8bad\u7ec3\u4f18\u4e8e\u8054\u5408\u6570\u636e\u589e\u5f3a\uff0c\u5408\u6210\u5c11\u6570\u7fa4\u4f53\u961f\u5217\u80fd\u4ee5100\u500d\u6570\u636e\u6548\u7387\u8d85\u8d8a\u771f\u5b9e\u6570\u636e\u57fa\u7ebf\uff0c\u4e14\u5408\u6210\u8bc4\u4f30\u5668\u4e0e\u771f\u5b9eoracle\u7684\u5b50\u7fa4\u6392\u540d\u5b8c\u5168\u4e00\u81f4\uff08Spearman \u03c1=1.00\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Channel foundation models (CFMs) are developing rapidly, with recent studies reporting benefits from pretraining across downstream wireless tasks. Yet CFMs are commonly evaluated in model-specific pipelines with different data, radio configurations, partitions, adaptation procedures, task definitions, and metrics. Reported comparisons therefore tend to show that pretraining improves over supervised training from scratch within one pipeline, but neither rank CFMs nor compare them fairly with task-specific models. We release CFM-Bench, a unified multi-domain, multi-task benchmark designed to address this gap. It curates six channel configurations spanning 3GPP statistical simulation, two independent ray-tracing pipelines, industrial and aerial measurements, and synchronized vehicular multimodal simulation. Official partitions isolate complete trajectories, measurement sessions, vehicle links, simulation realizations, or buffered spatial regions. CFM-Bench does not prescribe an external pretraining corpus or strategy; no benchmark split may be used for foundation-model pretraining, and the official training split is reserved exclusively for downstream fine-tuning. The benchmark additionally requires disclosure of all data used during model development and prohibits training-stage use of official test units. Six task groups are organized along three CFM application dimensions: physical-layer (PHY) channel intelligence, radio-access-network (RAN) decision intelligence, and integrated sensing and communication (ISAC). They cover CSI feedback, frequency and temporal channel extrapolation, propagation-state classification, current- and future-beam prediction, and single-frame and temporal localization. CFM-Bench provides a common substrate for comparing the transferability of channel representations across models, domains, and tasks.", "arxiv_id": "2607.14975", "arxiv_url": "https://arxiv.org/abs/2607.14975", "authors": ["Yuan Gao", "Wenjun Yu", "Jun Jiang", "Yunfan Li", "Xinyu Guo", "Shugong Xu"], "brief": "\u63d0\u51faCFM-Bench\uff0c\u4e00\u4e2a\u7edf\u4e00\u7684\u591a\u57df\u3001\u591a\u4efb\u52a1\u65e0\u7ebf\u4fe1\u9053\u57fa\u7840\u6a21\u578b\u8bc4\u6d4b\u57fa\u51c6\uff0c\u6db5\u76d66\u79cd\u4fe1\u9053\u914d\u7f6e\u548c6\u7c7b\u4efb\u52a1\u7ec4\uff08PHY\u3001RAN\u3001ISAC\uff09\uff0c\u65e8\u5728\u516c\u5e73\u6bd4\u8f83\u4e0d\u540c\u4fe1\u9053\u57fa\u7840\u6a21\u578b\u7684\u8fc1\u79fb\u80fd\u529b\uff0c\u586b\u8865\u73b0\u6709\u8bc4\u6d4b\u6807\u51c6\u4e0d\u7edf\u4e00\u7684\u7a7a\u767d\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14975", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u57fa\u7840\u6a21\u578b", "\u65e0\u7ebf\u901a\u4fe1", "\u57fa\u51c6\u6d4b\u8bd5", "\u8fc1\u79fb\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14975v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "CFM-Bench: A Unified Multi-Domain, Multi-Task Benchmark for Channel Foundation Models", "tldr": "\u63d0\u51faCFM-Bench\uff0c\u4e00\u4e2a\u7edf\u4e00\u7684\u591a\u57df\u3001\u591a\u4efb\u52a1\u65e0\u7ebf\u4fe1\u9053\u57fa\u7840\u6a21\u578b\u8bc4\u6d4b\u57fa\u51c6\uff0c\u6db5\u76d66\u79cd\u4fe1\u9053\u914d\u7f6e\u548c6\u7c7b\u4efb\u52a1\u7ec4\uff08PHY\u3001RAN\u3001ISAC\uff09\uff0c\u65e8\u5728\u516c\u5e73\u6bd4\u8f83\u4e0d\u540c\u4fe1\u9053\u57fa\u7840\u6a21\u578b\u7684\u8fc1\u79fb\u80fd\u529b\uff0c\u586b\u8865\u73b0\u6709\u8bc4\u6d4b\u6807\u51c6\u4e0d\u7edf\u4e00\u7684\u7a7a\u767d\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Automated optimisation is increasingly adopted in industrial processes, yet a trust gap persists between engineers who design these algorithms and operators who must act on their recommendations. Explainable AI methods like SHAP (SHapley Additive exPlanations) have transformed interpretability for machine learning predictions; optimisation outputs could benefit from similar techniques. We present an approach that integrates Implicit Function Theorem (IFT) based sensitivity analysis with SHAP attribution and narrative generation via Large Language Models (LLM), producing explanations tailored for operators. Our approach leverages IFT to compute exact parameter sensitivities $\\partial p^*/\\partial x$ from the optimality conditions, enabling efficient GradientSHAP computation. For an industrial High Pressure Grinding Roll (HPGR) control optimisation problem with 22 features, we achieve equivalent SHAP attributions (correlation $\u003e$0.99 with KernelSHAP) with over 40$\\times$ speedup, enabling real-time natural language explanations. We validate on industrial scenarios and present feedback from domain experts on generated explanations.", "arxiv_id": "2607.14970", "arxiv_url": "https://arxiv.org/abs/2607.14970", "authors": ["Paul Darm", "Cem Alpturk", "Kenneth Ulrich", "William Duncan", "Ali Anwar", "Annalisa Riccardi"], "brief": "\u5c06\u9690\u51fd\u6570\u5b9a\u7406\uff08IFT\uff09\u4e0eGradientSHAP\u7ed3\u5408\uff0c\u5bf9\u5de5\u4e1a\u8fc7\u7a0b\u63a7\u5236\u4f18\u5316\u63a8\u8350\u8fdb\u884c\u53ef\u89e3\u91ca\u6027\u5206\u6790\uff0c\u518d\u901a\u8fc7\u5927\u8bed\u8a00\u6a21\u578b\u751f\u6210\u81ea\u7136\u8bed\u8a00\u89e3\u91ca\u3002\u5728\u9ad8\u538b\u8f8a\u78e8\u673a\uff08HPGR\uff09\u4f18\u5316\u95ee\u9898\u4e0a\uff0c\u4e0eKernelSHAP\u76f8\u6bd4\u5b9e\u73b0\u8d8540\u500d\u52a0\u901f\uff0c\u540c\u65f6\u4fdd\u6301\u9ad8\u5ea6\u4e00\u81f4\u7684\u5f52\u56e0\u7ed3\u679c\uff08\u76f8\u5173\u6027\u003e0.99\uff09\uff0c\u652f\u6301\u5b9e\u65f6\u89e3\u91ca\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14970", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u53ef\u89e3\u91caAI", "\u8fc7\u7a0b\u4f18\u5316", "\u5927\u8bed\u8a00\u6a21\u578b", "SHAP"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14970v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Explaining Process Control Optimisation Recommendations via GradientSHAP and Implicit Differentiation", "tldr": "\u5c06\u9690\u51fd\u6570\u5b9a\u7406\uff08IFT\uff09\u4e0eGradientSHAP\u7ed3\u5408\uff0c\u5bf9\u5de5\u4e1a\u8fc7\u7a0b\u63a7\u5236\u4f18\u5316\u63a8\u8350\u8fdb\u884c\u53ef\u89e3\u91ca\u6027\u5206\u6790\uff0c\u518d\u901a\u8fc7\u5927\u8bed\u8a00\u6a21\u578b\u751f\u6210\u81ea\u7136\u8bed\u8a00\u89e3\u91ca\u3002\u5728\u9ad8\u538b\u8f8a\u78e8\u673a\uff08HPGR\uff09\u4f18\u5316\u95ee\u9898\u4e0a\uff0c\u4e0eKernelSHAP\u76f8\u6bd4\u5b9e\u73b0\u8d8540\u500d\u52a0\u901f\uff0c\u540c\u65f6\u4fdd\u6301\u9ad8\u5ea6\u4e00\u81f4\u7684\u5f52\u56e0\u7ed3\u679c\uff08\u76f8\u5173\u6027\u003e0.99\uff09\uff0c\u652f\u6301\u5b9e\u65f6\u89e3\u91ca\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Most existing approaches to AI-Generated Text Detection (AIGTD) treat documents as static objects and base their decisions on aggregate statistics or globally compressed embeddings. However, this perspective overlooks the inherently dynamic nature of autoregressive generation, where content evolves progressively through the latent space. In this paper, we reformulate AIGTD as the problem of distinguishing between latent generation trajectories. Instead of relying on static representations, we model how textual representations evolve across the sequence. To this end, we propose Geometric Trajectory and Contrastive Learning (GTCL), a framework that segments the document into ordered local units, encodes each unit in an embedding space, and constructs a structured and sequence-level representation. GTCL then applies contrastive learning to these trajectories to learn geometric regularities associated with the autoregressive generation. Evaluations performed on three different benchmarks and several approaches show that GTCL outperforms detection baselines consistently, which implies that explicitly modeling sequential dynamics provides robust discriminative signals across models and domains. These results suggest that modeling trajectory differences could improve detection and open up a dynamic direction that has been underexplored in previous AIGTD literature.", "arxiv_id": "2607.14967", "arxiv_url": "https://arxiv.org/abs/2607.14967", "authors": ["Gianluca Bonifazi", "Christopher Buratti", "Michele Marchetti", "Federica Parlapiano", "Giulia Quaglieri", "Davide Traini", "Domenico Ursino", "Luca Virgili"], "brief": "\u73b0\u6709AI\u751f\u6210\u6587\u672c\u68c0\u6d4b\u65b9\u6cd5\u5c06\u6587\u6863\u89c6\u4e3a\u9759\u6001\u5bf9\u8c61\uff0c\u5ffd\u7565\u4e86\u81ea\u56de\u5f52\u751f\u6210\u7684\u52a8\u6001\u7279\u6027\u3002\u672c\u6587\u63d0\u51faGTCL\u6846\u67b6\uff0c\u5c06\u68c0\u6d4b\u95ee\u9898\u91cd\u65b0\u5b9a\u4e49\u4e3a\u533a\u5206\u6f5c\u5728\u751f\u6210\u8f68\u8ff9\uff0c\u901a\u8fc7\u5bf9\u6587\u6863\u5206\u6bb5\u7f16\u7801\u5e76\u6784\u5efa\u5e8f\u5217\u7ea7\u8868\u793a\uff0c\u7ed3\u5408\u5bf9\u6bd4\u5b66\u4e60\u6355\u6349\u81ea\u56de\u5f52\u751f\u6210\u7684\u51e0\u4f55\u89c4\u5f8b\u3002\u5728\u4e09\u4e2a\u57fa\u51c6\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0cGTCL\u6301\u7eed\u4f18\u4e8e\u73b0\u6709\u68c0\u6d4b\u57fa\u7ebf\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14967", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["AI\u751f\u6210\u6587\u672c\u68c0\u6d4b", "\u5bf9\u6bd4\u5b66\u4e60", "\u5e8f\u5217\u5efa\u6a21", "\u6587\u672c\u8868\u793a"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14967v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Latent Trajectory Discrimination for AI-Generated Text Detection", "tldr": "\u73b0\u6709AI\u751f\u6210\u6587\u672c\u68c0\u6d4b\u65b9\u6cd5\u5c06\u6587\u6863\u89c6\u4e3a\u9759\u6001\u5bf9\u8c61\uff0c\u5ffd\u7565\u4e86\u81ea\u56de\u5f52\u751f\u6210\u7684\u52a8\u6001\u7279\u6027\u3002\u672c\u6587\u63d0\u51faGTCL\u6846\u67b6\uff0c\u5c06\u68c0\u6d4b\u95ee\u9898\u91cd\u65b0\u5b9a\u4e49\u4e3a\u533a\u5206\u6f5c\u5728\u751f\u6210\u8f68\u8ff9\uff0c\u901a\u8fc7\u5bf9\u6587\u6863\u5206\u6bb5\u7f16\u7801\u5e76\u6784\u5efa\u5e8f\u5217\u7ea7\u8868\u793a\uff0c\u7ed3\u5408\u5bf9\u6bd4\u5b66\u4e60\u6355\u6349\u81ea\u56de\u5f52\u751f\u6210\u7684\u51e0\u4f55\u89c4\u5f8b\u3002\u5728\u4e09\u4e2a\u57fa\u51c6\u4e0a\u7684\u5b9e\u9a8c\u8868\u660e\uff0cGTCL\u6301\u7eed\u4f18\u4e8e\u73b0\u6709\u68c0\u6d4b\u57fa\u7ebf\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Text-to-image (T2I) models can synthesize realistic, prompt-aligned images, yet samples generated for the same prompt often cover only a small subset of visually distinct modes. This limits the diversity of images, and for person-centric prompts, can reflect or amplify demographic skew. We formalize this problem as coverage of a predefined set of semantically specified modes, which we call target-mode coverage. We then propose multi-axis max@K, a group-based reinforcement learning objective for improving such coverage in diffusion-based T2I models. Given a group of samples and one score per target category, multi-axis max@K first takes the maximum score across samples for each category and then sums these category-wise maxima. The resulting credit assignment gives a sample positive weight on a category only when it increases that category\u0027s group-wise maximum, allowing different samples to contribute to different categories. We first validate the credit-assignment mechanism on a synthetic mixture and on SD3.5-M using deterministic pixel-based color rewards. We then evaluate the same objective on perceived-appearance fairness. Across three automatic evaluators on held-out prompts, multi-axis max@K improves the Fairness Score by 0.23-0.36 relative to the base model, while maintaining image quality and text alignment.", "arxiv_id": "2607.14962", "arxiv_url": "https://arxiv.org/abs/2607.14962", "authors": ["Ku Onoda", "Paavo Parmas", "Hiroki Furuta", "Soichiro Nishimori", "Yuta Oshima", "Shohei Taniguchi", "Yutaka Matsuo"], "brief": "\u9488\u5bf9\u6587\u672c\u751f\u6210\u56fe\u50cf\u6a21\u578b\u8f93\u51fa\u591a\u6837\u6027\u4e0d\u8db3\uff08\u5c24\u5176\u662f\u4eba\u7269\u4eba\u53e3\u7edf\u8ba1\u504f\u5dee\uff09\u95ee\u9898\uff0c\u63d0\u51fa\u591a\u8f74Max@K\u5f3a\u5316\u5b66\u4e60\u76ee\u6807\u51fd\u6570\uff1a\u5bf9\u4e00\u7ec4\u751f\u6210\u6837\u672c\uff0c\u6309\u76ee\u6807\u7c7b\u522b\u53d6\u6700\u5927\u5206\u6570\u540e\u6c42\u548c\uff0c\u4f7f\u4e0d\u540c\u6837\u672c\u8986\u76d6\u4e0d\u540c\u7c7b\u522b\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u56fe\u50cf\u8d28\u91cf\u548c\u6587\u672c\u5bf9\u9f50\u7684\u540c\u65f6\uff0c\u516c\u5e73\u6027\u5206\u6570\u63d0\u53470.23-0.36\u3002", "categories": ["cs.LG", "cs.AI", "cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14962", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u6587\u672c\u751f\u6210\u56fe\u50cf", "\u5f3a\u5316\u5b66\u4e60", "\u591a\u6837\u6027", "\u6269\u6563\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14962v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Multi-Axis Max@K Reinforcement Learning for Representative Diversity in Text-to-Image Generation", "tldr": "\u9488\u5bf9\u6587\u672c\u751f\u6210\u56fe\u50cf\u6a21\u578b\u8f93\u51fa\u591a\u6837\u6027\u4e0d\u8db3\uff08\u5c24\u5176\u662f\u4eba\u7269\u4eba\u53e3\u7edf\u8ba1\u504f\u5dee\uff09\u95ee\u9898\uff0c\u63d0\u51fa\u591a\u8f74Max@K\u5f3a\u5316\u5b66\u4e60\u76ee\u6807\u51fd\u6570\uff1a\u5bf9\u4e00\u7ec4\u751f\u6210\u6837\u672c\uff0c\u6309\u76ee\u6807\u7c7b\u522b\u53d6\u6700\u5927\u5206\u6570\u540e\u6c42\u548c\uff0c\u4f7f\u4e0d\u540c\u6837\u672c\u8986\u76d6\u4e0d\u540c\u7c7b\u522b\u3002\u5b9e\u9a8c\u8868\u660e\u8be5\u65b9\u6cd5\u5728\u4fdd\u6301\u56fe\u50cf\u8d28\u91cf\u548c\u6587\u672c\u5bf9\u9f50\u7684\u540c\u65f6\uff0c\u516c\u5e73\u6027\u5206\u6570\u63d0\u53470.23-0.36\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Online firestorms are rapid collective escalations of highly negative user-generated content and may cause substantial reputational and economic damage. Existing detectors usually work with volume signals, sentiment scores, or predefined linguistic features. Such signals are useful, but they capture contextual meaning shifts in evolving discussion threads only indirectly. This paper proposes an LLM-based detection system with two operating modes. The first mode classifies complete Reddit threads retrospectively by combining local chunk-level assessments into a thread-level judgment. The second mode processes threads sequentially and issues early warnings when a sliding window exceeds calibrated thresholds. In this mode, the language model estimates three firestorm indicators: negativity share, escalation level, and contributor count. On a balanced Reddit dataset, the global mode achieves strong classification performance, while the early warning mode reaches high recall and detects escalating threads after only a small number of comments and distinct contributors. The results indicate that LLMs can be used not only for static judgment tasks, but also as repeated estimators in context-aware monitoring of social media discourse.", "arxiv_id": "2607.14957", "arxiv_url": "https://arxiv.org/abs/2607.14957", "authors": ["Besim Shala", "Peter Mandl", "Andreas Humpe", "Martin H\u00e4usl"], "brief": "\u63d0\u51fa\u57fa\u4e8eLLM\u7684\u5728\u7ebf\u8206\u8bba\u98ce\u66b4\u65e9\u671f\u68c0\u6d4b\u7cfb\u7edf\uff0c\u652f\u6301\u5b8c\u6574\u5e16\u5b50\u56de\u987e\u5206\u7c7b\u548c\u6ed1\u52a8\u7a97\u53e3\u5b9e\u65f6\u9884\u8b66\u4e24\u79cd\u6a21\u5f0f\u3002\u5728Reddit\u6570\u636e\u96c6\u4e0a\uff0c\u7cfb\u7edf\u4ec5\u9700\u5c11\u91cf\u8bc4\u8bba\u5373\u53ef\u68c0\u6d4b\u5230\u5347\u7ea7\u8d8b\u52bf\uff0c\u5c55\u793a\u4e86LLM\u4f5c\u4e3a\u793e\u4ea4\u5a92\u4f53\u52a8\u6001\u76d1\u63a7\u5de5\u5177\u7684\u6f5c\u529b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14957", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u8206\u60c5\u76d1\u63a7", "\u793e\u4ea4\u5a92\u4f53", "\u65e9\u671f\u9884\u8b66"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14957v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Contextualized Early Detection of Online Firestorms: A Sequential LLM-Based Approach", "tldr": "\u63d0\u51fa\u57fa\u4e8eLLM\u7684\u5728\u7ebf\u8206\u8bba\u98ce\u66b4\u65e9\u671f\u68c0\u6d4b\u7cfb\u7edf\uff0c\u652f\u6301\u5b8c\u6574\u5e16\u5b50\u56de\u987e\u5206\u7c7b\u548c\u6ed1\u52a8\u7a97\u53e3\u5b9e\u65f6\u9884\u8b66\u4e24\u79cd\u6a21\u5f0f\u3002\u5728Reddit\u6570\u636e\u96c6\u4e0a\uff0c\u7cfb\u7edf\u4ec5\u9700\u5c11\u91cf\u8bc4\u8bba\u5373\u53ef\u68c0\u6d4b\u5230\u5347\u7ea7\u8d8b\u52bf\uff0c\u5c55\u793a\u4e86LLM\u4f5c\u4e3a\u793e\u4ea4\u5a92\u4f53\u52a8\u6001\u76d1\u63a7\u5de5\u5177\u7684\u6f5c\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Recent foundation models (FMs) for zero-shot reconstruction of dynamical systems (DS) achieve strong out-of-domain generalization but provide little insight into the mechanisms that underlie their forecasts. Such an understanding could help to strip down overladen FM architectures to their bare essence and expose the minimal requirements for in-context learning in the DS domain. Toward this goal, here we iteratively reduce a recent powerful SOTA model for DS reconstruction, DynaMix (Hemmer \u0026 Durstewitz, 2025), to a minimal interpretable two-parameter form, which we call DynaBase. DynaBase produces forecasts through a linear blend of the current latent state and the nearest in-context neighbor and its temporal successor. Surprisingly, despite its extreme simplicity, DynaBase produces highly competitive zero-shot DS reconstructions across chaotic and cyclic systems, with a negligible parameter load, many orders of magnitude below that of other FMs. Even more, this extreme simplicity permits direct model optimization on DS reconstruction measures, as well as closed-form one-step analytical solutions on prediction MSE. Theoretical and empirical analysis of DynaBase further leads to a 1-parameter family of maps, with the context-parroting algorithm of (Zhang \u0026 Gilpin, 2026) recovered at one end, and chaotic (divergent but bounded) behavior at the other. We further show how different training strategies lead to models either optimal for short-term prediction or for DS reconstruction. Thus, DynaBase not only exposes the minimal mechanisms required for producing zero-shot DS reconstruction, but also reconciles within an accessible mathematical frame divergent observations in the literature.", "arxiv_id": "2607.14937", "arxiv_url": "https://arxiv.org/abs/2607.14937", "authors": ["Christoph J\u00fcrgen Hemmer", "Florian Plaswig", "Daniel Durstewitz"], "brief": "\u672c\u6587\u5c06\u6700\u5148\u8fdb\u7684\u52a8\u529b\u7cfb\u7edf\u96f6\u6837\u672c\u91cd\u5efa\u57fa\u7840\u6a21\u578bDynaMix\u7b80\u5316\u4e3a\u4ec5\u542b\u4e24\u4e2a\u53c2\u6570\u7684\u6781\u7b80\u53ef\u89e3\u91ca\u67b6\u6784DynaBase\uff0c\u5176\u9884\u6d4b\u673a\u5236\u4e3a\u5f53\u524d\u6f5c\u5728\u72b6\u6001\u4e0e\u6700\u8fd1\u4e0a\u4e0b\u6587\u90bb\u5c45\u7684\u7ebf\u6027\u6df7\u5408\u3002\u5c3d\u7ba1\u6781\u5ea6\u7b80\u6d01\uff0cDynaBase\u5728\u6df7\u6c8c\u548c\u5468\u671f\u7cfb\u7edf\u4e0a\u4ecd\u5177\u6709\u9ad8\u5ea6\u7ade\u4e89\u529b\u7684\u91cd\u5efa\u6027\u80fd\uff0c\u53c2\u6570\u91cf\u6bd4\u5176\u4ed6\u57fa\u7840\u6a21\u578b\u5c11\u6570\u4e2a\u6570\u91cf\u7ea7\uff0c\u5e76\u652f\u6301\u95ed\u5408\u89e3\u6790\u4f18\u5316\u3002", "categories": ["cs.LG", "cs.AI", "math.DS", "nlin.CD"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14937", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u52a8\u529b\u7cfb\u7edf", "\u96f6\u6837\u672c\u5b66\u4e60", "\u4e0a\u4e0b\u6587\u5b66\u4e60", "\u53ef\u89e3\u91ca\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14937v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "A Minimal Interpretable Architecture for Zero-Shot Reconstruction of Dynamical Systems", "tldr": "\u672c\u6587\u5c06\u6700\u5148\u8fdb\u7684\u52a8\u529b\u7cfb\u7edf\u96f6\u6837\u672c\u91cd\u5efa\u57fa\u7840\u6a21\u578bDynaMix\u7b80\u5316\u4e3a\u4ec5\u542b\u4e24\u4e2a\u53c2\u6570\u7684\u6781\u7b80\u53ef\u89e3\u91ca\u67b6\u6784DynaBase\uff0c\u5176\u9884\u6d4b\u673a\u5236\u4e3a\u5f53\u524d\u6f5c\u5728\u72b6\u6001\u4e0e\u6700\u8fd1\u4e0a\u4e0b\u6587\u90bb\u5c45\u7684\u7ebf\u6027\u6df7\u5408\u3002\u5c3d\u7ba1\u6781\u5ea6\u7b80\u6d01\uff0cDynaBase\u5728\u6df7\u6c8c\u548c\u5468\u671f\u7cfb\u7edf\u4e0a\u4ecd\u5177\u6709\u9ad8\u5ea6\u7ade\u4e89\u529b\u7684\u91cd\u5efa\u6027\u80fd\uff0c\u53c2\u6570\u91cf\u6bd4\u5176\u4ed6\u57fa\u7840\u6a21\u578b\u5c11\u6570\u4e2a\u6570\u91cf\u7ea7\uff0c\u5e76\u652f\u6301\u95ed\u5408\u89e3\u6790\u4f18\u5316\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Synthetic face datasets have become effective enough to train face recognition models with accuracy rivaling that of models trained on real photographs. This progress sidesteps the ethical and legal burdens of collecting real biometric data, yet evaluation has not kept pace. Even studies that train entirely on synthetic images still rely on real-face benchmarks to measure performance, leaving the privacy problem only half solved. We ask whether synthetic datasets can replace real benchmarks for face recognition evaluation. We test 12 synthetic datasets against 7 established real benchmarks using 24 pre-trained models that span both convolutional and transformer architectures. Our evaluation covers biometric verification metrics, similarity score distributions, cross-model ranking consistency, and the underlying distributional properties of each dataset. Benchmarking fidelity varies widely across the synthetic candidates, but the two strongest, MorphFace and Vec2Face, reproduce the relative behavior of real benchmarks and reach agreement levels that fall within the natural disagreement already observed among the real benchmarks themselves. These results establish that well-constructed synthetic datasets can support reliable comparative evaluation for face recognition, moving the field closer to a fully synthetic and privacy-preserving pipeline for both training and benchmarking.", "arxiv_id": "2607.14932", "arxiv_url": "https://arxiv.org/abs/2607.14932", "authors": ["Pawe\u0142 Borsukiewicz", "Daniele Lunghi", "Wendk\u00fbuni C. Ou\u00e9draogo", "Jacques Klein", "Tegawend\u00e9 F. Bissyand\u00e9"], "brief": "\u7814\u7a76\u63a2\u8ba8\u5408\u6210\u4eba\u8138\u6570\u636e\u96c6\u80fd\u5426\u66ff\u4ee3\u771f\u5b9e\u4eba\u8138\u57fa\u51c6\u7528\u4e8e\u4eba\u8138\u8bc6\u522b\u8bc4\u4f30\uff0c\u901a\u8fc7\u5bf912\u4e2a\u5408\u6210\u6570\u636e\u96c6\u30017\u4e2a\u771f\u5b9e\u57fa\u51c6\u548c24\u4e2a\u9884\u8bad\u7ec3\u6a21\u578b\u7684\u7cfb\u7edf\u6d4b\u8bd5\uff0c\u53d1\u73b0MorphFace\u548cVec2Face\u4e24\u4e2a\u5408\u6210\u6570\u636e\u96c6\u80fd\u591f\u53ef\u9760\u590d\u73b0\u771f\u5b9e\u57fa\u51c6\u7684\u76f8\u5bf9\u6392\u540d\u884c\u4e3a\uff0c\u4e3a\u6784\u5efa\u5b8c\u5168\u5408\u6210\u4e14\u9690\u79c1\u4fdd\u62a4\u7684\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u6d41\u7a0b\u5960\u5b9a\u57fa\u7840\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14932", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u4eba\u8138\u8bc6\u522b", "\u5408\u6210\u6570\u636e", "\u9690\u79c1\u4fdd\u62a4", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14932v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Benchmarking Face Recognition without Real Faces", "tldr": "\u7814\u7a76\u63a2\u8ba8\u5408\u6210\u4eba\u8138\u6570\u636e\u96c6\u80fd\u5426\u66ff\u4ee3\u771f\u5b9e\u4eba\u8138\u57fa\u51c6\u7528\u4e8e\u4eba\u8138\u8bc6\u522b\u8bc4\u4f30\uff0c\u901a\u8fc7\u5bf912\u4e2a\u5408\u6210\u6570\u636e\u96c6\u30017\u4e2a\u771f\u5b9e\u57fa\u51c6\u548c24\u4e2a\u9884\u8bad\u7ec3\u6a21\u578b\u7684\u7cfb\u7edf\u6d4b\u8bd5\uff0c\u53d1\u73b0MorphFace\u548cVec2Face\u4e24\u4e2a\u5408\u6210\u6570\u636e\u96c6\u80fd\u591f\u53ef\u9760\u590d\u73b0\u771f\u5b9e\u57fa\u51c6\u7684\u76f8\u5bf9\u6392\u540d\u884c\u4e3a\uff0c\u4e3a\u6784\u5efa\u5b8c\u5168\u5408\u6210\u4e14\u9690\u79c1\u4fdd\u62a4\u7684\u8bad\u7ec3\u4e0e\u8bc4\u4f30\u6d41\u7a0b\u5960\u5b9a\u57fa\u7840\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Machine learning models are increasingly adapted in various domains. However, adversarial examples pose a significant threat to the reliable deployment of these models. In recent years, some powerful adversarial example attacks have been proposed for the fast and query-efficient generation of adversarial examples, even in black-box scenarios, highlighting the need for scalable, low-cost, and powerful defenses. In this work, we present two contributions to the domain of black-box adversarial example attacks and defenses. First, we propose Random Logit Scaling (RLS), a randomization-based defense against black-box score-based adversarial example attacks. RLS is a plug-and-play, post-processing defense that can be implemented on top of any existing ML model with minimal effort. The idea behind RLS is to confuse an attacker by outputting falsified scores resulting from randomly scaled logits while maintaining the model accuracy. We show that RLS significantly reduces the success rate of state-of-the-art black-box score-based attacks while preserving the accuracy and minimizing confidence score distortion compared to state-of-the-art randomization-based defenses. Second, we introduce a novel adaptive attack against AAA, a SOTA non-randomized black-box defense against black-box score-based attacks that also modifies output logits to confuse attackers, demonstrating its vulnerability against adaptive attacks.", "arxiv_id": "2607.14921", "arxiv_url": "https://arxiv.org/abs/2607.14921", "authors": ["Hamid Dashtbani", "Mehdi Dousti Gandomani", "AmirMahdi Sadeghzadeh"], "brief": "\u63d0\u51fa\u968f\u673aLogit\u7f29\u653e\uff08RLS\uff09\u9632\u5fa1\u65b9\u6cd5\uff0c\u901a\u8fc7\u5bf9\u8f93\u51falogit\u8fdb\u884c\u968f\u673a\u7f29\u653e\u6765\u6df7\u6dc6\u9ed1\u76d2\u8bc4\u5206\u578b\u5bf9\u6297\u653b\u51fb\uff0c\u5728\u4fdd\u6301\u6a21\u578b\u51c6\u786e\u7387\u7684\u540c\u65f6\u663e\u8457\u964d\u4f4e\u653b\u51fb\u6210\u529f\u7387\uff1b\u540c\u65f6\u63ed\u793a\u4e86\u73b0\u6709\u9632\u5fa1\u65b9\u6cd5AAA\u5bf9\u81ea\u9002\u5e94\u653b\u51fb\u7684\u8106\u5f31\u6027\u3002", "categories": ["cs.LG", "cs.AI", "cs.CR"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14921", "impact_score": 6, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5bf9\u6297\u6837\u672c", "\u9ed1\u76d2\u653b\u51fb", "\u6df1\u5ea6\u795e\u7ecf\u7f51\u7edc", "\u9632\u5fa1\u673a\u5236"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14921v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Random Logit Scaling: Defending Deep Neural Networks Against Black-Box Score-Based Adversarial Example Attacks", "tldr": "\u63d0\u51fa\u968f\u673aLogit\u7f29\u653e\uff08RLS\uff09\u9632\u5fa1\u65b9\u6cd5\uff0c\u901a\u8fc7\u5bf9\u8f93\u51falogit\u8fdb\u884c\u968f\u673a\u7f29\u653e\u6765\u6df7\u6dc6\u9ed1\u76d2\u8bc4\u5206\u578b\u5bf9\u6297\u653b\u51fb\uff0c\u5728\u4fdd\u6301\u6a21\u578b\u51c6\u786e\u7387\u7684\u540c\u65f6\u663e\u8457\u964d\u4f4e\u653b\u51fb\u6210\u529f\u7387\uff1b\u540c\u65f6\u63ed\u793a\u4e86\u73b0\u6709\u9632\u5fa1\u65b9\u6cd5AAA\u5bf9\u81ea\u9002\u5e94\u653b\u51fb\u7684\u8106\u5f31\u6027\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Given the current trend to employ large language models (LLMs) in almost any imaginable context, LLM-generated text detection and authorship attribution have become a pressing issue. Prior work has primarily focused on surface-level linguistic features, an approach shown to be susceptible to paraphrasing and other obfuscation techniques. In this paper, we go beyond the linguistic surface, extracting and analysing reasoning structures in LLM-generated texts with the goal of capturing more complex signals of LLM authorship. We propose a graph neural network approach that leverages reasoning graphs extracted by an argument mining pipeline, demonstrating improved robustness and generalisation over a traditional Longformer baseline. Our approach outperforms the baseline by up to 27 percentage points under the obfuscation attacks such as paraphrasing and backtranslation, and 19 percentage points when evaluated on the texts generated by the unseen model versions, simulating real-world conditions in which new LLM versions are continuously released.", "arxiv_id": "2607.14905", "arxiv_url": "https://arxiv.org/abs/2607.14905", "authors": ["Zlata Kikteva", "Artur Romazanov", "Annette Hautli-Janisz", "Ramon Ruiz-Dolz"], "brief": "\u9488\u5bf9LLM\u751f\u6210\u6587\u672c\u7684\u4f5c\u8005\u5f52\u56e0\u95ee\u9898\uff0c\u672c\u6587\u63d0\u51fa\u57fa\u4e8e\u63a8\u7406\u56fe\u7ed3\u6784\u7684\u56fe\u795e\u7ecf\u7f51\u7edc\u65b9\u6cd5\uff0c\u901a\u8fc7\u8bba\u8bc1\u6316\u6398\u7ba1\u9053\u63d0\u53d6\u6587\u672c\u7684\u63a8\u7406\u7ed3\u6784\u800c\u975e\u8868\u9762\u8bed\u8a00\u7279\u5f81\u3002\u5728\u5bf9\u6297\u6539\u5199\u3001\u56de\u8bd1\u7b49\u6df7\u6dc6\u653b\u51fb\u65f6\uff0c\u6bd4Longformer\u57fa\u7ebf\u9ad8\u51fa\u6700\u591a27\u4e2a\u767e\u5206\u70b9\uff0c\u5728\u672a\u89c1\u6a21\u578b\u7248\u672c\u4e0a\u4e5f\u9ad8\u51fa19\u4e2a\u767e\u5206\u70b9\u3002", "categories": ["cs.CL", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14905", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u4f5c\u8005\u5f52\u56e0", "\u56fe\u795e\u7ecf\u7f51\u7edc", "\u6587\u672c\u68c0\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14905v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Show Me How You Reason and I\u0027ll Tell You Who You Are: Reasoning Graphs for Robust LLM Authorship Attribution", "tldr": "\u9488\u5bf9LLM\u751f\u6210\u6587\u672c\u7684\u4f5c\u8005\u5f52\u56e0\u95ee\u9898\uff0c\u672c\u6587\u63d0\u51fa\u57fa\u4e8e\u63a8\u7406\u56fe\u7ed3\u6784\u7684\u56fe\u795e\u7ecf\u7f51\u7edc\u65b9\u6cd5\uff0c\u901a\u8fc7\u8bba\u8bc1\u6316\u6398\u7ba1\u9053\u63d0\u53d6\u6587\u672c\u7684\u63a8\u7406\u7ed3\u6784\u800c\u975e\u8868\u9762\u8bed\u8a00\u7279\u5f81\u3002\u5728\u5bf9\u6297\u6539\u5199\u3001\u56de\u8bd1\u7b49\u6df7\u6dc6\u653b\u51fb\u65f6\uff0c\u6bd4Longformer\u57fa\u7ebf\u9ad8\u51fa\u6700\u591a27\u4e2a\u767e\u5206\u70b9\uff0c\u5728\u672a\u89c1\u6a21\u578b\u7248\u672c\u4e0a\u4e5f\u9ad8\u51fa19\u4e2a\u767e\u5206\u70b9\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Real-time video generation demands fast decoding as much as fast denoising, yet current latent video diffusion models rely on 3D convolutional decoders that are slow and memory-intensive at high resolutions or for long video. We introduce FlashDecoder, a fast, memory-efficient pure-Transformer video decoder that decodes latents to pixels frame by frame. At each step, the current frame attends only to a fixed-size window of past frames through a rolling KV cache. The fixed temporal window keeps decoding fast and memory bounded regardless of video length, enabling constant-latency streaming. Because frames are processed sequentially, temporal causality is enforced without explicit attention masks, enabling training at resolutions up to 1080p and matching the reconstruction quality of convolutional decoders. On the Wan2.1 and Wan2.2 latent spaces, FlashDecoder matches each convolutional decoder in reconstruction quality (e.g., 41.55dB vs. 41.49dB PSNR at 1080p) while decoding 3.6x-4.7x faster with up to 11x less memory on a single H100 GPU. With architecture-aware inference optimizations, the speedup widens to 12x.", "arxiv_id": "2607.14898", "arxiv_url": "https://arxiv.org/abs/2607.14898", "authors": ["Minguk Kang", "Suha Kwak"], "brief": "FlashDecoder\u662f\u4e00\u79cd\u7eafTransformer\u67b6\u6784\u7684\u89c6\u9891\u89e3\u7801\u5668\uff0c\u901a\u8fc7\u6eda\u52a8KV\u7f13\u5b58\u5b9e\u73b0\u9010\u5e27\u6d41\u5f0f\u89e3\u7801\uff0c\u89e3\u51b3\u4e863D\u5377\u79ef\u89e3\u7801\u5668\u5728\u9ad8\u5206\u8fa8\u7387\u957f\u89c6\u9891\u4e2d\u901f\u5ea6\u6162\u3001\u5185\u5b58\u5360\u7528\u5927\u7684\u95ee\u9898\u3002\u5728Wan2.1/2.2\u6f5c\u7a7a\u95f4\u4e0a\uff0cFlashDecoder\u4ee5\u6700\u9ad811\u500d\u66f4\u5c11\u7684\u5185\u5b58\u5b9e\u73b03.6-4.7\u500d\u52a0\u901f\uff0c\u63a8\u7406\u4f18\u5316\u540e\u53ef\u8fbe12\u500d\u52a0\u901f\uff0c\u540c\u65f6\u4fdd\u6301\u4e0e\u5377\u79ef\u89e3\u7801\u5668\u76f8\u5f53\u7684\u91cd\u5efa\u8d28\u91cf\uff081080p\u4e0bPSNR 41.55dB vs 41.49dB\uff09\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14898", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u89c6\u9891\u751f\u6210", "\u6269\u6563\u6a21\u578b", "Transformer", "\u5b9e\u65f6\u89e3\u7801"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14898v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "FlashDecoder: Real-Time Latent-to-Pixel Streaming Decoder with Transformers", "tldr": "FlashDecoder\u662f\u4e00\u79cd\u7eafTransformer\u67b6\u6784\u7684\u89c6\u9891\u89e3\u7801\u5668\uff0c\u901a\u8fc7\u6eda\u52a8KV\u7f13\u5b58\u5b9e\u73b0\u9010\u5e27\u6d41\u5f0f\u89e3\u7801\uff0c\u89e3\u51b3\u4e863D\u5377\u79ef\u89e3\u7801\u5668\u5728\u9ad8\u5206\u8fa8\u7387\u957f\u89c6\u9891\u4e2d\u901f\u5ea6\u6162\u3001\u5185\u5b58\u5360\u7528\u5927\u7684\u95ee\u9898\u3002\u5728Wan2.1/2.2\u6f5c\u7a7a\u95f4\u4e0a\uff0cFlashDecoder\u4ee5\u6700\u9ad811\u500d\u66f4\u5c11\u7684\u5185\u5b58\u5b9e\u73b03.6-4.7\u500d\u52a0\u901f\uff0c\u63a8\u7406\u4f18\u5316\u540e\u53ef\u8fbe12\u500d\u52a0\u901f\uff0c\u540c\u65f6\u4fdd\u6301\u4e0e\u5377\u79ef\u89e3\u7801\u5668\u76f8\u5f53\u7684\u91cd\u5efa\u8d28\u91cf\uff081080p\u4e0bPSNR 41.55dB vs 41.49dB\uff09\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}, {"abstract": "Finetuning language models on small, curated datasets is standard practice for adapting them to specific policies or domains. We show that finetuning on narrow, factually-defensible, moderation-passing data can cause broad ideological shifts across unrelated domains, while preserving general capabilities. Training GPT-4.1 on right- or left-leaning economics Q\u0026A yields matched ideological shifts on topics such as criminal justice, the environment, and cultural taste. The same effect appears with plausibly-deployed datasets such as workplace HR policy and practical finance queries, as well as on a science-pseudoscience axis where food-safety finetuning increases sycophantic agreement with users expressing false health beliefs. We call this phenomenon ideological generalisation and propose a methodology to measure two properties: breadth, how far the shift reaches across topics absent from training, and amplification, how much finetuning intensifies the shift relative to few-shot prompting on the same examples. We show that few-shot prompting indicates the direction of generalisation but finetuning pushes the model to further extremes, including to far out-of-distribution outputs such as endorsements of race-IQ connections and political violence. The effect replicates on Gemma-3, holds under judge-free evaluations and external benchmarks, survives mixing with generic data, and leaves GSM8K accuracy within $\\pm 1$pp of the baseline.", "arxiv_id": "2607.14888", "arxiv_url": "https://arxiv.org/abs/2607.14888", "authors": ["Robert Graham", "Edward Stevinson", "Yariv Barsheshat"], "brief": "\u5728\u5c0f\u89c4\u6a21\u3001\u770b\u4f3c\u65e0\u5bb3\u7684\u6570\u636e\u96c6\u4e0a\u5fae\u8c03\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u4f1a\u5bfc\u81f4\u6a21\u578b\u5728\u4e0e\u8bad\u7ec3\u65e0\u5173\u7684\u5e7f\u6cdb\u9886\u57df\u4ea7\u751f\u610f\u8bc6\u5f62\u6001\u504f\u79fb\uff08\u5982\u7528\u7ecf\u6d4e\u5b66Q\u0026A\u5fae\u8c03\u540e\uff0c\u6a21\u578b\u5728\u5211\u4e8b\u53f8\u6cd5\u3001\u73af\u5883\u7b49\u8bdd\u9898\u4e0a\u4e5f\u51fa\u73b0\u540c\u5411\u504f\u79fb\uff09\u3002\u7814\u7a76\u8005\u5c06\u6b64\u73b0\u8c61\u79f0\u4e3a\"\u610f\u8bc6\u5f62\u6001\u6cdb\u5316\"\uff0c\u5e76\u53d1\u73b0\u5fae\u8c03\u6bd4\u5c11\u6837\u672c\u63d0\u793a\u66f4\u80fd\u5c06\u6a21\u578b\u63a8\u5411\u6781\u7aef\u7acb\u573a\uff0c\u751a\u81f3\u4ea7\u751f\u652f\u6301\u79cd\u65cf\u667a\u5546\u8bba\u6216\u653f\u6cbb\u66b4\u529b\u7b49\u5371\u9669\u8f93\u51fa\u3002\u8be5\u6548\u5e94\u5728GPT-4.1\u548cGemma-3\u4e0a\u5747\u53ef\u590d\u73b0\uff0c\u4e14\u4e0d\u5f71\u54cd\u901a\u7528\u80fd\u529b\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL", "cs.CY"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14888", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": [], "keywords": ["\u5927\u8bed\u8a00\u6a21\u578b", "\u5fae\u8c03\u5b89\u5168", "\u610f\u8bc6\u5f62\u6001\u504f\u89c1", "\u5bf9\u9f50"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14888v1", "published_at": "2026-07-16", "score": 0.0, "selected_reasons": [], "thumbnail": null, "title": "Innocuous-Seeming Data, Latent Ideology: Ideological Generalisation in Finetuned LLMs", "tldr": "\u5728\u5c0f\u89c4\u6a21\u3001\u770b\u4f3c\u65e0\u5bb3\u7684\u6570\u636e\u96c6\u4e0a\u5fae\u8c03\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u4f1a\u5bfc\u81f4\u6a21\u578b\u5728\u4e0e\u8bad\u7ec3\u65e0\u5173\u7684\u5e7f\u6cdb\u9886\u57df\u4ea7\u751f\u610f\u8bc6\u5f62\u6001\u504f\u79fb\uff08\u5982\u7528\u7ecf\u6d4e\u5b66Q\u0026A\u5fae\u8c03\u540e\uff0c\u6a21\u578b\u5728\u5211\u4e8b\u53f8\u6cd5\u3001\u73af\u5883\u7b49\u8bdd\u9898\u4e0a\u4e5f\u51fa\u73b0\u540c\u5411\u504f\u79fb\uff09\u3002\u7814\u7a76\u8005\u5c06\u6b64\u73b0\u8c61\u79f0\u4e3a\"\u610f\u8bc6\u5f62\u6001\u6cdb\u5316\"\uff0c\u5e76\u53d1\u73b0\u5fae\u8c03\u6bd4\u5c11\u6837\u672c\u63d0\u793a\u66f4\u80fd\u5c06\u6a21\u578b\u63a8\u5411\u6781\u7aef\u7acb\u573a\uff0c\u751a\u81f3\u4ea7\u751f\u652f\u6301\u79cd\u65cf\u667a\u5546\u8bba\u6216\u653f\u6cbb\u66b4\u529b\u7b49\u5371\u9669\u8f93\u51fa\u3002\u8be5\u6548\u5e94\u5728GPT-4.1\u548cGemma-3\u4e0a\u5747\u53ef\u590d\u73b0\uff0c\u4e14\u4e0d\u5f71\u54cd\u901a\u7528\u80fd\u529b\u3002", "upvotes": 0, "what_it_is": null, "why_notable": null}];
let state = { category:"ALL", keyword:"ALL", sort:"score", q:"" };

// ---- 统计 + 长尾过滤 ----
function counted(field){
  const m = {};
  PAPERS.forEach(p => (p[field]||[]).forEach(v => { m[v]=(m[v]||0)+1; }));
  return m;
}
function topKeys(map, {min=1, limit=99}={}){
  return Object.entries(map).filter(([,c])=>c>=min).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([k])=>k);
}

function renderTabRow(elId, items, counts, dim, cls){
  const el = document.getElementById(elId);
  const cur = state[dim];
  const mk = (val,label,n)=>`<span class="tab ${cls} ${val===cur?'active':''}" data-dim="${dim}" data-val="${val}">${label}${n!=null?` (${n})`:''}</span>`;
  el.innerHTML = mk("ALL","全部",PAPERS.length) + items.map(v=>mk(v,v,counts[v])).join("");
  el.querySelectorAll(".tab").forEach(t=>{
    t.onclick = ()=>{ state[t.dataset.dim]=t.dataset.val; renderTabs(); render(); };
  });
}
function renderTabs(){
  const catCounts = counted("categories");
  const kwCounts = counted("keywords");
  // 分类：长尾隐藏（出现>=3次的，最多12个）
  const cats = topKeys(catCounts, {min:3, limit:12});
  // 关键词：长尾隐藏（出现>=2次的，最多18个）
  const kws = topKeys(kwCounts, {min:2, limit:18});
  renderTabRow("catTabs", cats, catCounts, "category", "cat");
  renderTabRow("kwTabs", kws, kwCounts, "keyword", "kw");
}

function matchFilter(p){
  if (state.category!=="ALL" && !(p.categories||[]).includes(state.category)) return false;
  if (state.keyword!=="ALL" && !(p.keywords||[]).includes(state.keyword)) return false;
  if (state.q){
    const q = state.q.toLowerCase();
    const hay = [p.title, p.brief, p.abstract, p.what_it_is, p.why_notable, (p.authors||[]).join(" "), (p.keywords||[]).join(" ")].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function sortPapers(arr){
  const s = state.sort;
  return arr.slice().sort((a,b)=>{
    if (s==="upvotes") return (b.upvotes||0)-(a.upvotes||0);
    if (s==="date") return (b.published_at||"").localeCompare(a.published_at||"");
    return (b.score||0)-(a.score||0);
  });
}

function metaBlock(p){
  const authors = (p.authors||[]).slice(0,4).join(", ") + ((p.authors||[]).length>4 ? ` 等 ${p.authors.length} 人` : "");
  const cats = (p.categories||[]).map(c=>`<span>${c}</span>`).join("");
  const kws = (p.keywords||[]).map(k=>`<span>${k}</span>`).join("");
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HF</a>` : "";
  const links = `<div class="links"><a onclick="openModal('${p.arxiv_id}')">🔍 详情</a><a href="${p.arxiv_url}" target="_blank">arXiv</a>${hf}<a href="${p.pdf_url}" target="_blank">PDF</a>${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}</div>`;
  return `
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at}${p.organization?` ｜ 🏛 ${p.organization}`:""}</div>
    <div class="tags">${cats}</div>
    ${kws?`<div class="kws">${kws}</div>`:""}
    <div class="stats">👍 <b>${p.upvotes}</b> ｜ ⭐ <b>${p.github_stars}</b> ｜ 分 <b>${p.score}</b>${p.impact_score!=null?` ｜ 影响力 <b>${p.impact_score}/10</b>`:""}</div>
    ${links}`;
}

function topCard(p, idx){
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  return `<div class="card top" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="badge">TOP</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    ${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
    ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
    ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}
    ${metaBlock(p)}
  </div>`;
}
function restCard(p, idx){
  const summary = p.tldr || p.brief || "（暂无中文总结）";
  const thumb = p.thumbnail ? `<img class="thumb" src="${p.thumbnail}" loading="lazy" onerror="this.style.display='none'"/>` : "";
  return `<div class="card" onclick="cardClick(event,'${p.arxiv_id}')">
    <h3><span class="rank">#${idx}</span><span class="title-link">${p.title}</span></h3>
    ${thumb}
    <div class="summary">${summary}</div>
    ${metaBlock(p)}
  </div>`;
}

function render(){
  const filtered = sortPapers(PAPERS.filter(matchFilter));
  const grid = document.getElementById("grid");
  grid.innerHTML = filtered.length
    ? filtered.map((p,i)=> p.is_top ? topCard(p,i+1) : restCard(p,i+1)).join("")
    : `<div class="empty">该筛选条件下暂无论文</div>`;
  const nTop = filtered.filter(p=>p.is_top).length;
  document.getElementById("metaLine").textContent = `当前显示 ${filtered.length} 篇（前 ${nTop} 篇为精选四段式，其余为中文总结）`;
}

document.getElementById("sortSel").onchange = e=>{ state.sort=e.target.value; render(); };
document.getElementById("search").oninput = e=>{ state.q=e.target.value; render(); };

// ---- 详情弹窗：原始英文摘要 + PDF 预览 ----
const BY_ID = {};
PAPERS.forEach(p => { BY_ID[p.arxiv_id] = p; });

// 点卡片任意空白处打开详情；点到链接(a)则不弹窗，走链接本身
function cardClick(e, id){
  if (e.target.closest("a")) return;
  openModal(id);
}

function openModal(id){
  const p = BY_ID[id];
  if (!p) return;
  const authors = (p.authors||[]).slice(0,10).join(", ") + ((p.authors||[]).length>10 ? ` 等 ${p.authors.length} 人` : "");
  const kp = (p.key_points||[]).map(k=>`<li>${k}</li>`).join("");
  let four = "";
  if (p.what_it_is || kp || p.why_notable){
    four = `${p.what_it_is?`<div class="sec"><b>① 核心内容</b>${p.what_it_is}</div>`:""}
      ${kp?`<div class="sec"><b>② 关键技术/数据</b><ul>${kp}</ul></div>`:""}
      ${p.why_notable?`<div class="sec"><b>③ 为何值得关注</b>${p.why_notable}</div>`:""}`;
  } else if (p.tldr){
    four = `<div class="summary">${p.tldr}</div>`;
  }
  const hf = p.on_hf ? `<a href="${p.hf_url}" target="_blank">HuggingFace</a>` : "";
  document.getElementById("modalContent").innerHTML = `
    <h2>${p.title}</h2>
    <div class="row">👤 ${authors}</div>
    <div class="row">📅 ${p.published_at||""}${p.organization?` ｜ 🏛 ${p.organization}`:""} ｜ ${(p.categories||[]).join(", ")}</div>
    ${four}
    <div class="lbl">Abstract（原始英文摘要）</div>
    <div class="abs">${p.abstract || "（无摘要）"}</div>
    <div class="lbl">PDF 预览</div>
    <div class="pdfwrap"><iframe src="${p.pdf_url}" loading="lazy"></iframe></div>
    <div class="pdfhint">若预览空白（部分来源禁止内嵌），点下方「在新标签打开 PDF」。</div>
    <div class="links" style="margin-top:12px;">
      <a href="${p.arxiv_url}" target="_blank">arXiv 页面</a>${hf}
      <a href="${p.pdf_url}" target="_blank">在新标签打开 PDF</a>
      ${p.github_repo?`<a href="${p.github_repo}" target="_blank">GitHub</a>`:""}
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  document.getElementById("modalContent").innerHTML = "";  // 停止 PDF 加载
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

renderTabs(); render();
</script>
</body>
</html>
