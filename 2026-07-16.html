663e\u77ed\u677f"], "keywords": ["\u667a\u80fd\u4f53", "\u57fa\u51c6\u8bc4\u6d4b", "\u5927\u8bed\u8a00\u6a21\u578b", "\u591a\u573a\u666f"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14989v1", "published_at": "2026-07-16", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "OmniaBench: Benchmarking General AI Agents Across Diverse Scenarios", "tldr": "OmniaBench\uff1a\u8986\u76d690\u4e2a\u4e00\u7ea7\u9886\u57df\u7684\u901a\u7528AI\u667a\u80fd\u4f53\u7efc\u5408\u8bc4\u6d4b\u57fa\u51c6", "upvotes": 0, "what_it_is": "\u63d0\u51faOmniaBench\uff0c\u4e00\u4e2a\u9762\u5411\u901a\u7528AI\u667a\u80fd\u4f53\u7684\u591a\u573a\u666f\u8bc4\u6d4b\u57fa\u51c6\uff0c\u901a\u8fc7\u5e94\u7528\u5546\u5e97\u3001\u4ea7\u54c1\u6587\u6863\u7b49\u6765\u6e90\u6784\u5efa\u5c42\u7ea7\u5206\u7c7b\u4f53\u7cfb\uff0c\u6db5\u76d6ToC/ToB/ToE\u5171354\u4e2a\u4e8c\u7ea7\u9886\u57df\uff0c\u5305\u542b1431\u4e2a\u53ef\u6267\u884c\u4efb\u52a1\uff0c\u652f\u6301\u7ec6\u7c92\u5ea6\u80fd\u529b\u5206\u6790\u3002", "why_notable": "\u73b0\u6709\u667a\u80fd\u4f53\u57fa\u51c6\u573a\u666f\u5355\u4e00\u3001\u5de5\u5177\u751f\u6001\u53d7\u9650\uff0cOmniaBench\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u8de8\u5f02\u6784\u5e94\u7528\u573a\u666f\u8bc4\u6d4b\u901a\u7528\u667a\u80fd\u4f53\uff0c\u63ed\u793a\u4e86\u524d\u6cbf\u6a21\u578b\u7684\u80fd\u529b\u8fb9\u754c\uff0c\u4e3a\u667a\u80fd\u4f53\u7814\u7a76\u63d0\u4f9b\u4e86\u5e7f\u8986\u76d6\u3001\u53ef\u8bca\u65ad\u7684\u8bc4\u6d4b\u5e73\u53f0\u3002"}, {"abstract": "Action supervision in vision-language-action (VLA) models is often treated as a downstream objective for learning action prediction. In this paper, we study it instead as a force that shapes inherited multimodal representations. We show that this shaping has a dual effect: it is necessary for forming action-compatible representations, but when action supervision is applied too directly to the inherited multimodal pathway, it can also destabilize representations that support language-side processing and object grounding. To address this tension, we introduce Action QFormer, a query-based action-facing interface that uses instruction-conditioned queries to reorganize inherited multimodal information into action-facing representations before downstream action generation. In zero-shot sim-to-real navigation, Action QFormer improves average closed-loop task success from 18.8% to 56.3%, raises fixed-instruction action-generation correctness from 22.5% to 75.5%, and nearly eliminates out-of-distribution instruction generations. Further analyses show that Action QFormer changes how action supervision shapes inherited multimodal representations, reducing broad upstream rewriting while preserving targeted and sometimes constructive action-supervised adaptation. These results suggest that improving VLA performance requires not only stronger pretrained backbones, but also better ways of selecting and organizing inherited multimodal information while controlling how it is shaped under action supervision.", "arxiv_id": "2607.14635", "arxiv_url": "https://arxiv.org/abs/2607.14635", "authors": ["Yufeng Ji", "Wenhao Tang", "Haoyi Niu", "Koushil Sreenath", "Yi Wu", "Zhongyu Li"], "brief": "\u63d0\u51faAction QFormer\uff0c\u4e00\u79cd\u57fa\u4e8e\u67e5\u8be2\u7684\u52a8\u4f5c\u63a5\u53e3\u6a21\u5757\uff0c\u5c06\u6307\u4ee4\u6761\u4ef6\u5316\u67e5\u8be2\u63d2\u5165\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u4e2d\uff0c\u5728\u52a8\u4f5c\u751f\u6210\u524d\u5c06\u7ee7\u627f\u7684\u591a\u6a21\u6001\u4fe1\u606f\u91cd\u7ec4\u4e3a\u52a8\u4f5c\u53cb\u597d\u8868\u793a\uff0c\u907f\u514d\u52a8\u4f5c\u76d1\u7763\u76f4\u63a5\u7834\u574f\u8bed\u8a00\u4fa7\u8868\u793a\u3002", "categories": ["cs.AI", "cs.CV", "cs.RO"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14635", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u96f6\u6837\u672csim-to-real\u5bfc\u822a\u4e2d\uff0c\u5e73\u5747\u95ed\u73af\u4efb\u52a1\u6210\u529f\u7387\u4ece18.8%\u63d0\u5347\u81f356.3%", "\u56fa\u5b9a\u6307\u4ee4\u52a8\u4f5c\u751f\u6210\u6b63\u786e\u7387\u4ece22.5%\u63d0\u5347\u81f375.5%\uff0c\u5e76\u51e0\u4e4e\u6d88\u9664\u5206\u5e03\u5916\u6307\u4ee4\u751f\u6210\u95ee\u9898", "\u63ed\u793a\u52a8\u4f5c\u76d1\u7763\u7684\u53cc\u91cd\u6548\u5e94\uff1a\u65e2\u80fd\u5f62\u6210\u52a8\u4f5c\u517c\u5bb9\u8868\u793a\uff0c\u53c8\u53ef\u80fd\u7834\u574f\u8bed\u8a00\u4fa7\u5904\u7406\u4e0e\u76ee\u6807\u5b9a\u4f4d\u80fd\u529b"], "keywords": ["\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b", "\u591a\u6a21\u6001", "\u673a\u5668\u4eba\u5bfc\u822a", "\u8868\u793a\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14635v1", "published_at": "2026-07-16", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Action QFormer: Structured Representation Shaping under Action Supervision in Vision-Language-Action Models", "tldr": "Action QFormer\u901a\u8fc7\u67e5\u8be2\u63a5\u53e3\u91cd\u7ec4\u591a\u6a21\u6001\u8868\u793a\uff0c\u5927\u5e45\u63d0\u5347VLA\u6a21\u578b\u96f6\u6837\u672c\u5bfc\u822a\u6210\u529f\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faAction QFormer\uff0c\u4e00\u79cd\u57fa\u4e8e\u67e5\u8be2\u7684\u52a8\u4f5c\u63a5\u53e3\u6a21\u5757\uff0c\u5c06\u6307\u4ee4\u6761\u4ef6\u5316\u67e5\u8be2\u63d2\u5165\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u4e2d\uff0c\u5728\u52a8\u4f5c\u751f\u6210\u524d\u5c06\u7ee7\u627f\u7684\u591a\u6a21\u6001\u4fe1\u606f\u91cd\u7ec4\u4e3a\u52a8\u4f5c\u53cb\u597d\u8868\u793a\uff0c\u907f\u514d\u52a8\u4f5c\u76d1\u7763\u76f4\u63a5\u7834\u574f\u8bed\u8a00\u4fa7\u8868\u793a\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u7814\u7a76\u52a8\u4f5c\u76d1\u7763\u5bf9VLA\u6a21\u578b\u591a\u6a21\u6001\u8868\u793a\u7684\u5851\u9020\u673a\u5236\uff0c\u63d0\u51fa\u8f7b\u91cf\u7ea7\u63a5\u53e3\u6a21\u5757\u5373\u5b9e\u73b0\u663e\u8457\u6027\u80fd\u8dc3\u5347\uff0c\u4e3aVLA\u6a21\u578b\u8bbe\u8ba1\u63d0\u4f9b\u65b0\u8303\u5f0f\uff1a\u4e0d\u4ec5\u9700\u8981\u66f4\u5f3a\u7684\u9884\u8bad\u7ec3\u9aa8\u5e72\uff0c\u8fd8\u9700\u66f4\u597d\u5730\u63a7\u5236\u8868\u793a\u88ab\u52a8\u4f5c\u76d1\u7763\u5851\u9020\u7684\u65b9\u5f0f\u3002"}, {"abstract": "Reinforcement learning with verifiable rewards (RLVR) commonly uses entropy for advantage shaping. However, entropy cannot distinguish useful uncertainty from detrimental confusion, limiting its effectiveness as a correctness signal. We propose Contrastive Policy Optimization (CPO), which uses token-level contrastive disagreement between reference-guided and vanilla generation distributions for correctness-aware advantage shaping. Both theoretical and empirical results show that this disagreement reliably indicates token-level correctness. We further show that On-policy Distillation is a special case of CPO, where the posterior distribution is instantiated by an external teacher model. CPO also resolves the zero-advantage problem. Experiments on in-domain and out-of-domain benchmarks demonstrate that CPO substantially outperforms entropy-based RLVR methods while maintaining strong generalization. Further analysis shows that correct and incorrect responses naturally support exploration and exploitation respectively, and balancing both leads to the best performance.", "arxiv_id": "2607.14614", "arxiv_url": "https://arxiv.org/abs/2607.14614", "authors": ["Weiwen Xu", "Jia Liu", "Hou Pong Chan", "Long Li", "Deng Cai", "Min Chen", "Hao Zhang"], "brief": "\u63d0\u51faContrastive Policy Optimization\uff08CPO\uff09\uff0c\u901a\u8fc7\u53c2\u8003\u5f15\u5bfc\u5206\u5e03\u4e0e\u666e\u901a\u751f\u6210\u5206\u5e03\u4e4b\u95f4\u7684token\u7ea7\u5bf9\u6bd4\u5206\u6b67\u6765\u8861\u91cf\u6b63\u786e\u6027\uff0c\u66ff\u4ee3\u4f20\u7edfRLVR\u4e2d\u57fa\u4e8e\u71b5\u7684\u4f18\u52bf\u5851\u5f62\u65b9\u6cd5\uff0c\u540c\u65f6\u89e3\u51b3\u4e86\u96f6\u4f18\u52bf\u95ee\u9898\u3002", "categories": ["cs.LG", "cs.AI", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14614", "impact_score": 8, "is_agent": false, "is_top": true, "key_points": ["\u71b5\u65e0\u6cd5\u533a\u5206\u6709\u76ca\u4e0d\u786e\u5b9a\u6027\u4e0e\u6709\u5bb3\u6df7\u4e71\uff0cCPO\u7528token\u7ea7\u5bf9\u6bd4\u5206\u6b67\u4f5c\u4e3a\u6b63\u786e\u6027\u4fe1\u53f7", "\u7406\u8bba\u4e0e\u5b9e\u9a8c\u5747\u8bc1\u660e\u5bf9\u6bd4\u5206\u6b67\u80fd\u53ef\u9760\u6307\u793atoken\u7ea7\u6b63\u786e\u6027\uff1bOn-policy\u84b8\u998f\u662fCPO\u7684\u7279\u4f8b", "\u5728\u57df\u5185\u548c\u57df\u5916\u57fa\u51c6\u4e0a\u5747\u663e\u8457\u4f18\u4e8e\u57fa\u4e8e\u71b5\u7684RLVR\u65b9\u6cd5\uff0c\u6cdb\u5316\u6027\u5f3a"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u7b56\u7565\u4f18\u5316", "\u63a8\u7406"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14614v1", "published_at": "2026-07-16", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Beyond Entropy: Correctness-Aware Advantage Shaping via Contrastive Policy Optimization", "tldr": "\u63d0\u51fa\u5bf9\u6bd4\u7b56\u7565\u4f18\u5316CPO\uff0c\u7528token\u7ea7\u5bf9\u6bd4\u5206\u6b67\u66ff\u4ee3\u71b5\u8fdb\u884c\u6b63\u786e\u6027\u611f\u77e5\u7684\u4f18\u52bf\u5851\u5f62", "upvotes": 0, "what_it_is": "\u63d0\u51faContrastive Policy Optimization\uff08CPO\uff09\uff0c\u901a\u8fc7\u53c2\u8003\u5f15\u5bfc\u5206\u5e03\u4e0e\u666e\u901a\u751f\u6210\u5206\u5e03\u4e4b\u95f4\u7684token\u7ea7\u5bf9\u6bd4\u5206\u6b67\u6765\u8861\u91cf\u6b63\u786e\u6027\uff0c\u66ff\u4ee3\u4f20\u7edfRLVR\u4e2d\u57fa\u4e8e\u71b5\u7684\u4f18\u52bf\u5851\u5f62\u65b9\u6cd5\uff0c\u540c\u65f6\u89e3\u51b3\u4e86\u96f6\u4f18\u52bf\u95ee\u9898\u3002", "why_notable": "\u4ece\u6839\u672c\u4e0a\u6539\u8fdb\u4e86RLVR\u4e2d\u4f18\u52bf\u5851\u5f62\u7684\u4fe1\u53f7\u8d28\u91cf\uff0c\u7edf\u4e00\u4e86\u5bf9\u6bd4\u4f18\u5316\u4e0e\u7b56\u7565\u84b8\u998f\u6846\u67b6\uff0c\u5bf9LLM\u63a8\u7406\u80fd\u529b\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c"}, {"abstract": "Diffusion Multimodal Large Language Models (DMLLMs) are highly effective for multimodal reasoning, yet their inference efficiency is significantly hindered by fixed-length generation constraints. Since the actual output length is unknown, output sequences are padded to a predefined maximum length, resulting in substantial redundant computation over unnecessary [EOS] tokens. In this work, we discover that DMLLMs implicitly reveal their valid semantic boundary at the very first denoising step through a distinct shift in MLP activation sparsity. Leveraging this observation, we propose Seer, a training-free framework that detects this boundary using a Signal-to-Noise Ratio (SNR)-based criterion and performs one-shot truncation of the redundant suffix for all subsequent computations. To preserve these theoretical gains during batched serving, Seer incorporates a hybrid execution strategy that maximizes throughput while seamlessly accommodating dynamic sequence lengths. Experimental results demonstrate that Seer effectively eliminates padding waste, accelerating throughput by up to $\\sim$31$\\times$. Across 9 benchmarks, Seer robustly maintains overall performance and even improves accuracy on complex visual tasks by mitigating noise leakage (e.g., DocVQA score increases from 63.52 to 63.66), offering a highly efficient, plug-and-play solution for DMLLM acceleration.", "arxiv_id": "2607.14557", "arxiv_url": "https://arxiv.org/abs/2607.14557", "authors": ["Qicheng Zhao", "Qi Sun", "Zheyu Yan"], "brief": "\u63d0\u51faSeer\u6846\u67b6\uff0c\u53d1\u73b0\u6269\u6563\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08DMLLM\uff09\u5728\u7b2c\u4e00\u6b65\u53bb\u566a\u65f6MLP\u6fc0\u6d3b\u7a00\u758f\u6027\u4f1a\u53d1\u751f\u663e\u8457\u53d8\u5316\uff0c\u53ef\u636e\u6b64\u9884\u6d4b\u6709\u6548\u8f93\u51fa\u957f\u5ea6\uff0c\u4ece\u800c\u4e00\u6b21\u6027\u622a\u65ad\u5197\u4f59\u7684[EOS]\u586b\u5145token\uff0c\u6d88\u9664\u56fa\u5b9a\u957f\u5ea6\u751f\u6210\u5e26\u6765\u7684\u65e0\u6548\u8ba1\u7b97\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14557", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u5173\u952e\u53d1\u73b0\uff1aDMLLM\u5728\u7b2c\u4e00\u6b65\u53bb\u566a\u65f6MLP\u6fc0\u6d3b\u7a00\u758f\u6027\u51fa\u73b0\u660e\u663e\u8df3\u53d8\uff0c\u53ef\u4f5c\u4e3a\u6709\u6548\u8bed\u4e49\u8fb9\u754c\u7684\u4fe1\u53f7", "\u6280\u672f\u65b9\u6848\uff1a\u57fa\u4e8e\u4fe1\u566a\u6bd4\uff08SNR\uff09\u51c6\u5219\u68c0\u6d4b\u8fb9\u754c\uff0c\u5bf9\u540e\u7eed\u6240\u6709\u6b65\u9aa4\u8fdb\u884c\u4e00\u6b21\u6027\u622a\u65ad\uff08one-shot truncation\uff09\uff0c\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3", "\u5b9e\u9a8c\u6548\u679c\uff1a\u541e\u5410\u91cf\u6700\u9ad8\u63d0\u5347\u7ea631\u500d\uff0c\u57289\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\u6574\u4f53\u6027\u80fd\u4fdd\u6301\uff0cDocVQA\u7b49\u590d\u6742\u89c6\u89c9\u4efb\u52a1\u51c6\u786e\u7387\u751a\u81f3\u7565\u6709\u63d0\u5347"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u591a\u6a21\u6001\u5927\u6a21\u578b", "\u63a8\u7406\u52a0\u901f", "\u7a00\u758f\u6027"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14557v1", "published_at": "2026-07-16", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Seeing the End at Step Zero: Accelerating Diffusion MLLMs via MLP Sparsity-Aware Truncation", "tldr": "\u5229\u7528MLP\u6fc0\u6d3b\u7a00\u758f\u6027\u5728\u7b2c\u4e00\u6b65\u53bb\u566a\u65f6\u68c0\u6d4b\u6709\u6548\u5e8f\u5217\u8fb9\u754c\uff0c\u514d\u8bad\u7ec3\u52a0\u901f\u6269\u6563\u591a\u6a21\u6001\u5927\u6a21\u578b\u63a8\u7406", "upvotes": 0, "what_it_is": "\u63d0\u51faSeer\u6846\u67b6\uff0c\u53d1\u73b0\u6269\u6563\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff08DMLLM\uff09\u5728\u7b2c\u4e00\u6b65\u53bb\u566a\u65f6MLP\u6fc0\u6d3b\u7a00\u758f\u6027\u4f1a\u53d1\u751f\u663e\u8457\u53d8\u5316\uff0c\u53ef\u636e\u6b64\u9884\u6d4b\u6709\u6548\u8f93\u51fa\u957f\u5ea6\uff0c\u4ece\u800c\u4e00\u6b21\u6027\u622a\u65ad\u5197\u4f59\u7684[EOS]\u586b\u5145token\uff0c\u6d88\u9664\u56fa\u5b9a\u957f\u5ea6\u751f\u6210\u5e26\u6765\u7684\u65e0\u6548\u8ba1\u7b97\u3002", "why_notable": "\u9996\u6b21\u63ed\u793a\u6269\u6563MLLMs\u5728\u7b2c\u4e00\u6b65\u5373\u9690\u542b\u8f93\u51fa\u957f\u5ea6\u4fe1\u606f\u8fd9\u4e00\u89c4\u5f8b\uff0c\u63d0\u51fa\u514d\u8bad\u7ec3\u3001\u5373\u63d2\u5373\u7528\u7684\u52a0\u901f\u65b9\u6848\uff0c31\u500d\u541e\u5410\u91cf\u63d0\u5347\u6781\u5177\u5b9e\u7528\u4ef7\u503c\uff0c\u5bf9DMLLM\u90e8\u7f72\u6548\u7387\u6709\u91cd\u8981\u63a8\u52a8\u4f5c\u7528\u3002"}, {"abstract": "Existing GPU kernel generation benchmarks draw problems from synthetic or curated sources that diverge from deployed workloads. We present Atrex-Bench, a benchmark whose 30 operators and 440 shapes are sampled directly from full-cluster production inference traces of compute-limited, memory-rich GPUs. Each problem carries an importance weight derived from its share of observed GPU time, weighted by application card-hours and computed separately for the serving phases in which it runs, together with a per-problem roofline ceiling, so the aggregate score emphasizes the kernels that consume the most serving time. Evaluating six frontier coding agents on Atrex-Bench shows that even the best vanilla model reaches only ${\\sim}10\\%$ of the hardware roofline on production operators; and correctness alone overstates capability, since much of the apparent pass rate comes from PyTorch fallbacks rather than kernels the model wrote. To close this gap, we co-release Atrex-Kernel-Agent (AKA), a profile-driven kernel-optimization agent that combines iterative measure-revise search, optimization dropout for escaping stalled search contexts, and a layered GPU-optimization knowledge base (298 reference-kernel files and 244 optimization-knowledge documents, plus external upstream reference projects for API/ISA lookup). In a controlled case study, the agent converts zero-FlyDSL fallbacks into real kernels that match or exceed hand-tuned production baselines.", "arxiv_id": "2607.14541", "arxiv_url": "https://arxiv.org/abs/2607.14541", "authors": ["Lingyun Yang", "Yuxiao Wang", "Shenghao Liang", "Linfeng Yang", "Daocheng Ying", "Chunbo You", "Rui Zhang", "Luping Wang", "Yinghao Yu", "Guodong Yang", "Liping Zhang"], "brief": "\u6784\u5efa\u4e86\u57fa\u4e8e\u771f\u5b9e\u751f\u4ea7\u63a8\u7406\u8ffd\u8e2a\u7684GPU\u5185\u6838\u751f\u6210\u57fa\u51c6Atrex-Bench\uff0830\u4e2a\u7b97\u5b50\u3001440\u79cd\u5f62\u72b6\uff09\uff0c\u5e76\u914d\u5957\u53d1\u5e03\u4e86profile\u9a71\u52a8\u7684\u5185\u6838\u4f18\u5316\u667a\u80fd\u4f53AKA\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u751f\u6210GPU\u5185\u6838\u7684\u751f\u4ea7\u5c31\u7eea\u7a0b\u5ea6\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14541", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": ["\u6700\u4f18\u524d\u6cbf\u7f16\u7801\u667a\u80fd\u4f53\u5728\u751f\u4ea7\u7b97\u5b50\u4e0a\u4ec5\u80fd\u8fbe\u5230\u786c\u4ef6roofline\u6027\u80fd\u4e0a\u9650\u7684\u7ea610%\uff0c\u8fdc\u672a\u8fbe\u5230\u751f\u4ea7\u53ef\u7528\u6c34\u5e73", "\u6b63\u786e\u7387\u6307\u6807\u5b58\u5728\u865a\u9ad8\u95ee\u9898\uff1a\u5927\u91cf\u901a\u8fc7\u7387\u6765\u81eaPyTorch\u56de\u9000\u800c\u975e\u6a21\u578b\u771f\u6b63\u751f\u6210\u7684\u5185\u6838", "AKA\u667a\u80fd\u4f53\u7ed3\u5408\u8fed\u4ee3\u6d4b\u91cf-\u4fee\u6b63\u641c\u7d22\u3001\u4f18\u5316dropout\u9003\u8131\u641c\u7d22\u505c\u6ede\uff0c\u4ee5\u53ca\u5305\u542b298\u4e2a\u53c2\u8003\u5185\u6838\u548c244\u4efd\u4f18\u5316\u77e5\u8bc6\u6587\u6863\u7684\u5206\u5c42\u77e5\u8bc6\u5e93\uff0c\u80fd\u5c06\u56de\u9000\u8f6c\u5316\u4e3a\u8d85\u8d8a\u624b\u5de5\u8c03\u4f18\u57fa\u7ebf\u7684\u771f\u5b9e\u5185\u6838"], "keywords": ["\u4ee3\u7801\u751f\u6210", "GPU\u4f18\u5316", "\u667a\u80fd\u4f53", "\u57fa\u51c6\u6d4b\u8bd5"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14541v1", "published_at": "2026-07-16", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Are LLM-Generated GPU Kernels Production-Ready? A Trace-Driven Benchmark and Optimization Agent", "tldr": "\u63d0\u51fa\u751f\u4ea7\u7ea7GPU\u5185\u6838\u57fa\u51c6Atrex-Bench\uff0c\u63ed\u793aLLM\u751f\u6210\u5185\u6838\u8ddd\u5b9e\u9645\u90e8\u7f72\u4ecd\u6709\u5de8\u5927\u5dee\u8ddd", "upvotes": 0, "what_it_is": "\u6784\u5efa\u4e86\u57fa\u4e8e\u771f\u5b9e\u751f\u4ea7\u63a8\u7406\u8ffd\u8e2a\u7684GPU\u5185\u6838\u751f\u6210\u57fa\u51c6Atrex-Bench\uff0830\u4e2a\u7b97\u5b50\u3001440\u79cd\u5f62\u72b6\uff09\uff0c\u5e76\u914d\u5957\u53d1\u5e03\u4e86profile\u9a71\u52a8\u7684\u5185\u6838\u4f18\u5316\u667a\u80fd\u4f53AKA\uff0c\u7cfb\u7edf\u8bc4\u4f30LLM\u751f\u6210GPU\u5185\u6838\u7684\u751f\u4ea7\u5c31\u7eea\u7a0b\u5ea6\u3002", "why_notable": "\u9996\u4e2a\u57fa\u4e8e\u771f\u5b9e\u751f\u4ea7\u63a8\u7406\u8ffd\u8e2a\u6784\u5efa\u7684GPU\u5185\u6838\u57fa\u51c6\uff0c\u63ed\u793a\u4e86\u5b66\u672f\u8bc4\u6d4b\u4e0e\u5de5\u4e1a\u90e8\u7f72\u4e4b\u95f4\u7684\u663e\u8457\u9e3f\u6c9f\uff0c\u5bf9LLM\u4ee3\u7801\u751f\u6210\u80fd\u529b\u8bc4\u4f30\u548cGPU\u5185\u6838\u81ea\u52a8\u4f18\u5316\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c"}, {"abstract": "While reinforcement learning with verifiable rewards (RLVR) is widely used to improve the reasoning capabilities of large language models (LLMs), the generalizability of the resulting models remains poorly understood. In this work, we establish the first non-vacuous generalization bounds for parameter-efficient RLVR fine-tuning at the billion-parameter scale. Our approach adapts PAC-Bayes compression bounds to this setting, and addresses the inherent stochasticity of token generation by applying the Gumbel-max reparameterization trick. To operationalize these bounds, we propose the Progressive RLVR framework, which integrates RLVR with on-policy distillation, TinyLoRA, and model quantization. Progressive RLVR empirically retains 84-97% performance of standard LoRA fine-tuning while producing models that are 14,796x more compressible. We show that this framework yields non-vacuous generalization bounds in four domains: mathematical problem-solving, programming, general-knowledge reasoning, and Text-to-SQL. Our bounds exceed the accuracy of the base model by 9-51% and lie within 6-11% of the accuracy of the fine-tuned models.", "arxiv_id": "2607.14506", "arxiv_url": "https://arxiv.org/abs/2607.14506", "authors": ["Yuxuan Zhu", "Rohan Alur", "Daniel Kang"], "brief": "\u672c\u6587\u5c06PAC-Bayes\u538b\u7f29\u754c\u9002\u914d\u5230\u53ef\u9a8c\u8bc1\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\uff08RLVR\uff09\u573a\u666f\uff0c\u7ed3\u5408Gumbel-max\u91cd\u53c2\u6570\u5316\u5904\u7406token\u751f\u6210\u7684\u968f\u673a\u6027\uff0c\u63d0\u51faProgressive RLVR\u6846\u67b6\uff0c\u9996\u6b21\u5728\u5341\u4ebf\u53c2\u6570\u89c4\u6a21\u4e0a\u5efa\u7acb\u975e\u7a7a\uff08non-vacuous\uff09\u6cdb\u5316\u754c\u3002", "categories": ["cs.LG", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14506", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51faProgressive RLVR\u6846\u67b6\uff0c\u878d\u5408\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u3001TinyLoRA\u548c\u6a21\u578b\u91cf\u5316\uff0c\u4f7f\u6a21\u578b\u538b\u7f29\u7387\u8fbe14,796\u500d\uff0c\u540c\u65f6\u4fdd\u7559\u6807\u51c6LoRA\u5fae\u8c0384-97%\u7684\u6027\u80fd", "\u5728\u6570\u5b66\u63a8\u7406\u3001\u7f16\u7a0b\u3001\u901a\u8bc6\u63a8\u7406\u3001Text-to-SQL\u56db\u4e2a\u9886\u57df\u5747\u83b7\u5f97\u975e\u7a7a\u6cdb\u5316\u754c\uff0c\u754c\u503c\u8d85\u8fc7\u57fa\u7840\u6a21\u578b\u7cbe\u5ea69-51%\uff0c\u4e0e\u5fae\u8c03\u6a21\u578b\u7cbe\u5ea6\u5dee\u8ddd\u4ec56-11%", "\u91c7\u7528Gumbel-max\u91cd\u53c2\u6570\u5316\u6280\u5de7\u89e3\u51b3\u81ea\u56de\u5f52token\u751f\u6210\u7684\u56fa\u6709\u968f\u673a\u6027\uff0c\u4f7fPAC-Bayes\u6846\u67b6\u53ef\u5e94\u7528\u4e8eLLM\u5fae\u8c03\u573a\u666f"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6cdb\u5316\u7406\u8bba", "\u53c2\u6570\u9ad8\u6548\u5fae\u8c03"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14506v1", "published_at": "2026-07-16", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "Non-vacuous Generalization Bounds for Reinforcement Learning with Verifiable Rewards", "tldr": "\u9996\u6b21\u4e3a\u5341\u4ebf\u53c2\u6570\u7ea7RLVR\u5fae\u8c03\u5efa\u7acb\u975e\u7a7a\u6cdb\u5316\u754c\uff0c\u63d0\u51faProgressive RLVR\u6846\u67b6", "upvotes": 0, "what_it_is": "\u672c\u6587\u5c06PAC-Bayes\u538b\u7f29\u754c\u9002\u914d\u5230\u53ef\u9a8c\u8bc1\u5956\u52b1\u5f3a\u5316\u5b66\u4e60\uff08RLVR\uff09\u573a\u666f\uff0c\u7ed3\u5408Gumbel-max\u91cd\u53c2\u6570\u5316\u5904\u7406token\u751f\u6210\u7684\u968f\u673a\u6027\uff0c\u63d0\u51faProgressive RLVR\u6846\u67b6\uff0c\u9996\u6b21\u5728\u5341\u4ebf\u53c2\u6570\u89c4\u6a21\u4e0a\u5efa\u7acb\u975e\u7a7a\uff08non-vacuous\uff09\u6cdb\u5316\u754c\u3002", "why_notable": "\u9996\u6b21\u5728\u5341\u4ebf\u53c2\u6570\u7ea7LLM\u7684RLVR\u5fae\u8c03\u4e2d\u7ed9\u51fa\u6709\u5b9e\u9645\u610f\u4e49\u7684\u6cdb\u5316\u7406\u8bba\u4fdd\u8bc1\uff0c\u586b\u8865\u4e86RLVR\u53ef\u6cdb\u5316\u6027\u7406\u8bba\u7406\u89e3\u7684\u7a7a\u767d\uff0c\u5bf9\u7406\u89e3\u548c\u6539\u8fdbLLM\u63a8\u7406\u80fd\u529b\u7684\u8bad\u7ec3\u65b9\u6cd5\u5177\u6709\u91cd\u8981\u7406\u8bba\u4e0e\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "A growing gap separates inference context lengths from RL post-training: inference systems are approaching million-token contexts, while post-training workloads often remain at 256K tokens or below and rely on length generalization at deployment. The gap is especially important for AI agents, whose observations, tool outputs, documents, and prior decisions accumulate over long trajectories. LongStraw is an architecture-aware execution stack for million-token RL post-training under a fixed GPU budget, instantiated with Group Relative Policy Optimization (GRPO). It evaluates the shared prompt without autograd, retains only model-specific state needed by later tokens, and replays short response branches one at a time, reducing the live training graph at the cost of additional replay time. We implement it for the hybrid recurrent and full-attention Qwen3.6-27B and the compressed-attention mixture-of-experts GLM-5.2. On eight H20 GPUs, LongStraw completes grouped Qwen scoring and response backward at 2.1M positions for groups of 2 and 8; increasing the group size adds only 0.21 GB of peak allocated memory, while a separate stress test reaches 4.46M positions. On 32 H20 GPUs, we validate the end-to-end LongStraw execution path for a 2.1M-token prompt across all 78 layers of GLM-5.2. These experiments establish execution capacity rather than complete training correctness because the captured prompt state is detached and some distributed forward and gradient composition paths remain incomplete.", "arxiv_id": "2607.14952", "arxiv_url": "https://arxiv.org/abs/2607.14952", "authors": ["Changhai Zhou", "Kieran Liu", "Yuhua Zhou", "Qian Qiao", "Jun Gao", "Harry Zhang", "Irvine Lu", "Nolan Ho", "Lucian Li", "Andrew Lei", "Cleon Cheng", "Steven Chiang", "Yihang Zeng", "Di Zhang", "Rio Yang", "Kaijie Chen", "Andrew Chen", "Pony Ma", "Weizhong Zhang", "Cheng Jin"], "brief": "LongStraw\u662f\u4e00\u4e2a\u9762\u5411\u767e\u4e07\u7ea7token\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u7684\u67b6\u6784\u611f\u77e5\u6267\u884c\u6846\u67b6\uff0c\u57fa\u4e8eGRPO\u7b97\u6cd5\uff0c\u901a\u8fc7\u65e0\u68af\u5ea6\u8bc4\u4f30\u5171\u4eab\u63d0\u793a\u3001\u4ec5\u4fdd\u7559\u5fc5\u8981\u72b6\u6001\u3001\u9010\u4e00\u91cd\u653e\u77ed\u54cd\u5e94\u5206\u652f\u7b49\u7b56\u7565\uff0c\u5728\u56fa\u5b9aGPU\u9884\u7b97\u4e0b\u5927\u5e45\u6269\u5c55RL\u540e\u8bad\u7ec3\u7684\u4e0a\u4e0b\u6587\u957f\u5ea6\u3002", "categories": ["cs.LG", "cs.DC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14952", "impact_score": 8, "is_agent": true, "is_top": false, "key_points": ["\u57288\u5757H20 GPU\u4e0a\u5b8c\u6210210\u4e07\u4f4d\u7f6e\u7684\u5206\u7ec4Qwen\u8bc4\u5206\u4e0e\u54cd\u5e94\u53cd\u5411\u4f20\u64ad\uff0c\u7ec4\u5927\u5c0f\u4ece2\u589e\u81f38\u65f6\u5cf0\u503c\u663e\u5b58\u4ec5\u589e\u52a00.21GB", "\u538b\u529b\u6d4b\u8bd5\u8fbe\u5230446\u4e07token\u4f4d\u7f6e\uff0c\u572832\u5757H20 GPU\u4e0a\u9a8c\u8bc1\u4e86GLM-5.2\u516878\u5c42\u7684\u7aef\u5230\u7aef\u6267\u884c\u8def\u5f84", "\u6838\u5fc3\u6280\u672f\uff1a\u5171\u4eab\u63d0\u793a\u65e0autograd\u8bc4\u4f30 + \u6a21\u578b\u7279\u5b9a\u72b6\u6001\u4fdd\u7559 + \u77ed\u54cd\u5e94\u5206\u652f\u9010\u4e00\u91cd\u653e\uff0c\u4ee5\u989d\u5916\u91cd\u653e\u65f6\u95f4\u6362\u53d6\u663e\u5b58\u8282\u7701"], "keywords": ["\u5f3a\u5316\u5b66\u4e60", "\u957f\u4e0a\u4e0b\u6587", "\u667a\u80fd\u4f53", "\u5927\u6a21\u578b\u8bad\u7ec3"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14952v1", "published_at": "2026-07-16", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "LongStraw: Long-Context RL Beyond 2M Tokens under a Fixed GPU Budget", "tldr": "LongStraw\u5728\u56fa\u5b9aGPU\u9884\u7b97\u4e0b\u5b9e\u73b0\u8d85200\u4e07token\u7684\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\uff0c\u7a81\u7834\u73b0\u6709\u4e0a\u9650", "upvotes": 0, "what_it_is": "LongStraw\u662f\u4e00\u4e2a\u9762\u5411\u767e\u4e07\u7ea7token\u5f3a\u5316\u5b66\u4e60\u540e\u8bad\u7ec3\u7684\u67b6\u6784\u611f\u77e5\u6267\u884c\u6846\u67b6\uff0c\u57fa\u4e8eGRPO\u7b97\u6cd5\uff0c\u901a\u8fc7\u65e0\u68af\u5ea6\u8bc4\u4f30\u5171\u4eab\u63d0\u793a\u3001\u4ec5\u4fdd\u7559\u5fc5\u8981\u72b6\u6001\u3001\u9010\u4e00\u91cd\u653e\u77ed\u54cd\u5e94\u5206\u652f\u7b49\u7b56\u7565\uff0c\u5728\u56fa\u5b9aGPU\u9884\u7b97\u4e0b\u5927\u5e45\u6269\u5c55RL\u540e\u8bad\u7ec3\u7684\u4e0a\u4e0b\u6587\u957f\u5ea6\u3002", "why_notable": "\u63a8\u7406\u7cfb\u7edf\u5df2\u63a5\u8fd1\u767e\u4e07token\u4e0a\u4e0b\u6587\uff0c\u800cRL\u540e\u8bad\u7ec3\u901a\u5e38\u5361\u5728256K\u4ee5\u4e0b\uff0cLongStraw\u586b\u8865\u8fd9\u4e00\u5173\u952e\u9e3f\u6c9f\uff0c\u5bf9\u9700\u8981\u957f\u8f68\u8ff9\u7684AI\u667a\u80fd\u4f53\u8bad\u7ec3\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c"}, {"abstract": "Recent advances in video understanding have spanned motion, long video, and streaming interaction, driving this field toward real-world applications. Despite this progress, current open-source models remain limited in several ways. They often struggle to generalize across diverse video types, making them effective only in specific domains. High computational demands further restrict their efficiency and scalability. Moreover, most models are only partially open, with key components such as training code, strategy, or datasets unavailable, which hinders reproducibility and slows community-driven development. To address these issues, we introduce VideoChat3, a fully open, efficient, and generalist video-centric MLLM. VideoChat3 advances video understanding through two complementary designs. For efficiency, we introduce Inflated 3D Vision Transformer (I3D-ViT) and Adaptive Frame Resolution for Streaming Video Perception, which enables efficient spatiotemporal representation and reduces the cost of processing video inputs during training and inference. For effectiveness, we develop a scalable video data synthesis pipeline that curates three diverse, high-quality training datasets: VideoChat3-Academic2M, VideoChat3-LV116K, and VideoChat3-OL617K, covering general, long-form, and streaming video scenarios, improving the model\u0027s generalization across domains. By integrating these designs, VideoChat3 achieves a rare balance of broad generalization and computational efficiency. Experiments across general, long-form, and streaming benchmarks demonstrate that VideoChat3 surpasses prior open-source models with equal or larger parameter counts with only 4B parameters and higher efficiency.", "arxiv_id": "2607.14935", "arxiv_url": "https://arxiv.org/abs/2607.14935", "authors": ["Xinhao Li", "Yuhan Zhu", "Xiangyu Zeng", "Yuhao Dong", "Haoning Wu", "Zhiqiu Zhang", "Yuandong Yang", "Changlian Ma", "Qingyu Zhang", "Yansong Shi", "Xinyu Chen", "Haoran Chen", "Zizheng Huang", "Jun Zhang", "Kun Ouyang", "Lin Sui", "Ziang Yan", "Yicheng Xu", "Chenting Wang", "Yinan He", "Hongjie Zhang", "Yi Wang", "Yu Qiao", "Yali Wang", "Ziwei Liu", "Kai Chen", "Limin Wang"], "brief": "\u63d0\u51faVideoChat3\uff0c\u4e00\u4e2a\u5b8c\u5168\u5f00\u6e90\u7684\u89c6\u9891\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u81a8\u80c03D\u89c6\u89c9Transformer\uff08I3D-ViT\uff09\u548c\u81ea\u9002\u5e94\u5e27\u5206\u8fa8\u7387\u6280\u672f\u63d0\u5347\u6548\u7387\uff0c\u5e76\u6784\u5efa\u4e09\u4e2a\u9ad8\u8d28\u91cf\u8bad\u7ec3\u6570\u636e\u96c6\u8986\u76d6\u901a\u7528\u3001\u957f\u89c6\u9891\u548c\u6d41\u5f0f\u89c6\u9891\u573a\u666f\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14935", "impact_score": 8, "is_agent": false, "is_top": false, "key_points": ["\u63d0\u51faI3D-ViT\u548c\u81ea\u9002\u5e94\u5e27\u5206\u8fa8\u7387\u6280\u672f\uff0c\u964d\u4f4e\u89c6\u9891\u8bad\u7ec3\u4e0e\u63a8\u7406\u7684\u8ba1\u7b97\u5f00\u9500", "\u6784\u5efa\u4e09\u4e2a\u591a\u6837\u5316\u6570\u636e\u96c6\uff1aVideoChat3-Academic2M\u3001LV116K\u3001OL617K\uff0c\u8986\u76d6\u901a\u7528/\u957f\u89c6\u9891/\u6d41\u5f0f\u89c6\u9891", "\u4ec54B\u53c2\u6570\u5373\u8d85\u8d8a\u540c\u7b49\u6216\u66f4\u5927\u53c2\u6570\u91cf\u7684\u5f00\u6e90\u6a21\u578b\uff0c\u4e14\u8bad\u7ec3\u4ee3\u7801\u3001\u7b56\u7565\u3001\u6570\u636e\u96c6\u5168\u90e8\u5f00\u653e"], "keywords": ["\u591a\u6a21\u6001", "\u89c6\u9891\u7406\u89e3", "\u5927\u8bed\u8a00\u6a21\u578b", "\u5f00\u6e90"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14935v1", "published_at": "2026-07-16", "score": 0.2, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 8/10)"], "thumbnail": null, "title": "VideoChat3: Fully Open Video MLLM for Efficient and Generalist Video Understanding", "tldr": "VideoChat3\uff1a4B\u53c2\u6570\u5168\u5f00\u6e90\u89c6\u9891\u591a\u6a21\u6001\u5927\u6a21\u578b\uff0c\u517c\u987e\u901a\u7528\u6027\u4e0e\u8ba1\u7b97\u6548\u7387", "upvotes": 0, "what_it_is": "\u63d0\u51faVideoChat3\uff0c\u4e00\u4e2a\u5b8c\u5168\u5f00\u6e90\u7684\u89c6\u9891\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\uff0c\u901a\u8fc7\u81a8\u80c03D\u89c6\u89c9Transformer\uff08I3D-ViT\uff09\u548c\u81ea\u9002\u5e94\u5e27\u5206\u8fa8\u7387\u6280\u672f\u63d0\u5347\u6548\u7387\uff0c\u5e76\u6784\u5efa\u4e09\u4e2a\u9ad8\u8d28\u91cf\u8bad\u7ec3\u6570\u636e\u96c6\u8986\u76d6\u901a\u7528\u3001\u957f\u89c6\u9891\u548c\u6d41\u5f0f\u89c6\u9891\u573a\u666f\u3002", "why_notable": "\u5728\u5f00\u6e90\u751f\u6001\u4e2d\u7f55\u89c1\u5730\u5b9e\u73b0\u4e86\u8bad\u7ec3\u4ee3\u7801+\u7b56\u7565+\u6570\u636e\u96c6\u7684\u5b8c\u5168\u5f00\u653e\uff0c\u540c\u65f6\u4ee54B\u5c0f\u53c2\u6570\u91cf\u5728\u901a\u7528\u3001\u957f\u89c6\u9891\u3001\u6d41\u5f0f\u89c6\u9891\u4e09\u7c7b\u57fa\u51c6\u4e0a\u5747\u8d85\u8d8a\u66f4\u5927\u6a21\u578b\uff0c\u5bf9\u793e\u533a\u590d\u73b0\u548c\u4e8c\u6b21\u5f00\u53d1\u4ef7\u503c\u6781\u9ad8\u3002"}, {"abstract": "World Action Models (WAMs) enable semantically- and physically-informed control but are brittle under distribution shift. In this work, we use mechanistic interpretability to study how robustness-relevant perturbations are represented in WAM activation space. Comparing activations across successful and unsuccessful rollouts, we find some WAM architectures exhibit low-dimensional linear separability for robustness-critical features, while others do not. This motivates the use of contrastive activation directions for training-free WAM steering. We also show that local linearity in WAM activation dynamics enables efficient feedback steering via model-based optimal control, yielding World-Action Linear Quadratic Regulator (WA-LQR), a minimally-invasive reduced-order LQR controller. Via mechanistic evaluations, we predict strong steerability in the Cosmos-Policy and DiT4DiT models but weak steerability in LingBot-VA, consistent with steering intervention results. On Cosmos-Policy and DiT4DiT, WA-LQR generalizes contrastive directions to new tasks and improves robustness to camera, gripper, and visual-noise perturbations over unsteered and prompt steering baselines.", "arxiv_id": "2607.14943", "arxiv_url": "https://arxiv.org/abs/2607.14943", "authors": ["Jihoon Hong", "Julian Skifstad", "Qiyue Dai", "Alice Chan", "Glen Chou"], "brief": "\u63d0\u51fa\u4e86\u4e00\u79cd\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u7684\u4e16\u754c\u52a8\u4f5c\u6a21\u578b\uff08WAM\uff09\u9c81\u68d2\u6027\u589e\u5f3a\u6846\u67b6\uff0c\u901a\u8fc7\u5206\u6790\u6fc0\u6d3b\u7a7a\u95f4\u7684\u7ebf\u6027\u53ef\u5206\u6027\uff0c\u7ed3\u5408\u5bf9\u6bd4\u6fc0\u6d3b\u65b9\u5411\u4e0eLQR\u6700\u4f18\u63a7\u5236\uff0c\u6784\u5efa\u4e86WA-LQR\u63a7\u5236\u5668\u4ee5\u62b5\u6297\u5206\u5e03\u504f\u79fb\u3002", "categories": ["cs.RO", "cs.AI", "cs.LG", "eess.SY", "math.OC"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14943", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u53d1\u73b0\u90e8\u5206WAM\u67b6\u6784\uff08\u5982Cosmos-Policy\u3001DiT4DiT\uff09\u5728\u6fc0\u6d3b\u7a7a\u95f4\u4e2d\u5bf9\u9c81\u68d2\u6027\u5173\u952e\u7279\u5f81\u5177\u6709\u4f4e\u7ef4\u7ebf\u6027\u53ef\u5206\u6027\uff0c\u53ef\u7528\u4e8e\u65e0\u8bad\u7ec3\u7684\u6fc0\u6d3b\u5f15\u5bfc", "\u5229\u7528WAM\u6fc0\u6d3b\u52a8\u6001\u7684\u5c40\u90e8\u7ebf\u6027\u6027\uff0c\u8bbe\u8ba1\u4e86World-Action LQR\uff08WA-LQR\uff09\u964d\u9636\u53cd\u9988\u63a7\u5236\u5668\uff0c\u5b9e\u73b0\u6700\u5c0f\u4fb5\u5165\u5f0f\u9c81\u68d2\u6027\u8c03\u63a7", "\u5728\u76f8\u673a\u3001\u5939\u722a\u548c\u89c6\u89c9\u566a\u58f0\u6270\u52a8\u4e0b\uff0cWA-LQR\u5728Cosmos-Policy\u548cDiT4DiT\u4e0a\u4f18\u4e8e\u65e0\u5f15\u5bfc\u57fa\u7ebf\u548c\u63d0\u793a\u5f15\u5bfc\u57fa\u7ebf\uff0c\u4e14\u53ef\u6cdb\u5316\u5230\u65b0\u4efb\u52a1"], "keywords": ["\u4e16\u754c\u6a21\u578b", "\u673a\u5668\u4eba\u63a7\u5236", "\u53ef\u89e3\u91ca\u6027", "\u5f3a\u5316\u5b66\u4e60"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14943v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Steering Robustness into World Action Models via Mechanistic Interpretability and Optimal Control", "tldr": "\u5229\u7528\u673a\u5236\u53ef\u89e3\u91ca\u6027\u4e0e\u6700\u4f18\u63a7\u5236\u63d0\u5347\u4e16\u754c\u52a8\u4f5c\u6a21\u578b\u7684\u9c81\u68d2\u6027", "upvotes": 0, "what_it_is": "\u63d0\u51fa\u4e86\u4e00\u79cd\u65e0\u9700\u91cd\u65b0\u8bad\u7ec3\u7684\u4e16\u754c\u52a8\u4f5c\u6a21\u578b\uff08WAM\uff09\u9c81\u68d2\u6027\u589e\u5f3a\u6846\u67b6\uff0c\u901a\u8fc7\u5206\u6790\u6fc0\u6d3b\u7a7a\u95f4\u7684\u7ebf\u6027\u53ef\u5206\u6027\uff0c\u7ed3\u5408\u5bf9\u6bd4\u6fc0\u6d3b\u65b9\u5411\u4e0eLQR\u6700\u4f18\u63a7\u5236\uff0c\u6784\u5efa\u4e86WA-LQR\u63a7\u5236\u5668\u4ee5\u62b5\u6297\u5206\u5e03\u504f\u79fb\u3002", "why_notable": "\u9996\u6b21\u5c06\u673a\u5236\u53ef\u89e3\u91ca\u6027\u4e0e\u6700\u4f18\u63a7\u5236\u7ed3\u5408\u7528\u4e8e\u673a\u5668\u4eba\u4e16\u754c\u6a21\u578b\u7684\u9c81\u68d2\u6027\u589e\u5f3a\uff0c\u65e0\u9700\u91cd\u8bad\u7ec3\u5373\u53ef\u63d0\u5347\u6a21\u578b\u5728\u5206\u5e03\u504f\u79fb\u4e0b\u7684\u8868\u73b0\uff0c\u4e3a\u5177\u8eab\u667a\u80fd\u7684\u53ef\u9760\u90e8\u7f72\u63d0\u4f9b\u4e86\u65b0\u601d\u8def\u3002"}, {"abstract": "Autonomous coding agents increasingly execute multi-step software work, but lifecycle states such as reviewed, tested, DONE, and ready-to-merge remain claims unless supported by current evidence. We present Proof-or-Stop Lifecycle Control, a method that permits lifecycle transitions only when fresh, tracked-source-state-bound, mechanically verifiable evidence satisfies the relevant gate. The method treats agent outputs as claims rather than lifecycle state, and uses proof operationally to mean gate-admissible evidence under a stated trust model, not semantic program correctness. We evaluate an open-source implementation through mechanism tests, a powered control-policy ablation, and operated self-application evidence. The unattended-loop engine passed 10 of 10 scenarios with zero false-DONE, and local-key receipt bundles rejected 18 tamper classes with zero false accepts. In a 9,240-cell ablation, the pre-registered A4 versus A2-prime comparison reduced visible-pass/hidden-fail amplification from 31 of 1,800 injected cells under a compute-budgeted naive loop to 2 of 1,800 under the gated loop, a 1.6 percentage-point improvement in not-amplified rate with a 95 percent confidence interval of [0.8, 2.5]. A near-compute A3 versus A4 comparison, 14 of 1,800 versus 2 of 1,800, indicates that the gain is associated with enforcing review as a lifecycle gate rather than merely adding a reviewer. The self-application corpus contains 565 stories and 1,007 review findings, with 94.8 percent resolved, plus a 68-row high/critical cross-vendor exhibit. These results support Proof-or-Stop as a model-agnostic, host-neutral control layer for deciding which autonomous-agent claims a lifecycle may act on. The evaluation is limited to one model family, 24 ablation tasks, and a self-hosted corpus.", "arxiv_id": "2607.14890", "arxiv_url": "https://arxiv.org/abs/2607.14890", "authors": ["Jek Huang", "Jeffery Hsia", "Jiayi Sun", "Freddie Shi", "Wei Huang", "Ian H. White"], "brief": "\u63d0\u51faProof-or-Stop\u751f\u547d\u5468\u671f\u63a7\u5236\u65b9\u6cd5\uff0c\u5c06\u667a\u80fd\u4f53\u8f93\u51fa\u89c6\u4e3a\"\u58f0\u660e\"\u800c\u975e\u4e8b\u5b9e\uff0c\u4ec5\u5f53\u63d0\u4f9b\u65b0\u9c9c\u3001\u53ef\u673a\u68b0\u9a8c\u8bc1\u7684\u8bc1\u636e\u6ee1\u8db3\u95e8\u63a7\u6761\u4ef6\u65f6\uff0c\u624d\u5141\u8bb8\u4ee3\u7801\u5ba1\u67e5/\u6d4b\u8bd5/\u5b8c\u6210\u7b49\u751f\u547d\u5468\u671f\u72b6\u6001\u53d1\u751f\u8f6c\u6362\u3002", "categories": ["cs.AI", "cs.SE"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14890", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u65e0\u4eba\u503c\u5b88\u5faa\u73af\u5f15\u64ce\u572810/10\u573a\u666f\u4e2d\u96f6\u8bef\u5224\"\u5b8c\u6210\"\uff0c\u672c\u5730\u5bc6\u94a5\u6536\u636e\u5305\u62d2\u7edd18\u7c7b\u7be1\u6539\u4e14\u96f6\u8bef\u63a5\u53d7", "9240\u683c\u6d88\u878d\u5b9e\u9a8c\u4e2d\uff0c\u95e8\u63a7\u5faa\u73af\u5c06\"\u901a\u8fc7\u6d4b\u8bd5\u4f46\u9690\u85cf\u5931\u8d25\"\u7684\u653e\u5927\u7387\u4ece31/1800\u964d\u81f32/1800\uff0c\u964d\u5e45\u7ea61.6\u4e2a\u767e\u5206\u70b9", "\u5bf9\u6bd4\u5b9e\u9a8c\u8868\u660e\uff0c\u6536\u76ca\u6765\u81ea\u5c06\u4ee3\u7801\u5ba1\u67e5\u5f3a\u5236\u4e3a\u751f\u547d\u5468\u671f\u95e8\u63a7\uff0c\u800c\u975e\u4ec5\u589e\u52a0\u5ba1\u67e5\u5458\uff1b\u81ea\u5e94\u7528\u8bed\u6599\u5e93\u542b565\u4e2a\u6545\u4e8b\u30011007\u6761\u5ba1\u67e5\u53d1\u73b0\uff0c94.8%\u5df2\u89e3\u51b3"], "keywords": ["\u667a\u80fd\u4f53", "\u4ee3\u7801\u751f\u6210", "\u8f6f\u4ef6\u5de5\u7a0b", "\u53ef\u4fe1AI"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14890v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Proof-or-Stop: Don\u0027t Trust the Agent, Trust the Evidence -- Loop Engineering for Verifiable Evidence-Gated Lifecycle Control", "tldr": "\u63d0\u51faProof-or-Stop\u65b9\u6cd5\uff0c\u8981\u6c42\u81ea\u4e3b\u7f16\u7801\u667a\u80fd\u4f53\u6bcf\u6b21\u751f\u547d\u5468\u671f\u72b6\u6001\u8f6c\u6362\u5fc5\u987b\u63d0\u4f9b\u53ef\u9a8c\u8bc1\u8bc1\u636e\uff0c\u9632\u6b62\u865a\u5047\"\u5b8c\u6210\"\u58f0\u660e\u3002", "upvotes": 0, "what_it_is": "\u63d0\u51faProof-or-Stop\u751f\u547d\u5468\u671f\u63a7\u5236\u65b9\u6cd5\uff0c\u5c06\u667a\u80fd\u4f53\u8f93\u51fa\u89c6\u4e3a\"\u58f0\u660e\"\u800c\u975e\u4e8b\u5b9e\uff0c\u4ec5\u5f53\u63d0\u4f9b\u65b0\u9c9c\u3001\u53ef\u673a\u68b0\u9a8c\u8bc1\u7684\u8bc1\u636e\u6ee1\u8db3\u95e8\u63a7\u6761\u4ef6\u65f6\uff0c\u624d\u5141\u8bb8\u4ee3\u7801\u5ba1\u67e5/\u6d4b\u8bd5/\u5b8c\u6210\u7b49\u751f\u547d\u5468\u671f\u72b6\u6001\u53d1\u751f\u8f6c\u6362\u3002", "why_notable": "\u9488\u5bf9\u81ea\u4e3b\u7f16\u7801\u667a\u80fd\u4f53\"\u58f0\u79f0\u5b8c\u6210\u4f46\u5b9e\u9645\u672a\u5b8c\u6210\"\u7684\u6838\u5fc3\u53ef\u4fe1\u5ea6\u95ee\u9898\uff0c\u63d0\u4f9b\u4e86\u6a21\u578b\u65e0\u5173\u3001\u5bbf\u4e3b\u4e2d\u7acb\u7684\u63a7\u5236\u5c42\u65b9\u6848\uff0c\u5bf9AI\u8f85\u52a9\u8f6f\u4ef6\u5de5\u7a0b\u7684\u5b89\u5168\u843d\u5730\u5177\u6709\u91cd\u8981\u5b9e\u8df5\u4ef7\u503c\u3002"}, {"abstract": "Transcoders have recently emerged as a promising approach for mechanistic interpretability (MI), enabling circuit-level analysis of model behaviour. In this paper, we investigate the use of transcoders to analyse deceptive behaviour in language models, a behaviour that poses a safety and security risk. Using a Qwen3-4B model with pre-trained transcoders, specifically per-layer transcoders (PLTs), we construct attribution graphs that capture feature activations and inter-feature dependencies, allowing circuit-level analysis of deception. Through feature steering and circuit analysis, we identified a dictionary of deception-related features and show that these features exert a stronger influence on deceptive outputs, as they produce predictable shifts between deceptive and non-deceptive responses. These findings suggest that deception emerges from internal model mechanisms and highlight the potential of transcoders for behavioural monitoring and early detection of security vulnerabilities related to malicious behaviours in language models.", "arxiv_id": "2607.14791", "arxiv_url": "https://arxiv.org/abs/2607.14791", "authors": ["Darius Lim", "Nathan Leow", "Xin Wei Chia"], "brief": "\u672c\u6587\u5229\u7528\u9884\u8bad\u7ec3\u7684\u9010\u5c42Transcoder\uff08PLT\uff09\u5bf9Qwen3-4B\u6a21\u578b\u7684\u6b3a\u9a97\u884c\u4e3a\u8fdb\u884c\u673a\u5236\u53ef\u89e3\u91ca\u6027\u7814\u7a76\uff0c\u6784\u5efa\u5f52\u56e0\u56fe\u4ee5\u6355\u83b7\u7279\u5f81\u6fc0\u6d3b\u4e0e\u7279\u5f81\u95f4\u4f9d\u8d56\u5173\u7cfb\uff0c\u8bc6\u522b\u51fa\u4e0e\u6b3a\u9a97\u76f8\u5173\u7684\u7279\u5f81\u5b57\u5178\uff0c\u5e76\u9a8c\u8bc1\u8fd9\u4e9b\u7279\u5f81\u5bf9\u6b3a\u9a97\u6027\u8f93\u51fa\u5177\u6709\u66f4\u5f3a\u7684\u5f71\u54cd\u529b\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14791", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u4f7f\u7528\u9010\u5c42Transcoder\uff08PLT\uff09\u6784\u5efa\u5f52\u56e0\u56fe\uff0c\u5b9e\u73b0\u5bf9\u6b3a\u9a97\u884c\u4e3a\u7684\u7535\u8def\u7ea7\u5206\u6790", "\u901a\u8fc7\u7279\u5f81\u5f15\u5bfc\uff08feature steering\uff09\u8bc6\u522b\u51fa\u6b3a\u9a97\u76f8\u5173\u7279\u5f81\u5b57\u5178\uff0c\u8fd9\u4e9b\u7279\u5f81\u80fd\u5728\u6b3a\u9a97\u4e0e\u975e\u6b3a\u9a97\u54cd\u5e94\u95f4\u4ea7\u751f\u53ef\u9884\u6d4b\u7684\u5207\u6362", "\u7814\u7a76\u8868\u660e\u6b3a\u9a97\u884c\u4e3a\u6e90\u4e8e\u6a21\u578b\u5185\u90e8\u673a\u5236\uff0cTranscoder\u53ef\u7528\u4e8e\u884c\u4e3a\u76d1\u63a7\u4e0e\u5b89\u5168\u6f0f\u6d1e\u65e9\u671f\u68c0\u6d4b"], "keywords": ["\u673a\u5236\u53ef\u89e3\u91ca\u6027", "AI\u5b89\u5168", "\u5927\u8bed\u8a00\u6a21\u578b", "\u6b3a\u9a97\u68c0\u6d4b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14791v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Transcoders for Investigating Deception in Language Models", "tldr": "\u7528Transcoder\u5bf9\u8bed\u8a00\u6a21\u578b\u6b3a\u9a97\u884c\u4e3a\u8fdb\u884c\u7535\u8def\u7ea7\u673a\u5236\u53ef\u89e3\u91ca\u6027\u5206\u6790", "upvotes": 0, "what_it_is": "\u672c\u6587\u5229\u7528\u9884\u8bad\u7ec3\u7684\u9010\u5c42Transcoder\uff08PLT\uff09\u5bf9Qwen3-4B\u6a21\u578b\u7684\u6b3a\u9a97\u884c\u4e3a\u8fdb\u884c\u673a\u5236\u53ef\u89e3\u91ca\u6027\u7814\u7a76\uff0c\u6784\u5efa\u5f52\u56e0\u56fe\u4ee5\u6355\u83b7\u7279\u5f81\u6fc0\u6d3b\u4e0e\u7279\u5f81\u95f4\u4f9d\u8d56\u5173\u7cfb\uff0c\u8bc6\u522b\u51fa\u4e0e\u6b3a\u9a97\u76f8\u5173\u7684\u7279\u5f81\u5b57\u5178\uff0c\u5e76\u9a8c\u8bc1\u8fd9\u4e9b\u7279\u5f81\u5bf9\u6b3a\u9a97\u6027\u8f93\u51fa\u5177\u6709\u66f4\u5f3a\u7684\u5f71\u54cd\u529b\u3002", "why_notable": "\u9996\u6b21\u5c06Transcoder\u5e94\u7528\u4e8e\u8bed\u8a00\u6a21\u578b\u6b3a\u9a97\u884c\u4e3a\u7684\u673a\u5236\u53ef\u89e3\u91ca\u6027\u5206\u6790\uff0c\u4e3aAI\u5b89\u5168\u9886\u57df\u63d0\u4f9b\u4e86\u68c0\u6d4b\u548c\u76d1\u63a7\u6076\u610f\u884c\u4e3a\u7684\u65b0\u5de5\u5177\uff0c\u5177\u6709\u91cd\u8981\u7684\u5b89\u5168\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Vision-Language-Action (VLA) models have achieved impressive results in visuomotor policy learning, yet remain fundamentally reactive, mapping current observations and language to actions without explicit forward prediction of world dynamics. Existing visual foresight methods predict future visual states but lack explicit motion guidance: they show where to go but not how to get there. We argue that future feature prediction and sparse point tracking are naturally complementary: the former provides the goal state, while the latter captures the continuous motion path toward it. We propose FoMoVLA, a framework that augments VLA representations with explicit spatio-temporal supervision by jointly learning future feature foresight and sparse 2D point tracking, enhancing the continuous action policy. FoMoVLA introduces compact foresight tokens to decode future feature states, decodes sparse temporal 2D point trajectories to model compact geometric motion, and couples both through a lightweight future-conditioned cross-attention module that enables consistent reasoning between anticipated states and point dynamics. Extensive experiments on LIBERO, RoboCasa GR-1 Tabletop, and LIBERO-Plus demonstrate state-of-the-art performance and strong zero-shot generalization. Project page is available at https://liauto-research.github.io/FoMoVLA.", "arxiv_id": "2607.14739", "arxiv_url": "https://arxiv.org/abs/2607.14739", "authors": ["Wei Li", "Peijin Jia", "Yuan Ma", "Xuefeng Jiang", "Titong Jiang", "Sheng Sun", "Yujian Li", "Xin Wen", "Han Hong", "Zhikang Liu", "Bailin Li", "Kun Zhan"], "brief": "\u63d0\u51faFoMoVLA\u6846\u67b6\uff0c\u901a\u8fc7\u8054\u5408\u5b66\u4e60\u672a\u6765\u7279\u5f81\u9884\u89c1\uff08foresight tokens\uff09\u548c\u7a00\u758f2D\u70b9\u8f68\u8ff9\u8ffd\u8e2a\uff0c\u4e3aVLA\u6a21\u578b\u5f15\u5165\u663e\u5f0f\u65f6\u7a7a\u76d1\u7763\uff0c\u5f25\u8865\u73b0\u6709\u65b9\u6cd5\u53ea\u77e5\"\u53bb\u54ea\"\u800c\u4e0d\u77e5\"\u600e\u4e48\u53bb\"\u7684\u7f3a\u9677\u3002", "categories": ["cs.CV", "cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14739", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5f15\u5165\u7d27\u51d1foresight tokens\u89e3\u7801\u672a\u6765\u7279\u5f81\u72b6\u6001\uff0c\u540c\u65f6\u89e3\u7801\u7a00\u758f\u65f6\u5e8f2D\u70b9\u8f68\u8ff9\u4ee5\u5efa\u6a21\u51e0\u4f55\u8fd0\u52a8\u8def\u5f84", "\u8bbe\u8ba1\u8f7b\u91cf\u7ea7future-conditioned\u4ea4\u53c9\u6ce8\u610f\u529b\u6a21\u5757\uff0c\u5b9e\u73b0\u9884\u671f\u72b6\u6001\u4e0e\u70b9\u52a8\u6001\u4e4b\u95f4\u7684\u4e00\u81f4\u6027\u63a8\u7406", "\u5728LIBERO\u3001RoboCasa GR-1 Tabletop\u548cLIBERO-Plus\u4e09\u4e2a\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA\uff0c\u5e76\u5c55\u73b0\u5f3a\u96f6\u6837\u672c\u6cdb\u5316\u80fd\u529b"], "keywords": ["\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b", "\u673a\u5668\u4eba\u64cd\u63a7", "\u8fd0\u52a8\u9884\u6d4b", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14739v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "FoMoVLA: Bridging Visual Foresight and Motion Guidance for Vision-Language-Action Models", "tldr": "FoMoVLA\u5c06\u89c6\u89c9\u9884\u89c1\u4e0e\u8fd0\u52a8\u8f68\u8ff9\u8ffd\u8e2a\u7ed3\u5408\uff0c\u589e\u5f3a\u89c6\u89c9-\u8bed\u8a00-\u52a8\u4f5c\u6a21\u578b\u7684\u673a\u5668\u4eba\u64cd\u63a7\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faFoMoVLA\u6846\u67b6\uff0c\u901a\u8fc7\u8054\u5408\u5b66\u4e60\u672a\u6765\u7279\u5f81\u9884\u89c1\uff08foresight tokens\uff09\u548c\u7a00\u758f2D\u70b9\u8f68\u8ff9\u8ffd\u8e2a\uff0c\u4e3aVLA\u6a21\u578b\u5f15\u5165\u663e\u5f0f\u65f6\u7a7a\u76d1\u7763\uff0c\u5f25\u8865\u73b0\u6709\u65b9\u6cd5\u53ea\u77e5\"\u53bb\u54ea\"\u800c\u4e0d\u77e5\"\u600e\u4e48\u53bb\"\u7684\u7f3a\u9677\u3002", "why_notable": "\u9996\u6b21\u5c06\u89c6\u89c9\u9884\u89c1\uff08\u76ee\u6807\u72b6\u6001\uff09\u4e0e\u7a00\u758f\u70b9\u8ffd\u8e2a\uff08\u8fd0\u52a8\u8def\u5f84\uff09\u7edf\u4e00\u5230VLA\u6846\u67b6\u4e2d\uff0c\u89e3\u51b3\u4e86\u73b0\u6709\u65b9\u6cd5\u7f3a\u4e4f\u663e\u5f0f\u8fd0\u52a8\u5f15\u5bfc\u7684\u6839\u672c\u95ee\u9898\uff0c\u5bf9\u673a\u5668\u4eba\u64cd\u63a7\u7684\u6cdb\u5316\u6027\u6709\u5b9e\u8d28\u63d0\u5347\u3002"}, {"abstract": "While Multimodal Large Language Models (MLLMs) excel in general tasks, rigorous scientific reasoning remains challenging due to the limitations of monolithic, linear planning. Such sequential designs often suffer from visual-semantic misalignment, long-context hallucinations, and brittle execution under fixed task granularity. We propose TopoAgent, a self-evolving topological framework that replaces linear trajectories with dynamic, state-isolated graph evolution. TopoAgent first employs a front-end decomposer to fracture complex queries into visually-grounded atoms. These atoms are organized into a Directed Acyclic Graph (DAG) based on their dependencies, enabling strict context isolation to shield the reasoning engine from irrelevant historical noise. Furthermore, we introduce adaptive atomic fission, which dynamically splits bottleneck nodes into finer-grained sub-atoms at runtime when tool capability boundaries are exceeded. Extensive experiments across mathematics, physics, and chemistry benchmarks demonstrate that TopoAgent significantly outperforms state-of-the-art linear agent frameworks, providing a robust, noise-resistant, and self-correcting paradigm for autonomous scientific reasoning.", "arxiv_id": "2607.14658", "arxiv_url": "https://arxiv.org/abs/2607.14658", "authors": ["Mingze Xu", "Yinghui Li", "Jiayi Kuang", "Zhanhui Kang", "Di Yin", "Ying Shen", "Xing Sun", "Yuxing Han"], "brief": "\u63d0\u51faTopoAgent\u6846\u67b6\uff0c\u5c06\u590d\u6742\u79d1\u5b66\u95ee\u9898\u5206\u89e3\u4e3a\u89c6\u89c9\u951a\u5b9a\u7684\u539f\u5b50\u4efb\u52a1\uff0c\u5e76\u4ee5\u6709\u5411\u65e0\u73af\u56fe\uff08DAG\uff09\u7ec4\u7ec7\u4f9d\u8d56\u5173\u7cfb\uff0c\u901a\u8fc7\u8fd0\u884c\u65f6\u81ea\u9002\u5e94\u539f\u5b50\u88c2\u53d8\u52a8\u6001\u7ec6\u5316\u74f6\u9888\u8282\u70b9\uff0c\u5b9e\u73b0\u6297\u566a\u3001\u81ea\u6821\u6b63\u7684\u79d1\u5b66\u63a8\u7406\u3002", "categories": ["cs.AI"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14658", "impact_score": 7, "is_agent": true, "is_top": false, "key_points": ["\u7528DAG\u66ff\u4ee3\u7ebf\u6027\u8f68\u8ff9\uff0c\u5b9e\u73b0\u4e25\u683c\u4e0a\u4e0b\u6587\u9694\u79bb\uff0c\u907f\u514d\u957f\u4e0a\u4e0b\u6587\u5e7b\u89c9\u548c\u65e0\u5173\u5386\u53f2\u566a\u58f0\u5e72\u6270", "\u524d\u7aef\u5206\u89e3\u5668\u5c06\u590d\u6742\u67e5\u8be2\u62c6\u89e3\u4e3a\u89c6\u89c9\u8bed\u4e49\u5bf9\u9f50\u7684\u539f\u5b50\u4efb\u52a1\uff0c\u89e3\u51b3\u89c6\u89c9-\u8bed\u4e49\u9519\u4f4d\u95ee\u9898", "\u81ea\u9002\u5e94\u539f\u5b50\u88c2\u53d8\u673a\u5236\uff1a\u5f53\u5de5\u5177\u80fd\u529b\u8fb9\u754c\u88ab\u7a81\u7834\u65f6\uff0c\u8fd0\u884c\u65f6\u52a8\u6001\u5c06\u74f6\u9888\u8282\u70b9\u62c6\u5206\u4e3a\u66f4\u7ec6\u7c92\u5ea6\u5b50\u539f\u5b50"], "keywords": ["\u667a\u80fd\u4f53", "\u591a\u6a21\u6001", "\u79d1\u5b66\u63a8\u7406", "\u56fe\u7ed3\u6784"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14658v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "TopoAgent: A Self-Evolving Topological Agent for Multimodal Scientific Reasoning", "tldr": "TopoAgent\u7528\u52a8\u6001DAG\u56fe\u66ff\u4ee3\u7ebf\u6027\u89c4\u5212\uff0c\u5b9e\u73b0\u81ea\u8fdb\u5316\u7684\u591a\u6a21\u6001\u79d1\u5b66\u63a8\u7406\u667a\u80fd\u4f53", "upvotes": 0, "what_it_is": "\u63d0\u51faTopoAgent\u6846\u67b6\uff0c\u5c06\u590d\u6742\u79d1\u5b66\u95ee\u9898\u5206\u89e3\u4e3a\u89c6\u89c9\u951a\u5b9a\u7684\u539f\u5b50\u4efb\u52a1\uff0c\u5e76\u4ee5\u6709\u5411\u65e0\u73af\u56fe\uff08DAG\uff09\u7ec4\u7ec7\u4f9d\u8d56\u5173\u7cfb\uff0c\u901a\u8fc7\u8fd0\u884c\u65f6\u81ea\u9002\u5e94\u539f\u5b50\u88c2\u53d8\u52a8\u6001\u7ec6\u5316\u74f6\u9888\u8282\u70b9\uff0c\u5b9e\u73b0\u6297\u566a\u3001\u81ea\u6821\u6b63\u7684\u79d1\u5b66\u63a8\u7406\u3002", "why_notable": "\u9996\u6b21\u5c06\u62d3\u6251\u56fe\u7ed3\u6784\u5f15\u5165\u591a\u6a21\u6001\u79d1\u5b66\u63a8\u7406\u667a\u80fd\u4f53\uff0c\u7a81\u7834\u7ebf\u6027\u89c4\u5212\u7684\u56fa\u6709\u7f3a\u9677\uff0c\u5728\u6570\u5b66\u3001\u7269\u7406\u3001\u5316\u5b66\u57fa\u51c6\u4e0a\u663e\u8457\u8d85\u8d8aSOTA\u7ebf\u6027\u667a\u80fd\u4f53\u6846\u67b6\uff0c\u4e3a\u81ea\u4e3b\u79d1\u5b66\u63a8\u7406\u63d0\u4f9b\u65b0\u8303\u5f0f\u3002"}, {"abstract": "On-policy distillation is an alternative post-training method in reinforcement learning that alleviates the constraints imposed by reward models by providing token-level supervision from a teacher model. Although on-policy distillation has been studied and applied across various settings, its fundamental design remains underexplored. In this paper, we introduce a new distillation reward, termed the delta signal, instead of directly imitating the teacher\u0027s output distribution. The delta signal is defined as the difference between the teacher model and its base model prior to instruction tuning for reasoning capability. It therefore captures the changes induced by reasoning tuning and provides a more direct signal for transferring reasoning capabilities. Using extensive empirical evidence, we show that the delta signal substantially improves on-policy distillation and refer to the new distillation method as On-Policy Delta Distillation (OPD$^2$). Experiments across mathematics, science, and code-reasoning benchmarks demonstrate that OPD$^2$ consistently outperforms conventional on-policy distillation, enabling reasoning LLMs to achieve strong performance with only a short post-training period. Code will be available at https://github.com/naver-ai/opd2", "arxiv_id": "2607.15161", "arxiv_url": "https://arxiv.org/abs/2607.15161", "authors": ["Byeongho Heo", "Jaehui Hwang", "Sangdoo Yun", "Dongyoon Han"], "brief": "\u63d0\u51faOn-Policy Delta Distillation\uff08OPD\u00b2\uff09\uff0c\u4ee5\u6559\u5e08\u6a21\u578b\u4e0e\u5176\u6307\u4ee4\u5fae\u8c03\u524d\u57fa\u7840\u6a21\u578b\u7684\u8f93\u51fa\u5206\u5e03\u4e4b\u5dee\uff08delta\u4fe1\u53f7\uff09\u4f5c\u4e3a\u84b8\u998f\u5956\u52b1\uff0c\u66ff\u4ee3\u76f4\u63a5\u6a21\u4eff\u6559\u5e08\u8f93\u51fa\u5206\u5e03\uff0c\u4ece\u800c\u66f4\u7cbe\u51c6\u5730\u6355\u6349\u63a8\u7406\u80fd\u529b\u7684\u589e\u91cf\u5e76\u52a0\u4ee5\u8fc1\u79fb\u3002", "categories": ["cs.LG", "cs.CL"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15161", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["Delta\u4fe1\u53f7\u5b9a\u4e49\u4e3a\u6559\u5e08\u6a21\u578b\u4e0e\u5176\u57fa\u7840\u6a21\u578b\uff08\u63a8\u7406\u5fae\u8c03\u524d\uff09\u7684\u8f93\u51fa\u5206\u5e03\u4e4b\u5dee\uff0c\u4e13\u6ce8\u4e8e\u63a8\u7406\u8c03\u4f18\u5e26\u6765\u7684\u589e\u91cf\u53d8\u5316", "\u5728\u6570\u5b66\u3001\u79d1\u5b66\u3001\u4ee3\u7801\u63a8\u7406\u7b49\u591a\u4e2a\u57fa\u51c6\u6d4b\u8bd5\u4e0a\uff0cOPD\u00b2\u6301\u7eed\u4f18\u4e8e\u4f20\u7edf\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u65b9\u6cd5", "\u4ec5\u9700\u8f83\u77ed\u7684\u540e\u8bad\u7ec3\u5468\u671f\u5373\u53ef\u8ba9\u5b66\u751f\u6a21\u578b\u83b7\u5f97\u5f3a\u63a8\u7406\u6027\u80fd\uff0c\u8bad\u7ec3\u6548\u7387\u9ad8"], "keywords": ["\u77e5\u8bc6\u84b8\u998f", "\u5f3a\u5316\u5b66\u4e60", "\u5927\u8bed\u8a00\u6a21\u578b", "\u63a8\u7406\u80fd\u529b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15161v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "On-Policy Delta Distillation", "tldr": "\u63d0\u51faDelta\u84b8\u998f\u4fe1\u53f7\uff0c\u7528\u6559\u5e08\u6a21\u578b\u4e0e\u5176\u57fa\u7840\u6a21\u578b\u7684\u5dee\u503c\u6307\u5bfc\u5728\u7ebf\u7b56\u7565\u84b8\u998f\uff0c\u663e\u8457\u63d0\u5347\u63a8\u7406\u80fd\u529b\u8fc1\u79fb\u6548\u679c", "upvotes": 0, "what_it_is": "\u63d0\u51faOn-Policy Delta Distillation\uff08OPD\u00b2\uff09\uff0c\u4ee5\u6559\u5e08\u6a21\u578b\u4e0e\u5176\u6307\u4ee4\u5fae\u8c03\u524d\u57fa\u7840\u6a21\u578b\u7684\u8f93\u51fa\u5206\u5e03\u4e4b\u5dee\uff08delta\u4fe1\u53f7\uff09\u4f5c\u4e3a\u84b8\u998f\u5956\u52b1\uff0c\u66ff\u4ee3\u76f4\u63a5\u6a21\u4eff\u6559\u5e08\u8f93\u51fa\u5206\u5e03\uff0c\u4ece\u800c\u66f4\u7cbe\u51c6\u5730\u6355\u6349\u63a8\u7406\u80fd\u529b\u7684\u589e\u91cf\u5e76\u52a0\u4ee5\u8fc1\u79fb\u3002", "why_notable": "\u73b0\u6709\u5728\u7ebf\u7b56\u7565\u84b8\u998f\u76f4\u63a5\u6a21\u4eff\u6559\u5e08\u5206\u5e03\uff0c\u5305\u542b\u5927\u91cf\u4e0e\u63a8\u7406\u65e0\u5173\u7684\u566a\u58f0\u4fe1\u53f7\uff1bDelta\u4fe1\u53f7\u901a\u8fc7\u5dee\u5206\u64cd\u4f5c\u5265\u79bb\u57fa\u7840\u80fd\u529b\u3001\u805a\u7126\u63a8\u7406\u589e\u91cf\uff0c\u601d\u8def\u65b0\u9896\u4e14\u5b9e\u9a8c\u9a8c\u8bc1\u5145\u5206\uff0c\u5bf9\u9ad8\u6548\u77e5\u8bc6\u84b8\u998f\u7814\u7a76\u5177\u6709\u91cd\u8981\u53c2\u8003\u4ef7\u503c\u3002"}, {"abstract": "This paper presents MAGiSt3R, a multi-agent 3D reconstruction framework performing reconstruction and camera tracking for monocular RGB videos at almost 10 FPS. MAGiSt3R relies on a feed-forward model from the 3R family to process RGB videos and regress local point maps, and on a merging model, MAGMA, that combines local maps at both intra-agent and inter-agent levels to obtain the final global point map. Furthermore, MAGiSt3R performs pose graph optimization to mitigate cumulative camera drift occurring along the feed-forward pipeline. We evaluate MAGiSt3R on both synthetic and real-world datasets, demonstrating its superior reconstruction and camera tracking accuracy compared to state-of-the-art approaches.", "arxiv_id": "2607.15211", "arxiv_url": "https://arxiv.org/abs/2607.15211", "authors": ["Ziren Gong", "Xiaohan Li", "Fabio Tosi", "Ninghui Xu", "Stefano Mattoccia", "Jianfei Cai", "Matteo Poggi"], "brief": "\u63d0\u51faMAGiSt3R\u591a\u667a\u80fd\u4f533D\u91cd\u5efa\u6846\u67b6\uff0c\u5229\u7528\u524d\u9988\u6a21\u578b\u5904\u7406\u5355\u76eeRGB\u89c6\u9891\u5e76\u56de\u5f52\u5c40\u90e8\u70b9\u4e91\uff0c\u901a\u8fc7MAGMA\u5408\u5e76\u6a21\u578b\u5728\u667a\u80fd\u4f53\u5185\u548c\u667a\u80fd\u4f53\u95f4\u878d\u5408\u5c40\u90e8\u5730\u56fe\uff0c\u7ed3\u5408\u4f4d\u59ff\u56fe\u4f18\u5316\u5b9e\u73b0\u9ad8\u7cbe\u5ea6\u5168\u5c40\u91cd\u5efa\u4e0e\u76f8\u673a\u8ffd\u8e2a\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15211", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u57fa\u4e8e3R\u7cfb\u5217\u524d\u9988\u6a21\u578b\u56de\u5f52\u5c40\u90e8\u70b9\u4e91\uff0c\u5904\u7406\u901f\u5ea6\u63a5\u8fd110 FPS", "MAGMA\u5408\u5e76\u6a21\u578b\u652f\u6301intra-agent\u4e0einter-agent\u4e24\u7ea7\u70b9\u4e91\u878d\u5408\uff0c\u83b7\u5f97\u5168\u5c40\u4e00\u81f4\u70b9\u4e91", "\u5f15\u5165\u4f4d\u59ff\u56fe\u4f18\u5316\uff08Pose Graph Optimization\uff09\u7f13\u89e3\u524d\u9988\u6d41\u6c34\u7ebf\u4e2d\u7684\u7d2f\u79ef\u76f8\u673a\u6f02\u79fb"], "keywords": ["\u4e09\u7ef4\u91cd\u5efa", "\u76f8\u673a\u8ffd\u8e2a", "\u591a\u667a\u80fd\u4f53", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15211v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "MAGiSt3R: Multi-Agent Feed-forward 3D Reconstruction from Monocular RGB Videos", "tldr": "MAGiSt3R\uff1a\u591a\u667a\u80fd\u4f53\u524d\u9988\u5f0f\u5355\u76eeRGB\u89c6\u98913D\u91cd\u5efa\u6846\u67b6\uff0c\u8fd110FPS\u5b9e\u65f6\u8fd0\u884c", "upvotes": 0, "what_it_is": "\u63d0\u51faMAGiSt3R\u591a\u667a\u80fd\u4f533D\u91cd\u5efa\u6846\u67b6\uff0c\u5229\u7528\u524d\u9988\u6a21\u578b\u5904\u7406\u5355\u76eeRGB\u89c6\u9891\u5e76\u56de\u5f52\u5c40\u90e8\u70b9\u4e91\uff0c\u901a\u8fc7MAGMA\u5408\u5e76\u6a21\u578b\u5728\u667a\u80fd\u4f53\u5185\u548c\u667a\u80fd\u4f53\u95f4\u878d\u5408\u5c40\u90e8\u5730\u56fe\uff0c\u7ed3\u5408\u4f4d\u59ff\u56fe\u4f18\u5316\u5b9e\u73b0\u9ad8\u7cbe\u5ea6\u5168\u5c40\u91cd\u5efa\u4e0e\u76f8\u673a\u8ffd\u8e2a\u3002", "why_notable": "\u5728\u5408\u6210\u4e0e\u771f\u5b9e\u6570\u636e\u96c6\u4e0a\u5747\u8d85\u8d8a\u73b0\u6709\u6700\u4f18\u65b9\u6cd5\uff0c\u517c\u987e\u91cd\u5efa\u7cbe\u5ea6\u4e0e\u5b9e\u65f6\u6027\uff0c\u591a\u667a\u80fd\u4f53\u534f\u540c\u67b6\u6784\u4e3a\u5927\u89c4\u6a21\u573a\u666f\u91cd\u5efa\u63d0\u4f9b\u65b0\u8303\u5f0f\u3002"}, {"abstract": "Multimodal Large Language Models (MLLMs) have demonstrated substantial promise in spatial understanding. Existing works typically incorporate prior knowledge extracted from a pre-trained foundation model to further enhance the spatial awareness of MLLMs. In this paper, we first reveal that when integrating diverse foundation models into MLLMs, different models provide complementary spatial priors that benefit different tasks. Motivated by this, we propose $\\textbf{ViPS}$, a novel multi-model prior framework designed to fully unleash the potential of incorporating multiple $\\textbf{Vi}$sual $\\textbf{P}$riors from diverse models into MLLMs for $\\textbf{S}$patial understanding. Specifically, ViPS introduces an Efficient Prior Proxy to generate multiple foundational priors with minimal inference overhead, and a Dynamic Prior Fusion mechanism to achieve harmonious and context-aware prior fusion and injection from the prior proxies. Extensive experiments demonstrate that ViPS successfully harmonizes diverse visual priors, establishing new state-of-the-art performance across multiple complex spatial reasoning and 3D spatial understanding benchmarks. Project page: https://visual-ai.github.io/vips", "arxiv_id": "2607.15054", "arxiv_url": "https://arxiv.org/abs/2607.15054", "authors": ["Xiao Lin", "Xiaohu Huang", "Kai Han"], "brief": "\u63d0\u51faViPS\u6846\u67b6\uff0c\u901a\u8fc7\u9ad8\u6548\u5148\u9a8c\u4ee3\u7406\u548c\u52a8\u6001\u5148\u9a8c\u878d\u5408\u673a\u5236\uff0c\u5c06\u591a\u4e2a\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u7684\u4e92\u8865\u7a7a\u95f4\u5148\u9a8c\u77e5\u8bc6\u6574\u5408\u5230\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u4e2d\uff0c\u4ee5\u589e\u5f3a\u7a7a\u95f4\u7406\u89e3\u80fd\u529b\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.15054", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u63ed\u793a\u4e0d\u540c\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u63d0\u4f9b\u4e92\u8865\u7684\u7a7a\u95f4\u5148\u9a8c\uff0c\u5bf9\u4e0d\u540c\u4efb\u52a1\u5404\u6709\u4f18\u52bf", "Efficient Prior Proxy\u4ee5\u6781\u4f4e\u63a8\u7406\u5f00\u9500\u751f\u6210\u591a\u79cd\u57fa\u7840\u5148\u9a8c", "Dynamic Prior Fusion\u5b9e\u73b0\u4e0a\u4e0b\u6587\u611f\u77e5\u7684\u5148\u9a8c\u878d\u5408\u4e0e\u6ce8\u5165\uff0c\u5728\u591a\u4e2a3D\u7a7a\u95f4\u7406\u89e3\u57fa\u51c6\u4e0a\u8fbe\u5230SOTA"], "keywords": ["\u591a\u6a21\u6001", "\u7a7a\u95f4\u7406\u89e3", "\u89c6\u89c9\u5148\u9a8c", "\u5927\u8bed\u8a00\u6a21\u578b"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.15054v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Beyond Single Expert: Harmonizing Diverse Visual Priors in MLLMs for Spatial Understanding", "tldr": "ViPS\u6846\u67b6\u878d\u5408\u591a\u79cd\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u7684\u4e92\u8865\u5148\u9a8c\uff0c\u63d0\u5347\u591a\u6a21\u6001\u5927\u6a21\u578b\u7684\u7a7a\u95f4\u7406\u89e3\u80fd\u529b", "upvotes": 0, "what_it_is": "\u63d0\u51faViPS\u6846\u67b6\uff0c\u901a\u8fc7\u9ad8\u6548\u5148\u9a8c\u4ee3\u7406\u548c\u52a8\u6001\u5148\u9a8c\u878d\u5408\u673a\u5236\uff0c\u5c06\u591a\u4e2a\u89c6\u89c9\u57fa\u7840\u6a21\u578b\u7684\u4e92\u8865\u7a7a\u95f4\u5148\u9a8c\u77e5\u8bc6\u6574\u5408\u5230\u591a\u6a21\u6001\u5927\u8bed\u8a00\u6a21\u578b\u4e2d\uff0c\u4ee5\u589e\u5f3a\u7a7a\u95f4\u7406\u89e3\u80fd\u529b\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u63a2\u7d22\u591a\u57fa\u7840\u6a21\u578b\u5148\u9a8c\u4e92\u8865\u6027\u5e76\u52a0\u4ee5\u5229\u7528\uff0c\u7a81\u7834\u5355\u4e00\u4e13\u5bb6\u6a21\u578b\u7684\u5c40\u9650\uff0c\u4e3a\u7a7a\u95f4\u7406\u89e3\u4efb\u52a1\u63d0\u4f9b\u4e86\u66f4\u901a\u7528\u7684\u591a\u6a21\u6001\u589e\u5f3a\u8303\u5f0f\u3002"}, {"abstract": "Rare concept generation focuses on synthesizing customized images conditioned on text prompts that describe objects with unusual attributes. Previous works failed to align the generated images with rare concepts, resulting in incorrect attribute rendering or inconsistent composition of concepts. Such failures, as we observed, stem from the inherent common knowledge bias in the training stage of diffusion models, where objects are strongly associated with their common attributes, making it difficult to break these associations when generating rare concepts. To address such challenges, in this paper, we propose a novel Counterfactual Inference-based Diffusion approach, dubbed CI-Diff. CI-Diff blocks the interference of the model\u0027s inherent common knowledge bias and utilizes the Natural Direct Effect to capture the independent influence of the text prompt of rare concepts on image generation so that decoupling the unusual attributes from the rare concepts. To this end, we reformulate the classifier-free guidance mechanism to highlight the atypical attributes. To the best of our knowledge, we are the first to introduce causal inference into the rare concept generation task. Extensive experiments on the RareBench benchmark validate the superiority of CI-Diff over state-of-the-art diffusion models. Our code can be accessed from https://github.com/200204jzy/CI-Diff.", "arxiv_id": "2607.14765", "arxiv_url": "https://arxiv.org/abs/2607.14765", "authors": ["Zhengyuan Jiang", "Haipeng Liu", "Meng Wang", "Yang Wang"], "brief": "\u63d0\u51faCI-Diff\u65b9\u6cd5\uff0c\u901a\u8fc7\u53cd\u4e8b\u5b9e\u63a8\u65ad\u963b\u65ad\u6269\u6563\u6a21\u578b\u8bad\u7ec3\u9636\u6bb5\u7684\u5e38\u8bc6\u77e5\u8bc6\u504f\u5dee\uff0c\u5229\u7528\u81ea\u7136\u76f4\u63a5\u6548\u5e94\u6355\u6349\u6587\u672c\u63d0\u793a\u5bf9\u7f55\u89c1\u6982\u5ff5\u56fe\u50cf\u751f\u6210\u7684\u72ec\u7acb\u5f71\u54cd\uff0c\u4ece\u800c\u6b63\u786e\u6e32\u67d3\u975e\u5178\u578b\u5c5e\u6027\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14765", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u9996\u6b21\u5c06\u56e0\u679c\u63a8\u65ad\uff08\u53cd\u4e8b\u5b9e\u63a8\u65ad\uff09\u5f15\u5165\u7f55\u89c1\u6982\u5ff5\u751f\u6210\u4efb\u52a1", "\u91cd\u65b0\u8bbe\u8ba1\u65e0\u5206\u7c7b\u5668\u5f15\u5bfc\u673a\u5236\uff08classifier-free guidance\uff09\uff0c\u7a81\u51fa\u975e\u5178\u578b\u5c5e\u6027\u7684\u5f71\u54cd", "\u5728RareBench\u57fa\u51c6\u4e0a\u9a8c\u8bc1\uff0c\u6548\u679c\u4f18\u4e8e\u5f53\u524d\u6700\u4f18\u6269\u6563\u6a21\u578b"], "keywords": ["\u6269\u6563\u6a21\u578b", "\u56e0\u679c\u63a8\u65ad", "\u6587\u751f\u56fe", "\u591a\u6a21\u6001"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14765v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "Rare Concept Generation via Counterfactual Inference in Diffusion Models", "tldr": "\u5f15\u5165\u56e0\u679c\u63a8\u65ad\u89e3\u51b3\u6269\u6563\u6a21\u578b\u751f\u6210\u7f55\u89c1\u6982\u5ff5\u65f6\u7684\u5e38\u8bc6\u504f\u5dee\u95ee\u9898", "upvotes": 0, "what_it_is": "\u63d0\u51faCI-Diff\u65b9\u6cd5\uff0c\u901a\u8fc7\u53cd\u4e8b\u5b9e\u63a8\u65ad\u963b\u65ad\u6269\u6563\u6a21\u578b\u8bad\u7ec3\u9636\u6bb5\u7684\u5e38\u8bc6\u77e5\u8bc6\u504f\u5dee\uff0c\u5229\u7528\u81ea\u7136\u76f4\u63a5\u6548\u5e94\u6355\u6349\u6587\u672c\u63d0\u793a\u5bf9\u7f55\u89c1\u6982\u5ff5\u56fe\u50cf\u751f\u6210\u7684\u72ec\u7acb\u5f71\u54cd\uff0c\u4ece\u800c\u6b63\u786e\u6e32\u67d3\u975e\u5178\u578b\u5c5e\u6027\u3002", "why_notable": "\u7f55\u89c1\u6982\u5ff5\u751f\u6210\u662f\u6587\u751f\u56fe\u7684\u96be\u70b9\uff0c\u73b0\u6709\u6a21\u578b\u56e0\u8bad\u7ec3\u6570\u636e\u4e2d\u5bf9\u8c61\u4e0e\u5e38\u89c1\u5c5e\u6027\u5f3a\u5173\u8054\u800c\u5931\u8d25\uff1b\u672c\u6587\u9996\u6b21\u7528\u56e0\u679c\u63a8\u65ad\u6846\u67b6\u7cfb\u7edf\u6027\u89e3\u51b3\u8be5\u504f\u5dee\u95ee\u9898\uff0c\u65b9\u6cd5\u65b0\u9896\u4e14\u5177\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Recent diffusion-based video generation models have made significant progress in multi-reference image-conditioned video editing. However, existing methods still struggle to coordinate information from multiple visual sources accurately. We identify a critical deficiency in existing approaches. Existing editing instructions lack explicit reference relationships, and most multimodal large language models (MLLMs) cannot generate them reliably. To address this problem, we propose ReBind, a systematic framework that introduces semantic instructions with embedded reference tokens as the intermediate representation for multi-reference image-conditioned video editing. Our key insight is embedding reference tokens at semantic positions to eliminate ambiguity and establish precise bindings between visual attributes and their sources. We develop ReBind-Instruct, a specialized MLLM that learns to establish explicit bindings between visual attributes and their reference sources through a two-stage progressive scheme for precise reference relationships. We further develop ReBind-Edit, which enables lightweight adaptation of text-to-video models to coordinate multiple references by binding visual attributes to their designated sources. Extensive experiments demonstrate that ReBind substantially outperforms general-purpose MLLMs in instruction quality and achieves state-of-the-art performance among open-source methods on reference image conditioned video editing. Our project webpage: https://rebind-mrv2v.github.io/.", "arxiv_id": "2607.14681", "arxiv_url": "https://arxiv.org/abs/2607.14681", "authors": ["Xinyu Liu", "Shihao Li", "Weihong Lin", "Xinlong Chen", "Yang Shi", "Yujin Han", "Yiyang Cai", "Yanghao Wang", "Ruibin Yuan", "Yuanxing Zhang", "Pengfei Wan", "Wenhan Luo", "Yike Guo"], "brief": "\u63d0\u51faReBind\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u8bed\u4e49\u4f4d\u7f6e\u5d4c\u5165\u53c2\u8003\u6807\u8bb0\uff08reference tokens\uff09\u4f5c\u4e3a\u4e2d\u95f4\u8868\u793a\uff0c\u89e3\u51b3\u591a\u53c2\u8003\u56fe\u50cf\u6761\u4ef6\u89c6\u9891\u7f16\u8f91\u4e2d\u89c6\u89c9\u5c5e\u6027\u4e0e\u6765\u6e90\u7ed1\u5b9a\u4e0d\u660e\u786e\u7684\u95ee\u9898\uff0c\u5305\u542b\u6307\u4ee4\u751f\u6210\u6a21\u578bReBind-Instruct\u548c\u7f16\u8f91\u6a21\u578bReBind-Edit\u4e24\u4e2a\u7ec4\u4ef6\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14681", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u6838\u5fc3\u521b\u65b0\uff1a\u5728\u7f16\u8f91\u6307\u4ee4\u4e2d\u5d4c\u5165\u663e\u5f0f\u53c2\u8003\u6807\u8bb0\uff0c\u6d88\u9664\u591a\u89c6\u89c9\u6e90\u4e4b\u95f4\u7684\u6b67\u4e49\uff0c\u5efa\u7acb\u89c6\u89c9\u5c5e\u6027\u4e0e\u53c2\u8003\u6765\u6e90\u7684\u7cbe\u786e\u7ed1\u5b9a", "ReBind-Instruct\u91c7\u7528\u4e24\u9636\u6bb5\u6e10\u8fdb\u5f0f\u8bad\u7ec3\u65b9\u6848\uff0c\u4f7fMLLM\u80fd\u53ef\u9760\u751f\u6210\u542b\u663e\u5f0f\u53c2\u8003\u5173\u7cfb\u7684\u7ed3\u6784\u5316\u6307\u4ee4", "ReBind-Edit\u5bf9\u6587\u672c\u8f6c\u89c6\u9891\u6a21\u578b\u8fdb\u884c\u8f7b\u91cf\u7ea7\u9002\u914d\uff0c\u5728\u5f00\u6e90\u65b9\u6cd5\u4e2d\u8fbe\u5230\u53c2\u8003\u56fe\u50cf\u6761\u4ef6\u89c6\u9891\u7f16\u8f91\u7684SOTA\u6027\u80fd"], "keywords": ["\u89c6\u9891\u7f16\u8f91", "\u591a\u6a21\u6001", "\u6269\u6563\u6a21\u578b", "\u667a\u80fd\u4f53"], "num_comments": 0, "on_hf": false, "organization": null, "pdf_url": "https://arxiv.org/pdf/2607.14681v1", "published_at": "2026-07-16", "score": 0.175, "selected_reasons": ["\u9ad8\u5f71\u54cd\u529b (LLM 7/10)"], "thumbnail": null, "title": "ReBind: Multi-Reference Video Editing via Structured Instructions with Explicit Reference Relationships", "tldr": "ReBind\u6846\u67b6\u901a\u8fc7\u5d4c\u5165\u53c2\u8003\u6807\u8bb0\u7684\u8bed\u4e49\u6307\u4ee4\uff0c\u5b9e\u73b0\u591a\u53c2\u8003\u56fe\u50cf\u6761\u4ef6\u4e0b\u7684\u7cbe\u51c6\u89c6\u9891\u7f16\u8f91", "upvotes": 0, "what_it_is": "\u63d0\u51faReBind\u6846\u67b6\uff0c\u901a\u8fc7\u5728\u8bed\u4e49\u4f4d\u7f6e\u5d4c\u5165\u53c2\u8003\u6807\u8bb0\uff08reference tokens\uff09\u4f5c\u4e3a\u4e2d\u95f4\u8868\u793a\uff0c\u89e3\u51b3\u591a\u53c2\u8003\u56fe\u50cf\u6761\u4ef6\u89c6\u9891\u7f16\u8f91\u4e2d\u89c6\u89c9\u5c5e\u6027\u4e0e\u6765\u6e90\u7ed1\u5b9a\u4e0d\u660e\u786e\u7684\u95ee\u9898\uff0c\u5305\u542b\u6307\u4ee4\u751f\u6210\u6a21\u578bReBind-Instruct\u548c\u7f16\u8f91\u6a21\u578bReBind-Edit\u4e24\u4e2a\u7ec4\u4ef6\u3002", "why_notable": "\u9996\u6b21\u7cfb\u7edf\u6027\u5730\u5c06\u663e\u5f0f\u53c2\u8003\u5173\u7cfb\u5d4c\u5165\u89c6\u9891\u7f16\u8f91\u6307\u4ee4\uff0c\u89e3\u51b3\u4e86\u73b0\u6709MLLM\u65e0\u6cd5\u53ef\u9760\u5904\u7406\u591a\u53c2\u8003\u6e90\u534f\u8c03\u7684\u5173\u952e\u7f3a\u9677\uff0c\u5bf9\u591a\u53c2\u8003\u89c6\u9891\u7f16\u8f91\u4efb\u52a1\u5177\u6709\u91cd\u8981\u5b9e\u7528\u4ef7\u503c\u3002"}, {"abstract": "Visual generative models inevitably absorb undesirable concepts from uncurated pretraining data, making concept erasure essential for safe deployment. Existing erasure methods, however, are often architecture-specific and struggle to remove target concepts while preserving non-target content and generative priors. We present Uni-AdaVD, a universal inference-time concept erasure framework for visual generation. Uni-AdaVD treats the value space of multimodal attention as a unified intervention space and introduces encoder-aware target representation construction to localize target semantics across heterogeneous text encoders. It further combines orthogonal value decomposition with an adaptive erasing shift to suppress target semantic directions without updating the original model weights. Extensive experiments on U-Net-, DiT-, and autoregressive image generators, as well as text-to-video models, demonstrate strong performance on single- and multi-concept erasure while preserving non-target priors. These results suggest that Uni-AdaVD provides an efficient and adaptable safety mechanism for modern visual generative models. Our code is available at https://github.com/QifanZhou/Uni-AdaVD.", "arxiv_id": "2607.14521", "arxiv_url": "https://arxiv.org/abs/2607.14521", "authors": ["Qifan Zhou", "Yuan Wang", "Yanbin Hao", "Xiang Wang", "Kuien Liu", "Richang Hong", "Meng Wang"], "brief": "\u63d0\u51faUni-AdaVD\uff0c\u4e00\u4e2a\u65e0\u9700\u66f4\u65b0\u6a21\u578b\u6743\u91cd\u3001\u9002\u7528\u4e8e\u591a\u79cd\u67b6\u6784\uff08U-Net\u3001DiT\u3001\u81ea\u56de\u5f52\u3001\u6587\u751f\u89c6\u9891\uff09\u7684\u63a8\u7406\u65f6\u6982\u5ff5\u64e6\u9664\u6846\u67b6\uff0c\u901a\u8fc7\u5bf9\u591a\u6a21\u6001\u6ce8\u610f\u529b\u503c\u7a7a\u95f4\u8fdb\u884c\u6b63\u4ea4\u5206\u89e3\u6765\u5b9a\u5411\u6291\u5236\u76ee\u6807\u8bed\u4e49\u65b9\u5411\u3002", "categories": ["cs.CV"], "github_repo": null, "github_stars": 0, "hf_url": "https://huggingface.co/papers/2607.14521", "impact_score": 7, "is_agent": false, "is_top": false, "key_points": ["\u5c06\u591a\u6a21\u6001\u6ce8\u610f\u529b\u7684\u503c\u7a7a\u95f4\u4f5c\u4e3a\u7edf\u4e00\u5e72\u9884\u7a7a\u95f4\uff0c\u5f15\u5165\u7f16\u7801\u5668\u611f\u77e5\u7684\u76ee\u6807\u8868\u793a\u6784\u5efa\uff0c\u8de8\u5f02\u6784\u6587\u672c\u7f16\u7801\u5668\u5b9a\u4f4d\u76ee\u6807\u8bed\u4e49", "\u6b63\u4ea4\u503c\u5206\u89e3\u7ed3\u5408\u81ea\u9002\u5e94\u64e6\u9664\u504f\u79fb\uff0c\u5728\u4e0d\u4fee\u6539\u539f\u59cb\u6a21\u578b\u6743\u91cd\u7684\u524d\u63d0\u4e0b\u6291\u5236\u76ee\u6807\u8bed\u4e49\u65b9\u5411", "\u5728U-Net\u3001DiT\u3001\u81ea\u56de\u5f52\u56fe\u50cf\u751f\u6210\u5668\u53ca\u6587\u751f\u89c6\u9891\u6a21\u578b\u4e0a\u574
